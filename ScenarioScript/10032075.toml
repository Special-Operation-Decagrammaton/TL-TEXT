[translation]
10032075-7 = "A-acho que conseguimos dar um jeito por enquanto...?"
10032075-8 = "Parece que sim. Mas acho que é só uma questão de tempo até nos encontrarem aqui..."
10032075-9 = "Ué, aqui é..."
10032075-10 = "O que houve, Haruka?"
10032075-11 = "N-nada! Não é nada mesmo!!"
10032075-13 = "Então estamos seguros por enquanto..."
10032075-14 = "…Eu não sei como agradecer ao Sensei."
10032075-15 = "E também..."
10032075-16 = "À Problem Solver 68..."
10032075-18 = "Fufu, não precisa se preocupar com isso. Nós só agimos pensando no lucro."
10032075-19 = "Não fizemos nada disso por sua causa."
10032075-21 = "…Entendo."
10032075-22 = "Mas, na minha visão, o fato de que recebi ajuda não muda."
10032075-23 = "Se vocês não estivessem aqui, eu teria sido usado por aqueles caras e descartado logo em seguida."
10032075-24 = "Pode parecer estranho como forma de retribuição, mas..."
10032075-30 = "Isso é..."
10032075-32 = "É um agradecimento. Afinal, minha missão praticamente fracassou."
10032075-33 = "Quem recebe um favor, deve retribuir. Ouvi dizer que essa é a regra deste mundo."
10032075-34 = "…Hmph."
10032075-35 = "Foram vocês mesmos que disseram isso, não foram?"
10032075-36 = "…!"
10032075-37 = "Uau~ então a gente tem a sua confiança?"
10032075-38 = "M-mas, será que tudo bem aceitar isso tão facilmente...?"
10032075-39 = "Ah, qual é, não tem problema~"
10032075-40 = "Já garantimos o alvo, afinal~"
10032075-41 = "Com isso..."
10032075-42 = "A missão está concluída, né?"
10032075-44 = "…Bem, acho que sim."
10032075-46 = "A missão foi realmente concluída...!?"
10032075-47 = "C-como esperado da Aru-sama! Você já estava planejando isso desde o início...!?"
10032075-51 = "…Hã?"
10032075-52 = "A-ahn...?"
10032075-54 = "…!"
10032075-55 = "Isso sim é um verdadeiro fora da lei...!"
10032075-56 = "Quem diria que esse era o motivo para você me..."
10032075-57 = "Incrível, estou impressionado."
10032075-58 = "[s1] \"No fim das contas, tudo se resolveu...\"\n[s2] \"O que importa é que deu tudo certo...\""
10032075-61 = "Fu, fufu... Sim, eu já previa que terminaria assim."
10032075-62 = "Sendo assim, nossa aliança, por mais curta que tenha sido, chega ao fim."
10032075-63 = "Vamos nos separar sem ressentimentos..."
10032075-64 = "Encontramos eles! É por aqui!!"
10032075-69 = "Esses malditos! Como se atrevem a fugir!!"
10032075-70 = "Ei! Reúnam-se! Vamos recuperar o chefe agora mesmo!!"
10032075-72 = "…Droga, foi mais rápido do que eu pensava."
10032075-73 = "Já garantimos uma rota de fuga, mas precisamos fazer algo para ganhar tempo."
10032075-75 = "Vou ajudar. Precisamos garantir a rota de retirada. #nTem algo que possamos usar aqui..."
10032075-80 = "…Opa, algo perfeito."
10032075-86 = "Com uma lixeira desse tamanho... e ainda por cima de ferro."
10032075-87 = "…Hmm, o peso também é ideal."
10032075-89 = "…?"
10032075-90 = "Hã..."
10032075-91 = "............Ah."
10032075-92 = "............！？！？"
10032075-93 = "[s3] \"O que houve, Haruka?\"\n[s4] \"Você está com uma cara péssima...\""
10032075-96 = "N-não! É que, aquilo é...!"
10032075-97 = "[s5] \"Aquilo...?\"\n[s6] \"O que é aquilo...?\""
10032075-100 = "A-ah, aquela..."
10032075-101 = "Aquela lixeira é...!!"
10032075-107 = "......Droga! Não vou deixar que façam o que quiserem."
10032075-113 = "Parece que eles finalmente estão falando sério para recuperar o chefe.#nSe continuarmos assim, vamos ficar sem recursos."
10032075-114 = "V-vamos, temos que fugir logo!"
10032075-115 = "M-mas, por favor...! Aquela lixeira é...!"
10032075-116 = "......Haruka, o que houve?"
10032075-117 = "Que lixeira...?"
10032075-118 = "É que... a-agora pouco..."
10032075-119 = "Eu coloquei todas as bombas que recolhemos... dentro dela..."
10032075-120 = "E-eu coloquei..."
10032075-121 = "Bem, então... o conteúdo daquela lixeira deve ser composto inteiramente por bombas..."
10032075-122 = "......O conteúdo da lixeira?"
10032075-123 = "......Bombas?"
10032075-129 = "Não são as bombas que recolhemos dentro da casa de ópera?#nA Haruka-chan disse que jogou todas as bombas na lixeira, lembra?"
10032075-133 = "......Entendi."
10032075-134 = "Lembrei! Aquelas bombas!"
10032075-135 = "......Espere."
10032075-136 = "Então quer dizer que agora eles estão usando esses explosivos como escudo?"
10032075-138 = "......Hm? Do que vocês estão falando?"
10032075-145 = "Ah, o projétil..."
10032075-147 = "Está vindo para cá!!"
10032075-151 = "[ns] \"......Ah.\""
10032075-156 = "[ns] \"Acabar desse jeito...\""
