[translation]
10032075-7 = "ひ、ひとまず何とかなったのかしら……？"
10032075-8 = "みたいだね。でも、ここが見つかるのも時間の問題だと思うけど……"
10032075-9 = "あれ、ここは……"
10032075-10 = "どうしたの、ハルカ？"
10032075-11 = "い、いえ！何でもありません！！"
10032075-13 = "これで一安心か……"
10032075-14 = "……先生には、頭が上がらないな。"
10032075-15 = "それと……"
10032075-16 = "便利屋68にも……"
10032075-18 = "ふふっ、気にする必要は無いわ。私たちはただ、利益を考えて動いただけよ。"
10032075-19 = "何も、あなたのために動いたわけじゃない。"
10032075-21 = "……そうか。"
10032075-22 = "だが私からすれば、恩を受けたことには変わりない。"
10032075-23 = "お前たちが居なかったら、あのまま奴らに利用するだけされて捨てられていた。"
10032075-24 = "代わりと言ってはアレだが……"
10032075-30 = "これって……"
10032075-32 = "お礼だ。もはや、私の依頼は失敗したも同然だからな。"
10032075-33 = "受けた恩は返す。それがこの世界のルールだと聞いた。"
10032075-34 = "……ふっ。"
10032075-35 = "そう言っていたのは、お前たちだろう。"
10032075-36 = "……っ。"
10032075-37 = "へぇ～私たちって信頼されてるんだ？"
10032075-38 = "で、でも、こんなあっさり譲られて、いいのかしら……？"
10032075-39 = "まぁまぁ、別にいいじゃん～"
10032075-40 = "ターゲットも確保したわけだし～"
10032075-41 = "これで……"
10032075-42 = "依頼完了だよね？"
10032075-44 = "……まあ、そうなるね。"
10032075-46 = "本当に依頼完了ですか……！？"
10032075-47 = "さ、さすがアル様です！最初からこれを狙っていたんですね……！？"
10032075-51 = "……へ？"
10032075-52 = "あ、うぇっ……？"
10032075-54 = "……！"
10032075-55 = "これが真のアウトロー……！"
10032075-56 = "まさか、そういう理由で私を……"
10032075-57 = "素晴らしい、感心したぞ。"
10032075-58 = "[s1] \"何だかんだ丸く収まったし……\"\n[s2] \"結果オーライってことで……\""
10032075-61 = "ふ、ふふ……ええ、こうなることを見越していたのよ。"
10032075-62 = "それじゃ、短い間だったけど同盟もおしまいね。"
10032075-63 = "お互い、後腐れなく別れま……"
10032075-64 = "見つけたぞ！こっちだ！！"
10032075-69 = "こいつら！よくも逃げやがったな！！"
10032075-70 = "おい！集まれ！今度こそボスを取り戻すぞ！！"
10032075-72 = "……っ、思ったより早かったか。"
10032075-73 = "逃げ道は確保してるけど、何か手を打って時間を稼がないと。"
10032075-75 = "協力しよう。退路を確保する必要があるな。#n何か使えそうな物は……"
10032075-80 = "……おっと、ちょうどいい物が。"
10032075-86 = "これだけ大きなゴミ箱があれば……それも鉄製か。"
10032075-87 = "……ふむ、重量も申し分ないな。"
10032075-89 = "……？"
10032075-90 = "あれ……"
10032075-91 = "…………あっ。"
10032075-92 = "…………！？！？"
10032075-93 = "[s3] \"どうしたの、ハルカ。\"\n[s4] \"顔色がすごく悪いけど……\""
10032075-96 = "い、いえ！その、あれは……！"
10032075-97 = "[s5] \"あれ……？\"\n[s6] \"あれって何……？\""
10032075-100 = "あ、あの……"
10032075-101 = "あのゴミ箱は……！！"
10032075-107 = "……くっ！好き勝手させるか。"
10032075-113 = "ボスを取り返すために、いよいよ本気を出してきたみたい。#nこのままじゃジリ貧だね。"
10032075-114 = "さ、さあ、早く逃げるわよ！"
10032075-115 = "で、ですから……！あのゴミ箱は……！"
10032075-116 = "……ハルカ、どうかしたの？"
10032075-117 = "あのゴミ箱って……？"
10032075-118 = "その……さ、さっき……"
10032075-119 = "回収した爆弾を……全部あの中に……"
10032075-120 = "い、入れました……"
10032075-121 = "えっと、なので……あのゴミ箱の中身は、全部爆弾のはずです……"
10032075-122 = "……ゴミ箱の中身？"
10032075-123 = "……爆弾？"
10032075-129 = "オペラハウスの中で回収した爆弾のことじゃない？#n爆弾は全部ゴミ箱に捨てたって、ハルカちゃんが言ってたよね？"
10032075-133 = "……なるほど。"
10032075-134 = "思い出したわ！あの爆弾ね！"
10032075-135 = "……待って。"
10032075-136 = "じゃあ今、その危険物を盾にしてるってこと？"
10032075-138 = "……ん？何の話だ？"
10032075-145 = "あ、榴弾が……"
10032075-147 = "こっち飛んでくるよ！！"
10032075-151 = "[ns] \"……あっ。\""
10032075-156 = "[ns] \"結局こうなるなんて……\""
