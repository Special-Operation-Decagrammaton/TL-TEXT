[translation]
10021020-3 = "Sensei. Eu darei suporte com o poder de fogo do canhão principal de Utnapishtim."
10021020-4 = "O alvo é Phrenapates.#nNo entanto, levará algum tempo desde a trava de mira até o disparo."
10021020-5 = "Até lá... por favor, aguente firme."
10021020-6 = "Prevejo que a 'Arca' será reduzida a pó pelo ataque do canhão principal!#nApós o ataque, evacue todos os alunos imediatamente!"
10021020-10 = "..."
10021020-11 = "...Muito bem, lá vamos nós!"
