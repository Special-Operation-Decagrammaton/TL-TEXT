[translation]
1301105-1 = "ももいろメモリアル"
1301105-2 = "（モモイとの約束の場所に着いた）"
1301105-3 = "ピピーッ！先生、5分遅刻！「好感度が下がりました」！"
1301105-4 = "[s1] \"ごめんね、ちょっと道が混んでて……。\"\n[s2] \"好感度……？\""
1301105-5 = "ゲームにおいて言い訳は効かないんだからね！それと、さっきモモトークで話した通り、"
1301105-6 = "ゲームにおいて言い訳は効かないんだからね！それと、さっきモモトークで話した通り、"
1301105-7 = "今日は一緒に、レトロな「恋愛シミュレーション」を体験するよ！あ、もう始まってるから！"
1301105-8 = "[s] \"レトロな恋愛シミュレーション？\""
1301105-9 = "実はゲーム開発部で、もっと色んなジャンルのレトロゲームを研究して、"
1301105-10 = "今度、幾つかのゲームを試しに作ってみようって話が出てね。"
1301105-11 = "その中に、恋愛シミュレーションゲームの話もあったの。"
1301105-12 = "[s] \"なるほど。\""
1301105-13 = "そう、それでね、"
1301105-14 = "恋愛シミュレーション、それに恋愛アドベンチャーゲームって、ゲームの中でもシナリオの比重が大きいゲームでしょ？"
1301105-15 = "ほら、特定のイベントで選択肢を選んだり、行く場所やタイミングによって、"
1301105-16 = "好感度が変化して、エンディングに影響を与えたりするし。"
1301105-17 = "[s] \"なるほど、じゃあさっきの「好感度」っていうのは……。\""
1301105-18 = "そういうこと！で、先生への今の好感度は－5！"
1301105-19 = "このままだとマズいよ？"
1301105-20 = "正しい選択肢を選んでいかないとスチルも開けられないし、ハッピーエンドにもたどり着けないんだから！"
1301105-21 = "さあ、先生！"
1301105-22 = "良いゲームを作るために、恋愛シミュレーションを始めよう！"
1301105-23 = "[s] \"うん、じゃあ喜んで。\""
1301105-24 = "えへへっ、それじゃあレッツゴー！"
1301105-28 = "[ns] \"ゲームセンター？\""
1301105-29 = "うん、そう！"
1301105-30 = "それじゃあ、最初の選択肢だよ！"
1301105-31 = "あなたはヒロインと一緒にゲームセンターに来ました。"
1301105-32 = "まずは何をしますか？"
1301105-33 = "[ns3] \"クレーンゲームでもする？\"\n[ns4] \"ここは『ワンダーガール モンスターワールド』でしょ！\""
1301105-35 = "ブブーッ！好感度－5！"
1301105-36 = "ヒロインはクレーンゲームにあまり興味がありませんでした！"
1301105-37 = "[s5] \"でも、モモイにプレゼントをあげたくて……。\""
1301105-38 = "えっ……あ、そうなの？"
1301105-39 = "せ、先生がそこまで言うなら……。"
1301105-40 = "まあ、良いかな……？"
1301105-41 = "じゃあその気持ちを汲んで、好感度＋10にしてあげるね！"
1301105-42 = "[s6] \"結構ざっくりなんだね……。\""
1301105-43 = "細かいことはいいの、ほらゴーゴー！"
1301105-44 = "わっ！心が通じた！！"
1301105-45 = "先生への好感度＋500だよ！"
1301105-46 = "[s7] \"そんなに一気に上げて良いの！？\""
1301105-47 = "うん、ちょうどワンダーガールのワンコインクリアにチャレンジしてみたかったし！"
1301105-48 = "[s8] \"じゃあどっちが先にクリアできるか勝負だね！\""
1301105-49 = "あははっ！その挑戦、受けて立つよ！"
1301105-51 = "いざ尋常に勝負！"
1301105-54 = "ふー、ゲームセンターでたくさん遊んだらお腹空いたなぁ……。"
1301105-57 = "（チラッ、チラッ）"
1301105-58 = "[s] \"じゃあ、次はお昼食べに行こうか？\""
1301105-59 = "うん、正解！"
1301105-60 = "さて、今ヒロインはお腹ペコペコです！"
1301105-61 = "どんな料理を食べますか？"
1301105-62 = "[s9] \"デートの定番と言えばパスタかな？\"\n[s10] \"あっ、モモイ見て。『ゼルナの伝説』のコラボだって。\""
1301105-63 = "で、デートの定番……！"
1301105-64 = "[s11] \"どうしたの？もしかして、パスタ苦手？\""
1301105-65 = "な、なんでもない！大丈夫っ！"
1301105-66 = "良いね、定番は良いことだよ、うん！良い選択だね！"
1301105-67 = "好感度＋150にしてあげる！行こ！"
1301105-68 = "[s12] \"えっと、このカップルメニューを30分で食べきれば……\""
1301105-69 = "……全部、タダ？"
1301105-70 = "これは、ゲーマーとして挑戦するしかないよ先生！"
1301105-71 = "[s13] \"え、ゲーマーとして？\""
1301105-72 = "チャレンジだもん！挑戦だよ、クエストだよ！"
1301105-73 = "え、嘘！？本当だ！"
1301105-74 = "特製激辛カレーを食べきれたら、『ゼルナの伝説』に出てくる「マスターブレイド」の風船を景品としてプレゼント……。"
1301105-75 = "行こう、先生！"
1301105-76 = "[s14] \"えっと、選択肢は正解だったの？\""
1301105-77 = "うん！好感度＋1億！だから早く！"
1301105-78 = "あ、「在庫に限りがあります」って書いてある……！"
1301105-79 = "無くなる前に早く行かないと！"
1301105-80 = "[s15] \"その好感度システム、バグってない？\""
1301105-81 = "いいから早く！これは挑戦だよ！私たちに対しての挑戦！"
1301105-82 = "これもゲームの一環、絶対にクリアしなきゃ！"
1301105-85 = "（モモイと一緒にそのメニューに挑戦することになった）"
1301105-89 = "はふっ、はむっ！もぐもぐ……ごくん！美味しい！"
1301105-90 = "[s] \"確かに美味しいけど、モモイ、これ以上は……。\""
1301105-91 = "ダメ！頑張って先生！ゴールは目の前だよ！"
1301105-92 = "[s] \"モモイ、私ね、この食事が終わったら故郷に帰って……\""
1301105-93 = "先生ストップ！"
1301105-94 = "そのフラグだけは絶対ダメ！！"
1301105-96 = "（何とかモモイと二人で食べきることができた）"
1301105-98 = "んんーっ、今日はたくさん歩き回ったね～。"
1301105-99 = "先生と一緒で、一日中楽しかった！"
1301105-100 = "[s] \"それは良かった。ところで、エンディングは？\""
1301105-101 = "……エンディング？何の話？"
1301105-102 = "[s] \"確か好感度によってエンディングが変わるんだよね？\""
1301105-103 = "……あっ、そうだ！そうだった！"
1301105-104 = "夢中になって、すっかり忘れてた……。"
1301105-105 = "今日の最終的な先生への好感度は、えーっと……。"
1301105-106 = "は、ハッピーエンドってことで！パチパチパチ、おめでとう！"
1301105-107 = "良かったね先生！ヒロインの攻略に成功したよ！"
1301105-108 = "[s] \"……モモイ？\""
1301105-109 = "あ、あはっ、あははっ……。"
1301105-110 = "[s] \"まあでも、モモイが楽しかったのなら良かった。\""
1301105-111 = "えっ、急に何その大人の対応！？"
1301105-112 = "ごくり、こ、これが上級者……？"
1301105-113 = "[s16] \"そういえば好感度って言ってたけど、\"\n[s17] \"あれってモモイの気持ちで動くんだよね？\""
1301105-114 = "え、うん。"
1301105-115 = "え、うん。"
1301105-116 = "[s] \"じゃあ、「ヒロインの攻略に成功した」ってことは……。\""
1301105-118 = "（あっ、えっ！？た、確かによく考えてみたら、そういうことかも……！？）"
1301105-119 = "ご、ごめん先生、急用を思い出しちゃった！じゃあまたっ！"
1301105-122 = "（引き留める間もなく、モモイは風のように去ってしまった）"
