[translation]
1301105-1 = "Memorial Cor-de-Rosa"
1301105-2 = "(Cheguei ao local combinado com a Momoi)"
1301105-3 = "Piiip! Sensei, 5 minutos de atraso! \"Sua afinidade diminuiu\"!"
1301105-4 = "[s1] \"Desculpe, o trânsito estava um pouco ruim...\"\n[s2] \"Afinidade...?\""
1301105-5 = "Desculpas não funcionam em jogos! E, como conversamos no MomoTalk mais cedo,"
1301105-6 = "Desculpas não funcionam em jogos! E, como conversamos no MomoTalk mais cedo,"
1301105-7 = "Hoje vamos experimentar um \"simulador de namoro\" retrô juntos! Ah, já começou!"
1301105-8 = "[s] \"Um simulador de namoro retrô?\""
1301105-9 = "Na verdade, o Clube de Desenvolvimento de Jogos está pesquisando vários gêneros de jogos retrô,"
1301105-10 = "e surgiu a ideia de tentarmos criar alguns jogos novos."
1301105-11 = "E entre eles, surgiu o assunto de um simulador de namoro."
1301105-12 = "[s] \"Entendo.\""
1301105-13 = "Isso, e então,"
1301105-14 = "Simuladores de namoro e jogos de aventura romântica são jogos onde o cenário tem um peso enorme, sabe?"
1301105-15 = "Tipo, dependendo das escolhas que você faz em eventos específicos, ou de onde você vai e quando,"
1301105-16 = "a afinidade muda e isso afeta o final do jogo."
1301105-17 = "[s] \"Entendi, então essa \"afinidade\" de agora a pouco...\""
1301105-18 = "Exatamente! E a sua afinidade com o Sensei agora é -5!"
1301105-19 = "Se continuar assim, vai dar ruim, viu?"
1301105-20 = "Se você não escolher as opções certas, não vai conseguir desbloquear as imagens nem chegar ao final feliz!"
1301105-21 = "Vamos lá, Sensei!"
1301105-22 = "Para criarmos um bom jogo, vamos começar o simulador de namoro!"
1301105-23 = "[s] \"Certo, então com prazer.\""
1301105-24 = "Hehehe, então vamos nessa!"
1301105-28 = "[ns] \"Um fliperama?\""
1301105-29 = "Isso mesmo!"
1301105-30 = "Então, aqui vai a primeira escolha!"
1301105-31 = "Você chegou ao fliperama com a heroína."
1301105-32 = "O que você vai fazer primeiro?"
1301105-33 = "[ns3] \"Quer tentar a máquina de garra?\"\n[ns4] \"Tem que ser 'Wonder Girl Monster World', né!\""
1301105-35 = "Errado! Afinidade -5!"
1301105-36 = "A heroína não estava muito interessada na máquina de garra!"
1301105-37 = "[s5] \"Mas eu queria te dar um presente, Momoi...\""
1301105-38 = "Ah... sério?"
1301105-39 = "B-bem, se o Sensei insiste tanto assim..."
1301105-40 = "Acho que tudo bem...?"
1301105-41 = "Então, considerando seus sentimentos, vou aumentar sua afinidade em +10!"
1301105-42 = "[s6] \"Você é bem flexível, hein...\""
1301105-43 = "Não se preocupe com detalhes, vamos lá!"
1301105-44 = "Uau! Nossos corações estão conectados!!"
1301105-45 = "Afinidade com o Sensei +500!"
1301105-46 = "[s7] \"Pode aumentar tudo isso de uma vez!?\""
1301105-47 = "Sim, e eu estava querendo tentar zerar Wonder Girl com uma ficha só mesmo!"
1301105-48 = "[s8] \"Então vamos ver quem zera primeiro!\""
1301105-49 = "Ahaha! Aceito o desafio!"
1301105-51 = "Que comece a disputa!"
1301105-54 = "Ufa, brincar tanto no fliperama me deu fome..."
1301105-57 = "(Olha de relance, olha de relance)"
1301105-58 = "[s] \"Então, vamos almoçar agora?\""
1301105-59 = "Isso, resposta certa!"
1301105-60 = "Muito bem, agora a heroína está com muita fome!"
1301105-61 = "Que tipo de prato vamos comer?"
1301105-62 = "[s9] \"Falando em encontro, acho que massa é o clássico, não é?\"\n[s10] \"Ah, olha só, Momoi. É uma colaboração com 'A Lenda de Zelna'."
1301105-63 = "E-então, o clássico dos encontros...!"
1301105-64 = "[s11] \"O que foi? Por acaso você não gosta de massa?\""
1301105-65 = "N-não é nada! Está tudo bem!"
1301105-66 = "É ótimo, clássicos são sempre bons, sim! É uma ótima escolha!"
1301105-67 = "Vou te dar +150 de afinidade! Vamos!"
1301105-68 = "[s12] \"Bem, se terminarmos este menu de casal em 30 minutos...\""
1301105-69 = "......Tudo de graça?"
1301105-70 = "Como uma gamer, não tenho escolha a não ser aceitar esse desafio, Sensei!"
1301105-71 = "[s13] \"Hã, como uma gamer?\""
1301105-72 = "É um desafio! É uma missão, uma quest!"
1301105-73 = "Sério? É verdade!"
1301105-74 = "Se terminarmos o curry super apimentado especial, ganhamos um balão da 'Master Blade' de 'A Lenda de Zelna' como prêmio..."
1301105-75 = "Vamos, Sensei!"
1301105-76 = "[s14] \"Bem, a escolha foi a correta?\""
1301105-77 = "Sim! +1 bilhão de afinidade! Então anda logo!"
1301105-78 = "Ah, está escrito que 'o estoque é limitado'...!"
1301105-79 = "Temos que ir rápido antes que acabe!"
1301105-80 = "[s15] \"Esse sistema de afinidade não está bugado?\""
1301105-81 = "Não importa, anda logo! Isso é um desafio! Um desafio para nós!"
1301105-82 = "Isso também faz parte do jogo, temos que zerar isso de qualquer jeito!"
1301105-85 = "(Decidimos encarar o menu junto com a Momoi)"
1301105-89 = "Hafu, ham! Nhac nhac... engolir! Que delícia!"
1301105-90 = "[s] \"É realmente gostoso, mas Momoi, não dá para comer mais que isso...\""
1301105-91 = "Não pode! Se esforce, Sensei! A linha de chegada está bem ali!"
1301105-92 = "[s] \"Momoi, sabe, quando terminarmos essa refeição, vou voltar para a minha terra natal...\""
1301105-93 = "Sensei, pare!"
1301105-94 = "Esse tipo de flag é proibido!!"
1301105-96 = "(De alguma forma, conseguimos terminar tudo juntos)"
1301105-98 = "Nnn~, hoje a gente andou bastante, né?"
1301105-99 = "Foi divertido passar o dia todo com você, Sensei!"
1301105-100 = "[s] \"Que bom. Mas e o final?\""
1301105-101 = "......Final? Do que você está falando?"
1301105-102 = "[s] \"Não era que o final mudava dependendo da afinidade?\""
1301105-103 = "......Ah, é verdade! Tinha isso!"
1301105-104 = "Eu fiquei tão empolgada que esqueci completamente..."
1301105-105 = "A afinidade final com o Sensei hoje é, hum..."
1301105-106 = "Vamos considerar que foi um final feliz! Palmas, palmas, parabéns!"
1301105-107 = "Muito bem, Sensei! Você conseguiu conquistar a heroína!"
1301105-108 = "[s] \"......Momoi?\""
1301105-109 = "Ah, ahaha, ahahaha..."
1301105-110 = "[s] \"Bom, de qualquer forma, fico feliz que você tenha se divertido, Momoi.\""
1301105-111 = "Hã? De onde veio essa resposta tão madura de repente!?"
1301105-112 = "Gulp, i-isso é nível avançado...?"
1301105-113 = "[s16] \"Falando nisso, você mencionou afinidade,\"\n[s17] \"isso não é algo que muda de acordo com os seus sentimentos, Momoi?\""
1301105-114 = "Hã, sim."
1301105-115 = "Hã, sim."
1301105-116 = "[s] \"Então, se 'consegui conquistar a heroína' significa que...\""
1301105-118 = "(Ah, hã!? B-bem, pensando bem, talvez seja isso mesmo...!?)"
1301105-119 = "D-desculpa, Sensei, acabei de lembrar de um compromisso urgente! Até mais!"
1301105-122 = "(Antes que eu pudesse impedi-la, Momoi partiu como o vento)"
