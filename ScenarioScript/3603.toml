[translation]
3603-1 = "Nostalgia estranha (3)"
3603-2 = "(Vruuum)"
3603-4 = "……."
3603-5 = "……."
3603-6 = "……."
3603-11 = "Nagi-chan, você está bem?"
3603-13 = "Eu estou... bem..."
3603-14 = "Graças a você, foi divertido... muito..."
3603-15 = "Não é muito convincente dizer isso com essa cara!?"
3603-16 = "Hmm..."
3603-17 = "Será que um parque de diversões teria sido melhor?..."
3603-18 = "……Ué?"
3603-22 = "É um parque."
3603-23 = "Ei, ei, Nagi-chan, olha só. Não traz lembranças?"
3603-24 = "Quando éramos pequenas, sempre vínhamos ao parque quando algo acontecia, né?"
3603-25 = "Parque..."
3603-29 = "É isso."
3603-33 = "(Iiiih!)"
3603-34 = "！?"
3603-35 = "Por que você freou de repente!?"
3603-36 = "Perdão. Senti um sono repentino."
3603-37 = "Não posso dirigir com sono. Deixe-me descansar um pouco no parque."
3603-38 = "……."
3603-39 = "Hmmmm...?"
3603-40 = "Entendido☆"
3603-41 = "……?"
3603-45 = "Este lugar não é idêntico ao parque de antigamente?"
3603-46 = "Exceto pelo fato de não ter ninguém e estar cheio de mato..."
3603-52 = "Vem, Nagi-chan! Por aqui!"
3603-53 = "Eu... vou ficar por aqui mesmo..."
3603-54 = "Nada disso☆"
3603-55 = "Ah..."
3603-64 = "(Nagisa foi puxada pela mão por Mika em direção ao parque)"
3603-67 = "……."
3603-69 = "(Onde será que dá para sentar...)"
3603-70 = "(Ah, o escorregador...)"
3603-75 = "Sss...!"
3603-76 = "Ai!?"
3603-78 = "Que quente...!"
3603-79 = "Ahaha! Nagi-chan, exatamente como eu pensei!"
3603-80 = "Não tem graça! O escorregador estava superaquecido e—"
3603-81 = "Eu quase me queimei!"
3603-85 = "Mas parece que você se animou um pouco, não é?"
3603-86 = "Ah... é... verdade."
3603-87 = "É verdade..."
3603-88 = "Que bom~"
3603-89 = "Eu fiquei realmente preocupada, sabe?#nVocê estava agindo como se fosse virar chá agora pouco..."
3603-90 = "Do que você está falando...?"
3603-91 = "Mas... é verdade.#nO parque sempre foi um lugar onde eu recuperava minhas energias."
3603-92 = "Quando o consumo é excessivo, a energia se esgota facilmente."
3603-93 = "Então... tome isto."
3603-98 = "……？"
3603-99 = "Isto é... um doce barato?"
3603-100 = "Comprei ali perto enquanto vocês duas estavam brincando."
3603-101 = "Você não colocou nada no estômago hoje além de chá, não é?"
3603-102 = "Ah... e-então... obrigada."
3603-108 = "……É doce demais."
3603-109 = "Por dentro e por fora. Tudo é doce."
3603-110 = "Este aqui é... salgado."
3603-114 = "Este tem um amargor forte demais, na minha opinião."
3603-115 = "Todos são simples e têm um sabor grosseiro."
3603-116 = "Mas... você deveria ter achado delicioso quando era criança."
3603-117 = "Não é?"
3603-118 = "……É verdade. Naquela época, eu achava que eram os melhores doces do mundo."
3603-120 = "Lembro-me bem daqueles tempos."
3603-121 = "Ah, a Nagi-chan daquela época era tão fofinha~"
3603-122 = "O-o que você está dizendo!?"
3603-124 = "O sabor do doce não mudou."
3603-125 = "Quem mudou foi você, Nagisa."
3603-126 = "Você se tornou elegante, delicada e passou a entender as nuances dos sabores."
3603-127 = "……？"
3603-128 = "Ou seja, coisas que eram boas no passado podem parecer comuns quando olhamos para trás, sabe?#nComo esses doces."
3603-129 = "Como esses doces."
3603-130 = "……。"
3603-131 = "Por outro lado, memórias dolorosas de agora podem se tornar boas lembranças no futuro."
3603-132 = "Tanto a Nagi-chan quanto nós.#nContinuaremos crescendo e mudando sempre."
3603-133 = "Isso significa que..."
3603-134 = "É um conselho do tipo 'faça o seu melhor porque um dia isso será uma boa lembrança'?"
3603-135 = "……É um comentário bem clichê."
3603-136 = "Ei, que dura!"
3603-137 = "Fufu...#nMesmo assim, a verdade costuma ser clichê."
3603-138 = "Por isso, acabamos esquecendo dela..."
3603-139 = "Portanto, isto também.#nBem... antes que eu me esqueça."
3603-141 = "Mika, Seia... obrigada."
3603-143 = "……。"
3603-144 = "Então, que tal a gente garantir que você não esqueça?#nSe continuarmos saindo para nos divertir assim de vez em quando, você vai lembrar!"
3603-148 = "Se não me engano, vocês têm uma praia particular na festa do chá, né?#nVamos lá na próxima!"
3603-149 = "……Fufu, é uma ótima ideia."
3603-150 = "Então, combinado!#n... Não se esqueça, viu?"
3603-151 = "Sim, claro.#nBem, acho que está na hora de voltarmos."
3603-152 = "Para a nossa Trinity."
3603-153 = "Temos folhas de chá da melhor qualidade e doces excessivamente açucarados.#nQuando voltarmos, vamos fazer uma festa do chá."
3603-161 = "Parece que deu certo, não é?"
3603-162 = "É."
3603-163 = "Só que..."
3603-164 = "Você quer dizer que é apenas um paliativo, certo?"
3603-165 = "……Ela começou a enxergar um pouco melhor o que está ao seu redor, não foi?"
3603-166 = "Não é como se isso fosse eliminar todo o estresse de uma vez."
3603-167 = "Além disso, há uma montanha de trabalho esperando por ela quando voltar."
3603-168 = "……Mas, não tem problema, né? Mesmo que seja apenas um paliativo."
3603-169 = "Quando a Nagi-chan estiver em apuros, basta nós a ajudarmos."
3603-170 = "Que tal... criar coragem e tirar um longo descanso desta vez? #nComo aquela praia particular que mencionei antes!"
3603-171 = "……。"
3603-172 = "É por isso que nos esforçamos todos os dias."
3603-173 = "Para dias como o de hoje."
3603-174 = "……。"
3603-175 = "O quê? Tem algo no meu rosto?"
3603-176 = "Não, é que hoje só fui surpreendido. #nQuem diria que chegaria o dia em que eu concordaria plenamente com as suas palavras."
3603-177 = "Isso é um elogio, né...!?"
3603-181 = "……Vou aquecer o motor primeiro. #nVolte logo, por favor."
3603-190 = "Nostalgia estranha"
