[translation]
3603-1 = "おかしなノスタルジー（３）"
3603-2 = "（ブウウーーン）"
3603-4 = "……。"
3603-5 = "……。"
3603-6 = "……。"
3603-11 = "ナギちゃん、大丈夫？"
3603-13 = "私は……大丈夫です……。"
3603-14 = "おかげさまで、楽しかったです……とても……。"
3603-15 = "そんな顔で言われても説得力ないんだけど！？"
3603-16 = "う～ん……。"
3603-17 = "遊園地とかの方が良かったのかなぁ……。"
3603-18 = "……あれ？"
3603-22 = "公園だ。"
3603-23 = "ねえねえナギちゃん、ほら見て。懐かしくない？"
3603-24 = "小さい頃、何かあった時はよく公園に行ったよね。"
3603-25 = "公園……。"
3603-29 = "それだ。"
3603-33 = "（キキーーッ！）"
3603-34 = "！？"
3603-35 = "急ブレーキなんてどうしたの！？"
3603-36 = "済まない。急に眠気を催してしまった。"
3603-37 = "居眠り運転をするわけにもいくまい。少し公園で休ませてくれ。"
3603-38 = "……。"
3603-39 = "ふぅ～ん……？"
3603-40 = "りょーかいっ☆"
3603-41 = "……？"
3603-45 = "ここ、昔の公園にそっくりじゃない？"
3603-46 = "人気がなくて、雑草だらけってところを除けば……だけど。"
3603-52 = "ほらナギちゃんも！こっち！"
3603-53 = "私は……このままで……。"
3603-54 = "だーめっ☆"
3603-55 = "えっ……。"
3603-64 = "（ナギサはミカに手を引かれるまま公園へと向かった）"
3603-67 = "……。"
3603-69 = "（どこか、座れる場所は……）"
3603-70 = "（あ、すべり台……）"
3603-75 = "ジュッ……！"
3603-76 = "きゃっ！？"
3603-78 = "熱っ……！"
3603-79 = "あははっ！ナギちゃん、思った通り！"
3603-80 = "笑い事ではありません！滑り台が熱せられていて――"
3603-81 = "火傷するところだったんですよ！"
3603-85 = "でも、ちょっと元気出たみたいだね？"
3603-86 = "えっ……？ああ……。"
3603-87 = "そう……ですね。"
3603-88 = "よかったぁ～"
3603-89 = "本当に心配したんだよ？#nさっきなんてお茶になろうとしてたし……。"
3603-90 = "何の話ですか……？"
3603-91 = "ですが……たしかに。#nいつも元気をもらう場所でしたね、公園は。"
3603-92 = "消費過多になれば、元気は容易に枯渇するものだ。"
3603-93 = "だから……これを。"
3603-98 = "……？"
3603-99 = "これは……駄菓子？"
3603-100 = "二人がじゃれ合っている間に、近くで買ってきたんだ。"
3603-101 = "今日はせいぜい紅茶くらいしか、胃にものを入れていないだろう？"
3603-102 = "あ……で、では……。"
3603-108 = "……甘すぎます。"
3603-109 = "中も、外も。全部甘いです。"
3603-110 = "こっちは……塩っ辛いです。"
3603-114 = "こちらは苦みが強すぎる印象が。"
3603-115 = "どれも単純で、粗末な味です。"
3603-116 = "だが……幼き時分には美味しく感じていたはず。"
3603-117 = "違うかい？"
3603-118 = "……そうですね。あの頃は最高のお菓子だと思っていました。  "
3603-120 = "昔のこと、思い出すなぁ。"
3603-121 = "あーあ、あの頃のナギちゃんは可愛かったのに～"
3603-122 = "なっ、何の話ですか！？"
3603-124 = "駄菓子の味は変わっていない。"
3603-125 = "変わったのは、ナギサだ。"
3603-126 = "優雅で、繊細で、味の機微が分かるようになった。"
3603-127 = "……？"
3603-128 = "つまり、昔は良かったことも、#n後で振り返ったら普通に思えたりするよね、ってこと。"
3603-129 = "この駄菓子みたいにね。"
3603-130 = "……。"
3603-131 = "逆に、今の辛い記憶が、未来には良い思い出になるかもしれない。"
3603-132 = "ナギちゃんも、私たちも。#nずっと成長し続けるし、変わっていくから。"
3603-133 = "それはつまり……。"
3603-134 = "「いつかは良い思い出になるから頑張れ」というアドバイスでしょうか？"
3603-135 = "……ありきたりな言葉ですね。"
3603-136 = "えー、きびしーなぁ。"
3603-137 = "ふふっ……。#nとはいえ、真実は往々にしてありきたりなものです。"
3603-138 = "だからついつい、忘れてしまうのですが……。"
3603-139 = "ですから、これも。#nその……忘れてしまう前に。"
3603-141 = "ミカさん、セイアさん……ありがとうございます。"
3603-143 = "……。"
3603-144 = "じゃあさ！忘れられないようにしたらいいんじゃない？#nこれからもたまに、こうやって遊びに行けば思い出せるよ！"
3603-148 = "たしか、ティーパーティーのプライベートビーチとかもあったよね？#n次はそこ行こっ！"
3603-149 = "……ふふっ、いいですね。"
3603-150 = "じゃっ、約束！#n……忘れないでよ？"
3603-151 = "ええ、もちろん。#nではそろそろ、帰りましょうか。"
3603-152 = "私たちの[ruby=家]トリニティ[/ruby]に。"
3603-153 = "最高級の茶葉に、やたらと甘いお菓子がありますから。#n戻ったら、お茶会にいたしましょう。"
3603-161 = "うまくいったみたいだね？"
3603-162 = "ああ。"
3603-163 = "ただ――"
3603-164 = "あくまで一時しのぎだ、って言いたいんでしょ？"
3603-165 = "……すこし、周りが見えるようになったじゃないか。"
3603-166 = "これだけで、きれいさっぱりストレスが無くなるわけないし。"
3603-167 = "それに、帰ったらまた仕事が山積みだもんね。"
3603-168 = "……でも、いいんじゃない？一時しのぎでも。"
3603-169 = "ナギちゃんが大変な時は、私たちが助けてあげればいいんだし。"
3603-170 = "今度は……思い切って長いお休みを取ってみたり？#nさっき言った、プライベートビーチとか！"
3603-171 = "……。"
3603-172 = "だから毎日を頑張るの。"
3603-173 = "今日みたいな日のために。"
3603-174 = "……。"
3603-175 = "なに？私の顔になにか付いてる？"
3603-176 = "いいや、今日は驚かされてばかりだな。#n君の言葉に、完全に同意できる日がくるとはね。"
3603-177 = "それ、褒めてるってことでいいんだよね……！？"
3603-181 = "……先にエンジンを温めておく。#n好きに戻ってきてくれ。"
3603-190 = "おかしなノスタルジー"
