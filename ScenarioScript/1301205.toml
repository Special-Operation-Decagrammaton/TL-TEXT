[translation]
1301205-1 = "ザ・シューター/二大標的？"
1301205-2 = "ヴァルキューレ警察学校・校内射撃場"
1301205-8 = "……どうしてこの距離で、こんなにも当たらないのでしょうか。"
1301205-9 = "今日も体調は悪くないですし、腕力もそれなりにある方なのですが……。"
1301205-10 = "引き金を引くと、なぜか銃弾があらぬ方向に……。"
1301205-11 = "[s] \"もしかして、銃が壊れてたり？\""
1301205-12 = "一応、銃の整備は毎朝きちんとやっているはずなのですが、うーん……。"
1301205-13 = "流石に本官でも、銃の不調にはすぐ気が付くはず……とは思いたいですね……。"
1301205-14 = "……ただ、銃器はものすごく繊細なものですし、何かを見落としている可能性は拭いきれません。"
1301205-15 = "では、一から調整したうえで、まずは至近距離からの射撃をやってみます！"
1301205-25 = "（数分後……）"
1301205-30 = "[ns] \"…………。\""
1301205-31 = "…………。"
1301205-32 = "や、やはり銃が壊れている気がしてきました！"
1301205-33 = "この至近距離で人質のターゲットの方にばかり、こんなに飛ぶわけがないですよね。あははは……！はははは……。"
1301205-34 = "[s] \"別の銃で、もう一度調整から始めようか。\""
1301205-35 = "はい、そうですね。"
1301205-37 = "では……んと、こうして……照尺を調整しまして……。"
1301205-47 = "（数分後……）"
1301205-52 = "[ns] \"…………。\""
1301205-53 = "…………。"
1301205-54 = "お、おかしいですね……正確に犯人の頭に照準を合わせたはずなのですが……どうして横に……。"
1301205-55 = "[s] \"一応聞くけど、こっちの方が本来のターゲットだよね？\""
1301205-56 = "そ、そうです！本官もそのつもりでやっていました！"
1301205-57 = "ま、まさか、本官がわざと人質役のターゲットに当てるわけがないではありませんか！？"
1301205-58 = "ヴァルキューレ警察学校の生徒として、わざと市民に害を与えるなんてこと……！"
1301205-59 = "ま、まあ、この結果を見てしまうと何も言えないのですが……。"
1301205-60 = "と、とにかく！これも銃がおかしいと考えるしか……！？"
1301205-61 = "[s] \"……キリノ、ちょっと提案なんだけど。\""
1301205-62 = "は、はい。"
1301205-63 = "[s] \"……最初から人質に照準を合わせて撃ったら、どうなるの？\""
1301205-65 = "え……人質の方に？"
1301205-66 = "い、いくら訓練とはいえ、善良な市民を想定したターゲットに銃口を向けるなんて……！？"
1301205-67 = "ヴァルキューレ警察学校の誇りにかけて、そんなことはできません……！"
1301205-68 = "[s] \"でも、どっちにせよ人質役に当たってるし、試しに一回……。\""
1301205-69 = "そ、それはそうですが……うぅ……。"
1301205-71 = "……人質の方、ごめんなさい！"
1301205-82 = "[ns] \"…………。\""
1301205-83 = "…………。"
1301205-84 = "[s] \"じゃあこれからは、人質の方を狙おっか。\""
1301205-85 = "そ、そういうわけにはいきません！人質に銃を向ける警察学校の生徒だなんて……！"
1301205-86 = "こ、これは何かの間違いです！逆にこんな正確に当たるなんて、絶対おかしいですし……！"
1301205-87 = "今度こそ、きちんと犯人役を狙って当ててみせます！"
1301205-89 = "その後、キリノは何度も試してみたものの、犯人を狙うと何故かすべて人質の方に当たってしまうのだった……。"
1301205-90 = "うぅ……どうして、どうして本官は……。"
1301205-91 = "その後、抜き打ちの射撃試験があったらしく、キリノはやむを得ず人質を狙うことで試験を突破したらしい……。"
