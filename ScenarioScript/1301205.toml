[translation]
1301205-1 = "O Atirador / Dois Alvos Principais?"
1301205-2 = "Academia de Polícia Valkyrie - Estande de Tiro Interno"
1301205-8 = "……Por que eu não consigo acertar nada a essa distância?"
1301205-9 = "Minha condição física está ótima hoje, e eu tenho uma força razoável, então……"
1301205-10 = "Mas, quando puxo o gatilho, por algum motivo, a bala vai para uma direção totalmente errada……"
1301205-11 = "[s] \"Será que a arma está com defeito?\""
1301205-12 = "Eu deveria estar fazendo a manutenção da arma todas as manhãs, mas, hum……"
1301205-13 = "Eu gostaria de acreditar que, como oficial, eu notaria imediatamente se a arma estivesse com problemas……"
1301205-14 = "……Mas armas de fogo são extremamente delicadas, então não posso descartar a possibilidade de ter deixado passar algo."
1301205-15 = "Bem, vou ajustar tudo do zero e tentar atirar de uma distância bem curta primeiro!"
1301205-25 = "(Alguns minutos depois……)"
1301205-30 = "[ns] \"…………。\""
1301205-31 = "…………。"
1301205-32 = "A-acho que a arma está mesmo com defeito!"
1301205-33 = "Não tem como os tiros irem parar direto no alvo do refém a essa distância, né? Ahahaha……! Hahaha……"
1301205-34 = "[s] \"Quer tentar de novo com outra arma, começando pelos ajustes?\""
1301205-35 = "Sim, boa ideia."
1301205-37 = "Então…… vejamos, assim…… ajustando a mira……"
1301205-47 = "(Alguns minutos depois……)"
1301205-52 = "[ns] \"…………。\""
1301205-53 = "…………。"
1301205-54 = "I-isso é estranho…… eu mirei exatamente na cabeça do criminoso…… por que foi parar do lado……"
1301205-55 = "[s] \"Só por curiosidade, este aqui é o alvo original, certo?\""
1301205-56 = "S-sim! Era essa a minha intenção!"
1301205-57 = "V-você não acha que eu acertaria o alvo do refém de propósito, acha!?"
1301205-58 = "Como aluna da Academia de Polícia Valkyrie, eu jamais causaria dano a um cidadão de propósito……!"
1301205-59 = "B-bem, vendo esse resultado, não tenho como negar……"
1301205-60 = "D-de qualquer forma! Só posso concluir que há algo errado com a arma……!?"
1301205-61 = "[s] \"……Kirino, tenho uma sugestão.\""
1301205-62 = "S-sim."
1301205-63 = "[s] \"……O que acontece se você mirar direto no refém desde o começo?\""
1301205-65 = "Eh…… no refém?"
1301205-66 = "M-mesmo sendo um treinamento, apontar uma arma para um alvo que representa um cidadão inocente……!?"
1301205-67 = "Pelo orgulho da Academia de Polícia Valkyrie, eu não posso fazer isso……!"
1301205-68 = "[s] \"Mas, de qualquer jeito, você está acertando o refém, então vamos tentar uma vez……\""
1301205-69 = "B-bem, é verdade, mas…… ugh……"
1301205-71 = "……Desculpe, refém!"
1301205-82 = "[ns] \"…………。\""
1301205-83 = "…………。"
1301205-84 = "[s] \"Então, de agora em diante, mire no refém.\""
1301205-85 = "N-não posso fazer isso! Uma aluna da academia de polícia apontando uma arma para um refém……!"
1301205-86 = "I-isso é um erro! É impossível que eu acerte com tanta precisão, isso é muito estranho……!"
1301205-87 = "Desta vez, vou mirar corretamente no criminoso e acertar!"
1301205-89 = "Depois disso, Kirino tentou várias vezes, mas, por algum motivo, sempre que ela mirava no criminoso, acertava o refém……"
1301205-90 = "Ugh…… por que, por que eu sou assim……"
1301205-91 = "Dizem que, logo depois, houve um teste de tiro surpresa, e Kirino conseguiu passar no teste mirando no refém por necessidade……"
