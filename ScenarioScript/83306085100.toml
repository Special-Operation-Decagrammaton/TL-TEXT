[translation]
83306085100-6 = "Pare, Sorasaki Hina."
83306085100-7 = "……O que foi?"
83306085100-8 = "O que foi? Você quer dizer que não sabe da tragédia que está acontecendo na tenda do Pandemonium?"
83306085100-9 = "……Ah, meu Deus."
83306085100-10 = "Fazer essa cara de quem está incomodada... não lhe falta consciência como Presidente do Comitê de Disciplina?!"
83306085100-11 = "O "Caso do Desaparecimento do Pudim" aconteceu...!"
83306085100-12 = "O pudim... desapareceu?"
83306085100-13 = "Sim! O "Mistério do Desaparecimento em Massa do Pudim"!"
83306085100-14 = "……O nome está diferente de um segundo atrás."
83306085100-15 = "O pudim que o pessoal do Pandemonium ia comer de sobremesa sumiu."
83306085100-16 = "Com certeza... o culpado quer ver a nossa tristeza por não termos conseguido comer o pudim..."
83306085100-17 = "E com certeza cometeu esse crime com o motivo terrível de querer ver a Ibuki, que ama pudim acima de tudo, chorando!"
83306085100-18 = "Para garantir que um crime tão sem precedentes neste mundo nunca mais aconteça, vocês do Comitê de Disciplina devem agir agora mesmo!"
83306085100-19 = "……Se é que isso é realmente um caso."
83306085100-20 = "Haa... de qualquer forma, vou dar uma olhada por perto."
