[translation]
83306085100-6 = "止まれ、[ruby=そらさき]空崎[/ruby]ヒナ。"
83306085100-7 = "……なに？"
83306085100-8 = "なんだ？万魔殿のテントで起こっている悲劇を知らないというのか？"
83306085100-9 = "……はあ。"
83306085100-10 = "そんな面倒そうな表情をするとは、風紀委員長としての自覚が足りないんじゃないのか！"
83306085100-11 = "「プリン失踪事件」が発生したというのに……！"
83306085100-12 = "プリンが、失踪……？"
83306085100-13 = "ああ！「プリン大規模失踪ミステリー」だ！"
83306085100-14 = "……さっきまでと名前が違うけど。"
83306085100-15 = "デザートとして万魔殿のみんなで食べる予定だったプリンが消えてしまった。"
83306085100-16 = "きっと……犯人は我々がプリンを食べ損ねて悲しんでいる様子を……"
83306085100-17 = "それも、プリンが特に大好きなイブキの泣く表情を見たいという恐ろしい動機で罪を起こしたに違いない！"
83306085100-18 = "この世で他に類を見ない大犯罪を金輪際発生させないためにも、お前たち風紀委員会は今すぐ動くべきだ！"
83306085100-19 = "……本当に事件だったらね。"
83306085100-20 = "はぁ……とりあえず近くを調べてみる。"
