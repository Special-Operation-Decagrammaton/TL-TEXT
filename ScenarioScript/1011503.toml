[translation]
1011503-1 = "コントロールの特訓"
1011503-3 = "というわけで！次はピッチングの練習をやります！"
1011503-4 = "[ns1] \"あれ？\"\n[ns2] \"レイはピッチャーもやるんだっけ\""
1011503-7 = "いえ。私はバッター専業ですよ。"
1011503-8 = "たしかに、極稀に「二刀流」と呼ばれる……"
1011503-9 = "つまり、ピッチャーとバッターの両方をこなす選手もいますが。"
1011503-10 = "私はまだそんなレベルじゃないですし……。"
1011503-11 = "でも、いつかはそうなりたいって思ってます！"
1011503-12 = "私の場合、まずはバッティングの上達からかなって。"
1011503-13 = "バッティングが上手くなるためには、ピッチングの練習をして、#nピッチャー目線でバッターを見るのも大事だと思ったんです。"
1011503-14 = "ピッチャーの気持ちを理解して、次に来る球を予測できるようになれば、#nもっと的確にスイングできるはずですから！"
1011503-15 = "球のコースを予測して、狙って撃てば……。"
1011503-16 = "そうすれば打率が上がって、飛距離も伸びて……最終的には……！"
1011503-17 = "ホームランだって打てるようになると思いませんか！？"
1011503-18 = "[s] \"そうかもしれない！\""
1011503-19 = "ですよね！？"
1011503-20 = "ということで、今日はピッチング練習を頑張ります！"
1011503-22 = "（そう言ってレイは意気揚々とマウンドに向かったが……）"
1011503-28 = "<デッドボール！>"
1011503-29 = "力入りすぎたかな……？"
1011503-30 = "次こそは！"
1011503-35 = "<ボール……フォアボール！>"
1011503-36 = "えっ、真ん中を狙ったのに！？"
1011503-41 = "……いや、冷静になれ、私！ピッチャーに大事なのは落ち着き……！"
1011503-48 = "<ホームラン！>"
1011503-49 = "私だってまだ打ったことないのに！？"
1011503-50 = "球が甘かった……？次は慎重に……。"
1011503-58 = "<デッドボール！……エラー。バッターロボットの左腕が破損しました>"
1011503-59 = "うっ……！"
1011503-64 = "<デッドボール！……エラー。バッターロボットの腹部が破損しました>"
1011503-65 = "今度こそ……っ！"
1011503-69 = "<デッドボール！……エラー。バッターロボットの頭部が破損。メインカメラが損傷しました>"
1011503-78 = "<……エラー。使用可能なバッターロボットが見つかりません。#n使用可能なバッターロボットを準備してください>"
1011503-79 = "ぐぬぬ……。"
1011503-84 = "どうしてうまくいかないんでしょうか……。"
1011503-85 = "[ns] \"誰だって最初は失敗するものだよ\""
1011503-86 = "ううっ。先生……。"
1011503-87 = "何か、良い練習方法はありませんか……？"
1011503-88 = "私はどうすれば……。"
1011503-89 = "[ns] \"うーん……ピッチャーに必要なものって何だと思う？\""
1011503-90 = "コントロール……だと思っています。"
1011503-91 = "「ストライクを投げろ。ホームプレートの位置は変わらない」って言われるほどですから。"
1011503-92 = "まずストレートで制球力を磨いてから、カーブの練習をすると良いとも聞きますし。"
1011503-93 = "[s3] \"コントロールか……。\"\n[s4] \"よし、また特訓をしよう！\""
1011503-96 = "ぜひお願いします！……って、先生、どちらへ？"
1011503-97 = "え、練習場でやるんじゃないんですか？"
1011503-101 = "また！"
1011503-102 = "またゲームセンターじゃないですか！今日はコントロールの特訓をするのでは？"
1011503-103 = "えっ？前とは違うゲームを使うんですか？"
1011503-108 = "ダーツ、ですか。やってみるのは初めてですね。"
1011503-109 = "ダーツを投げて、的に当てて得点を競うルール……なるほど。"
1011503-110 = "集中力やコントロールを鍛えるには良さそうな感じがします。やってみます！"
1011503-112 = "えいっ！"
1011503-113 = "ブル！950点！"
1011503-114 = "あと……一投……！"
1011503-116 = "見ろよ！あの子、真ん中に5回連続で当ててるぞ！"
1011503-117 = "最後もハットトリックで締めるのか……？"
1011503-118 = "ふぅ……。"
1011503-119 = "それっ！"
1011503-123 = "ブル！1000点！おめでとうございます！本日の最高スコアです！"
1011503-127 = "[ns5] \"すごいよ、レイ！\"\n[ns6] \"コントロールの才能あるんじゃない？\""
1011503-130 = "……。"
1011503-131 = "いいえ、これじゃダメです！"
1011503-132 = "[s] \"え？どうして？\""
1011503-133 = "ダーツは、野球ボールに比べて軽すぎます！"
1011503-135 = "ピッチャーとしてのコントロールを鍛えるには、必要な条件があるんです。"
1011503-136 = "少し投げにくくて、適度な重さを持っているもの……。"
1011503-137 = "！"
1011503-138 = "先生、分かりました！"
1011503-139 = "[s] \"その心は？\""
1011503-140 = "それは……フリスビーです！"
1011503-141 = "[s] \"えっ……？\""
1011503-144 = "大きな弧を描いて戻ってくるように投げますね！"
1011503-148 = "[ns] \"それはフリスビーじゃなくてブーメラン！\""
1011503-151 = "コントロールさえあればできます！"
1011503-153 = "今度は……まっすぐ飛んだ後、急に跳ね上がる感じで投げます！"
1011503-157 = "[ns] \"変なところに飛んで行ったら危ないんじゃ……\""
1011503-159 = "これも大丈夫です、コントロールさえあればできます！"
1011503-168 = "さあ、次は先生の番です。"
1011503-169 = "えっ、なにを驚いているんですか。先生も投げるんですよ。"
1011503-170 = "飛んでくるフリスビーをキャッチするのは、野手の練習にもなりますから。"
1011503-171 = "（レイに押されて、フリスビーを投げてみた）"
1011503-175 = "あっ、風に流されて変なほうに……でも大丈夫です！ヘッドスライディングなら……！"
1011503-179 = "届けえぇっ――！！"
1011503-183 = "やった！捕れました！でも、これじゃまだまだ足りません……次はもっと高く投げてください！"
1011503-184 = "[s] \"頭の上を越えちゃうんじゃない？\""
1011503-185 = "フライは頭の上を越えていくものです。"
1011503-190 = "お願いします！"
1011503-194 = "……ほっ！"
1011503-195 = "ジャンプすれば意外と届きますね……"
1011503-196 = "……じゃあ、今度は思いっきり遠くに！"
1011503-197 = "[s] \"今度こそ、捕れないかも知れないよ……？\""
1011503-198 = "ヒットは自分の思い通りになんて飛んでくれません！"
1011503-202 = "バッチコーイ！"
1011503-206 = "あれ見て。シャーレの先生じゃない？"
1011503-207 = "フリスビー投げて拾わせたり、わざと遠くに投げたり……犬みたいな扱い……。"
1011503-208 = "先生って色々噂はあるけど、まさか生徒にこんなことまでしてるとはね……。"
1011503-212 = "[ns] \"また、私の評判が……\""
1011503-214 = "何か言いました？早く次、投げて下さーい！"
