[translation]
31140-1 = "Episódio 14: Vice-Presidente do Comitê de Execução da Justiça (1)"
31140-2 = "Depois disso, o estudo continuou até bem tarde da noite."
31140-3 = "Koharu, uma pergunta."
31140-4 = "U-uh？ Eu？ Eu mesmo！？"
31140-5 = "Isso, pra você. A gente tá estudando a mesma coisa agora. Esse problema aqui…"
31140-6 = "U-uhm……"
31140-7 = "……Ah, esse eu sei！"
31140-8 = "É assim, você traça uma linha em 90 graus com a de baixo e…"
31140-9 = "Aí esses dois triângulos ficam iguais. Entendeu？"
31140-10 = "……Entendi, então é assim."
31140-11 = "Obrigada. Realmente, faz sentido você ser uma elite do Comitê de Execução da Justiça."
31140-12 = "……！？"
31140-13 = "I-isso mesmo！ Sou elite！！"
31140-14 = "……S-se você não entender alguma coisa, pode me perguntar. Azusa, você especialmente."
31140-15 = "Obrigada, vai ajudar bastante."
31140-19 = "Ara ara……"
31140-20 = "Como esperado de quem já tomou banho peladinha juntas… já estão bem íntimas, né……♡"
31140-21 = "Ei, o que você tá falando！？ Não é nada disso！？"
31140-22 = "Hm？ Hanako também quer que eu lave seu corpo？"
31140-23 = "A-ah, uuu……"
31140-27 = "Ah, Koharu. Mais uma pergunta."
31140-29 = "Hm？ Esse problema é… uhm……"
31140-30 = "Koharu também não sabe esse？"
31140-31 = "Uuuuuum, esse eu acho que vi no livro de referência…"
31140-32 = "Espera um pouco."
31140-33 = "Eu tinha trazido…"
31140-37 = "Nnh."
31140-44 = "Tá nesse livro de referência？"
31140-45 = "Sim, nesse livro de refer――"
31140-46 = "……Hm？"
31140-47 = "Que livro safado, hein."
31140-52 = "Uwaaaaaah！？ P-por quê！？"
31140-53 = "Koharu-chan, isso é um livro erótico, né？ Bom, de certa forma pode até ser considerado um livro de referência. Não adianta esconder, tem «R18» escrito bem grande na capa."
31140-54 = "N-não é isso！ Você leu errado！ Enfim, não é nada disso！ Absolutamente não！！"
31140-58 = "Meus olhos não se enganam. Era um livro com coisas bem pesadas… bastante explícito…"
31140-59 = "Mesmo em Trinity, ou melhor, em todo Kivotos, é raro ver algo nesse nível. Devia ter cenas de pele se esfregando, partes sensíveis se apertando, gemidos voando pra todo lado e a razão indo embora……！"
31140-60 = "Por que você tem um livro desses？ Acho que o regulamento da escola proíbe, não？"
31140-61 = "N-não, isso… na verdade não é meu, é que…"
31140-62 = "Mas saiu da sua bolsa, né？ E você trouxe pro acampamento… é seu favorito？"
31140-63 = "Entendi. Então até a séria Koharu-chan tem um lado pervertido…"
31140-68 = "……Não. Faz sentido. Pensando bem, não é tão estranho assim."
31140-69 = "Treino prático… ou seja, era pra usar no acampamento, né Koharu-chan♡"
31140-73 = "N-não é nada disso eu já disse！！"
31140-74 = "？"
31140-75 = "K-Koharu-chan…… melhor parar por aí……"
31140-76 = "Talvez eu tenha exagerado… desculpa mesmo… achei que a gente ia se dar bem…"
31140-81 = "Uuu, uuuuu……"
31140-83 = "（……Sniff, sniff）"
31140-84 = "Eh, Koharu-chan……"
31140-85 = "Na verdade, é um item que eu confisquei durante uma atividade do Comitê de Execução da Justiça e acabei esquecendo na bolsa…… algo assim, né？"
31140-86 = "……Sim. Eu era responsável por gerenciar os itens confiscados…… isso realmente é de uma daquelas vezes……"
31140-87 = "Entendi. Aliás, ouvi dizer que no subsolo da biblioteca antiga de Trinity tem um monte de livros proibidos… não seria estranho o Comitê de Execução da Justiça confiscar esse tipo de coisa também."
31140-88 = "Humm…… nesse caso, seria melhor devolver o mais rápido possível antes que dê problema, né？"
31140-89 = "Verdade…… eu tinha esquecido completamente……"
31140-90 = "Talvez seja bom devolver escondido agora, antes que a Hasumi-senpai descubra…"
31140-91 = "Se o Sensei for junto, mesmo se a Hasumi-senpai vir, não deve ficar tão brava…"
31140-92 = "Eh, agora？"
31140-93 = "[s] \"Então, Koharu, quer ir junto？\""
31140-94 = "O Sensei……？"
31140-95 = "……Sim. Se o Sensei for junto, mesmo se a Hasumi-senpai vir, não deve ficar tão brava…"
31140-96 = "Aliás, Koharu-chan, se tiver mais alguma recomendação, me conta♡"
31140-101 = "C-cala a boca, sua idiota！！"
31140-103 = "E assim, acabei indo com a Koharu até a sala do Comitê de Execução da Justiça."
31140-105 = "Próximo; Vice-Presidente do Comitê de Execução da Justiça (2)"