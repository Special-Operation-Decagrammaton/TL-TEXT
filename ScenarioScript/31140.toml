[translation]
31140-1 = "Episódio 14; A Vice-Presidente do Comitê de Justiça (1)"
31140-2 = "Depois disso, os estudos continuaram até tarde da noite."
31140-3 = "Koharu, uma pergunta."
31140-4 = "Hm, ah? Eu? Para mim!?"
31140-5 = "Isso, para a Koharu. Nós devemos estar estudando a mesma parte agora. É sobre este problema..."
31140-6 = "Ah, sim..."
31140-7 = "...Ah, eu sei essa!"
31140-8 = "É mais ou menos assim, você traça uma linha para que fique a 90 graus com a parte de baixo..."
31140-9 = "Fazendo isso, este triângulo e este triângulo ficam iguais. Entendeu?"
31140-10 = "...Entendi, é isso então."
31140-11 = "Salvou minha vida. Realmente, não é à toa que você é da elite do Comitê de Justiça."
31140-12 = "...!?"
31140-13 = "I-Isso mesmo! Eu sou da elite, afinal!!"
31140-14 = "...S-Se você não entender mais alguma coisa, pode me perguntar. Para a Azusa, é uma exceção."
31140-15 = "Obrigada, isso ajuda muito."
31140-19 = "Ora, ora..."
31140-20 = "Dizem que quem toma banho junto cria laços, mas parece que vocês já estão em um nível bem íntimo, não é...? ♡"
31140-21 = "Ei, do que você está falando!? Não é nada disso!"
31140-22 = "Hm? Hanako, você também quer que eu lave suas costas?"
31140-23 = "A-Ah, bem, uh..."
31140-27 = "Ah, Koharu. Quero perguntar mais uma coisa."
31140-29 = "Hm? Esse problema é, bem..."
31140-30 = "A Koharu também não sabe esse problema?"
31140-31 = "Hum, esse aqui, acho que vi no livro de referência..."
31140-32 = "E-Espere um pouco."
31140-33 = "Tenho certeza de que trouxe..."
31140-37 = "Heave-ho."
31140-44 = "Está nesse livro de referência?"
31140-45 = "Sim, esse livro de referên—"
31140-46 = "...Ué?"
31140-47 = "É um livro erótico, não é?"
31140-52 = "Uwaaaaah!? P-Por que!?"
31140-53 = "Koharu-chan, isso é um livro erótico, né? Bem, talvez seja um livro de referência em certo sentido. Não adianta esconder, estava escrito 'R18' bem grande, sabia?"
31140-54 = "N-Não é! Você viu errado! De qualquer forma, não é! Definitivamente não é!!"
31140-58 = "Meus olhos não se enganam, era um livro com certeza sobre 'aquelas' coisas. E bem pesado, por sinal..."
31140-59 = "Parece ser um conteúdo de um nível que dificilmente se vê em Trinity, ou melhor, em Kivotos. Com certeza algo onde peles se esfregam, partes sensíveis se tocam, gemidos ecoam e a razão vai embora...!"
31140-60 = "Por que você tem um livro desses? Tenho quase certeza de que é proibido pelo regulamento escolar..."
31140-61 = "N-Não, é que... e-esse aqui não é meu, na verdade, é que..."
31140-62 = "Mas ele saiu da sua bolsa, Koharu-chan, não foi? E trazer até o alojamento... é o seu favorito?"
31140-63 = "Quem diria, a séria Koharu-chan com um livro erótico..."
31140-68 = "...Não. Entendo, é verdade. Pensando bem, não é algo tão estranho, né?"
31140-69 = "O ensaio geral também está perfeito... ou seja, é algo necessário para o acampamento, não é, Koharu-chan? ♡"
31140-73 = "I-Isso não é nada disso, eu já disseeeee!!"
31140-74 = "?"
31140-75 = "E-Então, Hanako-chan... por favor, pare por aí..."
31140-76 = "Talvez eu tenha exagerado, sinto muito mesmo... achei que tínhamos interesses em comum..."
31140-81 = "Uu, uuuu..."
31140-83 = "(...Snif, snif)"
31140-84 = "Bem, Koharu-chan..."
31140-85 = "É que, você acabou deixando guardado um item que confiscou durante as atividades do Comitê de Justiça... é algo assim, não é?"
31140-86 = "……Sim. Eu cuidava do gerenciamento dos itens apreendidos, então…… isso é realmente daquela época……."
31140-87 = "Entendo. Agora que mencionou, ouvi rumores de que há muitos livros proibidos empilhados no subsolo da biblioteca antiga de Trinity…… não seria nada estranho se o Comitê de Justiça estivesse apreendendo várias coisas, incluindo esse tipo de item."
31140-88 = "Hmm…… se for esse o caso, sinto que seria melhor devolver os itens apreendidos o mais rápido possível, mas o que devemos fazer?"
31140-89 = "É, verdade…… eu tinha esquecido completamente disso……."
31140-90 = "Talvez seja melhor devolver antes que a contagem não bata e vire um problema……."
31140-91 = "Não seria melhor ir escondido agora e devolver no Comitê de Justiça sem que ninguém perceba?"
31140-92 = "Hã, agora?"
31140-93 = "[s] \"Nesse caso, Koharu, quer ir comigo?\""
31140-94 = "O, o Sensei……?"
31140-95 = "……É verdade. Se o Sensei estiver junto, mesmo que a gente seja pego pela Hasumi ou alguém assim, provavelmente não seremos repreendidos tão severamente……."
31140-96 = "Aliás, Koharu-chan, deixando isso de lado, se tiver outras recomendações, por favor, me conte♡"
31140-101 = "C-cala a boca, idiota!!"
31140-103 = "E assim, decidi ir com Koharu até a sala do Comitê de Justiça."
31140-105 = "Próximo episódio: A Vice-Presidente do Comitê de Justiça (2)"
