[translation]
31140-1 = "Episódio 14;A Vice-Presidente do Comitê de Realização da Justiça (1)"
31140-2 = "Depois disso, o estudo continuou até tarde da noite."
31140-3 = "Koharu, uma pergunta."
31140-4 = "Sim, hã? Eu? Pra mim!?"
31140-5 = "Sim, pra você, Koharu. A gente deve estar estudando a mesma parte agora. É sobre esta questão……"
31140-6 = "U-uu……."
31140-7 = "……Ah, esta eu sei!"
31140-8 = "Esta aqui é assim, ó: traça uma linha de forma que fique a 90 graus com a parte de baixo……"
31140-9 = "Aí, este triângulo e este triângulo ficam iguais. Entendeu?"
31140-10 = "……Sei, então é isso."
31140-11 = "Ajudou. De fato, dá pra entender por que dizem que você é uma elite do Comitê de Realização da Justiça."
31140-12 = "……!?"
31140-13 = "É-é isso mesmo! Eu sou uma elite!!"
31140-14 = "……S-se tiver mais alguma coisa que você não entenda, pode me perguntar. Pra você, Azusa, é, em caráter especial."
31140-15 = "Obrigada, ajuda muito."
31140-19 = "Ora, ora……."
31140-20 = "Como esperado de quem já teve a intimidade sem roupa, vocês já são de uma relação bem profunda, digamos……♡"
31140-21 = "P-peraí, o que você tá falando!? Não é nada disso!?"
31140-22 = "Hm? A Hanako também quer que eu lave o seu corpo?"
31140-23 = "É-é que, uu……."
31140-27 = "Ah, Koharu. Quero perguntar mais uma."
31140-29 = "Hm? Esta questão, é que, deixa ver……"
31140-30 = "Uma que nem você, Koharu, sabe?"
31140-31 = "Hmm, esta aqui, se não me engano, eu vi num livro de apoio……."
31140-32 = "P-peraí um pouco."
31140-33 = "Acho que eu tinha trazido……."
31140-37 = "Hã-ê."
31140-44 = "Tá neste livro de apoio?"
31140-45 = "Sim, este livro de apo――"
31140-46 = "……Ué?"
31140-47 = "Um livro safado, hein."
31140-52 = "Uwaaaah!? P-por quê!?"
31140-53 = "Koharu, isso é um livro safado, né? Bom, em certo sentido também é um \"livro de apoio\", talvez. Não adianta esconder; tava escrito \"R18\" bem grande, viu?"
31140-54 = "N-não! Você viu errado! Enfim, não é! Não é, de jeito nenhum!!"
31140-58 = "Os meus olhos você não engana; era, com certeza, um livro pra fazer aquilo. E ainda por cima bem pesado……"
31140-59 = "Um conteúdo de um nível que nem em Trinity, aliás, nem em toda Kivotos dá pra ver com facilidade, me pareceu. Com certeza pele roçando pele, esfregando as partes sensíveis, gemidos voando e a razão indo embora……!"
31140-60 = "Por que você tem um livro desses? Se não me engano, até no regulamento da escola era proibido……?"
31140-61 = "N-não, é que…… i-isto de verdade não é meu, é que, deixa ver……."
31140-62 = "Mas isso saiu da sua mochila, Koharu, né? E ainda trazer até o alojamento do acampamento…… é o seu favorito?"
31140-63 = "Ah, sei, então a Koharu, tão certinha, com um livro safado……"
31140-68 = "……Não. Sei, pois é. Pensando bem, não é assim tão estranho, né?"
31140-69 = "Ensaio bem-feito e tudo…… ou seja, é uma coisa necessária pro acampamento, né, Koharu♡"
31140-73 = "I-isto não é o que parece, jááá!!"
31140-74 = "?"
31140-75 = "É-é que, Hanako…… já chega por aí……."
31140-76 = "Talvez eu tenha passado do ponto; me desculpe de verdade…… achei que a gente ia se entender no assunto, mas……."
31140-81 = "Uu, uuuh……."
31140-83 = "(……snif, snif)"
31140-84 = "É que, Koharu……."
31140-85 = "É que, é um item que você apreendeu durante uma atividade do Comitê de Realização da Justiça e acabou deixando dentro da mochila sem querer…… é mais ou menos isso, né?"
31140-86 = "……Sim. É que eu fazia a gestão dos itens apreendidos…… isto é, de verdade, uma coisa daquela época……."
31140-87 = "Sei. Aliás, ouvi um boato de que, no subsolo da Biblioteca Antiga de Trinity, há uma montanha de livros proibidos empilhados…… então não é nada estranho que o Comitê de Realização da Justiça apreenda várias coisas, incluindo esse tipo de material."
31140-88 = "Hmm…… sendo assim, tenho a impressão de que item apreendido é melhor devolver o quanto antes; e agora, o que a gente faz?"
31140-89 = "D-de fato…… eu tinha esquecido esse tempo todo, mas……."
31140-90 = "Antes que dê problema por causa da contagem que não bate, talvez seja melhor ir devolver……."
31140-91 = "Se a gente for agora, discretamente, e devolver pro Comitê de Realização da Justiça sem ser notada, não fica tudo bem?"
31140-92 = "Hã, agora?"
31140-93 = "[s] \"Nesse caso, Koharu, vamos junto?\""
31140-94 = "O-o Sensei……?"
31140-95 = "……Pois é. Se o Sensei for junto, mesmo que, por acaso, a Hasumi ou alguém descubra, não vai dar tanta bronca……."
31140-96 = "Aliás, Koharu, mudando de assunto, se você tiver outras recomendações, aceito de bom grado♡"
31140-101 = "C-cala a boca, sua boba!!"
31140-103 = "E, assim, decidiu-se ir junto com a Koharu até a sala do Comitê de Realização da Justiça."
31140-105 = "Próximo Episódio;A Vice-Presidente do Comitê de Realização da Justiça (2)"
