[translation]
1601803-1 = "O peso de ser líder"
1601803-2 = "（Fui ao centro comercial com a Love）"
1601803-3 = "Hmm... ughhh..."
1601803-4 = "Que dilema..."
1601803-5 = "[s1] \"Parece farinha de soja, mas...\"\n[s2] \"Para que serve isso?\""
1601803-8 = "Não é farinha de soja. Isso é casca de noz triturada."
1601803-9 = "É um item essencial para o Grupo do Capacete. Usamos isso para polir."
1601803-10 = "Quando vou pintar o capacete, primeiro preciso remover toda a cor original com lixa, mas..."
1601803-11 = "Logo depois de remover, a superfície fica lisa e reflete a luz, então preciso #npolir para deixá-la áspera novamente."
1601803-12 = "[s] \"Você também tem capacetes lisos, não tem?\""
1601803-13 = "Sim, eu uso cada um para uma ocasião."
1601803-14 = "Capacete fosco e áspero para combate, #ncapacete brilhante para quando quero parecer estilosa... algo assim."
1601803-15 = "Por isso, uso o abrasivo de nozes para deixar a superfície áspera."
1601803-16 = "O problema é decidir se uso a granulação 30 ou 50..."
1601803-17 = "[s] \"Não é tudo a mesma coisa?\""
1601803-18 = "Claro que não! Olhe com mais atenção!"
1601803-19 = "Hmm... estou sem dinheiro este mês também, preciso escolher apenas um..."
1601803-26 = "Hm?"
1601803-27 = "Aquele ali não é o líder do Grupo do Capacete Jab-Jab?"
1601803-28 = "O Sensei do Schale também está com ela."
1601803-29 = "Ei! Você aí, de corte chanel!"
1601803-30 = "Aposentou do Grupo do Capacete para sair com um adulto, é?"
1601803-34 = "Ah?"
1601803-35 = "O que aconteceu com seus subordinados?"
1601803-36 = "Ei, vamos acabar com ela agora?"
1601803-37 = "...Ah."
1601803-38 = "Sensei, me dê um segundo."
1601803-39 = "[s] \"Por que você colocou uma meia na arma...?\""
1601803-40 = "Hm? O que ela está fazendo?"
1601803-41 = "Ficou com medo e enlouqueceu?"
1601803-42 = "Olha, eu preciso economizar até no custo das balas agora."
1601803-43 = "Essa é a sua chance. #nQuando eu terminar as compras, suma daqui."
1601803-44 = "Sua insolente..."
1601803-45 = "Peguem ela!!"
1601803-60 = "Ugh!"
1601803-65 = "Bater com a arma é covardia...!"
1601803-66 = "Me dá isso!!"
1601803-77 = "A meia está escorregando, não consigo segurar a arma...!"
1601803-78 = "Se essa meia sair, você vai cair, sabia?"
1601803-79 = "P-pare...!"
1601803-80 = "Não vou parar."
1601803-90 = "Ah, que incômodo."
1601803-91 = "Kawakaze Love! Como ousa vir ao nosso território..."
1601803-92 = "Tome uma granada!"
1601803-93 = "Isso é perigoso!"
1601803-94 = "Hmph!"
1601803-100 = "Arghhh!!"
1601803-105 = "Oh, voou longe, hein."
1601803-106 = "Chamem os outros! Vamos capturar ela de qualquer jeito!!"
1601803-114 = "E-ela é forte... ugh."
1601803-115 = "Recuar! Recuaaaar!!"
1601803-119 = "Sério, que gente chata..."
1601803-120 = "Acabaram com o meu dia!!"
1601803-121 = "Na próxima, vou deixar vocês sem nem conseguir ficar de pé!"
1601803-122 = "Ah... estou exausta."
1601803-123 = "Sensei, você está bem? Se machucou?"
1601803-124 = "[s3] \"Estou bem! Não aconteceu nada!\" \n[s4] \"É sempre assim por aqui?\""
1601803-127 = "Hoje eles foram especialmente insistentes, mas, bem, acho que é o de sempre."
1601803-128 = "Não são só as delinquentes, as brigas internas do Grupo Capacete também são comuns."
1601803-129 = "Bom, se a gente der uma lição neles como hoje, eles devem ficar quietos por um bom tempo."
1601803-130 = "[s] \"A Love é muito forte!\""
1601803-131 = "Hah, isso é óbvio, não é?"
1601803-132 = "O título de capitã do Grupo Capacete não é só enfeite!"
1601803-133 = "[s] \"Você é uma líder em quem todos podem confiar!\""
1601803-134 = "Não está elogiando demais, não...?#nHehe."
1601803-135 = "[s] \"E você é gentil lá no fundo!\""
1601803-136 = "Ei..."
1601803-137 = "[s] \"E esses dentes pontudos são fofos!\""
1601803-138 = "Cala a boca!!"
1601803-140 = "(Depois disso, enquanto levava socos leves, continuei enchendo a Love de elogios)"
