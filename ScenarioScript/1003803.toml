[translation]
1003803-1 = "SRT、resgate iniciado!"
1003803-2 = "Centro da cidade de Kivotos"
1003803-3 = "（Miyako está em frente à vitrine de uma loja na rua comercial, olhando para dentro enquanto parece pensativa）"
1003803-4 = "………。"
1003803-5 = "[s] \"Miyako...?\""
1003803-6 = "Hmm……。"
1003803-7 = "[s] \"Miyako?\""
1003803-8 = "Ah! ...Oh, Sensei, é você."
1003803-9 = "Desculpe, eu estava apenas perdida em pensamentos."
1003803-10 = "[s] \"O que você estava olhando?\""
1003803-11 = "Bem, eu estava olhando os animais daqui."
1003803-12 = "Como é um pet shop perto do parque, eu sempre dou uma olhada quando passo por aqui, mas..."
1003803-13 = "Recentemente, chegaram coelhos neste pet shop."
1003803-14 = "Como o Sensei deve saber, coelhos são animais extremamente adoráveis."
1003803-15 = "Aquelas patinhas fofas e as orelhas em pé... eu poderia passar o dia inteiro olhando para eles sem me cansar."
1003803-16 = "[s] \"Se você gosta tanto deles, por que não adota um?\""
1003803-17 = "Isso é..."
1003803-18 = "Veio nos visitar de novo, cliente!"
1003803-19 = "Veio finalmente buscar um coelhinho?"
1003803-20 = "H-hein? Não, eu..."
1003803-21 = "É que você sempre olha para os coelhos daqui com tanto carinho, pensei que hoje seria o dia em que levaria um para casa..."
1003803-22 = "Eles já estão acostumados com pessoas, são dóceis e muito bons. O que acha?"
1003803-23 = "Mas nós não temos dinheiro, nem um lugar confortável para morar..."
1003803-24 = "[s] \"Por favor, eu quero aquele coelhinho branco ali na frente.\""
1003803-25 = "Sensei!? P-por que...?"
1003803-26 = "É um... presente? Mas eu ainda não estou preparada para cuidar de um animal..."
1003803-27 = "Além disso, nós do Esquadrão RABBIT não temos nem uma casa de verdade, estamos vivendo no parque..."
1003803-28 = "[s1] \"Não posso deixar um refém tão fofo para trás.\"\n[s2] \"Acho que os coelhos prefeririam correr e brincar em um parque espaçoso do que ficar em uma gaiola apertada.\""
1003803-29 = "Isso é..."
1003803-30 = "É verdade. Se é que posso chamar isso de uma das nossas operações de resgate."
1003803-31 = "Isso é..."
1003803-32 = "É verdade. É uma pena deixá-los presos atrás do vidro o tempo todo..."
1003803-33 = "Muito obrigada, Sensei."
1003803-34 = "Vou cuidar dele com muito amor e dedicação!"
1003803-36 = "（Depois disso, Miyako voltou para casa abraçando o coelho com uma expressão de felicidade）"
