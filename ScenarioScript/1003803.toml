[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1003803-1 = "SRT, Iniciando Resgate!" 
1003803-2 = "Kivotos - Centro Comercial" 
1003803-3 = "（Miyako está parada na frente da vitrine de uma loja\nno distrito comercial, olhando para dentro pensativa.）" 
1003803-4 = "………。" 
1003803-5 = "[s] \"Miyako……?\"" 
1003803-6 = "Hmm………。" 
1003803-7 = "[s] \"Miyako?\"" 
1003803-8 = "Hyaah! ……Ah, era você, Sensei." 
1003803-9 = "Me desculpe,\neu estava perdida em pensamentos." 
1003803-10 = "[s] \"O que estava olhando?\"" 
1003803-11 = "Bem,\neu estava observando os animais daqui." 
1003803-12 = "É um pet shop perto do parque, então\neu costumo olhar sempre que passo por aqui, mas……" 
1003803-13 = "Recentemente,\ntrouxeram coelhos para este pet shop." 
1003803-14 = "Como deve saber, Sensei,\nos coelhos são animais muito fofos." 
1003803-15 = "Aquelas patinhas adoráveis e aquelas orelhas em pé……\nSério, eu poderia passar o dia inteiro olhando sem me cansar." 
1003803-16 = "[s] \"Se gosta tanto assim,\npor que não tenta criar um?\"" 
1003803-17 = "Isso é……" 
1003803-18 = "Você voltou, querida cliente!" 
1003803-19 = "Finalmente veio levar um\ndos nossos coelhinhos para casa?" 
1003803-20 = "H-Hã? Não, eu……" 
1003803-21 = "Você sempre os observava com tanto carinho,\nque eu achei que hoje finalmente os levaria com você……" 
1003803-22 = "Eles são super mansinhos e já estão acostumados com pessoas.\nO que me diz?" 
1003803-23 = "Mas eu não tenho dinheiro,\nnem um lugar adequado para criá-lo……" 
1003803-24 = "[s] \"Por favor, vou levar esse\ncoelho branco aqui da frente.\"" 
1003803-25 = "Sensei?! P-Por que……?" 
1003803-26 = "É um presente……?\nMas eu ainda não estou preparada para ter um animal……" 
1003803-27 = "Além do mais, o Esquadrão RABBIT não tem nem onde morar direito.\nNós estamos dormindo ao relento no parque……" 
1003803-28 = "[s1] \"Eu não conseguiria ir embora deixando\num refém tão fofo para trás.\"\n[s2] \"Acho que eles também preferem correr num parque espaçoso\ndo que ficar presos numa gaiola apertada.\"" 
1003803-29 = "Isso é……" 
1003803-30 = "Tem razão. Podemos dizer que\nesta é mais uma operação de resgate." 
1003803-31 = "Isso é……" 
1003803-32 = "Tem razão. Seria uma pena deixá-lo\npreso do outro lado desse vidro para sempre……" 
1003803-33 = "Muito obrigada, Sensei." 
1003803-34 = "Vou dar o meu melhor para criá-lo\ncom muito amor!" 
1003803-36 = "（Depois disso, Miyako foi para casa segurando\no coelho com uma expressão muito feliz.）" 