[translation]
1003803-1 = "SRT、救出します！"
1003803-2 = "キヴォトス市内・繁華街"
1003803-3 = "（ミヤコが商店街の、とあるお店のガラスの前で中を覗き込みながら、何かを考え込んでいる）"
1003803-4 = "………。"
1003803-5 = "[s] \"ミヤコ……？\""
1003803-6 = "うーん………。"
1003803-7 = "[s] \"ミヤコ？\""
1003803-8 = "ひゃっ！……ああ、先生でしたか。"
1003803-9 = "ごめんなさい、ちょっと考えごとをしていました。"
1003803-10 = "[s] \"何を見てたの？\""
1003803-11 = "えっと、ここの動物たちを見ていました。"
1003803-12 = "公園の近くにあるペットショップなので、通り過ぎる度によく見かけていたのですが……。"
1003803-13 = "最近このペットショップに、ウサギが来ました。"
1003803-14 = "先生もご存知だと思いますが、ウサギはすごく可愛い動物です。"
1003803-15 = "あの可愛らしい前足と、ツンと立ってる耳……本当に、一日中見てても飽きません。"
1003803-16 = "[s] \"そんなに好きなら、飼ってみるのはどう？\""
1003803-17 = "それは……。"
1003803-18 = "また来てくださったんですね、お客さん！"
1003803-19 = "ついにウサギを迎えにいらっしゃったんですか？"
1003803-20 = "は、はい？いえ、私は……。"
1003803-21 = "いつもここのウサギを愛情たっぷりの目で見つめていらっしゃったので、今日こそ連れて帰られるのかなと思ったんですが……。"
1003803-22 = "その子たちは人に慣れているので、おとなしくていい子ですよ。いかがですか？"
1003803-23 = "ですが私たちにはお金も、居心地の良い住居なども無くて……。"
1003803-24 = "[s] \"一番手前にある白いウサギさんをお願いします。\""
1003803-25 = "先生！？ど、どうして……？"
1003803-26 = "プレゼント……ですか？ですが私には、まだ動物を飼う準備が……。"
1003803-27 = "それに、私たちRABBIT小隊にはちゃんとした住まいもなくて、公園で野宿してる状態ですし……。"
1003803-28 = "[s1] \"こんな可愛い人質を目の前にして、帰れないよ。\"\n[s2] \"ウサギたちも狭いケージの中より、広い公園で走って遊びたいかなって。\""
1003803-29 = "それは……"
1003803-30 = "そうですね。これも救出作戦の一つ、といってはなんですが。"
1003803-31 = "それは……"
1003803-32 = "そうですね。ずっとガラスの中にいるのは可哀そうですし……。"
1003803-33 = "ありがとうございます、先生。"
1003803-34 = "愛情を込めて、頑張ってきちんと飼います！"
1003803-36 = "（その後、ミヤコは幸せそうな表情でウサギを抱いて帰った）"
