[translation]
104020-1 = "第2話;抵抗（１）"
104020-4 = "あ、アル様……また空が……。"
104020-5 = "これ、ちょっとヤバいんじゃな～い？"
104020-6 = "……急ぐわよ。"
104020-7 = "アルちゃん……？"
104020-8 = "今、先生とカヨコが頑張っているのよ！！"
104020-9 = "私達が立ち止まってどうするのよ！#nそんなんじゃ、二人に顔向けできないじゃない！！"
104020-10 = "あ、アル様……！"
104020-11 = "……へぇ。"
104020-12 = "さ、行くわよ！今私達にできることをやらなくちゃ！"
104020-17 = "は、はい！！どこまでもついていきます、アル様！！"
104020-23 = "……やっぱ、ここぞって時のアルちゃんはカッコイイ♪"
104020-31 = "……遠方に不自然な光を確認。"
104020-32 = "データ上、測定不能な位置……。"
104020-33 = "……万が一に備え、調査を実行します。"
104020-38 = "――状況は？"
104020-39 = "……再びサンクトゥムが出現したようです。"
104020-40 = "むぅ……。"
104020-41 = "せ、先生……大丈夫かな……。"
104020-42 = "……了解、急ごう。敵の出現に備えて。"
104020-48 = "狙撃手は次の位置で待機。RABBIT小隊長は指揮をお願い。#nアリスがいない分、火力支援は私が担当する。"
104020-49 = "了解。やってみよう。"
104020-50 = "了解です。"
104020-53 = "繰り返します。搭乗者は急いで避難してください。#n17秒後、「自爆シーケンス」が――"
104020-54 = "ひ、ヒマリ先輩……これって、本当に止められるんですよね？"
104020-55 = "少々、お待ち下さい……。"
104020-61 = "搭乗者は急いで避難してください。#n9秒後、「自爆シーケンス」が――"
104020-62 = "くっ…………これ以上は、流石の私でも……もう……"
104020-63 = "――諦めるのはまだ早いわ。"
104020-67 = "り、リオ！？"
104020-68 = "「これ以上はもう？」――「天才」の貴女らしくない台詞ね、ヒマリ。"
104020-72 = "9秒後、「自爆シーケンス」が発動――9秒後、「自爆シーケンス」が発動――9秒後、「自爆シーケンス」が発動――"
104020-73 = "と……止まった？"
104020-74 = "「多次元解釈」の抑制機能を利用して、強制的にウトナピシュティムを停止させたわ。"
104020-75 = "――ただ、あくまで足止めに過ぎない。"
104020-76 = "……そうですね。抑制が解けてしまえば、いずれにせよ船は深刻な被害を受けるでしょう。"
104020-77 = "――ですが、時間稼ぎにはなりますね。ありがとうございます、リオ。"
104020-78 = "どういたしまして……さあ、足止めが効いている間に解決しなくては。#n厄介なシステムとはいえ、攻略法は必ずあるはずよ。"
104020-79 = "――でも、私一人での攻略は不可能。#nだから、不本意かもしれないけれど皆の力を貸してちょうだい。"
104020-80 = "……それは、[ruby= ・    ・    ・    ・    ・    ・    ・    ・ ]あなたらしくない[/ruby]台詞ですね、リオ。"
104020-84 = "そうですね――これだけの規模の船ですから、命令を中継する「端末」がどこかに存在しているはず。"
104020-85 = "であれば、中継端末を破壊する事で、この状態を解除できると思います。"
104020-86 = "物理的な通信を断つ手法ね。もちろん、それで解決はできるでしょうけれど――"
104020-87 = "ええ、一時的しのぎにしかなりません。#n予備の「端末」もあるでしょうし……"
104020-88 = "ですが、その間にウトナピシュティムのシステムを復旧させ、#n「箱舟」の管制権を取り戻せれば……"
104020-90 = "「箱舟」の「自爆シーケンス」を起動できます。"
104020-91 = "そうね……そうすれば、念のために用意しておいた「脱出シーケンス」も使えるようになるはずよ。"
104020-93 = "……あなたという人は、本当に。"
104020-94 = "……不要だったのなら、謝罪するわ。"
104020-95 = "いいえ。あなたの事は嫌いなままですが――今回ばかりは助かりましたよ、リオ。#nチーちゃん！「端末」の位置は分かりますか？"
104020-97 = "……了解、いま確認中。#n「箱舟」内部の通信が集中している場所が分かれば――"
104020-98 = "ハードウェアの探知はハッキングじゃ限度があるよ！#n私たちの専門分野じゃなくない！？"
104020-99 = "そうですね……正確な探知を行うには、「箱舟」そのものの設計図が必要です。"
104020-103 = "……エンジニア部の力が必要かな。"
104020-106 = "――そういう事なら、任せてくれ。#n今確認しているよ。"
104020-107 = "「箱舟」の設計図を解析、構造図と「箱舟」の3D空間スキャンデータを分析中……"
104020-108 = "はい。通信量が多い場所から順に、ですね！#n――もうしばらくお待ちを！"
104020-111 = "リーダー……。"
104020-112 = "不安なのは同じだ。#nだが――"
104020-113 = "うん……信じて待とう。"
104020-114 = "……。"
104020-118 = "うーん……。"
104020-123 = "キキキッ……そう緊張するな。"
104020-124 = "だ、誰が緊張してるって！？"
104020-138 = "はぁ……はぁ……。"
104020-139 = "[ns] \"まだ、終わってないよ。\""
104020-140 = "……うん。まだ、いける。"
104020-141 = "……。"
104020-143 = "……見つけた！信号、ここから出てる！"
104020-144 = "チーちゃん、位置情報を送ったよ！#n「シャル・カリ・シャッリ回廊」だ！"
104020-145 = "「箱舟」の最下層セクションです！！"
104020-147 = "位置を確認したよ、ありがとう。#nナビゲーションデータに切り替えて転送するね。"
104020-148 = "ヒマリ、これを破壊すれば、箱舟との接続を解除できるはず。"
104020-150 = "「箱舟」最下層セクションに「シャル・カリ・シャッリ回廊」を確認。#nこれは……ここから1,200mほど下りなくてはなりませんね……。"
104020-151 = "その上、そこのセキュリティシステムが難解でね……！#n今から解除方法を説明する――"
104020-152 = "私にお任せください…………"
104020-157 = "…………システムの全容、把握しました！"
104020-158 = "いつの間に……！？"
104020-159 = "一度状況を整理いたします……「箱舟」の最下層「シャル・カリ・シャッリ回廊」にある「端末」を破壊するためには、セキュリティシステムを突破しなくてはなりません。"
104020-160 = "現在、ウトナピシュティムはハッキングされた状態……ここからセキュリティシステムを突破するのは不可能です。"
104020-161 = "まだ可能性があるとすれば……「箱舟」最東端と、最西端のセクションに存在する解除装置を同時に破壊すること。"
104020-162 = "上手くいけば、約5秒ほどセキュリティシステムを停止させることができます。#nその間に端末を破壊すれば、あるいは――"
104020-163 = "5秒……？"
104020-164 = "ああもう！それしか無いのでしたら、すぐにチームを分けましょう。#n箱舟の東と西、最下層を担当するメンバーを――"
104020-165 = "問題は最下層担当です。#n1,200mをこの短時間で駆け抜けられる方なんて――"
104020-167 = "……うふふっ。"
104020-174 = "フウカさん。ついに、やってまいりましたわ。"
104020-175 = "え？何が？……まさか、アレじゃないよね？"
104020-176 = "ええ、その通り。アレですよ……#nついに、フウカさんの才能が花開く時です。"
104020-180 = "私は知っております……#nフウカさんが、どれほど自身の才能を磨き、努力してきたかを――"
104020-181 = "日々の鍛錬と精進を怠らない、その姿勢――"
104020-182 = "そう！！その才能――実力を、ついに発揮する時が来たのです！#nこれを運命といわずしてなんと言うのでしょう！！"
104020-183 = "はい、運転のお時間です～★"
104020-184 = "あ！給食部の部長が一番得意なやつだね！！"
104020-185 = "こういう時の適任といえば、フウカよね。"
104020-190 = "ハルナ……？これ、わざとだよね？そうなんだよね？"
104020-191 = "うふふっ、故意かどうかなど、さして重要ではありませんわ。#nフウカさんは、このために船に乗ったのでしょう？"
104020-192 = "……いや、宇宙食は？"
104020-194 = "とにかく！#n破壊は私たちに任せてちょうだい！！"
104020-195 = "うんうん！セキュリティシステムの方はよろしくね～！！"
104020-197 = "はいはい、わかったよ。"
104020-198 = "東の解除装置は私たちが担当するわ！"
104020-199 = "はい！ここから向かうのが一番早いので☆"
104020-200 = "ささっと片付けちゃおっか。#n先生とシロコちゃんのところに行かないとだからね。"
104020-201 = "はい！では、私がサポートします。#n行きましょう！"
104020-204 = "では、西はアリスたちに任せてください！"
104020-205 = "ちょっ……ゲーム開発部！？"
104020-206 = "は、はい……！た、たぶんわたし達が、一番近いと思います……。"
104020-207 = "そう……なら、私が案内するわ！"
104020-209 = "よし、行くよ！"
104020-213 = "お、お姉ちゃん、待って……！"
104020-218 = "アリス、本当に大丈夫なんですね？"
104020-219 = "はい！問題ありません！"
104020-220 = "それに、「光の剣：アトラ・ハシースのスーパーノヴァ」もまだ壊れていませんから。"
104020-221 = "……その名前になったのですね。"
104020-222 = "はい。もし良かったら、後でヒマリ先輩に見てもらいたいです。#nもしかしたら何か――"
104020-223 = "そうですね。何か、お力になれるかもしれません……#nでは、気をつけてくださいね、アリス。"
104020-224 = "はい！行ってきます、ヒマリ先輩！"
104020-228 = "フウカさん、準備はよろしいでしょうか？"
104020-230 = "はぁ……何でこんなことに……"
104020-231 = "私たちも準備OKだよ～！"
104020-232 = "「箱舟」でひと暴れできるなんて！ドキドキしちゃいます★"
104020-233 = "全員乗ったなら早く出発するわよ！時間がないんだってば！！"
104020-234 = "はぁ……1,200m下まで行くんだっけ……？#nまぁ、いつものデリバリーだと思えば――"
104020-235 = "さあ、出発ですよフウカさん！#n全てを終えたら最後に「グッ！」と親指を立てるのです！"
104020-236 = "イヤ。絶対やらないわよ。"
104020-238 = "それじゃ……行くわよ！！"
104020-251 = "うりゃああああああ――――！！！"
104020-253 = "次回;抵抗（２）"
