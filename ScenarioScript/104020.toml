[translation]
104020-1 = "Episódio 2; Resistência (1)"
104020-4 = "A-Aru-sama……o céu de novo……."
104020-5 = "Isso não tá com cara de que vai dar ruim não~?"
104020-6 = "……Temos que nos apressar."
104020-7 = "Aru-chan……?"
104020-8 = "Nesse exato momento, o Sensei e a Kayoko estão dando o melhor de si!!"
104020-9 = "O que a gente ganha ficando parada aqui!?#nDesse jeito, que moral a gente vai ter pra olhar na cara deles depois!!"
104020-10 = "A-Aru-sama……!"
104020-11 = "……Heh."
104020-12 = "Então, vamos nessa! Temos que fazer o que está ao nosso alcance agora!"
104020-17 = "S-Sim!! Te sigo até o fim do mundo, Aru-sama!!"
104020-23 = "……Sempre soube, nessas horas a Aru-chan é a mais foda♪"
104020-31 = "……Luz incomum detectada ao longe."
104020-32 = "De acordo com os dados, a localização é impossível de medir……."
104020-33 = "……Por precaução, vou iniciar a investigação."
104020-38 = "――Qual a situação?"
104020-39 = "……Parece que o Sanctum apareceu de novo."
104020-40 = "Uhh……."
104020-41 = "S-Sensei……espero que esteja bem……."
104020-42 = "……Entendido, vamos rápido. Precisamos nos preparar pra aparição dos inimigos."
104020-48 = "Atiradora, fique de prontidão na próxima posição. Comandante do RABBIT, assuma o comando.#nComo a Aris não está aqui, eu cuido do fogo de suporte."
104020-49 = "Entendido. Pode deixar."
104020-50 = "Entendido."
104020-53 = "Repetindo. Passageiros, evacuem imediatamente.#nEm 17 segundos, a 'Sequência de Autodestruição' será――"
104020-54 = "H-Himari-senpai……tem certeza que a gente consegue parar isso?"
104020-55 = "Aguarde só mais um pouquinho……."
104020-61 = "Passageiros, evacuem imediatamente.#nEm 9 segundos, a 'Sequência de Autodestruição' será――"
104020-62 = "Tsc…………Isso já tá num nível que nem mesmo eu……agora já era……"
104020-63 = "――Ainda é cedo pra desistir."
104020-67 = "R-Rio!?"
104020-68 = "'Isso já tá num nível que'?――Isso não soa nada como a 'genial' da Himari que eu conheço."
104020-72 = "Em 9 segundos, 'Sequência de Autodestruição' ativada――Em 9 segundos, 'Sequência de Autodestruição' ativada――Em 9 segundos, 'Sequência de Autodestruição' ativada――"
104020-73 = "P……parou?"
104020-74 = "Eu usei a função de supressão da 'interpretação multidimensional' pra forçar a Utnapishtim a parar."
104020-75 = "――Mas isso é só pra atrasar."
104020-76 = "……Faz sentido. Se a supressão for desfeita, a nave vai sofrer danos graves de qualquer jeito."
104020-77 = "――Mas já ganhamos um tempinho. Obrigada, Rio."
104020-78 = "De nada……Agora, temos que resolver isso antes que o atraso acabe.#nPor mais complicado que seja o sistema, sempre tem um jeito de hackear."
104020-79 = "――Mas eu não consigo fazer isso sozinha.#nEntão, mesmo que não seja a sua vontade, vou precisar da ajuda de todas vocês."
104020-80 = "……Essa também não é uma frase que é a [ruby= ・    ・    ・    ・    ・    ・    ・    ・ ]sua cara[/ruby], Rio."
104020-84 = "Vamos pensar――Com uma nave desse tamanho, com certeza deve ter algum 'terminal' em algum lugar que repassa os comandos."
104020-85 = "Sendo assim, acho que se a gente destruir o terminal de retransmissão, dá pra reverter essa situação."
104020-86 = "O famoso método de cortar a comunicação física, né. Claro, isso resolveria o problema, mas――"
104020-87 = "Sim, vai ser só um quebra-galho.#nEles devem ter outros 'terminais' de reserva……"
104020-88 = "Mas, se nesse meio tempo a gente conseguir restaurar o sistema da Utnapishtim#ne retomar o controle da 'Arca'……"
104020-90 = "A gente consegue ativar a 'Sequência de Autodestruição' da 'Arca'."
104020-91 = "Isso mesmo……E se a gente fizer isso, a 'Sequência de Evacuação' que a gente preparou por precaução deve voltar a funcionar também."
104020-93 = "……Você realmente não perde uma, né."
104020-94 = "……Se foi à toa, eu peço desculpas."
104020-95 = "Não precisa. Eu continuo não gostando de você, mas――Dessa vez você ajudou pra caramba, Rio.#nChi-chan! Consegue localizar o 'terminal'?"
104020-97 = "……Beleza, vou checar agora.#nSe eu achar o lugar com mais fluxo de comunicação dentro da 'Arca'――"
104020-98 = "Rastreamento de hardware tem limite pra hackear!#nIsso não é muito a nossa praia, né!?"
104020-99 = "Pois é……Para fazer um rastreamento preciso, a gente precisa da planta da própria 'Arca'."
104020-103 = "……Acho que a gente vai precisar da ajuda do Departamento de Engenharia."
104020-106 = "――Se é isso, deixa com a gente.#nTô verificando agora mesmo."
104020-107 = "Analisando a planta da 'Arca', processando diagrama estrutural e os dados de varredura 3D do espaço da 'Arca'……"
104020-108 = "Isso mesmo. Seguindo a ordem do maior volume de comunicação, né!#n――Aguardem só mais um instante!"
104020-111 = "Líder……."
104020-112 = "Eu também tô apreensiva.#nMas――"
104020-113 = "Uhum……vamos confiar e esperar."
104020-114 = "……。"
104020-118 = "Hmm……."
104020-123 = "Kikiki……não precisa ficar tão nervosa."
104020-124 = "Q-Quem disse que eu tô nervosa!?"
104020-138 = "Haa……Haa……."
104020-139 = "[ns] \"Ainda não acabou.\""
104020-140 = "……Sim. Eu ainda aguento."
104020-141 = "……。"
104020-143 = "……Achei! O sinal tá vindo daqui!"
104020-144 = "Chi-chan, enviei a localização!#nÉ o 'Corredor de Shar-Kali-Sharri'!"
104020-145 = "É a seção mais profunda da 'Arca'!!"
104020-147 = "Localização confirmada, valeu.#nVou converter pros dados de navegação e transferir."
104020-148 = "Himari, se a gente destruir isso aqui, a gente deve conseguir cortar a conexão com a Arca."
104020-150 = "Confirmei o 'Corredor de Shar-Kali-Sharri' na seção mais profunda da 'Arca'.#nIsso é……a gente vai ter que descer uns 1.200m daqui……."
104020-151 = "E ainda por cima, o sistema de segurança de lá é super complexo……!#nVou explicar como desativar agora――"
104020-152 = "Deixa isso comigo…………"
104020-157 = "…………Entendi como o sistema inteiro funciona!"
104020-158 = "Desde quando……!?"
104020-159 = "Vou resumir a situação……Para destruir o 'terminal' que fica no 'Corredor de Shar-Kali-Sharri', no nível mais inferior da 'Arca', primeiro a gente tem que passar pelo sistema de segurança."
104020-160 = "No momento, a Utnapishtim está hackeada……então é impossível burlar a segurança daqui de cima."
104020-161 = "A única chance que a gente tem é……destruir ao mesmo tempo os dispositivos de desativação que ficam no extremo leste e oeste da 'Arca'."
104020-162 = "Se der certo, o sistema de segurança vai parar por uns 5 segundos.#nSe a gente destruir o terminal nesse tempo, quem sabe――"
104020-163 = "5 segundos……?"
104020-164 = "Ah, que droga! Se esse é o único jeito, vamos nos dividir em times logo.#nOs membros que vão cuidar das alas leste, oeste e do nível inferior da Arca――"
104020-165 = "O problema é quem vai cuidar do nível inferior.#nAlguém que consiga descer 1.200m num tempo tão curto――"
104020-167 = "……Ufufu."
104020-174 = "Fuuka-san. Finalmente, a hora chegou."
104020-175 = "Hã? A hora do quê?……Não me diga que é aquilo?"
104020-176 = "Exatamente. É aquilo mesmo……#nFinalmente, chegou a hora do seu talento desabrochar, Fuuka-san."
104020-180 = "Eu sei muito bem……#nO quanto você ralou e se esforçou pra aprimorar esse seu talento, Fuuka-san――"
104020-181 = "A sua postura de nunca negligenciar o treino e a dedicação do dia a dia――"
104020-182 = "Sim!! Finalmente chegou a hora de mostrar esse talento――essa sua capacidade!#nSe isso não for o destino, o que mais seria!!"
104020-183 = "Isso aí, tá na hora de dirigir~★"
104020-184 = "Ah! É a especialidade da presidente do Clube de Culinária!!"
104020-185 = "Nessas horas, a Fuuka é a pessoa certa pro trabalho."
104020-190 = "Haruna……? Você fez isso de propósito, não fez? Fez, né?"
104020-191 = "Ufufu, se foi de propósito ou não, isso não vem ao caso.#nVocê entrou no barco pra isso, não foi, Fuuka-san?"
104020-192 = "……E a comida espacial?"
104020-194 = "Enfim!#nDeixem a destruição com a gente!!"
104020-195 = "Isso aí! Contamos com vocês pro sistema de segurança~!!"
104020-197 = "Tá bom, tá bom, já entendi."
104020-198 = "A gente cuida do dispositivo leste!"
104020-199 = "Sim! É mais rápido ir daqui☆"
104020-200 = "Bora acabar com isso rapidinho.#nTemos que encontrar o Sensei e a Shiroko-chan, né."
104020-201 = "Isso aí! Eu vou dar suporte.#nVamos nessa!"
104020-204 = "Então, deixem a parte oeste com a Aris e o resto!"
104020-205 = "Espera aí……Departamento de Desenvolvimento de Jogos!?"
104020-206 = "S-Sim……! A-Acho que a gente é a equipe que tá mais perto……."
104020-207 = "Entendi……Então eu guio vocês!"
104020-209 = "Beleza, vamo lá!"
104020-213 = "M-Mana, peraí……!"
104020-218 = "Aris, tem certeza de que tá tudo bem?"
104020-219 = "Sim! Não tem problema!"
104020-220 = "E além disso, a 'Espada de Luz: Supernova de Atrahasis' ainda não quebrou."
104020-221 = "……Então o nome acabou ficando esse mesmo, é."
104020-222 = "Aham. Se puder, queria que você desse uma olhada depois, Himari-senpai.#nQuem sabe――"
104020-223 = "É, pode ser. Talvez eu consiga ajudar em alguma coisa……#nBem, toma cuidado, viu, Aris."
104020-224 = "Pode deixar! Tô indo, Himari-senpai!"
104020-228 = "Fuuka-san, está pronta?"
104020-230 = "Haa……Por que eu tenho que passar por isso……"
104020-231 = "A gente também já tá pronta~!"
104020-232 = "Poder tocar o terror na 'Arca'! Meu coração até dispara★"
104020-233 = "Se tá todo mundo aí, bora logo! Não temos tempo, caramba!!"
104020-234 = "Haa……Eu tenho que descer 1.200m, é isso……?#nBom, vou fingir que é só mais uma entrega de sempre――"
104020-235 = "Vamos lá, é hora da partida, Fuuka-san!#nQuando tudo terminar, não esquece de fazer aquele joinha bem caprichado, hein!"
104020-236 = "Não. Eu não vou fazer isso de jeito nenhum."
104020-238 = "Então……VAMOS NESSA!!"
104020-251 = "URRYAAAAAAAAAA――――!!!"
104020-253 = "Próximo episódio; Resistência (2)"