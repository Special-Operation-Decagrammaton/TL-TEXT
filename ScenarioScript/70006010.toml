[translation]
70006010-1 = "Gastronomia, biscoitos e socorro (1)"
70006010-2 = "Ah, estou com tanta fome... O que vamos comer hoje?"
70006010-3 = "Ora, já está na hora, não é?"
70006010-7 = "Eu topo qualquer coisa, contanto que possamos comer juntas!"
70006010-8 = "Nesse caso, que tal um rodízio?"
70006010-10 = "Eu estou sem dinheiro... Os rodízios não estão caros demais ultimamente?"
70006010-11 = "Procurar um lugar que seja barato, tenha porções generosas e um sabor satisfatório... é um desafio e tanto."
70006010-13 = "Ufufu★ Tive uma ideia maravilhosa."
70006010-14 = "Será que... vamos fazer aquilo?"
70006010-15 = "É, aquilo!"
70006010-16 = "Sim. Aquilo mesmo★"
70006010-18 = "Entendo, compreendo... Se vocês dizem."
70006010-19 = "Vamos pedir para a Fuuka-san hoje também?"
70006010-20 = "Não, espera aí..."
70006010-21 = "Isso não é sempre um \"pedido\", né!?"
70006010-23 = "Existem vários tipos de \"pedidos\". Não se engane, viu★"
70006010-24 = "Eu aceito qualquer coisa que a Fuuka fizer!"
70006010-26 = "Ai, ai... meu Deus..."
70006010-30 = "Ora. Um momento, por favor."
70006010-31 = "...É a Juri-san."
70006010-35 = "Sim, aqui é Kurodate. Aconteceu alguma coisa?"
70006010-39 = "Alô, Haruna-san. Hum, eu gostaria de confirmar uma coisa..."
70006010-40 = "A Fuuka-senpai está aí com vocês?"
70006010-42 = "Não, na verdade, nós estávamos prestes a ir procurá-la..."
70006010-43 = "E outra, por que está perguntando isso para nós?"
70006010-45 = "Ah, é que quando não consigo falar com ela, geralmente é porque ela está com vocês..."
70006010-46 = "Então hoje não é o caso."
70006010-47 = "Onde será que ela foi... O óleo está quase acabando..."
70006010-48 = "Ah, se for óleo, tem no fundo da prateleira, perto da entrada da cozinha."
70006010-49 = "Hum, no fundo desta prateleira..."
70006010-56 = "Achei! Muito obrigada...!"
70006010-58 = "Ué, como você sabia disso?"
70006010-59 = "Ufufu, quem sabe?"
70006010-61 = "Salvou minha vida! Graças a você, vai dar tudo certo!"
70006010-62 = "Bem, então, conto com vocês para cuidar da senpai hoje também!"
70006010-66 = "...Sinto que, naturalmente, acabamos sendo encarregadas de procurar a Fuuka."
70006010-67 = "Hum... O que será que aconteceu com a Fuuka-san?"
70006010-68 = "Será que alguém a sequestrou?"
70006010-69 = "Isso é imperdoável★"
70006010-70 = "Exato. Ninguém além de nós pode levar a Fuuka-san embora."
70006010-71 = "Sendo assim... iniciaremos as buscas para garantir a segurança da Fuuka-san."
70006010-73 = "Vamos resgatar a Fuuka e pedir para ela fazer algo delicioso!"
70006010-75 = "No fim das contas, não dá na mesma se vocês pedirem nossa ajuda!?"
70006010-76 = "Fufu. Para nós, isso é apenas um \"pedido\"."
70006010-78 = "Vamos nessa!"
70006010-92 = "Sniff, sniff..."
70006010-93 = "Ei, não estão sentindo um cheiro familiar vindo daqui?"
70006010-94 = "Sim! Com certeza é cheiro de comida gostosa!"
70006010-95 = "Tem cheiro de comida, mas... também sinto algo mais, algo familiar...?"
70006010-97 = "Talvez a Fuuka-san esteja por perto."
70006010-98 = "Uau! Junko, você consegue sentir o cheiro da Fuuka!"
70006010-99 = "N-Não tem como isso ser verdade!"
70006010-105 = "Não chego a sentir o cheiro, mas, pelas pegadas, não há dúvidas de que a Fuuka esteve aqui."
70006010-106 = "Aqui. Estas pegadas... têm o formato dos sapatos que a Fuuka costuma usar."
70006010-107 = "Você consegue saber isso com tantas pegadas por aí...?"
70006010-108 = "É só um palpite★"
70006010-110 = "Considerando o padrão de comportamento da Fuuka, é muito provável que ela esteja nesta rua comercial hoje."
70006010-111 = "As lojas que ela costuma frequentar ficam por aqui..."
70006010-112 = "Vocês são todas stalkers da Fuuka!?"
70006010-113 = "...Hm? Ué? Aquela ali é..."
70006010-119 = "Mentira!? Ela estava mesmo aqui..."
70006010-120 = "Ela está escolhendo ingredientes alegremente. #nQue bom que não há nada de suspeito."
70006010-121 = "O que faremos? Pediram para a encontrarmos, então, por precaução, devemos protegê-la?"
70006010-123 = "Sim, sim! Vamos protegê-la antes que algo perigoso aconteça!"
70006010-124 = "Ah... já estou cansada até de retrucar..."
70006010-135 = "O quê!? Como vocês chegaram aqui..."
70006010-136 = "Ora? Não precisa ficar tão surpresa..."
70006010-137 = "Somos amigas, não somos?★"
70006010-138 = "Fuuka~! O que tem para o almoço de hoje?"
70006010-140 = "A Juri estava preocupada com você."
70006010-141 = "Juri? ...Ah."
70006010-142 = "Esqueci completamente de avisar... Vou pedir desculpas depois."
70006010-143 = "Vai fazer algo mais incrível que o de costume hoje? Estou ansiosa!"
70006010-144 = "Se por incrível você quer dizer... talvez."
70006010-145 = "Se você pretende fazer piada, acho melhor não fazer isso hoje."
70006010-147 = "Ora? E por que isso—"
70006010-148 = "Ah! Todos, cuidado!!"
70006010-156 = "Cof, cof... O que aconteceu..."
70006010-170 = "Vocês são... da Sociedade de Socorro...?"
70006010-171 = "Aquela mesma, de que 'a presidente destrói e a sociedade conserta'!?"
70006010-172 = "Eu também já ouvi falar. Dizem que elas levam a pessoa até a beira da morte para depois tratá-la..."
70006010-174 = "Eeeh!? Por que a Fuuka está com esse tipo de gente?"
70006010-175 = "Onde há necessidade de socorro, lá estaremos! Fuuka, você está bem?"
70006010-177 = "Quem diria que os rumores teriam chegado até outras escolas..."
70006010-178 = "Hehehe. Mesmo que você se machuque, eu vou curar tudo perfeitamente! Não se preocupe!"
70006010-180 = "Já estão partindo do princípio de que ela vai se machucar!?"
70006010-181 = "Já ouvimos falar de vocês pela Fuuka."
70006010-182 = "Estender a mão a quem está em apuros também é uma forma de socorro..."
70006010-183 = "Aomori Mine, presidente da Sociedade de Socorro... estou pronta!"
70006010-222 = "Akari, obrigada... foi por um triz."
70006010-223 = "Hmm... elas são difíceis de lidar★"
70006010-224 = "Uwaaa! Dói! Está doendo!"
70006010-225 = "H-Haruna! O que a gente faz!?"
70006010-226 = "Isso é... sem dúvida—"
70006010-230 = "—vamos recuar!"
70006010-234 = "Concordo★"
70006010-240 = "Não vou deixar vocês escaparem...!"
70006010-251 = "Vítima localizada! Iniciando o tratamento imediatamente!"
70006010-252 = "Isso, fique parada. Se você se mexer, vai doer!"
70006010-253 = "Uwaaa! Haruna, Akari, Junko, esperem! Não me deixem para trás!!"
70006010-255 = "Desculpa! Eu não vou esquecer da Izumi!!"
70006010-256 = "Waaaaah!! Pode esperar! Mesmo que eu morra, eu vou me vingar!!"
70006010-260 = "Deixar seus companheiros para trás... que atitude inaceitável..."
70006010-261 = "Essa sua índole... eu vou corrigi-la em nome do socorro médico!"
70006010-262 = "Isso mesmo! Peguem todos eles!"
70006010-263 = "Você está mesmo dizendo isso!?"
70006010-264 = "...Ué?"
70006010-273 = "Chamar isso de socorro médico... é de cair o queixo..."
70006010-274 = "Essa ideia de que 'se curar na hora está tudo bem' é assustadora, né~★"
70006010-276 = "Junko-san, você machucou a perna, não é..."
70006010-277 = "É uma emergência! Temos que amputar logo!"
70006010-279 = "Eeeeh!? É mentira, né!? É mentira, né!?"
70006010-280 = "Ugh... se eu não estivesse com tanta fome, não teria sido pega..."
70006010-281 = "Ei!? Você não pode comer o meu braço!?"
70006010-283 = "É uma pena que as duas tenham sido eliminadas, mas agora precisamos nos reagrupar..."
70006010-287 = "...Akari-san?"
70006010-288 = "Parece que o meu limite chegou também..."
70006010-289 = "Esse ferimento que recebi protegendo a Haruna... deixo o resto com você..."
70006010-290 = "Gufu...!"
70006010-295 = "Akari-san...!!"
70006010-300 = "Só resta você agora."
70006010-304 = "Fufu... fufufu..."
70006010-305 = "Parece que resistir é inútil. Eu me rendo."
70006010-306 = "Eu já tinha ouvido rumores... mas não imaginava que fosse a esse ponto."
70006010-307 = "Como esperado da Mine, a Destruidora, eu suponho."
70006010-309 = "D-Destruidora...!? Mais um mal-entendido absurdo..."
70006010-310 = "De qualquer forma. Não se preocupem comigo, por favor, tratem os outros—"
70006010-313 = "Ah, talvez seja necessário amputar esse braço..."
70006010-314 = "Waaaaaah!!"
70006010-315 = "Hanae-chan, não as assuste. Elas vão acabar achando que você vai amputar de verdade?"
70006010-316 = "Eh? Mas é verdade, sabe?"
70006010-318 = "Aquele sorriso brilhante torna tudo ainda mais assustador!?"
70006010-319 = "Ufufu. Que grande apuro. É nessas horas que precisamos nos fortalecer..."
70006010-324 = "Ei!? Não lamba o meu braço!?"
70006010-327 = "Eu gostaria que vocês fizessem um tratamento adequado..."
70006010-328 = "Não precisa se preocupar. Elas também são membros legítimos do Esquadrão de Socorro."
70006010-329 = "Às vezes, passar por um aperto não serve como um bom remédio?"
70006010-331 = "A propósito... por que o pessoal do Esquadrão de Socorro está com a Fuuka-san?"
70006010-332 = "I-Isso é..."
