[translation]#[Texto Final. - Filipe 08/07.]
70006010-1 = "Gastronomia, Biscoitos e Socorro (1)"
70006010-2 = "Ah, que fome…… O que vamos almoçar hoje?"
70006010-3 = "Ora, já é hora, hein."
70006010-7 = "Eu como qualquer coisa, desde que seja com vocês!"
70006010-8 = "Então, um rodízio?"
70006010-10 = "Tô quebrada…… rodízio não tá caro hoje em dia?"
70006010-11 = "Procurar um lugar barato, com comida farta e gostosa…… é um desafio e tanto."
70006010-13 = "Ufufu★ Tive uma ideia."
70006010-14 = "Seria…… aquilo?"
70006010-15 = "É aquele!"
70006010-16 = "Sim. É aquele★"
70006010-18 = "Entendo, se vocês dizem……"
70006010-19 = "Vamos pedir pra Fuuka hoje de novo."
70006010-20 = "Mas isso……"
70006010-21 = "Não é sempre um 'pedido', isso!?"
70006010-23 = "Existem vários tipos de 'pedido'. Não pode confundir★"
70006010-24 = "Eu como qualquer coisa que a Fuuka fizer!"
70006010-26 = "Ahhh, credo……"
70006010-30 = "Ora. Um momento."
70006010-31 = "……É da Juri."
70006010-35 = "Sim, Kurodate. O que foi?"
70006010-39 = "Alô, Haruna.#nQueria confirmar uma coisa……"
70006010-40 = "A Fuuka-senpai está aí?"
70006010-42 = "Não, estávamos prestes a ir até aí, mas……"
70006010-43 = "E pode perguntar isso pra gente?"
70006010-45 = "Ah, quando não consigo contato, geralmente ela está com vocês……"
70006010-46 = "Hoje não, né."
70006010-47 = "Onde será que ela foi…… o óleo já tá quase acabando……"
70006010-48 = "Ah, o óleo está no armário perto da entrada da cozinha."
70006010-49 = "Nesse armário, no fundo……"
70006010-56 = "Achei! Obrigada……!"
70006010-58 = "Hã, como você sabe?"
70006010-59 = "Ufufu, quem sabe?"
70006010-61 = "Me salvou! Com isso, dá pra continuar!"
70006010-62 = "Então, hoje também, cuidem da senpai!"
70006010-66 = "……Parece que naturalmente fui encarregada de procurar a Fuuka."
70006010-67 = "Hmm…… o que será que aconteceu com a Fuuka?"
70006010-68 = "Será que alguém a sequestrou?"
70006010-69 = "Isso é imperdoável★"
70006010-70 = "Sim. Ninguém além de nós tem o direito de levar a Fuuka."
70006010-71 = "Portanto…… vamos iniciar a busca pela Fuuka para garantir sua segurança."
70006010-73 = "Vamos resgatar a Fuuka e fazer ela cozinhar algo gostoso!"
70006010-75 = "No fim, não é a mesma coisa que pedir ajuda!?"
70006010-76 = "Fufu. Nós apenas 'pedimos'."
70006010-78 = "Par-ti-u!"
70006010-92 = "Farejando……"
70006010-93 = "Ei, tô sentindo um cheiro familiar vindo daqui?"
70006010-94 = "É! Cheiro de coisa gostosa!"
70006010-95 = "Tem cheiro de comida…… mas também uma sensação familiar……?"
70006010-97 = "A Fuuka pode estar perto."
70006010-98 = "Uau! A Junko consegue sentir o cheiro da Fuuka!"
70006010-99 = "N-não é possível!"
70006010-105 = "Não sei o cheiro, mas pelas pegadas, a Fuuka passou por aqui."
70006010-106 = "Isso. Essas pegadas…… são do sapato que a Fuuka usa."
70006010-107 = "Com tanta pegada, você reconhece?"
70006010-108 = "Só por intuição★"
70006010-110 = "Pensando no padrão de comportamento da Fuuka, hoje ela deve estar na feira."
70006010-111 = "As lojas que ela frequenta ficam por aqui……"
70006010-112 = "Vocês são todas stalkers da Fuuka!?"
70006010-113 = "……Hã? Aquela ali……"
70006010-119 = "Mentira! Ela tá mesmo……"
70006010-120 = "Parece que está escolhendo ingredientes com alegria.#nQue bom que não foi um incidente."
70006010-121 = "O que fazemos? Pediram para procurá-la, e por precaução, vamos protegê-la?"
70006010-123 = "Sim, sim! Vamos proteger antes que aconteça algo!"
70006010-124 = "Haa…… já cansei de reclamar……"
70006010-135 = "O quê!? Como vocês chegaram aqui……"
70006010-136 = "Ora? Não precisa se assustar……"
70006010-137 = "Não somos amigas?★"
70006010-138 = "Fuuka~ O que a gente vai almoçar~?"
70006010-140 = "A Juri estava preocupada, sabia."
70006010-141 = "Juri?……Ah."
70006010-142 = "Esqueci completamente de avisar…… vou pedir desculpas depois."
70006010-143 = "Hoje você vai fazer algo mais especial? Tô animada!"
70006010-144 = "Especial…… até que é."
70006010-145 = "Se for pra implicar, é melhor não fazer hoje."
70006010-147 = "Ora? O que quer dizer――"
70006010-148 = "Ah! Cuidado, gente!!"
70006010-156 = "Cof, cof…… o que foi……"
70006010-170 = "Vocês são…… a Ordem dos Cavaleiros de Resgate?"
70006010-171 = "Aquela de 'a capitã destrói, a ordem cura'?"
70006010-172 = "Também já ouvi falar. Dizem que levam a pessoa à beira da morte antes de tratar……"
70006010-174 = "Hã!? Por que a Fuuka está com elas?"
70006010-175 = "Socorro onde há necessidade! Fuuka, você está bem?"
70006010-177 = "Quem diria que os boatos chegaram a outras escolas……"
70006010-178 = "Hehe. Mesmo que se machuquem, a gente cura bonitinho! Não se preocupem!"
70006010-180 = "Já parte do pressuposto que vão se machucar!?"
70006010-181 = "Já soube de vocês pela Fuuka."
70006010-182 = "Estender a mão a quem está em apuros também é resgate……"
70006010-183 = "Mine, capitã da Ordem dos Cavaleiros de Resgate…… vou!"
70006010-222 = "Akari, obrigada…… por pouco não dava."
70006010-223 = "Hmm…… são duras★"
70006010-224 = "Ahhhhh! Dói! Dói!"
70006010-225 = "H-Haruna! O que a gente faz?"
70006010-226 = "Isso…… sem dúvida――"
70006010-230 = "――é melhor recuar!"
70006010-234 = "Concordo★"
70006010-240 = "Não vão escapar……!"
70006010-251 = "Resgatados! Vou iniciar o tratamento!"
70006010-252 = "Fiquem paradas, senão vai doer!"
70006010-253 = "Ahhh! Haruna, Akari, Junko, esperem! Não me deixem――"
70006010-255 = "Desculpa! Não vou esquecer de você!!"
70006010-256 = "AHHHHH! Lembrem-se! Vou me vingar mesmo que morra!!"
70006010-260 = "Abandonar uma companheira…… que conduta deplorável."
70006010-261 = "Vamos reeducar essa índole em nome do resgate!"
70006010-262 = "Isso, isso! Vamos pegar todas!"
70006010-263 = "Você diz isso?"
70006010-264 = "……Ué?"
70006010-273 = "Isso é resgate?…… Ridículo."
70006010-274 = "A ideia de 'consertar na hora' é assustadora★"
70006010-276 = "Junko, você está machucada……"
70006010-277 = "É grave! Vamos amputar!"
70006010-279 = "Hã!? Mentira! É brincadeira, né!?"
70006010-280 = "Uu…… se não estivesse com fome, não teria sido pega……"
70006010-281 = "Ei! Meu braço não é comida!"
70006010-283 = "Que pena que duas caíram, mas vamos reorganizar……"
70006010-287 = "……Akari?"
70006010-288 = "Parece que cheguei ao meu limite……"
70006010-289 = "O ferimento que levei protegendo a Haruna…… o resto é com vocês……"
70006010-290 = "Gah……"
70006010-295 = "Akari!!"
70006010-300 = "Só sobrou você."
70006010-304 = "Fufu…… fufufu……"
70006010-305 = "Parece que não adianta resistir. Me rendo."
70006010-306 = "Já ouvi boatos, mas não imaginava que fosse tanto."
70006010-307 = "É a temida Mine, a destruidora."
70006010-309 = "D-destruidora!? Mais um mal-entendido……"
70006010-310 = "De qualquer forma, estou bem, então tratem as outras――"
70006010-313 = "Ah, talvez seja melhor amputar o braço……"
70006010-314 = "AHHHHH!!"
70006010-315 = "Hanae, não assuste. Vão achar que é sério."
70006010-316 = "Hã? Mas é sério."
70006010-318 = "Esse sorriso brilhante é o que mais assusta!"
70006010-319 = "Ufufu. É uma situação difícil. Nessas horas, é bom repor as energias……"
70006010-324 = "Ei! Não lambe meu braço!"
70006010-327 = "Quero que façam um tratamento adequado……"
70006010-328 = "Não se preocupe. Elas são legítimas cavaleiras de resgate."
70006010-329 = "De vez em quando, apanhar faz bem."
70006010-331 = "Aliás…… por que vocês estão com a Fuuka?"
70006010-332 = "B-bem……"