[translation]
700-1 = "Se coexistirmos e prosperarmos, a papelada também fica mais leve?"
700-4 = "Conselho Estudantil Geral - Sala de Recepção"
700-6 = "[ns] \"Bem, vejamos...\""
700-10 = "Ah, eh...!?"
700-11 = "[s] \"!?\""
700-12 = "A-ah, ahhhhh...!?"
700-14 = "Desculpe, desse jeito eu vou...! Kyaa!?"
700-15 = "[ns] Eu a seguro rapidamente para evitar que caia."
700-18 = "O-obrigada pela ajuda..."
700-19 = "Ah, muito obrigada... Por pouco eu não caí..."
700-20 = "......Ué?"
700-21 = "P-Professor da Schale!? D-desculpe, eu não sabia, peço perdão pela demora em me apresentar...!"
700-22 = "[s] \"Bem, vejamos...\""
700-23 = "Ah, talvez esta seja a primeira vez que me apresento formalmente... Meu nome é Ayumu, pertenço à Sala de Mediação do Comitê Administrativo do Conselho Estudantil Geral."
700-24 = "Atualmente, estou atuando como uma espécie de secretária para a Rin... ou melhor, para a Administradora."
700-25 = "[s] \"Prazer em conhecê-la, Ayumu.\""
700-26 = "O-o prazer é todo meu...! É uma honra conhecê-lo assim."
700-27 = "Já ouvi muitas histórias sobre o Professor. Digo, histórias incríveis, embora eu não saiba exatamente como descrevê-las..."
700-28 = "Eu mal dou conta de processar essa papelada toda..."
700-29 = "[s1] \"É uma quantidade enorme de documentos, quer ajuda?\"\n[s2] \"Tem algo que eu possa fazer para ajudar?\""
700-30 = "E-eh...!?"
700-31 = "E-eh...!?"
700-32 = "S-ser ajudada pelo Professor, isso é algo que eu não poderia..."
700-33 = "Não, é claro que eu ficaria feliz, mas... é que esses documentos aparecem em grande quantidade todos os dias, e eu não queria incomodá-lo..."
700-34 = "[s] \"Não, está tudo bem.\""
700-35 = "S-sério...?"
700-36 = "Sendo assim, bem... eu poderia aceitar a sua ajuda...?"
700-41 = "Então, bem... certo, você poderia começar por aqui, por favor?"
700-43 = "Assim, a partir de agora, passei a resolver diversos problemas junto com Ayumu, do Conselho Estudantil Geral."
