[translation]
700-1 = "共存共栄すれば書類もまた軽し？"
700-4 = "連邦生徒会・レセプションルーム"
700-6 = "[ns] \"えっと、たしか……。\""
700-10 = "あっ、えっ……！？"
700-11 = "[s] \"！？\""
700-12 = "あ、あわわわわっ……！？"
700-14 = "すみません、このままじゃ……！きゃぁっ！？"
700-15 = "[ns] 咄嗟に身体を支える。"
700-18 = "た、助かりました……。"
700-19 = "あ、ありがとうございます……危うく転んでしまうところでした……。"
700-20 = "……あれ？"
700-21 = "しゃ、シャーレの先生！？す、すみません、そうとも知らずご挨拶が遅くなり……！"
700-22 = "[s] \"えっと、確か……。\""
700-23 = "あ、きちんと自己紹介をするのは初めてかもしれません……私は連邦生徒会所属、行政委員会「調停室」のアユム、と申します。"
700-24 = "今はリン先輩……ではなく、行政官の秘書のような役割も務めています。"
700-25 = "[s] \"よろしくね、アユム。\""
700-26 = "こ、こちらこそ……！こうしてお会いできて、光栄です。"
700-27 = "先生のお話は、色々と伺っております。色々と凄いと申しますか、何と言えば良いのか分かりませんが……。"
700-28 = "私なんて、こういう書類の処理だけで精一杯なのに……。"
700-29 = "[s1] \"すごい量の書類だね、手伝おっか？\"\n[s2] \"何か私にできることはある？\""
700-30 = "え、えぇっ……！？"
700-31 = "え、えぇっ……！？"
700-32 = "せ、先生に助けていただくなんてそんな……！"
700-33 = "いえ、もちろん嬉しいのですが……その、これらの処理は毎日たくさん出てくるものですし、手間をかけてしまうのではないかと……。"
700-34 = "[s] \"ううん、大丈夫だよ。\""
700-35 = "そ、そうですか………。"
700-36 = "でしたら、その、お言葉に甘えさせてもらっても、良いでしょうか……？"
700-41 = "では、えっと……そうですね、まずはこの辺りをお願いしてもよろしいですか？"
700-43 = "こうして今後は連邦生徒会のアユムと一緒に、様々なことを解決していくことになった。"
