[translation]
2601506-1 = "Garota Déjà Vu"
2601506-4 = "[ns1] \"Eu aceito qualquer versão da Ichika!\"\n[ns2] \"Vou aceitar tudo!\""
2601506-7 = "……Hã, o quê?"
2601506-8 = "Ouvi errado……?"
2601506-9 = "……O que será que isso significa?"
2601506-10 = "Sensei, você disse exatamente a mesma coisa antes."
2601506-11 = "[s] \"Eu sei.\""
2601506-12 = "Eh."
2601506-13 = "……Por que você diz isso?"
2601506-14 = "Você não estava me ouvindo……?"
2601506-15 = "……Não, não é possível que o Sensei tenha feito isso."
2601506-16 = "Da última vez, eu tentei ser uma pessoa perigosa e impulsiva, mas……."
2601506-17 = "……Na verdade, eu não quero ser uma \"garota problemática\"."
2601506-18 = "[s] \"Mesmo fazendo travessuras?\""
2601506-19 = "……Bem, é verdade."
2601506-20 = "Ah…… eu já entrei na categoria de \"garota problemática\", não é?"
2601506-21 = "Isso é um problema……."
2601506-25 = "……Hã?"
2601506-26 = "Parece que virou uma entrevista de novo……!"
2601506-27 = "[s3] \"Mesmo que você não seja uma 'garota boazinha', está tudo bem.\"\n[s4] \"Não precisa esconder nada na minha frente.\""
2601506-30 = "……Ah."
2601506-31 = "E-entendi……."
2601506-32 = "Eh…… bem……."
2601506-33 = "……Haha. Que situação, hein?"
2601506-34 = "Isso significa que o Sensei vai ter que cuidar de mim ainda mais?"
2601506-35 = "Ah, eu não estou reclamando, viu!?"
2601506-36 = "Não estou reclamando, mas…… o Sensei parece estar ocupado……."
2601506-37 = "Eu fico pensando que não deveria te sobrecarregar. #nPor isso, às vezes eu tento desviar do assunto……."
2601506-38 = "No fim das contas, acabei mostrando tudo, né……."
2601506-39 = "Nossa…… que situação."
2601506-40 = "Não adianta tentar disfarçar agora, né……."
2601506-41 = "Pelo visto, eu realmente não consigo ser uma \"garota boazinha\"."
2601506-42 = "[s5] \"Eu não estou te culpando.\"\n[s6] \"Pode relaxar na minha frente, está tudo bem.\""
2601506-45 = "……É exatamente por isso."
2601506-46 = "……."
2601506-47 = "Entendido."
2601506-48 = "Se você diz……."
2601506-49 = "Acho que vou tentar ser um pouco mais honesta na frente do Sensei a partir de agora."
2601506-50 = "Mas já vou avisando――"
2601506-55 = "……A responsabilidade é toda sua, Sensei, entendeu?"
