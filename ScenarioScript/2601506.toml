[translation]
2601506-1 = "デジャヴ・ガール"
2601506-4 = "[ns1] \"私はイチカのどんな姿も！\"\n[ns2] \"全部受け入れるよ！\""
2601506-7 = "……あ、あれ？"
2601506-8 = "聞き間違い……？"
2601506-9 = "……どういうことだろ？"
2601506-10 = "先生、まったく同じこと前にも言ったっすよ。"
2601506-11 = "[s] \"わかってるよ。\""
2601506-12 = "えっ。"
2601506-13 = "……どうしてっすか？"
2601506-14 = "私の話、聞いてなかったっすか…？"
2601506-15 = "……いや、先生に限ってそんなことないっす。"
2601506-16 = "この前は、気まぐれで危ないヤツになってみたんすけど……。"
2601506-17 = "……本当は、あんまり「手のかかる子」になりたくないんす。"
2601506-18 = "[s] \"イタズラしてたのに？\""
2601506-19 = "……それは、そうなんすけど。"
2601506-20 = "あー……もう「手のかかる子」枠、入ってるっす？"
2601506-21 = "それだと困るっすね……。"
2601506-25 = "……あれ？"
2601506-26 = "また面談みたいになってるっす……！"
2601506-27 = "[s3] \"「いい子」じゃなくても、平気だよ。\"\n[s4] \"私の前では、隠さなくていいから。\""
2601506-30 = "……あー。"
2601506-31 = "そ、そうすか……。"
2601506-32 = "え……ええと……。"
2601506-33 = "……はは。参っちゃうっすね～"
2601506-34 = "これ、先生にもっと世話焼かれちゃうやつっす？"
2601506-35 = "あ、嫌じゃないっすよ！？"
2601506-36 = "嫌じゃないんすけど……先生も忙しそうなんで……。"
2601506-37 = "気を遣わせるのもなって思うんすよ。#nだから、はぐらかしてみたりするんすけど……。"
2601506-38 = "結局、いろいろ見せちゃってるっすね……。"
2601506-39 = "いや～……参ったっすね。"
2601506-40 = "いまさら誤魔化しても、しょうがないか……。"
2601506-41 = "やっぱ私、「いい子」にはなれないっすね。"
2601506-42 = "[s5] \"責めてるわけじゃないよ。\"\n[s6] \"私の前で肩の力を抜いても大丈夫。\""
2601506-45 = "……そういうとこっすよ。"
2601506-46 = "……。"
2601506-47 = "了解っす。"
2601506-48 = "そうおっしゃるなら……。"
2601506-49 = "これから先生の前では、もう少し素直になろうかな。"
2601506-50 = "言っとくっすけど――"
2601506-55 = "……全部、先生の責任っすからね？"
