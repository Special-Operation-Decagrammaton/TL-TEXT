[translation]
10045120-1 = "エピローグ;物語の幕引き"
10045120-5 = "春#nが#n炎#nゆ"
10045120-7 = "夏#nの#n終#nわ#nり#nに"
10045120-9 = "秋#nの#n風"
10045120-12 = "[log=치세 수영복]春が炎ゆ[/log]"
10045120-13 = "[log=치세 수영복]夏の終わりに[/log]"
10045120-14 = "[log=치세 수영복]秋の風[/log]"
10045120-15 = "（結局、会場全体が大爆発を起こし、海の底へ沈んだ）"
10045120-16 = "（そのままにするわけにもいかず、みんなで後片付けをすることになった……）"
10045120-18 = "会場は壊れちゃったけど……終わり良ければすべて良し！"
10045120-19 = "その通りデス！胸アツなお祭りデシタ！"
10045120-20 = "皆さん、お疲れ様でした。#n片付けまで手伝っていただいて、本当にありがとうございます。"
10045120-22 = "楽しませてもらったから、これくらいはさせてもらわないと。#n後輩が優勝してるんだし。"
10045120-24 = "優勝はアタシだけじゃないからな？"
10045120-25 = "その通り！レンゲ殿との同時優勝です！"
10045120-26 = "決着がつかなかったのだけは残念だけど、楽しいお祭りだったよ。"
10045120-27 = "イズナも同じ気持ちです！"
10045120-29 = "本戦だけでなく、エキシビションマッチも大盛り上がりでしたわ！"
10045120-30 = "たしかに。"
10045120-31 = "爆発が無かったらどんな展開になってたんだろうな。"
10045120-33 = "あら？キキョウさんはどちらに？お姿が見えませんが……。"
10045120-34 = "たぶん今ごろ、別の場所で残骸を片付けてるんじゃないかな？"
10045120-35 = "ついでに水泳の特訓もしてたりしてな。"
10045120-38 = "すー……はー……すー……。"
10045120-44 = "ぶくぶく……ぱっ……ぶくぶく……ぱっ……！"
10045120-45 = "（これがレンゲの言ってた「力を抜いて楽しむ」って感覚なのかな？）"
10045120-46 = "（よし……犬かきなら、もう完璧）"
10045120-47 = "（そろそろ次のステップに進んでも――）"
10045120-48 = "[ns1] \"すっごい上手になってるね！\"\n[ns2] \"さすが、飲み込みが早いね！\""
10045120-51 = "せっ、あぅっ、ぶくぶく……せんせっ！？"
10045120-55 = "[ns] \"だ、大丈夫！？\""
10045120-56 = "……！！"
10045120-61 = "[ns3] \"もう上がっちゃうの？\"\n[ns4] \"ごめん、邪魔しちゃったかな。\""
10045120-64 = "ちょうどこっちの片付けが終わったところだったから。#n練習もこれでおしまい。"
10045120-65 = "……何？その表情。私の恥ずかしい姿をもっと見たかったとか？"
10045120-66 = "[s5] \"恥ずかしくなんてないよ。\"\n[s6] \"キキョウは弱点を克服したんだから。\""
10045120-69 = "この程度じゃまだまだだよ。"
10045120-70 = "でも、今回の件で色々と学んだことがあるの。"
10045120-71 = "これからはできないことがあったら、意地を張らずに素直に話すようにする。"
10045120-72 = "こんな私でも、一番に応援してくれる仲間がいるって分かったから。"
10045120-73 = "言っておくけど……この話、秘密だからね？分かってる？"
10045120-74 = "[s] \"もちろん！その代わり、私とも一緒に水泳の練習をして欲しいな！\""
10045120-75 = "な、なんで……？"
10045120-79 = "……仕方ない。秘密をばらされるわけにはいかないし。"
10045120-83 = "おっ、キキョウ！先生と一緒に泳ぐのか？"
10045120-84 = "レンゲ！？"
10045120-86 = "みんなで泳ごうか。片付けも終わったし。"
10045120-87 = "ですのー！"
10045120-89 = "よし！あそこの岩まで競争だ！"
10045120-90 = "あっ、そうだ、先生。#nさっきの紹介文書いたのって先生だよな？"
10045120-91 = "覚悟しておけよ！"
10045120-92 = "あぁ、そういえば。"
10045120-93 = "[ns7] \"ふふふっ、その通り！\"\n[ns8] \"バレてしまっちゃぁ仕方ない！\""
10045120-96 = "[ns] \"捕まえられるものなら、捕まえてごらん！\""
10045120-97 = "ふふっ、その余裕、いつまでもつかな……？"
10045120-99 = "では皆様、いち、にの、さんでスタートですの！"
10045120-100 = "い～ち！"
10045120-101 = "に～！"
10045120-103 = "[ns] \"さんっ！\""
10045120-114 = "どこまでも澄んだ青い空に、じりじりと照りつける太陽。#n夏は、ここにある。"
10045120-115 = "これは、友情と青春が織りなす、ひと夏の物語――"
10045120-116 = "百ヨリ出ズル一輪ノ～いざ尋常に、水上勝負～"
