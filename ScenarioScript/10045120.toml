[translation]
10045120-1 = "Epílogo; O fechar das cortinas da história"
10045120-5 = "A#n primavera#n queima"
10045120-7 = "No#n fim#n do#n verão"
10045120-9 = "O#n vento#n de#n outono"
10045120-12 = "[log=치세 수영복]A primavera queima[/log]"
10045120-13 = "[log=치세 수영복]No fim do verão[/log]"
10045120-14 = "[log=치세 수영복]O vento de outono[/log]"
10045120-15 = "(No fim das contas, o local inteiro explodiu e afundou no fundo do mar)"
10045120-16 = "(Não podíamos deixar como estava, então acabamos tendo que limpar tudo juntos...)"
10045120-18 = "O local foi destruído, mas... tudo está bem quando termina bem!"
10045120-19 = "Exatamente! Foi um festival emocionante!"
10045120-20 = "Pessoal, obrigado pelo trabalho duro.#nMuito obrigada por me ajudarem com a limpeza."
10045120-22 = "Já que nos divertimos tanto, é o mínimo que podemos fazer.#nAfinal, uma veterana venceu."
10045120-24 = "A vitória não foi só minha, sabia?"
10045120-25 = "Exatamente! Foi uma vitória compartilhada com a senhorita Renge!"
10045120-26 = "É uma pena que não tenha havido um desfecho definitivo, mas foi um festival divertido."
10045120-27 = "Izuna sente o mesmo!"
10045120-29 = "Não apenas a competição principal, mas a partida de exibição também foi um sucesso absoluto!"
10045120-30 = "Com certeza."
10045120-31 = "Fico me perguntando como teria sido se não tivesse havido aquela explosão."
10045120-33 = "Ué? Onde está a Kikyou? Não a vejo em lugar nenhum..."
10045120-34 = "Provavelmente ela está em outro lugar limpando os destroços agora, não acha?"
10045120-35 = "E talvez aproveitando para treinar natação também."
10045120-38 = "Inspira... expira... inspira..."
10045120-44 = "Glu-glu... plop... glu-glu... plop...!"
10045120-45 = "(Será que essa é a sensação de 'relaxar e aproveitar' que a Renge mencionou?)"
10045120-46 = "(Certo... o nado cachorrinho já está perfeito)"
10045120-47 = "(Está na hora de passar para o próximo passo...)"
10045120-48 = "[ns1] \"Você melhorou muito!\"\n[ns2] \"Como esperado, você aprende rápido!\""
10045120-51 = "Se-, ahn, glu-glu... Sensei!?"
10045120-55 = "[ns] \"V-você está bem!?\""
10045120-56 = "……!!"
10045120-61 = "[ns3] \"Já vai sair?\"\n[ns4] \"Desculpe, eu te atrapalhei?\""
10045120-64 = "Eu tinha acabado de terminar a limpeza por aqui.#nO treino termina por hoje."
10045120-65 = "...O que foi? Essa expressão. Queria ver mais do meu lado vergonhoso?"
10045120-66 = "[s5] \"Não tem nada de vergonhoso nisso.\"\n[s6] \"A Kikyou superou seus pontos fracos.\""
10045120-69 = "Isso ainda não é nada."
10045120-70 = "Mas aprendi várias coisas com esse incidente."
10045120-71 = "De agora em diante, se houver algo que eu não consiga fazer, não vou ser teimosa e falarei abertamente."
10045120-72 = "Porque descobri que, mesmo sendo assim, tenho companheiros que me apoiam acima de tudo."
10045120-73 = "Só para constar... isso é um segredo, entendeu?"
10045120-74 = "[s] \"Claro! Em troca, eu gostaria que você treinasse natação comigo também!\""
10045120-75 = "P-por que...?"
10045120-79 = "...Não tem jeito. Não posso deixar que meu segredo seja revelado."
10045120-83 = "Oh, Kikyou! Vai nadar com o Sensei?"
10045120-84 = "Renge!?"
10045120-86 = "Vamos nadar todos juntos. Já terminamos a limpeza, afinal."
10045120-87 = "Com certeza!"
10045120-89 = "Certo! Vamos apostar uma corrida até aquela rocha ali!"
10045120-90 = "Ah, é verdade, Sensei.#nFoi você quem escreveu aquele texto de apresentação, não foi?"
10045120-91 = "Prepare-se!"
10045120-92 = "Ah, falando nisso."
10045120-93 = "[ns7] \"Fufufu, exatamente!\"\n[ns8] \"Já que descobriu, não tem jeito!\""
10045120-96 = "[ns] \"Se conseguir me pegar, tente!\""
10045120-97 = "Fufu, vamos ver quanto tempo essa sua calma dura..."
10045120-99 = "Muito bem pessoal, no um, dois, três, vamos começar!"
10045120-100 = "Uuum!"
10045120-101 = "Dois!"
10045120-103 = "[ns] \"Três!\""
10045120-114 = "Um céu azul infinitamente límpido e um sol escaldante.#nO verão está aqui."
10045120-115 = "Esta é uma história de um verão, tecida pela amizade e pela juventude—"
10045120-116 = "Uma Flor que Desabrocha das Cem — Que comece o duelo na água!"
