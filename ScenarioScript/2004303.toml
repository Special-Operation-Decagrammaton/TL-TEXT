[translation]
2004303-1 = "Um novo estágio"
2004303-2 = "Ano Novo significa Osechi!#nJá que estamos nessa, por que não tentar algo novo?"
2004303-3 = "[s] \"Um Osechi novo... que ideia inovadora!\""
2004303-4 = "Hehehe! Né?"
2004303-5 = "Eu sempre achei que o Osechi deixava um pouco a desejar."
2004303-6 = "Claro, não é que seja ruim, mas..."
2004303-7 = "Sabe, como não se usa fogo no Ano Novo, a maioria dos pratos são cozidos que duram bastante, né?"
2004303-8 = "Por isso, o sabor e a textura acabam ficando todos muito parecidos..."
2004303-9 = "Então, desbravar um Osechi com um sabor diferente é uma verdadeira aventura gastronômica!"
2004303-10 = "[s] \"Falando nisso, estávamos em uma aventura...\""
2004303-11 = "Não pode esquecer disso, Sensei!"
2004303-12 = "As sobras do Osechi a gente transforma em Chirashi-zushi ou coloca no curry..."
2004303-13 = "Dá para comer de um jeito gostoso com receitas reaproveitadas, mas..."
2004303-14 = "Isso não se aplica só ao Osechi, né?"
2004303-15 = "Por isso, este ano eu decidi buscar o meu próprio Osechi!"
2004303-16 = "Batizado de: Osechi Especial Estilo Izumi!"
2004303-17 = "[s] \"A Izumi fez tudo sozinha?\""
2004303-21 = "Eu tentei fazer isso, me esforcei bastante, mas..."
2004303-22 = "Foi um pouco difícil..."
2004303-23 = "Mas, pesquisando várias coisas..."
2004303-24 = "Eu descobri que tem uma loja que faz Osechi sob encomenda!"
2004303-25 = "Pedi para eles prepararem o meu Osechi exclusivo lá!"
2004303-26 = "Hoje em dia tem de tudo, né! Parece que a Haruna também usa esse serviço."
2004303-27 = "Sendo assim, vamos lá, Sensei!"
2004303-32 = "[ns] \"Izumi, o Osechi não vai fugir, sabia!?\""
2004303-41 = "Que lugar com um clima agradável!"
2004303-42 = "Ah, aqui não é uma loja especializada em Osechi, viu?"
2004303-43 = "É um lugar que faz vários tipos de pratos!"
2004303-48 = "Shishidou Izumi-sama, correto?#nO seu pedido de ＜Osechi Especial Estilo Izumi＞ está pronto."
2004303-49 = "Vou trazer agora mesmo, por favor, aguarde um momento."
2004303-55 = "Então, por favor, aproveite com calma."
2004303-59 = "[ns] \"É um Osechi impressionante.\""
2004303-63 = "Dizem que o Osechi deve ser apreciado com os olhos, então eu caprichuei!"
2004303-64 = "É bom quando a aparência é bonita, né!#nHehehe, vamos comer!"
2004303-65 = "Então... começando pelo feijão preto!"
2004303-72 = "Hmm, que delícia!"
2004303-73 = "Parece um feijão preto comum, né?"
2004303-74 = "Na verdade, isso aqui..."
2004303-75 = "Eu pedi para fazerem com chocolate 99% cacau e vinagre!"
2004303-79 = "[ns] \"P-por que 99% cacau...?\""
2004303-83 = "Chocolate 99% cacau é preto, né?"
2004303-84 = "O próximo é o camarão cozido!#nEmbora eu tenha pedido para inventarem no tempero..."
2004303-85 = "Em vez de shoyu e açúcar, pedi para cozinharem com anchovas!"
2004303-90 = "Uau! O salgado ficou muito intenso e delicioso!"
2004303-91 = "Sensei, você gosta de Kamaboko vermelho e branco?"
2004303-92 = "Toma, aqui! Esse Kamaboko foi feito com morango!"
2004303-93 = "[s] \"Por que morango!?\""
2004303-97 = "Morango é rosa, né?"
2004303-98 = "O sabor peculiar da massa de peixe misturado com o agridoce do morango...#nHmm! É um novo continente de sabores!"
2004303-99 = "O próximo é... batata-doce e castanhas cozidas em calda."
2004303-104 = "O picante do gengibre é super estimulante!"
2004303-105 = "Como o gengibre é amarelo, as cores combinam e fica lindo, né!"
2004303-106 = "Sim, Sensei! Também tem raiz de lótus cozida com leite condensado!#nComo tem \"lótus\" no nome, achei que o sabor combinaria!"
2004303-107 = "E também, ovas de arenque! Misturei com conserva de lula e queijo azul! E um toque secreto de canela...#nCanela e flocos de bonito não são um pouco parecidos?"
2004303-108 = "[s] \"E-eu vou aceitar apenas a intenção! Já estou cheio...\""
2004303-109 = "Que pena. E olha que o sabor é interessante..."
2004303-110 = "Mudando de assunto, sobremesa!#nNada melhor do que algo doce e fofinho, né?#nO item mais fofinho do osechi é o datemaki, não é?"
2004303-111 = "Por isso, o datemaki estilo Izumi é enrolado com tinta de lebre-do-mar e sorvete!"
2004303-112 = "[s] \"Eu entendo o sorvete, mas... lebre-do-mar!?\""
2004303-113 = "Olha só, Sensei!#nO contraste entre o roxo e o amarelo é sublime... ué, espera?"
2004303-117 = "...Hmm, talvez esteja um pouco diferente do que eu imaginei."
2004303-118 = "Mas o sorvete deixa o sabor da tinta de lebre-do-mar mais suave, então..."
2004303-119 = "Dá a sensação de estar comendo doce japonês com chá verde!"
2004303-121 = "(Depois disso, Izumi continuou comendo enquanto explicava o osechi alegremente...)"
2004303-122 = "(...E, enquanto fazia isso, Izumi parecia muito feliz.)"
2004303-126 = "Ufa! Comi tudo!#nEstou super satisfeita!"
2004303-127 = "Foi ótimo ter pedido sob medida!"
2004303-128 = "Ah... desculpe."
2004303-129 = "Fiquei tão concentrada em comer que acabei te deixando de lado, Sensei..."
2004303-130 = "[s1] \"Só de ver você comendo com tanto gosto, já estou satisfeito!\"\n[s2] \"Tiro o chapéu para a sua busca por novos sabores, Izumi!\""
2004303-133 = "Hmm, mas mesmo assim..."
2004303-137 = "Da próxima vez, vou preparar algo feito por mim mesma!"
2004303-141 = "Pode esperar, Sensei!"
2004303-143 = "(Sinceramente, seria mentira dizer que não estou preocupado...)"
2004303-144 = "(...Mas, pelo menos, o sorriso da Izumi estava radiante...)"
