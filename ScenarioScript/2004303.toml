[translation]
2004303-1 = "新たなステージ"
2004303-2 = "お正月といえばおせち！#nせっかくなら、新しいものに挑戦したいよね？"
2004303-3 = "[s] \"新しいおせち……斬新な発想だね！\""
2004303-4 = "えへへっ！そうでしょ！"
2004303-5 = "おせちって、ちょっと物足りないなぁって思ってたんだ。"
2004303-6 = "もちろん、美味しくないってわけじゃないんだけど……。"
2004303-7 = "ほら、新年に火を使わないようにって、長持ちする煮物が中心じゃない？"
2004303-8 = "だから、味とか食感がどれも近くなっちゃうというか……。"
2004303-9 = "それなら、ひと味違うおせちを開拓するのは、美食の冒険なんじゃないかなって！"
2004303-10 = "[s] \"そういえば冒険中だったね……。\""
2004303-11 = "忘れちゃダメだよ、先生！"
2004303-12 = "おせちの残りはちらし寿司にしたり、カレーに入れたり……。"
2004303-13 = "リメイクレシピで美味しく食べられるけど……。"
2004303-14 = "それって、おせちに限らないじゃん？"
2004303-15 = "だから、今年は私だけのおせちを追求しようと思って！"
2004303-16 = "名付けて、イズミ流おせちスペシャル！"
2004303-17 = "[s] \"イズミが一人で作ったの？\""
2004303-21 = "そうしようと思って頑張ったんだけど……。"
2004303-22 = "ちょっと難しくて……。"
2004303-23 = "でも、色々調べてたら……。"
2004303-24 = "おせちをオーダーメイドで作ってくれるお店があったの！"
2004303-25 = "そこで私だけのおせちを作ってもらったんだ！"
2004303-26 = "最近は色々あるんだね～！ハルナも使ってるらしいよ。"
2004303-27 = "というわけで、行こうか先生！"
2004303-32 = "[ns] \"イズミ、おせちは逃げないよ！？\""
2004303-41 = "いい雰囲気のお店だね～！"
2004303-42 = "あ、ここはおせち料理専門店じゃないよ？"
2004303-43 = "色んな料理を作ってくれるお店なんだ！"
2004303-48 = "[ruby=ししどう]獅子堂[/ruby]イズミ様ですね？#nご注文の＜イズミ流おせちスペシャル＞のご準備が整いました。"
2004303-49 = "すぐにお持ちいたしますので、少々お待ちください。"
2004303-55 = "それでは、どうぞごゆっくりお楽しみください。"
2004303-59 = "[ns] \"立派なおせちだね。\""
2004303-63 = "おせちは目で楽しむものって言うから、こだわったんだ～！"
2004303-64 = "見た目が綺麗だと嬉しいよね！#nえへへ、いただきます！"
2004303-65 = "それじゃあ……黒豆から！"
2004303-72 = "ん～美味しい！"
2004303-73 = "見た目は普通の黒豆に見えるでしょ？"
2004303-74 = "実はこれ……。"
2004303-75 = "カカオ99%のチョコレートとお酢で作ってもらったの！"
2004303-79 = "[ns] \"ど、どうしてカカオ99％……？\""
2004303-83 = "カカオが99%のチョコって黒いでしょ？"
2004303-84 = "次は、海老の養老煮！#nといっても味付けを工夫してもらって……。"
2004303-85 = "醤油と砂糖の代わりに、アンチョビで煮込んでもらったんだ！"
2004303-90 = "わ！塩気がすごく効いてて美味しい！"
2004303-91 = "先生は紅白かまぼこ好き？"
2004303-92 = "はい、これ！このかまぼこはイチゴで作ったんだ！"
2004303-93 = "[s] \"なんでイチゴ！？\""
2004303-97 = "イチゴはピンク色でしょ？"
2004303-98 = "練り物独特の味にイチゴの甘酸っぱさが加わって……#nん～！味の新大陸だよ～！"
2004303-99 = "次はね～、サツマイモと栗の甘露煮。"
2004303-104 = "生姜のピリッとした辛さがすっごく刺激的！"
2004303-105 = "生姜は黄色いから色味もそろって綺麗だよね！"
2004303-106 = "はい、先生！練乳で煮たレンコンもあるよ！#n名前に「れん」が入ってるから味もあうと思って！"
2004303-107 = "それと、数の子！イカの塩辛とブルーチーズを混ぜてみたの！隠し味にシナモンを……#nシナモンと鰹節ってちょっと似てるじゃない？"
2004303-108 = "[s] \"き、気持ちだけもらっておくね！お腹いっぱいで……。\""
2004303-109 = "残念。面白い味なのに……。"
2004303-110 = "気を取り直して、デザート！#nやっぱふわっとした甘いものが良いよね。#nおせちの中で一番ふんわりしてるのって伊達巻でしょ？"
2004303-111 = "だから、イズミ流伊達巻にはアメフラシの墨とアイスクリームを一緒に巻いてるの！"
2004303-112 = "[s] \"アイスクリームは分かるけど、アメフラシ……！？\""
2004303-113 = "ほら、先生！#n紫と黄色のコントラストが絶妙で……って、あれ？"
2004303-117 = "……うーん、ちょっと想像とは違うかも。"
2004303-118 = "でも、アメフラシの墨の味をアイスクリームがまろやかにしてくれるから……。"
2004303-119 = "和菓子と抹茶を一緒に食べてるような感覚になれるんだ～！"
2004303-121 = "（その後も、イズミは楽しそうにおせちの解説をしながら食べていった……）"
2004303-122 = "（……そうしている時のイズミはとても楽しそうだった）"
2004303-126 = "ふぅ～！食べた食べた！#n大満足！"
2004303-127 = "オーダーメイドしてよかった～！"
2004303-128 = "あ……ごめんなさい。"
2004303-129 = "食べることに夢中で、先生のこと置き去りにしちゃってたね……。"
2004303-130 = "[s1] \"美味しそうに食べてるイズミを見てるだけで満足してるよ！\"\n[s2] \"イズミの料理への探究心には脱帽だよ！\""
2004303-133 = "うーん、でも……。"
2004303-137 = "次はちゃんと手作りの料理を作ってみるね！"
2004303-141 = "期待してて、先生！"
2004303-143 = "（正直、不安じゃないと言ったら嘘になるけど……）"
2004303-144 = "（……少なくとも、イズミの笑顔は輝いていた……）"
