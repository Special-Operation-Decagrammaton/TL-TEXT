[translation]
10016085-2 = "Depois da batalha de cavalaria, a única grande competição que resta é o revezamento entre escolas, né?"
10016085-3 = "Sim, é isso mesmo. #nAs competições que têm um grande impacto na classificação geral já terminaram quase todas."
10016085-4 = "Quem diria que a Millennium, que sempre brigava pelo último lugar, estaria em uma posição de disputar o título geral... #nEste Festival Esportivo de Hauran está bem diferente dos anos anteriores, tem muita coisa estranha acontecendo, não acha?"
10016085-5 = "Ouvi dizer que o Sensei do Schale ajustou o conteúdo das competições para que as alunas que não são boas em esportes também pudessem se divertir... Será que é por causa disso?"
10016085-6 = "Também conta muito o fato de Gehenna e Trinity, as favoritas ao título da batalha de cavalaria, terem se enfrentado cedo nas eliminatórias e sido eliminadas."
10016085-7 = "Agora, até contra Hyakkiyako, nós deveríamos conseguir vencer...!"
10016085-8 = "Certo! Vamos aproveitar esse embalo na próxima batalha de cavalaria e garantir a vitória geral da Millennium—"
10016085-9 = "Hm? O que é aquilo..."
10016085-19 = "Pronto, pronto! Com isso, a preparação está perfeita!"
10016085-20 = "O ninjutsu que completamos com a ajuda da senhorita Hasumi... a Arte da Construção de Fortalezas!"
10016085-21 = "S-será que isso é realmente seguro...?"
10016085-22 = "Está bem instável, parece que se alguém empurrar um pouquinho, vai cair na hora..."
10016085-23 = "Balança, balança~"
10016085-24 = "Está tudo bem. As duas nas laterais têm papéis muito importantes."
10016085-25 = "Kaede-san e Izuna-san, fiquem atentas aos inimigos que se aproximam pelos lados e por trás, e avisem a Chise-san."
10016085-26 = "Entendido, tarefa de reconhecimento... Deixe comigo!"
10016085-27 = "Se é assim, pode deixar! #nComparado a perseguir besouros voadores, isso é fácil!"
10016085-28 = "Tem uma cavalaria muito estranha em Hyakkiyako..."
10016085-29 = "Parece que vai desmoronar se a gente empurrar um pouquinho..."
10016085-30 = "Certo! Vamos começar derrubando eles!"
10016085-31 = "Entendido! Vamos lá!"
10016085-35 = "Senhorita Chise! Inimigos se aproximando pelo nordeste!"
10016085-36 = "Ah, uaa... J-já começou...?"
10016085-42 = "É-é enorme...!?"
10016085-43 = "Não dava para perceber de longe, mas... desse jeito, não tem como alcançar!"
10016085-48 = "T-tudo bem! Se a gente usar o impacto do corpo para desequilibrar o centro de gravidade da cavalaria...!"
10016085-50 = "Chapéu~"
10016085-51 = "Peguei~."
10016085-52 = "Hã, quando foi que isso aconteceu!?"
10016085-53 = "Droga! E eu achei que a gente ia ganhar!"
10016085-55 = "Como esperado da senhorita Chise! Foi como um relâmpago!"
10016085-56 = "Hehe! A veterana Chise é a campeã do torneio de cartas de Hyakkiyako, afinal!"
10016085-57 = "Ninguém ganha de mim quando o assunto é agilidade nas mãos!"
10016085-59 = "O cavaleiro é um papel perigoso por ser o alvo dos inimigos, mas isso também significa que é a peça fundamental para roubar os chapéus deles..."
10016085-60 = "Embora o equilíbrio das laterais esteja um pouco instável, foi a decisão certa deixar a Chise-san como cavaleira."
10016085-61 = "Veterana Chise, vem vindo gente pela direita!"
10016085-65 = "Se a gente aproveitar a brecha e atacar de surpresa—"
10016085-71 = "O segundo~"
10016085-72 = "Não acredito...!"
10016085-74 = "Estamos na final da batalha de cavalaria entre Millennium e Hyakkiyako, e que cena curiosa estamos presenciando!"
10016085-75 = "A competidora Chise, de Hyakkiyako, roubou dois chapéus da Millennium logo no início!"
10016085-76 = "Apesar da postura desequilibrada, a cavalaria da Millennium não consegue enfrentar essa defesa que parece uma fortaleza e está sendo derrotada um a um!"
10016085-77 = "Para a Millennium, que ainda está em uma disputa acirrada pelo título geral, esta será uma partida que eles não podem perder! #nVamos ver, qual das escolas vai conquistar esta final!"
10016085-79 = "Desse jeito, a gente não vai conseguir fazer nem cócegas em Hyakkiyako..."
10016085-80 = "Maki! Ajuda a gente!!"
10016085-81 = "Hm, eu?"
10016085-82 = "Ei, eu só estou participando no lugar da veterana Hare, sabe?"
10016085-83 = "Além disso, eu também não sou lá muito boa em esportes..."
10016085-84 = "Mas a Maki não é a hacker da "Veritas"?"
10016085-85 = "Não tem como usar alguma tecnologia da Veritas para contra-atacar?"
10016085-89 = "Eita... se a Chihiro-senpai descobrir, ela vai me dar uma bronca de novo..."
10016085-90 = "Se você insiste tanto assim... bem, não tem jeito, né?"
10016085-91 = "Vou usar a 'Athena 3', que peguei emprestada da Hare-senpai!"
10016085-93 = "Ugh... sem que a gente percebesse, só sobrou a nossa cavalaria de Hyakkiyako..."
10016085-94 = "E mesmo assim, ainda restam três cavalarias inimigas!"
10016085-95 = "Contando os chapéus que pegamos... um, dois... hum..."
10016085-96 = "A-ainda deve restar apenas uma cavalaria!"
10016085-97 = "...Ué? A conta não bate. #nOra, o que será que está acontecendo?"
10016085-102 = "Ahaha, finalmente percebeu?"
10016085-103 = "Isso é uma projeção holográfica da nossa cavalaria!"
10016085-104 = "Usamos a nova função de projeção de hologramas instalada na 'Athena 3' para criar esses bonecos!"
10016085-105 = "Ihihi, será que conseguem distinguir qual é o verdadeiro?"
10016085-107 = "O que é isso! Usar equipamentos durante a competição não é contra as regras!?"
10016085-108 = "...Infelizmente, como não previmos que alunos usariam equipamentos, não podemos dizer que é uma infração."
10016085-109 = "Pelo regulamento, o uso de armas e explosivos durante a batalha de cavalaria é proibido. #nMas não há nada escrito proibindo o uso de hologramas..."
10016085-110 = "No entanto, quem diria que existia um método desses... #nParece que precisaremos adicionar regras sobre hologramas no próximo Festival Esportivo de Kourin."
10016085-111 = "Criar dois clones ao mesmo tempo... como esperado da Millennium! #nNão podemos baixar a guarda até o fim!"
10016085-112 = "Eles provavelmente vão atacar logo para não nos dar tempo de identificar o verdadeiro."
10016085-113 = "Izuna-san, Tsukuyo-san. É hora de mostrar as habilidades especiais de vocês!"
10016085-114 = "A-as nossas habilidades especiais...?"
10016085-115 = "Sim... é o... Ninjutsu."
10016085-116 = "...! #nSim! É o Ninjutsu!"
10016085-117 = "...Ninjutsu? Isso é tipo mágica, né? #nParece ser divertido!"
10016085-118 = "Então, que comece o duelo: os hologramas da Millennium contra o Ninjutsu de Hyakkiyako — vamos ver quem engana melhor o adversário!"
10016085-119 = "Vamos lá, vamos atacar de três direções ao mesmo tempo!"
10016085-123 = "Ugh..."
10016085-124 = "N-Ninjutsu estilo Tsukuyo!"
10016085-129 = "...Te peguei! #nCom isso, a vitória da Millennium é—"
10016085-133 = "Ué? Por que tem um bicho de pelúcia de raposa aqui...?"
10016085-134 = "Onde está o chapéu...?"
10016085-139 = "—Aqui."
10016085-140 = "A-ah! Você estava aí!?"
10016085-147 = "Ugh, fui derrotada..."
10016085-148 = "...E este é o último."
10016085-149 = "Conseguimos! Eu sabia que a Chise-senpai conseguiria!"
10016085-150 = "Au... por pouco eu não deixo cair..."
10016085-152 = "Como esperado da Tsukuyo-dono! Reproduzir a Técnica da Cigarra perfeitamente naquele instante... a Izuna está emocionada!"
10016085-153 = "Se o tempo para trocar a Chise-dono pelo bicho de pelúcia de raposa tivesse atrasado um pouco, #ncom certeza teriam pegado o chapéu!"
10016085-155 = "Foi alto, foi divertido."
10016085-156 = "A-ah, ah... n-não tenho confiança para fazer de novo..."
10016085-157 = "M-mais importante, Chise-senpai... acho que meu cabelo vai cair... poderia me soltar agora...?"
10016085-159 = "A competidora Chise, com movimentos acrobáticos, roubou com sucesso o chapéu da competidora Maki!"
10016085-160 = "Com a queda da última cavalaria da Millennium no confronto anterior..."
10016085-161 = "A vitória vai para a equipe de Hyakkiyako!"
10016085-163 = "...Isso!"
10016085-167 = "Ehem... isso não é do meu feitio. #nEu perdi um pouco a compostura."
10016085-171 = "Hasumi-dono, Hasumi-dono! A Izuna se esforçou muito!"
10016085-172 = "Esta vitória é toda graças à estratégia brilhante que a Hasumi-dono pensou!"
10016085-173 = "Sim. Eu estava assistindo o tempo todo. #nTodas vocês tiveram um desempenho realmente maravilhoso."
10016085-174 = "Quando a presidente caiu, eu achei que já era o fim..."
10016085-175 = "E-eu, alguém como eu, receber um papel para desempenhar..."
10016085-176 = "Muito, muito obrigada... snif, buááá..."
10016085-177 = "Claro que é uma honra ter sido útil, mas isso só foi possível graças ao esforço de todos vocês."
10016085-178 = "Sou grata à senhorita Hasumi!#nAlém disso, Hasumi, foi muito divertido!"
10016085-179 = "Mesmo sendo de escolas diferentes, o momento em que unimos forças, aproveitamos nossas qualidades e conquistamos a vitória foi..."
10016085-180 = "Foi como me sentir a protagonista de uma obra do diretor Shiba Inu Wanzou!"
10016085-181 = "Quero competir ao lado da senhorita Hasumi novamente!"
10016085-182 = "Mas... eu sou uma aluna de Trinity, sabe...?"
10016085-183 = "Da próxima vez, podemos acabar lutando como inimigas."
10016085-184 = "Mesmo assim, não tem problema!"
10016085-185 = "Se for para estar com a senhorita Hasumi, não importa se somos inimigas ou aliadas!#nCom certeza será divertido! Ehehe."
10016085-186 = "Isso mesmo! Eu também me diverti muito!"
10016085-187 = "E-eu também me diverti...!"
10016085-191 = "Fufu, é mesmo? Fico feliz em ouvir isso."
10016085-192 = "......Mas não pense que vou pegar leve por causa disso, viu?"
10016085-193 = "Como aluna de Trinity, sempre darei o meu melhor nas competições."
10016085-195 = "Sim! Izuna também lutará com força total!"
10016085-196 = "P-por favor, conto com isso!"
10016085-197 = "Nihihi, até a próxima!"
