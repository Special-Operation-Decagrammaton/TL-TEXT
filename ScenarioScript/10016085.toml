[translation]
10016085-2 = "騎馬戦が終わったら、残りの大きな競技は学園対抗リレーくらいだよね？"
10016085-3 = "うん、そうだよ。#n総合優勝に大きな影響があるような競技はほぼ終わったし。"
10016085-4 = "まさか万年最下位争いをしていたミレニアムが、総合優勝を狙える位置にいるなんて……。#n今回の[ruby=こうりんたいさい]晄輪大祭[/ruby]は例年と違って、ちょっと変なところが多いよね。"
10016085-5 = "聞いた話だけど、シャーレの先生が運動を苦手とする生徒たちも楽しめるように、競技の内容を調整してくれたんだって……そのおかげかな？"
10016085-6 = "騎馬戦の優勝候補筆頭だったゲヘナとトリニティが、予選で早々にぶつかり合っていなくなったのも大きいね。"
10016085-7 = "今なら百鬼夜行程度、私たちでも勝てるはず……！"
10016085-8 = "よし！次の騎馬戦もこの勢いで、ミレニアムの総合優勝を――"
10016085-9 = "ん？あれは一体……。"
10016085-19 = "さささっ！これで準備は完璧ですね！"
10016085-20 = "ハスミ殿のお力を借りて完成した忍法……築城の術！"
10016085-21 = "ほ、本当に大丈夫でしょうか……？"
10016085-22 = "だいぶ不安定ですし、ちょっと押されたら、すぐ倒れちゃいそうですけど……。"
10016085-23 = "ゆ～らゆら～"
10016085-24 = "大丈夫です。左右のお二人には、大切な役割がありますから。"
10016085-25 = "カエデさんとイズナさんは横と後ろから接近する敵に気を配って、チセさんに場所を報告してください。"
10016085-26 = "索敵の任ですね……分かりました！"
10016085-27 = "それなら任せて！#n飛んでくカブトムシを追いかけるのに比べたら簡単なんだから！"
10016085-28 = "なんか百鬼夜行にすごい変な騎馬がいるんだけど……。"
10016085-29 = "ちょっと押したらすぐに崩れちゃいそうだね……"
10016085-30 = "よし！まず最初にあいつから倒しちゃおっか！"
10016085-31 = "合点承知！行くよ！"
10016085-35 = "チセ殿！北北東から敵が接近中です！"
10016085-36 = "う、うあぁ……も、もう始まったんですか……？"
10016085-42 = "お、大きい……！？"
10016085-43 = "遠くで見た時は分からなかったけど……これじゃあどうやっても手が届かないよ！"
10016085-48 = "だ、大丈夫！体当たりで騎馬の重心を崩せば……！"
10016085-50 = "ぼうし～"
10016085-51 = "げっと～。"
10016085-52 = "えっ、いつの間に！？"
10016085-53 = "くぅ！勝てると思ったのに！"
10016085-55 = "流石はチセ殿ですね！電光石火の如くでした！"
10016085-56 = "ふっふーん！チセ先輩は百鬼夜行・カルタ最強決定戦のチャンピオンだからね！"
10016085-57 = "腕の動きなら誰にも負けないよ！"
10016085-59 = "騎手は敵に狙われる危険な役割ですが、それはつまり敵の帽子を奪う重要な存在でもあるということ……。"
10016085-60 = "両翼のバランスこそ少し不安定ですが、騎手にチセさんをお任せして正解でしたね。"
10016085-61 = "チセ先輩、右から来るよ！"
10016085-65 = "隙を突いて、奇襲をかければ――"
10016085-71 = "ふたつめ～"
10016085-72 = "ダメかっ……！"
10016085-74 = "ミレニアム対百鬼夜行の騎馬戦決勝ですが、何とも不思議な光景です！"
10016085-75 = "百鬼夜行のチセ選手が、開始早々ミレニアムから帽子を2つ奪い取りました！"
10016085-76 = "体勢こそアンバランスですが、まるで砦のような防御力を前にミレニアムの騎馬は太刀打ちできず各個撃破されています！"
10016085-77 = "まだまだ熾烈な総合優勝争いをしているミレニアムとしては、負けられない1戦となりそうですね！#nさあ、この決勝戦を制するのは果たしてどちらの学園でしょうか！"
10016085-79 = "このままじゃ百鬼夜行にまるで歯が立たないよ……。"
10016085-80 = "マキ！助けて！！"
10016085-81 = "ん、私？"
10016085-82 = "いや～私はハレ先輩の代わりに出場してるだけだよ？"
10016085-83 = "それに私も特別運動が得意ってわけじゃないし……"
10016085-84 = "でも、マキはあの「ヴェリタス」のハッカーなんでしょ？"
10016085-85 = "何かヴェリタスの技術で対抗できたりしない？"
10016085-89 = "え～……チヒロ先輩にバレたらまた怒られるんだけど……。"
10016085-90 = "そこまでいうなら……まぁ、仕方ないよね。"
10016085-91 = "ハレ先輩から借りた、この「アテナ3号」を使うよ！"
10016085-93 = "うぅ……いつの間にか百鬼夜行の騎馬は私たちだけ……。"
10016085-94 = "それなのに、まだ相手の騎馬が3つも残ってるよ！"
10016085-95 = "私たちが取った帽子を数えると……1つ、2つ……えっと……。"
10016085-96 = "の、残りの騎馬は1つのはずです！"
10016085-97 = "……あれ？数が合いませんよ？#nややっ、これは一体どういうことでしょう？"
10016085-102 = "あはは、やっと気付いたの？"
10016085-103 = "これは私たちの騎馬を投影したホログラム映像だよ！"
10016085-104 = "「アテナ3号」に新しく搭載されたホログラム投射機能を使って、ダミーを生成したんだ！"
10016085-105 = "いひひ～、どれが本物か見分けられるかな？"
10016085-107 = "なにそれ！競技中に道具を使うなんて反則じゃないの！？"
10016085-108 = "……残念ながら、そもそも道具を使う生徒の想定をしていないので、反則とは言えません。"
10016085-109 = "規定上、騎馬戦の競技中に銃や爆弾の使用は禁止されています。#nですが、ホログラムの使用を禁止するとは書かれていませんので……。"
10016085-110 = "しかし、まさかそんな方法があるなんて……。#n次回の晄輪大祭ではホログラム関連の規定を追加する必要がありそうですね。"
10016085-111 = "同時に二つの分身を生み出すとは……流石ミレニアムですね！#n最後まで油断できません！"
10016085-112 = "向こうは本物を見分ける時間を与えないためにも、すぐに仕掛けてくるはずです。"
10016085-113 = "イズナさん、ツクヨさん。お二人の特技をお見せする時です！"
10016085-114 = "わ、私たちの特技、ですか……？"
10016085-115 = "はい……それは――忍術です。"
10016085-116 = "……！#nはい！忍術です！"
10016085-117 = "……忍術？それってマジックみたいなものだよね？#nなんか面白そうじゃん！"
10016085-118 = "それじゃあ、ミレニアムのホログラムと百鬼夜行の忍術――どちらが相手の目を欺けるか勝負だね！"
10016085-119 = "さぁさぁ、三方向から同時に攻めるよー！"
10016085-123 = "うぅ……。"
10016085-124 = "つ、ツクヨ流忍術！"
10016085-129 = "……捕まえたっ！#nこれでミレニアムの勝――"
10016085-133 = "あれ？なんでこんなところにキツネのぬいぐるみが……？"
10016085-134 = "帽子はどこに……？"
10016085-139 = "――こっち。"
10016085-140 = "う、うわっ！そっちにいたの！？"
10016085-147 = "うぅ、やられちゃった……。"
10016085-148 = "……これで最後。"
10016085-149 = "やったぁ！チセ先輩ならできるって信じてたよ！"
10016085-150 = "あぅ……もう少しで落としちゃうところでした……。"
10016085-152 = "さすがツクヨ殿！空蝉の術をあの一瞬で完璧に再現するとは……イズナ感激です！"
10016085-153 = "チセ殿とキツネのぬいぐるみをすり替えるタイミングが少しでも遅れていたら、#nきっと帽子を取られていました！"
10016085-155 = "たかいたか～い、面白かった。"
10016085-156 = "は、はは……ま、またできる自信はないです……。"
10016085-157 = "そ、それよりチセ先輩……髪が抜けそうなんですが……そろそろ離していただけると……。"
10016085-159 = "チセ選手、曲芸のような動きを見せて、見事マキ選手の帽子を奪いました！"
10016085-160 = "先ほどの攻防でミレニアム最後の騎馬が落ちたので……"
10016085-161 = "百鬼夜行チームの勝利です！"
10016085-163 = "……よし！"
10016085-167 = "こほん……私らしくありませんね。#n少し冷静さを欠いておりました。"
10016085-171 = "ハスミ殿、ハスミ殿～！イズナ、頑張りました～！"
10016085-172 = "この勝利は全て、ハスミ殿が考えてくださった奇策のおかげです！"
10016085-173 = "はい。ずっと見ていましたよ。#n皆さん、本当に素晴らしい活躍でした。"
10016085-174 = "部長が倒れちゃった時は、もうダメだと思ってたのに……"
10016085-175 = "わ、私みたいな存在にも役割をくださって……。"
10016085-176 = "本当に、本当にありがとうございます……うぅ、うわ～ん……。"
10016085-177 = "もちろんお役に立てたのは光栄ですが、皆さんの頑張りがあってこそですから。"
10016085-178 = "ハスミ殿に感謝です！#nそれにイズナ、とっても楽しかったです！"
10016085-179 = "学園こそ違いますが、力を合わせて長所を活かし、見事勝利を手にした瞬間は……"
10016085-180 = "まるで柴犬ワン蔵監督の作品に登場する主人公のような気分でした！"
10016085-181 = "またハスミ殿と一緒に競技がしたいです！"
10016085-182 = "ですが……私はトリニティの生徒ですよ……？"
10016085-183 = "次は敵として戦うことになるかもしれません。"
10016085-184 = "それでも大丈夫ですっ！"
10016085-185 = "ハスミ殿と一緒にできるなら、敵でも味方でも関係ありません！#nきっと楽しいです！えへへっ。"
10016085-186 = "そうそう！私もすっごく楽しかったよ！"
10016085-187 = "わ、私も楽しかったです……！"
10016085-191 = "ふふ、そうですか。それは良かったです。"
10016085-192 = "……だからといって、手加減はしませんよ？"
10016085-193 = "トリニティの生徒として、競技では常にベストを尽くしますからね。"
10016085-195 = "はいっ、イズナも全力で戦います！"
10016085-196 = "ぜ、ぜひ、お願いします！"
10016085-197 = "にひひっ、またね～！"
