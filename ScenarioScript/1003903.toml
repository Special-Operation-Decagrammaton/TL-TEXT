[translation]
1003903-1 = "RABBIT4, em posição."
1003903-2 = "（Como de costume, enquanto eu terminava o trabalho acumulado no Schale...）"
1003903-6 = "Ah, Sensei..."
1003903-10 = "Au..."
1003903-16 = "Uuu..."
1003903-20 = "[ns1] \"...Ah, Miyu.\"\n[ns2] \"Desculpe, nem percebi quando você chegou...\""
1003903-21 = "Ah, sim, eu cheguei agora pouco..."
1003903-22 = "Ah, sim, eu cheguei agora pouco..."
1003903-23 = "Até o Sensei demorar para me notar..."
1003903-24 = "Será que minha presença está ficando ainda mais fraca...?"
1003903-25 = "Até meus amigos próximos estão começando a não me notar..."
1003903-26 = "E quando alguém finalmente percebe, geralmente já terminaram de formar os times, então eu me sinto mal por isso..."
1003903-27 = "...No fim, eu vou acabar morrendo sozinha, sem ficar na memória de ninguém."
1003903-28 = "[s] \"Desculpe, da próxima vez vou te notar mais rápido. Aliás...\""
1003903-29 = "...Os passos, você diz?"
1003903-30 = "Ah, isso provavelmente é porque eu tenho o hábito de andar na ponta dos pés."
1003903-31 = "Mesmo quando não estou em missões de infiltração, acabou virando um costume..."
1003903-32 = "Mesmo quando tento fazer barulho de propósito, não consigo."
1003903-33 = "Talvez isso também esteja contribuindo para a minha falta de presença..."
1003903-34 = "Mas virou um hábito e é difícil de mudar..."
1003903-35 = "[s] \"Que tal usar um guizo para fazer barulho quando você andar?\""
1003903-36 = "...Um guizo?"
1003903-37 = "É, verdade... Se fizer barulho toda vez que eu me mover, talvez as pessoas ao redor notem..."
1003903-38 = "Ah, falando nisso, acho que tem um na minha bolsa..."
1003903-42 = "[ns] \"Miyu, espere um pouco. Isso é...\""
1003903-44 = "...?"
1003903-45 = "É uma coleira que eu usava em um gatinho que eu cuidava antes... Algum problema?"
1003903-46 = "Quando troquei por uma nova, guardei a antiga... Pronto, agora está bom."
1003903-47 = "Se eu usar essa coleira, será que vão me notar...!"
1003903-48 = "[s] \"Bem, talvez, mas... sabe...\""
1003903-49 = "Fufu... Estou ficando animada só de pensar."
1003903-50 = "Sensei, vamos testar logo...!"
1003903-54 = "[ns] \"Miyu, pare!!!\""
1003903-58 = "...Ei. Aquela garota não está usando uma coleira de animal de estimação?"
1003903-59 = "Aquele atrás dela é o Sensei do Schale...?"
1003903-60 = "Falando nisso, ouvi um boato de que \"os alunos chamados como assistentes do Schale precisam ir imediatamente, não importa o que aconteça\"..."
1003903-61 = "...Será que \"assistente\" significa isso?"
1003903-62 = "Que horror... Coitadas de todas elas..."
1003903-63 = "Se-Sensei, olhe...! Todos estão prestando atenção em mim...!"
1003903-64 = "Ninguém está me ignorando...!"
1003903-65 = "Como o Sensei disse, graças ao guizo, minha presença..."
1003903-66 = "[s] \"Isso é bom, mas vamos parar com esse método agora mesmo...\""
1003903-67 = "Vo-você quer que eu tire? Po-por que...?"
1003903-68 = "Finalmente parei de ser ignorada..."
1003903-69 = "Sensei, você quer que eu continue sendo ignorada...?"
1003903-70 = "Ei, ela acabou de dizer que vai \"tirar\"..."
1003903-71 = "Ela parece que vai chorar a qualquer momento, o que a gente faz...?"
1003903-72 = "Então o \"Sensei\" é um cara perigoso..."
1003903-73 = "[s] \"Por favor, tire essa coleira logo...! Pelo menos tente outro método...!\""
1003903-75 = "Depois disso, expliquei a situação para a Miyu e ela tirou a coleira."
1003903-76 = "Por um tempo, sempre que eu saía, acabava recebendo olhares frios..."
