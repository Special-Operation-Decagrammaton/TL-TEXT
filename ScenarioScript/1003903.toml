[translation]
1003903-1 = "RABBIT4、出動します"
1003903-2 = "（いつも通り、シャーレの溜まった仕事を片付けていると……）"
1003903-6 = "あ、先生……"
1003903-10 = "あう……"
1003903-16 = "うぅ……"
1003903-20 = "[ns1] \"……あ、ミユ。\"\n[ns2] \"ごめん、いつの間に……。\""
1003903-21 = "あ、はい、先ほど来ました……。"
1003903-22 = "あ、はい、先ほど来ました……。"
1003903-23 = "先生ですら、気が付くまで時間がかかるだなんて……"
1003903-24 = "私、さらに影が薄く……？"
1003903-25 = "仲の良い友達も、どんどん私に気が付かなくなっちゃうし……"
1003903-26 = "後から誰かが気付いてくれても、その時はもう大体チームを組み終わった後とかで、何だか申し訳なくて……"
1003903-27 = "……やっぱり私は誰の記憶にも残らないまま、ひとりぼっちで寂しく死ぬだけなんです。"
1003903-28 = "[s] \"ごめん、次はもっと早く見つけるね。ところで……\""
1003903-29 = "……足音、ですか？"
1003903-30 = "あ、それは多分……私がもともと、忍び足で歩く癖があるからだと思います。"
1003903-31 = "潜入任務の時でなくても、何だか癖になっていて……"
1003903-32 = "わざと足音を立てようとしても、上手くいかないんです。"
1003903-33 = "もしかしたら、それも私の影の薄さに拍車を……"
1003903-34 = "でも、癖になっちゃって中々直らないし……"
1003903-35 = "[s] \"歩いたときに音が鳴るように、鈴を身に着けてみるのはどう？\""
1003903-36 = "……鈴、ですか？"
1003903-37 = "た、確かに……動くたびに音が鳴れば、周りの人も気づいてくれるかも……。"
1003903-38 = "あれ、そういえばカバンの中に確か……。"
1003903-42 = "[ns] \"ミユ、ちょっと待って。それは……\""
1003903-44 = "……？"
1003903-45 = "以前お世話していた、猫さんに着けていた首輪ですが……どうかしましたか？"
1003903-46 = "新しいものに交換した時に、古いのをそのまま持ってたので……これでよし、っと。"
1003903-47 = "こうやって首輪をしていれば、気が付いてくれるでしょうか……！"
1003903-48 = "[s] \"えっと、それはそうかもだけど、その……。\""
1003903-49 = "ふふっ……何だかもう、今から楽しみです。"
1003903-50 = "先生、さっそく試しに行ってみましょう……！"
1003903-54 = "[ns] \"ミユ、ストップ！！！\""
1003903-58 = "……ねえ。あの子、ペット用の首輪つけてない？"
1003903-59 = "後ろにいるのって、シャーレの先生……？"
1003903-60 = "そういえば噂で、「シャーレの当番として呼ばれた生徒は、何があってもすぐに行かないといけない」とか……"
1003903-61 = "……もしかして、「当番」ってそういう意味？"
1003903-62 = "ひどい……みんな可哀想……"
1003903-63 = "せ、先生、見てください……！みなさん、私の方に注目してくれてます……！"
1003903-64 = "誰にも無視されてません……！"
1003903-65 = "先生の言う通り、鈴のおかげで存在感が……！"
1003903-66 = "[s] \"それは良かったんだけど、この方法は今すぐやめよう……。\""
1003903-67 = "こ、これを脱ぐってことですか？ど、どうして……？"
1003903-68 = "せっかく無視されなくなったのに……"
1003903-69 = "先生は、私に無視されていてほしいんですか……？"
1003903-70 = "ねえ、今あの子が「脱ぐ」って……"
1003903-71 = "今にも泣いちゃいそうじゃん、どうする……？"
1003903-72 = "「先生」ってヤバい人なんだ……。"
1003903-73 = "[s] \"お願いだから早めにその首輪を……！せめて他の方法で……！\""
1003903-75 = "その後ミユに説明して、首輪は外してもらった。"
1003903-76 = "しばらくの間、外に出ると冷たい視線を浴びることになった……"
