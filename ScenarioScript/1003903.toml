[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1003903-1 = "RABBIT 4, Em Ação" 
1003903-2 = "（Enquanto eu, como de costume, limpava os relatórios acumulados da Schale...）" 
1003903-6 = "Ah, Sensei..." 
1003903-10 = "Auu..." 
1003903-16 = "Uuuh..." 
1003903-20 = "[ns1] \"......Ah, Miyu.\"\n[ns2] \"Me desculpe, desde quando você está aí...?\"" 
1003903-21 = "A-Ah, eu cheguei tem um tempinho..." 
1003903-22 = "A-Ah, eu cheguei tem um tempinho..." 
1003903-23 = "Se até mesmo o Sensei demora tanto para perceber a minha presença..." 
1003903-24 = "Isso quer dizer que a minha presença está ainda mais fraca...?" 
1003903-25 = "Desse jeito, até as minhas amigas mais próximas vão parar de notar que eu estou lá..." 
1003903-26 = "Mesmo que percebam depois, geralmente as equipes já estão formadas, e eu me sinto tão culpada que..." 
1003903-27 = "......No fim das contas, eu vou morrer sozinha, sem deixar nem ao menos uma memória no coração de ninguém." 
1003903-28 = "[s] \"Me desculpe, vou tentar te achar mais rápido da próxima vez. Falando nisso...\"" 
1003903-29 = "......Passos?" 
1003903-30 = "A-Ah, isso provavelmente é... porque eu tenho a mania de andar sem fazer barulho." 
1003903-31 = "Isso virou um hábito meu, não apenas durante missões de infiltração..." 
1003903-32 = "Mesmo que eu tente fazer barulho ao andar, não consigo." 
1003903-33 = "Talvez isso também piore a minha falta de presença..." 
1003903-34 = "Mas, já virou um hábito tão forte que não consigo mudar fácil..." 
1003903-35 = "[s] \"Que tal tentar amarrar um sininho em você, para fazer barulho ao andar?\"" 
1003903-36 = "......Um sininho?" 
1003903-37 = "V-Verdade... Se fizesse um barulho toda vez que eu me movesse, as pessoas ao redor talvez me notassem..." 
1003903-38 = "Ah, se bem me lembro, acho que tenho algo na minha bolsa..." 
1003903-42 = "[ns] \"Miyu, espera um pouquinho. Isso é...\"" 
1003903-44 = "......?" 
1003903-45 = "Esta coleira pertencia ao gatinho que eu cuidava... tem algum problema?" 
1003903-46 = "Quando nós compramos uma nova pra ele, acabei ficando com a velha... prontinho." 
1003903-47 = "Usando essa coleira, as pessoas com certeza vão me notar...!" 
1003903-48 = "[s] \"B-Bom, com certeza vão, m-mas...\"" 
1003903-49 = "Fufu... Estou até ansiosa." 
1003903-50 = "Sensei, vamos lá fora testar se funciona...!" 
1003903-54 = "[ns] \"Miyu, PARA TUDO!!!\"" 
1003903-58 = "......Ei, aquela menina não tá usando uma coleira de pet?" 
1003903-59 = "Aquele adulto ali atrás não é o Sensei da Schale...?" 
1003903-60 = "Falando nisso, rolava um boato de que 'a aluna chamada como ajudante de turno da Schale tem que ir imediatamente, não importa o que aconteça'..." 
1003903-61 = "......Não me diga que isso que significa ser a 'Ajudante de Turno'?" 
1003903-62 = "Que crueldade... Coitadas dessas meninas..." 
1003903-63 = "S-Sensei, olhe...! Todos estão olhando pra mim...!" 
1003903-64 = "Ninguém está me ignorando...!" 
1003903-65 = "Como o Sensei disse, graças ao sininho eu tenho presença...!" 
1003903-66 = "[s] \"Que bom que você tem, mas pelo amor de tudo vamos parar com isso agora...\"" 
1003903-67 = "V-Você quer que eu tire isso? M-Mas por quê...?" 
1003903-68 = "Justo quando finalmente pararam de me ignorar..." 
1003903-69 = "Sensei, você quer que eu seja ignorada de novo...?" 
1003903-70 = "Ei, você ouviu que ela acabou de dizer 'tirar'..." 
1003903-71 = "Ela parece que vai começar a chorar, e agora...?" 
1003903-72 = "E pensar que o 'Sensei' era uma pessoa tão perigosa..." 
1003903-73 = "[s] \"Por favor, tira essa coleira o mais rápido possível...! Pelo menos vamos tentar outro método...!\"" 
1003903-75 = "Depois de muita explicação, finalmente convenci a Miyu a tirar a coleira." 
1003903-76 = "Mas, durante um bom tempo depois disso, sempre que saíamos juntos, recebíamos olhares bem frios..." 