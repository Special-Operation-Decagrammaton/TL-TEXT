[translation]
2001603-1 = "A Fräulein sedutora"
2001603-6 = "（Quando ela se aproximou suavemente, o doce perfume de flores fez cócegas em minhas narinas）"
2001603-7 = "（De sua boca, escapa uma voz gentil）"
2001603-8 = "……Sensei, por que não desiste logo? Você sabe melhor do que ninguém que continuar assim só vai te trazer sofrimento, não é?"
2001603-9 = "Eu estou dizendo isso para o seu próprio bem, Sensei."
2001603-10 = "Por que não para de se esforçar tanto e vem logo para o meu lado……?"
2001603-11 = "（O rosto e as mãos de Iroha se aproximam lentamente. Sinto como se pudesse até sentir o calor do corpo dela……）"
2001603-12 = "[ns1] \"Iroha, eu já disse.\"\n[ns2] \"O trabalho está um caos agora, então espere um pouco!!\""
2001603-13 = "Tsc……."
2001603-14 = "Tsc……."
2001603-15 = "[s3] \"Ela nem se deu ao trabalho de esconder o estalar de língua…….\"\n[s4] \"Aliás, Iroha, o que você veio fazer aqui hoje……?\""
2001603-16 = "Não é nada demais, só estou cumprindo minhas tarefas conforme as instruções do Pandemonium."
2001603-17 = "Não é nada demais, só estou cumprindo minhas tarefas conforme as instruções do Pandemonium."
2001603-18 = "Eu já mencionei antes, não foi? Sobre o assunto de \"atrair o Sensei para o Pandemonium\"."
2001603-19 = "[s5] \"Eu ouvi sobre isso, mas preciso que me deixe trabalhar…….\"\n[s6] \"Será que esse comportamento de sabotagem tem algum significado profundo……?\""
2001603-20 = "……Eh?"
2001603-21 = "……Eh?"
2001603-22 = "……Bem, vamos deixar por isso mesmo então."
2001603-23 = "[s] \"Essa foi a reação de quem não estava pensando em nada!!\""
2001603-24 = "Que falta de educação. Você acha mesmo que eu agiria sem pensar?"
2001603-25 = "Eu tenho meus motivos, é claro."
2001603-26 = "Para começar, eu vim aqui sob o pretexto de trabalhar para o Pandemonium, mas na verdade é para vadiar."
2001603-27 = "[s] \"Ela acabou de dizer 'pretexto'.\""
2001603-28 = "Mas, mesmo estando aqui vadiando, tem alguém bem ao meu lado trabalhando arduamente."
2001603-29 = "Até quem é preguiçoso tem seu próprio orgulho."
2001603-30 = "Então, pensei em fazer você vadiar também. Se não, seria como se……."
2001603-31 = "……Como se só eu fosse a inútil aqui, não é?"
2001603-32 = "[s] \"Tem tanta coisa para questionar aqui……!\""
2001603-33 = "Sensei, você não acha que existem coisas que são mais bonitas justamente por não serem ditas?"
2001603-34 = "[s7] \"Desculpe interromper sua expressão facial, mas.\"\n[s8] \"Não estou conseguindo acompanhar seus comentários.\""
2001603-35 = "Bem, de qualquer forma…… Sensei, você quer que eu trabalhe seriamente?"
2001603-36 = "Bem, de qualquer forma…… Sensei, você quer que eu trabalhe seriamente?"
2001603-37 = "Se é isso que você deseja, não é impossível, mas……."
2001603-44 = "……Sensei. Existe mesmo a necessidade de você sofrer tanto assim?"
2001603-45 = "Eu sei, sei o quanto você passa por dificuldades diariamente……."
2001603-46 = "As ordens irracionais do Conselho Estudantil Geral, os incidentes que ocorrem por todo o Kivotos, correndo de um lado para o outro dia e noite por causa disso……."
2001603-47 = "Sempre preso entre problemas e encrenqueiros…… Nós, que somos como gerentes de nível médio, sempre acabamos nos dando mal."
2001603-48 = "Mesmo que a gente se esforce até os ossos, poucas pessoas reconhecem isso, não é……."
2001603-49 = "Já que chegamos a esse ponto, por que não jogamos tudo para o alto juntos?"
2001603-50 = "Jogar tudo para o alto, deixar para depois, fingir que não viu……."
2001603-51 = "Se você tentar uma vez, talvez se sinta bem, sabe? Vamos, Sensei."
2001603-52 = "Vamos vadiar juntos?"
2001603-53 = "[s] \"É a tentação do demônio…….\""
2001603-54 = "Não é nada tão exagerado assim, apenas……."
2001603-55 = "Apenas……."
2001603-56 = "[s] \"……Apenas?\""
2001603-57 = "……Estou cansada, esse tipo de coisa também cansa."
2001603-59 = "Tudo se tornou um incômodo. O que foi aquilo agora…… aliás, o que eu estou fazendo?"
2001603-60 = "Voltar para a realidade me deixou exausta……."
2001603-61 = "As missões do Pandemonium não importam mais, estou com vontade de vadiar e ler livros o dia todo……."
2001603-62 = "Por que será que estou fazendo isso...?"
2001603-63 = "……。"
2001603-64 = "Isso tudo é culpa sua, Sensei."
2001603-65 = "[s] \"Isso não é injusto!?\""
2001603-66 = "Fiquei com preguiça, então vamos sair para jantar logo. Encontrei um restaurante que parece ser bom outro dia."
2001603-67 = "Se comermos algo gostoso, talvez você se sinta um pouco melhor."
2001603-68 = "[s] \"É, você tem razão...\""
2001603-77 = "[ns] \"Para que lado devemos ir?\""
2001603-78 = "……。"
2001603-79 = "Fufu..."
2001603-80 = "[s] \"...Iroha?\""
2001603-81 = "Você caiu na armadilha, Sensei."
2001603-82 = "O fato de você ter vindo até aqui significa que você seguiu o meu plano e deixou o trabalho de lado."
2001603-83 = "[s] \"...Ah.\""
2001603-84 = "Missão cumprida."
2001603-85 = "Bem, não tenho certeza se consegui te convencer totalmente, mas acho que cumprir a missão até certo ponto já está bom. Então, Sensei, que tal nós dois, esses gerentes intermediários que vivem querendo fugir do trabalho, irmos jantar algo gostoso?"
2001603-86 = "[s] \"E-eu fui enganado...\""
2001603-88 = "(Assim, fui levado pela Iroha, comemos um jantar delicioso perto do Schale e voltamos.)"
