[translation]
2001603-1 = "誘惑するフロイライン"
2001603-6 = "（ふわりと彼女が近づくと、甘い花の香りが鼻孔をくすぐった）"
2001603-7 = "（その口からは、優しい声が漏れ出る）"
2001603-8 = "……先生、もう諦めちゃいません？そんなことを続けても苦しくなるだけだって、先生が一番よく分かっているでしょう？"
2001603-9 = "私は、先生のために言ってるのですよ？"
2001603-10 = "もう我慢するのはやめて、こっちに来てしまいませんか……？"
2001603-11 = "（イロハの顔が、手が、ゆっくりと近づく。その体温すら感じられそうになり……）"
2001603-12 = "[ns1] \"イロハ、言ったでしょ。\"\n[ns2] \"今仕事が修羅場だからちょっと待ってて！！\""
2001603-13 = "ちっ……。"
2001603-14 = "ちっ……。"
2001603-15 = "[s3] \"舌打ちを隠す気がない……。\"\n[s4] \"というかイロハ、今日は何をしに……？\""
2001603-16 = "大したことではありません、万魔殿で指示された通りに業務をこなしてるだけです。"
2001603-17 = "大したことではありません、万魔殿で指示された通りに業務をこなしてるだけです。"
2001603-18 = "以前にもお伝えしたでしょう、「先生をおびき寄せて万魔殿に引き入れる」という件ですよ。"
2001603-19 = "[s5] \"それは聞いたけど、仕事はさせてほしい……。\"\n[s6] \"もしかしてこの妨害行為には、何か深い意味が……？\""
2001603-20 = "……え？"
2001603-21 = "……え？"
2001603-22 = "……ではまあ、そういうことにしておきましょう。"
2001603-23 = "[s] \"何も考えてなかった時の反応！！\""
2001603-24 = "失礼な、この私が考え無しに行動を起こすとお思いですか？"
2001603-25 = "理由ならきちんとあります。"
2001603-26 = "そもそも私はここに、万魔殿の仕事という建前でサボりに来てるわけです。"
2001603-27 = "[s] \"「建前」って言っちゃったよ。\""
2001603-28 = "ですがこうしてサボっているというのに、すぐ横で誰かさんが一生懸命働いているわけです。"
2001603-29 = "めんどくさがりにはめんどくさがりなりの、プライドというものがあります。"
2001603-30 = "そこで同じようにサボらせてみようと思ったわけです。そうでないと、まるで何だか……。"
2001603-31 = "……私だけダメなやつみたいじゃないですか。"
2001603-32 = "[s] \"ツッコミどころが多い……！\""
2001603-33 = "先生、口にしないからこそ美しいこともあると思いませんか。"
2001603-34 = "[s7] \"良い表情のところ申し訳ないんだけど。\"\n[s8] \"ツッコミが追い付かないです。\""
2001603-35 = "まあ、とにかく……先生としては、私に真面目に働いてほしいということですか？"
2001603-36 = "まあ、とにかく……先生としては、私に真面目に働いてほしいということですか？"
2001603-37 = "それがお望みなら、できなくもありませんが……。"
2001603-44 = "……先生。先生だけがここまで苦労する必要、ありますか？"
2001603-45 = "私は知ってます、先生が普段どれだけ大変なのか……。"
2001603-46 = "連邦生徒会から下りてくる理不尽な指示、キヴォトス各地で起きる事件、それらのために昼夜を問わず走り回り……。"
2001603-47 = "問題と問題児だらけの中で、いつも板挟み状態になって……私たちみたいな中間管理職が、いつも辛い目に遭ってばかり。"
2001603-48 = "骨身を削ってみたところで、それを分かってくれる人は少ないですよね……。"
2001603-49 = "こうなったらいっそのこと、一緒に全部投げ出してしまいませんか？"
2001603-50 = "全てを投げ出して、後回しにして、見なかったことにする……。"
2001603-51 = "一度やってみたら、気持ち良いかもしれませんよ？ねえ、先生"
2001603-52 = "一緒に、サボりません？"
2001603-53 = "[s] \"悪魔の誘惑だ……。\""
2001603-54 = "そんなに大げさなことではありません、ただ……。"
2001603-55 = "ただ……。"
2001603-56 = "[s] \"……ただ？\""
2001603-57 = "……疲れましたね、こういうのも。"
2001603-59 = "もう全てがめんどくさいです、何ですか今のは……っていうか私何してるんですかね。"
2001603-60 = "現実に戻ったらどっと疲れました……。"
2001603-61 = "万魔殿の任務とかもうどうでも良いですね、サボって一日中本でも読みたい気分です……。"
2001603-62 = "なんでこんなことをしてるんでしょうか……。"
2001603-63 = "……。"
2001603-64 = "これも全部、先生のせいです。"
2001603-65 = "[s] \"理不尽では！？\""
2001603-66 = "めんどくさくなったので、そろそろ夕食でも食べに行きましょう。この間ちょうど良さそうなレストランを見つけたので。"
2001603-67 = "美味しい物でも食べれば、少しは気分もマシになるでしょう。"
2001603-68 = "[s] \"それもそうだね……。\""
2001603-77 = "[ns] \"どっちの方に行けば良いの？\""
2001603-78 = "……。"
2001603-79 = "ふふっ……。"
2001603-80 = "[s] \"……イロハ？\""
2001603-81 = "引っ掛かりましたね、先生。"
2001603-82 = "ここまで出てきたということは、私の策略に乗ってお仕事をサボったということ。"
2001603-83 = "[s] \"……あ。\""
2001603-84 = "作戦成功です。"
2001603-85 = "まあ懐柔できたかは怪しいですが、ある程度任務達成で良いでしょう。さあ先生、サボりがちな中間管理職同士、美味しい夕食を食べに行きましょうか？"
2001603-86 = "[s] \"や、やられた……。\""
2001603-88 = "（そうしてイロハに連れ出され、シャーレの近くで美味しい夕食を食べて帰った）"
