[translation]
2002003-1 = "O experimento da hacker genial"
2002003-7 = "Muito obrigado por colaborar com o trabalho da Millennium hoje!"
2002003-8 = "Como esperado do Sensei do Schale!#nGraças a você, terminamos o trabalho sem problemas!"
2002003-9 = "[s] \"Não, não foi nada.\""
2002003-13 = "Bem, peço desculpas, mas vou indo nessa!"
2002003-14 = "Espero que possamos trabalhar juntos novamente!"
2002003-18 = "(Ao terminar o trabalho da Millennium conforme o planejado, o ponteiro do relógio marcava 1 hora)"
2002003-19 = "[ns] \"Ainda faltam 2 horas para o meu compromisso com a Himari... Preciso ir logo.\""
2002003-25 = "(Assim que o ponto de ônibus apareceu...)"
2002003-30 = "(O ônibus que eu pretendia pegar chegou exatamente ao ponto)"
2002003-31 = "[ns] \"Aquele ônibus!\""
2002003-43 = "[ns] \"Haa... haa... consegui chegar a tempo...\""
2002003-48 = "(Foi quando eu embarquei no ônibus por um triz e estava recuperando o fôlego)"
2002003-52 = "Obrigado por embarcar. A próxima parada é... \"Prédio do Clube da Millennium\"..."
2002003-56 = "...Peço desculpas. A próxima parada é \"Porto Leste da Millennium\", pararemos no \"Porto Leste da Millennium\"."
2002003-60 = "[ns] \"...Porto Leste? Isso não é o oposto do prédio do clube...?\""
2002003-61 = "Então, partindo em direção ao leste!#nQue você tenha uma ótima viagem!"
2002003-64 = "[ns] \"Ei, espere um pouco!?\""
2002003-72 = "Chegamos ao \"Porto Leste da Millennium\". Por favor, cuidado para não esquecer seus pertences."
2002003-73 = "Pedimos a todos os passageiros que desembarquem rapidamente.#nPara evitar atrasos no itinerário, o sistema de ejeção forçada será ativado, então—"
2002003-74 = "[ns] \"Uau!\""
2002003-78 = "(No meio do anúncio, fui forçado a sair do ônibus)"
2002003-79 = "Siga em direção ao leste. Uma pessoa nobre está esperando por você.#nTenha um bom dia!"
2002003-80 = "[ns] \"E-espere!\""
2002003-87 = "[ns] \"O que significa isso...\""
2002003-88 = "(De repente, encontrei um ônibus estranho e fui deixado em um lugar que não conheço)"
2002003-92 = "[ns] \"Não é hora de ficar parado. Tenho um compromisso com a Himari.\""
2002003-102 = "(Comecei a correr em direção ao prédio do clube onde a Himari estava esperando)"
2002003-103 = "(No entanto, eu ainda não sabia na época)"
2002003-107 = "(Que isso era apenas o prólogo de uma série de fenômenos inexplicáveis que estavam por vir...)"
2002003-116 = "(Enquanto corria para o prédio do clube, o esforço inesperado drenou minha energia e fiquei com sede...)"
2002003-117 = "[ns] \"Vou comprar algo para beber na máquina de venda automática...\""
2002003-123 = "(Com a intenção de me refrescar, apertei o botão de um refrigerante gelado)"
2002003-129 = "[ns] \"Ah, quente! P-por quê!?\""
2002003-133 = "[ns] \"... 'Oshiruko Explosivo Divino'... ?\""
2002003-134 = "(Em vez do refrigerante gelado que eu deveria ter recebido, saiu um oshiruko fervendo...)"
2002003-135 = "(Desta vez, um anúncio misterioso veio da máquina)"
2002003-136 = "\"Evite coisas geladas e escolha as quentes.\""
2002003-137 = "\"Para você, um oshiruko super doce! Aproveite!\""
2002003-138 = "[ns] \"Mas eu quero beber algo gelado agora!?\""
2002003-141 = "(Sem desistir, tentei apertar botões diferentes... mas só continuava saindo oshiruko)"
2002003-150 = "[ns] \"Haa, haa... por causa dessa luta inútil com a máquina, perdi tempo...!\""
2002003-151 = "(Quando tentei atravessar a ponte que era a rota mais curta para o prédio do clube...)"
2002003-155 = "Aviso aos moradores.#nEsta ponte está bloqueada no momento. Por favor, utilize a rota alternativa."
2002003-156 = "[s] \"O quê!? Por que logo agora...!?\""
2002003-157 = "Aviso aos moradores.#nEsta ponte está bloqueada no momento. Por favor, utilize a rota alternativa."
2002003-161 = "Aviso aos moradores.#nEsta ponte está bloqueada no momento. Por favor, utilize a rota alternativa."
2002003-162 = "... \"Evitar a beira da água trará sorte.\""
2002003-163 = "[s] \"...Sorte?\""
2002003-164 = "...Por favor, utilize a rota alternativa.#nAviso, pessoa suspeita detectada. Reforços foram solicitados."
2002003-168 = "[ns] \"Uau! O que está acontecendo!?\""
2002003-175 = "（Fugi da enorme quantidade de drones que avançavam e saí do local apressadamente）"
2002003-176 = "（Depois disso, continuei me envolvendo em situações estranhas por onde passava）"
2002003-186 = "Vá para o leste. Uma pessoa nobre está à sua espera."
2002003-187 = "Afaste-se das coisas frias e escolha as quentes..."
2002003-188 = "Evitar beiras de água trará sorte..."
2002003-189 = "Na direção leste..."
2002003-190 = "Coisas frias..."
2002003-191 = "Beiras de água..."
2002003-199 = "[ns] \"...Foi isso que aconteceu. Acho que hoje não é meu dia de sorte.\""
2002003-200 = "Entendo, foi assim então..."
2002003-204 = "...Fufufu."
2002003-205 = "[s] \"...Himari?\""
2002003-206 = "Como foi para você, Sensei? #nDepois de passar por tais eventos durante o dia de hoje..."
2002003-207 = "Você acha que sua sorte melhorou um pouco que seja?"
2002003-208 = "Ou talvez, tenha sido um dia maravilhoso?"
2002003-209 = "[s] \"Hm? O que você quer dizer com isso...?\""
2002003-210 = "Fufu, vou revelar o segredo."
2002003-211 = "Vamos, veja isto."
2002003-218 = "（Com uma expressão satisfeita, Himari abriu uma revista）"
2002003-219 = "[s] \"Um especial do Departamento de Imprensa de Chronos... 'Cantinho do Horóscopo de Hoje'?\""
2002003-223 = "（Onde Himari abriu a página dobrada e passou o dedo, estava escrito o seguinte）"
2002003-224 = "（\"Você que faz aniversário em dezembro é especial! Desafio para melhorar a sorte de hoje!\"...）"
2002003-225 = "\"Vá para o leste. Uma pessoa nobre está à sua espera. Assim, sua sorte irá melhorar.\""
2002003-226 = "\"Afaste-se das coisas frias e escolha as quentes. Assim, sua sorte irá melhorar.\""
2002003-227 = "\"Evite beiras de água. Assim, sua sorte irá melhorar.\""
2002003-228 = "\"Para não irritar as pessoas, evite palavras e ações impensadas. Assim, sua sorte irá melhorar.\""
2002003-229 = "De acordo com o especial do Departamento de Imprensa de Chronos, quem faz aniversário em dezembro pode melhorar a sorte fazendo isso!"
2002003-233 = "[ns] \"Não me diga que tudo o que aconteceu hoje foi...\""
2002003-234 = "Sim, foi tudo um experimento prático que realizei hackeando as coisas."
2002003-235 = "Meu aniversário é em dezembro, então eu queria testar."
2002003-236 = "...No entanto, como sou uma garota linda e doente, não consigo sair muito."
2002003-237 = "Então, digamos que eu usei você, Sensei, como meu substituto."
2002003-238 = "[s] \"Foi tudo culpa da Himari!? E ainda por cima um experimento de horóscopo!?\""
2002003-239 = "No processo do experimento, tanto eu quanto você, Sensei, devemos ter chegado a uma conclusão."
2002003-240 = "Fufu. Como esperado do Sensei. #nParece que você tem o mesmo raciocínio que uma super garota linda e genial como eu—"
2002003-244 = "[ns] \"...Himari.\""
2002003-245 = "...Sim?"
2002003-249 = "[ns] \"Hoje é hora de uma bronca.\""
2002003-253 = "A-ah, veja bem, isso é..."
2002003-259 = "[ns] \"Esteja preparada.\""
2002003-260 = "E-entendo..."
2002003-261 = "Na verdade, o especial dizia: \"Para não irritar as pessoas, evite palavras e ações impensadas. Assim, sua sorte irá melhorar\", não é?"
2002003-262 = "Sendo assim, existe a possibilidade de que esse horóscopo estivesse correto...? #nRealmente, o horóscopo é um mundo profundo."
2002003-263 = "[ns] \"A culpa é da Himari, entendeu!?\""
2002003-265 = "（Depois disso, dei uma bronca completa na Himari por mais de uma hora）"
