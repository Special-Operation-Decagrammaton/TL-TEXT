[translation]
2002003-1 = "天才ハッカーの実験"
2002003-7 = "本日はミレニアムの業務にご協力いただき、ありがとうございました！"
2002003-8 = "流石はシャーレの先生ですね！#nおかげでスムーズに仕事が終わりました！"
2002003-9 = "[s] \"いえ、とんでもありません。\""
2002003-13 = "では、すみませんが今日はお先に！"
2002003-14 = "ぜひまたよろしくお願いいたします！"
2002003-18 = "（予定通りミレニアムの仕事を終えると、時計の針は1を指していた）"
2002003-19 = "[ns] \"ヒマリとの約束まであと2時間か……早く行かないと。\""
2002003-25 = "（バス停が見えてきたところで……）"
2002003-30 = "（乗る予定のバスが、ちょうど停留所に到着した）"
2002003-31 = "[ns] \"あのバスだ！\""
2002003-43 = "[ns] \"はぁ……はぁ……なんとか間に合った……。\""
2002003-48 = "（ギリギリでバスに乗り込み、息を整えていた時だった）"
2002003-52 = "ご乗車ありがとうございます。次は～「ミレニアム部室棟」……"
2002003-56 = "……失礼しました。次は「ミレニアム東港」、「ミレニアム東港」に停車します。"
2002003-60 = "[ns] \"……東港？それって部室棟と反対じゃ……。\""
2002003-61 = "それでは東に向かって出発進行！#nどうぞ楽しい旅となりますように！"
2002003-64 = "[ns] \"ちょ、ちょっと！？\""
2002003-72 = "「ミレニアム東港」でございます。お忘れ物にはご注意ください。"
2002003-73 = "乗客の皆様には、速やかな降車をお願いしております。#nダイヤの乱れを防止するために、強制脱出システムが作動しますので――"
2002003-74 = "[ns] \"うわっ！\""
2002003-78 = "（車内放送の途中で、バスから強制的に追い出されてしまった）"
2002003-79 = "東の方角に向かいましょう。貴人があなたを待っています。#nそれでは、良い一日を！"
2002003-80 = "[ns] \"ま、待って！\""
2002003-87 = "[ns] \"どういうこと……。\""
2002003-88 = "（突然、おかしなバスに出会ったうえに、土地勘のない場所で取り残されてしまった）"
2002003-92 = "[ns] \"ボーっとしてる場合じゃない。ヒマリとの約束があるんだ。\""
2002003-102 = "（ヒマリが待つ部室棟を目指して走り始めた）"
2002003-103 = "（しかし、まだこの時は知らなかった）"
2002003-107 = "（これが次々と起こる不可思議な現象の序章に過ぎないということを……）"
2002003-116 = "（部室棟に向かって走っていると、想定外の運動で体力が奪われて喉が渇いてしまった……）"
2002003-117 = "[ns] \"自販機で何か飲み物でも買おう……。\""
2002003-123 = "（軽い気持ちで冷たい炭酸飲料のボタンを押した）"
2002003-129 = "[ns] \"あっ、熱っ！な、なんで！？\""
2002003-133 = "[ns] \"……「爆裂・神おしるこ」……？\""
2002003-134 = "（押したはずの冷たい炭酸飲料が出ると思いきや、熱々のおしるこが出てきて……）"
2002003-135 = "（今度は自販機から謎のアナウンスが流れた）"
2002003-136 = "「冷たいものは遠ざけ、熱いものを選びましょう」"
2002003-137 = "「そんなあなたに激甘おしるこ！美味しく召し上がれ！」"
2002003-138 = "[ns] \"今は冷たいものが飲みたいんだけど！？\""
2002003-141 = "（諦めきれず、違うボタンを押してみるが……それでも出てくるのはおしるこばかり）"
2002003-150 = "[ns] \"はぁ、はぁ……無駄に自販機と戦ったせいで、時間が……！\""
2002003-151 = "（部室棟につながる最短ルートの橋を渡ろうとしたところ……）"
2002003-155 = "住民の皆さまにお知らせいたします。#nこちらの橋は現在封鎖中です。迂回路をご利用ください。"
2002003-156 = "[s] \"ええっ！？なんでこんな時に……！？\""
2002003-157 = "住民の皆さまにお知らせいたします。#nこちらの橋は現在封鎖中です。迂回路をご利用ください。"
2002003-161 = "住民の皆さまにお知らせいたします。#nこちらの橋は現在封鎖中です。迂回路をご利用ください。"
2002003-162 = "……「水辺を避けると運気が上がるでしょう」"
2002003-163 = "[s] \"……運気？\""
2002003-164 = "……迂回路をご利用ください。#n警告、不審な人物を発見。応援を要請しました。"
2002003-168 = "[ns] \"うわっ！何が起きてるんだ！？\""
2002003-175 = "（押し寄せる大量のドローンから逃げて、急いでその場を後にした）"
2002003-176 = "（その後も道行く先で、おかしな出来事に巻き込まれた）"
2002003-186 = "東の方角に向かいましょう。貴人があなたを待っています。"
2002003-187 = "冷たいものは遠ざけ、熱いものを――"
2002003-188 = "水辺を避けると運気が――"
2002003-189 = "東の方角に――"
2002003-190 = "冷たいもの――"
2002003-191 = "水辺を――"
2002003-199 = "[ns] \"……ということがあったんだ。今日は厄日かな。\""
2002003-200 = "なるほど、そうでしたか……。"
2002003-204 = "……ふふふっ。"
2002003-205 = "[s] \"……ヒマリ？\""
2002003-206 = "先生はどうでしたか？#n今日一日、そのような出来事を体験して……。"
2002003-207 = "少しでも運気が上がったように思いますか？"
2002003-208 = "あるいは、素敵な一日になりましたか？"
2002003-209 = "[s] \"ん？どういうこと……？\""
2002003-210 = "ふふっ、種明かしです。"
2002003-211 = "さあ、こちらをご覧ください。"
2002003-218 = "（ごきげんな表情でヒマリは一冊の雑誌を開いた）"
2002003-219 = "[s] \"クロノス報道部の特集……「今日の占いコーナー」？\""
2002003-223 = "（ヒマリが折り目のついたページを開いて指でなぞったところには、こう書いてあった）"
2002003-224 = "（「12月が誕生日のあなたは特別！今日の運勢アップチャレンジ！」……）"
2002003-225 = "「東へ向かいなさい。貴人があなたを待っています。さすれば運気が上がるでしょう」"
2002003-226 = "「冷たいものを遠ざけ、熱いものを選びなさい。さすれば運気が上がるでしょう」"
2002003-227 = "「水辺を避けなさい。さすれば運気が上がるでしょう」"
2002003-228 = "「人を怒らせないために、軽はずみな言動は慎みなさい。さすれば運気が上がるでしょう」"
2002003-229 = "クロノス報道部の特集によると、12月が誕生日の人はこうすれば運気が上がるようなのです！"
2002003-233 = "[ns] \"ひょっとして、今日の出来事は全部……。\""
2002003-234 = "ええ、全て私がハッキングして起こした実証実験です。"
2002003-235 = "私の誕生日は12月ですし、試してみたいと思いまして。"
2002003-236 = "……ただ、私は病弱美少女ですから、あまり外に出かけられません。"
2002003-237 = "そこで私の代役として、先生を立てたといいますか。"
2002003-238 = "[s] \"全部ヒマリのせいだったの！？しかも占いの実験！？\""
2002003-239 = "実験の過程で、私も先生も一つの結論に至ったはずです。"
2002003-240 = "ふふっ。流石、先生ですね。#n私のような超天才美少女と同じ思考をお持ちのようで――"
2002003-244 = "[ns] \"……ヒマリ。\""
2002003-245 = "……はい？"
2002003-249 = "[ns] \"今日はお説教の時間だよ。\""
2002003-253 = "あ、あのですね、これは……。"
2002003-259 = "[ns] \"覚悟してね。\""
2002003-260 = "な、なるほど……。"
2002003-261 = "確か特集には「人を怒らせないために、軽はずみな言動は慎みなさい。さすれば運気が上がるでしょう」とありましたよね。"
2002003-262 = "となると、この占いは正しかった可能性も……？#nやはり占いは奥深い世界ですね。"
2002003-263 = "[ns] \"ヒマリのせいだからね！？\""
2002003-265 = "（その後、1時間以上かけてヒマリにみっちりお説教した）"
