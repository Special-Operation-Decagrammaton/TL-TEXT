[translation]
10034170-1 = "2日前：勝利に向かって"
10034170-4 = "もう残り2日……。"
10034170-5 = "そろそろ、通しで合わせてみない？"
10034170-6 = "そうね。ちょっと緊張するけど。"
10034170-7 = "緊張、それは努力の証。"
10034170-8 = "重ねてきた努力を裏切りたくないと思うからこそ、身体はどうしても強張る。"
10034170-9 = "過程より、思い出より……私たちは今、結果が欲しい。"
10034170-10 = "つまり我々はセムラを手に入れる！数多[ruby=しかばね]の屍を[/ruby]乗り越えてでも！！"
10034170-12 = "また何か始まった……。"
10034170-13 = "私たちが屍になる可能性のほうが高そうだけど……。"
10034170-14 = "ま、ナツの発言にしては悪くないね。"
10034170-15 = "さあ、全員で頑張るわよ！"
10034170-17 = "えいえい、おーっ！"
