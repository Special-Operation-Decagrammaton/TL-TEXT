[translation]
10034170-1 = "2 dias antes: Rumo à vitória"
10034170-4 = "Só faltam 2 dias..."
10034170-5 = "Que tal tentarmos passar tudo do início ao fim?"
10034170-6 = "É verdade. Embora eu esteja um pouco nervosa."
10034170-7 = "O nervosismo é a prova do seu esforço."
10034170-8 = "É justamente porque não queremos trair todo o esforço que fizemos que nossos corpos acabam ficando tensos."
10034170-9 = "Mais do que o processo, mais do que as memórias... nós queremos resultados agora."
10034170-10 = "Em suma, nós vamos conseguir o semla! Mesmo que tenhamos que passar por cima de incontáveis cadáveres!!"
10034170-12 = "Lá vem ela de novo..."
10034170-13 = "Acho que é mais provável que nós é que nos tornemos os cadáveres..."
10034170-14 = "Bem, para um comentário da Natsu, não está nada mal."
10034170-15 = "Vamos lá, todas juntas, vamos dar o nosso melhor!"
10034170-17 = "Ei, ei, oh!"
