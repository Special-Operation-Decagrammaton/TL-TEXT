[translation]#[Texto Final. - Filipe 08/07.]
70007020-1 = "Encontros Inesperados (2)"
70007020-2 = "Sete! Oito……!"
70007020-3 = "(Mesmo depois de 100 repetições, a postura não oscila. Parece uma corrida leve……)"
70007020-4 = "Nove! Dez! Bom…… essa foi a 40ª repetição?"
70007020-5 = "(Q-quarenta!? Claramente foram mais de 100!)"
70007020-6 = "Hmm…… a carga ainda está leve. Vou considerar como 30 repetições…… um! Dois!"
70007020-7 = "Ah, com licença……!"
70007020-8 = "Ora, o que foi?"
70007020-9 = "(Falei sem querer……!)"
70007020-10 = "N-nada! Desculpa interromper o treino."
70007020-11 = "Ufufu, que pessoa interessante."
70007020-12 = "……"
70007020-13 = "Oito! Nove, são 20 repetições!"
70007020-15 = "(Antes era 30! Claramente diminuiu!?)"
70007020-23 = "Isso…… 100 repetições! Ufa, revigorante!"
70007020-24 = "(Na verdade, foram 785……! Achei que ia desmaiar!)"
70007020-25 = "(Não só músculos, mas a resistência é de aço……)"
70007020-27 = "Agora, esteira para relaxar as pernas!"
70007020-28 = "(A inclinação da esteira está tão alta!?…… é quase uma parede vertical!)"
70007020-30 = "Agora, remo!…… Hunf!"
70007020-31 = "(Nessa velocidade, parece um barco a motor!)"
70007020-33 = "Agora, leg press!"
70007020-40 = "E agora……!"
70007020-41 = "(Só de acompanhar já estou no limite……!)"
70007020-42 = "(Essa sensação…… é a 'fadiga' que eu havia esquecido)"
70007020-43 = "(Mas mesmo assim, de dentro das fibras danificadas, a paixão jorra como magma!)"
70007020-49 = "A-a, com licença, clientes!"
70007020-50 = "Já são 11h! Estamos fechando, por favor, arrumem seus pertences!"
70007020-52 = "Ora, já é essa hora? Achei que ainda era meio-dia."
70007020-53 = "11h……? Ainda dá……"
70007020-54 = "Estou sentindo dor muscular só de olhar! Por favor, vão embora!"
70007020-55 = "Todo treino tem um fim…… é uma pena, mas por hoje é só. Ufufu."
70007020-56 = "Então, com licença."
70007020-65 = "Uu……"
70007020-66 = "Parece que fui batido numa máquina de lavar……"
70007020-67 = "Desculpe……"
70007020-68 = "Sim?"
70007020-69 = "Falar diretamente assim é um pouco vergonhoso……"
70007020-70 = "Fiquei muito feliz em treinar com você hoje."
70007020-71 = "Na verdade, senti seu olhar desde cedo."
70007020-72 = "Seu olhar caloroso que busca mais força, respeitando a dignidade e a pureza……"
70007020-73 = "Foi uma honra senti-lo na pele."
70007020-74 = "Desculpe. Fiquei admirada……"
70007020-75 = "Ora, que humildade! Conhecer alguém tão nobre neste mundo cruel!"
70007020-76 = "N-nada disso…… fico sem graça!"
70007020-77 = "Ufufu. Seu sorriso tímido também é adorável."
70007020-82 = "Ora, já é essa hora!"
70007020-83 = "Mais tarde, me pediram para 'dividir em três' o grupo do capacete……"
70007020-84 = "É uma pena, mas vou indo."
70007020-85 = "Dividir em três…… um método clássico de treino por dias da semana."
70007020-86 = "Se preocupar com o treino alheio tão tarde…… que pessoa dedicada."
70007020-87 = "……?"
70007020-88 = "Desculpe, se não for incômodo, posso saber seu nome?"
70007020-89 = "Sou Sumire, capitã do Clube de Treinamento de Millennium."
70007020-90 = "Ora, que falta de educação. Deixe-me me apresentar."
70007020-91 = "Sou Akemi Kurihama. Sumire Otohana. Foi uma honra conhecê-la hoje."
70007020-95 = "Ora, que pressa."
70007020-96 = "Então, com muita pena……"
70007020-97 = "Agradeço do fundo do coração por termos treinado aeróbicos juntas."
70007020-98 = "Espero que nos encontremos de novo!"
70007020-102 = "Treinar com alguém tão dedicada de corpo e alma……"
70007020-103 = "Por causa da reforma inesperada, vim até esta academia longe……"
70007020-104 = "e tive um encontro maravilhoso……"
70007020-108 = "?"
70007020-110 = "Então, com muita pena……"
70007020-112 = "Aquela pessoa…… não seria……!"
70007020-114 = "Agradeço do fundo do coração por termos treinado aeróbicos juntas."
70007020-117 = "17 horas de treino com pesos…… foram aeróbicos!?"
70007020-119 = "……Esta é a experiência estranha que tive outro dia."
70007020-120 = "Ao mesmo tempo assustador e deslumbrante…… um dia inesquecível."
70007020-121 = "……É uma história de terror?"
70007020-122 = "Uau, conseguir cansar a nossa capitã."
70007020-123 = "Não estou cansada!"
70007020-124 = "Só a carga foi maior que o normal. Só isso, Rei."
70007020-125 = "Tá, tá. E qual é o nome dessa pessoa? É de Millennium?"
70007020-126 = "Ela se apresentou como Akemi Kurihama."
70007020-127 = "Akemi…… Kurihama……"
70007020-128 = "Hã!?"
70007020-132 = "……Não é jogadora de beisebol."
70007020-133 = "Em nenhum momento eu disse que era jogadora……"
70007020-134 = "Se são amigas, não trocaram contato?"
70007020-135 = "Rei, nós percorremos o mesmo caminho. Ainda tenho muito a aprender com ela……"
70007020-136 = "Se seguimos o mesmo caminho, nos encontraremos de novo. É o destino."
70007020-141 = "Quer vir também? Se ela e eu unirmos forças, podemos torná-lo um jogador ainda melhor."
70007020-142 = "C-capitã? Acabamos de treinar……"
70007020-143 = "Capitã……?"
70007020-149 = "Sumire-senpai――!"
70007020-150 = "Encontros Inesperados"