[translation]
70007020-1 = "Um encontro repentino (2)"
70007020-2 = "Sete! Oito...!"
70007020-3 = "（Mesmo depois de passar de 100 repetições, a forma dela não se altera. É como se ela estivesse apenas fazendo uma corrida leve...）"
70007020-4 = "Nove! Dez! Bem... acho que essa foi a 40ª, não é?"
70007020-5 = "（Q-quarenta!? Não importa como eu olhe, ela já passou de 100!）"
70007020-6 = "Hmm... a carga ainda não é suficiente. Vamos considerar como 30... Um! Dois!"
70007020-7 = "A-ah, com licença...!"
70007020-8 = "Ora, o que houve?"
70007020-9 = "（Acabei falando sem pensar...!）"
70007020-10 = "N-não! Nada não. Desculpe por interromper seu treino."
70007020-11 = "Ufufu, que pessoa interessante."
70007020-12 = "..."
70007020-13 = "Oito! Nove, e com isso são 20!"
70007020-15 = "（Agora há pouco eram 30! Está claramente diminuindo, não está!?）"
70007020-23 = "Com isso... 100! Ufa, que revigorante!"
70007020-24 = "（Para ser exato, foram 785...! Achei que fosse desmaiar no meio do caminho...!）"
70007020-25 = "（Não é só a musculatura, a resistência física dela é como aço...）"
70007020-27 = "A seguir, vou relaxar as pernas na esteira!"
70007020-28 = "（Inclinar a esteira a esse nível!? ...É quase uma parede vertical!）"
70007020-30 = "Continuando, vou para o aparelho de remo! ...Hmph!"
70007020-31 = "（Se remar nessa velocidade, vira um barco a motor!）"
70007020-33 = "Agora, o leg press para a parte inferior do corpo!"
70007020-40 = "Então, o próximo é...!"
70007020-41 = "（Só de acompanhar, já cheguei ao meu limite...!）"
70007020-42 = "（Essa sensação... é a "fadiga" que eu tinha esquecido há muito tempo.）"
70007020-43 = "（Ainda assim, das profundezas das fibras musculares danificadas, uma paixão surge como magma!）"
70007020-49 = "A-ah, com licença, clientes!"
70007020-50 = "Já são 23h! Está quase na hora de fechar, por favor, comecem a guardar as coisas!"
70007020-52 = "Ora, já é essa hora? Eu jurava que ainda era por volta do meio-dia."
70007020-53 = "23h...? Ainda... dá para continuar..."
70007020-54 = "Só de olhar, eu já estou sentindo dor muscular! Por favor, vão embora...!"
70007020-55 = "Todo exercício tem um fim... É um pouco triste, mas vamos encerrar por hoje. Ufufu."
70007020-56 = "Sendo assim, despeço-me por aqui."
70007020-65 = "Ugh..."
70007020-66 = "Sinto como se tivesse sido girado dentro de uma máquina de lavar..."
70007020-67 = "Aquele..."
70007020-68 = "Sim!?"
70007020-69 = "É um pouco embaraçoso falar diretamente assim..."
70007020-70 = "Fico muito feliz por termos treinado juntos hoje."
70007020-71 = "Na verdade, senti seu olhar desde a manhã."
70007020-72 = "Esse olhar intenso, que valoriza a dignidade e a pureza, enquanto busca por mais força..."
70007020-73 = "Foi uma honra sentir isso de perto."
70007020-74 = "Peço perdão. Acabei ficando hipnotizado..."
70007020-75 = "Ora, você também é humilde! Encontrar alguém tão nobre neste mundo caótico!"
70007020-76 = "I-isso... não é para tanto!"
70007020-77 = "Ufufu. Esse seu jeito tímido também é adorável."
70007020-82 = "Ora, já está nesse horário!"
70007020-83 = "Depois disso, meus companheiros me pediram para "dividir em 3 partes" o Grupo dos Capacetes..."
70007020-84 = "É uma pena, mas vou me retirar agora."
70007020-85 = "Dividir em 3 partes... é um método de treino clássico, focando em partes diferentes do corpo a cada dia da semana."
70007020-86 = "Preocupar-se com o treinamento dos outros até uma hora dessas... você é uma pessoa realmente sincera."
70007020-87 = "……？"
70007020-88 = "Diga-me, se não for incômodo, poderia me dizer o seu nome?"
70007020-89 = "Eu sou Otohama Sumire, chefe do departamento de treinamento do Millennium."
70007020-90 = "Ora, que falta de educação a minha. Deixe-me apresentar-me novamente."
70007020-91 = "Eu sou Kurihama Akemi. Otohama Sumire-san, foi uma honra conhecê-la hoje."
70007020-95 = "Ora, ora, que apressada você é."
70007020-96 = "Bem, embora seja difícil me despedir..."
70007020-97 = "Agradeço de coração por termos feito o treino aeróbico juntas."
70007020-98 = "Espero que possamos nos encontrar novamente assim!"
70007020-102 = "Poder treinar com alguém que forjou tanto o corpo quanto a mente dessa maneira..."
70007020-103 = "Por causa de uma obra inesperada, acabei indo até uma academia distante,"
70007020-104 = "e tive um encontro maravilhoso..."
70007020-108 = "？"
70007020-110 = "Bem, embora seja difícil me despedir..."
70007020-112 = "Aquela pessoa, não pode ser...!"
70007020-114 = "Agradeço de coração por termos feito o treino aeróbico juntas."
70007020-117 = "17 horas de musculação... foram consideradas treino aeróbico...!?"
70007020-119 = "……Essa é a estranha história que vivenciei outro dia."
70007020-120 = "Foi algo assustador, mas também brilhante... um dia que ficará na memória."
70007020-121 = "……Isso é algum tipo de história de fantasma?"
70007020-122 = "Impressionante, conseguir deixar a senpai cansada."
70007020-123 = "Eu não estou cansada!"
70007020-124 = "É apenas que a carga estava mais alta do que o habitual. Só isso, Rei-san."
70007020-125 = "Sim, sim. E qual era o nome dela? É uma aluna do Millennium?"
70007020-126 = "Ela se apresentou como Kurihama Akemi."
70007020-127 = "Kurihama... Akemi..."
70007020-128 = "Ehh!?"
70007020-132 = "……Não tem ninguém com esse nome entre os jogadores de beisebol."
70007020-133 = "Eu nunca disse que ela era uma jogadora de beisebol..."
70007020-134 = "Se vocês se tornaram amigas, não trocaram contatos?"
70007020-135 = "Rei-san, ela e eu somos "companheiras" que seguem o mesmo caminho. É claro que ainda tenho muito o que aprender, mas..."
70007020-136 = "Já que trilhamos o mesmo caminho, certamente nos encontraremos em algum lugar novamente. É o destino."
70007020-141 = "Se quiser, Rei-san, por que não se junta a nós? Se unirmos nossas forças, talvez possamos transformá-la em uma jogadora de beisebol ainda melhor."
70007020-142 = "Se, senpai? Nós acabamos de treinar agora há pouco, não foi...?"
70007020-143 = "Senpai...?"
70007020-149 = "Sumire-senpai!"
70007020-150 = "Encontros acontecem de repente"
