[translation]
80000079-1 = "気持ちを隠したチョコレート"
80000079-2 = "皆さん、こんにちは。#n本日は修行部が主催する、バレンタイン特別イベント――"
80000079-3 = "「誰でも簡単！チョコレート作り教室」にご参加いただき、#n誠にありがとうございます！"
80000079-4 = "[s] \"よっ、さすがミモリ副部長！\""
80000079-5 = "ふふっ。今日はシャーレの先生にもご参加いただいていますし……"
80000079-6 = "大和撫子を目指す者として、#n最善を尽くして授業を進めていきますね。"
80000079-7 = "あの、今回作ってみたいものがあって――"
80000079-8 = "チェリーを使ったチョコレート、ですね！"
80000079-9 = "チェリーの木言葉は「真実の愛」ですし、受け取る方もきっと喜ばれると思いますよ。"
80000079-10 = "ま、まだ何も言ってないのに……。#nさすがは百鬼夜行を影で支配する魔性の読心術師、ミモリ様……！"
80000079-11 = "えっ？いえ、私はそのような……。#nど、どこでそんな変な噂が……？"
80000079-12 = "わ、私は――"
80000079-13 = "なるほど。カカオマスとカカオバターから、#n本当の意味で「手作り」のチョコレートを作りたいのですね。"
80000079-14 = "牛乳と砂糖の割合を調整するのは難しいでしょうが……#nその分、受け取った方にも真心がしっかり伝わると思いますよ。#n一緒に頑張りましょうね。"
80000079-15 = "で、でも、本当に作れるでしょうか？実は私、結構不器用な方でして……。"
80000079-16 = "ふふっ、大丈夫です。一番大切なのは気持ちですから。#nそれに試行錯誤こそ、「修行」においては重要な過程なのですよ。"
80000079-17 = "うふ、うふふ……私はですね……。"
80000079-18 = "は、はい……？常温でも固まらない、#nスライム状の超巨大チョコレートを作りたい……？"
80000079-19 = "受け取った方がチョコレートスライムに食べられて、#n身も心も全て自分のものになるところを見たい、と……？"
80000079-20 = "い、いけません！そんなの、あまりにも……"
80000079-21 = "破廉恥ではありませんか！"
80000079-22 = "くっ、やはりダメでしたか……。"
80000079-24 = "ふう……お疲れ様でした、先生。"
80000079-25 = "[s1] \"ミモリもお疲れ様。\"\n[s2] \"やっぱりミモリはすごいね。\""
80000079-26 = "はい！？急にそんな、どうして……！？"
80000079-27 = "はい！？急にそんな、どうして……！？"
80000079-28 = "私が……誰かを思う気持ちに気付いて、寄り添えているから……？"
80000079-29 = "そ、そんな、違います……。#n第一、あのような形で皆さんにアドバイスできたとしても、私は……"
80000079-30 = "最も大切な方の心さえ、よくわかっていないのに……。"
80000079-31 = "[s3] \"ま、まさか百鬼夜行を影で支配する魔性の読心術師が……！\"\n[s4] \"ミモリが知らないこともあるなんて……！\""
80000079-32 = "で、ですから、そういうのではありません！"
80000079-33 = "で、ですから、そういうのではありません！"
80000079-34 = "……ところで先生。あの、ご迷惑でなければ……#nこれを、受け取っていただけますでしょうか……？"
80000079-39 = "[ns5] \"ミモリからのチョコレートだ！\"\n[ns6] \"前もって準備してくれてたの？ありがとう！\""
80000079-40 = "その……実はチョコレート教室を行う傍らで、用意していたのです。"
80000079-41 = "その……実はチョコレート教室を行う傍らで、用意していたのです。"
80000079-42 = "しかし考えてみれば……皆さんのお手伝いよりも#n私欲を優先してしまったようで、少し気が咎めますね……。"
80000079-43 = "これでは大和撫子失格でしょうか……。"
80000079-44 = "[s] \"いや、そんなことないよ。\""
80000079-45 = "……ふふっ。"
80000079-46 = "……やはり私は、人の心を完全に読むことはできません。"
80000079-47 = "何せ今、胸がとてもドキドキして……#n先生が何を思っているかなんて、全然わからないのですから……。"
80000079-48 = "[s] \"私は――\""
80000079-49 = "しーっ。"
80000079-50 = "今は何もおっしゃらないでください。ね？"
80000079-51 = "今日はこのまま、このときめきを感じていたいので……。"
80000079-52 = "……そ、それでは！お先に失礼します！"
80000079-56 = "[ns] \"えっと……じゃあね……？\""
80000079-57 = "（何故か逃げるように去って行くミモリを見送りながら、#nもらったチョコレートを食べてみた）"
80000079-58 = "[ns7] \"……うん。\"\n[ns8] \"ミモリの気持ちが感じられて、すごくおいしい。\""
