[translation]
80000079-1 = "Chocolate com sentimentos ocultos"
80000079-2 = "Olá a todos. #nHoje, agradeço sinceramente por participarem do evento especial de Dia dos Namorados, organizado pelo Clube de Treinamento —"
80000079-3 = "a \"Aula de Culinária de Chocolate: Fácil para Todos!\""
80000079-4 = "[s] \"Ei, como esperado da vice-presidente Mimori!\""
80000079-5 = "Fufu. Hoje também temos a participação do Sensei do Schale, então..."
80000079-6 = "Como alguém que aspira ser uma dama japonesa, #nfarei o meu melhor para conduzir a aula."
80000079-7 = "Bem, tem algo que eu gostaria de tentar fazer desta vez —"
80000079-8 = "Chocolate com cerejas, não é?"
80000079-9 = "A linguagem das flores da cerejeira é \"amor verdadeiro\", então tenho certeza de que quem receber ficará muito feliz."
80000079-10 = "M-mas eu nem disse nada ainda... #nComo esperado da diabólica leitora de mentes que controla Hyakkiyako das sombras, a senhorita Mimori...!"
80000079-11 = "Eh? Não, eu não sou nada disso... #nD-de onde surgiu esse boato tão estranho...?"
80000079-12 = "E-eu..."
80000079-13 = "Entendo. Você quer fazer um chocolate \"artesanal\" de verdade, #na partir da massa de cacau e manteiga de cacau."
80000079-14 = "Ajustar a proporção de leite e açúcar será difícil, mas... #npor causa disso, acredito que a sua sinceridade será transmitida claramente para quem receber. #nVamos nos esforçar juntos."
80000079-15 = "M-mas será que eu realmente consigo? Na verdade, eu sou bem desajeitada..."
80000079-16 = "Fufu, não se preocupe. O mais importante é o sentimento. #nAlém disso, a tentativa e erro é um processo importante no \"treinamento\"."
80000079-17 = "Ufu, ufufu... Bem, eu..."
80000079-18 = "S-sim...? Você quer fazer um chocolate gigante em forma de slime, #nque não endurece nem em temperatura ambiente...?"
80000079-19 = "Você quer ver quem receber ser engolido pelo slime de chocolate, #ne ter o corpo e a alma completamente sob seu domínio...?"
80000079-20 = "I-isso não pode! Isso é muito..."
80000079-21 = "Isso é indecente!"
80000079-22 = "Droga, então não deu certo mesmo..."
80000079-24 = "Ufa... Bom trabalho hoje, Sensei."
80000079-25 = "[s1] \"Bom trabalho para você também, Mimori.\"\n[s2] \"A Mimori é realmente incrível.\""
80000079-26 = "Sim!? Por que de repente isso...!?"
80000079-27 = "Sim!? Por que de repente isso...!?"
80000079-28 = "Será que é porque eu... percebo e me aproximo dos sentimentos que alguém tem por outra pessoa...?"
80000079-29 = "N-não, não é isso... #nPrimeiro de tudo, mesmo que eu tenha conseguido dar conselhos a todos daquela forma, eu..."
80000079-30 = "Nem sequer entendo o coração da pessoa que me é mais importante..."
80000079-31 = "[s3] \"N-não me diga que a diabólica leitora de mentes que controla Hyakkiyako das sombras...\"\n[s4] \"Que existem coisas que a Mimori não sabe...!\""
80000079-32 = "P-por isso, não é nada disso!"
80000079-33 = "P-por isso, não é nada disso!"
80000079-34 = "...A propósito, Sensei. Bem, se não for um incômodo... #nVocê poderia aceitar isto...?"
80000079-39 = "[ns5] \"Chocolate da Mimori!\"\n[ns6] \"Você preparou isso com antecedência? Obrigado!\""
80000079-40 = "Bem... na verdade, eu preparei enquanto conduzia a aula de chocolate."
80000079-41 = "Bem... na verdade, eu preparei enquanto conduzia a aula de chocolate."
80000079-42 = "Mas pensando bem... parece que priorizei meus desejos pessoais #nem vez de ajudar a todos, e me sinto um pouco culpada..."
80000079-43 = "Será que isso me desqualifica como uma dama japonesa...?"
80000079-44 = "[s] \"Não, nada disso.\""
80000079-45 = "...Fufu."
80000079-46 = "...Realmente, eu não consigo ler completamente o coração das pessoas."
80000079-47 = "Afinal, agora meu coração está batendo tão forte... #ne eu não faço ideia do que o Sensei está pensando..."
80000079-48 = "[s] \"Eu estou...\""
80000079-49 = "Shiii."
80000079-50 = "Por favor, não diga nada agora. Certo?"
80000079-51 = "Hoje, eu só quero continuar sentindo esse frio na barriga..."
80000079-52 = "...B-bem, então! Com licença!"
80000079-56 = "[ns] \"Err... então até mais...?\""
80000079-57 = "(Enquanto observava Mimori sair como se estivesse fugindo, #nexperimentei o chocolate que ganhei)"
80000079-58 = "[ns7] \"...Hum.\"\n[ns8] \"Dá para sentir os sentimentos da Mimori, está muito gostoso.\""
