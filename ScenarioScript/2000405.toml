[translation]
2000405-1 = "Prevenção contra insolação"
2000405-2 = "Praia de Muigahama"
2000405-3 = "Ufa, foi muito bom suar um pouco."
2000405-4 = "Parece que seria muito refrescante pular no mar gelado agora!"
2000405-5 = "Mas ainda não exercitei os músculos das pernas o suficiente... Que tal corrermos mais uma série?"
2000405-6 = "[s1] \"Já estou exausto antes mesmo de nadar...\"\n[s2] \"Você disse 'mais uma série'...?\""
2000405-7 = "O aquecimento ainda não acabou."
2000405-8 = "O aquecimento ainda não acabou."
2000405-9 = "Se não aquecermos bem o corpo, será um problema se tivermos uma cãibra na água."
2000405-10 = "[s] \"Meu corpo já está em um estado problemático... sinto que vou ter uma insolação...\""
2000405-11 = "Entendo, não se preocupe. Eu estava preparada para algo assim..."
2000405-14 = "[ns] \"Isso é...?\""
2000405-15 = "É para prevenir a insolação."
2000405-16 = "Picolés, bebidas refrescantes... trouxe várias coisas para resfriar o corpo nesta caixa térmica."
2000405-17 = "Mesmo durante o treino, se quiser algo, é só me pedir."
2000405-18 = "[s] \"Posso pegar agora mesmo...?\""
2000405-19 = "V-você chegou a esse ponto...?"
2000405-20 = "Mas é verdade, hoje está mais quente que o normal."
2000405-24 = "Então, embora seja um pouco cedo, que tal fazermos uma pausa e tomarmos um picolé?"
2000405-27 = "[wa:450]― Sensei, você é do tipo que [wa:500] morde o picolé, [wa:900] ou..."
2000405-29 = "[wa:150]― Ou você é do tipo que [wa:500] lambe?"
2000405-32 = "[wa:900]― Eu sou do tipo que [wa:850] lambe [wa:480] devagar."
2000405-34 = "― Assim, [wa:1100] dá para aproveitar o sabor do [wa:1320] picolé por mais tempo."
2000405-37 = "[wa:1250]― Ham... [wa:1750] lamber, [wa:800] lamber..."
2000405-40 = "[wa:800]― ...Sim? [wa:1050] O jeito que estou comendo [wa:1200] é estranho...?"
2000405-43 = "[wa:50]― Para mim, [wa:1400] é o de sempre..."
2000405-45 = "― Tem [wa:500] algo errado?"
2000405-48 = "[wa:900]― ...Sensei? [wa:1350] Sinto que você [wa:500] está fazendo,"
2000405-50 = "― uma expressão [wa:300] estranha [wa:450] de novo..."
2000405-53 = "[ns] \"Ué? Tem algo escrito no palito deste picolé...?\""
2000405-54 = "Ah, isso é um \"premiado\"."
2000405-55 = "Você não vê isso às vezes em picolés de palito?"
2000405-56 = "Eu imitei isso e, quando fiz esses picolés, escrevi algumas mensagens de \"premiado\" nos palitos."
2000405-57 = "Dependendo do tipo de \"prêmio\", eu lhe darei um brinde especial."
2000405-58 = "[s3] \"Legal!\"\n[s4] \"Existem tipos diferentes? O que será que eu ganhei...?\""
2000405-63 = "Bem, isso é..."
2000405-64 = "Parabéns! É o \"Prêmio Especial\": um \"Treinamento Especial\"!"
2000405-65 = "[s] \"Treinamento!? Isso é mesmo um 'prêmio'!?\""
2000405-66 = "Este é um treinamento literalmente \"especial\" que eu preparei. É um prêmio, sim!"
2000405-67 = "Diferente dos outros \"prêmios\", eu só coloquei um desses..."
2000405-68 = "Sensei, você tem muita sorte."
2000405-69 = "[s] Fugir com toda a força."
2000405-70 = "Ah, espere, Sensei! A validade desse palito premiado é apenas para hoje!"
2000405-71 = "Já que descansamos, vamos começar juntos esse \"Treinamento Especial\"!"
2000405-73 = "Depois disso, fiz exercícios intensos com Mashiro e nadar acabou ficando fora de cogitação..."
