[translation]
2000405-1 = "熱中症対策"
2000405-2 = "無為ヶ浜・海水浴場"
2000405-3 = "ふう、良い汗をかくことができました。"
2000405-4 = "このまま冷たい海に飛び込んだら、気持ちよさそうです！"
2000405-5 = "ただ、まだ足の筋肉の追い込みが足りないですね……取り合えずもう1セット走りましょうか？"
2000405-6 = "[s1] \"泳ぐ前に、すでに疲労困憊……。\"\n[s2] \"今「取り合えず」って言った……？\""
2000405-7 = "まだまだ準備運動は終わっていませんよ。"
2000405-8 = "まだまだ準備運動は終わっていませんよ。"
2000405-9 = "しっかり身体を動かしておかないと、水中で足をつったりしたら大変なことになってしまいます。"
2000405-10 = "[s] \"私の身体は既に大変なことに……熱中症になりそう……。\""
2000405-11 = "なるほど、大丈夫です。こんなこともあろうかと……。"
2000405-14 = "[ns] \"これは……？\""
2000405-15 = "熱中症対策です。"
2000405-16 = "アイスキャンディーや清涼飲料水……身体を冷やしてくれるものを、このアイスボックスにたくさん詰め込んできました。"
2000405-17 = "訓練の途中でも、欲しくなったらいつでも言ってくださいね。"
2000405-18 = "[s] \"今すぐでも良い……？\""
2000405-19 = "そ、そこまで追いつめられていたのですか……？"
2000405-20 = "でも確かに、今日はいつもより暑いですしね。"
2000405-24 = "では少し早いですが、アイスでも食べながら休憩にしましょうか？"
2000405-27 = "[wa:450]― 先生は[wa:500]アイスキャンディー、[wa:900]噛んで食べる派ですか？"
2000405-29 = "[wa:150]― それとも[wa:500]舐める派ですか？"
2000405-32 = "[wa:900]― 私は、[wa:850]ゆっくり[wa:480]舐めて食べる派です。"
2000405-34 = "― その方が、[wa:1100]アイスキャンディーの味を[wa:1320]長く楽しめますから。"
2000405-37 = "[wa:1250]― はむっ……[wa:1750]ぺろっ、[wa:800]れろっ……。"
2000405-40 = "[wa:800]― ……はい？[wa:1050] 食べ方が[wa:1200]ちょっと……？"
2000405-43 = "[wa:50]― 私としては、[wa:1400]いつも通りなのですけど……"
2000405-45 = "― 何か[wa:500]変でしょうか？"
2000405-48 = "[wa:900]― ……先生？[wa:1350]なんだか[wa:500]また、"
2000405-50 = "― 変な[wa:300]表情を[wa:450]されてる気がするのですが……。"
2000405-53 = "[ns] \"あれ？このアイス、棒のところに何か書いてある……？\""
2000405-54 = "あっ、それは「当たり」ですね。"
2000405-55 = "棒型のアイスでそういうの、時々見かけませんか？"
2000405-56 = "それを真似して、そのアイスキャンディーを作った時に、棒のところに幾つか「当たり」のメッセージを書いておいたんです。"
2000405-57 = "「当たり」の種類によって、特別な景品をお渡ししますよ。"
2000405-58 = "[s3] \"やった！\"\n[s4] \"種類があるんだね、何が当たったんだろ……？\""
2000405-63 = "えっと、これは……。"
2000405-64 = "おめでとうございます！「特別賞」の「スペシャルトレーニング」です！"
2000405-65 = "[s] \"トレーニング！？それ本当に「当たり」！？\""
2000405-66 = "これは私が用意した、文字通り「スペシャル」なトレーニングが受けられるものです。当たりですよ！"
2000405-67 = "これは、他の「当たり」と違って一つしか入れていないのに……"
2000405-68 = "先生は運が良いですね。"
2000405-69 = "[s] 全力で逃げる。"
2000405-70 = "あっ、待ってください先生！その当たり棒の有効期間は、当日までですよ！"
2000405-71 = "休憩もできたことですし、まずは一緒にその「スペシャルトレーニング」を始めましょう！"
2000405-73 = "その後、マシロと一緒に激しい運動をして、水泳どころではなくなった……。"
