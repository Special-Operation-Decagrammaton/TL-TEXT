[translation]
90000165-4 = "Ah... está quase na hora do clímax, não é..."
90000165-5 = "Falta pouco para a \"Irmã Mais Velha\" ficar completa!"

90000165-6 = "Será que ela se lembra de nós? E se não lembrar, o que faremos? Bem, tanto faz."
90000165-11 = "...Irmã Mais Velha, por favor, acorde."
90000165-12 = "O reino de Decagrammaton..."
90000165-14 = "O nosso — \"Malkuth\"."

90000165-19 = "Arco de Decagrammaton; Continua no Capítulo 2"
