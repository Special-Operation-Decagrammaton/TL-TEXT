[translation]#[Texto Final. - Filipe 05/07.]
901010600420-7 = "[ns] \"Bom trabalho, pessoal!\""
901010600420-9 = "Bem-vindo, Sensei!"
901010600420-10 = "Obrigada por vir mesmo com a agenda cheia."
901010600420-11 = "[s1] \"Sou o conselheiro do Esquadrão FOX, é obrigação.\"\n[s2] \"Fiquei curioso pra saber se o caranguejo monstro existe mesmo.\""
901010600420-12 = "……Obrigada. A gente sempre conta com você."
901010600420-13 = "Sim, se uma criatura dessas existe, é um caso muito maior do que desaparecimentos."
901010600420-15 = "Tomara que a gente chegue a uma conclusão proveitosa hoje."
901010600420-16 = "Só vamos saber quando conversarmos."
901010600420-19 = "Então, vamos começar."
901010600420-20 = "Cada uma, reportem a operação de hoje."