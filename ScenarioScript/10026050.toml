[translation]
10026050-1 = "Episódio 5; Ponto de Investigação C: \"Plantação de Limões\""
10026050-2 = "（O próximo local marcado no mapa estava coberto por limoeiros.）"
10026050-3 = "（Não parecia haver sinais de manutenção há muito tempo.）"
10026050-7 = "[ns1] \"Será que acabei me perdendo...?\"\n[ns2] \"Seria uma ajuda e tanto encontrar alguém por perto...\""
10026050-10 = "Ora, Sensei. Você veio até aqui?"
10026050-15 = "[ns] \"Que bom te ver. Na verdade, eu me perdi...\""
10026050-16 = "Você também, Sensei?#nRealmente, há árvores demais por aqui..."
10026050-17 = "Isso aqui já parece mais uma floresta do que uma plantação."
10026050-18 = "Fufu..."
10026050-19 = "...Sim?"
10026050-20 = "...Como eu sabia que era chamada de \"plantação\", você pergunta...?"
10026050-21 = "Bem, isso é..."
10026050-25 = "...Pois é."
10026050-26 = "Como devo explicar?"
10026050-27 = "...Foi apenas minha intuição, talvez."
10026050-28 = "Essa sua cara diz que não acredita em mim, não é?#nMas eu mesma ainda estou indecisa sobre o que pensar."
10026050-29 = "Sinto que, desde o início, você percebeu que havia algo por trás disso, Sensei."
10026050-30 = "Você tem várias perguntas, não tem?#nPor que viemos a uma ilha como esta... e ainda por cima, trazendo a Koharu-chan?"
10026050-31 = "Por que você não me perguntou nada?"
10026050-32 = "[s3] \"Bem, eu fico curioso, mas...\"\n[s4] \"É porque eu confio em você, Hanako.\""
10026050-35 = "Ora, ora..."
10026050-36 = "Ufufu♡ Recebi uma reação inesperada."
10026050-37 = "Será que você confia mais em mim do que eu imaginava?"
10026050-38 = "Quando tudo estiver resolvido, encontrarei um momento para lhe contar..."
10026050-39 = "[s] \"...\""
10026050-41 = "[ns7] \"Mas eu ficaria feliz se você não guardasse tudo para si mesma.\"\n[ns8] \"...Ou será que eu não sou alguém em quem você possa confiar?\""
10026050-44 = "............"
10026050-45 = "Fufu..."
10026050-46 = "...Dito dessa forma, você me desarma."
10026050-47 = "Será que agora a bola está comigo?"
10026050-48 = "Não estou muito acostumada a me abrir com os outros, mas..."
10026050-49 = "Já que você se importa tanto comigo,#nvamos fazer do seu jeito hoje, Sensei."
10026050-50 = "...Afinal, é verão."
10026050-54 = "――Provavelmente, Sensei."
10026050-55 = "Você deve estar pensando que eu preparei esta situação para a Ui-san e a Koharu-chan."
10026050-56 = "Afinal, mesmo sem eu dar explicações detalhadas, você não demonstrou preocupação e simplesmente confiou em mim."
10026050-57 = "Dependendo de como se olha, este lugar pode ser considerado um resort."
10026050-58 = "Aqui, podemos aproveitar um clima de férias, não é?"
10026050-59 = "Viemos com o pretexto de investigar ruínas, mas todos estão passando o tempo de roupa de banho."
10026050-60 = "O problema da Ui-san e o desejo da Koharu-chan..."
10026050-61 = "É um plano perfeito que resolve ambos simultaneamente, não é?"
10026050-62 = "...Não foi isso que você pensou, Sensei?"
10026050-63 = "Essa sua percepção não está totalmente errada."
10026050-64 = "............"
10026050-65 = "Mas, Sensei."
10026050-66 = "Se... e se fosse o caso de..."
10026050-70 = "Que quem precisava desse tempo não eram apenas a Ui-san ou a Koharu-chan."
10026050-71 = "...E se fosse isso, o que você diria?"
10026050-72 = "[s9] \"Isso significa que...\"\n[s10] \"Em outras palavras...?\""
10026050-75 = "Pois é... bem, em outras palavras――"
10026050-76 = "Eu também sou uma garota da minha idade, afinal."
10026050-77 = "Independentemente do que os outros pensem de mim, no fundo, sou apenas uma garota comum."
10026050-78 = "Não seria estranho querer deixar minhas responsabilidades de lado de vez em quando e passar um tempo divertido rindo com todo mundo, não é?"
10026050-79 = "Dizer que foi por causa das duas... é apenas uma desculpa que dou a mim mesma."
10026050-81 = "Na verdade, no fundo, eu desejava esse momento mais do que qualquer um."
10026050-84 = "……Eu queria ir à praia com todo mundo."
10026050-86 = "Fufu. É só isso."
10026050-87 = "[s] \"…….\""
10026050-88 = "S-seria de grande ajuda se você dissesse algo..."
10026050-89 = "……Afinal, será que isso não combina comigo?"
10026050-90 = "[s11] \"É que fico feliz em ver que a Hanako conseguiu relaxar...\"\n[s12] \"Fico feliz que você tenha conseguido dizer algo assim.\""
10026050-93 = "…………."
10026050-94 = "É mesmo?"
10026050-95 = "Mas... pensando bem, talvez você tenha razão."
10026050-96 = "No entanto, já que viemos até uma ilha deserta e temos esse tempo precioso a sós..."
10026050-97 = "Eu não queria desperdiçá-lo com as piadas e conversas de sempre. #nPodemos falar sobre essas coisas quando voltarmos."
10026050-98 = "……Sensei."
10026050-99 = "De agora em diante, um pouco mais... só um pouco mais."
10026050-100 = "Eu também posso ser um pouco egoísta?"
10026050-101 = "[s] \"Claro que sim.\""
10026050-102 = "……Ora?"
10026050-103 = "Você respondeu tão facilmente... tem certeza absoluta?"
10026050-104 = "Talvez... isso possa ser um fardo maior do que você imagina, sabe?"
10026050-105 = "[s13] \"É verão, afinal.\"\n[s14] \"Você é uma garota da sua idade, não é?\""
10026050-108 = "……Fufu."
10026050-109 = "Então, vou ficar na expectativa daqui para frente, viu?"
10026050-110 = "……Você sabe, não sabe? #nEu tenho uma memória muito boa, apesar da minha aparência."
10026050-114 = "Não vou me esquecer da promessa de hoje, viu? ♡"
10026050-119 = "(Depois disso, visitei a plantação de limões com a Hanako antes de voltarmos para a base)"
10026050-123 = "(Ao retornar à base, fui sentenciado à morte várias vezes pela Koharu por ter ficado a sós com a Hanako)"
