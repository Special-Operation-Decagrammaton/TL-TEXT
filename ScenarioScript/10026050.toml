[translation]
10026050-1 = "第5話;調査ポイントC「レモン農園」"
10026050-2 = "（地図に記された次の場所は、レモンの木が生い茂っていた）"
10026050-3 = "（もう長いこと、手入れされた気配はない）"
10026050-7 = "[ns1] \"もしかして、迷子になっちゃったかな……？\"\n[ns2] \"誰か近くに居ると助かるんだけど……。\""
10026050-10 = "あら、先生。こちらにいらっしゃったのですか？"
10026050-15 = "[ns] \"会えて良かった。実は迷っちゃって……。\""
10026050-16 = "先生もでしたか。#nたしかに、ここは木があまりにも多いですし……"
10026050-17 = "これはもう、農園ではなく森と言った方が良いような。"
10026050-18 = "ふふっ……。"
10026050-19 = "……はい？"
10026050-20 = "……どうして「農園」と呼ばれていると知っていたのか、ですか……？"
10026050-21 = "それは……。"
10026050-25 = "……そう、ですね。"
10026050-26 = "どう説明したものでしょう？"
10026050-27 = "……私の直感、ですかね。"
10026050-28 = "その顔は信じていませんね……？#nですが私もまだ判断に迷っているのです。"
10026050-29 = "初めから先生は、何か裏があると気づいていたように思います。"
10026050-30 = "色々と聞きたいことがありますよね？#nなぜ、こんな島に……それも、わざわざコハルちゃんを連れて。"
10026050-31 = "どうして、何もお聞きにならなかったんですか？"
10026050-32 = "[s3] \"たしかに、気にはなるけど……\"\n[s4] \"ハナコのこと、信じてるから。\""
10026050-35 = "あらら……。"
10026050-36 = "うふふ♡予想外の反応が返ってきましたね。"
10026050-37 = "私、思っていたよりも先生に信頼されているのでしょうか？"
10026050-38 = "全てが解決したら、折を見てお話ししますので……"
10026050-39 = "[s] \"……。\""
10026050-41 = "[ns7] \"でも、一人で抱えずに話してくれると嬉しいな。\"\n[ns8] \"……それとも、私じゃ頼りないかな？\""
10026050-44 = "…………。"
10026050-45 = "ふふ……。"
10026050-46 = "……そう言われると、弱りましたね。"
10026050-47 = "これでバトンは私に渡ったのでしょうか？"
10026050-48 = "自分から何かを打ち明けるのは、あまり慣れていませんが……"
10026050-49 = "せっかく気にかけてくださっているのですから、#n今日は先生の仰る通りにしましょう。"
10026050-50 = "……夏ですからね。"
10026050-54 = "――おそらく先生は。"
10026050-55 = "この状況を、ウイさんやコハルちゃんのために、私が用意したと思っているのでしょう。"
10026050-56 = "私が詳しいお話をせずとも、取り立てて心配する素振りを見せず、信じてくださったわけですから。"
10026050-57 = "捉えようによっては、ここはリゾート地と言えますし。"
10026050-58 = "ここでなら、ちょっとしたバカンス気分を味わえますよね。"
10026050-59 = "遺跡を調査する名目で訪れましたが、みんな水着姿で過ごしているわけですし。"
10026050-60 = "ウイさんの問題とコハルちゃんの希望……"
10026050-61 = "その2つを同時に解決できるピッタリの計画になっている、と。"
10026050-62 = "……先生は、そう思ったのではないでしょうか？"
10026050-63 = "その認識で、概ね間違ってはいません。"
10026050-64 = "…………。"
10026050-65 = "ですが、先生。"
10026050-66 = "もし……もしもの話ですが。"
10026050-70 = "このような時間が必要だったのは、ウイさんやコハルちゃんだけではなかった。"
10026050-71 = "……としたら、どうでしょう？"
10026050-72 = "[s9] \"それって……。\"\n[s10] \"つまり……？\""
10026050-75 = "そうですね……まあ、つまりーー"
10026050-76 = "私も、年相応の女の子ですから。"
10026050-77 = "周囲からどう思われているのかは別として、心は一人の平凡な少女。"
10026050-78 = "たまには肩の荷を下ろして、みんなと笑って楽しい時間を過ごしたいと思っても、おかしくないでしょう？"
10026050-79 = "2人のためというのは……自分に対する言い訳です。"
10026050-81 = "その実、心では誰よりもこんな時間を望んでいた。"
10026050-84 = "……みんなと海に行きたかった。"
10026050-86 = "ふふっ。ただ、それだけのお話です。"
10026050-87 = "[s] \"……。\""
10026050-88 = "な、何か言っていただけると助かるのですが……"
10026050-89 = "……やはり、私には似合わないでしょうか？"
10026050-90 = "[s11] \"ハナコにも余裕ができたんだなって……\"\n[s12] \"そういう風に言えるようになったことが、嬉しくて。\""
10026050-93 = "…………。"
10026050-94 = "そうですか？"
10026050-95 = "でも……考えてみたらそうかもしれませんね。"
10026050-96 = "ですが、せっかく無人島まで来て、2人きりで過ごせる貴重な時間を……"
10026050-97 = "いつもの冗談や世間話で無駄にはしたくありませんでした。#nそういったお話なら、戻ってからもできますし。"
10026050-98 = "……先生。"
10026050-99 = "これからは、もう少し……もう少しだけ。"
10026050-100 = "私も、ワガママになっても良いでしょうか？"
10026050-101 = "[s] \"もちろん。\""
10026050-102 = "……あら？"
10026050-103 = "そんな簡単に返事をしてしまって……本当に大丈夫ですか？"
10026050-104 = "もしかしたら……先生が思っている以上に、負担かもしれませんよ？"
10026050-105 = "[s13] \"夏だからね。\"\n[s14] \"年相応の女の子、でしょ？\""
10026050-108 = "……ふふ。"
10026050-109 = "では、この先も期待しちゃいますよ？"
10026050-110 = "……知ってますよね？#n私、こう見えてもかなり記憶力がいいんです。"
10026050-114 = "今日の約束、忘れませんからね♡"
10026050-119 = "（その後、ハナコとレモン農園を見て回ってから拠点に戻った）"
10026050-123 = "（拠点に戻ると、ハナコと2人きりだったせいで、何度もコハルに死刑を言い渡された）"
