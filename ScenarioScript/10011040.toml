[translation]
10011040-1 = "第4話;最初の関門：看板娘とSP"
10011040-8 = "はぁ、はぁ……ほ、本当にやっちまった……！"
10011040-9 = "ゆ、誘拐しちゃったっすね！"
10011040-10 = "こ、これ良いんだよな？"
10011040-12 = "浮足立つな、まだ目標が達成できたわけじゃない。"
10011040-14 = "ちゃ、ちゃんと覚えてるよ！リーダー！"
10011040-15 = "「和楽姫」の主役を誘拐して、今回の交流会をめちゃくちゃにする！"
10011040-16 = "そして陰陽部の地位を失墜させる、っすよね！"
10011040-17 = "そうだ、ここまでは計画通り。"
10011040-18 = "そもそも今回の作戦は、キヴォトスでも犯罪界のマスターと呼ばれている「ニヤニヤ教授」に協力してもらった……失敗するはずがない。"
10011040-19 = "ニヤニヤ教授って……。"
10011040-20 = "あのクロノスでも正体が掴めないっていう、あの！？有名人じゃないっすか！"
10011040-21 = "そうだ。その助力もあって、今回の計画は完璧。"
10011040-22 = "後は淡々と実行するだけ……さあ、我々「魑魅一座・気まぐれ流」の力、百鬼夜行とゲヘナに見せつけてやろう。"
10011040-24 = "有名度で行けば、本当にあの「チセ様」を誘拐しちゃうなんて……。"
10011040-25 = "成功したのに、まだ胸がバクバクしてるっす……。"
10011040-26 = "せっかくだし、チセ様のお顔を一目見て落ち着くとするか……"
10011040-38 = "あれ、そろそろ出番？"
10011040-39 = "……イブキ、これから何をすれば"
10011040-40 = "良いんだっけ？"
10011040-47 = "「「「誰だ！？」」」"
10011040-48 = "（チセ様ではない……！？この服装、まさかゲヘナの万魔殿……！？）"
10011040-49 = "ち、チセ様のサインもらいたかったのに！"
10011040-50 = "残念っす！"
10011040-51 = "そんなことを言ってる場合か！？"
10011040-53 = "あれ？"
10011040-59 = "そこのあんたたち！そんなところで何してるの？"
10011040-61 = "なっ、もう尻尾を掴まれたのか！？"
10011040-68 = "あんたたち誘拐役でしょ？イベントは始まったのに、何をボーっとしてるのよ。"
10011040-70 = "お、お祭り運営委員会の、委員長……？"
10011040-71 = "ほら、逃走ルートはこっちだ！"
10011040-72 = "わ、私たちが逃げられるように助けてくれるんすか……！？"
10011040-73 = "そういえば聞いたことがある……"
10011040-74 = "お祭り運営委員会の委員長は、お金の為ならどんな手段とも厭わない非情な奴だと！"
10011040-75 = "まさか……これも「ニヤニヤ教授」の計画っすか！？"
10011040-77 = "そ、そういうことだったのか……！"
10011040-78 = "……何言ってんの？何か変な言葉が聞こえた気がするし……。"
10011040-79 = "まあとにかく、こんなことしてる場合じゃないわ。ほら、急ぎなさい！"
10011040-80 = "え、ええっ……？"
10011040-86 = "何か、見た目が魑魅一座っぽくて気分が悪いけど……"
10011040-87 = "まあ公演の途中だし、魑魅一座がここにいるわけないし……うん。"
10011040-91 = "えっと、とにかく次はたしか……。"
10011040-95 = "委員長！フィーナ、到着しマシタ！"
10011040-96 = "あっ、お疲れ様！よし、じゃあ私たちも準備するわよ！フィーナ！"
10011040-100 = "魑魅一座、たしかこっちの方に……！"
10011040-101 = "イズナからは逃げられませんよー！"
10011040-102 = "はぁ、はぁ……！"
10011040-104 = "ちょっと"
10011040-112 = "待ったぁ！"
10011040-113 = "ここは通しマセン！"
10011040-118 = "なっ……！？"
10011040-119 = "[s] \"シズコに、フィーナ？\""
10011040-121 = "色んな挑戦者が来るとは聞いてましたが、まさか先生もいるとは……"
10011040-122 = "シズコ、びっくりです☆"
10011040-123 = "フィーナも、心が痛いデス！かつては一緒に、大魔王ニャン天丸を倒した仲ですが……今は一時的にでも、袂を分かった状態！"
10011040-124 = "任侠の道は、非情なデスから！"
10011040-125 = "[s] \"どういうこと……！？\""
10011040-127 = "え、百夜堂のオーナーじゃん！どうして私たちの行く手を……まさかあなた達も、魑魅一座の仲間だったの！？"
10011040-128 = "あ、えっと確か……自称忍者を率いる謎の変人集団って噂の……。"
10011040-129 = "だ、誰が変人だって！？"
10011040-130 = "[s] \"百鬼夜行、不思議な集団が多いのは確かかもね……。\""
10011040-131 = "何か言いましたか、先生？"
10011040-133 = "百夜堂、聞いたことがあります……マニアックなサービスを、提供し、その対価を請求される、という……。"
10011040-134 = "業界の闇、というやつですか？イズナは騙されませんよ！"
10011040-135 = "ちょっとぉ！誤解されるようなこと言わないで！"
10011040-136 = "[s] \"まあ、一部「マニアック」なのはそうかも。\""
10011040-137 = "先生まで！？"
10011040-138 = "と、とにかく今日の私たちは、公演のアトラクション担当なんです！"
10011040-140 = "……？"
10011040-141 = "あ、公演の試練の……？"
10011040-142 = "そうです！"
10011040-143 = "このアトラクションにおける「最初の関門」、それこそがこの私！"
10011040-144 = "百夜堂のアイドルでありオーナー！そして看板娘の、[ruby=かわわ]河和[/ruby]シズコ！"
10011040-145 = "そしてフィーナ、デス！お頭ぁ！"
10011040-146 = "ふふふっ、何を隠そう私がここにいるのは……"
10011040-148 = "これが最初の関門、つまり看板みたいなものだからです！看板娘だけに！"
10011040-155 = "[ns] \"……笑った方が良い？\""
10011040-157 = "要りませんっ！！！"
10011040-158 = "上手い洒落じゃないことくらい分かってるので！"
10011040-159 = "とにかく台本はさておき、仕切り直しです！"
10011040-160 = "誘拐されたお姫様を助けにきた皆さん、この私シズコと……！"
10011040-161 = "フィーナがお相手、いたしマ～～ッス！"
