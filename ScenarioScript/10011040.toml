[translation]
10011040-1 = "Episódio 4; O Primeiro Obstáculo: A Garota-Propaganda e a SP"
10011040-8 = "Haah, haah... N-nós realmente fizemos isso...!"
10011040-9 = "N-nós sequestramos ela, né!"
10011040-10 = "I-isso é mesmo permitido, né?"
10011040-12 = "Não fiquem nervosos, ainda não alcançamos nosso objetivo."
10011040-14 = "N-nós lembramos muito bem! Líder!"
10011040-15 = "Sequestrar a protagonista da 'Princesa Waraku' e arruinar o evento de intercâmbio!"
10011040-16 = "E fazer com que o Departamento Yin-Yang perca sua credibilidade, certo!"
10011040-17 = "Exato, até aqui tudo corre conforme o plano."
10011040-18 = "Afinal, nesta operação contamos com a cooperação do 'Sensei Sorriso', conhecido no mundo do crime de Kivotos como um mestre... Não tem como falhar."
10011040-19 = "Sensei Sorriso, é..."
10011040-20 = "Aquele que nem a Chronos consegue descobrir a identidade, aquele!? Ele não é uma celebridade?"
10011040-21 = "Sim. Com a ajuda dele, este plano é perfeito."
10011040-22 = "Agora é só executar friamente... Vamos mostrar a força da nossa 'Trupe Chimi: Estilo Caprichoso' para Hyakkiyako e Gehenna."
10011040-24 = "Falando em fama, pensar que realmente sequestramos a 'Senhorita Chise'..."
10011040-25 = "Mesmo tendo conseguido, meu coração ainda está disparado..."
10011040-26 = "Já que estamos aqui, vou dar uma olhada no rosto da Senhorita Chise para me acalmar..."
10011040-38 = "Ué, já é minha vez?"
10011040-39 = "...Ibuki, o que eu devo fazer agora"
10011040-40 = "mesmo?"
10011040-47 = "'''Quem é você!?'''"
10011040-48 = "(Não é a Senhorita Chise...!? Esse uniforme, será que é do Pandemonium de Gehenna...!?)"
10011040-49 = "M-mas eu queria um autógrafo da Senhorita Chise!"
10011040-50 = "Que azar!"
10011040-51 = "É hora de falar disso agora!?"
10011040-53 = "Ué?"
10011040-59 = "Ei, vocês aí! O que estão fazendo num lugar desses?"
10011040-61 = "Droga, já fomos descobertos!?"
10011040-68 = "Vocês são os sequestradores, né? O evento já começou, por que estão aí parados?"
10011040-70 = "A, a presidente do Comitê Organizador do Festival...?"
10011040-71 = "Vamos, a rota de fuga é por aqui!"
10011040-72 = "V-você está nos ajudando a fugir...!?"
10011040-73 = "Agora que lembrei, já ouvi falar disso..."
10011040-74 = "Dizem que a presidente do Comitê Organizador do Festival é uma pessoa impiedosa que não mede esforços por dinheiro!"
10011040-75 = "Será que... isso também faz parte do plano do 'Sensei Sorriso'!?"
10011040-77 = "E-então era isso...!"
10011040-78 = "...Do que vocês estão falando? Acho que ouvi umas palavras estranhas..."
10011040-79 = "Bom, de qualquer forma, não é hora para isso. Vamos, apressem-se!"
10011040-80 = "H-hein...?"
10011040-86 = "Eles parecem um pouco com a Trupe Chimi, o que me dá um mau pressentimento..."
10011040-87 = "Mas a apresentação está no meio, e não tem como a Trupe Chimi estar aqui... é, deve ser isso."
10011040-91 = "Bem, de qualquer forma, o próximo passo é..."
10011040-95 = "Presidente! Fina, cheguei!"
10011040-96 = "Ah, bom trabalho! Certo, então vamos nos preparar também! Fina!"
10011040-100 = "Trupe Chimi, acho que eles foram por aqui...!"
10011040-101 = "Vocês não vão escapar da Izuna!"
10011040-102 = "Haah, haah...!"
10011040-104 = "Ei, vocês"
10011040-112 = "Parem aí!"
10011040-113 = "Vocês não vão passar daqui!"
10011040-118 = "O quê……!?"
10011040-119 = "[s] \"Shizuko, e Fina?\""
10011040-121 = "Eu ouvi dizer que vários desafiantes viriam, mas não esperava que o Sensei também estivesse aqui……"
10011040-122 = "A Shizuko está surpresa☆"
10011040-123 = "A Fina também está com o coração partido! Embora já tenhamos derrotado o Grande Rei Demônio Nyantenmaru juntos... agora, mesmo que temporariamente, estamos em lados opostos!"
10011040-124 = "O caminho da cavalaria é impiedoso!"
10011040-125 = "[s] \"O que isso significa……!?\""
10011040-127 = "Ei, não é a dona da Hyakkiyako? Por que estão bloqueando nosso caminho... Não me diga que vocês também são membros do Grupo Chimi!?"
10011040-128 = "Ah, bem, se não me engano... aquele grupo de esquisitos misteriosos que dizem ser ninjas..."
10011040-129 = "Q-quem você chamou de esquisito!?"
10011040-130 = "[s] \"Hyakkiyako realmente tem muitos grupos peculiares...\""
10011040-131 = "Disse alguma coisa, Sensei?"
10011040-133 = "Hyakkiyako, já ouvi falar... dizem que oferecem serviços maníacos e cobram caro por eles..."
10011040-134 = "Seria esse o lado sombrio da indústria? Izuna não será enganada!"
10011040-135 = "Ei! Não diga coisas que possam causar mal-entendidos!"
10011040-136 = "[s] \"Bem, talvez uma parte seja um pouco 'maníaca' mesmo.\""
10011040-137 = "Até você, Sensei!?"
10011040-138 = "De, de qualquer forma, hoje nós somos as responsáveis pela atração da apresentação!"
10011040-140 = "……?"
10011040-141 = "Ah, o teste da apresentação...?"
10011040-142 = "Exatamente!"
10011040-143 = "O \"primeiro obstáculo\" desta atração sou eu mesma!"
10011040-144 = "A ídolo e dona da Hyakkiyako! E a garota-propaganda, Shizuko Kawawa!"
10011040-145 = "E a Fina também! Chefe!"
10011040-146 = "Fufufu, não há como esconder, estou aqui porque..."
10011040-148 = "Este é o primeiro obstáculo, ou seja, é como uma placa de sinalização! Já que sou a garota-propaganda!"
10011040-155 = "[ns] \"……Devo rir?\""
10011040-157 = "Não precisa!!!"
10011040-158 = "Eu sei muito bem que não foi uma boa piada!"
10011040-159 = "De qualquer forma, deixando o roteiro de lado, vamos recomeçar!"
10011040-160 = "Vocês que vieram salvar a princesa sequestrada, eu, Shizuko, e...!"
10011040-161 = "A Fina seremos suas oponentes!"
