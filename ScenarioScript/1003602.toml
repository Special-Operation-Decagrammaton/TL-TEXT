[translation]
1003602-1 = "Administradora da Catedral"
1003602-2 = "Interior da Catedral de Trinity"
1003602-3 = "（Visitando Trinity por um assunto qualquer, lembrei-me da mensagem de Hinata e fui em direção à catedral）"
1003602-4 = "（O interior da catedral é espaçoso e não há nenhum aluno à vista）"
1003602-5 = "Clang"
1003602-6 = "[ns] \"……？\""
1003602-7 = "Clang, clang-clang……"
1003602-8 = "Bum!"
1003602-9 = "（Um som vem de uma porta entreaberta em um canto da catedral）"
1003602-10 = "[ns1] \"……Tem alguém aí?\"\n[ns2] Vou até a direção de onde vem o som."
1003602-14 = "（Do outro lado daquela porta, havia um corredor que levava a um depósito）"
1003602-18 = "……? Ah, Sensei……?"
1003602-19 = "[s] \"Ah, Hinata.\""
1003602-20 = "Bem, que... que coincidência, não é? O que o traz aqui……?"
1003602-21 = "Não, mais importante, como você chegou a este lugar……!?"
1003602-22 = "Este lugar é, bem, tecnicamente um local onde pessoas de fora não deveriam entrar……?"
1003602-23 = "Ah, você ouviu um barulho……?"
1003602-24 = "……A porta estava aberta, você diz?"
1003602-25 = "……."
1003602-26 = "Ah! Eu deixei a porta do corredor aberta……!"
1003602-27 = "Ugh…… eu cometi um erro tão básico de novo……."
1003602-28 = "……?"
1003602-29 = "Você não vai contar para ninguém……?"
1003602-30 = "E-espere, não é essa a questão……! Não, eu agradeço por isso, mas, bem……!"
1003602-31 = "……Ah, sobre o que eu estou fazendo?"
1003602-32 = "Bem, acho que você já pode ver pelo que estou fazendo……."
1003602-33 = "Eu estava organizando os suprimentos."
1003602-34 = "À primeira vista, a catedral pode parecer um lugar simples e organizado……"
1003602-35 = "Mas temos os pertences das irmãs, suprimentos necessários para a catedral, itens esquecidos pelos visitantes…… há muitas coisas aqui."
1003602-36 = "Quando juntamos tudo assim, só o que precisa ser movido em um dia chega a dezenas de caixas."
1003602-37 = "[s3] \"É uma quantidade impressionante…… Você faz tudo isso sozinha?\"\n[s4] \"Entendo, então essa é a sua função, Hinata. Incrível.\""
1003602-38 = "Ah, bem, não é nada tão incrível assim……."
1003602-39 = "Ah, bem, não é nada tão incrível assim……."
1003602-40 = "Mas, sim. Manutenção das instalações, reparos e gestão de itens são minhas funções."
1003602-41 = "Claro, as outras irmãs também me ajudam."
1003602-42 = "Dito isso, basicamente é melhor que eu cuide do trabalho pesado."
1003602-43 = "Ah…… você quer ajudar?"
1003602-44 = "E-espere, eu agradeço muito pela oferta, mas……."
1003602-45 = "S-Sensei!?"
1003602-49 = "[ns5] \"N-nem se moveu!?\"\n[ns6] \"M-minhas costas……!\""
1003602-50 = "V-você está bem, Sensei!?"
1003602-51 = "V-você está bem, Sensei!?"
1003602-55 = "C-como você deve ter percebido, esta caixa é mais pesada do que parece…… Normalmente, as outras irmãs precisam de 3 ou 4 pessoas para levantá-la."
1003602-56 = "Como não quero pedir ajuda a tantas pessoas toda vez, basicamente eu acabo fazendo isso…… é por isso."
1003602-57 = "[s7] \"Entendo…… Você é realmente incrível, Hinata…….\"\n[s8] \"Ah, entendi…… Essa é uma das suas grandes qualidades, Hinata.\""
1003602-58 = "Ah, muito obrigada."
1003602-59 = "Ah, muito obrigada."
1003602-60 = "……Fico feliz em ouvir isso."
1003602-61 = "Eu, bem, não sou boa em coisas como \"ouvir o que os outros têm a dizer para aliviar o coração\", como as outras irmãs……."
1003602-62 = "Já que só consigo fazer esse tipo de coisa."
1003602-63 = "É como um processo de eliminação, eu acho... hehe..."
1003602-64 = "[s] \"Não é nada disso.\""
1003602-65 = "S-sério...?"
1003602-66 = "Ah. D-desculpe, eu acabei falando besteira de novo..."
1003602-67 = "Perdão, acabei puxando um assunto estranho."
1003602-68 = "B-bem, vamos sair? Eu te guio."
1003602-69 = "……Eh? Ah, não, não é isso."
1003602-70 = "Eu não estava tão ocupada assim, então não se preocupe."
1003602-71 = "Além disso, eu também precisava levar algumas coisas para a capela."
1003602-72 = "Bem... ah, é isto aqui."
1003602-73 = "……Pronto."
1003602-74 = "Ufa."
1003602-75 = "……Então, vamos?"
1003602-78 = "[ns] Surpreso por ela ter levantado aquele peso com tanta facilidade, sigo Hinata."
1003602-82 = "Ufa... pronto, agora está tudo certo."
1003602-83 = "Ah, acabei suando um pouco... não foi um exercício tão intenso, mas eu suo bastante..."
1003602-84 = "E você também está suado, Sensei... fufu, você se esforçou bastante agora há pouco, não é?"
1003602-85 = "Ah, d-desculpe, Sensei. Ficar perto de você assim, toda suada... que falta de educação a minha..."
1003602-86 = "Mas, nós estivemos juntos o tempo todo, então acho que não faz diferença agora, né...?"
1003602-90 = "……Ué? Tem uma multidão ali..."
1003602-91 = "Se não for impressão minha, todos eles estão olhando para nós...?"
1003602-92 = "P-por que será, Sensei? ...Sensei? Você está pálido, está tudo bem?"
1003602-93 = "……Um mal-entendido? O que você quer dizer com isso...?"
1003602-94 = "Porque saímos da sala dos fundos juntos, suados...?"
1003602-95 = "[s9] \"B-bem, obrigado por hoje!\"\n[s10] \"É melhor nos separarmos agora, bom trabalho!\""
1003602-100 = "E-eh...!?"
1003602-101 = "S-Sensei...!?"
1003602-103 = "(Para evitar que o mal-entendido aumentasse, saí rapidamente do local.)"
1003602-104 = "(E Hinata, no fim das contas, parecia não ter a menor ideia do que se tratava o mal-entendido.)"
