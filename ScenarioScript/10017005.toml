[translation]
10017005-1 = "Prólogo; Natal em Kivotos!"
10017005-9 = "Dentro da escola Trinity"
10017005-10 = "O desabrochar da primavera, o mar no verão, as folhas de outono... e então..."
10017005-11 = "Falando em inverno, é neve, não é!"
10017005-12 = "Claro que tem isso, mas...#nO que mais lhe vem à mente?"
10017005-13 = "Além disso... é o Natal!"
10017005-14 = "Isso, o Natal!"
10017005-15 = "Natal!!!"
10017005-16 = "Decorar a árvore!"
10017005-17 = "Cantar canções natalinas!"
10017005-18 = "Preparar os presentes!"
10017005-19 = "Esperar pelo Papai Noel!"
10017005-21 = "Eba!!!"
10017005-22 = "[ns] \"Vocês duas parecem bem animadas.\""
10017005-23 = "É porque é Natal!"
10017005-24 = "Ahaha... bem, não dá para ficar apenas se divertindo o tempo todo."
10017005-25 = "Claro, não esquecemos do que precisamos fazer!#nÉ por isso que nos vestimos de Papai Noel!"
10017005-26 = "Você está cheia de energia, Hanae..."
10017005-27 = "A, a propósito, Sensei, o que acha...?#nEstá... estranho??"
10017005-28 = "[s1] \"Combina muito com você.\"\n[s2] \"Uma heroína clássica, perfeita.\""
10017005-31 = "E eu? Como estou, Sensei!"
10017005-32 = "[s3] \"Hanae também está fofa!\"\n[s4] \"Sua energia combina com a tranquilidade desta estação.\""
10017005-35 = "Ouviu isso, veterana!#nValew a pena ter começado os preparativos bem cedo!"
10017005-36 = "Ha, Hanae...!"
10017005-37 = "[s] \"Falando nisso, a Sociedade de Socorro também celebra o Natal, né.\""
10017005-38 = "Com certeza!#nNa verdade, o Natal é a época em que a Sociedade de Socorro mostra seu verdadeiro valor!"
10017005-39 = "As atividades da Sociedade de Socorro não mudam, mas...#nO Natal não é uma exceção, é isso."
10017005-41 = "Desculpem a demora, vocês duas."
10017005-47 = "Este dia de Natal chegou mais uma vez..."
10017005-48 = "Embora seja um dia sagrado, nós continuaremos a oferecer \"socorro\" como sempre."
10017005-49 = "Socorro necessário, onde for necessário. Enquanto refletimos sobre este ano, reafirmamos nossa missão."
10017005-50 = "[s] \"Entendo... mas, o que vocês farão exatamente?\""
10017005-51 = "Em termos simples, é \"trabalho voluntário\"."
10017005-52 = "Colocamos um caldeirão e pedimos doações para quem passa!"
10017005-53 = "Além disso, cantamos canções natalinas e distribuímos luvas e gorros feitos à mão!"
10017005-54 = "A voz da Serina-senpai cantando é maravilhosa, sabe? Fique ansioso por isso, Sensei!"
10017005-55 = "Ha, Hanae, se você falar assim, a expectativa vai ficar alta demais..."
10017005-61 = "[ns5] \"Entendo, então vocês querem que eu ajude.\"\n[ns6] \"Então, acho que vou passar o Natal com a Sociedade de Socorro.\""
10017005-65 = "É bom ver que Serina e Hanae estão cheias de energia."
10017005-66 = "Sensei, peço desculpas por causar transtornos de repente."
10017005-67 = "[s7] \"Não, não é transtorno nenhum.\"\n[s8] \"E estou ansioso para ouvir as canções de vocês!\""
10017005-70 = "Obrigada. Então, por favor, sigam para o local primeiro."
10017005-71 = "Eu vou dar uma volta por Trinity antes de me juntar a vocês."
10017005-73 = "Entendido, tome cuidado também, Comandante."
10017005-74 = "Entendido!!"
10017005-77 = "#video;10017"
