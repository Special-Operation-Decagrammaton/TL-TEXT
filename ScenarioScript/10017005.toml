[translation]
10017005-1 = "プロローグ;キヴォトスのクリスマス！"
10017005-9 = "トリニティ校内"
10017005-10 = "春の芽吹き、夏の海、秋の紅葉……そして……"
10017005-11 = "冬といえば、雪ですね！"
10017005-12 = "もちろんそれもありますが……#n他には何が浮かびますか？"
10017005-13 = "あとは……クリスマスですね！"
10017005-14 = "そう、クリスマス！"
10017005-15 = "クリスマス！！！"
10017005-16 = "ツリーを飾って！"
10017005-17 = "キャロルを歌って！"
10017005-18 = "プレゼントを準備して！"
10017005-19 = "サンタクロースを待ちます！"
10017005-21 = "わーい！！！"
10017005-22 = "[ns] \"二人とも楽しそうだね。\""
10017005-23 = "だってクリスマスですもん！"
10017005-24 = "あはは……まあ、あまり浮かれてばかりもいられないのですが。"
10017005-25 = "もちろん、やるべきことも忘れてませんよ！#nだからこそこうやって、サンタ服になったのです！"
10017005-26 = "やる気満々ですね、ハナエちゃん……"
10017005-27 = "と、ところで先生、いかがでしょう……？#n変……だったりしますか？？"
10017005-28 = "[s1] \"よく似合ってるよ。\"\n[s2] \"正統派ヒロイン、最高。\""
10017005-31 = "私は？私はどうですか、先生！"
10017005-32 = "[s3] \"ハナエも可愛い！\"\n[s4] \"元気さとこの季節の落ち着きがマッチしてる。\""
10017005-35 = "だそうですよ、先輩！#n朝早くから準備した甲斐がありましたね！"
10017005-36 = "は、ハナエちゃん……！"
10017005-37 = "[s] \"そういえば、救護騎士団もクリスマスを祝うんだね。\""
10017005-38 = "当然です！#nむしろクリスマスこそ、救護騎士団が本領を発揮する時期です！"
10017005-39 = "いつでも救護騎士団の活動は変わりませんが……#nクリスマスも例外ではない、ということです。"
10017005-41 = "お二人とも、お待たせしました。"
10017005-47 = "今年もこのクリスマスの日がやってきました……。"
10017005-48 = "聖なる日ではありますが、私たちは変わらず「救護」を届けます。"
10017005-49 = "必要な場所に、必要な救護を。この一年のことを振り返りつつも、あらためて使命を見つめ直すのです。"
10017005-50 = "[s] \"なるほど……具体的には、何をするの？\""
10017005-51 = "簡単に言うと、「ボランティア」ですね。"
10017005-52 = "鍋をおいて、道いく人に募金をお願いしたり！"
10017005-53 = "あとはキャロルを歌ったり、手編みの手袋や帽子を配ったりもするんです！"
10017005-54 = "セリナ先輩のキャロル、すっごい綺麗なんですよ？楽しみにしててくださいね、先生！"
10017005-55 = "は、ハナエちゃん、そこまで言われるとハードルが……"
10017005-61 = "[ns5] \"なるほど、それで手伝ってほしいってことだね。\"\n[ns6] \"じゃあ、救護騎士団と一緒にクリスマスを過ごさせてもらおうかな。\""
10017005-65 = "セリナもハナエも、元気いっぱいなのは良いことですね。"
10017005-66 = "先生、突然のことでご迷惑をおかけしてしまいすみません。"
10017005-67 = "[s7] \"ううん、全然迷惑なんてことは。\"\n[s8] \"みんなのキャロルも楽しみだし！\""
10017005-70 = "ありがとうございます。では、皆さんはお先に現場へ向かってください。"
10017005-71 = "私はトリニティをぐるっと巡ってから、合流しますので。"
10017005-73 = "分かりました、団長もお気をつけて。"
10017005-74 = "了解です！！"
10017005-77 = "#video;10017"
