[translation]
84301400300-14 = "わわっ！？なっ、何でしょうか！？"
84301400300-15 = "違うんです！私たちは何もしてませんから！"
84301400300-16 = "原因を探してるところ……もう少し待ってて。"
84301400300-21 = "誤解だ。君たちを責める意図は無いよ。"
84301400300-22 = "ただ、私にも少し調査をさせてもらえないだろうか。"
84301400300-24 = "う、うーん……危ないので、できれば近づいて欲しくはないのですが……。"
84301400300-25 = "私たちに止める権利はない……調査は良いけど、気をつけてね。"
84301400300-26 = "もし、何か変なものを見つけたらすぐに教えてくださいね！"
84301400300-28 = "ありがとう。危険なことをするつもりは無いさ。"
84301400300-32 = "（さて……）"
