[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1011002-1 = "Um Convite da Princesa Adormecida" 
1011002-2 = "(Atendendo ao pedido da Seia,\nvisitei a Trinity escondido dos olhares alheios)" 
1011002-8 = "[ns1] (...Ué? Não tem ninguém aqui?)\n[ns2] (Será que errei o lugar?)" 
1011002-12 = "(A porta do depósito...\nestá um pouquinho aberta?)" 
1011002-17 = "[ns3] \"Com licença...\"\n[ns4] \"Tem alguém aí...?\"" 
1011002-20 = "...Hmm?" 
1011002-21 = "Uhn..." 
1011002-25 = "...Ah." 
1011002-26 = "Fufu..." 
1011002-29 = "[wa:430]― [log=세이아]...[wa:200]Ah,[wa:930] é você.[/log]" 
1011002-30 = "[wa:3340]― [log=세이아]Acredite se quiser,[wa:1380] eu estou meio surpresa agora.[/log]" 
1011002-33 = "[ns5] \"Desculpa, acabei entrando sem avisar.\"\n[ns6] \"Desculpa, não queria te assustar.\"" 
1011002-36 = "[wa:570]― [log=세이아]Não precisa se desculpar.[wa:2390] Ser surpreendida[wa:1300] é uma ótima forma de expandir o mundo.[/log]" 
1011002-37 = "[wa:4170]― [log=세이아]Pode-se dizer que eu[wa:1980] até estava ansiando[wa:1350] secretamente por isso.[/log]" 
1011002-40 = "[wa:1230]― [log=세이아]Mas,[wa:500] o que é mais inesperado...[/log]" 
1011002-41 = "[wa:3000]― [log=세이아]É a forma como nós dois,[wa:2380] estamos trocando olhares agora.[/log]" 
1011002-44 = "[wa:1620]― [log=세이아]Mas por que...[wa:670][/log]" 
1011002-45 = "[wa:3980]― [log=세이아]Ah,[wa:1180] entendi.[wa:960] [/log]" 
1011002-48 = "― [log=세이아]Fui eu quem te mandou[wa:740] a mensagem, não foi?[wa:2600] Que indelicadeza da minha parte.[/log]" 
1011002-51 = "[wa:720]― [log=세이아]Sabe...[wa:1700] eu não te chamei aqui[wa:640] porque eu tinha algum assunto sério.[/log]" 
1011002-54 = "[wa:800]― [log=세이아]É só que...[/log]" 
1011002-55 = "[wa:3560]― [log=세이아]Sinto que estou[wa:2890] cada vez mais seduzida...[wa:1000] pelas palavras que trocamos.[/log]" 
1011002-58 = "Te chamar assim do nada...\nnão foi um incômodo pra você?" 
1011002-59 = "Bem, é um pouco estranho\neu perguntar isso só agora." 
1011002-60 = "...Não tem problema nenhum?" 
1011002-61 = "Entendo. Bem a cara\ndo Sensei mesmo." 
1011002-62 = "[s7] \"Achei que tinha me chamado por causa do Tea Party.\"\n[s8] \"Pensei que fosse algum assunto oficial.\"" 
1011002-65 = "É natural que pensasse assim.\nAfinal, eu escolhi as minhas palavras\njustamente com essa intenção." 
1011002-66 = "Mas, como eu já disse," 
1011002-67 = "Não há nenhuma razão especial\npara eu ter te chamado aqui." 
1011002-68 = "...Talvez eu esteja sendo\numa 'garota um tanto carente' agora." 
1011002-69 = "Eu só queria chamar a sua atenção...\nfoi só o que eu pensei." 
1011002-70 = "Se eu só quisesse te ver, bastaria dizer\n'quero me encontrar com você', não é?" 
1011002-71 = "E mesmo assim, fiz questão de mandar\numa mensagem cheia de segundas intenções.#nE pra piorar, quem chamou acabou\ncaindo no sono. Sou uma piada, né." 
1011002-72 = "Não sei até que ponto\nvocê já percebeu, mas..." 
1011002-73 = "Eu posso ser bem mais atrevida\ne sem limites do que pareço." 
1011002-74 = "Claro, desde que não suje o nome de\nTrinity ou do Tea Party...#ncom essa pequena ressalva, fufu." 
1011002-75 = "Todo mundo faz o que quer por aí.#nAté eu sinto vontade de ser um\npouquinho egoísta de vez em quando." 
1011002-76 = "E por acaso, dessa vez,\nisso tomou essa forma...#nAqui está a conclusão dessa historinha." 
1011002-77 = "Mas... já que eu gastei o meu\n'uma vez' com essa brincadeirinha..." 
1011002-78 = "Vou parar de te chamar sem motivo\ndaqui pra frente." 
1011002-79 = "Se eu continuar assim, serei rotulada\ncomo uma 'aluna problemática', não acha?#nEu até queria te provocar um pouquinho,\nmas se você me odiar, perde a graça." 
1011002-80 = "[s9] \"Pode me mandar o tipo de mensagem que quiser.\"\n[s10] \"Pelo contrário, fico feliz de termos essa conversa.\"" 
1011002-85 = "Nossa... Você é realmente\num Sensei bom até demais." 
1011002-86 = "É por isso que alunas como eu acabam\nse agarrando em você... o que deve dar\num belo trabalho, não acha?" 
1011002-90 = "Vamos mudar um pouquinho de assunto." 
1011002-91 = "Você não perguntou sobre a minha saúde.#nGeralmente as pessoas começam a conversa\ncom palavras de preocupação." 
1011002-92 = "Perguntando como estou, se já\nestou bem, se o meu corpo não dói..." 
1011002-93 = "Não... Foi uma pergunta tola." 
1011002-94 = "A resposta já me foi dada, afinal." 
1011002-95 = "[s11] \"Te ver cheia de energia agora já é a resposta.\"\n[s12] \"É algo que eu percebo sem precisar perguntar.\"" 
1011002-98 = "...Fui um pouco imprudente, mas recebi\numa recompensa muito além das expectativas." 
1011002-99 = "Mesmo sendo dessa forma,\nvou me apoiar nas suas palavras doces." 
1011002-100 = "Como 'ex-anfitriã' do Tea Party,\ntenho um pedido de cooperação para a Schale." 
1011002-111 = "...Eu gostaria de pedir a sua 'proteção'\nenquanto eu tiro a minha soneca da tarde." 
1011002-113 = "(Depois disso, tirei uma soneca na mesma cama\nque a Seia, e então retornei à Schale)" 