[translation]
1011802-1 = "意外な同行者"
1011802-2 = "（出張先に向かう列車に乗った）"
1011802-4 = "ご乗車のお客様にご案内いたします。"
1011802-5 = "ただいま車両点検を行なっております。#n出発は予定時刻より約20分ほど――"
1011802-6 = "[ns] \"これは遅刻かも……。\""
1011802-8 = "（20分後）"
1011802-12 = "あっ、やっと動いた。"
1011802-13 = "これじゃ遅れちゃうよー！"
1011802-17 = "あー、あー。乗客のみなさーん、聞こえてる？"
1011802-18 = "ちょーっと飛ばすよー……パヒャッ。"
1011802-19 = "えっ？"
1011802-20 = "[ns] \"この声は……。\""
1011802-25 = "[ns] \"うわっ！\""
1011802-31 = "[ns] \"時間通りに着いた……\""
1011802-34 = "あ、先生じゃん。"
1011802-35 = "[s1] \"こんにちは、ノゾミ。\"\n[s2] \"もしかして、今の列車……。\""
1011802-38 = "パヒャヒャッ！運転手は私だよ！"
1011802-39 = "奇遇だね、先生も乗ってたんだ！"
1011802-40 = "で、ご感想は！？"
1011802-41 = "[s] \"すごいスピード……だった……。\""
1011802-42 = "私の列車に遅延の二文字はないからね！"
1011802-43 = "用事には間に合いそう？"
1011802-44 = "[s] \"うん、おかげさまで！\""
1011802-45 = "よかったよかった。"
1011802-46 = "帰りはいつ頃なの？"
1011802-47 = "[s] \"夕方かな……。\""
1011802-48 = "じゃ、終わったら連絡して。いってらっしゃい！"
1011802-54 = "（ノゾミは風のように去っていった……）"
1011802-56 = "（改札に入り、ノゾミに連絡すると……）"
1011802-60 = "タイミングいい！1番ホームに入るから、先頭車両に来てよ。"
1011802-64 = "[ns] \"えーっと、先頭だっけ……。\""
1011802-67 = "や、先生。"
1011802-68 = "[ns] \"ここでいいの……？\""
1011802-69 = "はやく乗った乗った！"
1011802-70 = "（ノゾミに促され、運転室に乗り込んだ）"
1011802-71 = "[ns] \"初めて入ったよ……\""
1011802-72 = "いいよ、見学見学！"
1011802-73 = "んじゃ、出発進行～。"
1011802-80 = "[wa:4860]― [log=노조미]運転室からの景色はどう？[/log]"
1011802-83 = "― [log=노조미]この時間帯は特に綺麗でさ。[/log]"
1011802-85 = "― [log=노조미]好きなんだよね……[wa:2040]夕暮れ。[/log]"
1011802-88 = "[ns3] \"カッコイイ……！\"\n[ns4] \"でも、列車の運転って難しそうだね。\""
1011802-91 = "[wa:1030]― [log=노조미]自動運転システムもあるんだけど、[/log]"
1011802-92 = "[wa:2600]― [log=노조미]あんま使わないんだ。[/log]"
1011802-95 = "― [log=노조미]だってつまんないじゃん？[/log]"
1011802-96 = "[wa:1480]― [log=노조미]運転はやっぱ[wa:1430]自分の手でやらなきゃ。[/log]"
1011802-99 = "[wa:520]― [log=노조미]お？[wa:1430]先生もやってみる～？[/log]"
1011802-102 = "[ns] \"流石に怖いからやめとく！\""
1011802-103 = "[wa:250]― [log=노조미]あはははっ！[wa:980]じょーだんじょーだん！[/log]"
1011802-106 = "[wa:1080]― [log=노조미]先生は[wa:1440]機関士の免許ないし。[/log]"
1011802-108 = "― [log=노조미]いくらなんでも[wa:1640]流石に素人に触らせないよ。[/log]"
1011802-111 = "[ns] \"よ、よかった……。\""
1011802-113 = "（そうして、ノゾミが運転する列車で帰ってきた）"
1011802-119 = "[ns] \"楽しかったよ。ありがとう\""
1011802-120 = "お礼なんていいよ！"
1011802-121 = "私も楽しかったし！パヒャヒャッ！"
1011802-122 = "[ns] \"次は普通のお客さんとして乗るね。\""
1011802-124 = "[ns5] \"免許もないし……。\"\n[ns6] \"私は客席ってことで、どうかな？\""
1011802-127 = "ふ～ん？ま、いーけど。"
1011802-128 = "先生は素人だもんね。パヒャッ！"
1011802-130 = "（送ってくれたお礼として、ノゾミにアイスを買ってあげた）"
