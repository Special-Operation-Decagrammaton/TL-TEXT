[translation]
32070-1 = "Episódio 7: Novo Ponto de Vista"
32070-3 = "Ara, Junko-san e Akari-san."
32070-4 = "Ah, Haruna. Você também foi pega?"
32070-5 = "Fufu, eu aguentei uns 10 metros."
32070-6 = "Curto pra caralho……"
32070-7 = "Então, a única que conseguiu fugir foi a Izumi-san. Que bom, nosso sacrifício não foi em vão."
32070-8 = "Sacrifício? No começo a formação era quase o oposto……"
32070-9 = "Comitê de Execução da Justiça…… realmente, a força militar número 1 de Trinity. Capacidade de combate absurda."
32070-10 = "Que susto！ A Akari virou uma lata de refrigerante amassada em um segundo…… foi foda de verdade……"
32070-11 = "Sério, por que vocês vieram até o coração de Trinity…… só por causa de um atum……！"
32070-12 = "É simples, Junko-san. Imagine uma torneira aberta numa pia vazia——"
32070-13 = "Eu já ouvi essa merda antes！！"
32070-17 = "……O que vai acontecer com a gente agora?"
32070-18 = "Pensando logicamente, vamos ser entregues pro Comitê Disciplinar, né?"
32070-19 = "Que susto enorme！？ Não levanta em silêncio assim！？ Que bom que você tá bem, Akari！？"
32070-20 = "Fufu, não é tão fácil me derrubar★"
32070-21 = "Aliás, então é o Comitê Disciplinar…… que droga, só de pensar já……"
32070-22 = "Que situação…… preferia evitar ter nosso destino nas mãos da Hina-san……"
32070-23 = "Bom, dessa vez exageramos um pouco★ Não tem jeito."
32070-27 = "（Por que eu também……）"
32070-29 = "Periferia do território de Trinity"
32070-30 = "（Enquanto isso, em outro lugar, Izumi estava……）"
32070-31 = "O-onde eu tô……？ Eu sou a Izumi…… uwaaah！ Onde eu devo ir agora！？"
32070-36 = "Bom trabalho. Sensei, e todo o Clube de Reforço. Graças a vocês, conseguimos resolver a situação."
32070-37 = "Ahaha…… no meio eu só agi no automático……"
32070-38 = "Ver a tática do Comitê de Execução da Justiça de perto foi uma ótima lição."
32070-39 = "N-não sei se ajudei muito, mas……！"
32070-40 = "Aliás, o que vai acontecer com aquelas pessoas agora?"
32070-41 = "Normalmente nós decidiríamos o destino delas…… mas como o momento é delicado, vamos entregar pro Comitê Disciplinar de Gehenna."
32070-42 = "[s] \"Entendi.\""
32070-43 = "Sim. E tenho mais um pedido pro Sensei……"
32070-44 = "[s] \"Tá bom, o que precisa？\""
32070-45 = "Pensando no Tratado de Eden, não queremos nos mover ativamente a partir de agora."
32070-46 = "Então, a entrega pro Comitê Disciplinar…… será que você poderia cuidar dessa parte?"
32070-47 = "Se for a «Schale» entregando as alunas… essa forma reduz bastante os problemas políticos tanto pro nosso lado quanto pro lado de Gehenna."
32070-48 = "[s] \"Entendi, deixa comigo.\""
32070-49 = "Sim. Obrigada por tudo, Sensei. Então, vamos recuar e aguardar…… por favor."
32070-51 = "Grande ponte na periferia de Trinity"
32070-52 = "（Enquanto esperávamos a chegada do veículo do Comitê Disciplinar……）"
32070-60 = "……Desculpa a demora. Cadê os cadáveres?"
32070-61 = "[s] \"……Eh？\""
32070-62 = "……Desculpa. São feridos, né. Às vezes confundo."
32070-63 = "Ehh…… na lista de entrega tem 3 feridos frescos e 1 refém……"
32070-64 = "[s] \"Frescos……？\""
32070-65 = "……Aliás, quem é você？ Não parece do Comitê de Execução da Justiça……？"
32070-66 = "[s] \"Eh……\""
32070-72 = "Essa pessoa é o Sensei [USERNAME] da «Schale»."
32070-76 = "[ns] \"Hina！」"
32070-77 = "Faz tempo, Sensei. Quanto tempo mesmo…… Aliás, o que você tá fazendo aqui?"
32070-78 = "Vocês se conhecem, Comitê Disciplinar?"
32070-79 = "Sim…… bom, mais ou menos."
32070-81 = "Entendi. Pra evitar problemas políticos nesse momento delicado, o Sensei……"
32070-82 = "Realmente, nós também não queremos complicação. Por isso oficialmente não é o Comitê Disciplinar, mas o «Departamento de Medicina de Emergência» que veio. Eu sou basicamente só acompanhante."
32070-83 = "……Ministra do Departamento de Medicina de Emergência, Sena Himuro. Prazer, Sensei."
32070-84 = "Se tiver cadáver…… quer dizer, feridos, pode me chamar a hora que quiser. Não cobro taxa de entrega."
32070-85 = "[s] \"P-prazer……\""
32070-86 = "O Departamento de Medicina de Emergência tem pouca ligação política dentro de Gehenna. Por isso pedi pra eles virem dessa vez."
32070-87 = "Política deixo com a Comitê Disciplinar. Eu só me interesso por cadáveres."
32070-88 = "São «feridos», né？ E você nunca viu um cadáver de verdade, viu."
32070-89 = "Sim, eram feridos. Sobre isso, a Comitê Disciplinar também não tem nada a ver, né？"
32070-93 = "Enfim…… a Sociedade Gourmet tá aí dentro？ Pode passar pra cá？"
32070-98 = "……Fufu. Hina-san, faz tempo."
32070-99 = "Haruna, como sempre…… não, os detalhes deixo pra depois, no caminho de volta."
32070-100 = "Ara, então era mesmo o Departamento de Medicina de Emergência★ Meu braço tá dobrado num ângulo impossível, será que pode dar uma olhada？"
32070-101 = "Uweh…… tô passando mal…… vou vomitar……"
32070-102 = "C-conseguimos……"
32070-103 = "Ara, da seção de alimentação…… não te vi o dia todo e você tava aqui."
32070-104 = "Agora, na escola a Juli está…… não, melhor explicar no caminho de volta."
32070-105 = "Parece que falta uma pessoa da Sociedade Gourmet…… bom, tanto faz."
32070-107 = "Obrigada por toda a consideração, Sensei. Da próxima vez que for pra Gehenna, vou te receber com algo delicioso."
32070-108 = "Até mais～★"
32070-109 = "……Cala a boca e entra logo."
32070-110 = "[s] \"Então… até mais. Vai com cuidado……\""
32070-114 = "……Carregamento completo. Preparados pra partir."
32070-115 = "……Espera um pouco."
32070-116 = "……。"
32070-117 = "Sensei…… o que você tá fazendo em Trinity?"
32070-118 = "[s] \"Sou supervisor do Clube de Reforço……\""
32070-119 = "Isso eu já sei. As informações chegam……"
32070-120 = "Não é isso. A Schale era uma organização neutra. Estar em Trinity nesse momento parece……"
32070-121 = "[s] \"………。\""
32070-122 = "……Deixa pra lá, esquece o que eu disse. O Sensei não faria algo assim."
32070-123 = "[s] \"Hina, eu também quero te perguntar uma coisa.\""
32070-124 = "Hm？ O que você quer saber……？"
32070-125 = "[s] Pergunta sobre o Tratado de Eden e a opinião da Hina."
32070-128 = "（Expliquei a situação atual e as perspectivas futuras pra Hina.）"
32070-140 = "Entendi…… Sensei, você tá numa situação bem complicada."
32070-141 = "……Espera. Não teve uma cena estranha misturada agora？"
32070-142 = "[s1] \"Deve ser impressão.\"\n[s2] \"Com certeza é impressão.\""
32070-143 = "……。"
32070-144 = "……。"
32070-145 = "Bom, enfim……"
32070-146 = "«Traidora de Trinity»…… né."
32070-147 = "Muitas palavras voando, sem saber quem fala a verdade e quem mente……"
32070-148 = "[s3] \"Acho que tem várias formas de ver a situação.\"\n[s4] \"Dependendo do ponto de vista, a verdade pode mudar.\""
32070-149 = "Não sei se você é cauteloso ou otimista demais……"
32070-150 = "Não sei se você é cauteloso ou otimista demais……"
32070-151 = "……Aliás, tudo bem me contar algo tão importante assim？"
32070-152 = "[s] \"Sim, porque eu confio em você, Hina.\""
32070-153 = "……。"
32070-154 = "……Esse seu jeito… é o lado ruim do Sensei."
32070-155 = "[s] \"……？\""
32070-156 = "……Foi só um monólogo."
32070-157 = "O Tratado de Eden como aliança militar, né…… bom, é uma visão interessante."
32070-158 = "Mas eu não vejo assim. Pra mim é um tratado de paz de verdade."
32070-159 = "[s] \"Entendi……？\""
32070-160 = "A [ruby=ETO]Organização do Tratado de Eden[/ruby] que vai nascer…… mesmo se for vista como força militar, não é algo que a Nagisa pode controlar sozinha."
32070-161 = "A Makoto, líder do Pandemônio, vai ter o mesmo nível de autoridade que a Nagisa."
32070-162 = "E não só elas, outros membros do Tea Party e do Pandemônio também vão ter poder. Por isso é difícil imaginar o ETO perdendo o controle e saindo do propósito original."
32070-163 = "Claro, se todos eles se unirem… teoricamente é possível, mas……"
32070-164 = "No fundo, se fosse possível controlar tudo assim, era só unir as duas escolas desde o começo."
32070-165 = "Além disso, a Makoto não é do tipo que coopera com ninguém……"
32070-166 = "[s] \"……Então por que a Makoto concordou com o Tratado de Eden？\""
32070-167 = "……Concordou？ Provavelmente ela nem pensou nada. Na verdade, quem empurrou o Tratado do lado de Gehenna fui eu."
32070-168 = "[s] \"Você, Hina……？ Por quê？\""
32070-169 = "……É chato demais, e eu tava pensando em me aposentar."
32070-170 = "Com o ETO, a ordem em Gehenna deve melhorar bastante. Aí eu não preciso mais ser a Comitê Disciplinar."
32070-171 = "[s] \"Entendi……\""
32070-172 = "Ainda demora, Comitê Disciplinar？"
32070-173 = "……Sim, já vou."
32070-174 = "Então até mais, Sensei. De novo……"
32070-181 = "……O Clube de Reforço, você vai proteger eles, né？"
32070-182 = "[s] \"Sim.\""
32070-183 = "……É."
32070-185 = "……Então, até mais."
32070-194 = "Que dia louco……"
32070-195 = "Realmente, um passeio noturno virar algo tão pesado……"
32070-196 = "Sim, mas foi divertido."
32070-197 = "……Ehehe."
32070-198 = "Koharu-chan tá com cara de feliz desde mais cedo？ Porque conseguiu lutar junto com a Hasumi-senpai？"
32070-199 = "Isso mesmo！ E daí！？ Foi a primeira vez que lutei junto com a Hasumi-senpai……"
32070-201 = "Que eu consegui ajudar…… tô tão feliz……！ Ehe, ehehehe……！"
32070-202 = "Ufufu, isso é o mais importante♡ Agora é não levar reprovação, como a Hasumi-san deseja, né？"
32070-203 = "Eu sei！ Tá tudo bem, sou uma elite！"
32070-204 = "Sim…… eu também vou me esforçar♡"
32070-208 = "Ahaha…… já tá tarde, vamos dormir. Amanhã tem estudo, não pode atrapalhar……"
32070-209 = "Então, bom trabalho hoje."
32070-210 = "[s] \"Bom trabalho, todo mundo. Boa noite.\""
32070-212 = "（E assim, mais um longo dia chegou ao fim……）"
32070-214 = "Próximo; Fresta de Esperança"