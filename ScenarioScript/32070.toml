[translation]
32070-1 = "Episódio 7; Um Novo Ponto de Vista"
32070-3 = "Ora, Junko, Akari."
32070-4 = "Ah, Haruna. Você também foi pega?"
32070-5 = "Fufu, eu me esforcei por uns 10 metros, pelo menos."
32070-6 = "Curto demais..."
32070-7 = "Então, parece que a única que conseguiu escapar com sucesso foi a Izumi. Que bom, parece que nosso sacrifício não foi em vão."
32070-8 = "Não é como se fosse um sacrifício, e no começo a estrutura era quase o oposto..."
32070-9 = "Comitê de Justiça... Entendo, como esperado do grupo armado mais forte de Trinity. Uma capacidade de combate formidável."
32070-10 = "Que susto! Aquela Akari foi esmagada num instante, parecia uma lata de refrigerante... Sério, que susto..."
32070-11 = "Ai, ai, por isso eu disse para não virem até a base de Trinity... Não importa se você é uma viciada em atum, por que você teve que vir até um lugar desses?!"
32070-12 = "É que, Junko, no fim das contas, é o seguinte. Se você deixa a torneira aberta em uma pia onde não há ninguém..."
32070-13 = "Eu já ouvi isso antes!!"
32070-17 = "...O que vai acontecer com a gente agora?"
32070-18 = "Bem, pensando logicamente, acho que seremos entregues ao Comitê Disciplinar, não é?"
32070-19 = "Que sustooooo!? Não levante sem dizer nada!? Você está bem, Akari!?"
32070-20 = "Fufu, bem, não é tão fácil me derrotar assim★"
32070-21 = "Quer dizer, é verdade, o Comitê Disciplinar... Que droga, só de pensar nisso..."
32070-22 = "Estamos em apuros... Eu queria evitar que nosso destino ficasse nas mãos da Hina..."
32070-23 = "Bem, desta vez exageramos um pouco, né★ Talvez não tenha jeito."
32070-27 = "(Por que eu também estou aqui...)"
32070-29 = "Perto da fronteira da Região Autônoma de Trinity"
32070-30 = "(Enquanto isso, Izumi estava...)"
32070-31 = "O-onde eu estou...? Eu sou a Izumi... Uwaaa! Meu Deus, para onde eu devo ir!?"
32070-36 = "Bom trabalho. Sensei, e alunas do Clube de Estudos Suplementares. Graças a vocês, conseguimos resolver a situação em segurança."
32070-37 = "Ah, ahaha... A partir da metade, eu estava agindo por puro instinto..."
32070-38 = "Pude ver as táticas do Comitê de Justiça bem na minha frente, foi um bom aprendizado."
32070-39 = "N-não sei se fui útil, mas...!"
32070-40 = "A propósito, o que acontecerá com elas agora?"
32070-41 = "Normalmente, nós decidiríamos o destino delas, mas... como a época é delicada, estamos pensando em entregá-las ao Comitê Disciplinar de Gehenna."
32070-42 = "[s] \"Entendo.\""
32070-43 = "Sim. Por isso, tenho mais um pedido a fazer ao Sensei..."
32070-44 = "[s] \"Certo, o que devo fazer?\""
32070-45 = "Considerando o Tratado do Éden, queremos evitar ao máximo agir de forma ativa daqui em diante."
32070-46 = "Portanto, você poderia cuidar da entrega delas ao Comitê Disciplinar?"
32070-47 = "Se o 'Schale' fizer a entrega... dessa forma, as preocupações políticas diminuem bastante, tanto para nós quanto para o lado de Gehenna."
32070-48 = "[s] \"Entendido, pode deixar comigo.\""
32070-49 = "Sim. Muito obrigada por tudo, Sensei. Então, ficaremos em uma posição recuada... contamos com você."
32070-51 = "Ponte externa da Região Autônoma de Trinity"
32070-52 = "(Enquanto esperava a chegada do veículo do Comitê Disciplinar...)"
32070-60 = "...Desculpe a demora, onde estão os cadáveres?"
32070-61 = "[s] \"...Hein?\""
32070-62 = "...Perdão. Não cadáveres, mas feridos. Às vezes eu confundo."
32070-63 = "Bem... na lista de entrega, estava escrito: 3 feridos frescos e 1 refém..."
32070-64 = "[s] \"'Frescos'... ?\""
32070-65 = "...A propósito, quem é você? Não parece ser do Comitê de Justiça..."
32070-66 = "[s] \"Bem...\""
32070-72 = "Essa pessoa é o Sensei [USERNAME] do 'Schale'."
32070-76 = "[ns] \"Hina!\""
32070-77 = "Faz tempo, Sensei. Quanto tempo faz? ...A propósito, o que você estava fazendo aqui?"
32070-78 = "Vocês se conhecem, Presidente do Comitê Disciplinar?"
32070-79 = "Hum... bem, é isso mesmo."
32070-81 = "Entendo. Então foi o Sensei quem... para evitar que isso se tornasse um problema político para ambos os lados neste momento."
32070-82 = "De fato, nós também não queremos que isso se torne um problema. É por isso que, oficialmente, parece que foi o 'Departamento de Medicina de Emergência' que veio aqui, e não o Comitê Disciplinar. Basicamente, estou apenas acompanhando."
32070-83 = "...Sou Himuro Sena, chefe do Departamento de Medicina de Emergência. Prazer em conhecê-lo, Sensei."
32070-84 = "Se houver algum... digo, se houver algum ferido, pode nos chamar a qualquer momento. Não cobraremos taxa de entrega."
32070-85 = "[s] \"P-prazer em conhecê-la...\""
32070-86 = "O 'Departamento de Medicina de Emergência' é um dos grupos em Gehenna que menos se envolve com questões políticas. Por isso pedi a ajuda deles desta vez."
32070-87 = "Deixe as brincadeiras políticas para a presidente do Comitê Disciplinar. Eu não tenho interesse em nada além de cadáveres."
32070-88 = "Você quis dizer 'feridos', não é? Além disso, você nunca viu um cadáver de verdade."
32070-89 = "Sim, eram feridos. Sobre isso, a presidente do Comitê Disciplinar também não tem nada a dizer, certo?"
32070-93 = "De qualquer forma... o Clube de Pesquisa Gastronômica está aqui dentro? Então, pode transferi-los para cá?"
32070-98 = "...Fufu. Hina-san, faz tempo que não nos vemos."
32070-99 = "Haruna, como sempre... não, falaremos sobre isso com detalhes quando voltarmos."
32070-100 = "Ora, então era mesmo o 'Departamento de Medicina de Emergência'★ Meu braço está dobrado em um ângulo impossível, poderia dar uma olhada?"
32070-101 = "Ugh, estou enjoada... vou vomitar..."
32070-102 = "A-ainda bem..."
32070-103 = "Ora, do Clube de Merenda... não a vi o dia todo, e agora a encontro aqui."
32070-104 = "Juri está na escola agora... não, melhor explicar no caminho de volta."
32070-105 = "Sinto que falta mais uma pessoa do Clube de Pesquisa Gastronômica... bem, é trabalhoso demais, então deixa pra lá."
32070-107 = "Obrigada por toda a consideração, Sensei. Da próxima vez que vier a Gehenna, vou te receber com algo delicioso."
32070-108 = "Até a próxima então~★"
32070-109 = "...Que barulho, entrem logo."
32070-110 = "[s] \"Bem, então até mais. Se cuida...\""
32070-114 = "...Carregamento concluído. Estamos prontas para partir."
32070-115 = "...Espere um pouco."
32070-116 = "..."
32070-117 = "Sensei... o que você está fazendo em Trinity?"
32070-118 = "[s] \"Sou o sensei responsável pelo Clube de Estudos Suplementares...\""
32070-119 = "Eu já sei disso. Recebo várias informações..."
32070-120 = "Não é isso. Schale deveria ser uma organização neutra. Estar em Trinity nesta época parece que..."
32070-121 = "[s] \"...\""
32070-122 = "...Esqueça o que eu disse, não ligue. Não tem como o Sensei fazer algo assim."
32070-123 = "[s] \"Hina, eu também queria te perguntar uma coisa.\""
32070-124 = "Hum? O que você quer perguntar...?"
32070-125 = "[s] Perguntar a opinião de Hina sobre o Tratado do Éden."
32070-128 = "(Contei a Hina detalhadamente sobre a situação atual e as perspectivas futuras.)"
32070-140 = "Entendo... Sensei, você está em uma situação bem complicada."
32070-141 = "...Não, espere. Algo estranho se misturou no que você disse agora, não foi?"
32070-142 = "[s1] \"Acho que foi impressão sua.\"\n[s2] \"Com certeza foi impressão sua.\""
32070-143 = "..."
32070-144 = "..."
32070-145 = "Bem, de qualquer forma..."
32070-146 = "O 'traidor de Trinity'... é."
32070-147 = "Muitas palavras sendo ditas, uma situação onde não se sabe quem diz a verdade ou quem está mentindo..."
32070-148 = "[s3] \"Achei que existem vários pontos de vista.\"\n[s4] \"Porque a verdade pode mudar dependendo do ponto de vista.\""
32070-149 = "Não sei se você é cauteloso ou otimista, realmente não dá para entender..."
32070-150 = "Não sei se você é cauteloso ou otimista, realmente não dá para entender..."
32070-151 = "...A propósito, você pode me contar algo tão importante assim?"
32070-152 = "[s] \"Sim, porque eu confio em você, Hina.\""
32070-153 = "..."
32070-154 = "……esse é o seu defeito, Sensei."
32070-155 = "[s] \"……?\""
32070-156 = "……Estou apenas falando sozinha."
32070-157 = "O Tratado de Eden como uma aliança militar, é... bem, talvez seja um ponto de vista interessante."
32070-158 = "No entanto, pelo menos eu não penso assim. Eu considero aquilo um tratado de paz legítimo."
32070-159 = "[s] \"Entendo……?\""
32070-160 = "A Organização do Tratado de Eden criada pelo tratado... mesmo que a vejam como um grupo armado, não é algo que a Nagisa consiga controlar sozinha."
32070-161 = "Makoto, a líder do Pandemonium, também terá a mesma autoridade que a Nagisa."
32070-162 = "Além disso, uma certa autoridade será dividida entre os outros membros do Tea Party e do Pandemonium. Por isso, é difícil imaginar que a ETO perca seu propósito original e saia do controle por causa da vontade de uma única pessoa."
32070-163 = "Claro, se todos eles cooperassem, teoricamente poderia acontecer, mas..."
32070-164 = "Para começar, se eles fossem capazes de fazer algo assim, bastaria terem unificado as duas escolas desde o início."
32070-165 = "E além disso, a Makoto tem um temperamento que a impede de cooperar com qualquer pessoa..."
32070-166 = "[s] \"……Então, por que a Makoto concorda com o Tratado de Eden?\""
32070-167 = "……Concordar, talvez ela nem esteja pensando em nada. Afinal, fui eu quem promoveu o Tratado de Eden do lado de Gehenna."
32070-168 = "[s] \"Hina……? Por quê?\""
32070-169 = "……É tudo muito trabalhoso, e pensei que talvez fosse hora de me aposentar."
32070-170 = "Se a ETO for criada, a ordem em Gehenna deve ficar muito melhor do que é agora. Se isso acontecer, não precisarei mais ser a presidente do Comitê Disciplinar."
32070-171 = "[s] \"Entendo…….\""
32070-172 = "Presidente do Comitê Disciplinar, já podemos ir?"
32070-173 = "……Sim, já estou indo."
32070-174 = "Então, bom trabalho, Sensei. Até mais……"
32070-181 = "……Você vai proteger o Clube de Estudos Suplementares, não vai, Sensei?"
32070-182 = "[s] \"Sim.\""
32070-183 = "……Entendo."
32070-185 = "……Então, até mais."
32070-194 = "Que dia agitado foi esse, não é……."
32070-195 = "Pois é, quem diria que um passeio noturno acabaria sendo tão intenso……."
32070-196 = "Sim, mas foi divertido."
32070-197 = "……Hehehe."
32070-198 = "Koharu-chan, você parece feliz desde aquela hora, não é? Será que é porque você conseguiu ajudar a Hasumi-san e lutar ao lado dela?"
32070-199 = "É claro, tem algum problema!? Foi a primeira vez que pude lutar junto com a veterana Hasumi……."
32070-201 = "Fico feliz por ter sido útil……! Hehe, hehehe……!"
32070-202 = "Ufufu, fico muito feliz em ouvir isso♡ Agora, como a Hasumi-san deseja, você precisa evitar ser reprovada, certo?"
32070-203 = "E-eu sei! Está tudo bem, e-eu sou uma elite, afinal!"
32070-204 = "Sim…… eu também preciso me esforçar♡"
32070-208 = "Ahaha…… já está tarde, vamos dormir. Não seria bom se isso atrapalhasse os estudos de amanhã……."
32070-209 = "Então, bom trabalho a todos."
32070-210 = "[s] \"Bom trabalho a todos, boa noite.\""
32070-212 = "(E assim, um longo dia chegou ao fim…….)"
32070-214 = "Próximo episódio: A Esperança que Surge"
