[translation]
32070-1 = "Episódio 7;Um Novo Ponto de Vista"
32070-3 = "Ora, a Junko e a Akari."
32070-4 = "Ah, Haruna. Você também foi presa?"
32070-5 = "Ufu, eu me esforcei uns 10 metros, sabe."
32070-6 = "Que curt……."
32070-7 = "Então, quem conseguiu escapar em segurança foi só a Izumi? Que bom, o nosso sacrifício não foi em vão."
32070-8 = "Não, sacrifício sei lá, no começo a estrutura era quase o contrário……."
32070-9 = "O Comitê de Realização da Justiça…… sei, é o grupo militar mais notável de Trinity mesmo. Uma capacidade de combate assustadora."
32070-10 = "Que susto! Aquela Akari, num instante, ficou que nem uma lata de refrigerante amassada…… fiquei chocada de verdade……."
32070-11 = "Ai, por isso, vir logo até a base de Trinity…… por mais que seja atum, por que ir até um lugar desses……!"
32070-12 = "É o seguinte, Junko. No fim das contas, é assim. Se numa pia sem ninguém a água ficasse escorrendo à toa――"
32070-13 = "Isso eu já ouvi antes!!"
32070-17 = "……A gente, o que vai ser da gente agora?"
32070-18 = "Bom, pensando pelo trâmite normal, não vai ser entregue ao Comitê Disciplinar?"
32070-19 = "Q-que sustoo!? Não levanta assim em silêncio!? Que bom que você tá bem, Akari!?"
32070-20 = "Ufu, bom, não é tão fácil assim me derrubar★"
32070-21 = "Aliás, ah, é, o Comitê Disciplinar…… que saco, só de pensar já……."
32070-22 = "Que situação……. Que o nosso destino seja confiado às mãos da Hina, eu, se pudesse, queria evitar……."
32070-23 = "Bom, dessa vez a gente exagerou um pouco★ Talvez não tenha jeito."
32070-27 = "(Por que até eu……)"
32070-29 = "Distrito autônomo de Trinity - Nas imediações da fronteira"
32070-30 = "(Enquanto isso, a Izumi……)"
32070-31 = "O-onde é aqui……? Eu sou a Izumi…… buááá! Ah, pra onde é que eu vou!?"
32070-36 = "Bom trabalho. Sensei, e o pessoal do Clube de Aulas de Reforço. Graças a vocês, a situação foi contornada em segurança."
32070-37 = "A-ahaha…… do meio pro fim já foi meio no automático, na loucura, digamos……."
32070-38 = "Poder ver a tática do Comitê de Realização da Justiça bem na minha frente foi um bom aprendizado."
32070-39 = "S-se eu fui útil ou não, eu não sei……!"
32070-40 = "Aliás, aquelas pessoas, o que vai acontecer com elas depois?"
32070-41 = "Normalmente, quem decidiria o destino delas seria a gente…… mas, como o período é o que é, pensei em confiá-las ao Comitê Disciplinar de Gehenna."
32070-42 = "[s] \"Sei.\""
32070-43 = "Sim. E, quanto a isso, tenho mais um pedido pro Sensei……."
32070-44 = "[s] \"Sim, o que eu faço?\""
32070-45 = "Pensando no Tratado do Éden, daqui pra frente também eu gostaria de evitar que a gente se mexa de forma ativa."
32070-46 = "Por isso, a entrega ao Comitê Disciplinar…… será que dá pra pedir essa parte ao Sensei?"
32070-47 = "A \"Schale\" entregando os alunos…… nesse formato, tanto pra gente quanto pro lado de Gehenna, as preocupações políticas diminuem bastante."
32070-48 = "[s] \"Entendido, deixa comigo.\""
32070-49 = "Sim. Obrigada por tudo, Sensei. Então, a gente vai ficar numa posição um pouco recuada…… conto com o senhor."
32070-51 = "Distrito autônomo de Trinity - A grande ponte do perímetro externo"
32070-52 = "(Enquanto esperava a chegada do veículo do Comitê Disciplinar……)"
32070-60 = "……Desculpe a demora; onde está o cadáver?"
32070-61 = "[s] \"……Hã?\""
32070-62 = "……Perdão. Não era cadáver, e sim feridos. Às vezes eu confundo."
32070-63 = "Deixa ver…… na lista de entrega estava escrito 3 feridos frescos e 1 refém…… mas."
32070-64 = "[s] \"Frescos……?\""
32070-65 = "……Aliás, e você? Não parece ser do Comitê de Realização da Justiça……?"
32070-66 = "[s] \"É que……\""
32070-72 = "Essa pessoa é o Sensei [USERNAME], da \"Schale\"."
32070-76 = "[ns] \"Hina!\""
32070-77 = "Há quanto tempo, Sensei. Desde quando será. ……Aliás, o que você tava fazendo aqui?"
32070-78 = "Vocês se conhecem, presidente do Comitê Disciplinar?"
32070-79 = "Sim…… bom, é."
32070-81 = "Sei. Pra que, neste momento, nenhum dos lados transforme isso num problema político, o Sensei……."
32070-82 = "De fato, não querer que vire problema é o mesmo pra gente. É justamente por isso que, oficialmente, desta vez, quem veio não foi o Comitê Disciplinar, e sim o \"Departamento de Medicina de Emergência\". Eu, basicamente, só vim de acompanhante."
32070-83 = "……Sou a chefe do Departamento de Medicina de Emergência, Sena Himuro. É um prazer, Sensei."
32070-84 = "Se houver cadáv…… quer dizer, feridos, é só me chamar a qualquer hora. Não cobro taxa de entrega."
32070-85 = "[s] \"C-conto com você……\""
32070-86 = "O \"Departamento de Medicina de Emergência\" é, dentro de Gehenna, uma posição com pouco envolvimento na parte política. Por isso, dessa vez, pedi a ela assim."
32070-87 = "A brincadeira de política deixo com a presidente do Comitê Disciplinar. Eu não tenho interesse em nada além de cadáveres."
32070-88 = "É \"feridos\", né? E, além disso, você nunca viu um cadáver de verdade."
32070-89 = "Sim, eram feridos. Quanto a isso, você também nunca viu, né, presidente do Comitê Disciplinar?"
32070-93 = "Enfim…… o Clube de Pesquisa Gastronômica tá aqui dentro? Então, dá pra transferir pra cá?"
32070-98 = "……Ufu. Hina, há quanto tempo."
32070-99 = "Haruna, do mesmo jeito de sempre…… não, a conversa mais detalhada fica pra depois que a gente voltar."
32070-100 = "Ora, então era mesmo do \"Departamento de Medicina de Emergência\"★ O meu braço tá dobrado num ângulo impossível; será que dá pra você dar uma olhada?"
32070-101 = "Uê, enjoei…… vou vomitar……."
32070-102 = "S-salva……."
32070-103 = "Ora, do Clube de Merenda…… achei estranho não ter te visto o dia todo, e você tava aqui."
32070-104 = "Agora, na academia, a Juri tá…… não, deixa a explicação pra quando a gente tiver voltando."
32070-105 = "Sei lá, tenho a impressão de que tá faltando mais uma do Clube de Pesquisa Gastronômica…… bom, dá preguiça, então deixa pra lá."
32070-107 = "Obrigada por todas as considerações, Sensei. Da próxima vez que você for a Gehenna, eu recebo você com alguma coisa gostosa."
32070-108 = "Então, até a próxima~★"
32070-109 = "……Cala a boca, entra logo."
32070-110 = "[s] \"É, então, até mais. Cuidem-se……\""
32070-114 = "……Carregamento concluído. A preparação pra partir também tá pronta."
32070-115 = "……Espera um pouco."
32070-116 = "……."
32070-117 = "Sensei…… o que você tá fazendo em Trinity?"
32070-118 = "[s] \"Sou o professor responsável de um lugar chamado Clube de Aulas de Reforço……\""
32070-119 = "Isso eu já sei. Vários informes chegam……."
32070-120 = "Não é isso; a Schale devia ser uma organização neutra. Neste período, estar em Trinity é quase como……"
32070-121 = "[s] \"………\""
32070-122 = "……Não, esquece o que eu disse agora, deixa pra lá. O Sensei jamais faria uma coisa dessas."
32070-123 = "[s] \"Hina, do meu lado também tem uma coisa que eu quero perguntar.\""
32070-124 = "Hm? Uma coisa que quer perguntar……?"
32070-125 = "[s] Pergunta a opinião da Hina sobre o Tratado do Éden."
32070-128 = "(Contou à Hina em detalhe sobre a situação atual e as perspectivas daqui pra frente.)"
32070-140 = "Sei…… Sensei, você tá numa situação bem complicada, né."
32070-141 = "……Não, peraí. Não teve uma cena estranha misturada aí agora?"
32070-142 = "[s1] \"Acho que é impressão sua.\"\n[s2] \"Com certeza é impressão sua.\""
32070-143 = "……."
32070-144 = "……."
32070-145 = "Bom, enfim……."
32070-146 = "\"O traidor de Trinity\"…… é."
32070-147 = "Uma situação em que inúmeras palavras voam de um lado pro outro, e não dá pra saber de quem é a palavra verdadeira, nem quem está mentindo……."
32070-148 = "[s3] \"Achei que parece ter vários jeitos de ver.\"\n[s4] \"Porque, dependendo do jeito de ver, a verdade pode mudar.\""
32070-149 = "Cauteloso ou otimista, não dá pra saber mesmo……."
32070-150 = "Cauteloso ou otimista, não dá pra saber mesmo……."
32070-151 = "……Aliás, tudo bem me contar uma coisa tão importante assim?"
32070-152 = "[s] \"Sim, porque eu confio em você, Hina.\""
32070-153 = "……."
32070-154 = "……Esse é o defeito do Sensei."
32070-155 = "[s] \"……?\""
32070-156 = "……Monólogo meu."
32070-157 = "O Tratado do Éden ser uma aliança militar, é…… bom, é um jeito de ver interessante, talvez."
32070-158 = "Só que, ao menos eu, não penso assim. Aquilo é um tratado de paz legítimo, é o que eu acho."
32070-159 = "[s] \"Sei……?\""
32070-160 = "A Organização do Tratado do Éden, gerada pelo tratado…… mesmo que você a veja como um grupo militar, não é algo que a Nagisa consiga controlar sozinha."
32070-161 = "A Makoto, líder do Pandemonium, também passa a ter uma autoridade igual à da Nagisa."
32070-162 = "E não só isso; pros outros membros do Tea Party e do Pandemonium também se divide certo grau de autoridade. Por isso, é difícil imaginar que a ETO perca seu objetivo original pela vontade de uma pessoa só e saia descontrolada."
32070-163 = "Claro, se acontecesse de todas elas colaborarem, teoricamente talvez fosse possível, mas……."
32070-164 = "Indo à raiz da questão, se uma coisa dessas fosse possível, bastava, desde o começo, fazer logo a integração das duas academias."
32070-165 = "E, além disso, a Makoto é do tipo que não consegue colaborar com ninguém, então……."
32070-166 = "[s] \"……Então, por que a Makoto apoia o Tratado do Éden?\""
32070-167 = "……Apoiar, sei lá, provavelmente ela não pensa em nada. Aliás, quem, do lado de Gehenna, tocou o Tratado do Éden fui eu."
32070-168 = "[s] \"A Hina……? Por quê?\""
32070-169 = "……É tudo muito trabalhoso, e pensei que me aposentar também seria uma opção."
32070-170 = "Quando a ETO existir, a ordem de Gehenna vai ficar muito melhor do que agora. E, sendo assim, já não precisa mais ser eu a presidente do Comitê Disciplinar, né."
32070-171 = "[s] \"Sei……\""
32070-172 = "Presidente do Comitê Disciplinar, ainda não?"
32070-173 = "……Sim, já vou."
32070-174 = "Então, bom trabalho, Sensei. Até……"
32070-181 = "……Do Clube de Aulas de Reforço, é o Sensei que vai proteger, né?"
32070-182 = "[s] \"Sim.\""
32070-183 = "……Sei."
32070-185 = "……Então, até mais."
32070-194 = "Sei lá, foi um dia turbulento, né……."
32070-195 = "Pois é, um passeio noturno virar uma coisa tão pesada……."
32070-196 = "Sim, mas foi divertido."
32070-197 = "……Ehehe."
32070-198 = "A Koharu, desde então, tá com uma cara feliz, né? É porque conseguiu ajudar direitinho a Hasumi e lutar lado a lado com ela?"
32070-199 = "É isso mesmo, algum problema!? Poder lutar junto com a veterana Hasumi foi a primeira vez……."
32070-201 = "Eu ter sido útil, que alegria……! Ehe, ehehehe……!"
32070-202 = "Ufufu, isso é ótimo♡ Agora, como a Hasumi deseja, a gente tem que escapar da reprovação, né?"
32070-203 = "E-eu sei! Fica tranquila, e-eu sou uma elite!"
32070-204 = "Sim…… eu também tenho que me esforçar♡"
32070-208 = "Ahaha…… já tá tarde, então vamos dormir? Não é bom atrapalhar o estudo de amanhã……."
32070-209 = "Então, bom trabalho a todas."
32070-210 = "[s] \"Bom trabalho a todas, boa noite.\""
32070-212 = "(E, assim, um longo dia terminou……)"
32070-214 = "Próximo Episódio;A Mão Negra"
