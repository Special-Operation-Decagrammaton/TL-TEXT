[translation]
1010706-1 = "A vida de exploração do secretário"
1010706-5 = "Olá~!"
1010706-6 = "[\"Olá, Thiaki. \""
1010706-7 = "Doutor, como estão suas condições hoje?"
1010706-8 = "Você dormiu bem na noite passada? Como está se sentindo?"
1010706-9 = "[s1] \"U, sim ...... está tudo bem. \"\n[s2] \"O que há de errado de repente? \"\n[s2]\"\"\n1010706-12 = \"Haha, isso é .......\"\n1010706-13 = \"Estou falando da edição especial. ......\"\n1010706-14 = \"De fato, preciso da ajuda do sensei, não importa o que aconteça!\"\n1010706-15 = \"[\"Não pode ser, outro bufê de doces? \"\"\n1010706-19 = \"[ns] \"Eu ainda tenho os efeitos colaterais daquela época. ...... \"\"\n1010706-20 = \"Haha! Não, não é!\"\n1010706-21 = \"Na verdade, estamos pensando em um título para a edição especial. ......\"\n1010706-22 = \"Ela se chama - como é mesmo - \"Assalto! Operação Infiltração de Placa de Petri!\"\"\n1010706-23 = \"[s]\"Shahreh ...... operação de infiltração? \"\"\n1010706-24 = \"Sim!\"\n1010706-25 = \"O sensei [USERNAME] daquela placa de petri que está em todo lugar!\"\n1010706-26 = \"Como é o dia a dia de um sensei? Vamos à cena do crime!\"\n1010706-27 = \"--É uma manchete que se parece com - o que você acha? Você não gostaria de lê-la?\"\n1010706-28 = \"[s]\"yeah, uh, ....... \"\"\n1010706-29 = \"Ah, é claro, estou de plantão hoje e não vou forçá-lo a fazer nada!\"\n1010706-30 = \"Não farei nada por conta própria sem a permissão do sensei!\"\n1010706-31 = \"Se não puder evitar, basta encontrar outra história, portanto, não hesite em nos contar!\"\n1010706-32 = \"[\"Não, não me importo de cobri-lo. \"\"\n1010706-33 = \"Tem certeza? Obrigado!\"\n1010706-34 = \"Mas tive a sensação de que eles estavam preocupados com alguma coisa.\"\n1010706-35 = \"[s]\"Sim, quanto a isso. ....... \"\"\n1010706-37 = \"[ns3] \"Não acho que seria interessante me entrevistar. \"\n[ns4] \"Eu apenas faço o mesmo trabalho todos os dias. ...... \"\"\n1010706-41 = \"Não se preocupe com isso!\"\n1010706-42 = \"Esta Motomiya Chiaki! como secretário, repórter, editor-chefe e editor do Weekly Manmaden!\"\n1010706-43 = \"Transformarei qualquer história em um artigo interessante!\"\n1010706-44 = \"[\"Bem, vou prepará-lo para alguma coisa, certo? \"\"\n1010706-45 = \"Não. - Não, não quero que você faça isso! Apenas continue normalmente!\"\n1010706-46 = \"E é meu trabalho encontrar histórias!\"\n1010706-47 = \"Além disso, eu gostaria de escrever um artigo sobre o estado natural do sensei!\"\n1010706-48 = \"[s]\"Bem, então você pode ir para ....... \"\"\n1010706-49 = \"Sim! Então, você está de acordo em fazer a entrevista?\"\n1010706-50 = \"Posso tirar uma foto do escritório da Schale o mais rápido possível -?\"\n1010706-51 = \"[\"Sim, tudo bem. \"\"\n1010706-52 = \"Muito obrigado~!\"\n1010706-54 = \"(Enquanto Thiaki estava filmando, eu continuei com o resto do trabalho).\"\n1010706-63 = \"Entendo, então as cadeiras que você usou na placa de petri eram dessa marca - entendo.\"\n1010706-64 = \"Mas parece um pouco curto para um artigo. ......\"\n1010706-65 = \"Ha! Debaixo do sofá! Há algo interessante escondido lá ......?\"\n1010706-71 = \"Isso é apenas poeira no site ...... ou .......\"\n1010706-72 = \"Ah! Este é um console de jogos! Talvez você possa descobrir do que seu sensei gosta!\"\n1010706-73 = \"Qual? A que foi deixada para trás pelo aluno no plantão anterior? Não, estou entendendo. ......\"\n1010706-74 = \"Hmmm, não é fácil encontrar artigos no site .......\"\n1010706-75 = \"[s]\"Então, ele disse que não é interessante me cobrir. ...... \"\"\n1010706-76 = \"E, mas! Eu não vou desistir!\"\n1010706-78 = \"(Depois de um tempo, ......)\"\n1010706-80 = \"Você sabe, ...... Não quero ser grosseiro quando digo isso, mas .......\"\n1010706-81 = \"Você não está trabalhando demais ......?\"\n1010706-82 = \"[s]\"Desculpe. Estou tendo um dia particularmente ocupado hoje. \"\"\n1010706-83 = \"Desculpe, ......, mas o artigo é ...... como está.\"\n1010706-84 = \"Ou, afinal, deveria ser outra história ......?\"\n1010706-85 = \"Bem, ainda não é bem assim! Uma última vez!\"\n1010706-86 = \"Desta vez, saiba mais sobre o assunto. ......\"\n1010706-89 = \"(algumas horas depois ......)\"\n1010706-93 = \"[ns] \"ugh, ugh ....... \"\"\n1010706-100 = \"[wa:800]- [log=치아키] ahahaha! [wa:1070]Obturador [wa:280]chance, [wa:560]capturado! [/log]\"\n1010706-103 = \"[wa:460]- [log=치아키]O rosto de um sensei cochilando! [wa:1940]É [wa:820]perfeito para a capa da próxima edição! [/log]\"\n1010706-106 = \"[wa:550]- [log=치아키]Agora [wa:560]pronto para a [wa:750]edição especial [wa:960]da [wa:750]Weekly Manmaden! [/log]\"\n1010706-109 = \"[wa:400]- [log=치아키] Sou eu! [wa:1800]Consegui [wa:670]outro furo de reportagem! [/log]\"\n1010706-112 = \"[ns] \"chi, chiaki! O que você está fazendo embaixo da mesa! \"\"\n1010706-114 = \"[wa:240]- [log=치아키]Ufa, [wa:980]não [wa:1260]subestime[/wa:1260] o poder de ação da secretária~? [/log]\"\n1010706-117 = \"[wa:400]- [log=치아키] Sim! [wa:760]Vamos usar esse impulso para [wa:910]chegar ao [wa:850]mistério do [wa:850]professor ......? [/log]\"\n1010706-119 = \"[wa:800]- [log=치아키]O mistério do buraco na meia, [wa:2150] ou ......! [/log]\"\n1010706-122 = \"[wa:270]- [log=치아키] eh! [wa:560]Crianças malvadas são [wa:1050]condenadas ao \"confinamento sob a escrivaninha\" ......! [/log]\"\n1010706-125 = \"[wa:900]- [log=치아키]Vá, [wa:450]Me desculpe~ [wa:1250]Me desculpe! [wa:500]Por favor, me deixe sair~! [/log]\"\n1010706-128 = \"Ugu...... entrevistas secretas também são um trabalho árduo.\"\n1010706-129 = \"Quase fiquei preso embaixo da minha mesa. ......\"\n1010706-130 = \"[s]\"Você realmente vai escrever sobre minha cara de sono ......? \"\"\n1010706-131 = \"É claro que essa era a intenção. ......\"\n1010706-132 = \".......\"\n1010706-133 = \"Outro!\"\n1010706-134 = \"Quero que os leitores do #n gostem de lê-lo tanto quanto eu gosto de escrever o Manmaden Weekly, porque quero que vocês gostem de lê-lo tanto quanto eu gosto de escrevê-lo! #nClaro que isso inclui os professores!\"\n1010706-135 = \"Portanto, mudarei a capa!\"\n1010706-136 = \"Em vez disso, gostaria de me ajudar a filmá-lo?\"\n1010706-137 = \"Sinto que posso tirar fotos melhores com meu sensei!\"\n1010706-138 = \"[\"Ok. Já me livrei da minha sonolência, vamos filmar juntos. \""

1010706-139 = "Muito obrigado!"
1010706-141 = "(Depois, ele e Thiaki caminharam juntos pela placa de Petri, procurando coisas que pudessem ser usadas em um artigo)."
