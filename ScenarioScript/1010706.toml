[translation]
1010706-1 = "書記の探求生活"
1010706-5 = "こんにちは～！"
1010706-6 = "[s] \"こんにちは、チアキ。\""
1010706-7 = "先生、今日のコンディションはいかがですか？"
1010706-8 = "昨日はよく眠れました？体調はどうです？"
1010706-9 = "[s1] \"う、うん……大丈夫だけど。\"\n[s2] \"急にどうしたの？\""
1010706-12 = "あはは、それが……。"
1010706-13 = "特集号のことなんですけど……。"
1010706-14 = "実は先生の助けが、ど～しても必要でして！"
1010706-15 = "[s] \"まさか、またスイーツビュッフェ？\""
1010706-19 = "[ns] \"まだ、あの時の後遺症が……。\""
1010706-20 = "あははっ！違いますよ！"
1010706-21 = "実は、特集号の大見出しを考えておりまして……！"
1010706-22 = "その名はなんと――「突撃！シャーレ潜入作戦！」"
1010706-23 = "[s] \"シャーレ……潜入作戦？\""
1010706-24 = "はい！"
1010706-25 = "巷で話題の、あのシャーレの[USERNAME]先生！"
1010706-26 = "先生はどんな一日を過ごしているのか！その現場に突撃！"
1010706-27 = "――みたいな感じの見出しなんですけど、どうです？読みたくなりませんか～？"
1010706-28 = "[s] \"え、えと……。\""
1010706-29 = "あ、もちろん今日は当番で来てますし、無理強いはしません！"
1010706-30 = "先生の許可なしに、勝手なことはしませんから！"
1010706-31 = "どうしてもダメな場合は、他のネタを探せばいいだけなので、#n遠慮なく言ってくださいね！"
1010706-32 = "[s] \"ううん、取材するのは構わないけど。\""
1010706-33 = "本当ですか？ありがとうございます！"
1010706-34 = "でも、なにか気にしている感じがしましたけど。"
1010706-35 = "[s] \"うん、そのことなんだけど……。\""
1010706-37 = "[ns3] \"私を取材しても、面白くないと思うんだ。\"\n[ns4] \"毎日、同じ仕事をこなしてるだけだからね……。\""
1010706-41 = "心配ご無用ですよ～！"
1010706-42 = "この[ruby=もとみや]元宮[/ruby]チアキ！書記兼、「週刊万魔殿」の記者兼、編集長兼、発行人として！"
1010706-43 = "どんなネタでも、面白い記事に仕上げてみせますから！"
1010706-44 = "[s] \"じゃあ、私も何か準備でもしようか？\""
1010706-45 = "いいえ！普段通りにしてくれればいいです！"
1010706-46 = "ネタを探すのは私の仕事ですし！"
1010706-47 = "それに、先生の自然体を記事にしたいので！"
1010706-48 = "[s] \"まぁ、それなら……。\""
1010706-49 = "はい！では、取材オッケーってことでいいですね？"
1010706-50 = "早速、シャーレの執務室を撮影してもいいですか～？"
1010706-51 = "[s] \"うん、いいよ。\""
1010706-52 = "ありがとうございます～！"
1010706-54 = "（チアキが撮影をしている間、残りの仕事に取り掛かった）"
1010706-63 = "なるほど、シャーレで使ってる椅子はこのブランドだったんですね～"
1010706-64 = "でも、記事にするにはちょっと物足りないような……。"
1010706-65 = "はっ！ソファの下！何か面白いものが隠されていたり……？"
1010706-71 = "って……ホコリだけか……。"
1010706-72 = "あっ！これはゲーム機！？先生の好みが分かるかも！"
1010706-73 = "え？前の当番の生徒が置いていったもの？な、なるほど……。"
1010706-74 = "うーん、なかなか記事になりそうなものが……。"
1010706-75 = "[s] \"だから、私のこと取材しても面白くないって……。\""
1010706-76 = "で、でも！諦めませんっ！"
1010706-78 = "（しばらくして……）"
1010706-80 = "あの……こんなことを言うのは失礼ですが……。"
1010706-81 = "ちょっと、仕事しすぎじゃないですか……？"
1010706-82 = "[s] \"ごめんね。今日は特に忙しい日なんだ。\""
1010706-83 = "すみません……でも、このままじゃ記事が……。"
1010706-84 = "や、やっぱり他のネタにすべきかな……？"
1010706-85 = "ま、まだまだ！最後にもう一回！"
1010706-86 = "今度こそ、スクープを……！"
1010706-89 = "（数時間後……）"
1010706-93 = "[ns] \"う、うぅん……。\""
1010706-100 = "[wa:800]― [log=치아키]あははっ！[wa:1070]シャッター[wa:280]チャンス、[wa:560]とらえました！[/log]"
1010706-103 = "[wa:460]― [log=치아키]居眠りする先生の顔！[wa:1940]次号の表紙に[wa:820]ピッタリです！[/log]"
1010706-106 = "[wa:550]― [log=치아키]これで[wa:560]「週刊万魔殿」[wa:960]特集号の[wa:750]準備は万全！[/log]"
1010706-109 = "[wa:400]― [log=치아키]さっすが私！[wa:1800]またスクープを[wa:670]ゲットしちゃいました～！[/log]"
1010706-112 = "[ns] \"ち、チアキ！？机の下で何やってるの！？\""
1010706-114 = "[wa:240]― [log=치아키]ふふっ、[wa:980]書記の行動力、[wa:1260]侮っちゃいけませんよ～？[/log]"
1010706-117 = "[wa:400]― [log=치아키]そうだ！[wa:760]この勢いで、[wa:910]先生の謎に[wa:850]迫っていきましょうか……？[/log]"
1010706-119 = "[wa:800]― [log=치아키]靴下に空いた穴の謎、[wa:2150]とか……！[/log]"
1010706-122 = "[wa:270]― [log=치아키]えっ！[wa:560]意地悪な子は[wa:1050]「机の下閉じ込めの刑」に処す……！？[/log]"
1010706-125 = "[wa:900]― [log=치아키]ご、[wa:450]ごめんなさ～[wa:1250]い！[wa:500]出してください～！[/log]"
1010706-128 = "うぐぐ……潜入取材も大変ですね。"
1010706-129 = "机の下に閉じ込められるところでした……。"
1010706-130 = "[s] \"私の寝顔、本当に記事にするつもりなの……？\""
1010706-131 = "ふふ、もちろん、そのつもりだったんですが……。"
1010706-132 = "……。"
1010706-133 = "他のものにします！"
1010706-134 = "私が「週刊万魔殿」を書いて楽しいように、#n読者の皆さんも読んで楽しくなってほしいですからね！#nもちろん、そこには先生も含まれています！"
1010706-135 = "なので、表紙は変えることにしますね！"
1010706-136 = "ふふ、代わりに、撮影を手伝ってくれませんか？"
1010706-137 = "先生と一緒なら、もっといい写真が撮れそうな気がするんです！"
1010706-138 = "[s] \"いいよ。眠気も吹き飛んだし、一緒に撮影しようか。\""
1010706-139 = "やった～ありがとうございます！"
1010706-141 = "（その後、チアキと一緒にシャーレのあちこちを歩きながら、記事にできそうなものを探した）"
