[translation]
2005305-1 = "A garota ninja quer saber o segredo!"
2005305-2 = "Local da sessão informativa"
2005305-3 = "（Preocupado com a Michiru...）"
2005305-4 = "（Decidi acompanhá-la）"
2005305-5 = "Ah, Sensei!#nPor aqui, por aqui!"
2005305-6 = "……Hm?"
2005305-7 = "Não, não, eu não ia sair na frente nem nada disso."
2005305-8 = "……Ah, isso?"
2005305-9 = "Bem, eu pensei que seria melhor vir com uma roupa adequada..."
2005305-10 = "Olha só, observe bem ao redor."
2005305-11 = "Este é o lugar onde os escolhidos recebem o segredo...!"
2005305-12 = "Então, é uma questão de etiqueta vir com uma roupa à altura!"
2005305-13 = "Por isso que eu tirei esse vestido do armário!#nFufufu...!"
2005305-14 = "Veja, aquelas pessoas também estão de terno ou vestido, não estão?"
2005305-15 = "[s] \"É verdade...\""
2005305-17 = "（Não acho que eles vão contar o segredo tão facilmente assim...）"
2005305-18 = "（Por enquanto, decidi seguir a Michiru）"
2005305-20 = "[ns] \"A propósito, como você ficou sabendo dessa sessão informativa?\""
2005305-21 = "Bem, é que um tempo atrás, enquanto eu assistia a uns vídeos..."
2005305-22 = "Um anúncio apareceu na tela."
2005305-23 = "Era sobre essa sessão informativa!"
2005305-24 = "[s] \"A-anúncio de vídeo...\""
2005305-25 = "É incrível, eu fiquei chocada!"
2005305-26 = "Eu estava preocupada sobre como fazer o canal crescer e pesquisei várias coisas..."
2005305-27 = "E logo depois disso!"
2005305-28 = "O anúncio daqui apareceu do nada!"
2005305-29 = "Como se estivesse me dando a resposta para as minhas preocupações!"
2005305-30 = "Foi aí que eu senti um estalo!#nQue isso era o destino!"
2005305-31 = "[s] \"É, eu imaginei...\""
2005305-32 = "Ah, você não está acreditando!?"
2005305-33 = "De qualquer forma, vai começar, vamos entrar!"
2005305-38 = "Dentro do local"
2005305-40 = "Senhoras e senhores, obrigado por virem hoje."
2005305-41 = "Se vocês vieram até aqui, é porque todos compartilham da mesma preocupação, não é?"
2005305-42 = "Como aumentar o número de visualizações, como conseguir mais inscritos..."
2005305-43 = "……Vamos resolver essa preocupação aqui hoje!"
2005305-44 = "Eu sabia...!"
2005305-45 = "Eles viram tudo...!"
2005305-46 = "[s] \"......\""
2005305-47 = "Não precisam se preocupar."
2005305-48 = "O número de visualizações e de inscritos que vocês desejam..."
2005305-49 = "Nossa empresa garante totalmente!"
2005305-50 = "……Hm?"
2005305-51 = "Se vocês pagarem apenas 1 milhão de ienes,#nnós aumentaremos a média de visualizações dos seus vídeos para 1 milhão!"
2005305-52 = "E, vejam só, se fecharem agora, ganham 1 milhão de inscritos de brinde!"
2005305-53 = "Hã...!?"
2005305-54 = "Alguns podem estar inseguros, mas fiquem tranquilos."
2005305-55 = "Nós utilizamos um programa de macro seguro,#ncertificado pela Associação de Hackers de Kivotos!"
2005305-59 = "M-mas isso é só uma ferramenta ilegal...!"
2005305-60 = "Sensei, desculpe... parece que eu estava enganada..."
2005305-61 = "Eu achei que daria para aumentar de um jeito legítimo..."
2005305-62 = "...quem diria que era só um golpe."
2005305-63 = "Vamos embora, Sensei."
2005305-69 = "...Hm?"
2005305-70 = "O que houve?"
2005305-71 = "A sessão informativa ainda não terminou..."
2005305-72 = "Bem, é que eu estava pensando em ir embora..."
2005305-73 = "Hum... isso é um pouco problemático."
2005305-74 = "De acordo com os nossos termos, sair antes do fim é proibido..."
2005305-76 = "[ns] \"Desculpe, mas eu fiquei curioso com uma coisa...\""
2005305-77 = "Sim, o que seria?"
2005305-81 = "V-você, por acaso, é do Schale...?"
2005305-82 = "P-p-p-perdão!#nTenha um bom retorno!"
2005305-86 = "[ns] \"Vamos, Michiru.\""
2005305-87 = "S-sim!"
2005305-89 = "（Dessa forma, deixei o local com a Michiru）"
2005305-91 = "Parque próximo"
2005305-92 = "Uuu, que vergonha..."
2005305-93 = "Eu quase caí num golpe desses..."
2005305-94 = "Digo, Sensei, por acaso..."
2005305-95 = "Você já sabia desde o começo?"
2005305-96 = "[s] \"Até certo ponto, sim.\""
2005305-97 = "Uuuuu... que cruel, Sensei...!"
2005305-98 = "[s] \"Ué!?\""
2005305-99 = "C-claro que a culpa foi minha por ter caído na isca, mas...!"
2005305-100 = "Você podia ter me avisado...!"
2005305-101 = "[s] \"Às vezes, o fracasso também é uma experiência importante.\""
2005305-102 = "...?"
2005305-103 = "[s1] \"Mesmo que você não tivesse ido à sessão, teria ficado curiosa no fundo da mente.\"\n[s2] \"Mas, como você foi, agora está tudo resolvido, não está?\""
2005305-109 = "...V-verdade."
2005305-110 = "Agora eu não vou cometer o mesmo erro..."
2005305-111 = "É, eu realmente preciso agradecer ao Sensei!"
2005305-112 = "Além disso, agora eu tomei uma decisão."
2005305-113 = "Não vou depender de coisas suspeitas, vou fazer o canal crescer com o meu próprio esforço...!"
2005305-114 = "Então continue me observando, Sensei!"
2005305-116 = "（Depois de levar a Michiru para casa e voltar ao Schale...）"
2005305-117 = "（Denunciei o caso da sessão informativa para a Valkyrie）"
