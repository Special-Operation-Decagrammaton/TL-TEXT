[translation]
102050-1 = "Episódio 5;Preparativos da Operação (3)"
102050-2 = "Confirmamos o posicionamento de todas as áreas, do 1º ao 6º Sanctum."
102050-3 = "Vamos revisar mais uma vez o plano da \"Operação de Captura do Sanctum da Ilusão\"."
102050-4 = "As equipes de ataque deverão avançar até uma distância onde possam atingir cada Guardião."
102050-5 = "No caminho, haverá combate contra as linhas de defesa inimigas.#nAssim, vocês garantirão um total de seis rotas de ataque."
102050-6 = "Além disso, as equipes de defesa precisarão proteger cada distrito até que a captura dos Sanctums seja concluída."
102050-7 = "No momento em que a operação começar, há uma grande chance de inimigos serem invocados pelos Sanctums e se espalharem por toda Kivotos."
102050-8 = "Gehenna, Millennium, Trinity, Hyakkiyako, Red Winter, Shanhaijing, D.U. e outras regiões――#nAs equipes defensivas devem se preparar para ataques vindos de todas as direções."
102050-9 = "Assim que a defesa de cada distrito for concluída e todas as rotas de ataque estiverem asseguradas,#nvamos iniciar a contagem regressiva pro ataque concentrado nos Guardiões~"
102050-10 = "Quando a contagem terminar, ataquem todos os Guardiões ao mesmo tempo.#nO timing vai ser crucial~"
102050-11 = "Depois de derrotarmos os cinco Sanctums individualmente, todos avançaremos juntos contra o 6º Sanctum…!"
102050-12 = "Esse é o panorama completo da \"Operação de Captura do Sanctum da Ilusão\"."
102050-13 = "Daqui em diante, vamos precisar da força da Schale… defesa e ataque――#nSensei, contamos com você para comandar todas as batalhas…!"
102050-14 = "Uau… sinceramente, parece trabalho demais até pra várias pessoas…#nMas enfim, esse plano nem existiria sem o Sensei. Então contamos com você~"
102050-15 = "Sensei, tem alguma pergunta?"
102050-16 = "[s] \"Não, tá tudo certo. Rin, Momoka, Ayumu… obrigada pela preparação.\""
102050-17 = "Não… ainda não acabou. A verdadeira batalha começa agora."
102050-18 = "[ns] \"Então, pessoal… preparados?\""
102050-36 = "Sim, Sensei!"
102050-38 = "[ns] \"Certo… então vamos.\""
102050-40 = "[ns] \"A \"Operação de Captura do Sanctum da Ilusão\" começa agora!\""
102050-43 = "Próximo episódio;1º Sanctum \"Deserto de Abydos\""