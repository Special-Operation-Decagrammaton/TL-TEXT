[translation]
102050-1 = "Episódio 5; Preparação da operação (3)"

102050-2 = "Status de espera confirmado em todas as áreas do Sanctum 1 ao Sanctum 6."

102050-3 = "Mais uma vez, iremos fornecer uma visão geral da estratégia para o ``Sanctum of Illusion''."

102050-4 = "Faça com que sua equipe de ataque chegue perto o suficiente para atacar cada guardião."

102050-5 = "Ao longo do caminho, você participará de batalhas ao longo das linhas de defesa inimigas. #nVocê protegerá um total de 6 rotas de ataque."

102050-6 = "Além disso, as forças de defesa devem proteger cada região autônoma até que o Sanctum seja capturado."

102050-7 = "Há uma grande possibilidade de que os inimigos sejam convocados do Sanctum e se espalhem por Kivotos ao mesmo tempo que o ataque começa."

102050-8 = "Gehenna, Millennium, Trinity, Hyakki Yako, Red Winter, Shanhai Ching, D.U., etc. - #n As forças de defesa devem se preparar para ataques de todas as direções."

102050-9 = "Assim que a defesa de cada região autônoma for bem-sucedida e tivermos garantido a rota para conquistar todos os Santuários, iniciaremos a contagem regressiva para o ataque intensivo do #n Guardião ~"

102050-10 = "Ao final da contagem regressiva, todos deverão atacar o guardião de uma só vez. #nO tempo é importante~"

102050-11 = "Se conseguirmos derrotar cada um dos cinco Santuários, todos nós enfrentaremos o 6º Santuário...!"

102050-12 = "Esta é toda a história da \"Batalha do Santuário da Ilusão\"."

102050-13 = "De agora em diante, precisaremos da força de Petri...defesa e ataque---#nVou pedir para você liderar todas as batalhas...!"

102050-14 = "Uau... Para ser sincero, não parece suficiente, não importa quantos corpos tenhamos... #n Bem, essa estratégia não funcionará sem você. Prazer em conhecê-lo ~"

102050-15 = "Você tem alguma pergunta para seu professor?"

102050-16 = "[s] \"Não, está tudo bem. Rin, Momoka e Ayumu, obrigado pela preparação.\""

102050-17 = "Não... ainda não acabou. Agora é o momento crítico."

102050-18 = "[ns] \"Ok, pessoal... vocês estão prontos?\""

102050-36 = "Sim, senhor!"

102050-38 = "[ns] \"Sim... então, vamos.\""

102050-40 = "[ns] \"A Batalha do Santuário Delirante começa! \""

102050-43 = "Próxima vez; 1º Santuário “Deserto de Abidos”"

