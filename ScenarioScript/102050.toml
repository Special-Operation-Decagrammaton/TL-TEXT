[translation]
102050-1 = "第5話;作戦準備（３）"
102050-2 = "第1サンクトゥムから第6サンクトゥムまで、全エリアのスタンバイを確認。"
102050-3 = "再度、「虚妄のサンクトゥム攻略戦」の作戦概要を展開します。"
102050-4 = "攻略部隊は、各守護者を攻撃できる距離まで接近してもらいます。"
102050-5 = "道中、敵の防衛ラインで交戦予定となります。#nそうして総計6つの攻撃ルートを確保していただきます。"
102050-6 = "また、防衛部隊は、サンクトゥムの攻略が終わるまで各自治区を守らなければなりません。"
102050-7 = "攻略開始と同時に、サンクトゥムから敵が召喚され、キヴォトス全域に広がる可能性が高いです。"
102050-8 = "ゲヘナ、ミレニアム、トリニティ、百鬼夜行、レッドウィンター、山海経、D.U.など――#n防衛部隊は全方位からの襲撃に備えてください。"
102050-9 = "各自治区の防衛が成功して、全サンクトゥムの攻略ルートを確保できたら、#n守護者集中攻撃のカウントダウンを始めるよ～"
102050-10 = "カウントダウン終了と同時に、みんなで一斉に守護者を攻撃してね。#nタイミングが重要だよ～"
102050-11 = "5つのサンクトゥムを各個撃破できたら、第6サンクトゥムに全員で挑みます……！"
102050-12 = "以上が「虚妄のサンクトゥム攻略戦」の全貌です。"
102050-13 = "ここからは、シャーレの力が必要です……防衛及び攻撃――#n全ての戦闘の指揮を先生にお願いします……！"
102050-14 = "うわぁ……正直、体がいくつあっても足りなそうだけど……#nま、この作戦は先生がいないと成り立たないからさ。よろしくね～"
102050-15 = "先生から何かご質問はありますか？"
102050-16 = "[s] \"ううん、大丈夫。リン、モモカ、アユム、準備ありがとね。\""
102050-17 = "いえ……まだ終わっていません。これからが正念場ですので。"
102050-18 = "[ns] \"それじゃあ、みんな……準備はいい？\""
102050-36 = "はい、先生！"
102050-38 = "[ns] \"うん……それじゃあ、行こっか。\""
102050-40 = "[ns] \"「虚妄のサンクトゥム攻略戦」開戦だよ！\""
102050-43 = "次回;第1サンクトゥム「アビドス砂漠」"
