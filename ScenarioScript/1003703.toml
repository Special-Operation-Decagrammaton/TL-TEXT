[translation]
1003703-1 = "A dedução da Chefe do Comitê de Segurança"
1003703-2 = "Em frente ao prédio principal da Academia Federal Red Winter"
1003703-3 = "（Após receber a mensagem de Marina, cheguei à Academia Federal Red Winter.）"
1003703-4 = "Sensei, por aqui."
1003703-5 = "Este é o tal local do crime. Onde aquele espião desprezível se infiltrou sorrateiramente e roubou o pudim."
1003703-6 = "Dentre todas as coisas, mirar justamente no pudim da Presidente Cherino... Que sujeito imperdoável!"
1003703-7 = "[s] \"Por que será que o culpado roubou o pudim?\""
1003703-8 = "O objetivo é óbvio. Ao roubar algo tão valioso, ele pretende causar um tumulto na academia e aproveitar a oportunidade para incitar uma guerra civil!"
1003703-9 = "Mas os olhos desta Chefe do Comitê de Segurança não podem ser enganados!"
1003703-10 = "Pelo que vejo dos vestígios por aqui, posso deduzir que o espião entrou pela janela."
1003703-11 = "Pelas pegadas... o espião tem menos de 1 metro de altura, é muito pequeno. E provavelmente anda sobre quatro patas."
1003703-12 = "[s1] \"Isso não seria um espião, mas...\"\n[s2] \"Não seria um animal selvagem da região que pegou?\""
1003703-13 = "Isso é precipitado, Sensei!"
1003703-14 = "Isso é precipitado, Sensei!"
1003703-15 = "Afinal, o oponente é um mestre do disfarce capaz de se infiltrar na Academia Federal Red Winter!"
1003703-16 = "Ele pode se disfarçar de qualquer coisa... ou seja, apenas com esses vestígios, não posso afirmar sua verdadeira identidade!"
1003703-17 = "Dito isso, por enquanto, estas pegadas são nossa única pista. Vamos segui-las."
1003703-18 = "Se tivermos sorte, talvez cheguemos à base do espião antes do anoitecer."
1003703-19 = "[s] \"Mesmo com sorte, vai demorar tudo isso...?\""
1003703-20 = "Sim. Afinal, o Distrito Autônomo da Academia Federal Red Winter ostenta uma das maiores áreas de terra de Kivotos."
1003703-21 = "Se alguém inexperiente andar por aí sem um destino, pode acabar se perdendo facilmente."
1003703-22 = "Bem, não é como se houvesse algum idiota entre os alunos de Red Winter que faria algo assim! Hahaha!"
1003703-23 = "[s3] \"Se perder dentro do distrito da academia...\"\n[s4] \"Sinto que isso vai dar ruim...\""
1003703-24 = "Não se preocupe, Sensei. Eu conheço a geografia desta academia quase perfeitamente. Pode confiar em mim e me seguir!"
1003703-25 = "Não se preocupe, Sensei. Eu conheço a geografia desta academia quase perfeitamente. Pode confiar em mim e me seguir!"
1003703-27 = "（Depois disso...）"
1003703-31 = "……Nos perdemos."
1003703-32 = "Por que, se eu apenas segui as pegadas...!"
1003703-33 = "[s] \"Marina, você não tinha dito que conhecia a geografia...?\""
1003703-34 = "M-mentira não é! Como Chefe do Comitê de Segurança da Academia Federal Red Winter, isso é natural!"
1003703-35 = "Era para ser, mas..."
1003703-36 = "……Hm? De alguma forma, não reconheço mais a paisagem por aqui..."
1003703-37 = "Droga, as pegadas sumiram também... Será que deixamos o culpado escapar?"
1003703-38 = "[s] \"Parece que as pegadas levam àquele armazém ali.\""
1003703-40 = "O quê..."
1003703-41 = "É verdade!"
1003703-42 = "E além disso, aquilo caído na entrada do armazém é... o pudim roubado da Presidente Cherino!"
1003703-43 = "Ou seja, aquele espião deve estar escondido aqui!"
1003703-45 = "Nada mal, Sensei. Notar os vestígios do culpado que até eu deixei passar..."
1003703-46 = "Quando capturarmos o espião com sucesso, vou sugerir que lhe concedam a \"Medalha do Bigode de Bravura Especial\"!"
1003703-47 = "Muito bem, vamos dar um fim naquele espião desprezível."
1003703-48 = "……Ura!"
1003703-51 = "Não se mova, espião!"
1003703-52 = "O quê...!"
1003703-56 = "[ns] \"Que gatinho fofo.\""
1003703-57 = "……"
1003703-58 = "Não pode ser, não era um espião, mas uma fera!?"
1003703-59 = "[s] \"Calma, Marina. É só um gato de rua.\""
1003703-60 = "C-como vou me acalmar! Sensei, você não está vendo aquelas garras e dentes afiados!?"
1003703-61 = "Pensei que finalmente tinha encontrado a base do espião, mas quem diria que uma ameaça ainda maior estava escondida ali..."
1003703-62 = "Droga... mas se eu recuar agora, o que vou dizer à Presidente Cherino? Que encontrei o culpado que roubou o pudim, mas fui forçada a recuar?"
1003703-63 = "Mas, se eu fizer isso, serei expurgada... Devo capturá-la viva com uma arma de tranquilizante ou algo assim e entregá-la à secretaria...? Aquela fera?"
1003703-64 = "[s5] \"Marina, por acaso...\"\n[s6] \"Você tem medo de gatos?\""
1003703-65 = "O-o que você disse!? A Chefe do Comitê de Segurança da Academia Red Winter jamais teria medo de um simples gato!"
1003703-66 = "O-o que você disse!? A Chefe do Comitê de Segurança da Academia Red Winter jamais teria medo de um simples gato!"
1003703-67 = "Mesmo que um urso enfurecido me atacasse, eu jamais..."
1003703-71 = "Aaaaaah!"
1003703-75 = "...Vou confessar. Eu não me dou bem com gatos..."
1003703-76 = "Quando eu era pequena, tentei dar um petisco para um gato de rua e ele arranhou meu rosto..."
1003703-77 = "Desde então, não quero nem chegar perto de gatos..."
1003703-78 = "[s] \"Então, por que não aproveita esta oportunidade para tentar fazer amizade com eles?\""
1003703-79 = "O quê, você está louco, Sensei!? Fazer amizade com um gato!?"
1003703-80 = "Se for para ter intimidade com aquela fera aterrorizante, prefiro conversar com um urso faminto!"
1003703-81 = "Mesmo que fosse uma ordem da Presidente, eu não poderia fazer uma coisa dessas..."
1003703-85 = "N-não chegue perto!!!"
1003703-91 = "Ah..."
1003703-92 = "[s7] \"Ainda bem que o tiro não acertou...\"\n[s8] \"Ele fugiu.\""
1003703-93 = "..."
1003703-94 = "..."
1003703-95 = "D-de qualquer forma, o caso está resolvido!"
1003703-96 = "Descobrimos quem roubou o pudim da Presidente e demos um aviso severo ao culpado. Ele não fará algo assim novamente."
1003703-97 = "Com isso, a raiva da Presidente Cherino deve diminuir um pouco..."
1003703-98 = "...A propósito, algo caiu da prateleira agora há pouco. O que era aquilo?"
1003703-102 = "A-a estátua da Presidente Cherino!!"
1003703-103 = "Por que a estátua da Presidente estava aqui!? E por que ela está nesse estado...!"
1003703-104 = "...Eh, eu? Quando eu disparei a arma desenfreadamente agora há pouco...?"
1003703-105 = "N-não pode ser, eu finalmente identifiquei o culpado que roubou o pudim... e, como consequência, será que acabei destruindo a autoridade da Presidente...!?"
1003703-106 = "Eu não quero mais ser expurgadaaaaaa!!"
1003703-108 = "(Depois disso, embora tenha ficado claro que \"o culpado era um gato\", parece que Marina acabou recebendo uma nova punição por ter quebrado a estátua de Cherino...)"
