[translation]
1003703-1 = "保安委員長の推理"
1003703-2 = "レッドウィンター連邦学園の本館前"
1003703-3 = "（マリナのメッセージを受けて、レッドウィンター連邦学園に到着した。）"
1003703-4 = "先生、こっちだ。"
1003703-5 = "ここが例の犯行現場。あの卑劣なスパイがひっそりと侵入し、プリンを盗んだ場所だ。"
1003703-6 = "よりによって、チェリノ会長のプリンを狙うだなんて……許しがたいやつめ！"
1003703-7 = "[s] \"その犯人は、どうしてプリンを盗んだんだろうね？\""
1003703-8 = "狙いは明白だ。できるだけ貴重なものを盗むことで学園内で騒動を起こし、それに乗じて学園で内紛を起こさせるつもりだろう！"
1003703-9 = "しかし、この保安委員長の目は騙せない！"
1003703-10 = "この辺りの痕跡を見る限り、スパイは窓から侵入してきたと推測できる。"
1003703-11 = "この足跡からして……スパイの身長は1mも無いな、非常に小柄だ。そしておそらく四つ足歩行と考えられる。"
1003703-12 = "[s1] \"それって、スパイじゃなくて……。\"\n[s2] \"この辺の野生動物が持ってったってことじゃ……？\""
1003703-13 = "それは早計だぞ、先生！"
1003703-14 = "それは早計だぞ、先生！"
1003703-15 = "相手はなにせ、レッドウィンター連邦学園に侵入できるほどの変装の達人だ！"
1003703-16 = "どんな姿にも変装できる可能性がある……つまりこの痕跡だけで、正体を断言することはできない！"
1003703-17 = "とはいえ今は、この足跡だけが頼りだ。とりあえずこれを追ってみるとしよう。"
1003703-18 = "運が良ければ日が暮れる前に、スパイの基地へと辿り着けるかもしれない。"
1003703-19 = "[s] \"運が良くても、そんなにかかりそう……？\""
1003703-20 = "ああ。何せこのレッドウィンター連邦学園自治区は、キヴォトスでも最大級の敷地面積を誇る。"
1003703-21 = "不慣れな者が目的地を決めずに歩き回れば、あっさり遭難してしまうくらいだ。"
1003703-22 = "まあ、特にレッドウィンターの生徒でそんなことになるバカはそうそういないがな！はっはっはっは！"
1003703-23 = "[s3] \"学園の自治区内で遭難……。\"\n[s4] \"なんだか、嫌な予感が……。\""
1003703-24 = "心配するな、先生。私はほぼ完璧にこの学園の地理を把握している。大船に乗ったつもりでついてくるが良い！"
1003703-25 = "心配するな、先生。私はほぼ完璧にこの学園の地理を把握している。大船に乗ったつもりでついてくるが良い！"
1003703-27 = "（その後……）"
1003703-31 = "……迷ったな。"
1003703-32 = "なぜだ、足跡に沿って進んできただけなのに……！"
1003703-33 = "[s] \"さっきマリナ、確か地理は把握してるって……。\""
1003703-34 = "う、嘘ではない！レッドウィンター連邦学園の保安委員長として、それは当然のことだ！"
1003703-35 = "そのはず、なのだが……。"
1003703-36 = "……ん？何だかこの辺りの景色、もはや見覚えが無いような……。"
1003703-37 = "くっ、足跡も見えなくなって……これは、犯人を取り逃してしまったか……。"
1003703-38 = "[s] \"さっきの足跡なら、そこの倉庫に繋がってるみたいだよ。\""
1003703-40 = "なっ……"
1003703-41 = "本当じゃないか！"
1003703-42 = "しかも、倉庫の入り口に落ちているあれらは……盗まれたはずの、チェリノ会長のプリン！"
1003703-43 = "つまり例のスパイは、きっとここに隠れているに違いない！"
1003703-45 = "やるではないか先生。 私でさえ見逃した、犯人の痕跡に気づくとは……。"
1003703-46 = "スパイを無事に捕まえたあかつきには、先生に「特別勇猛髭勲章」が与えられるように提案してみよう！"
1003703-47 = "さあ、ではあの卑劣なスパイに引導を渡しにいくとしようか。"
1003703-48 = "……[ruby=突撃]Ура[/ruby]！"
1003703-51 = "動くな、スパイめ！"
1003703-52 = "なっ……！"
1003703-56 = "[ns] \"可愛い、猫だね。\""
1003703-57 = "……。"
1003703-58 = "馬鹿な、スパイではなく猛獣だと！？"
1003703-59 = "[s] \"落ち着いて、マリナ。ただの野良猫だよ。\""
1003703-60 = "お、落ち着けるか！先生はあの鋭い爪と歯が見えないのか！？"
1003703-61 = "やっとスパイの本拠地を見つけたと思ったのに、まさかその先にはさらに大きな脅威が潜んでいたとは……。"
1003703-62 = "くっ……しかしここで退いたら、チェリノ会長には何と報告すれば良いんだ？プリンを盗んだ犯人を見つけたが、撤退するしかなかったと？"
1003703-63 = "だが、それでは粛清されてしまう……麻酔銃か何かで生け捕りにして、事務局に突き出すか……？あの猛獣を？"
1003703-64 = "[s5] \"マリナ、もしかして……。\"\n[s6] \"猫が怖いとか？\""
1003703-65 = "な、何だと！？レッドウィンター連邦学園の保安委員長が、たった一匹の猫に怯えるわけがないだろう！"
1003703-66 = "な、何だと！？レッドウィンター連邦学園の保安委員長が、たった一匹の猫に怯えるわけがないだろう！"
1003703-67 = "たとえ怒り狂った熊が襲い掛かってきたとしても、私は決して――"
1003703-71 = "うあああっ！"
1003703-75 = "……白状しよう。猫は苦手なんだ……。"
1003703-76 = "幼い頃、野良猫におやつをあげようとしたら、顔を引っかかれて……。"
1003703-77 = "それ以来、猫には近寄りたくもない……。"
1003703-78 = "[s] \"じゃあこの機会に、あらためて仲良くなってみるのはどう？\""
1003703-79 = "なっ、正気か先生！？猫と仲良くなるだと！？"
1003703-80 = "あの恐ろしい猛獣と親交を交わすくらいなら、飢えた熊と会話をする方がマシだ！"
1003703-81 = "たとえそれが会長からの命令だったとしても、そんなことはできな――"
1003703-85 = "ち、近寄るなっ！！！"
1003703-91 = "あっ……。"
1003703-92 = "[s7] \"銃弾、当たらなくて良かった……\"\n[s8] \"逃げちゃったね。\""
1003703-93 = "……。"
1003703-94 = "……。"
1003703-95 = "と、とにかくこれで事件は解決だな！"
1003703-96 = "会長のプリンを盗んだ犯人が分かり、その犯人にはしっかりと警告を与えた。もうあのような真似はしないだろう。"
1003703-97 = "これでチェリノ会長の怒りも、少しは和らいでくれるはず……。"
1003703-98 = "……ところでさっき、棚の上から何かが落ちたな。あれは何だ？"
1003703-102 = "ちぇ、チェリノ会長の石像が！！"
1003703-103 = "どうして会長の石像がこんなところに！？それに、どうしてこんなお姿に……！"
1003703-104 = "……え、私？さっき銃を乱射した時に……？"
1003703-105 = "そ、そんな、せっかくプリンを盗んだ犯人を特定したというのに……それに伴って、まさか会長の権威を失墜させてしまったというのか……！？"
1003703-106 = "これ以上の粛清はもう嫌だああぁぁぁぁぁっ！！"
1003703-108 = "（その後「犯人は猫」ということが明らかになったものの、マリナはチェリノの石像を壊した罰で再び懲戒を受けることになったらしい……。）"
