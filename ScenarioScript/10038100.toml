[translation]
10038100-1 = "Episódio 10; Sob o mesmo céu"
10038100-9 = "Você demorou mais do que eu pensava, Kisaki.#nO sol já está se pondo, sabia?"
10038100-10 = "É porque alguém por aí fez uma bagunça daquelas.#nFrancamente, bem que poderiam pensar em quem tem que limpar a sujeira depois."
10038100-11 = "Quem é que deseja algo assim?#nVocê continua com os princípios distorcidos, como sempre."
10038100-12 = "Alguém que não consegue ouvir as vozes dentro do rio, como você, jamais entenderia."
10038100-13 = "E por que eu precisaria ouvir sons que não existem?#nEnfim... a líder que foi derrotada e fugiu veio aqui dizer o quê?"
10038100-14 = "Pois é. Parece que não sou só eu que tenho algo a dizer a você."
10038100-15 = "Ah é?"
10038100-23 = "...Faz tempo, senpai Kai."
10038100-24 = "Ora, ora... se não é a minha querida kouhai.#nHehe... parece que teve bastante dificuldade para administrar o Clube de Pesquisa de Alquimia enquanto eu estava fora, não é?"
10038100-25 = "Para mim, senpai, você continua sendo alguém que não entende nada."
10038100-26 = "Eu esperava que, se nos encontrássemos de novo, minha opinião sobre você tivesse mudado..."
10038100-27 = "Mas, pelo visto... isso é impossível..."
10038100-28 = "...E eu aqui achando que você diria algo importante."
10038100-29 = "Hehe... que piada.#nAfinal, você acha mesmo que existia uma grande diferença entre você e eu?"
10038100-30 = "...?"
10038100-34 = "Eu analisei todos os seus registros de preparação de remédios.#nVocê também usou o desenvolvimento de medicamentos como desculpa para realizar todo tipo de experimento, não foi?"
10038100-38 = "Não é verdade.#nOs remédios que eu fiz...!"
10038100-39 = "[s] \"Os remédios da Saya não eram para a felicidade da própria Saya.\""
10038100-43 = "Oh... Sensei."
10038100-44 = "Parece que o Sensei também foi cobaia dos experimentos da Saya."
10038100-45 = "Mesmo assim, você ainda tenta protegê-la... é realmente fascinante."
10038100-46 = "[s] \"...É verdade, às vezes ela causava alguns problemas.\""
10038100-48 = "Se-Sensei!?"
10038100-49 = "[s] \"Mas o olhar da Saya sempre esteve voltado para os outros.\""
10038100-52 = "[ns1] \"Ela nunca tentou obter riqueza em troca de seus remédios.\"\n[ns2] \"E suportou diversos prejuízos para evitar que as pessoas sofressem.\""
10038100-57 = "Exato... esse era o problema dos remédios dela.#nNão concorda, Sensei?"
10038100-58 = "Quem teme o fracasso e os efeitos colaterais nunca alcançará nada."
10038100-59 = "Não importa quantos prejuízos ocorram durante o processo de produção, se o lucro final for maior――#nnão há motivo para considerar isso um problema, certo?"
10038100-63 = "Se você desviar o olhar e fugir dos prejuízos, só será lembrado como um fracassado que não realizou nada."
10038100-64 = "Eu sei que você foi a pessoa que mais chegou perto do elixir da imortalidade, senpai."
10038100-65 = "Mas, ainda assim, o seu método só faz todos sofrerem...!"
10038100-66 = "Hehe... que sofisma. Já tivemos essa conversa antes, não tivemos?"
10038100-67 = "Quem foi que definiu essa sua tal \"felicidade\"?"
10038100-68 = "Não me diga que... uma pessoa comum, que nem sabe o que lhe falta, acha que pode decidir o rumo da felicidade por conta própria?"
10038100-69 = "…………"
10038100-70 = "Como eu pensei, você não sabe responder.#nVocê não mudou nada desde aquela época."
10038100-71 = "Claro que não. A maioria das pessoas é ignorante e gananciosa."
10038100-72 = "Eu preenchi o que lhes faltava, e ainda assim, só recebi reclamações de ingratos dizendo que ficaram infelizes por causa disso."
10038100-73 = "...Não importa o que digam, eu vou criar o elixir."
10038100-74 = "O elixir supremo que nos guiará à divindade e satisfará os desejos infinitos dos meros mortais."
10038100-80 = "Lembre-se, Saya. A tentativa de alcançar a divindade foi o início e o objetivo supremo de nós, pesquisadores."
10038100-81 = "Mas nós...!"
10038100-86 = "Portanto... só nos resta falar sobre os resultados."
10038100-90 = "Ah, Kisaki.#nVocê ficou tão quieta que achei que tinha ido embora."
10038100-91 = "Lembra-se da aluna que teve o corpo prejudicado pelo seu remédio?#nOu será que... um assunto tão trivial não valia a pena ser lembrado?"
10038100-92 = "Hehe... claro que me lembro.#nCada caso é um registro importante, seria impossível esquecer."
10038100-93 = "Então... você também sabe que, para tratar aquela aluna, a Saya não pôde continuar com suas próprias pesquisas, não é?"
10038100-94 = "Vou deixar uma coisa bem clara.#nTudo aquilo foi o que a própria aluna desejou."
10038100-95 = "Poucas pessoas conseguem compreender seus próprios desejos com precisão."
10038100-96 = "Eles não compreendem quais resultados suas escolhas trarão — e, muitas vezes, não conseguem suportar as consequências."
10038100-97 = "Por que deveríamos arcar com a responsabilidade pela ignorância dos meros mortais?#nNão posso concordar com esse ponto de vista."
10038100-98 = "Todos nós temos uma parte de meros mortais em nós.#nPor isso, estou dizendo que deveríamos ser mais tolerantes uns com os outros."
10038100-99 = "Isso é algo que só se aplica a alguém como você, não é?#nNão me envolva nisso."
10038100-100 = "Se é assim que você deseja me ver, pode continuar fazendo isso o quanto quiser."
10038100-107 = "Como uma mera mortal — assim como naquela época, direi novamente: não há lugar para você em Shanhaijing."
10038100-112 = "No fim, você escolheu diminuir o seu próprio valor... Decepcionou-me, Kisaki."
10038100-113 = "Tanto tempo se passou... Eu esperava que você tivesse aprendido a conversar de forma sensata."
10038100-114 = "Fufu. Você jura vingança contra mim, mas que tipo de conversa é essa?"
10038100-115 = "...A essa altura, esse nível de coisa é algo que posso realizar a qualquer momento."
10038100-116 = "Já esqueceu?#nO fato de eu ter me tornado assim é culpa sua."
10038100-117 = "Ah... Você estava dizendo algo assim, não é?#nSendo assim, direi claramente aqui e agora."
10038100-122 = "Quem moldou você como é hoje — não foi ninguém além de você mesma."
10038100-127 = "Oh...?"
10038100-128 = "Você escolheu, você trouxe isso à tona e você decidiu."
10038100-129 = "Foi você quem definiu os outros como meros mortais — e foi você quem declarou que, por isso, você era diferente."
10038100-130 = "Mesmo assim, se você insiste em me odiar até o fim — então que assim seja."
10038100-131 = "Afinal, a existência de um líder de facção serve justamente para carregar todo tipo de problema nas costas."
10038100-132 = "Olha só como ela fala...!"
10038100-137 = "— Decidi. Vou testar o próximo reagente em você."
10038100-138 = "Oh, você vai?#nAcha mesmo que consegue?"
10038100-139 = "É quase estranho como você está tão calma, Kisaki."
10038100-144 = "Quanto tempo faz desde que Saya foi detida?"
10038100-145 = "Já não está no seu limite, apenas por estar de pé?"
10038100-146 = "Fufu... Entendo, não é de se estranhar que você pense assim."
10038100-151 = "Então, observe bem com seus próprios olhos.#nQuem é a líder da Xuanlongmen que está diante de você."
