[translation]
10038100-1 = "第10話;同じ空の下で"
10038100-9 = "思ったより遅かったねぇ、キサキ。#nもう日が暮れているよ？"
10038100-10 = "どこかの誰かが派手にやらかしてくれたからのう。#nまったく、収拾する側のことも考えてほしいものじゃ。"
10038100-11 = "誰がそんなことを望んでいるというんだい？#n相変わらず軸がブレているんだねぇ。"
10038100-12 = "川の中の声が聞けない其方には分からぬことじゃろうて。"
10038100-13 = "聞こえない音を聞く必要が？#nそれで……一度負けて逃げた門主が、何を言いに来たのか聞かせてくれるかい？"
10038100-14 = "そうさな。どうやら其方に言いたいことがあるのは妾だけではないようじゃ。"
10038100-15 = "ほう？"
10038100-23 = "……久しぶりなのだ、カイ先輩。"
10038100-24 = "これはこれは……誰かと思ったら後輩さんじゃあないか。#nククッ……私がいない間、錬丹術研究会を運営するのに大変苦労したようだねぇ？"
10038100-25 = "ぼく様にとって先輩は、相変わらず何も分からない人なのだ。"
10038100-26 = "また会えたら、ぼく様の考えが変わることを願っていたけど……"
10038100-27 = "やはりそれは……無理みたいなのだ……"
10038100-28 = "……何を言うのかと思ったら。"
10038100-29 = "ククッ……笑わせてくれるね。#nそもそも君と私の間に、何か大きな違いがあったとでも？"
10038100-30 = "……？"
10038100-34 = "君の調剤記録は全部調べさせてもらったよ。#n薬の開発を口実に、あらゆる実験をしていたのは、君も同じじゃあないか。"
10038100-38 = "違うのだ。#nぼく様が作った薬は……！"
10038100-39 = "[s] \"サヤの薬は、サヤ自身の幸せのためではなかったよ。\""
10038100-43 = "おや……先生か。"
10038100-44 = "先生もサヤの実験対象になっていたらしいね。"
10038100-45 = "それでもサヤを庇おうとするのか……実に興味深い。"
10038100-46 = "[s] \"……確かに、たまに困ったこともあったけど。\""
10038100-48 = "せ、先生！？"
10038100-49 = "[s] \"でも、サヤの視線は、いつも他人を向いていたよ。\""
10038100-52 = "[ns1] \"薬と引き換えに富を得ようともしなかったし。\"\n[ns2] \"人々が不幸になるのを防ぐために、様々な損害にも耐えてきた。\""
10038100-57 = "そう……彼女の薬はそこが問題だった。#nそうは思わないかね、先生？"
10038100-58 = "失敗と副作用を恐れていては、何も成し遂げることなどできない。"
10038100-59 = "製作過程でいくら不利益が発生しようと、それを上回る利益が得られるのであれば――#nそれを問題視する必要はないだろう？"
10038100-63 = "不利益から目をそらして逃げてしまえば、何も成せない失敗者として記録されるだけだというのに。"
10038100-64 = "先輩が……誰よりも不老不死の霊薬に近づいた人というのは、ぼく様も分かっているのだ。"
10038100-65 = "でもやっぱり、先輩のやり方はみんなを不幸にするだけなのだ……！"
10038100-66 = "ククッ……詭弁だねぇ。前にも同じような会話をしただろう？"
10038100-67 = "君の言う「幸せ」は、一体誰が定義したものなんだい？"
10038100-68 = "まさか……自分に何が足りないのかすら分からない凡夫が、自ら幸せの方向性を決められるとでも？"
10038100-69 = "…………。"
10038100-70 = "やっぱり、答えられないんだね。#nあの時から何も変わっちゃいない。"
10038100-71 = "そりゃそうさね。大半の人間は、無知な上に貪欲なものだから。"
10038100-72 = "足りない部分を埋めてあげたというのに――そのせいで不幸になったと文句を言う恩知らずの者ばかり。"
10038100-73 = "……誰が何と言おうと、私は仙丹を作るよ。"
10038100-74 = "我々を神仙に導き、凡夫どもの果てしない欲望を満たしてくれる究極の霊薬を――ね。"
10038100-80 = "思い出すんだ、[ruby=やくし]薬子[/ruby]サヤ。#n神仙に到達せんとする試みこそ、我々[ruby=錬丹術研究会]研究者[/ruby]たちの始まりであり――究極の目的であったことを。"
10038100-81 = "でもぼく様たちは……！"
10038100-86 = "故に――我らは、結果についての話をするしかないのじゃ。"
10038100-90 = "ああ、キサキか。#nあまりに喋らないものだから、どこかに行ってしまったのかと思ったよ。"
10038100-91 = "其方の薬で身体を壊した生徒を覚えているかの？#nそれとも――そんな些細な事、覚える価値すらなかったかえ？"
10038100-92 = "ククッ……覚えているとも。#n全てが大切な症例なんだ、覚えていないわけがない。"
10038100-93 = "ならば――サヤがその生徒を治療するために、自分の研究ができなかったことも知っておろう？"
10038100-94 = "一つだけハッキリさせておこうか。#nあれは、全てその生徒自身が望んだものだよ。"
10038100-95 = "自らの願望を正確に把握できている者は少ない。"
10038100-96 = "その選択がどのような結果を招くのか理解が及ばず――結果に耐えられないことだって多々ある。"
10038100-97 = "何故、凡夫どもの無知の責任まで我々が負わなければならないんだい？#nその観点には賛同できないねぇ。"
10038100-98 = "我らは皆――凡夫である部分を持っている。#nじゃから、互いに寛大に接するべきではないかという話をしておるのじゃ。"
10038100-99 = "それは、君のような者だけだろう？#n私を巻き込まないでくれないかねぇ。"
10038100-100 = "其方がそのように妾を見たいのであれば、いくらでもそうするがよい。"
10038100-107 = "凡夫の一人として――あの時と同じく、山海経に其方の居場所はないということを、改めて告げよう。"
10038100-112 = "結局、自身の価値を下げる方を選んだのか……見損なったよ、キサキ。"
10038100-113 = "これだけ時間が経ったんだ――少しはまともに話ができるようになったんじゃないかって期待していたのに。"
10038100-114 = "ふふ。妾に対して復讐を誓っているというのに、とんだ言い草じゃな？"
10038100-115 = "……今となってはその程度、いつでも実現できるからねぇ。"
10038100-116 = "もう忘れたのかい？#n私がこうなったのは、君のせいだということを。"
10038100-117 = "ああ……其方はそんなことを言っておったのう。#nであれば、この場ではっきりと告げよう。"
10038100-122 = "今の其方を作り上げたのは――他の誰でもない其方自身じゃ。"
10038100-127 = "ほう……？"
10038100-128 = "其方が選び――其方がもたらし、其方が決めた。"
10038100-129 = "他人を凡夫と定義したのも其方であり――だからこそ自分は違うと宣言したのも其方じゃ。"
10038100-130 = "それでも妾を最後まで恨むのなら――そうするが良い。"
10038100-131 = "門主とは本来、あれこれ面倒事を背負うために存在するものじゃからのう。"
10038100-132 = "言わせておけば……！"
10038100-137 = "――決めた。次の試薬は君で試そう。"
10038100-138 = "ほう、其方が？#nできると思うのかえ？"
10038100-139 = "どうしてそんなに余裕なのかが不思議なくらいだよ、キサキ。"
10038100-144 = "サヤの身柄が拘束されてからどれだけ経った？"
10038100-145 = "そろそろ、立っているのも限界なんじゃないのかねぇ？"
10038100-146 = "ふふ……なるほど、そう思うのも無理からぬこと。"
10038100-151 = "ならば、その目でしかと確かめるがよい。#n其方の前に立っている玄龍門の門主が、誰なのかを。"
