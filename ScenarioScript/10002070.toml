[translation]
10002070-1 = "第7話;海の家（１）"
10002070-2 = "……。"
10002070-3 = "と、とにかく二番目までは終えられましたね……。"
10002070-4 = "ペースは悪くない。次のミッションを始めよう。"
10002070-5 = "できるだけ早く終わらせて、最初の目的通り普通に海を楽しむとしよう。"
10002070-6 = "そ、そうですね……。"
10002070-7 = "[s1] （うーん……）\n[s2] （もうすでに、それなりに楽しんでる気がするけど……）"
10002070-8 = "それでヒフミ、次のミッションは？"
10002070-9 = "それでヒフミ、次のミッションは？"
10002070-14 = "えっと、「海の家」にしましょうか。ただ普通に行って、食事をしているところを撮れば良さそうです。"
10002070-15 = "海といえば色んなものが美味しいですし、定番のお楽しみの一つですよね。"
10002070-16 = "実は事前に調べておいたのですが、この[ruby=むいがはま]無為ヶ浜[/ruby]には有名なお店があるそうで……"
10002070-17 = "あ、ここですね。"
10002070-19 = "海の家"
10002070-21 = "えっと、失礼します……！"
10002070-27 = "ん？……あれ、先生！？"
10002070-28 = "[s3] \"どうしてイズミがここに……？\"\n[s4] \"イズミもご飯食べに来たの？\""
10002070-29 = "ちょっと事情があって、今はここで働いてるの！"
10002070-30 = "ちょっと事情があって、今はここで働いてるの！"
10002070-31 = "店主さんがちょっと寝込んじゃって。それで今日一日、代わりにね！"
10002070-32 = "まさかこんなところで先生に会うなんて、ビックリした―！"
10002070-34 = "えっと、先生のお知り合いの方ですか？"
10002070-35 = "どこかで見たような……ゲヘナ？いや、まさか……"
10002070-36 = "……？"
10002070-37 = "[s] 全力で誤魔化す。"
10002070-40 = "なるほど、先生のお知り合いでしたか。一瞬変に気を張ってしまって、失礼しました。"
10002070-41 = "よく分かんないけど気にしないで！さあ、せっかく来てくれたんだし、私の新作を味わっていってよ！"
10002070-42 = "[s5] \"イズミの新作！？\"\n[s6] \"まさか、店主さんが寝込んでるのって……！\""
10002070-43 = "そっちのみんなも座って座って！"
10002070-44 = "そっちのみんなも座って座って！"
10002070-45 = "ここのメニューは何でも美味しいから、期待してて良いよ！ちょっとだけなら割引もしてあげる！"
10002070-49 = "なるほど、"
10002070-50 = "じゃあありがたく。"
10002070-51 = "それではお言葉に甘えて……。"
10002070-52 = "先輩も、こちらへどうぞ。"
10002070-58 = "[ns] \"えっと、みんな、その……。\""
10002070-59 = "ありがとうございます！えっと、どれにしましょう……！"
10002070-60 = "[s] \"ちょっと話を聞いてほしいんだけど……。\""
10002070-61 = "先生、どうかしましたか？"
10002070-62 = "あ、メニューの名前がすごく斬新ですね。"
10002070-63 = "「牡蠣氷」「チョコミント焼きそば」「練乳冷やし中華」「なまこジュースのチョコレートがけ」……"
10002070-64 = "ユニークですね、良いセンスです。"
10002070-65 = "[s] \"ユニークっていうか、多分それ文字通りっていうか……。\""
10002070-66 = "……？どういうことですか？"
10002070-67 = "みんなそろそろ選んだ？"
10002070-68 = "ご注文をどうぞー！"
10002070-72 = "では、私はこの「牡蠣氷」というのを。"
10002070-73 = "先輩は何にしますか？"
10002070-75 = "……「チョコミント焼きそば」。"
10002070-76 = "では、私は「なまこジュースのチョコレートがけ」」で……！"
10002070-81 = "「練乳冷やし中華」。"
10002070-83 = "オーダー承りましたー！"
10002070-84 = "「牡蠣氷」「チョコミント焼きそば」「なまこジュースのチョコレートがけ」「練乳冷やし中華」を一つずつね！牡蠣シロップはまだあったかな……まあ多分大丈夫！"
10002070-85 = "[s] \"ちょっ、ちょっと待って……！\""
10002070-86 = "あ、先生は何を食べるの？"
10002070-87 = "私に作れそうなものなら、何でも作ってあげるよ？"
10002070-88 = "どうする？何が良い？"
10002070-89 = "[s] \"わ、私は……っ！！\""
10002070-90 = "（ッダァン！！）"
10002070-91 = "……え？"
10002070-93 = "（ダダダダダッ！ダダダダダンッ！！）"
10002070-94 = "ふえぇっ！？"
10002070-95 = "お、お店が襲撃されてる！？何で、どうして！？"
10002070-96 = "「どうして」だと……！？"
10002070-97 = "本気で言っているのか、このバイオテロリストめ！！"
10002070-98 = "[s] \"この声は……。\""
10002070-102 = "許さない……"
10002070-103 = "許さないぞ！"
10002070-104 = "お前たちのせいで、あたしらのヘッドは今でもトイレから離れられない！"
10002070-106 = "ま、またスケバンの方々が……！？"
10002070-107 = "自信満々に出してきたと思って油断した……くそっ、お前の料理のせいで……！！！"
10002070-108 = "こんなお店、ぶっ壊しちまった方がキヴォトスのためだ！いくぞ！"
10002070-109 = "え、えっと、状況がよく掴めないのですが……？"
10002070-110 = "問答無用！！"
10002070-112 = "おら、やっちまえ！！"
10002070-113 = "（ダダダダダッ！ダララッ！ドカアァァン！！）"
10002070-114 = "あああっ！！私の……じゃないけど、お店が！！！"
10002070-115 = "待って待って！ここ私のお店じゃないから余計にダメだって！うわああん！！"
10002070-116 = "……よく分からないけど、応戦した方が良い？"
10002070-117 = "食べ物を粗末にするなどという、とんでもない悪の行い……見過ごすわけには行きません！"
10002070-118 = "さあ、正義の鉄槌を！"
10002070-124 = "え、ちょっ、これ何度目ですか！？"
