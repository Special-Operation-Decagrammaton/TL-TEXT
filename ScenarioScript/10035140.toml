[translation]
10035140-1 = "後日談その3;河駒風ラブのシークレットバカンス（１）"
10035140-4 = "この自販機もなかなかだぜ、ひひっ。"
10035140-5 = "場末の自販機を蹴ってお金を稼ぐ……。"
10035140-6 = "すげえビジネスモデルだ。やっぱり隊長は頭がいいですね！"
10035140-11 = "あはははっ！"
10035140-12 = "そう！うちこそヘルメット団のブレインよ！"
10035140-13 = "で、今日の収穫はいくらだったの？"
10035140-18 = "自販機26台を蹴って……"
10035140-19 = "530円です。"
10035140-25 = "少なくない？"
10035140-27 = "そりゃあ、こんな場所にある自販機ですから……。"
10035140-28 = "表の自販機はブラックマーケットの管轄で、うかつに手を出せないし……。"
10035140-33 = "ああもうっ！これじゃ夏休みの計画を大幅修正するしかないじゃない！"
10035140-35 = "そんな……。"
10035140-42 = "モモトーク？こんな時に誰が……。"
10035140-46 = "知らない番号……。#n「ヘルメット団の本部」？そんなのあったっけ？"
10035140-47 = "ヘルメット団は普段バラバラに活動してても、規模はデカいですから。#n本部くらいあるかもしれませんよ。"
10035140-48 = "たしかに……入団の時、聞いた覚えがあるような……。"
10035140-49 = "まぁ、確認してみるけど。"
10035140-55 = "え！？「ヘルメット団総連合会」開催決定！？"
10035140-59 = "総連合会……！って、なんすか？"
10035140-61 = "ヘルメット団の全団員が海辺で一堂に会する集会よ！"
10035140-62 = "フードコートにアミューズメント、それにライブも！#nもうパーティーみたいなもんじゃない、これ！"
10035140-63 = "最高ね！これなら今年の夏休みはバッチリだわ！"
10035140-68 = "う、うちらも一緒に行けるんですか？"
10035140-70 = "当ったり前でしょ！"
10035140-71 = "参加費も取らないみたいだし。#n残った金で水着を買うわよ！"
10035140-74 = "やったぁ！"
10035140-82 = "こ、この水着、高すぎませんか？"
10035140-83 = "3人分買うには、金が足りませんね……？"
10035140-88 = "うーーん……。"
10035140-89 = "仕方ないわね！1着だけ買って着回しましょ！"
10035140-90 = "予算内で、できるだけ準備するのよ！"
10035140-121 = "あ～、楽しかった！"
10035140-123 = "たくさんは買えなかったけど。いい買い物ができましたね、隊長！"
10035140-124 = "貯金がほとんどすっからかんですけど……。#nこれもヘルメット団のパーティーのためですからね！"
10035140-126 = "そう！そのとおり！"
10035140-127 = "うちらの夏は、ここから始まるの！"
10035140-134 = "あれ、新しいメッセージ？"
10035140-138 = "どれどれ……。"
10035140-143 = "は、はぁ？バカにしてるわ。何よ、これ？"
10035140-145 = "え？どうかしたんですか？"
10035140-146 = "隊長？顔色が悪いですよ。"
10035140-154 = "……これ見て。"
10035140-159 = "パーティーの参加者名簿……？"
10035140-160 = "隊長の名前だけで……う、うちらの名前が……無い？"
10035140-161 = "え……じゃあ、うちらはパーティーに参加できない、ってことですか？"
10035140-162 = "そんな……せっかく楽しみにしていたのに……。"
10035140-164 = "ふ、ふざけてるわ！全員じゃなきゃ意味ないでしょ！"
10035140-165 = "待ってなさい！ちゃんと抗議するから……！"
10035140-171 = "いえ……隊長だけでも行ってきてください。"
10035140-176 = "え？"
10035140-177 = "仕方ないですよ。#n本部も末端の団員まで呼ぶ余裕はないみたいだし……。"
10035140-178 = "隊長だって、楽しみにしてたでしょ。#nだから、うちらの分まで楽しんできてください。"
10035140-179 = "うちらのことは……気にしないで……。"
10035140-180 = "あんたたち……。"
10035140-185 = "……よし、決めたわ。"
10035140-189 = "あんたたち、ついてくるのよ。"
10035140-194 = "え？ど、どこに行くんですか？"
10035140-196 = "いいからっ！"
10035140-200 = "せっかく水着も買ったんだし！今から水遊びに行くわよ！"
10035140-201 = "あんたたちの夏を、このまま終わりにはさせないわ！"
