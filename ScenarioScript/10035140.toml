[translation]
10035140-1 = "Epílogo 3; As Férias Secretas de Kawakoma Fuu (1)"
10035140-4 = "Essa máquina de venda automática também é uma boa, hehe."
10035140-5 = "Chutar máquinas de venda automática em lugares remotos para ganhar dinheiro..."
10035140-6 = "Que modelo de negócio incrível. Como esperado, a capitã é muito inteligente!"
10035140-11 = "Ahahahaha!"
10035140-12 = "Isso mesmo! Eu sou o cérebro do Grupo Capacete!"
10035140-13 = "Então, quanto foi a colheita de hoje?"
10035140-18 = "Chutamos 26 máquinas de venda automática..."
10035140-19 = "530 ienes."
10035140-25 = "Não é pouco?"
10035140-27 = "Bem, é que as máquinas ficam em lugares assim..."
10035140-28 = "As máquinas da frente são jurisdição do mercado negro, então não podemos mexer nelas sem cuidado..."
10035140-33 = "Ah, não! Desse jeito, vou ter que revisar completamente o plano das férias de verão!"
10035140-35 = "Não pode ser..."
10035140-42 = "MomoTalk? Quem seria a essa hora..."
10035140-46 = "Número desconhecido... #n'Quartel-General do Grupo Capacete'? Será que isso existe?"
10035140-47 = "O Grupo Capacete costuma agir de forma separada, mas a escala é enorme. #nTalvez exista um quartel-general."
10035140-48 = "É verdade... Lembro-me de ter ouvido algo sobre isso quando entrei no grupo..."
10035140-49 = "Bem, vou verificar."
10035140-55 = "Hã!? 'Convenção Geral do Grupo Capacete' confirmada!?"
10035140-59 = "Convenção Geral...! O que é isso?"
10035140-61 = "É uma reunião onde todos os membros do Grupo Capacete se reúnem à beira-mar!"
10035140-62 = "Tem praça de alimentação, diversão e até shows! #nIsso é praticamente uma festa!"
10035140-63 = "Demais! Com isso, as férias de verão deste ano estão garantidas!"
10035140-68 = "N-nós também podemos ir?"
10035140-70 = "Claro que sim!"
10035140-71 = "Parece que não cobram taxa de participação. #nVamos usar o dinheiro que sobrou para comprar trajes de banho!"
10035140-74 = "Oba!"
10035140-82 = "E-esse traje de banho não está caro demais?"
10035140-83 = "Não temos dinheiro suficiente para comprar para as três..."
10035140-88 = "Hmm..."
10035140-89 = "Não tem jeito! Vamos comprar só um e revezar!"
10035140-90 = "Vamos nos preparar o máximo possível dentro do orçamento!"
10035140-121 = "Ah~, foi divertido!"
10035140-123 = "Não conseguimos comprar muita coisa, mas fizemos boas compras, capitã!"
10035140-124 = "Nossas economias estão quase zeradas... #nMas é tudo pela festa do Grupo Capacete!"
10035140-126 = "Isso! Exatamente!"
10035140-127 = "Nosso verão começa agora!"
10035140-134 = "Ué, uma nova mensagem?"
10035140-138 = "Vejamos..."
10035140-143 = "H-hã? Estão tirando sarro da gente. O que é isso?"
10035140-145 = "Hã? Aconteceu alguma coisa?"
10035140-146 = "Capitã? Você está pálida."
10035140-154 = "...Olhem isso."
10035140-159 = "Lista de participantes da festa...?"
10035140-160 = "Só tem o nome da capitã... e o nosso... não está aqui?"
10035140-161 = "Hã... então quer dizer que nós não podemos participar da festa?"
10035140-162 = "Não pode ser... estávamos tão ansiosas..."
10035140-164 = "I-isso é um absurdo! Não faz sentido se não formos todas!"
10035140-165 = "Me aguardem! Vou protestar contra isso agora mesmo...!"
10035140-171 = "Não... por favor, vá você mesma, Capitã."
10035140-176 = "Hã?"
10035140-177 = "Não tem jeito. Parece que o quartel-general não tem recursos para chamar até os membros de baixo escalão..."
10035140-178 = "Você também estava ansiosa por isso, não estava, Capitã? Então, por favor, divirta-se por nós também."
10035140-179 = "Quanto a nós... não se preocupe..."
10035140-180 = "Vocês..."
10035140-185 = "...Muito bem, decidi."
10035140-189 = "Vocês, venham comigo."
10035140-194 = "Hã? P-para onde vamos?"
10035140-196 = "Apenas venham!"
10035140-200 = "Nós compramos trajes de banho, afinal! Vamos brincar na água agora mesmo!"
10035140-201 = "Eu não vou deixar o verão de vocês acabar assim!"
