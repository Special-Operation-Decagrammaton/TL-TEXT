[translation]
2001802-1 = "Dano Colateral"
2001802-2 = "……Entendi. Então, o ladrãozinho com o bloqueador fugiu para o Mercado Negro e está difícil de rastrear."
2001802-3 = "Esta área tem ruas muito confusas e muitos setores que dependem de câmeras de segurança. #nSe o alvo tem um bloqueador, vai ser ainda mais difícil de rastrear, né."
2001802-4 = "Nessas horas, é bom usar o drone de rastreamento infravermelho da SRT, equipado com mecanismos de defesa eletrônica. Foi uma boa decisão pedir minha ajuda. Hehehe……."
2001802-5 = "Aliás, Sensei, tem certeza de que está tudo bem pedir minha ajuda……?"
2001802-6 = "[s1] \"O, o que você quer dizer……?\"\n[s2] \"Tem algum problema?\""
2001802-7 = "Não…… a preparação da operação está perfeita. Posso lançar o drone imediatamente e rastrear o suspeito."
2001802-8 = "Não…… a preparação da operação está perfeita. Posso lançar o drone imediatamente e rastrear o suspeito."
2001802-9 = "É só que…… faz tempo que não uso armas de fogo à vontade com permissão total, então…… meu corpo todo está formigando……."
2001802-10 = "[s] \"Eu não disse 'à vontade' em momento nenhum!\""
2001802-11 = "Tudo bem, tudo bem. Não se preocupe com detalhes."
2001802-12 = "……Então, vamos começar?"
2001802-16 = "Haa, haa…… se eu fugi até aqui, eles não devem ter me seguido, né?"
2001802-17 = "Foi um pouco caro, mas ainda bem que comprei esse bloqueador."
2001802-18 = "Com isso, não apareço nas câmeras de segurança e nem os drones notam minha presença. Parece que vou conseguir roubar sem medo de ser visto por ninguém."
2001802-19 = "Se continuar assim, logo recupero o investimento――"
2001802-23 = "U, ué! O que é esse drone!?"
2001802-24 = "Por que meu bloqueador não está funcionando!"
2001802-28 = "Ai, ai! Ai, ai, ai! F-foge logo!"
2001802-32 = "Hehehe…… não adianta fugir. #nA menos que você se enterre no chão, não vai escapar do drone que eu estou operando."
2001802-33 = "Mas, se você for pego rápido demais, perde a graça, então por que não se esforça um pouco mais~?"
2001802-34 = "[s3] \"Ei…… Moe?\"\n[s4] \"Não seja tão radical…….\""
2001802-35 = "Tudo bem, tudo bem. Mesmo que pareça assim, estou levando isso a sério."
2001802-36 = "Tudo bem, tudo bem. Mesmo que pareça assim, estou levando isso a sério."
2001802-37 = "Pelo menos por enquanto…… hehehe."
2001802-38 = "[s] \"Por enquanto……!?\""
2001802-39 = "Ah! Parece que peguei o sinal de novo ali."
2001802-40 = "Espere um pouco, Sensei. Vou lá mais uma vez."
2001802-47 = "Ai, ai, ai! Eu disse que dói! Já chega, para com isso!"
2001802-48 = "Uuu…… não aguento mais! Eu me rendo!"
2001802-49 = "……E~h? Já vai se render?"
2001802-50 = "Não dá para aguentar se o drone me acha não importa o quanto eu fuja!"
2001802-51 = "Vou devolver tudo o que roubei! Por favor, para!"
2001802-52 = "[s5] \"Bom trabalho, Moe.\"\n[s6] \"Já pode recolher o drone.\""
2001802-53 = "……."
2001802-54 = "……."
2001802-56 = "……Mas eu nem disparei o míssil ainda?"
2001802-57 = "[s] \"……Não precisa de mísseis para prender um ladrão.\""
2001802-59 = "[ns7] \"Além disso, tem muitas coisas inflamáveis por perto…….\" \n[ns8] \"Seria um problema se houvesse uma explosão.\""
2001802-60 = "……E~h, seria um problema se eu disparasse o míssil agora?"
2001802-61 = "……E~h, seria um problema se eu disparasse o míssil agora?"
2001802-62 = "……Entendi. #nSe eu apertar este botão agora, as coisas podem ficar sem volta, né……."
2001802-63 = "Com certeza, isso deve vir acompanhado de uma grande responsabilidade……."
2001802-64 = "E uma grande responsabilidade traz…… um prazer imenso……!"
2001802-65 = "Haa…… haa, haa……."
2001802-66 = "[s] \"M-Moe-san……?\""
2001802-67 = "……Eu não consigo me segurar mesmo!!"
2001802-71 = "E-ei…… o drone está brilhando de um jeito estranho……."
2001802-72 = "N-não me diga que aquilo é um míssil? Você não está pensando em disparar aqui, né……?"
2001802-73 = "Se disparar um míssil agora, essa área inteira pode ser destruída!"
2001802-74 = "Como você pode ser tão irresponsável e destruir tudo assim..."
2001802-75 = "Eu não aguento mais!#n...Ah, ah."
2001802-79 = "Espere! Eu disse que me rendia, não disse?!"
2001802-80 = "Parem com issooooo!"
2001802-84 = "(...Depois disso, o ladrão desmaiado foi entregue à polícia em segurança, mas#nfoi um trabalho árduo limpar a cidade que ficou destruída pelos mísseis.)"
2001802-86 = "..."
2001802-87 = "...Por que você está me olhando assim?"
2001802-88 = "[s] \"Por que você disparou os mísseis mesmo depois de ele ter se rendido...?\""
2001802-89 = "Isso é..."
2001802-90 = "Porque o botão estava lá?"
2001802-91 = "[s] \"Não adianta falar como se fosse uma frase célebre...\""
2001802-92 = "Eu sei... sei que seria muito mais racional e sensato não usar os mísseis naquela situação."
2001802-93 = "Mas, além da razão... como posso dizer...#nquando tem um botão que você absolutamente não deve apertar bem na sua frente..."
2001802-94 = "Minha razão paralisa... e eu não consigo me segurar...#nah, ah..."
2001802-95 = "[s] \"Isso é complicado...\""
2001802-96 = "...Sensei, você já brincou de dominó?"
2001802-97 = "Aquela coisa de alinhar blocos quadrados que caem fácil, sem deixar espaços.#nExige muita concentração e paciência."
2001802-98 = "Se você derrubar um bloco, todo o esforço que você acumulou pode ir por água abaixo."
2001802-99 = "Mas, tirando isso... não tem momentos em que você vê um dominó perfeitamente alinhado e sente vontade de destruir tudo?"
2001802-100 = "Uma obra que levou tanto tempo para ser concluída... desmoronando em um único instante...#nAo observar isso, sinto uma catarse indescritível e arrepiante...#nah, ah..."
2001802-101 = "[s] \"Eu até entendo o que você quer dizer, mas...\""
2001802-102 = "Exato!#nO que eu busco é esse prazer de destruir o dominó!"
2001802-103 = "O trabalho de um operador envolve lidar com muitos botões, sabe?"
2001802-104 = "Muitos deles só devem ser tocados em situações de emergência."
2001802-105 = "Quando estou concentrada no trabalho, não percebo...#nmas, às vezes, fico imaginando o que aconteceria depois de apertar aquele botão."
2001802-106 = "O que será que aconteceria se eu apertasse este botão?..."
2001802-107 = "Quando começo a pensar nisso, eu... não consigo parar..."
2001802-108 = "Tudo sendo destruído... despedaçado em mil pedaços...!#nDeve virar uma situação impossível de controlar, né..."
2001802-109 = "Só de imaginar isso, eu...!"
2001802-110 = "Ah... ah, ah..."
2001802-111 = "[s] \"C-calma...!\""
2001802-113 = "[ns9] \"De qualquer forma... obrigado por me ajudar hoje.\"\n[ns10] \"V-você quer alguma coisa para beber?\""
2001802-114 = "Obrigada~ Eu estava justamente com sede."
2001802-115 = "Obrigada~ Eu estava justamente com sede."
2001802-116 = "Se tivesse uma bebida esportiva bem gelada..."
2001802-117 = "Ué?#nO que é isso? Nunca vi antes..."
2001802-118 = "...<Oshiruko Divino Explosivo>?"
2001802-119 = "[s11] \"É um Oshiruko quente.\"\n[s12] \"Em um dia quente como hoje, talvez não seja uma boa...\""
2001802-120 = "É verdade... se eu tomar um Oshiruko fervendo em um dia tão quente, em vez de me hidratar, posso acabar desidratada."
2001802-121 = "É verdade... se eu tomar um Oshiruko fervendo em um dia tão quente, em vez de me hidratar, posso acabar desidratada."
2001802-122 = "Escolher um Oshiruko nessas condições é um ato de autodestruição, não é?"
2001802-126 = "...Mas, pensando bem, esse \"botão de Oshiruko\" é uma escolha que leva à ruína."
2001802-127 = "Só de pensar que, se eu esticar um pouco o braço e apertar esse botão, posso causar um resultado irreversível... ah, ah...!"
2001802-128 = "[s] \"Ei, Moe! Espere--\""
2001802-133 = "Ah, ah...#nEu realmente apertei...!"
2001802-134 = "Esse peso quente e denso...#nSe eu tomar isso em um dia desses... vai ser um desastre, não vai?#nKuhihi..."
2001802-135 = "[s] \"Eu compro outro para você, não se force.\""
2001802-136 = "Não, eu vou beber!"
2001802-137 = "A ruína que eu mesma escolhi não tem sentido se eu não assumir a responsabilidade por ela."
2001802-138 = "Eu vou beber isso e assumir a responsabilidade!"
2001802-142 = "……Ah, quente!"
2001802-143 = "O oshiruko espesso desceu pela minha garganta, sinto como se meu corpo fosse pegar fogo……."
2001802-144 = "Nossa…… agora, só de aproximar a lata da boca, não consigo parar de suar……."
2001802-145 = "[s] \"Você está realmente bem……?\""
2001802-146 = "Estou bem……"
2001802-147 = "Na verdade, é ótimo!"
2001802-148 = "Até agora, eu só tinha apertado botões que levavam à ruína dos outros e não tinha percebido, mas…… um botão que leva à minha própria ruína também é algo bem……!"
2001802-149 = "Estou super empolgada…… em vários sentidos…… #nAh, ah……♥"
2001802-151 = "（……E Moe, mesmo sofrendo, bebeu todo o oshiruko quente）"
