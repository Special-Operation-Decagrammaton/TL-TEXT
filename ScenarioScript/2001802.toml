[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001802-1 = "Dano Colateral" 
2001802-2 = "……Entendi. Então o ladrãozinho com um bloqueador de sinal fugiu para o Mercado Negro, dificultando o rastreamento." 
2001802-3 = "As ruas por aqui são um verdadeiro labirinto, e muitos setores dependem de câmeras de segurança.\nSe o alvo tem um bloqueador, o rastreamento fica ainda mais difícil." 
2001802-4 = "Nessas horas, nada melhor do que usar o drone de rastreamento por infravermelho equipado com mecanismos de proteção eletrônica da SRT. Você fez uma ótima escolha em me pedir ajuda, Sensei. Kuhihi……" 
2001802-5 = "Mas, mudando de assunto, você tem certeza de que quer a minha ajuda, Sensei……?" 
2001802-6 = "[s1] \"C-Como assim……?\"\n[s2] \"Tem algum problema?\"" 
2001802-7 = "Não…… os preparativos para a operação estão perfeitos. Posso acionar o drone e rastrear o suspeito agora mesmo." 
2001802-8 = "Não…… os preparativos para a operação estão perfeitos. Posso acionar o drone e rastrear o suspeito agora mesmo." 
2001802-9 = "É só que…… faz tanto tempo desde que eu tive permissão para usar o meu poder de fogo o quanto eu quisesse…… meu corpo tá até formigando……" 
2001802-10 = "[s] \"Eu nunca disse 'o quanto você quisesse'!?\"" 
2001802-11 = "Relaxa, relaxa. Não se prenda a detalhes." 
2001802-12 = "……Então, bora começar?" 
2001802-16 = "Haa, haa…… Depois de fugir até aqui, duvido que estejam me seguindo." 
2001802-17 = "Foi meio caro, mas valeu a pena comprar esse bloqueador." 
2001802-18 = "Com isso, eu não apareço nas câmeras de segurança, e nem mesmo os drones conseguem detectar a minha presença. Vou poder roubar o quanto eu quiser sem me preocupar." 
2001802-19 = "Nesse ritmo, logo vou recuperar o dinheiro que eu gastei――" 
2001802-23 = "W-Waah! O que é esse drone!?" 
2001802-24 = "Por que o meu bloqueador não tá funcionando!?" 
2001802-28 = "Ah, ai! Aiai! V-Vou dar no pé por enquanto!" 
2001802-32 = "Kuhihi…… É inútil fugir.\nA não ser que você se enterre no chão, não tem como escapar do drone que eu estou controlando." 
2001802-33 = "Mas, seria muito sem graça se você fosse pego tão rápido, então não quer se esforçar mais um pouquinho~?" 
2001802-34 = "[s3] \"Ahm…… Moe?\"\n[s4] \"Não vamos fazer nada muito radical……\"" 
2001802-35 = "Relaxa, relaxa. Posso não parecer, mas eu tô levando isso a sério." 
2001802-36 = "Relaxa, relaxa. Posso não parecer, mas eu tô levando isso a sério." 
2001802-37 = "Por enquanto, pelo menos…… kuhihi." 
2001802-38 = "[s] \"Por enquanto……!?\"" 
2001802-39 = "Ah! Parece que peguei o sinal daquela direção de novo." 
2001802-40 = "Espera só um pouquinho, Sensei. Vou dar mais uma passadinha lá." 
2001802-47 = "Ah, aiai! Eu já disse que tá doendo! Para com isso!" 
2001802-48 = "Ugh…… Eu não aguento mais! Eu me rendo!" 
2001802-49 = "……Hã~? Vai se render já?" 
2001802-50 = "Não importa o quanto eu fuja, o drone sempre me acha! Não dá pra aguentar isso!" 
2001802-51 = "Eu devolvo tudo o que eu roubei! Mas, por favor, faz isso parar!" 
2001802-52 = "[s5] \"Bom trabalho, Moe.\"\n[s6] \"Pode recolher o drone agora.\"" 
2001802-53 = "……" 
2001802-54 = "……" 
2001802-56 = "……Mas eu ainda nem disparei os mísseis?" 
2001802-57 = "[s] \"……Não precisamos de mísseis para pegar um ladrão.\"" 
2001802-59 = "[ns7] \"Além disso, tem muitos materiais inflamáveis espalhados por aqui……\"\n[ns8] \"Teremos grandes problemas se houver uma explosão.\"" 
2001802-60 = "……Ah~ Então quer dizer que teríamos 'grandes problemas' se eu disparasse um míssil agora?" 
2001802-61 = "……Ah~ Então quer dizer que teríamos 'grandes problemas' se eu disparasse um míssil agora?" 
2001802-62 = "……Entendi.\nSe eu apertasse este botão agora, causaria algo irreparável……" 
2001802-63 = "E isso com certeza viria acompanhado de uma responsabilidade gigantesca……" 
2001802-64 = "E com uma responsabilidade gigantesca…… vem um prazer inimaginável……!" 
2001802-65 = "Haa…… haa, haa……" 
2001802-66 = "[s] \"M-Moe-san……?\"" 
2001802-67 = "……Como eu imaginava, não consigo me segurar!!" 
2001802-71 = "E-Ei…… o drone tá brilhando com uma cor estranha……" 
2001802-72 = "I-Isso aí não é um míssil, né? V-Você não tá pensando em atirar isso aqui, né……?" 
2001802-73 = "Se você disparar um míssil agora, essa área inteira vai virar um inferno, sabia!?" 
2001802-74 = "Destruir tudo e causar um caos de forma totalmente irresponsável……" 
2001802-75 = "Eu não consigo aguentar mais!\n……Haa, haa." 
2001802-79 = "Espera aí! Eu já disse que me rendo!" 
2001802-80 = "Paaaraaaaa!" 
2001802-84 = "（……Depois disso, o ladrão desmaiado foi entregue à polícia em segurança, mas\n foi um pesadelo limpar a bagunça que os mísseis causaram na cidade.）" 
2001802-86 = "……" 
2001802-87 = "……Por que tá me olhando assim?" 
2001802-88 = "[s] \"Por que você disparou os mísseis mesmo depois que ele se rendeu……?\"" 
2001802-89 = "Isso é porque……" 
2001802-90 = "Porque o botão estava bem ali na minha frente?" 
2001802-91 = "[s] \"Você não engana ninguém falando isso como se fosse uma frase de efeito……\"" 
2001802-92 = "Eu sei muito bem…… que não usar os mísseis naquela situação seria a decisão mais lógica e sensata." 
2001802-93 = "Mas, ignorando a lógica…… como posso explicar……\nQuando existe um botão que você absolutamente não deve apertar bem na sua frente……" 
2001802-94 = "A minha razão entra em curto…… e eu simplesmente não consigo me segurar……\nHaa, haa……" 
2001802-95 = "[s] \"Isso é complicado……\"" 
2001802-96 = "……Sensei, já brincou de dominó?" 
2001802-97 = "Aquele jogo onde você alinha pecinhas retangulares lado a lado sem deixar espaços.\nExige muita concentração e paciência." 
2001802-98 = "Se você derrubar uma peça por acidente, todo o seu esforço pode ir ralo abaixo." 
2001802-99 = "Mas ao mesmo tempo…… quando você vê os dominós perfeitamente alinhados, não dá uma vontade louca de derrubar tudo?" 
2001802-100 = "Uma obra que levou horas para ser concluída…… desmoronando completamente por causa de uma única ação num piscar de olhos……\nSó de olhar para isso, me dá uma catarse indescritível e eletrizante……\nHaa, haa……" 
2001802-101 = "[s] \"Acho que consigo entender o sentimento, mas……\"" 
2001802-102 = "Isso mesmo!\nO que eu busco é exatamente esse mesmo prazer de destruir os dominós!" 
2001802-103 = "O trabalho de um operador te faz encarar um monte de botões, não é?" 
2001802-104 = "E muitos deles só podem ser tocados em emergências extremas." 
2001802-105 = "Quando estou focada no trabalho, não ligo pra eles, mas……\nDe vez em quando, eu começo a imaginar o que aconteceria se eu apertasse um deles." 
2001802-106 = "Que tipo de caos iria se desenrolar se eu apenas apertasse esse botão……" 
2001802-107 = "Quando começo a pensar nisso, eu…… eu simplesmente não consigo parar……" 
2001802-108 = "Tudo virando uma bagunça completa…… sendo reduzido a pó……!\nE então a situação sairia totalmente de controle, né……" 
2001802-109 = "Só de imaginar isso, eu……!" 
2001802-110 = "Haa…… haa, haa……" 
2001802-111 = "[s] \"S-Se acalme……!\"" 
2001802-113 = "[ns9] \"De qualquer forma…… muito obrigado por me ajudar hoje.\"\n[ns10] \"V-Você quer beber alguma coisa?\"" 
2001802-114 = "Valeu~ eu estava morrendo de sede mesmo." 
2001802-115 = "Valeu~ eu estava morrendo de sede mesmo." 
2001802-116 = "Se tiver uma bebida isotônica bem geladinha……" 
2001802-117 = "Ué?\nO que é isso, nunca vi antes……" 
2001802-118 = "……＜Oshiruko Divino Explosivo＞?" 
2001802-119 = "[s11] \"É uma sopa quente de feijão doce (Oshiruko).\"\n[s12] \"Acho que não seria uma boa num dia quente como hoje……\"" 
2001802-120 = "Tem razão…… se eu comer um oshiruko fervendo num dia quente desses, vou acabar tendo uma desidratação em vez de me hidratar." 
2001802-121 = "Tem razão…… se eu comer um oshiruko fervendo num dia quente desses, vou acabar tendo uma desidratação em vez de me hidratar." 
2001802-122 = "E escolher justamente o oshiruko no meio de tudo isso―― seria literalmente um ato de autodestruição, né." 
2001802-126 = "……Mas, em outras palavras, esse 'botão do Oshiruko' é uma escolha que leva à ruína." 
2001802-127 = "Apenas esticar o braço um pouquinho e apertar esse botão vai trazer consequências irreversíveis pra mim…… Haa, haa……!" 
2001802-128 = "[s] \"Espera, Moe! Não f――\"" 
2001802-133 = "Haa, haa……\nEu apertei mesmo……! " 
2001802-134 = "Essa lata pesada e pelando de quente……\nSe eu comer algo assim num dia desses…… Vai dar uma merda gigante, não vai?\nKuhihi……" 
2001802-135 = "[s] \"Não se force, eu compro outra coisa para você.\"" 
2001802-136 = "Não, eu vou beber!" 
2001802-137 = "Uma ruína que eu mesma escolhi com as minhas próprias mãos só tem valor se eu assumir a responsabilidade até o fim." 
2001802-138 = "Eu vou beber isso aqui e assumir as consequências!" 
2001802-142 = "……Ai, quente!" 
2001802-143 = "O oshiruko espesso descendo pela minha garganta…… Sinto como se o meu corpo fosse pegar fogo por dentro……" 
2001802-144 = "Nossa…… eu nem encostei a lata na boca direito e já tô suando bicas……" 
2001802-145 = "[s] \"Você tem certeza de que está bem……?\"" 
2001802-146 = "Tô ótima……" 
2001802-147 = "Na verdade, isso é muito bom!" 
2001802-148 = "Até agora eu só tinha mexido com botões que arruinavam os outros, então eu não sabia, mas…… o botão que me leva à própria ruína também é incrível……!" 
2001802-149 = "Fiquei suuuper excitada…… em vários sentidos……\nHaa, haa……♥" 
2001802-151 = "（……E então a Moe, mesmo sofrendo com o calor, tomou todo o oshiruko fervendo até a última gota.）" 