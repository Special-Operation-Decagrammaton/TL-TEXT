[translation]
2001802-1 = "Collateral Damage"
2001802-2 = "……なるほど。ジャマーを持ってるこそ泥がブラックマーケットに逃げ込んで追跡が難しい、と。"
2001802-3 = "この辺は道も入り組んでるし、防犯カメラに頼らなきゃいけない区画も多い。#nジャマーを持っている相手なら、なおさら追跡は難しいだろうね。"
2001802-4 = "こんな時は、電子防護機構が搭載されたSRTの遠赤外線追尾式ドローンを使うといいよ。私に助けを求めたのはいい判断だね。くひひ……。"
2001802-5 = "ところで先生、本当に私の助けを借りて大丈夫……？"
2001802-6 = "[s1] \"ど、どういう意味……？\"\n[s2] \"何か問題でもあるの？\""
2001802-7 = "いや……作戦準備も完璧だよ。すぐにドローンを展開して容疑者を追跡できる。"
2001802-8 = "いや……作戦準備も完璧だよ。すぐにドローンを展開して容疑者を追跡できる。"
2001802-9 = "ただ……許可が下りた状態で思う存分火器を使うの、いつぶりだろうと思って……全身がむずむずしちゃって……。"
2001802-10 = "[s] \"「思う存分に」なんて言ってないよ！？\""
2001802-11 = "大丈夫、大丈夫。細かいこと気にしない。"
2001802-12 = "……じゃあ、始めよっか？"
2001802-16 = "ハァ、ハァ……ここまで逃げたら、さすがについて来てないよな？"
2001802-17 = "少し高かったけど、ジャマーを買っておいてよかったぜ。"
2001802-18 = "これさえあれば防犯カメラにも映らないし、無人機だって私の存在に気づかない。誰にも見られる心配なく盗みに入れそうだな。"
2001802-19 = "このままいけばすぐに元金を回収でき――"
2001802-23 = "う、うわっ！何だ、このドローンは！？"
2001802-24 = "どうして私のジャマーが効かないんだ！"
2001802-28 = "あっ、いて！いててて！ひ、ひとまず逃げるぞ！"
2001802-32 = "くひひ……逃げても無駄だよ。#n地面にでも潜らない限り、私が操作するドローンからは逃れられない。"
2001802-33 = "でも、すぐ捕まっちゃうとつまらないから、もうちょっと頑張ってくれない～？"
2001802-34 = "[s3] \"あの…… モエ？\"\n[s4] \"あまり過激な事は……。\""
2001802-35 = "大丈夫、大丈夫。こう見えても一応、真剣に取り組んでるよ。"
2001802-36 = "大丈夫、大丈夫。こう見えても一応、真剣に取り組んでるよ。"
2001802-37 = "今のところはね……くひひ。"
2001802-38 = "[s] \"今のところは……！？\""
2001802-39 = "あ！あっちの方でまた信号を掴んだみたいだね。"
2001802-40 = "ちょっと待っててね先生。もう一回やってくるから。"
2001802-47 = "あっ、いてて！痛いってば！もうやめてってば！"
2001802-48 = "ううっ……もう耐えられない！降参！"
2001802-49 = "……え～？もう降参なの？"
2001802-50 = "いくら逃げても、ドローンに見つかるんじゃ耐えられねーよ！"
2001802-51 = "盗んだ物は全部返すから！もうやめてくれ！"
2001802-52 = "[s5] \"お疲れ様、モエ。\"\n[s6] \"もうドローンは撤収させて大丈夫だよ。\""
2001802-53 = "……。"
2001802-54 = "……。"
2001802-56 = "……まだミサイル撃ってもないのに？"
2001802-57 = "[s] \"……泥棒を捕まえるのにミサイルは必要ないよ。\""
2001802-59 = "[ns7] \"それに、そのあたりには引火しやすいものが多いから……。\" \n[ns8] \"爆発が起きたら困るよ。\""
2001802-60 = "……え～、今ミサイルを発射したら困るの？"
2001802-61 = "……え～、今ミサイルを発射したら困るの？"
2001802-62 = "……そっか。#n私が今、このボタンを押したら取り返しのつかない事になっちゃうのかぁ……。"
2001802-63 = "きっと、それには重大な責任が伴うんだろうね……。"
2001802-64 = "そして重大な責任には……とてつもない快楽が……！"
2001802-65 = "はぁ……はぁ、はぁ……。"
2001802-66 = "[s] \"モ、モエさん……？\""
2001802-67 = "……やっぱり我慢できない！！"
2001802-71 = "お、おい……ドローンが変な色に光ってるぞ……。"
2001802-72 = "ま、まさかあれミサイルじゃないよな？ここで発射しようとかしてないよな……？"
2001802-73 = "今ミサイルを発射したら、この一帯がめちゃくちゃになるかもしれないんだぞ！"
2001802-74 = "無責任に何もかもめちゃくちゃにしちゃうなんて……。"
2001802-75 = "もっと我慢できない！#n……はぁ、はぁ。"
2001802-79 = "待ってくれ！降参するって言っただろ！"
2001802-80 = "やめろぉぉぉおお！"
2001802-84 = "（……その後、気絶した泥棒は無事警察に引き渡せたが、#n　ミサイルによってめちゃくちゃになった街を掃除するのが大変だった）"
2001802-86 = "……。"
2001802-87 = "……なんでそんな目で見るの。"
2001802-88 = "[s] \"なんで、降参したのにミサイルを飛ばしたの……？\""
2001802-89 = "それは……。"
2001802-90 = "そこに、ボタンがあるから？"
2001802-91 = "[s] \"名言風に言われても……。\""
2001802-92 = "私だって……あの状況でミサイルを使わない方がよっぽど合理的で冷静な判断だってことくらい分かってる。"
2001802-93 = "でも理性とは別に……なんというか……#n絶対押しちゃいけないボタンが目の前にあると……。"
2001802-94 = "理性が麻痺して……我慢できなくなっちゃうの……#nはぁ、はぁ……。"
2001802-95 = "[s] \"難しいね……。\""
2001802-96 = "……先生さ、ドミノしたことある？"
2001802-97 = "倒れやすい四角い形のブロックを隙間なく並べていくヤツ。#nすごく集中力と忍耐が必要なんだよ。"
2001802-98 = "一度でもブロックを倒しちゃうと、これまで積み上げた努力がすべて水の泡になるかもしれないの。"
2001802-99 = "でも、それとは別に……精巧に並べられたドミノを見ると、壊したくなる時ってあるじゃない？"
2001802-100 = "時間をかけて完成した作品が……たった一瞬の行動ですべて崩れてしまうの……#nそれ眺めてると、何とも形容できない痺れるようなカタルシスが……#nはぁ、はぁ……。"
2001802-101 = "[s] \"分かる気もするけど……\""
2001802-102 = "そう！#n私が求めているのは、ドミノを壊すような快感なの！"
2001802-103 = "オペレーターの仕事ってさ、たくさんのボタンと向き合うことになるじゃん。"
2001802-104 = "中には非常事態にしか触っちゃいけないボタンも多い。"
2001802-105 = "仕事に集中しているときは気づかないけど……#nたまに、そのボタンを押した後のことを想像する時があるの。"
2001802-106 = "このボタンを押すと、一体どんなことが起きてしまうのか……。"
2001802-107 = "そう考え出すと、私……止まらなくなっちゃって……。"
2001802-108 = "すべてがめちゃくちゃに……粉々に砕けて……！#n収拾がつかない事態になっちゃうんだろうねぇ……。"
2001802-109 = "それを想像するだけで、私……！"
2001802-110 = "はぁ……はぁ、はぁ……。"
2001802-111 = "[s] \"お、落ち着いて……！\""
2001802-113 = "[ns9] \"とにかく……今日は手伝ってくれてありがとう。\"\n[ns10] \"な、何か飲み物いる？\""
2001802-114 = "ありがと～ちょうど喉が渇いてたの。"
2001802-115 = "ありがと～ちょうど喉が渇いてたの。"
2001802-116 = "キンキンに冷えたスポーツドリンクがあったら……。"
2001802-117 = "ってあれ？#nなにこれ、初めて見た……。"
2001802-118 = "……＜爆裂・神おしるこ＞？"
2001802-119 = "[s11] \"ホットのおしるこだね。\"\n[s12] \"今日みたいな暑い日にはちょっと……。\""
2001802-120 = "そうだね……こんな暑い日にアツアツのおしるこなんか食べたら、水分補給どころか脱水になっちゃうかもしれない。"
2001802-121 = "そうだね……こんな暑い日にアツアツのおしるこなんか食べたら、水分補給どころか脱水になっちゃうかもしれない。"
2001802-122 = "そんな中、わざわざおしるこを選ぶなんて――自滅行為だよね。"
2001802-126 = "……でも、言い換えたら、この「おしるこボタン」は破滅につながる選択肢。"
2001802-127 = "ちょーっと腕を伸ばして、このボタンを押すだけで取り返しのつかない結果を招くことができるって思ったら……はぁ、はぁ……！"
2001802-128 = "[s] \"ちょっと、モエ！待っーー\""
2001802-133 = "はぁ、はぁ……#n本当に押しちゃった……！ "
2001802-134 = "この熱くてどっしりした重み……#nこんな日にこんなもの食べたら……本当に大変なことになりそうだよね？#nくひひっ……。"
2001802-135 = "[s] \"新しいの買ってあげるから、無理しないでね。\""
2001802-136 = "いや、飲むよ！"
2001802-137 = "自分の手で選んだ破滅は、自分でキッチリ責任を取らないと意味がないの。"
2001802-138 = "これは私が責任を持って飲む！"
2001802-142 = "……あっ、熱っ！"
2001802-143 = "どろっとしたおしるこが喉を通って、身体から火が出ちゃいそう……。"
2001802-144 = "もう……今は缶を口に近づけるだけで汗が止まらないくらい……。"
2001802-145 = "[s] \"本当に大丈夫……？\""
2001802-146 = "大丈夫……"
2001802-147 = "むしろ、イイ！"
2001802-148 = "これまでは周りを破滅させるボタンにしか手を出さなくて気づかなかったけど……自分を破滅に導くボタンってのもなかなか……！"
2001802-149 = "すっごく興奮しちゃった……いろんな意味で……。#nはぁ、はぁ……♥"
2001802-151 = "（……そしてモエは、苦しみながらも熱いおしるこを全部飲み干した）"
