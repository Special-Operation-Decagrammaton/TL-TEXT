[translation]
1600906-1 = "A garota ninja quer brilhar"
1600906-2 = "Hyakkiyako - Parque Kamogamo"
1600906-3 = "（E assim, conforme prometido com Michiru, fui até o parque）"
1600906-4 = "[ns] \"Eu vim, mas...\""
1600906-5 = "Fufu... O Sensei talvez já imagine, mas o motivo de eu ter pedido para se reunirem aqui hoje não é outro senão este!"
1600906-6 = "O novo ninjutsu que criei..."
1600906-7 = "É para gravar um vídeo dele e postar no canal 'Crônicas Ninja da Michiru-chi'!"
1600906-8 = "[s] \"Acho que não imaginava...\""
1600906-9 = "Eh?"
1600906-10 = "Eu deixei várias pistas para que o Sensei pudesse perceber!"
1600906-11 = "[s] \"Pistas?\""
1600906-12 = "Sim, pistas. O Sensei também deve ter achado estranho como o assunto mudou do nada naquele Momotalk, não é?"
1600906-13 = "Mas tente se lembrar! Sobre o que eu estava falando naquela hora!"
1600906-14 = "[s] \"Bem, se não me engano, sobre mangás...\""
1600906-15 = "Isso mesmo! Como o Sensei sabe, o volume 19 de 'Kamaboko Toppuden' tem aquele episódio!"
1600906-16 = "A cena memorável em que o protagonista, após um treinamento sangrento, finalmente obtém seu próprio ninjutsu original!"
1600906-17 = "[s] \"É a primeira vez que ouço falar!\""
1600906-18 = "O-o quê!? Hmm, parece que o Sensei ainda está no meio do treinamento..."
1600906-19 = "Bem, de qualquer forma, ultimamente vídeos do tipo 'tentei fazer algo que aparece em tal lugar' estão bem populares, né?"
1600906-20 = "Por isso, pensei em gravar um vídeo de 'Tentei criar um ninjutsu original que poderia aparecer em Kamaboko Toppuden'!"
1600906-21 = "E o ninjutsu que vou gravar hoje é este!"
1600906-22 = "O nome dele é 'Conjunto de Fogos de Artifício Ninja Dança das Chamas'! Um item maravilhoso que brilha intensamente ao ser aceso!"
1600906-23 = "Com isso, vou mostrar ao Sensei um ninjutsu perfeito...!"
1600906-24 = "[s1] \"Parece que você forçou a barra com a palavra 'ninja'...\"\n[s2] \"Usar fogo não é um pouco perigoso? Tome cuidado, viu?\""
1600906-25 = "Ah, não se preocupe com detalhes! Além disso, já está tudo preparado, então não tem problema!"
1600906-26 = "Ah, não se preocupe com detalhes! Além disso, já está tudo preparado, então não tem problema!"
1600906-30 = "Eu até preparei um balde com água! E o roteiro do vídeo já está todo na minha cabeça!"
1600906-31 = "Então, Sensei. Grave bem, tá?"
1600906-32 = "Lá vai...!"
1600906-39 = "[wa:850]― Então[wa:1000] vou lhes mostrar!"
1600906-41 = "― O novo ninjutsu[wa:2000] estilo Michiru[wa:2000] que eu inventei!"
1600906-44 = "[wa:450]― \"Arte Ninja:[wa:900] Brilha-Brilha Fogo[wa:950]!\""
1600906-47 = "[wa:300]― Ahaha,[wa:900] Sensei![wa:1000] O que achou?"
1600906-49 = "― Não está incrível?"
1600906-52 = "― Minha pose legal,[wa:1450] ficou bem gravada?"
1600906-55 = "[wa:800]― Esse ar fantástico[wa:1100] digno de uma ninja...[wa:1600] Perfeito!"
1600906-57 = "[wa:100]― Como esperado de mim,[wa:1500] a presidente[wa:800] mais forte[wa:700] do Clube de Pesquisa Ninja!"
1600906-60 = "[wa:400]― Ah,[wa:800] é agora que a coisa fica séria,"
1600906-62 = "― Fique de olho!"
1600906-65 = "― Um, dois...[wa:800] e já!!"
1600906-69 = "Ahahahaha, não ficou legal!?"
1600906-70 = "Sim, ficou lindo e incrível! Isso vai viralizar!"
1600906-71 = "Ah, claro, vou colocar o nome do Sensei nos agradecimentos especiais!"
1600906-75 = "[ns] \"Ah, Michiru! A ponta do seu cachecol está...!\""
1600906-76 = "Hm...?"
1600906-77 = "Ai, ai, ai!? O que foi!? Está quente!?"
1600906-78 = "S-Sensei!? Água, me dá água! Use um ninjutsu de água rápido...!"
1600906-79 = "[ns] \"Desculpa, só tenho o balde!\""
1600906-83 = "Noaaaaaah!? Cof, cof..."
1600906-85 = "（Felizmente, não resultou em ferimentos）"
1600906-87 = "Waaah! Esquece o que eu disse! Vamos gravar de novo, só mais uma vez!"
1600906-88 = "Hã, não pode?"
1600906-89 = "Po-por que!?"
1600906-90 = "[s3] \"Porque é perigoso. E também, se continuar assim, você vai pegar um resfriado.\"\n[s4] \"Vamos deixar para outro dia, de uma forma segura.\""
1600906-91 = "Ugh..."
1600906-92 = "Ugh..."
1600906-93 = "Se, se esse é o motivo, não tenho como discutir..."
1600906-94 = "Ugh, é uma pena, mas...! É frustrante não conseguir, mas não tem jeito!"
1600906-95 = "Mas eu sou Chidori Michiru! A presidente do Clube de Pesquisa de Ninjutsu não desiste!"
1600906-96 = "Vou continuar criando conteúdos ninja cada vez mais incríveis..."
1600906-97 = "Vou fazer com que todo o Kivotos conheça os ninjas e vou ultrapassar a marca de cem inscritos no canal!!"
1600906-98 = "[s] \"Não sei se essa meta é alta ou baixa...\""
1600906-99 = "Tá tudo bem, tá tudo bem!"
1600906-100 = "De agora em diante, as gravações de vídeo... e as atividades do Clube de Pesquisa de Ninjutsu!"
1600906-101 = "Sensei-dono, você vai me ajudar, né!?"
1600906-102 = "[s] \"Com certeza.\""
1600906-103 = "Obrigada!!"
