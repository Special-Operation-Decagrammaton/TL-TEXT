[translation]
1600906-1 = "忍者少女は輝きたい"
1600906-2 = "百鬼夜行・カモガモ公園"
1600906-3 = "（そうしてミチルと約束（？）した通り、公園へと足を運んだ）"
1600906-4 = "[ns] \"とりあえず来てみたけど……。\""
1600906-5 = "ふふっ……先生殿も想像がついてるかもしれないけど、今日こうして集まってもらった理由は他でもない！"
1600906-6 = "私が新しく作り上げた、自作の忍術……"
1600906-7 = "その動画を撮って、「少女忍法帖ミチルっち」チャンネルにアップロードするため！"
1600906-8 = "[s] \"想像はできてなかったかな……。\""
1600906-9 = "えー？"
1600906-10 = "先生殿が気が付けるように、色々と伏線を張っておいたのに！"
1600906-11 = "[s] \"伏線？\""
1600906-12 = "そう、伏線。先生殿もあのモモトーク、不自然なくらい話題が変わったと思うでしょ？"
1600906-13 = "でも思い出してみて！あの時の私が、何の話をしていたのかを！"
1600906-14 = "[s] \"えっと、確か漫画の話を……。\""
1600906-15 = "そうそう！先生殿も知っての通り、『かまぼこ突風伝』19巻はあのエピソードがあるでしょ！"
1600906-16 = "主人公が血のにじむ修練を経て、初めて自分だけのオリジナル忍術を手に入れる名場面が！"
1600906-17 = "[s] \"初耳です！\""
1600906-18 = "な、なんだって！？うーん、先生殿もまだ修行の途中か……。"
1600906-19 = "まあとにかく、最近よく「○○に出てくる○○を作ってみた」とか、そういう「作ってみた」系の動画が人気あるでしょ？"
1600906-20 = "だから私もそんな感じで、「かまぼこ突風伝に出てきそうな自作忍術を作ってみた！」って動画を撮ってみようと思って！"
1600906-21 = "それで今日撮る忍術は、これ！"
1600906-22 = "その名も「火炎乱舞忍者花火セット」！一度火をつけるだけで、鮮やかに花火が輝く素敵な一品！"
1600906-23 = "これで先生殿に、完璧な忍術をお見せしよう……！"
1600906-24 = "[s1] \"「忍者」って言葉を無理やりくっつけた感じが……。\"\n[s2] \"火を使うの、ちょっと危なくない？気を付けてね？\""
1600906-25 = "もう、細かいことは気にしないの！それに準備もできてるから大丈夫！"
1600906-26 = "もう、細かいことは気にしないの！それに準備もできてるから大丈夫！"
1600906-30 = "こうしてバケツの水も用意してるし！動画の流れについても、もう頭の中にできあがってるから！"
1600906-31 = "それじゃあ先生殿。綺麗に撮ってよー？"
1600906-32 = "ではっ……！"
1600906-39 = "[wa:850]― では[wa:1000]お見せして進ぜよう！"
1600906-41 = "― 私が考案した、[wa:2000]新しいミチル流[wa:2000]忍術！"
1600906-44 = "[wa:450]― 「忍法・[wa:900]キラキラファイアー[wa:950]の術」！"
1600906-47 = "[wa:300]― あははっ、[wa:900]先生殿ー！[wa:1000]どうどう？"
1600906-49 = "― 良い感じじゃない？"
1600906-52 = "― 私のかっこいい姿、[wa:1450]綺麗に撮れてる？"
1600906-55 = "[wa:800]― この忍者らしい[wa:1100]ファンタスティックさ……[wa:1600]完璧！"
1600906-57 = "[wa:100]― やはり私こそ、[wa:1500]忍術研究部[wa:800]最強の[wa:700]部長！"
1600906-60 = "[wa:400]― あ、[wa:800]ここからがまた凄くなるんだよ、"
1600906-62 = "― ちゃんと見ててね！"
1600906-65 = "― せーー[wa:800]のぉっ！！"
1600906-69 = "あはははっ、カッコ良いでしょー！？"
1600906-70 = "うん、綺麗だし良い感じ！これはバズる！"
1600906-71 = "あ、もちろんスペシャルサンクスに、先生殿の名前も書いておくからね！"
1600906-75 = "[ns] \"あっ、ミチル！ストールの先が……！\""
1600906-76 = "ん……？"
1600906-77 = "あっっっつ！？なになに！？熱いんだけど！？"
1600906-78 = "せ、先生殿！？水、水ちょうだい！水系の忍術を早く……！"
1600906-79 = "[ns] \"ごめん、バケツしか無い！\""
1600906-83 = "のわぁぁぁぁぁっ！？けほっ、けほっ……。"
1600906-85 = "（幸い、怪我には繋がらなかったものの）"
1600906-87 = "うあーん！今のは無し！もう一回、もう一回撮ろう！"
1600906-88 = "えっ、ダメ？"
1600906-89 = "ど、どうして！？"
1600906-90 = "[s3] \"危険だから。あとそのままだと風邪引くから。\"\n[s4] \"また後日、安全な形でね。\""
1600906-91 = "うっ……。"
1600906-92 = "うっ……。"
1600906-93 = "そ、その理由なら何とも言えない……。"
1600906-94 = "うぅっ、勿体ない気持ちはあるけど……！ならないのはもどかしくて仕方ないけど！"
1600906-95 = "でも私は、[ruby=ちどり]千鳥[/ruby]ミチル！忍術研究部の部長は諦めない！"
1600906-96 = "これからもどんどん凄い忍者コンテンツを作って……。"
1600906-97 = "キヴォトス全域に忍者を知らしめて、チャンネル登録者数も三桁を突破してやるんだから！！"
1600906-98 = "[s] \"目標が高いのか、低いのか……。\""
1600906-99 = "良いの良いの！"
1600906-100 = "これからも、動画撮影……あと、忍術研究部の活動！"
1600906-101 = "先生殿、協力してくれるよね！？"
1600906-102 = "[s] \"もちろん。\""
1600906-103 = "ありがと！！"
