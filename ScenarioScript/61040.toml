[translation]
61040-1 = "Episódio 4; Aprendizado para quem?"
61040-2 = "[ns]\"Muito bem... Acho que consegui cuidar do resto dos preparativos.\""
61040-5 = "O número discado não se encontra disponível no momento.#nPor favor, deixe sua mensagem após o sinal sonoro♪"
61040-6 = "[s]\"Parece que seu repertório de piadas aumentou.\""
61040-7 = "Fufu. Fui descoberta."
61040-8 = "Mas, quando recebo uma ligação de um número desconhecido, responder assim às vezes é a \"resposta certa\"."
61040-9 = "Claro que o número do Sensei eu já tenho registrado."
61040-10 = "Bem, então, recomeçando. Olá, Sensei."
61040-11 = "[s]\"Olá. Afinal, cumprimentar é importante, não é?\""
61040-12 = "Sim, fico feliz que você se lembre disso."
61040-13 = "Se algo mudou? Hum... por enquanto, acho que não?"
61040-14 = "Como sempre, ainda preciso tomar cuidado com os olhares ao meu redor, mas..."
61040-15 = "Mesmo assim, estou me divertindo bastante.#nQuando tenho um tempo livre, saio para passear escondida."
61040-16 = "Então, sim. Nós estamos bem."
61040-17 = "E então, o que houve?"
61040-18 = "[s1]\"Vou perguntar algo estranho de repente...\"\n[s2]\"O que você acha de exames?\""
61040-21 = "Exames...?"
61040-22 = "Fufu. Uma pergunta bem a cara do \"Sensei\"."
61040-23 = "Tudo bem, não precisa se desculpar.#nNão estou sendo irônica."
61040-24 = "Exames... bem, é algo onde avaliam o que você aprendeu, certo?"
61040-25 = "Eu conheço o conceito, mas... por que a pergunta repentina?"
61040-26 = "[s3]\"Na verdade, tem mais uma coisa que eu queria perguntar...\"\n[s4]\"Se você pudesse fazer um exame, o que você faria?\""
61040-29 = "Hum..."
61040-30 = "Por exemplo, um exame para confirmar \"como as crianças são feitas\"?"
61040-31 = "Se fosse algo assim, parece interessante."
61040-32 = "[s]\"Não é esse tipo de coisa!\""
61040-33 = "Fufu, desculpe."
61040-34 = "Se eu pudesse fazer um exame, é?#nSinceramente... não sei bem."
61040-35 = "Nunca pensei nisso, nem tive essa experiência."
61040-36 = "Mas, como se eu fosse uma \"aluna comum\"..."
61040-37 = "Se eu pudesse aprender algo e ter o reconhecimento de que estudei de verdade..."
61040-38 = "...Sim."
61040-39 = "Talvez eu até gostasse. Não sei quanto às outras, teria que perguntar a elas."
61040-40 = "...Se o resultado for ruim, eu teria que fazer aulas de reforço?"
61040-41 = "Fufu. Nesse caso, o Sensei daria as aulas de reforço para mim?#nPensando bem, não acho que seria ruim."
61040-42 = "E então... por que a pressa?"
61040-43 = "[s]\"Encontrei uma aluna transferida de Arius em Trinity.\""
61040-44 = "Isso significa que..."
61040-48 = "...Entendi, faz sentido."
61040-49 = "[s]\"Ela estava preocupada com a Atsuko e as outras.\""
61040-54 = "Então foi isso."
61040-55 = "Hum..."
61040-56 = "Ei, Sensei?"
61040-57 = "Você não acha que esse tipo de conversa é melhor não ser por telefone?"
61040-58 = "[s5]\"Com certeza, você tem razão.\"\n[s6]\"Alguém pode estar grampeando a linha.\""
61040-61 = "Hum."
61040-62 = "Não é sobre \"riscos\" que estou falando."
61040-63 = "[s]\"...Então, o que você quer dizer?\""
61040-64 = "É algo mais simples."
61040-65 = "Assuntos importantes como este devem ser tratados --"
61040-66 = "Eu quero conversar olhando para o rosto do Sensei."
61040-67 = "……Se possível, junto com todas."
61040-68 = "[s7]\"……Entendo. Então, eu aviso depois sobre o local do encontro.\"\n[s8]\"Seremos 4 pessoas, incluindo eu?\""
61040-71 = "Não. Seremos 5."
61040-72 = "[s]\"5 pessoas……?\""
61040-76 = "[ns9]\"Entendi…… Compreendido.\"\n[ns10]\"Você tem o contato dela?\""
61040-79 = "Sim. Mas, desta vez, talvez seja melhor não ser por mim. #nEu acabaria causando preocupações desnecessárias."
61040-80 = "Não é que eu não consiga falar com a Sa-chan. #nHehe, a gente até se encontra de vez em quando, sabe?"
61040-81 = "Além disso…… sinto que a busca dela por si mesma está chegando ao fim."
61040-82 = "[s]\"Então vocês mantêm contato, né?\""
61040-83 = "Hehe."
61040-84 = "Mas sabe, quando eu falo da Sa-chan, a Misaki faz uma cara muito difícil."
61040-85 = "Embora a Misaki seja a que mais fala da Sa-chan também."
61040-86 = "Por isso, no fim das contas……"
61040-87 = "É melhor conversar sobre assuntos importantes com o Esquadrão Arius reunido."
61040-88 = "[s]\"Atsuko.\""
61040-89 = "Sim?"
61040-90 = "[s]\"Você aprendeu a pedir ajuda melhor.\""
61040-91 = "Isso…… é um elogio……?"
61040-92 = "Pedir ajuda aos outros não é algo ruim, né. É verdade……"
61040-93 = "Hehe, obrigada, Sensei."
61040-94 = "Fico feliz em ouvir isso, mas vou tentar não exagerar."
61040-95 = "Pessoas que não tentam fazer nada por conta própria acabam sendo detestadas."
61040-96 = "Mas…… só desta vez, você poderia cuidar do caso da Sa-chan para mim?"
61040-97 = "[s]\"Claro. Pode deixar comigo.\""
61040-98 = "Hehe, o Sensei nunca muda, né."
61040-99 = "……Obrigada, Sensei."
61040-100 = "É muito bom ter você aqui, Sensei."
61040-106 = "Eh…… hã?"
61040-107 = "O que é isso……"
61040-108 = "Um navio…… extremamente grande?"
61040-110 = "[ns]\"……É, né?\""
61040-111 = "Por que até o Sensei está reagindo assim!?"
61040-112 = "Ah! E-eu já vi isso em uma revista! #nIsso é um navio de cruzeiro…… não é?"
61040-113 = "Navio de cruzeiro?"
61040-114 = "Bem…… e-então……"
61040-115 = "É um navio super luxuoso, feito apenas para turismo……"
61040-116 = "Dentro dele tem restaurante, coisas que parecem um parque de diversões, fontes termais e até piscina……"
61040-117 = "E-enfim, parece ser um navio dos sonhos onde você pode fazer de tudo……"
61040-118 = "Por isso…… dizem que só o preço do ingresso já é assustadoramente caro…… #nmesmo assim……"
61040-122 = "Tem uma piscina dentro do navio? #nTer água em cima da água…… tem gente que pensa em coisas estranhas, né."
61040-123 = "Quer dizer, não, esquece isso."
61040-124 = "Sensei, explique logo."
61040-125 = "[s]\"Como foi um patrocinador que organizou, eu também não sei muito bem.\""
61040-129 = "[ns]\"Eu também só vim para o lugar onde me indicaram.\""
61040-130 = "U-um patrocinador……!?"
61040-131 = "Eu…… eu sei. #nPatrocinadores são pessoas más…… eu vi na revista……"
61040-135 = "N-nós…… vamos ser forçadas a participar de um jogo mortal…… #né isso, não é!?"
61040-136 = "Vamos ser obrigadas a lutar até sobrar apenas uma…… e os ricos vão assistir e se divertir……"
61040-137 = "Lutar contra as próprias companheiras…… não dá mais…… #nestamos perdidas…… buááááá!"
61040-138 = "Isso é verdade?"
61040-139 = "Acalme-se um pouco. O Sensei jamais faria algo assim. #nAlém disso, se algo assim acontecesse, acho que o Sensei seria o primeiro a ser eliminado, não acha?"
61040-140 = "O que você disse...? Então era isso!?"
61040-147 = "...!?"
61040-149 = "...!?"
61040-150 = "Sa, Saori-nee-san!?"
61040-152 = "..."
61040-153 = "Fufu."
61040-154 = "Não me diga que o patrocinador era a líder!?"
61040-155 = "Patrocinador? Do que você está falando? #nEu também apenas..."
61040-156 = "Não, pensando bem, isso é impossível."
61040-157 = "...A líder não teria dinheiro para isso."
61040-158 = "Não está errado, mas... #nDói ouvir isso assim..."
61040-159 = "De qualquer forma, já que você voltou, vou devolver o cargo de líder."
61040-160 = "Espere, eu ainda nem entendi a situação..."
61040-162 = "Uwaaaan~! Saori-nee-san~! #nNós queremos ficar juntas até o fim!"
61040-164 = "— A propósito, Sensei. #nVocê tem algo para nos contar, não tem?"
61040-165 = "Eu também só ouvi por cima, quero que nos explique o conteúdo."
61040-166 = "[s]\"É uma longa história, mas...\""
61040-168 = "Entendo... um \"exame\", é?"
61040-169 = "..."
61040-170 = "E então, o que você quer que a gente faça, Sensei?"
61040-171 = "...Não, não quero respostas vagas sobre respeitar nossas opiniões."
61040-172 = "Conversar honestamente é o caminho mais rápido, não é?"
61040-173 = "[ns]\"É verdade. Sendo assim...\""
61040-175 = "[ns]\"Eu quero que todas vocês experimentem o \"exame\".\""
61040-178 = "..."
61040-179 = "..."
61040-181 = "E-eh...? #nP-por que todas vocês... não dizem nada...?"
61040-182 = "Estávamos pensando por onde começar. Bem... primeiro..."
61040-183 = "Por que você está falando de um \"exame\"? #nQuero saber o motivo."
61040-184 = "Hã? Porque você quer que a gente experimente a \"vida escolar\"... o que isso significa? #nNós vamos ter uma vida escolar?"
61040-185 = "Não só nós... mas também as que ficaram em Arius...?"
61040-186 = "Sensei, o que isso significa...?"
61040-188 = "(Contei o que ouvi das alunas que se transferiram para Trinity)"
61040-190 = "..."
61040-191 = "As alunas que se transferiram certamente não tiveram apenas momentos felizes."
61040-192 = "Não importa o quão gentis as pessoas ao redor sejam, deve haver momentos em que elas sentem que não conseguem acompanhar."
61040-193 = "Inconscientemente temer os outros ou não se adaptar aos costumes da sociedade."
61040-194 = "[s11]\"...De fato, senti que esse clima existia.\" \n[s12]\"Você entende bem, não é?\""
61040-197 = "...Não é como se fosse um problema alheio."
61040-198 = "Sensei, pode me ouvir um instante?"
61040-199 = "Dizem muito que \"o dever do aluno é estudar\", mas..."
61040-200 = "Por que, afinal, precisamos estudar?"
61040-201 = "...Embora o conteúdo fosse diferente, em Arius também tínhamos \"estudos\" e \"exames\"."
61040-202 = "Como, por exemplo, aprender a destruir halos com mais eficiência..."
61040-203 = "Ou como controlar nossas emoções para sentir intenção assassina."
61040-204 = "H-hiii..."
61040-205 = "E-eu não quero... mais nada disso..."
61040-206 = "Sim, eu entendo. Todas vocês se sentem da mesma forma."
61040-207 = "……Diga-me, Sensei. #nPor que precisamos estudar?"
61040-208 = "O que acontece se eu tirar boas notas nos exames?"
61040-209 = "Se eu for boa nos estudos, vou conseguir ganhar mais dinheiro e ter uma vida estável?"
61040-210 = "Mas, pelo menos para nós, acho que essa não é a resposta certa."
61040-211 = "……Você sabia?"
61040-212 = "Se for só para ganhar dinheiro…… o que aprendemos em Arius também tem formas de ser aplicado."
61040-213 = "[s]\"Isso é…… como?\""
61040-215 = "E-er…… bem……."
61040-216 = "U-um pedido para eliminar alguém…… ou algo assim……."
61040-217 = "E-eu não sei como souberam disso…… mas…… às vezes, chegam pedidos para nós também……."
61040-218 = "M-mas é claro! Nós recusamos todos eles, viu?"
61040-219 = "Dizer \"destruir o halo\" é uma expressão abstrata para nós."
61040-220 = "Por isso, não usávamos muito isso em Arius."
61040-221 = "Se usássemos…… seria ao conversar \"lá fora\"."
61040-222 = "Ao conversar com as pessoas de \"fora\"."
61040-223 = "Ou então…… talvez quando estávamos provocando alguém entre nós."
61040-225 = "……É verdade."
61040-226 = "Em Arius, usávamos palavras muito mais simples."
61040-230 = "――\"Apagar\"."
61040-231 = "Descobri depois que saí de Arius que é uma palavra bastante usada \"lá fora\" também, mas……."
61040-232 = "Mas…… o jeito de usar era um pouco diferente."
61040-233 = "S-sim, é isso…… #nAs pessoas de \"fora\"…… usam como brincadeira, não é……? Afinal, elas nunca…… apagam ninguém de verdade."
61040-234 = "Mas nós usávamos com o sentido literal da palavra."
61040-235 = "……Acho que a Arius de antigamente era o lugar mais próximo da \"morte\" em Kivotos."
61040-236 = "Acabei me desviando um pouco do assunto, mas…… #npor isso, se for só para ganhar dinheiro, nós damos um jeito."
61040-237 = "Por isso…… Sensei. Me diga."
61040-238 = "Por que precisamos estudar?"
61040-240 = "[ns]\"É porque...\""
61040-243 = "[ns]\"É para aprender como lutar contra o mundo.\""
61040-245 = "……H-hein?"
61040-246 = "……Eu nunca tinha pensado nisso."
61040-247 = "Pode me explicar melhor?"
61040-248 = "[s13]\"Estudar é o ato de conhecer o que você ainda não sabe.\"\n[s14]\"E o 'próprio mundo' também está incluído no que você não sabe.\""
61040-254 = "Isso significa, por exemplo…… que se eu não conhecer o conceito de um contrato, #nserá mais provável que me usem para benefício próprio?"
61040-255 = "E, inversamente, se eu estudar sobre contratos, posso minimizar os riscos……."
61040-256 = "……Entendo. Certamente, se for assim, eu consigo compreender."
61040-257 = "Então é isso que significa \"aprender a lutar contra o mundo através dos estudos\"."
61040-258 = "Como o mundo foi criado e como ele funciona."
61040-259 = "Saber que existem pessoas com pensamentos diferentes dos meus e entender o que nos diferencia."
61040-260 = "E, a partir disso, conseguir chegar a um entendimento mútuo e encontrar um ponto em comum…… #nÉ algo assim?"
61040-261 = "Quanto mais eu \"conheço o mundo\", mais consigo evitar os perigos que surgem……."
61040-262 = "Ou seja, é um meio de autodefesa chamado conhecimento."
61040-263 = "Se for assim…… talvez eu consiga aceitar um pouco."
61040-264 = "Só um pouco, mas……."
61040-265 = "……Ah."
61040-267 = "É-é verdade…… o mundo é cheio de coisas dolorosas e difíceis……."
61040-268 = "As garotas que ficaram em Arius também…… #nacho que precisam aprender a como lutar……."
61040-269 = "[ns15]\"Fico feliz. Eu sabia que você entenderia…….\"\n[ns16]\"Na verdade, eu trouxe mais uma pessoa comigo.\""
61040-272 = "Hã?"
61040-273 = "Espere um pouco…… será que essa aluna é a patrocinadora desta vez?"
61040-277 = "Era isso, então. Entendido."
61040-278 = "É, bem... o, o que você quer dizer com isso...?"
61040-279 = "Você poderia ter me avisado antes sobre esse tipo de coisa..."
61040-280 = "Não, esquece. Haa..."
61040-281 = "Então, quem é você?"
61040-282 = "Olá, membros do Esquadrão Arius."
61040-293 = "Hoje, estou atuando como patrocinadora deste encontro. Sou Kirifuji Nagisa, anfitriã do Chá das Partes."
61040-294 = "O quê...!?"
61040-298 = "...Entendo."
61040-300 = "Próximo episódio; Desculpas"
