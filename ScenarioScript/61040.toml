[translation]
61040-1 = "Episódio 4; O Aprendizado de Quem"
61040-2 = "[ns]\"Beleza... acho que já resolvi o resto dos preparativos.\""
61040-5 = "O número que você ligou não existe ou não está disponível.#nPor favor, deixe sua mensagem após o bipe♪"
61040-6 = "[s]\"Parece que o seu repertório de piadas aumentou.\""
61040-7 = "Hehe. Você me pegou."
61040-8 = "Mas, quando recebemos ligações de números desconhecidos, responder assim às vezes é a \"resposta certa\"."
61040-9 = "Claro, eu tenho o número do Sensei salvo, no entanto."
61040-10 = "Então, começando de novo. Olá, Sensei."
61040-11 = "[s]\"Olá. Como eu sempre digo, cumprimentos são importantes.\""
61040-12 = "Sim, fico feliz que você se lembre."
61040-13 = "Você quer saber se tem algo de novo? Hmm... acho que não por enquanto?"
61040-14 = "Como sempre, temos que tomar cuidado com quem está nos observando, mas..."
61040-15 = "Mas é até divertido.#nQuando temos um tempinho livre, a gente sai pra brincar escondido."
61040-16 = "Então, sim. Nós estamos bem."
61040-17 = "Então, o que foi?"
61040-18 = "[s1]\"Vou te perguntar uma coisa meio estranha de repente, mas...\"\n[s2]\"O que você acha de exames?\""
61040-21 = "Exames...?"
61040-22 = "Hehe. Essa é uma pergunta bem a cara do \"Sensei\"."
61040-23 = "Tudo bem, não precisa se desculpar.#nNão estou sendo sarcástica."
61040-24 = "Exames... hum, é onde avaliam o que você aprendeu, não é?"
61040-25 = "Eu conheço o conceito... mas por que a pergunta do nada?"
61040-26 = "[s3]\"Na verdade, eu tinha mais uma coisa para perguntar...\"\n[s4]\"Se você pudesse fazer um exame, o que você faria?\""
61040-29 = "Hmmm..."
61040-30 = "Por exemplo, um exame para verificar \"de onde vêm os bebês\"?"
61040-31 = "Se for algo assim, parece divertido."
61040-32 = "[s]\"Não é nada desse tipo!\""
61040-33 = "Hehe, desculpa."
61040-34 = "Se pudéssemos fazer exames, hein.#nSendo sincera... não tenho muita certeza."
61040-35 = "Nunca pensei nisso, nem cheguei a experimentar."
61040-36 = "Mas, se fosse como uma \"aluna normal\"..."
61040-37 = "Se eu pudesse aprender algo, e ter o reconhecimento de que estudei aquilo direitinho..."
61040-38 = "...Sim."
61040-39 = "Acho que eu ficaria um pouco animada. Para as outras, só perguntando para saber."
61040-40 = "...Se as notas forem ruins, a gente pega recuperação?"
61040-41 = "Hehe. Se isso acontecer, o Sensei daria aulas de recuperação pra gente?#nIncluindo isso, acho que não é uma má ideia."
61040-42 = "Mas... por que essa conversa de repente?"
61040-43 = "[s]\"Eu encontrei algumas alunas transferidas de Arius lá em Trinity.\""
61040-44 = "Isso quer dizer..."
61040-48 = "...Entendi, então é isso."
61040-49 = "[s]\"Elas estavam preocupadas com você e as outras, Atsuko.\""
61040-54 = "Sério?"
61040-55 = "Hmmm..."
61040-56 = "Ei, Sensei?"
61040-57 = "Não acha que é melhor não falarmos sobre isso pelo telefone?"
61040-58 = "[s5]\"Verdade, você tem razão.\"\n[s6]\"Alguém pode estar interceptando a ligação.\""
61040-61 = "Hmm."
61040-62 = "Eu não estava falando sobre os \"riscos\", na verdade."
61040-63 = "[s]\"...E o que quis dizer, então?\""
61040-64 = "É algo bem mais simples."
61040-65 = "Esse tipo de assunto importante..."
61040-66 = "Eu queria conversar olhando pro seu rosto, Sensei."
61040-67 = "...De preferência, com todas juntas."
61040-68 = "[s7]\"...Tem razão. Depois eu entro em contato para marcarmos um lugar.\"\n[s8]\"Seriam 4 pessoas, contando comigo?\""
61040-71 = "Não. Seremos 5."
61040-72 = "[s]\"5...?\""
61040-76 = "[ns9]\"Ah... entendi.\"\n[ns10]\"Você tem o contato dela?\""
61040-79 = "Tenho. Mas talvez seja melhor que o convite não venha de mim desta vez.#nPode ser que isso só a deixe preocupada à toa."
61040-80 = "A Sa-chan, não é como se tivéssemos perdido o contato com ela.#nHehe, a gente até se encontra de vez em quando, sabia?"
61040-81 = "Além disso... eu sinto que a jornada dela para se encontrar está quase chegando ao fim."
61040-82 = "[s]\"Então vocês mantêm contato.\""
61040-83 = "Hehe."
61040-84 = "Mas sabe, a Misaki sempre faz uma cara de quem mordeu limão quando falamos da Sa-chan."
61040-85 = "Mesmo que a Misaki seja a que mais fala dela."
61040-86 = "Por isso, no fim das contas..."
61040-87 = "Quando formos falar de algo importante, é melhor estarmos [ruby=todas juntas]Esquadrão Arius[/ruby]."
61040-88 = "[s]\"Atsuko.\""
61040-89 = "Hum?"
61040-90 = "[s]\"Você está bem melhor em pedir ajuda agora.\""
61040-91 = "Isso... é um elogio...?"
61040-92 = "Depender dos outros não é algo ruim, né. É verdade..."
61040-93 = "Hehe, obrigada, Sensei."
61040-94 = "Fico feliz em ouvir isso, mas vou tentar não exagerar."
61040-95 = "Porque as pessoas não gostam de quem não tenta fazer nada por conta própria."
61040-96 = "Mas... só dessa vez, posso pedir pra você lidar com a questão da Sa-chan?"
61040-97 = "[s]\"Claro. Pode deixar comigo.\"  "
61040-98 = "Hehe, você nunca muda, Sensei."
61040-99 = "...Obrigada, Sensei."
61040-100 = "Fico muito feliz que você esteja aqui."
61040-106 = "Eh... eeh?"
61040-107 = "O que é isso..."
61040-108 = "Um navio... gigante?"
61040-110 = "[ns]\"...É o que parece, né?\""
61040-111 = "Por que você também tá reagindo assim, Sensei!?"
61040-112 = "Ah! E-Eu vi isso numa revista uma vez!#nIsso é um navio de cruzeiro... não é?"
61040-113 = "Navio de cruzeiro?"
61040-114 = "Um, é-é que..."
61040-115 = "É um navio superluxuoso feito só para fazer turismo..."
61040-116 = "Lá dentro tem restaurantes, coisas tipo um parque de diversões, termas e até piscina..."
61040-117 = "E-Enfim, dizem que é um navio dos sonhos onde você pode fazer de tudo..."
61040-118 = "Por isso... dizem que só a passagem pra entrar já é absurdamente cara...#nE mesmo assim..."
61040-122 = "Tem uma piscina dentro do navio?#nÁgua em cima da água... Tem gente com umas ideias bem estranhas por aí."
61040-123 = "Quer dizer, não, esquece isso."
61040-124 = "Sensei, explica isso logo."
61040-125 = "[s]\"Uma patrocinadora arranjou isso tudo, então eu também não sei dos detalhes.\""
61040-129 = "[ns]\"Eu só vim para o local que me mandaram também.\""
61040-130 = "P-Patrocinadora...!?"
61040-131 = "Eu... eu sei disso.#nUma patrocinadora é uma pessoa do mal... eu vi isso numa revista..."
61040-135 = "N-Nós vamos... ser forçadas a participar de um Jogo da Morte agora, não é...#nÉ isso que vai acontecer!?"
61040-136 = "Vão forçar a gente a lutar até sobrar só uma... e os ricos vão assistir e se divertir com isso..."
61040-137 = "Ter que lutar contra minhas companheiras... não dá mais...#nÉ o fim... Uwaaaaahh!"
61040-138 = "Sério que isso vai acontecer?"
61040-139 = "Se acalma. O Sensei nunca faria isso.#nAlém do mais, se fosse para rolar algo do tipo, acho que o Sensei seria a primeira pessoa a ser eliminada."
61040-140 = "O que disse...? Então é assim que ia ser!?"
61040-147 = "...!?"
61040-149 = "...!?"
61040-150 = "I-Irmãzona Saori!?"
61040-152 = "..."
61040-153 = "Hehe."
61040-154 = "Não me diga que a patrocinadora era você, líder!?"
61040-155 = "Patrocinadora? Do que estão falando?#nEu também só—"
61040-156 = "Não, pensando bem, isso seria impossível."
61040-157 = "...Nossa líder nunca teria tanto dinheiro assim."
61040-158 = "Vocês não estão erradas, mas...#nouvir vocês falando isso me machuca um pouco..."
61040-159 = "Mudando de assunto, já que você voltou, estou devolvendo o cargo de líder."
61040-160 = "Esperem, eu ainda não entendi a situa—"
61040-162 = "Waaaaaah~! Saori-neesan~!#nEu quero ficar com a gente até os meus últimos momentos~!"
61040-164 = "—A propósito, Sensei.#nVocê tinha algo pra conversar com a gente, não é?"
61040-165 = "Eu também só ouvi os detalhes por cima, queria que explicasse tudo pra nós."
61040-166 = "[s]\"É uma longa história, mas—\""
61040-168 = "Entendi... \"Exames\"."
61040-169 = "..."
61040-170 = "E o que você quer que a gente faça, Sensei?"
61040-171 = "...Não, não venha com essa conversa ambígua de \"respeitar nossa opinião\" e coisas do tipo."
61040-172 = "Ser direto e sincero é o jeito mais rápido, não acha?"
61040-173 = "[ns]\"Tem razão. Sendo assim...\""
61040-175 = "[ns]\"Eu quero que vocês também experimentem fazer 'exames'.\""
61040-178 = "..."
61040-179 = "..."
61040-181 = "E-Eh...?#nP-Por que tá todo mundo... quieto...?"
61040-182 = "Eu estava pensando no que perguntar primeiro. Deixe-me ver... para começar—"
61040-183 = "Por que estamos falando de \"exames\"?#nQuero que nos diga o motivo."
61040-184 = "Hã? \"Porque quero que vocês experienciem uma vida escolar...\" Como assim?#nVocê tá dizendo que *nós* vamos ter uma vida escolar?"
61040-185 = "E não seríamos só nós... mas também as alunas que ficaram em Arius...?"
61040-186 = "O que isso significa, Sensei...?"
61040-188 = "（Repassei para elas o que ouvi das meninas que se transferiram para Trinity.）"
61040-190 = "..."
61040-191 = "Para as alunas transferidas, aposto que também não tem sido apenas diversão."
61040-192 = "Por mais que todos ao redor as tratem bem, deve ser difícil para elas conseguirem se adaptar à nova realidade."
61040-193 = "Sentir medo das outras pessoas inconscientemente, não conseguir se enturmar com o modo como o mundo funciona..."
61040-194 = "[s11]\"...É, eu senti um pouco dessa atmosfera quando falei com elas.\"\n[s12]\"Você entende bem a situação.\""
61040-197 = "...Não é como se fosse problema dos outros para nós."
61040-198 = "Sensei, um minuto?"
61040-199 = "A gente sempre ouve que \"o dever do aluno é estudar\", mas..."
61040-200 = "Pra início de conversa, por que a gente tem que estudar?"
61040-201 = "...Mesmo que o conteúdo fosse diferente, a gente tinha \"estudos\" e \"provas\" lá em Arius."
61040-202 = "Do tipo... como destruir um halo da melhor forma, ou..."
61040-203 = "Como controlar suas emoções e ter intenção assassina."
61040-204 = "E-Eek..."
61040-205 = "E-Eu não quero mais... esse tipo de coisa..."
61040-206 = "Sim, eu sei. Todas nós sentimos o mesmo."
61040-207 = "...Diz pra gente, Sensei.#nPor que nós temos que estudar?"
61040-208 = "Se a gente tirar notas boas no exame, o que vai acontecer?"
61040-209 = "Se formos boas nos estudos, vamos poder ganhar mais dinheiro e viver uma vida estável?"
61040-210 = "Mas, pelo menos pra gente, acho que não existe uma resposta certa pra isso."
61040-211 = "...Você sabia?"
61040-212 = "Se for só pra ganhar dinheiro... daria pra aproveitar as coisas que aprendemos em Arius."
61040-213 = "[s]\"Como... exatamente?\""
61040-215 = "A-Ah... b-bom..."
61040-216 = "M-Missões pedindo para alguém [ruby=a   p   a   g   u   e]apague[/ruby] a pessoa... por exemplo..."
61040-217 = "E-Eu não sei de onde descobriram, mas...#nÀs vezes, uns pedidos desses chegam até nós..."
61040-218 = "C-Claro! A gente recusa todos eles, viu?"
61040-219 = "\"Destruir um halo\" é uma expressão bem abstrata para nós."
61040-220 = "Por isso não usávamos tanto em Arius."
61040-221 = "Se fôssemos usar essa frase... seria ao falar com quem é \"de fora\"."
61040-222 = "Para falar com pessoas \"de fora\"."
61040-223 = "Ou então... quando queríamos provocar alguém de dentro do grupo."
61040-225 = "...Isso."
61040-226 = "Em Arius, usávamos uma palavra mais simples."
61040-230 = "—Nós usávamos \"apagar\"."
61040-231 = "Eu só fui descobrir que o pessoal \"de fora\" também usava bastante essa palavra depois que saí de Arius..."
61040-232 = "Mas... a forma que usam é um pouco diferente."
61040-233 = "É-É verdade...#nO pessoal \"de fora\"... usa essa palavra de brincadeira... Até porque, eles nunca vão... realmente apagar ninguém."
61040-234 = "Mas nós usávamos essa palavra em seu sentido literal."
61040-235 = "...Eu acho que, no passado, Arius era o lugar de Kivotos mais próximo da \"morte\"."
61040-236 = "Acabei me desviando um pouco do assunto, mas...#nComo eu disse, se fosse só pra ganhar dinheiro, nós daríamos um jeito com o que já sabemos."
61040-237 = "Então... Sensei. Conta pra gente."
61040-238 = "Por que nós temos que estudar?"
61040-240 = "[ns]\"O motivo é...\""
61040-243 = "[ns]\"Para saberem como lutar contra o mundo.\""
61040-245 = "...Hã?"
61040-246 = "...Pode ser que eu nunca tenha pensado por esse lado."
61040-247 = "Pode nos explicar isso com mais detalhes?"
61040-248 = "[s13]\"Estudar é a ação de descobrir coisas que você não conhecia antes.\"\n[s14]\"E, entre as coisas que não conhecem, está o 'próprio mundo'.\""
61040-254 = "O que quer dizer que... por exemplo... se não entendermos o conceito de um contrato,#nhaverá grandes chances de sermos exploradas, é isso?"
61040-255 = "E, se estudarmos sobre contratos, conseguiremos minimizar os riscos..."
61040-256 = "...Entendo. Faz bastante sentido."
61040-257 = "Então isso é o que você quis dizer com \"saber como lutar contra o mundo através dos estudos\"."
61040-258 = "Como o mundo foi criado e como ele funciona."
61040-259 = "Saber que há pessoas com formas de pensar diferentes das nossas e entender quais são as diferenças."
61040-260 = "E assim tentar encontrar um meio-termo e um ponto de entendimento entre as partes...#nÉ isso?"
61040-261 = "Quanto mais conhecemos do \"mundo\", mais somos capazes de evitar os perigos que nos aguardam..."
61040-262 = "Em outras palavras, o conhecimento seria uma forma de autodefesa."
61040-263 = "Dessa forma... acho que a gente consegue entender um pouco."
61040-264 = "Um pouco..."
61040-265 = "...Aah."
61040-267 = "S-Sim... Afinal, o mundo é um lugar repleto de dor e sofrimento..."
61040-268 = "Eu acho que saber como lutar...#né algo muito importante pra quem ficou em Arius..."
61040-269 = "[ns15]\"Que bom. Eu já imaginava que entenderiam...\"\n[ns16]\"Na verdade, eu trouxe mais uma pessoa comigo.\""
61040-272 = "Hã?"
61040-273 = "Espera aí... quer dizer que essa pessoa é a patrocinadora de hoje?"
61040-277 = "Ah, era isso então. Faz sentido."
61040-278 = "A-Ah... C-Como assim...?"
61040-279 = "Você deveria ter avisado a gente antes sobre isso..."
61040-280 = "Quer dizer, tanto faz. Aah..."
61040-281 = "Então, quem é?"
61040-282 = "Boa tarde, membros do Esquadrão Arius."
61040-293 = "Fico honrada em ser a patrocinadora da reunião de hoje.#nSou [ruby=Kirifuji]Kirifuji[/ruby] Nagisa, a anfitriã do Tea Party."
61040-294 = "O qu... !?"
61040-298 = "...Entendi."
61040-300 = "Próximo Episódio; Desculpas"