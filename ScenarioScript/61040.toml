[translation]
61040-1 = "第4話;誰がための学び"
61040-2 = "[ns]\"よし……他の準備はなんとかなったかな。\""
61040-5 = "おかけになった番号は、現在使われておりません。#nピーッという発信音の後にご用件をどうぞ♪"
61040-6 = "[s]\"冗談のレパートリーが増えたみたいだね。\""
61040-7 = "ふふっ。バレちゃった。"
61040-8 = "でも、知らない番号からかかってきた時には、今みたいに返すのが「正解」なこともあるんだよ。"
61040-9 = "もちろん、先生の番号は登録してるんだけどね。"
61040-10 = "それじゃあ、改めて。こんにちは、先生。"
61040-11 = "[s]\"こんにちは。やっぱり、挨拶は大事だよね。\""
61040-12 = "うん、覚えててくれて嬉しい。"
61040-13 = "変わりなかったかって？うーん……ひとまずは？"
61040-14 = "相変わらず、周りの目に気をつけないといけないけど……。"
61040-15 = "でも、それなりに楽しいよ。#n余裕ができた時は、こっそり遊びに行ったりしてるんだ。"
61040-16 = "だから、うん。私たちは大丈夫。"
61040-17 = "それで、どうしたの？"
61040-18 = "[s1]\"いきなり変なこと聞くんだけど……。\"\n[s2]\"試験って、どう思う？\""
61040-21 = "試験……？"
61040-22 = "ふふ。「先生」らしい質問だね。"
61040-23 = "いいの、謝らないで。#n皮肉とかじゃないよ。"
61040-24 = "試験……えっと、学んだことを評価されるもの、だよね？"
61040-25 = "概念としてなら知ってるけど……どうして急に？"
61040-26 = "[s3]\"実は、もう一個聞きたいことがあって……。\"\n[s4]\"もし試験を受けられるとしたら、どうしたい？\""
61040-29 = "うーん……。"
61040-30 = "例えば、「子どもはどうやってできるのか」について、確認する試験とか？"
61040-31 = "そういうのなら、面白そう。"
61040-32 = "[s]\"そういうのじゃないよ！\""
61040-33 = "ふふ、ごめんなさい。"
61040-34 = "試験を受けられるとしたら、か。#n正直……よく分からないかな。"
61040-35 = "考えたことも、経験したこともないから。"
61040-36 = "でも、まるで「普通の生徒」みたいに……。"
61040-37 = "何かを学んで、それをちゃんと勉強したって認めてもらえるなら……。"
61040-38 = "……うん。"
61040-39 = "私はちょっと楽しみかも。他のみんなは、聞いてみないと分からないけどね。"
61040-40 = "……結果が悪かったら補習になるの？"
61040-41 = "ふふっ。そしたら、先生が補習授業をしてくれるのかな？#nそれも含めて、悪くないと思うよ。"
61040-42 = "それで……急にどうしたの？"
61040-43 = "[s]\"トリニティで、アリウスからの編入生に会ったんだ。\""
61040-44 = "それって……。"
61040-48 = "……そっか、なるほどね。"
61040-49 = "[s]\"アツコたちのことを心配してたよ。\""
61040-54 = "そうだったんだ。"
61040-55 = "うーん……。"
61040-56 = "ねぇ、先生？"
61040-57 = "こういう話は、電話越しじゃないほうがいいと思わない？"
61040-58 = "[s5]\"たしかに、それはそうだね。\"\n[s6]\"誰かに盗聴されるかもしれないし。\""
61040-61 = "うーん。"
61040-62 = "私は「リスク」について話してるわけじゃないんだけどな。"
61040-63 = "[s]\"……じゃあ、どういう意味？\""
61040-64 = "もっと単純な話。"
61040-65 = "こういう大事なことは――"
61040-66 = "先生の顔を見ながら話したいんだ。"
61040-67 = "……できれば、みんなと一緒にね。"
61040-68 = "[s7]\"……そうだね。それじゃあ、落ち合う場所はまた連絡するね。\"\n[s8]\"私を含めて4人かな？\""
61040-71 = "ううん。5人だよ。"
61040-72 = "[s]\"5人……？\""
61040-76 = "[ns9]\"そっか……分かった。\"\n[ns10]\"連絡先は分かる？\""
61040-79 = "うん。でも、今回は私からじゃないほうがいいかも。#n余計な心配をかけちゃうから。"
61040-80 = "サッちゃん、連絡が取れないわけじゃないんだ。#nふふっ、たまに会ったりもしてるんだよ？"
61040-81 = "それに……自分探しは終わりそうなんじゃないかなって気もするんだ。"
61040-82 = "[s]\"ちゃんと連絡をとってるんだね。\""
61040-83 = "ふふっ。"
61040-84 = "でもね、サッちゃんの話をするとミサキがすごく難しい顔をするんだよ。"
61040-85 = "一番サッちゃんの話をしてるのも、ミサキなんだけどね。"
61040-86 = "だから、やっぱり……。"
61040-87 = "大事な話をするときは[ruby=みんな]アリウススクワッド[/ruby]一緒に、が良いんだ。"
61040-88 = "[s]\"アツコ。\""
61040-89 = "うん？"
61040-90 = "[s]\"頼り方が上手になったね。\""
61040-91 = "それは……褒められてるのかな……？"
61040-92 = "人を頼るのは悪いことじゃない、か。そうだね……。"
61040-93 = "ふふ、ありがとう、先生。"
61040-94 = "そう言ってもらえて嬉しいけど、ほどほどにするね。"
61040-95 = "自分で何もしようとしない人は、嫌われるものだから。"
61040-96 = "でも……今回だけ、サッちゃんの件お願いしてもいい？"
61040-97 = "[s]\"もちろん。任せておいて。\"  "
61040-98 = "ふふっ、先生はいつも変わらないね。"
61040-99 = "……ありがとう、先生。"
61040-100 = "先生がいてくれて、本当に良かった。"
61040-106 = "えっ……えぇ？"
61040-107 = "何、これ……。"
61040-108 = "ものすごく大きい……船？"
61040-110 = "[ns]\"……そう、だね？\""
61040-111 = "なんで先生までそんな反応なの！？"
61040-112 = "あっ！わ、私、雑誌で見たことあります！#nこれってクルーズ船……ですよね？"
61040-113 = "クルーズ船？"
61040-114 = "えっと……そ、その……。"
61040-115 = "観光のためだけに作られた、すっごく豪華な船で……。"
61040-116 = "中にはレストランとか、遊園地みたいなのとか、温泉や、プールまであって……。"
61040-117 = "と、とにかく何でもできちゃう夢の船らしくて……。"
61040-118 = "だから……チケット代だけでも、びっくりするくらい高いって……#n言われてるのに……。"
61040-122 = "船の中にプールがあるの？#n水の上に水があるって……変なこと考える人もいるんだね。"
61040-123 = "って、いや、そんなことより。"
61040-124 = "先生、早く説明して。"
61040-125 = "[s]\"スポンサーが手配してくれたから、私もよく知らないんだ。\""
61040-129 = "[ns]\"私も、案内された場所に来ただけなんだよね。\""
61040-130 = "す、スポンサー……！？"
61040-131 = "私……知ってます。#nスポンサーは悪い人だって……雑誌で見ました……。"
61040-135 = "わ、私たち……これからデスゲームをさせられるんですね……#nそうなんですよね！？"
61040-136 = "最後の一人になるまで戦わされて……お金持ちたちがそれを見て楽しむんです……。"
61040-137 = "仲間同士で戦うなんて……もうダメです……#nおしまいです……うわあぁぁぁあん！"
61040-138 = "それ、本当なの？"
61040-139 = "少し落ち着いて。先生がそんなことするはずないよ。#nそれに、もしもそんなことになったら、最初に脱落するのは先生だと思うよ？"
61040-140 = "なんだと……？そういうことだったのか！？"
61040-147 = "……！？"
61040-149 = "……！？"
61040-150 = "サ、サオリ姉さん！？"
61040-152 = "……。"
61040-153 = "ふふっ。"
61040-154 = "まさか、スポンサーってリーダーだったの！？"
61040-155 = "スポンサー？なんのことだ。#n私もただ――"
61040-156 = "いや、よく考えたらありえないか。"
61040-157 = "……リーダーにそんなお金あるわけないし。"
61040-158 = "間違いではないが……#nそう言われると辛いな……。"
61040-159 = "それはそれとして、戻ってきたならリーダーは返上するから。"
61040-160 = "待ってくれ、私もまだ状況が――"
61040-162 = "うわぁぁん～！サオリ姉さん～！#n私たち、最後の時まで一緒がいいです〜！"
61040-164 = "――ところで、先生。#n私たちに話があるんだよね？"
61040-165 = "私も簡単にしか聞いてないし、内容を教えてほしいな。"
61040-166 = "[s]\"話せば長くなるんだけど――\""
61040-168 = "そうか……「試験」か。"
61040-169 = "……。"
61040-170 = "それで、先生は私たちに何をさせたいの？"
61040-171 = "……いや、意見を尊重するとか、そういう曖昧な話じゃなくて。"
61040-172 = "素直に話し合うのが一番手っ取り早いでしょ。"
61040-173 = "[ns]\"そうだね。それなら……。\""
61040-175 = "[ns]\"みんなにも、「試験」を経験してほしいと思ってるよ。\""
61040-178 = "……。"
61040-179 = "……。"
61040-181 = "え、えぇ……？#nな、なんでみんな……何も言わないんですか……？"
61040-182 = "何から聞くべきか考えていたんだ。そうだな……まずは――"
61040-183 = "どうして「試験」の話をするのか。#nその理由を教えてほしい。"
61040-184 = "は？「学園生活」を経験してほしいから……って、どういうこと？#n私たちが学園生活をするの？"
61040-185 = "私たちだけじゃなくて……アリウスに残った子たちにも……？"
61040-186 = "先生、それはどういう意味だ……？"
61040-188 = "（トリニティに編入した子から聞いた話を伝えた）"
61040-190 = "……。"
61040-191 = "編入した生徒も、きっと楽しいばかりではなかったのだろう。"
61040-192 = "どんなに周りが優しくしてくれても、それに追いつかない自分がいるはずだ。"
61040-193 = "無意識に他者を恐れたり、世間のやり方に馴染めなかったり。"
61040-194 = "[s11]\"……たしかに、そういう雰囲気は感じたかな。\"\n[s12]\"よく分かってるんだね。\""
61040-197 = "……他人事ではないからな。"
61040-198 = "先生、ちょっといい？"
61040-199 = "「生徒の本分は学業」って、よく聞くけど……。"
61040-200 = "そもそも、どうして勉強しなきゃいけないの？"
61040-201 = "……内容が違うだけで、アリウスにも「勉強」とか「試験」はあった。"
61040-202 = "どうすればもっと上手にヘイローを壊せるか、とか……。"
61040-203 = "感情をコントロールして殺意を抱けるか、とかだったけど。"
61040-204 = "ひ、ひいぃ……。"
61040-205 = "も、もう、そういうのは……嫌です……。"
61040-206 = "うん、分かるよ。みんな、同じ気持ちだよ。"
61040-207 = "……教えて、先生。#nどうして勉強しないといけないの？"
61040-208 = "試験でいい成績を取ったら、どうなるの？"
61040-209 = "勉強ができたら、もっと稼げるようになって安定した生活を送れるようになるの？"
61040-210 = "でも、少なくとも私たちにとって、それは正解にはならないと思うんだ。"
61040-211 = "……知ってる？"
61040-212 = "お金を稼ぐだけなら……アリウスで教わったことも、活かし方があるんだよ。"
61040-213 = "[s]\"それは……どうやって？\""
61040-215 = "え、えっと……その……。"
61040-216 = "だ、誰かを[ruby=・   ・   ・]消して[/ruby]ほしいって依頼……とか……。"
61040-217 = "ど、どこで知ったのかは分かりませんけど……。#n私たちのところにも……たまに、届いたりして……。"
61040-218 = "も、もちろん！全部断ってますよ？"
61040-219 = "「ヘイローを破壊する」って、私たちにとっては抽象的な表現なんだよね。"
61040-220 = "だから、アリウスではあまり使わなかった。"
61040-221 = "使うとすれば……「外」で話をするとき。"
61040-222 = "「外」の人たちと話すとき。"
61040-223 = "あとは……私たちの間で誰かをからかうとき、ぐらいかな。"
61040-225 = "……そうだね。"
61040-226 = "アリウスだと、もっと単純な言葉で表現してたの。"
61040-230 = "――「消す」って。"
61040-231 = "「外」でも結構使う言葉なんだ、ってアリウスを出てから知ったんだけど……。"
61040-232 = "でも……使い方は、ちょっと違ってた。"
61040-233 = "そ、そうです……。#n「外」の人たちは……冗談で使うんですよね……。だって、本当に消すことなんて……ないですから。"
61040-234 = "だけど私たちは、言葉通りの意味で使ってた。"
61040-235 = "……かつてのアリウスは、キヴォトスの中で一番「死」に近い場所だったんだと思う。"
61040-236 = "少し話がそれちゃったけど……#nだから、私たちはお金を稼ぐだけならどうとでもなるんだよ。"
61040-237 = "だから……先生。教えて。"
61040-238 = "どうして、勉強しないといけないの？"
61040-240 = "[ns]\"それはね。\""
61040-243 = "[ns]\"世界と戦う方法を知るためだよ。\""
61040-245 = "……は、はい？"
61040-246 = "……それは、考えたことなかったかも。"
61040-247 = "詳しく教えてくれる？"
61040-248 = "[s13]\"勉強は、自分の知らないことを知っていく行為なんだ。\"\n[s14]\"知らないことには、「世界そのもの」だって含まれる。\""
61040-254 = "それは例えば……契約書という概念を知らなければ、#nいいように利用される可能性が高くなる、ということか？"
61040-255 = "逆に、契約書について勉強していればリスクを最小限にできる……。"
61040-256 = "……なるほど。たしかにそれならば理解できる。"
61040-257 = "これが「勉強を通して、世界と戦う方法を知る」ということか。"
61040-258 = "世界はどんな風に作られて、どうやって成り立ってるのか。"
61040-259 = "自分と違う考えを持つ人がいることを知って、何が違うのかを知って。"
61040-260 = "その上で、ある程度理解し合って、着地点を見つけられるようになる……#nそんな感じ？"
61040-261 = "「世界を知る」ほど、降りかかる危険を回避できるようになる……と。"
61040-262 = "つまり、知識という名の自己防衛手段、ということだな。"
61040-263 = "それなら……少しは納得できる、かも。"
61040-264 = "少し、だけど……。"
61040-265 = "……はあ。"
61040-267 = "そ、そうですよね……世界は、辛く苦しいことばかりですし……。"
61040-268 = "アリウスに残ってる子たちも……#n戦う方法を知る、というのは必要なんだと思います……。"
61040-269 = "[ns15]\"よかった。分かってくれると思ってたから……。\"\n[ns16]\"実はもう一人、連れてきてるんだ。\""
61040-272 = "え？"
61040-273 = "待ってくれ……もしかしてその生徒が、今回のスポンサーなのか？"
61040-277 = "そういうことだったんだ。納得。"
61040-278 = "え、ええと……ど、どういうことですか……？"
61040-279 = "そういうのは、先に一言あってもよかったんじゃ……。"
61040-280 = "いや、もういいや。はぁ……。"
61040-281 = "それで、誰なの？"
61040-282 = "こんにちは、アリウススクワッドの皆さん。"
61040-293 = "本日、この集まりのスポンサーをさせていただいております。#nティーパーティーのホスト、[ruby=きりふじ]桐藤[/ruby]ナギサと申します。"
61040-294 = "なっ……！？"
61040-298 = "……なるほどね。"
61040-300 = "次回;謝罪"
