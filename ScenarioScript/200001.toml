200001-9 = "……."
200001-10 = "…………."
200001-11 = "……Acabou."
200001-12 = "Tudo chegou ao fim."
200001-13 = "A autoridade ruiu, a ordem foi perdida――"
200001-14 = "A ilusão desvaneceu-se sem deixar rastro, e o poder fictício foi devolvido à sociedade."
200001-15 = "Não importa o quanto eu levante a voz agora, ninguém olhará para trás."
200001-16 = "Por que 'nós' chegamos a esse fim?"
200001-17 = "Foi por atrapalhar os que buscavam a verdade e tentar impor uma 'solução'?"
200001-18 = "Ou foi por tentar julgar e ditar as regras deste mundo?"
200001-19 = "Ou será que naqueles símbolos que subestimamos como meros MacGuffins...#nhavia um presságio crucial?"
200001-23 = "……Não.#nQualquer busca a partir de agora é inútil."
200001-24 = "Não me restam mais meios de reunir os símbolos."
200001-25 = "Apenas como um 'transeunte anônimo', me resta aguardar até desaparecer por completo neste mundo......"
200001-36 = "……Oh, teletela."
