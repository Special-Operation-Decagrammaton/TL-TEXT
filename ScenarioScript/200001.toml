200001-205 = "……Espere."
200001-206 = "Entendo…… prossiga."
200001-207 = "Não―― levante a sua voz!"
200001-240 = "Hmm…… entendo."
200001-241 = "A autoridade ruiu.#nMas não foi perdida."
200001-242 = "……Não. 'Todos conquistaram a autoridade' seria o correto."
200001-243 = "Dentro da teletela, a fronteira entre a realidade e a ficção deixou de existir.#nNão há mais necessidade de caçar sombras.#nNós mesmos somos―― a Ideia."
