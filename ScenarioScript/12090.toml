[translation]
12090-1 = "第9話;カイザーPMC（１）"
12090-2 = "うへ～、結局何なのこいつら？"
12090-3 = "そんなに強くないけど邪魔っていうか、めんどくさいっていうか……なんか、今まで戦ってきたやつらの中でもひと際「厄介」って感じ。"
12090-4 = "ん、下手したら風紀委員会より面倒……。"
12090-5 = "何なのでしょう、この方たちは……それに、こんなところで一体何をしてるんでしょうか？"
12090-6 = "施設に、何らかのマークを発見しました！"
12090-8 = "これって……"
12090-9 = "少々お待ちください、今確認を……"
12090-10 = "……確認が取れました。このマーク、この集団は……"
12090-11 = "……カイザーPMC。"
12090-13 = "っ！？……はい。ホシノ先輩の仰る通り、カイザーPMCです。"
12090-14 = "カイザー……？こいつらもカイザーコーポレーションってこと！？"
12090-15 = "はい、カイザーコーポレーションの系列会社で……。"
12090-16 = "もうどこに行ってもカイザー、カイザー、カイザー！一体何なの！？"
12090-18 = "それに、「PMC」ということは……"
12090-19 = "え、何かマズい言葉なの？"
12090-20 = "PMCとは、[ruby=Private Military Company]民間軍事会社[/ruby]のことです……。"
12090-21 = "ぐ、軍事……！？"
12090-22 = "……。"
12090-23 = "ヘルメット団のようなチンピラとはレベルが違います。本当に組織化されたプロの……文字通り、軍隊のようなものです！"
12090-24 = "……！"
12090-25 = "軍隊ぃ！？"
12090-26 = "退学した生徒や不良の生徒たちを集めて、企業が私設兵として雇っているという噂がありましたが、まさか……"
12090-28 = "（ヴイイイィィィ―――ン！！）"
12090-30 = "け、警報音……！？"
12090-31 = "これ、何だか大ごとになりそうな予感なんだけど……。"
12090-33 = "これは……ヘリの音……？"
12090-34 = "それに、この地面の揺れ……恐らく戦車。"
12090-35 = "大規模な兵力が接近中！こちらを包囲しに来ています！"
12090-36 = "仰る通り、装甲車以外にも戦車やヘリまで……！ものすごい数です！"
12090-37 = "包囲が完成する前に離脱してください！まずは急いで、その場から脱出を……！"
12090-38 = "先生、指示をお願いします！"
