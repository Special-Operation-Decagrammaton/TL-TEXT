[translation]
12090-1 = "Episódio 9; Kaiser PMC (1)"
12090-2 = "Uhe~, afinal, quem são esses caras?"
12090-3 = "Não são tão fortes, mas são um estorvo... ou melhor, são irritantes... Sinto que, entre todos que enfrentamos até agora, eles são os mais 'problemáticos'."
12090-4 = "Hmm, se bobear, são mais chatos que o Comitê Disciplinar..."
12090-5 = "Quem seriam essas pessoas...? E o que, exatamente, estão fazendo em um lugar como este?"
12090-6 = "Encontrei uma marca nas instalações!"
12090-8 = "Isso é..."
12090-9 = "Um momento, por favor, estou verificando agora..."
12090-10 = "……Confirmação concluída. Essa marca, esse grupo é..."
12090-11 = "……Kaiser PMC."
12090-13 = "!? ...Sim. Como a Hoshino-senpai disse, é a Kaiser PMC."
12090-14 = "Kaiser...? Quer dizer que esses caras também são da Kaiser Corporation!?"
12090-15 = "Sim, é uma subsidiária da Kaiser Corporation..."
12090-16 = "Não importa para onde a gente vá, é Kaiser, Kaiser, Kaiser! O que é isso, afinal!?"
12090-18 = "Além disso, se é 'PMC', então..."
12090-19 = "Hã, é um termo ruim?"
12090-20 = "PMC significa Companhia Militar Privada..."
12090-21 = "M-militar...!?"
12090-22 = "……"
12090-23 = "O nível deles é diferente desses delinquentes como o Bando do Capacete. Eles são profissionais organizados... literalmente, como um exército!"
12090-24 = "……!"
12090-25 = "Um exército!?"
12090-26 = "Havia rumores de que a empresa recrutava alunas expulsas e delinquentes para servirem como soldados particulares, mas não imaginava que..."
12090-28 = "(Vuiiiiiiiiii---n!!)"
12090-30 = "A-alarme...!?"
12090-31 = "Tenho a sensação de que isso vai virar um problemão..."
12090-33 = "Isso é... som de helicóptero...?"
12090-34 = "E esse tremor no chão... provavelmente tanques."
12090-35 = "Uma força militar em larga escala está se aproximando! Eles estão vindo nos cercar!"
12090-36 = "Como você disse, além de veículos blindados, há tanques e helicópteros...! É um número absurdo!"
12090-37 = "Saiam daí antes que o cerco se complete! Primeiro, fujam desse lugar imediatamente...!"
12090-38 = "Sensei, por favor, nos dê as ordens!"
