[translation]
80000046-1 = "Uma palavra para você"
80000046-2 = "Departamento de Yin-Yang - Sala do Clube"
80000046-3 = "（Devido a assuntos relacionados ao trabalho do Schale, visitei a sala do Departamento de Yin-Yang）"
80000046-4 = "Ah, Sensei~."
80000046-5 = "……Por que você está aqui?"
80000046-6 = "[s] \"Eu tinha um assunto para tratar. Aliás, você está sozinha hoje, Chise?\""
80000046-7 = "Sim, estou encarregada de cuidar do lugar. É uma missão importante."
80000046-8 = "……Já que o Sensei também está em uma missão, será que estamos combinando?"
80000046-9 = "[s] \"Talvez seja verdade.\""
80000046-10 = "Sim. Então eu também vou me esforçar cuidando do lugar ao lado do Sensei."
80000046-11 = "O Sensei também se esforce, estarei torcendo por você."
80000046-12 = "[s] \"Ah, obrigado.\""
80000046-14 = "（Assim, comecei a trabalhar junto com a Chise）"
80000046-20 = "[ns] \"Por aqui é isso…….\""
80000046-24 = "Hmm, não é isso também……."
80000046-28 = "Isso também não é……."
80000046-29 = "[s] \"……Chise?\""
80000046-30 = "Ah, Sensei? Terminou o trabalho?"
80000046-31 = "……Ainda não terminou? Ser adulto é difícil, né……."
80000046-32 = "Então, aqui, pegue isto."
80000046-33 = "[s] \"Isso é…… um biscoito de arroz com chocolate?\""
80000046-34 = "Sim, é para você, Sensei. Vou continuar procurando com afinco."
80000046-35 = "Vamos nos esforçar juntos~."
80000046-36 = "[s] \"Ah, sim. É verdade, né?\""
80000046-40 = "（Embora tenhamos retomado o trabalho, a Chise estava……）"
80000046-44 = "Aqui, Sensei."
80000046-51 = "Sensei, aqui está~."
80000046-58 = "Sim."
80000046-64 = "Aaaah."
80000046-69 = "（E assim, enquanto recebia uma quantidade considerável de chocolates da Chise, continuei trabalhando……）"
80000046-71 = "Hmm, não estou conseguindo encontrar……."
80000046-72 = "[s1] \"Chise, o que você está procurando há tanto tempo?\"\n[s2] \"Tem uma quantidade enorme de biscoitos de arroz com chocolate empilhados…….\""
80000046-73 = "Ah, isso?"
80000046-74 = "Ah, isso?"
80000046-78 = "Isso é um \"Biscoito de Arroz com Provérbio de Quatro Caracteres\"."
80000046-79 = "Dentro dele, tem um papel com um provérbio de quatro caracteres escrito."
80000046-80 = "[s] \"Provérbio de quatro caracteres, chocolate, biscoito de arroz……?\""
80000046-81 = "Sim, em comemoração ao Dia dos Namorados."
80000046-82 = "Tem um que eu quero encontrar."
80000046-83 = "Não estou achando~."
80000046-87 = "Ah, achei."
80000046-88 = "Era isso que eu estava procurando, o \"Sonho da Borboleta\"."
80000046-89 = "[s] \"\"Sonho da Borboleta\", se não me engano…….\""
80000046-90 = "Sim. É quando você dorme um dia e sonha que se torna uma borboleta."
80000046-91 = "Sonhar que vira uma borboleta…… deve ser algo leve e divertido. Né, Sensei?"
80000046-92 = "[s] \"Talvez seja mesmo……?\""
80000046-93 = "Encontrei a frase que eu queria, e o chocolate também é gostoso."
80000046-94 = "O Dia dos Namorados é bom, né~."
80000046-95 = "Ah, vou dar este para você também, Sensei."
80000046-99 = "[ns3] \"Ah, obrigado.\"\n[ns4] \"Hum…… \"Vida Longa à Poupança\"?\""
80000046-100 = "Sim, economizar é importante. Essa também é uma boa frase~♪"
80000046-101 = "Sim, economizar é importante. Essa também é uma boa frase~♪"
80000046-102 = "[s5] \"É, você tem razão. Acumular com calma é importante...\"\n[s6] \"Isso nem parece ser um provérbio de quatro caracteres...?\""
80000046-105 = "（Depois disso, comi o resto dos chocolates enquanto conversava com a Chise）"
