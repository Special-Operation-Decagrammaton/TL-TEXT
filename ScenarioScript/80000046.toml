[translation]
80000046-1 = "あなたのために言葉を一つ"
80000046-2 = "陰陽部・部室"
80000046-3 = "（シャーレの仕事の関係もあり、陰陽部の部室を訪れていた）"
80000046-4 = "あ、先生～。"
80000046-5 = "……どうしてここに？"
80000046-6 = "[s] \"ちょっと用事があって。ところで今日はチセひとり？\""
80000046-7 = "うん、お留守番担当。大事な任務だから。"
80000046-8 = "……先生も任務ってことは、私たちお揃い？"
80000046-9 = "[s] \"確かにそうかも。\""
80000046-10 = "うん。じゃあ私も先生の隣で、お留守番頑張る。"
80000046-11 = "先生も頑張って、応援してるから。"
80000046-12 = "[s] \"あ、ありがとう。\""
80000046-14 = "（そうやってチセと一緒に、仕事を始めた）"
80000046-20 = "[ns] \"こっちはこれだから……。\""
80000046-24 = "う～ん、これでもない……。"
80000046-28 = "これもちょっと違う……。"
80000046-29 = "[s] \"……チセ？\""
80000046-30 = "あ、先生？お仕事終わった～？"
80000046-31 = "……まだ終わってない？大人って大変だね……。"
80000046-32 = "じゃあはい、これ。"
80000046-33 = "[s] \"これは……チョコレートのせんべい？\""
80000046-34 = "うん、先生にあげる。頑張って探すね。"
80000046-35 = "一緒に頑張ろ～。"
80000046-36 = "[s] \"あ、うん。そうだね？\""
80000046-40 = "（そうして仕事を再開したものの、チセの方は……）"
80000046-44 = "はい、先生。"
80000046-51 = "先生、どうぞ～。"
80000046-58 = "はーい。"
80000046-64 = "あーん。"
80000046-69 = "（そうしてチセから、かなりの量のチョコを貰いながら仕事をし……）"
80000046-71 = "うーん、中々見つからない……。"
80000046-72 = "[s1] \"チセは、ずっと何を探してるの？\"\n[s2] \"すごい量のチョコレートせんべいが積まれてる……。\""
80000046-73 = "あ、これ？"
80000046-74 = "あ、これ？"
80000046-78 = "これは「四字熟語チョコ煎餅」。"
80000046-79 = "中に、四字熟語が書かれた紙が入ってるの。"
80000046-80 = "[s] \"四字熟語、チョコ、煎餅……？\""
80000046-81 = "うん、バレンタインデー記念に。"
80000046-82 = "一つ、欲しいのがあって。"
80000046-83 = "見つからないな～。"
80000046-87 = "あ、出た。"
80000046-88 = "これを探してたの、「胡蝶之夢」。"
80000046-89 = "[s] \"「胡蝶之夢」って確か……。\""
80000046-90 = "うん。ある日眠ってると、ちょうちょになる夢を見るの。"
80000046-91 = "ちょうちょになる夢……きっとふわふわして、楽しいだろうな。ね、先生？"
80000046-92 = "[s] \"それはそうかも……？\""
80000046-93 = "好きな言葉も見つかったし、チョコも美味しいし。"
80000046-94 = "バレンタインデーは良いね～。"
80000046-95 = "あ、先生にもこれあげる。"
80000046-99 = "[ns3] \"あ、ありがとう。\"\n[ns4] \"えっと……「貯蓄万歳」？\""
80000046-100 = "うん、貯蓄は大事だから。これも良い言葉だね～♪"
80000046-101 = "うん、貯蓄は大事だから。これも良い言葉だね～♪"
80000046-102 = "[s5] \"そ、そうだね。じっくり蓄えるのは大事……。\"\n[s6] \"これ、四字熟語ではないような……？\""
80000046-105 = "（それから残りのチョコレートは、チセとおしゃべりをしながら食べた）"
