[translation]
10045080-1 = "Episódio 8; O Orgulho de Cada Uma"
10045080-4 = "Nhac, nhac..."
10045080-5 = "Um espetinho depois de uma boa partida é algo especial."
10045080-6 = "Sim, não tenho arrependimentos!"
10045080-7 = "Eu também queria ter jogado vôlei de praia, Izuna..."
10045080-8 = "Então, que tal jogarmos juntas mais tarde?"
10045080-9 = "Concordo!"
10045080-10 = "Nossa! Já estou ansiosa por isso!!"
10045080-12 = "Hum... será que eu poderia me juntar a vocês...?"
10045080-13 = "Claro. Quer ficar no mesmo time que eu na próxima?"
10045080-14 = "É-é uma honra!"
10045080-16 = "A propósito, para onde foram a Renge-senpai e a Kikyou-senpai?"
10045080-17 = "Não as vejo desde que a partida terminou..."
10045080-18 = "Ah, sobre elas..."
10045080-19 = "Estão em um treinamento intensivo de natação."
10045080-21 = "Quem conquistou o direito de retornar à competição foi...!"
10045080-22 = "A equipe de Renge e Kikyou!"
10045080-27 = "Conseguimos... nós vencemos...!"
10045080-28 = "Muito bem, então vamos cumprir nossa promessa?"
10045080-29 = "Promessa? Ah..."
10045080-30 = "Isso mesmo! Hora do treinamento de natação!"
10045080-31 = "Agora mesmo...!?"
10045080-36 = "Vamos, não se atrase!"
10045080-41 = "Fufu, com certeza a Kikyou-senpai vai aprender a nadar rapidinho!"
10045080-42 = "Sim."
10045080-43 = "A Kikyou vai ficar bem."
10045080-45 = "Puf, puf...!"
10045080-46 = "Mova os braços e as pernas com mais amplitude! Relaxe o corpo!"
10045080-47 = "Como você quer que eu relaxe e me mova ao mesmo tempo... isso é contraditório, não acha!?"
10045080-48 = "O importante é não lutar contra a natureza e deixar o corpo fluir com a correnteza. #nNadar é exatamente isso!"
10045080-49 = "Assim que pegar o jeito, vai ser fácil!"
10045080-50 = "Quando se acostumar, vou te ensinar estilos de natação ainda mais estilosos!"
10045080-51 = "Hm? Ainda mais estilosos...?"
10045080-52 = "Renge, você não me disse, mas que estilo de natação é esse?"
10045080-53 = "Hm? Ah, isso é..."
10045080-55 = "Cachorrinho!"
10045080-56 = "Cachorrinho."
10045080-57 = "...Hã?"
10045080-58 = "Cachorrinho...!?"
10045080-59 = "Eu, a estrategista da Hyakkiyako... estava praticando o nado cachorrinho...!?"
10045080-60 = "Não é hora de se preocupar com isso, né? O básico é o que importa!"
10045080-61 = "Cachorrinho... eu fazendo nado cachorrinho..."
10045080-66 = "Embora a empolgação da repescagem ainda não tenha passado..."
10045080-67 = "Em breve, anunciaremos a modalidade e os confrontos da final!"
10045080-68 = "Todas as atletas, por favor, reúnam-se na arena! Nyan-nyan!"
10045080-69 = "Espero que a final não seja uma modalidade na água..."
10045080-70 = "Se for... só me resta sobreviver usando o nado cachorrinho..."
10045080-71 = "De qualquer forma, vamos. O pior que podemos fazer é nos atrasar."
10045080-73 = "Algum tempo depois..."
10045080-76 = "Para o bem ou para o mal, este é o fim... #nAnunciaremos a modalidade e os confrontos da final!"
10045080-77 = "Primeiro, vamos ao anúncio da modalidade!"
10045080-78 = "[ns] \"A modalidade que encerrará o Festival Aquático de Hyakkiyako é...!\""
10045080-81 = "[log]Jogo de Empurrar![/log]"
10045080-84 = "O objetivo é empurrar o oponente para fora da plataforma flutuante! Se cair no mar, perde!"
10045080-85 = "O uso de armas é estritamente proibido! Será uma disputa usando apenas o próprio corpo!"
10045080-86 = "É um duelo direto, sem truques!"
10045080-87 = "Ah... se perder, já sei que vou ter que nadar como um cachorro."
10045080-88 = "(Um confronto direto sem armas em cima de uma plataforma flutuante balançando nas ondas...)"
10045080-89 = "(Ainda bem que não é uma luta subaquática, mas qualquer que seja a oponente, estou em desvantagem...)"
10045080-90 = "Muito bem, vamos decidir as chaves das partidas agora!"
10045080-91 = "Competidoras, por favor, tirem uma bola desta caixa."
10045080-92 = "As bolas estão marcadas com os números 1 e 2. #nQuem tirar o mesmo número será a oponente na primeira rodada!"
10045080-94 = "[ns] \"Começando pela Izuna!\""
10045080-95 = "Sim! Mestre!"
10045080-96 = "Qual será que eu pego? #n... Esta aqui!"
10045080-100 = "Oh! A Izuna tirou o número 2!"
10045080-102 = "[ns] \"A próxima é a Renge!\""
10045080-103 = "Hmm... Decidi!"
10045080-107 = "Ah, eu tirei o 1."
10045080-109 = "[ns] \"Seguindo com a Chise!\""
10045080-110 = "Qual será?"
10045080-114 = "Ah, o 2~"
10045080-116 = "[ns] \"Sendo assim, a Kikyou é...\""
10045080-117 = "...Número 1."
10045080-118 = "Certo! Com isso, as chaves estão definidas!"
10045080-119 = "A primeira partida será Kikyou contra Renge!"
10045080-120 = "A segunda partida será Izuna contra Chise!"
10045080-121 = "E as vencedoras de cada partida se enfrentarão na final...!"
10045080-122 = "Se enfrentarem logo de cara, hein."
10045080-123 = "Eu queria ter visto vocês duas lutando na final..."
10045080-124 = "É um pouco decepcionante."
10045080-125 = "Nagusa-senpai... quem você acha que vai ganhar?"
10045080-126 = "...Acho que a Renge tem vantagem."
10045080-127 = "Além disso, mesmo que a Kikyou chegue à final, será difícil vencer."
10045080-128 = "A Izuna é uma ninja..."
10045080-129 = "E a Chise... foi a vencedora do torneio anterior."
10045080-130 = "Sério! Era mesmo!?"
10045080-131 = "Mas ela mesma deve saber disso melhor do que ninguém. Sendo assim..."
10045080-132 = "É bem provável que ela desista da vitória e ceda para a Renge."
10045080-133 = "Quer dizer que a Kikyou-senpai pretende perder de propósito...?"
10045080-134 = "A Kikyou é uma garota disposta a se sacrificar pelo bem da equipe."
10045080-135 = "Isso é..."
10045080-136 = "Além disso, é difícil lutar a sério contra uma amiga de infância. #nExistem muitos motivos para a Kikyou ceder na partida."
10045080-137 = "Claro, pessoalmente, eu gostaria de ver a Kikyou dando o seu melhor."
10045080-138 = "Mas... quem decide isso é ela mesma."
10045080-139 = "Kikyou-senpai..."
10045080-141 = "Ei, não me diga que você está... pensando em algo estranho, né?"
10045080-142 = "...Esse tipo de coisa não é a sua especialidade?"
10045080-143 = "Você não estava viciado em romances de mestre e aprendiz ultimamente?"
10045080-144 = "C-como você sabe disso...!?"
10045080-145 = "……Não, não é isso!#nEstou perguntando se você pretende lutar de verdade."
10045080-146 = "Renge, você quer lutar comigo?"
10045080-147 = "Eu só não gosto de trapaças."
10045080-149 = "Trapaça? Isso é estratégia.#nDeixando a final de lado, não é uma boa ideia lutarmos a sério aqui."
10045080-150 = "Se já está garantido que chegaremos à final,#né melhor poupar o máximo de energia possível."
10045080-151 = "Agora, só precisamos decidir quem vai avançar."
10045080-152 = "Eu ou você. Quem tem mais chances nesta modalidade?"
10045080-153 = "Nem precisa pensar, não é?"
10045080-154 = "Kikyou……."
10045080-155 = "Eu quero maximizar as chances de vitória da Hyakkiyako."
10045080-156 = "……Mas vencer desse jeito não tem sentido nenhum!"
10045080-157 = "Imagino que sim. Eu sabia que você diria isso.#n……Vamos lutar, não vamos? Anda, prepare-se."
10045080-158 = "Ei, espera, a conversa ainda não—"
10045080-160 = "Você pode continuar falando o quanto quiser depois."
10045080-161 = "……Porque você é, sem dúvida, alguém que pode alcançar grandes alturas."
10045080-162 = "……."
10045080-164 = "Enquanto isso, em uma loja de conveniência próxima."
10045080-165 = "Droga, droga……!"
10045080-166 = "É tudo culpa daquela tanuki!"
10045080-167 = "Se o meu oponente fosse mais forte, isso não teria acontecido……#nCom certeza o pessoal da organização manipulou as chaves!"
10045080-168 = "Isso é imperdoável……."
10045080-169 = "Você aí. Gostaria de lhe fazer algumas perguntas."
10045080-170 = "Hã? O que foi? Estou ocupado agora, suma daqui—"
10045080-171 = "……Ué?"
10045080-176 = "……."
10045080-177 = "V-você é…… a \"Raposa da Calamidade\"!? Por que você está aqui……!"
10045080-178 = "Parece que a praia está agitada, então vim verificar a situação."
10045080-179 = "Deixando isso de lado…… fui eu quem fiz a pergunta……."
10045080-180 = "Poderia evitar responder uma pergunta com outra?"
10045080-181 = "Iiiih! T-tá bom! Eu respondo qualquer coisa!"
10045080-182 = "(S-se eu usar ela direito…… talvez eu consiga dar o troco naqueles que me humilharam!)"
10045080-183 = "……Lá na praia, está rolando um torneio para decidir quem é o mais forte de Hyakkiyako."
10045080-184 = "Mas eles estão manipulando os resultados para favorecer a si mesmos.#nPor isso, eu pretendo destruir tudo."
10045080-185 = "Você não quer entrar nessa? É um absurdo decidirem o mais forte de Hyakkiyako sem você, não é?"
10045080-186 = "Isso…… não me parece um assunto muito interessante."
10045080-187 = "M-mas dizem que até o tal \"Professor do Schale\" veio e está fazendo o que bem entende por lá!"
10045080-188 = "Você não fica irritada ao ouvir isso?"
10045080-189 = "O que você disse……?"
10045080-190 = "O Professor…… está aí?"
10045080-191 = "I-isso mesmo! Aquele professor está sendo o juiz!"
10045080-192 = "Um torneio onde o Professor julga quem é o \"mais forte\"……?#nPor que não disse isso antes?"
10045080-193 = "Ufufu…… ufufufu♡"
10045080-194 = "Espere por mim, meu querido…… estou indo ao seu encontro agora……!"
10045080-198 = "Ei! Espere aí!"
10045080-199 = "……Pff, bem, tanto faz."
10045080-200 = "Já basta ter soltado a \"Raposa da Calamidade\" lá."
10045080-201 = "Certo, eu também vou lá causar o caos! Quem rir por último, serei eu!"
