[translation]
10045080-1 = "第8話;互いの矜持"
10045080-4 = "もぐもぐ……。"
10045080-5 = "いい勝負のあとの焼き鳥は格別だね。"
10045080-6 = "ええ、悔いはありませんの！"
10045080-7 = "イズナもビーチバレーやりたかったです……！"
10045080-8 = "では、後で一緒にやりませんか？"
10045080-9 = "賛成～"
10045080-10 = "なんとっ！今から楽しみです！！"
10045080-12 = "あの……私も混ぜてもらったり……？"
10045080-13 = "もちろん。次は一緒のチームにする？"
10045080-14 = "こっ、光栄です！"
10045080-16 = "ところで、レンゲ先輩とキキョウ先輩はどちらに行かれたのでしょう？"
10045080-17 = "試合が終わった後からお姿が見えませんが……。"
10045080-18 = "ああ、二人なら……。"
10045080-19 = "水泳の猛特訓中だよ。"
10045080-21 = "敗者復活の権利を獲得したのは……！"
10045080-22 = "レンゲ・キキョウチームですっ！"
10045080-27 = "やった……私たち、勝ったんだ……！"
10045080-28 = "よし、それじゃ約束を果たしに行こうか？"
10045080-29 = "約束？あ……。"
10045080-30 = "そう！今から水泳の特訓だ！"
10045080-31 = "今すぐ……！？"
10045080-36 = "ほら、行くよ！"
10045080-41 = "ふふ、キキョウ先輩ならきっとすぐ泳げるようになるはずですの！"
10045080-42 = "うん。"
10045080-43 = "キキョウなら、大丈夫。"
10045080-45 = "ぷっ、ぷはっ……！"
10045080-46 = "もっと腕と脚を大きく動かして！体の力を抜いて！"
10045080-47 = "力を抜いて動けだなんて……矛盾したことできるわけないでしょ！？"
10045080-48 = "自然に逆らわず、流れに身を任せるのが大事なんだ。#n泳ぐっていうのは、そういうこと！"
10045080-49 = "コツさえ掴めばすぐだよ！"
10045080-50 = "慣れてきたら、もっとかっこいい泳ぎ方も教えてあげるからな！"
10045080-51 = "ん？もっとかっこいい……？"
10045080-52 = "レンゲ、聞いてなかったけど、これは何ていう泳ぎ方なの？"
10045080-53 = "うん？ああ、これはね――"
10045080-55 = "犬かき！"
10045080-56 = "犬かき。"
10045080-57 = "……え？"
10045080-58 = "犬かき……！？"
10045080-59 = "百花繚乱の作戦参謀たる私が……犬かきを練習していた……！？"
10045080-60 = "そんなこと気にしてる場合じゃないだろ？基本が大事なんだから！"
10045080-61 = "犬かき……私が犬かき……。"
10045080-66 = "敗者復活戦の盛り上がりも冷めやらぬ中ではありますが――"
10045080-67 = "間もなく、決勝戦の種目と対戦カードの発表を行いますっ！"
10045080-68 = "選手の皆さんは、競技場まで集合してください～！にゃんにゃん！"
10045080-69 = "決勝戦、水に入る種目じゃないといいな……。"
10045080-70 = "もしそうなら……犬かきで乗り切るしか……。"
10045080-71 = "とにかく行こう。遅れるのが一番良くない。"
10045080-73 = "しばらくして……。"
10045080-76 = "泣いても笑ってもこれが最後……#n決勝戦の種目と対戦カードの発表を行いますっ！"
10045080-77 = "まずは種目の発表から！"
10045080-78 = "[ns] \"百夜水上祭のトリを飾る種目は……！\""
10045080-81 = "[log]押し出しゲーム！[/log]"
10045080-84 = "浮き島の上から相手を押し出したら勝ち！海に落ちたら負けです！"
10045080-85 = "武器の使用は一切禁止！体一つでの勝負になります～！"
10045080-86 = "小細工無しの一本勝負です！"
10045080-87 = "おぉ……負けたら犬かき確定だな。"
10045080-88 = "（波に揺れる浮き島の上で、武器なしの直接対決……）"
10045080-89 = "（水中戦じゃないのは助かるけど、誰と当たっても私には不利……）"
10045080-90 = "それでは、これより対戦カードを決定します～！"
10045080-91 = "選手の皆さん、この箱の中からボールを一つずつ引いてくださ～い。"
10045080-92 = "ボールには1と2の番号が書かれています。#n同じ番号を引いた人が初戦の相手となります！"
10045080-94 = "[ns] \"最初はイズナ選手！\""
10045080-95 = "はいっ！主殿！"
10045080-96 = "どれにしようかな～？#n……これです！"
10045080-100 = "おおっ！イズナは2番です！"
10045080-102 = "[ns] \"次はレンゲ選手！\""
10045080-103 = "う～ん……。決めたっ！"
10045080-107 = "おっ、アタシは1番か。"
10045080-109 = "[ns] \"続いてチセ選手！\""
10045080-110 = "どっちかな～？"
10045080-114 = "あ、2番～"
10045080-116 = "[ns] \"となるとキキョウ選手は……。\""
10045080-117 = "……1番。"
10045080-118 = "はい！これで対戦カードが決まりました～！"
10045080-119 = "第1試合はキキョウ選手対レンゲ選手！"
10045080-120 = "第2試合はイズナ選手対チセ選手！"
10045080-121 = "そして各試合の勝者が決勝戦で対決しますっ……！"
10045080-122 = "いきなりぶつかるなんてね。"
10045080-123 = "お二人が決勝戦で戦うお姿を観たかったですの……。"
10045080-124 = "ちょっと残念かな。"
10045080-125 = "ナグサ先輩は……どちらが勝つとお考えですの？"
10045080-126 = "……レンゲが有利だとは思う。"
10045080-127 = "それに、仮にキキョウが決勝まで進んだとしても、勝つのは厳しいだろうね。"
10045080-128 = "イズナさんは忍者だし……。"
10045080-129 = "チセさんは……前回大会の優勝者だから。"
10045080-130 = "ええっ！そうだったんですの！？"
10045080-131 = "でも、それは本人が一番よく分かっているはず。となれば……。"
10045080-132 = "勝負を捨てて、レンゲに譲る可能性が高い。"
10045080-133 = "つまり、キキョウ先輩はわざと負けるおつもりなんですの……？"
10045080-134 = "キキョウはチームのためなら、自分を犠牲にする覚悟がある子だよ。"
10045080-135 = "それは……。"
10045080-136 = "それに、幼馴染とは本気で戦いにくいものだからね。#nキキョウが試合を譲る理由はたくさんあるんだよ。"
10045080-137 = "もちろん、個人的にはキキョウが全力を尽くす姿を見たいと思ってる。"
10045080-138 = "でも……それを決めるのはあの子自身だから。"
10045080-139 = "キキョウ先輩……。"
10045080-141 = "なあ、まさかとは思うけど……変なこと考えてないよな？"
10045080-142 = "……そういうのはむしろあんたの得意分野でしょう？"
10045080-143 = "最近は師弟モノの小説にハマってるんだっけ？"
10045080-144 = "ど、どうしてそれを知ってるんだ……！？"
10045080-145 = "……いや、そうじゃなくて！#nちゃんと戦うつもりはあるのかって聞いてんだよ。"
10045080-146 = "レンゲは、私と戦いたいの？"
10045080-147 = "ズルするのが嫌なだけだよ。"
10045080-149 = "ズル？これは作戦。#n決勝ならともかく、ここで私たちが本気で戦うのは得策じゃない。"
10045080-150 = "決勝に行けるのが確定してるなら、#n少しでも余力を残しておいたほうがいい。"
10045080-151 = "後はどっちが進むかを決めるだけ。"
10045080-152 = "私と、あんた。この種目で見込みがあるのはどっちか。"
10045080-153 = "考えるまでもないでしょ？"
10045080-154 = "キキョウ……。"
10045080-155 = "私は百花繚乱が勝つ可能性を最大化したい。"
10045080-156 = "……それで勝ち進んだって、意味ないじゃん！"
10045080-157 = "だろうね。あんたならそういうと思った。#n……戦うんでしょう？ほら、準備して。"
10045080-158 = "ちょっ、話はまだ――"
10045080-160 = "続きは後でいくらでも聞くよ。"
10045080-161 = "……あんたは間違いなく、高みに行ける子だから。"
10045080-162 = "……。"
10045080-164 = "一方その頃、近くの雑貨店。"
10045080-165 = "くそっ、くそっ……！"
10045080-166 = "全部あのタヌキのせいだ！"
10045080-167 = "組む相手が強けりゃ、こんなことには……。#nきっと運営の奴ら、組み合わせを操作してやがったんだ！"
10045080-168 = "許せねぇよなぁ……。"
10045080-169 = "そこのあなた。少しお話を伺いたいのですが。"
10045080-170 = "はあ？何だよ？ 今忙しいんだ、どっか行――"
10045080-171 = "……あれ？"
10045080-176 = "……。"
10045080-177 = "お、お前は……「災厄の狐」！？なんでこんな所に……！"
10045080-178 = "どうやら浜辺が騒がしいようで、様子を見に来たのです。"
10045080-179 = "それはさておき……質問をしていたのは私なのですが……。"
10045080-180 = "質問に質問で返さないでいただけますか？"
10045080-181 = "ひっ！わ、分かった！なんでも答えるから！"
10045080-182 = "（こ、こいつをうまく使えば……私をコケにしたヤツらに一泡吹かせてやれるかもしれねえ！）"
10045080-183 = "……あっちの浜辺でな、百鬼夜行の最強を決める大会をやってんだ。"
10045080-184 = "でもあいつら、自分たちに都合がいいように勝敗を操作してやがってよぉ。#nだから、全部ぶち壊してやろうと思って。"
10045080-185 = "お前も一枚噛まねぇか？お前を差し置いて百鬼夜行の最強を決めるなんておかしいだろ？"
10045080-186 = "それは……さして興味の湧かない話ですね。"
10045080-187 = "で、でも「シャーレの先生」とかいうヤツも来て、一緒になって好き勝手やってるって話で！"
10045080-188 = "お前、それ聞いてムカつかないのかよ？"
10045080-189 = "今、何と……？"
10045080-190 = "先生が……いらっしゃるんですか？"
10045080-191 = "そ、そうだ！その先生が審査員をしてるんだよ！"
10045080-192 = "先生が「最強」を審査する大会……？#nなぜそれを早く言わないのですか。"
10045080-193 = "うふふ……うふふふ♡"
10045080-194 = "あなた様、待っていてくださいね……今、お傍に参ります……！"
10045080-198 = "おい！待ってくれ！"
10045080-199 = "……ふっ、ま、どうでもいいか。"
10045080-200 = "「災厄の狐」を放り込めただけで十分だ。"
10045080-201 = "よし、私も行って大暴れしてやる！最後に笑うのは、この私だ！"
