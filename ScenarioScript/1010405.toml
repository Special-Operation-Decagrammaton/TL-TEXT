[translation]
1010405-1 = "カンフーの教え"
1010405-2 = "玄武商会本店"
1010405-4 = "まったく、客人にお茶すら出さないとは！"
1010405-5 = "それとも、また問題を起こすつもりか？"
1010405-6 = "今度同じことをしでかしたら、どうなるか分かってるな？"
1010405-9 = "……前回の不祥事については、こちらの落ち度です。"
1010405-10 = "それに……お茶を出すくらい構いませんが……本当に良いのでしょうか？"
1010405-11 = "何が言いたい？"
1010405-12 = "お茶を淹れる器具の衛生状況も、監査項目のひとつでしょう？"
1010405-13 = "となると、最初から監査をやり直す必要が出てくるのでは？"
1010405-14 = "……！"
1010405-15 = "ま、まあ……お茶くらいどうだって良いだろう。"
1010405-16 = "その代わり、覚悟しておくんだな。#n玄武商会の裏の顔を必ず暴いてやる！"
1010405-20 = "[ns] \"だ、大丈夫……？\""
1010405-21 = "いつもの言いがかりでしょう。"
1010405-22 = "どうせ、何を言ったところで無駄ですから。"
1010405-23 = "まずは、従業員の衛生確認からだ。#n全員、手を出せ！"
1010405-24 = "皆さんも、従いましょう。"
1010405-28 = "はい、レイジョさん。"
1010405-30 = "……ふむ、きちんと爪は切ってあるな。"
1010405-31 = "使い捨ての料理用手袋も、用意しているとは……チッ。"
1010405-32 = "……そうだ、勝手口を開けっ放しにはしてないだろうな？"
1010405-33 = "虫が入ってきたり、外の汚い空気や臭いが調理場に入ってくると、#n衛生面に問題があると言わざるを得ない。"
1010405-35 = "もちろん、開けっ放しになどしていません。#nどの店舗の厨房にも、換気システムを導入しております。"
1010405-36 = "実際に見てもらったほうが早いでしょう。"
1010405-41 = "うおっ……だ、誰が稼働しろなんて言った！#n髪がぐちゃぐちゃになったじゃないか！"
1010405-42 = "現場を確認するための監査ではないのですか？"
1010405-43 = "……チッ。#n次は調理器具を見させてもらおうか！"
1010405-45 = "食材の賞味期限は……！"
1010405-47 = "交差汚染対策は……！"
1010405-49 = "た、タバコやお酒はっ……！！"
1010405-50 = "[s] \"さすがにそれは……。\""
1010405-52 = "（なぜ何も問題が出てこない！？）"
1010405-53 = "これで監査は終了ですね？"
1010405-54 = "問題点は特になかったと思いますが。"
1010405-55 = "いや、まだだ……！"
1010405-56 = "そうだ、私が食べたいと思っている料理を当ててみろ！"
1010405-57 = "……はい？"
1010405-58 = "[s] \"それは無茶じゃない！？\""
1010405-59 = "これくらいできなくて、何が接客だ！"
1010405-60 = "お客様の要望を予測してこそ、感動を提供できる！"
1010405-61 = "……。"
1010405-62 = "それと、どうして食堂に玄龍門の紋様がないんだ？"
1010405-63 = "もしかして、我々に反抗しているのか？"
1010405-64 = "帰ったら、すぐ上に報告するしかないな！"
1010405-65 = "良いですか、ここはあくまで玄武商会の――"
1010405-66 = "言い訳なら聞く気はない。#n心構えが欠けていると言ってるんだ！"
1010405-67 = "山海経の伝統と文化を受け継ぐ意志が足りていない！"
1010405-68 = "……今日の監査は、衛生状況を確認するために実施したのではないのですか？"
1010405-69 = "監察官に口答えする気か！？"
1010405-73 = "先生、どうすれば……。"
1010405-74 = "[s] \"……カンフーだよ、レイジョ！\""
1010405-75 = "か、カンフーですか？"
1010405-76 = "[s] \"カンフーの教えを思い出してみて！\""
1010405-81 = "（カンフーの教え……）"
1010405-85 = "（考えろ、そして感じろ……）"
1010405-86 = "（今の私が感じているもの、それは……）"
1010405-87 = "（……怒り）"
1010405-88 = "（でも、それだけでは解決になりません）"
1010405-89 = "（考えなくては……怒りを乗り越えるためには……）"
1010405-90 = "（そうです！更なる怒りを呼び起こせば……！）"
1010405-92 = "……あなたが仰るように、#n心構えがなっていないのかもしれません。"
1010405-93 = "[s] \"レイジョ！？\""
1010405-94 = "なんだ、ようやく理解したのか？"
1010405-95 = "はい。"
1010405-96 = "つまり、これで今後は玄龍門にお菓子の納品を行えなくなりますね。"
1010405-97 = "な、何だって！？"
1010405-98 = "特に玄龍門でも人気の高い#nフルーツゼリーやチョコレート、クッキー、きな粉餅は……。"
1010405-99 = "金輪際、目にする機会すらないでしょう。"
1010405-100 = "ちょっと待ってくれ、それは……！"
1010405-101 = "どうして、そんなに慌てているのですか？"
1010405-102 = "まさか、山海経の伝統を守る心構えがなっていないと難癖をつけた相手から……"
1010405-103 = "都合良く自分たちに必要な商品だけ手に入れようだなんて、#nおかしな話でしょう？"
1010405-104 = "そうですよね？監察官？"
1010405-105 = "そ、それとこれとは話が……！"
1010405-108 = "（結局、監察官はレイジョにひたすら謝罪をした……）"
1010405-110 = "色々ありましたが、無事に監査を終えましたね。"
1010405-111 = "やはり、カンフーの教えは何事にも通じるのだと実感しました！"
1010405-113 = "（無邪気で元気いっぱいのレイジョに対して……）"
1010405-114 = "（私は、ただた[ruby=うなず]だ頷く[/ruby]しかなかった）"
