[translation]
80000109-1 = "戦略リーダーの恩返し"
80000109-2 = "（カホから連絡をもらい、陰陽部の部室を訪ねた）"
80000109-3 = "お忙しい中、お越しいただきありがとうございます、先生。"
80000109-4 = "[s1] \"いつでも大歓迎だよ。\"\n[s2] \"今日は何を手伝えばいいのかな？\""
80000109-7 = "ありがとうございます。#nですが、今日お呼びしたのは仕事をお願いしたいからではなく……"
80000109-8 = "実は、先生に差し上げたい物がありまして……"
80000109-9 = "こちらなのですが……"
80000109-10 = "[s3] \"えーっと、今日はたしか……\"\n[s4] \"もしかして、アレかな？\""
80000109-13 = "は、はい？"
80000109-14 = "それは、その……"
80000109-15 = "ううっ！"
80000109-17 = "（ま、まだ心の準備が……！）"
80000109-18 = "（こういうときは……そうです、まずはアレを……！）"
80000109-20 = "こ、こほん！今日先生に差し上げる物は！！"
80000109-21 = "バレンタインデーを記念して特別に用意した――"
80000109-22 = "ひゃ、ひゃ、百鬼夜行連合学院の広報グッズです！"
80000109-23 = "いろんな部活や商店街の皆さんに作成していただきました！"
80000109-24 = "そこで、いつも助けていただいている先生にも、お渡ししようと思いまして……"
80000109-25 = "[s] \"……私の勘違いだったんだ。でも嬉しいよ、ありがとう！\""
80000109-26 = "は、はい！？いえ！"
80000109-27 = "今日は、このために先生をお招きしたのですが……"
80000109-28 = "や、やはりシャーレまで送った方がよろしかったでしょうか？"
80000109-29 = "[s5] \"ううん、せっかくなら直接受け取りたかったから。\"\n[s6] \"カホはいつも仕事熱心で誠実だね。\""
80000109-32 = "はい！？あ、いえ……"
80000109-33 = "誠実だなんて、むしろ今日の私は不誠実、と言いますか……"
80000109-34 = "……う、罪悪感が……"
80000109-35 = "[s] \"罪悪感って？\""
80000109-36 = "な、何でもありません。まだ心の準備が……"
80000109-37 = "そ、それでは広報グッズの説明をいたします！"
80000109-38 = "これは工芸協会が作ったチョコレートキーホルダーです。#n繊細な職人の技が込められております！"
80000109-39 = "それから……"
80000109-41 = "こちらは陶芸部が作った……ち、チョコレートの器、です。"
80000109-42 = "また、これは……"
80000109-44 = "これはですね、焼きそば研究会が考案したチョコレート焼きそばで……"
80000109-45 = "っ！お、落としてしまうところでした……ふぅ。"
80000109-47 = "そして、最後なのですが……#nこれは、お菓子職人が作った、チョコレートです。"
80000109-48 = "……め、召し上がってみますか？"
80000109-49 = "（そう言いながらチョコレートを持つカホの手は震えていた）"
80000109-50 = "[s] \"カホ、大丈夫？手がすごく震えてるけど……\""
80000109-51 = "はい？ち、違います！"
80000109-52 = "さっきから、どこか上の空に見える、と……？"
80000109-53 = "そ、それは……"
80000109-54 = "……ふぅ。これ以上、逃げていても仕方ないですね……"
80000109-55 = "く、[ruby=くわかみ]桑上[/ruby]カホ、決めました！"
80000109-56 = "じ、実は、その……"
80000109-57 = "今日、先生をお呼びしたのは、これをお渡しするためで……"
80000109-63 = "……受け取って、いただけますでしょうか？"
80000109-64 = "いつもお世話になっている先生に、少しでも恩返しがしたくて作ったのですが……"
80000109-65 = "いざ渡そうと思ったら、恥ずかしくなってしまい……"
80000109-66 = "[s] \"ごめんね、言い出しにくかったよね。\""
80000109-67 = "い、いえ……私が一人で空回って、先生を困らせてしまいました。"
80000109-68 = "……仕事の話にかこつけてチョコレートを渡すなんて、広報支援部の戦略リーダーとしてあまりにも不誠実です！"
80000109-69 = "こんな姿をお見せしてしまい、申し訳ございません！"
80000109-70 = "[s7] \"そんなことないよ。\"\n[s8] \"カホにチョコレートをもらえて、すごく嬉しいよ。\""
80000109-75 = "しかし、私は先生に嘘をついたも同然です。"
80000109-76 = "なのに、そう仰っていただけるのですか？"
80000109-77 = "[ns] \"気持ちを伝えるのって、難しいからね。\""
80000109-79 = "[ns] \"チョコレート、後で頂くね。\""
80000109-83 = "……はい、先生。"
80000109-84 = "ちゃんと渡せて、良かったです。"
80000109-85 = "……私の気持ちも、どうか伝わりますように。"
80000109-87 = "（……チョコレートは、カホの優しさを感じる味だった）"
