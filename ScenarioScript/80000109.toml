[translation]
80000109-1 = "A retribuição da líder estratégica"
80000109-2 = "（Recebi uma mensagem de Kaho e fui até a sala do Departamento de Yin-Yang）"
80000109-3 = "Obrigada por vir, mesmo estando tão ocupado, Sensei."
80000109-4 = "[s1] \"Sempre é um prazer.\"\n[s2] \"Em que posso ajudar hoje?\""
80000109-7 = "Obrigada. #nMas não chamei você hoje para pedir ajuda com o trabalho..."
80000109-8 = "Na verdade, tem algo que eu gostaria de lhe entregar..."
80000109-9 = "É isto aqui..."
80000109-10 = "[s3] \"Hum, hoje é...\"\n[s4] \"Será que é aquilo?\""
80000109-13 = "S-sim?"
80000109-14 = "Isso é, bem..."
80000109-15 = "Ugh!"
80000109-17 = "（A-ainda não estou preparada mentalmente...!）"
80000109-18 = "（Nessas horas... isso mesmo, primeiro preciso fazer aquilo...!）"
80000109-20 = "C-cof, cof! O que vou entregar ao Sensei hoje é!!"
80000109-21 = "Preparado especialmente para comemorar o Dia dos Namorados —"
80000109-22 = "É um brinde promocional da Academia Hyakkiyako!"
80000109-23 = "Vários clubes e o pessoal do distrito comercial me ajudaram a criar!"
80000109-24 = "Então, pensei em entregar para você, Sensei, que sempre nos ajuda..."
80000109-25 = "[s] \"...Entendi, eu me enganei. Mas fico feliz, obrigado!\""
80000109-26 = "S-sim!? Não, não!"
80000109-27 = "Eu chamei o Sensei hoje justamente para isso, mas..."
80000109-28 = "S-será que teria sido melhor enviar para o Schale?"
80000109-29 = "[s5] \"Não, eu queria receber pessoalmente.\"\n[s6] \"Kaho, você é sempre tão dedicada e sincera no trabalho.\""
80000109-32 = "Sim!? Ah, não..."
80000109-33 = "Dizer que sou sincera... na verdade, hoje estou sendo insincera, por assim dizer..."
80000109-34 = "...Ugh, a culpa..."
80000109-35 = "[s] \"Culpa?\""
80000109-36 = "N-não é nada. É que ainda não estou preparada..."
80000109-37 = "B-bem, então vou explicar sobre os brindes promocionais!"
80000109-38 = "Este é um chaveiro de chocolate feito pela Associação de Artesanato. #nContém a técnica delicada dos artesãos!"
80000109-39 = "E também..."
80000109-41 = "Este foi feito pelo Clube de Cerâmica... é um, bem, um recipiente de chocolate."
80000109-42 = "Além disso, isto aqui..."
80000109-44 = "Isto é um yakisoba de chocolate, uma ideia do Clube de Pesquisa de Yakisoba..."
80000109-45 = "Ah! Quase deixei cair... Ufa."
80000109-47 = "E, por último... #nIsto é um chocolate feito por um confeiteiro."
80000109-48 = "...V-você gostaria de experimentar?"
80000109-49 = "（Enquanto dizia isso, as mãos de Kaho, que seguravam o chocolate, tremiam）"
80000109-50 = "[s] \"Kaho, você está bem? Suas mãos estão tremendo muito...\""
80000109-51 = "Sim? N-não é isso!"
80000109-52 = "Você disse que eu parecia distraída desde agora...?"
80000109-53 = "I-isso é..."
80000109-54 = "...Ufa. Não adianta mais tentar fugir..."
80000109-55 = "Eu, Kaho Kuwakami, decidi!"
80000109-56 = "N-na verdade, é que..."
80000109-57 = "Chamei o Sensei hoje para lhe entregar isto..."
80000109-63 = "...Você poderia aceitar?"
80000109-64 = "Fiz isso porque queria retribuir, mesmo que um pouco, ao Sensei que sempre cuida de nós..."
80000109-65 = "Mas quando chegou a hora de entregar, fiquei com vergonha..."
80000109-66 = "[s] \"Desculpe, deve ter sido difícil falar, né?\""
80000109-67 = "N-não... fui eu que me precipitei e acabei te causando problemas, Sensei."
80000109-68 = "……Usar o trabalho como desculpa para entregar chocolates é algo extremamente desonesto para uma líder de estratégia do Departamento de Apoio de Relações Públicas!"
80000109-69 = "Sinto muito por ter que presenciar uma cena dessas!"
80000109-70 = "[s7] \"Não é nada disso.\"\n[s8] \"Fico muito feliz em receber chocolates da Kaho.\""
80000109-75 = "Mas, no fim das contas, é como se eu tivesse mentido para você, Sensei."
80000109-76 = "Mesmo assim, você ainda diz essas coisas para mim?"
80000109-77 = "[ns] \"É que expressar sentimentos é algo difícil, não é?\""
80000109-79 = "[ns] \"Vou comer o chocolate mais tarde, viu?\""
80000109-83 = "……Sim, Sensei."
80000109-84 = "Fico feliz que tenha conseguido entregar."
80000109-85 = "……Espero, do fundo do coração, que meus sentimentos cheguem até você."
80000109-87 = "(……O chocolate tinha um gosto que me fez sentir a gentileza da Kaho)"
