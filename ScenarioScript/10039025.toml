[translation]
10039025-2 = "皆さん、お疲れ様でした～！"
10039025-3 = "ん、捕獲した。"
10039025-4 = "アヤネちゃんたちを「捕獲」する日が来るとは思わなかったけどね～。"
10039025-6 = "思えば対策委員会は、何かあるたびに誰かを捕獲しているような……。"
10039025-7 = "[s1] \"……そうかも。\"\n[s2] \"となると、次は……。\""
10039025-13 = "……？"
10039025-14 = "それはどういう意味で……？"
10039025-15 = "……あ、ただの独り言でしたか。"
10039025-16 = "さて、二人とも！"
10039025-17 = "そろそろお披露目の時間ですよ～！"
10039025-18 = "わ、分かったわよ……！"
10039025-19 = "うぅ……！"
10039025-20 = "笑ったら絶対に許さないんだからね！"
10039025-21 = "じゃ、じゃあ……。"
10039025-32 = "[ns3] \"……！？\"\n[ns4] \"……わぁ。\"\n[ns5] \"……ビックリした。\""
10039025-37 = "…………！"
10039025-38 = "……すごい、です。"
10039025-39 = "[ns6] \"マリー？\"\n[ns7] \"大丈夫……？\""
10039025-43 = "何も言わなくていいからっ！"
10039025-44 = "皆さんの前で、こんな恥ずかしい格好を……。"
10039025-46 = "うんうん、二人ともよく似合ってますね！"
10039025-47 = "……はあぁ、何度もデザインを修正してもらった甲斐がありました。"
10039025-49 = "そ、そこまで嬉しいものなの……？"
10039025-50 = "これ、布面積が……！"
10039025-51 = "……せ、せせせ先生！？"
10039025-52 = "っっ、どうして先生がいるのよ！"
10039025-57 = "ちょっと、聞いてないんだけど！"
10039025-58 = "そんなに見られると……！"
10039025-59 = "[s8] \"二人とも、可愛いね。\"\n[s9] \"よく似合ってるよ。\""
10039025-62 = "うぅ……。"
10039025-63 = "お世辞なんていらないんだから！"
10039025-64 = "いえ、すごく似合ってますよ！"
10039025-65 = "……私も着てみたい、と思うくらいです。"
10039025-66 = "本当に……？#nって先生、この人は？"
10039025-70 = "シスターフッドの？ど、どうしてシスターさんがここに？"
10039025-71 = "……え？"
10039025-72 = "私たちからアイドルについて教わるために来たの……？"
10039025-76 = "先生だけなら信じられなかったけど、#nシスターさんが言うなら嘘じゃなさそうね。"
10039025-80 = "[ns10] \"……えっ？\"\n[ns11] \"ひどい言われような気が……。\""
10039025-83 = "……？"
10039025-84 = "当たり前じゃない！#n先生ってば、いつも褒めてばかりなんだから！"
10039025-86 = "あはは……。"
10039025-87 = "これは先生が悪いねぇ～。"
10039025-88 = "[s12] \"正直に言ってるだけなのに……。\"\n[s13] \"全部本心だから！二人のライブを応援してるよ！\""
10039025-94 = "まったく……。"
10039025-95 = "せ、先生……。"
10039025-99 = "……セリカちゃん。"
10039025-100 = "その、まだ嫌かもしれないけど……。"
10039025-101 = "ああもう、分かったわよ！#nやれば良いんでしょう、やれば！"
10039025-102 = "約束したわけだし、仕方なくなんだから！"
10039025-103 = "実はアイドルに興味があったとか、#n可愛い衣装を着てみたかったわけじゃないですから！"
10039025-104 = "そうだよね、セリカちゃん！"
10039025-105 = "そっかそっか、後輩の言葉は信じてあげないとね～。"
10039025-106 = "う、うるさいっ！"
10039025-108 = "ん、私も手伝う。"
10039025-109 = "そういうことにしておきましょうか☆"
10039025-110 = "ふふ……。"
10039025-111 = "先生、マリーさん、助けていただいて本当にありがとうございました！"
10039025-112 = "お礼と言っては何ですが……。"
10039025-113 = "衣装作成をしている業者さんの連絡先と指示書のコツをお教えしますね！"
10039025-115 = "（その後、ノノミからアイドルについて色々と教えてもらった）"
10039025-125 = "衣装、クリア"
