[translation]
10039025-2 = "Pessoal, bom trabalho a todos!"
10039025-3 = "Hum, capturado."
10039025-4 = "Nunca pensei que chegaria o dia em que eu 'capturaria' a Ayane e as outras~."
10039025-6 = "Pensando bem, parece que o Comitê de Contramedidas está sempre capturando alguém toda vez que algo acontece..."
10039025-7 = "[s1] \"……Talvez seja verdade.\"\n[s2] \"Sendo assim, quem será o próximo……?\""
10039025-13 = "……?"
10039025-14 = "O que você quer dizer com isso……?"
10039025-15 = "……Ah, foi só um pensamento em voz alta?"
10039025-16 = "Bem, vocês duas!"
10039025-17 = "Está na hora da revelação!"
10039025-18 = "T-tá bom, eu já entendi……!"
10039025-19 = "Uuu……!"
10039025-20 = "Se você rir, eu não vou te perdoar, entendeu?!"
10039025-21 = "B-bem, então……."
10039025-32 = "[ns3] \"……!?\"\n[ns4] \"……Uau.\"\n[ns5] \"……Que susto.\""
10039025-37 = "…………!"
10039025-38 = "……É incrível."
10039025-39 = "[ns6] \"Mari?\"\n[ns7] \"Você está bem……?\""
10039025-43 = "Não precisa dizer nada!"
10039025-44 = "Estar vestida assim na frente de todo mundo é tão vergonhoso……."
10039025-46 = "Sim, sim, as duas ficaram ótimas!"
10039025-47 = "……Ah, valeu a pena ter pedido para ajustar o design tantas vezes."
10039025-49 = "É, é tão gratificante assim……?"
10039025-50 = "Isso aqui, a quantidade de tecido……!"
10039025-51 = "……P-p-p-professor!?"
10039025-52 = "Ah, por que o professor está aqui!"
10039025-57 = "Ei, ninguém me avisou disso!"
10039025-58 = "Se ficar olhando desse jeito……!"
10039025-59 = "[s8] \"Vocês duas estão lindas.\"\n[s9] \"Combina muito com vocês.\""
10039025-62 = "Uuu……."
10039025-63 = "Não preciso de elogios falsos!"
10039025-64 = "Não, vocês estão realmente lindas!"
10039025-65 = "……A ponto de eu mesma querer experimentar."
10039025-66 = "Sério……?#nMas professor, quem é essa pessoa?"
10039025-70 = "Da Sisterhood? P-por que uma irmã está aqui?"
10039025-71 = "……Eh?"
10039025-72 = "Você veio aprender sobre idols com a gente……?"
10039025-76 = "Se fosse só o professor, eu não acreditaria, mas#nse uma irmã está dizendo, não deve ser mentira."
10039025-80 = "[ns10] \"……Eh?\"\n[ns11] \"Sinto que fui ofendida…….\""
10039025-83 = "……?"
10039025-84 = "É óbvio!#nProfessor, você vive elogiando todo mundo!"
10039025-86 = "Ahaha……."
10039025-87 = "A culpa é sua, professor~."
10039025-88 = "[s12] \"Mas eu só estou sendo sincero…….\"\n[s13] \"É tudo verdade! Estou torcendo pelo show de vocês!\""
10039025-94 = "Francamente……."
10039025-95 = "P-professor……."
10039025-99 = "……Serika."
10039025-100 = "Bem, eu sei que talvez você ainda não queira……."
10039025-101 = "Ah, tá bom, eu já entendi!#nÉ só fazer, né? Eu faço!"
10039025-102 = "Nós prometemos, então não tenho escolha!"
10039025-103 = "Na verdade, não é como se eu tivesse interesse em ser uma idol ou quisesse vestir roupas fofas!"
10039025-104 = "É verdade, Serika-chan!"
10039025-105 = "Entendi, entendi. Temos que acreditar nas palavras da nossa kouhai, né~."
10039025-106 = "C-cala a boca!"
10039025-108 = "Hum, eu também vou ajudar."
10039025-109 = "Vamos deixar por isso mesmo, então☆"
10039025-110 = "Fufu..."
10039025-111 = "Sensei, Mari-san, muito obrigada por me ajudarem!"
10039025-112 = "Não é muito, mas como forma de agradecimento..."
10039025-113 = "Vou passar o contato da empresa que faz as roupas e algumas dicas de como fazer as instruções!"
10039025-115 = "(Depois disso, Nonomi me ensinou várias coisas sobre idols)"
10039025-125 = "Traje, concluído"
