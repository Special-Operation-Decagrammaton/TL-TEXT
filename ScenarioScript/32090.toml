[translation]
32090-1 = "Episódio 9;A Mão Negra"
32090-3 = "[ns] \"Eu não pretendo gastar tempo desconfiando de alguém.\""
32090-4 = "……?"
32090-5 = "[s] \"Só vou dar o meu melhor pra que o esforço daquelas meninas seja recompensado.\""
32090-6 = "……."
32090-7 = "Deixa eu, mais uma vez, tentar explicar? Por que justamente elas."
32090-8 = "Imagino que o senhor também tenha várias redes de informação, mas…… vou falar em ordem."
32090-9 = "Primeiro, a Koharu é uma existência para controlar a Hasumi."
32090-10 = "A Hasumi odeia Gehenna mais do que qualquer uma. É uma existência tipo bomba-relógio, da qual não se sabe quando nem o que vai aprontar."
32090-11 = "E a Hanako, apesar de, por origem, ter um talento mais brilhante que qualquer uma, agora, de propósito, não dá o seu máximo nas provas. É um estado em que não dá pra entender de jeito nenhum o que ela trama."
32090-12 = "A Azusa, a própria existência dela, de origem, já é cheia de pontos suspeitos. Além disso, é uma existência incontrolável, que se envolveu em vários casos de violência com outras alunas."
32090-13 = "A Hifumi, é……"
32090-14 = "[s] \"A Nagisa, com a Hifumi……\""
32090-15 = "……Sim. Pois é. O sentimento pela Hifumi é…… bem especial."
32090-16 = "Eu penso na Hifumi com muito carinho. Eu gosto dela…… quanto a isso, não há erro."
32090-17 = "Mas…… houve uma informação de que a verdadeira identidade daquela menina é, na verdade, a de líder de um grupo criminoso terrível."
32090-18 = "[s] \"………\""
32090-19 = "É justamente esse tipo de história que dá mais medo. Justamente por confiar, alguma coisa fica invisível…… fico me perguntando se não estou num estado cego."
32090-20 = "Por mais cuidado que se tenha ao erguer uma torre, ela desmorona fácil a partir de uma pequena rachadura……."
32090-21 = "Será que eu compreendo a Hifumi de verdade, ou será que, no fim, há uma verdade que eu não conheço…… eu não sei."
32090-22 = "[s] \"É um mal-entendido…… tem uma explicação direitinho, e eu também vou explicar――\""
32090-23 = "Como?"
32090-24 = "É possível provar? O coração da Hifumi, o que ela realmente sente, a sua verdadeira intenção; como você pretende provar isso?"
32090-25 = "\"Não é isso\", \"é um mal-entendido\", \"tem uma explicação\"…… que valor há nessas palavras? Que grau de veracidade?"
32090-26 = "……O conteúdo de um coração não é algo que se possa provar."
32090-27 = "O coração gentil da Hifumi, o jeito educado, a bondade…… por mais que eu conheça tudo isso de doer, não dá pra conhecer o que ela de fato sente."
32090-28 = "É natural…… por mais que a gente se esforce, no fim, somos apenas \"o outro\"."
32090-29 = "[s] \"………\""
32090-30 = "Por isso, só resta expulsá-las. Pelo Tratado do Éden…… pelo sucesso dele."
32090-31 = "[s] \"……Acho que eu entendi.\""
32090-32 = "……?"
32090-33 = "[s] \"Nagisa. Você, agora, com certeza está na escuridão da paranoia.\""
32090-34 = "……Hã? Escuridão da paranoia……?"
32090-35 = "[s] \"Acho que você só vê o que quer ver, e só acredita no que quer acreditar.\""
32090-36 = "……."
32090-37 = "[s1] \"Eu vou te tirar dessa escuridão.\"\n[s2] \"E, sem falta, vou fazer o pessoal do Clube de Aulas de Reforço passar.\""
32090-38 = "……Ufu, é mesmo?"
32090-39 = "……Ufu, é mesmo?"
32090-40 = "Compreendi. Bom, ou seja, a conversa ficou simples, né."
32090-41 = "……Entendido. Por favor, esforce-se, Sensei."
32090-46 = "Eu, do meu jeito, vou me esforçar."
32090-47 = "[ns] Deixa o local por um momento."
32090-51 = "Próximo Episódio;2º Exame Especial de Aptidão (1)"
