[translation]
32090-1 = "Episódio 9: Mão Negra"
32090-3 = "[ns] \"Eu não tenho intenção de gastar tempo suspeitando de ninguém.\""
32090-4 = "……？"
32090-5 = "[s] \"Só quero me esforçar ao máximo pra que o esforço delas seja recompensado.\""
32090-6 = "……。"
32090-7 = "Vou explicar de novo, direitinho. Por que justamente elas."
32090-8 = "Você também deve ter suas fontes de informação, mas vou contar na ordem."
32090-9 = "Primeiro, a Koharu-san é uma peça pra controlar a Hasumi-san."
32090-10 = "A Hasumi-san odeia Gehenna mais do que qualquer um. Ela é como uma bomba-relógio, nunca se sabe quando vai explodir."
32090-11 = "A Hanako-san, por outro lado, tinha um talento absurdo, mas agora tá reprovando de propósito. Não faço ideia do que ela tá planejando."
32090-12 = "A Azusa-san… desde o começo a existência dela já é suspeita pra caralho. Além disso, ela vive se envolvendo em brigas violentas com outras alunas, é completamente incontrolável."
32090-13 = "A Hifumi-san, é……"
32090-14 = "[s] \"A Nagisa pensa na Hifumi como……\""
32090-15 = "……Sim. Isso mesmo. Meus sentimentos pela Hifumi-san são… bastante especiais."
32090-16 = "Eu gosto muito da Hifumi-san. Eu gosto dela… isso não tem erro."
32090-17 = "Mas… surgiu informação de que a verdadeira identidade dela é a líder de uma organização criminosa terrível."
32090-18 = "[s] \"………。\""
32090-19 = "Esse tipo de coisa é o que mais assusta. Justamente porque eu confiava tanto, pode ser que eu esteja cega… sem conseguir ver a verdade."
32090-20 = "Não importa o quão alto você construa a torre, uma pequena rachadura basta pra derrubar tudo……"
32090-21 = "Será que eu realmente entendo a Hifumi-san？ Ou será que existe uma verdade que eu ainda não conheço…… eu não sei."
32090-22 = "[s] \"……É um mal-entendido. Tem uma explicação, e eu também posso――\""
32090-23 = "Como？"
32090-24 = "Você consegue provar？ Como vai provar o coração dela, o que ela sente de verdade, os sentimentos mais profundos？"
32090-25 = "Não é isso, é mal-entendido, tem uma explicação… essas palavras, quanto peso elas realmente têm？ Quanta verdade？"
32090-26 = "……O interior do coração humano não pode ser provado."
32090-27 = "Por mais que eu conheça o coração gentil dela, a educação, a bondade… eu não consigo conhecer os verdadeiros sentimentos."
32090-28 = "É óbvio…… no final das contas, nós somos apenas «estranhos»."
32090-29 = "[s] \"………。\""
32090-30 = "Por isso, não tem jeito. Só resta expulsá-las. Pelo sucesso do Tratado de Eden."
32090-31 = "[s] \"……Talvez eu tenha entendido.\""
32090-32 = "……？"
32090-33 = "[s] \"Nagisa. Agora você tá mergulhada numa escuridão cheia de suspeitas.\""
32090-34 = "……Hã？ Escuridão cheia de suspeitas……？"
32090-35 = "[s] \"Você só vê o que quer ver e acredita no que quer acreditar.\""
32090-36 = "……。"
32090-37 = "[s1] \"Vou te tirar daí.\"\n[s2] \"E vou garantir que todo o Clube de Reforço passe.\""
32090-38 = "……Fufu, entendi."
32090-39 = "……Fufu, entendi."
32090-40 = "Entendi. Ou seja, a conversa ficou mais simples."
32090-41 = "……Entendido. Então se esforce, Sensei."
32090-46 = "Eu também vou me esforçar do meu jeito."
32090-47 = "[ns] Sai do local."
32090-51 = "Próximo; 2ª Prova Especial (1)"