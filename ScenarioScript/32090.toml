[translation]
32090-1 = "Episódio 9; Mão Negra"
32090-3 = "[ns] \"Eu não pretendo gastar meu tempo suspeitando de ninguém.\""
32090-4 = "……？"
32090-5 = "[s] \"Eu apenas farei o meu melhor para que o esforço daquelas crianças seja recompensado.\""
32090-6 = "……。"
32090-7 = "Que tal explicarmos novamente? Por que elas?"
32090-8 = "Imagino que o Sensei também tenha suas próprias redes de informação, mas... vamos conversar em ordem."
32090-9 = "Primeiro, a Koharu-san existe para controlar a Hasumi-san."
32090-10 = "A Hasumi-san odeia a Gehenna mais do que qualquer um. Ela é como uma bomba-relógio que pode explodir a qualquer momento."
32090-11 = "E a Hanako-san, apesar de ter um talento superior ao de qualquer outra pessoa, agora não está se esforçando de propósito nas provas. É um estado em que não consigo entender de jeito nenhum o que ela está planejando."
32090-12 = "A Azusa-san, para começar, tem vários pontos suspeitos em sua própria existência. Além disso, ela já se envolveu em incidentes violentos com outras alunas várias vezes, sendo uma existência incontrolável."
32090-13 = "A Hifumi-san, ela..."
32090-14 = "[s] \"Nagisa, sobre a Hifumi...\""
32090-15 = "……Sim. É isso mesmo. Meus sentimentos pela Hifumi-san são... bastante especiais."
32090-16 = "Eu considero a Hifumi-san muito importante. Eu gosto dela... disso não há dúvidas."
32090-17 = "Mas... recebi informações de que a verdadeira identidade dela é, na verdade, a líder de um terrível grupo criminoso."
32090-18 = "[s] \"………。\""
32090-19 = "Esse tipo de conversa é, na verdade, o que mais me assusta. Justamente por eu confiar nela, talvez eu não esteja conseguindo ver algo... talvez eu esteja cega."
32090-20 = "Não importa o quanto você se esforce para construir uma torre, ela pode desmoronar facilmente por causa de uma pequena rachadura..."
32090-21 = "Eu não sei se realmente entendo a Hifumi-san, ou se existe uma verdade que eu desconheço... Eu simplesmente não sei."
32090-22 = "[s] \"É um mal-entendido... Existem motivos, e eu também posso explicar corretamente—\""
32090-23 = "Como?"
32090-24 = "Você pode provar? Como você pretende provar o coração, os sentimentos verdadeiros e as intenções da Hifumi-san?"
32090-25 = "Não é isso, é um mal-entendido, existem motivos... Que significado essas palavras têm? Que veracidade elas possuem?"
32090-26 = "……O conteúdo de um coração não é algo que possa ser provado."
32090-27 = "O coração gentil da Hifumi-san, sua educação, sua bondade... mesmo sabendo disso até doer, não posso conhecer suas verdadeiras intenções."
32090-28 = "É natural... não importa o quanto tentemos, no fim das contas, somos apenas \"estranhos\"."
32090-29 = "[s] \"………。\""
32090-30 = "Por isso, não há escolha a não ser expulsá-la. Pelo sucesso... do Tratado do Éden."
32090-31 = "[s] \"……Acho que entendi.\""
32090-32 = "……？"
32090-33 = "[s] \"Nagisa. Você agora está, com certeza, na escuridão da paranoia.\""
32090-34 = "……Sim? A escuridão da... paranoia?"
32090-35 = "[s] \"Acho que você só está vendo o que quer ver e acreditando apenas no que quer acreditar.\""
32090-36 = "……。"
32090-37 = "[s1] \"Eu vou tirar você daí.\"\n[s2] \"E, definitivamente, farei com que todas do Clube de Estudos Suplementares sejam aprovadas.\""
32090-38 = "……Fufu, é mesmo?"
32090-39 = "……Fufu, é mesmo?"
32090-40 = "Entendido. Bem, em suma, a conversa ficou mais simples, não é?"
32090-41 = "……Compreendido. Por favor, faça o seu melhor, Sensei."
32090-46 = "Eu farei o meu melhor à minha maneira."
32090-47 = "[ns] Sai do local."
32090-51 = "Próximo episódio; 2º Exame Acadêmico Especial (1)"
