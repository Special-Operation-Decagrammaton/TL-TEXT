[translation]
2002002-1 = "天才ハッカーの嗜好"
2002002-2 = "（ヒマリから連絡をもらって、ミレニアムの部室棟までやって来た）"
2002002-5 = "ミレニアムサイエンススクール・第8部室棟の廊下"
2002002-7 = "[ns] \"ヒマリから送られてきた場所はここだけど……。\""
2002002-11 = "（その時、何かが風の音を立てながら近づいてきた）"
2002002-15 = "[ns] \"これって……ミレニアムの警備ドローン？\""
2002002-23 = "[ns] \"あ、ついてきてってことかな？\""
2002002-28 = "（ドローンに導かれるがまま進むと、そこは奥まったところにある部室だった）"
2002002-32 = "（扉の横に貼られたドアプレートには、こんな言葉が書かれていた）"
2002002-33 = "[ns] \"「息継ぎNG・円周率暗唱部」……？\""
2002002-40 = "お待ちしておりました、先生。お入りください。"
2002002-50 = "ふふっ、時間通りですね。ようこそいらっしゃいました。"
2002002-54 = "案内、ご苦労さまでした。持ち場に戻ってくださいね。"
2002002-60 = "[ns] \"ヒマリ？今のドローンは……。\""
2002002-61 = "ミレニアムの警備ドローンですよ？"
2002002-62 = "私は病弱美少女ですから、直接先生をお出迎えするのは難しいので。#nたまたま部室近くを警備していたドローンをハッキングし……"
2002002-68 = "……ええ、少しお借りしただけですとも。"
2002002-69 = "あの子たち、可愛らしくて良い子でしょう？"
2002002-70 = "案内役として最適だと思うのです。"
2002002-74 = "[ns] \"またそんなことを……\""
2002002-76 = "[ns1] \"それで、ここはどこなの？\"\n[ns2] \"ドアプレートには、なんか妙な名前が書かれてたような……。\""
2002002-79 = "えっ……。#nそ、そんなに変な名前でしょうか……？"
2002002-80 = "……何か良い名前はないかと、三日三晩熟考を重ねた末に至った、とても知的で上品かつ、正体を隠すのにピッタリな……"
2002002-81 = "まさにミレニアムが誇る天才美少女らしい良い名前だと思ったのですが……。"
2002002-82 = "[s] （見るからに落ち込んでいる表情だ……！）"
2002002-84 = "[ns] \"いや、その……言葉のあやだよ。個性豊かで素敵な名前だね。\""
2002002-85 = "……ふふっ、うふふっ、そうでしょう？"
2002002-86 = "先生なら分かってくださると思いました♪"
2002002-87 = "誰もが認めるミレニアム最高の天才清楚系病弱美少女ハッカーこと……"
2002002-88 = "私、[ruby=あけぼし]明星[/ruby]ヒマリが考えた名前ですもの！"
2002002-92 = "[ns] \"……それで、ヒマリはなぜここに？\""
2002002-93 = "そうでした、まだ話の途中でしたね。"
2002002-94 = "一言で説明すると……そうですね。#nここは私だけの秘密の「隠れ家」とでも申しましょうか。"
2002002-95 = "[s] \"隠れ家？\""
2002002-96 = "はい。普段使用している特異現象捜査部とヴェリタスの部室は、「ビッグシスター」の監視下にありますからね。"
2002002-97 = "そこでミレニアムの管理システムをハッキングして、使われていない部室の許可証を発行したので、ここは私だけの空間となりました。"
2002002-98 = "……なぜそこまでするのか、ですか？"
2002002-99 = "もちろん、休息のためです。#n私のような超天才清楚系病弱美少女には、おやすみの時間が……"
2002002-100 = "いえ、脳の休息が必要不可欠なのです。"
2002002-101 = "[s3] \"なるほど。でも行き来してるうちに場所がバレるんじゃない？\"\n[s4] \"さっきのドローンとか、あちこちにある防犯カメラとか……。\""
2002002-102 = "ふふっ。その程度のこと、この天才美少女ハッカーにとっては問題になりません。"
2002002-103 = "ふふっ。その程度のこと、この天才美少女ハッカーにとっては問題になりません。"
2002002-104 = "ドローンの警備ルートはもちろんの事、必要に応じてハッキングし、ルート修正をするくらい造作もありません。"
2002002-105 = "防犯カメラの死角も頭に入っていますし、ちょっとした映像の差し替えくらい赤子の手をひねるようなものです。"
2002002-111 = "私に隙などありません、無敵です！ふふふふふっ。"
2002002-112 = "[s5] \"流石はヒマリ、スケールが違うね。\"\n[s6] \"でもそんな大事な場所に、私が来ても良かったの……？\""
2002002-115 = "……はい。#nそれでしたら、何も問題ありません。"
2002002-116 = "来ていただいて良かったといいますか、来ていただかなければ困ったといえば良いのか……。"
2002002-117 = "[s] \"どういうこと？\""
2002002-118 = "先生もご存知のように、私という存在は常に衆目を集めています。#nそう、それはまるで雲の上に咲く一輪の花のように。"
2002002-119 = "立てば芍薬、座れば牡丹……ため息を吐く姿は百合の花――と評されている天才美少女ではありますが……。"
2002002-120 = "[s] \"よどみなくスラスラと……すごいね。\""
2002002-121 = "だからこそ、周囲に隙を見せてはいけないと思っております。"
2002002-122 = "しかし……いくら私のように隙一つない完璧美少女であっても、常に気を張って生きていくわけにはいきません。"
2002002-123 = "コホン……そうですね。#nここにお呼び立てした理由は……。"
2002002-124 = "たまには、その……ほっとできる時間といいますか……。"
2002002-125 = "何の見返りもなしに寄り添ってくれて、信頼できる人がいたらいいなと……。"
2002002-126 = "私のこのような一面を見せても一緒にいてくれる人の存在を思い出したのです。"
2002002-127 = "ですから……。"
2002002-128 = "[s] \"うん……？\""
2002002-129 = "……せっかく隠れ家を用意したものの、やはり一人で過ごすのは退屈でして。"
2002002-130 = "先生でしたら、その……"
2002002-131 = "私の話し相手になってくれるのではないかと思い……"
2002002-132 = "勝手なことではありますが……"
2002002-133 = "そのような理由で……"
2002002-134 = "来ていただいたといいますか……"
2002002-135 = "（チラッ）"
2002002-136 = "[s] \"なんだ。それならいつでも歓迎だよ、ヒマリ。\""
2002002-137 = "……ぁ。"
2002002-138 = "[s] \"ヒマリ？\""
2002002-142 = "あ、いえ……"
2002002-143 = "ふふっ。#nやはり私の予想通りでした。"
2002002-144 = "私の優れた頭脳にかかれば、一秒もかからずに導き出せましたけどね。#n今日は私の勝利です。"
2002002-148 = "[ns] \"いつから勝負になってたの……？\""
2002002-149 = "些細なことを気にしてはいけませんよ。#n「付き合う」と、そう言ってくだされば、それで十分なのです。"
2002002-150 = "……私たちの関係に「アンドゥ」はありませんので。"
2002002-151 = "[s] \"安心していいよ、ヒマリ。\""
2002002-152 = "ふふっ。"
2002002-158 = "では本日も一日よろしくお願いしますね、先生。"
2002002-161 = "（そうして、ヒマリとのんびりとした午後のひとときを過ごすことになった）"
2002002-166 = "……こうして先生と二人きりの時間を手に入れた今。"
2002002-167 = "普段の私なら、このあたりで天才病弱美少女の成し遂げた結果に「どや顔」するところですが……。"
2002002-168 = "残念ながら、一つだけ思い通りにならないことがあるのです。"
2002002-169 = "[s] \"どんな問題なの？\""
2002002-170 = "問題……というほどではありません。"
2002002-171 = "ご存知の通り、ミレニアムではお昼の校内放送でリクエスト曲が流れますよね。"
2002002-172 = "[s7] \"そんな話、初めて聞いたけど。\"\n[s8] \"あれ、そうだっけ……？\""
2002002-175 = "ミレニアムの生徒であれば、誰でも自由にリクエスト曲を申請できるのですが……"
2002002-176 = "なぜか私の送ったリクエスト曲がまったく選ばれないのです！"
2002002-177 = "何度も何度も申し込んでいるというのに、一体なぜなのでしょう。#n先生はどうお考えですか？"
2002002-178 = "きっと私の感性が先進的すぎるがゆえに、いつの間にか他の生徒たちと分かり合えない壁ができてしまったのでしょう。"
2002002-179 = "知らないうちに悲劇のヒロインになってしまったのですね……。"
2002002-180 = "[s] \"いや、そういうわけではないと思うけど……。\""
2002002-181 = "ただ私は素敵な曲をミレニアムの皆さんと共有したかっただけなのですが……"
2002002-182 = "……と、残念がっていた昨日までの私とは、今日でお別れです。"
2002002-183 = "今日は私と先生、二人の隠れ家を記念して……"
2002002-184 = "少々「特別な方法」に手を出してみましょうか。"
2002002-188 = "[ns] \"特別な方法……？\""
2002002-192 = "（スピーカーから校内放送が流れ始めた）"
2002002-197 = "ミレニアム校内放送をお聞きの皆さん、こんにちは！"
2002002-198 = "本日もお昼の時間がやってきました！#nさっそくリクエスト、いってみましょう！"
2002002-199 = "それでは一曲目のリクエストです。"
2002002-203 = "ラジオネーム「ミレニアム最高の清楚系美少女」さん……。"
2002002-207 = "あれ、またこの人……？"
2002002-208 = "あ、私のことですね。"
2002002-209 = "[s] \"だと思った！\""
2002002-210 = "え～、これを流すの……？"
2002002-215 = "いや、他にもリクエストはたくさん届いてるよね？"
2002002-216 = "……えっ、"
2002002-217 = "いきなりデータが消えた！？"
2002002-218 = "……ふふっ。"
2002002-222 = "[ns] \"ねえ、ヒマリ。まさかとは思うんだけど……。\""
2002002-223 = "いくらなんでも、これはちょっとなぁ……。"
2002002-228 = "あっ、ちょっと、なんで！"
2002002-232 = "誰か機械止めて！……止まらない！？どうして！？"
2002002-244 = "（スピーカーから哀愁漂う曲調の演歌が流れ始めた）"
2002002-248 = "[ns] \"ヒマリの言ってた素敵な曲って……。\""
2002002-249 = "以前、エンジニア部の部長からオススメされた曲です。"
2002002-250 = "[s] \"ヒマリは演歌が好きなんだ。\""
2002002-251 = "ふふっ。隠れ家でゆったりとくつろぎながら、先生と同じ時間を、好きな曲を共有する……。"
2002002-252 = "どうでしょう。風情を感じはしませんか？"
2002002-256 = "[ns] \"分かる気はするけど……。\""
2002002-258 = "[ns] \"うん……素敵な曲だね。\""
2002002-259 = "ええ、そうでしょう？ふふっ。"
2002002-261 = "（スピーカーの向こうで慌てる放送部員のドタバタ音とヒマリの流した演歌を聴きながら……）"
2002002-262 = "（夜の訪れまで、ヒマリと二人の時間を過ごした）"
