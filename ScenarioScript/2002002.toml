[translation]
2002002-1 = "O gosto de uma hacker genial"
2002002-2 = "（Recebi uma mensagem da Himari e vim até o prédio do clube de Millennium）"
2002002-5 = "Corredor do 8º Prédio de Clubes da Millennium Science School"
2002002-7 = "[ns] \"O local que a Himari enviou é aqui, mas...\""
2002002-11 = "（Nesse momento, algo se aproximou fazendo um som de vento）"
2002002-15 = "[ns] \"Isso é... um drone de segurança de Millennium?\""
2002002-23 = "[ns] \"Ah, será que é para eu seguir ele?\""
2002002-28 = "（Seguindo o drone, cheguei a uma sala de clube localizada em um canto isolado）"
2002002-32 = "（Na placa afixada ao lado da porta, estava escrito o seguinte）"
2002002-33 = "[ns] \"'Clube de Recitação de Pi sem Respirar'... ?\""
2002002-40 = "Estava à sua espera, Sensei. Por favor, entre."
2002002-50 = "Fufu, pontual como sempre. Seja muito bem-vindo."
2002002-54 = "Obrigada por me guiar. Pode voltar ao seu posto."
2002002-60 = "[ns] \"Himari? Aquele drone de agora...\""
2002002-61 = "É um drone de segurança de Millennium, não é?"
2002002-62 = "Como sou uma garota frágil e delicada, é difícil ir receber o Sensei pessoalmente. #nEntão, hackeei um drone que estava patrulhando perto da sala..."
2002002-68 = "…Sim, eu só peguei emprestado por um momento."
2002002-69 = "Elas são adoráveis e muito prestativas, não acha?"
2002002-70 = "Acho que são perfeitas para servir de guia."
2002002-74 = "[ns] \"Você e suas coisas...\""
2002002-76 = "[ns1] \"Mas então, onde estamos?\"\n[ns2] \"A placa na porta tinha um nome bem estranho...\""
2002002-79 = "Eh... #nÉ, é um nome tão estranho assim...?"
2002002-80 = "…Passei três dias e três noites pensando em um nome bom, e cheguei a este. É muito intelectual, elegante e perfeito para esconder minha identidade..."
2002002-81 = "Pensei que fosse um nome digno de uma garota genial e delicada de Millennium..."
2002002-82 = "[s] （Ela parece estar visivelmente deprimida...!）"
2002002-84 = "[ns] \"Não, é que... foi só uma força de expressão. É um nome único e maravilhoso.\""
2002002-85 = "…Fufu, ufufu, não é mesmo?"
2002002-86 = "Eu sabia que o Sensei entenderia♪"
2002002-87 = "Afinal, foi um nome pensado por mim, a hacker genial, pura e frágil de Millennium, reconhecida por todos..."
2002002-88 = "Eu, Akeboshi Himari!"
2002002-92 = "[ns] \"...Então, por que a Himari está aqui?\""
2002002-93 = "Ah, é verdade, eu ainda não terminei de explicar."
2002002-94 = "Em resumo... bem. #nPoderíamos dizer que este é o meu \"esconderijo\" secreto."

2002002-95 = "[s] \"Esconderijo?\""
2002002-96 = "Sim. As salas que uso normalmente, a do Departamento de Investigação de Fenômenos Estranhos e a da Veritas, estão sob a vigilância da 'Big Sister', sabe?"
2002002-97 = "Então, hackeei o sistema de gerenciamento de Millennium, emiti uma licença para uma sala que não estava sendo usada e transformei este lugar no meu espaço particular."
2002002-98 = "…Por que chegar a esse ponto, você pergunta?"
2002002-99 = "Claro, para descansar. #nPara uma garota genial, pura e frágil como eu, o tempo de descanso é..."
2002002-100 = "Não, o descanso do cérebro é indispensável."
2002002-101 = "[s3] \"Entendo. Mas não corre o risco de descobrirem o local enquanto você entra e sai?\"\n[s4] \"Com aquele drone de agora, e as câmeras de segurança por toda parte...\""
2002002-102 = "Fufu. Esse tipo de coisa não é problema para esta hacker genial."
2002002-103 = "Fufu. Esse tipo de coisa não é problema para esta hacker genial."
2002002-104 = "Não só conheço as rotas de patrulha dos drones, como também posso hackeá-los e corrigir as rotas conforme necessário, sem esforço algum."
2002002-105 = "Já decorei os pontos cegos das câmeras de segurança, e substituir as imagens é como tirar doce de criança."
2002002-111 = "Não tenho brechas, sou invencível! Fufufufu."
2002002-112 = "[s5] \"Como esperado da Himari, o nível é outro.\"\n[s6] \"Mas tudo bem eu vir a um lugar tão importante assim...?\""
2002002-115 = "…Sim. #nNesse caso, não há problema algum."
2002002-116 = "Na verdade, fico feliz que tenha vindo, ou melhor, seria um problema se você não tivesse vindo..."
2002002-117 = "[s] \"O que quer dizer com isso?\""
2002002-118 = "Como o Sensei sabe, minha existência sempre atrai muitos olhares. #nSim, como uma flor solitária que desabrocha acima das nuvens."
2002002-119 = "Dizem que, de pé, sou como uma peônia, sentada, como uma peônia arbórea... e que, ao suspirar, pareço uma flor de lírio — sou uma genial beldade, afinal... mas..."
2002002-120 = "[s] \"Fluente e sem hesitação... impressionante.\""
2002002-121 = "É justamente por isso que sinto que não posso demonstrar nenhuma brecha para quem está ao meu redor."
2002002-122 = "No entanto... por mais que eu seja uma beldade perfeita e sem falhas como eu, não dá para viver sempre em estado de alerta."
2002002-123 = "Ehem... bem. #nO motivo de eu ter chamado você aqui é..."
2002002-124 = "Às vezes, sabe... um momento para relaxar, por assim dizer..."
2002002-125 = "Eu gostaria que houvesse alguém em quem eu pudesse confiar e que ficasse ao meu lado sem pedir nada em troca..."
2002002-126 = "Lembrei-me de que existe alguém que permanece comigo mesmo vendo esse meu lado."
2002002-127 = "Por isso..."
2002002-128 = "[s] \"Hum...?\""
2002002-129 = "...Embora eu tenha preparado este esconderijo, passar o tempo sozinha é, de fato, entediante."
2002002-130 = "Se fosse você, Sensei, bem..."
2002002-131 = "Pensei que talvez você pudesse ser alguém com quem eu pudesse conversar..."
2002002-132 = "Sei que é um pedido egoísta, mas..."
2002002-133 = "Por esse motivo..."
2002002-134 = "Eu pedi para você vir..."
2002002-135 = "(Olhadinha)"
2002002-136 = "[s] \"Ora, se é só isso, você é sempre bem-vinda, Himari.\""
2002002-137 = "...Ah."
2002002-138 = "[s] \"Himari?\""
2002002-142 = "Ah, não..."
2002002-143 = "Fufu. #nComo eu esperava."
2002002-144 = "Com o meu cérebro brilhante, cheguei a essa conclusão em menos de um segundo. #nHoje, a vitória é minha."
2002002-148 = "[ns] \"Desde quando isso era uma competição...?\""
2002002-149 = "Não se preocupe com detalhes. #nSe você disser que vai \"me acompanhar\", isso já é o suficiente."
2002002-150 = "...Pois não existe \"desfazer\" na nossa relação."
2002002-151 = "[s] \"Pode ficar tranquila, Himari.\""
2002002-152 = "Fufu."
2002002-158 = "Então, conto com você para o resto do dia, Sensei."
2002002-161 = "(E assim, passei a desfrutar de um momento tranquilo à tarde com a Himari)"
2002002-166 = "...Agora que consegui este tempo a sós com o Sensei."
2002002-167 = "Normalmente, eu estaria exibindo um sorriso triunfante pelo feito desta genial beldade frágil, mas..."
2002002-168 = "Infelizmente, há uma única coisa que não sai como eu quero."
2002002-169 = "[s] \"Que tipo de problema?\""
2002002-170 = "Não chega a ser um problema..."
2002002-171 = "Como você sabe, na Millennium, músicas solicitadas são tocadas na transmissão escolar durante o almoço, certo?"
2002002-172 = "[s7] \"É a primeira vez que ouço falar disso.\"\n[s8] \"Ué, é mesmo...?\""
2002002-175 = "Qualquer aluno da Millennium pode solicitar músicas livremente, mas..."
2002002-176 = "Por algum motivo, as músicas que eu solicito nunca são escolhidas!"
2002002-177 = "Mesmo tendo enviado várias e várias vezes, por que será? #nO que você acha, Sensei?"
2002002-178 = "Certamente é porque minha sensibilidade é avançada demais, criando uma barreira invisível entre mim e os outros alunos."
2002002-179 = "Acabei me tornando uma heroína trágica sem nem perceber..."
2002002-180 = "[s] \"Não, acho que não é bem assim...\""
2002002-181 = "Eu só queria compartilhar músicas maravilhosas com todos da Millennium..."
2002002-182 = "...Mas hoje, despeço-me daquela versão de mim que lamentava até ontem."
2002002-183 = "Hoje, para celebrar o nosso esconderijo, o meu e o do Sensei..."
2002002-184 = "Vamos recorrer a um \"método especial\"."
2002002-188 = "[ns] \"Um método especial...?\""
2002002-192 = "(A transmissão escolar começou a tocar pelos alto-falantes)"
2002002-197 = "Olá a todos que estão ouvindo a transmissão da Millennium!"
2002002-198 = "A hora do almoço chegou mais uma vez! #nVamos direto para os pedidos!"
2002002-199 = "Então, aqui está o primeiro pedido."
2002002-203 = "Do ouvinte com o nome 'A garota mais pura e linda do Millennium'..."
2002002-207 = "Ué, essa pessoa de novo...?"
2002002-208 = "Ah, sou eu mesma."
2002002-209 = "[s] \"Eu imaginei!\""
2002002-210 = "Ei, sério que vamos tocar isso...?"
2002002-215 = "Não, espera, não chegaram vários outros pedidos?"
2002002-216 = "……Ah,"
2002002-217 = "Os dados sumiram de repente!?"
2002002-218 = "……Fufu."
2002002-222 = "[ns] \"Ei, Himari. Eu espero que não seja o que estou pensando...\""
2002002-223 = "Por mais que eu tente, isso é um pouco demais..."
2002002-228 = "Ah, espera, por quê?!"
2002002-232 = "Alguém desligue a máquina! ...Não para!? Por quê!?"
2002002-244 = "(Uma música enka com um tom melancólico começa a tocar pelos alto-falantes)"
2002002-248 = "[ns] \"Então essa era a música maravilhosa que a Himari mencionou...\""
2002002-249 = "Foi uma música recomendada pelo chefe do Clube de Engenharia."
2002002-250 = "[s] \"Então a Himari gosta de enka.\""
2002002-251 = "Fufu. Relaxar tranquilamente no meu esconderijo, compartilhando o mesmo tempo que o Sensei enquanto ouvimos uma música que gosto..."
2002002-252 = "O que acha? Não sente um certo charme nisso?"
2002002-256 = "[ns] \"Eu até entendo o que quer dizer, mas...\""
2002002-258 = "[ns] \"Sim... é uma música maravilhosa.\""
2002002-259 = "Sim, não é? Fufu."
2002002-261 = "(Enquanto ouvia o barulho da confusão dos membros do Clube de Radiodifusão ao fundo e o enka que a Himari colocou para tocar...)"
2002002-262 = "(Passei o tempo com a Himari até o anoitecer.)"
