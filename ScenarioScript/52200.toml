[translation]
52200-1 = "Episódio 20; A Verdadeira Forma"
52200-2 = "Ela é... a Grande Profetisa Kuzunoha?"
52200-3 = "É um lugar tão misterioso... e pensar que alguém tão adorável era a Srta. Kuzunoha..."
52200-4 = "Fufu, não é de se estranhar que esteja surpresa."
52200-5 = "Como a primeira presidente do Hyakkaryouran, também sou versada em táticas. #nÉ raro encontrar alguém com tanto talento e beleza, mesmo na longa história de Hyakkiyako."
52200-6 = "[s1] \"Você é... Kuzunoha?\"\n[s2] \"Sabe, a atmosfera dela lembra a Nagusa.\""
52200-8 = " Oh? Não me sinto ofendida, mas a ordem das coisas está invertida."
52200-9 = " Não é que eu me pareça com a Nagusa. É a Nagusa que se parece comigo."
52200-10 = " Embora eu pareça assim, já vivo há centenas de anos."
52200-14 = "Hum, você é o Sensei do Schale, não é?"
52200-15 = "Temos muito o que conversar, mas..."
52200-16 = "Você demorou!"
52200-17 = "Sabe há quanto tempo enviei aquela mensagem?"
52200-18 = "Ou será que... para alguém como eu, a passagem do tempo funciona de forma diferente?"
52200-19 = "[s3] \"E-eu não me atrasei de propósito!\"\n[s4] \"Aconteceram muitas coisas... me desculpe...\""
52200-22 = "Hum... bem, tudo bem."
52200-23 = "Fui eu quem disse: \"Se há alguém que você deseja salvar\". #nEu sei que há muitos alunos esperando por você."
52200-24 = "Além disso... parece que você conseguiu encontrar a resposta, não é?"
52200-25 = "[s] \"Kuzunoha, eu...\""
52200-29 = "Ei, chega de cumprimentos por enquanto."
52200-36 = "Não se esqueçam de mim. Fui eu quem trouxe vocês até aqui, sabia?"
52200-37 = "Eu queria conversar com a Kuzunoha sobre o Livro Estranho... poderiam se retirar?"
52200-38 = "Shuro..."
52200-39 = "O que foi, Nagusa-chan? Não adianta me encarar, não tenho medo de você."
52200-40 = "Sem o Hyakuren, você não pode fazer nada contra mim."
52200-41 = "Bem, graças a isso, o Templo do Crepúsculo foi encontrado. #nTalvez eu poupe a sua vida..."
52200-46 = "Gya...! O-o que foi isso...?"
52200-47 = "Criança, não interrompa a conversa."
52200-48 = "Afaste-se."
52200-53 = "N-não pode ser... Mesmo sem o Hyakuren, anular o Livro Estranho...!"
52200-54 = "Ora, ora..."
52200-55 = "Para começar, o Hyakuren foi algo que eu mesma criei. #nNão há lógica em algo que ele pode fazer que eu não possa."
52200-56 = "Francamente, que criança lenta."
52200-57 = "Este é o \"Templo do Crepúsculo\", um lugar diferente do mundo comum. No crepúsculo, nada é impossível... foi uma boa lição para você."
52200-67 = "U... uuuuu..."
52200-68 = "Eu vou contar tudo para a Srta. Kokuriko!!"
52200-72 = "Fufu, correr para chorar no colo dos outros... você é mesmo uma criança."
52200-76 = "Diga-me, minha sucessora. Por que veio até aqui?"
52200-77 = "Trazer o Sensei do Schale não era o seu único objetivo, era?"
52200-78 = "..."
52200-79 = "Você, que negava a minha existência, voltou a aparecer neste templo... isso significa que começou a acreditar um pouco em mim?"
52200-80 = "...Sim. Eu não nego mais a sua existência."
52200-81 = "Ao me reconhecer como alguém digna de suceder o Hyakkaryouran, você me deu o direito de empunhar o Hyakuren..."
52200-82 = "Mas..."
52200-86 = "...Por que não foi a Ayame?"
52200-87 = "Ela era muito mais talentosa que eu e ficou te esperando por tanto tempo... mas a Ayame nunca pôde te encontrar."
52200-88 = "Por que você apareceu diante de mim, que sou tão fraca e imatura?"
52200-89 = "Se você tivesse reconhecido ela e concedido o direito de portar o Hyakuren..."
52200-91 = "...A Ayame e todos do Hyakkaryouran não teriam se ferido."
52200-92 = "...Tudo poderia ter continuado como era."
52200-93 = "――Sério mesmo, você acha que ninguém vai se machucar?"
52200-97 = "Se Ayame tivesse me conhecido e conseguido manejar a Hyakuren... você acha que dias felizes continuariam para sempre?"
52200-98 = "Isso é..."
52200-99 = "Parece que você está se enganando, mas eu não escolho quem entra no 'Templo do Crepúsculo'."
52200-100 = "O Templo do Crepúsculo é um resquício do passado que fluiu para longe há muito tempo.#nSeja minha existência ou esta paisagem, quase ninguém mais se lembra disso."
52200-101 = "O passado é algo que se dissolve nas sombras."
52200-102 = "Por isso, quem persegue a luz do passado não consegue notar as sombras que ficaram para trás."
52200-103 = "Quem não consegue encarar a própria escuridão não pode se tornar a luz para os outros."
52200-104 = "Mas, se você for alguém que consegue seguir em frente, deixando a luz às costas... poderá perseguir a sombra que cai diante de seus olhos."
52200-105 = "……É por isso que você se encontrou comigo."
52200-106 = "Mas... eu não posso deixar a Ayame desse jeito."
52200-107 = "Me diga..."
52200-108 = "O que eu preciso fazer para trazer a Ayame de volta ao 'normal'?"
52200-109 = "……Ao normal, é?"
52200-113 = "Como era a 'verdadeira Ayame' que você imagina?"
52200-114 = "A verdadeira Ayame..."
52200-115 = "Ela era... sempre calorosa como um sol suave, nunca recusava nenhum pedido, a perfeita presidente do comitê Hyakkiyako..."
52200-116 = "Será que isso era realmente tudo o que a Ayame era?"
52200-117 = "Você acha que ela era uma pessoa transparente, sem diferença entre o que mostrava e o que escondia?"
52200-118 = "Isso é..."
52200-121 = "Obrigada por hoje também, Nagusa! Foi uma boa partida."
52200-125 = "Mas, quando acordamos de um sonho feliz, precisamos encarar a realidade."
52200-129 = "Eu nunca pensei que fôssemos amigas."
52200-134 = "Todos que vivem neste mundo usam máscaras."
52200-135 = "Para não serem odiados, para não serem abandonados — com esse único desejo, as pessoas usam máscaras com a forma e a cor que os outros esperam."
52200-136 = "Isso é algo natural para se viver."
52200-137 = "Mas... pode ser que existam pessoas que acabam confundindo a máscara que grudou perfeitamente em seus rostos com sua verdadeira face."
52200-138 = "Quem pode julgar qual das duas ela é agora — é apenas a própria pessoa."
52200-139 = "Perguntarei mais uma vez. Como é a verdadeira Ayame que você deseja?"
52200-143 = "A Ayame que eu desejo..."
52200-151 = "Eu... não sei."
52200-152 = "Porque eu não sou a Ayame..."
52200-153 = "Mas... mesmo que eu não saiba, mesmo que a Ayame não me queira por perto —"
52200-154 = "Eu quero estar ao lado da Ayame."
52200-155 = "O que aconteceu uma vez não pode ser desfeito. É o mesmo que dizer que os mortos não ressuscitam. Não existe método para devolver uma existência que mudou ao seu estado original."
52200-156 = "As flores eventualmente murcham, dão frutos... e esses frutos caem na terra e apodrecem.#nEssa é a lógica do mundo... a causalidade."
52200-157 = "Mas, ainda assim... se você diz que há alguém que deseja salvar..."
52200-161 = "……Fufu. Professor [USERNAME], parece que você já entendeu."
52200-164 = "Mas eu já estou bem."
52200-165 = "……Sobre como a Hoshino-senpai conseguiu voltar do estado de inversão."
52200-166 = "Acho que talvez fosse porque ela ainda estava em um estado incompleto."
52200-167 = "Além disso, a senpai descartou uma parte de sua própria essência..."
52200-168 = "……Por isso, acho que ela conseguiu seguir em frente."
52200-171 = "Aceitar e reconhecer a si mesmo e aos outros, independentemente de como sejam, sem negar nada."
52200-172 = "Só assim é possível dar um passo em direção ao amanhã..."
52200-173 = "Jovem, você quer salvar a Ayame?"
52200-174 = "……Custe o que custar."
52200-175 = "Então, pare de se afundar em sonhos efêmeros e encare-a."
52200-176 = "Não desvie o olhar da atual Ayame... e nem de si mesma até agora."
52200-177 = "Se fizer isso, sua amiga que vaga pelo crepúsculo... e a mão que você estendeu —#nvocês se reencontrarão ao longo da jornada."
52200-178 = "Já chega, acabou! Parem com isso!"
52200-184 = "Eu não vim aqui para ouvir sermão!"
52200-185 = "Essa ideia de que, se você for sincero, vai conseguir entender alguém... é mentira, é uma mentira absoluta..."
52200-186 = "Se isso fosse verdade, por que alguém se importaria com boatos?!"
52200-187 = "Ficamos ansiosos, pensando que talvez todos estejam rindo pelas costas por trás de suas máscaras... e é por isso que provamos o quão incríveis somos!#nSe não fizermos isso, ninguém vai olhar para nós...!"
52200-188 = "Por isso... antes mesmo de recuperar o livro estranho... quando perdi o Ino Mononoke Roku, eu já..."
52200-189 = "Ino Mononoke Roku?"
52200-190 = "Que significado aquilo poderia ter?#nNão passa de um livro velho e esfarrapado."
52200-191 = "A-aquilo... você disse 'aquilo'?"
52200-192 = "Já que se deu ao trabalho de vir até o Templo do Crepúsculo,#nvou lhe dar algumas palavras de sabedoria, criança."
52200-197 = "Um livro não é apenas sua encadernação ou capa.#nEle só tem valor pelo conteúdo que carrega."
52200-198 = "Ainda é difícil demais para você entender?#nNo dia em que compreender isso, certamente será capaz de obter um livro que seja só seu."
52200-199 = "Isso é um sofisma!!!"
52200-200 = "Sofisma...? Toda história começa justamente quando se começa a usar de sofismas."
52200-201 = "Desse jeito, ainda vai demorar para se tornar uma contadora de histórias talentosa."
52200-206 = "Uuuuu..."
52200-207 = "Eu realmente, realmente odeio o Hyakkiyako!"
52200-209 = "Próximo episódio: O Olhar"
