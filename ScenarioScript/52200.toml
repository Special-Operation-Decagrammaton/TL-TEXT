[translation]
52200-1 = "第20話;本当の姿"
52200-2 = "彼女が……大預言者クズノハ？"
52200-3 = "なんだか不思議な場所ですの……それに、こんなに可憐な方がクズノハ様だったのですね……。"
52200-4 = "ふふ、驚くのも無理はないのう。"
52200-5 = "百花繚乱の初代委員長として、戦術にも精通しておるからのう。#nこれほど才色を兼ね備えている者は、長き百鬼夜行の歴史においてもそうはいないじゃろうて。"
52200-6 = "[s1] \"君が……クズノハ？\"\n[s2] \"ちょっと、雰囲気がナグサに似てるね。\""
52200-8 = " ほう？悪い気はせぬが、順序が逆というものじゃな。"
52200-9 = " 妾がナグサに似ているのではない。ナグサが妾に似ているのじゃ。"
52200-10 = " こう見えても、数百年以上生きておるからの。"
52200-14 = "ふむ、[ruby=そち]其方[/ruby]がシャーレの先生か。"
52200-15 = "積もる話は沢山あるのじゃが……。"
52200-16 = "遅いわ！"
52200-17 = "いつ便りを送ったと思うておる。"
52200-18 = "それとも……妾のような存在にとって、時の流れは他と違うとでも？"
52200-19 = "[s3] \"わ、わざと遅れたんじゃないよ！\"\n[s4] \"色々あって……ごめんなさい……。\""
52200-22 = "ふむ……まあよい。"
52200-23 = "「助けたい者がいるのなら」と言ったのは妾じゃからな。#n其方を待つ生徒が沢山いることも、知っておる。"
52200-24 = "それに……どうやら答えは出せたようじゃからのう？"
52200-25 = "[s] \"クズノハ、私は――\""
52200-29 = "はぁい、挨拶はそのへんでぇ。 "
52200-36 = "手前さん方お忘れなくぅ。ここまで連れてきたのは手前ですよぉ？"
52200-37 = "手前はクズノハと怪書の話がしたいのですけど……席を外してもらえますかぁ？"
52200-38 = "シュロ……。"
52200-39 = "何ですぅナグサちゃん？睨んだって怖くないですよぉ？"
52200-40 = "百蓮のない手前には、何もできないんですからぁ。"
52200-41 = "ま、おかげで黄昏の寺院は見つかりましたしぃ？#n命だけは助けてあげても――"
52200-46 = "ぎゃっ……！い、今のは……？"
52200-47 = "[ruby=わっぱ]童[/ruby]、話の腰を折るでないわ。"
52200-48 = "下がらんか。"
52200-53 = "う、うそだぁ……百蓮もないのに、怪書を無効化するなんて……！"
52200-54 = "やれやれ……。"
52200-55 = "そも、百蓮は妾が編み出したもの。#nあれにできることが、妾にできぬ道理はなかろうて。"
52200-56 = "まったく、鈍い童じゃ。"
52200-57 = "ここは俗世と異なる「黄昏の寺院」。黄昏では何が起こっても不思議ではない……よい勉強になったの。"
52200-67 = "う……ううううっ……。"
52200-68 = "こ、コクリコ様に言いつけてやるんだからぁっ！！"
52200-72 = "ふふ、泣きつきに行くところも、童じゃの。"
52200-76 = "して、後輩よ。なにゆえここを訪れた？"
52200-77 = "シャーレの先生を連れてくるだけが目的ではあるまいて？"
52200-78 = "……。"
52200-79 = "妾の存在を否定していた其方が、また[ruby=ここ]寺院[/ruby]に顔を出したということは……少しは信じる気になったのかのう？"
52200-80 = "……うん。私はもう、あなたの存在を否定しないよ。"
52200-81 = "あなたが私を百花繚乱を継ぐ者にふさわしいと認めたことで、百蓮を握る資格を得た……。"
52200-82 = "でも……。"
52200-86 = "……どうしてアヤメじゃなかったの？"
52200-87 = "私よりもずっと優秀で、あなたを待ち続けていたのに……アヤメは会えなかった。"
52200-88 = "どうしてあなたは、弱くて未熟な私の前に姿を現したの？"
52200-89 = "あなたが彼女を認めて、百蓮を持つ資格を授けてたら……。"
52200-91 = "……アヤメも、百花繚乱のみんなも、誰ひとり傷つかなかった。"
52200-92 = "……全部、変わらずにいられたのに。"
52200-93 = "――本当に、誰も傷つかないと思っておるのかえ？"
52200-97 = "アヤメが妾と出会い、百蓮を扱えていれば……いつまでも幸せな日々が続く、と？"
52200-98 = "それは……。"
52200-99 = "勘違いしておるようじゃが、妾は「黄昏の寺院」に入る者を選んでおらぬ。"
52200-100 = "[ruby=ここ]黄昏の寺院[/ruby]は、遙か昔に流れ去った過去の残滓。#n妾の存在にせよ、この景色にせよ、今や記憶する者はほとんどおらぬ。"
52200-101 = "過去は、影の中に溶けていくものじゃ。"
52200-102 = "ゆえに、過去の光を追う者は、過ぎし影が目に止まらず。"
52200-103 = "己の闇を直視できぬ者は、他人の灯火となれぬ。"
52200-104 = "じゃが、光を背にし、前に進める者ならば……己の目の前に落ちる影を追うことができる。"
52200-105 = "……ゆえに、其方は妾とまみえた。"
52200-106 = "でも……このままアヤメを放っておけないよ。"
52200-107 = "教えて……。"
52200-108 = "どうすれば、アヤメを「元」に戻せる？"
52200-109 = "……元に、か。"
52200-113 = "其方の思う「本当のアヤメ」はどんな姿をしておった？"
52200-114 = "本当の、アヤメ……。"
52200-115 = "彼女は……いつも穏やかな日差しのように温かくて、どんな頼みも断らない、完璧な百花繚乱の委員長……。"
52200-116 = "誠に、それがアヤメの全てだったのかのう。"
52200-117 = "本当に表も裏も変わらない……透明な人間であったと？"
52200-118 = "それは……。"
52200-121 = "今日もありがと、ナグサ！良い試合だったよ。"
52200-125 = "でも、幸せな夢から覚めたら、現実と向き合わなきゃいけない。"
52200-129 = "友達だと思ったことなんて、ない。  "
52200-134 = "世に生きる者はみな、仮面を被っておる。"
52200-135 = "嫌われたくない、見捨てられたくない――その一心で、周囲が望む形と色をした、仮面を被るのじゃ。"
52200-136 = "これは生きていく上で、当然のこと。"
52200-137 = "じゃが……ぴったりと張りついた仮面の方こそ、素顔と思われている者もおるかもしれぬ。"
52200-138 = "その者が今、どちらなのかを判断できるのは――本人のみ。"
52200-139 = "もう一度聞こう。其方の望む本当のアヤメは、どんな姿じゃ？"
52200-143 = "私が望む、アヤメ……。"
52200-151 = "私には……分からない。"
52200-152 = "私はアヤメじゃないから……。"
52200-153 = "でも……分からなくても、アヤメが私を求めていなくても――"
52200-154 = "アヤメのそばに、いたい。"
52200-155 = "一度起きたことは元には戻らぬ。死者が蘇らないのと同じじゃ。変わってしまった存在を元の姿に戻す方法などありはしない。"
52200-156 = "花はやがて散り、実をつけ……その実は地に落ち腐りゆく。#nそれが世の理……因果なのじゃ。"
52200-157 = "だがそれでも……助けたい者が居ると申すのなら……。"
52200-161 = "……ふふ。[USERNAME]先生は、もうわかっているようじゃな。"
52200-164 = "でも、私はもう大丈夫。"
52200-165 = "……ホシノ先輩が、どうして反転した状態から戻ってこられたのか。"
52200-166 = "たぶん、まだ不完全な状態だったからじゃないかと思う。"
52200-167 = "それに、先輩は自身の本質の一部を棄てたから……"
52200-168 = "……だから、前に進めたんだと思う。"
52200-171 = "どんな姿の他者も、己も、否定せずに受け入れ、認める。"
52200-172 = "そうして初めて、明日に向かって踏み出せるのじゃ……。"
52200-173 = "後輩よ、アヤメを助けたいか？"
52200-174 = "……どんな手を使ってでも。"
52200-175 = "ならば、うたかたの夢に浸かるのを止め、あやつと向き合うことじゃ。"
52200-176 = "今の彼女……そして、これまでの自分からも目を逸らしてはならない。"
52200-177 = "さすれば黄昏のなか彷徨っている其方の友も……伸ばしたその手も――#n旅路の中で再会するじゃろう。"
52200-178 = "はい終わりですぅ！やめやめぇ！"
52200-184 = "そんな説教を聞きに来たんじゃないんですよぉ！"
52200-185 = "正直に向き合ったら、誰かとわかり合えるなんて、絶対、ぜーったい、嘘……。"
52200-186 = "それが誠であるのなら、誰が噂なんて気にするんですかぁ！"
52200-187 = "仮面の下で誰もが薄ら笑いを浮かべてるかもって……不安になりながら、こんなにすごいって証明するんですよぉ！#nじゃないと、見向きもされなくなっちゃいますぅ……！"
52200-188 = "だから……怪書も取り戻せない手前はぁ……[ruby=いのうもののけろく]稲生物怪録[/ruby]を失くしたあの時に、もう……。"
52200-189 = "「稲生物怪録」？"
52200-190 = "あのようなものに一体何の意味があるんじゃ？#nただのボロボロの本じゃろうて。"
52200-191 = "あ、あのようなものですってぇ……？"
52200-192 = "せっかく[ruby=ここ]黄昏の寺院[/ruby]まで来たんじゃ。#nひとつ、童にも御言葉をくれてやるかの。"
52200-197 = "本は装丁や表紙だけではない。#nそれに伴う内容があってこそじゃ。"
52200-198 = "童にはまだ難しいかの……？#nこれがわかった日にはきっと、其方だけの書を手に入れられるはずじゃ。"
52200-199 = "そんなの詭弁ですぅ！！！"
52200-200 = "詭弁……？どんな物語も、詭弁を弄するところからじゃよ。"
52200-201 = "その調子では、優秀な語り手になるのはまだ先じゃな。"
52200-206 = "うぅぅぅ……。"
52200-207 = "百花繚乱なんて……本当に本当に大っ嫌いですぅ～！"
52200-209 = "次回;視線"
