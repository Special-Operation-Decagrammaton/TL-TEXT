[translation]
52200-1 = "Episódio 20; A Verdadeira Forma"
52200-2 = "Ela é...... a Grande Profeta Kuzunoha?"
52200-3 = "Que lugar misterioso...... e pensar que uma pessoa tão graciosa era Kuzunoha-sama......"
52200-4 = "Fufu, não é de se estranhar que esteja surpresa."
52200-5 = "Como primeira presidente da Hyakkaryouran, ela também é versada em táticas. #n Não existem muitas pessoas que possuam tanto talento e beleza na longa história de Hyakkiyako, imagino."
52200-6 = "[s1] \"Você é...... Kuzunoha?\"\n[s2] \"O clima é um pouco parecido com o da Nagusa.\""
52200-8 = "Ho? Não é uma impressão ruim, mas a ordem está invertida."
52200-9 = "Não sou eu que pareço com a Nagusa. É a Nagusa que parece comigo."
52200-10 = "Embora eu pareça assim, vivo há mais de cem anos, afinal."
52200-14 = "Hum, então você é o Sensei da Schale."
52200-15 = "Temos muitas coisas para conversar, mas......"
52200-16 = "Você está atrasado!"
52200-17 = "Sabe quanto tempo faz que enviei a mensagem?"
52200-18 = "Ou será que...... você acha que o fluxo do tempo é diferente para seres como eu?"
52200-19 = "[s3] \"E, eu não me atrasei de propósito!\"\n[s4] \"Aconteceram várias coisas...... me desculpe......\""
52200-22 = "Hum...... bem, tudo bem."
52200-23 = "Fui eu quem disse 'se você tem alguém que deseja salvar'. #n Sei também que existem muitas alunas esperando por você."
52200-24 = "Além disso...... parece que você já encontrou a resposta, não é?"
52200-25 = "[s] \"Kuzunoha, eu――\""
52200-29 = "Ah, vamos deixar as saudações para depois."
52200-36 = "Pessoal, não se esqueçam. Fui eu quem trouxe vocês até aqui, viu?"
52200-37 = "Eu quero falar com Kuzunoha sobre os livros misteriosos...... poderiam nos deixar a sós?"
52200-38 = "Shuro......"
52200-39 = "O que foi, Nagusa-chan? Não vou ter medo só porque você está me encarando, viu?"
52200-40 = "Sem a 'Hyakuren', você não consegue fazer nada, afinal."
52200-41 = "Bom, graças a isso, encontrei o Templo do Crepúsculo, pelo menos? #n Mesmo que eu só te poupe a vida――"
52200-46 = "Gya......! O, o que foi isso......?"
52200-47 = "Criança, não interrompa a conversa."
52200-48 = "Saia daqui."
52200-53 = "N, não pode ser...... nem mesmo com a Hyakuren, anular o livro misterioso......!"
52200-54 = "Puxa vida......"
52200-55 = "Para começo de conversa, a Hyakuren foi algo que eu inventei. #n Não há motivo para eu não conseguir fazer o que ela faz."
52200-56 = "Realmente, uma criança lenta."
52200-57 = "Este é o 'Templo do Crepúsculo', um lugar diferente do mundo comum. No Crepúsculo, nada é estranho, não importa o que aconteça...... foi uma boa lição."
52200-67 = "U...... uuuuu......"
52200-68 = "Eu, eu vou contar para a Kokuriko-samaaaaa!!"
52200-72 = "Fufu, até o jeito de correr para pedir socorro é de criança."
52200-76 = "E então, minha sucessora. Por que visitou este lugar?"
52200-77 = "Trazer o Sensei da Schale não era o seu único objetivo, era?"
52200-78 = "......"
52200-79 = "Você, que negava a minha existência, apareceu neste templo...... isso significa que você está disposta a acreditar um pouco agora?"
52200-80 = "......Sim. Eu não vou mais negar sua existência."
52200-81 = "Como você me reconheceu como digna de suceder a Hyakkaryouran, obtive a qualificação para empunhar a Hyakuren......"
52200-82 = "Mas......"
52200-86 = "......Por que não foi a Ayame?"
52200-87 = "Ela era muito mais talentosa que eu e continuou te esperando...... mas a Ayame não conseguiu te encontrar."
52200-88 = "Por que você apareceu diante de mim, que sou fraca e imatura?"
52200-89 = "Se você tivesse reconhecido ela e dado a qualificação para empunhar a Hyakuren......"
52200-91 = "......A Ayame, e todas da Hyakkaryouran, ninguém teria se ferido."
52200-92 = "......Tudo teria continuado igual."
52200-93 = "――Você realmente acha que ninguém teria se ferido?"
52200-97 = "Se Ayame tivesse me encontrado e pudesse manejar a Hyakuren...... você acha que dias felizes continuariam para sempre?"
52200-98 = "Isso é......"
52200-99 = "Parece que você está enganada, eu não escolho quem entra no 'Templo do Crepúsculo'."
52200-100 = "O 'Templo do Crepúsculo' é um resíduo do passado que se dissipou há muito tempo. #n Seja a minha existência ou esta paisagem, quase ninguém se lembra mais delas agora."
52200-101 = "O passado se dissolve nas sombras."
52200-102 = "Portanto, quem persegue a luz do passado não nota as sombras do que já passou."
52200-103 = "Quem não consegue encarar a própria escuridão não pode se tornar a luz para os outros."
52200-104 = "Mas, se você dá as costas para a luz e avança,...... você pode perseguir a sombra que cai diante de você."
52200-105 = "......É por isso que você se encontrou comigo."
52200-106 = "Mas...... não consigo deixar a Ayame do jeito que está."
52200-107 = "Me diga......"
52200-108 = "Como posso fazer a Ayame voltar ao que era antes?"
52200-109 = "......Ao que era antes, hein."
52200-113 = "Como era a 'verdadeira Ayame' na sua cabeça?"
52200-114 = "A verdadeira Ayame......"
52200-115 = "Ela era...... sempre calorosa como um sol suave, nunca recusava nenhum pedido, a presidente perfeita da Hyakkaryouran......"
52200-116 = "Realmente, isso era tudo sobre a Ayame?"
52200-117 = "Ela era uma pessoa transparente, que nunca mudava entre o que mostrava e o que sentia?"
52200-118 = "Isso é......"
52200-121 = "'Obrigada pela luta de hoje, Nagusa! Foi uma ótima partida.'"
52200-125 = "Mas, quando acordamos de um sonho feliz, temos que encarar a realidade."
52200-129 = "'Nunca te considerei minha amiga.'"
52200-134 = "Todos que vivem neste mundo usam máscaras."
52200-135 = "Para não serem odiados, para não serem abandonados―― com esse desejo, todos usam máscaras na forma e cor que os outros desejam."
52200-136 = "Isso é natural para se viver."
52200-137 = "Mas...... pode ser que existam pessoas que acreditam que a máscara colada firmemente ao rosto seja o seu próprio rosto."
52200-138 = "Quem pode julgar qual dos dois ela é agora―― é apenas a própria pessoa."
52200-139 = "Vou perguntar de novo. Qual é a forma da verdadeira Ayame que você deseja?"
52200-143 = "A Ayame que eu desejo......"
52200-151 = "Eu...... não sei."
52200-152 = "Porque eu não sou a Ayame......"
52200-153 = "Mas...... mesmo que eu não saiba, mesmo que a Ayame não me queira――"
52200-154 = "Eu quero estar ao lado da Ayame."
52200-155 = "O que aconteceu uma vez não pode voltar atrás. O mesmo acontece com os mortos que não ressuscitam. Não há como fazer uma existência que mudou voltar ao seu estado original."
52200-156 = "As flores murcham e dão frutos...... e esses frutos caem na terra e apodrecem. #n Essa é a lei do mundo...... a causalidade."
52200-157 = "Mas ainda assim...... se você diz que há alguém que quer salvar......"
52200-161 = "......Fufu. O Sensei [USERNAME] parece já ter entendido."
52200-164 = "Mas, agora estou bem."
52200-165 = "......Por que a Hoshino-senpai conseguiu voltar de um estado invertido."
52200-166 = "Acho que talvez fosse porque ela ainda estava em um estado incompleto."
52200-167 = "Além disso, a senpai abandonou parte de sua própria essência......"
52200-168 = "......Por isso, acho que ela conseguiu avançar."
52200-171 = "Aceite e reconheça qualquer forma de outra pessoa, e a sua própria, sem negar nada."
52200-172 = "Só então você poderá dar um passo em direção ao amanhã......"
52200-173 = "Minha sucessora, quer salvar a Ayame?"
52200-174 = "......Custe o que custar."
52200-175 = "Então, pare de se imergir em um sonho efêmero e encare-a."
52200-176 = "Não desvie o olhar da atual versão dela...... e nem da sua própria versão até agora."
52200-177 = "Então sua amiga, que vagueia pelo crepúsculo...... e a mão que você estendeu―― #n se reencontrarão em sua jornada."
52200-178 = "Certo, já chega! Pare, pare!"
52200-184 = "Eu não vim aqui para ouvir um sermão desse tipo!"
52200-185 = "Dizer que podemos nos entender se encararmos as coisas com sinceridade é uma mentira, absoluta, total......"
52200-186 = "Se isso fosse verdade, por que alguém se importaria com boatos!?"
52200-187 = "Ficar pensando 'será que todos estão rindo de mim por baixo da máscara?'...... provar o quão incrível você é enquanto sente essa ansiedade! #n Caso contrário, ninguém vai te dar a mínima......!"
52200-188 = "Por isso...... eu, que nem consigo recuperar meu livro misterioso...... lá naquela época em que perdi o 'Inotei Mononokeroku', eu já......"
52200-189 = "'Inotei Mononokeroku'?"
52200-190 = "Que significado tem algo desse tipo? #n Não passa de um livro gasto."
52200-191 = "V, você chama de algo desse tipo......?"
52200-192 = "Já que veio até o 'Templo do Crepúsculo', que tal eu te dar um ensinamento, criança?"
52200-197 = "Um livro não é apenas a encadernação e a capa. #n É o conteúdo que o acompanha que realmente importa."
52200-198 = "É difícil demais para uma criança......? #n No dia em que entender isso, com certeza poderá adquirir o seu próprio livro."
52200-199 = "Isso é um sofisma!!!"
52200-200 = "Sofisma......? Toda história começa através da manipulação de sofismas."
52200-201 = "Nesse ritmo, falta muito para você se tornar uma contadora de histórias talentosa."
52200-206 = "Uuuuu......"
52200-207 = "A Hyakkaryouran...... eu realmente, realmente detesto vocês!"
52200-209 = "Próximo Episódio; O Olhar"
