[translation]
10011065-8 = "Fufu... pessoal, bom trabalho! Vocês passaram, então podem seguir em frente."
10011065-12 = "Será que... foi um sucesso?"
10011065-13 = "Sim, foi graças à Tsukuyo-dono!"
10011065-14 = "Que alívio..."
10011065-16 = "Bem, é como se fosse uma leitura de mentes, ou algo do tipo..."
10011065-17 = "No fim das contas, é como se ela fosse extremamente boa em ler expressões faciais, não é?"
10011065-18 = "[s] \"A Mimori é uma boa garota e cuida muito bem de todos, afinal.\""
10011065-19 = "Ah, pare... até o Sensei dizendo essas coisas..."
10011065-20 = "Como aquela pessoa disse,"
10011065-21 = "é apenas um nome que uso como parte do evento, por assim dizer..."
10011065-22 = "De qualquer forma, pessoal do Clube de Pesquisa de Ninjutsu, parabéns mais uma vez."
10011065-23 = "I-isso! Então, vamos logo para o próximo—"
10011065-24 = "Ah, Michiru-chan."
10011065-25 = "...Eh, eu? O-o que foi?"
10011065-26 = "Eu sei que acabei de conhecer vocês, então não sei se deveria dizer isso..."
10011065-27 = "Mas vou deixar registrado, considere apenas como uma opinião."
10011065-28 = "A gentileza da Michiru-chan é maravilhosa, mas... acho que todos são mais fortes do que você imagina."
10011065-29 = "...Eh?"
10011065-30 = "Fufu."
10011065-31 = "O que isso quer dizer...?"
10011065-32 = "Vamos, temos que ir logo."
10011065-33 = "Não é hora de ficar parada, precisamos nos apressar para encontrar a Ibuki."
10011065-34 = "Ah, sim..."
10011065-35 = "Então, pessoal, boa sorte."
10011065-39 = "E Sensei, esse tipo de coisa logo depois do almoço, é que..."
10011065-40 = "[s3] \"Acho que é um mal-entendido!\"\n[s4] \"Vamos conversar sobre isso direito depois, está bem!?\""
