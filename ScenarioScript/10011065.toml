[translation]
10011065-8 = "ふふっ……みなさん、お疲れ様でした！合格ですので、通っても良いですよ。"
10011065-12 = "成功、でしょうか……？"
10011065-13 = "はい、ツクヨ殿のおかげです！"
10011065-14 = "良かったぁ……。"
10011065-16 = "まあ、読心術と言いますか何と言いますか……。"
10011065-17 = "つまるところ、顔色を読むのがものすごく上手……みたいな話ですよね。"
10011065-18 = "[s] \"ミモリは良い子だし、みんなのことをよく見てるからね。\""
10011065-19 = "もう……先生までそんなことを……。"
10011065-20 = "そちらの方が仰った通りです、"
10011065-21 = "イベントの一環で名乗っているだけと言いますか……。"
10011065-22 = "とにかく忍術研究部のみなさん、あらためておめでとうございます。"
10011065-23 = "よ、よしっ！じゃあ早速次に――"
10011065-24 = "あっ、ミチルちゃん。"
10011065-25 = "……え、私？な、何かな？"
10011065-26 = "出会ったばかりの私が言うのも、どうかなとは思うのですが……。"
10011065-27 = "一応お伝えしておきます、一つの意見だと思ってください。"
10011065-28 = "ミチルちゃんの優しさは素敵ですが……ミチルちゃんが思ってるより、みんな強いと思いますよ。"
10011065-29 = "……え？"
10011065-30 = "ふふっ。"
10011065-31 = "それは、どういう……？"
10011065-32 = "ほら、早く行きますよ。"
10011065-33 = "立ち止まっている場合ではありません、イブキの元へ急がないと。"
10011065-34 = "あ、うん……。"
10011065-35 = "ではみなさん、頑張ってください。"
10011065-39 = "あと先生、お昼からそういうのは、その……。"
10011065-40 = "[s3] \"誤解だと思います！\"\n[s4] \"その件については後でしっかり話そうね！？\""
