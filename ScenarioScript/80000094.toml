[translation]
80000094-1 = "年頃の女の子"
80000094-2 = "あ、先生～！"
80000094-3 = "こっちこっち～！"
80000094-4 = "あはは！こんにちは！#n今日はせっかく時間を取ってもらったので、シートを持ってきておいたんすよ。"
80000094-5 = "……え？#n何かあるのか……？"
80000094-6 = "いやぁ、今日が何の日か忘れたなんて言わせないっすよ。"
80000094-7 = "バレンタインっすよ！#nバレンタインデー！"
80000094-8 = "先生も本当は分かってたんじゃないすか？#n恥ずかしがらなくてもいいっすよ、ひひっ。"
80000094-9 = "というわけで……"
80000094-15 = "……じゃじゃーん！！"
80000094-16 = "[s1] \"ありがとう、イチカ。\"\n[s2] \"嬉しいよ、頂くね。\""
80000094-19 = "…………。"
80000094-20 = "……あれ？"
80000094-21 = "……えっと……そんなあっさり受け取っちゃうんすか？"
80000094-22 = "もう少しこう……何か……"
80000094-23 = "……え？"
80000094-24 = "いや……別にリアクションを期待していたとかではないんすけど……"
80000094-25 = "……はは。#nそういう風に言われるとちょっと恥ずかしいっすね。"
80000094-26 = "でも、遠回しな言い方をされるより好きっす。"
80000094-27 = "……本当は、手作りかくらいは聞かれると思ったんすけど。"
80000094-28 = "……え？"
80000094-29 = "……最初から手作りだと思ってた？"
80000094-30 = "えっと……それは、そう……なんす、けど……"
80000094-34 = "はぁ～"
80000094-35 = "先生……"
80000094-36 = "今のはちょっとアレっすよ。"
80000094-37 = "そんな言い方されちゃったら、そこで話が終わっちゃうじゃないっすか。"
80000094-38 = "もっと、こう……どう作ったとか、いろいろ話したかったのに。"
80000094-39 = "……これでも年頃の女の子なんすよ、私も。"
80000094-40 = "うーん……"
80000094-41 = "今日ばかりは、謝ってもらってはい終わりとはいかないっすよ。"
80000094-42 = "え？じゃあどうすればいいのかって？"
80000094-43 = "え～、それを私に聞いちゃっていいんすか～？"
80000094-44 = "あとで大変なことになっても知らないっすよ？"
80000094-45 = "……何でもしてくれるんすね？大丈夫っすか？"
80000094-49 = "……大丈夫って言ったのは先生っすよ。"
80000094-50 = "本当に、いいんすよね？"
80000094-51 = "……はは。"
80000094-52 = "まぁ……そうっすね。"
80000094-53 = "そこまで言うなら……"
80000094-54 = "全て先生の責任というか……"
80000094-55 = "……自業自得、ということで？"
80000094-56 = "じゃあ……"
80000094-60 = "……先生？"
80000094-65 = "……口、開けてください。"
