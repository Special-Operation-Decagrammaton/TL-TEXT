[translation]
80000094-1 = "Uma garota na flor da idade"
80000094-2 = "Ah, Sensei~!"
80000094-3 = "Por aqui, por aqui~!"
80000094-4 = "Ahaha! Olá!#nJá que você reservou um tempo para mim hoje, eu trouxe uma toalha."
80000094-5 = "……Eh?#nAconteceu alguma coisa……?"
80000094-6 = "Não, não me diga que você esqueceu que dia é hoje."
80000094-7 = "É Dia dos Namorados!#nValentine's Day!"
80000094-8 = "Você sabia o tempo todo, não sabia, Sensei?#nNão precisa ficar com vergonha, hihi."
80000094-9 = "Sendo assim……"
80000094-15 = "……Tcharam!!"
80000094-16 = "[s1] \"Obrigado, Ichika.\"\n[s2] \"Fico feliz, vou aceitar.\""
80000094-19 = "…………."
80000094-20 = "……Ué?"
80000094-21 = "……Erm…… você vai aceitar assim tão facilmente?"
80000094-22 = "Eu esperava algo um pouco mais… sabe…"
80000094-23 = "……Eh?"
80000094-24 = "Não que eu estivesse esperando uma reação específica, mas……"
80000094-25 = "……Haha.#nFicar com vergonha depois de ouvir isso é inevitável."
80000094-26 = "Mas, prefiro isso a rodeios."
80000094-27 = "……Na verdade, eu achei que você perguntaria se foi feito à mão."
80000094-28 = "……Eh?"
80000094-29 = "……Você achou que era feito à mão desde o começo?"
80000094-30 = "Erm…… bem…… é, eu acho que sim, mas……"
80000094-34 = "Haa~"
80000094-35 = "Sensei……"
80000094-36 = "Isso foi um pouco demais."
80000094-37 = "Se você diz desse jeito, a conversa acaba por aqui, não acha?"
80000094-38 = "Eu queria conversar sobre como eu fiz, e várias outras coisas."
80000094-39 = "……Afinal, eu também sou uma garota na flor da idade."
80000094-40 = "Hmm……"
80000094-41 = "Hoje não vai dar para simplesmente pedir desculpas e encerrar o assunto."
80000094-42 = "Eh? Então o que você deveria fazer?"
80000094-43 = "Ei~, você vai mesmo me perguntar isso?"
80000094-44 = "Não diga que eu não avisei se as coisas ficarem complicadas depois, hein?"
80000094-45 = "……Você vai fazer qualquer coisa por mim? Tem certeza?"
80000094-49 = "……Foi você quem disse que estava tudo bem, Sensei."
80000094-50 = "Tem certeza absoluta, né?"
80000094-51 = "……Haha."
80000094-52 = "Bem…… é isso."
80000094-53 = "Já que você insiste tanto……"
80000094-54 = "Tudo será responsabilidade sua, Sensei……"
80000094-55 = "……Ou melhor, você colhe o que planta, certo?"
80000094-56 = "Então……"
80000094-60 = "……Sensei?"
80000094-65 = "……Abra a boca, por favor."
