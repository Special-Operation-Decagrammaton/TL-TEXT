[translation]#[Texto Final. - Filipe 08/07.]
70001020-1 = "Águas Termais (2)"
70001020-3 = "Vocês são……"
70001020-4 = "as tais inspetoras de banheiros da Academia Federal Red Winter……?"
70001020-9 = "Sim. Recebemos uma missão especial da presidente Cherino para visitar as instalações de banho da Academia Gehenna.#nSou Amami Nodoka, da Academia Federal Red Winter."
70001020-10 = "Estou muito animada para experimentar os banheiros de Gehenna, que é famosa por suas fontes termais!"
70001020-11 = "Por favor, cuidem de nós hoje!"
70001020-13 = "Haa…… quando soube que a presidente Makoto foi à Red Winter, já tive um mau pressentimento……"
70001020-14 = "Que saco, mais encrenca……"
70001020-16 = "……Algum problema?"
70001020-18 = "Não, nada. Podem olhar os banheiros à vontade."
70001020-19 = "A gente não dá muita manutenção nos dormitórios de Gehenna, mas……"
70001020-21 = "Mas está muito bem cuidado."
70001020-26 = "As toalhas e os produtos também são de primeira."
70001020-28 = "Ah, isso……"
70001020-29 = "O Clube de Desenvolvimento de Fontes Termais deixou tudo isso aqui."
70001020-31 = "Deixou……?"
70001020-33 = "É. Aqui era só um banheiro comum.#nSó tinha sabonete barato com cheiro de leite……"
70001020-34 = "Aí eles disseram 'não dá pra ficar vendo as fontes termais abandonadas!' e#n……começaram a fazer um monte de modificações."
70001020-41 = "(Então o Clube de Desenvolvimento de Fontes Termais estava envolvido…… foi um ponto cego)"
70001020-52 = "A água tem um cheiro bom…… será que colocaram algum sal de banho?"
70001020-54 = "Não, é um componente natural da fonte."
70001020-55 = "A água subterrânea que vem do Monte Hinom contém enxofre.#nEm Gehenna, é só cavar que encontra fonte."
70001020-56 = "É uma das poucas vantagens de Gehenna."
70001020-66 = "(A qualidade da água é diferente de Red Winter…… tenho que levar isso em conta……)"
70001020-70 = "……Posso entrar na água para verificar as condições?"
70001020-72 = "Sim, fique à vontade."
70001020-74 = "Vamos ver……"
70001020-81 = "Nossa, que quente!"
70001020-82 = "Que temperatura é essa!?"
70001020-84 = "Hmm…… tão quente assim?#nDeveria estar uns 70 graus……"
70001020-86 = "70 graus!? Você tá confundindo banheira com panela!?"
70001020-87 = "Entrar nessa água fervente vai causar queimaduras!"
70001020-89 = "Que estranho.#nAs alunas de Gehenna dizem que essa temperatura é perfeita……"
70001020-91 = "Pelo menos as alunas de Red Winter não estão acostumadas com água tão quente……"
70001020-92 = "Não tem um banho com água mais fria?"
70001020-98 = "O banho frio é aqui."
70001020-100 = "Vamos ver……"
70001020-107 = "Nossa, que gelado!!"
70001020-108 = "Isso é água com gelo!"
70001020-110 = "Isso me lembra dos dias de inverno em que a gente derretia gelo do rio pra tomar banho."
70001020-112 = "Alternar entre banho quente e frio melhora a circulação, não é?"
70001020-113 = "As alunas de Gehenna gostam de estímulos fortes.#nPor isso a temperatura é assim……"
70001020-114 = "Mas parece que pra vocês de Red Winter é pesado demais……"
70001020-116 = "Não só pra gente, mas pra qualquer aluna normal!"
70001020-117 = "……Além disso, sem a ajuda do Clube de Desenvolvimento de Fontes Termais, seria difícil manter esse nível de estrutura……"
70001020-118 = "Shigure-chan! Vamos visitar a próxima academia!"
70001020-120 = "Negado."
70001020-124 = "Bem-vindas à Academia Trinity, alunas de Red Winter."
70001020-125 = "Já fui informada da situação."
70001020-126 = "……Ouvi dizer que tiveram uma experiência desagradável nos dormitórios de Gehenna."
70001020-127 = "F-foi só um susto, não foi desagradável a esse ponto……"
70001020-128 = "Não. Aquela Gehenna, que não consegue nem administrar seus próprios alunos, certamente não é capaz de receber bem os visitantes. Eu entendo como se sentem."
70001020-129 = "Primeiro, por favor, apreciem este chá.#nAssim que estivermos prontas, avisaremos para visitar o banheiro."
70001020-134 = "U-uaau…… que chá e doces caros……"
70001020-135 = "Será que posso levar isso pra casa……?"
70001020-140 = "Não entendo muito de chá, mas…… pelo sabor, devem ser folhas bem caras."
70001020-141 = "Se soubesse, teria trazido minha geleia de mirtilo caseira."
70001020-142 = "Com uma recepção dessas…… Shigure-chan, talvez essa visita seja boa!"
70001020-151 = "Desculpem a espera. Já está tudo pronto, vou acompanhá-las."
70001020-154 = "Hmm…… que cheiro bom……"
70001020-155 = "Parece que a água tem cheiro de chá!"
70001020-160 = "Exatamente."
70001020-161 = "Nos dormitórios de Trinity, colocamos folhas de chá na banheira."
70001020-162 = "Assim, vocês podem relaxar num clima especial enquanto absorvem os nutrientes das folhas pela pele. É ótimo para a saúde."
70001020-163 = "Bem…… qual é a temperatura da água……"
70001020-170 = "Sim! Na temperatura certa!"
70001020-171 = "Assim como o chá, o banho também tem uma temperatura ideal."
70001020-172 = "Nossas instalações refinadas são diferentes de certos…… bárbaros que fervem água sem nenhum bom senso."
70001020-173 = "E-entendo……"
70001020-174 = "O que acham? Que tal adotarem instalações semelhantes às de Trinity em Red Winter……?"
70001020-175 = "Desse jeito, todo mundo vai gostar……!"
70001020-176 = "O que você acha, Shigure-chan?"
70001020-182 = "Hmm, não quero estragar a animação, mas……"
70001020-183 = "posso saber os custos de manutenção?"
70001020-185 = "Os custos de manutenção? Não são tão altos."
70001020-186 = "Somando os custos de limpeza do piso de mármore e das folhas de chá……"
70001020-190 = "Aproximadamente…… uns 1 milhão de ienes por mês?"
70001020-192 = "Quê!? Tão caro assim?"
70001020-194 = "Hã? As folhas de chá são baratas, cerca de 10 mil ienes o pacote."
70001020-195 = "Comparado ao chá que servimos, o sabor é inferior……"
70001020-197 = "10 mil ienes…… barato……"
70001020-202 = "Impossível! Não dá pra fazer parceria com burgueses de Trinity!"
70001020-204 = "Negado."
70001020-208 = "……Eu não sabia que os banheiros de academias tradicionais como Trinity e Gehenna eram tão ruins."
70001020-209 = "Se continuarem assim, vão falir em menos de um mês!"
70001020-210 = "……Não acha que exagerou na saída de Trinity?"
70001020-211 = "Se não fechasse o contrato, mas mantivesse um bom relacionamento, poderíamos ter ganhado lembrancinhas de luxo……"
70001020-212 = "É verdade…… não, espera!#nEu nunca tive interesse desde o começo! Não quero esmolas de burgueses!"
70001020-213 = "Como representante de Red Winter, tenho que manter uma postura digna, sem me deixar levar por detalhes!"
70001020-214 = "Essa postura existe……?"
70001020-218 = "Mesmo assim, os do Clube Yin-Yang de Hyakkiyako estão demorando muito……"
70001020-219 = "Será que erraram o ponto de encontro?"
70001020-220 = "Olá~ tem alguém aí~?"
70001020-225 = "……Hã? Quem é? Não parece aluna de Hyakkiyako……"
70001020-226 = "S-serão visitantes de fora……?"
70001020-227 = "Ah, ainda bem. Achei que tínhamos errado o lugar!"
70001020-228 = "Sou Amami Nodoka, da Academia Federal Red Winter.#nGostaria de visitar as instalações daqui……"
70001020-239 = "Visitar……?"
70001020-240 = "Tsukuyo, essas pessoas devem ter visto o anúncio do 'evento grátis de experiência ninja' que postamos no canal……!"
70001020-241 = "M-mas aquele post não teve nem 10 visualizações……"
70001020-242 = "Duas dessas 10 pessoas são elas, com certeza!"
70001020-243 = "Eu achava que ninguém fora de Hyakkiyako se interessaria por ninjas……"
70001020-247 = "……Esta é a chance de ouro para 'Michiru-chan - Crônicas de uma Garota Ninja' entrar no mercado global!"
70001020-252 = "Estava esperando por vocês."
70001020-253 = "Bem-vindas à Hyakkiyako!"
70001020-254 = "Fufu. Obrigada pelo acolhimento caloroso!"
70001020-255 = "Então, o que querem fazer primeiro?#nLançar shurikens? Ou talvez pular de bambu?"
70001020-256 = "……Lançar shurikens? ……Pular de bambu?"
70001020-257 = "É a primeira vez que ouço falar desses métodos de banho……"
70001020-258 = "Banho……?"
70001020-259 = "Por acaso não ouviram? Viemos para experimentar as instalações de――"
70001020-260 = "Ah! Deviam ter falado antes!"
70001020-261 = "Esperem aí. Vou mostrar o método de banho tradicional dos ninjas!"
70001020-273 = "Isso é……?"
70001020-274 = "Banheira de tambor!"
70001020-275 = "Enchemos o tambor com água e acendemos fogo embaixo – com pouca água já dá pra tomar banho!"
70001020-276 = "Além disso, é fácil de montar!#nDá pra relaxar num lugar com vista bonita!"
70001020-277 = "M-mas tem um detalhe……#n……o corpo pode ficar preso no tambor……"
70001020-278 = "Outro dia…… depois do banho, não consegui sair…… foi um sufoco……"
70001020-279 = "C-culpa do meu corpo ser grande demais…… u-uu……"
70001020-280 = "Isso foi porque o tambor era pequeno!#nNão fica triste, Tsukuyo!"
70001020-286 = "(Ah, ela recuou……?)"
70001020-288 = "Desculpe…… alguma coisa errada……?"
70001020-289 = "……Quem diria que uma academia como Hyakkiyako teria condições tão precárias……"
70001020-293 = "Todos! Não se curvem aos opressores!"
70001020-297 = "Os camaradas de Red Winter estão do lado de vocês!"
70001020-301 = "É…… o-obrigada……?"
70001020-302 = "Sim, aceitem! É um manju especial de fonte termal!"
70001020-303 = "Desculpem pela quantidade…… mas enche o estômago, então comam quando estiverem com fome!"
70001020-304 = "É…… obrigada?"
70001020-306 = "Vamos lutar juntos! Por uma vida com banhos confortáveis!"
70001020-308 = "Ah…… sim……"
70001020-313 = "P-parece que houve um grande mal-entendido……"
70001020-318 = "Nyaaa―― Atraso! Atraso! Atraso!"
70001020-319 = "Ah, pessoal do Clube de Pesquisa Ninjutsu.#nVocês viram umas alunas de outra academia por aqui~?"
70001020-320 = "Falaram que ia chegar uma representante de Red Winter."
70001020-324 = "H-hã…… não pode ser……"
70001020-331 = "N-não. Nós não conhecemos nenhuma dupla de Red Winter, né Tsukuyo."
70001020-332 = "Ora, já foram embora? Depois a Kaho vai brigar comigo……"
70001020-336 = "……Hmm? O que é esse manju?"
70001020-341 = "Ganhei de um camarada que passou por aqui."
70001020-346 = "Camarada……?"