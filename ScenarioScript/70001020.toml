[translation]
70001020-1 = "Thermae Redwinter (2)"
70001020-3 = "Vocês são..."
70001020-4 = "As inspetoras de banhos que vieram da Academia Redwinter...?"
70001020-9 = "Sim. Recebemos uma missão especial da Presidente Cherino para inspecionar as instalações de banho da Academia Gehenna. #nMeu nome é Amami Nodoka, da Academia Redwinter."
70001020-10 = "Estou muito animada para experimentar as instalações de banho de Gehenna, que são famosas por suas fontes termais!"
70001020-11 = "Conto com a colaboração de vocês hoje!"
70001020-13 = "Ah... ouvi dizer que a Presidente Makoto tinha ido à Academia Redwinter, e já estava com um mau pressentimento..."
70001020-14 = "Francamente, que dor de cabeça..."
70001020-16 = "...Algum problema?"
70001020-18 = "Não, nada. Podem olhar o banho à vontade."
70001020-19 = "Os dormitórios de Gehenna não são muito bem administrados, mas..."
70001020-21 = "Mesmo assim, está tudo muito bem conservado."
70001020-26 = "As toalhas e os acessórios também são de alta qualidade."
70001020-28 = "Ah, sobre isso..."
70001020-29 = "O Departamento de Desenvolvimento de Fontes Termais deixou tudo aqui por conta própria."
70001020-31 = "Por conta própria...?"
70001020-33 = "Isso. Originalmente, aqui era apenas um grande banheiro público. #nSó tinha sabonete barato com cheiro de leite..."
70001020-34 = "Eles disseram que não podiam deixar as instalações termais abandonadas desse jeito, então o Departamento de Desenvolvimento de Fontes Termais veio e fez várias melhorias."
70001020-41 = "(Aquele Departamento de Desenvolvimento de Fontes Termais estava envolvido... isso foi um ponto cego.)"
70001020-52 = "A água tem um cheiro bom... será que colocaram sais de banho?"
70001020-54 = "Não, esses são os componentes naturais da fonte."
70001020-55 = "A água subterrânea que vem do vulcão Hinomu contém enxofre. #nEm Gehenna, se você cavar, pode criar uma fonte termal em qualquer lugar."
70001020-56 = "Pode-se dizer que é uma das poucas vantagens do distrito de Gehenna."
70001020-66 = "(A qualidade da água é diferente da de Redwinter... preciso levar isso em consideração...)"
70001020-70 = "...Posso entrar no banho para verificar a condição da água?"
70001020-72 = "Ah, fique à vontade."
70001020-74 = "Vamos ver..."
70001020-81 = "Ai, está quente!"
70001020-82 = "M-mas o que é isso! Que temperatura é essa!?"
70001020-84 = "Hm... é tanto assim? #nDeveria estar por volta de 70 graus..."
70001020-86 = "70 graus? Você está confundindo o banho com uma panela de cozinha!?"
70001020-87 = "Se eu entrar nessa água fervente, vou acabar me queimando!"
70001020-89 = "Que estranho. #nOs alunos de Gehenna dizem que essa temperatura é perfeita..."
70001020-91 = "Pelo menos os alunos da Academia Redwinter não estão acostumados com temperaturas tão altas..."
70001020-92 = "Não tem um banho com a temperatura um pouco mais baixa?"
70001020-98 = "O banho frio é por aqui."
70001020-100 = "Vamos ver..."
70001020-107 = "Ai, que gelado!!"
70001020-108 = "Isso é água com gelo!"
70001020-110 = "Nossa... isso me lembra os dias de inverno em que eu derretia o gelo do rio para me lavar."
70001020-112 = "Dizem que alternar entre banhos com temperaturas muito diferentes ajuda na circulação e traz um estado de relaxamento, não é?"
70001020-113 = "Muitos alunos de Gehenna gostam de estímulos fortes. #nÉ por isso que a temperatura está configurada assim..."
70001020-114 = "Parece que essa temperatura foi demais para os alunos da Academia Redwinter..."
70001020-116 = "Não só para nós, acho que seria demais para quase qualquer aluno!"
70001020-117 = "...Além disso, sem a cooperação do Departamento de Desenvolvimento de Fontes Termais, parece difícil reproduzir um ambiente como este..."
70001020-118 = "Shigure-chan! Vamos visitar a próxima academia!"
70001020-120 = "Rejeitado."
70001020-124 = "Bem-vindas à Academia Trinity, representantes da Academia Redwinter."
70001020-125 = "Já estamos cientes da situação."
70001020-126 = "...Soubemos que vocês tiveram uma experiência desagradável ao visitar os dormitórios da Academia Gehenna."
70001020-127 = "E-eu só fiquei um pouco surpresa, não é como se eu estivesse desconfortável..."
70001020-128 = "Não. Duvido muito que aquela Gehenna, que mal consegue gerenciar seus próprios alunos, saiba como receber convidados adequadamente. Sinto muito pelo que você passou."
70001020-129 = "Primeiro, por favor, aproveite este chá. #nEu chamarei vocês assim que os preparativos para o banho público estiverem prontos."
70001020-134 = "U-uau... esse chá e esses doces parecem caríssimos..."
70001020-135 = "Será que tem problema se eu levar isso para casa...?"
70001020-140 = "Eu não entendo muito de chá, mas... esse aroma, com certeza usaram folhas de chá bem caras aqui."
70001020-141 = "Se eu soubesse antes, teria trazido minha geleia de mirtilo caseira."
70001020-142 = "Receber um tratamento desses... Shigure-chan, talvez desta vez a gente consiga algo bom!"
70001020-151 = "Desculpem a espera. Os preparativos estão prontos, então vou guiá-los."
70001020-154 = "Hmm... que aroma bom..."
70001020-155 = "Parece até que o aroma do chá está vindo da água!"
70001020-160 = "Exatamente como você disse."
70001020-161 = "Nos dormitórios da Trinity, nós colocamos folhas de chá na banheira."
70001020-162 = "Além de aproveitar o banho com uma atmosfera especial, absorver os componentes das folhas pela pele também faz bem à saúde."
70001020-163 = "Hum... a temperatura da água é..."
70001020-170 = "Sim! Está na temperatura ideal!"
70001020-171 = "É como preparar um chá. #nExiste uma temperatura perfeita para o banho também."
70001020-172 = "As instalações de banho refinadas da Trinity são diferentes daquelas de certo... tipo de pessoa que mergulha em água fervida grosseiramente sem entender o espírito da coisa."
70001020-173 = "E-entendo..."
70001020-174 = "O que acha? Por que a Academia Federal Red Winter não adota instalações de banho semelhantes às da nossa Academia Trinity...?"
70001020-175 = "Se fizéssemos isso, todo mundo ia adorar...!"
70001020-176 = "O que você acha, Shigure-chan?"
70001020-182 = "Hmm~, desculpe cortar o barato, mas..."
70001020-183 = "Pode me dizer qual é o custo de manutenção?"
70001020-185 = "O custo de manutenção das instalações de banho? Não é tão alto assim."
70001020-186 = "Se calcularmos desde a limpeza do piso de mármore natural até o valor das folhas de chá colocadas na banheira..."
70001020-190 = "Provavelmente, cerca de 1 milhão de ienes por mês?"
70001020-192 = "O quêêêê!? É tão caro assim?"
70001020-194 = "Sim? As folhas de chá que colocamos na banheira são baratas, custam cerca de 10 mil ienes por pacote."
70001020-195 = "Comparado ao chá que tomamos normalmente, o sabor e o aroma são inferiores..."
70001020-197 = "Folhas de chá que custam mais de 10 mil ienes por pacote... são baratas..."
70001020-202 = "Impossível! Como eu pensei, não dá para fazer parceria com burgueses como os da Trinity!"
70001020-204 = "Rejeitado."
70001020-208 = "...Eu não sabia que as instalações de banho de academias tradicionais como Trinity e Gehenna eram tão absurdas."
70001020-209 = "Se administrassem as coisas desse jeito, iriam à falência em menos de um mês!"
70001020-210 = "...Quando saímos da Trinity, você não acha que falou demais?"
70001020-211 = "Mesmo sem fechar contrato, se tivéssemos sido gentis, talvez tivéssemos ganhado lembrancinhas de luxo..."
70001020-212 = "É verdade... quer dizer, não, não! #nEu não estava interessada desde o começo! Não quero esmola de burguês!"
70001020-213 = "Como representantes da Academia Federal Red Winter, não podemos nos deixar levar por detalhes e precisamos manter uma postura digna que não envergonhe nossa escola!"
70001020-214 = "Será que nossa escola tem esse tipo de tradição...?"
70001020-218 = "Mas, falando nisso, o Departamento Yin-Yang da Academia Hyakkiyako não aparece nunca..."
70001020-219 = "Será que erramos o local de encontro?"
70001020-220 = "Com licença~ tem alguém aí~?"
70001020-225 = "...Hum? Quem é? Não parecem ser alunas da Academia Hyakkiyako..."
70001020-226 = "V-vocês são convidados... que vieram de fora...?"
70001020-227 = "Ah, que bom. Achei que tínhamos errado o lugar!"
70001020-228 = "Meu nome é Amami Nodoka, da Academia Federal Red Winter. #nEu queria visitar as instalações daqui..."
70001020-239 = "Visitar...?"
70001020-240 = "Tsukuyo, essas pessoas... talvez sejam clientes que vieram depois de ver o anúncio do 'Evento de Experiência Ninja Gratuita' que postamos no canal...!"
70001020-241 = "M-mas... aquela postagem, nem comentários tem, e não chegou nem a 10 visualizações..."
70001020-242 = "Com certeza, duas dessas dez pessoas são eles!"
70001020-243 = "Eu achava que não existia ninguém fora da Academia Hyakkiyako que se interessasse por ninjas, mas..."
70001020-247 = "Essa é a chance perfeita para o 'Diário Ninja da Michiru' entrar para o canal global!"
70001020-252 = "Eu estava esperando por vocês há muito tempo."
70001020-253 = "Sejam bem-vindos à Academia Hyakkiyako!"
70001020-254 = "Fufu. Muito obrigada pelas boas-vindas calorosas!"
70001020-255 = "Já que estamos aqui, por onde quer começar?#nArremesso de shuriken? Ou salto de broto de bambu?"
70001020-256 = "...Arremesso de shuriken? ...Salto de broto de bambu?"
70001020-257 = "É a primeira vez que ouço falar desse método de banho..."
70001020-258 = "Banho...?"
70001020-259 = "Por acaso vocês não foram informadas?#nNós estamos aqui para experimentar as instalações de banho..."
70001020-260 = "Ah! Então era isso, deviam ter dito antes!"
70001020-261 = "Esperem um pouco. Vou mostrar a vocês o método tradicional de banho dos ninjas!"
70001020-273 = "Isso é...?"
70001020-274 = "É um banho de tambor!"
70001020-275 = "Se você encher o tambor com água e acender um fogo embaixo dele, pode tomar banho usando pouquíssima água!"
70001020-276 = "Além disso, o banho de tambor é fácil de instalar!#nVocê pode relaxar e aproveitar o banho em um lugar com uma vista bonita!"
70001020-277 = "S-só tem um pequeno detalhe...#nExiste o risco de... ficar com o corpo preso no tambor..."
70001020-278 = "Da última vez... depois do banho, não consegui sair... foi um sufoco..."
70001020-279 = "É que meu corpo é grande demais sem necessidade... u-uuh..."
70001020-280 = "Isso foi só porque o tambor era pequeno demais!#nNão fique triste, Tsukuyo!"
70001020-286 = "(A-ah... será que elas estão assustadas...?)"
70001020-288 = "Hum... algum problema...?"
70001020-289 = "...Não acredito que uma escola como a Academia Hyakkiyako tenha condições tão precárias..."
70001020-293 = "Pessoal! Por favor, nunca se curvem diante de autoridades tirânicas!"
70001020-297 = "Os camaradas da Academia Federal Red Winter estão do lado de vocês!"
70001020-301 = "E-eh... o-obrigada...?"
70001020-302 = "Sim, por favor, aceitem! É um bolinho de fonte termal especial!"
70001020-303 = "Sinto muito por ser pouco... mas ele sustenta bem, então comam quando estiverem com fome!"
70001020-304 = "E-eh... obrigada...?"
70001020-306 = "Vamos lutar juntas! Por uma vida de banhos confortáveis!"
70001020-308 = "Eh... bem..."
70001020-313 = "Acho que... houve um grande mal-entendido..."
70001020-318 = "Nyaaaa! Atrasada, atrasada, super atrasada~!"
70001020-319 = "Ah, pessoal do Clube de Pesquisa de Ninjutsu.#nVocês viram alunas de outras escolas por aqui~?"
70001020-320 = "Disseram que viriam representantes da Academia Federal Red Winter."
70001020-324 = "E-eh... não pode ser..."
70001020-331 = "N-não. Nós não conhecemos nenhuma dupla da Red Winter, né, Tsukuyo?"
70001020-332 = "Nossa, será que elas já foram embora...? A Kaho pode acabar brigando comigo depois."
70001020-336 = "...Hm? O que é esse bolinho?"
70001020-341 = "Uma camarada que passou por aqui... me deu."
70001020-346 = "Camarada...?"
