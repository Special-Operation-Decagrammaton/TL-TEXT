[translation]
1011303-1 = "趣味の時間（2）"
1011303-2 = "こんにちは、先生。お待ちしておりました。"
1011303-3 = "[s] \"今回は結構早めに来たつもりだったのに……！\""
1011303-4 = "私が27分前に着いていただけなので。"
1011303-5 = "先ほどお話ししましたが、今日は久しぶりの非番です。"
1011303-6 = "[s1] \"それについて聞きたかったんだけど……。\"\n[s2] \"どうして非番の日に、わざわざ私服で救急医学部に行くの？\""
1011303-9 = "とりあえず歩きましょうか。"
1011303-10 = "それについては、歩きながらお話します。"
1011303-12 = "本日の目的は、薬品の整備です。"
1011303-13 = "緊急対応が多いため、書類整理や業務記録などは、どうしても疎かになりがちですから。"
1011303-14 = "薬品の整備もまた、その一つです。"
1011303-15 = "[s] \"でも、これって休日出勤だよね？\""
1011303-16 = "……それは否定しません。"
1011303-17 = "なら、なぜ私服で来ているのか、と？"
1011303-18 = "……部員たちに気を使わせてしまいますから。"
1011303-19 = "ご存じの通り、私は救急医学部の部長です。"
1011303-20 = "私が非番の日にも制服を着ていたら、見かけた生徒が気にするでしょう。"
1011303-21 = "もちろん非番の日でも、#n救急医学部として警戒を解いてはいけませんが……。"
1011303-22 = "できるだけ、休める時はしっかりと休んでほしいので。"
1011303-23 = "[s] \"「死体」が発生するかもしれないから？\""
1011303-24 = "はい、負傷者はどこでいつ発生するか分かりません。"
1011303-25 = "とはいえ、キヴォトスでは実際に死体……#nいえ、負傷者を見ることはないです。"
1011303-26 = "先生が思っているほど、重く受け止める必要はありません。"
1011303-27 = "もちろん、非番の日に私服で来ること自体、問題視されるかもしれませんが……。"
1011303-28 = "他の部員も知っているように、これはあくまで趣味の延長です。"
1011303-29 = "[s] \"結局は、服装が違うだけなんだね……。\""
1011303-30 = "そうですね。"
1011303-31 = "服装や心構えといった、外からどう見えるかの違い、でしょうか。"
1011303-32 = "先生のような大人なら、よくあるでしょう？"
1011303-33 = "[s3] \"もちろん、私は慣れてるけど……。\"\n[s4] \"セナはまだ生徒だからね。\""
1011303-36 = " ……。"
1011303-37 = "心配してくださったんですね、ありがとうございます。"
1011303-38 = "そうこう話しているうちに、到着しましたね。"
1011303-40 = "ここには座り心地が悪い椅子しかなく申し訳ありませんが、#n少し我慢していただけないでしょうか？"
1011303-41 = "……ありがとうございます。#n先生は、やっぱり優しいですね。"
1011303-42 = "どうかしましたか？#nもしかして、気分を害してしまわれましたか……？"
1011303-43 = "思っていることをそのまま口にしてしまっているので、ご不快にさせてしまったのならすみません。"
1011303-44 = "そういうわけでないのなら安心しました。"
1011303-45 = "薬品の整備はすぐ終わりますので、座ってお待ちください。"
1011303-46 = "[s] \"薬品の整備が好きになったきっかけはあるの？\""
1011303-47 = "……。"
1011303-48 = "一番の理由は、この作業をしていると心が落ち着くからです。"
1011303-49 = "例えば、プラモデルを組み立てたり、木工や金属加工を趣味にしている人もいますよね。"
1011303-50 = "そういう人たちは、一見手間ばかりかけて疲れるだけに見えるかもしれません。"
1011303-51 = "ですが本人にとっては、その反復作業がむしろ心を整える時間なんです。"
1011303-52 = "私の場合、それが薬品の整備という訳です。"
1011303-53 = "それが普段の仕事と関わっている分、なおさら有意義だと感じます。"
1011303-54 = "なので薬品の整備は、ただの作業以上の意味があるのです。"
1011303-55 = "[s] \"セナにとって薬品の整備は、すごく充実した時間なんだね。\""
1011303-56 = "はい、私にとってはそうです。"
1011303-60 = "それに、先生が一緒にいてくださるなら、なおさらです。"
1011303-61 = "[s] \"そ、そうなんだ……？\""
1011303-62 = "素直に申し上げると、今日は先生から会いに来てくれましたが……。"
1011303-66 = "……ここへ一緒に来たのは、私自身の意思でもありました。"
1011303-67 = "先生もご存じの通り、私は曖昧な表現があまり得意ではないのですが、この場面ではそうせざるを得ず……。"
1011303-68 = "今の私の気持ちを、一言で表すなら……。"
1011303-69 = "……ちょっとしたわがまま、といったところでしょうか。"
1011303-70 = "ただ、私のせいでご迷惑をおかけしたのではないかと……。"
1011303-71 = "それについては、申し訳なく思っています。"
1011303-72 = "[s5] \"いや、そんなことないよ。\"\n[s6] \"私もセナと一緒にいられて楽しいから。\""
1011303-75 = "そうですか。"
1011303-76 = "ありがとうございます。それなら、私も素直に嬉しいです。"
1011303-77 = "実は先生のお話を聞いているうちに、自分は本当に休んでいるのだろうか、と思い始めてきました。"
1011303-78 = "もしかしたら、この時間は私にとって「ご褒美」かもしれない、と。"
1011303-79 = "先生とお話をしながら、普段とは違う私をお見せできましたし……。"
1011303-80 = "結局、とても意味のある「ご褒美」だったようです。"
1011303-81 = "[s] \"そう、なの……？\""
1011303-82 = "はい、そうです。"
1011303-83 = "……つまり、先生には心から感謝しているのです。"
1011303-85 = "（セナの「趣味」が終わるのを待ってから、二人でご飯を食べに行った）"
