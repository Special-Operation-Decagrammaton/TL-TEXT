[translation]
1011303-1 = "Hora do passatempo (2)"

1011303-2 = "Olá, senhor. Estávamos esperando por você."

1011303-3 = "[s]“Pensei em chegar bem cedo dessa vez...!”"

1011303-4 = "Só cheguei 27 minutos mais cedo."

1011303-5 = "Como mencionei anteriormente, hoje é meu primeiro dia de folga em algum tempo."

1011303-6 = "[s1]\"Eu queria te perguntar sobre isso...\"\n[s2]\"Por que você vai ao pronto-socorro à paisana nos dias de folga?\""

1011303-9 = "Vamos caminhar agora?"

1011303-10 = "Falaremos sobre isso enquanto caminhamos."

1011303-12 = "O objetivo de hoje é preparar medicamentos."

1011303-13 = "Como há tantas emergências com as quais lidar, é fácil negligenciar coisas como organização de documentos e registros comerciais."

1011303-14 = "A manutenção de medicamentos também é uma delas."

1011303-15 = "[s]\"Mas isso funciona nos feriados, certo?\""

1011303-16 = "...Não vou negar isso."

1011303-17 = "Se sim, por que você está aqui à paisana?"

1011303-18 = "...Isso deixaria os sócios do clube preocupados."

1011303-19 = "Como você sabe, sou o diretor do Departamento de Medicina de Emergência."

1011303-20 = "Se eu usasse meu uniforme mesmo nos dias de folga, os alunos que me vissem perceberiam."

1011303-21 = "Claro, mesmo nos dias de folga,#nComo departamento de medicina de emergência, não devemos baixar a guarda..."

1011303-22 = "Quero que você descanse o máximo possível quando puder."

1011303-23 = "[s]\"É porque 'cadáver' pode ocorrer? \""

1011303-24 = "Sim, você nunca sabe onde ou quando ocorrerão lesões."

1011303-25 = "No entanto, em Kivotos existem cadáveres...#nNão, não vejo ninguém ferido."

1011303-26 = "Não há necessidade de levar isso tão a sério quanto o professor pensa."

1011303-27 = "É claro que vir à paisana nos dias de folga pode ser visto como um problema..."

1011303-28 = "Outros membros também sabem, este é apenas uma extensão de um hobby."
1011303-29 = "[s]\"No final das contas, são apenas as roupas que são diferentes...\""

1011303-30 = "Concordo."

1011303-31 = "É a diferença na forma como eles aparecem do lado de fora, como suas roupas e atitudes?"

1011303-32 = "Isso não é comum para adultos como professores?"

1011303-33 = "[s3]\"Claro, estou acostumado...\"\n[s4]“Sena ainda é uma estudante.”"

1011303-36 = " ……。"
1011303-37 = "Obrigado pela sua preocupação."

1011303-38 = "Enquanto conversávamos, chegamos."

1011303-40 = "Lamento que só haja cadeiras desconfortáveis ​​aqui.#nVocê poderia ter um pouco de paciência?"

1011303-41 = "……obrigado.#nA professora é muito gentil."

1011303-42 = "O que está errado?#nPor acaso eu te ofendi?"

1011303-43 = "Só estou dizendo o que penso, então peço desculpas se fiz você se sentir desconfortável."

1011303-44 = "Estou aliviado se não for esse o caso."

1011303-45 = "A preparação dos produtos químicos será concluída em breve, então sente-se e espere."

1011303-46 = "[s]\"Existe uma razão pela qual você se interessou pela manutenção de produtos químicos?\""

1011303-47 = "…..."
1011303-48 = "A principal razão é que fazer este trabalho acalma minha mente."

1011303-49 = "Por exemplo, algumas pessoas têm hobbies como montagem de modelos de plástico, marcenaria e metalurgia."

1011303-50 = "À primeira vista, essas pessoas podem parecer que estão apenas se esforçando muito e ficando cansadas."

1011303-51 = "Porém, para ele, o trabalho repetitivo é na verdade um momento de preparar a mente."

1011303-52 = "No meu caso, isso significa manter produtos químicos."

1011303-53 = "Sinto que é ainda mais significativo porque está relacionado com o meu trabalho diário."

1011303-54 = "Portanto, a manutenção de produtos químicos é mais do que uma tarefa simples."

1011303-55 = "[s]“A manutenção dos produtos químicos é um momento muito gratificante para Senna.”"

1011303-56 = "Sim, é assim para mim."
1011303-60 = "E se o seu professor estiver com você, melhor ainda."

1011303-61 = "[s]“E-é isso mesmo...?”"

1011303-62 = "Para ser sincero, meu professor veio me ver hoje..."

1011303-66 = "...Também foi minha vontade vir aqui com você."

1011303-67 = "Como você sabe, não sou muito bom com expressões vagas, mas nesta situação não tive escolha a não ser fazê-lo..."

1011303-68 = "Se eu tivesse que descrever meus sentimentos atuais em uma palavra..."

1011303-69 = "...Talvez seja um pouco egoísta."

1011303-70 = "No entanto, acho que posso ter lhe causado alguns problemas..."

1011303-71 = "Sinto muito por isso."

1011303-72 = "[s5]\"Não, isso não é verdade.\"\n[s6]“Porque eu também gosto de estar com Sena.”"

1011303-75 = "é assim mesmo."

1011303-76 = "obrigado. Se for esse o caso, eu também ficaria muito feliz."

1011303-77 = "Na verdade, ao ouvir a história da professora, comecei a me perguntar se estava realmente descansando."

1011303-78 = "Talvez desta vez possa ser uma “recompensa” para mim."

1011303-79 = "Conversando com a professora pude mostrar um lado diferente de mim..."

1011303-80 = "No final, parece que foi uma “recompensa” muito significativa."

1011303-81 = "[s] \"Será que é assim...?\""

1011303-82 = "Sim, está certo."

1011303-83 = "...Em outras palavras, sou verdadeiramente grato ao meu professor."

1011303-85 = "(Depois de esperar Sena terminar seu “hobby”, as duas saíram para comer.)"

