[translation]
22030-1 = "Episódio 3; ~Aris, Inicia a Aventura!~"
22030-2 = "(Depois disso, conversei com o Departamento de Desenvolvimento de Jogos sobre ideias para o novo jogo)"
22030-3 = "Como eu disse antes, o nosso próximo jogo será――"
22030-8 = "Um 'RPG de Exploração de Masmorras Estilo Vida Lenta Relaxante'!"
22030-9 = "Como esperado, o mais importante são as masmorras principais, não é mesmo!"
22030-10 = "Uhum... Dependendo de como a masmorra for projetada, o conteúdo do jogo também muda..."
22030-11 = "Devemos fazer com que o jogador explore masmorras predefinidas... ou transformar em um roguelike..."
22030-12 = "A Aris prefere roguelike!"
22030-15 = "[ns] \"Você gosta de roguelikes, Aris?\""
22030-16 = "Sim! Como a estrutura da masmorra muda toda vez, #n fico super animada pensando em quais monstros ou equipamentos raros vou encontrar dessa vez!"
22030-17 = "Especialmente naquele jogo roguelike que fizemos juntas da última vez, #n nós criamos um item único com o nome do Sensei."
22030-18 = "[s] \"......Hm?\""
22030-19 = "Nós o chamamos de 'Adesivo de Nota 10 do Sensei'!"
22030-20 = "Quando a Aris conseguiu o adesivo, ela ficou muito feliz. #n Quando você usa, o personagem fica incrivelmente forte!"
22030-21 = "[s] \"......O efeito desse adesivo de nota 10 é impressionante, hein!\""
22030-22 = "Ah, e-isso é! #n Digamos que é um pouco de espírito lúdico da nossa parte."
22030-23 = "Eu queria que a dificuldade do jogo ficasse mais, eh, ex... ex..."
22030-24 = "Eu queria que fosse mais Extrema!"
22030-25 = "Você não queria dizer 'Empolgante'?"
22030-27 = "No próximo jogo, a Aris também quer coletar um monte de 'Adesivos de Nota 10'!"
22030-28 = "[s] \"Fico feliz em ouvir isso da Aris, mas se for o caso, eu prefiro ser um membro da party...!\""
22030-29 = "Então, se formos fazer um roguelike, como deve ser o formato?"
22030-30 = "Ruínas subterrâneas... talvez? #n Afinal, esse é o formato mais básico para masmorras..."
22030-31 = "Hmmm, não acha isso normal demais?"
22030-32 = "Se é pra fazer algo... eu preferia algo que passasse um ar mais especial, algo mais épico..."
22030-34 = "Que tal o formato de uma torre onde você vai subindo?"
22030-35 = "Se a dificuldade fosse subindo a cada lance de escadas para os andares superiores, não seria mais intuitivo?"
22030-36 = "Mas aí não tem nenhum elemento surpresa! Escadas são óbvias demais!"
22030-37 = "Você só sabe reclamar... #n Então, que ideia a *senhora* tem, mana?"
22030-38 = "Ruínas subterrâneas... Torre... #n Então, em vez de escadas, nós usamos..."
22030-39 = "Um elevador! #n O que acham de um elevador?"
22030-41 = "Descer até as ruínas subterrâneas pegando um elevador?"
22030-42 = "Pensando bem, a Aris já jogou algo parecido antes."
22030-54 = "É um jogo onde você é um espião e derrota inimigos no elevador de um prédio!"
22030-55 = "Ah, entre os jogos retrô, esse é bem popular."
22030-56 = "Hmmm, para uma ideia sua, mana, até que é bem inofensiva..."
22030-58 = "Não é mesmo! Com certeza tá faltando alguma coisa! Não tem surpresa nenhuma nisso!"
22030-59 = "Hm...?"
22030-60 = "O que nós precisamos é de um visual deslumbrante! Além de um roteiro épico e elementos surpresas!"
22030-61 = "Em vez de descer por ruínas subterrâneas, que tal subirmos uma torre! #n De elevador!"
22030-62 = "Torre?"
22030-67 = "Subimos de elevador e..."
22030-73 = "No final, tem uma explosão no telhado!"
22030-74 = "Isso sim que é espetáculo!"
22030-76 = "Espera aí. #n Então como o jogador vai explorar a masmorra?"
22030-77 = "Primeiro a gente foca num visual deslumbrante e aí..."
22030-78 = "Você sempre diz isso, mana!"
22030-80 = "Uwaah!? M-Midori...?"
22030-81 = "Você disse a mesma coisa da última vez."
22030-82 = "Você veio com um papo de 'Para representar esta masmorra, precisamos desenhar o interior com riqueza de detalhes!' ou algo assim, e fez todo mundo passar o dia inteiro desenhando a masmorra!"
22030-83 = "Ugh! I-Isso foi...!"
22030-84 = "A Aris também desenhou bastante! Foi muito divertido poder desenhar tantas coisas!"
22030-85 = "Olhe, Sensei! Esta é a ilustração que a Aris fez!"
22030-86 = "A obra-prima da Aris é... O guardião mais forte da masmorra, o 'Guardião Sensei'! #n O nome foi inspirado na imagem do Sensei, que sempre guia a Aris e as outras!"
22030-87 = "É um guardião incrivelmente forte e invencível!"
22030-88 = "[s] \"Queria dar uma olhada nisso... ou talvez seja melhor não!\""
22030-89 = "É, é que... ter um visual deslumbrante é, #n n-na verdade... uma escolha feita... de acordo com a necessidade."
22030-90 = "Não estou dizendo que odeio desenhar."
22030-91 = "Mas nós tivemos tanto trabalho desenhando tudo aquilo com todo mundo... #n E no fim quase não usamos nada no jogo."
22030-92 = "Não nos faça perder tempo à toa. #n Vamos falar de algo que seja realista e viável de fazer."
22030-93 = "M-Mas! Se a gente fizer isso, não vai dar pra ver a paisagem além do horizonte! #n Não vamos conseguir superar os nossos limites!"
22030-102 = "[ns] \"Acalmem-se, vocês duas...\""
22030-103 = "Já sei!"
22030-104 = "O que você acha, Sensei!?"
22030-105 = "Isso mesmo. Numa hora dessas, a opinião do Sensei é necessária! #n Qual de nós você acha que está certa?"
22030-106 = "[s] \"Espera um pouco, a gente não desviou do motivo original pra vocês terem me chamado...?\""
22030-108 = "Algo mais chamativo e espetacular é melhor, não acha!?"
22030-109 = "Precisamos de um meio-termo realista e viável, concorda?"
22030-112 = "E então!? Sensei!"
22030-116 = "[ns] (Sinto que, não importa o que eu escolha, a flag para um Bad End será ativada...)"
22030-118 = "E-Espera aí! Todo mundo, parem!"
22030-119 = "O S-Sensei tá em apuros...!"
22030-121 = "Ah..."
22030-122 = "D-Desculpe..."
22030-123 = "Se continuarmos discutindo desse jeito, só vamos causar problemas pro Sensei."
22030-124 = "Por isso... acho que deveríamos decidir isso com 'aquilo', que tem sido passado de geração em geração no Departamento de Desenvolvimento de Jogos."
22030-126 = "Entendido! É 'aquilo', não é, Yuzu!"
22030-127 = "[s] \"'Aquilo' que tem sido passado de geração em geração...?\""
22030-128 = "Sim, bem... às vezes..."
22030-129 = "Acontece com bastante frequência... das nossas opiniões não entrarem em um acordo."
22030-130 = "[s] \"Pelo visto acontece bastante, hein...\""
22030-131 = "Então, quando nós não conseguimos concordar com a opinião da outra, decidimos resolver isso com um duelo. #n Com a regra de que 'A opinião do vencedor é absoluta'."
22030-132 = "[s] \"O Departamento de Desenvolvimento de Jogos é bem mais combativo do que eu imaginava...\""
22030-133 = "Tudo bem... Se a Yuzu tá dizendo isso..."
22030-134 = "Eu aceito esse duelo!"
22030-135 = "Midori! Pode chorar à vontade, porque eu não vou pegar leve!"
22030-136 = "Eu digo o mesmo pra você, mana!"
22030-137 = "[s1] \"M-Mas esse duelo... O que exatamente vocês vão fazer?\"\n[s2] \"Eu não acho que seja uma boa ideia brigar por causa dis...\""
22030-144 = "Vamos decidir isso no 'Full Jelly War'!"
22030-146 = "[s] \"......Ah, vocês vão duelar num jogo.\""
22030-148 = "Sim, afinal somos o Departamento de Desenvolvimento de Jogos."
22030-150 = "Certo, agora não tem mais como voltar atrás, ouviu bem! Midori!"
22030-151 = "Humpf! Digo o mesmo para você, mana!"
22030-160 = "(E assim, enquanto a Momoi e a Midori começavam a se enfrentar no jogo...)"
22030-162 = "As duas começaram a jogar..."
22030-163 = "O que a Aris deveria fazer?"
22030-164 = "Deixa eu pensar... Aris-chan, você poderia sair e tentar procurar por novas ideias para o jogo?"
22030-165 = "Como o Sensei está com você, talvez você consiga encontrar alguma inspiração especial lá fora."
22030-166 = "[s] \"Sinto a presença marcante da Presidente do Departamento de Desenvolvimento de Jogos nela...\""
22030-167 = "Eh? A-A, a-acho que isso não tem nada a ver...!"
22030-168 = "Entendido... É uma quest para criar um jogo divertido!"
22030-169 = "Sim! Compreendido, Yuzu!"
22030-170 = "Ta-da-da-daaan! #n A Aris aceitou a quest!"
22030-171 = "Vamos lá, Sensei! Vamos sair numa aventura com a Aris!"
22030-178 = "(E então, acabei explorando o campus da Millennium junto com a Aris)"
22030-179 = "Ta-da-da-daaan! #n Aris e o Sensei decidiram sair da vila!"
22030-180 = "A aventura da Aris, a Heroína Aprendiz, e do Sensei começa a partir de agora!"
22030-181 = "[s] \"Hoje você é uma Heroína Aprendiz, Aris?\""
22030-182 = "Sim! Hoje tanto a Aris quanto o Sensei são Heroínas Aprendizes de Nível 1!"
22030-183 = "Até agora, eu já comecei aventuras sendo a Heroína Lendária desde o início..."
22030-184 = "Mas, certa vez a Momoi disse o seguinte."
22030-185 = "[s] \"A Momoi?\""
22030-186 = "Sim. 'Não é meio estranho uma Heroína Lendária sair numa aventura para derrotar Slimes de Nível 1?'"
22030-187 = "Por causa disso, ela disse que iria colocar um Dragão Lendário logo perto da cidade inicial onde a aventura começa! #n Mas..."
22030-188 = "A Midori e a Yuzu tentaram impedir ela desesperadamente, dizendo que assim o jogo não iria pra frente de jeito nenhum."
22030-191 = "E que um jogo assim seria muito difícil de vender...?"
22030-192 = "E que, mesmo se vendesse, corria o risco de virar um jogo de nicho com um número limitado de consumidores...!"
22030-193 = "[s] \"Entendi. Parecem os bastidores e os problemas do mundo dos adultos...\""
22030-196 = "Naquela hora, eu não consegui entender tudo o que elas estavam dizendo, mas..."
22030-197 = "Mesmo assim... Hoje, já que é uma aventura especial com o Sensei, começarei do Nível 1."
22030-198 = "Vamos derrotar monstros aos poucos, subir de nível e... #n Mirar em nos tornarmos Heróis Lendários, Sensei!"
22030-199 = "[s] \"Sim, vamos dar o nosso melhor.\""
22030-200 = "......No entanto, ao começar uma aventura juntos assim, #n a Aris está com uma dúvida."
22030-201 = "O que nós devemos fazer para concluir a quest da Yuzu...?"
22030-202 = "[s] \"Hmmm... Que tal simplesmente andarmos para frente por enquanto?\""
22030-203 = "Andarmos para frente?"
22030-204 = "[s] \"Você mesma disse isso antes, não é? Que a aventura de um herói começa sempre dando um passo à frente.\""
22030-205 = "......!"
22030-206 = "Sim! Os encontros, as batalhas... e até subir de nível e concluir quests! #n Tudo começa caminhando para frente!"
22030-207 = "O Sensei possui um conhecimento admirável, de fato!"
22030-208 = "[s] \"Foi a própria Aris quem me ensinou tudo isso.\""
22030-209 = "Ehehe, sim! Sendo assim, Sensei! Vamos! Vamos em frente!"
22030-211 = "(E assim, a minha aventura com a Aris começou)"
22030-213 = "Próximo Episódio; ~Aris e os Guiados~ (1)"