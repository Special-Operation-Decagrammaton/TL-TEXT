[translation]
22030-1 = "第3話;～アリス、冒険を始めます！～"
22030-2 = "（その後、ゲーム開発部と新作ゲームのアイデアについて話した）"
22030-3 = "さっきも言ったけど、うちの次回作は――"
22030-8 = "「まったりスローライフ系ダンジョン探索型RPG」！"
22030-9 = "やっぱり、重要なのはメインになるダンジョンだよね！"
22030-10 = "うん……ダンジョンをどう設計するかで、ゲームの内容も変わるし……。"
22030-11 = "決められたダンジョンを攻略するのか……それともローグライクにするのか……。"
22030-12 = "アリスはローグライクがいいです！"
22030-15 = "[ns] \"アリスはローグライクが好きなの？\""
22030-16 = "はい！毎回ダンジョンの構造が変わるので、#n今度はどんなモンスターやレア装備に出会えるのだろうかと、ワクワクします！"
22030-17 = "特に、前回みんなで作ったローグライクゲームは、#n先生の名前でユニークアイテムを作りました。"
22030-18 = "[s] \"……ん？\""
22030-19 = "名付けて「先生のはなまるシール」です！"
22030-20 = "シールを手に入れると、アリスはとても嬉しかったです。#n使うとキャラクターがすごく強くなるのです！"
22030-21 = "[s] \"……はなまるシールの効果、すごいね！\""
22030-22 = "あっ、そ、それは！#n若干の遊び心というか。"
22030-23 = "ゲームの難易度的にもっと、え、エク……エク……"
22030-24 = "エクストリームしてほしいと思って！"
22030-25 = "そこはエキサイティングじゃないの？"
22030-27 = "今度のゲームでも、アリスは「はなまるシール」をたくさん集めたいです！"
22030-28 = "[s] \"アリスの言葉は嬉しいけど、せっかくならパーティーメンバーになりたいかな……！\""
22030-29 = "じゃあ、もしローグライクを作るとしたら形はどうしよう？"
22030-30 = "地下遺跡……とか？#nダンジョンでは一番基本になる形だから……。"
22030-31 = "う～ん、普通すぎない？"
22030-32 = "せっかく作るなら……もっとこう、特別感があって、壮大なのがいいんだけど……。"
22030-34 = "塔の形式で登っていくのは？"
22030-35 = "階段で上層にいく毎に、難易度も上がる形式だったら直感的じゃないかな。"
22030-36 = "それだと意外性がないじゃん！階段なんて安直すぎるよ！"
22030-37 = "文句ばっか……#nじゃあ、そういうお姉ちゃんのアイデアは？"
22030-38 = "地下遺跡……塔……#nだったら、階段じゃなくて……"
22030-39 = "エレベーター！#nエレベーターとかどうかな？"
22030-41 = "エレベーターに乗って地下遺跡を降りるの？"
22030-42 = "そういえば、以前アリスがやったゲームにも似たようなものがありました。"
22030-54 = "スパイになって、マンションのエレベーターで敵を倒すゲームです！"
22030-55 = "あ、レトロゲームの中でも、結構人気があるヤツだね。"
22030-56 = "う～ん、お姉ちゃんのアイデアにしては無難な……"
22030-58 = "そうだよね！やっぱり全然足りない！意外性がなさすぎる！"
22030-59 = "ん……？"
22030-60 = "必要なのは華やかなビジュアル！そして壮大なシナリオと意外性！"
22030-61 = "地下遺跡を降りるんじゃなくて、塔を登るのはどうかな！#nエレベーターに乗って！"
22030-62 = "塔？"
22030-67 = "エレベーターで上がっていって……"
22030-73 = "最後に屋上で爆発するの！"
22030-74 = "これぞまさにスペクタクル！"
22030-76 = "待って。#nじゃあダンジョンはどうやって攻略するの？"
22030-77 = "まずは華やかなビジュアルを意識して……"
22030-78 = "お姉ちゃんはいっつもそう言うよね！"
22030-80 = "うわっ！？#nみ、ミドリ……？"
22030-81 = "この前も同じようなこと言ってさ。"
22030-82 = "「このダンジョンを表現するには、内部を細かく描く必要がある！」とかなんとか言って、みんなで一日中ダンジョン描くハメになって！"
22030-83 = "うっ！そ、それは！"
22030-84 = "アリスもたくさん描きました！いろんなものを描けて楽しかったです！"
22030-85 = "見てください先生！アリスが描いたイラストです！"
22030-86 = "アリスの自信作は……ダンジョン最強の番人「先生ガーディアン」！#nいつもアリスたちを導いてくれる先生のイメージから名前をつけました！"
22030-87 = "とても強い無敵のガーディアンです！"
22030-88 = "[s] \"それはちょっと見たいような……見たくないような！\""
22030-89 = "そ、その……華やかなビジュアルは、#nあ、あくまで……必要に応じた、選択……だから。"
22030-90 = "描くこと自体が嫌って言ってるわけじゃないよ。"
22030-91 = "でも、皆であんなに苦労して描いたのに……#nゲームではほとんど使わなかったじゃん。"
22030-92 = "無駄な事をさせないで。#n実現可能なレベルの話をしようよ。"
22030-93 = "で、でも！それだと地平線の景色が見れないよ！#n限界を突破できないよ！"
22030-102 = "[ns] \"二人とも落ち着いて……。\""
22030-103 = "そうだ！"
22030-104 = "先生の意見はどう！？"
22030-105 = "ええ。こういう時こそ、先生の意見が必要です！#nどちらが正しいと思いますか？"
22030-106 = "[s] \"ちょっと待って、最初に呼んだ理由から変わってない……？\""
22030-108 = "やっぱり派手な方がいいよね！？"
22030-109 = "実現可能なラインの妥協が必要ですよね？"
22030-112 = "ね！？先生！"
22030-116 = "[ns] （どちらを選んでもバッドエンドのフラグが立ちそうな……）"
22030-118 = "ちょ、ちょっと！みんなストップ！"
22030-119 = "せ、先生が困ってる……！"
22030-121 = "あ……"
22030-122 = "ご、ごめん……。"
22030-123 = "このまま論争を続けても、先生に迷惑をかけるだけだよ。"
22030-124 = "だから……ここは、ゲーム開発部で代々受け継がれてる「アレ」で決めた方がいいと思う。"
22030-126 = "なるほど！「アレ」ですね、ユズ！"
22030-127 = "[s] \"代々受け継がれてる「アレ」……？\""
22030-128 = "はい、その……たまに……"
22030-129 = "結構……よく、意見が平行線になる時があって。"
22030-130 = "[s] \"よくあるんだね……。\""
22030-131 = "なので、お互いの意見に納得できない時は勝負をする事にしたんです。#n「勝者の意見は絶対」というルールで。"
22030-132 = "[s] \"ゲーム開発部って思ったより武闘派なんだ……。\""
22030-133 = "いいよ……ユズがそう言うなら……。"
22030-134 = "その勝負！受けて立つ！"
22030-135 = "ミドリ！泣いても手加減しないからね！"
22030-136 = "こっちのセリフだよ、お姉ちゃん！"
22030-137 = "[s1] \"で、でも勝負って……一体、何をするの？\"\n[s2] \"それで喧嘩するのは良くないとおもっ……。\""
22030-144 = "『フルゼリー大戦』で勝負だよ！"
22030-146 = "[s] \"……あ、ゲームで勝負するのね。\""
22030-148 = "はい、ゲーム開発部ですから。"
22030-150 = "さあ、もう後には引けないからね！ミドリ！"
22030-151 = "ふん！お姉ちゃんこそ！"
22030-160 = "（そうして、モモイとミドリが対戦を始めている間に……）"
22030-162 = "二人ともゲームを始めてしまいました……。"
22030-163 = "アリスは何をしたらいいでしょう？"
22030-164 = "そうだね……アリスちゃんは、新しいアイデアがないか探しに行ってもらえるかな？"
22030-165 = "先生と一緒だったら、何か特別なインスピレーションを得られるかもしれないからね。"
22030-166 = "[s] \"ゲーム開発部長の貫禄を感じる……。\""
22030-167 = "え？あ、そ、そ、そんな事は、ないと思いますが……！"
22030-168 = "なるほど……面白いゲームを作るためのクエストですね！"
22030-169 = "はい！分かりました、ユズ！"
22030-170 = "パンパカパーン！#nアリスはクエストを受注しました！"
22030-171 = "さあ先生！アリスと一緒に冒険に出ましょう！"
22030-178 = "（そうして、アリスと一緒にミレニアムのキャンパスを探索する事になった）"
22030-179 = "パンパカパーン！#nアリスと先生は、村の外に出ることになりました！"
22030-180 = "見習い勇者アリスと先生の冒険はここから始まるのです！"
22030-181 = "[s] \"アリス、今日は見習い勇者なの？\""
22030-182 = "はい！今日はアリスも先生もレベル1の見習い勇者です！"
22030-183 = "今までは、冒険の時に伝説の勇者から始めたりもしましたが……。"
22030-184 = "その時、モモイがこう言いました。"
22030-185 = "[s] \"モモイが？\""
22030-186 = "はい。伝説の勇者がレベル1のスネイルを倒す冒険って、少し変じゃない？と。"
22030-187 = "なので、最初から冒険が始まる町の周辺に伝説のドラゴンを配置する！#nと言っていたのですが……"
22030-188 = "ミドリとユズがそれではゲームが進まないと必死に止めていました。"
22030-191 = "そういうゲームはとても売るのが難しく……？"
22030-192 = "売っても消費者が限られたジャンル……？のゲームになる可能性があるのだとか！"
22030-193 = "[s] \"なるほど。大人の事情みたいな話だね……。\""
22030-196 = "あの時に、みんなが言っていたことを全部理解したわけではありませんが……"
22030-197 = "それでも……今日は、せっかく先生と一緒の冒険なので、レベル1から始めます。"
22030-198 = "少しずつモンスターを倒して、レベルアップし……#n伝説の勇者を目指すとしましょう、先生！"
22030-199 = "[s] \"うん、頑張ろうね。\""
22030-200 = "……ですが、こうして一緒に冒険を始めるにあたって、#nアリスは悩んでいます。"
22030-201 = "ユズのクエストをクリアするにはどうすれば良いのでしょう……？"
22030-202 = "[s] \"うーん……とりあえず前進してみるとか？\""
22030-203 = "前進？"
22030-204 = "[s] \"アリスが言ってたよね。勇者の冒険は、前進することから始まるものだって。"
22030-205 = "……！"
22030-206 = "はい！出会いも、バトルも……レベルアップやクエストクリアだって！#n始まりは前進からです！"
22030-207 = "先生は素晴らしい知識を持っていますね！"
22030-208 = "[s] \"これも全部、アリスに教えてもらったことだよ。\""
22030-209 = "えへへ、はい！では、先生！行きましょう！前進です！"
22030-211 = "（そうして、アリスとの冒険が始まった）"
22030-213 = "次回;～アリスと導かれる者たち～（１）"
