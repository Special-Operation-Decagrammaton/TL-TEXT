[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22030-1 = "Episódio 3: ～Aris Começa a Sua Aventura!～"
22030-2 = "(Depois disso, conversamos com o Clube de\nDesenvolvimento de Jogos sobre ideias pro jogo novo.)"
22030-3 = "Como eu já disse antes, o nosso próximo jogo é——"
22030-8 = "um \"RPG de exploração de masmorra estilo\nslow life, bem tranquilão\"!"
22030-9 = "No fim, o importante é a masmorra principal, né!"
22030-10 = "Sim…… dependendo de como a gente desenha a\nmasmorra, o conteúdo do jogo também muda……"
22030-11 = "Explorar uma masmorra de layout fixo……\nou então fazer no estilo roguelike……"
22030-12 = "A Aris prefere roguelike!"
22030-15 = "[ns] \"A Aris gosta de roguelike?\""
22030-16 = "Sim! Como a estrutura da masmorra muda toda vez,#nfico empolgada pensando que monstros e equipamentos\nraros vou encontrar dessa vez!"
22030-17 = "Especialmente o jogo roguelike que a gente fez\njunto da última vez:#na gente criou um item único\ncom o nome do Sensei."
22030-18 = "[s] \"……Hm?\""
22030-19 = "Eu batizei de \"Adesivo Estrelinha do Sensei\"!"
22030-20 = "Quando se consegue o adesivo, a Aris ficava muito feliz.#nUsando ele, o personagem fica super forte!"
22030-21 = "[s] \"O efeito do Adesivo Estrelinha é incrível, hein!\""
22030-22 = "Ah, i-isso é!#nUm pouquinho de espírito brincalhão."
22030-23 = "Pela dificuldade do jogo, eu queria que fosse\nmais, é, ex…… ex……"
22030-24 = "Eu queria que fosse mais EXTREMO!"
22030-25 = "Não seria \"empolgante\"?"
22030-27 = "No próximo jogo também, a Aris quer juntar\nmuitos \"Adesivos Estrelinha\"!"
22030-28 = "[s] \"Fico feliz com as palavras da Aris, mas, já que é assim, eu queria ser membro da party……!\""
22030-29 = "Então, se a gente for fazer um roguelike,\ncomo é que fica o formato?"
22030-30 = "Tipo umas…… ruínas subterrâneas?#nÉ o formato mais básico de masmorra, então……"
22030-31 = "Hmm, não é comum demais?"
22030-32 = "Já que a gente vai fazer……\neu queria algo mais especial, mais grandioso……"
22030-34 = "Que tal ir subindo no formato de uma torre?"
22030-35 = "Se for um formato em que, a cada andar que sobe\npela escada, a dificuldade aumenta,\nnão seria bem intuitivo?"
22030-36 = "Aí não tem nenhum fator surpresa!\nEscada é simplório demais!"
22030-37 = "Só reclamação……#nentão, e a sua ideia, mana?"
22030-38 = "Ruínas subterrâneas…… torre……#nse for assim, em vez de escada……"
22030-39 = "Elevador!#nQue tal um elevador?"
22030-41 = "Descer as ruínas subterrâneas de elevador?"
22030-42 = "Aliás, num jogo que a Aris jogou antes também\ntinha uma coisa parecida."
22030-54 = "Um jogo em que você é um espião e derrota os\ninimigos no elevador de um prédio!"
22030-55 = "Ah, esse é bem popular, mesmo entre os jogos retrô."
22030-56 = "Hmm, pra uma ideia da mana, até que é\numa coisa segura……"
22030-58 = "Pois é! Realmente não basta de jeito nenhum!\nFalta fator surpresa!"
22030-59 = "Hm……?"
22030-60 = "O que a gente precisa é de um visual deslumbrante!\nE de um cenário grandioso e cheio de surpresas!"
22030-61 = "Em vez de descer as ruínas subterrâneas,\nque tal subir uma torre!#nDe elevador!"
22030-62 = "Torre?"
22030-67 = "Subindo de elevador……"
22030-73 = "e, no fim, explodir tudo no topo!"
22030-74 = "Isto sim é que é espetáculo!"
22030-76 = "Peraí.#nEntão como é que se explora a masmorra?"
22030-77 = "Primeiro, pensando num visual deslumbrante……"
22030-78 = "A mana sempre fala isso, né!"
22030-80 = "Uaah!?#nM-Midori……?"
22030-81 = "Outro dia você falou a mesma coisa."
22030-82 = "Falou um monte de \"pra representar esta masmorra,\nprecisa desenhar o interior em detalhe!\", e a gente\nacabou desenhando masmorra o dia inteiro!"
22030-83 = "Uh! I-isso é!"
22030-84 = "A Aris também desenhou um monte! Foi divertido\npoder desenhar tantas coisas!"
22030-85 = "Olha aqui, Sensei! É uma ilustração que a Aris fez!"
22030-86 = "A obra que a Aris mais se orgulha é…… o guardião\nmais forte da masmorra, o \"Sensei Guardião\"!#nDei o nome a partir da imagem do Sensei, que\nsempre guia a gente!"
22030-87 = "É um guardião invencível, muito forte!"
22030-88 = "[s] \"Isso eu meio que quero ver…… meio que não quero!\""
22030-89 = "É-é que…… o visual deslumbrante#né, n-na verdade…… uma escolha…… conforme a necessidade."
22030-90 = "Não é que eu não goste de desenhar em si."
22030-91 = "Mas, mesmo a gente tendo se esforçado tanto pra\ndesenhar……#nno jogo quase não foi usado, né."
22030-92 = "Não me faz fazer coisa à toa.#nVamos falar de um nível que dê pra realizar."
22030-93 = "M-mas! Aí não dá pra ver a paisagem do horizonte!#nNão dá pra romper os limites!"
22030-102 = "[ns] \"Calma, vocês duas……\""
22030-103 = "É isso!"
22030-104 = "Qual é a opinião do Sensei!?"
22030-105 = "Sim. É justamente nessas horas que a opinião do\nSensei é necessária!#nQual das duas você acha que está certa?"
22030-106 = "[s] \"Peraí, isso já não mudou completamente do motivo pelo qual me chamaram……?\""
22030-108 = "No fim das contas, o mais chamativo é melhor, né!?"
22030-109 = "É preciso um meio-termo, num nível realizável, né?"
22030-112 = "Né!? Sensei!"
22030-116 = "[ns] (Escolher qualquer uma das duas parece levantar uma flag de final ruim……)"
22030-118 = "P-peraí! Todo mundo, pausa!"
22030-119 = "O-o Sensei tá numa saia justa……!"
22030-121 = "Ah……"
22030-122 = "M-me desculpem……"
22030-123 = "Continuar essa discussão assim só vai\nincomodar o Sensei."
22030-124 = "Então…… aqui, acho melhor decidir com \"aquilo\",\nque é passado de geração em geração no Clube de\nDesenvolvimento de Jogos."
22030-126 = "Entendi! \"Aquilo\", né, Yuzu!"
22030-127 = "[s] \"\"Aquilo\" passado de geração em geração……?\""
22030-128 = "Sim, é que…… às vezes……"
22030-129 = "com certa…… frequência, tem horas em que\nas opiniões ficam num impasse."
22030-130 = "[s] \"Acontece bastante, né……\""
22030-131 = "Então, quando a gente não se convence da opinião\nda outra, a gente decide num duelo.#nNa regra de que \"a opinião da vencedora é absoluta\"."
22030-132 = "[s] \"O Clube de Desenvolvimento de Jogos é mais combativo do que eu imaginava……\""
22030-133 = "Tudo bem…… se a Yuzu diz isso……"
22030-134 = "Esse duelo! Eu aceito!"
22030-135 = "Midori! Mesmo que você chore, eu não pego leve, viu!"
22030-136 = "Essa é a minha fala, mana!"
22030-137 = "[s1] \"M-mas duelo……? O que exatamente vocês vão fazer?\"\n[s2] \"Brigar por causa disso não é bom, eu ach……\""
22030-144 = "Um duelo no \"A Grande Guerra Geleia\"!"
22030-146 = "[s] \"……Ah, é num jogo que vocês vão duelar.\""
22030-148 = "Sim, somos o Clube de Desenvolvimento de Jogos, afinal."
22030-150 = "Bom, não dá mais pra voltar atrás, viu! Midori!"
22030-151 = "Hunf! Isso é com você, mana!"
22030-160 = "(E assim, enquanto a Momoi e a Midori começavam\no confronto……)"
22030-162 = "As duas acabaram começando um jogo……"
22030-163 = "O que será que a Aris deve fazer?"
22030-164 = "Bom…… Aris, você pode ir procurar se não há\nalguma ideia nova por aí?"
22030-165 = "Junto do Sensei, talvez você consiga\numa inspiração especial."
22030-166 = "[s] \"Dá pra sentir a postura de uma presidente do Clube de Desenvolvimento de Jogos……\""
22030-167 = "Hã? A-a-ah, isso não, acho que não é bem assim……!"
22030-168 = "Entendi…… é uma quest pra fazer um jogo divertido, né!"
22030-169 = "Sim! Compreendido, Yuzu!"
22030-170 = "Tcharaaan!#nA Aris aceitou a quest!"
22030-171 = "Vamos, Sensei! Bora sair pra aventura junto da Aris!"
22030-178 = "(E assim, acabei explorando o campus da Millennium\njunto da Aris.)"
22030-179 = "Tcharaaan!#nA Aris e o Sensei vão sair pra fora da vila!"
22030-180 = "A aventura da heroína aprendiz Aris e do Sensei\ncomeça a partir daqui!"
22030-181 = "[s] \"Aris, hoje você é uma heroína aprendiz?\""
22030-182 = "Sim! Hoje a Aris e o Sensei são heróis\naprendizes de nível 1!"
22030-183 = "Até agora, nas aventuras, a gente às vezes começava\ncomo herói lendário, mas……"
22030-184 = "Naquela vez, a Momoi disse o seguinte."
22030-185 = "[s] \"A Momoi?\""
22030-186 = "Sim. \"Uma aventura em que um herói lendário derrota\numa Lesma de nível 1 não é meio estranha?\", foi o que ela disse."
22030-187 = "Aí ela disse que ia colocar um dragão lendário nos\narredores da cidade onde a aventura começa, logo no início!#nMas……"
22030-188 = "a Midori e a Yuzu tentaram impedir desesperadamente,\ndizendo que assim o jogo não avançava."
22030-191 = "Esse tipo de jogo é muito difícil de vender……?"
22030-192 = "Mesmo vendendo, pode virar um jogo de um gênero\nde público limitado……? Foi mais ou menos isso!"
22030-193 = "[s] \"Entendi. Parece uma história de 'questões de adulto'……\""
22030-196 = "Naquela hora, eu não entendi tudo o que todo\nmundo disse, mas……"
22030-197 = "ainda assim…… hoje, já que é uma aventura junto\ndo Sensei, a gente começa do nível 1."
22030-198 = "Derrotando os monstros aos poucos, subindo de nível……#nvamos mirar em ser heróis lendários, Sensei!"
22030-199 = "[s] \"Sim, vamos nos esforçar.\""
22030-200 = "……Mas, ao começar essa aventura juntos assim,#na Aris está com uma dúvida."
22030-201 = "O que será que a gente precisa fazer pra completar\na quest da Yuzu……?"
22030-202 = "[s] \"Hmm…… que tal a gente simplesmente avançar pra frente?\""
22030-203 = "Avançar?"
22030-204 = "[s] \"A Aris mesma disse, né. Que a aventura de um herói começa por avançar pra frente.\""
22030-205 = "……!"
22030-206 = "Sim! Encontros, batalhas…… subir de nível e completar quests!#nTudo começa por avançar pra frente!"
22030-207 = "O Sensei tem um conhecimento maravilhoso!"
22030-208 = "[s] \"Tudo isso também foi a Aris que me ensinou.\""
22030-209 = "Ehehe, sim! Então, Sensei! Vamos! Pra frente!"
22030-211 = "(E assim, começou a aventura com a Aris.)"
22030-213 = "Próximo episódio: ～Aris e Aqueles que São Guiados～ (1)"