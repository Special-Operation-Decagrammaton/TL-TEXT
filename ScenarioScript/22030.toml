[translation]
22030-1 = "Episódio 3; ~Alice, começando a aventura!~"
22030-2 = "（Depois disso, conversamos com o Departamento de Desenvolvimento de Jogos sobre ideias para o novo jogo）"
22030-3 = "Como eu disse antes, nosso próximo jogo será..."
22030-8 = "Um RPG de exploração de masmorras com estilo de vida relaxante!"
22030-9 = "Como esperado, o mais importante é a masmorra principal, né!"
22030-10 = "Sim... o conteúdo do jogo muda dependendo de como projetamos a masmorra..."
22030-11 = "Se vamos explorar uma masmorra fixa... ou se faremos um roguelike..."
22030-12 = "Alice quer um roguelike!"
22030-15 = "[ns] \"Alice, você gosta de roguelikes?\""
22030-16 = "Sim! Como a estrutura da masmorra muda a cada vez, fico empolgada pensando em quais monstros ou equipamentos raros vou encontrar!"
22030-17 = "Especialmente no jogo roguelike que fizemos juntas da última vez, criamos um item único com o nome do Sensei."
22030-18 = "[s] \"...Hm?\""
22030-19 = "O nome é \"Adesivo de Nota Dez do Sensei\"!"
22030-20 = "Quando eu conseguia o adesivo, a Alice ficava muito feliz. Quando você usa, o personagem fica muito forte!"
22030-21 = "[s] \"...O efeito do Adesivo de Nota Dez é incrível, hein!\""
22030-22 = "Ah, i-isso é! É só um pouco de diversão, por assim dizer."
22030-23 = "Em termos de dificuldade do jogo, eu queria que fosse mais, é, extre... extre..."
22030-24 = "Eu queria que fosse extremo!"
22030-25 = "Não seria \"excitante\" nesse caso?"
22030-27 = "No próximo jogo, a Alice também quer colecionar muitos \"Adesivos de Nota Dez\"!"
22030-28 = "[s] \"Fico feliz com as palavras da Alice, mas já que estamos nisso, eu gostaria de ser um membro da equipe...!\""
22030-29 = "Então, se fôssemos fazer um roguelike, que forma ele teria?"
22030-30 = "Ruínas subterrâneas... talvez? É a forma mais básica para uma masmorra..."
22030-31 = "Hmm, não é comum demais?"
22030-32 = "Já que vamos fazer, seria bom algo mais especial e grandioso..."
22030-34 = "Que tal subir uma torre?"
22030-35 = "Se for um formato onde a dificuldade aumenta a cada andar que você sobe pelas escadas, não seria intuitivo?"
22030-36 = "Isso não tem surpresa nenhuma! Escadas são simples demais!"
22030-37 = "Só sabe reclamar... Então, qual é a sua ideia, irmã?"
22030-38 = "Ruínas subterrâneas... torre... então, em vez de escadas..."
22030-39 = "Um elevador! Que tal um elevador?"
22030-41 = "Descer as ruínas subterrâneas de elevador?"
22030-42 = "Falando nisso, tinha um jogo parecido que a Alice jogou antes."
22030-54 = "É um jogo onde você é um espião e derrota inimigos no elevador de um prédio!"
22030-55 = "Ah, esse é bem popular entre os jogos retrô."
22030-56 = "Hmm, para uma ideia da irmã, é bem seguro..."
22030-58 = "É verdade! Ainda falta muito! Não tem surpresa nenhuma!"
22030-59 = "Hm...?"
22030-60 = "O que precisamos é de visuais chamativos! E um cenário grandioso com surpresas!"
22030-61 = "Em vez de descer ruínas subterrâneas, que tal subir uma torre! De elevador!"
22030-62 = "Uma torre?"
22030-67 = "Subir de elevador..."
22030-73 = "E no final, explodir no terraço!"
22030-74 = "Isso sim é um espetáculo!"
22030-76 = "Espere. Então, como vamos explorar a masmorra?"
22030-77 = "Primeiro, focando nos visuais chamativos..."
22030-78 = "A irmã sempre diz isso!"
22030-80 = "Ué!? M-Midori...?"
22030-81 = "Você disse a mesma coisa da última vez."
22030-82 = "Disse algo como \"Para expressar essa masmorra, precisamos desenhar o interior detalhadamente!\" e acabamos passando o dia inteiro desenhando a masmorra!"
22030-83 = "Ugh! I-Isso é!"
22030-84 = "A Alice também desenhou um monte! Foi divertido desenhar várias coisas!"
22030-85 = "Olhe só, Sensei! São as ilustrações que a Alice desenhou!"
22030-86 = "A obra-prima da Alice é... o guardião mais forte da masmorra, o \"Sensei Guardian\"!#nDei esse nome por causa da imagem do Sensei, que sempre guia a Alice e as outras!"
22030-87 = "É um guardião invencível e muito forte!"
22030-88 = "[s] \"Isso é algo que eu meio que quero ver... e meio que não quero!\""
22030-89 = "E-E esse... visual chamativo, é... a-apenas uma escolha... baseada na necessidade."
22030-90 = "Não estou dizendo que odeio desenhar em si."
22030-91 = "Mas, mesmo tendo nos esforçado tanto para desenhar...#nnós quase não usamos isso no jogo, né."
22030-92 = "Não me faça perder tempo com coisas inúteis.#nVamos falar de um nível que seja realizável."
22030-93 = "M-Mas! Se for assim, não dá para ver a paisagem do horizonte!#nNão dá para romper os limites!"
22030-102 = "[ns] \"Calma, vocês duas...\""
22030-103 = "Já sei!"
22030-104 = "Qual é a opinião do Sensei!?"
22030-105 = "Isso. É justamente nessas horas que precisamos da opinião do Sensei!#nQuem você acha que está certa?"
22030-106 = "[s] \"Espere um pouco, o motivo de terem me chamado não mudou...?\""
22030-108 = "No fundo, o visual chamativo é melhor, né!?"
22030-109 = "Precisamos de um compromisso dentro de um nível realizável, não é?"
22030-112 = "Né!? Sensei!"
22030-116 = "[ns] (Parece que qualquer escolha vai levar a um final ruim...)"
22030-118 = "E-Ei, pessoal, parem!"
22030-119 = "O-O Sensei está em apuros...!"
22030-121 = "Ah..."
22030-122 = "D-Desculpa..."
22030-123 = "Continuar com essa discussão só vai incomodar o Sensei."
22030-124 = "Por isso... acho melhor decidirmos com \"aquilo\" que é passado de geração em geração no Clube de Desenvolvimento de Jogos."
22030-126 = "Entendi! Você quer dizer \"aquilo\", Yuzu!"
22030-127 = "[s] \"\"Aquilo\" que é passado de geração em geração...?\""
22030-128 = "Sim, é que... às vezes..."
22030-129 = "É bem... comum nossas opiniões ficarem em um impasse."
22030-130 = "[s] \"Acontece com frequência, né...\""
22030-131 = "Então, quando não conseguimos concordar com a opinião uma da outra, decidimos resolver com uma disputa.#nCom a regra de que \"a opinião do vencedor é absoluta\"."
22030-132 = "[s] \"O Clube de Desenvolvimento de Jogos é mais voltado para artes marciais do que eu pensava...\""
22030-133 = "Tudo bem... se a Yuzu diz isso..."
22030-134 = "Eu aceito o desafio!"
22030-135 = "Midori! Não espere que eu pegue leve só porque você vai chorar!"
22030-136 = "Digo o mesmo, irmã!"
22030-137 = "[s1] \"M-Mas uma disputa... o que exatamente vocês vão fazer?\"\n[s2] \"Acho que não é bom brigar por causa disso...\""
22030-144 = "Vamos decidir com uma partida de \"Full Jelly Wars\"!"
22030-146 = "[s] \"...Ah, então é uma disputa no jogo.\""
22030-148 = "Sim, afinal somos o Clube de Desenvolvimento de Jogos."
22030-150 = "Vamos lá, não tem mais volta! Midori!"
22030-151 = "Humph! O mesmo vale para você, irmã!"
22030-160 = "(E assim, enquanto Momoi e Midori começavam a partida...)"
22030-162 = "As duas começaram a jogar..."
22030-163 = "O que a Alice deve fazer?"
22030-164 = "Bem... Alice-chan, será que você poderia ir procurar por novas ideias?"
22030-165 = "Se você for com o Sensei, talvez consiga alguma inspiração especial."
22030-166 = "[s] \"Sinto a autoridade da presidente do Clube de Desenvolvimento de Jogos...\""
22030-167 = "Eh? Ah, n-n-não acho que seja para tanto...!"
22030-168 = "Entendo... então é uma missão para criar um jogo interessante!"
22030-169 = "Sim! Entendido, Yuzu!"
22030-170 = "Tan-tan-ta-ran!#nAlice aceitou a missão!"
22030-171 = "Vamos, Sensei! Vamos partir em uma aventura com a Alice!"
22030-178 = "(E assim, decidimos explorar o campus do Millennium junto com a Alice)"
22030-179 = "Tan-tan-ta-ran!#nAlice e o Sensei decidiram sair da vila!"
22030-180 = "A aventura da aprendiz de heroína Alice e do Sensei começa aqui!"
22030-181 = "[s] \"Alice, você é uma aprendiz de heroína hoje?\""
22030-182 = "Sim! Hoje, tanto a Alice quanto o Sensei são aprendizes de herói nível 1!"
22030-183 = "Até agora, às vezes começávamos nossas aventuras como heróis lendários, mas..."
22030-184 = "Naquela hora, a Momoi disse o seguinte."
22030-185 = "[s] \"A Momoi?\""
22030-186 = "Sim. Ela disse: \"Não é um pouco estranho um herói lendário começar a aventura derrotando caracóis nível 1?\""
22030-187 = "Então, ela disse que ia colocar um dragão lendário nos arredores da cidade onde a aventura começa!#nMas..."
22030-188 = "Midori e Yuzu a impediram desesperadamente, dizendo que o jogo não progrediria assim."
22030-191 = "Jogos assim são muito difíceis de vender...?"
22030-192 = "Dizem que existe a possibilidade de se tornar um jogo de um gênero... onde o público consumidor é limitado!"
22030-193 = "[s] \"Entendo. Parece um assunto de gente grande...\""
22030-196 = "Não entendi tudo o que todos disseram naquela hora, mas..."
22030-197 = "Ainda assim... já que hoje é uma aventura com o Sensei, vamos começar do nível 1."
22030-198 = "Vamos derrotar monstros aos poucos, subir de nível...#ne almejar nos tornar heróis lendários, Sensei!"
22030-199 = "[s] \"Sim, vamos nos esforçar.\""
22030-200 = "...Mas, ao começar a aventura juntos assim,#nAlice está preocupada."
22030-201 = "O que devemos fazer para completar a missão da Yuzu...?"
22030-202 = "[s] \"Hmm... que tal avançar um pouco?\""
22030-203 = "Avançar?"
22030-204 = "[s] \"Você mesma disse, Alice. A aventura de um herói começa dando um passo à frente.\""
22030-205 = "...!"
22030-206 = "Sim! Encontros, batalhas... até subir de nível e completar missões!#nTudo começa avançando!"
22030-207 = "O Sensei tem um conhecimento maravilhoso!"
22030-208 = "[s] \"Isso tudo foi a Alice quem me ensinou.\""
22030-209 = "Hehe, sim! Então, Sensei! Vamos! Em frente!"
22030-211 = "(E assim, a aventura com a Alice começou)"
22030-213 = "Próximo episódio: ~Alice e aqueles que são guiados~ (1)"
