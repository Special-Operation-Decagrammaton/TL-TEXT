80000129-50 = "[s3] \"Mesmo assim, foi algo que você preparou para mim.\"\n[s4] \"Fico feliz com esse sentimento.\""
80000129-53 = "……。"
80000129-54 = "É-é mesmo...?"
80000129-55 = "……。"
80000129-56 = "……Ah, muito obrigada."
80000129-57 = "[ns] \"Hm... isso é uma carta?\""
80000129-58 = "Aaaaaah!!!"
