[translation]
2600002-1 = "誰かがやるべきこと"
2600002-2 = "はあ……。"
2600002-3 = "全く、きりが無いですね……溜まっていく一方なのに、誰一人手を付けようともしないで……。"
2600002-5 = "んしょっ、重いですね……これだけあれば仕方ありませんが……。"
2600002-6 = "……？"
2600002-7 = "[s1] \"代わりに持とうか？\"\n[s2] \"重そうだね、大丈夫？\""
2600002-8 = "……！？"
2600002-9 = "……！？"
2600002-10 = "せ、先生！？どうしてここに……！"
2600002-11 = "連絡があったから？……あ、あのメッセージで来てくれたんですか？"
2600002-12 = "も、もちろんお会いしたいとは言いましたが……まさか、こんなすぐになんて……。"
2600002-13 = "えっと、とりあえずこれは大丈夫です。持てない重さではありませんので。"
2600002-14 = "え、い、いえ、本当に大丈夫です。"
2600002-15 = "……半分だけでも？"
2600002-16 = "ですが、先生にこんなことをさせるわけには……。"
2600002-17 = "……。"
2600002-18 = "いえ、せっかくこう言ってくださっているのに、頑なに断るのも失礼ですね。"
2600002-19 = "それではお願いします……それから、ありがとうございます。"
2600002-20 = "よっと……。"
2600002-23 = "[s] （チナツが持ってた書類を半分受取る）"
2600002-24 = "……大丈夫ですか？"
2600002-25 = "想像以上に重い……ですか？ふふっ、そうですよね。紙は実際にたくさん持ってみると、見た目以上に重いものです。"
2600002-26 = "おかげさまで楽になりました、ありがとうございます。"
2600002-27 = "ああ、えっと、私についてきていただければ大丈夫です。こちらの階段を下りて……。"
2600002-28 = "そんなに遠くはありません、行きましょう。"
2600002-29 = "こんな重いのに、一人で階段なんて危険……？"
2600002-30 = "それはまあ、そうかもしれませんが……。"
2600002-31 = "……ふふふっ。"
2600002-32 = "いえ、考えてみればそんなことを言ってもらったのは初めてだなと思いまして。"
2600002-33 = "でも大丈夫です、慣れてますから。……それに、先生が来てくれましたし。"
2600002-34 = "ご存知の通り、ここゲヘナの生徒はみんな個性が強くて……。"
2600002-35 = "こんな地味な仕事をやろうとする人はほとんどいません。"
2600002-36 = "誰もが避けようとするので、私がやるしかなくって……。"
2600002-37 = "ずっとやっていたら慣れてしまいました……それだけです。"
2600002-38 = "……え、事務担当……？"
2600002-39 = "いいえ、私の本来の担当は救護です。"
2600002-40 = "どうして救護担当がこんなことまでしてるのか……？……はあ、まあごもっともですね。"
2600002-41 = "こういった処理の専門の方がいれば良いのですが。"
2600002-42 = "私も別に好きでやってるわけではないので。ただ、先ほどもお伝えした通り……。"
2600002-43 = "誰もやらなくても、最後には誰かがやらないといけないことですから。"
2600002-44 = "……。"
2600002-45 = "地味な私には、結構似合ってると思いますし。ふふっ……。"
2600002-46 = "[s3] \"地味なんかじゃないよ。それに、こんなに優しい。\"\n[s4] \"メガネ美少女が地味だって！？\""
2600002-47 = "……。"
2600002-48 = "……。"
2600002-49 = "……え？"
2600002-50 = "い、今なんと……？す、すみません、ちょっと理解が追い付かず……。"
2600002-51 = "そ、それより……！こうしてはいられません、早く片付けましょう。すみません、せっかく来ていただいたのに……。"
2600002-52 = "は、早く行きましょうか……。"
2600002-54 = "（チナツはそう言いながら気持ち早歩きで階段を下りていく）"
2600002-55 = "[s] （後についていく）"
2600002-58 = "……ここです、先生。"
2600002-59 = "ありがとうございました、こちらに置いておいていただければ、あとは私が。"
2600002-60 = "せっかくだし最後まで……？"
2600002-61 = "ど、どうしてそんな……。"
2600002-62 = "えっと、その……。"
2600002-63 = "すみません、ここまで優しくしてもらったことがないので、逆にどうしたら良いのか……。"
2600002-64 = "……え？"
2600002-65 = "今日から二人でやるのに慣れていこう……？"
2600002-66 = "必要なら毎日だって来るから……ですか？"
2600002-67 = "……。"
2600002-68 = "……ふふふっ。"
2600002-69 = "ありがたい申し出ですが、それはできません。先生に迷惑をかけたくはありませんから。"
2600002-70 = "でも……はい。そうですね。"
2600002-71 = "おかげさまで今日は、退屈ではありませんでした。先生のおかげです。"
2600002-72 = "……なので、毎日とは言いませんから、お手すきの時にでも……。"
2600002-73 = "先生がお暇な時にだけ、ぜひお願いします。"
2600002-74 = "その時はまたこうやって、一緒に……。"
2600002-75 = "……。"
2600002-77 = "……で、では、よろしくお願いします。先生。"
2600002-79 = "（恥ずかしそうに微笑んでから、チナツは残りの書類を片付け始める）"
2600002-80 = "（二人でその日にやらなきゃいけないことを全て終えてから、教室を出た）"
