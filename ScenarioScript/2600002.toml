[translation]
2600002-1 = "Algo que alguém precisa fazer"
2600002-2 = "Haa..."
2600002-3 = "Nossa, isso não tem fim... Só continua acumulando, e ninguém se dá ao trabalho de ajudar..."
2600002-5 = "Ufa, que pesado... Mas com essa quantidade, não tem como ser diferente..."
2600002-6 = "……？"
2600002-7 = "[s1] \"Quer que eu carregue para você?\"\n[s2] \"Parece pesado, você está bem?\""
2600002-8 = "……！？"
2600002-9 = "……！？"
2600002-10 = "P-Sensei!? Por que você está aqui...!"
2600002-11 = "Foi por causa do contato? ...Ah, você veio por causa daquela mensagem?"
2600002-12 = "E-Eu disse que queria te ver, claro... Mas não esperava que fosse tão rápido..."
2600002-13 = "Bem, por enquanto está tudo bem. Não é um peso que eu não consiga carregar."
2600002-14 = "Não, não, eu estou bem mesmo."
2600002-15 = "……Só metade?"
2600002-16 = "Mas eu não poderia deixar o Sensei fazer esse tipo de coisa..."
2600002-17 = "……。"
2600002-18 = "Não, já que você se ofereceu, seria falta de educação recusar com tanta teimosia."
2600002-19 = "Então, por favor... E muito obrigada."
2600002-20 = "Pronto..."
2600002-23 = "[s] (Você pega metade dos documentos que Chinatsu estava carregando)"
2600002-24 = "……Está tudo bem?"
2600002-25 = "É mais pesado do que parece, não é? Fufu, eu imaginei. Quando você segura muitos papéis de uma vez, eles pesam muito mais do que aparentam."
2600002-26 = "Graças a você ficou bem mais leve, obrigada."
2600002-27 = "Ah, bem, é só me seguir. Vamos descer estas escadas..."
2600002-28 = "Não é muito longe, vamos lá."
2600002-29 = "É perigoso descer escadas sozinha com tanto peso...?"
2600002-30 = "Bem, talvez você tenha razão..."
2600002-31 = "……Fufufu."
2600002-32 = "Não é nada, é que parei para pensar que é a primeira vez que alguém me diz algo assim."
2600002-33 = "Mas estou bem, já estou acostumada. ...Além disso, o Sensei veio me ver."
2600002-34 = "Como você sabe, as alunas aqui de Gehenna têm personalidades muito fortes..."
2600002-35 = "Quase ninguém quer fazer esse tipo de trabalho monótono."
2600002-36 = "Como todos tentam evitar, acaba sobrando para mim..."
2600002-37 = "Fiz isso por tanto tempo que acabei me acostumando... É só isso."
2600002-38 = "……Eh, responsável pela parte administrativa...?"
2600002-39 = "Não, minha função principal é o comitê de primeiros socorros."
2600002-40 = "Por que alguém da equipe de socorro está fazendo isso...? ...Haa, você tem razão."
2600002-41 = "Seria bom se houvesse alguém especializado nesse tipo de processamento."
2600002-42 = "Eu também não faço isso porque gosto. É apenas, como eu disse antes..."
2600002-43 = "Mesmo que ninguém queira fazer, no final, alguém precisa cuidar disso."
2600002-44 = "……。"
2600002-45 = "E acho que combina bastante com alguém sem graça como eu. Fufu..."
2600002-46 = "[s3] \"Você não é nada sem graça. Além disso, é muito gentil.\"\n[s4] \"Como assim uma garota de óculos é sem graça!?\""
2600002-47 = "……。"
2600002-48 = "……。"
2600002-49 = "……Eh?"
2600002-50 = "O-O que você disse agora...? D-Desculpe, não consegui processar direito..."
2600002-51 = "M-Mas enfim...! Não podemos ficar parados, vamos terminar logo. Desculpe, você veio até aqui e..."
2600002-52 = "V-Vamos logo..."
2600002-54 = "(Chinatsu diz isso enquanto desce as escadas um pouco mais rápido que o normal)"
2600002-55 = "（Seguir ela）"
2600002-58 = "……É aqui, Sensei."
2600002-59 = "Muito obrigada. Pode deixar aqui, eu cuido do resto."
2600002-60 = "Já que estamos aqui, por que não até o fim……?"
2600002-61 = "Po-por que você faria algo assim……"
2600002-62 = "Bem, é que……"
2600002-63 = "Desculpe, nunca fui tratada com tanta gentileza antes, então não sei bem como reagir……"
2600002-64 = "……Eh?"
2600002-65 = "Vamos nos acostumar a fazer as coisas juntos a partir de hoje……?"
2600002-66 = "Você disse que viria todos os dias se fosse necessário……?"
2600002-67 = "……."
2600002-68 = "……Fufufu."
2600002-69 = "É uma oferta gentil, mas não posso aceitar. Não quero causar problemas ao Sensei."
2600002-70 = "Mas…… sim. Você tem razão."
2600002-71 = "Graças a você, hoje não foi um dia entediante. Tudo graças ao Sensei."
2600002-72 = "……Por isso, não precisa vir todos os dias, mas quando estiver livre……"
2600002-73 = "Por favor, venha apenas quando o Sensei estiver sem nada para fazer."
2600002-74 = "Da próxima vez, podemos fazer assim de novo, juntos……"
2600002-75 = "……."
2600002-77 = "……En-então, conto com você. Sensei."
2600002-79 = "（Chinatsu sorri timidamente e começa a organizar o restante dos documentos）"
2600002-80 = "（Terminamos todas as tarefas pendentes do dia juntos e saímos da sala）"
