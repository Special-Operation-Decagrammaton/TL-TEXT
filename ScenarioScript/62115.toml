[translation]
62115-4 = "Argh……！"
62115-5 = "Sensei! O que a gente faz……！？"
62115-6 = "[s] \"Vamos recuar por enquanto e nos reagrupar……！\""
62115-11 = "Pessoal, vocês estão vivas……?"
62115-16 = "D-de alguma forma……！"
62115-17 = "As outras garotas também conseguiram se esconder……！"
62115-19 = "……Mas os anjos ainda estão vagando ao redor de Porta Pacis. #nÉ como se…… estivessem procurando pela próxima presa."
62115-20 = "O-o que faremos……? Se pelo menos soubéssemos a identidade desses anjos……."
62115-22 = "(Todos estavam perdidos sem saber o que fazer)"
62115-23 = "(A batalha cessou e um silêncio estranho tomou conta do local)"
62115-24 = "(O que quebrou esse silêncio foi――)"
62115-27 = "[ns] \"MomoTalk……? Isso é…….\""
62115-29 = "É um adesivo de bandeira branca…… não é?"
62115-30 = "Significa que eles estão se rendendo……? Por que agora……?"
62115-31 = "[s] \"Não, talvez seja…… vamos lá conferir!\""
62115-33 = "(Fomos com o máximo de cautela até o local indicado no MomoTalk)"
62115-37 = "Deveria ser aqui……."
62115-38 = "T-tem alguém aí……?"
62115-43 = "Sensei! Pessoal do esquadrão!"
62115-44 = "E…… você também."
62115-45 = "Ah, olá……."
62115-46 = "……Então você estava com o Sensei."
62115-47 = "S-sim……."
62115-48 = "Que bom. Eu estava preocupada. #n……Obrigada, Sensei."
62115-49 = "[s1] \"Eu só fiz o que era natural.\"\n[s2] \"Mas então…… por que você nos chamou?\""
62115-52 = "Ah, sim. Sobre isso……."
62115-53 = "Nós…… conhecemos um caminho secreto."
62115-55 = "Um caminho secreto?"
62115-57 = "Na verdade…… existe um atalho até o arquivo de registros. #nNós chegamos um pouco perto, mas os anjos não reagiram."
62115-58 = "Ah, mas por favor, avancem com cuidado."
62115-59 = "Eu fiquei morrendo de medo de que os anjos nos notassem……."
62115-61 = "……Entendo. #nObrigado por se arriscarem tanto por nós……."
62115-63 = "Hehe. Nós que agradecemos. #nVocês nos ajudaram com tanta coisa, então achamos que tínhamos que retribuir de alguma forma……."
62115-64 = "O Sensei, sabe…… parece ser um adulto muito legal."
62115-65 = "É estranho dizer isso, mas…… acho que eu preferia quando estávamos estudando……."
62115-66 = "As aulas eram entediantes, mas…… foram divertidas. #nUé? Estou falando algo estranho, né……."
62115-67 = "[s3] \"Sua opinião sincera é muito útil para mim.\"\n[s4] \"Vou tentar melhorar um pouco na próxima aula…….\""
62115-70 = "Além disso…… foi um pouco estranho ver a Saori-senpai agindo como professora."
62115-72 = "……."
62115-74 = "A aula da Atsuko…… bem……."
62115-75 = "Não sei explicar, mas despertou meu interesse. #nNão sei se diria que foi divertida, mas……."
62115-77 = "Fufu, obrigada. Talvez seja porque nossas áreas de especialidade são diferentes."
62115-79 = "Diferenciação parecia possível de aprender, mas funções trigonométricas foram impossíveis……."
62115-81 = "……É só porque você ainda não decorou tudo."
62115-82 = "……."
62115-84 = "……Hiyori, estou ansiosa pela sua próxima aula."
62115-86 = "Ah, muito obrigada……!"
62115-91 = "Eu ainda não entendo muito bem o que são exames…… mas tudo foi uma novidade. Cada momento."
62115-92 = "Alguém nos ensinou――"
62115-93 = "Algo além de como ferir as pessoas, e nos tratar com gentileza…… isso me deixou muito feliz."
62115-94 = "Sim…… mesmo que isso tenha sido—"
62115-95 = "Mesmo que tenha sido apenas um sonho passageiro."
62115-96 = "[s] \"Não foi um sonho.\""
62115-97 = "……Eh?"
62115-98 = "[s] \"Aquilo era o cotidiano que todos deveriam ter tido originalmente.\""
62115-99 = "Aquilo era…… o dia a dia……?"
62115-100 = "……."
62115-101 = "Desculpe, eu só…… não consigo nem imaginar……."
62115-102 = "Ah, ahaha…… acabei falando só sobre nós o tempo todo…… #nPor favor, deixe para continuar essa conversa em outra hora. Agora, mais do que isso……."
62115-103 = "Você veio para encontrar a Subaru-senpai, não foi? Vou te mostrar um caminho alternativo."
62115-109 = "É por aqui. Se descer aquelas escadas…… há uma entrada secreta que leva ao arquivo subterrâneo."
62115-110 = "Não sei o que a Subaru-senpai está fazendo…… mas ela disse para ninguém entrar lá."
62115-111 = "Espero que sua conversa com a Subaru-senpai…… corra bem."
62115-112 = "Por favor, cuide da Subaru-senpai. Se não fosse pela senpai…… acho que nós já teríamos nos separado…… e desaparecido há muito tempo……."
62115-113 = "[s5] \"Farei o que estiver ao meu alcance.\"\n[s6] \"Preciso dizer a ela que faltar sem avisar não é permitido!\""
62115-116 = "Conto com você!"
62115-120 = "As escadas…… são bem profundas, né……."
62115-125 = "Uuu…… parece o caminho que leva ao abismo sem fundo descrito nas escrituras……."
62115-130 = "Não podemos…… acender as luzes, certo……?"
62115-135 = "É. Existe a chance de sermos descobertos pela luz."
62115-140 = "Ah……!?"
62115-145 = "[ns] \"Atsuko!?\""
62115-146 = "Atsuko……!?"
62115-147 = "Sensei, obrigada…… Mas…… todos estão bem?"
62115-152 = "Sem problemas. Você tropeçou em uma pedra ou algo assim?"
62115-153 = "É só que está um pouco difícil de enxergar à frente, mas eu também estou bem……."
62115-154 = "Eu também não tive nenhum problema."
62115-156 = "Entendi. #nEntão……."
62115-157 = "(Isso é algo que só eu estou sentindo……)"
62115-158 = "(……Uma pressão esmagadora. É como se alguém estivesse bagunçando minha mente.)"
62115-159 = "(Se eu relaxar nem que seja um pouco, minha consciência……!)"
62115-160 = "Ei……?"
62115-161 = "Maia? Aconteceu alguma coisa?"
62115-162 = "Eu, eu não sei…… Mas, por algum motivo…… é muito……."
62115-163 = "Triste, assustador…… Doloroso……."
62115-164 = "Não é algo que eu esteja sentindo, é como se as emoções estivessem vindo de fora……."
62115-172 = "Sensei…… você finalmente chegou até aqui."
62115-173 = "[s] \"Subaru!\""
62115-177 = "……Senpai……?"
62115-178 = "O, o que aconteceu……? Afinal…… o que houve……?"
62115-184 = "……."
62115-185 = "Eu já imagino…… sobre o que você quer conversar. #nMas, primeiro, vamos mudar de lugar."
62115-186 = "Pois em Porta-Pasis, e em Arius, existem coisas demais…… que nós não conhecíamos…… adormecidas aqui."
62115-188 = "Oratório dos Tempos Passados; Continua no Capítulo 3"
