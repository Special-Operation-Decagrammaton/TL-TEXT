[translation]
62115-4 = "Gugh...!"
62115-5 = "Sensei! O que faremos...?!"
62115-6 = "[s] \"Vamos recuar por enquanto e nos reorganizar...!\""
62115-11 = "Pessoal, estão todas vivas...?"
62115-16 = "A-Acho que sim...!"
62115-17 = "Parece que as outras garotas também conseguiram se esconder de alguma forma...!"
62115-19 = "...Mas os anjos ainda estão rondando os arredores de Porta Pacis. #nÉ como se... estivessem procurando a próxima presa."
62115-20 = "O-O que nós fazemos...? Se ao menos soubéssemos a verdadeira identidade daqueles anjos..."
62115-22 = "(Todas estavam completamente sem rumo)"
62115-23 = "(A batalha havia cessado, e tudo estava em um silêncio estranhamente profundo)"
62115-24 = "(Quem quebrou esse silêncio foi――)"
62115-27 = "[ns] \"O MomoTalk...? Isso é...\""
62115-29 = "É um sticker balançando uma bandeira branca... não é?"
62115-30 = "Significa que estão se rendendo...? Por que logo agora...?"
62115-31 = "[s] \"Não, talvez seja outra coisa... Vamos lá ver!\""
62115-33 = "(Fomos com o máximo de cautela possível até o local indicado no MomoTalk)"
62115-37 = "Deveria ser por aqui, mas..."
62115-38 = "T-Tem alguém aí...?"
62115-43 = "Sensei! Pessoal do Esquadrão!"
62115-44 = "E... você também."
62115-45 = "Ah, olá..."
62115-46 = "...Então você estava com o Sensei."
62115-47 = "U-Uhum..."
62115-48 = "Que bom. Eu estava preocupada. #n...Muito obrigada, Sensei."
62115-49 = "[s1] \"Só fiz o que era minha obrigação.\"\n[s2] \"Mas... por que você nos chamou?\""
62115-52 = "Ah, sim. É sobre isso..."
62115-53 = "Nós... conhecemos um atalho."
62115-55 = "Um atalho?"
62115-57 = "Na verdade... tem um caminho secreto que vai até o arquivo de registros. #nNós tentamos chegar um pouquinho perto e os anjos não reagiram."
62115-58 = "Ah, mas por favor, avancem sem baixar a guarda."
62115-59 = "Eu fiquei com tanto medo de os anjos perceberem a nossa presença..."
62115-61 = "...Entendo. #nObrigada por se arriscarem tanto por nós."
62115-63 = "Ehehe. Não tem de quê. #nVocês nos ajudaram de várias formas, então pensamos que precisávamos retribuir de algum jeito..."
62115-64 = "O Sensei meio que... dá a sensação de ser um adulto legal."
62115-65 = "Pode parecer estranho dizer isso... mas eu fico pensando que a época em que estávamos estudando era melhor..."
62115-66 = "As aulas eram chatas, mas... eram divertidas. #nUé? Acho que falei uma coisa meio sem sentido..."
62115-67 = "[s3] \"Sua opinião sincera me ajuda muito de verdade.\"\n[s4] \"Vou tentar mudar um pouco a abordagem na próxima aula...\""
62115-70 = "E também... foi meio bizarro ver a veterana Saori agindo como Senseia."
62115-72 = "……."
62115-74 = "A aula da Atsuko-san foi... vejamos..."
62115-75 = "Não sei o porquê, mas me despertou interesse. #nSe me perguntarem se foi divertida, é meio questionável, mas..."
62115-77 = "Fufu, obrigada. Talvez seja porque as nossas áreas de especialidade são diferentes."
62115-79 = "Achei que daria para dar um jeito nas derivadas se eu decorasse, mas funções trigonométricas foram impossíveis para mim..."
62115-81 = "...Isso é só porque você ainda não terminou de memorizar tudo."
62115-82 = "……."
62115-84 = "...Eu já estou ansiosa pela próxima aula da Hiyori-san."
62115-86 = "M-Muito obrigada...!"
62115-91 = "Eu ainda não entendo direito o que é um exame... mas tudo foi tão novo. Cada um daqueles momentos."
62115-92 = "Alguém estar ali para nós――"
62115-93 = "nos ensinando algo que não fosse como machucar os outros e nos tratando com gentileza... me deixou muito feliz."
62115-94 = "Sim... mesmo que aquilo tenha sido――"
62115-95 = "apenas um sonho passageiro."
62115-96 = "[s] \"Não é um sonho.\""
62115-97 = "...Hã?"
62115-98 = "[s] \"Aquele é o tipo de cotidiano que, por direito, todas vocês deveriam ter.\""
62115-99 = "Aquilo... todos os dias...?"
62115-100 = "……."
62115-101 = "Desculpe, é que... eu mal consigo imaginar..."
62115-102 = "A-Ahaha... acabamos falando só da gente o tempo todo, né...? #nPor favor, me conte mais sobre isso em uma outra oportunidade. Agora, mais importante do que isso..."
62115-103 = "Vocês vieram ver a veterana Subaru, não é? Vou guiá-los pelo atalho."
62115-109 = "É por aqui. Descendo aquela escadaria... há uma entrada dos fundos que se conecta ao arquivo de registros no subsolo."
62115-110 = "Não sei o que a veterana Subaru está fazendo lá... mas ela nos ordenou a não deixar ninguém entrar."
62115-111 = "Espero que a conversa de vocês com a veterana Subaru dê certo."
62115-112 = "Por favor, cuidem bem da veterana Subaru. Se ela não estivesse aqui... nós já teríamos nos fragmentado... e desaparecido há muito tempo..."
62115-113 = "[s5] \"Vou fazer tudo o que estiver ao meu alcance.\"\n[s6] \"Preciso avisar para ela que faltar sem justificativa não é certo!\""
62115-116 = "Contamos com você!"
62115-120 = "Essa escadaria... é bem profunda..."
62115-125 = "Uuuh... parece até o caminho que leva ao abismo sem fim descrito nas escrituras sagradas..."
62115-130 = "Nós não podemos... acender as luzes, né...?"
62115-135 = "Sim. Existe a possibilidade de nos descobrirem por causa da luz."
62115-140 = "Ngh...?!"
62115-145 = "[ns] \"Atsuko?!\""
62115-146 = "Atsuko...?!"
62115-147 = "Sensei, obrigado... Mas... as outras estão bem?"
62115-152 = "Tudo certo. Você tropeçou em uma pedra ou algo assim?"
62115-153 = "Está só um pouco difícil de enxergar o caminho à frente, mas eu também estou bem..."
62115-154 = "Para mim também não há nenhum impedimento em particular."
62115-156 = "Entendi. #nEntão..."
62115-157 = "(Sou a única que está sentindo isso...)"
62115-158 = "(...Uma pressão esmagadora. É como se alguém estivesse bagunçando tudo dentro da minha cabeça)"
62115-159 = "(Se eu me descuidar por um segundo que seja, minha consciência vai...!)"
62115-160 = "Ué...?"
62115-161 = "Maia? Aconteceu alguma coisa?"
62115-162 = "N-Não sei... Mas, por algum motivo... sinto uma dor..."
62115-163 = "Uma tristeza e um medo tão grandes... É tão sufocante..."
62115-164 = "Não parece ser algo que eu esteja sentindo, mas sim como se esses sentimentos estivessem me inundando vindos de fora..."
62115-172 = "Sensei... você finalmente conseguiu chegar até aqui."
62115-173 = "[s] \"Subaru!\""
62115-177 = "...Veterana...?"
62115-178 = "O-O que aconteceu com você...? O que afinal... está acontecendo aqui...?"
62115-184 = "……."
62115-185 = "Eu meio que já imagino... sobre o que você deseja conversar. #nMas primeiro, vamos mudar de lugar."
62115-186 = "Em Porta Pacis, e em Arius―― há coisas demais repousando que nós sequer sabíamos que existiam."
62115-188 = "Capítulo do Oratório do Tempo Passado; Continua no Capítulo 3"