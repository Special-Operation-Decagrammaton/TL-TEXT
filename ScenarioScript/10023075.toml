[translation]
10023075-3 = "くっ、クソ……！"
10023075-4 = "ここまでです。"
10023075-5 = "――さて。#n何故ここに盗品があるのか――そして、このオークションについて……"
10023075-6 = "ご説明いただいても？"
10023075-7 = "くそう……"
10023075-8 = "だが、こんな事態も想定していたとも。"
10023075-14 = "警備はお前たちだけではない！[ruby=せんがいきょう]山海経の[/ruby][ruby=げんりゅうもん]玄龍門に[/ruby]も依頼しているのだ！"
10023075-16 = "山海経の……玄龍門……？"
10023075-17 = "[s1] \"本当に用意周到だね……。\"\n[s2] \"手段を選ばなさすぎる……。\""
10023075-24 = "さあ、予備隊！取り押さえなさい！！"
10023075-32 = "参加者に紛れて……！"
10023075-33 = "こんなに……"
10023075-43 = "ど、どうしましょう、先生？#n相手が多すぎます！"
10023075-44 = "パワードスーツさえあれば……！"
10023075-53 = "この煙は一体！？#n……に、逃がしてはならんぞ！"
10023075-57 = "どうぞ[ruby=わたくし]、私の[/ruby]手を――"
10023075-58 = "[s] \"……その声は！\""
10023075-70 = "（思わぬ助けを受け、屋敷から抜け出した……）"
10023075-74 = "はあ、はあ……"
10023075-75 = "疲れ、ました……"
10023075-77 = "ううぅ。も、もう、走れません……"
10023075-78 = "もうこんなに日が暮れて……"
10023075-79 = "ずいぶんと長居していたようです。"
10023075-80 = "みんな、大丈夫ですか？"
10023075-81 = "[s3] \"うん、彼女のおかげで。\"\n[s4] \"敵の敵は味方……で良いのかな？\""
10023075-87 = "うん？どういうこと？"
10023075-92 = "偶然、無作為、不均性、不確定性……#nいずれも美学を語るうえで外すことのできない要素。"
10023075-96 = "だ、誰ですか……？"
10023075-103 = "ふふ、ごきげんよう。#nこのような形で再会するなど、お互いに想像もしなかったのではないでしょうか。"
10023075-111 = "せ、せせせせせ、先生！？一体どういう事！？"
10023075-112 = "[s5] \"「慈愛の怪盗」が\"\n[s6] \"助けてくれたんだよ。\""
10023075-116 = "た、たしかに……あの煙幕は！"
10023075-118 = "い、居ません……ここには誰も居ません……"
10023075-124 = "[ns7] \"助けてくれて、ありがとう。\"\n[ns8] \"どうして私たちを助けてくれたの？\""
10023075-127 = "そうですね……まずは誤解を解くところから。#n私はお嬢さん方の敵ではありませんよ。"
10023075-128 = "そして、お嬢さん方を助けた理由は――端的に言えば、銅田に騙されていると気付いたから――と申し上げれば良いでしょうか？"
10023075-132 = "（「慈愛の怪盗」は、誰にも気付かれぬよう一瞬だけウィンクしてきた）"
10023075-137 = "（……「小道具」で会話した事を思い出す）"
10023075-138 = "であれば、C&Cはもちろん、先生とも戦う必要はありませんから。#nお嬢さん方は被害者ですからね。"
10023075-139 = "なので、地下オークションの存在をお伝えしました。#n――真の敵は誰なのか、と。"
10023075-140 = "――嗚呼、それと。#nついでと言っては何ですが、C&Cがお探しの美術品も見つかったでしょう？"
10023075-142 = "うああ……一気に情報が押し寄せてパンクしちゃう！"
10023075-143 = "つまり、私たちと「慈愛の怪盗」……さんで戦っている場合では無い、という事ですか？"
10023075-148 = "姑息な手を考えましたね、慈愛の怪盗。"
10023075-149 = "ふふ、何のことやら。"
10023075-151 = "敵の敵は味方とも言いますが、常にそうとは限りません。"
10023075-153 = "えっと……「慈愛の怪盗」……"
10023075-154 = "さんは、七囚人の一人……ですよね？"
10023075-156 = "ふふ、"
10023075-163 = "それがどうかしましたか？お嬢さん。"
10023075-164 = "それとも、七囚人のような危険因子とは相容れない……#nたとえ同じ目的があろうとも、犯罪者と手を取り合うなどできない、とでも？"
10023075-166 = "あうぅ……"
10023075-168 = "あなたが七囚人の一人である事も、#nC&Cが追う「時計王の冠」を狙っているという事実も、何ら変わり無いでしょう。"
10023075-169 = "依然として、あなたの行動には注意を払う必要があります。"
10023075-170 = "[s9] \"うん、トキの言う通りだけど……\"\n[s10] \"それを踏まえたうえで、提案があるんだ。\""
10023075-173 = "提案……ですか？"
10023075-174 = "ふむ――続けてください。"
10023075-176 = "[ns] \"一旦、ここでは同盟を結ばない？\""
10023075-184 = "たしかに……事態は私たちの想定とは大きく異なる展開に転びました。"
10023075-185 = "しかし、相手は七囚人――犯罪者です。#nそんな怪しい者と同盟だなんて……"
10023075-186 = "ふふ、私は名案だと思いますよ？"
10023075-187 = "嗚呼でも、ひねくれ者にその言葉は届かないのかもしれませんけれど。"
10023075-188 = "……先生。可及的速やかに犯罪者の排除に取りかかってもよろしいですか？"
10023075-189 = "[s11] \"まあまあ、2人とも落ち着いて。\"\n[s12] \"とりあえず情報交換するのはどうかな？\""
10023075-192 = "……うん、先生がそう言うなら。"
10023075-193 = "私たちは……ミレニアムサイエンススクールのゲーム開発部だよ。"
10023075-194 = "色々あってC&Cと勘違いされて……あなたから屋敷を守ってほしい、という依頼を受けたの。"
10023075-195 = "あなたの予告状を読んで、剣の描かれた絵が盗られると思ってたんだけど……"
10023075-196 = "予告状の謎を解き直したら、地下の通路が見つかって……3日目に行うはずのオークションが開催されてるし、いきなり[ruby=めいたろう]明太郎[/ruby]さんに攻撃されて……"
10023075-197 = "ううぅ、どうしてこんな事に……！"
10023075-199 = "なるほど……お嬢さん方は何も知らされていなかったのですね。"
10023075-200 = "し、仕方ないでしょ！依頼を受けたのだって急だったし！"
10023075-201 = "ふむ……それでも私の予告状を解読することができた――#nふふ、素晴らしい才能です。"
10023075-202 = "ふ、ふん！"
10023075-203 = "当たり前じゃん。#n今までたくさんのパズルゲームを攻略してきたんだから！#nあれくらいの謎解き、[ruby=うち]ゲーム開発部[/ruby]にかかれば朝飯前だよ！"
10023075-204 = "ふふ、そうなのですね。#nまぁ、良いでしょう。"
10023075-207 = "私は最初から、地下オークションの会場を狙っておりました。"
10023075-208 = "そこは違法なルートで取引された盗品が売買される闇の市場――"
10023075-209 = "屋敷の主である[ruby=どうだ]銅田[/ruby]が管理している場所でもある。"
10023075-210 = "……その情報に偽りはありません。"
10023075-211 = "C&Cが追っている盗品が一か所に集まっていたのは、私も目にしましたので。"
10023075-212 = "じゃあ、あの展示会は？"
10023075-215 = "ヴァルキューレの注意を逸らすための餌だったのでしょうね。"
10023075-216 = "いずれにせよ私の狙いは、ただひとつ――"
10023075-217 = "――「時計王の冠」。"
10023075-218 = "かの素晴らしい美術品を一人で独占するだなんて――誰が許そうとも、私の美学では許すことなどできません。"
10023075-220 = "もうお分かりいただけましたか？"
10023075-221 = "――お嬢さん方は利用されていたのだと。"
10023075-222 = "銅田は狡猾です――お嬢さん方が思っているよりも、ずっと。"
10023075-223 = "ううっ……でも、こんな急に信じろって言われても……！"
10023075-224 = "ふふ、そうですね。#nそう思われたとしても致し方ないと、理解はしておりますが――"
10023075-225 = "片や牙を向いた者、片や手を差し伸べた者――"
10023075-226 = "どちらの言葉が信用に値するのか、果たして天秤にかける必要はありますか？"
10023075-227 = "[s13] \"ミドリの時も、ありがとう。\"\n[s14] \"……でも、どうして助けてくれたの？\""
10023075-230 = "理由なんて単純明快ですよ。"
10023075-231 = "優れた美術品を前に無益な血が流れる事も――私の美学に反しますから。#nただ、それだけの事です。"
10023075-232 = "[s] \"美学……\""
10023075-233 = "ふふ。"
10023075-240 = "私はシャーレの先生から提案してもらった事に異論はないけれど――お嬢さん方は如何でしょうか？"
