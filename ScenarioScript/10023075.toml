[translation]
10023075-3 = "Droga, maldito...!"
10023075-4 = "Chegou ao fim."
10023075-5 = "――Bem. #nPor que itens roubados estão aqui? E sobre este leilão..."
10023075-6 = "Poderia nos explicar?"
10023075-7 = "Droga..."
10023075-8 = "Mas eu já previa que algo assim pudesse acontecer."
10023075-14 = "Vocês não são os únicos fazendo a segurança! Também contratamos a Genryumon de Shanhaijing!"
10023075-16 = "A Genryumon... de Shanhaijing...?"
10023075-17 = "[s1] \"Eles são realmente precavidos...\"\n[s2] \"Não medem esforços para nada...\""
10023075-24 = "Vamos, equipe de reserva! Prendam-nos!!"
10023075-32 = "Misturados entre os participantes...!"
10023075-33 = "Tantos assim..."
10023075-43 = "O-o que faremos, Sensei? #nTem gente demais!"
10023075-44 = "Se ao menos tivéssemos os trajes energizados...!"
10023075-53 = "O que é essa fumaça!? #n...N-não os deixem escapar!"
10023075-57 = "Por favor, segure minha mão――"
10023075-58 = "[s] \"...Essa voz!\""
10023075-70 = "(Recebendo uma ajuda inesperada, conseguimos escapar da mansão...)"
10023075-74 = "Haa, haa..."
10023075-75 = "Estou... exausta..."
10023075-77 = "Uuu. E-eu não consigo mais correr..."
10023075-78 = "Já escureceu tanto assim..."
10023075-79 = "Parece que ficamos lá por muito tempo."
10023075-80 = "Estão todos bem?"
10023075-81 = "[s3] \"Sim, graças a ela.\"\n[s4] \"O inimigo do meu inimigo é meu amigo... será que é isso?\""
10023075-87 = "Hm? O que quer dizer?"
10023075-92 = "Acaso, aleatoriedade, assimetria, incerteza... #nTodos são elementos indispensáveis ao falar de estética."
10023075-96 = "Q-quem é você...?"
10023075-103 = "Fufu, olá. #nImagino que nenhum de nós esperava nos reencontrarmos desta forma."
10023075-111 = "Se-se-se-se-Sensei!? O que está acontecendo!?"
10023075-112 = "[s5] \"A 'Ladra da Benevolência'\"\n[s6] \"nos ajudou.\""
10023075-116 = "E-é verdade... aquela cortina de fumaça!"
10023075-118 = "N-não tem ninguém... não há ninguém aqui..."
10023075-124 = "[ns7] \"Obrigado por nos ajudar.\"\n[ns8] \"Por que você nos ajudou?\""
10023075-127 = "Bem... vamos começar esclarecendo os mal-entendidos. #nEu não sou inimiga de vocês, senhoritas."
10023075-128 = "E, sobre o motivo de tê-las ajudado―― se eu disser que foi porque percebi que estavam sendo enganadas por Doda, seria o suficiente?"
10023075-132 = "(A \"Ladra da Benevolência\" piscou por um instante, sem que ninguém percebesse)"
10023075-137 = "(...Lembro-me de ter conversado usando os \"adereços\")"
10023075-138 = "Sendo assim, não há necessidade de lutar contra a C&C, nem contra o Sensei. #nAfinal, vocês são as vítimas aqui."
10023075-139 = "Por isso, contei sobre a existência do leilão clandestino. #n――Para que soubessem quem é o verdadeiro inimigo."
10023075-140 = "――Ah, e mais uma coisa. #nJá que estamos nisso, a obra de arte que a C&C estava procurando também foi encontrada, não foi?"
10023075-142 = "Uaaa... tanta informação de uma vez que meu cérebro vai pifar!"
10023075-143 = "Quer dizer que não precisamos lutar contra a \"Ladra da Benevolência\"...?"
10023075-148 = "Você pensou em um truque bem astuto, Ladra da Benevolência."
10023075-149 = "Fufu, não sei do que está falando."
10023075-151 = "Dizem que o inimigo do meu inimigo é meu amigo, mas nem sempre é assim."
10023075-153 = "Err... \"Ladra da Benevolência\"..."
10023075-154 = "Você é uma das Sete Prisioneiras... não é?"
10023075-156 = "Fufu,"
10023075-163 = "E o que isso tem a ver? Senhorita."
10023075-164 = "Ou será que, por ser um fator de risco como um dos Sete Prisioneiros...#nmesmo que tenhamos o mesmo objetivo, você está dizendo que não pode dar as mãos a um criminoso?"
10023075-166 = "Auu..."
10023075-168 = "O fato de você ser um dos Sete Prisioneiros e estar atrás da \"Coroa do Rei Relógio\", que a C&C está perseguindo, não muda em nada."
10023075-169 = "Continuo precisando manter a atenção em suas ações."
10023075-170 = "[s9] \"Sim, a Toki tem razão, mas...\"\n[s10] \"Tendo isso em mente, eu tenho uma proposta.\""
10023075-173 = "Uma proposta... você diz?"
10023075-174 = "Hum... prossiga."
10023075-176 = "[ns] \"Que tal formarmos uma aliança por enquanto?\""
10023075-184 = "De fato... a situação tomou um rumo muito diferente do que esperávamos."
10023075-185 = "Mas, o outro lado é um dos Sete Prisioneiros — um criminoso. #nFazer uma aliança com alguém tão suspeito..."
10023075-186 = "Fufu, eu acho uma ótima ideia, sabe?"
10023075-187 = "Ah, embora talvez essas palavras não alcancem alguém tão teimoso."
10023075-188 = "...Sensei. Posso prosseguir com a eliminação do criminoso o mais rápido possível?"
10023075-189 = "[s11] \"Calma, calma, acalmem-se as duas.\"\n[s12] \"Que tal trocarmos informações primeiro?\""
10023075-192 = "...Tudo bem, se o Sensei diz isso."
10023075-193 = "Nós somos... o Departamento de Desenvolvimento de Jogos da Millennium Science School."
10023075-194 = "Por vários motivos, nos confundiram com a C&C... e recebemos o pedido para proteger a mansão de você."
10023075-195 = "Li sua carta de aviso e achei que o quadro com a espada desenhada seria roubado, mas..."
10023075-196 = "Quando decifrei a carta de aviso novamente, encontrei a passagem subterrânea... o leilão que deveria acontecer no terceiro dia já estava rolando, e de repente fomos atacadas pelo Meitaro..."
10023075-197 = "Uuu, por que isso aconteceu..."
10023075-199 = "Entendo... então as senhoritas não foram informadas de nada."
10023075-200 = "N-não tínhamos escolha! O pedido foi feito de última hora!"
10023075-201 = "Hum... ainda assim, vocês conseguiram decifrar minha carta de aviso — #nfufu, um talento maravilhoso."
10023075-202 = "H-humph!"
10023075-203 = "É óbvio. #nAté agora, já zeramos muitos jogos de puzzle! #nResolver um enigma desse nível é moleza para o Departamento de Desenvolvimento de Jogos!"
10023075-204 = "Fufu, é mesmo? #nBem, tudo bem."
10023075-207 = "Desde o início, meu alvo era o local do leilão subterrâneo."
10023075-208 = "É um mercado negro onde itens roubados, negociados por rotas ilegais, são vendidos —"
10023075-209 = "E também é um lugar administrado pelo dono da mansão, Doda."
10023075-210 = "...Essa informação não é falsa."
10023075-211 = "Pois eu mesma vi que os itens roubados que a C&C persegue estavam reunidos em um só lugar."
10023075-212 = "Então, e aquela exposição?"
10023075-215 = "Deve ter sido uma isca para desviar a atenção da Valkyrie."
10023075-216 = "De qualquer forma, meu objetivo é apenas um —"
10023075-217 = "— A \"Coroa do Rei Relógio\"."
10023075-218 = "Monopolizar uma obra de arte tão maravilhosa sozinho... não importa quem permita, minha estética não permite tal coisa."
10023075-220 = "Já entenderam agora?"
10023075-221 = "— Que as senhoritas estavam sendo usadas."
10023075-222 = "Doda é astuto — muito mais do que vocês imaginam."
10023075-223 = "Ugh... mas, mesmo que você peça para acreditar de repente..."
10023075-224 = "Fufu, é verdade. #nEntendo que não há como evitar que pensem assim, mas —"
10023075-225 = "De um lado, alguém que mostrou as presas; do outro, alguém que estendeu a mão —"
10023075-226 = "Será mesmo necessário colocar na balança qual das palavras é digna de confiança?"
10023075-227 = "[s13] \"Obrigada por ajudar a Midori também.\"\n[s14] \"...Mas por que você nos ajudou?\""
10023075-230 = "O motivo é simples e claro."
10023075-231 = "Derramar sangue inútil diante de uma obra de arte excelente também vai contra a minha estética. #nApenas isso."
10023075-232 = "[s] \"Estética...\""
10023075-233 = "Fufu."
10023075-240 = "Eu não tenho objeções à proposta do Sensei do Schale, mas — o que as senhoritas acham?"
