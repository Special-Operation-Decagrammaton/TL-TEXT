[translation]
1004102-1 = "A prisão que é o corpo"
1004102-4 = "……。"
1004102-5 = "[s] \"……。\""
1004102-6 = "……Por que as coisas terminaram assim? Eu não pretendia te encontrar."
1004102-7 = "[s] \"Ah…… bem……。\""
1004102-8 = "Por que você me chamou?"
1004102-9 = "O que você quer?"
1004102-10 = "[s] \"Não…… nada em especial…。\""
1004102-11 = "Então, eu vou embora."
1004102-12 = "[s] \"E-espera!\""
1004102-13 = "……O quê?"
1004102-14 = "[s1] \"É que a Misaki... bem, você parece ser alguém perigosa...\"\n[s2] \"É como se eu não soubesse o que você está pensando...\""
1004102-15 = "……E daí?"
1004102-16 = "……E daí?"
1004102-17 = "[s3] \"Por isso... bem, eu queria conversar com a Misaki...\"\n[s4] \"Eu queria conhecer um pouco mais sobre você...\""
1004102-18 = "……。"
1004102-19 = "……。"
1004102-20 = "……Haa."
1004102-26 = "Eu tenho o dever de proteger o pessoal de Arius."
1004102-27 = "Precisamos escapar dos olhos daqueles que estão nos caçando."
1004102-28 = "Por isso, manter contato com pessoas de fora é, em princípio, proibido. Entendeu?"
1004102-29 = "Mas... bem, desta vez tudo bem."
1004102-30 = "De qualquer forma, nossas vidas já estão praticamente nas suas mãos."
1004102-31 = "Então, o que você quer que eu faça?"
1004102-32 = "[s] \"Então, que tal conversarmos...?\""
1004102-33 = "……。"
1004102-34 = "[s] \"Ou, tem algo em que eu possa ajudar?\""
1004102-35 = "Nada em especial."
1004102-36 = "Ah... ajudar... na verdade, tem uma coisa."
1004102-37 = "[s] \"Que bom! Eu ajudo com qualquer coisa!\""
1004102-38 = "Sendo assim..."
1004102-41 = "……Correção de erro, concluída."
1004102-42 = "[s] \"Terminou?\""
1004102-43 = "Sim. O equipamento de GPS que usamos é antigo. Só conseguimos corrigir os erros em lugares altos como este."
1004102-44 = "Mas eu não conseguiria vir aqui sozinha..."
1004102-45 = "Com isso, não vou me perder por um tempo. Obrigada, Sensei."
1004102-46 = "[s] \"Fico aliviado por ter sido útil para a Misaki.\""
1004102-47 = "……Aliviado? Por quê?"
1004102-48 = "[s] \"……É que a Misaki não demonstra muito as emoções, então eu não sabia se tinha sido útil.\""
1004102-49 = "……Entendi."
1004102-50 = "Costumam me dizer isso... bem, não me importa o que os outros digam."
1004102-51 = "Já terminamos, vamos voltar?"
1004102-52 = "[s] \"V-você não está com fome? Quer ir comer alguma coisa?\""
1004102-53 = "Não, não precisa."
1004102-54 = "Já terminamos o que tínhamos que fazer, vamos."
1004102-58 = "[ns] \"……S-sim.\""
1004102-63 = "……。"
1004102-64 = "[s] \"……。\""
1004102-65 = "……。"
1004102-66 = "……Desculpe, deve ser desconfortável. Provavelmente sempre será assim quando estiver comigo."
1004102-67 = "Eu não tenho muito interesse em nada."
1004102-68 = "Você perguntou se eu queria ir comer algo agora há pouco, não foi?"
1004102-69 = "……Eu também não tenho interesse nisso."
1004102-70 = "Mesmo que eu sinta fome, basta comer o suficiente para não morrer. Não tenho preferência pelo que comer. Uma vez que entra no estômago, é tudo a mesma coisa."
1004102-71 = "[s] \"Mas se você não comer direito, vai acabar ficando doente.\""
1004102-72 = "……Pois é. E se isso acontecer, eu só vou ficar doente na hora. O corpo físico não passa de um recipiente sem sentido que vai virar pó de qualquer jeito, então, se eu morrer, morri."
1004102-73 = "[s] \"Entendi…….\""
1004102-74 = "É isso."
1004102-75 = "[s] \"Então, existe mais alguma coisa que você considere importante, Misaki……?\""
1004102-76 = "……Quem sabe."
1004102-77 = "Será que existe algo assim?"
1004102-78 = "Mesmo que você considere algo importante, tudo acaba sendo em vão――"
1004102-86 = "ッ！？"
1004102-92 = "[ns] \"O elevador parou?\""
1004102-93 = "……！？"
1004102-94 = "Não pode ser…… logo agora……!?"
1004102-95 = "Atenção, devido a um erro no sistema de prevenção de desastres, a energia do prédio foi cortada. A previsão para o restabelecimento é de cerca de 1 hora."
1004102-96 = "U-uma hora……? Espera um pouco……!"
1004102-97 = "Ei……! Agora não……"
1004102-98 = "[s] \"Não tem jeito, né.\""
1004102-99 = "Não é questão de ter jeito…… uma hora inteira……."
1004102-100 = "[s] \"Hm? Você não estava livre hoje……?\""
1004102-101 = "Sim, mas……!"
1004102-102 = "A-agora não……."
1004102-103 = "[s] \"Se você ficar calma e esperar, logo vai voltar.\""
1004102-104 = "É que, por isso……!"
1004102-105 = "[s] \"Você está com uma cara pálida…… está tudo bem?\""
1004102-106 = "N-não fale comigo――"
1004102-107 = "[s] \"……Misaki? Você está muito pálida……\""
1004102-108 = "……."
1004102-109 = "[s5] \"Está tudo bem?\"\n[s6] \"Está se sentindo mal?\"\n[s7] \"Pode me dizer, mesmo que seja por alto…….\""
1004102-110 = "N-não fale comigo……."
1004102-111 = "N-não fale comigo……."
1004102-112 = "N-não fale comigo……."
1004102-113 = "E-eu……."
1004102-114 = "[s8] \"Misaki, o que houve?\"\n[s9] \"……?\"\n[s10] \"Se houver algo que eu possa fazer…….\""
1004102-115 = "Eu já disse que tenho claustrofobia!"
1004102-116 = "Eu já disse que tenho claustrofobia!"
1004102-117 = "Eu já disse que tenho claustrofobia!"
1004102-118 = "[s] \"…….\""
1004102-119 = "Ah, ah……."
1004102-125 = "[ns] \"A porta abriu!\""
1004102-127 = "Ah, vejo que vocês ficaram presos no elevador. O sistema acabou de ser restabelecido. Pedimos desculpas pelo transtorno."
1004102-128 = "[s] \"Ah…… sim, obrigado.\""
1004102-130 = "……."
1004102-131 = "[s11] Pedir desculpas ajoelhado.\n[s12] Pedir desculpas com a testa no chão."
1004102-132 = "Sensei……."
1004102-133 = "Sensei……."
1004102-134 = "[s] \"……Misaki, me desculpe de verdade. Eu não sabia…….\""
1004102-135 = "……Já chega."
1004102-136 = "Eu entro e saio das catacumbas subterrâneas, então acho que, normalmente, ninguém notaria se não me dissessem..."
1004102-137 = "Bem, é por isso que... eu não gosto de ficar em lugares apertados e escuros."
1004102-138 = "...É o que chamam de defeito físico. Não é culpa do Sensei, então não se preocupe com isso."
1004102-139 = "[s] \"...S-sim.\""
1004102-141 = "(As costas de Misaki enquanto ela se afastava carregavam uma aura de melancolia.)"
