[translation]
1004102-1 = "肉体という檻"
1004102-4 = "……。"
1004102-5 = "[s] \"……。\""
1004102-6 = "……なんでこんなことになったんだろ。会うつもりはなかったんだけど。"
1004102-7 = "[s] \"あ……その……。\""
1004102-8 = "どうして呼び出したの？"
1004102-9 = "何が望み？"
1004102-10 = "[s] \"いや……特に…。\""
1004102-11 = "じゃあ、帰る。"
1004102-12 = "[s] \"ま、待って！\""
1004102-13 = "……何？"
1004102-14 = "[s1] \"ミサキは……その、危なっかしい感じがするというか……。\"\n[s2] \"何を考えているのか分からないというか……。\""
1004102-15 = "……それで？"
1004102-16 = "……それで？"
1004102-17 = "[s3] \"だから……その、ミサキと話をしてみたくて……。\"\n[s4] \"もう少しミサキのことを知りたくて……。\""
1004102-18 = "……。"
1004102-19 = "……。"
1004102-20 = "……はあ。 "
1004102-26 = "私には、アリウスのみんなを守る役目がある。"
1004102-27 = "私たちを探してる連中の目から逃れなきゃいけないんだ。"
1004102-28 = "だから、外部の人間と連絡を取り合うなんて、原則NG。わかる？"
1004102-29 = "でも……まぁ、今回はいいよ。"
1004102-30 = "どうせ私たちの命はあなたが握ってるようなものだし。"
1004102-31 = "それで、私に何をしてほしいの？"
1004102-32 = "[s] \"じゃあ、お話とか……？\" "
1004102-33 = "……。 "
1004102-34 = "[s] \"それか、何か手伝えることはある？\""
1004102-35 = "別に。 "
1004102-36 = "ああ……手伝えること……ひとつ、あることにはある。"
1004102-37 = "[s] \"よかった！どんなことでも手伝うよ！\""
1004102-38 = "それじゃ……"
1004102-41 = "……エラーの修正、完了。"
1004102-42 = "[s] \"終わった？\""
1004102-43 = "うん。私たちの使ってるGPS機器、古いからさ。こういう高いところでしかエラーの修正ができないの。 "
1004102-44 = "でも、私ひとりじゃ来られなかったから……。"
1004102-45 = "これで道に迷うことはしばらくないかな。ありがとう、先生。"
1004102-46 = "[s] \"ミサキの役に立てて安心したよ。\""
1004102-47 = "……安心？なんで？"
1004102-48 = "[s] \"……ミサキってあんまり感情を表に出してくれないから、役に立てたのかわからなくて。\""
1004102-49 = "……そっか。 "
1004102-50 = "そういうの、よく言われる……まぁ、別に誰が何と言おうと興味ないけど。"
1004102-51 = "やること終わったし、帰ろっか。"
1004102-52 = "[s] \"お、お腹空いてない？何か食べに行く？\""
1004102-53 = "ううん、いらない。"
1004102-54 = "用は済んだし、行こう。 "
1004102-58 = "[ns] \"……う、うん。\""
1004102-63 = "……。"
1004102-64 = "[s] \"……。\""
1004102-65 = "……。"
1004102-66 = "……ごめん、居心地悪いでしょ。私といると、多分ずっとそうだよ。"
1004102-67 = "私、何に対してもあんまり興味ないから。 "
1004102-68 = "さっき、なにか食べに行くって聞いたよね？"
1004102-69 = "……そういうのにも、興味が無い。"
1004102-70 = "お腹がすいたとしても、死なない程度に食べればいいから。何を食べたいとか、無くて。胃に入っちゃえば全部同じだし。 "
1004102-71 = "[s] \"でも、ちゃんと食べないと身体を壊しちゃうよ。\""
1004102-72 = "……だろうね。そうなったとしても、その時に身体を壊すだけだよ。肉体なんてどうせ土に還るだけの無意味な器なんだし、死んだらその時はその時。"
1004102-73 = "[s] \"そっか……。\""
1004102-74 = "そういうこと。"
1004102-75 = "[s] \"じゃあ何か他にでも、ミサキが大切だと思うことは……？\""
1004102-76 = "……さあね。"
1004102-77 = "そんなもの、あるのかな。"
1004102-78 = "大切に思ってもすべてが無駄になるだ、け――"
1004102-86 = "ッ！？"
1004102-92 = "[ns] \"エレベーターが止まった？\""
1004102-93 = "……！？"
1004102-94 = "ちょっと……よりによって今……！？"
1004102-95 = "えー、ただいま防災システムのエラーにより、建物内の電源が落ちました。復旧まで1時間ほどかかる見込みです。"
1004102-96 = "い、1時間……？ちょっと待って……！"
1004102-97 = "ちょっと……！今は――"
1004102-98 = "[s] \"仕方ないね。\""
1004102-99 = "仕方ないじゃないよ……1時間も……。"
1004102-100 = "[s] \"ん？今日は暇だったんじゃ……？\""
1004102-101 = "そう、だけど……！"
1004102-102 = "い、今は……。 "
1004102-103 = "[s] \"落ち着いて待ってたら、すぐ復旧するよ。\" "
1004102-104 = "それは、だから……！"
1004102-105 = "[s] \"何か顔色が悪いけど……大丈夫？\""
1004102-106 = "は、話しかけな――"
1004102-107 = "[s] \"……ミサキ？顔色がすごく悪いけど……\""
1004102-108 = "……。"
1004102-109 = "[s5] \"大丈夫？\"\n[s6] \"どこか具合でも悪い？\"\n[s7] \"ざっくりでも良いから、教えてもらえると……。\""
1004102-110 = "は、話しかけないで……。 "
1004102-111 = "は、話しかけないで……。 "
1004102-112 = "は、話しかけないで……。 "
1004102-113 = "わ、私……。"
1004102-114 = "[s8] \"ミサキ、どうしたの？\"\n[s9] \"……？\"\n[s10] \"何かできることがあるなら……。\""
1004102-115 = "閉所恐怖症なんだってば！"
1004102-116 = "閉所恐怖症なんだってば！"
1004102-117 = "閉所恐怖症なんだってば！"
1004102-118 = "[s] \"……。\""
1004102-119 = "あー、っ……。"
1004102-125 = "[ns] \"ドアが開いた！\""
1004102-127 = "おや、エレベーターに閉じ込められた方がいらっしゃいましたか。ただいま復旧完了しました。ご不便をおかけして申し訳ございません。"
1004102-128 = "[s] \"えっと……はい、ありがとうございます。\""
1004102-130 = "……。"
1004102-131 = "[s11] 土下座して謝る。\n[s12] 額を床につけて謝罪する。"
1004102-132 = "先生……。"
1004102-133 = "先生……。"
1004102-134 = "[s] \"……ミサキ、本当にごめん。そうとも知らずに……。\""
1004102-135 = "……もういいよ。 "
1004102-136 = "地下のカタコンベに出入りしてるし、普通は言われないと気づかないと思うから……。"
1004102-137 = "まぁ、だから……狭くて暗いところにいるの、苦手なんだ。"
1004102-138 = "……肉体の欠陥ってやつ。別に先生のせいじゃないから、気にしないで。"
1004102-139 = "[s] \"……う、うん。\""
1004102-141 = "（帰っていくミサキの後ろ姿には哀愁が漂っていた。）"
