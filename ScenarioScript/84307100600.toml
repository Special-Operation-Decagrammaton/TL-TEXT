[translation]
84307100600-5 = "どうした？"
84307100600-6 = "やっほ～リーダー！今何してる？ってか、アレ聞いた？"
84307100600-7 = "アレ？"
84307100600-8 = "昨日の夜、会場に忍び込んで展示品を盗もうとした奴が居たらしいよ！"
84307100600-9 = "へぇ……？"
84307100600-10 = "会場のセキュリティを強化しなきゃって、朝から大忙しでさ！"
84307100600-11 = "何でそれをあたしに？"
84307100600-15 = "ん？ん～……何でだろうね？"
84307100600-16 = "……なんとなく？あはっ。"
84307100600-17 = "リーダーはなんか知ってる？"
84307100600-21 = "……知らないってことで。"
84307100600-22 = "おっけー！"
84307100600-23 = "「知らないってこと」ね！"
