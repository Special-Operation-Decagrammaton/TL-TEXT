[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22175-6 = "Agora que os movimentos do Avant-Garde ficaram lentos, é a chance!#nVamos lá, Clube de Engenharia!"
22175-7 = "Sim! Entendido!"
22175-8 = "Entendido. Vou instalar aquilo."
22175-16 = "[ns] \"Q-que é que vai começar!?\""
22175-17 = "Além da função de rastreamento autônomo, é totalmente à prova d'água e de poeira."
22175-18 = "E ainda, com estabilidade garantida mesmo no zero absoluto ou em temperaturas acima de 3 mil graus,#ncom uma super-super-super-super certificação de segurança……!"
22175-19 = "O mais poderoso, construído com meio ano de orçamento——"
22175-21 = "o alto-falante remoto de última geração!"
22175-26 = "……"
22175-30 = "(Perplexidade)"
22175-31 = "[ns] \"…………Por que um alto-falante tem uma função dessas?\""
22175-32 = "Essa é uma pergunta tola, Sensei."
22175-33 = "Pra começar, sabe como é que funciona uma função! Quando dá pra colocar——"
22175-34 = "……a regra de ouro é colocar o máximo possível."
22175-35 = "É isso aí."
22175-36 = "Então——"
22175-37 = "Disparar!"
22175-44 = "(……Glup)"
22175-45 = "……E-eu tô morrendo de vontade de falar aquela fala……!"
22175-46 = "Mana, segura essa um pouquinho!"
22175-47 = "……N-não precisa falar de jeito nenhum."
22175-55 = "……Eu sabia, o alto-falante que a gente fez tem uma sonoridade e tanto!"
22175-56 = "[s] \"Era alto-falante NESSE sentido!?\""
22175-57 = "Calma, calma, vamos deixar os detalhes de lado!#nEnfim, com isto……!"
22175-58 = "……Sim. Até que enfim deu pra derrotar."
22175-60 = "Eba! A gente derrotou!"
22175-61 = "[s1] \"Acabou antes mesmo de eu entender direito o que tava acontecendo……\"\n[s2] \"Nossa…… foi um inimigo e tanto, o Avant-Garde.\""
22175-62 = "……G-graças a todo mundo unindo forças, a gente conseguiu derrotar."
22175-63 = "……G-graças a todo mundo unindo forças, a gente conseguiu derrotar."
22175-64 = "É isso. Tipo, como posso dizer……"
22175-65 = "foi como derrotar um boss de raid com sucesso!!"
22175-67 = "Bom trabalho, pessoal. Mas o show de verdade é a partir de agora."
22175-68 = "Enquanto o \"Espelho\" ainda mantém a rede, a gente tem que se mover……#npor ora, eu navego."
22175-69 = "Ah, sobre isso……"
22175-70 = "é que……"
22175-71 = "……Desculpa, parece que pra gente é só até aqui."
22175-76 = "[ns] \"V-vocês estão bem!?"
22175-77 = "……Naquele momento, instalar o alto-falante até foi tranquilo."
22175-78 = "Mas, pra gente, que é do tipo caseira…… a-acabamos fazendo um movimento exagerado demais……"
22175-79 = "…………Agora, não dá pra mexer nem um dedo."
22175-80 = "É como vocês estão vendo. É vergonhoso não conseguir acompanhar até o fim, mas é aqui que a gente se despede."
22175-82 = "Utaha……"
22175-86 = "Que nada! Tá tudo bem! Obrigada por ajudar!#nAquele alto-falante de agora! Foi muito maneiro!"
22175-87 = "Daqui pra frente, a gente dá um jeito por conta própria!"
22175-92 = "[ns] \"Não se preocupem. A gente vai, com certeza, trazer a Aris de volta.\""
22175-94 = "……É verdade. Se você fala assim."
22175-95 = "Momoi."
22175-96 = "Hm?"
22175-97 = "Toma isto.#nDeve ser útil numa hora de aperto."
22175-98 = "Isto é……"
22175-99 = "Sim, entendido."
22175-100 = "Então, pessoal…… daqui pra frente, conto com vocês!"
22175-101 = "Pessoal, boa sorte."
22175-103 = "Próximo episódio: A Muralha Intransponível."