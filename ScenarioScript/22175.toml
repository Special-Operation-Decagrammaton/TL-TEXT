[translation]
22175-6 = "Agora que os movimentos do Avant-Garde-kun ficaram lentos, é a nossa chance!#nVamos lá, Clube de Engenharia!"
22175-7 = "Sim! Entendido!"
22175-8 = "Entendido. Vou instalar aquilo."
22175-16 = "[ns] \"O-o que é que vai começar agora!?\""
22175-17 = "Além da função de rastreamento autônomo, ele é totalmente à prova d'água e de poeira."
22175-18 = "E mais, ele garante uma certificação de segurança super, super, super, super alta, mantendo a estabilidade até mesmo sob zero absoluto ou temperaturas acima de 3 mil graus...!"
22175-19 = "O mais forte que criamos gastando metade do orçamento anual..."
22175-21 = "O alto-falante remoto de última geração!"
22175-26 = "……."
22175-30 = "(Confusa)"
22175-31 = "[ns] \"............Por que um alto-falante teria essas funções?\""
22175-32 = "Essa é uma pergunta boba, Sensei."
22175-33 = "Afinal, funções são coisas que, quando você pode adicionar...!"
22175-34 = "...a regra de ouro é adicionar o máximo possível."
22175-35 = "É exatamente isso."
22175-36 = "Então..."
22175-37 = "Disparar!"
22175-44 = "(...Gulp)"
22175-45 = "...E-eu estou me coçando de vontade de dizer aquela fala...!"
22175-46 = "Irmã, tente se segurar um pouco!"
22175-47 = "...N-não tem necessidade nenhuma de dizer isso."
22175-55 = "...Como esperado, o alto-falante que fizemos tem uma ótima ressonância!"
22175-56 = "[s] \"Era esse o tipo de alto-falante que vocês queriam dizer!?\""
22175-57 = "Bem, bem, vamos deixar os detalhes de lado!#nDe qualquer forma, com isso...!"
22175-58 = "...Sim. Finalmente conseguimos derrotá-lo."
22175-60 = "Eba! Conseguimos!"
22175-61 = "[s1] \"Acabou antes mesmo que eu entendesse o que estava acontecendo...\".\n[s2] \"Nossa... ele foi um inimigo formidável, o Avant-Garde-kun.\""
22175-62 = "...G-graças ao esforço de todos, c-conseguimos derrotá-lo."
22175-63 = "...G-graças ao esforço de todos, c-conseguimos derrotá-lo."
22175-64 = "É verdade. Como posso dizer..."
22175-65 = "Foi como derrotar um chefe de raid, não foi!!"
22175-67 = "Bom trabalho a todos. Mas o verdadeiro desafio começa agora."
22175-68 = "Precisamos nos mover enquanto a rede ainda está sendo mantida pelo \"Espelho\"...#nPor enquanto, eu vou guiar o caminho."
22175-69 = "Ah, sobre isso..."
22175-70 = "Bem..."
22175-71 = "...Desculpem, parece que nós vamos até aqui."
22175-76 = "[ns] \"V-vocês estão bem!?\""
22175-77 = "...Naquele momento, até a instalação do alto-falante foi tudo bem."
22175-78 = "Para quem é do tipo caseiro... a-acabamos fazendo movimentos exagerados demais..."
22175-79 = "............Não consigo mais mover nem um dedo."
22175-80 = "Como pode ver. Sinto muito por não poder acompanhar até o fim, mas nos despedimos aqui."
22175-82 = "Utaha-senpai..."
22175-86 = "Não! Está tudo bem! Obrigada por nos ajudar!#nAquele alto-falante de agora! Foi muito legal!"
22175-87 = "Daqui em diante, nós daremos um jeito!"
22175-92 = "[ns] \"Não se preocupem. Vamos trazer a Alice de volta, todos nós juntos.\""
22175-94 = "...Entendo. Se você diz assim."
22175-95 = "Momoi."
22175-96 = "Hm?"
22175-97 = "Tome isto.#nDeve ser útil em uma emergência."
22175-98 = "Isto é..."
22175-99 = "Sim, entendi."
22175-100 = "Então, pessoal... conto com vocês para o que vem a seguir!"
22175-101 = "Pessoal, boa sorte."
22175-103 = "Próximo episódio: Mesmo assim, uma barreira intransponível"
