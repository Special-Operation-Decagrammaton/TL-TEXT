[translation]
1006515-1 = "Não se esqueça de suas intenções iniciais"

1006515-2 = "(O trabalho no Departamento Yin-Yang foi melhor que o esperado.)"

1006515-12 = "Ah, professora?"

1006515-13 = "Foi rápido. Desculpe, ainda não estou pronto..."

1006515-14 = "[s1] \"Acabou mais cedo do que eu esperava...\"\n[s2] \"Desculpe, estava limpando.\""

1006515-17 = "Oh não. Foi minha falta de jeito que a limpeza demorou tanto."

1006515-18 = "Acabei sendo mais cuidadoso que o normal..."

1006515-19 = "Cometi um erro ao alocar meu tempo."

1006515-20 = "Peço desculpas por mostrar algo desagradável."

1006515-21 = "[s3] \"Não, não, Kaho não é ruim.\"\n[s4] \"Eu também vou ajudar você.\""

1006515-24 = "Não, não posso pedir ajuda ao professor..."

1006515-25 = "Bem... como você disse, seria mais eficiente se duas pessoas fizessem isso."

1006515-26 = "……Concordo."

1006515-27 = "entendi. #nEntão, você poderia me ajudar um pouco?"

1006515-30 = "(Depois de limparmos juntos por um tempo...)"

1006515-32 = "Bom tiro... tenha cuidado aqui..."

1006515-36 = "[ns5] \"Você poliu com muito cuidado, não é?\"\n[ns6] \"É uma coisa muito importante.\""

1006515-39 = "Ah, sim."

1006515-40 = "Isso é algo especial...."

1006515-41 = "No entanto, para mim. #nTalvez não seja bom ficar muito apegado a isso, mas é importante."

1006515-42 = "[s] \"O que é importante para Kaho... você pode estar um pouco curioso.\""

1006515-43 = "Bem... você gostaria de dar uma olhada?"

1006515-44 = "[s] \"Huh? Está bom?\""

1006515-45 = "Sim, não é como se eu fosse manter isso em segredo."

1006515-46 = "aqui está você. Tenha cuidado, pois é um pouco pesado."

1006515-51 = "[ns] \"Isto foi dado a Kaho por um estudante de Hyakki Yako...?\""

1006515-55 = "Sim, está certo."

1006515-56 = "Nunca esquecerei isso... quando acabei de me tornar um líder estratégico no departamento Yin-Yang."

1006515-57 = "No festival, eu estava ajudando as pessoas no bairro comercial."

1006515-58 = "Eu ainda não estava acostumado com o trabalho e era mais encrenqueiro do que qualquer outra coisa..."

1006515-59 = "Depois que o festival terminou com sucesso... recebi isso de todos."

1006515-60 = "``Graças à ajuda do clube Yin-Yang, consegui ter sucesso desta vez'' ou #n ``Obrigado por me ajudar'', e assim por diante."

1006515-61 = "Eu realmente aprecio suas amáveis ​​​​palavras."

1006515-62 = "Estou um pouco envergonhado porque não fiz nada grande sozinho."

1006515-63 = "[s] \"Não. Tenho certeza que Kaho fez o seu melhor.\""

1006515-64 = "Eu, eu só... eu gostaria que a cultura de Hyakki Yagyo Rengo Gakuin fosse amplamente conhecida..."

1006515-65 = "Mas... cada vez que vejo esta carta de agradecimento, meu coração se enche."

1006515-66 = "Oh, meus sentimentos não estavam errados. #nEspero que todos tenham conseguido transmitir a mensagem, mesmo que seja um pouquinho."

1006515-67 = "Também me deu confiança de que poderia ter sucesso como líder estratégico."

1006515-68 = "É por isso que o limpo com cuidado todos os dias para não esquecer como me senti naquele momento."

1006515-69 = "[s] \"Essa é uma história maravilhosa.\""

1006515-70 = "Hehe, muito obrigado."

1006515-74 = "A arrumação agora está completa."

1006515-75 = "Obrigado pela sua ajuda, senhor."

1006515-76 = "[s] \"Obrigado pelo seu trabalho duro, Kaho.\""

1006515-77 = "Agora vou fazer um chá."

1006515-78 = "Tenho certeza de que o sabor do chá de hoje é excepcional. #nObrigado por me ajudar assim."

1006515-79 = "Agora vamos nos preparar."

1006515-81 = "(Depois, relaxei e tomei chá com Kaho na sala de descanso agora limpa.)"

