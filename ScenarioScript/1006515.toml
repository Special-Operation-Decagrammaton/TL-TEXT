[translation]
1006515-1 = "初心忘るるべからず"
1006515-2 = "（陰陽部での仕事は、思ったより順調に進んだ）"
1006515-12 = "あっ、先生？"
1006515-13 = "早かったですね。すみません、まだ準備が……。"
1006515-14 = "[s1] \"思ったより早く終わっちゃって……。\"\n[s2] \"ごめんね、掃除中に。\""
1006515-17 = "あ、いえ。掃除が長引いたのは私の不手際ですから。"
1006515-18 = "いつもより念入りにやってしまって……。"
1006515-19 = "時間配分を間違えてしまいましたね。"
1006515-20 = "お見苦しいところをお見せして申し訳ありません。"
1006515-21 = "[s3] \"いやいや、カホは悪くないよ。\"\n[s4] \"私も手伝うね。\""
1006515-24 = "いえ、先生に手伝っていただくわけには……。"
1006515-25 = "その……仰る通り、2人でやれば効率的ではありますが。"
1006515-26 = "……そうですね。"
1006515-27 = "わかりました。#nそれでは、少しだけ手伝っていただけますか？"
1006515-30 = "（しばらく一緒に掃除していると……）"
1006515-32 = "よいっしょっと……ここは気をつけて……。"
1006515-36 = "[ns5] \"すごく丁寧に磨くんだね？\"\n[ns6] \"すごく大切な物なんだね。\""
1006515-39 = "あっ、はい。"
1006515-40 = "これは特別なもので……。"
1006515-41 = "といっても、私にとっての、ですが。#nあまり執着しすぎるのも良くないのかもしれませんが、大切なものなんです。"
1006515-42 = "[s] \"カホの大切なもの……ちょっと気になるかも。\""
1006515-43 = "そうですね……ご覧になりますか？"
1006515-44 = "[s] \"え？良いの？\""
1006515-45 = "ええ、別に隠し立てするようなものでもありませんし。"
1006515-46 = "はい、どうぞ。少し重いので気をつけてくださいね。"
1006515-51 = "[ns] \"これって、百鬼夜行の生徒がカホにくれた……？\""
1006515-55 = "はい、そうなんです。"
1006515-56 = "あれは忘れもしない……私が陰陽部で、戦略リーダーになったばかりの頃。"
1006515-57 = "お祭りで、商店街の皆さんのお手伝いをしていたんです。"
1006515-58 = "まだ仕事に慣れていなくて、何ならトラブルメーカーに近かった私ですが――"
1006515-59 = "お祭りが無事に終わった後……皆さんから、これを頂いたんです。"
1006515-60 = "「陰陽部が手伝ってくれたおかげで今回も無事に成功した」とか、#n「手伝ってくれて助かった」とか――"
1006515-61 = "本当に……身に余るお言葉をいただきました。"
1006515-62 = "私自身が大したことをしたわけでもないので、少しお恥ずかしいのですが。"
1006515-63 = "[s] \"ううん。カホならきっと最善を尽くしたんだろうし。\""
1006515-64 = "わ、私はただ……百鬼夜行連合学院の文化が広く知られたら良いなと、その一心で……。"
1006515-65 = "でも……この感謝状を見るたびに、胸がいっぱいになるんです。"
1006515-66 = "ああ、私の気持ちは間違っていなかったんだって。#n少しでも皆さんに伝わってたんだなって。"
1006515-67 = "戦略リーダーとして、やっていけるかもしれない……という自信にも繋がりました。"
1006515-68 = "だから、あの時の気持ちを忘れないよう――こうして毎日、丁寧に拭いているんです。"
1006515-69 = "[s] \"素敵な話だね。\""
1006515-70 = "ふふっ、ありがとうございます。"
1006515-74 = "これで片付けは一通り終わりましたね。"
1006515-75 = "お手伝いありがとうございました、先生。"
1006515-76 = "[s] \"カホの方こそお疲れ様。\""
1006515-77 = "それでは、お茶を淹れてきますね。"
1006515-78 = "きっと、今日のお茶の味は格別です。#n先生にこうして手伝っていただけたのですから。"
1006515-79 = "それでは、準備しますね。"
1006515-81 = "（その後、綺麗になった休憩室で、カホと一緒にゆっくりとお茶を飲んだ）"
