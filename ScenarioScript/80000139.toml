[translation]
80000139-1 = "O bolo de chocolate do crítico"
80000139-2 = "Você conhece a avaliação pública sobre o Dia dos Namorados?"
80000139-3 = "[s] \"Existem várias formas de interpretar, não é?\""
80000139-4 = "Sim. #nA mais famosa é a visão de que é apenas uma estratégia das empresas de chocolate..."
80000139-5 = "Uma prova de que nem mesmo os sentimentos ou o amor podem resistir às ondas do capitalismo — #nhá quem diga isso, mas."
80000139-6 = "[s] \"Mas...?\""
80000139-10 = "Já estou farta de ouvir isso!"
80000139-11 = "É tão clichê que não sinto nada; essas palavras já perderam o sentido!"
80000139-12 = "Para começar, as intenções por trás disso não importam. #nAproveitar o dia de hoje, compartilhar chocolates..."
80000139-13 = "Encontrar uma felicidade passageira no cotidiano — é isso que é importante."
80000139-14 = "[s1] \"Entendo.\"\n[s2] \"Então é mais sobre tolerância do que sobre costume, né?\""
80000139-17 = "Naturalmente."
80000139-18 = "Pois um crítico deve estar em sintonia com o seu tempo."
80000139-19 = "O que as pessoas estão pensando agora, o que elas buscam..."
80000139-20 = "É aguçando esses sentidos que #na base de um crítico se solidifica."
80000139-21 = "Bem, deixando o quebra-gelo de lado..."
80000139-22 = "Por favor, aceite isto."
80000139-23 = "...Na verdade, eu mesma fiz."
80000139-29 = "É um presente de Dia dos Namorados."
80000139-30 = "Dependendo do que se coloca nele e de como é feito, #nele se torna um símbolo que permite várias interpretações —"
80000139-31 = "Tudo é incerto, uma zona cinzenta, algo que reside na ambiguidade..."
80000139-32 = "...E é justamente por isso que podemos reafirmar nossos sentimentos."
80000139-33 = "Por favor, aceite. #nCom a frase de que a vida é como uma caixa de chocolates."
80000139-34 = "[s3] \"Várias interpretações possíveis...\"\n[s4] \"...Isso significa que não vai me contar as verdadeiras intenções da Takane?\""
80000139-37 = "...!"
80000139-38 = "Se, Sensei, você sempre faz isso!"
80000139-39 = "Sempre usando a ambiguidade... com palavras ambíguas."
80000139-40 = "...Agora entendo por que todos escondem o que realmente pensam."
80000139-41 = "Por isso... seria melhor se você me interpretasse mal de uma vez...!"
80000139-42 = "[s] \"...Hm? Ah, desculpe, eu estava olhando para o chocolate...\""
80000139-43 = "Olhe como quiser!"
80000139-46 = "[ns] \"Um bolo de chocolate... talvez?\""
80000139-47 = "Sim. É um bolo de chocolate chamado Kartoshka."
80000139-48 = "É a primeira vez que vê um?"
80000139-49 = "Não seria de se estranhar. #nNão se vê muito fora de Red Winter."
80000139-50 = "Todo bolo tem seus admiradores, mas... #neu acredito que o Kartoshka é o supremo."
80000139-51 = "Pegamos doces feitos com melaço, trituramos até virar pó..."
80000139-52 = "Em Red Winter, misturamos leite condensado, açúcar, cacau, canela e outras coisas para fazer."
80000139-53 = "[s] \"Parece dar muito trabalho.\""
80000139-54 = "Não é nada demais."
80000139-55 = "Quando tentei fazer, foi surpreendentemente fácil."
80000139-56 = "Vi o Kartoshka na loja por acaso... e me lembrei de você, Sensei."
80000139-57 = "[s] \"De mim...?\""
80000139-58 = "Sim. Enquanto pensava no porquê disso, decidi tentar fazer."
80000139-59 = "..."
80000139-60 = "O melaço é um subproduto da fabricação do açúcar."
80000139-61 = "É escuro, viscoso e não tem a mesma doçura que o açúcar refinado."
80000139-62 = "Por isso, não tem tanta demanda quanto o açúcar. #nNaturalmente, é preciso criatividade para usá-lo."
80000139-63 = "No entanto, até mesmo esse melaço..."
80000139-64 = "Pode renascer como um doce maravilhoso desta forma."
80000139-65 = "Enquanto eu preparava... entendi o motivo de ter me lembrado do Sensei."
80000139-66 = "……。"
80000139-67 = "Porque o Sensei também descobre todas as possibilidades de cada aluna."
80000139-68 = "[ns5] (Estou muito feliz, mas...)\n[ns6] (Não está me superestimando demais!?)"
80000139-71 = "Por que está com essa cara tão séria?"
80000139-72 = "……。"
80000139-73 = "……Ah."
80000139-74 = "Ah, céus, peço perdão!#nEu sempre falo demais, dou voltas e acabo deixando as pessoas sem saber o que responder!"
80000139-75 = "Ugh... e olha que eu estava me policiando...#nPor que eu sou assim...?"
80000139-76 = "[s7] \"E-está tudo bem! Eu não penso nada disso!\"\n[s8] \"Acho que combina com você, Takane, sendo uma crítica!\""
80000139-79 = "……É verdade?"
80000139-80 = "[s9] \"Sim, foi uma análise muito interessante.\"\n[s10] \"E fico muito feliz que a Takane esteja tentando me entender.\""
80000139-83 = "……。"
80000139-84 = "Fufu."
80000139-85 = "Obrigada, Sensei."
80000139-86 = "Então, você não gostaria de comer comigo?"
80000139-87 = "Já que estamos aqui, vou preparar um chá também."
80000139-89 = "(Comi o kartoshka junto com a Takane)"
80000139-90 = "(Era um bolo primoroso, com um aroma suave e único)"
