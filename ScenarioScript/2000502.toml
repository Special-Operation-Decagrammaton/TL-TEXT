[translation]
2000502-1 = "Estreia de verão!"
2000502-2 = "Shiba Town - Seção de roupas de banho"
2000502-7 = "Sensei! Por aqui, por aqui!"
2000502-8 = "[s] \"Desculpe a espera, Hifumi.\""
2000502-9 = "Não, não. Eu só cheguei um pouco mais cedo porque estava animada para ver que tipos de roupas de banho teriam."
2000502-10 = "Talvez por ser a temporada, tem muitas roupas de banho fofas aqui."
2000502-11 = "Tantas cores e designs... só de olhar, já fico animada!"
2000502-12 = "Já que estamos aqui, o sensei não quer comprar uma roupa de banho nova também?"
2000502-13 = "[s1] \"Eu já tenho a que usei ano passado, então não sei...\"\n[s2] \"Acho que não preciso de uma...\""
2000502-14 = "Entendo. Nesse caso, talvez seja melhor esperar até encontrar uma que você realmente goste!"
2000502-15 = "O quê, você quer dizer nadar sem nada!? I-isso não pode! Você vai ser preso!"
2000502-16 = "Bem, vamos dar uma olhada?"
2000502-17 = "Ah, eu quero ir naquela seção primeiro!"
2000502-19 = "Hmm..."
2000502-20 = "Esta aqui, cheia de babados fofos, é boa, mas no geral parece um pouco sem graça..."
2000502-21 = "Eu já sou comum o suficiente, se não usar uma roupa de banho mais chamativa, vou acabar sendo tratada como uma pedra na areia da praia..."
2000502-22 = "Eu preciso de algo... algo que consiga prender o olhar das pessoas..."
2000502-26 = "[ns] \"Encontrou algo que gostou?\""
2000502-27 = "H-hein!? Ah, eu, eu estava escolhendo agora mesmo!"
2000502-28 = "E-eu achei que esta aqui seria legal!"
2000502-33 = "[ns3] \"Bem, talvez seja um pouco ousada demais para a Hifumi...?\"\n[ns4] \"Não é ruim, mas acho que existem outras opções melhores...\""
2000502-34 = "E-entendo...?"
2000502-35 = "E-entendo...?"
2000502-36 = "Ah, e como estudante, talvez seja um pouco ousada demais... é isso?"
2000502-39 = "É, verdade, olhando de novo, é bem..."
2000502-42 = "[ns] \"O que acha desta aqui, com babados fofos?\""
2000502-43 = "É, certamente é fofa, mas..."
2000502-44 = "É um design que parece algo que as alunas de Trinity costumam usar..."
2000502-45 = "Como eu já sou sem graça, pensei que seria melhor usar algo mais chamativo..."
2000502-46 = "[s5] \"Acho que o que combina com a Hifumi é o mais fofo.\"\n[s6] \"Mesmo não sendo chamativa, a Hifumi já é incrivelmente fofa no dia a dia.\""
2000502-47 = "S-se o sensei diz isso..."
2000502-48 = "S-se o sensei diz isso..."
2000502-49 = "Então... acho que vou ficar com esta que você recomendou, já que é fofa."
2000502-50 = "Vou experimentar, pode me esperar?"
2000502-55 = "B-bem..."
2000502-56 = "O-o que achou...?"
2000502-57 = "[s7] \"Perfeita! Incrível! Fofa! Este verão será todo da Hifumi!\"\n[s8] \"Combina muito com você!\""
2000502-58 = "E-eu fico envergonhada quando você diz essas coisas..."
2000502-59 = "E-eu fico envergonhada quando você diz essas coisas..."
2000502-60 = "Talvez não seja tão chamativa, mas... como o sensei gostou, ganhei um pouco de confiança."
2000502-61 = "...Mal posso esperar pelo dia de ir à praia!"
2000502-63 = "Depois disso, voltei para a escola com a Hifumi, que havia comprado sua roupa de banho."
