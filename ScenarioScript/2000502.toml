[translation]
2000502-1 = "夏デビュー！"
2000502-2 = "芝タウン・水着売り場"
2000502-7 = "先生！こっちです、こっち！"
2000502-8 = "[s] \"お待たせ、ヒフミ。\""
2000502-9 = "いえいえ。どんな水着があるか楽しみで、私がちょっと早く来ちゃっただけですので。"
2000502-10 = "ちょうどシーズンだからか、可愛い水着がいっぱいありますね。"
2000502-11 = "色もデザインもたくさん……見てるだけで、もう楽しくなってきてしまいます！"
2000502-12 = "せっかくですし先生も新しい水着、買いませんか？"
2000502-13 = "[s1] \"去年使ってたのがあるから、どうしよっかな……。\"\n[s2] \"要らないかなって思って……。\""
2000502-14 = "なるほど。でしたらお気に入りの水着に出会えたら、ということで良いかもしれませんね！"
2000502-15 = "なっ、何も着ないで泳ぐってことですか！？そ、それはダメです！捕まってしまいますよ！？"
2000502-16 = "とりあえず、見に行くとしましょうか？"
2000502-17 = "あっ、私、まずあそこのコーナーに行きたいです！"
2000502-19 = "うーん……。"
2000502-20 = "可愛いフリルがいっぱいのこれも良いけど、何だか全体的には地味なような……。"
2000502-21 = "ただでさえ私は普通なんだから、もっと派手な水着じゃないと、砂浜の石ころ扱いされちゃう……。"
2000502-22 = "もうちょっと……もうちょっと視線を釘付けにできるような水着……。"
2000502-26 = "[ns] \"何か良さそうなものはあった？\""
2000502-27 = "は、はいっ！？あっ、ちょ、ちょうど今選んだところです！"
2000502-28 = "こ、これなんか良いかなと！"
2000502-33 = "[ns3] \"え、えっと、ヒフミにはほんのちょっとだけ早いかも……？\"\n[ns4] \"わ、悪くないけど、他にも色々良いのあると思うよ……？\""
2000502-34 = "な、なるほど……？"
2000502-35 = "な、なるほど……？"
2000502-36 = "え、それに学生としても、少し大胆過ぎるかもしれない……ですか？"
2000502-39 = "た、確かに、あらためて見るとだいぶ……。"
2000502-42 = "[ns] \"こっちの、フリルの可愛い水着はどう？\""
2000502-43 = "た、確かに可愛いのですが……。"
2000502-44 = "なんだかこう、よくトリニティの生徒が着てそうなデザインと言いますか……。"
2000502-45 = "私はただでさえ地味なので、派手な水着を着た方が良いのかなと……。"
2000502-46 = "[s5] \"ヒフミらしいのが、一番可愛いと思うよ。\"\n[s6] \"派手じゃなくても、ヒフミは普段からすっごく可愛いよ。\""
2000502-47 = "せ、先生がそこまで言ってくれるのでしたら……。"
2000502-48 = "せ、先生がそこまで言ってくれるのでしたら……。"
2000502-49 = "では……やっぱり可愛いですし、先生おススメのこの水着にしようかと思います。"
2000502-50 = "ちょっと試着してみますので、待っててもらえますか？"
2000502-55 = "え、えっと……。"
2000502-56 = "い、いかがでしょう……？"
2000502-57 = "[s7] \"完璧！最高！可愛い！この夏はもうヒフミのもの！\"\n[s8] \"すっごく似合ってる！\""
2000502-58 = "そ、そこまで言っていただけると照れちゃいますね……。"
2000502-59 = "そ、そこまで言っていただけると照れちゃいますね……。"
2000502-60 = "そんなに派手ではないかもしれませんが……先生が喜んでくださって、少し自信が湧いてきました。"
2000502-61 = "……今から、海に行く日が待ち遠しいです！"
2000502-63 = "その後、水着を買ったヒフミと一緒に学校へ戻った。"
