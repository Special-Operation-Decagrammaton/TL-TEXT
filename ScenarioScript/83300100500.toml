[translation]
83300100500-6 = "聞きたいことがあるんだけど……"
83300100500-7 = "あっ、はい！"
83300100500-8 = "委員長、お疲れ様です！何でも仰ってください！"
83300100500-9 = "命令じゃないから、そんな気負わないで。"
83300100500-10 = "私が戻ってくる前よりも、騒がしいような気がして。"
83300100500-11 = "も、も、申し訳ございません！すぐに対処します！"
83300100500-12 = "いや、まだ対処してほしいとは一言も……"
83300100500-13 = "耐寒訓練を終えたばかりだというのに、ゲヘナのパーティーが開催されると聞いて浮かれているだなんて……"
83300100500-14 = "風紀委員としての自覚が足りていませんでした！申し訳ございません！"
83300100500-15 = "ゲヘナのパーティー……？"
83300100500-16 = "委員長……！"
83300100500-17 = "アコ、何か分かったの？"
83300100500-18 = "生徒たちに聞いてみたところ、どうやら私たちが留守にしている間に……"
83300100500-19 = "万魔殿がバレンタインデーにパーティーを開催するという知らせを出したようです！"
83300100500-20 = "やっぱりそうなのね。私も今この子から聞いたところよ。"
83300100500-21 = "そういえば、去年も同じ時期にパーティーを開いていたような。"
83300100500-22 = "でも、何だか今年は慌ただしい感じがする……もう少し情報が欲しい。"
83300100500-23 = "あっ……たしか「ゲヘナのパーティー」で給食部がなにかしているそうです！"
83300100500-24 = "給食部が……？"
83300100500-25 = "分かった、私はこのまま給食部に向かう。"
83300100500-26 = "アコは、この辺りでもう少し情報を集めておいて。"
83300100500-27 = "はい！お任せください！"
