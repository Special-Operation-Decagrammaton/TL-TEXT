[translation]
10023080-1 = "第8話;あくまで臨時ですから。肝に銘じてください"
10023080-5 = "……先生、なにか心配事でも？"
10023080-6 = "[s] \"ううん、大丈夫だよ。トキはどう？\""
10023080-7 = "私も……特に問題はありません。"
10023080-8 = "[s] \"ごめんね、急な事だし混乱してるよね……？\""
10023080-12 = "……先生には、隠そうとしても無駄ですね。"
10023080-13 = "正直に言うと、まだ気持ちの整理がついていません。"
10023080-14 = "もう！それは私たちも一緒だよ！"
10023080-15 = "……騒がしいモモイが来ましたね。"
10023080-16 = "騒がしいモモイって何！？"
10023080-17 = "ちなみに、他は「代表のミドリ」、「静かなユズ」、「可愛いアリス」です。"
10023080-18 = "どうして私だけイジられてるの！？"
10023080-19 = "先生、何とか言ってよ！"
10023080-23 = "[ns] \"な、仲良くしようね……。\""
10023080-25 = "お姉ちゃんの言う事も分かります……急に同盟、だなんて。"
10023080-26 = "わたしたち……どうしたらいいんでしょうか……？"
10023080-28 = "決まっています！敵を倒して、勇者の道を進むのです！"
10023080-29 = "でもアリスちゃん……この場合は、誰が敵、なのかな……？"
10023080-30 = "え……？"
10023080-31 = "それは……それ、は……"
10023080-32 = "うわぁーん、頭が混乱しました。#nユズ、SOSです！"
10023080-39 = "私に提案があります。#n先生とゲーム開発部は、この件から手を引いてください。"
10023080-46 = "[ns] \"……トキ？\""
10023080-47 = "トキは……どうするんですか？"
10023080-48 = "先生が同盟の話を切り出した時は、多少驚きましたが――"
10023080-49 = "これは、私の任務ですので。#n盗品の数々は、私が責任を持って回収いたします。"
10023080-50 = "[s] \"それは……トキ一人でやるつもり？\""
10023080-51 = "はい。そもそも、皆さんが巻き込まれたのは、[ruby=どうだめいたろう]銅田明太郎[/ruby]がモモイをC&Cと間違えた事に起因します。ミドリの事もありますし、このまま関わり続ければ、さらに怪我をする怖れがあるでしょう。"
10023080-53 = "トキさんは、どう解決するつもり……ですか？"
10023080-55 = "……状況に応じてではありますが、#n「慈愛の怪盗」と協力してオークションを中止にする事も視野に入れております。"
10023080-56 = "その場合は、「慈愛の怪盗」よりも先に「時計王の冠」を回収し、#nヴァルキューレに届ければ任務は達成されるかと。"
10023080-57 = "そして、銅田とこのような事になってしまっては、皆さんはもう依頼を遂行する必要がありません。先生も同じくです。"
10023080-58 = "なので皆さんは、先生と一緒にお帰りください。"
10023080-59 = "私からは以上です。"
10023080-65 = "いいえ、アリスたちは帰りません。"
10023080-66 = "何故……？"
10023080-67 = "トキは仲間ですから！"
10023080-68 = "ゲーム開発部は、絶対に仲間を一人にしません！"
10023080-70 = "う、うん……こんな状況になっちゃったけど……"
10023080-71 = "お姉ちゃんのせいで巻き込まれたのがきっかけだけど……"
10023080-72 = "妹よ、今はその話をしなくても良いんじゃ……"
10023080-73 = "とにかく！"
10023080-74 = "トキ一人に全部任せて逃げ出すわけにはいかないよ！"
10023080-75 = "――今は私たちもC&Cだから！"
10023080-77 = "そんな理由で……？"
10023080-78 = "理由は単純で良いのだと、アリスは学びました。"
10023080-79 = "それとも……アリスはトキの仲間では無いのですか？"
10023080-80 = "い、いえ……そういうわけでは……#nただ、仲間というものに慣れていないと言いますか、初めての事なので……"
10023080-81 = "なら問題ありません！アリスはトキを手伝いたいです！"
10023080-83 = "そうだね、アリスに賛成だよ。"
10023080-84 = "うん。アリスちゃんなら、そう言うと思ってた……"
10023080-86 = "ふふ、どうやら方針が決まったようですね？"
10023080-95 = "銅田は決して甘くありません。#n既に事態を収拾し、オークションを再開しているようです。"
10023080-96 = "その上[ruby=わたくし]、私た[/ruby]ちが屋敷を出てから、すぐに警備を増員する抜かりの無さ――"
10023080-97 = "それらから総合的に判断して……#n「時計王の冠」がオークションにかけられるのは時計の針が12時を指す頃かと。"
10023080-98 = "ええ――私たちの行方を掴めていないのであれば、#nそろそろ手放そうとする頃合いでしょうから。"
10023080-99 = "[s] \"すんなりと教えてくれるんだね。\""
10023080-100 = "おや、同盟を結ぼうと仰ったのは、先生ではなくて？"
10023080-101 = "[s] \"それじゃあ、2つ質問しても良い？\""
10023080-102 = "ふむ――2つだけで良いのですか？"
10023080-103 = "まぁもっとも、全てに答える義理はないですけれど。ふふっ。"
10023080-107 = "[ns] \"まずは、予告状の最後の一文について。\""
10023080-108 = "「一度も授与された事の無い、贅沢であるが不遇な剣のもとへ」。"
10023080-109 = "これを読んで……私たちは、剣が描かれてる絵を奪いに来ると思ってたの。"
10023080-110 = "嗚呼、なるほど。#n――剣は権威の象徴。王冠は言わずもがな、権威そのもの。"
10023080-111 = "この屋敷で最も貴重な美術品――#nそれが何かを知っていれば、謎は簡単に解けるようになっていたのですよ。"
10023080-112 = "でも、私たちは「時計王の冠」の名前すら知らなくて……"
10023080-113 = "その通り。それ故に、お嬢さん方には決して解けない予告状となっていた。"
10023080-114 = "もしも、その場で銅田が全てを明かしていれば――#n話は変わっていたでしょうけれど。"
10023080-115 = "[s] \"つまり、最初から私たちは利用されて……\""
10023080-116 = "ふふ、その通りです。"
10023080-117 = "銅田は今にも気付く事でしょう――#n世の中が全て自分の思い通りに進むなど、あり得ない事なのだと。"
10023080-118 = "さて、次の質問は？"
10023080-119 = "[s] \"なぜ君は、こんな危険な事を？\""
10023080-120 = "ふふ、そうですね――"
10023080-121 = "それが世のため人のためになるから、といえば良いでしょうか？"
10023080-123 = "みんなのために……美術品を盗んでいる、という事ですか？"
10023080-125 = "嗚呼、素晴らしい。その通りですよお嬢さん。#n美術品とは、人の目に触れてこそ価値を成すものですからね。"
10023080-126 = "美術品が有す魅力に触れるのは、全ての者に等しく与えられる権利。……ですが、このまま銅田を放置すれば、「時計王の冠」は再び表舞台からその姿を消してしまう。"
10023080-131 = "もちろん、いつの日か再びブラックマーケットに流れる日が来るかもしれない。#nだが……そうなった暁には、どうなってしまう事か。"
10023080-132 = "突如として裏世界に現れた名高い美術品。先ほどのゲストたちの反応を見れば、噂だけでも大きな騒ぎに繋がると容易に想像できるでしょう？"
10023080-133 = "……騒ぎが混乱を起こし、混乱が紛争を生む。#nだからこそ、そうなる前に奪うのですよ。"
10023080-134 = "[s] \"それなら……奪った美術品はヴァルキューレに？\""
10023080-135 = "おやおや、私にヴァルキューレを信じろと？#n[ruby=わたくし]七囚人[/ruby]たちを容易く逃がしてしまうような蕾たちですよ？"
10023080-136 = "答えは単純明快。私が手元で管理いたします。#n世界が美術品の価値を理解し、真の美学に目覚める、その日まで――"
10023080-137 = "[s] \"結局、自分の物にするんだ……\""
10023080-143 = "さて、お望みの答えは得られましたか？"
10023080-144 = "私の話を聞いた上で、お嬢さん方の答えをお聞かせ願えますか？"
10023080-148 = "……先生の提案を受け入れます。"
10023080-149 = "おや？"
10023080-150 = "C&Cとして、盗品の回収任務を引き受けた以上、私は作戦を成功させます。#n不本意ですが、臨時の同盟を受け入れる方が妥当と判断しました。"
10023080-151 = "皆さんは……"
10023080-153 = "私たちもトキに協力するよ！"
10023080-154 = "はい、もちろんです。"
10023080-156 = "わ、わたし達は……"
10023080-158 = "[ruby=パーティー]仲間[/ruby]ですから！"
10023080-163 = "皆さん……"
10023080-164 = "……ふふっ。それがお嬢さん方の美学、なのですね。"
10023080-165 = "――良いでしょう。"
10023080-166 = "それでは……具体的な作戦を立てるとしましょうか。"
