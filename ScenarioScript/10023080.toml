[translation]
10023080-1 = "Episódio 8; É apenas temporário. Por favor, grave isso na sua mente."
10023080-5 = "……Sensei, há algo que o preocupa?"
10023080-6 = "[s] \"Não, está tudo bem. E você, Toki?\""
10023080-7 = "Eu também…… não tenho problemas em particular."
10023080-8 = "[s] \"Desculpe, é algo repentino e vocês devem estar confusas……?\""
10023080-12 = "……É inútil tentar esconder algo do Sensei."
10023080-13 = "Para ser sincera, ainda não consegui organizar meus sentimentos."
10023080-14 = "Ah! Isso vale para nós também!"
10023080-15 = "……A barulhenta Momoi chegou."
10023080-16 = "Como assim, 'barulhenta Momoi'!?"
10023080-17 = "Aliás, as outras são a 'representante Midori', a 'quieta Yuzu' e a 'fofa Alice'."
10023080-18 = "Por que só eu estou sendo zoada!?"
10023080-19 = "Sensei, diga alguma coisa!"
10023080-23 = "[ns] \"V-vamos nos dar bem…….\""
10023080-25 = "Eu entendo o que a minha irmã quer dizer…… falar de uma aliança de repente."
10023080-26 = "Nós…… o que devemos fazer……?"
10023080-28 = "Já está decidido! Vamos derrotar os inimigos e seguir o caminho do herói!"
10023080-29 = "Mas Alice-chan…… neste caso, quem seria o inimigo……?"
10023080-30 = "Eh……?"
10023080-31 = "Isso é…… isso, é……"
10023080-32 = "Uwaaa, minha cabeça deu um nó. #nYuzu, SOS!"
10023080-39 = "Eu tenho uma proposta. #nSensei e o Departamento de Desenvolvimento de Jogos, por favor, retirem-se deste caso."
10023080-46 = "[ns] \"……Toki?\""
10023080-47 = "O que você…… vai fazer, Toki?"
10023080-48 = "Fiquei um pouco surpresa quando o Sensei propôs a aliança, mas――"
10023080-49 = "Esta é a minha missão. #nRecuperarei os itens roubados assumindo total responsabilidade."
10023080-50 = "[s] \"Isso…… você pretende fazer tudo sozinha, Toki?\""
10023080-51 = "Sim. Para começar, o fato de vocês terem sido envolvidas se deve a Akitaro Doda ter confundido a Momoi com a C&C. Há também o caso da Midori, e se continuarem envolvidas, há o risco de se machucarem ainda mais."
10023080-53 = "Toki-san, como você pretende resolver…… isso?"
10023080-55 = "……Depende da situação, mas #nestou considerando cooperar com o 'Ladrão da Benevolência' para cancelar o leilão."
10023080-56 = "Nesse caso, se eu recuperar a 'Coroa do Rei Relojoeiro' antes do 'Ladrão da Benevolência' #ne entregá-la à Valkyrie, a missão estará cumprida."
10023080-57 = "E, com as coisas tendo chegado a esse ponto com Doda, vocês não precisam mais cumprir o pedido. O mesmo vale para o Sensei."
10023080-58 = "Portanto, por favor, voltem para casa com o Sensei."
10023080-59 = "É só isso da minha parte."
10023080-65 = "Não, a Alice e as outras não vão voltar."
10023080-66 = "Por que……?"
10023080-67 = "Porque a Toki é nossa companheira!"
10023080-68 = "O Departamento de Desenvolvimento de Jogos nunca deixa um companheiro para trás!"
10023080-70 = "S-sim…… embora tenhamos acabado nessa situação……"
10023080-71 = "Embora tudo tenha começado porque fomos envolvidas por causa da minha irmã……"
10023080-72 = "Irmãzinha, acho que não precisa mencionar isso agora……"
10023080-73 = "De qualquer forma!"
10023080-74 = "Não podemos deixar tudo nas mãos da Toki e fugir!"
10023080-75 = "――Agora nós também somos da C&C!"
10023080-77 = "Por esse motivo……?"
10023080-78 = "A Alice aprendeu que motivos podem ser simples."
10023080-79 = "Ou será que…… a Alice não é uma companheira da Toki?"
10023080-80 = "N-não…… não é isso…… #nÉ só que, não estou acostumada com a ideia de ter companheiros, é a primeira vez, então……"
10023080-81 = "Então não há problema! A Alice quer ajudar a Toki!"
10023080-83 = "É isso aí, concordo com a Alice."
10023080-84 = "Sim. Eu sabia que a Alice diria isso..."
10023080-86 = "Fufu, parece que o plano de ação foi decidido, não é?"
10023080-95 = "Doda não é nada ingênuo. #nEle já controlou a situação e parece ter reiniciado o leilão."
10023080-96 = "Além disso, ele não foi nada descuidado, aumentando a segurança imediatamente após sairmos da mansão—"
10023080-97 = "Julgando por tudo isso... #nCreio que a 'Coroa do Rei Relojoeiro' será leiloada quando os ponteiros do relógio marcarem 12 horas."
10023080-98 = "Sim— se eles não conseguiram nos rastrear, esse é o momento ideal para tentar se livrar dela."
10023080-99 = "[s] \"Você está nos contando isso com muita facilidade.\""
10023080-100 = "Ora, não foi o Sensei quem sugeriu formarmos uma aliança?"
10023080-101 = "[s] \"Então, posso fazer duas perguntas?\""
10023080-102 = "Hum— apenas duas?"
10023080-103 = "Bem, embora eu não tenha a obrigação de responder a tudo. Fufu."
10023080-107 = "[ns] \"Primeiro, sobre a última frase da carta de aviso.\""
10023080-108 = "'Para a espada luxuosa, porém infeliz, que nunca foi concedida'."
10023080-109 = "Lendo isso... nós achamos que você viria roubar uma pintura que retratava uma espada."
10023080-110 = "Ah, entendo. #n—A espada é um símbolo de autoridade. A coroa, nem preciso dizer, é a própria autoridade."
10023080-111 = "A obra de arte mais valiosa desta mansão— #nse você soubesse o que era, o mistério seria facilmente resolvido."
10023080-112 = "Mas nós nem sabíamos o nome 'Coroa do Rei Relojoeiro'..."
10023080-113 = "Exatamente. Por isso, a carta de aviso era impossível de ser decifrada por vocês."
10023080-114 = "Se Doda tivesse revelado tudo naquele momento— #na história teria sido diferente, é claro."
10023080-115 = "[s] \"Ou seja, fomos usadas desde o início...\""
10023080-116 = "Fufu, exatamente."
10023080-117 = "Doda logo perceberá— #nque é impossível que o mundo siga exatamente como ele deseja."
10023080-118 = "Bem, qual é a próxima pergunta?"
10023080-119 = "[s] \"Por que você está fazendo algo tão perigoso?\""
10023080-120 = "Fufu, vejamos—"
10023080-121 = "Seria correto dizer que é pelo bem do mundo e das pessoas?"
10023080-123 = "Você quer dizer que... está roubando obras de arte por causa de todos?"
10023080-125 = "Ah, maravilhoso. Exatamente, senhorita. #nObras de arte só possuem valor quando são vistas pelas pessoas."
10023080-126 = "O direito de apreciar o charme das obras de arte deve ser igual para todos. ...Mas, se deixarmos Doda em paz, a 'Coroa do Rei Relojoeiro' desaparecerá novamente do cenário público."
10023080-131 = "Claro, talvez um dia ela volte a circular no mercado negro. #nMas... quando isso acontecer, quem sabe o que poderá ocorrer?"
10023080-132 = "Uma obra de arte renomada que surgiu repentinamente no submundo. Vendo a reação dos convidados de agora há pouco, é fácil imaginar que apenas os rumores causariam um grande alvoroço, não é?"
10023080-133 = "...O alvoroço causa confusão, e a confusão gera conflitos. #nÉ por isso que eu a roubo antes que isso aconteça."
10023080-134 = "[s] \"Nesse caso... as obras roubadas vão para a Valkyrie?\""
10023080-135 = "Ora, ora, você quer que eu confie na Valkyrie? #nEles são uns novatos que deixam os Sete Prisioneiros escaparem facilmente, não são?"
10023080-136 = "A resposta é simples e clara. Eu mesma cuidarei delas. #nAté o dia em que o mundo entender o valor da arte e despertar para a verdadeira estética—"
10023080-137 = "[s] \"No fim das contas, você vai ficar com elas...\""
10023080-143 = "Bem, obteve as respostas que queria?"
10023080-144 = "Depois de ouvir o que eu disse, poderia me dar a resposta de vocês?"
10023080-148 = "...Eu aceito a proposta do Sensei."
10023080-149 = "Oh?"
10023080-150 = "Como C&C, já que aceitei a missão de recuperar os itens roubados, vou concluir a operação. #nEmbora não seja do meu agrado, julguei que aceitar uma aliança temporária é o mais adequado."
10023080-151 = "E vocês..."
10023080-153 = "Nós também vamos cooperar com a Toki!"
10023080-154 = "Sim, com certeza."
10023080-156 = "N-nós..."
10023080-158 = "Somos companheiras, afinal!"
10023080-163 = "Pessoal..."
10023080-164 = "...Fufu. Essa é a estética de vocês, então."
10023080-165 = "—Muito bem."
10023080-166 = "Então... vamos elaborar o plano concreto."
