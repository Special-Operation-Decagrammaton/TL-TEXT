[translation]
2600306-1 = "その手のひらに"
2600306-2 = "（万全な準備をして、公園へとやってきた）"
2600306-3 = "（公園の隅の方、人けの少ない場所へ向かい、持ってきたものを並べる）"
2600306-4 = "（あとは……）"
2600306-8 = "[ns1] \"ううっ、痛い、辛い、死にそう……。\"\n[ns2] \"ぐっ！お腹が腹痛で痛い！\""
2600306-13 = "……スッ"
2600306-15 = "ガサガサッ、スススススッ……！"
2600306-21 = "どうされたんですか、先生！"
2600306-22 = "また無茶をされたのですか……！？"
2600306-23 = "ですがご安心ください！"
2600306-24 = "私がいつでもどこでもこうして……！"
2600306-28 = "……？"
2600306-29 = "……先生？"
2600306-30 = "[s3] \"作戦成功！\"\n[s4] \"ごめんね、びっくりした？\""
2600306-31 = "え……？こ、これは、いったいどういう……？"
2600306-32 = "え……？こ、これは、いったいどういう……？"
2600306-33 = "レジャーシートにサンドイッチ、ジュースまで……？"
2600306-34 = "先生、どういうことですか？具合が悪かったのでは……？"
2600306-35 = "……はい？"
2600306-36 = "とりあえず座って……ですか？"
2600306-37 = "あ、はい、それでは……。"
2600306-42 = "……え？何ですか？"
2600306-43 = "……私のため、ですか？"
2600306-44 = "こ、これ全部、私のために……？"
2600306-45 = "ど、どうしてですか……！？"
2600306-46 = "どうしてこんな、いきなり……？"
2600306-47 = "[s5] \"いつもたくさんお世話になってるから。\"\n[s6] \"セリナはいつも、みんなのために頑張ってるから。\""
2600306-51 = "……え、と。"
2600306-52 = "すみません、その……。"
2600306-53 = "こういう時は、え、えっと……。"
2600306-57 = "……ふふっ。"
2600306-58 = "ふふふっ、あははっ……！"
2600306-59 = "[s] \"せ、セリナ？\""
2600306-60 = "……ふふっ、すみません。"
2600306-69 = "[wa:500]― 全く、[wa:1300]先生ったら……。"
2600306-71 = "― 本当に、[wa:1000]びっくりしました……。"
2600306-74 = "[wa:600]― ……不思議な感じがします。"
2600306-76 = "― こういうことをしてもらったのは初めてで、"
2600306-79 = "― 何だかちょっと[wa:1550]戸惑ってしまって……。[wa:350] "
2600306-82 = "[wa:800]― 本当に……。"
2600306-84 = "― ……こんな方に出会ったのは、[wa:2000]初めてです。"
2600306-87 = "[wa:550]― すみません、[wa:950]ちょっと[wa:500]混乱してしまったのですが……"
2600306-89 = "[wa:50]― ありがとうございます、[wa:1500]とっても[wa:1050]嬉しいです……！[wa:300] "
2600306-92 = "[wa:500]― ……先生のおかげです。"
2600306-94 = "― ……先生のおかげなんです、[wa:2400]この気持ちは。"
2600306-97 = "（その後、セリナと一緒に楽しくお話をしながら食事をした）"
2600306-98 = "（帰る時も、セリナはすっと消えるようにどこかへと行ってしまった。その辺については、やはり何も聞かない方が吉なのかもしれない）"
2600306-103 = "セリナはこれからも、いつでもどこにでも現れますよ！"
