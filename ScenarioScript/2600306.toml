[translation]
2600306-1 = "Naquela palma da mão"
2600306-2 = "（Com tudo preparado, cheguei ao parque.）"
2600306-3 = "（Fui até um canto do parque, um lugar com pouca gente, e arrumei as coisas que trouxe.）"
2600306-4 = "（Agora só falta...）"
2600306-8 = "[ns1] \"Ugh, dói, que agonia, sinto que vou morrer...\"\n[ns2] \"Argh! Minha barriga, que dor terrível!\""
2600306-13 = "……Vupt"
2600306-15 = "Sussurro, vulto, vulto, vulto……！"
2600306-21 = "O que houve, Sensei?!"
2600306-22 = "Você fez algo imprudente de novo……!?"
2600306-23 = "Mas não se preocupe!"
2600306-24 = "Eu estou aqui, a qualquer hora e em qualquer lugar……!"
2600306-28 = "……?"
2600306-29 = "……Sensei?"
2600306-30 = "[s3] \"Missão cumprida!\"\n[s4] \"Desculpe, te assustei?\""
2600306-31 = "Eh……? I-isso, o que significa……?"
2600306-32 = "Eh……? I-isso, o que significa……?"
2600306-33 = "Uma toalha de piquenique, sanduíches, e até suco……?"
2600306-34 = "Sensei, o que é tudo isso? Você não estava passando mal……?"
2600306-35 = "……Sim?"
2600306-36 = "Para eu me sentar…… primeiro?"
2600306-37 = "Ah, sim, então……."
2600306-42 = "……Eh? O que foi?"
2600306-43 = "……Para mim, você diz?"
2600306-44 = "I-isso tudo, para mim……?"
2600306-45 = "P-por que……!?"
2600306-46 = "Por que de repente, desse jeito……?"
2600306-47 = "[s5] \"Porque você sempre cuida muito de mim.\"\n[s6] \"Porque a Serina sempre se esforça por todos.\""
2600306-51 = "……Eh, bem."
2600306-52 = "Desculpe, é que……."
2600306-53 = "Nessas horas, eh, bem……."
2600306-57 = "……Fufu."
2600306-58 = "Fufufu, ahaha……!"
2600306-59 = "[s] \"S-Serina?\""
2600306-60 = "……Fufu, desculpe."
2600306-69 = "[wa:500]— Sério, [wa:1300] Sensei……."
2600306-71 = "— Eu realmente [wa:1000] me surpreendi……."
2600306-74 = "[wa:600]— ……É uma sensação estranha."
2600306-76 = "— É a primeira vez que alguém faz algo assim por mim,"
2600306-79 = "— E eu acabei ficando um pouco [wa:1550] confusa…….[wa:350] "
2600306-82 = "[wa:800]— Sério……."
2600306-84 = "— ……É a [wa:2000] primeira vez que conheço alguém como você."
2600306-87 = "[wa:550]— Desculpe, [wa:950] eu fiquei um pouco [wa:500] confusa, mas……"
2600306-89 = "[wa:50]— Obrigada, [wa:1500] estou muito [wa:1050] feliz……![wa:300] "
2600306-92 = "[wa:500]— ……É graças ao Sensei."
2600306-94 = "— ……É graças ao Sensei, [wa:2400] que sinto isso."
2600306-97 = "（Depois disso, comemos enquanto conversávamos alegremente com a Serina）"
2600306-98 = "（Na hora de ir embora, a Serina desapareceu como se tivesse sumido no ar. Talvez seja melhor não perguntar nada sobre isso）"
2600306-103 = "A Serina continuará aparecendo a qualquer hora e em qualquer lugar!"
