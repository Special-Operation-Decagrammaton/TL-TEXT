[translation]
10010085-1 = "第8話;少し似た人たち（２）"
10010085-7 = "あ、あれですね。救護騎士団の……！"
10010085-8 = "……あれ？"
10010085-9 = "そういえば先生、今さらですが……どうして救護騎士団の本館ではなく、こちらの別館に……？"
10010085-10 = "何か理由でもありましたか？"
10010085-14 = "……あ、お知り合いの方がこちらに？"
10010085-15 = "すっごく話が早い方……？"
10010085-16 = "[s1] \"多分そろそろ来ると思う。\"\n[s2] \"気が利くっていうか……うん、そんな感じ。\""
10010085-17 = "それはどういう……？"
10010085-18 = "それはどういう……？"
10010085-19 = "お久しぶりです、先生。お待ちしてました。"
10010085-20 = "あれ、どこから……？"
10010085-24 = "ふふっ。こうしてお会いするのもそうですし、先生の方から来ていただくのは本当に久しぶりな気がしますね。何だか嬉しいです。"
10010085-25 = "あ、こんにちは、ヒナタさん。お会いできて嬉しいです。"
10010085-26 = "こ、こんにちは！こちらこそです……！"
10010085-27 = "……あれ？どうして私のお名前を……？"
10010085-28 = "先ほど先生が仰っていた、救護騎士団の方ですよね？おそらくお会いしたことは無いと思うのですが……。"
10010085-29 = "……あっ、いえ、失礼しました。"
10010085-30 = "とにかく用件をお話しないとですね。あらためて一応、ヒナタです。今日はその――"
10010085-31 = "はい、用件は存じています。ちょうどお越しになる頃かと思ってましたし。"
10010085-32 = "……え？"
10010085-34 = "急いでるんですよね、こちらへどうぞ。"
10010085-40 = "えっと、先生……？"
10010085-41 = "先に連絡をしておいてくださった、ということでしょうか……？"
10010085-42 = "[s3] \"……そう思ってもらった方が、今は話が速いかも。\"\n[s4] \"話すと長くなりそうだから、後で説明するね。\""
10010085-43 = "そ、そう思ってもらった方が……？"
10010085-44 = "え、っと……。"
10010085-45 = "……？"
10010085-52 = "「精聖薬」ですよね、確かに救護騎士団が普段から保有しているものです。"
10010085-53 = "今はあまり使われていないものなので、倉庫から出さないといけなくって。"
10010085-54 = "普段であれば、色々と手続きや承認が必要なのですが……。"
10010085-55 = "今回は時間が無いことですし、こっそり持ち出しちゃいましょう。報告書については何とかしておきますので。"
10010085-60 = "えっと……あ、2本ぐらいで足りますよね？ヒナタさん？"
10010085-61 = "は、はい……！"
10010085-62 = "えっと、先生……？"
10010085-63 = "本数の話も、すでに……？"
10010085-64 = "[s5] \"そうじゃないけど、そのうち慣れると思う。\"\n[s6] \"すごく準備の良い、優しい子でね。”"
10010085-65 = "そ、そうでしたか……すごい方ですね……。"
10010085-66 = "そ、そうでしたか……すごい方ですね……。"
10010085-74 = "確か、あっちの壁に……。"
10010085-80 = "……あら？"
10010085-81 = "すみません、何やら連絡が……。"
10010085-85 = "……はい、はい。あ、今すぐですか？"
10010085-86 = "えーっと……いえ、大丈夫だと思います。はい、承知しました。"
10010085-90 = "えっと、実はその……。"
10010085-91 = "先生、すみません……。"
10010085-92 = "[s7] \"大丈夫、行ってきてあげて。\"\n[s8] \"ここまでありがとね、助かった。\""
10010085-93 = "はい、ありがとうございます。"
10010085-94 = "はい、ありがとうございます。"
10010085-95 = "ヒナタさんもすみません。最後までご一緒したかったのですが、急に患者さんが殺到したようで……。"
10010085-96 = "な、何かあったんですか……？"
10010085-97 = "ああ、いえ。今週は正義実現委員会の定期巡回がありまして。"
10010085-98 = "いつも通り、郊外の方まであちこちを回っているようなのですが……。"
10010085-99 = "その過程でまあ、色々あったようでして。"
10010085-100 = "な、なるほど……。"
10010085-101 = "それは大変そうですね、人手も不足しそうですし……。"
10010085-102 = "はい……ここは別館ということもあって、あまり救護騎士団のメンバーも来ていなくって。"
10010085-103 = "特に今のこの時間帯は、対応できるのが私だけなので……。"
10010085-104 = "えっ！？ということはお一人で、この病棟の患者さん全員を……！？"
10010085-105 = "はい。それで場合によっては時々、少し患者さん一人ひとりへのカバーが少々足りなくなってしまうこともあるのですが……。"
10010085-106 = "ですが、やむを得ないことですので。とにかく私は、私にできることをするだけです。私ひとりにやれることには、限界があるとしても。"
10010085-108 = "……！"
10010085-109 = "そんな状況でして、すみません。少し席を外しますね。"
10010085-110 = "できるだけ早く戻りますので。"
10010085-119 = "……。"
10010085-120 = "あ、あの……。"
10010085-121 = "えっと、先生、その……じ、時間がないのは分かっているんです。ですが、それでも私は……！"
10010085-122 = "[s9] \"手伝いに行く？\"\n[s10] \"大丈夫、こっちは私が探しておくから。\""
10010085-123 = "……！"
10010085-124 = "……！"
10010085-125 = "あ、ありがとうございます！行ってきます！"
10010085-132 = "あ、ヒナタさん。"
10010085-136 = "お手伝いいただけるんですね、ありがとうございます。お忙しい中すみません……。"
10010085-137 = "えっと、私まだ何も話してませんが……いえ、お手伝いはさせていただきたいものの……。"
10010085-139 = "（……）"
10010085-140 = "[ns] ふたりを見届けてから、例の薬を探す。"
10010085-144 = "（その後問題なく薬を見つけた頃、二人が帰ってきた）"
10010085-151 = "（困ってる人を放っておけない二人は、どちらも先ほどより明るい顔で戻ってきた）"
