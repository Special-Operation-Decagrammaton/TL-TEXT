[translation]
10010085-1 = "Episódio 8; Pessoas um pouco parecidas (2)"
10010085-7 = "Ah, é aquilo. Da Equipe de Socorro...!"
10010085-8 = "……Ué?"
10010085-9 = "Falando nisso, Sensei, pode parecer um pouco tarde para perguntar, mas... por que viemos a este anexo em vez do prédio principal da Equipe de Socorro...?"
10010085-10 = "Houve algum motivo específico?"
10010085-14 = "……Ah, você conhece alguém que está aqui?"
10010085-15 = "Alguém que entende as coisas muito rápido...?"
10010085-16 = "[s1] \"Acho que ela deve chegar logo.\"\n[s2] \"Digamos que ela é muito prestativa... é, algo assim.\""
10010085-17 = "O que você quer dizer com isso...?"
10010085-18 = "O que você quer dizer com isso...?"
10010085-19 = "Há quanto tempo, Sensei. Estava esperando por você."
10010085-20 = "Ué, de onde você...?"
10010085-24 = "Fufu. É raro nos encontrarmos assim, e sinto que faz muito tempo desde a última vez que você veio nos visitar, Sensei. De alguma forma, estou feliz."
10010085-25 = "Ah, olá, Hinata-san. Fico feliz em vê-la."
10010085-26 = "O-olá! O prazer é todo meu...!"
10010085-27 = "……Ué? Como você sabe o meu nome...?"
10010085-28 = "Você é da Equipe de Socorro, como o Sensei mencionou antes, certo? Mas acho que nunca nos conhecemos..."
10010085-29 = "……Ah, não, peço desculpas."
10010085-30 = "De qualquer forma, preciso falar sobre o assunto. Mais uma vez, prazer, sou a Hinata. Hoje, sobre isso..."
10010085-31 = "Sim, eu já estou ciente do assunto. Imaginei que você chegaria por volta desta hora."
10010085-32 = "……Eh?"
10010085-34 = "Você está com pressa, não é? Por aqui, por favor."
10010085-40 = "Hum, Sensei...?"
10010085-41 = "Você quer dizer que já tinha entrado em contato com ela antes...?"
10010085-42 = "[s3] \"...É melhor pensar assim por enquanto, as coisas fluem mais rápido.\"\n[s4] \"É uma história longa, explico depois.\""
10010085-43 = "É-é melhor pensar assim...?"
10010085-44 = "Hum, bem..."
10010085-45 = "……?"
10010085-52 = "O \"Medicamento Sagrado\", certo? É algo que a Equipe de Socorro mantém em estoque regularmente."
10010085-53 = "Como não é muito usado ultimamente, terei que buscá-lo no depósito."
10010085-54 = "Normalmente, seriam necessários vários procedimentos e aprovações, mas..."
10010085-55 = "Como não temos tempo, vamos pegar escondido. Eu dou um jeito no relatório depois."
10010085-60 = "Hum... ah, duas unidades são o suficiente, certo? Hinata-san?"
10010085-61 = "S-sim...!"
10010085-62 = "Hum, Sensei...?"
10010085-63 = "Sobre a quantidade também, você já tinha..."
10010085-64 = "[s5] \"Não é isso, mas você vai se acostumar com o tempo.\"\n[s6] \"Ela é uma garota muito gentil e prevenida.\""
10010085-65 = "E-entendo... que pessoa incrível..."
10010085-66 = "E-entendo... que pessoa incrível..."
10010085-74 = "Se não me engano, naquela parede..."
10010085-80 = "……Oh?"
10010085-81 = "Desculpe, recebi uma mensagem..."
10010085-85 = "……Sim, sim. Ah, agora mesmo?"
10010085-86 = "Hum... não, acho que está tudo bem. Sim, entendido."
10010085-90 = "Hum, na verdade..."
10010085-91 = "Sensei, me desculpe..."
10010085-92 = "[s7] \"Tudo bem, pode ir.\"\n[s8] \"Obrigado por tudo até aqui, você me ajudou muito.\""
10010085-93 = "Sim, muito obrigada."
10010085-94 = "Sim, muito obrigada."
10010085-95 = "Sinto muito também, Sensei. Eu queria ficar com você até o fim, mas parece que muitos pacientes chegaram de repente..."
10010085-96 = "A-aconteceu alguma coisa...?"
10010085-97 = "Ah, não. É que esta semana tem a patrulha regular do Comitê de Justiça."
10010085-98 = "Como sempre, parece que eles estão circulando por toda parte, até os subúrbios..."
10010085-99 = "E, no processo, bem, parece que houve vários problemas."
10010085-100 = "E-entendo..."
10010085-101 = "Isso parece exaustivo, e deve faltar gente também..."
10010085-102 = "Sim... Como aqui é o anexo, quase não vêm membros da Cavalaria de Socorro."
10010085-103 = "Especialmente neste horário, sou a única que pode atender..."
10010085-104 = "Hã!? Isso significa que você está cuidando de todos os pacientes desta ala sozinha...!?"
10010085-105 = "Sim. Por isso, às vezes, acabo não conseguindo dar a atenção necessária a cada um dos pacientes..."
10010085-106 = "Mas é algo inevitável. De qualquer forma, eu só faço o que posso. Mesmo que haja um limite para o que eu, sozinha, consigo realizar."
10010085-108 = "……!"
10010085-109 = "A situação é essa, sinto muito. Vou me ausentar por um momento."
10010085-110 = "Voltarei o mais rápido possível."
10010085-119 = "……."
10010085-120 = "A-ah, com licença..."
10010085-121 = "Bem, Sensei, é que... eu sei que não temos tempo. Mas, ainda assim, eu...!"
10010085-122 = "[s9] \"Quer que eu ajude?\"\n[s10] \"Tudo bem, eu procuro por aqui.\""
10010085-123 = "……!"
10010085-124 = "……!"
10010085-125 = "Ah, muito obrigada! Já estou indo!"
10010085-132 = "Ah, Hinata-san."
10010085-136 = "Você vai nos ajudar? Muito obrigada. Sinto muito por incomodar em um momento tão ocupado..."
10010085-137 = "Bem, eu ainda nem expliquei nada, mas... bem, eu adoraria ajudar, mas..."
10010085-139 = "(...)"
10010085-140 = "[ns] Depois de ver as duas partirem, começo a procurar pelo tal remédio."
10010085-144 = "(Depois de encontrar o remédio sem problemas, as duas retornaram)"
10010085-151 = "(As duas, que não conseguem ignorar alguém em apuros, voltaram com expressões bem mais leves do que antes)"
