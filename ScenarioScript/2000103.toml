[translation]
2000103-1 = "勉強は難しい（１）"
2000103-2 = "図書館"
2000103-3 = "あれ、先生？#nどうして図書館に？"
2000103-4 = "うん？そちらこそ、試験も終わったのに何で来てるのか、って？"
2000103-5 = "えっと……私は追試で……。"
2000103-6 = "[s1] \"追試？赤点ってこと？全部？\"\n[s2] \"カリンは勉強苦手なの？\""
2000103-7 = "……！"
2000103-8 = "……！"
2000103-9 = "ち、違う！"
2000103-10 = "その……成績は……元々良い方ではないけれど。"
2000103-11 = "私も赤点は初めてだから。"
2000103-12 = "はあ、仕方なかったんだ。"
2000103-13 = "C&Cは、普通の部活動とはちょっと違う。"
2000103-14 = "昼は普通のボランティア部員みたいな感じだけど、夜はミレニアムのエージェントにならなきゃいけない。"
2000103-15 = "勉強もしなきゃいけないし、エージェント活動もしなきゃいけないし、#n私の場合はアルバイトも大事だから、身体が三つあっても足りないぐらいだ。"
2000103-16 = "[s] \"アルバイト？\""
2000103-17 = "ああ。金銭的な問題はさておき、私には二つ、夢があるから。"
2000103-18 = "一つは、いつか可愛いカフェの女店主になること。"
2000103-19 = "そのためには、もちろん勉強も大事だけど、色んなお店で経験を積むのも大事なことだから。"
2000103-20 = "でも、どうしても勉強とは仲良くなれな……"
2000103-21 = "あ。"
2000103-22 = "せ、先生。"
2000103-23 = "ちょうど、助けが必要な女子生徒がここにいる。"
2000103-24 = "先生は……先生だろう？"
2000103-25 = "私の勉強を、手伝ってくれないか？"
2000103-26 = "何も家庭教師をして欲しいわけじゃない。ここに、私がまとめておいた問題がある。"
2000103-27 = "ここにある問題の内、いくつかを私に出題してもらう、というのはどう？"
2000103-28 = "[s3] \"私に任せて。\"\n[s4] \"……これ、カリンのスリーサイズに関する問題が無い。\""
2000103-29 = "ありがとう！"
2000103-30 = "そ、そんなのあるわけないだろう！？"
2000103-31 = "……さて、では始めよう！"
2000103-34 = "……。"
2000103-35 = "[s5] \"物価が下落して、経済活動が低迷する現象を何と言う？\"\n[s6] \"三権分立は、立法、司法、あと一つは？\""
2000103-36 = "分かった、「ディストピア」！"
2000103-37 = "……え？デフレーション？うーん……だいたい正解じゃないか？"
2000103-38 = "分かった、憲法！"
2000103-39 = "……え？行政？も、もちろん知ってた。半分は正解みたいなものだな。"
2000103-40 = "さあ、次の問題を出してくれ。"
2000103-41 = "先生の声は、なんだか聞きやすいな。"
2000103-42 = "よく覚えられそうだ。"
2000103-43 = "[s] \"カリンの二つ目の夢って何？\""
2000103-44 = "それは、「良妻賢……っじゃなくて！"
2000103-45 = "そ、それは……えっと、その……ちょっと恥ずかしいから……。"
2000103-46 = "……あ、あとで言うから！さっき言ったのは忘れて！"
2000103-47 = "さあ！次の問題は？"
2000103-48 = "今度こそ、必ず当てる。"
