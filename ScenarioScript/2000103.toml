[translation]
2000103-1 = "Estudar é difícil (1)"
2000103-2 = "Biblioteca"
2000103-3 = "Ué, Sensei?#nO que faz na biblioteca?"
2000103-4 = "Hã? Você pergunta por que eu vim, sendo que as provas já acabaram?"
2000103-5 = "Bem... é que eu estou de recuperação..."
2000103-6 = "[s1] \"Recuperação? Tirou nota vermelha? Em tudo?\"\n[s2] \"Karin, você não é boa nos estudos?\""
2000103-7 = "……！"
2000103-8 = "……！"
2000103-9 = "N-Não é isso!"
2000103-10 = "É que... minhas notas... nunca foram lá essas coisas, para começar."
2000103-11 = "Mas é a primeira vez que pego nota vermelha."
2000103-12 = "Ah, não teve jeito."
2000103-13 = "A C&C não é como um clube comum."
2000103-14 = "Durante o dia, parecemos membros de um clube de voluntariado comum, mas à noite, temos que ser agentes do Millennium."
2000103-15 = "Tenho que estudar, tenho que cumprir as missões de agente e,#nno meu caso, o trabalho de meio período também é importante, então não tenho tempo nem para respirar."
2000103-16 = "[s] \"Trabalho de meio período?\""
2000103-17 = "Ah. Deixando de lado a questão financeira, eu tenho dois sonhos."
2000103-18 = "Um deles é me tornar a dona de um café fofo algum dia."
2000103-19 = "Para isso, claro que estudar é importante, mas ganhar experiência em vários estabelecimentos também é essencial."
2000103-20 = "Mas, por mais que eu tente, não consigo me dar bem com os estudos..."
2000103-21 = "Ah."
2000103-22 = "S-Sensei."
2000103-23 = "Tem uma aluna bem aqui precisando de ajuda."
2000103-24 = "Você é o... Sensei, não é?"
2000103-25 = "Poderia me ajudar com os estudos?"
2000103-26 = "Não estou pedindo para ser meu tutor particular. Eu reuni algumas questões aqui."
2000103-27 = "Que tal você me fazer algumas dessas perguntas?"
2000103-28 = "[s3] \"Deixe comigo.\"\n[s4] \"...Não tem nenhuma pergunta sobre as medidas da Karin aqui.\""
2000103-29 = "Obrigada!"
2000103-30 = "C-Claro que não teria algo assim, né!?"
2000103-31 = "……Bem, então vamos começar!"
2000103-34 = "……."
2000103-35 = "[s5] \"Como se chama o fenômeno em que os preços caem e a atividade econômica estagna?\"\n[s6] \"A separação dos poderes consiste no Legislativo, Judiciário e qual é o outro?\""
2000103-36 = "Já sei, \"Distopia\"!"
2000103-37 = "……Hã? Deflação? Hum... não é quase a mesma coisa?"
2000103-38 = "Já sei, Constituição!"
2000103-39 = "……Hã? Executivo? E-Eu sabia, claro. É como se eu tivesse acertado metade."
2000103-40 = "Vamos, me faça a próxima pergunta."
2000103-41 = "A voz do Sensei é bem fácil de ouvir."
2000103-42 = "Sinto que vou conseguir memorizar tudo."
2000103-43 = "[s] \"Qual é o segundo sonho da Karin?\""
2000103-44 = "Isso é... \"Esposa dedicada...\" não, esquece!"
2000103-45 = "I-Isso é... bem, é que... é um pouco vergonhoso..."
2000103-46 = "……Ah, eu te conto depois! Esqueça o que eu disse!"
2000103-47 = "Vamos! Qual é a próxima pergunta?"
2000103-48 = "Desta vez, eu vou acertar com certeza."
