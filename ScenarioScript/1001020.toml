[translation]
1001020-1 = "備え有れば憂いなし？"
1001020-2 = "アビドス自治区通り"
1001020-3 = "（行政関係の事情で、アビドスを訪れた）"
1001020-11 = "あ、先生。今日はどうしたの？"
1001020-12 = "……アビドスに用事？"
1001020-13 = "ちょうど私も、これから学校に行くところ。"
1001020-14 = "……こんなところで会うとは思わなかったって？"
1001020-15 = "……ん。"
1001020-16 = "……。"
1001020-17 = "偶然、だね。"
1001020-18 = "……。"
1001020-19 = "……うん、偶然。"
1001020-20 = "[s] \"じゃあせっかくだし、学校まで一緒に行こうか。\""
1001020-21 = "ん。"
1001020-26 = "[ns] \"何だか、前のことを思い出すね。\""
1001020-27 = "前の……？"
1001020-28 = "あ……先生が倒れてた時の？"
1001020-29 = "[s] \"うん、シロコのおかげで助かったよ。\""
1001020-30 = "別に、大したことじゃ……。"
1001020-31 = "でも、うん。良かった。"
1001020-32 = "……それ以外にも色々？"
1001020-33 = "それは、うん……。"
1001020-34 = "先生にしてあげられることなら、っていうか……。"
1001020-35 = "……や、何でもない。"
1001020-36 = "自転車で来てるのに歩かせて悪い……？"
1001020-37 = "大丈夫、別に気にしてない。"
1001020-38 = "それにこれ、見た目よりも軽いから。"
1001020-39 = "（シロコと色々な話をしながら、学校へと向かった）"
1001020-47 = "[ns1] \"あれは……？\"\n[ns2] \"何かこっちに向かってきてない！？\""
1001020-50 = "……ああ。"
1001020-51 = "大丈夫、私のドローンだから。"
1001020-55 = "（シロコが慣れた手付きでドローンを回収して、鞄に入れた）"
1001020-56 = "[s] \"何事かと思った……。\""
1001020-57 = "ん。偶然手に入って、少し改造を……。"
1001020-58 = "[s] \"偶然ドローンを……？\""
1001020-59 = "うん、偶然。"
1001020-60 = "どうかした？"
1001020-61 = "[s3] \"な、何でもないです……。\"\n[s4] \"大丈夫、信じてるから……。\""
1001020-64 = "割と、色々使えるんだよ？"
1001020-65 = "ライディング中にGPSをキャッチしたり、撮影用として使ったり。"
1001020-66 = "[s] \"それは良かった……。\""
1001020-68 = "だからさぁ、ちょっとでも良いんだって。"
1001020-69 = "そうそう、何も大金をせびってるんじゃないんだからさぁ！"
1001020-70 = "も、もう本当にギリギリなんです！勘弁してください！"
1001020-71 = "うるせぇな、乾いた雑巾でも絞るんだよ！"
1001020-72 = "も、もう無理です、一滴も出ません……！"
1001020-74 = "……。"
1001020-80 = "（突然シロコがドローンを始動させた）"
1001020-84 = "あ痛たたたたた！？"
1001020-85 = "ど、ドローン？っていうかミサイル！？"
1001020-86 = "に、逃げるぞ！"
1001020-91 = "[ns] \"……撮影用のドローンって話だったのでは？\""
1001020-92 = "それは……。"
1001020-93 = "万が一の時に備えて。"
1001020-94 = "[s] \"そんな「軽くちょろっとね」みたいな言い方でミサイルを……。\""
1001020-95 = "大したことじゃない。"
1001020-97 = "まあまあ、とにかくサインさえくれれば良いからさ！"
1001020-98 = "ほら、うちらを信じてくれよ！"
1001020-99 = "し、信じろって自分から言うやつにろくなのは……。"
1001020-100 = "……。"
1001020-105 = "うわぁっ！？ミサイル！？"
1001020-106 = "おい、早く逃げろ！"
1001020-108 = "だからちょっとエンジンを借りるだけだって、すぐ返すからよ！"
1001020-109 = "まあ返した時の状態は保証できないけどな！"
1001020-110 = "……。"
1001020-116 = "おい、何か飛んできてるぞ！？"
1001020-117 = "ウチらのマシンがーー！？"
1001020-119 = "[ns] \"……撮影用、なんだよね？\""
1001020-120 = "……うん。あくまでミサイルはおまけ。"
1001020-121 = "[s] \"……すごいおまけだね。\""
1001020-122 = "……すごいでしょ。"
1001020-123 = "[s5] \"あの、一応聞いておくんだけど。\"\n[s6] \"そのドローン、あんまり積極的に使い過ぎないようにね……？\""
1001020-126 = "……大丈夫。"
1001020-127 = "あくまで、万が一のためだから。"
1001020-131 = "銀行を襲う時とか。"
1001020-135 = "[ns] \"それがダメなの！！\""
