[translation]
1001020-1 = "Prevenido vale por dois?"
1001020-2 = "Ruas do Distrito Autônomo de Abydos"
1001020-3 = "（Visitando Abydos por questões administrativas）"
1001020-11 = "Ah, Sensei. O que faz aqui hoje?"
1001020-12 = "……Algum assunto em Abydos?"
1001020-13 = "Eu também estava indo para a escola agora mesmo."
1001020-14 = "……Não esperava me encontrar por aqui?"
1001020-15 = "……Hmm."
1001020-16 = "……."
1001020-17 = "É coincidência, né."
1001020-18 = "……."
1001020-19 = "……Sim, coincidência."
1001020-20 = "[s] \"Já que estamos aqui, vamos juntos até a escola?\""
1001020-21 = "Hmm."
1001020-26 = "[ns] \"De certa forma, isso me lembra do que aconteceu antes.\""
1001020-27 = "Antes……?"
1001020-28 = "Ah…… quando o Sensei desmaiou?"
1001020-29 = "[s] \"Sim, graças à Shiroko, eu fui salvo.\""
1001020-30 = "Não foi nada demais……."
1001020-31 = "Mas, sim. Fico feliz."
1001020-32 = "……Além disso, várias outras coisas?"
1001020-33 = "Sobre isso, bem……."
1001020-34 = "É que, se for algo que eu possa fazer pelo Sensei……."
1001020-35 = "……Não, esquece."
1001020-36 = "Desculpe por te fazer andar, mesmo eu estando de bicicleta……?"
1001020-37 = "Está tudo bem, não me importo."
1001020-38 = "Além disso, ela é mais leve do que parece."
1001020-39 = "（Enquanto conversava sobre várias coisas com Shiroko, fomos em direção à escola）"
1001020-47 = "[ns1] \"O que é aquilo……?\"\n[ns2] \"Não tem algo vindo na nossa direção!?\""
1001020-50 = "……Ah, aquilo."
1001020-51 = "Está tudo bem, é o meu drone."
1001020-55 = "（Shiroko recolheu o drone com mãos habilidosas e o guardou na bolsa）"
1001020-56 = "[s] \"Pensei que tinha acontecido alguma coisa…….\""
1001020-57 = "Hmm. Eu consegui por acaso e fiz algumas modificações……."
1001020-58 = "[s] \"Conseguiu um drone por acaso……?\""
1001020-59 = "Sim, por acaso."
1001020-60 = "Algum problema?"
1001020-61 = "[s3] \"N-não, nada não…….\"\n[s4] \"Tudo bem, eu confio em você…….\""
1001020-64 = "Ele é bem útil para várias coisas, sabe?"
1001020-65 = "Captar GPS enquanto pedalo, ou usar para filmagens."
1001020-66 = "[s] \"Que bom, então…….\""
1001020-68 = "Por isso eu disse, nem que seja um pouquinho já ajuda."
1001020-69 = "Isso mesmo, não estamos pedindo uma fortuna nem nada!"
1001020-70 = "J-já estamos no limite! Por favor, tenha piedade!"
1001020-71 = "Cala a boca, espreme até a última gota, nem que seja um pano seco!"
1001020-72 = "N-não dá mais, não sai nem uma gota……!"
1001020-74 = "……."
1001020-80 = "（De repente, Shiroko ativou o drone）"
1001020-84 = "Ai, ai, ai, ai, ai!?"
1001020-85 = "D-drone? Ou melhor, um míssil!?"
1001020-86 = "F-fujam!"
1001020-91 = "[ns] \"……Não era para ser um drone de filmagem?\""
1001020-92 = "Isso é……."
1001020-93 = "É para estar preparada para qualquer eventualidade."
1001020-94 = "[s] \"Você não pode simplesmente usar um míssil falando como se fosse algo 'leve e casual'…….\""
1001020-95 = "Não é nada demais."
1001020-97 = "Bem, bem, de qualquer forma, só preciso que você me dê o autógrafo!"
1001020-98 = "Vamos, confie na gente!"
1001020-99 = "Q-quem pede para ser confiado assim, geralmente não presta……."
1001020-100 = "……."
1001020-105 = "Aaah!? Um míssil!?"
1001020-106 = "Ei, fujam logo!"
1001020-108 = "Eu disse que só ia pegar o motor emprestado, vou devolver logo!"
1001020-109 = "Bem, não garanto em que estado ele vai voltar, mas enfim!"
1001020-110 = "……."
1001020-116 = "Ei, tem algo vindo na nossa direção!?"
1001020-117 = "Nossa máquinaーー!?"
1001020-119 = "[ns] \"……É para filmagem, né?\""
1001020-120 = "……Sim. O míssil é só um extra."
1001020-121 = "[s] \"……Que extra impressionante.\""
1001020-122 = "……Não é incrível?"
1001020-123 = "[s5] \"Ei, só por precaução.\"\n[s6] \"Tente não usar esse drone de forma tão imprudente, tá……?\""
1001020-126 = "……Tudo bem."
1001020-127 = "É só para uma emergência, afinal."
1001020-131 = "Como quando formos assaltar um banco."
1001020-135 = "[ns] \"É EXATAMENTE ISSO QUE NÃO PODE!!\""
