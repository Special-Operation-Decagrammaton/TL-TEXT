2600703-9 = "（返事がない）"
2600703-13 = "う～ん……セリカちゃん……？"
2600703-14 = "先輩たちに言われたの……？"
2600703-15 = "……ごめん……あと5分だけ……。"
2600703-19 = "（………）"
2600703-23 = "……5分だけって……いったでしょ～。"
2600703-24 = "セリカちゃんが起こしてもダメだよ。今日はそう決めたんだから。"
2600703-28 = "セリカちゃん……今日はちょっとしつこいよ。"
2600703-29 = "今日は絶対に外に出ないから……セリカちゃんが諦めて……。"
2600703-33 = "[ns] \"……。\""
2600703-35 = "[ns] ドアを開けて入る。"
2600703-42 = "（ドアを開けて入ると、ベッドの上の「何か」が目に入った）"
2600703-48 = "[ns] \"…………。\""
2600703-49 = "セリカちゃん……？"
2600703-50 = "たとえセリカちゃんでも……私からこの布団をはがすことはできない……。"
2600703-51 = "私はこの中で睡眠を満喫するの……。"
2600703-52 = "……ここは私だけの秘密基地。"
2600703-53 = "[s] \"…………。\""
2600703-55 = "[ns] 布団ごと揺らしてみる。"
2600703-59 = "むむ……いつもより優しいけど、少し重い手つき……。"
2600703-60 = "でも、この程度で基地は崩れません……私はもっと寝るんだから……！"
2600703-61 = "[s] 布団をさらに揺らしてみる。"
2600703-65 = "セリカちゃん……。"
2600703-66 = "もう今日は諦めたら……。"
2600703-67 = "いくら私でも……我慢の限界っていうのがあって……。"
2600703-68 = "[s] 構わず布団を揺らしてみる。"
2600703-73 = "……。"
2600703-74 = "せ……りか……ちゃん……！！"
