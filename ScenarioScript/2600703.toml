2600703-79 = "まったく、ちょっとは人の言うことを……！！"
2600703-82 = "……聞いた……ほう……。"
2600703-86 = "……が…………？"
2600703-87 = "[s1] \"……おはよう、アヤネ。\"\n[s2] \"ごめんね、セリカじゃなくて。\""
2600703-88 = "あれ……？"
2600703-89 = "あれ……？"
2600703-90 = "えっ……。"
2600703-91 = "こ、こんにちは、先生……えっと……どうしてここに……。"
2600703-92 = "えっ……モモトーク？"
2600703-96 = "……あっ。"
2600703-97 = "これは……寝ぼけて送っちゃったみたいですね……。"
2600703-101 = "その……先生……。"
2600703-102 = "これは、あの……えっと……。"
2600703-103 = "[s3] \"……そろそろ行こうか。みんな待ってるよ。\"\n[s4] \"もうご飯できたから食べに行こう。\""
2600703-108 = "……はい。"
