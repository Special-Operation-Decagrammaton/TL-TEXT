[translation]
2600703-1 = "Ayane debaixo do cobertor"
2600703-2 = "（Fiquei preocupado, então fui visitar o quarto da Ayane）"
2600703-9 = "（Não há resposta）"
2600703-13 = "Hmm... Serika-chan...?"
2600703-14 = "Foi o pessoal que te mandou...?"
2600703-15 = "...Desculpa... só mais 5 minutos..."
2600703-19 = "（.........）"
2600703-23 = "...Eu disse que eram só 5 minutos..."
2600703-24 = "Não adianta a Serika-chan tentar me acordar. Eu decidi que seria assim hoje."
2600703-28 = "Serika-chan... você está um pouco insistente hoje."
2600703-29 = "Eu não vou sair daqui de jeito nenhum... desista logo, Serika-chan..."
2600703-33 = "[ns] \"......\""
2600703-35 = "[ns] Abre a porta e entra."
2600703-42 = "（Ao abrir a porta e entrar, meus olhos se fixaram em \"algo\" em cima da cama）"
2600703-48 = "[ns] \"............\""
2600703-49 = "Serika-chan...?"
2600703-50 = "Mesmo que seja você, Serika-chan... não vai conseguir tirar esse cobertor de mim..."
2600703-51 = "Eu vou aproveitar meu sono aqui dentro..."
2600703-52 = "...Este é o meu esconderijo secreto."
2600703-53 = "[s] \"............\""
2600703-55 = "[ns] Tenta balançar o cobertor."
2600703-59 = "Hmm... está mais gentil que o normal, mas com um toque um pouco pesado..."
2600703-60 = "Mas o meu esconderijo não vai cair por causa disso... eu vou continuar dormindo...!"
2600703-61 = "[s] Tenta balançar o cobertor ainda mais."
2600703-65 = "Serika-chan..."
2600703-66 = "Por que você não desiste por hoje..."
2600703-67 = "Mesmo eu... tenho um limite de paciência..."
2600703-68 = "[s] Ignora e continua balançando o cobertor."
2600703-73 = "..."
2600703-74 = "Se... rika... chan...!!"
2600703-75 = "Já chega...!"
2600703-79 = "Francamente, você não ouve o que as pessoas dizem...!!"
2600703-82 = "...Ouvi... sim..."
2600703-86 = "...Quem... é...?"
2600703-87 = "[s1] \"...Bom dia, Ayane.\"\n[s2] \"Desculpe, não sou a Serika.\""
2600703-88 = "Hã...?"
2600703-89 = "Hã...?"
2600703-90 = "Ah..."
2600703-91 = "B-bom dia, Sensei... é... por que você está aqui..."
2600703-92 = "Ah... o MomoTalk?"
2600703-96 = "...Ah."
2600703-97 = "Isso... parece que eu mandei enquanto estava sonolenta..."
2600703-101 = "Sobre isso... Sensei..."
2600703-102 = "Isso é, bem... é que..."
2600703-103 = "[s3] \"...Vamos indo? Todos estão esperando.\"\n[s4] \"A comida já está pronta, vamos comer.\""
2600703-108 = "...Sim."
