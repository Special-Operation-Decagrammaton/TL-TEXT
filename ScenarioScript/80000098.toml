[translation]
80000098-1 = "Desafio de Dia dos Namorados"
80000098-3 = "……Ah! Sensei~!!"
80000098-4 = "[s1] \"……Esse barulho!\"\n[s2] Prepara-se para receber o impacto com calma."
80000098-12 = "Toryaaaaa!!"
80000098-20 = "(Logo em seguida, Reisa veio correndo, mas, já acostumado, consegui segurá-la sem problemas)"
80000098-22 = "Você veio, Sensei! Eu estava te esperando!"
80000098-23 = "Como o Sensei deve saber! #nHoje é o dia de retribuir o favor, dando chocolates ao Sensei!"
80000098-24 = "Mas eu entendo. O Sensei está muito ocupado hoje! #nAfinal, não sou só eu que quero te ver, né!"
80000098-25 = "Por isso, serei rápida! Para não tomar muito do seu tempo!"
80000098-26 = "Aqui, pegue logo!"
80000098-31 = "[ns3] \"Um desafio?……Não, espera!\"\n[ns4] \"Isso é um chocolate, né……?\""
80000098-34 = "Fu-fu-fu~! Exatamente como disse! É um chocolate em formato de desafio!"
80000098-35 = "Bem, eu só dei um toque pessoal em um que comprei pronto, mas……"
80000098-36 = "M-mas ainda é um desafio……"
80000098-41 = "[ns5] \"Nossa, parece ser bem longo……\"\n[ns6] \"Mais do que um desafio…… isso é uma carta……?\""
80000098-44 = "……!!"
80000098-45 = "Waaaaaaaah!!!"
80000098-46 = "N-não pode! Sensei, pare!! #nPor que você está lendo aqui agora!?"
80000098-47 = "H-hein!? Perguntando se um desafio não é algo para se ler na hora? #nIsso…… pode até ser, mas……!"
80000098-48 = "D-de qualquer forma, não pode! Agora não!! #nLeia quando chegar em casa! Quando estiver sozinho! Promete, hein!!"
80000098-49 = "U-uuu……"
80000098-50 = "É, é um pouco tarde para dizer isso, mas……"
80000098-51 = "Em vez de algo que eu só decorei depois de comprar……"
80000098-52 = "Você preferiria ter ganhado algo feito à mão……?"
80000098-53 = "Eu não sou muito habilidosa e não entendo nada de confeitaria, por isso acabou ficando assim desta vez……"
80000098-57 = "……Desculpe. #nNo fim das contas, acabei tomando o seu tempo à toa……"
80000098-58 = "……Sim?"
80000098-59 = "Não foi à toa? Pelo contrário, você ficou feliz……? #nP-por que……?"
80000098-60 = "[s7] \"Porque a Reisa criou coragem.\"\n[s8] \"Fico feliz em ganhar algo da Reisa.\""
80000098-63 = "……!"
80000098-64 = "……Hehe."
80000098-65 = "……Hehehe."
80000098-67 = "(Depois disso, comemos o chocolate juntos e, ao chegar em casa, li o \"desafio\" da Reisa)"
80000098-68 = "(Era o \"desafio\" mais fofo do mundo, decorado com vários adesivos e canetas coloridas)"
