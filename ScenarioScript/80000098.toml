[translation]
80000098-1 = "バレンタイン挑戦状"
80000098-3 = "……あ！先生～！！"
80000098-4 = "[s1] \"……この音は！\"\n[s2] 落ち着いて受け止める構えをとる。"
80000098-12 = "とりゃあーーーっ！！"
80000098-20 = "（その直後、レイサが突っ込んできたが、慣れたものでうまく受け止められた）"
80000098-22 = "来てくださったんですね、先生！待っていました！"
80000098-23 = "先生もご存知かと思いますが！#n今日は先生にチョコレートを差し上げる、恩返しの日！"
80000098-24 = "でも、私は分かっています。今日の先生は、とても忙しいと！#n先生に会いたいのは、私だけじゃないでしょうから！"
80000098-25 = "なので速やかに！先生の時間を奪いすぎてしまわないよう！"
80000098-26 = "さっそく、こちらをどうぞ！"
80000098-31 = "[ns3] \"挑戦状？……いや、違う！\"\n[ns4] \"チョコレート、だよね……？\""
80000098-34 = "ふ・ふ・ふ～！仰る通り！挑戦状の形をしたチョコレートです！"
80000098-35 = "といっても市販品に少し手を加えただけですが……"
80000098-36 = "で、でも挑戦状にはなっていて……"
80000098-41 = "[ns5] \"あれ、すごく長いような……\"\n[ns6] \"挑戦状というか……これ、手紙……？\""
80000098-44 = "……！！"
80000098-45 = "わああああああっー！！！"
80000098-46 = "ダ、ダメです！先生、ストップ！！#n今ここで読んでどうするんですか！？"
80000098-47 = "は、はい！？挑戦状って、すぐに確認するものじゃなかったのかって？#nそれは……そうかもしれませんが……！"
80000098-48 = "と、とにかくダメです！今はダメなんです！！#n帰ってから！一人のときに読んでください！絶対ですよ！！"
80000098-49 = "う、ううぅ……"
80000098-50 = "い、今さらですけど……"
80000098-51 = "市販品に手を加えただけのものよりも……"
80000098-52 = "やっぱり、手作りの方が嬉しかったりします……？"
80000098-53 = "私は器用じゃないですし、お菓子作りもあまり詳しくないので、今回はこうなってしまいましたが……"
80000098-57 = "……ごめんなさい。#nやっぱり、先生の時間を無為に奪ってしまいましたね……"
80000098-58 = "……はい？"
80000098-59 = "そうじゃない？むしろ、嬉しかった……？#nど、どうしてですか……？"
80000098-60 = "[s7] \"レイサが勇気を出してくれたから。\"\n[s8] \"レイサにもらえたのが嬉しいんだよ。\""
80000098-63 = "……！"
80000098-64 = "……えへ。"
80000098-65 = "……えへへ。"
80000098-67 = "（その後、一緒にチョコレートを食べてから、帰ってレイサの「挑戦状」を読んだ）"
80000098-68 = "（それは、いろんなステッカーやペンで彩られた、世界で一番可愛い「挑戦状」だった）"
