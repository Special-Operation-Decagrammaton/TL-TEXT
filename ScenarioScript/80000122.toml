[translation]
80000122-1 = "Receita Secreta"
80000122-2 = "[ns] \"O trabalho não acaba nunca...\""
80000122-3 = "(Enquanto eu pensava em fazer um alongamento...)"
80000122-8 = "Sensei, cheguei."
80000122-9 = "[s] \"Satsuki...?\""
80000122-13 = "[ns] \"Hoje era o seu dia de plantão?\""
80000122-14 = "Não."
80000122-15 = "Eu tenho algo para te entregar."
80000122-16 = "Ufufu. Está curioso, não é?"
80000122-17 = "Vamos, dê uma olhada!"
80000122-21 = "Acho que, com isso, poderemos ficar ainda mais próximos, Sensei."
80000122-22 = "Quando você está exausto de tanto trabalhar, precisa de um pouco de açúcar, não é?"
80000122-23 = "[ns] \"Uau! Obrigado!\""
80000122-25 = "[ns] \"Por acaso... foi você quem fez?\""
80000122-26 = "Sim, para ficarmos mais próximos, nada melhor do que algo feito à mão."
80000122-27 = "E ainda mais sendo um presente para o Sensei, um candidato a colaborador do Pandemonium."
80000122-28 = "O que foi? Por que está aí parado, distraído...?"
80000122-29 = "[s1] \"Ah, desculpe... é que fiquei surpreso.\"\n[s2] \"Bom, vou pegar um então.\""
80000122-34 = "[ns] \"............ Isso é muito bom!\""
80000122-35 = "Houve uma pausa misteriosa aí, não houve?"
80000122-36 = "Não é óbvio que o chocolate é gostoso?"
80000122-37 = "...Às vezes existem chocolates surpreendentes, não é?"
80000122-38 = "Ufufu, minha receita especial não falha."
80000122-39 = "[s] \"Hã? A... receita especial da Satsuki?\""
80000122-40 = "Ora... quer saber qual é?"
80000122-41 = "[s] \"Tenho um mau pressentimento sobre isso...!\""
80000122-42 = "Que pena. Já é tarde demais, sabia?"
80000122-43 = "E então? Sentiu o efeito?"
80000122-44 = "[s] \"Não, quer dizer, estava gostoso, mas... que tipo de receita é?\""
80000122-45 = "Na verdade, é um segredo guardado a sete chaves, mas vou te contar minha receita secreta de elite como um favor especial."
80000122-46 = "Neste chocolate, eu..."
80000122-47 = "[ns] \"Gulp...\""
80000122-48 = "Fiquei recitando um feitiço para deixá-lo mais gostoso!"
80000122-52 = "[ns] \"Hã?\""
80000122-53 = "Para este dia, consegui um feitiço secreto de uma certa organização.#n... É algo que só é possível graças ao Departamento de Informações."
80000122-54 = "Este feitiço, que dobra o efeito apenas concentrando a mente e repetindo as palavras..."
80000122-55 = "Será que o Sensei conhece?"
80000122-56 = "[s] \"Por acaso, seria aquilo...?\""
80000122-57 = "Ah, você até sabe disso? Como esperado do Sensei!"
80000122-58 = "Isso mesmo... enquanto girava em volta do chocolate...#nEu dizia: \"Fique gostoso, fique gostoso\"..."
80000122-59 = "[s3] \"Ah...\"\n[s4] \"Então aquilo era um feitiço secreto...\""
80000122-62 = "Fufu, o chocolate com o feitiço estava gostoso, não estava?"
80000122-63 = "...É só uma questão de tempo até o Sensei se submeter ao Pandemonium!"
80000122-64 = "[s5] \"Acho que não vai acontecer, mas...\"\n[s6] \"Obrigado por se esforçar para fazer, estava delicioso.\""
80000122-67 = "Hum, vendo que sua reação não foi ruim, acho que foi meio sucesso."
80000122-68 = "Valer a pena ter vindo até aqui."
80000122-69 = "Vamos, não seja tímido, pode comer à vontade!"
80000122-71 = "(Satsuki não foi embora até que eu terminasse de comer todo o chocolate)"
