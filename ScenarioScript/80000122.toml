[translation]
80000122-1 = "シークレットレシピ"
80000122-2 = "[ns] \"仕事が終わらない……。\""
80000122-3 = "（ストレッチでもしようかと考えていると……）"
80000122-8 = "先生、来たわよ。"
80000122-9 = "[s] \"サツキ……？\""
80000122-13 = "[ns] \"今日、当番だったっけ？\""
80000122-14 = "いいえ。"
80000122-15 = "ちょっと渡したいものがあるの。"
80000122-16 = "うふふ。気になるようね？"
80000122-17 = "さあ、御覧なさい！"
80000122-21 = "これで、より先生と親密になれると思っているわ。"
80000122-22 = "仕事でへろへろなときには、適度な糖分がいるでしょう？"
80000122-23 = "[ns] \"わぁ！ありがとう！\""
80000122-25 = "[ns] \"もしかして……手作り？\""
80000122-26 = "ええ、より親密になるには手作りが一番だもの。"
80000122-27 = "万魔殿の協力者候補である先生に贈るなら、なおさらね。"
80000122-28 = "な～に？ぼーっとして……。"
80000122-29 = "[s1] \"あ、ごめん……ちょっと驚いて。\"\n[s2] \"じゃ、一個もらうね。\""
80000122-34 = "[ns] \"…………おいしいねこれ！\""
80000122-35 = "謎の間があったわね？"
80000122-36 = "チョコがおいしいのは当たり前じゃない。"
80000122-37 = "……たまに凄いチョコもある？"
80000122-38 = "うふふ、私の特製レシピに抜かりはないわ。"
80000122-39 = "[s] \"え？サツキの……特製レシピ？\""
80000122-40 = "あら……知りたいの？"
80000122-41 = "[s] \"嫌な予感が……！\""
80000122-42 = "ざ～んねん。もう手遅れよ？"
80000122-43 = "どう？効果は感じたかしら？"
80000122-44 = "[s] \"いや、美味しくはあったけど……どんなレシピ？\""
80000122-45 = "本当は門外不出なんだけど、特別に極上のシークレットレシピを教えてあげる。"
80000122-46 = "このチョコには――"
80000122-47 = "[ns] \"ごくり……。\""
80000122-48 = "美味しくなる呪文をかけ続けたのよ！"
80000122-52 = "[ns] \"えっ？\""
80000122-53 = "この日のために、とある組織から秘密の呪文を入手したの。#n……情報部だからこそ、可能なことなのだけど。"
80000122-54 = "精神を集中し、唱え続けるだけで効果が倍増するこの呪文――"
80000122-55 = "先生は、ご存知かしら？"
80000122-56 = "[s] \"もしかして、それって……？\""
80000122-57 = "アハッ、こんなことまで知っているの？さすが先生ね！"
80000122-58 = "そうよ……チョコの周りをぐるぐる周りながら……#n「おいしくな～れ、おいしくな～れ」と――"
80000122-59 = "[s3] \"あ……\"\n[s4] \"それ、秘密の呪文だったんだ……。\""
80000122-62 = "ふふ、呪文をかけたチョコ、美味しかったでしょう？"
80000122-63 = "……先生が万魔殿に服従するのも時間の問題ね！"
80000122-64 = "[s5] \"そんなことはないと思うけど……。\"\n[s6] \"頑張って作ってくれてありがとう、おいしかったよ。\""
80000122-67 = "ふ～ん、反応は悪くないところを見ると、半分成功かしら。"
80000122-68 = "ここまで足を運んだ甲斐があったわ。"
80000122-69 = "ほら、遠慮しないでどんどん食べていいわよ～？"
80000122-71 = "（サツキはチョコを全部食べきるまで帰らなかった）"
