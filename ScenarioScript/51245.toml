51245-207 = "だから、ユカリ……レンゲ、キキョウ……先生。 "
51245-211 = "助けて、ほしい。"
51245-216 = "はい！！"
51245-217 = "ああ！その言葉を待ってたよ！"
51245-218 = "……うん。"
51245-220 = "[ns] \"もちろん、喜んで。\""
51245-221 = "……！"
51245-222 = "まだ……まだですよぉ……！！"
51245-226 = "あっ、待ちなさい！"
51245-236 = "どうせお前たちの銃弾は、手前には届かない……"
51245-237 = "ソレは「怪書」を所持している手前にとって、不変の真理……！#n最初から無意味――"
51245-239 = "[ns] \"今だよ！！\""
51245-243 = "あ……うっ……！？"
51245-244 = "な、ぜ……攻撃が……！"
51245-257 = "……。"
51245-262 = "まさ、か……"
51245-263 = "ナグサ……[ruby=・   ・   ・   ・   ・   ・]ナグサちゃん[/ruby]の、くせに……！"
51245-264 = "心を入れ替えた、程度で……怪書の「神秘」に、触れた……？"
51245-266 = "はぁっ！！"
51245-271 = "くうっ……まだ……まだ！！"
51245-285 = "手前の百物語、なら……！"
51245-286 = "[ns] \"レンゲ、お願い！\""
51245-291 = "任せてくれ！"
51245-299 = "なっ、一瞬で……！？"
51245-307 = "百花繚乱紛争調停委員会の切り込み隊長、[ruby=ふわ]不破[/ruby]レンゲ。"
51245-308 = "射撃を鍛錬し続けてはや2年。"
51245-310 = "青春を捧げて会得した百花繚乱式射撃術において――頭数など無意味だってこと、覚えておけ！"
51245-314 = "くそっ……！"
51245-321 = "まずい！後方へ……！"
51245-326 = "っ……！退路に……！？"
51245-329 = "視野を遮った瞬間に退却を選択。そして、安全を確保すると同時に百物語を呼び出す――という手立てだったんだろうけど。"
51245-333 = "あんたのその単純な思考を読み解くくらい、造作もない。"
51245-337 = "笑わせないでくださいよぉ、[ruby=きりゅう]桐生[/ruby]キキョウ……！ "
51245-338 = "[ruby=てめぇ]手前[/ruby]の攻撃なんて、手前には通らない……！"
51245-345 = "は……？床、が……！？"
51245-346 = "攻撃が通じないから何？#n地面は壊せるよね。"
51245-347 = "怪書があるといっても、空は飛べないでしょ。"
51245-352 = "ッ……そう……！[ruby=カタシロ]無貌の形代[/ruby]……無貌の形代なら！ "
51245-354 = "アレなら……！！"
51245-361 = "……無い？……どうして？"
51245-366 = "[ruby=カタシロ]無貌の形代[/ruby]なら、もうここには居ませんわ。"
51245-367 = "これ以上身共の感情を、あなたの思い通りになんてさせない。#nそう心に決めましたの。"
51245-368 = "[ruby=かでのこうじ]勘解由小路[/ruby]、ユカリ……。"
51245-369 = "はい。この勘解由小路ユカリ。"
51245-370 = "百花繚乱紛争調停委員会の一員として…… "
51245-371 = "[ruby=やぶき]箭吹[/ruby]シュロ――あなたを逮捕しますの！"
51245-375 = "！！"
51245-381 = "ぐっ…………！！"
51245-382 = "これ以上の抵抗は無意味だよ。"
51245-383 = "何で……"
51245-384 = "さっきまで、互いを傷つけ合ってたのに……？"
51245-385 = "相手を罵って、非難してたじゃないですかぁ！"
51245-386 = "なのにどうして今になって力を合わせるの……？何で……？ねえ、どうして！？"
51245-387 = "……今からでも、向き合いたいと思ったから。"
51245-388 = "たとえそれが「演技」だったとしても…… "
51245-392 = "百花繚乱の私として、みんなと向き合いたいと思ったから。"
51245-393 = "ええ、そうですの！"
51245-395 = "……！！！"
51245-396 = "[ns] \"シュロ、これで終わりだよ。\""
51245-397 = "シャーレの、先生…… "
51245-403 = "は、ハハッ……"
51245-409 = "あは……アハハハッ！"
51245-410 = "アハハハハハハハハハハハッ！！！！！"
51245-414 = "ナグサ、ちゃん……！"
51245-415 = "ナ～グ～サ～ちゃぁああああああん！！！！！"
51245-423 = "そう……いいですよぉ。もう、どうでもいい……#n正直、気に入らないですけどぉ……"
51245-424 = "今回は[ruby=てめぇ]手前[/ruby]らの勝ちってことにしてあげる……！#nええ、ええ！そういう結末だって納得してあげましょ。"
51245-425 = "でも……これで終わりだと思わないことですねぇ？"
51245-426 = "次こそ……必ず、手前の手で……！"
51245-427 = "コクリコ様に捧げる、最高の「百物語」を――"
51245-431 = "[ns] \"みんな！気をつけて！！\""
51245-438 = "あいつ……いきなり本を！？"
51245-445 = "次回;今あなたに"
