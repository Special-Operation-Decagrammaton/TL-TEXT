[translation]
51245-3 = "Kyaa!?"
51245-4 = "Ugh...!?"
51245-5 = "............!"
51245-18 = "[ns] (Não tem fim, e além disso, o ímpeto dos ataques está... muito forte!)"
51245-23 = "Cale a boca."
51245-25 = "Cale a boca, cale a boca, cale a boca, cale a boca!"
51245-26 = "Tudo, absolutamente tudo é inútil. Não importa o que vocês façam, não conseguirão me derrotar."
51245-27 = "Não importa o quanto empilhem palavras..."
51245-28 = "Não importa o quanto tentem destruir a história..."
51245-29 = "Eu já disse, não é? A premissa absoluta da história não pode ser alterada."
51245-31 = "Sem as qualificações necessárias, vocês não podem derrotar os Cem Contos —"
51245-32 = "Porque essa é a história — já estava decidido desde o início."
51245-33 = "...É mesmo."
51245-34 = "Já que a presidente do Hyakkaryouran — Ayame — não está aqui!"
51245-35 = "Vocês também, assim como Ayame, serão todos lançados ao 'Crepúsculo' —!"
51245-50 = "...Hã?"
51245-55 = "O quê? O que é isso...?"
51245-56 = "Ei, o que você quer dizer com isso?"
51245-59 = "Vocês foram encurralados, não foram? Ei."
51245-60 = "Eu quebrei o seu coração várias e várias vezes, não foi?"
51245-61 = "Mesmo assim —"
51245-65 = "Ei, por que não se olha no espelho? #nEssa sua aparência patética —"
51245-66 = "Suas pernas tremendo, seu rosto todo borrado de lágrimas."
51245-70 = "Mesmo querendo desesperadamente fugir agora..."
51245-78 = "Por que está agindo como se fosse a 'presidente'...? #nEi, Nagusa-chan...!!"
51245-79 = "Depois de tanto tempo, com que cara você está tentando imitar a Ayame?"
51245-86 = "[log=나구사ND]Eu não sou a Ayame.[/log]"
51245-91 = "Nagusa"
51245-92 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkaryouran[-]"
51245-93 = "[log=나구사ND]Eu —[wa:2500] não posso ser a Ayame. [/log]"
51245-98 = "Nagusa"
51245-99 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkaryouran[-]"
51245-100 = "[log=나구사ND]Tudo aquilo em que toquei,[/log]"
51245-102 = "[wa:550][log=나구사ND]acabou, [wa:1550] quebrando. [/log]"
51245-107 = "Nagusa"
51245-108 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkaryouran[-]"
51245-109 = "[log=나구사ND]Por isso eu tinha medo.[/log]"
51245-111 = "[wa:20][log=나구사ND]Medo de que fosse por causa da minha imaturidade, [/log]"
51245-114 = "Nagusa"
51245-115 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkaryouran[-]"
51245-116 = "[wa:110][log=나구사ND]de ser culpada por tudo[/log]"
51245-118 = "[wa:250][log=나구사ND]e ser recriminada — [wa:500] [/log]"
51245-123 = "Nagusa"
51245-124 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkaryouran[-]"
51245-125 = "[log=나구사ND]Eu tinha medo de que [wa:1200] descobrissem [wa:2420] quem eu realmente sou.[/log]"
51245-130 = "Nagusa"
51245-131 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkaryouran[-]"
51245-132 = "[log=나구사ND]Mas —[/log]"
51245-137 = "Nagusa"
51245-138 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkaryouran[-]"
51245-139 = "[log=나구사ND]Mais do que isso...[wa:2700] como aconteceu com Ayame...[/log]"
51245-144 = "Nagusa"
51245-145 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkiyako[-]"
51245-146 = "[log=나구사ND]A Yukari... [/log]"
51245-151 = "Nagusa"
51245-152 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkiyako[-]"
51245-153 = "[log=나구사ND]Perder a Kikyou...[wa:2000] e a Renge,[wa:1870] é o que eu mais temo![wa:1780][/log]"
51245-157 = "Shuro"
51245-158 = "[7cd0ff]Departamento Kacho Fugetsu[-]"
51245-159 = "[log=슈로]... Na[wa:500]gu[wa:1000]sa...![/log]"
51245-164 = "Nagusa"
51245-165 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkiyako[-]"
51245-166 = "[log=나구사ND]Você tem razão,[wa:2180] Shuro.[/log]"
51245-171 = "Nagusa"
51245-172 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkiyako[-]"
51245-173 = "[log=나구사ND]Tudo o que eu consigo fazer[wa:2180] é, no máximo, \"atuar\".[/log]"

51245-176 = "Nagusa"
51245-177 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkiyako[-]"
51245-178 = "[wa:80][log=나구사ND]Mesmo agora, estou aqui de alguma forma,[wa:2890] interpretando uma versão falsa de mim mesma.[/log]"
51245-183 = "Nagusa"
51245-184 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkiyako[-]"
51245-185 = "[log=나구사ND]Mas,[wa:1910] mesmo alguém como eu,[wa:2930] se eu puder salvar a todos...[/log]"
51245-188 = "Nagusa"
51245-189 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkiyako[-]"
51245-190 = "[wa:400][log=나구사ND]Não importa o quão ridícula eu pareça,[wa:3370] continuarei atuando.[/log]"
51245-195 = "Nagusa"
51245-196 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkiyako[-]"
51245-197 = "[log=나구사ND]...O papel de vice-presidente do Comitê Hyakkiyako — Goryou Nagusa...[/log]"
51245-200 = "Nagusa"
51245-201 = "[7cd0ff]Comitê de Mediação de Conflitos Hyakkiyako[-]"
51245-202 = "[log=나구사ND]Para sempre![/log]"
51245-207 = "Por isso, Yukari... Renge, Kikyou... Sensei."
51245-211 = "Eu preciso da ajuda de vocês."
51245-216 = "Sim!!"
51245-217 = "Ah! Eu estava esperando por essas palavras!"
51245-218 = "...Sim."
51245-220 = "[ns] \"Claro, com prazer.\""
51245-221 = "...!"
51245-222 = "Ainda não... ainda não acabou...!!"
51245-226 = "Ah, espere!"
51245-236 = "De qualquer forma, as balas de vocês não vão me alcançar..."
51245-237 = "Isso é uma verdade imutável para mim, que possuo o \"Livro Estranho\"...!#nDesde o início, é inútil—"
51245-239 = "[ns] \"Agora!!\""
51245-243 = "Ah... ugh...!?"
51245-244 = "Por, que... o ataque...!"
51245-257 = "..."
51245-262 = "Não pode ser..."
51245-263 = "Nagusa... logo você, Nagusa-chan...!"
51245-264 = "Só porque você mudou de ideia... você tocou no \"mistério\" do Livro Estranho...?"
51245-266 = "Haa!!"
51245-271 = "Droga... ainda não... ainda não!!"
51245-285 = "Se é assim, então, sua Centena de Histórias...!"
51245-286 = "[ns] \"Renge, por favor!\""
51245-291 = "Deixe comigo!"
51245-299 = "O quê, num instante...!?"
51245-307 = "A capitã de ataque do Comitê de Mediação de Conflitos Hyakkiyako, Fuwa Renge."
51245-308 = "Já se passaram 2 anos desde que comecei a treinar tiro."
51245-310 = "Lembre-se disso: na técnica de tiro estilo Hyakka Ryoran, que dediquei minha juventude para dominar, números não significam nada!"
51245-314 = "Droga...!"
51245-321 = "Droga! Para trás...!"
51245-326 = "O quê...!? Na minha rota de fuga...!"
51245-329 = "Você escolheu recuar no momento em que bloqueou minha visão. E, ao mesmo tempo que garantia sua segurança, pretendia invocar a Centena de Histórias... era esse o seu plano, não era?"
51245-333 = "Decifrar seu pensamento simplório não exige esforço algum."
51245-337 = "Não me faça rir, Kiryu Kikyou...!"
51245-338 = "Seus ataques não vão funcionar em mim...!"
51245-345 = "Hã...? O chão...!?"
51245-346 = "E daí que seus ataques não funcionam? #nEu posso destruir o chão, não posso?"
51245-347 = "Mesmo que você tenha um livro estranho, você não consegue voar, certo?"
51245-352 = "Droga... isso mesmo...! O Substituto Sem Rosto... se for o Substituto Sem Rosto!"
51245-354 = "Com aquilo...!!"
51245-361 = "...Não está aqui? ...Por quê?"
51245-366 = "O Substituto Sem Rosto não está mais aqui."
51245-367 = "Decidi que não deixarei mais que você manipule meus sentimentos como bem entender. #nFoi isso que decidi no meu coração."
51245-368 = "Kadenokouji Yukari..."
51245-369 = "Sim. Eu, Kadenokouji Yukari."
51245-370 = "Como um membro do Comitê de Mediação de Conflitos Hyakkiyako..."
51245-371 = "Yabuki Shuro, eu vou prender você!"
51245-375 = "!!"
51245-381 = "Argh............!!"
51245-382 = "Qualquer resistência a mais é inútil."
51245-383 = "Por que..."
51245-384 = "Até agora, vocês estavam tentando ferir uma à outra...?"
51245-385 = "Vocês estavam insultando e culpando uma à outra, não estavam?!"
51245-386 = "Então por que agora vocês estão unindo forças...? Por que...? Ei, por que?!"
51245-387 = "...Porque eu decidi que queria encarar a situação, mesmo agora."
51245-388 = "Mesmo que isso tenha sido uma 'atuação'..."
51245-392 = "Porque, como parte do Hyakka Ryoran, eu queria encarar todas vocês."
51245-393 = "Sim, é isso mesmo!"
51245-395 = "...!!!"
51245-396 = "[ns] \"Shuro, isso acaba aqui.\""
51245-397 = "Sensei, do Schale..."
51245-403 = "Ha, haha..."
51245-409 = "Aha... Ahahahaha!"
51245-410 = "Ahahahahahahahahahahahaha!!!!!"
51245-414 = "Nagusa-chan...!"
51245-415 = "Na~gu~sa~chaaaaaaaan!!!!!"
51245-423 = "Entendo... tudo bem. Já não importa mais... #nPara ser sincera, não gosto nada disso..."
51245-424 = "Desta vez, vou deixar que a vitória seja de vocês...! #nSim, sim! Vamos aceitar que esse é o desfecho."
51245-425 = "Mas... não pense que isso acaba aqui, entendeu?"
51245-426 = "Na próxima vez... com certeza, pelas minhas próprias mãos...!"
51245-427 = "Para dedicar à senhorita Coquelicot, a melhor das 'Cem Histórias'—"
51245-431 = "[ns] \"Pessoal! Cuidado!!\""
51245-438 = "Aquele sujeito... de repente, um livro!?"
51245-445 = "Próximo episódio; Agora para você"
