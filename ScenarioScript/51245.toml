51245-18 = "[ns] (Não tem fim, além disso, o impacto dos ataques... é forte!)"
51245-23 = "Cale a boca."
51245-25 = "Cale a boca, cale a boca, cale a boca, cale a boca!"
51245-26 = "Tudo, tu~do inútil. Não importa o que vocês façam, não vão conseguir derrotar."
51245-27 = "Não importa o quanto falem..."
51245-28 = "Não importa o quanto tentem destruir a história..."
51245-29 = "Eu avisei, não avisei?... As premissas absolutas da história não podem ser mudadas."
51245-31 = "Sem a qualificação, não se pode derrotar a Hyakumonogatari――"
51245-32 = "Porque―― já estava decidido desde o início que seria essa a história."
51245-33 = "......Sim."
51245-34 = "Presidente da Hyakkaryouran―― já que a Ayame não está aqui!"
51245-35 = "Vocês também, assim como a Ayame, todos serão lançados ao 'Crepúsculo'――!"
51245-50 = "......Hã?"
51245-55 = "O quê? O que quer dizer com isso...?"
51245-56 = "Ei, o que quer dizer com isso?"
51245-59 = "Vocês estavam encurraladas, não estavam? Hein."
51245-60 = "Eu quebrei o coração de vocês várias e várias vezes, não quebrei."
51245-61 = "Mesmo assim――"
51245-65 = "Por que não dá uma olhada no espelho? #n Essa sua figura lamentável――"
51245-66 = "Suas pernas tremendo, seu rosto todo manchado de lágrimas."
51245-70 = "Mesmo querendo desesperadamente fugir..."
51245-78 = "Por que está agindo como se tivesse se tornado a 'presidente'... #n Ei, Nagusa-chan...!!"
51245-79 = "Depois de tanto tempo, com que cara você está imitando a Ayame?"
