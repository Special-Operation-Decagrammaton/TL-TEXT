51245-3 = "きゃぁっ！？"
51245-4 = "くぅっ……！？"
51245-5 = "…………っ！"
51245-18 = "[ns] （キリがない上に、攻撃の勢いが……強い！）"
51245-23 = "黙れ。"
51245-25 = "黙れ黙れ黙れ黙れ！"
51245-26 = "全部ぜ～んぶ無駄。[ruby=てめぇ]手前[/ruby]らが何しようと倒せやしない。"
51245-27 = "いくら言葉を並べ立てたって……"
51245-28 = "物語をぶち壊そうとしたって……"
51245-29 = "言ったはずですよねぇ……物語の絶対的な前提は変えられない。"
51245-31 = "資格がなければ、百物語は倒せない――"
51245-32 = "そういう物語だと――最初から既に決まっているのですから。"
51245-33 = "……そう。"
51245-34 = "百花繚乱の委員長――アヤメがここに居ない以上！"
51245-35 = "[ruby=てめぇ]手前[/ruby]らもアヤメと同じように、全員「黄昏」に堕としてや――！"
51245-50 = "……はぁ？"
51245-55 = "なに？なんなんですぅ……？"
51245-56 = "ねぇ、どういうことですかぁ？"
51245-59 = "窮地に、追い込まれてたでしょ？ねえ。"
51245-60 = "何回も何回も、[ruby=てめぇ]手前[/ruby]の心を折ったじゃない。"
51245-61 = "なのに――"
51245-65 = "ちょっと、鏡見たらどうですぅ？#n情けないその姿――"
51245-66 = "足元は震えて、顔は涙でぐっちゃぐちゃ。"
51245-70 = "今にも逃げ出したくてたまらないくせに……"
51245-78 = "何をそんな「委員長」にでもなったみたいに……#nねえ、ナグサちゃんさぁ……！！"
51245-79 = "今更、どんなツラ下げてアヤメの真似してるの？"
