51245-207 = "Por isso, Yukari... Renge, Kikyou... Sensei."
51245-211 = "Eu quero que me salvem."
51245-216 = "Sim!!"
51245-217 = "Ah! Eu estava esperando por essas palavras!"
51245-218 = "......Sim."
51245-220 = "[ns] \"Claro, com prazer.\""
51245-221 = "......!"
51245-222 = "Ainda... ainda não acabou...!!"
51245-226 = "Ah, espere!"
51245-236 = "De qualquer forma, as balas de vocês não vão me alcançar..."
51245-237 = "Isso é uma verdade imutável para mim, que possuo o 'Livro Misterioso'...! #n É inútil desde o começo――"
51245-239 = "[ns] \"Agora!!\""
51245-243 = "Ah... ugh...!?"
51245-244 = "Po, por que... o ataque...!"
51245-257 = "......"
51245-262 = "Não pode, ser..."
51245-263 = "Nagusa... mesmo sendo a Nagusa-chan...!"
51245-264 = "Só porque mudou de ideia... você tocou no 'mistério' do livro misterioso...?"
51245-266 = "Haaah!!"
51245-271 = "Ugh... ainda... ainda não!!"
51245-285 = "Se for a minha Hyakumonogatari, então...!"
51245-286 = "[ns] \"Renge, por favor!\""
51245-291 = "Deixe comigo!"
51245-299 = "O quê, num instante...!?"
51245-307 = "Fuwa Renge, capitã da equipe de ataque do Comitê de Mediação de Conflitos Hyakkaryouran."
51245-308 = "Dois anos aprimorando minhas habilidades de tiro."
51245-310 = "No estilo de tiro Hyakkaryouran que dominei dedicando minha juventude―― lembre-se, o número de oponentes é irrelevante!"
51245-314 = "Droga...!"
51245-321 = "Cuidado! Para trás...!"
51245-326 = "Ugh...! Na rota de fuga...!?"
51245-329 = "Você escolheu recuar no momento em que bloqueou minha visão. E planejou invocar a Hyakumonogatari enquanto garantia sua segurança, não foi?"
51245-333 = "Ler o seu pensamento simples assim é moleza."
51245-337 = "Não me faça rir, Kiryuu Kikyou......!"
51245-338 = "Seus ataques não vão funcionar em mim...!"
51245-345 = "Hã...? O chão está...!?"
51245-346 = "O que importa se seus ataques não funcionam? #n O chão pode ser destruído, não pode?"
51245-347 = "Mesmo tendo o livro misterioso, você não pode voar, certo."
51245-352 = "Ugh... sim...! O Katashiro Sem Rosto... se for o Katashiro Sem Rosto!"
51245-354 = "Com ele...!!"
51245-361 = "......Não está? ......Por quê?"
51245-366 = "Se for o Katashiro Sem Rosto, ele já não está mais aqui."
51245-367 = "Não vou deixar você manipular minhas emoções mais do que isso. #n Eu decidi isso no meu coração."
51245-368 = "Kadenokouji, Yukari......"
51245-369 = "Sim. Eu, Kadenokouji Yukari."
51245-370 = "Como membro do Comitê de Mediação de Conflitos Hyakkaryouran... "
51245-371 = "Yabuki Shuro―― eu prendo você!"
51245-375 = "!!"
51245-381 = "Ugh…………!!"
51245-382 = "Qualquer resistência a mais é inútil."
51245-383 = "Por quê..."
51245-384 = "Até agora há pouco, vocês estavam se machucando...?"
51245-385 = "Vocês não estavam se insultando e se condenando!"
51245-386 = "Por que, então, agora vocês unem forças...? Por quê...? Ei, por quê!?"
51245-387 = "......Porque eu decidi que queria encarar tudo de frente agora."
51245-388 = "Mesmo que tenha sido uma 'atuação'..."
51245-392 = "Porque eu queria encarar a todos como eu, a Hyakkaryouran."
51245-393 = "Sim, isso mesmo!"
51245-395 = "......!!!"
51245-396 = "[ns] \"Shuro, acabou por aqui.\""
51245-397 = "Sensei da Schale... "
51245-403 = "Ha, haha..."
51245-409 = "Aha... Ahahaha!"
51245-410 = "Ahahahahahahahahahah!!!!!"
51245-414 = "Nagusa, chan...!"
51245-415 = "Na~gu~sa~chaaaaaaaan!!!!!"
51245-423 = "Certo... tudo bem. Já chega, não me importa mais... #n Sinceramente, não estou gostando nada disso..."
51245-424 = "Desta vez... vou considerar que vocês venceram! #n Sim, sim! Vou me conformar com esse final."
51245-425 = "Mas... não pense que isso é o fim, ouviu?"
51245-426 = "Na próxima... eu mesma...!"
51245-427 = "A melhor 'Hyakumonogatari' dedicada à Kokuriko-sama――"
51245-431 = "[ns] \"Pessoal! Cuidado!!\""
51245-438 = "Aquela garota... ela usou o livro de repente!?"
51245-445 = "Próximo Episódio; Agora, Para Você"
