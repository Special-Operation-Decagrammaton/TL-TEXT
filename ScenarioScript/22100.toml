[translation]
22100-1 = "第10話;残酷な真実（２）"
22100-15 = "んなザコで足止めになるわけねぇだろうがよ！"
22100-19 = "――さすがネル。AMAS程度では、貴方を止められないというわけね。"
22100-20 = "こんな事はしたくなかったけれど――"
22100-22 = "……トキ。"
22100-23 = "イエス、マム。"
22100-24 = "「武装」の使用を許可します。"
22100-26 = "承知しました。"
22100-31 = "準備完了。「モード2」に移行します。"
22100-32 = "はぁ？何をゴチャゴチャと――"
22100-42 = "あれ？服が……"
22100-43 = "[ns] \"……「姿」が変わった？\""
22100-45 = "……！"
22100-54 = "そっちか！？"
22100-69 = "逃すか……！"
22100-82 = "チッ、クソ……当たんねぇ……"
22100-83 = "あ、あっという間に消えちゃった……。"
22100-89 = "てめぇ、一体どこに………"
22100-91 = "ネル先輩、後ろ……！"
22100-92 = "……何？"
22100-106 = "ぐあっ！！？"
22100-107 = "[s] \"ネルがあっという間に……\""
22100-109 = "気づいたら……突然、現れて……"
22100-110 = "あ、あうぅ………"
22100-115 = "クソッ！離せ！？ぶっ壊されてぇのか！？"
22100-116 = "そうやって暴れたら、曲がってはいけない方向に腕が曲がりますよ、先輩。"
22100-117 = "みなさんも、下手に動かないでくださいね。#n無駄な抵抗はおすすめしません。"
22100-119 = "……うっ！"
22100-120 = "……！"
22100-123 = "[ns] \"それは、一体……。\""
22100-124 = "私の作った特殊武装よ。"
22100-125 = "――こんな所で出すつもりはなかったのだけれど。"
22100-126 = "さあ、AMAS。#nアリスを回収しなさい。"
22100-136 = "！！"
22100-137 = "ちょ、ちょっと待っ……！"
22100-139 = "下手に動かない方がいい。"
22100-145 = "無関係な子を傷つけたくない。"
22100-151 = "（ビクッ！）"
22100-154 = "[ns] \"やめて、リオ。\""
22100-157 = "――それは私のセリフよ。"
22100-158 = "私も対立などしたくないわ。"
22100-159 = "貴方と敵対する気も、憎まれる気もない。"
22100-160 = "むしろ、貴方に聞きたいくらい。"
22100-161 = "こういった事態に於いて、シャーレの先生、"
22100-166 = "大人である貴方が真っ先に動くべきなのではなくて？"
22100-167 = "[s] \"……それは、どういう？\""
22100-168 = "子供より感情に支配されず、#n冷静に状況を判断できる――"
22100-169 = "そういった大人である貴方が動くべきだったのでは？"
22100-170 = "[s] \"生徒を傷つけるなんて………。\""
22100-171 = "――いつまでそんな寝言を吐き続けるつもりなの！"
22100-172 = "[s] \"……！！\""
22100-173 = "――勘違いしないでちょうだい、先生。"
22100-176 = "「アレ」は生命体ではないの――貴方が背負うべき生徒ではない。"
22100-177 = "もし、そう感じるのであれば、それは「エライザ効果」に過ぎない。"
22100-178 = "「アレ」はこの世界を終焉へと至らせる恐るべき兵器。"
22100-181 = "[ruby=アリス]アレ[/ruby]とキヴォトスの全生徒を秤にかけろと問われたら、答えは明白でしょう？"
22100-182 = "……それでもなお、貴方が動かないというのなら。"
22100-183 = "アリスのヘイローは私の手で破壊する。#n準備は既に整っているわ。"
22100-189 = "……。"
22100-190 = "違う……。"
22100-191 = "違うよ！アリスちゃんは兵器なんかじゃない！"
22100-192 = "アリスちゃんは……勇者だよ！#nだって――"
22100-193 = "アリスちゃんは、光の剣を……勇者の証である「スーパーノヴァ」を持っているもの！"
22100-195 = "光の剣……エンジニア部が作ったあのおもちゃ？"
22100-196 = "そう……貴方たちがそう言うのなら……"
22100-197 = "そうね。"
22100-205 = "[ns] \"スーパーノヴァの電源が……消えた？\""
22100-206 = "……！"
22100-207 = "これでいいかしら？"
22100-208 = "光の剣はもうないわ。"
22100-209 = "これで証明は終わり。"
22100-210 = "アリスの、剣が……ゆうしゃの、あかしが………"
22100-211 = "あ、う……うぅ……"
22100-217 = "ミドリ……ユズ………"
22100-223 = "くそっ！離せ！"
22100-224 = "おい、チビ！じっとしてないで、反撃しろよ！"
22100-226 = "………"
22100-227 = "ネル先輩…………"
22100-230 = "先生…………"
22100-231 = "[s] \"……アリス。\""
22100-232 = "……！！"
22100-239 = "…………モモイ。"
22100-240 = "ぜんぶ……アリスが、いるから……？"
22100-245 = "アリスが「魔王」だから……おきた、ことですか？"
22100-246 = "……。"
22100-247 = "アリスが……ここにいたら……#n同じことが……"
22100-248 = "…………"
22100-249 = "…………アリスが。"
22100-250 = "………………アリスが、勇者じゃないなら……。"
22100-255 = "………そう、ですね。"
22100-261 = "[ns] \"アリス……？\""
22100-266 = "はい……アリス、すべて理解しました。"
22100-267 = "…………アリスが消えるとします。"
22100-268 = "ダメ！アリスちゃん！"
22100-269 = "アリ、ス……ちゃん……。"
22100-270 = "なっ……チビ、てめぇ……！"
22100-275 = "[ns] \"その必要はないよ、アリス。\""
22100-279 = "いいえ、大丈夫です。"
22100-280 = "アリスは……先生に怪我させたくないです。"
22100-281 = "アリスは……。"
22100-291 = "ミドリもユズも、ネル先輩も、他のみんなも……。"
22100-292 = "怪我、させたくないです。"
22100-293 = "……モモイが、アリスのせいで怪我したとき……胸がとても痛かったです。"
22100-294 = "どうして……なんでこんな事になってしまったのか、アリスにはよく分かりません。"
22100-297 = "でも、それでも……その話を、聞いて……やっと、理解しました。"
22100-298 = "すべては……アリスのせいで起きたということを……"
22100-299 = "アリスがこのままずっといたら……"
22100-300 = "いつか……皆が怪我してしまう。"
22100-301 = "[s] \"リオの言葉を鵜呑みにしなくていい。ちゃんと話し合おう、アリス。\""
22100-302 = "先生……心配しなくても大丈夫です。"
22100-305 = "大丈夫です。アリスは生命体ではないのですから。"
22100-306 = "アリスは、ミレニアムの生徒ではないから。#nいなくなっても、大丈夫です。"
22100-307 = "アリスは……勇者、ではないから………"
22100-308 = "アリスは………だい……じょうぶです。"
22100-313 = "先生、今までありがとうございました。"
22100-314 = "みんな、アリスと一緒に冒険してくれて、ありがとうございました。"
22100-315 = "アリスは………"
22100-319 = "今まで本当に幸せ……でした。"
22100-329 = "それでは――失礼するわ。"
22100-330 = "もしも――先生が、私の行動や言動に傷ついたのであれば……"
22100-331 = "すべてが終わった後、改めて謝罪をさせてちょうだい。"
22100-332 = "では、また――"
22100-338 = "（リオとアリスが完全にその場を去るまで、）"
22100-342 = "（AMASに制圧された私たちは、指一本動かす事もできず――）"
22100-347 = "（そうして、ただただ無力感に打ちひしがれる私たちの前から――）"
22100-352 = "（――アリスは、姿を消した）"
22100-358 = "次回;そんな事どうでもいいの！"
