[translation]
22100-1 = "Episódio 10; Verdades Cruéis (2)"
22100-15 = "Não tem como uns fracassados desses me segurarem!"
22100-19 = "――Como esperado da Neru. Suponho que nem mesmo os AMAS sejam capazes de te deter."
22100-20 = "Eu não queria ter que fazer isso, mas――"
22100-22 = "……Toki."
22100-23 = "Sim, Madame."
22100-24 = "Autorizo o uso do \"Armamento\"."
22100-26 = "Entendido."
22100-31 = "Preparação concluída. Mudando para o \"Modo 2\"."
22100-32 = "Hã? Que confusão toda é essa――"
22100-42 = "Ué? As roupas dela..."
22100-43 = "[ns] \"……A \"aparência\" dela mudou?\""
22100-45 = "……!"
22100-54 = "Foi por ali!?"
22100-69 = "Não vou deixar você escapar……!"
22100-82 = "Tsc, droga…… não consigo acertar……"
22100-83 = "A-ah, ela desapareceu num piscar de olhos……."
22100-89 = "Sua maldita, onde diabos você……"
22100-91 = "Neru-senpai, atrás de você……!"
22100-92 = "……O quê?"
22100-106 = "Gah!!?"
22100-107 = "[s] \"A Neru foi derrotada num instante……\""
22100-109 = "Quando percebi…… ela apareceu de repente……"
22100-110 = "A-ah, ugh……"
22100-115 = "Droga! Me solta!? Quer que eu te quebre inteira!?"
22100-116 = "Se continuar se debatendo assim, seu braço vai acabar virando para uma direção que não deveria, senpai."
22100-117 = "Vocês também, não tentem nada imprudente. #nNão recomendo resistência inútil."
22100-119 = "……Ugh!"
22100-120 = "……!"
22100-123 = "[ns] \"O que é aquilo……?\""
22100-124 = "É um armamento especial que eu mesma criei."
22100-125 = "――Eu não pretendia usá-lo em um lugar como este."
22100-126 = "Vamos, AMAS. #nRecuperem a Alice."
22100-136 = "!!"
22100-137 = "E-ei, espere um pouco……!"
22100-139 = "É melhor não fazer movimentos bruscos."
22100-145 = "Não quero machucar quem não tem nada a ver com isso."
22100-151 = "(Um sobressalto!)"
22100-154 = "[ns] \"Pare com isso, Rio.\""
22100-157 = "――Essa é a minha fala."
22100-158 = "Eu também não quero entrar em conflito."
22100-159 = "Não tenho intenção de ser sua inimiga, nem de ser odiada por você."
22100-160 = "Na verdade, é algo que eu gostaria de perguntar a você."
22100-161 = "Diante de uma situação como esta, Sensei do Schale,"
22100-166 = "não deveria ser você, como adulto, a agir primeiro?"
22100-167 = "[s] \"……O que quer dizer com isso?\""
22100-168 = "Não ser dominado pelas emoções como uma criança, #ne ser capaz de julgar a situação com calma――"
22100-169 = "Não era você, como adulto, quem deveria ter agido?"
22100-170 = "[s] \"Machucar os alunos desse jeito…….\""
22100-171 = "――Até quando você pretende continuar dizendo essas baboseiras!"
22100-172 = "[s] \"……！！\""
22100-173 = "――Não se engane, Sensei."
22100-176 = "\"Aquilo\" não é um ser vivo — não é uma aluna que você deveria proteger."
22100-177 = "Se você sente que é, isso não passa do \"Efeito Eliza\"."
22100-178 = "\"Aquilo\" é uma arma terrível que levará este mundo ao fim."
22100-181 = "Se lhe perguntassem para colocar Alice e todas as alunas de Kivotos em uma balança, a resposta seria óbvia, não seria?"
22100-182 = "……Mesmo assim, se você insiste em não se mover."
22100-183 = "Eu mesma destruirei o halo da Alice. #nOs preparativos já estão prontos."
22100-189 = "……"
22100-190 = "Não é verdade……"
22100-191 = "Não é verdade! A Alice-chan não é uma arma!"
22100-192 = "A Alice-chan é…… uma heroína! #nPorque――"
22100-193 = "A Alice-chan tem a espada de luz…… a \"Supernova\", a prova de que ela é uma heroína!"
22100-195 = "Espada de luz…… aquele brinquedo que o Clube de Engenharia fez?"
22100-196 = "Certo…… se é isso que vocês dizem……"
22100-197 = "Entendo."
22100-205 = "[ns] \"A energia da Supernova…… apagou?\""
22100-206 = "……！"
22100-207 = "Isso é o suficiente, não é?"
22100-208 = "A espada de luz não existe mais."
22100-209 = "Com isso, a prova termina aqui."
22100-210 = "A espada da Alice…… a prova da heroína……"
22100-211 = "Ah, u…… uuu……"
22100-217 = "Midori…… Yuzu……"
22100-223 = "Droga! Me solta!"
22100-224 = "Ei, tampinha! Não fique parada aí, revide!"
22100-226 = "………"
22100-227 = "Neru-senpai…………"
22100-230 = "Sensei…………"
22100-231 = "[s] \"……Alice.\""
22100-232 = "……！！"
22100-239 = "…………Momoi."
22100-240 = "Tudo isso…… aconteceu porque…… a Alice está aqui……?"
22100-245 = "Foi porque a Alice é a \"Rei Demônio\"…… que isso aconteceu?"
22100-246 = "……"
22100-247 = "Se a Alice…… estivesse aqui…… #nO mesmo aconteceria……"
22100-248 = "…………"
22100-249 = "…………A Alice."
22100-250 = "………………Se a Alice não for uma heroína……"
22100-255 = "………Entendo, é isso."
22100-261 = "[ns] \"Alice……?\""
22100-266 = "Sim…… Alice, entendi tudo."
22100-267 = "…………Supondo que a Alice desapareça."
22100-268 = "Não! Alice-chan!"
22100-269 = "Ali, ce…… chan……"
22100-270 = "O quê…… tampinha, sua……!"
22100-275 = "[ns] \"Não há necessidade disso, Alice.\""
22100-279 = "Não, está tudo bem."
22100-280 = "A Alice…… não quer que o Sensei se machuque."
22100-281 = "A Alice……"
22100-291 = "A Midori, a Yuzu, a veterana Neru e todos os outros..."
22100-292 = "Eu não quero que eles se machuquem."
22100-293 = "...Quando a Momoi se machucou por minha causa... meu peito doeu muito."
22100-294 = "Por que... por que as coisas terminaram assim? A Alice não consegue entender direito."
22100-297 = "Mas, ainda assim... depois de ouvir aquela história... eu finalmente entendi."
22100-298 = "Que tudo... aconteceu por causa da Alice..."
22100-299 = "Se a Alice continuar aqui..."
22100-300 = "Algum dia... todos vão acabar se machucando."
22100-301 = "[s] \"Não precisa acreditar cegamente nas palavras da Rio. Vamos conversar direito, Alice.\""
22100-302 = "Sensei... não precisa se preocupar, está tudo bem."
22100-305 = "Está tudo bem. Afinal, a Alice não é um ser vivo."
22100-306 = "A Alice não é uma aluna do Millennium. #nSe eu desaparecer, não tem problema."
22100-307 = "A Alice... não é uma heroína, então..."
22100-308 = "A Alice está... tudo... bem."
22100-313 = "Sensei, muito obrigada por tudo até agora."
22100-314 = "Pessoal, muito obrigada por terem se aventurado comigo."
22100-315 = "A Alice..."
22100-319 = "Eu fui muito feliz... até agora."
22100-329 = "Então, com licença."
22100-330 = "Se por acaso... o Sensei tiver se sentido ferido pelas minhas ações ou palavras..."
22100-331 = "Depois que tudo terminar, por favor, deixe-me pedir desculpas formalmente."
22100-332 = "Então, até mais..."
22100-338 = "(Até que a Rio e a Alice saíssem completamente do local,)"
22100-342 = "(Nós, que fomos subjugados pelos AMAS, não conseguíamos mover nem um dedo...)"
22100-347 = "(E assim, diante de nós, que estávamos apenas tomados por um sentimento de impotência...)"
22100-352 = "(...A Alice desapareceu.)"
22100-358 = "Próximo episódio: Não importa o que aconteça!"
