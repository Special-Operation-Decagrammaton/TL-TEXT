[translation]
22100-1 = "Episódio 10; Verdade Cruel (2)"
22100-15 = "Não tem como uns lixos desses me segurarem!"
22100-19 = "――Como esperado da Neru. Parece que o AMAS por si só não é o suficiente para detê-la."
22100-20 = "Eu não queria ter que fazer isso, mas――"
22100-22 = "......Toki."
22100-23 = "Sim, senhora."
22100-24 = "Autorizo o uso de 'Armamento'."
22100-26 = "Entendido."
22100-31 = "Preparação concluída. Transição para 'Modo 2'."
22100-32 = "Hã? Que bagunça toda é essa que você tá――"
22100-42 = "Hã? As roupas dela..."
22100-43 = "[ns] \"......A 'aparência' dela mudou?\""
22100-45 = "......!"
22100-54 = "Veio de lá!?"
22100-69 = "Não vou deixar você escapar...!"
22100-82 = "Tsc, merda... não acerto nenhum..."
22100-83 = "A, ela desapareceu num piscar de olhos..."
22100-89 = "Sua desgraçada, onde é que você tá...?"
22100-91 = "Neru-senpai, atrás de você...!"
22100-92 = "......O quê?"
22100-106 = "Gwaah!!?"
22100-107 = "[s] \"A Neru foi derrotada num instante...\""
22100-109 = "Quando eu vi... ela apareceu de repente..."
22100-110 = "A, auuh..."
22100-115 = "Merda! Me solta!? Tá querendo que eu quebre o seu braço!?"
22100-116 = "Se você continuar se debatendo desse jeito, Senpai, seu braço vai acabar virando numa direção que não deveria."
22100-117 = "As outras também, por favor, não se movam. #n Não recomendo que ofereçam resistência inútil."
22100-119 = "......Ugh!"
22100-120 = "......!"
22100-123 = "[ns] \"O que é isso, afinal...?\""
22100-124 = "É um armamento especial que eu mesma desenvolvi."
22100-125 = "――Eu não pretendia usar isso em um lugar como este."
22100-126 = "Muito bem, AMAS. #n Capturem a Aris."
22100-136 = "!!"
22100-137 = "E-Ei, espera aí...!"
22100-139 = "É melhor não se mexerem."
22100-145 = "Não quero machucar ninguém que não tenha relação com isso."
22100-151 = "(Tremendo!)"
22100-154 = "[ns] \"Pare com isso, Rio.\""
22100-157 = "――Essa é a minha linha."
22100-158 = "Eu também não desejo entrar em conflito."
22100-159 = "Não tenho a intenção de ser sua inimiga, nem quero que você me odeie."
22100-160 = "Pelo contrário, é isso que eu gostaria de perguntar a você."
22100-161 = "Diante de uma situação como esta, Sensei da Schale,"
22100-166 = "Não deveria ser você, como um adulto, a agir primeiro?"
22100-167 = "[s] \"......O que quer dizer com isso?\""
22100-168 = "Não deveria ser você, um adulto capaz de julgar a situação com calma, sem ser dominado pelas emoções como uma criança... #n quem deveria agir?"
22100-169 = "Que deveria ser você, esse tipo de adulto?"
22100-170 = "[s] \"Machucar as minhas alunas é...\""
22100-171 = "――Até quando você pretende continuar falando essas baboseiras!"
22100-172 = "[s] \"......!!\""
22100-173 = "――Não se iluda, Sensei."
22100-176 = "'Aquilo' não é um ser vivo―― não é uma aluna pela qual você deva ser responsável."
22100-177 = "Se você sente que é, isso nada mais é do que o 'Efeito Eliza'."
22100-178 = "'Aquilo' é uma arma terrível que levará este mundo ao seu fim."
22100-181 = "Se eu lhe perguntasse para colocar 'Aquilo' e todos os alunos de Kivotos em uma balança, a resposta seria óbvia, não seria?"
22100-182 = "......Mesmo assim, se você insistir em não agir."
22100-183 = "Eu mesma destruirei o Halo da Aris. #n Os preparativos já estão prontos."
22100-189 = "......"
22100-190 = "Não é..."
22100-191 = "Não é verdade! A Aris-chan não é uma arma!"
22100-192 = "A Aris-chan... é uma heroína! #n Porque――"
22100-193 = "A Aris-chan tem a Espada de Luz... Ela tem a 'Supernova', a prova de que ela é uma heroína!"
22100-195 = "Espada de Luz... Aquele brinquedo que o Clube de Engenharia fez?"
22100-196 = "Sim... Já que vocês insistem tanto..."
22100-197 = "Muito bem."
22100-205 = "[ns] \"A luz da 'Supernova'... apagou?\""
22100-206 = "......!"
22100-207 = "Isso serve?"
22100-208 = "A Espada de Luz não existe mais."
22100-209 = "Com isso, a prova acabou."
22100-210 = "A espada da Aris... a prova de que ela era uma heroína..."
22100-211 = "Ah, u... ugh..."
22100-217 = "Midori... Yuzu..."
22100-223 = "Merda! Me solta!"
22100-224 = "Ei, baixinha! Não fica aí parada, contra-ataca!"
22100-226 = "........."
22100-227 = "Neru-senpai............"
22100-230 = "Sensei............"
22100-231 = "[s] \"......Aris.\""
22100-232 = "......!!"
22100-239 = "............Momoi."
22100-240 = "Tudo... foi porque a Aris está aqui...?"
22100-245 = "Foi porque a Aris é uma 'Maou' que isso... aconteceu?"
22100-246 = "......"
22100-247 = "Se a Aris... continuasse aqui... #n A mesma coisa..."
22100-248 = "............"
22100-249 = "............Aris."
22100-250 = "..................Se a Aris não for uma heroína..."
22100-255 = ".........É, parece que é isso."
22100-261 = "[ns] \"Aris...?\""
22100-266 = "Sim... A Aris compreendeu tudo."
22100-267 = "............A Aris vai desaparecer."
22100-268 = "Não! Aris-chan!"
22100-269 = "Ari, s... chan..."
22100-270 = "Cê tá de brincadeira... baixinha, você..."
22100-275 = "[ns] \"Não há necessidade disso, Aris.\""
22100-279 = "Não, está tudo bem."
22100-280 = "A Aris... não quer que o Sensei se machuque."
22100-281 = "A Aris..."
22100-291 = "A Midori, a Yuzu, a Neru-senpai, e todos os outros..."
22100-292 = "Eu não quero que ninguém se machuque."
22100-293 = "......Quando a Momoi se machucou por minha culpa... o meu peito doeu tanto."
22100-294 = "Por que... como é que as coisas chegaram nesse ponto, a Aris não entende muito bem."
22100-297 = "Mas, ainda assim... depois de ouvir essa conversa... eu finalmente entendi."
22100-298 = "Tudo aconteceu... porque a Aris está aqui..."
22100-299 = "Se a Aris ficar aqui para sempre..."
22100-300 = "Algum dia... todos vão se machucar."
22100-301 = "[s] \"Não precisa aceitar as palavras da Rio como uma verdade absoluta. Vamos conversar direito, Aris.\""
22100-302 = "Sensei... não precisa se preocupar, está tudo bem."
22100-305 = "Está tudo bem. Porque a Aris não é um ser vivo."
22100-306 = "A Aris não é uma aluna da Millennium. #n Então, se eu desaparecer, está tudo bem."
22100-307 = "Porque a Aris... não é uma heroína..."
22100-308 = "A Aris é... t-tudo bem."
22100-313 = "Sensei, obrigada por tudo até agora."
22100-314 = "Pessoal, obrigada por terem se aventurado junto com a Aris."
22100-315 = "A Aris..."
22100-319 = "Foi... verdadeiramente feliz."
22100-329 = "Então―― peço licença para me retirar."
22100-330 = "Caso―― você, Sensei, tenha se machucado com as minhas ações ou palavras..."
22100-331 = "Por favor, me permita pedir desculpas formalmente depois que tudo isso terminar."
22100-332 = "Então, até mais――"
22100-338 = "(Até que a Rio e a Aris desaparecessem completamente do local,)"
22100-342 = "(Nós, que fomos neutralizados pelo AMAS, sem conseguir mover nem um dedo――)"
22100-347 = "(E assim, diante de nós, tomados pelo sentimento de impotência――)"
22100-352 = "(――A Aris desapareceu)"
22100-358 = "Próximo Episódio; O Cotidiano que Desmoronou"