[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22100-1 = "Episódio 10: A Verdade Cruel (2)"
22100-15 = "Acharam mesmo que uns zé-ninguém desses\niam me segurar!?"
22100-19 = "——Não esperava menos da Neru. Um mero AMAS\nnão é capaz de te deter, é isso."
22100-20 = "Eu não queria ter que fazer isto——"
22100-22 = "……Toki."
22100-23 = "Sim, senhora."
22100-24 = "Autorizo o uso do \"armamento\"."
22100-26 = "Entendido."
22100-31 = "Preparação concluída. Migrando para o \"Modo 2\"."
22100-32 = "Hãã? Que conversa enrolada é es——"
22100-42 = "Ué? A roupa……"
22100-43 = "[ns] \"A \"aparência\"…… mudou?\""
22100-45 = "……!"
22100-54 = "É por aí!?"
22100-69 = "Não vai escapar……!"
22100-82 = "Tch, droga…… não acerto……"
22100-83 = "S-sumiu num piscar de olhos……"
22100-89 = "Sua…… onde é que você se meteu………"
22100-91 = "Veterana Neru, atrás……!"
22100-92 = "……Quê?"
22100-106 = "Guaah!!?"
22100-107 = "[s] \"A Neru, num piscar de olhos……\""
22100-109 = "Quando me dei conta…… ela surgiu de repente……"
22100-110 = "A-aui………"
22100-115 = "Droga! Me solta!? Tá querendo ser destruída!?"
22100-116 = "Se você se debater assim, o seu braço vai dobrar\nnuma direção que não deveria, veterana."
22100-117 = "Vocês também, não façam nenhum movimento em falso.#nResistência inútil não é recomendável."
22100-119 = "……Uh!"
22100-120 = "……!"
22100-123 = "[ns] \"Isso, afinal, é……\""
22100-124 = "É um armamento especial que eu criei."
22100-125 = "——Embora eu não pretendesse usá-lo num lugar destes."
22100-126 = "Vamos, AMAS.#nRecolha a Aris."
22100-136 = "!!"
22100-137 = "P-peraí……!"
22100-139 = "É melhor não fazer movimento em falso."
22100-145 = "Eu não quero ferir uma criança que não tem nada a ver."
22100-151 = "(Estremece!)"
22100-154 = "[ns] \"Para, Rio.\""
22100-157 = "——Essa é a minha fala."
22100-158 = "Eu também não quero confronto algum."
22100-159 = "Não tenho intenção de me opor a você, nem de ser odiada."
22100-160 = "Pelo contrário, é a você que eu gostaria de perguntar."
22100-161 = "Numa situação como esta, Sensei,"
22100-166 = "não deveria ser você, o adulto, o primeiro a agir?"
22100-167 = "[s] \"……Isso, como assim?\""
22100-168 = "Menos dominado pela emoção do que uma criança,#ncapaz de julgar a situação com frieza——"
22100-169 = "não deveria ter sido você, o adulto, a agir?"
22100-170 = "[s] \"Ferir uma aluna, isso eu não………\""
22100-171 = "——Até quando você pretende ficar repetindo esse delírio!"
22100-172 = "[s] \"……!!\""
22100-173 = "——Não me entenda mal, Sensei."
22100-176 = "\"Aquilo\" não é um ser vivo—— não é uma aluna\nque você deva carregar nos ombros."
22100-177 = "Se você sente que é, isso não passa do \"Efeito Eliza\"."
22100-178 = "\"Aquilo\" é uma arma terrível, capaz de levar este\nmundo ao seu fim."
22100-181 = "Se me pedirem pra pôr aquilo e todos os alunos de\nKivotos na balança, a resposta é óbvia, não é?"
22100-182 = "……E, mesmo assim, se você não for agir."
22100-183 = "o Halo da Aris eu destruo com as minhas próprias mãos.#nOs preparativos já estão prontos."
22100-189 = "……"
22100-190 = "Não é……"
22100-191 = "Não é, não! A Aris não é arma nenhuma!"
22100-192 = "A Aris é…… uma heroína!#nPorque——"
22100-193 = "A Aris tem a espada de luz…… a prova do herói,\na \"Supernova\"!"
22100-195 = "A espada de luz…… aquele brinquedo que o Clube de\nEngenharia fez?"
22100-196 = "Sim…… se é isso que vocês dizem……"
22100-197 = "Pois bem."
22100-205 = "[ns] \"A energia da Supernova…… apagou?\""
22100-206 = "……!"
22100-207 = "Assim está bom?"
22100-208 = "A espada de luz já não existe mais."
22100-209 = "Com isto, a prova está encerrada."
22100-210 = "A espada da Aris…… a prova do herói………"
22100-211 = "A-au…… uuh……"
22100-217 = "Midori…… Yuzu………"
22100-223 = "Droga! Me solta!"
22100-224 = "Ei, baixinha! Não fica aí parada, revida!"
22100-226 = "………"
22100-227 = "Veterana Neru…………"
22100-230 = "Sensei…………"
22100-231 = "[s] \"……Aris.\""
22100-232 = "……!!"
22100-239 = "…………Momoi."
22100-240 = "Tudo isso…… é porque a Aris…… existe……?"
22100-245 = "É porque a Aris é o \"Rei Demônio\"…… que aconteceu?"
22100-246 = "……"
22100-247 = "Se a Aris…… continuar aqui……#na mesma coisa……"
22100-248 = "…………"
22100-249 = "…………A Aris."
22100-250 = "………………Se a Aris não é uma heroína……"
22100-255 = "………É verdade, né."
22100-261 = "[ns] \"Aris……?\""
22100-266 = "Sim…… Aris, compreendi tudo."
22100-267 = "…………Vamos supor que a Aris desapareça."
22100-268 = "Não pode! Aris!"
22100-269 = "A-Aris……"
22100-270 = "Q-quê…… baixinha, sua……!"
22100-275 = "[ns] \"Não precisa fazer isso, Aris.\""
22100-279 = "Não, tá tudo bem."
22100-280 = "A Aris…… não quer ferir o Sensei."
22100-281 = "A Aris……"
22100-291 = "A Midori, a Yuzu, a veterana Neru, e todo mundo……"
22100-292 = "eu não quero ferir."
22100-293 = "……Quando a Momoi se machucou por culpa da Aris……\no meu peito doeu muito."
22100-294 = "Por que…… por que chegou a este ponto, a Aris\nnão sabe direito."
22100-297 = "Mas, ainda assim…… ouvindo essa história……\nfinalmente, eu entendi."
22100-298 = "Que tudo…… aconteceu por culpa da Aris……"
22100-299 = "Se a Aris continuar aqui assim……"
22100-300 = "um dia…… todo mundo vai se machucar."
22100-301 = "[s] \"Você não precisa engolir as palavras da Rio. Vamos conversar direito, Aris.\""
22100-302 = "Sensei…… não precisa se preocupar, tá tudo bem."
22100-305 = "Tá tudo bem. Porque a Aris não é um ser vivo."
22100-306 = "A Aris não é aluna da Millennium.#nMesmo que ela desapareça, tá tudo bem."
22100-307 = "A Aris…… não é uma heroína………"
22100-308 = "A Aris………… tá…… tudo bem."
22100-313 = "Sensei, obrigada por tudo até aqui."
22100-314 = "Pessoal, obrigada por terem aventurado junto da Aris."
22100-315 = "A Aris………"
22100-319 = "foi muito feliz…… até agora."
22100-329 = "Então—— com licença."
22100-330 = "Se—— o Sensei se feriu com as minhas ações ou palavras……"
22100-331 = "depois que tudo acabar, deixe-me pedir desculpas formalmente."
22100-332 = "Então, até mais——"
22100-338 = "(Até a Rio e a Aris deixarem completamente o local,)"
22100-342 = "(nós, dominados pelo AMAS, não pudemos mover nem um dedo——)"
22100-347 = "(E assim, diante de nós, abatidos por um puro sentimento de impotência——)"
22100-352 = "(——a Aris desapareceu.)"
22100-358 = "Próximo episódio: Isso Pouco Importa Agora!"