[translation]
10053110-1 = "História posterior, parte 2: Ocultismo não existe!"

10053110-3 = "……."

10053110-8 = "Lena-kun, você parece estar brincando com seu smartphone com entusiasmo, mas talvez seja algo urgente?"

10053110-9 = "Ah, eu mandei o MomoTalk para meus idosos no dormitório..."

10053110-10 = "Pensando bem, no final foi exatamente como eu disse, certo? #n Tsuchinoko afinal não existia. \r\n"

10053110-11 = "Não, existiu. Tsuchinoko está em nossos corações ――\r\n"

10053110-12 = "Eu não estou procurando por isso! ! Porque é uma história sobre o verdadeiro Tsuchinoko! ! \r\n"

10053110-13 = "Ah, se é isso que você quer dizer, então é claro. \r\n"

10053110-14 = "No final, os avistamentos de Tsuchinoko foram todos uma farsa daqueles garotos que estavam lá fora, consertando a ponte."

10053110-15 = "oh sim! É por isso que compartilhei as conclusões da investigação com meus superiores."

10053110-16 = "……Sim? \r\n"

10053110-17 = "Isso deve ajudá-lo a entender um pouco mais que o ocultismo é falso. \r\n"

10053110-18 = "...Não, isso não é completamente contraproducente? \r\n"

10053110-19 = "Ah, recebi uma resposta. Olhe aqui."

10053110-22 = "falta. \r\n\r\n\r\n\r\n\r\n"

10053110-23 = "Nyufufu. \r\n\r\n\r\n\r\n\r\n"

10053110-24 = "Ihihi... \r\n\r\n\r\n"

10053110-27 = "P-por que você está reagindo assim?"

10053110-30 = "Quando soube que Lena-chan estava viajando com as amigas, pensei em uma coisa. \r\n\r\n\r\n\r\n\r\n"

10053110-31 = "Nunca pensei que ele iria tão longe e tentaria provar a coisa oculta chamada Tsuchinoko. \r\n\r\n\r\n\r\n\r\n"

10053110-32 = "Afinal... Lena-chan é um ótimo membro do Okaken... \r\n\r\n\r\n"

10053110-35 = "Não, não! ! Por que você interpreta tudo dessa maneira? ? \r\n"

10053110-36 = "Porque é diferente! ! Não tenho nenhum interesse particular em Tsuchinoko――\r\n"

10053110-43 = "Shhh! Você está dizendo não! ! \r\n\r\n"

10053110-44 = "Por isso eu disse que teve o efeito contrário... \r\n\r\n"

10053110-45 = "...Opa, esqueci. Vamos sair também? Todo mundo já está lá. \r\n"

10053110-46 = "Ei, lá fora? \r\n\r\n\r\n\r\n"

10053110-47 = "...Já é noite? \r\n\r\n\r\n"

10053110-48 = "Vim até aqui até as profundezas da montanha."

10053110-53 = "Só há uma coisa para fazer à noite, certo?"

10053110-58 = "Cosmos Cosmo ―― Aliya Aliari ――"

10053110-59 = "Por favor, atenda ao nosso chamado. \r\n"

10053110-60 = "Cosmos Cosmo――\r\n"

10053110-61 = "Ariyaariari ――\r\n"

10053110-63 = "...? ? ? \r\n"

10053110-64 = "……O que você está fazendo?"

10053110-66 = "Por favor, evite falar em particular. #nSe você misturar pensamentos, será bloqueado pela energia escura do universo! \r\n\r\n"

10053110-67 = "Seres de além da galáxia! Por favor, responda às nossas vozes! \r\n\r\n"

10053110-72 = "...Faça alguma coisa. Você é meu júnior, certo? \r\n\r\n\r\n"

10053110-73 = "Isso é verdade, mas... é difícil impedir que Tsubasa fique assim... \r\n\r\n\r\n\r\n\r\n"

10053110-74 = "É isso. #nVocê já assumiu o papel de ensinar às crianças que Papai Noel não existe? \r\n\r\n\r\n\r\n"

10053110-75 = "Ah... certo. \r\n\r\n\r\n\r\n\r\n"

10053110-76 = "Eu meio que entendo o que você está tentando dizer, mas... \r\n\r\n\r\n"

10053110-78 = "Lá! O feitiço parou! A comunicação está enfraquecendo! \r\n"

10053110-83 = "Ariyaariari ――\r\n"

10053110-84 = "Coloque mais coração nisso! ! \r\n"

10053110-85 = "Cosmos Cosmo――"

10053110-87 = "Mais ooooooooo! ! ! ! \r\n\r\n"

10053110-89 = "Ariya ali ali ――! ! \r\n\r\n\r\n"

