[translation]
10053110-1 = "後日談その2;オカルトなんてない！"
10053110-3 = "……。"
10053110-8 = "レナ君、熱心にスマホをいじっているようだが、急用かね？"
10053110-9 = "あ、寮の先輩たちにモモトーク送ってて……。"
10053110-10 = "そういえば結局、私の言った通りだったでしょ？#nツチノコなんて、やっぱり存在しなかった。\r\n"
10053110-11 = "いいや、ちゃんと存在していたよ。ツチノコは、我々の心の中に――\r\n"
10053110-12 = "そういうの求めてない！！本物のツチノコの話だから！！\r\n"
10053110-13 = "あぁ、そういう意味ならばたしかに。\r\n"
10053110-14 = "結局ツチノコの目撃談は、外で橋を直しているあの子たちのデマだったわけだ。"
10053110-15 = "そうそう！だから調査の結論を先輩たちに教えてあげたの。"
10053110-16 = "……うん？\r\n"
10053110-17 = "オカルトがインチキだって、これで少しは分かってもらえるはず。\r\n"
10053110-18 = "……いや、それは完全に逆効果では？\r\n"
10053110-19 = "あ、返信きた。ほら見て。"
10053110-22 = "あら。\r\n\r\n\r\n\r\n\r\n"
10053110-23 = "にゅふふ。\r\n\r\n\r\n\r\n\r\n"
10053110-24 = "イヒヒッ……。\r\n\r\n\r\n"
10053110-27 = "な、なんでそんな反応なの？"
10053110-30 = "レナちゃんが友達と旅行に行くって聞いて、何かと思えば。\r\n\r\n\r\n\r\n\r\n"
10053110-31 = "まさかそんなに遠くまで行って、ツチノコというオカルトを証明しようとしていただなんて。\r\n\r\n\r\n\r\n\r\n"
10053110-32 = "やっぱり……レナちゃんは立派なオカ研の一員だねぇ……。\r\n\r\n\r\n"
10053110-35 = "いやいや！！なんで全部そういう方向に解釈するわけ！？\r\n"
10053110-36 = "違うから！！別にツチノコなんか全然興味――\r\n"
10053110-43 = "シャーッ！違うって言ってるでしょ！！\r\n\r\n"
10053110-44 = "だから言っただろう、逆効果だと……。\r\n\r\n"
10053110-45 = "……おっと、忘れていた。我々も外へ行こうか。もう全員そろっている。\r\n"
10053110-46 = "え、外？\r\n\r\n\r\n\r\n"
10053110-47 = "……もう夕方だけど？\r\n\r\n\r\n"
10053110-48 = "せっかくこんな山奥まで来たんだ。"
10053110-53 = "夜にやることなんて1つしかないじゃないか。"
10053110-58 = "コスモスコスモ――アリヤアリアリ――"
10053110-59 = "どうか我らの呼びかけに応えたまえ。\r\n"
10053110-60 = "コスモスコスモ――\r\n"
10053110-61 = "アリヤアリアリ――\r\n"
10053110-63 = "……？？？\r\n"
10053110-64 = "……何してるの？"
10053110-66 = "私語は慎みたまえ。#n雑念が混ざると、宇宙の暗黒エネルギーに遮断されてしまうのだよ！\r\n\r\n"
10053110-67 = "銀河の彼方の存在たちよ！我らの声に応えたまえーッ！\r\n\r\n"
10053110-72 = "……なんとかしてよ。後輩でしょ？\r\n\r\n\r\n"
10053110-73 = "そうなんですけど……ああなったツバサを止めるのは難しくて……。\r\n\r\n\r\n\r\n\r\n"
10053110-74 = "あれですよ。#n子どもに「サンタはいない」って教える役回り、やったことあります？\r\n\r\n\r\n\r\n"
10053110-75 = "あー……ね。\r\n\r\n\r\n\r\n\r\n"
10053110-76 = "言いたいことは何となく分かるけどさ……。\r\n\r\n\r\n"
10053110-78 = "そこ！呪文が止まっている！交信が弱まっているぞ！\r\n"
10053110-83 = "アリヤアリアリ――\r\n"
10053110-84 = "もっと心を込めて！！\r\n"
10053110-85 = "コスモスコスモ――"
10053110-87 = "もっとぉぉぉぉぉぉぉぉぉ！！！！\r\n\r\n"
10053110-89 = "アリヤアリアリ――！！\r\n\r\n\r\n"
