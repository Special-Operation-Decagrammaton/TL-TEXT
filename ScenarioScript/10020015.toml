[translation]
10020015-5 = "第1エリアの「次元エンジン」、破壊成功だよ！！"
10020015-13 = "[ns] \"ま、待って！！\""
10020015-14 = "し、シロコさんは撤退……姿を、消しました。"
10020015-15 = "[ns] \"…………。\""
10020015-17 = "シロコちゃん、また逃げたんですね……"
10020015-18 = "はい……先生が手を打つ隙もありませんでした……"
10020015-20 = "まあ、大丈夫なんじゃないかな。 "
10020015-21 = "シロコちゃんがあちこちで邪魔してくるっていうなら、#n私たちは箱舟を壊せばいいだけなんだし。"
10020015-22 = "そうしたら、最後は必ず私たちの前に現れる。"
10020015-23 = "その時、ちゃんと話し合いをすればいいんだよ。"
10020015-24 = "全部破壊していったら、逃げ場もなくなるだろうからね～"
10020015-25 = "そ、それはそうだけど……なんか「捕獲」に張り切りすぎじゃない？"
10020015-33 = "今のところ占領戦の状況は悪くないね。"
10020015-34 = "第1エリアは無事占領したし、「次元エンジン」の破壊も成功。#nなかなか良いスタートじゃないかな。"
10020015-35 = "箱舟の約4分の1の演算機能を、自分たちのものにできたわけだし。"
10020015-36 = "ええ――これで、私たちも今まで以上に色々な事ができるようになりました。"
10020015-37 = "そうだね。まず、この周辺の防衛が楽になると思う。#nこれからは、私たちが構築した防衛システムがある程度守ってくれるからね。"
10020015-39 = "はぁ……よかったぁ～#nこれで、やっと休める…… "
10020015-40 = "それに、次のエリアへ進む事もできます。"
10020015-41 = "第2エリアだっけ？#nなーんだ、結構順調じゃん？"
10020015-43 = "……しかし、最後まで油断はできません。 "
10020015-44 = "それでは、「アトラ・ハシースの箱舟」第2エリアに突入します。"
10020015-45 = "先生は引き続き、指揮をお願いします！"
