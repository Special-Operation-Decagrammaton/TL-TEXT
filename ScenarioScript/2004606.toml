[translation]
2004606-1 = "天地は只そこにあるなり"
2004606-2 = "（道すがら、一変した街並みを眺めていた）"
2004606-3 = "（綺麗になったのはもちろんのこと、お祭りの前よりも鮮やかで華やかな印象を受けた）"
2004606-7 = "[ns] \"これって……折り紙？\""
2004606-8 = "お～い！こっちの飾り付け、終わったぞ～！こんな感じでいいんだよな？"
2004606-10 = "は、はい！ばっちりです！#n……でも、本当にいいんですか？"
2004606-11 = "こんな人通りの多い道の……それも、ど真ん中に私たちの作品を置かせてもらうなんて……。"
2004606-12 = "いやいや、感謝してもしきれないくらいですよ！#n荒れた街をどうしようか、頭を抱えてましたからね。"
2004606-13 = "今日からここは「折り紙ストリート」として再出発です！#n話題になれば、「折り紙祭り」なんてのも夢じゃないですよ！"
2004606-14 = "折り紙祭り……！そんな風に認められるなんて、初めてです……えへへ。"
2004606-18 = "話の途中で悪いんだけどさ、アタシらの報酬は？"
2004606-19 = "ああ、あなたはエキストラ部の！その節は大変失礼しました。"
2004606-20 = "まさか報酬が未払いのままだったなんて……。#n今回の報酬とあわせて、しっかりお支払いさせてもらいますから！"
2004606-21 = "いいってことよ。魑魅一座がどう見られてるかはよく分かってるからな。"
2004606-22 = "それに、アタシらが「エキストラ部」になれたのも商人会のお陰らしいじゃんか。#nアタシらの活躍を証言してくれたって聞いたぜ。"
2004606-23 = "それくらいお安いご用です。"
2004606-24 = "次の公演もよろしく頼みますよ！"
2004606-25 = "もちろん！"
2004606-27 = "（賑やかな通りを抜けて……）"
2004606-29 = "ほ、本当に……部室を交換してくれるんですか？"
2004606-30 = "こんな場所で、幽霊が出るって噂まであるのに……。"
2004606-31 = "泣く子も黙る元魑魅一座が、幽霊ごときでビビるわけないだろ！#nまっ、今はエキストラ部だけどな！"
2004606-32 = "それに、練習のたびに「うるさい！」って苦情が来る場所より、思いっきり騒げるアジトの方が性に合ってるってもんさ！"
2004606-34 = "（部室問題の解決を喜ぶ生徒たちを横目に……陰陽部の部室に向かった）"
2004606-36 = "なるほど～そんなことになっているとは。"
2004606-37 = "ほっといても丸く収まるものですねぇ♪"
2004606-38 = "[s] \"まだそうやってはぐらかすの？\""
2004606-39 = "はて、なんのことだか？"
2004606-40 = "私はなぁんにもしてませんよぉ？先生に叱られてたくらいじゃないですか？"
2004606-41 = "もしぜ～んぶ上手くいっているとしたら――"
2004606-42 = "たまたま絶妙なタイミングで、絶妙な場所にピースが揃っただけ。"
2004606-43 = "こういうのを「陰陽の調和」って言うんじゃないですかね、にゃはは～♪"
2004606-44 = "……んー、先生、まだ腑に落ちていない顔ですね？"
2004606-48 = "では、この質問をもう一度。#n……先生は百鬼夜行をどう思いますか？"
2004606-49 = "[s1] \"美しい場所だと思うよ。\"\n[s2] \"そんなに平和だとは思えないけど。\""
2004606-52 = "ですよねぇ～。百鬼夜行ってやっぱり魅力的ですもんね。"
2004606-53 = "四季折々の自然、毎日のように楽しいお祭り、生徒たちは自分の好きなことに全力で取り組む！"
2004606-54 = "こんな素敵な学院が存続しているのは――"
2004606-55 = "やっぱり運が良いからでしょうね、にゃははっ！"
2004606-56 = "今回みたいな絶妙な偶然が積み重なって、この学院は成り立っているんです。"
2004606-57 = "……う～ん、この答えでも足りませんか？"
2004606-58 = "では、こうしましょうか！どうしても誰かの手柄にするなら……。"
2004606-59 = "陰で黙々と頑張ってくれた、みんなのおかげってことで～♪"
2004606-60 = "[ns] \"……。\""
2004606-61 = "とまぁ、たまにはこんな大団円もいいのかなぁ……なんて。"
2004606-62 = "にゃはは……そ、それはそうとですね？"
2004606-63 = "騒ぎは解決したし、みんななんだかんだ幸せそうだし〜"
2004606-64 = "今日のお説教は……どうでしょう、ひとつお見逃しを～？"
2004606-65 = "[ns] \"ニヤ……。\""
2004606-68 = "に、にゃは……？"
2004606-69 = "[ns] \"よく頑張ったね。\""
2004606-70 = "にゃはっ！？"
2004606-78 = "（その後、ニヤの頭を容赦なく撫で続けた）"
