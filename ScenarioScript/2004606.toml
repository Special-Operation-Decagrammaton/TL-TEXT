[translation]
2004606-1 = "O céu e a terra estão simplesmente onde estão."
2004606-2 = "（Enquanto caminhava, observava as ruas que haviam mudado completamente.）"
2004606-3 = "（Não só ficaram bonitas, como também pareciam mais vibrantes e esplendorosas do que antes do festival.）"
2004606-7 = "[ns] \"Isso é... origami?\""
2004606-8 = "Ei! A decoração deste lado terminou! Está bom assim, não está?"
2004606-10 = "S-sim! Está perfeito! #n...Mas, tem certeza mesmo?"
2004606-11 = "Deixar nossas obras bem no meio de uma rua tão movimentada como esta..."
2004606-12 = "Não, não, não temos como agradecer o suficiente! #nEu estava quebrando a cabeça sobre o que fazer com a cidade destruída."
2004606-13 = "A partir de hoje, este lugar recomeça como a \"Rua do Origami\"! #nSe virar um assunto popular, o \"Festival do Origami\" não é apenas um sonho!"
2004606-14 = "Festival do Origami...! É a primeira vez que somos reconhecidas dessa forma... hehe."
2004606-18 = "Desculpe interromper a conversa, mas e quanto ao nosso pagamento?"
2004606-19 = "Ah, você é do Clube de Extras! Peço mil desculpas por aquele incidente."
2004606-20 = "Eu não fazia ideia de que o pagamento ainda estava pendente... #nVamos pagar tudo corretamente, junto com a recompensa de agora!"
2004606-21 = "Esquece isso. Eu sei muito bem como o Grupo Chimi é visto."
2004606-22 = "Além disso, parece que só conseguimos nos tornar o \"Clube de Extras\" graças à Associação de Comerciantes. #nOuvi dizer que vocês testemunharam a nosso favor."
2004606-23 = "Isso não foi nada demais."
2004606-24 = "Conto com vocês para a próxima apresentação também!"
2004606-25 = "Com certeza!"
2004606-27 = "（Atravessando a rua movimentada...）"
2004606-29 = "V-vocês realmente... vão trocar de sala com a gente?"
2004606-30 = "Mesmo sendo um lugar assim, e com rumores de que é assombrado..."
2004606-31 = "O antigo Grupo Chimi, que fazia até as crianças pararem de chorar, não vai se assustar com um fantasma qualquer! #nBem, agora somos o Clube de Extras, claro!"
2004606-32 = "Além disso, um esconderijo onde podemos fazer barulho à vontade combina muito mais com a gente do que um lugar onde recebemos reclamações toda vez que treinamos!"
2004606-34 = "（Olhando de relance para as alunas que celebravam a resolução do problema da sala do clube... segui em direção à sala do Clube Yin-Yang.）"
2004606-36 = "Entendo~ Então foi isso que aconteceu."
2004606-37 = "As coisas acabaram se resolvendo sozinhas, não é mesmo?♪"
2004606-38 = "[s] \"Ainda vai continuar se esquivando?\""
2004606-39 = "Ora, do que você está falando?"
2004606-40 = "Eu não fiz absolutamente nada, sabe? Não foi você quem levou uma bronca do Sensei?"
2004606-41 = "Se tudo deu certo no final, então..."
2004606-42 = "Foi apenas uma coincidência de peças se encaixando no momento e lugar perfeitos."
2004606-43 = "Não é isso que chamam de \"Harmonia Yin-Yang\"? Nyaha~♪"
2004606-44 = "...Hmm, Sensei, você ainda está com uma cara de quem não está convencido, não é?"
2004606-48 = "Então, farei esta pergunta mais uma vez. #n...O que você acha de Hyakkiyako, Sensei?"
2004606-49 = "[s1] \"Acho que é um lugar lindo.\" \n[s2] \"Não acho que seja tão pacífico assim.\""
2004606-52 = "Pois é, né~ Hyakkiyako é realmente um lugar fascinante."
2004606-53 = "A natureza das quatro estações, festivais divertidos quase todos os dias, e as alunas se dedicando ao que amam!"
2004606-54 = "O fato de uma academia tão maravilhosa continuar existindo..."
2004606-55 = "Deve ser porque temos muita sorte, nyaha!"
2004606-56 = "Esta academia se sustenta graças ao acúmulo de coincidências perfeitas como a de hoje."
2004606-57 = "...Hmm, essa resposta ainda não é o suficiente?"
2004606-58 = "Então, vamos fazer assim! Se você insiste em dar o crédito a alguém..."
2004606-59 = "Que seja graças a todos que trabalharam duro silenciosamente nos bastidores~♪"
2004606-60 = "[ns] \"...\""
2004606-61 = "Enfim, às vezes um final feliz como este também é bom... eu acho."
2004606-62 = "Nyaha... a-aliás, sobre isso..."
2004606-63 = "A confusão foi resolvida e todos parecem felizes, de um jeito ou de outro~"
2004606-64 = "Que tal... você deixar passar o sermão de hoje?"
2004606-65 = "[ns] \"Sorriso malicioso...\""
2004606-68 = "N-nyaha...?"
2004606-69 = "[ns] \"Você se esforçou muito.\""
2004606-70 = "Nyahah!?"
2004606-78 = "(Depois disso, continuei acariciando a cabeça da Niya sem piedade)"
