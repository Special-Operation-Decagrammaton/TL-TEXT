[translation]
2004302-1 = "E assim, a aventura gastronômica começou."
2004302-4 = "Sensei! Por aqui, por aqui!"
2004302-5 = "[s] \"Feliz Ano Novo, Izumi. Parece estar bem.\""
2004302-6 = "Feliz Ano Novo!#nOlha só, veja este furisode!"
2004302-7 = "Poder encontrar o Sensei e mostrar meu traje festivo assim... estou muito feliz!"
2004302-12 = "（Izumi, que mostrava seu quimono enquanto se divertia, de repente me abraçou）"
2004302-13 = "[ns] \"O furisode combina muito com você. Então, o que houve hoje?\""
2004302-14 = "Hehehe... na verdade, eu descobri uma nova combinação gastronômica."
2004302-18 = "[ns] \"Menta, chocolate e... isso é?\""
2004302-19 = "Fufufu... não é nada menos que..."
2004302-20 = "Takoyaki de sardinha com limão, menta e chocolate! É isso!"
2004302-21 = "[s] \"Sardinha com menta e chocolate... hein?\""
2004302-22 = "Takoyaki de sardinha com limão, menta e chocolate!"
2004302-23 = "Sardinha e takoyaki são deliciosos, mas os sabores não parecem um pouco distantes?"
2004302-24 = "Por isso eu fiz um arranjo."
2004302-25 = "Adicionei limão para ficar refrescante... e então, ao colocar o molho de menta com chocolate..."
2004302-26 = "Achei que o equilíbrio ficaria perfeito!"
2004302-27 = "Tcharam!#nViu, os sabores se harmonizaram, não é?"
2004302-28 = "[s1] \"S-será mesmo...?\"\n[s2] \"T-talvez seja...\""
2004302-31 = "Viu só!#nQuando o sabor fica exatamente como eu imaginei, eu penso: 'Consegui!'"
2004302-32 = "O motivo de combinar sardinha com takoyaki?"
2004302-36 = "Se você combina duas coisas deliciosas, não fica imbatível?"
2004302-37 = "[s] \"É bom tentar coisas novas.\""
2004302-38 = "Humph!#nAfinal, somos o Clube de Pesquisa Gastronômica!"
2004302-39 = "O Clube de Pesquisa Gastronômica é um clube que busca várias formas de comer, sabe."
2004302-40 = "Nossa missão é descobrir se não existe um jeito mais gostoso de comer algo, ou explorar arranjos interessantes!"
2004302-41 = "Foi a Haruna quem disse!"
2004302-42 = "…Bem, cada uma de nós tem um jeito diferente de aproveitar."
2004302-43 = "Por exemplo, a Haruna, além do sabor da comida em si—"
2004302-44 = "ela valoriza a possibilidade de ter uma nova experiência!"
2004302-45 = "Para a Akari, a quantidade é o que importa acima de tudo—"
2004302-46 = "Ah, mas tem que ser gostoso também.#nEsse tipo de coisa é bem a cara do Clube de Pesquisa Gastronômica, né?"
2004302-47 = "A Junko—"
2004302-48 = "Como ela sempre é interrompida quando tenta comer, ela valoriza encontrar um jeito de comer com calma."
2004302-49 = "Eu... hum, acho que o que mais gosto é encontrar sabores diferentes!"
2004302-50 = "[s] \"Entendo, cada uma tem suas prioridades inegociáveis.\""
2004302-51 = "Exatamente! Buscar a gastronomia é divertido.#nClaro, eu também gosto dos sabores clássicos, mas..."
2004302-52 = "Procurar algo que ninguém nunca provou é muito divertido."
2004302-53 = "Além disso, uma vida comendo sempre a mesma coisa é entediante, não é?"
2004302-54 = "Costumam dizer que meu paladar é estranho, mas... acho que basta eu achar gostoso. Continuar buscando isso não é a própria 'gastronomia'?"
2004302-55 = "[s] \"É uma verdadeira aventura gastronômica.\""
2004302-56 = "Aventura...?"
2004302-61 = "Isso! Era exatamente isso que eu queria dizer! Como esperado do Sensei!"
2004302-62 = "Então, vamos lá—"
2004302-63 = "Rumo à aventura gastronômica!"
2004302-67 = "（Um pouco de insegurança passou pela minha mente, mas...）"
2004302-68 = "（Ao ver o sorriso radiante da Izumi, esse sentimento desapareceu）"
2004302-69 = "Então, experimente o takoyaki de sardinha com limão, menta e chocolate—"
2004302-74 = "Coloque este pó e coma!"
2004302-75 = "Isso? Isso é... pó de 'alcaçuz salgado'!"
2004302-76 = "[s3] \"O que é isso!?\"\n[s4] \"Eu nem consigo imaginar que tipo de gosto isso vai ter!?\""
2004302-79 = "Não é só uma bala de alcaçuz salgada comum!"
2004302-80 = "Bem... dizem que tem amônio? e cloreto? nela!"
2004302-81 = "[s] \"Isso... é realmente seguro de comer?\""
2004302-82 = "Está tudo bem!#nÉ uma bala que também era usada como remédio para tosse!"
2004302-83 = "Não deve ser bom para a saúde?#nSe você está tão curioso, por que não tenta comer a versão sem o pó?"
2004302-84 = "Aqui, pegue!"
2004302-89 = "（Izumi jogou a bala na minha boca!）"
2004302-90 = "（Era uma bala com um sabor misterioso...）"
2004302-91 = "[ns] \"Hmm... surpreendentemente?\""
2004302-94 = "E então, Sensei? Não é gostoso?"
2004302-95 = "Não é só doce..."
2004302-96 = "Nem só salgado, é um sabor requintado!"
2004302-97 = "É um pouco diferente de agridoce, né."
2004302-98 = "Isso... se fosse para dar um nome, seria sabor surpresa!"
2004302-99 = "O equilíbrio perfeito entre o amônio? e o cloreto? é o ponto chave!"
2004302-100 = "Já que você entendeu o sabor, vou colocar o pó no takoyaki agora~!"
2004302-105 = "......mastigando."
2004302-109 = "Uau! Sensei, tem um gosto misterioso!"
2004302-110 = "[ns] \"Fico feliz que tenhamos descoberto um novo sabor.\""
2004302-112 = "（Depois disso, Izumi continuou colocando seus temperos peculiares em várias comidas de barracas e comendo――）"
2004302-113 = "（Prometemos nos encontrar para a próxima \"aventura gastronômica\" e nos despedimos）"
