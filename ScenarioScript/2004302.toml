[translation]
2004302-1 = "そして美食の冒険は始まった"
2004302-4 = "先生！こっちこっち～！"
2004302-5 = "[s] \"あけましておめでとう、イズミ。元気そうだね\""
2004302-6 = "あけましておめでとうございます！#n見て見て、この振袖！"
2004302-7 = "先生に会えて、こうして晴れ着も見せられて……すっごく嬉しい～！"
2004302-12 = "（はしゃぎながら着物を見せてくれていたイズミが、突然抱きついてきた）"
2004302-13 = "[ns] \"振袖よく似合ってるよ。それで、今日はどうしたの？\""
2004302-14 = "えへへ……実はね、新しい美食の組み合わせを見つけたの。"
2004302-18 = "[ns] \"ミントとチョコと……これは？\""
2004302-19 = "ふっふっふ……何を隠そうこれは……。"
2004302-20 = "特製ミントチョコイワシレモンたこ焼き！なんだよ！"
2004302-21 = "[s] \"ミントチョコイワシ……えっ？\""
2004302-22 = "ミントチョコイワシレモンたこ焼き！"
2004302-23 = "イワシもたこ焼きも美味しいけど、ちょっと味が離れちゃうでしょ？"
2004302-24 = "だからアレンジしてみたの。"
2004302-25 = "爽やかになるようにレモンを添えて……そこにミントチョコソースをかけたら……。"
2004302-26 = "いい感じにバランスが取れるんじゃないかなって！"
2004302-27 = "じゃーん！#nほら、味がまとまったでしょ？"
2004302-28 = "[s1] \"そ、そうかな……？\"\n[s2] \"そ、そうかも……。\""
2004302-31 = "でしょでしょ！#n想像通りの味になると、やったー！ってなるんだ。"
2004302-32 = "イワシとたこ焼きを合わせた理由？"
2004302-36 = "美味しいもの同士を組み合わせたら最強じゃない？"
2004302-37 = "[s] \"色々挑戦するのはいいことだね。\""
2004302-38 = "えっへん！#nこれでも美食研究会ですから！"
2004302-39 = "美食研究会は、色んな食べ方を追求する部活だからね。"
2004302-40 = "もっと美味しい食べ方はないかな～、とか、面白いアレンジを開拓するのが私たちの使命？なんだって！"
2004302-41 = "ハルナが言ってた！"
2004302-42 = "……まぁ、みんなそれぞれ楽しみ方がバラバラなんだけどね。"
2004302-43 = "例えば、ハルナなんかは料理そのものの味以外にも――"
2004302-44 = "新しい体験ができることを大切にしてるんだって！"
2004302-45 = "アカリは、とにかく量が一番で――"
2004302-46 = "あ、でも美味しくないとダメみたい。#nそういうところは、やっぱり美食研究会っぽいよね。"
2004302-47 = "ジュンコは――"
2004302-48 = "食べようとしたら邪魔が入っちゃうことが多いから、どうすれば落ち着いて食べられるのかを大切にしてるんだって。"
2004302-49 = "私は……うーん、色んな味に出会えることが一番、かな！"
2004302-50 = "[s] \"なるほど、それぞれ譲れないものが違うんだね。\""
2004302-51 = "そうなの！美食を追求するのって楽しいよ。#nもちろん、定番の味も好きなんだけど……。"
2004302-52 = "誰も味わったことがないものを探すのって、楽しいんだ。"
2004302-53 = "それに、毎日同じ味ばっかの人生って、つまんないじゃん！"
2004302-54 = "人と味覚がズレてるとはよく言われるけど……自分が美味しいと思えればそれでいいと思うし。それを追求し続けるのって「美食」じゃない？"
2004302-55 = "[s] \"まさに美食の冒険だね。\""
2004302-56 = "冒険……？"
2004302-61 = "そう！そういうことが言いたかったの！さすが先生！"
2004302-62 = "それじゃあ、改めて――"
2004302-63 = "美食の冒険へ、いざゆかーん！"
2004302-67 = "（少しだけ不安がよぎったけど……）"
2004302-68 = "（イズミの眩しい笑顔を見たら、そんな気持ちも吹き飛んでしまった）"
2004302-69 = "じゃあ、ミントチョコイワシレモンたこ焼きを――"
2004302-74 = "この粉をかけて食べてみて！"
2004302-75 = "これ？これはね……「塩味のリコリスキャンディ」パウダー！"
2004302-76 = "[s3] \"なにそれ！？\"\n[s4] \"どんな味になるのか想像できないんだけど！？\""
2004302-79 = "ただの塩味のリコリスキャンディじゃないんだよ！"
2004302-80 = "えっと……アンモニウム？とクロライド？が入ってるんだって！"
2004302-81 = "[s] \"それ……本当に食べていいの？\""
2004302-82 = "大丈夫！#n咳止めの薬としても使われてたキャンディだからね！"
2004302-83 = "健康にも良いんじゃないかな？#nそんなに気になるなら、パウダーじゃない方を食べてみる？"
2004302-84 = "はい、どうぞ！"
2004302-89 = "（イズミからキャンディを口に放り込まれた！）"
2004302-90 = "（不思議な味のキャンディだった……）"
2004302-91 = "[ns] \"ん……意外と？\""
2004302-94 = "どう、先生？美味しくない？"
2004302-95 = "甘いだけでも……。"
2004302-96 = "しょっぱいだけでもない絶妙な味！"
2004302-97 = "甘じょっぱいともちょっと違うんだよね。"
2004302-98 = "そう……名前をつけるなら、サプライズ味！"
2004302-99 = "アンモニウム？とクロライド？の絶妙な味のバランスがポイントなの！"
2004302-100 = "味が分かったら、パウダーの方をたこ焼きにかけていくよ～！"
2004302-105 = "……もぐもぐ。"
2004302-109 = "わ！先生、不思議な味がするよ！"
2004302-110 = "[ns] \"新しい味を見つけられたみたいで良かった。\""
2004302-112 = "（イズミはその後も、いろんな屋台の食べ物に自分流のスパイスをかけて食べ――）"
2004302-113 = "（次の「美食の冒険」に付き合う約束をして解散した）"
