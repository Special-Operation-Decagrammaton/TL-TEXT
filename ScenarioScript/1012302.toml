[translation]
1012302-1 = "移ろいゆくもの"
1012302-2 = "夕方、シャーレ・建物前"
1012302-3 = "（少しの不安を覚えつつ、セイアを待っていた）"
1012302-8 = "出迎えとは、手厚い歓迎だね。"
1012302-9 = "ここまでしてもらうのは本意ではなかったが……#nちょうど、手間が省けたよ。"
1012302-10 = "[s1] \"セイア……！？\"\n[s2] \"スポーツカー……！？\""
1012302-19 = "[ns3] \"……水着！？\"\n[ns4] \"えっ！？これは……どういう？\""
1012302-22 = "詳しい話は後にしよう。"
1012302-23 = "君さえ良ければ、隣に座ってもらえるかい？"
1012302-27 = "……本当に、君は表情によく出るな。"
1012302-28 = "案ずることはないさ。ただのドライブだからね。"
1012302-29 = "まずは人目のつかないところへ移動するとしよう。#nここでは、余計な衆目を集めかねない。"
1012302-30 = "……ん？"
1012302-31 = "あぁ、この車か。"
1012302-32 = "成程、先生には話してなかったな。"
1012302-33 = "これでも、運転する機会はそれなりに多くてね。"
1012302-34 = "車以外にも……バイク、ヨット、色々あるが――"
1012302-39 = "まぁ、それらは別の機会に。#n今日のところは……ほら、座りたまえよ。特等席だ。"
1012302-40 = "[s5] \"う、うん……。\"\n[s6] 助手席に座る。"
1012302-49 = "ふふ……。"
1012302-50 = "では、行こうか。"
1012302-54 = "（走り出した車は郊外へと向かった）"
1012302-55 = "（セイアは微笑んだまま、しばらく一言も発さなかった）"
1012302-56 = "もうすぐで目的地だ。存外、スムーズに来られたな。"
1012302-57 = "ふむ……。"
1012302-58 = "どうやら、海は私たちを歓迎してくれているらしい。"
1012302-67 = "[wa:1530]― [log=세이아 수영복]良い風だ。[/log]"
1012302-69 = "[wa:1150]― [log=세이아 수영복]やはり、[wa:1220]心なしか[wa:820]涼やかに感じられる。[/log]"
1012302-72 = "― [log=세이아 수영복]邪魔するものはなく……[/log]"
1012302-74 = "[wa:330]― [log=세이아 수영복]この世界は[wa:670]私たちだけのものだ。[/log]"
1012302-77 = "[wa:1160]― [log=세이아 수영복]助手席からの眺めは[wa:1290]美しいかな？[/log]"
1012302-80 = "― [log=세이아 수영복]その表情は……[/log]"
1012302-82 = "[wa:1030]― [log=세이아 수영복]景色に驚いているのかい？[/log]"
1012302-85 = "[wa:1470]― [log=세이아 수영복]それとも……[/log]"
1012302-87 = "― [log=세이아 수영복]私の誘いが[wa:880]意外だったのかな？[/log]"
1012302-90 = "[wa:1380]― [log=세이아 수영복]どちらにせよ、[wa:1750]その顔を拝めただけで[wa:1400]満足だ。[/log]"
1012302-92 = "[wa:160]― [log=세이아 수영복]こうして誘った甲斐が[wa:1130]あったというものだね。[/log]"
1012302-95 = "― [log=세이아 수영복]大それた理由を求められても[wa:1560]困ってしまうな。[/log]"
1012302-97 = "― [log=세이아 수영복]気の向くままに……[wa:2170]それだけのことさ。[/log]"
1012302-100 = "[wa:670]― [log=세이아 수영복]こういうのを、[wa:1470]何と言ったかね……[/log]"
1012302-103 = "― [log=세이아 수영복]ふむ……[wa:2090]逃避行？[/log]"
1012302-106 = "[wa:250]― [log=세이아 수영복]ふふ……[wa:1500]冗談さ。[/log]"
1012302-109 = "― [log=세이아 수영복]けれど、[wa:1530]まだしばらくは……[/log]"
1012302-111 = "[wa:600]― [log=세이아 수영복]そうだな。[/log]"
1012302-114 = "[wa:220]― [log=세이아 수영복]君を送り返すまでは、[/log]"
1012302-116 = "― [log=세이아 수영복]この「戯れ」に[wa:970]付き合ってもらうとしようか。[/log]"
1012302-119 = "さあ、到着だ。"
1012302-126 = "急を要すること。そう言って君に時間を作ってもらったわけだが――"
1012302-127 = "特別、問題が起きているわけではないんだ。#nそうだな……。"
1012302-128 = "季節は移ろうもの。#n[ruby=いま]現在[/ruby]このひとときを、この景色を……共に感じたくてね。"
1012302-129 = "……肩透かしを食らった気分かい？"
1012302-130 = "無暗やたらに気を揉ませていたのなら、申し訳ない。"
1012302-131 = "[s7] \"まあ、ちょっとは驚いたけど……。\"\n[s8] \"最初からそう言ってくれればよかったのに。\""
1012302-134 = "ふふ……。"
1012302-135 = "ふふふ……。"
1012302-136 = "……ああ、済まない。ただ、つい楽しくなってしまって。"
1012302-137 = "以前の先生なら「何事もなくてよかったよ」などと、月並みな言葉を口にしていたはずだからね。"
1012302-138 = "今は……そうでもないらしい。"
1012302-139 = "まあ、然もありなん。#nこれまで、あれやこれやと君にちょっかいを出してきたからな。"
1012302-140 = "これを、どう形容したものか……。"
1012302-141 = "他人同士の距離感は可変するものだ。#n親しくなり、近づくこともあれば、無論、その逆も然り。"
1012302-142 = "君は……私の戯れに流されるままではなく、ちゃんと「抗議」をしてくれるようになった。"
1012302-143 = "或いは……私が、そんな小言を待ち望んでいたのかもしれない。"
1012302-144 = "純真無垢に羽目を外して、悪戯を咎められ、ときには叱られる――#nまるで、手のかかる生徒のようにね。"
1012302-145 = "……こういうのはなんと言うのだったか。"
1012302-146 = "[s9] \"……はぁ。\"\n[s10] わざと深いため息をつく。"
1012302-152 = "……！！！"
1012302-153 = "ふふ、ふふふ……。"
1012302-154 = "成程……斯様な感覚だったとは。"
1012302-155 = "今まで見過ごしていたことが惜しまれるよ。#nだが、遅きに失するという程でもあるまい……これは、いよいよ癖になりそうだね。"
1012302-160 = "……冗談だ。"
1012302-161 = "いや、厳密に言えば気持ちは本物だ。#nとはいえ、私にだって節度というものはある。"
1012302-162 = "[s11] \"度が過ぎると先生も怒りますよ？\"\n[s12] \"……なんてね。これくらいなら全然構わないよ。\""
1012302-168 = "……君は底が知れないな。"
1012302-169 = "先生がその気なら、私も考え直すとしよう。"
1012302-170 = "生徒の主体性に委ねてはぐらかす。#nまさに、先生の常套手段じゃないか。"
1012302-171 = "[s13] \"セイアが望む答えをしたまでだよ。\"\n[s14] \"こういうのが好きなんじゃなかった？\""
1012302-174 = "……ふふっ。"
1012302-175 = "風が冷たくなってきた。そろそろ戻ろうか。#n現実からの逃避行もこれで閉幕だ。"
1012302-180 = "次回は……まだ保証できないけれど。"
1012302-183 = "（その後、セイアはシャーレまで送り届けてくれた）"
1012302-184 = "（ドライブの間、彼女は終始無言だったものの……別れ際に一度だけ、微笑んだのだった）"
