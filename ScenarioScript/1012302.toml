[translation]
1012302-1 = "coisas que mudam"

1012302-2 = "À noite, em frente à placa de Petri/edifício"

1012302-3 = "(Eu estava esperando por Seia, me sentindo um pouco ansioso)"

1012302-8 = "É uma recepção calorosa."

1012302-9 = "Eu realmente não pretendia que você fosse tão longe, mas...#nIsso só me poupou muitos problemas."

1012302-10 = "[s1] \"Seia...!?\"\n[s2] \"Carro esportivo...!?\""

1012302-19 = "[ns3] \"...Maiô!?\"\n[ns4] \"O quê!? O que é isso...?\""

1012302-22 = "Falarei sobre os detalhes mais tarde."

1012302-23 = "Se você estiver bem com isso, você poderia sentar ao meu lado?"

1012302-27 = "...Você realmente fica bem no seu rosto."

1012302-28 = "Não há nada com que se preocupar. É apenas uma viagem."

1012302-29 = "Vamos começar indo para algum lugar fora do caminho. #nHá o risco de atrair atenção desnecessária aqui."

1012302-30 = "……sim?"

1012302-31 = "Ah, esse carro?"

1012302-32 = "Entendo, não contei ao professor."

1012302-33 = "Mesmo com isso, ainda tenho muitas oportunidades de dirigir."

1012302-34 = "Além dos carros... há motos, iates e muitas outras coisas..."

1012302-39 = "Bem, isso fica para outra hora. #nPor hoje... ei, sente-se. É um assento especial."

1012302-40 = "[s5] \"U-Sim...\"\n[s6] Sente-se no banco do passageiro."

1012302-49 = "n / D……."

1012302-50 = "Bem, vamos lá."

1012302-54 = "(O carro começou a andar e seguiu em direção ao subúrbio)"

1012302-55 = "(Seia sorriu e não disse uma palavra por um tempo.)"

1012302-56 = "Estamos quase no nosso destino. Surpreendentemente, a chegada correu bem."

1012302-57 = "Hum..."

1012302-58 = "Aparentemente, o mar está nos acolhendo."

1012302-67 = "[wa:1530]― [log=세이아 수영복]Está um vento agradável. [/registro]"

1012302-69 = "[wa:1150]― [log=세이아 수영복]Como esperado, parece [wa:1220]sem coração [wa:820]legal. [/registro]"

1012302-72 = "― [log=세이아 수영복]Nada atrapalha...[/log]"

1012302-74 = "[wa:330]― [log=세이아 수영복]Este mundo [wa:670] pertence apenas a nós. [/registro]"

1012302-77 = "[wa:1160]― [log=세이아 수영복]A vista do banco do passageiro [wa:1290] é linda? [/registro]"

1012302-80 = "― [log=세이아 수영복]Essa expressão é...[/log]"

1012302-82 = "[wa:1030]― [log=세이아 수영복]Você está surpreso com a paisagem? [/registro]"

1012302-85 = "[wa:1470]― [log=세이아 수영복]Ou...[/log]"

1012302-87 = "― [log=세이아 수영복]Meu convite [wa:880] foi inesperado? [/registro]"

1012302-90 = "[wa:1380]― [log=세이아 수영복]De qualquer forma, [wa:1750]Estou satisfeito só de ver aquele rosto [wa:1400]. [/registro]"

1012302-92 = "[wa:160]― [log=세이아 수영복]Acho que valeu a pena [wa:1130] convidá-la assim. [/registro]"

1012302-95 = "― [log=세이아 수영복]Mesmo que você pergunte por um motivo absurdo, [wa:1560] você não será incomodado. [/registro]"

1012302-97 = "― [log=세이아 수영복]Faça o que você quiser...[wa:2170]Isso é tudo. [/registro]"

1012302-100 = "[wa:670]― [log=세이아 수영복]O que você disse sobre isso [wa:1470]...[/log]"

1012302-103 = "― [log=세이아 수영복]Hmm...[wa:2090]Escapar? [/registro]"

1012302-106 = "[wa:250]― [log=세이아 수영복]Hehe... [wa:1500] Brincadeirinha. [/registro]"

1012302-109 = "― [log=세이아 수영복]No entanto, [wa:1530]Vai demorar um pouco ainda...[/log]"

1012302-111 = "[wa:600]― [log=세이아 수영복]Isso mesmo. [/registro]"

1012302-114 = "[wa:220]― [log=세이아 수영복]Até eu mandar você de volta,[/log]"

1012302-116 = "― [log=세이아 수영복]Vamos pedir ao [wa:970] para se juntar a nós nesta "peça". [/registro]"

1012302-119 = "Bem, chegamos."

1012302-126 = "Algo urgente. É por isso que pedi para você reservar um tempo para mim..."

1012302-127 = "Não é como se houvesse algum problema específico. #nIsso mesmo..."

1012302-128 = "As estações mudam. #n[ruby=Agora]Agora[/ruby]Quero sentir esse momento, esse cenário... juntos."

1012302-129 = "...Você sente que foi exposto?"

1012302-130 = "Me desculpe se lhe causei muitos problemas."

1012302-131 = "[s7] \"Bem, fiquei um pouco surpreso...\"\n[s8] \"Eu gostaria que você tivesse me contado isso desde o início.""

1012302-134 = "n / D……."

1012302-135 = "Hehehe…."

1012302-136 = "...Oh, não consigo terminar. No entanto, tornou-se divertido."

1012302-137 = "Meu professor anterior teria dito algo banal como: “Estou feliz que nada tenha acontecido”."

1012302-138 = "Agora... não parece ser isso."

1012302-139 = "Bem, é claro. #nEu estive mexendo com você sobre isso e aquilo até agora."

1012302-140 = "Como você descreveria isso...?"

1012302-141 = "A sensação de distância entre os outros é variável. #nPodemos nos aproximar e nos aproximar e, claro, o oposto é verdadeiro."

1012302-142 = "Você... não se deixa mais levar pelos meus flertes, mas agora pode "protestar" adequadamente."

1012302-143 = "Ou... talvez eu estivesse esperando por esse tipo de reclamação."

1012302-144 = "Sou culpado por travessuras, e às vezes sou repreendido por fazer algo inocente e inocente... #n Assim como um aluno que precisa de muita atenção."

1012302-145 = "...Como você diz algo assim?"

1012302-146 = "[s9] \"...Haa.\"\n[s10] Respiro fundo deliberadamente."

1012302-152 = "...! ! !"

1012302-153 = "Hehe, hehehe…."

1012302-154 = "Entendo... foi assim que me senti."

1012302-155 = "Lamento ter esquecido isso até agora. #nNo entanto, não é tarde para perder isso de vista...Acho que isso está finalmente se tornando um hábito."

1012302-160 = "……estou brincando."

1012302-161 = "Não, a rigor, os sentimentos são reais. #nNo entanto, até eu tenho uma queda pela moderação."

1012302-162 = "[s11] \"Se você for longe demais, o professor vai ficar bravo, certo?\"\n[s12] \"...Eu não me importo. Contanto que seja assim, eu não me importo nem um pouco.\""

1012302-168 = "...Você não conhece o fundo."

1012302-169 = "Se o professor quiser, reconsiderarei."

1012302-170 = "Deixe isso para a independência do aluno. #nNão é exatamente esse o método habitual do professor?"

1012302-171 = "[s13] \"Desde que Seia desse a resposta que ela queria.\"\n[s14] \"Você não gosta desse tipo de coisa?\""

1012302-174 = "...Hehe."

1012302-175 = "O vento está ficando mais frio. Vamos voltar logo? #nEste é o fim da minha fuga da realidade."

1012302-180 = "Da próxima vez... embora ainda não possa garantir."

1012302-183 = "(Depois Seia me levou até a placa de Petri.)"

1012302-184 = "(Embora ela tenha permanecido em silêncio durante todo o trajeto... ela só sorriu uma vez quando estávamos prestes a nos separar.)"

