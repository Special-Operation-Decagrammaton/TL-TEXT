[translation]
2005006-1 = "A sós no subsolo"
2005006-2 = "Wild Hunt - Muralhas Externas"
2005006-3 = "Sensei, por aqui, por aqui!"
2005006-4 = "（Ritsu estava parada em frente a uma pequena porta de grade de ferro sob a muralha）"
2005006-8 = "[ns] \"Esta porta é...?\""
2005006-9 = "Shiii...!"
2005006-10 = "O lugar para onde vamos agora é segredo para todo mundo, tá?"
2005006-11 = "...Pronto!"
2005006-16 = "[ns] \"Ela arrancou a porta com as próprias mãos...!?\""
2005006-17 = "Vamos, Sensei!"
2005006-19 = "（Segui Ritsu e entrei na passagem subterrânea）"
2005006-23 = "Ruínas Subterrâneas"
2005006-24 = "Tcharam!#nEu estava procurando por rotas de importação interessantes e acabei encontrando essas ruínas!"
2005006-25 = "[s] \"Ruínas?\""
2005006-26 = "Wild Hunt é uma escola muito antiga, sabe."
2005006-27 = "Dizem que ainda existem muitas ruínas que não foram escavadas."
2005006-28 = "E... não se surpreenda ainda!"
2005006-29 = "Venha comigo, Sensei!"
2005006-31 = "No fim deste corredor..."
2005006-37 = "[wa:1030]― [log=리츠]Ah...[/log]"
2005006-39 = "― [log=리츠]Que refrescante...[/log]"
2005006-42 = "[ns] \"Este lugar é...\""
2005006-43 = "[wa:1140]― [log=리츠]Aqui, [wa:900]não é incrível?[/log]"
2005006-45 = "― [log=리츠]Parece que é um [wa:670]reservatório subterrâneo [wa:700]muito antigo...[/log]"
2005006-48 = "[wa:500]― [log=리츠]Eles [wa:680]escavaram um buraco [wa:650]enorme, [wa:530]ergueram [wa:1090]várias [wa:720]colunas...[/log]"
2005006-50 = "[wa:120]― [log=리츠]E cada uma delas [wa:1670]tem esculturas...[/log]"
2005006-53 = "[ns] \"Parece... um templo, não é?\""
2005006-54 = "[wa:1160]― [log=리츠]...É lindo, né?[/log]"
2005006-56 = "― [log=리츠]Eu queria muito [wa:930]mostrar isso ao Sensei.[/log]"
2005006-59 = "[wa:790]― [log=리츠]Ei, [wa:1590]venha aqui.[/log]"
2005006-61 = "― [log=리츠]Vamos ver [wa:2100]a mesma paisagem que eu.[/log]"
2005006-64 = "（Depois disso, enquanto nós dois colocávamos os pés na água...）"
2005006-65 = "（Passei um tempo agradável com a Ritsu）"
