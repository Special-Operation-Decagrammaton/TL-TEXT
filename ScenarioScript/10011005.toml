[translation]
10011005-1 = "プロローグ;忍者襲来！"
10011005-5 = "シャーレ・休憩室"
10011005-8 = "（シャーレの業務が終わり、休憩していたところ……）"
10011005-13 = "[ns] \"あれ、電気が……？\""
10011005-25 = "ふっふっふ！無事に潜入に成功！"
10011005-27 = "わぁ……本当に、潜入できちゃうなんて……あの、噂のシャーレに……！"
10011005-29 = "忍者の鉄則その壱！「忍者とはいついかなる状況でも、躊躇わずに挑戦するもの」！だからね！"
10011005-30 = "これで、シャーレを我が手中に……！"
10011005-32 = "すごいことに、なってきましたね……！"
10011005-34 = "忍者であるならば、後先まで考えず、とにかくやってみることも、大切……"
10011005-36 = "部長のその精神、忘れないように、メモしておきます……！"
10011005-38 = "……それ、褒めてるんだよね？何か曲解されてない？"
10011005-40 = "えっと、とにかく早く行こう！忍者走りでね、シュタタタタタタッって！"
10011005-42 = "はいっ、シュタタタタタタッ……！"
10011005-46 = "[ns] \"えっと……。\""
10011005-51 = "………へ？"
10011005-53 = "あ、え………？"
10011005-54 = "[s] \"君たちは……？\""
10011005-58 = "あ、あああ慌てないでツクヨ！こういう時こそ思い出すの！"
10011005-59 = "忍者の鉄則！その弐ッ！"
10011005-60 = "あっ、はいっ！"
10011005-61 = "「忍者とはどんな窮地でも、決して諦めないもの」……！"
10011005-62 = "そう！というわけでこうなったら、二人で同時に「アンブッシュ・術」だよっ！"
10011005-64 = "え、それって、良いんでしょうか……？"
10011005-65 = "大丈夫大丈夫、GO！"
10011005-66 = "[s] \"いや、ちょっ、待っ――\""
10011005-73 = "あ、部長。電気が……"
10011005-74 = "何でぇっ！？"
10011005-78 = "イズナ、参上です！"
10011005-79 = "あっ、イズナちゃん……！"
10011005-80 = "主殿の声が聞こえたので、シュババっと参りました！"
10011005-81 = "あの声、もしや主殿の危機……！？"
10011005-82 = "そうとあっては、黙っていられません！"
10011005-83 = "イズナ、加勢いたします！"
10011005-84 = "イズナ待ったぁ！それは計画と違――"
10011005-85 = "ニンニンっ！"
10011005-86 = "[s] \"うわああっ！？\""
10011005-92 = "（その後なんとか説得に成功し、急に襲ってきた三人を落ち着かせることができた）"
10011005-96 = "シャーレ・オフィス"
10011005-97 = "もーっ、イズナ！あれじゃ作戦と違うじゃん！"
10011005-98 = "うう……でも部長！"
10011005-99 = "主殿の声を聴いてしまった瞬間、いてもたってもいられず……。"
10011005-100 = "やはり忍者として、ジッとしていることはできませんでした！"
10011005-101 = "いやいやいや、それは良いことだけど！"
10011005-102 = "でも、その……素早く駆けつけてきたイズナちゃん……。"
10011005-103 = "その、すっごくカッコ良かったと、思うよ。"
10011005-104 = "えへへっ！ありがとうございます、ツクヨ殿！"
10011005-105 = "えへへ……。"
10011005-106 = "[s] \"えっと、イズナの知り合い……なのかな？どうしてここに……？\""
10011005-107 = "ん？"
10011005-108 = "あー、えっと、その……私たちは……。"
10011005-112 = "あ、主殿……！？まさか……！"
10011005-113 = "[s] \"……まさか？\""
10011005-114 = "イズナと共に過ごした日々を、忘れてしまったのですか！？"
10011005-115 = "もしかして、先ほどの衝撃ですべての記憶を失ったという展開ですか！？"
10011005-116 = "[s] \"いや、そうじゃなくてイズナのことは勿論知っ――\""
10011005-117 = "そういえばイズナ、忍者ドラマで見たことがあります！主を守るために我が身を賭した忍者が、不意に襲われ……！"
10011005-118 = "ついに記憶喪失になってしまう、涙なしでは見られないあの展開を！それが、主殿に降りかかってしまったという……！？"
10011005-119 = "[s] \"イズナ、待っ――\""
10011005-120 = "イズナと主殿が初めて会ったあの瞬間を……！イズナの夢を応援してくれると言ったあの時を……！忘れてしまったのですか！？"
10011005-121 = "幾つもの修羅場を潜り抜け、あの天下の大悪党……"
10011005-122 = "世界を支配しようとしていたあの大魔王「ニャン天丸」を、イズナたちと一緒に倒したではありませんか！あの思い出まで、失われてしまったのですか……！？"
10011005-123 = "[s] \"そ、そこまでの一大イベントは記憶に無いけど……。\""
10011005-124 = "イズナ、悲しいです……ですが、ご安心ください！"
10011005-125 = "たとえ主殿が全て忘れてしまったとしても……思い出はまた、重ねていけば良いのですから！"
10011005-126 = "イズナは何があっても、主殿の忠実な忍者です！そして主殿は、いつまでもイズナの主殿ですから！ニンニン！"
10011005-127 = "[s1] \"それは嬉しいけど、そうじゃなくて……。\"\n[s2] \"イズナ以外の子は初対面だよね、初めまして。\""
10011005-136 = "なるほど、私たちの正体について知りたいと……。"
10011005-137 = "それではあらためて……"
10011005-138 = "ドーモ、お初にお目にかかります、先生殿……小生、ミチルと申す。"
10011005-139 = "初め、まして……！ツクヨと、言います……。"
10011005-140 = "そして、イズナはイズナです！主殿！"
10011005-141 = "[s] \"こんにちは……って、先生「殿」？\""
10011005-142 = "ふっふっふ……何を隠そう私たち3人は、そう！"
10011005-143 = "さあイズナ、ツクヨ！"
10011005-144 = "はい、部長！"
10011005-145 = "はいっ……！"
10011005-146 = "いざ、忍者流ハイパー決めポーズだよっ！"
10011005-147 = "[s] \"忍者流、ハイパー……？\""
10011005-153 = "忍者とは何なのか！そして、忍法とは何なのか！"
10011005-156 = "忍者の、真髄……！"
10011005-160 = "その本質を研究し、探究し、そして究明する……"
10011005-161 = "忍者の魅力を広めるために暗躍する、キュートな忍者三人組！"
10011005-162 = "なのです！"
10011005-166 = "泣く子も笑う、"
10011005-167 = "百鬼夜行連合学院最強の忍者集団！"
10011005-168 = "[s] \"……？\""
10011005-172 = "その名も、「忍術研究部」！"
10011005-173 = "です！"
10011005-174 = "です……。"
10011005-178 = "そして、私が忍術研究部の部長！[ruby=ちどり]千鳥[/ruby]ミチル！"
10011005-179 = "[s] \"なるほど……？それで、忍術研究部がどうしてここに？\""
10011005-180 = "ふっふっふ……ふーっふっふっふ！"
10011005-181 = "先生殿は今、こう考えてるんでしょ。"
10011005-182 = "「なんてカッコよくて可憐な、美少女忍者たちなんだろう！」……と。"
10011005-183 = "[s] \"う、うん……。\""
10011005-184 = "そして、こうも思ったはず。"
10011005-185 = "「この子たちを応援したい！その成長中の翼を広げ、広い世界へと羽ばたけるように、大人の力で支えてあげたい！」……と。"
10011005-186 = "みなまで言わずとも分かるよ。そうなると思って、これを準備しておいたの！"
10011005-191 = "[ns] \"「部活の認可に関する推薦状」……？\""
10011005-192 = "さあ、ここにサインを！"
10011005-193 = "[s3] \"これを貰うために、ここへ？\"\n[s4] \"っていうことは忍術研究部は、まだ正式な部活じゃないってこと？\""
10011005-196 = "部長、そうだったのですか？イズナ、今初めて知りました！"
10011005-197 = "私も、てっきり……先生に挨拶するため、なのかな、って……。"
10011005-198 = "そ、それもあるけど！"
10011005-199 = "……こほん。先生殿の噂は聞いてるよ。何でもすんごいパワーがあるんだって！"
10011005-200 = "その力があれば、部活の認可も叶えられる……でしょ！？だからお願い！"
10011005-201 = "[s] \"それはちょっと難しいかな……。\""
10011005-202 = "なっ……！？"
10011005-203 = "えっ……。"
10011005-204 = "？？？"
10011005-205 = "ど、どうして……！？まさか先生殿も……"
10011005-206 = "「忍者を研究する部活なんて、そんなよく分からない活動は認められない」ってこと……！？"
10011005-207 = "[s] \"そうじゃなくて、普通にちゃんとした手続きが必要なんじゃない？\""
10011005-208 = "そ、それはそうだけど……でも……。"
10011005-209 = "で、でも！カホはこんな活動、絶対に認めてくれない！"
10011005-210 = "その、えっと……そう！承認がおりるまですごく時間がかかるし、かなり厳しいし……。"
10011005-211 = "……？"
10011005-212 = "か、カホさんってそんなに厳しい方……でしたっけ……？"
10011005-213 = "そ、そうじゃない時もあるけど……と、とにかくお願い、先生殿！"
10011005-214 = "[s] \"うーん、何とかしてあげたいのは山々だけど……。\""
10011005-219 = "[ns] \"またお客さん……？\""
10011005-227 = "……初めまして、先生。私は陰陽部の副部長、[ruby=くわかみ]桑上[/ruby]カホと申します。"
10011005-228 = "陰陽部よりシャーレへと依頼したいことがありまして、こちらへ参りました。"
10011005-229 = "少々お時間をいただけますでしょうか？"
10011005-230 = "うにゃっ！噂をすればなんとやら……！？"
10011005-231 = "……あら。"
10011005-232 = "[s] \"陰陽部ってことは、百鬼夜行の……？\""
10011005-236 = "#video;10011"
