85413320101-0-Talk-1 = "状況の把握と\n分析が先決です。"
85413320101-0-Talk-2 = "それさえも容易では\nありませんが。"
85413320102-0-Talk-1 = "鋼鉄大陸……まさに\n「特異現象」ですね。"
85413320102-0-Talk-2 = "私が期待していた\nものとは、些か趣が\n異なりますけれど。"
85413320103-0-Talk-1 = "ついに、ここまで\n来ましたね。"
85413320104-0-Talk-1 = "私たちは……必ず、\n道を見つけ出します。"
85433320105-0-Talk-1 = "先生。最後の一撃を\nお願いします。"
85433320106-0-Talk-1 = "ここでできることを、\n探さなくては。"
85433320107-0-Think-1 = "（先生が\n輸送船に戻るよう\n言ったのは、)"
85433320107-0-Think-2 = "(理由が\nあるはずです。）"
85433320108-0-Think-1 = "（いざという\n時には……と、\n先生はおっしゃってい\nました。)"
85433320108-0-Think-2 = "(それはつまり……）"
85433320109-0-Talk-1 = "皆さん……どうか\nご無事で……。"
85433320110-0-Talk-1 = "全てを終わらせる\n時です。"
85433320110-0-Talk-2 = "私たちも全力を\n尽くします。"
85412670111-0-Talk-1 = "一つ分かったことが\nあるよ！"
85412670111-0-Talk-2 = "なーんにも\n分からないってこと！"
85412670112-0-Talk-1 = "先生もやってみる？\nえ、やらない？\nそっか……"
85412670113-0-Talk-1 = "先輩たちの\n言う通りに\nやってみてるけど……！"
85412670114-0-Talk-1 = "わぁ……\nボタンとかなんか\nよく分からないものが\nいっぱい……。"
85412670115-0-Talk-1 = "ラストスパートだよ、\n先生！いくよ！"
85432670116-0-Talk-1 = "ヒマリ先輩に\n連れられて\n戻ってきたのは\nいいけど……。"
85432670117-0-Think-1 = "（先生は\n無事なんだよね？\n大丈夫だよね……？）"
85432670118-0-Talk-1 = "アリス……ケイ……\nエイミ……トキ……\n会長……先生……。"
85432670119-0-Talk-1 = "せめて……\nせめて私が\n笑顔でいないとだよね！"
85432670120-0-Talk-1 = "これで全部\n終わらせよう！\n３人のためにも！"
85412680121-0-Talk-1 = "これは、\nなんでしょう……。"
85412680122-0-Talk-1 = "おかえりなさい、\n先生。"
85412680122-0-Talk-2 = "ここは……格納庫？\nみたいです。"
85412680123-0-Talk-1 = "預言者のコアを何かに\n使うようですが……\n一体……。"
85412680124-0-Talk-1 = "ケイちゃんと\n会長がちゃんと\n説明してくれたのに……\nすみません。"
85442680125-0-Talk-1 = "アップグレードが\nできますね！"
85432680126-0-Talk-1 = "先生……みんな……！"
85432680127-0-Think-1 = "（私がちゃんと\nしっかりしないと……！\nしっかり！）"
85432680128-0-Talk-1 = "会長……どこに\n行ってしまったん\nですか……。"
85432680129-0-Talk-1 = "どうか、みんな\n無事でいてくれます\nように……！"
85413310130-0-Talk-1 = "この結果を、\nどう解釈すれば……。"
85413310131-0-Talk-1 = "ここは格納庫……\nだったのだけれど、"
85413310131-0-Talk-2 = "多目的室のように\nなってきたわね。"
85413310133-0-Talk-1 = "何か、打開策を……。"
85413310134-0-Talk-1 = "預言者の\nコアは、ここで\n分析しましょう。"
85413310135-0-Talk-1 = "アップグレードの\n準備が完了したわ。"
85413350201-0-Talk-1 = "最初の目標に向けて、\nまず一歩、ですね。"
85413340202-0-Talk-1 = "アリス……\nなんだか、\nワクワクしてきました！"
85413360203-0-Talk-1 = "隠れられる場所……\nないかな……？"
85412670204-0-Talk-1 = "おお……初めての\n場所なのになんだか\n懐かしい！"
85412670204-0-Talk-2 = "不思議な\n感じがするね！"
85412680205-0-Talk-1 = "お姉ちゃん……\nちゃんと緊張感を\n持ってほしいんだけど。"
85413360212-0-Talk-1 = "や、やっぱり、\nロッカーの\n外は危険……。"
85413330207-0-Talk-1 = "カモミールティーを\nどうぞ。"
85413330207-0-Talk-2 = "緊張をほぐす\n効果があると\n言います。"
85413310208-0-Think-1 = "（私はいま、\nここにいる……)"
85413310208-0-Think-2 = "(これは合理的な\n行動なのかしら\n……？）"
85413320209-0-Talk-1 = "大事を成す時ほど、\n冷静さが肝要です。"
85413350210-0-Talk-1 = "アリスも、\n皆さんも、絶対に\n怪我はさせません。"
85413340211-0-Talk-1 = "……これが、\n世界を救うための\n第一歩なんですね。"
85413340211-0-Talk-2 = "アリス、頑張ります！"
85413360303-0-Talk-1 = "ここにも\nゲーム機が……。"
85412670213-0-Talk-1 = "こんなことだったら\nもっとゲーム\n持ってきたのに～！"
85412680214-0-Talk-1 = "ぶ、無事に\n帰れるんでしょうか\n……。"
85413360312-0-Think-1 = "（どんなゲームが\nダウンロード\nされてるんだろ……？）"
85413330216-0-Talk-1 = "パーフェクトメイドかつ\nベストエージェント\nとして、"
85413330216-0-Talk-2 = "お手伝いできることが\nありましたら、\nおっしゃってください。"
85413310217-0-Talk-1 = "念のため、\nモニタリングを\n続けているわ。"
85413320218-0-Talk-1 = "未来について、占星術で\n占ってみましょうか\n……。"
85413350301-0-Talk-1 = "皆さん、どんな\n飲み物がお\n好きでしょうか……。"
85413340302-0-Talk-1 = "ゲーム機を\n持ってきました！"
85413340302-0-Talk-2 = "先生も一緒に\nいかがですか？"
85413360403-0-Talk-1 = "もう……\n降りるのは、\nいやです……。"
85412670304-0-Talk-1 = "やっぱここって\nすごいね……！"
85412680305-0-Talk-1 = "す、すごかった……。"
85413360412-0-Talk-1 = "先生……\n一緒にいて、\nくれますよね……？"
85413330307-0-Talk-1 = "私の活躍は、\n先生に見ていただければ\n十分です。"
85413350310-0-Talk-1 = "この自販機に\nお金を入れる意味は\nあるのでしょうか……？"
85413340311-0-Talk-1 = "こういうときこそ、\n休息は大切です！"
85412670313-0-Talk-1 = "でもまぁ、\n前よりはスケールが\n小さいかも？"
85412680314-0-Talk-1 = "私たち、\nゲーム開発部\nなのに……。"
85413330316-0-Talk-1 = "軽量スーツのおかげで、\nより軽やかな動作が\n可能になりました。"
85413350401-0-Talk-1 = "この身体……\n結構よくできた\n気がします。"
85413340402-0-Talk-1 = "みんな、\nすごかったです！"
85413360603-0-Talk-1 = "先生は……こんな敵と、\n戦ってきたのですね\n……。"
85413360612-0-Talk-1 = "なんだか\n先生といると……\n怖くありません……\nえへへ……。"
85413330407-0-Talk-1 = "退屈しています。\n遊んでください。"
85413310408-0-Think-1 = "（こういう\n状況だからこそ、)"
85413310408-0-Think-2 = "(ゲームをするのは\n合理的なのかも\nしれないわね……）"
85413320409-0-Talk-1 = "甘いものは\nストレスを軽減して\nくれるんですよ。"
85413350410-0-Talk-1 = "あの子たちの\n工学の腕前だけは\n評価しましょう。"
85413340411-0-Talk-1 = "自由でいられるのは、\nいいことですね……！"
85413330416-0-Talk-1 = "もっと漫画を\n持ってくれば\n良かったです。"
85413310417-0-Talk-1 = "ゲーム機……単純な\n装置とプログラムに\n過ぎないのに……。"
85413320418-0-Talk-1 = "今日の\nラッキーカラーと\n同じ色の飲み物は……。"
85413350501-0-Talk-1 = "皆さん、\nお疲れ様でした。"
85413340502-0-Talk-1 = "みなさん、\n本当に立派でした！\n尊敬します！"
85413360803-0-Talk-1 = "リオ会長も、\nヒマリ先輩も……\nすごいです……。"
85412670504-0-Talk-1 = "本当、\n一時はどうなることかと\n思ったよー……。"
85412680505-0-Talk-1 = "もう終わって\nしまうのかと……。"
85413360812-0-Talk-1 = "いろいろ、教えて\nもらっていますが……"
85413360812-0-Talk-2 = "分かるような、\n分からないような\n……。"
85413310508-0-Talk-1 = "ここは、あらゆる\n可能性に備えて……。"
85413320509-0-Talk-1 = "息抜きに……"
85413320509-0-Talk-2 = "何か\n温かい飲み物でもお\n作りしましょうか？"
85413350510-0-Talk-1 = "エイミとトキは\n輸送船の点検に\n行きました。"
85413340511-0-Talk-1 = "勇気……それこそが、\n本当の力なんです！"
85413370206-0-Talk-1 = "居心地が良くて、\n効率的な場所、\nだけど……。"
85412670513-0-Talk-1 = "でもちゃんと\n頑張ったよ！えへん！"
85412680514-0-Talk-1 = "ですが、\nみんなのお\n役にたてるのなら……。"
85413370215-0-Talk-1 = "エアコンつけていい？\n部長が嫌がるかな？"
85413310517-0-Think-1 = "（ゲーム開発部……\nずっと思っていたの\nだけれど、)"
85413310517-0-Think-2 = "(予測の難しい\n子たちね……）"
85413320518-0-Talk-1 = "コーヒーでも占いが\nできるそうですよ。"
85413350601-0-Talk-1 = "アリスは\n寝に行きました。"
85413370306-0-Talk-1 = "戦闘糧食って、\n効率は良い、\nけどさ……。"
85412670604-0-Talk-1 = "持ってきたゲーム、\n全部クリアしちゃったぁ\n……。"
85412680605-0-Talk-1 = "エイミさんですか？\n暑いーと言って\n外に出ちゃいました。"
85413370315-0-Talk-1 = "食事って、\nみんなで食べたほうが\n効率的なのかな？"
85413330607-0-Talk-1 = "最近、趣味（仮）が\nできました。"
85413310608-0-Think-1 = "（厨房を\n作っておいたの\nだけれど……)"
85413310608-0-Think-2 = "(やはり非合理的\nだったかしら……）"
85413350610-0-Talk-1 = "先生も休憩を\n忘れずに！"
85413350610-0-Talk-2 = "あと歯磨きも！"
85412670613-0-Talk-1 = "先生、\nカートリッジとか\n持ってない？"
85412680614-0-Talk-1 = "さっきのゲーム、\n難易度が\n変だったような……。"
85413330616-0-Talk-1 = "配信のアーカイブが\nあります。"
85413330616-0-Talk-2 = "私と一緒に\n見ませんか？"
85413310617-0-Talk-1 = "実は私……"
85413310617-0-Talk-2 = "レトルト食品の\n調理にも失敗する\nことがあるの……。"
85413350701-0-Talk-1 = "休息が大事、\nという言葉が少し\n分かってきたかも……。"
85413340702-0-Talk-1 = "アリスはまだ、\nもっと頑張れます。\n先生っ！"
85412670704-0-Talk-1 = "これ、全部\n夢だったりして？"
85412670704-0-Talk-2 = "目が覚めたら\n部室でしたー\nみたいな！"
85412680705-0-Talk-1 = "まさかこんなところまで\n来ることになるなんて\n……"
85412680705-0-Talk-2 = "私たち、ただの\nゲーム開発部なのに。"
85413350710-0-Talk-1 = "どこも悪いところは\nありませんね？"
85413340711-0-Talk-1 = "元気を出すには\nやっぱり、"
85413340711-0-Talk-2 = "何か食べたり\n飲んだりした方が\nいいですよね……。"
85412670713-0-Talk-1 = "現実が詰みゲー\nだよぉ……。"
85412680714-0-Talk-1 = "……大丈夫ですよね。\n先生が、いますから。"
85413350801-0-Talk-1 = "もう、あの真っ白\n3人組っ……！"
85413340802-0-Talk-1 = "モモイもミドリも、\n部屋で休むって\n言ってました……。"
85413370706-0-Talk-1 = "なんだか、無性に\n厨房に行きたい気分。"
85413370715-0-Talk-1 = "合理的じゃないけど\n効率的なことが、\n世にはあるよね。"
85413330807-0-Talk-1 = "偵察ですか？\nご指示を。"
85413310808-0-Think-1 = "（会話を上手に\n切り出すには、\nどうしたら……）"
85413320809-0-Talk-1 = "良かった……\n皆さんよくご無事で。"
85413350810-0-Talk-1 = "……私が\nお姉さんなので。\n我慢します。"
85413340811-0-Talk-1 = "アリスは……みんなが\n無事でいてくれたら、"
85413340811-0-Talk-2 = "それだけで\n十分なんです。"
85413370806-0-Talk-1 = "先生もなにか\n冷たいもの、飲む？"
85413370815-0-Talk-1 = "思考が\nまとまらない……"
85413370815-0-Talk-2 = "身体じゃなくて、\n頭の中が\n熱いときって、"
85413370815-0-Talk-3 = "どうしたら\nいいのかな……。"
85413330816-0-Talk-1 = "私が任務に励むのは、\n皆様のためです。"
85413330816-0-Talk-2 = "……と同時に、\n褒められるためです。"
85413310817-0-Think-1 = "（他人と会話をする\n方法……)"
85413310817-0-Think-2 = "（やはり、先生に\n相談を……）"
85413320818-0-Talk-1 = "心配は無用です。\n私はまだまだ\n元気です。"
85412670904-0-Talk-1 = "今回は\n言えるかな……！\n来た、見た！"
85412670904-0-Talk-2 = "勝っ……！\nてはないか……\nまだね。"
85412670913-0-Talk-1 = "私たち\n勝てるよね先生？\n信じてるからねっ！"
85412689905-0-Talk-1 = "まだ全然\n信じられないです……"
85412689905-0-Talk-2 = "どうして\nこんなことに。"
85412689914-0-Talk-1 = "最後まで最善を\n尽くします。"
85412689914-0-Talk-2 = "あ、最後って\n言うとなんだか不吉な\n感じがしますね……。"
85413329909-0-Talk-1 = "長い旅路も、いよいよ\nクライマックス\nですね。"
85413329918-0-Talk-1 = "ご存じですか？\n占星術に\n終わりはありません。"
85413329918-0-Talk-2 = "すべては\n循環しているのです。"
