85413320101-0-Talk-1 = "Compreender e analisar a \nsituação é a nossa prioridade."
85413320101-0-Talk-2 = "Ainda que nem isso \nseja uma tarefa fácil."
85413320102-0-Talk-1 = "O Continente de Aço... É um \nverdadeiro \"fenômeno singular\"."
85413320102-0-Talk-2 = "Embora a aparência seja um \npouco diferente do que \neu estava esperando."
85413320103-0-Talk-1 = "Finalmente... \nchegamos até aqui."
85413320104-0-Talk-1 = "Nós... \ncom certeza encontraremos \num caminho."
85433320105-0-Talk-1 = "Sensei. \nPor favor, dê o golpe final."
85433320106-0-Talk-1 = "Preciso descobrir o que \nposso fazer por aqui."
85433320107-0-Think-1 = "（Se o Sensei \nnos disse para voltar à \nnave de transporte,)"
85433320107-0-Think-2 = "(deve haver \num motivo.）"
85433320108-0-Think-1 = "（O Sensei nos disse... \npara estarmos preparadas \nem caso de \nemergência.)"
85433320108-0-Think-2 = "(Isso significa que...）"
85433320109-0-Talk-1 = "Pessoal... por favor, \nfiquem a salvo..."
85433320110-0-Talk-1 = "É hora de \nacabar com tudo isso."
85433320110-0-Talk-2 = "Nós também daremos \no nosso melhor."
85412670111-0-Talk-1 = "Tem uma coisa \nque eu acabei de entender!"
85412670111-0-Talk-2 = "A gente \nnão entende é de nada!"
85412670112-0-Talk-1 = "Sensei, você também quer tentar? \nEh, não quer? \nEntendi..."
85412670113-0-Talk-1 = "Eu tô tentando fazer \ntudo do jeitinho que as senpais \nensinaram, mas...!"
85412670114-0-Talk-1 = "Uau... \nTá cheio de botões \ne um monte de coisas \nque eu não entendo..."
85412670115-0-Talk-1 = "É a reta final, \nSensei! Vamos nessa!"
85432670116-0-Talk-1 = "Foi bom a \nHimari-senpai ter \nnos trazido de \nvolta, mas..."
85432670117-0-Think-1 = "（O Sensei \nestá a salvo, não é? \nEle está bem, certo...?）"
85432670118-0-Talk-1 = "Aris... Kei... \nEimi... Toki... \nPresidente... Sensei..."
85432670119-0-Talk-1 = "No mínimo... \nNo mínimo eu preciso \nmanter o sorriso no rosto!"
85432670120-0-Talk-1 = "Vamos acabar logo \ncom tudo isso! \nPor eles três também!"
85412680121-0-Talk-1 = "O que será \nisso...?"
85412680122-0-Talk-1 = "Bem-vindo de volta, \nSensei."
85412680122-0-Talk-2 = "Aqui... parece ser \num hangar?"
85412680123-0-Talk-1 = "Parece que vão usar \no Núcleo do Profeta para alguma coisa, \nmas pra que será..."
85412680124-0-Talk-1 = "A Kei-chan \ne a Presidente me \nexplicaram direitinho, mas... \nme desculpe."
85442680125-0-Talk-1 = "Acho que já podemos \nfazer os upgrades!"
85432680126-0-Talk-1 = "Sensei... pessoal...!"
85432680127-0-Think-1 = "（Eu preciso \nmanter o foco...! \nMantenha o foco!）"
85432680128-0-Talk-1 = "Presidente... \nOnde a senhorita \nse meteu..."
85432680129-0-Talk-1 = "Por favor, que todas \nfiquem a salvo...!"
85413310130-0-Talk-1 = "Como devemos \ninterpretar esses resultados...?"
85413310131-0-Talk-1 = "Isso aqui era... \num hangar, mas..."
85413310131-0-Talk-2 = "Está começando a parecer \numa sala multiuso."
85413310133-0-Talk-1 = "Precisamos de alguma... \nmedida para contornar isso."
85413310134-0-Talk-1 = "Vamos analisar \no Núcleo do Profeta \npor aqui."
85413310135-0-Talk-1 = "Os preparativos para \nos upgrades foram concluídos."
85413350201-0-Talk-1 = "Esse é o primeiro passo \nem direção ao nosso objetivo inicial, \nnão é?"
85413340202-0-Talk-1 = "Aris... \npor algum motivo, \nestá ficando bem animada!"
85413360203-0-Talk-1 = "Será que tem... \nalgum lugar para me esconder \npor aqui...?"
85412670204-0-Talk-1 = "Ooh... \né a minha primeira vez aqui, \nmas sinto uma nostalgia!"
85412670204-0-Talk-2 = "É uma sensação \nbem peculiar!"
85412680205-0-Talk-1 = "Onee-chan... \neu queria muito que \nvocê levasse isso a sério."
85413360212-0-Talk-1 = "C-como eu suspeitava... \né perigoso lá fora, longe \ndos armários..."
85413330207-0-Talk-1 = "Aqui está, \num chá de camomila."
85413330207-0-Talk-2 = "Dizem que ele tem \num ótimo efeito \npara aliviar a tensão."
85413310208-0-Think-1 = "（E pensar que, agora, \neu estou por aqui...)"
85413310208-0-Think-2 = "(Será que estou agindo \nde forma \nracional...?）"
85413320209-0-Talk-1 = "A calma é essencial, \nespecialmente em momentos \nde grande importância."
85413350210-0-Talk-1 = "Eu não deixarei que \nnem a Aris, \nnem vocês se machuquem."
85413340211-0-Talk-1 = "...Esse é \no primeiro passo para \nsalvarmos o mundo, certo?"
85413340211-0-Talk-2 = "Aris vai dar o seu melhor!"
85413360303-0-Talk-1 = "Tem videogames \npor aqui também..."
85412670213-0-Talk-1 = "Se eu soubesse disso, \nteria trazido mais jogos \ncomigo~!"
85412680214-0-Talk-1 = "S-será que \nvamos conseguir voltar \npara casa em segurança...?"
85413360312-0-Think-1 = "（Que tipo de jogos \nserá que instalaram \nnesses consoles...?）"
85413330216-0-Talk-1 = "Como a empregada perfeita \ne a melhor das \nagentes..."
85413330216-0-Talk-2 = "Me avise se \nhouver algo em que \neu possa ajudar."
85413310217-0-Talk-1 = "Estou mantendo \no monitoramento ativo \npor precaução."
85413320218-0-Talk-1 = "Gostaria que eu lesse \no seu futuro com a \nastrologia...?"
85413350301-0-Talk-1 = "Que tipo \nde bebidas vocês \nmais gostam...?"
85413340302-0-Talk-1 = "Eu trouxe \nos videogames!"
85413340302-0-Talk-2 = "Gostaria de se \njuntar a nós, Sensei?"
85413360403-0-Talk-1 = "Eu não quero mais... \nter que \ndescer dali..."
85412670304-0-Talk-1 = "Esse lugar é \nmesmo incrível...!"
85412680305-0-Talk-1 = "I-isso foi... \nimpressionante."
85413360412-0-Talk-1 = "Sensei... \nvocê vai ficar aqui \ncomigo, né...?"
85413330307-0-Talk-1 = "Que o Sensei reconheça \nos meus esforços... \njá é o bastante para mim."
85413350310-0-Talk-1 = "Será que faz algum \nsentido colocar dinheiro \nnessa máquina de vendas...?"
85413340311-0-Talk-1 = "Descansar é muito importante \nespecialmente em momentos \ncomo este!"
85412670313-0-Talk-1 = "Mas, até que, \na escala disso tudo pode ser \num pouco menor que a anterior, não?"
85412680314-0-Talk-1 = "Nós somos só do... \nClube de \nDesenvolvimento de Jogos..."
85413330316-0-Talk-1 = "Graças ao traje leve, \neu consigo realizar \nmovimentos muito mais ágeis."
85413350401-0-Talk-1 = "Sinto que... \nesse corpo é até que bem \nresistente."
85413340402-0-Talk-1 = "Vocês foram... \nincríveis!"
85413360603-0-Talk-1 = "Então era contra inimigos... \ndesse nível que o Sensei estava \nlutando..."
85413360612-0-Talk-1 = "Por algum motivo, \neu não fico com medo... \nquando o Sensei está comigo... \nEhehe..."
85413330407-0-Talk-1 = "Estou entediada. \nPor favor, brinque comigo."
85413310408-0-Think-1 = "（É exatamente por causa \ndessa situação)"
85413310408-0-Think-2 = "(que passar um tempinho \njogando talvez seja \no mais racional a se fazer...)"
85413320409-0-Talk-1 = "As coisas doces... \najudam a \naliviar o estresse."
85413350410-0-Talk-1 = "Tenho que admitir... \nelas são realmente habilidosas \nquando o assunto é engenharia."
85413340411-0-Talk-1 = "É muito bom \npoder ser \nlivre...!"
85413330416-0-Talk-1 = "Eu deveria \nter trazido \nmais mangás comigo."
85413310417-0-Talk-1 = "Videogames... No fim \ndas contas, são só dispositivos \ne programas básicos, mas..."
85413320418-0-Talk-1 = "A bebida que possui \na minha cor da sorte \nde hoje é..."
85413350501-0-Talk-1 = "Obrigada pelo \nseu trabalho duro, \npessoal."
85413340502-0-Talk-1 = "Vocês foram \ninacreditáveis! \nEu respeito muito todos vocês!"
85413360803-0-Talk-1 = "Tanto a Presidente Rio, \nquanto a Himari-senpai... \nsão incríveis..."
85412670504-0-Talk-1 = "Falando sério, \nteve uma hora que eu achei \nque a gente não ia escapar dessa..."
85412680505-0-Talk-1 = "Achei que... \nfosse o fim da linha pra nós."
85413360812-0-Talk-1 = "Elas estão me \nensinando tantas coisas..."
85413360812-0-Talk-2 = "Mas parece que \nnuma hora eu entendo, e na outra \njá esqueci tudo..."
85413310508-0-Talk-1 = "Isso é para nos preparamos \npara qualquer possibilidade \nimaginável..."
85413320509-0-Talk-1 = "Pra relaxar... "
85413320509-0-Talk-2 = "Gostaria de que eu \npreparasse uma bebida \nquente para você?"
85413350510-0-Talk-1 = "A Eimi e a Toki \nforam fazer uma checagem \nna nave de transporte."
85413340511-0-Talk-1 = "A coragem... isso sim, \né o verdadeiro \npoder!"
85413370206-0-Talk-1 = "É bem confortável e um \nlugar bastante produtivo, \nmas..."
85412670513-0-Talk-1 = "Mas eu lutei de verdade! \nAhem!"
85412680514-0-Talk-1 = "Porém... \nse eu ainda puder \nser útil a vocês..."
85413370215-0-Talk-1 = "Posso ligar o \nar-condicionado? Será que a \nPresidente não vai ligar?"
85413310517-0-Think-1 = "（O Clube de \nDesenvolvimento de Jogos... \nSempre me pego pensando nisso, mas)"
85413310517-0-Think-2 = "(elas são um bando de \ngarotas totalmente \nimprevisíveis...)"
85413320518-0-Talk-1 = "Dizem que também \ndá para ler o futuro pela \nborra de café."
85413350601-0-Talk-1 = "A Aris... \nfoi dormir."
85413370306-0-Talk-1 = "Rações de combate... \nsão bem eficientes, \nmas sabe como é..."
85412670604-0-Talk-1 = "Eu já zerei \ntodos os jogos \nque eu tinha trazido..."
85412680605-0-Talk-1 = "Está procurando pela Eimi? \nEla reclamou que estava com \ncalor e saiu daqui."
85413370315-0-Talk-1 = "Sobre as refeições... \nserá que comer todo mundo junto \né o mais produtivo?"
85413330607-0-Talk-1 = "Eu encontrei um \npassatempo (provisório) \nrecentemente."
85413310608-0-Think-1 = "（Eu construí \numa cozinha, mas...)"
85413310608-0-Think-2 = "(Será que foi \numa escolha irracional \nda minha parte...?）"
85413350610-0-Talk-1 = "Não se esqueça \nde dar uma pausa, \nSensei!"
85413350610-0-Talk-2 = "E de \nescovar os dentes também!"
85412670613-0-Talk-1 = "Sensei, você \npor acaso não tem nenhum \ncartucho com você aí, tem?"
85412680614-0-Talk-1 = "Acho que a curva de \ndificuldade daquele último jogo... \nestava um pouco exagerada."
85413330616-0-Talk-1 = "Nós temos os vídeos arquivados \ndas nossas transmissões aqui."
85413330616-0-Talk-2 = "Quer assistir \ncomigo?"
85413310617-0-Talk-1 = "A verdade é \nque eu..."
85413310617-0-Talk-2 = "Às vezes acabo \nestragando até os \npratos de comida instantânea..."
85413350701-0-Talk-1 = "Acho que comecei a entender \no que querem dizer quando dizem \nque 'descansar é importante'..."
85413340702-0-Talk-1 = "A Aris ainda pode \ndar muito mais de si. \nSensei!"
85412670704-0-Talk-1 = "E se isso tudo \nfor só um sonho?"
85412670704-0-Talk-2 = "Tipo, se a gente acordar \nagora na sala do \nnosso clube e tals!"
85412680705-0-Talk-1 = "Nunca que eu imaginei... \nque acabaríamos chegando \ntão longe assim..."
85412680705-0-Talk-2 = "Ainda mais a gente... só um bando de garotas \ndo Clube de Desenvolvimento de Jogos."
85413350710-0-Talk-1 = "Você não está sentindo \ndores em lugar nenhum, está?"
85413340711-0-Talk-1 = "Pra recuperar \nas energias..."
85413340711-0-Talk-2 = "Acho que comer ou \nbeber alguma coisa seria \na melhor opção, né..."
85412670713-0-Talk-1 = "A nossa realidade \nvirou um \njogo infernal..."
85412680714-0-Talk-1 = "...Tudo vai dar certo, né? \nAfinal, o Sensei \nestá aqui com a gente."
85413350801-0-Talk-1 = "Nossa, daquele trio \ntodo vestido \nde branco...!"
85413340802-0-Talk-1 = "A Momoi e a Midori... \ndisseram que iam descansar \nno quarto delas..."
85413370706-0-Talk-1 = "Por algum motivo... \neu tô morrendo de vontade \nde ir pra cozinha agora."
85413370715-0-Talk-1 = "Existem certas coisas \nno mundo que não \nsão racionais, mas sim produtivas."
85413330807-0-Talk-1 = "Reconhecimento? \nSuas ordens."
85413310808-0-Think-1 = "（Como... se puxa \numa conversa direito \ncom as pessoas...?）"
85413320809-0-Talk-1 = "Ainda bem... \nestão todos \nsãos e salvos."
85413350810-0-Talk-1 = "...Já que \neu sou a mais velha. \nEu irei me segurar."
85413340811-0-Talk-1 = "A Aris só quer... \nque todo mundo esteja são e salvo,"
85413340811-0-Talk-2 = "Isso por si só \njá é mais que o suficiente."
85413370806-0-Talk-1 = "Sensei, você \ntambém vai querer beber \nalgo gelado?"
85413370815-0-Talk-1 = "Não consigo... \norganizar os meus pensamentos..."
85413370815-0-Talk-2 = "E quando a sua cabeça \ncomeça a esquentar \nao invés do seu corpo,"
85413370815-0-Talk-3 = "O que é \nque a gente \ndeveria fazer...?"
85413330816-0-Talk-1 = "Eu encaro essa \nmissão arduamente... \npor todos vocês."
85413330816-0-Talk-2 = "...Mas ao mesmo tempo, \né porque quero ser elogiada."
85413310817-0-Think-1 = "（Uma maneira de conseguir... \npuxar assunto com os outros...)"
85413310817-0-Think-2 = "（Devo... consultar \no Sensei sobre isso...?）"
85413320818-0-Talk-1 = "Não há por que \nse preocupar. Eu ainda \nestou cheia de energia."
85412670904-0-Talk-1 = "Será que \npoderei dizer aquilo \ndessa vez...! Vim, vi!"
85412670904-0-Talk-2 = "E ven...! \nNão, espera... \nainda não."
85412670913-0-Talk-1 = "Nós vamos \nvencer, não vamos, Sensei? \nEu acredito em você!"
85412689905-0-Talk-1 = "Eu ainda não \nconsigo acreditar..."
85412689905-0-Talk-2 = "Como as coisas \nchegaram a esse ponto."
85412689914-0-Talk-1 = "Darei o meu melhor \naté o fim."
85412689914-0-Talk-2 = "Ah, dizer \n'até o fim' me dá \num mau pressentimento..."
85413329909-0-Talk-1 = "Nossa longa jornada \nfinalmente chegou \nao seu clímax."
85413329918-0-Talk-1 = "Sabia disso? \nA astrologia \nnão tem um fim."
85413329918-0-Talk-2 = "Tudo é um \nciclo contínuo."