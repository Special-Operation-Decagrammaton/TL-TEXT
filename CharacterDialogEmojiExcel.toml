85413340711-0-Talk-2 = "it's better to eat or\ndrink something,\nisn't it...?"
85412670713-0-Talk-1 = "Reality is a\nsoftlock..."
85412680714-0-Talk-1 = "...It'll be okay.\nBecause Sensei is here."
