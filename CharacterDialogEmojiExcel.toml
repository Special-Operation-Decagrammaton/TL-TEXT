85412670513-0-Talk-1 = "But I really gave it\nmy best! Hmph!"
85412680514-0-Talk-1 = "But if I can be of\nhelp to everyone..."
85413370215-0-Talk-1 = "Can I turn on the AC?\nI wonder if the President\nwould mind?"
