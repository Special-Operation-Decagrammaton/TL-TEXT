85412670111-0-Talk-1 = "I figured out\none thing!"
85412670111-0-Talk-2 = "That I don't\nunderstand anything!"
85412670112-0-Talk-1 = "Want to try, Sensei?\nEh, you're good?\nI see..."
85412670113-0-Talk-1 = "I'm doing exactly\nwhat my seniors told me\nto do, but...!"
85412670114-0-Talk-1 = "Whoa... there are\nso many buttons and things\nI don't recognize..."
85412670115-0-Talk-1 = "It's the final stretch,\nSensei! Let's go!"
85432670116-0-Talk-1 = "I'm glad Himari-senpai\nbrought me back,\nbut..."
85432670117-0-Think-1 = "(Sensei is safe, right?\nThey'll be okay... right?)"
85432670118-0-Talk-1 = "Aris... Kei...\nEimi... Toki...\nPresident... Sensei..."
85432670119-0-Talk-1 = "I have to... I have to\nkeep smiling, at least!"
85432670120-0-Talk-1 = "Let's finish it all with this!\nFor the sake of those three, too!"
85412680121-0-Talk-1 = "I wonder what\nthis is..."
85412680122-0-Talk-1 = "Welcome back,\nSensei."
85412680122-0-Talk-2 = "It looks like... a hangar,\nI think."
85412680123-0-Talk-1 = "It seems we're using\nthe Prophet's Core for something...\nBut what...?"
85412680124-0-Talk-1 = "Even though Kei-chan\nand the President\nexplained it properly...\nI'm sorry."
85442680125-0-Talk-1 = "We can perform\nan upgrade!"
85432680126-0-Talk-1 = "Sensei... everyone...!"
85432680127-0-Think-1 = "(I have to pull myself\ntogether...! Get it together!)"
85432680128-0-Talk-1 = "President... where\nhave you gone...?"
85432680129-0-Talk-1 = "Please, let everyone\nbe safe...!"
85413310130-0-Talk-1 = "How should I\ninterpret this result...?"
85413310131-0-Talk-1 = "This used to be\na hangar, but..."
85413310131-0-Talk-2 = "It's starting to feel\nlike a multipurpose room."
85413310133-0-Talk-1 = "There must be a way through..."
85413310134-0-Talk-1 = "Let's analyze\nthe Prophet's Core\nhere."
85413310135-0-Talk-1 = "The upgrade\npreparations are complete."
85413350201-0-Talk-1 = "This is the first step\ntoward our initial goal."
85413340202-0-Talk-1 = "Aris... is getting\nkind of excited!"
85413360203-0-Talk-1 = "I wonder if there's\nanywhere to hide...?"
85412670204-0-Talk-1 = "Ooh... even though it's my\nfirst time here, it feels\nsomehow nostalgic!"
85412670204-0-Talk-2 = "It's such a\nstrange feeling!"
85412680205-0-Talk-1 = "Sis... I really wish\nyou'd take this a bit\nmore seriously."
85413360212-0-Talk-1 = "I-I knew it, it's\ntoo dangerous outside\nthe locker..."
85413330207-0-Talk-1 = "Please, have some\nchamomile tea."
85413330207-0-Talk-2 = "It is said to\nhave a relaxing\neffect."
85413310208-0-Think-1 = "(I am currently\nright here...)"
85413310208-0-Think-2 = "(I wonder if this is\na rational course of action\n...?)"
85413320209-0-Talk-1 = "The more important the task,\nthe more vital it is to stay calm."
85413350210-0-Talk-1 = "I won't let Aris,\nor any of you,\nget hurt."
85413340211-0-Talk-1 = "...So this is the first step\ntoward saving the world."
85413340211-0-Talk-2 = "Aris will do her best!"
85413360303-0-Talk-1 = "There's a game console\nhere too..."
85412670213-0-Talk-1 = "If I'd known, I would've\nbrought more games~!"
85412680214-0-Talk-1 = "I wonder if we'll\nbe able to get home\nsafely..."
85413360312-0-Think-1 = "(I wonder what kind of\ngames are downloaded\non this...?)"
85413330216-0-Talk-1 = "As both a perfect maid\nand the best agent,"
85413330216-0-Talk-2 = "please let me know\nif there is anything\nI can assist you with."
85413310217-0-Talk-1 = "I'm continuing the\nmonitoring, just in case."
85413320218-0-Talk-1 = "Shall I try to divine\nthe future with astrology\n...?"
85413350301-0-Talk-1 = "I wonder what kind\nof drinks everyone\nlikes..."
85413340302-0-Talk-1 = "I brought a\ngame console!"
85413340302-0-Talk-2 = "Would you like to play\nwith me, Sensei?"
85413360403-0-Talk-1 = "I really... don't want\nto get off anymore..."
85412670304-0-Talk-1 = "This place really\nis amazing...!"
85412680305-0-Talk-1 = "It... it was incredible..."
85413360412-0-Talk-1 = "Sensei... you'll stay\nwith me, right...?"
85413330307-0-Talk-1 = "It's enough for me\nif Sensei acknowledges\nmy efforts."
85413350310-0-Talk-1 = "Is there any point\nin putting money into\nthis vending machine...?"
85413340311-0-Talk-1 = "Rest is especially important\nat times like these!"
85412670313-0-Talk-1 = "But well, the scale\nmight be smaller than\nbefore?"
85412680314-0-Talk-1 = "And we're just\nthe Game Development\nDepartment..."
85413330316-0-Talk-1 = "Thanks to the lightweight suit,\nmore nimble movements\nare now possible."
85413350401-0-Talk-1 = "I feel like this body...\nwas made quite well."
85413340402-0-Talk-1 = "Everyone was\namazing!"
85413360603-0-Talk-1 = "Sensei has been fighting\nenemies like this all\nthis time..."
85413360612-0-Talk-1 = "Somehow, when I'm\nwith Sensei... I'm not\nscared... hehe..."
85413330407-0-Talk-1 = "I'm bored.\nPlease play with me."
85413310408-0-Think-1 = "(Precisely because\nof this situation,)"
85413310408-0-Think-2 = "(playing games might\nactually be rational...)"
85413320409-0-Talk-1 = "Sweet things can\nhelp reduce stress,\nyou know."
85413350410-0-Talk-1 = "I'll give those girls\ncredit for their\nengineering skills, at least."
85413340411-0-Talk-1 = "Being free is\na wonderful thing...!"
85413330416-0-Talk-1 = "I should have\nbrought more manga."
85413310417-0-Talk-1 = "A game console... It's\nnothing more than simple\ndevices and programs, and yet..."
85413320418-0-Talk-1 = "A drink that matches\ntoday's lucky color is..."
85413350501-0-Talk-1 = "Good work, everyone."
85413340502-0-Talk-1 = "You were all truly\nmagnificent! I respect\nyou so much!"
85413360803-0-Talk-1 = "President Rio, and\nHimari-senpai... you're\nboth amazing..."
85412670504-0-Talk-1 = "Honestly, for a moment\nthere I wasn't sure what\nwas gonna happen..."
85412680505-0-Talk-1 = "I thought it was\nall over..."
85413360812-0-Talk-1 = "They're teaching me\nall sorts of things, but..."
85413360812-0-Talk-2 = "I sort of get it,\nbut I also sort\nof don't..."
85413310508-0-Talk-1 = "We should prepare for\nevery possible outcome here..."
85413320509-0-Talk-1 = "For a break..."
85413320509-0-Talk-2 = "Shall I make you\na warm beverage or\nsomething?"
85413350510-0-Talk-1 = "Eimi and Toki went\nto inspect the\ntransport ship."
85413340511-0-Talk-1 = "Courage... that's where\nthe true power lies!"
