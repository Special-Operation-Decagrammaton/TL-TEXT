85413310817-0-Think-2 = "(Maybe I should\nconsult Sensei...)"
85413320818-0-Talk-1 = "No need to worry.\nI'm still full of\nenergy."
85412670904-0-Talk-1 = "Maybe I can say it\nthis time...! I came,\nI saw!"
85412670904-0-Talk-2 = "I conqu...! Well,\nmaybe not yet... not yet."
85412670913-0-Talk-1 = "We can win this, right\nSensei? I'm counting\non you!"
