85413340802-0-Talk-1 = "Momoi and Midori said\nthey were going to rest\nin their room..."
85413370706-0-Talk-1 = "For some reason, I'm\nin the mood to go to\nthe kitchen."
85413370715-0-Talk-1 = "There are things in\nthis world that aren't\nlogical but are efficient."
