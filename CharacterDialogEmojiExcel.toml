[translation]
1-0-Talk-1 = "Está barulhento por aqui..."
1-1-Think-1 = "(Uma festa da Gehenna...?)"
3-0-Think-1 = "Agora posso entrar no duto de ventilação."
3-0-Think-2 = "Preciso me mover rápido."
8431999016-0-Think-1 = "(Salvei os dados coletados.)"
8431999017-0-Think-1 = "(Dados coletados, salvos.)"
8431999018-0-Think-1 = "(Preciso que a Neru também traga os dados.)"
8431999019-0-Think-1 = "(Também vou precisar dos dados da Seia.)"
8430001000-0-Think-1 = "(Se eu não me mexer, não serei notada.)"
8430001000-0-Think-2 = "(Vou avançar quando for o momento certo.)"
8430001010-1-Talk-1 = "...é..."
8430001010-2-Talk-1 = "...mas...e..."
8430001010-0-Think-1 = "(Ainda está longe...)"
8430001030-1-Talk-1 = "Já está quase na hora."
8430001030-2-Talk-1 = "Vamos entregar isso logo e ir embora."
8430001030-0-Think-1 = "(...Entendi.)"
8430001040-0-Think-1 = "(Ainda tenho coisas para fazer.)"
8430001050-0-Think-1 = "(Vou esperar um pouco.)"
8430003000-0-Think-1 = "(Tem uma chave de segurança para a sala trancada mais à frente, né?)"
8430003000-0-Think-2 = "(A vontade que dá é de quebrar tudo e ir em frente...)"
8430003000-0-Think-3 = "(Infiltração não é muito a minha praia.)"
8430003000-0-Think-4 = "(Se minha vida diminuir... é só tomar uma poção de cura, né?)"
8430003010-0-Think-1 = "(Ainda tenho coisas para fazer.)"
8430006000-0-Think-1 = "(Drones... Uma visão inimaginável na Trinity.)"
8430006000-0-Think-2 = "(Deve haver uma porta no final do corredor, mas...)"
8430006010-0-Think-1 = "(Um robô em forma de cachorro?...)"
8430006010-1-Talk-1 = "Seia, por aqui."
8430006010-0-Talk-1 = "...Rio?"
8430006010-1-Talk-2 = "Instalei um comunicador nele."
8430006010-1-Talk-3 = "Ele permite salvar os dados que você coletar no caminho."
8430006020-0-Think-1 = "(Acho que não vou conseguir passar por aqui sozinha.)"
8430006020-0-Think-2 = "(Preciso contatar a Rio.)"
8430006030-1-Talk-1 = "Eu estava justamente garantindo uma rota."
8430006030-1-Talk-2 = "Poderia desligar o exaustor? Você deve conseguir passar direto pelo duto."
8430006040-0-Think-1 = "(Isso é... um quadro de distribuição...?)"
8430006050-0-Think-1 = "(Agora devo conseguir passar pelo duto.)"
8430006050-0-Think-2 = "(Preciso me mover rápido.)"
8431001000-0-Think-1 = "(Aquilo ali...)"
8431001000-0-Think-2 = "(Parece uma pista diferente das outras.)"
8431001010-0-Think-1 = "(Por aqui...)"
8431001011-0-Think-1 = "(...É aquilo? Ainda bem que tenho o detector.)"
8431002000-0-Think-1 = "(Cheguei... ufa...)"
8431002000-0-Think-2 = "(...Vou um pouco mais para o fundo?)"
8431002010-0-Think-1 = "(Parece que vai ser difícil me aproximar sem ser notada.)"
8431002010-0-Think-2 = "(Ah, é mesmo, eu tinha joelheiras.)"
8431002010-0-Think-3 = "(Foi perfeito.)"
8431002020-1-Talk-1 = "Quando isso acabar, vamos encher a cara!"
8431002020-2-Talk-1 = "Vamos fazer um after também!"
8431002020-3-Talk-1 = "Teppanyaki! Eu quero teppanyaki!"
8431002030-0-Think-1 = "(Falaram para eu não atirar, né...)"
8431002030-0-Bulb-1 = "[전구]"
8431002030-0-Think-2 = "(Agora que lembrei, eu tenho um silenciador.)"
8431002030-0-Think-3 = "(...Sério, ele não deixa passar nada.)"
8431003000-0-Think-1 = "(Que situação...)"
8431003000-0-Think-2 = "(Se não me engano, eu posso usar isso para entrar em contato, certo?)"
8431003000-0-Think-3 = "(Espero que conecte...)"
8431003010-0-Talk-1 = "...Ah, entendi a maior parte."
8431003010-0-Talk-2 = "Exaustor? Entendido, vou procurar."
8431004000-0-Think-1 = "(E quanto à Seia...)"
8431004000-0-Think-2 = "(...Bem, ela deve se virar de alguma forma.)"
8431004010-0-Think-1 = "(Isso... vamos deixar para lá.)"
8431005000-0-Think-1 = "(Preciso sair daqui.)"
8431005000-0-Think-2 = "(Não posso ser pega... minha intuição está me dizendo isso.)"
8431006000-0-Think-1 = "Estranho..."
8431006000-0-Think-2 = "(Que sensação esquisita...)"
8431006000-0-Dot-1 = "[…]"
8431006000-0-Exclaim-1 = "[!]"
8431006000-0-Talk-1 = "É uma armadilha...!"
8431006000-0-Talk-2 = "Preciso da sua ajuda, Neru."
8431006010-0-Exclaim-1 = "[!]"
8431006010-0-Think-1 = "......A Neru está em perigo."
8431006020-0-Think-1 = "Vou ter que pedir para a Seia abrir."
8431007000-0-Think-1 = "(Nesse ritmo, serei alcançada.)"
8431007000-0-Think-2 = "(Não tem nada que possa bloquear o caminho...?)"
