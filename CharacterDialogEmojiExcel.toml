[translation]
1-0-Talk-1 = "Está bem barulhento por aqui..."
1-1-Think-1 = "（Uma festa da Gehenna...）"
3-0-Think-1 = "Agora já consigo entrar no duto de ventilação."
3-0-Think-2 = "Nossa, preciso me apressar e seguir em frente."
8431999016-0-Think-1 = "（Salvei os dados coletados.)"
8431999017-0-Think-1 = "（Dados coletados foram salvos.）"
8431999018-0-Think-1 = "（Preciso que a Neru traga os dados dela também.）"
8431999019-0-Think-1 = "（Também vou precisar dos dados da Seia.）"
8430001000-0-Think-1 = "（Se eu não me mexer, não vão me notar.）"
8430001000-0-Think-2 = "（Vou esperar o momento certo para avançar.）"
8430001010-1-Talk-1 = "...hã..."
8430001010-2-Talk-1 = "...que... e..."
8430001010-0-Think-1 = "（Ainda estão longe...）"
8430001030-1-Talk-1 = "Já está quase na hora."
8430001030-2-Talk-1 = "Vamos entregar isso logo e ir embora."
8430001030-0-Think-1 = "（...Entendi.）"
8430001040-0-Think-1 = "（Ainda tenho coisas para fazer.)"
8430001050-0-Think-1 = "（Vou esperar um pouco.)"
8430003000-0-Think-1 = "（Tinha uma chave de segurança naquela sala trancada mais à frente, não era?）"
8430003000-0-Think-2 = "（Que vontade de quebrar tudo e ir abrindo caminho...）"
8430003000-0-Think-3 = "（Missões de infiltração não são a minha praia.）"
8430003000-0-Think-4 = "（Se a minha energia começar a cair... é só tomar uma poção de cura, né?）"
8430003010-0-Think-1 = "（Ainda tenho o que fazer.)"
8430006000-0-Think-1 = "（Drones... Uma cena inimaginável em Trinity.）"
8430006000-0-Think-2 = "（Deveria haver uma porta no final deste corredor.）"
8430006010-0-Think-1 = "（Um cão-robô...）"
8430006010-1-Talk-1 = "Seia, por aqui."
8430006010-0-Talk-1 = "...Rio?"
8430006010-1-Talk-2 = "Instalei um comunicador nele."
8430006010-1-Talk-3 = "Assim você poderá salvar os dados que coletar no meio do caminho."
8430006020-0-Think-1 = "（Acho que não vou conseguir passar por aqui sozinha.）"
8430006020-0-Think-2 = "（Preciso entrar em contato com a Rio.）"
8430006030-1-Talk-1 = "Eu estava justamente abrindo um caminho para você."
8430006030-1-Talk-2 = "Poderia desligar o exaustor? Você deve conseguir passar direto pelo duto."
8430006040-0-Think-1 = "（Isso é... um painel elétrico...?)"
8430006050-0-Think-1 = "（Isso deve ser o suficiente para atravessar o duto.)"
8430006050-0-Think-2 = "（Preciso me apressar.)"
8431001000-0-Think-1 = "（Aquilo é...）"
8431001000-0-Think-2 = "（Parece ser uma pista diferente das outras.）"
8431001010-0-Think-1 = "（Por aqui...）"
8431001011-0-Think-1 = "（...Ah, ali está. Ainda bem que trouxemos o rastreador.）"
8431002000-0-Think-1 = "（Cheguei...）"
8431002000-0-Think-2 = "（...Acho que vou um pouco mais fundo.）"
8431002010-0-Think-1 = "（Acho que vai ser difícil me aproximar sem ser notada.）"
8431002010-0-Think-2 = "（Ah, pensando bem, eu tenho as joelheiras.）"
8431002010-0-Think-3 = "（Vieram a calhar.）"
8431002020-1-Talk-1 = "Vamos comemorar com tudo quando isso acabar!"
8431002020-2-Talk-1 = "Vamos fazer uma segunda rodada também!"
8431002020-3-Talk-1 = "Teppanyaki! Eu quero comer Teppanyaki!"
8431002030-0-Think-1 = "（E ainda me disseram para não atirar...）"
8431002030-0-Bulb-1 = "[전구]"
8431002030-0-Think-2 = "（Ah é, eu tenho o silenciador.）"
8431002030-0-Think-3 = "（...Sério, aquela ali não deixa passar nada.）"
8431003000-0-Think-1 = "（Essa não...）"
8431003000-0-Think-2 = "（Se me lembro bem, era assim que se entrava em contato, certo?）"
8431003000-0-Think-3 = "（Espero que a ligação complete...）"
8431003010-0-Talk-1 = "...Ah, acho que entendi."
8431003010-0-Talk-2 = "Exaustor? Entendido, vou dar uma procurada."
8431004000-0-Think-1 = "（Quanto à Seia...）"
8431004000-0-Think-2 = "（...Bom, ela deve se virar bem de algum jeito.）"
8431004010-0-Think-1 = "（Isso aqui... melhor deixar com ela.）"
8431005000-0-Think-1 = "（Preciso sair daqui.）"
8431005000-0-Think-2 = "（Não posso ser pega... Meus instintos estão me avisando.）"
8431006000-0-Think-1 = "Estranho..."
8431006000-0-Think-2 = "（Que sensação esquisita...）"
8431006000-0-Dot-1 = "[…]"
8431006000-0-Exclaim-1 = "[!]"
8431006000-0-Talk-1 = "Uma armadilha...!"
8431006000-0-Talk-2 = "Vou precisar da sua ajuda, Neru."
8431006010-0-Exclaim-1 = "[!]"
8431006010-0-Think-1 = "......A Neru está em perigo."
8431006020-0-Think-1 = "Vou ter que pedir para a Seia abrir isso para mim."
8431007000-0-Think-1 = "（Se eu continuar assim, vão me alcançar.）"
8431007000-0-Think-2 = "（Será que há algo que eu possa usar para bloquear o caminho...?）"
