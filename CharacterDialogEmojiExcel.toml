[translation]
1-0-Talk-1 = "周りが騒がしいですね…。"
1-1-Think-1 = "（ゲヘナのパーティーか…）"
3-0-Think-1 = "이제 환풍구로 진입할 수 있겠어"
3-0-Think-2 = "이런 서둘러서 이동해야겠어요"
8431999016-0-Think-1 = "（集めたデータを保存した)"
8431999017-0-Think-1 = "（収集データ、保存したぞ）"
8431999018-0-Think-1 = "（ネルにもデータを持ってきてもらわねば）"
8431999019-0-Think-1 = "（セイアのデータも必要だな）"
8430001000-0-Think-1 = "（動かなければ気付かれないはずだ）"
8430001000-0-Think-2 = "（タイミングを見て進もう）"
8430001010-1-Talk-1 = "…は…。"
8430001010-2-Talk-1 = "…が…で…。"
8430001010-0-Think-1 = "（まだ遠いな…）"
8430001030-1-Talk-1 = "そろそろ時間だ。"
8430001030-2-Talk-1 = "早く渡して帰ろうぜ。"
8430001030-0-Think-1 = "（…なるほど）"
8430001040-0-Think-1 = "（まだやることがある)"
8430001050-0-Think-1 = "（少し待つとしよう)"
8430003000-0-Think-1 = "（この先のロックされた部屋にはセキュリティキーがあるんだっけか）"
8430003000-0-Think-2 = "（もう全部ぶっ壊して進みてぇ…）"
8430003000-0-Think-3 = "（潜入って性に合わねぇんだよな）"
8430003000-0-Think-4 = "（体力が減ってきたら……回復薬を飲めばいいんだっけか）"
8430003010-0-Think-1 = "（まだやることがあってな)"
8430006000-0-Think-1 = "（ドローン…トリニティでは想像できない光景だね）"
8430006000-0-Think-2 = "（通路の突きあたりまで行けばドアがあるはずだが）"
8430006010-0-Think-1 = "（犬型ロボット…）"
8430006010-1-Talk-1 = "セイア、こっちよ。"
8430006010-0-Talk-1 = "…リオか？"
8430006010-1-Talk-2 = "通信機を取りつけてあるわ。"
8430006010-1-Talk-3 = "途中で収集したデータを保存できるようになっているの。"
8430006020-0-Think-1 = "（ここは一人で通れそうにない）"
8430006020-0-Think-2 = "（リオに連絡しなくては）"
8430006030-1-Talk-1 = "ちょうど進路を確保していたところよ。"
8430006030-1-Talk-2 = "換気扇を止めてもらえるかしら。そのままダクトを通れるはずよ。"
8430006040-0-Think-1 = "（これは…配電盤…？)"
8430006050-0-Think-1 = "（これでダクトを通れそうだ)"
8430006050-0-Think-2 = "（急いで移動しよう)"
8431001000-0-Think-1 = "（あれは…）"
8431001000-0-Think-2 = "（ほかとは違う手掛かりのようだね）"
8431001010-0-Think-1 = "（このあたりに…）"
8431001011-0-Think-1 = "（…あれか。探知機があって助かった）"
8431002000-0-Think-1 = "（到着…っと）"
8431002000-0-Think-2 = "（…もう少し奥まで行くか）"
8431002010-0-Think-1 = "（バレずに近づくのは厳しそうだな）"
8431002010-0-Think-2 = "（ああ、そういえばニーパッドがあったな）"
8431002010-0-Think-3 = "（ちょうどよかった）"
8431002020-1-Talk-1 = "これが終わったらパアっとやろうぜ！"
8431002020-2-Talk-1 = "二次会もやっちゃお！"
8431002020-3-Talk-1 = "鉄板焼き！鉄板焼き食べたいっす！"
8431002030-0-Think-1 = "（銃は撃つなって言われてるしな…）"
8431002030-0-Bulb-1 = "[전구]"
8431002030-0-Think-2 = "（そういえば消音ストックがあったな）"
8431002030-0-Think-3 = "（…本当、隙のねぇヤツ）"
8431003000-0-Think-1 = "（参ったな…）"
8431003000-0-Think-2 = "（確かこれで連絡を取れるのだったか）"
8431003000-0-Think-3 = "（繋がるといいのだが…）"
8431003010-0-Talk-1 = "…ああ、大体分かった。"
8431003010-0-Talk-2 = "換気扇？了解、探してみる。"
8431004000-0-Think-1 = "（セイアの方は…）"
8431004000-0-Think-2 = "（…まぁ、適当にうまくやるだろ）"
8431004010-0-Think-1 = "（これは……あっちに頼もうぜ）"
8431005000-0-Think-1 = "（ここから離れなくては）"
8431005000-0-Think-2 = "（捕まってはならない…勘がそう告げている）"
8431006000-0-Think-1 = "おかしい…"
8431006000-0-Think-2 = "（この違和感は…）"
8431006000-0-Dot-1 = "[…]"
8431006000-0-Exclaim-1 = "[!]"
8431006000-0-Talk-1 = "罠か…っ！"
8431006000-0-Talk-2 = "力を貸してほしい、ネル。"
8431006010-0-Exclaim-1 = "[!]"
8431006010-0-Think-1 = "……ネルの身が危険だ。"
8431006020-0-Think-1 = "セイアに開けてもらわねぇとな。"
8431007000-0-Think-1 = "（このままでは追いつかれる）"
8431007000-0-Think-2 = "（何か進路を妨げられるものは…）"
7-0-Talk-1 = "1"
7-0-Talk-2 = "2"
