85433320106-0-Talk-1 = "I need to look for\nwhat I can do\nhere."
85433320107-0-Think-1 = "(Sensei told us\nto return to the\ntransport ship,)"
85433320107-0-Think-2 = "(so there must\nbe a reason\nfor it.)"
85433320108-0-Think-1 = "(Sensei said...\nin case of\nemergency...)"
85433320108-0-Think-2 = "(Which means...)"
85433320109-0-Talk-1 = "Everyone... please\nstay safe..."
85433320110-0-Talk-1 = "It is time to\nput an end to\neverything."
85433320110-0-Talk-2 = "We will also\ndo our absolute\nbest."
85432670116-0-Talk-1 = "It's fine that\nHimari-senpai\nbrought me back,\nbut..."
85432670117-0-Think-1 = "(Sensei is safe,\nright? They'll be\nokay, right...?)"
85432670118-0-Talk-1 = "Aris... Kei...\nEimi... Toki...\nPresident... Sensei..."
85432670119-0-Talk-1 = "At the very least...\nI have to keep\nsmiling, right?!"
85432670120-0-Talk-1 = "Let's end\neverything here!\nFor the three of them!"
85432680126-0-Talk-1 = "Sensei... everyone...!"
85432680127-0-Think-1 = "(I need to pull\nmyself together...!\nStay strong!)"
85432680128-0-Talk-1 = "President...\nwhere did you\ngo...?"
85432680129-0-Talk-1 = "Please, I hope\neveryone stays\nsafe...!"
85412670904-0-Talk-1 = "I wonder if I can\nsay it this time...!\nI came, I saw!"
85412670904-0-Talk-2 = "And I conq...!\nWait, no, I haven't\nwon yet."
85412670913-0-Talk-1 = "We can win,\nright, Sensei?\nI believe in you!"
85412689905-0-Talk-1 = "I still can't\nbelieve it at all..."
85412689905-0-Talk-2 = "How did it\ncome to this?"
85412689914-0-Talk-1 = "I will do my\nbest until the\nvery end."
85412689914-0-Talk-2 = "Ah, saying 'the end'\nkind of sounds a bit\nominous, doesn't it...?"
85413329909-0-Talk-1 = "Our long journey is\nfinally reaching its\nclimax, isn't it?"
85413329918-0-Talk-1 = "Did you know?\nThere is no end\nto astrology."
85413329918-0-Talk-2 = "Everything moves\nin a cycle."