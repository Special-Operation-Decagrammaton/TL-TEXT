85413320101-0-Talk-1 = "Grasping and analyzing the situation\nis our first priority."
85413320101-0-Talk-2 = "Even that will be no easy task."
85413320102-0-Talk-1 = "The Iron Continent... It truly is\na 'singular phenomenon.'"
85413320102-0-Talk-2 = "Though it's a bit different\nin nature from what\nI was expecting."
85413320103-0-Talk-1 = "We've finally\ncome this far."
85413320104-0-Talk-1 = "We will... definitely\nfind a way."
85433320105-0-Talk-1 = "Sensei. I'll leave the\nfinal blow to you."
