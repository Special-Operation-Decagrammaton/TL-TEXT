85413320101-0-Talk-1 = "Compreender e\nanalisar a situação é a prioridade."
85413320101-0-Talk-2 = "Mesmo isso não sendo\numa tarefa fácil."
85413320102-0-Talk-1 = "O Continente de Aço...\nÉ realmente um\n'Fenômeno Singular'."
85413320102-0-Talk-2 = "É um pouco diferente\ndo que eu\nestava esperando, mas..."
85413320103-0-Talk-1 = "Finalmente,\nchegamos até aqui."
85413320104-0-Talk-1 = "Nós... com certeza,\nencontraremos um caminho."
85433320105-0-Talk-1 = "Sensei. Por favor,\ndê o golpe final."
85433320106-0-Talk-1 = "Precisamos procurar\no que pode ser feito aqui."
85433320107-0-Think-1 = "(Se o Sensei\nnos disse para voltar\nao navio de transporte,)"
85433320107-0-Think-2 = "(deve haver um\nmotivo.)"
85433320108-0-Think-1 = "(O Sensei disse...\n'em caso de\nemergência'.)"
85433320108-0-Think-2 = "(Isso quer dizer...)"
85433320109-0-Talk-1 = "Pessoal...\npor favor, fiquem em\nsegurança..."
85433320110-0-Talk-1 = "É hora de\nterminar tudo."
85433320110-0-Talk-2 = "Nós também daremos\no nosso melhor."
85412670111-0-Talk-1 = "Tem uma coisa\nque eu já percebi!"
85412670111-0-Talk-2 = "Eu não faço a menor\nideia do que tá\nacontecendo!"
85412670112-0-Talk-1 = "Sensei, quer tentar também?\nEh, não quer?\nEntendi..."
85412670113-0-Talk-1 = "Estou tentando fazer\no que as veteranas\ndisseram, mas...!"
85412670114-0-Talk-1 = "Uau...\ntem um monte de botões\ne coisas que eu não\nentendo..."
85412670115-0-Talk-1 = "É a reta final,\nSensei! Vamos lá!"
85432670116-0-Talk-1 = "A Himari me trouxe\nde volta, o que é\nbom, mas..."
85432670117-0-Think-1 = "(O Sensei está\nbem, né?\nVai ficar tudo bem... né?)"
85432670118-0-Talk-1 = "Arisu... Key...\nEimi... Toki...\nPresidente... Sensei..."
85432670119-0-Talk-1 = "Pelo menos...\npelo menos eu tenho que\ncontinuar sorrindo!"
85432670120-0-Talk-1 = "Vamos acabar\ncom isso de uma vez!\nPor nós três!"
85412680121-0-Talk-1 = "O que será\nisso..."
85412680122-0-Talk-1 = "Bem-vindo de volta,\nSensei."
85412680122-0-Talk-2 = "Aqui é o... Hangar?\nParece que sim."
85412680123-0-Talk-1 = "Parece que vão usar\no núcleo da Profetisa para\nalguma coisa, mas... para quê..."
85412680124-0-Talk-1 = "A Key e a\nPresidente explicaram\ndireitinho, mas... me desculpe."
85442680125-0-Talk-1 = "Dá para fazer\num upgrade!"
85432680126-0-Talk-1 = "Sensei... pessoal...!"
85432680127-0-Think-1 = "(Eu preciso\nmanter a calma...!\nFoco!)"
85432680128-0-Talk-1 = "Presidente... para onde\nvocê foi..."
85432680129-0-Talk-1 = "Por favor, que todos\nestejam a salvo...!"
85413310130-0-Talk-1 = "Como devemos interpretar\nesse resultado..."
85413310131-0-Talk-1 = "Isso aqui era um hangar...\nmas agora,"
85413310131-0-Talk-2 = "tá parecendo uma\nsala multiuso."
85413310133-0-Talk-1 = "Precisamos de uma\nsolução, algo..."
85413310134-0-Talk-1 = "Vamos analisar\no núcleo da\nProfetisa aqui."
85413310135-0-Talk-1 = "A preparação para o\nupgrade está concluída."
85413350201-0-Talk-1 = "O primeiro passo\nem direção ao\nnosso objetivo inicial, né."
85413340202-0-Talk-1 = "Arisu...\nestá ficando animada!"
85413360203-0-Talk-1 = "Será que tem...\nalgum lugar para me esconder...?"
85412670204-0-Talk-1 = "Ohh... é a primeira vez\naqui, mas me dá uma\nsensação de nostalgia!"
85412670204-0-Talk-2 = "Que sensação\nengraçada!"
85412680205-0-Talk-1 = "Irmã...\neu queria que você levasse\nisso mais a sério."
85413360212-0-Talk-1 = "É-é perigoso... fora\ndo armário..."
85413330207-0-Talk-1 = "Aqui está o\nseu chá de camomila."
85413330207-0-Talk-2 = "Dizem que tem o\nefeito de aliviar\na tensão."
85413310208-0-Think-1 = "(Eu estou aqui\nagora...)"
85413310208-0-Think-2 = "(Será que isso é\numa atitude racional...?)"
85413320209-0-Talk-1 = "Quanto mais importante for a tarefa,\nmais essencial é manter a calma."
85413350210-0-Talk-1 = "Não deixarei que a Arisu,\nnem vocês, se machuquem."
85413340211-0-Talk-1 = "...Então, esse é\no primeiro passo para\nsalvar o mundo."
85413340211-0-Talk-2 = "A Arisu vai dar o seu melhor!"
85413360303-0-Talk-1 = "Tem um videogame\naqui também..."
85412670213-0-Talk-1 = "Se eu soubesse que seria assim,\ntinha trazido mais jogos~!"
85412680214-0-Talk-1 = "S-será que vamos\nconseguir voltar em segurança...?"
85413360312-0-Think-1 = "(Que tipo de jogos\nserá que estão baixados\naqui...?)"
85413330216-0-Talk-1 = "Como uma empregada perfeita\ne a melhor agente,"
85413330216-0-Talk-2 = "se houver algo\nem que eu possa ajudar,\npor favor, me diga."
85413310217-0-Talk-1 = "Por via das dúvidas,\ncontinuarei monitorando."
85413320218-0-Talk-1 = "Vamos tentar prever o futuro\ncom astrologia...?"
85413350301-0-Talk-1 = "Pessoal, que tipo\nde bebida vocês\ngostam...?"
85413340302-0-Talk-1 = "Eu trouxe um videogame!"
85413340302-0-Talk-2 = "Sensei, gostaria de\njogar também?"
85413360403-0-Talk-1 = "Sério...\neu não quero descer..."
85412670304-0-Talk-1 = "Esse lugar é\nrealmente incrível...!"
85412680305-0-Talk-1 = "F-foi impressionante..."
85413360412-0-Talk-1 = "Sensei...\nvocê vai ficar\ncomigo, né...?"
85413330307-0-Talk-1 = "Basta que o Sensei veja\nminhas realizações."
85413350310-0-Talk-1 = "Será que faz\nsentido colocar dinheiro\nnessa máquina de venda...?"
85413340311-0-Talk-1 = "Em momentos como esse,\ndescansar é fundamental!"
85412670313-0-Talk-1 = "Mas bem,\ntalvez a escala seja menor\ndo que antes?"
85412680314-0-Talk-1 = "Nós somos\nsó o Clube de Desenvolvimento de Jogos,\nafinal de contas..."
85413330316-0-Talk-1 = "Graças ao traje leve,\nagora consigo me movimentar\ncom mais agilidade."
85413350401-0-Talk-1 = "Este corpo...\nSinto que ele foi\nmuito bem feito."
85413340402-0-Talk-1 = "Vocês todas foram\nincríveis!"
85413360603-0-Talk-1 = "Então o Sensei... tem\nlutado contra inimigos assim..."
85413360612-0-Talk-1 = "De alguma forma,\nficar com o Sensei... me faz\nperder o medo... hehe..."
85413330407-0-Talk-1 = "Estou entediada.\nPor favor, brinque comigo."
85413310408-0-Think-1 = "(Justamente por\nestarmos nessa situação,)"
85413310408-0-Think-2 = "(jogar pode ser uma atitude\nracional...)"
85413320409-0-Talk-1 = "Doces ajudam a\naliviar o estresse."
85413350410-0-Talk-1 = "Vamos pelo menos\nreconhecer as habilidades\nde engenharia daquelas crianças."
85413340411-0-Talk-1 = "Ser livre é\numa coisa boa, né...!"
85413330416-0-Talk-1 = "Eu deveria ter trazido\nmais mangás."
85413310417-0-Talk-1 = "Um videogame... não passa de\num dispositivo e um programa\nsimples, mas..."
85413320418-0-Talk-1 = "Uma bebida com\na mesma cor da minha sorte\nde hoje é..."
85413350501-0-Talk-1 = "Bom trabalho\na todos."
85413340502-0-Talk-1 = "Vocês foram\nrealmente formidáveis!\nEu as respeito!"
85413360803-0-Talk-1 = "A Presidente Rio e\na Veterana Himari...\nsão incríveis..."
85412670504-0-Talk-1 = "Sério,\npor um momento eu não sabia\no que ia acontecer..."
85412680505-0-Talk-1 = "Pensei que tudo\nestivesse acabado..."
85413360812-0-Talk-1 = "Estou aprendendo\nvárias coisas, mas..."
85413360812-0-Talk-2 = "Parece que entendo e,\nao mesmo tempo, não entendo..."
85413310508-0-Talk-1 = "Este lugar está preparado\npara todas as possibilidades..."
85413320509-0-Talk-1 = "Para relaxar um pouco..."
85413320509-0-Talk-2 = "Gostaria que eu\npreparasse algo quente para beber?"
85413350510-0-Talk-1 = "A Eimi e a Toki\nforam inspecionar o navio\nde transporte."
85413340511-0-Talk-1 = "Coragem...\nisso sim é o verdadeiro poder!"
85413370206-0-Talk-1 = "É um lugar\nconfortável e eficiente,\nmas..."
85412670513-0-Talk-1 = "Mas eu me esforcei\nde verdade! Eheh!"
85412680514-0-Talk-1 = "Mas,\nse eu puder ser útil\npara todos..."
85413370215-0-Talk-1 = "Posso ligar o ar-condicionado?\nSerá que a presidente vai achar ruim?"
85413310517-0-Think-1 = "(O Clube de Desenvolvimento de Jogos...\neu sempre achei isso,)"
85413310517-0-Think-2 = "(mas elas são\ngarotas difíceis de prever...)"
85413320518-0-Talk-1 = "Dizem que dá para prever\no futuro lendo borra de café."
85413350601-0-Talk-1 = "A Arisu\nfoi dormir."
85413370306-0-Talk-1 = "Rações de combate\nsão eficientes, mas..."
85412670604-0-Talk-1 = "Eu já zerei\ntodos os jogos que eu trouxe..."
85412680605-0-Talk-1 = "A Eimi?\nEla disse que estava calor e\nsaiu."
85413370315-0-Talk-1 = "Será que comer\ntodos juntos é\nmais eficiente?"
85413330607-0-Talk-1 = "Recentemente, arrumei\num hobby (provisório)."
85413310608-0-Think-1 = "(Eu preparei\numa cozinha, mas...)"
85413310608-0-Think-2 = "(será que isso foi irracional...?)"
85413350610-0-Talk-1 = "Sensei, não se esqueça\nde descansar também!"
85413350610-0-Talk-2 = "E de escovar os dentes!"
85412670613-0-Talk-1 = "Sensei,\nvocê tem algum cartucho\nde jogo aí?"
85412680614-0-Talk-1 = "Aquele jogo de antes,\na dificuldade parecia meio\nestranha..."
85413330616-0-Talk-1 = "Eu tenho um arquivo\nde streams."
85413330616-0-Talk-2 = "Gostaria de\nassistir comigo?"
85413310617-0-Talk-1 = "Na verdade, eu..."
85413310617-0-Talk-2 = "Às vezes, eu até\nfalho em preparar\ncomida pronta..."
85413350701-0-Talk-1 = "Acho que estou\ncomeçando a entender o que\nsignifica 'descanso é importante'..."
85413340702-0-Talk-1 = "A Arisu ainda\nconsegue fazer mais, Sensei!"
85412670704-0-Talk-1 = "E se isso tudo\nfor só um sonho?"
85412670704-0-Talk-2 = "Seria tipo:\n'acordei e estava na sala do clube'!"
85412680705-0-Talk-1 = "Eu nunca imaginei que\nviríamos tão longe..."
85412680705-0-Talk-2 = "Nós somos só o\nClube de Desenvolvimento de Jogos."
85413350710-0-Talk-1 = "Você não tem nenhum machucado,\nné?"
85413340711-0-Talk-1 = "Para recuperar as energias,\no melhor é,"
85413340711-0-Talk-2 = "comer ou beber alguma\ncoisa..."
85412670713-0-Talk-1 = "A realidade é um\njogo sem saída..."
85412680714-0-Talk-1 = "...Vai ficar tudo bem, né.\nO Sensei está aqui com a gente."
85413350801-0-Talk-1 = "Sério, aquele trio todo de branco...!"
85413340802-0-Talk-1 = "A Momoi e a Midori disseram\nque iam descansar no quarto..."
85413370706-0-Talk-1 = "De alguma forma,\nestou morrendo de vontade de ir pra cozinha."
85413370715-0-Talk-1 = "Existem coisas no mundo\nque não são racionais, mas\nsão eficientes, né."
85413330807-0-Talk-1 = "Reconhecimento?\nAguardando ordens."
85413310808-0-Think-1 = "(Como eu deveria...\niniciar uma conversa...?)"
85413320809-0-Talk-1 = "Ainda bem...\nVocês estão todas a salvo."
85413350810-0-Talk-1 = "...Já que eu\nsou a mais velha.\nVou me segurar."
85413340811-0-Talk-1 = "A Arisu...\nse todas estiverem a salvo,"
85413340811-0-Talk-2 = "isso é o\nsuficiente para mim."
85413370806-0-Talk-1 = "Sensei, quer beber alguma coisa\ngelada também?"
85413370815-0-Talk-1 = "Meus pensamentos estão\numa bagunça..."
85413370815-0-Talk-2 = "Quando não é o meu corpo,\nmas a minha cabeça que está\nfervendo,"
85413370815-0-Talk-3 = "o que eu devo fazer...?"
85413330816-0-Talk-1 = "Se me dedico tanto às missões,\né por vocês."
85413330816-0-Talk-2 = "...E, ao mesmo tempo,\npara ser elogiada."
85413310817-0-Think-1 = "(Como conversar\ncom as outras pessoas...)"
85413310817-0-Think-2 = "(Acho que devo\nconsultar o Sensei...)"
85413320818-0-Talk-1 = "Não há motivo para preocupação.\nEu ainda estou muito\nbem."
85412670904-0-Talk-1 = "Será que posso dizer isso\ndesta vez...!\nVim e vi!"
85412670904-0-Talk-2 = "E ven...!\nNão venci, não...\nAinda não."
85412670913-0-Talk-1 = "Nós vamos vencer, né,\nSensei? Eu confio\nem você!"
85412689905-0-Talk-1 = "Eu ainda\nnão consigo acreditar..."
85412689905-0-Talk-2 = "Como as coisas chegaram\na esse ponto?"
85412689914-0-Talk-1 = "Darei o meu melhor\naté o fim."
85412689914-0-Talk-2 = "Ah, dizer 'fim' dá uma\nsensação meio sinistra, né..."
85413329909-0-Talk-1 = "A longa jornada finalmente\nchegou ao seu clímax, não é?"
85413329918-0-Talk-1 = "Você sabia?\nA astrologia não tem\nfim."
85413329918-0-Talk-2 = "Tudo é um\nciclo contínuo."