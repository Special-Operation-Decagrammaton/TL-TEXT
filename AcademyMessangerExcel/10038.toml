[translation]
10038-100380010 = "Aqui é RABBIT1, solicitando permissão para pouso."
10038-100380020 = "……Miyako? Mandou mensagem pro número errado?"
10038-100380030 = "Descendo para uma altitude de 2000 pés, preparativos concluídos."
10038-100380040 = "……???"
10038-100380050 = "Aproximadamente 1.5 milhas do alvo―― Iniciaremos a invasão em breve."
10038-100380060 = "……Miyako? Que lugar exatamente você tá tentando invadir? Você não tá pulando da janela da Schale, né?!"
10038-100380070 = "Mudando de assunto repentinamente, o Sensei é do tipo que prefere cachorros? Ou gatos?"
10038-100380080 = "Sou da equipe dos cachorros."
10038-100380090 = "Sou da equipe dos gatos."
10038-100380100 = "Entendo. De fato, cachorros são leais e amigáveis, então muitas pessoas gostam deles."
10038-100380110 = "Entendo. De fato, gatos têm aquele charme fofo e distante, então muitas pessoas gostam deles."
10038-100380120 = "E você, Miyako? Cachorros ou gatos?"
10038-100380130 = "Bem, deixe-me ver. Eu diria que..."
10038-100380140 = "……Se eu tivesse que escolher, eu seria da equipe dos coelhos."
10038-100380160 = "Sensei, veja esta foto."
10038-100380170 = "Ele acabou de comer a ração e caiu no sono."
10038-100380180 = "Nossa, que fofinho."
10038-100380190 = "Não é? Os coelhos têm um charme muito diferente dos cães e gatos."
10038-100380200 = "Quando ele acordar mais tarde, eu tiro outra foto e te envio."
10038-100380210 = "Ah, falando nisso, eu ainda não decidi um nome para aquele coelhinho que o senhor me deu de presente."
10038-100380220 = "O senhor teria alguma sugestão de nome que represente bem a personalidade fofa, adorável e corajosa deste coelho?"
10038-100380230 = "Stanford II."
10038-100380240 = "Marmita de Enguia."
10038-100380250 = "Acho que esse nome é um pouco imponente e pomposo demais para um coelhinho..."
10038-100380260 = "……Eu sinceramente acho que dar nome de comida para um coelho é uma péssima ideia. O senhor está com fome?"
10038-100380270 = "Então que tal 'Pyonko'? (Saltitante)"
10038-100380280 = "Pyonko, Pyonko……"
10038-100380290 = "Sim, eu acho um nome maravilhoso."
10038-100380300 = "Sendo assim, a partir de hoje este coelho será chamado de Pyonko."
10038-100380310 = "Aqui é RABBIT1. Solicitando permissão para decolagem……"
10038-100380320 = "Miyako, para! Para o que você tá fazendo agora! Desce desse telhado!!"
10038-100380330 = "……Ué? Sensei?"
10038-100380340 = "Ah. Acabei enviando para o destinatário errado de novo, me desculpe."
10038-100380350 = "Vocês têm outra operação de salto hoje?"
10038-100380360 = "Sim. Temos uma operação de infiltração via helicóptero programada para as 22:00 de hoje."
10038-100380370 = "É uma missão para invadir a base de contrabandistas que estão importando animais ilegalmente para Kivotos."
10038-100380380 = "Incrível! Eu também vou saltar de helicóptero com vocês hoje!"
10038-100380390 = "Como é? O Sensei quer embarcar no helicóptero com a gente?!"
10038-100380400 = "Eu acho isso extremamente perigoso para um civil sem treinamento... O senhor vai ficar bem?"
10038-100380410 = "Sensei, o senhor teria um minuto……?"
10038-100380420 = "Não, na verdade não é nenhum assunto especial, eu só……"
10038-100380430 = "Pensando bem, eu entro em contato mais tarde."
10038-100380440 = "Desculpa, Miyako. Eu tava no meio de uma reunião super chata e só vi a mensagem agora. Tudo bem por aí?"
10038-100380450 = "Miyako……?"
10038-100380460 = "Eu não sabia disso na época em que vivíamos nos dormitórios da SRT, mas..."
10038-100380470 = "Quando você acampa por longos períodos, o verão consegue ser muito mais difícil do que o inverno."
10038-100380480 = "Aconteceu alguma coisa no parque?"
10038-100380490 = "Sim. Como entramos na temporada de chuvas recentemente..."
10038-100380500 = "Nossos equipamentos estão enferrujando, e a comida está estragando muito mais rápido."
10038-100380510 = "Estamos enfrentando vários problemas com isso."
10038-100380520 = "Mas o pior de tudo é que, por causa da chuva, as nossas roupas simplesmente não secam……"
10038-100380530 = "Estávamos todas quebrando a cabeça agora a pouco tentando achar uma solução para secar nossas... er... nossas roupas."
10038-100380540 = "Se é só isso, por que não trazem as roupas pra lavar na Schale?"
10038-100380550 = "Na... Na Schale?!"
10038-100380560 = "Sim! A sala de descanso daqui tem uma secadora industrial novinha! Eu até comprei um amaciante com cheirinho de lavanda na promoção!"
10038-100380570 = "Se colocarem as roupas lá, acho que tudo seca em menos de meio dia. Vão ficar super macias!"
10038-100380580 = "N-Não, por mais que o Sensei seja gentil em oferecer..."
10038-100380590 = "Nós não podemos abusar da sua bondade e levar... e-esse tipo de roupa delicada pro seu escritório..."
10038-100380600 = "Só... só dessa vez……"
10038-100380610 = "Por favor, nos salve da roupa úmida……"