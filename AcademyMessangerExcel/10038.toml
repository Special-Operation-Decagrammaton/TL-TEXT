[translation]
10038-100380010 = "Aqui é a RABBIT 1, solicito permissão para pousar."
10038-100380020 = "……Miyako? Você não enviou o e-mail para a pessoa errada?"
10038-100380030 = "Descendo para 2000 pés de altitude, preparativos concluídos."
10038-100380040 = "……???"
10038-100380050 = "Aproximadamente 1,5 milhas até o alvo... Iniciaremos a invasão em breve."
10038-100380060 = "……Miyako? Onde você está tentando invadir?"
10038-100380070 = "É meio repentino, mas, Sensei, você prefere cães ou gatos?"
10038-100380080 = "Prefiro cães."
10038-100380090 = "Prefiro gatos."
10038-100380100 = "Entendo. De fato, muitas pessoas gostam de cães por serem leais e amigáveis."
10038-100380110 = "Entendo. De fato, muitas pessoas gostam de gatos por seu charme fofo e um tanto indiferente."
10038-100380120 = "E você, Miyako? Prefere cães ou gatos?"
10038-100380130 = "Bem, eu..."
10038-100380140 = "...Se eu tivesse que escolher, acho que prefiro coelhos."
10038-100380160 = "Sensei, aqui está uma foto."
10038-100380170 = "Ele acabou de comer e foi dormir."
10038-100380180 = "Que fofinho."
10038-100380190 = "Não é? Coelhos têm um charme diferente dos cães e gatos."
10038-100380200 = "Quando ele acordar mais tarde, vou tirar outra foto e te enviar."
10038-100380210 = "Falando nisso, aquele coelho que você me deu de presente ainda não tem nome."
10038-100380220 = "Você tem alguma sugestão de nome que represente bem a personalidade fofa, adorável e corajosa deste coelho?"
10038-100380230 = "Stanford II"
10038-100380240 = "Unagi Don"
10038-100380250 = "Acho que é um nome muito extravagante para um coelho..."
10038-100380260 = "...Não sei se é uma boa ideia dar esse nome a um coelho."
10038-100380270 = "Então, que tal \"Pyonko\"?"
10038-100380280 = "Pyonko, Pyonko..."
10038-100380290 = "Sim, acho que é um nome adorável."
10038-100380300 = "Então, de agora em diante, vou chamar este coelho de Pyonko."
10038-100380310 = "Aqui é a RABBIT 1. Solicito permissão para decolar..."
10038-100380320 = "Miyako, pare! Pare!"
10038-100380330 = "...Hã? Sensei?"
10038-100380340 = "Ah. Enviei para o destinatário errado de novo, me desculpe."
10038-100380350 = "Tem uma operação de descida hoje também?"
10038-100380360 = "Sim. Uma operação de descida usando um helicóptero está agendada para as 22:00 de hoje."
10038-100380370 = "É uma missão para atacar contrabandistas que estão importando animais ilegalmente para Kivotos."
10038-100380380 = "Eu vou com você nesta operação de descida."
10038-100380390 = "O quê? Sensei, você também vai embarcar no helicóptero?"
10038-100380400 = "Acho que é perigoso... Você tem certeza?"
10038-100380410 = "Sensei, posso falar com você um instante...?"
10038-100380420 = "Não, não é nada de especial que eu queria falar..."
10038-100380430 = "Na verdade, eu entro em contato de novo mais tarde."
10038-100380440 = "Desculpe, Miyako. Eu estava em uma reunião, por isso demorei para ver."
10038-100380450 = "Miyako...?"
10038-100380460 = "Eu não sabia quando vivia na Academia Especial SRT, mas..."
10038-100380470 = "acampar por longos períodos é mais difícil no verão do que no inverno."
10038-100380480 = "Aconteceu alguma coisa?"
10038-100380490 = "Sim. Como entramos na estação chuvosa recentemente,"
10038-100380500 = "o equipamento está enferrujando e a comida está estragando mais rápido."
10038-100380510 = "Estamos com vários problemas."
10038-100380520 = "Acima de tudo, por causa da chuva, a roupa não seca de jeito nenhum..."
10038-100380530 = "Estávamos todas preocupadas, sem saber o que fazer."
10038-100380540 = "Nesse caso, que tal lavar a roupa na Schale?"
10038-100380550 = "Na Schale?"
10038-100380560 = "A sala de descanso da Schale também tem uma secadora."
10038-100380570 = "Acho que em meio dia já deve estar tudo seco."
10038-100380580 = "Não, mesmo que a Sensei tenha oferecido..."
10038-100380590 = "Não podemos nos aproveitar disso."
10038-100380600 = "Só desta vez..."
10038-100380610 = "Por favor..."
