[translation]
10038-100380010 = "Aqui é a RABBIT1, solicitando permissão para pouso."
10038-100380020 = "……Miyako? Mandou mensagem no chat errado, não?"
10038-100380030 = "Descendo para a altitude de 2000 pés, prontos para agir."
10038-100380040 = "……???"
10038-100380050 = "Cerca de 1.5 milhas até o alvo... Iniciando invasão em instantes."
10038-100380060 = "……Miyako? Vocês tão invadindo o quê?!"
10038-100380070 = "Mudando de assunto do nada, Sensei, você é do time dos cachorros ou dos gatos?"
10038-100380080 = "Sou time cachorro."
10038-100380090 = "Sou time gato."
10038-100380100 = "Entendi. Realmente, cachorros são muito leais e apegados, bastante gente gosta deles."
10038-100380110 = "Entendi. Realmente, gatos são fofos e têm aquele charme meio esnobe, bastante gente gosta deles."
10038-100380120 = "E você, Miyako? Cachorro ou gato?"
10038-100380130 = "Bom, eu..."
10038-100380140 = "……Se fosse para escolher, acho que sou do time dos coelhos."
10038-100380160 = "Sensei, olha essa foto."
10038-100380170 = "Ele acabou de comer a ração e capotou."
10038-100380180 = "Muito fofo!"
10038-100380190 = "Não é? Coelhos têm um charme todo especial, bem diferente de cachorro ou gato."
10038-100380200 = "Quando ele acordar, eu tiro mais foto e te mando."
10038-100380210 = "Falando nisso, aquele coelhinho que você me deu de presente ainda está sem nome."
10038-100380220 = "Você tem alguma ideia de um nome que combine com a personalidade fofa, adorável e corajosa dele?"
10038-100380230 = "Stanford II."
10038-100380240 = "Marmita de Enguia."
10038-100380250 = "Acho que esse nome é um pouco imponente demais para um coelhinho..."
10038-100380260 = "……Sem chance de eu dar nome de comida pra ele."
10038-100380270 = "Então que tal 'Pyonko'?"
10038-100380280 = "Pyonko, Pyonko..."
10038-100380290 = "Gostei, é um nome maravilhoso."
10038-100380300 = "A partir de agora ele vai se chamar Pyonko."
10038-100380310 = "Aqui é a RABBIT1. Solicitando permissão para decolagem..."
10038-100380320 = "Miyako, para! Para aí!"
10038-100380330 = "……Ué? Sensei?"
10038-100380340 = "Ah. Mandei para o contato errado de novo, mil perdões."
10038-100380350 = "Vocês têm operação de salto hoje de novo?"
10038-100380360 = "Sim. Temos uma operação de inserção por helicóptero programada para as 22h00 de hoje."
10038-100380370 = "A missão é fazer uma batida em um grupo de contrabandistas que está trazendo animais de forma ilegal para Kivotos."
10038-100380380 = "Vou colar com vocês nessa operação de salto então."
10038-100380390 = "Hã? O Sensei vai entrar no helicóptero com a gente?"
10038-100380400 = "Acho meio perigoso, viu... Tem certeza absoluta?"
10038-100380410 = "Sensei, você tem um minutinho...?"
10038-100380420 = "Não que eu precise de algo importante ou urgente, eu só..."
10038-100380430 = "Quer saber, depois eu entro em contato."
10038-100380440 = "Foi mal, Miyako. Tava em reunião e demorei pra ver a mensagem."
10038-100380450 = "Miyako...?"
10038-100380460 = "Na época que eu vivia na Academia SRT eu não sabia disso,"
10038-100380470 = "Mas acampar por muito tempo no verão é mil vezes pior do que no inverno, né."
10038-100380480 = "Aconteceu alguma coisa aí?"
10038-100380490 = "Pois é. Como a época de chuvas começou agora,"
10038-100380500 = "Nossos equipamentos estão enferrujando, a comida está estragando rápido..."
10038-100380510 = "Está sendo um perrengue atrás do outro."
10038-100380520 = "E o pior de tudo: a roupa não seca nunca com essa chuva..."
10038-100380530 = "A gente tava até agora quebrando a cabeça para ver o que fazer."
10038-100380540 = "Se for assim, querem lavar a roupa lá na Schale?"
10038-100380550 = "Lá na Schale...?"
10038-100380560 = "Tem uma secadora na nossa sala de descanso."
10038-100380570 = "Em meio dia já sai tudo sequinho e pronto pra usar."
10038-100380580 = "Imagina, por mais que o Sensei esteja oferecendo..."
10038-100380590 = "A gente não pode abusar da sua bondade desse jeito."
10038-100380600 = "Mas... só dessa vez..."
10038-100380610 = "Por favorzinho, salva a gente..."
