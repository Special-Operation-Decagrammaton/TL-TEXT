[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10038-100380010 = "Aqui é RABBIT 1, solicito permissão para o pouso."
10038-100380020 = "……Miyako? Acho que enviou para a pessoa errada."
10038-100380030 = "Descendo para uma altitude de 2000 pés, preparações concluídas."
10038-100380040 = "……???"
10038-100380050 = "Aproximadamente 1.5 milhas para o alvo―― iniciaremos a invasão em breve."
10038-100380060 = "……Miyako? Onde diabos você está tentando invadir?"
10038-100380070 = "Sendo um pouco repentina, mas você é do time dos cachorros ou dos gatos, Sensei?"
10038-100380080 = "Cachorros, com certeza."
10038-100380090 = "Gatos, com certeza."
10038-100380100 = "Entendo. É inegável que cachorros possuem muita lealdade e são incrivelmente amigáveis, o que lhes garante muitos fãs."
10038-100380110 = "Entendo. É inegável que gatos possuem um charme felino arisco e fofo, o que lhes garante muitos fãs."
10038-100380120 = "E você, Miyako? Cachorros ou gatos?"
10038-100380130 = "Bem, no meu caso……"
10038-100380140 = "……Se eu tivesse que escolher, seria do time dos coelhos."
10038-100380160 = "Sensei, tirei algumas fotos para você ver."
10038-100380170 = "Ela acabou de comer e adormeceu."
10038-100380180 = "Ela é absolutamente adorável."
10038-100380190 = "Não é mesmo? Coelhos possuem um charme bem distinto e único dos cães e gatos."
10038-100380200 = "Tirarei mais fotos para enviar assim que ela despertar."
10038-100380210 = "Aliás, ainda não definimos um nome para a coelhinha que você nos deu, Sensei."
10038-100380220 = "Alguma sugestão de nome que represente bem a fofura, o carinho e a bravura da personalidade dela?"
10038-100380230 = "Stanford II."
10038-100380240 = "Enguia Grelhada."
10038-100380250 = "Receio que seja um título pomposo demais para uma coelha, mas……"
10038-100380260 = "……Tenho minhas restrições sobre dar um nome de prato a uma coelha."
10038-100380270 = "Então que tal 'Pyonko'?"
10038-100380280 = "Pyonko, Pyonko……"
10038-100380290 = "Sim, acredito que seja um nome esplêndido."
10038-100380300 = "Nesse caso, a chamarei de Pyonko a partir de agora."
10038-100380310 = "Aqui é RABBIT 1. Solicito permissão para decolar……"
10038-100380320 = "Miyako, pare! Abortar missão!"
10038-100380330 = "……Ué? Sensei?"
10038-100380340 = "Ah. Enviei para o destinatário errado de novo, perdão."
10038-100380350 = "Terão alguma operação de descida aérea hoje também?"
10038-100380360 = "Sim. Temos uma operação de queda por helicóptero agendada para hoje às 22h00."
10038-100380370 = "A missão consiste em atacar contrabandistas importando animais ilegalmente para Kivotos."
10038-100380380 = "Nesse caso, eu irei junto nessa operação."
10038-100380390 = "Como é? Você planeja embarcar no helicóptero conosco, Sensei?"
10038-100380400 = "Temo que seja uma operação de altíssimo risco…… Você tem certeza?"
10038-100380410 = "Sensei, você teria um minuto……?"
10038-100380420 = "Não, não entrei em contato para tratar de nenhum assunto importante, mas……"
10038-100380430 = "Eu lhe envio outra mensagem mais tarde."
10038-100380440 = "Desculpa, Miyako. Eu estava numa reunião, então demorei para ver."
10038-100380450 = "Miyako……?"
10038-100380460 = "Não costumava notar isso quando vivíamos nos dormitórios da Academia SRT, mas"
10038-100380470 = "Ao que parece, quando se está acampando de forma prolongada, o verão consegue ser bem mais brutal e desgastante do que o próprio inverno."
10038-100380480 = "O que houve?"
10038-100380490 = "Bom. A estação das chuvas chegou."
10038-100380500 = "E nossos equipamentos começaram a enferrujar, a comida estraga rapidamente"
10038-100380510 = "E estamos tendo vários outros problemas logísticos."
10038-100380520 = "O pior de tudo é que, devido às chuvas intermitentes, as roupas nunca secam……"
10038-100380530 = "E estávamos num impasse, sem saber como contornar isso."
10038-100380540 = "Nesse caso, por que não lavam na Schale?"
10038-100380550 = "Na Schale, você diz?"
10038-100380560 = "Temos uma máquina de secar ali na sala de descanso, então"
10038-100380570 = "Tudo deve ficar bem sequinho em metade de um dia."
10038-100380580 = "Não, mesmo que você nos convide gentilmente,"
10038-100380590 = "Nós não poderíamos abusar da sua boa vontade ass――"
10038-100380600 = "Pelo menos desta vez……"
10038-100380610 = "Por favor……"