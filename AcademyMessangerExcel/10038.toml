[translation]
10038-100380010 = "こちらRABBIT1、着陸の許可を要請します"
10038-100380020 = "……ミヤコ？メール送り間違えてない？"
10038-100380030 = "高度2000フィートまで下降、準備完了です"
10038-100380040 = "……？？？"
10038-100380050 = "目標まで約1.5マイル――まもなく突入します"
10038-100380060 = "……ミヤコ？どこに突入しようとしてるの？"
10038-100380070 = "突然ですが、先生は犬派ですか？猫派ですか?"
10038-100380080 = "犬派だよ"
10038-100380090 = "猫派だよ"
10038-100380100 = "そうですか。確かに犬は忠誠心があり、人懐っこいということで好きな方が多いですね"
10038-100380110 = "そうですか。確かに猫は可愛くてつんとした魅力があって、好きな方が多いですね"
10038-100380120 = "ミヤコは犬派？猫派？"
10038-100380130 = "そうですね、 私は……"
10038-100380140 = "……強いて言えば、ウサギ派でしょうか"
10038-100380160 = "先生、写真をどうぞ"
10038-100380170 = "ちょうど餌を食べて寝たところです"
10038-100380180 = "すごく可愛いね"
10038-100380190 = "ですよね？ウサギには、犬や猫とはまた違った魅力があります"
10038-100380200 = "後で目覚めたら、また写真を撮って送りますね"
10038-100380210 = "そういえば先生からプレゼントしていただいた、あのウサギの名前がまだ決まってないんです"
10038-100380220 = "可愛くて愛おしくて勇敢なこのウサギの性格をよく表すような名前、何かないでしょうか？"
10038-100380230 = "スタンフォード2世"
10038-100380240 = "うなぎ丼"
10038-100380250 = "それはウサギに付けるには派手すぎだと思いますが……"
10038-100380260 = "……それをウサギに付けるのはどうかと思います"
10038-100380270 = "じゃあ「ぴょんこ」はどう？"
10038-100380280 = "ぴょんこ、ぴょんこ……"
10038-100380290 = "はい、素敵な名前だと思います"
10038-100380300 = "それではこれからこのウサギはぴょんこと呼びます"
10038-100380310 = "こちらRABBIT1。離陸の許可を要請します……"
10038-100380320 = "ミヤコ、ストップ！ストップ！"
10038-100380330 = "……あれ？先生？"
10038-100380340 = "あ。また宛先を間違えていました、すみません"
10038-100380350 = "今日も降下作戦があるの？"
10038-100380360 = "はい。本日2200に、ヘリを使った降下作戦が予定されています"
10038-100380370 = "キヴォトスへ不法に動物たちを輸入している、密輸業者たちを襲撃する任務です"
10038-100380380 = "今回の降下作戦には私も付いて行くよ"
10038-100380390 = "はい？先生も一緒にヘリに乗られるのですか？"
10038-100380400 = "危ないと思いますが……大丈夫ですか？"
10038-100380410 = "先生、ちょっとよろしいでしょうか……？"
10038-100380420 = "いいえ、特別なご用事があって連絡したわけではないのですが……"
10038-100380430 = "やっぱりまた後で、ご連絡します"
10038-100380440 = "ごめん、ミヤコ。会議中だったから確認が遅くなっちゃった"
10038-100380450 = "ミヤコ……？"
10038-100380460 = "SRT特殊学園で生活していた時は知りませんでしたが"
10038-100380470 = "長期間キャンプをする場合、冬より夏の方が大変なのですね"
10038-100380480 = "何かあったの？"
10038-100380490 = "ええ。最近、梅雨に入ったので"
10038-100380500 = "装備が錆びたり、食べ物の日持ちも悪くなってしまって"
10038-100380510 = "色々と困っているのです"
10038-100380520 = "何より、雨のせいで洗濯物がなかなか乾かず……"
10038-100380530 = "どうすればいいかみんなで悩んでいたところでした"
10038-100380540 = "なら、シャーレで洗濯する？"
10038-100380550 = "シャーレで、ですか？"
10038-100380560 = "シャーレの休憩室には乾燥機もあるから"
10038-100380570 = "半日もあれば乾くと思うよ"
10038-100380580 = "いえ、いくら先生が仰ってくれたからといって"
10038-100380590 = "それに甘えるわけには"
10038-100380600 = "今回だけ……"
10038-100380610 = "お願いします……"
