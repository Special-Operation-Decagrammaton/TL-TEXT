[translation]
10087-100870010 = "先生"
10087-100870020 = "これは戦争です！"
10087-100870030 = "また物騒な……"
10087-100870040 = "ここまで堂々と喧嘩を仕掛けてくるなら……"
10087-100870050 = "受けて立ちます、風紀委員会の行政官として！"
10087-100870060 = "むしろ好都合ですね。この際、徹底的に叩き潰してやれば……"
10087-100870070 = "……何があったの？"
10087-100870080 = "地べたに這いつくばらせて、身の程を知ってもらいましょう"
10087-100870090 = "……"
10087-100870100 = "ああもう！"
10087-100870110 = "いつもいつも！"
10087-100870120 = "一体どうしたの……？"
10087-100870130 = "では先生、また後ほど！"
10087-100870140 = "遅れないでください、これは戦争ですから！"
10087-100870150 = "……ええっと、アコ？"
10087-100870160 = "先生、そろそろシャーレに戻った頃でしょうか？"
10087-100870170 = "今日はお付き合いいただき、ありがとうございました"
10087-100870180 = "落ち着いた？"
10087-100870190 = "はい？"
10087-100870200 = "何ですか、それは"
10087-100870210 = "私が平常心を失っていたとでも？"
10087-100870220 = "いつも通りでしたが"
10087-100870230 = "それはそうと、ドレスを決めました"
10087-100870240 = "どれにしたの？"
10087-100870250 = "先生に選んでいただいたものにしました。このドレスを扱っている店舗に連絡を入れてみたところ"
10087-100870260 = "えっと、それって……"
10087-100870270 = "幸い、取り置きが可能のようでした"
10087-100870280 = "気に入った物が見つかって、本当に良かったです"
10087-100870290 = "明日はドレスを受け取りに行くので、遅れないようにお願いしますね"
10087-100870300 = "えっ……？"
10087-100870310 = "約束、忘れてませんよね？"
10087-100870320 = "ドレスを受け取りに行きましょう"
10087-100870330 = "そんな約束したっけ……"
10087-100870340 = "まったく……"
10087-100870350 = "つべこべ言わずに来てください、大人でしょう？"
10087-100870360 = "えぇ……"
10087-100870370 = "はい？"
10087-100870380 = "い、急いで向かいます……"
10087-100870390 = "お待ちしています"
10087-100870400 = "先生……ドレス、届けてくださったんですね"
10087-100870410 = "自分で受け取るべきところを、お手数おかけしました"
10087-100870420 = "ありがとうございます"
10087-100870430 = "今度きちんとお礼をさせてください"
10087-100870440 = "……あの"
10087-100870450 = "何ですか、これは"
10087-100870460 = "紐、みたいな物が入っているのですが……"
10087-100870470 = "あ、アコ、それには理由があって"
10087-100870480 = "下着……？いえ、どう見ても紐ですね"
10087-100870490 = "先生が買ったんですか？"
10087-100870500 = "た、たしかに買ったのは私だけど……"
10087-100870510 = "こんな恥ずかしい物を着ろと？"
10087-100870520 = "私が生意気な態度を取ったからって"
10087-100870530 = "生徒にこんな格好をさせるんですか？"
10087-100870540 = "そんなつもりじゃないからね！？"
10087-100870550 = "それで私が、はい分かりましたなんて言うとでも！？"
10087-100870560 = "あり得ません！！"
10087-100870570 = "これは返品しますから！返品です！返品！！"
10087-100870580 = "は、はい……"
10087-100870590 = "あと数日でパーティー当日を迎えます"
10087-100870600 = "ふふ、準備は整いました"
10087-100870610 = "この戦争、私の勝利は決まったも同然です"
10087-100870620 = "最近、特に忙しそうだったね"
10087-100870630 = "ええ"
10087-100870640 = "ですが、まだ気を抜くのは早いです"
10087-100870650 = "僅かな隙もあってはなりませんから"
10087-100870660 = "ですので、予行演習を行います"
10087-100870670 = "予行演習って？"
10087-100870680 = "先生、急いでパーティー会場に来てください"
10087-100870690 = "特訓です！"
10087-100870700 = "どういうこと……？"
10087-100870710 = "先生……"
10087-100870720 = "今日はお疲れ様でした"
10087-100870730 = "アコもお疲れ様"
10087-100870740 = "あの、先生……"
10087-100870750 = "……大切にしますね"
10087-100870760 = "うん？"
10087-100870770 = "それだけは伝えておきます"
