[translation]
10087-100870010 = "Sensei"
10087-100870020 = "Isto é uma guerra!"
10087-100870030 = "Que papo perigoso de novo..."
10087-100870040 = "Se vão me desafiar para uma briga tão abertamente..."
10087-100870050 = "Eu aceito o desafio, como Oficial Administrativa do Comitê de Disciplina!"
10087-100870060 = "Na verdade, é até conveniente. Se eu esmagá-los completamente nesta oportunidade..."
10087-100870070 = "...O que aconteceu?"
10087-100870080 = "Vou fazê-los rastejar no chão para que aprendam o seu lugar."
10087-100870090 = "..."
10087-100870100 = "Ah, céus!"
10087-100870110 = "Sempre, sempre a mesma coisa!"
10087-100870120 = "O que diabos aconteceu...?"
10087-100870130 = "Então, Sensei, até mais tarde!"
10087-100870140 = "Não se atrase, pois isto é uma guerra!"
10087-100870150 = "...Uhm, Ako?"
10087-100870160 = "Sensei, você já deve ter voltado para a Schale, certo?"
10087-100870170 = "Obrigada por me acompanhar hoje."
10087-100870180 = "Se acalmou?"
10087-100870190 = "Hã?"
10087-100870200 = "O que quer dizer com isso?"
10087-100870210 = "Está insinuando que eu perdi a compostura?"
10087-100870220 = "Eu estava agindo como sempre."
10087-100870230 = "Mudando de assunto, eu decidi o vestido."
10087-100870240 = "Qual você escolheu?"
10087-100870250 = "Escolhi aquele que você me ajudou a escolher. Entrei em contato com a loja que vende este vestido e..."
10087-100870260 = "Uhm, esse é..."
10087-100870270 = "Felizmente, parece que eles podem reservá-lo para mim."
10087-100870280 = "Fico muito feliz que tenha encontrado algo que gostou."
10087-100870290 = "Amanhã vou buscar o vestido, então, por favor, não se atrase."
10087-100870300 = "Eh...?"
10087-100870310 = "Você não se esqueceu da nossa promessa, não é?"
10087-100870320 = "Vamos buscar o vestido."
10087-100870330 = "Nós fizemos essa promessa...?"
10087-100870340 = "Francamente..."
10087-100870350 = "Venha sem reclamar, você é um adulto, não é?"
10087-100870360 = "Eeh..."
10087-100870370 = "Sim?"
10087-100870380 = "E-Estou indo o mais rápido que posso..."
10087-100870390 = "Estou esperando."
10087-100870400 = "Sensei... você entregou o vestido, não é?"
10087-100870410 = "Eu deveria ter pego eu mesma, desculpe pelo incômodo."
10087-100870420 = "Muito obrigada."
10087-100870430 = "Por favor, me deixe agradecê-lo(a) apropriadamente da próxima vez."
10087-100870440 = "...Uhm."
10087-100870450 = "O que é isto?"
10087-100870460 = "Tem uma coisa que parece um... fio aqui dentro..."
10087-100870470 = "Ah, Ako, tem um motivo para isso."
10087-100870480 = "Roupa íntima...? Não, não importa como eu olhe, é só um fio."
10087-100870490 = "Foi você que comprou, Sensei?"
10087-100870500 = "B-Bem, é verdade que fui eu que comprei, mas..."
10087-100870510 = "Você quer que eu vista algo tão vergonhoso?"
10087-100870520 = "Só porque eu tive uma atitude insolente..."
10087-100870530 = "Você vai fazer uma aluna se vestir assim?"
10087-100870540 = "Não era essa a minha intenção, tá?!"
10087-100870550 = "E você acha que eu vou simplesmente dizer 'sim, entendi'?!?"
10087-100870560 = "Impossível!!"
10087-100870570 = "Vou devolver isso! Devolver! DEVOLVER!!"
10087-100870580 = "S-Sim..."
10087-100870590 = "Faltam poucos dias para a festa."
10087-100870600 = "Fufu, os preparativos estão concluídos."
10087-100870610 = "Nesta guerra, minha vitória já está praticamente decidida."
10087-100870620 = "Você pareceu especialmente ocupada ultimamente."
10087-100870630 = "Sim."
10087-100870640 = "Mas ainda é cedo para baixar a guarda."
10087-100870650 = "Não pode haver a menor brecha."
10087-100870660 = "Portanto, faremos um ensaio."
10087-100870670 = "Um ensaio?"
10087-100870680 = "Sensei, venha rápido para o local da festa."
10087-100870690 = "É um treinamento especial!"
10087-100870700 = "Como assim...?"
10087-100870710 = "Sensei..."
10087-100870720 = "Bom trabalho hoje."
10087-100870730 = "Bom trabalho também, Ako."
10087-100870740 = "Hum, Sensei..."
10087-100870750 = "...Vou guardar com carinho."
10087-100870760 = "Hm?"
10087-100870770 = "Só queria que soubesse disso."
