[translation]
10045-100450010 = "先生、ちょっとお願いがあるんだけど"
10045-100450020 = "もしみんなが私を探してても「知らない」って答えてもらえるかな？"
10045-100450030 = "いま大事なことをしてて"
10045-100450040 = "先生も何も聞かなかったフリしてね。頼んだよ"
10045-100450050 = "いいけど……客室にいるの？"
10045-100450060 = "客室で寝る、とか？"
10045-100450070 = "うへ～まぁ、そんな感じ"
10045-100450080 = "寝てるわけじゃないけど……客室にはいるよ～"
10045-100450090 = "とりあえず……聞かれたらそう答えておいてね、先生"
10045-100450100 = "先生、今日はありがとね"
10045-100450110 = "一緒にお昼寝するの楽しかったよ"
10045-100450120 = "これでもう私たちは共犯者だね"
10045-100450130 = "サボりの共犯……ってことで"
10045-100450140 = "……！？"
10045-100450150 = "やられた……最初からその目的で！？"
10045-100450160 = "えへへ"
10045-100450170 = "うう……"
10045-100450180 = "助けて、先生……"
10045-100450190 = "大変なことが……"
10045-100450200 = "ホシノ？"
10045-100450210 = "どうしたの？"
10045-100450220 = "今、海水浴場の方にいるんだけど"
10045-100450230 = "ちょっと助けてほしくて……"
10045-100450240 = "先生じゃないとできないことだから"
10045-100450250 = "みんなを呼ばないで、必ず一人で来てね……"
10045-100450260 = "お願い、頼んだよ～"
10045-100450270 = "先生へ"
10045-100450280 = "残念なお知らせ"
10045-100450290 = "結局バレちゃった？"
10045-100450300 = "私も呼び出される……？"
10045-100450310 = "あ、そういうんじゃなくて"
10045-100450320 = "海の幸が思ったよりたくさん採れちゃったじゃん"
10045-100450330 = "だから、これからも毎日採ってきてってさ～"
10045-100450340 = "というわけで"
10045-100450350 = "これからもよろしくね、先生"
10045-100450360 = "海はいいよね"
10045-100450370 = "白い砂浜、どこまでも続く水平線……"
10045-100450380 = "詩的だね"
10045-100450390 = "確かに良いよね"
10045-100450400 = "うへ……"
10045-100450410 = "えっと"
10045-100450420 = "ちょっと言ってみたかっただけ"
10045-100450430 = "特に深い意味はないよ"
10045-100450440 = "そういえば先生"
10045-100450450 = "どこかで聞いたことがあるんだけど"
10045-100450460 = "さっきのボラみたいに"
10045-100450470 = "鯨もジャンプするって聞いたんだけど"
10045-100450480 = "それって"
10045-100450490 = "どれくらい待てば見れるんだろう？"
10045-100450500 = "砂浜からは見れないかも"
10045-100450510 = "遠い海の方に出たら見れるかな"
10045-100450520 = "……"
10045-100450530 = "うへ……ちょっと難しいなそれは"
10045-100450540 = "残念……"
10045-100450550 = "まあ、でも"
10045-100450560 = "機会があったら一緒に見に行こうよ"
10045-100450570 = "一緒に、ね"
