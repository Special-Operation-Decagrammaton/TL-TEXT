[translation]
10045-100450010 = "Sensei, tenho um favorzinho pra pedir."
10045-100450020 = "Se todo mundo estiver me procurando, você pode dizer que não sabe de nada?"
10045-100450030 = "Estou fazendo uma coisa importante agora."
10045-100450040 = "Finja que não ouviu nada também, Sensei. Conto com você."
10045-100450050 = "Tudo bem, mas... você está no quarto de hóspedes?"
10045-100450060 = "Tipo, dormindo no quarto de hóspedes?"
10045-100450070 = "Uhe~ Bem, é por aí."
10045-100450080 = "Não que eu esteja dormindo, mas... estou no quarto de hóspedes~"
10045-100450090 = "Por enquanto... se te perguntarem, responda isso, Sensei."
10045-100450100 = "Sensei, obrigada por hoje."
10045-100450110 = "Foi divertido tirar uma soneca com você."
10045-100450120 = "Com isso, agora somos cúmplices, né?"
10045-100450130 = "Cúmplices de vadiagem... é isso."
10045-100450140 = "…!?"
10045-100450150 = "Fui enganado... Era esse o seu objetivo desde o começo!?"
10045-100450160 = "Ehehe."
10045-100450170 = "Ugh..."
10045-100450180 = "Me ajude, Sensei..."
10045-100450190 = "Uma coisa terrível aconteceu..."
10045-100450200 = "Hoshino?"
10045-100450210 = "O que aconteceu?"
10045-100450220 = "Estou na praia agora, e..."
10045-100450230 = "...queria que você me ajudasse com uma coisinha..."
10045-100450240 = "É algo que só você pode fazer, Sensei."
10045-100450250 = "Não chame ninguém, venha sozinho, por favor..."
10045-100450260 = "Por favor, conto com você~"
10045-100450270 = "Para o Sensei."
10045-100450280 = "Más notícias."
10045-100450290 = "No fim, fui descoberta?"
10045-100450300 = "Vão me chamar também...?"
10045-100450310 = "Ah, não é isso."
10045-100450320 = "É que pegamos muito mais frutos do mar do que esperávamos."
10045-100450330 = "Então, disseram pra gente ir pegar mais todos os dias de agora em diante~"
10045-100450340 = "Sendo assim,"
10045-100450350 = "Conto com você de agora em diante também, Sensei."
10045-100450360 = "O mar é tão bom, né?"
10045-100450370 = "A areia branca, o horizonte que se estende infinitamente..."
10045-100450380 = "Que poético."
10045-100450390 = "É bom mesmo."
10045-100450400 = "Uhe..."
10045-100450410 = "Uhm..."
10045-100450420 = "Só queria tentar dizer isso."
10045-100450430 = "Não tem nenhum significado profundo."
10045-100450440 = "Falando nisso, Sensei."
10045-100450450 = "Eu ouvi em algum lugar que..."
10045-100450460 = "...assim como aquela tainha de antes,"
10045-100450470 = "...as baleias também saltam."
10045-100450480 = "Isso..."
10045-100450490 = "Quanto tempo será que preciso esperar pra ver uma?"
10045-100450500 = "Talvez não dê pra ver da praia."
10045-100450510 = "Será que a gente consegue ver se formos para o mar distante?"
10045-100450520 = "……"
10045-100450530 = "Eheh... Isso é um pouco difícil."
10045-100450540 = "Que pena..."
10045-100450550 = "Bem, mas..."
10045-100450560 = "Se tivermos uma oportunidade, vamos ver juntos."
10045-100450570 = "Juntos, né?"
