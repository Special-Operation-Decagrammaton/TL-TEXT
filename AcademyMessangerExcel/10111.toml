[translation]
10111-101110010 = "Ah~"
10111-101110020 = "Putz."
10111-101110030 = "Não me acostumo."
10111-101110040 = "Aconteceu algum problema?"
10111-101110050 = "Não é algo para consultar o Sensei, mas..."
10111-101110060 = "...É verdade."
10111-101110070 = "Se tiver tempo, podemos nos encontrar?"
10111-101110080 = "Tenho uma coisinha que queria perguntar."
10111-101110090 = "Foi divertido hoje, Sensei!"
10111-101110100 = "Não acredito que você não me notou até eu falar com você."
10111-101110110 = "É a primeira vez que isso acontece."
10111-101110120 = "Fico feliz que tenha se divertido."
10111-101110130 = "Quer tentar de novo no próximo dia de folga?"
10111-101110140 = "Está ficando divertido!"
10111-101110150 = "E aí, Sensei."
10111-101110160 = "Está ocupado?"
10111-101110170 = "Hoje estou livre."
10111-101110180 = "Perfeito."
10111-101110190 = "Já que é um dia de folga..."
10111-101110200 = "Pensei em fazer um dia diferente do habitual."
10111-101110210 = "Por acaso, hoje também é uniforme?"
10111-101110220 = "Opa!"
10111-101110230 = "Você entende rápido."
10111-101110240 = "Vamos sair agora."
10111-101110250 = "Passar o tempo de uniforme..."
10111-101110260 = "É a última vez hoje."
10111-101110270 = "Você vai voltar para o seu sukajan amanhã, certo?"
10111-101110280 = "Sim."
10111-101110290 = "..."
10111-101110300 = "Vou sentir falta."
10111-101110310 = "Sinto vontade de fazer algo memorável pela última vez."
10111-101110320 = "Por exemplo...?"
10111-101110330 = "Aquilo, aquilo."
10111-101110340 = "Tipo 'BA-KABOOM!' ou 'DO-GON!'."
10111-101110350 = "Sensei, você não tem nenhuma ideia?"
10111-101110360 = "Um final explosivo, talvez...?"
10111-101110370 = "Ei."
10111-101110380 = "Sensei."
10111-101110390 = "Sobre o que eu disse agora há pouco..."
10111-101110400 = "Sinto que fui um pouco insistente."
10111-101110410 = "Bem..."
10111-101110420 = "Se não quiser, pode recusar, tá?"
10111-101110430 = "Pelo contrário, você só me convida quando estou de uniforme?"
10111-101110440 = "Droga."
10111-101110450 = "Sensei, você é sempre assim."
10111-101110460 = "Então..."
10111-101110470 = "Conto com você para o próximo dia de folga também."
