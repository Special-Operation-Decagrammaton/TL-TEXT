[translation]
26014-260140010 = "Professor, bom trabalho."
26014-260140020 = "Como a missão terminou,"
26014-260140030 = "ganhei alguns dias de folga a partir de hoje."
26014-260140040 = "Folga, que bom..."
26014-260140050 = "O que você costuma fazer nos seus dias de folga?"
26014-260140060 = "Hmm."
26014-260140070 = "Geralmente... não é muito diferente de quando estou em missão."
26014-260140080 = "...Posso ir aí te ver?"
26014-260140090 = "Professor, está acordado?"
26014-260140100 = "O que houve a essa hora?"
26014-260140110 = "Bem..."
26014-260140120 = "Desculpe."
26014-260140130 = "Na verdade... esqueci que era feriado"
26014-260140140 = "e acabei acordando no horário de sempre."
26014-260140150 = "Quando se tem uma rotina regrada, isso acontece, né..."
26014-260140160 = "Para ser sincera, estou sem saber o que fazer com o meu tempo..."
26014-260140170 = "Se não se importar, posso ir ao Schale?"
26014-260140180 = "Claro. Estarei te esperando."
26014-260140190 = "Hoje foi divertido."
26014-260140200 = "Além disso,"
26014-260140210 = "eu já sabia, mas o professor está sempre ocupado, não é?"
26014-260140220 = "Mesmo me dizendo para 'descansar'..."
26014-260140230 = "Será que o professor está descansando direito?"
26014-260140240 = "Graças à Karin, hoje consegui relaxar um pouco depois de muito tempo."
26014-260140250 = "Quando precisar de mim, não hesite em pedir."
26014-260140260 = "Se for para ajudar o professor, serei sempre bem-vinda."
26014-260140270 = "Professor."
26014-260140280 = "Pensei em uma forma de passar o meu dia de folga."
26014-260140290 = "Que legal!"
26014-260140300 = "Então... se não se importar..."
26014-260140310 = "Eu gostaria que o professor viesse comigo..."
26014-260140320 = "Ficarei feliz em ir."
26014-260140330 = "Obrigada."
26014-260140340 = "Se o professor estiver comigo, com certeza será divertido."
26014-260140350 = "Então, estou indo para a escola agora."
26014-260140360 = "Pode vir me buscar?"
26014-260140370 = "...Hã?"
