[translation]
26014-260140010 = "先生、お疲れ様"
26014-260140020 = "任務が一段落したから"
26014-260140030 = "今日から数日、お休みになったんだ"
26014-260140040 = "お休み、いいなぁ……"
26014-260140050 = "普段、休日は何をするの？"
26014-260140060 = "うーん"
26014-260140070 = "いつもは……任務の時と変わらないな"
26014-260140080 = "……ちょっとそっちに行ってもいい？"
26014-260140090 = "先生、起きてるか？"
26014-260140100 = "こんな時間にどうしたの？"
26014-260140110 = "えっと"
26014-260140120 = "すまない"
26014-260140130 = "実は……休日であることを忘れて"
26014-260140140 = "いつもの時間に起きてしまったんだ"
26014-260140150 = "規則的な生活をしてると、そうなるよね……"
26014-260140160 = "正直、時間を持て余してしまってて……"
26014-260140170 = "先生さえよければ、シャーレに行ってもいいか？"
26014-260140180 = "いいよ。待ってるね"
26014-260140190 = "今日は楽しかった"
26014-260140200 = "それから"
26014-260140210 = "分かってはいたが先生はいつも忙しいのだな"
26014-260140220 = "私には「休め」と言うのに……"
26014-260140230 = "先生こそちゃんと休めているのか？"
26014-260140240 = "カリンのおかげで今日は久々にゆっくりできたよ"
26014-260140250 = "私が必要な時は、遠慮なく頼って欲しい"
26014-260140260 = "先生の手伝いなら、いつでも歓迎だ"
26014-260140270 = "先生"
26014-260140280 = "私なりの休日の過ごし方を思いついたんだ"
26014-260140290 = "やったね！"
26014-260140300 = "それで…もしよかったら……"
26014-260140310 = "先生にも一緒に来てもらいたいんだけど……"
26014-260140320 = "喜んで行かせてもらうよ"
26014-260140330 = "ありがとう"
26014-260140340 = "先生が一緒なら、きっと楽しい"
26014-260140350 = "じゃあ、これから登校するから"
26014-260140360 = "迎えに来てもらえるか？"
26014-260140370 = "……え？"
