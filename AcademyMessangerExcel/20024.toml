[translation]
20024-200240010 = "ご無沙汰しております"
20024-200240020 = "ご機嫌いかがですか、先生？"
20024-200240030 = "ナギサ、久しぶり"
20024-200240040 = "はい、確かにお久しぶりですね"
20024-200240050 = "実は、トリニティの生徒たちのことでご相談したいことがありまして"
20024-200240060 = "それほど重たい内容でもありませんので、アフタヌーン・ティーでもご一緒しながらお話できればと思うのですが、いかがでしょうか？"
20024-200240070 = "あ、良いね。ぜひ"
20024-200240080 = "ふふっ"
20024-200240090 = "それでは、良い茶葉をご用意してお待ちしておりますね"
20024-200240100 = "先に席を外してしまい、申し訳ございません。先生"
20024-200240110 = "急に体調が悪くなってしまい……健康管理ができておらず申し訳ありません"
20024-200240120 = "大丈夫だよ、気にしないで"
20024-200240130 = "ペットボトルの紅茶、もしかして口に合わなかった？"
20024-200240140 = "無理に勧めちゃってごめんね……"
20024-200240150 = "いいえ、大変興味深い経験でした。ありがとうございます……"
20024-200240160 = "ですが、今度からはいただく量を調節した方が良いかもしれませんね……"
20024-200240170 = "……先日は失礼いたしました"
20024-200240180 = "最近はいかがお過ごしでしょうか？"
20024-200240190 = "あれから体調は大丈夫？"
20024-200240200 = "あ、先日の事でしたら……"
20024-200240210 = "大丈夫です。大きく体調を崩したわけではありませんので"
20024-200240220 = "ところで、先日お話しそびれたことがありまして。よろしければ、お時間を頂けないでしょうか？"
20024-200240230 = "お手すきの際で構いませんので、テラスにお越しいただければと思います"
20024-200240240 = "また、紅茶をご用意しておきますので"
20024-200240250 = "うん、了解。私の方も前の紅茶、持っていこうか？"
20024-200240260 = "えっと、それは結構です。先日十分味わいましたので……"
20024-200240270 = "……いかがお過ごしでしょうか"
20024-200240280 = "先日は、みっともない姿をお見せしてしまいましたが……"
20024-200240290 = "あらためましてその、決して普段からあのような言動をしているわけではなく……"
20024-200240300 = "気にしないで"
20024-200240310 = "そう言われましても……ティーパーティーとして、やはり失態を放っておくことはできません。"
20024-200240320 = "……よろしければお詫びを兼ねて、もう一度お時間を頂けませんか？"
20024-200240330 = "ちょうど新しく頼んだ茶葉がもうすぐ到着しますので"
20024-200240340 = "ご馳走させてください。先生のご都合がよろしければ、ですが"
20024-200240350 = "それじゃあ、ご相伴にあずかろうかな"
20024-200240360 = "ありがとうございます。それでは、テラスでお待ちしておりますね。"
20024-200240370 = "おはようございます、先生"
20024-200240380 = "一日の始まりは朝食からと言いますが……先生はもうすでに食べられましたか？"
20024-200240390 = "うん、ちょうどさっき。ナギサの方は？"
20024-200240400 = "私は先ほど、お味噌汁をいただきました"
20024-200240410 = "……ちょっと意外かも"
20024-200240420 = "ティーパーティーって何か、スイーツしか食べないみたいなイメージが……"
20024-200240430 = "何を仰るのですか……"
20024-200240440 = "いくら何でも、甘いものばかり食べていては栄養バランスが良くありません"
20024-200240450 = "私たちだって、いつもケーキやお菓子ばかり食べているわけではないんです"
