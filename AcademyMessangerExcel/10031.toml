[translation]
10031-100310010 = "Muito obrigada pelo seu caloroso apoio e patrocínio à Faz-Tudo 68 durante todo este ano."
10031-100310020 = "……?"
10031-100310030 = "O-o que foi?! Que reação é essa?!"
10031-100310040 = "Desculpe, só fiquei um pouco surpreso."
10031-100310050 = "Deixa eu só confirmar o remetente..."
10031-100310060 = "B-bem, tanto faz! Eu sou generosa!"
10031-100310070 = "Enfim, chega de saudações formais!"
10031-100310080 = "Vamos, Sensei, o ano já está quase no fim."
10031-100310090 = "Tenho coisas para fazer para o Ano Novo, então você vai me acompanhar hoje, certo?"
10031-100310100 = "A propósito, como colega de profissão, você não tem o direito de recusar!"
10031-100310110 = "……"
10031-100310120 = "Uhm, Sensei, você está livre, não é...? Né...?"
10031-100310130 = "Deixe-me dizer novamente, feliz ano novo."
10031-100310140 = "Feliz ano novo."
10031-100310150 = "O motivo de eu ter entrado em contato hoje é..."
10031-100310160 = "Eu aluguei um quimono outro dia, lembra?"
10031-100310170 = "Ah, naquela vez que a Aru foi totalmente passada para trás."
10031-100310180 = "Se quiser, podemos ir à loja juntos e perguntar se dá para devolver?"
10031-100310190 = "Não é isso! E aliás, aquilo foi puramente um investimento estratégico!"
10031-100310200 = "É que hoje, eu queria te contar que encontrei um uso para aquele quimono...!"
10031-100310210 = "Um uso... tipo, decorar o escritório?"
10031-100310220 = "Eu não te chamaria aqui só por isso, né?! E aliás, você está dizendo isso de propósito, não está?!"
10031-100310230 = "Seria muito triste só decorar com ele sem nunca usar!"
10031-100310240 = "... E-enfim! Eu encontrei um lugar para ir usando este quimono!"
10031-100310250 = "E é um lugar bem elegante, onde um quimono seria apropriado..."
10031-100310260 = "Então, eu estava pensando em pedir para você me acompanhar... o que acha?"
10031-100310270 = "C-claro que eu não tenho problema nenhum em ir sozinha!?"
10031-100310280 = "...Você está ocupado?"
10031-100310290 = "Claro que eu vou."
10031-100310300 = "É-é claro, né?! Eu sabia que você viria!"
10031-100310310 = "Fufu, então estarei esperando por você♪"
10031-100310320 = "Sensei, você se lembra do que conversamos outro dia, não é?"
10031-100310330 = "Sei que demorou um pouco, mas..."
10031-100310340 = "É Ano Novo, mas nós ainda não fomos a nenhum evento típico de Ano Novo, não é?"
10031-100310350 = "Nós dois estivemos ocupados, né?"
10031-100310360 = "Evento, farmar, itens..."
10031-100310370 = "Não é?"
10031-100310380 = "...Sensei, você está bem? Do que está falando?"
10031-100310390 = "Bem, de qualquer forma, uhm..."
10031-100310400 = "Você poderia me dar um pouco do seu tempo hoje?"
10031-100310410 = "Sensei, o ano novo começou."
10031-100310420 = "Sendo assim, não acha que participar de um evento que só acontece nesta época do ano é uma das coisas que uma empreendedora deve fazer?"
10031-100310430 = "Isso, não que eu acredite nessas coisas."
10031-100310440 = "Sim, definitivamente, com certeza não é por isso, mas..."
10031-100310450 = "Vamos tirar a sorte no omikuji comigo?"
10031-100310460 = "...Aru, você acredita bastante em omikuji?"
10031-100310470 = "Chega desse assunto! Venha logo!"
