[translation]
10031-100310010 = "今年一年、私たち便利屋68への温かいご支援とご愛顧を賜り、誠にありがとうございました"
10031-100310020 = "……？"
10031-100310030 = "な、なによ！その反応！？"
10031-100310040 = "ごめん、ちょっとビックリしてた"
10031-100310050 = "一応送り主の確認を…"
10031-100310060 = "まっ、まあ良いわ！私は寛大だもの！"
10031-100310070 = "とにかく堅苦しい挨拶はこれで終わり！"
10031-100310080 = "さあ先生、今年も残りわずかね"
10031-100310090 = "年末年始に向けてやることがあるの、だから今日は私に付き合いなさい？"
10031-100310100 = "ちなみに同業者である先生に、拒否する権利はないわ！"
10031-100310110 = "……"
10031-100310120 = "えっと、先生、予定空いてるわよね……？ね……？"
10031-100310130 = "あらためて言っておこうかしら、あけましておめでとうございます"
10031-100310140 = "あけましておめでとう"
10031-100310150 = "今日連絡をしたのは他でもないわ……"
10031-100310160 = "この間、着物をレンタルしたでしょう？"
10031-100310170 = "ああ、アルが押されっぱなしだった時の"
10031-100310180 = "もしあれだったら、一緒にお店に行って返品できないか聞いてみる？"
10031-100310190 = "違うわよ、そうじゃなくて！というかあの時のあれは、あくまで戦略的な投資よ！"
10031-100310200 = "ただ今日は、その着物の使い道ができたってことを教えようと思って……！"
10031-100310210 = "使い道……事務所に飾る、とか？"
10031-100310220 = "そのためだけに先生を呼ぶわけがないでしょう！？っていうか普通に、分かってて言ってるわよね！？"
10031-100310230 = "着もしないで飾るなんて悲しすぎるでしょう！"
10031-100310240 = "……と、とにかく！この着物を着ていく場所ができたのよ！"
10031-100310250 = "それも着物が相応しい、かなり上品な席……"
10031-100310260 = "だからその、先生にエスコートをお願いしようと思ったのだけど……どうかしら？"
10031-100310270 = "も、もちろん私ひとりでも問題無いのだけれど！？"
10031-100310280 = "……忙しい、かしら？"
10031-100310290 = "もちろん行くよ"
10031-100310300 = "そ、そうよね！？やっぱり来てくれるわよね！"
10031-100310310 = "ふふっ、じゃあ待ってるわよ♪"
10031-100310320 = "先生、この間話したこと覚えてるわよね？"
10031-100310330 = "ちょっと遅くなってしまったけれど……"
10031-100310340 = "せっかくのお正月なのに、先生とお正月らしいイベントにも行けてないでしょう？"
10031-100310350 = "お互いに忙しかったもんね"
10031-100310360 = "イベント、周回、アイテム……"
10031-100310370 = "そうよね？"
10031-100310380 = "……先生、大丈夫？何の話？"
10031-100310390 = "まあだからとにかく、その……"
10031-100310400 = "今日、ちょっと時間をくれないかしら？"
10031-100310410 = "先生、新年が始まったわね"
10031-100310420 = "となると、この時期にしか無いイベントをやっておくのも、事業家として為すべきことの一つだと思わない？"
10031-100310430 = "そう、別に信じているわけではないのだけど"
10031-100310440 = "ええ決して、断じてそういうわけではないけど"
10031-100310450 = "私と一緒に、おみくじを引きに行きましょう？"
10031-100310460 = "……アル、すごくおみくじ信じてる方？"
10031-100310470 = "その話は良いから！早く来なさい！"
