[translation]
16010-160100010 = "O que você costuma fazer nos seus dias de folga, Sensei?"
16010-160100020 = "Acho que não faço nada..."
16010-160100030 = "Estou lutando contra a papelada acumulada."
16010-160100040 = "É verdade, descansar o corpo também é importante."
16010-160100050 = "Fico feliz que você pareça estar aproveitando sua folga, Sensei."
16010-160100060 = "...Você não está se esforçando demais?"
16010-160100070 = "Continuar trabalhando sem descanso é, na verdade, ineficiente."
16010-160100080 = "E quanto a você, Hibiki?"
16010-160100090 = "...Eu?"
16010-160100100 = "Hmm, eu não sei bem..."
16010-160100110 = "Geralmente estou construindo alguma coisa."
16010-160100120 = "...Sensei, você está bem? Ouvi sobre aquele incidente."
16010-160100130 = "Que por causa de uma queda de energia repentina no Schale,"
16010-160100140 = "os dados de um dia inteiro de trabalho foram perdidos..."
16010-160100150 = "Não tem algum jeito de recuperar...?"
16010-160100160 = "Pedi ajuda à Veritas, mas disseram que a recuperação seria difícil..."
16010-160100170 = "Então, não há nada que eu possa fazer...?"
16010-160100180 = "...Mas, será que não posso ajudar em algo?"
16010-160100190 = "Eu ficaria feliz se você me apoiasse."
16010-160100200 = "Apoio..."
16010-160100210 = "Sim, entendi."
16010-160100220 = "Boa sorte, Sensei."
16010-160100230 = "...Depois do que aconteceu da última vez, pensei muito sobre isso."
16010-160100240 = "Sobre qual seria a ferramenta de apoio ideal para aumentar a motivação no trabalho de escritório."
16010-160100250 = "...Após muitas tentativas e erros, finalmente criei um protótipo."
16010-160100260 = "Esta é a ferramenta de apoio definitiva para quem trabalha em escritório."
16010-160100270 = "...No meu próximo dia de turno, vou levar para você testar."
16010-160100280 = "...O que exatamente você construiu?"
16010-160100290 = "Acho que a ferramenta de apoio da última vez foi muito boa, mas..."
16010-160100300 = "Mas parece que o Sensei não gostou, então não tem jeito."
16010-160100310 = "Uma excelente meister deve sempre ouvir a opinião do cliente, não é?"
16010-160100320 = "Desta vez, preparei uma ferramenta de apoio diferente."
16010-160100330 = "Se eu for ao Schale novamente, vou levar comigo."
16010-160100340 = "Desta vez não vai explodir, né?"
16010-160100350 = "..."
16010-160100360 = "...Na verdade, acho que vou para aí agora mesmo."
16010-160100370 = "Você realmente não vai explodir, né!?"
