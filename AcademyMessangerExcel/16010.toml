[translation]
16010-160100010 = "先生は休日に何をして過ごすことが多いの？"
16010-160100020 = "何もしてないかな……"
16010-160100030 = "溜まった書類仕事と戦ってるよ"
16010-160100040 = "たしかに身体を休めるのも大切だよね"
16010-160100050 = "先生が休日を楽しんでるみたいで良かった"
16010-160100060 = "……無理しすぎじゃない？"
16010-160100070 = "休みなしに働き続けるのは、却って非効率的だよ"
16010-160100080 = "そういうヒビキは？"
16010-160100090 = "……私？"
16010-160100100 = "うーん、私はどうだろ……"
16010-160100110 = "だいたい何かを作ってるよ"
16010-160100120 = "……先生、大丈夫？例の話を聞いたんだけど"
16010-160100130 = "シャーレで突然停電が起こったせいで"
16010-160100140 = "一日かけた作業データが吹っ飛んだって……"
16010-160100150 = "どうにか復旧する方法はないの……？"
16010-160100160 = "ヴェリタスに頼ったけど、復旧は難しいだろうって……"
16010-160100170 = "なら私にできることはないか……"
16010-160100180 = "……でも、何か力になれないかな？"
16010-160100190 = "応援してくれるとうれしいな"
16010-160100200 = "応援……"
16010-160100210 = "うん、分かった"
16010-160100220 = "頑張ってね、先生"
16010-160100230 = "……この前の出来事があってから、たくさん悩んだの"
16010-160100240 = "デスクワークの意欲を高められる応援道具は何かなって"
16010-160100250 = "……試行錯誤を重ねて、ようやく試作品ができたんだ"
16010-160100260 = "これはデスクワーカーにとって究極の応援道具"
16010-160100270 = "……次の当番の日、試しに持っていくね"
16010-160100280 = "……一体何を作ったの？"
16010-160100290 = "この前の応援道具は結構良かったと思うんだけど……"
16010-160100300 = "でも先生は嫌みたいだし、仕方ない"
16010-160100310 = "優秀なマイスターなら、常にクライアントの意見に耳を傾けるべきだもんね"
16010-160100320 = "今度は別の応援道具を用意してみたよ"
16010-160100330 = "今度シャーレに行くことがあれば、持っていくね"
16010-160100340 = "今度は自爆しないよね？"
16010-160100350 = "……"
16010-160100360 = "……やっぱり、これからそっちに向かおうかな"
16010-160100370 = "本当に自爆しないよね！？"
