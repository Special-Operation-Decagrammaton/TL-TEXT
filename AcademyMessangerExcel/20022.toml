[translation]
20022-200220010 = "こんにちは、先生"
20022-200220020 = "そろそろ年越しですね"
20022-200220030 = "今年も一年、お世話になりました"
20022-200220040 = "こちらこそ、お世話になりました"
20022-200220050 = "フウカは今日、何か予定とかあるの？"
20022-200220060 = "私は今日も、給食部の方で忙しくなりそうだなと……"
20022-200220070 = "でも大丈夫です"
20022-200220080 = "最後まで、全力を尽くしてきます！"
20022-200220090 = "えっと……おはようございます"
20022-200220100 = "起きたら、いつの間にかこんな時間に……"
20022-200220110 = "フウカが寝坊、珍しい……！"
20022-200220120 = "お恥ずかしい限りです……"
20022-200220130 = "ううん、この時期くらい良いんじゃないかな。可愛いし"
20022-200220140 = "も、もう"
20022-200220150 = "からかわないでください"
20022-200220160 = "ところで、その……"
20022-200220170 = "もうタイミングは過ぎてしまいましたが"
20022-200220180 = "よろしければ、一緒に少し遅い年越しそばを食べませんか？"
20022-200220190 = "フウカの手料理！今すぐ食べたい！"
20022-200220200 = "あ、ありがとうございます"
20022-200220210 = "少し準備があるので、夕方でもよろしいですか？"
20022-200220220 = "食堂でお待ちしていますね"
20022-200220230 = "先生は、今日もお忙しそうでしょうか？"
20022-200220240 = "そろそろ連休も終わりだな、と思いましてご連絡を……"
20022-200220250 = "休みの日って、時間の進みが早いですね……"
20022-200220260 = "こっちはいつも通りだよ。フウカの方は？"
20022-200220270 = "えっと、ぼーっとしていたら終わってたと言いますか……"
20022-200220280 = "ですが、もう明日からは給食部の準備をする必要があるので"
20022-200220290 = "明日になったら、食材を買いに行かないと"
20022-200220300 = "ってことは、今日が連休最終日……！？"
20022-200220310 = "そ、そうですね"
20022-200220320 = "まあいつものことと言いますか"
20022-200220330 = "給食部なので、仕方ありません"
20022-200220340 = "仕方なくないよ！"
20022-200220350 = "こうなったら、今日はフウカをさらわないと……"
20022-200220360 = "はい！？"
20022-200220370 = "私、先生にまで誘拐されるんですか！？"
20022-200220380 = "せっかくの連休最終日だからね！"
20022-200220390 = "ど、どういうことなんですか……？"
