[translation]
20022-200220010 = "Olá, Sensei."
20022-200220020 = "Já está quase na hora da virada do ano, não é?"
20022-200220030 = "Obrigada por cuidar de mim durante este último ano."
20022-200220040 = "Eu que agradeço por tudo."
20022-200220050 = "Fuuka, você tem algum plano para hoje?"
20022-200220060 = "Eu acho que vou ficar ocupada no Departamento de Merenda Escolar hoje também..."
20022-200220070 = "Mas está tudo bem."
20022-200220080 = "Vou dar o meu melhor até o fim!"
20022-200220090 = "Ah... bom dia."
20022-200220100 = "Quando acordei, já era essa hora..."
20022-200220110 = "Fuuka dormindo até tarde, que raro...!"
20022-200220120 = "Que vergonha..."
20022-200220130 = "Não, não, acho que está tudo bem nessa época do ano. Você fica fofa assim."
20022-200220140 = "Ah, pare com isso."
20022-200220150 = "Não zombe de mim."
20022-200220160 = "Aliás, sobre isso..."
20022-200220170 = "Já passou um pouco do horário, mas..."
20022-200220180 = "Se não se importar, gostaria de comer um soba de fim de ano um pouco atrasado comigo?"
20022-200220190 = "Comida feita pela Fuuka! Quero comer agora mesmo!"
20022-200220200 = "Ah, muito obrigada."
20022-200220210 = "Preciso preparar algumas coisas, pode ser à noite?"
20022-200220220 = "Estarei te esperando no refeitório."
20022-200220230 = "Sensei, você parece estar ocupado hoje também?"
20022-200220240 = "Pensei que o feriado já estava acabando, então resolvi entrar em contato..."
20022-200220250 = "O tempo passa rápido demais nos dias de folga, não é..."
20022-200220260 = "Por aqui está tudo normal. E com você, Fuuka?"
20022-200220270 = "Bem, eu estava distraída e o tempo acabou passando..."
20022-200220280 = "Mas, a partir de amanhã, preciso começar os preparativos para o Departamento de Merenda Escolar."
20022-200220290 = "Se for amanhã, preciso ir comprar os ingredientes."
20022-200220300 = "Isso significa que hoje é o último dia do feriado...!?"
20022-200220310 = "É, pois é."
20022-200220320 = "Bem, é o de sempre, eu diria."
20022-200220330 = "Como sou do Departamento de Merenda Escolar, não tem jeito."
20022-200220340 = "Tem jeito sim!"
20022-200220350 = "Já que é assim, hoje eu vou ter que sequestrar a Fuuka..."
20022-200220360 = "O quê!?"
20022-200220370 = "Eu vou ser sequestrada até pelo Sensei!?"
20022-200220380 = "É o último dia do feriado, afinal!"
20022-200220390 = "O-o que você quer dizer com isso...?"
