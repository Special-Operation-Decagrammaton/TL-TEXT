[translation]
23001-1449 = "先生、お願いがあるのですが……"
23001-1450 = "今日、時間大丈夫でしょうか？"
23001-1451 = "うん、全然大丈夫だよ"
23001-1452 = "よ、良かったです！"
23001-1453 = "それでは、食堂で待ってますね。よろしくお願いします"
23001-1454 = "今日は手伝ってくれて、ありがとうございました"
23001-1455 = "ううん、大したことはしてないよ"
23001-1456 = "いえいえ。このお返しは、後日必ずしますので"
23001-1457 = "楽しみにしていてくださいね"
23001-1458 = "先生、準備ができました"
23001-1459 = "準備って、何の……？"
23001-1460 = "今日、ゲヘナの学生食堂に来てもらえませんか？"
23001-1461 = "フウカの全力、お見せします"
23001-1462 = "す、すみません、先生"
23001-1463 = "美味しい料理でおもてなしをしなきゃと思って、つい……"
23001-1464 = "今日は本当に、すみませんでしたっ！"
23001-1465 = "先生、お目覚めになりましたか？体調は如何でしょう……？"
23001-1466 = "うん、今起きたところ"
23001-1467 = "大丈夫、何ともないよ"
23001-1468 = "ふう、良かったです……"
23001-1469 = "どうやったら埋め合わせができるだろうと、先ほどまで色々考えていまして"
23001-1470 = "ちょうど、良いアイデアが浮かんだのですが……"
23001-1471 = "今日の午後、お会いできませんか？"
23001-1472 = "うん、喜んで"
23001-1473 = "ありがとうございます！では、待ってますね！"
23001-1474 = "今日のウナギ料理はいかがでしたか？"
23001-1475 = "先生のお口に合ったのならよかったのですが"
23001-1476 = "次はもっと美味しい料理を振舞いますね！"
23001-1477 = "先生。実は、先日新しく考えついた料理があるのですが"
23001-1478 = "どうしても、先生に最初に食べていただきたくて"
23001-1479 = "もしよろしければ……"
23001-1480 = "フウカの新メニュー！絶対に行く！"
23001-1481 = "ふふっ。はい、待ってますね"
23001-1482 = "先生"
23001-1483 = "今日お手伝いしてくださるお話、ちゃんと覚えていらっしゃいますか？"
23001-1484 = "覚えてるよ"
23001-1485 = "……今日だっけ？"
23001-1486 = "良かったです♪"
23001-1487 = "あっ、もしかして、きちんと伝えられてなかったでしょうか……？"
23001-1488 = "ごめん、冗談"
23001-1489 = "あ、冗談、でしたか……"
23001-1490 = "そんな意地悪な冗談を言われてしまうと、"
23001-1491 = "私、傷つきます……"
23001-1492 = "ご、ごめんなさい……！"
23001-1493 = "……なんて、これも冗談ですけどね"
23001-1494 = "やられた！"
23001-1495 = "ふふ、それではおふざけはこれぐらいにして"
23001-1496 = "食堂で待ってますね！"
23001-1497 = "せ、先生……"
23001-1498 = "その、今日のことは……"
23001-1499 = "何かあったっけ？"
23001-1500 = "フウカたん、可愛かったな……"
23001-1501 = "う、うぅっ……！ほ、他の人たちには、内緒ですからね……？"
