[translation]
23001-1449 = "Professor, eu tenho um pedido..."
23001-1450 = "Você teria tempo hoje?"
23001-1451 = "Sim, estou totalmente livre."
23001-1452 = "A-ah, que bom!"
23001-1453 = "Então, estarei te esperando no refeitório. Conto com você."
23001-1454 = "Muito obrigada por me ajudar hoje."
23001-1455 = "Não foi nada, não fiz nada demais."
23001-1456 = "De jeito nenhum. Eu certamente vou retribuir esse favor outro dia."
23001-1457 = "Por favor, aguarde ansiosamente."
23001-1458 = "Professor, estou pronta."
23001-1459 = "Pronta para o quê...?"
23001-1460 = "Você poderia vir ao refeitório dos estudantes de Gehenna hoje?"
23001-1461 = "Vou te mostrar o meu melhor."
23001-1462 = "D-desculpe, Professor."
23001-1463 = "Eu queria te receber com uma comida deliciosa, e acabei me empolgando..."
23001-1464 = "Sinto muito pelo que aconteceu hoje!"
23001-1465 = "Professor, você acordou? Como está se sentindo...?"
23001-1466 = "Sim, acabei de acordar."
23001-1467 = "Estou bem, não aconteceu nada."
23001-1468 = "Ufa, que bom..."
23001-1469 = "Eu estava pensando em várias formas de compensar você até agora pouco."
23001-1470 = "Acabei de ter uma boa ideia..."
23001-1471 = "Poderíamos nos encontrar hoje à tarde?"
23001-1472 = "Sim, com prazer."
23001-1473 = "Obrigada! Então, estarei te esperando!"
23001-1474 = "O que achou do prato de enguia de hoje?"
23001-1475 = "Fico feliz se tiver agradado ao seu paladar."
23001-1476 = "Da próxima vez, farei algo ainda mais delicioso!"
23001-1477 = "Professor. Na verdade, eu pensei em um novo prato recentemente."
23001-1478 = "Eu queria muito que você fosse o primeiro a provar."
23001-1479 = "Se não for pedir muito..."
23001-1480 = "Novo menu da Fuuka! Com certeza eu vou!"
23001-1481 = "Fufu. Sim, estarei te esperando."
23001-1482 = "Professor."
23001-1483 = "Você se lembra da nossa conversa sobre você me ajudar hoje?"
23001-1484 = "Lembro sim."
23001-1485 = "...Era hoje mesmo?"
23001-1486 = "Que bom♪"
23001-1487 = "Ah, será que eu não expliquei direito...?"
23001-1488 = "Desculpe, foi brincadeira."
23001-1489 = "Ah, era uma brincadeira..."
23001-1490 = "Se você fizer esse tipo de brincadeira maldosa,"
23001-1491 = "eu fico magoada..."
23001-1492 = "D-desculpe...!"
23001-1493 = "...Brincadeira, essa parte também foi uma brincadeira."
23001-1494 = "Cai nessa!"
23001-1495 = "Fufu, chega de brincadeiras por agora."
23001-1496 = "Estarei te esperando no refeitório!"
23001-1497 = "P-professor..."
23001-1498 = "Sobre o que aconteceu hoje..."
23001-1499 = "Aconteceu alguma coisa?"
23001-1500 = "A Fuuka-tan era tão fofa..."
23001-1501 = "U-uuh...! I-isso é um segredo entre nós, entendeu...?"
