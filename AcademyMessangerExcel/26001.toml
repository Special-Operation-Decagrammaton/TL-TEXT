[translation]
26001-1558 = "Sensei, Sensei"
26001-1559 = "Sensei, existe algo que você sempre mantém por perto?"
26001-1560 = "Não consigo pensar em nada de imediato..."
26001-1561 = "Algo que você goste tanto a ponto de colecionar?"
26001-1562 = "Algo que seja seu favorito e que você carregue o dia todo?"
26001-1563 = "Algo que você nunca tira de perto e que te deixa ansioso se ficar longe por um tempo, não tem nada assim?"
26001-1564 = "Eu não acho que tenha algo por que eu seja tão obcecado assim..."
26001-1565 = "Entendo... isso é difícil."
26001-1566 = "O que é difícil?"
26001-1567 = "Não, não é nada."
26001-1568 = "Sensei, você conhece a lenda urbana da 'Ligação da Mary'?"
26001-1569 = "Acho que nunca ouvi falar."
26001-1570 = "É sobre uma garota que recebe ligações de uma boneca chamada Mary, que ela deveria ter descartado há muito tempo."
26001-1571 = "O que dá medo é que, a cada ligação, a Mary vai se aproximando cada vez mais..."
26001-1572 = "Então é esse tipo de história... Mas por que você começou a falar de lendas urbanas de repente?"
26001-1573 = "Não tem um significado especial, foi só por acaso."
26001-1574 = "...Se rastreássemos essa ligação, conseguiríamos descobrir onde a Mary está, não é?"
26001-1575 = "Será que a Mary não poderia ligar para o meu celular?"
26001-1576 = "Que medo..."
26001-1577 = "Sensei, por acaso você não recebeu nenhuma ligação estranha ultimamente?"
26001-1578 = "Tipo alguém assustador ligando, ou uma chamada com conteúdo suspeito..."
26001-1579 = "Acho que não recebi nada disso, por quê?"
26001-1580 = "Na verdade..."
26001-1581 = "Não, falarei com você pessoalmente mais tarde."
26001-260010010 = "...Ah."
26001-260010020 = "O que houve?"
26001-260010030 = "Eu levantei com os fones de ouvido conectados ao computador e quase caí."
26001-260010040 = "Isso acontece muito quando estamos distraídos, né?"
26001-260010050 = "Sim. O sentido da audição se acostuma facilmente a estímulos repetitivos."
26001-260010060 = "Kotama, que tipo de música você costuma ouvir?"
26001-260010070 = "As músicas que eu costumo ouvir..."
26001-260010080 = "Bem, isso é..."
26001-260010090 = "..."
26001-260010100 = "É segredo."
26001-260010110 = "Por quê!?"
