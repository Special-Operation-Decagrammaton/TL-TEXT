[translation]
10023-100230010 = "Sensei, posso te pedir um favor?"
10023-100230020 = "Claro, pode pedir qualquer coisa."
10023-100230030 = "Sim, o que eu devo fazer?"
10023-100230040 = "Queria que você comprasse um protetor solar quando vier para Gehenna da próxima vez."
10023-100230050 = "O que eu estava usando acabou, e eu ia comprar um novo antes do acampamento, mas..."
10023-100230060 = "O trabalho do comitê está mais corrido do que eu pensava..."
10023-100230070 = "Tudo bem, pode deixar comigo."
10023-100230080 = "É o protetor solar da marca 'Seaside', certo?"
10023-100230090 = "Sim, é esse mesmo."
10023-100230100 = "Então, conto com você."
10023-100230110 = "...Está tudo pronto?"
10023-100230120 = "Vou repetir só para garantir, não conte para nenhuma outra aluna!"
10023-100230130 = "...Iori?"
10023-100230140 = "Essa mensagem era mesmo para mim?"
10023-100230150 = "...Hã?"
10023-100230160 = "jgaklfa"
10023-100230170 = "N-Não é nada!"
10023-100230180 = "Esqueça a mensagem que eu acabei de enviar!"
10023-100230190 = "Agora que você disse isso, fiquei ainda mais curioso..."
10023-100230200 = "Hum... Obrigada por me ajudar a praticar natação, Sensei."
10023-100230210 = "Graças a você, não posso dizer que aprendi perfeitamente, mas pelo menos consigo nadar um pouco..."
10023-100230220 = "Talvez agora eu não precise levar uma boia para o acampamento."
10023-100230230 = "Que bom. A propósito, Iori."
10023-100230240 = "...O quê?"
10023-100230250 = "Tinha um desenho na sua boia... Iori, você gosta de patinhos?"
10023-100230260 = "Cala a boca! Morra!"
10023-100230270 = "Sensei, onde você está?"
10023-100230280 = "Recebi uma informação de que alguns delinquentes estão causando problemas perto da barraca de praia."
10023-100230290 = "Como parte do Comitê de Disciplina de Gehenna, não posso ignorar isso."
10023-100230300 = "Só que não sei quantos eles são, e as outras membros do comitê não podem vir, então queria que você viesse também, Sensei."
10023-100230310 = "Ah, e como você pode acabar caindo no mar, acho que é melhor vir de traje de banho!"
10023-100230320 = "Eh, espere aí!?"
10023-100230330 = "Sensei. Ouvi na recepção agora há pouco que você não volta há mais de meio dia..."
10023-100230340 = "Onde você está agora?"
10023-100230350 = "Na praia."
10023-100230360 = "Na praia? O que você está fazendo na praia...?"
10023-100230370 = "Apenas deitado."
10023-100230380 = "Hã...? Por quê?"
10023-100230390 = "Não, não precisa dizer. Entendi."
10023-100230400 = "Vou procurar minhas algemas e já estou indo, não saia daí."
10023-100230410 = "Espere, o que você está imaginando?"
10023-100230420 = "Sensei, é uma emergência."
10023-100230430 = "O que aconteceu?"
10023-100230440 = "Algumas alunas delinquentes estão causando problemas no restaurante da praia..."
10023-100230450 = "E eu já tinha lidado com elas uma vez... *Suspiro*..."
10023-100230460 = "Estou precisando de uma mãozinha, então gostaria que você assumisse o comando, Sensei."
10023-100230470 = "Entendido, para onde devo ir?"
