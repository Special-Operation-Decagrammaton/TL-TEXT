[translation]
10023-100230010 = "先生、ひとつお願いしても良い？"
10023-100230020 = "もちろん、何でも言って"
10023-100230030 = "うん、何をすれば良い？"
10023-100230040 = "今度ゲヘナに来るときに、日焼け止めを買ってきて欲しくて"
10023-100230050 = "ずっと使ってたのが無くなっちゃったから、合宿前に買おうと思ってたんだけど"
10023-100230060 = "思ったよりも委員会の仕事が忙しくって……"
10023-100230070 = "大丈夫、任せて"
10023-100230080 = "「シーサイド」の日焼け止めだよね？"
10023-100230090 = "うん、それで合ってる"
10023-100230100 = "じゃあ、よろしく"
10023-100230110 = "……準備はできたか？"
10023-100230120 = "念押しになるけど、絶対に他の生徒には言うなよ！"
10023-100230130 = "……イオリ？"
10023-100230140 = "これ私に送るメッセージで合ってる？"
10023-100230150 = "……は？"
10023-100230160 = "ｊぐぁｋｌｆ"
10023-100230170 = "やっ、何でもない！"
10023-100230180 = "今送ったメッセージのことは忘れて！"
10023-100230190 = "そう言われると、尚更気になる……"
10023-100230200 = "その……泳ぎの練習、付き合ってくれてありがと。先生"
10023-100230210 = "おかげで、お世辞にも習得したとは言えないけど、何とか泳げるくらいにはなったし……"
10023-100230220 = "これで合宿に浮き輪を持っていかずに済むかも"
10023-100230230 = "それは良かった。ところでイオリ"
10023-100230240 = "……何？"
10023-100230250 = "浮き輪に描かれてたけど、イオリはアヒルさんが好きなの？"
10023-100230260 = "うるさい！死ねっ！"
10023-100230270 = "先生、今どこ？"
10023-100230280 = "連絡が入ったんだけど、どうやら海の家の近くでチンピラたちが暴れてるらしい"
10023-100230290 = "ゲヘナの風紀委員会として、放っておくわけにはいかない"
10023-100230300 = "ただ相手の数も分からないし、他の風紀委員も動けないから、先生も来てほしい"
10023-100230310 = "あ、海に落ちるかもだし、水着の方が良いと思う！"
10023-100230320 = "え、待って待って！？"
10023-100230330 = "先生。さっきフロントで、半日以上戻ってきてないって聞いたんだけど……"
10023-100230340 = "今はどこにいるんだ？"
10023-100230350 = "砂浜に"
10023-100230360 = "砂浜？砂浜で一体何を……？"
10023-100230370 = "ただ横になってる"
10023-100230380 = "は……？どうして？"
10023-100230390 = "いや、言わなくて良い。分かった"
10023-100230400 = "手錠を探してすぐ行くから、そこから動かないで"
10023-100230410 = "待って、何を想像してるの？"
10023-100230420 = "先生、緊急事態だ"
10023-100230430 = "どうしたの？"
10023-100230440 = "浜辺の食堂で不良生徒が暴れてて……"
10023-100230450 = "一度取り締まったのに……はぁ……"
10023-100230460 = "ちょっと手が足りないから、先生に指揮をお願いしたいんだ"
10023-100230470 = "分かった、どこに向かえばいいかな？"
