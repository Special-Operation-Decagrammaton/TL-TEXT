[translation]
13013-130130010 = "Ei... Sensei"
13013-130130020 = "Você tem um momento agora?"
13013-130130030 = "Claro!"
13013-130130040 = "Que bom..."
13013-130130050 = "Na verdade, eu tenho um pedido para o Sensei..."
13013-130130060 = "Entendido, estou indo aí agora."
13013-130130070 = "Conseguiu chegar em casa em segurança?"
13013-130130080 = "Desculpe, por minha causa você acabou ficando até tarde..."
13013-130130090 = "Não foi um incômodo, eu também me diverti."
13013-130130100 = "Preciso guardar bem esse doujinshi."
13013-130130110 = "Sim!"
13013-130130120 = "Sensei,"
13013-130130130 = "você coleciona alguma coisa?"
13013-130130140 = "Se for uma coleção de tipos de fadiga, eu tenho várias..."
13013-130130150 = "I-isso é..."
13013-130130160 = "Terrível..."
13013-130130170 = "E você, Momiji?"
13013-130130180 = "Coleciona algo?"
13013-130130190 = "Hehehe..."
13013-130130200 = "Eu coleciono edições esgotadas de um certo autor."
13013-130130210 = "Sensei..."
13013-130130220 = "Sensei...!"
13013-130130230 = "Finalmente... vai começar...!"
13013-130130240 = "O-o que vai?"
13013-130130250 = "Parece animada, Momiji."
13013-130130260 = "Ah, desculpe..."
13013-130130270 = "Acabei me empolgando sem querer..."
13013-130130280 = "Pode me contar?"
13013-130130290 = "Hoje é..."
13013-130130300 = "O dia do Festival do Livro de Red Winter!"
13013-130130310 = "Hum...?"
13013-130130320 = "Sensei, obrigado por me acompanhar hoje!"
13013-130130330 = "Andamos bastante... você não está cansado?"
13013-130130340 = "Isso não é nada!"
13013-130130350 = "Que bom."
13013-130130360 = "Estou ansiosa por amanhã também!"
13013-130130370 = "A-amanhã também!?"
13013-130130380 = "O festival do livro dura dois dias!"
13013-130130390 = "Quero conquistar todos os estandes restantes amanhã!"
13013-130130400 = "E-eu vou me esforçar..."
13013-130130410 = "Obrigada!"
13013-130130420 = "Hehehe, estou ansiosa."
13013-130130430 = "Boa noite!"
13013-130130440 = "Bom dia, Sensei."
13013-130130450 = "Bom dia, Momiji..."
13013-130130460 = "Ué?"
13013-130130470 = "O que houve?"
13013-130130480 = "Na verdade..."
13013-130130490 = "Passei duas noites em claro e minha cabeça está girando..."
13013-130130500 = "Não pode ser! Isso é terrível!"
13013-130130510 = "Às vezes, quando percebo que estou lendo um livro, já amanheceu..."
13013-130130520 = "Ei, Sensei."
13013-130130530 = "Se não for pedir muito... você poderia vir à biblioteca de Red Winter?"
13013-130130540 = "Na biblioteca...?"
13013-130130550 = "Sensei."
13013-130130560 = "Sinto muito."
13013-130130570 = "Não poderemos nos encontrar hoje."
13013-130130580 = "O-o que aconteceu!?"
13013-130130590 = "Algo importante na biblioteca..."
13013-130130600 = "Não, é só que..."
13013-130130610 = "Eu perdi algo..."
13013-130130620 = "...e preciso encontrar."
13013-130130630 = "Eu te ajudo."
13013-130130640 = "Hã?"
13013-130130650 = "O Sensei vai me ajudar?"
