[translation]
13013-130130010 = "あの……先生"
13013-130130020 = "今、お時間大丈夫ですか？"
13013-130130030 = "もちろん！"
13013-130130040 = "良かったです……"
13013-130130050 = "実は、先生にお願いがあるんですが……"
13013-130130060 = "分かった、すぐ向かうね"
13013-130130070 = "無事に帰れましたか？"
13013-130130080 = "すみません、私のせいで遅くまで迷惑を……"
13013-130130090 = "迷惑だなんて、私も楽しかったよ"
13013-130130100 = "同人誌、ちゃんと保管しないとね"
13013-130130110 = "はい！"
13013-130130120 = "先生は"
13013-130130130 = "何かをコレクションしたりしていますか？"
13013-130130140 = "疲労のレパートリーならコレクションされてるよ……"
13013-130130150 = "そ、それは"
13013-130130160 = "大変ですね……"
13013-130130170 = "モミジはどう？"
13013-130130180 = "何か集めてる？"
13013-130130190 = "えへへ……"
13013-130130200 = "私は、とある作家さんの絶版本を集めてるんです"
13013-130130210 = "先生……"
13013-130130220 = "先生……！"
13013-130130230 = "いよいよ……開催です……！"
13013-130130240 = "な、何が？"
13013-130130250 = "楽しそうだね、モミジ"
13013-130130260 = "わわっ、すみません……"
13013-130130270 = "思わず、浮かれてしまいました……"
13013-130130280 = "聞かせてもらえる？"
13013-130130290 = "今日は……"
13013-130130300 = "レッドウィンターブックフェスティバルの日です！"
13013-130130310 = "うん……？"
13013-130130320 = "先生、今日はお付き合いいただきありがとうございました！"
13013-130130330 = "たくさん歩き回りましたが……疲れてませんか？"
13013-130130340 = "これくらい大丈夫だよ！"
13013-130130350 = "良かったです"
13013-130130360 = "明日も楽しみですね！"
13013-130130370 = "あ、明日も！？"
13013-130130380 = "ブックフェスティバルは2日間ありますから！"
13013-130130390 = "明日で残りのコーナーを完全制覇したいと思います！"
13013-130130400 = "が、頑張るね……"
13013-130130410 = "ありがとうございます！"
13013-130130420 = "えへへ、楽しみにしてますね"
13013-130130430 = "おやすみなさい！"
13013-130130440 = "おはようございます、先生"
13013-130130450 = "おはよう、モミジ……"
13013-130130460 = "あれ？"
13013-130130470 = "どうしたんですか？"
13013-130130480 = "実は……"
13013-130130490 = "2日連続の徹夜で頭がぼーっとして……"
13013-130130500 = "そんな！大変です！"
13013-130130510 = "私も本を読んでいると気づいたら朝になっている日もありますが……"
13013-130130520 = "あの、先生"
13013-130130530 = "もしよろしければ……レッドウィンターの図書館に来ていただけませんか？"
13013-130130540 = "図書館に……？"
13013-130130550 = "先生"
13013-130130560 = "ごめんなさい"
13013-130130570 = "今日はお会いできません"
13013-130130580 = "ど、どうしたの！？"
13013-130130590 = "図書館で大切な……"
13013-130130600 = "いやちょっとした……"
13013-130130610 = "落とし物を……"
13013-130130620 = "……探さないと"
13013-130130630 = "私も手伝うよ"
13013-130130640 = "えっ？"
13013-130130650 = "先生が、ですか？"
