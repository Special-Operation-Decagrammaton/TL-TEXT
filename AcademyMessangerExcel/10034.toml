[translation]
10034-100340010 = "先生、聞きましたよ"
10034-100340020 = "先生が最近お仕事でとてもお忙しい、と"
10034-100340030 = "きちんと睡眠が取れていなくって、昨日もシャーレに遅刻してしまうほどだと伺いましたが、"
10034-100340040 = "そんなにお忙しくされているのですか……？"
10034-100340050 = "まあ、たまにはそういうことも……"
10034-100340060 = "ある程度は寝られてる、はず……"
10034-100340070 = "そうですか……分かりました"
10034-100340080 = "これは由々しき事態です……"
10034-100340090 = "修行部の部員である私が、何とかしないといけませんね"
10034-100340100 = "ん？どういうこと？"
10034-100340110 = "あの、ミモリさん？"
10034-100340120 = "あの後、きちんと間に合いましたか？"
10034-100340130 = "今日はありがとう。でも、どうしてミモリが……？"
10034-100340140 = "それはですね……"
10034-100340150 = "私が、大和撫子を目標として精進を重ねる、修行部の部員だからです"
10034-100340160 = "そしてその一環として、今日は先生を手伝いにお伺いしました"
10034-100340170 = "これからも困った時は、いつでもお申し付けください！"
10034-100340180 = "いつでも、何なりと。お呼びいただけたら、すぐに参りますので"
10034-100340190 = "理想の大和撫子になってみせますので……！"
10034-100340200 = "そ、そっか。ありがとう"
10034-100340210 = "あっ、もし眠れないようでしたら、私が寝かしつけで添い寝に参りましょうか？"
10034-100340220 = "そ、そこまでは大丈夫！"
10034-100340230 = "ぐっ……！え、遠慮、しておく……！"
10034-100340240 = "照れなくても良いんですよ？ふふっ♪"
10034-100340250 = "先生、前回に引き続き修行の一環として、今度は家庭料理を作ってみようと思います"
10034-100340260 = "それで、よろしければ……"
10034-100340270 = "待って、ミモリの家庭料理……？"
10034-100340280 = "待って、家庭料理を作るミモリ……？"
10034-100340290 = "え……？あ、はい。そう、ですが……？"
10034-100340300 = "それで、よろしければその修行をお手伝いしていただきたく……"
10034-100340310 = "手伝う以外の選択肢がない"
10034-100340320 = "全力で！手伝う！"
10034-100340330 = "あっ、はいっ！そ、それではよろしくお願いします……！"
10034-100340340 = "修行部の活動で今度、お掃除のボランティアに行くことになりました"
10034-100340350 = "ミモリはいつも色んなことに一生懸命だね"
10034-100340360 = "ふふっ、ありがとうございます。料理の次は、お掃除"
10034-100340370 = "これらも立派な大和撫子に、そして素敵な花嫁になるための修行ですので"
10034-100340380 = "そこでなのですが……"
10034-100340390 = "もしよろしければ先生も、そのお手伝いをしていただけませんか？"
10034-100340400 = "うん、もちろん"
10034-100340410 = "ありがとうございます、ではよろしくお願いしますね♪"
10034-100340420 = "先生、今日お時間ありますでしょうか？"
10034-100340430 = "ミモリのためならいつでも大丈夫だよ"
10034-100340440 = "どうしたの？"
10034-100340450 = "あっ、そ、そうなんですか……？"
10034-100340460 = "そう言ってくださると、その……すごく嬉しいです。"
10034-100340470 = "えっと、実は……"
10034-100340480 = "ちょっと、百貨店で買いたいものがありまして"
10034-100340490 = "ぜひ先生と一緒に行ければと思ってご連絡したのですが……"
10034-100340500 = "その、ご迷惑だったりしませんでしょうか……？"
10034-100340510 = "全っ然大丈夫"
10034-100340520 = "いつでも呼んで"
10034-100340530 = "はいっ、ありがとうございます！"
10034-100340540 = "それでは、百貨店の前でお待ちしておりますね"
10034-100340550 = "こんにちは、先生"
10034-100340560 = "本日、百鬼夜行にいらっしゃっていると伺ったのですが"
10034-100340570 = "うん、その予定だよ"
10034-100340580 = "え、ええと……"
10034-100340590 = "でしたら"
10034-100340600 = "久しぶりに先生をご招待したいのですが"
10034-100340610 = "よろしい、でしょうか……？"
10034-100340620 = "もちろん！"
