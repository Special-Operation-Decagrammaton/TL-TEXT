[translation]
10034-100340010 = "Sensei, eu fiquei sabendo."
10034-100340020 = "Que você tem estado muito ocupado com o trabalho ultimamente."
10034-100340030 = "Ouvi dizer que você não tem dormido direito, a ponto de ter se atrasado para a SCHALE ontem,"
10034-100340040 = "Você está tão ocupado assim...?"
10034-100340050 = "Bem, às vezes acontece..."
10034-100340060 = "Tenho dormido o suficiente, eu acho..."
10034-100340070 = "Entendo... Compreendido."
10034-100340080 = "Esta é uma situação grave..."
10034-100340090 = "Como membro do Clube de Treinamento, eu preciso fazer alguma coisa."
10034-100340100 = "Hm? O que você quer dizer?"
10034-100340110 = "Uh, Mimori?"
10034-100340120 = "Depois daquilo, você conseguiu chegar a tempo?"
10034-100340130 = "Obrigado por hoje. Mas, por que você, Mimori...?"
10034-100340140 = "Bem, é que..."
10034-100340150 = "É porque sou membro do Clube de Treinamento, onde me esforço para me tornar uma Yamato Nadeshiko."
10034-100340160 = "E como parte disso, vim ajudar o Sensei hoje."
10034-100340170 = "De agora em diante, sempre que estiver em apuros, pode me chamar!"
10034-100340180 = "A qualquer hora, para o que for. Se me chamar, eu virei imediatamente."
10034-100340190 = "Vou me tornar a Yamato Nadeshiko ideal...!"
10034-100340200 = "E-Entendi. Obrigado."
10034-100340210 = "Ah, se não conseguir dormir, quer que eu vá aí para dormir ao seu lado e te ajudar a pegar no sono?"
10034-100340220 = "N-Não precisa de tanto!"
10034-100340230 = "Urgh...! V-Vou... dispensar...!"
10034-100340240 = "Não precisa ficar com vergonha, sabia? Fufu ♪"
10034-100340250 = "Sensei, continuando com o meu treinamento, desta vez, acho que vou tentar fazer comida caseira."
10034-100340260 = "Então, se não for incômodo..."
10034-100340270 = "Espere, comida caseira da Mimori...?"
10034-100340280 = "Espere, a Mimori fazendo comida caseira...?"
10034-100340290 = "Eh...? Ah, sim. É isso, mas...?"
10034-100340300 = "Então, se não for incômodo, eu gostaria que você me ajudasse nesse treinamento..."
10034-100340310 = "Não há outra opção a não ser ajudar."
10034-100340320 = "Com toda a minha força! Vou ajudar!"
10034-100340330 = "Ah, sim! E-Então, conto com você...!"
10034-100340340 = "Como uma atividade do Clube de Treinamento, decidi que vou fazer um trabalho voluntário de limpeza."
10034-100340350 = "Mimori, você sempre se dedica tanto a tantas coisas."
10034-100340360 = "Fufu, obrigada. Depois de cozinhar, vem a limpeza."
10034-100340370 = "Isso também faz parte do treinamento para me tornar uma esplêndida Yamato Nadeshiko e uma noiva maravilhosa."
10034-100340380 = "E sobre isso..."
10034-100340390 = "Se não for incômodo, Sensei, você poderia me ajudar com isso também?"
10034-100340400 = "Sim, claro."
10034-100340410 = "Obrigada, então conto com você ♪"
10034-100340420 = "Sensei, você tem um tempo hoje?"
10034-100340430 = "Para você, Mimori, eu sempre tenho tempo."
10034-100340440 = "O que foi?"
10034-100340450 = "Ah, s-sério...?"
10034-100340460 = "Ouvir você dizer isso... me deixa muito feliz."
10034-100340470 = "Bem, na verdade..."
10034-100340480 = "Tem uma coisa que eu queria comprar na loja de departamentos."
10034-100340490 = "Eu entrei em contato porque pensei que seria ótimo se pudéssemos ir juntos..."
10034-100340500 = "Isso... não seria um incômodo...?"
10034-100340510 = "Não tem problema nenhum"
10034-100340520 = "É só chamar"
10034-100340530 = "Sim, muito obrigada!"
10034-100340540 = "Então, estarei esperando na frente da loja de departamentos."
10034-100340550 = "Olá, Sensei."
10034-100340560 = "Fiquei sabendo que você está em Hyakkiyako hoje..."
10034-100340570 = "Sim, esse é o plano."
10034-100340580 = "Ah, uhm..."
10034-100340590 = "Nesse caso,"
10034-100340600 = "Gostaria de convidar o Sensei, já que faz um tempo."
10034-100340610 = "Tudo bem por você...?"
10034-100340620 = "Claro!"
