[translation]
10104-101040010 = "こんにちは、先生"
10104-101040020 = "どうやら明日は、山海経まで来るそうですね？"
10104-101040030 = "どこで知ったの！？"
10104-101040040 = "やはりそうでしたか"
10104-101040050 = "当然ですが私たち玄武商会は"
10104-101040060 = "独自の情報網を持っていますから"
10104-101040070 = " 情報網……"
10104-101040080 = "実のところ"
10104-101040090 = "そこまで大したものではありませんが……"
10104-101040100 = "先生、明日の朝お時間があれば"
10104-101040110 = "少しお話でもしませんか？"
10104-101040120 = "どちらにせよ私は日課をこなしておくので"
10104-101040130 = "忙しいようでしたら、また別の日でも"
10104-101040140 = "今日は商会に来てくださるんですよね"
10104-101040150 = "うん、楽しみにしてるよ"
10104-101040160 = "そう言っていただけると嬉しいのですが"
10104-101040170 = "少し緊張しますね"
10104-101040180 = "ご、ごめん……"
10104-101040190 = "いえ、謝ってほしいわけでは"
10104-101040200 = "期待されないより良いですから"
10104-101040210 = "料理を出す立場からすれば、なおのこと"
10104-101040220 = "それでは先生"
10104-101040230 = "後ほどお会いしましょう"
10104-101040240 = "以前も申し上げたかと思いますが……"
10104-101040250 = "今日は玄龍門の監査が入る予定でして"
10104-101040260 = "無事終わると良いね"
10104-101040270 = "はい"
10104-101040280 = "ひとつ気になったのですが"
10104-101040290 = "先生まで来る必要は……"
10104-101040300 = "一応、顧問としてね"
10104-101040310 = "それはそうですが……"
10104-101040320 = "はぁ"
10104-101040330 = "前回の監査では"
10104-101040340 = "私たちの部員が監査員を入院させてしまったもので……"
10104-101040350 = "入院！？"
10104-101040360 = "い、いえっ"
10104-101040370 = "アレは、あくまで事故で……"
10104-101040380 = "と今さら何を言ったところで"
10104-101040390 = "言い訳にしかなりませんね"
10104-101040400 = "申し訳ありませんが、本日はお願いいたします"
10104-101040410 = "う、うん……"
10104-101040420 = "シャーレの当番を行うにあたって"
10104-101040430 = "何か準備は必要でしょうか？"
10104-101040440 = "大丈夫だよ、気楽に来てね"
10104-101040450 = "分かりました"
10104-101040460 = "では、後ほどシャーレでお会いしましょう"
