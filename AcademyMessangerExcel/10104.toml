[translation]
10104-101040010 = "Olá, Sensei"
10104-101040020 = "Parece que você virá para o Shanhaejing amanhã, certo?"
10104-101040030 = "Como você soube!?"
10104-101040040 = "Então era isso mesmo."
10104-101040050 = "É claro que nós, da Associação Comercial Genbu,"
10104-101040060 = "temos nossa própria rede de informações."
10104-101040070 = "Rede de informações..."
10104-101040080 = "Na verdade,"
10104-101040090 = "não é nada de tão especial, mas..."
10104-101040100 = "Sensei, se tiver um tempo amanhã de manhã,"
10104-101040110 = "gostaria de conversar um pouco?"
10104-101040120 = "De qualquer forma, estarei cumprindo minhas tarefas diárias,"
10104-101040130 = "então se estiver ocupado, podemos deixar para outro dia."
10104-101040140 = "Você virá à Associação Comercial hoje, certo?"
10104-101040150 = "Sim, estou ansioso por isso."
10104-101040160 = "Fico feliz em ouvir isso, mas"
10104-101040170 = "estou um pouco nervosa."
10104-101040180 = "D-desculpe..."
10104-101040190 = "Não, não é que eu queira que você se desculpe."
10104-101040200 = "É melhor do que não ter expectativas,"
10104-101040210 = "especialmente para quem está servindo a comida."
10104-101040220 = "Então, Sensei,"
10104-101040230 = "nos vemos mais tarde."
10104-101040240 = "Acho que já mencionei antes, mas..."
10104-101040250 = "Hoje está programada uma auditoria do Genryumon."
10104-101040260 = "Espero que termine bem."
10104-101040270 = "Sim."
10104-101040280 = "Uma coisa me preocupa:"
10104-101040290 = "É realmente necessário que o Sensei venha...?"
10104-101040300 = "Bem, como consultor."
10104-101040310 = "Isso é verdade, mas..."
10104-101040320 = "Ah..."
10104-101040330 = "Na auditoria anterior,"
10104-101040340 = "um dos nossos membros acabou hospitalizando um auditor..."
10104-101040350 = "Hospitalizando!?"
10104-101040360 = "N-não!"
10104-101040370 = "Aquilo foi apenas um acidente..."
10104-101040380 = "Mas não importa o que eu diga agora,"
10104-101040390 = "será apenas uma desculpa."
10104-101040400 = "Sinto muito, mas conto com você hoje."
10104-101040410 = "U-uhm..."
10104-101040420 = "Para cumprir o dever no Schale,"
10104-101040430 = "preciso de alguma preparação?"
10104-101040440 = "Não se preocupe, venha à vontade."
10104-101040450 = "Entendido."
10104-101040460 = "Então, nos vemos no Schale mais tarde."
