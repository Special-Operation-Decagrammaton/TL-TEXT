[translation]
10062-100620010 = "先生、今日もお仕事だと聞きました"
10062-100620020 = "シャーレはいつも大変そうですね"
10062-100620030 = "誰……？"
10062-100620040 = "やはり、そんな時には補佐が必要でしょう"
10062-100620050 = "すぐにお伺いします、先生"
10062-100620060 = "本当に誰！？"
10062-100620070 = "先生、今お時間よろしいですか？"
10062-100620080 = "見慣れない手紙が届いたので、どうしたらよいものか"
10062-100620090 = "お忙しいようでしたら、一人で解決しようかと思っておりますが……"
10062-100620100 = "まずは一度ご相談を、と思い"
10062-100620110 = "トキが困ってるの！？大丈夫？すぐ行くから！"
10062-100620120 = "ありがとうございます"
10062-100620130 = "それでは、学校まで来ていただいてもよろしいでしょうか？"
10062-100620140 = "今日は私がシャーレ当番の日だと伺っておりますが"
10062-100620150 = "スケジュールに間違いはないでしょうか？"
10062-100620160 = "トキの初当番、楽しみにしてるね"
10062-100620170 = "……？"
10062-100620180 = "よく分かりませんが……"
10062-100620190 = "先生の期待にお応えできるよう、全力で補佐いたします"
10062-100620200 = "では、後ほどお会いしましょう"
10062-100620210 = "先生"
10062-100620220 = "今日は少し用事が長引いて、いつもより遅くなりそうです"
10062-100620230 = "お約束した時間通りに補佐できず、申し訳ありません"
10062-100620240 = "大丈夫だけど、トキが遅れるなんて珍しいね"
10062-100620250 = "何があったのか聞いてもいい？"
10062-100620260 = "いえ"
10062-100620270 = "大した用事ではありません"
10062-100620280 = "あまり心配なさらないでください"
10062-100620290 = "では、また後ほどお会いしましょう"
10062-100620300 = "先生。そろそろ私たちの間に "
10062-100620310 = "「証」が必要な頃だと思いますので"
10062-100620320 = "お話をさせていただきたく"
10062-100620330 = "ど、どういうこと！？「証」って何！？"
10062-100620340 = "大丈夫です"
10062-100620350 = "私がわかっていれば良いので"
10062-100620360 = "トキさん……？"
