[translation]
10057-100570010 = "Olá, Sensei."
10057-100570020 = "Com a chegada do Ano Novo, como você tem passado?"
10057-100570030 = "Estou mais ou menos como sempre. E você, Haruna?"
10057-100570040 = "Fufu."
10057-100570050 = "Eu também não mudei muito, continuo em busca da gastronomia perfeita mesmo no fim de ano, mas..."
10057-100570060 = "Na gastronomia, a estação e a atmosfera também são elementos importantes."
10057-100570070 = "Ou seja, esta época de fim e começo de ano é..."
10057-100570080 = "Uma ótima oportunidade para experimentar uma gastronomia um pouco diferente do habitual."
10057-100570090 = "E-entendo..."
10057-100570100 = "Não precisa pensar muito sobre isso."
10057-100570110 = "Por isso, Sensei..."
10057-100570120 = "Você poderia me acompanhar um pouco?"
10057-100570130 = "P-por que motivo...?!"
10057-100570140 = "Sensei."
10057-100570150 = "No trabalho, o que você acha que é mais importante: o resultado ou o processo?"
10057-100570160 = "É uma pergunta difícil..."
10057-100570170 = "Acho que ambos são importantes, mas..."
10057-100570180 = "Eu sabia."
10057-100570190 = "Claro que o resultado é importante."
10057-100570200 = "Mas isso não quer dizer que o processo não tenha significado..."
10057-100570210 = "Acredito que o mesmo se aplica ao caminho da gastronomia."
10057-100570220 = "Talvez... seja?"
10057-100570230 = "Ufufu."
10057-100570240 = "Hoje, vamos explorar esse processo."
10057-100570250 = "Pode criar expectativas."
10057-100570260 = "Sensei, muito obrigada por hoje."
10057-100570270 = "Da próxima vez, vamos aproveitar a melhor gastronomia juntos."
10057-100570280 = "Ufufu."
10057-100570290 = "Sensei."
10057-100570300 = "Você se lembra da nossa promessa anterior?"
10057-100570310 = "Lembro, sim. Íamos aproveitar a melhor gastronomia, certo?"
10057-100570320 = "Claro, a promessa de ir pescar siris, né?"
10057-100570330 = "...?"
10057-100570340 = "Não sei com quem você está me confundindo, mas..."
10057-100570350 = "Era sobre a melhor gastronomia. Bem, siri também é bom, mas..."
10057-100570360 = "Acabou sendo um aviso de última hora, mas você teria um tempo mais tarde?"
10057-100570370 = "Vejamos, a hora e o lugar..."
