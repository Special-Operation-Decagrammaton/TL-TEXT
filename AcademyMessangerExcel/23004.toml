[translation]
23004-1582 = "Professor, você estava lendo o catálogo de papelaria com tanta atenção agora pouco..."
23004-1583 = "Tem algo que você precise?"
23004-1584 = "Estou pensando em encomendar um porta-canetas novo."
23004-1585 = "Se for um formato simples assim, acho que seria mais rápido se nós fizéssemos aqui. O que acha?"
23004-1586 = "Dá para fazer tão fácil assim?"
23004-1587 = "Claro. E ainda por cima, farei algo mais leve e resistente do que os vendidos nas lojas."
23004-1588 = "Como tenho os materiais aqui, quer que eu tente fazer?"
23004-1589 = "Sim, então eu agradeceria."
23004-1590 = "Entendido. Então, venha até a sala de trabalho do Departamento de Engenharia daqui a uma hora."
23004-1591 = "Professor, parece que a luz do banheiro do Schale queimou."
23004-1592 = "Eu apertei o interruptor, mas a luz não acendeu."
23004-1593 = "Ah, é mesmo? Obrigado. Preciso chamar um técnico..."
23004-1594 = "Não se preocupe, parece que foi só um fio que soltou, deve ser fácil de consertar."
23004-1595 = "Onde está o alicate de crimpagem? Eu mesma conserto."
23004-1596 = "Não temos ferramentas tão especializadas assim no Schale..."
23004-1597 = "...Não tem? Nenhuma?"
23004-1598 = "...Entendo."
23004-1599 = "Professor, conforme planejado, hoje à tarde estarei no Schale para o meu turno."
23004-1600 = "Desculpe, surgiu um compromisso de última hora e talvez eu não esteja no Schale à tarde."
23004-1601 = "Entendi. Bem, não tem jeito."
23004-1602 = "Tem algo que eu deva fazer enquanto você estiver fora?"
23004-1603 = "Talvez chegue uma encomenda à tarde, você poderia recebê-la?"
23004-1604 = "Uma encomenda? O que é?"
23004-1605 = "Encomendei um cachorro-robô."
23004-1606 = "Humm, um cachorro-robô, é..."
23004-1607 = "...Só por precaução, não tente dissecá-lo, está bem?"
23004-1608 = "...Utaha?"
23004-1609 = "Professor, o conserto da bicicleta que você pediu terminou."
23004-1610 = "Quando vier ao Millennium da próxima vez, pode passar no Departamento de Engenharia para buscar?"
23004-1611 = "Nossa, que rápido."
23004-1612 = "Como esperado da mestre do Millennium!"
23004-1613 = "Bem, mesmo que não fosse eu, esse tipo de conserto não é tão difícil assim."
23004-1614 = "Se você mesmo tentar consertar da próxima vez, professor, certamente entenderá."
23004-1615 = "Na verdade, eu adoraria ficar ao seu lado vendo a Utaha consertar as coisas."
23004-1616 = "Não sei se isso é uma boa ideia... Há muitas coisas perigosas na sala de trabalho."
23004-1617 = "Além disso, consertar é apenas repetir tarefas simples. Não acho que seja algo tão interessante."
23004-1618 = "Eu vou ficar quietinho, prometo~"
23004-1619 = "Agindo como uma criança..."
23004-1620 = "De qualquer forma, agora não tem nada para consertar... Fica para uma próxima."
23004-1621 = "Falando nisso, agora pouco no estacionamento, a Rai-chan estava se movendo sozinha de um jeito estranho."
23004-1622 = "O quê?! A Rai-chan!?!?"
23004-1623 = "Parece que a 'Serval' vai lançar novas luvas de trabalho em breve."
23004-1624 = "As 'Manaslu' que comprei antes eram um pouco grossas demais, então o momento é perfeito."
23004-1625 = "Falando nisso, Utaha, você usa luvas o tempo todo, até dentro de casa."
23004-1626 = "Existe algum motivo especial para isso, como mestre?"
23004-1627 = "Não é um motivo importante, é só que meus dedos não são lá muito apresentáveis."
23004-1628 = "Como mexo com óleo e metal desde muito nova, não posso dizer que são bonitos."
23004-1629 = "Por isso, sabe como é."
23004-230040010 = "Professor."
23004-230040020 = "Você tem tempo hoje?"
23004-230040030 = "Está tudo bem. Aconteceu alguma coisa?"
23004-230040040 = "Eu estava pensando em comprar algumas ferramentas novas."
23004-230040050 = "Tem uma loja especializada em ferramentas que eu costumo frequentar."
23004-230040060 = "Se o Sensei quiser, eu poderia te apresentar."
23004-230040070 = "Com certeza!"
