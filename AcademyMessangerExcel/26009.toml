[translation]
26009-260090010 = "えっと、先生……"
26009-260090020 = "メイドは、好きですか？"
26009-260090030 = "……まあ、好きだけど……"
26009-260090040 = "急にどうしたの？"
26009-260090050 = "なるほど……"
26009-260090060 = "実は、その……"
26009-260090070 = "今開発しているゲームに"
26009-260090080 = "メイドのキャラクターを出そうと思っているんです"
26009-260090090 = "メイドは一定の人気がありますから"
26009-260090100 = "その……メイド服の構造を詳しく知りたいのですが、持ってそうな人が知り合いにいなくて……先生なら詳しいかな、と"
26009-260090110 = "C&Cに手伝ってもらうのは？"
26009-260090120 = "その……あ、あんまり他の人に頼むのは"
26009-260090130 = "ちょっと……まだ、怖くて"
26009-260090140 = "他になにか方法がないか探してみます……"
26009-260090150 = "先生"
26009-260090160 = "わたしにもできそうなバイトを知らないでしょうか？"
26009-260090170 = "新しいゲームを開発するのに必要なリソースを確保したくて……"
26009-260090180 = "このままだと、費用が少し足りない気がしていて……"
26009-260090190 = "分かった。どんなアルバイトがいい？"
26009-260090200 = "選べる立場ではないですが……"
26009-260090210 = "できるだけ、人と接する機会が少ないものだと……"
26009-260090220 = "なら行きつけのカフェを紹介してあげる"
26009-260090230 = "お客さんも多くないし、店員さんもみんな優しいから"
26009-260090240 = "カフェの接客、ですか"
26009-260090250 = "少し不安はありますが……"
26009-260090260 = "先生を信じて、行ってみます"
26009-260090270 = "先生、もしかして、わたしに電話しましたか？"
26009-260090280 = "すみません、アルバイト中で確認できませんでした……"
26009-260090290 = "大丈夫だよ。そうだと思ってたから"
26009-260090300 = "ありがとうございます。どんなご用事だったのですか？"
26009-260090310 = "明日の午前中、ユズが働いてるお店の近くを通るんだけど"
26009-260090320 = "もしよかったら行ってもいい？"
26009-260090330 = "はい！？明日ですか！？"
26009-260090340 = "あ、いえ、ダメというわけではないのですが……"
26009-260090350 = "やっぱり"
26009-260090360 = "ちょっと"
26009-260090370 = "緊張しますね……"
26009-260090380 = "最近朝から晩までゲーム開発していたからか"
26009-260090390 = "作業環境が少し散らかってきた気がして……"
26009-260090400 = "今日は他のみんなもいないし、ゆっくり掃除しようと思います"
26009-260090410 = "お疲れ様"
26009-260090420 = "時間があれば手伝いに行くよ"
26009-260090430 = "……え？"
26009-260090440 = "どうしてですか？"
26009-260090450 = "普通、掃除は一人でするものだと思うのですが……"
26009-260090460 = "そうだっけ……？"
26009-260090470 = "人が多い方が早く終わると思って"
26009-260090480 = "お気持ちは嬉しいですが大丈夫です"
26009-260090490 = "お気遣いありがとうございます"
