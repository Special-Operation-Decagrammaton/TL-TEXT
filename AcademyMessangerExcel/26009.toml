[translation]
26009-260090010 = "Hum, Sensei..."
26009-260090020 = "Você gosta de empregadas?"
26009-260090030 = "...Bem, eu gosto, mas..."
26009-260090040 = "Por que a pergunta de repente?"
26009-260090050 = "Entendo..."
26009-260090060 = "Na verdade, é que..."
26009-260090070 = "No jogo que estou desenvolvendo agora,"
26009-260090080 = "estou pensando em incluir uma personagem empregada."
26009-260090090 = "Empregadas têm uma certa popularidade, afinal."
26009-260090100 = "Então... eu queria saber mais sobre a estrutura do uniforme de empregada, mas não conheço ninguém que tenha um... Achei que talvez você soubesse, Sensei."
26009-260090110 = "Por que não pede ajuda para a C&C?"
26009-260090120 = "Isso... ah, eu não queria incomodar outras pessoas..."
26009-260090130 = "Ainda... tenho um pouco de medo."
26009-260090140 = "Vou procurar outra forma de descobrir..."
26009-260090150 = "Sensei."
26009-260090160 = "Você não saberia de algum trabalho de meio período que eu pudesse fazer?"
26009-260090170 = "Preciso garantir os recursos necessários para desenvolver o novo jogo..."
26009-260090180 = "Do jeito que está, sinto que o orçamento não será suficiente..."
26009-260090190 = "Entendi. Que tipo de trabalho você gostaria?"
26009-260090200 = "Não estou em posição de escolher, mas..."
26009-260090210 = "Se possível, algo que envolva pouco contato com pessoas..."
26009-260090220 = "Então vou te indicar o café que costumo frequentar."
26009-260090230 = "Não é muito movimentado e os funcionários são todos gentis."
26009-260090240 = "Atendimento em um café, é?"
26009-260090250 = "Estou um pouco nervosa, mas..."
26009-260090260 = "Vou confiar em você, Sensei, e tentar."
26009-260090270 = "Sensei, por acaso você me ligou?"
26009-260090280 = "Desculpe, eu estava trabalhando e não pude atender..."
26009-260090290 = "Está tudo bem. Eu imaginei que fosse isso."
26009-260090300 = "Obrigada. O que você precisava?"
26009-260090310 = "Vou passar perto do lugar onde você trabalha amanhã de manhã."
26009-260090320 = "Se não se importar, posso dar uma passada lá?"
26009-260090330 = "Sim!? Amanhã!?"
26009-260090340 = "Ah, não, não é que eu não queira, mas..."
26009-260090350 = "É que..."
26009-260090360 = "Eu fico um pouco..."
26009-260090370 = "nervosa..."
26009-260090380 = "Talvez seja porque estive desenvolvendo jogos da manhã até a noite,"
26009-260090390 = "mas sinto que meu ambiente de trabalho está ficando bagunçado..."
26009-260090400 = "Hoje não tem mais ninguém aqui, então vou aproveitar para limpar com calma."
26009-260090410 = "Bom trabalho."
26009-260090420 = "Se eu tiver tempo, vou aí te ajudar."
26009-260090430 = "...Eh?"
26009-260090440 = "Por que faria isso?"
26009-260090450 = "Normalmente, a limpeza é algo que se faz sozinho, não é?"
26009-260090460 = "É mesmo...?"
26009-260090470 = "Pensei que terminaria mais rápido com mais gente."
26009-260090480 = "Agradeço a intenção, mas não precisa."
26009-260090490 = "Obrigada pela preocupação."
