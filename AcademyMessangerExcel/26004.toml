[translation]
26004-1786 = "Olá, Sensei! É a Shimiko!"
26004-1787 = "Eu queria te cumprimentar formalmente, então, se não se importar, poderíamos nos encontrar em breve?"
26004-1788 = "Vou à biblioteca pública para um trabalho temporário em breve,"
26004-1789 = "e parece que é bem perto de onde você está, Sensei!"
26004-1790 = "Gostaria que você viesse quando for conveniente para você!"
26004-1791 = "Entendi, então acho que vou dar uma passada aí."
26004-1792 = "(・∀・*) Sim! Então estarei te esperando!"
26004-1793 = "Muito obrigada pelo dia de hoje, Sensei."
26004-1794 = "Como vou ficar nesta biblioteca por um tempo,"
26004-1795 = "venha me visitar sempre que quiser!"
26004-1796 = "Da próxima vez, serei mais contida, ou melhor, mais elegante..."
26004-1797 = "N-não, esqueça o que eu disse!"
26004-1798 = "De qualquer forma, estarei sempre te esperando! (・∀・*)"
26004-1799 = "Falando nisso, Sensei, você também costuma ficar acordado até tarde lendo livros?"
26004-1800 = "Ah, no caso do Sensei, não são livros..."
26004-1801 = "Seriam documentos de trabalho?"
26004-1802 = "É que eu sou um adulto, sabe..."
26004-1803 = "Shimiko, você é bem noturna, né?"
26004-1804 = "Risos"
26004-1805 = "Pois é."
26004-1806 = "Costumo ficar acordada até bem tarde lendo livros."
26004-1807 = "Talvez nossos horários de atividade sejam parecidos (・∀・*)"
26004-1808 = "Não tem problema nenhum ser de madrugada, então venha me visitar quando estiver livre!"
26004-1809 = "Se for você quem vem, Sensei, eu deixo aberto 24 horas por dia!"
26004-1810 = "Chegou bem ao Schale?"
26004-1811 = "O que aconteceu hoje é segredo, viu?"
26004-1812 = "Sabe, pode acabar virando um boato..."
26004-1813 = "Eu também vou manter segredo! (・∀・*)"
26004-1814 = "Sensei, você está ocupado agora?"
26004-1815 = "Tenho um pequeno favor a pedir."
26004-1816 = "Se não se importar, poderia me acompanhar?"
26004-1817 = "O que houve?"
26004-1818 = "É um convite para um encontro?"
26004-1819 = "Fufu, isso é segredo."
26004-1820 = "Você vai entender assim que chegar."
26004-1821 = "Dando uma dica: é como uma 'caça ao tesouro'! (・∀・*)"
26004-1822 = "Muito obrigada por hoje, Sensei!"
26004-1823 = "Foi uma ótima ideia ter entrado em contato com você, foi muito divertido!"
26004-1824 = "Como posso dizer... sabe,"
26004-1825 = "é sempre divertido estar com você, Sensei, e sinto que coisas boas acontecem toda vez."
26004-1826 = "Conto com você daqui para frente também! Sensei! (・∀・*)"
26004-1827 = "..."
26004-1828 = "...Não aceito devoluções, viu?"
26004-260040010 = "Sensei, você tem lido livros ultimamente? Se precisar de algo, pode me consultar a qualquer momento!"
26004-260040020 = "Ah, que ótima oportunidade."
26004-260040030 = "Obrigado, eu estava justamente procurando por algo."
26004-260040040 = "？"
26004-260040050 = "Eh"
26004-260040060 = "É verdade?"
26004-260040070 = "Sim, é verdade."
26004-260040080 = "Posso ir à biblioteca agora?"
26004-260040090 = "Ah"
26004-260040100 = "Sim"
26004-260040110 = "Sim! Estarei esperando!! :D"
26004-260040120 = "Você e os livros chegaram bem em casa?"
26004-260040130 = "Graças à sua visita, eu me diverti muito"
26004-260040140 = "Ah, por favor, devolva os livros dentro do prazo"
26004-260040150 = "E também"
26004-260040160 = "Se não for incômodo, da próxima vez"
26004-260040170 = "Por favor, venha pegar novos livros. Eu também posso te dar algumas recomendações"
26004-260040180 = "Assim"
26004-260040190 = "Bem"
26004-260040200 = "……"
26004-260040210 = "……Você vai voltar, não vai?"
