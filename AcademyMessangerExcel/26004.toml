[translation]
26004-1786 = "こんにちは、先生！シミコです！"
26004-1787 = "一度きちんとご挨拶がしたくて、よろしければ今度お会いできませんか？"
26004-1788 = "今度、派遣業務で公共図書館に行くのですが、"
26004-1789 = "それが、ちょうど先生がいらっしゃるところの近くみたいなので！"
26004-1790 = "先生のご都合の良いタイミングで、いつでもお越しいただければと！"
26004-1791 = "うん、じゃあお邪魔しようかな"
26004-1792 = "(・∀・*)はい！ではお待ちしてます！"
26004-1793 = "今日はありがとうございました、先生"
26004-1794 = "しばらくはこの図書館にいることになりましたので、"
26004-1795 = "いつでもまた来てくださいね！"
26004-1796 = "次回はもっと大人しくと言いますか、おしとやかな感じで……"
26004-1797 = "い、いえ、今のは無しです！"
26004-1798 = "とにかく、いつでもお待ちしておりますね！ (・∀・*)"
26004-1799 = "そういえば先生も、夜遅くまで起きて本を読んだりしますか？"
26004-1800 = "あっ、先生の場合は本ではなく……"
26004-1801 = "お仕事の書類、でしょうか？"
26004-1802 = "社会人だからね……"
26004-1803 = "シミコ、結構夜型なんだね"
26004-1804 = "笑"
26004-1805 = "そうですね"
26004-1806 = "結構遅くまで起きてて、本を読んでいることが多いです"
26004-1807 = "私たち、活動する時間帯が近いかもしれません(・∀・*)"
26004-1808 = "深夜でも全然大丈夫ですので、いつでも暇な時には遊びに来てくださいね！"
26004-1809 = "先生が来てくださるのであれば、24時間いつでも開けておきますので！"
26004-1810 = "無事にシャーレに着きましたか？"
26004-1811 = "今日のことは秘密ですよ"
26004-1812 = "その、噂になってしまうかもしれませんし……"
26004-1813 = "私も秘密にしておきますね！(・∀・*)"
26004-1814 = "先生、今お忙しいでしょうか？"
26004-1815 = "ちょっとお願いしたいことがありまして"
26004-1816 = "よろしければ、付き合っていただけませんか？"
26004-1817 = "どうしたの？"
26004-1818 = "デートのお誘いかな？"
26004-1819 = "ふふっ、それは秘密です"
26004-1820 = "来ていただけたらすぐに分かりますよ"
26004-1821 = "ヒントを出しますと、「宝探し」みたいなものです！(・∀・*)"
26004-1822 = "今日は本当にありがとうございました、先生！"
26004-1823 = "先生にご連絡して正解でした、楽しかったです！"
26004-1824 = "何て言えばいいんでしょう、その、"
26004-1825 = "先生と一緒だといつも楽しくて、毎回良いことが起きるような気がします"
26004-1826 = "これからもよろしくお願いしますね！先生！(・∀・*)"
26004-1827 = "……"
26004-1828 = "……返却不可、ですからね？"
26004-260040010 = "先生は最近、本読まれてますか？何かあればいつでも相談してください！"
26004-260040020 = "あ、ナイスタイミング"
26004-260040030 = "ありがとう、ちょうど探してるものがあって"
26004-260040040 = "？"
26004-260040050 = "え"
26004-260040060 = "本当ですか？"
26004-260040070 = "うん、本当"
26004-260040080 = "今から図書館に行っても良い？"
26004-260040090 = "あ"
26004-260040100 = "はい"
26004-260040110 = "はいっ！お待ちしてます！！:D"
26004-260040120 = "本も先生も、無事に帰られましたか？"
26004-260040130 = "先生が来てくれたおかげで、とっても楽しかったです"
26004-260040140 = "あ、本は期間内に返却してくださいね"
26004-260040150 = "それから"
26004-260040160 = "よろしければ、またその時"
26004-260040170 = "ぜひ、新しい本を借りていってください。おススメもお教えしますので"
26004-260040180 = "そうすれば"
26004-260040190 = "その"
26004-260040200 = "……"
26004-260040210 = "……また、来てくれますよね？"
