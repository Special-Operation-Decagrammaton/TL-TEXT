[translation]
20047-200470010 = "先生ってちゃんと休み取れてるの？"
20047-200470020 = "も、もちろんだよ？"
20047-200470030 = "オフィスのクーラーって最高だよね！"
20047-200470040 = "……"
20047-200470050 = "だと思った"
20047-200470060 = "どうせ働きづめなんでしょ？"
20047-200470070 = "キキョウはどうなの？"
20047-200470080 = "私の計画に抜かりがあると思う？"
20047-200470090 = "い、一体なにを……！？"
20047-200470100 = "教えない"
20047-200470110 = "気になるなら……来てみれば？"
20047-200470120 = "今、私以外に誰もいないから"
20047-200470130 = "すぐ行きます！"
20047-200470140 = "はい、清書したスケジュール"
20047-200470150 = "送ったから確認しておいて"
20047-200470160 = "楽しみだね！"
20047-200470170 = "当たり前"
20047-200470180 = "あれだけ考えたんだから、計画は完璧"
20047-200470190 = "それじゃ"
20047-200470200 = "あ、そうだ"
20047-200470210 = "他の子たちには内緒だからね"
20047-200470220 = "絶対に"
20047-200470230 = "分かった？"
20047-200470240 = "明日が何の日か覚えてる？"
20047-200470250 = "キキョウの誕生日？"
20047-200470260 = "……"
20047-200470270 = "たしかに"
20047-200470280 = "私の誕生日は夏だけど"
20047-200470290 = "分かりにくいボケをするのはやめて"
20047-200470300 = "まぁ？たくさんの生徒と交流してる先生なら？"
20047-200470310 = "勘違いすることもあるかもしれないけど？"
20047-200470320 = "冗談だよ！"
20047-200470330 = "海に行く日だよね！"
20047-200470340 = "……"
20047-200470350 = "なんだ"
20047-200470360 = "ちゃんと覚えてるんだ"
20047-200470370 = "海に行くの"
20047-200470380 = "楽しみにしてくれてたんだね"
20047-200470390 = "……どういう意味？"
20047-200470400 = "とにかく明日、時間通りに"
20047-200470410 = "遅れるなら……覚悟してね"
20047-200470420 = "その……今日は楽しかった"
20047-200470430 = "水に入るのも、案外悪くないかも"
20047-200470440 = "こんなの初めて"
20047-200470450 = "私も楽しかったよ！"
20047-200470460 = "また行こうね！"
20047-200470470 = "また？"
20047-200470480 = "……二人きりで？"
20047-200470490 = "もちろん！"
20047-200470500 = "…………"
20047-200470510 = "分かった"
20047-200470520 = "じゃあ先生の空いている日を教えて"
20047-200470530 = "私も合わせるから"
20047-200470540 = "それと……"
20047-200470550 = "今日できなかった事もやってみたい"
20047-200470560 = "何をするかは……"
20047-200470570 = "当日のお楽しみ"
20047-200470580 = "念のため"
20047-200470590 = "明日が何の日か分かってるよね？"
20047-200470600 = "キキョウが楽しみにしてる日！"
20047-200470610 = "……"
20047-200470620 = "何言ってるの"
20047-200470630 = "それはあんたもでしょ"
20047-200470640 = "前とは違う海岸だから"
20047-200470650 = "間違えないようにね"
20047-200470660 = "どう？"
20047-200470670 = "疲れは取れた？"
20047-200470680 = "体が軽くなった気がする！"
20047-200470690 = "ちゃんとリフレッシュできたかも！"
20047-200470700 = "私もすっきりした"
20047-200470710 = "……先生"
20047-200470720 = "海でやりたいこと、他にもあるんだけど……"
20047-200470730 = "また誘ってもいい？"
20047-200470740 = "いつでも呼んで！"
20047-200470750 = "ふふ"
20047-200470760 = "じゃあ、今度また連絡する"
20047-200470770 = "えっと"
20047-200470780 = "楽しみにしてるから"
20047-200470790 = "明日なんだけど"
20047-200470800 = "ちょっとやることがあって"
20047-200470810 = "私は先に行くから"
20047-200470820 = "現地集合でお願い"
20047-200470830 = "何か手伝おうか？"
20047-200470840 = "お気遣いどうも"
20047-200470850 = "でも、大丈夫"
20047-200470860 = "先生はゆっくり、時間通り来てくれればそれでいいから"
20047-200470870 = "……遅刻したら許さない"
20047-200470880 = "先生"
20047-200470890 = "ちゃんと帰れた？"
20047-200470900 = "その……今日のことは"
20047-200470910 = "みんなに内緒だから"
20047-200470920 = "二人だけの秘密だね！"
20047-200470930 = "えっ"
20047-200470940 = "まあ、うん"
20047-200470950 = "それよりキキョウ"
20047-200470960 = "ん？"
20047-200470970 = "何？"
20047-200470980 = "ハンモックで遊ぶ猫の動画を送ってあげるね"
20047-200470990 = "なんで？"
20047-200471000 = "別に興味は無いんだけど……"
20047-200471010 = "はあ……まあいいや。またね"
