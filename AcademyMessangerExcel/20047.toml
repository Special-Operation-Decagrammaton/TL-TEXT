[translation]
20047-200470010 = "Professor, você está conseguindo tirar folga de verdade?"
20047-200470020 = "C-claro que sim, por quê?"
20047-200470030 = "O ar-condicionado do escritório é maravilhoso, não é!"
20047-200470040 = "……"
20047-200470050 = "Imaginei."
20047-200470060 = "Você está trabalhando sem parar, não está?"
20047-200470070 = "E você, Kikyou?"
20047-200470080 = "Acha que meus planos têm falhas?"
20047-200470090 = "O-o que você quer dizer com isso...!?"
20047-200470100 = "Não vou contar."
20047-200470110 = "Se está curioso... por que não vem aqui?"
20047-200470120 = "Não tem mais ninguém aqui além de mim agora."
20047-200470130 = "Estou indo agora mesmo!"
20047-200470140 = "Pronto, enviei o cronograma finalizado."
20047-200470150 = "Dê uma olhada quando puder."
20047-200470160 = "Estou ansioso!"
20047-200470170 = "Como esperado."
20047-200470180 = "Pensei muito nisso, então o plano está perfeito."
20047-200470190 = "Até mais."
20047-200470200 = "Ah, é verdade."
20047-200470210 = "Mantenha isso em segredo das outras, viu?"
20047-200470220 = "Absolutamente."
20047-200470230 = "Entendido?"
20047-200470240 = "Você lembra que dia é amanhã?"
20047-200470250 = "O aniversário da Kikyou?"
20047-200470260 = "……"
20047-200470270 = "É verdade."
20047-200470280 = "Meu aniversário é no verão, mas..."
20047-200470290 = "Pare de fazer piadas difíceis de entender."
20047-200470300 = "Bem? Sendo um professor que interage com tantos alunos?"
20047-200470310 = "É possível que você se confunda às vezes, não é?"
20047-200470320 = "É brincadeira!"
20047-200470330 = "É o dia de ir à praia, né!"
20047-200470340 = "……"
20047-200470350 = "Entendo."
20047-200470360 = "Você se lembra mesmo."
20047-200470370 = "Ir à praia."
20047-200470380 = "Você estava esperando por isso, não estava?"
20047-200470390 = "……O que você quer dizer com isso?"
20047-200470400 = "De qualquer forma, amanhã, chegue no horário."
20047-200470410 = "Se você se atrasar... prepare-se."
20047-200470420 = "Sabe... hoje foi divertido."
20047-200470430 = "Entrar na água talvez não seja tão ruim assim."
20047-200470440 = "É a primeira vez que sinto algo assim."
20047-200470450 = "Eu também me diverti muito!"
20047-200470460 = "Vamos de novo!"
20047-200470470 = "De novo?"
20047-200470480 = "……Sozinhos?"
20047-200470490 = "Com certeza!"
20047-200470500 = "…………"
20047-200470510 = "Entendido."
20047-200470520 = "Então, me diga em quais dias você está livre, Sensei."
20047-200470530 = "Eu vou me ajustar ao seu horário."
20047-200470540 = "E também..."
20047-200470550 = "Quero tentar fazer o que não conseguimos hoje."
20047-200470560 = "O que vamos fazer..."
20047-200470570 = "será uma surpresa para o dia."
20047-200470580 = "Só por precaução."
20047-200470590 = "Você sabe que dia é amanhã, né?"
20047-200470600 = "O dia que a Kikyou está esperando!"
20047-200470610 = "..."
20047-200470620 = "Do que você está falando?"
20047-200470630 = "Isso vale para você também, não é?"
20047-200470640 = "É uma praia diferente da anterior."
20047-200470650 = "Não se confunda, viu?"
20047-200470660 = "E então?"
20047-200470670 = "O cansaço passou?"
20047-200470680 = "Sinto que meu corpo ficou mais leve!"
20047-200470690 = "Acho que consegui recarregar as energias de verdade!"
20047-200470700 = "Eu também me sinto renovada."
20047-200470710 = "...Sensei."
20047-200470720 = "Tenho outras coisas que quero fazer na praia..."
20047-200470730 = "Posso te convidar de novo?"
20047-200470740 = "Pode me chamar quando quiser!"
20047-200470750 = "Fufu."
20047-200470760 = "Então, entrarei em contato novamente."
20047-200470770 = "Bem..."
20047-200470780 = "Estarei esperando ansiosamente."
20047-200470790 = "Sobre amanhã..."
20047-200470800 = "Tenho algumas coisas para resolver."
20047-200470810 = "Vou indo na frente."
20047-200470820 = "Por favor, nos encontramos lá."
20047-200470830 = "Quer que eu ajude com algo?"
20047-200470840 = "Agradeço a preocupação."
20047-200470850 = "Mas está tudo bem."
20047-200470860 = "Só preciso que o Sensei venha com calma e no horário combinado."
20047-200470870 = "...Não vou te perdoar se chegar atrasado."
20047-200470880 = "Sensei."
20047-200470890 = "Conseguiu chegar bem em casa?"
20047-200470900 = "Sobre aquilo... o que aconteceu hoje."
20047-200470910 = "É um segredo para todo mundo."
20047-200470920 = "É um segredo só nosso!"
20047-200470930 = "Ah."
20047-200470940 = "Bem, é..."
20047-200470950 = "Mas mudando de assunto, Kikyou."
20047-200470960 = "Hm?"
20047-200470970 = "O que foi?"
20047-200470980 = "Vou te enviar um vídeo de um gato brincando na rede."
20047-200470990 = "Por quê?"
20047-200471000 = "Não que eu tenha interesse, mas..."
20047-200471010 = "Ah... bem, tanto faz. Até mais."
