[translation]
10048-100480010 = "Sensei"
10048-100480020 = "Saori!?"
10048-100480030 = "Você me contatando, Saori...!"
10048-100480040 = "É algo tão surpreendente assim...?"
10048-100480050 = "Eu também não tinha a intenção de entrar em contato, mas..."
10048-100480060 = "Surgiu um pequeno problema."
10048-100480070 = "Problema?"
10048-100480080 = "É um problema que só pode ser resolvido por você, Sensei..."
10048-100480090 = "Sei que é um abuso da minha parte, mas..."
10048-100480100 = "Entendi, estou indo agora mesmo!"
10048-100480110 = "...Entendo."
10048-100480120 = "Então, estarei esperando."
10048-100480130 = "...O tempo está bom hoje, não é?"
10048-100480140 = "!?"
10048-100480150 = "O que foi, Sensei?"
10048-100480160 = "A Saori... falando sobre o tempo..."
10048-100480170 = "Que surpresa!"
10048-100480180 = "...Até eu tento jogar conversa fora de vez em quando."
10048-100480190 = "Outro dia, graças a você, consegui abrir uma conta bancária."
10048-100480200 = "Comecei a aceitar vários serviços, então só pensei em te atualizar sobre como estou."
10048-100480210 = "Se for incômodo, vou evitar fazer isso no futuro."
10048-100480220 = "Claro que não! Quero saber como você está, Saori! O que tem acontecido ultimamente!?"
10048-100480230 = "Que exagero... Ultimamente, tenho feito os serviços que me indicaram no Mercado Clandestino."
10048-100480240 = "Que bom!"
10048-100480250 = "Se é bom ou não, eu não sei..."
10048-100480260 = "Bem, é verdade. Talvez seja algo bom."
10048-100480270 = "Se acontecer mais alguma coisa, eu entro em contato."
10048-100480280 = "Ah...!"
10048-100480290 = "Refleti sobre o que aconteceu da última vez."
10048-100480300 = "Sobre o serviço desta vez..."
10048-100480310 = "Eu já redigi um contrato direitinho."
10048-100480320 = "Que bom!"
10048-100480330 = "Então, qual é o serviço desta vez?"
10048-100480340 = "Foi uma missão mais fácil do que eu esperava."
10048-100480350 = "É só acabar com um conflito no Mercado Clandestino."
10048-100480360 = "!?"
10048-100480370 = "Sensei, se por acaso você souber..."
10048-100480380 = "Conhece algum mecânico habilidoso?"
10048-100480390 = "Meu equipamento quebrou."
10048-100480400 = "Que tipo de equipamento?"
10048-100480410 = "Isso é..."
10048-100480420 = "...É difícil de explicar."
10048-100480430 = "É mais rápido se eu falar pessoalmente."
10048-100480440 = "Estou indo para a Schale."
