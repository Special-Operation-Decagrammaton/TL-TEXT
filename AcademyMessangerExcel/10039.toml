[translation]
10039-100390010 = "Com licença..."
10039-100390020 = "Sensei."
10039-100390030 = "Se não for incomodar..."
10039-100390040 = "O senhor teria um pouco de tempo livre neste fim de semana...?"
10039-100390050 = "Claro, estou livre. Aconteceu alguma coisa?"
10039-100390060 = "É que..."
10039-100390070 = "Uhm..."
10039-100390080 = "Eu gostaria muito de ir a uma loja de artigos para acampamento, mas..."
10039-100390090 = "As outras meninas do Esquadrão RABBIT estão ocupadas, então..."
10039-100390100 = "Ir sozinha é meio complicado... se o senhor não se importar, poderia ir comigo...?"
10039-100390110 = "Entendi! Se for pra carregar as sacolas de compras pesadas, deixa comigo!"
10039-100390120 = "Ah, não, eu não queria pedir para o senhor ser o meu carregador de malas..."
10039-100390130 = "É que, provavelmente, se eu for até a loja completamente sozinha..."
10039-100390140 = "Eu acho que os atendentes nem vão notar que eu entrei e ninguém vai me atender..."
10039-100390150 = "……???"
10039-100390160 = "Com licença, Sensei."
10039-100390170 = "A missão do Esquadrão RABBIT terminou mais cedo hoje, então,"
10039-100390180 = "Acho que vou conseguir chegar aí mais cedo do que o planejado."
10039-100390190 = "Sendo assim..."
10039-100390200 = "Se o senhor precisar que eu faça alguma compra ou traga alguma coisa..."
10039-100390210 = "……?"
10039-100390220 = "Uhm, Sensei?"
10039-100390230 = "O senhor está dormindo...?"
10039-100390240 = "Uhm, Sensei."
10039-100390250 = "Me desculpe..."
10039-100390260 = "Ouvi dizer que, por minha causa, o senhor acabou sendo alvo de boatos e mal-entendidos horríveis na rua hoje..."
10039-100390270 = "No fim das contas, eu sou mesmo uma inútil... me perdoe..."
10039-100390280 = "Não, tá tudo bem. Não precisa se preocupar com isso."
10039-100390290 = "Sim..."
10039-100390300 = "No entanto, como foi a primeira vez na vida que eu recebi tanta atenção das pessoas, eu estou com um pouco de pena de jogar aquela coleira fora..."
10039-100390310 = "Se o senhor concordar, é claro..."
10039-100390320 = "O que acha de eu usar a coleira apenas quando estivermos sozinhos dentro da Schale...?"
10039-100390330 = "Miyu, isso fere as normas de segurança do trabalho! Pode enroscar na maçaneta ou na trituradora de papel e causar um acidente sério, então sinto muito, mas sem chance..."
10039-100390340 = "Sensei..."
10039-100390350 = "Por alguma razão, eu sinto que só tenho cometido falhas ultimamente..."
10039-100390360 = "Eu sou mesmo um fardo para o Esquadrão RABBIT. Não sirvo para nada..."
10039-100390370 = "Isso não é verdade."
10039-100390380 = "Você é uma atiradora de elite esplêndida, Miyu."
10039-100390390 = "Mas..."
10039-100390400 = "Já faz tanto tempo desde que recebemos treinamento formal de verdade na academia... Não sei se ainda posso ser chamada de 'esplêndida'..."
10039-100390410 = "Acho que minhas habilidades táticas devem ter caído muito em comparação ao passado..."
10039-100390420 = "……Sensei, se o senhor tiver um tempo."
10039-100390430 = "Poderia me acompanhar em uma sessão de treinamento prático?"
10039-100390440 = "Muito obrigada por me acompanhar no treinamento no outro dia."
10039-100390450 = "Sinto que a minha precisão melhorou um pouco."
10039-100390460 = "Mas... ultimamente, por algum motivo, eu acabo sempre levando meus pensamentos para o lado negativo..."
10039-100390470 = "Meu humor anda sempre deprimido..."
10039-100390480 = "Que tal tentar mergulhar de cabeça nos seus hobbies pra relaxar e se distrair?"
10039-100390490 = "Meus hobbies..."
10039-100390500 = "Entendo..."
10039-100390510 = "Faz sentido, talvez essa seja mesmo a solução."
10039-100390520 = "Vou tentar fazer isso um pouco."
10039-100390530 = "Sensei, o senhor vai para o centro da cidade amanhã, não vai?"
10039-100390540 = "Se não for incômodo, eu poderia ir junto...?"
10039-100390550 = "Claro! Você tem algo pra resolver por lá?"
10039-100390560 = "Uhm..."
10039-100390570 = "Eu tenho uma missão da SRT para cumprir..."
10039-100390580 = "Operação de combate armado no meio da cidade civil...?!"
10039-100390590 = "N-Não... não é uma missão exagerada desse jeito...!"
10039-100390600 = "Uhm..."
10039-100390610 = "Sabe as pessoas que ocasionalmente doam vegetais para o nosso acampamento?"
10039-100390620 = "Elas nos pediram para fazer o extermínio de alguns animais nocivos nas hortas..."
10039-100390630 = "Ah, se é só dedetização, eu vou junto pra te dar uma força!"
10039-100390640 = "Sério? O senhor faria isso?"
10039-100390650 = "M-Muito obrigada, conto com a sua ajuda...!"