[translation]
10039-100390010 = "Hum..."
10039-100390020 = "Sensei."
10039-100390030 = "Se não for incômodo..."
10039-100390040 = "Você teria um tempinho neste fim de semana...?"
10039-100390050 = "Sim, claro. O que foi?"
10039-100390060 = "É que..."
10039-100390070 = "Bem..."
10039-100390080 = "Eu gostaria de ir a uma loja de artigos para acampamento..."
10039-100390090 = "As outras do RABBIT Squad, bem..."
10039-100390100 = "É que ir sozinha é meio... então, se não for incômodo, você poderia ir comigo...?"
10039-100390110 = "Pode deixar que eu carrego as coisas!"
10039-100390120 = "Ah, não, o que eu queria pedir não era para carregar as coisas..."
10039-100390130 = "É que, provavelmente, se eu for sozinha..."
10039-100390140 = "Acho que ninguém vai me atender..."
10039-100390150 = "...???"
10039-100390160 = "Hum, Sensei."
10039-100390170 = "A missão do RABBIT Squad terminou mais cedo hoje."
10039-100390180 = "Talvez eu consiga chegar aí antes do que eu pensava."
10039-100390190 = "Então, bem..."
10039-100390200 = "Se você precisar comprar alguma coisa ou algo do tipo..."
10039-100390210 = "...?"
10039-100390220 = "Hum, Sensei?"
10039-100390230 = "Você está de folga...?"
10039-100390240 = "Hum, Sensei."
10039-100390250 = "Me desculpe..."
10039-100390260 = "Parece que, por minha causa, o Sensei acabou sendo mal-entendido..."
10039-100390270 = "No fim, eu sou mesmo uma inútil... Me desculpe..."
10039-100390280 = "Não, não, está tudo bem. Não se preocupe."
10039-100390290 = "Sim..."
10039-100390300 = "Mas foi a primeira vez que recebi tanta atenção, então é um pouco difícil jogar aquela coleira fora..."
10039-100390310 = "Se o Sensei não se importar, claro."
10039-100390320 = "Que tal eu usar a coleira só quando estiver No Schale...?"
10039-100390330 = "É perigoso por vários motivos, então, desculpe, mas sem chance..."
10039-100390340 = "Bem, Sensei."
10039-100390350 = "Sabe, ultimamente eu só tenho errado..."
10039-100390360 = "Afinal, eu sou um fardo para o RABBIT Squad, sou uma inútil..."
10039-100390370 = "Não é verdade."
10039-100390380 = "Miyu, você é uma ótima sniper."
10039-100390390 = "Mas..."
10039-100390400 = "Já faz muito tempo desde que recebi treinamento formal... Não sei se posso ser chamada de ótima..."
10039-100390410 = "Minhas habilidades podem ter piorado em comparação com antes..."
10039-100390420 = "...Sensei, se não for incômodo."
10039-100390430 = "Você poderia me acompanhar no treinamento?"
10039-100390440 = "Obrigada pelo treinamento do outro dia."
10039-100390450 = "Sinto que minha precisão melhorou um pouco."
10039-100390460 = "Mas... ultimamente, eu ando pensando em tudo de uma forma negativa..."
10039-100390470 = "E meu humor também anda meio para baixo..."
10039-100390480 = "Que tal tentar aproveitar ao máximo um hobby?"
10039-100390490 = "Hobby..."
10039-100390500 = "Entendo..."
10039-100390510 = "É verdade, pode ser que sim."
10039-100390520 = "Vou experimentar."
10039-100390530 = "Sensei, você vai para a cidade amanhã, não é?"
10039-100390540 = "Se não for incômodo, eu também gostaria de ir junto..."
10039-100390550 = "Claro!"
10039-100390560 = "Você tem algum compromisso?"
10039-100390570 = "É que..."
10039-100390580 = "Tenho uma missão da SRT..."
10039-100390590 = "Combate na cidade...?!"
10039-100390600 = "N-Não... Não é uma missão tão grandiosa assim...!"
10039-100390610 = "Bem..."
10039-100390620 = "As pessoas que às vezes nos dão vegetais"
10039-100390630 = "...me pediram para exterminar algumas pragas..."
10039-100390640 = "Nesse caso, eu também vou."
10039-100390650 = "Pode mesmo?"
10039-100390660 = "E-Então, conto com você...!"
