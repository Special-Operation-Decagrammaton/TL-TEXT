20046-200460060 = "にゃははっ！ちょっと悪ふざけが過ぎましたかねぇ？"
20046-200460070 = "にゃははっ！さすが先生、良い反応です♪"
20046-200460080 = "ご挨拶くらい、形だけでもと思いまして"
20046-200460090 = "そんなことだろうと思ったよ！"
20046-200460100 = "ところで先生"
20046-200460110 = "可愛いかわい～い生徒のピンチ……"
20046-200460120 = "救いたくないですかぁ？"
20046-200460130 = "何かあったの？"
20046-200460140 = "嫌な予感が……"
