20046-200460990 = "それはさすがに嘘でしょ！"
20046-200461000 = "嘘だよね……？"
20046-200461010 = "にゃははっ♪"
20046-200461020 = "やっぱり先生は面白いですねぇ"
20046-200461030 = "先生はおもちゃではありません"
20046-200461040 = "先生で遊ぶんじゃありません"
20046-200461050 = "にゃははっ！"
20046-200461060 = "私をどう評価するか"
20046-200461070 = "それは先生ご自身のことですしぃ？"
20046-200461080 = "私はいつも通り、流れに身を任せるだけです"
20046-200461090 = "またいきなり呼ばれるのかな……。"
20046-200461100 = "厄介ごとの気配がするな……。"
20046-200461110 = "そこも含めて、いつも通りですよ♪"
20046-200461120 = "にゃはっ♪"
