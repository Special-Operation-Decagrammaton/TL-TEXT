[translation]
20046-200460010 = "Prezado,"
20046-200460020 = "Espero que esteja tudo bem com você."
20046-200460030 = "Agradeço imensamente pelo seu apoio constante."
20046-200460040 = "Não sei bem como reagir a isso."
20046-200460050 = "A Niya está com amnésia...!?"
20046-200460060 = "Nyahaha! Acho que exagerei um pouco na brincadeira, não é?"
20046-200460070 = "Nyahaha! Como esperado do Sensei, que ótima reação♪"
20046-200460080 = "Pensei em fazer uma saudação, nem que fosse apenas por formalidade."
20046-200460090 = "Eu imaginei que fosse isso!"
20046-200460100 = "A propósito, Sensei."
20046-200460110 = "Uma aluna fofa, tão fofinha, em apuros..."
20046-200460120 = "Você não gostaria de salvá-la?"
20046-200460130 = "Aconteceu alguma coisa?"
20046-200460140 = "Tenho um mau pressentimento..."
20046-200460150 = "Nya-ha~"
20046-200460160 = "Na verdade, estou em uma situação um tanto... complicada."
20046-200460170 = "Estou sendo perseguida por alguém, sabe?"
20046-200460180 = "Nya-ha~"
20046-200460190 = "Graças a você, hoje não levei bronca~"
20046-200460200 = "Como esperado de um adulto em quem posso confiar♪"
20046-200460210 = "Se o Sensei estiver por perto, tudo se resolve, não é?"
20046-200460220 = "Tente não exagerar na vadiagem."
20046-200460230 = "Não deixe as alunas mais novas tão preocupadas."
20046-200460240 = "Nyaha♪"
20046-200460250 = "Niya?"
20046-200460260 = "Nyahaha~"
20046-200460270 = "Ei, Sensei?"
20046-200460280 = "É muito difícil dizer isso, mas..."
20046-200460290 = "Na verdade... estou em uma situação muito, muito complicada de novo~"
20046-200460300 = "Você poderia vir até a sala do clube?"
20046-200460310 = "Não vou cair no mesmo truque duas vezes."
20046-200460320 = "Usar o mesmo truque... que ousadia..."
20046-200460330 = "Ah, entendo... é mesmo..."
20046-200460340 = "O Sensei também não confia mais em mim, não é..."
20046-200460350 = "Mas, se ninguém me ajudar, no fim das contas, é algo que eu mesma causei..."
20046-200460360 = "Peço desculpas, adeus."
20046-200460370 = "Espere, era verdade!?"
20046-200460380 = "Já estou indo!!"
20046-200460390 = "Mesmo assim,"
20046-200460400 = "eu faço o que precisa ser feito, sabe?"
20046-200460410 = "Mentira."
20046-200460420 = "Sério mesmo?"
20046-200460430 = "A Kaho..."
20046-200460440 = "Eu sabia!"
20046-200460450 = "Independentemente do processo, se o trabalho for concluído, não dá no mesmo?"
20046-200460460 = "Eu tenho muita sorte, não tenho? Nyahahaha!"
20046-200460470 = "Socorro~"
20046-200460480 = "Algo terrível aconteceu de novo..."
20046-200460490 = "É difícil explicar por mensagem,"
20046-200460500 = "então, se você puder vir até a sala do clube..."
20046-200460510 = "Eu também aprendo, sabe"
20046-200460520 = "Como dizem, não há duas sem três"
20046-200460530 = "Não vou cair no mesmo truque três vezes"
20046-200460540 = "Hehe?"
20046-200460550 = "Ué, sério mesmo...?"
20046-200460560 = "Nossa..."
20046-200460570 = "O Sensei realmente sabe como agir quando precisa, não é?"
20046-200460580 = "Você refletiu bem sobre o que fez?"
20046-200460590 = "Sim~"
20046-200460600 = "Refleti bastante"
20046-200460610 = "...Ainda precisa de um sermão?"
20046-200460620 = "Hya!"
20046-200460630 = "...Não, quer dizer, Hyakkiyako está sempre esperando pela visita do Sensei♪"
20046-200460640 = "Ei..."
20046-200460650 = "Você vai vir mesmo nos visitar~?"
20046-200460660 = "Sim"
20046-200460670 = "Isso mesmo"
20046-200460680 = "Ouvi dizer que você está muito ocupado ultimamente~"
20046-200460690 = "Não seria melhor focar mais no seu trabalho~?"
20046-200460700 = "Isso também é trabalho do Sensei"
20046-200460710 = "Ter que escolher entre um sermão ou um carinho"
20046-200460720 = "O yin e o yang do Sensei são bem extremos, hein"
20046-200460730 = "Por que você não foi honesta comigo?"
20046-200460740 = "Eu poderia ter ajudado"
20046-200460750 = "Ora, ora, do que você está falando?"
20046-200460760 = "Já disse várias vezes, eu não fiz nada~?"
20046-200460770 = "Você incentivou o Clube de Extras a fazer o pedido oficial de registro"
20046-200460780 = "Apresentou o Clube de Origami à Associação de Comerciantes"
20046-200460790 = "E designou a sala do Clube de Extras no centro da cidade, não foi?"
20046-200460800 = "Nhe-p@「；："
20046-200460810 = "Nyaha~ que surpresa"
20046-200460820 = "O Sensei daria um ótimo romancista, hein"
20046-200460830 = "A hora do crepúsculo. A lua nova paira sobre o topo da torre, mas o povo, tolo, não teme o oni"
20046-200460840 = "Isso é um sinal de mau agouro, de que o destino está em declínio"
20046-200460850 = "Hehe?"
20046-200460860 = "Isso é uma história antiga. Transmitida pela história, ficção sobre a verdade"
20046-200460870 = "No entanto, quem ousaria invocar o nome do oni?"
20046-200460880 = "O que isso significa...?"
20046-200460890 = "É simples, Sensei"
20046-200460900 = "Por que o oni é temido? Por que nós carregamos o nome da 'Procissão dos Onis'?"
20046-200460910 = "Pensei em fazer Kivotos saber disso mais uma vez"
20046-200460920 = "A noite está apenas começando"
20046-200460930 = "Aquele plano de conquista de Kivotos que eu disse que era mentira"
20046-200460940 = "Na verdade, é verdade~"
20046-200460950 = "?"
20046-200460960 = "Tipo uma 'reviravolta' onde dizer que era mentira foi a própria mentira?"
20046-200460970 = "Mesmo agora, com uma palavra minha, as forças de Hyakkiyako podem entrar em ação~"
20046-200460980 = "Ou talvez não~?"
20046-200460990 = "Isso com certeza é mentira!"
20046-200461000 = "É mentira, né...?"
20046-200461010 = "Nyahaha♪"
20046-200461020 = "O Sensei é realmente divertido, não é?"
20046-200461030 = "O Sensei não é um brinquedo."
20046-200461040 = "Não brinque com o Sensei."
20046-200461050 = "Nyahaha!"
20046-200461060 = "Como você me avalia..."
20046-200461070 = "Isso é algo que diz respeito ao próprio Sensei, não é?"
20046-200461080 = "Eu apenas continuo, como sempre, deixando-me levar pela correnteza."
20046-200461090 = "Será que serei chamada de repente de novo...?"
20046-200461100 = "Sinto cheiro de problemas..."
20046-200461110 = "Incluindo isso, é como sempre♪"
20046-200461120 = "Nyaha♪"
