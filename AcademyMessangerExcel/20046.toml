20046-200460770 = "エキストラ部としての正式な部活申請を促して"
20046-200460780 = "商人会に折り紙部を紹介して"
20046-200460790 = "エキストラ部の部室を街中に割り当てたよね？"
20046-200460800 = "にｐ＠「；："
20046-200460810 = "にゃは～これは驚いた"
20046-200460820 = "先生は小説家にもなれそうですねぇ"
20046-200460830 = "逢魔が時。朔月は天守の端に懸かりしも、民草、愚かなりて鬼を恐れず"
20046-200460840 = "これすなわち、天命衰えし不吉の兆しなり"
