20046-200460170 = "誰かに追われているんですよねぇ"
20046-200460180 = "にゃは～"
20046-200460190 = "おかげさまで、今日はお説教なしでした～"
20046-200460200 = "さすが頼れる大人♪"
20046-200460210 = "先生がいてくだされば、全部丸く収まりますねぇ"
20046-200460220 = "サボるのもほどほどにね"
20046-200460230 = "あんまり後輩たちを心配させないであげて"
20046-200460240 = "にゃはっ♪"
20046-200460250 = "ニヤ？"
20046-200460260 = "にゃははは～"
20046-200460270 = "あの～先生～？"
20046-200460280 = "大変申し上げにくいのですが……"
20046-200460290 = "実は……また、すご〜く困ったことになっていまして〜"
20046-200460300 = "部室まで来ていただけませんか？"
20046-200460310 = "二度も同じ手には引っかかりません"
20046-200460320 = "同じ手口とは大胆な……"
20046-200460330 = "あらら……そうですか……"
20046-200460340 = "先生も、もう私を信じてくれないんですね……"
20046-200460350 = "でも、誰にも助けてもらえないのも、結局は自分の蒔いた種……"
20046-200460360 = "失礼しました、さようなら"
20046-200460370 = "待って、本当だったの！？"
20046-200460380 = "すぐ行くよ！！"
20046-200460390 = "これでも"
20046-200460400 = "ちゃんとやることはやってるんですよ？"
20046-200460410 = "嘘だぁ"
20046-200460420 = "本当にぃ？"
20046-200460430 = "カホがね"
20046-200460440 = "やっぱり！"
20046-200460450 = "過程がどうあれ、仕事が片付けば同じじゃないですかぁ"
20046-200460460 = "私ってほんと、運がいいですねぇ～にゃははは～！"
20046-200460470 = "お助けを～"
20046-200460480 = "またもや大変なことになってしまいまして……"
20046-200460490 = "文章で説明するのが難しいので"
20046-200460500 = "部室までいらしていただければと"
20046-200460510 = "私だって学習するんだから"
20046-200460520 = "二度あることは三度あるって言うし"
20046-200460530 = "同じ手に三回も引っかからないよ"
20046-200460540 = "ニヤ？"
20046-200460550 = "え、本当に……？"
20046-200460560 = "いやぁ～"
20046-200460570 = "やっぱり先生、やるときはやる人なんですね"
20046-200460580 = "ちゃんと反省しましたか？"
20046-200460590 = "はい～"
20046-200460600 = "それはもうたっぷりと"
20046-200460610 = "……まだお説教が必要ですか？"
20046-200460620 = "ひゃっ"
20046-200460630 = "……じゃなくて、百鬼夜行はいつでも先生のご訪問をお待ちしております♪"
20046-200460640 = "あの～"
