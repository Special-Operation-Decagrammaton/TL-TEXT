[translation]
20006-200060010 = "先生、今週末は時間ある？"
20006-200060020 = "今度は何の実験？"
20006-200060030 = "変な薬はそろそろ勘弁……"
20006-200060040 = "違う違う、そういうのじゃないのだ！"
20006-200060050 = "この前先生が言ってた中華料理屋で新メニューが出るって聞いて、教えようと思っただけなのに！"
20006-200060060 = "全部の用事が実験だと思われるのは心外なのだ！"
20006-200060070 = "ごめんごめん、じゃあお詫びってわけでもないけど"
20006-200060080 = "奢るよ、一緒に行こう"
20006-200060090 = "本当か！もう今さら撤回は無しだぞ！？"
20006-200060100 = "じゃあ今週末、お店の前で待ち合わせなのだ！"
20006-200060110 = "天才は孤独なのだ……"
20006-200060120 = "いくら説明しても、理解されない……"
20006-200060130 = "何かあったの？"
20006-200060140 = "あ、そうだ、先生"
20006-200060150 = "い、いや、何でもないのだ！"
20006-200060160 = "ぼく様だけでも、十分解決できる問題なのだ！"
20006-200060170 = "この山海経随一の天才であるぼく様に、不可能なんて無いからな！うーはっはっはっ！"
20006-200060180 = "……？"
20006-200060190 = "先生、この間のケーキの件はありがとうなのだ"
20006-200060200 = "お返しに、今度はぼく様が何か玄武商会で美味しいものを奢ってあげる！"
20006-200060210 = "先生は何か食べたいものとかあるか？"
20006-200060220 = "チャーハンの気分！"
20006-200060230 = "焼きそばの気分！"
20006-200060240 = "あ、そういえば今週は、玄武商会のお店が次々に新しいラーメンを出す「ラーメン週間」だったのだ！"
20006-200060250 = "先生！ちょうどぼく様おすすめのお店があるから、そこに行こう！"
20006-200060260 = "私の意見を聞いた意味は……？"
20006-200060270 = "参ったのだ……"
20006-200060280 = "どうしたの？"
20006-200060290 = "この前開発した特製の激辛ソースが、思った以上に大人気で……"
20006-200060300 = "そっちに時間を取られて、研究に手が回らないのだ"
20006-200060310 = "全く……"
20006-200060320 = "錬丹術研究会はあくまで「不老不死の霊薬を作ること」を目的とした場所であって、ソースを作る場所じゃないのだ！"
20006-200060330 = "もうネズ助の手も借りたいぐらい……"
20006-200060340 = "良いことを思いついた！"
20006-200060350 = "やめておこう"
20006-200060360 = "ぼく様まだ何も言ってないのに！？"
20006-200060370 = "なんか嫌な予感がするし……"
20006-200060380 = "ぐっ、仕方ない……おとなしくソースを作るのだ……"
20006-200060390 = "ふっふっふ！"
20006-200060400 = "良いことだ"
20006-200060410 = "ようやくぼく様の才能に"
20006-200060420 = "気づいてくれる人が現れたのだ！"
20006-200060430 = "どうしたの？"
20006-200060440 = "何か依頼があったとか？"
20006-200060450 = "そうなのだ！"
20006-200060460 = "せっかくだから、先生にも来てほしくて！"
20006-200060470 = "一緒にぼく様の発明品を見てみるのだ！"
20006-200060480 = "うう……"
20006-200060490 = "よく考えれば、ガスマスクを着ければ良かったのだ"
20006-200060500 = "ただの香水だと思って油断してしまうなんて……"
20006-200060510 = "いや、ぼく様の発明がすごすぎたのだ……？"
20006-200060520 = "みんな喜んでくれてたね"
20006-200060530 = "サヤのおかげで、イベントは大成功だよ"
20006-200060540 = "ふっふっふ"
20006-200060550 = "それは当たり前なのだ！"
20006-200060560 = "だって、ぼく様なのだから！"
20006-200060570 = "そうだ"
20006-200060580 = "先生"
20006-200060590 = "今日は助かったのだ、ありがとう！"
20006-200060600 = "また次の発明も楽しみにしていてほしいのだ！"
