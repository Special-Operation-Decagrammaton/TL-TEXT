[translation]
20006-200060010 = "Professor, você tem tempo neste fim de semana?"
20006-200060020 = "Qual é o experimento da vez?"
20006-200060030 = "Já chega de remédios estranhos..."
20006-200060040 = "Não, não, não é nada disso!"
20006-200060050 = "Ouvi dizer que aquele restaurante chinês que você mencionou vai lançar um novo menu, e eu só queria te avisar!"
20006-200060060 = "É um ultraje acharem que tudo o que eu faço é um experimento!"
20006-200060070 = "Desculpe, desculpe. Bem, não é exatamente um pedido de desculpas, mas..."
20006-200060080 = "Eu pago, vamos juntos."
20006-200060090 = "Sério?! Não adianta voltar atrás agora, hein!?"
20006-200060100 = "Então, nos encontramos na frente do restaurante neste fim de semana!"
20006-200060110 = "A genialidade é solitária..."
20006-200060120 = "Não importa o quanto eu explique, ninguém entende..."
20006-200060130 = "Aconteceu alguma coisa?"
20006-200060140 = "Ah, é verdade, Professor."
20006-200060150 = "N-não, não é nada!"
20006-200060160 = "Eu mesma consigo resolver esse problema sozinha!"
20006-200060170 = "Para mim, a maior gênia de Shanhaijing, não existe o impossível! Uwahahaha!"
20006-200060180 = "……?"
20006-200060190 = "Professor, obrigado por aquele assunto do bolo outro dia."
20006-200060200 = "Como agradecimento, desta vez eu vou te pagar algo delicioso na Associação Genbu!"
20006-200060210 = "Tem algo que você queira comer, Professor?"
20006-200060220 = "Estou com vontade de arroz frito!"
20006-200060230 = "Estou com vontade de yakisoba!"
20006-200060240 = "Ah, falando nisso, esta semana é a 'Semana do Lámen', onde as lojas da Associação Genbu estão lançando novos tipos de lámen!"
20006-200060250 = "Professor! Eu conheço um lugar que recomendo, vamos lá!"
20006-200060260 = "Qual foi o sentido de perguntar a minha opinião...?"
20006-200060270 = "Estou em apuros..."
20006-200060280 = "O que houve?"
20006-200060290 = "Aquele molho super apimentado especial que desenvolvi outro dia ficou mais popular do que eu esperava..."
20006-200060300 = "Isso está tomando todo o meu tempo e não consigo focar nas pesquisas."
20006-200060310 = "Francamente..."
20006-200060320 = "O Clube de Pesquisa de Alquimia existe para 'criar o elixir da imortalidade', não para fazer molhos!"
20006-200060330 = "Estou precisando de toda ajuda possível..."
20006-200060340 = "Tive uma ideia brilhante!"
20006-200060350 = "Melhor não."
20006-200060360 = "Mas eu nem disse nada ainda!?"
20006-200060370 = "É que eu tenho um mau pressentimento..."
20006-200060380 = "Grr, não tem jeito... Vou fazer o molho, então..."
20006-200060390 = "Fufufu!"
20006-200060400 = "É uma coisa boa."
20006-200060410 = "Finalmente alguém apareceu"
20006-200060420 = "para reconhecer o meu talento!"
20006-200060430 = "O que houve?"
20006-200060440 = "Recebeu algum pedido?"
20006-200060450 = "Exatamente!"
20006-200060460 = "Já que é uma oportunidade, queria que você viesse também!"
20006-200060470 = "Vamos ver a minha invenção juntos!"
20006-200060480 = "Ugh..."
20006-200060490 = "Pensando bem, eu deveria ter usado uma máscara de gás."
20006-200060500 = "Como pude baixar a guarda só porque achei que era um perfume comum..."
20006-200060510 = "Não, será que a minha invenção foi incrível demais...?"
20006-200060520 = "Todos ficaram felizes, não ficaram?"
20006-200060530 = "Graças à Saya, o evento foi um grande sucesso."
20006-200060540 = "Fufufu."
20006-200060550 = "Isso é óbvio!"
20006-200060560 = "Afinal, eu sou eu!"
20006-200060570 = "Ah, é verdade."
20006-200060580 = "Sensei."
20006-200060590 = "Obrigada pela ajuda hoje!"
20006-200060600 = "Fique no aguardo pela minha próxima invenção!"
