10142-101420440 = "It's for your sake, Nagusa..."
10142-101420450 = "..."
10142-101420460 = "As I thought, you really are sly, Sensei."
10142-101420470 = "Why you said that!?"
10142-101420480 = "I happened to hear this on my way home, but..."
10142-101420490 = "The rumor about a Yuki-onna appearing at the sea..."
10142-101420500 = "They said it was all a lie."
10142-101420510 = "Oh, mission accomplished then!"
10142-101420520 = "Yeah. A huge success."
10142-101420530 = "I can go to the sea with peace of mind now."
10142-101420540 = "You'll go with me again, right?"
10142-101420550 = "..."
10142-101420560 = "Yeah."
10142-101420570 = "Well then, see you later."
10142-101420580 = "It looks like the weather will be good for the rest of the week."
10142-101420590 = "So, if it's alright with you, Sensei..."
10142-101420600 = "Want to meet up this weekend?"
10142-101420610 = "Of course!"
10142-101420620 = "I was thinking the exact same thing!"
10142-101420630 = "Well then, let's go to the sea again."
10142-101420640 = "There might be more fun things waiting for us."