10142-101420450 = "……"
10142-101420460 = "やっぱり先生は、したたかだよね"
10142-101420470 = "どうして！？"
10142-101420480 = "帰り道に偶然、聞いたんだけど"
10142-101420490 = "海に雪女が出るっていう噂は……"
10142-101420500 = "全部嘘だったって"
10142-101420510 = "おお、作戦成功だね！"
10142-101420520 = "うん。大成功"
10142-101420530 = "もう安心して海に行ける"
10142-101420540 = "また一緒に行ってくれるよね？"
10142-101420550 = "……"
10142-101420560 = "うん"
10142-101420570 = "じゃあ、またね"
10142-101420580 = "今週はずっといい天気が続くみたいだね"
