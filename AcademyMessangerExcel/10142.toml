[translation]
10142-101420010 = "You contacted me, didn't you?"
10142-101420020 = "Was it urgent?"
10142-101420030 = "It's been so hot lately, I was wondering if you were okay."
10142-101420040 = "Ah... yeah, thank you."
10142-101420050 = "For checking up on me."
10142-101420060 = "I'm fine. I'm properly cooling off with water."
10142-101420070 = "At the sea?"
10142-101420080 = "At the pool?"
10142-101420090 = "Actually..."
10142-101420100 = "I'm doing a bit of shooting practice in the yard."
10142-101420110 = "With water guns, though."
10142-101420120 = "So you mean... you're playing with water guns?"
10142-101420130 = "If you want to put it that way... I think so?"
10142-101420140 = "As I thought..."
10142-101420150 = "It seems I was worrying too much."
10142-101420160 = "Everyone in Hyakkaryouran told me the same thing."
10142-101420170 = "That nobody would suffer from seeing me in a swimsuit."
10142-101420180 = "See! Just like I said."
10142-101420190 = "Yeah."
10142-101420200 = "So next time..."
10142-101420210 = "I'll try going to the sea with everyone."
10142-101420220 = "I'm sure... It will be fun."
10142-101420230 = "Sounds good. Don't forget your sunscreen!"
10142-101420240 = "Yeah. Thank you."
10142-101420250 = "Ever since I went to the sea with everyone..."
10142-101420260 = "I found myself at the sea before I even realize it."
10142-101420270 = "The sea is fun, isn't it?"
10142-101420280 = "Yeah. It's fun."
10142-101420290 = "Swimming is a good training,"
10142-101420300 = "And it's also good for clearing your mind."
10142-101420310 = "Plus, it has a unique atmosphere."
10142-101420320 = "If it's like this, I wish I had gone more often."
10142-101420330 = "You can still go there a lot from now on."
10142-101420340 = "...Yeah. That's true."
10142-101420350 = "From now on, I think I'll go to the sea more often."
10142-101420360 = "It seems the rumor about the Yuki-onna is still going around."
10142-101420370 = "Hmm..."
10142-101420380 = "If I try to explain it to everyone one by one, it might just cause more misunderstandings."
10142-101420390 = "What should I do?"
10142-101420400 = "Let's go to the sea together again!"
