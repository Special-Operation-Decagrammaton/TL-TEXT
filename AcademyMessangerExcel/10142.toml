[translation]
10142-101420010 = "Вы ведь искали меня, верно?"
10142-101420020 = "Что-то срочное?"
10142-101420030 = "В последнее время такая жара, вот я и решила узнать, как вы там."
10142-101420040 = "А... да, спасибо."
10142-101420050 = "За то, что беспокоишься обо мне."
10142-101420060 = "Я в порядке. Спасаюсь от жары с помощью воды."
10142-101420070 = "На море?"
10142-101420080 = "В бассейне?"
10142-101420090 = "На самом деле..."
10142-101420100 = "Я тут немного тренируюсь в стрельбе во дворе."
10142-101420110 = "Правда, из водных пистолетов."
10142-101420120 = "То есть... ты просто играешь с водными пистолетиками?"
10142-101420130 = "Если вам так удобнее это называть... то, наверное, да?"
10142-101420140 = "Так я и думал..."
10142-101420150 = "Похоже, я слишком сильно переживал."
10142-101420160 = "В Hyakkaryouran мне все говорили то же самое."
10142-101420170 = "Что никто не пострадает, если увидит меня в купальнике."
10142-101420180 = "Вот видишь! Я же говорил."
10142-101420190 = "Угу."
10142-101420200 = "Так что в следующий раз..."
10142-101420210 = "Я попробую выбраться на море вместе со всеми."
10142-101420220 = "Уверена... это будет весело."
10142-101420230 = "Звучит здорово. И не забудь солнцезащитный крем!"
10142-101420240 = "Да. Спасибо."
10142-101420250 = "С тех пор как я впервые съездила на море со всеми..."
10142-101420260 = "Я и сама не замечаю, как ноги то и дело уносят меня на пляж."
10142-101420270 = "На море ведь здорово, правда?"
10142-101420280 = "Да. Здесь хорошо."
10142-101420290 = "Плавание — отличная тренировка,"
10142-101420300 = "да и мысли в порядок приводит."
10142-101420310 = "К тому же здесь какая-то своя, особенная атмосфера."
10142-101420320 = "Если бы я знала, то приходила бы сюда гораздо чаще."
10142-101420330 = "Ты и сейчас можешь приходить сюда сколько захочешь."
10142-101420340 = "...Да. Вы правы."
10142-101420350 = "Пожалуй, отныне я действительно буду бывать на море чаще."
10142-101420360 = "Похоже, слухи о Юки-онне всё ещё ходят."
10142-101420370 = "Хм..."
10142-101420380 = "Если я начну объяснять всё каждому встречному, это может породить ещё больше недопониманий."
10142-101420390 = "Что же мне делать?"
10142-101420400 = "Давай снова сходим на море вместе!"
10142-101420410 = "Если я буду постоянно появляться там вместе с вами, Сенсей..."
10142-101420420 = "То хотите сказать, слухи сразу утихнут?"
10142-101420430 = "Да... я поняла."
10142-101420440 = "Это всё ради твоего же блага, Нагуса..."
10142-101420450 = "..."
10142-101420460 = "Как я и думала, вы очень хитрый, Сенсей."
10142-101420470 = "С чего ты это взяла?!"
10142-101420480 = "Я тут краем уха услышала по дороге домой..."
10142-101420490 = "Те слухи про Юки-онну, которая появляется на пляже..."
10142-101420500 = "Все говорят, что это была обычная выдумка."
10142-101420510 = "О, значит, миссия выполнена!"
10142-101420520 = "Да. Полный успех."
10142-101420530 = "Теперь я могу ходить на море со спокойной душой."
10142-101420540 = "Вы ведь сходите со мной ещё раз, верно?"
10142-101420550 = "..."
10142-101420560 = "Да."
10142-101420570 = "Ну тогда до встречи."
10142-101420580 = "Похоже, хорошая погода продержится до конца недели."
10142-101420590 = "Так что, Сенсей, если вы не против..."
10142-101420600 = "Не хотите встретиться на этих выходных?"
10142-101420610 = "Конечно!"
10142-101420620 = "Я как раз думал о том же!"
10142-101420630 = "Ну тогда давайте снова сходим на море."
10142-101420640 = "Кто знает, может, нас там ждёт ещё что-нибудь интересное."