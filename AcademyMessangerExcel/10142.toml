[translation]
10142-101420010 = "連絡くれてたんだね"
10142-101420020 = "急用だった？"
10142-101420030 = "最近暑いから大丈夫かなと思って"
10142-101420040 = "あ……うん、ありがとう"
10142-101420050 = "気にかけてくれて"
10142-101420060 = "大丈夫。ちゃんと水で涼んでるから"
10142-101420070 = "海で？"
10142-101420080 = "プールで？"
10142-101420090 = "実は……"
10142-101420100 = "庭でちょっとした射撃訓練をしてるんだ"
10142-101420110 = "水鉄砲で、だけど"
10142-101420120 = "つまり……水鉄砲遊びってこと？"
10142-101420130 = "そう言われると……そうかも？"
10142-101420140 = "やっぱり……"
10142-101420150 = "気にし過ぎだったみたい"
10142-101420160 = "百花繚乱のみんなにも同じことを言われた"
10142-101420170 = "私の水着姿で苦しむ人はいないって"
10142-101420180 = "ほら！言ったとおりでしょ"
10142-101420190 = "うん"
10142-101420200 = "だから次は……"
10142-101420210 = "みんなと海に行ってみる"
10142-101420220 = "きっと……楽しいと思う"
10142-101420230 = "いいね。日焼け止めを忘れずに！"
10142-101420240 = "うん。ありがとう"
10142-101420250 = "みんなと海に行ってからというもの……"
10142-101420260 = "気づいたら海に行っちゃうんだ"
10142-101420270 = "海は楽しいよね"
10142-101420280 = "うん。楽しい"
10142-101420290 = "水泳は鍛錬になるし"
10142-101420300 = "雑念を払うのにも良い"
10142-101420310 = "それに、独特な雰囲気もあって"
10142-101420320 = "これなら、今までもっと行っておけば良かった"
10142-101420330 = "今からでもたくさん行けばいいよ"
10142-101420340 = "……うん。そうだね"
10142-101420350 = "これからは、どんどん海に行こうと思う"
10142-101420360 = "雪女の噂、まだ流れてるみたい"
10142-101420370 = "うーん……"
10142-101420380 = "いちいち説明してたら逆に誤解されるかもしれないし"
10142-101420390 = "どうしたらいいのかな？"
10142-101420400 = "また一緒に海に行こう！"
