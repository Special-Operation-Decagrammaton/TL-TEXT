[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10142-101420010 = "Você me mandou mensagem." 
10142-101420020 = "É urgente?" 
10142-101420030 = "Tem feito muito calor ultimamente,\nfiquei preocupado com você." 
10142-101420040 = "Ah... sim, obrigada." 
10142-101420050 = "Por se preocupar comigo." 
10142-101420060 = "Estou bem. Estou me refrescando com água." 
10142-101420070 = "No mar?" 
10142-101420080 = "Na piscina?" 
10142-101420090 = "Na verdade..." 
10142-101420100 = "Estou fazendo um treinamento\nde tiro no jardim." 
10142-101420110 = "Com armas de água, claro." 
10142-101420120 = "Ou seja...\nbrincando de arminha de água?" 
10142-101420130 = "Dito assim... acho que sim?" 
10142-101420140 = "Como eu pensei..." 
10142-101420150 = "Eu estava me preocupando à toa." 
10142-101420160 = "As meninas da Hyakkaryouran\ntambém me disseram a mesma coisa." 
10142-101420170 = "Elas disseram que ninguém ia\nsofrer por me ver de maiô." 
10142-101420180 = "Viu só! É o que eu te falei." 
10142-101420190 = "Sim." 
10142-101420200 = "Então da próxima vez..." 
10142-101420210 = "Vou tentar ir à praia\ncom todo mundo." 
10142-101420220 = "Eu tenho certeza... que vai ser divertido." 
10142-101420230 = "Boa! Não esqueça do protetor solar!" 
10142-101420240 = "Anotado. Obrigada." 
10142-101420250 = "Desde que fui à praia\ncom todo mundo..." 
10142-101420260 = "Sempre que dou por mim,\nacabo indo pra praia de novo." 
10142-101420270 = "O mar é bem divertido, né." 
10142-101420280 = "Sim. É muito divertido." 
10142-101420290 = "Nadar serve como treinamento." 
10142-101420300 = "E também ajuda a limpar a mente." 
10142-101420310 = "Além disso, tem uma atmosfera toda especial." 
10142-101420320 = "Sabendo disso, eu devia ter\nvindo mais vezes antes." 
10142-101420330 = "Você ainda pode ir várias vezes daqui pra frente." 
10142-101420340 = "......Sim. Tem razão." 
10142-101420350 = "A partir de agora, eu pretendo ir\nà praia com mais frequência." 
10142-101420360 = "Parece que o boato da mulher das\nneves ainda está rolando." 
10142-101420370 = "Uhn..." 
10142-101420380 = "Se eu for explicar para cada pessoa,\nposso acabar gerando mais mal-entendidos." 
10142-101420390 = "O que eu devo fazer?" 
10142-101420400 = "Vamos à praia juntos de novo!" 
10142-101420410 = "Se continuarem me vendo\njunto com o Sensei..." 
10142-101420420 = "Você diz que os boatos\nlogo vão desaparecer?" 
10142-101420430 = "Sim... entendi." 
10142-101420440 = "É tudo pelo seu bem, Nagusa..." 
10142-101420450 = "......" 
10142-101420460 = "Como eu pensei, você é\nbem astuto, Sensei." 
10142-101420470 = "Como assim?!" 
10142-101420480 = "Eu ouvi por acaso\nno caminho de volta, mas..." 
10142-101420490 = "Aquele boato sobre a mulher das\nneves aparecer na praia..." 
10142-101420500 = "Disseram que era tudo mentira." 
10142-101420510 = "Oh, operação concluída com sucesso!" 
10142-101420520 = "Sim. Foi um grande sucesso." 
10142-101420530 = "Agora eu posso ir à praia com tranquilidade." 
10142-101420540 = "Você vai comigo de novo, né?" 
10142-101420550 = "......" 
10142-101420560 = "Vou sim." 
10142-101420570 = "Então, até mais." 
10142-101420580 = "Parece que o tempo vai continuar\nbom a semana toda." 
10142-101420590 = "Então, se o Sensei quiser..." 
10142-101420600 = "Topa nos encontrarmos no final de semana?" 
10142-101420610 = "Claro!" 
10142-101420620 = "Eu estava pensando a mesma coisa!" 
10142-101420630 = "Então, vamos à praia de novo." 
10142-101420640 = "Talvez a gente encontre algo divertido lá de novo." 