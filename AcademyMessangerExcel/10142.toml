[translation]
10142-101420010 = "Você me mandou uma mensagem, não é?"
10142-101420020 = "Era algo urgente?"
10142-101420030 = "Tem feito muito calor ultimamente, então fiquei pensando se você estava bem."
10142-101420040 = "Ah... sim, obrigada."
10142-101420050 = "Por se preocupar comigo."
10142-101420060 = "Estou bem. Estou me refrescando com água."
10142-101420070 = "No mar?"
10142-101420080 = "Na piscina?"
10142-101420090 = "Na verdade..."
10142-101420100 = "Estou fazendo um pequeno treinamento de tiro no quintal."
10142-101420110 = "Mas é com uma arminha de água."
10142-101420120 = "Quer dizer... você está brincando com arminha de água?"
10142-101420130 = "Dito assim... acho que sim?"
10142-101420140 = "Como eu imaginava..."
10142-101420150 = "Parece que eu estava me preocupando à toa."
10142-101420160 = "O pessoal da Hyakkaryouran me disse a mesma coisa."
10142-101420170 = "Disseram que ninguém sofreria por me ver de roupa de banho."
10142-101420180 = "Viu! Eu não te disse?"
10142-101420190 = "Sim."
10142-101420200 = "Então, da próxima vez..."
10142-101420210 = "Vou tentar ir à praia com todo mundo."
10142-101420220 = "Tenho certeza... de que será divertido."
10142-101420230 = "Que bom. Não se esqueça do protetor solar!"
10142-101420240 = "Uhum. Obrigada."
10142-101420250 = "Desde que fui à praia com o pessoal..."
10142-101420260 = "Quando dou por mim, já estou indo pra praia."
10142-101420270 = "A praia é divertida, não é?"
10142-101420280 = "Sim. É divertida."
10142-101420290 = "Nadar é um bom treinamento, e..."
10142-101420300 = "Também é ótimo para afastar os pensamentos mundanos."
10142-101420310 = "Além disso, tem uma atmosfera única."
10142-101420320 = "Se eu soubesse, teria ido muito mais antes."
10142-101420330 = "Ainda dá tempo de ir bastante."
10142-101420340 = "...Sim. É verdade."
10142-101420350 = "A partir de agora, acho que irei à praia com mais frequência."
10142-101420360 = "Parece que o boato sobre a Yuki-onna ainda está circulando."
10142-101420370 = "Hmm..."
10142-101420380 = "Se eu tentar explicar pra todo mundo, posso acabar causando mais mal-entendidos."
10142-101420390 = "O que eu devo fazer?"
10142-101420400 = "Vamos à praia juntos de novo!"
10142-101420410 = "Se continuarem me vendo junto com o Sensei,"
10142-101420420 = "Os boatos vão sumir logo, é isso?"
10142-101420430 = "Uhum... Entendi."
10142-101420440 = "É tudo pelo bem da Nagusa..."
10142-101420450 = "..."
10142-101420460 = "O Sensei é realmente muito astuto."
10142-101420470 = "Por que!?"
10142-101420480 = "Acabei ouvindo por acaso no caminho de volta,"
10142-101420490 = "O boato de que uma Yuki-onna estava aparecendo na praia..."
10142-101420500 = "Era tudo mentira."
10142-101420510 = "Ooh, operação concluída com sucesso!"
10142-101420520 = "Sim. Um grande sucesso."
10142-101420530 = "Agora posso ir à praia tranquilamente."
10142-101420540 = "Você vai comigo de novo, não vai?"
10142-101420550 = "..."
10142-101420560 = "Sim."
10142-101420570 = "Então, até mais."
10142-101420580 = "Parece que o tempo vai continuar bom a semana toda."
10142-101420590 = "Então, se estiver tudo bem para o Sensei..."
10142-101420600 = "Quer se encontrar no fim de semana?"
10142-101420610 = "Claro!"
10142-101420620 = "Eu estava pensando exatamente a mesma coisa!"
10142-101420630 = "Então, vamos à praia de novo."
10142-101420640 = "Pode ser que a gente se divirta ainda mais."