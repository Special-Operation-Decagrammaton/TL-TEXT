[translation]
10007-577 = "先生、ごめん……今ちょっと時間大丈夫？"
10007-578 = "大丈夫だよ"
10007-579 = "どうしたの？"
10007-580 = "その……あたしのこと、迎えに来てくれない？"
10007-581 = "身元保証人が必要みたいなんだけど、生徒会には連絡しづらくって……"
10007-582 = "場所はその、えっと……交番"
10007-583 = "交番！？"
10007-584 = "今日は来てくれてありがと、先生"
10007-585 = "生徒会に連絡してたら、危うく二重で小言の嵐になるところだったよ"
10007-586 = "これからは気を付けてね"
10007-587 = "うん。公共の場では、グラフィティはやらないようにする……"
10007-588 = "今日約束した通り、今度は大きなキャンバスで一緒に絵を描こうね！"
10007-589 = "約束だよ！"
10007-590 = "うん、約束"
10007-591 = "今日もお疲れ様、先生。気を付けて帰ってね～！"
10007-592 = "マキもお疲れ様"
10007-593 = "先生は今日の放課後、何か用事とかある？"
10007-594 = "あたしはブラックマー"
10007-595 = "や、南区の方に用事があるから、先に帰るね～"
10007-596 = "……ブラックマーケット？"
10007-597 = "もったいない……大勢の人にBOOMの魅力を伝えるチャンスだったのに"
10007-598 = "人に迷惑がかかるやり方はダメだって……"
10007-599 = "うぅ、先生がダメって言うなら仕方ない……"
10007-600 = "そういえば先生って、BOOMやったことある？"
10007-601 = "ううん、ないよ"
10007-602 = "今度ダウンロードしてあげるから、一緒に「スピードラン」やろう！"
10007-603 = "3分以内にクリアできるようになるまで、私が横で手伝ってあげるから！"
10007-604 = "その言い方、もしかして3分の壁を切るの相当難しいのでは……？"
10007-605 = "先生は今回の小テストの話、他の誰かから聞いた？"
10007-606 = "信じられないぐらい難しかったんだけど！"
10007-607 = "普段からちゃんと予習・復習をしないとダメだよ"
10007-608 = "もしかしてテスト範囲外の問題が出たとか？"
10007-609 = "うっ、正論……"
10007-610 = "ううん、そういうわけじゃないんだけど……"
10007-611 = "とにかく！このままだと補習授業を受けることになっちゃうよ～！"
10007-612 = "先生、助けて～！"
10007-613 = "勉強教えてくれてありがと、先生"
10007-614 = "先生の期待に応えられるように、次のテストでは満点取ってくるね！"
10007-615 = "うん、楽しみにしてる"
10007-616 = "あ、もう一つ質問なんだけど、"
10007-617 = "ノートの最後にあるクーリングオフの説明って、全科目のテストに出るの？"
10007-618 = "マキちゃん、ちょっと落ち着こうか"
10007-619 = "先生！この前のテスト、満点だったよ！"
10007-620 = "ふふっ、先生がこの前勉強見てくれたおかげ！"
10007-621 = "おめでとう、マキも勉強頑張ったね"
10007-622 = "偉いでしょ？もっと褒めて～！"
10007-623 = "じゃあ頑張ったマキのために、市内でアイスクリームを買ってあげようかな"
10007-624 = "本当！？約束だよ、先生！"
10007-625 = "もうスクショ撮ったから、後で知らんぷりとかダメだからね！"
10007-626 = "ゴミの片づけ手伝ってくれてありがと、先生"
10007-627 = "それから、見逃してくれたのも。ありがとね"
10007-628 = "今回のことは、善意だったんでしょ？"
10007-629 = "うん！あっ……でも、お巡りさんに見つかって怒られたらどうしよう……"
10007-630 = "その時は先生が「違うんです」って言ってね！絶対だよ！"
10007-631 = "先生、グッドニュース！"
10007-632 = "このメッセージを見たら、この前グラフィティを描いた壁まで来てくれる？"
10007-633 = "どうしたの？"
10007-634 = "来れば分かるから！"
10007-635 = "あ、ちゃんと汚れてもいい服でね！"
10007-636 = "……？"
10007-637 = "ふふっ、先生と一緒にグラフィティができて楽しかった！"
10007-638 = "私も楽しかったよ"
10007-639 = "私の絵が下手すぎて、壁の持ち主が気に入らなかったらどうしよう……"
10007-640 = "あははっ、まだ気にしてたの？"
10007-641 = "心配しないでも大丈夫、グラフィティはその人の個性を表現する芸術だから"
10007-642 = "先生が描いた絵にも、先生の個性が十分に表れてたよ"
10007-643 = "いつかまた、こういう機会があったらいいな"
