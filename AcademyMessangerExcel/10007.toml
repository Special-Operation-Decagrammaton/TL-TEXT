[translation]
10007-577 = "Sensei, desculpe... Você tem um tempinho agora?"
10007-578 = "Tenho sim."
10007-579 = "O que aconteceu?"
10007-580 = "É que... você pode vir me buscar?"
10007-581 = "Parece que eu preciso de um responsável, mas é meio complicado contatar o Conselho Estudantil..."
10007-582 = "O lugar é, uhm... um posto policial."
10007-583 = "Posto policial!?"
10007-584 = "Obrigada por vir hoje, Sensei."
10007-585 = "Se eu tivesse contatado o Conselho Estudantil, por pouco não teria recebido uma tempestade de sermões em dobro."
10007-586 = "Tome mais cuidado de agora em diante, ok?"
10007-587 = "Sim. Vou tentar não fazer grafite em lugares públicos..."
10007-588 = "Como prometemos hoje, da próxima vez vamos pintar juntos em uma tela grande!"
10007-589 = "É uma promessa!"
10007-590 = "Sim, prometido."
10007-591 = "Bom trabalho hoje, Sensei. Volte para casa com cuidado~!"
10007-592 = "Bom trabalho também, Maki."
10007-593 = "Sensei, você tem algum compromisso para depois da aula hoje?"
10007-594 = "Eu vou para o Black Mar..."
10007-595 = "Quer dizer, tenho umas coisas para fazer no Distrito Sul, então vou na frente~"
10007-596 = "...Mercado Negro?"
10007-597 = "Que desperdício... Era uma ótima chance de mostrar os encantos de BOOM para um monte de gente."
10007-598 = "Não pode fazer as coisas de um jeito que incomode os outros..."
10007-599 = "Ugh, se o Sensei diz que não, não tem o que fazer..."
10007-600 = "Falando nisso, Sensei, você já jogou BOOM?"
10007-601 = "Não, nunca joguei."
10007-602 = "Eu baixo pra você da próxima vez, aí a gente joga "Speedrun" juntos!"
10007-603 = "Vou ficar do seu lado te ajudando até você conseguir zerar em menos de 3 minutos!"
10007-604 = "Pelo seu jeito de falar, será que quebrar a barreira dos 3 minutos é tão difícil assim...?"
10007-605 = "Sensei, você ouviu de mais alguém sobre o teste de hoje?"
10007-606 = "Estava inacreditavelmente difícil!"
10007-607 = "Você tem que estudar e revisar a matéria direitinho no dia a dia."
10007-608 = "Será que caiu alguma questão de fora da matéria?"
10007-609 = "Ugh, você tem razão..."
10007-610 = "Não, não é bem isso, mas..."
10007-611 = "De qualquer forma! Se continuar assim, vou ter que fazer aulas de recuperação~!"
10007-612 = "Sensei, me ajuda~!"
10007-613 = "Obrigada por me ajudar a estudar, Sensei."
10007-614 = "Para corresponder às suas expectativas, vou tirar nota máxima na próxima prova!"
10007-615 = "Sim, fico na expectativa."
10007-616 = "Ah, tenho mais uma pergunta,"
10007-617 = "Aquela explicação sobre o direito de arrependimento no final do caderno, vai cair na prova de todas as matérias?"
10007-618 = "Maki, vamos nos acalmar um pouco, ok?"
10007-619 = "Sensei! Eu tirei nota máxima na prova do outro dia!"
10007-620 = "Hehe, foi graças à sua ajuda com os estudos!"
10007-621 = "Parabéns, você também se esforçou bastante nos estudos, Maki."
10007-622 = "Eu sou demais, né? Me elogie mais~!"
10007-623 = "Então, para recompensar o seu esforço, que tal eu te comprar um sorvete na cidade?"
10007-624 = "Sério!? É uma promessa, Sensei!"
10007-625 = "Já tirei print, então nem pense em fingir que não sabe de nada depois, hein!"
10007-626 = "Obrigada por me ajudar a recolher o lixo, Sensei."
10007-627 = "E também, por ter me deixado passar. Obrigada, viu?"
10007-628 = "O que você fez foi por uma boa causa, né?"
10007-629 = "Sim! Ah... Mas, e se um policial me encontrar e brigar comigo...?"
10007-630 = "Nesse caso, Sensei, diga que não é nada disso, tá bom? É uma promessa!"
10007-631 = "Sensei, boas notícias!"
10007-632 = "Quando vir esta mensagem, pode vir até o muro onde fizemos o grafite outro dia?"
10007-633 = "O que aconteceu?"
10007-634 = "Você vai entender quando chegar!"
10007-635 = "Ah, e venha com uma roupa que possa sujar!"
10007-636 = "…...?"
10007-637 = "Hehe, foi divertido grafitar com você, Sensei!"
10007-638 = "Eu também me diverti."
10007-639 = "E se o meu desenho for tão ruim que o dono do muro não gostar...?"
10007-640 = "Ahaha, você ainda estava se preocupando com isso?"
10007-641 = "Não se preocupe, está tudo bem. O grafite é uma arte que expressa a individualidade da pessoa."
10007-642 = "O desenho que você fez também expressou muito bem a sua individualidade, Sensei."
10007-643 = "Espero que a gente tenha outra oportunidade como esta algum dia."
