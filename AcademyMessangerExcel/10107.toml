[translation]
10107-101070010 = "★Semanário Pandemonium★☞Assine agora e receba um presente comemorativo garantido!"
10107-101070020 = "Entre em contato agora!"
10107-101070030 = "Chiaki?"
10107-101070040 = "Chiaki... certo?"
10107-101070050 = "Oh?"
10107-101070060 = "Obrigada pela resposta, Sensei!!"
10107-101070070 = "Gostaria de assinar o "Semanário Pandemonium"?"
10107-101070080 = "Ah, não é isso."
10107-101070090 = "Hehe! Não vou forçar você!"
10107-101070100 = "Primeiro, veja o produto e depois decida!"
10107-101070110 = "Ah, falando nisso..."
10107-101070120 = "Eu tinha esquecido!"
10107-101070130 = "Vou enviar o presente comemorativo da assinatura do "Semanário Pandemonium" mais tarde!"
10107-101070140 = "O que eu vou ganhar?"
10107-101070150 = "Hehehe"
10107-101070160 = "Será uma surpresa quando chegar~!"
10107-101070170 = "Olá~ Sensei!"
10107-101070180 = "Você está na Schale hoje?"
10107-101070190 = "Sim... estou trabalhando..."
10107-101070200 = "Oh? Parece que você não está muito animado?"
10107-101070210 = "Nesse caso,"
10107-101070220 = "Para espantar a melancolia da tarde de uma vez!"
10107-101070230 = "Vou entregar o presente comemorativo da assinatura do "Semanário Pandemonium"!"
10107-101070240 = "Estou indo agora, então espere um pouco!"
10107-101070250 = "Ugh..."
10107-101070260 = "Não aguento mais... meu estômago está embrulhado..."
10107-101070270 = "Quanto você comeu...?"
10107-101070280 = "Todos os doces que eu estava comendo agora há pouco..."
10107-101070290 = "Mas todos me ajudaram!"
10107-101070300 = "E consegui tirar muitas fotos!"
10107-101070310 = "Que bom, então."
10107-101070320 = "Mas, por um tempo, doces..."
10107-101070330 = "Ugh..."
10107-101070340 = "-Aviso-"
10107-101070350 = "O "Semanário Pandemonium" não será publicado esta semana!"
10107-101070360 = "Pedimos desculpas pelo inconveniente, mas aguarde a próxima semana!"
10107-101070370 = "Sensei,"
10107-101070380 = "Se você gostou de algum clube que visitamos hoje,"
10107-101070390 = "Que tal se tornar um membro convidado conosco?"
10107-101070400 = "Boa ideia. Vou pensar nisso."
10107-101070410 = "Certo!"
10107-101070420 = "Entre em contato a qualquer hora~!"
10107-101070430 = "A próxima edição do "Semanário Pandemonium" será uma edição especial!"
10107-101070440 = "Não está animado, Sensei?"
10107-101070450 = "Edição especial?"
10107-101070460 = "Sim!"
10107-101070470 = "Será um conteúdo que mostrará todas as informações que os leitores querem saber,"
10107-101070480 = "sem deixar nada de fora!"
10107-101070490 = "Estou curioso..."
10107-101070500 = "Qual será o conteúdo?"
10107-101070510 = "Hehe"
10107-101070520 = "Isso é... ainda é segredo!"
10107-101070530 = "Muito obrigada por hoje!"
10107-101070540 = "Graças a você, acho que conseguirei escrever um ótimo artigo!"
10107-101070550 = "Fico feliz se pude ajudar."
10107-101070560 = "Assim que a edição especial estiver impressa, entregarei ao Sensei primeiro!"
10107-101070570 = "Aguarde ansiosamente!"
