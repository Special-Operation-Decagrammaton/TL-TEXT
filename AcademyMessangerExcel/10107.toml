[translation]
10107-101070010 = "★週刊万魔殿★☞定期購読したら記念プレゼントがもれなくもらえる！"
10107-101070020 = "今すぐご連絡ください！"
10107-101070030 = "チアキ？"
10107-101070040 = "チアキ……だよね？"
10107-101070050 = "お？"
10107-101070060 = "ご返信ありがとうございます、先生！！"
10107-101070070 = "「週刊万魔殿」の定期購読をご希望ですか？"
10107-101070080 = "あ、そうじゃなくて"
10107-101070090 = "ふふ！無理強いはしませんよ！"
10107-101070100 = "まずは、現物を見てからご判断ください！"
10107-101070110 = "あ、そういえば"
10107-101070120 = "忘れてました！"
10107-101070130 = "「週刊万魔殿」の定期購読記念プレゼント、あとで贈っちゃいますね！"
10107-101070140 = "何がもらえるの？"
10107-101070150 = "ふふふ"
10107-101070160 = "それは届いてからのお楽しみ～！"
10107-101070170 = "こんにちは～先生！"
10107-101070180 = "今日ってシャーレにいますか？"
10107-101070190 = "はい……勤務中です……"
10107-101070200 = "あら？なんだか元気ないみたいですね？"
10107-101070210 = "それなら"
10107-101070220 = "午後の憂鬱を一気に吹き飛ばすためにも！"
10107-101070230 = "「週刊万魔殿」の定期購読記念プレゼントをお届けしましょう！"
10107-101070240 = "今すぐ向かいますので、少々お待ちくださいね！"
10107-101070250 = "うぅ"
10107-101070260 = "もう無理……胃がムカムカします……"
10107-101070270 = "どれくらい食べたの……？"
10107-101070280 = "さっき食べてたスイーツを、全部……"
10107-101070290 = "でもみんな助けてくれました！"
10107-101070300 = "写真もいっぱい撮れましたし！"
10107-101070310 = "それなら良かった"
10107-101070320 = "でも、しばらく甘いものは……"
10107-101070330 = "うぅ……"
10107-101070340 = "-お知らせ-"
10107-101070350 = "今週の「週刊万魔殿」は休刊です！"
10107-101070360 = "ご迷惑をおかけしますが、来週をお楽しみに！"
10107-101070370 = "先生"
10107-101070380 = "今日のとこで気に入った部活がありましたら"
10107-101070390 = "一緒に客員メンバーになってみるのはどうでしょう！"
10107-101070400 = "いいね。考えとく"
10107-101070410 = "はい！"
10107-101070420 = "いつでもご連絡くださいね～！"
10107-101070430 = "次号の「週刊万魔殿」は特集号です！"
10107-101070440 = "ワクワクしませんか、先生？"
10107-101070450 = "特集号？"
10107-101070460 = "はい！"
10107-101070470 = "読者の皆さんが知りたがっている情報を"
10107-101070480 = "余すことなくお見せする内容になります！"
10107-101070490 = "気になるね……"
10107-101070500 = "どんな内容なの？"
10107-101070510 = "ふふ"
10107-101070520 = "それは～まだ秘密です！"
10107-101070530 = "今日は本当にありがとうございました！"
10107-101070540 = "おかげで素敵な記事が書けそうです！"
10107-101070550 = "お役に立てたのなら嬉しいよ"
10107-101070560 = "今回の特集号が刷り上がったら、真っ先に先生にお届けしますね！"
10107-101070570 = "お楽しみに～！"
