[translation]
20019-200190010 = "おはようございます、ご主人様"
20019-200190020 = "メイドとは、奉仕を仕事とする者"
20019-200190030 = "ご主人様に仕える者は、メイド服を着る……"
20019-200190040 = "うん……そう、かな？"
20019-200190050 = "そう思っていたのですが、"
20019-200190060 = "最近新しい気付きを得たのです"
20019-200190070 = "どうぞ、楽しみにお待ちくださいね"
20019-200190080 = "う……うん？"
20019-200190090 = "楽しみにしておきます？"
20019-200190100 = "今度お時間がありましたら、ぜひ私の部屋に寄っていただけませんか？"
20019-200190110 = "お待ちしておりますね"
20019-200190120 = "私のご主人様"
20019-200190130 = "先日は大変失礼いたしました"
20019-200190140 = "心が逸るあまり、ご無礼を働いてしまいました"
20019-200190150 = "申し訳ございません"
20019-200190160 = "いや……私こそごめんね"
20019-200190170 = "むしろ感謝の気持ちでいっぱいです！"
20019-200190180 = "またご奉仕させていただけませんか？"
20019-200190190 = "お互い気持ちを落ち着かせて……二人だけの時間で"
20019-200190200 = "た、他意はないよね？"
20019-200190210 = "ぜひお願いします！"
20019-200190220 = "ええと……それは、どういう意味でしょうか？"
20019-200190230 = "安心しました……お待ちしておりますね"
20019-200190240 = "ゆっくり眠れましたか、ご主人様？"
20019-200190250 = "おかげで熟睡できたよ"
20019-200190260 = "良かったです"
20019-200190270 = "実は、あの茶葉には……"
20019-200190280 = "睡眠の質が良くなるリラックス効果があるそうで……"
20019-200190290 = "少しでもお疲れが取れたのなら、淹れた甲斐がありました"
20019-200190300 = "そうだったんだね。ありがとう"
20019-200190310 = "うれしいお言葉です"
20019-200190320 = "ご主人様の幸せが、私の幸せですから"
20019-200190330 = "ところで、アカネはシャーレまで何か用事があったの？"
20019-200190340 = "それとも掃除のため？"
20019-200190350 = "どうでしょう？"
20019-200190360 = "眠っているご主人様の顔が見られて"
20019-200190370 = "幸運でした、とだけ申し上げます"
20019-200190380 = "ぴょんぴょん"
20019-200190390 = "お仕事の調子はどうでしょうか、ご主人様？"
20019-200190400 = "私は本日非番を頂きました"
20019-200190410 = "こうして時間が空くのは久しぶりです"
20019-200190420 = "アカネは普段のお休みは何をしているの？"
20019-200190430 = "そうですね"
20019-200190440 = "やりたいことはたくさんありますが……"
20019-200190450 = "望むことは、一つだけですね"
20019-200190460 = "偶然……本当に偶然でいいんです"
20019-200190470 = "ご主人様にお会いできたら嬉しいなと……"
20019-200190480 = "そんなことを考えておりました"
20019-200190490 = "こんばんは。本日も帰りが遅いのでしょうか？"
20019-200190500 = "ご主人様の健康が心配です……"
20019-200190510 = "わぁい仕事……私、仕事大好き……"
20019-200190520 = "この世に書類というものを生み出したのは誰なんだ……"
20019-200190530 = "ご主人様！？お気を確かに！！"
