[translation]
20019-200190010 = "Bom dia, meu mestre."
20019-200190020 = "Uma empregada é alguém cujo trabalho é servir."
20019-200190030 = "Quem serve ao seu mestre deve vestir um uniforme de empregada..."
20019-200190040 = "Sim... acho que sim?"
20019-200190050 = "Eu pensava assim, mas..."
20019-200190060 = "Recentemente, tive uma nova percepção."
20019-200190070 = "Por favor, aguarde ansiosamente."
20019-200190080 = "Hã... sim?"
20019-200190090 = "Devo ficar ansioso?"
20019-200190100 = "Quando tiver um tempo livre, poderia passar no meu quarto?"
20019-200190110 = "Estarei esperando por você."
20019-200190120 = "Meu mestre."
20019-200190130 = "Peço perdão pelo que aconteceu outro dia."
20019-200190140 = "Fui imprudente por estar ansiosa demais."
20019-200190150 = "Sinto muito."
20019-200190160 = "Não... eu que peço desculpas."
20019-200190170 = "Na verdade, estou cheio de gratidão!"
20019-200190180 = "Poderia me deixar servir você novamente?"
20019-200190190 = "Para acalmarmos nossos corações... em um momento só nosso."
20019-200190200 = "V-você não tem segundas intenções, tem?"
20019-200190210 = "Com certeza, eu adoraria!"
20019-200190220 = "Bem... o que isso significa?"
20019-200190230 = "Fiquei aliviada... estarei esperando."
20019-200190240 = "Conseguiu dormir bem, mestre?"
20019-200190250 = "Graças a você, dormi profundamente."
20019-200190260 = "Fico feliz."
20019-200190270 = "Na verdade, aquelas folhas de chá..."
20019-200190280 = "Dizem que têm um efeito relaxante que melhora a qualidade do sono..."
20019-200190290 = "Se isso ajudou a aliviar um pouco o seu cansaço, valeu a pena ter preparado."
20019-200190300 = "Então foi isso. Obrigado."
20019-200190310 = "Fico feliz em ouvir isso."
20019-200190320 = "Porque a felicidade do meu mestre é a minha felicidade."
20019-200190330 = "A propósito, Akane, você tinha algum assunto no Schale?"
20019-200190340 = "Ou foi para limpar?"
20019-200190350 = "Quem sabe?"
20019-200190360 = "Poder ver o rosto do meu mestre enquanto dormia..."
20019-200190370 = "Direi apenas que tive sorte."
20019-200190380 = "Pulo, pulo."
20019-200190390 = "Como vai o trabalho, mestre?"
20019-200190400 = "Hoje recebi uma folga."
20019-200190410 = "Faz tempo que não tenho um tempo livre assim."
20019-200190420 = "O que você costuma fazer nas suas folgas, Akane?"
20019-200190430 = "Bem..."
20019-200190440 = "Há muitas coisas que quero fazer, mas..."
20019-200190450 = "Só desejo uma coisa."
20019-200190460 = "Por acaso... apenas por um acaso do destino."
20019-200190470 = "Eu ficaria feliz se pudesse encontrar o mestre..."
20019-200190480 = "Era nisso que eu estava pensando."
20019-200190490 = "Boa noite. Você vai chegar tarde hoje também?"
20019-200190500 = "Estou preocupada com a sua saúde, mestre..."
20019-200190510 = "Eba, trabalho... Eu amo trabalhar..."
20019-200190520 = "Quem foi que inventou essa coisa de papelada neste mundo..."
20019-200190530 = "Mestre!? Mantenha a calma!!"
