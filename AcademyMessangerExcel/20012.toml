[translation]
20012-200120010 = "Do Departamento de Medicina de Emergência para todos os alunos de Gehenna: Um conflito generalizado entre alunos delinquentes ocorreu na Rua 122-6 do Distrito de Gehenna. Os feridos devem se dirigir ao Departamento de Medicina de Emergência. Recomendamos que aqueles que planejam visitar a área alterem a data e o horário. 14:16"
20012-200120020 = "……？"
20012-200120030 = "Sena?"
20012-200120040 = "Ah"
20012-200120050 = "Desculpe. É uma mensagem para todos, não se preocupe com isso."
20012-200120060 = "Sensei. Aqui é Himuro Sena, do Departamento de Medicina de Emergência."
20012-200120070 = "Ouvi dizer que você virá a Gehenna mais tarde."
20012-200120080 = "Sim, mas não estou me sentindo muito bem..."
20012-200120090 = "Talvez eu precise passar aí antes de resolver meus outros assuntos..."
20012-200120100 = "Entendido."
20012-200120110 = "Estarei aguardando."
20012-200120120 = "Sensei, aqui é Himuro Sena, do Departamento de Medicina de Emergência. Estou deixando apenas uma mensagem antes de ir."
20012-200120130 = "Como você suou bastante, quando acordar, certifique-se de beber bastante água e tomar o remédio que deixei sobre a mesa. Toalhas limpas estão logo ao lado. Voltarei em breve para recolher tudo e lavar. Com licença."
20012-200120140 = "Sensei, aqui é Himuro Sena, do Departamento de Medicina de Emergência."
20012-200120150 = "Planejo visitar o Schale hoje para recolher as toalhas e outros itens de outro dia. Por favor, me avise se tiver algum horário livre. Agradeço desde já."
20012-200120160 = "Obrigado por aquele dia."
20012-200120170 = "Já que estamos nisso, gostaria de te agradecer. Podemos nos encontrar fora daqui?"
20012-200120180 = "Ah"
20012-200120190 = "Sim."
20012-200120200 = "Entendido."
20012-200120210 = "Então, faremos assim."
20012-200120220 = "Do Departamento de Medicina de Emergência para todos os alunos de Gehenna: Um acidente com a explosão de um extintor de incêndio ocorreu na Rua 32-1 do Distrito de Gehenna devido a uma brincadeira. O mentor do incidente e alguns dos alunos feridos foram transportados para a enfermaria próxima. 18:47"
20012-200120230 = "Do Departamento de Medicina de Emergência para todos os alunos de Gehenna: A situação ainda não foi controlada, por isso nossa equipe permanece de prontidão nas proximidades. Recomendamos que aqueles que planejam visitar a área alterem a data e o horário. 18:47"
20012-200120240 = "Deve ser difícil."
20012-200120250 = "Bom trabalho hoje também."
20012-200120260 = "Ah"
20012-200120270 = "Está tudo bem, não é um caso tão grave assim."
20012-200120280 = "Até mais."
