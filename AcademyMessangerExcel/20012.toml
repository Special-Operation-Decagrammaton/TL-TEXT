[translation]
20012-200120010 = "救急医学部よりゲヘナ全校生徒へ：ゲヘナ自治区122-6番街にて、不良生徒たちの全面抗争が発生。負傷者は救急医学部の方まで。当該地区へ訪問予定の方は、日時の変更をお勧めします　PM02:16"
20012-200120020 = "……？"
20012-200120030 = "セナ？"
20012-200120040 = "あ"
20012-200120050 = "すみません。全体宛のメッセージなので、お気になさらず"
20012-200120060 = "先生。救急医学部の氷室セナです"
20012-200120070 = "この後ゲヘナにいらっしゃるとお伺いしました"
20012-200120080 = "うん、だけどちょっと身体の調子がいまいちで……"
20012-200120090 = "もしかしたら本来の用事より先に、そっちにお世話になるかも……"
20012-200120100 = "分かりました"
20012-200120110 = "ではお待ちしております"
20012-200120120 = "先生、救急医学部の氷室セナです。メッセージだけ残して帰ります"
20012-200120130 = "汗をたくさんかかれてますので、起きられたら十分に水分を摂取して、机の上の薬をお飲みになってください。タオルの替えはすぐ横に置いてあります。すぐに諸々の回収と洗濯に参りますので。それでは失礼します"
20012-200120140 = "先生、救急医学部の氷室セナです"
20012-200120150 = "先日のタオルなどを回収するために、本日シャーレにお伺いする予定です。空いている時間帯などありましたらお知らせください。よろしくお願いします"
20012-200120160 = "この間はありがとね"
20012-200120170 = "せっかくだしお礼がしたいんだけど、外で会える？"
20012-200120180 = "あ"
20012-200120190 = "はい"
20012-200120200 = "分かりました"
20012-200120210 = "では、その形で"
20012-200120220 = "救急医学部よりゲヘナ全校生徒へ：ゲヘナ自治区32-1番街にて、悪戯により消火器の暴発事故が発生。事件の首謀者と被害者の生徒たちの一部は、近くの保健室に輸送されました　PM06:47"
20012-200120230 = "救急医学部よりゲヘナ全校生徒へ：事態は未だ沈静化していませんので、付近にて人員待機中。当該地区へ訪問予定の方は日時の変更をお勧めします　PM06:47"
20012-200120240 = "大変だね"
20012-200120250 = "今日もお疲れ様"
20012-200120260 = "あ"
20012-200120270 = "大丈夫です、それほどの事案ではありませんので"
20012-200120280 = "それでは、また"
