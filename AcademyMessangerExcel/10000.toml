[translation]
10000-327 = "Sensei. Aquele pedido que você ajudou antes, foi resolvido de vez."
10000-328 = "Parece que o cliente também ficou bastante satisfeito."
10000-329 = "Hehe, bom trabalho."
10000-330 = "Do que estávamos falando mesmo?"
10000-331 = "Isso tudo é graças à Presidente Aru!"
10000-332 = "Eh? Por acaso, você não se lembra?"
10000-333 = "Bem, naquela época, as coisas estavam bem corridas, mas..."
10000-334 = "D-De qualquer forma...!"
10000-335 = "Q-Que jeito natural de lidar com as coisas, isso é ser um adulto...!"
10000-336 = "...Não é isso."
10000-337 = "Quando um funcionário alcança um resultado esplêndido, dar a ele uma recompensa à altura."
10000-338 = "Acho que esse tipo de coisa também é dever de uma presidente."
10000-339 = "Então, qual seria a melhor recompensa para você, Sensei?"
10000-340 = "Voltei para casa e pensei bastante sobre isso, mas..."
10000-341 = "Se eu dissesse: 'Como recompensa, vamos comer o parfait do menu de desafio',"
10000-342 = "todas poderiam ficar bravas, né?"
10000-343 = "...Quem diria que havia um ponto cego como este por trás da eficiência."
10000-344 = "Então, uhm..."
10000-345 = "Sensei, você vai me acompanhar da próxima vez também?"
10000-346 = "Sensei, a habilidade necessária para se tornar uma presidente não é apenas liderança."
10000-347 = "Claro que minha liderança é maravilhosa, mas..."
10000-348 = "para os negócios, são necessárias várias outras habilidades."
10000-349 = "Várias habilidades?"
10000-350 = "Por exemplo?"
10000-351 = "Fufufu, quer saber? Quer saber, não é?"
10000-352 = "Então venha à biblioteca hoje. Estarei esperando por você, Sensei."
10000-353 = "Sensei, você me impressionou."
10000-354 = "Mas lembre-se."
10000-355 = "Da próxima vez, não vou cair nessa tão fácil!"
10000-356 = "...Deixando isso de lado. Vamos estudar juntos de novo outra hora, tá? ♪"
10000-357 = "Sensei, você ouviu aquela história?"
10000-358 = "Parece que aquele filme clássico lendário vai ser exibido novamente."
10000-359 = "Se você estiver livre, quer ir assistir comigo?"
10000-360 = "Isso! É um convite para um encontro da Aru!"
10000-361 = "O-O-O que você está dizendo, Sensei!?"
10000-362 = "P-Pare de falar besteira e vamos nos encontrar na frente do cinema!"
10000-363 = "Sensei, você está livre hoje?"
10000-364 = "Sim, estou livre."
10000-365 = "Se a Aru-chan está me chamando, não tenho como não ir."
10000-366 = "H-Huum...!? B-Bem, então tudo bem."
10000-367 = "Hoje, tenho algo importante para falar com você, Sensei."
10000-368 = "Pode vir ao escritório da Faz-Tudo mais tarde?"
10000-369 = "Estarei esperando."
10000-370 = "Ter a chance de ver meu lado legal como hoje é uma oportunidade rara, sabia?"
10000-371 = "Conto com você de agora em diante, Sensei!"
10000-372 = "...A propósito, aquela ligação era mesmo de trabalho! É verdade!"
10000-100000010 = "Sensei "
10000-100000020 = "Pode parecer repetitivo, mas... nós da Faz-Tudo, todas nós, agradecemos de coração, Sensei."
10000-100000030 = "Fico com vergonha quando você diz isso."
10000-100000040 = "Fufufu, isso não parece com você, Sensei."
10000-100000050 = "Se você ficar com vergonha por algo assim, não vai conseguir ir muito longe."
10000-100000060 = "Então, vamos inverter os papéis. Vou fazer a Aru ficar com vergonha também."
10000-100000070 = "Como assim!?!?"
10000-100000080 = "Desculpe, só queria dizer isso."
10000-100000090 = "A-Ah, entendo..."
10000-100000100 = "Enfim, voltando ao assunto principal, como um agradecimento por toda a sua ajuda..."
10000-100000110 = "Que tal fazermos uma refeição juntos?"
10000-100000120 = "Com certeza!"
10000-100000130 = "Que bom."
10000-100000140 = "Então estarei esperando por você, Sensei."
