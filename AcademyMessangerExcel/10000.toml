[translation]
10000-327 = "先生。前に手伝ってくれた依頼、あらためて決着がついたわよ"
10000-328 = "クライアントも、かなり満足してくれたみたい"
10000-329 = "ふふっ、お疲れ様"
10000-330 = "何の話だっけ？"
10000-331 = "これも全部アル社長のおかげだね！"
10000-332 = "え？もしかして、覚えてないの？"
10000-333 = "まあ、あの時は確かに、だいぶバタバタしていたけれど……"
10000-334 = "と、とにかく……！"
10000-335 = "な、なんて自然な処世術、これが大人……！"
10000-336 = "……じゃなくって"
10000-337 = "職員が立派な成果を出した時、それにふさわしいご褒美をあげること"
10000-338 = "そういうのも、社長のやるべきことだと思うのよ"
10000-339 = "さあ、先生にとって最高のご褒美は何かしら？"
10000-340 = "家に帰って、よく考えてみたのだけど"
10000-341 = "「ご褒美としてチャレンジメニューのパフェを食べるわよ」って言ったら、"
10000-342 = "みんな怒るかもしれないわね"
10000-343 = "……効率性の裏に、こんな盲点があっただなんて"
10000-344 = "だから、その……"
10000-345 = "先生、次もまた、付き合ってくれるかしら？"
10000-346 = "先生、社長になるために必要な能力はリーダーシップだけではないのよ"
10000-347 = "もちろん私のリーダーシップは素晴らしいものだけど、"
10000-348 = "業務においては他にも色んな能力が必要ってこと"
10000-349 = "色んな能力？"
10000-350 = "例えば？"
10000-351 = "ふふふ、知りたい？知りたいわよね？"
10000-352 = "だったら今日、図書館に来るといいわ。待ってるわよ、先生"
10000-353 = "先生、見直したわ"
10000-354 = "でも覚えておいて"
10000-355 = "次は、こんなにまんまとはやられないから！"
10000-356 = "……それはそれとして。また今度、一緒に勉強するわよ♪"
10000-357 = "先生、あの話聞いた？"
10000-358 = "伝説的なあの名作映画が、今度再上映するらしいわね"
10000-359 = "都合がつくようだったら、一緒に見に行かない？"
10000-360 = "やった！アルからのデートのお誘いだ！"
10000-361 = "な、なっ、何を言ってるの先生！？"
10000-362 = "く、くだらないことを言ってないで、いいから映画館の前で待ち合わせよ！"
10000-363 = "先生、今日暇かしら？"
10000-364 = "うん、暇だよ"
10000-365 = "アルちゃんが私のことを呼んでいるのなら、行かざるを得ない"
10000-366 = "ふ、ふーん……！？ま、まあ、ならいいわ"
10000-367 = "今日は、先生に大事な話があるの"
10000-368 = "後で、便利屋の事務所に来てくれる？"
10000-369 = "待ってるわよ"
10000-370 = "今日みたいに私のカッコいい姿を見られるなんて、貴重なことなのよ？"
10000-371 = "これからもよろしくお願いするわね、先生！"
10000-372 = "……ちなみにあれは、本当に仕事の電話だったから！本当よ！"
10000-100000010 = "先生 "
10000-100000020 = "あらためてだけど……私たち便利屋一同、先生に心から感謝しているわ"
10000-100000030 = "そこまで言われると照れちゃうな"
10000-100000040 = "ふふふっ、先生らしくないわね"
10000-100000050 = "この程度で恥ずかしがっていたら、この先やっていけないわよ"
10000-100000060 = "じゃあ攻守交替、アルにも恥ずかしがってもらおう"
10000-100000070 = "どういうこと！？！？"
10000-100000080 = "ごめん、言ってみたかっただけ"
10000-100000090 = "そ、そう……"
10000-100000100 = "とにかく本題なのだけど、普段お世話になってるお礼として"
10000-100000110 = "食事でも一緒に、どうかしら？"
10000-100000120 = "ぜひ！"
10000-100000130 = "それは良かったわ"
10000-100000140 = "じゃあ待ってるわよ、先生"
