[translation]
20054-200540010 = "Mesmo sendo o Sensei,"
20054-200540020 = "você deve estar dormindo a esta hora, não é?"
20054-200540030 = "Se estiver acordado, por favor, vá dormir logo."
20054-200540040 = "Aliás, esta mensagem foi agendada."
20054-200540050 = "Então, Sensei,"
20054-200540060 = "aguarde ansiosamente pela manhã de amanhã."
20054-200540070 = "Por favor, acorde logo."
20054-200540080 = "Alô?"
20054-200540090 = "Será que você está tirando uma soneca?"
20054-200540100 = "Acorde, Sensei."
20054-200540110 = "O intervalo de almoço já vai acabar."
20054-200540120 = "Uuu..."
20054-200540130 = "Acabei de acordar..."
20054-200540140 = "Que bom."
20054-200540150 = "Espero que tenha conseguido se refrescar."
20054-200540160 = "Vamos nos esforçar no trabalho da tarde também."
20054-200540170 = "Eu também irei ajudar."
20054-200540180 = "Está ficando escuro, não é?"
20054-200540190 = "Já é noite."
20054-200540200 = "Fufu."
20054-200540210 = "Chegou o momento."
20054-200540220 = "O verdadeiro potencial da cadeira de rodas para áreas externas,"
20054-200540230 = "chegou a hora de mostrar ao Sensei."
20054-200540240 = "Estou preparada...!"
20054-200540250 = "Uma resposta cheia de motivação."
20054-200540260 = "Muito obrigada."
20054-200540270 = "Vou lhe presentear com uma lembrança inesquecível."
20054-200540280 = "Por hoje,"
20054-200540290 = "bom trabalho."
20054-200540300 = "Parece que foi longo, mas ao mesmo tempo curto..."
20054-200540310 = "Fufu."
20054-200540320 = "Eu também senti o mesmo."
20054-200540330 = "Logo um novo dia chegará."
20054-200540340 = "Amanhã, um novo sol nascerá."
20054-200540350 = "Descanse bem."
20054-200540360 = "Boa noite para você também, Himari."
20054-200540370 = "E amanhã,"
20054-200540380 = "aguarde pelo desempenho da supergênia, linda e frágil, sua assistente de vida."
20054-200540390 = "Fique na expectativa."
20054-200540400 = "Você não abre mão disso, hein..."
20054-200540410 = "Logo eu!"
20054-200540420 = "Sensei, já estou indo."
20054-200540430 = "Ah, bom dia, Himari."
20054-200540440 = "É raro ver a Himari perder a hora."
20054-200540450 = "Será que..."
20054-200540460 = "Eu, a hacker supergênia, linda e frágil, perfeita e sem falhas,"
20054-200540470 = "cometer um erro desses...!"
20054-200540480 = "Vou levar comida para você."
20054-200540490 = "Bom dia."
20054-200540500 = "Você já está acordado?"
20054-200540510 = "Eu voltei para o meu quarto sem nem perceber..."
20054-200540520 = "Sobre isso"
20054-200540530 = "É que"
20054-200540540 = "A Eimi veio me acordar"
20054-200540550 = "E foi ela quem te trouxe de volta para o seu quarto, Sensei."
20054-200540560 = "Entendo... Vou agradecê-la depois."
20054-200540570 = "Sim, ela certamente ficará feliz."
20054-200540580 = "Então, vamos recomeçar, Sensei!"
20054-200540590 = "Eu voltarei a ser"
20054-200540600 = "a sua equipe de suporte pessoal, pronta para tudo, entendeu?"
