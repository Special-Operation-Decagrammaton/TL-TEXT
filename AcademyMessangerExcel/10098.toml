[translation]
10098-100980010 = "Sensei"
10098-100980020 = "Você está ocupado agora?"
10098-100980030 = "Não estou tão ocupado."
10098-100980040 = "Que bom."
10098-100980050 = "Na verdade, estou com um problema."
10098-100980060 = "Queria que você me ajudasse um pouco."
10098-100980070 = "Sim, tudo bem."
10098-100980080 = "Tem certeza?"
10098-100980090 = "Eu nem disse do que se trata ainda..."
10098-100980100 = "Vou patrulhar o distrito autônomo agora."
10098-100980110 = "Se quiser, por que não vem junto, Sensei?"
10098-100980120 = "Claro que vou com você!"
10098-100980130 = "Se é um pedido da heroína!"
10098-100980140 = "Ugh..."
10098-100980150 = "Me chamar de heroína..."
10098-100980160 = "É meio vergonhoso, né?"
10098-100980170 = "Bem, de qualquer forma, estarei esperando~"
10098-100980180 = "Sensei."
10098-100980190 = "Como você está se sentindo?"
10098-100980200 = "Não pegou um resfriado nem nada?"
10098-100980210 = "Eu estou bem, e você, Hoshino?"
10098-100980220 = "Esta tia aqui também está ótima~"
10098-100980230 = "Será que foi porque ficamos juntinhos a noite toda?"
10098-100980240 = "Wah!"
10098-100980250 = "Não!"
10098-100980260 = "A gente só estava enrolado no mesmo cobertor!"
10098-100980270 = "Falando desse jeito, as pessoas vão entender errado!"
10098-100980280 = "...E também..."
10098-100980290 = "Ontem, nós ajudamos pessoas juntos no distrito autônomo, né?"
10098-100980300 = "Antigamente, eu fazia algo parecido."
10098-100980310 = "Me senti um pouco nostálgica."
10098-100980320 = "Então, é que..."
10098-100980330 = "Sim, de qualquer forma, obrigada."
10098-100980340 = "Sensei."
10098-100980350 = "Sensei, você se lembra da patrulha do outro dia?"
10098-100980360 = "Claro."
10098-100980370 = "Nós demos uma olhada em vários lugares, não foi?"
10098-100980380 = "Mas não encontramos nenhum rastro da Gangue do Capacete, né?"
10098-100980390 = "É verdade..."
10098-100980400 = "Depois daquilo, eu dei uma investigada."
10098-100980410 = "Consegui uma informação de que eles foram vistos com frequência perto da área comercial."
10098-100980420 = "Provavelmente, o esconderijo deles fica por ali."
10098-100980430 = "A heroína está pronta?"
10098-100980440 = "Uhehe. Claro que sim, parceira."
