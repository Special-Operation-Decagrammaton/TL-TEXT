[translation]
10125-101250010 = "にゅふふふ"
10125-101250020 = "ごきげんよう、マスター"
10125-101250030 = "今日も世界はマナに満ちていますね！"
10125-101250040 = "マスターの調子はいかがですか？"
10125-101250050 = "マナが満ちてるかは分からないけど、元気いっぱいだよ！"
10125-101250060 = "誤魔化したって無駄ですよ？"
10125-101250070 = "占いで見ているんですから"
10125-101250080 = "昨日も遅くまで残業されていましたよね？"
10125-101250090 = "ぐっ……！"
10125-101250100 = "今日はお仕事をいったん忘れて"
10125-101250110 = "私とのんびり過ごしてみませんか？"
10125-101250120 = "お仕事と同じくらい、休息も大切ですから"
10125-101250130 = "そうしようかな"
10125-101250140 = "それじゃあお菓子でも買っていこうかな"
10125-101250150 = "にゅふふ、やはりマスターとは心が通じ合っているのですね"
10125-101250160 = "それではお待ちしております！"
10125-101250170 = "今日は本当に楽しかったです、マスター"
10125-101250180 = "おかげで、しばらくはマナが切れる心配もなさそうです"
10125-101250190 = "マスターも、少しはマナを補給できましたか？"
10125-101250200 = "うん！力がみなぎってるよ！"
10125-101250210 = "にゅふふ"
10125-101250220 = "また気分転換がしたくなったら、いつでも声をかけてくださいね"
10125-101250230 = "私たちは魔法で繋がっていますから"
10125-101250240 = "マスター！"
10125-101250250 = "大変です！"
10125-101250260 = "本当に、大変なことになってしまいました！"
10125-101250270 = "寮監隊に追われてるとか？"
10125-101250280 = "違います！"
10125-101250290 = "もっと深刻です！"
10125-101250300 = "まさか、占いでも予見できないなんて……！"
10125-101250310 = "いったい何があったの？"
10125-101250320 = "それがですね"
10125-101250330 = "今日、絵画の実技試験があるのですが……"
10125-101250340 = "試験会場で"
10125-101250350 = "帽子の着用が禁止されてるんです……！"
10125-101250360 = "…………"
10125-101250370 = "マスター"
10125-101250380 = "実技試験が……終わりました……"
10125-101250390 = "どうだった？うまくいった？"
10125-101250400 = "にゅ……"
10125-101250410 = "にゅふふふ……"
10125-101250420 = "マスター"
10125-101250430 = "私、新たな魔法を研究しようと思っているんです"
10125-101250440 = "「忘却魔法」です……"
10125-101250450 = "それさえあれば……"
10125-101250460 = "この恥ずかしい記憶を、全て消し去れるんですから！"
10125-101250470 = "ど、どうやって消すの！？"
10125-101250480 = "頭に強い物理的衝撃を与えるんです！"
10125-101250490 = "早まらないで！次はきっと大丈夫だよ！"
10125-101250500 = "……そ、そうでしょうか"
10125-101250510 = "はぁぁぁ……"
10125-101250520 = "とにかく……今日は本当にありがとうございました"
10125-101250530 = "また、近いうちにお会いしましょう……"
10125-101250540 = "マスター……"
10125-101250550 = "この前の実技試験以来、魔力が全然戻ってこないんです"
10125-101250560 = "魔導書を開いても、行くべき道がわからず……"
10125-101250570 = "どうしたらいいんでしょう……？"
10125-101250580 = "シャーレの近くで気分転換でもする？"
10125-101250590 = "おおっ、文面を見ただけで力が湧いてきた気がします！"
10125-101250600 = "ま、まさかこれは……"
10125-101250610 = "言葉に魔力を宿す「言霊魔法」！？ "
10125-101250620 = "で、ですがこの魔法はとうの昔に失われたはず……！"
10125-101250630 = "マスター、どうやってそんな古代魔法を……！"
10125-101250640 = "……"
10125-101250650 = "はぁぁ……"
10125-101250660 = "ごめんなさい"
10125-101250670 = "いつもならこうして魔法談義をしていれば元気になるのに"
10125-101250680 = "今日はどうしても力が入りません……"
10125-101250690 = "でも、わかりましたマスター"
10125-101250700 = "すぐにそちらへ向かいます"
10125-101250710 = "無事にお帰りになりましたか？"
10125-101250720 = "今日は本当に、たくさんのことを考えさせられて……"
10125-101250730 = "まさに、魔法のような一日でした"
10125-101250740 = "一気に魔法の熟練度が二段階ほど上がった気分です"
10125-101250750 = "階十位の「世界創造魔法」は使えそう？"
10125-101250760 = "さすがにそこまでは……"
10125-101250770 = "ですが、近しい魔法なら、もう使えそうです"
10125-101250780 = "キャンバスに、自分だけの世界を描き出す魔法……"
10125-101250790 = "にゅふふふ"
10125-101250800 = "次にお会いする日を、お楽しみに！"
10125-101250810 = "マスター。ついに、その時がやってきました"
10125-101250820 = "私の「世界創造魔法」をお見せする時が！"
10125-101250830 = "おおっ、ついに来たね！"
10125-101250840 = "まだ完成度100％とは言えませんが"
10125-101250850 = "持てるすべての魔力を注ぎ込んで、準備しておきます"
10125-101250860 = "それでは学院でお会いしましょう！"
10125-101250870 = "マスター。今日は本当に、ありがとうございました"
10125-101250880 = "おかげで、たっぷり自信が湧いてきました"
10125-101250890 = "これで、少しは私も前に進めたってことですよね"
10125-101250900 = "うん！次の試験は絶対うまくいくよ！"
10125-101250910 = "もしまた、帽子を脱がなきゃならないなら……"
10125-101250920 = "ふぅぅ……できる限り、頑張ってみます"
10125-101250930 = "ところで、肖像画……ちゃんと持ち帰ってくれました？"
10125-101250940 = "うん。よく見える場所に飾っておくよ"
10125-101250950 = "にゅふふふ"
10125-101250960 = "ありがとうございます"
10125-101250970 = "その絵を見るたびに、私のことを思い出してくださいね？"
10125-101250980 = "では、またお会いするその日まで！"
10125-101250990 = "マスターにも、幸福の魔法が降り注ぎますように！"
