[translation]
10125-101250010 = "Nyufufufu"
10125-101250020 = "Olá, Mestre."
10125-101250030 = "O mundo está cheio de mana hoje também!"
10125-101250040 = "Como você está, Mestre?"
10125-101250050 = "Não sei se está cheio de mana, mas estou cheio de energia!"
10125-101250060 = "É inútil tentar me enganar."
10125-101250070 = "Eu vejo tudo com a minha adivinhação."
10125-101250080 = "Você ficou até tarde trabalhando ontem, não foi?"
10125-101250090 = "Guh...!"
10125-101250100 = "Que tal esquecer o trabalho por um momento hoje"
10125-101250110 = "e passar um tempo relaxando comigo?"
10125-101250120 = "Descansar é tão importante quanto trabalhar."
10125-101250130 = "Acho que vou fazer isso."
10125-101250140 = "Então, talvez eu compre alguns doces."
10125-101250150 = "Nyufufu, parece que nossos corações estão conectados, Mestre."
10125-101250160 = "Então, estarei esperando!"
10125-101250170 = "Foi realmente divertido hoje, Mestre."
10125-101250180 = "Graças a isso, não terei que me preocupar com a falta de mana por um tempo."
10125-101250190 = "Você também conseguiu reabastecer um pouco de mana, Mestre?"
10125-101250200 = "Sim! Estou cheio de energia!"
10125-101250210 = "Nyufufu."
10125-101250220 = "Se você quiser mudar de ares novamente, me chame a qualquer momento."
10125-101250230 = "Estamos conectados pela magia."
10125-101250240 = "Mestre!"
10125-101250250 = "É terrível!"
10125-101250260 = "Algo realmente terrível aconteceu!"
10125-101250270 = "Está sendo perseguida pela equipe de supervisão do dormitório?"
10125-101250280 = "Não!"
10125-101250290 = "É muito mais sério!"
10125-101250300 = "Eu não podia nem prever isso com a minha adivinhação...!"
10125-101250310 = "O que aconteceu?"
10125-101250320 = "Bem, é que..."
10125-101250330 = "Hoje, tenho um exame prático de pintura, mas..."
10125-101250340 = "No local do exame,"
10125-101250350 = "o uso de chapéus é proibido...!"
10125-101250360 = "............"
10125-101250370 = "Mestre."
10125-101250380 = "O exame prático... acabou..."
10125-101250390 = "Como foi? Deu tudo certo?"
10125-101250400 = "Nyu..."
10125-101250410 = "Nyufufufu..."
10125-101250420 = "Mestre."
10125-101250430 = "Estou pensando em pesquisar uma nova magia."
10125-101250440 = "É a 'Magia do Esquecimento'..."
10125-101250450 = "Se eu tivesse isso..."
10125-101250460 = "Eu poderia apagar todas essas memórias vergonhosas!"
10125-101250470 = "C-como você vai apagar!?"
10125-101250480 = "Vou aplicar um forte impacto físico na minha cabeça!"
10125-101250490 = "Não faça isso! Tenho certeza que da próxima vez vai dar certo!"
10125-101250500 = "...S-será?"
10125-101250510 = "Haaah..."
10125-101250520 = "De qualquer forma... muito obrigada por hoje."
10125-101250530 = "Nos vemos em breve..."
10125-101250540 = "Sensei..."
10125-101250550 = "Desde o último exame prático, minha energia mágica não voltou de jeito nenhum."
10125-101250560 = "Mesmo abrindo o grimório, não sei qual caminho seguir..."
10125-101250570 = "O que devo fazer...?"
10125-101250580 = "Que tal mudar um pouco de ares perto de Schale?"
10125-101250590 = "Oh! Sinto que a força está voltando só de ler a mensagem!"
10125-101250600 = "N-não pode ser... isso é..."
10125-101250610 = "Magia de Palavras Espirituais, que infunde poder mágico nas palavras!?"
10125-101250620 = "M-mas essa magia deveria ter sido perdida há muito tempo...!"
10125-101250630 = "Sensei, como você conseguiu uma magia tão antiga...!"
10125-101250640 = "..."
10125-101250650 = "Haaah..."
10125-101250660 = "Me desculpe."
10125-101250670 = "Normalmente, eu me animaria conversando sobre magia assim..."
10125-101250680 = "Mas hoje, eu simplesmente não consigo ter energia..."
10125-101250690 = "Mas entendi, Sensei."
10125-101250700 = "Estarei indo para aí em breve."
10125-101250710 = "Você voltou em segurança?"
10125-101250720 = "Hoje, eu realmente tive muito em que pensar..."
10125-101250730 = "Foi um dia verdadeiramente mágico."
10125-101250740 = "Sinto como se minha proficiência em magia tivesse subido dois níveis de uma vez."
10125-101250750 = "A Magia de Criação de Mundo de décimo nível parece utilizável?"
10125-101250760 = "Bem, não tanto assim..."
10125-101250770 = "Mas uma magia semelhante, sim, já consigo usar."
10125-101250780 = "A magia de desenhar seu próprio mundo em uma tela..."
10125-101250790 = "Nyufufufu."
10125-101250800 = "Mal posso esperar pelo dia em que nos encontraremos novamente!"
10125-101250810 = "Sensei. Finalmente, chegou a hora."
10125-101250820 = "A hora de mostrar minha 'Magia de Criação de Mundo'!"
10125-101250830 = "Oh, finalmente chegou!"
10125-101250840 = "Ainda não posso dizer que está 100% completa,"
10125-101250850 = "mas vou infundir toda a minha energia mágica e deixá-la pronta."
10125-101250860 = "Então, nos vemos na academia!"
10125-101250870 = "Sensei. Muito obrigada por hoje."
10125-101250880 = "Graças a você, minha confiança aumentou muito."
10125-101250890 = "Isso significa que eu consegui avançar um pouco, certo?"
10125-101250900 = "Sim! O próximo exame com certeza vai dar certo!"
10125-101250910 = "Se eu tiver que tirar o chapéu de novo..."
10125-101250920 = "Ufa... vou tentar o meu melhor."
10125-101250930 = "A propósito, o retrato... você o levou para casa direitinho?"
10125-101250940 = "Sim. Vou pendurá-lo em um lugar bem visível."
10125-101250950 = "Nyufufufu."
10125-101250960 = "Obrigada."
10125-101250970 = "Toda vez que vir aquela pintura, por favor, lembre-se de mim, ok?"
10125-101250980 = "Então, até o dia em que nos encontrarmos novamente!"
10125-101250990 = "Que a magia da felicidade também caia sobre você, Sensei!"
