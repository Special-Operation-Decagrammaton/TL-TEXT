[translation]
10094-100940010 = "Sensei, Sensei!"
10094-100940020 = "Momoi, Momoi!"
10094-100940030 = "Escuta!"
10094-100940040 = "Eu consegui um uniforme de empregada!"
10094-100940050 = "A Momoi virou uma empregada!"
