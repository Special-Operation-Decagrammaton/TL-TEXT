10094-100940300 = "Lembrei disso agora há pouco..."
10094-100940310 = "Lá vem problema de novo..."
10094-100940320 = "Não é nada disso!"
10094-100940330 = "Tenho certeza que o Sensei vai gostar disso!"
10094-100940340 = "...Talvez."
10094-100940350 = "O que exatamente você esqueceu?"
