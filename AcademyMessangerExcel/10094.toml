10094-100940140 = "Momoi? Momoi!?"
10094-100940150 = "Sensei, Sensei!"
10094-100940160 = "Momoi, Momoi!"
10094-100940170 = "Escuta! Sensei!"
10094-100940180 = "Depois daquilo, eu pesquisei um pouco sobre o trabalho de uma empregada!"
