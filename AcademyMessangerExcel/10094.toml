10094-100940510 = "Deveríamos ter relaxado normalmente..."
10094-100940520 = "Mas!"
10094-100940530 = "Assim não tem graça!"
10094-100940540 = "Algo mais super ultra revolucionário e eficiente!"
10094-100940550 = "Algo que ficaria na memória das pessoas para sempre!"
