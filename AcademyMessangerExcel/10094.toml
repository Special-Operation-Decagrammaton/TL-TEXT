10094-100940200 = "Bem... a comida é essencial para a vida, né?"
10094-100940210 = "Isso... e assim meu plano profundo começou novamente..."
10094-100940220 = "Se não conseguir satisfazer o mestre com a culinária, como empregada, sou apenas uma amadora...!"
10094-100940230 = "Por isso! Eu tenho que preparar uma refeição maravilhosa para o Sensei!"
10094-100940240 = "É por isso! Nos encontramos mais tarde na sala do Clube de Desenvolvimento de Jogos!"
10094-100940250 = "Momoi? Momoi!?"
10094-100940260 = "Sensei!"
10094-100940270 = "Momoi!?"
