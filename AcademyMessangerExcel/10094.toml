10094-100940380 = "S-Sério que desta vez é só para descansar?"
10094-100940390 = "Isso! Porque, sabe,"
10094-100940400 = "As pessoas quebram se não descansam, né?"
10094-100940410 = "Por isso, descansar para o amanhã é importante!"
