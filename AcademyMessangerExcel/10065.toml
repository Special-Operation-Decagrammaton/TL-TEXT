[translation]
10065-100650010 = "こんにちは、先生"
10065-100650020 = "こ、こんにちは……どちら様ですか？"
10065-100650030 = "プライベートでご連絡したことはありませんでしたね"
10065-100650040 = "百鬼夜行連合学院の陰陽部副部長であり、百鬼夜行観光文化産業広報支援部の――"
10065-100650050 = "戦略リーダーを務めています、桑上カホと申します"
10065-100650060 = "遅ればせながら、ご挨拶を申し上げたく思いまして"
10065-100650070 = "戦略、広報……？"
10065-100650080 = "よ、よろしく……って突然どうしたの？"
10065-100650090 = "先日ご連絡いたしました、「例の件」ですが"
10065-100650100 = "先日？例の件……？"
10065-100650110 = "そのご相談にお伺いしたく、本日のご都合はよろしいでしょうか？"
10065-100650120 = "あ、うん。今日は大丈夫だよ"
10065-100650130 = "ありがとうございます。では、すぐにそちらへ"
10065-100650140 = "そんな急に！？"
10065-100650150 = "先生、先日は大変ご迷惑をおかけしてしまい……"
10065-100650160 = "申し訳ございませんでした"
10065-100650170 = "迷惑だなんて、そんなことないよ"
10065-100650180 = "お心遣い痛み入りますが……"
10065-100650190 = "ご迷惑をおかけしたお詫びに、百鬼夜行までお越しいただけないでしょうか？"
10065-100650200 = "うん、これから向かえば良いかな？"
10065-100650210 = "はい、それではお待ちしております"
10065-100650220 = "すぐに行くね"
10065-100650230 = "私、桑上カホ、本日は完璧に先生をエスコートしますので"
10065-100650240 = "エスコートって……？"
10065-100650250 = "先生、本日はお時間よろしいでしょうか？"
10065-100650260 = "時間ならあるけど、どうしたの？"
10065-100650270 = "先日の約束を果たしたく思い……"
10065-100650280 = "えぇと、その…… "
10065-100650290 = "エスコートの準備が整ったので、ご連絡いたしました"
10065-100650300 = "というわけでして、先生。もしよろしければ……"
10065-100650310 = "うん、分かった。これから向かえば良いかな？"
10065-100650320 = "はい、ありがとうございます"
10065-100650330 = "それでは、お待ちしております"
10065-100650340 = "ふふふっ"
10065-100650350 = "何か良いことでもあった？"
10065-100650360 = "先生、聞いてください"
10065-100650370 = "ついに……ついに！"
10065-100650380 = "ついに……！？"
10065-100650390 = "陰陽部で特注した百鬼夜行の宣伝グッズが届いたんです！"
10065-100650400 = "おめでとう！"
10065-100650410 = "ふふ、先生もお一ついかがですか？"
10065-100650420 = "もちろん、よろしければですが……"
10065-100650430 = "ありがとう、すぐ行くよ！"
10065-100650440 = "ふふっ、お待ちしております"
10065-100650450 = "先生、こんにちは。カホです"
10065-100650460 = "明日、仕事で陰陽部にいらっしゃると伺い、メッセージいたしました"
10065-100650470 = "うん、明日はよろしくね"
10065-100650480 = "はい、お会いできるのを楽しみにしておりますね"
10065-100650490 = "それとよろしければ、業務の後にお茶でもいかがでしょうか？"
10065-100650500 = "休憩は大事ですから"
10065-100650510 = "ありがとう。それじゃあ、頂こうかな"
10065-100650520 = "はい、心を込めて用意いたしますね"
10065-100650530 = "それではお待ちしております"
