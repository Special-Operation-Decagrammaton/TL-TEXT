[translation]
10065-100650010 = "Olá, Sensei."
10065-100650020 = "O-olá... Quem fala?"
10065-100650030 = "Acho que nunca entrei em contato com você por motivos pessoais, não é?"
10065-100650040 = "Sou a vice-presidente do Clube Onmyo da Academia da Aliança Hyakkiyako, e do Departamento de Apoio à Promoção da Indústria Cultural e de Turismo de Hyakkiyako--"
10065-100650050 = "Meu nome é Kuwakami Kaho, e atuo como líder de estratégia."
10065-100650060 = "Gostaria de me apresentar, ainda que com um pouco de atraso."
10065-100650070 = "Estratégia, relações públicas...?"
10065-100650080 = "P-prazer... Mas por que essa ligação repentina?"
10065-100650090 = "É sobre \"aquele assunto\" que mencionei no outro dia."
10065-100650100 = "No outro dia? Aquele assunto...?"
10065-100650110 = "Gostaria de ir até aí para discutir sobre isso. Você estaria disponível hoje?"
10065-100650120 = "Ah, sim. Hoje eu posso."
10065-100650130 = "Obrigada. Então, estou indo para aí agora mesmo."
10065-100650140 = "Tão de repente?!"
10065-100650150 = "Sensei, sobre o outro dia, sinto muito pelo incômodo que causei..."
10065-100650160 = "Peço mil desculpas."
10065-100650170 = "Não foi incômodo nenhum, não se preocupe."
10065-100650180 = "Agradeço sua gentileza, mas..."
10065-100650190 = "Como um pedido de desculpas pelo incômodo, você poderia vir até Hyakkiyako?"
10065-100650200 = "Claro, posso ir agora?"
10065-100650210 = "Sim, estarei esperando por você."
10065-100650220 = "Estou indo agora."
10065-100650230 = "Eu, Kuwakami Kaho, irei acompanhar o Sensei perfeitamente hoje."
10065-100650240 = "Acompanhar...?"
10065-100650250 = "Sensei, você teria um tempo hoje?"
10065-100650260 = "Tenho tempo sim, mas o que foi?"
10065-100650270 = "Gostaria de cumprir a promessa do outro dia..."
10065-100650280 = "Uhm, é que... "
10065-100650290 = "Entrei em contato porque os preparativos para acompanhá-lo estão prontos."
10065-100650300 = "Então é isso, Sensei. Se você não se importar..."
10065-100650310 = "Sim, entendi. Posso ir agora?"
10065-100650320 = "Sim, muito obrigada."
10065-100650330 = "Então, estarei esperando por você."
10065-100650340 = "Fufufu."
10065-100650350 = "Aconteceu alguma coisa boa?"
10065-100650360 = "Sensei, escute!"
10065-100650370 = "Finalmente... Finalmente!"
10065-100650380 = "Finalmente...?!"
10065-100650390 = "Os produtos promocionais de Hyakkiyako que o Clube Onmyo encomendou chegaram!"
10065-100650400 = "Parabéns!"
10065-100650410 = "Fufu, o Sensei não gostaria de um também?"
10065-100650420 = "Claro, se você quiser..."
10065-100650430 = "Obrigado, estou indo agora!"
10065-100650440 = "Fufu, estarei esperando."
10065-100650450 = "Sensei, olá. É a Kaho."
10065-100650460 = "Ouvi dizer que você virá ao Clube Onmyo amanhã a trabalho, então mandei uma mensagem."
10065-100650470 = "Sim, nos vemos amanhã, então."
10065-100650480 = "Sim, estou ansiosa para vê-lo."
10065-100650490 = "E também, se não for incômodo, gostaria de tomar um chá depois do trabalho?"
10065-100650500 = "É importante fazer uma pausa."
10065-100650510 = "Obrigada. Então, vou aceitar."
10065-100650520 = "Sim, vou preparar com todo o carinho."
10065-100650530 = "Então, por favor, aguarde."
