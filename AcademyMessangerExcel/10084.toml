[translation]
10084-100840010 = "この間、雑誌で……"
10084-100840020 = "「運動不足気味なカップルにオススメ！ライトな運動10選」という特集で"
10084-100840030 = "登山が1位になっていました"
10084-100840040 = "……登山？"
10084-100840050 = "登山は他のスポーツと比べて"
10084-100840060 = "練習や特別な準備の必要がないため始めやすく"
10084-100840070 = "2人きりで会話する時間が多く取れるからだそうです"
10084-100840080 = "なるほど……"
10084-100840090 = "言われてみればそうかも"
10084-100840100 = "はい、ですので……"
10084-100840110 = "次の週末が楽しみです"
10084-100840120 = "次の週末……？"
10084-100840130 = "……えっと、コタマさん？"
10084-100840140 = "たしかに副部長の言う通り……"
10084-100840150 = "もう少し体力があった方が良いかもしれません"
10084-100840160 = "それは良い考えだけど……"
10084-100840170 = "……急にどうしたの？"
10084-100840180 = "ハッカーとして活動するためには、ある程度の体力も必要ですからね"
10084-100840190 = "前回の登山で思い知らされたんです……"
10084-100840200 = "チヒロ副部長のように、急な崖も軽々と登れるような体力を身に付けられたら……"
10084-100840210 = "盗聴の待機場所にも幅が出るはずです"
10084-100840220 = "……なんて返したらいいんだろうね"
10084-100840230 = "先生、今週末は空いてますか？"
10084-100840240 = "特に予定は無いけど……"
10084-100840250 = "それなら、二人で山に行きませんか？"
10084-100840260 = "……前回のリベンジをしたいのです"
10084-100840270 = "私は構わないけど……"
10084-100840280 = "一応マッチ持っていこうか？"
10084-100840290 = "いえ、大丈夫です"
10084-100840300 = "今度こそ人為的な要素を全て排除した……"
10084-100840310 = "自然そのものを録音する予定ですから"
10084-100840320 = "前回の山で録音した音源を確認していたのですが……"
10084-100840330 = "どうやら一部ノイズが入っていたようで……"
10084-100840340 = "もう一度、行く必要があります"
10084-100840350 = "私の声が入っちゃってたとか……？"
10084-100840360 = "いえ、そうではなく……"
10084-100840370 = "むしろ先生の声が入っていたら、色々と使い道が……"
10084-100840380 = "あ"
10084-100840390 = "コタマは相変わらずだね……"
10084-100840400 = "また用があるなら一緒に行こうか"
10084-100840410 = "はい？"
10084-100840420 = "先生も何か山に用事があるのですか？"
10084-100840430 = "いつも中腹で戻ってたから……"
10084-100840440 = "今度は一緒に山頂まで登ってみようかなって"
10084-100840450 = "はい"
10084-100840460 = "……はい？"
