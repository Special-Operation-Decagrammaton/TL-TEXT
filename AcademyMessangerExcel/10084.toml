[translation]
10084-100840010 = "Outro dia, em uma revista..."
10084-100840020 = "Em uma matéria especial chamada 'Recomendado para casais sedentários! 10 exercícios leves'"
10084-100840030 = "Escalar montanhas ficou em primeiro lugar."
10084-100840040 = "...Escalar montanhas?"
10084-100840050 = "Comparado a outros esportes,"
10084-100840060 = "escalar montanhas é fácil de começar porque não precisa de treino ou preparações especiais,"
10084-100840070 = "e dizem que é porque dá pra ter bastante tempo para conversar a sós."
10084-100840080 = "Entendi..."
10084-100840090 = "Agora que você falou, talvez seja verdade."
10084-100840100 = "Sim, portanto..."
10084-100840110 = "Estou ansiosa pelo próximo fim de semana."
10084-100840120 = "Próximo fim de semana...?"
10084-100840130 = "...Uhm, Kotama?"
10084-100840140 = "É verdade, como a vice-presidente disse..."
10084-100840150 = "Talvez seja melhor eu ter um pouco mais de preparo físico."
10084-100840160 = "É uma boa ideia, mas..."
10084-100840170 = "...Por que essa mudança repentina?"
10084-100840180 = "Para atuar como hacker, é necessário ter um certo nível de preparo físico."
10084-100840190 = "Percebi isso na última vez que escalamos..."
10084-100840200 = "Se eu conseguisse ter um preparo físico como o da vice-presidente Chihiro, para escalar penhascos íngremes com facilidade..."
10084-100840210 = "Isso me daria mais opções de lugares para esperar enquanto faço escutas."
10084-100840220 = "...O que eu deveria responder a isso?"
10084-100840230 = "Sensei, você está livre neste fim de semana?"
10084-100840240 = "Não tenho nenhum plano em especial, mas..."
10084-100840250 = "Nesse caso, por que não vamos para a montanha nós duas?"
10084-100840260 = "...Eu quero uma revanche da última vez."
10084-100840270 = "Por mim, tudo bem, mas..."
10084-100840280 = "Devo levar fósforos, só por precaução?"
10084-100840290 = "Não, tudo bem."
10084-100840300 = "Desta vez, vou eliminar todos os elementos artificiais..."
10084-100840310 = "Porque planejo gravar a natureza em si."
10084-100840320 = "Eu estava verificando a gravação que fiz na montanha da última vez..."
10084-100840330 = "E parece que uma parte dela pegou ruído..."
10084-100840340 = "Preciso ir de novo."
10084-100840350 = "Será que a minha voz acabou sendo gravada...?"
10084-100840360 = "Não, não é isso..."
10084-100840370 = "Na verdade, se a voz do Sensei estivesse na gravação, teria várias utilidades..."
10084-100840380 = "Ah."
10084-100840390 = "A Kotama não muda nunca, né...?"
10084-100840400 = "Se você precisa ir de novo, quer que eu vá junto?"
10084-100840410 = "Hã?"
10084-100840420 = "Sensei, você também tem algo para fazer na montanha?"
10084-100840430 = "É que eu sempre voltava no meio do caminho..."
10084-100840440 = "Pensei que desta vez poderíamos tentar escalar até o topo juntas."
10084-100840450 = "Sim."
10084-100840460 = "...Hã?"
