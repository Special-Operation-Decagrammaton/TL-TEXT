[translation]
10139-101390010 = "Boa noite, aqui é o \"FOX EATS\"!"
10139-101390020 = "Estaremos entregando seu pedido em 10 minutos."
10139-101390030 = "Por favor, confirme seu endereço mais uma vez."
10139-101390040 = "FOX EATS?"
10139-101390050 = "Não me lembro de ter feito um pedido..."
10139-101390060 = "Não se preocupe, o pagamento já foi efetuado!"
10139-101390070 = "Professor, por favor, aguarde seu jantar entregue pelo FOX EATS em seu lugar."
10139-101390080 = "Como você sabia que eu ainda não tinha jantado?"
10139-101390090 = "Hehe, por que será?"
10139-101390100 = "É segredo de empresa."
10139-101390110 = "Parece que algo parecido já aconteceu antes..."
10139-101390120 = "Estaremos entregando em breve."
10139-101390130 = "Por segurança, por favor, afaste-se da porta o máximo possível e prepare-se para o impacto."
10139-101390140 = "O quê?! O que é isso?!"
10139-101390150 = "Professor."
10139-101390160 = "Você comeu o Inari Sushi direitinho?"
10139-101390170 = "Sim, comi."
10139-101390180 = "Estava tão delicioso que comi tudo rapidinho..."
10139-101390190 = "Hehe, que bom."
10139-101390200 = "Afinal, Inari Sushi fica mais gostoso depois de um tempo."
10139-101390210 = "Se tiver outra oportunidade, trarei mais."
10139-101390220 = "...Mas, por favor, não pule refeições de propósito por causa disso, ok?"
10139-101390230 = "Sim, vou guardar isso na memória."
10139-101390240 = "Professor, você tem tempo esta tarde?"
10139-101390250 = "Sim. Acabei de ficar livre."
10139-101390260 = "O que houve, de repente?"
10139-101390270 = "Bem... eu estava planejando uma \"Operação de Suprimento Especial\" para esta tarde,"
10139-101390280 = "mas todos os membros do esquadrão não puderam vir..."
10139-101390290 = "Se não for muito incômodo, o Professor poderia me ajudar?"
10139-101390300 = "Claro!"
10139-101390310 = "Mas... será que eu consigo ser útil?"
10139-101390320 = "Não entendo nada de operações especiais."
10139-101390330 = "Está tudo bem. Não é uma operação tão perigosa."
10139-101390340 = "...Provavelmente."
10139-101390350 = "Provavelmente!?"
10139-101390360 = "Professor, uma pergunta."
10139-101390370 = "Você conhece o ditado: \"Tudo o que pode dar errado, dará errado\"?"
10139-101390380 = "É a Lei de Murphy, né?"
10139-101390390 = "Ouço muito isso no trabalho."
10139-101390400 = "Sim. Parece que muitas pessoas se identificam com isso."
10139-101390410 = "Eu também, uma vez, esqueci de fazer a inspeção diária do equipamento..."
10139-101390420 = "E, por azar, justamente naquele dia, houve um problema no local."
10139-101390430 = "Por que só hoje...? Acabei olhando para o céu sem querer."
10139-101390440 = "Eu também tive algumas experiências semelhantes."
10139-101390450 = "As coincidências realmente acontecem nos piores momentos, não é?"
10139-101390460 = "Naquela época, eu estava lendo um livro relacionado e descobri que..."
10139-101390470 = "Na verdade, esses tipos de leis são fenômenos que ocorrem porque eventos ruins tendem a ser mais memoráveis do que eventos bons."
10139-101390480 = "É como se não nos lembrássemos dos dias em que falhamos e nada aconteceu."
10139-101390490 = "Então havia uma razão científica para isso."
10139-101390500 = "Isso parece um pouco lamentável, de certa forma..."
10139-101390510 = "Se for para lembrar, eu gostaria de lembrar das boas memórias."
10139-101390520 = "É mesmo? Eu acho que é melhor ter as memórias ruins."
10139-101390530 = "Assim podemos usar os erros para a próxima vez... não é?"
10139-101390540 = "Há muitos guarda-chuvas no depósito de Schale..."
10139-101390550 = "Professor... aquilo..."
10139-101390560 = "São todos equipamentos de Schale?"
10139-101390570 = "São coisas que os alunos de plantão esqueceram e deixaram para trás."
10139-101390580 = "Quando percebi, já tinha acumulado bastante..."
10139-101390590 = "Entendi."
10139-101390600 = "É verdade, se não estiver chovendo na hora de ir embora, a gente acaba esquecendo."
10139-101390610 = "Mas como não tem nome escrito,"
10139-101390620 = "Parece que vai ser bem difícil encontrar os donos."
10139-101390630 = "Que tal eu escrever no quadro de avisos para que os donos venham buscar depois?"
10139-101390640 = "Sim."
10139-101390650 = "Nos pertences do Professor também, para que sejam encontrados rapidamente se perdidos, o nome..."
10139-101390660 = "Não."
10139-101390670 = "Na verdade, parece que teria o efeito contrário."
10139-101390680 = "Por quê!?"
10139-101390690 = "Você tem algum plano especial para o próximo feriado?"
10139-101390700 = "Provavelmente, só vou relaxar..."
10139-101390710 = "Nico, você tem algum plano?"
10139-101390720 = "Eu também não tenho planos para este fim de semana... então estou pensando em tentar algo novo."
10139-101390730 = "Se não for incômodo... você poderia me emprestar a cozinha de Schale neste fim de semana?"
10139-101390740 = "Eu gostaria de fazer rações de combate para usar na operação atual."
10139-101390750 = "Você pode usar a cozinha livremente, mas..."
10139-101390760 = "Rações de combate?"
10139-101390770 = "Sim. É um alimento que não estraga facilmente e o sabor não muda muito... é um alimento de longa duração."
10139-101390780 = "Isso me interessa um pouco."
10139-101390790 = "Com que ingredientes você vai fazer?"
10139-101390800 = "Hehe... eu te mostro quando estiver pronto."
