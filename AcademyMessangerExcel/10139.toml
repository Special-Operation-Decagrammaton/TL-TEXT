[translation]
10139-101390010 = "こんばんは、「FOX EATS」です！"
10139-101390020 = "ご注文いただいた商品を10分後にお届けに上がる予定です"
10139-101390030 = "ご住所の確認をもう一度お願いいたします"
10139-101390040 = "FOX EATS？"
10139-101390050 = "注文した覚えはないんだけど……。"
10139-101390060 = "ご安心ください、代金は既にお支払いいただいております！"
10139-101390070 = "先生はお席でFOX EATSが届ける夕食をお待ちいただければと"
10139-101390080 = "どうして、まだ夕食を食べてないって分かったの？"
10139-101390090 = "ふふっ、どうしてでしょうね？"
10139-101390100 = "企業秘密、ということで"
10139-101390110 = "前にも同じようなことがあったような……"
10139-101390120 = "まもなくお届けに上がります"
10139-101390130 = "安全のため、できるだけ扉から離れて、衝撃に備えておいてください"
10139-101390140 = "えっ！何！？"
10139-101390150 = "先生"
10139-101390160 = "いなり寿司は、ちゃんと食べましたか？"
10139-101390170 = "うん、食べたよ"
10139-101390180 = "美味しすぎてすぐ全部食べちゃった……"
10139-101390190 = "ふふ、よかったです"
10139-101390200 = "やっぱり、いなり寿司は少し時間をおいた方が美味しいですからね"
10139-101390210 = "また機会があったら、差し入れます"
10139-101390220 = "……でも、そのためにわざと食事を抜いたりはしないでくださいよ？"
10139-101390230 = "うん、心に刻んでおくよ"
10139-101390240 = "先生、今日の午後、お時間はありますか？"
10139-101390250 = "うん。ちょうど手が空いたところだよ"
10139-101390260 = "どうしたの、急に？"
10139-101390270 = "その……今日の午後「特殊補給作戦」をしようとしていたのですが"
10139-101390280 = "小隊のみんなが来れなくなってしまって……"
10139-101390290 = "もしよろしければ、先生にお手伝いをお願いできませんか？"
10139-101390300 = "もちろんだよ！"
10139-101390310 = "でも……私が役に立てることなんてあるかな？"
10139-101390320 = "特殊作戦なんて、何も分からないんだけど"
10139-101390330 = "大丈夫です。そこまで危険な作戦ではありませんから"
10139-101390340 = "……たぶん"
10139-101390350 = "たぶん！？"
10139-101390360 = "先生に質問です"
10139-101390370 = "「失敗する可能性のあることは、必ず失敗する」という格言をご存じでしょうか？"
10139-101390380 = "マーフィーの法則のだね"
10139-101390390 = "仕事をしていると、よく耳にするよ"
10139-101390400 = "はい。意外と共感する人が多いみたいで"
10139-101390410 = "私も昔、毎日やっていた装備点検をうっかり抜いてしまった日があって……"
10139-101390420 = "よりによってその日に限って、現場でトラブルが起きてしまって"
10139-101390430 = "なんで今日だけ……？って、思わず空を仰いじゃいました"
10139-101390440 = "私も似たようなことが何度かあったな"
10139-101390450 = "偶然って、本当に意地悪なタイミングで来るんだよね"
10139-101390460 = "その時ちょうど、関連の本を読んで知ったんですけど……"
10139-101390470 = "実はこういう法則って、良い出来事より悪い出来事のほうが記憶に残りやすいから起きる現象らしいんです"
10139-101390480 = "失敗しても何も起きなかった日のことを記憶していないといいますか"
10139-101390490 = "ちゃんと科学的な理由があったんだね"
10139-101390500 = "それってなんだか少しもったいない気もするな……"
10139-101390510 = "どうせなら、いい思い出の方を記憶したいのに"
10139-101390520 = "そうですか？私は、悪い記憶が残ったほうが良いと思います"
10139-101390530 = "失敗をちゃんと次に生かせますから……ね？"
10139-101390540 = "シャーレの倉庫に傘がたくさんあるのですが……"
10139-101390550 = "先生……あれって"
10139-101390560 = "全部、シャーレの備品なんでしょうか？"
10139-101390570 = "当番の子たちが置きっぱなしにしていった忘れ物だよ"
10139-101390580 = "気付いたら、ずいぶん溜まっちゃって……"
10139-101390590 = "なるほど"
10139-101390600 = "たしかに、帰るときに雨が降ってないとつい忘れちゃいますもんね"
10139-101390610 = "ですが、名前が書いていないから"
10139-101390620 = "持ち主を探すのは、なかなか大変そうです"
10139-101390630 = "後で持ち主に取りに来てもらえるように掲示板に書いておこうか"
10139-101390640 = "はい"
10139-101390650 = "先生の持ち物にも、失くしてもすぐ見つかるようにお名前を――"
10139-101390660 = "いえ"
10139-101390670 = "むしろ逆効果になりそうですね"
10139-101390680 = "どうして！？"
10139-101390690 = "今度の休日に、何か特別なご予定ってありますか？"
10139-101390700 = "たぶん、ゆっくり過ごすだけになると思うけど……"
10139-101390710 = "ニコは、何か予定でもあるの？"
10139-101390720 = "私も今週末は特に予定がなくて……なので新しいことに挑戦しようと思っているんです"
10139-101390730 = "もしよろしければ……週末、シャーレの調理室を貸していただけませんか？"
10139-101390740 = "今回の作戦で使う戦闘糧食を作ってみたいんです。"
10139-101390750 = "調理室なら自由に使って構わないけど……"
10139-101390760 = "戦闘糧食？"
10139-101390770 = "はい。傷みづらくて、味もあまり変わらない……保存食です"
10139-101390780 = "それはちょっと興味あるな"
10139-101390790 = "どんな材料で作るの？"
10139-101390800 = "ふふ……完成したらお見せしますね"
