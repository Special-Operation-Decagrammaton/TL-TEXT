[translation]
10139-101390010 = "Добрый вечер, на связи \"FOX EATS\"!"
10139-101390020 = "Расчётное время доставки вашего заказа — 10 минут."
10139-101390030 = "Пожалуйста, подтвердите ваш адрес ещё раз."
10139-101390040 = "FOX EATS?"
10139-101390050 = "Я не помню, чтобы что-то заказывал..."
10139-101390060 = "Не беспокойтесь, счёт уже оплачен!"
10139-101390070 = "Сенсей, вам нужно просто оставаться на месте и ждать, пока FOX EATS прибудет с ужином."
10139-101390080 = "Откуда ты узнала, что я ещё не ужинал?"
10139-101390090 = "Хе-хе, угадайте."
10139-101390100 = "Спишем это на коммерческую тайну.."
10139-101390110 = "У меня предчувствие, что нечто подобное уже происходило..."
10139-101390120 = "Уже подъезжаю."
10139-101390130 = "В целях вашей безопасности, пожалуйста, отойдите как можно дальше от двери и приготовьтесь к удару."
10139-101390140 = "А?! Что?!"
10139-101390150 = "Сенсей"
10139-101390160 = "Вы ведь уже съели инари-суши?"
10139-101390170 = "Да, съел."
10139-101390180 = "Было так вкусно, что съел всё сразу..."
10139-101390190 = "Хе-хе, я рада."
10139-101390200 = "Как я и думала, инари-суши становятся только вкуснее, если дать им немного настояться."
10139-101390210 = "Если представится случай, я приготовлю для вас ещё"
10139-101390220 = "...Но, пожалуйста, не нужно специально пропускать приёмы пищи ради этого, хорошо?"
10139-101390230 = "Хорошо, я обязательно буду это иметь в виду."
10139-101390240 = "Сенсей, у вас есть время сегодня днём?"
10139-101390250 = "Да. Как раз выдалась свободная минутка."
10139-101390260 = "А что случилось, так внезапно?"
10139-101390270 = "Ну... Я планировала провести сегодня днём \"Операцию по спецснабжению\", но..."
10139-101390280 = "Остальная часть отряда прийти не сможет..."
10139-101390290 = "Если вас не затруднит, не могли бы вы мне помочь, Сенсей?"
10139-101390300 = "Конечно!"
10139-101390310 = "Но... смогу ли я вообще чем-то помочь?"
10139-101390320 = "Я ведь абсолютно ничего не понимаю в спецоперациях."
10139-101390330 = "Всё в порядке. Это не очень опасное задание, так что не переживайте."
10139-101390340 = "...Скорее всего."
10139-101390350 = "Скорее всего!?"
10139-101390360 = "У меня к вам вопрос, Сенсей."
10139-101390370 = "Знаете ли вы поговорку: \"Если что-то может пойти не так, оно пойдёт не так\"?"
10139-101390380 = "Это же закон Мёрфи."
10139-101390390 = "Я часто слышу о нём на работе."
10139-101390400 = "Да. Похоже, удивительно многим людям это знакомо."
10139-101390410 = "Как-то раз я случайно пропустила ежедневный осмотр снаряжения..."
10139-101390420 = "И надо же было такому случиться, что именно в тот день на задании возникли проблемы."
10139-101390430 = "Я тогда просто смотрела на небо и думала: \"Ну почему именно сегодня...?\""
10139-101390440 = "У меня тоже такое бывало пару раз."
10139-101390450 = "Подобные совпадения всегда случаются в самый неподходящий момент."
10139-101390460 = "Я как раз читала книгу на эту тему и узнала..."
10139-101390470 = "Оказывается, этот закон работает просто потому, что плохие события запоминаются легче, чем хорошие."
10139-101390480 = "Точнее, мы просто не помним те дни, когда мы совершили ошибку, но ничего плохого не случилось."
10139-101390490 = "Так что у этого есть вполне научное объяснение."
10139-101390500 = "И всё равно от этого как-то немного обидно..."
10139-101390510 = "Если уж и помнить что-то, то лучше приятные моменты."
10139-101390520 = "Вы так думаете? А мне кажется, хорошо, что плохие воспоминания остаются."
10139-101390530 = "Ведь мы можем учиться на своих ошибках и использовать этот опыт в будущем... верно?"
10139-101390540 = "В кладовой Шале так много зонтов..."
10139-101390550 = "Сенсей... это всё"
10139-101390560 = "имущество Шале?"
10139-101390570 = "Это потеряшки, которые оставили дежурившие здесь студенты."
10139-101390580 = "Я и сам не заметил, как их накопилась целая гора..."
10139-101390590 = "Понимаю."
10139-101390600 = "Действительно, если на обратном пути дождь уже закончился, про них легко забываешь."
10139-101390610 = "Но так как на них не написаны имена,"
10139-101390620 = "найти владельцев будет довольно непросто."
10139-101390630 = "Может, мне написать объявление на доске, чтобы владельцы могли их забрать?"
10139-101390640 = "Да."
10139-101390650 = "Надо бы и на ваши вещи прикрепить бирку с именем, Сенсей, чтобы в случае потери их сразу вернули..."
10139-101390660 = "Не надо."
10139-101390670 = "Боюсь, эффект будет прямо противоположным."
10139-101390680 = "Почему!?"
10139-101390690 = "У вас есть какие-нибудь особые планы на следующий выходной?"
10139-101390700 = "Думаю, буду просто отдыхать..."
10139-101390710 = "А у тебя есть планы, Нико?"
10139-101390720 = "У меня на выходные тоже ничего особенного не запланировано... так что я хочу попробовать кое-что новое."
10139-101390730 = "Если вы не против... могу я одолжить кухню Шале в эти выходные?"
10139-101390740 = "Я хочу попробовать приготовить боевые рационы для нашей следующей операции."
10139-101390750 = "Кухней можешь пользоваться сколько угодно, но..."
10139-101390760 = "Боевые рационы?"
10139-101390770 = "Да. Они долго не портятся, а вкус почти не меняется со временем... в общем, консервированные продукты."
10139-101390780 = "Мне даже стало немного любопытно."
10139-101390790 = "Из каких ингредиентов ты их делаешь?"
10139-101390800 = "Хе-хе... Я покажу вам, когда всё будет готово."