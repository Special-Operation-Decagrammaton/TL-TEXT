[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10139-101390010 = "Boa noite! Aqui é a \"FOX EATS\"!"
10139-101390020 = "Seu pedido tá a caminho e chega em uns 10 minutinhos."
10139-101390030 = "Confirma o endereço de entrega pra mim, por favorzinho?"
10139-101390040 = "FOX EATS?"
10139-101390050 = "Ué, mas eu não pedi nada..."
10139-101390060 = "Fica tranquilo, já tá tudo pago!"
10139-101390070 = "É só o Sensei sentar e esperar a jantinha\nque a FOX EATS tá levando."
10139-101390080 = "Como você sabia que eu ainda não jantei?"
10139-101390090 = "Hehe, como será, né?"
10139-101390100 = "Vamos dizer que é segredo de empresa."
10139-101390110 = "Tô com um déjà vu, acho que isso já aconteceu antes..."
10139-101390120 = "Tamo chegando."
10139-101390130 = "Por questão de segurança, fica longe\nda porta e se prepara pro impacto."
10139-101390140 = "Eita! Peraí, O QUÊ?!"
10139-101390150 = "Sensei"
10139-101390160 = "Comeu o inarizushi direitinho?"
10139-101390170 = "Uhum, comi sim."
10139-101390180 = "Tava tão bom que eu amassei tudo rapidinho..."
10139-101390190 = "Hehe, que bom."
10139-101390200 = "Inarizushi fica bem mais gostoso depois\nde descansar um pouquinho, né?"
10139-101390210 = "Qualquer dia desses eu levo mais\numa marmitinha pra você."
10139-101390220 = "...Mas vê se não vai pular refeição de\npropósito só pra ganhar comida, hein?"
10139-101390230 = "Pode deixar, tá anotado."
10139-101390240 = "Sensei, você tá livre hoje à tarde?"
10139-101390250 = "Tô sim. Acabei de me livrar dos trampos aqui."
10139-101390260 = "Por que a pergunta do nada?"
10139-101390270 = "É que... Eu ia fazer uma \"Operação\nEspecial de Suprimentos\" hoje à tarde,"
10139-101390280 = "Mas as meninas do esquadrão deram o cano..."
10139-101390290 = "Se não for pedir muito, você não\nquer me dar uma mãozinha?"
10139-101390300 = "Claro que sim!"
10139-101390310 = "Mas... será que eu sirvo pra alguma coisa?"
10139-101390320 = "Eu não manjo nada dessas operações especiais."
10139-101390330 = "Relaxa. Não é uma missão tão perigosa assim não."
10139-101390340 = "...Eu acho."
10139-101390350 = "COMO ASSIM \"EU ACHO\"?!"
10139-101390360 = "Uma perguntinha, Sensei."
10139-101390370 = "Você conhece aquele ditado que diz\n\"Se algo pode dar errado, dará\"?"
10139-101390380 = "Lei de Murphy, né?"
10139-101390390 = "Escuto muito isso no trampo."
10139-101390400 = "Pois é. A galera se identifica bastante com isso."
10139-101390410 = "Teve um dia no passado que eu esqueci de fazer a\nchecagem dos equipamentos que eu fazia todo santo dia..."
10139-101390420 = "E, pra ajudar, BEM naquele dia deu B.O. no meio da missão."
10139-101390430 = "Eu olhei pro céu e pensei:\n\"Por que justo hoje, cara...?\""
10139-101390440 = "Pior que já rolou umas paradas parecidas comigo."
10139-101390450 = "O universo adora sacanear a gente\nno pior momento possível, né."
10139-101390460 = "Na época eu tava lendo um livro\nsobre isso e descobri uma coisa..."
10139-101390470 = "Na verdade, essa lei parece que só acontece porque\nnosso cérebro guarda mais as coisas ruins do que as boas."
10139-101390480 = "Tipo, a gente não lembra daquele dia que a gente\nvacilou mas acabou não dando em nada ruim, sabe?"
10139-101390490 = "Olha só, tem toda uma explicação científica por trás."
10139-101390500 = "Mas isso é meio triste, né..."
10139-101390510 = "Sacanagem o cérebro não focar nas lembranças boas."
10139-101390520 = "Você acha? Eu já acho bom que a\ngente lembre das coisas ruins."
10139-101390530 = "Assim a gente aprende com os erros\npra não fazer de novo... não é?"
10139-101390540 = "Sensei, tem um monte de guarda-chuva\nlá no depósito da Schale..."
10139-101390550 = "Aquelas coisas..."
10139-101390560 = "Tudo aquilo é patrimônio da Schale?"
10139-101390570 = "Que nada, são os que as alunas de\nplantão esquecem por aqui."
10139-101390580 = "Quando eu fui ver, já tinha virado uma\nmontanha de guarda-chuva..."
10139-101390590 = "Ah, entendi."
10139-101390600 = "Pior que é verdade, se não tá chovendo na\nhora de ir embora, o pessoal esquece mesmo."
10139-101390610 = "O duro é que nenhum tem nome."
10139-101390620 = "Vai ser um sufoco achar a dona de cada um."
10139-101390630 = "Vou botar um aviso no mural pra\nver se elas vêm buscar depois."
10139-101390640 = "Boa ideia."
10139-101390650 = "A gente devia colocar etiqueta com o seu nome nas\nsuas coisas também, Sensei, pra caso você perca..."
10139-101390660 = "Pensando bem..."
10139-101390670 = "Acho que isso ia dar um tiro pela culatra."
10139-101390680 = "Ué, por quê?!"
10139-101390690 = "Sensei, cê tem algum plano\nespecial pra esse fim de semana?"
10139-101390700 = "Acho que vou só ficar de boas em casa mesmo..."
10139-101390710 = "E você, Niko, tem algum plano?"
10139-101390720 = "Eu também tô sem nada marcado...\nentão tava pensando em tentar uma coisa nova."
10139-101390730 = "Se não for incômodo... você poderia me emprestar\na cozinha da Schale no fim de semana?"
10139-101390740 = "Queria testar umas receitas de ração\nde combate pra nossa próxima missão."
10139-101390750 = "Pode usar a cozinha à vontade, mas..."
10139-101390760 = "Ração de combate?"
10139-101390770 = "Isso. Comida que dura bastante e não perde\nmuito o gosto... alimento não perecível."
10139-101390780 = "Opa, agora fiquei curioso."
10139-101390790 = "Vai fazer do quê?"
10139-101390800 = "Hihi... Deixa ficar pronto que eu te mostro."