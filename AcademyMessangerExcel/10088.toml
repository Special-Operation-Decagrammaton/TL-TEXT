[translation]
10088-100880010 = "Como posso dizer..."
10088-100880020 = "Eu já esperava, mas... essa multidão é um pouco cansativa."
10088-100880030 = "O trabalho por agora acabou."
10088-100880040 = "Acho que vou descansar um pouco."
10088-100880050 = "Kayoko, você também vai fazer uma pausa?"
10088-100880060 = "Conhece algum lugar bom?"
10088-100880070 = "Huhu."
10088-100880080 = "Sensei, você também se cansou."
10088-100880090 = "...É verdade."
10088-100880100 = "Conheço um lugar perfeito."
10088-100880110 = "Sensei."
10088-100880120 = "Só pra avisar..."
10088-100880130 = "Se precisar de mim de novo, é só chamar."
10088-100880140 = "Não se preocupe, vou manter em segredo."
10088-100880150 = "Uhum."
10088-100880160 = "Obrigada."
10088-100880170 = "Sensei."
10088-100880180 = "Você disse que viria ao escritório hoje, né?"
10088-100880190 = "Sim. Apareceu algum trabalho urgente?"
10088-100880200 = "Não."
10088-100880210 = "É que, nesse horário, acho que ainda não vai ter ninguém lá."
10088-100880220 = "Eu vou abrir o escritório pra você."
10088-100880230 = "Então, estarei esperando."
10088-100880240 = "Sensei."
10088-100880250 = "Você tem um tempo mais tarde?"
10088-100880260 = "Kayoko?"
10088-100880270 = "O que foi?"
10088-100880280 = "Não é..."
10088-100880290 = "Não é nada demais, mas..."
10088-100880300 = "Eu queria retribuir o favor do outro dia."
10088-100880310 = "Enfim, me diga quando for bom pra você."
10088-100880320 = "Eu me ajusto ao seu horário."
10088-100880330 = "Ah."
10088-100880340 = "Esqueci de dizer uma coisa."
10088-100880350 = "Uhm..."
10088-100880360 = "...Kayoko?"
10088-100880370 = "O que você esqueceu de dizer?"
10088-100880380 = "Uhm..."
10088-100880390 = "Pensando bem..."
10088-100880400 = "Acho que agora não é uma boa hora."
10088-100880410 = "Depois..."
10088-100880420 = "Eu falo com você de novo."
10088-100880430 = "Então..."
10088-100880440 = "Até mais, Sensei."
