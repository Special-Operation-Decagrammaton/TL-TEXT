[translation]
10067-100670010 = "Sensei."
10067-100670020 = "Você está aí?"
10067-100670030 = "Ah, Toki? O que foi?"
10067-100670040 = "Sim, sou eu."
10067-100670050 = "Eu tenho um pedido especial a fazer, tudo bem?"
10067-100670060 = "Se for um pedido da Toki, eu atendo qualquer um."
10067-100670070 = "É bom não se esquecer dessas palavras."
10067-100670080 = "Espera um pouco! Deixa eu ouvir o pedido primeiro antes de decidir...?"
10067-100670090 = "Sensei, você estará No Schale hoje também, certo?"
10067-100670100 = "Nesse caso, farei uma visita hoje também."
10067-100670110 = "Tudo bem?"
10067-100670120 = "Um motivo para recusar a visita de uma aluna..."
10067-100670130 = "...não existe, né..."
10067-100670140 = "Huhu."
10067-100670150 = "Está tão feliz assim?"
10067-100670160 = "Sendo assim, irei o mais rápido possível. Até mais tarde."
10067-100670170 = "Preparativos para o assalto concluídos."
10067-100670180 = "Aguardando suas ordens."
10067-100670190 = "Toki...?"
10067-100670200 = "Iniciando combate."
10067-100670210 = "Cortando a comunicação."
10067-100670220 = "Toki!?"
