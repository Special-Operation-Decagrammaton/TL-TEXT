[translation]
10047-100470010 = "先生、レッツバケーション"
10047-100470020 = "バケーション……？"
10047-100470030 = "うん、貰ったの。夏休み"
10047-100470040 = "いつも陰陽部の活動、頑張ってるから"
10047-100470050 = "ゆっくり休んできて、って"
10047-100470060 = "なるほど。それは良かったね"
10047-100470070 = "何か夏休みの予定とかあるの？"
10047-100470080 = "うん、それはもう"
10047-100470090 = "どんな予定なのか、聞いても良い？"
10047-100470100 = "探しに行こう、先生"
10047-100470110 = "探すって、何を？"
10047-100470120 = "じゃあ、集合"
10047-100470130 = "海で待ってるね"
10047-100470140 = "え、えっと、チセ……？"
10047-100470150 = "とりあえず、海に行けば良いのかな…?"
10047-100470160 = "先生。この間きらきらを探した時にね"
10047-100470170 = "海辺で、すごいものを見つけたの"
10047-100470180 = "気になる……！"
10047-100470190 = "うん、私も先生に見せたいな"
10047-100470200 = "せっかくだし"
10047-100470210 = "一緒に見に行こう、先生"
10047-100470220 = "じゃあ、待ってるね～"
10047-100470230 = "先生"
10047-100470240 = "あ、チセ。どうしたの？"
10047-100470250 = "ちゃんと歯磨きしてる？"
10047-100470260 = "は、はい"
10047-100470270 = "それはまた、どうして急に……？"
10047-100470280 = "それは良かった"
10047-100470290 = "じゃあ先生"
10047-100470300 = "これからも、1日3回"
10047-100470310 = "歯磨き、忘れないようにね？"
10047-100470320 = "そ、そうだね。了解"
10047-100470330 = "それじゃあ……"
10047-100470340 = "元気でね、先生"
10047-100470350 = "……チセ？"
10047-100470360 = "先生、海辺で遊ぶのは楽しいね～"
10047-100470370 = "チセが楽しそうで何よりだよ"
10047-100470380 = "うん、でも……"
10047-100470390 = "やっぱり、一人で楽しむのはもったいない～"
10047-100470400 = "分かるかも、その気持ち"
10047-100470410 = "誰かと一緒なら、もっと楽しいよね"
10047-100470420 = "あ、いいこと考えた"
10047-100470430 = "みんなで海に来られないなら……"
10047-100470440 = "来られないなら……？"
10047-100470450 = "逆に、私が海を持っていけば良いんだ～"
10047-100470460 = "よ～し、そうと決まればさっそく～"
10047-100470470 = "……ん？チセ？海を持っていくって……？"
10047-100470480 = "すた～と～"
10047-100470490 = "ちょ、ちょっと待って！すぐそっちに行くから！"
