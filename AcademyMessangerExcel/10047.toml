[translation]
10047-100470010 = "Sensei, vamos tirar férias!"
10047-100470020 = "Férias...?"
10047-100470030 = "Sim, eu ganhei. Férias de verão."
10047-100470040 = "Porque eu sempre me esforço nas atividades do Clube Onmyo."
10047-100470050 = "Disseram para eu descansar bem."
10047-100470060 = "Entendi. Que bom para você."
10047-100470070 = "Você tem algum plano para as férias de verão?"
10047-100470080 = "Sim, com certeza."
10047-100470090 = "Posso perguntar quais são os seus planos?"
10047-100470100 = "Vamos procurar, Sensei."
10047-100470110 = "Procurar? O quê?"
10047-100470120 = "Então, vamos nos encontrar."
10047-100470130 = "Estarei esperando na praia, tá?"
10047-100470140 = "Eh, uhm, Chise...?"
10047-100470150 = "Por enquanto, acho que devo ir para a praia...?"
10047-100470160 = "Sensei. Outro dia, quando eu estava procurando por coisas brilhantes..."
10047-100470170 = "Eu encontrei algo incrível na praia."
10047-100470180 = "Fiquei curioso...!"
10047-100470190 = "Sim, eu também quero mostrar para você, Sensei."
10047-100470200 = "É uma boa oportunidade."
10047-100470210 = "Vamos ver juntos, Sensei."
10047-100470220 = "Então, estarei esperando, tá~"
10047-100470230 = "Sensei."
10047-100470240 = "Ah, Chise. O que foi?"
10047-100470250 = "Você está escovando os dentes direitinho?"
10047-100470260 = "S-Sim."
10047-100470270 = "Mas por que essa pergunta tão de repente...?"
10047-100470280 = "Que bom."
10047-100470290 = "Então, Sensei."
10047-100470300 = "De agora em diante, três vezes ao dia."
10047-100470310 = "Não se esqueça de escovar os dentes, ok?"
10047-100470320 = "C-Certo. Entendido."
10047-100470330 = "Então..."
10047-100470340 = "Se cuida, Sensei."
10047-100470350 = "...Chise?"
10047-100470360 = "Sensei, é divertido brincar na praia, né~"
10047-100470370 = "Fico feliz que você esteja se divertindo, Chise."
10047-100470380 = "Sim, mas..."
10047-100470390 = "Ainda assim, é um desperdício se divertir sozinha~"
10047-100470400 = "Acho que entendo esse sentimento."
10047-100470410 = "Se estiver com alguém, é mais divertido, né?"
10047-100470420 = "Ah, tive uma boa ideia."
10047-100470430 = "Se não podemos vir todos para a praia..."
10047-100470440 = "Se não podemos vir...?"
10047-100470450 = "Então, ao contrário, eu só preciso levar o mar até eles~"
10047-100470460 = "Certo~, se está decidido, vamos começar~"
10047-100470470 = "...Hã? Chise? Levar o mar...?"
10047-100470480 = "Começar~"
10047-100470490 = "Es-Espera um pouco! Já estou indo aí!"
