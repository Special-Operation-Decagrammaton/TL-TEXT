[translation]
10035-100350010 = "Ah..."
10035-100350020 = "Estou em apuros..."
10035-100350030 = "É por isso que as pessoas de fora..."
10035-100350040 = "O que foi?"
10035-100350050 = "Ui?"
10035-100350060 = "É que..."
10035-100350070 = "Não é nada demais, mas... é que ontem, quando interagi com algumas pessoas de fora..."
10035-100350080 = "Não, por favor, finja que não ouviu..."
10035-100350090 = "Ah, claro que não estou falando de você, Sensei."
10035-100350100 = "Só para garantir..."
10035-100350110 = "Muito obrigada, Sensei. Graças a você, o dia hoje foi divertido."
10035-100350120 = "Pode me contatar quando quiser. Estarei esperando."
10035-100350130 = "Sim, vou te contatar em breve."
10035-100350140 = "Ver a Ui daquele jeito talvez não seja tão ruim."
10035-100350150 = "..."
10035-100350160 = "Eh, ah, bem..."
10035-100350170 = "..."
10035-100350180 = "... S-sim."
10035-100350190 = "Sensei."
10035-100350200 = "Você está livre agora?"
10035-100350210 = "Sim, o que foi?"
10035-100350220 = "Na verdade..."
10035-100350230 = "Se possível, eu gostaria de pedir sua ajuda..."
10035-100350240 = "É que... não sei se posso pedir esse tipo de coisa para você, Sensei."
10035-100350250 = "Eu realmente não sei, mas..."
10035-100350260 = "Uma amiga próxima desapareceu."
10035-100350270 = "Vou correndo para a Biblioteca Antiga."
10035-100350280 = "Estou indo agora."
10035-100350290 = "Não."
10035-100350300 = "Sensei, é que..."
10035-100350310 = "A conversa..."
10035-100350320 = "Muito obrigada por hoje, Sensei."
10035-100350330 = "Até tão tarde..."
10035-100350340 = "Bem..."
10035-100350350 = "E por todo o resto, eu diria... Muito obrigada."
10035-100350360 = "Sensei, você tem um momento?"
10035-100350370 = "Eu tenho uma pequena proposta, por assim dizer..."
10035-100350380 = "\"Proposta\"?"
10035-100350390 = "Estou livre, mas o que foi?"
10035-100350400 = "Obrigada."
10035-100350410 = "Então, vou me preparar."
10035-100350420 = "Pode vir quando quiser."
10035-100350430 = "Sensei, desculpe a mensagem repentina, mas..."
10035-100350440 = "Posso te pedir um favor?"
10035-100350450 = "Claro, o que foi?"
10035-100350460 = "Sim, aconteceu alguma coisa?"
10035-100350470 = "Não é nada demais... Não, me desculpe por pedir algo dizendo que \"não é nada demais\"..."
10035-100350480 = "Uhm, bem..."
10035-100350490 = "Vou deixar a porta aberta."
10035-100350500 = "Eu ficaria muito grata se você pudesse trazer uma bebida energética e algum chiclete que ajude a despertar..."
10035-100350510 = "Me desculpe."
10035-100350520 = "Acabei pegando no sono sem perceber."
10035-100350530 = "Depois de ter te chamado aqui de repente,"
10035-100350540 = "eu nem consegui me despedir direito..."
10035-100350550 = "Não se preocupe com isso. Descanse bem."
10035-100350560 = "Pode me chamar quando quiser."
10035-100350570 = "Sim."
10035-100350580 = "Graças a você, acho que o trabalho será mais divertido de agora em diante."
10035-100350590 = "Hum..."
10035-100350600 = "Se não for um incômodo para o Sensei,"
10035-100350610 = "volte quando quiser, por favor."
10035-100350620 = "Então, tenha um ótimo dia amanhã."
