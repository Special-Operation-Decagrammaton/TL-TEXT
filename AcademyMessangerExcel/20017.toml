[translation]
20017-200170010 = "Sensei, olá. Ehehe..."
20017-200170020 = "Hum, é a conta do Sensei, certo?"
20017-200170030 = "Hiyori?"
20017-200170040 = "Ehehe... Sim. Hum, agora estou sem"
20017-200170060 = "...?"
20017-200170070 = "...Hiyori?"
20017-200170080 = "Wi-Fi gratuito... ehehe."
20017-200170090 = "Dá para dizer que ainda tenho um jeito de sobreviver..."
20017-200170100 = "Hum... então, o que o Sensei está fazendo agora?"
20017-200170110 = "Sensei?"
20017-200170120 = "Ué, por que não está respondendo?"
20017-200170130 = "...Finalmente, eu fui abandonada pelo Sensei também."
20017-200170140 = "É isso, né? Acabou, é realmente o fim, uaaaaaah"
20017-200170150 = "Hiyori, calma, vamos verificar a conexão."
20017-200170160 = "Talvez o Wi-Fi gratuito esteja demorando para receber as mensagens."
20017-200170170 = "Ah, é, verdade. O Wi-Fi caiu..."
20017-200170180 = "Era isso então..."
20017-200170190 = "Desculpe..."
20017-200170200 = "Sensei... ehehe, olá."
20017-200170210 = "Hoje é um dia de sorte."
20017-200170220 = "Até na minha vida, que é como um cogumelo crescendo em uma marmita estragada de loja de conveniência... coisas assim acontecem."
20017-200170230 = "Aconteceu algo de bom?"
20017-200170240 = "Sim! Na verdade, hoje..."
20017-200170250 = "Ah, talvez seja mais fácil se você ver. Espere um pouco..."
20017-200170260 = "Vou enviar uma foto."
20017-200170270 = "Sensei, consegue ver isso?"
20017-200170280 = "A imagem não foi enviada...? Ué, por quê?"
20017-200170290 = "Uaaaaa! O Wi-Fi caiu de novo!"
20017-200170300 = "Eu sabia que isso ia acontecer! É tão doloroso... é como se..."
20017-200170310 = "...Espere, vamos nos encontrar para conversar."
20017-200170320 = "Este celular que nem consegue enviar uma imagem, assim como a minha vida... espera, o quê!? V-você vai vir?"
20017-200170330 = "...Sensei. Pensando bem, acho que não cheguei a agradecer..."
20017-200170340 = "M-muito obrigada..."
20017-200170350 = "Se os outros souberem que recebi ajuda do Sensei de novo, vão me dar uma bronca..."
20017-200170360 = "Vou manter a revista que você comprou como um segredo só meu..."
20017-200170370 = "Sensei! Na última edição da \"ron-ro\"..."
20017-200170380 = "\"10 segredos que a escola nunca te ensina\""
20017-200170390 = "Parece que tem uma matéria especial sobre isso!!"
20017-200170400 = "Hum... é, é mesmo?"
20017-200170410 = "Segredos que a escola nunca te ensina..."
20017-200170420 = "O que será que é...? O Sensei sabe?"
20017-200170430 = "Eu também não faço ideia..."
20017-200170440 = "Pois é... quem sabe, né?"
20017-200170450 = "O que será que é, se nem o Sensei sabe!?"
20017-200170460 = "Normalmente leva meses para a última edição virar papel velho..."
20017-200170470 = "Como vou esperar todo esse tempo... acabou, é o fim do mundo."
20017-200170480 = "Quando estou sozinha, não tenho nada para fazer além de ler revistas..."
