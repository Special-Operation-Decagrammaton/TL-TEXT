[translation]
10128-101280010 = "お久しぶりです、先生"
10128-101280020 = "明日は外出の予定なので"
10128-101280030 = "ご入り用のものがありましたら、承りますよ"
10128-101280040 = "ううん……特にないよ"
10128-101280050 = "承知しました"
10128-101280060 = "それでは、またのご利用をお待ちしております！"
10128-101280070 = "まだ利用したことないよ……！？"
10128-101280080 = "先生"
10128-101280090 = "投石機は、なぜ壊れやすいのでしょう？"
10128-101280100 = "攻城戦でもやってるの……？"
10128-101280110 = "いえ、もっと素敵なことですよ。"
10128-101280120 = "……特殊交易部の活動？"
10128-101280130 = "その通りです！よくご存知で！"
10128-101280140 = "ご無沙汰しております、先生"
10128-101280150 = "今週、当番としてお伺いする予定なので"
10128-101280160 = "事前にご連絡させていただきました！"
10128-101280170 = "あれ、フユって今週当番だっけ……？"
10128-101280180 = "ふふ"
10128-101280190 = "フユ……？"
10128-101280200 = "先生"
10128-101280210 = "よかったら展覧会に行きませんか？"
10128-101280220 = "うん？"
10128-101280230 = "では、セイント＆メディカル付属アートセンターのA館で！"
10128-101280240 = "行くって言ってないけど！？"
