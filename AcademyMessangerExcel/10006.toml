[translation]
10006-520 = "先生、あの噂聞いた？"
10006-521 = "何の噂？"
10006-522 = "女子生徒のスカートを覗こうとするヘンタイが出没してる、って噂があって"
10006-523 = "まったく、嘆かわしい世の中だ"
10006-524 = "それは大変だね"
10006-525 = "先生も、もし怪しいヘンタイを見かけたら、すぐ風紀委員会に連絡して"
10006-526 = "分かった、任せて"
10006-527 = "先生最近、ゲヘナによく出張に来てるみたいだけど……"
10006-528 = "このところ、ゲヘナ学園に関する仕事が多くって"
10006-529 = "イオリちゃんに会いたくって、つい……"
10006-530 = "……そうなんだ。お疲れ様"
10006-531 = "……は？何を言ってるんだ？"
10006-532 = "でも実際、学園ではあまり会わないな"
10006-533 = "出張に来る時は、どこにいるんだ？"
10006-534 = "校庭とか"
10006-535 = "……校庭？何のために？"
10006-536 = "今度会った時に教えてあげるね"
10006-537 = "なんか、怪しいな……"
10006-538 = "報告だと最近、ブラックマーケットで密輸品の取引量が増えてるらしい"
10006-539 = "生活に必要なものなら、普通のマーケットで何でも手に入るのに……"
10006-540 = "いったいブラックマーケットで、どんな取引が行われてるんだ？"
10006-541 = "私は知らないなあ、興味も無いし……"
10006-542 = "それはそうだろうな"
10006-543 = "普通の人がブラックマーケットに足を踏み入れることなんてそうそう無い"
10006-544 = "先生も、ブラックマーケットの悪党たちとは関わらないよう気を付けて"
10006-545 = "うん、肝に銘じるね"
10006-546 = "……先生、本当に私の卒業アルバムを変なことに使ったりしないだろうな？"
10006-547 = "先生を信じて渡したんだから……他の人に見せたりするなよ！"
10006-548 = "……ねえ、イオリ"
10006-549 = "ん？なに？"
10006-550 = "小学生の時のイオリも可愛い"
10006-551 = "うるさい！死ね！"
10006-552 = "今日の風紀委員会の活動では世話になった、ありがとう"
10006-553 = "私の方こそありがとう"
10006-554 = "イオリはもちろん、ゲヘナの風紀委員にも色々助けてもらったから"
10006-555 = "先生は私たちと違って、銃で撃たれたら本当に危ないんだから"
10006-556 = "ああいう危険な任務なら、私たちが一緒に行くのは当たり前"
10006-557 = "うん、ありがとね。そういえばイオリ、"
10006-558 = "さっき作戦中に背中を怪我してなかった？"
10006-559 = "ああ……そういえばそうだった"
10006-560 = "気にしないで、大した怪我じゃない"
10006-561 = "先生、このメッセージを見たら、ゲヘナ正門前の住宅街3丁目に……"
10006-562 = "ちょっと……アクシデントがあって"
10006-563 = "アクシデントって、どんな？"
10006-564 = "いいから、早く来て！"
10006-565 = "あと！他の生徒たちには、絶対に私がここにいるって言うなよ！"
10006-566 = "先生！！"
10006-567 = "さっき送られてきてたこの写真、何でまだ持ってるんだ！！"
10006-569 = "よく撮れてるから、もしかしたら欲しいかなって"
10006-570 = "可愛くない？"
10006-571 = "いるか！！！！！"
10006-572 = "そういう問題じゃない！"
10006-573 = "消してって言ったじゃん！"
10006-574 = "何でまだ持ってるんだ！"
10006-575 = "消して！今すぐ！"
10006-576 = "聞いてる！？ちょっと！！"
