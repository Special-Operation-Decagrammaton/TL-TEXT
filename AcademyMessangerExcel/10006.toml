[translation]
10006-520 = "Sensei, você ouviu aquele boato?"
10006-521 = "Que boato?"
10006-522 = "Tem um boato de que um pervertido anda aparecendo por aí, tentando espiar as saias das alunas."
10006-523 = "Francamente, que mundo deplorável."
10006-524 = "Isso é terrível."
10006-525 = "Sensei, se você vir algum pervertido suspeito, entre em contato com o Comitê de Disciplina imediatamente."
10006-526 = "Entendido, pode deixar comigo."
10006-527 = "Sensei, parece que você tem vindo muito a Gehenna em viagens de negócios ultimamente..."
10006-528 = "É que ultimamente tenho tido muito trabalho relacionado à Academia Gehenna."
10006-529 = "É que eu queria ver a Iori e acabei vindo..."
10006-530 = "...Entendi. Bom trabalho."
10006-531 = "...Hã? Do que você está falando?"
10006-532 = "Mas, na verdade, a gente não se vê muito na academia."
10006-533 = "Onde você fica quando vem em viagem de negócios?"
10006-534 = "No pátio da escola, por exemplo."
10006-535 = "...No pátio? Pra quê?"
10006-536 = "Eu te conto da próxima vez que a gente se encontrar."
10006-537 = "Isso é meio suspeito..."
10006-538 = "Segundo os relatórios, o volume de contrabando no Mercado Clandestino tem aumentado recentemente."
10006-539 = "Mas dá pra conseguir qualquer coisa necessária para o dia a dia nos mercados normais..."
10006-540 = "Que tipo de transações será que acontecem no Mercado Clandestino?"
10006-541 = "Eu não sei, e também não tenho interesse..."
10006-542 = "É, faz sentido."
10006-543 = "Não é todo dia que uma pessoa comum pisa no Mercado Clandestino."
10006-544 = "Sensei, tome cuidado para não se envolver com os bandidos do Mercado Clandestino."
10006-545 = "Sim, vou manter isso em mente."
10006-546 = "...Sensei, você não vai usar meu álbum de formatura pra nada estranho, vai?"
10006-547 = "Eu confiei em você e te entreguei... Não mostre pra mais ninguém!"
10006-548 = "...Ei, Iori."
10006-549 = "Hm? O quê?"
10006-550 = "A Iori do fundamental também era fofa."
10006-551 = "Cala a boca! Morra!"
10006-552 = "Obrigado pela ajuda nas atividades do Comitê de Disciplina de hoje."
10006-553 = "Eu que agradeço."
10006-554 = "A Iori, claro, e todo o Comitê de Disciplina de Gehenna me ajudaram muito."
10006-555 = "Diferente de nós, se você levar um tiro, Sensei, é muito perigoso."
10006-556 = "Em missões perigosas como aquela, é natural que a gente vá junto."
10006-557 = "Sim, obrigado. Falando nisso, Iori,"
10006-558 = "Você não machucou as costas durante a operação mais cedo?"
10006-559 = "Ah... Agora que você falou, é verdade."
10006-560 = "Não se preocupe, não foi nada grave."
10006-561 = "Sensei, quando vir esta mensagem, venha para o distrito residencial 3, em frente ao portão principal de Gehenna..."
10006-562 = "É que... aconteceu um imprevisto."
10006-563 = "Que tipo de imprevisto?"
10006-564 = "Não importa, só venha logo!"
10006-565 = "E mais uma coisa! Não diga a nenhuma outra aluna que eu estou aqui, de jeito nenhum!"
10006-566 = "SENSEI!!"
10006-567 = "Por que você ainda tem essa foto que te mandaram mais cedo?!"
10006-569 = "É que a foto ficou boa, achei que talvez você quisesse."
10006-570 = "Não é fofa?"
10006-571 = "Até parece!!!!!"
10006-572 = "Não é essa a questão!"
10006-573 = "Eu falei pra apagar!"
10006-574 = "Por que você ainda tem isso?!"
10006-575 = "Apague! Agora mesmo!"
10006-576 = "Tá me escutando!? Ei!!"
