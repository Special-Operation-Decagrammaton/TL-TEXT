[translation]
10130-101300010 = "Este número..."
10130-101300020 = "É o do Sensei, certo?"
10130-101300030 = "Entrei em contato para confirmar."
10130-101300040 = "Está certo, tudo bem."
10130-101300050 = "Que bom."
10130-101300060 = "Vou relatar as últimas notícias."
10130-101300070 = "Aconteceram várias coisas,"
10130-101300080 = "e acabei ficando encarregada de patrulhar Arius."
10130-101300090 = "Patrulhar?"
10130-101300100 = "Sim."
10130-101300110 = "Só para te manter informado, por enquanto."
10130-101300120 = "Entendi."
10130-101300130 = "Então, sem demora,"
10130-101300140 = "precisamos ir para Arius!"
10130-101300150 = "Hã?"
10130-101300160 = "Por que?"
10130-101300170 = "Bom dia, Sensei."
10130-101300180 = "Hoje é o dia da Subaru no turno, não é?"
10130-101300190 = "Sim, é verdade."
10130-101300200 = "Sobre o trabalho na Schale,"
10130-101300210 = "pesquisei bastante de antemão."
10130-101300220 = "Estou preparada."
10130-101300230 = "Está um pouco nervosa?"
10130-101300240 = "Não."
10130-101300250 = "Nem um pouco."
10130-101300260 = "Como eu poderia ficar nervosa?"
10130-101300270 = "Você não está me subestimando?"
10130-101300280 = "Entendi."
10130-101300290 = "Vou deixar assim!"
10130-101300300 = "Sensei...?"
10130-101300310 = "É a política da academia, ou melhor..."
10130-101300320 = "Acabei pegando um trabalho de meio período."
10130-101300330 = "A Subaru trabalhando de meio período!!?"
10130-101300340 = "Você está surpreso demais!"
10130-101300350 = "É embaraçoso, por favor, pare!"
10130-101300360 = "Eu só fiz o que era óbvio, mas recebi uma recompensa extra."
10130-101300370 = "Não entendo bem o mundo exterior..."
10130-101300380 = "É que não é fácil encontrar alguém que consiga fazer coisas assim..."
10130-101300390 = "...E é assim que o mundo funciona de verdade?"
10130-101300400 = "...Sim, surpreendentemente."
10130-101300410 = "Bem, agora entendo ainda menos..."
10130-101300420 = "Olá, Sensei."
10130-101300430 = "Hoje é feriado, como você está passando?"
10130-101300440 = "Consegui terminar o trabalho ontem, então..."
10130-101300450 = "Hoje posso descansar..."
10130-101300460 = "Adultos não podem descansar até terminarem o trabalho, não é..."
10130-101300470 = "É difícil... Acho que vou virar criança."
10130-101300480 = "Subaru-senpai, me dá um lanche!"
10130-101300490 = "O que você está dizendo!? Ah..."
10130-101300500 = "Quanto a mim..."
10130-101300510 = "Graças ao dinheiro do meu último trabalho de meio período,"
10130-101300520 = "consegui um pouco de folga,"
10130-101300530 = "mas não sei no que gastar."
10130-101300540 = "Não há nada que você queira fazer ou comprar?"
10130-101300550 = "Hã?"
10130-101300560 = "Ah..."
10130-101300570 = "Hmm..."
10130-101300580 = "Hum..."
10130-101300590 = "Não é que não tenha"
10130-101300600 = "nada, mas..."
10130-101300610 = "Talvez por ter ficado um tempo no vento,"
10130-101300620 = "sinto que meu corpo esfriou."
10130-101300630 = "Assuma a responsabilidade, Sensei."
10130-101300640 = "Como devo assumir a responsabilidade!?"
10130-101300650 = "É brincadeira."
10130-101300660 = "Em vez disso,"
10130-101300670 = "me acompanhe nas compras novamente, ok?"
10130-101300680 = "Desta vez, vou praticar outra música."
10130-101300690 = "Olá, Sensei."
10130-101300700 = "Estou em patrulha, mas resolvi entrar em contato."
10130-101300710 = "Você está se esforçando hoje também?"
10130-101300720 = "É algo importante,"
10130-101300730 = "e preciso cuidar"
10130-101300740 = "dos meus juniores."
10130-101300750 = "E quanto a você mesma, Subaru?"
10130-101300760 = "Hã?"
10130-101300770 = "Eu nunca tinha pensado muito nisso."
10130-101300780 = "Pensei um pouco e..."
10130-101300790 = "Será que não dá para tocar heavy metal na gaita?"
10130-101300800 = "Bem, como professor,"
10130-101300810 = "eu gostaria de dizer que nada é impossível, mas..."
10130-101300820 = "Entendi."
10130-101300830 = "Se o Sensei diz..."
10130-101300840 = "Um dia, eu definitivamente vou tocar heavy metal na gaita!"
