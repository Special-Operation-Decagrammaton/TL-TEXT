[translation]
10064-100640010 = "Acho que já está na hora de comprar um quimono novo."
10064-100640020 = "Faz um tempo que não compro um novo."
10064-100640030 = "Kayoko, você tem seu próprio quimono, né?"
10064-100640040 = "Sim, não é nada muito caro, mas..."
10064-100640050 = "Antes de entrar para a Faz-Tudo 68, eu ia a muitos lugares formais..."
10064-100640060 = "Eu tinha pelo menos um quimono de visita."
10064-100640070 = "Lugares formais, é...?"
10064-100640080 = "Fufu."
10064-100640090 = "Se tiver uma oportunidade, eu te conto."
10064-100640100 = "Sensei, o que você costuma fazer na virada do ano?"
10064-100640110 = "Acho que como toshikoshi soba."
10064-100640120 = "Talvez eu assista aos especiais de fim de ano."
10064-100640130 = "Fufu, isso não é nada mal."
10064-100640140 = "Eu fico ouvindo o Joya no Kane no templo."
10064-100640150 = "Gosto do fato de que só dá para ouvi-lo nesse dia."
10064-100640160 = "É romântico, né?"
10064-100640170 = "Então, Sensei..."
10064-100640180 = "Nesta virada de ano, que tal passarmos o tempo ouvindo o Joya no Kane juntos?"
10064-100640190 = "Parece que tem um lugar famoso, mas pouco conhecido."
10064-100640200 = "Boa ideia, vamos lá."
10064-100640210 = "Então, no dia, nos encontramos em frente à estação."
10064-100640220 = "Já que o ano começou..."
10064-100640230 = "Estou pensando em comprar amuletos para todo mundo da Faz-Tudo 68 no templo aqui perto."
10064-100640240 = "Vou comprar um para você também, Sensei."
10064-100640250 = "Que tipo de amuleto você quer?"
10064-100640260 = "Um amuleto que me dê SSR no gacha!"
10064-100640270 = "Um amuleto que aumente meu dano crítico!"
10064-100640280 = "Hmm..."
10064-100640290 = "Será que vendem um amuleto desses...?"
10064-100640300 = "É brincadeira."
10064-100640310 = "Eu também quero escolher com você, Kayoko."
10064-100640320 = "Se você quiser, vamos comprar juntos."
10064-100640330 = "Entendido."
10064-100640340 = "Então, amanhã de manhã, em frente ao templo."
10064-100640350 = "Eu vi você correndo por aí desde o Ano Novo, parecia ocupado..."
10064-100640360 = "Aconteceu alguma coisa?"
10064-100640370 = "Logo no começo do ano, houve várias confusões..."
10064-100640380 = "Têm acontecido incidentes desde o Ano Novo..."
10064-100640390 = "Estar ocupado até numa hora dessas..."
10064-100640400 = "Como sempre, você tem uma vida difícil, Sensei."
10064-100640410 = "Se você quiser,"
10064-100640420 = "da próxima vez eu te empresto um CD relaxante."
10064-100640430 = "Obrigado, acho que vou aceitar."
