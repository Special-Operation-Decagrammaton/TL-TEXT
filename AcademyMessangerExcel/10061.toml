[translation]
10061-100610010 = "Fufu."
10061-100610020 = "Ufufu."
10061-100610030 = "……Sakurako?"
10061-100610040 = "O que foi?"
10061-100610050 = "……Não se preocupe, Sensei."
10061-100610060 = "Bem... Se eu tivesse que dizer algo, seria um cumprimento..."
10061-100610070 = "Há algum tempo, eu venho procurando uma oportunidade para falar com você, Sensei."
10061-100610080 = "Talvez... nós nos encontremos em breve."
10061-100610090 = "Então, até lá."
10061-100610100 = "Que seus dias sejam pacíficos."
10061-100610110 = "Fufu."
10061-100610120 = "Ufufu."
10061-100610130 = "……???"
10061-100610140 = "Oooi, Sensei☆"
10061-100610150 = "Como você está hoje?"
10061-100610160 = "A Sakurako sempre torce para que o dia do Sensei seja pacífico!"
10061-100610170 = "Tenha um ótimo dia hoje também~!!"
10061-100610180 = "Então, até mais☆"
10061-100610190 = "……Sakurako???"
10061-100610200 = "É ela mesma... certo?"
10061-100610210 = "……"
10061-100610220 = "Bem,"
10061-100610230 = "Me desculpe, Sensei. Parece que isso não deu muito certo."
10061-100610240 = "Eu pesquisei na internet por \"pessoa amigável\", mas..."
10061-100610250 = "Se... eu fui rude de alguma forma..."
10061-100610260 = "Peço desculpas."
10061-100610270 = "Então, até mais..."
10061-100610280 = "Sensei, obrigada pelo seu trabalho."
10061-100610290 = "Esta é a primeira vez que entro em contato depois de nos despedirmos, não é?"
10061-100610300 = "Hoje, muito obrigada por tudo."
10061-100610310 = "Isso... é um pedido um tanto ousado, mas... se algo acontecer de novo, conto com você."
10061-100610320 = "Então, Sensei."
10061-100610330 = "Que amanhã também seja um dia pacífico."
10061-100610340 = "Então... Wappi~!"
10061-100610350 = "Desculpe ligar tão tarde da noite, Sensei..."
10061-100610360 = "Você teria um momento?"
10061-100610370 = "Tudo bem, mas o que foi?"
10061-100610380 = "Aconteceu alguma coisa?"
10061-100610390 = "Não é nada demais, mas,"
10061-100610400 = "É que desta vez... não, na verdade, sempre foi assim, mas..."
10061-100610410 = "Se não for incômodo, você poderia vir sozinho, Sensei?"
10061-100610420 = "Bem, como eu deveria dizer isso..."
10061-100610430 = "É que... há algo que eu gostaria de discutir apenas com você..."
10061-100610440 = "Uhm... é que..."
10061-100610450 = "Fiquei preocupada por ter chamado você tão tarde da noite."
10061-100610460 = "Eu deveria ter consultado você e preparado um lugar para descansar."
10061-100610470 = "Me desculpe..."
10061-100610480 = "Farei isso da próxima vez."
10061-100610490 = "Então... que você esteja sempre em paz e segurança."
10061-100610500 = "Sensei, olá."
10061-100610510 = "Se não for incômodo..."
10061-100610520 = "Posso perguntar o que você faz nos seus dias de folga?"
10061-100610530 = "Claro, mas por quê?"
10061-100610540 = "Eu faço várias coisas, mas..."
10061-100610550 = "É que... na verdade, me fizeram a mesma pergunta recentemente, mas..."
10061-100610560 = "Uhm..."
10061-100610570 = "Eu não soube o que responder,"
10061-100610580 = "e acabei desconversando."
10061-100610590 = "Sensei... uhm..."
10061-100610600 = "Sinto muito mesmo pelo que aconteceu hoje."
10061-100610610 = "Mas, graças a você, consegui resolver meu problema."
10061-100610620 = "Eu queria te agradecer."
10061-100610630 = "Que bom, então."
10061-100610640 = "Se você diz que está tudo bem, Sakurako, isso é o suficiente para mim."
10061-100610650 = "Obrigada."
10061-100610660 = "Que o amanhã também seja abençoado."
10061-100610670 = "É que..."
10061-100610680 = "Algum dia, mas..."
10061-100610690 = "Em breve..."
10061-100610700 = "Talvez eu precise de sua ajuda com outro problema."
10061-100610710 = "Quando isso acontecer, novamente..."
10061-100610720 = "Ficaria feliz se pudesse me ceder um pouco do seu tempo."
10061-100610730 = "Olá, Sensei."
10061-100610740 = "É que... aconteceu um problema."
10061-100610750 = "Um problema?"
10061-100610760 = "O que houve?"
10061-100610770 = "Não foi minha intenção, mas..."
10061-100610780 = "...De alguma forma, a sua ajuda..."
10061-100610790 = "Eu estava me perguntando se poderia contar com ela."
10061-100610800 = "Me desculpe... mesmo depois de você ter me dado seu tempo."
10061-100610810 = "Qual terá sido o problema...? É mais difícil do que eu pensava."
10061-100610820 = "Uhm, me desculpe."
10061-100610830 = "Por não ter sido de ajuda."
10061-100610840 = "Não diga isso, você ajudou muito."
10061-100610850 = "Pelo menos, com certeza mais do que antes."
10061-100610860 = "A impressão de que sou uma pessoa difícil parece ter diminuído."
10061-100610870 = "Em contrapartida, a impressão de que sou uma pessoa excêntrica,"
10061-100610880 = "e imprevisível..."
10061-100610890 = "parece ter se formado."
10061-100610900 = "Por enquanto, é um passo à frente, não?"
10061-100610910 = "Vamos resolver isso um passo de cada vez."
10061-100610920 = "Sim..."
10061-100610930 = "Muito, muito obrigada."
10061-100610940 = "De agora em diante... conto com você."
