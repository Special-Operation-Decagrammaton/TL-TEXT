[translation]
23003-1630 = "先生。今度新しく上映する映画、「エリミネーター4」の噂、聞いた？"
23003-1631 = "巨大なロボットが都市を破壊していく、あのSFシリーズだよね？"
23003-1632 = "そうそう。それで、どうやら今回は主人公のサポート役として、"
23003-1633 = "なんとハッカーが登場するらしくて"
23003-1634 = "元々好きだった映画の続編に、ハッキング関連の登場人物が出るなんて……"
23003-1635 = "どう描かれるのか、今から楽しみだね"
23003-1636 = "確かに。まだ分からないけど、かっこいいと良いね"
23003-1637 = "うん。今週末に上映するみたいだから、見たら感想を伝えるね"
23003-1638 = "先生、今日部室に来る時に、エナジードリンクを一本買ってきてくれる？"
23003-1639 = "エナジードリンク？「妖怪MAX」でいい？"
23003-1640 = "うん、「妖怪MAX」のパッションフルーツ味でお願い"
23003-1641 = "どういうわけか、その味はこの辺だとあまり取り扱ってないみたいで"
23003-1642 = "そうなんだ。うん、了解"
23003-1643 = "ありがとう、よろしくね"
23003-1644 = "この間発売されたグラフィックボード、性能がものすごく良いみたい"
23003-1645 = "業者の人に聞いたら、在庫が限られてるから一人一個しか売らないんだって"
23003-1646 = "パソコンには詳しくないんだけど、一個じゃ足りないの？"
23003-1647 = "うん、足りないかな"
23003-1648 = "二個以上ないと、性能的に新しいシミュレーターをきちんと試せないから"
23003-1649 = "個人的には二個でも足りないぐらいだけど"
23003-1650 = "ただでさえ高いのにこれ以上積むのも厳しいから、二個で我慢……"
23003-1651 = "正直よく分からないけど、すごいね……"
23003-1652 = "パソコンの世界は深いね……"
23003-1653 = "そこで今週末なんだけど、それを買うのに一緒に行ってくれないかな？"
23003-1654 = "お金はもちろん私が出すから、来てくれると嬉しい"
23003-1655 = "分かった、じゃあまた週末に"
23003-1656 = "先生、前に作ってたドローンの改造が終わったよ"
23003-1657 = "ようやく終わったんだ、おめでとう"
23003-1658 = "どんな改造をしてたんだっけ？"
23003-1659 = "ありがとう。今回はたくさん新機能を追加したから、楽しみにしてていいよ"
23003-1660 = "ユーザにとって便利な新機能を、色々とね"
23003-1661 = "今日の午後にミレニアムの屋上で試運転する予定だから、見に来てくれる？"
23003-1662 = "仕事が終わったらすぐに行くね"
23003-230030020 = "ハレ、どうしたの？"
23003-230030030 = "この自撮り可愛いね！でも急に何故……？"
23003-230030040 = "あの、ハレさん……？"
23003-230030050 = "先生"
23003-230030060 = "その、あの写真のことだけど……"
23003-230030070 = "できれば、消してもらいたくて……"
23003-230030080 = "可愛く写ってると思うよ？"
23003-230030090 = "でも"
23003-230030100 = "何て言うかその、写真なら改めて可愛く撮って送るから……"
23003-230030110 = "あ"
23003-230030120 = "えｔ"
23003-230030130 = "そｎ"
23003-230030140 = "今のはその、アテナ3号がまた悪戯して……"
23003-230030150 = "だから、気にしないでもらえると……"
