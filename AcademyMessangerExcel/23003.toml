[translation]
23003-1630 = "Sensei. Você ouviu os rumores sobre o novo filme que vai estrear, \"Eliminador 4\"?"
23003-1631 = "Aquela série de ficção científica onde robôs gigantes destroem cidades, certo?"
23003-1632 = "Isso mesmo. E parece que dessa vez, como suporte do protagonista,"
23003-1633 = "um hacker vai fazer uma aparição."
23003-1634 = "Aparecer um personagem relacionado a hackers na sequência de um filme que eu já gostava..."
23003-1635 = "Mal posso esperar para ver como será retratado."
23003-1636 = "Verdade. Ainda não sabemos, mas espero que seja legal."
23003-1637 = "Sim. Parece que estreia neste fim de semana, então te conto o que achei depois de assistir."
23003-1638 = "Sensei, quando vier para a sala do clube hoje, pode comprar um energético para mim?"
23003-1639 = "Energético? Pode ser \"Yokai MAX\"?"
23003-1640 = "Sim, \"Yokai MAX\" sabor maracujá, por favor."
23003-1641 = "Por algum motivo, parece que não vendem muito desse sabor por aqui."
23003-1642 = "Ah, é? Tudo bem, entendido."
23003-1643 = "Obrigada, conto com você."
23003-1644 = "A placa de vídeo lançada recentemente parece ter um desempenho incrivelmente bom."
23003-1645 = "Quando perguntei ao fornecedor, disseram que o estoque é limitado, então só vendem uma por pessoa."
23003-1646 = "Eu não entendo muito de computadores, mas uma só não é suficiente?"
23003-1647 = "É, acho que não é suficiente."
23003-1648 = "Sem duas ou mais, o desempenho não será suficiente para testar adequadamente o novo simulador."
23003-1649 = "Pessoalmente, acho que até duas não seriam suficientes, mas..."
23003-1650 = "Já é caro demais, e comprar mais que isso seria difícil, então vou ter que me contentar com duas..."
23003-1651 = "Sinceramente, não entendi direito, mas parece incrível..."
23003-1652 = "O mundo dos computadores é bem complexo, né..."
23003-1653 = "Então, sobre este fim de semana, você poderia ir comigo comprar?"
23003-1654 = "O dinheiro eu mesma pago, claro, mas ficaria feliz se você viesse."
23003-1655 = "Entendido, então nos vemos no fim de semana."
23003-1656 = "Sensei, a modificação do drone que eu estava fazendo terminou."
23003-1657 = "Finalmente terminou, parabéns."
23003-1658 = "Que tipo de modificação você fez mesmo?"
23003-1659 = "Obrigada. Dessa vez, adicionei muitos recursos novos, então pode criar expectativas."
23003-1660 = "Vários novos recursos convenientes para o usuário."
23003-1661 = "Planejo fazer um teste no terraço da Millennium hoje à tarde, você pode vir ver?"
23003-1662 = "Vou assim que terminar o trabalho."
23003-230030020 = "Hare, o que houve?"
23003-230030030 = "Essa selfie está fofa! Mas de repente, por quê...?"
23003-230030040 = "Hum, Hare...?"
23003-230030050 = "Sensei."
23003-230030060 = "Bem, sobre aquela foto..."
23003-230030070 = "Se possível, eu gostaria que você a apagasse..."
23003-230030080 = "Eu acho que você saiu fofa nela, sabia?"
23003-230030090 = "Mas..."
23003-230030100 = "Como posso dizer... se for para ter uma foto, eu tiro uma mais fofa depois e te envio..."
23003-230030110 = "Ah"
23003-230030120 = "Er"
23003-230030130 = "Is-"
23003-230030140 = "Isso agora foi, hum, a Athena-3 fazendo pegadinhas de novo..."
23003-230030150 = "Então, por favor, finja que não viu isso..."