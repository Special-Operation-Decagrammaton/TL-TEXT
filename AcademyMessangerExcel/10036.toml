[translation]
10036-100360010 = "今日もみなさんに、平和と安寧がありますように！"
10036-100360020 = "トリニティの聖堂に立ち寄ることがありましたら、何でも手伝いますのでお申し付けください"
10036-100360030 = "ありがとう、その時はよろしくね"
10036-100360040 = "何でも良いの？"
10036-100360050 = "あっ"
10036-100360060 = "ただ、その"
10036-100360070 = "私にできる範囲で、になりますが……"
10036-100360080 = "あまり遠出したりは、ちょっと難しくって……"
10036-100360090 = "それ以外でしたら、ぜひいつでも！"
10036-100360100 = "その、先生……"
10036-100360110 = "実はちょっと、困ってしまいまして……"
10036-100360120 = "何かあったの？"
10036-100360130 = "どうしたの？"
10036-100360140 = "えっと"
10036-100360150 = "実は最近、みなさんから頻りに「休んでください」と言われていまして……"
10036-100360160 = "もしかして私、頼りないのでしょうか？"
10036-100360170 = "ずっと無理してるから、とか？"
10036-100360180 = "うーん……"
10036-100360190 = "無理とかは、してないはずなのですが……"
10036-100360200 = "……"
10036-100360210 = "どういうことなのでしょうか"
10036-100360220 = "困りました……"
10036-100360230 = "先生"
10036-100360240 = "おかげさまで、楽になりました"
10036-100360250 = "今日、先生からあのように言っていただけて"
10036-100360260 = "何だかその"
10036-100360270 = "すごく、救われた気分です"
10036-100360280 = "ありがとうございます、本当に"
10036-100360290 = "先生、こんにちは"
10036-100360300 = "今日は、聖堂の裏手にある公園に行く予定なんです。管理のお仕事の一環でして"
10036-100360310 = "あ、その"
10036-100360320 = "特に何かお願い事があったわけではないのですが"
10036-100360330 = "むしろ元気ですということを、ただお伝えしたくって"
10036-100360340 = "これも、先生のおかげです"
10036-100360350 = "大したことはしてないよ。また今度会いに行くね"
10036-100360360 = "せっかくだし、私も遊びに行こうかな？"
10036-100360370 = "もちろんです、それはもうぜひ！"
10036-100360380 = "ご連絡いただければ、すぐ迎えに行きますので！"
10036-100360390 = "あの、先生"
10036-100360400 = "今日はバタバタしてしまってすみません。それとは別の件なのですが、その……"
10036-100360410 = "ううん、お疲れ様。どうしたの？"
10036-100360420 = "何かあった？"
10036-100360430 = "えっと"
10036-100360440 = "実は、何と言いますか"
10036-100360450 = "遠回しに聞かれたのですが、何だか変な噂が回っているかもしれなくって"
10036-100360460 = "誰もいない倉庫や、聖堂の裏"
10036-100360470 = "茂みの中で何をしていたのか、というようなことを聞かれまして……"
10036-100360480 = "「何を」と言われましても、何のことだか分からず……"
10036-100360490 = "……何だろうね？"
10036-100360500 = "……その噂自体は、私のせいかも。ごめん。"
10036-100360510 = "……？"
10036-100360520 = "えっと"
10036-100360530 = "……先生？"
10036-100360540 = "先生"
10036-100360550 = "実は今日、お休みでして"
10036-100360560 = "それで"
10036-100360570 = "その"
10036-100360580 = "？"
10036-100360590 = "うん"
10036-100360600 = "よろしければ少し、お時間を頂けませんでしょうか……？"
10036-100360610 = "もちろん。"
10036-100360620 = "大歓迎だよ。"
10036-100360630 = "！"
10036-100360640 = "あ、ありがとうございます！では先に行って、場所を取っておきますので……！"
10036-100360650 = "あの……"
10036-100360660 = "先生、今よろしいでしょうか？"
10036-100360670 = "どうしたの、ヒナタ？"
10036-100360680 = "うん、大丈夫だよ"
10036-100360690 = "そのですね"
10036-100360700 = "一応、あらためてお聞きしておきたくて……"
10036-100360710 = "先日のピクニックに持っていったお弁当、いかがでしたか……？"
10036-100360720 = "お気に召していただけてたら良かったのですが……"
10036-100360730 = "もちろん、すごくおいしかったよ"
10036-100360740 = "また作ってくれるとうれしいな"
10036-100360750 = "ほ"
10036-100360760 = "本当ですか？"
10036-100360770 = "ありがとうございます！"
10036-100360780 = "あっ"
10036-100360790 = "あの"
10036-100360800 = "先生！"
10036-100360810 = "何度も本当にすみません……"
10036-100360820 = "先ほど気づいたのですが……"
10036-100360830 = "先生のお弁当箱を台帳と間違えて持って帰ってしまったみたいで……"
10036-100360840 = "あ、本当だ"
10036-100360850 = "確かに重かったかも……それじゃあ、また近いうちにあの公園で"
10036-100360860 = "あ"
10036-100360870 = "はいっ！"
10036-100360880 = "ありがとうございます……"
