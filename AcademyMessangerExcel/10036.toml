[translation]
10036-100360010 = "Que a paz e a tranquilidade estejam com todos hoje!"
10036-100360020 = "Se você passar pela Catedral de Trinity, por favor, me avise, pois ajudarei com o que for preciso."
10036-100360030 = "Obrigada, conto com você quando a hora chegar."
10036-100360040 = "Pode ser qualquer coisa?"
10036-100360050 = "Ah."
10036-100360060 = "É que..."
10036-100360070 = "Desde que esteja dentro do que eu consigo fazer..."
10036-100360080 = "Ir para muito longe é um pouco difícil para mim..."
10036-100360090 = "Fora isso, pode me chamar a qualquer hora!"
10036-100360100 = "Hum, Sensei..."
10036-100360110 = "Na verdade, estou com um pequeno problema..."
10036-100360120 = "Aconteceu alguma coisa?"
10036-100360130 = "O que foi?"
10036-100360140 = "Bem..."
10036-100360150 = "É que, recentemente, todo mundo tem me dito com frequência para eu descansar..."
10036-100360160 = "Será que eu pareço pouco confiável?"
10036-100360170 = "Será que é porque você está sempre se esforçando demais?"
10036-100360180 = "Hmm..."
10036-100360190 = "Acho que não estou me esforçando demais nem nada..."
10036-100360200 = "..."
10036-100360210 = "O que será que isso quer dizer?"
10036-100360220 = "Estou em uma situação difícil..."
10036-100360230 = "Sensei."
10036-100360240 = "Graças a você, me sinto mais aliviada."
10036-100360250 = "Por você ter me dito aquilo hoje, Sensei..."
10036-100360260 = "De alguma forma..."
10036-100360270 = "Eu me sinto muito salva."
10036-100360280 = "Muito obrigada, de verdade."
10036-100360290 = "Olá, Sensei."
10036-100360300 = "Hoje, eu planejo ir ao parque que fica atrás da catedral. É parte do meu trabalho de administração."
10036-100360310 = "Ah, bem..."
10036-100360320 = "Não é que eu tenha algum pedido em especial, mas..."
10036-100360330 = "Na verdade, eu só queria dizer que estou bem."
10036-100360340 = "Isso também é graças a você, Sensei."
10036-100360350 = "Eu não fiz nada demais. Vou te visitar outra hora."
10036-100360360 = "Já que é uma boa oportunidade, acho que vou dar uma passada lá também."
10036-100360370 = "Claro, por favor, venha!"
10036-100360380 = "Se me avisar, eu vou te buscar imediatamente!"
10036-100360390 = "Hum, Sensei..."
10036-100360400 = "Desculpe pela correria de hoje. Mas é sobre outro assunto, sabe..."
10036-100360410 = "Não se preocupe, bom trabalho. O que foi?"
10036-100360420 = "Aconteceu alguma coisa?"
10036-100360430 = "Bem..."
10036-100360440 = "Na verdade, como posso dizer..."
10036-100360450 = "Me perguntaram indiretamente, mas parece que um boato estranho pode estar circulando."
10036-100360460 = "Em um armazém vazio, ou atrás da catedral..."
10036-100360470 = "Me perguntaram o que eu estava fazendo no meio dos arbustos..."
10036-100360480 = "Mesmo que me perguntem 'o quê', eu não sei do que estão falando..."
10036-100360490 = "...O que será, hein?"
10036-100360500 = "...Talvez esse boato seja minha culpa. Desculpe."
10036-100360510 = "……?"
10036-100360520 = "Uhm..."
10036-100360530 = "……Sensei?"
10036-100360540 = "Sensei."
10036-100360550 = "Na verdade, hoje é meu dia de folga."
10036-100360560 = "Então..."
10036-100360570 = "É que..."
10036-100360580 = "?"
10036-100360590 = "Sim."
10036-100360600 = "Se não for incômodo, você poderia me dar um pouco do seu tempo...?"
10036-100360610 = "Claro."
10036-100360620 = "Será um prazer."
10036-100360630 = "!"
10036-100360640 = "Ah, obrigada! Então vou na frente para guardar um lugar...!"
10036-100360650 = "Uhm..."
10036-100360660 = "Sensei, você tem um momento?"
10036-100360670 = "O que foi, Hinata?"
10036-100360680 = "Sim, tudo bem."
10036-100360690 = "É que..."
10036-100360700 = "Eu queria perguntar de novo, só para ter certeza..."
10036-100360710 = "Sobre o bentô que eu levei para o piquenique outro dia, o que você achou...?"
10036-100360720 = "Espero que você tenha gostado..."
10036-100360730 = "Claro, estava uma delícia."
10036-100360740 = "Ficaria feliz se você fizesse de novo."
10036-100360750 = "S-..."
10036-100360760 = "Sério?"
10036-100360770 = "Obrigada!"
10036-100360780 = "Ah!"
10036-100360790 = "Uhm..."
10036-100360800 = "Sensei!"
10036-100360810 = "Desculpe mesmo por incomodar tantas vezes..."
10036-100360820 = "Eu percebi agora há pouco..."
10036-100360830 = "Parece que eu confundi a sua lancheira com o livro de registros e a levei para casa..."
10036-100360840 = "Ah, é verdade."
10036-100360850 = "Realmente estava pesado... Bom, então nos vemos em breve naquele parque."
10036-100360860 = "Ah..."
10036-100360870 = "Sim!"
10036-100360880 = "Obrigada..."
