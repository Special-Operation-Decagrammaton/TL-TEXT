[translation]
16008-160080010 = "Aqui é Fubuki, do 1º ano do Departamento de Segurança Pública, fazendo o relatório de rotina."
16008-160080020 = "Nada de anormal por hoje, vou continuar assim por enquanto."
16008-160080030 = "Fubuki, você não enviou para o destinatário errado?"
16008-160080040 = "Sim, eu sei disso, então não se preocupe."
16008-160080050 = "Bem, então vamos trabalhar duro."
16008-160080060 = "......Fubuki? O que você quer dizer com 'não se preocupe'......?"
16008-160080070 = "Eu também não sei, mas......"
16008-160080080 = "Por que você não tenta perguntar ao Departamento de Segurança por enquanto?"
16008-160080090 = "Departamento de Segurança......?"
16008-160080100 = "Fubuki, você está bem?"
16008-160080110 = "Sim, eu também acho."
16008-160080120 = "......?"
16008-160080130 = "......"
16008-160080140 = "Como fui pega matando aula durante o horário de trabalho outro dia......"
16008-160080150 = "Como punição, tenho que fazer patrulhas no fim de semana......"
16008-160080160 = "Ter que trabalhar até nos dias de folga, que injustiça......"
16008-160080170 = "Isso não é merecido......?"
16008-160080180 = "Bem, crimes podem acontecer até nos dias de folga. Boa sorte."
16008-160080190 = "Mas Kivotos é basicamente pacífica......"
16008-160080200 = "Mesmo quando acontece algo, é só tiroteio entre estudantes ou alguma loja sendo explodida......"
16008-160080210 = "......'Só'?"
16008-160080220 = "Bem, muita coisa acontece, e além disso, não é algo que uma policial deveria dizer......"
16008-160080230 = "Que trabalhoso......"
16008-160080240 = "Já que chegamos a esse ponto, Sensei, por que não patrulhamos juntos neste fim de semana?"
16008-160080250 = "Se dividirmos o trabalho entre nós dois, talvez termine rápido!?"
16008-160080260 = "Eu não me importo, mas é certo empurrar sua punição para outra pessoa......?"
16008-160080270 = "Sensei, é uma emergência!"
16008-160080280 = "De acordo com informações do Departamento de Segurança, um criminoso procurado que negocia armas ilegais pode aparecer no mercado negro hoje!"
16008-160080290 = "Não sabemos quando o criminoso vai passar, então é melhor ficarmos de tocaia por perto."
16008-160080300 = "Vamos sair agora mesmo!"
16008-160080310 = "......Fubuki?"
16008-160080320 = "Por acaso você está se sentindo mal?"
16008-160080330 = "Que reação é essa?"
16008-160080340 = "Uma policial estar motivada para resolver um caso, tem algo de errado nisso?"
16008-160080350 = "Mas Fubuki......"
16008-160080360 = "Você não estava odiando ter que sair para patrulhar?"
16008-160080370 = "Não temos tempo para isso!"
16008-160080380 = "Sensei, vou na frente para o local e estarei esperando lá!"
16008-160080390 = "Que tédio......"
16008-160080400 = "Já aproveitei todos os jogos que tinha à mão, que tédio......"
16008-160080410 = "Então, que tal trabalhar um pouco?"
16008-160080420 = "Isso é absolutamente impossível. Acho que vou começar a 'não fazer nada'......"
16008-160080430 = "Além disso, não tenho nenhum trabalho para fazer agora."
16008-160080440 = "O que o Departamento de Segurança faz normalmente?"
16008-160080450 = "Normalmente, né......"
16008-160080460 = "Para começar, não recebemos tantos trabalhos no Departamento de Segurança."
16008-160080470 = "Kirino sai procurando trabalho por conta própria, mas basicamente ficamos sentadas esperando."
16008-160080480 = "Se for para dizer algo, talvez tirar uma soneca."
16008-160080490 = "Isso não é trabalho, né."
