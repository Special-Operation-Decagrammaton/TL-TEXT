[translation]
16008-160080010 = "こちら生活安全局1年のフブキ、定時連絡"
16008-160080020 = "今日も特段異常無し、引き続きこのままって感じで"
16008-160080030 = "フブキ、送り先間違ってない？"
16008-160080040 = "うん、それは分かってるから心配しないで"
16008-160080050 = "じゃあ、頑張って働くとしよう"
16008-160080060 = "……フブキ？心配しないでっていうのは……？"
16008-160080070 = "それは私にも分からないけど……"
16008-160080080 = "とりあえず一度、警備局に問い合わせてみたら？"
16008-160080090 = "警備局……？"
16008-160080100 = "フブキ、大丈夫？"
16008-160080110 = "うん、私もそう思う"
16008-160080120 = "……？"
16008-160080130 = "……"
16008-160080140 = "この間、勤務時間中にサボってたのがバレたせいで……"
16008-160080150 = "罰として週末のパトロール業務が……"
16008-160080160 = "休日にも働かなきゃいけないなんて、何たる理不尽……"
16008-160080170 = "自業自得では……"
16008-160080180 = "まあ、休日にも犯罪は起こるかもしれないし。頑張って"
16008-160080190 = "キヴォトスは基本平和なのに……"
16008-160080200 = "何かあったところで生徒たちの銃撃戦か、お店が爆破させられるくらいなのに……"
16008-160080210 = "「くらい」……？"
16008-160080220 = "まあ色々あるし、そもそも警察がそれを言っちゃダメでは……"
16008-160080230 = "めんどくさい……"
16008-160080240 = "こうなったら先生、今週末一緒にパトロールしない？"
16008-160080250 = "二人で手分けしてやれば、すぐ終わるかも！？"
16008-160080260 = "全然良いんだけど、罰を誰かに押し付けるのはどうなの……？"
16008-160080270 = "先生、事件だよ！"
16008-160080280 = "警備局からの情報によると、不法な武器の取引に明け暮れる指名手配犯が、今日ブラックマーケットに現れるかもしれないんだって！"
16008-160080290 = "犯罪者がいつ通るかは分からないから、周辺で張り込みした方が良さそう"
16008-160080300 = "今すぐ出動しよう！"
16008-160080310 = "……フブキ？"
16008-160080320 = "もしかして、どこか具合でも悪い？"
16008-160080330 = "何その反応"
16008-160080340 = "警察が事件に意欲的で、何かおかしい？"
16008-160080350 = "でもフブキ……"
16008-160080360 = "外回り、かなり嫌がってなかった？"
16008-160080370 = "こうしてる場合じゃない！"
16008-160080380 = "先生、私は先に現場に出動して待ってるから！"
16008-160080390 = "暇だぁ……"
16008-160080400 = "一通り手元のゲーム類も堪能したことだし、退屈……"
16008-160080410 = "じゃああらためて仕事とかどう？"
16008-160080420 = "それは絶対嫌。いっそ「何もしない」ということを始めよっかな……"
16008-160080430 = "そもそも今は、何も仕事無いし"
16008-160080440 = "生活安全局って、普段は何してるの？"
16008-160080450 = "普段、ねぇ……"
16008-160080460 = "そもそも生活安全局には、そんなに仕事とか来ないからなー"
16008-160080470 = "キリノは自分から仕事を作りに行くけど、基本は座って待機だよ"
16008-160080480 = "強いて言えば昼寝とか"
16008-160080490 = "それは仕事じゃないでしょ"
