[translation]
16008-160080010 = "Aqui é a Fubuki, do 1º ano da Divisão de Segurança Comunitária, contato de rotina."
16008-160080020 = "Nenhuma anormalidade em especial hoje também, vamos continuar assim."
16008-160080030 = "Fubuki, você não mandou para a pessoa errada?"
16008-160080040 = "É, eu sei disso, então não se preocupe."
16008-160080050 = "Bom, acho que vou trabalhar duro, então."
16008-160080060 = "......Fubuki? O que você quer dizer com 'não se preocupe'?"
16008-160080070 = "Isso eu também não sei, mas..."
16008-160080080 = "Por que você não entra em contato com a Divisão de Segurança por enquanto?"
16008-160080090 = "Divisão de Segurança...?"
16008-160080100 = "Fubuki, você tá bem?"
16008-160080110 = "Uhum, eu também acho."
16008-160080120 = "......?"
16008-160080130 = "......"
16008-160080140 = "Por causa daquela vez em que fui pega matando trabalho durante o expediente..."
16008-160080150 = "Como punição, ganhei trabalho de patrulha no fim de semana..."
16008-160080160 = "Ter que trabalhar até nos meus dias de folga, que absurdo..."
16008-160080170 = "Isso não é culpa sua...?"
16008-160080180 = "Bom, crimes também podem acontecer nos dias de folga. Boa sorte."
16008-160080190 = "Sendo que Kivotos é basicamente pacífica..."
16008-160080200 = "Mesmo que aconteça alguma coisa, é no máximo um tiroteio entre alunas ou uma loja sendo explodida..."
16008-160080210 = "'No máximo'......?"
16008-160080220 = "Bom, acontecem várias coisas, mas para começar, a polícia não devia dizer isso..."
16008-160080230 = "Que preguiça..."
16008-160080240 = "Já que chegamos a esse ponto, Sensei, quer patrulhar comigo neste fim de semana?"
16008-160080250 = "Se nós dois dividirmos o trabalho, talvez acabe rapidinho!?"
16008-160080260 = "Por mim tudo bem, mas empurrar a sua punição para outra pessoa não é meio errado...?"
16008-160080270 = "Sensei, é um incidente!"
16008-160080280 = "De acordo com informações da Divisão de Segurança, um criminoso procurado que vive fazendo tráfico ilegal de armas pode aparecer no Mercado Negro hoje!"
16008-160080290 = "Como não sabemos quando o criminoso vai passar, é melhor ficarmos de tocaia nos arredores."
16008-160080300 = "Vamos entrar em ação agora mesmo!"
16008-160080310 = "......Fubuki?"
16008-160080320 = "Por acaso, você não está se sentindo bem?"
16008-160080330 = "Que tipo de reação é essa?"
16008-160080340 = "Tem algo de errado em uma policial estar empolgada com um caso?"
16008-160080350 = "Mas Fubuki..."
16008-160080360 = "Você não odiava sair pra trabalhar na rua?"
16008-160080370 = "Não temos tempo para isso!"
16008-160080380 = "Sensei, eu vou indo na frente para o local e te espero lá!"
16008-160080390 = "Que tédio..."
16008-160080400 = "Já curti todos os jogos que eu tinha aqui comigo, que chatice..."
16008-160080410 = "Então que tal começar a trabalhar de verdade?"
16008-160080420 = "Isso eu me recuso absolutamente. Acho que vou começar a praticar 'não fazer nada'..."
16008-160080430 = "Pra começo de conversa, nem tem trabalho pra fazer agora."
16008-160080440 = "O que a Divisão de Segurança Comunitária faz normalmente?"
16008-160080450 = "Normalmente, né..."
16008-160080460 = "Pra começar, não vem tanto trabalho assim pra Divisão de Segurança Comunitária~"
16008-160080470 = "A Kirino vai atrás de arranjar trabalho pra ela mesma, mas basicamente a gente fica sentada de prontidão."
16008-160080480 = "Se for pra forçar a barra, tirar um cochilo e tals."
16008-160080490 = "Mas isso não é trabalho, né."