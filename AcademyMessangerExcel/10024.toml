[translation]
10024-100240010 = "しばらく遠出する予定なの"
10024-100240020 = "みんなにもメッセージは送っておいたんだけど"
10024-100240030 = "先生にも伝えておこうかなって"
10024-100240040 = "……遠出？"
10024-100240050 = "急にどうしたの……？"
10024-100240060 = "大丈夫、大したことじゃない"
10024-100240070 = "じゃあ、またね。先生"
10024-100240080 = "先生"
10024-100240090 = "ちょうど休むタイミングだったから、連絡してみた"
10024-100240100 = "まだ数分くらいしか経ってない気が……？"
10024-100240110 = "もしかして、もう結構遠くまで行った感じ……？"
10024-100240120 = "ん？"
10024-100240130 = "ううん、まださっき先生といた場所の近く"
10024-100240140 = "ちょうど信号で、足を止めたから連絡してみた"
10024-100240150 = "……あれ？"
10024-100240160 = "もしかして止まるたびにって、こういう意味じゃない？"
10024-100240170 = "……ごめん、勘違いしてた"
10024-100240180 = "じゃあ、えっと……休憩とかで自転車を降りたら、その度に連絡するね"
10024-100240190 = "先生"
10024-100240200 = "今アビドスを完全に抜けたところ、もうすぐ海岸道路に着きそう"
10024-100240210 = "速いね……！？"
10024-100240220 = "プロ選手みたいな速度だね……今のところ順調？"
10024-100240230 = "ん"
10024-100240240 = "あ、そういえば……"
10024-100240250 = "どうしたの？"
10024-100240260 = "あ、いや"
10024-100240270 = "ごめん、やっぱり大丈夫"
10024-100240280 = "ありがとう"
10024-100240290 = "この後は、海岸道路沿いにずっと走るつもり"
10024-100240300 = "じゃあまた連絡するね、先生"
10024-100240310 = "ありがとう、先生。色々と助かった"
10024-100240320 = "カバンの中に入れてると、どうしても飲み物はぬるくなっちゃうし"
10024-100240330 = "持ってきてくれたドリンク、すっごく冷たくて嬉しかった"
10024-100240340 = "タオルも"
10024-100240350 = "あ"
10024-100240360 = "そういえばさっき先生に渡したタオル、良ければ……"
10024-100240370 = "洗濯してちゃんと保管しておいたよ。今度返すね"
10024-100240380 = "えっと"
10024-100240390 = "うん、やっぱりそうだよね……"
10024-100240400 = "ううん、ありがとう"
10024-100240410 = "んと"
10024-100240420 = "じゃあ"
10024-100240430 = "また連絡するね、先生"
10024-100240440 = "そういえば"
10024-100240450 = "先生この前、行き先の予定を教えてほしいって言ってたけど"
10024-100240460 = "この情報は、何か先生の役に立つの？"
10024-100240470 = "また補給品とか持っていこうかなって"
10024-100240480 = "サポーターとして色々手伝えるかなと思って"
10024-100240490 = "あ……"
10024-100240500 = "ん、そっか"
10024-100240510 = "でも、大丈夫？仕事も忙しいのに……"
10024-100240520 = "いや、その"
10024-100240530 = "もちろん、嫌なわけじゃない"
10024-100240540 = "その、私はすごく嬉しいけど……"
10024-100240550 = "じゃあ、無理しない程度にお願い"
10024-100240560 = "次のポイントに着くの、楽しみにしてるね"
10024-100240570 = "先生、そろそろ着きそう"
10024-100240580 = "もう出てきても大丈夫"
10024-100240590 = "出てきても大丈夫……？"
10024-100240600 = "えっと、どこに着いたの？"
10024-100240610 = "んと……"
10024-100240620 = "とにかく、出てきたら分かるから"
10024-100240630 = "待ってるね"
10024-100240640 = "そういえば"
10024-100240650 = "今回、キヴォトス縦断ができたから"
10024-100240660 = "次はキヴォトス横断をしてみようかなって"
10024-100240670 = "これも本当の横断じゃなくて、だいたいそんな感じってだけなんだけど"
10024-100240680 = "先生さえよかったら、その、一緒に走ったり……"
10024-100240690 = "実際の参加は、ちょっと……応援してるね"
10024-100240700 = "サポーターとして、全力で支えさせてもらうね……"
10024-100240710 = "うーん……"
10024-100240720 = "そっか、残念"
10024-100240730 = "じゃあ……これからも、サポーターとして"
10024-100240740 = "よろしくね、先生"
