[translation]
10024-100240010 = "Vou fazer uma viagem longa por um tempo."
10024-100240020 = "Eu já mandei uma mensagem para todo mundo, mas..."
10024-100240030 = "Pensei em avisar você também, Sensei."
10024-100240040 = "……Uma viagem longa?"
10024-100240050 = "Por que tão de repente...?"
10024-100240060 = "Não se preocupe, não é nada demais."
10024-100240070 = "Então, até mais. Sensei."
10024-100240080 = "Sensei."
10024-100240090 = "Era uma boa hora para descansar, então resolvi entrar em contato."
10024-100240100 = "Acho que não se passaram nem alguns minutos...?"
10024-100240110 = "Será que você já foi bem longe...?"
10024-100240120 = "Hm?"
10024-100240130 = "Não, ainda estou perto de onde estava com você, Sensei."
10024-100240140 = "Parei em um sinal, então aproveitei para entrar em contato."
10024-100240150 = "...Hã?"
10024-100240160 = "Será que 'toda vez que parar' não era nesse sentido?"
10024-100240170 = "...Desculpe, eu entendi errado."
10024-100240180 = "Então, uhm... vou entrar em contato toda vez que eu descer da bicicleta para descansar."
10024-100240190 = "Sensei."
10024-100240200 = "Acabei de sair completamente de Abydos, estou quase chegando na estrada da costa."
10024-100240210 = "Que rápida...!"
10024-100240220 = "É uma velocidade de atleta profissional... Está tudo bem por enquanto?"
10024-100240230 = "Sim."
10024-100240240 = "Ah, falando nisso..."
10024-100240250 = "O que foi?"
10024-100240260 = "Ah, não."
10024-100240270 = "Desculpe, não é nada."
10024-100240280 = "Obrigada."
10024-100240290 = "Depois daqui, pretendo seguir pela estrada da costa."
10024-100240300 = "Então, entro em contato de novo, Sensei."
10024-100240310 = "Obrigada, Sensei. Ajudou muito."
10024-100240320 = "As bebidas sempre acabam esquentando quando ficam na bolsa."
10024-100240330 = "Fiquei muito feliz que a bebida que você trouxe estava bem gelada."
10024-100240340 = "E a toalha também."
10024-100240350 = "Ah."
10024-100240360 = "Falando nisso, a toalha que te dei mais cedo, se você quiser..."
10024-100240370 = "Eu lavei e guardei direitinho. Te devolvo depois."
10024-100240380 = "Uhm..."
10024-100240390 = "Sim, imaginei que sim..."
10024-100240400 = "Não, tudo bem. Obrigada."
10024-100240410 = "Bem..."
10024-100240420 = "Então..."
10024-100240430 = "Entro em contato de novo, Sensei."
10024-100240440 = "Falando nisso."
10024-100240450 = "Sensei, você disse outro dia que queria saber meus planos de destino, mas..."
10024-100240460 = "Essa informação vai te ajudar em alguma coisa, Sensei?"
10024-100240470 = "Pensei em levar mais suprimentos para você."
10024-100240480 = "Pensei que poderia ajudar de várias formas como seu apoiador."
10024-100240490 = "Ah..."
10024-100240500 = "Hm, entendi."
10024-100240510 = "Mas, tudo bem? Você está tão ocupado com o trabalho..."
10024-100240520 = "Não, é que..."
10024-100240530 = "Claro, não é que eu não queira."
10024-100240540 = "É que... eu fico muito feliz, mas..."
10024-100240550 = "Então, por favor, não se esforce demais."
10024-100240560 = "Estou ansiosa para chegarmos ao próximo ponto."
10024-100240570 = "Sensei, parece que estamos quase chegando."
10024-100240580 = "Já pode sair, está tudo bem."
10024-100240590 = "Posso sair, está tudo bem...?"
10024-100240600 = "Hã... Onde nós chegamos?"
10024-100240610 = "Hmm..."
10024-100240620 = "De qualquer forma, você vai entender quando sair."
10024-100240630 = "Estou te esperando."
10024-100240640 = "Falando nisso,"
10024-100240650 = "Já que desta vez conseguimos atravessar Kivotos de ponta a ponta,"
10024-100240660 = "Pensei que da próxima vez poderíamos tentar atravessar Kivotos na horizontal."
10024-100240670 = "Não seria uma travessia de verdade, só algo nesse estilo."
10024-100240680 = "Se não for incômodo para você, Sensei, poderíamos, sei lá, correr juntos..."
10024-100240690 = "Participar de verdade é meio... Mas vou estar torcendo por você."
10024-100240700 = "Como seu apoiador, vou te dar todo o meu suporte..."
10024-100240710 = "Hmm..."
10024-100240720 = "Entendi, que pena."
10024-100240730 = "Então... de agora em diante, como meu apoiador,"
10024-100240740 = "Conto com você, Sensei."
