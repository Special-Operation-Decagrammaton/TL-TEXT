[translation]
20044-200440010 = "こんにちは、トレーナー"
20044-200440020 = "いま何をされていますか？"
20044-200440030 = "ベッドで横になってるよ"
20044-200440040 = "そうでしたか"
20044-200440050 = "よろしければ"
20044-200440060 = "その姿勢で行えるトレーニングを"
20044-200440070 = "ご紹介しましょうか？"
20044-200440080 = "ここから出来るトレーニングが！？"
20044-200440090 = "ありますよ。ですが……"
20044-200440100 = "今回はトレーニングの話ではなく"
20044-200440110 = "報告のためにご連絡しました"
20044-200440120 = "実は、アルバイトを始めることになったんです"
20044-200440130 = "どうしてアルバイトを？"
20044-200440140 = "欲しかった新型のトレーニングマシンがセール中なんです"
20044-200440150 = "ですが、購入資金が足りず……"
20044-200440160 = "そんなに高いの？"
20044-200440170 = "はい……本来、60万円のところ……"
20044-200440180 = "セール価格で45万円です"
20044-200440190 = "高っ！"
20044-200440200 = "備品として予算を申請してみたら？"
20044-200440210 = "それでは時間がかかりすぎますし"
20044-200440220 = "セール期間が終わってしまいます"
20044-200440230 = "それに、このアルバイト"
20044-200440240 = "トレーニングも兼ねられて一石二鳥なんですよ"
20044-200440250 = "そんなアルバイトがあったとは……！"
20044-200440260 = "もし、興味がおありでしたら"
20044-200440270 = "今度、アスレチックスタジアムに来てください"
20044-200440280 = "良い報告があります、トレーナー"
20044-200440290 = "これは最高の成果と言えるでしょう"
20044-200440300 = "最高の成果って？"
20044-200440310 = "以前お話ししていたトレーニングマシン"
20044-200440320 = "無事、現金で購入しました！"
20044-200440330 = "あんな高いものを！？"
20044-200440340 = "ええ"
20044-200440350 = "やはり、汗を流し、その対価を得るのは素晴らしいことですね！"
20044-200440360 = "だからこそ、不思議なのですが……"
20044-200440370 = "トレーニングも「体を動かして頑張る」という点では同じなのに"
20044-200440380 = "どうして皆さん、あんなにも避けるのでしょう？"
20044-200440390 = "さ、さあ……何でだろうね"
20044-200440400 = "トレーナー"
20044-200440410 = "生きていく上で大切なものとは何でしょうか？  "
20044-200440420 = "お休み!"
20044-200440430 = "あとは、ゲームとか！"
20044-200440440 = "休息はたしかに大事です"
20044-200440450 = "無理にトレーニングを続けると、怪我のリスクが高まりますし"
20044-200440460 = "筋肉の成長を妨げてしまいますから"
20044-200440470 = "ゲーム、ですか……？"
20044-200440480 = "ストレス発散の手段ということでしょうか"
20044-200440490 = "たしかに、ストレスは体調に影響を及ぼします"
20044-200440500 = "ですが、私が思うに……"
20044-200440510 = "やはり「健康」こそが、生きる上で最も大事なことかと"
20044-200440520 = "トレーナー、こんにちは"
20044-200440530 = "今お時間よろしいですか？"
20044-200440540 = "もちろん。何かあったの？"
20044-200440550 = "実は相談したいことがありまして……"
20044-200440560 = "以前働いていた、スタジアムのマネージャーさんから連絡があったんです。"
20044-200440570 = "そこで、トレーナーにも見てもらいたいものが"
20044-200440580 = "スタジアムのマネージャーから……？"
20044-200440590 = "分かった。すぐに行くよ！"
20044-200440600 = "おはようございます、トレーナー"
20044-200440610 = "もしスケジュールに余裕があるようでしたら"
20044-200440620 = "そんなときこそ、体を動かす絶好のチャンスです"
20044-200440630 = "お時間があれば、ぜひジムまでお越しください！"
20044-200440640 = "スミレ、大変なことになってるよ！"
20044-200440650 = "大変なこと？"
20044-200440660 = "トレーナーがそこまで慌てるとは珍しいですね"
20044-200440670 = "何があったのですか？"
20044-200440680 = "今、ネット中がスミレの話題で大騒ぎだよ！"
20044-200440690 = "……私が？"
20044-200440700 = "いったい何があったのでしょう？"
20044-200440710 = "ちょっと話そう"
20044-200440720 = "私の記憶が正しければ、"
20044-200440730 = "トレーナーからお誘いいただくのは"
20044-200440740 = "非常に珍しいことですね"
20044-200440750 = "これは嬉しい体験です"
20044-200440760 = "胸が高鳴るのを感じることですし……"
20044-200440770 = "すぐに向かいます！"
