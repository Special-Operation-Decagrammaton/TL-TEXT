[translation]
20044-200440010 = "Olá, treinador."
20044-200440020 = "O que está fazendo agora?"
20044-200440030 = "Estou deitado na cama."
20044-200440040 = "Entendo."
20044-200440050 = "Se não se importar,"
20044-200440060 = "gostaria que eu lhe apresentasse"
20044-200440070 = "alguns exercícios que pode fazer nessa posição?"
20044-200440080 = "Dá para treinar daqui!?"
20044-200440090 = "Dá sim. Mas..."
20044-200440100 = "Desta vez, não liguei para falar de treino,"
20044-200440110 = "mas sim para lhe dar uma notícia."
20044-200440120 = "Na verdade, comecei a fazer um trabalho de meio período."
20044-200440130 = "Por que um trabalho de meio período?"
20044-200440140 = "A nova máquina de treino que eu queria está em promoção."
20044-200440150 = "Mas não tenho dinheiro suficiente para comprá-la..."
20044-200440160 = "É tão cara assim?"
20044-200440170 = "Sim... O preço original é de 600 mil ienes..."
20044-200440180 = "Mas na promoção está por 450 mil ienes."
20044-200440190 = "Que caro!"
20044-200440200 = "Por que não solicita o orçamento como equipamento?"
20044-200440210 = "Isso demoraria demais,"
20044-200440220 = "e a promoção acabaria."
20044-200440230 = "Além disso, esse trabalho"
20044-200440240 = "também serve como treino, então é como matar dois coelhos com uma cajadada só."
20044-200440250 = "Não sabia que existia um trabalho assim...!"
20044-200440260 = "Se tiver interesse,"
20044-200440270 = "venha ao estádio de atletismo algum dia."
20044-200440280 = "Tenho boas notícias, treinador."
20044-200440290 = "Pode-se dizer que este é o melhor resultado possível."
20044-200440300 = "O melhor resultado?"
20044-200440310 = "Aquela máquina de treino de que falei antes,"
20044-200440320 = "consegui comprá-la à vista!"
20044-200440330 = "Uma coisa tão cara assim!?"
20044-200440340 = "Sim."
20044-200440350 = "Realmente, suar e receber a recompensa por isso é algo maravilhoso!"
20044-200440360 = "Por isso, é estranho, mas..."
20044-200440370 = "O treino também é sobre 'mover o corpo e se esforçar',"
20044-200440380 = "então por que todos evitam tanto?"
20044-200440390 = "B-bem... quem sabe, né?"
20044-200440400 = "Treinador,"
20044-200440410 = "o que é importante para viver?"
20044-200440420 = "Descanso!"
20044-200440430 = "E também, jogos!"
20044-200440440 = "O descanso é realmente importante."
20044-200440450 = "Se continuar treinando à força, o risco de lesões aumenta,"
20044-200440460 = "e isso acaba atrapalhando o crescimento muscular."
20044-200440470 = "Jogos, é...?"
20044-200440480 = "Seria uma forma de aliviar o estresse?"
20044-200440490 = "De fato, o estresse afeta a saúde física."
20044-200440500 = "Mas, na minha opinião..."
20044-200440510 = "Afinal, a "saúde" é a coisa mais importante para se viver, não é?"
20044-200440520 = "Olá, Treinador."
20044-200440530 = "Você tem um momento?"
20044-200440540 = "Claro. Aconteceu alguma coisa?"
20044-200440550 = "Na verdade, eu gostaria de pedir um conselho..."
20044-200440560 = "Recebi um contato do gerente do estádio onde eu trabalhava antes."
20044-200440570 = "Por isso, tem algo que eu gostaria que você visse também."
20044-200440580 = "Do gerente do estádio...?"
20044-200440590 = "Entendido. Estou indo agora mesmo!"
20044-200440600 = "Bom dia, Treinador."
20044-200440610 = "Se você tiver algum tempo livre na sua agenda,"
20044-200440620 = "essa é a oportunidade perfeita para se exercitar."
20044-200440630 = "Se tiver um tempo, por favor, venha até a academia!"
20044-200440640 = "Sumire, algo terrível aconteceu!"
20044-200440650 = "Algo terrível?"
20044-200440660 = "É raro ver você tão agitado assim, Treinador."
20044-200440670 = "O que aconteceu?"
20044-200440680 = "A internet inteira está em polvorosa falando sobre você, Sumire!"
20044-200440690 = "......Eu?"
20044-200440700 = "O que será que aconteceu?"
20044-200440710 = "Vamos conversar um pouco."
20044-200440720 = "Se a minha memória não falha,"
20044-200440730 = "receber um convite seu"
20044-200440740 = "é algo extremamente raro."
20044-200440750 = "Essa é uma experiência muito feliz."
20044-200440760 = "Sinto meu coração bater mais forte..."
20044-200440770 = "Estou indo agora mesmo!"
