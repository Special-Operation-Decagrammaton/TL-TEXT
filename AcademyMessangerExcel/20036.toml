[translation]
20036-200360010 = "Muito bem."
20036-200360020 = "A organização já está quase terminada!"
20036-200360030 = "Bom trabalho, Serika."
20036-200360040 = "O que vamos fazer depois disso?"
20036-200360050 = "Já está decidido, não está?"
20036-200360060 = "Vamos aproveitar as melhores férias de todas."
20036-200360070 = "Não que as atividades de restauração não tenham sido divertidas, mas..."
20036-200360080 = "Só isso não dá para chamar de férias perfeitas, né!"
20036-200360090 = "O Sensei também vai junto!"
20036-200360100 = "Ei."
20036-200360110 = "Sensei."
20036-200360120 = "Por acaso, a minha bagagem está com você..."
20036-200360130 = "Estou guardando ela."
20036-200360140 = "Te entrego amanhã."
20036-200360150 = "Ah."
20036-200360160 = "Oh."
20036-200360170 = "Entendi."
20036-200360180 = "...Obrigada."
20036-200360190 = "Falando nisso, Sensei."
20036-200360200 = "Eu encontrei algo interessante no depósito."
20036-200360210 = "Pode dar uma olhada?"
20036-200360220 = "Ah, se estiver ocupado, tudo bem."
20036-200360230 = "O que você encontrou?"
20036-200360240 = "Vou me arrumar e já vou."
20036-200360250 = "Bem."
20036-200360260 = "Não é nada tão importante, mas..."
20036-200360270 = "Vou indo na frente te esperar!"
20036-200360280 = "Sensei!"
20036-200360290 = "Onde você foi?!"
20036-200360300 = "Ah, eu não vou te perdoar!"
20036-200360310 = "Nos seus sonhos..."
20036-200360320 = "No coração da Serika..."
20036-200360330 = "Prepare-se!"
20036-200360340 = "Vou te encontrar rapidinho!"
20036-200360350 = "Quando eu te pegar, vou te amarrar no barco!!"
20036-200360360 = "Haa."
20036-200360370 = "Tem mais poeira do que eu pensava, que trabalhão."
20036-200360380 = "Deixei acumular demais só porque é um lugar que não aparece."
20036-200360390 = "Está limpando a sala de aula?"
20036-200360400 = "E as outras?"
20036-200360410 = "Parece que as outras têm coisas para fazer."
20036-200360420 = "Eu estava com um tempo livre,"
20036-200360430 = "então pensei em aproveitar para limpar."
20036-200360440 = "Então chegou a minha vez."
20036-200360450 = "Vou te ajudar."
20036-200360460 = "?"
20036-200360470 = "Hã?"
20036-200360480 = "Sensei?"
20036-200360490 = "Eu sabia que isso ia acontecer."
20036-200360500 = "Não vai ter uma próxima vez!"
20036-200360510 = "Com certeza!"
20036-200360520 = "Entre em contato de novo, tá?"
20036-200360530 = "Eu vou te visitar a qualquer hora"
20036-200360540 = "Sim"
20036-200360550 = "Ah"
20036-200360560 = "Não"
20036-200360570 = "Não, não, não!"
20036-200360580 = "Não é isso! Não é nada!!"
