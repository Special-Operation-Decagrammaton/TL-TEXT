[translation]
10069-100690010 = "Olá, Sensei."
10069-100690020 = "Uhm, a reunião é hoje, certo?"
10069-100690030 = "Desculpe por te fazer esperar. Hoje está tudo bem."
10069-100690040 = "Ahaha!"
10069-100690050 = "Eu sei que você está ocupado com o trabalho da Schale, não tem problema."
10069-100690060 = "Afinal, fui eu quem pedi."
10069-100690070 = "Bem, eu chego aí depois do meio-dia, ok?"
10069-100690080 = "Sim, estarei esperando."
10069-100690090 = "Ok, até mais tarde."
10069-100690100 = "Sensei."
10069-100690110 = "Eu tenho um pequeno favor para pedir..."
10069-100690120 = "Você está ocupado com o trabalho?"
10069-100690130 = "Se for um pedido seu, Rumi, eu ajudo com prazer a qualquer hora."
10069-100690140 = "...Fufu, entendi."
10069-100690150 = "É verdade mesmo?"
10069-100690160 = "Nesse caso..."
10069-100690170 = "A Associação Comercial Genbu, ou melhor..."
10069-100690180 = "Para ser mais exata, é um protótipo pessoal meu."
10069-100690190 = "Se não for incômodo, você poderia experimentar?"
10069-100690200 = " Um novo prato da Rumi!"
10069-100690210 = "Ainda está em fase de testes, no entanto."
10069-100690220 = "Quando for conveniente para você, Sensei, poderia vir até a Associação Comercial Genbu?"
10069-100690230 = "Estarei esperando."
10069-100690240 = "Sensei, como você está?"
10069-100690250 = "Você está comendo direitinho em todas as refeições, né?"
10069-100690260 = "Estou comendo direitinho..."
10069-100690270 = "Tenho algo para resolver em Shanhaijing, estou a caminho agora."
10069-100690280 = "Oh, é mesmo?"
10069-100690290 = "Se tiver tempo, passe na Associação Comercial Genbu."
10069-100690300 = "Vou te dar um tratamento especial."
10069-100690310 = "Talvez você não saiba, Sensei, mas..."
10069-100690320 = "Na Associação Comercial Genbu, nós temos o \"Prato da Semana\"."
10069-100690330 = "Da semana...?"
10069-100690340 = "Isso. Toda semana, um prato diferente é escolhido."
10069-100690350 = "E nós o oferecemos por um preço especial, um pouco mais barato que o normal."
10069-100690360 = "E então..."
10069-100690370 = "O \"Prato da Semana\" é gyoza."
10069-100690380 = "Gyoza... Parece delicioso..."
10069-100690390 = "Então, hoje de manhã..."
10069-100690400 = "Parece que vou passar o tempo todo cozinhando gyoza no vapor."
10069-100690410 = "Posso ir ver?"
10069-100690420 = "Oh, ficou curioso?"
10069-100690430 = "Pode vir a qualquer hora, não tem problema."
10069-100690440 = "Se você tiver tempo livre na sua agenda, claro..."
10069-100690450 = "Hoje, por acaso, não tenho trabalho de manhã."
10069-100690460 = "Ah, é mesmo?"
10069-100690470 = "Entendido."
10069-100690480 = "Então, estarei esperando na Associação Comercial Genbu."
