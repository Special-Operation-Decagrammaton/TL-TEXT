[translation]
10069-100690010 = "お疲れ、先生"
10069-100690020 = "えっと、面談は今日でいいんだよね？"
10069-100690030 = "待たせちゃってごめんね。今日で大丈夫だよ。"
10069-100690040 = "あははっ"
10069-100690050 = "シャーレの仕事が忙しいのは分かってるし、しょうがないよ"
10069-100690060 = "あたしからお願いしたわけだしさ"
10069-100690070 = "んじゃ、昼過ぎには着くからよろしくね"
10069-100690080 = "うん、待ってるね"
10069-100690090 = "はーい、また後で"
10069-100690100 = "先生"
10069-100690110 = "ちょっとお願いがあるんだけど……"
10069-100690120 = "仕事で忙しいかな？"
10069-100690130 = "ルミの頼みなら、いつでも喜んで"
10069-100690140 = "……ふふっ、そっか"
10069-100690150 = "本当だね？"
10069-100690160 = "だったら……"
10069-100690170 = "玄武商会が、というか"
10069-100690180 = "正確には、あたしの個人的な試作品なんだけど"
10069-100690190 = "よかったら試食してもらえないかな？"
10069-100690200 = " ルミの新しい料理！"
10069-100690210 = "まだ試作段階だけどね"
10069-100690220 = "先生の都合がいいタイミングで、玄武商会まで来てもらえるかな？"
10069-100690230 = "待ってるね"
10069-100690240 = "先生、元気にしてる？"
10069-100690250 = "毎食、ちゃんと欠かさずに食べてるよね？"
10069-100690260 = "ちゃんと食べてるよ……"
10069-100690270 = "山海経に用事があって、いま向かってるところなんだ"
10069-100690280 = "おっ、そうなの？"
10069-100690290 = "時間があれば、玄武商会に寄ってね"
10069-100690300 = "特別にサービスしてあげるよ"
10069-100690310 = "先生は知らないかもしれないけど……"
10069-100690320 = "玄武商会には、「今週の料理」っていうのがあるんだ"
10069-100690330 = "今週の……？"
10069-100690340 = "そ。毎週、違う料理が選ばれてね"
10069-100690350 = "いつもよりちょっと安い特別価格で提供してるんだ"
10069-100690360 = "それで……"
10069-100690370 = "「今週の料理」は[ruby=チャオズ]餃子[/ruby]なの"
10069-100690380 = "餃子……美味しそう……"
10069-100690390 = "だから今日の午前中は"
10069-100690400 = "ずっと餃子を蒸すことになりそうでさ"
10069-100690410 = "見に行ってもいい？"
10069-100690420 = "おっ、気になるの？"
10069-100690430 = "いつでも来てもらって大丈夫だよ"
10069-100690440 = "先生の予定が空いてるなら、だけど……"
10069-100690450 = "今日はちょうど、午前の仕事がないんだ"
10069-100690460 = "そうだったんだ"
10069-100690470 = "分かった"
10069-100690480 = "それじゃ、玄武商会で待ってるね"
