[translation]
10028-100280010 = "ご主人様ー！今何してる？寝てる？寝てるかー"
10028-100280020 = "もうこんな時間だもんね"
10028-100280030 = "まだ起きてるよ、どうしたの？"
10028-100280040 = "アスナ、すごい時間まで起きてるね"
10028-100280050 = "お"
10028-100280060 = "びっくり！起きてたんだ！"
10028-100280070 = "私は今、ちょっとやることがあって"
10028-100280080 = "今は24時間空いてるコインランドリーにいるんだけど"
10028-100280090 = "あ、特にお仕事とかじゃないよ。それでなんとなく手持無沙汰で、連絡してみたの"
10028-100280100 = "仕事でもないのに、この時間までよく起きてるね……？"
10028-100280110 = "帰り道とか平気？誰かいる？"
10028-100280120 = "あははっ！"
10028-100280130 = "心配してくれてありがと、でも大丈夫！"
10028-100280140 = "じゃあ、良い夜を！"
10028-100280150 = "ご主人様ー"
10028-100280160 = "ご主人様って、ウサギに詳しかったりする？"
10028-100280170 = "もしかしてご主人様なら知ってるかなって"
10028-100280180 = "ウサギ？"
10028-100280190 = "うん！"
10028-100280200 = "色々調べてみたんだけど、何かすとんと落ちないっていうか"
10028-100280210 = "うーん"
10028-100280220 = "こうなったらやっぱり……"
10028-100280230 = "……？"
10028-100280240 = "決めた！"
10028-100280250 = "やっぱり実際に確認してみよう！"
10028-100280260 = "ご主人様ー？"
10028-100280270 = "どこに行ったのー？"
10028-100280280 = "もしかして、かくれんぼってこと？"
10028-100280290 = "ふふっ、それならそれで任せて"
10028-100280300 = "アスナは諦めないから！"
10028-100280310 = "諦めてもらえると……"
10028-100280320 = "その姿で撫でるとちょっと……"
10028-100280330 = "えー？"
10028-100280340 = "うーん……"
10028-100280350 = "やーだ♪諦めないよ！"
10028-100280360 = "ご主人様ー"
10028-100280370 = "今どこにいるの？"
10028-100280380 = "この前ね、みんなと話してたら「バニーガール姿とウサギは違うんじゃない？」って言われて"
10028-100280390 = "だからこの間、ご主人様は逃げちゃったってこと？"
10028-100280400 = "そういうことなの？"
10028-100280410 = "だいたいそんな感じかな……"
10028-100280420 = "そっか！"
10028-100280430 = "じゃああらためて聞きたいことがあるんだけど"
10028-100280440 = "後で、ご主人様のところに行くね！"
10028-100280450 = "あ、そういえば聞くの忘れてた！"
10028-100280460 = "ご主人様はどう、嬉しい？楽しい？"
10028-100280470 = "答えてくれるんでしょ？"
10028-100280480 = "アスナといるといつも楽しいよ"
10028-100280490 = "アスナも楽しかったら、それが一番嬉しいな"
10028-100280500 = "……"
10028-100280510 = "！！"
10028-100280520 = "分かったかも"
10028-100280530 = "うん！なるほどね！"
10028-100280540 = "ありがとーご主人様！これからもいっぱいいーっぱい、楽しませてあげるね！"
10028-100280550 = "ご主人様ーー！！"
10028-100280560 = "今日は忙しい感じ？"
10028-100280570 = "全然大丈夫だよ"
10028-100280580 = "何かあったの？"
10028-100280590 = "やった！！"
10028-100280600 = "じゃあ決まり！"
10028-100280610 = "細かいことは後でね"
10028-100280620 = "待ってるから！"
10028-100280630 = "？？？"
10028-100280640 = "アスナ？"
10028-100280650 = "ご主人様！"
10028-100280660 = "今日もすっごく楽しかったよ！"
10028-100280670 = "ご主人様と会えると、本当に毎回楽しいなぁ"
10028-100280680 = "たびたび心臓も痛いけどね……そろそろ慣れたいかな"
10028-100280690 = "アスナが楽しかったなら良かった"
10028-100280700 = "あはは！！"
10028-100280710 = "じゃあそのためにもやっぱり"
10028-100280720 = "アスナはこれから毎日、ご主人様に会いに行くね？"
10028-100280730 = "うん、決まり！"
10028-100280740 = "そしたら、毎日が楽しくなるはずだから！"
10028-100280750 = "これからも、アスナと遊んでくれるよね？"
10028-100280760 = "じゃあ明日もよろしく、ご主人様！！"
