[translation]
10028-100280010 = "Mestre! O que está fazendo? Dormindo? Ah, está dormindo, né?"
10028-100280020 = "Já é essa hora, né?"
10028-100280030 = "Ainda estou acordado, o que foi?"
10028-100280040 = "Asuna, você está acordada até bem tarde, hein?"
10028-100280050 = "Oh."
10028-100280060 = "Nossa! Você estava acordado!"
10028-100280070 = "Eu tenho uma coisinha pra fazer agora."
10028-100280080 = "Estou em uma lavanderia 24 horas agora."
10028-100280090 = "Ah, não é nada de trabalho. É que eu estava meio à toa e resolvi te mandar uma mensagem."
10028-100280100 = "Mesmo não sendo por trabalho, você fica acordada até essa hora...?"
10028-100280110 = "E o caminho de volta, é tranquilo? Tem alguém com você?"
10028-100280120 = "Ahaha!"
10028-100280130 = "Obrigada por se preocupar, mas está tudo bem!"
10028-100280140 = "Então, tenha uma boa noite!"
10028-100280150 = "Mestre..."
10028-100280160 = "Mestre, por acaso você entende de coelhos?"
10028-100280170 = "Pensei que talvez o Mestre soubesse."
10028-100280180 = "Coelhos?"
10028-100280190 = "Sim!"
10028-100280200 = "Eu pesquisei bastante, mas parece que algo não se encaixa."
10028-100280210 = "Hmm..."
10028-100280220 = "Já que chegou a esse ponto..."
10028-100280230 = "...?"
10028-100280240 = "Decidi!"
10028-100280250 = "É isso, vou verificar pessoalmente!"
10028-100280260 = "Mestre?"
10028-100280270 = "Onde você foi?"
10028-100280280 = "Será que estamos brincando de esconde-esconde?"
10028-100280290 = "Fufu, se for isso, pode deixar comigo."
10028-100280300 = "A Asuna não desiste!"
10028-100280310 = "Se você pudesse desistir..."
10028-100280320 = "Fazer carinho em você com essa roupa é meio..."
10028-100280330 = "Hã?"
10028-100280340 = "Hmm..."
10028-100280350 = "Não quero♪ Não vou desistir!"
10028-100280360 = "Mestre..."
10028-100280370 = "Onde você está agora?"
10028-100280380 = "Outro dia, eu estava conversando com todo mundo e me disseram: \"Uma coelhinha e um coelho de verdade não são coisas diferentes?\"."
10028-100280390 = "Então foi por isso que o Mestre fugiu daquela vez?"
10028-100280400 = "Foi por isso?"
10028-100280410 = "Foi mais ou menos por aí..."
10028-100280420 = "Entendi!"
10028-100280430 = "Então, tem uma coisa que eu quero te perguntar de novo."
10028-100280440 = "Mais tarde eu vou aí te ver, Mestre!"
10028-100280450 = "Ah, falando nisso, esqueci de perguntar!"
10028-100280460 = "E você, Mestre, está feliz? Está se divertindo?"
10028-100280470 = "Você vai me responder, não vai?"
10028-100280480 = "É sempre divertido estar com você, Asuna."
10028-100280490 = "Se você também estiver se divertindo, Asuna, é isso que me deixa mais feliz."
10028-100280500 = "..."
10028-100280510 = "!!"
10028-100280520 = "Acho que entendi."
10028-100280530 = "Uhum! Entendi!"
10028-100280540 = "Obrigada, Mestre! De agora em diante, vou te divertir muuuito, muito!"
10028-100280550 = "Mestreee!!"
10028-100280560 = "Parece que você está ocupado hoje?"
10028-100280570 = "Não tem problema nenhum."
10028-100280580 = "Aconteceu alguma coisa?"
10028-100280590 = "Eba!!"
10028-100280600 = "Então, combinado!"
10028-100280610 = "Os detalhes a gente vê depois."
10028-100280620 = "Vou estar esperando!"
10028-100280630 = "???"
10028-100280640 = "Asuna?"
10028-100280650 = "Mestre!"
10028-100280660 = "Hoje foi super divertido também!"
10028-100280670 = "É sempre tão divertido encontrar você, Mestre."
10028-100280680 = "Apesar de que meu coração dói de vez em quando... Queria me acostumar com isso logo."
10028-100280690 = "Que bom que você se divertiu, Asuna."
10028-100280700 = "Ahaha!!"
10028-100280710 = "Então, para que isso aconteça..."
10028-100280720 = "A Asuna vai vir te ver todos os dias de agora em diante, tá bom?"
10028-100280730 = "Uhum, combinado!"
10028-100280740 = "Porque assim, todos os dias serão divertidos!"
10028-100280750 = "Você vai continuar se divertindo com a Asuna, né?"
10028-100280760 = "Então, até amanhã, Mestre!!"
