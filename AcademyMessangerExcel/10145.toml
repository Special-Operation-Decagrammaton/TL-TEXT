[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10145-101450010 = "Já que nos demos ao trabalho de vir até o desfiladeiro,"
10145-101450020 = "Não acha que deveríamos passar o tempo\nde uma forma apropriada para o local?"
10145-101450030 = "Com certeza, você tem razão."
10145-101450040 = "Hum."
10145-101450050 = "Parece que estamos de acordo."
10145-101450060 = "Sendo assim, vamos nos encontrar\nno lugar que eu te disser agora."
10145-101450070 = "Ah, agora mesmo!?"
10145-101450080 = "Fique tranquilo. Eu sou uma pessoa bem paciente."
10145-101450090 = "......Embora existam limites, é claro."
10145-101450100 = "De repente..."
10145-101450110 = "Eu acabei me lembrando de ontem."
10145-101450120 = "Foi muito divertido, não foi?"
10145-101450130 = "Pois é."
10145-101450140 = "No entanto,"
10145-101450150 = "Ainda é muito cedo para deixar\nisso apenas no passado."
10145-101450160 = "Portanto, estarei te esperando hoje também."
10145-101450170 = "Porque o Sensei é sempre o melhor de todos!"
10145-101450180 = "Kisaki...?"
10145-101450190 = "Sensei, já está acordado?"
10145-101450200 = "Hmm...?"
10145-101450210 = "Aconteceu alguma coisa tão cedo?"
10145-101450220 = "Acordar cedo é digno de admiração."
10145-101450230 = "O tempo flui incessantemente."
10145-101450240 = "Usá-lo da forma mais eficiente possível..."
10145-101450250 = "É o que garante férias sem arrependimentos."
10145-101450260 = "Os dias quentes continuam, está se cuidando?"
10145-101450270 = "Com os raios de sol tão fortes assim,"
10145-101450280 = "Acabo sentindo saudades daquele desfiladeiro."
10145-101450290 = "O que me diz, Sensei?"
10145-101450300 = "Para um lugar apropriado para trajes de banho."
10145-101450310 = "Hm...?"
10145-101450320 = "Agradeço por ter passado este verão comigo."
10145-101450330 = "Foram todas memórias inesquecíveis."
10145-101450340 = "Ainda não acabou."
10145-101450350 = "Oh?"
10145-101450360 = "Ainda está bem quente lá fora, não está?"
10145-101450370 = "O verão ainda vai continuar, certo?"
10145-101450380 = "Isso é verdade, mas..."
10145-101450390 = "Entendo."
10145-101450400 = "Então, ainda ficará ao meu lado por mais tempo?"
10145-101450410 = "Se você quiser, pelo tempo que desejar."
10145-101450420 = "Entendido."
10145-101450430 = "Fufu."
10145-101450440 = "Tente não dizer esse tipo de coisa em outros lugares."
10145-101450450 = "Sendo você o Sensei, talvez seja uma preocupação inútil, mas..."
10145-101450460 = "Dizem que certas borboletas guardam promessas pela eternidade."