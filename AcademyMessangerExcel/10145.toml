[translation]
10145-101450010 = "せっかく渓谷にまで来たのならば"
10145-101450020 = "相応の過ごし方をすべきだとは思わぬかえ？"
10145-101450030 = "たしかにそうだね"
10145-101450040 = "うむ"
10145-101450050 = "見解は一致しておるようじゃな"
10145-101450060 = "では、今から言う場所で落ち合うとしよう"
10145-101450070 = "あ、今すぐ！？"
10145-101450080 = "安心せい。気は長いほうじゃ"
10145-101450090 = "……限度はあるがの"
10145-101450100 = "ふと"
10145-101450110 = "昨日を思い出したのじゃ"
10145-101450120 = "楽しかったよね"
10145-101450130 = "そうじゃな"
10145-101450140 = "とはいえ"
10145-101450150 = "過去にするのはまだ早かろう"
10145-101450160 = "では、今日も待っておるぞ"
10145-101450170 = "だって、先生はいつだって最高ですから！"
10145-101450180 = "キサキ……？"
10145-101450190 = "先生、起きておるか？"
10145-101450200 = "ん……？"
10145-101450210 = "朝早くにどうしたの？"
10145-101450220 = "早起きとは感心じゃな"
10145-101450230 = "時は絶えず流れ続ける"
10145-101450240 = "少しでも有効に使うことが"
10145-101450250 = "悔いのない休暇に繋がるのじゃ"
10145-101450260 = "暑い日が続くが、息災かえ？"
10145-101450270 = "こうも日差しが強くては"
10145-101450280 = "あの渓谷が恋しくなってしまうのう"
10145-101450290 = "先生もどうじゃ？"
10145-101450300 = "水着にふさわしき場所へ"
10145-101450310 = "ん……？"
10145-101450320 = "この夏を共にしてくれたこと、礼を言う"
10145-101450330 = "どれも忘れられない思い出ばかりじゃ"
10145-101450340 = "まだだよ"
10145-101450350 = "ほう？"
10145-101450360 = "外はまだ暑いでしょ？"
10145-101450370 = "夏はまだ続くでしょ？"
10145-101450380 = "それはそうじゃが……"
10145-101450390 = "そうか"
10145-101450400 = "ならば、妾とまだ一緒にいてくれるのかえ？"
10145-101450410 = "望むなら、いくらでも"
10145-101450420 = "そうか"
10145-101450430 = "ふふ"
10145-101450440 = "あまり他所でそういうことは言わぬようにな"
10145-101450450 = "先生ならば心配は不要やもしれぬが……"
10145-101450460 = "とある蝶は、永久に約束を記憶するそうじゃからの"
