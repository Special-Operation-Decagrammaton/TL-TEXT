[translation]
10145-101450010 = "Раз уж мы проделали столь долгий путь до этой долины,"
10145-101450020 = "не думаете ли вы, что нам стоит провести время соответствующим образом?"
10145-101450030 = "Пожалуй, ты права."
10145-101450040 = "Именно."
10145-101450050 = "Что ж, похоже, мы пришли к согласию."
10145-101450060 = "В таком случае, давайте встретимся там, где я скажу."
10145-101450070 = "Погоди, прямо сейчас?!"
10145-101450080 = "Не волнуйтесь так. Я человек терпеливый."
10145-101450090 = "……Хотя, разумеется, всему есть предел."
10145-101450100 = "Внезапно,"
10145-101450110 = "мне вспомнился вчерашний день."
10145-101450120 = "Было ведь весело, правда?"
10145-101450130 = "Действительно."
10145-101450140 = "Тем не менее,"
10145-101450150 = "ещё слишком рано оставлять это в прошлом."
10145-101450160 = "Так что сегодня я тоже буду ждать вас."
10145-101450170 = "Потому что вы, Сенсей, всегда лучший!"
10145-101450180 = "Кисаки...?"
10145-101450190 = "Сенсей, вы уже проснулись?"
10145-101450200 = "Хмм...?"
10145-101450210 = "Что привело тебя сюда в такую рань?"
10145-101450220 = "Я впечатлена вашим ранним подъёмом."
10145-101450230 = "Время течёт непрерывно."
10145-101450240 = "И умение ценить каждое мгновение —"
10145-101450250 = "вот залог отпуска без сожалений."
10145-101450260 = "Жаркие дни продолжаются. Как вы себя чувствуете?"
10145-101450270 = "Когда солнце припекает так сильно,"
10145-101450280 = "я порой ловлю себя на том, что скучаю по той долине."
10145-101450290 = "А вы, Сенсей?"
10145-101450300 = "По месту, которое достойно купальника."
10145-101450310 = "Хмм...?"
10145-101450320 = "Благодарю вас за то, что провели это лето со мной."
10145-101450330 = "Каждый миг оставил незабываемые воспоминания."
10145-101450340 = "Оно ведь ещё не закончилось."
10145-101450350 = "О?"
10145-101450360 = "На улице всё ещё жарко, верно?"
10145-101450370 = "Лето всё ещё продолжается, так?"
10145-101450380 = "Возможно, это и так, но..."
10145-101450390 = "Я понимаю."
10145-101450400 = "В таком случае, продолжите ли вы оставаться со мной?"
10145-101450410 = "Если ты этого желаешь — так долго, как тебе захочется."
10145-101450420 = "Вот как."
10145-101450430 = "Хе-хе."
10145-101450440 = "Постарайтесь не говорить подобных вещей другим."
10145-101450450 = "Хотя, пожалуй, в вашем случае мне не о чем беспокоиться, Сенсей..."
10145-101450460 = "Ведь говорят, что одна бабочка помнит свои обещания вечно."