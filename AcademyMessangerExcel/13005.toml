[translation]
13005-1039 = "先生は、自分の外見のことで悩んだことある？"
13005-1040 = "急にどうしたの？"
13005-1041 = "……先生も知ってる通り私、よく第一印象が怖いって言われるから"
13005-1042 = "変なのに絡まれることも多いし"
13005-1043 = "そのおかげで得したことも……あんまり無いし"
13005-1044 = "先生、前に探してほしいって言ってたの、ようやく手に入ったよ"
13005-1045 = "やった、ありがとう！"
13005-1046 = "その反応、相当探してたんだね。なら良かった"
13005-1047 = "今日の午後にでも、もし時間があったら便利屋に寄って受け取っていって"
13005-1048 = "シャーレの仕事が終わったら、すぐに行くね"
13005-1049 = "先生は、好きな音楽のジャンルとかある？"
13005-1050 = "ポップスかな"
13005-1051 = "クラシックかな"
13005-1052 = "そっか、まあ似合ってると思う"
13005-1053 = "カヨコはどんな音楽が好きなの？"
13005-1054 = "私は……まあ、普通のやつ。先生と結構好み近いかも"
13005-1055 = "あの2ndアルバム、聞き終わった？"
13005-1056 = "ブラック・デス・ポイズン、最高じゃない？"
13005-1057 = "……脳にガツン！って来る感じだった"
13005-1058 = "……アバンギャルドな感じだった"
13005-1059 = "さすが、先生なら分かってくれると思った"
13005-1060 = "2ndアルバムは1stアルバムに比べて歌詞は分かりやすくなったけど、"
13005-1061 = "サウンドはますます激しくなってるから、こっちの方が好きって人は多くて"
13005-1062 = "もし気に入ったなら、今度3rdアルバムを貸してあげる"
13005-1063 = "考えとくね……"
13005-1064 = "天気予報で、今日の午後は雨だって"
13005-1065 = "傘、忘れないようにね"
13005-1066 = "トリニティに世界中の全ての本を集めた巨大な図書館があるらしいけど……"
13005-1067 = "世界中のレコードを集めたレコード屋とか、どこかにないのかな"
13005-1068 = "商店街の「ザ・レコードビル」とかは？"
13005-1069 = "あそこも世界中ってわけじゃないけど……品揃えは確かに悪くない"
13005-1070 = "ジャンルを問わず、色々なレコードが集められてるから"
13005-1071 = "休みの日とか、よく行く"
