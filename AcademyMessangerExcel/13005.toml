[translation]
13005-1039 = "Professor, você já se preocupou com a sua aparência?"
13005-1040 = "O que houve de repente?"
13005-1041 = "...Como o Professor sabe, muitas vezes dizem que minha primeira impressão é assustadora."
13005-1042 = "E muitas vezes me meto em problemas com pessoas estranhas."
13005-1043 = "Também não tive muitos benefícios por causa disso..."
13005-1044 = "Professor, finalmente consegui o que você me pediu para procurar antes."
13005-1045 = "Consegui! Obrigado!"
13005-1046 = "Pela sua reação, você realmente estava procurando muito. Que bom então."
13005-1047 = "Se tiver tempo hoje à tarde, passe na Agência de Faz-Tudo para pegar."
13005-1048 = "Assim que terminar o trabalho na Schale, irei imediatamente."
13005-1049 = "Professor, você tem algum gênero musical favorito?"
13005-1050 = "Talvez pop."
13005-1051 = "Talvez clássica."
13005-1052 = "Entendi, acho que combina com você."
13005-1053 = "Que tipo de música a Kayoko gosta?"
13005-1054 = "Eu... bem, coisas normais. Meus gostos podem ser bem parecidos com os do Professor."
13005-1055 = "Você terminou de ouvir aquele segundo álbum?"
13005-1056 = "Black Death Poison, não é incrível?"
13005-1057 = "...Foi como um soco no cérebro!"
13005-1058 = "...Foi uma sensação vanguardista."
13005-1059 = "Como esperado, pensei que o Professor entenderia."
13005-1060 = "No segundo álbum, as letras ficaram mais fáceis de entender em comparação com o primeiro,"
13005-1061 = "mas o som ficou ainda mais intenso, então muitas pessoas preferem este."
13005-1062 = "Se você gostou, da próxima vez te empresto o terceiro álbum."
13005-1063 = "Vou pensar nisso..."
13005-1064 = "A previsão do tempo diz que vai chover esta tarde."
13005-1065 = "Não se esqueça do guarda-chuva."
13005-1066 = "Dizem que há uma biblioteca gigante na Trinity que reúne todos os livros do mundo..."
13005-1067 = "Será que não existe uma loja de discos em algum lugar que reúna discos de todo o mundo?"
13005-1068 = "E o 'The Record Building' na rua comercial?"
13005-1069 = "Não é de todo o mundo, mas a seleção de produtos não é ruim."
13005-1070 = "Eles têm uma variedade de discos de todos os gêneros,"
13005-1071 = "então eu costumo ir lá nos meus dias de folga."
