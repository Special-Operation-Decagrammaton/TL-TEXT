[translation]
10010-720 = "スクランブルエッグ、牛乳500ml、トマト3切れ→朝ごはん"
10010-721 = "明日の朝、ランニングの後スーパーに寄る"
10010-722 = "……？"
10010-723 = "シロコ？"
10010-724 = "あ"
10010-725 = "自分宛てのメモだったのに間違えた、ごめん先生"
10010-726 = "メモ帳代わりに？"
10010-727 = "そういうモモトークの使い方もあるんだね"
10010-728 = "ん……いつも使うものだし、楽"
10010-729 = "でも、あんまりこうやって使ってる人は見たことないかも"
10010-730 = "あ、そういえば、今送っちゃった件なんだけど"
10010-731 = "書いた通り、明日の朝スーパーに寄って買い物しようと思ってて"
10010-732 = "よかったら一緒にどう？"
10010-733 = "うん、喜んで"
10010-734 = "私もちょうど買いたい物あったし"
10010-735 = "じゃあ、あの場所でね"
10010-736 = "15kmって、人によっては辛い距離なんだね"
10010-737 = "ごめん……今度からはちょっと気を付ける"
10010-738 = "先生"
10010-739 = "今日、通学路でフェネックを見かけた"
10010-740 = "フェネック、珍しいね"
10010-741 = "野生のフェネックなのかな"
10010-742 = "うん。最近あの辺に時々いるみたい"
10010-743 = "それから、昨日の夜は流星群も見たの"
10010-744 = "ランニングをしてると色んなものを見かける"
10010-745 = "走ることだけじゃなくて、そういうのも楽しい"
10010-746 = "良いね。一緒には走ってあげられないけど、応援してる"
10010-747 = "……ん"
10010-748 = "ごめん。そうやって優しいことを言ってもらえるの、あんまり慣れてなくて"
10010-749 = "えっと"
10010-750 = "ありがとう、先生"
10010-751 = "先生、今日のことは、その……"
10010-752 = "本当にごめん、私のデリカシーがなかった……"
10010-753 = "もっと早く気づくべきだった、ごめんね"
10010-754 = "あ……"
10010-755 = "ん、その……"
10010-756 = "そんなことはない、私の方こそごめん……"
10010-757 = "えっと、じゃあこれで終わりってことで……"
10010-758 = "今日はありがとう、じゃあまた"
10010-759 = "先生"
10010-760 = "自転車は好き？"
10010-761 = "普通に好きだけど、急だね！？"
10010-762 = "自転車かあ……まあそれなりに……"
10010-763 = "ん、そっか"
10010-764 = "私は結構好き"
10010-765 = "最近新しい自転車のショップができたみたいで、一緒に行かない？"
10010-766 = "えっと、今日は楽しかった"
10010-767 = "無線変速機も、新しいフレームも見れたし"
10010-768 = "ライディング用水筒も買えた、けど……"
10010-769 = "その、先生。また今度、一緒に行ってくれる？"
10010-770 = "うん。私もちょっと興味が湧いてきたかも"
10010-771 = "こちらこそ楽しかったから、ぜひ"
10010-772 = "シャーレがあるD.U.って、たくさん地下鉄が通ってるよね"
10010-773 = "先生もよく使うの？"
10010-774 = "うん、シャーレから移動する時はよく乗ってるよ"
10010-775 = "うん、社会人の移動に地下鉄は付き物だよね、"
10010-776 = "そうだよね、ありがとう。……参考にする"
10010-777 = "……参考に？"
10010-778 = "準備する物：双眼鏡、監視カメラの位置データ、GPS追跡電波妨害機"
10010-779 = "動線をチェックすること。360度の視野の確保が必要"
10010-780 = "！？"
10010-781 = "あの、シロコさん？"
10010-782 = "あ"
10010-783 = "ごめん先生、また間違えて送っちゃった"
10010-784 = "お気に入り登録で、先生のチャットが一番上にあるせいかも"
10010-785 = "さっきのメッセージは気にしないで"
10010-786 = "先生、家であらためて考えてみたんだけど、他の学園を襲うのはどう？"
10010-787 = "……えっと"
10010-788 = "……ごめん、やっぱり今の無しで"
10010-789 = "先生"
10010-790 = "今日ね、その……"
10010-791 = "あ、ちょうど良かった"
10010-792 = "シロコに話したいことがあって"
10010-793 = "……ん？"
10010-794 = "私に？"
10010-795 = "先生が？"
10010-796 = "うん、大事なこと"
10010-797 = "二人で話したいな"
10010-798 = "……ん"
10010-799 = "分かった"
10010-800 = "それじゃあ放課後、教室で待ってる"
10010-801 = "先生"
10010-802 = "私、変なこと言ってるかもしれないけど"
10010-803 = "これからも、何か私が良くないことをしてると思ったら、"
10010-804 = "その時は、怒ってほしい、かも"
10010-805 = "気にかけてくれる大人がいるってことは、"
10010-806 = "その、何ていうか……"
10010-807 = "嬉しいなって、思って"
10010-100100010 = "先生"
10010-100100020 = "最近もまだ、いつもの地下鉄使ってる？"
10010-100100030 = "地下鉄以外、あんまり選択肢も無いからね……"
10010-100100040 = "ロードバイクで行くほどの体力はなくてね……"
10010-100100050 = "ん"
10010-100100060 = "分かった"
10010-100100070 = "じゃあ、またね"
10010-100100080 = "シロコ……？"
