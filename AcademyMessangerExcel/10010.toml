[translation]
10010-720 = "Ovos mexidos, 500ml de leite, 3 fatias de tomate -> Café da manhã"
10010-721 = "Amanhã de manhã, passar no supermercado depois da corrida."
10010-722 = "…...?"
10010-723 = "Shiroko?"
10010-724 = "Ah."
10010-725 = "Era um lembrete para mim, mas enviei errado. Desculpe, Sensei."
10010-726 = "Como um bloco de notas?"
10010-727 = "Então existe essa forma de usar o Momotalk."
10010-728 = "Hmm... É algo que eu sempre uso, então é mais prático."
10010-729 = "Mas acho que nunca vi ninguém usando assim."
10010-730 = "Ah, falando nisso, sobre o que eu acabei de enviar..."
10010-731 = "Como eu escrevi, estava pensando em passar no supermercado amanhã de manhã para fazer compras."
10010-732 = "Se quiser, quer ir comigo?"
10010-733 = "Sim, com prazer."
10010-734 = "Eu também tinha umas coisas que queria comprar."
10010-735 = "Então, nos vemos naquele lugar."
10010-736 = "15km é uma distância difícil para algumas pessoas, né?"
10010-737 = "Desculpe... Da próxima vez, vou tomar mais cuidado."
10010-738 = "Sensei."
10010-739 = "Hoje, vi uma raposa-feneco no caminho para a escola."
10010-740 = "Uma raposa-feneco, que raro."
10010-741 = "Será que era uma raposa-feneco selvagem?"
10010-742 = "Sim. Parece que ela tem aparecido por lá de vez em quando."
10010-743 = "E ontem à noite, eu também vi uma chuva de meteoros."
10010-744 = "Eu vejo muitas coisas diferentes quando estou correndo."
10010-745 = "Não é só a corrida, esse tipo de coisa também é divertido."
10010-746 = "Que legal. Não posso correr com você, mas estou torcendo."
10010-747 = "...Hmm."
10010-748 = "Desculpe. Não estou muito acostumada a ouvir coisas tão gentis."
10010-749 = "Uhm..."
10010-750 = "Obrigada, Sensei."
10010-751 = "Sensei, sobre hoje, é que..."
10010-752 = "Me desculpe mesmo, eu não tive o menor tato..."
10010-753 = "Eu deveria ter percebido antes, me desculpe."
10010-754 = "Ah..."
10010-755 = "Hmm, é que..."
10010-756 = "Não é nada disso, eu é que peço desculpas..."
10010-757 = "Uhm, então... vamos deixar por isso mesmo..."
10010-758 = "Obrigada por hoje, até mais."
10010-759 = "Sensei."
10010-760 = "Você gosta de bicicletas?"
10010-761 = "Gosto, mas que pergunta repentina!"
10010-762 = "Bicicletas, hein... Bem, até que gosto..."
10010-763 = "Hmm, entendi."
10010-764 = "Eu gosto bastante."
10010-765 = "Parece que abriu uma loja nova de bicicletas recentemente, quer ir comigo?"
10010-766 = "Uhm, hoje foi divertido."
10010-767 = "Pude ver o câmbio sem fio e os quadros novos."
10010-768 = "Também consegui comprar a garrafa de água para ciclismo, mas..."
10010-769 = "É que, Sensei... você vai comigo de novo outra hora?"
10010-770 = "Sim. Acho que também fiquei um pouco interessada."
10010-771 = "Eu que me diverti, então com certeza."
10010-772 = "A D.U., onde fica a Schale, tem muitas linhas de metrô, né?"
10010-773 = "Sensei, você usa com frequência?"
10010-774 = "Sim, eu pego bastante quando saio da Schale."
10010-775 = "Sim, o metrô é essencial para a locomoção de quem trabalha, né?"
10010-776 = "Verdade, né? Obrigada. ...Vou usar como referência."
10010-777 = "...Como referência?"
10010-778 = "Itens a preparar: binóculos, dados de localização das câmeras de vigilância, bloqueador de sinal de rastreamento GPS."
10010-779 = "Verificar as rotas de movimento. É necessário garantir um campo de visão de 360 graus."
10010-780 = "!?"
10010-781 = "Hum, Shiroko?"
10010-782 = "Ah."
10010-783 = "Desculpa, Sensei, enviei por engano de novo."
10010-784 = "Talvez seja porque a sua conversa está no topo dos meus favoritos."
10010-785 = "Não se preocupe com a mensagem de antes."
10010-786 = "Sensei, pensei melhor em casa, que tal atacarmos outras escolas?"
10010-787 = "...Err..."
10010-788 = "...Desculpa, esquece o que eu disse."
10010-789 = "Sensei."
10010-790 = "Hoje, é que..."
10010-791 = "Ah, que bom."
10010-792 = "Eu queria falar uma coisa com você, Shiroko."
10010-793 = "...Hm?"
10010-794 = "Comigo?"
10010-795 = "Você, Sensei?"
10010-796 = "Sim, é importante."
10010-797 = "Queria conversar a sós com você."
10010-798 = "...Hm."
10010-799 = "Entendi."
10010-800 = "Então, estarei esperando na sala de aula depois da escola."
10010-801 = "Sensei."
10010-802 = "Eu posso estar dizendo algo estranho, mas..."
10010-803 = "De agora em diante, se você achar que estou fazendo algo errado,"
10010-804 = "nessa hora, eu gostaria que você ficasse com raiva de mim, talvez."
10010-805 = "Ter um adulto que se preocupa comigo,"
10010-806 = "é, como posso dizer..."
10010-807 = "me deixa feliz, eu acho."
10010-100100010 = "Sensei."
10010-100100020 = "Você ainda tem usado o metrô de sempre ultimamente?"
10010-100100030 = "É que não tenho muitas outras opções além do metrô..."
10010-100100040 = "Não tenho fôlego para ir de bicicleta de estrada..."
10010-100100050 = "Hm."
10010-100100060 = "Entendi."
10010-100100070 = "Então, até mais."
10010-100100080 = "Shiroko...?"
