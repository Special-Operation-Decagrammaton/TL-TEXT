[translation]
23005-2194 = "こんにちは、先生。アヤネです"
23005-2195 = "少し、お時間よろしいでしょうか？"
23005-2196 = "大丈夫だよ、どうしたの？"
23005-2197 = "それなりに忙しいけど、アヤネのためなら全然大丈夫！"
23005-2198 = "ありがとうございます、実は……"
23005-2199 = "え、えっと、あはは……。あ、ありがとうございます"
23005-2200 = "実は……"
23005-2201 = "ご相談と言いますか、聞いていただきたいことがあると言いますか……"
23005-2202 = "少し、お話したいことがありまして"
23005-2203 = "突然のことですみません！"
23005-2204 = "うん、分かった"
23005-2205 = "ううん、全然大丈夫"
23005-2206 = "あ、ありがとうございます！では次の休日、学校でお会いしましょう！"
23005-2207 = "先生、あの本なのですが"
23005-2208 = "商店街のアンティークショップに依頼してみたところ、"
23005-2209 = "あまり価値のない、古い大衆小説だそうです……"
23005-2210 = "あらら……"
23005-2211 = "そっか……"
23005-2212 = "あはは……ですが、1200円も頂いてしまいました"
23005-2213 = "価値は無いと言っても、これぐらいにはなったみたいです"
23005-2214 = "時間の無駄ではなかったね"
23005-2215 = "良かったね"
23005-2216 = "はい、そうですね"
23005-2217 = "また何か変なご相談をするかもしれませんが、よろしくお願いします。先生"
23005-2218 = "先生、良いニュースです"
23005-2219 = "とある物を学校で見つけたのですが"
23005-2220 = "結構良いお金になりそうでして"
23005-2221 = "ふふっ、もしかしたら棚ぼたかもしれません"
23005-2222 = "どういうもの？"
23005-2223 = "普通の鉄みたいなのですが、"
23005-2224 = "量があるのでそれなりのお金になるのではないかと"
23005-2225 = "私も見に行っていい？"
23005-2226 = "え？"
23005-2227 = "あ、はい、もちろん大丈夫ですが……"
23005-2228 = "お疲れ様でした、先生"
23005-2229 = "大丈夫……？"
23005-2230 = "はい、大丈夫です"
23005-2231 = "メガネもぐらついてますし、その、制服も少し破れてしまいましたが……"
23005-2232 = "2倍になりましたし！私たちの勝利です！"
23005-2233 = "お疲れ様……"
23005-2234 = "最近、学校の施設の故障が続いているのが、ちょっと心配でして"
23005-2235 = "昨日は停電が2時間も続きましたし……"
23005-2236 = "一昨日は水道も止まってしまいました"
23005-2237 = "地下の施設に、何か問題でも起きたのでしょうか……"
23005-2238 = "業者の人を呼んでみたら？"
23005-2239 = "誰か分かる人を呼んで、見てもらったらいいんじゃない？"
23005-2240 = "怪しい所を全部業者さんに見てもらうと、すごい金額になりそうなので……"
23005-2241 = "時間を見つけて、少しずつお休みの日にでも直さないと……"
23005-2242 = "私も手伝う？"
23005-2243 = "一緒に直そう"
23005-2244 = "あ……本当ですか？"
23005-2245 = "それでは、お言葉に甘えて。ありがとうございます、先生"
23005-2246 = "今日はお疲れ様でした。先生"
23005-2247 = "おかげさまで、無事に修理を終えることができました"
23005-2248 = "うん、お疲れ様"
23005-2249 = "アヤネも、お疲れ様"
23005-2250 = "えっと……あの……"
23005-2251 = "その……"
23005-2252 = "ん？"
23005-2253 = "どうしたの？"
23005-2254 = "また……お呼びしてもいいですか？その……"
23005-2255 = "今日は、ご迷惑をおかけしてしまったのですが……私、先生と……"
23005-2256 = "もちろんだよ"
23005-2257 = "もちろん、いつでも呼んで"
23005-2258 = "……ありがとうございます、先生"
23005-2259 = "それでは、またご連絡しますね"
23005-230050010 = "本日シャーレ当番ですが……シャーレへ行く前に"
23005-230050020 = "業務状況についていくつかお伺いしてもいいでしょうか？"
23005-230050030 = "アヤネ、助けて……"
23005-230050040 = "今日は書類地獄なんだ……"
23005-230050050 = "ほ、本当ですか！？"
23005-230050060 = "すぐに行きます！"
