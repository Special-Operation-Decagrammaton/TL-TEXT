[translation]
20052-200520010 = "Pergunta:"
20052-200520020 = "Dentre as opções abaixo, para sobreviver em Red Winter,"
20052-200520030 = "qual ação o Departamento Editorial deve tomar? (4 pontos)"
20052-200520040 = "1. Criar uma semana de incentivo à leitura"
20052-200520050 = "2. Prosseguir com o projeto de digitalização de livros"
20052-200520060 = "3. Realizar obras na infraestrutura da linha de comunicação"
20052-200520070 = "A última não tem nada a ver com o Departamento Editorial, tem...?"
20052-200520080 = "É a sua resposta final?"
20052-200520090 = "Ah... eu desisto."
20052-200520100 = "Mufufu, eu imaginei."
20052-200520110 = "A resposta correta é a número 3."
20052-200520120 = "Hã...?"
20052-200520130 = "Se quiser uma explicação,"
20052-200520140 = "sinta-se à vontade para visitar o Departamento Editorial de Red Winter."
20052-200520150 = "“O contato do Departamento Editorial de Red Winter com Schale"
20052-200520160 = "em uma esfera privada: uma tese dadaísta sobre esse encontro histórico”"
20052-200520170 = "Este é o título do próximo artigo. O que acha?"
20052-200520180 = "Pesado!"
20052-200520190 = "Eu planejava fazer uma edição especial"
20052-200520200 = "aproveitando a memorável visita a Schale,"
20052-200520210 = "mas você veio como monitor..."
20052-200520220 = "Professor,"
20052-200520230 = "a viagem de negócios para Red Winter terminava hoje, não é?"
20052-200520240 = "Sim. Estou indo pegar o trem para voltar."
20052-200520250 = "Sim?"
20052-200520260 = "O trem de Red Winter...?"
20052-200520270 = "Algum problema com isso?"
20052-200520280 = "Hmm..."
20052-200520290 = "De qualquer forma,"
20052-200520300 = "eu vou te levar."
20052-200520310 = "Chegou em casa?"
20052-200520320 = "Hoje foi divertido graças ao Professor."
20052-200520330 = "Que bom!"
20052-200520340 = "Pensando bem, sinto que a raiz do problema"
20052-200520350 = "está no horário dos trens."
20052-200520360 = "Ora,"
20052-200520370 = "se a ferrovia de Red Winter estivesse sempre quebrada,"
20052-200520380 = "significaria que o Professor ficaria preso em uma viagem de trem eterna comigo...?"
20052-200520390 = "Definitivamente não."
20052-200520400 = "É, você tem razão..."
20052-200520410 = "Está aí?"
20052-200520420 = "Professor."
20052-200520430 = "Estou sim~"
20052-200520440 = "Sim."
20052-200520450 = "Sobre o projeto,"
20052-200520460 = "não,"
20052-200520470 = "é sobre o Departamento Editorial."
20052-200520480 = "Na verdade, é um pedido de conselho."
20052-200520490 = "Gostaria de saber a opinião de um terceiro."
20052-200520500 = "Estou indo para o Departamento Editorial!"
20052-200520510 = "Eh?"
20052-200520520 = "Sim."
20052-200520530 = "Muito obrigado."
20052-200520540 = "Essa forma de falar, transmitindo a conclusão de forma clara..."
20052-200520550 = "Eu também deveria aprender com isso."
20052-200520560 = "Sensei."
20052-200520570 = "Por que..."
20052-200520580 = "isso está vendendo tanto?"
20052-200520590 = "Deu certo!"
20052-200520600 = "Exatamente como eu previ!"
20052-200520610 = "De alguma forma, isso é frustrante."
20052-200520620 = "Mas resultados são resultados."
20052-200520630 = "Hmm..."
20052-200520640 = "A próxima edição será uma entrevista especial com o 'Red Bear',"
20052-200520650 = "e eu gostaria de fazer uma matéria de conversa com o Sensei..."
20052-200520660 = "Recuso educadamente, editor-chefe."
20052-200520670 = "Eu já imaginava que diria isso."
20052-200520680 = "Bem, continuaremos contando com você."
20052-200520690 = "Seja para consultas de negócios,"
20052-200520700 = "ou para qualquer outra coisa,"
20052-200520710 = "venha nos visitar quando quiser."
20052-200520720 = "Sim, farei exatamente isso, literalmente. Mufufu."
