[translation]
16006-160060010 = "先生！夏だよ！夏！"
16006-160060020 = "夏なんだから、夏っぽい料理を食べに行かないと！"
16006-160060030 = "夏っぽい料理かぁ……"
16006-160060040 = "うん、行こう！仕事してばっかりで疲れた！"
16006-160060050 = "冷たい甘酸っぱさとか、濃ゆい味付けとかが、私たちを呼んでるよ！"
16006-160060060 = "……お腹空いてきた！じゃあどこに行く？"
16006-160060070 = "そうそう、忙しい時ほど食事は大切だよ！"
16006-160060080 = "そうだね。ところでどこか行きたいところとかあるの？"
16006-160060090 = "うん、やっぱりまずは……！"
16006-160060100 = "海の家に行こうと思うの！"
16006-160060110 = "良いね、まさに定番って感じ"
16006-160060120 = "だよね！"
16006-160060130 = "それに、どうやら普通の海の家じゃないんだって！"
16006-160060140 = "なんと、あるゲームに勝てば、賞品としてそこの珍味を無料で食べられるとか！"
16006-160060150 = "へえ、ちょっと燃えてきたかも！"
16006-160060160 = "もうこんなの行くしかないよね！"
16006-160060170 = "じゃあ、お店の前で待ち合わせってことで！また後でね、先生！"
16006-160060180 = "ねえ先生。せっかくの夏だし、私……"
16006-160060190 = "もっともっと夏の珍味を食べたい！"
16006-160060200 = "たしかに、季節ものはそのシーズンの内に食べておきたいよね"
16006-160060210 = "でも気づいたの、先生"
16006-160060220 = "珍味は待ってても、来てくれないって！"
16006-160060230 = "すごく美食研究会っぽい台詞！"
16006-160060240 = "確かに、足が生えたりしないもんね。……普通は"
16006-160060250 = "うん！ただぼーっと口を開けて待ってても、食べ物はやってこないからね！"
16006-160060260 = "先生がすぐ横で、ポテチを食べさせてくれない限りは！"
16006-160060270 = "え、それは暗にやってってこと……？"
16006-160060280 = "ポテチはまた今度として……さあ、夏の珍味を探しに行こう！"
16006-160060290 = "私たち、常夏グルメコンビの出番だよ！"
16006-160060300 = "常夏グルメコンビ……？"
16006-160060310 = "……って、何？"
16006-160060320 = "あの場所で待ってるね！"
16006-160060330 = "先生！"
16006-160060340 = "私たち常夏グルメコンビの珍味を巡る旅は、まだ終わってないよ！"
16006-160060350 = "その名前、本当に気に入ってるんだね……"
16006-160060360 = "というわけで、今日は何を食べよっか"
16006-160060370 = "西の方の海岸で有名なジェラートも良いし……"
16006-160060380 = "東の大通りにある、美味しいって評判のワッフルも良いけど……"
16006-160060390 = "やっぱり今一番気になるのは……！"
16006-160060400 = "中央通りの屋台で売ってるって聞いた、「イチゴバナナ味のたこ焼き」かな！"
16006-160060410 = "イズミ、夏バテとかしなさそうだね"
16006-160060420 = "だって、色んな美味しい料理が私たちを待ってるんだもん！"
16006-160060430 = "こうしちゃいられないよ、先生！"
16006-160060440 = "じゃあ、今日も海の家の前で待ってるね！"
16006-160060450 = "遅れたら、先生の分も半分食べちゃうからね！"
16006-160060460 = "それは全然良いけど……お腹壊さないようにね"
16006-160060470 = "細かいことは置いといて～"
16006-160060480 = "海に行こう、先生！！"
16006-160060490 = "ついに説明を省略することまで学んで……"
16006-160060500 = "ふぅ……これ以上教えることは何もない"
16006-160060510 = "えーっと……？"
16006-160060520 = "よくわからないけど、とにかく今日は特別暑いんだって！"
16006-160060530 = "だから、暑さを忘れるために……"
16006-160060540 = "さらに楽しく！珍味を巡る旅に出るんだよ！"
