[translation]
16006-160060010 = "Professor! É verão! Verão!"
16006-160060020 = "Já que é verão, temos que ir comer pratos típicos de verão!"
16006-160060030 = "Pratos típicos de verão, é..."
16006-160060040 = "Sim, vamos! Estou cansada de só trabalhar!"
16006-160060050 = "Algo gelado e agridoce, ou talvez algo com um tempero bem forte, está nos chamando!"
16006-160060060 = "……Fiquei com fome! Então, para onde vamos?"
16006-160060070 = "Isso mesmo, comer bem é ainda mais importante quando estamos ocupados!"
16006-160060080 = "É verdade. Aliás, tem algum lugar para onde você queira ir?"
16006-160060090 = "Sim, claro que primeiro..."
16006-160060100 = "Estou pensando em ir a uma casa de praia!"
16006-160060110 = "Boa, é um clássico."
16006-160060120 = "Né!"
16006-160060130 = "Além disso, parece que não é uma casa de praia comum!"
16006-160060140 = "Dizem que se você ganhar um certo jogo, pode comer as iguarias de lá de graça como prêmio!"
16006-160060150 = "Uau, até que me animei!"
16006-160060160 = "Não tem como não ir, né!"
16006-160060170 = "Então, vamos nos encontrar na frente do local! Até mais, Professor!"
16006-160060180 = "Ei, Professor. Já que é verão, eu..."
16006-160060190 = "Quero comer muito mais iguarias de verão!"
16006-160060200 = "De fato, comidas sazonais devem ser aproveitadas durante a estação."
16006-160060210 = "Mas eu percebi uma coisa, Professor."
16006-160060220 = "As iguarias não vêm até nós se ficarmos esperando!"
16006-160060230 = "Essa frase é bem a cara do Clube de Pesquisa Gastronômica!"
16006-160060240 = "Com certeza, elas não criam pernas sozinhas... normalmente."
16006-160060250 = "Sim! Se ficarmos apenas de boca aberta esperando, a comida não vai aparecer!"
16006-160060260 = "A menos que o Professor esteja bem ao meu lado me dando batatinhas na boca!"
16006-160060270 = "Ei, isso foi uma indireta para eu fazer isso...?"
16006-160060280 = "Deixa as batatinhas para outra hora... vamos procurar as iguarias de verão!"
16006-160060290 = "É a vez da nossa dupla de gourmets do verão!"
16006-160060300 = "Dupla de gourmets do verão...?"
16006-160060310 = "……O que é isso?"
16006-160060320 = "Vou te esperar naquele lugar!"
16006-160060330 = "Professor!"
16006-160060340 = "A nossa jornada em busca de iguarias como a dupla de gourmets do verão ainda não acabou!"
16006-160060350 = "Você realmente gostou desse nome, hein..."
16006-160060360 = "Sendo assim, o que vamos comer hoje?"
16006-160060370 = "O gelato famoso na costa oeste é bom..."
16006-160060380 = "O waffle da avenida leste, que dizem ser delicioso, também é bom, mas..."
16006-160060390 = "O que mais me interessa agora é...!"
16006-160060400 = "O 'takoyaki de morango com banana' que ouvi dizer que vendem nas barracas da avenida central!"
16006-160060410 = "Izumi, parece que você não sofre com o calor do verão."
16006-160060420 = "É que tem tantas comidas deliciosas nos esperando!"
16006-160060430 = "Não podemos perder tempo, Professor!"
16006-160060440 = "Então, hoje também vou te esperar na frente da casa de praia!"
16006-160060450 = "Se você se atrasar, vou comer a sua parte também!"
16006-160060460 = "Por mim tudo bem, mas... tente não passar mal."
16006-160060470 = "Esqueça os detalhes~"
16006-160060480 = "Vamos para a praia, Professor!!"
16006-160060490 = "Ela finalmente aprendeu a pular as explicações..."
16006-160060500 = "Ufa... não tenho mais nada a ensinar."
16006-160060510 = "Hmm...?"
16006-160060520 = "Eu não entendo muito bem, mas de qualquer forma, dizem que hoje está especialmente quente!"
16006-160060530 = "Então, para esquecer o calor..."
16006-160060540 = "Vamos nos divertir ainda mais! Partiremos em uma jornada em busca de iguarias!"
