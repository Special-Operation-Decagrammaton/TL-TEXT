[translation]
20005-20005010 = "先生、今日お時間ありますか？"
20005-20005020 = "放課後、芝タウンのショッピングモールで水着を買おうかなって思ってまして……"
20005-20005030 = "よろしければ、どんな水着が良いか先生に見ていただきたく……！"
20005-20005040 = "えっと、私で良ければ喜んで"
20005-20005050 = "もしかして水着、持ってないとか……？"
20005-20005060 = "学校のスクール水着はありますが……"
20005-20005070 = "それではダメなんです！"
20005-20005080 = "だ、ダメなんだ……？"
20005-20005090 = "夏、そして海といえば、みんなそれぞれ隠していた魅力を披露する戦場……"
20005-20005100 = "なのに、そんなところにスクール水着で行くなんて、普通の子にとっては銃弾を持たずに戦場に出るのと同じです！"
20005-20005110 = "せっかくですし私も、夏デビューしたいんです……！"
20005-20005120 = "先生、無為ヶ浜から少し離れた市場の近くに、あまり知られていない綺麗な海辺があるそうです！"
20005-20005130 = "今日の午後、そこへ一緒に泳ぎに行きませんか？"
20005-20005140 = "そんなところがあるんだ、それはぜひ"
20005-20005150 = "でもその辺は、バスも電車も通ってないはずだけど……"
20005-20005160 = "大丈夫です"
20005-20005170 = "私が、戦車で迎えに行きますので！"
20005-20005180 = "戦車で！？"
20005-20005190 = "先生、今日はありがとうございました。それにすみません……"
20005-20005200 = "私のせいで、余計に大変なことになってしまって……(；＿；)"
20005-20005210 = "ううん、気にしないで"
20005-20005220 = "水着、直せそう？"
20005-20005230 = "恐らく、何とかなるかなと……"
20005-20005240 = "次泳ぎに行く時は、戦車ではなくタクシーで行きましょう！"
20005-20005250 = "水着姿でタクシーも、結構恥ずかしくない？"
20005-20005260 = "……"
20005-20005270 = "確かに……！((º□º;))"
20005-20005280 = "先生！"
20005-20005290 = "雲一つ無くて、すっごく良い天気ですよ！"
20005-20005300 = "せっかくこんなに晴れてますし"
20005-20005310 = "一緒に日光浴なんていかがですか？"
20005-20005320 = "良いね、ぜひぜひ"
20005-20005330 = "そうとなったら、色々と準備しないとね"
20005-20005340 = "そこはお任せください！ヾ(•ω•`)o"
20005-20005350 = "今の私たちには、クルセイダーちゃんがありますので！"
20005-20005360 = "戦車で何をどうする気！？"
20005-20005370 = "先生、もうお昼は食べましたか？"
20005-20005380 = "ううん、まだこれから"
20005-20005390 = "そうでしたか！私、今からちょうどご飯を食べに行こうかなと思ってまして"
20005-20005400 = "近くの海の家で、美味しい焼きそばを売ってると聞いたんですが……"
20005-20005410 = "よろしければ、先生も一緒にいかがですか？"
20005-20005420 = "焼きそば良いね、行こう！"
20005-20005430 = "では、海の家の前で待ってますね！"
20005-20005440 = "せっかくの海なのに……"
20005-20005450 = "先生はずっとお忙しそうですね"
20005-20005460 = "何か私にお手伝いできることはありますか？"
20005-20005470 = "その気持ちだけでも嬉しいよ"
20005-20005480 = "なぜか行く先々で頼まれ事が多くて……"
20005-20005490 = "それは大変でしたね……"
20005-20005500 = "あまり、無理しないでくださいね"
20005-20005510 = "「何もせずに過ぎ去った夏ほど悲しいことはないー」と"
20005-20005520 = "Mr.ニコライさんが夏の特別セールの宣伝で仰っていましたからね！"
20005-20005530 = "うん、気をつけるね。ありがとう"
