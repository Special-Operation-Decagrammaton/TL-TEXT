[translation]
20005-20005010 = "Sensei, você tem tempo hoje?"
20005-20005020 = "Estava pensando em comprar um traje de banho no shopping de Shiba Town depois da aula..."
20005-20005030 = "Se não for incômodo, eu gostaria que o senhor me ajudasse a escolher um...!"
20005-20005040 = "Bem, se eu puder ajudar, ficarei feliz."
20005-20005050 = "Por acaso você não tem um traje de banho...?"
20005-20005060 = "Eu tenho o traje de banho da escola, mas..."
20005-20005070 = "Isso não serve!"
20005-20005080 = "N-não serve...?"
20005-20005090 = "O verão e a praia são um campo de batalha onde todos revelam encantos que mantinham escondidos..."
20005-20005100 = "Mesmo assim, ir a um lugar desses com um traje de banho escolar é como ir para o campo de batalha sem munição para uma garota comum!"
20005-20005110 = "Já que estamos nisso, eu também quero estrear no verão...!"
20005-20005120 = "Sensei, dizem que perto de um mercado um pouco longe de Muigahama, existe uma praia linda que quase ninguém conhece!"
20005-20005130 = "Que tal irmos nadar lá hoje à tarde?"
20005-20005140 = "Não sabia que existia um lugar assim, vamos sim."
20005-20005150 = "Mas não deve passar ônibus nem trem por lá..."
20005-20005160 = "Está tudo bem."
20005-20005170 = "Eu irei buscar o senhor de tanque!"
20005-20005180 = "De tanque!?"
20005-20005190 = "Sensei, obrigado por hoje. E me desculpe..."
20005-20005200 = "Por minha causa, as coisas acabaram ficando complicadas... (；＿；)"
20005-20005210 = "Não, não se preocupe com isso."
20005-20005220 = "Dá para consertar o traje de banho?"
20005-20005230 = "Provavelmente, acho que consigo dar um jeito..."
20005-20005240 = "Da próxima vez que formos nadar, vamos de táxi em vez de tanque!"
20005-20005250 = "Não seria um pouco vergonhoso andar de táxi usando traje de banho?"
20005-20005260 = "..."
20005-20005270 = "É verdade...! ((º□º;))"
20005-20005280 = "Sensei!"
20005-20005290 = "Não tem uma nuvem no céu, o tempo está maravilhoso!"
20005-20005300 = "Já que está tão ensolarado..."
20005-20005310 = "Que tal tomarmos um banho de sol juntos?"
20005-20005320 = "Boa ideia, vamos sim."
20005-20005330 = "Sendo assim, precisamos preparar várias coisas."
20005-20005340 = "Pode deixar isso comigo! ヾ(•ω•`)o"
20005-20005350 = "Para nós agora, temos a Crusader-chan!"
20005-20005360 = "O que você pretende fazer com um tanque!?"
20005-20005370 = "Sensei, você já almoçou?"
20005-20005380 = "Não, ainda vou comer."
20005-20005390 = "Entendo! Eu estava pensando em ir comer agora mesmo."
20005-20005400 = "Ouvi dizer que vendem um yakisoba delicioso em um quiosque ali perto..."
20005-20005410 = "Se não for incômodo, gostaria de ir comigo, Sensei?"
20005-20005420 = "Yakisoba parece ótimo, vamos!"
20005-20005430 = "Então, estarei esperando na frente do quiosque!"
20005-20005440 = "Mesmo estando na praia..."
20005-20005450 = "O Sensei parece estar sempre muito ocupado."
20005-20005460 = "Tem algo em que eu possa ajudar?"
20005-20005470 = "Só de ouvir isso já fico feliz."
20005-20005480 = "Por algum motivo, recebo muitos pedidos por onde passo..."
20005-20005490 = "Isso deve ser difícil..."
20005-20005500 = "Por favor, não se esforce demais."
20005-20005510 = "«Não há nada mais triste do que um verão que passa sem que nada seja feito»"
20005-20005520 = "O Sr. Nikolai disse isso na propaganda da promoção especial de verão, não foi!"
20005-20005530 = "Sim, vou tomar cuidado. Obrigado."
