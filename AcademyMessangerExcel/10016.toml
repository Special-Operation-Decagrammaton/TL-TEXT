[translation]
10016-100160010 = "Sensei, você tem tempo hoje?"
10016-100160020 = "É que, na verdade,"
10016-100160030 = "Eu tenho uma coisa que gostaria de discutir com você..."
10016-100160040 = "Algo para discutir?"
10016-100160050 = "Sim. Eu vou estar na sala do clube o dia todo, então se não for incômodo, por favor!"
10016-100160060 = "...Me desculpe."
10016-100160070 = "Eu acabei me empolgando e causei problemas para você, Sensei..."
10016-100160080 = "Um novo lado da Midori foi revelado..."
10016-100160090 = "Tudo bem, foi muito divertido."
10016-100160100 = "U-Ugh... Queria que um buraco se abrisse para eu me enfiar..."
10016-100160110 = "Da próxima vez, vamos jogar um jogo que não seja competitivo, por favor..."
10016-100160120 = "Sensei. Parece que vai ter uma exposição de arte de jogos na Millennium em breve."
10016-100160130 = "Então, uhm, nós dois..."
10016-100160140 = "...Não é isso!"
10016-100160150 = "É que para desenvolver jogos novos, a gente precisa estudar também...!"
10016-100160160 = "É verdade, estudar é importante."
10016-100160170 = "V-Você também acha, né!?"
10016-100160180 = "U-Uhm, então, é que..."
10016-100160190 = "...Você não quer ir comigo?"
10016-100160200 = "Sensei, notícias de última hora! Última hora! É uma notícia incrível!"
10016-100160210 = "Midori, se acalme. Respire fundo."
10016-100160220 = "Uma notícia incrível? O que eu faço, devo preparar fogos de artifício ou algo assim!?"
10016-100160230 = "...Sim, respirei fundo e me acalmei!"
10016-100160240 = "O que aconteceu?"
10016-100160250 = "Uhm, acho que não vamos precisar de fogos de artifício...!"
10016-100160260 = "D-De qualquer forma!"
10016-100160270 = "Parece que a sequência de um jogo retrô clássico e lendário vai ser lançada!"
10016-100160280 = "E eu quero muito, muito conseguir a edição limitada de lançamento desse jogo."
10016-100160290 = "Sensei, você pode vir comigo?"
10016-100160300 = "Muito obrigada por hoje."
10016-100160310 = "Vamos jogar juntos da próxima vez, tá bom, Sensei?"
10016-100160320 = "Eu já ouvi falar."
10016-100160330 = "Que fliperamas são lugares cheios de gente assustadora..."
10016-100160340 = "Será que é verdade?"
10016-100160350 = "Hmm, acho que depende do lugar...?"
10016-100160360 = "É-É verdade, né? Eu nunca fui em um de verdade..."
10016-100160370 = "Então, quer ir comigo um dia desses?"
10016-100160380 = "Eh, no fliperama!? Com certeza!!"
10016-100160390 = "Obrigada por ter vindo comigo hoje."
10016-100160400 = "Mas, sobre a gente ter ido ao fliperama hoje,"
10016-100160410 = "Uhm, é que..."
10016-100160420 = "ÉSEGREDOENTRENÓS,OK?"
10016-100160430 = "Sensei!"
10016-100160440 = "Você se lembra da nossa promessa de hoje?"
10016-100160450 = "É hora da caça..."
10016-100160460 = "Hoje o Sensei vai entrar na batalha também!"
10016-100160470 = "Que bom!"
10016-100160480 = "Estou feliz!"
10016-100160490 = "Então, estarei esperando na sala do clube."
