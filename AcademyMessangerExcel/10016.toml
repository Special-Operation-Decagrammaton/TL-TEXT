[translation]
10016-100160010 = "先生、今日お時間ありますか？"
10016-100160020 = "実はその、"
10016-100160030 = "相談したいことがありまして……"
10016-100160040 = "相談したいこと？"
10016-100160050 = "はい。私は今日ずっと部室にいますので、よろしければお願いします！"
10016-100160060 = "……すみません"
10016-100160070 = "つい熱くなってしまい、先生にご迷惑を……"
10016-100160080 = "ミドリの新たな一面が明らかに……"
10016-100160090 = "大丈夫、すごく楽しかったよ"
10016-100160100 = "う、うぅ……穴があったら入りたいです……"
10016-100160110 = "次は対戦型ではないゲームで、お願いします……"
10016-100160120 = "先生。今度、ミレニアムでゲームアート展示会が開かれるそうです"
10016-100160130 = "なのでその、私と二人で"
10016-100160140 = "……じゃなくて！"
10016-100160150 = "新しいゲームを開発するためには、勉強もしないといけませんから……！"
10016-100160160 = "確かに、勉強は大切だね"
10016-100160170 = "や、やっぱりそうですよね！？"
10016-100160180 = "え、えっと、ですからその……"
10016-100160190 = "……一緒に、行きませんか？"
10016-100160200 = "先生、速報です！速報！ものすごいニュースですよ！"
10016-100160210 = "ミドリ、落ち着いて。一回クールダウン"
10016-100160220 = "ものすごいニュース？どうしよう、花火とか用意した方が良いかな！？"
10016-100160230 = "……はい、深呼吸して落ち着きました！"
10016-100160240 = "何があったの？"
10016-100160250 = "えっと、流石に花火は要らないかと思いますが……！"
10016-100160260 = "と、とにかく！"
10016-100160270 = "今度、伝説の名作レトロゲームの続編が出るそうです！"
10016-100160280 = "そのゲームの初回限定盤を、絶対に手に入れたくって"
10016-100160290 = "先生、付き合ってくれませんか？"
10016-100160300 = "今日はありがとうございました"
10016-100160310 = "今度、一緒にプレイしましょうね。先生"
10016-100160320 = "私、聞いたことがあります"
10016-100160330 = "ゲームセンターは怖い人たちがたくさんいる場所だ、と……"
10016-100160340 = "本当にそうなんでしょうか？"
10016-100160350 = "うーん、場所によるんじゃないかな……？"
10016-100160360 = "そ、そうですよね。私、まだ実際に行ったことが無くて……"
10016-100160370 = "じゃあ、今度一緒に行ってみる？"
10016-100160380 = "えっ、ゲームセンターにですか！？ぜひ！！"
10016-100160390 = "今日は付き合っていただいてありがとうございました"
10016-100160400 = "ただ、今日一緒にゲームセンターに行ったことは、"
10016-100160410 = "えっと、その……"
10016-100160420 = "ミンナニハ　ナイショデスヨ？"
10016-100160430 = "先生！"
10016-100160440 = "今日の約束、覚えてますか？"
10016-100160450 = "狩りの時間だ……"
10016-100160460 = "今日は先生も参戦しちゃうよ！"
10016-100160470 = "よかった！"
10016-100160480 = "嬉しいです！"
10016-100160490 = "それでは、部室で待っていますね"
