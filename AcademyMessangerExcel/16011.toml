[translation]
16011-160110010 = "Sensei, você teria um momento?"
16011-160110020 = "Eu gostaria de pedir um conselho sobre o Grande Festival Esportivo que acontecerá em breve..."
16011-160110030 = "Como isso envolve outras escolas, pensei em pedir para você dar uma olhada comigo, se não for incômodo."
16011-160110040 = "Claro, estou indo agora mesmo."
16011-160110050 = "Muito obrigada."
16011-160110060 = "Vou lhe enviar a localização."
16011-160110070 = "Sensei, muito obrigada por hoje."
16011-160110080 = "Além de me ouvir, você ainda me trouxe até aqui..."
16011-160110090 = "Falando nisso, sei que o senhor também estará presente no Grande Festival Esportivo."
16011-160110100 = "Espero que possamos nos encontrar no local."
16011-160110110 = "Bem, já está tarde, tome cuidado no caminho de volta."
16011-160110120 = "Sensei, você tem um momento?"
16011-160110130 = "O Grande Festival Esportivo começa amanhã, mas antes disso..."
16011-160110140 = "Ah, é que..."
16011-160110150 = "Desta vez não é para pedir um conselho."
16011-160110160 = "Eu queria agradecer por toda a ajuda que você me deu até agora..."
16011-160110170 = "Não precisa se preocupar tanto com isso, mas obrigado."
16011-160110180 = "Está tudo bem. Para onde devo ir?"
16011-160110190 = "Obrigada pela resposta."
16011-160110200 = "Estarei esperando por você."
16011-160110210 = "Sinto muito por ter tomado tanto do seu tempo inesperadamente."
16011-160110220 = "Obrigada pela sua consideração."
16011-160110230 = "Sobre aquele... limão em conserva no mel."
16011-160110240 = "Se não for suficiente, por favor, me avise. Ainda tenho mais."
16011-160110250 = "E também..."
16011-160110260 = "Ficaria feliz se me chamasse para outros assuntos também."
16011-160110270 = "Mudando de assunto..."
16011-160110280 = "Coisas que normalmente consigo controlar tornam-se difíceis quando a situação muda..."
16011-160110290 = "O que houve de repente?"
16011-160110300 = "...Por acaso está falando de dieta?"
16011-160110310 = "O clima ao redor está agitado, e a minha aparência também..."
16011-160110320 = "Não, não é nada... por favor, não se preocupe."
16011-160110330 = "Sinto muito por ter dito algo estranho."
16011-160110340 = "Desculpe, Sensei. Eu te dei de presente, mas acabei comendo tudo..."
16011-160110350 = "Farei mais para você depois."
16011-160110360 = "Tudo bem. Da próxima vez, vamos comer juntos."
16011-160110370 = "Bem... é que..."
16011-160110380 = "Comer juntos..."
16011-160110390 = "As calorias... são um pouco..."
16011-160110400 = "Não, sim..."
16011-160110410 = "Muito obrigada..."
16011-160110420 = "Olá, Sensei."
16011-160110430 = "Tenho pensado em algo ultimamente."
16011-160110440 = "O senhor passa a maior parte do tempo fazendo trabalho de escritório, certo?"
16011-160110450 = "Ouvi dizer que ficar sentado por muito tempo não faz bem à saúde, então que tal praticar um pouco de exercício?"
16011-160110460 = "É verdade, acabo ficando sedentário. O que houve de repente?"
16011-160110470 = "A Hasumi se interessou por exercícios por causa do Grande Festival Esportivo...!?"
16011-160110480 = "Ah, bem..."
16011-160110490 = "Sinto muito por ser repentino... é que, se você pudesse..."
16011-160110500 = "Não quero dizer que você precise se exercitar agora mesmo, mas..."
16011-160110510 = "Bem, eu estarei livre por um tempo, então qualquer hora serve."
16011-160110520 = "Ficaria feliz se pudesse entrar em contato quando for conveniente para você."
16011-160110530 = "Até a parte de nos exercitarmos juntos foi bom, mas..."
16011-160110540 = "No caminho de volta, acabamos comendo uma quantidade considerável de doces no café em que paramos com o Sensei."
16011-160110550 = "Desse jeito, o exercício não serviu de nada..."
16011-160110560 = "É o contrário. Afinal, a gente se exercita para poder comer com gosto!"
16011-160110570 = "Você se esforçou para ser feliz, então é uma coisa boa!"
16011-160110580 = "..."
16011-160110590 = "É,..."
16011-160110600 = "Será que é isso mesmo?"
16011-160110610 = "...É verdade, hehe. Acho que está tudo bem assim."
16011-160110620 = "Muito obrigada. Por favor, vamos fazer isso de novo."
