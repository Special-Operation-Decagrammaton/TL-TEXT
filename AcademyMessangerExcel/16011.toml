[translation]
16011-160110010 = "先生、今お時間よろしいでしょうか"
16011-160110020 = "今度開かれる大運動会に関してご相談がありまして……"
16011-160110030 = "他の学園にも関わることなので、もしよろしければ、一緒に見ていただけないかと思い、ご連絡致しました"
16011-160110040 = "もちろん、すぐ行くね"
16011-160110050 = "ありがとうございます"
16011-160110060 = "場所をお送りしますね"
16011-160110070 = "先生、今日は本当にありがとうございました"
16011-160110080 = "ご相談に乗ってくださっただけでなく、送ってくださるなんて……"
16011-160110090 = "そういえば、今回の大運動会、先生もいらっしゃると存じておりますが"
16011-160110100 = "ぜひ会場でも、お会いできたらと思います"
16011-160110110 = "それでは、もう夜も遅いですし帰りはお気をつけてくださいね"
16011-160110120 = "先生、今お時間大丈夫でしょうか"
16011-160110130 = "もう明日から大運動会が始まるのですが、その前に……"
16011-160110140 = "あ、その……"
16011-160110150 = "今回は相談等ではなく"
16011-160110160 = "今まで手伝っていただいたお礼をしたく思いまして……"
16011-160110170 = "そんなに気にしなくていいのに、ありがとう"
16011-160110180 = "大丈夫だよ。どこに向かえばいいかな？"
16011-160110190 = "お返事ありがとうございます"
16011-160110200 = "それではお待ちしておりますね"
16011-160110210 = "思いがけず、長い時間になってしまってすみませんでした"
16011-160110220 = "ご配慮くださりありがとうございます"
16011-160110230 = "その……レモンのはちみつ漬けなんですが"
16011-160110240 = "もし、足りなかったら仰ってくださいね。まだまだありますから"
16011-160110250 = "その……"
16011-160110260 = "それ以外のご用事でも、呼んでいただけたら嬉しいです"
16011-160110270 = "余談なのですが……"
16011-160110280 = "普段はちゃんと自制できているものも、状況が変わると難しくなるものですね……"
16011-160110290 = "急にどうしたの？"
16011-160110300 = "……もしかして、ダイエットの話？"
16011-160110310 = "周囲の空気も浮き足立ってますし、格好も……"
16011-160110320 = "いえ、何でもないです……気にしないでください"
16011-160110330 = "変な話をしてすみませんでした"
16011-160110340 = "ごめんなさい、先生。プレゼントしたのに全部私が食べてしまうなんて……"
16011-160110350 = "後でまたお作りしますね"
16011-160110360 = "大丈夫。今度また一緒に食べようね"
16011-160110370 = "えっと……その"
16011-160110380 = "一緒に食べるのは……"
16011-160110390 = "カロリーが……ちょっと……"
16011-160110400 = "いえ、はい……"
16011-160110410 = "ありがとうございます……"
16011-160110420 = "先生、こんにちは"
16011-160110430 = "最近、気になることがありまして"
16011-160110440 = "先生は、書類仕事など……いわゆるデスクワークを主にされていますよね？"
16011-160110450 = "ずっと座り続けているのは体によくないと聞きますので、軽く運動でもしてみてはいかがでしょうか？"
16011-160110460 = "たしかに、運動不足になりがちだもんね。急にどうしたの？"
16011-160110470 = "ハスミが大運動会で運動に目覚めた……！？"
16011-160110480 = "あ、えっと……"
16011-160110490 = "急にすみません……その、もしよろしければ、と……"
16011-160110500 = "今すぐ運動をしようという意味ではないのですが"
16011-160110510 = "その、私はしばらく、いつでも大丈夫ですので"
16011-160110520 = "ご都合の良いときに、ご連絡をいただけたら嬉しいです"
16011-160110530 = "一緒に運動するところまでは良かったのですが"
16011-160110540 = "帰りに先生と立ち寄ったカフェで、結構な量のスイーツを食べてしまいましたね"
16011-160110550 = "これでは運動をした意味が……"
16011-160110560 = "逆だよ。おいしく食べるために、運動をしてるんだからね！"
16011-160110570 = "幸せのために努力を頑張ったんだから、いいことだよ！"
16011-160110580 = "……"
16011-160110590 = "そ、"
16011-160110600 = "そうなんでしょうか"
16011-160110610 = "……そうですね、ふふ。それでいいのでしょう"
16011-160110620 = "ありがとうございます。また、お願い致しますね"
