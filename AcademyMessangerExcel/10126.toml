[translation]
10126-101260010 = "Ei, Sensei."
10126-101260020 = "Tem algo que eu queria que você me ajudasse..."
10126-101260030 = "O que foi?"
10126-101260040 = "Ainda é segredo..."
10126-101260050 = "Mas acho que será algo bom... para você também, Sensei."
10126-101260060 = "E então? Está curioso?"
10126-101260070 = "Se sim, você terá que vir verificar pessoalmente, não é?"
10126-101260080 = "Se você vier aqui, eu te conto."
10126-101260090 = "Ihihi..."
10126-101260100 = "Ah, uhm?"
10126-101260110 = "Kanoe-san?"
10126-101260120 = "Sensei, você conseguiu voltar bem?"
10126-101260130 = "Será que as memórias da sua vida passada já voltaram?"
10126-101260140 = "Eu me senti como se tivesse voltado à infância."
10126-101260150 = "Entendi."
10126-101260160 = "Tudo bem."
10126-101260170 = "Ainda há um jeito."
10126-101260180 = "Então... até a próxima."
10126-101260190 = "Da próxima vez, eu vou te mostrar quem eu realmente sou."
10126-101260200 = "Sensei... você é do tipo que consegue recusar firmemente?"
10126-101260210 = "Ou... do tipo que não consegue recusar?"
10126-101260220 = "Por que isso de repente?"
10126-101260230 = "Ihi, não é nada."
10126-101260240 = "Não precisa se preocupar."
10126-101260250 = "Ihi..."
10126-101260260 = "Ihihihi..."
10126-101260270 = "O ASMR que eu te dei... você está ouvindo direitinho?"
10126-101260280 = "Sim. Não importa quantas vezes eu ouça, ainda me surpreende."
10126-101260290 = "Esta noite... durma ouvindo aquilo."
10126-101260300 = "Pensando em mim... sabe?"
10126-101260310 = "Se quiser ouvir outras vozes, me diga..."
10126-101260320 = "Eu gravo e te mando na hora."
10126-101260330 = "U-uhm! Mas, por enquanto, isso é o suficiente!"
10126-101260340 = "Certo... então, boa noite..."
10126-101260350 = "Até amanhã."
10126-101260360 = "Ihihi..."
10126-101260370 = "Sensei, você tem tempo hoje?"
10126-101260380 = "Não, mesmo que não tenha, arrume um tempo."
10126-101260390 = "Por que isso de repente?"
10126-101260400 = "Preciso de um assistente de gravação com urgência."
10126-101260410 = "A equipe de sempre não pôde vir de repente..."
10126-101260420 = "Pensei que o Sensei poderia me ajudar..."
10126-101260430 = "E então?"
10126-101260440 = "Você me ajuda?"
10126-101260450 = "Sim, pode deixar comigo!"
10126-101260460 = "Ihihi."
10126-101260470 = "Então, estarei esperando."
10126-101260480 = "Sensei..."
10126-101260490 = "Hoje eu recuei calmamente, mas..."
10126-101260500 = "Da próxima vez, não será assim."
10126-101260510 = "S-seja gentil..."
10126-101260520 = "Então, hoje também..."
10126-101260530 = "Durma profundamente enquanto ouve meu ASMR."
10126-101260540 = "Estarei esperando... nos seus sonhos."
10126-101260550 = "Hehehe..."
10126-101260560 = "Sensei, tenho um pedido."
10126-101260570 = "Uma promessa que quero que você cumpra absolutamente."
10126-101260580 = "Pode me dizer o que é?"
10126-101260590 = "Hoje, mesmo que me veja, me ignore completamente."
10126-101260600 = "Não fale comigo, nem faça contato visual."
10126-101260610 = "Certo...?"
10126-101260620 = "Hoje eu planejava ir para a Caçada Selvagem, mas..."
10126-101260630 = "Eu tenho que te ignorar lá também?"
10126-101260640 = "O lugar não importa."
10126-101260650 = "Faça exatamente o que eu digo."
10126-101260660 = "Caso contrário... o Sensei estará em perigo."
10126-101260670 = "Estou falando sério."
10126-101260680 = "Entendeu...?"
10126-101260690 = "U-uhm... entendi."
10126-101260700 = "É absoluto, ok?"
10126-101260710 = "Quando for seguro, entrarei em contato novamente..."
