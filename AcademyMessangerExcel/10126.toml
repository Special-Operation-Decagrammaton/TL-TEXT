[translation]
10126-101260010 = "ねえ、先生"
10126-101260020 = "手伝ってほしいことがあるんだけど……"
10126-101260030 = "どうしたの？"
10126-101260040 = "まだ秘密……"
10126-101260050 = "でも、先生にとっても……いいことだと思う"
10126-101260060 = "どう？気になる？"
10126-101260070 = "それなら、直接確かめないとだよねぇ？"
10126-101260080 = "こっちに来たら、教えてあげるよ"
10126-101260090 = "イヒヒ……"
10126-101260100 = "あ、あの？"
10126-101260110 = "カノエさん？"
10126-101260120 = "先生、ちゃんと帰れた？"
10126-101260130 = "そろそろ前世の記憶も蘇ったかな？"
10126-101260140 = "童心に帰ったような気分だったよ"
10126-101260150 = "そっか"
10126-101260160 = "いいよ"
10126-101260170 = "まだ方法はある"
10126-101260180 = "じゃあ……また今度ね"
10126-101260190 = "その時は、本当の私を見せてあげるから"
10126-101260200 = "先生は……しっかり断れるタイプ？"
10126-101260210 = "それとも……断れないタイプ？"
10126-101260220 = "いきなりどうして？"
10126-101260230 = "イヒ、なんでもない"
10126-101260240 = "気にしなくていいよ"
10126-101260250 = "イヒ……"
10126-101260260 = "イヒヒヒ……"
10126-101260270 = "私があげたASMR……ちゃんと聞いてる？"
10126-101260280 = "うん。何度聞いても驚かされるね"
10126-101260290 = "今晩は……それを聞きながら寝るんだよ"
10126-101260300 = "私のことを想いながら……ね"
10126-101260310 = "もし他の声が聞きたいなら言って……"
10126-101260320 = "すぐ録音して送ってあげるから"
10126-101260330 = "う、うん！でも、今はこれで十分かな！"
10126-101260340 = "そう……じゃあ、おやすみ……"
10126-101260350 = "また明日ね"
10126-101260360 = "イヒヒ……"
10126-101260370 = "先生、今日時間ある？"
10126-101260380 = "いや、なくても空けておいて"
10126-101260390 = "いきなりどうしたの？"
10126-101260400 = "急ぎで収録のアシスタントが必要になったんだ"
10126-101260410 = "いつものスタッフさんが急に来れなくなっちゃってね……"
10126-101260420 = "先生なら、手伝ってくれるかなって……"
10126-101260430 = "どう？"
10126-101260440 = "やってくれる？"
10126-101260450 = "うん、任せて！"
10126-101260460 = "イヒヒ"
10126-101260470 = "じゃあ、待ってるね"
10126-101260480 = "先生……"
10126-101260490 = "今日は大人しく引き下がったけど"
10126-101260500 = "次はこうはいかないよ"
10126-101260510 = "お、お手柔らかに……"
10126-101260520 = "じゃあ今日も……"
10126-101260530 = "私のASMRを聞きながらぐっすり眠ってね"
10126-101260540 = "夢の中で……待ってるよぉ"
10126-101260550 = "イヒヒ……"
10126-101260560 = "先生、お願いがある"
10126-101260570 = "絶対に守って欲しい約束"
10126-101260580 = "内容を教えてもらえるかな"
10126-101260590 = "今日、私を見かけても絶対に無視して"
10126-101260600 = "話しかけても、目を合わせてもダメ"
10126-101260610 = "いい……？"
10126-101260620 = "今日はワイルドハントに行く予定なんだけど"
10126-101260630 = "そこでも無視しなきゃいけないの？"
10126-101260640 = "場所は関係ない"
10126-101260650 = "私の言う通りにして"
10126-101260660 = "でないと……先生が危ない"
10126-101260670 = "私は真剣に言ってるんだよ"
10126-101260680 = "分かった……？"
10126-101260690 = "う、うん……わかった"
10126-101260700 = "絶対だからね"
10126-101260710 = "安全になったら、また連絡する……"
