[translation]
13007-1159 = "Ugh... Por que coisas gostosas são tão caras...?"
13007-1160 = "Quero dinheiro sem ter que trabalhar..."
13007-1161 = "Não devo esperar ficar rica da noite para o dia, tenho que trabalhar duro e com consistência."
13007-1162 = "Eu também quero viver recebendo dinheiro sem trabalhar..."
13007-1163 = "Ugh, é verdade, mas..."
13007-1164 = "...Eu que comecei, mas o Sensei pode mesmo dizer uma coisa dessas?"
13007-1165 = "Bem, isso também é o que eu realmente penso, mas quando estou em um trabalho de meio período, eu levo a sério."
13007-1166 = "Junko, um trabalho de meio período...!?"
13007-1167 = "Ei, que reação é essa!?"
13007-1168 = "É estranho eu ter um trabalho de meio período!?"
13007-1169 = "Sensei, Sensei!"
13007-1170 = "Eu descobri uma coisa incrível!"
13007-1171 = "O que foi?"
13007-1172 = "Encontrei uma maneira de comer muitos frutos do mar de luxo por um preço acessível!"
13007-1173 = "Sério?"
13007-1174 = "Junko, por mais que você queira comer essas coisas, crime não é uma opção."
13007-1175 = "Claro. Os detalhes são segredo, mas... heheh."
13007-1176 = "O que você pensa de mim!? Não é crime nem nada!"
13007-1177 = "Se quiser saber os detalhes, venha ao refeitório de Gehenna esta noite!"
13007-1178 = "Não se atrase!"
13007-1179 = "Ugh..."
13007-1180 = "Se eu não tivesse comprado os ingredientes para aquele experimento, poderia ter tido uma refeição luxuosa..."
13007-1181 = "Ei, ei, Junko."
13007-1182 = "Hum, o quê?"
13007-1183 = "Vi na internet que pepino com mel tem gosto de melão."
13007-1184 = "De novo informações da internet! E mel já é bem caro!"
13007-1185 = "Não vou ser enganada de novo!"
13007-1186 = "Hehe, ei, Sensei. Quer que eu te conte uma coisa boa?"
13007-1187 = "O jantar de hoje do Clube de Pesquisa Gourmet é... carne!"
13007-1188 = "Carne!"
13007-1189 = "E ainda por cima, Wagyu de alta qualidade!"
13007-1190 = "Wagyu!?"
13007-1191 = "Hehe. Está com inveja, Sensei?"
13007-1192 = "Hoje, você pode me invejar à vontade!"
13007-1193 = "Eu também quero comer..."
13007-1194 = "Eu também vou entrar para o Clube de Pesquisa Gourmet!"
13007-1195 = "Não pode, o restaurante de hoje tem limite de pessoas."
13007-1196 = "Em vez disso, quando eu voltar, te conto o quão delicioso foi!"
13007-1197 = "Hoje no almoço, o Clube de Pesquisa Gourmet vai a um buffet de bolos!"
13007-1198 = "Buffet de bolos?"
13007-1199 = "Ah, Sensei não conhece buffet de bolos?"
13007-1200 = "Buffet de bolos é quando..."
13007-1201 = "Há muitos bolos diferentes enfileirados, e você pode comer o quanto quiser dentro do tempo limite..."
13007-1202 = "É um estilo de refeição tão sonhador!"
13007-1203 = "Acho que enjoaria no meio do caminho..."
13007-1204 = "Não diga isso!"
13007-1205 = "Não é sempre que se tem a chance de comer bolo à vontade!"
13007-1206 = "Ugh..."
13007-1207 = "Como você está se sentindo?"
13007-1208 = "Sim, estou um pouco melhor..."
13007-1209 = "Kelp incha tanto assim dentro da barriga..."
13007-1210 = "Outro dia, a Akari comeu um saco inteiro de kelp seco temperado como lanche, mas..."
13007-1211 = "O que diabos está acontecendo com a barriga da Akari...?"
13007-1212 = "Sensei, você já ouviu falar do boato sobre a Chinatown perto de Sankaikyo?"
13007-1213 = "É cheia de restaurantes chineses, e dizem que todos eles são super deliciosos!"
13007-1214 = "Eu também só ouvi o boato."
13007-1215 = "Foi super delicioso."
13007-1216 = "Entendi. Já que até o Sensei ouviu falar, parece que é verdade mesmo...!"
13007-1217 = "O quê?! Você foi sozinho sem nem me chamar?! Que injusto!"
13007-1218 = "De qualquer forma, como membro do Clube de Pesquisa Gourmet, não temos escolha a não ser ir, certo?"
13007-1219 = "Então, hum... neste próximo fim de semana, se você quiser, por que não vamos juntos?"
13007-1220 = "Sim, vamos."
13007-1221 = "Hehe, é uma promessa, ok?"
13007-1222 = "Então, neste fim de semana, na frente do portão principal da Escola Secundária de Sankaikyo!"
13007-130070010 = "Sensei, Sensei!"
13007-130070020 = "Você parece feliz, Junko."
13007-130070030 = "É raro, talvez eu devesse tirar um print desta tela do Momotalk?"
13007-130070040 = "Ei, o que você quer dizer com isso?!"
13007-130070050 = "...Só para ter certeza, vou perguntar..."
13007-130070060 = "Você não salvou de verdade, né?"
13007-130070070 = "Não salvei..."
13007-130070080 = "Então está tudo bem."
13007-130070090 = "E então... surpreendentemente, finalmente está pronto!"
13007-130070100 = "Pronto, o quê...?"
13007-130070110 = "Hehe... Você está No Schale agora, certo?"
13007-130070120 = "Vou te mostrar pessoalmente!"
13007-130070130 = "Espere por mim, estou indo agora!"
