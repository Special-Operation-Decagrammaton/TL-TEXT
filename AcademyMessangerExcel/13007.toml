[translation]
13007-1159 = "うう……美味しい物って、なんでこんなに高いんだろう……"
13007-1160 = "働かずにお金が欲しい……"
13007-1161 = "一攫千金とか期待し過ぎないで、きちんとコツコツ仕事をしないとね"
13007-1162 = "私も働かずにお金を貰って暮らしたい……"
13007-1163 = "うぅ、それはその通りだけど……"
13007-1164 = "……私から言い出しておいてなんだけど、先生がそんなこと言っていいの？"
13007-1165 = "まあこれも本音だけど、アルバイトの時は私も真剣にやってるよ"
13007-1166 = "ジュンコが、アルバイト……！？"
13007-1167 = "ねえ、なにその反応！"
13007-1168 = "私がアルバイトしてたら変！？"
13007-1169 = "先生、先生！"
13007-1170 = "私、すごいこと知っちゃった！"
13007-1171 = "どうしたの？"
13007-1172 = "お手頃価格で、高級な海鮮食材をたくさん食べられる方法を見つけたの！"
13007-1173 = "本当に？"
13007-1174 = "ジュンコ、いくらそういうのが食べたいからって犯罪はダメだよ"
13007-1175 = "もちろん。詳しい方法は秘密だけど……ふふっ"
13007-1176 = "私のことを何だと思ってるの！？犯罪とかじゃないから！"
13007-1177 = "詳しいことが知りたかったら、今夜ゲヘナの学食に来て！"
13007-1178 = "遅くならないようにね！"
13007-1179 = "うう……"
13007-1180 = "あんな実験のために材料を買わなければ、贅沢な食事ができたのに……"
13007-1181 = "ねえねえジュンコ"
13007-1182 = "ん、なに？"
13007-1183 = "ネットで見たんだけど、キュウリに蜂蜜を塗るとメロンの味がするらしいよ"
13007-1184 = "またネットの情報じゃん！それに蜂蜜って十分高いよ！"
13007-1185 = "もう騙されないんだからぁっ！"
13007-1186 = "ふふ、ねえ先生。良いこと教えてあげよっか？"
13007-1187 = "今日の美食研究会の夕飯はなんと……お肉！"
13007-1188 = "お肉！"
13007-1189 = "それも、高級な和牛！"
13007-1190 = "和牛！？"
13007-1191 = "ふふ。羨ましいでしょ、先生？"
13007-1192 = "今日は、存分に私のことを羨ましがっていいよ！"
13007-1193 = "私も食べたい……"
13007-1194 = "私も美食研究会に入る！"
13007-1195 = "ダーメ、今日行くお店は人数制限があるから"
13007-1196 = "その代わりに帰ってきたら、どれくらい美味しかったか教えてあげる！"
13007-1197 = "今日のお昼は、美食研究会でケーキバイキングに行くの！"
13007-1198 = "ケーキバイキング？"
13007-1199 = "あれ、先生ケーキバイキング知らないの？"
13007-1200 = "ケーキバイキングっていうのはね、"
13007-1201 = "色んなケーキがたくさん並んでて、時間内なら好きなだけ食べられる……"
13007-1202 = "そんな夢のようなスタイルの食事なの！"
13007-1203 = "途中で飽きちゃいそう……"
13007-1204 = "そういうこと言わないで！"
13007-1205 = "ケーキを思う存分食べられるチャンスなんて、そうそう無いんだから！"
13007-1206 = "うぅ……"
13007-1207 = "具合はどう？"
13007-1208 = "うん、ちょっとマシになってきた……"
13007-1209 = "昆布って、あんなにお腹の中で膨れるんだ……"
13007-1210 = "この前アカリがおやつで、味付き乾燥昆布を一袋丸ごと食べてたけど……"
13007-1211 = "アカリのお腹、いったいどうなってるの……"
13007-1212 = "先生、山海経の近くにある中華街の噂って聞いたことある？"
13007-1213 = "中華料理のお店でいっぱいで、どのお店もすごく美味しいんだって！"
13007-1214 = "私も、噂だけは聞いたことあるよ"
13007-1215 = "すごい美味しかったよ"
13007-1216 = "そっか。先生の耳にも入るぐらいだし、やっぱり間違いなさそう……！"
13007-1217 = "ええっ！私に声もかけないで、自分だけ行ってきたの！？ずるい！"
13007-1218 = "とにかく、美食研究会の一員として、これは行くしかないでしょ"
13007-1219 = "だから、えっと……今度の週末、もしよかったら一緒に行かない？"
13007-1220 = "うん、行こっか"
13007-1221 = "ふふっ、約束だよ？"
13007-1222 = "じゃあ週末、山海経高級中学校の正門前でね！"
13007-130070010 = "先生、先生！"
13007-130070020 = "楽しそうだね、ジュンコ"
13007-130070030 = "珍しいし、このモモトーク画面キャプチャしておこうかな？"
13007-130070040 = "ちょっと、どういうことよ！"
13007-130070050 = "……念のため聞くけど"
13007-130070060 = "本当に保存したわけじゃないよね？"
13007-130070070 = "してないです……"
13007-130070080 = "ならいいんだけど"
13007-130070090 = "それでね……なんと、ついに完成したの！"
13007-130070100 = "完成したって、何が……？"
13007-130070110 = "ふふっ……今、シャーレよね？"
13007-130070120 = "直接見せてあげる！"
13007-130070130 = "待ってて、すぐ行くから！"
