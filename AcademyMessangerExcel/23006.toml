[translation]
23006-2449 = "「～百夜堂×キヴォトス苺天国～コラボキャンペーン開催！」"
23006-2450 = "「苺大福や苺どら焼き、苺饅頭に苺八つ橋！それに苺あんみつまで！」"
23006-2451 = "「キヴォトス各地の苺を揃える『キヴォトス苺天国』と、伝統的な甘味喫茶『百夜堂』のコラボレーションをご賞味あれ！」"
23006-2452 = "「今日から一週間開催しておりますので、ぜひお越しください！」"
23006-2453 = "「来店時にこのメッセージを見せていただくと、お会計時に10％割引！」"
23006-2454 = "「それでは、百夜堂でお待ちしておりますね！にゃんにゃん！」"
23006-2455 = "えっと……？"
23006-2456 = "にゃんにゃん……？"
23006-2457 = "えへへっ、先生！"
23006-2458 = "実はお送りした通り、百夜堂でイベントを開催中なんです！"
23006-2459 = "せっかくですのでこのタイミングで、あらためて先生をしっかりおもてなししたいなと思いまして"
23006-2460 = "来てくれますよね？"
23006-2461 = "ちょっと日程を確認してから……"
23006-2462 = "来 て く れ ま す よ ね？"
23006-2463 = "シズコの頼みなら！"
23006-2464 = "えへへっ！ありがとうございます！"
23006-2465 = "お待ちしてますね！"
23006-2466 = "今回は色々と失敗してしまいましたが、"
23006-2467 = "次こそは必ず先生を攻略してみせます！"
23006-2468 = "私のおっちょこちょいパワーで！"
23006-2469 = "それ先に言ったら\n「おっちょこちょい」じゃないんじゃ……？"
23006-2470 = "覚悟しておいてくださいね！"
23006-2471 = "えっと、はい……"
23006-2472 = "先生……"
23006-2473 = "私、私……"
23006-2474 = "シズコ、もうこれ以上我慢できません……"
23006-2475 = "なら早めに行った方が良いよ"
23006-2476 = "終わったら手洗いも忘れずにね"
23006-2477 = "今をときめく看板娘相手に何を言ってるんですか！？"
23006-2478 = "というかそもそも、私がそんな話をモモトークでするとでも！？"
23006-2479 = "ああもう、全く……"
23006-2480 = "えっと、それで先生。シズコはですね～"
23006-2481 = "この流れ、まだ続きそう？"
23006-2482 = "……ううっ、もういいです……"
23006-2483 = "お祭り運営委員会の委員長として、先生に一つお願いがあります"
23006-2484 = "明日のお祭りの準備、付き合ってください！"
23006-2485 = "それは全然いいけど……さっきの話は？"
23006-2486 = "それで結局、何が我慢できなかったの？"
23006-2487 = "それはもういいんですっ！"
23006-2488 = "はいもうこの話終わり！蒸し返すの禁止です！！"
23006-2489 = "先生。今日、その……"
23006-2490 = "どうしたの？"
23006-2491 = "い、いえ、やっぱり何でもありません"
23006-2492 = "今日も一日、お仕事でお忙しいですよね"
23006-2493 = "お互い、頑張っていきましょう"
23006-2494 = "ふふふっ……"
23006-2495 = "ぐへへ？"
23006-2496 = "ふふふ……？"
23006-2497 = "「ぐへへ」なんて下品な笑い方したことありませんけど！？"
23006-2498 = "ちゃんと上に「ふふふっ」って書いてあるじゃないですか！"
23006-2499 = "急にどうしたの？"
23006-2500 = "先生、おっしゃいましたよね"
23006-2501 = "疲れた時は休んで、眠い時は寝るのが良いって"
23006-2502 = "今日は、先生にその言動の責任を取ってもらおうかと思いまして"
23006-2503 = "百夜堂で待ってますので"
23006-2504 = "P.S. 正面玄関ではなく、裏手から入ってきてください"
23006-2505 = "……？"
23006-23006010 = "先生！先生！"
23006-23006020 = "今日から百夜堂の期間限定イベントが始まりますよ！"
23006-23006030 = "今回は「林檎フェス」！！"
23006-23006040 = "爽やかなアップルティーに、林檎を使った各種デザートをたくさんご用意しております！"
23006-23006050 = "これは行かなくちゃだね！"
23006-23006060 = "ふふふ"
23006-23006070 = "お待ちしております！"
23006-23006080 = "最高のおもてなしをお約束します！！"
