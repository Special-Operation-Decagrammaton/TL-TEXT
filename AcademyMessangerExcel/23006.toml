[translation]
23006-2449 = "「~Hyakkiyako x Kivotos Strawberry Paradise~ Campanha de colaboração em andamento!」"
23006-2450 = "「Daifuku de morango, dorayaki de morango, manju de morango e yatsuhashi de morango! E até anmitsu de morango!」"
23006-2451 = "「Aproveite a colaboração entre o 'Kivotos Strawberry Paradise', que reúne morangos de todo o Kivotos, e a tradicional casa de doces 'Hyakkiyako'!」"
23006-2452 = "「O evento vai durar uma semana a partir de hoje, então não deixem de vir!」"
23006-2453 = "「Mostre esta mensagem ao chegar e ganhe 10% de desconto na sua conta!」"
23006-2454 = "「Então, estaremos esperando por vocês na Hyakkiyako! Nyan-nyan!」"
23006-2455 = "Hã...?"
23006-2456 = "Nyan-nyan...?"
23006-2457 = "Ehehe, Sensei!"
23006-2458 = "Na verdade, como eu enviei, estamos realizando um evento na Hyakkiyako!"
23006-2459 = "Já que estamos nessa, pensei em aproveitar a oportunidade para te receber muito bem, Sensei."
23006-2460 = "Você vai vir, né?"
23006-2461 = "Deixa eu checar minha agenda primeiro..."
23006-2462 = "V o c ê  v a i  v i r,  n é?"
23006-2463 = "Se é um pedido da Shizuko, com certeza!"
23006-2464 = "Ehehe! Muito obrigada!"
23006-2465 = "Estarei te esperando!"
23006-2466 = "Desta vez eu cometi vários erros, mas..."
23006-2467 = "Na próxima, com certeza vou conquistar o Sensei!"
23006-2468 = "Com o meu poder de ser atrapalhada!"
23006-2469 = "Se você diz isso antes, não é mais ser \"atrapalhada\", é...?"
23006-2470 = "Prepare-se, viu!"
23006-2471 = "Bem, sim..."
23006-2472 = "Sensei..."
23006-2473 = "Eu, eu..."
23006-2474 = "Shizuko, não aguento mais segurar isso..."
23006-2475 = "Então é melhor você ir logo."
23006-2476 = "E não se esqueça de lavar as mãos quando terminar."
23006-2477 = "O que você está dizendo para a garota-propaganda do momento!?"
23006-2478 = "E, aliás, por que eu diria uma coisa dessas no MomoTalk!?"
23006-2479 = "Ah, meu Deus, francamente..."
23006-2480 = "Bem, então, Sensei. A Shizuko, sabe..."
23006-2481 = "Essa conversa ainda vai longe?"
23006-2482 = "......Ugh, esquece..."
23006-2483 = "Como presidente do Comitê Organizador do Festival, tenho um pedido para o Sensei."
23006-2484 = "Por favor, me ajude com os preparativos para o festival de amanhã!"
23006-2485 = "Isso eu faço com prazer, mas... e o que você estava falando antes?"
23006-2486 = "Afinal, o que você não estava aguentando segurar?"
23006-2487 = "Esquece isso!"
23006-2488 = "Pronto, chega de falar disso! Proibido tocar nesse assunto de novo!!"
23006-2489 = "Sensei. Hoje, tipo..."
23006-2490 = "O que houve?"
23006-2491 = "N-não, esquece, não é nada."
23006-2492 = "Você está ocupado com o trabalho hoje também, né?"
23006-2493 = "Vamos nos esforçar, um pelo outro."
23006-2494 = "Fufufu..."
23006-2495 = "Guhehe?"
23006-2496 = "Fufufu...?"
23006-2497 = "Eu nunca dei uma risada vulgar como \"guhehe\"!?"
23006-2498 = "Está escrito claramente \"fufufu\" logo acima, não está!?"
23006-2499 = "O que houve de repente?"
23006-2500 = "Sensei, você disse, não disse?"
23006-2501 = "Que é bom descansar quando se está cansado e dormir quando se está com sono."
23006-2502 = "Hoje, pensei em pedir que você assuma a responsabilidade por essas palavras."
23006-2503 = "Estarei esperando na Hyakkiyako."
23006-2504 = "P.S. Não entre pela entrada principal, venha pelos fundos."
23006-2505 = "……?"
23006-23006010 = "Sensei! Sensei!"
23006-23006020 = "O evento por tempo limitado da Hyakkiyako começa hoje!"
23006-23006030 = "Desta vez é o \"Festival da Maçã\"!!"
23006-23006040 = "Preparamos um chá de maçã refrescante e muitas sobremesas feitas com maçãs!"
23006-23006050 = "Então eu tenho que ir!"
23006-23006060 = "Fufufu."
23006-23006070 = "Estaremos esperando por você!"
23006-23006080 = "Prometo a melhor hospitalidade!!"
