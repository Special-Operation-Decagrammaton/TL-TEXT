[translation]
20002-1383 = "Sensei, você poderia vir ao meu laboratório por um instante?"
20002-1384 = "O que houve de repente?"
20002-1385 = "É algo muito importante, relacionado à minha pesquisa!"
20002-1386 = "E é um problema especial que só você pode resolver...!"
20002-1387 = "Por isso, estou te esperando no laboratório!"
20002-1388 = "……?"
20002-1389 = "O brilho já passou?"
20002-1390 = "Meu rosto ainda está brilhando tanto que meus olhos doem toda vez que me olho no espelho..."
20002-1391 = "Ter um brilho tão intenso que você não consegue nem encarar o espelho é algo maravilhoso."
20002-1392 = "Não tem nada de maravilhoso nisso!?"
20002-1393 = "Mas, se não se importar, poderia me dar um pedacinho da folha de ouro que descascou da sua pele?"
20002-1394 = "Quero analisar os componentes para usar na minha próxima pesquisa."
20002-1395 = "Recuso."
20002-1396 = "Ugh! Por que não!?"
20002-1397 = "Isso também é necessário para o progresso da alquimia!"
20002-1398 = "Sensei, você poderia vir ao laboratório mais uma vez?"
20002-1399 = "Suspeito..."
20002-1400 = "Não se preocupe, desta vez eu realmente completei o elixir da imortalidade!"
20002-1401 = "Se não acredita, venha ao meu laboratório e veja com seus próprios olhos!"
20002-1402 = "Eu não acredito que cometi aquele erro... Desculpe, Sensei."
20002-1403 = "Eu também fiquei surpresa que as coisas tenham acabado assim."
20002-1404 = "Não é exatamente uma compensação, mas..."
20002-1405 = "Na próxima vez que nos encontrarmos, vou te pagar um lámen delicioso na Associação Genbu."
20002-1406 = "Ah... e se não se importar... poderia me dar um pouco daquele pelo cinza brilhante?"
20002-1407 = "Recuso."
20002-1408 = "Ugh... o futuro da imortalidade e da alquimia..."
20002-1409 = "Desculpe pelo que aconteceu da última vez, Sensei."
20002-1410 = "Como pedido de desculpas, vou te pagar um lámen delicioso, então me espere em frente à Associação Genbu!"
20002-1411 = "Um lámen delicioso...?"
20002-1412 = "Sim, tem um lugar que eu frequento bastante."
20002-1413 = "É um lugar incrivelmente bom, tenho certeza que você vai adorar, Sensei!"
20002-1414 = "O lámen que comemos juntos daquela vez estava realmente delicioso."
20002-1415 = "Vamos visitar a Associação Genbu de novo qualquer dia!"
20002-1416 = "Sim, com certeza. Aliás, o que aconteceu com o Grupo do Capacete que recebeu aquele remédio?"
20002-1417 = "Hmm...? Agora que você falou, será que eles ainda existem..."
20002-1418 = "Bem, devem estar por aí lambendo açúcar em algum lugar, não?"
20002-1419 = "Sensei, você não está livre ultimamente?"
20002-1420 = "Estou sempre ocupado com o trabalho..."
20002-1421 = "Ah, não seja tão rígido. Eu consegui um jogo de tabuleiro bem interessante."
20002-1422 = "Queria jogar, mas é para duas pessoas, então preciso encontrar um oponente."
20002-1423 = "Se você tiver interesse, venha ao laboratório!"
20002-1424 = "Passo aí quando terminar o trabalho."
20002-1425 = "Ugh, não acredito que perdi para você em um jogo tão simples... Que frustração!"
20002-1426 = "Na próxima eu não vou perder! Prepare-se, Sensei!"
20002-1427 = "Não é uma questão de jogo, talvez você precise parar de ser tão obcecada por queijo...?"
20002-1428 = "Sensei... hoje eu tenho algo muito importante para te contar."
20002-1429 = "Algo importante? Sobre o quê?"
20002-1430 = "É que... não, não posso dizer desse jeito...!"
20002-1431 = "É um assunto muito sério, então..."
20002-1432 = "Hoje, quando terminar o trabalho no Schale, você poderia vir direto ao laboratório?"
20002-1433 = "Estou esperando por você, Sensei."
20002-1434 = "Sensei, eu tive um sonho maravilhoso enquanto tirava uma soneca agora há pouco."
20002-1435 = "Quando me dei conta, havia um pedaço gigante de queijo bem na minha frente..."
20002-1436 = "Foi a primeira vez, mesmo em um sonho, que comi tanto queijo quanto eu quis!"
20002-1437 = "..."
20002-1438 = "A propósito, por que seus braços estão tão cheios de arranhões, Sensei?"
20002-1439 = "Você brigou com algum animal selvagem?"
20002-1440 = "..."
20002-1441 = "Sensei, Sensei! É uma emergência! Um grande incidente!"
20002-1442 = "Venha ao laboratório assim que vir esta mensagem!"
20002-1443 = "Obrigada por me ajudar a procurar o Nezuke, Sensei. Conto com você daqui para frente!"
20002-1444 = "Que bom que o Nezuke foi encontrado."
20002-1445 = "Não fiz nada demais."
20002-1446 = "Pensando bem, até agora, eu fiz coisas terríveis tanto com o Nezuke quanto com você, Sensei..."
20002-1447 = "Não vou mais fazer travessuras terríveis... então, conto com você daqui para frente!"
20002-1448 = "Sim. Eu também conto com você, Saya."
