[translation]
20002-1383 = "先生、ちょっとぼく様の研究室に来てくれないか？"
20002-1384 = "急にどうしたの？"
20002-1385 = "ぼく様の研究に関係がある、とても大事なことなのだ！"
20002-1386 = "しかも先生にしか解決できない、特別な問題……！"
20002-1387 = "そういうわけで、研究室で待ってるのだ！"
20002-1388 = "……？"
20002-1389 = "キラキラするの、もう治まった？"
20002-1390 = "顔がまだキラキラしてて、鏡を見るたびに目が……"
20002-1391 = "鏡に向き合えないほどの輝きだなんて、素敵なことなのだ"
20002-1392 = "素敵とかそういうのじゃないんだけど！？"
20002-1393 = "ところでもしよかったら、肌から剥がれた金箔をひとかけらだけくれない？"
20002-1394 = "その成分を調査して、次の研究に使ってみようと思ってるのだ"
20002-1395 = "断る"
20002-1396 = "ううっ！どうしてなのだ！"
20002-1397 = "これも錬丹術の発展のために必要なことなのに！"
20002-1398 = "先生、もう一度研究室に来てくれないか？"
20002-1399 = "怪しい……"
20002-1400 = "心配無用、今度こそ本当の不老不死の霊薬が完成したのだ！"
20002-1401 = "信じられないならぼく様の研究室に来て、直接確かめてみて！"
20002-1402 = "ぼく様があんなミスをするなんて……ごめん、先生"
20002-1403 = "こんなことになるなんて、ぼく様もビックリなのだ"
20002-1404 = "代わりにってわけじゃないけど、"
20002-1405 = "次に会った時は、玄武商会で美味しいラーメンを奢ってあげるのだ"
20002-1406 = "……それと、もしよかったら……あのツヤツヤの灰色の毛、少し貰えない？"
20002-1407 = "断る"
20002-1408 = "うう……不老不死の、錬丹術の未来が……"
20002-1409 = "この前はごめんなのだ、先生"
20002-1410 = "お詫びに美味しいラーメンを奢るから、玄武商会の前で待ってて！"
20002-1411 = "美味しいラーメン……？"
20002-1412 = "うん、ぼく様がよく行くお店があるのだ"
20002-1413 = "すっごく美味しいお店だから、先生も味わったらきっと気に入るはず！"
20002-1414 = "この間一緒に食べたラーメン、本当に美味しかったのだ"
20002-1415 = "また今度一緒に、玄武商会に遊びに行こう！"
20002-1416 = "うん、ぜひ。そういえば、あの薬を渡したヘルメット団は、どうなったの？"
20002-1417 = "うん……？そういえばそんな奴らもいたっけ……"
20002-1418 = "まあ、どこかで砂糖でも舐めてるんじゃないか？"
20002-1419 = "先生、最近暇なんじゃない？"
20002-1420 = "ずっと仕事で忙しい……"
20002-1421 = "え～、そんな堅いこと言わないで。面白いボードゲームを手に入れたのだ"
20002-1422 = "遊んでみたいんだけど、2人用だから相手を探さないといけなくって"
20002-1423 = "先生も興味があったら、研究室に遊びに来て！"
20002-1424 = "仕事が終わったら遊びに行くね"
20002-1425 = "うう、あんな単純なゲームでぼく様が負けるなんて……悔しい！"
20002-1426 = "次は絶対負けないから！覚悟しておくのだ、先生！"
20002-1427 = "ゲーム云々じゃなくてチーズへの執着を断ち切らないと無理なんじゃ……？"
20002-1428 = "先生……今日は先生に、大事な話があるのだ"
20002-1429 = "大事な話？どんなこと？"
20002-1430 = "それは……いや、こんな形じゃ言えない……！"
20002-1431 = "その、すごく大事な話だから……"
20002-1432 = "今日、シャーレの仕事が終わったら、すぐに研究室に来てくれる？"
20002-1433 = "先生のこと、待ってるのだ"
20002-1434 = "先生、さっき昼寝をしてたら、素晴らしい夢を見たのだ"
20002-1435 = "気が付いたらぼく様の目の前に、巨大なチーズの塊があって……"
20002-1436 = "チーズをあんなに好きなだけ食べたのは、夢の中でも初めてだったのだ！"
20002-1437 = "……"
20002-1438 = "ところで、先生の腕はなんであんなに傷だらけだったのだ？"
20002-1439 = "野生動物と喧嘩でもした？"
20002-1440 = "……"
20002-1441 = "先生先生！大変！大事件なのだ！"
20002-1442 = "このメッセージを見たらすぐに研究室に来て！"
20002-1443 = "一緒にネズ助探してくれてありがとう、先生。これからもよろしくなのだ！"
20002-1444 = "ネズ助が見つかってよかったね"
20002-1445 = "大したことはしてないよ"
20002-1446 = "考えてみれば今まで、ネズ助にも先生にも、ひどいことをし過ぎたのだ……"
20002-1447 = "もうこれからひどい悪戯はしないから……これからもよろしくなのだ！"
20002-1448 = "うん。これからもよろしくね、サヤ"
