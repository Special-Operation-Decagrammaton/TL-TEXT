[translation]
20003-2136 = "今日もお疲れ様でした"
20003-2137 = "マシロの方こそ、お疲れ様"
20003-2138 = "先生のおかげで今日も怪我無く、無事に悪を撃退することができました"
20003-2139 = "先生の指揮は今日も素晴らしかったです。色々と学ばせていただきました"
20003-2140 = "あ、そういえば……"
20003-2141 = "そういえば？"
20003-2142 = "何か他に問題でもあった？"
20003-2143 = "いえ、その、作戦中にスカートの縫い目がほつれてしまって……"
20003-2144 = "もし直せなさそうだったら、予備の制服を出さないとかもしれません"
20003-2145 = "最近、正義について興味深い本を読みました"
20003-2146 = "正義を追求する者が、様々な状況においてどういった行動をとるべきか……"
20003-2147 = "そういったことを教えてくれる本でした"
20003-2148 = "正義の勇者マニュアル……みたいな？"
20003-2149 = "悪を追求する者のための本もあったりする？"
20003-2150 = "確かに、そういったものと近いかもしれません。とても興味深かったです"
20003-2151 = "それは、すみません、ちょっと分からないですね……"
20003-2152 = "ただ、読んでると理解できない部分もいくつかありまして"
20003-2153 = "きっと、正義についての私の理解が足りないせいかと思うのですが……"
20003-2154 = "よろしければ、先生。私に、正義について教えてくれませんか？"
20003-2155 = "正義について……？"
20003-2156 = "シャーレでの本日の訓練を終えました。この後、学園に戻ります"
20003-2157 = "狙撃手って、普段どんな訓練をするの？"
20003-2158 = "狙撃手の訓練、気になりますか？"
20003-2159 = "と言っても、基本的に他の方々とそんなに違いは無いのですが"
20003-2160 = "違う点と言えば、やはり身を潜める技術を学ぶことでしょうか"
20003-2161 = "今度、見学してもいい？"
20003-2162 = "見学するのは構わないのですが……特に面白いものではないと思いますよ？"
20003-2163 = "以前お伝えしましたがあらためて"
20003-2164 = "本日訓練のため、当初予定していた当番は別日に変更させていただきました"
20003-2165 = "よろしくお願いします"
20003-2166 = "うん、了解。ところで今日の訓練、一緒に行ってもいい？"
20003-2167 = "訓練を手伝ってくださるんですか？"
20003-2168 = "うん、良いかな？"
20003-2169 = "問題は無いのですが……今日のは少々大変なので、覚悟された方が良いかと"
20003-2170 = "( ºㅁº )"
20003-2171 = "あの、先生……大丈夫でしたか？"
20003-2172 = "帰り道、どこか魂が抜けたような表情をされていましたが……"
20003-2173 = "( ºㅁº )"
20003-2174 = "やはり、いきなりあの訓練は少し厳しすぎたでしょうか……"
20003-2175 = "( ºㅁº )"
20003-2176 = "先生！？"
20003-2177 = "今こそ正義を実現する時です！"
20003-2178 = "どうしたの？"
20003-2179 = "ついに私の命が尽きる時が……"
20003-2180 = "えっ、先生は何か正義に反することをしてしまったのですか？"
20003-2181 = "えっと、先輩たちの情報によりますと、"
20003-2182 = "極悪非道なブラックマーケットの悪党が本日の正午、"
20003-2183 = "トリニティ総合学園の近くを通りかかるとのことです"
20003-2184 = "建物の屋上で待ち構えて、その悪党を狙撃しましょう！"
20003-2185 = "狙撃、怖い……"
20003-2186 = "今日は予想以上に早く、訓練が終わりましたね"
20003-2187 = "頑張った分、プライベートの時間ができそうです"
20003-2188 = "マシロはこういう時、普段何をするの？"
20003-2189 = "そうですね、読書をしたり散歩をしたりしますが……"
20003-2190 = "高いところに登るのも好きです"
20003-2191 = "高いところ……？"
20003-2192 = "その反応……もしかしてこれ、変わった趣味なのでしょうか？"
20003-2193 = "普通の趣味だと思っていたのですが……"
20003-200030010 = "少しお尋ねしたいのですが……"
20003-200030020 = "読書はお好きですか？"
20003-200030030 = "まあまあかな……"
20003-200030040 = "なるほど"
20003-200030050 = "正義に関する本を読んでいるの？"
20003-200030060 = "いえ、そうではなく"
20003-200030070 = "ただ気になって"
