[translation]
13010-94 = "こんにちは、先生。ユウカです"
13010-95 = "私のこと、覚えてますか？"
13010-96 = "うん、もちろん"
13010-97 = "……誰だっけ？"
13010-98 = "良かった、覚えていただいて幸いです"
13010-99 = "早瀬ユウカです！もう忘れたんですか！？"
13010-100 = "先生のご連絡先をもらっておいて正解でした"
13010-101 = "そうだ、用件なのですが"
13010-102 = "以前のシャーレ奪還作戦時の弾丸の経費について、振込が確認できておらず"
13010-103 = "請求書はシャーレに届いてるはずですが、お支払いはいつ頃になりますか？"
13010-104 = "こっちで処理しなきゃいけないんだっけ……？"
13010-105 = "もちろんです、弾丸だって無料ではないのですから"
13010-106 = "お仕事での経費扱いでしょうし、連邦生徒会に請求すれば、"
13010-107 = "シャーレに支払われるはずです。その分をそのままこちらに頂ければと"
13010-108 = "ユウカ、請求書ってどうやって作れば良いの……？"
13010-109 = "……ふう。ミレニアムで使っている請求書のひな型がありますので、"
13010-110 = "今度、シャーレに伺う時に持って行きます"
13010-111 = "ありがとう……！"
13010-112 = "いえ、大したことではありませんし"
13010-113 = "では、今日も良い一日を"
13010-114 = "先生！何でまたおもちゃのレシートがあるんですか！？"
13010-115 = "おもちゃはお仕事とは関係ないでしょう！？"
13010-116 = "それが無いと仕事できない……"
13010-117 = "今回だけ、今回だけ目を瞑ってもらえれば……"
13010-118 = "ダメです！先生は生徒たちの模範なんですから！"
13010-119 = "そういうのはちゃんと除いて、整理させてもらいますよ！"
13010-120 = "……まさか、書類仕事が面倒だからって、雑にやってたりしませんよね？"
13010-121 = "……先生！！！！！"
13010-122 = "先生、今日の放課後、生徒会室に寄っていただけませんか？"
13010-123 = "ちょっと私の力では計算できない、難しい問題に直面していまして……"
13010-124 = "ユウカにも解けない問題って、私でも相当怪しいと思うけど……"
13010-125 = "いえ、その、そういった件ではなく……"
13010-126 = "先生のお力が必要なんです"
13010-127 = "私に解決できることであれば、喜んで"
13010-128 = "ありがとうございます、それでは生徒会室でお待ちしておりますね"
13010-129 = "まったく……トリニティやゲヘナはどうやって備品管理してるんでしょう？"
13010-130 = "今回はまた、何があってそんなに怒ってるの？"
13010-131 = "「また」って……先生から見た私、そんないつも怒ってるように見えます？"
13010-132 = "ブラックマーケットの密輸品のことです"
13010-133 = "今回没収した武器の出所を調べてみたのですが、"
13010-134 = "そのほとんどがトリニティとゲヘナから流れていたものでした"
13010-135 = "校章が刻印された銃器はもちろんのこと、戦車まで闇市に流れてますし……"
13010-136 = "どちらの学園もしっかり管理をしてるとは思えません"
13010-137 = "もちろん、私たちミレニアムの管理は万全かつ厳重ですので、"
13010-138 = "備品が流出するなんてことは絶対にありません！"
13010-139 = "本当に？"
13010-140 = "……"
13010-141 = "まあ、生徒達が勝手に改造して売りさばいている私物を除けば、ですが……"
13010-142 = "先生、今朝もまた遅刻をされたとか"
13010-143 = "いくら先生に先生はいないからって、遅刻が多すぎませんか？"
13010-144 = "昨日は仕事が多かったから、寝るのが遅くなって……"
13010-145 = "ユウカが起こしに来てくれれば……"
13010-146 = "それでも遅刻はいけません！"
13010-147 = "大人なんですから甘えないでください！"
13010-148 = "シャーレには校則が無いからといって、気が緩み過ぎです"
13010-149 = "罰則を設けましょう。明日から遅刻一回につき、私の命令を1つ聞くこと！"
13010-150 = "じゃあユウカが遅刻したら逆に私が命令してもいい？"
13010-151 = "何を言ってるんですか、私が遅刻するわけないでしょう？"
13010-152 = "とにかく、明日は絶対に遅刻しないでくださいね。絶対ですよ！"
13010-153 = "シャーレの執務室に放置されたボードゲームがあったのですが、"
13010-154 = "もし使っていないのでしたら、私が頂いてもいいですか？"
13010-155 = "うん、良いよ。ユウカもゲーム好きなんだ？"
13010-156 = "もちろん"
13010-157 = "ボードゲームもそうですし、オンラインゲームも嗜みます"
13010-158 = "意外かも"
13010-159 = "何か勘違いされてるかもしれませんが……"
13010-160 = "私も他の生徒たちと同じくらい、ゲームは普通に好きですよ"
13010-161 = "敵の攻略法を考えるのは、数学の問題を解くのと同じくらい楽しいですから"
13010-130100010 = "数値系の作業をしてると、こう……"
13010-130100020 = "世の中が全部、数値で出来ている気がしてきません？"
13010-130100030 = "危険な世界の香りが……"
13010-130100040 = "危険、ですかね？"
13010-130100050 = "私はそうは思いませんが"
13010-130100060 = "別に、数字で全てが説明できる世界が望ましいと言っているわけではありません"
13010-130100070 = "ただ、その"
13010-130100080 = "もう少し各々がその重要性を分かってくれれば"
13010-130100090 = "私の仕事も楽になるなと……"
13010-130100100 = "もしかして、また計算が合わないとか？"
13010-130100110 = "はい、その通りです"
13010-130100120 = "ちょうど電卓の電池が切れてしまったので"
13010-130100130 = "入れ替えがてら、ちょっと軽く愚痴を言ってみた次第です"
