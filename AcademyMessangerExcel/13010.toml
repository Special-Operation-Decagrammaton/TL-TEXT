[translation]
13010-94 = "Olá, Sensei. É a Yuuka."
13010-95 = "Você se lembra de mim?"
13010-96 = "Sim, claro."
13010-97 = "……Quem é você mesmo?"
13010-98 = "Que bom, fico feliz que você se lembre."
13010-99 = "É a Hayase Yuuka! Você já esqueceu de mim!?"
13010-100 = "Ainda bem que eu peguei o seu contato."
13010-101 = "Bem, sobre o motivo do meu contato..."
13010-102 = "Ainda não confirmei o pagamento das despesas com as balas daquela operação de retomada do Schale."
13010-103 = "A fatura deveria ter chegado ao Schale, quando você pretende pagar?"
13010-104 = "Eu que tenho que processar isso...?"
13010-105 = "Claro, balas não são de graça, afinal."
13010-106 = "Isso deve ser tratado como despesa de trabalho, então se você solicitar o reembolso ao Conselho Estudantil Federal,"
13010-107 = "o Schale deve receber o pagamento. Eu gostaria que você repassasse esse valor para cá."
13010-108 = "Yuuka, como eu faço para criar uma fatura...?"
13010-109 = "……Puxa. Eu tenho um modelo de fatura que usamos em Millennium,"
13010-110 = "então vou levar para você na próxima vez que eu for ao Schale."
13010-111 = "Obrigado...!"
13010-112 = "Não há de quê, não é nada demais."
13010-113 = "Então, tenha um bom dia hoje."
13010-114 = "Sensei! Por que tem recibos de brinquedos aqui de novo!?"
13010-115 = "Brinquedos não têm nada a ver com o trabalho, não é!?"
13010-116 = "Eu não consigo trabalhar sem eles..."
13010-117 = "Só desta vez, se você puder fechar os olhos só desta vez..."
13010-118 = "Não pode! O Sensei é um exemplo para os alunos!"
13010-119 = "Vou remover essas coisas e organizar tudo corretamente!"
13010-120 = "……Não me diga que você está fazendo isso de qualquer jeito só porque acha o trabalho burocrático chato?"
13010-121 = "……Sensei!!!!!"
13010-122 = "Sensei, você poderia passar na sala do conselho estudantil hoje depois da aula?"
13010-123 = "Estou enfrentando um problema difícil que não consigo resolver sozinha..."
13010-124 = "Um problema que nem a Yuuka consegue resolver, acho difícil de acreditar..."
13010-125 = "Não, não é sobre isso..."
13010-126 = "Preciso da ajuda do Sensei."
13010-127 = "Se for algo que eu possa resolver, ficarei feliz em ajudar."
13010-128 = "Obrigada, estarei esperando por você na sala do conselho estudantil."
13010-129 = "Francamente... como será que Trinity e Gehenna gerenciam seus equipamentos?"
13010-130 = "Desta vez, o que aconteceu para você estar tão brava?"
13010-131 = "“Desta vez”... aos seus olhos, Sensei, eu pareço estar sempre brava?"
13010-132 = "É sobre os itens contrabandeados no mercado negro."
13010-133 = "Investiguei a origem das armas que confiscamos desta vez,"
13010-134 = "e a maioria delas veio de Trinity e Gehenna."
13010-135 = "Além das armas de fogo com o brasão da escola, até tanques estão sendo vendidos no mercado negro..."
13010-136 = "Não acho que nenhuma das duas escolas esteja fazendo um bom gerenciamento."
13010-137 = "Claro, o gerenciamento de Millennium é perfeito e rigoroso,"
13010-138 = "então é impossível que equipamentos vazem daqui!"
13010-139 = "Sério?"
13010-140 = "……"
13010-141 = "Bem, tirando os itens pessoais que os alunos modificam e vendem por conta própria..."
13010-142 = "Sensei, ouvi dizer que você se atrasou de novo esta manhã."
13010-143 = "Mesmo que não haja ninguém acima de você, não acha que está se atrasando demais?"
13010-144 = "Ontem tive muito trabalho, então acabei dormindo tarde..."
13010-145 = "Se a Yuuka tivesse vindo me acordar..."
13010-146 = "Mesmo assim, não se pode chegar atrasado!"
13010-147 = "Você é um adulto, então não seja mimado!"
13010-148 = "Só porque o Schale não tem regras escolares, você está relaxando demais."
13010-149 = "Vamos estabelecer uma punição. A partir de amanhã, cada atraso significa que você terá que obedecer a uma ordem minha!"
13010-150 = "Então, se a Yuuka se atrasar, eu posso te dar uma ordem em troca?"
13010-151 = "O que você está dizendo? Não tem como eu me atrasar, tem?"
13010-152 = "De qualquer forma, não se atrase amanhã, de jeito nenhum. Entendido?"
13010-153 = "Havia um jogo de tabuleiro deixado no escritório do Schale,"
13010-154 = "se você não estiver usando, posso ficar com ele?"
13010-155 = "Sim, claro. A Yuuka também gosta de jogos?"
13010-156 = "Claro."
13010-157 = "Eu gosto de jogos de tabuleiro e também aprecio jogos online."
13010-158 = "Isso é surpreendente."
13010-159 = "Talvez você esteja entendendo algo errado..."
13010-160 = "Eu gosto de jogos tanto quanto as outras alunas, é normal."
13010-161 = "Pensar em estratégias para derrotar inimigos é tão divertido quanto resolver problemas de matemática."
13010-130100010 = "Quando estou trabalhando com números, é como se..."
13010-130100020 = "Não parece que o mundo inteiro é feito de números?"
13010-130100030 = "Sinto cheiro de um mundo perigoso..."
13010-130100040 = "Perigoso, você acha?"
13010-130100050 = "Eu não penso assim."
13010-130100060 = "Não estou dizendo que um mundo onde tudo pode ser explicado por números é o ideal."
13010-130100070 = "É só que..."
13010-130100080 = "Se cada um entendesse um pouco mais a importância disso,"
13010-130100090 = "meu trabalho seria mais fácil..."
13010-130100100 = "Por acaso, os cálculos não estão batendo de novo?"
13010-130100110 = "Sim, exatamente."
13010-130100120 = "A bateria da minha calculadora acabou bem agora,"
13010-130100130 = "então, enquanto troco, resolvi desabafar um pouco."
