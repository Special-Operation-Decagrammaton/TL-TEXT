[translation]
10004-1 = "先生。急だけど話したいことがあるの"
10004-2 = "私の仕事が終わった後、深夜だけど少し会える？"
10004-3 = "もちろん、ヒナの頼みなら"
10004-4 = "深夜まで仕事があるんだね……お疲れ様……"
10004-5 = "遅い時間にごめん、じゃあ場所は……"
10004-6 = "私のせいで、睡眠時間が短くなってたりしない？"
10004-7 = "もしそうだったら言って"
10004-8 = "迷惑はかけたくないから"
10004-9 = "ヒナのためならいくらでも"
10004-10 = "私は大丈夫。ヒナも、ちゃんと寝てね"
10004-11 = "……ん、ありがとう"
10004-12 = "おやすみ、先生"
10004-13 = "先生。今度の休みの日の深夜、時間ある？"
10004-14 = "こっちは前と同じくらいの時間に仕事が終わる予定"
10004-15 = "都合が悪かったら大丈夫"
10004-16 = "全然問題ないよ"
10004-17 = "あの後も少し考えてみたけど、周りの視線を気にしすぎるのも良くないかも"
10004-18 = "あくまでも業務上のミーティングだから"
10004-19 = "今度からは、もっと明るい昼間に時間を作って会うとか……"
10004-20 = "明るい時間帯からヒナに会えるなんて……"
10004-21 = "すっごい楽しみ"
10004-22 = "何を言ってるの……"
10004-23 = "デートとかじゃないから、分かってる？"
10004-24 = "これは仕事だから"
10004-25 = "明るい時間帯から始めるヒナとのお仕事……楽しみだなあ"
10004-26 = "……"
10004-27 = "はあ……"
10004-28 = "もういい。私も、まあ……"
10004-29 = "少しは、楽しみにしてる"
10004-30 = "はい、話はこれで終わり。おやすみ、先生"
10004-31 = "先生"
10004-32 = "今月の射撃訓練の報告書のことでちょっと……"
10004-33 = "そんなことより、ヒナちゃん"
10004-34 = "今はもっと大事なことがあるよ"
10004-35 = "……？"
10004-36 = "なに？"
10004-37 = "何か忘れてる議題でも……"
10004-38 = "一緒にショッピングにでも行こう"
10004-39 = "……"
10004-40 = "……は？"
10004-41 = "え？"
10004-42 = "ショッピング？"
10004-43 = "……どうして？"
10004-44 = "約束だから"
10004-45 = "大事な用事だから"
10004-46 = "でも、ショッピングモールとか夜は閉まってるし……"
10004-47 = "24時間営業のところか"
10004-48 = "普通にお昼に"
10004-49 = "あ"
10004-50 = "……ごめん、今理解した"
10004-51 = "……"
10004-52 = "……うん、約束したんだった"
10004-53 = "わかった"
10004-54 = "時間作るから、待ってて"
10004-55 = "先生"
10004-56 = "今日は、この間の仕事の"
10004-57 = "今日は陽射しが気持ちいいね"
10004-58 = "すごく良い天気"
10004-59 = "え？"
10004-60 = "天気……？"
10004-61 = "別に、天気が良くても何も変わらない"
10004-62 = "つまり、絶好の散歩日和！"
10004-63 = "仕事より散歩に行こう！！"
10004-64 = "散歩……？"
10004-65 = "えっと……"
10004-66 = "今から？"
10004-67 = "……まあ、ちょっとだけなら……"
10004-68 = "全く……"
10004-69 = "先生は本当に……"
10004-70 = "……全くもう"
10004-71 = "ここ数日、徹夜でバタバタしっぱなし……ほんと面倒"
10004-72 = "遠出が必要な件も多くて、処理できてない書類は溜まっていく一方だし……"
10004-73 = "何か起こるとみんな私の方ばっかり見るし……"
10004-74 = "……ふう"
10004-75 = "そのせいで、みんなが休んでる日にもこうして一人で仕事……"
10004-76 = "めんどくさい、ムカつく"
10004-77 = "はあ……"
10004-78 = "みんなから頼りにされてるんだね"
10004-79 = "委員長は大変だね、お疲れ様"
10004-80 = "……"
10004-81 = "ごめん、つい愚痴になった"
10004-82 = "忘れて"
10004-83 = "えっと……"
10004-84 = "昨日の夜、私、何か変なこと言ったり……してない？"
10004-85 = "夢だったのかはっきりしなくて、あまり思い出せないけど……なんだか……"
10004-86 = "ものすごく恥ずかしいことを……"
10004-87 = "いや……"
10004-88 = "そんなことない、よね？"
10004-89 = "何の話？"
10004-90 = "夢を見てたんじゃないかな？"
10004-91 = "……"
10004-92 = "うん、そういうことにしておく"
10004-93 = "……ありがとう"
10004-100040010 = "先生、ちょっと良い？"
10004-100040020 = "どうかしたの？"
10004-100040030 = "あ、その……"
10004-100040040 = "今日はお休みなんだけど……"
10004-100040050 = "先生さえよければ"
10004-100040060 = "一緒に過ごしたいなと思って……"
10004-100040070 = "良かったね、お休みが取れたんだ"
10004-100040080 = "私が先生に会いたいだけだし……"
10004-100040090 = "忙しいなら、無理には……"
10004-100040100 = "むしろ、無理にでも誘って！"
10004-100040110 = "すぐそっちに行くね！"
10004-100040120 = "……えっ？"
10004-100040130 = "ふふっ"
10004-100040140 = "じゃあ待ってるわ、先生"
