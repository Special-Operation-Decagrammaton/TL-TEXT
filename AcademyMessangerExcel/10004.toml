[translation]
10004-1 = "Sensei. Sei que é repentino, mas tem algo que eu quero conversar."
10004-2 = "Depois que o meu trabalho acabar, sei que vai ser tarde da noite, mas podemos nos encontrar um pouco?"
10004-3 = "Claro, se é um pedido da Hina."
10004-4 = "Você trabalha até tarde, né... Bom trabalho..."
10004-5 = "Desculpe pelo horário, então, o lugar vai ser..."
10004-6 = "Por minha causa, suas horas de sono não estão diminuindo, estão?"
10004-7 = "Se estiver, me diga."
10004-8 = "Não quero te incomodar."
10004-9 = "Pela Hina, eu faço qualquer coisa."
10004-10 = "Eu estou bem. Hina, durma bem também, ok?"
10004-11 = "...Hm, obrigada."
10004-12 = "Boa noite, Sensei."
10004-13 = "Sensei. No seu próximo dia de folga, você tem tempo de madrugada?"
10004-14 = "Eu devo terminar o trabalho mais ou menos no mesmo horário da última vez."
10004-15 = "Se não for um bom momento pra você, tudo bem."
10004-16 = "Sem problema nenhum."
10004-17 = "Pensei um pouco sobre isso depois, e talvez não seja bom se preocupar tanto com os olhares dos outros."
10004-18 = "Afinal, é apenas uma reunião de trabalho."
10004-19 = "A partir de agora, talvez a gente possa arranjar um tempo para se encontrar durante o dia, quando está mais claro..."
10004-20 = "Poder encontrar a Hina durante o dia..."
10004-21 = "Estou muito ansioso."
10004-22 = "O que você está dizendo..."
10004-23 = "Não é um encontro nem nada, entendeu?"
10004-24 = "Isso é trabalho."
10004-25 = "Um trabalho com a Hina que começa durante o dia... Mal posso esperar."
10004-26 = "..."
10004-27 = "Haa..."
10004-28 = "Tanto faz. Eu também, bem..."
10004-29 = "Estou um pouco ansiosa."
10004-30 = "Certo, a conversa termina aqui. Boa noite, Sensei."
10004-31 = "Sensei."
10004-32 = "Sobre o relatório do treinamento de tiro deste mês..."
10004-33 = "Mais importante que isso, Hina-chan."
10004-34 = "Agora tem algo mais importante."
10004-35 = "...?"
10004-36 = "O quê?"
10004-37 = "Será que esqueci de alguma pauta...?"
10004-38 = "Vamos fazer umas compras juntos."
10004-39 = "..."
10004-40 = "...Hã?"
10004-41 = "Eh?"
10004-42 = "Compras?"
10004-43 = "...Por quê?"
10004-44 = "Porque é uma promessa."
10004-45 = "Porque é um compromisso importante."
10004-46 = "Mas os shoppings e lugares assim fecham à noite..."
10004-47 = "Em um lugar que fica aberto 24 horas?"
10004-48 = "Normalmente, durante o dia."
10004-49 = "Ah."
10004-50 = "...Desculpe, entendi agora."
10004-51 = "……"
10004-52 = "……Sim, eu tinha prometido."
10004-53 = "Entendi."
10004-54 = "Vou arranjar um tempo, então espere."
10004-55 = "Sensei."
10004-56 = "Hoje, sobre o trabalho do outro dia..."
10004-57 = "A luz do sol está tão agradável hoje, não é?"
10004-58 = "O tempo está ótimo."
10004-59 = "Hã?"
10004-60 = "O tempo...?"
10004-61 = "Não é como se algo fosse mudar só porque o tempo está bom."
10004-62 = "Ou seja, um dia perfeito para um passeio!"
10004-63 = "Vamos passear em vez de trabalhar!!"
10004-64 = "Passear...?"
10004-65 = "Uhm..."
10004-66 = "Agora?"
10004-67 = "……Bem, se for só por um tempinho..."
10004-68 = "Francamente..."
10004-69 = "Sensei, você realmente..."
10004-70 = "……Sério mesmo."
10004-71 = "Nos últimos dias, tenho estado na correria, virando noites... que saco."
10004-72 = "Tiveram muitos casos que exigiram viagens longas, e os documentos que não consegui processar continuam se acumulando..."
10004-73 = "E sempre que algo acontece, todo mundo olha para mim..."
10004-74 = "……Haaah..."
10004-75 = "Por causa disso, mesmo nos dias em que todo mundo está de folga, eu estou aqui trabalhando sozinha..."
10004-76 = "Que saco, que raiva."
10004-77 = "Haaah..."
10004-78 = "Todo mundo confia em você, não é?"
10004-79 = "Ser a presidente do comitê é difícil, né? Bom trabalho."
10004-80 = "……"
10004-81 = "Desculpe, acabei reclamando sem querer."
10004-82 = "Esqueça."
10004-83 = "Uhm..."
10004-84 = "Ontem à noite, eu... disse alguma coisa estranha..., não disse?"
10004-85 = "Não tenho certeza se foi um sonho e não consigo me lembrar direito, mas de alguma forma..."
10004-86 = "Algo extremamente vergonhoso..."
10004-87 = "Não..."
10004-88 = "Não foi nada disso, né?"
10004-89 = "Do que você está falando?"
10004-90 = "Acho que você estava sonhando, não?"
10004-91 = "……"
10004-92 = "Sim, vamos deixar por isso mesmo."
10004-93 = "……Obrigada."
10004-100040010 = "Sensei, tem um minuto?"
10004-100040020 = "Aconteceu alguma coisa?"
10004-100040030 = "Ah, bem..."
10004-100040040 = "Hoje é meu dia de folga, mas..."
10004-100040050 = "Se você não se importar..."
10004-100040060 = "Eu estava pensando que gostaria de passar o dia com você..."
10004-100040070 = "Que bom que você conseguiu uma folga."
10004-100040080 = "É que sou eu que quero te ver, Sensei..."
10004-100040090 = "Se estiver ocupado, não precisa se forçar..."
10004-100040100 = "Pelo contrário, me convide de qualquer jeito!"
10004-100040110 = "Já estou indo para aí!"
10004-100040120 = "……Hã?"
10004-100040130 = "Hehe."
10004-100040140 = "Então estarei esperando, Sensei."
