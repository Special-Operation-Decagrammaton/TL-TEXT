[translation]
26007-260070010 = "Professor! Escute só!!"
26007-260070020 = "Estava organizando o depósito e encontrei várias coisas... e olha, é incrível!"
26007-260070030 = "Tem muitos achados valiosos... e todos parecem novos!"
26007-260070040 = "Se eu levasse tudo para um brechó, quanto será que..."
26007-260070050 = "Ah, mas vender assim direto seria um pouco desperdício."
26007-260070060 = "Se eu consertar direitinho antes de vender, daria um bom..."
26007-260070070 = "Q-que conversa é essa?"
26007-260070080 = "Ayane, primeiro se acalme."
26007-260070090 = "Ah...!"
26007-260070100 = "Desculpe, foi sem querer. A vontade de compartilhar acabou falando mais alto..."
26007-260070110 = "Acho que seria um incômodo pedir para você vir aqui, então vou te enviar fotos."
26007-260070120 = "Tudo bem, eu estou indo aí."
26007-260070130 = "Onde você está agora?"
26007-260070140 = "Ah..."
26007-260070150 = "Bem..."
26007-260070160 = "Obrigada pelo seu trabalho hoje."
26007-260070170 = "Encontramos muitos tesouros, mas não tinha muita coisa que desse para levar para casa, né?"
26007-260070180 = "A maioria era grande demais... no fim das contas, voltamos à estaca zero..."
26007-260070190 = "Não, acho que "brincar" é exatamente isso."
26007-260070200 = "Mas foi divertido, então não está tudo bem?"
26007-260070210 = "……！"
26007-260070220 = "Sim."
26007-260070230 = "Você tem razão. Obrigada."
26007-260070240 = "jjjjjjjjmnmjjjjjjjjjj"
26007-260070250 = "……Ayane?"
26007-260070260 = "O que houve?"
26007-260070270 = "jjjjjjjj,,iuijjjjjjjjjj"
26007-260070280 = "O que será que aconteceu..."
26007-260070290 = "Está sonhando acordada...?"
26007-260070300 = "nnnnnllllllllllll"
26007-260070310 = "Professor..."
26007-260070320 = "Sobre aquilo, bem..."
26007-260070330 = "Na verdade..."
26007-260070340 = "O que aconteceu hoje de manhã..."
26007-260070350 = "Eu não contei para ninguém."
26007-260070360 = "Afinal, é a nossa base secreta."
26007-260070370 = "……"
26007-260070380 = "Sim."
26007-260070390 = "Obrigada..."
26007-260070400 = "Professor, se não for pedir muito..."
26007-260070410 = "Poderia me fazer um favor...?"
26007-260070420 = "Claro, sem problemas."
26007-260070430 = "O que foi?"
26007-260070440 = "Estou bem no meio do trabalho de reparo do helicóptero agora."
26007-260070450 = "E parece que vou precisar de mais peças do que eu imaginava..."
26007-260070460 = "Não são coisas muito pesadas... os parafusos que eu tinha preparado com antecedência estão no saguão..."
26007-260070470 = "Entendido, estou indo agora. Correndo."
26007-260070480 = "Entregador, partindo!"
26007-260070490 = "Ahaha..."
26007-260070500 = "Obrigada. Estou te esperando!"
26007-260070510 = "Eu disse para me chamar a qualquer momento, mas..."
26007-260070520 = "Pensando bem, não é tão fácil assim pilotar um helicóptero, né..."
26007-260070530 = "No fim das contas, talvez não tenha mudado muito em relação a antes..."
26007-260070540 = "Mas o importante é que o helicóptero esteja disponível."
26007-260070550 = "Afinal, golpes especiais não são algo que se usa com tanta frequência."
26007-260070560 = "É, é mesmo?"
26007-260070570 = "Ahaha..."
26007-260070580 = "Muito obrigada, Sensei."
