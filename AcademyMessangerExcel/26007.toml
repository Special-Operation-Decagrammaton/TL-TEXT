[translation]
26007-260070010 = "先生！聞いてください！！"
26007-260070020 = "倉庫を整理してたら、色々とでてきて……それが、すごいんです！"
26007-260070030 = "掘り出し物がたくさんあって……どれも新品同然なんです！"
26007-260070040 = "全部リサイクルショップに持っていったらどれだけ……"
26007-260070050 = "ああでも、そのまま売るのはちょっと勿体ないですね"
26007-260070060 = "ちゃんと修理して売ればかなりの……"
26007-260070070 = "な、何の話？"
26007-260070080 = "アヤネ、まずは落ち着いて"
26007-260070090 = "あっ……！"
26007-260070100 = "すみません、つい。共有したいという気持ちが先走ってしまって……"
26007-260070110 = "直接いらっしゃるのはお手間だと思うので、写真を送りますね"
26007-260070120 = "大丈夫、私が向かうよ"
26007-260070130 = "今どこにいるの？"
26007-260070140 = "あっ……"
26007-260070150 = "えっと……"
26007-260070160 = "今日はお疲れさまでした"
26007-260070170 = "たくさんお宝が見つかりましたが、実際に持って帰れる物は多くなかったですね"
26007-260070180 = "ほとんどが大きすぎて……結局元の木阿弥だったというか……"
26007-260070190 = "ううん、「遊ぶ」ってこういうものだと思うよ"
26007-260070200 = "でも楽しかったから、いいんじゃないかな？"
26007-260070210 = "……！"
26007-260070220 = "はい"
26007-260070230 = "おっしゃる通りです。ありがとうございます。"
26007-260070240 = "ｊｊｊｊｊｊｊｍんｍｊｊｊｊｊｊｊｊｊｊ"
26007-260070250 = "……アヤネ？"
26007-260070260 = "どうしたの？"
26007-260070270 = "ｊｊｊｊｊｊｊ、、いういｊｊｊｊｊｊｊｊｊｊ"
26007-260070280 = "どうしたんだろう……"
26007-260070290 = "寝ぼけてる……？"
26007-260070300 = "んんんんｌｌｌｌｌｌｌｌｌｌ"
26007-260070310 = "先生……"
26007-260070320 = "その、えっと……"
26007-260070330 = "実はですね"
26007-260070340 = "今朝のこと……"
26007-260070350 = "誰にも言ってないよ"
26007-260070360 = "秘密基地、だからね"
26007-260070370 = "……"
26007-260070380 = "はい"
26007-260070390 = "ありがとうございます……"
26007-260070400 = "先生、もしよろしければ……"
26007-260070410 = "一つお願いをしても良いでしょうか……？"
26007-260070420 = "もちろん、大丈夫だよ"
26007-260070430 = "どうしたの？"
26007-260070440 = "ちょうど今、ヘリの補修作業中なのですが"
26007-260070450 = "思っていたよりも、部品が多く必要になりそうで……"
26007-260070460 = "そんなに重い物ではなく……前もって用意しておいたネジがホールに置いてあるのですが……"
26007-260070470 = "分かった、今行くね。ダッシュで"
26007-260070480 = "配達員、出発しまーす"
26007-260070490 = "あはは……"
26007-260070500 = "ありがとうございます。お待ちしております！"
26007-260070510 = "いつでも呼んでくださいとお伝えしましたが"
26007-260070520 = "考えてみたらヘリを飛ばすのって、そんなに簡単ではないですね……"
26007-260070530 = "結局、以前とあまり変わらないかも……"
26007-260070540 = "でも、ヘリがあるということが大事だからね"
26007-260070550 = "必殺技はあまり頻繫に使うものじゃないからね"
26007-260070560 = "そ、そうですか？"
26007-260070570 = "あはは……"
26007-260070580 = "ありがとうございます、先生"
