[translation]
20009-200090010 = "年末の学園は、非常に忙しく慌ただしい"
20009-200090020 = "体力にも優れたこのおいらでさえ、度重なる激務で疲労が溜まってるぐらいだ"
20009-200090030 = "そこで今週末は、仕事を忘れて冬休みを楽しむことにした！"
20009-200090040 = "リゾート地でゆっくり休めば、その後の仕事の効率も良くなるはず"
20009-200090050 = "結構普段から休息取ってたような……？"
20009-200090060 = "甘いなカムラッド"
20009-200090070 = "仕事中の休息と休暇は、まるで違うものなんだぞ？"
20009-200090080 = "普段の昼寝はあくまで応急措置のようなもので、それとは別に根本的な疲れは溜まっていくからな"
20009-200090090 = "というわけで休暇を堪能すべく、今回は何と温泉を貸し切ったんだ！"
20009-200090100 = "カムラッドも疲れてるなら、おいらと一緒に冬休みを満喫しないか？"
20009-200090110 = "どうしてだ……"
20009-200090120 = "おいらの休暇の計画は、完璧だったはずなのに……"
20009-200090130 = "全身が鉛のように重い……"
20009-200090140 = "普段動かないのに、急にあんなに運動したらね……"
20009-200090150 = "多分筋肉痛だと思う"
20009-200090160 = "何ということだ……"
20009-200090170 = "楽しかったは楽しかったが、最高級抹茶プリンが手に入らなかった上に筋肉痛とは……"
20009-200090180 = "冬休み、なんと恐ろしいやつ……"
20009-200090190 = "カムラッドは、「温泉卵」を食べたことがあるか？"
20009-200090200 = "普通の卵と温泉水だけで生み出される珍味と聞いたが……"
20009-200090210 = "おいらは温泉に詳しくないとはいえ、安易には信じられない話だ"
20009-200090220 = "温泉卵？"
20009-200090230 = "確かにプリンみたいに柔らかいし、美味しいよ"
20009-200090240 = "プリン！？"
20009-200090250 = "今プリンと言ったか！？"
20009-200090260 = "プリンを作るためには、たくさんの材料が必要なのに"
20009-200090270 = "温泉水と卵だけで、プリンのようなデザートが作れるだと……！？"
20009-200090280 = "カムラッド、こうしてる場合じゃない"
20009-200090290 = "今すぐ温泉卵を作りに行くぞ！"
20009-200090300 = "カムラッド、こんな話を知っているか？"
20009-200090310 = "優雅に泳ぐ白鳥も、水面下では沈まないように一生懸命バタ足をしている……"
20009-200090320 = "つまり孤高で美しい存在になるためには、密かに努力する必要があるということだ"
20009-200090330 = "学園の生徒たちもそういった心構えで、休日にも働いてくれれば良いのだが"
20009-200090340 = "それは確かに、ある意味良い話なんだけど……"
20009-200090350 = "ん？どうしたカムラッド、何か言いたいことでも？"
20009-200090360 = "この間知ったんだけど、実際の白鳥が水に沈まないのって"
20009-200090370 = "羽根に油を付けたりしてるからなんだって"
20009-200090380 = "……"
20009-200090390 = "……"
20009-200090400 = "チェリノ？"
20009-200090410 = "今のおいらをチェリノと呼んでくれるな、カムラッド……"
20009-200090420 = "髭の権威が無いおいらは、偉大なる指導者であるチェリノとは言えない……"
20009-200090430 = "レッドウィンター連邦学園における、ただのいち生徒のようなもの……"
20009-200090440 = "あの髭はまだ洗濯中？"
20009-200090450 = "それがトモエ曰く、油が染み込み過ぎていて新しい物を買った方が良いと"
20009-200090460 = "しかし新しい髭を買ったとしても、それがいつ届くかも分からないし……"
20009-200090470 = "権威が無いということが、これほどまでに空しくて憂鬱だとは……"
20009-200090480 = "気分転換に、どこかの温泉に行くとかどう？"
20009-200090490 = "今はそんな気分じゃない……"
20009-200090500 = "全く、どうしてみんな熱いお湯で身体を洗うのがそんなに好きなのか……"
20009-200090510 = "お風呂から上がったら、フルーツ牛乳買ってあげる"
20009-200090520 = "よし、すぐに行くぞカムラッド"
20009-200090530 = "カムラッド"
20009-200090540 = "カムラッド！？"
20009-200090550 = "チェリノ？どうかした？"
20009-200090560 = "おお、いたか。うむ、何から話したものか……"
20009-200090570 = "電算局のミスのせいで、ちょっと面倒なことになったのだ"
20009-200090580 = "本来なら規定通りに全員粛清すべきだが"
20009-200090590 = "結果的にレッドウィンターの財政に役立ったからな"
20009-200090600 = "トモエの助言もあって、今回だけは処分を免除することにしてやったんだ"
20009-200090610 = "いまいち話が掴めてないんだけど……"
20009-200090620 = "むぅ"
20009-200090630 = "とりあえず、おいらの温泉郷に来てくれ！"
20009-200090640 = "百聞は一見に如かず！"
