[translation]
20009-200090010 = "A escola no final do ano é extremamente ocupada e agitada."
20009-200090020 = "Até mesmo eu, que tenho uma resistência física excelente, estou acumulando fadiga devido ao excesso de trabalho."
20009-200090030 = "Por isso, decidi esquecer o trabalho neste fim de semana e aproveitar as férias de inverno!"
20009-200090040 = "Se eu descansar bem em um resort, a eficiência do meu trabalho depois deve melhorar."
20009-200090050 = "Você não costumava descansar bastante no dia a dia...?"
20009-200090060 = "Você é ingênuo, camarada."
20009-200090070 = "Descansar durante o trabalho e tirar férias são coisas completamente diferentes, sabia?"
20009-200090080 = "A soneca de sempre é apenas uma medida de emergência; o cansaço fundamental continua se acumulando separadamente."
20009-200090090 = "Sendo assim, para aproveitar as férias ao máximo, desta vez eu reservei uma fonte termal só para nós!"
20009-200090100 = "Se você também está cansado, camarada, por que não aproveita as férias de inverno comigo?"
20009-200090110 = "Por que será..."
20009-200090120 = "Meu plano de férias deveria ter sido perfeito..."
20009-200090130 = "Meu corpo inteiro está pesado como chumbo..."
20009-200090140 = "Bem, você não costuma se mexer muito, então fazer tanto exercício de repente..."
20009-200090150 = "Acho que é dor muscular."
20009-200090160 = "Que desastre..."
20009-200090170 = "Foi divertido, sim, mas além de não conseguir o pudim de matcha de alta qualidade, ainda estou com dor muscular..."
20009-200090180 = "Férias de inverno, que coisa terrível..."
20009-200090190 = "Camarada, você já comeu um \"ovo de fonte termal\"?"
20009-200090200 = "Ouvi dizer que é uma iguaria feita apenas com ovos comuns e água termal..."
20009-200090210 = "Embora eu não entenda muito de fontes termais, é uma história difícil de acreditar facilmente."
20009-200090220 = "Ovo de fonte termal?"
20009-200090230 = "É verdade que ele é macio como pudim e delicioso."
20009-200090240 = "Pudim!?"
20009-200090250 = "Você disse pudim agora pouco!?"
20009-200090260 = "Para fazer pudim, são necessários muitos ingredientes..."
20009-200090270 = "Você está me dizendo que é possível fazer uma sobremesa como pudim apenas com água termal e ovos...!?"
20009-200090280 = "Camarada, não temos tempo a perder."
20009-200090290 = "Vamos fazer ovos de fonte termal agora mesmo!"
20009-200090300 = "Camarada, você conhece essa história?"
20009-200090310 = "Até mesmo um cisne que nada graciosamente está batendo as patas com força debaixo d'água para não afundar..."
20009-200090320 = "Ou seja, para se tornar uma existência solitária e bela, é preciso se esforçar em segredo."
20009-200090330 = "Seria bom se as alunas da escola tivessem essa mentalidade e trabalhassem até nos feriados."
20009-200090340 = "Isso é certamente uma boa lição, de certa forma, mas..."
20009-200090350 = "Hm? O que foi, camarada? Tem algo a dizer?"
20009-200090360 = "Eu descobri isso outro dia, mas o motivo de os cisnes de verdade não afundarem na água..."
20009-200090370 = "É porque eles passam óleo nas penas."
20009-200090380 = "..."
20009-200090390 = "..."
20009-200090400 = "Cherino?"
20009-200090410 = "Não me chame de Cherino agora, camarada..."
20009-200090420 = "Sem a autoridade do bigode, eu não posso ser a grande líder Cherino..."
20009-200090430 = "Sou apenas como uma aluna comum da Academia Red Winter..."
20009-200090440 = "Aquele bigode ainda está na lavanderia?"
20009-200090450 = "Tomoe disse que ele está tão encharcado de óleo que seria melhor comprar um novo."
20009-200090460 = "Mas mesmo que eu compre um bigode novo, não sei quando ele vai chegar..."
20009-200090470 = "Não ter autoridade é algo tão vazio e deprimente..."
20009-200090480 = "Que tal irmos a alguma fonte termal para mudar de ares?"
20009-200090490 = "Não estou com disposição para isso agora..."
20009-200090500 = "Francamente, por que todos gostam tanto de lavar o corpo com água quente..."
20009-200090510 = "Quando você sair do banho, vou te comprar um leite de frutas."
20009-200090520 = "Certo, estou indo agora mesmo, Camarada."
20009-200090530 = "Camarada."
20009-200090540 = "Camarada!?"
20009-200090550 = "Cherino? Aconteceu alguma coisa?"
20009-200090560 = "Oh, você está aí. Hum, por onde devo começar..."
20009-200090570 = "Por causa de um erro do departamento de computação, as coisas ficaram um pouco complicadas."
20009-200090580 = "Normalmente, eu deveria expurgar todos conforme as regras,"
20009-200090590 = "mas, no fim das contas, isso acabou sendo útil para as finanças de Red Winter."
20009-200090600 = "Com o conselho da Tomoe, decidi perdoá-los desta vez."
20009-200090610 = "Ainda não entendi muito bem o que está acontecendo..."
20009-200090620 = "Hum."
20009-200090630 = "De qualquer forma, venha logo para a minha estância termal!"
20009-200090640 = "Ver para crer!"
