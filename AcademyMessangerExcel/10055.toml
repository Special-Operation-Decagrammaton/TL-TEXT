[translation]
10055-100550010 = "Sensei."
10055-100550020 = "Ouvi dizer que você vem para a Red Winter em breve, é verdade?"
10055-100550030 = "Sim, estou planejando."
10055-100550040 = "Algum compromisso?"
10055-100550050 = "Não, não é nada em particular."
10055-100550060 = "Só pensei que poderíamos nos ver depois de tanto tempo."
10055-100550070 = "Huhu."
10055-100550080 = "Se tiver tempo, ficaria feliz se você passasse na Sala 227."
10055-100550090 = "Acho que você já sabe, Sensei, mas..."
10055-100550100 = "O campus da nossa academia é enorme, né?"
10055-100550110 = "Isso é verdade."
10055-100550120 = "Além disso, é frio e tem muitos animais selvagens ferozes."
10055-100550130 = "Então, me chame quando vier."
10055-100550140 = "Se você andar por aí sem um guia..."
10055-100550150 = "...pode acabar se metendo em perigo."
10055-100550160 = "Então, fica combinado."
10055-100550170 = "Sensei, você conseguiu voltar em segurança?"
10055-100550180 = "Não me diga que você fez algum desvio no caminho, né?"
10055-100550190 = "Graças a você, cheguei bem."
10055-100550200 = "Hoje vou descansar um pouco."
10055-100550210 = "Ah, que bom então."
10055-100550220 = "Como eu disse antes..."
10055-100550230 = "Quando vier para a Red Winter, não se esqueça de me avisar."
10055-100550240 = "Segurança em primeiro lugar.\nEntendeu?"
10055-100550250 = "Sensei, ouvi uma coisa agora há pouco..."
10055-100550260 = "Por acaso, você estava me procurando?"
10055-100550270 = "Sim, você tem um tempo mais tarde?"
10055-100550280 = "Queria te agradecer pelo outro dia."
10055-100550290 = "Oh, vou aguardar ansiosamente."
10055-100550300 = "Não precisava se preocupar com isso, huhu."
10055-100550310 = "Bem, por mim tudo bem."
10055-100550320 = "Entendido."
10055-100550330 = "Então, até mais tarde."
10055-100550340 = "Até lá, então."
10055-100550350 = "Sensei, conseguiu voltar em segurança?"
10055-100550360 = "Bem, hoje não era um lugar onde você se perderia, mas..."
10055-100550370 = "Sim, consegui voltar direitinho."
10055-100550380 = "E você, Shigure? Está bem?"
10055-100550390 = "Sim, graças a você."
10055-100550400 = "Muito obrigada por hoje."
10055-100550410 = "Acho que da próxima vez é a minha vez de agradecer."
10055-100550420 = "Ficar trocando agradecimentos assim... não é tão ruim, né?"
10055-100550430 = "Então, quando chegar a hora, conto com você."
10055-100550440 = "Huhu."
10055-100550450 = "Então, tenha um bom dia."
10055-100550460 = "Sensei."
10055-100550470 = "Se não for incômodo, você teria um tempinho mais tarde?"
10055-100550480 = "Como uma forma de agradecer pelo outro dia..."
10055-100550490 = "...pensei em cozinhar algo para você."
10055-100550500 = "Cozinhar?"
10055-100550510 = "Você vem até a Schale?"
10055-100550520 = "Sim, isso mesmo."
10055-100550530 = "Eu vou levar os ingredientes."
10055-100550540 = "Pode esperar algo bom."
10055-100550550 = "Então, vamos marcar uma data depois?"
10055-100550560 = "Falando nisso, acho que esqueci de agradecer."
10055-100550570 = "Desculpe a demora."
10055-100550580 = "Obrigada, estava uma delícia."
10055-100550590 = "Então, eu tive uma ideia agora há pouco."
10055-100550600 = "Sobre a vodca de antes..."
10055-100550610 = "Que tal usar para marinar?"
10055-100550620 = "Para cozinhar, se usa saquê."
10055-100550630 = "Vodca não pode."
10055-100550640 = "Hehe."
10055-100550650 = "Sensei, você é mesmo uma pessoa interessante."
10055-100550660 = "Entendido, farei isso então."
10055-100550670 = "Até mais, Sensei."
