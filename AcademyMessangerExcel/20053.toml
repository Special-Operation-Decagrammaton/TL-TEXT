[translation]
20053-200530010 = "Domo, Professor."
20053-200530020 = "Domo, Michiru-dono."
20053-200530030 = "Oh!"
20053-200530040 = "Você está começando a parecer um ninja, Professor~"
20053-200530050 = "Já está pensando em entrar para o Clube de Pesquisa de Ninjutsu?"
20053-200530060 = "Aliás, por que veio aqui hoje?"
20053-200530070 = "Ignorou!?"
20053-200530080 = "Ugh, ninjas também têm sentimentos, sabia..."
20053-200530090 = "...Bem, eu estou pesquisando um novo ninjutsu,"
20053-200530100 = "mas não está dando muito certo..."
20053-200530110 = "Acabei me machucando um pouco."
20053-200530120 = "Machucou!?"
20053-200530130 = "Ah."
20053-200530140 = "Não, não é nada demais, na verdade."
20053-200530150 = "Estou indo aí agora."
20053-200530160 = "Eh?"
20053-200530170 = "Professor."
20053-200530180 = "Sobre isso..."
20053-200530190 = "Obrigada."
20053-200530200 = "Vou cuidar bem do que você comprou para mim."
20053-200530210 = "E desculpe pelo que aconteceu agora há pouco."
20053-200530220 = "...Não, espera, eu não fiz nada de errado, fiz!?"
20053-200530230 = "(Puff!) ← Efeito sonoro de bomba de fumaça"
20053-200530240 = "Domo, Professor."
20053-200530250 = "Recebi notícias..."
20053-200530260 = "Disseram que o ferimento sarou completamente."
20053-200530270 = "...Está falando do vestido que deixamos lá?"
20053-200530280 = "Hehehe! Você é muito perspicaz, Professor!"
20053-200530290 = "Vamos lá buscar!"
20053-200530300 = "Tome cuidado."
20053-200530310 = "Do que está falando?"
20053-200530320 = "Do início ao fim, com perfeição."
20053-200530330 = "Essa é a regra de ouro dos ninjas!"
20053-200530340 = "Além disso, como deixamos lá juntos,"
20053-200530350 = "vamos buscar juntos!"
20053-200530360 = "O que você quer dizer com isso!?"
20053-200530370 = "Estarei te esperando na frente da loja daqui a uma hora!"
20053-200530380 = "Professor."
20053-200530390 = "Sobre aquilo, desculpe por ter fugido de repente..."
20053-200530400 = "Fui abandonada pela Michiru..."
20053-200530410 = "!?!?"
20053-200530420 = "O que você está dizendo!?!?"
20053-200530430 = "Finalmente."
20053-200530440 = "Eu descobri."
20053-200530450 = "O segredo para fazer o canal crescer."
20053-200530460 = "E como colocar as mãos nesse segredo...!"
20053-200530470 = "O que deu em você de repente...?"
20053-200530480 = "Hehehe."
20053-200530490 = "Adivinha só?"
20053-200530500 = "Eu consegui o convite para uma sessão informativa!"
20053-200530510 = "Ao participar disso,"
20053-200530520 = "aumentar o número de visualizações e inscritos"
20053-200530530 = "dizem que eles ensinam o segredo para isso!"
20053-200530540 = "……E-entendo."
20053-200530550 = "O segredo é criar algo especial com as próprias mãos!"
20053-200530560 = "Aguardem ansiosamente!"
20053-200530570 = "Estarei aguardando, senhorita Michiru."
20053-200530580 = "Nyahaha, obrigada, Sensei!"
20053-200530590 = "Hehe."
20053-200530600 = "Hehehehehe."
20053-200530610 = "Eu finalmente entendi, Sensei!"
20053-200530620 = "\"Q-que coisa?\""
20053-200530630 = "É que,"
20053-200530640 = "hum,"
20053-200530650 = "acho que não é pelo MomoTalk,"
20053-200530660 = "talvez seja melhor conversarmos pessoalmente!"
20053-200530670 = "Irei até aí imediatamente!"
20053-200530680 = "Espere por mim!"
20053-200530690 = "Sensei……"
20053-200530700 = "Vou parar de seguir tendências facilmente……"
20053-200530710 = "Vou seguir o caminho do ninja com seriedade……"
