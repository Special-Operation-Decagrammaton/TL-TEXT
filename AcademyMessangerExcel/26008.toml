[translation]
26008-260080010 = "Sensei, bom trabalho!"
26008-260080020 = "Fufu, ufufufufu..."
26008-260080030 = "Kukkukku...?"
26008-260080040 = "Fufufufu...?"
26008-260080050 = "O que é esse jeito de rir que parece um vilão barato!"
26008-260080060 = "Eu não rio desse jeito, rio!?"
26008-260080070 = "E então, o que houve de repente, Shizuko-cchi?"
26008-260080080 = "Cchi...?"
26008-260080090 = "Bem, tudo bem! Afinal, hoje é o melhor dia desde que a Hyakkiyako começou!"
26008-260080100 = "Vou aceitar isso com um coração generoso!"
26008-260080110 = "Pode me agradecer, fuffufu!"
26008-260080120 = "Você parece estar de bom humor."
26008-260080130 = "Sim, não é apenas 'bom', é muito mais que isso!"
26008-260080140 = "A Hyakkiyako, começando por esta 'Casa de Praia'..."
26008-260080150 = "Vai renascer como a maior rede de franquias de Kivotos!"
26008-260080160 = "Por isso, Sensei,"
26008-260080170 = "você tem a obrigação de acompanhar cada detalhe disso comigo!"
26008-260080180 = "Como sempre, um pedido absurdo."
26008-260080190 = "Ei, Sensei."
26008-260080200 = "O que foi?"
26008-260080210 = "Não, nada."
26008-260080220 = "Na verdade, não é nada."
26008-260080230 = "De qualquer forma, vamos nos esforçar hoje também!"
26008-260080240 = "Por acaso, você está preocupada com algo?"
26008-260080250 = "N-não é nada disso...!"
26008-260080260 = "É só impressão sua, Sensei!"
26008-260080270 = "De vez em quando, eu gostaria de"
26008-260080280 = "jogar conversa fora com a dona da Hyakkiyako."
26008-260080290 = "...S-se for esse o caso!"
26008-260080300 = "Não é como se... não pudéssemos nos encontrar para conversar! Sim!"
26008-260080310 = "Sensei!"
26008-260080320 = "Bom trabalho!!"
26008-260080330 = "Bom trabalho."
26008-260080340 = "Você parece mais animada que o normal, não é?"
26008-260080350 = "Ufufufufu, claro que sim!"
26008-260080360 = "A Shizuko está sempre cheia de energia!"
26008-260080370 = "Da última vez, você estava meio que, sabe..."
26008-260080380 = "É verdade, talvez tenha sido assim mesmo."
26008-260080390 = "Ah, aliás,"
26008-260080400 = "o motivo de eu ter entrado em contato hoje é que"
26008-260080410 = "tem algo que quero te mostrar agora"
26008-260080420 = "e algo sobre o que quero conversar."
26008-260080430 = "Fique no aguardo!"
