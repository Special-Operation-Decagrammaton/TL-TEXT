[translation]
26008-260080010 = "先生、お疲れ様です！"
26008-260080020 = "ふふっ、うふふふふ……"
26008-260080030 = "くっくっくっく？"
26008-260080040 = "ふふふふ……？"
26008-260080050 = "なんですか、その安っぽい悪党みたいな笑い方！"
26008-260080060 = "私そんな風に笑ってませんよね！？"
26008-260080070 = "それで、急にどうしたのシズコっち？"
26008-260080080 = "っち……？"
26008-260080090 = "まあ、良いでしょう！なにせ今日は、百夜堂が始まって以来最高の日ですからね！"
26008-260080100 = "広い心で受け止めてあげます！"
26008-260080110 = "感謝しても良いんですよ、ふっふっふっ！"
26008-260080120 = "なんだか機嫌良さそうだね"
26008-260080130 = "はい、最早「良い」どころの騒ぎではありません！"
26008-260080140 = "百夜堂は、今回の「海の家」を起点にして……"
26008-260080150 = "キヴォトスいちのフランチャイズ経営店へと生まれ変わるんですから！"
26008-260080160 = "ですから先生には"
26008-260080170 = "その一部始終を、私と一緒に見守る義務があります！"
26008-260080180 = "いつも通りの無茶ぶりだぁ"
26008-260080190 = "あの、先生"
26008-260080200 = "どうしたの？"
26008-260080210 = "いえ"
26008-260080220 = "やっぱり、何でもありません"
26008-260080230 = "とにかく今日も、お互い頑張っていきましょう！"
26008-260080240 = "もしかして、悩んでたりする？"
26008-260080250 = "べ、別にそういうわけでは……！"
26008-260080260 = "先生の気のせいです！"
26008-260080270 = "たまには百夜堂のオーナーと"
26008-260080280 = "雑談とかしたいな"
26008-260080290 = "……そ、そういう事でしたら！"
26008-260080300 = "会って話せない……ことも無いです！はい！ "
26008-260080310 = "先生！"
26008-260080320 = "お疲れ様です！！"
26008-260080330 = "お疲れ様"
26008-260080340 = "何だかこう、いつも以上に元気だね？"
26008-260080350 = "うふふふふふ、それはそうです！"
26008-260080360 = "シズコはいつだって元気いっぱいですから！"
26008-260080370 = "この前はどことなく、その……"
26008-260080380 = "確かに、そうだったかもね"
26008-260080390 = "あ、ちなみに "
26008-260080400 = "今日こうしてご連絡した理由はですね"
26008-260080410 = "今からお見せしたいものがあるのと"
26008-260080420 = "お話したいことがあるからです"
26008-260080430 = "乞うご期待！"
