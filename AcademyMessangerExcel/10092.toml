[translation]
10092-100920010 = "Falando nisso, Sensei"
10092-100920020 = "Eu fiquei encarregada do visual, mas..."
10092-100920030 = "O visual inclui as roupas e tudo mais, né?"
10092-100920040 = "Isso significa que eu também posso escolher as roupas, certo?"
10092-100920050 = "Isso mesmo."
10092-100920060 = "Tem algo te preocupando?"
10092-100920070 = "Hmm..."
10092-100920080 = "É que decidir tudo sozinha é meio pesado, sabe?"
10092-100920090 = "E, pra começo de conversa, a culpa é sua, Sensei."
10092-100920100 = "Então pensei em pedir pra você me acompanhar."
10092-100920110 = "Então, um encontro...!?"
10092-100920120 = "Fico feliz que tenha me convidado."
10092-100920130 = "?"
10092-100920140 = "Hã?"
10092-100920150 = "― ―;;;"
10092-100920160 = "Não brinque comigo."
10092-100920170 = "Vou te mandar o local, até mais tarde."
10092-100920180 = "Como posso dizer..."
10092-100920190 = "Obrigada."
10092-100920200 = "Ajudou muito."
10092-100920210 = "Não era bem essa a minha intenção, mas..."
10092-100920220 = "Não se preocupe, estou fazendo isso porque quero."
10092-100920230 = "É um agradecimento por me deixar ver você escolher as roupas."
10092-100920240 = "E-entendo..."
10092-100920250 = "Receber uma resposta tão séria de repente me deixa sem jeito..."
10092-100920260 = "Mas tudo bem."
10092-100920270 = "É um fato que você me ajudou."
10092-100920280 = "Obrigada, Sensei. Eu te recompenso outra hora!"
10092-100920290 = "Hmm..."
10092-100920300 = "Comecei a ficar confusa."
10092-100920310 = "...?"
10092-100920320 = "O que foi?"
10092-100920330 = "Ah, não é nada."
10092-100920340 = "É que eu tentei desenhar uma coisinha."
10092-100920350 = "Desenhar, você diz..."
10092-100920360 = "O design do logo?"
10092-100920370 = "Uhum, isso."
10092-100920380 = "Pode dar uma olhada?"
10092-100920390 = "Qual é o seu problema?"
10092-100920400 = "Por que você faz uma coisa dessas?"
10092-100920410 = "Eu quero que você pare."
10092-100920420 = "De agora em diante, é sério, pare com isso."
10092-100920430 = "Desculpe."
10092-100920440 = "Vou tomar mais cuidado da próxima vez."
10092-100920450 = "Aah..."
10092-100920460 = "Francamente."
10092-100920470 = "Isso é tão irritante."
10092-100920480 = "...Desta vez passa."
10092-100920490 = "Mas não vai ter próxima, ouviu?"
10092-100920500 = "Sensei, um momento."
10092-100920510 = "Queria te pedir um conselho."
10092-100920520 = "Você tem um tempo?"
10092-100920530 = "Um conselho?"
10092-100920540 = "Parece que é algo sério, né?"
10092-100920550 = "Ah..."
10092-100920560 = "É, mais ou menos isso."
10092-100920570 = "Por isso, preciso que você venha."
10092-100920580 = "Eu te mando o local depois."
10092-100920590 = "Venha sem falta, tá?"
10092-100920600 = "Ah..."
10092-100920610 = "Estou meio aérea."
10092-100920620 = "No fim, acabei tocando tudo."
10092-100920630 = "Sério, foi incrível."
10092-100920640 = "Foi incrível, toque pra mim de novo um dia."
10092-100920650 = "...O que foi?"
10092-100920660 = "Você até que sabe ser sincero, né?"
10092-100920670 = "Sensei."
10092-100920680 = "Obrigada."
10092-100920690 = "Por ter me ouvido com atenção."
10092-100920700 = "Gostei especialmente da primeira música."
10092-100920710 = "Como eu procuro por ela?"
10092-100920720 = "Hã? Para com isso!"
10092-100920730 = "― ―；"
10092-100920740 = "Que irritante."
10092-100920750 = "É por isso que o Sensei é..."
