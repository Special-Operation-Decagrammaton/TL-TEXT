[translation]
10037-100370010 = "何かがおかしい"
10037-100370020 = "？？？"
10037-100370030 = "最近、給食部で保管されていたおやつが立て続けに消えている"
10037-100370040 = "特にプリンの個数が、帳簿に記録された数字と全く合わないんだ"
10037-100370050 = "数え間違いとかではなく……？"
10037-100370060 = "誰かがこっそり食べたとか？"
10037-100370070 = "いや、そんなはずは無い！"
10037-100370080 = "なにせ他の保安委員たちと一緒に、何度も数え直したのだから！"
10037-100370090 = "いや、そんなはずは無い！"
10037-100370100 = "給食部の施設は、我々保安委員が徹底的に監視しているのだから！"
10037-100370110 = "数え間違いでもない、誰かが食べたのでもない、だとするとこれは……"
10037-100370120 = "レッドウィンター連邦学園を攻撃しようとする、スパイによる工作行為に違いない！"
10037-100370130 = "……スパイ？"
10037-100370140 = "ああ。レッドウィンター連邦学園は敷地が広大な上に、生徒の記録簿などもあまり電子化されていない。事務局で把握できていない生徒も結構いるくらいだ"
10037-100370150 = "その中に、どこか外部の学園から送られた「スパイ」が紛れ込んでるとしてもおかしくはない"
10037-100370160 = "きっとこういった些細な事件で様子を見つつ、遠くないうちにレッドウィンター連邦学園に内紛を巻き起こそうとしていたのだろう……"
10037-100370170 = "こうなってはやむを得まい……これより、スパイ捜索作戦を開始する！"
10037-100370180 = "先生、例のスパイについての続報だ"
10037-100370190 = "どこぞの卑劣なスパイが、今度はチェリノ会長のプリンを盗んだようでな"
10037-100370200 = "それ、確実にスパイの仕業なの？"
10037-100370210 = "ああ、そうだ。何せレッドウィンター連邦学園の保安は、いつだって完璧だからな！"
10037-100370220 = "スパイでも忍び込んでいない限り、何か問題が起こるはずがない！"
10037-100370230 = "だから間違いなくスパイの仕業だろう。"
10037-100370240 = "しかし、問題が生じていてな……どういうわけかチェリノ会長は、私がプリンを盗んだと思っておられるようなんだ"
10037-100370250 = "もちろん、心当たりがないわけではないが……"
10037-100370260 = "逆に良い機会だ。今度こそスパイを捕まえて、私の有能さと無罪を証明してやろう！"
10037-100370270 = "……聞いてくれ、先生"
10037-100370280 = "この間チェリノ会長の石像を壊した件で、懲罰を受けているのだが……"
10037-100370290 = "もしかして今は、旧校舎に？"
10037-100370300 = "時々会いに行くね。欲しいものがあったら言って"
10037-100370310 = "違う、旧校舎送りではない！！"
10037-100370320 = "チェリノ会長の慈悲のおかげで、旧校舎行きは免れたものの……"
10037-100370330 = "以前のように、「トイレ掃除1週間」の刑を受けてしまったんだ"
10037-100370340 = "しかし、これもある意味ではチェリノ会長の命令"
10037-100370350 = "このマリナ、全力で会長の命令を遂行してみせる！"
10037-100370360 = "そっか、お疲れ様。頑張ってね"
10037-100370370 = "何を言ってるんだ？"
10037-100370380 = "先生も私と一緒に掃除をするんだぞ"
10037-100370390 = "……え？"
10037-100370400 = "会長の石像が割れた時、先生も一緒にいただろう"
10037-100370410 = "髭の権威を守ることは全員の義務。よって先生も不敬罪、責任を共に負わねばならないのは当然のこと"
10037-100370420 = "さあ先生。明日の午前7時、事務局の前に集合だ！"
10037-100370430 = "朝はっや……"
10037-100370440 = "……先生"
10037-100370450 = "悪いが、ちょっと今から時間をくれないか？"
10037-100370460 = "他の事務局委員たちには話せない、困ったことが起きてな……"
10037-100370470 = "了解、すぐ行くね"
10037-100370480 = "何かあったの？"
10037-100370490 = "ああ、事務局からも離れた場所で申し訳ないのだが……"
10037-100370500 = "保安委員たちに、捕まえられてしまって……"
10037-100370510 = "一体何が……急いで行くね"
