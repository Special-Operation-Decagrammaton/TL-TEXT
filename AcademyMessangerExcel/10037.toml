[translation]
10037-100370010 = "Algo está errado"
10037-100370020 = "???"
10037-100370030 = "Recentemente, os lanches guardados pelo Clube de Merenda Escolar têm desaparecido um após o outro."
10037-100370040 = "Especialmente o número de pudins, não bate de jeito nenhum com os números registrados no livro-caixa."
10037-100370050 = "Não foi um erro de contagem ou algo assim...?"
10037-100370060 = "Será que alguém comeu escondido?"
10037-100370070 = "Não, de jeito nenhum!"
10037-100370080 = "Afinal, eu recontei várias vezes junto com as outras membros do Comitê de Segurança!"
10037-100370090 = "Não, de jeito nenhum!"
10037-100370100 = "As instalações do Clube de Merenda Escolar são rigorosamente vigiadas por nós do Comitê de Segurança!"
10037-100370110 = "Se não foi um erro de contagem, e ninguém comeu, então isso é..."
10037-100370120 = "Deve ser um ato de sabotagem de uma espiã tentando atacar a Academia da União Red Winter!"
10037-100370130 = "...Uma espiã?"
10037-100370140 = "Sim. A Academia da União Red Winter tem um campus enorme e os registros das alunas não são muito digitalizados. Há muitas alunas que nem mesmo o Escritório Administrativo conhece."
10037-100370150 = "Não seria estranho se uma 'espiã' enviada de alguma academia externa estivesse infiltrada entre elas."
10037-100370160 = "Provavelmente, ela estava testando as águas com esses incidentes triviais, planejando causar um conflito interno na Academia da União Red Winter em um futuro próximo..."
10037-100370170 = "Sendo assim, não há outra escolha... A partir de agora, iniciaremos a operação de busca pela espiã!"
10037-100370180 = "Sensei, tenho mais notícias sobre aquela espiã."
10037-100370190 = "Parece que alguma espiã desprezível roubou o pudim da Presidente Cherino desta vez."
10037-100370200 = "Tem certeza que foi obra de uma espiã?"
10037-100370210 = "Sim, tenho. Afinal, a segurança da Academia da União Red Winter é sempre perfeita!"
10037-100370220 = "A menos que uma espiã tenha se infiltrado, é impossível que algum problema ocorra!"
10037-100370230 = "Portanto, sem dúvida, é obra de uma espiã."
10037-100370240 = "No entanto, surgiu um problema... Por algum motivo, a Presidente Cherino parece pensar que fui eu quem roubou o pudim."
10037-100370250 = "Claro, não é como se eu não tivesse nenhuma ideia do porquê..."
10037-100370260 = "Pelo contrário, esta é uma boa oportunidade. Desta vez, vou capturar a espiã e provar minha competência e inocência!"
10037-100370270 = "...Escute, Sensei."
10037-100370280 = "Estou recebendo uma punição por ter quebrado a estátua da Presidente Cherino outro dia..."
10037-100370290 = "Será que você está no prédio antigo da escola agora?"
10037-100370300 = "Vou te visitar de vez em quando. Me diga se precisar de algo."
10037-100370310 = "Não, não fui enviada para o prédio antigo!!"
10037-100370320 = "Graças à misericórdia da Presidente Cherino, escapei de ir para o prédio antigo, mas..."
10037-100370330 = "Recebi a mesma sentença de antes: 'uma semana de limpeza de banheiros'."
10037-100370340 = "No entanto, de certa forma, isso também é uma ordem da Presidente Cherino."
10037-100370350 = "Esta Marina executará a ordem da Presidente com todas as minhas forças!"
10037-100370360 = "Entendi, bom trabalho. Força aí."
10037-100370370 = "Do que você está falando?"
10037-100370380 = "Você também vai limpar comigo, Sensei."
10037-100370390 = "...Eh?"
10037-100370400 = "Você também estava lá quando a estátua da Presidente quebrou, não estava, Sensei?"
10037-100370410 = "Proteger a autoridade do bigode é dever de todos. Portanto, você também é culpada de desrespeito, e é natural que tenhamos que compartilhar a responsabilidade."
10037-100370420 = "Vamos, Sensei. Amanhã, às 7 da manhã, encontro em frente ao Escritório Administrativo!"
10037-100370430 = "Tão cedo..."
10037-100370440 = "...Sensei."
10037-100370450 = "Desculpe, mas você teria um momento para mim agora?"
10037-100370460 = "Aconteceu uma coisa complicada que não posso contar para as outras membros do Escritório Administrativo..."
10037-100370470 = "Entendido, estou indo."
10037-100370480 = "Aconteceu alguma coisa?"
10037-100370490 = "Sim, e peço desculpas por ser em um lugar longe do Escritório Administrativo, mas..."
10037-100370500 = "Fui capturada pelas membros do Comitê de Segurança..."
10037-100370510 = "O que está acontecendo...? Vou correndo."
