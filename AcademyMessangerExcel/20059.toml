[translation]
20059-200590010 = "Куфуфу!"
20059-200590020 = "Ахахахаха!"
20059-200590030 = "Похоже, тебе и сегодня весело, Муцуки!"
20059-200590040 = "Эй, Сенсей?"
20059-200590050 = "Что думаешь о том, как я смеюсь?"
20059-200590060 = "Это мило?"
20059-200590070 = "Или смешно?"
20059-200590080 = "Это мило!"
20059-200590090 = "Это смешно!"
20059-200590100 = "О? Вот как?"
20059-200590110 = "Тогда как тебе, если я попробую смеяться по-другому?"
20059-200590120 = "Например: \"Охохо!\""
20059-200590130 = "Или как-нибудь так: \"АХАХАХАХА!\""
20059-200590140 = "С чего вдруг такие перемены?"
20059-200590150 = "Да ничего особенного, просто..."
20059-200590160 = "Кое-что захотелось проверить."
20059-200590170 = "Почему бы нам не встретиться и не поболтать об этом?"
20059-200590180 = "Сенсей! Сегодня было весело!"
20059-200590190 = "Это ведь сойдёт за хорошую тренировку?"
20059-200590200 = "Тренировку?"
20059-200590210 = "Ах."
20059-200590220 = "Куфуфу! Ну конечно!"
20059-200590230 = "Я когда-нибудь пущу это в дело!"
20059-200590240 = "Когда-нибудь? Разве это было не для работы...?"
20059-200590250 = "Ахахаха!"
20059-200590260 = "Ты реально в это поверил?"
20059-200590270 = "Я просто хотела потусоваться с тобой, Сенсей!"
20059-200590280 = "Ты и правда такой простодушный, да, Сенсей?"
20059-200590290 = "Я... я с самого начала это знал!"
20059-200590300 = "Ну надо же, куфуфу."
20059-200590310 = "В любом случае, нам обоим было весело, так?"
20059-200590320 = "Так что всё в порядке."
20059-200590330 = "До встречи, Сенсей!"
20059-200590340 = "Сенсей, чем сегодня занимаешься?"
20059-200590350 = "Если свободен, давай вечером сходим на шопинг!"
20059-200590360 = "Думаю, тебе понравится то, что я задумала!"
20059-200590370 = "Что значит \"понравится\"?"
20059-200590380 = "Куфуфу, а вот это секрет."
20059-200590390 = "Короче, ты ведь в деле, да?"
20059-200590400 = "Тогда до встречи!"
20059-200590410 = "Сенсей, я планирую на какое-то время залечь на дно."
20059-200590420 = "Так что не удивляйся, если меня не будет в Решатели проблем 68."
20059-200590430 = "Что случилось?"
20059-200590440 = "Ты ведь помнишь ту историю с перекупщиками?"
20059-200590450 = "Ну, на самом деле после этого случилась ещё одна небольшая потасовка."
20059-200590460 = "Но ничего серьёзного."
20059-200590470 = "Со мной всё будет в порядке, если я просто исчезну ненадолго."
20059-200590480 = "Остальным я уже всё сказала."
20059-200590490 = "И куда же ты собираешься, если не секрет?"
20059-200590500 = "Хм-м, я ещё не решила."
20059-200590510 = "Но раз уж подвернулся случай..."
20059-200590520 = "Может, устроить себе отпуск в каком-нибудь отеле?"
20059-200590530 = "Отличные новости, Сенсей!"
20059-200590540 = "В магазинах снова начали появляться бомбы!"
20059-200590550 = "Разве не здорово, что всё наконец-то возвращается на круги своя?"
20059-200590560 = "Я рад, что с перекупщиками покончено."
20059-200590570 = "Мы обязаны уничтожить этих спекулянтов раз и навсегда!"
20059-200590580 = "О, точно, ты уже придумал, как потратить те деньги?"
20059-200590590 = "Всё-таки пустишь их на наше совместное будущее?"
20059-200590600 = "Я... я отдам их на благотворительность!"
20059-200590610 = "Ахаха!"
20059-200590620 = "Ну, это тоже неплохая идея, а?"
20059-200590630 = "Делать добрые дела как-то совсем не в моём стиле,"
20059-200590640 = "но это было по-своему весело."
20059-200590650 = "Надеюсь, у нас будет побольше таких весёлых моментов."
20059-200590660 = "Правда ведь, Сенсей?"
20059-200590670 = "Да, ты права."
20059-200590680 = "Куфуфу."
20059-200590690 = "Ладно, я буду на связи!"
20059-200590700 = "Сенсей, ты сегодня занят?"
20059-200590710 = "Если нет планов, не хочешь прогуляться?"
20059-200590720 = "Есть одно место, куда я хочу сходить."
20059-200590730 = "Ну, тогда мы просто обязаны пойти!"
20059-200590740 = "Куфуфу, я знала, что ты так скажешь."
20059-200590750 = "Тогда давай поторапливайся и собирайся."
20059-200590760 = "Мы идём в..."
20059-200590770 = "Оперный театр!"