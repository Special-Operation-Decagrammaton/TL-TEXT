[translation]
20059-200590010 = "くふふっ！"
20059-200590020 = "あははははっ！"
20059-200590030 = "今日も楽しそうだね、ムツキ！"
20059-200590040 = "ねー先生？"
20059-200590050 = "先生は私の笑い方、どう思う？"
20059-200590060 = "かわいい？"
20059-200590070 = "面白い？"
20059-200590080 = "かわいい！"
20059-200590090 = "面白い！"
20059-200590100 = "へえ～そうなんだ？"
20059-200590110 = "じゃあ、私が違う笑い方をしたらどう？"
20059-200590120 = "オーッホッホ！とか"
20059-200590130 = "アーッハッハッハ！みたいな"
20059-200590140 = "急にどうしたの？"
20059-200590150 = "大したことじゃないんだけど……"
20059-200590160 = "試してみたいことがあって"
20059-200590170 = "ちょーっと会って話さない？"
20059-200590180 = "先生！今日は楽しかった！"
20059-200590190 = "ちゃんと練習になったかな？"
20059-200590200 = "練習？"
20059-200590210 = "あ"
20059-200590220 = "くふふっ！もちろん！"
20059-200590230 = "いつか有効活用させてもらうね！"
20059-200590240 = "いつか？仕事で必要だったんじゃ……？"
20059-200590250 = "あはははっ！"
20059-200590260 = "信じてたのそれ？"
20059-200590270 = "先生と遊びたかっただけだよ！"
20059-200590280 = "やっぱ先生って単純だね？"
20059-200590290 = "べ、別に知ってたし！？"
20059-200590300 = "そっかぁ、くふふ"
20059-200590310 = "まあ、お互い楽しかったしね？"
20059-200590320 = "それでオッケーってことで"
20059-200590330 = "じゃ、またね先生！"
20059-200590340 = "先生ー今日何してるー？"
20059-200590350 = "暇なら夕方ショッピングでも行こうよ！"
20059-200590360 = "今回のは先生も気に入ると思うから！"
20059-200590370 = "気に入るって？"
20059-200590380 = "くふふっ、それは秘密"
20059-200590390 = "とにかくいいよね？"
20059-200590400 = "それじゃ後で！"
20059-200590410 = "先生、私しばらく身を隠すつもりなんだ"
20059-200590420 = "だから、便利屋に私がいなくてもビックリしないでね"
20059-200590430 = "何があったの？"
20059-200590440 = "この前の転売屋騒動があったでしょ？"
20059-200590450 = "あの後、実はもうひと悶着あったんだよね"
20059-200590460 = "まあ、大したことじゃないから"
20059-200590470 = "私がちょっと姿をくらませば大丈夫"
20059-200590480 = "みんなにも言ってあるから"
20059-200590490 = "ちなみにどこに？"
20059-200590500 = "んーまだ決めてないけど"
20059-200590510 = "せっかくだし"
20059-200590520 = "ホテルでバカンスでも楽しもうかな？"
20059-200590530 = "先生、グッドニュース！"
20059-200590540 = "お店に爆弾が並び始めたよ！"
20059-200590550 = "これでやっと日常に戻ったって感じ？"
20059-200590560 = "転売屋が居なくなってよかった"
20059-200590570 = "転売屋は撲滅しないとね！"
20059-200590580 = "あっそうだ、お金の使い道考えた？"
20059-200590590 = "やっぱり、私との未来に使う？"
20059-200590600 = "き、寄付します！"
20059-200590610 = "あははっ！"
20059-200590620 = "うん、それもいいんじゃない？"
20059-200590630 = "柄にもなくいいことしちゃった気がするけど"
20059-200590640 = "これはこれで楽しかったよ"
20059-200590650 = "また楽しいことあるといいな"
20059-200590660 = "ね？先生"
20059-200590670 = "うん、そうだね"
20059-200590680 = "くふふ"
20059-200590690 = "それじゃ、また連絡する！"
20059-200590700 = "先生、今日って忙しい？"
20059-200590710 = "特に用事がないなら遊びに行かない？"
20059-200590720 = "私、行きたい場所があるんだよね"
20059-200590730 = "それは行かないとね！"
20059-200590740 = "くふふ、そう言うと思った"
20059-200590750 = "じゃあ早く準備してね"
20059-200590760 = "今から……"
20059-200590770 = "オペラハウスに行くよ！"
