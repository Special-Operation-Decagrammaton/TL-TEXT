[translation]
16020-160200010 = "Hello. Is this the number for Sensei at Schale?"
16020-160200020 = "Yes, it is, but..."
16020-160200030 = "I've been wanting to meet with you for a while now."
16020-160200040 = "Could you come to 4th Street on Lost Highway tonight?"
16020-160200050 = "If after 8 PM is okay..."
16020-160200060 = "I can make time."
16020-160200070 = "Wait, wait, wait!"
16020-160200080 = "Why are you just falling for it so easily?!"
16020-160200090 = "You should be suspicious of messages from people you don't know."
16020-160200100 = "What if it's a bad person trying to get information on Schale?"
16020-160200110 = "...Hmm?"
16020-160200120 = "Did you think it was a cute girl?"
16020-160200130 = "Too bad! It was Otogi~"
16020-160200140 = "No, I knew from the start."
16020-160200150 = "Otogi's name is displayed right there."
16020-160200160 = "Ah."
16020-160200170 = "So this isn't a burner phone for operations, then."
16020-160200180 = "Aw man, I messed up."
16020-160200190 = "I'm always happy to hear from my students."
16020-160200200 = "Is it really okay for Sensei to answer calls from strangers?"
16020-160200210 = "I'd think you'd normally ignore them."
16020-160200220 = "Most unknown numbers are spam, but..."
16020-160200230 = "What if it's an emergency?"
16020-160200240 = "Well, I guess that's true."
16020-160200250 = "But just in case,"
16020-160200260 = "you should really be a bit more cautious."
16020-160200270 = "There are tons of students out there targeting weak adults who can't even take a bullet."
16020-160200280 = "...I'll keep that in mind."
16020-160200290 = "Sensei, Bravo Charlie has arrived."
16020-160200300 = "You should probably hide anything you don't want seen."
16020-160200310 = "Bravo Charlie...?"
16020-160200320 = "...What does that mean?"
16020-160200330 = "Ah."
16020-160200340 = "Sorry, sorry."
16020-160200350 = "I accidentally used a code word."
16020-160200360 = "Bravo means B, Charlie means C,"
16020-160200370 = "but among us, we use that code for a 'Bean Counter'."
16020-160200380 = "A person who counts beans?"
16020-160200390 = "It means a financial officer who's that strict."
16020-160200400 = "Uh..."
16020-160200410 = "So that means..."
16020-160200420 = "The Administrative Committee's finance director is here."
16020-160200430 = "Tell me that first!"
16020-160200440 = "Sorry for the late hour."
16020-160200450 = "Oh, Sensei?"
16020-160200460 = "Are you asleep, by any chance?"
16020-160200470 = "Hmm."
16020-160200480 = "Yeah, I thought so. Sorry, sorry."
16020-160200490 = "It's nothing important, so don't worry about it. Goodnight!"
16020-160200500 = "Sorry. I couldn't check my phone."
16020-160200510 = "What's wrong?"
16020-160200520 = "Did something happen? Are you okay?"
16020-160200530 = "Otogi...?"
16020-160200540 = "I'm coming right now!"
16020-160200550 = "Sensei, are you free this weekend?"
16020-160200560 = "Yeah, of course."
16020-160200570 = "Did something happen?"
16020-160200580 = "I don't have the camouflage gear I need for my next operation."
16020-160200590 = "I was thinking of going to Corgi Town to buy some new ones."
16020-160200600 = "If you're free, want to come with me?"
16020-160200610 = "Yeah, sure."
16020-160200620 = "You can buy camouflage gear at a shopping mall?"
16020-160200630 = "Well, of course!"
16020-160200640 = "If you've got the money, you can get anything from tonight's dinner to hacking tools!"
16020-160200650 = "...Wasn't that the slogan for a different store?"
16020-160200660 = "When you see a concrete pipe in a vacant lot or the shadows under a bridge,"
16020-160200670 = "don't you ever think about wanting to make it your own secret base?"
16020-160200680 = "I used to think about things like that when I was younger."
16020-160200690 = "Even now, I sometimes want to hide under my blankets and have a space all to myself."
16020-160200700 = "...Isn't that a little concerning?"
16020-160200710 = "Well, whatever."
16020-160200720 = "I guess everyone thinks about the same kind of stuff."
16020-160200730 = "When I was little, I used to hunt for secret bases to hide my games and manga,"
16020-160200740 = "but I never thought I'd still be doing it as a high schooler."
16020-160200750 = "Are you still making them lately?"
16020-160200760 = "Is your own room too small?"
16020-160200770 = "Ah, it's not like that..."
16020-160200780 = "For operations, we often have to stay hidden for over 24 hours or work through the night."
16020-160200790 = "In those times, these 'secret bases'"
16020-160200800 = "are useful for storing ammo and personal items."
16020-160200810 = "That's actually pretty cool, it's full of childhood romance."
16020-160200820 = "Do you have any special spots you've got your eye on lately?"
16020-160200830 = "Hmm, maybe under Sensei's desk?"
16020-160200840 = "Huh?"
16020-160200850 = "What's with that reaction?"
16020-160200860 = "Hey now,"
16020-160200870 = "are you thinking something weird? The desk itself is what's important!"
16020-160200880 = "You've crawled under a desk to make it your own base before, right?"
16020-160200890 = "Oh, that's what you meant."
16020-160200900 = "In that case, you can use it sometimes."
16020-160200910 = "Hmm, I appreciate the offer, Sensei, but"
16020-160200920 = "there are so many students eyeing that spot that I already gave up on it."
16020-160200930 = "Wait a second."
16020-160200940 = "What is that supposed to mean!?"