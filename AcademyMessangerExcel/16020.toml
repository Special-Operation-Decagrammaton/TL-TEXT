[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
16020-160200010 = "Opa, boa tarde.\nAqui é do número do Sensei da Schale?" 
16020-160200020 = "É sim, mas..." 
16020-160200030 = "Faz tempo que eu queria\nte encontrar a sós." 
16020-160200040 = "Rola de você colar na Rua 4\nda Lost Highway hoje à noite?" 
16020-160200050 = "Se puder ser depois das 20h..." 
16020-160200060 = "Consigo arrumar um tempinho." 
16020-160200070 = "Peraí, peraí!" 
16020-160200080 = "Por que você tá aceitando\ntão fácil assim?!" 
16020-160200090 = "Você tem que desconfiar quando recebe\nmensagem de número desconhecido, né." 
16020-160200100 = "Vai que é algum bandido querendo\nroubar os dados da Schale?" 
16020-160200110 = "……Ué?" 
16020-160200120 = "Não me diga que você achou que era uma\ngarota fofa te chamando pra sair?" 
16020-160200130 = "Achou errado! Era só a Otogi aqui~" 
16020-160200140 = "Na real, eu já sabia\ndesde o começo." 
16020-160200150 = "O seu nome tá aparecendo\nna tela pra mim." 
16020-160200160 = "Ah." 
16020-160200170 = "Verdade, não tô usando\nmeu celular de operações." 
16020-160200180 = "Aaaah, vacilei." 
16020-160200190 = "Mas se for mensagem de uma aluna,\neu tô sempre à disposição." 
16020-160200200 = "Sensei, você responde até número\nque não conhece de boa assim?" 
16020-160200210 = "O normal seria só ignorar, não acha?" 
16020-160200220 = "A maioria das vezes é\nsó spam mesmo, mas..." 
16020-160200230 = "Vai que é uma emergência, né?" 
16020-160200240 = "Bom, tem um ponto." 
16020-160200250 = "Mas, só pra garantir..." 
16020-160200260 = "É bom você ter um pouquinho\nmais de noção de perigo." 
16020-160200270 = "Tá cheio de aluna por aí de olho num adulto\nfrágil que não aguenta nem tomar um tiro." 
16020-160200280 = "……Tá anotado, vou guardar pra vida." 
16020-160200290 = "Sensei, a Bravo Charlie\nchegou por aí." 
16020-160200300 = "Se tiver algo aí que dê B.O. se ela ver,\né melhor esconder." 
16020-160200310 = "Bravo Charlie……?" 
16020-160200320 = "……Como assim?" 
16020-160200330 = "Ah." 
16020-160200340 = "Foi mal, foi mal." 
16020-160200350 = "Acabei usando o código tático\nsem querer." 
16020-160200360 = "\"Bravo\" é a letra B,\ne \"Charlie\" é a C." 
16020-160200370 = "Lá no esquadrão, a gente usa isso como código\npra \"Bean Counter\" (Contadora de Feijões)." 
16020-160200380 = "Contadora de feijões?" 
16020-160200390 = "É uma gíria militar pra alguém de finanças\nque é controladora e rígida demais." 
16020-160200400 = "Ou seja..." 
16020-160200410 = "Em outras palavras..." 
16020-160200420 = "A Diretora de Finanças do\nComitê de Administração chegou aí." 
16020-160200430 = "Me avisa isso logo de cara!!" 
16020-160200440 = "Desculpa mandar mensagem tão tarde." 
16020-160200450 = "Ué, Sensei..." 
16020-160200460 = "Já tá dormindo?" 
16020-160200470 = "Hmmm." 
16020-160200480 = "Acho que sim, né.\nFoi mal incomodar." 
16020-160200490 = "Não era nada demais, então relaxa.\nBoa noite!" 
16020-160200500 = "Foi mal. Não vi a mensagem\nna hora." 
16020-160200510 = "O que foi?" 
16020-160200520 = "Aconteceu alguma coisa?\nTudo bem por aí?" 
16020-160200530 = "Otogi……?" 
16020-160200540 = "Tô indo pra aí agora!" 
16020-160200550 = "Sensei, você tá livre\nesse fim de semana?" 
16020-160200560 = "Tô sim, claro." 
16020-160200570 = "Precisa de alguma coisa?" 
16020-160200580 = "É que eu tô sem um uniforme camuflado\npra próxima missão." 
16020-160200590 = "Tava pensando em dar um pulo lá\nna Corgi Town pra comprar um novo." 
16020-160200600 = "Topa ir comigo?" 
16020-160200610 = "Beleza, topo sim." 
16020-160200620 = "Mas vende uniforme camuflado\nno shopping?" 
16020-160200630 = "Óbvio que sim." 
16020-160200640 = "Se tiver grana, dá pra comprar desde a mistura\npra janta até ferramenta de hacker!" 
16020-160200650 = "……Isso não era o slogan\nde outra loja?" 
16020-160200660 = "Sabe quando você vê um cano gigante num terreno\nbaldio ou um cantinho escuro debaixo da ponte..." 
16020-160200670 = "Você não tem vontade de transformar\naquilo na sua base secreta?" 
16020-160200680 = "Nossa, quando eu era criança\neu pensava muito nisso." 
16020-160200690 = "Hoje em dia a minha \"base secreta\" é me\nesconder debaixo das cobertas na cama mesmo." 
16020-160200700 = "……Isso não é meio deprimente?" 
16020-160200710 = "Mas enfim." 
16020-160200720 = "Pelo visto todo mundo pensa\nigual nessas coisas, né." 
16020-160200730 = "Quando eu era pequena eu vivia caçando um lugar pra\nfazer de base secreta e esconder meus gibis e joguinhos..." 
16020-160200740 = "Quem diria que eu ia continuar fazendo\nisso mesmo no ensino médio." 
16020-160200750 = "Você ainda faz bases secretas?" 
16020-160200760 = "O seu quarto tá muito pequeno\npra guardar as coisas?" 
16020-160200770 = "Ah, não é nesse sentido..." 
16020-160200780 = "É que nas nossas operações a gente vira a noite em\nmissão, às vezes ficamos de tocaia por mais de 24h." 
16020-160200790 = "E é nessas horas que ter\numa \"base secreta\" dessas..." 
16020-160200800 = "Salva muito pra esconder munição\ne nossas coisas pessoais." 
16020-160200810 = "Isso tem toda a magia da nossa infância,\nacho muito maneiro." 
16020-160200820 = "E você já botou o olho em algum lugar especial\nultimamente pra montar a próxima?" 
16020-160200830 = "Hmmm, talvez debaixo\nda mesa do Sensei?" 
16020-160200840 = "Eita." 
16020-160200850 = "Que reação foi essa?!" 
16020-160200860 = "Sério mesmo," 
16020-160200870 = "Tu já pensou besteira, né?\nO lance é que ser uma \"mesa\" é muito\nimportante pra vibe da base!" 
16020-160200880 = "Cê já deve ter entrado embaixo de uma mesa pra\nfingir que era sua base quando era criança, não é?" 
16020-160200890 = "Aaaah, foi isso que\nvocê quis dizer." 
16020-160200900 = "Sendo assim, eu libero\nvocê usar de vez em quando." 
16020-160200910 = "Hmmm, valeu pela oferta, Sensei, mas..." 
16020-160200920 = "Tem tanta aluna de olho nesse espaço embaixo\nda sua mesa que eu já até desisti." 
16020-160200930 = "Pera aí." 
16020-160200940 = "Como assim \"tanta aluna\" tá de olho lá?!" 