[translation]
16020-160200010 = "Алло. Это номер Сенсея из Шале?"
16020-160200020 = "Да, всё верно..."
16020-160200030 = "Я уже давно хотела встретиться с вами... только наедине, вдвоём."
16020-160200040 = "Не могли бы вы приехать сегодня вечером на 4-ую улицу Затерянного шоссе?"
16020-160200050 = "Если после восьми вечера нормально..."
16020-160200060 = "то я смогу выкроить время."
16020-160200070 = "Эй, погоди-ка минуту!"
16020-160200080 = "Почему ты так легко соглашаешься?!"
16020-160200090 = "Тебе стоит повнимательнее относиться к сообщениям от незнакомцев."
16020-160200100 = "Я же могу оказаться плохим человеком, которому просто нужны данные Шале, понимаешь?"
16020-160200110 = "...А?"
16020-160200120 = "Небось подумал, что это пишет какая-нибудь милая девочка?"
16020-160200130 = "А вот и не угадал! Это я, Отоги~"
16020-160200140 = "Да нет, я с самого начала знал."
16020-160200150 = "У меня на экране высвечивается твоё имя, Отоги."
16020-160200160 = "Ах."
16020-160200170 = "Это же не мой рабочий одноразовый телефон..."
16020-160200180 = "Вот блин, облажалась."
16020-160200190 = "Сообщениям от моих студентов я рад всегда."
16020-160200200 = "Сенсей, ты правда нормально относишься к сообщениям с незнакомых номеров?"
16020-160200210 = "Обычно люди их просто игнорируют."
16020-160200220 = "Большинство неизвестных номеров — это спам, но..."
16020-160200230 = "вдруг это что-то срочное?"
16020-160200240 = "Ну, пожалуй, тут ты прав."
16020-160200250 = "Но на всякий случай,"
16020-160200260 = "тебе стоит быть капельку бдительнее к окружению."
16020-160200270 = "Вокруг полно студентов, которые могут нацелиться на хрупкого взрослого, не способного выдержать даже одну пулю."
16020-160200280 = "...Я буду иметь это в виду."
16020-160200290 = "Сенсей, Bravo Charlie на подходе."
16020-160200300 = "Лучше припрячь всё, что ей не стоит видеть."
16020-160200310 = "Bravo Charlie...?"
16020-160200320 = "...Что ты имеешь в виду?"
16020-160200330 = "Ах."
16020-160200340 = "Сорри, сорри."
16020-160200350 = "Случайно перешла на фонетический алфавит."
16020-160200360 = "Bravo означает B, а Charlie означает C."
16020-160200370 = "Между собой мы используем это как шифр для \"Bean Counter\"."
16020-160200380 = "Человек, который считает бобы?"
16020-160200390 = "Это означает финансового сотрудника, который жуть какой строгий."
16020-160200400 = "Эм-м."
16020-160200410 = "Другими словами..."
16020-160200420 = "Глава финансового отдела Административного комитета уже здесь."
16020-160200430 = "С этого и надо было начинать!"
16020-160200440 = "Прости за сообщение посреди ночи."
16020-160200450 = "О, Сенсей."
16020-160200460 = "Ты случайно не спишь?"
16020-160200470 = "Да вообще-то сплю..."
16020-160200480 = "Так и думала. Сорри, сорри."
16020-160200490 = "Там ничего важного, так что забей. Спокойной ночи!"
16020-160200500 = "Извини, не мог проверить телефон."
16020-160200510 = "Что случилось?"
16020-160200520 = "Что-то стряслось? Ты в порядке?"
16020-160200530 = "Отоги...?"
16020-160200540 = "Я уже бегу туда!"
16020-160200550 = "Сенсей, у тебя есть время на этих выходных?"
16020-160200560 = "Да, конечно."
16020-160200570 = "Что-то случилось?"
16020-160200580 = "У меня нет подходящего камуфляжа для следующей операции."
16020-160200590 = "Думала съездить в город Корги и купить новый."
16020-160200600 = "Если хочешь, может, съездишь со мной?"
16020-160200610 = "Конечно, давай."
16020-160200620 = "Камуфляж можно купить прямо в торговом центре?"
16020-160200630 = "Ну конечно."
16020-160200640 = "Были бы деньги, а там можно достать всё — от сегодняшнего ужина до хакерского софта!"
16020-160200650 = "...Разве это не слоган совсем другого магазина?"
16020-160200660 = "Когда ты видишь бетонные трубы на заброшенном пустыре или тени под мостом,"
16020-160200670 = "у тебя никогда не возникает желания превратить их в свою секретную базу?"
16020-160200680 = "В прошлом я часто об этом думал."
16020-160200690 = "Да и сейчас мне порой хочется накрыться одеялом с головой и сбежать в свой маленький уголок."
16020-160200700 = "...Это звучит немного тревожно, тебе не кажется?"
16020-160200710 = "Ну, без разницы."
16020-160200720 = "Похоже, все думают примерно об одном и том же."
16020-160200730 = "Когда я была маленькой, я тоже вечно искала тайники, чтобы прятать там игры и мангу, но..."
16020-160200740 = "Подумать только, что я до сих пор занимаюсь этим в старшей школе..."
16020-160200750 = "Ты делала их в последнее время?"
16020-160200760 = "Твоя комната слишком маленькая?"
16020-160200770 = "А, да я не об этом..."
16020-160200780 = "Во время операций нам часто приходится залегать на дно дольше чем на 24 часа или выполнять ночные миссии."
16020-160200790 = "В такие моменты подобные \"секретные базы\""
16020-160200800 = "очень выручают, чтобы припрятать патроны или личные вещи."
16020-160200810 = "В этом есть какая-то детская романтика, довольно круто."
16020-160200820 = "Присмотрела какое-нибудь особенное местечко за последнее время?"
16020-160200830 = "Хм, ну, может, под столом Сенсея?"
16020-160200840 = "Э?"
16020-160200850 = "Что за реакция?"
16020-160200860 = "Ты же понимаешь..."
16020-160200870 = "О чём ты там таком странном думаешь? Тут главное слово — \"стол\"!"
16020-160200880 = "Ты ведь и сам в детстве прятался под столом, делая из него базу, разве нет?"
16020-160200890 = "А-а, так вот ты о чём."
16020-160200900 = "В таком случае можешь иногда им пользоваться."
16020-160200910 = "Хм, я ценю твою доброту, Сенсей, но..."
16020-160200920 = "На это место и так претендует слишком много студентов, так что я решила забить."
16020-160200930 = "Погоди минуту."
16020-160200940 = "Что это значит?!"