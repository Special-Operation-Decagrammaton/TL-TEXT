[translation]
16020-160200010 = "こんにちは。こちら、シャーレの先生の番号でよろしいですか？"
16020-160200020 = "そうですが……"
16020-160200030 = "以前から、二人でお会いしてみたかったんです"
16020-160200040 = "今夜、ロストハイウェイの4番通りに来れませんか？"
16020-160200050 = "8時以降でも良ければ……"
16020-160200060 = "時間作れるよ"
16020-160200070 = "ちょっと、ちょっとー！"
16020-160200080 = "何ホイホイ乗ってるのさ！"
16020-160200090 = "知らない人からの連絡は、疑ってかかりなよ"
16020-160200100 = "シャーレの情報を狙った悪い人かもしれないじゃん？"
16020-160200110 = "……うん？"
16020-160200120 = "もしかして可愛い女の子からだと思った？"
16020-160200130 = "残念！オトギちゃんでした～"
16020-160200140 = "いや、最初から分かってたよ"
16020-160200150 = "オトギの名前、表示されてるし"
16020-160200160 = "あ"
16020-160200170 = "これ、作戦用の電話じゃないんだぁ"
16020-160200180 = "あーあ、ミスっちゃった"
16020-160200190 = "生徒からの連絡なら、いつでも歓迎だよ"
16020-160200200 = "先生は、知らない人から連絡来てもいいの？"
16020-160200210 = "ふつー無視すると思うんだけど"
16020-160200220 = "知らない番号の大半はスパムだけど……"
16020-160200230 = "緊急事態かもしれないし？"
16020-160200240 = "まあ、それもそっか"
16020-160200250 = "でも、万が一のことを考えて"
16020-160200260 = "もうちょっと危機意識を持ったほうがいいよ"
16020-160200270 = "弾丸にも耐えられない軟弱な大人を狙う生徒なんて、ごまんといるんだから"
16020-160200280 = "……肝に銘じておきます"
16020-160200290 = "先生、ブラボーチャーリーが来た"
16020-160200300 = "見られたらマズイ物は、片づけといたほうがいいよ"
16020-160200310 = "ブラボーチャーリー……？"
16020-160200320 = "……どういうこと？"
16020-160200330 = "あ"
16020-160200340 = "ごめんごめん"
16020-160200350 = "うっかり音声コード使っちゃった"
16020-160200360 = "ブラボーはB、チャーリーはCを意味するんだけど"
16020-160200370 = "私たちの間では、Bean Counterをコードで呼んでるんだぁ"
16020-160200380 = "豆を数える人？"
16020-160200390 = "そのくらい厳しい財務担当者って意味"
16020-160200400 = "えーっと"
16020-160200410 = "つまり……"
16020-160200420 = "行政委員会の財務室長が来たよ"
16020-160200430 = "先に言ってよ！"
16020-160200440 = "夜遅くにごめん"
16020-160200450 = "あれー、先生"
16020-160200460 = "もしかして寝てる？"
16020-160200470 = "うーん"
16020-160200480 = "やっぱりそうだよねぇ。ごめんごめん"
16020-160200490 = "大したことないから、気にしないで。おやすみ！"
16020-160200500 = "ごめん。ちょっと確認ができなかった"
16020-160200510 = "どうしたの？"
16020-160200520 = "何かあった？大丈夫？"
16020-160200530 = "オトギ……？"
16020-160200540 = "今すぐ行くね！"
16020-160200550 = "先生、今週末時間ある？"
16020-160200560 = "うん、もちろん"
16020-160200570 = "何かあった？"
16020-160200580 = "次の作戦で使う迷彩服がなくてさ"
16020-160200590 = "新しいのを買いにコーギータウンに行ってみようかなって"
16020-160200600 = "良ければ、一緒にどう？"
16020-160200610 = "うん、いいよ"
16020-160200620 = "ショッピングモールで迷彩服が買えるの？"
16020-160200630 = "そりゃあ、もちろん"
16020-160200640 = "お金さえあれば、今晩のおかずからハッキングツールまで！"
16020-160200650 = "……それは別のお店のキャッチコピーじゃなかった？"
16020-160200660 = "空き地の土管や、橋の下の陰を見ると"
16020-160200670 = "自分だけの秘密基地にしたいって、思ったりしない？"
16020-160200680 = "昔は、そんなことも考えたなあ"
16020-160200690 = "今も布団を被って、自分だけの空間に入っていたいかも"
16020-160200700 = "……それ、ちょっとヤバくない？"
16020-160200710 = "まあいいや"
16020-160200720 = "みんな、同じようなことを考えるもんなんだねぇ"
16020-160200730 = "私も小さい時は、ゲームや漫画を隠す秘密基地を探し回ったけど"
16020-160200740 = "まさか、高校生になってまでやるなんて"
16020-160200750 = "最近も作ってるの？"
16020-160200760 = "個人の部屋じゃ、狭い？"
16020-160200770 = "あ、そういうことじゃなくて……"
16020-160200780 = "作戦だと、24時間以上の潜伏とか夜通しの任務がよくあるからさ"
16020-160200790 = "そういう時は、こういう「秘密基地」が"
16020-160200800 = "弾薬や私物を置くのに役立つんだ"
16020-160200810 = "なんか、小さい時のロマンにあふれてて、かっこいいね"
16020-160200820 = "最近、目をつけてる特別な場所ってあるの？"
16020-160200830 = "うーん、先生の机の下かなぁ？"
16020-160200840 = "えっ"
16020-160200850 = "なに、そのリアクション？"
16020-160200860 = "あのさぁ"
16020-160200870 = "変なこと考えたりする？\n机っていうのが、大事なんだからぁ！"
16020-160200880 = "机の下に入って自分の基地にしたこと、あるでしょ？"
16020-160200890 = "ああ、そういう意味か"
16020-160200900 = "それならたまに使ってもいいよ"
16020-160200910 = "うーん、先生の厚意はありがたいけど"
16020-160200920 = "そこ狙っている生徒、多いから諦めたんだよね"
16020-160200930 = "ちょっと待って"
16020-160200940 = "それ、どういう意味！？"
