[translation]
16020-160200010 = "Hello. Is this the number for the Sensei from Schale?"
16020-160200020 = "Yes, it is..."
16020-160200030 = "I've wanted to meet with you, just the two of us, for a while now."
16020-160200040 = "Could you come to 4th Street on the Lost Highway tonight?"
16020-160200050 = "If after 8 PM is fine..."
16020-160200060 = "I can make some time."
16020-160200070 = "Hey, wait a minute!"
16020-160200080 = "Why are you agreeing so easily?!"
16020-160200090 = "You should be suspicious of messages from people you don't know."
16020-160200100 = "I could be a bad person after Schale's information, you know?"
16020-160200110 = "...Huh?"
16020-160200120 = "Did you think it was from a cute girl?"
16020-160200130 = "Too bad! It was me, Otogi~"
16020-160200140 = "No, I knew from the start."
16020-160200150 = "Your name is displayed on the screen, Otogi."
16020-160200160 = "Ah."
16020-160200170 = "This isn't my burner phone for operations..."
16020-160200180 = "Oh man, I messed up."
16020-160200190 = "Messages from my students are always welcome."
16020-160200200 = "Are you really okay with getting messages from strangers, Sensei?"
16020-160200210 = "Normally, people just ignore them."
16020-160200220 = "Most unknown numbers are spam, but..."
16020-160200230 = "It could be an emergency, right?"
16020-160200240 = "Well, I guess that's true."
16020-160200250 = "But just in case,"
16020-160200260 = "You should probably have a bit more situational awareness."
16020-160200270 = "There are tons of students out there who'd target a fragile adult who can't even take a bullet."
16020-160200280 = "...I'll keep that in mind."
16020-160200290 = "Sensei, Bravo Charlie is here."
16020-160200300 = "You'd better put away anything you shouldn't be seen with."
16020-160200310 = "Bravo Charlie...?"
16020-160200320 = "...What do you mean?"
16020-160200330 = "Ah."
16020-160200340 = "Sorry, sorry."
16020-160200350 = "I accidentally used phonetic alphabet."
16020-160200360 = "Bravo means B, and Charlie means C."
16020-160200370 = "Between us, we use it as a code for \"Bean Counter.\""
16020-160200380 = "A person who counts beans?"
16020-160200390 = "It means a financial officer who is that strict."
16020-160200400 = "Umm."
16020-160200410 = "In other words..."
16020-160200420 = "The Administration Committee's Finance Director is here."
16020-160200430 = "You should have said that first!"
16020-160200440 = "Sorry for the late night message."
16020-160200450 = "Oh, Sensei."
16020-160200460 = "Are you sleeping by any chance?"
16020-160200470 = "Yeah..."
16020-160200480 = "I figured. Sorry, sorry."
16020-160200490 = "It's nothing important, so don't worry about it. Good night!"
16020-160200500 = "Sorry, I couldn't check my phone."
16020-160200510 = "What's wrong?"
16020-160200520 = "Did something happen? Are you okay?"
16020-160200530 = "Otogi...?"
16020-160200540 = "I'm heading there right now!"
16020-160200550 = "Sensei, do you have time this weekend?"
16020-160200560 = "Yeah, of course."
16020-160200570 = "Did something happen?"
16020-160200580 = "I don't have the camouflage I need for my next operation."
16020-160200590 = "I was thinking of going to Corgi Town to buy a new one."
16020-160200600 = "If you'd like, want to come with me?"
16020-160200610 = "Sure, sounds good."
16020-160200620 = "You can buy camouflage at a shopping mall?"
16020-160200630 = "Well, of course."
16020-160200640 = "As long as you have the money, you can get anything from tonight's dinner to hacking tools!"
16020-160200650 = "...Wasn't that the catchphrase of a different store?"
16020-160200660 = "When you see concrete pipes in an empty lot or the shadows under a bridge,"
16020-160200670 = "Don't you ever feel like turning them into your own secret base?"
16020-160200680 = "I used to think about that in the past."
16020-160200690 = "Even now, I kind of want to pull the covers over my head and escape into my own little space."
16020-160200700 = "...Isn't that a little concerning?"
16020-160200710 = "Well, whatever."
16020-160200720 = "I guess everyone thinks about the same kind of things, huh."
16020-160200730 = "When I was little, I also searched around for a secret base to hide my games and manga, but"
16020-160200740 = "To think I'd still be doing it as a high schooler..."
16020-160200750 = "Have you been making them recently?"
16020-160200760 = "Is your own room too small?"
16020-160200770 = "Ah, that's not what I mean..."
16020-160200780 = "During operations, we often have to lie low for over 24 hours or do all-night missions, you see."
16020-160200790 = "At times like that, these kinds of \"secret bases\" are"
16020-160200800 = "useful for storing ammo and personal belongings."
16020-160200810 = "It kind of has that childhood sense of wonder, pretty cool."
16020-160200820 = "Are there any special places you've had your eye on recently?"
16020-160200830 = "Hmm, maybe under Sensei's desk?"
16020-160200840 = "Eh?"
16020-160200850 = "What's with that reaction?"
16020-160200860 = "You know..."
16020-160200870 = "Are you getting weird ideas? The \"desk\" part is what's important here!"
16020-160200880 = "You've hidden under a desk to make it your base before, haven't you?"
16020-160200890 = "Ah, so that's what you meant."
16020-160200900 = "In that case, you can use it occasionally."
16020-160200910 = "Hmm, I appreciate your kindness, Sensei, but..."
16020-160200920 = "There are a lot of students aiming for that spot, so I gave up on it."
16020-160200930 = "Wait a minute."
16020-160200940 = "What does that mean!?"