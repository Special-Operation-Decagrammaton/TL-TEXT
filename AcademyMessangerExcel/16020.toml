[translation]
16020-160200010 = "Olá. Este é o número do professor do Schale, correto?"
16020-160200020 = "Sim, sou eu, mas..."
16020-160200030 = "Faz tempo que eu queria encontrar você a sós."
16020-160200040 = "Você poderia vir à 4ª rua da Lost Highway hoje à noite?"
16020-160200050 = "Se for depois das 8, tudo bem..."
16020-160200060 = "Consigo arranjar um tempo."
16020-160200070 = "Ei, ei, ei!"
16020-160200080 = "Por que você está caindo nessa tão fácil?!"
16020-160200090 = "Você deveria desconfiar de contatos de pessoas que não conhece."
16020-160200100 = "Pode ser alguém mal-intencionado querendo informações do Schale, sabia?"
16020-160200110 = "……Hm?"
16020-160200120 = "Por acaso você achou que era uma garota fofa?"
16020-160200130 = "Que pena! Era a Otogi~"
16020-160200140 = "Não, eu sabia desde o começo."
16020-160200150 = "O nome da Otogi está aparecendo aqui."
16020-160200160 = "Ah."
16020-160200170 = "É verdade, esse não é um telefone para operações."
16020-160200180 = "Ah, droga, errei."
16020-160200190 = "Se for contato de uma aluna, sou sempre bem-vindo."
16020-160200200 = "Professor, você atende qualquer um que te liga?"
16020-160200210 = "Eu acho que o normal seria ignorar."
16020-160200220 = "A maioria dos números desconhecidos é spam, mas..."
16020-160200230 = "Pode ser uma emergência, não pode?"
16020-160200240 = "Bom, pensando bem, é verdade."
16020-160200250 = "Mas, por precaução,"
16020-160200260 = "você deveria ter um pouco mais de senso de perigo."
16020-160200270 = "Tem um monte de alunas por aí que visam adultos frágeis que nem aguentam um tiro."
16020-160200280 = "……Vou levar isso em consideração."
16020-160200290 = "Professor, o Bravo Charlie chegou."
16020-160200300 = "É melhor guardar as coisas que não podem ser vistas."
16020-160200310 = "Bravo Charlie……?"
16020-160200320 = "……O que isso significa?"
16020-160200330 = "Ah."
16020-160200340 = "Desculpa, desculpa."
16020-160200350 = "Acabei usando um código de voz sem querer."
16020-160200360 = "Bravo significa B, Charlie significa C."
16020-160200370 = "Entre nós, usamos esse código para nos referirmos a um 'Bean Counter'."
16020-160200380 = "Alguém que conta feijões?"
16020-160200390 = "Significa um responsável financeiro rigoroso."
16020-160200400 = "Hum..."
16020-160200410 = "Ou seja..."
16020-160200420 = "A chefe do departamento financeiro do Comitê Administrativo chegou."
16020-160200430 = "Deveria ter me avisado antes!"
16020-160200440 = "Desculpe pela hora tardia."
16020-160200450 = "Ué, professor."
16020-160200460 = "Será que você está dormindo?"
16020-160200470 = "Hum..."
16020-160200480 = "É, deve ser isso mesmo. Desculpe, desculpe."
16020-160200490 = "Não é nada importante, não se preocupe. Boa noite!"
16020-160200500 = "Desculpe. Eu não consegui verificar a tempo."
16020-160200510 = "O que houve?"
16020-160200520 = "Aconteceu alguma coisa? Está tudo bem?"
16020-160200530 = "Otogi...?"
16020-160200540 = "Estou indo agora mesmo!"
16020-160200550 = "Sensei, você tem tempo neste fim de semana?"
16020-160200560 = "Sim, claro."
16020-160200570 = "Aconteceu alguma coisa?"
16020-160200580 = "É que eu estou sem o uniforme camuflado para a próxima operação."
16020-160200590 = "Estava pensando em ir até Corgi Town comprar um novo."
16020-160200600 = "Se quiser, quer ir comigo?"
16020-160200610 = "Sim, tudo bem."
16020-160200620 = "Dá para comprar uniforme camuflado no shopping?"
16020-160200630 = "Ora, claro que sim."
16020-160200640 = "Se tiver dinheiro, dá para comprar desde a comida de hoje à noite até ferramentas de hacking!"
16020-160200650 = "...Esse não era o slogan de outra loja?"
16020-160200660 = "Quando você vê tubos de concreto em terrenos baldios ou sombras debaixo de pontes,"
16020-160200670 = "você nunca pensou em transformar aquilo na sua própria base secreta?"
16020-160200680 = "Antigamente, eu até pensava nisso."
16020-160200690 = "Até hoje, às vezes quero me cobrir com o cobertor e ficar no meu próprio espaço."
16020-160200700 = "...Isso não é um pouco preocupante?"
16020-160200710 = "Bem, deixa pra lá."
16020-160200720 = "Parece que todo mundo pensa em coisas parecidas, né?"
16020-160200730 = "Quando eu era pequena, também vivia procurando bases secretas para esconder meus jogos e mangás."
16020-160200740 = "Mas nunca imaginei que continuaria fazendo isso depois de entrar no ensino médio."
16020-160200750 = "Você ainda faz isso ultimamente?"
16020-160200760 = "Seu quarto não é suficiente?"
16020-160200770 = "Ah, não é por isso..."
16020-160200780 = "Em operações, costumamos ter missões de mais de 24 horas de tocaia ou que duram a noite toda."
16020-160200790 = "Nessas horas, esse tipo de \"base secreta\""
16020-160200800 = "é útil para guardar munição e pertences pessoais."
16020-160200810 = "Isso é bem legal, cheio de um romantismo da infância."
16020-160200820 = "Tem algum lugar especial que você esteja de olho ultimamente?"
16020-160200830 = "Hmm, talvez debaixo da mesa do Sensei?"
16020-160200840 = "Hã?"
16020-160200850 = "O que foi essa reação?"
16020-160200860 = "Ei..."
16020-160200870 = "Você está pensando besteira? A mesa é um lugar importante, sabia?!"
16020-160200880 = "Você já entrou debaixo da mesa para fazer de base, não já?"
16020-160200890 = "Ah, era nesse sentido."
16020-160200900 = "Nesse caso, pode usar de vez em quando."
16020-160200910 = "Hmm, agradeço a gentileza do Sensei, mas..."
16020-160200920 = "Tem muitas alunas de olho nesse lugar, então eu desisti."
16020-160200930 = "Espere um pouco."
16020-160200940 = "O que você quer dizer com isso!?"
