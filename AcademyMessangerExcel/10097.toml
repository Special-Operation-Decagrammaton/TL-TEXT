[translation]
10097-100970010 = "Sensei~"
10097-100970020 = "Você tá ocupado agora?"
10097-100970030 = "Não tenho nada programado pra agora, mas..."
10097-100970040 = "Aconteceu alguma coisa?"
10097-100970050 = "Só tem um motivo pra eu te mandar mensagem a essa hora, né."
10097-100970060 = "Eu tô morrendo de tédio!"
10097-100970070 = "……E onde estão as outras meninas do esquadrão?"
10097-100970080 = "Ah~"
10097-100970090 = "Se eu te contar onde elas estão, você talvez não queira vir."
10097-100970100 = "Se ficou curioso, vem até aqui ver com seus próprios olhos."
10097-100970110 = "Tô te esperando~"
10097-100970120 = "Sensei."
10097-100970130 = "Eu achei uma coisa absurdamente incrível aqui!"
10097-100970140 = "O que foi do nada?"
10097-100970150 = "Não me diga que você tá morrendo de tédio de novo...?"
10097-100970160 = "Explosões."
10097-100970170 = "As explosões não param."
10097-100970180 = "Tá rolando um monte de explosão!!"
10097-100970190 = "Hã?!"
10097-100970200 = "O que tá explodindo?! Vocês estão sob fogo inimigo?!"
10097-100970210 = "Se esconde! Aguenta firme aí que eu tô indo com o resgate agora mesmo!!"
10097-100970220 = "Eu ouvi dizer que carnes e frutas ficam muito mais saborosas naquele exato limite de tempo antes de apodrecerem de vez."
10097-100970230 = "Será que com peixe é a mesma coisa?"
10097-100970240 = "De onde veio essa dúvida repentina...?"
10097-100970250 = "É que eu tive a chance de comer Kusaya (peixe fermentado) aqui na vila."
10097-100970260 = "O cheiro era horrível, mas o sabor umami era super concentrado e forte..."
10097-100970270 = "Aí eu fiquei pensando no que aconteceria se a gente deixasse outros tipos de peixe apodrecerem ao ar livre também."
10097-100970280 = "Moe, o processo químico de fermentação controlada e simplesmente deixar algo apodrecer no sol são――"
10097-100970290 = "Duas coisas completamente diferentes!"
10097-100970300 = "……Ah, é?"
10097-100970310 = "Bom, tanto faz. Mais do que no sabor umami..."
10097-100970320 = "Eu estava mais interessada em descobrir como criar um cheiro horrível de podridão."
10097-100970330 = "Você só queria fazer uma arma química, não é?!"
10097-100970340 = "Temos um problema bem chato..."
10097-100970350 = "O que aconteceu agora?"
10097-100970360 = "Nosso gerador de energia portátil começou a falhar feio desde ontem."
10097-100970370 = "Fui dar uma investigada e achei um monte de cristais de sal acumulados na área do filtro."
10097-100970380 = "Por causa da maresia e da brisa do mar, a parte de dentro também já tá toda enferrujada..."
10097-100970390 = "Nossa, que problemão..."
10097-100970400 = "Agora já é tarde demais pra tentar aplicar algum tratamento anticorrosão."
10097-100970410 = "Mas, ao mesmo tempo, seria difícil tentar mudar o nosso acampamento inteiro de lugar."
10097-100970420 = "Por acaso não tem nenhuma pousada baratinha aqui por perto onde a gente possa dormir?"
10097-100970430 = "Eu duvido muito que tenha uma pousada conveniente assim do nada num lugar desses..."
10097-100970440 = "Hmm……"
10097-100970450 = "Mas se o problema for só um lugar pra ficar, acho que posso dar um jeito de ajudar."
10097-100970460 = "Sério?"