[translation]
10097-100970010 = "先生～"
10097-100970020 = "今って忙しい？"
10097-100970030 = "特に予定はないけど……"
10097-100970040 = "何かあったの？"
10097-100970050 = "こんな時間に連絡する理由なんて、ひとつしかないでしょ"
10097-100970060 = "暇なの！"
10097-100970070 = "……ほかのみんなは？"
10097-100970080 = "あ～"
10097-100970090 = "教えちゃったら来ないかもしれないし"
10097-100970100 = "気になるんだったら、こっちに来てよ"
10097-100970110 = "待ってるね～"
10097-100970120 = "先生"
10097-100970130 = "とんでもない物があるよ！"
10097-100970140 = "いきなりどうしたの？"
10097-100970150 = "もしかして、また暇なの……？"
10097-100970160 = "爆発が"
10097-100970170 = "爆発が止まらない"
10097-100970180 = "めっちゃ爆発してる！"
10097-100970190 = "え！？"
10097-100970200 = "何が爆発してるの！？"
10097-100970210 = "待ってて！すぐ助けに行くから！"
10097-100970220 = "お肉や果物は腐るギリギリが一番美味しいって聞いたんだけど"
10097-100970230 = "お魚もそうなのかな？"
10097-100970240 = "急にどうしたの……？"
10097-100970250 = "それがね、この村でくさやを食べる機会があって"
10097-100970260 = "臭いはひどかったんだけど、旨味が濃縮されてたから……"
10097-100970270 = "ほかの魚も、腐らせたらどうなるんだろうなって"
10097-100970280 = "発酵処理と、ただ腐らせるのは――"
10097-100970290 = "たぶん別じゃないかな？"
10097-100970300 = "……そっか。"
10097-100970310 = "まあ、私は旨味よりも"
10097-100970320 = "ひどい臭いのほうに興味があるだけなんだよね"
10097-100970330 = "そっち！？"
10097-100970340 = "困ったねぇ……"
10097-100970350 = "どうしたの？"
10097-100970360 = "それが、昨日からポータブル発電機の調子が悪くてさ"
10097-100970370 = "調べてみたら、フィルターのところに塩の結晶が付いてたんだ"
10097-100970380 = "潮風のせいで、内側も錆びちゃってて……"
10097-100970390 = "それは大変だね……"
10097-100970400 = "今さら防食処理ってのもね"
10097-100970410 = "かといって、野営地を移すのも難しいし"
10097-100970420 = "この近くに、みんなで泊まれる安い宿ってないのかな？"
10097-100970430 = "そんな都合良く宿があるとは思えないけど……"
10097-100970440 = "うーん……"
10097-100970450 = "それなら、助けられるかもしれない"
10097-100970460 = "え、本当？"
