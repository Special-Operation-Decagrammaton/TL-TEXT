[translation]
10097-100970010 = "Sensei~"
10097-100970020 = "Está ocupado agora?"
10097-100970030 = "Não tenho nenhum plano em especial, mas..."
10097-100970040 = "Aconteceu alguma coisa?"
10097-100970050 = "Só tem um motivo pra eu te ligar a essa hora, né?"
10097-100970060 = "É que eu tô no tédio!"
10097-100970070 = "...E as outras?"
10097-100970080 = "Ah~"
10097-100970090 = "Se eu contar, talvez você não venha."
10097-100970100 = "Se estiver curioso, vem pra cá."
10097-100970110 = "Vou estar esperando~"
10097-100970120 = "Sensei."
10097-100970130 = "Tem uma coisa incrível aqui!"
10097-100970140 = "O que aconteceu do nada?"
10097-100970150 = "Será que você está no tédio de novo...?"
10097-100970160 = "A explosão..."
10097-100970170 = "A explosão não para!"
10097-100970180 = "Tá explodindo pra caramba!"
10097-100970190 = "Eh?!"
10097-100970200 = "O que está explodindo?!"
10097-100970210 = "Espere! Estou indo te ajudar agora mesmo!"
10097-100970220 = "Ouvi dizer que carnes e frutas são mais gostosas quando estão prestes a estragar."
10097-100970230 = "Será que é o mesmo com peixes?"
10097-100970240 = "Por que essa pergunta do nada...?"
10097-100970250 = "É que eu tive a chance de comer kusaya nesta vila."
10097-100970260 = "O cheiro era horrível, mas o umami era bem concentrado, então..."
10097-100970270 = "Fiquei pensando no que aconteceria se eu deixasse outros peixes estragarem."
10097-100970280 = "O processo de fermentação e simplesmente deixar estragar são—"
10097-100970290 = "Coisas diferentes, eu acho, não?"
10097-100970300 = "...Entendi."
10097-100970310 = "Bem, mais do que o umami,"
10097-100970320 = "eu só estou interessada no cheiro horrível."
10097-100970330 = "Nisso?!"
10097-100970340 = "Que problema..."
10097-100970350 = "O que foi?"
10097-100970360 = "É que o gerador portátil está com problema desde ontem."
10097-100970370 = "Quando fui ver, tinha cristais de sal no filtro."
10097-100970380 = "Por causa da maresia, o interior também enferrujou..."
10097-100970390 = "Nossa, que problemão..."
10097-100970400 = "Fazer um tratamento anticorrosivo agora já é meio tarde."
10097-100970410 = "Mas, por outro lado, mudar o acampamento de lugar também é difícil."
10097-100970420 = "Será que não tem uma pousada barata por aqui onde todas nós possamos ficar?"
10097-100970430 = "Acho difícil ter uma pousada tão conveniente assim por perto, mas..."
10097-100970440 = "Hmm..."
10097-100970450 = "Nesse caso, talvez eu possa ajudar."
10097-100970460 = "Eh, sério?"
