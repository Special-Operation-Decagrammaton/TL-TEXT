[translation]
10113-101130010 = "先生、救急医学部の氷室セナです"
10113-101130020 = "本日は非番なので、ご連絡いたしました"
10113-101130030 = "それと、最近お会いできず寂しいので、少しお時間を頂けたら嬉しいです"
10113-101130040 = "ちょっと待ってね……"
10113-101130050 = "じゃあ、公園で待ち合わせをしようか"
10113-101130060 = "先生、救急医学部の氷室セナです"
10113-101130070 = "再び非番となりましたので、報告いたします"
10113-101130080 = "今日も待機するの？"
10113-101130090 = "いえ、今日は用事があるので"
10113-101130100 = "私服で救急医学部の部室に行こうと思います"
10113-101130110 = "非番の日に、私服で部室に……？"
10113-101130120 = "私も行くよ！"
10113-101130130 = "はい……？"
10113-101130140 = "いつも忙しいはずでは……"
10113-101130150 = "とにかく行くよ！"
10113-101130160 = "……"
10113-101130170 = "分かりました"
10113-101130180 = "では、お待ちしております"
10113-101130190 = "先生、救急医学部の氷室セナです"
10113-101130200 = "最近、同じ報告を何度もしている気がしますが……"
10113-101130210 = "セナの非番！"
10113-101130220 = "……"
10113-101130230 = "その通りです"
10113-101130240 = "今日は何するの？待機？薬の整備？"
10113-101130250 = "今日は普段と違う予定があります"
10113-101130260 = "極めて例外的な状況だと"
10113-101130270 = "ご理解いただけると助かります"
10113-101130280 = "それって……何？"
10113-101130290 = "海を見に行きたいです"
10113-101130300 = "！！！"
10113-101130310 = "分かった、私に任せて！"
