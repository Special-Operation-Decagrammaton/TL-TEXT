[translation]
10113-101130010 = "Sensei, sou Himuro Sena do Departamento de Medicina de Emergência."
10113-101130020 = "Hoje estou de folga, então entrei em contato."
10113-101130030 = "Além disso, sinto falta de não poder te encontrar ultimamente, então ficaria feliz se pudesse me dar um pouco do seu tempo."
10113-101130040 = "Espere um pouco..."
10113-101130050 = "Então, vamos nos encontrar no parque?"
10113-101130060 = "Sensei, sou Himuro Sena do Departamento de Medicina de Emergência."
10113-101130070 = "Novamente estou de folga, então estou informando."
10113-101130080 = "Hoje também vai ficar de prontidão?"
10113-101130090 = "Não, hoje tenho algo para fazer."
10113-101130100 = "Pretendo ir para a sala do clube de Medicina de Emergência com roupas casuais."
10113-101130110 = "No dia de folga, para a sala do clube com roupas casuais...?"
10113-101130120 = "Eu também vou!"
10113-101130130 = "Hã...?"
10113-101130140 = "Você está sempre ocupado, não está...?"
10113-101130150 = "De qualquer forma, eu vou!"
10113-101130160 = "..."
10113-101130170 = "Certo."
10113-101130180 = "Então, estarei esperando."
10113-101130190 = "Sensei, sou Himuro Sena do Departamento de Medicina de Emergência."
10113-101130200 = "Ultimamente, sinto que estou fazendo o mesmo relatório várias vezes, mas..."
10113-101130210 = "A folga da Sena!"
10113-101130220 = "..."
10113-101130230 = "Isso mesmo."
10113-101130240 = "O que você vai fazer hoje? Ficar de prontidão? Organizar os remédios?"
10113-101130250 = "Hoje tenho um plano diferente do habitual."
10113-101130260 = "É uma situação extremamente excepcional,"
10113-101130270 = "agradeceria se pudesse entender."
10113-101130280 = "Isso é... o quê?"
10113-101130290 = "Quero ir ver o mar."
10113-101130300 = "!!!"
10113-101130310 = "Entendi, deixe comigo!"
