[translation]
10085-100850010 = "Sensei."
10085-100850020 = "Você já ouviu falar da palavra 'nômade digital'?"
10085-100850030 = "Acho que já vi na internet antes..."
10085-100850040 = "Um nômade digital é alguém que trabalha usando um computador, sem se prender a um local de trabalho."
10085-100850050 = "E os aparelhos digitais de hoje em dia estão cada vez menores..."
10085-100850060 = "Dizem que muitos programadores levam seus notebooks por aí e programam ao ar livre."
10085-100850070 = "Parece legal."
10085-100850080 = "Sim. Vi umas fotos em um fórum que tiraram enquanto trabalhavam como nômades, e achei legal poder trabalhar apreciando a paisagem."
10085-100850090 = "Será que eu deveria tentar trabalhar ao ar livre da próxima vez...?"
10085-100850100 = "Ué, você não odeia sair?"
10085-100850110 = "..."
10085-100850120 = "Não é bem assim, Sensei."
10085-100850130 = "Eu só não gosto de mudanças bruscas de temperatura e de lugares sem conexão com a internet."
10085-100850140 = "Na verdade, eu até que gosto de paisagens bonitas."
10085-100850150 = "Já que estamos no assunto... Sensei, quer tentar trabalhar como nômade comigo?"
10085-100850160 = "Ultimamente,"
10085-100850170 = "parece que 'glamping' está na moda entre as alunas."
10085-100850180 = "Glamping?"
10085-100850190 = "Sim. É uma palavra que significa 'acampamento de luxo', onde você pode se divertir facilmente usando os equipamentos já preparados no local."
10085-100850200 = "E ouvi dizer que alguns lugares têm até TV e ar-condicionado."
10085-100850210 = "Isso parece divertido..."
10085-100850220 = "Queria ir pelo menos uma vez..."
10085-100850230 = "Queria um servidor também."
10085-100850240 = "Já que vamos, quero poder usar a internet livremente."
10085-100850250 = "E também queria uma loja de conveniência 24 horas por perto..."
10085-100850260 = "Pensando bem, acho que seria melhor simplesmente montar uma barraca no terreno da escola."
10085-100850270 = "Isso não é mais glamping, né...?"
10085-100850280 = "Sensei, você pode vir para a Millennium agora?"
10085-100850290 = "Eu não consigo resolver isso sozinha..."
10085-100850300 = "Se puder, eu gostaria da sua ajuda."
10085-100850310 = "Claro, já estou indo."
10085-100850320 = "Um problema que nem a Hare consegue resolver..."
10085-100850330 = "O que será...?"
10085-100850340 = "Não é um problema tão difícil assim, mas..."
10085-100850350 = "Ah, quando vier, use sapatos confortáveis."
10085-100850360 = "Pode ser que a gente vá para longe."
10085-100850370 = "...O que você quer dizer?"
10085-100850380 = "Eu só descobri quando voltei, mas..."
10085-100850390 = "aquele e-mail anônimo parece que era da vice-presidente."
10085-100850400 = "Será que ela queria muito me fazer exercitar...?"
10085-100850410 = "A Chihiro?"
10085-100850420 = "Que estranho."
10085-100850430 = "Francamente..."
10085-100850440 = "Como pedido de desculpas, ela me pagou um café que parecia caro."
10085-100850450 = "Bem, desta vez, eu não precisava de um pedido de desculpas, mas..."
10085-100850460 = "N-não."
10085-100850470 = "Esquece o que eu acabei de dizer."
10085-100850480 = "Sensei."
10085-100850490 = "Na verdade, o resultado do meu exame de saúde saiu."
10085-100850500 = "Disseram que meu estômago não está muito bem."
10085-100850510 = "Então, parece que eu preciso reduzir a cafeína..."
10085-100850520 = "……Talvez seja uma boa oportunidade?"
10085-100850530 = "Bem, vai ser tarde demais se a situação piorar..."
10085-100850540 = "Eu entendo isso na teoria, mas..."
10085-100850550 = "Quando me concentro no trabalho, minha mão vai automaticamente..."
10085-100850560 = "Hábitos não mudam tão facilmente, né?"
10085-100850570 = "Então, eu pensei em um bom método para reduzir a cafeína."
10085-100850580 = "Mas preciso de uma preparação prévia."
10085-100850590 = "Sensei, você pode me ajudar?"
10085-100850600 = "Claro que sim."
10085-100850610 = "Precisa de alguma coisa?"
10085-100850620 = "Obrigada."
10085-100850630 = "Então, você pode vir ao acampamento da Millennium neste fim de semana?"
10085-100850640 = "Os detalhes eu explico na hora."
