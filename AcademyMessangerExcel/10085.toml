[translation]
10085-100850010 = "先生"
10085-100850020 = "ノマドワーカーって言葉、聞いたことある？"
10085-100850030 = "前にネットで見たような……"
10085-100850040 = "ノマドワーカーっていうのは、働く場所に囚われず、パソコンを使って仕事する人を指すんだけど"
10085-100850050 = "最近のデジタル機器は小型化も進んでいるし……"
10085-100850060 = "ノートパソコンを持ち歩いて、外でコーディングを進めるプログラマーも多いんだって"
10085-100850070 = "なんかカッコいいね"
10085-100850080 = "うん。フォーラムでもノマド先で撮った写真が紹介されてたんだけど、景色を楽しみながら作業ができるの、いいなって"
10085-100850090 = "今度、私も外で作業してみようかな……？"
10085-100850100 = "あれ、外苦手じゃないっけ？"
10085-100850110 = "……"
10085-100850120 = "ちょっと違うよ、先生"
10085-100850130 = "私は寒暖差が激しくて、ネットが繋がらない環境が嫌いなだけ"
10085-100850140 = "むしろ、きれいな景色は好きな方"
10085-100850150 = "せっかくだし……先生も一緒にノマドワーク、やってみない？"
10085-100850160 = "最近ね"
10085-100850170 = "生徒の間で「グランピング」が流行っているらしいの"
10085-100850180 = "グランピング？"
10085-100850190 = "うん。豪華なキャンプって意味の造語で、キャンプ場に準備されてる道具を使って気軽に楽しめるんだって"
10085-100850200 = "しかも、テレビやエアコンまで完備されてるところもあるって聞いたよ"
10085-100850210 = "それは楽しそうだね……"
10085-100850220 = "一度くらい行ってみたいな……"
10085-100850230 = "サーバーも欲しいね"
10085-100850240 = "せっかくなら、自由にインターネットを使いたいし"
10085-100850250 = "それと24時間営業のコンビニも近くにあってほしい……"
10085-100850260 = "いっそ、学校の敷地にテントを張ればいいような気がしてきた"
10085-100850270 = "それはもう、グランピングじゃないよね……？"
10085-100850280 = "先生、今からミレニアムに来られる？"
10085-100850290 = "私ひとりじゃ、どうしようもなくて……"
10085-100850300 = "良ければ手伝ってほしいの"
10085-100850310 = "もちろん、すぐ行くよ"
10085-100850320 = "ハレでも解決できない問題って……"
10085-100850330 = "一体……？"
10085-100850340 = "そんなに難しい問題じゃないんだけど……"
10085-100850350 = "あ、来る時は歩きやすい靴でね"
10085-100850360 = "遠出になるかもしれないから"
10085-100850370 = "……どういうこと？"
10085-100850380 = "帰ってから知ったんだけど"
10085-100850390 = "あの匿名のメール、副部長からだったみたい"
10085-100850400 = "どうしても私を運動させたかったのかな……"
10085-100850410 = "チヒロが？"
10085-100850420 = "珍しいね"
10085-100850430 = "まったくもう……"
10085-100850440 = "お詫びの印に、高そうなコーヒーを奢ってくれた"
10085-100850450 = "まあ今回は、お詫びなんて無くても良かったけど"
10085-100850460 = "や"
10085-100850470 = "今のは、無しで"
10085-100850480 = "先生"
10085-100850490 = "実は、健康診断の結果が出たの"
10085-100850500 = "胃があんまり良くない状態なんだって"
10085-100850510 = "だから、カフェインを減らす必要があるらしくて……"
10085-100850520 = "……良い機会かも？"
10085-100850530 = "まあ、悪化してからじゃ遅いから……"
10085-100850540 = "頭では理解してるんだけど"
10085-100850550 = "いざ仕事に集中すると、自然に手が伸びて……"
10085-100850560 = "習慣はそうそう変わらないもんね"
10085-100850570 = "そこで、カフェインを減らす良い方法を思いついたの"
10085-100850580 = "でも下準備が必要だから"
10085-100850590 = "先生、手伝ってくれる？"
10085-100850600 = "それはもちろん"
10085-100850610 = "何か必要な物とかある？"
10085-100850620 = "ありがとう"
10085-100850630 = "じゃあ今週末、ミレニアムのキャンプ場まで来てくれる？"
10085-100850640 = "詳しいことは、その時に"
