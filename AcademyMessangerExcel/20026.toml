[translation]
20026-200260010 = "<広告>レッドウィンター連邦学園工務部 / 専門人材派遣 / 長期・短期・日雇い / 土木・建設・増築・撤去・リフォーム / 何でも気軽にご相談ください！このメールを配信停止する場合はモモトークにてご連絡ください"
20026-200260020 = "先生、工務の人手は必要か？"
20026-200260030 = "急にどうしたの……？"
20026-200260040 = "それが……"
20026-200260050 = "最近、あまり依頼が入ってこなくてな"
20026-200260060 = "工務部の手が空いてしまっているんだ"
20026-200260070 = "シャーレで人手は必要か？"
20026-200260080 = "オフィスを増築したり"
20026-200260090 = "先生の記念碑を建てる予定は？"
20026-200260100 = "今のところ考えてないかな……"
20026-200260110 = "そうか、残念だ"
20026-200260120 = "もし人手が必要になった時は"
20026-200260130 = "我々レッドウィンター連邦学園の工務部が請け負おう"
20026-200260140 = "仲介は挟まずに、直接連絡してくれ！"
20026-200260150 = "うん、ありがとう"
20026-200260160 = "先生、ちょっといいか？"
20026-200260170 = "作文を書いているんだが、行き詰まってしまってな"
20026-200260180 = "先生にアドバイスをもらいたいんだ"
20026-200260190 = "作文って難しいよね"
20026-200260200 = "どんなことを書いてるの？"
20026-200260210 = "うむ"
20026-200260220 = "まずは読み手の感情を揺さぶって"
20026-200260230 = "革命の闘志を燃え上がらせたい"
20026-200260240 = "そして、著者の思想を刷り込むことで"
20026-200260250 = "既得権益を有す悪辣なブルジョワジーに立ち向かいたくなる"
20026-200260260 = "そんな文章を書いているんだ"
20026-200260270 = "……か、過激だね"
20026-200260280 = "先生、明日なんだが……"
20026-200260290 = "工務部の見学に来る約束だったな？"
20026-200260300 = "うん、その予定だけど……？"
20026-200260310 = "天気予報によると、明日は強い寒波が到来するらしい"
20026-200260320 = "事故を防ぐためにも、明日の作業は中止にした"
20026-200260330 = "急に予定を変更して申し訳ない"
20026-200260340 = "大丈夫だよ"
20026-200260350 = "安全第一だからね"
20026-200260360 = "そうだ、現場では常に安全第一が求められる"
20026-200260370 = "では、また先生の予定が合う日に来てくれ"
20026-200260380 = "そういえば先生"
20026-200260390 = "最近、興味深い本を読んでな"
20026-200260400 = "『なぜキヴォトスの生徒は不幸なのか』という題名だった"
20026-200260410 = "どんな内容なの？"
20026-200260420 = "連邦生徒会の財務室に所属していた生徒が書いたみたいだ"
20026-200260430 = "キヴォトスで流通しているプリンなどの嗜好品の需給を調べたところ……"
20026-200260440 = "全生徒の手に公平に渡れば、十分な量なんだとか"
20026-200260450 = "だが、一部の生徒が2つ以上のプリンを食べるせいで、均衡が崩れてしまう"
20026-200260460 = "面白い統計だね"
20026-200260470 = "しかし、プリンを2つ以上食べてしまう生徒が、周りを顧みることはない"
20026-200260480 = "だから半数近くの生徒は、プリンを食べられず不幸になる"
20026-200260490 = "プリンが全てではないと思うけど……"
20026-200260500 = "何を言っている？プリンこそ幸せの源じゃないか"
20026-200260510 = "いずれにせよ、ブルジョワどもからプリンを奪わない限り、不幸は続く"
20026-200260520 = "あたしは学園の闘争だけで手一杯だが……"
20026-200260530 = "この問題を根本的に解決する方法を考えたぞ"
20026-200260540 = "生徒の数を半分に減らすのはどうだろうか……？"
20026-200260550 = "どこかのラスボスみたいな考えはやめて……"
