[translation]
20026-200260010 = "<Anúncio> Departamento de Obras da Academia Federal Red Winter / Recrutamento de especialistas / Longo prazo, curto prazo, diárias / Obras civis, construção, ampliações, demolições, reformas / Sinta-se à vontade para nos consultar sobre qualquer coisa! Para cancelar o recebimento deste e-mail, entre em contato via MomoTalk."
20026-200260020 = "Sensei, precisa de mão de obra para obras?"
20026-200260030 = "Por que isso de repente...?"
20026-200260040 = "É que..."
20026-200260050 = "Ultimamente, não temos recebido muitos pedidos."
20026-200260060 = "O pessoal do Departamento de Obras está sem fazer nada."
20026-200260070 = "O Schale precisa de ajuda?"
20026-200260080 = "Talvez ampliar o escritório?"
20026-200260090 = "Ou planeja construir um monumento para o Sensei?"
20026-200260100 = "Por enquanto, não estou pensando nisso..."
20026-200260110 = "Entendo, que pena."
20026-200260120 = "Se precisar de mão de obra algum dia,"
20026-200260130 = "o Departamento de Obras da Academia Federal Red Winter cuidará disso."
20026-200260140 = "Não precisa de intermediários, entre em contato diretamente comigo!"
20026-200260150 = "Certo, obrigado."
20026-200260160 = "Sensei, tem um minuto?"
20026-200260170 = "Estou escrevendo uma redação, mas travei."
20026-200260180 = "Queria pedir um conselho ao Sensei."
20026-200260190 = "Escrever redações é difícil, né?"
20026-200260200 = "Sobre o que você está escrevendo?"
20026-200260210 = "Hum."
20026-200260220 = "Primeiro, quero abalar as emoções do leitor"
20026-200260230 = "e incendiar o espírito revolucionário."
20026-200260240 = "E então, ao incutir a ideologia do autor,"
20026-200260250 = "fazer com que queiram enfrentar a burguesia cruel que detém os privilégios."
20026-200260260 = "É esse tipo de texto que estou escrevendo."
20026-200260270 = "...É, bem radical."
20026-200260280 = "Sensei, sobre amanhã..."
20026-200260290 = "Tínhamos combinado de você visitar o Departamento de Obras, certo?"
20026-200260300 = "Sim, está nos planos, mas...?"
20026-200260310 = "Segundo a previsão do tempo, uma forte onda de frio chegará amanhã."
20026-200260320 = "Para evitar acidentes, cancelei o trabalho de amanhã."
20026-200260330 = "Peço desculpas pela mudança repentina de planos."
20026-200260340 = "Não tem problema."
20026-200260350 = "Segurança em primeiro lugar, afinal."
20026-200260360 = "Isso mesmo, no canteiro de obras, a segurança deve vir sempre em primeiro lugar."
20026-200260370 = "Então, venha em um dia em que sua agenda permita."
20026-200260380 = "Falando nisso, Sensei,"
20026-200260390 = "li um livro interessante recentemente."
20026-200260400 = "O título era 'Por que os alunos de Kivotos são infelizes'."
20026-200260410 = "Qual é o conteúdo?"
20026-200260420 = "Parece que foi escrito por um aluno que pertencia à sala financeira do Conselho Estudantil Geral."
20026-200260430 = "Ao investigar a oferta e demanda de itens de luxo, como pudins, que circulam em Kivotos..."
20026-200260440 = "Se fossem distribuídos de forma justa para todos os alunos, haveria uma quantidade suficiente."
20026-200260450 = "Mas, como alguns alunos comem dois ou mais pudins, o equilíbrio é quebrado."
20026-200260460 = "Uma estatística interessante."
20026-200260470 = "No entanto, os alunos que comem mais de dois pudins não se importam com os outros."
20026-200260480 = "Por isso, quase metade dos alunos não consegue comer pudim e acaba infeliz."
20026-200260490 = "Não acho que o pudim seja tudo, mas..."
20026-200260500 = "O que está dizendo? O pudim não é a própria fonte da felicidade?"
20026-200260510 = "De qualquer forma, enquanto não tirarmos o pudim desses burgueses, a infelicidade continuará."
20026-200260520 = "Eu já estou ocupada o suficiente apenas com a luta da escola, mas..."
20026-200260530 = "Eu pensei em uma maneira de resolver esse problema fundamentalmente."
20026-200260540 = "Que tal reduzirmos o número de estudantes pela metade...?"
20026-200260550 = "Pare com esse pensamento de vilão final de jogo..."
