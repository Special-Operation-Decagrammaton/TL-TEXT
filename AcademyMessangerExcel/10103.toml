[translation]
10103-101030010 = "Sensei"
10103-101030020 = "Marina, o que aconteceu?"
10103-101030030 = "Estou aqui na Associação Comercial Genbu de Shanhaijing,"
10103-101030040 = "e estou com um pequeno problema."
10103-101030050 = "Se não for incômodo, você poderia me ajudar?"
10103-101030060 = "Estou indo aí agora."
10103-101030070 = "Acho que foi porque comi demais..."
10103-101030080 = "Meu estômago está um pouco..."
10103-101030090 = "...Você está bem?"
10103-101030100 = "Ah, aprendi uma lição valiosa."
10103-101030110 = "Parece que o sabor e a aparência da comida nem sempre combinam."
10103-101030120 = "Na verdade, aquele espetinho de inseto é para turistas..."
10103-101030130 = "Então deveria ter me dito antes!"
10103-101030140 = "Cheguei, Sensei."
10103-101030150 = "Onde você está?"
10103-101030160 = "Desculpe, acho que vou me atrasar uns 5 minutos!"
10103-101030170 = "Tudo bem, venha com cuidado."
10103-101030180 = "Estou esperando na praça."
10103-101030190 = "...Foi complicado."
10103-101030200 = "Mas você estava muito bonita."
10103-101030210 = "P-Pare de me elogiar."
10103-101030220 = "...Se não for um elogio, aí fico com mais vergonha ainda."
10103-101030230 = "Haa, estou recebendo comentários sobre o álbum de fotos de várias pessoas."
10103-101030240 = "Só pra confirmar, você não comprou, né, Sensei?"
10103-101030250 = "..."
10103-101030260 = "Espere, por que você não diz nada?"
10103-101030270 = "Sensei?"
10103-101030280 = "Sensei!?"
10103-101030290 = "Não consigo me lembrar o nome da cafeteria que vamos..."
10103-101030300 = "É a 'Tougenkyou'."
10103-101030310 = "Ah, é verdade."
10103-101030320 = "Qual será o gosto do chá de Shanhaijing?"
10103-101030330 = "Estou bem ansioso."
