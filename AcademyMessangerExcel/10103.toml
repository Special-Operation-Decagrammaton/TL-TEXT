[translation]
10103-101030010 = "先生"
10103-101030020 = "マリナ、どうしたの？"
10103-101030030 = "山海経の玄武商会というところに来ているんだが"
10103-101030040 = "少し困っていてな"
10103-101030050 = "良ければ助けてもらえないか？"
10103-101030060 = "すぐ行くね"
10103-101030070 = "食べ過ぎたせいか"
10103-101030080 = "少し、お腹が……"
10103-101030090 = "……大丈夫？"
10103-101030100 = "ああ、ひとつ確実な学びを得たぞ"
10103-101030110 = "食べ物の味と見た目は、必ずしも一致しないようだ"
10103-101030120 = "実は、あの虫の串焼きって観光客向けなんだけど……"
10103-101030130 = "それならそうと早く言ってくれ！"
10103-101030140 = "着いたぞ、先生"
10103-101030150 = "どこにいる？"
10103-101030160 = "ごめん、5分くらい遅れそう！"
10103-101030170 = "大丈夫だ、気を付けて来てくれ"
10103-101030180 = "広場で待っている"
10103-101030190 = "……大変だった"
10103-101030200 = "でも、すごくきれいだったよ"
10103-101030210 = "お、お世辞はやめてくれ"
10103-101030220 = "……お世辞じゃないとしたら、それはもっと困る"
10103-101030230 = "はぁ、いろんな人から写真集の感想が届いてるな"
10103-101030240 = "念のために聞くが、先生は買ってないな？"
10103-101030250 = "……"
10103-101030260 = "待て、なぜ何も言わない？"
10103-101030270 = "先生？"
10103-101030280 = "先生！？"
10103-101030290 = "これから行く喫茶店の名前が思い出せなくてな……"
10103-101030300 = "「桃源郷」だよ"
10103-101030310 = "ああ、そうだったな"
10103-101030320 = "山海経のお茶はどんな味なのか"
10103-101030330 = "なかなか楽しみだ"
