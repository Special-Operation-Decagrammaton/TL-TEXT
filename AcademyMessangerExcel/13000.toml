[translation]
13000-2260 = "おはようございます、私のご主人様"
13000-2261 = "新しいタイプの振り込め詐欺……？"
13000-2262 = "ご主人様じゃなくて、先生だよ？"
13000-2263 = "ふふっ、ユーモラスなお方ですね"
13000-2264 = "あなたのメイド、アカネです。ここにあらためてご挨拶申し上げます"
13000-2265 = "……え？"
13000-2266 = "ふふっ、今日は楽しかったです"
13000-2267 = "ご主人様のピンチに颯爽と駆けつけるメイド……良いと思いません？"
13000-2268 = "懐かしいですね。そんなに経ってないのに、"
13000-2269 = "まるで昔の事のように感じます"
13000-2270 = "先生と初めて会った時、私……"
13000-2271 = "少しだけ……ドキッ♡っとしてしまいました"
13000-2272 = "先生もそうでしたか？"
13000-2273 = "ドキドキしたよ……（建物が爆発したし）"
13000-2274 = "私にとっては、昨日の事のように鮮明だよ"
13000-2275 = "あら、それは嬉しいですね"
13000-2276 = "目を閉じると、先生と初めてお会いした日のことが鮮明に脳裏に浮かびます"
13000-2277 = "素敵な縁は往々にして、強烈な出会いから始まるものだと思います"
13000-2278 = "これからも、末永くよろしくお願いしますね"
13000-2279 = "ご主人様、今日も良い一日をお過ごしくださいませ"
13000-2280 = "私は今日、重要な任務がありますので、ブラックマーケットに向かいます"
13000-2281 = "ブラックマーケット？危なくない？"
13000-2282 = "重要な任務？"
13000-2283 = "はい、危ないかもしれませんね"
13000-2284 = "私のターゲットになったお相手の方々が、ですけれど"
13000-2285 = "それより私は、以前のように……"
13000-2286 = "C&Cのメイドは、一種のエージェントですから"
13000-2287 = "今日もミレニアムのため、意義のある行いを為すお時間です"
13000-2288 = "ただ、強いて望むことがあるとすれば……"
13000-2289 = "今日も偶然、先生にお会いできたら良いのに……"
13000-2290 = "なんて、思ってしまいます"
13000-2291 = "ご主人様は私にとって、四つ葉の白詰草のような存在なのかもしれません"
13000-2292 = "ですがそれ以上に、"
13000-2293 = "ご主人様と出会えたことが、私にとって最大の幸運です"
13000-2294 = "そうかもしれないね"
13000-2295 = "こちらこそ、アカネと会えてよかった"
13000-2296 = "あら、素直に受け止められるだなんて、驚きです"
13000-2297 = "ふふっ、でもそういうの、嫌いではありませんよ"
13000-2298 = "ふふっ、そう仰っていただけると嬉しいです"
13000-2299 = "先生が今日も一日、幸運に恵まれますように"
13000-2300 = "今日は、ご主人様と一緒に任務へ向かう日ですね。楽しみです"
13000-2301 = "ご主人様も……今日の日を楽しみにしてくださっていましたか？"
13000-2302 = "私は今日この瞬間が楽しみで、一晩中眠れませんでした"
13000-2303 = "睡眠は大事だよ"
13000-2304 = "体調は大丈夫？"
13000-2305 = "ふふっ、ご心配なさらず"
13000-2306 = "先生と一緒であれば、私は……"
13000-2307 = "いつも、最高のコンディションですので"
13000-2308 = "悪党たちは無事、C&Cの手によって全員確保しました"
13000-2309 = "ですが、今日のMVPは間違いなくご主人様だと思います！"
13000-2310 = "まだこんな時間ですし、モモトークは見られていないかもしれませんが……"
13000-2311 = "私は今、出発したところです"
13000-2312 = "どこに向けてかと言いますと、ご主人様のお家に、です"
13000-2313 = "……今？まだ夜中なのに……？"
13000-2314 = "夢……？"
13000-2315 = "楽しみにしていてくださいね～"
13000-2316 = "次会うときは、私たちの記念日になるはずですから"
13000-2317 = "記念日？"
13000-2318 = "ふふっ。お楽しみに、ですっ！"
13000-2319 = "ご主人様、私がお願いしていたこと、もう全部終えていただけましたか？"
13000-2320 = "そろそろ到着予定です"
13000-2321 = "お返しのお時間、始めましょうか"
13000-2322 = "待って待って！やることが多すぎる！"
13000-2323 = "お返し……って？"
13000-2324 = "ふふっ、もうすぐ着きますよ～"
13000-2325 = "先生が目を覚ました時や、お戻りになった時"
13000-2326 = "最初に目に入る相手がいつも、私だったらいいのに……"
13000-2327 = "最近よく、そんなことを思ってしまいます。ふふっ"
