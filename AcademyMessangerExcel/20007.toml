[translation]
20007-200070010 = "えっと、シャーレの先生……で、合ってますか?"
20007-200070020 = "どちら様……？"
20007-200070030 = "どこかで会ったことある……？"
20007-200070040 = "ふふっ"
20007-200070050 = "できればご説明したいところなのですが……それはまた後ほど"
20007-200070060 = "数多くの生徒たちの信頼を集め、頼れる存在として認識されている……そして、キヴォトス全体におけるフィクサーである先生に、お願いがあるんです"
20007-200070070 = "日が暮れた頃に、この後私が指定する場所に来ていただけますか？"
20007-200070080 = "あ、他の方にはどうかご内密でお願いしますね！"
20007-200070090 = "先生、こんにちは！"
20007-200070100 = "あれからどう？"
20007-200070110 = "あ、はい。そちらの方は何とか"
20007-200070120 = "まだ、声は出ませんが……"
20007-200070130 = "あの後、何か見つかりましたか？"
20007-200070140 = "うん。調べてみた感じ、幾つか良さそうな方法が"
20007-200070150 = "本当ですか！？さすがは先生です！"
20007-200070160 = "では、午後の練習が終わった後にでも少し会えますでしょうか？"
20007-200070170 = "ライブハウスの控室で待ってますので"
20007-200070180 = "ライブまで、あと一週間になってしまいました……"
20007-200070190 = "喉の調子は変わらず？"
20007-200070200 = "はい……"
20007-200070210 = "やはりもう一度、中止にできないか聞いてみた方が良いでしょうか"
20007-200070220 = "まだ何か、やり方は……"
20007-200070230 = "私もミクのライブが見たいし……どうにかして何か良い方法を……"
20007-200070240 = "あの、先生"
20007-200070250 = "よろしければ今から、お会いできませんか？"
20007-200070260 = "ちょっとお話したいことがありまして。路地裏でお待ちしてます"
20007-200070270 = "先生、曲が完成しました……！"
20007-200070280 = "色々と未熟な感じではありますが……"
20007-200070290 = "心を込めて、作ってみました"
20007-200070300 = "お疲れ様！"
20007-200070310 = "きっと大丈夫、みんな喜んでくれるよ"
20007-200070320 = "ですが、本当に大丈夫でしょうか……？"
20007-200070330 = "普通にお願いしても難しそうですし……"
20007-200070340 = "こっそりやるにも、セキュリティがしっかりしてますし……"
20007-200070350 = "任せて"
20007-200070360 = "シャーレには、ハッキングとかエンジニアリングが得意な生徒がたくさんいるから"
20007-200070370 = "えっと、今さらなのですが……"
20007-200070380 = "シャーレって、いったい何の組織なんですか……？"
