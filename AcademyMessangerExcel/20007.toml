[translation]
20007-200070010 = "Hum, você é o Sensei do Schale... estou certa?"
20007-200070020 = "Quem seria você...?"
20007-200070030 = "Já nos vimos em algum lugar...?"
20007-200070040 = "Fufu."
20007-200070050 = "Eu gostaria de explicar, se possível... mas isso fica para depois."
20007-200070060 = "Sensei, você que conquistou a confiança de tantos alunos, é reconhecido como alguém em quem se pode confiar... e é o resolvedor de problemas de todo o Kivotos, tenho um pedido a lhe fazer."
20007-200070070 = "Poderia vir ao local que vou indicar mais tarde, quando o sol se puser?"
20007-200070080 = "Ah, por favor, mantenha isso em segredo dos outros!"
20007-200070090 = "Sensei, olá!"
20007-200070100 = "Como estão as coisas desde então?"
20007-200070110 = "Ah, sim. Aquilo está, de alguma forma, sob controle."
20007-200070120 = "Ainda não consigo usar a voz, mas..."
20007-200070130 = "Depois daquilo, você encontrou alguma coisa?"
20007-200070140 = "Sim. Pelo que pesquisei, existem alguns métodos promissores."
20007-200070150 = "Sério!? Como esperado do Sensei!"
20007-200070160 = "Então, poderíamos nos encontrar um pouco depois que o treino da tarde terminar?"
20007-200070170 = "Estarei esperando no camarim da casa de shows."
20007-200070180 = "Falta apenas uma semana para o show..."
20007-200070190 = "A condição da sua garganta continua a mesma?"
20007-200070200 = "Sim..."
20007-200070210 = "Será que não seria melhor perguntar se podemos cancelar mais uma vez?"
20007-200070220 = "Ainda deve haver algum jeito..."
20007-200070230 = "Eu também quero ver o show da Miku... preciso encontrar uma boa solução de alguma forma..."
20007-200070240 = "Ei, Sensei."
20007-200070250 = "Se não for incômodo, podemos nos encontrar agora?"
20007-200070260 = "Tenho algo para conversar. Estarei esperando no beco."
20007-200070270 = "Sensei, a música está pronta...!"
20007-200070280 = "Embora pareça um pouco imatura em vários aspectos..."
20007-200070290 = "Eu a fiz colocando todo o meu coração."
20007-200070300 = "Bom trabalho!"
20007-200070310 = "Vai dar tudo certo, todos vão adorar."
20007-200070320 = "Mas, será que vai dar certo mesmo...?"
20007-200070330 = "Parece difícil conseguir apenas pedindo normalmente..."
20007-200070340 = "E mesmo que tentássemos fazer escondido, a segurança é muito rigorosa..."
20007-200070350 = "Deixe comigo."
20007-200070360 = "No Schale, há muitos alunos que são bons em hacking e engenharia."
20007-200070370 = "Hum, pode parecer tarde para perguntar, mas..."
20007-200070380 = "O que exatamente é o Schale...?"
