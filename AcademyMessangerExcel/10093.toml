10093-100930950 = "Não."
10093-100930960 = "Não se preocupa com isso!"
10093-100930970 = "Entendeu!?"
10093-100930980 = "En... Entendeu?"
10093-100930990 = "Isso! É isso aí!"
10093-100931000 = "Então..."
