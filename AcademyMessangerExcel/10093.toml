10093-100930750 = "Ehehe."
10093-100930760 = "Então, vou ter que me esforçar muito nos estudos, né? (´；ω；`) haha"
10093-100930770 = "Então, até mais!"
10093-100930780 = "Sensei! É uma emergência!"
10093-100930790 = "Eu perdi meu caderno espiral!"
10093-100930800 = "Sensei, você não viu ele por aí...?"
10093-100930810 = "Só se você se lembrar, claro."
