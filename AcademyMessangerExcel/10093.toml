[translation]
10093-100930010 = "Oizinho~"
10093-100930020 = "Essa é a conta do Sensei, né?"
10093-100930030 = "Oizinho~"
10093-100930040 = "Acertei~! Oizinho~!"
10093-100930050 = "Eu tava conversando com uma amiga hoje..."
10093-100930060 = "e a gente começou a falar sobre 'coisas que a gente gosta',"
10093-100930070 = "aí eu pensei que eu gosto mesmo é de conversar!"
10093-100930080 = "E você, Sensei?"
10093-100930090 = "Gosta de conversar?"
10093-100930100 = "Gosto, sim."
10093-100930110 = "Eu também gosto de conversar com você, Kirara."
10093-100930120 = "Sério mesmo~?"
10093-100930130 = "A gente pensou na mesma coisa! Que daora!"
10093-100930140 = "Oizinho~"
10093-100930150 = "Tive uma ideia genial, sou uma gênia!"
10093-100930160 = "Sensei, quer ser o conselheiro do Clube Kira-Kira?"
10093-100930170 = "Ah, pode responder quando quiser! Me avisa quando decidir!"
10093-100930180 = "Toc, toc."
10093-100930190 = "Sensei."
10093-100930200 = "Senseeei! (´；ω；`)"
10093-100930210 = "Kirara... é você?"
10093-100930220 = "Uéééé!"
10093-100930230 = "Sensei, me ajuda! (＞＜)"
10093-100930240 = "Tirei nota vermelha na prova~ (´；ω；`)"
10093-100930250 = "Me ajuda a estudar No Schale~ (´；ω；`)"
10093-100930260 = "Ah, você tá ocupado agora?"
10093-100930270 = "Não, tudo bem. Estarei esperando."
10093-100930280 = "Como esperado do Sensei! (＞＜) Valeu mesmo!"
10093-100930290 = "Sensei, sério, obrigada! (´；ω；`)"
10093-100930300 = "Graças a você, consegui me esforçar muito nos estudos!"
10093-100930310 = "Fico feliz em ter ajudado..."
10093-100930320 = "Ué? Sensei, você parece desanimado."
10093-100930330 = "Quer que eu te dê uma injeção de ânimo da próxima vez?"
10093-100930340 = "Então, até mais! Conto com você da próxima vez!"
10093-100930350 = "Próxima vez...?"
10093-100930360 = "Sim! Entro em contato de novo em breve! (＞＜)"
10093-100930370 = "Sensei!!!!!"
10093-100930380 = "Você tem tempo hoje?"
10093-100930390 = "Sim, estou livre."
10093-100930400 = "Que bom♪"
10093-100930410 = "Então, pode me ajudar a estudar de novo, que nem da outra vez?"
10093-100930420 = "Sim, pode deixar."
10093-100930430 = "Dessa vez, vem pra minha sala de aula!"
10093-100930440 = "Não tem ninguém hoje, então a gente pode estudar em paz!"
10093-100930450 = "Então, vou estar te esperando~!"
10093-100930460 = "Fiquei um pouco curiosa, mas..."
10093-100930470 = "Você realmente não estava pensando em nada, né?"
10093-100930480 = "Ah, não, não é que eu esteja duvidando de você!"
10093-100930490 = "Uhm, você quer saber a minha opinião...?"
10093-100930500 = "O que você quer di-"
10093-100930510 = "Peraí."
10093-100930520 = "O que você quer que eu diga!?"
10093-100930530 = "Kirara, você tem um lado sério também, né?"
10093-100930540 = "?"
10093-100930550 = "Ah..."
10093-100930560 = "Está falando dos estudos?"
10093-100930570 = "Boa sorte na prova de recuperação!"
10093-100930580 = "U-uhum..."
10093-100930590 = "De qualquer forma, valeu♪"
10093-100930600 = "Sensei!!!!!"
10093-100930610 = "Sensei Sensei sensei Sensei sensei!!!!!!!!!!!!!!!"
10093-100930620 = "O que foi?"
10093-100930630 = "Consegui!"
10093-100930640 = "Passei na prova de recuperação!!"
10093-100930650 = "Parabéns!"
10093-100930660 = "Ehehe."
10093-100930670 = "Foi tudo graças a você, Sensei♪"
10093-100930680 = "Então, me deixa te agradecer, pode ser?"
10093-100930690 = "Vamos, vamos sair pra nos divertir!"
10093-100930700 = "Sensei!"
10093-100930710 = "Então..."
10093-100930720 = "Se eu passar na prova de novo, a gente pode sair pra se divertir, só nós dois?"
10093-100930730 = "Claro."
