[translation]
10123-101230010 = "今、お手すきかい？"
10123-101230020 = "少々急を要する事態になってしまった"
10123-101230030 = "都合がつくと助かるのだが"
10123-101230040 = "大丈夫だけど、どうしたの？"
10123-101230050 = "シャーレで待ってればいい？"
10123-101230060 = "察しが良くて助かるよ"
10123-101230070 = "すぐに向かうとしよう"
10123-101230080 = "なに、長くは待たせないさ"
10123-101230090 = "服装が違えば、心持ちも変わるらしい"
10123-101230100 = "ある意味、私らしくはない"
10123-101230110 = "けれど角度を変えれば、これこそ私らしいのかもしれない"
10123-101230120 = "哲学的な話だね"
10123-101230130 = "どっちもあってる気がするね"
10123-101230140 = "そうとも"
10123-101230150 = "そんな曖昧さも、時に都合のいい言い訳になったりするものさ"
10123-101230160 = "理屈の後付けがいくらでもできるからな"
10123-101230170 = "さて、それでは"
10123-101230180 = "先生はこの問いに、どのような理を付けるのか"
10123-101230190 = "楽しみにしているよ"
10123-101230200 = "そろそろ"
10123-101230210 = "最後の時が近いようだ"
10123-101230220 = "せめて、その瞬間だけは"
10123-101230230 = "君と共に迎えたい……"
10123-101230240 = "げほっ、げほっ"
10123-101230250 = "願いを……叶えてはくれまいか"
10123-101230260 = "文字で咳き込んでる……"
10123-101230270 = "今度は、どんな悪戯かな？"
10123-101230280 = "そうか"
10123-101230290 = "やはり同じ手は通用しないか"
10123-101230300 = "まあ、いいさ"
10123-101230310 = "君は……一緒に過ごしてくれるだろう？"
10123-101230320 = "最初からああしていればよかったね"
10123-101230330 = "とかく今日は五分といったところか"
10123-101230340 = "これならば次も期待できそうだ"
10123-101230350 = "なんだか勝負みたいな言い方だね"
10123-101230360 = "まさか勝ち負けを決めるつもりかい？"
10123-101230370 = "当然だろう？"
10123-101230380 = "何せ、先生と私の仲なのだから"
10123-101230390 = "さて、それでは……"
10123-101230400 = "次の機会が巡ってきたら、また声をかけさせてもらうとしよう"
10123-101230410 = "驚くべきことだ"
10123-101230420 = "思いもしないことを言われたよ"
10123-101230430 = "驚くべきこと？"
10123-101230440 = "思いもしないこと？"
10123-101230450 = "ああ"
10123-101230460 = "実に気分が良い"
10123-101230470 = "これから報告に上がるよ"
10123-101230480 = "実に楽しいドライブだったよ"
10123-101230490 = "気が向いたときには、また"
10123-101230500 = "拒否権なかったんだけど……"
10123-101230510 = "私の意思はどこへ……"
10123-101230520 = "わかっているのだろう？まったく、先生も意地が悪いね"
10123-101230530 = "ありがとう、先生"
10123-101230540 = "君が、私のすべてを変えたんだ"
10123-101230550 = "大げさではないさ"
10123-101230560 = "だから"
10123-101230570 = "これからも"
10123-101230580 = "幾重にも姿を変えていく私を"
10123-101230590 = "傍で見届けてくれるかい？"
