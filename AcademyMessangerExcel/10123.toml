[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10123-101230010 = "Está com as mãos (e o corpo) livres agora?"
10123-101230020 = "Acabou de surgir uma situação...\num tanto urgente e deliciosa."
10123-101230030 = "Seria de grande ajuda se você pudesse\narrumar um tempinho pra mim."
10123-101230040 = "Tudo bem, mas o que aconteceu?"
10123-101230050 = "Quer que eu te espere na Schale?"
10123-101230060 = "Fufu, adoro como você capta\nminhas intenções tão rápido."
10123-101230070 = "Estou indo direto para aí."
10123-101230080 = "Não se preocupe, não vou deixar você\nsofrendo de ansiedade por muito tempo."
10123-101230090 = "Dizem que quando mudamos de roupa...\no nosso humor e nossos desejos também mudam."
10123-101230100 = "De certa forma, expor meu corpo assim\nnão é muito do meu feitio."
10123-101230110 = "Mas, mudando o ângulo da visão... talvez\nesta seja a minha forma mais verdadeira e despida."
10123-101230120 = "Uma reflexão bem filosófica, hein."
10123-101230130 = "Acho que as duas coisas estão certas."
10123-101230140 = "Exatamente."
10123-101230150 = "Essa ambiguidade é a desculpa perfeita\npara fazermos o que quisermos, não acha?"
10123-101230160 = "Afinal, eu sempre posso inventar\numa desculpa lógica depois do prazer."
10123-101230170 = "Então, dito isto..."
10123-101230180 = "Que tipo de 'desculpa' lógica o Sensei vai usar\npara as coisas que vamos fazer agora?"
10123-101230190 = "Estou ansiosa para descobrir."
10123-101230200 = "Parece que..."
10123-101230210 = "O meu momento final está se aproximando."
10123-101230220 = "Pelo menos, nesses últimos segundos..."
10123-101230230 = "Eu queria que você ficasse bem pertinho\ne colado em mim..."
10123-101230240 = "*Cof, cof...* Ai, que fraqueza..."
10123-101230250 = "Você poderia... realizar este\nmeu último e profundo desejo?"
10123-101230260 = "Você tá literalmente digitando a tosse..."
10123-101230270 = "Qual é a travessura da vez, Seia?"
10123-101230280 = "Entendo."
10123-101230290 = "Como imaginei, o mesmo truque barato\nnão funcionaria de novo em você."
10123-101230300 = "Bem, não tem problema."
10123-101230310 = "Você... ainda vai passar um tempinho\nquente comigo de qualquer forma, não vai?"
10123-101230320 = "Eu devia ter sido direta desde o começo, né."
10123-101230330 = "Pelo visto, hoje nós empatamos nesse joguinho."
10123-101230340 = "Mas sinto que as minhas expectativas\npara a próxima vez só aumentaram."
10123-101230350 = "Você fala como se estivéssemos numa disputa."
10123-101230360 = "Pretende decidir quem ganha e quem perde?"
10123-101230370 = "Mas é claro."
10123-101230380 = "Afinal de contas, estamos falando\nda intimidade entre o Sensei e eu."
10123-101230390 = "Bem, então ficamos assim..."
10123-101230400 = "Quando a próxima oportunidade surgir,\neu farei questão de chamar a sua atenção."
10123-101230410 = "Uma coisa surpreendente aconteceu."
10123-101230420 = "Você me disse algumas coisas\nque eu nem sequer conseguia imaginar."
10123-101230430 = "Surpreendente?"
10123-101230440 = "Coisas que você não imaginava?"
10123-101230450 = "Ah, sim."
10123-101230460 = "Isso me deixou de um humor incrivelmente bom."
10123-101230470 = "Vou indo para aí fazer o meu 'relatório'."
10123-101230480 = "O nosso passeio de carro foi\nrealmente delicioso e excitante."
10123-101230490 = "Quando der vontade de novo, a gente repete."
10123-101230500 = "Eu literalmente não tive direito de recusa..."
10123-101230510 = "Onde foi parar o meu livre arbítrio...?"
10123-101230520 = "Você sabe muito bem onde, não sabe?\nNossa, o Sensei consegue ser bem maldoso."
10123-101230530 = "Obrigada, Sensei."
10123-101230540 = "Você conseguiu mudar absolutamente tudo em mim."
10123-101230550 = "E não estou exagerando."
10123-101230560 = "Por isso..."
10123-101230570 = "De agora em diante..."
10123-101230580 = "Eu, que vou continuar mudando\nde forma tantas e tantas vezes..."
10123-101230590 = "Você vai continuar me observando\nbem de pertinho... não vai?"