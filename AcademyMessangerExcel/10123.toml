[translation]
10123-101230010 = "Você está livre agora?"
10123-101230020 = "Surgiu uma situação um pouco urgente."
10123-101230030 = "Ajudaria se você tivesse disponibilidade."
10123-101230040 = "Tudo bem, mas o que aconteceu?"
10123-101230050 = "Devo esperar No Schale?"
10123-101230060 = "Sua perspicácia ajuda muito."
10123-101230070 = "Vamos para lá imediatamente."
10123-101230080 = "Não se preocupe, não vou fazer você esperar muito."
10123-101230090 = "Parece que mudar de roupa também muda o estado de espírito."
10123-101230100 = "Em certo sentido, não é típico de mim."
10123-101230110 = "Mas, se mudar o ângulo, talvez isso seja exatamente o que é típico de mim."
10123-101230120 = "É uma conversa filosófica, não é?"
10123-101230130 = "Parece que ambos estão certos."
10123-101230140 = "Exatamente."
10123-101230150 = "Até mesmo essa ambiguidade, às vezes, pode se tornar uma desculpa conveniente."
10123-101230160 = "Porque se pode racionalizar o quanto quiser depois."
10123-101230170 = "Bem, então..."
10123-101230180 = "Que tipo de lógica o Sensei aplicará a esta pergunta?"
10123-101230190 = "Estou ansioso para ver."
10123-101230200 = "Está quase na hora..."
10123-101230210 = "Parece que o fim está próximo."
10123-101230220 = "Pelo menos, aquele momento..."
10123-101230230 = "Eu gostaria de enfrentá-lo junto com você..."
10123-101230240 = "Cof, cof."
10123-101230250 = "Você não poderia... realizar meu desejo?"
10123-101230260 = "Está tossindo em texto..."
10123-101230270 = "Que tipo de travessura é esta vez?"
10123-101230280 = "Entendi."
10123-101230290 = "Como esperado, o mesmo truque não funciona."
10123-101230300 = "Bem, tudo bem."
10123-101230310 = "Você... vai passar um tempo comigo, certo?"
10123-101230320 = "Eu deveria ter feito isso desde o início."
10123-101230330 = "De qualquer forma, hoje foi um empate, eu diria."
10123-101230340 = "Se for assim, posso esperar pela próxima vez também."
10123-101230350 = "É uma forma de falar que soa como uma competição."
10123-101230360 = "Você não está pensando em decidir quem ganha e quem perde, está?"
10123-101230370 = "Claro que sim, não é?"
10123-101230380 = "Afinal, somos o Sensei e eu."
10123-101230390 = "Bem, então..."
10123-101230400 = "Quando a próxima oportunidade surgir, vou te chamar novamente."
10123-101230410 = "É algo surpreendente."
10123-101230420 = "Me disseram algo que eu nem imaginava."
10123-101230430 = "Algo surpreendente?"
10123-101230440 = "Algo que você nem imaginava?"
10123-101230450 = "Sim."
10123-101230460 = "Realmente me sinto bem."
10123-101230470 = "Vou fazer o relatório agora."
10123-101230480 = "Foi um passeio realmente divertido."
10123-101230490 = "Quando tiver vontade, novamente..."
10123-101230500 = "Mas eu não tive direito de recusa..."
10123-101230510 = "Para onde foi a minha vontade...?"
10123-101230520 = "Você sabe, não é? Puxa, Sensei, você é tão malvado."
10123-101230530 = "Obrigado, Sensei."
10123-101230540 = "Você mudou tudo em mim."
10123-101230550 = "Não é exagero."
10123-101230560 = "Por isso,"
10123-101230570 = "De agora em diante,"
10123-101230580 = "Eu que continuarei me transformando de inúmeras formas,"
10123-101230590 = "Você vai me acompanhar de perto?"
