[translation]
10050-100500010 = "Olá, Sensei."
10050-100500020 = "Como você está?"
10050-100500030 = "Eu estou bem. Afinal, sou a instrutora do Baikaen!"
10050-100500040 = "Instrutora, é? Deve ser difícil para você, Kokona."
10050-100500050 = "Não é difícil?"
10050-100500060 = "Tem momentos que são difíceis, mas está tudo bem."
10050-100500070 = "Acima de tudo, eu já sou uma dama respeitável!"
10050-100500080 = "Sensei. Se tiver tempo, por que não visita o Baikaen?"
10050-100500090 = "Vou mostrar para você como eu sou como instrutora!"
10050-100500100 = "Você conseguiu voltar em segurança no outro dia?"
10050-100500110 = "É uma pena que não pude me apresentar de uma forma mais adequada."
10050-100500120 = "Você foi incrível, Kokona-chan."
10050-100500130 = "Você agiu como uma instrutora respeitável, Kokona-chan."
10050-100500140 = "Eu já disse, não é Kokona-chan!"
10050-100500150 = "Se vai me chamar de Kokona-chan,"
10050-100500160 = "não deveria chamar a Shun-neesan de Shun-chan também?"
10050-100500170 = "A Shun parece que ia gostar de ser chamada assim."
10050-100500180 = "Hã... O que isso quer dizer?"
10050-100500190 = "Minha boca ainda está com um gosto amargo..."
10050-100500200 = "Eu odeio café..."
10050-100500210 = "Eu estive pensando,"
10050-100500220 = "e comecei a achar que ser capaz de beber café não significa necessariamente ser um adulto."
10050-100500230 = "Existem adultos que não bebem café, não é?"
10050-100500240 = "Sim. Não precisa se forçar a beber."
10050-100500250 = "Eu sabia! É isso mesmo, não é?!"
10050-100500260 = "Afinal, existem comidas no mundo com as quais a gente simplesmente não se dá bem."
10050-100500270 = "Como eu e as cenouras, por exemplo."
10050-100500280 = "Da próxima vez, eu coloco leite e açúcar no seu café."
10050-100500290 = "Leite e açúcar...?!"
10050-100500300 = "N-Nesse caso, talvez eu possa reconsiderar...?"
10050-100500310 = "Não, deixa pra lá."
10050-100500320 = "Eu sou uma dama respeitável, não preciso dessas coisas."
10050-100500330 = "É só que eu e o café não combinamos."
10050-100500340 = "Então, acho que vou beber um café delicioso com leite e açúcar."
10050-100500350 = "Isso é injusto!"
10050-100500360 = "Todos os adultos são injustos!"
10050-100500370 = "Não importa como eu pense nisso, com certeza estou sendo enganada..."
10050-100500380 = "Não tem como cenouras ficarem gostosas..."
10050-100500390 = "Vamos comer umas cenouras deliciosas!"
10050-100500400 = "Pronta para ir ao restaurante de cenouras?"
10050-100500410 = "Eu... tenho... que ir... mesmo...?"
10050-100500420 = "Uuuh... Ueeh... Uen..."
10050-100500430 = "Se eu morrer hoje, a culpa vai ser sua, Sensei..."
10050-100500440 = "Confie em mim."
10050-100500450 = "Vou te tratar como uma dama maravilhosa."
10050-100500460 = "Entendido."
10050-100500470 = "Eu... vou confiar em você, Sensei."
