[translation]
10050-100500010 = "こんにちは、先生"
10050-100500020 = "いかがお過ごしでしょうか？"
10050-100500030 = "私は元気です。なんたって、梅花園の教官ですから！"
10050-100500040 = "教官か……ココナも大変だね"
10050-100500050 = "大変じゃない？"
10050-100500060 = "大変な時もありますが、大丈夫です"
10050-100500070 = "何より、すでに私は立派なレディーですから！"
10050-100500080 = "先生。もしお時間があったら、梅花園を訪問してみませんか？"
10050-100500090 = "私の教官としての姿を先生にお見せします！"
10050-100500100 = "先日は無事に帰れましたか？"
10050-100500110 = "まともな姿をお見せできなくて残念です"
10050-100500120 = "十分にかっこよかったよ、ココナちゃん"
10050-100500130 = "立派に教官してたよ、ココナちゃん"
10050-100500140 = "だから、ココナちゃんじゃないです！"
10050-100500150 = "私をココナちゃんと呼ぶなら、"
10050-100500160 = "シュン姉さんもシュンちゃんって呼ぶべきじゃないでしょうか？"
10050-100500170 = "シュンはそう呼ばれたら喜びそう"
10050-100500180 = "えっと……それは、どういうことですか？"
10050-100500190 = "まだ口の中が苦いです……"
10050-100500200 = "コーヒー、嫌いです……"
10050-100500210 = "考えてみたんですが"
10050-100500220 = "必ずしもコーヒーを飲めることが大人というのは違う気がしてきました"
10050-100500230 = "コーヒーを飲まない大人もいるのではないでしょうか"
10050-100500240 = "うん。無理に飲む必要はないからね"
10050-100500250 = "やはりそうですよね！"
10050-100500260 = "世の中にはどうしても合わない食べ物だってありますし"
10050-100500270 = "例えば、私とニンジンのように"
10050-100500280 = "今度はコーヒーに牛乳と砂糖を入れてあげるね"
10050-100500290 = "牛乳と砂糖ですか……！？"
10050-100500300 = "そ、それなら考え直してもいいかも……？"
10050-100500310 = "いいえ、やっぱりいいです"
10050-100500320 = "私は立派なレディーですから、そんなものは必要ありません"
10050-100500330 = "ただ私とコーヒーが合わないだけですから"
10050-100500340 = "じゃあ、私は牛乳と砂糖を入れておいしいコーヒーを飲もうかな"
10050-100500350 = "ずるいです！"
10050-100500360 = "大人はみんなずるいです！"
10050-100500370 = "どう考えても騙されてるに違いないです……"
10050-100500380 = "ニンジンが美味しくなるわけないです……"
10050-100500390 = "おいしいニンジンを食べに行こう！"
10050-100500400 = "ニンジンレストランに行く準備はできた？"
10050-100500410 = "行かないと……ダメ……ですか……？"
10050-100500420 = "ううえ……うええ……うえん"
10050-100500430 = "私が今日死んでしまったら、先生のせいですからね……"
10050-100500440 = "私を信じて"
10050-100500450 = "素敵なレディー扱いをするから"
10050-100500460 = "わかりました"
10050-100500470 = "先生を……信じます"
