[translation]
20051-200510010 = "Professor, é a Reisa!"
20051-200510020 = "Como eu posso usar minha mesada de forma inteligente?"
20051-200510030 = "É bom definir um orçamento antes de gastar."
20051-200510040 = "Estabeleça prioridades e evite desperdícios."
20051-200510050 = "Entendi!"
20051-200510060 = "Então significa comprar apenas o que é necessário!"
20051-200510070 = "Você aprende rápido, Reisa."
20051-200510080 = "Hehehe."
20051-200510090 = "Então, isso aqui conta como algo necessário, certo?"
20051-200510100 = "“Traje de Fusão de Amizade Magiliber Thermite Pink”"
20051-200510110 = "Estava pela metade do preço de mercado!"
20051-200510120 = "Metade do preço de mercado!?!?"
20051-200510130 = "Praticamente de graça!! Pode comprar!!!!"
20051-200510140 = "Pois é! Foi ótimo ter consultado o professor!"
20051-200510150 = "Magicamente inteligente! É isso!"
20051-200510160 = "Professor, é a Reisa."
20051-200510170 = "Chegou em casa?"
20051-200510180 = "Sim, graças a você!"
20051-200510190 = "Vou lavar o casaco antes de te devolver!"
20051-200510200 = "Não precisa ter pressa, viu?"
20051-200510210 = "O professor é sempre tão gentil!"
20051-200510220 = "Obrigada por quebrar a maldição da transformação!"
20051-200510230 = "Hehehe."
20051-200510240 = "66307366979"
20051-200510250 = "Reisa?"
20051-200510260 = "Ah."
20051-200510270 = "Ops."
20051-200510280 = "Desculpe! Errei!"
20051-200510290 = "Enviei para o MomoTalk do professor!"
20051-200510300 = "Era o número da reserva do evento do fim de semana"
20051-200510310 = "que eu pretendia enviar para mim mesma..."
20051-200510320 = "Oh! Que evento?"
20051-200510330 = "É um evento exclusivo de garotas mágicas."
20051-200510340 = "Fãs de obras de garotas mágicas se reúnem para vender produtos e fazer cosplay."
20051-200510350 = "É um evento assim!"
20051-200510360 = "Pensei que, como comitê de segurança, eu deveria ir patrulhar!"
20051-200510370 = "Eu também quero ir!"
20051-200510380 = "Ainda dá tempo de participar?"
20051-200510390 = "!!"
20051-200510400 = "Com certeza!"
20051-200510410 = "O professor também vai?!"
20051-200510420 = "Não é apenas 'ir'."
20051-200510430 = "Vamos dizer que eu vou... 'entrar em combate'!"
20051-200510440 = "Que legal!!"
20051-200510450 = "Isso é ótimo!!"
20051-200510460 = "Eu também vou totalmente armada!!"
20051-200510470 = "Professor!"
20051-200510480 = "Hoje foi muito divertido!"
20051-200510490 = "Como o professor me deu aquele empurrãozinho,"
20051-200510500 = "eu também consegui criar coragem!"
20051-200510510 = "Se for pela Reisa, eu faço qualquer coisa!"
20051-200510520 = "Hehe"
20051-200510530 = "Vamos nos encontrar de novo!"
20051-200510540 = "Professor"
20051-200510550 = "O que seria um 'código de vestimenta'?"
20051-200510560 = "Acho que é vestir roupas adequadas para a ocasião e o local, não é?"
20051-200510570 = "Então isso significa que"
20051-200510580 = "as roupas que usamos para um determinado propósito"
20051-200510590 = "também seguem um código de vestimenta?"
20051-200510600 = "Acho que sim."
20051-200510610 = "Entendo."
20051-200510620 = "Entendi..."
20051-200510630 = "?"
20051-200510640 = "Estava tudo perfeito!"
20051-200510650 = "Mas estraguei tudo no final!"
20051-200510660 = "Não tem problema, foi ótimo!"
20051-200510670 = "Você foi muito legal!"
20051-200510680 = "Mas eu queria ter tido um desempenho perfeito."
20051-200510690 = "Na próxima!"
20051-200510700 = "Vou mostrar um desempenho super perfeito!"
20051-200510710 = "Professor, é a Reisa."
20051-200510720 = "Aquele material que você usou para consertar o zíper outro dia"
20051-200510730 = "ainda tem?"
20051-200510740 = "Claro! O que aconteceu?"
20051-200510750 = "Eu, que cometo o mesmo erro repetidamente,"
20051-200510760 = "sou uma boba... né..."
20051-200510770 = "Não me diga..."
20051-200510780 = "O zíper de novo...?"
20051-200510790 = "..."
20051-200510800 = "Estou indo para o Schale..."
20051-200510810 = "Professor!"
20051-200510820 = "Graças a você, a crise passou!"
20051-200510830 = "O zíper nunca mais vai quebrar!"
20051-200510840 = "Eu sou invencível!"
20051-200510850 = "Oh! Como você fez isso?"
20051-200510860 = "Hehe, foi simples."
20051-200510870 = "Eu tirei o zíper e troquei tudo por botões!"
20051-200510880 = "Mas desse jeito, você não vai conseguir se vestir sozinha..."
20051-200510890 = "Eh..."
20051-200510900 = "Hã?"
