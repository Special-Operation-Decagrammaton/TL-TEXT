10070-100700040 = "Ah, que bom então."
10070-100700050 = "Aqui é a Konoe Mina."
10070-100700060 = "Eu sou a responsável pelo plantão da Schale hoje, certo?"
10070-100700070 = "Sim, estou esperando."
