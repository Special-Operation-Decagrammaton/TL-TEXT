10070-100700220 = "Mas, por favor, priorize a sua segurança."
10070-100700230 = "Se algo acontecer com você, Sensei..."
10070-100700240 = "Isso seria um grande problema para mim também."
10070-100700250 = "Você tem trabalho em Shanhaijing hoje de novo?"
10070-100700260 = "Sim, mas devo terminar por volta do meio-dia."
10070-100700270 = "Ultimamente, tenho visto muito o(a) Sensei em Shanhaijing."
10070-100700280 = "E-eu estava atrapalhando...?"
10070-100700290 = "Não."
10070-100700300 = "De forma alguma. Na verdade, é conveniente."
10070-100700310 = "Pelo meio-dia, hein... Entendo."
10070-100700320 = "Se você precisa de algo, poderia ter me dito antes..."
10070-100700330 = "Hmph."
10070-100700340 = "Não precisa se preocupar tanto."
10070-100700350 = "Então, vamos nos encontrar depois do meio-dia."
10070-100700360 = "Sensei."
10070-100700370 = "Ouvi dizer que você pegou um resfriado. Está tudo bem?"
10070-100700380 = "Estou com frio... e com dor de cabeça também..."
10070-100700390 = "Descanse bem..."
10070-100700400 = "Hmph."
10070-100700410 = "Eu não tenho nada."
10070-100700420 = "Aquele ditado estava certo, então..."
10070-100700430 = "Que ditado?"
