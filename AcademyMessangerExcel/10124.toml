[translation]
10124-101240010 = "先生"
10124-101240020 = "このたび、正義実現委員会の活動で海に行くことになりました"
10124-101240030 = "……事前にお伝えしておいたほうがよいかと思いまして"
10124-101240040 = "夏だ！海だ！"
10124-101240050 = "水着だ！！！"
10124-101240060 = "……なるほど"
10124-101240070 = "何か誤解されているようですが……"
10124-101240080 = "これはあくまで、正義実現委員会の活動の一環です"
10124-101240090 = "あっ、ごめん……"
10124-101240100 = "せっかくの夏の海だし、息抜きするのかなって……"
10124-101240110 = "……そういうことでしたら"
10124-101240120 = "少しお時間をいただけますか？直接ご説明に伺います"
10124-101240130 = "先生"
10124-101240140 = "さきほどは失礼しました"
10124-101240150 = "一週間後、「結果」をお見せします"
10124-101240160 = "あ、うん。がんば……って？"
10124-101240170 = "よくわからないけど、応援してるよ！"
10124-101240180 = "ええ"
10124-101240190 = "決して、断じて、先生を失望させないようにしますので"
10124-101240200 = "ついに……この日が来ました"
10124-101240210 = "ハスミ？"
10124-101240220 = "一週間……"
10124-101240230 = "いつもならば……瞬く間に過ぎ去るものですが……"
10124-101240240 = "ここまで長く感じるとは……初めてのことです"
10124-101240250 = "羽川ハスミ、既に覚悟を決めました"
10124-101240260 = "……いつでも、いらしてください"
10124-101240270 = "え？う、うん……"
10124-101240280 = "すぐ行くね！"
10124-101240290 = "先生"
10124-101240300 = "本日は、お付き合いいただきありがとうございました"
10124-101240310 = "本当に大丈夫……？"
10124-101240320 = "大丈夫です"
10124-101240330 = "海へ行くまで、まだ時間が残っています"
10124-101240340 = "む、無理はしないで……"
10124-101240350 = "頑張って……"
10124-101240360 = "感謝します"
10124-101240370 = "今回……私がどこまで到達できるか、はっきりと証明します"
10124-101240380 = "そんなに覚悟を決めなくても……"
10124-101240390 = "行き過ぎないようにね……！"
10124-101240400 = "では、海でお会いしましょう"
10124-101240410 = "ついに……この日が来ました"
10124-101240420 = "水着のサイズも、問題ありません"
10124-101240430 = "相当努力してたもんね、ハスミ"
10124-101240440 = "すごい……すごすぎるよ……！"
10124-101240450 = "ええ、本当に……"
10124-101240460 = "業務中の間食は当然控え……"
10124-101240470 = "食後のデザートも我慢する苦渋の日々……"
10124-101240480 = "ティーパーティーから頂いたロールケーキもやむなく辞退し……"
10124-101240490 = "まだ口にしたことのないミラクル5000の限定版ケーキまで耐え抜いて……！"
10124-101240500 = "は、ハスミ……？"
10124-101240510 = "落ち着いて！ゴールは目の前だから！"
10124-101240520 = "……失礼しました"
10124-101240530 = "少々、取り乱してしまったようです"
10124-101240540 = "今日は、本当にありがとうございました"
10124-101240550 = "先生には……こういった姿ばかりお見せしてしまいますね"
10124-101240560 = "健康が最優先だよ"
10124-101240570 = "また遊びに行きたくなったら、いつでも連絡して！"
10124-101240580 = "ええ、ありがとうございます"
10124-101240590 = "先生"
10124-101240600 = "いつでもご連絡を、とのことでしたが……"
10124-101240610 = "ナイスタイミング！海辺に来れたりする？"
10124-101240620 = "今夜、海辺に来てもらってもいい？"
10124-101240630 = "……はい？"
10124-101240640 = "承知しました"
10124-101240650 = "向かいます"
10124-101240660 = "先生"
10124-101240670 = "この夏のことは、きっと忘れません"
10124-101240680 = "それはよかった！"
10124-101240690 = "私も楽しかったよ！"
10124-101240700 = "「夏」というものを、これほど楽しんだのは初めてでした"
10124-101240710 = "特別な思い出をくださり、ありがとうございます"
10124-101240720 = "私も最初から最後まで、ずっと楽しかったよ"
10124-101240730 = "ふふっ……"
10124-101240740 = "水泳の練習も……先生のご馳走してくれた夕飯も……"
10124-101240750 = "花火の美しさも……"
10124-101240760 = "この夏に起きたことは全て、忘れません……ふふっ"
