[translation]
10124-101240010 = "Sensei."
10124-101240020 = "Desta vez, irei à praia como parte das atividades do Comitê de Realização da Justiça."
10124-101240030 = "……Pensei que seria melhor avisá-lo com antecedência."
10124-101240040 = "É verão! É praia!"
10124-101240050 = "É roupa de banho!!!"
10124-101240060 = "……Entendi."
10124-101240070 = "Parece que há algum mal-entendido..."
10124-101240080 = "Isso é, estritamente, parte das atividades do Comitê de Realização da Justiça."
10124-101240090 = "Ah, desculpe..."
10124-101240100 = "Já que é a praia no verão, pensei que você fosse relaxar um pouco..."
10124-101240110 = "……Se for esse o caso..."
10124-101240120 = "Poderia me dar um momento? Irei pessoalmente para explicar."
10124-101240130 = "Sensei."
10124-101240140 = "Peço desculpas pelo que aconteceu agora há pouco."
10124-101240150 = "Em uma semana, mostrarei os 'resultados'."
10124-101240160 = "Ah, sim. Boa sorte...?"
10124-101240170 = "Não entendi muito bem, mas estou torcendo por você!"
10124-101240180 = "Sim."
10124-101240190 = "Eu prometo que nunca, jamais, o decepcionarei, Sensei."
10124-101240200 = "Finalmente... este dia chegou."
10124-101240210 = "Hasumi?"
10124-101240220 = "Uma semana..."
10124-101240230 = "Normalmente... passaria num piscar de olhos, mas..."
10124-101240240 = "É a primeira vez que sinto que demorou tanto..."
10124-101240250 = "Hanekawa Hasumi, já tomei minha decisão."
10124-101240260 = "……Pode vir a qualquer momento."
10124-101240270 = "Hã? Ah, sim..."
10124-101240280 = "Estou indo agora!"
10124-101240290 = "Sensei."
10124-101240300 = "Obrigada por me acompanhar hoje."
10124-101240310 = "Você está realmente bem...?"
10124-101240320 = "Estou bem."
10124-101240330 = "Ainda temos tempo antes de ir para a praia."
10124-101240340 = "Não se esforce demais..."
10124-101240350 = "Boa sorte..."
10124-101240360 = "Agradeço."
10124-101240370 = "Desta vez... provarei claramente até onde posso chegar."
10124-101240380 = "Não precisa se preparar tanto assim..."
10124-101240390 = "Não exagere...!"
10124-101240400 = "Então, nos vemos na praia."
10124-101240410 = "Finalmente... este dia chegou."
10124-101240420 = "O tamanho do maiô também está perfeito."
10124-101240430 = "Você se esforçou muito, Hasumi."
10124-101240440 = "Incrível... é inacreditável...!"
10124-101240450 = "Sim, realmente..."
10124-101240460 = "Naturalmente, evitei lanches durante o trabalho..."
10124-101240470 = "Dias amargos de resistir à sobremesa após as refeições..."
10124-101240480 = "Fui forçada a recusar o rocambole que recebi da Tea Party..."
10124-101240490 = "E aguentei até mesmo o bolo de edição limitada do Miracle 5000 que nunca provei...!"
10124-101240500 = "H-Hasumi...?"
10124-101240510 = "Calma! O objetivo está bem na sua frente!"
10124-101240520 = "……Minhas desculpas."
10124-101240530 = "Parece que me descontrolei um pouco."
10124-101240540 = "Muito obrigada por hoje."
10124-101240550 = "Professor... parece que só mostro esse tipo de lado para você, não é?"
10124-101240560 = "Sua saúde é a prioridade."
10124-101240570 = "Se quiser sair de novo, me ligue a qualquer hora!"
10124-101240580 = "Sim, obrigada."
10124-101240590 = "Professor."
10124-101240600 = "Você disse para ligar a qualquer hora, mas..."
10124-101240610 = "Que ótimo momento! Você consegue vir para a praia?"
10124-101240620 = "Você poderia vir para a praia esta noite?"
10124-101240630 = "……Sim?"
10124-101240640 = "Entendido."
10124-101240650 = "Estou a caminho."
10124-101240660 = "Professor."
10124-101240670 = "Com certeza não vou esquecer este verão."
10124-101240680 = "Que bom!"
10124-101240690 = "Eu também me diverti!"
10124-101240700 = "Foi a primeira vez que me diverti tanto com o 'verão'."
10124-101240710 = "Obrigada por me dar memórias tão especiais."
10124-101240720 = "Eu também me diverti muito, do começo ao fim."
10124-101240730 = "Hehe..."
10124-101240740 = "As aulas de natação... o jantar que o Professor me ofereceu..."
10124-101240750 = "A beleza dos fogos de artifício..."
10124-101240760 = "Não vou esquecer nada do que aconteceu neste verão... hehe."
