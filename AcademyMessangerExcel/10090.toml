[translation]
10090-100900010 = "先生！お祭りですよ～！"
10090-100900020 = "ん……？どこかでお祭りがあるの？"
10090-100900030 = "あ、そうでした。先生はご存知ないか……"
10090-100900040 = "あの……先生、今日は百鬼夜行に用事があると仰ってましたよね？"
10090-100900050 = "ちょうど百鬼夜行で、夕方からお祭りが開催される予定なんです"
10090-100900060 = "ご都合が合えば、ぜひいらしてください！"
10090-100900070 = "いいね。お祭りにはあまり縁がなかったけど……"
10090-100900080 = "心配はいりません！"
10090-100900090 = "私がお祭りを100％楽しめるようにご案内しますから！"
10090-100900100 = "それでは、夕方にお会いしましょう！"
10090-100900110 = "会場でお待ちしてますね！"
10090-100900120 = "こんにちは、先生"
10090-100900130 = "えっと、今日のご予定を伺ってもよいでしょうか……？"
10090-100900140 = "特に急ぎの予定はないかな"
10090-100900150 = "なんだか、百夜堂に行きたい気分かも……"
10090-100900160 = "本当ですか！"
10090-100900170 = "私、今日は百夜堂でお仕事なので……、先生が来てくれたらとても嬉しいです！"
10090-100900180 = "いつごろお越しになれそうですか……？"
10090-100900190 = "午後になりそうかな？"
10090-100900200 = "わかりました！"
10090-100900210 = "それなら、百夜堂でお会いできそうですね"
10090-100900220 = "お待ちしてます！"
10090-100900230 = "先生……"
10090-100900240 = "その、今日はお忙しいでしょうか……？もしよろしければ、あの……"
10090-100900250 = "百夜堂に行こうか？"
10090-100900260 = "えへへっ。……はい！"
10090-100900270 = "ありがとうございます、先生～"
10090-100900280 = "それでは、百夜堂でお待ちしてますね！"
10090-100900290 = "先生、この前は失礼いたしました……"
10090-100900300 = "ウミカのほうは、もう落ち着いたかな？"
10090-100900310 = "はい。おかげさまで……"
10090-100900320 = "あの、先生にご相談したいことがあるんです"
10090-100900330 = "この前の件と、すこし関係するのですが……"
10090-100900340 = "もしご都合がよろしければ……"
10090-100900350 = "百夜堂まで来ていただけないでしょうか……？"
10090-100900360 = "今日は行ってもいいんだね！"
10090-100900370 = "え、は……はい！"
10090-100900380 = "む、むしろですね……"
10090-100900390 = "今日は是非来ていただきたいんです……"
10090-100900400 = "だから、お待ちしてますね"
10090-100900410 = "うん。百夜堂で会おうね"
10090-100900420 = "先生？"
10090-100900430 = "もういらっしゃってますか？"
10090-100900440 = "さっき着いたところだよ"
10090-100900450 = "今どのあたり？"
10090-100900460 = "ごめんなさい！"
10090-100900470 = "ちょっと遅れてしまいそうで……"
10090-100900480 = "焦らずゆっくりでいいからね"
10090-100900490 = "すぐ行きますので！"
10090-100900500 = "お疲れ様でした、先生"
10090-100900510 = "ウミカもお疲れ様"
10090-100900520 = "そうだ、人形忘れてない？"
10090-100900530 = "あ……！"
10090-100900540 = "その……よければ"
10090-100900550 = "その子を、預かっていてもらえると嬉しいです"
