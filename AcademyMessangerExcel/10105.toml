[translation]
10105-101050010 = "É uma situação inesperada."
10105-101050020 = "Não pode ser..."
10105-101050030 = "Eu, uma idol..."
10105-101050040 = "Ainda está praticando?"
10105-101050050 = "Está indo bem?"
10105-101050060 = "Ah."
10105-101050070 = "Sim."
10105-101050080 = "Graças ao Sensei, está tudo indo bem!"
10105-101050090 = "Sensei, muito obrigada por hoje."
10105-101050100 = "Graças a você, o treino progrediu bastante."
10105-101050110 = "Que bom."
10105-101050120 = "O tamagoyaki estava delicioso."
10105-101050130 = "Fico aliviada."
10105-101050140 = "Fico feliz que tenha gostado."
10105-101050150 = "Muito obrigada, Sensei."
10105-101050160 = "Não, eu é que deveria agradecer."
10105-101050170 = "Desta vez, foi algo que recebi da Mari! É a minha vitória...!"
10105-101050180 = "Uhm..."
10105-101050190 = "Nesse caso, foi bom...?"
10105-101050200 = "Fizemos o ensaio, mas..."
10105-101050210 = "Receber tanto apoio assim..."
10105-101050220 = "É a maior alegria."
10105-101050230 = "Eu já esperava!"
10105-101050240 = "A Mari é popular com todo mundo!"
10105-101050250 = "...M-mesmo?"
10105-101050260 = "Ainda não me sinto como uma idol..."
10105-101050270 = "Ah, falando nisso..."
10105-101050280 = "Como posso dizer..."
10105-101050290 = "Havia alguém que estava torcendo de uma forma peculiar."
10105-101050300 = "Foi inesperado."
10105-101050310 = "Tantas pessoas assim..."
10105-101050320 = "O que será que significa...?"
10105-101050330 = "Eu já esperava!"
10105-101050340 = "A Mari é popular com todo mundo!"
10105-101050350 = "Sensei...?"
10105-101050360 = "É como a mensagem de antes..."
10105-101050370 = "De qualquer forma, muito obrigada por hoje."
10105-101050380 = "Uhm..."
10105-101050390 = "Desta vez..."
10105-101050400 = "Por favor, deixe-me mostrar a roupa para o Sensei."
10105-101050410 = "Mais do que eu pensava..."
10105-101050420 = "A agenda ficou bem apertada, não é?"
10105-101050430 = "Mas fico feliz que todos tenham gostado."
10105-101050440 = "Então haverá uma apresentação extra?"
10105-101050450 = "Terá outro show?"
10105-101050460 = "Uhm..."
10105-101050470 = "Não sei se podemos chamar de apresentação extra, mas..."
10105-101050480 = "O próximo show foi decidido."
10105-101050490 = "Houve um pedido de todos."
10105-101050500 = "Muito obrigada por terem vindo hoje!"
10105-101050510 = "Sinto como se tivesse recebido um presente surpresa."
10105-101050520 = "Faça o seu melhor no resto do show também."
10105-101050530 = "Vou te apoiar até o fim."
10105-101050540 = "Sim!"
10105-101050550 = "Por favor, venha me ver de novo, Sensei."
10105-101050560 = "Sensei."
10105-101050570 = "Se possível..."
10105-101050580 = "Esta noite..."
10105-101050590 = "Você poderia me dar um pouco do seu tempo?"
10105-101050600 = "Claro, Mari."
10105-101050610 = "Aconteceu alguma coisa?"
10105-101050620 = "Muito obrigada."
10105-101050630 = "Sobre o assunto, depois que nos encontrarmos..."
10105-101050640 = "Então..."
10105-101050650 = "Conto com você."
10105-101050660 = "Sensei."
10105-101050670 = "Obrigada por me acompanhar."
10105-101050680 = "Se eu tiver outra chance de subir ao palco,"
10105-101050690 = "farei o meu melhor naquela hora."
10105-101050700 = "Tenho certeza que todos vão te receber de braços abertos!"
10105-101050710 = "Não é como se fosse acabar aqui. Está tudo bem."
10105-101050720 = "Hehe."
10105-101050730 = "Muito obrigada."
10105-101050740 = "Então, Sensei, boa noite."
10105-101050750 = "...Da próxima vez, se não for muito incômodo,"
10105-101050760 = "por favor, me deixe cantar."
