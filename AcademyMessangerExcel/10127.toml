[translation]
10127-101270010 = "Professor, aqui é a Sakurai Miyu."
10127-101270020 = "Sobre o meu turno de amanhã..."
10127-101270030 = "Se for causar algum incômodo, eu preferiria adiar."
10127-101270040 = "Aguardo sua resposta."
10127-101270050 = "Não preciso me preocupar...?"
10127-101270060 = "Entendido. Então, desta vez..."
10127-101270070 = "Não, não, não adie!"
10127-101270080 = "Estou ansioso para te encontrar, Miyu!!"
10127-101270090 = "Hyaaaah..."
10127-101270100 = "Me desculpe, eu deveria estar de plantão, mas fui embora por conta própria..."
10127-101270110 = "Às vezes, a gente só quer sair para se distrair, né?"
10127-101270120 = "Obrigada..."
10127-101270130 = "Então, aqueles dois conseguem vencer a unidade de tanques?"
10127-101270140 = "Uaaaaahhhhhhh"
10127-101270150 = "Entendido."
10127-101270160 = "Então, que tal às 14h?"
10127-101270170 = "Hmm...?"
10127-101270180 = "Ah!"
10127-101270190 = "Me desculpe."
10127-101270200 = "Eu errei. Por favor, esqueça."
10127-101270210 = "Professor."
10127-101270220 = "Você tem um tempinho?"
10127-101270230 = "Ah, vou deixar livre...!"
10127-101270240 = "Vou deixar livre, então...!"
10127-101270250 = "...O-o que aconteceu?"
10127-101270260 = "Me desculpe, Professor..."
10127-101270270 = "Por te arrastar por aí..."
10127-101270280 = "Não, foi divertido."
10127-101270290 = "Obrigada."
10127-101270300 = "Então, uhm..."
10127-101270310 = "Da próxima vez também..."
10127-101270320 = "Professor."
10127-101270330 = "Ouvi dizer que você tem ido muito à Caçada Selvagem ultimamente."
10127-101270340 = "Sim, por causa do comércio de obras de arte e do trabalho de desembaraço aduaneiro."
10127-101270350 = "Havia muitos procedimentos."
10127-101270360 = "Ah, é mesmo..."
10127-101270370 = "Miyu?"
10127-101270380 = "Aquele prédio que visitamos hoje..."
10127-101270390 = "Se você virar à esquerda na escultura roxa,"
10127-101270400 = "É um atalho."
10127-101270410 = "Ah, sim. Obrigado, Miyu."
10127-101270420 = "...A propósito, minha rota de viagem..."
10127-101270430 = "Por que você sabe de tudo?"
10127-101270440 = "...Miyu?"
