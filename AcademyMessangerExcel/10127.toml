[translation]
10127-101270010 = "先生、桜井ミヨです"
10127-101270020 = "明日の当番なのですが……"
10127-101270030 = "ご迷惑になりそうでしたら、見送らせていただければと"
10127-101270040 = "お返事お待ちしております"
10127-101270050 = "気にしなくていい……？"
10127-101270060 = "かしこまりました、では今回は……"
10127-101270070 = "いやいや、見送らないで！"
10127-101270080 = "ミヨに会うのを楽しみにしているよ！！"
10127-101270090 = "ひゃうぅ……"
10127-101270100 = "すみません、当番だったのに勝手に帰ってしまって……"
10127-101270110 = "気晴らしに出かけたくなるときもあるよね"
10127-101270120 = "ありがとうございます……"
10127-101270130 = "それで、あの二人は戦車部隊に勝てるの？"
10127-101270140 = "うああああああああああああ"
10127-101270150 = "承知いたしました"
10127-101270160 = "では、14時からはいかがでしょうか？"
10127-101270170 = "うん……？"
10127-101270180 = "あっ"
10127-101270190 = "ごめんなさい"
10127-101270200 = "間違えました。忘れてください"
10127-101270210 = "先生"
10127-101270220 = "少しお時間いいですか？"
10127-101270230 = "あ、空けておきます……！"
10127-101270240 = "空けておきますから……！"
10127-101270250 = "……ど、どうしたんですか？"
10127-101270260 = "すみません、先生……"
10127-101270270 = "引っ張り回してしまって……"
10127-101270280 = "ううん、楽しかったよ"
10127-101270290 = "ありがとうございます"
10127-101270300 = "では、その"
10127-101270310 = "また次も……"
10127-101270320 = "先生"
10127-101270330 = "最近よくワイルドハントにいらっしゃるとか"
10127-101270340 = "うん、芸術品の取引や通関周りの仕事でね"
10127-101270350 = "色々と手続きも多かったんだ"
10127-101270360 = "へえ……"
10127-101270370 = "ミヨ？"
10127-101270380 = "今日訪れたあの建物ですが"
10127-101270390 = "紫色の彫刻像を左に曲がると"
10127-101270400 = "近道ですよ"
10127-101270410 = "あ、うん。ありがとう、ミヨ"
10127-101270420 = "……ところで、私の移動ルート"
10127-101270430 = "なんで全部知ってるの？"
10127-101270440 = "……ミヨ？"
