[translation]
10074-100740010 = "Olá, Sensei."
10074-100740020 = "Você tem um tempinho agora?"
10074-100740030 = "Tudo bem, Hanako."
10074-100740040 = "Aconteceu alguma coisa?"
10074-100740050 = "Não é nada demais, mas..."
10074-100740060 = "É que..."
10074-100740070 = "Aconteceu uma coisa boa♡"
10074-100740080 = "Uma coisa boa?"
10074-100740090 = "Vindo de você, Hanako, soa meio sugestivo..."
10074-100740100 = "Fufu."
10074-100740110 = "É que..."
10074-100740120 = "Eu queria muito que você visse."
10074-100740130 = "Sensei, o que foi?"
10074-100740140 = "Isso não foi o combinado!"
10074-100740150 = "Você não disse que eu podia ficar tranquila aqui?!"
10074-100740160 = "Ora."
10074-100740170 = "De fato, eu disse isso, mas..."
10074-100740180 = "Isso é só para quando estamos a sós, sabe?"
10074-100740190 = "Ufufu."
10074-100740200 = "♡"
10074-100740210 = "A água daqui é tão boa, não é?"
10074-100740220 = "É tão cristalina..."
10074-100740230 = "Você está no mar, por acaso?"
10074-100740240 = "Não."
10074-100740250 = "Eu também gosto do mar, mas agora estou em outro lugar."
10074-100740260 = "Se tiver a chance, você não quer ver também, Sensei?"
10074-100740270 = "É uma pena que você me deixou para trás, Sensei."
10074-100740280 = "Eu queria esperar minhas roupas secarem para voltarmos juntos, mas..."
10074-100740290 = "Isso já é demais..."
10074-100740300 = "Baixei a guarda por um momento..."
10074-100740310 = "Ufufu, é brincadeira."
10074-100740320 = "Foi um momento muito divertido. Obrigada, Sensei."
10074-100740330 = "Sensei."
10074-100740340 = "Onde você está agora?"
10074-100740350 = "É que... eu queria conversar sobre uma coisa..."
10074-100740360 = "O que foi?"
10074-100740370 = "Quer um conselho?"
10074-100740380 = "Sim."
10074-100740390 = "Se puder me dizer onde está,"
10074-100740400 = "Eu vou aí agora mesmo♡"
