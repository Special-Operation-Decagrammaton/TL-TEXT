[translation]
10066-100660010 = "Uhm... Sensei..."
10066-100660020 = "Aris, o que foi?"
10066-100660030 = "Por favor... ajude a Aris."
10066-100660040 = "Ah, não, deixa pra lá, não é nada!"
10066-100660050 = "Estou indo agora!"
10066-100660060 = "Sensei."
10066-100660070 = "A Aris descobriu uma coisa."
10066-100660080 = "O quê...?"
10066-100660090 = "Um novo método para aumentar o nível de maid."
10066-100660100 = "E que método é esse...?"
10066-100660110 = "Resumindo,"
10066-100660120 = "O que é uma maid! Qual é a realidade do trabalho delas!?"
10066-100660130 = "É estudar sobre isso!!"
10066-100660140 = "E eu também encontrei o material de estudo perfeito."
10066-100660150 = "Material... de maid...?"
10066-100660160 = "Sensei."
10066-100660170 = "Tenho algo importante para conversar."
10066-100660180 = "Uma conversa importante... da Aris..."
10066-100660190 = "Tenho um mau pressentimento sobre isso..."
10066-100660200 = "É uma conversa muito importante."
10066-100660210 = "Por isso, eu quero muito que você venha."
10066-100660220 = "...Certo, estou indo."
10066-100660230 = "Olá, Sensei."
10066-100660240 = "Você está ocupado hoje?"
10066-100660250 = "Não tenho nenhum plano em especial."
10066-100660260 = "Entendi... então você está livre hoje!"
10066-100660270 = "A Aris ouviu dizer que em dias assim,"
10066-100660280 = "o melhor a se fazer é uma boa limpeza!"
10066-100660290 = "Limpeza?"
10066-100660300 = "Sim!!"
10066-100660310 = "A Aris, a maid aprendiz, vai ajudar o Sensei!"
10066-100660320 = "Afinal, limpeza também é uma habilidade de uma heroína maid!"
