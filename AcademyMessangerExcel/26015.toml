[translation]
26015-260150010 = "O mar..."
26015-260150020 = "Comparado ao que dizem na TV e nas revistas,"
26015-260150030 = "não é tão mágico e brilhante assim,"
26015-260150040 = "e não tem muito o que fazer aqui, né."
26015-260150050 = "Que frieza..."
26015-260150060 = "É a sua juventude, você tem que aproveitar!"
26015-260150070 = "Haha."
26015-260150080 = "Pior que é verdade."
26015-260150090 = "Eu estive pensando desde aquela hora,"
26015-260150100 = "e no fim,"
26015-260150110 = "aproveitar o tempo livre e relaxar..."
26015-260150120 = "não é muito o meu forte, né!"
26015-260150130 = "Que frieza..."
26015-260150140 = "É a sua juventude, você tem que aproveitar!"
26015-260150150 = "A gente já não teve essa exata conversa antes?"
26015-260150160 = "Sensei, você tá acordado?"
26015-260150170 = "Tô acordado sim, o que foi?"
26015-260150180 = "Eu já ia dormir,"
26015-260150190 = "mas tô meio sem sono."
26015-260150200 = "Mas tô de boa!"
26015-260150210 = "Ah."
26015-260150220 = "Se for assim, tudo bem."
26015-260150230 = "Desculpa incomodar!"
26015-260150240 = "Então,"
26015-260150250 = "boa noite."
26015-260150260 = "Hmm."
26015-260150270 = "Sinto que saí meio no prejuízo."
26015-260150280 = "Como assim?"
26015-260150290 = "Nossa rara caminhada noturna"
26015-260150300 = "virou uma sessão de aconselhamento no meio."
26015-260150310 = "Se não conseguir dormir, pode me chamar a qualquer hora!"
26015-260150320 = "Vamos passear de novo!"
26015-260150330 = "Não,"
26015-260150340 = "isso é..."
26015-260150350 = "Quer dizer..."
26015-260150360 = "...Entendido!"
26015-260150370 = "Boa noite, Sensei."
26015-260150380 = "Sensei."
26015-260150390 = "Já dormiu?"
26015-260150400 = "Tô acordado!"
26015-260150410 = "Tava te esperando!"
26015-260150420 = "Então..."
26015-260150430 = "Tem um tempinho livre agora?"
26015-260150440 = "Haha."
26015-260150450 = "Aí vem você de novo~"
26015-260150460 = "Vou te encontrar na frente da pousada."
26015-260150470 = "Certo~"
26015-260150480 = "Me desculpe..."
26015-260150490 = "O que aconteceu?"
26015-260150500 = "O que foi?"
26015-260150510 = "Ugh..."
26015-260150520 = "Você vai mesmo"
26015-260150530 = "fazer eu falar isso?"
26015-260150540 = "...É sobre a noite passada."
26015-260150550 = "Tenho uma coisa pra te falar,"
26015-260150560 = "Oi?"
26015-260150570 = "Encontro na frente da pousada!"
26015-260150580 = "Ah."
26015-260150590 = "Entendido."
26015-260150600 = "Poxa..."
26015-260150610 = "Eu não vou pegar leve com você, viu?"
26015-260150620 = "E-Entendido!"
26015-260150630 = "Pega leve comigo, por favor...!"
26015-260150640 = "Haha."
26015-260150650 = "Conto com você daqui pra frente, Sensei."
