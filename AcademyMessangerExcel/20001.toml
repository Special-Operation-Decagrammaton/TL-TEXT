[translation]
20001-2328 = "C&Cはミレニアムに奉仕する。それが、メイドとしての仕事だから"
20001-2329 = "どんな任務か知らないけど、明日の任務はミレニアムの市街地で行うらしい"
20001-2330 = "メイドの任務っていうと……掃除？"
20001-2331 = "気を付けてね"
20001-2332 = "……それほど間違ってはいない"
20001-2333 = "ミレニアムに害を与える者たちを消し去ることも、"
20001-2334 = "多分、掃除と呼ぶだろうし"
20001-2335 = "もちろん、掃除でも、そうでなくても……"
20001-2336 = "心配してくれてありがとう"
20001-2337 = "どんな任務でも……C&Cは、全力で奉仕する"
20001-2338 = "さっきは助かった、ありがとう。感謝してもしきれないな"
20001-2339 = "今度いつか、奉仕でお返ししたい"
20001-2340 = "私にもっと力があれば、"
20001-2341 = "この世から「数学」という科目を消し去るのに……"
20001-2342 = "急にどうしたの？"
20001-2343 = "急な愚痴で申し訳ない……"
20001-2344 = "図書館へ行く途中にふと、先生に聞いてほしくなって"
20001-2345 = "その、二つ目の夢は……叶った時にちゃんと教える"
20001-2346 = "誰にも言ったことない、けど"
20001-2347 = "どっちにせよ、一番最初に知るのは先生だろうし……"
20001-2348 = "先生、衝撃のニュースだ"
20001-2349 = "衝撃のニュース？"
20001-2350 = "前向きなニュースだと良いな"
20001-2351 = "テスト、完全に惨敗 (*‿*)ノ"
20001-2352 = "……あれ、この絵文字、合ってる？"
20001-2353 = "先生、ありがとう。今日は楽しかった"
20001-2354 = "……本当に、心から"
20001-2355 = "先生は、先生だけど……"
20001-2356 = "友人として頼みたい。私の悩みを、聞いてくれない？"
20001-2357 = "もちろん、どうしたの？"
20001-2358 = "分かった、どこに行けばいいかな？"
20001-2359 = "ありがとう"
20001-2360 = "ミレニアムの屋上に来てほしい"
20001-2361 = "先生、すごいことがあったんだ"
20001-2362 = "ピザを買って教室に入ったら、さっき先生に話した友人がそこで待ってて"
20001-2363 = "……彼女は、サラダを買ってきてくれてた"
20001-2364 = "嬉しかった、すごく"
20001-2365 = "友人に急用ができたらしくて、代わりにバイトに行くことになった"
20001-2366 = "可愛い制服で有名なお店みたいだから、楽しみだ"
20001-2367 = "可愛いユニフォームを着たカリン、見たいな"
20001-2368 = "……そのお店、大丈夫？"
20001-2369 = "そ、そう言ってくれるのは、嬉しい、けど"
20001-2370 = "……ちょっと、恥ずかしい"
20001-2371 = "ん？どういうこと？"
20001-2372 = "たとえどこであっても、"
20001-2373 = "C&Cのメイドとして必要とされてるのであれば、"
20001-2374 = "私は、助けになりたい"
20001-2375 = "じゃあ、そろそろ行ってくる"
20001-2376 = "慣れてきたら、先生のことも招待するから"
20001-2377 = "そういえば、先生……"
20001-2378 = "私がその……あのポーズをした時、タブレットを構えてた気がするけど……"
20001-2379 = "まさか、撮ってないよね？"
20001-2380 = "カリンは撮ってないよ。笑顔が眩しいキャサリンは撮ったけど"
20001-2381 = "黙秘権を行使します"
20001-2382 = "今すぐ消して！"
20001-2383 = "ちょっと、先生！？既読無視しないで！"
20001-2384 = "先生"
20001-2385 = "友人の用事は無事終わったらしい"
20001-2386 = "これでもう、メイドカフェに代わりに行く必要もない"
20001-2387 = "お疲れ様！"
20001-2388 = "最後にもう一度見たかった！"
20001-2389 = "うん。まあ色々あったけど、友達にも助かったと言ってもらえた"
20001-2390 = "残念だけど、もう私がメイドカフェで仕事をすることはないから"
20001-2391 = "もう先生にあの、萌え萌えキュンもやってあげられないね"
20001-2392 = "残念……だったり、する？"
20001-2393 = "……なんてね。何にせよこれからもよろしく"
20001-2394 = "私の、ご主人様"
