[translation]
20001-2328 = "A C&C serve a Millennium. Esse é o meu trabalho como empregada."
20001-2329 = "Não sei que tipo de missão é, mas parece que a missão de amanhã será na área urbana de Millennium."
20001-2330 = "Quando você diz missão de empregada... é limpeza?"
20001-2331 = "Tome cuidado."
20001-2332 = "……Não está tão errado assim."
20001-2333 = "Eliminar aqueles que trazem perigo a Millennium,"
20001-2334 = "provavelmente também pode ser chamado de limpeza."
20001-2335 = "Claro, sendo limpeza ou não……"
20001-2336 = "Obrigada por se preocupar."
20001-2337 = "Seja qual for a missão…… a C&C servirá com força total."
20001-2338 = "Obrigada pela ajuda de agora há pouco. Não tenho como agradecer o suficiente."
20001-2339 = "Algum dia, quero retribuir com meus serviços."
20001-2340 = "Se eu tivesse mais poder,"
20001-2341 = "eu apagaria a matéria chamada 'Matemática' deste mundo……"
20001-2342 = "O que houve de repente?"
20001-2343 = "Desculpe pelo desabafo repentino……"
20001-2344 = "No caminho para a biblioteca, de repente, senti vontade de que o Sensei me ouvisse."
20001-2345 = "Sobre aquele segundo sonho…… eu te contarei quando ele se realizar."
20001-2346 = "Nunca contei a ninguém, mas"
20001-2347 = "de qualquer forma, o Sensei seria o primeiro a saber……"
20001-2348 = "Sensei, uma notícia chocante."
20001-2349 = "Uma notícia chocante?"
20001-2350 = "Espero que seja uma notícia positiva."
20001-2351 = "No teste, fui completamente derrotada (*‿*)ノ"
20001-2352 = "……Ei, esse emoji está correto?"
20001-2353 = "Sensei, obrigada. Hoje foi divertido."
20001-2354 = "……De verdade, do fundo do coração."
20001-2355 = "O Sensei é o Sensei, mas……"
20001-2356 = "Como amigo, quero te pedir um favor. Pode ouvir o meu problema?"
20001-2357 = "Claro, o que houve?"
20001-2358 = "Entendido, onde devo ir?"
20001-2359 = "Obrigada."
20001-2360 = "Quero que venha ao terraço de Millennium."
20001-2361 = "Sensei, aconteceu algo incrível."
20001-2362 = "Quando comprei uma pizza e entrei na sala de aula, a amiga de quem falei para o Sensei estava me esperando lá."
20001-2363 = "……Ela tinha comprado salada para mim."
20001-2364 = "Fiquei muito feliz, de verdade."
20001-2365 = "Parece que minha amiga teve um imprevisto, então vou trabalhar no lugar dela."
20001-2366 = "Dizem que é uma loja famosa pelos uniformes fofos, estou ansiosa."
20001-2367 = "Quero ver a Karin usando um uniforme fofo."
20001-2368 = "……Essa loja, é segura?"
20001-2369 = "V-você dizer isso me deixa feliz, mas"
20001-2370 = "……É um pouco vergonhoso."
20001-2371 = "Hm? O que quer dizer?"
20001-2372 = "Não importa onde seja,"
20001-2373 = "se eu for necessária como uma empregada da C&C,"
20001-2374 = "eu quero ser útil."
20001-2375 = "Bem, já vou indo."
20001-2376 = "Quando eu me acostumar, convidarei o Sensei também."
20001-2377 = "Falando nisso, Sensei……"
20001-2378 = "Quando eu fiz aquela... aquela pose, eu tive a impressão de que você estava segurando um tablet..."
20001-2379 = "Não me diga que você tirou uma foto, né?"
20001-2380 = "Karin não tirou. Mas eu tirei uma da Catherine com um sorriso radiante."
20001-2381 = "Eu exerço meu direito de permanecer em silêncio."
20001-2382 = "Apague agora mesmo!"
20001-2383 = "Ei, Sensei!? Não me ignore depois de ler!"
20001-2384 = "Sensei"
20001-2385 = "Parece que o compromisso da minha amiga terminou bem."
20001-2386 = "Com isso, não preciso mais ir ao maid café no lugar dela."
20001-2387 = "Bom trabalho!"
20001-2388 = "Eu queria ter visto mais uma vez antes de acabar!"
20001-2389 = "Sim. Bem, aconteceram várias coisas, mas minha amiga disse que eu a ajudei muito."
20001-2390 = "É uma pena, mas não vou mais trabalhar no maid café."
20001-2391 = "Então não poderei mais fazer aquele 'moe moe kyun' para você, Sensei."
20001-2392 = "Você está... triste com isso?"
20001-2393 = "……Brincadeira. De qualquer forma, continue contando comigo daqui para frente."
20001-2394 = "Meu mestre."
