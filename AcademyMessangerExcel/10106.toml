[translation]
10106-101060010 = "Sensei, tenho boas notícias."
10106-101060020 = "Todo o meu esforço até agora..."
10106-101060030 = "...finalmente... deu frutos. Hehe."
10106-101060040 = "...Sakurako-san?"
10106-101060050 = "O que aconteceu?"
10106-101060060 = "O que você fez dessa vez?"
10106-101060070 = "Hehe."
10106-101060080 = "Estou indo para aí agora."
10106-101060090 = "Bem..."
10106-101060100 = "Me desculpe, Sensei."
10106-101060110 = "Realizamos uma nova reunião, mas..."
10106-101060120 = "...como esperado, é difícil preparar trajes para todos..."
10106-101060130 = "...É verdade, né?"
10106-101060140 = "Não seria bom se a Sakurako usasse só de vez em quando?"
10106-101060150 = "Sim."
10106-101060160 = "No entanto..."
10106-101060170 = "...recebemos a opinião de que ela não deveria usá-lo durante as atividades de Irmã."
10106-101060180 = ""
10106-101060190 = "Embora haja muitas vozes positivas,"
10106-101060200 = "não é tão simples assim, né?"
10106-101060210 = "Tudo tem um limite, né?"
10106-101060220 = "Nem todo mundo pensa igual, né?"
10106-101060230 = "Entendi..."
10106-101060240 = "Certo."
10106-101060250 = "Então, que você tenha um dia de paz hoje também."
10106-101060260 = "Sensei."
10106-101060270 = "Você tem um momento agora?"
10106-101060280 = "Tenho algo para discutir."
10106-101060290 = "...Sakurako?"
10106-101060300 = "Aconteceu alguma coisa?"
10106-101060310 = "Bem..."
10106-101060320 = "...é difícil explicar por mensagem..."
10106-101060330 = "Se não se importar,"
10106-101060340 = "gostaria de encontrá-lo pessoalmente."
10106-101060350 = "Muito obrigada, Sensei."
10106-101060360 = "Para ser sincera, eu estava muito ansiosa,"
10106-101060370 = "mas graças ao Sensei, fiz amigos importantes."
10106-101060380 = "Que bom!"
10106-101060390 = "Parabéns!"
10106-101060400 = "Hehe."
10106-101060420 = "A equipe da loja tirou as fotos para nós."
10106-101060430 = "Parece que todos virão ao show também."
10106-101060440 = "Ah, e..."
10106-101060450 = "...eu disse que gostaria de continuar sendo chamada de 'Sakura-chan',"
10106-101060460 = "...mas as Irmãs me impediram..."
10106-101060470 = "Ah, entendi..."
10106-101060480 = "Dizer isso na frente de todo mundo é demais..."
10106-101060490 = "Sim."
10106-101060500 = "É um pouco decepcionante, mas fico feliz que tenha dado certo."
10106-101060510 = "As atividades de idol são tão difíceis assim, né?"
10106-101060520 = "Se fosse um profissional, tudo bem, mas..."
10106-101060530 = "Mesmo como parte de um evento escolar, não esperava que fosse tão agitado."
10106-101060540 = "Você está bem?"
10106-101060550 = "Não está se esforçando demais?"
10106-101060560 = "Obrigada pela preocupação."
10106-101060570 = "Eu só fiquei um pouco desanimada."
10106-101060580 = "Para corresponder ao apoio de todos,"
10106-101060590 = "Não posso descansar, não é?"
10106-101060600 = "...Quer que eu ajude em algo?"
10106-101060610 = "Podemos nos encontrar mais tarde?"
10106-101060620 = "Hã?"
10106-101060630 = "Bem, não me importo, mas..."
10106-101060640 = "Muito obrigada por hoje, Sensei."
10106-101060650 = "Parece que será uma lembrança inesquecível."
10106-101060660 = "Que bom que você gostou."
10106-101060670 = "Acho que todos também gostaram."
10106-101060680 = "Sim."
10106-101060690 = "É um presente precioso que recebi de todos."
10106-101060700 = "Mais tarde,"
10106-101060710 = "Eu disse que queria exibi-lo na Catedral, mas..."
10106-101060720 = "Você incomodou todo mundo de novo?"
10106-101060730 = "Eu imaginei que a Sakurako diria isso, mas..."
10106-101060740 = "..."
10106-101060750 = "Infelizmente,"
10106-101060760 = "Fui impedida."
10106-101060770 = "Por enquanto, pretendo guardá-lo com carinho."
10106-101060790 = "Sensei♡"
10106-101060800 = "Sou a Idol☆Sakurako!"
10106-101060810 = "Vou roubar um pouco do seu tempo, Sensei!"
10106-101060820 = "Coração acelerado, tum-tum-tum♡"
10106-101060830 = "O que aconteceu agora!?"
10106-101060840 = "O que diabos aconteceu com a Sakurako-san...?"
10106-101060850 = "Hehe, é muito cedo para se surpreender~!"
10106-101060860 = "Não é Sakurako-san, é Sakurako-chan!"
10106-101060870 = "Mas, por favor, fique tranquilo!"
10106-101060880 = "Porque agora, eu sou a idol do Sensei☆"
10106-101060890 = "..."
10106-101060900 = "As Irmãs me deram"
10106-101060910 = "alguns conselhos, mas..."
10106-101060920 = "Ah, entendi..."
10106-101060930 = "Já entendi a maior parte."
10106-101060940 = "Que bom."
10106-101060950 = "Estarei esperando, Sensei♡"
10106-101060960 = "Sensei."
10106-101060970 = "Bem, me desculpe."
10106-101060980 = "Ainda assim, não consigo parar de pensar nisso..."
10106-101060990 = "Uhm..."
10106-101061000 = "Você realmente se divertiu...?"
10106-101061010 = "Sim, muito."
10106-101061020 = "Obrigado, Sakurako. Foi uma ótima lembrança."
10106-101061030 = "…Que bom."
10106-101061040 = "Mesmo estando ocupado(a),"
10106-101061050 = "Muito obrigado(a) por hoje novamente."
10106-101061060 = "Conto com você de agora em diante."
