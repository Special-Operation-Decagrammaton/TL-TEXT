[translation]
10043-100430010 = "Sensei, há quanto tempo."
10043-100430020 = "Hoje parece um dia de verão escaldante, você está bem?"
10043-100430030 = "Obrigado por se preocupar, Wakamo. Eu estou bem."
10043-100430040 = "E você, Wakamo, está se sentindo bem?"
10043-100430050 = "Ah... Essa sua resposta gentil de sempre..."
10043-100430060 = "Sim, não se preocupe. Esta Wakamo aqui tem muita confiança na própria saúde."
10043-100430070 = "Estar com saúde é o mais importante."
10043-100430080 = "Ufufu... A propósito, Sensei."
10043-100430090 = "Esta Wakamo sabe muito bem que você está extremamente ocupado, mas..."
10043-100430100 = "Será que hoje também...?"
10043-100430110 = "Sim, planejo ficar na Schale o dia todo hoje... Por quê?"
10043-100430120 = "Entendo... É bom que possa evitar o calor impiedoso do sol, mas..."
10043-100430130 = "Isso significa que, para você, hoje será um dia nada parecido com o verão..."
10043-100430140 = "Sim... Isso é tão..."
10043-100430150 = "Uhm... Wakamo?"
10043-100430160 = "Entendido."
10043-100430170 = "Se for por você, esta Wakamo vai arregaçar as mangas e mostrar do que é capaz."
10043-100430180 = "Por favor, aguarde ansiosamente ♥"
10043-100430190 = "Eh...?"
10043-100430200 = "...O-o que você quer dizer?"
10043-100430210 = "Sensei, você está bem?"
10043-100430220 = "Ouvi dizer que você está na praia hoje a trabalho para a Schale."
10043-100430230 = "Sim, estou... Mas onde foi que você ouviu isso, Wakamo...?"
10043-100430240 = "É sobre o festival de fogos de artifício que eu estava preparando outro dia."
10043-100430250 = "Ah, então era isso...!"
10043-100430260 = "Então... Se não for incômodo, eu gostaria de cumprimentá-lo, Sensei..."
10043-100430270 = "Desculpe! Hoje estou muito ocupado... Fica para a próxima, ok?"
10043-100430280 = "Oh... Entendo."
10043-100430290 = "Depois que eu terminar uma parte do trabalho, talvez dê...!"
10043-100430300 = "Depois do trabalho, então..."
10043-100430310 = "...Entendido. Nesse caso, é uma pena, mas deixemos para a próxima."
10043-100430320 = "Estarei esperando... Ufufu."
10043-100430330 = "Sensei, você está bem? ...Então, se não for incômodo."
10043-100430340 = "Como você me prometeu da outra vez, poderíamos..."
10043-100430350 = "Desculpe, Wakamo. Estou um pouco ocupado agora..."
10043-100430360 = "Pode esperar só um pouquinho?"
10043-100430370 = "Sim. Entendido."
10043-100430380 = "Esta Wakamo esperará por você para sempre."
10043-100430390 = "Muito obrigado pelo dia de hoje."
10043-100430400 = "Para esta Wakamo, o dia de hoje se tornou um dia de memórias preciosas."
10043-100430410 = "Não, eu que agradeço."
10043-100430420 = "Da próxima vez, vamos nos encontrar de um jeito mais normal."
10043-100430430 = "Sim, gravarei essas suas palavras no fundo do meu coração."
10043-100430440 = "Da próxima vez... Vejamos."
10043-100430450 = "Para que algo assim não aconteça, farei como sempre."
10043-100430460 = "Irei visitá-lo pelo portão principal da Schale."
10043-100430470 = "Ah, mas o portão principal costuma ter segurança."
10043-100430480 = "Ufufu, uma segurança como essa não é obstáculo algum para esta Wakamo."
10043-100430490 = "...Wakamo? Espere um pouco, isso quer dizer..."
10043-100430500 = "Fuichi"
10043-100430510 = "Eh, Wakamo!? Espere!?"
10043-100430520 = "Sensei, o calor intenso tem continuado,"
10043-100430530 = "mas você está se sentindo bem?"
10043-100430540 = "Quero ir para a praia..."
10043-100430550 = "Quero descansar na praia..."
10043-100430560 = "Nesse caso..."
10043-100430570 = "Esta Wakamo conhece uma praia tranquila."
10043-100430580 = "Se desejar, não gostaria de passar um tempo lá?"
10043-100430590 = "Boa ideia!"
10043-100430600 = "Vamos agora mesmo!"
10043-100430610 = "Ufufu, muito obrigada."
10043-100430620 = "Então, com toda a responsabilidade, eu o guiarei."
10043-100430630 = "Nos vemos mais tarde no local combinado."
10043-100430640 = "Hoje foi muito divertido."
10043-100430650 = "Se tivermos outra oportunidade, gostaria de ir à praia com você novamente."
10043-100430660 = "Sim, graças a você, eu também me diverti."
10043-100430670 = "Ah, essas palavras fazem meu coração disparar."
10043-100430680 = "Então, até o dia em que nos encontrarmos novamente."
10043-100430690 = "Por favor, fique bem."
