[translation]
10043-100430010 = "先生、ご無沙汰しております"
10043-100430020 = "本日は真夏日のようですが、お変わりはありませんか？"
10043-100430030 = "心配してくれてありがとう、ワカモ。私は大丈夫だよ"
10043-100430040 = "ワカモこそ、体調大丈夫？"
10043-100430050 = "あぁ……いつ何時も変わらないこの優しいお返事……"
10043-100430060 = "ええ、ご安心ください。このワカモ、健康だけは自信がありますので"
10043-100430070 = "元気なのが一番だね"
10043-100430080 = "うふふ……時に、先生"
10043-100430090 = "あなた様がご多忙を極めていらっしゃる事は、このワカモもよく存じておりますが"
10043-100430100 = "もしかして、本日も……？"
10043-100430110 = "うん、今日も一日中シャーレにいる予定だけど……どうしたの？"
10043-100430120 = "そうでしたか……無慈悲な太陽の熱を避けられるのは良いことですが……"
10043-100430130 = "つまりあなた様にとって今日は、全く夏らしくない一日になってしまうのですね……"
10043-100430140 = "ええ……それは、あまりにも……"
10043-100430150 = "えっと……ワカモ？"
10043-100430160 = "よくわかりました"
10043-100430170 = "あなた様のためなら、このワカモ一肌脱いでご覧にいれましょう"
10043-100430180 = "どうぞご期待なさってくださいませ♥"
10043-100430190 = "え……？"
10043-100430200 = "……ど、どういう意味？"
10043-100430210 = "先生、お元気でしょうか？"
10043-100430220 = "本日、シャーレのお仕事で海にいらしてると伺ったのですが"
10043-100430230 = "そうだけど……ワカモは一体どこでそれを……"
10043-100430240 = "この間準備していた花火大会の件でちょっとね"
10043-100430250 = "ああ、やはり……！"
10043-100430260 = "その……もし、よろしければ先生にご挨拶したく……"
10043-100430270 = "ごめん！今日は本当に忙しくて……また今度ね！"
10043-100430280 = "あら……そうですか"
10043-100430290 = "仕事がある程度終わった後なら何とか……！"
10043-100430300 = "お仕事の後なら……"
10043-100430310 = "……分かりました。それでは、残念ですが是非また今度"
10043-100430320 = "お待ちしておりますね……うふふっ"
10043-100430330 = "先生、お元気でしょうか？……その、もしよろしければ"
10043-100430340 = "以前お約束を頂戴した通り、一緒に……"
10043-100430350 = "ごめん、ワカモ。ちょっと今忙しくて……"
10043-100430360 = "少しだけ待ってくれる？"
10043-100430370 = "はい。分かりました"
10043-100430380 = "このワカモ、いつまでもあなた様をお待ちしております"
10043-100430390 = "本日は一日、ありがとうございました"
10043-100430400 = "このワカモ、今日という日が、大切な思い出の日となりました"
10043-100430410 = "ううん、私の方こそ"
10043-100430420 = "次はもっと普通に会おうね"
10043-100430430 = "はい、あなた様のそのお言葉、胸の奥に刻んでおきます"
10043-100430440 = "次は……そうですね"
10043-100430450 = "このような事がないよう、いつもと同じように"
10043-100430460 = "シャーレの正門から、お伺いするように致します"
10043-100430470 = "あ、正門は普段セキュリティがかかっているから"
10043-100430480 = "うふふっ、そんなセキュリティなんて、このワカモには何の障害にもなりません"
10043-100430490 = "……ワカモ？ちょっと待って、それって……"
10043-100430500 = "不一"
10043-100430510 = "えっ、ワカモ！？待って！？"
10043-100430520 = "先生、厳しい暑さが続いておりますが"
10043-100430530 = "体調にお変わりはありませんか？"
10043-100430540 = "海に行きたい……"
10043-100430550 = "浜辺で休みたい……"
10043-100430560 = "それでしたら……"
10043-100430570 = "このワカモ、静かな浜辺を知っております"
10043-100430580 = "よろしければ、そちらでお過ごしになりませんか？"
10043-100430590 = "いいね！"
10043-100430600 = "今すぐ行こう！"
10043-100430610 = "うふふっ、ありがとうございます"
10043-100430620 = "それでは責任をもって、あなた様をご案内いたします"
10043-100430630 = "また後ほど、約束の場所でお会いしましょう"
10043-100430640 = "今日はとても楽しかったです"
10043-100430650 = "また機会があれば、あなた様と海に行きたいです"
10043-100430660 = "うん、おかげで私も楽しかったよ"
10043-100430670 = "あぁ、そのお言葉に胸が高鳴ります"
10043-100430680 = "それではまたお会いする日まで"
10043-100430690 = "どうかお元気で"
