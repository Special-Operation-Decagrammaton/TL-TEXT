10135-101350110 = "Professor, você está falando sério?"
10135-101350120 = "O que foi, Kay-chan?"
10135-101350130 = "Não sou a Kay-chan."
10135-101350140 = "De qualquer forma,"
10135-101350150 = "Você realmente vai vir?"
10135-101350160 = "Porque eu prometi à Kay-chan."
10135-101350170 = "Eu prometi, mas!"
10135-101350180 = "Por que você quer tanto vir assistir à aula!?"
10135-101350190 = "Observar o progresso acadêmico dos alunos"
10135-101350200 = "é meu dever como professor."
10135-101350210 = "Você só fala a coisa certa nessas horas!"
