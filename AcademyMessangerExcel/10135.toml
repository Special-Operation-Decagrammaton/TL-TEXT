10135-101350440 = "É um assunto meu."
10135-101350450 = "Hm?"
10135-101350460 = "Espere um pouco."
10135-101350470 = "Hmm..."
10135-101350480 = "Professor,"
10135-101350490 = "você está livre agora, certo?"
