[translation]
10135-101350010 = "Professor, posso falar um pouco com você?"
10135-101350020 = "O que foi, Kay-chan?"
10135-101350030 = "Não sou a Kay-chan."
10135-101350040 = "Enfim... De qualquer forma,"
10135-101350050 = "Para uma consciência que usa um objeto inanimado como recipiente,"
10135-101350060 = "como se deve aliviar o estresse?"
