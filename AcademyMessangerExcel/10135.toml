10135-101350270 = "Foi tão ruim assim...?"
10135-101350280 = "Ugh."
10135-101350290 = "Não."
10135-101350300 = "Hmm..."
10135-101350310 = "..."
10135-101350320 = "Não é que eu não goste."
10135-101350330 = "Profe"
10135-101350340 = "ssor,"
10135-101350350 = "ajuda."
10135-101350360 = "O que foi!?"
10135-101350370 = "Agora,"
10135-101350380 = "estou com um pequeno problema."
10135-101350390 = "Ah."
10135-101350400 = "De novo..."
10135-101350410 = "O que é isso?"
10135-101350420 = "Que bug é esse?"
