[translation]
26010-260100010 = "Assim como os animais selvagens da floresta se escondem com cores de camuflagem,"
26010-260100020 = "os atiradores eliminam sua presença usando trajes ghillie."
26010-260100030 = "Ao ar livre, costumamos nos cobrir com folhas e galhos, mas..."
26010-260100040 = "Em uma cidade cheia de gente, é menos chamativo usar roupas comuns."
26010-260100050 = "Por isso... a maioria dos atiradores tem roupas para se camuflar na cidade."
26010-260100060 = "Entendo, é assim mesmo, né."
26010-260100070 = "Você também tem, Miyu?"
26010-260100080 = "Bem..."
26010-260100090 = "Na verdade,"
26010-260100100 = "no meu caso, as pessoas não me notam mesmo sem camuflagem, então..."
26010-260100110 = "Além do uniforme, não tenho nada em especial..."
26010-260100120 = "Mas... como a missão desta vez será em uma vila de pescadores com quase nenhum aluno,"
26010-260100130 = "aproveitei a oportunidade para tentar me camuflar também."
26010-260100140 = "Professor, obrigado por me ajudar..."
26010-260100150 = "No fim das contas, acabei chamando a atenção dos pescadores..."
26010-260100160 = "Talvez a minha ocultação tenha falhado..."
26010-260100170 = "O peixe que você pescou era realmente grande, Miyu."
26010-260100180 = "Sim, fiquei feliz por ter pescado algo grande, mas..."
26010-260100190 = "Por ter uma presença tão apagada, acabei atraindo as pessoas justamente por isso..."
26010-260100200 = "Nada sai exatamente como a gente planeja, não é..."
26010-260100210 = "No fim, vir ao mar"
26010-260100220 = "me proporcionou uma experiência especial, diferente do habitual."
26010-260100230 = "Houve encontros inesperados,"
26010-260100240 = "e até vi figuras familiares em lugares surpreendentes..."
26010-260100250 = "…Miyu?"
26010-260100260 = "Aconteceu alguma coisa...?"
26010-260100270 = "Ah,"
26010-260100280 = "desculpe, não fui clara, né?"
26010-260100290 = "Estou falando sobre a busca pelas pedrinhas."
26010-260100300 = "Professor,"
26010-260100310 = "me desculpe..."
26010-260100320 = "Devolvi todas as pedrinhas que coletamos para os seus lugares originais."
26010-260100330 = "Você se esforçou tanto... sinto muito mesmo..."
26010-260100340 = "Está tudo bem, não se preocupe."
26010-260100350 = "Mas, por que devolveu todas...?"
26010-260100360 = "Depois que nos separamos, pensei bem sobre isso..."
26010-260100370 = "Aquelas pedrinhas estavam cumprindo seu papel silenciosamente aqui, pensei..."
26010-260100380 = "Então, só porque achei que eram bonitas, levá-las embora..."
26010-260100390 = "Senti que as pedrinhas ficariam... solitárias..."
26010-260100400 = "Mas, em vez disso..."
26010-260100420 = "Você tirou fotos delas."
26010-260100430 = "Entendi, que bom."
26010-260100440 = "Sim."
26010-260100450 = "Transformei as lembranças de hoje em um tesouro assim..."
26010-260100460 = "Passar esse tempo com o professor... foi realmente muito divertido."
26010-260100470 = "Obrigada."
26010-260100480 = "Como as missões também dependem do clima,"
26010-260100490 = "costumo olhar muito para o céu durante as missões de sniper."
26010-260100500 = "Olhar para o chão não traz muitas mudanças, mas..."
26010-260100510 = "a paisagem do céu muda rapidamente."
26010-260100520 = "Por isso... talvez seja por isso que eu consiga ficar olhando para sempre."
26010-260100530 = "Só que, o céu visto da beira da praia..."
26010-260100540 = "...parece um pouco diferente."
26010-260100550 = "Como assim, diferente?"
26010-260100560 = "Bem..."
26010-260100570 = "Ugh..."
26010-260100580 = "Desculpe."
26010-260100590 = "Eu não consigo... colocar em palavras."
26010-260100600 = "Outro dia, li uma revista de moda que tinham jogado fora..."
26010-260100610 = "Dizia que, ao mudar o estilo de roupa, você consegue atrair atenção..."
26010-260100620 = "Que, ao usar algo propositalmente inadequado para o local, você consegue atrair os olhares das pessoas..."
26010-260100630 = "Hoje, vou vestir a roupa que comprei recentemente"
26010-260100640 = "e tentar caminhar pela cidade."
26010-260100650 = "Acho que é uma boa ideia, mas..."
26010-260100660 = "Isso não é um traje de banho, né...?"
26010-260100670 = "E-então... já vou indo."
26010-260100680 = "...Miyu?"
26010-260100690 = "............Miyu-san?"
