[translation]
26010-260100010 = "Assim como os animais selvagens na floresta usam cores de proteção para se esconder..."
26010-260100020 = "Os atiradores de elite apagam a sua presença usando trajes de camuflagem (Ghillie suits)."
26010-260100030 = "Ao ar livre, costumamos nos cobrir com folhas e galhos, mas..."
26010-260100040 = "No meio da cidade cheia de pessoas, usar roupas normais chama muito menos atenção."
26010-260100050 = "Por isso... a maioria dos franco-atiradores possui roupas civis comuns para se disfarçar na cidade."
26010-260100060 = "Entendi, faz muito sentido taticamente."
26010-260100070 = "E você, Miyu, também tem roupas civis assim?"
26010-260100080 = "Uhm..."
26010-260100090 = "Na verdade,"
26010-260100100 = "No meu caso, as pessoas já não notam a minha presença mesmo sem eu me disfarçar, então..."
26010-260100110 = "Além do meu uniforme, eu não tenho nada em especial..."
26010-260100120 = "Mas... como a nossa missão atual é em uma vila de pescadores quase sem estudantes,"
26010-260100130 = "Eu gostaria de aproveitar essa oportunidade para tentar me disfarçar."
26010-260100140 = "Sensei, muito obrigada por me salvar e me ajudar mais cedo..."
26010-260100150 = "No fim das contas, acabei chamando a atenção de todos os pescadores do local..."
26010-260100160 = "Com isso, a minha operação de infiltração secreta foi um fracasso total..."
26010-260100170 = "Bom, aquele peixe que você pescou era realmente monstruoso de tão grande. Qualquer um ia parar pra ver!"
26010-260100180 = "Sim, eu fiquei muito feliz de ter pescado algo tão grande, mas..."
26010-260100190 = "Justamente por eu ter uma presença tão fraca normalmente, o choque de me verem pescando aquilo atraiu ainda mais pessoas..."
26010-260100200 = "Parece que nada na minha vida dá certo como eu planejo..."
26010-260100210 = "Como eu imaginava, vir até o mar..."
26010-260100220 = "Me proporcionou uma experiência especial e bem diferente do habitual."
26010-260100230 = "Tive encontros inesperados,"
26010-260100240 = "E encontrei figuras familiares em lugares onde eu não esperava..."
26010-260100250 = "……Miyu?"
26010-260100260 = "Aconteceu alguma coisa suspeita no píer...?"
26010-260100270 = "Ah."
26010-260100280 = "Me desculpe, eu falei de um jeito confuso, né?"
26010-260100290 = "Eu estava falando de quando fomos procurar pedrinhas bonitas."
26010-260100300 = "Sensei."
26010-260100310 = "Me perdoe..."
26010-260100320 = "Eu devolvi todas as pedrinhas que nós coletamos juntos para o lugar original delas."
26010-260100330 = "O senhor se esforçou tanto para me ajudar a catar... eu sinto muito..."
26010-260100340 = "Tudo bem, não precisa se preocupar com isso."
26010-260100350 = "Mas por que você devolveu todas...? Estavam pesando muito?"
26010-260100360 = "Depois que eu me despedi do senhor, eu parei para pensar melhor..."
26010-260100370 = "Aquelas pedrinhas estavam ali, cumprindo o seu papel na natureza em silêncio..."
26010-260100380 = "Então, levá-las para casa só porque eu as achei bonitas seria..."
26010-260100390 = "As pedrinhas... poderiam se sentir sozinhas e com saudade de casa..."
26010-260100400 = "Mas, no lugar disso..."
26010-260100420 = "Você tirou fotos delas com a câmera, não foi?"
26010-260100430 = "Que bom, fico feliz. A natureza agradece!"
26010-260100440 = "Sim."
26010-260100450 = "Com isso, as memórias de hoje se tornaram um tesouro para mim..."
26010-260100460 = "Ter passado esse tempo com o senhor... foi realmente muito divertido."
26010-260100470 = "Muito obrigada."
26010-260100480 = "Como as nossas missões são muito afetadas pelo clima,"
26010-260100490 = "Durante as operações de franco-atirador, eu acabo olhando muito para o céu."
26010-260100500 = "Ficar olhando para o chão quase nunca traz nenhuma mudança, mas..."
26010-260100510 = "O cenário do céu muda muito rápido."
26010-260100520 = "Por isso... acho que eu poderia ficar olhando para ele para sempre."
26010-260100530 = "No entanto, o céu visto da beira da praia é..."
26010-260100540 = "……Um pouco diferente."
26010-260100550 = "Diferente como? A pressão atmosférica é mais baixa?"
26010-260100560 = "Uhm..."
26010-260100570 = "Uuuh..."
26010-260100580 = "Me desculpe."
26010-260100590 = "Eu não consigo... colocar em palavras muito bem."
26010-260100600 = "Ontem eu li uma revista de moda que encontrei jogada no lixo, e lá dizia..."
26010-260100610 = "Que você pode atrair a atenção das pessoas simplesmente mudando as suas roupas..."
26010-260100620 = "Dizia que, se você ousar vestir algo que não combina nem um pouco com o ambiente em que está, isso vai prender os olhares de todo mundo..."
26010-260100630 = "Sendo assim, hoje eu decidi vestir a roupa que comprei recentemente,"
26010-260100640 = "E vou tentar dar uma caminhada pelo centro da cidade."
26010-260100650 = "Eu acho que é uma ótima ideia para melhorar a sua timidez, Miyu, mas..."
26010-260100660 = "Essa 'roupa nova' não é o seu maiô de banho, né...? O centro fica longe da praia! A polícia vai te parar por atentado ao pudor!!"
26010-260100670 = "E-Então... estou indo."
26010-260100680 = "……Miyu?"
26010-260100690 = "…………Senhorita Miyu?! Não faz isso, você vai ser presa!!"