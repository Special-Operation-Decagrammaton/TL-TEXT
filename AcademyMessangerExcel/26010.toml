[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
26010-260100010 = "Assim como os animais selvagens na floresta se escondem com cores protetoras" 
26010-260100020 = "Os atiradores de elite apagam a própria presença usando trajes camuflados (Ghillie Suits)" 
26010-260100030 = "Em ambientes abertos como florestas, costumamos nos cobrir de folhas e galhos, mas……" 
26010-260100040 = "Nas cidades com muitas pessoas, é muito mais discreto vestir roupas normais" 
26010-260100050 = "Por isso…… a grande maioria dos atiradores de elite possui roupas específicas para disfarces urbanos" 
26010-260100060 = "Entendo, faz sentido." 
26010-260100070 = "A Miyu também tem roupas assim?" 
26010-260100080 = "Bem……" 
26010-260100090 = "Na verdade" 
26010-260100100 = "No meu caso, as pessoas não me notam mesmo sem disfarces ou camuflagens, então……" 
26010-260100110 = "Tirando o meu uniforme, eu não tenho……" 
26010-260100120 = "Mas…… como a nossa operação atual é numa vila de pescadores onde quase não há alunas" 
26010-260100130 = "Aproveitarei a oportunidade para me arriscar em um disfarce" 
26010-260100140 = "Muito obrigada por ter me salvado naquele dia, Sensei……" 
26010-260100150 = "No final das contas, acabei atraindo a atenção de todos os pescadores do local……" 
26010-260100160 = "Acho que a minha missão de infiltração falhou……" 
26010-260100170 = "O peixe que a Miyu pescou era realmente imenso, não tinha como evitar" 
26010-260100180 = "Sim, fiquei feliz por ter pescado algo tão grande, mas……" 
26010-260100190 = "E pensar que a minha ausência de presença causaria o efeito contrário e aglomeraria tantas pessoas……" 
26010-260100200 = "Nem tudo sai como planejamos, não é mesmo……" 
26010-260100210 = "Como esperado, vir até o mar" 
26010-260100220 = "Me rendeu experiências muito especiais e diferentes do habitual" 
26010-260100230 = "Houve encontros muito inesperados" 
26010-260100240 = "E a visão de coisas familiares em lugares inusitados, também……" 
26010-260100250 = "……Miyu?" 
26010-260100260 = "Aconteceu alguma coisa……?" 
26010-260100270 = "Ah" 
26010-260100280 = "Me desculpe, a minha mensagem foi confusa, não é?" 
26010-260100290 = "Eu estava falando sobre a nossa busca por pedrinhas" 
26010-260100300 = "Sensei" 
26010-260100310 = "Me perdoe……" 
26010-260100320 = "As pedrinhas que coletamos juntos, eu devolvi todas aos seus lugares originais" 
26010-260100330 = "Você se esforçou tanto para procurá-las para mim…… Sinto muito mesmo……" 
26010-260100340 = "Está tudo bem, não precisa se desculpar" 
26010-260100350 = "Mas por que devolveu todas……?" 
26010-260100360 = "Depois que eu me despedi de você, fiquei pensando bastante e……" 
26010-260100370 = "Aquelas pedrinhas estavam cumprindo o seu papel quietinhas nos seus lugares, então……" 
26010-260100380 = "Achei que seria errado levá-las comigo só porque eu as achei bonitas……" 
26010-260100390 = "Senti que elas…… ficariam muito solitárias……" 
26010-260100400 = "Mas, em troca de devolvê-las……" 
26010-260100420 = "Eu tirei várias fotos" 
26010-260100430 = "Entendo, fico feliz por você" 
26010-260100440 = "Sim" 
26010-260100450 = "Guardarei as memórias de hoje como grandes tesouros……" 
26010-260100460 = "Passar esse tempo com você, Sensei…… foi realmente muito divertido" 
26010-260100470 = "Muito obrigada" 
26010-260100480 = "Como o clima influencia drasticamente as nossas missões" 
26010-260100490 = "Eu costumo olhar muito para o céu quando estou em missões de atirador de elite" 
26010-260100500 = "Quando você olha para o chão, quase não há mudanças……" 
26010-260100510 = "Mas a paisagem do céu muda a todo momento" 
26010-260100520 = "Talvez seja por isso…… que eu nunca me canso de observá-lo" 
26010-260100530 = "Porém, o céu visto da beira da praia é……" 
26010-260100540 = "……Um pouco diferente" 
26010-260100550 = "Diferente como?" 
26010-260100560 = "Ahm……" 
26010-260100570 = "Uuu……" 
26010-260100580 = "Me desculpe" 
26010-260100590 = "Não consigo…… expressar muito bem em palavras" 
26010-260100600 = "Outro dia, enquanto lia uma revista de moda que encontrei no lixo……" 
26010-260100610 = "Dizia que você pode chamar a atenção simplesmente mudando a sua roupa……" 
26010-260100620 = "Ao vestir deliberadamente roupas que não se encaixam no ambiente, você atrai os olhos das pessoas……" 
26010-260100630 = "Hoje, vou vestir a roupa que comprei recentemente" 
26010-260100640 = "E vou dar uma volta pela cidade" 
26010-260100650 = "Acho que é uma ótima ideia, mas……" 
26010-260100660 = "Você não está falando do traje de banho, não é……?" 
26010-260100670 = "E-Então…… estou indo" 
26010-260100680 = "……Miyu?" 
26010-260100690 = "…………Miyu-san?" 