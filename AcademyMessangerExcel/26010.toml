[translation]
26010-260100010 = "森の野生動物たちが保護色で身を隠すように"
26010-260100020 = "狙撃手は、ギリースーツで存在感を消すのです"
26010-260100030 = "屋外では、よく葉っぱや木の枝を身にまといますが……"
26010-260100040 = "人の多い街中では、普通の服を着た方が目立ちません"
26010-260100050 = "なので……ほとんどの狙撃手は、街中で偽装するための服を持っていたりします"
26010-260100060 = "なるほど、そうなんだね。"
26010-260100070 = "ミユも持ってるの？"
26010-260100080 = "その……"
26010-260100090 = "実は"
26010-260100100 = "私の場合、偽装しなくても人に気づかれないので……"
26010-260100110 = "制服以外、特に……"
26010-260100120 = "でも……今回の作戦は、生徒がほとんどいない漁村で行われるので"
26010-260100130 = "この機会に、私も偽装に挑戦してみたいです"
26010-260100140 = "先生、助けていただいて、ありがとうございます……"
26010-260100150 = "結局、釣り人さんたちから注目を浴びてしまいましたし……"
26010-260100160 = "これでは、潜伏失敗かもしれません……"
26010-260100170 = "ミユが釣った魚、本当に大きかったからね"
26010-260100180 = "はい、大物が釣れたのは嬉しかったですが……"
26010-260100190 = "影が薄いせいで、逆に人を集めてしまうとは……"
26010-260100200 = "何事も思ったようにはいきませんね……"
26010-260100210 = "やっぱり、海に来てみたら"
26010-260100220 = "いつもとは違う、特別な経験ができました"
26010-260100230 = "思いがけない出会いもあったり"
26010-260100240 = "意外な場所で、見慣れた姿もあったりして……"
26010-260100250 = "……ミユ？"
26010-260100260 = "何かあったの……？"
26010-260100270 = "あ"
26010-260100280 = "すみません、分かりにくかったですよね"
26010-260100290 = "小石探しの話です"
26010-260100300 = "先生"
26010-260100310 = "すみません……"
26010-260100320 = "一緒に集めた小石は、みんな元の場所に戻しました"
26010-260100330 = "頑張ってくださったのに……本当に、すみません……"
26010-260100340 = "大丈夫だよ、気にしないで"
26010-260100350 = "でも、どうして全部……？"
26010-260100360 = "先生と解散した後、よく考えてみたら……"
26010-260100370 = "あの小石たちは、ここで静かに自分の役割を果たしていたのだな、と……"
26010-260100380 = "なので、素敵だと思ったからといって、連れ帰ってしまうのは……"
26010-260100390 = "小石たちが……寂しい思いをしてしまいそうで……"
26010-260100400 = "ですが、その代わりに……"
26010-260100420 = "写真に収めたんだ"
26010-260100430 = "そっか、良かったね"
26010-260100440 = "はい"
26010-260100450 = "今日の思い出を、こうして宝物に……"
26010-260100460 = "先生と一緒に過ごせて……本当に、楽しかったです"
26010-260100470 = "ありがとうございます"
26010-260100480 = "任務は、天候にも左右されるので"
26010-260100490 = "狙撃任務の時、空を見上げることが多いんです"
26010-260100500 = "地面を見ていても、あまり変化はありませんが……"
26010-260100510 = "空の景色は、移り変わりが早いです"
26010-260100520 = "だから……いつまでも、見ていられるのかもしれません"
26010-260100530 = "ただ、海辺から眺める空は……"
26010-260100540 = "……少し違うような"
26010-260100550 = "どう違うの？"
26010-260100560 = "えっと……"
26010-260100570 = "うぅ……"
26010-260100580 = "すみません"
26010-260100590 = "うまく……言葉にできないです"
26010-260100600 = "先日、捨てられていたファッション雑誌を読んだところ……"
26010-260100610 = "服装を変えることで、注目を集められる……とありました"
26010-260100620 = "あえて、その場にそぐわない格好をすることで、人の目を惹き付けられると……"
26010-260100630 = "今日は、最近買った服を着て"
26010-260100640 = "街を歩いてみようと思います"
26010-260100650 = "いいアイデアだとは思うけど……"
26010-260100660 = "それって、水着じゃないよね……？"
26010-260100670 = "じ、じゃあ……行ってきます"
26010-260100680 = "……ミユ？"
26010-260100690 = "…………ミユさん？"
