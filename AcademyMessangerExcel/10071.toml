[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10071-100710010 = "Sensei, você teria um minuto?" 
10071-100710020 = "Como o verão está chegando e está ficando cada vez mais quente" 
10071-100710030 = "Estou providenciando equipamentos adequados à estação para não atrapalhar as operações da SRT, mas……" 
10071-100710040 = "Gostaria de pedir os seus conselhos nas partes em que tenho dificuldade de decidir sozinha." 
10071-100710050 = "Estou sempre disposto a ouvir se for um problema seu, Miyako." 
10071-100710060 = "Muito obrigada por aceitar de bom grado." 
10071-100710070 = "Vou lhe enviar as coordenadas. Por favor, venha até aqui." 
10071-100710080 = "Certo, estarei aguardando no ponto de encontro." 
10071-100710090 = "Percebi isso enquanto estávamos no meio da operação atual……" 
10071-100710100 = "Como a maior parte dos treinamentos da SRT simula operações em terra," 
10071-100710110 = "Sinto que as nossas capacidades de lidar com operações no mar estão insuficientes." 
10071-100710120 = "Você já está se esforçando bastante, Miyako." 
10071-100710130 = "……Muito obrigada." 
10071-100710140 = "Mas eu ainda tenho consciência da minha inexperiência." 
10071-100710150 = "Ahn, sei que é um pedido repentino, mas……" 
10071-100710160 = "Como pretendo realizar um treinamento de resgate de reféns em alto-mar," 
10071-100710170 = "Você poderia me ajudar, Sensei?" 
10071-100710180 = "Sim, com certeza." 
10071-100710190 = "Muito obrigada." 
10071-100710200 = "Então, estarei te esperando no píer na parte leste da vila." 
10071-100710210 = "Sensei, você ouviu os boatos?" 
10071-100710220 = "Dizem que há uma ilha remota que dá para ir andando a partir da costa oeste da vila." 
10071-100710230 = "Andando sobre o mar……?" 
10071-100710240 = "Sim. Como a costa do lado oeste é bem rasa," 
10071-100710250 = "Ouvi dizer que quando a maré baixa, um caminho que leva até a ilha se revela." 
10071-100710260 = "Parece divertido." 
10071-100710270 = "Também achei. E como a paisagem da ilha é muito bonita, os próprios moradores costumam ir bastante lá para passar as folgas." 
10071-100710280 = "Sensei, se não se importar" 
10071-100710290 = "Gostaria de me acompanhar até lá?" 
10071-100710300 = "Claro, eu adoraria." 
10071-100710310 = "Muito obrigada, Sensei." 
10071-100710320 = "Então, vamos nos encontrar amanhã em frente ao píer na hora da maré baixa." 
10071-100710330 = "Aqui é RABBIT 1. Relatando situação." 
10071-100710340 = "Horário atual 06:00. Zero feridos. Retomando――" 
10071-100710350 = "Ah……" 
10071-100710360 = "Me desculpe por mandar mensagem numa hora dessas." 
10071-100710370 = "Acabei enviando para o destinatário errado……" 
10071-100710380 = "Está tudo bem, não se preocupe." 
10071-100710390 = "Mas nossa, você acorda tão cedo assim." 
10071-100710400 = "Sim. Manter uma rotina regrada é a base de um operador de forças especiais." 
10071-100710410 = "Tirando os dias de operações noturnas ou quando estou doente, eu organizo os diários de operações e afins todos os dias nesse horário e……" 
10071-100710420 = "Depois disso, dou uma corrida matinal ou faço alguns exercícios leves para aquecer o corpo." 
10071-100710430 = "Você é incrível, Miyako……" 
10071-100710440 = "Fufu. Pode ser um pouco cansativo no começo, mas depois que vira um hábito não é nada demais." 
10071-100710450 = "Na verdade, nos dias em que não consigo fazer a minha corrida matinal, até sinto o corpo mais pesado." 