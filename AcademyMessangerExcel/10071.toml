[translation]
10071-100710010 = "Sensei, você teria um momento?"
10071-100710020 = "O verão está chegando e está ficando cada vez mais quente."
10071-100710030 = "Para não atrapalhar as operações da SRT, estou preparando equipamentos adequados para a estação, mas..."
10071-100710040 = "Gostaria de consultá-lo sobre algumas partes que são difíceis para eu julgar sozinha."
10071-100710050 = "Se for para te ajudar, Miyako, estou sempre aqui para ouvir."
10071-100710060 = "Obrigada por aceitar de bom grado."
10071-100710070 = "Vou enviar as coordenadas, por favor, venha para este local."
10071-100710080 = "Então, estarei esperando no ponto de encontro."
10071-100710090 = "Senti uma coisa enquanto realizava a operação atual..."
10071-100710100 = "Como a maior parte do treinamento da SRT é focada em operações terrestres,"
10071-100710110 = "Sinto que nos falta a capacidade de lidar com operações marítimas."
10071-100710120 = "Você já está se esforçando o suficiente, Miyako."
10071-100710130 = "...Obrigada."
10071-100710140 = "Mas, estou ciente de que ainda sou inexperiente."
10071-100710150 = "Sei que é um pedido repentino, mas..."
10071-100710160 = "Gostaria de realizar um treinamento simulando um resgate de reféns no mar,"
10071-100710170 = "Sensei, você poderia me ajudar com isso?"
10071-100710180 = "Sim, claro."
10071-100710190 = "Obrigada."
10071-100710200 = "Então, estarei esperando no cais a leste da vila."
10071-100710210 = "Sensei, você ouviu?"
10071-100710220 = "Dizem que há uma ilha isolada que pode ser alcançada a pé a partir da costa oeste da vila."
10071-100710230 = "Sobre o mar...?"
10071-100710240 = "Sim. Como a costa oeste tem águas rasas,"
10071-100710250 = "Ouvi dizer que, quando a maré baixa, um caminho para a ilha aparece."
10071-100710260 = "Parece interessante."
10071-100710270 = "Eu também achei. Além disso, a ilha tem uma bela paisagem, então parece que os moradores costumam ir lá para se divertir nos feriados."
10071-100710280 = "Se não for incômodo para você, Sensei,"
10071-100710290 = "Gostaria de me acompanhar?"
10071-100710300 = "Claro, com prazer."
10071-100710310 = "Obrigada, Sensei."
10071-100710320 = "Então, vamos nos encontrar amanhã em frente ao cais, na hora da maré baixa."
10071-100710330 = "Aqui é a RABBIT 1. Relatando a situação."
10071-100710340 = "Horário atual: 0600. Nenhum ferido, continuando a--"
10071-100710350 = "Ah..."
10071-100710360 = "Desculpe-me por mandar mensagem a esta hora."
10071-100710370 = "Eu enviei para a pessoa errada..."
10071-100710380 = "Está tudo bem, não se preocupe."
10071-100710390 = "Mas, mudando de assunto, você já está acordada tão cedo."
10071-100710400 = "Sim. Uma vida regrada é o básico para as forças especiais."
10071-100710410 = "Exceto em dias de operações noturnas ou quando não estou me sentindo bem, eu sempre uso este horário para organizar meu diário e outras coisas..."
10071-100710420 = "Depois, eu faço uma corrida matinal ou alguns exercícios leves para aquecer o corpo."
10071-100710430 = "Você é incrível, Miyako..."
10071-100710440 = "Huhu. Pode ser um pouco chato no começo, mas depois que vira um hábito, não é nada demais."
10071-100710450 = "Na verdade, nos dias em que não consigo fazer minha corrida matinal, chego a sentir meu corpo pesado."
