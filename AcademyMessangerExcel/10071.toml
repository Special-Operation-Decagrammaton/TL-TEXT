[translation]
10071-100710010 = "先生、少々お時間よろしいでしょうか"
10071-100710020 = "もうすぐ夏ですし、段々と暑くなってきましたから"
10071-100710030 = "SRTの作戦に支障がないよう、季節に合わせた装備を揃えているのですが……"
10071-100710040 = "私では判断が難しい部分を、ご相談させていただきたくて"
10071-100710050 = "ミヤコの相談なら、いつでも聞くよ"
10071-100710060 = "ご快諾くださり、ありがとうございます"
10071-100710070 = "座標を送りますので、こちらでお願いします"
10071-100710080 = "では、ランデブーポイントで待機しています"
10071-100710090 = "今回の作戦を遂行しながら感じたのですが……"
10071-100710100 = "SRTの訓練は、陸上を想定したものが多いため"
10071-100710110 = "海上作戦に対処する能力が足りていないような気がします"
10071-100710120 = "ミヤコは十分頑張ってるよ"
10071-100710130 = "……ありがとうございます"
10071-100710140 = "しかし、自分が未熟な自覚はあります"
10071-100710150 = "急なお願いなのですが……"
10071-100710160 = "海上での人質救出を想定した訓練を行いたいので"
10071-100710170 = "先生に、ご協力いただけないでしょうか？"
10071-100710180 = "うん、もちろん"
10071-100710190 = "ありがとうございます"
10071-100710200 = "それでは、村の東側にある埠頭でお待ちしております"
10071-100710210 = "先生、聞きましたか？"
10071-100710220 = "村の西海岸から、歩いて行ける離島があるそうです"
10071-100710230 = "海の上を……？"
10071-100710240 = "はい。西側の海岸は水深が浅いので"
10071-100710250 = "潮が引くと、島につながる道が現れると聞きました"
10071-100710260 = "面白そうだね"
10071-100710270 = "私もそう思いました。それに島は景観が良いので、住民も休日はよく遊びに行くみたいです"
10071-100710280 = "もし先生がよろしければ"
10071-100710290 = "お付き合いしていただけませんか？"
10071-100710300 = "もちろん、喜んで"
10071-100710310 = "ありがとうございます、先生"
10071-100710320 = "それでは明日、干潮に合わせて埠頭の前でお会いしましょう"
10071-100710330 = "こちらはRABBIT1。状況を報告します"
10071-100710340 = "現在時刻は0600。負傷者0名、引き続き――"
10071-100710350 = "あ……"
10071-100710360 = "このような時間に、すみません"
10071-100710370 = "送り先を間違えてしまい……"
10071-100710380 = "大丈夫だよ、気にしないで"
10071-100710390 = "それより、こんな朝早くから起きてるんだ"
10071-100710400 = "はい。規則正しい生活は、特殊部隊の基本ですから"
10071-100710410 = "夜間作戦の日や体調が悪い時を除いて、毎日この時間は日誌の整理などを行って……"
10071-100710420 = "それから、朝のジョギングをしたり、軽く体操をして身体をほぐしています"
10071-100710430 = "ミヤコはすごいね……"
10071-100710440 = "ふふ。最初は少し面倒かもしれませんが、習慣にしてしまえば、なんてことありませんよ"
10071-100710450 = "むしろ、朝のジョギングが出来なかった日は、身体を重く感じてしまうくらいです"
