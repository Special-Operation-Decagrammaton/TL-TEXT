[translation]
10071-100710010 = "Sensei, o senhor teria um tempinho agora?"
10071-100710020 = "O verão está se aproximando e o clima está ficando cada vez mais quente, então..."
10071-100710030 = "Para que o calor não atrapalhe as operações da SRT, estou tentando separar alguns 'equipamentos' mais adequados para a estação, mas..."
10071-100710040 = "Tem alguns itens que eu não consigo decidir sozinha, então gostaria de pedir o seu conselho sobre o que ficaria bem em mim."
10071-100710050 = "Sempre estou à disposição pra te ajudar, Miyako! Vamos escolher os melhores cantis de água e os uniformes com a melhor camuflagem térmica!"
10071-100710060 = "Muito obrigada por aceitar de tão bom grado... (Espera, camuflagem térmica?)"
10071-100710070 = "Estou enviando as coordenadas do ponto de encontro. Por favor, venha até aqui."
10071-100710080 = "Certo, estarei no aguardo no ponto de encontro."
10071-100710090 = "Durante a execução da nossa missão atual, eu acabei percebendo uma coisa..."
10071-100710100 = "Como a esmagadora maioria dos treinamentos da SRT são focados em cenários terrestres,"
10071-100710110 = "Eu sinto que a minha capacidade de lidar com operações marítimas ainda é bem insuficiente."
10071-100710120 = "Você já está se saindo muito bem, Miyako."
10071-100710130 = "……Muito obrigada."
10071-100710140 = "Mesmo assim, eu tenho plena consciência da minha inexperiência."
10071-100710150 = "Eu sei que é um pedido repentino, mas..."
10071-100710160 = "Eu gostaria de realizar um treinamento simulado de resgate de reféns no mar."
10071-100710170 = "O senhor poderia... cooperar comigo, sendo o refém que precisa ser segurado?"
10071-100710180 = "Claro! Pode deixar, eu levo uma boia de patinho, finjo que tô me afogando e grito por socorro bem alto pra dar realismo ao resgate!"
10071-100710190 = "M-Muito obrigada... (Acho que ele levou o treinamento a sério até demais...)"
10071-100710200 = "Sendo assim, estarei aguardando o senhor no píer, no lado leste da vila."
10071-100710210 = "Sensei, o senhor ficou sabendo?"
10071-100710220 = "Dizem que existe uma ilha isolada que dá para ir andando a partir da costa oeste da vila."
10071-100710230 = "Andando... por cima da água do mar?!"
10071-100710240 = "Sim. Como a água na costa oeste é bastante rasa,"
10071-100710250 = "Ouvi dizer que, quando a maré baixa, um caminho de areia aparece magicamente conectando a praia até a ilha."
10071-100710260 = "Que incrível! Será que a gente acha uns caranguejos raros perdidos no meio da areia?!"
10071-100710270 = "Eu... hã... também achei interessante. E além disso, a ilha tem uma vista linda para o oceano, então os moradores costumam ir passear lá nos fins de semana."
10071-100710280 = "Se o senhor não se importar..."
10071-100710290 = "Gostaria de me acompanhar nesse passeio?"
10071-100710300 = "Claro, com o maior prazer! Vou até levar a minha redinha de pesca de brinquedo e um balde de plástico pros caranguejos!"
10071-100710310 = "M-Muito obrigada, Sensei..."
10071-100710320 = "Então, amanhã, vamos nos encontrar em frente ao píer assim que a maré baixar."
10071-100710330 = "Aqui é RABBIT1. Iniciando relatório de situação."
10071-100710340 = "Horário atual: 0600. Zero feridos registrados. Dando prosseguimento a――"
10071-100710350 = "Ah……"
10071-100710360 = "Peço desculpas por enviar mensagem a essa hora da madrugada."
10071-100710370 = "Acabei errando o destinatário no meu rádio comunicador……"
10071-100710380 = "Tudo bem, não se preocupe com isso. *Bocejo*"
10071-100710390 = "Mas nossa, você já tá de pé e tão ativa uma hora dessas?"
10071-100710400 = "Sim. Manter uma rotina rigorosa e disciplinada é o pilar básico das Forças Especiais."
10071-100710410 = "Com exceção de dias de operações noturnas ou de quando estou doente, eu sempre aproveito esse horário para organizar o diário de bordo da equipe e afins……"
10071-100710420 = "Depois disso, eu saio para a minha corrida matinal e faço algumas ginásticas leves para alongar o corpo."
10071-100710430 = "A Miyako é realmente incrível…… Eu mal consigo levantar da cama sem deixar o despertador tocar 5 vezes seguidas."
10071-100710440 = "Fufu. No começo pode parecer um tanto difícil, mas depois que você transforma em um hábito diário, acaba não sendo nada de mais."
10071-100710450 = "Na verdade, nos dias em que eu não consigo sair para correr de manhã, eu sinto o meu corpo pesado e preguiçoso o dia todo."