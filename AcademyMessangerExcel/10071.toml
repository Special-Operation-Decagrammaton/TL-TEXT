[translation]
10071-100710010 = "Sensei, você tem um minutinho?"
10071-100710020 = "O verão já está chegando e os dias estão cada vez mais quentes,"
10071-100710030 = "Então estou separando os equipamentos adequados para a estação, para não prejudicar as operações da SRT..."
10071-100710040 = "Mas tem algumas coisas que eu estou em dúvida, queria saber se posso pedir sua opinião."
10071-100710050 = "Se a Miyako tá precisando de ajuda, eu tô sempre à disposição."
10071-100710060 = "Agradeço por aceitar tão prontamente."
10071-100710070 = "Vou te enviar as coordenadas, por favor me encontre lá."
10071-100710080 = "Câmbio. Estarei no aguardo no ponto de encontro."
10071-100710090 = "Durante a execução da nossa última missão, eu acabei notando uma coisa..."
10071-100710100 = "Como a maioria dos treinamentos da SRT foca em combate terrestre,"
10071-100710110 = "Sinto que ainda nos falta muita experiência para lidar com operações marítimas."
10071-100710120 = "Mas você já se esforça bastante, Miyako."
10071-100710130 = "……Muito obrigada."
10071-100710140 = "Porém, eu tenho plena consciência da minha falta de preparo."
10071-100710150 = "Sei que é um pedido repentino, mas..."
10071-100710160 = "Eu gostaria de fazer uma simulação de resgate de reféns no mar."
10071-100710170 = "O Sensei poderia cooperar comigo nesse treinamento?"
10071-100710180 = "Sim, claro."
10071-100710190 = "Muito obrigada."
10071-100710200 = "Nesse caso, estarei te esperando no cais da parte leste da vila."
10071-100710210 = "Sensei, você ficou sabendo?"
10071-100710220 = "Dizem que tem uma ilha isolada aqui perto que dá para ir andando a partir da costa oeste da vila."
10071-100710230 = "Andando por cima do mar...?"
10071-100710240 = "Isso. A água na costa oeste é bem rasa,"
10071-100710250 = "E ouvi falar que quando a maré baixa, aparece um caminho de areia ligando a praia até a ilha."
10071-100710260 = "Parece legal demais."
10071-100710270 = "Eu também achei. Além disso, a paisagem lá da ilha é linda, dizem que os moradores vivem indo para lá passear nos fins de semana."
10071-100710280 = "Se não for incômodo..."
10071-100710290 = "Você gostaria de ir lá comigo?"
10071-100710300 = "Com certeza, eu adoraria."
10071-100710310 = "Muito obrigada, Sensei."
10071-100710320 = "Então amanhã nos encontramos na frente do cais, assim que a maré baixar."
10071-100710330 = "Aqui é a RABBIT1. Reportando a situação atual."
10071-100710340 = "O horário local é 06:00 horas. Zero baixas, dando prosseguimento--"
10071-100710350 = "Ah..."
10071-100710360 = "Me desculpe mandar mensagem a essa hora."
10071-100710370 = "Acabei enviando para o contato errado..."
10071-100710380 = "De boa, esquenta com isso não."
10071-100710390 = "Mas ué, você acorda cedo assim todo dia?"
10071-100710400 = "Sim. Manter uma rotina disciplinada é a base de qualquer membro das forças especiais."
10071-100710410 = "A não ser que tenhamos feito uma operação noturna ou eu não esteja me sentindo bem, eu sempre uso esse horário para organizar o diário de relatórios..."
10071-100710420 = "E depois, eu faço uma corrida matinal e uns exercícios leves para soltar o corpo."
10071-100710430 = "Miyako, você é incrível..."
10071-100710440 = "Hehe. Pode parecer meio chato no começo, mas depois que vira hábito, você tira de letra."
10071-100710450 = "Muito pelo contrário, nos dias que eu não consigo dar minha corridinha, meu corpo fica até pesado."
