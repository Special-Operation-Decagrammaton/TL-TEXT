[translation]
20018-200180010 = "Sensei, quanto tempo."
20018-200180020 = "Ouvi dizer que você estava me procurando..."
20018-200180030 = "O que foi?"
20018-200180040 = "Boa tarde, Moe."
20018-200180050 = "Desculpa incomodar, mas preciso de uma ajudinha. Você está livre agora?"
20018-200180060 = "Ajudar o Sensei? Por mim tudo bem, mas..."
20018-200180070 = "É bem raro você me pedir ajuda com alguma coisa."
20018-200180080 = "Ah, não que eu esteja pensando demais nisso. É que eu já sinto o cheirinho de que um incidente muito divertido e caótico aconteceu... kuhihi."
20018-200180090 = "Vou me arrumar."
20018-200180100 = "Sensei, um passarinho me contou uma coisa..."
20018-200180110 = "É verdade que todos os dados de trabalho do PC da Schale foram apagados do nada?"
20018-200180120 = "Kuhihi... é verdade, sim..."
20018-200180130 = "É, com isso, as planilhas se foram... tudo acabou... kuhihi..."
20018-200180140 = "Uau... o Sensei tá rindo igualzinho a mim."
20018-200180150 = "A situação aí parece estar maravilhosamente arruinada, hein."
20018-200180160 = "Bom, quando você chegar aqui, vai entender o nível do desastre..."
20018-200180170 = "Entendi. Beleza, então passo aí na Schale depois do almoço."
20018-200180180 = "Sensei, sabia de uma coisa?"
20018-200180190 = "Sabe aquelas tampas de acrílico de segurança que instalam por cima de botões importantes e chaves de ativação?\nO nome daquilo é 'Molly-guard'."
20018-200180200 = "E sabe por que deram exatamente esse nome?"
20018-200180210 = "Dizem que essa tampa foi inventada porque uma menininha chamada Molly vivia tentando apertar o botão de emergência toda hora."
20018-200180220 = "Caramba, não sabia!"
20018-200180230 = "Que curiosidade histórica interessante."
20018-200180240 = "Toda vez que eu escuto essa história, eu fico um pouco chateada e arrependida."
20018-200180250 = "Se eu tivesse nascido antes dessa tal de Molly..."
20018-200180260 = "Hoje em dia, essas tampas de segurança se chamariam 'Moe-guard', não acha?..."
20018-200180270 = "Moe, eu acho que ser a principal razão pela qual a humanidade precisou inventar uma trava contra explosivos não é um nome muito honroso..."
20018-200180280 = "Hum, foi mal, Sensei..."
20018-200180290 = "Você poderia dar um pulinho aqui no Parque dos Coelhinhos rápido?"
20018-200180300 = "Posso sim, mas..."
20018-200180310 = "Aconteceu alguma coisa de repente?"
20018-200180320 = "Os suprimentos extras que pedimos outro dia acabaram de chegar no parque."
20018-200180330 = "Mas as outras meninas estão bem no meio de uma missão, então eu vou ter que arrumar e organizar tudo isso sozinha..."
20018-200180340 = "Ter que carregar um monte de caixas pesadas já é meio chato... mas deixando isso de lado..."
20018-200180350 = "É que também chegou um monte de explosivos altamente inflamáveis e bem perigosos..."
20018-200180360 = "Tô indo pra aí agora mesmo! Não acende nenhum fósforo perto disso!!"
20018-200180370 = "Sensei, você estava no Parque Shiratori ontem?"
20018-200180380 = "Tive a impressão de ter visto você correndo por lá..."
20018-200180390 = "Ah, você também estava lá, Moe?"
20018-200180400 = "Devia ter me chamado!"
20018-200180410 = "Eu achei que você estava no meio do horário de trabalho, então resolvi não te atrapalhar..."
20018-200180420 = "Teria problema se eu tivesse ido falar com você?"
20018-200180430 = "De jeito nenhum, seria muito bem-vinda! É que eu comecei a fazer cooper e dar umas corridas ultimamente."
20018-200180440 = "Ficar o dia todo sentado na cadeira do escritório faz mal pra saúde, sabe."
20018-200180450 = "Ah, eu te entendo perfeitamente."
20018-200180460 = "Ficar sentada o tempo todo destrói a postura e deixa os ombros super tensos, né."
20018-200180470 = "Eu sei muito bem que manter a postura correta é importante, mas..."
20018-200180480 = "Se quiser, você não quer vir se exercitar e correr comigo da próxima vez?"
20018-200180490 = "Sensei, você já esqueceu que eu sou uma operadora das Forças Especiais?"
20018-200180500 = "Eu posso não parecer, mas sou da SRT. Eu faço treinamento militar tático todo santo dia, sabia?"
20018-200180510 = "Bom, se comparar com o condicionamento da Saki ou da Miyako, não é lá grande coisa, mas..."
20018-200180520 = "Mas, dar uma corridinha a sós com o Sensei... isso sim parece maravilhosamente *ruinoso*, não acha?"