[translation]
20018-200180010 = "Faz tempo, Sensei."
20018-200180020 = "Ouvi dizer que você estava me procurando..."
20018-200180030 = "O que houve?"
20018-200180040 = "Olá, Moe."
20018-200180050 = "Desculpe, preciso de uma ajudinha com algo, você está livre agora?"
20018-200180060 = "Ajudar o Sensei? Por mim tudo bem, mas..."
20018-200180070 = "Ainda assim, é raro. Você pedindo ajuda..."
20018-200180080 = "Ah, não tem nenhum significado profundo. É só que sinto que vem um incidente interessante por aí... kuhihi."
20018-200180090 = "Então, vou me preparar."
20018-200180100 = "Sensei, ouvi um boato..."
20018-200180110 = "É verdade que todos os dados do computador de trabalho do Schale foram apagados?"
20018-200180120 = "Kuhihi... é verdade..."
20018-200180130 = "Sim, acabou tudo... kuhihi..."
20018-200180140 = "Nossa... o Sensei está rindo igual a mim."
20018-200180150 = "Isso parece bem sério."
20018-200180160 = "Bem, você vai entender quando chegar..."
20018-200180170 = "Entendido, então irei ao Schale depois do almoço."
20018-200180180 = "Sensei, você sabia?"
20018-200180190 = "Sabe aquelas capas de segurança que colocam sobre interruptores e botões? Aquilo se chama 'Molly Guard'."
20018-200180200 = "Quer saber por que tem esse nome?"
20018-200180210 = "Dizem que foi inventado porque uma criança chamada Molly tentava apertar o botão de emergência várias vezes."
20018-200180220 = "Entendi."
20018-200180230 = "Que interessante."
20018-200180240 = "Sempre que ouço essa história, fico um pouco triste."
20018-200180250 = "Se eu tivesse nascido antes da Molly..."
20018-200180260 = "Será que hoje em dia o nome da capa de segurança seria 'Moe Guard'?"
20018-200180270 = "Não acho que seja um nome muito honroso..."
20018-200180280 = "Hmm, desculpe, Sensei..."
20018-200180290 = "Você poderia vir ao Parque dos Coelhinhos?"
20018-200180300 = "Tudo bem, mas..."
20018-200180310 = "O que aconteceu de repente?"
20018-200180320 = "Os suprimentos que pedi chegaram ao parque."
20018-200180330 = "Mas como todas estão em uma operação, tenho que organizar tudo sozinha..."
20018-200180340 = "Deixando de lado o fato de que mover caixas pesadas é difícil..."
20018-200180350 = "Tem muitas bombas perigosas e inflamáveis por aqui..."
20018-200180360 = "Estou indo agora mesmo."
20018-200180370 = "Sensei, você estava no parque de Shiratori ontem?"
20018-200180380 = "Tive a impressão de ver você correndo..."
20018-200180390 = "Você também estava lá, Moe."
20018-200180400 = "Deveria ter me chamado."
20018-200180410 = "Pensei que você estivesse trabalhando, por isso não chamei..."
20018-200180420 = "Eu podia ter falado com você?"
20018-200180430 = "Com certeza. Tenho feito jogging ultimamente."
20018-200180440 = "Ficar sentado o tempo todo faz mal para a saúde."
20018-200180450 = "Ah, eu entendo um pouco."
20018-200180460 = "Ficar sentado direto deixa a gente corcunda e com dor nos ombros, né?"
20018-200180470 = "Eu sei que manter a postura correta é importante, mas..."
20018-200180480 = "Se quiser, Moe, quer se exercitar comigo?"
20018-200180490 = "Sensei, você esqueceu que sou uma agente especial?"
20018-200180500 = "Ainda sou um membro da SRT, sabe? Eu treino todos os dias."
20018-200180510 = "Bem, não é nada comparado à Saki ou à Miyako."
20018-200180520 = "Mas, correr com o Sensei... talvez seja um pouco catastrófico?"
