[translation]
10119-101190010 = "ごめんなさい"
10119-101190020 = "連絡くれてた？"
10119-101190030 = "さっきね"
10119-101190040 = "忙しかった？"
10119-101190050 = "訓練中だったから見てなくて……"
10119-101190060 = "急ぎ？"
10119-101190070 = "何か用だった？"
10119-101190080 = "明日、百鬼夜行に行くんだけど"
10119-101190090 = "百花繚乱との協力についても相談させて欲しいんだ"
10119-101190100 = "明日……？"
10119-101190110 = "いいけど……私で大丈夫なの？"
10119-101190120 = "……大丈夫って？"
10119-101190130 = "百花繚乱の大事なことを"
10119-101190140 = "私が決めていいのかな……"
10119-101190150 = "今の百花繚乱の代表は誰だっけ？"
10119-101190160 = "……そうだった"
10119-101190170 = "まだ慣れないんだよね"
10119-101190180 = "じゃ、また明日"
10119-101190190 = "聞いたんだけど"
10119-101190200 = "今週末のお祭りに来るの？"
10119-101190210 = "うん、多分ね"
10119-101190220 = "商人会から誘われたんだ"
10119-101190230 = "そうなんだ"
10119-101190240 = "私も呼ばれてて"
10119-101190250 = "手伝いに行くから"
10119-101190260 = "ナグサは何を手伝うの？"
10119-101190270 = "屋台で焼き鳥を焼くことになってる"
10119-101190280 = "人手が足りないんだって"
10119-101190290 = "ナグサの焼き鳥！楽しみだね！"
10119-101190300 = "他にもいろんな屋台が出るみたい"
10119-101190310 = "楽しいお祭りになるといいんだけど"
10119-101190320 = "もちろん、先生にとっても"
10119-101190330 = "ありがとう"
10119-101190340 = "打ち上げ、参加させてもらえた"
10119-101190360 = "いい写真だね"
10119-101190370 = "先生の言った通りだった"
10119-101190380 = "正直に話したら、みんな喜んでくれて"
10119-101190390 = "でも、最後はみんな大笑いしてて……"
10119-101190400 = "何が面白かったんだろう……？"
10119-101190410 = "なんて言ったの？"
10119-101190420 = "クールな美少女に見えても、実際はそうじゃないから……って"
10119-101190430 = "ふふっ"
10119-101190440 = "自分で思ってるより、ナグサは面白い人だと思うよ"
10119-101190450 = "面白い？私が……？"
10119-101190460 = "気のせいかもしれないけど"
10119-101190470 = "最近、夜間のトラブルが増えた気がする"
10119-101190480 = "百花繚乱も大変だね"
10119-101190490 = "ナグサも夜道には気をつけるんだよ"
10119-101190500 = "大丈夫"
10119-101190510 = "これが私たちの役割だし"
10119-101190520 = "夜はあんまり人、いないし。夜目は利くほうだから"
10119-101190530 = "でも、問題が起きたら面倒だし"
10119-101190540 = "しばらくは夜のパトロールを増やした方が良さそう"
10119-101190550 = "今日は仕事の目途がつきそうなんだけど"
10119-101190560 = "よかったら私も行っていい？"
10119-101190570 = "そう？"
10119-101190580 = "じゃあ、また後で"
10119-101190590 = "雪女って知ってる？"
10119-101190600 = "美人な妖怪として描かれることが多いんだけど"
10119-101190610 = "なんでなんだろう？"
10119-101190620 = "細かい理由はいろいろあると思うけど……"
10119-101190630 = "分かりやすく、目を引きやすいからじゃない？"
10119-101190640 = "たしかに"
10119-101190650 = "人をだますなら美人の方が便利だよね"
10119-101190660 = "……もし私が妖怪だったら、大妖怪になってたかも"
10119-101190670 = "その意気やよし！"
