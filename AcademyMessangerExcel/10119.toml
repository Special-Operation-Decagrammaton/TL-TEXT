[translation]
10119-101190010 = "Desculpe."
10119-101190020 = "Você estava tentando me contatar?"
10119-101190030 = "Agora há pouco..."
10119-101190040 = "Estava ocupado(a)?"
10119-101190050 = "Eu estava em treinamento, então não vi..."
10119-101190060 = "É urgente?"
10119-101190070 = "Precisava de algo?"
10119-101190080 = "Amanhã, vou para Hyakkiyako..."
10119-101190090 = "E gostaria de discutir a cooperação com Hyakkaryouran."
10119-101190100 = "Amanhã...?"
10119-101190110 = "Tudo bem, mas... eu sou a pessoa certa para isso?"
10119-101190120 = "...Certa para isso?"
10119-101190130 = "Assuntos importantes de Hyakkaryouran..."
10119-101190140 = "Posso mesmo decidir sobre eles...?"
10119-101190150 = "Quem é o(a) representante de Hyakkaryouran agora, mesmo?"
10119-101190160 = "...Ah, é verdade."
10119-101190170 = "Ainda não me acostumei, sabe."
10119-101190180 = "Então, até amanhã."
10119-101190190 = "Eu ouvi dizer..."
10119-101190200 = "Você vem ao festival deste fim de semana?"
10119-101190210 = "Sim, provavelmente."
10119-101190220 = "Fui convidado(a) pela Associação de Comerciantes."
10119-101190230 = "Entendi."
10119-101190240 = "Eu também fui chamado(a)."
10119-101190250 = "Vou ajudar."
10119-101190260 = "O que Nagusa vai ajudar a fazer?"
10119-101190270 = "Vou assar yakitori na barraca."
10119-101190280 = "Disseram que estão com falta de pessoal."
10119-101190290 = "Yakitori da Nagusa! Que delícia!"
10119-101190300 = "Parece que haverá várias outras barracas também."
10119-101190310 = "Espero que seja um festival divertido."
10119-101190320 = "Claro, para o(a) Sensei também."
10119-101190330 = "Obrigado(a)."
10119-101190340 = "Pude participar da festa de encerramento."
10119-101190360 = "Que foto legal."
10119-101190370 = "Foi exatamente como o(a) Sensei disse."
10119-101190380 = "Quando falei honestamente, todos ficaram felizes."
10119-101190390 = "Mas no final, todos estavam rindo muito..."
10119-101190400 = "O que será que foi tão engraçado...?"
10119-101190410 = "O que você disse?"
10119-101190420 = "Mesmo que eu pareça uma garota bonita e legal, na verdade não sou... foi o que eu disse."
10119-101190430 = "Hehe."
10119-101190440 = "Acho que Nagusa é mais interessante do que pensa."
10119-101190450 = "Interessante? Eu...?"
10119-101190460 = "Pode ser impressão minha, mas..."
10119-101190470 = "Ultimamente, sinto que os problemas noturnos aumentaram."
10119-101190480 = "Hyakkaryouran também está passando por dificuldades, não é?"
10119-101190490 = "Nagusa, tome cuidado nas ruas à noite também."
10119-101190500 = "Não se preocupe."
10119-101190510 = "Este é o nosso papel, afinal."
10119-101190520 = "Não tem muita gente à noite. E eu consigo ver bem no escuro."
10119-101190530 = "Mas seria um problema se algo acontecesse."
10119-101190540 = "Parece que é melhor aumentar as patrulhas noturnas por um tempo."
10119-101190550 = "Parece que vou conseguir terminar meu trabalho hoje..."
10119-101190560 = "Se não for problema, posso ir também?"
10119-101190570 = "É mesmo?"
10119-101190580 = "Então, até mais tarde."
10119-101190590 = "Você conhece a Yuki-onna?"
10119-101190600 = "Ela é frequentemente retratada como uma youkai bonita..."
10119-101190610 = "Por que será?"
10119-101190620 = "Acho que existem várias razões detalhadas, mas..."
10119-101190630 = "Não é porque é mais fácil de entender e chama mais atenção?"
10119-101190640 = "É verdade."
10119-101190650 = "Se for para enganar pessoas, ser bonita é mais conveniente, não é?"
10119-101190660 = "...Se eu fosse uma youkai, talvez eu tivesse me tornado uma grande youkai."
10119-101190670 = "Essa é a atitude!"
