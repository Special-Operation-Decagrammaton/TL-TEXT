[translation]
10143-101430010 = "Сенсей, как вам отдых в долине?"
10143-101430020 = "Природа — это лучшее, что может быть..."
10143-101430030 = "Хе-хе. Рада слышать, что вы хорошо проводите время."
10143-101430040 = "Кстати, Сенсей."
10143-101430050 = "Я надеялась присоединиться к вам сегодня."
10143-101430060 = "Вы не против?"
10143-101430070 = "Я действительно очень люблю лето."
10143-101430080 = "А что тебе в нём нравится?"
10143-101430090 = "На то есть несколько причин, но..."
10143-101430100 = "Возможно, дело в том, что летом я могу показать..."
10143-101430110 = "себя с совершенно другой, непривычной стороны?"
10143-101430120 = "Хе-хе, поэтому..."
10143-101430130 = "Мне бы очень хотелось показать эту сторону именно вам."
10143-101430140 = "Не уделите мне немного времени?"
10143-101430150 = "Простите за все те хлопоты, что я доставила вам вчера..."
10143-101430160 = "Правда, за столько вещей сразу..."
10143-101430170 = "Шун со мной наконец-то заговорила..."
10143-101430180 = "А?"
10143-101430190 = "Если подумать, то вы, пожалуй, правы..."
10143-101430200 = "Насчёт того случая..."
10143-101430210 = "Я ничего не видел! И ничего не помню!"
10143-101430220 = "..."
10143-101430230 = "От таких слов..."
10143-101430240 = "становится немного одиноко..."
10143-101430250 = "Даже не знаю... как мне теперь поступить..."
10143-101430260 = "Ясно."
10143-101430270 = "..."
10143-101430280 = "Если вы не против,"
10143-101430290 = "я бы хотела попробовать ещё раз вместе с вами, Сенсей..."
10143-101430300 = "Если у вас есть время, мы могли бы... прямо сейчас?"
10143-101430310 = "Сенсей, у меня есть к вам одна просьба..."
10143-101430320 = "Если вас это не затруднит..."
10143-101430330 = "не могли бы вы меня выслушать?"
10143-101430340 = "Всё что угодно!"
10143-101430350 = "Сегодня я веду детей из Сада цветущей сливы"
10143-101430360 = "в аквапарк..."
10143-101430370 = "Вы не могли бы помочь мне присмотреть за ними?"
10143-101430380 = "Предоставь это мне!"
10143-101430390 = "Хе-хе."
10143-101430400 = "Спасибо вам, Сенсей."
10143-101430410 = "Сенсей, вы добрались домой в безопасности?"
10143-101430420 = "Да-а... правда, теперь всё тело ломит..."
10143-101430430 = "Хе-хе."
10143-101430440 = "Игры в воде отнимают куда больше сил, чем кажется на первый взгляд."
10143-101430450 = "Огромное спасибо за сегодня."
10143-101430460 = "Сенсей, если вы не против..."
10143-101430470 = "Я бы очень хотела снова провести время вот так."
10143-101430480 = "Зови в любое время."
10143-101430490 = "Хе-хе. Спасибо."
10143-101430500 = "Я так и знала, что вы это скажете."
10143-101430510 = "В таком случае, в следующий раз..."
10143-101430520 = "Я сделаю так, чтобы мы обязательно побыли только вдвоём."