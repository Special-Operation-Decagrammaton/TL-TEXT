[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10143-101430010 = "Sensei, como está sendo\no seu tempo livre no desfiladeiro?"
10143-101430020 = "A grande natureza é a melhor..."
10143-101430030 = "Fufu. Fico muito feliz em saber\nque você está aproveitando."
10143-101430040 = "A propósito, Sensei."
10143-101430050 = "Eu adoraria poder passar\no dia de hoje com você aí,"
10143-101430060 = "Você se importaria?"
10143-101430070 = "Sabe, eu adoro o verão."
10143-101430080 = "E do que você gosta nele?"
10143-101430090 = "Existem vários motivos, mas..."
10143-101430100 = "Acho que é porque sinto\nque posso expressar..."
10143-101430110 = "Um lado meu diferente do habitual?"
10143-101430120 = "Fufu, sendo assim,"
10143-101430130 = "Gostaria de mostrar a você\nesse meu lado diferente."
10143-101430140 = "Você poderia me conceder\num pouco do seu tempo?"
10143-101430150 = "Ontem eu acabei causando\nmuitos problemas para você..."
10143-101430160 = "Realmente, de várias formas..."
10143-101430170 = "A Shun finalmente falou comigo..."
10143-101430180 = "Eh?"
10143-101430190 = "Agora que você mencionou,\nisso é verdade..."
10143-101430200 = "Sobre aquele momento..."
10143-101430210 = "Eu não vi nada! E não lembro de nada!"
10143-101430220 = "......"
10143-101430230 = "Isso me deixa..."
10143-101430240 = "Um pouco triste, sabe..."
10143-101430250 = "O que... o que eu deveria fazer..."
10143-101430260 = "Ah, sim. Eu já sei."
10143-101430270 = "......"
10143-101430280 = "Se não for incomodar,"
10143-101430290 = "Eu gostaria de ter a minha\nrevanche com você, Sensei..."
10143-101430300 = "Se você tiver tempo a partir de agora...\nSerá que eu poderia te ver?"
10143-101430310 = "Sensei, eu tenho um favor\npara lhe pedir, mas..."
10143-101430320 = "Se não for muito incômodo..."
10143-101430330 = "Você poderia me escutar?"
10143-101430340 = "Pode falar, qualquer coisa!"
10143-101430350 = "Hoje, vou levar as crianças do\nJardim da Flor de Ameixeira"
10143-101430360 = "Para o parque aquático..."
10143-101430370 = "Você poderia vir conosco\ncomo nosso acompanhante?"
10143-101430380 = "Deixe comigo!"
10143-101430390 = "Fufu."
10143-101430400 = "Muito obrigada, Sensei."
10143-101430410 = "Chegou em casa em segurança, Sensei?"
10143-101430420 = "S-Sim... só estou com uma\ndor muscular terrível..."
10143-101430430 = "Fufu."
10143-101430440 = "Brincar na água exige muito\nmais energia do que imaginamos."
10143-101430450 = "Muito obrigada por tudo o que\nvocê fez por nós hoje."
10143-101430460 = "Apenas se o Sensei desejar, claro..."
10143-101430470 = "Eu adoraria ter mais momentos como este."
10143-101430480 = "Pode me chamar quando quiser."
10143-101430490 = "Fufu. Muito obrigada."
10143-101430500 = "Eu já imaginava que\nvocê diria algo assim."
10143-101430510 = "Sendo assim, na próxima vez..."
10143-101430520 = "Vou preparar uma ocasião\npara ficarmos a sós, apenas nós dois."