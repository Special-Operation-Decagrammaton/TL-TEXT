[translation]
10143-101430010 = "先生、渓谷での余暇はいかがですか？"
10143-101430020 = "大自然、サイコー……"
10143-101430030 = "ふふ。お楽しみいただいているようで何よりです"
10143-101430040 = "ところで先生"
10143-101430050 = "今日は私もそちらでご一緒したいのですが"
10143-101430060 = "よろしいでしょうか？"
10143-101430070 = "私、夏って好きなんです"
10143-101430080 = "どこが好きなの？"
10143-101430090 = "理由はいくつかありますが……"
10143-101430100 = "自分の、いつもとは違った一面を"
10143-101430110 = "表現できる……からでしょうか？"
10143-101430120 = "ふふ、ですので"
10143-101430130 = "私のいつもとは違った一面をお見せしたいのですが"
10143-101430140 = "お時間をいただいてもよろしいでしょうか？"
10143-101430150 = "昨日はご迷惑をおかけしました……"
10143-101430160 = "本当に、色々と……"
10143-101430170 = "やっとシュンが声をかけてくれた……"
10143-101430180 = "え？"
10143-101430190 = "言われてみれば、そうですね……"
10143-101430200 = "あのとき……"
10143-101430210 = "何も見てない！何も覚えていないよ！"
10143-101430220 = "……"
10143-101430230 = "それはちょっと"
10143-101430240 = "寂しいかもしれません……"
10143-101430250 = "私は……どうしたらいいのかな……"
10143-101430260 = "そう、ですね"
10143-101430270 = "……"
10143-101430280 = "もしよろしければ"
10143-101430290 = "先生と一緒にリベンジをしたいのですが……"
10143-101430300 = "お時間があれば今からでも……よろしいでしょうか？"
10143-101430310 = "先生にお願いしたいことがあるのですが……"
10143-101430320 = "よろしければ……"
10143-101430330 = "聞いていただけますでしょうか？"
10143-101430340 = "何でもどうぞ！"
10143-101430350 = "今日、梅花園の子供たちと"
10143-101430360 = "ウォーターパークに行くことになりまして……"
10143-101430370 = "一緒に引率していただけませんでしょうか？"
10143-101430380 = "任せて！"
10143-101430390 = "ふふ"
10143-101430400 = "ありがとうございます。先生"
10143-101430410 = "無事にお帰りになられましたか、先生？"
10143-101430420 = "う、うん……ただ筋肉痛が……。"
10143-101430430 = "ふふ"
10143-101430440 = "水遊びは、思いのほか体力を使いますからね"
10143-101430450 = "今日は、本当にありがとうございました"
10143-101430460 = "先生さえよろしければ、ですが……"
10143-101430470 = "また、このような時間が欲しいです"
10143-101430480 = "いつでも呼んでね"
10143-101430490 = "ふふ。ありがとうございます"
10143-101430500 = "そう言ってくださると思っていました"
10143-101430510 = "でしたら、次は……"
10143-101430520 = "二人きりで過ごす機会を設けますね"
