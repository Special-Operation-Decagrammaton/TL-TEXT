[translation]
10114-101140010 = "こんにちは、先生"
10114-101140020 = "私、アルバイトを始めたんです！"
10114-101140030 = "何のバイト？"
10114-101140040 = "近くのカフェのホール担当になりました"
10114-101140050 = "その……先生"
10114-101140060 = "もし、よろしければ……"
10114-101140070 = "ちょうど気分転換がしたかったんだ"
10114-101140080 = "後でお邪魔しようかな"
10114-101140090 = "……！？"
10114-101140100 = "ありがとうございます、先生！"
10114-101140110 = "お待ちしておりますね"
10114-101140120 = "先生"
10114-101140130 = "せんせえ……"
10114-101140140 = "ジュリ、大丈夫？"
10114-101140150 = "昨日もよく眠れませんでした……"
10114-101140160 = "いよいよウェイトレス選抜大会が来たと思うと……"
10114-101140170 = "緊張してしまい……"
10114-101140180 = "もしミスでもしたら……どうしましょう？"
10114-101140190 = "今は結果を気にしないでおこう"
10114-101140200 = "もしうまくいかなくても、悔いは残さないようにね"
10114-101140210 = "はい……頑張ってみます"
10114-101140220 = "その、もしもの時は……"
10114-101140230 = "私の手を、握ってくれませんか……？"
10114-101140240 = "先生！今お忙しいですか？"
10114-101140250 = "通販サイトから買ったおもちゃを開封してるところだよ"
10114-101140260 = "そ、そうでしたか"
10114-101140270 = "忙しそうですね……"
10114-101140280 = "ううん、むしろ暇だよ"
10114-101140290 = "そうでしたか！"
10114-101140300 = "その"
10114-101140310 = "先生"
10114-101140320 = "もし、よろしければ……"
10114-101140330 = "私を匿っていただきたいんです！"
10114-101140340 = "……え？"
