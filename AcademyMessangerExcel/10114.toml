[translation]
10114-101140010 = "Olá, Sensei"
10114-101140020 = "Eu comecei um trabalho de meio período!"
10114-101140030 = "Que tipo de trabalho?"
10114-101140040 = "Eu sou a responsável pelo salão de um café próximo."
10114-101140050 = "Então... Sensei."
10114-101140060 = "Se você não se importar..."
10114-101140070 = "Eu estava querendo uma mudança de ares."
10114-101140080 = "Talvez eu passe por lá mais tarde."
10114-101140090 = "...!?"
10114-101140100 = "Muito obrigada, Sensei!"
10114-101140110 = "Estarei esperando por você."
10114-101140120 = "Sensei."
10114-101140130 = "Sensei..."
10114-101140140 = "Juri, você está bem?"
10114-101140150 = "Eu não consegui dormir bem ontem também..."
10114-101140160 = "Só de pensar que a Competição de Seleção de Garçonetes finalmente chegou..."
10114-101140170 = "Eu fico tão nervosa..."
10114-101140180 = "E se eu cometer um erro...? O que eu faço?"
10114-101140190 = "Por enquanto, não vamos nos preocupar com o resultado."
10114-101140200 = "Mesmo que não dê certo, certifique-se de não ter arrependimentos."
10114-101140210 = "Sim... vou dar o meu melhor."
10114-101140220 = "Então, se por acaso..."
10114-101140230 = "Você poderia segurar minha mão...?"
10114-101140240 = "Sensei! Você está ocupado agora?"
10114-101140250 = "Estou abrindo um brinquedo que comprei em um site de compras online."
10114-101140260 = "Ah, entendi."
10114-101140270 = "Parece que você está ocupado..."
10114-101140280 = "Não, na verdade estou livre."
10114-101140290 = "Ah, é mesmo!"
10114-101140300 = "Então..."
10114-101140310 = "Sensei."
10114-101140320 = "Se você não se importar..."
10114-101140330 = "Eu gostaria que você me escondesse!"
10114-101140340 = "...Hã?"
