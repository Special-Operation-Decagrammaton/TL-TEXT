[translation]
10077-100770010 = "Olá, Sensei."
10077-100770020 = "Ouvi dizer que você virá para Trinity em breve."
10077-100770030 = "Por algum motivo,"
10077-100770040 = "parece que desta vez sou eu quem vai te ajudar."
10077-100770050 = "Então é isso. Conto com você."
10077-100770060 = "Olá, Ichika."
10077-100770070 = "Conto com você!"
10077-100770080 = "Sim!"
10077-100770090 = "Então, até mais tarde."
10077-100770100 = "Sensei, você chegou?"
10077-100770110 = "Sim, graças a você."
10077-100770120 = "Obrigado, Ichika."
10077-100770130 = "Isso não foi nada."
10077-100770140 = "Bem, então."
10077-100770150 = "Eu também já estou indo dormir."
10077-100770160 = "Boa noooite."
10077-100770170 = "Hmm..."
10077-100770180 = "O que será que eu faço..."
10077-100770190 = "Sensei..."
10077-100770200 = "O que você faz quando não está trabalhando?"
10077-100770210 = "Durmo como se estivesse morto..."
10077-100770220 = "Leio mangás ou jogo videogame."
10077-100770230 = "Ah..."
10077-100770240 = "Entendi."
10077-100770250 = "Então é esse o seu estilo, né?"
10077-100770260 = "Nossa, foi divertido."
10077-100770270 = "O dia de hoje foi muito bem aproveitado, né?"
10077-100770280 = "Você ainda está tocando guitarra?"
10077-100770290 = "Ficou mais interessada em tocar?"
10077-100770300 = "Hã?"
10077-100770310 = "Ah, não."
10077-100770320 = "Tentei tocar algumas vezes em casa, mas..."
10077-100770330 = "não estava muito a fim."
10077-100770340 = "Acabei enfiando no armário."
10077-100770350 = "Ahaha."
10077-100770360 = "Sensei."
10077-100770370 = "Você tem um tempo agora?"
10077-100770380 = "Hmm? O que foi?"
10077-100770390 = "Eu estava justamente sem nada para fazer."
10077-100770400 = "Ah, bem..."
10077-100770410 = "Não, não é nada..."
10077-100770420 = "É que estou um pouco à toa..."
10077-100770430 = "Ainda falta bastante tempo para o meu compromisso,"
10077-100770440 = "e tenho menos coisas pra fazer do que eu imaginava."
10077-100770450 = "Sensei."
10077-100770460 = "O que você está fazendo agora?"
10077-100770470 = "Ah, bem..."
10077-100770480 = "Não é que eu precise de algo em especial, mas..."
10077-100770490 = "Terminei o trabalho e estou descansando."
10077-100770500 = "Quer se encontrar no parque?"
10077-100770510 = "Opa"
10077-100770520 = "Que bom"
10077-100770530 = "Então, até mais tarde!"
10077-100770540 = "Ufa..."
10077-100770550 = "Hoje foi divertido graças a você, Sensei"
10077-100770560 = "Muito obrigada, Sensei"
10077-100770570 = "Quero sair para me divertir de novo!"
10077-100770580 = "Foi você que disse que seria melhor assim, Sensei!"
10077-100770590 = "Claro, te acompanho quando quiser"
10077-100770600 = "Espero que você encontre algo que te fascine"
10077-100770610 = "Sim!"
10077-100770620 = "…Hmm…"
10077-100770630 = "Mas…"
10077-100770640 = "…"
10077-100770650 = "Por enquanto..."
10077-100770660 = "Está tudo bem, porque este momento já é o melhor!"
10077-100770670 = "Haha"
