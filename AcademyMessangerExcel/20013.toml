[translation]
20013-200130010 = "Professor, desculpe incomodar enquanto está ocupado."
20013-200130020 = "É que, por causa de um problema de segurança, eu preciso dar uma olhada no servidor do Schale."
20013-200130030 = "Como preciso abrir o PC que está aí, podemos nos encontrar no escritório do Schale mais tarde?"
20013-200130040 = "Ah, nesse caso, espere um pouco."
20013-200130050 = "Vou escrever a senha."
20013-200130060 = "Espere."
20013-200130070 = "Escrever a senha em uma linha comum é absolutamente proibido."
20013-200130080 = "Tem um bilhete com a senha embaixo do monitor, pode olhar lá que não tem problema."
20013-200130090 = "Hã?"
20013-200130100 = "……É brincadeira, né?"
20013-200130110 = "Professor, preciso te pedir um favor."
20013-200130120 = "Sim, o que houve?"
20013-200130130 = "Hoje à tarde, vou visitar uma certa empresa."
20013-200130140 = "O presidente é bem teimoso, então pensei em me preparar com antecedência."
20013-200130150 = "Uma preparação ao estilo Veritas."
20013-200130160 = "Ao estilo Veritas……?"
20013-200130170 = "Tipo, hackear?"
20013-200130180 = "Sim. Quero instalar um backdoor, mas preciso da sua ajuda."
20013-200130190 = "Backdoor……?"
20013-200130200 = "Eu sou um leigo em hackear, tudo bem?"
20013-200130210 = "Bem, quando digo ajudar, só preciso que você esteja lá comigo."
20013-200130220 = "Então, nos vemos mais tarde."
20013-200130230 = "Professor, por acaso foi você quem ligou agora pouco?"
20013-200130240 = "Desculpe, eu estava dormindo."
20013-200130250 = "Ah, entendi. Desculpe por te acordar."
20013-200130260 = "Já é meio-dia, você ficou acordado até tarde ontem?"
20013-200130270 = "Não. É que hoje de madrugada tem manutenção no servidor de uma empresa que eu presto consultoria."
20013-200130280 = "Como vou passar a noite em claro, pensei em dormir um pouco antes."
20013-200130290 = "Entendi, deve ser difícil."
20013-200130300 = "Se não se importar, posso ir junto para observar?"
20013-200130310 = "Observar?"
20013-200130320 = "Por mim tudo bem, mas…… é bem monótono, acho que você não vai achar interessante."
20013-200130330 = "Sim, mesmo assim."
20013-200130340 = "Entendido. Então nos encontramos à meia-noite. Te mando o local depois."
20013-200130350 = "Só que, pelo conteúdo, não sei que horas vai terminar."
20013-200130360 = "Prepare-se para virar a noite, é melhor dormir um pouco agora."
20013-200130370 = "Talvez você já saiba, mas as meninas da Veritas vivem hackeando as coisas por pura curiosidade……"
20013-200130380 = "Felizmente ainda não causou nenhum problema grave, mas vivem surgindo confusões."
20013-200130390 = "Desse jeito, a imagem de hackers……"
20013-200130400 = "Eu tinha essa imagem de hackers, mas isso é um preconceito?"
20013-200130410 = "Claro, especialmente hoje em dia, quando as pessoas ouvem 'hacker', pensam logo em 'black hat hackers'……"
20013-200130420 = "O termo 'hacker' originalmente significava 'especialista em segurança', quase como os 'white hat hackers' de hoje."
20013-200130430 = "Ai, preciso encontrar um tempo para ensinar ética hacker para as meninas…… não podemos depender sempre desses métodos……"
20013-200130440 = "Ultimamente estou tão ocupada que nem tenho aparecido no clube……"
