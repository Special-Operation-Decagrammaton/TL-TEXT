[translation]
20013-200130010 = "先生、忙しいところにごめん"
20013-200130020 = "ちょっとセキュリティ関連の問題で、シャーレのサーバーを調べたくって"
20013-200130030 = "その場にあるPCを開かないといけないから、後でシャーレのオフィスで会える？"
20013-200130040 = "あ、そしたらちょっと待ってて"
20013-200130050 = "パスワードを書くから"
20013-200130060 = "待った"
20013-200130070 = "普通の回線でパスワードを書くなんて絶対にダメ"
20013-200130080 = "モニターの下にパスワードを書いたメモがあるから、それを見ても大丈夫だよ"
20013-200130090 = "え"
20013-200130100 = "……冗談、だよね？"
20013-200130110 = "先生、ちょっとお願いしたいことがあって"
20013-200130120 = "うん、どうしたの？"
20013-200130130 = "今日の午後、とある企業のところに行くんだけど"
20013-200130140 = "社長が結構頑固でね、あらためて準備しておこうと思って"
20013-200130150 = "ヴェリタス流の準備を"
20013-200130160 = "ヴェリタス流の……？"
20013-200130170 = "ハッキング、とか？"
20013-200130180 = "うん。ちょっとバックドアを設置しておこうと思うんだけど、手伝ってほしくて"
20013-200130190 = "バックドア……？"
20013-200130200 = "私ハッキングについては素人だけど、大丈夫？"
20013-200130210 = "まあ手伝ってと言っても、先生はただそこにいてくれるだけで良いから"
20013-200130220 = "じゃあまた後で"
20013-200130230 = "先生、もしかしてさっき電話くれた？"
20013-200130240 = "ごめん、ちょっと寝てた"
20013-200130250 = "あ、うん。起こしちゃったらごめん"
20013-200130260 = "もうお昼だけど、昨日は夜更かしとか？"
20013-200130270 = "ううん。今日の深夜に、コンサルティングを担当してる会社のサーバーメンテナンスがあって"
20013-200130280 = "徹夜になるだろうから、先に少し寝ておこうかなって"
20013-200130290 = "そうなんだ、大変だね"
20013-200130300 = "良かったらそれ、見学に行ってもいい？"
20013-200130310 = "見学？"
20013-200130320 = "別に良いけど……結構地味だし、面白くないと思うよ？"
20013-200130330 = "うん、それでも"
20013-200130340 = "分かった。じゃあ今日の0時に集合で。場所は後で送る"
20013-200130350 = "ただ、今回は内容的にいつ終わるか分からないから"
20013-200130360 = "徹夜覚悟だし、今のうちに少しでも寝ておいた方が良いよ"
20013-200130370 = "知ってるかもしれないけどうちのヴェリタスの子たち、すぐ興味本位でハッキングとかしがちで……"
20013-200130380 = "幸いまだそれほど大きな問題にはなってないけど、しょっちゅう揉め事ばっかり起きてるんだよね"
20013-200130390 = "このままだと、ハッカーとしてのイメージが……"
20013-200130400 = "結構ハッカーってそういうイメージがあったけど、やっぱりそれって偏見？"
20013-200130410 = "もちろん特に最近は、「ハッカー」っていうとみんな「ブラックハッカー」を思い浮かべるみたいだけど……"
20013-200130420 = "本来の「ハッカー」はほとんど今の「ホワイトハッカー」に近い、「セキュリティの専門家」を意味する言葉だったの"
20013-200130430 = "はぁ、また時間を見つけてうちの子たちにハッカー倫理について教育しておかないと……そういう手段に頼りっぱなしじゃダメなのに……"
20013-200130440 = "最近は忙しくて、あまり部活に顔も出せてないし……"
