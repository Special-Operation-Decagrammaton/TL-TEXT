[translation]
13011-130110010 = "勇者よ……"
13011-130110020 = "このモモトークを見たら、すぐにゲーム開発部の部室へと来たれ……"
13011-130110030 = "うん、じゃあ今から行くね"
13011-130110040 = "えー……"
13011-130110050 = "ノータイムでクエスト受注！"
13011-130110060 = "さっすが先生！"
13011-130110070 = "ぐっ、ここでその選択肢！？これは予想してなかった……！"
13011-130110080 = "いや、でもシナリオによってはこういう分岐もアリ……"
13011-130110090 = "……じゃなくて！"
13011-130110100 = "約束したじゃん！今日部室でって！"
13011-130110110 = "……そうだっけ？"
13011-130110120 = "とにかく、ゲーム開発部の部室で待ってるから！"
13011-130110130 = "早く来てね！"
13011-130110140 = "先生ー"
13011-130110150 = "最高のゲームシナリオの条件って何だと思う？"
13011-130110160 = "最高のゲームシナリオ……？"
13011-130110170 = "急にどうしたの？"
13011-130110180 = "それは……"
13011-130110190 = "ああっ、思い出したらイライラしてきた！"
13011-130110200 = "あいつら、好き放題言ってくれちゃって！"
13011-130110210 = "発想が古いとか、展開が中だるみしてるだとか"
13011-130110220 = "もうダメ！先生、今からゲーム開発部の部室に来て！"
13011-130110230 = "……？"
13011-130110231 = "どうしよう先生！？"
13011-130110232 = "せっかく浮かんだアイデアが思いっきり矛盾してて、"
13011-130110233 = "それを打破する次のアイデアが全然浮かばない！助けてーー！"
13011-130110234 = "うわあぁぁぁん！！！"
13011-130110240 = "先生、レトロゲームの世界はすごく広いんだよ！"
13011-130110250 = "でもそんなレトロゲームの中でも、シナリオの比重が大きいゲームとして、"
13011-130110260 = "やっぱり恋愛シミュレーションゲームは外せない！"
13011-130110270 = "恋愛シミュレーション……？"
13011-130110280 = "だから今日は、"
13011-130110290 = "恋愛シミュレーションをシミュレーションしてみようと思うの！"
13011-130110300 = "じゃあ後で場所は送るから、そこで待ち合わせね！先生！"
13011-130110310 = "シミュレーションをシミュレーション……？"
13011-130110320 = "先生、その……今日、楽しかった。ありがと"
13011-130110330 = "うん、私も楽しかったよ"
13011-130110340 = "そ、それは良かった"
13011-130110350 = "でも、今日のことはその、他の人には秘密だよ！"
13011-130110360 = "特にミドリとかには絶対言わないで！"
13011-130110370 = "どうしてそこまで？だって確か最初はゲーム開発部で……"
13011-130110380 = "ダメ！絶対に秘密！！"
13011-130110390 = "先生先生！"
13011-130110400 = "モモイが現れた！"
13011-130110410 = "どうしたの？"
13011-130110420 = "今度、春葉原ですっごく大きなイベントがあるんだって！"
13011-130110430 = "なんと、ウルトラマリンシスターズ40周年スタンプラリー！"
13011-130110440 = "スタンプラリー？"
13011-130110450 = "スタンプを全部集めたら、プレゼントとして限定グッズを貰えるみたいなの"
13011-130110460 = "これは見逃せない……！"
13011-130110470 = "一緒に行こ、先生！！"
13011-130110480 = "覚えているか"
13011-130110490 = "狩人よ！"
13011-130110500 = "もちろんだよ、相棒……"
13011-130110510 = "今こそ狩りのとき……！"
13011-130110520 = "いざ行かん！"
13011-130110530 = "私の背中は預けたよ！"
