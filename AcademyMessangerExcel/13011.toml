[translation]
13011-130110010 = "Ó, herói..."
13011-130110020 = "Assim que vir este Momotalk, venha imediatamente para a sala do Clube de Desenvolvimento de Jogos..."
13011-130110030 = "Sim, então estou indo agora."
13011-130110040 = "Ei..."
13011-130110050 = "Aceitou a missão sem nem pensar!"
13011-130110060 = "Como esperado do Sensei!"
13011-130110070 = "Droga, essa escolha aqui!? Eu não esperava por isso...!"
13011-130110080 = "Não, mas dependendo do cenário, esse tipo de ramificação também é aceitável..."
13011-130110090 = "...Não é isso!"
13011-130110100 = "Nós tínhamos combinado! Hoje, na sala do clube!"
13011-130110110 = "...Foi mesmo?"
13011-130110120 = "De qualquer forma, estou te esperando na sala do Clube de Desenvolvimento de Jogos!"
13011-130110130 = "Venha logo!"
13011-130110140 = "Sensei!"
13011-130110150 = "O que você acha que define o melhor cenário de jogo?"
13011-130110160 = "O melhor cenário de jogo...?"
13011-130110170 = "Por que a pergunta de repente?"
13011-130110180 = "É que..."
13011-130110190 = "Ah, só de lembrar já fico irritada!"
13011-130110200 = "Aqueles caras, falando o que bem entendem!"
13011-130110210 = "Dizendo que a ideia é antiquada, que o desenvolvimento está arrastado..."
13011-130110220 = "Não dá mais! Sensei, venha agora para a sala do Clube de Desenvolvimento de Jogos!"
13011-130110230 = "...?"
13011-130110231 = "O que eu faço, Sensei!?"
13011-130110232 = "A ideia que eu tive com tanto esforço está cheia de contradições,"
13011-130110233 = "e não consigo pensar em nenhuma ideia nova para resolver isso! Socorro!"
13011-130110234 = "Waaaaah!!!"
13011-130110240 = "Sensei, o mundo dos jogos retrô é muito vasto!"
13011-130110250 = "Mas, entre esses jogos retrô, aqueles onde o cenário tem um peso maior,"
13011-130110260 = "com certeza, não podem faltar os simuladores de namoro!"
13011-130110270 = "Simulador de namoro...?"
13011-130110280 = "Por isso, hoje,"
13011-130110290 = "eu quero simular um simulador de namoro!"
13011-130110300 = "Vou te enviar o local depois, nos encontramos lá! Sensei!"
13011-130110310 = "Simular uma simulação...?"
13011-130110320 = "Sensei, sobre isso... hoje foi divertido. Obrigado."
13011-130110330 = "Sim, eu também me diverti."
13011-130110340 = "I-isso é bom."
13011-130110350 = "Mas, o que aconteceu hoje, sabe, mantenha em segredo dos outros!"
13011-130110360 = "Especialmente não conte para a Midori, de jeito nenhum!"
13011-130110370 = "Por que tanto segredo? Porque, se não me engano, no começo no Clube de Desenvolvimento de Jogos..."
13011-130110380 = "Não! É segredo absoluto!!"
13011-130110390 = "Sensei, Sensei!"
13011-130110400 = "Momoi apareceu!"
13011-130110410 = "O que houve?"
13011-130110420 = "Disseram que vai ter um evento enorme em Harubara!"
13011-130110430 = "É o Rally de Selos do 40º aniversário das Ultramarine Sisters!"
13011-130110440 = "Rally de selos?"
13011-130110450 = "Parece que se você coletar todos os selos, ganha brindes exclusivos."
13011-130110460 = "Isso é imperdível...!"
13011-130110470 = "Vamos juntos, Sensei!!"
13011-130110480 = "Você se lembra?"
13011-130110490 = "Caçador!"
13011-130110500 = "Com certeza, parceiro..."
13011-130110510 = "Agora é a hora da caçada...!"
13011-130110520 = "Vamos nessa!"
13011-130110530 = "Confio as minhas costas a você!"
