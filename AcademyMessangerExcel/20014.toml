[translation]
20014-200140010 = "Sensei, você tem uma caixa de costura aí na Schale?"
20014-200140020 = "Tenho sim, fica guardada na gaveta da minha mesa."
20014-200140030 = "Você pode usar à vontade, mas aconteceu alguma coisa?"
20014-200140040 = "A correia do meu capacete de aço está quase arrebentando."
20014-200140050 = "Na nossa atual situação financeira, a única opção é eu mesma costurar e consertar..."
20014-200140060 = "Espera, consertar quer dizer que... você vai finalmente tirar o capacete da cabeça?"
20014-200140070 = "Bem, isso é meio óbvio, né."
20014-200140080 = "……Por que diabos você acha que eu 'nunca tiro' ele?"
20014-200140090 = "Sensei, só pra avisar."
20014-200140100 = "Eu deixei uma cesta aí na frente da Schale, mas não toque nela, deixe exatamente onde está. Eu vou levar de volta pro acampamento mais tarde."
20014-200140110 = "Ah, aquela cesta cheia de um monte de mato esquisito?"
20014-200140120 = "É. Pera aí, mato esquisito...?! Sensei, não me diga que você não sabe o que é 'Tarabo'?!"
20014-200140130 = "São brotos frescos de Aralia! É uma iguaria deliciosa e super nutritiva que dá pra achar fácil por aqui se souber procurar!"
20014-200140140 = "Fica incrível só de dar uma leve fervida, e é perfeito pra fazer tempurá. Combina maravilhosamente bem com uma tigela de arroz!"
20014-200140150 = "……Bem, claro que, na nossa situação atual onde mal conseguimos comprar farinha de trigo ou óleo, fazer tempurá é um sonho muito distante."
20014-200140160 = "Eu não tenho certeza, mas..."
20014-200140170 = "Eu acho que vi um monte desse 'mato' crescendo aos montes lá na trilha da montanha oeste."
20014-200140180 = "É sério isso?!"
20014-200140190 = "Sensei, me guia até lá agora mesmo! É uma ordem!"
20014-200140200 = "Sensei. Aquela TV que tem aí na Schale tem função de gravação?"
20014-200140210 = "Vai passar um documentário super interessante hoje à noite no 'Canal Kronos' que eu queria muito ver……"
20014-200140220 = "Tem sim, pode deixar que eu deixo gravando pra você."
20014-200140230 = "Ah."
20014-200140240 = "Isso ajuda muito, obrigada."
20014-200140250 = "Ultimamente os aparelhos eletrônicos vêm com um monte de funções inúteis, e os manuais estão todos virando digitais, o que torna péssimo pra ler……"
20014-200140260 = "Sinto falta dos produtos de antigamente, que tinham funções simples e eram fáceis de usar……"
20014-200140270 = "Saki, que papo é esse de 'antigamente'..."
20014-200140280 = "Hã?"
20014-200140290 = "Você tá querendo dizer que eu pareço uma 'vovó' reclamando da tecnologia, é isso?!"
20014-200140300 = "Não, não foi isso que eu quis dizer, calma……!"
20014-200140310 = "Eu ouvi um boato de uma conhecida minha da Academia Valkyrie mais cedo."
20014-200140320 = "Parece que tem um monte de equipamento de acampamento jogado fora na montanha atrás do parque."
20014-200140330 = "Dizem que antigamente tinha uma espécie de base pequena lá, e quando ela foi desativada, deixaram as coisas pra trás."
20014-200140340 = "Mesmo que sejam coisas velhas e usadas, pra gente na situação atual, é muito melhor do que não ter nada."
20014-200140350 = "Eu tô pensando em ir lá dar uma olhada nesse fim de semana……"
20014-200140360 = "O problema é que, pelo que me falaram, deve ter muita coisa pesada."
20014-200140370 = "Me ajudaria muito se você pudesse vir carregar peso."
20014-200140380 = "Copiado! Pode contar comigo. Adoro trilhas!"
20014-200140390 = "Valeu."
20014-200140400 = "Parece que as outras meninas do esquadrão estão ocupadas, e seria meio ruim eu ter que fazer várias viagens sozinha pra carregar tudo……"
20014-200140410 = "Ah, falando nisso, parece que a trilha dessa montanha é bem íngreme e perigosa."
20014-200140420 = "É melhor você vir vestindo roupas e botas adequadas."
20014-200140430 = "Sensei, foi mal te incomodar agora, mas……"
20014-200140440 = "Você pode dar uma olhada rápida na sala de descanso da Schale?"
20014-200140450 = "Acho que esqueci um livro meu em cima da mesa."
20014-200140460 = "Tá escrito 'Sorai' na capa, então você vai reconhecer na hora."
20014-200140470 = "Se você achar, guarda ele a sete chaves. Eu tô indo aí buscar agora!"
20014-200140480 = "Esqueça tudo o que aconteceu hoje."
20014-200140490 = "Se qualquer informação vazar, eu não hesitarei em usar força armada letal contra você."
20014-200140500 = "Poxa, canetinha permanente não sai fácil do rosto, né……"
20014-200140510 = "Bem feito pra você aprender!"
20014-200140520 = "Mas olha pelo lado bom, se a própria Saki fez anotações no meu rosto, quer dizer que eu virei um manual tático super importante também?"
20014-200140530 = "Mas qu e dia  bos"
20014-200140540 = "vc ta fnlado"
20014-200140550 = "……Você tá querendo engolir um tiro de morteiro, é isso?!"