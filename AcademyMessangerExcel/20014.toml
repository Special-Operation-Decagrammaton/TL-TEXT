[translation]
20014-200140010 = "先生、シャーレに裁縫箱はあるか？"
20014-200140020 = "うん、デスクの中にあるよ"
20014-200140030 = "全然使って大丈夫だけど、何かあったの？"
20014-200140040 = "鉄帽のバンドが切れそうになってて"
20014-200140050 = "こんな状況だし、自分で直すしか……"
20014-200140060 = "直すってことはもしかして、その時は鉄帽脱ぐの？"
20014-200140070 = "まあ、それは当然"
20014-200140080 = "……何で「絶対に脱がない」みたいに思われてるんだ"
20014-200140090 = "先生、念のため"
20014-200140100 = "シャーレの前にかごを置いたんだけど、触らないでそのままにしてほしい。ちゃんと持って帰るから"
20014-200140110 = " あ、何か草みたいなのがたくさん入ってたアレ？"
20014-200140120 = "ああ。っていうか草って……先生は「タラボ」を知らないのか？"
20014-200140130 = "生え立てのタラの芽だ、その辺でも簡単に手に入る珍味のひとつ"
20014-200140140 = "軽くゆがいただけでも美味しいし、天ぷらにも良い。ご飯にピッタリのおかずだ！"
20014-200140150 = "……まぁもちろん、小麦粉も油もロクに手に入らない今の状況で、天ぷらなんて夢のまた夢なんだが"
20014-200140160 = "多分だけど……"
20014-200140170 = "同じようなやつが、西の山道にたくさん生えてた気がする"
20014-200140180 = "本当か！？"
20014-200140190 = "先生、今すぐ案内してくれ！"
20014-200140200 = "先生。シャーレにあるTVって、録画機能は付いてるのか？"
20014-200140210 = "今夜「クロノスチャンネル」で、気になるドキュメンタリーがあって……"
20014-200140220 = "うん、録画しておくね"
20014-200140230 = "あ"
20014-200140240 = "助かる、ありがとう"
20014-200140250 = "最近はやたらと機能が多い機器ばっかりで、マニュアルもどんどんデジタル化されて読みづらいし……"
20014-200140260 = "シンプルな機能で使いやすかった、昔の製品が恋しい……"
20014-200140270 = "いや、「昔」も何も……"
20014-200140280 = "ん？"
20014-200140290 = "それはつまり、私が「おばあちゃん」だと言いたいのか？"
20014-200140300 = "いや、そうじゃなくって……"
20014-200140310 = "さっきヴァルキューレの知り合いから聞いたんだけど"
20014-200140320 = "公園の裏手にある山に、キャンプ用品が色々捨てられてたらしい"
20014-200140330 = "昔ちょっとした基地みたいなのがあったらしくて、そこが無くなる時に放置されたんだとか"
20014-200140340 = "たとえ古いものだとしても、今の私たちにとっては無いよりマシだろうし"
20014-200140350 = "ちょっと今週末に行こうかと思ってるんだけど……"
20014-200140360 = "その、聞いた感じ多分量が多くて"
20014-200140370 = "手伝ってくれたら助かる"
20014-200140380 = "うん、了解。喜んで"
20014-200140390 = "ありがと"
20014-200140400 = "何かみんな忙しいらしくて、でもひとりで往復するのもアレだし……"
20014-200140410 = "そういえばその山、結構登山道が険しいみたいだから"
20014-200140420 = "多分ちゃんとした格好で来た方が良い"
20014-200140430 = "先生、悪いんだが……"
20014-200140440 = "ちょっとシャーレの休憩室を見てくれないか？"
20014-200140450 = "テーブルの上に本があると思うんだが"
20014-200140460 = "「空井」と書いてあるから、すぐにわかるはずだ"
20014-200140470 = "あったら保管しておいてくれ。取りに行く！"
20014-200140480 = "今日のことは忘れろ"
20014-200140490 = "もし情報が漏れたら、武力行使も辞さない"
20014-200140500 = "油性ペン、落ちないね……"
20014-200140510 = "いい気味だ！"
20014-200140520 = "サキが書き込んだなら、私も大事な教範かな？"
20014-200140530 = "なっに　を"
20014-200140540 = "い言っ"
20014-200140550 = "……迫撃砲の味を体験したいのか！？"
