[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
20014-200140010 = "Sensei, você tem um kit de costura na Schale?" 
20014-200140020 = "Sim, tem um guardado na gaveta da mesa" 
20014-200140030 = "Pode vir usar sem problemas, aconteceu alguma coisa?" 
20014-200140040 = "A fita de ajuste do meu capacete tá quase rasgando" 
20014-200140050 = "Na nossa situação atual, a única solução é tentar costurar por conta própria..." 
20014-200140060 = "Se você vai consertar, significa que vai ter que tirar o capacete, não é?" 
20014-200140070 = "Bom, sim. É óbvio" 
20014-200140080 = "......Por que de repente você acha que eu 'absolutamente não o tiraria por nada'?" 
20014-200140090 = "Sensei, só pra avisar" 
20014-200140100 = "Deixei uma cesta na frente da porta da Schale. Por favor, não toque nela, deixe exatamente onde está. Eu vou passar para pegar depois" 
20014-200140110 = "Ah, você diz aquela cesta cheia de coisas que pareciam mato?" 
20014-200140120 = "Uhum. E não chama de mato... O Sensei por acaso não sabe o que são 'brotos de arália'?" 
20014-200140130 = "São brotos novos da árvore de arália, uma das iguarias selvagens mais fáceis de se encontrar por aí" 
20014-200140140 = "Só dar uma fervida de leve já fica uma delícia, e fazer tempurá fica melhor ainda. É o acompanhamento perfeito pro arroz!" 
20014-200140150 = "......Claro, na nossa situação atual onde nem farinha e óleo a gente tem direito, fazer tempurá é um sonho inalcançável" 
20014-200140160 = "É só um palpite, mas..." 
20014-200140170 = "Eu acho que vi uma plantação enorme do que parecia ser isso na estrada da montanha oeste" 
20014-200140180 = "É SÉRIO ISSO!?" 
20014-200140190 = "Sensei, me guia até lá AGORA!" 
20014-200140200 = "Sensei. As TVs da Schale têm aquela função de gravação?" 
20014-200140210 = "Vai passar um documentário super interessante no 'Canal Kronos' esta noite e eu queria assistir..." 
20014-200140220 = "Sim, deixarei gravando para você" 
20014-200140230 = "Ah" 
20014-200140240 = "Vai me salvar muito, valeu" 
20014-200140250 = "Esses aparelhos de hoje em dia são lotados de funções desnecessárias, e até os manuais estão virando tudo digital e difíceis de ler..." 
20014-200140260 = "Sinto muita saudade dos eletrônicos das antigas, com funções simples e que qualquer um sabia usar..." 
20014-200140270 = "Espera aí, quando você diz 'das antigas'..." 
20014-200140280 = "Hm?" 
20014-200140290 = "Basicamente, você tá querendo dizer que eu pareço uma velha caduca? É isso?" 
20014-200140300 = "Não, não foi isso que eu quis dizer..." 
20014-200140310 = "Eu ouvi um boato de uma conhecida minha da Valkyrie agorinha" 
20014-200140320 = "Dizem que tem um monte de equipamentos de acampamento e materiais jogados e abandonados na montanha atrás do parque" 
20014-200140330 = "Parece que tinha uma base militar improvisada por lá antigamente, e os itens foram deixados para trás quando eles evacuaram a área" 
20014-200140340 = "Mesmo sendo itens antigos e desgastados, para nós na nossa situação atual, é muito melhor do que não ter nada" 
20014-200140350 = "Eu tava pensando em dar uma olhada por lá neste fim de semana..." 
20014-200140360 = "Então, pelo que eu ouvi, parece que é um monte de tralha" 
20014-200140370 = "Se você pudesse dar uma mãozinha lá, seria de grande ajuda" 
20014-200140380 = "Beleza, entendi. Terei o maior prazer em ajudar" 
20014-200140390 = "Obrigado" 
20014-200140400 = "As outras garotas parecem estar ocupadas, mas fazer várias viagens carregando peso sozinha ia ser tenso..." 
20014-200140410 = "Ah, lembrando, parece que a trilha daquela montanha é bem casca-grossa" 
20014-200140420 = "Então é melhor você vir vestido e preparado com uma roupa adequada pra trilha" 
20014-200140430 = "Sensei, foi mal te pedir isso, mas..." 
20014-200140440 = "Poderia dar uma conferida na sala de descanso da Schale pra mim?" 
20014-200140450 = "Eu acho que deixei um livro esquecido em cima da mesa" 
20014-200140460 = "O nome 'Sorai' tá escrito na capa, então você vai reconhecer de cara" 
20014-200140470 = "Se estiver aí, guarda pra mim. Eu vou dar um pulo aí pra buscar!" 
20014-200140480 = "Finja que não viu e esqueça tudo o que aconteceu hoje" 
20014-200140490 = "Se alguma informação vazar, eu não hesitarei em usar força letal pra te calar" 
20014-200140500 = "Canetão permanente não sai fácil com água e sabão..." 
20014-200140510 = "Bem feito pra você!" 
20014-200140520 = "Se foi a Saki que escreveu, acho que isso significa que eu também sou um manual de operações muito precioso?" 
20014-200140530 = "Masq por ra" 
20014-200140540 = "c e  t a fa lan o  " 
20014-200140550 = "......Tá a fim de provar o poder de fogo da minha arma!?" 