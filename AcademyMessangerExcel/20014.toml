[translation]
20014-200140010 = "Sensei, tem uma caixa de costura no Schale?"
20014-200140020 = "Sim, tem uma na minha mesa."
20014-200140030 = "Pode usar à vontade, mas aconteceu alguma coisa?"
20014-200140040 = "A tira do meu capacete está quase arrebentando."
20014-200140050 = "Com a situação atual, não tenho escolha a não ser consertar eu mesma..."
20014-200140060 = "Consertar? Isso significa que você vai tirar o capacete?"
20014-200140070 = "Bem, isso é óbvio."
20014-200140080 = "...Por que você acha que eu 'nunca tiro' ele?"
20014-200140090 = "Sensei, só por precaução."
20014-200140100 = "Deixei uma cesta na frente do Schale, mas por favor, não toque nela. Deixe como está, eu vou buscá-la depois."
20014-200140110 = "Ah, aquela que estava cheia de umas coisas que pareciam mato?"
20014-200140120 = "É. E 'mato'...? Sensei, você não conhece 'broto de arália'?"
20014-200140130 = "São brotos frescos de arália, uma iguaria que se encontra facilmente por aqui."
20014-200140140 = "Ficam deliciosos só de dar uma fervida, ou em tempurá. É o acompanhamento perfeito para o arroz!"
20014-200140150 = "...Bom, é claro que, na situação atual, onde é difícil conseguir farinha e óleo, tempurá é um sonho distante."
20014-200140160 = "Mas, talvez..."
20014-200140170 = "Acho que vi muitos parecidos na trilha da montanha a oeste."
20014-200140180 = "Sério!?"
20014-200140190 = "Sensei, me leve lá agora mesmo!"
20014-200140200 = "Sensei. A TV do Schale tem função de gravação?"
20014-200140210 = "Tem um documentário que quero ver no 'Canal Chronos' hoje à noite..."
20014-200140220 = "Sim, eu gravo para você."
20014-200140230 = "Ah."
20014-200140240 = "Que alívio, obrigada."
20014-200140250 = "Ultimamente, os aparelhos têm funções demais, e os manuais digitais são cada vez mais difíceis de ler..."
20014-200140260 = "Sinto falta dos produtos antigos, que eram simples e fáceis de usar..."
20014-200140270 = "Não, 'antigos' é modo de dizer..."
20014-200140280 = "Hm?"
20014-200140290 = "Isso significa que você está me chamando de 'vovó'?"
20014-200140300 = "Não, não é isso..."
20014-200140310 = "Ouvi de uma conhecida da Valkyrie agora pouco."
20014-200140320 = "Parece que descartaram vários equipamentos de acampamento na montanha atrás do parque."
20014-200140330 = "Dizem que costumava haver uma espécie de base lá, e deixaram tudo para trás quando a desativaram."
20014-200140340 = "Mesmo que sejam coisas velhas, para nós, é melhor do que nada."
20014-200140350 = "Estou pensando em ir lá neste fim de semana..."
20014-200140360 = "E, pelo que ouvi, parece que é muita coisa."
20014-200140370 = "Seria uma grande ajuda se você pudesse me ajudar."
20014-200140380 = "Sim, entendido. Com prazer."
20014-200140390 = "Obrigada."
20014-200140400 = "Parece que todo mundo está ocupado, e não seria legal ir e voltar sozinha..."
20014-200140410 = "Falando nisso, a trilha daquela montanha parece ser bem íngreme."
20014-200140420 = "Talvez seja melhor você vir com roupas adequadas."
20014-200140430 = "Sensei, desculpe incomodar..."
20014-200140440 = "Pode dar uma olhada na sala de descanso do Schale?"
20014-200140450 = "Acho que tem um livro em cima da mesa."
20014-200140460 = "Está escrito 'Sorai', então você vai reconhecer na hora."
20014-200140470 = "Se encontrar, guarde para mim. Eu vou buscar!"
20014-200140480 = "Esqueça o que aconteceu hoje."
20014-200140490 = "Se essa informação vazar, não hesitarei em usar a força."
20014-200140500 = "Caneta permanente não sai, né..."
20014-200140510 = "Bem feito!"
20014-200140520 = "Se a Saki escreveu, será que eu também sou um manual importante?"
20014-200140530 = "O que"
20014-200140540 = "você disse"
20014-200140550 = "……Você quer sentir o gosto do morteiro!?"
