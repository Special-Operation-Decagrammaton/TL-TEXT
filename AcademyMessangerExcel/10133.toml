[translation]
10133-101330010 = "Como está a vida no navio de transporte?"
10133-101330020 = "Se houver algo inconveniente, por favor, me diga."
10133-101330030 = "Vou melhorar o que for possível."
10133-101330040 = "É muito confortável!"
10133-101330050 = "Estou vivendo sem nenhuma dificuldade!"
10133-101330060 = "Se for assim, então está bom."
10133-101330070 = "Aceito pedidos a qualquer momento,"
10133-101330080 = "então não hesite."
10133-101330090 = "Rio, você está bem?"
10133-101330100 = "Eu?"
10133-101330110 = "Eu também não tenho nenhum problema em particular..."
10133-101330120 = "É sobre o robô-empregada."
10133-101330130 = "Vou relatar os resultados."
10133-101330140 = "Para resumir,"
10133-101330150 = "o uniforme de empregada"
10133-101330160 = "não pôde ser emprestado."
10133-101330170 = "No entanto, pensando bem novamente,"
10133-101330180 = "será que é difícil definir o Avant-garde-kun,"
10133-101330190 = "que ajuda nas tarefas domésticas,"
10133-101330200 = "como 'não' sendo um robô-empregada?"
10133-101330210 = "Uma empregada é alguém que tem as tarefas domésticas como profissão."
10133-101330220 = "O Avant-garde-kun é um robô que faz tarefas domésticas."
10133-101330230 = "Ou seja, o Avant-garde-kun"
10133-101330240 = "é um robô que desempenha o papel de empregada."
10133-101330250 = "Mesmo aplicando a lógica do silogismo,"
10133-101330260 = "acredito que muitos elementos são comuns."
10133-101330270 = "Eu perdi..."
10133-101330280 = "Você percebeu?"
10133-101330290 = "Hoje, somos só nós neste navio."
10133-101330300 = "Parece que todos saíram para resolver algo."
10133-101330310 = "Não é à toa que achei que estava quieto."
10133-101330320 = "Já que é uma boa oportunidade,"
10133-101330330 = "pretendo adiantar as tarefas acumuladas."
10133-101330340 = "Como eu estava adiando as tarefas que exigem concentração,"
10133-101330350 = "o sistema pode reiniciar, mas"
10133-101330360 = "não é um erro, então, por favor, não se assuste."
10133-101330370 = "O que você pretende fazer?"
10133-101330380 = "Vou manter os detalhes em segredo."
10133-101330390 = "Isso é tudo o que eu tinha para te dizer."
10133-101330400 = "Conto com você hoje também."
10133-101330410 = "Sensei, quero te agradecer."
10133-101330420 = "Graças a você, consegui concluir a atualização do navio de transporte com sucesso."
10133-101330430 = "Embora o desempenho não tenha melhorado tanto quanto o esperado..."
10133-101330440 = "É esse tipo de acúmulo que fará a diferença mais tarde."
10133-101330450 = "Muito obrigado pelo seu esforço!"
10133-101330460 = "E sobre o assunto que o Sensei tentou disfarçar agora há pouco,"
10133-101330470 = "eu pensei sozinha, e..."
10133-101330480 = "Será que..."
10133-101330490 = "o Sensei entendeu mal que estava se comunicando com alguém em um espaço virtual?"
10133-101330500 = "O Sensei entendeu mal?"
10133-101330510 = "É, é por aí!"
10133-101330520 = "Então era isso."
10133-101330530 = "Mas eu ainda não tentei isso."
10133-101330540 = "Eu só criei um avatar por curiosidade, sabe?"
10133-101330550 = "Oh, como você o fez?"
10133-101330560 = "Está curioso?"
10133-101330570 = "Mesmo assim, é uma criação da qual me orgulho."
10133-101330580 = "Está usando um uniforme de empregada."
10133-101330590 = "Oh...!"
10133-101330600 = "É o Avant-garde-kun."
10133-101330610 = "Entendi..."
10133-101330620 = "Hoje haverá uma grande manutenção no AMAS,"
10133-101330630 = "então o hangar ficará um pouco barulhento."
10133-101330640 = "Se for usar as instalações, por favor, esteja ciente disso."
10133-101330650 = "Posso assistir?"
10133-101330660 = "Assistir?"
10133-101330670 = "Não acho que seja um trabalho interessante, mas..."
10133-101330680 = "Se não se importar, seria uma ajuda para mim."
10133-101330690 = "É uma repetição de tarefas simples,"
10133-101330700 = "então ter alguém para conversar me distrai."
10133-101330710 = "De qualquer forma, está faltando."
10133-101330720 = "Eu gostaria de terminá-lo de forma mais perfeita, mas..."
10133-101330730 = "Está falando do Avant-garde-kun?"
10133-101330740 = "Isso também não é uma má ideia."
10133-101330750 = "Mas desta vez é sobre o meu traje."
10133-101330760 = "Se eu adicionar uma função de aquecimento ao traje atual,"
10133-101330770 = "ele deve ser capaz de lidar com mais situações diferentes."
10133-101330780 = "Sim."
10133-101330790 = "É mais lógico assim."
10133-101330800 = "Vou começar agora mesmo."
10133-101330810 = "Professor, uh..."
10133-101330820 = "Acabei mostrando um lado estranho meu, não foi?"
10133-101330830 = "Me desculpe."
10133-101330840 = "Não me importo! De verdade!"
10133-101330850 = "...De verdade?"
10133-101330860 = "..."
10133-101330870 = "Se for assim, tudo bem, mas..."
10133-101330880 = "Aquela aparência..."
10133-101330890 = "Eu nunca tinha mostrado para mais ninguém..."
10133-101330900 = "De qualquer forma, obrigado por me ajudar hoje."
10133-101330910 = "Por favor, descanse bem."
