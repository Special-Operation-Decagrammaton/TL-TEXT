[translation]
10112-101120010 = "Mestre, você pega muito ônibus?"
10112-101120020 = "Mais ou menos?"
10112-101120030 = "Eu também!"
10112-101120040 = "Eu pego quando vou e volto da escola,"
10112-101120050 = "mas está sempre lotado~"
10112-101120060 = "É verdade, nesse horário..."
10112-101120070 = "Não tem jeito, talvez..."
10112-101120080 = "Uhum, uhum."
10112-101120090 = "É difícil, não é?"
10112-101120100 = "Ah."
10112-101120110 = "Eu esqueci de dizer agora há pouco,"
10112-101120120 = "mas acho que sua camisa, Sensei, ficou com base."
10112-101120130 = "Ah, é verdade."
10112-101120140 = "Depois de tanto contato..."
10112-101120150 = "Me desculpe, foi minha culpa."
10112-101120160 = "Quando a escola acabar, eu lavo para você!"
10112-101120170 = "Hmm..."
10112-101120180 = "Nesse caso, eu terei que trocar para o uniforme de empregada, não é?"
10112-101120190 = "Uniforme escolar e uniforme de empregada."
10112-101120200 = "Sensei, qual você prefere?"
10112-101120210 = "O-o que você quer dizer com isso!?"
10112-101120220 = "Já está quase na hora do almoço."
10112-101120230 = "Já estou com fome."
10112-101120240 = "Eu estou sempre com fome..."
10112-101120250 = "Ahaha!"
10112-101120260 = "O que é isso?"
10112-101120270 = "Asuna, o que você vai comer no almoço?"
10112-101120280 = "Hmm..."
10112-101120290 = "Pensando!"
10112-101120300 = "Falando nisso,"
10112-101120310 = "ultimamente, em vários lugares,"
10112-101120320 = "sinto que encontro o Sensei!"
10112-101120330 = "É verdade."
10112-101120340 = "Talvez nos encontremos em algum outro lugar."
10112-101120350 = "Ahaha!"
10112-101120360 = "Encontros inesperados"
10112-101120370 = "são interessantes, não é?"
10112-101120380 = "Estou no parque,"
10112-101120390 = "e encontrei uma nuvem que se parece muito com o Sensei."
10112-101120400 = "Ahaha!"
10112-101120410 = "Você está passeando?"
10112-101120420 = "Sim!"
10112-101120430 = "E então..."
10112-101120440 = "Aconteceu alguma coisa?"
10112-101120450 = "Asuna?"
10112-101120460 = "Sensei~!"
10112-101120470 = "Obrigada por se preocupar."
10112-101120480 = "E também pelo celular!"
10112-101120490 = "Que bom que foi encontrado."
10112-101120500 = "Sim!"
10112-101120510 = "Vou tomar cuidado para não perder de novo."
10112-101120520 = "Porque é o smartphone que o Sensei me ajudou a encontrar!"
10112-101120530 = "Fiquei com sono depois que cheguei em casa."
10112-101120540 = "Bom trabalho hoje."
10112-101120550 = "Boa noite, Asuna."
10112-101120560 = "Hehe."
10112-101120570 = "Sim, boa noite!"
