[translation]
10112-101120010 = "ご主人様は、よくバス乗るの？"
10112-101120020 = "まあまあかな？"
10112-101120030 = "私も！"
10112-101120040 = "登下校の時に乗ってるんだけど"
10112-101120050 = "いつも人が多いんだよね～"
10112-101120060 = "たしかに、その時間帯は……"
10112-101120070 = "仕方ないかもね……"
10112-101120080 = "うんうん"
10112-101120090 = "やっぱり大変だよね？"
10112-101120100 = "あ"
10112-101120110 = "さっき言い忘れちゃったんだけど"
10112-101120120 = "先生のシャツに、ファンデついちゃってたかも"
10112-101120130 = "あ、本当だ"
10112-101120140 = "あれだけ密着してたら……"
10112-101120150 = "ごめんね、私のせいで"
10112-101120160 = "学校が終わったら、お洗濯してあげる！"
10112-101120170 = "んー"
10112-101120180 = "それならメイド服に着替えないといけないのかな"
10112-101120190 = "制服とメイド服"
10112-101120200 = "先生はどっちが好き？"
10112-101120210 = "ど、どういう意味！？"
10112-101120220 = "そろそろお昼休みだね"
10112-101120230 = "もうお腹空いちゃったよ"
10112-101120240 = "私はいつでも空いてる……"
10112-101120250 = "あははっ"
10112-101120260 = "何それ"
10112-101120270 = "アスナはお昼何食べるの？"
10112-101120280 = "うーん"
10112-101120290 = "考え中！"
10112-101120300 = "そういえば"
10112-101120310 = "最近いろんなところで"
10112-101120320 = "先生と会う気がする！"
10112-101120330 = "そうだね"
10112-101120340 = "またどこかで会えるかもね"
10112-101120350 = "あははっ"
10112-101120360 = "思いがけない出会いって"
10112-101120370 = "面白いよね！"
10112-101120380 = "公園にいるんだけど"
10112-101120390 = "先生にそっくりな雲を見つけたんだ"
10112-101120400 = "あははっ"
10112-101120410 = "散歩してるの？"
10112-101120420 = "うん！"
10112-101120430 = "それでね"
10112-101120440 = "何かあったの？"
10112-101120450 = "アスナ？"
10112-101120460 = "せんせ～！"
10112-101120470 = "心配してくれてありがとう"
10112-101120480 = "それと、スマホも！"
10112-101120490 = "見つかって良かったね"
10112-101120500 = "うん！"
10112-101120510 = "もう落とさないように気をつける"
10112-101120520 = "先生が一緒に探してくれたスマホだから！"
10112-101120530 = "お家に着いたら眠くなってきちゃった"
10112-101120540 = "今日はお疲れ様"
10112-101120550 = "おやすみ、アスナ"
10112-101120560 = "えへへ"
10112-101120570 = "うん、おやすみなさい！"
