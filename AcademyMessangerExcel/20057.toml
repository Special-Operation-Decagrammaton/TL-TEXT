[translation]
20057-200570010 = "ミレニアムはいかがですか？ご主人様"
20057-200570020 = "何度も足を運ばれているので、慣れ親しんだ場かもしれませんが……"
20057-200570030 = "たしかに、慣れつつはあるけど……"
20057-200570040 = "足を運ぶたびに新鮮な気持ちになるよ"
20057-200570050 = "おや、そうなのですね"
20057-200570060 = "ミレニアムは技術の学園。たしかに日進月歩移り変わる場所です"
20057-200570070 = "そうですね……たまには業務以外で"
20057-200570080 = "私たちの日常をご覧になってみては？"
20057-200570090 = "先生"
20057-200570100 = "私、一歩踏み出してみたいです"
20057-200570110 = "よし、頑張ろうか"
20057-200570120 = "よろしくお願いします"
20057-200570130 = "今から徹夜で……！"
20057-200570140 = "「親しくなろう」作戦の台本作り、始めようか！"
20057-200570150 = "はい、先生。"
20057-200570160 = "先生とほぼ徹夜で"
20057-200570170 = "シミュレーションをしながら"
20057-200570180 = "「台本」を作成しましたが……"
20057-200570190 = "本当に、大丈夫でしょうか？"
20057-200570200 = "私にも正解は分からないけど……"
20057-200570210 = "やってみてから考えよう！"
20057-200570220 = "そうですね……何事もトライアンドエラー、ですものね"
20057-200570230 = "こんにちは。先生"
20057-200570240 = "おかげさまでクラスの子たちと"
20057-200570250 = "少しうまくやれるようになった気がします"
20057-200570260 = "それはよかった！"
20057-200570270 = "アカネなら大丈夫だと思ってた"
20057-200570280 = "ありがとうございます"
20057-200570290 = "その……もし、先生さえよろしければ……"
20057-200570300 = "今の私をお見せしたい、と思って……"
20057-200570310 = "いかがでしょうか？"
20057-200570320 = "――二人きりで"
20057-200570330 = "アカネ……？"
20057-200570340 = "あの、先生"
20057-200570350 = "今日はありがとうございました"
20057-200570360 = "先に帰っちゃうなんて……"
20057-200570370 = "寂しいな"
20057-200570380 = "申し訳ありませんでした……"
20057-200570390 = "ですが……その……"
20057-200570400 = "思っていたより……"
20057-200570410 = "恥ずかしかったんです"
20057-200570420 = "最近思ったのですが"
20057-200570430 = "お掃除をする時のパターンが"
20057-200570440 = "単調になってしまっているのではないかと"
20057-200570450 = "工夫を凝らした方が良いのでしょうか？"
20057-200570460 = "掃除の仕方ってそんなにないと思うけど……"
20057-200570470 = "ああ、ええと……"
20057-200570480 = "そちらのお掃除ではなく"
20057-200570490 = "もう一つの「お掃除」の話でして……"
20057-200570500 = "もしかして……"
20057-200570510 = "……爆弾のこと？"
20057-200570520 = "ええ"
20057-200570530 = "とても悩ましい問題で……"
20057-200570540 = "遅い時間まで、本当にお疲れさまでした……"
20057-200570550 = "アカネは大丈夫？"
20057-200570560 = "ええ"
20057-200570570 = "予習復習も終わりましたし"
20057-200570580 = "明日の準備も完璧です"
20057-200570590 = "全て、先生の指導の賜物です"
20057-200570600 = "あはは…自分の教育方針を見つめ直したくなってきたよ"
20057-200570610 = "ふふ"
20057-200570620 = "自らを見つめ直している方のお言葉ほど"
20057-200570630 = "心強いものはありません"
20057-200570640 = "これからも、どうぞよろしくお願いしますね"
20057-200570650 = "……ご主人様"
