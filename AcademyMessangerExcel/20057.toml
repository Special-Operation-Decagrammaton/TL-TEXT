[translation]
20057-200570010 = "Como está sendo Millennium, mestre?"
20057-200570020 = "Como você vem aqui com frequência, talvez já esteja acostumado, mas..."
20057-200570030 = "É verdade, estou me acostumando, mas..."
20057-200570040 = "Sinto uma sensação de novidade toda vez que venho aqui."
20057-200570050 = "Oh, é mesmo?"
20057-200570060 = "Millennium é a academia da tecnologia. É um lugar que muda e progride dia após dia, de fato."
20057-200570070 = "Entendo... que tal, de vez em quando, fora do trabalho,"
20057-200570080 = "você dar uma olhada no nosso dia a dia?"
20057-200570090 = "Professor."
20057-200570100 = "Eu quero dar um passo à frente."
20057-200570110 = "Certo, vamos nos esforçar."
20057-200570120 = "Conto com você."
20057-200570130 = "A partir de agora, vamos virar a noite...!"
20057-200570140 = "Vamos começar a escrever o roteiro da operação 'Ficar mais íntimos'!"
20057-200570150 = "Sim, professor."
20057-200570160 = "Quase viramos a noite com o professor"
20057-200570170 = "fazendo simulações"
20057-200570180 = "e criamos o 'roteiro', mas..."
20057-200570190 = "Será que vai dar certo mesmo?"
20057-200570200 = "Eu também não sei a resposta certa, mas..."
20057-200570210 = "Vamos tentar e depois pensamos nisso!"
20057-200570220 = "É verdade... tudo é tentativa e erro, não é?"
20057-200570230 = "Olá, professor."
20057-200570240 = "Graças a você, sinto que consegui"
20057-200570250 = "me dar um pouco melhor com as crianças da turma."
20057-200570260 = "Isso é ótimo!"
20057-200570270 = "Eu sabia que a Akane conseguiria."
20057-200570280 = "Muito obrigada."
20057-200570290 = "Aquele... se o professor não se importar..."
20057-200570300 = "Eu queria te mostrar como estou agora..."
20057-200570310 = "O que acha?"
20057-200570320 = "――A sós."
20057-200570330 = "Akane...?"
20057-200570340 = "Ei, professor."
20057-200570350 = "Muito obrigada pelo dia de hoje."
20057-200570360 = "Ir embora antes de você..."
20057-200570370 = "É solitário."
20057-200570380 = "Peço mil desculpas..."
20057-200570390 = "Mas... é que..."
20057-200570400 = "Foi mais..."
20057-200570410 = "constrangedor do que eu pensava."
20057-200570420 = "Estive pensando ultimamente que"
20057-200570430 = "o padrão que uso ao fazer a limpeza"
20057-200570440 = "talvez esteja ficando monótono."
20057-200570450 = "Será que seria melhor eu ser mais criativa?"
20057-200570460 = "Não acho que existam tantas formas de limpar, mas..."
20057-200570470 = "Ah, bem..."
20057-200570480 = "Não estou falando daquela limpeza,"
20057-200570490 = "estou falando da 'outra' limpeza..."
20057-200570500 = "Será que..."
20057-200570510 = "……sobre a bomba?"
20057-200570520 = "Sim."
20057-200570530 = "É um problema muito preocupante, e..."
20057-200570540 = "Muito obrigada por todo o seu trabalho duro até tão tarde..."
20057-200570550 = "Você está bem, Akane?"
20057-200570560 = "Sim."
20057-200570570 = "Já terminei de revisar e estudar."
20057-200570580 = "A preparação para amanhã também está perfeita."
20057-200570590 = "Tudo isso é fruto da sua orientação, Sensei."
20057-200570600 = "Ahaha... isso me faz querer repensar minha própria filosofia educacional."
20057-200570610 = "Fufu."
20057-200570620 = "Não há nada mais encorajador"
20057-200570630 = "do que as palavras de alguém que está refletindo sobre si mesmo."
20057-200570640 = "Por favor, continue contando comigo daqui para frente."
20057-200570650 = "……Mestre."
