[translation]
20057-200570010 = "Как вам Миллениум, Мастер?"
20057-200570020 = "Вы бываете здесь так часто, что это место наверняка уже кажется вам знакомым, но..."
20057-200570030 = "Это правда, я уже привыкаю, но..."
20057-200570040 = "Каждый раз, когда я прихожу сюда, всё кажется свежим и новым."
20057-200570050 = "О, вот как?"
20057-200570060 = "Миллениум — технологичная школа. Это и правда место, которое меняется и развивается день за днём."
20057-200570070 = "В таком случае... может быть, за рамками работы,"
20057-200570080 = "вы бы хотели взглянуть на нашу повседневную жизнь?"
20057-200570090 = "Сенсей."
20057-200570100 = "Я хочу сделать шаг вперёд."
20057-200570110 = "Хорошо, давай сделаем всё, что в наших силах."
20057-200570120 = "Я рассчитываю на тебя."
20057-200570130 = "Начиная с этого момента, мы не спим всю ночь...!"
20057-200570140 = "Давайте начнём писать сценарий для нашей операции \"Let's Get Closer\"!"
20057-200570150 = "Да, Сенсей."
20057-200570160 = "Мы провели без сна почти всю ночь,"
20057-200570170 = "проигрывая симуляции,"
20057-200570180 = "и создали \"сценарий\"..."
20057-200570190 = "Вы уверены, что всё действительно будет в порядке?"
20057-200570200 = "Я и сам не знаю правильного ответа, но..."
20057-200570210 = "Давай попробуем и увидим!"
20057-200570220 = "И то верно... всё познаётся методом проб и ошибок, не так ли?"
20057-200570230 = "Здравствуйте, Сенсей."
20057-200570240 = "Благодаря вам, мне кажется, я смогла"
20057-200570250 = "поладить немного лучше с ребятами из моего класса."
20057-200570260 = "Как здорово!"
20057-200570270 = "Я знал, что у тебя всё получится, Акане."
20057-200570280 = "Большое вам спасибо."
20057-200570290 = "Эм... если вы не против, Сенсей..."
20057-200570300 = "Я хотела показать вам, какая я сейчас..."
20057-200570310 = "Что думаете?"
20057-200570320 = "— Только мы вдвоём."
20057-200570330 = "Акане...?"
20057-200570340 = "Эм, Сенсей."
20057-200570350 = "Спасибо за сегодня."
20057-200570360 = "Подумать только, что вы уйдёте так рано..."
20057-200570370 = "Мне одиноко."
20057-200570380 = "Мне ужасно неловко..."
20057-200570390 = "Но... понимаете..."
20057-200570400 = "Это было... куда..."
20057-200570410 = "более смущающе, чем я думала."
20057-200570420 = "Я тут думала в последнее время,"
20057-200570430 = "что мои методы уборки"
20057-200570440 = "могли стать немного монотонными."
20057-200570450 = "Стоит ли мне попробовать подойти к ним более творчески?"
20057-200570460 = "Не думаю, что существует так уж много способов наводить чистоту, но..."
20057-200570470 = "Ах, ну..."
20057-200570480 = "Я имею в виду не обычную уборку."
20057-200570490 = "Я говорю о моих других обязанностях по \"зачистке\"..."
20057-200570500 = "Может ли это быть..."
20057-200570510 = "...ты имеешь в виду бомбы?"
20057-200570520 = "Да."
20057-200570530 = "Это очень хлопотная проблема..."
20057-200570540 = "Спасибо вам большое за ваш труд до такой поздней ночи..."
20057-200570550 = "Ты в порядке, Акане?"
20057-200570560 = "Да."
20057-200570570 = "Я закончила с подготовкой и повторением,"
20057-200570580 = "и планы на завтра идеальны."
20057-200570590 = "Это всё благодаря вашему руководству, Сенсей."
20057-200570600 = "Ха-ха... из-за тебя мне аж хочется пересмотреть собственные методы обучения."
20057-200570610 = "Хе-хе."
20057-200570620 = "Нет ничего более обнадеживающего,"
20057-200570630 = "чем слова человека, который готов анализировать свои действия."
20057-200570640 = "Я с нетерпением жду возможности работать с вами и дальше."
20057-200570650 = "...Мастер."