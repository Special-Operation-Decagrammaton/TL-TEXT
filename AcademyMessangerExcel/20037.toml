[translation]
20037-200370010 = "監察官！"
20037-200370020 = "今どこ？忙しい？"
20037-200370030 = "監察官……？"
20037-200370040 = "のんびりしてるよ"
20037-200370050 = "細かいことは良いの！"
20037-200370060 = "至急、パーク内のフードコートに来て"
20037-200370070 = "市民の安全に関わることだから！急いでね！"
20037-200370080 = "……？"
20037-200370090 = "今日の任務は、パークのパトロールだって"
20037-200370100 = "結構楽しそうじゃない？"
20037-200370110 = "フブキって仕事が嫌いだったよね……？"
20037-200370120 = "何を言ってるのさ、先生"
20037-200370130 = "人々の安全を守るためなんだから、喜んでやるに決まってるでしょ"
20037-200370140 = "何か怪しいような……"
20037-200370150 = "大丈夫大丈夫、真面目にやるってば"
20037-200370160 = "パークをぐるぐる回りながらね"
20037-200370170 = "ぐるぐる……？"
20037-200370180 = "ひどいよ、先生……"
20037-200370190 = "本当に歩いてパトロールさせるだなんて"
20037-200370200 = "大げさだなあ"
20037-200370210 = "元々そういう仕事でしょ？"
20037-200370220 = "夏の日差しは大敵なのに！"
20037-200370230 = "ま、先生が奢ってくれたアイス、美味しかったし"
20037-200370240 = "先生と一緒だったら"
20037-200370250 = "たまには真面目にパトロールするのも悪くないかもね"
20037-200370260 = "私だけのパラダイスを見つけたよ"
20037-200370270 = "誰にも邪魔されない、安息の地……"
20037-200370280 = "これで、ようやく気ままに過ごせるね"
20037-200370290 = "隠れ家でも作ったの？"
20037-200370300 = "サボり場所を見つけたんだね"
20037-200370310 = "先生も見にくる？"
20037-200370320 = "あっ、でもプールには入らないでね"
20037-200370330 = "監視対象が増えるとめんどくさいからさ"
20037-200370340 = "ウォーターパークなのに……？"
