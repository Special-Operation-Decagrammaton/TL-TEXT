[translation]
20037-200370010 = "Inspetor!"
20037-200370020 = "Onde você tá agora? Tá ocupado?"
20037-200370030 = "Inspetor...?"
20037-200370040 = "Tô de bobeira."
20037-200370050 = "Isso não importa agora!"
20037-200370060 = "Vem urgente pra praça de alimentação do parque!"
20037-200370070 = "É uma questão de segurança pública! Vem rápido!"
20037-200370080 = "......?"
20037-200370090 = "Disseram que a missão de hoje é patrulhar o parque."
20037-200370100 = "Parece bem divertido, né?"
20037-200370110 = "Fubuki, você não odiava trabalhar...?"
20037-200370120 = "O que você tá dizendo, Sensei?"
20037-200370130 = "É para proteger a segurança das pessoas, claro que eu faria isso com todo o prazer."
20037-200370140 = "Isso tá me parecendo suspeito..."
20037-200370150 = "Relaxa, relaxa, eu vou levar a sério."
20037-200370160 = "Ficando dando voltinhas e voltinhas pelo parque."
20037-200370170 = "Dando voltinhas...?"
20037-200370180 = "Que maldade, Sensei..."
20037-200370190 = "Fazer a gente patrulhar andando de verdade."
20037-200370200 = "Que exagero."
20037-200370210 = "O seu trabalho já não era esse?"
20037-200370220 = "Sendo que o sol de verão é o meu maior inimigo!"
20037-200370230 = "Bom, o sorvete que você me pagou tava uma delícia, e..."
20037-200370240 = "Já que eu tô junto com você, Sensei,"
20037-200370250 = "Talvez não seja tão ruim levar a patrulha a sério de vez em quando."
20037-200370260 = "Encontrei o meu paraíso particular."
20037-200370270 = "Um refúgio de descanso onde ninguém vai me atrapalhar..."
20037-200370280 = "Com isso, finalmente vou poder ficar de boa."
20037-200370290 = "Você construiu um esconderijo?"
20037-200370300 = "Encontrou um lugar pra matar trabalho, né?"
20037-200370310 = "Quer vir ver, Sensei?"
20037-200370320 = "Ah, mas não entra na piscina, tá?"
20037-200370330 = "Dá muita preguiça quando o número de pessoas pra vigiar aumenta."
20037-200370340 = "Mas a gente tá num parque aquático...?"