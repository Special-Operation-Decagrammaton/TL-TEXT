[translation]
20037-200370010 = "Inspetora!"
20037-200370020 = "Onde você está agora? Está ocupada?"
20037-200370030 = "Inspetora...?"
20037-200370040 = "Estou relaxando."
20037-200370050 = "Não importa os detalhes!"
20037-200370060 = "Venha urgentemente para a praça de alimentação do parque."
20037-200370070 = "É algo que envolve a segurança dos cidadãos! Depressa!"
20037-200370080 = "...?"
20037-200370090 = "Disseram que a missão de hoje é patrulhar o parque."
20037-200370100 = "Não parece bem divertido?"
20037-200370110 = "Fubuki, você não odiava trabalhar...?"
20037-200370120 = "O que você está dizendo, Sensei?"
20037-200370130 = "Como é para proteger a segurança das pessoas, é claro que farei com prazer."
20037-200370140 = "Tem algo suspeito nisso..."
20037-200370150 = "Tudo bem, tudo bem, eu disse que vou levar a sério."
20037-200370160 = "Enquanto dou voltas pelo parque, é claro."
20037-200370170 = "Voltas...?"
20037-200370180 = "Que horror, Sensei..."
20037-200370190 = "Me fazer patrulhar andando de verdade..."
20037-200370200 = "Você está exagerando."
20037-200370210 = "Não é esse o seu trabalho original?"
20037-200370220 = "Mas o sol de verão é um grande inimigo!"
20037-200370230 = "Bem, o sorvete que o Sensei pagou estava gostoso."
20037-200370240 = "Se for com o Sensei,"
20037-200370250 = "talvez não seja tão ruim patrulhar seriamente de vez em quando."
20037-200370260 = "Encontrei meu próprio paraíso."
20037-200370270 = "Um lugar de descanso onde ninguém me incomoda..."
20037-200370280 = "Com isso, finalmente poderei passar o tempo como eu quiser."
20037-200370290 = "Você fez um esconderijo?"
20037-200370300 = "Então você encontrou um lugar para vadiar."
20037-200370310 = "O Sensei quer vir ver?"
20037-200370320 = "Ah, mas não entre na piscina, viu?"
20037-200370330 = "É um incômodo ter mais alvos para vigiar."
20037-200370340 = "Mesmo sendo um parque aquático...?"
