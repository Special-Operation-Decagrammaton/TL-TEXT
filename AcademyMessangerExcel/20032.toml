[translation]
20032-200320010 = "大人って、結構服にこだわるよね"
20032-200320020 = "たしかに、そうかもしれない"
20032-200320030 = "私はあまり詳しくないけど……"
20032-200320040 = "ちょっと時間ができたし、買い物に行こうと思って"
20032-200320050 = "あんまりファションに詳しくないから、後で先生に意見を聞きたくて"
20032-200320060 = "とりあえず、色々持ってくね"
20032-200320070 = "？？？"
20032-200320080 = "先生、今日はありがとう"
20032-200320090 = "また連絡するね"
20032-200320100 = "約束の日だよ"
20032-200320110 = "約束……？"
20032-200320120 = "一緒に服を選んでくれるんだよね？"
20032-200320130 = "前に約束したでしょ"
20032-200320140 = "今から送る場所に来て"
20032-200320150 = "わ、分かった……！"
20032-200320160 = "今日はありがとう、先生"
20032-200320170 = "プレゼントまでもらって……"
20032-200320180 = "気にしないで"
20032-200320190 = "氷海に行くときは、絶対に防寒着で来てね！？"
20032-200320200 = "うん。これ、すごく気に入ったから"
20032-200320210 = "毎日着るね"
20032-200320220 = "先生"
20032-200320230 = "次の作戦について話があるんだけど、時間ある？"
20032-200320240 = "今日は手が離せなくて……"
20032-200320250 = "それなら仕方ないか"
20032-200320260 = "また連絡するね"
20032-200320270 = "先生……風邪、大丈夫？"
20032-200320280 = "うん、暖かくしてたら良くなったよ"
20032-200320290 = "なら良かった"
20032-200320300 = "今日もありがとう、先生"
20032-200320310 = "服に組み合わせがあったなんて、知らなかった"
20032-200320320 = "そうだ、今度から下着の代わりに水着を着ようかな"
20032-200320330 = "さっきジャケットの中でたくさん汗をかいたけど、水着だから濡れても気にならなかったの"
20032-200320340 = "機能美って言うんだっけ……？"
20032-200320350 = "えっと、うん……間違ってはないかな"
20032-200320360 = "さすが先生"
20032-200320370 = "ファッションって奥深いね"
20032-200320380 = "また今度、色々教えて"
20032-200320390 = "先生、ここはパラダイスかもしれない"
20032-200320400 = "パラダイス？"
20032-200320410 = "うん……いい場所を見つけた"
20032-200320420 = "先生も来る？"
20032-200320430 = "温泉でも見つけたとか？"
20032-200320440 = "ん……似てるかな……"
20032-200320450 = "水風呂は諦めるよ"
20032-200320460 = "よかった！"
20032-200320470 = "でも、どうして諦めたの？"
20032-200320480 = "冷水浴は気持ちよかったけど……"
20032-200320490 = "毎回先生がお茶を淹れてくれるわけじゃないし……"
20032-200320500 = "もし私が風邪を引いたら、先生が心配するから"
20032-200320510 = "……"
20032-200320520 = "いつもありがとう、先生"
