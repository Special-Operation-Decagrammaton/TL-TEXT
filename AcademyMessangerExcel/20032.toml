[translation]
20032-200320010 = "Os adultos se preocupam bastante com roupas, né?"
20032-200320020 = "Com certeza, talvez seja verdade."
20032-200320030 = "Eu não entendo muito sobre isso, mas..."
20032-200320040 = "Como consegui um tempo livre, pensei em ir às compras."
20032-200320050 = "Não entendo muito de moda, então queria pedir a opinião do Sensei depois."
20032-200320060 = "Por enquanto, vou levar várias coisas."
20032-200320070 = "???"
20032-200320080 = "Sensei, obrigado por hoje."
20032-200320090 = "Entro em contato de novo."
20032-200320100 = "É o dia do nosso compromisso."
20032-200320110 = "Compromisso...?"
20032-200320120 = "Você vai me ajudar a escolher roupas, não vai?"
20032-200320130 = "Nós combinamos isso antes, lembra?"
20032-200320140 = "Venha para o local que vou te enviar agora."
20032-200320150 = "Ah, entendi...!"
20032-200320160 = "Obrigada por hoje, Sensei."
20032-200320170 = "E ainda ganhei um presente..."
20032-200320180 = "Não precisa se preocupar."
20032-200320190 = "Quando for ao Mar de Gelo, venha com roupas de frio, entendeu!?"
20032-200320200 = "Sim. Eu gostei muito disso."
20032-200320210 = "Vou usar todos os dias."
20032-200320220 = "Sensei."
20032-200320230 = "Tenho algo para falar sobre a próxima operação, você tem um tempo?"
20032-200320240 = "Hoje estou com as mãos ocupadas..."
20032-200320250 = "Nesse caso, não tem jeito."
20032-200320260 = "Entro em contato de novo."
20032-200320270 = "Sensei... o resfriado, está melhor?"
20032-200320280 = "Sim, melhorei depois que me agasalhei."
20032-200320290 = "Ainda bem."
20032-200320300 = "Obrigada por hoje também, Sensei."
20032-200320310 = "Eu não sabia que existiam combinações de roupas."
20032-200320320 = "Ah, pensei em começar a usar roupa de banho no lugar da roupa íntima."
20032-200320330 = "Eu suei bastante dentro da jaqueta agora pouco, mas como era roupa de banho, não me importei de ficar molhada."
20032-200320340 = "É o que chamam de beleza funcional...?"
20032-200320350 = "Bem, sim... acho que não está errado."
20032-200320360 = "Como esperado do Sensei."
20032-200320370 = "A moda é algo profundo, né?"
20032-200320380 = "Me ensine mais coisas outra hora."
20032-200320390 = "Sensei, talvez este lugar seja o paraíso."
20032-200320400 = "Paraíso?"
20032-200320410 = "Sim... encontrei um bom lugar."
20032-200320420 = "O Sensei também quer vir?"
20032-200320430 = "Você encontrou uma fonte termal ou algo assim?"
20032-200320440 = "Hum... talvez seja parecido..."
20032-200320450 = "Vou desistir do banho de água fria."
20032-200320460 = "Que bom!"
20032-200320470 = "Mas por que você desistiu?"
20032-200320480 = "O banho de água fria foi agradável, mas..."
20032-200320490 = "O Sensei não vai estar lá para preparar chá para mim toda vez..."
20032-200320500 = "E se eu pegar um resfriado, o Sensei vai ficar preocupado."
20032-200320510 = "……"
20032-200320520 = "Obrigada por tudo, Sensei"
