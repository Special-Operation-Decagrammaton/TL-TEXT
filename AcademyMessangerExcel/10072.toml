10072-100720120 = "つまりだな……"
10072-100720130 = "海産物を獲りに行くんだ！"
10072-100720140 = "先生、ちょっといいか？"
10072-100720150 = "さっき、面白い物を見つけたんだ"
10072-100720160 = "これがあれば、今度こそ先生に魚を獲ってこれる！"
10072-100720170 = "倉庫に網でもあったの？"
10072-100720180 = "ふふん"
10072-100720190 = "ただの網だと思ったら間違いだ"
10072-100720200 = "これは直接見せた方がいいな"
10072-100720210 = "この前の波止場に来てくれ"
10072-100720220 = "今度こそ、先生に最高級の刺身を食べさせてやる！"
10072-100720230 = "先生"
10072-100720240 = "あの後、波止場の様子を見に行ったら"
10072-100720250 = "水面に小魚が何匹か浮かんでいたぞ"
10072-100720260 = "おそらく、爆破の衝撃で気を失ったんだろう"
