[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10072-100720010 = "Sensei, o que você tá fazendo agora?" 
10072-100720020 = "Estou na minha pausa." 
10072-100720030 = "Respirando, eu acho..." 
10072-100720040 = "Hã?" 
10072-100720050 = "O que quer dizer com isso?" 
10072-100720060 = "Quer dizer que não tá fazendo nada?" 
10072-100720070 = "Já que viemos até a praia, é um desperdício ficar aí sem fazer nada." 
10072-100720080 = "Temos que fazer algo que só dá pra fazer no mar, se não é uma perda de tempo." 
10072-100720090 = "Algo que só dá pra fazer no mar..." 
10072-100720100 = "Tipo, nadar?" 
10072-100720110 = "Se for só pra nadar, qualquer piscina serve." 
10072-100720120 = "O que eu quero dizer é..." 
10072-100720130 = "Nós vamos capturar frutos do mar!" 
10072-100720140 = "Sensei, você tem um minuto?" 
10072-100720150 = "Achei uma coisa bem interessante agora há pouco." 
10072-100720160 = "Se eu usar isso, dessa vez eu vou conseguir pescar os peixes para o Sensei com certeza!" 
10072-100720170 = "Encontrou uma rede no armazém?" 
10072-100720180 = "Fufun." 
10072-100720190 = "Você tá muito enganado se acha que é só uma rede normal." 
10072-100720200 = "Isso aqui é algo que você tem que ver com os próprios olhos." 
10072-100720210 = "Venha para aquele cais de antes." 
10072-100720220 = "Dessa vez eu te garanto que vou te fazer experimentar o melhor sashimi da sua vida!" 
10072-100720230 = "Sensei." 
10072-100720240 = "Quando eu fui checar a situação do cais depois daquele ocorrido," 
10072-100720250 = "Tinha alguns peixinhos boiando na água." 
10072-100720260 = "Provavelmente o impacto da explosão fez eles desmaiarem." 
10072-100720270 = "Ouvi dizer que peixes menores são surpreendentemente vulneráveis a ondas de choque." 
10072-100720280 = "E se isso for verdade..." 
10072-100720290 = "Se nós soltarmos uma carga de alta voltagem na água, todos eles vão desmaiar juntos..." 
10072-100720300 = "Isso tá fora de cogitação!" 
10072-100720310 = "Sensei, ouvi dizer que existe uma área de maré baixa no lado oeste da vila." 
10072-100720320 = "Segundo os moradores, a maré baixa duas vezes por dia" 
10072-100720330 = "E quando a água recua, a planície de lama fica exposta." 
10072-100720340 = "É um fenômeno muito curioso, não é?" 
10072-100720350 = "E com a maré baixa, fica muito mais fácil de catar mariscos e peixes encalhados." 
10072-100720360 = "......Na verdade, quando os moradores nos deram permissão para coletar frutos do mar," 
10072-100720370 = "Eles também liberaram o nosso acesso à planície de lama na maré baixa." 
10072-100720380 = "E então, o que me diz de irmos dar uma olhada por lá se você tiver um tempo livre?" 
10072-100720390 = "Posso ter cometido alguns vacilos na água, mas na planície de lama é só a gente sair catando os peixes caídos. Eu não cometerei os mesmos erros de antes..." 
10072-100720400 = "E desta vez, com certeza o Sensei vai poder saborear os melhores frutos do mar!" 
10072-100720410 = "No fim, o nosso plano de servir pratos deliciosos e chiques de frutos do mar para o Sensei falhou..." 
10072-100720420 = "Eu queria pegar uns peixes chiques como forma de agradecer por tudo que você sempre faz por nós..." 
10072-100720430 = "Mas vocês já não me deram várias coisas deliciosas?" 
10072-100720440 = "Como aquela sopa de algas..." 
10072-100720450 = "E os Urechis (Verme-gordo-do-mar)...?" 
10072-100720460 = "Até que eram bons, sim, mas..." 
10072-100720470 = "Isso aí você pode comprar de boas na feira de qualquer jeito..." 
10072-100720480 = "O Sensei até nos acompanhou na coleta e tudo..." 
10072-100720490 = "Qualquer comida fica mais gostosa quando eu como junto com você, Saki." 
10072-100720500 = "Tch...!" 
10072-100720510 = "Para com isso, não dá pra saber se você tá só me provocando ou falando sério..." 