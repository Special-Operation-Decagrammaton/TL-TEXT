[translation]
10072-100720010 = "Sensei, o que está fazendo agora?"
10072-100720020 = "Estou em um intervalo."
10072-100720030 = "Respirando, eu acho..."
10072-100720040 = "?"
10072-100720050 = "O que é isso?"
10072-100720060 = "Quer dizer que não está fazendo nada?"
10072-100720070 = "Já que viemos até o mar,"
10072-100720080 = "seria um desperdício não fazer algo que só dá pra fazer aqui."
10072-100720090 = "Algo que só dá pra fazer no mar..."
10072-100720100 = "Tipo nadar?"
10072-100720110 = "Se for só pra nadar, uma piscina serve, não?"
10072-100720120 = "O que eu quero dizer é..."
10072-100720130 = "Vamos pegar frutos do mar!"
10072-100720140 = "Sensei, tem um minuto?"
10072-100720150 = "Eu encontrei uma coisa interessante agora há pouco."
10072-100720160 = "Com isto, desta vez com certeza conseguirei pegar um peixe para você!"
10072-100720170 = "Tinha uma rede no armazém ou algo assim?"
10072-100720180 = "Hehe."
10072-100720190 = "Se acha que é só uma rede, está enganado."
10072-100720200 = "É melhor eu te mostrar pessoalmente."
10072-100720210 = "Venha para o cais de antes."
10072-100720220 = "Desta vez, com certeza, farei você comer o melhor sashimi!"
10072-100720230 = "Sensei."
10072-100720240 = "Depois daquilo, fui dar uma olhada no cais e"
10072-100720250 = "vi alguns peixinhos boiando na superfície."
10072-100720260 = "Provavelmente desmaiaram com o impacto da explosão."
10072-100720270 = "Ouvi dizer que peixes pequenos são surpreendentemente frágeis a impactos, né?"
10072-100720280 = "O que significa que..."
10072-100720290 = "Se eu passar uma corrente de alta voltagem, posso desmaiar todos de uma vez..."
10072-100720300 = "Isso de jeito nenhum!"
10072-100720310 = "Sensei, parece que há um mangue a oeste da vila."
10072-100720320 = "Perguntei a um morador, e a maré baixa duas vezes por dia,"
10072-100720330 = "fazendo o mangue aparecer."
10072-100720340 = "É um fenômeno curioso, né?"
10072-100720350 = "Quando a maré baixa, dá pra pegar conchas e peixes facilmente."
10072-100720360 = "...Na verdade, quando recebi permissão para pegar frutos do mar,"
10072-100720370 = "me disseram que eu também podia entrar no mangue."
10072-100720380 = "Então, se tiver tempo, não quer ir comigo?"
10072-100720390 = "Eu falhei debaixo d'água, mas no mangue é só pegar os peixes que estão por lá. Não vou cometer o mesmo erro..."
10072-100720400 = "Desta vez, com certeza, farei você comer os melhores frutos do mar!"
10072-100720410 = "No fim, meu plano de fazer você comer frutos do mar deliciosos falhou."
10072-100720420 = "Pensei que poderia te agradecer por tudo pegando um peixe de alta qualidade, mas..."
10072-100720430 = "Mas você me deu várias coisas pra comer, não?"
10072-100720440 = "Tipo a sopa de algas..."
10072-100720450 = "E o peixe-pênis...?"
10072-100720460 = "Estavam gostosos, é verdade, mas..."
10072-100720470 = "São todos ingredientes que dá pra comprar no mercado..."
10072-100720480 = "E pensar que fiz você me acompanhar em tudo aquilo..."
10072-100720490 = "A comida que eu como com você, Saki, é a mais gostosa."
10072-100720500 = "...!"
10072-100720510 = "É difícil saber se você está me provocando ou falando sério, então pare com isso..."
