10072-100720420 = "高級魚を獲って日頃のお礼ができると思ったんだが……"
10072-100720430 = "いろいろ食べさせてもらったよ？"
10072-100720440 = "海藻スープとか……"
10072-100720450 = "ユムシとか……?"
10072-100720460 = "たしかに美味しかったけど……"
10072-100720470 = "どれも市場で買える食材だし……"
10072-100720480 = "先生には、あれだけ付き合ってもらったのに……"
10072-100720490 = "サキと一緒に食べるご飯が、一番美味しいよ"
10072-100720500 = "っ……！"
10072-100720510 = "からかってるのか本心なのか分かりづらいからやめてくれ……"
