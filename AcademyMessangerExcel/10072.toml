[translation]
10072-100720010 = "Sensei, o que você está fazendo agora?"
10072-100720020 = "Estou descansando um pouco."
10072-100720030 = "Acho que... só respirando mesmo..."
10072-100720040 = "?"
10072-100720050 = "Que papo aleatório é esse?"
10072-100720060 = "Isso quer dizer que você não está fazendo absolutamente nada útil, né?"
10072-100720070 = "Já que viemos até o mar com tanto esforço,"
10072-100720080 = "É um desperdício não fazer coisas que a gente só pode fazer na praia."
10072-100720090 = "Coisas que só dá pra fazer na praia……"
10072-100720100 = "Tipo nadar?"
10072-100720110 = "Se for só para nadar, uma piscina comum já bastaria, não acha?"
10072-100720120 = "O que eu quero dizer é..."
10072-100720130 = "Nós vamos caçar frutos do mar de verdade!"
10072-100720140 = "Sensei, você tem um minuto?"
10072-100720150 = "Eu acabei de encontrar uma coisa muito interessante no depósito."
10072-100720160 = "Com isso aqui, com certeza vou conseguir pescar um peixe de respeito para você desta vez!"
10072-100720170 = "O que foi? Você achou alguma rede de pesca profissional?"
10072-100720180 = "Fufun~"
10072-100720190 = "Se você pensa que é só uma rede boba e comum, está muito enganado."
10072-100720200 = "É muito melhor eu te mostrar isso funcionando pessoalmente."
10072-100720210 = "Venha até aquele píer onde estávamos antes."
10072-100720220 = "Desta vez, eu vou te garantir um sashimi de primeiríssima qualidade, se prepare!"
10072-100720230 = "Sensei."
10072-100720240 = "Depois daquela hora, eu voltei para dar uma olhada em como estava a situação no píer..."
10072-100720250 = "E tinha vários peixinhos flutuando boiando na superfície da água."
10072-100720260 = "Provavelmente eles perderam a consciência com o impacto da explosão que eu causei."
10072-100720270 = "Ouvi dizer que peixes pequenos são surpreendentemente vulneráveis a ondas de choque fortes."
10072-100720280 = "Pensando por esse lado, isso significa que..."
10072-100720290 = "Se a gente soltar uma descarga elétrica de alta voltagem direto na água, dá para apagar todos eles de uma vez só e..."
10072-100720300 = "Isso é absolutamente proibido por lei, Saki! Nada de praticar pesca com eletrochoque, pelo amor de Deus!!"
10072-100720310 = "Sensei, os moradores me disseram que existe uma planície de maré no lado oeste da vila."
10072-100720320 = "A maré baixa completamente duas vezes por dia,"
10072-100720330 = "Fazendo com que esse grande banco de areia e lama apareça."
10072-100720340 = "Nossa, que fenômeno curioso e interessante."
10072-100720350 = "Quando a água recua, os moluscos e peixes ficam presos na lama, então é só sair recolhendo tudo com facilidade."
10072-100720360 = "……Para falar a verdade, quando me deram a autorização oficial para coletar frutos do mar,"
10072-100720370 = "Eles mencionaram que eu também tinha permissão para entrar nessa área de maré baixa."
10072-100720380 = "Então... se você tiver um tempo livre hoje, não quer ir até lá comigo?"
10072-100720390 = "Eu acabei passando vergonha na água profunda, mas na lama é só catar o que já está caído no chão. Não vou repetir o mesmo erro tático..."
10072-100720400 = "Desta vez, eu juro que vou fazer você comer os melhores frutos do mar de Kivotos!"
10072-100720410 = "No fim das contas, a minha grande operação tática para te dar frutos do mar deliciosos foi um fracasso retumbante, né..."
10072-100720420 = "Eu realmente achei que conseguiria pescar um peixe caro de luxo para te agradecer adequadamente por tudo o que faz por nós diariamente..."
10072-100720430 = "Mas você me deu várias coisas bem exóticas e gostosas para comer, Saki!"
10072-100720440 = "Aquela sopa de algas marinhas colhidas na hora..."
10072-100720450 = "E até aquelas... hã... minhocas-do-mar grelhadas...?"
10072-100720460 = "Quer dizer, até que estavam saborosas, mas..."
10072-100720470 = "São todas coisas super simples que qualquer um compra baratinho em um mercado de esquina..."
10072-100720480 = "E você gastou tanto do seu precioso tempo livre me acompanhando nessas loucuras na lama..."
10072-100720490 = "Não se preocupe com o valor do peixe, Saki. Qualquer comida fica mil vezes mais gostosa quando eu tenho a oportunidade de comer junto com você!"
10072-100720500 = "っ……！"
10072-100720510 = "P-Para com isso... Fica difícil saber se você está só me provocando de propósito ou se está falando sério, então não diz essas coisas vergonhosas do nada...!"