[translation]
10072-100720010 = "先生、今何してる？"
10072-100720020 = "休憩中だよ"
10072-100720030 = "呼吸、かな……"
10072-100720040 = "？"
10072-100720050 = "なんだそれ"
10072-100720060 = "何もしてないってことか？"
10072-100720070 = "せっかく海まで来たんだから"
10072-100720080 = "海でしか出来ないことをしないと、もったいないぞ"
10072-100720090 = "海でしか出来ないこと……"
10072-100720100 = "泳ぐとか？"
