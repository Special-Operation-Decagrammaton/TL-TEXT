[translation]
16012-160120010 = "先生、今日って忙しい？"
16012-160120020 = "もし時間があったら、私のバイト先に来てくれない？"
16012-160120030 = "確か……「ルワゾー・ブッレ」、だったっけ？"
16012-160120040 = "そうそう。っていうか、よく覚えてたわね"
16012-160120050 = "ちょっと先生に見せたいものがあるの"
16012-160120060 = "待ってるから、ちゃんと来てね！"
16012-160120070 = "先生、先生！"
16012-160120080 = "バイト代が入ったの！"
16012-160120090 = "ジュンコが頑張ったからだね"
16012-160120100 = "まぁね！というわけで……"
16012-160120110 = "お返しの時間よ！"
16012-160120120 = "……どういうこと？"
16012-160120130 = "ど、どうか命だけは……"
16012-160120140 = "ふふっ、見てなさい"
16012-160120150 = "物騒なこと言わないで！"
16012-160120160 = "とにかく"
16012-160120170 = "夕方になったら、お祭り通りに来て"
16012-160120180 = "絶対よ！"
16012-160120190 = "連休が"
16012-160120200 = "終わった"
16012-160120210 = "終わっちゃった……"
16012-160120220 = "お、落ち着いて、ジュンコ。連休は一応明日までだよ"
16012-160120230 = "知ってるわよ！"
16012-160120240 = "でも私の心の中での連休は死んだ！もういない！"
16012-160120250 = "私の背中にもこの胸にも、一つになって生き続けてくれない！"
16012-160120260 = "でもだからって、このまま終わらせるわけにはいかないの！"
