[translation]
16012-160120010 = "Sensei, você está ocupado hoje?"
16012-160120020 = "Se tiver um tempo, poderia vir ao meu local de trabalho?"
16012-160120030 = "Se não me engano... era 'L'Oiseau Bleu', certo?"
16012-160120040 = "Isso mesmo. Aliás, você se lembrou bem, hein."
16012-160120050 = "Tem uma coisa que eu quero te mostrar."
16012-160120060 = "Vou ficar te esperando, não deixe de vir!"
16012-160120070 = "Sensei, Sensei!"
16012-160120080 = "Recebi meu pagamento do trabalho!"
16012-160120090 = "É porque a Junko se esforçou bastante."
16012-160120100 = "Pois é! Então, por isso..."
16012-160120110 = "É hora de retribuir!"
16012-160120120 = "......O que você quer dizer com isso?"
16012-160120130 = "P-por favor, poupe a minha vida..."
16012-160120140 = "Fufu, só observe."
16012-160120150 = "Não diga coisas perigosas!"
16012-160120160 = "De qualquer forma,"
16012-160120170 = "Quando anoitecer, venha até a rua do festival."
16012-160120180 = "Não falte!"
16012-160120190 = "O feriado"
16012-160120200 = "acabou."
16012-160120210 = "Acabou mesmo..."
16012-160120220 = "C-calma, Junko. O feriado vai até amanhã, tecnicamente."
16012-160120230 = "Eu sei disso!"
16012-160120240 = "Mas, no meu coração, o feriado morreu! Ele se foi!"
16012-160120250 = "Ele não vive mais dentro de mim, nem nas minhas costas, nem no meu peito!"
16012-160120260 = "Mas, mesmo assim, eu não posso deixar que termine desse jeito!"
