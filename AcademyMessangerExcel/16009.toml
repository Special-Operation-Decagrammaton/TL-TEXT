[translation]
16009-160090010 = "Domo, Sensei-dono... Eu me chamo Michiru."
16009-160090020 = "Hã...?"
16009-160090030 = "Fufu... Isso é uma saudação tradicional passada de geração em geração entre os otakus ninjas!"
16009-160090040 = "Não saber responder a isso significa que você ainda é um novato como otaku ninja... ou melhor, como um Ninja Mate!"
16009-160090050 = "Ninja Mate...?"
16009-160090060 = "Guh, que frustrante...!"
16009-160090070 = "Se, Sensei-dono... será que você esqueceu!?"
16009-160090080 = "Naquela calada da noite, quando até as plantas dormem... sob a luz do luar, aquela lembrança de quando fizemos uma emboscada juntos!"
16009-160090090 = "Ah, a propósito, 'emboscada' é um termo ninja que significa 'agir secretamente no meio dos arbustos'. Lembre-se disso!"
16009-160090100 = "Acho que não me lembro disso..."
16009-160090110 = "Bem, bem, não se preocupe com os detalhes~"
16009-160090120 = "Tudo bem, não fique desapontado! Sensei-dono tem talento para ser ninja!"
16009-160090130 = "Eu, a presidente do Clube de Pesquisa de Ninjutsu, garanto o seu potencial!"
16009-160090140 = "Err, obrigado...?"
16009-160090150 = "Nyahaha, não precisa se acanhar!"
16009-160090160 = "Aliás, Michiru, o que houve hoje?"
16009-160090170 = "Xi, o horário do trem já está quase na hora."
16009-160090180 = "Então, Sensei-dono! Até o dia em que nos encontrarmos novamente, Adios=SAYONARA!"
16009-160090190 = "(Bum!!) ← Efeito sonoro de bomba de fumaça"
16009-160090200 = "Ela explicou o efeito sonoro...!?"
16009-160090210 = "Err... Adios=SAYONARA!"
16009-160090220 = "Hoje à tarde, farei uma visita ao Schale. Assinado: Ninja M"
16009-160090230 = "Um aviso...!?"
16009-160090240 = "Isso não é mais coisa de ninja, é de ladrão, não é...?"
16009-160090250 = "Não vamos entrar em detalhes!"
16009-160090260 = "Ladrões, a grosso modo, são como ninjas, então está tudo bem!"
16009-160090270 = "Será mesmo!?"
16009-160090280 = "De qualquer forma, o aviso foi dado, Sensei-dono! Prepare-se e aguarde!"
16009-160090290 = "Nos veremos em breve!"
16009-160090300 = "(Bum!!) ← Efeito sonoro de bomba de fumaça"
16009-160090310 = "(Shubababab!) ← Som de partida rápida"
16009-160090320 = "...Obrigado por ser tão prestativa toda vez."
16009-160090330 = "Eu sou a presidente do Clube de Pesquisa de Ninjutsu, não sou?"
16009-160090340 = "É verdade."
16009-160090350 = "Falando nisso, será que podemos chamar de 'presidente' alguém de um clube não oficial?"
16009-160090360 = "Ugh! Você fala demais! Pode sim!"
16009-160090370 = "Nós realizamos atividades regularmente! Como estudar ninjutsu e gravar vídeos!"
16009-160090380 = "Se continuarmos nos esforçando, logo todos em Kivotos conhecerão os ninjas e o dia em que seremos reconhecidos como um clube oficial chegará!"
16009-160090390 = "Sim, vocês estão se esforçando. Estou torcendo por vocês."
16009-160090400 = "Obrigada, Sensei-dono! Ouvir isso me dá ainda mais forças para continuar."
16009-160090410 = "Que bom."
16009-160090420 = "Ao ouvir essas palavras, sinto uma energia surgir..."
16009-160090430 = "Graças a isso, não tenho mais dúvidas!"
16009-160090440 = "...Hã?"
16009-160090450 = "Afinal, para o bem do nosso esforço, não podemos economizar em investimentos, né?"
16009-160090460 = "Disseram que chegaram novos artigos ninja na minha loja favorita."
16009-160090470 = "Ah, não, digo! Ferramentas ninja!"
16009-160090480 = "Estava hesitante porque eram um pouco caras, mas as palavras do Sensei me deram coragem!"
16009-160090490 = "Sim, isso é um investimento no futuro do Clube de Pesquisa de Ninjutsu!"
16009-160090500 = "Não é só porque você quer para si mesma...?"
16009-160090510 = "Então, nos encontramos no lugar de sempre, Sensei!"
16009-160090520 = "(Vupt! Shabababa!) ← Som de alguém dando um mortal super estiloso e saindo correndo"
16009-160090530 = "En-entendido..."
16009-160090540 = "Ah, Sensei, você não tem aquilo no Schale?"
16009-160090550 = "Aquilo...?"
16009-160090560 = "O volume 19 de 'Kamaboko Toppuden'!"
16009-160090570 = "Não está na sala do clube, então pensei que talvez estivesse no Schale."
16009-160090580 = "Desde quando você deixou isso lá...?"
16009-160090590 = "Bem, é que a nossa sala do clube é apenas um lugar temporário... e nunca se sabe quando a Hyakkiyako pode aparecer..."
16009-160090600 = "E também não dá para saber quando o Departamento de Yin-Yang vai aparecer..."
16009-160090610 = "Então, após calcular com o meu cérebro ninja,"
16009-160090620 = "cheguei à conclusão de que guardar os itens no Schale é o mais racional!"
16009-160090630 = "O Schale não é um depósito, Michiru-san..."
16009-160090640 = "Claro que você também pode ler, Sensei! A série 'Kamaboko' é muito interessante!"
16009-160090650 = "Ah, falando nisso, nos encontramos no parque hoje à noite."
16009-160090660 = "Estarei te esperando, Sensei!"
16009-160090670 = "A conversa muda de rumo rápido como sempre!"
16009-160090680 = "Tudo bem, mas o que vamos fazer hoje à noite?"
16009-160090690 = "(Shubabababa!!!) ← Som de alguém amarrando o cadarço"
16009-160090700 = "Isso nem é mais uma ação de ninja...!?"
16009-160090710 = "Sensei, será que foi por causa daquilo de ontem..."
16009-160090720 = "Eu acabei pegando um resfriado..."
16009-160090730 = "Vou preparar um mingau..."
16009-160090740 = "Obrigada, Sensei..."
16009-160090750 = "Bem, estarei te esperando..."
16009-160090760 = "Sensei."
16009-160090770 = "Você teria interesse em documentos antigos"
16009-160090780 = "ou mídias de armazenamento da antiguidade?"
16009-160090790 = "Você teria interesse...?"
16009-160090800 = "Não me diga que é sobre os ninjas ancestrais...!"
16009-160090810 = "Aquele pergaminho antigo!?"
16009-160090820 = "Como esperado do Sensei!"
16009-160090830 = "Que boa reação!"
16009-160090840 = "Mas não é isso."
16009-160090850 = "Depois de toda essa conversa!?"
16009-160090860 = "Para ser exata,"
16009-160090870 = "metade está correta, na verdade."
16009-160090880 = "Se estiver curioso,"
16009-160090890 = "venha até a rua comercial!"
16009-160090900 = "Estarei te esperando, Sensei!"
16009-160090910 = "(Shubababa) ← Som de alguém correndo rápido"
16009-160090920 = "Ah, sim..."
