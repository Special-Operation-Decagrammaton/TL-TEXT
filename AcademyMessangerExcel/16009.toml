[translation]
16009-160090010 = "ドーモ、先生殿……小生、ミチルと申す"
16009-160090020 = "えっと……？"
16009-160090030 = "ふふっ……これはねー、忍者オタクの間で代々語り継がれてきた伝統の挨拶！"
16009-160090040 = "これに返せないとは、先生殿も忍者オタク仲間……忍者メイトとしてはまだ未熟のようだね！"
16009-160090050 = "忍者メイト……？"
16009-160090060 = "ぐっ、何か悔しい……！"
16009-160090070 = "せ、先生殿……もしかして忘れたの！？"
16009-160090080 = "草木も寝静まるあの夜更け……月夜の下で、私と一緒に二人でアンブッシュしたあの思い出を！"
16009-160090090 = "あ、ちなみにアンブッシュは「茂みの中で密かに行動する」っていう意味の忍者用語だよ。覚えておいてね！"
16009-160090100 = "それはちょっと記憶に無いかな……？"
16009-160090110 = "まぁまぁ細かい事は気にしない～"
16009-160090120 = "大丈夫、ガッカリしないで！先生殿には忍者の才能がある！"
16009-160090130 = "その将来性は、忍術研究部の部長であるこの私が保証するから！"
16009-160090140 = "えっと、ありがとう……？"
16009-160090150 = "にゃははっ、くるしゅうない！"
16009-160090160 = "ところでミチル、今日はどうしたの？"
16009-160090170 = "やば、電車の時間もうすぐじゃん"
16009-160090180 = "それでは先生殿！また会えるその日まで、アディオス=SAYONARA！"
16009-160090190 = "（ボンッ！！）←煙幕弾の効果音"
16009-160090200 = "効果音を説明してくれた……！？"
16009-160090210 = "えっと……アディオス＝SAYONARA！"
16009-160090220 = "本日の午後、シャーレへ推参する　忍者M"
16009-160090230 = "予告……！？"
16009-160090240 = "これは忍者ではなく怪盗では……？"
16009-160090250 = "細かいことは言いっこなし！"
16009-160090260 = "怪盗もざっくり言っちゃえば忍者みたいなものだから、大丈夫！"
16009-160090270 = "本当にそうかな！？"
16009-160090280 = "とりあえず予告はしたよ、先生殿！首を洗って待っているが良い！"
16009-160090290 = "またすぐ相まみえることになろう！"
16009-160090300 = "（ボンッ！！）←煙幕弾の効果音"
16009-160090310 = "（シュバババッ！）←素早く去る音"
16009-160090320 = "……毎回親切にありがとね"
16009-160090330 = "私って、忍術研究部の部長でしょ？"
16009-160090340 = "そうだね"
16009-160090350 = "そういえば非認可の部活って、「部長」って呼んで良いのかな？"
16009-160090360 = "うぎゃっ！余計な一言が多いよ！良いんだよ！"
16009-160090370 = "普段からちゃんと活動してるんだから！忍者の勉強とか、動画撮影とか！"
16009-160090380 = "このまま頑張れば、いつかはキヴォトスのみんなに忍者を知ってもらって、正式な部活として認められる日も近いはず！"
16009-160090390 = "うん、頑張ってるもんね。応援してる"
16009-160090400 = "ありがとう、先生殿！そう言ってもらえると、ますます頑張れるよ"
16009-160090410 = "それは良かった"
16009-160090420 = "その言葉を聞いたら力が湧いてきて……"
16009-160090430 = "おかげで、迷いが無くなったよ！"
16009-160090440 = "……え？"
16009-160090450 = "やっぱり努力のためにも、投資は惜しんじゃダメだよね"
16009-160090460 = "行きつけのお店で、新しい忍者グッズが入荷されるんだって"
16009-160090470 = "あ、違う！忍具が！"
16009-160090480 = "ちょっと高くて悩んでたんだけど、先生の言葉を聞いて踏ん切りがついたよ！"
16009-160090490 = "そう、これは忍術研究部の未来への投資！"
16009-160090500 = "ただ自分が欲しいわけではなく……？"
16009-160090510 = "じゃあいつもの場所で待ち合わせね、先生殿！"
16009-160090520 = "（くるりっ！シュババババッ！）←ものすごくかっこよく宙返りして走っていく音"
16009-160090530 = "りょ、了解……"
16009-160090540 = "そうだ先生、シャーレにあれ無い？"
16009-160090550 = "あれって……？"
16009-160090560 = "「かまぼこ突風伝」の19巻！"
16009-160090570 = "部室に無いから、あとはシャーレくらいかなって"
16009-160090580 = "いつの間に置いてたんだ……"
16009-160090590 = "それはその、うちの部室、あくまで仮の場所だし……いつ百花繚乱が押し寄せてくるかも分からないから……"
16009-160090600 = "あと陰陽部も、いつ来るか分かったもんじゃないし……"
16009-160090610 = "そこで私の忍者脳で演算した結果"
16009-160090620 = "グッズはシャーレに保管するのが合理的、という結論に至ったの！"
16009-160090630 = "シャーレは倉庫じゃないんですよ、ミチルさん……"
16009-160090640 = "もちろん先生殿も読んで良いよ、「かまぼこ」シリーズ面白いから！"
16009-160090650 = "あ、そういえば今夜は公園に集合ね"
16009-160090660 = "待ってるよ、先生殿！"
16009-160090670 = "話が相変わらず急展開！"
16009-160090680 = "それは良いんだけど、今夜は何をするの？"
16009-160090690 = "（しゅばばばばばばっ！！！）←靴ひもを結ぶ音"
16009-160090700 = "もう忍者っぽいアクションですらない……！？"
16009-160090710 = "先生殿、昨日のアレのせいか……"
16009-160090720 = "風邪引いちゃったぁ……"
16009-160090730 = "おかゆ作りに行くね……"
16009-160090740 = "ありがとう、先生殿……"
16009-160090750 = "えっと、待ってるからね……"
16009-160090760 = "先生殿"
16009-160090770 = "遠い昔の古文書や"
16009-160090780 = "古代の記録媒体に "
16009-160090790 = "興味はお有りだろうか……"
16009-160090800 = "まさか、エンシェント忍者の……！"
16009-160090810 = "あの古代の巻物が！？"
16009-160090820 = "さっすが先生殿！"
16009-160090830 = "良い反応～！"
16009-160090840 = "でもそれじゃない"
16009-160090850 = "この流れで！？"
16009-160090860 = "正確に言うと"
16009-160090870 = "半分は正解なんだけどねー"
16009-160090880 = "もし気になるなら"
16009-160090890 = "商店街まで来て！"
16009-160090900 = "待ってるよー、先生殿！"
16009-160090910 = "（シュバババッ）←素早く走る音"
16009-160090920 = "う、うん……"
