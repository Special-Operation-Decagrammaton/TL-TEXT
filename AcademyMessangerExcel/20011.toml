[translation]
20011-200110010 = "Professor, por acaso você entende bastante sobre sacerdotisas?"
20011-200110020 = "Não sei se diria que entendo bastante, mas... por que a pergunta?"
20011-200110030 = "Claro. As pessoas me chamam de Mestre das Sacerdotisas."
20011-200110040 = "Ah, na verdade é o seguinte..."
20011-200110050 = "É que surgiu uma oportunidade de um trabalho de meio período que paga bem."
20011-200110060 = "Parece que é um trabalho como sacerdotisa em um evento..."
20011-200110070 = "Mestre das Sacerdotisas...?"
20011-200110080 = "...Professor, você está bem da cabeça?"
20011-200110090 = "Ou talvez, Mestre das Sacerdotisas Meister."
20011-200110100 = "Isso faz ainda menos sentido!?"
20011-200110110 = "Haa... enfim, como o salário por hora desse trabalho de sacerdotisa parece ser muito bom, pensei em tentar."
20011-200110120 = "Mas, parando para pensar, eu não entendo muito sobre sacerdotisas..."
20011-200110130 = "Por isso, se você souber de algo, queria que me ensinasse."
20011-200110140 = "Não sei o quanto posso ajudar, mas pode deixar comigo!"
20011-200110150 = "Obrigada. Então, depois te mando o local do encontro."
20011-200110160 = "Ei, Professor."
20011-200110170 = "Obrigada por me ouvir hoje, apesar de tudo."
20011-200110180 = "De nada. Quando o trabalho começar, eu vou te visitar. Faz tempo que não tomo amazake."
20011-200110190 = "...Tudo bem você vir, mas não vá morder ninguém, hein!"
20011-200110200 = "Aproveitando, Professor, feliz ano novo."
20011-200110210 = "Feliz ano novo. Conto com você este ano também."
20011-200110220 = "Aliás, Serika, como estão os preparativos para o trabalho?"
20011-200110230 = "Ah, sim. Está indo muito bem."
20011-200110240 = "Como ainda não estou acostumada, fico um pouco insegura com algumas coisas, mas..."
20011-200110250 = "É divertido e, no geral, não tem problema nenhum."
20011-200110260 = "Então, estou indo aí agora!"
20011-200110270 = "Hã, agora!? E-eu não disse que queria que você viesse, sabia!?"
20011-200110280 = "Fica ruim se eu for?"
20011-200110290 = "Não, não é isso, mas..."
20011-200110300 = "Na verdade, se você viesse..."
20011-200110310 = "Ah, droga, enviei no meio da frase! Esquece o que eu disse! Finja que não viu!"
20011-200110320 = "Por isso, não precisa vir, sério!"
20011-200110330 = "Professor, você tem um tempo agora?"
20011-200110340 = "Sim, estou livre."
20011-200110350 = "Posso arranjar um tempo, por quê?"
20011-200110360 = "Ah, é mesmo...?"
20011-200110370 = "Na verdade, hoje o trabalho deve terminar um pouco mais cedo."
20011-200110380 = "Como vou ter um tempo livre, então..."
20011-200110390 = "Pensei em comprar algumas lembrancinhas com tema de Ano Novo para o pessoal de Abydos."
20011-200110400 = "Você poderia me acompanhar para escolher?"
20011-200110410 = "Estou indo agora mesmo!"
20011-200110420 = "Obrigada. Estarei esperando."
20011-200110430 = "Sobre aquilo... Professor."
20011-200110440 = "Quando você chegou hoje, estava ofegante..."
20011-200110450 = "Bem..."
20011-200110460 = "Está tudo bem, não se preocupe."
20011-200110470 = "S-sim..."
20011-200110480 = "É só que, se puder me avisar antes, ajuda a não forçar tanto os joelhos, sabe?"
20011-200110490 = "...Sim, entendi."
20011-200110500 = "Desculpe por te preocupar."
20011-200110510 = "Obrigada por tudo, Sensei♡"
20011-200110520 = "Um coração……!"
20011-200110530 = "N-não é isso! Foi só o corretor automático que colocou sozinho……!"
20011-200110540 = "Não é, eu juro, é totalmente diferente!"
