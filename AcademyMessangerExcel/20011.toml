[translation]
20011-200110010 = "先生ってもしかして、巫女さんに詳しかったりする？"
20011-200110020 = "詳しいかどうかは微妙だけど……どうしたの？"
20011-200110030 = "もちろん。人は私を巫女マスターと呼ぶ"
20011-200110040 = "あっ、実はね"
20011-200110050 = "その、今回偶然稼ぎのいいバイトの話が入ったんだけど"
20011-200110060 = "イベント会場で巫女さんをやるバイト…らしいの"
20011-200110070 = "巫女マスター……？"
20011-200110080 = "……先生、頭大丈夫？"
20011-200110090 = "あるいは巫女マイスターでも"
20011-200110100 = "もっと意味わかんないだけど！？"
20011-200110110 = "はあ……とにかく、時給が結構良さそうな巫女さんのバイトがあったから、やってみようかなって思ってて"
20011-200110120 = "でもいざ考えてみると、あんまり巫女さんのこととか詳しくないし……"
20011-200110130 = "だからもし先生が知ってたら、教えてほしいなって思って"
20011-200110140 = "どこまで力になれるか分からないけど、任せて！"
20011-200110150 = "ありがと。じゃあ後で待ち合わせの場所送るから"
20011-200110160 = "えっと、先生"
20011-200110170 = "今日は何だかんだで、相談に乗ってくれてありがと"
20011-200110180 = "ううん。バイト始まったら会いに行くね、久しぶりに甘酒とか飲みたいし"
20011-200110190 = "……来るのは良いけど、嚙んだりしないからね！"
20011-200110200 = "あらためてだけど先生、あけましておめでとうございます"
20011-200110210 = "あけましておめでとうございます。今年もよろしくね"
20011-200110220 = "ところでセリカ、バイトの準備はどう？"
20011-200110230 = "あ、うん。結構良い感じだよ"
20011-200110240 = "まだ慣れてないから、色々不安なところもあるけど……"
20011-200110250 = "楽しいし、総じて問題無いかな"
20011-200110260 = "じゃあ今から行くね！"
20011-200110270 = "え、今から！？べ、別に来てほしいとか言ってないでしょ！？"
20011-200110280 = "来られると困る？"
20011-200110290 = "いや、別にそういう訳じゃないけど…"
20011-200110300 = "むしろ来てくれたら"
20011-200110310 = "ああもう途中で送っちゃった！今のは無し！見なかったことにして！"
20011-200110320 = "だから、別に来なくても良いから！"
20011-200110330 = "先生、今時間ある？"
20011-200110340 = "うん、暇だよ"
20011-200110350 = "時間なら空けられるよ、どうしたの？"
20011-200110360 = "あ、そうなの……？"
20011-200110370 = "実は今日、バイトが少し早く終わりそうで"
20011-200110380 = "時間に余裕ができそうだから、その……"
20011-200110390 = "アビドスのみんなに、正月っぽいお土産でも買っていこうかなって思って"
20011-200110400 = "それを選ぶのに、付き合ってくれない？"
20011-200110410 = "すぐ行く！"
20011-200110420 = "ありがと。待ってるね"
20011-200110430 = "その……先生"
20011-200110440 = "今日来てくれた時、すごい息を切らしてたけど……"
20011-200110450 = "えっと……"
20011-200110460 = "大丈夫、気にしないで"
20011-200110470 = "う、うん……"
20011-200110480 = "もしできれば連絡くれると、膝に負担がかからなくて助かるかもってくらいで"
20011-200110490 = "……うん、分かった"
20011-200110500 = "心配かけてごめんなさい"
20011-200110510 = "いつもありがとう、先生♡"
20011-200110520 = "ハートマーク……！"
20011-200110530 = "ち、違う！今のは自動変換で付いちゃっただけで……！"
20011-200110540 = "違うからっ、絶対に違うから！"
