[translation]
13006-1072 = "Tédio~! (つ ◑▽◑)つ"
13006-1073 = "Sensei, o que você está fazendo agora~?"
13006-1074 = "Estou trabalhando."
13006-1075 = "Estou respirando."
13006-1076 = "É mesmo? Hmm, entendi."
13006-1077 = "Então não devo te incomodar."
13006-1078 = "Então, boa sorte, Sensei!"
13006-1079 = "Ahahahah!!"
13006-1080 = "Entendi~ Uhum, uhum! Respirar é super importante, né!"
13006-1081 = "Eu também estou torcendo pela sua respiração, tá. Sensei♪"
13006-1082 = "Então, boa sorte~!"
13006-1083 = "Kufufu."
13006-1084 = "Foi divertido hoje, Sensei~!"
13006-1085 = "Vamos brincar muito de novo da próxima vez."
13006-1086 = "Sensei, você está livre hoje, né?"
13006-1087 = "Bem, estou ocupado, mas...?"
13006-1088 = "Como você sabia!?"
13006-1089 = "Ah~? Você está ocupado~?"
13006-1090 = "Bem, mas não importa!"
13006-1091 = "Porque, desde o início, o Sensei não tem escolha!"
13006-1092 = "Hmm~? Por quê?"
13006-1093 = "...Kufufu, não subestime a capacidade de coleta de informações da nossa Agência de Faz-Tudo, tá~?"
13006-1094 = "É por isso que hoje, eu quero que você venha brincar na nossa Agência de Faz-Tudo! (≧∇≦)ﾉ"
13006-1095 = "Sensei, você tem algum hobby~?"
13006-1096 = "Claro."
13006-1097 = "Não tenho nada que possa chamar de hobby..."
13006-1098 = "Entendi~. É bom ter um hobby, né~."
13006-1099 = "Quando você está absorto em algo, o tempo passa voando~"
13006-1100 = "E quando você se aprofunda em uma área que gosta, também há uma sensação de realização, né?"
13006-1101 = "É divertido, né~!"
13006-1102 = "Hmm, é mesmo~?"
13006-1103 = "Isso é um pouco decepcionante, talvez~."
13006-1104 = "Um dia eu gostaria de conversar sobre esses hobbies com o Sensei~, parece interessante! (〇'ヮ'〇)"
13006-1105 = "Sensei, um pedido estranho chegou à nossa Agência de Faz-Tudo!"
13006-1106 = "E é um pedido super estranho, sabe~?"
13006-1107 = "Mas ao mesmo tempo, parece super divertido, sabe~?"
13006-1108 = "Um pedido que a Mutsuki diz ser super estranho, o que será...?"
13006-1109 = "Um pedido que a Mutsuki diz parecer super divertido, o que será...?"
13006-1110 = "Hmm~, bem, bem! Deixando os detalhes de lado!"
13006-1111 = "Eu queria que o Sensei me ajudasse~?"
13006-1112 = "O dia todo foi divertido hoje, Sensei~!"
13006-1113 = "Da próxima vez, eu vou fazer dar certo, com certeza,"
13006-1114 = "então esteja preparado~! ＼( 'ω') /"
