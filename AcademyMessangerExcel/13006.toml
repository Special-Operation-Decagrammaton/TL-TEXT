[translation]
13006-1072 = "ひ～ま～！(つ ◑▽◑)つ"
13006-1073 = "先生、今なにしてるの～？"
13006-1074 = "仕事中だよ"
13006-1075 = "息してるよ"
13006-1076 = "そうなの？ふーん、そっか"
13006-1077 = "それは邪魔しちゃダメだね"
13006-1078 = "じゃ、頑張ってねー先生！"
13006-1079 = "あははは！！"
13006-1080 = "そっか～うんうん！息するのめっちゃ大事だよね！"
13006-1081 = "私も呼吸の応援、してるからね。先生♪"
13006-1082 = "じゃ、頑張ってねー！"
13006-1083 = "くふふっ"
13006-1084 = "今日は楽しかったね～、先生！"
13006-1085 = "また今度、たくさん遊ぼうね"
13006-1086 = "先生、今日暇でしょ？"
13006-1087 = "えっと、忙しいけど……？"
13006-1088 = "どうして分かったの！？"
13006-1089 = "え～？忙しいの～？"
13006-1090 = "まあ、でも関係ないけどね！"
13006-1091 = "なぜなら、最初から先生に選択権は無いから！"
13006-1092 = "ん～？どうして？"
13006-1093 = "……くふふ、うちの便利屋の情報収集能力をなめちゃダメだよ～？"
13006-1094 = "そういうわけで今日は、うちの便利屋に遊びに来てほしいな！(≧∇≦)ﾉ"
13006-1095 = "先生って、何か趣味とかあるのー？"
13006-1096 = "もちろん"
13006-1097 = "趣味って言えるほどのものは無いかな……"
13006-1098 = "そっか～。やっぱり、趣味があるって良いよね～"
13006-1099 = "夢中になってると、時間もすぐに過ぎていくしー"
13006-1100 = "好きな分野について詳しくなると、達成感もあるし？"
13006-1101 = "楽しいよね～！"
13006-1102 = "ふーん、そうなんだ～？"
13006-1103 = "それはちょっと残念かも～"
13006-1104 = "いつか先生とそういう趣味の話をしたいな～、面白そう！(〇'ヮ'〇)"
13006-1105 = "先生、うちの便利屋に変わった依頼が届いたの！"
13006-1106 = "これがまた、すっごい変な依頼でさ～？"
13006-1107 = "でも同時にすっごく面白そうでね～？"
13006-1108 = "ムツキがすっごい変って言うほどの依頼っていったい……"
13006-1109 = "ムツキがすっごく面白そうって言うような依頼っていったい……"
13006-1110 = "ん～、まあまあ！細かいことは置いといてさ！"
13006-1111 = "先生に手伝ってほしいな～？"
13006-1112 = "今日は一日楽しかったよ～先生！"
13006-1113 = "次は絶っ対に成功させてみせるから、"
13006-1114 = "覚悟しててね～！＼( 'ω') /"
