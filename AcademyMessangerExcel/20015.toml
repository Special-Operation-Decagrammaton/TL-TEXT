[translation]
20015-200150010 = "せんせー！まただよー！！"
20015-200150020 = "また？"
20015-200150030 = "また「修行部ってちょっとおかしいよね」って言われちゃったの！"
20015-200150040 = "何と、それは失礼な"
20015-200150050 = "でしょ、先生もそう思うよね？"
20015-200150060 = "公園で決め台詞を練習してただけなのに！"
20015-200150070 = "……ん？"
20015-200150080 = "決め台詞……？"
20015-200150090 = "決め台詞がどうかしたの？"
20015-200150100 = "あ、もちろん私たち修行部が、問題児たちを倒す時に言う台詞だよ！"
20015-200150110 = "いざという時にカッコよく言えるよう、一生懸命練習してるの"
20015-200150120 = "ちなみに私の台詞は「紅葉に代わって突撃だ」！"
20015-200150130 = "先生なら、特別に使っていいよ？"
20015-200150140 = "ちなみにポーズはね～、あ、動画で撮らないとダメか、ちょっと待ってて"
20015-200150150 = "だ、大丈夫。とにかく応援してるね"
20015-200150160 = "うん、ありがとー先生！"
20015-200150170 = "そんな先生には、この可愛いスタンプをプレゼント！"
20015-200150180 = "あ、ありがとう"
20015-200150190 = "とにかくこれ以上「変」って言われないようにするために、どうにか対策をしなくっちゃ"
20015-200150200 = "だから先生、お願いがあるの！"
20015-200150210 = "先生、今日も引き続き「素敵なレディー」になるため頑張るよ！"
20015-200150220 = "うん、いつも通り頑張って"
20015-200150230 = "でも素敵なレディーへの道は、かなり厳しい……"
20015-200150240 = "どれくらい難しいかというと…………"
20015-200150250 = "夏休みに「ラジオ体操カード」で、欠かさず毎日スタンプを貰うこと並みに難しい！"
20015-200150260 = "それは難しい！"
20015-200150270 = "そうなの、それでどうすれば良いかなって悩んでたんだけど……"
20015-200150280 = "すっごいことを思いついちゃった！"
20015-200150290 = "これはもう「世紀の大発見」と呼べるくらいだよ！"
20015-200150300 = "話してあげるから、早く修行部の部室に来て！"
20015-200150310 = "やっほー先生！"
20015-200150320 = "今日も遊びに"
20015-200150330 = "じゃなくて、素敵なレディーになるための修行をしに、シャーレに行っても良い？"
20015-200150340 = "ごめんカエデ、今日はちょっと仕事で忙しくて……"
20015-200150350 = "えー、先生いっつも仕事ばっかり"
20015-200150360 = "先生はそんなに仕事が好きなの？"
20015-200150370 = "ど、どうかな……"
20015-200150380 = "書類作業そのものは好きではないです……"
20015-200150390 = "ふーん……？あ、でも前に言ってた気がするね"
20015-200150400 = "大人は時々、やりたくないこともやらないといけない……って"
20015-200150410 = "うーん、大人って大変だね？"
20015-200150420 = "先生を見てると、「時々」じゃない気がするけど"
20015-200150430 = "ぐっ、何も言えない……！"
20015-200150440 = "まあとにかくー"
20015-200150450 = "あ、良いこと思いついた！"
20015-200150460 = "良いこと？"
20015-200150470 = "待ってて、先生！"
20015-200150480 = "今日の私は、「真面目にお手伝いをするモード」だから！"
20015-200150490 = "じゃあ、また後でね！"
20015-200150500 = "？？？"
20015-200150510 = "先生！非常事態！！"
20015-200150520 = "非常事態といえば仮面ドライバーの必殺技「エマージェンシードライブキック」だよ！"
20015-200150530 = "……何それ？"
20015-200150540 = "何か大変なことが起きた感じ？"
20015-200150550 = "えっと、どこから説明すれば……"
20015-200150560 = "とりあえず、めちゃくちゃ大変なことが起きたの！"
20015-200150570 = "大丈夫？怪我とかしてない？"
20015-200150580 = "私は全然元気！さっき朝ごはんもお代わりした！"
20015-200150590 = "それより、そんなことじゃなくて！"
20015-200150600 = "……？"
20015-200150610 = "とにかく、非常事態なの！"
20015-200150620 = "ここまでの非常事態だと、モモトークじゃ教えられない！"
20015-200150630 = "どこかの誰かが、このモモトークを盗み見してるかもしれないし！"
20015-200150640 = "それは大丈夫だと思うけど……多分"
20015-200150650 = "とにかく用件は、直接会って話すね！"
20015-200150660 = "公園で待ってるから！"
20015-200150670 = "先生先生！"
20015-200150680 = "ついに例のアレが発売だって！"
20015-200150690 = "一緒に行こ！！"
20015-200150700 = "例のアレ！？"
20015-200150710 = "そうそう"
20015-200150720 = "前に話してた通り"
20015-200150730 = "今度ムシクイーンの、ポップアップストアがオープンするの！"
20015-200150740 = "あ、そういえば前に言ってたね"
20015-200150750 = "そうそう、それ！"
20015-200150760 = "でもでも、先生が思ってるようなムシクイーンじゃなくて"
20015-200150770 = "聞いたら絶対、一緒に行きたくなるはず！"
20015-200150780 = "実はそのポップアップストアではね……"
20015-200150790 = "限定版のムシクイーンスリーブが販売されるの！"
20015-200150800 = "おお！"
20015-200150810 = "ふふん、すごいでしょ！"
20015-200150820 = "限定版のスリーブ、何としても欲しいよね……！"
20015-200150830 = "ということで、ポップアップストア前に集合ね！"
20015-200150840 = "時間は後で送るから！"
20015-200150850 = "先生！"
20015-200150860 = "無事に帰れた？"
20015-200150870 = "ちゃんと帰れたよ、カエデの方は？"
20015-200150880 = "よかった！私も大丈夫！"
20015-200150890 = "無事にスリーブが買えて良かった、ありがとね！"
20015-200150900 = "これからはそのスリーブを使って"
20015-200150910 = "大会に出られるね"
20015-200150920 = "ん？使わないよ？"
20015-200150930 = "スリーブは消耗品だから"
20015-200150940 = "使ったら傷んじゃうし……"
20015-200150950 = "もし使うならさらに上から透明スリーブを被せて"
20015-200150960 = "2重か3重スリーブにしないと！"
20015-200150970 = "3重、スリーブ……！？"
20015-200150980 = "うん！バトラーの間では常識だよ？"
20015-200150990 = "バトラーの世界は、奥が深いね……"
20015-200151000 = "そうかな？"
