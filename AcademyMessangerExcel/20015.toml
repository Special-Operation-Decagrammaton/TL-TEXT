[translation]
20015-200150010 = "Sensei! Aconteceu de novo!!"
20015-200150020 = "De novo?"
20015-200150030 = "Disseram de novo que 'o Clube de Treinamento é meio estranho'!"
20015-200150040 = "Nossa, que falta de educação."
20015-200150050 = "Viu só? Você também acha isso, né, Sensei?"
20015-200150060 = "A gente só estava praticando nossas frases de efeito no parque!"
20015-200150070 = "……Hm?"
20015-200150080 = "Frases de efeito……?"
20015-200150090 = "O que tem as frases de efeito?"
20015-200150100 = "Ah, claro, são as frases que nós do Clube de Treinamento dizemos ao derrotar encrenqueiros!"
20015-200150110 = "Estamos praticando muito para conseguir dizer com estilo na hora certa."
20015-200150120 = "Aliás, a minha frase é: 'Em nome do outono, prepare-se para o ataque'!"
20015-200150130 = "Se for você, Sensei, pode usar de vez em quando!"
20015-200150140 = "Aliás, a pose é assim... ah, preciso gravar um vídeo, espere um pouco."
20015-200150150 = "T-tá bom. De qualquer forma, estou torcendo por vocês."
20015-200150160 = "Sim, obrigada, Sensei!"
20015-200150170 = "Para um Sensei assim, vou dar este adesivo fofo de presente!"
20015-200150180 = "Ah, obrigado."
20015-200150190 = "De qualquer forma, preciso pensar em um jeito de evitar que digam que somos 'estranhos'."
20015-200150200 = "Por isso, Sensei, tenho um pedido!"
20015-200150210 = "Sensei, hoje vou continuar me esforçando para me tornar uma 'dama elegante'!"
20015-200150220 = "Sim, continue se esforçando como sempre."
20015-200150230 = "Mas o caminho para se tornar uma dama elegante é bem difícil..."
20015-200150240 = "Para você ter uma ideia de quão difícil é…………"
20015-200150250 = "É tão difícil quanto conseguir todos os carimbos no cartão de ginástica das férias de verão sem faltar nenhum dia!"
20015-200150260 = "Isso é difícil mesmo!"
20015-200150270 = "Pois é, eu estava pensando no que fazer sobre isso, mas..."
20015-200150280 = "Tive uma ideia incrível!"
20015-200150290 = "Dá para chamar isso de 'a grande descoberta do século'!"
20015-200150300 = "Vou te contar, então venha logo para a sala do Clube de Treinamento!"
20015-200150310 = "Oi, Sensei!"
20015-200150320 = "Hoje também vim para brincar..."
20015-200150330 = "Quer dizer, posso ir ao Schale para treinar para me tornar uma dama elegante?"
20015-200150340 = "Desculpe, Kaede, hoje estou um pouco ocupado com o trabalho..."
20015-200150350 = "Ah, Sensei, você só vive trabalhando."
20015-200150360 = "Você gosta tanto assim de trabalhar?"
20015-200150370 = "B-bem, não sei dizer..."
20015-200150380 = "Eu não gosto muito de lidar com a papelada em si..."
20015-200150390 = "Hmm...? Ah, mas acho que você disse isso antes."
20015-200150400 = "Que os adultos às vezes precisam fazer coisas que não querem..."
20015-200150410 = "Hum, ser adulto é difícil, né?"
20015-200150420 = "Vendo você, não parece que é só 'às vezes'."
20015-200150430 = "Guh, não tenho como negar...!"
20015-200150440 = "Bem, de qualquer forma..."
20015-200150450 = "Ah, tive uma ideia boa!"
20015-200150460 = "Uma ideia boa?"
20015-200150470 = "Espere aí, Sensei!"
20015-200150480 = "Hoje eu estou no 'modo de ajudar seriamente'!"
20015-200150490 = "Então, até mais tarde!"
20015-200150500 = "???"
20015-200150510 = "Sensei! Emergência!!"
20015-200150520 = "Falando em emergência, é o golpe especial do Kamen Driver, o \"Emergency Drive Kick\"!"
20015-200150530 = "……O que é isso?"
20015-200150540 = "Aconteceu algo muito grave?"
20015-200150550 = "Bem, por onde eu começo a explicar……"
20015-200150560 = "De qualquer forma, algo extremamente grave aconteceu!"
20015-200150570 = "Você está bem? Não se machucou?"
20015-200150580 = "Eu estou super bem! Até repeti o café da manhã agora pouco!"
20015-200150590 = "Não é sobre isso, esquece!"
20015-200150600 = "……?"
20015-200150610 = "Enfim, é uma emergência!"
20015-200150620 = "Uma emergência desse nível não dá para explicar pelo MomoTalk!"
20015-200150630 = "Vai que alguém por aí está espiando este MomoTalk!"
20015-200150640 = "Acho que isso não é um problema, mas…… talvez."
20015-200150650 = "De qualquer forma, vou te contar os detalhes pessoalmente!"
20015-200150660 = "Estou te esperando no parque!"
20015-200150670 = "Sensei, Sensei!"
20015-200150680 = "Finalmente aquele item vai ser lançado!"
20015-200150690 = "Vamos juntos!!"
20015-200150700 = "Aquele item!?"
20015-200150710 = "Isso mesmo."
20015-200150720 = "Como eu tinha falado antes."
20015-200150730 = "Vai abrir uma loja temporária de Mushiking!"
20015-200150740 = "Ah, é verdade, você tinha comentado antes."
20015-200150750 = "Isso, exatamente!"
20015-200150760 = "Mas não é o Mushiking que você está pensando."
20015-200150770 = "Se você ouvir, com certeza vai querer ir comigo!"
20015-200150780 = "Na verdade, nessa loja temporária……"
20015-200150790 = "Vão vender protetores de carta (sleeves) de edição limitada do Mushiking!"
20015-200150800 = "Oh!"
20015-200150810 = "Hehe, incrível, né!"
20015-200150820 = "Esses protetores de edição limitada, precisamos conseguir de qualquer jeito……!"
20015-200150830 = "Então, nos encontramos em frente à loja temporária!"
20015-200150840 = "Depois te mando o horário!"
20015-200150850 = "Sensei!"
20015-200150860 = "Conseguiu chegar em casa em segurança?"
20015-200150870 = "Cheguei sim, e você, Kaede?"
20015-200150880 = "Que bom! Eu também estou bem!"
20015-200150890 = "Fico feliz que conseguimos comprar os protetores, obrigada!"
20015-200150900 = "A partir de agora, você vai poder usar esses protetores"
20015-200150910 = "para participar dos torneios."
20015-200150920 = "Hã? Eu não vou usar, não."
20015-200150930 = "Protetores são itens de consumo."
20015-200150940 = "Se eu usar, eles vão estragar……"
20015-200150950 = "Se for usar, tenho que colocar outro protetor transparente por cima"
20015-200150960 = "e fazer uma proteção dupla ou tripla!"
20015-200150970 = "Proteção tripla……!?"
20015-200150980 = "Sim! É o básico entre os jogadores, sabia?"
20015-200150990 = "O mundo dos jogadores é profundo, hein……"
20015-200151000 = "Você acha?"
