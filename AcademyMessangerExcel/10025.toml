[translation]
10025-100250010 = "Sensei, na verdade, parece que os efeitos colaterais apareceram de novo..."
10025-100250020 = "Nesta forma, meu ponto de vista é mais baixo,"
10025-100250030 = "meus braços e pernas são mais leves, e de alguma forma tudo parece meio estranho."
10025-100250040 = "Até o antídoto fazer efeito, talvez seja melhor não sair muito."
10025-100250050 = "...Não, não posso perder esta oportunidade. Sensei, vamos comer doces!"
10025-100250060 = "Tinha uma coisa que eu queria muito experimentar se virasse criança!"
10025-100250070 = "...?"
10025-100250080 = "Não acredito que, ao mesmo tempo que meu corpo encolheu, até meu paladar mudou..."
10025-100250090 = "Nesta forma, não posso dizer para as crianças da Baikaen que "não pode ser seletiva com comida"."
10025-100250100 = "Preciso comer várias coisas aos poucos e superar o que não gosto também."
10025-100250110 = "Primeiro, em ordem, começando pelo rum do sorvete de rum com passas..."
10025-100250120 = "Isso não pode!"
10025-100250130 = "...Sensei. Você está ocupado agora?"
10025-100250140 = "O que foi?"
10025-100250150 = "Bem, eu estava arrumando umas coisas na Baikaen e, digamos que... um pequeno acidente aconteceu..."
10025-100250160 = "Agora eu meio que... não consigo me mover..."
10025-100250170 = "Espere aí, já estou indo."
10025-100250180 = "Sensei, você ouviu?"
10025-100250190 = "Parece que um grande parquinho indoor chamado "Playland" vai inaugurar no distrito central de Kivotos!"
10025-100250200 = "Todas as crianças da Baikaen estão dizendo que querem ir, então pensei em ir antes para verificar a segurança e outras coisas."
10025-100250210 = "Se não for incômodo, você gostaria de ir comigo no próximo fim de semana?"
10025-100250220 = "Sim, se estiver tudo bem comigo, vou com prazer."
10025-100250230 = "Ah, mas, Shun, tudo bem você sair com esse corpo?"
10025-100250240 = "Sim, tudo bem!"
10025-100250250 = "Não, na verdade, este é o momento perfeito."
10025-100250260 = "Uma oportunidade de verificar as coisas do ponto de vista das crianças é muito rara!"
10025-100250270 = "Sensei. Agora há pouco, na frente da Baikaen, você não estava arrumando alguma coisa...?"
10025-100250280 = "Tinha alguma coisa estranha?"
10025-100250290 = "Tinha uma espécie de tenda feita com um pano e uma cadeira, e eu achei perigoso. Só movi um pouco para o lado."
10025-100250300 = "Ah, deve ser o esconderijo secreto."
10025-100250310 = "Esconderijo secreto?"
10025-100250320 = "Sim. As crianças gostam de ter um espaço só delas, não é?"
10025-100250330 = "Às vezes, elas criam esses espaços secretos escondido de nós."
10025-100250340 = "Entendi. Você também construiu um quando era criança, Shun?"
10025-100250350 = "Sim, exatamente por volta desta idade."
10025-100250360 = "Falando nisso, já faz muito tempo desde a última vez que fui nesse esconderijo secreto..."
10025-100250370 = "Sensei. Se tiver um tempo, você poderia vir para a Baikaen agora?"
10025-100250380 = "...Se quiser saber o meu segredo, claro.♡"
10025-100250390 = "Uma das grandes diferenças entre quando eu era criança e agora"
10025-100250400 = "é o penteado, eu acho."
10025-100250410 = "Por que você acha isso?"
10025-100250420 = "Quando se é criança, você pode usar qualquer penteado, mas"
10025-100250430 = "quando você cresce... muitas coisas deixam de combinar."
10025-100250440 = "Acho que qualquer penteado combina com você, Shun."
10025-100250450 = "Ehehe. Fico feliz só de ouvir isso. Muito obrigada, Sensei."
