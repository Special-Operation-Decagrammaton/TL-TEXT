[translation]
10025-100250010 = "先生、実は、また副作用が出てしまったみたいで……"
10025-100250020 = "この姿はやはり目線も低いですし、"
10025-100250030 = "手足も軽いですし、何だか色々と変な感じですね"
10025-100250040 = "解毒剤が効くまで、あんまり外に出ない方が良いかもね"
10025-100250050 = "……いえ、この機を逃すわけにはいきません。先生、スイーツを食べに行きましょう！"
10025-100250060 = "子供になったら、ぜひ食べてみたいものがあったんです！"
10025-100250070 = "……？"
10025-100250080 = "まさか身体が小さくなると同時に、味覚まで変わっていたなんて……"
10025-100250090 = "このままの姿では、梅花園の子たちに「好き嫌いはダメ」とは言えませんね"
10025-100250100 = "少しずつ色んなものを食べて、私も苦手なものを克服しないとです"
10025-100250110 = "まずは順番に、ラムレーズンのラムから……"
10025-100250120 = "それはダメ！"
10025-100250130 = "……先生。今、お忙しいですか？"
10025-100250140 = "どうしたの？"
10025-100250150 = "その、梅花園で色々と整理整頓をしていたら、少々事故が起きてしまったと言いますか……"
10025-100250160 = "ちょっと今、動けない状態に……"
10025-100250170 = "待ってて、すぐ行くね"
10025-100250180 = "先生、聞きましたか？"
10025-100250190 = "今度キヴォトスの中央区に「プレイランド」と呼ばれる、大きな室内型の遊び場がオープンするそうです！"
10025-100250200 = "梅花園の子たちがみんな行きたいと言っているので、実際に行く前に一度安全性などを確認しに行こうかと思ってまして"
10025-100250210 = "もしよろしければ今度の週末、一緒に行きませんか？"
10025-100250220 = "うん、私で良ければ喜んで"
10025-100250230 = "あ、でも、シュンは今の身体で外に出ても大丈夫？"
10025-100250240 = "はい、大丈夫です！"
10025-100250250 = "いえ、むしろ今がピッタリのタイミングなんです"
10025-100250260 = "子どもたちの目線で確認できる機会なんて、めったにありませんので！"
10025-100250270 = "先生。先ほど梅花園の前で、何かを片付けてませんでしたか……？"
10025-100250280 = "何か変な物でもありました？"
10025-100250290 = "何か布と椅子でテントみたいなのが作られてて、危ないなって思って。少しだけ横にね"
10025-100250300 = "ああ、きっと秘密基地ですね"
10025-100250310 = "秘密基地？"
10025-100250320 = "はい。子どもたちってそういう、自分たちだけの空間を欲しがるじゃないですか？"
10025-100250330 = "たまに私たちの目を盗んで、そういう秘密のスペースを作ったりしがちなんです"
10025-100250340 = "なるほどね。シュンも子どもの時に、作ったりしたの？"
10025-100250350 = "はい、正にこのくらいの歳の頃に"
10025-100250360 = "そういえば、最後にその秘密基地に行ったのも、だいぶ前のことですね……"
10025-100250370 = "先生。お時間があれば、これから梅花園に来ていただけませんか？"
10025-100250380 = "……もし私の秘密が知りたければ、ですが♡"
10025-100250390 = "幼い時と今の自分の大きな違いの一つは"
10025-100250400 = "髪型だと思います"
10025-100250410 = "どうしてそう思ったの？"
10025-100250420 = "幼い頃はどんな髪型もできますが"
10025-100250430 = "大きくなったら……似合わないものが多くなってしまうのです"
10025-100250440 = "シュンはどんな髪型でも似合うと思うよ"
10025-100250450 = "えへへ。お言葉だけでも嬉しいです。ありがとうございます、先生"
