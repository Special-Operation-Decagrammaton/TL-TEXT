[translation]
10017-100170010 = "Rejubile-se, camarada!"
10017-100170020 = "Para honrar todos os seus esforços até agora, camarada,"
10017-100170030 = "nossa Academia da Federação Red Winter decidiu conceder a você uma nova medalha,"
10017-100170040 = "a 'Medalha da Amizade Especial'!"
10017-100170050 = "Hã... Medalha da Amizade Especial? A gente já não ganhou uma dessas da outra vez?"
10017-100170060 = "Do que você está falando? A medalha que concedemos da outra vez foi a 'Medalha do Companheirismo Especial'."
10017-100170070 = "Confundir os tipos de medalha é um ultraje."
10017-100170080 = "Existem tantos tipos de medalhas assim..."
10017-100170090 = "Em Red Winter, para homenagear aqueles que contribuíram grandemente para o desenvolvimento da academia,"
10017-100170100 = "existem um total de 247 tipos de medalhas."
10017-100170110 = "É um número impressionante. Cherino, quantas medalhas você tem?"
10017-100170120 = "Fufu, que pergunta tola, camarada."
10017-100170130 = "...As 247, todas elas!"
10017-100170140 = "Olhe, camarada. Este é o design da nova medalha, que eu mesma finalizei depois!"
10017-100170160 = "Fufu, só pelo design já dá para ver que ela brilha intensamente, não é?"
10017-100170170 = "Acho que ficou ótimo!"
10017-100170180 = "...Você se esforçou bastante!"
10017-100170190 = "Fufu, pode me elogiar mais!"
10017-100170200 = "Talvez eu até tenha talento para ser designer...!"
10017-100170210 = "Ugh..."
10017-100170220 = "Ei, camarada, tem alguma comida que você não gosta?"
10017-100170230 = "Por que a pergunta tão de repente?"
10017-100170240 = "Eu odeio pimentão. É amargo e tem um gosto estranho!"
10017-100170250 = "Argh... Aquele gosto horrível é tão ruim que poderia ser chamado de comida do diabo."
10017-100170260 = "Ser seletiva com a comida não faz bem para a saúde, sabia?"
10017-100170270 = "Não é ser seletiva! Não conseguir comer pimentão é algo natural para um ser humano!"
10017-100170280 = "Por que ninguém consegue entender uma verdade tão simples...?"
10017-100170290 = "Fufufu, camarada."
10017-100170300 = "Você não se esqueceu daquela promessa de me comprar pudim, não é?"
10017-100170310 = "Claro que eu me lembro."
10017-100170320 = "Como esperado do camarada. Você não é o tipo de adulto que faz promessas da boca para fora."
10017-100170330 = "E já que é você quem vai pagar, camarada, para poder comer bastante, acredite se quiser..."
10017-100170340 = "eu até pulei o lanche da tarde hoje! Fufu, mal posso esperar...!"
10017-100170350 = "Estarei esperando na frente da loja hoje depois da aula, então não se atrase!"
10017-100170360 = "Acho que eu não disse que compraria muitos...?"
10017-100170370 = "Camarada, olhe lá fora!"
10017-100170380 = "É neve, está nevando muito!"
10017-100170390 = "Aqui na Schale o céu está limpo, sem uma nuvem sequer..."
10017-100170400 = "O quê!? Então venha para a nossa Academia da Federação Red Winter agora mesmo!"
10017-100170410 = "Se você vier aqui, poderá fazer quantos bonecos e coelhos de neve quiser!"
10017-100170420 = "Eu vou quando terminar o trabalho."
10017-100170430 = "De jeito nenhum! Não sabemos quando a neve vai parar, não temos tempo a perder!"
10017-100170440 = "Agora! Venha agora mesmo!"
10017-100170450 = "Camarada, você não tem medo de nada?"
10017-100170460 = "Hmm, talvez de fantasmas..."
10017-100170470 = "Tenho medo de pãezinhos doces."
10017-100170480 = "Hmph. Ter medo de fantasmas... até você tem um lado infantil, camarada."
10017-100170490 = "Não se preocupe, camarada. Mesmo que um fantasma apareça, eu acabo com ele!"
10017-100170500 = "Manjū? Aquele pãozinho doce? Como assim você tem medo daquilo?"
10017-100170510 = "Às vezes você diz umas coisas que eu não entendo, camarada..."
10017-100170520 = "Cherino, você tem medo de alguma coisa?"
10017-100170530 = "E-eu ter medo de alguma coisa? Claro que não!"
10017-100170540 = "Para uma grande líder, o medo é uma emoção desnecessária!"
10017-100170550 = "Eu, a presidente do conselho estudantil da Academia da Federação Red Winter, Secretária-Geral, chefe do Comitê de Embelezamento Ambiental e chefe do Clube de Limpeza, não tenho nada a temer!"
