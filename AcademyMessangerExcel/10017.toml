[translation]
10017-100170010 = "喜べ、カムラッド！"
10017-100170020 = "カムラッドのこれまでの努力を称えて"
10017-100170030 = "我がレッドウィンター連邦学園からカムラッドに新たな勲章"
10017-100170040 = "「特別友好章」を授与することにしたのだ！"
10017-100170050 = "あれ……特別友好章って、この前も貰わなかったっけ？"
10017-100170060 = "何を言っている、この前授与した勲章は「特別友情章」だ"
10017-100170070 = "勲章の種類を間違えるとはけしからん"
10017-100170080 = "勲章ってそんなに色々あるんだ……"
10017-100170090 = "レッドウィンターでは、学園の発展に大きく貢献した者を表彰するために、"
10017-100170100 = "計247種類の勲章が存在する"
10017-100170110 = "すごい数だね。チェリノはいくつの勲章を持ってるの？"
10017-100170120 = "ふふ、バカげた質問だな。カムラッド"
10017-100170130 = "……247種、全部だ！"
10017-100170140 = "見ろカムラッド。あの後おいらの手で仕上げた、新しい勲章のデザインだ！"
10017-100170160 = "ふふ、デザインからしてすでに光り輝いているだろう？"
10017-100170170 = "良いと思う！"
10017-100170180 = "……頑張ったね！"
10017-100170190 = "ふふっ、もっと褒めても良いぞ！"
10017-100170200 = "もしかしたらおいらには、デザイナーの素質まであるのかもしれない……！"
10017-100170210 = "うぅ……"
10017-100170220 = "なあ、カムラッドには何か苦手な食べ物とかあるのか？"
10017-100170230 = "急にどうしたの？"
10017-100170240 = "おいらはピーマンが嫌いだ。苦くて、変な味がする！"
10017-100170250 = "くぅっ……あのひどい味は、悪魔の食べ物と呼んでも良いぐらいだ"
10017-100170260 = "好き嫌いは身体に良くないよ？"
10017-100170270 = "好き嫌いじゃない！ピーマンが食べられないのは、人として当然のことだ！"
10017-100170280 = "こんな簡単な真理を、なぜ皆理解できないのか……"
10017-100170290 = "ふふふ、カムラッド"
10017-100170300 = "この前の、プリンを買ってくれるという約束は忘れていないだろうな？"
10017-100170310 = "もちろん、覚えてるよ"
10017-100170320 = "流石はカムラッド、口だけの約束をするような大人ではないということだな"
10017-100170330 = "せっかくカムラッドに奢ってもらうのだし、たくさん食べるために何と"
10017-100170340 = "今日はお昼のおやつも抜いたのだ！ふふ、楽しみだな……！"
10017-100170350 = "今日の放課後、お店の前で待っているから遅れないように！"
10017-100170360 = "たくさん買ってあげるとは、言ってないような……？"
10017-100170370 = "カムラッド、外を見ろ！"
10017-100170380 = "雪だ、雪がすごい降っているぞ！"
10017-100170390 = "シャーレの方は、雲一つない晴天だよ……"
10017-100170400 = "なにっ！？それなら、今すぐ我がレッドウィンター連邦学園に来い！"
10017-100170410 = "ここに来れば雪だるまも雪ウサギも、好きなだけ作れるぞ！"
10017-100170420 = "仕事が終わったら行くね"
10017-100170430 = "ダメだ！いつ雪が止んでしまうかも分からないのに、そんな余裕はない！"
10017-100170440 = "今すぐ！今すぐ来るのだ！"
10017-100170450 = "カムラッドは、何か怖い物とかないのか？"
10017-100170460 = "うーん、お化けとかかな……"
10017-100170470 = "まんじゅうこわい"
10017-100170480 = "ふふん。お化けが怖いなんて、カムラッドにも子供みたいなところがあるのだな"
10017-100170490 = "心配するな、カムラッド。仮にお化けが現れたとしても、おいらがやっつけてやる！"
10017-100170500 = "まんじゅうって、あの甘いお饅頭か？あれが怖いなんて、どういうことだ？"
10017-100170510 = "カムラッドは時々よく分からないことを言うな……"
10017-100170520 = "チェリノは怖いものとかある？"
10017-100170530 = "お、おいらに怖いものなんてあるわけないだろう！"
10017-100170540 = "偉大なる指導者にとって、恐怖など必要の無い感情だ！"
10017-100170550 = "レッドウィンター連邦学園の生徒会長であり、書記長兼、環境美化部部長兼、清掃部部長のおいらに、恐れるものなど無い！"
