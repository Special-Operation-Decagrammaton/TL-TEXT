[translation]
16001-2052 = "Mestre! Você tem um tempinho agora?"
16001-2053 = "Que tal irmos a um café?"
16001-2054 = "Mestre...?"
16001-2055 = "Um café, de repente?"
16001-2056 = "Hm? Tem algo de errado?"
16001-2057 = "Eu sou uma empregada, então você é o meu mestre!"
16001-2058 = "Não se preocupe com detalhes, não se preocupe!"
16001-2059 = "Sim! Um café!"
16001-2060 = "Tem um café que eu estava curiosa para conhecer, vamos lá!"
16001-2061 = "Então, vou ficar te esperando na frente da loja!"
16001-2062 = "Até mais tarde!"
16001-2063 = "Obrigada por hoje, Mestre!"
16001-2064 = "Conseguimos completar a missão, foi um ótimo dia!"
16001-2065 = "Será que foi porque você estava comigo, Mestre?"
16001-2066 = "Então, entrarei em contato de novo, Mestre!"
16001-2067 = "Socorro, Mestre!!"
16001-2068 = "Preciso da ajuda do Mestre!"
16001-2069 = "Talvez! Com certeza! Provavelmente!"
16001-2070 = "É mais ou menos assim, então você pode vir me ajudar?"
16001-2071 = "Você vem, né? Né?"
16001-2072 = "Precisa da minha ajuda...?"
16001-2073 = "Como sempre, você é bem repentina."
16001-2074 = "Sim!"
16001-2075 = "Você vai vir? Obrigada!"
16001-2076 = "Então estou te esperando!"
16001-2077 = "Hoje foi o melhor dia de todos!!"
16001-2078 = "Muito obrigada mesmo, Mestre!"
16001-2079 = "Eu sabia que entrar em contato com você, Mestre, seria a escolha certa."
16001-2080 = "Quando estou com você, Mestre, só acontecem coisas boas!"
16001-2081 = "Até mais!"
16001-2082 = "A Asuna vai rezar para que amanhã também seja um ótimo dia para você!"
16001-2083 = "Mestre! Você tem tempo agora?"
16001-2084 = "Como forma de agradecimento por tudo até agora,"
16001-2085 = "eu queria fazer algo por você, Mestre!"
16001-2086 = "Agradecimento? Para mim?"
16001-2087 = "Será que eu fiz algo que mereça isso...?"
16001-2088 = "Sim!"
16001-2089 = "Aconteceram várias coisas, não é?"
16001-2090 = "Não é sempre que você tem a chance de receber os serviços da Asuna, sabia!"
16001-2091 = "De qualquer forma, estou indo aí!"
16001-2092 = "Me espere, Mestre!"
16001-2093 = "Hm..."
16001-2094 = "Hm~~~~~~!!"
16001-2095 = "Sinto que não estou satisfeita! Ainda falta alguma coisa!"
16001-2096 = "Da próxima vez, me chame de novo! Mestre!"
16001-2097 = "É uma promessa, hein!"
16001-2098 = "Prometido!"
16001-2099 = "Ah, a entrega estava deliciosa."
16001-2100 = "Vamos comer juntos de novo!!"
16001-160010010 = "Que problema!"
16001-160010020 = "É uma emergência, Mestre! Me ajude agora mesmo!"
16001-160010030 = "……！？"
16001-160010040 = "O-o que aconteceu……?"
16001-160010050 = "……？"
16001-160010060 = "Hã?"
16001-160010070 = "O que deu em mim agora pouco?"
16001-160010080 = "……？ Hã?"
16001-160010090 = "O-o que você quer dizer com isso……?"
16001-160010100 = "Ah"
16001-160010110 = "Sim"
16001-160010120 = "Isso! É exatamente assim!"
16001-160010130 = "Desta vez é sério, eu realmente preciso"
16001-160010140 = "de ajuda"
16001-160010150 = "？"
16001-160010160 = "Ué? O que houve, Mestre?"
16001-160010170 = "Aconteceu alguma coisa?"
16001-160010180 = "Cheguei!"
16001-160010190 = "Você conseguiu voltar para o Schale em segurança, Mestre?"
16001-160010200 = "Graças a você eu fui salva hoje, mas, como posso dizer, me desculpe."
16001-160010210 = "Não se preocupe, eu sou o professor da Asuna, afinal."
16001-160010220 = "Bem, é... fico feliz que você não esteja bravo……"
16001-160010230 = "Mas, por que será que melhorou de repente?"
16001-160010240 = "Hmm, pensando bem, naquela hora……"
16001-160010250 = "Bem, de qualquer forma, é um fato que fui salva graças a você, Mestre!"
16001-160010260 = "Como uma empregada, preciso retribuir com muitos serviços!"
16001-160010270 = "Até mais, Mestre!"
16001-160010280 = "Mais uma vez, muito obrigada por hoje!"
16001-160010290 = "Mestre!"
16001-160010300 = "Você tem um tempinho agora?"
16001-160010310 = "Preciso que você me ajude com uma coisinha!"
16001-160010320 = "Estou livre agora. O que aconteceu?"
16001-160010330 = "Para onde devo ir?"
16001-160010340 = "Que bom!"
16001-160010350 = "Obrigada!"
16001-160010360 = "Vou te enviar a localização!"
