[translation]
16001-2052 = "ご主人様ー！今って時間ある？"
16001-2053 = "カフェでも行かない？"
16001-2054 = "ご主人様……？"
16001-2055 = "いきなりカフェ？"
16001-2056 = "ん？何か変？"
16001-2057 = "私はメイドなんだから、ご主人様でしょ！"
16001-2058 = "細かいことは気にしない気にしない！"
16001-2059 = "うん！カフェ！"
16001-2060 = "気になってたカフェがあるの、行こ！"
16001-2061 = "じゃあお店の前で待ってるから！"
16001-2062 = "また後でねー！"
16001-2063 = "今日はありがとねーご主人様！"
16001-2064 = "任務も達成できたし、良い日だったー！"
16001-2065 = "これもご主人様がいてくれたからかな？"
16001-2066 = "じゃあまた連絡するね、ご主人様！"
16001-2067 = "助けてご主人様ー！！"
16001-2068 = "ご主人様の助けが必要なの！"
16001-2069 = "多分！きっと！おそらく！"
16001-2070 = "そんな感じだから、助けに来てくれる？"
16001-2071 = "来てくれるよね？ね？"
16001-2072 = "私の助けが必要……？"
16001-2073 = "いつも通り突然だね"
16001-2074 = "うん！"
16001-2075 = "来てくれるの？ありがとー！"
16001-2076 = "じゃあ待ってるね！"
16001-2077 = "今日は最高の一日だった！！"
16001-2078 = "本当にありがとね、ご主人様！"
16001-2079 = "やっぱりご主人様に連絡して正解だったよー"
16001-2080 = "ご主人様と一緒にいると、良いことばっかり！"
16001-2081 = "じゃあまた！"
16001-2082 = "明日も良い一日になるように、アスナが祈ってるからね！"
16001-2083 = "ご主人様ー！今時間ある？"
16001-2084 = "今までのお礼に、"
16001-2085 = "ご主人様にお礼をしたいなって！"
16001-2086 = "お礼？私に？"
16001-2087 = "私、何かしてあげられたっけ……？"
16001-2088 = "うん！"
16001-2089 = "色々あったじゃん！"
16001-2090 = "アスナのご奉仕を受けられる機会なんてめったにないんだからね！"
16001-2091 = "とにかく後で行くから！"
16001-2092 = "待っててね、ご主人様！"
16001-2093 = "んー……"
16001-2094 = "ん～～～～～！！"
16001-2095 = "なんかすっきりしない～！！まだ何か残ってる！"
16001-2096 = "今度またお願いね！ご主人様！"
16001-2097 = "絶対だからね！"
16001-2098 = "絶対！"
16001-2099 = "あ、デリバリー美味しかったね"
16001-2100 = "また一緒に食べよ！！"
16001-160010010 = "大変！"
16001-160010020 = "大変だよご主人様！今すぐ助けて！"
16001-160010030 = "……！？"
16001-160010040 = "ど、どうしたの……？"
16001-160010050 = "……？"
16001-160010060 = "え？"
16001-160010070 = "今の私、どうしたんだろ？"
16001-160010080 = "……？え？"
16001-160010090 = "ど、どういうこと……？"
16001-160010100 = "あ"
16001-160010110 = "うん"
16001-160010120 = "そう！そんな感じ！"
16001-160010130 = "今回は本当だよ、本当に助けが"
16001-160010140 = "必要"
16001-160010150 = "？"
16001-160010160 = "あれ？どうしたの、ご主人様？"
16001-160010170 = "何かあった？"
16001-160010180 = "とうちゃーく！"
16001-160010190 = "ご主人様はちゃんとシャーレまで戻れた？"
16001-160010200 = "今日はおかげで助かったけど、なんて言うか、ごめんね"
16001-160010210 = "気にしないで、私はアスナの先生だから"
16001-160010220 = "まあ、その、怒ってないなら良かった……"
16001-160010230 = "でも、どうして急に治ったんだろうね？"
16001-160010240 = "うーん、そういえばあの時……"
16001-160010250 = "まあ、とりあえずご主人様のおかげで助かったことは確かだね！"
16001-160010260 = "メイドさんとして、そのお礼のご奉仕をたくさんしないと！"
16001-160010270 = "じゃあまたね、ご主人様！"
16001-160010280 = "あらためて、今日は本当にありがとう！"
16001-160010290 = "ご主人様！"
16001-160010300 = "いま時間あったりする？"
16001-160010310 = "ちょーっと助けてほしくて！"
16001-160010320 = "ちょうど手が空いたところだよ。どうしたの？"
16001-160010330 = "どこに行けば良い？"
16001-160010340 = "よかった！"
16001-160010350 = "ありがとうー！"
16001-160010360 = "場所送るね！"
