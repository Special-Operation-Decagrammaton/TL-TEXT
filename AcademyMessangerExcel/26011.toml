[translation]
26011-260110010 = "先生"
26011-260110020 = "先生！"
26011-260110030 = "ここって本当にすごいですね！"
26011-260110040 = "佐天？"
26011-260110050 = "何か見つけたの？"
26011-260110060 = "あ"
26011-260110070 = "急にすみません！"
26011-260110080 = "とりあえず、こっちに来てもらってもいいですか？"
26011-260110090 = "うーん"
26011-260110100 = "おかしいですね"
26011-260110110 = "あれだけ探し回ったのに……"
26011-260110120 = "諦めるのは、まだ早いんじゃなかった？"
26011-260110130 = "簡単に見つかるようなら「伝説」じゃないからね"
26011-260110140 = "たしかに……"
26011-260110150 = "こんなところで諦めるわけにはいきません！"
26011-260110160 = "じゃあ、何か見つかったらまた連絡しますね！"
26011-260110170 = "先生"
26011-260110180 = "聞いてください！"
26011-260110190 = "ひとつ分かったことがあるんです！"
26011-260110200 = "佐天……？"
26011-260110210 = "何が分かったの？"
26011-260110220 = "もしよければ"
26011-260110230 = "今から会えませんか？"
26011-260110240 = "ん～"
26011-260110250 = "やっぱり、もう少し打ちたかったです"
26011-260110260 = "ちょっと物足りません……"
26011-260110270 = "夢中になってたもんね"
26011-260110280 = "すでに勝負はついてたと思うよ……"
26011-260110290 = "あれ"
26011-260110300 = "そうですか？"
26011-260110310 = "うーん……"
26011-260110320 = "だったら、まあ……良しとしますか"
26011-260110330 = "先生"
26011-260110340 = "息抜きをしようと思ってたら"
26011-260110350 = "ちょうど良い場所を見つけたんです"
26011-260110360 = "よかったら、一緒にどうですか？"
26011-260110370 = "もちろんだよ"
26011-260110380 = "何か面白いものでも見つかった？"
26011-260110390 = "ふふっ"
26011-260110400 = "それがですね……"
26011-260110410 = "ふう！"
26011-260110420 = "スッキリしました！"
26011-260110430 = "あたし、何事もやってみないと気が済まないんですよね"
26011-260110440 = "正直、驚いたよ"
26011-260110450 = "もしかして、野球の選手だったの？"
26011-260110460 = "えーと"
26011-260110470 = "そうじゃないんですけど……"
26011-260110480 = "うーん、説明すると長くなりそうだなぁ"
26011-260110490 = "そうだ……"
26011-260110500 = "へへっ"
26011-260110510 = "バットと仲良し、みたいな感じです！"
26011-260110520 = "やっぱり"
26011-260110530 = "思ったようにはいかないですね"
26011-260110540 = "でもまあ"
26011-260110550 = "予想はしてましたけど！"
26011-260110560 = "何かあったの？"
26011-260110570 = "……佐天？"
26011-260110580 = "あ～"
26011-260110590 = "えっと……"
26011-260110600 = "やっぱり"
26011-260110610 = "大したことじゃないです！"
26011-260110620 = "ふ～っ！"
26011-260110630 = "楽しかったぁ～！"
26011-260110640 = "あたし、最初より上達したと思いませんか？"
26011-260110650 = "後半は集弾率も良くなりましたし、手応えを掴みました！"
26011-260110660 = "バッティングも、きっと努力したんだろうね"
26011-260110670 = "継続も才能のひとつだよ"
26011-260110680 = "またまた～"
26011-260110690 = "先生みたいなことを"
26011-260110700 = "って"
26011-260110710 = "そういえば、先生でしたね！"
26011-260110720 = "あははっ"
26011-260110730 = "ありがとうございます、先生！！"
