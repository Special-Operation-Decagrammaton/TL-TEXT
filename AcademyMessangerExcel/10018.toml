[translation]
10018-100180010 = "Sensei, onde você passa o tempo quando está descansando?"
10018-100180020 = "Geralmente No Schale, eu acho."
10018-100180030 = "Geralmente no banheiro, eu acho."
10018-100180040 = "É verdade, a Schale tem muitos espaços que são perfeitos para descansar, não é?"
10018-100180050 = "I-Isso... Mas, acho que entendo um pouco. Não é uma má ideia, né?"
10018-100180060 = "Eu... gosto de lugares escuros, na sombra, por onde ninguém passa."
10018-100180070 = "Um espaço relaxante só para mim, onde ninguém pode me incomodar..."
10018-100180080 = "Em um lugar assim, parece que eu poderia ficar para sempre."
10018-100180090 = "Sensei, da próxima vez, se você pudesse procurar outro armário..."
10018-100180100 = "O do Clube de Desenvolvimento de Jogos é o meu armário pessoal, então..."
10018-100180110 = "Não podemos usar juntos?"
10018-100180120 = "M-Mesmo que você diga isso, nós dois não cabemos lá dentro e..."
10018-100180130 = "O que não pode, não pode."
10018-100180140 = "Sensei, de que tipo de jogos você gosta?"
10018-100180150 = "Gosto de jogos de console, eu acho."
10018-100180160 = "Gosto de jogos de arcade, eu acho."
10018-100180170 = "Ah, entendi. Eu... gosto da maioria dos jogos."
10018-100180180 = "Mas, jogos online e outros que preciso jogar com outras pessoas são um pouco..."
10018-100180190 = "Eu acabo sentindo uma certa pressão... então não jogo muito."
10018-100180200 = "Ah, mas eu jogo bastante jogos de luta."
10018-100180210 = "Sério?"
10018-100180220 = "Sim, eu não sou tão ruim nesse tipo de jogo."
10018-100180230 = "Parece que a minha desenvolvedora de jogos favorita vai lançar um novo jogo de luta em breve, estou ansiosa."
10018-100180240 = "Yuzu e jogos de luta... que combinação inesperada."
10018-100180250 = "V-Você acha...?"
10018-100180260 = "Para desenvolver jogos, é preciso de muito dinheiro, não é...?"
10018-100180270 = "No desenvolvimento anterior, não tínhamos dinheiro suficiente para manter o servidor,"
10018-100180280 = "a ponto de perdermos os dados no meio do processo..."
10018-100180290 = "(ﾟﾛﾟ;) Que terrível... O que aconteceu no final?"
10018-100180300 = "Felizmente, tínhamos um backup e conseguimos restaurar tudo, mas..."
10018-100180310 = "Quatro dias de trabalho foram por água abaixo..."
10018-100180320 = "O desenvolvimento de jogos é um mundo bem difícil, né...?"
10018-100180330 = "Sim..."
10018-100180340 = "No desenvolvimento do próximo jogo, para não cometermos o mesmo erro,"
10018-100180350 = "precisamos juntar os fundos de desenvolvimento com antecedência."
10018-100180360 = "No meu último trabalho de meio período, eu acabei fazendo um monte de besteira..."
10018-100180370 = "Eu travei várias vezes na frente dos clientes e cometi um erro atrás do outro..."
10018-100180380 = "O gerente disse que estava tudo bem, mas..."
10018-100180390 = "Então, que tal tentar um trabalho de meio período diferente da próxima vez?"
10018-100180400 = "Eh? Outro trabalho de meio período...?"
10018-100180410 = "I-Impossível! Eu mal consegui dar conta do trabalho na loja de conveniência..."
10018-100180420 = "Tudo bem. O próximo trabalho é um que você pode fazer sem ter que olhar diretamente no rosto das pessoas."
10018-100180430 = "Eh, existe um trabalho de meio período assim...?"
10018-100180440 = "Nesse caso, talvez eu consiga..."
10018-100180450 = "Sensei, eu recebi o meu salário do trabalho de meio período deste mês!"
10018-100180460 = "Veio mais do que eu esperava, então com o dinheiro que sobrou eu consegui comprar presentes para todo mundo do clube."
10018-100180470 = "('‿') Que bom, bom trabalho!"
10018-100180480 = "Então, uhm... Se não for incômodo, você poderia vir àquele parque de diversões neste fim de semana?"
10018-100180490 = "No parque de diversões?"
10018-100180500 = "É que... eu tenho um presente que gostaria de te dar, Sensei."
10018-100180510 = "Só a intenção já basta."
10018-100180520 = "Não, é que, junto com o Sensei..."
10018-100180530 = "Não é isso, quer dizer, isso também, mas, uhm..."
10018-100180540 = "Eu realmente quero te dar um presente, Sensei!"
10018-100180550 = "Então, por favor, venha ao parque de diversões neste fim de semana! Por favor!"
10018-100180570 = "O passe livre... não imaginei que ele voltaria para mim tão rápido."
10018-100180580 = "O que vai me pedir... já decidiu?"
10018-100180590 = "Quando vier para a Schale, pode trazer pão e leite?"
10018-100180600 = "Eu disse que faria qualquer coisa, mas por favor, não use um passe livre tão precioso para isso...!"
10018-100180610 = "Se fosse só isso, era só ter me pedido normalmente que eu compraria!"
10018-100180620 = "As coisas que a gente perde,"
10018-100180630 = "depois de procurar por toda parte,"
10018-100180640 = "acabam estando em lugares inesperados, né...?"
10018-100180650 = "Eu sei como é!"
10018-100180660 = "Tipo o controle remoto..."
10018-100180670 = "Na verdade,"
10018-100180680 = "a gente só esqueceu onde colocou,"
10018-100180690 = "eu acho..."
10018-100180700 = "Mas talvez seja porque todo mundo passa pela mesma experiência,"
10018-100180710 = "que as pessoas de antigamente, numa hora dessas,"
10018-100180720 = "diziam que uma \"fadinha travessa\""
10018-100180730 = "...tinha roubado o objeto,"
10018-100180740 = "pelo menos é o que pensavam."
10018-100180750 = "Que história interessante."
10018-100180760 = "Será que..."
10018-100180770 = "Você perdeu alguma coisa?"
10018-100180780 = "N-Não."
10018-100180790 = "Não esqueci de nada."
10018-100180800 = "...Acho."
