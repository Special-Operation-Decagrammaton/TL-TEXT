[translation]
10018-100180010 = "先生は休憩する時、どこで過ごされますか？"
10018-100180020 = "だいたいシャーレかな"
10018-100180030 = "だいたいトイレかな"
10018-100180040 = "確かに、シャーレは休むのにちょうど良い空間が多いですよね"
10018-100180050 = "そ、それは……でも、ちょっと分かるかもです。悪くないですよね"
10018-100180060 = "わたしは……人が通らなくて、日陰になっている、暗いところが好きです"
10018-100180070 = "誰にも邪魔されない、わたしだけの癒しの空間……"
10018-100180080 = "そういうところなら、いつまででもいられそうで"
10018-100180090 = "先生、今度は他のロッカーを探しておいていただけると……"
10018-100180100 = "ゲーム開発部のは、わたし専用のロッカーなので……"
10018-100180110 = "一緒に使うのはダメ？"
10018-100180120 = "そ、そう仰られましても二人では入れませんし……"
10018-100180130 = "ダメなものはダメ、です"
10018-100180140 = "先生は、どんな種類のゲームがお好きですか？"
10018-100180150 = "コンシューマーゲームが好きかな"
10018-100180160 = "アーケードゲームが好きかな"
10018-100180170 = "あ、そうなんですね。わたしは……ゲームでしたら大抵のものは好きです"
10018-100180180 = "ただ、他の人たちとプレイをしなくちゃいけない、オンラインゲームなどはちょっと……"
10018-100180190 = "なんだかプレッシャーを感じてしまって……あまりやりません"
10018-100180200 = "あ、でも、対戦型格闘ゲームはよくやります"
10018-100180210 = "そうなんだ？"
10018-100180220 = "はい、ああいうタイプのゲームは、それほど苦手ではなくて"
10018-100180230 = "今度、わたしが好きなゲーム会社から新しい対戦格闘ゲームが出るそうで、楽しみです"
10018-100180240 = "ユズと格ゲーって、なんだか意外な組み合わせだね"
10018-100180250 = "そ、そうでしょうか……？"
10018-100180260 = "ゲームを開発するのって、すごくお金が必要なんですよね……"
10018-100180270 = "前回の開発ではサーバーを維持するお金が足りなくて、"
10018-100180280 = "途中でデータを飛ばしてしまったこともあったぐらいなので……"
10018-100180290 = "(ﾟﾛﾟ;) それは大変だ……最終的にどうなったの？"
10018-100180300 = "幸いにもバックアップのデータがあったのでなんとか復旧できましたが……"
10018-100180310 = "4日間分の作業が、水の泡になってしまいました……"
10018-100180320 = "ゲームの開発は、大変な世界なんだね……"
10018-100180330 = "はい……"
10018-100180340 = "次回作の開発の時は、同じミスを繰り返さないように、"
10018-100180350 = "前もって開発費を集めておかないとです"
10018-100180360 = "この前のアルバイトは、色々とやってしまいました……"
10018-100180370 = "お客様の前で何度も体が固まってしまって、ミスの連発でしたし……"
10018-100180380 = "店長さんからは大丈夫だと言っていただけましたが……"
10018-100180390 = "じゃあ、今度は別のアルバイトをしてみない？"
10018-100180400 = "え？別のアルバイトですか……？"
10018-100180410 = "む、無理です！この前のコンビニのアルバイトだって、何とかギリギリだったのに……"
10018-100180420 = "大丈夫。今度のアルバイトは、直接人の顔を見なくてもできるやつだから"
10018-100180430 = "え、そんなアルバイトが……"
10018-100180440 = "それなら、大丈夫かもしれません……"
10018-100180450 = "先生、今月分のアルバイトのお給料をいただきました！"
10018-100180460 = "思ったより金額があったので、余ったお金で部員のみんなへのプレゼントもできました"
10018-100180470 = "('‿') それは良かった、お疲れ様！"
10018-100180480 = "それで、えっと……もしよかったら今週末、あの遊園地に来てくれませんか？"
10018-100180490 = "遊園地に？"
10018-100180500 = "その……先生に、お渡ししたいプレゼントが、ありまして"
10018-100180510 = "気持ちだけで十分だよ"
10018-100180520 = "いえ、その、先生と一緒に……"
10018-100180530 = "じゃなくて、それもですが、えっと……"
10018-100180540 = "先生に、どうしてもプレゼントをお渡ししたいんです！"
10018-100180550 = "なので今週末、遊園地に来てください！お願いします！"
10018-100180570 = "フリーパス、こんなに早く手元に戻ってくるとは思いませんでした"
10018-100180580 = "お願いしたいこと……決まりましたか？"
10018-100180590 = "シャーレに来る時に、パンと牛乳を買ってきてくれない？"
10018-100180600 = "確かに何でもと言いましたが、そんなことにせっかくのフリーパスを使わないでください……！"
10018-100180610 = "これぐらいでしたら、普通に言っていただければ買ってきますから！"
10018-100180620 = "失くしたものって"
10018-100180630 = "探し回った結果"
10018-100180640 = "予想外の場所にあるんですよね……"
10018-100180650 = "分かるー！"
10018-100180660 = "リモコンとかね……"
10018-100180670 = "実際には"
10018-100180680 = "どこに置いたか忘れただけ"
10018-100180690 = "なんでしょうけど……"
10018-100180700 = "みんな同じ経験をしがちだからか"
10018-100180710 = "昔の方はこういう時"
10018-100180720 = "「いたずら好きな妖精さん」"
10018-100180730 = "……に盗まれてしまった、と"
10018-100180740 = "考えたそうです"
10018-100180750 = "面白い話だね"
10018-100180760 = "もしかして……"
10018-100180770 = "何か物でも失くしちゃった？"
10018-100180780 = "い、いえ"
10018-100180790 = "何も忘れてません"
10018-100180800 = "……多分"
