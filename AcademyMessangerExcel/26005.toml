[translation]
26005-1699 = "Professor, está livre? Está, né?"
26005-1700 = "Não é nada muito importante, mas tem uma coisa que eu queria te pedir."
26005-1701 = "Se estiver ocupado, tudo bem, não é nada demais."
26005-1702 = "Agora eu estou um pouco ocupado..."
26005-1703 = "Claro que estou livre, sou um desocupado mesmo."
26005-1704 = "...Entendi."
26005-1705 = "Sim, entendi. Desculpe por te atrapalhar."
26005-1706 = "Não, eu não quis dizer isso!"
26005-1707 = "Sério! Não foi nesse sentido que eu quis dizer!"
26005-1708 = "Mentira, é brincadeira."
26005-1709 = "Você de novo me provocando desse jeito!!!!"
26005-1710 = "Eu não vou te perdoar por isso..."
26005-1711 = "...Enfim, você tem tempo, né? Como punição por ter me provocado, você vai ter que me acompanhar."
26005-1712 = "Venha ao \"Café Mille-Feuille\"."
26005-1713 = "Não conte para as outras, viu?"
26005-1714 = "Da próxima vez eu pago, com certeza! Entro em contato de novo!"
26005-1715 = "Professor, tem um tempo agora?"
26005-1716 = "Não me venha dizer que esqueceu da nossa promessa. Você ainda me deve uma."
26005-1717 = "Já vou avisando que não tem direito de recusa. Você vai me acompanhar, né?"
26005-1718 = "...Ficou meio estranho escrito assim, mas..."
26005-1719 = "É no sentido de pagar o que me deve! Só isso!"
26005-1720 = "Para mim, seria muito bem-vindo em outros sentidos também."
26005-1721 = "Eu lembro muito bem. Tudo bem, entendido."
26005-1722 = "Pode parar com essas brincadeiras que fazem mal ao coração...?"
26005-1723 = "Então estou te esperando, não se atrase!"
26005-1724 = "Não diga mais nada."
26005-1725 = "Esqueça."
26005-1726 = "Apague tudo da sua memória."
26005-1727 = "Se falar sobre o assunto da bunda, eu juro que te mato."
26005-1728 = "Professor, tem um tempo agora?"
26005-1729 = "Não é nada importante, mas queria uma ajudinha sua."
26005-1730 = "Desta vez, vamos comer o quê?"
26005-1731 = "Por que você assume que é para comer?"
26005-1732 = "Você me acha o quê, uma porca? Acha que se eu abrir a boca é só para pedir comida?"
26005-1733 = "Não é isso! É outro pedido!"
26005-1734 = "...É algo sério, algo que eu só pediria para você, professor."
26005-1735 = "É brincadeira, para onde eu devo ir?"
26005-1736 = "..."
26005-1737 = "Você de novo fazendo isso..."
26005-1738 = "...Obrigada. O lugar é..."
26005-1739 = "Obrigada por hoje."
26005-1740 = "...Bem, continue contando comigo, professor."
26005-260050010 = "Não quero ir para a aula..."
26005-260050020 = "Ei, professor, não tem um jeito esperto de matar aula?"
26005-260050030 = "Bem..."
26005-260050040 = "Você está perguntando isso para mim, que sou professor!?"
26005-260050050 = "Eu sei, eu sei. É estranho perguntar isso para um professor."
26005-260050060 = "É que hoje é o dia do lançamento do novo item do \"Café Mille-Feuille\"..."
26005-260050070 = "Eles vão abrir durante a aula... O motivo é só esse. Não é nada demais, não se preocupe."
26005-260050080 = "Eu entendo como se sente, mas, por enquanto, a aula é prioridade."
26005-260050090 = "OK, pode deixar."
26005-260050100 = "Ugh, bem, suponho que sim..."
26005-260050110 = "……？"
26005-260050120 = "Você está entendendo o contexto...? Bem, tanto faz, não tem jeito. Eu vou assistir à aula, tá bom?"
26005-260050130 = "Então, se eu estiver com vontade, entro em contato de novo (￣︶￣*)"
26005-260050140 = "Ah, que delícia!"
26005-260050150 = "Os doces daquele lugar nunca decepcionam! Aquela textura que derrete na boca e o sabor agridoce...!"
26005-260050160 = "Professor, você também gosta desse tipo de coisa?"
26005-260050170 = "Ah"
26005-260050180 = "Não"
26005-260050190 = "Esquece, ignora o que eu disse, não fale nada."
26005-260050200 = "Não é isso, não é bem assim..."
26005-260050210 = "……"
26005-260050220 = "Hehe, se você não entende, tudo bem."
26005-260050230 = "Então, até mais, Professor."
26005-260050240 = "Falando nisso"
26005-260050250 = "Professor"
26005-260050260 = "Em qual café vamos?"
26005-260050270 = "Você encontrou algum lugar bom?"
26005-260050280 = "Ei, o quê?"
26005-260050290 = "Eu ainda não disse nada..."
26005-260050300 = "Não, bem, eu estou em um café, mas..."
26005-260050310 = "Sempre que você entra em contato, eu estou em um café."
26005-260050320 = "Pensei que desta vez seria igual."
26005-260050330 = "Bem, é verdade, mas..."
26005-260050340 = "De alguma forma, porém..."
26005-260050350 = "Não gosto que tirem conclusões precipitadas."
26005-260050360 = "Bem, deixa pra lá, eu te mando a localização depois, então venha."
26005-260050370 = "Hehe."
26005-260050380 = "Ah, meu Deus."
26005-260050390 = "Que estranho."
26005-260050400 = "E olha que a Yoshimi tinha comprado para mim..."
26005-260050410 = "Roubar algo que me deram, que monstro! Que demônio!!"
26005-260050420 = "Cala a boca."
26005-260050430 = "A culpa é toda sua, não é?"
26005-260050440 = "Haa..."
26005-260050450 = "Não tem jeito mesmo."
26005-260050460 = "Eu vou comprar outro para você."
26005-260050470 = "Da próxima vez, cuide bem, entendeu?"
26005-260050480 = "Professor♪"
