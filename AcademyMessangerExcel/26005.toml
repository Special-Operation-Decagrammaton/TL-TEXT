[translation]
26005-1699 = "先生、暇？暇だよね？"
26005-1700 = "そんなに大したことじゃないんだけど、頼みたいことがあって"
26005-1701 = "忙しいなら大丈夫、大したことじゃないから"
26005-1702 = "今、ちょっと忙しくって……"
26005-1703 = "もちろん平気だよ、暇人だから"
26005-1704 = "……そうだよね"
26005-1705 = "うん、分かった。邪魔してごめん"
26005-1706 = "いや、そこまでは言ってないから！"
26005-1707 = "本当に！そういう意味で言いたかったんじゃなくて！"
26005-1708 = "嘘、冗談だよ"
26005-1709 = "またそうやって私のことからかって！！！！"
26005-1710 = "もうほんと許さないんだから……"
26005-1711 = "……とにかく、時間あるのよね？からかった罰でちゃんと付き合いなさい"
26005-1712 = "「カフェ・ミルフィーユ」に来て"
26005-1713 = "他の子たちには内緒だからね"
26005-1714 = "次は絶対私が奢るから！また連絡する！"
26005-1715 = "先生、今時間ある？"
26005-1716 = "この前の約束、忘れたとは言わせないわよ。まだ借りが残ってるんだから"
26005-1717 = "先に言っとくけど、拒否権はないから。付き合ってくれるわよね？"
26005-1718 = "……なんだか文字にすると変な感じになっちゃったけど"
26005-1719 = "借りを返すって意味だから！それだけ！"
26005-1720 = "私としては他の意味でも大歓迎"
26005-1721 = "ちゃんと覚えてるよ。大丈夫、了解"
26005-1722 = "そういう心臓に悪い冗談止めてくれる……？"
26005-1723 = "じゃあ待ってるから、遅れるんじゃないわよ！"
26005-1724 = "もう何も言わないで"
26005-1725 = "忘れて"
26005-1726 = "全部記憶から消して"
26005-1727 = "お尻の話とかしたら本気で殺すから"
26005-1728 = "先生、今時間ある？"
26005-1729 = "大したことじゃないんだけど、ちょっと手伝ってほしくて"
26005-1730 = "今度は何を食べに行くの？"
26005-1731 = "なんで食べる前提なの？"
26005-1732 = "私のこと豚か何かだと思ってる？口を開いたらどうせ餌だろうって？"
26005-1733 = "違うから！別の頼み事！"
26005-1734 = "……ちゃんとした、先生だからこそお願いしたいことだから"
26005-1735 = "冗談だよ、どこに行けばいい？"
26005-1736 = "……"
26005-1737 = "またそうやって……"
26005-1738 = "……ありがと。場所は……"
26005-1739 = "今日はありがとう"
26005-1740 = "……その、これからもよろしく、先生"
26005-260050010 = "授業出たくない……"
26005-260050020 = "ねえ先生、何か上手い感じにサボる方法とか無いの？"
26005-260050030 = "えっと……"
26005-260050040 = "それ、一応先生である私に聞く！？"
26005-260050050 = "分かってる、私も分かってるから。先生にこういうこと聞くのはおかしいって"
26005-260050060 = "ただ、今日は「カフェ・ミルフィーユ」の新作が出る日で……"
26005-260050070 = "授業中にオープンしちゃうから……理由はただそれだけ。大したことじゃないから、気にしないで"
26005-260050080 = "気持ちは分かるけど、とりあえず授業優先かな"
26005-260050090 = "OK、任せて"
26005-260050100 = "うっ、まあそりゃそうよね……"
26005-260050110 = "……？"
26005-260050120 = "文脈理解してる……？まあいいや、仕方ない。ちゃんと授業には出るわよ"
26005-260050130 = "じゃあ、気が向いたらまた連絡するから(￣︶￣*)"
26005-260050140 = "あー美味しかった！"
26005-260050150 = "やっぱりあそこのスイーツは外れが無い！あのとろける食感と、甘酸っぱい味……！"
26005-260050160 = "先生もああいうの、好き？"
26005-260050170 = "あ"
26005-260050180 = "いや"
26005-260050190 = "違う、今のは無し、何も言わないで"
26005-260050200 = "こういうのはダメ、そうじゃなくて"
26005-260050210 = "……"
26005-260050220 = "ふふっ、分かんないなら良いよ"
26005-260050230 = "それじゃあまたね、先生"
26005-260050240 = "そういえば"
26005-260050250 = "先生"
26005-260050260 = "どこのカフェに行く？"
26005-260050270 = "良いところでも見つかった？"
26005-260050280 = "え、何？"
26005-260050290 = "まだ何も言ってないんだけど……"
26005-260050300 = "いや、まぁカフェにはいるけど"
26005-260050310 = "いつも連絡くれる時はカフェにいるし"
26005-260050320 = "今回もそうかなって"
26005-260050330 = "まぁそうだけど"
26005-260050340 = "なんか、でも……"
26005-260050350 = "決めつけられるのはイヤかも"
26005-260050360 = "まぁいいや、あとで送るから来てね"
26005-260050370 = "ふふっ"
26005-260050380 = "あーもう"
26005-260050390 = "おっかしい"
26005-260050400 = "せっかくヨシミが買ってくれたのに……"
26005-260050410 = "一度くれたものを奪うなんて、鬼！悪魔！！"
26005-260050420 = "うるさい"
26005-260050430 = "自業自得でしょ"
26005-260050440 = "はぁ……"
26005-260050450 = "仕方ないわね"
26005-260050460 = "また買ってくるわよ"
26005-260050470 = "次はちゃんと大事にしなさいよ？"
26005-260050480 = "先生♪"
