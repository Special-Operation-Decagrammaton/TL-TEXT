[translation]
10015-1001500010 = "Sensei, finalmente Aris vai partir em uma aventura."
10015-1001500020 = "Ouvi dizer que primeiro preciso subir de nível nos arredores da 'Vila Inicial'."
10015-1001500030 = "Estou indo. Por favor, deseje-me sorte."
10015-1001500040 = "Aventura...?"
10015-1001500050 = "Finalmente chegou a sua hora de partir..."
10015-1001500060 = "A aventura de hoje foi ótima."
10015-1001500070 = "Você formará uma party comigo da próxima vez também?"
10015-1001500080 = "Sim, claro. Afinal, somos uma party."
10015-1001500090 = "Porque você é a nossa mascote importante!"
10015-1001500100 = "Sim, conto com você."
10015-1001500110 = "Aris está se divertindo muito na aventura com o Sensei."
10015-1001500120 = "Tcharam!"
10015-1001500130 = "Subi de nível. A Aris de agora é mais forte que a Aris de ontem."
10015-1001500140 = "Ela está crescendo a cada dia...!"
10015-1001500150 = "Parabéns por subir de nível!"
10015-1001500160 = "Sensei, se esforce também. Você vai ficar bem com esse nível?"
10015-1001500170 = "V-vou me esforçar..."
10015-1001500180 = "Tudo bem, sem problemas... eu acho, talvez."
10015-1001500190 = "Então, hoje também vou partir em uma aventura. Sensei, não quer vir junto?"
10015-1001500200 = "Sim, com prazer."
10015-1001500210 = "Então, estarei esperando."
10015-1001500220 = "Por causa das minhas ações, acabei causando muitos problemas..."
10015-1001500230 = "O pessoal do Conselho Estudantil me deu uma bronca, e..."
10015-1001500240 = "As aventuras estão em pausa por um tempo..."
10015-1001500250 = "Às vezes essas coisas acontecem, não se preocupe muito com isso."
10015-1001500260 = "Acho que um período para recarregar as energias também é importante."
10015-1001500270 = "De repente, acabei com um tempo livre só para mim."
10015-1001500280 = "Por isso, hoje estou pensando em experimentar um jogo novo que me recomendaram."
10015-1001500290 = "Como também peguei um console portátil emprestado, estou pensando em jogar no café."
10015-1001500300 = "Acho uma boa ideia!"
10015-1001500310 = "Estou curioso para saber que jogo é...!"
10015-1001500320 = "Eu encontrei um final secreto onde eu ficava com Sua Majestade Barbuda e o Imperador Careca, mas..."
10015-1001500330 = "Disseram que o uso de software ilegal foi detectado, então o pessoal do Seminário veio com tudo e..."
10015-1001500340 = "Confiscaram meu console bem antes do final."
10015-1001500350 = "Elas me disseram que era porque 'é um item de circulação ilegal cujo conteúdo não foi inspecionado', mas..."
10015-1001500360 = "...O que isso quer dizer?"
10015-1001500370 = "Ninguém me conta..."
10015-1001500380 = "Acho que é melhor você não saber..."
10015-1001500390 = "No mundo, há coisas que nos fazem mais felizes por não sabermos..."
10015-1001500400 = "Entendo..."
10015-1001500410 = "Não estou totalmente convencida, mas eu entendi."
10015-1001500420 = "Obrigada, Sensei. Aris ficou um pouco mais sábia."
10015-1001500430 = "De nada."
10015-1001500440 = "Entro em contato de novo."
10015-1001500450 = "Sensei, você entende muito de gatos?"
10015-1001500460 = "Aris não entende muito."
10015-1001500470 = "Gatos são muito rápidos."
10015-1001500480 = "E também, eles miam. É só isso que eu sei."
10015-1001500490 = "Você conhece algum jeito de fazer amizade com gatos?"
10015-1001500500 = "Gatos, é...?"
10015-1001500510 = "Hmm..."
10015-1001500520 = "Hoje, estou sozinha na sala do clube."
10015-1001500530 = "Então, eu queria jogar com você, Sensei."
10015-1001500540 = "Se não for incômodo, por favor, venha me visitar."
10015-1001500550 = "Pode levar um tempinho, tudo bem?"
10015-1001500560 = "Sim, espere um pouquinho, tá?"
10015-1001500570 = "Sim, tudo bem. Muito obrigada."
10015-1001500580 = "Estarei esperando."
10015-1001500590 = "Por que existem baús de tesouro nas masmorras,"
10015-1001500600 = "e por que há itens dentro desses baús?"
10015-1001500610 = "Será que alguém os colocou lá para nós...?"
10015-1001500620 = "Não sei quem foi, mas essa pessoa deve ser muito gentil."
10015-1001500630 = "Eu também quero me tornar uma pessoa assim."
10015-1001500640 = "Estou torcendo por você."
10015-1001500650 = "Tenho certeza que você consegue, Aris."
10015-1001500660 = "Muito obrigada, Sensei."
10015-1001500670 = "Sensei."
10015-1001500680 = "Você está ocupado(a) agora?"
10015-1001500690 = "Não, de jeito nenhum!"
10015-1001500700 = "Que bom!"
10015-1001500710 = "Na verdade, Aris..."
10015-1001500720 = "tem algo que eu quero te mostrar, Sensei!"
10015-1001500730 = "Algo que quer me mostrar...?"
10015-1001500740 = "Sim!"
10015-1001500750 = "Estarei esperando na sala do Clube de Desenvolvimento de Jogos!"
