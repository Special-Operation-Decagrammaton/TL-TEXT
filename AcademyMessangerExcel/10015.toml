[translation]
10015-1001500010 = "先生、いよいよアリスは冒険に出ます"
10015-1001500020 = "まずは「はじまりの村」周辺でレベルを上げなくてはいけないと聞きました"
10015-1001500030 = "行ってきます。どうか幸運を祈っていてください"
10015-1001500040 = "冒険……？"
10015-1001500050 = "いよいよ其方も旅立つ時が来たか……"
10015-1001500060 = "今日の冒険は良い感じでした"
10015-1001500070 = "また次も、一緒にパーティを組んでくれますか？"
10015-1001500080 = "うん、もちろん。パーティだからね"
10015-1001500090 = "大事なマスコットだからね！"
10015-1001500100 = "はい、よろしくお願いします"
10015-1001500110 = "先生との冒険、アリスはすごく楽しいです"
10015-1001500120 = "パンパカパーン！"
10015-1001500130 = "レベルアップしました。今のアリスは、昨日のアリスよりも強いです"
10015-1001500140 = "日々の中で成長している……！"
10015-1001500150 = "レベルアップおめでとう！"
10015-1001500160 = "先生も頑張ってください、そんなレベルで大丈夫ですか？"
10015-1001500170 = "が、頑張るね……"
10015-1001500180 = "大丈夫、問題ない……と思う、多分"
10015-1001500190 = "それでは今日も冒険に出ます、先生も一緒に行きませんか？"
10015-1001500200 = "うん、喜んで"
10015-1001500210 = "では、お待ちしてます"
10015-1001500220 = "アリスの行動のせいで、色々と迷惑をかけてしまいました……"
10015-1001500230 = "生徒会のみなさんにも怒られてしまいましたし、"
10015-1001500240 = "冒険はしばらくお休みです……"
10015-1001500250 = "時にはそういうこともあるよ、あんまり気にしないで"
10015-1001500260 = "充電期間も大事だと思うよ"
10015-1001500270 = "急に一人の時間ができてしまいました"
10015-1001500280 = "なので、今日は薦めてもらった新しいゲームをやってみようと思います"
10015-1001500290 = "携帯用のゲーム機も借りたので、カフェでプレイをしてみようかと"
10015-1001500300 = "良いと思う！"
10015-1001500310 = "どんなゲームか気になる……！"
10015-1001500320 = "顎髭陛下とハゲ皇帝の両方と結ばれる、隠しエンドを見つけたのですが……"
10015-1001500330 = "違法なソフトウェアの使用が検知されたからと、セミナーの方々が押し寄せてきて"
10015-1001500340 = "エンディングの直前でゲーム機を取り上げられてしまいました"
10015-1001500350 = "「不法流通している、内容が検査されていない物だから」と言われたのですが"
10015-1001500360 = "……どういうことなのでしょうか？"
10015-1001500370 = "誰も教えてくれません……"
10015-1001500380 = "知らない方が良いと思う……"
10015-1001500390 = "世の中には、知らないほうが幸せなことも……"
10015-1001500400 = "そうですか……"
10015-1001500410 = "どこか納得いきませんが、理解はできました"
10015-1001500420 = "ありがとうございます、先生。アリスはまたひとつ賢くなりました"
10015-1001500430 = "どういたしまして"
10015-1001500440 = "また、連絡しますね"
10015-1001500450 = "先生は猫について詳しいですか？"
10015-1001500460 = "アリスはあまり詳しくありません"
10015-1001500470 = "猫はとっても素早いです"
10015-1001500480 = "それからニャーと鳴きます、それくらいしか分かりません"
10015-1001500490 = "なにか、猫と仲良くなれる方法を知りませんか？"
10015-1001500500 = "猫かあ……"
10015-1001500510 = "うーん……"
10015-1001500520 = "今日は、部室にアリス一人でして"
10015-1001500530 = "なので、先生と一緒にゲームがしたいです"
10015-1001500540 = "良ければ遊びに来てください"
10015-1001500550 = "ちょっと時間かかるかもだけど大丈夫？"
10015-1001500560 = "うん、ちょっと待っててね"
10015-1001500570 = "はい、大丈夫です。ありがとうございます"
10015-1001500580 = "待ってますね"
10015-1001500590 = "どうしてダンジョンには宝箱があって、"
10015-1001500600 = "その宝箱の中にはアイテムがあるのでしょうか？"
10015-1001500610 = "誰かが入れておいてくれたのでしょうか……？"
10015-1001500620 = "どなたかは知りませんが、その人はとても優しい人ですね"
10015-1001500630 = "アリスも、そんな人になりたいです"
10015-1001500640 = "応援してるね"
10015-1001500650 = "アリスならきっとなれるよ"
10015-1001500660 = "ありがとうございます、先生"
10015-1001500670 = "先生"
10015-1001500680 = "今って忙しいですか？"
10015-1001500690 = "全然大丈夫！"
10015-1001500700 = "良かったです！"
10015-1001500710 = "実はアリス"
10015-1001500720 = "先生に見せたいものがあります！"
10015-1001500730 = "見せたいもの……？"
10015-1001500740 = "はい！"
10015-1001500750 = "ゲーム開発部の部室で、待ってますね！"
