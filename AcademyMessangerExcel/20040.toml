20040-200400240 = "何があったのか、気になるでしょう？"
20040-200400250 = "なんだか悪い予感が……"
20040-200400260 = "先生を対象に……"
20040-200400270 = "いえ、やっぱり会って話した方がよさそうね"
20040-200400280 = "今から向かうわ！"
20040-200400290 = "サツキ……？"
20040-200400300 = "命令通り、帰ってきてゆっくり休んだわ"
20040-200400310 = "もう催眠は解除されたみたいだけど"
20040-200400320 = "本当に油断しちゃダメね"
