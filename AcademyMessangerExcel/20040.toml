[translation]
20040-200400010 = "Sensei? Você está livre agora?"
20040-200400020 = "Como colaboradora do Pandemonium,"
20040-200400030 = "você poderia me ajudar desta vez também?"
20040-200400040 = "Ei, Satsuki...?"
20040-200400050 = "Aconteceu alguma coisa?"
20040-200400060 = "Hum... parece que é melhor conversarmos pessoalmente."
20040-200400070 = "Tenho outros assuntos para tratar também."
20040-200400080 = "Estou indo para o Schale agora."
20040-200400090 = "Ei, espera aí!?"
20040-200400100 = "Olá, Sensei."
20040-200400110 = "Da última vez foi um desastre,"
20040-200400120 = "mas desta vez pretendo tentar outro método."
20040-200400130 = "Você está no Schale agora, não está?"
20040-200400140 = "Sim...?"
20040-200400150 = "Estou aqui...?"
20040-200400160 = "Então, continue esperando aí."
20040-200400170 = "Estou a caminho!"
20040-200400180 = "Satsuki...?"
20040-200400190 = "Ei, espera aí!?"
20040-200400200 = "Fique feliz, Sensei."
20040-200400210 = "Eba!"
20040-200400220 = "Ufufu."
20040-200400230 = "Ficar tão feliz antes mesmo de eu falar..."
20040-200400240 = "Você está curioso para saber o que aconteceu, não está?"
20040-200400250 = "Sinto que isso vai dar ruim..."
20040-200400260 = "Tendo o Sensei como alvo..."
20040-200400270 = "Não, é melhor conversarmos pessoalmente."
20040-200400280 = "Estou indo agora!"
20040-200400290 = "Satsuki...?"
20040-200400300 = "Como ordenado, voltei e descansei bastante."
20040-200400310 = "Parece que a hipnose já foi desfeita,"
20040-200400320 = "mas realmente não podemos baixar a guarda."
20040-200400330 = "Fico feliz que tenha conseguido voltar em segurança."
20040-200400340 = "Ah, e..."
20040-200400350 = "sobre o meu verdadeiro objetivo,"
20040-200400360 = "mantenha em segredo, está bem?"
20040-200400370 = "Uma conspiração tão grande como esta..."
20040-200400380 = "jamais deve vir a público."
20040-200400390 = "Sim, vou manter segredo, não se preocupe."
20040-200400400 = "Então,"
20040-200400410 = "até mais."
20040-200400420 = "Sensei, é terrível."
20040-200400430 = "Se continuar assim, o Departamento de Informações..."
20040-200400440 = "Não, talvez..."
20040-200400450 = "o Pandemonium inteiro vai colapsar."
20040-200400460 = "O que quer dizer com isso?"
20040-200400470 = "Satsuki? Você está bem?"
20040-200400480 = "Droga..."
20040-200400490 = "O perigo está se aproximando."
20040-200400500 = "Mas eu não vou desistir."
20040-200400510 = "Satsuki, onde você está agora?"
20040-200400520 = "Isto é..."
20040-200400530 = "Sensei"
20040-200400540 = "Como você conseguiu aguentar aquilo?"
20040-200400550 = "Como eu pensava, este mundo precisa do Projeto NK Ultra."
20040-200400560 = "Vou criar um mundo onde vacinas não sejam necessárias."
20040-200400570 = "Para que ninguém precise sofrer assim."
20040-200400580 = "Isso não acabaria criando um sofrimento ainda maior...?"
20040-200400590 = "De qualquer forma,"
20040-200400600 = "obrigada pela ajuda hoje."
20040-200400610 = "Olá, Sensei."
20040-200400620 = "Hoje é o meu turno."
20040-200400630 = "Venha com cuidado, Satsuki."
20040-200400640 = "É a oportunidade perfeita"
20040-200400650 = "para observar de perto"
20040-200400660 = "o Sensei, que é um colaborador reserva"
20040-200400670 = "e também rival do Pandemonium."
20040-200400680 = "Você não costuma dizer essas coisas em voz alta...?"
20040-200400690 = "Espere por mim."
20040-200400700 = "Estou indo agora!"
