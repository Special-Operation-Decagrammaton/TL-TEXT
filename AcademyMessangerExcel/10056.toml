[translation]
10056-100560010 = "こんにちは、先生！"
10056-100560020 = "メリークリスマスです！"
10056-100560030 = "セリナも、メリークリスマス！"
10056-100560040 = "ふふ、ありがとうございます"
10056-100560050 = "今日は市内でボランティア活動がありまして"
10056-100560060 = "もしよろしければ、先生も見に来ませんか？"
10056-100560070 = "セリナのご指名とあれば、是が非でも！"
10056-100560080 = "あ、ありがとうございます！"
10056-100560090 = "お待ちしております！"
10056-100560100 = "こんにちは、先生！"
10056-100560110 = "最近、体調はいかがですか？"
10056-100560120 = "ちゃんとしたい気持ちは、あるのだけど……"
10056-100560130 = "も、もう……！"
10056-100560140 = "忙しいのは分かりますが、ダメですよ"
10056-100560150 = "それが続くと、そのうち"
10056-100560160 = "……"
10056-100560170 = "あの"
10056-100560180 = "今日、お時間大丈夫ですか？"
10056-100560190 = "大丈夫じゃなくても大丈夫にします！"
10056-100560200 = "え、えっと……？"
10056-100560210 = "それは嬉しいのですが……"
10056-100560220 = "で、ではまた後で"
10056-100560230 = "先生、お身体は大丈夫ですか？"
10056-100560240 = "今日は私、ボランティアでとある病院に行くんです"
10056-100560250 = "患者の皆さんにはよくお会いしているのですが、今回はサンタとして行くので、少し緊張しますね"
10056-100560260 = "そうなんだ。それ、私も行ってもいい？"
10056-100560270 = "はい？"
10056-100560280 = "だ、ダメではないのですが……"
10056-100560290 = "急にどうかされましたか？"
10056-100560300 = "えっと、先生？"
