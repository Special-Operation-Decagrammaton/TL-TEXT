[translation]
10108-101080010 = "Professor, já está dormindo?"
10108-101080020 = "Não, ainda estou acordado."
10108-101080030 = "O que houve a essa hora?"
10108-101080040 = "Me desculpe."
10108-101080050 = "É que... não consigo dormir."
10108-101080060 = "Estava organizando os relatórios contábeis para enviar à Schale."
10108-101080070 = "Já enviei, por favor, verifique quando tiver um tempo."
10108-101080080 = "Obrigado por ficar até tarde, Yuuka."
10108-101080090 = "Cuide da sua saúde, ok?"
10108-101080100 = "Está tudo bem, meu cálculo de horas de sono é perfeito."
10108-101080110 = "Então, boa noite."
10108-101080120 = "Graças ao conselho do Professor,"
10108-101080130 = "consigo dormir mais do que antes."
10108-101080140 = "Ainda passo da meia-noite, mas..."
10108-101080150 = "Que bom, então."
10108-101080160 = "Tem alguma preocupação?"
10108-101080170 = "Não tenho nenhuma preocupação em particular."
10108-101080180 = "Só há algo que me incomoda um pouco..."
10108-101080190 = "＜SYSTEM＞ Erro ao enviar mensagem!"
10108-101080200 = "Yuuka...?"
10108-101080210 = "＜SYSTEM＞ Erro ao enviar mensagem!"
10108-101080220 = "＜SYSTEM＞ Erro ao enviar mensagem!"
10108-101080230 = "Professor, vi depois do meu turno hoje,"
10108-101080240 = "havia muitos macarrões instantâneos, certo?"
10108-101080250 = "Será que você está levando uma vida pouco saudável de novo...?"
10108-101080260 = "Não são meus!"
10108-101080270 = "São para dar aos alunos famintos!"
10108-101080280 = "Entendi..."
10108-101080290 = "Nesse caso, não há o que fazer."
10108-101080300 = "Mas, por favor, faça suas refeições corretamente, ok?"
10108-101080310 = "Sim..."
10108-101080320 = "E você, Yuuka, está se alimentando bem?"
10108-101080330 = "Claro."
10108-101080340 = "Estou me alimentando bem."
10108-101080350 = "Parece que houve uma pausa..."
10108-101080360 = "Por recomendação da Senpai Kotama,"
10108-101080370 = "tenho ouvido rádio antes de dormir ultimamente."
10108-101080380 = "Rádio é interessante, não é?"
10108-101080390 = "O que você tem ouvido?"
10108-101080400 = "É um programa chamado <DJ Merry's Music Trip>,"
10108-101080410 = "eles leem as cartas dos ouvintes e tocam músicas suaves."
10108-101080420 = "É perfeito para ouvir deitada na cama."
10108-101080430 = "Talvez eu tente ligar quando não conseguir dormir também."
10108-101080440 = "Por favor, ouça."
10108-101080450 = "Ficaria feliz se o Professor também gostasse."
10108-101080460 = "Ah, Professor."
10108-101080470 = "Você ouviu o rádio que mencionei antes?"
10108-101080480 = "Sim, por que?"
10108-101080490 = "No rádio da última vez..."
10108-101080500 = "...Não."
10108-101080510 = "Não, não é nada."
10108-101080520 = "O programa de rádio anterior?"
10108-101080530 = "Do que você está falando...?"
10108-101080540 = "Desculpe, deve ser um engano."
10108-101080550 = "Não se preocupe!"
10108-101080560 = "Falando nisso, Yuuka."
10108-101080570 = "Sua insônia já melhorou?"
10108-101080580 = "Eu sabia..."
10108-101080590 = "Sim, felizmente."
10108-101080600 = "Sensei, conto com você hoje também."
10108-101080610 = "Sim, eu que conto com você."
