[translation]
16003-1741 = "Olá, Sensei. É a Suzumi. Você se lembra de mim?"
16003-1742 = "Só queria passar para dizer um oi. Desculpe incomodar enquanto está ocupado."
16003-1743 = "Ficaria feliz se pudéssemos nos encontrar novamente algum dia."
16003-1744 = "Então, até mais."
16003-1745 = "É a Suzumi. Sensei, você chegou em casa em segurança?"
16003-1746 = "Sim, graças a você. Muito obrigado mesmo."
16003-1747 = "Não, fico feliz em saber disso."
16003-1748 = "Bem,"
16003-1749 = "é que,"
16003-1750 = "não sei bem como dizer..."
16003-1751 = "Sempre que precisar de mim, é só chamar. Irei ao seu lado imediatamente."
16003-1752 = "……Bem,"
16003-1753 = "sobre a escolta."
16003-1754 = "Sensei, é a Suzumi."
16003-1755 = "Sempre que precisar de uma escolta, como hoje, é só me chamar."
16003-1756 = "Eu levarei você ao seu destino com segurança."
16003-1757 = "Obrigado, conto com você."
16003-1758 = "Garotas do ensino médio são assustadoras! Me ajude, Suzumi!"
16003-1759 = "Sim, pode deixar comigo."
16003-1760 = "……Bem,"
16003-1761 = "sobre isso……"
16003-1762 = "Eu também sou uma garota do ensino médio, afinal de contas……"
16003-1763 = "Mas, deixando isso de lado,"
16003-1764 = "estarei na frente do Schale antes do horário do nosso passeio de hoje."
16003-1765 = "Até mais tarde."
16003-1766 = "É a Suzumi. Muito obrigada pelo dia de hoje. Foi divertido."
16003-1767 = "Vamos nos encontrar de novo, Sensei."
16003-1768 = "Olá, Sensei. É a Suzumi."
16003-1769 = "Se quiser, pode me chamar a qualquer momento."
16003-1770 = "Desta vez não será como escolta, mas sim como uma companhia normal."
16003-1771 = "Bem,"
16003-1772 = "claro, se estiver ocupado, não precisa se forçar a me chamar……"
16003-1773 = "Se for um chamado da Suzumi, eu vou na hora."
16003-1774 = "Então, podemos nos encontrar agora?"
16003-1775 = "aｌ%$ｇ3ｒ#$%^"
16003-1776 = "……"
16003-1777 = "Desculpe."
16003-1778 = "Deixei meu celular cair."
16003-1779 = "Muito obrigada."
16003-1780 = "Então, posso escolher o local desta vez?"
16003-1781 = "Quem sabe um dia, possamos caminhar juntos o dia todo,"
16003-1782 = "sem que nada de ruim aconteça. Seria bom se esse dia chegasse."
16003-1783 = "……Bem,"
16003-1784 = "talvez esse dia não chegue tão cedo……"
16003-1785 = "É justamente por isso que continuo com as minhas atividades."
16003-160030010 = "Bom dia, Sensei. É a Suzumi."
16003-160030020 = "Como pretende passar o dia hoje?"
16003-160030030 = "Não é nada urgente, mas se estiver tudo bem, gostaria de um pouco do seu tempo……"
16003-160030040 = "Estou livre!!"
16003-160030050 = "Não existe nada mais importante do que um compromisso com a Suzumi."
16003-160030060 = "Ah, entendo."
16003-160030070 = "Então, aceitarei sua oferta. Muito obrigada."
16003-160030080 = "Sinto muito, parece que acabei te forçando a algo como resultado."
16003-160030090 = "Bem, enviarei o local para você mais tarde."
16003-160030100 = "Sobre isso..."
16003-160030110 = "Não, não é nada. Então, até mais tarde, conto com você."
16003-160030120 = "É a Suzumi. Você conseguiu chegar em casa em segurança?"
16003-160030130 = "Muito obrigada por ter se dado ao trabalho, apesar do horário tardio."
16003-160030140 = "Já é madrugada, então pensei que talvez pudesse acabar te acordando enviando esta mensagem..."
16003-160030150 = "Mas, ainda assim, senti que precisava expressar minha gratidão."
16003-160030160 = "..."
16003-160030170 = "Muito obrigada, Sensei."
16003-160030180 = "Por favor, continue contando comigo daqui em diante."
16003-160030190 = "Olá, Sensei. É a Suzumi."
16003-160030200 = "Ouvi dizer que você tem planos de vir a Trinity em breve."
16003-160030210 = "Sobre isso..."
16003-160030220 = "Se não for pedir muito..."
16003-160030230 = "Eu gostaria de poder te escoltar quando você vier."
16003-160030240 = "Estou disponível a qualquer momento."
16003-160030250 = "Ficaria muito feliz se você entrasse em contato."
16003-160030260 = "Sempre obrigado, Suzumi. Posso pedir isso a você?"
16003-160030270 = "Então, que tal caminharmos juntos depois de tanto tempo?"
16003-160030280 = "S-sim."
16003-160030290 = "Muito obrigada. Então, até mais."
16003-160030300 = "Perguntarei quando você vier."
16003-160030310 = "Muito obrigada por hoje."
16003-160030320 = "Graças ao Sensei, foi muito divertido."
16003-160030330 = "Obrigado. Eu também me diverti."
16003-160030340 = "Digo o mesmo, vamos continuar nos dando bem."
16003-160030350 = "Não..."
16003-160030360 = "Isso é, bem..."
16003-160030370 = "Sim."
16003-160030380 = "Conto com você daqui em diante, Sensei."
16003-160030390 = "Se precisar de algo, sinta-se à vontade para entrar em contato."
16003-160030400 = "Não..."
16003-160030410 = "Não precisa de um motivo específico."
16003-160030420 = "...Para o Sensei, a qualquer momento."
