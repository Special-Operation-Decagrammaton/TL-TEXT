[translation]
10140-101400010 = "Você tava me procurando agorinha, né?"
10140-101400020 = "Aconteceu alguma coisa?"
10140-101400030 = "Por acaso se meteu em alguma confusão perigosa?"
10140-101400040 = "Ah, eu tava te procurando mesmo!"
10140-101400050 = "Comprei um leite de frutas ali no shopping, pega um pra você se quiser."
10140-101400060 = "Ouvi dizer que você adora um leite docinho."
10140-101400070 = "Pera aí."
10140-101400080 = "Como é que você sabe dos meus gostos?"
10140-101400090 = "E outra,"
10140-101400100 = "Acha mesmo que eu sou comprada tão fácil assim?!"
10140-101400110 = "Eu sou uma agente especial da SRT, esqueceu?"
10140-101400120 = "Tem certeza?"
10140-101400130 = "É daqueles que vêm com um monte de pedacinho de fruta dentro..."
10140-101400140 = "……"
10140-101400150 = "…………"
10140-101400160 = "Tem de morango...?"
10140-101400170 = "Claro. Tem de banana e de melão também."
10140-101400180 = "Tá bom, depois eu passo aí pra pegar."
10140-101400190 = "Mas já vou avisando!"
10140-101400200 = "Eu não tô indo aí SÓ por causa do leite, viu?!"
10140-101400210 = "Tô com sono..."
10140-101400220 = "Teve alguma operação ontem à noite?"
10140-101400230 = "Não..."
10140-101400240 = "Fiquei vendo uns vídeos curtos na internet..."
10140-101400250 = "E acabei indo dormir super tarde..."
10140-101400260 = "O tempo voa quando a gente assiste essas coisas, né."
10140-101400270 = "Vicia bem mais que vídeo longo, sei lá."
10140-101400280 = "Pois é."
10140-101400290 = "Ultimamente tô vendo muito vídeo de lifehack..."
10140-101400300 = "Eles dizem que são 'dicas úteis', mas só usam umas ferramentas bizarras pra fazer as coisas."
10140-101400310 = "Bom, reclamar de ineficiência em vídeo curto já é meio estranho por si só, mas..."
10140-101400320 = "Mas é daora ficar imaginando como resolver uns B.Os grandes usando só ferramentas comuns."
10140-101400330 = "É meio que acessar o Kivotos Respostas."
10140-101400340 = "Kivotos Respostas? O que é isso?"
10140-101400350 = "Hmmm... Vai demorar pra explicar, mas..."
10140-101400360 = "É tipo o avô dos lifehacks de hoje."
10140-101400370 = "？"
10140-101400380 = "Vocês adultos às vezes usam umas gírias muito esquisitas."
10140-101400390 = "Aqui perto..."
10140-101400400 = "Tem algum lugar pra tirar foto 3x4?"
10140-101400410 = "Acho que não tem nenhum estúdio de fotografia aqui perto..."
10140-101400420 = "Por que a pressa do nada?"
10140-101400430 = "Vou ter que emitir uma identidade nova pra uma operação..."
10140-101400440 = "E eles exigem uma foto 3x4 recente..."
10140-101400450 = "Não posso usar foto antiga."
10140-101400460 = "Por que você não usa aquelas cabines de foto?"
10140-101400470 = "Cabine de foto?"
10140-101400480 = "É. Geralmente tem na frente das estações."
10140-101400490 = "Fica aberto direto, por que não dá um pulo lá?"
10140-101400500 = "Ah, cabine de foto não rola."
10140-101400510 = "……"
10140-101400520 = "Fazer o que, né..."
10140-101400530 = "Entendi. Valeu."
10140-101400540 = "Tô jogando um RPG de celular que lançou esses dias..."
10140-101400550 = "Mas tô achando os atributos da classe Tank muito baixos nesse jogo."
10140-101400560 = "Ter o DPS menor que o do Monge não faz o menor sentido, não acha?!"
10140-101400570 = "Não seria só o balanceamento do jogo?"
10140-101400580 = "Escudo passa mais a imagem de defesa mesmo."
10140-101400590 = "Mas..."
10140-101400600 = "Escudo não serve só pra defender."
10140-101400610 = "Dependendo da situação, ele dá mais dano e mais medo que muita arma por aí."
10140-101400620 = "Um escudo virar arma...?"
10140-101400630 = "Querendo ou não, é um bloco gigante de metal."
10140-101400640 = "O que eu uso mesmo pesa algumas dezenas de quilos."
10140-101400650 = "E VOCÊ CARREGA ISSO O TEMPO TODO COM UMA MÃO SÓ?!"
10140-101400660 = "？"
10140-101400670 = "Óbvio. Eu preciso da outra pra segurar a arma."
10140-101400680 = "É... Tank é roubado mesmo..."
10140-101400690 = "Sensei, ficou sabendo do boato?"
10140-101400700 = "Disseram que tá rolando uns assaltos na cidade ultimamente."
10140-101400710 = "O cara segue as pessoas até lugares vazios..."
10140-101400720 = "E rouba a carteira e essas coisas."
10140-101400730 = "Que papo sinistro..."
10140-101400740 = "Ainda não pegaram o cara?"
10140-101400750 = "A Valkyrie tá investigando, então acho que logo logo pegam ele, mas..."
10140-101400760 = "Toma cuidado também, Sensei."
10140-101400770 = "Você já é mais fraco que a gente por natureza, e ainda vive andando sozinho de noite na rua, né?"
10140-101400780 = "Se precisar..."
10140-101400790 = "Eu posso ir aí te buscar."
10140-101400800 = "A Kurumi vindo me buscar? Fico até sem jeito."
10140-101400810 = "Vai vir me buscar de avental?"
10140-101400820 = "FICA QUIETO!"
10140-101400830 = "Não foi isso que eu quis dizer!"
