[translation]
10140-101400010 = "Вы ведь искали меня до этого, верно?"
10140-101400020 = "Что-то случилось?"
10140-101400030 = "Вы попали в какое-то опасное происшествие?"
10140-101400040 = "А, да я просто так тебя искал."
10140-101400050 = "Купил тут фруктового молока в торговом квартале неподалёку, так что угощайся, если хочешь."
10140-101400060 = "Слышал, ты любишь сладкое молоко."
10140-101400070 = "Так, секунду.."
10140-101400080 = "Откуда вы знаете, что мне нравится?"
10140-101400090 = "Да и вообще.."
10140-101400100 = "С чего вы взяли, что меня можно приманить чем-то подобным?!"
10140-101400110 = "Я вообще-то боец спецподразделения SRT, если вы забыли!"
10140-101400120 = "Ты уверена?"
10140-101400130 = "Оно же прямо с кусочками настоящих фруктов..."
10140-101400140 = "..."
10140-101400150 = "......"
10140-101400160 = "А клубничное там есть?"
10140-101400170 = "Конечно. И с бананом есть, и с дыней."
10140-101400180 = "Ну ладно, я зайду за ним позже."
10140-101400190 = "И чтобы вы знали!"
10140-101400200 = "Я соглашаюсь вовсе не из-за какого-то там молока!"
10140-101400210 = "Я так хочу спать..."
10140-101400220 = "У вас вчера была ночная операция?"
10140-101400230 = "Нет."
10140-101400240 = "Просто смотрела какие-то интересные короткие видео..."
10140-101400250 = "и в итоге засиделась допоздна..."
10140-101400260 = "Когда их смотришь, время как будто летит быстрее, да?"
10140-101400270 = "Они затягивают похлеще длинных роликов."
10140-101400280 = "Есть такое."
10140-101400290 = "Я вот в последнее время смотрю лайфхаки, но...."
10140-101400300 = "Там вместо реальных хитростей чаще всего показывают людей, использующих какие-то странные инструменты."
10140-101400310 = "Ну, жаловаться на неэффективность в коротких видео — это, конечно, глупо."
10140-101400320 = "Но сама мысль о том, как решать проблемы с помощью мастерского владения обычными вещами, интригует."
10140-101400330 = "Прямо как FAQ."
10140-101400340 = "FAQ? Это ещё что?"
10140-101400350 = "Хм... объяснять долго, но..."
10140-101400360 = "Можно сказать, это синоним слова лайфхак."
10140-101400370 = "?"
10140-101400380 = "Взрослые иногда используют какой-то странный сленг."
10140-101400390 = "Кстати..."
10140-101400400 = "Поблизости есть места, где можно сделать фото на документы?"
10140-101400410 = "Хм, не думаю, что рядом есть фотоателье..."
10140-101400420 = "А зачем тебе так внезапно?"
10140-101400430 = "Для следующей операции мне нужно выпустить новое удостоверение, но..."
10140-101400440 = "Туда требуется свежая фотография..."
10140-101400450 = "Старую использовать нельзя."
10140-101400460 = "А почему бы не воспользоваться фотобудкой?"
10140-101400470 = "Фотобудкой?"
10140-101400480 = "Да. Они обычно стоят прямо перед железнодорожными станциями."
10140-101400490 = "Они работают круглосуточно, так почему бы не попробовать?"
10140-101400500 = "Фотобудка — это как-то немного..."
10140-101400510 = "..."
10140-101400520 = "Ладно, ничего не поделаешь."
10140-101400530 = "Поняла. Спасибо."
10140-101400540 = "Я тут начала играть в одну мобильную RPG, которая недавно вышла..."
10140-101400550 = "И мне кажется, что у танков в этой игре характеристики слишком занижены."
10140-101400560 = "И вообще, с каких пор у них урон ниже, чем у какого-то монаха? Это же странно.?"
10140-101400570 = "Ну, это же просто игровой баланс?"
10140-101400580 = "Всё-таки щит создаёт ощущение сугубо защиты..."
10140-101400590 = "Но ведь..."
10140-101400600 = "Щиты можно использовать не только для обороны."
10140-101400610 = "В определённых ситуациях они могут быть гораздо опаснее любого другого оружия."
10140-101400620 = "Щит как оружие...?"
10140-101400630 = "Ну да, это ведь, как-никак, цельный кусок железа."
10140-101400640 = "Тот, который использую я, весит несколько десятков килограммов, между прочим."
10140-101400650 = "И ты всё это время таскаешь его одной рукой?!"
10140-101400660 = "?"
10140-101400670 = "Конечно. Мне ведь нужно ещё и винтовку держать."
10140-101400680 = "Танки в реальности и правда сильны..."
10140-101400690 = "Сенсей, вы слышали недавние слухи?"
10140-101400700 = "Говорят, в городе объявился грабитель."
10140-101400710 = "Пишут, что он выслеживает людей в безлюдных местах..."
10140-101400720 = "а потом отбирает кошельки и ценные вещи."
10140-101400730 = "Какие-то опасные слухи..."
10140-101400740 = "Преступника ещё не поймали?"
10140-101400750 = "Валькирия сейчас ведёт расследование, так что скоро поймают, но..."
10140-101400760 = "Но вы тоже будьте осторожны, Сенсей."
10140-101400770 = "Вы ведь слабее любой из нас, но при этом часто разгуливаете в одиночку по ночам."
10140-101400780 = "Если что..."
10140-101400790 = "Я могу вас встретить."
10140-101400800 = "Ого, ты придёшь меня встретить? Я прямо смущён."
10140-101400810 = "Придешь прямо в фартуке?"
10140-101400820 = "Заткнитесь!"
10140-101400830 = "Я вообще не это имела в виду!"