[translation]
10140-101400010 = "さっき、私のこと探してたでしょ"
10140-101400020 = "何かあったの？"
10140-101400030 = "もしかして危ない事件に巻き込まれたとか？"
10140-101400040 = "あ、ちょうど探してたんだ"
10140-101400050 = "近くの商店街でフルーツ牛乳をもらってきたから、よかったら飲んでね"
10140-101400060 = "クルミは甘い牛乳が好きって聞いたから"
10140-101400070 = "ちょっと"
10140-101400080 = "なんで私の好み知ってるのよ"
10140-101400090 = "というか"
10140-101400100 = "そんなものに釣られるわけないじゃない！"
10140-101400110 = "私はSRTの特殊隊員なのよ？"
10140-101400120 = "本当にいいの？"
10140-101400130 = "果肉がたっぷり入ったやつなのに"
10140-101400140 = "……"
10140-101400150 = "…………"
10140-101400160 = "イチゴミルクもある？"
10140-101400170 = "もちろん。バナナ味とメロン味もあるよ"
10140-101400180 = "じゃあ、あとでもらいに行くわ"
10140-101400190 = "言っとくけど！"
10140-101400200 = "別に牛乳に釣られたわけじゃないからね！"
10140-101400210 = "眠い……"
10140-101400220 = "昨日の夜作戦があったの？"
10140-101400230 = "ううん"
10140-101400240 = "面白そうなショート動画を見てたら"
10140-101400250 = "夜ふかししちゃって……"
10140-101400260 = "見てると時間の流れが速く感じちゃうよね"
10140-101400270 = "長い動画より中毒性があるというか"
10140-101400280 = "そうなの"
10140-101400290 = "最近はライフハック系の動画を見ているんだけど"
10140-101400300 = "コツを謳うわりには、変な道具を使う動画ばっかでね"
10140-101400310 = "まあ、ショート動画に効率の悪さを語るのも変だけど"
10140-101400320 = "でも普通の道具をいかに使いこなして困難を乗り越えるか考えるのはワクワクするよ"
10140-101400330 = "知恵袋の活用というか"
10140-101400340 = "知恵袋？なにそれ？"
10140-101400350 = "うーん……説明すると長くなるけど"
10140-101400360 = "ライフハックの代名詞のようなものだよ"
10140-101400370 = "？"
10140-101400380 = "大人はたまに変な流行語を使うのね"
10140-101400390 = "この近くに"
10140-101400400 = "証明写真が撮れる場所ってあるかしら？"
10140-101400410 = "近くに写真館はなかったような……"
10140-101400420 = "急にどうしたの？"
10140-101400430 = "作戦に必要な証明書を新しく発行することになったんだけど"
10140-101400440 = "最新の証明写真が必要で……"
10140-101400450 = "昔の写真が使えないのよ"
10140-101400460 = "証明写真ボックスを使ったら？"
10140-101400470 = "証明写真ボックス？"
10140-101400480 = "うん。だいたい駅前にあるし"
10140-101400490 = "いつでも利用できるし、行ってみたら？"
10140-101400500 = "証明写真ボックスはちょっと"
10140-101400510 = "……"
10140-101400520 = "しょうがないか"
10140-101400530 = "分かったわ。ありがとう"
10140-101400540 = "最近リリースされたスマホRPGをしてるんだけど"
10140-101400550 = "このゲーム、タンクの能力が低すぎる気がするの"
10140-101400560 = "しかもモンクよりDPSが低いのおかしくない？"
10140-101400570 = "ゲームバランスじゃない？"
10140-101400580 = "盾は防御ってイメージだし"
10140-101400590 = "でも"
10140-101400600 = "盾は防御以外にも使えるのよ"
10140-101400610 = "場合によっては武器より恐ろしくなるわ"
10140-101400620 = "盾が武器になる……？"
10140-101400630 = "一応、鉄の塊だもの"
10140-101400640 = "私が使ってるのだって、数十kgくらいはあるのよ"
10140-101400650 = "それをずっと片手で持ち歩いてたの！？"
10140-101400660 = "？"
10140-101400670 = "当然でしょ。銃も持たなきゃだし"
10140-101400680 = "たしかにタンクって強いね……"
10140-101400690 = "先生、あの噂聞いた？"
10140-101400700 = "最近この街に強盗が現れたんだって"
10140-101400710 = "ひとけのない場所からあとをつけて"
10140-101400720 = "財布とかを盗むらしいわ"
10140-101400730 = "物騒な噂だね……"
10140-101400740 = "犯人はまだ捕まってないの？"
10140-101400750 = "ヴァルキューレが捜査に当たってるから、すぐ捕まると思うけど……"
10140-101400760 = "でも先生も気をつけて"
10140-101400770 = "ただでさえ私たちより弱いのに、ひとりで夜道を歩くことも多いでしょ？"
10140-101400780 = "なんなら"
10140-101400790 = "私が迎えに行くから"
10140-101400800 = "クルミが迎えに来てくれるなんて、照れちゃうね"
10140-101400810 = "エプロン姿で来てくれる？"
10140-101400820 = "うるさい！"
10140-101400830 = "そういう意味じゃないわよ！"
