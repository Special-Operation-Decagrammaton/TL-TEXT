[translation]
10140-101400010 = "Você estava me procurando agora, não estava?"
10140-101400020 = "Aconteceu alguma coisa?"
10140-101400030 = "Será que você se envolveu em algum incidente perigoso?"
10140-101400040 = "Ah, eu estava te procurando."
10140-101400050 = "Peguei um leite de frutas na rua comercial aqui perto, se quiser, pode beber."
10140-101400060 = "Ouvi dizer que a Kurumi gosta de leite doce."
10140-101400070 = "Espera aí."
10140-101400080 = "Como você sabe do que eu gosto?"
10140-101400090 = "E mais..."
10140-101400100 = "Eu não seria atraída por algo assim!"
10140-101400110 = "Eu sou uma agente especial da SRT, sabia?"
10140-101400120 = "Tem certeza?"
10140-101400130 = "Mesmo sendo um com bastante polpa de fruta?"
10140-101400140 = "..."
10140-101400150 = "......"
10140-101400160 = "Tem leite de morango também?"
10140-101400170 = "Claro. Tem sabor banana e melão também."
10140-101400180 = "Então, vou pegar depois."
10140-101400190 = "Só pra deixar claro!"
10140-101400200 = "Não é que eu tenha sido atraída pelo leite!"
10140-101400210 = "Com sono..."
10140-101400220 = "Teve alguma operação ontem à noite?"
10140-101400230 = "Não."
10140-101400240 = "Eu estava assistindo a uns vídeos curtos interessantes..."
10140-101400250 = "E acabei ficando acordada até tarde..."
10140-101400260 = "Quando você assiste, o tempo parece passar rápido, né?"
10140-101400270 = "É mais viciante do que vídeos longos, eu diria."
10140-101400280 = "É verdade."
10140-101400290 = "Ultimamente, tenho assistido a vídeos de 'life hacks', mas..."
10140-101400300 = "Apesar de prometerem dicas, são só vídeos usando ferramentas estranhas."
10140-101400310 = "Bem, é estranho falar sobre ineficiência em vídeos curtos, mas..."
10140-101400320 = "Mas pensar em como usar ferramentas comuns para superar dificuldades é emocionante."
10140-101400330 = "É como usar um guia de soluções, eu diria."
10140-101400340 = "Chiebukuro? O que é isso?"
10140-101400350 = "Hmm... Levaria muito tempo para explicar, mas..."
10140-101400360 = "É como um sinônimo de 'life hack'."
10140-101400370 = "?"
10140-101400380 = "Adultos às vezes usam umas gírias estranhas, né?"
10140-101400390 = "Aqui perto..."
10140-101400400 = "Tem algum lugar onde eu possa tirar fotos para documentos?"
10140-101400410 = "Não me lembro de ter um estúdio de fotografia por perto..."
10140-101400420 = "O que aconteceu de repente?"
10140-101400430 = "Preciso emitir um novo certificado para a operação, mas..."
10140-101400440 = "Preciso de uma foto de documento atualizada..."
10140-101400450 = "Não posso usar fotos antigas."
10140-101400460 = "Por que não usa uma cabine de fotos para documentos?"
10140-101400470 = "Cabine de fotos para documentos?"
10140-101400480 = "Sim. Geralmente ficam na frente das estações."
10140-101400490 = "Você pode usar a qualquer hora, por que não tenta ir?"
10140-101400500 = "Uma cabine de fotos para documentos... é um pouco complicado."
10140-101400510 = "..."
10140-101400520 = "Não tem jeito, né?"
10140-101400530 = "Entendi. Obrigada."
10140-101400540 = "Estou jogando um RPG de celular que foi lançado recentemente, mas..."
10140-101400550 = "Nesse jogo, sinto que a habilidade dos tanques é muito baixa."
10140-101400560 = "E não é estranho que o DPS deles seja menor que o dos monges?"
10140-101400570 = "Não é o equilíbrio do jogo?"
10140-101400580 = "Escudos dão a imagem de defesa, né?"
10140-101400590 = "Mas..."
10140-101400600 = "Escudos podem ser usados para mais do que apenas defesa."
10140-101400610 = "Dependendo da situação, eles podem ser mais assustadores que armas."
10140-101400620 = "Um escudo pode ser uma arma...?"
10140-101400630 = "Bem, é um pedaço de ferro, afinal."
10140-101400640 = "O que eu uso pesa dezenas de quilos."
10140-101400650 = "Você carregava isso com uma mão o tempo todo!?"
10140-101400660 = "?"
10140-101400670 = "Claro. Eu também tenho que segurar uma arma."
10140-101400680 = "É verdade, tanques são fortes, né...?"
10140-101400690 = "Professor, você ouviu aquele boato?"
10140-101400700 = "Dizem que um ladrão apareceu recentemente nesta cidade."
10140-101400710 = "Ele segue as pessoas de lugares desertos..."
10140-101400720 = "E rouba carteiras e outras coisas."
10140-101400730 = "Que boato perigoso..."
10140-101400740 = "O criminoso ainda não foi pego?"
10140-101400750 = "A Valkyrie está investigando, então acho que ele será pego logo, mas..."
10140-101400760 = "Mas o Professor também deve ter cuidado."
10140-101400770 = "Você já é mais fraco que nós, e ainda por cima costuma andar sozinho à noite, não é?"
10140-101400780 = "Na verdade..."
10140-101400790 = "Eu vou te buscar."
10140-101400800 = "Kurumi vindo me buscar, que fofo."
10140-101400810 = "Você viria de avental?"
10140-101400820 = "Quieto!"
10140-101400830 = "Não foi nesse sentido!"
