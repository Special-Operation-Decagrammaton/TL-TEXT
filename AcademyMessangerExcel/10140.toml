[translation]
10140-101400010 = "You were looking for me earlier, weren't you?"
10140-101400020 = "Did something happen?"
10140-101400030 = "Did you get caught up in some kind of dangerous incident?"
10140-101400040 = "Oh, I was actually just looking for you."
10140-101400050 = "I picked up some fruit milk at the shopping district nearby, so feel free to have some."
10140-101400060 = "I heard you like sweet milk, Kurumi."
10140-101400070 = "Hey."
10140-101400080 = "How do you know what I like?"
10140-101400090 = "And besides,"
10140-101400100 = "There's no way I'd be swayed by something like that!"
10140-101400110 = "I'm an SRT special operative, you know?"
10140-101400120 = "Are you sure you don't want any?"
10140-101400130 = "It's packed with real fruit pulp, too."
10140-101400140 = "..."
10140-101400150 = "............"
10140-101400160 = "Do you have strawberry milk too?"
10140-101400170 = "Of course. I've got banana and melon flavors as well."
10140-101400180 = "Fine, I'll come get some later."
10140-101400190 = "Just so you know!"
10140-101400200 = "I'm not being swayed by the milk, okay!"
10140-101400210 = "I'm sleepy..."
10140-101400220 = "Did you have an operation last night?"
10140-101400230 = "Nope."
10140-101400240 = "I was watching some interesting short videos,"
10140-101400250 = "and I ended up staying up way too late..."
10140-101400260 = "Time just flies by when you're watching them, doesn't it?"
10140-101400270 = "They're almost more addictive than long-form videos."
10140-101400280 = "I guess so."
10140-101400290 = "I've been watching life hack videos lately,"
10140-101400300 = "but for things that claim to be 'tips,' they mostly just use really weird tools."
10140-101400310 = "Well, it's a bit ironic to talk about inefficiency when watching short videos."
10140-101400320 = "But it's exciting to think about how to overcome difficulties using everyday items."
10140-101400330 = "Like putting your wits to use."
10140-101400340 = "Putting your wits to use? What's that?"
10140-101400350 = "Hmm... it's a long story,"
10140-101400360 = "but it's basically synonymous with life hacks."
10140-101400370 = "?"
10140-101400380 = "Adults sure use weird slang sometimes."
10140-101400390 = "Is there anywhere nearby"
10140-101400400 = "where I can get a passport-style photo taken?"
10140-101400410 = "I don't think there's a photo studio nearby..."
10140-101400420 = "What's this all of a sudden?"
10140-101400430 = "I need to get a new ID issued for an operation,"
10140-101400440 = "and I need an up-to-date photo..."
10140-101400450 = "I can't use my old one."
10140-101400460 = "Why not use a photo booth?"
10140-101400470 = "A photo booth?"
10140-101400480 = "Yeah. They're usually in front of the station."
10140-101400490 = "You can use them anytime, why don't you try that?"
10140-101400500 = "A photo booth is a bit..."
10140-101400510 = "..."
10140-101400520 = "I guess it can't be helped."
10140-101400530 = "Alright. Thanks."
10140-101400540 = "I've been playing this mobile RPG that just came out,"
10140-101400550 = "and I feel like the tank's stats are way too low."
10140-101400560 = "And isn't it weird that they have lower DPS than the monk?"
10140-101400570 = "Isn't that just game balance?"
10140-101400580 = "I mean, shields are for defense."
10140-101400590 = "But,"
10140-101400600 = "shields can be used for more than just defense."
10140-101400610 = "Depending on the situation, they can be even more terrifying than weapons."
10140-101400620 = "A shield... as a weapon?"
10140-101400630 = "It is a giant chunk of iron, after all."
10140-101400640 = "The one I use weighs several dozen kilograms."
10140-101400650 = "You've been carrying that around in one hand the whole time!?"
10140-101400660 = "?"
10140-101400670 = "Obviously. I have to hold my gun, too."
10140-101400680 = "Tanks really are strong, huh..."
10140-101400690 = "Sensei, did you hear that rumor?"
10140-101400700 = "Apparently, a robber has appeared in this city recently."
10140-101400710 = "They follow people from deserted areas"
10140-101400720 = "and steal their wallets and stuff."
10140-101400730 = "That's a disturbing rumor..."
10140-101400740 = "Has the culprit been caught yet?"
10140-101400750 = "Valkyrie is on the case, so I'm sure they'll be caught soon, but..."
10140-101400760 = "You should be careful too, Sensei."
10140-101400770 = "You're already weaker than us, and you walk home alone at night a lot, right?"
10140-101400780 = "If you want,"
10140-101400790 = "I can come pick you up."
10140-101400800 = "I'm blushing at the thought of Kurumi coming to pick me up."
10140-101400810 = "Will you come in your apron?"
10140-101400820 = "Shut up!"
10140-101400830 = "That's not what I meant!"