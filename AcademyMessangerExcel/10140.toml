[translation]
10140-101400010 = "You were looking for me earlier, right?"
10140-101400020 = "Did something happen?"
10140-101400030 = "Did you get caught up in some dangerous incident or something?"
10140-101400040 = "Ah, I was just looking for you."
10140-101400050 = "I got some fruit milk from the nearby shopping district, so feel free to drink it if you'd like."
10140-101400060 = "I heard you like sweet milk."
10140-101400070 = "Wait a second."
10140-101400080 = "How do you know what I like?"
10140-101400090 = "Wait no—"
10140-101400100 = "There's no way I'd be lured in by something like that!"
10140-101400110 = "I'm a special operator of SRT, you know?"
10140-101400120 = "Are you really sure?"
10140-101400130 = "Even though it's the kind with lots of fruit chunks in it..."
10140-101400140 = "..."
10140-101400150 = "......"
10140-101400160 = "Do you have strawberry milk too?"
10140-101400170 = "Of course. I have banana and melon flavors too."
10140-101400180 = "Well then, I'll come get it later."
10140-101400190 = "Just so you know!"
10140-101400200 = "It's not like I was lured in by the milk or anything!"
10140-101400210 = "I'm sleepy..."
10140-101400220 = "Did you go on a night operation yesterday?"
10140-101400230 = "No."
10140-101400240 = "I was watching some interesting short videos..."
10140-101400250 = "and ended up staying up late..."
10140-101400260 = "Time feels like it flows faster when you watch them, doesn't it?"
10140-101400270 = "They're kinda more addictive than long videos."
10140-101400280 = "It does."
10140-101400290 = "Lately I've been watching lifehack videos, but..."
10140-101400300 = "Despite claiming to show tricks, it's mostly videos of people using weird tools."
10140-101400310 = "Well, it's weird to complain about inefficiency in short videos though."
10140-101400320 = "But it's exciting to think about how to overcome difficulties by mastering the use of ordinary tools."
10140-101400330 = "It's like FAQ."
10140-101400340 = "FAQ? What's that?"
10140-101400350 = "Hmm... it's a long story to explain, but..."
10140-101400360 = "It's kind of like a synonym for lifehack."
10140-101400370 = "?"
10140-101400380 = "Adults occasionally use weird slang."
10140-101400390 = "Around here..."
10140-101400400 = "Are there any places where I can take an ID photo?"
10140-101400410 = "I don't think there was a photo studio nearby..."
10140-101400420 = "What's the sudden matter?"
10140-101400430 = "I have to get a new ID issued for an operation, but..."
10140-101400440 = "I need a new ID photo..."
10140-101400450 = "I can't use an old one."
10140-101400460 = "Why not use a photo booth?"
10140-101400470 = "A photo booth?"
10140-101400480 = "Yes. They're usually in front of train stations."
10140-101400490 = "You can use them anytime, so why not give it a try?"
10140-101400500 = "A photo booth is a little..."
10140-101400510 = "..."
10140-101400520 = "I guess it can't be helped."
10140-101400530 = "Understood. Thanks."
10140-101400540 = "I've been playing a recently released mobile RPG..."
10140-101400550 = "I feel like the tank's abilities in this game are too low."
10140-101400560 = "Besides, isn't it weird that their DPS is lower than a monk's?"
10140-101400570 = "Isn't it just game balance?"
10140-101400580 = "A shield gives off a defensive vibe after all..."
10140-101400590 = "But..."
10140-101400600 = "Shields can be used for things other than defense, you know."
10140-101400610 = "Depending on the situation, they can be more terrifying than other weapons."
10140-101400620 = "A shield becoming a weapon...?"
10140-101400630 = "Well, it is a chunk of iron after all."
10140-101400640 = "Even the one I use weighs a few dozen kilograms, you know."
10140-101400650 = "You've been carrying that around with one hand this whole time!?"
10140-101400660 = "?"
10140-101400670 = "Of course. I have to hold my gun too."
10140-101400680 = "Tanks really are strong, huh..."
10140-101400690 = "Sensei, did you hear that rumor?"
10140-101400700 = "I heard a robber appeared in this town recently."
10140-101400710 = "They say they follow people from deserted places..."
10140-101400720 = "and steal their wallets and stuff."
10140-101400730 = "That's a dangerous rumor..."
10140-101400740 = "Has the culprit not been caught yet?"
10140-101400750 = "Valkyrie is investigating, so I think they'll be caught soon, but..."
10140-101400760 = "But you be careful too, Sensei."
10140-101400770 = "Even though you're weaker than us to begin with, you often walk alone at night, right?"
10140-101400780 = "If anything..."
10140-101400790 = "I'll go pick you up."
10140-101400800 = "To think you would come pick me up, I'm shy."
10140-101400810 = "Will you come in an apron?"
10140-101400820 = "Shut up!"
10140-101400830 = "That's not what I meant!"