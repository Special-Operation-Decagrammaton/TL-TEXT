[translation]
10051-100510010 = "Desculpe, Sensei."
10051-100510020 = "Por acaso, meu jaleco está aí na Schale?"
10051-100510030 = "Seria este? Estava pendurado no sofá."
10051-100510040 = "É esse mesmo! Que bom que você achou..."
10051-100510050 = "Parece que esqueci quando o tirei na sala de descanso."
10051-100510060 = "Eu estava pensando em começar a trabalhar agora, mas..."
10051-100510070 = "O problema é que meu outro jaleco também está lavando."
10051-100510080 = "Quer que eu leve para você?"
10051-100510090 = "Hmm... Não, tudo bem."
10051-100510100 = "Vou procurar algo que possa servir como substituto."
10051-100510110 = "Lembra que eu apresentei a Rai-chan com especificações especiais no último Grande Festival de Esportes?"
10051-100510120 = "Desde então, várias empresas me pediram para desenvolver robôs de torcida."
10051-100510130 = "Se fosse só para criar um robô de torcida comum, seria fácil, mas..."
10051-100510140 = "Eles vieram me pedir especificamente, então fazer algo simples mancharia o nome do Clube de Engenharia."
10051-100510150 = "Um robô normal não seria suficiente...?"
10051-100510160 = "Não, isso não serve."
10051-100510170 = "Como Clube de Engenharia, vamos desenvolver uma nova invenção!"
10051-100510180 = "Tenho certeza de que é isso que o cliente quer."
10051-100510190 = "S-Será que sim...?"
10051-100510200 = "Então, eu queria te pedir um favor. Você poderia vir para a Millennium mais tarde?"
10051-100510210 = "Quero testar o protótipo do robô de torcida o mais rápido possível..."
10051-100510220 = "Quero que você veja o robô, Sensei."
10051-100510230 = "Que problema... Sensei, você está bem agora?"
10051-100510240 = "Algum problema?"
10051-100510250 = "É sobre aquele pedido de desenvolvimento do robô de torcida que conversamos outro dia."
10051-100510260 = "Estou aumentando a resistência das articulações do robô e fazendo modificações para que ele suporte movimentos na velocidade do som, mas..."
10051-100510270 = "Parece que vai ser difícil terminar dentro do prazo."
10051-100510280 = "Velocidade do som não é um exagero...?"
10051-100510290 = "Que tal explicar a situação e pedir para adiarem o prazo de entrega?"
10051-100510300 = "Talvez..."
10051-100510310 = "Mas eu preciso corresponder às expectativas do cliente que confiou em mim para este pedido."
10051-100510320 = "Como uma Meister, não é algo de que eu me orgulhe, mas..."
10051-100510330 = "Chegando a este ponto, a única solução é resolver com o corpo...!"
10051-100510340 = "...C-Com o corpo!?"
10051-100510350 = "Sensei, me desculpe..."
10051-100510360 = "Sua garganta ainda está rouca?"
10051-100510370 = "Sim, está."
10051-100510380 = "Está até atrapalhando na hora de conversar com as membros do clube..."
10051-100510390 = "Por isso, estou projetando um novo dispositivo de auxílio à comunicação."
10051-100510400 = "Para que até uma voz baixa possa ser ouvida..."
10051-100510410 = "É um mecanismo que grava o áudio de entrada, amplifica o volume e depois o reproduz."
10051-100510420 = "...Isso é um megafone, não é?"
10051-100510430 = "Ultimamente, sinto que as membros do clube estão meio desanimadas."
10051-100510440 = "Sensei, você tem alguma ideia do porquê?"
10051-100510450 = "Bem, teve aquela prova outro dia."
10051-100510460 = "Será que as notas não foram boas?"
10051-100510470 = "Entendo..."
10051-100510480 = "Mas eu achava que os resultados de todas não tinham sido ruins."
10051-100510490 = "Não, quer dizer que não foram satisfatórios o suficiente."
10051-100510500 = "Seria bom se houvesse uma maneira de animá-las."
10051-100510510 = "Pois é..."
10051-100510520 = "Nesse caso, acho que eu, a presidente, vou ter que dar um jeito."
