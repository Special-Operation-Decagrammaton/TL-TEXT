[translation]
10051-100510010 = "すまない、先生"
10051-100510020 = "もしかして、私の白衣がシャーレにあるかい？"
10051-100510030 = "これかな？ソファーにかかってたよ"
10051-100510040 = "それだ！見つかって良かった……"
10051-100510050 = "休憩室で脱いだ時に忘れてしまったみたいで"
10051-100510060 = "これから作業を始めようと思っていたんだけど……"
10051-100510070 = "困ったことに、替えの白衣も洗濯中なんだ"
10051-100510080 = "届けにいこうか？"
10051-100510090 = "うーん……いや、大丈夫"
10051-100510100 = "代わりになりそうなものを探してみるさ"
10051-100510110 = "前回の大運動会で特別仕様の雷ちゃんを披露しただろう？"
10051-100510120 = "あれ以来、複数の業者から応援ロボットを開発してほしい、と頼まれてね"
10051-100510130 = "ただの応援ロボットを製作するだけなら簡単だけど……"
10051-100510140 = "わざわざ私に依頼してきたというのに、それではエンジニア部の名折れだ"
10051-100510150 = "普通のロボットでも良いような……？"
10051-100510160 = "いや、それではダメだよ"
10051-100510170 = "エンジニア部として新しい発明品を開発してみせよう！"
10051-100510180 = "依頼主もそれを望んでいるに決まっている"
10051-100510190 = "そ、そうなのかも……？"
10051-100510200 = "それで相談なのだけど、この後ミレニアムに来てもらえるだろうか？"
10051-100510210 = "さっそく応援ロボットの試作品を試したくて……"
10051-100510220 = "先生にロボットを見てもらいたいんだ"
10051-100510230 = "参ったな……先生、今大丈夫だろうか？"
10051-100510240 = "何か悩み事？"
10051-100510250 = "この間も話した応援ロボットの開発依頼でね"
10051-100510260 = "ロボットの関節強度を上げて、音速の動きにも耐え得る改造を施しているのだけど……"
10051-100510270 = "期限内で完成させるのが難しそうで"
10051-100510280 = "音速が無茶なんじゃ……"
10051-100510290 = "事情を説明して、納期を遅らせてもらうのは？"
10051-100510300 = "そうかもしれない……"
10051-100510310 = "けれど、私を信じて依頼してくれた依頼主の期待には応えないと"
10051-100510320 = "一人のマイスターとして、褒められた話ではないが……"
10051-100510330 = "こうなったら身体で解決するしか……！"
10051-100510340 = "……か、身体で！？"
10051-100510350 = "先生、すまない……"
10051-100510360 = "まだ喉が枯れてるの？"
10051-100510370 = "うん、そうなんだ"
10051-100510380 = "部員たちと話すのにも支障が出てしまってね……"
10051-100510390 = "そこで新型のコミュニケーション支援装置を構想しているところなんだ"
10051-100510400 = "小さな声でも届くように……"
10051-100510410 = "入力した音声を記録し、声量を拡大してから出力する仕組みさ"
10051-100510420 = "……それって拡声器だよね？"
10051-100510430 = "最近、部員たちの元気がないような気がしてね"
10051-100510440 = "先生、何か心当たりはないかい？"
10051-100510450 = "ほら、この前テストがあったから"
10051-100510460 = "成績が良くなかったとか？"
10051-100510470 = "そうか……"
10051-100510480 = "みんな結果は悪くなかったはずなんだが"
10051-100510490 = "いや、満足できるほどではなかったということだね"
10051-100510500 = "何か励ます方法があるといいんだけど"
10051-100510510 = "そうだな……"
10051-100510520 = "ここは部長の私が一肌脱ごうじゃないか"
