10079-100790660 = "Ah, é."
10079-100790670 = "Só pra deixar claro,"
10079-100790680 = "Eu não sou tão violenta assim normalmente, tá?"
10079-100790690 = "Não me entenda mal, ok?"
10079-100790700 = "Eu não pensei nada disso, mas..."
