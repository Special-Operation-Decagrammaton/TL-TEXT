[translation]
10029-100290010 = "Ir aonde quero ir, dormir quando quero dormir"
10029-100290020 = "E comer o que quero comer, onde quero comer"
10029-100290030 = "Viver como eu quiser, sem amarras, sem conhecer restrições!"
10029-100290040 = "É como um biscoito caseiro!"
10029-100290050 = "… Hum, do que estávamos falando?"
10029-100290060 = "É alguma citação famosa?"
10029-100290070 = "Hmm…"
10029-100290080 = "Ainda não é o suficiente."
10029-100290090 = "Essa reação não é o bastante."
10029-100290100 = "Falta romantismo, Sensei."
10029-100290110 = "Então, que tal eu ensinar um pouco de romantismo para esse Sensei?"
10029-100290120 = "Hehe, não precisa se preocupar."
10029-100290130 = "Não vou deixar você se entediar."
10029-100290140 = "O mundo é duro."
10029-100290150 = "É difícil aceitar ideologias diferentes das suas, e as pessoas raramente conseguem se aceitar..."
10029-100290160 = "Mas se conseguíssemos superar isso, poderíamos alcançar um novo lugar."
10029-100290170 = "Lamentável, verdadeiramente lamentável... Você não acha, Sensei?"
10029-100290180 = "Que papo pesado... O que aconteceu?"
10029-100290190 = "Aconteceu alguma coisa ruim...?"
10029-100290200 = "Não, nada demais..."
10029-100290210 = "É que de repente eu pensei nisso."
10029-100290220 = "Mas..."
10029-100290230 = "Sim, com você talvez dê certo, Sensei."
10029-100290240 = "Espere por mim, Sensei."
10029-100290250 = "Estou indo aí."
10029-100290260 = "Obrigada por hoje, Sensei."
10029-100290270 = "Foi assim da outra vez também, mas conversar com você me deixa mais leve."
10029-100290280 = "Só se não for incômodo para você, Sensei."
10029-100290290 = "Vamos conversar assim de novo, tá bom?"
10029-100290300 = "Sensei."
10029-100290310 = "Hoje tem um grande evento, um evento tão grande que não consigo fazer sozinha."
10029-100290320 = "É a minha deixa?"
10029-100290330 = "O que é dessa vez?"
10029-100290340 = "Hehe, desta vez é algo 'romântico'."
10029-100290350 = "É uma das coisas mais românticas do mundo, sem dúvida."
10029-100290360 = "Então..."
10029-100290370 = "Eu recomendo muito que você venha."
10029-100290380 = "Vou ficar te esperando, então."
10029-100290390 = "Sensei, só para garantir..."
10029-100290400 = "...O que aconteceu hoje é segredo, tá bom?"
10029-100290410 = "O sol quentinho, a brisa suave..."
10029-100290420 = "O céu está alto, e o mundo brilha em azul..."
10029-100290430 = "É um desperdício deixar um dia como este simplesmente passar..."
10029-100290440 = "Onde você vai hoje?"
10029-100290450 = "Está no meio de um piquenique?"
10029-100290460 = "Nihi."
10029-100290470 = "Boa, muito boa. Você está pegando o jeito, Sensei."
10029-100290480 = "Sendo assim, vou pular o resto."
10029-100290490 = "Estou te esperando!"
10029-100290500 = "Hoje foi muito divertido, Sensei."
10029-100290510 = "De agora em diante, se algo acontecer, conto com você."
10029-100290520 = "……Mesmo que não aconteça nada, né?"
