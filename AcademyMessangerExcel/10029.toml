[translation]
10029-100290010 = "行きたいところに行き、寝たい時に眠り"
10029-100290020 = "そして、食べたいものを食べたいところで食べる"
10029-100290030 = "何にも縛られず、制約など知ったことなく、思いのままに生きていく！"
10029-100290040 = "それはまるで、手作りのクッキーのように！"
10029-100290050 = "……えっと、何の話？"
10029-100290060 = "何かの名言？"
10029-100290070 = "うーむ……"
10029-100290080 = "まだまだだね"
10029-100290090 = "その反応じゃあ足りないなー"
10029-100290100 = "ロマンが足りないよ、先生"
10029-100290110 = "ではそんな先生に、私がロマンを教えてあげよっかな"
10029-100290120 = "ふふっ、心配しないで良いよー"
10029-100290130 = "退屈はさせないからさ"
10029-100290140 = "世の中は厳しい"
10029-100290150 = "自分と異なる思想を受け入れることは難しく、お互いを受け入れることがなかなかできない……"
10029-100290160 = "そこを乗り越えれば、新しい場所にたどり着けるはずなのに"
10029-100290170 = "嘆かわしい、実に嘆かわしい……先生はそう思わない？"
10029-100290180 = "重い話だね……どうしたの？"
10029-100290190 = "何か辛いことでもあった……？"
10029-100290200 = "ううん、別に―"
10029-100290210 = "ただ、ふとそう思っただけ"
10029-100290220 = "でも"
10029-100290230 = "うん、先生なら大丈夫かも"
10029-100290240 = "待ってて、先生"
10029-100290250 = "すぐ行く"
10029-100290260 = "今日はありがとねー、先生"
10029-100290270 = "この前もそうだったけど、何だか先生と話すとスッキリする"
10029-100290280 = "先生さえ良ければだけど"
10029-100290290 = "また、こんな感じでよろしくね"
10029-100290300 = "先生"
10029-100290310 = "今日は重大イベントがあるよ、私ひとりだけじゃできない大きなイベントが"
10029-100290320 = "私の出番かな？"
10029-100290330 = "今回はどんなこと？"
10029-100290340 = "ふふっ、今回は「ロマンティックなこと」だよ"
10029-100290350 = "世の中でもかなーりロマンティック部類に入るね、間違いない"
10029-100290360 = "そんなわけで"
10029-100290370 = "ぜひ来ることをおススメするよ"
10029-100290380 = "じゃあ待ってるね"
10029-100290390 = "先生、念のためだけど"
10029-100290400 = "……今日のことは、みんなには秘密だよー？"
10029-100290410 = "暖かい太陽、優しい風"
10029-100290420 = "空は高くて、世界は青く輝いてて"
10029-100290430 = "ただ流れていくにはあまりにも惜しい……"
10029-100290440 = "今日はどこに出かけてるの？"
10029-100290450 = "ピクニックの最中だったり？"
10029-100290460 = "にひ"
10029-100290470 = "良いね、すごく良い。先生も慣れてきたね"
10029-100290480 = "ということでこれ以上は省略"
10029-100290490 = "待ってるね！"
10029-100290500 = "今日は本当に楽しかったよ、先生"
10029-100290510 = "これからも、何かあったらよろしくー"
10029-100290520 = "……何も無くても、ね"
