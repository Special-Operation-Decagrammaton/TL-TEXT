[translation]
10122-101220010 = "Sensei, olá olá~"
10122-101220020 = "Chegou? Olá!"
10122-101220030 = "Olá, Mika"
10122-101220040 = "Hehehe"
10122-101220050 = "Pensei em te cumprimentar de novo"
10122-101220060 = "Então te mandei uma mensagem!"
10122-101220070 = "Não te incomodei?"
10122-101220080 = "De jeito nenhum, não incomodou."
10122-101220090 = "Que bom!"
10122-101220100 = "Onde você está agora, Sensei?"
10122-101220110 = "Posso ir te encontrar um pouco mais tarde?"
10122-101220120 = "Ei, Sensei."
10122-101220130 = "Tenho uma coisa que quero perguntar..."
10122-101220140 = "Sensei, você também tem...?"
10122-101220150 = "Outra face, ou melhor..."
10122-101220160 = "Algo que nem o Sensei conhece,"
10122-101220170 = "Um outro lado, sabe?"
10122-101220180 = "Acho que sim."
10122-101220190 = "Provavelmente."
10122-101220200 = "Ah, é?"
10122-101220210 = "Entendi."
10122-101220220 = "Adultos também têm..."
10122-101220230 = "Hehe."
10122-101220240 = "De alguma forma, me senti aliviada."
10122-101220250 = "Talvez eu queira ver o outro lado do Sensei também♪"
10122-101220260 = "Sensei... está ocupado?"
10122-101220270 = "Está tudo bem agora?"
10122-101220280 = "Estou livre."
10122-101220290 = "Uau!"
10122-101220300 = "Que bom!"
10122-101220310 = "Mika, quer ficar à toa comigo?"
10122-101220320 = "!! S-sim!!"
10122-101220330 = "Quero!!"
10122-101220340 = "Hehehe."
10122-101220350 = "Onde você está~?"
10122-101220360 = "A aula de hoje"
10122-101220370 = "Foi a mais divertida de todas!"
10122-101220380 = "Mais do que uma aula, talvez tenha sido uma brincadeira...?"
10122-101220390 = "Hehehe, talvez sim."
10122-101220400 = "Vamos... brincar de novo, tá?☆"
10122-101220410 = "Sensei, você sabia?"
10122-101220420 = "Na praia,"
10122-101220430 = "Há muitas coisas bonitas."
10122-101220440 = "Sensei, você já viu?"
10122-101220450 = "Por exemplo?"
10122-101220460 = "Hmm..."
10122-101220470 = "Eu... talvez?"
10122-101220480 = "Ahaha, é brincadeira!☆"
10122-101220490 = "Consigo imaginar a cara que o Sensei fez!"
10122-101220500 = "Falando em coisas bonitas na praia..."
10122-101220510 = "Conchas, talvez."
10122-101220520 = "Senseirrr...?"
10122-101220530 = "Heh heh."
10122-101220540 = "Mika...?"
10122-101220550 = "Um pouco."
10122-101220560 = "L-lá atrás..."
10122-101220570 = "Alto."
10122-101220580 = "Sensei."
10122-101220590 = "..."
10122-101220600 = "Me desculpe."
10122-101220610 = "Acabei dormindo, né..."
10122-101220620 = "Era só um suco, mas..."
10122-101220630 = "Quando pensei que estava tudo bem assim,"
10122-101220640 = "parece que minha tensão se desfez..."
10122-101220650 = "Me desculpe por te incomodar."
10122-101220660 = "Descanse bem, Mika."
10122-101220670 = "Sim, obrigada."
10122-101220680 = "Sensei, sobre... o que aconteceu hoje..."
10122-101220690 = "Uhm..."
10122-101220700 = "Não, não é nada."
10122-101220710 = "Sensei, descanse bem também!"
10122-101220720 = "Sensei, você está livre agora?"
10122-101220730 = "Me dê só um pouquinho do seu tempo!"
10122-101220740 = "Na verdade..."
10122-101220750 = "...eu encontrei um lugar maravilhoso!"
10122-101220760 = "Se não vier rápido, talvez não dê tempo!"
10122-101220770 = "Entendi, onde você está agora?"
10122-101220780 = "Oba!"
10122-101220790 = "É o seguinte?"
10122-101220800 = "Sensei! Você está com fome, né?"
10122-101220810 = "Talvez não esteja..."
10122-101220820 = "Lá vem você com essa de novo~"
10122-101220830 = "Eu sei, sabia?"
10122-101220840 = "Você está com fome, não está?"
10122-101220850 = "Não está morrendo de fome, por acaso~?"
10122-101220860 = "B-bem, agora que você falou...?"
10122-101220870 = "Ehehe."
10122-101220880 = "Espere por mim! Vou levar um bento!"
10122-101220890 = "Feito pela Mika?"
10122-101220900 = "Na verdade..."
10122-101220910 = "Eu fiz para o Sensei."
10122-101220920 = "Você vai comer?"
10122-101220930 = "Sensei."
10122-101220940 = "Sim."
10122-101220950 = "Uhm."
10122-101220960 = "Sempre, de verdade..."
10122-101220970 = "Muito obrigada."
