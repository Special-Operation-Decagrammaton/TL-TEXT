[translation]
20023-200230010 = "ヴァルキューレ警察学校、公安局局長の尾刃カンナです"
20023-200230020 = "明日の10時30分頃、シャーレの執務室を訪問させていただきます"
20023-200230030 = "ついにこの時が……"
20023-200230040 = "濡れ衣です！"
20023-200230050 = "……どういうことでしょうか？"
20023-200230060 = "以前お約束した、シャーレの当番の話ですが……"
20023-200230070 = "何か困るようなことでも？"
20023-200230080 = "ああ、当番のことね……"
20023-200230090 = "何も問題ないよ、大丈夫"
20023-200230100 = "でしたら良かったのですが……"
20023-200230110 = "それでは明日、先ほどお伝えした時刻に伺います"
20023-200230120 = "先生、夜分遅くに失礼いたします"
20023-200230130 = "ヴァルキューレ警察学校の尾刃カンナです"
20023-200230140 = "どうしたの？"
20023-200230150 = "こちらの勝手で申し訳ありませんが……"
20023-200230160 = "来週の当番、日程を変更しても良いですか？"
20023-200230170 = "それくらい問題ないよ"
20023-200230180 = "何かトラブル？"
20023-200230190 = "また警備局のバカ共が……"
20023-200230200 = "いえ"
20023-200230210 = "忘れてください"
20023-200230220 = "緊急の要請が来たため、私も作戦に加わることになりまして"
20023-200230230 = "大変だね……"
20023-200230240 = "これも公安局局長としての務めですので"
20023-200230250 = "それでは、当番の日程は、別途メールで連絡いたします"
20023-200230260 = "事件のことは気にせず、先生はお休みになってください"
20023-200230270 = "ヴァルキューレ警察学校の食堂は安価でメニューも豊富ですが"
20023-200230280 = "開いている時間が限られています"
20023-200230290 = "仕事に集中していると、すでに閉まっていることも多いので"
20023-200230300 = "しばしば食事を抜くことも……"
20023-200230310 = "外で食べるのはダメなの？"
20023-200230320 = "いえ、そんな規則はありませんが……"
20023-200230330 = "仕事があるのに外で食事をするのは、少し気が引けるので"
20023-200230340 = "そういえば、生活安全局には"
20023-200230350 = "警備局や捜査局に転科を希望する生徒が、それなりにいるようです"
20023-200230360 = "聞いたことあるかも"
20023-200230370 = "多いかな……？"
20023-200230380 = "そういうカンナは、最初から公安局志望だったの？"
20023-200230390 = "私ですか？"
20023-200230400 = "私の場合"
20023-200230410 = "1年生の時に生活安全局を志望しましたが……"
20023-200230420 = "その顔で市民の窓口に立つような仕事は難しいと言われ……"
20023-200230430 = "結構な……"
20023-200230440 = "何か言いたいことでも？"
20023-200230450 = "いやっ、何でもないよ！"
