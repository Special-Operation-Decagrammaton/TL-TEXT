[translation]
20023-200230010 = "Sou Oba Kanna, diretora do Departamento de Segurança Pública da Escola de Polícia Valkyrie."
20023-200230020 = "Amanhã, por volta das 10:30, farei uma visita ao escritório da Schale."
20023-200230030 = "Finalmente chegou a hora..."
20023-200230040 = "Fui incriminado!"
20023-200230050 = "......O que o senhor quer dizer com isso?"
20023-200230060 = "Estou falando sobre o turno de plantão na Schale que combinamos anteriormente..."
20023-200230070 = "Há algum problema quanto a isso?"
20023-200230080 = "Ah, sobre o plantão..."
20023-200230090 = "Sem problemas, tudo certo."
20023-200230100 = "Se é assim, fico aliviada..."
20023-200230110 = "Sendo assim, irei amanhã no horário que mencionei."
20023-200230120 = "Sensei, peço desculpas pelo horário."
20023-200230130 = "Aqui é Oba Kanna, da Escola de Polícia Valkyrie."
20023-200230140 = "Aconteceu alguma coisa?"
20023-200230150 = "Peço desculpas pela inconveniência, mas..."
20023-200230160 = "Seria possível alterar a data do meu plantão da semana que vem?"
20023-200230170 = "Claro, sem problemas."
20023-200230180 = "Aconteceu algum imprevisto?"
20023-200230190 = "Aqueles idiotas da Divisão de Segurança de novo..."
20023-200230200 = "Não."
20023-200230210 = "Esqueça isso."
20023-200230220 = "Recebemos um chamado de emergência e eu também terei que participar da operação."
20023-200230230 = "Deve estar sendo difícil..."
20023-200230240 = "Este também é o meu dever como Diretora do Departamento de Segurança Pública."
20023-200230250 = "Sendo assim, enviarei as novas datas do plantão por e-mail separadamente."
20023-200230260 = "Não se preocupe com o incidente e vá descansar, Sensei."
20023-200230270 = "O refeitório da Escola de Polícia Valkyrie é barato e o cardápio é variado, mas..."
20023-200230280 = "O horário de funcionamento é limitado."
20023-200230290 = "Muitas vezes, quando estou concentrada no trabalho, ele já está fechado."
20023-200230300 = "Então eu acabo pulando refeições com frequência..."
20023-200230310 = "Não pode comer fora?"
20023-200230320 = "Não, não existe nenhuma regra contra isso, mas..."
20023-200230330 = "Eu me sinto um pouco mal de sair para comer enquanto ainda tenho trabalho a fazer."
20023-200230340 = "Por falar nisso, na Divisão de Segurança Comunitária..."
20023-200230350 = "Parece que há um número razoável de alunos que desejam se transferir para a Divisão de Segurança ou para a Divisão de Investigação."
20023-200230360 = "Acho que já ouvi falar disso."
20023-200230370 = "Será que são muitos...?"
20023-200230380 = "E você, Kanna? Sempre quis ir para o Departamento de Segurança Pública desde o começo?"
20023-200230390 = "Eu?"
20023-200230400 = "No meu caso,"
20023-200230410 = "No meu primeiro ano, eu queria entrar para a Divisão de Segurança Comunitária, mas..."
20023-200230420 = "Me disseram que seria difícil trabalhar na recepção aos cidadãos com esse meu rosto..."
20023-200230430 = "Faz sent..."
20023-200230440 = "Tem algo que gostaria de dizer?"
20023-200230450 = "N-Não, não é nada!"