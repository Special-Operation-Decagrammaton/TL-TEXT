[translation]
20023-200230010 = "Aqui é Kanna Oba, chefe do Departamento de Segurança Pública da Academia de Polícia Valkyrie."
20023-200230020 = "Gostaria de visitar o escritório do Schale amanhã, por volta das 10h30."
20023-200230030 = "Finalmente chegou a hora..."
20023-200230040 = "É uma acusação falsa!"
20023-200230050 = "...O que você quer dizer com isso?"
20023-200230060 = "Sobre o assunto do plantão no Schale que combinamos anteriormente..."
20023-200230070 = "Há algum problema com isso?"
20023-200230080 = "Ah, sobre o plantão..."
20023-200230090 = "Não há problema algum, está tudo bem."
20023-200230100 = "Fico feliz em ouvir isso..."
20023-200230110 = "Então, nos veremos amanhã no horário que mencionei."
20023-200230120 = "Professor, desculpe incomodar a uma hora tão tardia."
20023-200230130 = "Aqui é Kanna Oba, da Academia de Polícia Valkyrie."
20023-200230140 = "O que houve?"
20023-200230150 = "Sinto muito por ser inconveniente, mas..."
20023-200230160 = "Poderia mudar a data do meu plantão da semana que vem?"
20023-200230170 = "Não tem problema nenhum."
20023-200230180 = "Algum problema aconteceu?"
20023-200230190 = "Aqueles idiotas do Departamento de Segurança de novo..."
20023-200230200 = "Não."
20023-200230210 = "Por favor, esqueça o que eu disse."
20023-200230220 = "Recebemos um chamado de emergência e terei que participar da operação."
20023-200230230 = "Isso é difícil, hein..."
20023-200230240 = "Este também é o meu dever como chefe do Departamento de Segurança Pública."
20023-200230250 = "Enviarei a nova data do plantão por e-mail posteriormente."
20023-200230260 = "Não se preocupe com o incidente e descanse, Professor."
20023-200230270 = "O refeitório da Academia de Polícia Valkyrie é barato e tem um cardápio variado, mas..."
20023-200230280 = "O horário de funcionamento é limitado."
20023-200230290 = "Como fico muito concentrada no trabalho, muitas vezes ele já está fechado quando termino."
20023-200230300 = "Por isso, acabo pulando refeições com frequência..."
20023-200230310 = "Não pode comer fora?"
20023-200230320 = "Não, não existe tal regra, mas..."
20023-200230330 = "Sinto-me um pouco culpada por sair para comer enquanto ainda há trabalho a ser feito."
20023-200230340 = "Falando nisso, parece que no Departamento de Segurança da Vida..."
20023-200230350 = "Há um número considerável de alunas que desejam ser transferidas para o Departamento de Segurança ou para o Departamento de Investigação."
20023-200230360 = "Acho que já ouvi falar disso."
20023-200230370 = "Será que são muitas...?"
20023-200230380 = "E você, Kanna, queria entrar no Departamento de Segurança Pública desde o início?"
20023-200230390 = "Eu?"
20023-200230400 = "No meu caso..."
20023-200230410 = "Eu queria entrar no Departamento de Segurança da Vida no meu primeiro ano, mas..."
20023-200230420 = "Disseram que, com essa minha cara, seria difícil trabalhar no atendimento ao público..."
20023-200230430 = "Que coisa..."
20023-200230440 = "Tem algo a dizer sobre isso?"
20023-200230450 = "Não, não é nada!"
