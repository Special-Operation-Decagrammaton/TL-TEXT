[translation]
13002-1223 = "どうして特盛より上の大きさの牛丼は売られていないのでしょうか？"
13002-1224 = "特盛で十分大きくない……？"
13002-1225 = "いえ、特盛一杯ではお腹いっぱいになれません"
13002-1226 = "どうしてアカリはそんなにたくさん食べるの？"
13002-1227 = "フフッ、愚問ですね。私がたくさん食べる理由は簡単です"
13002-1228 = "なぜなら……そこに食べ物があるからです！"
13002-1229 = "先生はラーメンを食べる時、麺から行きますか？それともスープからです？"
13002-1230 = "麺からかな"
13002-1231 = "スープからかな"
13002-1232 = "なるほど、そうでしたか"
13002-1233 = "なるほど、そうでしたか"
13002-1234 = "個人的にはスープ一択ですね"
13002-1235 = "スープこそ、ラーメンの全てが詰まった精髄と言っても過言ではありません"
13002-1236 = "そこにすり潰したニンニクが加わった日には……ああ、なんて素晴らしい！"
13002-1237 = "なんだか、おじさんみたいな好みだね……"
13002-1238 = "食べ放題というのは、本当に素敵な文化だと思います"
13002-1239 = "一定の価格で、食べたいものを好きなだけ食べられるなんて……"
13002-1240 = "このアイデアを出した方は、天才に違いありません！"
13002-1241 = "アカリをお客さんとして迎える側にとっては天災だね……"
13002-1242 = "次の大食い大会の種目は、「カレー」に決まったそうです"
13002-1243 = "カレー……ちょっと自信がないので、前もって特訓しておかないとです"
13002-1244 = "アカリにも苦手な食べ物があるんだ？"
13002-1245 = "食べられはするのですが、大食いにはちょっと……というものはあります"
13002-1246 = "例えばカレーですと、途中に何度もお水を飲んでしまうので……"
13002-1247 = "逆にお寿司なんかは、私が好きなこともあって他の倍くらい食べられます"
13002-1248 = "大食いだからといって、好き嫌いがないわけではないんですよ"
