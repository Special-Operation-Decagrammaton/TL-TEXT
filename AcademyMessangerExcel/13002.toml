[translation]
13002-1223 = "Por que não vendem gyudon maior que o tamanho super?"
13002-1224 = "O tamanho super não é grande o suficiente...?"
13002-1225 = "Não, uma tigela de tamanho super não me satisfaz."
13002-1226 = "Por que a Akari come tanto?"
13002-1227 = "Hehe, que pergunta boba. A razão pela qual eu como tanto é simples."
13002-1228 = "Porque... a comida está lá!"
13002-1229 = "Sensei, quando você come ramen, você começa pelo macarrão? Ou pelo caldo?"
13002-1230 = "Pelo macarrão, eu acho."
13002-1231 = "Pelo caldo, eu acho."
13002-1232 = "Entendi, é assim."
13002-1233 = "Entendi, é assim."
13002-1234 = "Pessoalmente, é só o caldo para mim."
13002-1235 = "Não é exagero dizer que o caldo é a essência de tudo no ramen."
13002-1236 = "E se alho amassado for adicionado... Ah, que maravilhoso!"
13002-1237 = "Parece um gosto de tio..."
13002-1238 = "Acho que o 'coma à vontade' é uma cultura realmente maravilhosa."
13002-1239 = "Poder comer o quanto quiser por um preço fixo..."
13002-1240 = "A pessoa que teve essa ideia deve ser um gênio!"
13002-1241 = "Para quem recebe a Akari como cliente, é um desastre natural..."
13002-1242 = "Parece que a próxima competição de comer muito será de 'curry'."
13002-1243 = "Curry... não tenho muita confiança, então preciso treinar com antecedência."
13002-1244 = "A Akari também tem comidas que não gosta?"
13002-1245 = "Eu consigo comer, mas há algumas coisas que não são muito boas para comer em grande quantidade..."
13002-1246 = "Por exemplo, com curry, acabo bebendo água muitas vezes no meio..."
13002-1247 = "Por outro lado, sushi, que eu gosto, consigo comer o dobro do que comeria de outras coisas."
13002-1248 = "Só porque eu como muito, não significa que não tenho preferências."
