[translation]
10053-100530010 = "Sensei, e a fatura deste mês?"
10053-100530020 = "O prazo de entrega está chegando, mas ainda não a recebi."
10053-100530030 = "Não está na pasta de relatórios que eu entreguei para a Yuuka outro dia?"
10053-100530040 = "Ah, encontrei."
10053-100530050 = "Tenho andado tão ocupada ultimamente... Desculpe."
10053-100530060 = "Você parece especialmente ocupada ultimamente."
10053-100530070 = "Estou ocupada, de fato... mas não há o que fazer por enquanto."
10053-100530080 = "É porque o Grande Festival da Auréola, organizado pela Millennium, está chegando."
10053-100530090 = "Além do trabalho normal do Seminário, também tenho que cuidar dos preparativos do Grande Festival da Auréola como representante da Millennium, então não tenho tempo nem para descansar..."
10053-100530100 = "Você se esforçou muito, Yuuka."
10053-100530110 = "Mal posso esperar pelo Grande Festival da Auréola."
10053-100530120 = "Conversar com você me animou um pouco, Sensei."
10053-100530130 = "Se eu continuar me esforçando demais e desmaiar, todo o esforço terá sido em vão..."
10053-100530140 = "Acho que vou começar a cuidar melhor da minha saúde."
10053-100530150 = "Falando nisso, parece que não poderemos usar o refeitório da escola durante o Grande Festival da Auréola."
10053-100530160 = "Deve haver algumas barracas por perto, mas no dia estarei tão ocupada com o trabalho do comitê executivo que não parece que terei tempo de passar por lá..."
10053-100530170 = "Acho que desta vez vou preparar uma marmita."
10053-100530180 = "É uma boa ideia."
10053-100530190 = "Yuuka, você costuma cozinhar?"
10053-100530200 = "Não..."
10053-100530210 = "Eu nunca cozinhei de verdade, mas..."
10053-100530220 = "Pensei que esta seria uma boa oportunidade para praticar."
10053-100530230 = "Sensei, as eliminatórias distritais do Intercolegial de Kivotos estão chegando, não é?"
10053-100530240 = "Parece que o time de beisebol da Millennium vai participar também, mas..."
10053-100530250 = "Não sei, não... Afinal, nosso time de beisebol é bem fraco."
10053-100530260 = "Yuuka, você assiste muito beisebol?"
10053-100530270 = "Bem, o normal, eu acho.\nNão que eu torça com tanto entusiasmo, mas..."
10053-100530280 = "Quando o time da Millennium joga, eu pelo menos dou o meu apoio."
10053-100530290 = "O agitado Grande Festival da Auréola finalmente acabou, não é...?"
10053-100530300 = "Obrigada pelo seu esforço, Sensei."
10053-100530310 = "Você também se esforçou, Yuuka."
10053-100530320 = "Obrigada. Mas, como membro do Seminário, é apenas o meu dever."
10053-100530330 = "Sensei, é verdade.\nComo eu estava ocupada com o Grande Festival da Auréola, ainda não cuidei da papelada sobre o pedido de cooperação à Schale."
10053-100530340 = "Assim que eu terminar minhas tarefas atuais, irei até a Schale."
10053-100530350 = "Então, nos vemos mais tarde."
10053-100530370 = "Eu tentei adicionar um pequeno recado..."
10053-100530380 = "O-o que acha?"
10053-100530390 = "Poderia ser um pouco mais fofo..."
10053-100530400 = "Não é um pouco formal demais?"
10053-100530410 = "Hmm..."
10053-100530430 = "...É só para você, Sensei."
