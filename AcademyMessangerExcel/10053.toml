[translation]
10053-100530010 = "先生、今月分の請求書はどうされましたか？"
10053-100530020 = "そろそろ提出期限ですが、まだ受け取っていないので"
10053-100530030 = "この前ユウカに渡した報告書のファイルにない？"
10053-100530040 = "あっ、見つかりました"
10053-100530050 = "最近バタバタしていて……失礼しました"
10053-100530060 = "最近、特に忙しそうだよね"
10053-100530070 = "たしかに忙しくはありますが……今は仕方ありません"
10053-100530080 = "もうすぐミレニアム主催の[ruby=こうりんたいさい]晄輪大祭[/ruby]がありますからね"
10053-100530090 = "通常のセミナーの仕事以外にも、ミレニアムとして晄輪大祭の準備も進めるとなると、休む暇もなくて……"
10053-100530100 = "お疲れさま、ユウカ"
10053-100530110 = "晄輪大祭、楽しみにしてるね"
10053-100530120 = "先生とお話してたら、少し元気が出ました"
10053-100530130 = "このまま無理をして倒れたら、元も子もありませんね……"
10053-100530140 = "きちんと健康管理にも気を配ろうと思います"
10053-100530150 = "そういえば、今回の[ruby=こうりんたいさい]晄輪大祭[/ruby]中は校内のカフェテリアを利用できないみたいです"
10053-100530160 = "近くに屋台が出店されるはずですが、当日は実行委員の仕事に追われて立ち寄る時間もなさそうですし……"
10053-100530170 = "今回はお弁当を作っていこうと思います"
10053-100530180 = "いいアイデアだね"
10053-100530190 = "ユウカは普段から料理するの？"
10053-100530200 = "いえ……"
10053-100530210 = "料理らしい料理をしたことはないんですが……"
10053-100530220 = "これもいい機会ですし、練習してみようかなと"
10053-100530230 = "先生、もうすぐキヴォトスインターハイの地区予選ですね"
10053-100530240 = "ミレニアムからも野球部が出場するみたいですが……"
10053-100530250 = "どうでしょう、なにせウチの野球部は弱小チームですし"
10053-100530260 = "ユウカは野球、よく見るの？"
10053-100530270 = "まあ、人並みには\nそこまで熱心に応援しているわけではありませんが……"
10053-100530280 = "ミレニアムのチームが出場する時は、応援くらいしています"
10053-100530290 = "慌ただしかった[ruby=こうりんたいさい]晄輪大祭[/ruby]も、やっと終わりましたね……"
10053-100530300 = "お疲れさまでした、先生"
10053-100530310 = "ユウカもお疲れさま"
10053-100530320 = "ありがとうございます。ですが、セミナーの役員として当然のことですから"
10053-100530330 = "先生、そうでした\n晄輪大祭で立て込んでいたので、シャーレに協力を要請した件の事務処理ができていませんでしたね"
10053-100530340 = "手持ちの業務を片付けたら、シャーレに伺いますね"
10053-100530350 = "それでは、また後ほどお願いします"
10053-100530370 = "一言、添えてみたんですが……"
10053-100530380 = "ど、どうでしょう？"
10053-100530390 = "もう少し可愛らしくても……"
10053-100530400 = "ちょっと堅苦しくない？"
10053-100530410 = "うーん……"
10053-100530430 = "……先生だけですからね"
