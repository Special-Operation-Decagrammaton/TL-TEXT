[translation]
20055-200550010 = "Professor, eu... não consigo mais"
20055-200550020 = "entrar no armário..."
20055-200550030 = "Eu realmente queria entrar"
20055-200550040 = "Mas meu corpo..."
20055-200550050 = "Yuzu não consegue mais entrar no armário...?"
20055-200550060 = "Vou dar uma passada aí!"
20055-200550070 = "Hã?"
20055-200550080 = "N-não, não precisa se dar ao trabalho de vir..."
20055-200550090 = "Uuu..."
20055-200550100 = "...Por favor, venha"
20055-200550110 = "Então jogos são..."
20055-200550120 = "tão difíceis assim..."
20055-200550130 = "Não acredito que a Yuzu disse isso..."
20055-200550140 = "Vou dar uma passada aí!"
20055-200550150 = "Hã?"
20055-200550160 = "E-espere, por favor!"
20055-200550170 = "E-eu estou realmente bem!"
20055-200550180 = "O novo console de VR que foi lançado recentemente,"
20055-200550190 = "o 'Virtual Boss 4.0'..."
20055-200550200 = "O professor conseguiu pegar um...?"
20055-200550210 = "Eu também não consegui..."
20055-200550220 = "Nem sequer consegui colocar no carrinho..."
20055-200550230 = "Hie..."
20055-200550240 = "Eu também não consegui comprar..."
20055-200550250 = "Sempre fica difícil conseguir a cada lançamento, mas... desta vez parece que está muito popular..."
20055-200550260 = "Mas não significa que não haja nenhuma forma de conseguir!"
20055-200550270 = "Hã?"
20055-200550280 = "Existe um jeito de conseguir mesmo nessa situação!?"
20055-200550290 = "Sim, existe..."
20055-200550300 = "As coisas ficaram realmente fora de controle..."
20055-200550310 = "Espero que não se espalhem mal-entendidos estranhos..."
20055-200550320 = "Não será que isso só mostra o quanto todos ficaram surpresos com o talento da Yuzu?"
20055-200550330 = "Não é nada disso! Se rumores estranhos se espalharem..."
20055-200550340 = "Ah, é verdade... O console 'Virtual Boss 4.0' foi enviado para a sala do Clube de Desenvolvimento de Jogos."
20055-200550350 = "Naquele dia foi tudo tão corrido que não consegui pegar o prêmio..."
20055-200550360 = "Se não se importar,"
20055-200550370 = "que tal jogarmos 'Virtual Boss' juntos algum dia?"
20055-200550380 = "Vou preparar o software também!"
20055-200550390 = "Sim. Não importa o que aconteça, eu irei."
20055-200550400 = "Sim! Estarei esperando!"
20055-200550410 = "Ultimamente, tenho me acostumado cada vez mais com jogos de VR."
20055-200550420 = "Meu corpo está se movendo de forma bem mais fluida..."
20055-200550430 = "Não sobrou nenhum gênero de jogo que possa parar a UZQueen, né..."
20055-200550440 = "I-..."
20055-200550450 = "Isso..."
20055-200550460 = "Chega... não zombe de mim!"
