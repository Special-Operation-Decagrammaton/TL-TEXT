[translation]
10110-101100010 = "Professor"
10110-101100020 = "Pode ser quando estiver livre."
10110-101100030 = "Você poderia vir para a Trinity?"
10110-101100040 = "Claro que sim, mas... o que houve?"
10110-101100050 = "Aconteceu alguma coisa?"
10110-101100060 = "...Me desculpe, mas"
10110-101100070 = "É um assunto que não é apropriado para se discutir no Momotalk."
10110-101100080 = "Se possível, gostaria que fosse em segredo."
10110-101100090 = "Estarei esperando."
10110-101100100 = "Acho que você já deve ter voltado em segurança."
10110-101100110 = "Eu te chamei, mas não pude te oferecer nada."
10110-101100120 = "Sinto muito."
10110-101100130 = "Não se preocupe."
10110-101100140 = "Graças a você, eu também consegui dormir profundamente depois de muito tempo."
10110-101100150 = "Entendi."
10110-101100160 = "Até mais."
10110-101100170 = "Da próxima vez, vou preparar uma desculpa diferente."
10110-101100180 = "Professor, você poderia me dar uma mão?"
10110-101100190 = "Gostaria que você viesse me visitar..."
10110-101100200 = "Você poderia ter dito que estava se sentindo mal."
10110-101100210 = "Será que é \"aquele assunto\"...?"
10110-101100220 = "Não está exatamente certo, mas não está longe..."
10110-101100230 = "Hesito em revelar o que sinto..."
10110-101100240 = "Não pretendo mentir."
10110-101100250 = "Se eu escolhesse palavras diretas, você se preocuparia mais do que o necessário."
10110-101100260 = "A ponto de poder vir correndo imediatamente."
10110-101100270 = "Não me importo de ser preocupado com essa intensidade, mas..."
10110-101100280 = "De qualquer forma, não há o que fazer se já foi descoberto."
10110-101100290 = "Professor"
10110-101100300 = "Você poderia vir quando tiver um tempo livre?"
10110-101100310 = "Você gostou dos doces?"
10110-101100320 = "Espero que tenha sido do seu agrado."
10110-101100330 = "Foi realmente incrível!"
10110-101100340 = "A excelência da Trinity não é à toa!"
10110-101100350 = "Eu os recebi depois daquilo, mas"
10110-101100360 = "Os doces do Professor também foram, sem dúvida, os melhores."
10110-101100370 = "Não há necessidade de se preocupar."
10110-101100380 = "Ninguém menos que eu estou garantindo isso."
10110-101100390 = "Frequentemente, a percepção do tempo é variável, mas..."
10110-101100400 = "Já é noite, não é?"
10110-101100410 = "Você estava ocupado?"
10110-101100420 = "Teve muito trabalho e foi difícil?"
10110-101100430 = "Não, hoje eu estava lendo um livro."
10110-101100440 = "Se fosse trabalho, teria parecido muito mais longo."
10110-101100450 = "Quando se está absorto na leitura..."
10110-101100460 = "Um dia de 48 horas ainda pareceria pouco."
10110-101100470 = "Obrigado pela ajuda de hoje."
10110-101100480 = "A leitura a partir de agora parece que será ainda mais agradável."
10110-101100490 = "Eu também me diverti."
10110-101100500 = "Pode me chamar a qualquer hora."
10110-101100510 = "Obrigado"
10110-101100520 = "Em breve, com certeza."
10110-101100530 = "Professor"
10110-101100540 = "Parece que você virá à festa do chá da próxima vez."
10110-101100550 = "Tenho uma reunião."
10110-101100560 = "Vou aparecer a trabalho."
10110-101100570 = "Entendi."
10110-101100580 = "Entendi."
10110-101100590 = "À noite, acabo ficando sentimental."
10110-101100600 = "Acho que me deixei levar pela atmosfera e exagerei um pouco..."
10110-101100610 = "Será que consegui corresponder às expectativas?"
10110-101100620 = "Fiquei feliz em ouvir."
10110-101100630 = "É tão bom que eu gostaria de ouvir de novo e de novo."
10110-101100640 = "Você está dizendo isso de novo."
10110-101100650 = "Com certeza, um dia..."
10110-101100660 = "Uma canção mais livre."
10110-101100670 = "Espero poder te fazer ouvir quantas vezes quiser."
