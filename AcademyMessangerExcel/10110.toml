[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10110-101100010 = "Sensei" 
10110-101100020 = "Pode ser quando você estiver livre." 
10110-101100030 = "Será que você poderia dar uma passadinha\naqui em Trinity?" 
10110-101100040 = "Claro, sem problemas, mas... aconteceu alguma coisa?" 
10110-101100050 = "Tudo bem por aí?" 
10110-101100060 = "……Me desculpe," 
10110-101100070 = "Mas esse é um assunto que não é adequado\npara discutirmos pelo MomoTalk." 
10110-101100080 = "Se possível, queria que fosse um\nsegredinho só nosso." 
10110-101100090 = "Estarei te esperando." 
10110-101100100 = "Acredito que você já tenha\nvoltado em segurança." 
10110-101100110 = "Eu te chamei aqui e nem\npude te dar a devida atenção..." 
10110-101100120 = "Eu sinto muito." 
10110-101100130 = "Relaxa, não se preocupe." 
10110-101100140 = "Graças a isso, eu também consegui dormir\nprofundamente depois de muito tempo." 
10110-101100150 = "Entendo." 
10110-101100160 = "Então, até mais." 
10110-101100170 = "Na próxima vez, vou garantir que tenhamos\numa desculpa melhor para nos vermos." 
10110-101100180 = "Sensei, você poderia me emprestar\num pouco a sua mão?" 
10110-101100190 = "Gostaria muito que você viesse\nme fazer uma visita..." 
10110-101100200 = "Era só ter dito que \"não estava se sentindo bem\"..." 
10110-101100210 = "Por acaso é sobre \"aquele assunto\"...?" 
10110-101100220 = "Você não acertou em cheio, mas passou perto..." 
10110-101100230 = "Eu fico um pouco hesitante em abrir\ntodos os detalhes do meu coração..." 
10110-101100240 = "Mas não foi minha intenção contar uma mentira." 
10110-101100250 = "Se eu falasse de um jeito muito direto, você\nia ficar todo preocupadinho à toa." 
10110-101100260 = "Ao ponto de vir voando até mim\nno mesmo segundo." 
10110-101100270 = "Sinceramente... eu não acharia nada mau\nreceber esse seu tipo de preocupação calorosa, mas..." 
10110-101100280 = "De qualquer forma, já que você descobriu,\nnão há o que fazer." 
10110-101100290 = "Sensei" 
10110-101100300 = "Quando estiver livre...\nvocê poderia vir me fazer uma visitinha?" 
10110-101100310 = "Os doces agradaram o seu paladar?" 
10110-101100320 = "Ficaria feliz se tivessem sido do seu agrado." 
10110-101100330 = "Estavam realmente incríveis!" 
10110-101100340 = "A alta confeitaria de Trinity não brinca em serviço!" 
10110-101100350 = "Apesar de ter sido eu quem os provou depois," 
10110-101100360 = "Os doces do Sensei também\neram, sem dúvida, os melhores de todos." 
10110-101100370 = "Não há motivo para você se preocupar com isso." 
10110-101100380 = "Afinal, eu mesma garanto a qualidade deles." 
10110-101100390 = "A percepção do tempo é algo que costuma\nvariar bastante, mas..." 
10110-101100400 = "Já é o fim da tarde, não é?" 
10110-101100410 = "Você estava muito ocupado?" 
10110-101100420 = "Teve muito trabalho e acabou ficando exausto?" 
10110-101100430 = "Não, passei o dia lendo." 
10110-101100440 = "Se fosse trabalho, o tempo teria parecido\nmuito mais longo e arrastado." 
10110-101100450 = "Quando estou imersa na leitura..." 
10110-101100460 = "Sinto como se até 48 horas\nnum dia não fossem o bastante." 
10110-101100470 = "Agradeço pelos seus cuidados de hoje." 
10110-101100480 = "Sinto que minhas próximas leituras\nserão ainda mais saborosas e divertidas." 
10110-101100490 = "Eu também me diverti bastante." 
10110-101100500 = "Pode me chamar sempre que quiser." 
10110-101100510 = "Obrigada." 
10110-101100520 = "Sem falta, num futuro bem próximo." 
10110-101100530 = "Sensei" 
10110-101100540 = "Fiquei sabendo que você vai vir ao\nTea Party em breve, é verdade?" 
10110-101100550 = "Sim, temos uma reunião." 
10110-101100560 = "Vou dar uma passada aí por causa do trabalho." 
10110-101100570 = "Entendo." 
10110-101100580 = "Tudo bem, estarei no aguardo." 
10110-101100590 = "As noites costumam me deixar...\num tanto sentimental." 
10110-101100600 = "Acho que me deixei levar pelo clima...\ne acabei brincando um pouquinho demais..." 
10110-101100610 = "Será que eu consegui...\nsatisfazer as suas expectativas?" 
10110-101100620 = "Eu fiquei muito feliz em poder ouvir você." 
10110-101100630 = "Foi tão bom que eu queria poder\nouvir isso de novo, e de novo." 
10110-101100640 = "Fufu... Lá vem você de novo\ncom essas palavras doces." 
10110-101100650 = "Com certeza, um dia..." 
10110-101100660 = "Uma canção ainda mais livre," 
10110-101100670 = "Eu espero poder deixá-lo ouvir\nquantas vezes você desejar." 