[translation]
10100-101000010 = "Teste"
10100-101000020 = "Ah"
10100-101000030 = "Ah... ah..."
10100-101000040 = "Você está vendo esta mensagem?"
10100-101000050 = "Estou vendo direitinho, Shiroko."
10100-101000060 = "Nn."
10100-101000070 = "Que bom."
10100-101000080 = "Então, entro em contato de novo."
10100-101000090 = "Espera, onde você está agora?"
10100-101000100 = "Eu?"
10100-101000110 = "Estou no Distrito Autônomo de Abydos."
10100-101000120 = "Será que a gente pode se encontrar agora?"
10100-101000130 = "...Nn."
10100-101000140 = "Entendi."
10100-101000150 = "Vou esperar por você."
10100-101000160 = "Estou indo aí!"
10100-101000170 = "Ovos, leite, detergente, toalhas, lenços de papel."
10100-101000180 = "Ah, e sabonete líquido também."
10100-101000190 = "...Do que você está falando?"
10100-101000200 = "Shiroko?"
10100-101000210 = "Ah."
10100-101000220 = "Desculpa, mandei errado."
10100-101000230 = "Sensei."
10100-101000240 = "Acabei de ter uma ótima ideia."
10100-101000250 = "Você pode vir aqui um pouco?"
10100-101000260 = "De qualquer forma, estou indo aí!"
10100-101000270 = "Ah."
10100-101000280 = "...Nn."
10100-101000290 = "Vou explicar pessoalmente."
10100-101000300 = "Sensei, é uma emergência."
10100-101000310 = "Fui experimentar minha antiga camisa de ciclismo..."
10100-101000320 = "E o zíper..."
10100-101000330 = "Não pode ser...!"
10100-101000340 = "Ah."
10100-101000350 = "Só pra deixar claro..."
10100-101000360 = "Não é que eu engordei."
10100-101000370 = "C-Certo..."
10100-101000380 = "Nn."
10100-101000390 = "Boa noite, Sensei."
10100-101000400 = "Sensei."
10100-101000410 = "Se tiver um tempo..."
10100-101000420 = "Podemos nos encontrar agora?"
10100-101000430 = "Aconteceu alguma coisa?"
10100-101000440 = "Nn."
10100-101000450 = "Tenho uma preocupação..."
10100-101000460 = "Entendi, estou a caminho!"
10100-101000470 = "Nn, obrigada."
10100-101000480 = "A disputa foi decidida."
10100-101000490 = "Vocês disputaram?!"
10100-101000500 = "Nn."
10100-101000510 = "No calor do momento,"
10100-101000520 = "acabamos fazendo uma corrida de bicicleta."
10100-101000530 = "Uma corrida de bicicleta!?"
10100-101000540 = "Quem ganhou!?"
10100-101000550 = "Hmm..."
10100-101000560 = "4 vitórias, 7 derrotas. 1 empate."
10100-101000570 = "Eu perdi."
10100-101000580 = "Afinal, quem está na ativa era mais forte..."
10100-101000590 = "Mas, desta vez, não teve jeito."
10100-101000600 = "Minha oponente estava usando uma camisa de ciclismo."
10100-101000610 = "Quando eu estiver preparada,"
10100-101000620 = "pretendo ter uma revanche."
10100-101000630 = "Quando chegar a hora, venha me ver, Sensei."
10100-101000640 = "Sim, claro. Com certeza eu vou."
10100-101000650 = "Sensei, para quem você vai torcer?"
10100-101000660 = "Isso é segredo."
10100-101000670 = "Estou torcendo pelas duas."
10100-101000680 = "Hm."
10100-101000690 = "Imaginei que você diria isso."
10100-101000700 = "Obrigada, Sensei."
10100-101000710 = "Entro em contato de novo."
