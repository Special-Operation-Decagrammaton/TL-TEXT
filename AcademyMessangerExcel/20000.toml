[translation]
20000-1298 = "Bom dia, Sensei. Desde que entrei em contato da última vez, não recebi nenhuma resposta..."
20000-1299 = "Aconteceu alguma coisa? Posso ir até o Schale?"
20000-1300 = "Desculpe, meu celular quebrou e não consegui responder."
20000-1301 = "Pensei que tinha consertado, mas a conexão ainda está instável..."
20000-1302 = "Entendi."
20000-1303 = "...O momento é perfeito. Que bom."
20000-1304 = "Hã? Acho que não é algo bom..."
20000-1305 = "Não, é em outro sentido. Você vai entender logo o que quero dizer."
20000-1306 = "Que tal instalarmos funções de autodestruição em todos os aparelhos eletrônicos do seu escritório, Sensei?"
20000-1307 = "TV, geladeira, notebook,"
20000-1308 = "micro-ondas, aspirador de pó, secador de cabelo,"
20000-1309 = "posso fazer qualquer coisa explodir."
20000-1310 = "...É brincadeira."
20000-1311 = "Recebi um pedido para criar uma máquina de lançar fogos de artifício."
20000-1312 = "Se puder, venha até o Millennium e me ajude?"
20000-1313 = "Fogos de artifício?"
20000-1314 = "Será que eu consigo ser útil?"
20000-1315 = "Sim."
20000-1316 = "Ficaria feliz se você viesse."
20000-1317 = "Que bom que ninguém se feriu."
20000-1318 = "Realmente, quando estou com o Sensei... coisas emocionantes acontecem com frequência."
20000-1319 = "Como foi o seu dia... hoje, Sensei?"
20000-1320 = "Foi divertido."
20000-1321 = "Achei que ia morrer..."
20000-1322 = "Hoje foi uma bagunça, mas um dia faremos fogos de artifício realmente incríveis..."
20000-1323 = "Não, vou te mostrar algo ainda mais incrível, então espere por isso."
20000-1324 = "Todos acham surpreendente, mas o Millennium também tem um clube de beisebol."
20000-1325 = "Com beisebol baseado em dados e treinamento científico, eles são bem famosos em certos círculos."
20000-1326 = "...Eles não são tão fortes, mas eu queria ajudá-los."
20000-1327 = "Você vai virar líder de torcida!?"
20000-1328 = "Você vai ser a gerente?"
20000-1329 = "Líder de torcida... até tenho vontade de usar aquele uniforme, mas..."
20000-1330 = "Que pena, é em outra direção."
20000-1331 = "Estava pensando em criar algo que ajude no beisebol."
20000-1332 = "É um pouco diferente de ser gerente, mas se eu puder ajudar alguém..."
20000-1333 = "Acho que é usando essa minha tecnologia."
20000-1334 = "Por isso... tenho um pedido."
20000-1335 = "...Sensei, você também pode me ajudar?"
20000-1336 = "Saber que algo que eu criei é útil para alguém..."
20000-1337 = "É algo maravilhoso, não é?"
20000-1338 = "Hoje, acabei tirando um cochilo..."
20000-1339 = "E sonhei com o Sensei."
20000-1340 = "Como foi o sonho?"
20000-1341 = "Fufu, isso é segredo."
20000-1342 = "Mas..."
20000-1343 = "Sinto que quero ver o Sensei agora mesmo."
20000-1344 = "Sensei, é uma emergência."
20000-1345 = "Uma situação além da imaginação. O cano de ferro de desmaio está vendendo como água."
20000-1346 = "Não acredito..."
20000-1347 = "Tantas alunas sofrendo de insônia..."
20000-1348 = "Fiquei realmente surpresa"
20000-1349 = "Parece que se tornou um gadget digital popular entre as estudantes este ano,"
20000-1350 = "e até apareceu em revistas de moda."
20000-1351 = "Marcas famosas também começaram a lançar novos modelos de canos de ferro de desmaio, um após o outro."
20000-1352 = "……Eu mesma não esperava que chegasse a esse ponto."
20000-1353 = "Todas as alunas do Millennium andando por aí com canos de ferro……"
20000-1354 = "Talvez possamos ver uma cena dessas em breve…… mas não se preocupe com isso."
20000-1355 = "Às vezes, eu também tenho dias em que fico sentimental."
20000-1356 = "Especialmente nos dias de chuva."
20000-1357 = "É mesmo? Um pouco inesperado."
20000-1358 = "A chuva tem algo que apela à sensibilidade, não é?"
20000-1359 = "Essa reação é um pouco rude……"
20000-1360 = "Nessas horas, na verdade……"
20000-1361 = "Sim."
20000-1362 = "É verdade."
20000-1363 = "Sinto como se não conseguisse controlar meu próprio coração."
20000-1364 = "Em dias assim, em vez de trabalhar, talvez seja melhor……"
20000-1365 = "Ir a um lugar onde eu possa passar um tempo mais significativo, diferente do habitual."
20000-1366 = "Talvez eu vá à biblioteca hoje."
20000-1367 = "Sensei. Eu vi que seu ombro estava molhado."
20000-1368 = "Obrigada por ter se preocupado em não me deixar molhar……"
20000-1369 = "Se tivéssemos dois guarda-chuvas, eu não teria descoberto essa psicologia…… A psicologia é realmente fascinante."
20000-1370 = "As ações do Sensei certamente estão afetando meu coração."
20000-1371 = "Sensei, emergência."
20000-1372 = "O que houve?"
20000-1373 = "Primeiro, vamos nos acalmar."
20000-1374 = "O que eu faço?"
20000-1375 = "É difícil explicar por texto, mas……"
20000-1376 = "Preciso que me ajude."
20000-1377 = "Estou indo agora mesmo."
20000-1378 = "Devo ir para o Millennium?"
20000-1379 = "Sim, por favor……!"
20000-1380 = "A vista noturna de hoje se tornou…… uma memória muito preciosa para mim."
20000-1381 = "Conte comigo daqui para frente também."
20000-1382 = "……Sensei."
20000-2000010 = "Sensei, o conserto da bicicleta que você pediu terminou."
20000-2000020 = "Venha buscar mais tarde."
20000-2000030 = "Já? Como esperado de você."
20000-2000040 = "Estou indo agora."
20000-2000050 = "Estarei fazendo outras tarefas."
20000-2000060 = "Me avise quando chegar."
