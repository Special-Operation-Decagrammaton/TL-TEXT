[translation]
20000-1298 = "おはよう、先生。この前連絡して以来、返事がなかったけど……"
20000-1299 = "何かあった？シャーレに行ってみてもいい？"
20000-1300 = "ごめんね、スマホが壊れてて返せなくって"
20000-1301 = "直ったかと思ったら、今もまだ通信状態が怪しくて……"
20000-1302 = "そうだったんだ"
20000-1303 = "……タイミングばっちり。良かった"
20000-1304 = "え？良くないことだと思うけど……"
20000-1305 = "ううん、別の意味で。どういうことかは、すぐ分かるよ"
20000-1306 = "先生の部屋のありとあらゆる電子機器に自爆機能を付けるのはどう？"
20000-1307 = "TVとか冷蔵庫とかノートパソコンとか、"
20000-1308 = "電子レンジとか掃除機とかドライヤーとか、"
20000-1309 = "何でも爆発するようにできるよ"
20000-1310 = "……冗談"
20000-1311 = "花火を打ち上げるための機械を作ってほしいって依頼を受けたの"
20000-1312 = "よかったらミレニアムに来て、手伝ってくれない？"
20000-1313 = "花火？"
20000-1314 = "私、役に立てるかな？"
20000-1315 = "うん"
20000-1316 = "来てくれると嬉しい"
20000-1317 = "負傷者が出なくてよかった"
20000-1318 = "やっぱり先生といると……ドキドキすることがよく起きるね"
20000-1319 = "先生は……今日、どうだった？"
20000-1320 = "楽しかったよ"
20000-1321 = "死ぬかと思った……"
20000-1322 = "今日はめちゃくちゃだったけど、いつか本当にすごい花火を……"
20000-1323 = "ううん、それよりもっとすごいものを見せてあげるから、期待してて"
20000-1324 = "みんな意外って言うけれど、ミレニアムにも野球部があるんだよ"
20000-1325 = "データ野球と科学的なトレーニングで、一部界隈では結構有名"
20000-1326 = "……それほど強豪ではないけど、助けてあげたくて"
20000-1327 = "チアリーダーになるの！？"
20000-1328 = "マネージャーになるの？"
20000-1329 = "チアリーダーか……あの衣装、ちょっと着てみたい気持ちはあるけど"
20000-1330 = "残念、それとは別の方向"
20000-1331 = "野球に役立つ、あるものを作ろうかなって"
20000-1332 = "マネージャーとは少し違うけど、もし私が誰かの助けになれるとすれば……"
20000-1333 = "私のこの技術を、使うことくらいだと思うから"
20000-1334 = "それで……お願いがあるんだけど"
20000-1335 = "……先生も、手伝ってくれる？"
20000-1336 = "自分が作ったものが誰かの役に立つって……"
20000-1337 = "素晴らしいことだよね"
20000-1338 = "今日、ちょっとうたた寝をしちゃったんだけど……"
20000-1339 = "先生の夢を見たんだ"
20000-1340 = "どんな夢だったの？"
20000-1341 = "ふふっ、それは秘密"
20000-1342 = "でも……"
20000-1343 = "なんだか、今すぐ先生に会いたい気分"
20000-1344 = "先生、大変"
20000-1345 = "想像以上の事態。失神鉄パイプが、飛ぶように売れてる"
20000-1346 = "なんてことだ……"
20000-1347 = "そんなに多くの生徒たちが、不眠症に悩まされてたなんて……"
20000-1348 = "本当にびっくり"
20000-1349 = "今年の女子高生に人気のデジタルガジェットとして、"
20000-1350 = "ファッション誌にも載ったみたいだし"
20000-1351 = "有名ブランドも新作の失神鉄パイプを次々に発表し始めてる"
20000-1352 = "……私も、ここまでとは予想してなかった"
20000-1353 = "ミレニアムの生徒たちがみんな、鉄パイプを持って歩く……"
20000-1354 = "そんな光景が見られるようになるかもしれないけど……気にしないでね"
20000-1355 = "たまには私も、感傷的になる日がある"
20000-1356 = "雨が降る日なんかは、特に"
20000-1357 = "そうなんだ、ちょっと意外"
20000-1358 = "雨って、どこか感性に訴えかけるものがあるよね"
20000-1359 = "その反応は失礼だね……"
20000-1360 = "こういう時は、やっぱり……"
20000-1361 = "うん"
20000-1362 = "そうだよね"
20000-1363 = "なんだか自分の心が、コントロールできなくなる感じ"
20000-1364 = "こういう日は作業をするより、もっと……"
20000-1365 = "普段とは違う意義のある時間を過ごせる場所に行くのが、良いかもしれない"
20000-1366 = "今日は、図書館にでも行ってみようかな"
20000-1367 = "先生。肩が濡れてたの、見てたよ"
20000-1368 = "私が濡れないように気を遣ってくれて……ありがとう"
20000-1369 = "傘が二つあったら、知らないままの心理だった……やっぱり心理学は面白い"
20000-1370 = "先生の行動はきっと、私の心に影響を及ぼしてる"
20000-1371 = "先生、緊急事態"
20000-1372 = "どうしたの？"
20000-1373 = "まずは落ち着こう"
20000-1374 = "どうしよう"
20000-1375 = "テキストだと、説明が難しいのだけど……"
20000-1376 = "手伝ってほしい"
20000-1377 = "すぐに行くよ"
20000-1378 = "ミレニアムに向かえばいい？"
20000-1379 = "うん、お願い……！"
20000-1380 = "今日の夜景は私にとって……本当に、大切な思い出になった"
20000-1381 = "これからもよろしくね"
20000-1382 = "……先生"
20000-2000010 = "先生、頼まれた自転車の修理、終わったよ"
20000-2000020 = "後で取りに来て"
20000-2000030 = "もう？さすがだね"
20000-2000040 = "今から行くよ"
20000-2000050 = "私は他の作業してるから"
20000-2000060 = "着いたら教えて"
