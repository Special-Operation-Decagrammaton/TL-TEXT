[translation]
20010-200100010 = "Muito obrigado pelo seu trabalho duro hoje."
20010-200100020 = "Se o Sensei não se importar, eu adoraria cuidar do seu corpo cansado, o que acha?"
20010-200100030 = "……Você comeu algo estranho?"
20010-200100040 = "Eu só estou sendo atenciosa, não acha isso cruel!?"
20010-200100050 = "Ah."
20010-200100060 = "N-não é nada. Por favor, não se preocupe, ohoho……"
20010-200100070 = "Está tudo bem? Aconteceu alguma coisa?"
20010-200100080 = "Bem, é que, digamos que houve uma pequena mudança de mentalidade……"
20010-200100090 = "Aprendi muitas coisas através da administração da estância termal anteriormente."
20010-200100100 = "Desde como limpar as fontes termais até a organização do estoque de vários itens……"
20010-200100110 = "Mas sinto que, especialmente no atendimento ao cliente, falhei em vários aspectos e fui indelicada com os clientes, começando pelo Sensei."
20010-200100120 = "Por isso, pensei em fazer um ensaio para não falhar da próxima vez."
20010-200100130 = "Em suma, é isso, um treinamento!"
20010-200100140 = "O treinamento anterior foi um fracasso total."
20010-200100150 = "Quem diria que a culinária kaiseki era algo daquele nível……"
20010-200100160 = "Para mim, que quase sempre comi apenas rações, era um mundo desconhecido demais……"
20010-200100170 = "Mas não vou desistir, ainda há muito o que fazer."
20010-200100180 = "O próximo passo é a instalação mais importante da estância termal…… a fonte termal!"
20010-200100190 = "Entendo."
20010-200100200 = "A estância termal é, literalmente, centrada nas fontes termais."
20010-200100210 = "Se tivermos uma boa fonte termal, os clientes virão naturalmente."
20010-200100220 = "Então, desta vez, vou me esforçar na limpeza do banheiro!"
20010-200100230 = "……Onde?"
20010-200100240 = "Após o treinamento até agora, eu percebi."
20010-200100250 = "A essência do atendimento ao cliente não está na comida ou nas instalações, mas sim…… na própria atitude dos funcionários!"
20010-200100260 = "Entendo. E se tiver uma comida deliciosa, fica perfeito."
20010-200100270 = "Entendo. E se tiver uma ótima fonte termal, fica perfeito."
20010-200100280 = "B-bem, é verdade……"
20010-200100290 = "Mas, sabe, o último é um pouco difícil no momento."
20010-200100300 = "Com o nosso dinheiro, não conseguimos preparar comidas caras ou instalações luxuosas……"
20010-200100310 = "De qualquer forma, vamos começar com o que podemos! Desta vez, como uma dona de estância termal, quero aprender a ter um comportamento elegante."
20010-200100320 = "Ou seja, um treinamento de etiqueta!"
20010-200100330 = "Sensei."
20010-200100340 = "O que foi?"
20010-200100350 = "Não, não é nada importante, mas……"
20010-200100360 = "Se eu torcesse o pé e o Sensei me carregasse nas costas……"
20010-200100370 = "Será que se eu machucasse o outro pé, você faria algo ainda melhor……?"
20010-200100380 = "Por favor, pare de fazer isso de propósito……"
20010-200100390 = "Desde então, meu pé melhorou um pouco, mas sinto que ainda não estou totalmente recuperada."
20010-200100400 = "Não atrapalha no dia a dia, mas dói um pouco quando tento andar normalmente……"
20010-200100410 = "Acho que o treinamento ainda é um pouco difícil……"
20010-200100420 = "Falando nisso, ouvi falar de uma fonte termal que é boa para tratamento médico."
20010-200100430 = "Eu te levo, o que acha de irmos neste fim de semana?"
20010-200100440 = "Ah, muito obrigada."
20010-200100450 = "Então, até o fim de semana."
20010-200100460 = "E"
20010-200100470 = "Espe"
20010-200100480 = "Espere, uma fonte termal com o Sensei!?!?"
