[translation]
20010-200100010 = "本日もお仕事、大変お疲れ様でございました"
20010-200100020 = "先生さえよろしければ、ぜひお疲れの身体を労わって差し上げたいのですが、いかがでございましょう？"
20010-200100030 = "……何か変な物でも食べた？"
20010-200100040 = "ただ気遣ってるだけなのに酷くないですか！？"
20010-200100050 = "はっ"
20010-200100060 = "な、何でもありません。お気になさらず、おほほ……"
20010-200100070 = "大丈夫？何かあったの？"
20010-200100080 = "いえその、ちょっとした心境の変化と言いますか……"
20010-200100090 = "以前の温泉郷での運営を通じて、色々なことを学んだんです"
20010-200100100 = "お風呂を綺麗に掃除する方法から、様々な物品の在庫整理まで……"
20010-200100110 = "しかし特に接客では色々と至らずに、先生を始めとしてお客様方に失礼なことをしてしまった気がします"
20010-200100120 = "ですので次は失敗しないように、予行練習をしておこうと思いまして"
20010-200100130 = "つまりはそう、修行です！"
20010-200100140 = "この前の修行は完全に失敗でした"
20010-200100150 = "まさか会席料理というものが、あそこまでのものだったとは……"
20010-200100160 = "ほぼ毎日配給品だけを食べてきた私としては、あまりにも未知の世界で……"
20010-200100170 = "ですが私はめげません、まだまだやるべきことがありますから"
20010-200100180 = "次に取り組むべきは、温泉郷で一番大事な施設……温泉！"
20010-200100190 = "なるほど"
20010-200100200 = "温泉郷は文字通り、温泉を中心としたもの"
20010-200100210 = "立派な温泉があれば、お客様は自然と集まってきてくれるはず"
20010-200100220 = "なので今度は、お風呂場の掃除を頑張ってみようかと！"
20010-200100230 = "……どこで？"
20010-200100240 = "これまでの修行を経て、私は悟りました"
20010-200100250 = "接客の真髄というのは、料理や施設ではなく……従業員の態度そのものであるということに！"
20010-200100260 = "なるほど。それに美味しい料理があればバッチリだね"
20010-200100270 = "なるほど。それに立派な温泉があればバッチリだね"
20010-200100280 = "そ、そうですね……"
20010-200100290 = "ですがその、後者はしばらく厳しいと言いますか"
20010-200100300 = "私たちのお金では、なかなか高い料理や豪勢な施設は用意できないので……"
20010-200100310 = "とにかくまずはできることから！今回は温泉の女将らしく、気品のある所作を習得したいと思います"
20010-200100320 = "つまり、礼節の修業です！"
20010-200100330 = "先生"
20010-200100340 = "どうしたの？"
20010-200100350 = "いえ、大したことではないのですが……"
20010-200100360 = "片足を捻って先生におんぶしていただけたのであれば"
20010-200100370 = "もしかしてもう片方の足も怪我したら、もっと良いことをしていただけたり……？"
20010-200100380 = "とりあえず意図的なのはやめてもらえると……"
20010-200100390 = "あれから足は少しずつ良くなったのですが、まだ全快ではないという感じです"
20010-200100400 = "日常生活に支障はありませんが、いつも通り歩こうとするには少し痛くて……"
20010-200100410 = "ちょっとまだ修業は難しそうですね……"
20010-200100420 = "そういえばこの間、湯治に良いっていう温泉の話を聞いたんだけど"
20010-200100430 = "送っていくから、良かったら今週末どう？"
20010-200100440 = "あ、ありがとうございます"
20010-200100450 = "では週末に"
20010-200100460 = "ｍ"
20010-200100470 = "まｔ"
20010-200100480 = "待ってください、先生と一緒に温泉ですか！？！？"
