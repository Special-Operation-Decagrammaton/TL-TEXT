[translation]
16018-160180010 = "Desculpe o contato repentino."
16018-160180020 = "Este é o contato do Sensei do Schale, correto?"
16018-160180030 = "Sim, sou eu, mas..."
16018-160180040 = "Love?"
16018-160180050 = "Ora, então é você mesmo. Que bom."
16018-160180060 = "Uma Love educada é algo bem novo, né?"
16018-160180070 = "Tenho que tirar um print!"
16018-160180080 = "Hã?"
16018-160180090 = "Você achava que eu era uma pessoa tão mal-educada assim?"
16018-160180100 = "Eu tenho o mínimo de educação, sabia?"
16018-160180110 = "Bem, deixa pra lá."
16018-160180120 = "Quando passei na frente do Schale agora pouco,"
16018-160180130 = "lembrei que tínhamos trocado contatos no MomoTalk."
16018-160180140 = "Bom, você deve estar ocupado, então talvez nem esteja no Schale,"
16018-160180150 = "mas até mais."
16018-160180160 = "Espera, não me diga que... aquele ali não é o Sensei, é?"
16018-160180170 = "Ei."
16018-160180180 = "Foi a primeira vez que fui ao Schale, é uma sensação estranha."
16018-160180190 = "Vi coisas bem interessantes por lá."
16018-160180200 = "Fico feliz que tenha se divertido."
16018-160180210 = "...Quem diria que acabaríamos nos aproximando assim."
16018-160180220 = "..."
16018-160180230 = "Dizer que nos aproximamos talvez seja exagero."
16018-160180240 = "De qualquer forma, foi divertido."
16018-160180250 = "Eu adoraria que você viesse me visitar todo dia."
16018-160180260 = "Sempre será bem-vinda!"
16018-160180270 = "Você é muito bom com as palavras, hein."
16018-160180280 = "..."
16018-160180290 = "Você disse isso mesmo?"
16018-160180300 = "Sensei, você está livre agora?"
16018-160180310 = "Ah, se estiver ocupado, não se preocupe."
16018-160180320 = "Olá, Love."
16018-160180330 = "O que houve?"
16018-160180340 = "Hoje você está estranhamente calma."
16018-160180350 = "Eu vi o Sensei agora pouco,"
16018-160180360 = "e você parecia cansado. Durma direito."
16018-160180370 = "Esses passos... você está correndo de novo!?"
16018-160180380 = "O Sensei"
16018-160180390 = "sempre diz essas coisas?"
16018-160180400 = "Sem brincadeira?"
16018-160180410 = "Com certeza!"
16018-160180420 = "Eu sempre penso assim!"
16018-160180430 = "Ah, esquece."
16018-160180440 = "Mas não diga isso na frente das minhas subordinadas, entendeu?"
16018-160180450 = "Com certeza."
16018-160180460 = "Na frente das outras também não. Se você disser..."
16018-160180470 = "Ah, isso é..."
16018-160180480 = "Não é que eu não queira que você diga isso para as outras!"
16018-160180490 = "Ah, chega! Esquece o que eu disse!!"
16018-160180500 = "Sensei, sou eu."
16018-160180510 = "Independente de onde você esteja agora, você não está correndo, né?"
16018-160180520 = "Eu corri até o saguão por enquanto, mas..."
16018-160180530 = "Por acaso, o Sensei é meio bobo?"
16018-160180540 = "Bem, deixa pra lá. Eu encontrei uma coisa boa no mercado negro outro dia."
16018-160180550 = "Ah, não é nada perigoso, é algo útil."
16018-160180560 = "Pensei que talvez pudesse ser útil para o Sensei."
16018-160180570 = "?"
16018-160180580 = "Está correndo de novo?"
16018-160180590 = "Ei."
16018-160180600 = "Sensei?"
16018-160180610 = "Sensei."
16018-160180620 = "Aquela máquina de venda automática está estranha."
16018-160180630 = "Eu pedi um suco de maçã."
16018-160180640 = "Mas tem gosto de abacaxi."
16018-160180650 = "Será que está estragado? O Sensei está bem?"
16018-160180660 = "Não está com dor de barriga nem nada?"
16018-160180670 = "O meu suco de abacaxi tem gosto de maçã."
16018-160180680 = "É mesmo? Que estranho..."
16018-160180690 = "Espera, o quê!?"
16018-160180700 = "Sensei, você está livre agora?"
16018-160180710 = "Mesmo que não esteja, venha aqui um pouco!"
16018-160180720 = "Hã, aconteceu alguma coisa!?"
16018-160180730 = "Não, é só um convite para passear."
16018-160180740 = "Eu estava passando por perto e fiquei pensando no que você estava fazendo."
16018-160180750 = "Ah, será que você está ocupado agora?"
16018-160180760 = "Se estiver, tudo bem... aquilo foi só uma brincadeira."
16018-160180770 = "Acabei de terminar meu trabalho."
16018-160180780 = "Comi toda a papelada de hoje."
16018-160180790 = "Você é mesmo um adulto!?"
16018-160180800 = "Então, posso considerar que você vai vir?"
16018-160180810 = "Estou te esperando lá embaixo, viu?"
16018-160180820 = "Venha andando, sem correr, entendeu!?"
16018-160180830 = "Ah... você demorou."
16018-160180840 = "Eu fui investigar, sabia!?"
16018-160180850 = "Aquilo não é esgoto, é um ralo de drenagem de água da chuva!"
16018-160180860 = "É só água da chuva!!"
16018-160180870 = "Não é água suja!!"
16018-160180880 = "Não, eu não fiz nada..."
16018-160180890 = "Eu fiz uma boa ação com tanto esforço, e olha só!"
16018-160180900 = "A bondosa Love foi realmente incrível!"
16018-160180910 = "Se você estiver interessado, eu também posso ir lá no ralo e dar um mergulho!"
16018-160180920 = "Não use o nome sagrado do mergulho para essas coisas!!"
16018-160180930 = "E eu já disse que não é um esgoto!"
16018-160180940 = "Fico feliz que você esteja me elogiando, mas!"
16018-160180950 = "..."
16018-160180960 = "E outra, não conte para os meus subordinados sobre o que viu hoje, entendeu?"
16018-160180970 = "Entendido!?"
