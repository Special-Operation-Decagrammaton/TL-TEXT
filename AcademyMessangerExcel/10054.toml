[translation]
10054-100540010 = "先生こんにちは、マリーです"
10054-100540020 = "突然で申し訳ありませんが、相談したい事がありまして……"
10054-100540030 = "私だけでは、どうにも難しく……"
10054-100540040 = "もちろんだよ、どうしたの？"
10054-100540050 = "何かあったの？"
10054-100540060 = "あっ……えっと"
10054-100540070 = "そこまで深刻なお話ではなく……"
10054-100540080 = "その……危険な事に巻き込まれているとかではないのですが……"
10054-100540090 = "ですが、お気遣いとても嬉しいです。ありがとうございます"
10054-100540100 = "それでは、早速ですが……明日の朝にお時間をいただいてもよろしいでしょうか？"
10054-100540110 = "大聖堂でお待ちしておりますね"
10054-100540120 = "先生のことですから、きっとお忙しいと思いますが……"
10054-100540130 = "晄輪大祭当日も、お会いできることを祈っております"
10054-100540140 = "先生にとって、どうか今日も素敵な一日となりますように"
10054-100540150 = "先生……"
10054-100540160 = "本日もお変わりありませんか？"
10054-100540170 = "せめてご挨拶だけでもと思い、ご連絡いたしました……"
10054-100540180 = "どうか先生が幸せに過ごせるよう、祈っております"
10054-100540190 = "？？？"
10054-100540200 = "マリー、どうしたの？"
10054-100540210 = "……マリー？"
10054-100540220 = "……"
10054-100540230 = "先生……？"
10054-100540240 = "その、何かありませんでしたか？\n去り際になんだか鈍い音が聞こえたような気がして……"
10054-100540250 = "たぶん気のせいだよ？"
10054-100540260 = "なんとなくそんな気がしていたから大丈夫、気にしないで。"
10054-100540270 = "？？？"
10054-100540280 = "……そ、そうでしたか"
10054-100540290 = "またご連絡いたしますね"
10054-100540300 = "先生……その、何か私にできることはありませんか？"
10054-100540310 = "先生のおかげで、私は晄輪大祭を通して成長する事ができました"
10054-100540320 = "そこでお礼を……と思ったのですが、どうすれば良いのか分からず……"
10054-100540330 = "お礼は大丈夫だよ。マリーが元気ならそれで"
10054-100540340 = "マリーの楽しそうな姿が見られて良かったよ"
10054-100540350 = "あはは……"
10054-100540360 = "やはり先生には敵いませんね"
10054-100540370 = "……分かりました"
10054-100540380 = "いつか、お力添えできる時が来るのを待っていますね"
10054-100540390 = "代わりといっては何ですが、本日は……"
10054-100540400 = "先生が平穏な一日を過ごせるよう、お祈りいたします"
10054-100540410 = "あの、先生"
10054-100540420 = "もし先生がよろしければ……"
10054-100540430 = "今度は運動着でお越しいただけたらいいな、と思いまして"
10054-100540440 = "公園は涼しくて気持ちよく過ごせますし、運動に最適かと……"
10054-100540450 = "ですから、先生のご都合次第ですが"
10054-100540460 = "その……"
10054-100540470 = "今度はご一緒に運動できると……嬉しいです"
10054-100540480 = "それでは……また"
