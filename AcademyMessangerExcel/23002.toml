[translation]
23002-1502 = "先生は注射、怖いですか？"
23002-1503 = "平気だよ"
23002-1504 = "注射無理！針怖い！"
23002-1505 = "そうなんですね、さすが大人です！"
23002-1506 = "生徒はみんな大抵、注射の針を怖がってしまって……"
23002-1507 = "やっぱり大人でも注射は怖いんですね……"
23002-1508 = "注射の針を見てゾッとするのは、大人も子供も関係ないのかもしれません"
23002-1509 = "でも先輩たち曰く、ベテランの看護師さんの注射は全然痛くないそうです"
23002-1510 = "注射が痛くなければ、病院を怖がる人も減りそうなのですが……"
23002-1511 = "どうすれば、痛くなくなるのでしょうか？"
23002-1512 = "先生、最近きちんと眠れてますか？"
23002-1513 = "目の下のクマもひどかったですし、すごく疲れた顔をしていましたが"
23002-1514 = "最近ちょっと不眠症っぽくてね……"
23002-1515 = "なんだか夜眠れなくって……"
23002-1516 = "やっぱり、そうだったんですか"
23002-1517 = "疲れは万病のもと！きちんと睡眠をとらないと病気になってしまうかもです"
23002-1518 = "先生がぐっすり眠れるよう、何か良い方法を探しておきますね"
23002-1519 = "明日のお昼、保健室に来てください！"
23002-1520 = "ハーブティーは良かったのですが眠るまで少し時間がかかってしまいますね"
23002-1521 = "そこで、ネットでもっと効果のあるものを見つけてきました！"
23002-1522 = "トリカブトの根っこ……？というもので淹れたお茶が良さそうです！"
23002-1523 = "殺す気！？"
23002-1524 = "先生は普段、どこでラジオ体操をしてるんですか？"
23002-1525 = "公園？学校？それともシャーレで？"
23002-1526 = "そういえば、先生がラジオ体操をしているところって見たことないですね"
23002-1527 = "ラジオ体操なんて、小学生以来やってないなあ……"
23002-1528 = "えっ、ラジオ体操やってないんですか？"
23002-1529 = "それじゃあ、はなまるスタンプがもらえないじゃないですか！"
23002-1530 = "先生も一緒に、私のいつもの公園に行ってラジオ体操をしましょう！"
23002-1531 = "やだ"
23002-1532 = "朝は眠い"
23002-1533 = "先生みたいに座りっぱなしの大人こそ、ちゃんと身体を動かさないと！"
23002-1534 = "さあ、行きましょう！"
23002-1535 = "久しぶりのラジオ体操の感想はいかがですか、先生？"
23002-1536 = "朝早く起きて体操をすると、すっきりしませんか？"
23002-1537 = "確かに、いつもより爽やかな気分"
23002-1538 = "でしょう？ラジオ体操は普段使わない筋肉もほぐすので健康に良いんです！"
23002-1539 = "ですので、これからは先生も毎日、朝のラジオ体操に参加してくださいね！"
23002-1540 = "もし来てなかったら、私がシャーレまで迎えに行きますから！"
23002-1541 = "せめて休日は勘弁して……"
23002-1542 = "図書館で古い医学書を見つけたのですが、知らない治療法だらけでした！"
23002-1543 = "もしかして……現代では秘匿された、禁断の医術なのでしょうか！？"
23002-1544 = "民間療法みたいなものじゃないかな？"
23002-1545 = "そういうことでしたか……"
23002-1546 = "ですが何事も挑戦です。もし先生が今度怪我をされたら試してみましょう！"
23002-1547 = "楽しみにしててくださいね！"
23002-1548 = "怪我を楽しみにっていうのはちょっと……"
23002-1549 = "シャーレの執務室はなんだか、少し殺風景な気がします"
23002-1550 = "花瓶なんか置いてみたら、素敵になるんじゃないでしょうか？"
23002-1551 = "先生はどんなお花が好きですか？"
23002-1552 = "お花ならだいたい好きだよ"
23002-1553 = "害のある花粉が飛ばなければ何でも"
23002-1554 = "それでは、私が好きなお花をいくつか見繕ってみますね！"
23002-1555 = "ハナエは何の花が一番好き？"
23002-1556 = "うーん……私もお花は何でも好きですが、一番はアサガオですね"
23002-1557 = "花開いたアサガオは、まるでトランペットで朝を知らせる天使みたいです"
