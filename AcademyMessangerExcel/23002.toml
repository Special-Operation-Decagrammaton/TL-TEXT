[translation]
23002-1502 = "Professor, você tem medo de injeções?"
23002-1503 = "Estou bem com isso."
23002-1504 = "Injeções não! Tenho medo de agulhas!"
23002-1505 = "Entendo, como esperado de um adulto!"
23002-1506 = "A maioria das alunas tem medo da agulha da injeção..."
23002-1507 = "Então, até os adultos têm medo de injeções..."
23002-1508 = "Talvez o arrepio ao ver uma agulha não tenha nada a ver com ser adulto ou criança."
23002-1509 = "Mas as veteranas dizem que as injeções das enfermeiras experientes não doem nada."
23002-1510 = "Se as injeções não doessem, menos pessoas teriam medo do hospital..."
23002-1511 = "O que podemos fazer para que não doa?"
23002-1512 = "Professor, você tem dormido bem ultimamente?"
23002-1513 = "As olheiras embaixo dos seus olhos estão terríveis e você parece muito cansado."
23002-1514 = "Ultimamente estou com um pouco de insônia..."
23002-1515 = "Não consigo dormir à noite por algum motivo..."
23002-1516 = "Então era isso mesmo."
23002-1517 = "O cansaço é a raiz de todas as doenças! Se não dormir direito, pode acabar ficando doente."
23002-1518 = "Vou procurar um método bom para que o professor consiga dormir profundamente."
23002-1519 = "Venha à enfermaria amanhã à tarde!"
23002-1520 = "O chá de ervas foi bom, mas demora um pouco para fazer efeito, não é?"
23002-1521 = "Por isso, encontrei algo mais eficaz na internet!"
23002-1522 = "Parece que um chá feito com... raízes de acônito seria bom!"
23002-1523 = "Você quer me matar!?"
23002-1524 = "Professor, onde você costuma fazer a ginástica matinal?"
23002-1525 = "No parque? Na escola? Ou no Schale?"
23002-1526 = "Pensando bem, nunca vi o professor fazendo ginástica matinal."
23002-1527 = "Eu não faço ginástica matinal desde o ensino fundamental..."
23002-1528 = "Hã? Você não faz ginástica matinal?"
23002-1529 = "Então você não ganha o carimbo de nota dez!"
23002-1530 = "Professor, vamos juntos ao meu parque de sempre fazer a ginástica matinal!"
23002-1531 = "Não quero."
23002-1532 = "Tenho sono de manhã."
23002-1533 = "Adultos que ficam sentados o tempo todo, como o professor, precisam se exercitar!"
23002-1534 = "Vamos, vamos!"
23002-1535 = "Como se sente após voltar a fazer ginástica matinal, professor?"
23002-1536 = "Acordar cedo e se exercitar não faz você se sentir renovado?"
23002-1537 = "Com certeza, estou me sentindo mais disposto que o normal."
23002-1538 = "Viu só? A ginástica matinal relaxa músculos que não usamos normalmente, então é bom para a saúde!"
23002-1539 = "Portanto, de agora em diante, o professor também participará da ginástica matinal todos os dias!"
23002-1540 = "Se você não aparecer, eu irei até o Schale te buscar!"
23002-1541 = "Pelo menos me poupe nos fins de semana..."
23002-1542 = "Encontrei um livro de medicina antigo na biblioteca, estava cheio de tratamentos que eu não conhecia!"
23002-1543 = "Será que... são artes médicas proibidas que foram escondidas na era moderna!?"
23002-1544 = "Não seriam apenas remédios caseiros?"
23002-1545 = "Então era isso..."
23002-1546 = "Mas tudo é um desafio. Se o professor se machucar da próxima vez, vamos testar!"
23002-1547 = "Fique ansioso por isso!"
23002-1548 = "Ficar ansioso para se machucar é um pouco..."
23002-1549 = "O escritório do Schale parece um pouco sem vida."
23002-1550 = "Não seria maravilhoso se colocássemos um vaso de flores?"
23002-1551 = "De que tipo de flores o professor gosta?"
23002-1552 = "Eu gosto de quase todas as flores."
23002-1553 = "Desde que não soltem pólen nocivo, qualquer uma serve."
23002-1554 = "Então, vou escolher algumas flores que eu gosto para você!"
23002-1555 = "De qual flor você mais gosta, Hanae?"
23002-1556 = "Hmm... Eu também gosto de todas as flores, mas a minha favorita é a glória-da-manhã."
23002-1557 = "Uma glória-da-manhã desabrochada parece um anjo anunciando a manhã com um trompete."
