[translation]
10096-100960010 = "こんにちは、先生"
10096-100960020 = "久しぶりだね、カンナ"
10096-100960030 = "元気だった？"
10096-100960040 = "お久しぶりです。実は、相談したいことがありまして"
10096-100960050 = "カンナから相談だなんて、珍しいね"
10096-100960060 = "その、プールのライフセーバーに任命されたのですが……"
10096-100960070 = "水着が決められずに困っています"
10096-100960080 = "……水着？"
10096-100960090 = "はい、よろしければ直接アドバイスを頂いてもよろしいでしょうか？"
10096-100960100 = "私には、どうも難しく……"
10096-100960110 = "分かった、すぐ行くね"
10096-100960120 = "先生、本日はありがとうございました"
10096-100960130 = "おかげで水着が決まり、一安心です"
10096-100960140 = "似合ってたね"
10096-100960150 = "……"
10096-100960160 = "今さらですが、気付いたのです"
10096-100960170 = "もしかしたら私には、「似合っている」の一言が必要だっただけかもしれません"
10096-100960180 = "初めてのライフセーバー任務で、気負いすぎていたのでしょう"
10096-100960190 = "もう気は楽になった？"
10096-100960200 = "はい"
10096-100960210 = "やはり、先生に助けを要請して正解でした"
10096-100960220 = "こんにちは、先生"
10096-100960230 = "パークは楽しめていますか？"
10096-100960240 = "うん、楽しんでるよ"
10096-100960250 = "ライフセーバーとして、嬉しい限りです"
10096-100960260 = "あの、もしお時間があれば、ひとつお願いをしても良いでしょうか？"
10096-100960270 = "どんなお願い？"
10096-100960280 = "屋外施設の「メガスライド」まで来てもらえませんか？"
10096-100960290 = "試運転に付き合っていただきたいのです"
10096-100960300 = "今日はウォーターパークの定休日です"
10096-100960310 = "間違えないよう、お気をつけてください"
10096-100960320 = "じゃあカンナも休みなの？"
10096-100960330 = "いえ、私は仕事です"
10096-100960340 = "施設の清掃や補修がありますから"
10096-100960350 = "利用客の皆さんが、安全に楽しく遊べるようにしなくてはいけませんので"
10096-100960360 = "定休日なのに大変だね……"
10096-100960370 = "少し頑張りすぎじゃない？"
10096-100960380 = "利用客の安全がかかっておりますし、これくらい当然です"
10096-100960390 = "もちろん、そこには先生も含まれていますから"
