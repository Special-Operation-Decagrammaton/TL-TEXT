[translation]
10096-100960010 = "Olá, Sensei."
10096-100960020 = "Faz tempo, hein, Kanna."
10096-100960030 = "Você está bem?"
10096-100960040 = "Faz tempo que não nos vemos. Na verdade, tenho algo que gostaria de discutir com você."
10096-100960050 = "É raro você vir me pedir um conselho, Kanna."
10096-100960060 = "É que... fui nomeada salva-vidas da piscina, mas..."
10096-100960070 = "Estou com problemas para decidir qual traje de banho usar."
10096-100960080 = "...Traje de banho?"
10096-100960090 = "Sim, se não for incômodo, você poderia me dar um conselho pessoalmente?"
10096-100960100 = "Para mim, está sendo bem difícil..."
10096-100960110 = "Entendi, estou indo aí."
10096-100960120 = "Sensei, muito obrigada por hoje."
10096-100960130 = "Graças a você, consegui decidir o traje de banho. Que alívio."
10096-100960140 = "Ficou ótimo em você."
10096-100960150 = "..."
10096-100960160 = "Pode ser um pouco tarde, mas eu percebi uma coisa."
10096-100960170 = "Talvez tudo o que eu precisava era ouvir alguém dizer que 'ficou ótimo em mim'."
10096-100960180 = "Acho que eu estava me pressionando demais por ser minha primeira vez como salva-vidas."
10096-100960190 = "Já se sente mais tranquila?"
10096-100960200 = "Sim."
10096-100960210 = "No fim, pedir sua ajuda foi a decisão certa."
10096-100960220 = "Olá, Sensei."
10096-100960230 = "Está se divertindo no parque?"
10096-100960240 = "Sim, estou me divertindo."
10096-100960250 = "Como salva-vidas, fico muito feliz em ouvir isso."
10096-100960260 = "Hum, se você tiver um tempo, posso te pedir um favor?"
10096-100960270 = "Que tipo de favor?"
10096-100960280 = "Você poderia vir até o 'Mega Slide' na área externa?"
10096-100960290 = "Gostaria que você me acompanhasse em um teste."
10096-100960300 = "Hoje o parque aquático está fechado."
10096-100960310 = "Por favor, tome cuidado para não se confundir."
10096-100960320 = "Então você também está de folga, Kanna?"
10096-100960330 = "Não, eu estou trabalhando."
10096-100960340 = "Tenho que fazer a limpeza e os reparos das instalações."
10096-100960350 = "Preciso garantir que todos os visitantes possam se divertir com segurança."
10096-100960360 = "Nossa, que trabalhão, mesmo no dia de folga..."
10096-100960370 = "Você não está se esforçando um pouco demais?"
10096-100960380 = "A segurança dos visitantes está em jogo, então isso é o mínimo que posso fazer."
10096-100960390 = "E claro, isso inclui você também, Sensei."
