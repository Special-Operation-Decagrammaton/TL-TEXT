[translation]
10096-100960010 = "Olá, Sensei."
10096-100960020 = "Quanto tempo, Kanna."
10096-100960030 = "Tudo bem com você?"
10096-100960040 = "Já faz um tempo. Na verdade, tenho um assunto sobre o qual gostaria de lhe pedir um conselho."
10096-100960050 = "A Kanna pedindo um conselho? Isso é raro."
10096-100960060 = "Bem, eu fui nomeada salva-vidas da piscina, mas..."
10096-100960070 = "Estou com problemas porque não consigo escolher um maiô."
10096-100960080 = "...Um maiô?"
10096-100960090 = "Sim. Se não for incômodo, eu poderia receber alguns conselhos diretamente do senhor?"
10096-100960100 = "Isso é um pouco difícil demais para mim..."
10096-100960110 = "Entendido, estou indo pra aí agora mesmo."
10096-100960120 = "Sensei, muito obrigada por hoje."
10096-100960130 = "Graças ao senhor, consegui decidir um maiô e estou aliviada."
10096-100960140 = "Ficou ótimo em você."
10096-100960150 = "......"
10096-100960160 = "Pode ser um pouco tarde, mas acabei percebendo uma coisa."
10096-100960170 = "Talvez eu só precisasse ouvir alguém dizer que 'ficou ótimo'."
10096-100960180 = "Acho que eu estava me cobrando demais por ser a minha primeira missão como salva-vidas."
10096-100960190 = "Já está se sentindo mais tranquila?"
10096-100960200 = "Sim."
10096-100960210 = "Como eu imaginava, pedir ajuda ao Sensei foi a decisão correta."
10096-100960220 = "Olá, Sensei."
10096-100960230 = "Está se divertindo no parque?"
10096-100960240 = "Sim, estou me divertindo."
10096-100960250 = "Como salva-vidas, fico muito feliz em ouvir isso."
10096-100960260 = "Com licença, se o senhor tiver um tempo livre, poderia lhe pedir um favor?"
10096-100960270 = "Que tipo de favor?"
10096-100960280 = "Poderia vir até a atração externa, o 'Mega Toboágua'?"
10096-100960290 = "Eu gostaria que o senhor me acompanhasse em um teste de funcionamento."
10096-100960300 = "Hoje é o dia de folga do parque aquático."
10096-100960310 = "Tome cuidado para não se enganar."
10096-100960320 = "Então você também está de folga, Kanna?"
10096-100960330 = "Não, eu estou trabalhando."
10096-100960340 = "Temos que fazer a limpeza e manutenção das instalações."
10096-100960350 = "Precisamos garantir que todos os clientes possam brincar com segurança e se divertir."
10096-100960360 = "Deve ser duro trabalhar no dia de folga do parque..."
10096-100960370 = "Não acha que está se esforçando demais?"
10096-100960380 = "A segurança dos clientes está em jogo, então isso é o mínimo que devo fazer."
10096-100960390 = "E, claro, o senhor também está incluído nisso, Sensei."