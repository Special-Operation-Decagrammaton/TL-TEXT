[translation]
20021-200210010 = "先生、実は悩みがあるんです"
20021-200210020 = "なるほど……それは、私が聞いても良いやつ？"
20021-200210030 = "はい、先生になら！"
20021-200210040 = "ですが、迷惑になってしまわないかと……"
20021-200210050 = "生徒の悩みを聞くことも、先生の役目だから"
20021-200210060 = "では、お願いしてもいいですか？"
20021-200210070 = "今からすぐ会いに行きますね！"
20021-200210080 = "悩むのは辛いですが、良いものでもあると思うんです！"
20021-200210090 = "乗り越えると、自信に繋がりますし！"
20021-200210100 = "確かにそうかも。"
20021-200210110 = "ところで、どうして突然「悩み」の話を……？"
20021-200210120 = "ずっと悩んでいたことについて、自分なりに結論が出せたんです"
20021-200210130 = "先生にもお見せしますので、楽しみにしていてください！"
20021-200210140 = "先生！"
20021-200210150 = "編み物って、楽しいと思いません？"
20021-200210160 = "編み物……靴下とか？"
20021-200210170 = "はい、準備をしてまして"
20021-200210180 = "毎年この時期になると作るんです"
20021-200210190 = "なるほど……？"
20021-200210200 = "あ、そうだ！"
20021-200210210 = "先生、私の部屋に来てくれませんか？"
20021-200210220 = "ぜひ共犯になりましょう！"
20021-200210230 = "共犯！？"
20021-200210240 = "先生、先生！"
20021-200210250 = "見てください！サンタさんからのプレゼントです！"
20021-200210260 = "それに、牛乳とクッキーも全部食べてくれました！"
20021-200210270 = "サンタさんに会えなかったのは残念ですけど……"
20021-200210280 = "それでも、プレゼントのお礼ができたみたいで嬉しいです。えへへっ！"
20021-200210290 = "うん、良かったね"
20021-200210300 = "ところで、プレゼントで消毒薬をくれたということは……"
20021-200210310 = "今後も患者さんたちの治療のために、より一層消毒に励んでほしいという意味ですよね？"
20021-200210320 = "患部の切断は大変ですし、こうなったらやはり火を使って"
20021-200210330 = "そういう意味じゃないと思うよ！？"
20021-200210340 = "あの、先生……"
20021-200210350 = "ちょっと大事な用があって"
20021-200210360 = "先生に助けていただきたいんですが"
20021-200210370 = "今って大丈夫ですか……？"
20021-200210380 = "もちろんだよ、どうしたの？"
20021-200210390 = "それが……"
20021-200210400 = "うーん、メッセージだとうまく伝えられるか自信が無くって"
20021-200210410 = "でも……"
20021-200210420 = "大事な用なんだよね？"
20021-200210430 = "はい……"
20021-200210440 = "とっても大事な用です"
20021-200210450 = "ただ、大事ではあるんですが……"
20021-200210460 = "それじゃあ、会って話そうか"
