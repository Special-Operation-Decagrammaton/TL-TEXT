[translation]
20021-200210010 = "Sensei, na verdade, eu tenho um problema."
20021-200210020 = "Entendo... É algo que eu posso ouvir?"
20021-200210030 = "Sim, se for para o Sensei, eu posso!"
20021-200210040 = "Mas, não sei se seria um incômodo..."
20021-200210050 = "Ouvir os problemas dos alunos também é parte do meu papel como Sensei."
20021-200210060 = "Então, posso pedir esse favor?"
20021-200210070 = "Estou indo te encontrar agora mesmo!"
20021-200210080 = "Ficar preocupada é difícil, mas acho que também é algo bom!"
20021-200210090 = "Quando superamos, isso nos dá confiança!"
20021-200210100 = "Talvez seja verdade."
20021-200210110 = "Aliás, por que você começou a falar de \"problemas\" de repente...?"
20021-200210120 = "Eu cheguei a uma conclusão sobre algo que me preocupava há muito tempo."
20021-200210130 = "Vou mostrar ao Sensei também, então aguarde ansiosamente!"
20021-200210140 = "Sensei!"
20021-200210150 = "Você não acha que tricotar é divertido?"
20021-200210160 = "Tricotar... tipo meias?"
20021-200210170 = "Sim, estou me preparando."
20021-200210180 = "Eu faço isso todo ano nesta época."
20021-200210190 = "Entendo...?"
20021-200210200 = "Ah, é verdade!"
20021-200210210 = "Sensei, você não quer vir ao meu quarto?"
20021-200210220 = "Vamos nos tornar cúmplices!"
20021-200210230 = "Cúmplices!?"
20021-200210240 = "Sensei, Sensei!"
20021-200210250 = "Olhe só! É um presente do Papai Noel!"
20021-200210260 = "E ele comeu todo o leite e os biscoitos também!"
20021-200210270 = "É uma pena que eu não tenha conseguido encontrar o Papai Noel, mas..."
20021-200210280 = "Ainda assim, estou feliz por ter conseguido agradecer pelo presente. Ehehe!"
20021-200210290 = "Sim, que bom."
20021-200210300 = "Aliás, o fato de ele ter dado antisséptico de presente significa que..."
20021-200210310 = "Ele quer que eu me esforce ainda mais na desinfecção para tratar os pacientes daqui para frente, certo?"
20021-200210320 = "Amputar a área afetada é difícil, então, nesse caso, o melhor é usar fogo..."
20021-200210330 = "Acho que não é esse o significado!?"
20021-200210340 = "Ei, Sensei..."
20021-200210350 = "Tenho um assunto importante."
20021-200210360 = "Eu gostaria que o Sensei me ajudasse."
20021-200210370 = "Você está livre agora...?"
20021-200210380 = "Claro, o que houve?"
20021-200210390 = "É que..."
20021-200210400 = "Hum, não tenho certeza se consigo explicar bem por mensagem."
20021-200210410 = "Mas..."
20021-200210420 = "É um assunto importante, não é?"
20021-200210430 = "Sim..."
20021-200210440 = "É um assunto muito importante."
20021-200210450 = "Embora seja importante, mas..."
20021-200210460 = "Então, vamos nos encontrar para conversar."
