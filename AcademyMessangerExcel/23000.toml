[translation]
23000-1829 = "先生、先生！"
23000-1830 = "今回「カフェ・ミルフィーユ」から新作のスイーツが出たみたいです！"
23000-1831 = "一緒に行きませんか？"
23000-1832 = "ごめん、ちょっと今異様に忙しくて……"
23000-1833 = "ちゃんと明日の太陽を拝めたらぜひ……"
23000-1834 = "あ……そんなに忙しいんですね……？"
23000-1835 = "大丈夫ですか、先生？ (⊙_⊙;)"
23000-1836 = "先生～"
23000-1837 = "今日のカップケーキ、いかがでしたか？"
23000-1838 = "美味しかったですか？"
23000-1839 = "うん、美味しかったよ"
23000-1840 = "ちょうど煮詰まってたから、ありがとね"
23000-1841 = "それは良かったです  (❁´▽`)"
23000-1842 = "それではまた今度！"
23000-1843 = "o(^▽^)o"
23000-1844 = "先生～"
23000-1845 = "最近はいかがですか、相変わらずお忙しいでしょうか？"
23000-1846 = "相変わらずだね……"
23000-1847 = "分身の術を覚えたい……"
23000-1848 = "今日もお忙しいんですね……お疲れさまです……"
23000-1849 = "╯︿╰"
23000-1850 = "何かあったの？大丈夫？"
23000-1851 = "スイーツを食べに行こうと思ったら、ふと先生のことを思い出しまして"
23000-1852 = "お忙しいならまた今度ぜひ～(*￣▽￣*)"
23000-1853 = "そういう用件であれば！"
23000-1854 = "すぐに行く！"
23000-1855 = "え？だ、大丈夫なんですか？"
23000-1856 = "先生！？╚(•⌂•)╝"
23000-1857 = "先生、ちょっとお伺いしたいのですが"
23000-1858 = "近々トリニティにいらっしゃる予定ってありますか？"
23000-1859 = "うん、ちょうど行く予定あるよ"
23000-1860 = "あっ、本当ですか？"
23000-1861 = "よければ来る時に、ご連絡をいただけませんか？ヾ(•ω•`)o"
23000-1862 = "先生に相談したいことがありまして"
23000-1863 = "うん、じゃあまた連絡するね"
23000-1864 = "アイリの相談であれば喜んで"
23000-1865 = "わ、ありがとうございます！"
23000-1866 = "お待ちしてますね、先生！\n(((o(≧∇≦)o)))"
23000-1867 = "先生～(～￣▽￣)～"
23000-1868 = "最近はいかがですか、お忙しいですか？"
23000-1869 = "あれ、先生？"
23000-1870 = "お忙しいみたいですね……(｡´・_・｀｡)"
23000-1871 = "お仕事、頑張ってください！"
23000-1872 = "アイリはいつも応援していますから！ヾ(^▽^*)))"
23000-1873 = "先生、今日は本当にありがとうございました！o(^▽^)o"
23000-1874 = "これからもたまに、その……"
23000-1875 = "一緒に、お散歩に行きませんか？"
23000-1876 = "その時はまた、ぜひアイスクリームも買って"
23000-1877 = "もちろん"
23000-1878 = "こちらこそ、アイリが良ければ"
23000-1879 = "あ、ありがとうございます！"
23000-1880 = "私、いつも先生のこと、応援してますから！"
23000-1881 = "それでは今日も明日も、良い一日を！(✿•‿•✿)"
