[translation]
20030-200300010 = "先生"
20030-200300020 = "大運動会が始まったということで"
20030-200300030 = "「特別な」提案をしたいのですが"
20030-200300040 = "いかがでしょうか"
20030-200300050 = "へえ、面白そうだね"
20030-200300060 = "うふふ"
20030-200300070 = "私たちにとって"
20030-200300080 = "きっと、忘れられない経験になるでしょう"
20030-200300090 = "けど、今日は難しいかも"
20030-200300100 = "やらなきゃいけない仕事があって……"
20030-200300110 = "あら？"
20030-200300120 = "もちろん先生の忙しさは存じておりますが"
20030-200300130 = "そこまでおっしゃるのは珍しいですわね"
20030-200300140 = "興味深い……"
20030-200300150 = "ええ、とても興味深いですわ"
20030-200300160 = "ハルナ……？"
20030-200300170 = "先生"
20030-200300180 = "本日はどのようなスケジュールでしょうか？"
20030-200300190 = "会場のパトロールを頼まれてて……"
20030-200300200 = "あちこち歩き回ることになりそう"
20030-200300210 = "そうなのですね"
20030-200300220 = "それは残念です"
20030-200300230 = "ですが、会場にはいらっしゃるという事で安心しました"
20030-200300240 = "えっと……ごめん、ね……？"
20030-200300250 = "謝る必要はありませんわ"
20030-200300260 = "むしろ……"
20030-200300270 = "いつどこでパトロール中の先生と出会えるか……"
20030-200300280 = "逆に楽しみになってきました。それでは、また会場でお会いしましょう"
20030-200300290 = "せっかくの大運動会ですので"
20030-200300300 = "私も競技に参加してみようと思います"
20030-200300310 = "ハルナが！？"
20030-200300320 = "ふふふ"
20030-200300330 = "先生が応援してくださったら"
20030-200300340 = "この上なく頑張れそうですわ"
20030-200300350 = "全力で応援するよ"
20030-200300360 = "ありがとうございます。では、競技場でお会いしましょう"
20030-200300370 = "久々に身体を動かせて、楽しかったですわ"
20030-200300380 = "お陰でいつもよりお腹が空いてしまいました"
20030-200300390 = "運動って大事だよね"
20030-200300400 = "それでなのですが……"
20030-200300410 = "今夜、少々お時間をいただいてもよろしいでしょうか？"
20030-200300420 = "うん。もちろん"
20030-200300430 = "嬉しいですわ"
20030-200300440 = "美食の真髄、見せて差し上げますわね"
20030-200300450 = "会場はすごい熱気ですわね"
20030-200300460 = "先生もご多忙なことでしょう"
20030-200300470 = "大丈夫、ちょうど一段落ついたところだよ"
20030-200300480 = "ふむ……なるほど"
20030-200300490 = "では、もしよろしければ……"
20030-200300500 = "今から会える？"
20030-200300510 = "あら"
20030-200300520 = "先生から誘ってくださるとは"
20030-200300530 = "では、お待ちしております"
