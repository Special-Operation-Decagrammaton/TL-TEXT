[translation]
20030-200300010 = "Sensei"
20030-200300020 = "Já que o Grande Festival Esportivo começou"
20030-200300030 = "eu gostaria de fazer uma proposta 'especial'"
20030-200300040 = "o que acha?"
20030-200300050 = "Humm, parece interessante."
20030-200300060 = "Ufufu."
20030-200300070 = "Para nós,"
20030-200300080 = "com certeza será uma experiência inesquecível."
20030-200300090 = "Mas, hoje talvez seja difícil."
20030-200300100 = "Tenho um trabalho que preciso terminar..."
20030-200300110 = "Oh?"
20030-200300120 = "Claro, eu sei que o Sensei está ocupado,"
20030-200300130 = "mas é raro você dizer algo assim."
20030-200300140 = "Interessante..."
20030-200300150 = "Sim, muito interessante."
20030-200300160 = "Haruna...?"
20030-200300170 = "Sensei."
20030-200300180 = "Como está a sua agenda para hoje?"
20030-200300190 = "Me pediram para patrulhar o local..."
20030-200300200 = "Parece que vou ter que andar bastante por aí."
20030-200300210 = "Entendo."
20030-200300220 = "É uma pena."
20030-200300230 = "Mas fico aliviada em saber que você estará no local."
20030-200300240 = "Bem... desculpe, tá...?"
20030-200300250 = "Não precisa se desculpar."
20030-200300260 = "Pelo contrário..."
20030-200300270 = "Pensar em quando e onde poderei encontrar o Sensei durante a patrulha..."
20030-200300280 = "Na verdade, estou começando a ficar animada. Então, nos vemos no local."
20030-200300290 = "Já que é um Grande Festival Esportivo,"
20030-200300300 = "pensei em participar das competições também."
20030-200300310 = "A Haruna!?"
20030-200300320 = "Fufufu."
20030-200300330 = "Se o Sensei torcer por mim,"
20030-200300340 = "sinto que poderei dar o meu melhor como nunca."
20030-200300350 = "Vou torcer por você com tudo."
20030-200300360 = "Obrigada. Então, nos vemos na arena."
20030-200300370 = "Foi divertido poder exercitar o corpo depois de tanto tempo."
20030-200300380 = "Graças a isso, estou com mais fome que o habitual."
20030-200300390 = "Exercício é importante, né?"
20030-200300400 = "Sobre isso..."
20030-200300410 = "Você poderia me conceder um pouco do seu tempo hoje à noite?"
20030-200300420 = "Sim. Com certeza."
20030-200300430 = "Fico feliz."
20030-200300440 = "Vou lhe mostrar a verdadeira essência da gastronomia."
20030-200300450 = "O local está muito agitado, não é?"
20030-200300460 = "O Sensei deve estar muito ocupado."
20030-200300470 = "Está tudo bem, acabei de terminar uma parte."
20030-200300480 = "Hum... entendo."
20030-200300490 = "Então, se não for incômodo..."
20030-200300500 = "Podemos nos encontrar agora?"
20030-200300510 = "Ora"
20030-200300520 = "Quem diria que o Sensei me convidaria"
20030-200300530 = "Então, estarei esperando por você"
