[translation]
20049-200490010 = "Areia"
20049-200490020 = "Água"
20049-200490030 = "Guarda-sol"
20049-200490040 = "Misaki?"
20049-200490050 = "Estou observando isso há um tempo, mas..."
20049-200490060 = "O que será que todo mundo acha tão divertido nisso?"
20049-200490070 = "Ou seja..."
20049-200490080 = "Você quer brincar comigo?"
20049-200490090 = "Por que você chegou a essa conclusão?"
20049-200490100 = "Estou cansada"
20049-200490110 = "Não sabia que era tão difícil se mover debaixo d'água"
20049-200490120 = "Você aprendeu a nadar um pouco, não foi?"
20049-200490130 = "Será... só me lembro de ter ficado me debatendo"
20049-200490140 = "Se houver uma próxima vez... vou procurar outro método"
20049-200490150 = "Será que teria sido melhor com uma boia?"
20049-200490160 = "……"
20049-200490170 = "Não é isso"
20049-200490180 = "Estou sozinha na praia de novo"
20049-200490190 = "Ah"
20049-200490200 = "Eu não vou mais nadar, viu"
20049-200490210 = "Existem outras formas de aproveitar o mar"
20049-200490220 = "Como brincar na areia, por exemplo"
20049-200490230 = "……Você quer que eu «brinque na areia»?"
20049-200490240 = "Não me trate como criança"
20049-200490250 = "Acho que seria divertido se fizéssemos juntos"
20049-200490260 = "Eu até aguento o resto, mas..."
20049-200490270 = "Não consigo me acostumar com esse sol"
20049-200490280 = "O sol brilhante é o ponto alto do verão na praia!"
20049-200490290 = "……"
20049-200490300 = "O que você pretende me fazer fazer agora?"
20049-200490310 = "Que tal tomarmos um banho de sol juntos?"
20049-200490320 = "Até mais, bom trabalho"
20049-200490330 = "Entendido! Estou indo agora!"
20049-200490340 = "Ei, você leu o que eu mandei?"
20049-200490350 = "No fim, ficou nublado o dia todo"
20049-200490360 = "Isso conta como ter tomado um banho de sol?"
20049-200490370 = "Hmm, isso foi um pouco inesperado..."
