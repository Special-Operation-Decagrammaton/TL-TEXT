[translation]
10005-162 = "Sensei, se tiver tempo no próximo feriado, pode vir até a sala de aula do Comitê de Contramedidas?"
10005-163 = "Eu queria uma ajudinha sua, Sensei."
10005-164 = "Ah, e não tem nada a ver, mas você sabia que as baleias prendem a respiração debaixo d'água?"
10005-165 = "Na sala de aula do Comitê de Contramedidas, né? Entendido."
10005-166 = "Eu não sabia. É verdade, elas são mamíferos, né?"
10005-167 = "Sensei, quando acordei, minhas costas doíam tanto que parecia que iam quebrar... Elas estão gritando de dor..."
10005-168 = "Penas de ganso são assim mesmo?"
10005-169 = "Acho que na minha idade, algo macio demais não serve..."
10005-170 = "É melhor você dormir numa cama de verdade."
10005-171 = "Hmm... Acho que aquele colchão vai voltar para o depósito..."
10005-172 = "Por que será que os humanos têm que acordar de manhã...?"
10005-173 = "Minhas pálpebras estão tão pesadas que parece que vão cair no chão... Sensei, me ajude..."
10005-174 = "É o seu destino como estudante..."
10005-175 = "Força! Você consegue, Hoshino!"
10005-176 = "Talvez fosse mais fácil não ter pálpebras, como os peixes... Mnya..."
10005-177 = "Sensei, você sabia?"
10005-178 = "Dizem que alguns peixes que vivem nas profundezas do oceano emitem luz do próprio corpo para se proteger."
10005-179 = "Enfim, vou caçar tesouros hoje de novo. Quer vir?"
10005-180 = "Entendido, capitã."
10005-181 = "Eu não sabia, o mundo do oceano é realmente profundo."
10005-182 = "Sensei, olha isso!"
10005-184 = "Eu colei no teto."
10005-185 = "Uau, que lindo."
10005-186 = "Hehehe~, legal, né? Ficou melhor do que eu imaginava~"
10005-187 = "Hoje foi divertido, obrigada pelo presente."
10005-188 = "Então, vamos sair juntos de novo da próxima vez, tá? É uma promessa."
10005-189 = "Uhum, boa noite."
10005-190 = "Uma cama envolta em luz, que romântico."
10005-191 = "Ugh~, quando fico acordada até tarde, o cansaço sempre se arrasta até o dia seguinte..."
10005-192 = "Será que é por causa da idade também?~"
10005-193 = "Você também não deveria sair tarde da noite, Sensei."
10005-194 = "Vamos tomar cuidado, nós duas, tá?~"
10005-195 = "Hoshino, por que você fica acordada até tarde?"
10005-196 = "É verdade, o melhor é dormir cedo."
10005-197 = "Bem, esta velhota aqui tem lá seus motivos..."
10005-198 = "Espera aí, Sensei, você está se preocupando comigo?"
10005-199 = "Esta velhota aqui fica até emocionada~"
10005-200 = "É um aviso para uma aluna com mau comportamento."
10005-201 = "Você não é nada honesto(a), Sensei. Uhehe~"
10005-202 = "Sensei, o que aconteceu hoje é segredo, tá? Eu sei que você sabe guardar segredo, mas..."
10005-203 = "É que... é tudo meio vergonhoso."
10005-204 = "Uhe, então, até mais."
10005-205 = "Uhum, boa noite."
10005-206 = "Até mais."
10005-207 = "Eu quero comprar um livro. Sensei, pode vir comigo?"
10005-208 = "É um livro que não vende por aqui, então preciso ir um pouco longe..."
10005-209 = "Claro, tudo bem. Quer ir até o shopping?"
10005-210 = "Vamos, então~ É um pouco longe de Abydos, mas..."
10005-211 = "É provável que a gente encontre lá~"
10005-212 = "Aliás, você aceitou sem nem pensar duas vezes, né? Tinha que ser você, Sensei~"
10005-213 = "É porque foi um pedido da Hoshino, claro."
10005-214 = "Vamos nos encontrar por perto por enquanto, que tal?"
10005-215 = "Nossa, que surpresa~"
10005-216 = "Tentar agarrar a sorte com pura determinação... como esperado do Sensei. Esta velhinha está surpresa."
10005-217 = "Este é o poder de um adulto!"
10005-218 = "……Mas pensando bem, com esse dinheiro a gente poderia ter comprado os ingressos normalmente, né?"
10005-219 = "Se você disser isso, acaba a graça!"
10005-220 = "Sabe, há momentos em que um adulto não pode recuar."
10005-221 = "Uhehe, entendi~"
10005-222 = "Bem, de qualquer forma, obrigada."
10005-223 = "……Err, sobre aquele aquário, não quer ir comigo? Tenho dois ingressos e..."
10005-224 = "Sim, se você não se importar."
10005-225 = "Claro, obrigada."
10005-226 = "……Uhehe."
10005-227 = "……Você disse, né, Sensei?"
10005-228 = "É uma promessa, tá?"
10005-229 = "Então, vamos na próxima vez que for conveniente para nós dois, ok? Te mando uma mensagem depois~"
10005-230 = "Sensei, sobre aquela história do aquário..."
10005-231 = "A data de validade está quase chegando, que tal no próximo fim de semana?"
10005-232 = "Se não tiver problema, a gente se encontra na frente do aquário, combinado?~"
10005-233 = "Sim, tudo bem. Mal posso esperar."
10005-100050010 = "Que problemão, né?"
10005-100050020 = "Não importa onde eu me esconda,"
10005-100050030 = "minhas júniores fofas vêm me dar sermão..."
10005-100050040 = "Esta velhinha está triste."
10005-100050050 = "Mais sermão..."
10005-100050060 = "Você não muda nunca, Hoshino."
10005-100050070 = "Pois é."
10005-100050080 = "Sendo assim..."
10005-100050100 = "Não."
10005-100050110 = "Isso não tem nada a ver com aquilo, mas..."
10005-100050120 = "Sensei."
10005-100050130 = "Será que a gente pode se encontrar agora?"
10005-100050140 = "Sensei."
10005-100050150 = "Na verdade, esta velhinha tem vários itens para tirar um cochilo."
10005-100050160 = "Não ficou com curiosidade~?"
10005-100050170 = "Dizendo assim, fico com curiosidade mesmo."
10005-100050180 = "Posso ir te visitar de novo outra hora?"
10005-100050190 = "Né?"
10005-100050200 = "Então,"
10005-100050210 = "Da próxima vez, vou te mostrar outra coisa."
10005-100050220 = "Fique na expectativa~"
