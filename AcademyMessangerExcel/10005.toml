[translation]
10005-162 = "先生、もし時間あったら次の休日、対策委員会の教室まで来てくれない？"
10005-163 = "ちょっと先生に手伝ってほしくって"
10005-164 = "あと全然関係ないけど、鯨は水中で呼吸を我慢してるんだって、知ってた？"
10005-165 = "対策委員会の教室だね、了解"
10005-166 = "知らなかった。確かに哺乳類だもんね"
10005-167 = "先生、起きたら腰が折れそうなぐらい痛いんだけど……悲鳴を上げてる……"
10005-168 = "羽毛ってこういうものなの？"
10005-169 = "やっぱりこの歳だと、柔らかすぎるのはダメか……"
10005-170 = "ちゃんとしたベッドで寝たほうが良いよ"
10005-171 = "うーん……あのマットはまた倉庫に逆戻りかなあ……"
10005-172 = "どうして人間は、朝起きなきゃいけないんだろう……"
10005-173 = "まぶたが重すぎて地面に落ちそう……先生、助けて……"
10005-174 = "学生としての定めだから……"
10005-175 = "頑張って！ホシノならできるよ！"
10005-176 = "いっそ魚みたいにまぶたが無い方が楽かもしれないね…………むにゃ"
10005-177 = "先生、知ってた？"
10005-178 = "深海に住んでる魚には、身体から光を放って身を守るのもいるんだって"
10005-179 = "それはそれとして、今日も宝探しやるけど来る？"
10005-180 = "ラジャーです隊長"
10005-181 = "知らなかった、海の世界は奥が深いね"
10005-182 = "先生、見てこれ！"
10005-184 = "天井に貼ったんだ"
10005-185 = "すごい、綺麗だね"
10005-186 = "へっへっへ～、良いでしょ？これは想像以上だったな～"
10005-187 = "今日は楽しかったよ、プレゼントありがと"
10005-188 = "じゃ、また次も一緒にどっか行こうね。約束"
10005-189 = "うん、おやすみ"
10005-190 = "光に包まれたベッド、ロマンチックだね"
10005-191 = "うへ～、やっぱり夜中まで起きてると次の日まで引きずるねえ……"
10005-192 = "歳のせいもあるのかな～"
10005-193 = "先生もあんまり夜中に出かけたりしちゃダメだよ"
10005-194 = "お互い気を付けていこうね～"
10005-195 = "ホシノはどうして夜中まで起きてるの？"
10005-196 = "そうだね、夜は早く寝るに限るよ"
10005-197 = "おじさんの方はまあ色々事情があるというか……"
10005-198 = "というか先生、心配してくれてるの？"
10005-199 = "おじさん感激しちゃうな～"
10005-200 = "素行の良くない生徒への注意だよ"
10005-201 = "素直じゃないなあ先生は、うへへ～"
10005-202 = "先生、今日のことはみんなには秘密だよ？先生の口が堅いのは知ってるけど"
10005-203 = "その……色々恥ずかしいし"
10005-204 = "うへ、じゃあまたね"
10005-205 = "うん、おやすみ"
10005-206 = "またね"
10005-207 = "ちょっと本を買いたいんだけど。先生、一緒について来てくれない？"
10005-208 = "この辺では買えない本で、遠出しないといけないんだけど……"
10005-209 = "うん、いいよ。ショッピングモールの方まで行ってみる？"
10005-210 = "そうしよっか～、アビドスからはちょっと遠いけど"
10005-211 = "あそこならありそうだしね～"
10005-212 = "というか、一も二も無くOKなんだね、さっすが先生～"
10005-213 = "それはもちろん、ホシノの頼みだからね"
10005-214 = "とりあえず近くで待ち合わせよっか"
10005-215 = "いや～、びっくりしたよ～"
10005-216 = "幸運を根性で掴み取ろうとするなんて、さすが先生。おじさん驚きだよ"
10005-217 = "これぞ大人の力！"
10005-218 = "……でもよく考えると、そのお金で普通にチケット買えたかもね"
10005-219 = "それを言ったらおしまいだよ！"
10005-220 = "大人にはね、後には退けない時があるんだ"
10005-221 = "うへへ、そっか～"
10005-222 = "まあとにかく、ありがとね"
10005-223 = "……えっと、あのアクアリウム、一緒に行かない？チケットも2枚だし……"
10005-224 = "うん、私でよければ"
10005-225 = "もちろん、ありがとね"
10005-226 = "……うへへ"
10005-227 = "……言ったね、先生？"
10005-228 = "約束したからね？"
10005-229 = "じゃあ今度、お互いに都合の良い時にでも行こっか。また連絡する～"
10005-230 = "先生、この間のアクアリウムの話なんだけど"
10005-231 = "有効期限がもうそろそろだから、今度の週末にでもどう？"
10005-232 = "問題なければアクアリウムの前で待ち合わせってことで、よろしく～"
10005-233 = "うん、大丈夫。楽しみにしてるね"
10005-100050010 = "困ったものだねぇ"
10005-100050020 = "どこに隠れていても"
10005-100050030 = "可愛い後輩たちから小言が……"
10005-100050040 = "おじさん、悲しいよ"
10005-100050050 = "また小言を……"
10005-100050060 = "相変わらずだね、ホシノは"
10005-100050070 = "まあね"
10005-100050080 = "ってことで"
10005-100050100 = "いや"
10005-100050110 = "それとこれとは関係ないんだけど"
10005-100050120 = "先生"
10005-100050130 = "今から会えないかな？"
10005-100050140 = "先生"
10005-100050150 = "実はおじさん、いろんなお昼寝グッズを持ってるんだよね"
10005-100050160 = "気にならない～？"
10005-100050170 = "そう言われると、気になってくるね"
10005-100050180 = "今度また遊びに行っても良い？"
10005-100050190 = "でしょ？"
10005-100050200 = "それじゃ"
10005-100050210 = "次は別の物を見せてあげるよ"
10005-100050220 = "楽しみにしてて～"
