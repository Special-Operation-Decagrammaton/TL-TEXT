[translation]
20016-200160010 = "Professor, você está no Schale agora?"
20016-200160020 = "Sim, estou. O que houve?"
20016-200160030 = "Entendo."
20016-200160040 = "……Iroha?"
20016-200160050 = "Então, hoje eu vim para vadiar"
20016-200160060 = "quer dizer, vim perguntar sobre o trabalho."
20016-200160070 = "……Iroha, você nem tenta esconder, né?"
20016-200160080 = "Professor, você está trabalhando hoje também?"
20016-200160090 = "Essa quantidade enorme de trabalho……"
20016-200160100 = "Bem, eu entendo como se sente."
20016-200160110 = "Você acha que terminou, mas aparece mais, e quando pensa que alguém vai fazer, ninguém coloca a mão."
20016-200160120 = "É difícil ser um gerente intermediário, não é?"
20016-200160130 = "Aliás,"
20016-200160140 = "Hoje estou com vontade de beber algo amargo."
20016-200160150 = "Por favor, um americano bem forte."
20016-200160160 = "Iroha, você viu a mensagem que mandei acima?"
20016-200160170 = "Sim, claro."
20016-200160180 = "Então, até mais tarde."
20016-200160190 = "Será que sou eu que não estou entendendo o contexto……"
20016-200160200 = "Não dá para aguentar isso."
20016-200160210 = "Iroha, o que aconteceu?"
20016-200160220 = "Não, não é nada demais, mas……"
20016-200160230 = "Por que as pessoas precisam se mover tanto e ficar tão ocupadas……"
20016-200160240 = "Professor, será que a vida tem algum sentido para termos que chegar a esse ponto?"
20016-200160250 = "O assunto ficou pesado de repente, mas eu acho que tem, sim!?"
20016-200160260 = "É um saco, mas não tem outro jeito, né……"
20016-200160270 = "Já estou com preguiça até de digitar."
20016-200160280 = "E-esforce-se……"
