[translation]
16004-2101 = "Como vai, chefe!"
16004-2102 = "Eu sou a Pina, do grupo do \"Comitê de Gestão de Festivais\" da Academia Hyakkiyako!"
16004-2103 = "Conto com você!"
16004-2104 = "Chefe...?"
16004-2105 = "Grupo do \"Comitê de Festivais\"...?"
16004-2106 = "Ah"
16004-2107 = "Peço desculpas"
16004-2108 = "Foi uma apresentação repentina"
16004-2109 = "Ainda não estou acostumada com várias coisas"
16004-2110 = "Vou praticar um pouco e depois farei de novo"
16004-2111 = "De qualquer forma, venha nos visitar qualquer dia desses!!"
16004-2112 = "Hoje foi muito divertido, Sensei!"
16004-2113 = "Ainda não entendo o que é esse \"código de honra da Pina\" que você mencionou,"
16004-2114 = "mas se o Sensei disse, então não há dúvidas!"
16004-2115 = "Um dia eu também vou entender!"
16004-2116 = "Então, vamos nos ver de novo!! Com certeza!!"
16004-2117 = "Sensei~~!! Me ajude! SOCORRO!!"
16004-2118 = "Só posso pedir isso ao Sensei! Me ajude!"
16004-2119 = "O que houve?"
16004-2120 = "Você fez alguma besteira?"
16004-2121 = "Não consigo explicar isso por mensagem!"
16004-2122 = "Poderia vir aqui se tiver um tempo? Por favor!!"
16004-2123 = "Estou esperando!!"
16004-2124 = "Muito obrigada mesmo, Sensei!"
16004-2125 = "Como assistimos ao filme que você escolheu hoje,"
16004-2126 = "da próxima vez vamos assistir ao filme que eu escolhi!"
16004-2127 = "É uma promessa! Prometido, hein!"
16004-2128 = "Sensei, é a Pina!"
16004-2129 = "Como eu disse antes, da próxima vez vamos assistir ao filme que eu escolhi!"
16004-2130 = "Já preparei os ingressos!"
16004-2131 = "Estarei esperando!"
16004-2132 = "Conto com você!"
16004-2133 = "Muito obrigada pelo seu trabalho hoje!"
16004-2134 = "Sinto muito por ter sido minha culpa! E muito obrigada!!"
16004-2135 = "Vamos assistir a outro filme na próxima! Daqueles de cinema mesmo!"
16004-160040010 = "Sensei! Finalmente chegou a hora! Este momento!"
16004-160040020 = " \"Este momento\"...?"
16004-160040030 = "Sim!"
16004-160040040 = "Passamos muito tempo juntos até agora!"
16004-160040050 = "Nossa confiança também só cresceu!"
16004-160040060 = "Sendo assim... só pode ser \"aquilo\"!"
16004-160040070 = " ...\"Aquilo\"?"
16004-160040080 = "Isso mesmo!"
16004-160040090 = "Então, eu, a humilde Pina,"
16004-160040100 = "estarei esperando pela sua chegada, Sensei!"
