[translation]
16004-2101 = "ご機嫌いかがですか、お頭！"
16004-2102 = "私は百鬼夜行連合学院、「お祭り運営委員会」組のフィーナと申しやす！"
16004-2103 = "よろしくお願いしやす！"
16004-2104 = "お頭……？"
16004-2105 = "お祭り委員会「組」……？"
16004-2106 = "あっ"
16004-2107 = "失礼しました"
16004-2108 = "唐突な自己紹介でした"
16004-2109 = "まだ色々と慣れていなくて"
16004-2110 = "ちょっと練習してから、また今度もう一度やらせてください"
16004-2111 = "とにかく、今度遊びに来てくださいね！！"
16004-2112 = "今日はすごく楽しかったです、先生！"
16004-2113 = "先生の言った「フィーナの任侠」が何なのか、まだ分かりませんが"
16004-2114 = "先生が言ってくれたんだから、間違いありません！"
16004-2115 = "いつかは私も分かるはずです！"
16004-2116 = "それではまた会いましょう！！絶対に！！"
16004-2117 = "先生～～！！助けてくださ～い！HELP！！"
16004-2118 = "これは先生にしか頼めません！助けて！"
16004-2119 = "どうしたの？"
16004-2120 = "何かやっちゃったの？"
16004-2121 = "それは、メッセージでは説明できません！"
16004-2122 = "時間があったら来てくれませんか？お願いです！！"
16004-2123 = "待ってます！！"
16004-2124 = "本当にありがとうございました、先生！"
16004-2125 = "今日は先生が選んだ映画を一緒に見たので、"
16004-2126 = "次はフィーナが選んだ映画もふたりで見ましょう！"
16004-2127 = "絶対です！絶対ですよ！"
16004-2128 = "先生、フィーナです！"
16004-2129 = "この前お伝えしたように、今度は私が選んだ映画を見ましょう！"
16004-2130 = "チケットもすでに用意しました！"
16004-2131 = "それでは待ってます！"
16004-2132 = "よろしくお願いします！"
16004-2133 = "今日は本当にお疲れ様でした！"
16004-2134 = "私のせいですみません！そしてありがとうございました！！"
16004-2135 = "次もまた映画見ましょう！普通の映画館のやつです！"
16004-160040010 = "先生！いよいよ時が来ました！この時が！"
16004-160040020 = " 「この時」……？"
16004-160040030 = "はい！"
16004-160040040 = "私たちはこれまで、多くの時間を共にしました！"
16004-160040050 = "信頼も積み上がってきています！"
16004-160040060 = "となれば……アレしかありません！"
16004-160040070 = " ……「アレ」？"
16004-160040080 = "そうです！"
16004-160040090 = "では、不肖フィーナ！"
16004-160040100 = "先生がお越しになるのを、お待ちしております！"
