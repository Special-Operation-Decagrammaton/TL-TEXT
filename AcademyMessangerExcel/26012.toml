[translation]
26012-260120010 = "こんにちは、先生"
26012-260120020 = "どうか、本官を助けていただけませんか……？"
26012-260120030 = "もちろんだよ"
26012-260120040 = "実は本官、この度ライフセーバーの任務を命じられました"
26012-260120050 = "市民の安全を守る警官として、光栄なのですが……"
26012-260120060 = "その……"
26012-260120070 = "水上で人命救助を行なった経験がなくてですね"
26012-260120080 = "特別な訓練を積む必要があると、昨日になって知りました……"
26012-260120090 = "それは大変だね……"
26012-260120100 = "練習、間に合いそう？"
26012-260120110 = "そこでご相談がありまして……"
26012-260120120 = "訓練に付き合っていただきたいのです！"
26012-260120130 = "先生、こんにちは"
26012-260120140 = "あれから考えてみましたが……"
26012-260120150 = "やはり、今から訓練をしても間に合いそうもありません"
26012-260120160 = "1日2日じゃ難しいよね……"
26012-260120170 = "なので本官は、応急処置に専念することにしました！"
26012-260120180 = "落水者の生存率を少しでも上げるために！"
26012-260120190 = "方針を変えたんだね"
26012-260120200 = "たしかに、それも大事だよね"
26012-260120210 = "はい！先生がよろしければ、今回も訓練に付き合っていただいても良いでしょうか？"
26012-260120220 = "前回のような失敗はしないので、ご安心ください！"
26012-260120230 = "……先生、もしかしてマニュアルを読みましたか？"
26012-260120240 = "うん、読んだよ"
26012-260120250 = "もし私が溺れたら、キリノは助けてくれるんだよね？"
26012-260120260 = "も"
26012-260120270 = "もちろんです！"
26012-260120280 = "本官は、公私の区別をつけられる警官なので！"
26012-260120290 = "AEDのことを言ってるんだけど……"
26012-260120300 = "ほ、本官をからかわないでください！"
26012-260120310 = "先生！こんにちは、キリノです！"
26012-260120320 = "先生のおかげで、ライフセーバーの訓練が終了しました！"
26012-260120330 = "おめでとう、キリノ"
26012-260120340 = "これも先生が協力してくださったおかげです！"
26012-260120350 = "最後に訓練の復習をしようと思っているのですが、また付き合っていただけないでしょうか？"
26012-260120360 = "もちろん行くよ"
26012-260120370 = "ありがとうございます！"
26012-260120380 = "今度こそ、成長した姿をお見せしましょう！"
