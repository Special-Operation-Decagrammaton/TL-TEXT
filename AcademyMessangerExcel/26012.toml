[translation]
26012-260120010 = "Olá, Sensei."
26012-260120020 = "Poderia, por favor, me ajudar...?"
26012-260120030 = "Claro que sim."
26012-260120040 = "Na verdade, fui designada para a missão de salva-vidas."
26012-260120050 = "Como uma policial que protege a segurança dos cidadãos, é uma honra, mas..."
26012-260120060 = "É que..."
26012-260120070 = "Eu nunca tive experiência em resgate aquático."
26012-260120080 = "Só descobri ontem que precisava passar por um treinamento especial..."
26012-260120090 = "Isso é um problema, hein..."
26012-260120100 = "Vai dar tempo de treinar?"
26012-260120110 = "Por isso, gostaria de pedir um conselho..."
26012-260120120 = "Eu gostaria que você me acompanhasse no treinamento!"
26012-260120130 = "Sensei, olá."
26012-260120140 = "Pensei sobre aquilo desde então..."
26012-260120150 = "Realmente, não parece que vou conseguir a tempo se começar a treinar agora."
26012-260120160 = "É difícil em apenas um ou dois dias, né..."
26012-260120170 = "Por isso, decidi me concentrar nos primeiros socorros!"
26012-260120180 = "Para aumentar, nem que seja um pouco, a taxa de sobrevivência de quem cair na água!"
26012-260120190 = "Mudou de estratégia, então."
26012-260120200 = "Com certeza, isso também é muito importante."
26012-260120210 = "Sim! Se não se importar, Sensei, poderia me acompanhar no treinamento desta vez também?"
26012-260120220 = "Não vou cometer os mesmos erros da última vez, pode ficar tranquilo!"
26012-260120230 = "...Sensei, por acaso você leu o manual?"
26012-260120240 = "Sim, eu li."
26012-260120250 = "Se eu me afogar, a Kirino vai me salvar, né?"
26012-260120260 = "C-claro!"
26012-260120270 = "Com certeza!"
26012-260120280 = "Eu sou uma policial que sabe separar o lado profissional do pessoal!"
26012-260120290 = "Eu estava falando do DEA..."
26012-260120300 = "N-não zombe de mim!"
26012-260120310 = "Sensei! Olá, aqui é a Kirino!"
26012-260120320 = "Graças ao Sensei, o treinamento de salva-vidas terminou!"
26012-260120330 = "Parabéns, Kirino."
26012-260120340 = "Isso também foi graças à sua colaboração, Sensei!"
26012-260120350 = "Estou pensando em fazer uma revisão do treinamento por último, poderia me acompanhar mais uma vez?"
26012-260120360 = "Claro, vamos lá."
26012-260120370 = "Muito obrigada!"
26012-260120380 = "Desta vez, vou mostrar o quanto cresci!"
