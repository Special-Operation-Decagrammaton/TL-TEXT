[translation]
26012-260120010 = "Olá, Sensei."
26012-260120020 = "Por favor, o senhor poderia ajudar esta oficial...?"
26012-260120030 = "Claro que sim."
26012-260120040 = "Na verdade, esta oficial foi designada para atuar como salva-vidas desta vez."
26012-260120050 = "Como uma policial que protege a segurança dos cidadãos, fico honrada, mas..."
26012-260120060 = "É que..."
26012-260120070 = "Eu não tenho nenhuma experiência com resgate de vidas na água."
26012-260120080 = "Só fui descobrir ontem que seria necessário um treinamento especial..."
26012-260120090 = "Isso é complicado..."
26012-260120100 = "Acha que dá tempo de treinar?"
26012-260120110 = "Por isso, eu gostaria de lhe pedir um favor..."
26012-260120120 = "Eu gostaria que o senhor me acompanhasse no treinamento!"
26012-260120130 = "Sensei, olá."
26012-260120140 = "Eu andei pensando desde aquele dia, mas..."
26012-260120150 = "Como eu imaginava, acho que não vai dar tempo de treinar agora."
26012-260120160 = "Aprender isso em um ou dois dias é difícil..."
26012-260120170 = "Por isso, esta oficial decidiu se focar exclusivamente em primeiros socorros!"
26012-260120180 = "Para aumentar nem que seja um pouco a taxa de sobrevivência de quem cair na água!"
26012-260120190 = "Mudou de estratégia, hein."
26012-260120200 = "É verdade, isso também é importante."
26012-260120210 = "Sim! Se o senhor não se importar, Sensei, poderia me ajudar no treinamento mais uma vez?"
26012-260120220 = "Não vou cometer as mesmas falhas da última vez, então fique tranquilo!"
26012-260120230 = "...Sensei, por acaso o senhor leu o manual?"
26012-260120240 = "Sim, eu li."
26012-260120250 = "Se eu me afogar, você vai me salvar, não vai, Kirino?"
26012-260120260 = "C-"
26012-260120270 = "Claro que sim!"
26012-260120280 = "Afinal, esta oficial é uma policial que sabe separar muito bem os assuntos públicos dos privados!"
26012-260120290 = "Eu estava falando do DEA, mas..."
26012-260120300 = "P-Por favor, não brinque com esta oficial!"
26012-260120310 = "Sensei! Olá, aqui é a Kirino!"
26012-260120320 = "Graças ao senhor, terminei o meu treinamento de salva-vidas!"
26012-260120330 = "Parabéns, Kirino."
26012-260120340 = "Isso tudo foi graças à ajuda do senhor, Sensei!"
26012-260120350 = "Eu gostaria de fazer uma última revisão do treinamento, o senhor poderia me acompanhar mais uma vez?"
26012-260120360 = "Claro que eu vou."
26012-260120370 = "Muito obrigada!"
26012-260120380 = "Desta vez, vou lhe mostrar o quanto eu cresci!"