[translation]
10042-100420010 = "Sensei, está aí?"
10042-100420020 = "Está livre agora? Recebeu essa mensagem?"
10042-100420030 = "Atsuko?"
10042-100420040 = "Sim, sou eu. Bom dia."
10042-100420050 = "Bom dia."
10042-100420060 = "Já está quase de noite, mas bom dia."
10042-100420070 = "Nós estamos nos mudando de um lugar para outro agora."
10042-100420080 = "Não podemos ficar muito tempo em um só lugar."
10042-100420090 = "E também, na maioria das vezes estamos todas separadas."
10042-100420100 = "Ficar sozinha é entediante."
10042-100420110 = "Então, para eu te ver, Sensei..."
10042-100420120 = "...é difícil se você não vier até aqui."
10042-100420130 = "Resumindo, posso entender isso como um 'vamos nos encontrar porque estou entediada'...?"
10042-100420140 = "Sim."
10042-100420150 = "Exatamente."
10042-100420160 = "Então, até mais tarde."
10042-100420170 = "Sensei, boa noite."
10042-100420180 = "Decidimos sair daqui agora."
10042-100420190 = "Então, até mais. Entro em contato quando mudarmos de lugar."
10042-100420200 = "Sensei, bom dia."
10042-100420210 = "Encontrei um lugar interessante."
10042-100420220 = "Se tiver tempo, não quer vir dar uma passada?"
10042-100420230 = "Que tipo de lugar?"
10042-100420240 = "Um lugar onde podemos brincar de escolinha."
10042-100420250 = "Tenho certeza que vai ser divertido."
10042-100420260 = "Sim, entendi. Vou aguardar ansiosamente."
10042-100420270 = "Sensei."
10042-100420280 = "Sobre o meu hobby..."
10042-100420290 = "Eu gosto de flores."
10042-100420300 = "Flores... Você quer dizer cultivar flores?"
10042-100420310 = "Sim. Talvez eu tente criar um clube de jardinagem da próxima vez."
10042-100420320 = "Mas a única membra serei eu."
10042-100420330 = "Então, boa noite."
10042-100420340 = "Sensei, bom dia."
10042-100420350 = "Eu decidi."
10042-100420360 = "Vou fazer das flores o meu hobby."
10042-100420370 = "Entendi. Tipo ikebana?"
10042-100420380 = "Acho que seria uma boa."
10042-100420390 = "Conto com o seu apoio, Sensei."
10042-100420400 = "Sim. Atsuko, você tem alguma flor preferida?"
10042-100420410 = "...Flor preferida?"
10042-100420420 = "Hmm..."
10042-100420430 = "Eu gosto de qualquer tipo de flor."
10042-100420440 = "Gosto de hortênsias,"
10042-100420450 = "e também gosto de rosas."
10042-100420460 = "Por quê?"
10042-100420470 = "Não, nada. Obrigada."
10042-100420480 = "Sensei, bom trabalho hoje."
10042-100420490 = "Graças a você, consegui replantar muitas delas."
10042-100420500 = "Tomara que elas cresçam saudáveis."
10042-100420510 = "Sim. É verdade."
10042-100420520 = "E também, obrigada."
10042-100420530 = "Vou guardar com carinho, e não contarei a ninguém."
10042-100420540 = "Olá, Sensei."
10042-100420550 = "Ontem à noite, choveu muito forte."
10042-100420560 = "Será que o canteiro de flores está bem...?"
10042-100420570 = "Queria ir verificar, mas fico insegura de ir sozinha."
10042-100420580 = "Você poderia ir comigo?"
10042-100420590 = "Claro, com prazer."
