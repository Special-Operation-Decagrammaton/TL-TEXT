[translation]
10138-101380010 = "先生、今日学院に来るって言ってたよね？"
10138-101380020 = "うん、ちょっとした調査を依頼されてて"
10138-101380030 = "ちょうどよかった"
10138-101380040 = "ちょっと、アクセサリーの材料買ってきてくれない？"
10138-101380050 = "ちょうどいいやつがこっちの店になくて"
10138-101380060 = "……密輸の依頼？"
10138-101380070 = "んなわけないでしょ！"
10138-101380080 = "別に規制品じゃないし！"
10138-101380090 = "検問にも引っかからないわよ！"
10138-101380100 = "リスト送っとくから"
10138-101380110 = "こっち来るついでによろしく！"
10138-101380120 = "先生、ちゃんと帰れた？"
10138-101380130 = "また破けてないわよね？"
10138-101380140 = "大丈夫！問題ないよ！"
10138-101380150 = "ふふ。これは一つ貸しだからね"
10138-101380160 = "今度ちゃんと返してよ？"
10138-101380170 = "見つけてくれたのがレナでよかった！"
10138-101380180 = "私はよくなかったけどね！？"
10138-101380190 = "まぁいいわ。無事に帰れたならよかった"
10138-101380200 = "また連絡するわね"
10138-101380210 = "この間のこと、忘れてないよね？"
10138-101380220 = "返すチャンスが来たわよ？"
10138-101380230 = "何をすればいいの？"
10138-101380240 = "文章で伝えるのもアレだし"
10138-101380250 = "とりあえず来てくれない？"
10138-101380260 = "あの時間に、あの場所ね"
10138-101380270 = "先生……どうしよう"
10138-101380280 = "どうしたの？"
10138-101380290 = "先輩たちに"
10138-101380300 = "例の写真を見せたんだけど"
10138-101380310 = "先生の腕が……"
10138-101380320 = "うっすら写ってる写真が"
10138-101380330 = "あったんだよね"
10138-101380340 = "それってダメだったの……？"
10138-101380350 = "先生と一緒に行ったとは言えないじゃない"
10138-101380360 = "だから、これが幽霊の正体、って言った"
10138-101380370 = "私の口で……"
10138-101380380 = "シャーッ！！！"
10138-101380390 = "幽霊が居た……って"
10138-101380400 = "私が！！！自分の口で言ったの！"
10138-101380410 = "そして先輩たちは"
10138-101380420 = "これが七つ目の不思議だって、大騒ぎ！！！！"
10138-101380430 = "ああああああ！！もう！！！！！！"
10138-101380440 = "見てなさいよ！！！！"
10138-101380450 = "次こそは絶対……！！！！！"
10138-101380460 = "一緒に頑張ろうね……"
10138-101380470 = "この間のこと覚えてる？"
10138-101380480 = "先生の腕が写真に写ってて"
10138-101380490 = "それが幽霊だ、って私が"
10138-101380500 = "先輩たちに言っちゃったやつ"
10138-101380510 = "覚えてるよ。ごめんね……"
10138-101380520 = "なんで先生が謝るのよ"
10138-101380530 = "写り込んだことに気づかなかった私のせいでしょ"
10138-101380540 = "それで……"
10138-101380550 = "先輩たちが私に"
10138-101380560 = "お守りを作るといいと言ってきてね"
10138-101380570 = "だから私の分を作るついでに"
10138-101380580 = "先生のも作ってあげようと思って"
10138-101380590 = "レナが……お守りを？"
10138-101380600 = "うわ"
10138-101380610 = "わざわざ復唱しないで！"
10138-101380620 = "私だって意味不明だと思ってるんだから！"
10138-101380630 = "それじゃ暇な時来てね"
10138-101380640 = "じゃあ今から行くね！"
10138-101380650 = "先生あれからどう？"
10138-101380660 = "変なこと、起きてないよね？"
10138-101380670 = "ガム踏んじゃったりとか"
10138-101380680 = "レナのお守りのおかげで何ともないよ！"
10138-101380690 = "別にお守りを信じてるわけじゃないけど……"
10138-101380700 = "ずっと身につけててよ"
10138-101380710 = "私があげたやつなんだから"
10138-101380720 = "いい？"
10138-101380730 = "うん！レナの思いがこもった物だからね"
10138-101380740 = "またそういうこと言って"
10138-101380750 = "それじゃ、またね"
10138-101380760 = "先生、今日ワイルドハントに来るんだよね？"
10138-101380770 = "そうだよ。チョコバナナクレープでも買ってく？"
10138-101380780 = "別にいらないわよ！"
10138-101380790 = "というか、お願いがあって"
10138-101380800 = "アクセサリーの材料を買ってきてほしいの"
10138-101380810 = "お店がテロにあっちゃってさ"
10138-101380820 = "テロ！？"
10138-101380830 = "誰かが店の壁に"
10138-101380840 = "変な絵を描いちゃって……"
10138-101380850 = "それを全部落とすまで休業だって"
10138-101380860 = "はぁ……"
10138-101380870 = "そんなわけだから、頼んだわよ"
10138-101380880 = "チョコバナナクレープも買っていくね！"
10138-101380890 = "好きにすれば！？"
