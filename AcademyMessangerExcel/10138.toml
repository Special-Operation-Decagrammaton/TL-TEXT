[translation]
10138-101380010 = "Сенсей, ты же говорил, что сегодня приедешь к нам в академию?"
10138-101380020 = "Да, меня попросили провести небольшое расследование."
10138-101380030 = "Вот и отлично."
10138-101380040 = "Можешь купить для меня кое-какие материалы для аксессуаров?"
10138-101380050 = "В здешних магазинах нужных не найти."
10138-101380060 = "……Это что, запрос на контрабанду?"
10138-101380070 = "Да с чего ради!"
10138-101380080 = "Это же не какие-то там запрещённые товары!"
10138-101380090 = "На КПП к ним никто не придерется!"
10138-101380100 = "Я скину список."
10138-101380110 = "Заскочи за ними по дороге, пожалуйста!"
10138-101380120 = "Сенсей, ты нормально до дома добрался?"
10138-101380130 = "Тебя там опять в клочья не порвали?"
10138-101380140 = "Я в порядке! Всё обошлось!"
10138-101380150 = "Хе-хе. Теперь ты предо мной в долгу."
10138-101380160 = "Смотри у меня, потом вернёшь должок как следует, понял?"
10138-101380170 = "Я так рад, что меня нашла именно Рена!"
10138-101380180 = "А вот я вообще этому не рада, ясно вам?!"
10138-101380190 = "Ой, ладно. Рада, что ты вернулся целым и невредимым."
10138-101380200 = "Я ещё напишу."
10138-101380210 = "Ты ведь не забыл про то, что было на днях?"
10138-101380220 = "Час расплаты настал."
10138-101380230 = "И что мне нужно сделать?"
10138-101380240 = "В сообщении такое трудно объяснить."
10138-101380250 = "Может, просто приедешь пока?"
10138-101380260 = "В то самое время, в то самое место."
10138-101380270 = "Сенсей... что мне делать?"
10138-101380280 = "Что случилось?"
10138-101380290 = "Я показала старшеклассницам..."
10138-101380300 = "...ту фотку, о которой мы говорили."
10138-101380310 = "И там твоя рука, Сенсей...."
10138-101380320 = "...едва заметно попала в кадр."
10138-101380330 = "Она ведь там была, да?"
10138-101380340 = "Это же плохо...?"
10138-101380350 = "Я ведь не могла им прямо сказать, что ходила туда с тобой!"
10138-101380360 = "Поэтому я сказала, что это истинный облик призрака..."
10138-101380370 = "Собственными губами..."
10138-101380380 = "А-а-а-а!!!"
10138-101380390 = "...сказала, что это призрак!."
10138-101380400 = "Я!!! Я сама это сказала!"
10138-101380410 = "А старшие девчонки теперь..."
10138-101380420 = "...подняли жуткий шум и кричат, что это седьмая школьная тайна!!!"
10138-101380430 = "А-а-а-а-а!! Да блин!!!!!!"
10138-101380440 = "Ну погоди у меня!!!!"
10138-101380450 = "В следующий-то раз уж точно...!!!!!"
10138-101380460 = "Давай постараемся вместе..."
10138-101380470 = "Ты помнишь, что было на днях?"
10138-101380480 = "Ну, когда твоя рука попала на снимок,"
10138-101380490 = "а я сказала старшим,"
10138-101380500 = "что это призрак"
10138-101380510 = "Помню. Прости..."
10138-101380520 = "Почему ты извиняешься, Сенсей?"
10138-101380530 = "Я сама виновата, что не заметила тебя в кадре."
10138-101380540 = "Так вот..."
10138-101380550 = "Старшеклассницы велели мне"
10138-101380560 = "сделать защитный амулет."
10138-101380570 = "Ну и... раз уж я всё равно делаю его себе,"
10138-101380580 = "подумала, что могу смастерить один и для тебя."
10138-101380590 = "Рена... делает амулет?"
10138-101380600 = "Ого."
10138-101380610 = "Не повторяй за мной!"
10138-101380620 = "Я и сама знаю, что это глупость, ясно?!"
10138-101380630 = "Короче, зайди, как освободишься."
10138-101380640 = "Ладно, уже бегу!"
10138-101380650 = "Сенсей, ну как ты там после того случая?"
10138-101380660 = "Ничего странного не происходило?"
10138-101380670 = "На жвачку там не наступал, например?"
10138-101380680 = "Благодаря амулету Рены у меня всё просто отлично!"
10138-101380690 = "Не то чтобы я сама верила во всю эту чушь с амулетами, но..."
10138-101380700 = "Носи его постоянно и не снимай."
10138-101380710 = "Я всё-таки его тебе подарила."
10138-101380720 = "Понял?"
10138-101380730 = "Ага! Ведь он заряжен чувствами Рены."
10138-101380740 = "Ну вот, опять ты за своё."
10138-101380750 = "Ладно, давай, до встречи."
10138-101380760 = "Сенсей, ты ведь приедешь сегодня в Вайлдхант?"
10138-101380770 = "Ага. Купить тебе шоколадно-банановый блинчик?"
10138-101380780 = "Не нужно мне ничего!"
10138-101380790 = "Вообще, у меня к тебе просьба."
10138-101380800 = "Нужно, чтобы ты купил кое-какие материалы."
10138-101380810 = "Тот магазин подвергся террористической атаке."
10138-101380820 = "Теракту!?"
10138-101380830 = "Кто-то разлевал дурацкие рисунки"
10138-101380840 = "прямо на стенах магазина..."
10138-101380850 = "И теперь они закрыты, пока всё это не отмоют."
10138-101380860 = "Эх..."
10138-101380870 = "В общем, такие дела. Надеюсь на тебя."
10138-101380880 = "А шоколадно-банановый блинчик я всё равно куплю!"
10138-101380890 = "Да делай ты что хочешь?!"