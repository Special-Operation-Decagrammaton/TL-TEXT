[translation]
10138-101380010 = "Sensei, você disse que viria para a academia hoje, certo?"
10138-101380020 = "Sim, fui encarregado de uma pequena investigação."
10138-101380030 = "Que bom."
10138-101380040 = "Você poderia comprar alguns materiais para acessórios para mim?"
10138-101380050 = "Não tem o que eu preciso nas lojas daqui."
10138-101380060 = "……Um pedido de contrabando?"
10138-101380070 = "Claro que não!"
10138-101380080 = "Não é um item regulamentado!"
10138-101380090 = "Nem vai ser pego em um posto de controle!"
10138-101380100 = "Vou te enviar a lista."
10138-101380110 = "Por favor, faça isso quando vier para cá!"
10138-101380120 = "Sensei, você conseguiu voltar bem?"
10138-101380130 = "Não rasgou de novo, certo?"
10138-101380140 = "Tudo bem! Sem problemas!"
10138-101380150 = "Hehe. Essa é uma dívida."
10138-101380160 = "Você vai me pagar de volta da próxima vez, certo?"
10138-101380170 = "Que bom que foi a Rena quem me encontrou!"
10138-101380180 = "Mas para mim não foi bom, né!?"
10138-101380190 = "Ah, bem. Se você voltou em segurança, então está tudo bem."
10138-101380200 = "Vou entrar em contato novamente."
10138-101380210 = "Você não esqueceu o que aconteceu da última vez, certo?"
10138-101380220 = "Sua chance de pagar chegou!"
10138-101380230 = "O que eu preciso fazer?"
10138-101380240 = "É meio estranho explicar por texto..."
10138-101380250 = "Por enquanto, você pode vir?"
10138-101380260 = "Naquela hora, naquele lugar, certo?"
10138-101380270 = "Sensei... o que eu faço?"
10138-101380280 = "O que aconteceu?"
10138-101380290 = "Para as minhas veteranas..."
10138-101380300 = "Eu mostrei aquela foto."
10138-101380310 = "O braço do Sensei..."
10138-101380320 = "Havia uma foto onde ele estava levemente visível."
10138-101380330 = "Estava lá, sabe."
10138-101380340 = "Isso foi ruim...?"
10138-101380350 = "Eu não podia dizer que fui com o Sensei, né?"
10138-101380360 = "Então, eu disse que essa era a verdadeira identidade do fantasma."
10138-101380370 = "Com a minha própria boca..."
10138-101380380 = "SHAAAAA!!!"
10138-101380390 = "Que havia um fantasma..."
10138-101380400 = "EU!!! Disse com a minha própria boca!"
10138-101380410 = "E as veteranas..."
10138-101380420 = "Fizeram um grande alvoroço, dizendo que era o sétimo mistério!!!!"
10138-101380430 = "AAAAAAH!! Chega!!!!!!!!"
10138-101380440 = "Aguarde e verá!!!!"
10138-101380450 = "Da próxima vez, com certeza...!!!!!"
10138-101380460 = "Vamos nos esforçar juntos, certo...?"
10138-101380470 = "Você se lembra do que aconteceu da última vez?"
10138-101380480 = "O braço do Sensei apareceu na foto."
10138-101380490 = "E eu disse que era um fantasma."
10138-101380500 = "Aquilo que eu disse para as veteranas."
10138-101380510 = "Eu lembro. Me desculpe..."
10138-101380520 = "Por que o Sensei está se desculpando?"
10138-101380530 = "A culpa é minha por não ter percebido que apareci na foto, não é?"
10138-101380540 = "Então..."
10138-101380550 = "As veteranas me disseram..."
10138-101380560 = "que seria bom fazer um amuleto."
10138-101380570 = "Então, aproveitando que vou fazer o meu,"
10138-101380580 = "também pensei em fazer um para o Sensei."
10138-101380590 = "A Rena... um amuleto?"
10138-101380600 = "Ah!"
10138-101380610 = "Não precisa repetir!"
10138-101380620 = "Até eu acho que não faz sentido!"
10138-101380630 = "Então, venha quando tiver tempo."
10138-101380640 = "Então, vou agora!"
10138-101380650 = "Sensei, como você está desde então?"
10138-101380660 = "Nada estranho aconteceu, certo?"
10138-101380670 = "Tipo, pisar em chiclete ou algo assim?"
10138-101380680 = "Graças ao amuleto da Rena, estou bem!"
10138-101380690 = "Não é que eu acredite em amuletos, mas..."
10138-101380700 = "Sempre use-o."
10138-101380710 = "Fui eu quem te deu."
10138-101380720 = "Certo?"
10138-101380730 = "Sim! Porque é algo feito com os sentimentos da Rena."
10138-101380740 = "De novo dizendo essas coisas."
10138-101380750 = "Então, até mais."
10138-101380760 = "Sensei, você virá para Wild Hunt hoje, certo?"
10138-101380770 = "Sim. Quer que eu compre um crepe de chocolate com banana?"
10138-101380780 = "Não preciso de nada!"
10138-101380790 = "Na verdade, eu tenho um pedido."
10138-101380800 = "Quero que você compre materiais para acessórios."
10138-101380810 = "A loja sofreu um ataque terrorista."
10138-101380820 = "Terrorismo!?"
10138-101380830 = "Alguém na parede da loja..."
10138-101380840 = "desenhou umas coisas estranhas..."
10138-101380850 = "Até que tudo seja removido, a loja estará fechada."
10138-101380860 = "Ah..."
10138-101380870 = "Sendo assim, conto com você."
10138-101380880 = "Também vou comprar um crepe de chocolate com banana!"
10138-101380890 = "Faça o que quiser!"
