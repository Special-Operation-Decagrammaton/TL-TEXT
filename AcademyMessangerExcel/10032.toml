[translation]
10032-100320010 = "先生！"
10032-100320020 = "あらためて、明けましておめでとー！"
10032-100320030 = "いつの間にお正月だ……"
10032-100320040 = "うん、明けましておめでとう"
10032-100320050 = "えー、何その先生のリアクション。つまんな～い"
10032-100320060 = "しょうがないなぁ……そんなふにゃふにゃな先生でも一気に燃え上がるような"
10032-100320070 = "「ものすごく楽しいこと」を用意してあげる！"
10032-100320080 = "ふにゃふにゃ……？"
10032-100320090 = "「ものすごく楽しいこと」……？"
10032-100320100 = "じゃあ楽しみにしててね、先生！"
10032-100320110 = "え、えっ……？"
10032-100320120 = "ムツキ……？"
10032-100320130 = "先生って、新年のお願いごともう決めた？"
10032-100320140 = "もちろん！"
10032-100320150 = "そういえばまだ……"
10032-100320160 = "ふーん、そうなんだ"
10032-100320170 = "先生のお願いごと、気になるな―"
10032-100320180 = "あ、そうなんだ"
10032-100320190 = "まあ、今からゆっくり決めれば良いんじゃない？"
10032-100320200 = "とりあえず先生、行こう！"
10032-100320210 = "えっと、どこに？"
10032-100320220 = "せっかくお正月なんだから決まってるでしょ？"
10032-100320230 = "正月なんだから、正月らしいところに行かないと！"
10032-100320240 = "ほらほら、早く準備して！先生！"
10032-100320250 = "先生！羽根つきしよっ！"
10032-100320260 = "いきなりだね……？"
10032-100320270 = "この前の敗北の屈辱、思いっきり晴らしちゃうから！"
10032-100320280 = "さー、尋常に勝負！"
10032-100320290 = "待ってるからね！早く早く！"
10032-100320300 = "先生のおかげでお正月、すっごい楽しかった！ありがとね！"
10032-100320310 = "これから先もずっと"
10032-100320320 = "私とたーっくさん遊んでね、先生♡"
