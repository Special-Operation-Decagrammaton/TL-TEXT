[translation]
26000-1882 = "お久しぶりです、チナツです。私のこと覚えていますか"
26000-1883 = "この前はバタバタしていて、きちんとご挨拶ができませんでしたので"
26000-1884 = "そのうち、あらためてご挨拶をする機会がありましたら嬉しいです"
26000-1885 = "～チナツ～"
26000-1886 = "今日は本当にありがとうございました、先生"
26000-1887 = "このご恩はどうお返しすればいいのか……"
26000-1888 = "いつか絶対に、お返しさせてください"
26000-1889 = "……で、では"
26000-1890 = "これからもよろしくお願いします　～チナツ～"
26000-1891 = "こんにちは、先生"
26000-1892 = "前回のお返しのこともありますし、"
26000-1893 = "できればもう一度お会いしたいのですが……"
26000-1894 = "お時間は大丈夫でしょうか？"
26000-1895 = "チナツのお呼びとあらば24時間いつでも！"
26000-1896 = "この日を！この日を待っていた……っ！"
26000-1897 = "え、っと……"
26000-1898 = "すみません、ちょっと引きました"
26000-1899 = "いえその、嫌ということではないのですが……"
26000-1900 = "……"
26000-1901 = "えっと、後ほど場所をお伝えしますので。そこでお待ちしております"
26000-1902 = "～チナツ～"
26000-1903 = "今日は本当にありがとうございました、先生"
26000-1904 = "この気持ち、どうやってお伝えすれば良いのか分からないくらいです"
26000-1905 = "その……"
26000-1906 = "……いえ"
26000-1907 = "すみません、何でもありません"
26000-1908 = "ありがとうございました、ではまた　～チナツ～"
26000-1909 = "こんにちは、先生"
26000-1910 = "もしよかったら、先生のご都合が良いお時間帯を教えていただけませんか？"
26000-1911 = "個人的に相談したいことがありまして"
26000-1912 = "今日の仕事が終わった頃とかどう？"
26000-1913 = "今すぐでも大丈夫！"
26000-1914 = "承知しました、ではそれでお願いします"
26000-1915 = "お時間いただきありがとうございます"
26000-1916 = "お伺いしますね　～チナツ～"
26000-1917 = "疲れたと感じた時には、いつでも連絡してください"
26000-1918 = "いえ、"
26000-1919 = "これは疲れそうだなと思うようなことがありましたら、私を呼んでください"
26000-1920 = "また疲労が溜まってしまわないよう、私もお手伝いしますので"
26000-1921 = "それではまた　～チナツ～"
26000-260000010 = "先生、おはようございます。チナツです"
26000-260000020 = "近頃は、お忙しいでしょうか？"
26000-260000030 = "実は、お願いしたいことがありまして……"
26000-260000040 = "どうしたの？"
26000-260000050 = "これは、まさか……！？"
26000-260000060 = "大したことではないのですが"
26000-260000070 = "いえ"
26000-260000080 = "その"
26000-260000090 = "そういう類では無いと言いますか"
26000-260000100 = "えっと……"
26000-260000110 = "お仕事のご相談、です。書類作業のお手伝いをお願いできればと思いまして"
26000-260000120 = "ちょっとひとりで行うには量が多くて……"
26000-260000130 = "もちろん、お忙しいようでしたら無理にとは言えないのですが"
26000-260000140 = "大丈夫、すぐに行くね"
26000-260000150 = "あ"
26000-260000160 = "えっと、それほど急がなくても大丈夫ですので"
26000-260000170 = "ありがとうございます　～チナツ～"
26000-260000180 = "今日は本当にありがとうございました"
26000-260000190 = "先生に来ていただけてなかったら、終わってなかったと思います"
26000-260000200 = "その"
26000-260000210 = "もし"
26000-260000220 = "もしよろしければ、なのですが……"
26000-260000230 = "また何かあれば、お願いをしてもよろしいでしょうか？"
26000-260000240 = "うん、もちろん"
26000-260000250 = "ありがとうございます"
26000-260000260 = "その時は、きちんと別の場所を"
26000-260000270 = "あ"
26000-260000280 = "えっと"
26000-260000290 = "……"
26000-260000300 = "すみません"
26000-260000310 = "その"
26000-260000320 = "……"
26000-260000330 = "同じ場所で、大丈夫です"
26000-260000340 = "先生、いかがお過ごしですか？"
26000-260000350 = "私は今日、久しぶりのお休みでして……"
26000-260000360 = "私も休み！"
26000-260000370 = "今日は羽目を外すんだ……！"
26000-260000380 = "ふふ"
26000-260000390 = "それはよかったです"
26000-260000400 = "……"
26000-260000410 = "……ほどほどにしてくださいね"
26000-260000420 = "突然のメッセージ、失礼しました"
26000-260000430 = "良い一日を　～チナツ～"
26000-260000440 = "お疲れ様でした、先生"
26000-260000450 = "お休みの日なのに、お仕事をさせてしまいましたね……"
26000-260000460 = "おかげで、充実した休日になったよ"
26000-260000470 = "体力は使ったけど、気力が回復した！"
26000-260000480 = "そうでしたか"
26000-260000490 = "では、次の休日は体力の回復に当てましょう"
26000-260000500 = "ふふっ"
26000-260000510 = "近いうちに、お伺いします　～チナツ～"
