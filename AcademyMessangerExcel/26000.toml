[translation]
26000-1882 = "Faz tempo que não nos vemos, é a Chinatsu. Você se lembra de mim?"
26000-1883 = "Da última vez, as coisas estavam muito corridas e não consegui te cumprimentar direito."
26000-1884 = "Ficaria feliz se tivéssemos a oportunidade de nos cumprimentar novamente em breve."
26000-1885 = "～Chinatsu～"
26000-1886 = "Muito obrigada por hoje, Sensei."
26000-1887 = "Como poderei retribuir esse favor..."
26000-1888 = "Por favor, deixe-me retribuir algum dia."
26000-1889 = "E-então..."
26000-1890 = "Conto com você daqui para frente. ～Chinatsu～"
26000-1891 = "Olá, Sensei."
26000-1892 = "Como ainda tenho aquele favor para retribuir,"
26000-1893 = "eu gostaria de te encontrar mais uma vez, se possível..."
26000-1894 = "Você teria um tempo disponível?"
26000-1895 = "Se a Chinatsu me chamar, estarei disponível 24 horas por dia!"
26000-1896 = "Este dia! Eu estava esperando por este dia...!"
26000-1897 = "Ah, bem..."
26000-1898 = "Desculpe, acho que me assustei um pouco."
26000-1899 = "Não, quer dizer, não é que eu não goste..."
26000-1900 = "..."
26000-1901 = "Bem, eu te aviso o local mais tarde. Estarei te esperando lá."
26000-1902 = "～Chinatsu～"
26000-1903 = "Muito obrigada por hoje, Sensei."
26000-1904 = "Não sei nem como expressar o que estou sentindo."
26000-1905 = "Sobre isso..."
26000-1906 = "...Não, nada."
26000-1907 = "Desculpe, não é nada."
26000-1908 = "Muito obrigada, até mais. ～Chinatsu～"
26000-1909 = "Olá, Sensei."
26000-1910 = "Se não for incômodo, poderia me dizer em qual horário você está livre?"
26000-1911 = "Tenho algo pessoal para consultar com você."
26000-1912 = "Que tal quando eu terminar o trabalho hoje?"
26000-1913 = "Pode ser agora mesmo!"
26000-1914 = "Entendido, então faremos assim."
26000-1915 = "Obrigada por reservar um tempo para mim."
26000-1916 = "Estarei indo aí. ～Chinatsu～"
26000-1917 = "Sempre que se sentir cansado, por favor, entre em contato comigo."
26000-1918 = "Não, na verdade,"
26000-1919 = "se houver algo que pareça que vai te deixar exausto, me chame."
26000-1920 = "Eu também vou ajudar para que você não acumule fadiga novamente."
26000-1921 = "Até mais. ～Chinatsu～"
26000-260000010 = "Bom dia, Sensei. É a Chinatsu."
26000-260000020 = "Você tem estado muito ocupado ultimamente?"
26000-260000030 = "Na verdade, tenho um pedido para te fazer..."
26000-260000040 = "O que houve?"
26000-260000050 = "Será que é...!?"
26000-260000060 = "Não é nada demais, mas..."
26000-260000070 = "Não,"
26000-260000080 = "é que..."
26000-260000090 = "digamos que não é desse tipo de assunto."
26000-260000100 = "Bem..."
26000-260000110 = "É sobre um assunto de trabalho. Gostaria de pedir sua ajuda com algumas tarefas de papelada."
26000-260000120 = "É que a quantidade é um pouco grande para eu fazer sozinha..."
26000-260000130 = "Claro, se você estiver ocupado, não quero forçar nada."
26000-260000140 = "Tudo bem, estou indo agora mesmo."
26000-260000150 = "Ah."
26000-260000160 = "Bem, não precisa ter tanta pressa assim."
26000-260000170 = "Muito obrigada. ~Chinatsu~"
26000-260000180 = "Muito obrigada por hoje."
26000-260000190 = "Se o Sensei não tivesse vindo, acho que não teríamos terminado."
26000-260000200 = "Sobre isso..."
26000-260000210 = "Se..."
26000-260000220 = "Se não for pedir muito..."
26000-260000230 = "Eu poderia pedir sua ajuda novamente caso precise?"
26000-260000240 = "Sim, claro."
26000-260000250 = "Muito obrigada."
26000-260000260 = "Da próxima vez, em um lugar diferente..."
26000-260000270 = "Ah."
26000-260000280 = "Bem..."
26000-260000290 = "..."
26000-260000300 = "Desculpe."
26000-260000310 = "Sobre isso..."
26000-260000320 = "..."
26000-260000330 = "O mesmo lugar está ótimo."
26000-260000340 = "Sensei, como você está?"
26000-260000350 = "Hoje eu finalmente tive um dia de folga..."
26000-260000360 = "Eu também estou de folga!"
26000-260000370 = "Hoje vou aproveitar ao máximo...!"
26000-260000380 = "Fufu."
26000-260000390 = "Fico feliz em saber disso."
26000-260000400 = "..."
26000-260000410 = "...Mas não exagere, está bem?"
26000-260000420 = "Desculpe pela mensagem repentina."
26000-260000430 = "Tenha um bom dia. ~Chinatsu~"
26000-260000440 = "Bom trabalho hoje, Sensei."
26000-260000450 = "Mesmo sendo seu dia de folga, acabei fazendo você trabalhar..."
26000-260000460 = "Graças a isso, tive um dia de folga muito produtivo."
26000-260000470 = "Gastei energia, mas recuperei meu ânimo!"
26000-260000480 = "Foi assim?"
26000-260000490 = "Então, na próxima folga, vamos dedicar o tempo para recuperar suas energias."
26000-260000500 = "Fufu."
26000-260000510 = "Em breve, irei visitá-lo. ~Chinatsu~"
