[translation]
20029-200290010 = "Professor,"
20029-200290020 = "Já está pronto para sair rumo ao mar?"
20029-200290030 = "Hum, o que eu deveria levar..."
20029-200290040 = "Fufu, não se preocupe."
20029-200290050 = "Eu já preparei as coisas, então o professor só precisa vir preparado mentalmente."
20029-200290060 = "Ah... e não se esqueça de trazer seu traje de banho também."
20029-200290070 = "B-bem, pelo menos isso eu deveria..."
20029-200290080 = "Fufu. Então, nos vemos na frente do meu quarto."
20029-200290090 = "Estarei esperando."
20029-200290100 = "Como foi o banho de sol, professor?"
20029-200290110 = "Ainda bem que estou vivo..."
20029-200290120 = "Sim...? Hum, você está se sentindo bem?"
20029-200290130 = "Não se esqueça de beber água antes de dormir, viu?"
20029-200290140 = "Graças à Mimori, já estou bem!"
20029-200290150 = "Fufu, fico feliz em ouvir isso."
20029-200290160 = "Então, nos vemos mais tarde."
20029-200290170 = "Bom dia, professor."
20029-200290180 = "Bom dia, Mimori."
20029-200290190 = "O tempo está ótimo hoje também, não é?"
20029-200290200 = "Sim, o tempo está realmente maravilhoso."
20029-200290210 = "Com essa brisa suave, está muito agradável."
20029-200290220 = "Sinto que será um dia maravilhoso."
20029-200290230 = "Então, vamos dar o nosso melhor hoje!"
20029-200290240 = "Professor."
20029-200290250 = "Eu gostaria de passar o dia de hoje na praia com você..."
20029-200290260 = "Você teria um tempo disponível?"
20029-200290270 = "Com certeza."
20029-200290280 = "Então, conto com você."
20029-200290290 = "...Estou muito ansiosa."
20029-200290300 = "Meu coração está batendo tão forte assim..."
20029-200290310 = "P-por favor, tente relaxar um pouco...?"
