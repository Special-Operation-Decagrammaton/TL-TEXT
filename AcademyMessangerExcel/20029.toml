[translation]
20029-200290010 = "先生、"
20029-200290020 = "海に出かける準備はお済みですか？"
20029-200290030 = "えっと、私は何を持っていけば……"
20029-200290040 = "ふふっ、大丈夫です"
20029-200290050 = "持ち物は私が用意しましたので、先生は心の準備をしていらしてください"
20029-200290060 = "あ……それと、自分の水着もお持ちくださいね"
20029-200290070 = "さ、流石にそれくらいは……"
20029-200290080 = "ふふっ。では、私の部屋の前でお会いしましょう"
20029-200290090 = "お待ちしております"
20029-200290100 = "日光浴はいかがでしたか、先生？"
20029-200290110 = "生きてて良かった……"
20029-200290120 = "はい……？えっと、体調は大丈夫でしょうか？"
20029-200290130 = "お水、忘れずに飲んでから寝てくださいね"
20029-200290140 = "ミモリのおかげで、もう元気だよ！"
20029-200290150 = "ふふっ、それなら良かったです"
20029-200290160 = "では、また後でお会いしましょう"
20029-200290170 = "おはようございます、先生"
20029-200290180 = "おはよう、ミモリ"
20029-200290190 = "今日も良い天気だね"
20029-200290200 = "はい、本当に良いお天気ですね"
20029-200290210 = "穏やかな風もあって、過ごしやすいですし"
20029-200290220 = "なんだか素敵な日になりそうです"
20029-200290230 = "それでは、今日も頑張りましょう！"
20029-200290240 = "先生"
20029-200290250 = "今日は先生と一緒に、海辺で過ごしたいのですが……"
20029-200290260 = "お時間、大丈夫でしょうか？"
20029-200290270 = "もちろんだよ"
20029-200290280 = "それでは、よろしくお願いします"
20029-200290290 = "……とても、楽しみです"
20029-200290300 = "こんなにも、胸がドキドキするなんて……"
20029-200290310 = "も、もう少し気楽にね……？"
