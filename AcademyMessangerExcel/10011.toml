[translation]
10011-808 = "O lanche de hoje no Jardim de Infância Baikaen são as frutas docinhas que ganhamos da associação comercial!"
10011-809 = "Pessoal, não se atrasem para participar, hein!"
10011-810 = "……Essa mensagem é mesmo para mim?"
10011-811 = "Estava gostoso, Sensei?"
10011-812 = "Estava delicioso, obrigado."
10011-813 = "Fufu, que bom que você gostou."
10011-814 = "Vamos preparar mais lanches, então venha para o Jardim de Infância Baikaen quando quiser!"
10011-815 = "Na verdade, por volta do meio-dia de hoje,"
10011-816 = "eu planejo fazer um show de marionetes para que as crianças do Jardim de Infância Baikaen escovem os dentes por vontade própria."
10011-817 = "Um show de marionetes? Parece divertido."
10011-818 = "Sim."
10011-819 = "É um show de marionetes no estilo Super Sentai sobre derrotar os germes malvados da cárie, e a reação é sempre ótima."
10011-820 = "Só que, no momento, não tenho um assistente para fazer o papel da \"cárie\"..."
10011-821 = "Se não for incômodo, Sensei, você poderia me ajudar?"
10011-822 = "Eu não sou muito bom em atuar..."
10011-823 = "Fufu, não se preocupe. Eu estarei bem ao seu lado para ajudar."
10011-824 = "Graças a você, Sensei, conseguimos terminar o show de marionetes sem problemas!"
10011-825 = "Sensei, não se esqueça de escovar os dentes depois das refeições de agora em diante, hein!"
10011-826 = "Sim, Instrutora Shun!"
10011-827 = "Tudo bem, eu não sou criança..."
10011-828 = "Fufu, que bom menino. Brincadeirinha."
10011-829 = "Escovar os dentes é importante até para os adultos!"
10011-830 = "Farei outra inspeção surpresa, então não se esqueça de agora em diante, hein!"
10011-831 = "Desculpe, não estou me sentindo bem... Não vou passar no Jardim de Infância Baikaen, já estou de saída."
10011-832 = "Você está bem? Pegou um resfriado?"
10011-833 = "É só um mal-estar... Desculpe por te preocupar."
10011-834 = "Sensei, cuide da sua saúde também, tá bom?"
10011-835 = "Fufu, conversar com você me animou, Sensei."
10011-836 = "De alguma forma, quando estou com você, Sensei, parece que eu volto a ser uma criança normal."
10011-837 = "Eu vi você fazendo algo que parecia divertido com as crianças do Jardim de Infância Baikaen agora há pouco..."
10011-838 = "Algo divertido?"
10011-839 = "Aquele \"aviãozinho\", que você coloca as mãos sob os braços e levanta a pessoa bem alto!"
10011-840 = "Se não for incômodo, você poderia fazer isso comigo também?"
10011-841 = "Fazer isso com você não seria um pouco perigoso, Shun...?"
10011-842 = "Não se preocupe. Meu corpo é mais flexível do que você imagina, Sensei."
10011-843 = "Fufu, da próxima vez que nos encontrarmos, por favor, não se esqueça."
10011-844 = "Obrigada por sempre brincar com as crianças do Jardim de Infância Baikaen, Sensei."
10011-845 = "Mas o \"aviãozinho\", um dia eu com certeza vou pedir para você fazer."
10011-846 = "Não se esqueça, hein!"
10011-847 = "Eu já disse, fazer isso com você é perigoso em vários sentidos..."
10011-848 = "Sensei, você tem um tempo hoje à tarde?"
10011-849 = "Sim, tenho. O que foi?"
10011-850 = "No Jardim de Infância Baikaen, nós damos presentes para os aniversariantes do mês,"
10011-851 = "mas toda vez eu fico em dúvida na hora de escolher os presentes..."
10011-852 = "Se não for incômodo, você poderia me ajudar a escolher os presentes hoje?"
10011-853 = "Claro."
10011-854 = "Fufu, muito obrigada."
10011-855 = "Então, depois da aula, no shopping de Kivotos, combinado?"
10011-856 = "Todos adoraram aquele bolo que você recomendou, Sensei."
10011-857 = "Obrigada por me recomendar uma loja tão boa."
10011-858 = "Que bom"
10011-859 = "Conto com você na próxima vez também!"
10011-860 = "Sensei, por acaso você não tem exagerado no trabalho ultimamente?"
10011-861 = "Você parecia cansado(a)..."
10011-862 = "Virei a noite por dois dias seguidos, mas ainda estou bem"
10011-863 = "(Sem resposta. Parece que já está dormindo)"
10011-864 = "Não está nada bem...!"
10011-865 = "Se continuar assim, você pode acabar com uma doença grave um dia!"
10011-866 = "Poxa! Se estivesse mesmo dormindo, tudo bem, mas você está acordado(a), não é...?!"
10011-867 = "O cansaço é a raiz de todas as doenças, então dormir bem é importante, sabia?"
10011-868 = "Fufu, se sente um pouco melhor, Sensei?"
10011-869 = "Sim, graças a você, me sinto bem mais revigorado(a)"
10011-870 = "Quando estiver se sentindo mal de novo, pode passar no Baikaien a qualquer hora, tá bom?"
10011-871 = "Vou preparar um futon em segredo para que ninguém descubra. Fufu..."
