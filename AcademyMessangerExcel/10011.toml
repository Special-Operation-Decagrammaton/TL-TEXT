[translation]
10011-808 = "本日の梅花園のおやつは、商会から頂いてきた甘ーいフルーツですよ"
10011-809 = "みなさん、時間に遅れないように参加してくださいね！"
10011-810 = "……これ、本当に私宛のメッセージかな？"
10011-811 = "お味はいかがでしたか、先生？"
10011-812 = "美味しかったよ、ありがとう"
10011-813 = "ふふ、お口に合ったのならよかったです"
10011-814 = "またおやつをご用意してますので、いつでも梅花園にいらしてくださいね！"
10011-815 = "実は今日のお昼ごろに、"
10011-816 = "梅花園の子たちが進んで歯磨きしてくれるよう、人形劇をやる予定なんです"
10011-817 = "人形劇か、楽しそうだね"
10011-818 = "はい"
10011-819 = "悪い虫歯菌を倒す戦隊モノの人形劇で、反応も毎回すごく良いんです"
10011-820 = "ただ、「虫歯」役をやってくれるアシスタントの方が今いなくて……"
10011-821 = "よろしければ先生、手伝ってくださいませんか？"
10011-822 = "私、演技に自信は無いんだけど……"
10011-823 = "ふふ、大丈夫ですよ。私がすぐ隣でお手伝いしますので"
10011-824 = "先生のおかげで、人形劇を無事に終えることができました！"
10011-825 = "先生もお食事の後の歯磨き、これからも忘れないでくださいね！"
10011-826 = "はい、シュン教官！"
10011-827 = "大丈夫だよ、私は子供じゃないし……"
10011-828 = "ふふ、良い子ですね。なんて"
10011-829 = "大人にとっても、歯を磨くのは大事なことですから！"
10011-830 = "また抜き打ち検査しますので、これからも忘れないようにしてくださいね！"
10011-831 = "すみません、体調が悪くて……梅花園には寄らず、このまま失礼します"
10011-832 = "大丈夫？風邪でも引いちゃったのかな？"
10011-833 = "ちょっと具合が悪いだけですので……ご心配をおかけしてしまいすみません"
10011-834 = "先生も、健康には気を付けてくださいね"
10011-835 = "ふふ、先生とお話ししていたら、気分が明るくなりました"
10011-836 = "なんだか先生の前だと私も、普通の子供に戻ってしまうみたいです"
10011-837 = "先ほど梅花園の子たちと、面白そうなことをしていたのを見たのですが……"
10011-838 = "面白そうなこと？"
10011-839 = "脇に手を入れて高く持ち上げるあの、「たかいたかい」です！"
10011-840 = "よろしければ、私にもしていただけませんか？"
10011-841 = "シュンとするのはちょっと危ないんじゃないかな……？"
10011-842 = "大丈夫です。私、先生が思ってる以上に体が柔らかいので"
10011-843 = "ふふ、今度またお会いした時に、ぜひお願いしますね。"
10011-844 = "いつも梅花園の子たちと遊んでいただいてありがとうございます、先生"
10011-845 = "ただ「たかいたかい」は、いつかまた必ずやっていただきますので"
10011-846 = "忘れないでくださいね！"
10011-847 = "だから、シュンとやるのは色々な意味で危ないって……"
10011-848 = "先生、今日の午後はお時間ありますでしょうか？"
10011-849 = "うん、大丈夫だよ。どうしたの？"
10011-850 = "梅花園では毎月誕生日の子たちにプレゼントを渡すのですが、"
10011-851 = "毎回プレゼント選びに悩んでしまっていまして……"
10011-852 = "よろしければ今日、一緒にプレゼント選びを手伝っていただけませんか？"
10011-853 = "もちろん"
10011-854 = "ふふ、ありがとうございます"
10011-855 = "それでは放課後、キヴォトス市内のショッピングモールでお願いしますね"
10011-856 = "先生が紹介してくださったあのケーキ、みんな喜んでいました"
10011-857 = "良いお店を紹介してくださって、ありがとうございます"
10011-858 = "それは良かった"
10011-859 = "また次回も、ぜひお願いしますね！"
10011-860 = "先生、もしかして最近、ご無理なさっていませんか？"
10011-861 = "お疲れのご様子でしたが……"
10011-862 = "二日連続で徹夜だけど、まだ大丈夫"
10011-863 = "（返事がない。もう眠っているようだ）"
10011-864 = "大丈夫、ではありません……！"
10011-865 = "そのままですと、いつかは大変な病気になってしまうかもしれませんよ！"
10011-866 = "もうっ！本当に眠られたのなら良いのですが、起きてますよね……！？"
10011-867 = "疲れは万病のもとなんですから、ぐっすり寝ることは大事なんですよ？"
10011-868 = "ふふ、少しは楽になりましたか、先生？"
10011-869 = "うん、おかげ様でだいぶスッキリしたよ"
10011-870 = "また辛くなった時は、いつでも梅花園に立ち寄ってくださいね"
10011-871 = "みんなにはバレないよう、こっそり布団を敷いておきますので。ふふっ……"
