[translation]
13012-130120010 = "Sensei, é hora da patrulha!"
13012-130120020 = "Ontem fomos ao Distrito Norte, então que tal darmos uma volta no Distrito Central hoje!"
13012-130120030 = "Hoje devia ser o nosso dia de folga..."
13012-130120040 = "Não podíamos descansar só por hoje...?"
13012-130120050 = "Não podemos fazer isso! Afinal, os incidentes não acontecem nas salas de reunião, e sim nas ruas!"
13012-130120060 = "Enquanto estamos desfrutando de um bom cochilo..."
13012-130120070 = "Um crime de grande escala que os cidadãos não conseguem resolver pode estar prestes a acontecer em algum lugar!"
13012-130120080 = "Se for assim, me dá menos vontade ainda de ir..."
13012-130120090 = "Sensei, é um incidente!"
13012-130120100 = "Parece que alunas delinquentes fizeram reféns e se barricaram em uma joalheria em Shiba Town!"
13012-130120110 = "E parece que o negociador está atrasado devido a um engarrafamento no trânsito..."
13012-130120120 = "......"
13012-130120130 = "Se esta oficial aproveitar esta oportunidade, for até o local primeiro e conseguir negociar com sucesso..."
13012-130120140 = "Será que o alto escalão da Valkyrie reconheceria a capacidade desta oficial?"
13012-130120150 = "Não seria melhor esperar pelo negociador profissional...?"
13012-130120160 = "...Não, eu já decidi. Neste exato momento os reféns devem estar tremendo de medo."
13012-130120170 = "Mesmo que eu ainda não seja uma policial oficial, não posso ficar parada."
13012-130120180 = "Kirino, entrando em ação!"
13012-130120190 = "Uuu, Sensei... (T_T)"
13012-130120200 = "O alto escalão me deu uma advertência sobre aquele incidente com reféns..."
13012-130120210 = "Se a minha mira com a arma fosse um pouco melhor..."
13012-130120220 = "Sensei, o que eu devo fazer para melhorar a minha mira?"
13012-130120230 = "Isso é um pouco difícil de perguntar para mim..."
13012-130120240 = "É verdade... Então, pelo menos, da próxima vez que esta oficial for atirar, o senhor poderia ficar ao meu lado observando?"
13012-130120250 = "Eu ouvi dizer que para aumentar a taxa de acerto, é importante corrigir manias ruins e a postura na hora de atirar!"
13012-130120260 = "Sim, se for isso, eu ajudo com prazer."
13012-130120270 = "Muito obrigada, Sensei!"
13012-130120280 = "Então, estarei aguardando no estande de tiro da escola!"
13012-130120290 = "Sensei, estou ficando muito nervosa..."
13012-130120300 = "O que foi? Tem alguma prova daqui a pouco?"
13012-130120310 = "Hoje à tarde, as crianças de um jardim de infância aqui perto virão visitar a Escola de Polícia Valkyrie..."
13012-130120320 = "E esta oficial ficou encarregada de guiá-los."
13012-130120330 = "Quando penso no que fazer se eu cometer algum erro, fico muito ansiosa..."
13012-130120340 = "Se não houver problema em eu ir, quer que eu te dê um suporte lá?"
13012-130120350 = "Eh, o senhor faria isso?"
13012-130120360 = "Isso me deixa muito mais aliviada, muito obrigada, Sensei!"
13012-130120370 = "Parece que você está bem motivada, se houver algo que eu possa ajudar, pode contar comigo."
13012-130120380 = "Isso me ajuda muito. É que, já que é uma ótima oportunidade, eu gostaria de mostrar para as crianças o lado legal da polícia."
13012-130120390 = "Afinal, esta oficial também participou de uma excursão parecida quando era criança, e foi lá que eu decidi me tornar uma policial..."
13012-130120400 = "Eu preciso mostrar uma imagem tão legal quanto a dos policiais daquela época...!"
13012-130120410 = "Kirino, só uma coisinha."
13012-130120420 = "Sim, o que seria?"
13012-130120430 = "Por favor, não puxe a sua arma. Vai ser perigoso se você acabar acertando as crianças."
13012-130120440 = "I-Isso é...! M-Mesmo sendo um pouco frustrante... sim, o senhor tem razão..."