[translation]
13012-130120010 = "Sensei, é hora da patrulha!"
13012-130120020 = "Ontem foi no Distrito Norte, então que tal fazermos o Distrito Central hoje?"
13012-130120030 = "Hoje deveria ser feriado..."
13012-130120040 = "Não podemos tirar o dia de folga hoje...?"
13012-130120050 = "Não podemos fazer isso! Os incidentes não acontecem na sala de reuniões, mas sim no campo de batalha!"
13012-130120060 = "Enquanto desfrutamos de um sono tranquilo..."
13012-130120070 = "Pode estar acontecendo algum crime grave em algum lugar que os cidadãos comuns não conseguem resolver!"
13012-130120080 = "Sendo assim, eu não quero ir ainda mais..."
13012-130120090 = "Sensei, é uma emergência!"
13012-130120100 = "Parece que alunos delinquentes fizeram reféns em uma joalheria na Cidade Shiba!"
13012-130120110 = "E, ao que parece, o negociador está atrasado devido ao trânsito..."
13012-130120120 = "..."
13012-130120130 = "Se eu aproveitar esta oportunidade para ir ao local e conseguir negociar com sucesso..."
13012-130120140 = "Será que os superiores da Valkyrie reconheceriam minha capacidade?"
13012-130120150 = "Não seria melhor esperar pelo negociador profissional...?"
13012-130120160 = "...Não, eu decidi. Mesmo neste momento, os reféns devem estar tremendo de medo."
13012-130120170 = "Embora eu ainda não seja uma policial oficial, não posso ficar parada."
13012-130120180 = "Kirino, entrando em ação!"
13012-130120190 = "Uuu, Sensei... (T_T)"
13012-130120200 = "Por causa daquele incidente com reféns da última vez, recebi um aviso dos superiores..."
13012-130120210 = "Se ao menos minha pontaria com a arma fosse melhor..."
13012-130120220 = "Sensei, o que devo fazer para melhorar minha pontaria?"
13012-130120230 = "Isso é um pouco... não sei se sou a pessoa certa para perguntar..."
13012-130120240 = "Entendo... Então, pelo menos, você poderia me observar enquanto eu treino tiro da próxima vez?"
13012-130120250 = "Ouvi dizer que, para melhorar a precisão, é importante corrigir os maus hábitos e a postura ao atirar!"
13012-130120260 = "Sim, ficarei feliz em ajudar."
13012-130120270 = "Obrigada, Sensei!"
13012-130120280 = "Então, estarei esperando no estande de tiro da escola!"
13012-130120290 = "Sensei, estou muito nervosa..."
13012-130120300 = "O que houve? Tem algum exame depois disso?"
13012-130120310 = "Hoje à tarde, as crianças de um jardim de infância próximo virão visitar a Academia de Polícia Valkyrie..."
13012-130120320 = "E eu fui encarregada de guiá-los."
13012-130120330 = "Fico muito ansiosa só de pensar em cometer algum erro..."
13012-130120340 = "Se eu puder ir, quer que eu te ajude por perto?"
13012-130120350 = "Sério, pode mesmo?"
13012-130120360 = "Isso me deixa mais tranquila, obrigada Sensei!"
13012-130120370 = "Parece que você está muito determinada, se houver algo em que eu possa ajudar, conte comigo."
13012-130120380 = "Isso ajuda muito. Bem, já que é uma oportunidade única, quero mostrar às crianças o lado legal da polícia."
13012-130120390 = "Afinal, eu mesma fui a uma visita dessas quando era pequena, e foi lá que decidi me tornar policial..."
13012-130120400 = "Preciso mostrar uma imagem tão legal quanto a dos policiais daquela época...!"
13012-130120410 = "Kirino, só uma coisa."
13012-130120420 = "Sim, o que seria?"
13012-130120430 = "Não saque sua arma. É perigoso se atingir alguma das crianças."
13012-130120440 = "I-isso é...! Bem, embora eu não queira... sim, você tem razão..."
