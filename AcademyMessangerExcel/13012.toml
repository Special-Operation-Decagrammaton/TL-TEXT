[translation]
13012-130120010 = "先生、パトロールの時間ですよ！"
13012-130120020 = "昨日は北区だったので、今日は中央区を回ることにしましょうか！"
13012-130120030 = "今日は、休日のはず……"
13012-130120040 = "今日くらいお休みにしない……？"
13012-130120050 = "そうはいきません！事件は会議室ではなく、現場で起きるのですから！"
13012-130120060 = "私たちが、気持ちの良い二度寝を享受している間にも……"
13012-130120070 = "市民の方々には解決できないような大型犯罪が、どこかで起きつつあるかもしれないんですよ！"
13012-130120080 = "それなら尚のこと、あんまり行きたくないな……"
13012-130120090 = "先生、事件です！"
13012-130120100 = "どうやら芝タウンの宝石店で、不良生徒が人質を取って立てこもっているそうです！"
13012-130120110 = "そしてどうやら、交通渋滞で交渉人の到着が遅れているらしく……"
13012-130120120 = "……"
13012-130120130 = "本官がこの機に、先に現場へ向かって交渉を成功させたら……"
13012-130120140 = "ヴァルキューレの上層部の方々も、本官の能力を認めてくださるでしょうか？"
13012-130120150 = "プロの交渉人を待った方が良いんじゃ……？"
13012-130120160 = "……いえ、決めました。今この瞬間も人質は恐怖に震えているはずです"
13012-130120170 = "まだ正式な警察ではないとはいえ、立ち止まってはいられません"
13012-130120180 = "キリノ、出動します！"
13012-130120190 = "うう、先生……(T_T)"
13012-130120200 = "この前の人質事件のことで、上層部の方々から警告を受けてしまいました……"
13012-130120210 = "もっと、私の銃の腕前さえ良ければ……"
13012-130120220 = "先生、射撃の腕はどうすれば上がるのでしょうか？"
13012-130120230 = "それはちょっと、私に聞かれても……"
13012-130120240 = "そうですね……ではせめて、今度本官が射撃をしているところを隣で見てていただけませんか？"
13012-130120250 = "命中率を上げるためには、射撃時の悪い癖や姿勢を治すことが大事だと聞きましたので！"
13012-130120260 = "うん、それなら喜んで"
13012-130120270 = "ありがとうございます、先生！"
13012-130120280 = "では、校内の射撃場にてお待ちしております！"
13012-130120290 = "先生、すごく緊張してきました……"
13012-130120300 = "どうしたの？何かこの後試験とか？"
13012-130120310 = "本日の午後、近くの幼稚園の園児たちがヴァルキューレ警察学校の見学に来るそうでして……"
13012-130120320 = "その案内を、本官が担当することになったのです"
13012-130120330 = "何かミスをしてしまったらどうしようと考えると、すごく不安で……"
13012-130120340 = "私も行ってよければ、横でサポートしようか？"
13012-130120350 = "え、良いんですか？"
13012-130120360 = "それなら安心です、ありがとうございます先生！"
13012-130120370 = "何だかすごく気合入ってそうだし、私に手伝えることがあればぜひ"
13012-130120380 = "助かります。そうですね、せっかくの機会ですので、園児たちには警察のかっこいい姿を見せてあげたいなと思っているんです"
13012-130120390 = "何せ本官も、幼い頃に同じような見学会に行って、そこで警察官になることを志したので……"
13012-130120400 = "あの時の警察の方々のように、カッコいい姿を見せないと……！"
13012-130120410 = "キリノ、一つだけ"
13012-130120420 = "はい、何でしょう？"
13012-130120430 = "銃は取り出さないようにね。園の子たちに当たると危ないから"
13012-130120440 = "そ、それは……！な、何だか不本意ではありますが……はい、そうですね……"
