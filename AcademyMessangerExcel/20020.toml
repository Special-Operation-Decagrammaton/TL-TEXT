[translation]
20020-200200010 = "ふふっ。こんにちは、先生"
20020-200200020 = "ん？"
20020-200200030 = "あら。私から連絡が来て、感激のあまり言葉に詰まっているのですね"
20020-200200040 = "ええ、当然のことです"
20020-200200050 = "私のような天才美少女から、いきなりメッセージが送られてきたんですもの"
20020-200200060 = "すみません、どちらさまですか？"
20020-200200070 = "なっ、まさかとは思いますが、私の連絡先を登録していないのですか……？"
20020-200200080 = "ごめんね。冗談だよ、ヒマリ"
20020-200200090 = "「ぴえん」……先生ったら、そんな意地悪なご冗談を"
20020-200200100 = "さしもの天才美少女も驚きました"
20020-200200110 = "「ぴえん」みたいな流行語をヒマリが使うとは……"
20020-200200120 = "これでもヴェリタスの部長を兼任している身ですから、ネット文化も少々嗜んでおります"
20020-200200130 = "こういう時は……「どや顔」をしながら言うべきでしたね"
20020-200200140 = "そ、そうだね……"
20020-200200150 = "それよりお話があるのです"
20020-200200160 = "先ほどシャーレをハッキング……いえ、調査したところ"
20020-200200170 = "本日はお休みとのことですが、間違いありませんか？"
20020-200200180 = "ハッキングって言っちゃったよ……"
20020-200200190 = "たしかに休みだけど……"
20020-200200200 = "ふふっ、ちょうど良かったです"
20020-200200210 = "後ほど座標を送りますので"
20020-200200220 = "ミレニアムでお待ちしていますね、先生"
20020-200200230 = "行くのはもう決定なんだ……すぐ向かうね"
20020-200200240 = "先生、今日はシャーレの仕事でミレニアムを訪れるのですね"
20020-200200250 = "うん、そうだよ"
20020-200200260 = "では、用事が終わりましたら……そうですね、15時頃でどうでしょう？"
20020-200200270 = "……お願いしたいことがありまして"
20020-200200280 = "分かった。仕事が終わったらすぐに向かうね"
20020-200200290 = "ふふふっ、では後ほどお会いしましょう"
20020-200200300 = "先生、少々大変なことになりまして"
20020-200200310 = "どうしたの？大丈夫！？"
20020-200200320 = "これは私一人では手の施しようがないと申しますか……"
20020-200200330 = "大至急、隠れ家に来ていただけませんか？お待ちしています"
20020-200200340 = "先生。私、とびっきりのお宝を手に入れました"
20020-200200350 = "ヒマリがお宝って言うことは……"
20020-200200360 = "気になるような、心配になるような……"
20020-200200370 = "あら、寂しい言い方ですね"
20020-200200380 = "こうしてる場合ではありません。すぐにでもお見せしたいのですが"
20020-200200390 = "分かった。これから向かうね"
20020-200200400 = "ふふっ、ではまた後ほど"
