[translation]
20020-200200010 = "Fufu. Olá, Sensei."
20020-200200020 = "Hm?"
20020-200200030 = "Ora. Você ficou tão emocionado ao receber uma mensagem minha que até perdeu as palavras, não é?"
20020-200200040 = "Sim, é compreensível."
20020-200200050 = "Afinal, você recebeu uma mensagem repentina de uma garota genial e bela como eu."
20020-200200060 = "Desculpe, quem é você?"
20020-200200070 = "O quê? Não me diga que você não salvou o meu contato...?"
20020-200200080 = "Desculpe. É brincadeira, Himari."
20020-200200090 = "“Pien”... Sensei, que brincadeira de mau gosto."
20020-200200100 = "Até esta garota genial e bela ficou surpresa."
20020-200200110 = "A Himari usando uma gíria como “pien”..."
20020-200200120 = "Como também ocupo o cargo de presidente da Veritas, eu entendo um pouco da cultura da internet."
20020-200200130 = "Nessas horas... eu deveria ter dito isso com uma “cara de convencida”."
20020-200200140 = "É, pois é..."
20020-200200150 = "Mas, deixando isso de lado, eu tenho um assunto para tratar."
20020-200200160 = "Acabei de hackear... digo, investigar o Schale."
20020-200200170 = "Diz que hoje é seu dia de folga, está correto?"
20020-200200180 = "Você acabou de dizer que hackeou..."
20020-200200190 = "É verdade que estou de folga, mas..."
20020-200200200 = "Fufu, que perfeito."
20020-200200210 = "Vou te enviar as coordenadas mais tarde."
20020-200200220 = "Estarei te esperando em Millennium, Sensei."
20020-200200230 = "Parece que já está decidido que eu vou... estou indo agora mesmo."
20020-200200240 = "Sensei, hoje você vai visitar Millennium por causa do trabalho no Schale, certo?"
20020-200200250 = "Sim, isso mesmo."
20020-200200260 = "Então, quando terminar seus afazeres... que tal por volta das 15h?"
20020-200200270 = "...Tenho algo que gostaria de lhe pedir."
20020-200200280 = "Entendido. Assim que eu terminar o trabalho, irei direto para aí."
20020-200200290 = "Fufufu, então nos vemos mais tarde."
20020-200200300 = "Sensei, algo um pouco sério aconteceu."
20020-200200310 = "O que houve? Você está bem!?"
20020-200200320 = "É uma situação que, sozinha, não consigo resolver..."
20020-200200330 = "Poderia vir ao meu esconderijo o mais rápido possível? Estou te esperando."
20020-200200340 = "Sensei. Eu consegui um tesouro incrível."
20020-200200350 = "Quando a Himari diz que é um tesouro..."
20020-200200360 = "Fico curioso, mas ao mesmo tempo preocupado..."
20020-200200370 = "Ora, que jeito desanimado de falar."
20020-200200380 = "Não temos tempo a perder. Eu queria te mostrar imediatamente."
20020-200200390 = "Entendido. Estou indo agora."
20020-200200400 = "Fufu, então até mais tarde."
