[translation]
10001-373 = "Sensei, você não acha que ficou bem mais quente ultimamente?"
10001-374 = "Depois que terminamos uma missão, fica super abafado..."
10001-375 = "Sério? O verão ainda está longe..."
10001-376 = "Não é porque você deu o seu melhor durante a missão?"
10001-377 = "Será? Foi só impressão minha...?"
10001-378 = "Ah, falando nisso, Sensei."
10001-379 = "Agora há pouco, na frente da sorveteria,"
10001-380 = "eu vi uma aluna da Trinity comendo sorvete de menta com chocolate..."
10001-381 = "Será que sorvete com gosto de pasta de dente ajuda a regular a temperatura corporal...?"
10001-382 = "Eu não entendo as pessoas que gostam de menta com chocolate..."
10001-383 = "Não tem gosto de pasta de dente! Peça desculpas para a menta com chocolate!"
10001-384 = "Concorda, né?"
10001-385 = "Ah... Sensei, você é do time deles?"
10001-386 = "O mundo das estudantes é mesmo complexo..."
10001-387 = "Sensei, eu tenho uma preocupação ultimamente..."
10001-388 = "Preocupação? É algo relacionado ao trabalho do Seminário?"
10001-389 = "Não. Não tem nada a ver com isso, é algo bem pessoal."
10001-390 = "Eu queria que você me ouvisse."
10001-391 = "Se eu puder ajudar, pode contar comigo a qualquer hora."
10001-392 = "Sim, por favor."
10001-393 = "...Obrigada, Sensei."
10001-394 = "Sensei, outro dia você disse que ia me ajudar na pesquisa sobre as coisas que as alunas gostam, não é?"
10001-395 = "Sim, eu disse, mas..."
10001-396 = "Vamos fazer a próxima pesquisa."
10001-397 = "Quero que você venha para o centro de Kivotos."
10001-398 = "Agora?"
10001-399 = "Sim, agora."
10001-400 = "Cantar em um espaço fechado é tão divertido..."
10001-401 = "Senti a mesma euforia de quando disparamos nossas armas contra os inimigos."
10001-402 = "...Será que seria ainda mais divertido atirar no karaokê?"
10001-403 = "Isso de jeito nenhum!"
10001-404 = "Sensei, hoje vou comprar roupas novas."
10001-405 = "Espero que você encontre roupas legais."
10001-406 = "Eu queria que você visse se as roupas combinam comigo..."
10001-407 = "Você está livre hoje depois da aula?"
10001-408 = "Ah, sim. Estou."
10001-409 = "Que bom. Então, vamos nos encontrar no shopping, no centro de Kivotos."
10001-410 = "Operação concluída, missão cumprida. Bom trabalho, Sensei."
10001-411 = "Quando passamos um pelo outro agora há pouco, parece que seu braço estava sangrando. Já cuidou disso?"
10001-412 = "Tudo bem, foi só um arranhão."
10001-413 = "É comum ter ferimentos assim durante as missões."
10001-414 = "Não pode. Venha para a enfermaria, vou desinfetar isso."
10001-415 = "Mas está tudo bem..."
10001-100010010 = "Sensei, preciso da sua ajuda."
10001-100010020 = "Encontramos um sinal misterioso perto das ruínas."
10001-100010030 = "Estou pensando em ir investigar um lugar um pouco distante, o que também serve como trabalho para o Departamento de Investigação de Fenômenos Sobrenaturais."
10001-100010040 = "Acho que vai ser um dia quente..."
10001-100010050 = "Desta vez vai dar tudo certo, pode deixar comigo."
10001-100010060 = "Oh, parece que você está bem confiante desta vez."
10001-100010070 = "Você se preparou de alguma forma desta vez?"
10001-100010080 = "Uhum."
10001-100010090 = "Eu me preparei para momentos como este."
10001-100010100 = "Pode criar expectativas."
10001-100010110 = "Estranho..."
10001-100010120 = "Apesar de eu ter me refrescado com o ventilador, o Sensei parecia estar com calor."
10001-100010130 = "Será que a potência era baixa? Ou será que o Sensei também sente muito calor?"
10001-100010140 = "Hmm..."
10001-100010150 = "Talvez fosse melhor se a gente ficasse um pouco mais perto."
10001-100010160 = "Se estivéssemos colados, o resultado poderia ter sido diferente."
10001-100010170 = "O que você acha?"
10001-100010180 = "Acho que o problema é outro..."
10001-100010190 = "Mas, ainda assim, não foi uma experiência tão ruim."
10001-100010200 = "Hmm..."
10001-100010210 = "? O que isso quer dizer?"
10001-100010220 = "Hmm..."
10001-100010230 = "De qualquer forma, da próxima vez vou pensar em outras medidas."
10001-100010240 = "Então, até mais, Sensei."
