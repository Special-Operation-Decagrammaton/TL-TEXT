[translation]
10001-373 = "先生、最近ぐっと暑くなった感じがしない？"
10001-374 = "作戦を終えた後とか、すごく蒸し暑いし……"
10001-375 = "そう？夏はまだまだ遠いけど……"
10001-376 = "作戦中に一生懸命頑張ったからじゃない？"
10001-377 = "そうかな、私の勘違い……？"
10001-378 = "あ、そういえば先生"
10001-379 = "さっきアイスクリーム屋さんの前で、"
10001-380 = "チョコミントのアイスを食べてるトリニティの生徒を見たんだけど……"
10001-381 = "歯磨き粉味のアイスってもしかして、体温調節に役立つのかな……？"
10001-382 = "チョコミント味が好きな人たちの気持ちが分からない……"
10001-383 = "歯磨き粉味なんかじゃないよ！チョコミントに謝って！"
10001-384 = "そうだよね？"
10001-385 = "あっ……先生、そっち側の人？"
10001-386 = "やっぱり女子高生の世界は奥が深い……"
10001-387 = "先生、私、最近一つ悩みがあって……"
10001-388 = "悩み？セミナーの仕事に関係すること？"
10001-389 = "ううん。それとは関係ない、すごく個人的なことなんだけど"
10001-390 = "先生に、聞いてほしくて"
10001-391 = "私で良ければ、いつでも聞くよ"
10001-392 = "うん、お願い"
10001-393 = "……ありがとう、先生"
10001-394 = "先生この前、女子生徒が好きな物の調査に協力するって言ってくれたよね？"
10001-395 = "うん、まあ言ったけど……"
10001-396 = "次の調査をしよう"
10001-397 = "キヴォトスの中心街に来てほしい"
10001-398 = "今から？"
10001-399 = "うん、今から"
10001-400 = "密閉空間で歌うことが、あんなに楽しいなんて……"
10001-401 = "敵に対して銃を乱射する時みたいな高揚感があった"
10001-402 = "……いっそのこと、カラオケで銃を撃てばもっと楽しかったり？"
10001-403 = "それは絶対にダメ！"
10001-404 = "先生、今日は新しい服を買いに行く"
10001-405 = "素敵な服が見つかるといいね"
10001-406 = "私に似合う服かどうか、先生に見てほしくって……"
10001-407 = "今日の放課後、空いてる？"
10001-408 = "あ、うん。大丈夫だよ"
10001-409 = "良かった。じゃあキヴォトスの中心街の、ショッピングモールで待ち合わせ"
10001-410 = "作戦終了、ミッションクリア。お疲れ様、先生"
10001-411 = "さっきすれ違った時、腕から血が出てた気がするけど、もう手当てはした？"
10001-412 = "大丈夫、ちょっと擦りむいただけだから"
10001-413 = "作戦中に、これぐらいの怪我はよくあること"
10001-414 = "それはダメ。消毒するから、保健室に来て"
10001-415 = "大丈夫なのに……"
10001-100010010 = "先生、ちょっと手伝って"
10001-100010020 = "廃墟の近くで謎の信号が見つかったの"
10001-100010030 = "特異現象捜査部の仕事もかねて、ちょっと遠い場所まで調べにいこうと思って"
10001-100010040 = "暑い日になると思うけど……"
10001-100010050 = "今回は大丈夫、任せて"
10001-100010060 = "おお、なんだか今回は自信があるんだね"
10001-100010070 = "今回は対策してるの？"
10001-100010080 = "うん"
10001-100010090 = "こういう時のために、準備しておいたんだ"
10001-100010100 = "期待してて"
10001-100010110 = "おかしい……"
10001-100010120 = "扇風機で涼んだのに、なんだか先生が暑そうだった"
10001-100010130 = "出力不足だったのかな？それとも、先生も暑がりなの？"
10001-100010140 = "うーん"
10001-100010150 = "やっぱりもう少しくっついたほうが良かったのかも"
10001-100010160 = "全身密着していたら、結果が変わっていたかもだし"
10001-100010170 = "どう思う？"
10001-100010180 = "別の問題だと思うけど……"
10001-100010190 = "それでもまぁ、そんな悪い経験じゃなかったよ"
10001-100010200 = "うーん"
10001-100010210 = "？それってどういうこと？"
10001-100010220 = "うーん……"
10001-100010230 = "とにかく、次からは他の対策も考えておくね"
10001-100010240 = "じゃあまたね、先生"
