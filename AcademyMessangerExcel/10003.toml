[translation]
10003-476 = "先生、先生！"
10003-477 = "やりました！"
10003-478 = "昨日、貴重なモモフレンズのグッズを手に入れることができました！"
10003-479 = "それは良かったね、どんなグッズなの？"
10003-480 = "えへへ、それはまだ秘密です"
10003-481 = "今度会った時に直接見せますね！"
10003-482 = "今度モモフレンズの、ビッグブラザー様型のバックが新しく出るそうです！"
10003-483 = "うーん……これも可愛くてちょっと迷ってしまうのですが……"
10003-484 = "やっぱり私にとってはペロロ様のバックが一番かもしれません……！"
10003-485 = "そういえばヒフミ、いつも同じバックを持ってるね"
10003-486 = "あ、あのペロロ様のバックですか？"
10003-487 = "えへへ、可愛いですよね？"
10003-488 = "あれ、まだモモフレンズが始まったばかりの頃に発売された限定品なんです"
10003-489 = "収納スペースもたくさんあって、色々入るんですよ"
10003-490 = "私の宝物、第1号です！"
10003-491 = "先生、駅前のゲームセンターのクレーンゲーム！"
10003-492 = "あそこに、モモフレンズの新作のぬいぐるみが入ったみたいです！"
10003-493 = "どんなぬいぐるみが入ったんでしょうか？"
10003-494 = "もう今から、放課後が楽しみで仕方ありません！"
10003-495 = "そんなに気になるならお昼の時にでも、一緒にゲームセンターに行こっか？"
10003-496 = "本当ですか！？本当に良いんですか！？"
10003-497 = "ありがとうございます！では待ってますね、先生！\n(o^－^o)"
10003-498 = "どうして世の中には、こんなに苦しんでる人が多いのでしょうか？"
10003-499 = "みんなが幸せになるために、できれば何かしたいのですが……"
10003-500 = "私には、何もできなくて……悲しいです"
10003-501 = "大丈夫？何か心配事とかあったりする？"
10003-502 = "いえ、私は大丈夫なのですが……"
10003-503 = "お話を聞いてくださってありがとうございました、先生"
10003-504 = "ずっと胸の内に押し込めていたものを打ち明けられて、すっきりしました"
10003-505 = "あの……もしまた悩んでしまった時には、お話を聞いてくれますか？"
10003-506 = "いつでも任せて"
10003-507 = "ありがとうございます、先生"
10003-508 = "先生がそばにいてくれて、本当に良かったです"
10003-509 = "先生、明日の午後に予定していたシャーレの当番のお仕事なのですが、"
10003-510 = "午前中に変更しても大丈夫でしょうか？"
10003-511 = "午後にちょっと、別の予定を入れたくって……"
10003-512 = "うん、大丈夫だよ。ちなみにどんな予定なの？"
10003-513 = "学園の友達と一緒に、どこかへ遊びに行こっかというお話になりまして"
10003-514 = "何をして遊ぶか、今から楽しみです！えへへ……！"
10003-515 = "先生、今度の週末って空いてますか？"
10003-516 = "補習授業部で使う備品を買いに、公共アリーナ近くに行く用事がありまして"
10003-517 = "よかったら一緒にそのまま、ショッピングに行きませんか？"
10003-518 = "ちょうど私もその辺りに行く用事があったから、ぜひ"
10003-519 = "それは良かったです！それでは次の週末、キヴォトスの公共アリーナ前で！"
