[translation]
10003-476 = "Sensei, Sensei!"
10003-477 = "Eu consegui!"
10003-478 = "Ontem, eu consegui obter um item raro da Momoi Friends!"
10003-479 = "Que bom! Que tipo de item é?"
10003-480 = "Ehehe, isso ainda é um segredo."
10003-481 = "Vou te mostrar pessoalmente da próxima vez que nos encontrarmos!"
10003-482 = "Parece que vão lançar uma nova bolsa da Momoi Friends no formato do Big Brother-sama!"
10003-483 = "Hmm... Essa também é fofa, estou um pouco indecisa..."
10003-484 = "Mas, para mim, a bolsa do Peroro-sama talvez seja a melhor...!"
10003-485 = "Falando nisso, Hifumi, você sempre usa a mesma bolsa, né?"
10003-486 = "Ah, a bolsa do Peroro-sama?"
10003-487 = "Ehehe, é fofa, não é?"
10003-488 = "Aquela é uma edição limitada que foi lançada logo quando a Momoi Friends começou."
10003-489 = "Ela tem muito espaço de armazenamento, cabe bastante coisa."
10003-490 = "É o meu tesouro número 1!"
10003-491 = "Sensei, a máquina de garra no fliperama em frente à estação!"
10003-492 = "Parece que colocaram os novos bichos de pelúcia da Momoi Friends lá!"
10003-493 = "Que tipo de bicho de pelúcia será que colocaram?"
10003-494 = "Já estou super ansiosa pelo fim da aula!"
10003-495 = "Se você está tão curiosa, que tal irmos juntas ao fliperama na hora do almoço?"
10003-496 = "Sério?! Tem certeza?!"
10003-497 = "Obrigada! Estarei esperando, Sensei!\n(o^－^o)"
10003-498 = "Por que será que há tantas pessoas sofrendo no mundo?"
10003-499 = "Eu gostaria de poder fazer algo para que todos fossem felizes, mas..."
10003-500 = "Eu não consigo fazer nada... É triste."
10003-501 = "Você está bem? Aconteceu alguma coisa preocupante?"
10003-502 = "Não, eu estou bem, mas..."
10003-503 = "Obrigada por me ouvir, Sensei."
10003-504 = "Consegui desabafar sobre algo que estava guardando há muito tempo, me sinto aliviada."
10003-505 = "Uhm... Se eu estiver preocupada de novo, você me ouviria?"
10003-506 = "Pode contar comigo sempre."
10003-507 = "Obrigada, Sensei."
10003-508 = "Fico muito feliz por ter você ao meu lado, Sensei."
10003-509 = "Sensei, sobre o meu turno de trabalho na Schale agendado para amanhã à tarde,"
10003-510 = "Tudo bem se eu mudar para o período da manhã?"
10003-511 = "É que eu gostaria de marcar outro compromisso à tarde..."
10003-512 = "Sim, tudo bem. A propósito, que compromisso é?"
10003-513 = "Combinei com minhas amigas da academia de sairmos para algum lugar."
10003-514 = "Estou ansiosa para ver o que vamos fazer! Ehehe...!"
10003-515 = "Sensei, você está livre no próximo fim de semana?"
10003-516 = "Eu tenho que ir perto da Arena Pública para comprar suprimentos para o Clube de Aulas Complementares."
10003-517 = "Se quiser, podemos aproveitar e ir às compras juntas, que tal?"
10003-518 = "Eu também tinha algo para fazer por lá, então claro."
10003-519 = "Que ótimo! Então, no próximo fim de semana, em frente à Arena Pública de Kivotos!"
