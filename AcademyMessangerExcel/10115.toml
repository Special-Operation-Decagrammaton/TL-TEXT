[translation]
10115-101150010 = "おはようございます、先生！"
10115-101150020 = "ミレニアムサイエンススクール野球部、野正レイです！"
10115-101150030 = "おはよう、レイ"
10115-101150040 = "最近調子はどう？"
10115-101150050 = "ホームランに向けて頑張ってます"
10115-101150060 = "今日も野球の練習をする予定です"
10115-101150070 = "あっ、そうだ"
10115-101150080 = "よかったら先生も見に来ませんか？"
10115-101150090 = "練習場は見学自由ですので"
10115-101150100 = "おはようございます、先生！"
10115-101150110 = "先日は色々助けていただいて、本当にありがとうございました！"
10115-101150120 = "役に立てたなら何よりだけど……"
10115-101150130 = "実はですね、先生"
10115-101150140 = "バッティングを上達させるには"
10115-101150150 = "ただ打撃練習をするだけじゃ足りないと思うんです"
10115-101150160 = "他の特訓も必要だと気づきまして"
10115-101150170 = "他の特訓？"
10115-101150180 = "そうなんです"
10115-101150190 = "説明するより見てもらった方が早いかと"
10115-101150200 = "前も言いましたが練習場は見学自由ですので"
10115-101150210 = "先生のご都合の良いときにお越しください"
10115-101150220 = "先生！今日の約束、ちゃんと覚えてますよね？"
10115-101150230 = "野球の試合を観に行くんだよね？"
10115-101150270 = "よく2枚もチケット取れたね"
10115-101150240 = "先生と一緒に行けて嬉しいです！"
10115-101150250 = "今日の試合は本当にすごいカードなんですよ！"
10115-101150260 = "期待してくださいね！"
10115-101150280 = "先着順……1秒の差が命運を分ける熾烈な競争……"
10115-101150290 = "ですが、なんとか掴むことができました"
10115-101150300 = "これも日頃の練習の結果ですかね"
10115-101150310 = "それでは先生"
10115-101150320 = "ブラウンズ・ソックス・スタジアムでお待ちしてます"
10115-101150330 = "遅れたらペナルティですからね！"
10115-101150340 = "先生！今日は野球部の用具点検の日です！"
10115-101150350 = "用具点検？"
10115-101150360 = "グラブとかを手作業でメンテナンスするの？"
10115-101150370 = "いえ、それはまた別の日です"
10115-101150380 = "壊れてしまった用具を修理工場に送るので"
10115-101150390 = "今日は、その前にチェックするんです"
10115-101150400 = "見学に行ってもいい？"
10115-101150410 = "えっ？"
10115-101150420 = "私はもちろん歓迎ですけど……"
10115-101150430 = "正直、見ててもそんなに楽しいものじゃないと思いますよ？"
10115-101150440 = "そういうのは気にしないよ"
10115-101150450 = "そうなんですか？"
10115-101150460 = "それじゃあ、ぜひ！"
10115-101150470 = "へへっ"
10115-101150480 = "お待ちしてますね！"
