[translation]
10021-10021010 = "先生、急いで確認したいことがある"
10021-10021020 = "今どこ？"
10021-10021030 = "どうしたの？"
10021-10021040 = "何かあった？"
10021-10021050 = "いや、特に何か問題があったわけじゃない"
10021-10021060 = "ただ、よく考えてみたら、この辺りもそんなに安全ではないから"
10021-10021070 = "先生のことは、私が守らないと"
10021-10021080 = "先生は私の、護衛対象だから"
10021-10021090 = "頼もしい……"
10021-10021100 = "そんなに危険かな……？"
10021-10021110 = "……ふぅ"
10021-10021120 = "それで、今はどこに？"
10021-10021130 = "さっきのは、無しで……"
10021-10021140 = "……でも"
10021-10021150 = "確かに、もう少し肩の力を抜いても良いかもしれない"
10021-10021160 = "おかげさまで、少しは楽しめそうだ"
10021-10021170 = "じゃあ、また後で連絡する"
10021-10021180 = "先生"
10021-10021190 = "今、時間ある？"
10021-10021200 = "何て言えば良いのか"
10021-10021210 = "実はその"
10021-10021220 = "先生の助けが必要で"
10021-10021230 = "まさかの非常事態！？"
10021-10021240 = "すぐ行く、今どの辺り？"
10021-10021250 = "この後、位置情報を送る"
10021-10021260 = "できるだけ早く来てくれると嬉しい"
10021-10021270 = "あ、でも無理はしないで"
10021-10021280 = "急いで行くね、待ってて"
10021-10021290 = "さっきはごちそうさま。ありがとう、先生"
10021-10021300 = "さっきも言ったように、言葉だけで済ませたりしないから"
10021-10021310 = "この借りは、いつか必ず返す"
10021-10021320 = "うん、楽しみにしてるね"
10021-10021330 = "何だか、復讐でもされそうな台詞だね……"
10021-10021340 = "期待には応えるよ"
10021-10021350 = "……"
10021-10021360 = "そういうのじゃない……こんなにお世話になってるのに"
10021-10021370 = "じゃあまた、先生"
10021-10021380 = "先生"
10021-10021390 = "……何かが足りない気がする"
10021-10021400 = "私の戦術的直感がそう告げてるの"
10021-10021410 = "きっとまだ、この夏には何かがあるって"
10021-10021420 = "戦術的直感……？"
10021-10021430 = "何かやり残したことが、ってことかな？"
10021-10021440 = "それについて、戦略的な話し合いが必要"
10021-10021450 = "時間はあまり残されてない"
10021-10021460 = "「戦術」と「戦略」ってややこしいよね……"
10021-10021470 = "とにかく、今から先生のところに行く"
10021-10021480 = "今、どこにいる？"
10021-10021490 = "先生、一つ言い忘れてた"
10021-10021500 = "今日のこと、それから今日私が言ったこと"
10021-10021510 = "全部機密事項だから、誰にも言わないで"
10021-10021520 = "分かった？"
10021-10021530 = "そうなの……？とりあえず、了解"
10021-10021540 = "忘れないで"
10021-10021550 = "もしこの秘密が漏れたとしたら、間違いなく犯人は先生だから"
10021-10021560 = "……"
10021-10021570 = "先生以外の人に知られたら、困る"
10021-10021580 = "先生"
10021-10021590 = "今、時間ある？"
10021-10021600 = "大丈夫だよ、どうしたの？"
10021-10021610 = "助けに行った方が良い感じ？"
10021-10021620 = "いや"
10021-10021630 = "大したことじゃない"
10021-10021640 = "用事があるなら、無理して来なくても大丈夫"
10021-10021650 = "ううん、すぐ行くね"
10021-10021660 = "せっかくアズサが呼んでくれたんだから、喜んで"
10021-10021670 = "……"
10021-10021680 = "ありがとう、先生"
10021-10021690 = "じゃあ、待ってるから"
10021-10021700 = "遅い時間に呼び出してごめん、来てくれてありがとう"
10021-10021710 = "夜行性だから大丈夫"
10021-10021720 = "全然、いつでも大歓迎だよ"
10021-10021730 = "……そっか"
10021-10021740 = "じゃあ、また"
10021-10021750 = "ありがとう、先生"
10021-10021760 = "えっと、今日のことだけじゃなくて……その、色々と"
