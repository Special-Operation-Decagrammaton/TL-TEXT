[translation]
10021-10021010 = "Sensei, tem algo que eu preciso confirmar com urgência."
10021-10021020 = "Onde você está agora?"
10021-10021030 = "O que foi?"
10021-10021040 = "Aconteceu alguma coisa?"
10021-10021050 = "Não, não é que tenha acontecido algum problema em particular."
10021-10021060 = "É que, pensando bem, esta área não é tão segura assim."
10021-10021070 = "Eu preciso proteger você, Sensei."
10021-10021080 = "Porque você é meu alvo de escolta, Sensei."
10021-10021090 = "Que confiável..."
10021-10021100 = "Será que é tão perigoso assim...?"
10021-10021110 = "...Ufa."
10021-10021120 = "Então, onde você está agora?"
10021-10021130 = "Esquece o que eu disse antes..."
10021-10021140 = "...Mas."
10021-10021150 = "Realmente, talvez seja bom relaxar um pouco mais."
10021-10021160 = "Graças a você, parece que vou conseguir me divertir um pouco."
10021-10021170 = "Então, entro em contato mais tarde."
10021-10021180 = "Sensei."
10021-10021190 = "Você tem um tempo agora?"
10021-10021200 = "Como eu deveria dizer isso..."
10021-10021210 = "É que, na verdade..."
10021-10021220 = "Eu preciso da sua ajuda, Sensei."
10021-10021230 = "Não me diga que é uma emergência?!"
10021-10021240 = "Estou indo agora, onde você está?"
10021-10021250 = "Vou te enviar minha localização em seguida."
10021-10021260 = "Ficaria feliz se você pudesse vir o mais rápido possível."
10021-10021270 = "Ah, mas não se esforce demais."
10021-10021280 = "Estou indo correndo, me espere."
10021-10021290 = "Obrigada pela comida de antes. Agradeço, Sensei."
10021-10021300 = "Como eu disse antes, não vou deixar isso só nas palavras."
10021-10021310 = "Eu com certeza vou pagar essa dívida um dia."
10021-10021320 = "Sim, vou aguardar ansiosamente."
10021-10021330 = "Essa frase soa como se você fosse se vingar de mim..."
10021-10021340 = "Vou corresponder às suas expectativas."
10021-10021350 = "..."
10021-10021360 = "Não é nada disso... Você tem cuidado tanto de mim."
10021-10021370 = "Então, até mais, Sensei."
10021-10021380 = "Sensei."
10021-10021390 = "...Sinto que está faltando alguma coisa."
10021-10021400 = "Minha intuição tática está me dizendo isso."
10021-10021410 = "Que com certeza ainda há algo neste verão."
10021-10021420 = "Intuição tática...?"
10021-10021430 = "Será que é sobre algo que deixamos de fazer?"
10021-10021440 = "Precisamos ter uma discussão estratégica sobre isso."
10021-10021450 = "Não nos resta muito tempo."
10021-10021460 = "Tática e estratégia são meio confusas, né...?"
10021-10021470 = "De qualquer forma, estou indo até você agora, Sensei."
10021-10021480 = "Onde você está agora?"
10021-10021490 = "Sensei, esqueci de dizer uma coisa."
10021-10021500 = "Sobre hoje, e sobre o que eu disse hoje."
10021-10021510 = "É tudo informação confidencial, então não conte a ninguém."
10021-10021520 = "Entendeu?"
10021-10021530 = "É mesmo...? Por enquanto, entendido."
10021-10021540 = "Não se esqueça."
10021-10021550 = "Se esse segredo vazar, o culpado com certeza será você, Sensei."
10021-10021560 = "……"
10021-10021570 = "Seria um problema se alguém além do Sensei soubesse."
10021-10021580 = "Sensei"
10021-10021590 = "Você tem um tempo agora?"
10021-10021600 = "Claro, o que foi?"
10021-10021610 = "Quer que eu vá ajudar?"
10021-10021620 = "Não."
10021-10021630 = "Não é nada demais."
10021-10021640 = "Se você tiver algo pra fazer, não precisa se forçar a vir."
10021-10021650 = "Não, não. Estou indo aí."
10021-10021660 = "Já que a Azusa me chamou, eu vou com todo o prazer."
10021-10021670 = "……"
10021-10021680 = "Obrigada, Sensei."
10021-10021690 = "Então, estarei esperando."
10021-10021700 = "Desculpe te chamar a essa hora. Obrigada por vir."
10021-10021710 = "Tenho hábitos noturnos, então tudo bem."
10021-10021720 = "Imagina, você é sempre bem-vinda."
10021-10021730 = "……Entendi."
10021-10021740 = "Então, da próxima vez..."
10021-10021750 = "Obrigada, Sensei."
10021-10021760 = "Hum, não só por hoje... mas, por tudo."
