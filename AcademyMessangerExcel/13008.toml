[translation]
13008-234 = "先生！"
13008-235 = "先生！！！！"
13008-236 = "時間ある？あるよね？？よしっ！"
13008-237 = "え、え？"
13008-238 = "どうせ暇でしょ？だったら私と一緒にバイトして！"
13008-239 = "私のお手伝いをしてくれればいいから、OK？"
13008-240 = "じゃあまたあとで！"
13008-241 = "えっと……えぇ……？"
13008-242 = "セリカさん……？"
13008-243 = "先生、また別のバイトが入ったから、前のところで待ち合わせね！"
13008-244 = "今回はちょっと特殊なバイトだよ！"
13008-245 = "特殊な……？"
13008-246 = "次のバイトが決まったよ！先生も来るよね？"
13008-247 = "次の休日の午前中、公園に来てね！"
13008-248 = "りょうかーい"
13008-249 = "うう、腰が痛い……"
13008-250 = "先生は大丈夫なの？"
13008-251 = "お風呂に浸かったらちょっとは良くなるかな思って、今"
13008-252 = "！＠＃％％＃＾＊"
13008-253 = "＠＃＃"
13008-255 = "危なかった、スマホをお風呂に落とすとこだった……！！"
13008-256 = "やっぱりお風呂に入る時にスマホは良くないかも……"
13008-257 = "一旦外に置いてお風呂入るから、またあとでね"
13008-258 = "その……"
13008-259 = "セリカ、写真が……"
13008-260 = "写真？"
13008-261 = "うああああああ？！なんでこんなのが撮れてるの！？"
13008-262 = "み、見ないで！見るなぁ！"
13008-263 = "見たら殺す！！！！！！！！！！"
13008-264 = "まさか保存してないよね！？消して！！分かった！？"
13008-265 = "ちゃんと消したかどうかあとで確認するからね！！"
13008-266 = "見てないです……"
13008-267 = "消しました、はい"
13008-268 = "アヤネちゃんから聞いたんだけど、対策委員会に匿名の寄付が来たんだって"
13008-269 = "金額はそんなに多くないけど、バイト一日分くらいはある金額らしくって"
13008-270 = "私たちのことを見てくれてる市民の人からなのかな、えへへ"
13008-271 = "あ、今度も例の場所で会おうね、先生！"
13008-272 = "また午後に！"
13008-273 = "先生、今度は夜の市場でアルバイトだよ！"
13008-274 = "夜中までやるらしいから覚悟しておいてね！"
13008-275 = "承知いたしました、セリカさん！"
13008-276 = "徹夜かもね、了解"
13008-277 = "お腹いっぱーい、ちょっと食べ過ぎたかも"
13008-278 = "小さい街だったけど、面白いものがたくさんあったね"
13008-279 = "まあ小さいって言っても、うちよりは大きかったけど……"
13008-280 = "結局バイト代半分近く使っちゃったけど、たまにはこういうのも良いよね？"
13008-281 = "じゃあまた明日、先生。お疲れ様"
13008-282 = "すぐ横にならないほうが良いかも、ゆっくり休んでね"
13008-283 = "うん、お疲れ様。またね"
13008-284 = "先生。今度の休日のバイト、覚悟しておいてね"
13008-285 = "ものすごくハードな肉体労働みたいだから……"
13008-286 = "武者震いが……"
13008-287 = "OK、覚悟しておくね"
13008-130080300 = "先生、今日アビドスに来るんだっけ？"
13008-130080310 = "うん、そうだよ"
13008-130080320 = "道中怪我したら危ないし、迎えに行こうと思うんだけど……"
13008-130080330 = "いいわよね？"
13008-130080340 = "あ、「大丈夫」は「来て大丈夫」って意味だと受け取るけど"
13008-130080350 = "私に拒否権は無いんだね……"
13008-130080360 = "でも嬉しいよ、ありがとう"
13008-130080370 = "いや、本当に先生が事件に巻き込まれるかもしれないから言ってるの"
13008-130080380 = "最近うちの自治区……ちょっとうるさい連中が来てて……"
13008-130080390 = "まぁそういうことだから、気をつけてね"
13008-130080400 = "いざとなったら、私の後ろに隠れてて"
