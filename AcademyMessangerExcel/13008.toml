[translation]
13008-234 = "Professor!"
13008-235 = "Professor!!!!"
13008-236 = "Tem tempo? Tem, né?? Ótimo!"
13008-237 = "Hã, hã?"
13008-238 = "Você está desocupado, não está? Então venha trabalhar meio período comigo!"
13008-239 = "Você só precisa me ajudar, ok?"
13008-240 = "Então, até mais tarde!"
13008-241 = "Uhm... sim...?"
13008-242 = "Serika...?"
13008-243 = "Professor, consegui outro trabalho de meio período, então vamos nos encontrar no mesmo lugar de antes!"
13008-244 = "Desta vez é um trabalho de meio período um pouco especial!"
13008-245 = "Especial...?"
13008-246 = "O próximo trabalho de meio período foi decidido! Você vem também, Professor, certo?"
13008-247 = "No próximo feriado de manhã, venha ao parque!"
13008-248 = "Entendido!"
13008-249 = "Ai, minhas costas doem..."
13008-250 = "Professor, você está bem?"
13008-251 = "Achei que um banho de imersão me faria um pouco melhor, então agora"
13008-252 = "!@#%%#^*"
13008-253 = "@##"
13008-255 = "Por pouco! Quase deixei meu celular cair na banheira...!!"
13008-256 = "Acho que não é uma boa ideia usar o celular enquanto tomo banho..."
13008-257 = "Vou deixá-lo lá fora e tomar banho, então até mais tarde."
13008-258 = "Uhm..."
13008-259 = "Serika, a foto..."
13008-260 = "Foto?"
13008-261 = "Aaaaaaaah?! Por que isso foi tirado?!"
13008-262 = "N-não olhe! Não olhe!"
13008-263 = "Se olhar, eu te mato!!!!!!!!!!!!!!!!!!"
13008-264 = "Você não salvou, né?! Apague!! Entendeu?!"
13008-265 = "Vou verificar mais tarde se você apagou direitinho!!"
13008-266 = "Não vi..."
13008-267 = "Apaguei, sim."
13008-268 = "Ouvi da Ayane-chan que a Força-Tarefa recebeu uma doação anônima."
13008-269 = "O valor não é muito alto, mas parece ser o suficiente para um dia de trabalho de meio período."
13008-270 = "Será que foi de algum cidadão que nos observa, hehe."
13008-271 = "Ah, da próxima vez vamos nos encontrar no lugar de sempre, Professor!"
13008-272 = "Até a tarde!"
13008-273 = "Professor, desta vez é um trabalho de meio período no mercado noturno!"
13008-274 = "Parece que vai até de madrugada, então esteja preparado!"
13008-275 = "Entendido, Serika!"
13008-276 = "Pode ser que tenhamos que virar a noite, entendido."
13008-277 = "Estou de barriga cheia, acho que comi demais."
13008-278 = "Era uma cidade pequena, mas tinha muitas coisas interessantes, né?"
13008-279 = "Bem, mesmo dizendo pequena, era maior que a nossa..."
13008-280 = "Acabei gastando quase metade do meu salário do trabalho de meio período, mas de vez em quando é bom, né?"
13008-281 = "Então, até amanhã, Professor. Bom trabalho."
13008-282 = "Talvez seja melhor não deitar imediatamente, descanse bem."
13008-283 = "Sim, bom trabalho. Até mais."
13008-284 = "Professor. Esteja preparado para o trabalho de meio período do próximo feriado."
13008-285 = "Parece um trabalho físico extremamente pesado, então..."
13008-286 = "Estou tremendo de emoção..."
13008-287 = "OK, vou me preparar."
13008-130080300 = "Professor, você vem para Abydos hoje, certo?"
13008-130080310 = "Sim, é isso mesmo."
13008-130080320 = "É perigoso se você se machucar no caminho, então pensei em ir te buscar..."
13008-130080330 = "Tudo bem, não é?"
13008-130080340 = "Ah, vou entender 'tudo bem' como 'tudo bem para vir', mas..."
13008-130080350 = "Então eu não tenho direito de recusar..."
13008-130080360 = "Mas fico feliz, obrigado."
13008-130080370 = "Não, estou dizendo isso porque o Professor pode realmente se envolver em algum incidente."
13008-130080380 = "Recentemente, em nossa região autônoma... tem um pessoal barulhento por aqui..."
13008-130080390 = "Bem, é por isso, então tome cuidado."
13008-130080400 = "Se as coisas ficarem feias, esconda-se atrás de mim."
