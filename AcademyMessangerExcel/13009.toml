[translation]
13009-1115 = "先生、どう……？"
13009-1116 = "いつも通り、修行頑張ってる？"
13009-1117 = "修行って？"
13009-1118 = "もちろん"
13009-1119 = "先生も私たち修行部の顧問なんだから、当然欠かせない修行。そう……"
13009-1120 = "寝ること、だよ"
13009-1121 = "特に先生は、普段から忙しすぎてあまり寝られてないでしょ？"
13009-1122 = "本当に～？"
13009-1123 = "うーん、怪しい……"
13009-1124 = "うーん……こうなったらせっかくだし、よし"
13009-1125 = "この機会に私が直接、修行のお手本を見せてあげる"
13009-1126 = "じゃあ、約束の場所でね～、先生"
13009-1127 = "先生……"
13009-1128 = "ツバキ？どうしたの？"
13009-1129 = "ボロボロになっちゃった……"
13009-1130 = "どうしよう……"
13009-1131 = "え、え？ボロボロ？何が……？"
13009-1132 = "どういうこと……？"
13009-1133 = "ずっと大事にしてた、修行道具が……"
13009-1134 = "しゅ、修行道具？"
13009-1135 = "助けて、先生……"
13009-1136 = "待っててツバキ、すぐ行くから！"
13009-1137 = "今日、一緒に枕を探してくれてありがとう。先生"
13009-1138 = "また今度、一緒に修行しようね"
13009-1139 = "先生、覚えてるよね？"
13009-1140 = "今日、一緒に修行する日だよ"
13009-1141 = "初耳な気が……？"
13009-1142 = "あ、そうだっけ？"
13009-1143 = "あれ、違ったっけ。約束したと思ってたんだけど……"
13009-1144 = "うーん、夢の中での約束だったのかな？"
13009-1145 = "まあ、どっちでもいいよね？"
13009-1146 = "うん、そうだよ。シャーレで待っててね。先生"
13009-1147 = "私の方からシャーレに行くから、待っててね。先生"
13009-1148 = "修行にぴったりの場所を見つけたよ、先生"
13009-1149 = "修行って、つまり寝ることだよね？"
13009-1150 = "うん、そうだよ～"
13009-1151 = "その場所、先生に一番最初に教えてあげるね"
13009-1152 = "ありがとう。でも、寝るのにちょうどいい場所って……"
13009-1153 = "実はね、"
13009-1154 = "ここ、すごく……"
13009-1155 = "すごく……？"
13009-1156 = "すっごく……あっ、ウサギ"
13009-1157 = "あの、ツバキ？"
13009-1158 = "え、ウサギがどうしたの？ツバキ？ツバキ！？"
