[translation]
13009-1115 = "Sensei, como estou...?"
13009-1116 = "Você tem se esforçado no seu treinamento como sempre?"
13009-1117 = "Treinamento?"
13009-1118 = "Claro."
13009-1119 = "Como o Sensei também é consultor do nosso Clube de Treinamento, esse treinamento é indispensável. É sobre..."
13009-1120 = "Dormir."
13009-1121 = "Especialmente você, Sensei, que vive tão ocupado e mal consegue dormir, não é?"
13009-1122 = "Sério mesmo?"
13009-1123 = "Hmm, suspeito..."
13009-1124 = "Hmm... já que chegamos a esse ponto, tudo bem."
13009-1125 = "Aproveitando a oportunidade, vou te mostrar pessoalmente um exemplo de treinamento."
13009-1126 = "Então, nos vemos no local combinado, Sensei."
13009-1127 = "Sensei..."
13009-1128 = "Tsubaki? O que houve?"
13009-1129 = "Ficou tudo destruído..."
13009-1130 = "O que eu faço..."
13009-1131 = "Ei, ei? Destruído? O que foi...?"
13009-1132 = "Como assim...?"
13009-1133 = "Meu equipamento de treinamento, que eu cuidava com tanto carinho..."
13009-1134 = "Equi... equipamento de treinamento?"
13009-1135 = "Me ajude, Sensei..."
13009-1136 = "Espere aí, Tsubaki, já estou indo!"
13009-1137 = "Obrigada por me ajudar a procurar um travesseiro hoje, Sensei."
13009-1138 = "Vamos treinar juntos de novo na próxima vez."
13009-1139 = "Sensei, você se lembra, né?"
13009-1140 = "Hoje é o dia de treinarmos juntos."
13009-1141 = "É a primeira vez que ouço falar disso...?"
13009-1142 = "Ah, foi mesmo?"
13009-1143 = "Ué, não foi? Eu achei que tínhamos combinado..."
13009-1144 = "Hmm, será que foi uma promessa que fiz em um sonho?"
13009-1145 = "Bem, tanto faz, não é?"
13009-1146 = "Sim, é isso mesmo. Me espere no Schale, Sensei."
13009-1147 = "Eu vou até o Schale, então me espere lá, Sensei."
13009-1148 = "Encontrei o lugar perfeito para treinar, Sensei."
13009-1149 = "Treinar, no caso, significa dormir, certo?"
13009-1150 = "Sim, exatamente~"
13009-1151 = "Vou te contar qual é esse lugar antes de qualquer um, Sensei."
13009-1152 = "Obrigado. Mas um lugar perfeito para dormir é..."
13009-1153 = "Na verdade,"
13009-1154 = "aqui é muito..."
13009-1155 = "Muito...?"
13009-1156 = "Muito... ah, um coelho."
13009-1157 = "Ei, Tsubaki?"
13009-1158 = "Ei, o que tem o coelho? Tsubaki? Tsubaki!?"
