[translation]
10129-101290010 = "Olá, Sensei. Sou a Suzumi."
10129-101290020 = "Espero que esteja bem, como sempre."
10129-101290030 = "Suzumi! Como você está?"
10129-101290040 = "Sim, estou bem, obrigada."
10129-101290050 = "Gostaria de perguntar uma coisa..."
10129-101290060 = "Até que horas as instalações de descanso da Schale podem ser usadas?"
10129-101290070 = "Não há um horário específico."
10129-101290080 = "Você pode ficar o tempo que quiser."
10129-101290090 = "Entendido."
10129-101290100 = "Há alguma precaução ao usar as instalações?"
10129-101290110 = "Acho que é só apagar as luzes ao sair."
10129-101290120 = "Entendido."
10129-101290130 = "Obrigada."
10129-101290140 = "Sensei, sobre aquilo..."
10129-101290150 = "Repetindo mais uma vez..."
10129-101290160 = "Aquela roupa não tem nada a ver com o meu gosto pessoal!"
10129-101290170 = "Eu gosto daquilo!"
10129-101290180 = "Ah, fs#'8k6avb$"
10129-101290190 = "Desculpe."
10129-101290200 = "Deixei cair meu celular."
10129-101290210 = "É apenas uma extensão das minhas tarefas de vigilância!"
10129-101290220 = "Por favor, não me entenda mal!"
10129-101290230 = "Entendi!"
10129-101290240 = "...E também..."
10129-101290250 = "Obrigada por me elogiar."
10129-101290260 = "Então, até mais..."
10129-101290270 = "Sensei, sou a Suzumi."
10129-101290280 = "Tenho algo que gostaria de perguntar..."
10129-101290290 = "Minha roupa rasgou um pouco..."
10129-101290300 = "Você poderia me indicar alguma loja de consertos que o Sensei costuma usar?"
10129-101290310 = "Tem uma boa loja perto da Schale!"
10129-101290320 = "Tem uma loja que me ajuda muito!"
10129-101290330 = "Obrigada."
10129-101290340 = "Se é uma recomendação do Sensei, deve ser boa."
10129-101290350 = "Espero poder vê-lo novamente em breve."
10129-101290360 = "Sensei."
10129-101290370 = "O vídeo de antes..."
10129-101290380 = "Ainda está aí?"
10129-101290390 = "Eu estava prestes a apagar..."
10129-101290400 = "Devo manter?"
10129-101290410 = "Não! Não é isso!"
10129-101290420 = "Claro, eu gostaria que você apagasse!"
10129-101290430 = "Mas, uh... os defeitos da roupa..."
10129-101290440 = "Acho que são mais fáceis de encontrar no vídeo."
10129-101290450 = "Mesmo os pontos que não percebi ao vestir..."
10129-101290460 = "Podem ser vistos de relance."
10129-101290470 = "É só por isso."
10129-101290480 = "Você poderia me enviar o vídeo de antes?"
10129-101290490 = "Depois de me enviar, por favor, apague!"
10129-101290500 = "Absolutamente!"
10129-101290510 = "Professor, aqui é a Suzumi."
10129-101290520 = "Professor, você conhece algo chamado 'evento doujin'?"
10129-101290530 = "É minha especialidade."
10129-101290540 = "É minha área de domínio."
10129-101290550 = "Bem, ou seja..."
10129-101290560 = "Você é bem informado, não é?"
10129-101290570 = "Recebemos uma denúncia na Patrulha Cívica."
10129-101290580 = "Há delinquentes causando problemas em um evento doujin."
10129-101290590 = "Então, eu pensei se você poderia nos dar alguns conselhos."
10129-101290600 = "Nesse caso, é melhor não chamar atenção."
10129-101290610 = "Talvez uma roupa adequada para o local?"
10129-101290620 = "Entendi."
10129-101290630 = "Foi útil."
10129-101290640 = "Eu também vou!"
10129-101290650 = "O Professor também vai nos acompanhar?"
10129-101290660 = "Isso é muito encorajador."
10129-101290670 = "Então, até mais tarde."
10129-101290680 = "Posso fazer uma pergunta um tanto... inesperada?"
10129-101290690 = "Minha expressão é assustadora?"
10129-101290700 = "Durante a contenção de agora há pouco..."
10129-101290710 = "Senti que as pessoas ao redor estavam com medo..."
10129-101290720 = "Suzumi, você foi incrível!"
10129-101290730 = "Todos só ficaram um pouco surpresos."
10129-101290740 = "Entendi."
10129-101290750 = "Naquele momento, não consegui pensar em mais nada..."
10129-101290760 = "Não seria melhor ter recolocado o alfinete de segurança?"
10129-101290770 = "Ah."
10129-101290780 = "É verdade."
10129-101290790 = "Vou levar isso em consideração para a próxima vez."
10129-101290800 = "Professor, aqui é a Suzumi."
10129-101290810 = "Posso perguntar sobre seus planos para este fim de semana?"
10129-101290820 = "Não tenho nada em particular."
10129-101290830 = "Ah, entendi."
10129-101290840 = "Se não for incômodo, gostaria de ir comigo..."
10129-101290850 = "Ao parque de diversões?"
10129-101290860 = "Com prazer!"
10129-101290870 = "Fico feliz em ouvir isso."
10129-101290880 = "Obrigada por sempre aceitar prontamente."
10129-101290890 = "Então, o local de encontro será confirmado mais tarde."
10129-101290900 = "Professor, aqui é a Suzumi."
10129-101290910 = "Mais uma vez. Muito obrigada por suas palavras sempre gentis."
10129-101290920 = "Elas me encorajaram muito."
10129-101290930 = "..."
10129-101290940 = "Conto com você de agora em diante também."
10129-101290950 = "Eu é que conto com você, Suzumi!"
10129-101290960 = "Você vai continuar me protegendo? Termite White!"
10129-101290970 = "P-Professor! Eu só digo isso por causa da missão, não é...!"
10129-101290980 = "..."
10129-101290990 = "Claro, a qualquer momento e em qualquer situação..."
10129-101291000 = "Eu protegerei o Professor."
10129-101291010 = "……Nos vemos novamente."
