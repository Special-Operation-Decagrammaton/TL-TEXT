[translation]
10073-100730010 = "Ugh..."
10073-100730020 = "Haa... Estou cansada."
10073-100730030 = "Esta roupa, este lugar..."
10073-100730040 = "Ui...?"
10073-100730050 = "O que foi?"
10073-100730060 = "Ah, não é nada..."
10073-100730070 = "Não é que tenha algum problema..."
10073-100730080 = "Na verdade, se há um problema, sou eu."
10073-100730090 = "Haa..."
10073-100730100 = "Desculpe. Não é uma história muito agradável de se ouvir, não é?"
10073-100730110 = "Hum... só para deixar claro..."
10073-100730120 = "Não é sua culpa, Sensei, então não se preocupe."
10073-100730130 = "Depois de ouvir o que você disse, Sensei, mudei um pouco de ideia."
10073-100730140 = "Pode ser que eu não consiga ser sempre positiva, mas..."
10073-100730150 = "Se eu encontrar algo,"
10073-100730160 = "eu te aviso."
10073-100730170 = "Afinal, viemos de tão longe."
10073-100730180 = "Fufu..."
10073-100730190 = "Agora estou tranquila."
10073-100730200 = "Finalmente encontrei um lugar maravilhoso."
10073-100730210 = "Tranquila?"
10073-100730220 = "Lugar maravilhoso?"
10073-100730230 = "Sim, com isso não haverá problemas."
10073-100730240 = "As pessoas sempre encontram uma forma de sobreviver."
10073-100730250 = "É verdade..."
10073-100730260 = "Com você, Sensei, vai ficar tudo bem."
10073-100730270 = "Gostaria de dar uma olhada?"
10073-100730280 = "Hum..."
10073-100730290 = "Sensei."
10073-100730300 = "Desculpe."
10073-100730310 = "Pensando bem, aquele copo..."
10073-100730320 = "É que... e-eu coloquei minha boca..."
10073-100730330 = "Então, é que..."
10073-100730340 = "...Copo?"
10073-100730350 = "Do que você está falando?"
10073-100730360 = "..."
10073-100730370 = "N-Não é nada..."
10073-100730380 = "Na verdade, não é nada mesmo."
10073-100730390 = "Não se preocupe com isso, Sensei."
10073-100730400 = "Sensei."
10073-100730410 = "Você tem um momento agora?"
10073-100730420 = "Ah."
10073-100730430 = "D-Desculpe."
10073-100730440 = "Já está tão tarde..."
10073-100730450 = "Tudo bem, para onde eu vou?"
10073-100730460 = "Se é um pedido seu, Ui, eu vou correndo a qualquer hora."
10073-100730470 = "Fufu..."
10073-100730480 = "Obrigada."
10073-100730490 = "Então, hum..."
10073-100730500 = "Estou na praia, então se puder vir..."
10073-100730510 = "Estava esperando por você."
10073-100730520 = "Bem..."
10073-100730530 = "Sobre o que eu disse antes... foi uma coisa estranha..."
10073-100730540 = "Agora que me acalmei,"
10073-100730550 = "Fico pensando no que eu estava dizendo..."
10073-100730560 = "Por favor, esqueça. De verdade."
10073-100730570 = "Deve ser o calor do verão."
10073-100730580 = "Mas você estava fofa daquele jeito também."
10073-100730590 = "Como você consegue dizer essas coisas sem ficar com vergonha...?"
10073-100730600 = "Acho que para você, Sensei,"
10073-100730610 = "um pouco menos de doçura é o ideal, não é?"
10073-100730620 = "Ou será que..."
10073-100730630 = "Você prefere sem açúcar nenhum?"
