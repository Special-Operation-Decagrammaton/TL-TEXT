[translation]
10131-101310010 = "Olá, Sensei"
10131-101310020 = "Hoje é meu dia de plantão No Schale,"
10131-101310030 = "Então, para não ser rude, enviei esta mensagem de saudação primeiro."
10131-101310040 = "Você não precisa ser tão formal..."
10131-101310050 = "Foi um incômodo...?"
10131-101310060 = "Não, não é tanto assim, mas eu gostaria que você falasse de forma mais casual."
10131-101310070 = "Entendido."
10131-101310080 = "Então, por favor, cuide de mim durante todo o dia de hoje."
10131-101310090 = "Posso perguntar sobre os planos do Sensei?"
10131-101310100 = "As semifinais da Copa de Hóquei no Gelo serão em breve!"
10131-101310110 = "Se não for incômodo, eu estava pensando se poderíamos ir juntos naquele dia..."
10131-101310120 = "Ah!"
10131-101310130 = "Me desculpe."
10131-101310140 = "Sem nem perguntar sobre a sua disponibilidade, eu simplesmente..."
10131-101310150 = "Não se preocupe! Fico aliviado em ver que a Takane está feliz."
10131-101310160 = "Ah..."
10131-101310170 = "Ah, é-é mesmo?"
10131-101310180 = "Que bom..."
10131-101310190 = "Quando eu tiver a data, eu me organizo. Por favor, me envie depois."
10131-101310200 = "Isso significa..."
10131-101310210 = "Sim, muito obrigada!"
10131-101310220 = "Sensei!"
10131-101310230 = "É hoje!"
10131-101310240 = "Você não se esqueceu, não é?"
10131-101310250 = "Eu também estava muito ansioso."
10131-101310260 = "Sim!"
10131-101310270 = "Então, estarei esperando na sala do clube de publicação."
10131-101310280 = "Obrigada por assistir ao hóquei no gelo comigo outro dia."
10131-101310290 = "Mas..."
10131-101310300 = "Sobre as várias coisas que aconteceram naquele dia,"
10131-101310310 = "Eu... realmente sinto muito..."
10131-101310320 = "Não precisa se preocupar. Eu também me diverti."
10131-101310330 = "Ah, é-é mesmo?"
10131-101310340 = "Então, é o seguinte! Também como um pedido de desculpas,"
10131-101310350 = "Eu gostaria de te convidar para o almoço hoje."
10131-101310360 = "Comida caseira da Takane!?"
10131-101310370 = "Sim."
10131-101310380 = "Além disso, hoje é o dia do 'Festival do Broto de Feijão'."
10131-101310390 = "Broto de feijão... festival?"
10131-101310400 = "Olá, Sensei!"
10131-101310410 = "Você parece de bom humor, Takane."
10131-101310420 = "Sim! Aconteceu algo muito bom..."
10131-101310430 = "Sensei, você sabia?"
10131-101310440 = "Parece que a aurora poderá ser vista esta noite!"
10131-101310450 = "Então, eu estava pensando em ir tirar fotos da paisagem."
10131-101310460 = "Então... se não for incômodo..."
10131-101310470 = "Que tal irmos juntos?"
10131-101310480 = "Fotos da paisagem da aurora?"
10131-101310490 = "Sim."
10131-101310500 = "Claro, eu sei que você está muito ocupado, então..."
10131-101310510 = "Por favor, não se esforce demais..."
10131-101310520 = "Não há problema se recusar."
10131-101310530 = "É um pedido da Takane, então tenho que ir!"
10131-101310540 = "Posso escapar do trabalho extra legalmente, então acho que vou!"
10131-101310550 = "Ah..."
10131-101310560 = "Dizer algo assim para mim..."
10131-101310570 = "É um pouco... embaraçoso, mas..."
10131-101310580 = "Eu realmente agradeço."
10131-101310590 = "Hehe."
10131-101310600 = "Eu entendo um pouco esse sentimento."
10131-101310610 = "Quando a data limite se aproxima, dá vontade de sair para passear, não é?"
10131-101310620 = "Então, estarei esperando."
