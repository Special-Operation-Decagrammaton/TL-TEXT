[translation]
10030-100300010 = "Olá, Sensei."
10030-100300020 = "Ontem, quando eu estava indo embora depois de terminar meu turno, a luz do Schale ainda estava acesa..."
10030-100300030 = "E eu ouvi que você também trabalhou até tarde no fim de semana passado..."
10030-100300040 = "Você tem descansado direito?"
10030-100300050 = "Ultimamente, tem sido difícil..."
10030-100300060 = "Isso não é bom. Descansar também é uma parte oficial da sua missão."
10030-100300070 = "Como a responsável pelos primeiros socorros do Comitê de Disciplina de Gehenna, não posso ignorar isso."
10030-100300080 = "Você tem se preocupado com algo em relação à sua saúde ultimamente?"
10030-100300090 = "Ultimamente, meus olhos andam cansados..."
10030-100300100 = "Ultimamente, meus ombros andam tensos..."
10030-100300110 = "Entendo... São sintomas típicos de fadiga crônica."
10030-100300120 = "Falando nisso, na Academia Gehenna existem muitas fontes termais que são eficazes para a recuperação da fadiga."
10030-100300130 = "Quando tiver um tempo, por que não experimenta as fontes termais de Gehenna?"
10030-100300140 = "É mesmo? Parece uma boa ideia."
10030-100300150 = "Vou dar uma passada lá quando tiver tempo."
10030-100300160 = "Sim, por favor."
10030-100300170 = "Espero que isso ajude a aliviar um pouco do seu cansaço, Sensei."
10030-100300180 = "~Chinatsu~"
10030-100300190 = "Olá, Sensei."
10030-100300200 = "Você foi às fontes termais? Houve algum problema?"
10030-100300210 = "Sim, foi tudo bem."
10030-100300220 = "Graças a todo o cuidado que você teve, foi perfeito."
10030-100300230 = "Fico feliz em ouvir isso."
10030-100300240 = "Então, indo ao que interessa... Eu poderia ir até aí agora, Sensei?"
10030-100300250 = "I-Isso é, não num sentido estranho, claro...!"
10030-100300260 = "É que eu consegui um chá que é bom para o cansaço, e pensei que poderíamos tomar juntos, se você quiser."
10030-100300270 = "Então... o que você acha?"
10030-100300280 = "Claro. Obrigado, estarei esperando."
10030-100300290 = "Não, de forma alguma. Eu que agradeço."
10030-100300300 = "Então, estou indo para aí agora mesmo."
10030-100300310 = "~Chinatsu~"
10030-100300320 = "Olá, Sensei."
10030-100300330 = "Uhm, se não for incômodo, você teria um tempinho hoje à tarde?"
10030-100300340 = "Na verdade, tem algo com que eu gostaria que você me ajudasse..."
10030-100300350 = "Sim, pode deixar comigo."
10030-100300360 = "Se é um pedido seu, Chinatsu, eu faço qualquer coisa!"
10030-100300370 = "Ah, muito obrigada."
10030-100300380 = "Então, estarei esperando em frente à loja de lembrancinhas."
10030-100300390 = "Conto com você."
10030-100300400 = "~Chinatsu~"
10030-100300410 = "Sensei, olá."
10030-100300420 = "Obrigada pela ajuda na escolha das lembrancinhas outro dia."
10030-100300430 = "E eu até acabei ganhando um presente seu..."
10030-100300440 = "Uhm, pode parecer estranho retribuir um presente de agradecimento, mas..."
10030-100300450 = "Eu queria retribuir o favor de alguma forma, então fiz uma reserva em uma certa pousada."
10030-100300460 = "É um lugar muito bom, com uma ótima reputação pela comida e instalações, então tenho certeza de que você vai gostar."
10030-100300470 = "Então, estarei esperando por você."
10030-100300480 = "~Chinatsu~"
