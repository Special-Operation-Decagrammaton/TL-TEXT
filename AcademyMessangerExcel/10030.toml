[translation]
10030-100300010 = "こんにちは、先生"
10030-100300020 = "昨日、当番を終えて帰る時にもまだシャーレの電気が点いていましたが……"
10030-100300030 = "先週末も夜遅くまで残業していたとお聞きしましたし……"
10030-100300040 = "お休みは、きちんと取られていますか？"
10030-100300050 = "最近はなかなか……"
10030-100300060 = "良くありませんよ、休息もれっきとした任務の一部です"
10030-100300070 = "ゲヘナ風紀委員会の救護担当として、これは見過ごせません"
10030-100300080 = "最近、お体で気になるところはございませんか？"
10030-100300090 = "最近は目が疲れてるような……"
10030-100300100 = "最近は肩が凝ってるような……"
10030-100300110 = "なるほど……典型的な慢性疲労の症状ですね"
10030-100300120 = "そういえば、ゲヘナ学園には疲労回復の効果がある温泉がたくさんあるんです"
10030-100300130 = "お時間がある時にでも、ゲヘナの温泉をご利用されてはいかがでしょうか？"
10030-100300140 = "そうなんだ、それは良さそう"
10030-100300150 = "時間ある時に一度寄ってみるね"
10030-100300160 = "はい、是非"
10030-100300170 = "少しでも先生の疲れが取れますように"
10030-100300180 = "～チナツ～"
10030-100300190 = "先生、お疲れ様です"
10030-100300200 = "温泉に入られて、何かご不便などはありませんでしたか？"
10030-100300210 = "うん、大丈夫"
10030-100300220 = "チナツが色々配慮してくれたおかげでバッチリ"
10030-100300230 = "それは良かったです"
10030-100300240 = "それで、本題なのですが……今から先生のところに、お伺いしてもよろしいでしょうか？"
10030-100300250 = "その、もちろん変な意味ではなく……！"
10030-100300260 = "疲労に効くお茶を手に入れたので、よろしければ一緒にお茶でもと思いまして"
10030-100300270 = "その……いかがでしょうか？"
10030-100300280 = "もちろん。ありがとう、待ってるね"
10030-100300290 = "いえそんな、こちらこそありがとうございます"
10030-100300300 = "では、すぐにお伺いしますね"
10030-100300310 = "～チナツ～"
10030-100300320 = "こんにちは、先生"
10030-100300330 = "その、もしよろしければ今日の午後、少しお時間をいただけないでしょうか？"
10030-100300340 = "実は先生に手伝っていただきたいことがありまして……"
10030-100300350 = "うん、任せて"
10030-100300360 = "チナツの頼みならいくらでも！"
10030-100300370 = "あ、ありがとうございます"
10030-100300380 = "それでは、お土産屋さんの前でお待ちしておりますね"
10030-100300390 = "よろしくお願いいたします"
10030-100300400 = "～チナツ～"
10030-100300410 = "先生、こんにちは"
10030-100300420 = "この前のお土産選びの件はありがとうございました"
10030-100300430 = "それに、プレゼントまで頂いてしまって……"
10030-100300440 = "その、お返しのお返しというのも変なお話かもしれませんが……"
10030-100300450 = "何か私も恩返しがしたいと思い、ある旅館の予約をしておきました"
10030-100300460 = "結構良いところでして、食事や施設も素晴らしいと評判のところですので、きっとご満足いただけるかと"
10030-100300470 = "それでは、お待ちしておりますね"
10030-100300480 = "～チナツ～"
