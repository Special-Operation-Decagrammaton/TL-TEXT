10089-100890440 = "Quis dizer que estou feliz por você ouvir o que tenho a dizer."
10089-100890450 = "Quando eu decidir a hora e o lugar, entro em contato de novo."
10089-100890460 = "Você confirmou o dinheiro que eu transferi?"
