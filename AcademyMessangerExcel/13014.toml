[translation]
13014-130140010 = "Mestre, você já ouviu falar sobre isso?"
13014-130140020 = "Aquela história de que \"quanto mais exposto, maior a defesa\"."
13014-130140030 = "V-você está falando de armaduras de biquíni ou algo assim?"
13014-130140040 = "Onde você ouviu isso!?"
13014-130140050 = "Que história absurda, né?"
13014-130140060 = "Treinar de roupa de banho é um pouco vergonhoso..."
13014-130140070 = "……Mas, a juventude é feita de desafios, não é?"
13014-130140080 = "Já que é assim, hoje vou treinar usando roupa de banho."
13014-130140090 = "Você vai para uma piscina ou algo do tipo?"
13014-130140100 = "Não, para a montanha."
13014-130140110 = "De roupa de banho!?"
13014-130140120 = "Muito bem."
13014-130140130 = "Decidido!"
13014-130140140 = "Mestre, traga sua roupa de banho também!"
13014-130140150 = "Mestre! Conseguiu chegar em casa em segurança?"
13014-130140160 = "Hoje foi realmente divertido."
13014-130140170 = "Foi um pouco vergonhoso, mas... valeu a pena ter criado coragem."
13014-130140180 = "A próxima será a segunda parte do treino de roupa de banho, então..."
13014-130140190 = "Ficaria feliz se você me acompanhasse de novo!"
13014-130140200 = "Por favor, que seja uma atividade onde a roupa de banho não saia do lugar...!"
13014-130140210 = "Entendido, vou pensar em algo!"
13014-130140220 = "Mestre."
13014-130140230 = "Segunda parte do treino de roupa de banho!"
13014-130140240 = "Venha comigo!"
13014-130140250 = "Que tipo de treino?"
13014-130140260 = "O cenário desta vez é..."
13014-130140270 = "O mar!"
13014-130140280 = "Oh! Legal!"
13014-130140290 = "Hehe, eu sabia que você ia gostar."
13014-130140300 = "Então, nos vemos no dia!"
13014-130140310 = "Mestre! Conseguiu chegar em casa em segurança?"
13014-130140320 = "Parece que, mesmo para mim, \"escapar em uma balsa\" foi demais."
13014-130140330 = "Estou sentindo dores musculares por toda parte."
13014-130140340 = "Ué? Mestre? Você está vendo isso... né?"
13014-130140350 = "A mensagem foi lida, mas não tem resposta."
13014-130140360 = "Será que você está sem força nos dedos...?"
13014-130140370 = "Ah, entendi."
13014-130140380 = "……"
13014-130140390 = "Então era isso mesmo."
13014-130140400 = "Da próxima vez, vamos fazer um treino mais simples."
13014-130140410 = "Descanse bem até lá!"
13014-130140420 = "O treino desta vez é——"
13014-130140430 = "Uma fogueira na praia!"
13014-130140440 = "Oh!"
13014-130140450 = "Estou indo agora mesmo!"
13014-130140460 = "Hehe, vai ser animado, não vai?"
13014-130140470 = "Então, estarei te esperando!"
13014-130140480 = "M-mestre."
13014-130140490 = "Você conseguiu chegar em casa bem, né?"
13014-130140500 = "Por causa dos meus caprichos..."
13014-130140510 = "Sinto muito por ter te colocado em uma situação difícil."
13014-130140520 = "Eu estou bem!"
13014-130140530 = "Eu também me diverti!"
13014-130140540 = "Fico feliz que diga isso, obrigado."
13014-130140550 = "Da próxima vez, vou compensar esse erro!"
13014-130140560 = "Então, até mais!"
13014-130140570 = "Mestre."
13014-130140580 = "Tem uma coisa que eu gostaria de tentar..."
13014-130140590 = "Você poderia me acompanhar?"
13014-130140600 = "Desta vez não é um treinamento."
13014-130140610 = "Eu quero compensar o que aconteceu na fogueira."
13014-130140620 = "Claro! Irei a qualquer lugar por você, Renge!"
13014-130140630 = "Obrigada, Mestre!"
13014-130140640 = "Então, nos vemos na praia à noite!"
13014-130140650 = "Como foi hoje...?"
13014-130140660 = "Foi muito divertido!"
13014-130140670 = "Pude aproveitar a juventude ao máximo!"
13014-130140680 = "Fico feliz em ouvir isso."
13014-130140690 = "Eu também... me diverti muito."
13014-130140700 = "Vamos soltar fogos de artifício juntos da próxima vez também."
13014-130140710 = "Daquela vez, talvez sejam fogos um pouco maiores."
13014-130140720 = "Claro, mas não grandes demais!"
13014-130140730 = "Sim, estou ansiosa por isso!"
13014-130140740 = "Hehe, vamos viver a juventude de novo!"
