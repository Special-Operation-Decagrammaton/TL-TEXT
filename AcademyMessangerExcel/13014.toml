[translation]
13014-130140010 = "師匠、こんな話聞いたことある？"
13014-130140020 = "「露出が多いほど防御力が高くなる」ってやつ"
13014-130140030 = "び、ビキニアーマーとかのこと？"
13014-130140040 = "どこで聞いたの！？"
13014-130140050 = "とんでもない話だよな"
13014-130140060 = "水着姿で修練なんて、ちょっと恥ずかしいし"
13014-130140070 = "……でも、挑戦してこそ青春だろ？"
13014-130140080 = "せっかくだから、今日は水着姿で修練してみる"
13014-130140090 = "プールにでも行くの？"
13014-130140100 = "いや、山だよ"
13014-130140110 = "水着で！？"
13014-130140120 = "よーし"
13014-130140130 = "決めた！"
13014-130140140 = "師匠も水着持ってきて！"
13014-130140150 = "師匠！無事に帰れた？"
13014-130140160 = "今日は本当に楽しかったよ"
13014-130140170 = "ちょっと恥ずかしかったけど……勇気を出して正解だった"
13014-130140180 = "次は水着修練、第2弾だから……"
13014-130140190 = "また付き合ってくれると嬉しいな！"
13014-130140200 = "水着が脱げない種目でお願い……！"
13014-130140210 = "わかった、考えてみる！"
13014-130140220 = "師匠"
13014-130140230 = "水着修練の第2弾！"
13014-130140240 = "付き合ってくれ！"
13014-130140250 = "どんな修練？"
13014-130140260 = "今回の舞台は……"
13014-130140270 = "海だ！"
13014-130140280 = "お！いいね！"
13014-130140290 = "ふふっ、喜んでくれると思った"
13014-130140300 = "じゃ、当日に！"
13014-130140310 = "師匠！無事に帰れた？"
13014-130140320 = "いくらアタシでも「いかだで脱出」はやりすぎだったみたい"
13014-130140330 = "筋肉痛でズキズキするよ"
13014-130140340 = "あれ？師匠？これ見てる……よな？"
13014-130140350 = "既読なのに返事がない"
13014-130140360 = "まさか、指に力が入らないのか……？"
13014-130140370 = "う　ああ"
13014-130140380 = "……"
13014-130140390 = "やっぱり、そうか"
13014-130140400 = "次はもっと簡単な修練にしよう"
13014-130140410 = "それまでゆっくり休んでくれ！"
13014-130140420 = "今回の修練は――"
13014-130140430 = "浜辺のキャンプファイヤー！"
13014-130140440 = "おお！"
13014-130140450 = "すぐ行くよ！"
13014-130140460 = "ふふ、盛り上がるだろ？"
13014-130140470 = "じゃ、待ってるよ！"
13014-130140480 = "し、師匠"
13014-130140490 = "ちゃんと帰れたよな？"
13014-130140500 = "アタシのわがままのせいで"
13014-130140510 = "大変な目に遭わせちゃって、ごめん"
13014-130140520 = "私は平気だよ！"
13014-130140530 = "私も楽しかったよ！"
13014-130140540 = "そう言ってくれると嬉しいよ、ありがとう"
13014-130140550 = "次はこの失敗を挽回してみせる！"
13014-130140560 = "じゃ、また！"
13014-130140570 = "師匠"
13014-130140580 = "やってみたいことがあるんだけど……"
13014-130140590 = "付き合ってくれないか？"
13014-130140600 = "今回は修練じゃないよ"
13014-130140610 = "キャンプファイヤーのことを挽回したくて"
13014-130140620 = "いいよ！レンゲのためならどこへでも！"
13014-130140630 = "ありがとう、師匠！"
13014-130140640 = "じゃ、夜の海岸で！"
13014-130140650 = "今日はどうだった……？"
13014-130140660 = "本当に楽しかったよ！"
13014-130140670 = "青春を満喫できた！"
13014-130140680 = "それならよかった"
13014-130140690 = "アタシも……楽しかったよ"
13014-130140700 = "次も一緒に花火をしよう"
13014-130140710 = "その時は、もうちょっと大きな花火かな"
13014-130140720 = "もちろん、大きすぎない程度で！"
13014-130140730 = "うん、楽しみにしてるよ！"
13014-130140740 = "へへっ、また青春しに行こう！"
