[translation]
10076-100760010 = "Sensei!"
10076-100760020 = "Você tem um tempinho agora?"
10076-100760030 = "Estou livre."
10076-100760040 = "O que foi?"
10076-100760050 = "Oh!"
10076-100760060 = "Se não for incômodo,"
10076-100760070 = "eu tenho uma pequena sugestão!"
10076-100760080 = "N-não é como se eu quisesse explicar algo!"
10076-100760090 = "Não é uma explicação...?"
10076-100760100 = "Tudo bem, pode vir quando quiser."
10076-100760110 = "Eh?"
10076-100760120 = "Uhm!"
10076-100760130 = "Ah."
10076-100760140 = "Sim!!"
10076-100760150 = "Estou indo agora mesmo!"
10076-100760160 = "Sensei."
10076-100760170 = "Eu vim pensando que poderia ser de ajuda,"
10076-100760180 = "mas acabei sendo ajudada no final."
10076-100760190 = "Uhm, muito obrigada."
10076-100760200 = "Graças a você, Kotori, consegui organizar tudo."
10076-100760210 = "Acho que não teria feito isso por conta própria."
10076-100760220 = "S-"
10076-100760230 = "Sério?"
10076-100760240 = "Nesse caso,"
10076-100760250 = "que bom!!"
10076-100760260 = "Muito obrigada!!"
10076-100760270 = "Deve ser porque tem muita gente."
10076-100760280 = "O trabalho também está se acumulando, né?"
10076-100760290 = "Como esperado do Grande Festival de Esportes!"
10076-100760300 = "Tenho certeza que o Sensei também deve estar"
10076-100760310 = "tão ocupado a ponto de ficar tonto, não é?!"
10076-100760320 = "É o trabalho de gerenciamento do evento, afinal."
10076-100760330 = "É porque várias escolas estão reunidas."
10076-100760340 = "Eu sabia!"
10076-100760350 = "Hmm..."
10076-100760360 = "Nesse caso, por favor, me deixe ajudar a organizar os documentos!"
10076-100760370 = "Eu já terminei a primeira parte do meu trabalho aqui!"
10076-100760380 = "Por favor, me espere!"
10076-100760390 = "Estou indo agora mesmo!"
10076-100760400 = "Bom trabalho!"
10076-100760410 = "Eu ainda não entendi muito bem o motivo de antes, mas"
10076-100760420 = "parece que consegui ser útil para o Sensei de verdade,"
10076-100760430 = "então estou muito feliz!"
10076-100760440 = "...Não é um mal-entendido, né?"
10076-100760450 = "Pensei que você era minha salvadora."
10076-100760460 = "Super Kotori, viva!"
10076-100760470 = "...!!"
10076-100760480 = "Ehehe."
10076-100760490 = "Obrigada, Sensei!"
10076-100760500 = "Pode me chamar de novo quando quiser!!"
10076-100760510 = "Ugh..."
10076-100760520 = "Eu já esperava por isso, mas..."
10076-100760530 = "Movimentar o corpo é mais difícil do que eu pensava."
10076-100760540 = "Eu deveria ter me exercitado mais regularmente."
10076-100760550 = "Me arrependo..."
10076-100760560 = "Você parece cansada. Onde você está agora?"
10076-100760570 = "Vou aí ver como você está."
10076-100760580 = "Ah!"
10076-100760590 = "Não foi bem isso que eu quis dizer..."
10076-100760600 = "Mas..."
10076-100760610 = "Se eu puder ver você, Sensei..."
10076-100760620 = "Sim."
10076-100760630 = "Estarei esperando."
10076-100760640 = "Uwaaaah!!"
10076-100760650 = "Pensando melhor sobre o que aconteceu agora há pouco..."
10076-100760660 = "Eu fiz algo super vergonhoso, não fiz?!"
10076-100760670 = "Mostrar um lado tão indefeso meu!!"
10076-100760680 = "Não foi nada demais."
10076-100760690 = "Cuidar de você também é trabalho do Sensei."
10076-100760700 = "Hã?"
10076-100760710 = "É mesmo?"
10076-100760720 = "Hmm..."
10076-100760730 = "Se o Sensei está dizendo...?"
10076-100760740 = "De qualquer forma, muito obrigada! Graças a você, estou totalmente recuperada!!"
10076-100760750 = "Então, com licença!!"
10076-100760760 = "Já está tão tarde?"
10076-100760770 = "Sem que eu percebesse, o Grande Festival de Esportes já está chegando ao fim."
10076-100760780 = "De alguma forma..."
10076-100760790 = "É que..."
10076-100760800 = "Estou com um sentimento estranho."
10076-100760810 = "Não quer que acabe?"
10076-100760820 = "É a prova de que você se esforçou muito."
10076-100760830 = "Você acha?"
10076-100760840 = "Hmm..."
10076-100760850 = "Sobre isso..."
10076-100760860 = "Gostaria de pensar um pouco mais a respeito."
