[translation]
20031-200310010 = "Sensei"
20031-200310020 = "Você não disse outro dia que precisava de tatames porque ia fazer uma sala de descanso nova no Schale?"
20031-200310030 = "Sim, me pediram uma sala de descanso com piso de tatame..."
20031-200310040 = "Mas, por que a pergunta de repente?"
20031-200310050 = "Então, pode levar quando vier ao prédio antigo da próxima vez."
20031-200310060 = "Encontrei muitos tatames de alta qualidade enquanto organizava as ruínas da estância termal."
20031-200310070 = "Vocês não vão usar na classe especial?"
20031-200310080 = "Hmm, o aroma do tatame é bom, mas..."
20031-200310090 = "Como estraga fácil, sinto que não é muito adequado para o prédio antigo."
20031-200310100 = "Mas também é um desperdício deixar parado assim..."
20031-200310110 = "Pensei que seria melhor dar para quem precisa."
20031-200310120 = "Isso é muito gentil, mas..."
20031-200310130 = "Você tem materiais suficientes para o conserto do prédio antigo?"
20031-200310140 = "Sim. Consegui materiais suficientes nas ruínas da estância termal."
20031-200310150 = "Se for para dizer algo..."
20031-200310160 = "Talvez doces?"
20031-200310170 = "Outros ingredientes a gente consegue aos montes por aí, mas doces não são tão fáceis."
20031-200310180 = "Então, vamos trocar os tatames por doces."
20031-200310190 = "Fufu, gostei. Estou ansiosa."
20031-200310200 = "Então, até a próxima, Sensei."
20031-200310210 = "Sensei, a pressão da água subterrânea está estranha."
20031-200310220 = "Já faz dias desde a última limpeza, mas quase não tem água na banheira."
20031-200310230 = "Nesse ritmo, vai levar mais uma semana..."
20031-200310240 = "E como vocês vão tomar banho?"
20031-200310250 = "Hmm, não tem jeito, mas..."
20031-200310260 = "Só nos resta tomar banho no rio como antes..."
20031-200310270 = "Mas vocês vão acabar pegando um resfriado, não vão?"
20031-200310280 = "Por que não vão a outro lugar?"
20031-200310290 = "Não sei..."
20031-200310300 = "Mesmo sendo alunas da classe especial,"
20031-200310310 = "acho que seria um escândalo se tomássemos banho na água da fonte da praça..."
20031-200310320 = "Eu quis dizer 'por que não vão a outro balneário'!"
20031-200310330 = "Desde que fiz leite com frutas outro dia, venho testando."
20031-200310340 = "Acho que o leite com frutas é mais gostoso quando acabado de misturar."
20031-200310350 = "Porque o aroma e a textura das frutas mudam facilmente."
20031-200310360 = "Concordo."
20031-200310370 = "Além disso, o leite também perde o frescor rápido."
20031-200310380 = "Mas nas fontes termais comuns, eles vendem leite com frutas já preparado, não vendem?"
20031-200310390 = "Por isso, pensei em uma coisa..."
20031-200310400 = "Que tal colocar um bar de leite com frutas na sala de descanso? Teria um bartender, e assim que o cliente saísse do banho, ele prepararia o leite com frutas na hora."
20031-200310410 = "Assim, as pessoas poderiam beber o leite com frutas enquanto ainda está gostoso, e também daria para ajustar a mistura ao gosto do cliente, né? Acho que vale a pena tentar."
20031-200310420 = "É uma ideia interessante, mas..."
20031-200310430 = "Será que as instalações termais fariam tudo isso só por causa de leite com frutas...?"
20031-200310440 = "Ah, quanto a isso, não se preocupe."
20031-200310450 = "Consegui um emprego de alguns dias em uma fonte termal que me indicaram."
20031-200310460 = "............Hã?"
20031-200310470 = "Sensei, soube que você acabou pegando um resfriado?"
20031-200310480 = "Eu tinha um assunto no Schale agora pouco,"
20031-200310490 = "então deixei um chá de leite com gengibre na sala de descanso."
20031-200310500 = "Beba quente quando sentir calafrios."
20031-200310510 = "É o blend perfeito para mim agora..."
20031-200310520 = "Obrigada por se dar ao trabalho de ser tão atencioso."
20031-200310530 = "Eu disse que você deveria dormir comigo no mesmo futon."
20031-200310540 = "Durma bem no futon quentinho hoje."
20031-200310550 = "……Sem depender da 'fermentação'."
20031-200310560 = "……Vou guardar isso no coração."
20031-200310570 = "Sensei, a banheira do prédio antigo já está cheia."
20031-200310580 = "Aproveitei para organizar o ambiente ao redor e coloquei um novo sais de banho."
20031-200310590 = "Se quiser, venha tomar um banho também, Sensei."
20031-200310600 = "Fico feliz que tenha sido restaurado, mas..."
20031-200310610 = "Não tem 'suco de uva' aí dentro, tem...?"
20031-200310620 = "Fufu, quem sabe?"
20031-200310630 = "Se está curioso, por que não vem verificar pessoalmente?"
20031-200310640 = "Estarei te esperando, Sensei."
