[translation]
20031-200310010 = "先生"
20031-200310020 = "この前、シャーレに新しく休憩室を作るから、畳が必要って言ってなかった？"
20031-200310030 = "うん、座敷の休憩室が欲しいって言われて……"
20031-200310040 = "でも、急にどうしたの？"
20031-200310050 = "じゃあ今度、旧校舎来たときに持っていっていいよ"
20031-200310060 = "温泉郷の跡地を整理してたら、高級畳をたくさん見つけてさ"
20031-200310070 = "特別クラスでは使わないの？"
20031-200310080 = "うーん、畳って香りはいいんだけど……"
20031-200310090 = "腐りやすいから、旧校舎にはあまり向かない気がするんだよね"
20031-200310100 = "でも、このまま放置しておくのももったいないし……"
20031-200310110 = "必要な人がいるならあげたほうがいいかなって"
20031-200310120 = "それはありがたいけど……"
20031-200310130 = "旧校舎の修理に必要な素材は足りてる？"
20031-200310140 = "うん。温泉郷跡から資材は十分手に入ったから"
20031-200310150 = "強いて言うなら……"
20031-200310160 = "甘いお菓子、とかかな？"
20031-200310170 = "他の食材はその辺でいくらでも手に入るけど、お菓子はそうもいかないからね"
20031-200310180 = "じゃあ、畳はお菓子と交換しよう"
20031-200310190 = "ふふっ、いいね。楽しみにしてる"
20031-200310200 = "じゃあ、また今度ね、先生"
20031-200310210 = "先生、地下水の水圧が変なんだ"
20031-200310220 = "前に掃除してから何日も経ってるのに、湯船に水がほとんど溜まってなくて"
20031-200310230 = "この調子だと、あと一週間はかかっちゃうなぁ……"
20031-200310240 = "だったらお風呂はどうするの？"
20031-200310250 = "うーん、仕方ないけど……"
20031-200310260 = "前みたいに川で水浴びするしか……"
20031-200310270 = "でも、風邪引いちゃうよ？"
20031-200310280 = "別の場所へ入りにいったら？"
20031-200310290 = "どうかな……"
20031-200310300 = "いくら特別クラスの生徒でも"
20031-200310310 = "広場にある噴水のお湯で入浴してたら大騒ぎになると思うけど……"
20031-200310320 = "「他のお風呂に行ったら？」って意味だよ！"
20031-200310330 = "この前フルーツ牛乳を作ってから、ずっと試してたんだけど"
20031-200310340 = "フルーツ牛乳は混ぜたばかりのものが一番おいしいと思うんだよね"
20031-200310350 = "果物は香りや食感が変わりやすいから"
20031-200310360 = "そうだね"
20031-200310370 = "それに牛乳も鮮度が落ちやすいから"
20031-200310380 = "でも普通の温泉では、あらかじめ作ってあるフルーツ牛乳を売ってるんだよね？"
20031-200310390 = "だから、一つ考えてみたんだけど……"
20031-200310400 = "休憩室にフルーツ牛乳バーを置くのはどうかな。バーテンダーがいて、お客さんがお風呂から上がったらすぐにフルーツ牛乳をブレンディングしてくれるんだよ"
20031-200310410 = "そうすればフルーツ牛乳を美味しいうちに飲んでもらえるし、お客さんの好みに合わせたブレンディングもできるでしょ？一度試してみる価値はあると思う"
20031-200310420 = "面白いアイデアだけど……"
20031-200310430 = "温泉施設はフルーツ牛乳のためにそこまでするかな……？"
20031-200310440 = "あ、それについては大丈夫"
20031-200310450 = "あの銭湯に紹介してもらった温泉で、数日働かせてもらうことになったから"
20031-200310460 = "…………え？"
20031-200310470 = "先生、結局風邪ひいたんだって？"
20031-200310480 = "さっきシャーレに用事があったから"
20031-200310490 = "休憩室に生姜を入れたミルクティーを置いてきたよ"
20031-200310500 = "寒気がする時に温めて飲んでね"
20031-200310510 = "今の私にぴったりなブレンドだね……"
20031-200310520 = "わざわざ気を遣ってくれてありがとう"
20031-200310530 = "だから私と一緒のお布団で寝ればいいって言ったのに"
20031-200310540 = "今日はあったかいお布団でぐっすり寝てね"
20031-200310550 = "……「発酵」に頼らずに"
20031-200310560 = "……肝に銘じます"
20031-200310570 = "先生、旧校舎の湯船にお湯が溜まったよ"
20031-200310580 = "ついでに周りの環境整備をして、新しい入浴剤も入れておいた"
20031-200310590 = "よかったら先生も入りに来て"
20031-200310600 = "復旧できてよかったけど……"
20031-200310610 = "「ぶどうジュース」は入ってないよね……？"
20031-200310620 = "ふふっ、どうかな"
20031-200310630 = "気になるなら、直接確認しに来たらどう？"
20031-200310640 = "待ってるよ、先生"
