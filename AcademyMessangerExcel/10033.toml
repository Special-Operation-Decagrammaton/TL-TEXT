[translation]
10033-100330010 = "Ufufu..."
10033-100330020 = "Bom dia, Sensei. Que bela manhã."
10033-100330030 = "Bom dia, Wakamo."
10033-100330040 = "Ah... Essa sua resposta gentil, que nunca muda..."
10033-100330050 = "Só de tocar nas letras do meu nome, um presente seu..."
10033-100330060 = "Meu coração se aquece tanto que chega a ficar quente."
10033-100330070 = "Q-Que bom..."
10033-100330080 = "O sol está quentinho hoje, o tempo está ótimo, não é?"
10033-100330090 = "Mas não podemos baixar a guarda."
10033-100330100 = "Quando a temperatura muda de repente, é fácil ficar doente."
10033-100330110 = "É a mudança de estação, né?"
10033-100330120 = "Wakamo, cuide-se também."
10033-100330130 = "O Sensei se preocupando assim com a minha saúde..."
10033-100330140 = "Fufu, decidi."
10033-100330150 = "Num momento tão memorável, não consigo me contentar apenas com o MomoTalk."
10033-100330160 = "Poderia esperar um pouco?"
10033-100330170 = "Meu a-ma-do♡"
10033-100330180 = "...Hã?"
10033-100330190 = "Hã, Wakamo?"
10033-100330200 = "Fiquei muito feliz em revê-lo."
10033-100330210 = "Estarei aguardando ansiosamente pelo nosso próximo encontro."
10033-100330220 = "Da próxima vez, vamos nos encontrar de um jeito mais calmo, tá...?"
10033-100330230 = "S-Sim!"
10033-100330240 = "Se é o que você deseja, que assim seja...!"
10033-100330250 = "Sensei. Hoje é seu dia de folga do trabalho na Schale, certo?"
10033-100330260 = "Sim. Ué, eu já tinha te contado?"
10033-100330270 = "Fufufu..."
10033-100330280 = "Esta Wakamo tem a agenda do Sensei gravada em seu coração, sem o menor desvio."
10033-100330290 = "A-Ah, tá..."
10033-100330300 = "Um feriado finalmente conquistado em meio a uma rotina tão ocupada e sem descanso..."
10033-100330310 = "Espero que tenha um dia seguro e divertido."
10033-100330320 = "Estarei orando por você enquanto sigo seus passos."
10033-100330330 = "Uhm, obrigado...?"
10033-100330340 = "Sensei, você está bem?"
10033-100330350 = "Não pode ser que você tenha se esquecido, não é?"
10033-100330360 = "Hoje é o dia do nosso compromisso..."
10033-100330370 = "Quantas noites em claro eu passei, aguardando ansiosamente por este dia..."
10033-100330380 = "Enquanto tentava conter essa empolgação, preparei um plano de encontro perfeito!"
10033-100330390 = "E-Entendi."
10033-100330400 = "Então, estarei esperando no local combinado. Fufufu..."
10033-100330410 = "Ok. Já estou a caminho."
10033-100330420 = "Sensei, se não for incômodo..."
10033-100330430 = "Será que eu poderia ter um pouco do seu precioso tempo hoje?"
10033-100330440 = "Ah, desculpe... Estou no meio de um trabalho que não posso largar agora..."
10033-100330450 = "Entendo..."
10033-100330460 = "É uma pena, mas não há o que fazer."
10033-100330470 = "Por mais que eu queira, meu egoísmo não pode atrapalhar o Sensei..."
10033-100330480 = "É uma pena, mas hoje terei que ir sozinha."
10033-100330490 = "Vai fazer compras ou algo assim?"
10033-100330500 = "Sim, preciso de algumas coisinhas... Estava pensando em ir ao Mercado Negro."
10033-100330510 = "Sozinha no Mercado Clandestino, é...?"
10033-100330520 = "...Vou terminar rapidinho, então vamos juntos. Pode me esperar um pouco?"
10033-100330530 = "Ah, que gentileza a sua..."
10033-100330540 = "Fufu... Então, estarei esperando."
10033-100330550 = "Muito obrigada por me acompanhar hoje."
10033-100330560 = "Esta Wakamo"
10033-100330570 = "De verdade,"
10033-100330580 = "De verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade."
10033-100330590 = "De verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade, de verdade."
10033-100330600 = "Fiquei tão feliz por estar com você♡"
10033-100330610 = "Ufufufu..."
10033-100330620 = "Que bom."
10033-100330630 = "Então, até mais."
10033-100330640 = "Estarei ansiosa pelo dia em que poderemos nos encontrar novamente."
10033-100330650 = "..."
10033-100330660 = "Bom dia, Sensei. Como você está?"
10033-100330670 = "Bom dia, Wakamo."
10033-100330680 = "Fiquei pensando se entrar em contato assim não estaria tomando o seu precioso tempo..."
10033-100330690 = "...e me sinto mal por isso, mas..."
10033-100330700 = "Estou em um intervalo agora. O que foi?"
10033-100330710 = "Que coincidência."
10033-100330720 = "Eu também acabei de ficar com um tempo livre."
10033-100330730 = "Fufu, ser abençoada com tanta sorte..."
10033-100330740 = "Para tornar este momento milagroso eterno..."
10033-100330750 = "Hoje, darei o meu melhor por você♡"
10033-100330760 = "W-Wakamo? O que você quer dizer com isso...?"
