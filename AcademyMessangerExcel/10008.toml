[translation]
10008-644 = "よお先生、最近は忙しいのか？"
10008-645 = "ミレニアムでも見かけねえし、タイミングが合ったら久々に来たらどうだ？"
10008-646 = "あたしも忙しいけど、ちょっと会うくらいの時間は作れるからさ"
10008-647 = "うん、じゃあ遊びに行くね"
10008-648 = "そうだね、じゃあ今度行こうかな"
10008-649 = "はっ、期待しねえで待ってるよ"
10008-650 = "ったく、来るんだったら先に言ってくれよ。油断してたじゃねえか……"
10008-651 = "ネルが呼んでくれたんじゃなかったっけ？"
10008-652 = "遊びに行くって言ったはず……？"
10008-653 = "あ？そうだったか？"
10008-654 = "そう言われるとそんな気もしてきたな……"
10008-655 = "と、とにかくだな！！"
10008-656 = "っと……なんてーかその……"
10008-657 = "朝から会えてびっくりしたっていうか……あ、約束は守れよ！？"
10008-658 = "アカネ……みんなに……連絡頼む……"
10008-659 = "信じられねえけど……どうやら風邪引いたみたいだ"
10008-660 = "遅刻するわ……たぶん……"
10008-661 = "ネル？もしかしてメッセージ送る相手間違えてない？"
10008-662 = "ネル！？大丈夫！？"
10008-663 = "よお、先生。あのおかゆ、微妙な味だったぞ"
10008-664 = "……でも、お見舞いに来てくれてありがとな"
10008-665 = "この借りは絶対いつか返すから、覚悟しとけよ"
10008-666 = "早く良くなってね"
10008-667 = "うん、待ってるね"
10008-668 = "よお先生"
10008-669 = "風邪引いたって聞いたけど？"
10008-670 = "本当なのか？"
10008-671 = "咳が……熱が……"
10008-672 = "寒気がする……"
10008-673 = "はっ、だっせえな。覚悟しとけよ"
10008-674 = "今からシャーレに行ってやっからな"
10008-675 = "最近遅刻と欠席のしすぎで、出席日数がギリギリでよぉ……"
10008-676 = "何か良い方法でもねぇかな……"
10008-677 = "真面目に出席すればいいと思う"
10008-678 = "真面目な学生になればいいと思う"
10008-679 = "そういう正論は今求めてねえ！"
10008-680 = "なんかこう、都合のいい方法とかねぇのか！？"
10008-681 = "そんなものはありません"
10008-682 = "ズルはダメ"
10008-683 = "……"
10008-684 = "……まあ、そうだよな"
10008-685 = "ちっ、わーったわーった！"
10008-686 = "真面目にやればいいんだろ！"
10008-687 = "遅刻も欠席もしなきゃいいだけの話だ！"
10008-688 = "頑張って！"
10008-689 = "なあ先生"
10008-690 = "ちょっと良いものでも見たくねえか？"
10008-691 = "なかなかに悪くねぇもんだぜ？"
10008-692 = "怪しい……"
10008-693 = "何それ……？"
10008-694 = "ははっ！"
10008-695 = "気になるなら、今晩ミレニアムに来な"
10008-696 = "損はさせねえからさ"
10008-697 = "あの場所に行きたいときはあたしに言えよ！一緒に行くから！"
10008-698 = "一人で行ったらぶっ殺すからな！？"
10008-699 = "うん、分かった。約束。今日はありがとね"
10008-100080010 = "よっ、先生"
10008-100080020 = "暇なんだけどよ"
10008-100080030 = "今なにしてんだ？"
10008-100080040 = "何もしてないよ"
10008-100080050 = "私も暇してる"
10008-100080060 = "ははっ"
10008-100080070 = "そうか"
10008-100080080 = "……おし、暇なんだな？"
10008-100080090 = "せっかく休みなんだからよ"
10008-100080100 = "やることもないんだったら、ミレニアムまで来てくれ"
10008-100080110 = "そういえば"
10008-100080120 = "さっきの続きだけどよ"
10008-100080130 = "あ、スカジャンのことな"
10008-100080140 = "もし欲しくなったらいつでも言ってくれ"
10008-100080150 = "あたしが探してやるからよ"
10008-100080160 = "お揃いとかどう？"
10008-100080170 = "……"
10008-100080180 = "ばっ"
10008-100080190 = "変なこと言うんじゃねぇ！！"
