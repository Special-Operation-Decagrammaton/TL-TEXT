[translation]
10008-644 = "E aí, Sensei, tem estado ocupado ultimamente?"
10008-645 = "Não te vejo na Millennium, que tal dar uma passada aqui quando tiver um tempo?"
10008-646 = "Eu também estou ocupada, mas consigo arranjar um tempinho pra gente se ver."
10008-647 = "Ok, então vou te visitar."
10008-648 = "É verdade, acho que vou da próxima vez."
10008-649 = "Hah, vou esperar, mas sem criar expectativas."
10008-650 = "Caramba, se fosse vir, devia ter avisado antes. Me pegou de surpresa..."
10008-651 = "Não foi você que me chamou, Neru?"
10008-652 = "Eu disse que ia te visitar, não disse...?"
10008-653 = "Ah? Foi isso mesmo?"
10008-654 = "Agora que você falou, acho que foi isso mesmo..."
10008-655 = "D-De qualquer forma!!"
10008-656 = "Bem... como eu posso dizer..."
10008-657 = "Fiquei surpresa de te ver de manhã... Ah, e cumpra sua promessa, hein!?"
10008-658 = "Akane... avise... todo mundo... por favor..."
10008-659 = "Não dá pra acreditar... mas parece que peguei um resfriado."
10008-660 = "Vou me atrasar... provavelmente..."
10008-661 = "Neru? Será que você não mandou a mensagem pra pessoa errada?"
10008-662 = "Neru!? Você está bem!?"
10008-663 = "E aí, Sensei. Aquele mingau de arroz estava com um gosto meio estranho."
10008-664 = "...Mas, obrigada por ter vindo me visitar."
10008-665 = "Vou te pagar por essa algum dia, pode esperar."
10008-666 = "Melhore logo."
10008-667 = "Sim, estarei esperando."
10008-668 = "E aí, Sensei."
10008-669 = "Ouvi dizer que você pegou um resfriado."
10008-670 = "É verdade?"
10008-671 = "Estou com tosse... febre..."
10008-672 = "Estou com calafrios..."
10008-673 = "Hah, que patético. Se prepare."
10008-674 = "Estou indo para a Schale agora mesmo."
10008-675 = "Ultimamente, tenho me atrasado e faltado tanto que meus dias de presença estão no limite..."
10008-676 = "Será que não tem um jeito mais fácil...?"
10008-677 = "Acho que é só comparecer às aulas direitinho."
10008-678 = "Acho que é só se tornar uma aluna dedicada."
10008-679 = "Não é esse tipo de resposta óbvia que eu quero agora!"
10008-680 = "Tipo, não tem um jeito mais conveniente!?"
10008-681 = "Não existe tal coisa."
10008-682 = "Não pode trapacear."
10008-683 = "..."
10008-684 = "...Bem, é verdade."
10008-685 = "Tsc, tá, tá, entendi!"
10008-686 = "É só levar a sério, né!"
10008-687 = "É só não me atrasar nem faltar!"
10008-688 = "Força!"
10008-689 = "Ei, Sensei."
10008-690 = "Não quer ver uma coisinha legal?"
10008-691 = "Não é nada mau, sabe?"
10008-692 = "Suspeito..."
10008-693 = "O que é isso...?"
10008-694 = "Haha!"
10008-695 = "Se estiver a fim, cola na Millennium hoje à noite."
10008-696 = "Garanto que você não vai se arrepender."
10008-697 = "Quando quiser ir naquele lugar, me dá um toque! A gente vai junto!"
10008-698 = "Se for por conta própria, eu te arrebento, tá me ouvindo?!"
10008-699 = "Uhum, entendi. Prometo. Valeu por hoje, hein."
10008-100080010 = "E aí, Sensei."
10008-100080020 = "Tô no tédio aqui."
10008-100080030 = "O que cê tá fazendo agora?"
10008-100080040 = "Não tô fazendo nada."
10008-100080050 = "Eu também tô de bobeira."
10008-100080060 = "Haha."
10008-100080070 = "Saquei."
10008-100080080 = "Certo... então você tá livre, né?"
10008-100080090 = "Já que a gente tá de folga e tudo..."
10008-100080100 = "Se não tiver nada pra fazer, cola aqui na Millennium."
10008-100080110 = "Falando nisso..."
10008-100080120 = "Mas, continuando o papo de antes..."
10008-100080130 = "Ah, sobre a jaqueta sukajan."
10008-100080140 = "Se quiser uma, é só me dar um toque."
10008-100080150 = "Deixa que eu arranjo uma pra você."
10008-100080160 = "Que tal umas combinando?"
10008-100080170 = "……"
10008-100080180 = "Q-!"
10008-100080190 = "Não fala besteira!!"
