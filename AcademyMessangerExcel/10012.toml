[translation]
10012-872 = "おはようございます、トレーナー"
10012-873 = "今日、お時間大丈夫でしょうか？"
10012-874 = "うん、どうしたの？"
10012-875 = "特に忙しくないから大丈夫だよ"
10012-876 = "はい、実は、"
10012-877 = "この前お話していた、トレーニングメニューができたんです"
10012-878 = "よろしければ確認をしていただきたくて、ジムまで来ていただけませんか？"
10012-879 = "お待ちしています！"
10012-880 = "トレーナー、今週末はお忙しいでしょうか？"
10012-881 = "よろしければ私と一緒に、ショッピングモールに行きませんか？"
10012-882 = "ぜひぜひ"
10012-883 = "何を買うの？"
10012-884 = "ありがとうございます！"
10012-885 = "プロテインを買いたいので、トレーナーからアドバイスを頂ければと"
10012-886 = "それでは、ショッピングモールでお待ちしておりますね"
10012-887 = "トレーナー。今日はトレーニングのために、特別なものを準備しました"
10012-888 = "今日の午後、ジムでお会いしましょう"
10012-889 = "お疲れ様でした、トレーナー"
10012-890 = "身体の調子はいかがですか？"
10012-891 = "うん、何とかね"
10012-892 = "筋肉が、悲鳴を……"
10012-893 = "さすがトレーナー、まだまだいけそうですね"
10012-894 = "ちょっと強度が高かったかもしれませんね……"
10012-895 = "次にお会いした時に、ストレッチのお手伝いをしますね"
10012-896 = "そうだ、おそらくそろそろトレーナーの事務所に、"
10012-897 = "私がお送りしたプロテインが届いてると思います"
10012-899 = "一日4回、忘れずに飲んでくださいね"
10012-900 = "トレーナー、こんにちは"
10012-901 = "よかったら、今週末ちょっと会えませんか？"
10012-902 = "その、まだ筋肉痛が……！"
10012-903 = "運動してます！サボってません！"
10012-904 = "あ、いえ、その……"
10012-905 = "運動関連のお話ではなく……"
10012-906 = "なら何でもばっちこい！"
10012-907 = "ありがとうございます！"
10012-908 = "それでは後ほど！"
10012-10012010 = "トレーナー、シャーレの近くに新しくできた公園にはもう行かれましたか？"
10012-10012020 = "まだないよ"
10012-10012030 = "そうでしたか"
10012-10012040 = "私はこの前、当番の帰りに寄ってみたのですが"
10012-10012050 = "トラックも整備されていて、朝のジョギングによさそうでした"
10012-10012060 = "ですので、もしよろしければ、ですが"
10012-10012070 = "明日の朝、その公園で軽くジョギングをしませんか？"
10012-10012080 = "軽いジョギングなら……"
10012-10012090 = "ありがとうございます"
10012-10012100 = "では、明日の朝お会いしましょう！"
