[translation]
10012-872 = "Bom dia, Treinador."
10012-873 = "Você tem um tempo hoje?"
10012-874 = "Sim, o que foi?"
10012-875 = "Não estou muito ocupado, então tudo bem."
10012-876 = "Sim, na verdade..."
10012-877 = "A rotina de treinamento que conversamos outro dia está pronta."
10012-878 = "Se não for incômodo, você poderia vir até a academia para dar uma olhada?"
10012-879 = "Estarei esperando!"
10012-880 = "Treinador, você está ocupado neste fim de semana?"
10012-881 = "Se não for incômodo, gostaria de ir ao shopping comigo?"
10012-882 = "Com certeza!"
10012-883 = "O que você vai comprar?"
10012-884 = "Obrigada!"
10012-885 = "Quero comprar proteína e gostaria de um conselho seu."
10012-886 = "Então, estarei esperando por você no shopping."
10012-887 = "Treinador. Hoje eu preparei algo especial para o nosso treinamento."
10012-888 = "Vamos nos encontrar na academia hoje à tarde."
10012-889 = "Bom trabalho, Treinador."
10012-890 = "Como está se sentindo?"
10012-891 = "Sim, estou aguentando."
10012-892 = "Meus músculos... estão gritando..."
10012-893 = "Como esperado do Treinador, parece que você ainda aguenta mais."
10012-894 = "Talvez a intensidade tenha sido um pouco alta..."
10012-895 = "Da próxima vez que nos encontrarmos, eu ajudo você com o alongamento."
10012-896 = "Ah, é mesmo. A essa altura, no seu escritório..."
10012-897 = "Acho que a proteína que eu enviei já deve ter chegado."
10012-899 = "Não se esqueça de tomar 4 vezes ao dia, ok?"
10012-900 = "Olá, Treinador."
10012-901 = "Se não for incômodo, podemos nos encontrar neste fim de semana?"
10012-902 = "É que... ainda estou com dor muscular...!"
10012-903 = "Eu estou me exercitando! Não estou matando o treino!"
10012-904 = "Ah, não, é que..."
10012-905 = "Não é sobre exercícios..."
10012-906 = "Então pode vir com o que for!"
10012-907 = "Obrigada!"
10012-908 = "Então, até mais tarde!"
10012-10012010 = "Treinador, você já foi ao novo parque que abriu perto da Schale?"
10012-10012020 = "Ainda não."
10012-10012030 = "Entendo."
10012-10012040 = "Eu passei por lá outro dia, no caminho de volta do meu plantão."
10012-10012050 = "A pista de corrida está bem cuidada, parecia um bom lugar para uma corrida matinal."
10012-10012060 = "Então, se não for incômodo..."
10012-10012070 = "Que tal fazermos uma corrida leve naquele parque amanhã de manhã?"
10012-10012080 = "Se for uma corrida leve..."
10012-10012090 = "Obrigada."
10012-10012100 = "Então, nos vemos amanhã de manhã!"
