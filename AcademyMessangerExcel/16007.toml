[translation]
16007-160070010 = "先生、こんにちは"
16007-160070020 = "もしよろしければ今日の午後、少々お時間を頂けませんでしょうか？"
16007-160070030 = "うん、良いよ。何かあったの？"
16007-160070040 = "実は事務局の備品補充のため、シャーレ付近にある商店街へ向かう予定なのですが……"
16007-160070050 = "お恥ずかしながら学園を離れるのは久しぶりということもあり、特にシャーレ周辺の地理には疎く……"
16007-160070060 = "先生のご都合さえよろしければ、ご同行をお願いできればと"
16007-160070070 = "なるほど、任せて"
16007-160070080 = "ふふっ、ありがとうございます"
16007-160070090 = "では、商店街の前でお待ちしておりますね"
16007-160070100 = "先生、遅い時間に失礼いたします"
16007-160070110 = "実は当学園に関わる、シャーレの当番についての報告書がまだ届いておらず……"
16007-160070120 = "本日が期限だったのですが、大丈夫そうでしょうか？"
16007-160070130 = "ごめん、完全に忘れてた……！"
16007-160070140 = "明日までに絶対用意する！"
16007-160070150 = "あ、いえいえ。そんなに急がなくても大丈夫ですよ"
16007-160070160 = "レッドウィンターに関することでしたら、私が大抵「何とか」できますので"
16007-160070170 = "ありがたいんだけど、何か怖い……"
16007-160070180 = "この頃レッドウィンターのあちこちで、チェリノ会長を貶めるような宣伝物が見られるようになりました"
16007-160070190 = "どうやら、定期演説の巡回に出る時が来たようですね"
16007-160070200 = "定期演説……？"
16007-160070210 = "よろしければ、先生も聞かれますか？"
16007-160070220 = "レッドウィンター連邦学園におけるあちこちの自治区を巡回し、演説を通じてチェリノ会長の偉大さをあらためて伝えるというイベントなんです"
16007-160070230 = "ご存じの通り自治区がかなり広いせいで、全域に行こうとするとかなり時間はかかるのですが……"
16007-160070240 = "いかがです？参加されませんか？"
16007-160070250 = "どうしよっかな……"
16007-160070260 = "……いえ、聞き方を変えましょう。ぜひ来てください"
16007-160070270 = "先生にお聞かせしたい会長のエピソードは、まだまだ山ほど残っていますので！"
16007-160070280 = "なるほど、強制参加だこれ！"
16007-160070290 = "先生、今はお忙しいでしょうか？"
16007-160070300 = "突然のお願いで恐縮ですが、手伝っていただきたいことがあり……"
16007-160070310 = "うん、大丈夫だよ"
16007-160070320 = "任せて、どんな内容？"
16007-160070330 = "実は、チェリノ会長に関することで少々悩んでおりまして……"
16007-160070340 = "このままでは、粛清されてしまう可能性も……"
16007-160070350 = "何だか嫌な気配が……"
16007-160070360 = "ここまで聞いておいて、逃げるのは無しですよ！"
16007-160070370 = "もし私が粛清されることになったら、必ずや先生も道連れにしますからね！"
16007-160070380 = "覚悟が怖すぎる！"
16007-160070390 = "急なのですが、先生はどんな映画がお好きですか？"
16007-160070400 = "インディーズ映画とかかな"
16007-160070410 = "ブロックバスター！"
16007-160070420 = "なるほど。最初は意外に思いましたが、よく考えると先生らしい好みですね"
16007-160070430 = "トモエは？どんな映画が一番好き？"
16007-160070440 = "私の一番好きな映画、ですか？"
16007-160070450 = "私は……"
16007-160070460 = "『偉大なる髭の日常』、でしょうか"
16007-160070470 = "初めて聞いたタイトルかも"
16007-160070480 = "はい、それはそうかと"
16007-160070490 = "『偉大なる髭の日常』とはチェリノ会長の趣味嗜好や日頃の習慣を描いた……"
16007-160070500 = "今から私が撮る予定の、ドキュメンタリー映画ですので！"
16007-160070510 = "ということで、先生。共に会長の日常を記録するとしましょう！"
16007-160070520 = "あ、今回も強制参加だ！？"
