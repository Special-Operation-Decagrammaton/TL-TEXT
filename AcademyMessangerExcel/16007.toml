[translation]
16007-160070010 = "Sensei, olá."
16007-160070020 = "Se não for incômodo, poderia me conceder um pouco do seu tempo hoje à tarde?"
16007-160070030 = "Sim, claro. Aconteceu alguma coisa?"
16007-160070040 = "Na verdade, preciso ir ao centro comercial perto do Schale para repor os suprimentos do escritório, e..."
16007-160070050 = "É um pouco vergonhoso admitir, mas faz tempo que não saio da academia, então não conheço muito bem a geografia ao redor do Schale..."
16007-160070060 = "Se for conveniente para o senhor, gostaria de pedir que me acompanhasse."
16007-160070070 = "Entendo, pode deixar comigo."
16007-160070080 = "Fufu, muito obrigada."
16007-160070090 = "Então, estarei esperando na frente do centro comercial."
16007-160070100 = "Sensei, desculpe pelo horário tardio."
16007-160070110 = "Na verdade, o relatório sobre o plantão do Schale, que envolve nossa academia, ainda não chegou..."
16007-160070120 = "O prazo era hoje, será que está tudo bem?"
16007-160070130 = "Desculpe, eu esqueci completamente...!"
16007-160070140 = "Vou preparar isso até amanhã, com certeza!"
16007-160070150 = "Ah, não, não. Não precisa se apressar tanto."
16007-160070160 = "Se for algo relacionado a Red Winter, eu geralmente consigo dar um jeito."
16007-160070170 = "Agradeço, mas isso soa um pouco assustador..."
16007-160070180 = "Ultimamente, por toda Red Winter, começaram a aparecer materiais de propaganda que difamam a Presidente Cherino."
16007-160070190 = "Parece que chegou a hora de realizar a patrulha de discursos regulares."
16007-160070200 = "Discursos regulares...?"
16007-160070210 = "Se quiser, o senhor gostaria de ouvir também?"
16007-160070220 = "É um evento onde percorremos os vários distritos da Academia Federal de Red Winter para transmitir, através de discursos, a grandeza da Presidente Cherino."
16007-160070230 = "Como o senhor sabe, os distritos são bem extensos, então leva bastante tempo para visitar toda a área, mas..."
16007-160070240 = "O que acha? Não gostaria de participar?"
16007-160070250 = "Não sei bem..."
16007-160070260 = "...Não, vou mudar a forma de perguntar. Por favor, venha."
16007-160070270 = "Ainda restam muitas histórias sobre a Presidente que eu quero que o senhor ouça!"
16007-160070280 = "Entendi, isso é participação obrigatória!"
16007-160070290 = "Sensei, o senhor está ocupado agora?"
16007-160070300 = "Sinto muito pelo pedido repentino, mas tem algo em que preciso da sua ajuda..."
16007-160070310 = "Sim, tudo bem."
16007-160070320 = "Pode deixar, do que se trata?"
16007-160070330 = "Na verdade, estou um pouco preocupada com algo relacionado à Presidente Cherino..."
16007-160070340 = "Se continuar assim, existe a possibilidade de eu ser expurgada..."
16007-160070350 = "Sinto um pressentimento ruim..."
16007-160070360 = "Depois de ouvir até aqui, não pense em fugir!"
16007-160070370 = "Se eu for expurgada, com certeza levarei o senhor comigo!"
16007-160070380 = "Essa determinação é assustadora demais!"
16007-160070390 = "É repentino, mas que tipo de filme o senhor gosta?"
16007-160070400 = "Talvez filmes independentes."
16007-160070410 = "Blockbusters!"
16007-160070420 = "Entendo. Achei surpreendente no início, mas pensando bem, é um gosto que combina com o senhor."
16007-160070430 = "E você, Tomoe? Qual filme você mais gosta?"
16007-160070440 = "O filme que eu mais gosto, pergunta?"
16007-160070450 = "Eu..."
16007-160070460 = "Seria 'O Cotidiano do Grande Bigode', talvez."
16007-160070470 = "Talvez seja a primeira vez que ouço esse título."
16007-160070480 = "Sim, imagino que sim."
16007-160070490 = "'O Cotidiano do Grande Bigode' retrata os gostos, preferências e hábitos diários da Presidente Cherino..."
16007-160070500 = "É um documentário que pretendo filmar a partir de agora!"
16007-160070510 = "Sendo assim, Sensei. Vamos registrar o cotidiano da Presidente juntos!"
16007-160070520 = "Ah, dessa vez também é participação obrigatória!?"
