[translation]
26002-1972 = "先生は、料理で一番重要な調味料って何だと思いますか？"
26002-1973 = "砂糖？"
26002-1974 = "塩？"
26002-1975 = "そうですね、それらも勿論大切なのですが……"
26002-1976 = "ですが……？"
26002-1977 = "本当に大事な調味料……"
26002-1978 = "それは、砂糖や塩など、そういった普通のものではありません"
26002-1979 = "正解は……"
26002-1980 = "愛情です！"
26002-1981 = "愛情……？"
26002-1982 = "確かに……"
26002-1983 = "でしょう？"
26002-1984 = "ただ、私ひとつ疑問があるんです"
26002-1985 = "疑問？"
26002-1986 = "料理にとって最高の調味料は愛情、それに異存はありません"
26002-1987 = "それは良いとして……"
26002-1988 = "料理に入れる愛情って、どれくらいが適量なのでしょうか？"
26002-1989 = "……適量？"
26002-1990 = "ほんの少し、隠し味程度でしょうか？"
26002-1991 = "それとも、はっきりと分かるくらいに？"
26002-1992 = "はたまたどっさり入れた方が効果的だったり……？"
26002-1993 = "私、気になって夜も眠れません！"
26002-1994 = "えっと、それは……"
26002-1995 = "その答えを探そうと思うのですが、手伝っていただけませんでしょうか？"
26002-1996 = "うん、いいけど……"
26002-1997 = "先生……また怒られてしまいました……"
26002-1998 = "ジュリが怒られたの？どうして？"
26002-1999 = "また、って……？"
26002-2000 = "料理をしていたら、爆発させてしまいまして……"
26002-2001 = "それはまあ怒られるかもね……"
26002-2002 = "何があったの……？"
26002-2003 = "えっと……"
26002-2004 = "お酢、砂糖、塩、それからマヨネーズを混ぜていたら……ボンっ！と"
26002-2005 = "何でそれが爆発するの！？"
26002-2006 = "その材料に爆発の要素あった！？"
26002-2007 = "えっ、あれっ？"
26002-2008 = "爆発って、お料理のあるあるですよね？"
26002-2009 = "あの特製ソース、絶対に美味しくなるはずだったのに勿体ないです……！"
26002-2010 = "あのソースにパンを浸けて食べるのが流行りなんですよ！"
26002-2011 = "……将来的には！"
26002-2012 = "そのあるあるは、私は知らないかな……"
26002-2013 = "そっかぁ……"
26002-2014 = "うーん、困りました……"
26002-2015 = "どこが間違っていたのでしょうか……"
26002-2016 = "こういうのって、一人ではなかなか気づけないのですよね……"
26002-2017 = "そしたら、ジュリの料理してるとこを見せてくれない？"
26002-2018 = "あっ、ありがとうございます。お願いできますか？"
26002-2019 = "先生に見ていただければ、原因が分かるかもしれません……！"
26002-2020 = "では、お願いいたします！"
26002-2021 = "先生、今日はご意見をいただきありがとうございました"
26002-2022 = "とっても助かりました"
26002-2023 = "おかげさまで今日の方法は危険だと分かりましたので、"
26002-2024 = "次はまた違った方法に挑戦してみようと思います！"
26002-2025 = "レシピ通りに作るっていうのはどうかな……？"
26002-2026 = "料理の道は無限にありますから！"
26002-2027 = "それを探求することこそ、料理の楽しみの一つだと思いますし！"
26002-2028 = "そっか、楽しいのは大事だからね。うん……"
26002-2029 = "また怒られてしまいました……"
26002-2030 = "今度は何があったの？"
26002-2031 = "今日のお昼、私が作ったサンマの塩焼きが逃げてしまいまして……"
26002-2032 = "ちょっと待って、何が逃げたって……？"
26002-2033 = "えっと、サンマの塩焼き……ですけど"
26002-2034 = "焼いたサンマが、物理的に逃げるなんてことある？"
26002-2035 = "えっと、はい……"
26002-2036 = "お恥ずかしながら……"
26002-2037 = "その……"
26002-2038 = "一週間に一度くらいの頻度で……"
26002-2039 = "恥ずかしいというかなんというか……"
26002-2040 = "結構定期的に逃げるんだね"
26002-2041 = "どうして私が料理をすると、こうやって色んなことが起きるのでしょうか"
26002-2042 = "先生、どう思いますか……？"
26002-2043 = "じゃあ、一度実験してみない？"
26002-2044 = "実験……ですか？"
26002-2045 = "ジュリが作った料理が、どうしてそうなるのか"
26002-2046 = "条件を揃えたり実験をしてみて、原因を追究する"
26002-2047 = "なるほど……"
26002-2048 = "原因さえ分かれば、問題も解決できる……"
26002-2049 = "確かにそうかもしれません！"
26002-2050 = "ありがとうございます、ぜひよろしくお願いします！"
26002-2051 = "では今日、学食までお越しいただけますか？よろしくお願いします！"
26002-260020010 = "先生、その"
26002-260020020 = "どうしたの？"
26002-260020030 = "また何か怒られちゃった……？"
26002-260020040 = "あっ、その、特に今回は何か怒られたわけではなく！"
26002-260020050 = "むしろ褒めていただきたいくらいです！"
26002-260020060 = "何せ、今日はまだ鍋が爆発してません！"
26002-260020070 = "それは、良かったね……？"
26002-260020080 = "はい、私も日々成長してますので！"
26002-260020090 = "あ、それでご用件なのですが"
26002-260020100 = "よろしければ、その"
26002-260020110 = "今週末に、お時間をいただけませんか？"
26002-260020120 = "ちょうどその日は給食部の用事で学校に行くのですが"
26002-260020130 = "できれば先生に見せたいものがありまして"
26002-260020140 = "うん、了解"
26002-260020150 = "ありがとうございます！"
26002-260020160 = "では、学食でお待ちしておりますね！"
26002-260020170 = "今日はご迷惑をおかけしてすみません……"
26002-260020180 = "ううん、気にしないで。体調は平気？陽射しのせいかな？"
26002-260020190 = "身体は全然大丈夫です！"
26002-260020200 = "恐らくですがその、聞いたところによると、もしかしたら……"
26002-260020210 = "？"
26002-260020220 = "いえ、やはり何でもありません！お気になさらず……！"
26002-260020230 = "ま、また今度ぜひお手伝いいただけますと嬉しいです！"
26002-260020240 = "その時はえっと、陽射しがあまり強くない日の方が、条件的に……"
26002-260020250 = "と、とにかく、引き続きお願いしますね！"
