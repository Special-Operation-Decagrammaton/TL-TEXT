[translation]
26002-1972 = "Sensei, qual você acha que é o tempero mais importante na culinária?"
26002-1973 = "Açúcar?"
26002-1974 = "Sal?"
26002-1975 = "Bem, esses também são importantes, é claro, mas..."
26002-1976 = "Mas...?"
26002-1977 = "O tempero realmente importante..."
26002-1978 = "Não é algo comum como açúcar ou sal."
26002-1979 = "A resposta correta é..."
26002-1980 = "Amor!"
26002-1981 = "Amor...?"
26002-1982 = "Faz sentido..."
26002-1983 = "Não acha?"
26002-1984 = "Só que eu tenho uma dúvida."
26002-1985 = "Uma dúvida?"
26002-1986 = "Concordo que o melhor tempero para a culinária é o amor."
26002-1987 = "Deixando isso de lado..."
26002-1988 = "Qual seria a quantidade ideal de amor para colocar na comida?"
26002-1989 = "...Quantidade ideal?"
26002-1990 = "Seria apenas um pouco, como um ingrediente secreto?"
26002-1991 = "Ou algo que se possa notar claramente?"
26002-1992 = "Ou será que colocar um monte é mais eficaz...?"
26002-1993 = "Isso está me deixando sem dormir!"
26002-1994 = "Bem, isso é..."
26002-1995 = "Eu gostaria de encontrar essa resposta, você poderia me ajudar?"
26002-1996 = "Sim, tudo bem, mas..."
26002-1997 = "Sensei... levei uma bronca de novo..."
26002-1998 = "A Juri levou uma bronca? Por quê?"
26002-1999 = "Como assim, 'de novo'...?"
26002-2000 = "Eu estava cozinhando e acabou explodindo..."
26002-2001 = "Bom, é compreensível que tenham te dado uma bronca..."
26002-2002 = "O que aconteceu...?"
26002-2003 = "Bem..."
26002-2004 = "Eu estava misturando vinagre, açúcar, sal e maionese, e então... bum!"
26002-2005 = "Por que isso explodiria!?"
26002-2006 = "Algum desses ingredientes tem propriedades explosivas!?"
26002-2007 = "Ah, é mesmo?"
26002-2008 = "Explosões não são algo comum na culinária?"
26002-2009 = "Aquele molho especial deveria ter ficado delicioso, que desperdício...!"
26002-2010 = "É tendência comer pão mergulhado naquele molho!"
26002-2011 = "...No futuro!"
26002-2012 = "Acho que não conheço essa 'coisa comum'..."
26002-2013 = "Entendo..."
26002-2014 = "Hum, que problema..."
26002-2015 = "Onde será que eu errei..."
26002-2016 = "É difícil perceber essas coisas sozinha, não é..."
26002-2017 = "Então, você não quer me mostrar enquanto cozinha?"
26002-2018 = "Ah, muito obrigada. Você poderia fazer isso?"
26002-2019 = "Se o Sensei observar, talvez descubra a causa...!"
26002-2020 = "Então, por favor!"
26002-2021 = "Sensei, obrigada por suas opiniões hoje."
26002-2022 = "Isso me ajudou muito."
26002-2023 = "Graças a você, entendi que o método de hoje era perigoso, então,"
26002-2024 = "vou tentar um método diferente na próxima vez!"
26002-2025 = "Que tal seguir a receita...?"
26002-2026 = "O caminho da culinária é infinito!"
26002-2027 = "Acho que explorar isso é uma das alegrias de cozinhar!"
26002-2028 = "Entendi, se divertir é importante, né. É..."
26002-2029 = "Levei uma bronca de novo..."
26002-2030 = "O que aconteceu dessa vez?"
26002-2031 = "No almoço de hoje, o saury grelhado que eu fiz fugiu..."
26002-2032 = "Espera um pouco, o que fugiu...?"
26002-2033 = "Bem, o saury grelhado... é isso."
26002-2034 = "Um peixe grelhado fugir fisicamente, isso é possível?"
26002-2035 = "Bem, sim..."
26002-2036 = "É um pouco vergonhoso, mas..."
26002-2037 = "Sabe..."
26002-2038 = "Mais ou menos uma vez por semana..."
26002-2039 = "Não sei se é vergonhoso ou o quê..."
26002-2040 = "Então ele foge com bastante frequência."
26002-2041 = "Por que será que, quando eu cozinho, tantas coisas assim acontecem?"
26002-2042 = "Sensei, o que você acha...?"
26002-2043 = "Então, por que não fazemos um experimento?"
26002-2044 = "Um experimento...?"
26002-2045 = "Para entender por que a comida que a Juri faz acaba assim."
26002-2046 = "Vamos definir as condições e fazer experimentos para investigar a causa."
26002-2047 = "Entendo..."
26002-2048 = "Se descobrirmos a causa, poderemos resolver o problema..."
26002-2049 = "Pode ser verdade!"
26002-2050 = "Muito obrigada, por favor, conto com você!"
26002-2051 = "Então, você poderia vir ao refeitório hoje? Por favor!"
26002-260020010 = "Sensei, é que..."
26002-260020020 = "O que foi?"
26002-260020030 = "Levou bronca de novo...?"
26002-260020040 = "Ah, não, não é que eu tenha levado bronca desta vez!"
26002-260020050 = "Na verdade, eu gostaria que você me elogiasse!"
26002-260020060 = "Afinal, hoje a panela ainda não explodiu!"
26002-260020070 = "Isso é bom, né...?"
26002-260020080 = "Sim, eu também estou crescendo a cada dia!"
26002-260020090 = "Ah, e sobre o motivo de eu ter te chamado..."
26002-260020100 = "Se não for incômodo, sabe..."
26002-260020110 = "Você poderia me dar um pouco do seu tempo neste fim de semana?"
26002-260020120 = "Vou à escola para tratar de assuntos do Clube de Merenda nesse dia,"
26002-260020130 = "e, se possível, tem algo que eu gostaria de mostrar ao Sensei."
26002-260020140 = "Sim, combinado."
26002-260020150 = "Muito obrigada!"
26002-260020160 = "Então, estarei te esperando no refeitório!"
26002-260020170 = "Sinto muito por ter causado problemas hoje..."
26002-260020180 = "Não, não se preocupe. Você está se sentindo bem? É por causa do sol?"
26002-260020190 = "Estou me sentindo muito bem!"
26002-260020200 = "Provavelmente, bem, pelo que ouvi, talvez..."
26002-260020210 = "？"
26002-260020220 = "Não, na verdade, não é nada! Por favor, não se preocupe...!"
26002-260020230 = "B-bem, ficarei feliz se puder me ajudar novamente na próxima vez!"
26002-260020240 = "Nessa ocasião, bem, seria melhor em um dia em que o sol não esteja tão forte, devido às condições..."
26002-260020250 = "E-enfim, continue contando comigo, certo!"
