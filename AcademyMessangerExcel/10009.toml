[translation]
10009-700 = "先生！"
10009-701 = "昨日私、すごい本を読んだの！"
10009-702 = "すごい本？"
10009-703 = "うん！アスリートの人の自伝だったんだけど……"
10009-704 = "そこに、食べ物がすっごく美味しくなる方法が書いてあったの！"
10009-705 = "すっごく美味しくなる方法？"
10009-706 = "なんでアスリートの自伝にそんなことが……？"
10009-707 = "これは美食研究会のメンバーとして、試さずにはいられないわね"
10009-708 = "善は急げだよ、先生！"
10009-709 = "先生！先生！"
10009-710 = "今日から中央広場で、屋台がいっぱい出店するフェスが開かれるの！"
10009-711 = "そうなんだ。イズミ、すごく楽しそうだね"
10009-712 = "うん！私、ずっとこの日を待ってたの！"
10009-713 = "今日は特に、プリンですごく有名なあのお店が参加するし……！"
10009-714 = "あれは絶対に食べないと！"
10009-715 = "先生！ゲヘナの商店街に新しいラーメン屋ができたんだって！"
10009-716 = "一緒に行こう！"
10009-717 = "下見と、偵察に！"
10009-718 = "それ、どっちも同じ意味じゃない？"
10009-719 = "あれっ、そうなの？"
10009-100090010 = "ねえ、先生！"
10009-100090020 = "先生に食べてほしいものが……"
10009-100090030 = "ううん、見せたいものがあるの！"
10009-100090040 = "見せたいもの？"
10009-100090050 = "うん！"
10009-100090060 = "だからね先生、ちょっと来てくれる？"
10009-100090070 = "分かった。行くね"
10009-100090080 = "やったー！"
10009-100090090 = "それじゃ、待ってるね！"
