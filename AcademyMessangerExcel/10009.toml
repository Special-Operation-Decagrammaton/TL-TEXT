[translation]
10009-700 = "Sensei!"
10009-701 = "Ontem eu li um livro incrível!"
10009-702 = "Um livro incrível?"
10009-703 = "Sim! Era a autobiografia de um atleta e..."
10009-704 = "Nele, estava escrito um método para deixar a comida superdeliciosa!"
10009-705 = "Um método para deixar a comida superdeliciosa?"
10009-706 = "Por que teria algo assim na autobiografia de um atleta...?"
10009-707 = "Como membro do Clube de Pesquisa Gourmet, não posso deixar de experimentar."
10009-708 = "Não há tempo a perder, Sensei!"
10009-709 = "Sensei! Sensei!"
10009-710 = "A partir de hoje, vai ter um festival na Praça Central com um monte de barracas de comida!"
10009-711 = "É mesmo? Você parece bem animada, Izumi."
10009-712 = "Sim! Eu esperei por este dia por muito tempo!"
10009-713 = "E hoje, especialmente, aquela loja super famosa por seus pudins vai participar...!"
10009-714 = "Eu com certeza tenho que experimentar!"
10009-715 = "Sensei! Fiquei sabendo que abriram uma nova loja de lámen no distrito comercial de Gehenna!"
10009-716 = "Vamos juntos!"
10009-717 = "Para uma inspeção e um reconhecimento!"
10009-718 = "Isso não quer dizer a mesma coisa?"
10009-719 = "Ah, é mesmo?"
10009-100090010 = "Ei, Sensei!"
10009-100090020 = "Tem uma coisa que eu quero que você experimente..."
10009-100090030 = "Não, tem uma coisa que eu quero te mostrar!"
10009-100090040 = "Algo para me mostrar?"
10009-100090050 = "Sim!"
10009-100090060 = "Então, Sensei, você pode vir aqui um pouquinho?"
10009-100090070 = "Entendi. Estou indo."
10009-100090080 = "Eba!"
10009-100090090 = "Então, estarei te esperando!"
