[translation]
10078-100780010 = "Hmm!"
10078-100780020 = "Hmmmm!!"
10078-100780030 = "Hmmmmmmmm~!!"
10078-100780040 = "…Kasumi?"
10078-100780050 = "O que foi?"
10078-100780060 = "Oh, Sensei!"
10078-100780070 = "Eu sabia que você responderia logo!"
10078-100780080 = "É que tem uma coisa me preocupando um pouco!"
10078-100780090 = "E não é algo que possa ser resolvido facilmente..."
10078-100780100 = "Sensei, se não for incômodo, poderia me ajudar?"
10078-100780110 = "Sensei!"
10078-100780120 = "Tenho uma notícia muito lamentável."
10078-100780130 = "O Comitê de Disciplina estava patrulhando bem na hora errada."
10078-100780140 = "Metade conseguiu escapar, mas... a outra metade foi pega."
10078-100780150 = "Ah! Que pena! E a gente já estava na parte de plantar os explosivos!"
10078-100780160 = "E-Entendi. Que pena, né?"
10078-100780170 = "Ha ha ha ha ha!!"
10078-100780180 = "Não se preocupe!"
10078-100780190 = "Isso acontece o tempo todo."
10078-100780200 = "Na verdade, se não fosse assim, não teria graça!"
10078-100780210 = "Então!"
10078-100780220 = "Nos vemos de novo, Sensei!"
10078-100780230 = "Sensei~?"
10078-100780240 = "Você tem um tempinho agora?"
10078-100780250 = "É que eu tive uma ideia incrível."
10078-100780260 = "Agora! Exatamente agora!"
10078-100780270 = "Não me diga que é outro plano de explosão...?"
10078-100780280 = "Por acaso é uma reunião?"
10078-100780290 = "Como esperado do Sensei, estamos em perfeita sintonia, não?"
10078-100780300 = "Exatamente!"
10078-100780310 = "Mas..."
10078-100780320 = "Hoje vai ser diferente da última vez, viu?"
10078-100780330 = "...Que vontade indomável."
10078-100780340 = "Você não desiste, né?"
10078-100780350 = "Ha ha ha ha ha!!"
10078-100780360 = "Não vai ganhar nada me elogiando assim!"
10078-100780370 = "Vamos, vamos, venha logo! Vou te mandar a localização!"
10078-100780380 = "Sensei!"
10078-100780390 = "Me chamar aqui e acabar dormindo antes..."
10078-100780400 = "Foi mal, peço desculpas."
10078-100780410 = "Tudo bem, não se preocupe."
10078-100780420 = "O que achou do local?"
10078-100780430 = "Pensando bem, este é realmente o local perfeito!"
10078-100780440 = "Bo~~~a!"
10078-100780450 = "Preciso reunir todo mundo imediatamente!!"
10078-100780460 = "Por hoje é só! Até mais!"
10078-100780470 = "Hmm."
10078-100780480 = "Sensei, se tiver um tempo,"
10078-100780490 = "poderia procurar um lugar para eu estudar?"
10078-100780500 = "É por vários motivos."
10078-100780510 = "É meio difícil ir a cafés ou bibliotecas."
10078-100780520 = "Estudar...?"
10078-100780530 = "Não é a 'reunião' de sempre?"
10078-100780540 = "Ah, isso mesmo."
10078-100780550 = "Hoje não é uma 'reunião'!"
10078-100780560 = "Mas"
10078-100780570 = "Uma aluna está dizendo que quer 'estudar', você vai me ajudar, não vai?"
10078-100780580 = "Afinal, você é Sensei!"
10078-100780590 = "Foi um tempo bem aproveitado. Até mais, Sensei."
10078-100780600 = "Eu também me diverti."
10078-100780610 = "Então é assim que você sempre cava fontes termais, né?"
10078-100780620 = "Hmm?"
10078-100780630 = "Ah."
10078-100780640 = "Pelas minhas palavras e ações até agora, imagino que pareça isso mesmo."
10078-100780650 = "Bem..."
10078-100780660 = "Se eu finjo que não estou pensando em nada, fica mais fácil de agir."
10078-100780670 = "As pessoas tendem a se abrir mais quando não acham que você tem segundas intenções."
10078-100780680 = "É só por isso que eu faço isso, mas..."
10078-100780690 = "É verdade..."
10078-100780700 = "Este é um segredo só nosso, Sensei, ok?"
10078-100780710 = "Mmm, que problema."
10078-100780720 = "Não tenho escolha a não ser pedir ajuda."
10078-100780730 = "Sensei! Desculpe, mas você tem um tempo agora?"
10078-100780740 = "Tenho, sim... Aconteceu alguma coisa?"
10078-100780750 = "Você precisa de ajuda?"
10078-100780760 = "Sim."
10078-100780770 = "Não é nada demais."
10078-100780780 = "É que minha sandália quebrou."
10078-100780790 = "E também torci um pouco o pé, então não consigo andar."
10078-100780800 = "O quê!?"
10078-100780810 = "Onde você está!?"
10078-100780820 = "Não precisa ter tanta pressa."
10078-100780830 = "Vou te mandar a localização por enquanto."
10078-100780840 = "Uhm, este lugar é..."
10078-100780850 = "Sensei!"
10078-100780860 = "Pensando bem, nos separamos antes sem que eu pudesse te agradecer."
10078-100780870 = "Mais uma vez, muito obrigada pela ajuda. Agradeço de verdade!!"
10078-100780880 = "Vou usar com carinho as sandálias que você me deu, pensando que são você!"
10078-100780890 = "Eh?"
10078-100780900 = "Isso não quer dizer que você vai pisar em mim?"
10078-100780910 = "Ha ha ha ha ha!!"
10078-100780920 = "Bem, é uma questão de perspectiva..."
10078-100780930 = "Significa que estaremos juntos onde quer que eu vá!"
10078-100780940 = "Então, até a próxima, Sensei!!"
