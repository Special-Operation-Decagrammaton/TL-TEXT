[translation]
10052-100520010 = "こんにちは、先生"
10052-100520020 = "この度、シャーレ当番を務めることになりました、生塩ノアです"
10052-100520030 = "当番初回のため、ご挨拶させていただきます"
10052-100520040 = "こちらこそ、よろしくね！"
10052-100520050 = "シャーレのお当番は初めてなので……"
10052-100520060 = "何か事前に用意するものなど、ありますでしょうか？"
10052-100520070 = "特にないよ"
10052-100520080 = "遊びにくるくらいの気持ちで、気楽においで"
10052-100520090 = "遊びに……"
10052-100520100 = "分かりました"
10052-100520110 = "それでは、当日はよろしくお願いします"
10052-100520120 = "先生、昨日の当番の際に……"
10052-100520130 = "おろしたての靴を履いてませんでしたか？"
10052-100520140 = "どうして分かったの？"
10052-100520150 = "前のと同じブランド、同じ製品だったのに……"
10052-100520160 = "ふふ、やはりそうでしたか"
10052-100520170 = "つま先の部分に、いつもあった傷跡が無かったので"
10052-100520180 = "ずいぶん古い靴でしたし、既製品ですから修理に出すよりは\n新品を購入するのは良い選択だと思います"
10052-100520190 = "なんか探偵みたいだね"
10052-100520200 = "たしかに……"
10052-100520210 = "言われてみれば、探偵と書記の活動は似てる部分があるかもしれません"
10052-100520220 = "私も当番中は、犯人を観察する探偵のように、先生をしっかり見ておりますからね"
10052-100520230 = "怖い……！"
10052-100520240 = "ミレニアム生の作った発明品を見ていると、驚くことが多いです"
10052-100520250 = "私には思いもつかないような、斬新な技術やアイディアを提示してくれるんですよね"
10052-100520260 = "その都度、自分はミレニアムの価値に貢献できているのだろうかと自省します"
10052-100520270 = "ノアは、十分頑張ってると思うけど"
10052-100520280 = "残酷な話ですが、頑張ってる事と優れている事は違いますから"
10052-100520290 = "他の天才のような閃きや創造力、器用な職人技も私にはありません"
10052-100520300 = "比較的、取り柄と言えるものは……"
10052-100520310 = "……機械の製作に必要な青図を、丸ごと覚えられること……ぐらいでしょうか"
10052-100520320 = "それも十分すごいスキルだよ……"
10052-100520330 = "先生、悪いお知らせです"
10052-100520340 = "先日お伝えしました「先生の行動パターンを収集し、現在の位置を予測する装置」の特許申請が……"
10052-100520350 = "無念にも、連邦生徒会の異議により差し戻しになったそうです"
10052-100520360 = "当たり前だよ！"
10052-100520370 = "そんな特許、許可が下りたらダメだよ"
10052-100520380 = "ですが特許というものは、目的を変更し同じものを再度出願することも可能です。"
10052-100520390 = "様式を変えながら繰り返し特許を申請し続ければ……"
10052-100520400 = "いつかは本当に、特許登録できるかも……？"
10052-100520410 = "お願いだからもうやめて……！"
10052-100520420 = "先生、今日の午後に予定していた定期面談が見送りになりました"
10052-100520430 = "モノレール点検中、突然のにわか雨でレールの一部が損傷してしまったようで……"
10052-100520440 = "そのため、一部メンバーたちが学園に足止めをされているとのことです"
10052-100520450 = "無駄足になっては申し訳ないので、事前連絡とさせていただきました"
