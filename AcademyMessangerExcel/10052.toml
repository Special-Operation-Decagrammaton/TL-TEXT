[translation]
10052-100520010 = "Olá, Sensei."
10052-100520020 = "Eu sou a Ushio Noah, e fui designada para o serviço da Schale desta vez."
10052-100520030 = "Como é a minha primeira vez no serviço, gostaria de me apresentar."
10052-100520040 = "O prazer é meu, conto com você!"
10052-100520050 = "É a minha primeira vez no serviço da Schale, então..."
10052-100520060 = "Há algo que eu precise preparar com antecedência?"
10052-100520070 = "Não precisa de nada em especial."
10052-100520080 = "Venha com o espírito de quem está vindo para passear, sem se preocupar."
10052-100520090 = "Para passear..."
10052-100520100 = "Entendido."
10052-100520110 = "Então, conto com você no dia."
10052-100520120 = "Sensei, durante o seu serviço de ontem..."
10052-100520130 = "Você não estava usando sapatos novos?"
10052-100520140 = "Como você soube?"
10052-100520150 = "Eram da mesma marca e do mesmo modelo que os anteriores..."
10052-100520160 = "Fufu, então era isso mesmo."
10052-100520170 = "É que não havia aquele arranhão que sempre estava na ponta do sapato."
10052-100520180 = "Eram sapatos bem velhos e, como são de fabricação em massa, acho que comprar um par novo foi uma escolha melhor do que mandá-los para o conserto."
10052-100520190 = "Você parece uma detetive."
10052-100520200 = "É verdade..."
10052-100520210 = "Agora que você mencionou, talvez as atividades de uma detetive e de uma secretária tenham algumas semelhanças."
10052-100520220 = "Afinal, durante o meu serviço, eu também observo o Sensei atentamente, como uma detetive observando um suspeito."
10052-100520230 = "Que medo...!"
10052-100520240 = "Fico surpresa muitas vezes quando vejo as invenções criadas pelas alunas da Millennium."
10052-100520250 = "Elas apresentam tecnologias e ideias inovadoras que eu jamais conseguiria imaginar."
10052-100520260 = "Toda vez, eu reflito se estou realmente contribuindo para o valor da Millennium."
10052-100520270 = "Mas eu acho que você já se esforça o suficiente, Noah."
10052-100520280 = "É uma verdade cruel, mas se esforçar e ser excelente são coisas diferentes."
10052-100520290 = "Eu não tenho a inspiração, a criatividade ou a habilidade artesanal de outros gênios."
10052-100520300 = "Algo que eu poderia considerar um ponto forte, relativamente falando..."
10052-100520310 = "...seria a capacidade de memorizar por completo as plantas necessárias para a fabricação de uma máquina... talvez."
10052-100520320 = "Isso já é uma habilidade incrível..."
10052-100520330 = "Sensei, tenho más notícias."
10052-100520340 = "O pedido de patente para o \"dispositivo que coleta os padrões de comportamento do Sensei e prevê sua localização atual\", que mencionei outro dia..."
10052-100520350 = "...infelizmente, parece que foi rejeitado devido a uma objeção do Conselho Geral de Estudantes."
10052-100520360 = "Mas é claro!"
10052-100520370 = "Uma patente dessas não pode ser aprovada!"
10052-100520380 = "No entanto, com patentes, é possível mudar o propósito e reaplicar com o mesmo item."
10052-100520390 = "Se continuarmos aplicando repetidamente, mudando o formato..."
10052-100520400 = "Talvez um dia a patente seja realmente registrada...?"
10052-100520410 = "Por favor, pare com isso...!"
10052-100520420 = "Sensei, a reunião periódica agendada para a tarde de hoje foi adiada."
10052-100520430 = "Parece que, durante a inspeção do monotrilho, uma chuva repentina danificou parte dos trilhos..."
10052-100520440 = "Por causa disso, alguns membros ficaram presos na academia."
10052-100520450 = "Estou avisando com antecedência para que você não perca a viagem."
