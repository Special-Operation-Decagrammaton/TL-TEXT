[translation]
10081-100810010 = "先生！ごきげんようですの！"
10081-100810020 = "おはよう、今日も元気だね"
10081-100810030 = "ええ！心身共に健康であることが身共の誇れるところですの。ふふん！"
10081-100810040 = "ですが最近は……先生の前でしか、このようにはしゃぐことはできなくなってきて……"
10081-100810050 = "何かあったの？"
10081-100810060 = "その……家の言いつけが厳しくなりまして……"
10081-100810070 = "勘解由小路家の者として相応しい教養や勉学の指導を受ける日々で……"
10081-100810080 = "こうも毎日毎日、勉強ばかりでは…… "
10081-100810090 = "将来は左手で算盤を弾き、右手で電卓を叩く計算の鬼になってしまいますの！"
10081-100810100 = "そんな鬼、聞いたことないよ！？"
10081-100810110 = "たまには一息つくのも大事だよ"
10081-100810120 = "一息、つく？"
10081-100810130 = "休める場所で一息を、つく……なるほど、ふむ"
10081-100810140 = "身共、理解しました！"
10081-100810150 = "それでは早速、先生のお言葉に甘えて……今からお邪魔しますの！"
10081-100810160 = "え？今から……？"
10081-100810170 = "ええ、今から！"
10081-100810180 = "先日、食後のでざーとを食べていたら……"
10081-100810190 = "すごいことを思いつきましたの！"
10081-100810200 = "何を思いついたの？"
10081-100810210 = "和菓子やもんぶらん、ぷりんなどなど……"
10081-100810220 = "でざーとは甘いものばかりですが！"
10081-100810230 = "よく考えてみたら……"
10081-100810240 = "しょっぱい系もいけると思いまして！"
10081-100810250 = "そこで、しょっぱい味のでざーとを作れば、皆様も飽きずに楽しめるのではないかと……！"
10081-100810260 = "実は……しょっぱい味のお菓子もあるんだ"
10081-100810270 = "……え？"
10081-100810280 = "先生、急なご連絡で申し訳ありませんが……"
10081-100810290 = "今日もまた！"
10081-100810300 = "先生に新しいことを教えていただきたいのです！"
10081-100810310 = "もちろん！それじゃあ、シャーレで待ってるね"
10081-100810320 = "はい！すぐに向かいますの！"
10081-100810330 = "先生、びっぐにゅーすですの！"
10081-100810340 = "今日、百鬼夜行第七商店街で「抽選会」が行われると聞きまして！"
10081-100810350 = "商店街でよくやってるやつだね"
10081-100810360 = "商品の中には、おでゅっせいあ海洋高等学校のりぞーとに行ける招待券もあるみたいですのよ"
10081-100810370 = "そんなに豪華な景品もあるんだ"
10081-100810380 = "ええ！"
10081-100810390 = "それで、その……"
10081-100810400 = "うん、一緒に行こうか"
10081-100810410 = "はい！いつもの場所でお待ちしておりますの！"
