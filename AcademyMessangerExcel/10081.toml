[translation]
10081-100810010 = "Sensei! Como vai!"
10081-100810020 = "Bom dia, você está bem animada hoje."
10081-100810030 = "Sim! Ter corpo e mente sãos é algo de que me orgulho. Hmph!"
10081-100810040 = "Mas, ultimamente... só consigo me animar assim na sua frente, Sensei..."
10081-100810050 = "Aconteceu alguma coisa?"
10081-100810060 = "É que... as ordens da minha família ficaram mais rígidas..."
10081-100810070 = "Como membro da família Kadenokouji, passo meus dias recebendo instruções sobre a educação e os estudos apropriados..."
10081-100810080 = "Se eu continuar só estudando, todo santo dia..."
10081-100810090 = "No futuro, vou me tornar um demônio dos cálculos, usando um ábaco com a mão esquerda e uma calculadora com a direita!"
10081-100810100 = "Nunca ouvi falar de um demônio desses!?"
10081-100810110 = "É importante fazer uma pausa de vez em quando."
10081-100810120 = "Uma pausa?"
10081-100810130 = "Fazer uma pausa em um lugar onde se pode descansar... Entendo, hmm."
10081-100810140 = "Eu entendi!"
10081-100810150 = "Então, sem mais delongas, vou aceitar suas palavras... Estou indo aí agora mesmo!"
10081-100810160 = "Hã? Agora...?"
10081-100810170 = "Sim, agora!"
10081-100810180 = "Outro dia, enquanto eu comia a sobremesa..."
10081-100810190 = "Tive uma ideia incrível!"
10081-100810200 = "Que ideia você teve?"
10081-100810210 = "Doces japoneses, Mont Blanc, pudim e por aí vai..."
10081-100810220 = "As sobremesas são sempre doces, mas!"
10081-100810230 = "Se pararmos para pensar..."
10081-100810240 = "Acho que as salgadas também funcionariam!"
10081-100810250 = "Então, pensei que se eu fizesse sobremesas salgadas, todos poderiam aproveitar sem enjoar...!"
10081-100810260 = "Na verdade... já existem doces salgados."
10081-100810270 = "...Hã?"
10081-100810280 = "Sensei, desculpe o contato repentino, mas..."
10081-100810290 = "Hoje de novo!"
10081-100810300 = "Gostaria que você me ensinasse algo novo!"
10081-100810310 = "Claro! Então, estarei esperando No Schale."
10081-100810320 = "Sim! Estou indo para aí agora mesmo!"
10081-100810330 = "Sensei, tenho uma grande notícia!"
10081-100810340 = "Ouvi dizer que hoje haverá um sorteio no Sétimo Distrito Comercial de Hyakkiyako!"
10081-100810350 = "Ah, é o tipo de coisa que sempre fazem no distrito comercial."
10081-100810360 = "Parece que entre os prêmios há um convite para o resort da Escola Secundária Marítima Odysseus."
10081-100810370 = "Nossa, tem um prêmio tão luxuoso assim?"
10081-100810380 = "Sim!"
10081-100810390 = "Então, é que..."
10081-100810400 = "Sim, vamos juntos?"
10081-100810410 = "Sim! Estarei esperando no lugar de sempre!"
