[translation]
20008-200080010 = "Sempre agradeço pela sua atenção."
20008-200080020 = "Sou Ako Amau, oficial administrativa do Comitê de Disciplina de Gehenna."
20008-200080030 = "Entrei em contato a respeito da parceria de trabalho com o Schale."
20008-200080040 = "Ako...?"
20008-200080050 = "Enviarei os detalhes de data e local em breve, e embora eu saiba que está ocupado, ficaria grata se pudesse reservar um pouco do seu tempo."
20008-200080060 = "Conto com a sua colaboração."
20008-200080070 = "Ah, sim."
20008-200080080 = "Bom trabalho, Sensei."
20008-200080090 = "Não tem muito a ver com o assunto de hoje, mas, pelo que verifiquei, parece que houve uma queda de energia temporária ontem à noite devido a obras na rede elétrica."
20008-200080100 = "...A propósito, se não se importar, você não estaria precisando de umas 100 câmeras de segurança?"
20008-200080110 = "Não preciso."
20008-200080120 = "...Ah."
20008-200080130 = "Francamente."
20008-200080140 = "Eu realmente não aguento mais..."
20008-200080150 = "Ako?"
20008-200080160 = "Por que tudo acontece uma coisa atrás da outra...!"
20008-200080170 = "Ei, você está bem...?"
20008-200080180 = "Sensei, tenho um assunto importante."
20008-200080190 = "É urgente, então poderia vir aqui imediatamente?"
20008-200080200 = "Você não vai me dar um bolo, vai?"
20008-200080210 = "S-sim..."
20008-200080220 = "Sensei."
20008-200080230 = "Obrigada pelo seu trabalho hoje também."
20008-200080240 = "Então, até a próxima, conto com você."
20008-200080250 = "Então já está confirmado que vai ter uma próxima..."
20008-200080260 = "Sensei."
20008-200080270 = "Na verdade..."
20008-200080280 = "..."
20008-200080290 = "Ei."
20008-200080300 = "Que reação é essa!"
20008-200080310 = "Não vou comprar, viu?"
20008-200080320 = "Estou sendo tratada como uma vendedora insistente...!"
20008-200080330 = "M-mas o que é isso!"
20008-200080340 = "Isso é algum tipo de bullying novo!?"
20008-200080350 = "Francamente, até você, Sensei..."
20008-200080360 = "...?"
20008-200080370 = "Tudo bem? Aconteceu alguma coisa?"
20008-200080380 = "Bem."
20008-200080390 = "É, pois é."
20008-200080400 = "Não é nada muito grave, mas..."
20008-200080410 = "Só que..."
20008-200080420 = "?"
20008-200080430 = "...Ako?"
20008-200080440 = "Sensei, chegou bem em casa?"
20008-200080450 = "Desculpe, acabei trazendo a coleira comigo."
20008-200080460 = "Ah, entendo."
20008-200080470 = "Foi isso."
20008-200080480 = "Vou devolver amanhã."
20008-200080490 = "Sim."
20008-200080500 = "Ah."
20008-200080510 = "Não, não precisa trazer para mim."
20008-200080520 = "Por favor, fique com isso, Sensei."
20008-200080530 = "……？"
20008-200080540 = "Obrigado pelo seu trabalho duro hoje também."
20008-200080550 = "Então, nos vemos novamente."
