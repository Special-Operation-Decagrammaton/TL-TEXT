[translation]
20008-200080010 = "いつもお世話になっております。"
20008-200080020 = "ゲヘナ風紀委員会の行政官、天雨アコです。"
20008-200080030 = "この度、シャーレとの業務提携の件でご連絡いたしました。"
20008-200080040 = "アコ……？"
20008-200080050 = "後ほど日時と場所の詳細をお送りいたしますので、お忙しいところ恐縮ですが、少々お時間頂戴できますと幸いです。"
20008-200080060 = "何卒よろしくお願いいたします。"
20008-200080070 = "う、うん"
20008-200080080 = "お疲れ様です、先生"
20008-200080090 = "今日のお話とはあまり関係無いのですが、どうやら確認したところ、昨晩配電関係の工事で一時的な停電があったらしいですね"
20008-200080100 = "……ところでよろしければ、監視カメラ100台ほどご入用だったりしませんか？"
20008-200080110 = "いらない"
20008-200080120 = "……はぁ"
20008-200080130 = "全くもう"
20008-200080140 = "本当にやってられませんね……"
20008-200080150 = "アコ？"
20008-200080160 = "どうしてこう次から次へと……！"
20008-200080170 = "えっと、大丈夫……？"
20008-200080180 = "先生、大切な用事が一つ"
20008-200080190 = "それも急ぎの用なので、すぐに来ていただけませんか？"
20008-200080200 = "まさかすっぽかしたりしませんよね？"
20008-200080210 = "は、はい……"
20008-200080220 = "先生"
20008-200080230 = "本日もお疲れ様でした"
20008-200080240 = "それではまた、よろしくお願いいたしますね"
20008-200080250 = "またあるのがもう確定してるんだね……"
20008-200080260 = "先生"
20008-200080270 = "実はですね"
20008-200080280 = "……"
20008-200080290 = "ちょっ"
20008-200080300 = "何ですかその反応は！"
20008-200080310 = "買わないよ？"
20008-200080320 = "押し売りの人扱いされている……！"
20008-200080330 = "な、何なんですかもう！"
20008-200080340 = "あれですか、新手のいじめですか！？"
20008-200080350 = "全くもう、先生までそういう……"
20008-200080360 = "……？"
20008-200080370 = "大丈夫？何かあった？"
20008-200080380 = "まあ"
20008-200080390 = "そう、ですね"
20008-200080400 = "特に大きなことではないのですが"
20008-200080410 = "ただ"
20008-200080420 = "？"
20008-200080430 = "……アコ？"
20008-200080440 = "先生、無事に帰られましたか？"
20008-200080450 = "ごめん、首輪そのまま持ってきちゃった"
20008-200080460 = "ああ、なるほど"
20008-200080470 = "そうでしたか"
20008-200080480 = "明日返しに行くね"
20008-200080490 = "はい"
20008-200080500 = "あ"
20008-200080510 = "いえ、持ってきていただかなくて大丈夫です"
20008-200080520 = "先生が持っていてください"
20008-200080530 = "……？"
20008-200080540 = "本日もお疲れ様でした"
20008-200080550 = "では、またお会いしましょう"
