[translation]
20038-200380010 = "山海経での生活は、たしかに新鮮ですね"
20038-200380020 = "ちょっとは慣れてきた？"
20038-200380030 = "まだ少しですが……"
20038-200380040 = "あまり慣れてしまいたくない気持ちもあります"
20038-200380050 = "どうして？"
20038-200380060 = "うーん……"
20038-200380070 = "やはり、慣れてしまったら"
20038-200380080 = "この楽しい気持ちが減ってしまうから、でしょうか"
20038-200380090 = "あらためて感じたのですが"
20038-200380100 = "山海経とレッドウィンターは、本当に色々なところが違いますね"
20038-200380110 = "具体的にはどこが違った？"
20038-200380120 = "一番は暑さです"
20038-200380130 = "ジッとしていても汗をかくだなんて"
20038-200380140 = "初めての経験で"
20038-200380150 = "たしかに、そうだよね"
20038-200380160 = "もちろん"
20038-200380170 = "レッドウィンターより涼しいところのほうが少ないと思いますが"
20038-200380180 = "これは予想以上でした"
20038-200380190 = "先生"
20038-200380200 = "今、お忙しいでしょうか？"
20038-200380210 = "手なら空いてるよ、どうしたの？"
20038-200380220 = "よろしければ、お昼をご一緒したいと思いまして"
20038-200380230 = "もちろん、先生がよろしければですが"
20038-200380240 = "じゃあ、有名な中華料理屋さんを紹介するね！"
20038-200380250 = "と思ったけど、トモエならもう知ってるような気も"
20038-200380260 = "たしかに、色々と事前に調べてから来ましたが……"
20038-200380270 = "先生に紹介していただけるのでしたら"
20038-200380280 = "嬉しい限りです"
20038-200380290 = "期待に応えられるか心配だけど……"
20038-200380300 = "断言できます"
20038-200380310 = "心配はいりません"
20038-200380320 = "先生が一緒に来てくださるんですから"
