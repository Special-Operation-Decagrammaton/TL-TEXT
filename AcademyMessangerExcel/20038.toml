[translation]
20038-200380010 = "A vida em Shanhaijing é, de fato, uma novidade."
20038-200380020 = "Já está se acostumando um pouco?"
20038-200380030 = "Ainda um pouco, mas..."
20038-200380040 = "Também tenho um sentimento de que não quero me acostumar demais."
20038-200380050 = "Por que?"
20038-200380060 = "Hmm..."
20038-200380070 = "Afinal, se eu me acostumar,"
20038-200380080 = "talvez esse sentimento de alegria diminua, não é?"
20038-200380090 = "Percebi novamente que"
20038-200380100 = "Shanhaijing e Red Winter são realmente diferentes em muitos aspectos."
20038-200380110 = "Especificamente, o que é diferente?"
20038-200380120 = "O principal é o calor."
20038-200380130 = "Suar mesmo estando parada,"
20038-200380140 = "é uma experiência inédita para mim."
20038-200380150 = "Com certeza, é verdade."
20038-200380160 = "Claro."
20038-200380170 = "Acho que existem poucos lugares mais frios que Red Winter,"
20038-200380180 = "mas isso superou minhas expectativas."
20038-200380190 = "Sensei."
20038-200380200 = "Você está ocupado agora?"
20038-200380210 = "Estou livre, o que houve?"
20038-200380220 = "Se não for incômodo, gostaria de almoçar com você."
20038-200380230 = "Claro, se for do seu agrado, é claro."
20038-200380240 = "Então, vou te apresentar um restaurante chinês famoso!"
20038-200380250 = "Mas pensando bem, sinto que a Tomoe já deve conhecer."
20038-200380260 = "De fato, pesquisei várias coisas antes de vir, mas..."
20038-200380270 = "Se for o Sensei quem vai me apresentar,"
20038-200380280 = "ficarei muito feliz."
20038-200380290 = "Estou preocupado se vou conseguir atender às expectativas..."
20038-200380300 = "Posso afirmar com certeza."
20038-200380310 = "Não precisa se preocupar."
20038-200380320 = "Já que é o Sensei quem virá comigo."
