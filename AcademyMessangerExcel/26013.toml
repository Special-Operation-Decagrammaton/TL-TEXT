[translation]
26013-260130010 = "Olá, Sensei."
26013-260130020 = "Olá, Atsuko."
26013-260130030 = "O mar é mais bonito do que eu imaginava,"
26013-260130040 = "não consigo tirar os olhos dele."
26013-260130050 = "E o festival também, tudo é tão novo para mim."
26013-260130060 = "Fico feliz que esteja se divertindo!"
26013-260130070 = "Já que estamos aqui, quero tirar algumas fotos."
26013-260130080 = "Vou dar uma volta."
26013-260130090 = "O que acha de vir comigo, Sensei?"
26013-260130100 = "Sensei."
26013-260130110 = "Você está ocupado agora?"
26013-260130120 = "Eu tenho tempo."
26013-260130130 = "Então, poderia me acompanhar um pouco?"
26013-260130140 = "Tem duas coisas que eu realmente quero fotografar."
26013-260130150 = "Ah."
26013-260130160 = "Da próxima vez, vou garantir que a bateria esteja carregada."
26013-260130170 = "Sensei."
26013-260130180 = "Tenho uma má notícia."
26013-260130190 = "O que houve?"
26013-260130200 = "A bateria da câmera está quase acabando,"
26013-260130210 = "não consigo tirar muitas fotos agora."
26013-260130220 = "Por isso, preciso decidir com cuidado o que vou fotografar."
