[translation]
26013-260130010 = "こんにちは、先生"
26013-260130020 = "こんにちは、アツコ"
26013-260130030 = "海、思っていた以上にきれいで"
26013-260130040 = "目が離せないの"
26013-260130050 = "お祭りも、初めて見るものばかり"
26013-260130060 = "楽しめてるみたいで良かった！"
26013-260130070 = "せっかくだから、写真を残したい"
26013-260130080 = "ちょっと出かけてくる"
26013-260130090 = "先生も一緒に、どう？"
26013-260130100 = "先生"
26013-260130110 = "今、忙しい？"
26013-260130120 = "時間ならあるよ"
26013-260130130 = "じゃあ、少し付き合ってくれる？"
26013-260130140 = "どうしても、撮りたいものが2つあって"
26013-260130150 = "あ"
26013-260130160 = "今度はちゃんと、バッテリーを入れていくから"
26013-260130170 = "先生"
26013-260130180 = "悪いお知らせだよ"
26013-260130190 = "どうしたの？"
26013-260130200 = "カメラのバッテリーが、あと少ししかなくて"
26013-260130210 = "もう何枚も撮れないの"
26013-260130220 = "だから、何を撮るか慎重に決めないと"
