[translation]
26006-260060010 = "先生は占いってどれぐらい信じてますか？"
26006-260060020 = "結構信じてるよ"
26006-260060030 = "そんなに信じない方かな……"
26006-260060040 = "そうなんですね。今度先生が見ている占い、私にも教えてください！"
26006-260060050 = "そうなんですか？日刊キヴォトスの「今日の運勢」、お勧めですよ"
26006-260060060 = "あの占いは、外れたことがありませんから！"
26006-260060070 = "「今日の運勢」によると、私は金運がばっちりだそうです！"
26006-260060080 = "特別クラスに来てから、金運が良いという占い結果が出たのは初めてなんです……！"
26006-260060090 = "ふふ、今から楽しみで仕方ありません！"
26006-260060100 = "良いこと、起きるといいね"
26006-260060110 = "はい！"
26006-260060120 = "うう、食べきれず残してしまったあの高級スイーツが、今も頭に残って眠れません……"
26006-260060130 = "せっかくの金運だったのに、チャンスをふいに……なんてもったいないことを……"
26006-260060140 = "また今度、同じお店で奢ってあげるよ"
26006-260060150 = "だ、ダメです！そ、そんな約束をされてしまいますと……"
26006-260060160 = "これから先そのお店に行くまで、ずっと眠れなくなってしまいます！"
26006-260060170 = "先生、今日はずっとシャーレにいらっしゃるんですか？"
26006-260060180 = "うん、その予定。何か用事あったりする？"
26006-260060190 = "いえ大丈夫です、今は特にありません"
26006-260060200 = "ただ聞いてみただけです、えへへ"
26006-260060210 = "？？？"
26006-260060220 = "先生、聞きましたか？"
26006-260060230 = "流星群ですよ、流星群！"
26006-260060240 = "流星群？"
26006-260060250 = "はい、ニュースで見たんですが、今度の満月の日にしし座流星群が見られるみたいです！"
26006-260060260 = "その上、今回のしし座流星群は、レッドウィンターの自治区でも見られるそうで！"
26006-260060270 = "この前の流星群は、この辺りでは観測できなくて本当に残念でしたが、今度こそ……！"
26006-260060280 = "実際に見たら、どれほど綺麗なんでしょうね？"
26006-260060290 = "今から楽しみです！"
26006-260060300 = "先生！今夜の流星群のピーク時は夜の11時だそうです！"
26006-260060310 = "ですので、それよりも前に来てくださいね！"
26006-260060320 = "分かった、余裕を持って一時間前には行くようにするね"
26006-260060330 = "遅れちゃダメですよ！"
26006-260060340 = "分かった分かった"
26006-260060350 = "絶対ですよ！絶対！"
26006-260060360 = "先生はどんな天気が好きですか？"
26006-260060370 = "晴れかな"
26006-260060380 = "雨かな"
26006-260060390 = "なるほど、晴れた日が好きという人は多いですよね"
26006-260060400 = "晴れの日ほど多くはない印象ですが、雨も人気ありますよね"
26006-260060410 = "私は、雲一つない晴れた空も、ポツポツと降る雨も好きですが……"
26006-260060420 = "実は、雲一面の空が一番好きなんです！"
26006-260060440 = "見てください、先生！"
26006-260060450 = "約束の、撮ってきた写真です。どうですか？"
26006-260060460 = "すごく綺麗だね"
26006-260060470 = "そうですよね！私が雲の多い日が好きなのは、こういった景色が好きだからなんです"
26006-260060480 = "先生と一緒に行けたらもっと良かったのですが……"
26006-260060490 = "い、今のメッセージは気にしないでください！"
