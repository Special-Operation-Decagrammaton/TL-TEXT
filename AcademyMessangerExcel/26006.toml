[translation]
26006-260060010 = "Professor, o quanto você acredita em horóscopos?"
26006-260060020 = "Eu acredito bastante."
26006-260060030 = "Eu não costumo acreditar muito..."
26006-260060040 = "Entendo. Da próxima vez, por favor, me conte qual horóscopo você está lendo!"
26006-260060050 = "É mesmo? Eu recomendo a \"Previsão do Dia\" do Diário de Kivotos."
26006-260060060 = "Aquele horóscopo nunca erra!"
26006-260060070 = "De acordo com a \"Previsão do Dia\", minha sorte financeira está ótima!"
26006-260060080 = "É a primeira vez que recebo um resultado de sorte financeira boa desde que vim para a classe especial...!"
26006-260060090 = "Fufu, estou muito animada!"
26006-260060100 = "Espero que coisas boas aconteçam."
26006-260060110 = "Sim!"
26006-260060120 = "Uuu, aquele doce chique que não consegui terminar de comer ainda está na minha cabeça e não consigo dormir..."
26006-260060130 = "Tive tanta sorte financeira e desperdicei a chance... que desperdício..."
26006-260060140 = "Da próxima vez, eu te pago na mesma loja."
26006-260060150 = "N-não pode! S-se você me fizer uma promessa dessas..."
26006-260060160 = "Eu não vou conseguir dormir até irmos àquela loja!"
26006-260060170 = "Professor, você vai ficar no Schale o dia todo hoje?"
26006-260060180 = "Sim, esse é o plano. Precisa de algo?"
26006-260060190 = "Não, está tudo bem, não preciso de nada em especial agora."
26006-260060200 = "Só estava perguntando, hehe."
26006-260060210 = "???"
26006-260060220 = "Professor, você ouviu?"
26006-260060230 = "A chuva de meteoros, a chuva de meteoros!"
26006-260060240 = "Chuva de meteoros?"
26006-260060250 = "Sim, vi no noticiário que poderemos ver a chuva de meteoros das Leônidas na próxima lua cheia!"
26006-260060260 = "Além disso, parece que esta chuva de meteoros das Leônidas também poderá ser vista no distrito autônomo de Red Winter!"
26006-260060270 = "Foi uma pena que não conseguimos observar a última chuva de meteoros por aqui, mas desta vez..."
26006-260060280 = "Como será que vai ser quando virmos de verdade?"
26006-260060290 = "Estou muito animada!"
26006-260060300 = "Professor! O pico da chuva de meteoros hoje à noite será às 23h!"
26006-260060310 = "Então, por favor, venha antes disso!"
26006-260060320 = "Entendido, vou me organizar para chegar uma hora antes."
26006-260060330 = "Não se atrase!"
26006-260060340 = "Entendido, entendido."
26006-260060350 = "Prometido! Prometido!"
26006-260060360 = "Professor, que tipo de clima você gosta?"
26006-260060370 = "Acho que ensolarado."
26006-260060380 = "Acho que chuvoso."
26006-260060390 = "Entendo, muitas pessoas gostam de dias ensolarados, não é?"
26006-260060400 = "Não tenho a impressão de que seja tão comum quanto dias ensolarados, mas dias de chuva também são populares."
26006-260060410 = "Eu gosto tanto do céu limpo sem nuvens quanto da chuva caindo aos poucos, mas..."
26006-260060420 = "Na verdade, o que eu mais gosto é de um céu coberto de nuvens!"
26006-260060440 = "Olhe só, professor!"
26006-260060450 = "Aqui está a foto que tirei, como prometido. O que achou?"
26006-260060460 = "É muito bonita."
26006-260060470 = "Não é? Eu gosto de dias nublados justamente porque adoro paisagens assim."
26006-260060480 = "Teria sido melhor se eu pudesse ter ido com você, professor..."
26006-260060490 = "N-não ligue para a mensagem anterior!"
