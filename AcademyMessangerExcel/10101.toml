[translation]
10101-101010010 = "Sensei."
10101-101010020 = "Está gostando do festival?"
10101-101010030 = "Claro que sim, Saori."
10101-101010040 = "Estou me divertindo."
10101-101010050 = "Que bom."
10101-101010060 = "Eu comecei um trabalho de meio período em um restaurante na praia."
10101-101010070 = "Se estiver com fome, por favor, venha também, Sensei."
10101-101010080 = "Sensei, obrigada pela ajuda outro dia."
10101-101010090 = "Hoje vou patrulhar o local do evento, mas parece que não vou dar conta sozinha..."
10101-101010100 = "Se não for incômodo, será que eu poderia pedir sua ajuda, Sensei?"
10101-101010110 = "Claro, eu ajudo."
10101-101010120 = "Agradeço. Então, vamos nos encontrar na entrada do local."
10101-101010130 = "Sensei, eu editei o som que gravei mais cedo."
10101-101010140 = "Acho que ficou muito bom."
10101-101010150 = "Que bom!"
10101-101010160 = "Vou te enviar os dados também, Sensei, então dê uma ouvida."
10101-101010170 = "(Falha no envio do arquivo)"
10101-101010180 = "Ah."
10101-101010190 = "Entendi."
10101-101010200 = "É por causa do tamanho do arquivo..."
10101-101010210 = "Vou ouvir pessoalmente no local do evento, então."
10101-101010220 = "Ah, entendi."
10101-101010230 = "Sensei."
10101-101010240 = "Haverá uma apresentação de DJ hoje à tarde."
10101-101010250 = "Se puder, você não gostaria de vir assistir?"
10101-101010260 = "Sim, com certeza eu vou."
10101-101010270 = "Está programado para começar no palco principal depois do pôr do sol."
10101-101010280 = "Então, estarei esperando."
