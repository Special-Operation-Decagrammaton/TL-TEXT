10068-100680430 = "Muito, muito obrigada mesmo!!!"
10068-100680440 = "Sensei! Bom trabalho!!"
10068-100680450 = "Será que você poderia arranjar um tempo na sua agenda pra mim da próxima vez!!"
10068-100680460 = "Claro que sim."
10068-100680470 = "Que bom que você parece bem."
10068-100680480 = "Ahaha!"
10068-100680490 = "É que você sempre me ajuda com tantas coisas!!"
10068-100680500 = "Desta vez! Eu! Quero! Agradecer! Você!!"
10068-100680510 = "Vou te proporcionar um dia super especial!! Por favor, aguarde ansiosamente!"
10068-100680520 = "Boa noite, Sensei..."
10068-100680530 = "É sempre assim, mas...\nA patrulha da madrugada é uma batalha contra o sono..."
10068-100680540 = "Eh, a essa hora?"
10068-100680550 = "Aconteceu algum problema?"
10068-100680560 = "Ah!!!"
10068-100680570 = "Não, nenhum problema em particular... por enquanto."
10068-100680580 = "Mas, como uma vigilante, pensei em me preparar para o pior!!"
10068-100680590 = "Se você também estiver trabalhando, Sensei, por favor, descanse um pouco!"
10068-100680600 = "Boa noite!!"
10068-100680610 = "Awaah!!"
10068-100680620 = "Causei problemas para o Sensei de novo...!!"
10068-100680630 = "Não acho que seja um incômodo, está tudo bem."
