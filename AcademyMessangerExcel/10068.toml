[translation]
10068-100680010 = "Bom dia, Sensei!"
10068-100680020 = "Sou Uzawa Reisa, vim cumprimentá-lo!"
10068-100680030 = "Bom dia, Reisa."
10068-100680040 = "O que foi?"
10068-100680050 = "Ah."
10068-100680060 = "Uhm..."
10068-100680070 = "Não é que tenha acontecido algo, eu só queria cumprimentá-lo..."
10068-100680080 = "Você disse que eu podia entrar em contato a qualquer hora..."
10068-100680090 = "Então..."
10068-100680100 = "COM LICENÇA!!!!!!!!!!!!!!!"
