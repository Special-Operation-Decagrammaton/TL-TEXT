10068-100680350 = "Me desculpe por não ter me despedido direito!!"
10068-100680360 = "Não precisa se preocupar com isso."
10068-100680370 = "Conseguiu descansar um pouco?"
10068-100680380 = "Sim!!!"
10068-100680390 = "Ah..."
10068-100680400 = "Então... Depois que eu conversei direito com todo mundo, tudo se resolveu rapidinho!"
10068-100680410 = "Agora posso me divertir e patrulhar sem problemas!"
