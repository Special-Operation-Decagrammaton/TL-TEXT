10068-100680200 = "Fiquei pensando por que eu estava me preocupando tanto com aquilo!"
10068-100680210 = "Eu deveria ter falado com você antes, Sensei!"
10068-100680220 = "É mais fácil fazer do que se preocupar, não é mesmo?"
10068-100680230 = "Muito, muito obrigada mesmo!!!!"
