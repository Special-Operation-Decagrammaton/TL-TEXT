26003-1672 = "..."
26003-1673 = "Espere um pouco, por favor.\n`(*>﹏<*)′"
26003-1674 = "Mesmo que não esteja se sentindo mal, se sentir que está cansado, por favor, me avise."
26003-1675 = "Não importa onde você esteja, eu irei até você, Sensei."
26003-1676 = "Obrigado, contarei com você quando isso acontecer."
26003-1677 = "Sim! O(∩_∩)O"
26003-1678 = "Quando o Sensei estiver cansado, eu correrei para te ajudar."
26003-1679 = "Sempre que precisar, pode me chamar!"
26003-1680 = "Obrigado."
26003-1681 = "...Por acaso, Serina, você estava no Schale agora há pouco?"
26003-1682 = "Eh?"
26003-1683 = "..."
26003-1684 = "Você estava realmente muito cansado, não é?\n(✿˘‿˘)"
26003-1685 = "Hoje também, o Esquadrão de Socorro irá para onde quer que precisem de ajuda!"
26003-1686 = "Sensei, não se esforce demais e, se tiver algum problema, me avise imediatamente!"
26003-1687 = "Sim, obrigado."
26003-1688 = "(@^0^@)/"
26003-1689 = "Sensei♪(´▽｀)"
26003-1690 = "...Ei."
26003-1691 = "Bem..."
26003-1692 = "..."
26003-1693 = "É só por precaução..."
26003-1694 = "Você não acha que eu sou estranha, acha...?"
26003-1695 = "Decidi pensar que você é como uma super-heroína."
26003-1696 = "..."
26003-1697 = "Bem... sim..."
26003-1698 = "Vamos deixar assim então..._(┐「ε:)_"
26003-260030010 = "Bom dia, Sensei!"
26003-260030020 = "Que você tenha um ótimo dia hoje! \n(✿˘‿˘)"
26003-260030030 = "Sim. Conto com você hoje também."
26003-260030040 = "Estarei esperando."
26003-260030050 = "Sim!"
26003-260030060 = "...Ah? Bem... tínhamos algum compromisso hoje...?"
26003-260030070 = "...?"
26003-260030080 = "Bem, tínhamos algum compromisso hoje...?"
26003-260030090 = "...Sensei?"
26003-260030100 = "Muito obrigada por hoje, Sensei."
26003-260030110 = "Fiquei surpresa, mas, por causa disso, será uma lembrança muito especial."
26003-260030120 = "Como posso dizer..."
26003-260030130 = "Ter feito tudo aquilo por mim... é uma sensação um tanto estranha."
26003-260030140 = "Ainda estou com o coração flutuando e não consigo expressar bem esse sentimento..."
26003-260030150 = "……Muito obrigada."
26003-260030160 = "Eu estou muito feliz! (´▽｀)♪"
