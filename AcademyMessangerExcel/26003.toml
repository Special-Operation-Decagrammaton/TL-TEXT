[translation]
26003-1663 = "Não importa o que você faça, a saúde é o mais importante, Sensei."
26003-1664 = "Por mais ocupado que esteja, não se esforce demais e descanse um pouco durante o trabalho, está bem?"
26003-1665 = "(≧∇≦)ﾉ"
26003-1666 = "Obrigado."
26003-1667 = "Eu adoraria fazer isso, mas..."
26003-1668 = "Fufu, não há de quê."
