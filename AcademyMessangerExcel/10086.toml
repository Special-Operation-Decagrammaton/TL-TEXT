[translation]
10086-100860010 = "先生、少し相談があるのだけど"
10086-100860020 = "よし、今すぐ出動だ！"
10086-100860030 = "う、うん？出動……？"
10086-100860040 = "どこに行けばいい？"
10086-100860050 = "出動って、会いに来てくれるって意味だったの？"
10086-100860060 = "ふふっ、先生らしいね"
10086-100860070 = "今日は私がシャーレに行くわ"
10086-100860080 = "じゃあ後でね、先生"
10086-100860090 = "先生、この間の約束だけど……"
10086-100860100 = "うん、ドレスを買いに行くんだよね！"
10086-100860110 = "ショッピング、楽しみだね！"
10086-100860120 = "ふふ……そんなに張り切ってもらえるなんて、嬉しい"
10086-100860130 = "それで、ドレスを買う場所なのだけど"
10086-100860140 = "ゲヘナには、風紀委員をあまり良く思っていない人たちも多いでしょう"
10086-100860150 = "こっちのショッピングモールだと、落ち着いて買い物できないかもしれなくて……"
10086-100860160 = "だから……"
10086-100860170 = "なら、ゲヘナの外で見よっか？"
10086-100860180 = "うん、待ち合わせ場所は送っておくわ"
10086-100860190 = "待ってるね、先生"
10086-100860200 = "先生、明日は空いてる？"
10086-100860210 = "ゲヘナのパーティーが終わったから、少し余裕ができて"
10086-100860220 = "良かったら、先生に会いたいのだけど……"
10086-100860230 = "ヒナの予定が空くなんて珍しいね！"
10086-100860240 = "絶対、会いに行くよ！"
10086-100860250 = "ふふ、大げさね"
10086-100860260 = "じゃあ、パーティー会場で待ってるわ"
