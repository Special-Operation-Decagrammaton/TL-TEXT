[translation]
10086-100860010 = "Sensei, eu queria conversar um pouco com você."
10086-100860020 = "Certo, estou indo agora mesmo!"
10086-100860030 = "H-hã? Indo...?"
10086-100860040 = "Para onde eu devo ir?"
10086-100860050 = "Quando você disse 'indo', queria dizer que viria me encontrar?"
10086-100860060 = "Hehe, bem a sua cara, Sensei."
10086-100860070 = "Hoje eu vou até a Schale."
10086-100860080 = "Então, até mais tarde, Sensei."
10086-100860090 = "Sensei, sobre o nosso compromisso do outro dia..."
10086-100860100 = "Sim, nós vamos comprar um vestido, né!"
10086-100860110 = "Fazer compras vai ser divertido!"
10086-100860120 = "Hehe... Fico feliz que você esteja tão animado."
10086-100860130 = "Então, sobre o lugar para comprar o vestido..."
10086-100860140 = "Em Gehenna, há muitas pessoas que não gostam muito do Comitê de Disciplina, certo?"
10086-100860150 = "Nos shoppings daqui, talvez a gente não consiga fazer compras com calma..."
10086-100860160 = "Por isso..."
10086-100860170 = "Então, que tal procurarmos fora de Gehenna?"
10086-100860180 = "Sim, vou te enviar o local de encontro."
10086-100860190 = "Estarei esperando, Sensei."
10086-100860200 = "Sensei, você está livre amanhã?"
10086-100860210 = "A festa de Gehenna acabou, então estou com um pouco mais de tempo livre."
10086-100860220 = "Se não for incômodo, eu gostaria de te ver..."
10086-100860230 = "É raro a Hina ter um tempo livre!"
10086-100860240 = "Com certeza eu vou te ver!"
10086-100860250 = "Hehe, que exagero."
10086-100860260 = "Então, estarei esperando no local da festa."
