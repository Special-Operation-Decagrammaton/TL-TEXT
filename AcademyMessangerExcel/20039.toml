[translation]
20039-200390010 = "Professor, está aí?"
20039-200390020 = "Sim, estou."
20039-200390030 = "Hum, isso é excelente."
20039-200390040 = "Quero que me escute com atenção..."
20039-200390050 = "Não, quero que leia isto."
20039-200390060 = "Agora, no Genryumon..."
20039-200390070 = "Não, com a líder do Genryumon..."
20039-200390080 = "Um incidente sem precedentes aconteceu."
20039-200390090 = "Como assim!?"
20039-200390100 = "É uma situação que exige urgência."
20039-200390110 = "Naturalmente, é um assunto confidencial."
20039-200390120 = "Se você é um educador que atende às expectativas de seus alunos,"
20039-200390130 = "não conte a ninguém..."
20039-200390140 = "Venha imediatamente para Shanhaijing."
20039-200390150 = "Como foi a experiência de trabalho no Genryumon, Professor?"
20039-200390160 = "Achei a Kisaki... incrível."
20039-200390170 = "Fufu. Pelo menos em Shanhaijing,"
20039-200390180 = "não ocorrem problemas que saiam do controle."
20039-200390190 = "Embora, é claro, impedir que eles ocorram também seja essencial."
20039-200390200 = "Entendo, é verdade."
20039-200390210 = "Sim."
20039-200390220 = "Pois é."
20039-200390230 = "Da próxima vez, serei eu quem visitará o Schale."
20039-200390240 = "Fufu, pode ficar na expectativa."
20039-200390250 = "Bem. Como conversamos anteriormente,"
20039-200390260 = "hoje pretendo visitar o Schale como a 'responsável do dia'."
20039-200390270 = "Sim, pode vir quando quiser."
20039-200390280 = "Hum."
20039-200390290 = "Uma resposta reconfortante."
20039-200390300 = "Então, até mais tarde."
20039-200390310 = "Como está sua saúde, Professor?"
20039-200390320 = "Melhorei bastante, mas..."
20039-200390330 = "Hoje, a Kisaki veio ao Schale, não foi?"
20039-200390340 = "Hum."
20039-200390350 = "Entendo..."
20039-200390360 = "..."
20039-200390370 = "Fufu."
20039-200390380 = "O que você faria se eu respondesse que nem eu mesma sei?"
20039-200390390 = "Hã, como assim...!?"
20039-200390400 = "O sonho da borboleta... é como chamamos."
20039-200390410 = "Não acha uma história fascinante?"
20039-200390420 = "Bem, deixando isso de lado,"
20039-200390430 = "tirei uma foto bem nítida do seu rosto enquanto dormia, Professor."
20039-200390440 = "Q-quando você fez isso!?"
20039-200390450 = "Acho que estou me acostumando aos poucos"
20039-200390460 = "a ser a responsável do Schale... o que acha?"
20039-200390470 = "Você está fazendo um trabalho perfeito."
20039-200390480 = "Será mesmo?..."
20039-200390490 = "O pessoal do Genryumon"
20039-200390500 = "fica cada vez mais preocupado comigo a cada dia que passa."
20039-200390510 = "Hmm... vejamos."
20039-200390520 = "Acho que vou visitar o Schale hoje também."
20039-200390530 = "Ué? Hoje é o meu dia de turno?"
20039-200390540 = "Fufu."
20039-200390550 = "Não se preocupe com detalhes triviais."
20039-200390560 = "Detalhes triviais!?"
20039-200390570 = "Uma das virtudes de ser a líder da Genryumon"
20039-200390580 = "é cumprir as promessas feitas."
20039-200390590 = "Cumprir promessas é importante, né."
20039-200390600 = "E, além disso,"
20039-200390610 = "aquilo que foi prometido,"
20039-200390620 = "deve ser cumprido, não importa o meio necessário."
20039-200390630 = "Não importa o meio necessário!?"
20039-200390640 = "Estou brincando."
20039-200390650 = "Mas, Sensei,"
20039-200390660 = "eu me lembro muito bem."
20039-200390670 = "Daquela promessa de irmos visitar vários lugares juntos."
20039-200390680 = "Não se atreva a esquecer a promessa que fez comigo, entendeu?"
20039-200390690 = "Bem, é só uma curiosidade pura, mas..."
20039-200390700 = "O que acontece... se eu não cumprir a promessa?"
20039-200390710 = "..."
20039-200390720 = "Bem, nada de muito grave acontecerá."
20039-200390730 = "Apenas..."
20039-200390740 = "em nome da Genryumon, você terá que pagar o preço equivalente."
20039-200390750 = "Eu vou cumprir, com certeza..."
20039-200390760 = "Sensei."
20039-200390770 = "Você está aí?"
20039-200390780 = "Sim, estou. Como está se sentindo?"
20039-200390790 = "Ah, não precisa se preocupar."
20039-200390800 = "...Embora o Clube de Pesquisa de Alquimia tenha reclamado um pouco."
20039-200390810 = "Mas é só isso. Deixe-me agradecer por ter me levado de volta a Shanhaijing."
20039-200390820 = "De nada."
20039-200390830 = "Hum."
20039-200390840 = "Como forma de retribuição,"
20039-200390850 = "eu gostaria de lhe dar um presente adequado."
20039-200390860 = "..."
20039-200390870 = "Não sei se posso chamar isso de presente, mas..."
20039-200390880 = "Aconteceu alguma coisa?"
20039-200390890 = "..."
20039-200390900 = "Ou seja,"
20039-200390910 = "em resumo,"
20039-200390920 = "..."
20039-200390930 = "É isto aqui."
20039-200390950 = "!?!?"
20039-200390960 = "Isso é...! Não pode ser!?"
20039-200390970 = "Foi algo que tirei agora há pouco."
20039-200390980 = "Muito obrigado! Vou guardar como uma relíquia de família!"
20039-200390990 = "Entendo."
20039-200391000 = "..."
20039-200391010 = "Se você ficou feliz, então fico satisfeita."
20039-200391020 = "Isso, mantenha... em segredo dos outros"
