[translation]
20039-200390010 = "先生、おるか？"
20039-200390020 = "うん、いるよ"
20039-200390030 = "うむ、それは重畳"
20039-200390040 = "よく聞いてほしいのじゃが……"
20039-200390050 = "いや、読んでほしいのじゃが"
20039-200390060 = "今、玄龍門で"
20039-200390070 = "いや、玄龍門の門主に"
20039-200390080 = "前代未聞の事件が起きておる"
20039-200390090 = "どういう事！？"
20039-200390100 = "一刻を争う事態じゃ"
20039-200390110 = "無論、機密に関わることでもある"
20039-200390120 = "其方が生徒の期待に応える教育者であるのなら"
20039-200390130 = "誰にも口外せず……"
20039-200390140 = "今すぐ、山海経まで来てほしい"
20039-200390150 = "玄龍門での業務体験はどうじゃった？先生"
20039-200390160 = "キサキは……凄いと思ったよ"
20039-200390170 = "ふふ。少なくとも山海経で"
20039-200390180 = "あまりにも度を越した騒ぎは起きぬからな"
20039-200390190 = "無論、起こさせぬことも肝要じゃが"
20039-200390200 = "なるほど、そうなんだね。"
20039-200390210 = "うむ"
20039-200390220 = "そうさな"
20039-200390230 = "次は妾がシャーレを訪ねるとしよう"
20039-200390240 = "ふふ、期待しておると良い"
20039-200390250 = "さて。以前、話した通り"
20039-200390260 = "本日は「当番」として、シャーレを訪ねるつもりじゃが"
20039-200390270 = "うん、いつでもおいで"
20039-200390280 = "ふむ"
20039-200390290 = "心強い返事じゃ"
20039-200390300 = "それでは、また後程"
20039-200390310 = "体調はどうじゃ、先生"
20039-200390320 = "だいぶ良くなったけど……"
20039-200390330 = "今日、キサキはちゃんとシャーレに来てたよね？"
20039-200390340 = "ふむ"
20039-200390350 = "なるほど……"
20039-200390360 = "……"
20039-200390370 = "ふふ"
20039-200390380 = "妾もよく分からぬ、と答えたらどうするつもりなのじゃ？"
20039-200390390 = "えっ、どういうこと……！？"
20039-200390400 = "胡蝶の夢……と申してのう"
20039-200390410 = "まこと興味深い話じゃとは思わぬか？"
20039-200390420 = "まあ、それはさておき"
20039-200390430 = "先生の寝顔、しっかりと写真に収めたぞ"
20039-200390440 = "い、いつの間に！？"
20039-200390450 = "シャーレ当番にも"
20039-200390460 = "少しずつ慣れてきたと思うのじゃが……どうじゃ？"
20039-200390470 = "完璧にこなしてくれてるよ"
20039-200390480 = "どうじゃろうか……"
20039-200390490 = "玄龍門の者からは"
20039-200390500 = "日を追うごとに心配されておるがの"
20039-200390510 = "ふむ……そうさな"
20039-200390520 = "今日もシャーレを訪れるとしよう"
20039-200390530 = "あれ？今日当番だっけ？"
20039-200390540 = "ふふ"
20039-200390550 = "些末なことなど気にするでない"
20039-200390560 = "些末なことかなぁ！？"
20039-200390570 = "玄龍門の門主としての美徳"
20039-200390580 = "その一つは、約束を守ることじゃ"
20039-200390590 = "約束を守ることは大事だよね"
20039-200390600 = "そして、もう一つ"
20039-200390610 = "約束したことは"
20039-200390620 = "どんな手を使ってでも、守らせることじゃ"
20039-200390630 = "どんな手を使ってでも！？"
20039-200390640 = "冗談じゃよ"
20039-200390650 = "じゃが、先生"
20039-200390660 = "妾は覚えておるぞ"
20039-200390670 = "一緒に色んなところを見に行こう、というあの約束を"
20039-200390680 = "妾との約束、ゆめゆめ忘れるでないぞ？"
20039-200390690 = "その、純粋に気になるんだけど……"
20039-200390700 = "約束を守らなかったら……どうなるの？"
20039-200390710 = "……"
20039-200390720 = "まあ、大したことは起きぬよ"
20039-200390730 = "ただ……"
20039-200390740 = "玄龍門の名のもと、それ相応の対価を支払ってもらうだけじゃ"
20039-200390750 = "絶対に守るよ……"
20039-200390760 = "先生"
20039-200390770 = "おるかの？"
20039-200390780 = "うん、いるよ。体調はどう？"
20039-200390790 = "ああ、心配せずともよい"
20039-200390800 = "……錬丹術研究会からは少し、小言を言われたがの"
20039-200390810 = "その程度じゃ。妾を山海経まで送ってくれたこと、礼を言わせてくれ"
20039-200390820 = "どういたしまして"
20039-200390830 = "うむ"
20039-200390840 = "代わり、と言ってはなんじゃが"
20039-200390850 = "ちゃんとした謝礼がしたい"
20039-200390860 = "……"
20039-200390870 = "これを、謝礼と言って良いのか、怪しいが……"
20039-200390880 = "どうかしたの？"
20039-200390890 = "……"
20039-200390900 = "その"
20039-200390910 = "つまり"
20039-200390920 = "……"
20039-200390930 = "こういうことじゃ"
20039-200390950 = "！？！？"
20039-200390960 = "これは……！まさか！？"
20039-200390970 = "ついさっき、撮ったものなんじゃが"
20039-200390980 = "ありがとうございます！家宝にします！"
20039-200390990 = "そうか"
20039-200391000 = "……"
20039-200391010 = "喜んでもらえたのなら、何よりじゃ"
20039-200391020 = "その、他の者には……内密にな"
