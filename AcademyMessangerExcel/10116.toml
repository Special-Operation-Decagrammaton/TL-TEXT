[translation]
10116-101160010 = "先生、今は忙しいだろうか？"
10116-101160020 = "全然！"
10116-101160030 = "ちょうど暇だったところ！"
10116-101160040 = "そ、そうか"
10116-101160050 = "先生に直接アドバイスをもらいたいことがあってな"
10116-101160060 = "すまないが、シャーレに行ってもいいか？"
10116-101160070 = "もちろん！"
10116-101160080 = "いつでも歓迎だよ！"
10116-101160090 = "……了解"
10116-101160100 = "すぐに向かう"
10116-101160110 = "先生、私だ"
10116-101160120 = "色々試したおかげで"
10116-101160130 = "自然なポーズが分かってきた気がする"
10116-101160140 = "……ありがとう"
10116-101160150 = "この借りはいつか必ず返す"
10116-101160160 = "サオリの写真が撮れるならそれで……"
10116-101160170 = "ダメだ！"
10116-101160180 = "先生、今は大丈夫だろうか"
10116-101160190 = "もちろん！どうしたの？"
10116-101160200 = "その……お願いがあって"
10116-101160210 = "すまない、先生のほかに頼める人が居ないんだ"
10116-101160220 = "それは期待しちゃうな！"
10116-101160230 = "どんなこと？"
10116-101160240 = "この間のモデル関連の話だ"
10116-101160250 = "今回はドレスを着て、ダンスする写真を撮りたいらしい"
10116-101160260 = "だが、私には経験がない"
10116-101160270 = "可能ならば、ダンスを教えて欲しいのだが"
10116-101160280 = "仰せのままに！"
10116-101160290 = "それでは、今から送る住所に来てほしい"
10116-101160300 = "面倒をかける"
10116-101160310 = "先生、無事帰り着いただろうか"
10116-101160320 = "突然だが"
10116-101160330 = "さっき撮影チームから連絡が来た"
10116-101160340 = "ダンスのシーンがなくなったとのことだ"
10116-101160350 = "大人の事情とやらで"
10116-101160360 = "企画が変更になったらしい"
10116-101160370 = "せっかく時間を作ってくれたのに申し訳ない"
10116-101160380 = "楽しかったから大丈夫！"
10116-101160390 = "ダンスの練習は、二人だけの思い出になったね！"
10116-101160400 = "そ、そうだな……"
10116-101160410 = "とにかく、今回も勉強になった"
10116-101160420 = "これもきっと何かの役に立つだろう"
10116-101160430 = "それでは"
10116-101160440 = "これからもよろしく頼む、先生"
10116-101160450 = "先生"
10116-101160460 = "今日、時間はあるだろうか"
10116-101160470 = "もちろん！"
10116-101160480 = "サオリのための時間ならいくらでも！"
10116-101160490 = "そうか"
10116-101160500 = "モデルのバイト代が入ったので"
10116-101160510 = "今まで世話になった分お礼がしたい"
10116-101160520 = "こういう時は高級料理をふるまうと聞いた"
10116-101160530 = "私は普通のお店が好きだなあ"
10116-101160540 = "そうなのか？しかし……"
10116-101160550 = "大事なのは気持ちだから！"
10116-101160560 = "そうか……分かった"
10116-101160570 = "では、先生がよく行く飲食街を教えてくれ"
10116-101160580 = "そこで待っている"
10116-101160590 = "先生"
10116-101160600 = "その……今日はすごく楽しかった"
10116-101160610 = "料理も素晴らしいものだった"
10116-101160620 = "お礼をしたかったのに"
10116-101160630 = "また世話になってしまったな"
10116-101160640 = "こちらこそ！気にしないで！"
10116-101160650 = "次こそ私にお礼をさせてくれ"
10116-101160660 = "それと、念のため言っておくが"
10116-101160670 = "今日の写真は、絶対ほかの人に見せたらダメだぞ"
10116-101160680 = "絶対に、だ"
