[translation]
10116-101160010 = "Professor, você está ocupado agora?"
10116-101160020 = "De jeito nenhum!"
10116-101160030 = "Eu estava justamente livre!"
10116-101160040 = "A-ah, entendi."
10116-101160050 = "Eu queria pedir um conselho diretamente a você, Professor."
10116-101160060 = "Desculpe, mas posso ir para Schale?"
10116-101160070 = "Claro!"
10116-101160080 = "Você é sempre bem-vindo!"
10116-101160090 = "...Entendido."
10116-101160100 = "Estou indo agora mesmo."
10116-101160110 = "Professor, sou eu."
10116-101160120 = "Graças a ter tentado várias coisas,"
10116-101160130 = "Sinto que comecei a entender as poses naturais."
10116-101160140 = "...Obrigado."
10116-101160150 = "Com certeza vou retribuir este favor um dia."
10116-101160160 = "Se eu puder tirar fotos da Saori, então..."
10116-101160170 = "Não!"
10116-101160180 = "Professor, você está disponível agora?"
10116-101160190 = "Claro! O que houve?"
10116-101160200 = "É que... eu tenho um pedido."
10116-101160210 = "Desculpe, mas não há mais ninguém a quem eu possa pedir além de você, Professor."
10116-101160220 = "Isso me deixa animado!"
10116-101160230 = "O que é?"
10116-101160240 = "É sobre aquele assunto de modelo de outro dia."
10116-101160250 = "Parece que desta vez eles querem tirar fotos minhas usando um vestido e dançando."
10116-101160260 = "Mas eu não tenho experiência."
10116-101160270 = "Se possível, eu gostaria que você me ensinasse a dançar."
10116-101160280 = "Às suas ordens!"
10116-101160290 = "Então, por favor, venha ao endereço que vou te enviar agora."
10116-101160300 = "Desculpe o incômodo."
10116-101160310 = "Professor, você chegou em casa em segurança?"
10116-101160320 = "É repentino, mas..."
10116-101160330 = "Acabei de receber uma ligação da equipe de filmagem."
10116-101160340 = "Disseram que a cena de dança foi cancelada."
10116-101160350 = "Por causa de 'questões de adultos' ou algo assim."
10116-101160360 = "Parece que o plano foi alterado."
10116-101160370 = "Sinto muito por você ter dedicado seu tempo para isso."
10116-101160380 = "Foi divertido, então está tudo bem!"
10116-101160390 = "A prática de dança se tornou uma lembrança só nossa, não é?"
10116-101160400 = "É-é verdade..."
10116-101160410 = "De qualquer forma, aprendi muito desta vez também."
10116-101160420 = "Isso certamente será útil para algo."
10116-101160430 = "Então,"
10116-101160440 = "Conto com você de agora em diante, Professor."
10116-101160450 = "Professor."
10116-101160460 = "Você tem tempo hoje?"
10116-101160470 = "Claro!"
10116-101160480 = "Se for tempo para a Saori, tenho o quanto precisar!"
10116-101160490 = "Entendi."
10116-101160500 = "Recebi o pagamento do meu trabalho de modelo,"
10116-101160510 = "Quero te agradecer por tudo que fez por mim até agora."
10116-101160520 = "Ouvi dizer que, em ocasiões como esta, é bom oferecer uma refeição de luxo."
10116-101160530 = "Eu gosto mais de lugares comuns."
10116-101160540 = "É mesmo? Mas..."
10116-101160550 = "O que importa é a intenção!"
10116-101160560 = "Entendi... Certo."
10116-101160570 = "Então, por favor, me diga qual é a área de restaurantes que o Sensei costuma frequentar."
10116-101160580 = "Estarei esperando lá."
10116-101160590 = "Sensei."
10116-101160600 = "Bem... hoje foi muito divertido."
10116-101160610 = "A comida também estava maravilhosa."
10116-101160620 = "Eu queria ter te agradecido,"
10116-101160630 = "mas acabei sendo ajudado de novo."
10116-101160640 = "Eu que agradeço! Não se preocupe!"
10116-101160650 = "Da próxima vez, por favor, me deixe te agradecer."
10116-101160660 = "E, só para garantir,"
10116-101160670 = "você não pode, de jeito nenhum, mostrar as fotos de hoje para mais ninguém."
10116-101160680 = "De jeito nenhum."
