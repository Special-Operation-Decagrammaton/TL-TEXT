[translation]
16002-1249 = "気になることがあったら、いつでも何でも何度でも！"
16002-1250 = "わざわざ調べに行かずとも、ぜひこのコトリに聞いてください！"
16002-1251 = "コトリの専門は自然科学全般だっけ？"
16002-1252 = "何でも……？"
16002-1253 = "えっと、そうですね……"
16002-1254 = "一応私の専攻は主に自然科学全般ですが、"
16002-1255 = "基本的には、何でも大丈夫です！"
16002-1256 = "私に説明出来ることでしたら、何でもどんとこいです！"
16002-1257 = "先生？どこへ行かれたんですか？"
16002-1258 = "まさか、逃げたわけではありませんよね？"
16002-1259 = "……先生？"
16002-1260 = "気になることがあればいつでも言ってくださいね！"
16002-1261 = "知的好奇心の傍には、いつもコトリがいますから！"
16002-1262 = "ありがとうございました、先生！感動しました！"
16002-1263 = "まさかここまでの速さで理解してくれるなんて！"
16002-1264 = "……えっと、先生、もしよろしければ時々でも良いので、"
16002-1265 = "……よろしくお願いしますね！"
16002-1266 = "先生"
16002-1267 = "今お時間ありますでしょうか？"
16002-1268 = "あ、大したことではないのですが"
16002-1269 = "いえ、個人的には大事なことなのですが……！"
16002-1270 = "と、とにかくですね……"
16002-1271 = "その、"
16002-1272 = "ちょっと、質問と言いますか"
16002-1273 = "お聞きしたいことがありまして……！"
16002-1274 = "大丈夫だよ、どうしたの？"
16002-1275 = "説明じゃなくて質問？"
16002-1276 = "あ、"
16002-1277 = "ありがとうございます！"
16002-1278 = "一も二も無く、さすが先生です！"
16002-1279 = "アウトプットのためにはインプットが必要ですから"
16002-1280 = "それに、"
16002-1281 = "他でもない、先生にこそ聞きたいことなんです！"
16002-1282 = "ふふっ、ではあの場所で"
16002-1283 = "待ってますね！"
16002-1284 = "……えっと"
16002-1285 = "あ、あらためまして、先ほどはありがとうございました！"
16002-1286 = "やっぱり先生に尋ねてみて正解でした！"
16002-1287 = "私の方からきちんと説明してあげられそうです！"
16002-1288 = "それは良かった"
16002-1289 = "結局どういうことだったの？"
16002-1290 = "えへへ……"
16002-1291 = "はい、本当に良かったです"
16002-1292 = "ありがとうございました、先生！"
16002-1293 = "そ、それは……"
16002-1294 = "その……"
16002-1295 = "……"
16002-1296 = "秘密、です……"
16002-1297 = "えっと、それでは、また"
16002-160020010 = "おはようございます！何か気になることがありましたら、いつでも仰ってください！"
16002-160020020 = "疑問や質問があれば、いつでもぜひこのコトリに！"
16002-160020030 = "……"
16002-160020040 = "念のためなのですが……"
16002-160020050 = "その、ミュート設定されてたり、しないですよね……？"
16002-160020060 = "時々、そういうこともあるので……"
16002-160020070 = "そんなことはないよ、それにちょうど聞きたいことがあって"
16002-160020080 = "ナイスタイミング、質問がありますコトリさん！"
16002-160020090 = "……"
16002-160020100 = "ほ"
16002-160020110 = "本当ですか！？"
16002-160020120 = "お任せください、何でもお答えしますよ！"
16002-160020130 = "それではコトリ！今すぐそちらへ参りますので！>_<"
16002-160020140 = "すみま"
16002-160020150 = "すみませんでした、先生……その、あまりにも予想外の質問だったと言いますか……"
16002-160020160 = "本当にその、不意を突かれたと言いますか……"
16002-160020170 = "すみません、前にもこんなことがあった気がしますね……"
16002-160020180 = "……"
16002-160020190 = "その"
16002-160020200 = "今度よろしければ"
16002-160020210 = "いえ、私の準備ができてないので、すぐではないのですが"
16002-160020220 = "その時でも、良いですか？"
16002-160020230 = "ちゃんと"
16002-160020240 = "ちゃんと答えを、出しますので"
16002-160020250 = "ふぅ！"
16002-160020260 = "危ないところでした！"
16002-160020270 = "コトリ？"
16002-160020280 = "どうしたの？"
16002-160020290 = "あ、大したことではありません！"
16002-160020300 = "実はメガネが壊れてしまい、修理をお願いしていたんです"
16002-160020310 = "一日ぐらいはなくても大丈夫だろうと思っていたのですが"
16002-160020320 = "私の視力では無理でしたね！あはは！！"
