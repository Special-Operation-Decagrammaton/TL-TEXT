[translation]
10014-2506 = "主殿。イズナ、最近悩みごとがあって夜眠れないんです……"
10014-2507 = "悩みごと？"
10014-2508 = "私で良ければ相談に乗るよ"
10014-2509 = "さ、さすが主殿……！"
10014-2510 = "イズナが苦しんでる時は、すぐに答えてくれるんですね！"
10014-2511 = "……ありがとうございます！"
10014-2512 = "悩み、解決しました！"
10014-2513 = "もう解決したの！？"
10014-2514 = "はい！"
10014-2515 = "イズナは忍者を目指していますので。"
10014-2516 = "であれば先生のように素早く対応、まずは悩むより実行！"
10014-2517 = "ということで、今日からさらに忍者らしく！"
10014-2518 = "まずは実践することにします、ニンニン！"
10014-2519 = "危ないことをして怪我しないようにね。"
10014-2520 = "えへへっ、はい！"
10014-2521 = "イズナ、先日の主殿からの忠告、心に深く刻みました"
10014-2522 = "忠告？何の話だっけ……？"
10014-2523 = "この前、主殿が仰っていた……"
10014-2524 = "無断での尾行は良くないというお話です！"
10014-2525 = "ごめん、覚えてないかも……？"
10014-2526 = "そういえばそんなこともあったね……"
10014-2527 = "あの時主殿よりしかと頂いたお言葉を、あらためて勘考しました"
10014-2528 = "イズナ、今後は主殿をこっそり護衛することはやめます！"
10014-2529 = "あっ、うん……"
10014-2530 = "代わりに今日からは、主殿の前で護衛しますね！"
10014-2531 = "ではまた！"
10014-2532 = "うん……？"
10014-2533 = "主殿！主殿！"
10014-2534 = "速報です！特報です！一大事です！"
10014-2535 = "そんなに興奮して、どうしたの？"
10014-2536 = "イズナの大好きな名作、忍者の時代劇シリーズをついに手に入れました！"
10014-2537 = "時代劇って、昔のドラマ？"
10014-2538 = "はい！"
10014-2539 = "これ、なかなか手に入らない名作なんです！"
10014-2540 = "一緒に見てくれますよね！主殿！"
10014-2541 = "イズナの家で鑑賞会をしましょう！"
10014-2542 = "うん、じゃあお邪魔しようかな"
10014-2543 = "あ、ありがとうございます！"
10014-2544 = "えへへっ！ではお待ちしてますね！"
10014-2545 = "主殿と、忍者についてさらに知ることができて嬉しかったです！"
10014-2546 = "次はイズナも、さらに完璧な忍者になった状態でお会いできますね、主殿！"
10014-2547 = "そ、そうだね……？"
10014-2548 = "忍者にとって一番大事なこと……"
10014-2549 = "それは普段から休むことなく、常在戦場の心持ちで修行を続けることだと思います！"
10014-2550 = "確かに、鍛錬は大事だからね"
10014-2551 = "健康な体には、健全な精神が宿るっていうからね"
10014-2552 = "はい、その通りかと！"
10014-2553 = "真の忍者になるために……"
10014-2554 = "普段から歩いている時も、ご飯を食べている時も"
10014-2555 = "ぐっすり眠っている時でも、絶えず鍛錬の姿勢と心意気を崩さないこと！"
10014-2556 = "寝てる時も！？"
10014-2557 = "はい！そうです！一日中ですので！"
10014-2558 = "ですので、主殿……！"
10014-2559 = "さらに忍者の道を追求するため、イズナの修行に付き合ってくれませんか！"
10014-2560 = "うん。まだよく分かってないけど、良いよ"
10014-2561 = "やった！ありがとうございます！"
10014-2562 = "今日は修行に付き合ってくださって、ありがとうございました！主殿！"
10014-2563 = "どういたしまして。ところで、今日のって結局修行というか……"
10014-2564 = "あっ、時代劇が始まってしまいます！"
10014-2565 = "それではまた後程！"
10014-2566 = "ニンニン！"
10014-2567 = "う、うん。また後で……"
