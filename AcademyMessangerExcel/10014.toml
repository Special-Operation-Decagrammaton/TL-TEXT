[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10014-2506 = "Meu Mestre. A Izuna tem tido um problema e não consegue dormir à noite ultimamente..."
10014-2507 = "Um problema?"
10014-2508 = "Se não se importar, eu posso ouvir o que é."
10014-2509 = "C-Como esperado do Meu Mestre...!"
10014-2510 = "Sempre que a Izuna está sofrendo, você responde na mesma hora!"
10014-2511 = "......Muito obrigada!"
10014-2512 = "O meu problema foi resolvido!"
10014-2513 = "Já resolveu!?"
10014-2514 = "Sim!"
10014-2515 = "A Izuna está treinando para se tornar uma ninja, afinal."
10014-2516 = "Sendo assim, devo responder rapidamente como o Sensei, e agir antes de me preocupar!"
10014-2517 = "Portanto, a partir de hoje, serei ainda mais parecida com uma ninja!"
10014-2518 = "Primeiro de tudo, vou colocar as coisas em prática! Nin-nin!"
10014-2519 = "Só tome cuidado para não fazer nada perigoso e se machucar."
10014-2520 = "Ehehe, sim senhor!"
10014-2521 = "Izuna gravou bem fundo no coração o conselho que o Meu Mestre deu no outro dia."
10014-2522 = "Conselho? Do que você está falando...?"
10014-2523 = "Aquilo que o Meu Mestre disse da última vez..."
10014-2524 = "Sobre como seguir alguém sem permissão é uma coisa ruim!"
10014-2525 = "Desculpe, acho que não lembro...?"
10014-2526 = "Ah, agora que você falou, acho que teve algo assim..."
10014-2527 = "Eu refleti profundamente sobre as palavras que recebi do Meu Mestre naquele dia."
10014-2528 = "A Izuna não vai mais escoltar o Meu Mestre em segredo de agora em diante!"
10014-2529 = "Ah, sim..."
10014-2530 = "Em vez disso, a partir de hoje, vou ser a sua guarda-costas bem na sua frente!"
10014-2531 = "Até logo!"
10014-2532 = "Ué...?"
10014-2533 = "Meu Mestre! Meu Mestre!"
10014-2534 = "Notícia de última hora! Furo de reportagem! É uma emergência!"
10014-2535 = "O que aconteceu pra você estar tão animada assim?"
10014-2536 = "Eu finalmente consegui a obra-prima favorita da Izuna, a série de drama de época ninja!"
10014-2537 = "Drama de época? Tipo uma série antiga?"
10014-2538 = "Sim!"
10014-2539 = "Esta é uma obra-prima muito difícil de encontrar!"
10014-2540 = "Você vai assistir comigo, não vai!? Meu Mestre!"
10014-2541 = "Vamos fazer uma sessão de cinema na casa da Izuna!"
10014-2542 = "Claro, então acho que vou fazer uma visitinha."
10014-2543 = "A-Ah, muito obrigada!"
10014-2544 = "Ehehe! Estarei esperando por você!"
10014-2545 = "Fiquei muito feliz em poder aprender ainda mais sobre ninjas com o Meu Mestre!"
10014-2546 = "Na próxima vez, nos encontraremos quando a Izuna for uma ninja ainda mais perfeita, Meu Mestre!"
10014-2547 = "C-Certo...?"
10014-2548 = "A coisa mais importante para um ninja..."
10014-2549 = "Acho que é continuar o treinamento sem descanso, com a mente sempre preparada para o campo de batalha!"
10014-2550 = "De fato, o treinamento é muito importante."
10014-2551 = "Afinal, dizem que uma mente sã habita um corpo são."
10014-2552 = "Sim, exatamente!"
10014-2553 = "Para me tornar uma verdadeira ninja..."
10014-2554 = "Quer eu esteja andando, comendo..."
10014-2555 = "Ou até mesmo dormindo profundamente, nunca devo perder a postura e o espírito de treinamento!"
10014-2556 = "Até quando estiver dormindo!?"
10014-2557 = "Sim! É isso mesmo! O dia inteiro!"
10014-2558 = "Por isso, Meu Mestre...!"
10014-2559 = "Para buscar ainda mais o caminho ninja, você não quer fazer companhia para a Izuna no treinamento!?"
10014-2560 = "Tudo bem. Eu ainda não entendi muito bem, mas eu topo."
10014-2561 = "Yaaaay! Muito obrigada!"
10014-2562 = "Obrigada por me acompanhar no treinamento de hoje! Meu Mestre!"
10014-2563 = "De nada. Mas afinal, o que fizemos hoje foi mesmo um treinamento...?"
10014-2564 = "Ah, o drama de época já vai começar!"
10014-2565 = "Vejo você mais tarde!"
10014-2566 = "Nin-nin!"
10014-2567 = "C-Certo. Até mais..."