[translation]
10014-2506 = "Mestre. Izuna, recentemente tenho uma preocupação e não consigo dormir à noite..."
10014-2507 = "Uma preocupação?"
10014-2508 = "Se quiser, posso te ajudar com isso."
10014-2509 = "Co-como esperado do Mestre...!"
10014-2510 = "Quando a Izuna está sofrendo, você responde imediatamente!"
10014-2511 = "...Muito obrigada!"
10014-2512 = "Preocupação resolvida!"
10014-2513 = "Já resolveu?!"
10014-2514 = "Sim!"
10014-2515 = "A Izuna está almejando ser uma ninja."
10014-2516 = "Sendo assim, como o Mestre, devo responder rapidamente. Primeiro, agir em vez de se preocupar!"
10014-2517 = "Portanto, a partir de hoje, serei ainda mais como uma ninja!"
10014-2518 = "Primeiro, vou colocar em prática, nin-nin!"
10014-2519 = "Tome cuidado para não se machucar fazendo coisas perigosas."
10014-2520 = "Eheheh, sim!"
10014-2521 = "Izuna gravou profundamente no coração o aviso do Mestre do outro dia."
10014-2522 = "Aviso? Do que você está falando...?"
10014-2523 = "Outro dia, o Mestre disse..."
10014-2524 = "Que seguir alguém sem permissão não é bom!"
10014-2525 = "Desculpe, acho que não me lembro...?"
10014-2526 = "Pensando bem, aconteceu algo assim..."
10014-2527 = "Eu reconsiderei as palavras que recebi do Mestre naquela ocasião."
10014-2528 = "Izuna, de agora em diante, vai parar de escoltar o Mestre secretamente!"
10014-2529 = "Ah, uhum..."
10014-2530 = "Em vez disso, a partir de hoje, vou escoltá-lo na sua frente!"
10014-2531 = "Até mais!"
10014-2532 = "Hum...?"
10014-2533 = "Mestre! Mestre!"
10014-2534 = "Notícia de última hora! Notícia exclusiva! É uma emergência!"
10014-2535 = "Por que está tão animada? O que aconteceu?"
10014-2536 = "Eu finalmente consegui a obra-prima favorita da Izuna, a série de drama de época de ninjas!"
10014-2537 = "Drama de época? Tipo uma série antiga?"
10014-2538 = "Sim!"
10014-2539 = "É uma obra-prima bem difícil de conseguir!"
10014-2540 = "Você vai assistir comigo, não vai, Mestre?!"
10014-2541 = "Vamos fazer uma sessão de cinema na casa da Izuna!"
10014-2542 = "Certo, então acho que vou dar uma passada."
10014-2543 = "Ah, muito obrigada!"
10014-2544 = "Eheheh! Então, estarei esperando!"
10014-2545 = "Fiquei feliz por poder aprender mais sobre ninjas com o Mestre!"
10014-2546 = "Da próxima vez, poderemos nos encontrar com a Izuna em um estado de ninja ainda mais perfeita, Mestre!"
10014-2547 = "É-é verdade...?"
10014-2548 = "A coisa mais importante para um ninja..."
10014-2549 = "É continuar treinando sem descanso, com a mentalidade de estar sempre em um campo de batalha!"
10014-2550 = "Com certeza, o treinamento é importante."
10014-2551 = "Dizem que uma mente sã habita um corpo são."
10014-2552 = "Sim, é exatamente isso!"
10014-2553 = "Para me tornar uma verdadeira ninja..."
10014-2554 = "Mesmo quando estou andando ou comendo,"
10014-2555 = "Mesmo quando estou dormindo profundamente, nunca perder a postura e o espírito de treinamento!"
10014-2556 = "Até mesmo dormindo!?"
10014-2557 = "Sim! Isso mesmo! Porque é o dia todo!"
10014-2558 = "Portanto, Mestre...!"
10014-2559 = "Para buscar ainda mais o caminho ninja, você poderia me acompanhar no treinamento da Izuna?"
10014-2560 = "Hmm. Ainda não entendi direito, mas tudo bem."
10014-2561 = "Consegui! Muito obrigada!"
10014-2562 = "Muito obrigada por me acompanhar no treinamento hoje! Mestre!"
10014-2563 = "De nada. A propósito, o que fizemos hoje, no fim das contas, foi mesmo um treinamento ou..."
10014-2564 = "Ah, o dorama de época vai começar!"
10014-2565 = "Bem, então, até mais tarde!"
10014-2566 = "Nin nin!"
10014-2567 = "A-ah, sim. Até mais..."
