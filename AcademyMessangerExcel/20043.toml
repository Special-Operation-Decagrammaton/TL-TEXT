[translation]
20043-200430010 = "Feliz Ano Novo~!"
20043-200430020 = "Feliz Ano Novo, Izumi."
20043-200430030 = "O ano começou!"
20043-200430040 = "Falando em Ano Novo... é aquilo!"
20043-200430050 = "Do que você acha que o Sensei está falando?"
20043-200430060 = "Já que é a Izumi quem está dizendo... comida?"
20043-200430070 = "Acertou! Mas, mas, não é qualquer uma, viu?"
20043-200430080 = "É algo especial que só dá para comer no Ano Novo!"
20043-200430090 = "O que o Sensei costuma comer no Ano Novo?"
20043-200430100 = "Talvez eu não tenha muita preferência?"
20043-200430110 = "Este ano, pelo menos, eu encomendei um antepasto."
20043-200430120 = "Entendi."
20043-200430130 = "Mas já que é um ano novo, comer algo especial também é bom!"
20043-200430140 = "Antepasto é uma boa!"
20043-200430150 = "Então o Sensei é do tipo que encomenda em vez de cozinhar."
20043-200430160 = "Eu também, este ano..."
20043-200430170 = "Tentei fazer pratos de Ano Novo!"
20043-200430180 = "Ficaria feliz se o Sensei pudesse ver."
20043-200430190 = "Sensei."
20043-200430200 = "Você tem tempo depois disso?"
20043-200430210 = "O que houve?"
20043-200430220 = "Aquele osechi especial de outro dia."
20043-200430230 = "O Sensei não comeu muito, então fiquei preocupada."
20043-200430240 = "Ah, não precisa se preocupar com isso!"
20043-200430250 = "Eu me preocupo sim!"
20043-200430260 = "Eu queria que você tivesse comido..."
20043-200430270 = "Por isso, na aventura de hoje,"
20043-200430280 = "preparei uma surpresa especial!"
20043-200430290 = "Fique na expectativa!"
20043-200430300 = "Obrigada por me levar, Sensei!"
20043-200430310 = "De nada."
20043-200430320 = "Mas não estava um pouco frio?"
20043-200430330 = "Como eu estava com a Izumi, não senti frio nenhum."
20043-200430340 = "Eu também!"
20043-200430350 = "É estranho, né?"
20043-200430360 = "Quando estou com o Sensei, cada dia parece novo."
20043-200430370 = "É como quando encontro um sabor novo!"
20043-200430380 = "Vamos sair juntos"
20043-200430390 = "em uma aventura gastronômica de novo!"
20043-200430400 = "Se possível, prefiro uma aventura normal..."
20043-200430410 = "Ah?"
20043-200430420 = "Entendi!"
20043-200430430 = "Então, o Sensei fica com a aventura normal!"
20043-200430440 = "Boa noite, Sensei."
20043-200430450 = "Boa noite, Izumi."
20043-200430460 = "Sim!"
