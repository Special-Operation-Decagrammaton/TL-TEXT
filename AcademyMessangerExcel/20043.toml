[translation]
20043-200430010 = "あけましておめでとう～！"
20043-200430020 = "あけましておめでとう、イズミ"
20043-200430030 = "年が明けたね！"
20043-200430040 = "元旦といえば……アレ！"
20043-200430050 = "先生は、何のことだと思う？"
20043-200430060 = "イズミが言うくらいだし……食べ物？"
20043-200430070 = "せいかーい！でもでも、普通のじゃないよ？"
20043-200430080 = "お正月にしか食べられない特別なヤツ！"
20043-200430090 = "先生はいつもお正月に何食べてるの？"
20043-200430100 = "あんまりこだわりはないかも？"
20043-200430110 = "一応今年は、オードブルを注文したよ"
20043-200430120 = "そっかぁ"
20043-200430130 = "でもせっかくの新年だし、特別なものを食べるのもいいよね！"
20043-200430140 = "オードブルいいね！"
20043-200430150 = "先生は作るんじゃなくて注文派なんだ"
20043-200430160 = "私も今年は……"
20043-200430170 = "お正月料理に挑戦してみたんだ！"
20043-200430180 = "先生に見てもらえたら嬉しいな"
20043-200430190 = "先生"
20043-200430200 = "この後って時間ある？"
20043-200430210 = "どうしたの？"
20043-200430220 = "この間のスペシャルおせち"
20043-200430230 = "先生はあんまり食べてなかったから気になっちゃって"
20043-200430240 = "え、気にしなくて大丈夫だよ！"
20043-200430250 = "気にするよ！"
20043-200430260 = "食べてもらいたかったし……"
20043-200430270 = "だから、今日の冒険は"
20043-200430280 = "とっておきのサプライズを用意したんだ！"
20043-200430290 = "楽しみにしててね！"
20043-200430300 = "送ってくれてありがとう、先生！"
20043-200430310 = "どういたしまして"
20043-200430320 = "でも、ちょっと寒くなかった？"
20043-200430330 = "イズミと一緒だったから、全然寒くなかったよ"
20043-200430340 = "私も！"
20043-200430350 = "不思議だよね"
20043-200430360 = "先生と一緒にいると、毎日が新鮮なんだ"
20043-200430370 = "新しい味に出会えた時みたい！"
20043-200430380 = "また一緒に"
20043-200430390 = "美食の冒険に出かけようね！"
20043-200430400 = "できれば普通の冒険がいいかな……"
20043-200430410 = "あれ？"
20043-200430420 = "分かった！"
20043-200430430 = "じゃあ、先生は普通の冒険で！"
20043-200430440 = "おやすみ、先生"
20043-200430450 = "イズミもおやすみ"
20043-200430460 = "うん！"
