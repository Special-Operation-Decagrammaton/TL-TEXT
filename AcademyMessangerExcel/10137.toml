[translation]
10137-101370010 = "Faz tempo que não nos vemos, Sensei."
10137-101370020 = "Aqui é Shima Konoka."
10137-101370030 = "Konoka!?"
10137-101370040 = "Você tá mais educada que o normal..."
10137-101370050 = "Do que é que você tá falando?"
10137-101370060 = "Eu sempre falo desse jeito, não acha?"
10137-101370070 = "Ah, é mesmo. A ação da sorte de hoje do horóscopo era 'apresente-se direito', então..."
10137-101370080 = "Eu resolvi dizer o meu nome."
10137-101370090 = "Ah, é mesmo, né! Eu não fazia a menor ideia, saca!"
10137-101370100 = "Sensei... o que deu em você?"
10137-101370110 = "Bom, deixa pra lá. Passe na Valkyrie depois, quando estiver livre."
10137-101370120 = "Tenho um assunto pra discutir sobre uns procedimentos administrativos."
10137-101370130 = "Isso aqui dói demaaaais."
10137-101370140 = "Você tá bem?"
10137-101370150 = "Ah, bem, esse nível de dor é tranquilo."
10137-101370160 = "Ainda bem que tinha leite na geladeira."
10137-101370170 = "A garota de hoje... ela vai sofrer alguma ação disciplinar?"
10137-101370180 = "Claro que não."
10137-101370190 = "Alguém capaz de desconfiar dos outros daquele jeito tem futuro na Valkyrie."
10137-101370200 = "Se eu fosse uma novata, teria feito a mesma coisa, sabia?"
10137-101370210 = "Que legal! Como esperado da Vice-Diretora!"
10137-101370220 = "Bom, além disso, dessa vez a culpa foi minha..."
10137-101370230 = "Mesmo o horóscopo tendo me avisado, eu não me apresentei direito..."
10137-101370240 = "Eu meio que colhi o que plantei."
10137-101370250 = "Sensei, como você tá?"
10137-101370260 = "A ação da sorte de hoje é 'cumprir os horários', parece."
10137-101370270 = "Bom, acho que ser pontual é meio que o mínimo, não é?"
10137-101370280 = "Mas também é algo surpreendentemente difícil de fazer."
10137-101370290 = "Pois é, as ações da sorte do horóscopo costumam ser coisas que a gente já deveria praticar no dia a dia, afinal."
10137-101370300 = "Então quando eu leio isso, acabo prestando mais atenção do que o normal."
10137-101370310 = "Só passei pra compartilhar qual era a ação da sorte de hoje!"
10137-101370320 = "Tenha um bom dia! Até mais~"
10137-101370330 = "Acho que acabei te assustando, né?"
10137-101370340 = "Mas nossa~ colocar a ação da sorte em prática logo de manhã dá uma sensação muito boa."
10137-101370350 = "Ser pontual... não era a ação da sorte de *ontem*?"
10137-101370360 = "Hã?"
10137-101370370 = "Aah..."
10137-101370380 = "Ehm, a de hoje é..."
10137-101370390 = "'Não se prenda muito ao tempo'."
10137-101370400 = "......"
10137-101370410 = "Aah..."
10137-101370420 = "Eu tenho umas informações confidenciais..."
10137-101370430 = "Bom, acho que tá tudo bem contar pro Sensei."
10137-101370440 = "Vou te mandar o endereço, vamos nos encontrar lá."
10137-101370450 = "E aí, Sensei."
10137-101370460 = "A ação da sorte de hoje é 'agir junto com o seu parceiro'!"
10137-101370470 = "Sendo assim, você não quer ser o meu parceiro pelo dia de hoje?"
10137-101370480 = "Conto com você!"
10137-101370490 = "Aah"
10137-101370500 = "Hoje eu vou tirar licença médica."
10137-101370510 = "Dá um jeito no plantão de hoje pra mim."
10137-101370520 = "Deixo o resto com você~"
10137-101370530 = "???"
10137-101370540 = "Que tipo de reação é essa pra sua superiora? Haa..."
10137-101370550 = "Peguei um resfriado na nossa última investigação."
10137-101370560 = "Então, conto com você."
10137-101370570 = "Totalmente! Recuperada!"
10137-101370580 = "Sensei, muito obrigada pelo outro dia."
10137-101370590 = "Espero não ter te passado o meu resfriado."
10137-101370600 = "Tudo tranquilo!"
10137-101370610 = "Só tô com febre alta e o meu corpo e garganta doendo, só isso!"
10137-101370620 = "Isso é definitivamente um resfriado."
10137-101370630 = "Nesse caso..."
10137-101370640 = "Como retribuição, vou aí cuidar de você."
10137-101370650 = "Eu até vou te pagar um Lámen Tonkotsu!"