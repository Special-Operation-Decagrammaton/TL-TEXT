[translation]
10137-101370010 = "ご無沙汰してます、先生"
10137-101370020 = "志真コノカです"
10137-101370030 = "コノカ！？"
10137-101370040 = "普段より丁寧だ……"
10137-101370050 = "何言ってるんですか？"
10137-101370060 = "いつもこの口調だと思いますけど"
10137-101370070 = "ああそうだ、今日のラッキー行動に「自己紹介をちゃんとする」と書いてあったので"
10137-101370080 = "名乗ってみました"
10137-101370090 = "そうなんすね！全然知らなかったっす！"
10137-101370100 = "先生……どうしたんですか？"
10137-101370110 = "まあいいや。後でお手隙の時にヴァルキューレに来てください"
10137-101370120 = "行政手続きのことでご相談があるので"
10137-101370130 = "けっこーつらいです、これ"
10137-101370140 = "大丈夫？"
10137-101370150 = "あー、まぁ、このくらいなら全然"
10137-101370160 = "冷蔵庫に牛乳があって助かりました"
10137-101370170 = "今日の子……懲戒処分になったりするの？"
10137-101370180 = "そんなまさか"
10137-101370190 = "あのくらい人を疑える方がヴァルキューレには向いてるんですよ"
10137-101370200 = "あたしも新人だったら同じことしたでしょうし？"
10137-101370210 = "かっこいいね！さすがは副局長！"
10137-101370220 = "まぁ、それに今回はあたしも悪いです……"
10137-101370230 = "占いでも言われてたのに、自己紹介を丁寧にしなかったわけですし……"
10137-101370240 = "身から出た錆ってことで"
10137-101370250 = "先生、元気してました？"
10137-101370260 = "今日のラッキー行動は「時間を守ること」だとか"
10137-101370270 = "まあ、時間を守るなんて当然だと思うんですけどね？"
10137-101370280 = "意外と難しいことでもあるけどね"
10137-101370290 = "まあ、占いのラッキー行動って普段から実践したほうがいいことでもあるので"
10137-101370300 = "書いてあったらとりあえず普段以上に意識しようかなってなるんですよね"
10137-101370310 = "今日はこんなラッキー行動でしたって共有でした！"
10137-101370320 = "良い一日を！ではでは～"
10137-101370330 = "びっくりさせちゃいましたかね"
10137-101370340 = "いや～朝からラッキー行動を実践するのって気持ちがいいですね"
10137-101370350 = "時間厳守って……昨日のラッキー行動じゃなかった？"
10137-101370360 = "え？"
10137-101370370 = "ああ……"
10137-101370380 = "えっと、今日は……"
10137-101370390 = "「あまり時間にとらわれないこと」"
10137-101370400 = "……"
10137-101370410 = "あー……"
10137-101370420 = "機密情報があるんですけど……"
10137-101370430 = "まあ先生になら教えてもいいかなって"
10137-101370440 = "住所を送るので、そこで落ち合いましょう"
10137-101370450 = "ちわーっす、先生"
10137-101370460 = "今日のラッキー行動は、「バディと一緒に行動する」だそうです！"
10137-101370470 = "てなわけで、今日一日あたしのバディになってくれませんか？"
10137-101370480 = "よろしくお願いします！"
10137-101370490 = "あー"
10137-101370500 = "今日あたし病欠するから"
10137-101370510 = "日直、適当にやっといて"
10137-101370520 = "あとは任せたよ～"
10137-101370530 = "？？"
10137-101370540 = "上司に向かってなんだその反応？はぁ……"
10137-101370550 = "この間の捜査で風邪引いちゃったの"
10137-101370560 = "んじゃ、よろしくね"
10137-101370570 = "完全！回復！"
10137-101370580 = "先生、先日はありがとうございました"
10137-101370590 = "風邪、移ったりしてないですよね？"
10137-101370600 = "大丈夫だよ！"
10137-101370610 = "ちょっと熱が高くて、喉と身体が痛いだけだよ！"
10137-101370620 = "それ絶対風邪じゃないですか"
10137-101370630 = "それじゃあ……"
10137-101370640 = "お返しに、お見舞いに行きますね"
10137-101370650 = "豚骨ラーメン奢ってあげますから！"
