[translation]
10137-101370010 = "Há quanto tempo, Sensei."
10137-101370020 = "Sou Shima Konoka."
10137-101370030 = "Konoka!?"
10137-101370040 = "Ela está mais formal que o normal..."
10137-101370050 = "O que está dizendo?"
10137-101370060 = "Acho que sempre falo assim."
10137-101370070 = "Ah, sim. A ação da sorte de hoje dizia para 'fazer uma autoapresentação adequada'."
10137-101370080 = "Então me apresentei."
10137-101370090 = "É mesmo! Eu não sabia de nada!"
10137-101370100 = "Sensei... o que houve?"
10137-101370110 = "Bem, tanto faz. Por favor, venha para Valkyrie quando tiver um tempo livre."
10137-101370120 = "Preciso discutir alguns procedimentos administrativos com você."
10137-101370130 = "Isso é bem difícil."
10137-101370140 = "Está tudo bem?"
10137-101370150 = "Ah, bem, isso não é nada demais."
10137-101370160 = "Ainda bem que tinha leite na geladeira."
10137-101370170 = "A garota de hoje... vai ser disciplinada?"
10137-101370180 = "De jeito nenhum."
10137-101370190 = "Alguém que consegue desconfiar das pessoas daquele jeito é mais adequado para Valkyrie."
10137-101370200 = "Eu teria feito a mesma coisa se fosse uma novata, não é?"
10137-101370210 = "Que legal! Como esperado da Vice-Diretora!"
10137-101370220 = "Bem, e desta vez, a culpa também é minha..."
10137-101370230 = "Mesmo com o que o horóscopo disse, eu não fiz uma autoapresentação adequada..."
10137-101370240 = "É o que se colhe."
10137-101370250 = "Sensei, como tem passado?"
10137-101370260 = "A ação da sorte de hoje é 'ser pontual'."
10137-101370270 = "Bem, acho que ser pontual é algo óbvio, não é?"
10137-101370280 = "Mas também é algo surpreendentemente difícil."
10137-101370290 = "Bem, as ações da sorte do horóscopo são coisas que deveríamos praticar no dia a dia."
10137-101370300 = "Então, se está escrito, eu tento prestar mais atenção do que o normal."
10137-101370310 = "Foi só para compartilhar qual era a ação da sorte de hoje!"
10137-101370320 = "Tenha um bom dia! Até mais!"
10137-101370330 = "Acho que te assustei, não foi?"
10137-101370340 = "Ah, é tão bom praticar as ações da sorte logo de manhã."
10137-101370350 = "Ser pontual... não era a ação da sorte de ontem?"
10137-101370360 = "Hã?"
10137-101370370 = "Ah..."
10137-101370380 = "Uhm, hoje é..."
10137-101370390 = "'Não se prender muito ao tempo'."
10137-101370400 = "..."
10137-101370410 = "Ah..."
10137-101370420 = "Tenho uma informação confidencial..."
10137-101370430 = "Mas acho que posso contar ao Sensei."
10137-101370440 = "Vou enviar o endereço, vamos nos encontrar lá."
10137-101370450 = "Olá, Sensei."
10137-101370460 = "A ação da sorte de hoje é 'agir com um parceiro'!"
10137-101370470 = "Então, você poderia ser meu parceiro por hoje?"
10137-101370480 = "Conto com você!"
10137-101370490 = "Ah..."
10137-101370500 = "Vou tirar licença médica hoje."
10137-101370510 = "Responsável do dia, faça isso de qualquer jeito."
10137-101370520 = "O resto é com você~"
10137-101370530 = "??"
10137-101370540 = "Que reação é essa para o seu superior? Haa..."
10137-101370550 = "Peguei um resfriado na última investigação."
10137-101370560 = "Então, conto com você."
10137-101370570 = "Completa! Recuperação!"
10137-101370580 = "Professor(a), muito obrigado(a) pelo outro dia."
10137-101370590 = "Não pegou o resfriado, certo?"
10137-101370600 = "Está tudo bem!"
10137-101370610 = "Só estou com um pouco de febre alta e a garganta e o corpo doem!"
10137-101370620 = "Isso com certeza é um resfriado!"
10137-101370630 = "Então..."
10137-101370640 = "Em retribuição, vou te fazer uma visita."
10137-101370650 = "Vou te pagar um ramen Tonkotsu!"
