[translation]
20033-200330010 = "時が来た"
20033-200330020 = "……？"
20033-200330030 = "キキキッ、そう狼狽える必要は無い"
20033-200330040 = "私の完璧な計画が整ったという知らせだ"
20033-200330050 = "いよいよ、この羽沼マコト様の……"
20033-200330060 = "いや、我々の偉大な物語が始まるのだ！"
20033-200330070 = "…………？"
20033-200330080 = "さあ、シャーレの先生よ"
20033-200330090 = "万魔殿で待っているぞ、キキキッ"
20033-200330100 = "えっと……万魔殿に来てほしい、って意味だよね……？"
20033-200330110 = "キキッ。久しぶりだな、先生"
20033-200330120 = "おはよう、マコト"
20033-200330130 = "このマコト様からモモトークが届いても、まったく動揺を見せないその反応"
20033-200330140 = "さすがは私が認めただけの者だ、ますます気に入ったぞ"
20033-200330150 = "ありがとうございます……？"
20033-200330160 = "雑談はここまでにして、さっそく本題だ"
20033-200330170 = "今日、先生に連絡した理由は――"
20033-200330180 = "……うむ、もう着いたのか"
20033-200330190 = "今日はどこに出かけてるの？"
20033-200330200 = "どこって、シャーレに決まっているじゃないか"
20033-200330210 = "え、シャーレに？今？"
20033-200330220 = "キキキッ。続きは直接、顔を合わせて話すとしよう"
20033-200330230 = "あ、あの……？"
20033-200330240 = "キキキッ、キシシシシ！流石は私だ！！"
20033-200330250 = "前に言っていたメーカーの取扱店舗を見つけたぞ、イロハ！"
20033-200330260 = "マコト様の辞書に不可能の文字は存在しないと、また証明されてしまったな！"
20033-200330270 = "さあ！この偉大なマコト様にひれ伏すがいい！"
20033-200330280 = "……えっと、急にどうしたの？"
20033-200330290 = "ん？"
20033-200330300 = "おっと"
20033-200330310 = "通知を見て何かと思ったが……"
20033-200330320 = "なるほど"
20033-200330330 = "イロハと間違えて先生に送ってしまったようだ"
20033-200330340 = "……あの、二人は普段どういう会話をしているの？"
20033-200330350 = "日常会話だが……？"
20033-200330360 = "ともかく、ミスは謝ろう"
20033-200330370 = "そういえば、先生も今週末は休みだったな？"
20033-200330380 = "キキキッ、お互い楽しい週末にしよう"
20033-200330390 = "あ、うん。マコトも楽しんでね……？"
20033-200330400 = "時が来た"
20033-200330410 = "デジャブのような……"
20033-200330420 = "前にも同じメッセージをもらったような……"
20033-200330430 = "キシシッ、そうだったか？"
20033-200330440 = "前に、このマコト様が進めているビジネスを紹介しただろう"
20033-200330450 = "いよいよ、お披露目の準備が整ったぞ"
20033-200330460 = "それで連絡したのだ"
20033-200330470 = "思っていたよりも早くて驚いたよ"
20033-200330480 = "早速だが、今日は空いているか？"
20033-200330490 = "もちろん、時間ならあるけど……"
20033-200330500 = "キキキッ。よし！では、すぐ迎えに行こう！"
