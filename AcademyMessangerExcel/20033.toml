[translation]
20033-200330010 = "Chegou a hora"
20033-200330020 = "……？"
20033-200330030 = "Kikiki, não precisa ficar tão agitado"
20033-200330040 = "É um aviso de que meu plano perfeito está pronto"
20033-200330050 = "Finalmente, a grande história de nós..."
20033-200330060 = "Não, a grande história de nós, Hanuma Makoto, vai começar!"
20033-200330070 = "…………？"
20033-200330080 = "Vamos lá, Sensei do Schale"
20033-200330090 = "Estou esperando no Pandemonium, kikiki"
20033-200330100 = "Bem... isso significa que você quer que eu vá ao Pandemonium, certo...?"
20033-200330110 = "Kiki. Quanto tempo, Sensei"
20033-200330120 = "Bom dia, Makoto"
20033-200330130 = "Essa sua reação, sem demonstrar qualquer agitação mesmo recebendo um MomoTalk desta que vos fala, Makoto-sama"
20033-200330140 = "Como esperado de alguém que eu reconheço, gostei ainda mais de você"
20033-200330150 = "Obrigado...? "
20033-200330160 = "Chega de conversa fiada, vamos ao que interessa"
20033-200330170 = "O motivo de eu ter entrado em contato com você hoje é..."
20033-200330180 = "...Hum, você já chegou?"
20033-200330190 = "Onde você está indo hoje?"
20033-200330200 = "Onde? No Schale, é claro"
20033-200330210 = "Ah, no Schale? Agora?"
20033-200330220 = "Kikiki. Vamos continuar essa conversa pessoalmente"
20033-200330230 = "A-ah, desculpe...?"
20033-200330240 = "Kikiki, kishishishi! Como esperado de mim!!"
20033-200330250 = "Encontrei a loja que vende aquela marca que eu mencionei, Iroha!"
20033-200330260 = "Mais uma vez, ficou provado que a palavra 'impossível' não existe no dicionário de Makoto-sama!"
20033-200330270 = "Vamos! Curve-se diante desta grande Makoto!"
20033-200330280 = "...Bem, o que aconteceu de repente?"
20033-200330290 = "Hm?"
20033-200330300 = "Opa"
20033-200330310 = "Vi a notificação e fiquei pensando no que era..."
20033-200330320 = "Entendo"
20033-200330330 = "Parece que enviei para o Sensei por engano, achando que era a Iroha"
20033-200330340 = "...Diga-me, como vocês dois costumam conversar?"
20033-200330350 = "Conversas cotidianas, por quê...?"
20033-200330360 = "De qualquer forma, peço desculpas pelo erro"
20033-200330370 = "Falando nisso, o Sensei também está de folga neste fim de semana, não é?"
20033-200330380 = "Kikiki, vamos ter um ótimo fim de semana"
20033-200330390 = "Ah, sim. Divirta-se também, Makoto...?"
20033-200330400 = "Chegou a hora"
20033-200330410 = "Uma sensação de déjà vu..."
20033-200330420 = "Parece que recebi a mesma mensagem antes..."
20033-200330430 = "Kishishi, foi mesmo?"
20033-200330440 = "Eu apresentei o negócio que estou promovendo antes, lembra?"
20033-200330450 = "Finalmente, os preparativos para a revelação estão prontos"
20033-200330460 = "Foi por isso que entrei em contato"
20033-200330470 = "Fiquei surpreso por ter sido mais rápido do que eu pensava"
20033-200330480 = "Indo direto ao ponto, você está livre hoje?"
20033-200330490 = "Claro, eu tenho tempo, mas..."
20033-200330500 = "Kikiki. Ótimo! Então, vou te buscar agora mesmo!"
