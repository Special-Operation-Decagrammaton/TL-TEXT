[translation]
16005-16005010 = "先生。今お時間大丈夫でしょうか"
16005-16005020 = "少々困った状況でして"
16005-16005030 = "よろしければ、先生に助けていただきたいです"
16005-16005040 = "大丈夫？すぐに行くね"
16005-16005050 = "もちろん、今どこにいる？"
16005-16005060 = "ありがとうございます、先生"
16005-16005070 = "それでは、あの海辺で待機しております"
16005-16005080 = "その"
16005-16005090 = "申し訳ございません、先生"
16005-16005100 = "自分からお呼びしておいて、あんな風に……"
16005-16005110 = "ううん、気にしないで"
16005-16005120 = "またいつでも気軽に呼んで"
16005-16005130 = "え"
16005-16005140 = "本当に、良いのですか……？"
16005-16005150 = "……"
16005-16005160 = "ありがとうございます。また連絡いたします"
16005-16005170 = "先生"
16005-16005180 = "あの件は大変失礼いたしました。申し訳ありませんでした"
16005-16005190 = "大丈夫だよ、気にしないで"
16005-16005200 = "落ち着いた？"
16005-16005210 = "はい。ありがとうございます"
16005-16005220 = "結局、お化けは捕まりませんでした……"
16005-16005230 = "他のところに行っても同じ状況なので、どうしようかなと"
16005-16005240 = "じゃあ今からそっちに行くね"
16005-16005250 = "ちょっと待っててくれる？"
16005-16005260 = "はい"
16005-16005270 = "……"
16005-16005280 = "はい？"
16005-16005290 = "先生？"
16005-16005300 = "本当にありがとうございました、先生"
16005-16005310 = "おかげさまで初めて、想像していた通りに海を満喫できた気がします"
16005-16005320 = "それも先生とだなんて"
16005-16005330 = "すみません、今のは忘れてください"
16005-16005340 = "くひ"
16005-16005350 = "くひひひひけへへへへっ"
16005-16005360 = "きひっ"
16005-16005370 = "……"
16005-16005380 = "あ"
16005-16005390 = "すみません"
16005-16005400 = "音声入力？"
16005-16005410 = "ツルギ？どうかした？"
16005-16005420 = "すみません"
16005-16005430 = "何でもありません、失礼いたしました"
16005-16005440 = "ツルギ　拝具"
16005-16005450 = "先生、ツルギです"
16005-16005460 = "おかげさまで、スッキリしました"
16005-16005470 = "もし帰ってから楽しかったかと聞かれたら、迷わず答えられると思います"
16005-16005480 = "あらためて、本当にありがとうございます"
16005-16005490 = "その"
16005-16005500 = "もしまた機会があれば、先生さえよろしければ。また、一緒に"
16005-16005510 = "いえ。えっと、とにかくその……"
16005-16005520 = "これからも、よろしくお願いいたします"
16005-16005530 = "ツルギ　拝具"
