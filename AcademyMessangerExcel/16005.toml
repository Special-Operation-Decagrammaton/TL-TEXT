[translation]
16005-16005010 = "Sensei. Você tem um momento?"
16005-16005020 = "Estou em uma situação um pouco complicada."
16005-16005030 = "Se não for incômodo, eu gostaria que o Sensei me ajudasse."
16005-16005040 = "Tudo bem? Já estou indo."
16005-16005050 = "Claro, onde você está agora?"
16005-16005060 = "Muito obrigada, Sensei."
16005-16005070 = "Então, estarei esperando naquela praia."
16005-16005080 = "Sobre aquilo..."
16005-16005090 = "Peço mil desculpas, Sensei."
16005-16005100 = "Eu mesma chamei você e acabei agindo daquela forma..."
16005-16005110 = "Não, não se preocupe com isso."
16005-16005120 = "Pode me chamar quando quiser."
16005-16005130 = "Eh?"
16005-16005140 = "Sério, tudo bem mesmo...?"
16005-16005150 = "..."
16005-16005160 = "Muito obrigada. Entrarei em contato novamente."
16005-16005170 = "Sensei."
16005-16005180 = "Sinto muito pelo que aconteceu antes. Peço perdão."
16005-16005190 = "Está tudo bem, não se preocupe."
16005-16005200 = "Você se acalmou?"
16005-16005210 = "Sim. Muito obrigada."
16005-16005220 = "No fim, o fantasma não foi capturado..."
16005-16005230 = "A situação é a mesma em outros lugares, então não sei o que fazer."
16005-16005240 = "Então estou indo para aí agora."
16005-16005250 = "Pode me esperar um pouco?"
16005-16005260 = "Sim."
16005-16005270 = "..."
16005-16005280 = "Sim?"
16005-16005290 = "Sensei?"
16005-16005300 = "Muito obrigada mesmo, Sensei."
16005-16005310 = "Graças a você, sinto que pela primeira vez pude aproveitar a praia como eu imaginava."
16005-16005320 = "E ainda por cima, com o Sensei."
16005-16005330 = "Desculpe, esqueça o que eu disse agora."
16005-16005340 = "Kuhi."
16005-16005350 = "Kuhihihihihehehehe."
16005-16005360 = "Kihi."
16005-16005370 = "..."
16005-16005380 = "Ah."
16005-16005390 = "Desculpe."
16005-16005400 = "Entrada de voz?"
16005-16005410 = "Tsurugi? Aconteceu alguma coisa?"
16005-16005420 = "Desculpe."
16005-16005430 = "Não é nada, peço perdão."
16005-16005440 = "De Tsurugi."
16005-16005450 = "Sensei, aqui é a Tsurugi."
16005-16005460 = "Graças a você, me sinto muito melhor."
16005-16005470 = "Se me perguntassem ao voltar se foi divertido, eu responderia sem hesitar."
16005-16005480 = "Mais uma vez, muito obrigada."
16005-16005490 = "Sobre isso..."
16005-16005500 = "Se houver outra oportunidade, e se o Sensei quiser... podemos ir juntos de novo."
16005-16005510 = "Não. Bem, de qualquer forma..."
16005-16005520 = "De agora em diante, conto com você."
16005-16005530 = "Atenciosamente, Tsurugi"
