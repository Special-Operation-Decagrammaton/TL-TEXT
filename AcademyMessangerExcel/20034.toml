20034-200340030 = "当たり前ですよ★"
20034-200340040 = "こういうのって往々にして新たな美食に出会えるチャンスですから"
20034-200340050 = "美食に……？"
20034-200340060 = "フフ"
20034-200340070 = "先生、そう考えたらワクワクしませんか？"
20034-200340080 = "私はとってもワクワクしています！"
20034-200340090 = "お雑煮って美味しいですよね"
20034-200340100 = "それ故に、些細な問題があるともいえます"
20034-200340110 = "アカリが言うと"
20034-200340120 = "ちっとも些細じゃなさそう……"
20034-200340130 = "あら"
20034-200340140 = "今回は本当に些細ですよ？"
20034-200340150 = "美味しさのあまり家のお餅を全部"
20034-200340160 = "お雑煮用に使い切ってしまったんです"
20034-200340170 = "過ぎたるは猶及ばざるが如し……"
20034-200340180 = "だって、お餅をたくさん食べたかったんですもの"
20034-200340190 = "それで"
20034-200340200 = "解決策を思いついたんです"
20034-200340210 = "特別な食べ物と一緒に、特別な時間を過ごす……"
20034-200340220 = "このシーズンの"
20034-200340230 = "最も素敵なところです"
20034-200340240 = "何か食べたいものでもある？"
20034-200340250 = "食べたいものというより"
20034-200340260 = "食べてみたくなったもの、があります"
20034-200340270 = "口コミの威力ってすごいですね"
20034-200340280 = "自然と食べたい気持ちにさせられちゃいます"
20034-200340290 = "グルメの記事でも読んだのかな？"
20034-200340300 = "その通り"
20034-200340310 = "きっと先生も、気になると思いますよ！"
