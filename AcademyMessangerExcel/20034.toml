[translation]
20034-200340010 = "Nesta temporada, vários eventos estão sendo realizados no centro comercial, não é?"
20034-200340020 = "Então a Akari também se interessa por esse tipo de coisa."
20034-200340030 = "É claro que sim★"
20034-200340040 = "Eventos assim são, muitas vezes, uma chance de encontrar novas iguarias."
20034-200340050 = "Iguarias...?"
20034-200340060 = "Fufu."
20034-200340070 = "Sensei, pensando por esse lado, você não fica empolgado?"
20034-200340080 = "Eu estou muito empolgada!"
20034-200340090 = "Ozoni é delicioso, não é?"
20034-200340100 = "Por causa disso, pode-se dizer que existe um pequeno problema."
20034-200340110 = "Quando a Akari diz isso..."
20034-200340120 = "Não parece nada pequeno..."
20034-200340130 = "Ora."
20034-200340140 = "Desta vez é realmente algo pequeno, sabe?"
20034-200340150 = "De tão delicioso que estava, acabei usando todos os bolinhos de arroz"
20034-200340160 = "da minha casa para fazer o Ozoni."
20034-200340170 = "O excesso é tão ruim quanto a falta..."
20034-200340180 = "É que eu queria comer muitos bolinhos de arroz."
20034-200340190 = "Então,"
20034-200340200 = "eu pensei em uma solução."
20034-200340210 = "Passar um tempo especial, com uma comida especial..."
20034-200340220 = "Essa é a melhor parte"
20034-200340230 = "desta temporada."
20034-200340240 = "Tem algo que você queira comer?"
20034-200340250 = "Mais do que algo que eu queira comer,"
20034-200340260 = "tem algo que eu fiquei com vontade de experimentar."
20034-200340270 = "O poder das recomendações é incrível, não é?"
20034-200340280 = "Elas fazem a gente ficar com vontade de comer naturalmente."
20034-200340290 = "Você leu algum artigo sobre gastronomia?"
20034-200340300 = "Exatamente."
20034-200340310 = "Tenho certeza de que você também vai se interessar, Sensei!"
