20048-200480140 = "皆さんで楽しむために用意したのですが、まだ誰も使ってないようで……"
20048-200480150 = "一体何が入ってるの……？"
20048-200480160 = "先生"
20048-200480170 = "私のことは、お気になさらずに……"
20048-200480180 = "え……？"
20048-200480190 = "先生"
20048-200480200 = "釣りの心得はありますか？"
