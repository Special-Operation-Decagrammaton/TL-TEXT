[translation]
20048-200480010 = "Sensei"
20048-200480020 = "Está aproveitando as férias?"
20048-200480030 = "Graças a você, estou conseguindo descansar bem."
20048-200480040 = "Fico feliz em ouvir isso."
20048-200480050 = "Se não se importar, de forma silenciosa..."
20048-200480060 = "E rapidamente..."
20048-200480070 = "Poderia vir até a minha barraca?"
20048-200480080 = "Hm?"
20048-200480090 = "Sensei, ao lado daquela palmeira grande,"
20048-200480100 = "você não viu uma barraca bege?"
20048-200480110 = "Ah, eu vi agorinha."
20048-200480120 = "Eu esqueci de mencionar,"
20048-200480130 = "mas sinta-se à vontade para usar o que estiver lá dentro."
20048-200480140 = "Preparei para que todos pudessem aproveitar, mas parece que ninguém usou ainda..."
20048-200480150 = "O que tem lá dentro, afinal...?"
20048-200480160 = "Sensei."
20048-200480170 = "Não se preocupe comigo..."
20048-200480180 = "Hã...?"
20048-200480190 = "Sensei."
20048-200480200 = "Você entende de pesca?"
20048-200480210 = "Só um pouquinho...?"
20048-200480220 = "Se não for incômodo,"
20048-200480230 = "eu gostaria que me ajudasse com algo na piscina."
