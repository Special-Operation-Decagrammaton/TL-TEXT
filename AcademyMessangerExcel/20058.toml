[translation]
20058-200580010 = "Яху, Сенсей."
20058-200580020 = "Это Эрика?"
20058-200580030 = "Привет."
20058-200580040 = "Ах, отлично."
20058-200580050 = "Ты добавил меня в контакты."
20058-200580060 = "Я даже как-то рада этому, лол."
20058-200580070 = "Прости за сегодня."
20058-200580080 = "Хоть тебе это было и не особо интересно..."
20058-200580090 = "кажется, я зря протаскала тебя за собой..."
20058-200580100 = "Вовсе нет. Было весело!"
20058-200580110 = "Зато теперь мы знаем, что нравится Эрике."
20058-200580120 = "Ого."
20058-200580130 = "Я немного удивлена, что ты так говоришь."
20058-200580140 = "Было весело! Спасибо."
20058-200580150 = "Мне удалось достать ту штуку, о которой я говорила!"
20058-200580160 = "О, как здорово!"
20058-200580170 = "Ехехе. Я так сильно её хотела."
20058-200580180 = "Я ведь обошла и проверила абсолютно каждый магазин в Д.У.!"
20058-200580190 = "До такой поздней ночи?"
20058-200580200 = " Ага. Я так увлеклась, что засиделась допоздна, лол."
20058-200580210 = "У меня даже времени поужинать не было~"
20058-200580220 = "У меня тоже!"
20058-200580230 = "О, а ты где сейчас, Сенсей?"
20058-200580240 = "Если хочешь, может, перекусим где-нибудь вместе?"
20058-200580250 = "За сегодня тоже спасибо, Сенсей."
20058-200580260 = "Мало того, что ты меня угостил, так ещё и до дома проводил..."
20058-200580270 = "Не слишком ли ты добр ко мне?"
20058-200580280 = "В конце концов, уже глубокая ночь."
20058-200580290 = "Ну, в этом есть смысл."
20058-200580300 = "Спасибо."
20058-200580310 = "В следующий раз угощаю я!"
20058-200580320 = "Отдашь мне свои томаты в следующий раз?"
20058-200580330 = "Ты до сих пор припоминаешь это, лол."
20058-200580340 = "Хм-м~ и что же мне делать?"
20058-200580350 = "Така-а-ая жара. Разве это не жесть?"
20058-200580360 = "Да, сегодня просто кошмар."
20058-200580370 = "Серьёзно, лол."
20058-200580380 = "Когда пойдёшь на улицу,"
20058-200580390 = "обязательно пей побольше воды~!"
20058-200580400 = "О, точно."
20058-200580410 = "Не забывай нормально менять пластырь после мытья рук."
20058-200580420 = "А то микробы расплодятся."
20058-200580430 = "Но он ведь миленький."
20058-200580440 = "Так нельзя, из-за этого рана будет дольше затягиваться."
20058-200580450 = "Погоди, он тебе правда понравился?"
20058-200580460 = "А где такие продаются?"
20058-200580470 = "А вот не скажу~"
20058-200580480 = "Смотри не поранься больше, ладно?"
20058-200580490 = "У тебя есть немного свободного времени?"
20058-200580500 = "Я была бы рада, если бы мы могли встретиться."
20058-200580510 = "Что-то случилось?"
20058-200580520 = "Хм-м..."
20058-200580530 = "Кое о чём хочу поговорить с тобой."
20058-200580540 = "Хотелось бы поболтать."
20058-200580550 = "Как насчёт прямо сейчас?"
20058-200580560 = "Прямо сейчас!?"
20058-200580570 = "Мне стоит рассказать об этом подругам тоже?"
20058-200580580 = "Думаю, мне и самой время от времени нужно побыть одной."
20058-200580590 = "Хм-м, но как-то..."
20058-200580600 = "Тебе не кажется, что это не особо вяжется с моим характером?"
20058-200580610 = "Ты пыталась строить из себя другого человека, Эрика?"
20058-200580620 = "....."
20058-200580630 = "Ой, серьёзно?!"
20058-200580640 = "Ну ты и вредина."
20058-200580650 = "Сенсей, ты видел сегодня небо?"
20058-200580660 = "Нет, а что такое?"
20058-200580670 = "Я сейчас в метро,"
20058-200580680 = "оно правда очень красивое."
20058-200580690 = "Взгляни, когда выйдешь на улицу."
20058-200580700 = "Ты точно будешь поражён."
20058-200580710 = "Я доверюсь тебе в этом, идёт?"
20058-200580720 = "Да неее, лол."
20058-200580730 = "Я бы не стала врать о таком!"
20058-200580740 = "Вообще-то я сейчас еду в Gehenna."
20058-200580750 = "Э!?"
20058-200580760 = "Сегодня был мирный день, правда ведь?"
20058-200580770 = "Да, это так."
20058-200580780 = "С тех самых пор..."
20058-200580790 = "я никак не могу успокоиться."
20058-200580800 = "Ну, без разницы."
20058-200580810 = "Я рада, если ты остался доволен, Сенсей."
20058-200580820 = "Небо, которое я видел вместе с тобой, было действительно прекрасным, Эрика."
20058-200580830 = "Давай как-нибудь снова сходим вместе."
20058-200580840 = "Ууу"
20058-200580850 = "Ах--"
20058-200580860 = "Серьёзно..."
20058-200580870 = "Ты опять говоришь такое---"
20058-200580880 = "..."
20058-200580890 = "Да."
20058-200580900 = "Давай снова сходим вместе."