[translation]
20058-200580010 = "やっほ、先生"
20058-200580020 = "エリカであってる？"
20058-200580030 = "こんにちは"
20058-200580040 = "あ、良かった"
20058-200580050 = "登録してくれてたんだ"
20058-200580060 = "なんか嬉しいかも笑"
20058-200580070 = "今日はごめんね"
20058-200580080 = "先生はあまり興味ないのに"
20058-200580090 = "連れ回しちゃったかもだけど……"
20058-200580100 = "全然。楽しかったよ！"
20058-200580110 = "エリカの好み探しだね"
20058-200580120 = "わお"
20058-200580130 = "そんな風に言ってくれるなんて、ちょっと意外"
20058-200580140 = "楽しかった！ありがとね"
20058-200580150 = "前言ってたやつ、買えたよ！"
20058-200580160 = "お、よかった！"
20058-200580170 = "えへへ。これが欲しくて"
20058-200580180 = "D.U.のお店ぜーんぶみて回ったんだから！"
20058-200580190 = "こんな時間まで？"
20058-200580200 = "そうなんだよね。夢中になってたらこんな時間になっちゃった笑"
20058-200580210 = "夜ご飯食べる時間もなかったよ～"
20058-200580220 = "私も！"
20058-200580230 = "お、先生いまどこにいるの？"
20058-200580240 = "よかったら一緒にご飯食べない？"
20058-200580250 = "先生、今日もありがとね"
20058-200580260 = "ご馳走してもらった上に送ってもらっちゃって……"
20058-200580270 = "ちょっと優しすぎない？"
20058-200580280 = "時間も遅いからね"
20058-200580290 = "まぁそれもそっか"
20058-200580300 = "ありがと"
20058-200580310 = "今度は私が奢るね！"
20058-200580320 = "今度はトマトくれる？"
20058-200580330 = "まだ引っ張ってるのそれ笑"
20058-200580340 = "ん～どうしよっかな？"
20058-200580350 = "あつーい。マジヤバくない？"
20058-200580360 = "ね、今日やばいね"
20058-200580370 = "ほんと笑笑"
20058-200580380 = "外出る時は"
20058-200580390 = "ちゃんと水分とるんだよ～！"
20058-200580400 = "あ、そうだ"
20058-200580410 = "手を洗ったりした時はちゃんと絆創膏変えるんだよ"
20058-200580420 = "雑菌繁殖しちゃうからね"
20058-200580430 = "これ可愛いのに"
20058-200580440 = "傷の治りが遅くなるからダメ"
20058-200580450 = "てか、それ気に入ってくれたんだ？"
20058-200580460 = "これどこで売ってるの？"
20058-200580470 = "教えませーん"
20058-200580480 = "また怪我しないでよ？"
20058-200580490 = "暇な時間ある？"
20058-200580500 = "会えたら嬉しいんだけど"
20058-200580510 = "何かあったの？"
20058-200580520 = "んー"
20058-200580530 = "ちょっと相談したいことがあって"
20058-200580540 = "話せたらなーと"
20058-200580550 = "今からとかどうかな？"
20058-200580560 = "今から！？"
20058-200580570 = "友達にも言ってみようかな？"
20058-200580580 = "たまには一人の時間も必要かもって"
20058-200580590 = "んー、でもなんか"
20058-200580600 = "私のキャラと違う気がするかな"
20058-200580610 = "エリカってキャラ作ってたんだ？"
20058-200580620 = "……"
20058-200580630 = "そうだったんだ！？"
20058-200580640 = "意地悪な人"
20058-200580650 = "先生、今日の空見た？"
20058-200580660 = "見れてないけど、どうかした？"
20058-200580670 = "いま地下鉄に乗ってて"
20058-200580680 = "すごい綺麗なんだ"
20058-200580690 = "外出たらちょっと見てみて"
20058-200580700 = "絶対感動するから"
20058-200580710 = "信じるからね？"
20058-200580720 = "いやいや笑"
20058-200580730 = "こんなことで嘘つかないから！"
20058-200580740 = "今ゲヘナに向かってるとこなんだ"
20058-200580750 = "えっ！？"
20058-200580760 = "今日は穏やかな一日だったね"
20058-200580770 = "そうだね"
20058-200580780 = "私はあの後から"
20058-200580790 = "ちょっと、落ち着かないんだけどね"
20058-200580800 = "まあいいや"
20058-200580810 = "先生に喜んでもらえたならよかった"
20058-200580820 = "エリカと見る空、すごく綺麗だったよ"
20058-200580830 = "また一緒に行こうね"
20058-200580840 = "うう"
20058-200580850 = "あーー"
20058-200580860 = "ほんとさ"
20058-200580870 = "またそーやってーーー"
20058-200580880 = "……"
20058-200580890 = "うん"
20058-200580900 = "また一緒に行こうね"
