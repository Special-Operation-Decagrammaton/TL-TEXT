[translation]
10083-100830010 = "Agora que a Hyakkaryouran finalmente voltou ao normal,"
10083-100830020 = "queria conversar sobre nossa futura parceria de trabalho."
10083-100830030 = "Você tem um tempo agora?"
10083-100830040 = "Claro, sem problemas."
10083-100830050 = "Certo."
10083-100830060 = "Então, estarei esperando na sala de mediação."
10083-100830070 = "Conto com você."
10083-100830080 = "Sensei."
10083-100830090 = "Onde você está?"
10083-100830100 = "Aconteceu alguma coisa?"
10083-100830110 = "Se a agenda que eu conheço não mudou,"
10083-100830120 = "você deveria estar no escritório da Schale agora."
10083-100830130 = "Eu estava errada?"
10083-100830140 = "N-Não... Eu estou, mas..."
10083-100830150 = "Entendo."
10083-100830160 = "Então, estou indo aí agora."
10083-100830170 = "Eh? A-Agora...?"
10083-100830180 = "...Kikyou?"
10083-100830190 = "Hoje você conseguiu me convencer,"
10083-100830200 = "mas não vai ter uma segunda vez."
10083-100830210 = "Entro em contato de novo."
10083-100830220 = "Sim, estarei esperando ansiosamente."
10083-100830230 = "...Entendo."
10083-100830240 = "Sensei, sobre as ervas medicinais de hoje..."
10083-100830250 = "...Kikyou?"
10083-100830260 = "Foi só um erro de digitação."
10083-100830270 = "Não precisa se preocupar com isso."
10083-100830280 = "Então, sobre a coordenação de trabalho que combinamos,"
10083-100830290 = "surgiu um compromisso de última hora..."
10083-100830300 = "Pode ser em outro dia?"
10083-100830310 = "Sim, não se preocupe com isso."
10083-100830320 = "Obrigada."
10083-100830330 = "...Obrigada."
10083-100830340 = "Então, até mais."
10083-100830350 = "Eu encontrei um livro interessante,"
10083-100830360 = "e pensei em recomendar para você também."
10083-100830370 = "Eh...?"
10083-100830380 = "O que foi essa reação?"
10083-100830390 = "É que é a primeira vez que recebo uma mensagem pessoal da Kikyou..."
10083-100830400 = "Fiquei um pouco surpreso, por assim dizer."
10083-100830410 = "Qual o problema? Não é nada demais."
10083-100830420 = "Até eu mando esse tipo de mensagem de vez em quando."
10083-100830430 = "...Acho que eu não deveria ter mandado."
10083-100830440 = "A culpa é toda sua."
10083-100830450 = "Sim, entendi."
10083-100830460 = "E então?"
10083-100830470 = "Se não for incômodo, venha até a sala de mediação."
10083-100830480 = "Vou te emprestar o livro."
10083-100830490 = "Ok, estou indo agora."
