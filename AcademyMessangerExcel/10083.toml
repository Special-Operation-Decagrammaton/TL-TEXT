[translation]
10083-100830010 = "ようやく百花繚乱が元に戻ってきたから"
10083-100830020 = "今後の業務提携について話しておきたいんだけど"
10083-100830030 = "これから時間もらえる？"
10083-100830040 = "もちろん大丈夫だよ"
10083-100830050 = "そう"
10083-100830060 = "じゃ、調停室で待ってるから"
10083-100830070 = "よろしく"
10083-100830080 = "先生"
10083-100830090 = "どこ？"
10083-100830100 = "何かあったの？"
10083-100830110 = "私の把握している予定が変わっていなければ"
10083-100830120 = "今はシャーレの執務室にいるはずだけど"
10083-100830130 = "間違ってた？"
10083-100830140 = "い、いや……いるけど……"
10083-100830150 = "そう"
10083-100830160 = "じゃあ、すぐ行くから"
10083-100830170 = "え？い、今から……？"
10083-100830180 = "……キキョウさん？"
10083-100830190 = "今日は先生に言いくるめられたけど"
10083-100830200 = "二度は無いからね"
10083-100830210 = "また連絡する"
10083-100830220 = "うん、楽しみにしてるよ"
10083-100830230 = "……そう"
10083-100830240 = "先生、今日の薬草なんたまけど"
10083-100830250 = "……キキョウ？"
10083-100830260 = "打ち間違えただけ"
10083-100830270 = "気にしなくていいから"
10083-100830280 = "それで、約束してた業務の擦り合わせなんだけど"
10083-100830290 = "急な予定が入っちゃって……"
10083-100830300 = "別の日でも大丈夫？"
10083-100830310 = "うん、こっちは気にしないで"
10083-100830320 = "ありがおう"
10083-100830330 = "……ありがと"
10083-100830340 = "じゃ、またね"
10083-100830350 = "面白い本があったから"
10083-100830360 = "先生にもオススメしようと思ったんだけど"
10083-100830370 = "え……？"
10083-100830380 = "なに、その反応"
10083-100830390 = "キキョウから初めてプライベートな連絡が来たから……"
10083-100830400 = "少し驚いたというか、なんというか"
10083-100830410 = "いいでしょう、別に"
10083-100830420 = "私だってこういう連絡くらいするよ"
10083-100830430 = "……やっぱ、やめとくんだった"
10083-100830440 = "全部あんたのせいだから"
10083-100830450 = "うん、そっか"
10083-100830460 = "それで？"
10083-100830470 = "嫌じゃないなら、調停室まで来て"
10083-100830480 = "本、貸してあげるから"
10083-100830490 = "うん、すぐ行くね"
