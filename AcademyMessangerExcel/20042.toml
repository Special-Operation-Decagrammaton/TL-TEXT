[translation]
20042-200420010 = "Sensei, escuta."
20042-200420020 = "Não acha que isso é terrível, não importa como você olhe?"
20042-200420030 = "O que aconteceu?"
20042-200420040 = "Você sabe o tamanho da área de estudo, né?"
20042-200420050 = "O Seminar me mandou limpar todas as folhas secas de lá sozinha!"
20042-200420060 = "Eles me mandaram fazer isso!"
20042-200420070 = "Não acha um absurdo, só porque eles nos têm como alvo?"
20042-200420080 = "Realmente, deve ser difícil fazer isso sozinha..."
20042-200420090 = "Eles te mandaram limpar de repente?"
20042-200420100 = "Na verdade..."
20042-200420110 = "Eu fiz um grafite no monotrilho do Millennium..."
20042-200420120 = "E levei uma bronca..."
20042-200420130 = "Será que foi por causa disso?"
20042-200420140 = "Acho que sim..."
20042-200420150 = "Sensei."
20042-200420160 = "Você tem planos para este fim de semana?"
20042-200420170 = "Não tenho nada planejado, por quê?"
20042-200420180 = "Bem..."
20042-200420190 = "Eu estava pensando em subir a montanha aqui perto, mas é solitário ir sozinha."
20042-200420200 = "Se não se importar, você poderia vir comigo?"
20042-200420210 = "A Maki..."
20042-200420220 = "...quer fazer trilha!?"
20042-200420230 = "Que reação é essa..."
20042-200420240 = "A gente já se encontrou na montanha antes, lembra?"
20042-200420250 = "Desculpa, desculpa, mas..."
20042-200420260 = "É que não tem nada a ver com eletrônicos ou grafite."
20042-200420270 = "É raro a Maki me convidar para algo assim."
20042-200420280 = "Hmm."
20042-200420290 = "Talvez você tenha razão..."
20042-200420300 = "De qualquer forma, podemos considerar um 'ok', certo?"
20042-200420310 = "Então, nos vemos no fim de semana!"
20042-200420320 = "Sensei."
20042-200420330 = "Você está livre neste fim de semana também?"
20042-200420340 = "Ouvi dizer que tem um acampamento famoso perto de D.U."
20042-200420350 = "Se quiser, vamos juntos?"
20042-200420360 = "...Nesse acampamento, aparece algum monstro raro?"
20042-200420370 = "Ei, como você sabia?"
20042-200420380 = "Por acaso você também joga AR Mushiqueen?"
20042-200420390 = "É que, se a Maki fala de acampamento..."
20042-200420400 = "Pensei que fosse algo relacionado ao jogo."
20042-200420410 = "Ah, que maldade!"
20042-200420420 = "...Bom, é verdade."
20042-200420430 = "Então, você está livre neste fim de semana?"
20042-200420440 = "Pode ser perigoso ir sozinha..."
20042-200420450 = "Eu vou acompanhar você."
20042-200420460 = "Obrigada, Sensei!"
20042-200420470 = "Este ano já está quase acabando, né?"
20042-200420480 = "Eu tinha tantas coisas que queria fazer..."
20042-200420490 = "Foi um ano que passou voando."
20042-200420500 = "Realmente..."
20042-200420510 = "Tem um trabalho que eu preciso terminar antes do fim do ano..."
20042-200420520 = "Falando nisso, parece que o Seminar também está bem ocupado."
20042-200420530 = "Sensei, deixa eu te ajudar com alguma coisa!"
20042-200420540 = "Então, que tal você me ajudar a organizar os recibos no seu próximo turno?"
20042-200420550 = "A organização dos recibos não está avançando nada..."
20042-200420560 = "Entendido, vou tentar fazer isso."
20042-200420570 = "……Ué?"
20042-200420580 = "Esse prazo não era para hoje?"
20042-200420590 = "Acho que não vai dar tempo se for só no próximo turno..."
20042-200420600 = "A Yuuka-senpai sabe disso?"
20042-200420610 = "……"
20042-200420620 = "Você poderia guardar segredo sobre isso...?"
20042-200420630 = "Fufu."
20042-200420640 = "Deu vontade de tomar aquele sabor tropical de edição limitada do Yokai MAX~"
20042-200420650 = "……Vou deixar preparado até o dia do seu turno."
