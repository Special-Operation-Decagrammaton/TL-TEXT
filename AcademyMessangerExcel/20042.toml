[translation]
20042-200420010 = "先生、聞いて"
20042-200420020 = "どう考えてもひどくない？"
20042-200420030 = "どうしたの？"
20042-200420040 = "先生もスタディーエリアの広さは知ってるでしょ"
20042-200420050 = "あそこの落ち葉を一人で掃除しろって"
20042-200420060 = "セミナーに言われたの！"
20042-200420070 = "いくら、私たちを目の敵にしてるからってひどいと思わない？"
20042-200420080 = "たしかに一人だと大変だね……"
20042-200420090 = "いきなり掃除をするよう言われたの？"
20042-200420100 = "実は……"
20042-200420110 = "ミレニアムのモノレールにグラフィティを描いたら"
20042-200420120 = "ちょっと怒られて……"
20042-200420130 = "もしかして、それのせいかな？"
20042-200420140 = "そうだと思うよ……"
20042-200420150 = "先生"
20042-200420160 = "今週末の予定って決まってる？"
20042-200420170 = "特に予定はないけど、何かあったの？"
20042-200420180 = "えっとね"
20042-200420190 = "近くの山に登ろうと思ったんだけど、一人だと寂しくて"
20042-200420200 = "良かったら、一緒に来てくれない？"
20042-200420210 = "マキが……"
20042-200420220 = "……登山を！？"
20042-200420230 = "なに、その反応は……"
20042-200420240 = "前にも山で会ったことあるのに"
20042-200420250 = "ごめんごめん、でも……"
20042-200420260 = "電子機器とかグラフィティが関係ないのに"
20042-200420270 = "マキから誘ってくれるなんて珍しいような"
20042-200420280 = "うーん"
20042-200420290 = "それはそうかも……"
20042-200420300 = "とにかく、オッケーってことで良いでしょ？"
20042-200420310 = "じゃあ、また週末ね！"
20042-200420320 = "先生"
20042-200420330 = "今週末も時間ある？"
20042-200420340 = "D.U.近くで有名なキャンプ場があるらしいんだ"
20042-200420350 = "良かったら一緒に行かない？"
20042-200420360 = "……そのキャンプ場で、限定モンスターが出るとか？"
20042-200420370 = "え、どうして分かったの？"
20042-200420380 = "もしかして、先生もARムシクイーンやってるの？"
20042-200420390 = "マキがキャンプの話をするとしたら……"
20042-200420400 = "ゲームに関することかなって思ったんだ"
20042-200420410 = "あっ、ひどい！"
20042-200420420 = "……まあ、そうなんだけど"
20042-200420430 = "それで、今週末は空いてる？"
20042-200420440 = "一人だと危ないかもしれないし……"
20042-200420450 = "私も同行するね"
20042-200420460 = "ありがとう、先生！"
20042-200420470 = "今年もそろそろ終わっちゃうね"
20042-200420480 = "やりたいことがいっぱいあったはずなのに"
20042-200420490 = "あっという間の一年だったよ"
20042-200420500 = "本当にね……"
20042-200420510 = "今年中に終わらせなくちゃいけない仕事が……"
20042-200420520 = "そういえば、セミナーも忙しそうにしてたような"
20042-200420530 = "先生、あたしにも何か手伝わせてよ！"
20042-200420540 = "じゃあ、次の当番で領収書の整理をお願いしようかな"
20042-200420550 = "領収書の整理がまったく進んでないんだよね……"
20042-200420560 = "分かった、やってみるね"
20042-200420570 = "……あれ？"
20042-200420580 = "その締切、今日までじゃなかった？"
20042-200420590 = "次の当番じゃ間に合わないような……"
20042-200420600 = "これ、ユウカ先輩は知ってるの？"
20042-200420610 = "……"
20042-200420620 = "内緒にしてくれないかな……？"
20042-200420630 = "ふふっ"
20042-200420640 = "妖怪MAXの限定トロピカル味が飲みたくなってきたなぁ～"
20042-200420650 = "……当番の日までに用意しておくね"
