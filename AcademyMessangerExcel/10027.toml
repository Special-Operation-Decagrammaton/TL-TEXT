[translation]
10027-100270010 = "Sensei, você tem um tempo agora?"
10027-100270020 = "Sim, estou livre."
10027-100270030 = "Aconteceu alguma coisa?"
10027-100270040 = "É um pequeno favor, na verdade... tem uma coisa que preciso para a missão."
10027-100270050 = "Vou te passar o local depois, seria de grande ajuda se você pudesse entregar para a Asuna-senpai."
10027-100270060 = "Estou um pouco ocupada agora e não posso sair..."
10027-100270070 = "Sim, pode deixar comigo."
10027-100270080 = "Estou indo agora mesmo."
10027-100270090 = "Obrigada."
10027-100270100 = "Talvez eu não consiga te agradecer pessoalmente hoje, mas eu compenso outra hora."
10027-100270110 = "Então, conto com você."
10027-100270120 = "Sensei."
10027-100270130 = "Obrigada por hoje."
10027-100270140 = "Eu te recompenso por isso outra hora."
10027-100270150 = "Recompensa...?!"
10027-100270160 = "Que tal me deixar te acompanhar de novo?"
10027-100270170 = "..."
10027-100270180 = "Haa..."
10027-100270190 = "Sensei, tem um minutinho?"
10027-100270200 = "É sobre aquele assunto do outro dia."
10027-100270210 = "Eu queria te recompensar direito."
10027-100270220 = "Estou no meio de uma investigação secreta, então se algo acontecer, não vou ter tempo para recompensas... mas as coisas estão calmas agora, então provavelmente está tudo bem."
10027-100270230 = "O que me diz?"
10027-100270240 = "Mas é claro, com prazer!"
10027-100270250 = "Não é exagero dizer que eu estava trabalhando só por este dia!"
10027-100270260 = "Que bom."
10027-100270270 = "..."
10027-100270280 = "Bem, de qualquer forma."
10027-100270290 = "Então, até mais tarde."
10027-100270300 = "Sensei."
10027-100270310 = "É que..."
10027-100270320 = "É sobre o que aconteceu hoje..."
10027-100270330 = "..."
10027-100270340 = "Não."
10027-100270350 = "Deixa pra lá, está tudo bem. Falo com você pessoalmente outra hora."
10027-100270360 = "Sensei, você está ocupado agora?"
10027-100270370 = "É que eu queria ter uma conversa séria..."
10027-100270380 = "...Será que é a continuação daquela conversa do outro dia?"
10027-100270390 = "Gulp..."
10027-100270400 = "Você parece... nervoso?"
10027-100270410 = "Se for o caso, quer deixar para outro dia?"
10027-100270420 = "Não precisa ser hoje."
10027-100270430 = "Não é nada urgente..."
10027-100270440 = "Não, não, hoje está ótimo."
10027-100270450 = "É que eu quero ter certeza, ou melhor, quero deixar as coisas claras..."
10027-100270460 = "É mesmo?"
10027-100270470 = "Então, por favor."
10027-100270480 = "O lugar é..."
10027-100270490 = "Para que ninguém descubra, acho que aquele lugar é o melhor."
10027-100270500 = "Então, conto com você. Entro em contato mais tarde."
10027-100270510 = "Sensei."
10027-100270520 = "Hum..."
10027-100270530 = "Obrigada por ter vindo hoje."
10027-100270540 = "Graças a você, Sensei, esta roupa se tornou ainda mais especial."
10027-100270550 = "Obrigada, Sensei."
10027-100270560 = "Você sempre me ensina tantas coisas, Sensei."
10027-100270570 = "Bem, eu entro em contato de novo, tá?"
10027-100270580 = "連絡ありがとう、先生。狙撃手が必要なのか？"
10027-100270590 = "もしそうなら詳細を教えてくれ"
10027-100270600 = "うん！バニーガールの狙撃手が必要なんだ！"
10027-100270610 = "うん？特殊任務ということか？"
10027-100270620 = "よし、分かった"
10027-100270630 = "合流場所を教えて欲しい"