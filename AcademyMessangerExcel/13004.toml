[translation]
13004-992 = "Hoje, parece que algo bom vai acontecer."
13004-993 = "Professor, como você está agora? Está se divertindo?"
13004-994 = "Espero que você tenha um bom dia hoje. Eu estou torcendo por você, Professor!"
13004-995 = "Obrigado, Nonomi."
13004-996 = "Espero que coisas boas aconteçam com você também, Nonomi."
13004-997 = "Ah..."
13004-998 = "Uau...!"
13004-999 = "Eu não esperava receber uma resposta, estou tão feliz~☆"
13004-1000 = "Receber uma resposta do Professor!"
13004-1001 = "Só isso já é mais do que suficiente para me fazer feliz o dia inteiro!"
13004-1002 = "Esta é a minha primeira saudação especial, mas continuarei enviando de vez em quando, ok~☆"
13004-1003 = "♡♡"
13004-1004 = "Já que eu te convidei, eu queria ter te convidado para comer, mas..."
13004-1005 = "Da próxima vez que formos a algum lugar, por favor, me deixe pagar, ok?"
13004-1006 = "É uma promessa, certo?"
13004-1007 = "Acho que vou fazer uma grande limpeza na sala de aula do Comitê de Medidas hoje!"
13004-1008 = "Quando o Professor chegar, deve estar muito mais limpo do que antes~☆"
13004-1009 = "Quando eu terminar, por favor, venha dar uma olhada, ok?"
13004-1010 = "Sim, irei assim que terminar o trabalho."
13004-1011 = "Bom trabalho, estou ansioso para ver."
13004-1012 = "Obrigado pelo seu dia hoje!"
13004-1013 = "Ainda não consegui retribuir da última vez, o que devo fazer...?"
13004-1014 = "Parece que o Professor está sempre fazendo coisas por mim."
13004-1015 = "Professor~☆"
13004-1016 = "No próximo feriado, se tiver tempo, quer ir às compras comigo?"
13004-1017 = "Compras, parece divertido."
13004-1018 = "Sim, vamos juntos!"
13004-1019 = "Ah! Muito obrigada~!"
13004-1020 = "É um encontro, só nós dois, Professor!"
13004-1021 = "Ah, não, compras, compras, certo? Compras com o Professor~☆"
13004-1022 = "Então, estarei esperando no shopping, ok~☆"
13004-1023 = "Você chegou em casa em segurança? Suas orelhas não estão doendo?"
13004-1024 = "Eu me diverti muito hoje."
13004-1025 = "Além disso, não há muitas pessoas que conhecem o interior das orelhas do Professor...☆"
13004-1026 = "Então, que você tenha um dia feliz amanhã também~♡"
13004-1027 = "Jogamos Othello outro dia, mas... eu não consegui vencer nenhuma vez."
13004-1028 = "Todos são muito bons... especialmente a Hoshino-senpai, ela era muito forte!"
13004-1029 = "Não posso continuar assim, preciso treinar!"
13004-1030 = "Treino! Que empolgante! Lute!!"
13004-1031 = "Entendi, boa sorte. Estou torcendo por você."
13004-1032 = "Sim! Eu vou me esforçar!"
13004-1033 = "Você já chegou em casa, Professor?"
13004-1034 = "Obrigado pelo dia de hoje. Eu me diverti muito."
13004-1035 = "Da próxima vez, eu gostaria de jogar vários jogos com o Professor~☆"
13004-1036 = "Professor, você não gostaria de halteres?"
13004-1037 = "Tenho alguns que comprei para dar de presente à Shiroko-chan, mas sobraram."
13004-1038 = "Eles estão no campo de Abydos, então, se quiser, pode pegá-los."
13004-130040010 = "124. Festa de Aniversário da Escola na Sala de Aula"
13004-130040020 = "125. Mini Gincana no Campo"
13004-130040030 = "Nonomi?"
13004-130040040 = "Hã?"
13004-130040050 = "Professor?"
13004-130040060 = "Não tinha nenhum compromisso desses no calendário...?"
13004-130040070 = "Bem,"
13004-130040080 = "Uhm... acabei enviando uma nota pessoal para o Professor por engano."
13004-130040090 = "Me desculpe!"
13004-130040100 = "Não se preocupe!"
13004-130040110 = "Se for assim, tudo bem, mas..."
