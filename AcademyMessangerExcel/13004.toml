[translation]
13004-992 = "今日はなんだか、良いことが起きそうな日です"
13004-993 = "先生は今どうですか？楽しい時間、過ごせてますか？"
13004-994 = "今日が良い一日になりますように。私、先生のこと応援してますから！"
13004-995 = "ありがとう、ノノミ"
13004-996 = "ノノミにも良いことがありますように"
13004-997 = "あ……"
13004-998 = "うわぁ……！"
13004-999 = "お返事をいただけるとは思っていませんでした、嬉しいです～☆"
13004-1000 = "先生からお返事をいただけるなんて！"
13004-1001 = "私はもう、今日一日これだけで十分すぎるくらい幸せです！"
13004-1002 = "今回は最初の特別なご挨拶ですが、これからも時々送らせてもらいますね☆"
13004-1003 = "♡♡"
13004-1004 = "私から誘ったんですから、先生にご馳走させてもらいたかったんですが……"
13004-1005 = "次どこかに行く時は、私に奢らせてくださいね？"
13004-1006 = "絶対ですよ？"
13004-1007 = "今日は対策委員会の教室を、大掃除しようかと思います！"
13004-1008 = "先生がお越しになる頃には、前よりずっと綺麗になってるはずです☆"
13004-1009 = "終わった頃にでも、ぜひ見に来てくださいね？"
13004-1010 = "うん、仕事が終わったらすぐに行くね"
13004-1011 = "お疲れ様、楽しみにしてるね"
13004-1012 = "今日はお疲れ様でした！"
13004-1013 = "まだ前回のお返しもできていないのに、どうしましょう……？"
13004-1014 = "先生に、色々していただいてばかりになってしまっていますね"
13004-1015 = "先生～☆"
13004-1016 = "今度の休日、もし時間があったら一緒にショッピングに行きませんか？"
13004-1017 = "ショッピングか、楽しそうだね"
13004-1018 = "ぜひぜひ、一緒に行こう！"
13004-1019 = "わっ！ありがとうございます～！"
13004-1020 = "先生と二人でデートですっ！"
13004-1021 = "あ、いえショッピング、ショッピングですね、先生とショッピング～☆"
13004-1022 = "では、ショッピングモールでお待ちしておりますね～☆"
13004-1023 = "無事にお家まで着きましたか？お耳、痛かったりしませんか？"
13004-1024 = "私、今日一日とっても楽しかったです"
13004-1025 = "それに、先生のお耳の中を知ってる人はそうそういないでしょうし……☆"
13004-1026 = "ではでは、また明日も幸せな一日を～♡"
13004-1027 = "この前オセロをみんなでやったのですが……私、一度も勝てなかったんです"
13004-1028 = "みんなすごく上手で……特にホシノ先輩、すごく強かったんです！"
13004-1029 = "このままではダメですね、特訓をしなくちゃいけません！"
13004-1030 = "特訓！熱いね！ファイト！！"
13004-1031 = "そうなんだ、頑張ってね。応援してる"
13004-1032 = "はい！私、頑張ります！"
13004-1033 = "もうお家に着きましたか、先生？"
13004-1034 = "今日はありがとうございました。私、とっても楽しかったです"
13004-1035 = "また今度一緒に、先生と色んなゲームをしたいですね☆"
13004-1036 = "先生、ダンベル欲しかったりしませんか？"
13004-1037 = "シロコちゃんにプレゼントしようと買ったものが、いくつか余ってまして"
13004-1038 = "アビドスのグラウンドにありますので、よかったら持っていってください"
13004-130040010 = "124.教室で開校記念日パーティー"
13004-130040020 = "125.グラウンドでミニ運動会"
13004-130040030 = "ノノミ？"
13004-130040040 = "えっ"
13004-130040050 = "先生？"
13004-130040060 = "カレンダーにそんな予定は無かったような……？"
13004-130040070 = "その"
13004-130040080 = "えっと……自分用のメモを間違えて先生に送ってしまいました"
13004-130040090 = "ごめんなさい！"
13004-130040100 = "気にしないでください！"
13004-130040110 = "それならいいんだけど……"
