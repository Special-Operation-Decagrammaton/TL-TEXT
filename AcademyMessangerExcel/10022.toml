[translation]
10022-100220010 = "……Já é verão, né?"
10022-100220020 = "É verão!"
10022-100220030 = "E quando se fala em verão, se fala em praia, né!"
10022-100220040 = "Sim, praia."
10022-100220050 = "Sensei."
10022-100220060 = "……Sensei? Você está mesmo aí?"
10022-100220070 = "Claro!"
10022-100220080 = "Estou vendo o Momotalk com toda a atenção!"
10022-100220090 = "Haa..."
10022-100220100 = "Eu entendo que seu coração fique agitado por ser verão, mas..."
10022-100220110 = "Se até você, Sensei, estiver nesse pique, sinto que o trabalho vai aumentar e isso é um problema."
10022-100220120 = "Trabalho é algo que está sempre aumentando."
10022-100220130 = "Esta época do ano não é exceção."
10022-100220140 = "Alunas que perturbam a ordem estão em toda parte, a qualquer hora. Ainda mais no verão."
10022-100220150 = "……Por isso, eu queria que você me ajudasse um pouco."
10022-100220160 = "Como esperado, a Hina-chan é séria até no verão!"
10022-100220170 = "A presidente do Comitê de Disciplina do verão também não dá brecha, hein!"
10022-100220180 = "……Será que eu deveria cuidar primeiro do Sensei, que parece que vai perturbar a ordem?"
10022-100220190 = "Me desculpe."
10022-100220200 = "Haa, francamente..."
10022-100220210 = "Bom, vou te mandar o local depois. Estarei esperando."
10022-100220220 = "Obrigada por hoje, Sensei. Foi uma boa referência para o acampamento."
10022-100220230 = "É que, no próximo acampamento de verão, se você tiver tempo, poderíamos..."
10022-100220240 = "Não."
10022-100220250 = "Não é nada."
10022-100220260 = "Seria bom se pudéssemos encontrar um tempo para nos divertirmos juntos."
10022-100220270 = "……"
10022-100220280 = "Sim."
10022-100220290 = "……Sensei, sobre o nosso compromisso de hoje à noite..."
10022-100220300 = "Tudo bem se a gente adiar para outro dia?"
10022-100220310 = "É que parece que o trabalho não vai acabar."
10022-100220320 = "Ah, desculpe, era hoje...?"
10022-100220330 = "Tudo bem, não se preocupe com isso."
10022-100220340 = "……Será que não era hoje, e sim amanhã?"
10022-100220350 = "Talvez eu tenha me confundido, esqueça."
10022-100220360 = "……Sim, obrigada."
10022-100220370 = "Ultimamente tem sido uma correria..."
10022-100220380 = "Você parece mais ocupada que o normal...?"
10022-100220390 = "Não é nada demais."
10022-100220400 = "Bem, é só que eu tive que adiar vários compromissos..."
10022-100220410 = "Só que hoje não consegui sair nem por um instante, e parece que o dia vai acabar com papelada."
10022-100220420 = "Você está bem!? Descanse!?"
10022-100220430 = "Bem, é algo que acontece com frequência."
10022-100220440 = "De qualquer forma, só de poder conversar assim com você, Sensei, já me sinto um pouco melhor."
10022-100220450 = "Bom, preciso terminar o trabalho por enquanto."
10022-100220460 = "Até mais tarde."
10022-100220470 = "Obrigada pela ajuda hoje, Sensei."
10022-100220480 = "Não foi nada, de nada."
10022-100220490 = "Ajudou muito. Mas não posso ficar te incomodando assim toda vez."
10022-100220500 = "Da próxima vez, vou tentar terminar o trabalho um pouco mais cedo."
10022-100220510 = "Então, é que..."
10022-100220520 = "Já que viemos até aqui..."
10022-100220530 = "Pensei que talvez não fosse uma má ideia sairmos um pouco juntos..."
10022-100220540 = "Nesse caso, posso pedir para você me acompanhar, como fez hoje?"
10022-100220550 = "Sensei."
10022-100220560 = "Talvez eu consiga terminar o trabalho de manhã hoje."
10022-100220570 = "Por isso..."
10022-100220580 = "Com prazer!"
10022-100220590 = "...Não responda antes de eu chegar ao ponto principal. Você entendeu mesmo...?"
10022-100220600 = "Francamente... Enfim."
10022-100220610 = "Você disse antes, não é? Que seria um desperdício vir a um resort e não aproveitar."
10022-100220620 = "Isso mesmo! Já que viemos à praia!"
10022-100220630 = "...Embora uma parte de mim ainda se pergunte se está tudo bem."
10022-100220640 = "Mas se você insiste tanto, Sensei..."
10022-100220650 = "Você pode me acompanhar esta tarde?"
10022-100220660 = "É que, provavelmente..."
10022-100220670 = "Devo ter tempo suficiente para irmos à praia juntos."
10022-100220680 = "Claro! Mal posso esperar!"
10022-100220690 = "Certo, então... nos vemos por volta do meio-dia."
10022-100220700 = "Hoje foi divertido."
10022-100220710 = "Não é nada mal observar o mar calmamente daquele jeito de vez em quando."
10022-100220720 = "Da próxima vez,"
10022-100220730 = "Claro!"
10022-100220740 = "...Eu disse para não se adiantar."
10022-100220750 = "Huhu, você é mesmo uma pessoa estranha."
10022-100220760 = "Certo, então conto com você da próxima vez também, tá? Sensei."
10022-100220770 = "Sensei."
10022-100220780 = "É... você tem tempo?"
10022-100220790 = "Sim, claro!"
10022-100220800 = "Se for um chamado da Hina, mesmo que eu não esteja livre, eu dou um jeito!"
10022-100220810 = "Sério? Que bom..."
10022-100220820 = "? Sensei, uhm... Qual dos dois...?"
10022-100220830 = "Aconteceu alguma coisa?"
10022-100220840 = "Ah, é que... não é nada demais, mas..."
10022-100220850 = "Se não for muito incômodo..."
10022-100220860 = "Eu queria que você me ensinasse a nadar..."
10022-100220870 = "Sim, claro. Estou indo correndo para aí."
10022-100220880 = "Sensei? Espere, eu ainda não dei os detalhes..."
10022-100220890 = "Uhm...? Sensei?"
