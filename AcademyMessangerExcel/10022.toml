[translation]
10022-100220010 = "……もう季節は夏、か"
10022-100220020 = "夏だね！"
10022-100220030 = "そして夏と言えば、海だね！"
10022-100220040 = "うん、海ね"
10022-100220050 = "先生"
10022-100220060 = "……先生？ちゃんとそこにいる？"
10022-100220070 = "もちろん！"
10022-100220080 = "全力でモモトーク見てるよ！"
10022-100220090 = "ふぅ……"
10022-100220100 = "夏だから、心が浮足立つのは分かるけれど……"
10022-100220110 = "先生までそんなテンションだと、何だかやる事が増えそうで困る"
10022-100220120 = "仕事っていうのは、常に増えていくもの"
10022-100220130 = "こういう時期も例外じゃない"
10022-100220140 = "風紀を乱す生徒たちは、いつどこにでもいる。夏だから尚更"
10022-100220150 = "……だから、ちょっと手伝ってほしい"
10022-100220160 = "さすが、夏でもヒナちゃんは真面目だね！"
10022-100220170 = "夏の風紀委員長も隙が無いね！"
10022-100220180 = "……まずは、風紀を乱しそうな先生から処理した方が良い？"
10022-100220190 = "すみませんでした"
10022-100220200 = "はあ、まったく……"
10022-100220210 = "じゃあ、場所はこの後送るから。待ってる"
10022-100220220 = "今日はありがとう、先生。合宿の参考になった"
10022-100220230 = "その、今度の夏の合宿でも、もし余裕があれば一緒に……"
10022-100220240 = "いや"
10022-100220250 = "何でもない"
10022-100220260 = "時間を見つけて、一緒に遊べるといいね"
10022-100220270 = "……"
10022-100220280 = "うん"
10022-100220290 = "……先生、今夜の約束だけど"
10022-100220300 = "別の日にずらしても大丈夫？"
10022-100220310 = "ちょっと、仕事が終わりそうになくて"
10022-100220320 = "あれ、ごめん、今日だったっけ……？"
10022-100220330 = "大丈夫だよ、全然気にしないで"
10022-100220340 = "……もしかして、今日じゃなくて明日？"
10022-100220350 = "私の勘違いだったかも、忘れて"
10022-100220360 = "……うん、ありがとう"
10022-100220370 = "最近ずっと、バタバタしてて……"
10022-100220380 = "いつも以上に忙しそうだね……？"
10022-100220390 = "大したことじゃない"
10022-100220400 = "まあ、ちょっと色んなスケジュールをずらさないといけなくなったくらいで……"
10022-100220410 = "ただ、今日は一歩も外に出られてないし、書類仕事で一日が終わりそう"
10022-100220420 = "大丈夫！？休んで！？"
10022-100220430 = "まあ、よくあることだから"
10022-100220440 = "とにかく、先生とこうしてやり取りできただけで、ちょっとスッキリした"
10022-100220450 = "じゃあ一旦仕事を片付けないとだから"
10022-100220460 = "また後で"
10022-100220470 = "今日は手伝ってくれてありがとう、先生"
10022-100220480 = "大したことじゃないよ、どういたしまして"
10022-100220490 = "すごく助かった。でも、毎回こうして迷惑をかけるわけにはいかないから"
10022-100220500 = "次は、もう少し仕事を早く終わらせておく"
10022-100220510 = "そしたら、その……"
10022-100220520 = "せっかくここまで来たんだし……"
10022-100220530 = "少しくらい、一緒に外を出歩くのも良いかな……って"
10022-100220540 = "その時は今日みたいにエスコート、お願いしても良い？"
10022-100220550 = "先生"
10022-100220560 = "今日はもしかしたら、午前中に仕事が片付くかもしれない"
10022-100220570 = "だからその"
10022-100220580 = "喜んで！"
10022-100220590 = "……本題に入る前に、返事をしないで。本当に分かってるの……？"
10022-100220600 = "全くもう……とにかく"
10022-100220610 = "この前言ってたでしょう、リゾート地まで来て満喫しないのは勿体ないって"
10022-100220620 = "そうだよ！せっかく海に来たんだから！"
10022-100220630 = "……それで良いのかなって、まだ心のどこかでは思ってるのだけど"
10022-100220640 = "先生が、そこまで言うのなら……"
10022-100220650 = "今日の午後、付き合ってくれる？"
10022-100220660 = "その、多分"
10022-100220670 = "一緒に海に遊びに行くくらいの時間は取れるはず"
10022-100220680 = "もちろん！楽しみにしてるね！"
10022-100220690 = "うん、じゃあ……またお昼頃に"
10022-100220700 = "今日は楽しかった"
10022-100220710 = "たまにはあんな風に、ゆっくり海を眺めるのも悪くない"
10022-100220720 = "今度は、"
10022-100220730 = "もちろん！"
10022-100220740 = "……だから、先読みしないでって"
10022-100220750 = "ふふっ、本当に変な人"
10022-100220760 = "うん、じゃあその時もお願いね。先生"
10022-100220770 = "先生"
10022-100220780 = "その、時間大丈夫？"
10022-100220790 = "うん、もちろん！"
10022-100220800 = "ヒナの連絡なら、大丈夫じゃなくても大丈夫だよ！"
10022-100220810 = "そう？よかった……"
10022-100220820 = "？先生、あの。どっち……？"
10022-100220830 = "何かあったの？"
10022-100220840 = "あ、その……大したことじゃない、んだけど……"
10022-100220850 = "もし、よかったら……"
10022-100220860 = "水泳を、教えてほしくて……"
10022-100220870 = "うん、もちろんだよ。急いで向かうね。"
10022-100220880 = "先生？ちょっと、まだ詳しい話を……"
10022-100220890 = "あの……？先生？"
