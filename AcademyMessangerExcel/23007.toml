23007-230070070 = "もちろん、大丈夫だよ"
23007-230070080 = "どういう質問？"
23007-230070090 = "ふふっ"
23007-230070100 = "ありがとうございます"
23007-230070110 = "ふふっ"
23007-230070120 = "それは……お会いした時に、お話します"
23007-230070130 = "それでは、お待ちしておりますね。先生"
23007-230070140 = "今日は本当にありがとうございました、先生"
