[translation]
23007-230070010 = "こんにちは、先生"
23007-230070020 = "ハナコです。こうやってメッセージ上でやり取りをするのは初めてですね"
23007-230070030 = "あらためて、今後もよろしくお願いします"
23007-230070040 = "それで、ご用件なのですが"
23007-230070050 = "補習授業をお願いしたいと言いますか、質問がありまして"
