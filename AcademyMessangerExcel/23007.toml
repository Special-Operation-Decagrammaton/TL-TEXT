23007-230070210 = "少し困った状況になってしまいまして、助けていただきたく……"
23007-230070220 = "困った状況？"
23007-230070230 = "どうしたの？"
23007-230070240 = "何と言えば良いんでしょうか……"
23007-230070250 = "ちょっと、体育倉庫から出られなくなってしまいまして……"
23007-230070260 = "外からしか開けられないタイプの扉なので、来ていただけますとありがたいです"
23007-230070270 = "お願いできますでしょうか……？"
23007-230070280 = "すぐに行くね。"
23007-230070290 = "分かった、急いで行くから落ち着いて待っててね。"
23007-230070300 = "……ふふっ、はい"
23007-230070310 = "ありがとうございます、お待ちしておりますね"
23007-230070320 = "先生"
23007-230070330 = "あの後、どこまで行かれてしまったんですか……？"
23007-230070340 = "とにかく、今日は本当にありがとうございました"
23007-230070350 = "先生が、どうお考えになっているかは分かりませんが……"
23007-230070360 = "……"
23007-230070370 = "これは、本心からの言葉ですよ"
23007-230070380 = "先生、ハナコです"
23007-230070390 = "今日の放課後、"
23007-230070400 = "補習授業部の活動に必要なものを買いに行くのですが、"
23007-230070410 = "一緒に行きませんか？"
23007-230070420 = "普通のものだよね？"
23007-230070430 = "はい、普通のものです"
23007-230070440 = "普通の格好で行くんだよね？"
23007-230070450 = "はい、普通の格好で"
23007-230070460 = "だったら喜んで"
23007-230070470 = "ありがとうございます"
23007-230070480 = "それでは放課後、第五校門の前でお待ちしておりますね"
23007-230070490 = "先生"
23007-230070500 = "靴下は、シャーレに送った方が良いですか？"
23007-230070510 = "結構です！！"
23007-230070520 = "先生？"
23007-230070530 = "今日は"
23007-230070540 = "その"
23007-230070550 = "……？"
23007-230070560 = "ハナコ？"
23007-230070570 = "……"
23007-230070580 = "ふふっ"
23007-230070590 = "すみません"
23007-230070600 = "何でもありません、失礼しました"
23007-230070610 = "どうかお気になさらず"
23007-230070620 = "ふふっ、先生"
23007-230070630 = "お話は伺いました"
23007-230070640 = "トリニティに用事があるそうですね？"
