[translation]
23007-230070010 = "Olá, Sensei."
23007-230070020 = "É a Hanako. É a primeira vez que nos comunicamos por mensagem assim, não é?"
23007-230070030 = "Mais uma vez, conto com você daqui para frente."
23007-230070040 = "Sobre isso, eu gostaria de tratar de um assunto."
23007-230070050 = "Eu queria pedir uma aula de reforço, ou melhor, tenho uma pergunta."
23007-230070060 = "Você teria um tempo para mim?"
23007-230070070 = "Claro, sem problemas."
23007-230070080 = "Que tipo de pergunta?"
23007-230070090 = "Fufu."
23007-230070100 = "Obrigada."
23007-230070110 = "Fufu."
23007-230070120 = "Isso é... algo que falarei quando nos encontrarmos."
23007-230070130 = "Então, estarei te esperando, Sensei."
23007-230070140 = "Muito obrigada por hoje, Sensei."
23007-230070150 = "Graças a você, foi divertido."
23007-230070160 = "A aula de reforço foi... divertida?"
23007-230070170 = "Fufu."
23007-230070180 = "...Com certeza."
23007-230070190 = "Foi uma aula de reforço... muito divertida.♡"
23007-230070200 = "Sensei, você tem um momento agora?"
23007-230070210 = "Acabei ficando em uma situação um pouco complicada e gostaria que você me ajudasse..."
23007-230070220 = "Uma situação complicada?"
23007-230070230 = "O que aconteceu?"
23007-230070240 = "Como posso dizer..."
23007-230070250 = "Eu acabei ficando presa no depósito de educação física..."
23007-230070260 = "A porta só abre por fora, então eu ficaria muito grata se você pudesse vir."
23007-230070270 = "Poderia me fazer esse favor...?"
23007-230070280 = "Estou indo agora mesmo."
23007-230070290 = "Entendido, estou indo o mais rápido possível, fique calma e me espere."
23007-230070300 = "...Fufu, sim."
23007-230070310 = "Obrigada, estarei esperando."
23007-230070320 = "Sensei."
23007-230070330 = "Depois daquilo, para onde você foi...?"
23007-230070340 = "De qualquer forma, muito obrigada por hoje."
23007-230070350 = "Não sei o que você está pensando, mas..."
23007-230070360 = "..."
23007-230070370 = "Essas são palavras que vêm do fundo do meu coração."
23007-230070380 = "Sensei, é a Hanako."
23007-230070390 = "Hoje depois da aula,"
23007-230070400 = "vou comprar algumas coisas necessárias para as atividades do Clube de Reforço,"
23007-230070410 = "você gostaria de ir comigo?"
23007-230070420 = "São coisas normais, certo?"
23007-230070430 = "Sim, são coisas normais."
23007-230070440 = "Você vai com roupas normais, certo?"
23007-230070450 = "Sim, com roupas normais."
23007-230070460 = "Nesse caso, eu aceito com prazer."
23007-230070470 = "Obrigada."
23007-230070480 = "Então, estarei te esperando em frente ao quinto portão da escola depois da aula."
23007-230070490 = "Sensei."
23007-230070500 = "É melhor eu enviar as meias para o Schale?"
23007-230070510 = "Está tudo bem!!"
23007-230070520 = "Professor?"
23007-230070530 = "Hoje..."
23007-230070540 = "Bem..."
23007-230070550 = "……?"
23007-230070560 = "Hanako?"
23007-230070570 = "……"
23007-230070580 = "Fufu."
23007-230070590 = "Desculpe."
23007-230070600 = "Não é nada, peço perdão."
23007-230070610 = "Por favor, não se preocupe com isso."
23007-230070620 = "Fufu, Professor."
23007-230070630 = "Eu ouvi sobre o assunto."
23007-230070640 = "Você tem negócios em Trinity, não é?"
23007-230070650 = "Bem, é verdade, mas..."
23007-230070660 = "……Onde você ouviu isso?"
23007-230070670 = "Fufu, quem sabe?♡"
23007-230070680 = "De qualquer forma, se tivermos sorte,"
23007-230070690 = "espero que possamos nos encontrar."
23007-230070700 = "Ah, isso não é uma promessa, viu?"
23007-230070710 = "É apenas uma coincidência."
23007-230070720 = "Estou dizendo que adoraria nos encontrar se houver uma oportunidade."
23007-230070730 = "Professor, você conseguiu voltar em segurança?"
23007-230070740 = "Da próxima vez que você vier,"
23007-230070750 = "seria bom se tivesse um pouco mais de tempo livre."
23007-230070760 = "Nessa ocasião..."
23007-230070770 = "Daquela forma de sempre,"
23007-230070780 = "conto com você.♡"
