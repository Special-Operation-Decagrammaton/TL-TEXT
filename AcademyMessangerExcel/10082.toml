[translation]
10082-100820010 = "先生、聞いてくれ"
10082-100820020 = "不破レンゲ、なんと人生最大の危機に陥っているんだ！"
10082-100820030 = "急に何のことやら……"
10082-100820040 = "レンゲ、どうかしたの？"
10082-100820050 = "ここ数日、ずっと考えていたんだけど"
10082-100820060 = "アタシ、気づいてしまったんだ"
10082-100820070 = "このままじゃ、何もかも終わりかもしれなくて！"
10082-100820080 = "ごめん、どういう事！？"
10082-100820090 = "ええっと……やっぱりモモトークじゃ説明が難しいな……"
10082-100820100 = "こういうのは直接話さないとだよね！"
10082-100820110 = "それは構わないけど……"
10082-100820120 = "先生、それでなんだけど……"
10082-100820130 = "頼む、相談に乗って！"
10082-100820140 = "もちろんだよ"
10082-100820150 = "本当！？"
10082-100820160 = "じゃあ待ってるから！"
10082-100820170 = "先生……"
10082-100820180 = "いや、師匠！"
10082-100820190 = "師匠って呼ばれると、ちょっとむず痒いね……"
10082-100820200 = "まだ慣れてないのか？"
10082-100820210 = "もうアタシたちは師弟だろ！"
10082-100820220 = "胸を張っていこう！"
10082-100820230 = "はい……"
10082-100820240 = "よし、こうしちゃいられない。さっそく青春活動を始めよう"
10082-100820250 = "今日から直接、師匠の教えを受けるわけだ"
10082-100820260 = "立派な青春を送ってみせる！"
10082-100820270 = "一点の曇りもない、力強い宣言……！"
10082-100820280 = "その調子だよ、レンゲ！"
10082-100820290 = "よっし！調停室に集合だ、師匠！"
10082-100820300 = "先生、家でじっくり考えたんだけど"
10082-100820310 = "やっぱり先生は先生だから"
10082-100820320 = "転校生役は無理があったような……"
10082-100820330 = "今さら……？"
10082-100820340 = "ま、まぁ、関係性は転校生だけじゃないし！"
10082-100820350 = "次は新しい関係性を試してみよう！"
10082-100820360 = "うん、いつでも呼んでね"
10082-100820370 = "また次も楽しみにしてるよ"
10082-100820380 = "ありがとう、先生！"
10082-100820390 = "うーん、青春の定番といえば"
10082-100820400 = "やっぱり「アレ」は欠かせないなぁ"
10082-100820410 = "どうして今まで忘れてたんだ……"
10082-100820420 = "「アレ」……？"
10082-100820430 = "それは一体どういう……？"
10082-100820440 = "それはだな"
10082-100820450 = "……"
10082-100820460 = "うーん……"
10082-100820470 = "いや、先に言っちゃうと面白くない！"
10082-100820480 = "よし、次の「青春活動」はこれに決めた！"
10082-100820490 = "明日シャーレに行ってからのお楽しみだ！"
10082-100820500 = "分かった。それじゃあ、また明日ね"
10082-100820510 = "うん！"
10082-100820520 = "き、今日のイベントは取り消しだ！"
10082-100820530 = "そう、取り消し！"
10082-100820540 = "アタシたちに幼馴染は、ハードルが高すぎた！"
10082-100820550 = "そ、そうかな？"
10082-100820560 = "そう、絶対に！"
10082-100820570 = "だから次は、違う関係性を考えてくる！"
10082-100820580 = "覚悟しててくれ！師匠！"
10082-100820590 = "は、はい……"
10082-100820600 = "先生、気づけば「青春活動」を始めてから……"
10082-100820610 = "随分と経ったもんだな"
10082-100820620 = "そうだね"
10082-100820630 = "もうそんなに経ったっけ？"
10082-100820640 = "失敗もあったけど……"
10082-100820650 = "それでも、一歩ずつ着実に進んでるはずだ"
10082-100820660 = "というわけで、今日も青春活動の時間がやってきた！"
10082-100820670 = "シャーレにお邪魔するね！"
10082-100820680 = "うん、待ってるよ"
10082-100820690 = "じゃあ、また後で！"
10082-100820700 = "先生、色々迷惑をかけたけど……"
10082-100820710 = "その……"
10082-100820720 = "これからも「青春活動」、頑張ろうね"
10082-100820730 = "心配してくれてありがとう"
10082-100820740 = "う……うん"
10082-100820750 = "分かってるじゃないか！せんせ……いや、師匠！"
10082-100820760 = "また一緒に「青春活動」、しようね！"
10082-100820770 = "師匠、ちょっといいか？"
10082-100820780 = "気になる青春活動があって……"
10082-100820790 = "今回はどんなの？"
10082-100820800 = "師弟で行く――"
10082-100820810 = "休日のショッピング！"
10082-100820820 = "生徒だからこその青春活動かなって"
10082-100820830 = "楽しそう！"
10082-100820840 = "何か買いたいものがあるの？"
10082-100820850 = "特にはないんだけど"
10082-100820860 = "「商店街で一緒に過ごす」のが青春かなって……"
10082-100820870 = "お店を見て回るのも楽しいだろ？"
10082-100820880 = "つまり……デートみたいな？"
10082-100820890 = "ははっ！そんなわけな――"
10082-100820900 = "……"
10082-100820910 = "待って……"
10082-100820920 = "これってデートなのか……？"
10082-100820930 = "……"
10082-100820940 = "と、とにかく！"
10082-100820950 = "商店街で待ってるから！"
10082-100820960 = "し、師匠"
10082-100820970 = "リボン、ありがとう"
10082-100820980 = "本当に……アタシにとって、特別なものになったよ"
10082-100820990 = "大切にするね"
10082-100821000 = "お面、大事に飾っておくよ"
10082-100821010 = "うん……すごく楽しかったから"
10082-100821020 = "またショッピングしよう"
10082-100821030 = "一緒に……"
10082-100821040 = "うん！楽しみにしてるよ！"
10082-100821050 = "アタシも！"
