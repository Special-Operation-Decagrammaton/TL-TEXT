[translation]
10082-100820010 = "Sensei, me escuta."
10082-100820020 = "Fuwa Renge, de alguma forma, está enfrentando a maior crise da sua vida!"
10082-100820030 = "Do que você está falando, assim do nada...?"
10082-100820040 = "Renge, aconteceu alguma coisa?"
10082-100820050 = "Eu estive pensando nisso nos últimos dias, mas..."
10082-100820060 = "Eu percebi uma coisa."
10082-100820070 = "Se continuar assim, tudo pode acabar!"
10082-100820080 = "Desculpa, como assim?!"
10082-100820090 = "Uhm... É meio difícil de explicar pelo MomoTalk..."
10082-100820100 = "É o tipo de coisa que a gente precisa conversar pessoalmente, né?!"
10082-100820110 = "Por mim, tudo bem, mas..."
10082-100820120 = "Sensei, então..."
10082-100820130 = "Por favor, preciso do seu conselho!"
10082-100820140 = "Claro que sim."
10082-100820150 = "Sério?!"
10082-100820160 = "Então vou ficar te esperando!"
10082-100820170 = "Sensei..."
10082-100820180 = "Não, Mestre!"
10082-100820190 = "Ser chamado de Mestre me deixa meio sem graça..."
10082-100820200 = "Ainda não se acostumou?"
10082-100820210 = "Nós já somos mestre e discípula, não é?!"
10082-100820220 = "Vamos seguir de cabeça erguida!"
10082-100820230 = "Sim..."
10082-100820240 = "Certo, não podemos ficar parados. Vamos começar as atividades da juventude imediatamente."
10082-100820250 = "A partir de hoje, vou receber os ensinamentos do Mestre diretamente."
10082-100820260 = "Vou viver uma juventude esplêndida!"
10082-100820270 = "Uma declaração forte e sem nenhuma hesitação...!"
10082-100820280 = "É isso aí, Renge!"
10082-100820290 = "Beleza! Vamos nos encontrar na Sala de Mediação, Mestre!"
10082-100820300 = "Sensei, eu pensei com calma em casa, mas..."
10082-100820310 = "No fim das contas, o Sensei é o Sensei, então..."
10082-100820320 = "Acho que o papel de aluno transferido foi um pouco forçado..."
10082-100820330 = "Só agora...?"
10082-100820340 = "B-bom, a relação não precisa ser só de aluno transferido!"
10082-100820350 = "Da próxima vez, vamos tentar uma nova relação!"
10082-100820360 = "Sim, pode me chamar quando quiser."
10082-100820370 = "Estou ansioso pela próxima vez também."
10082-100820380 = "Obrigada, Sensei!"
10082-100820390 = "Hmm, falando nos clichês da juventude..."
10082-100820400 = "Acho que \"aquilo\" é indispensável."
10082-100820410 = "Como pude me esquecer disso até agora...?"
10082-100820420 = "\"Aquilo\"...?"
10082-100820430 = "O que exatamente seria...?"
10082-100820440 = "Isso é..."
10082-100820450 = "..."
10082-100820460 = "Hmm..."
10082-100820470 = "Não, se eu contar agora, perde a graça!"
10082-100820480 = "Certo, a próxima \"atividade da juventude\" está decidida!"
10082-100820490 = "Vai ser uma surpresa para quando eu for para a Schale amanhã!"
10082-100820500 = "Entendi. Então, até amanhã."
10082-100820510 = "Sim!"
10082-100820520 = "O-o evento de hoje está cancelado!"
10082-100820530 = "Isso, cancelado!"
10082-100820540 = "Ser amigos de infância foi demais para nós!"
10082-100820550 = "S-será?"
10082-100820560 = "Sim, com certeza!"
10082-100820570 = "Então da próxima vez, vou pensar em um tipo de relacionamento diferente!"
10082-100820580 = "Esteja preparado! Mestre!"
10082-100820590 = "S-sim..."
10082-100820600 = "Sensei, desde que começamos as 'Atividades da Juventude'..."
10082-100820610 = "Já se passou bastante tempo, né?"
10082-100820620 = "É verdade."
10082-100820630 = "Já se passou tanto tempo assim?"
10082-100820640 = "Tivemos algumas falhas, mas..."
10082-100820650 = "Ainda assim, devemos estar avançando firmemente, passo a passo."
10082-100820660 = "Sendo assim, chegou a hora das Atividades da Juventude de hoje!"
10082-100820670 = "Vou passar aí na Schale!"
10082-100820680 = "Ok, estarei esperando."
10082-100820690 = "Então, até mais tarde!"
10082-100820700 = "Sensei, desculpe por todo o incômodo, mas..."
10082-100820710 = "É que..."
10082-100820720 = "Vamos continuar nos esforçando nas 'Atividades da Juventude', tá bom?"
10082-100820730 = "Obrigada por se preocupar."
10082-100820740 = "U-uhum."
10082-100820750 = "Você entende bem as coisas! Sense... não, Mestre!"
10082-100820760 = "Vamos fazer as 'Atividades da Juventude' juntos de novo, tá?"
10082-100820770 = "Mestre, tem um minuto?"
10082-100820780 = "Tem uma Atividade da Juventude que me interessou..."
10082-100820790 = "Qual é a dessa vez?"
10082-100820800 = "Mestre e discípula vão..."
10082-100820810 = "Fazer compras no feriado!"
10082-100820820 = "Pensei que seria uma Atividade da Juventude perfeita para uma aluna."
10082-100820830 = "Parece divertido!"
10082-100820840 = "Tem algo que você queira comprar?"
10082-100820850 = "Não exatamente."
10082-100820860 = "Pensei que 'passar um tempo juntos na rua comercial' seria bem juvenil..."
10082-100820870 = "Olhar as lojas também é divertido, né?"
10082-100820880 = "Então... tipo um encontro?"
10082-100820890 = "Haha! Claro que nã--"
10082-100820900 = "..."
10082-100820910 = "Espere..."
10082-100820920 = "Isso é um encontro...?"
10082-100820930 = "..."
10082-100820940 = "D-de qualquer forma!"
10082-100820950 = "Vou estar esperando na rua comercial!"
10082-100820960 = "M-mestre."
10082-100820970 = "Obrigada pelo laço."
10082-100820980 = "Ele realmente... se tornou algo especial para mim."
10082-100820990 = "Vou cuidar bem dele."
10082-100821000 = "Vou guardar a máscara com carinho."
10082-100821010 = "Sim... foi muito divertido."
10082-100821020 = "Vamos fazer compras de novo."
10082-100821030 = "Juntos..."
10082-100821040 = "Sim! Mal posso esperar!"
10082-100821050 = "Eu também!"
