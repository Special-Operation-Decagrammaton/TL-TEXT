[translation]
13003-938 = "Olá, Sensei"
13003-939 = "Eu tenho algo que gostaria que você ouvisse..."
13003-940 = "Se não for muito incômodo, você poderia me dar um conselho?"
13003-941 = "Claro"
13003-942 = "Me chame a qualquer hora"
13003-943 = "Ah, muito obrigada!"
13003-944 = "D-desculpe, eu acabei..."
13003-945 = "É que eu estava pensando no que faria se você recusasse..."
13003-946 = "Fiquei muito aliviada."
13003-947 = "Desculpe, talvez eu esteja falando coisas estranhas..."
13003-948 = "Entrarei em contato novamente mais tarde, por favor, me ajude."
13003-949 = "Sensei, uhm..."
13003-950 = "Não, n-não é nada."
13003-951 = "Por favor, esqueça o que aconteceu hoje..."
13003-952 = "Sensei, sinto muito por ser egoísta, mas..."
13003-953 = "Posso pedir novamente o conselho que não pude dar outro dia...?"
13003-954 = "Sim. Claro."
13003-955 = "Muito obrigada!"
13003-956 = "Desculpe por estar ocupado, por favor, me ajude."
13003-957 = "Uhm, então o lugar é..."
13003-958 = "Sensei..."
13003-959 = "Por favor, esqueça o que aconteceu hoje também..."
13003-960 = "Por favor..."
13003-961 = "Às vezes, você não sente falta de ter um tempo sozinho?"
13003-962 = "Não é que eu goste de solidão em particular, mas às vezes me sinto assim."
13003-963 = "Acontece, né? Especialmente quando se é estudante."
13003-964 = "Uma garota na adolescência! Acho ótimo!"
13003-965 = "Eh, ah, uhm..."
13003-966 = "Desculpe, de alguma forma fiquei com vergonha..."
13003-967 = "Me desculpe por ter começado a falar sobre isso..."
13003-968 = "Obrigada pelo seu trabalho duro hoje também."
13003-969 = "De alguma forma, sinto que não fiz nada hoje, mas..."
13003-970 = "Tivemos um tempo maravilhoso, muito obrigada."
13003-971 = "Ultimamente não tenho dormido muito bem..."
13003-972 = "Minhas dores de cabeça também estão fortes, e eu nem sei a causa..."
13003-973 = "Talvez seja melhor ir ao hospital...?"
13003-974 = "É, eu imaginei..."
13003-975 = "Mas agora, o trabalho do comitê está acumulado e não consigo sair do meu posto..."
13003-976 = "Desculpe por te preocupar."
13003-977 = "Obrigada, Sensei."
13003-978 = "Obrigada por hoje, Sensei."
13003-979 = "Mas eu ainda não vou desistir da dieta."
13003-980 = "Como posso dizer, sinto que se eu continuar assim, terei perdido para mim mesma."
13003-981 = "Não se force demais..."
13003-982 = "O coração de uma garota é complicado, né... Só não quero que você se esforce demais."
13003-983 = "Ultimamente, o trabalho do comitê não tem terminado até tarde, dia após dia..."
13003-984 = "Mas Sensei também está tendo dificuldades com as horas extras, não é?"
13003-985 = "Eu também vou me esforçar."
13003-986 = "Sim, estou te apoiando."
13003-987 = "Vamos nos esforçar juntos!"
13003-988 = "Sensei"
13003-989 = "Para não pegar um resfriado, tome um banho quente e,"
13003-990 = "descanse bastante."
13003-991 = "Até mais."
13003-130030010 = "Sensei, bom trabalho."
13003-130030020 = "Eu tenho algo que gostaria de perguntar..."
13003-130030030 = "Aconteceu alguma coisa?"
13003-130030040 = "Você não viu minha agenda?"
13003-130030050 = "É aquela com o grande logo do Comitê de Realização da Justiça na capa."
13003-130030060 = "Para minha vergonha, parece que a deixei em algum lugar."
13003-130030070 = "Ah, então eu a guardei."
13003-130030080 = "Era aquela que estava na sala de reuniões, certo?"
13003-130030090 = "Ah, que bom..."
13003-130030100 = "Se você tiver tempo, posso ir buscá-la agora?"
13003-130030110 = "Obrigado por ter encontrado minha agenda."
13003-130030120 = "Isso me ajudou muito."
13003-130030130 = "Está tudo bem? O assunto urgente foi resolvido?"
13003-130030140 = "Assunto urgente?"
13003-130030150 = "Ah."
13003-130030160 = "Não é nada."
13003-130030170 = "Sim, graças a você."
