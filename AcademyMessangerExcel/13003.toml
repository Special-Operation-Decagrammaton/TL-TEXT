[translation]
13003-938 = "こんにちは、先生"
13003-939 = "聞いていただきたいことがありまして……"
13003-940 = "よろしければ、相談に乗っていただけませんでしょうか？"
13003-941 = "もちろん"
13003-942 = "いつでも呼んで"
13003-943 = "あ、ありがとうございます！"
13003-944 = "す、すみません、つい……"
13003-945 = "その、断られてしまったらどうしようとばかり考えていましたので……"
13003-946 = "すごくホッとしました"
13003-947 = "すみません、ちょっと変なことを口走ってるかもしれませんね……"
13003-948 = "後ほどまたご連絡します、よろしくお願いいたします"
13003-949 = "先生、その……"
13003-950 = "いえ、な、なんでもありません"
13003-951 = "今日のことは忘れてください……"
13003-952 = "先生、我が儘を言ってしまって申し訳ないのですが……"
13003-953 = "先日出来なかった相談、あらためてお願いしてもよろしいでしょうか……？"
13003-954 = "うん。もちろん"
13003-955 = "ありがとうございます！"
13003-956 = "お忙しいのにすみません、よろしくお願いいたします"
13003-957 = "えっと、では場所は……"
13003-958 = "先生……"
13003-959 = "今日のことも……忘れてください……"
13003-960 = "お願いします……"
13003-961 = "時々、ひとりの時間が恋しくなることってありませんか？"
13003-962 = "特段孤独が好きなわけではないのですが、時折そういう気持ちになるんです"
13003-963 = "そういう時もあるよね、学生の頃は特に"
13003-964 = "思春期の乙女だね！良いと思う！"
13003-965 = "え、あ、その……"
13003-966 = "すみません、何だか恥ずかしくなってしまいました……"
13003-967 = "自分から言い出しておいてごめんなさい……"
13003-968 = "今日もお疲れ様でした"
13003-969 = "なんだか今日は、何もしていないような気もしますが"
13003-970 = "素敵な時間を過ごせました、ありがとうございます"
13003-971 = "最近あまり眠れてなくって……"
13003-972 = "頭痛もひどくって、原因も分からないんですよね……"
13003-973 = "病院に行ってみた方が良いかも……？"
13003-974 = "やっぱりそうですよね……"
13003-975 = "ただ、今は委員会の仕事も立て込んでいてなかなか席を外せず……"
13003-976 = "すみません、ご心配をおかけしてしまいました"
13003-977 = "ありがとうございます、先生"
13003-978 = "今日はありがとうございました、先生"
13003-979 = "でも、ダイエットはまだ諦めません"
13003-980 = "何と言いますか、このままでは自分に負けてしまったような気がしますので"
13003-981 = "あんまり自分を追い詰め過ぎないようにね……"
13003-982 = "乙女心は複雑だもんね……無理だけはしないでほしいな"
13003-983 = "この頃連日のように、遅くまで委員会の仕事が終わらなくって……"
13003-984 = "でも、先生も残業で大変なんですよね"
13003-985 = "私も頑張ります"
13003-986 = "うん、応援してる"
13003-987 = "一緒に頑張ろう！"
13003-988 = "先生"
13003-989 = "風邪をひかないよう、暖かいお風呂に入って、"
13003-990 = "ゆっくり休んでくださいね"
13003-991 = "それでは、また"
13003-130030010 = "先生、お疲れ様です"
13003-130030020 = "お伺いしたいことがあるのですが……"
13003-130030030 = "何かあったの？"
13003-130030040 = "私の手帳を見かけませんでしたか？"
13003-130030050 = "表紙に正義実現委員会のロゴが大きく描かれたものです"
13003-130030060 = "お恥ずかしながら、どこかに置いてきてしまったようで"
13003-130030070 = "それなら私が預かってるよ"
13003-130030080 = "会議室に置いてあったやつだよね？"
13003-130030090 = "ああ、それは良かった……"
13003-130030100 = "もしお時間大丈夫でしたら、今から受け取りに行ってもよろしいでしょうか"
13003-130030110 = "手帳を拾っていただきありがとうございました"
13003-130030120 = "とても助かりました"
13003-130030130 = "大丈夫？急用は解決した？"
13003-130030140 = "急用？"
13003-130030150 = "あ"
13003-130030160 = "なんでもありません"
13003-130030170 = "はい、おかげ様で"
