[translation]
10058-100580010 = "Sensei."
10058-100580020 = "Sei que você está ocupado, mas... se não for incômodo, poderia me dar um pouco do seu tempo hoje?"
10058-100580030 = "Se é um pedido da Mine, é claro."
10058-100580040 = "Muito obrigada."
10058-100580050 = "Então, o que foi?"
10058-100580060 = "Pensando bem,"
10058-100580070 = "Você aceitou meu pedido de bom grado, sem nem perguntar o que era..."
10058-100580080 = "Será que o Sensei é uma pessoa importante e de confiança?"
10058-100580090 = "Acabo pensando coisas assim."
10058-100580100 = "Mine...?"
10058-100580110 = "Sensei, que coisa rara..."
10058-100580120 = "Hoje eu tenho tempo livre."
10058-100580130 = "B-bem, descansar também é importante!"
10058-100580140 = "Mine, o que você faz quando tem tempo livre?"
10058-100580150 = "Bem..."
10058-100580160 = "Não sei se posso chamar de hobby, mas..."
10058-100580170 = "Eu passo o tempo observando os suprimentos médicos que colecionei."
10058-100580180 = "Observando suprimentos médicos...?"
10058-100580190 = "Sim."
10058-100580200 = "Quando comparo os efeitos de cada um ou imagino onde usá-los..."
10058-100580210 = "É tão interessante que o tempo passa voando."
10058-100580220 = "É a primeira vez que ouço falar desse hobby..."
10058-100580230 = "É mesmo?"
10058-100580240 = "Nesse caso, já que temos a oportunidade,"
10058-100580250 = "gostaria de mostrar meus suprimentos médicos..."
10058-100580260 = "Você poderia vir?"
10058-100580270 = "Sensei."
10058-100580280 = "Você teria um tempinho para mim hoje à tarde?"
10058-100580290 = "Claro, sem problemas."
10058-100580300 = "E a ronda de socorro anterior?"
10058-100580310 = "A ronda de socorro de hoje eu já terminei de manhã."
10058-100580320 = "Pensei que poderíamos aproveitar a tarde para tomar um chá, Sensei."
10058-100580330 = "Vou terminar meu trabalho e já vou aí!"
10058-100580340 = "Muito obrigada."
10058-100580350 = "Então, estarei esperando por você."
10058-100580360 = "É a primeira vez que ajudo com o trabalho da Schale, mas..."
10058-100580370 = "Há algo que eu deva preparar de antemão?"
10058-100580380 = "Não, não precisa de nada em especial."
10058-100580390 = "Entendo."
10058-100580400 = "Nesse caso, há algum ponto de atenção ou regra que eu deva saber...?"
10058-100580410 = "Os detalhes eu explico quando você chegar aqui."
10058-100580420 = "Entendido."
10058-100580430 = "Então, irei mais tarde."
10058-100580440 = "Tenho vergonha de dizer isso, mas..."
10058-100580450 = "Na verdade... estou muito nervosa."
