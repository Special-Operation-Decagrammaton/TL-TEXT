[translation]
20035-200350010 = "Bom dia, Sensei"
20035-200350020 = "Ah, é a Tsubaki"
20035-200350030 = "Estava treinando hoje também?"
20035-200350040 = "Sim, sou eu~ \nAcabei de terminar o treino... bocejo"
20035-200350050 = "Desta vez não é um treino comum..."
20035-200350060 = "Por isso, pensei em me esforçar mais do que o normal"
20035-200350070 = "E troquei de roupa~"
20035-200350080 = "Hoje você não está com a roupa de sempre?"
20035-200350090 = "Sim"
20035-200350100 = "Se você vier a Hyakkiyako"
20035-200350110 = "Eu te mostro"
20035-200350120 = "Ei, ei, Sensei"
20035-200350130 = "Posso ir ao Schale agora?"
20035-200350140 = "Claro, pode sim"
20035-200350150 = "É raro a Tsubaki vir aqui"
20035-200350160 = "Obrigada, Sensei. \nIsso também faz parte do treinamento de guia"
20035-200350170 = "Hoje eu sou a guia do sono, Kasuga Tsubaki..."
20035-200350180 = "Da última vez, eu não consegui te guiar direito no sono, né...?"
20035-200350190 = "Por isso, hoje vou te guiar direitinho, compensando o que faltou"
20035-200350200 = "Então você vem ao Schale para dormir..."
20035-200350210 = "Será que é isso...?"
20035-200350220 = "Mas hoje, o Sensei também vai dormir comigo"
20035-200350230 = "Sensei~"
20035-200350240 = "Ouvi dizer que você virá a Hyakkiyako a trabalho..."
20035-200350250 = "Sim. Estou planejando ir"
20035-200350260 = "Entendi"
20035-200350270 = "Fufu, então..."
20035-200350280 = "Podemos nos encontrar um pouco depois do trabalho?"
20035-200350290 = "Quando terminar seus afazeres... pode entrar em contato?"
20035-200350300 = "Sim, nos vemos mais tarde"
20035-200350310 = "Obrigada~"
20035-200350320 = "Como não consegui ser sua guia do sono da última vez, desta vez quero fazer direito"
20035-200350330 = "Então você estava preocupada com isso"
