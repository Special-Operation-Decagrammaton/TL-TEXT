[translation]
20035-200350010 = "おはよ～先生"
20035-200350020 = "あ、ツバキだ"
20035-200350030 = "今日も修行してたの？"
20035-200350040 = "うん、私だよ～\n修行終わったところ……ふわぁ"
20035-200350050 = "今回は普通の修行じゃないの……"
20035-200350060 = "だから、いつもより気合を入れようと思って"
20035-200350070 = "服を着替えたんだ～"
20035-200350080 = "今日はいつもの服じゃないの？"
20035-200350090 = "うん"
20035-200350100 = "百鬼夜行に来てくれたら"
20035-200350110 = "見せてあげるね"
20035-200350120 = "ねえねえ、先生"
20035-200350130 = "今からシャーレに行ってもいいかな？"
20035-200350140 = "もちろん、いいよ"
20035-200350150 = "ツバキが来るなんて、めずらしいね"
20035-200350160 = "ありがと～先生。\nこれもガイドの修行なんだ"
20035-200350170 = "今日の私は睡眠ガイドの春日ツバキ……"
20035-200350180 = "この前は先生に、睡眠のガイドをちゃんとしてあげられなかったでしょ……？"
20035-200350190 = "だから今日はこの前のぶんまで、しっかりガイドしてあげるね"
20035-200350200 = "シャーレには眠りに来るんだね……"
20035-200350210 = "そういうことになるのかな……？"
20035-200350220 = "でも、今日は先生も一緒に寝るんだよ"
20035-200350230 = "先生～"
20035-200350240 = "仕事で百鬼夜行に来るって聞いたけど……"
20035-200350250 = "うん。行く予定だよ"
20035-200350260 = "そうなんだ"
20035-200350270 = "ふふっ、それじゃあ"
20035-200350280 = "仕事のあと、すこし会えるかな？"
20035-200350290 = "用事が終わったら……連絡してくれる？"
20035-200350300 = "うん、また後でね"
20035-200350310 = "ありがと～"
20035-200350320 = "この前も睡眠ガイドできなかったから、今度こそしっかりやりたくて"
20035-200350330 = "気にしてくれてたんだね"
