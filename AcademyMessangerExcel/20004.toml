[translation]
20004-20004010 = "先生。今日の午後、少し付き合っていただけないでしょうか？"
20004-20004020 = "実は今度の訓練で使う、新しい水着を買おうと思っていまして。アドバイスを頂けないかなと"
20004-20004030 = "えっと、付き合ってあげたい気持ちはやまやまなんだけど……"
20004-20004040 = "お友達とかじゃなくて、私で大丈夫？"
20004-20004050 = "はい、ぜひ先生にお願いできればと。その、実は、中学校の時まで着ていた水着はあるのですが、少しきつくなってしまいまして……"
20004-20004060 = "せっかくなので正義実現委員会として、もっと相応しい水着が欲しいなと思っているんです"
20004-20004070 = "そ、そっか……"
20004-20004080 = "はい、そのためにも先生のお力をお借りしたく"
20004-20004090 = "では、お待ちしておりますね"
20004-20004100 = "先生、今から海辺の方まで来ていただけますか？"
20004-20004110 = "先生にお見せしたいものがありまして"
20004-20004120 = "うん、すぐ向かうね"
20004-20004130 = "この前買ってから着る機会が無かったのですが、せっかくの海辺ですし"
20004-20004140 = "そもそも、こういうところでしかあまり着られないので"
20004-20004150 = "この間買った水着の話？"
20004-20004160 = "あ、できれば少し早めに来ていただけると助かります"
20004-20004170 = "これを着た状態で待っているのはその、少々……"
20004-20004180 = "え、水着じゃないの！？一体何を着てるの！？"
20004-20004190 = "先生。体調も回復しましたので、以前お話した通り、まずは少し水泳でもしてみようかと"
20004-20004200 = "じゃあ、私もそっちに向かうね"
20004-20004210 = "えっと、お越しいただけるのは嬉しいのですが……"
20004-20004220 = "今回はただの水泳ですし、そこまでご心配いただかなくても大丈夫ですよ……？"
20004-20004230 = "泳ぐ前に、浜辺で簡単な準備運動をするくらいで……"
20004-20004240 = "念には念をってことで。私も付き合うよ"
20004-20004250 = "それにマシロが泳ぐところを見たいなって"
20004-20004260 = "な、なるほど……そういうことでしたか"
20004-20004270 = "では、お待ちしてますね"
20004-20004280 = "昨日はお疲れ様でした、先生"
20004-20004290 = "お疲れ様。マシロは今日も訓練？"
20004-20004300 = "いえ、今日は訓練ではなくボランティア活動をする予定です"
20004-20004310 = "ボランティア活動？"
20004-20004320 = "はい、色々と助けが必要だと聞きまして"
20004-20004330 = "ゴミ拾いや迷子の保護など、海辺にはトラブルがたくさんありますから"
20004-20004340 = "マシロは偉いね"
20004-20004350 = "いえいえ、大したことでは"
20004-20004360 = "これもまた、正義のための行いですので！"
