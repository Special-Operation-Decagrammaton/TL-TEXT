[translation]
20004-20004010 = "Sensei. Você poderia me acompanhar um pouco hoje à tarde?"
20004-20004020 = "Na verdade, estou pensando em comprar um traje de banho novo para usar no próximo treinamento. Queria pedir o seu conselho."
20004-20004030 = "Bem, eu adoraria te acompanhar, mas..."
20004-20004040 = "Tem certeza de que quer que seja comigo e não com alguma amiga?"
20004-20004050 = "Sim, eu realmente gostaria que fosse o senhor. É que... eu ainda tenho o traje de banho que usava no ensino fundamental, mas ele ficou um pouco apertado..."
20004-20004060 = "Já que estou aqui, como membro do Comitê de Justiça, pensei que seria bom ter um traje mais adequado."
20004-20004070 = "Ah, entendi..."
20004-20004080 = "Sim, e para isso, gostaria de contar com a sua ajuda."
20004-20004090 = "Então, estarei te esperando."
20004-20004100 = "Sensei, você poderia vir até a praia agora?"
20004-20004110 = "Tem algo que eu gostaria de te mostrar."
20004-20004120 = "Claro, estou indo agora mesmo."
20004-20004130 = "Eu não tive chance de usar o traje que comprei outro dia, mas já que estamos na praia..."
20004-20004140 = "Além disso, não é como se eu pudesse usar isso em muitos outros lugares."
20004-20004150 = "Está falando do traje de banho que compramos?"
20004-20004160 = "Ah, se possível, seria de grande ajuda se você pudesse vir um pouco mais cedo."
20004-20004170 = "Ficar esperando vestida assim é, bem, um pouco..."
20004-20004180 = "Ué, não é um traje de banho!? O que exatamente você está vestindo!?"
20004-20004190 = "Sensei. Como minha saúde já se recuperou, como conversamos antes, pensei em começar nadando um pouco."
20004-20004200 = "Certo, eu também vou para aí."
20004-20004210 = "Bem, fico feliz que venha, mas..."
20004-20004220 = "Desta vez é apenas natação, não precisa se preocupar tanto assim...?"
20004-20004230 = "Antes de nadar, vou apenas fazer alguns exercícios de aquecimento na areia..."
20004-20004240 = "É melhor prevenir do que remediar. Eu vou te acompanhar."
20004-20004250 = "Além disso, eu quero ver a Mashiro nadando."
20004-20004260 = "Ah, entendo... era isso."
20004-20004270 = "Então, estarei te esperando."
20004-20004280 = "Obrigada pelo trabalho de ontem, Sensei."
20004-20004290 = "Bom trabalho. A Mashiro tem treinamento hoje também?"
20004-20004300 = "Não, hoje não é treinamento, planejo fazer um trabalho voluntário."
20004-20004310 = "Trabalho voluntário?"
20004-20004320 = "Sim, ouvi dizer que precisam de ajuda com várias coisas."
20004-20004330 = "Como recolher lixo e ajudar crianças perdidas, sempre há muitos problemas na praia."
20004-20004340 = "Você é muito dedicada, Mashiro."
20004-20004350 = "Não, não, não é nada demais."
20004-20004360 = "Isso também é um ato em nome da justiça!"
