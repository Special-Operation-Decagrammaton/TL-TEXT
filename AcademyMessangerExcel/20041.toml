[translation]
20041-200410010 = "先生、届いているかしら"
20041-200410020 = "リオ！？"
20041-200410030 = "ええ、そうよ"
20041-200410040 = "というか…"
20041-200410050 = "少し驚きすぎではなくて？"
20041-200410060 = "リオから連絡もらえるとは思わなくて"
20041-200410070 = "先に伝えておくのだけれど、これはサブ端末よ"
20041-200410080 = "連絡先を登録する必要はないわ"
20041-200410090 = "サブ端末を使うほどの事態なの……？"
20041-200410100 = "何か問題でもあったかしら"
20041-200410110 = "通信を追跡されたら困るでしょう？"
20041-200410120 = "……通信会社も大変だなぁって"
20041-200410130 = "……"
20041-200410140 = "その視点はなかったわ"
20041-200410150 = "でも、これが一番合理的なの"
20041-200410160 = "それで、一体どうしたの？"
20041-200410170 = "スーパーにお弁当を買いに来たのだけれど……"
20041-200410180 = "臨時休業中で……少し来てくれないかしら"
20041-200410190 = "まだ起きているかしら？"
20041-200410200 = "どうしたの？"
20041-200410210 = "貴方に言われた料理機能搭載アバンギャルド君を完成させてみたの"
20041-200410220 = "おお、ちゃんと動いてる？"
20041-200410230 = "ええ、一応"
20041-200410240 = "ただ、先生の手料理と違って"
20041-200410250 = "……味の感想が出てこなくて"
20041-200410260 = "また作ってあげるから、一人でもちゃんと食べてね"
20041-200410270 = "ありがとう"
20041-200410280 = "二日に一回くらい、お弁当でも良いかしら？"
20041-200410290 = "せめて三日に一回で……"
20041-200410300 = "……分かったわ"
20041-200410310 = "先生、少し困った事態になってしまったの"
20041-200410320 = "リオ！"
20041-200410330 = "私が対応できれば良いのだけれど……"
20041-200410340 = "それも難しくて……"
20041-200410350 = "リオの頼みなら、何でも聞くよ"
20041-200410360 = "ありがとう、先生"
20041-200410370 = "では、荷物の受取先をシャーレにしておくわね"
20041-200410380 = "……え？"
20041-200410390 = "先生"
20041-200410400 = "この間のパーツを使って"
20041-200410410 = "料理機能搭載アバンギャルド君を改造したら"
20041-200410420 = "前より味にコクが出た気がするの"
20041-200410430 = "良かったね、リオ！"
20041-200410440 = "ええ"
20041-200410450 = "感謝するわ"
20041-200410460 = "色々あったけれど"
20041-200410470 = "ようやく落ち着いてきたわ"
20041-200410480 = "それで、前にしていたことを"
20041-200410490 = "再開しようと思っているのだけれど"
20041-200410500 = "前にしていたこと？"
20041-200410510 = "オブジェクトの制作よ"
20041-200410520 = "インダストリアルデザイン、と言った方が分かりやすいかしら"
20041-200410530 = "でもアジトだと"
20041-200410540 = "スペースの確保が難しいわね"
20041-200410550 = "換気の問題も……"
20041-200410560 = "じゃあ、シャーレに来る？"
20041-200410570 = "……"
20041-200410580 = "迷惑ではなくて？"
20041-200410590 = "大丈夫だよ！"
20041-200410600 = "その……ありがとう"
20041-200410610 = "前回と同じように"
20041-200410620 = "荷物の受取もお願いできると"
20041-200410630 = "助かるのだけれど"
20041-200410640 = "今さらなのだけれど……"
20041-200410650 = "貴方に"
20041-200410660 = "恩返しをさせてほしい"
20041-200410670 = "気にしなくていいよ"
20041-200410680 = "先生なら、そう言うと思っていたわ"
20041-200410690 = "でも、社会的な規約意識や"
20041-200410700 = "確率、統計に基づき"
20041-200410710 = "そうするべきだと判断したの"
20041-200410720 = "確率と統計って……"
20041-200410730 = "とにかく"
20041-200410740 = "貴方を私のアジトに招待するわ"
20041-200410750 = "……もし、よければ来てちょうだい"
20041-200410760 = "無事に帰れたかしら？"
20041-200410770 = "……先生"
20041-200410780 = "今日は本当にありがとう"
20041-200410790 = "それと……"
20041-200410800 = "今から伝えるメッセージに深い意味はないわ"
20041-200410810 = "けれど、読んだら削除してほしいの"
20041-200410820 = "こんな風に、整えられた部屋で過ごせるのはいつぶりかしら"
20041-200410830 = "それに……"
20041-200410840 = "先生と過ごすようになってから"
20041-200410850 = "少しずつ私の中で変化が起きているように感じているわ"
20041-200410860 = "今まで私の中になかった感情ともいえる"
20041-200410870 = "私の考えが完璧である必要はないのだとも気づかせてくれたし"
20041-200410880 = "貴方と話していると新しい視点を得られるの"
20041-200410890 = "その……色々と面倒ごとが多いとは思うのだけれど"
20041-200410900 = "それでも……先生さえよかったら"
20041-200410910 = "また時間を作ってくれると嬉しいわ"
20041-200410920 = "おやすみ、リオ"
20041-200410930 = "ええ"
20041-200410940 = "おやすみなさい、先生"
