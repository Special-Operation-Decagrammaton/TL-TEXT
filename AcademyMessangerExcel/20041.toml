[translation]
20041-200410010 = "Sensei, será que chegou?"
20041-200410020 = "Rio!?"
20041-200410030 = "Sim, sou eu."
20041-200410040 = "Quer dizer..."
20041-200410050 = "Não está surpreso demais?"
20041-200410060 = "É que eu não esperava receber um contato da Rio."
20041-200410070 = "Vou avisar logo de antemão, este é um dispositivo secundário."
20041-200410080 = "Não precisa registrar o contato."
20041-200410090 = "A situação é tão grave a ponto de precisar de um dispositivo secundário...?"
20041-200410100 = "Houve algum problema, por acaso?"
20041-200410110 = "Seria um problema se rastreassem a comunicação, não seria?"
20041-200410120 = "……É que eu fiquei pensando que as empresas de telecomunicações devem ter um trabalho difícil."
20041-200410130 = "……"
20041-200410140 = "Eu não tinha pensado por esse ângulo."
20041-200410150 = "Mas, esta é a forma mais racional."
20041-200410160 = "Então, o que aconteceu?"
20041-200410170 = "Eu vim ao supermercado comprar uma marmita, mas..."
20041-200410180 = "Está fechado temporariamente... Você poderia vir aqui?"
20041-200410190 = "Será que você ainda está acordado?"
20041-200410200 = "O que houve?"
20041-200410210 = "Consegui terminar o Avant-Garde-kun com a função de culinária que você sugeriu."
20041-200410220 = "Oh, está funcionando direitinho?"
20041-200410230 = "Sim, mais ou menos."
20041-200410240 = "Só que, diferente da comida feita pelo Sensei,"
20041-200410250 = "……não consigo sentir o gosto."
20041-200410260 = "Vou fazer para você de novo, então coma direito, mesmo estando sozinho."
20041-200410270 = "Obrigado."
20041-200410280 = "Tudo bem se eu te mandar uma marmita a cada dois dias?"
20041-200410290 = "Pelo menos a cada três dias..."
20041-200410300 = "……Entendido."
20041-200410310 = "Sensei, surgiu uma situação um pouco complicada."
20041-200410320 = "Rio!"
20041-200410330 = "Seria bom se eu pudesse resolver sozinha, mas..."
20041-200410340 = "Isso também é difícil..."
20041-200410350 = "Se for um pedido da Rio, eu farei qualquer coisa."
20041-200410360 = "Obrigada, Sensei."
20041-200410370 = "Então, vou colocar o endereço de entrega no Schale."
20041-200410380 = "……Eh?"
20041-200410390 = "Sensei."
20041-200410400 = "Usando aquelas peças de outro dia,"
20041-200410410 = "quando modifiquei o Avant-Garde-kun com a função de culinária,"
20041-200410420 = "senti que o sabor ficou mais encorpado que antes."
20041-200410430 = "Que bom, Rio!"
20041-200410440 = "Sim."
20041-200410450 = "Sou grata."
20041-200410460 = "Apesar de tudo o que aconteceu,"
20041-200410470 = "as coisas finalmente começaram a se acalmar."
20041-200410480 = "Por isso, estou pensando em retomar"
20041-200410490 = "o que eu estava fazendo antes."
20041-200410500 = "O que você estava fazendo antes?"
20041-200410510 = "Produção de objetos."
20041-200410520 = "Talvez seja mais fácil entender se eu disser design industrial."
20041-200410530 = "Mas no esconderijo..."
20041-200410540 = "É difícil garantir espaço, não é?"
20041-200410550 = "E o problema da ventilação também..."
20041-200410560 = "Então, por que não vem ao Schale?"
20041-200410570 = "……"
20041-200410580 = "Não seria um incômodo?"
20041-200410590 = "Está tudo bem!"
20041-200410600 = "Isso... obrigado."
20041-200410610 = "Da mesma forma que da última vez,"
20041-200410620 = "se você puder receber as encomendas para mim,"
20041-200410630 = "seria de grande ajuda."
20041-200410640 = "Pode parecer tarde para dizer isso, mas..."
20041-200410650 = "Eu quero"
20041-200410660 = "retribuir o favor a você."
20041-200410670 = "Não precisa se preocupar com isso."
20041-200410680 = "Eu sabia que você diria isso, Sensei."
20041-200410690 = "Mas, com base em normas sociais,"
20041-200410700 = "probabilidades e estatísticas,"
20041-200410710 = "eu julguei que deveria fazer isso."
20041-200410720 = "Probabilidades e estatísticas..."
20041-200410730 = "De qualquer forma,"
20041-200410740 = "vou convidar você para o meu esconderijo."
20041-200410750 = "……Se puder, por favor, venha."
20041-200410760 = "Será que você chegou em casa em segurança?"
20041-200410770 = "……Sensei."
20041-200410780 = "Muito obrigada por hoje."
20041-200410790 = "E também..."
20041-200410800 = "A mensagem que vou enviar agora não tem um significado profundo."
20041-200410810 = "Mas, por favor, apague-a depois de ler."
20041-200410820 = "Faz quanto tempo que não passo um tempo em um quarto arrumado assim?"
20041-200410830 = "Além disso..."
20041-200410840 = "Desde que comecei a passar tempo com você, Sensei,"
20041-200410850 = "sinto que mudanças estão ocorrendo em mim, pouco a pouco."
20041-200410860 = "Poderia até dizer que são sentimentos que eu não tinha antes."
20041-200410870 = "Você me fez perceber que não preciso que meus pensamentos sejam perfeitos,"
20041-200410880 = "e quando converso com você, ganho novas perspectivas."
20041-200410890 = "Eu sei que isso traz muitos problemas..."
20041-200410900 = "Mas ainda assim... se não for um incômodo para você, Sensei,"
20041-200410910 = "eu ficaria feliz se pudesse arranjar um tempo novamente."
20041-200410920 = "Boa noite, Rio."
20041-200410930 = "Sim."
20041-200410940 = "Boa noite, Sensei."
