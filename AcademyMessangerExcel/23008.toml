[translation]
23008-230080010 = "Que a paz e a tranquilidade estejam com todos vocês hoje também."
23008-230080020 = "Se tiverem qualquer preocupação, por favor, visitem-nos a qualquer momento."
23008-230080030 = "Para aqueles que não puderem vir, nós iremos até vocês. Por favor, sintam-se à vontade para nos pedir."
23008-230080040 = "Ah"
23008-230080050 = "D-desculpe..."
23008-230080060 = "Enviei para o Sensei por engano."
23008-230080070 = "Tudo bem se eu for?"
23008-230080080 = "Tudo bem se eu for, mesmo não sendo uma aluna?"
23008-230080090 = "Ah, sim."
23008-230080100 = "Com certeza."
23008-230080110 = "Se for esse o caso, estarei esperando ansiosamente."
23008-230080120 = "Sensei, como você está se sentindo desde aquele momento?"
23008-230080130 = "Aquela decoração caindo de repente... foi um susto, não foi?"
23008-230080140 = "Se estiver sentindo alguma dor em algum lugar, por favor, me avise a qualquer momento. Ou então, talvez seja melhor irmos ao hospital agora mesmo..."
23008-230080150 = "Estou bem, desculpe por te preocupar. Acho que você é bem atenta mesmo."
23008-230080160 = "Mesmo assim, não posso simplesmente desistir..."
23008-230080170 = "..."
23008-230080180 = "?"
23008-230080190 = "Hum...?"
23008-230080200 = "Sensei, como você tem passado?"
23008-230080210 = "O ferimento do outro dia, já sarou...?"
23008-230080220 = "Obrigado. Não precisa se preocupar tanto assim."
23008-230080230 = "Sim, estou totalmente bem. Não se preocupe."
23008-230080240 = "Não, não posso deixar passar."
23008-230080250 = "Mesmo estando a caminho de me tornar uma irmã, não posso simplesmente ignorar algo assim."
23008-230080260 = "Preciso rezar para que algo assim não aconteça novamente..."
23008-230080270 = "Falando nisso,"
23008-230080280 = "Hoje, por acaso, não tenho nenhum compromisso na Catedral."
23008-230080290 = "Se o Sensei não se importar..."
23008-230080300 = "Chegou bem em casa, Sensei?"
23008-230080310 = "Graças à sua visita hoje, meu coração também encontrou paz."
23008-230080320 = "Parece que, embora eu dissesse que era pelo Sensei, acabou sendo bom para mim também."
23008-230080330 = "...É um pouco preocupante. Pensar nisso faz com que pensar no Sensei pareça um motivo impuro."
23008-230080340 = "Acho que provavelmente estou bem...?"
23008-230080350 = "Mas, graças a isso, eu também me senti mais calma hoje. Obrigado."
23008-230080360 = "Fufu, fico muito feliz em ouvir isso."
23008-230080370 = "Fico contente que diga isso."
23008-230080380 = "Então, Sensei,"
23008-230080390 = "Vamos nos encontrar novamente em breve."
23008-230080400 = "Que a paz e a tranquilidade estejam com todos vocês hoje também."
23008-230080410 = "Se tiverem qualquer preocupação, por favor, visitem-nos a qualquer momento."
23008-230080420 = "No entanto, hoje eu não estarei na Catedral..."
23008-230080430 = "Marie, você vai sair hoje?"
23008-230080440 = "Parece que você está ocupada com várias coisas, bom trabalho."
23008-230080450 = "Ah, não, não é nada em especial..."
23008-230080460 = "Eu acabei não me sentindo muito bem..."
23008-230080470 = "Você está bem!?"
23008-230080480 = "É um resfriado!?"
23008-230080490 = "D-desculpe."
23008-230080500 = "Acabei fazendo você se preocupar comigo..."
23008-230080510 = "Não é um sintoma grave, então acho que vou melhorar logo se eu descansar."
23008-230080520 = "Desculpe, acabei dormindo sem perceber..."
23008-230080530 = "Eu acabei esquecendo de dizer, mas muito obrigada mesmo."
23008-230080540 = "Não sei se isso conta como retribuição, mas..."
23008-230080550 = "Além disso, embora seja algo que faço sempre,"
23008-230080560 = "continuarei rezando pelo senhor, Sensei."
23008-230080570 = "Bom dia, Sensei."
23008-230080580 = "Digo, o senhor teria um momento agora...?"
23008-230080590 = "Sim, o que houve?"
23008-230080600 = "Está tudo bem, pode falar."
23008-230080610 = "Muito obrigada."
23008-230080620 = "Bem, é que..."
23008-230080630 = "Desculpe, não sei bem como dizer... Não estou acostumada com esse tipo de coisa..."
23008-230080640 = "Se não for incômodo, poderíamos nos encontrar em algum lugar para conversar?"
23008-230080650 = "Ah, não é nada sobre algum incidente ou preocupação sombria. Só para garantir..."
23008-230080660 = "Então, enviarei o horário mais tarde."
23008-230080670 = "Conto com o senhor."
23008-230080680 = "Sensei, muito obrigada pelo dia de hoje."
23008-230080690 = "Fiquei muito feliz, de verdade."
23008-230080700 = "Talvez eu entre em contato novamente de vez em quando..."
23008-230080710 = "Por favor, cuide-se. Até mais."
23008-230080720 = "Sensei."
23008-230080730 = "...Só queria chamar o seu nome."
23008-230080740 = "Bom dia, Sensei."
23008-230080750 = "Digo... se o senhor tiver um tempo..."
23008-230080760 = "Está tudo bem. O que houve?"
23008-230080770 = "Se houver algo que eu possa fazer, é só pedir."
23008-230080780 = "Muito obrigada...!"
23008-230080790 = "Vou comprar alguns suprimentos para a Sisterhood,"
23008-230080800 = "mas sozinha não vou dar conta de tudo..."
23008-230080810 = "Se não for um problema, o senhor poderia me acompanhar...?"
23008-230080820 = "Claro, pode deixar comigo."
23008-230080830 = "Para onde devo ir?"
23008-230080840 = "Muito obrigada! Vou enviar o local agora."
23008-230080850 = "Muito obrigada pelo dia de hoje."
23008-230080860 = "Obrigada por me levar até a academia depois da refeição..."
23008-230080870 = "Tem certeza de que não queria comprar aquele acessório?"
23008-230080880 = "Fufu, já estou bem assim."
23008-230080890 = "Depois de conversar com o senhor hoje,"
23008-230080900 = "decidi que vou cuidar ainda melhor do meu corsage."
23008-230080910 = "...Por enquanto, isso é o suficiente."
