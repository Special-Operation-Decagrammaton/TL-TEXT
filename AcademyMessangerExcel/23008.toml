[translation]
23008-230080010 = "今日も平和と安寧が、みなさんと共にありますように"
23008-230080020 = "何か悩みごとなどがありましたら、いつでも私たちの元をお訪ねください"
23008-230080030 = "お越しになれない方の元へは、私たちの方からお伺いしますので。ぜひお気軽にお申し付けください"
23008-230080040 = "あ"
23008-230080050 = "ご、ごめんなさい……"
23008-230080060 = "間違って、先生に送ってしまいました"
23008-230080070 = "これ、私が行っても大丈夫？"
23008-230080080 = "これ、生徒じゃなくても行って大丈夫？"
23008-230080090 = "あ、はい"
23008-230080100 = "もちろんです"
23008-230080110 = "そういうことでしたら、楽しみにお待ちしておりますね"
23008-230080120 = "先生、あれからお変わりはありませんか？"
23008-230080130 = "急に装飾物が落ちるだなんて……びっくりしましたね"
23008-230080140 = "もしどこかが痛んだりするようでしたら、いつでも仰ってくださいね。それか、やはり今からでも一緒に病院に……"
23008-230080150 = "大丈夫、心配させてごめんね。やっぱりよく見てるのかも"
23008-230080160 = "それでも、諦めるわけには……"
23008-230080170 = "……"
23008-230080180 = "？"
23008-230080190 = "えっと……？"
23008-230080200 = "先生、いかがお過ごしですか？"
23008-230080210 = "先日の怪我は、もう治られましたか……？"
23008-230080220 = "ありがとう。そこまで気負わなくても大丈夫だよ"
23008-230080230 = "うん、全然大丈夫だよ。気にしないで"
23008-230080240 = "いえ、そうはいきません"
23008-230080250 = "これからシスターになろうというのに、こういったことをただただ見過ごすなんてわけには"
23008-230080260 = "今後はこのようなことが起きないよう、祈らないとです……"
23008-230080270 = "そういえば"
23008-230080280 = "今日はちょうど、大聖堂では何の用事もない日でして"
23008-230080290 = "もし先生がよろしければ……"
23008-230080300 = "無事に帰られましたか、先生？"
23008-230080310 = "今日は先生に来ていただいたおかげで、私も心が安らぎました"
23008-230080320 = "やはり先生のためと言いつつ、自分のためにもなっていたようです"
23008-230080330 = "……何だか心配ですね。そう思うと先生のことを考えるのが、何だか不純な動機になってしまいそうで"
23008-230080340 = "多分大丈夫じゃないかな……？"
23008-230080350 = "でもおかげで私も、今日は何だか落ち着いたよ。ありがとう"
23008-230080360 = "ふふっ、それでしたら何よりです"
23008-230080370 = "そう言っていただけると嬉しいですね"
23008-230080380 = "それでは、先生"
23008-230080390 = "また今度お会いしましょう"
23008-230080400 = "今日も平和と安寧が、みなさんと共にありますように"
23008-230080410 = "何か悩みごとなどがありましたら、いつでも私たちの元をお訪ねください"
23008-230080420 = "ただ、本日私は聖堂にいないのですが……"
23008-230080430 = "マリー、今日どこかに出かけるの？"
23008-230080440 = "色々と忙しそうだね、お疲れ様"
23008-230080450 = "あ、いえ、特に何か用事というわけではないのですが……"
23008-230080460 = "ちょっと体調を崩してしまいまして……"
23008-230080470 = "大丈夫！？"
23008-230080480 = "風邪！？"
23008-230080490 = "ご、ごめんなさい"
23008-230080500 = "かえってご心配させてしまいましたね……"
23008-230080510 = "大した症状ではありませんので、休んだらすぐ良くなるかと"
23008-230080520 = "すみません、いつの間に寝てしまって……"
23008-230080530 = "伝えそびれてしまったのですが、本当にありがとうございました"
23008-230080540 = "恩返しになるのか分かりませんが……"
23008-230080550 = "それに、いつものことではありますが"
23008-230080560 = "また、先生のためにお祈りいたしますね"
23008-230080570 = "おはようございます、先生"
23008-230080580 = "その、今お時間よろしいでしょうか……？"
23008-230080590 = "うん、どうしたの？"
23008-230080600 = "全然大丈夫だよ"
23008-230080610 = "ありがとうございます"
23008-230080620 = "その、えっと……"
23008-230080630 = "すみません、何と言えば良いものか……こういうのには、慣れていなくって……"
23008-230080640 = "もしよろしければ、どこかでお会いしてお話してもよろしいですか？"
23008-230080650 = "あ、その、何か事件があったですとか、暗い悩みとかではありません。念のため……"
23008-230080660 = "それでは、お時間などは後ほどお送りしますので"
23008-230080670 = "よろしくお願いいたします"
23008-230080680 = "先生、今日はありがとうございました"
23008-230080690 = "本当に、嬉しかったです"
23008-230080700 = "これからも時々ご連絡させていただくかもしれませんが……"
23008-230080710 = "どうぞ、よろしくお願いいたします。それでは、また"
23008-230080720 = "先生"
23008-230080730 = "……呼んでみただけ、です"
23008-230080740 = "おはようございます、先生"
23008-230080750 = "その……もし、お時間よろしければ……"
23008-230080760 = "大丈夫だよ。どうしたの？"
23008-230080770 = "私にできることがあれば何でも言って"
23008-230080780 = "ありがとうございます……！"
23008-230080790 = "シスターフッドの備品を買いに行くのですが"
23008-230080800 = "私一人ではちょっと手が足りなくて……"
23008-230080810 = "もし大丈夫でしたら、お付き合いいただけないでしょうか……？"
23008-230080820 = "うん、任せて"
23008-230080830 = "どこに向かえばいいかな？"
23008-230080840 = "ありがとうございます！場所、今送りますね"
23008-230080850 = "今日は本当にありがとうございました"
23008-230080860 = "お食事の後、学園まで送って下さって……"
23008-230080870 = "本当にアクセサリー、買わなくて良かったの？"
23008-230080880 = "ふふ、もう大丈夫ですよ"
23008-230080890 = "先生と今日お話できたことで"
23008-230080900 = "コサージュを、もっと大切にすると決めましたので"
23008-230080910 = "……今はそれで、充分なんです"
