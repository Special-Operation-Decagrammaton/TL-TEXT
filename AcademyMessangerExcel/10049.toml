[translation]
10049-100490010 = "こんにちは、先生。杏山カズサです"
10049-100490020 = "あー……"
10049-100490030 = "もしかして、今忙しいかな？暇な時にお返事もらえたら"
10049-100490040 = "それでは、お待ちしています"
10049-100490050 = "親しみのある話し方をするね"
10049-100490060 = "敬語とタメ口が混ざってる……？"
10049-100490070 = "……なに"
10049-100490080 = "先生に送るトークだし、たまに敬語のほうがいいかなって思う時があるだけ"
10049-100490090 = "とにかく……返事してくれてるなら、時間は大丈夫みたいだね。よかった"
10049-100490100 = "先生は忙しいだろうし、私がシャーレの近くに向かうね"
10049-100490110 = "それじゃあ、後でまた連絡します"
10049-100490120 = "先生、無事帰れた？"
10049-100490130 = "私はちゃんと部屋に戻れたよ。ちょうど今からシャワー浴びようかなと"
10049-100490140 = "あ……"
10049-100490150 = "なんでこんな事わざわざ言っちゃったんだろ、私"
10049-100490160 = "うーーー……"
10049-100490170 = "……まあ、気にしないで。何だか言ったほうがいいかなって思っただけだから"
10049-100490180 = "とにかく今日は、本当にありがとうございました！"
10049-100490190 = "じゃあ"
10049-100490200 = "またね、先生"
10049-100490210 = "疲れた"
10049-100490220 = "先生、今仕事？"
10049-100490230 = "仕事中だけど……"
10049-100490240 = "カズサはまだ外？"
10049-100490250 = "あ、まぁそうだね……"
10049-100490260 = "今日は溜めてた分を一気に復習しようと思って、遅くまで学校にいたから"
10049-100490270 = "そろそろ帰ろうと思って"
10049-100490280 = "帰り道、暇だから送ってみた。別に深い意味はないよ"
10049-100490290 = "それじゃあ良い一日を"
10049-100490300 = "あ、"
10049-100490310 = "先生"
10049-100490320 = "……"
10049-100490340 = "写真？"
10049-100490350 = "無事に帰れたの？"
10049-100490360 = "うん、まあ"
10049-100490370 = "とりあえず、もう遅いし"
10049-100490380 = "そういう事"
10049-100490390 = "あの時間まで先生と一緒にいたから"
10049-100490400 = "無事着きましたぐらい、しっかり報告しておこうかなって"
10049-100490410 = "けど写真撮るのはあんま慣れてないから、ちょっと表情が……汗"
10049-100490420 = "だから"
10049-100490430 = "見たら消してね"
10049-100490440 = "じゃあまた"
10049-100490450 = "先生、今もしかして忙しい？"
10049-100490460 = "だったら大丈夫なんだけど"
10049-100490470 = "この前の続きだけど……すごく好きなスイーツとかある？"
10049-100490480 = "好きなスイーツ？"
10049-100490490 = "もしかして買ってきてくれるの？"
10049-100490500 = "あー、やっぱちょっと急だったかな"
10049-100490510 = "？？？何のこと？"
10049-100490520 = "あー、まぁ。気が向いたら買うかもね？"
10049-100490530 = "ほら……せっかく買っても、好みから外れたら困るじゃん"
10049-100490540 = "んー……"
10049-100490550 = "やっぱこの話終わり"
10049-100490560 = "今のは聞かなかったことにして"
10049-100490570 = "先生、もしかして"
10049-100490580 = "今、席にいる？"
10049-100490590 = "うん。いるよ"
10049-100490600 = "どうしたの？"
10049-100490610 = "いや、大したことじゃなくて"
10049-100490620 = "席にいるならいいよ"
10049-100490630 = "ちょっと入るよ"
10049-100490640 = "あの、先生"
10049-100490650 = "念のためもう一度言うけど"
10049-100490660 = "本当に「処理」なんかじゃないからね"
10049-100490670 = "でも、今度はちゃんと先生の分を選んで持って行くから"
10049-100490680 = "早速その二つの言葉が矛盾していますが"
10049-100490690 = "大丈夫、おいしかったよ"
10049-100490700 = "……そう"
10049-100490710 = "うーん……"
10049-100490720 = "あと、最後に"
10049-100490730 = "その、やっぱ"
10049-100490740 = "からかってたんだよね？猫のくだり"
10049-100490750 = "さあ、どうだろうね"
10049-100490760 = "結局ばれちゃったね"
10049-100490770 = "……"
10049-100490780 = "サイテー……"
