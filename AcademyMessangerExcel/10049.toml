[translation]
10049-100490010 = "Olá, Sensei. Sou Kazusa Kyouyama."
10049-100490020 = "Ah..."
10049-100490030 = "Será que você está ocupado(a) agora? Se puder me responder quando tiver tempo..."
10049-100490040 = "Então, ficarei aguardando."
10049-100490050 = "Você fala de um jeito amigável."
10049-100490060 = "Você está misturando linguagem formal e informal...?"
10049-100490070 = "...O que foi?"
10049-100490080 = "É uma conversa com o Sensei, então às vezes eu só acho que é melhor usar uma linguagem mais formal."
10049-100490090 = "Enfim... Se você está respondendo, parece que tem tempo. Que bom."
10049-100490100 = "Você deve estar ocupado(a), Sensei, então eu vou aí perto da Schale."
10049-100490110 = "Então, entro em contato de novo mais tarde."
10049-100490120 = "Sensei, chegou bem em casa?"
10049-100490130 = "Eu cheguei bem no meu quarto. Estava pensando em tomar um banho agora."
10049-100490140 = "Ah..."
10049-100490150 = "Por que eu fui falar uma coisa dessas?"
10049-100490160 = "Ughhh..."
10049-100490170 = "...Bem, não se preocupe com isso. Só achei que seria bom avisar."
10049-100490180 = "Enfim, muito obrigada por hoje!"
10049-100490190 = "Então..."
10049-100490200 = "Até mais, Sensei."
10049-100490210 = "Que cansaço."
10049-100490220 = "Sensei, está trabalhando agora?"
10049-100490230 = "Estou no meio do trabalho, mas..."
10049-100490240 = "Kazusa, você ainda está fora?"
10049-100490250 = "Ah, bem, sim..."
10049-100490260 = "Hoje eu decidi revisar tudo o que tinha acumulado, então fiquei na escola até tarde."
10049-100490270 = "Estava pensando em ir para casa agora."
10049-100490280 = "Mandei mensagem porque estava sem nada pra fazer no caminho de casa. Não tem nenhum motivo especial."
10049-100490290 = "Então, tenha um bom dia."
10049-100490300 = "Ah,"
10049-100490310 = "Sensei."
10049-100490320 = "..."
10049-100490340 = "Uma foto?"
10049-100490350 = "Chegou bem em casa?"
10049-100490360 = "Sim, bem..."
10049-100490370 = "De qualquer forma, já está tarde e..."
10049-100490380 = "É isso."
10049-100490390 = "Como eu fiquei com você até aquela hora, Sensei..."
10049-100490400 = "...pensei que deveria pelo menos avisar que cheguei bem."
10049-100490410 = "Mas não estou muito acostumada a tirar fotos, então minha expressão ficou meio... estranha."
10049-100490420 = "Então..."
10049-100490430 = "Apague depois de ver, tá?"
10049-100490440 = "Então, até mais."
10049-100490450 = "Sensei, por acaso você está ocupado(a) agora?"
10049-100490460 = "Se estiver, tudo bem."
10049-100490470 = "Continuando o assunto do outro dia... Você tem algum doce que gosta muito?"
10049-100490480 = "Um doce que eu gosto?"
10049-100490490 = "Por acaso você vai comprar pra mim?"
10049-100490500 = "Ah, acho que foi meio repentino, né?"
10049-100490510 = "??? Do que você está falando?"
10049-100490520 = "Ah, bem. Talvez eu compre se me der vontade?"
10049-100490530 = "Sabe... seria um problema se eu comprasse e não gostasse."
10049-100490540 = "Hmm..."
10049-100490550 = "Quer saber? Fim de papo."
10049-100490560 = "Finja que não ouviu o que eu acabei de dizer."
10049-100490570 = "Professor, por acaso..."
10049-100490580 = "Você está na sua mesa agora?"
10049-100490590 = "Uhum. Estou sim."
10049-100490600 = "O que foi?"
10049-100490610 = "Não, não é nada demais."
10049-100490620 = "Se você está aí, tudo bem."
10049-100490630 = "Vou entrar rapidinho."
10049-100490640 = "Hã, Professor..."
10049-100490650 = "Vou dizer mais uma vez, só pra garantir,"
10049-100490660 = "Não é mesmo um 'descarte', tá?"
10049-100490670 = "Mas, desta vez, vou escolher um direitinho pra você e levar."
10049-100490680 = "Essas duas frases já se contradizem."
10049-100490690 = "Tudo bem, estava uma delícia."
10049-100490700 = "...Sei."
10049-100490710 = "Uhm..."
10049-100490720 = "E, por último..."
10049-100490730 = "Sabe, no fim das contas..."
10049-100490740 = "Você estava só brincando, né? Sobre o gato."
10049-100490750 = "Bem, quem sabe?"
10049-100490760 = "No fim, você descobriu, né?"
10049-100490770 = "..."
10049-100490780 = "Péssimo..."
