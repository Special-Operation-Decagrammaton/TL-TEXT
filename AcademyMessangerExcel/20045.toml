[translation]
20045-200450010 = "Chefe!"
20045-200450020 = "Não, Sensei!"
20045-200450030 = "É a Phina!"
20045-200450040 = "Quanto tempo, Phina."
20045-200450050 = "Faz tempo que não nos vemos!"
20045-200450060 = "Na verdade, Phina renasceu como uma fênix desta vez!"
20045-200450070 = "Eu queria te mostrar minha nova aparência, por isso entrei em contato!"
20045-200450080 = "Por favor, venha visitar Hyakkiyako!"
20045-200450090 = "Estarei esperando!"
20045-200450100 = "Eu estraguei tudo..."
20045-200450110 = "Era a chance perfeita de mostrar o charme de Hyakkiyako até a medula..."
20045-200450120 = "Que arrependimento."
20045-200450130 = "Não tem problema. Cães costumam sair para brincar livremente."
20045-200450140 = "Como pude esquecer algo tão básico por estar apressada..."
20045-200450150 = "Mas a Phina se esforçando ao máximo foi maravilhosa."
20045-200450160 = "!!"
20045-200450170 = "Estou lisonjeada! Chefe!"
20045-200450180 = "Graças a isso, recuperei a calma!"
20045-200450190 = "Desta vez, vou apresentar as especialidades de Hyakkiyako corretamente!"
20045-200450200 = "Eu, a humilde Phina, darei tudo de mim para me vingar!"
20045-200450210 = "Chefe! Bom dia!"
20045-200450220 = "Hoje serei a guia do passeio de ônibus, mas..."
20045-200450230 = "Ainda temos lugares vazios, então por favor, participe!"
20045-200450240 = "Prepare-se para o guia no estilo Ninkyo da Phina!"
20045-200450250 = "Eu pretendia mostrar o guia perfeito da Phina hoje..."
20045-200450260 = "Cometi um erro de novo..."
20045-200450270 = "Não consigo nem olhar na cara do Chefe...!"
20045-200450280 = "E ainda por cima, você me defendeu..."
20045-200450290 = "Eu, a humilde Phina, estou emocionada!"
20045-200450300 = "Mas a forma como a Phina foi honesta sobre o que aconteceu foi muito legal."
20045-200450310 = "Pensei que eu também deveria aprender com você."
20045-200450320 = "!!"
20045-200450330 = "O Chefe aprender comigo... estou lisonjeada!!"
20045-200450340 = "Mas, honestamente, fico muito feliz em ouvir que fui legal!"
20045-200450350 = "Eu, a humilde Phina, continuarei me dedicando ainda mais!"
20045-200450360 = "Olá, Sensei!"
20045-200450370 = "A Phina de hoje é diferente!"
20045-200450380 = "Porque hoje é o dia em que brilho como uma profissional!"
20045-200450390 = "Quero muito que o Sensei veja minha nova versão!"
20045-200450400 = "Então, estarei esperando na Vila Cinematográfica Uzumaki!"
20045-200450410 = "Ugh, meu rosto ainda está quente..."
20045-200450420 = "Da próxima vez, vou me manter mais focada..."
20045-200450430 = "Todos se divertiram, então está tudo bem."
20045-200450440 = "Acho que a Phina tem o talento de animar a todos."
20045-200450450 = "!!"
20045-200450460 = "Sendo assim, estou aliviada!"
20045-200450470 = "Hehehe... Eu, a humilde Phina, usarei o fracasso de hoje como lição para dominar o caminho do Ninkyo!"
20045-200450480 = "Sob a orientação do Sensei, consegui crescer como guia!"
20045-200450490 = "Graças a isso, estou sendo reconhecida como uma guia Ninkyo!"
20045-200450500 = "Hoje é o último passeio! O que acha de participar, Sensei!?"
20045-200450510 = "Eu, Fina, darei o meu melhor até o fim para oferecer a melhor hospitalidade!"
20045-200450520 = "Chefe"
20045-200450530 = "Oh, não"
20045-200450540 = "Sensei! É a Fina."
20045-200450550 = "Consegui completar a missão da rua comercial de alguma forma!"
20045-200450560 = "Foi graças ao fato de o Sensei ter ficado de olho em mim."
20045-200450570 = "Fina, da próxima vez, não como guia,"
20045-200450580 = "mas como uma cliente viajando junto,"
20045-200450590 = "eu adoraria passear por Hyakkiyako com o Sensei... digo, só brincadeira."
20045-200450600 = "...E-esqueça o que eu acabei de dizer!"
20045-200450610 = "Isso também parece divertido!"
20045-200450620 = "!!"
20045-200450630 = "Você vai passear comigo de novo, Sensei!?"
20045-200450640 = "Muito obrigada!"
20045-200450650 = "Vamos nos encontrar de novo! Chefe!"
