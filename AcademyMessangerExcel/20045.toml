[translation]
20045-200450010 = "お頭！"
20045-200450020 = "いえ、センセイ！"
20045-200450030 = "フィーナデース！"
20045-200450040 = "久しぶりだね、フィーナ"
20045-200450050 = "ご無沙汰しておりマス！"
20045-200450060 = "実はフィーナ、この度不死鳥の如く生まれ変わったんデス！"
20045-200450070 = "新たな姿をお見せシタク、ご連絡しマシタ！"
20045-200450080 = "ぜひ、百鬼夜行にお越しクダサイ！"
20045-200450090 = "お待ちしておりマス！"
20045-200450100 = "やっちまいマシタ……"
20045-200450110 = "百鬼夜行の魅力を骨の髄までアピールできるチャンスだったのに……"
20045-200450120 = "無念デス"
20045-200450130 = "仕方ないよ。犬は自由に遊びに行ったりするものだから"
20045-200450140 = "焦ってそんな基本的なことを忘れるナンテ……"
20045-200450150 = "でも、一生懸命なフィーナは素敵だったよ"
20045-200450160 = "！！"
20045-200450170 = "恐縮デス！お頭！"
20045-200450180 = "おかげで、冷静さを取り戻せマシタ！"
20045-200450190 = "次こそは、百鬼夜行の名物を、しっかり紹介します！"
20045-200450200 = "不肖フィーナ、全力でリベンジデス！"
20045-200450210 = "お頭！おはようございマス！"
20045-200450220 = "本日はバスツアーのガイドを務めるのデスが……"
20045-200450230 = "まだ空席がありマスので、ぜひご参加を！"
20045-200450240 = "フィーナの任侠流ガイドに、乞うご期待！デス！"
20045-200450250 = "今日はフィーナのPerfectなガイドをお見せするつもりだのに……！"
20045-200450260 = "またしてもミスしてしまいマシタ……。"
20045-200450270 = "お頭に顔向けできマセン……！"
20045-200450280 = "しかも、そんなフィーナをかばってくれるナンテ……"
20045-200450290 = "不肖フィーナ、感激デス！"
20045-200450300 = "でも、正直に話すフィーナの姿は、すごくカッコよかった"
20045-200450310 = "私も見習わなきゃって思ったよ"
20045-200450320 = "！！"
20045-200450330 = "お頭がフィーナを見習うなんて……恐縮デス！！"
20045-200450340 = "でも、カッコいいって言われるのは……正直、スゴく嬉しいデス！"
20045-200450350 = "不肖フィーナ、より一層精進して参りマス！"
20045-200450360 = "こんにちは、センセイ！"
20045-200450370 = "今日のフィーナは、一味違いマス！"
20045-200450380 = "プロフェッショナルとして輝く日デスカラ！"
20045-200450390 = "一皮むけた姿を、ぜひセンセイに見てほしいデス！"
20045-200450400 = "それでは、渦巻映画村でお待ちしておりマス！"
20045-200450410 = "ウゥッ、まだ顔が熱いデス……"
20045-200450420 = "次からはもっと気を引き締めて参りマス……"
20045-200450430 = "みんな楽しんでたし、大丈夫だよ"
20045-200450440 = "フィーナには、みんなを盛り上げる才能があると思う"
20045-200450450 = "！！ "
20045-200450460 = "それなら安心デス！"
20045-200450470 = "エヘヘ……不肖フィーナ、今日の失敗を糧に、任侠の道を究めマス！"
20045-200450480 = "センセイのご指導のもと、ガイドとして成長することができマシタ！"
20045-200450490 = "おかげでフィーナは、任侠ガイドとして認められつつありマス！"
20045-200450500 = "今日が最後のツアーデス！ぜひセンセイもいかがデスカ！？"
20045-200450510 = "不肖フィーナ！最後まで全力でおもてなしいたしマスッッッ！"
20045-200450520 = "お頭"
20045-200450530 = "Oh イヤ"
20045-200450540 = "センセイ！フィーナデス"
20045-200450550 = "商店街からの任務、何とかやり遂げることができマシタ！"
20045-200450560 = "センセイが見守ってくださったおかげデス"
20045-200450570 = "フィーナ、次はガイドじゃなくて"
20045-200450580 = "一緒に旅するお客さんとシテ"
20045-200450590 = "センセイと二人で百鬼夜行を巡りたいな～……ナンテ"
20045-200450600 = "……い、今の申し出は忘れてクダサイ！"
20045-200450610 = "それも楽しそう！"
20045-200450620 = "！！"
20045-200450630 = "フィーナとまた一緒に回ってくれるんデスカ！？"
20045-200450640 = "ありがとうございマス！"
20045-200450650 = "またお会いしまショウ！お頭！"
