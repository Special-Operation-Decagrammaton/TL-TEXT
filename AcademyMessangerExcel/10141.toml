[translation]
10141-101410010 = "Sensei... tem uma coisa que eu queria conversar..."
10141-101410020 = "É que... como é que eu digo..."
10141-101410030 = "Será que eu posso mesmo usar um vestido? Mesmo sendo eu?"
10141-101410040 = "Ah, desculpa, pode ignorar."
10141-101410050 = "É que... não tenho confiança nenhuma..."
10141-101410060 = "Pode ficar tranquila. Você usa o que você quiser."
10141-101410070 = "S-"
10141-101410080 = "É mesmo...?"
10141-101410090 = "M-muito obrigada... Sensei..."
10141-101410100 = "Aquele machucado... está bem mesmo?"
10141-101410110 = "Não piorou depois?"
10141-101410120 = "Tudo bem! Relaxa!"
10141-101410130 = "Foi só um arranhão!"
10141-101410140 = "Desculpa..."
10141-101410150 = "Eu, como segurança, devia ter intervindo primeiro..."
10141-101410160 = "Se eu tiver que fazer o mesmo serviço de novo"
10141-101410170 = "Dessa vez, eu juro que vou impedir...!"
10141-101410180 = "Sensei, é a Haruka."
10141-101410190 = "Eu ia aparecer hoje para o plantão, mas..."
10141-101410200 = "É..."
10141-101410210 = "Bem..."
10141-101410220 = "Aí eu pensei: se o senhor olhar para o meu rosto e lembrar daquele machucado..."
10141-101410230 = "Talvez fosse melhor... eu não ir..."
10141-101410240 = "Pelo contrário, eu ficaria feliz se você viesse."
10141-101410250 = "Quero ver o seu rosto também."
10141-101410260 = "O-o-"
10141-101410270 = "Ora-ora-ora! A-"
10141-101410280 = "Já-"
10141-101410290 = "Já estou indo!"
10141-101410300 = "C-c-"
10141-101410310 = "...?"
10141-101410320 = "Ah"
10141-101410330 = "Desculpa"
10141-101410340 = "Isso foi erro de digitação"
10141-101410350 = "Foi m-"
10141-101410360 = "Não se preocupa com isso"
10141-101410370 = "Desculpa desculpa desculpa...!"
10141-101410380 = "Haruka, você está onde agora?"
10141-101410390 = "Hã?"
10141-101410400 = "Bem... em frente ao Schale..."
10141-101410410 = "Sensei, é a Haruka."
10141-101410420 = "Bem... talvez o senhor não tenha muito interesse nisso, mas..."
10141-101410430 = "Se estiver livre... quer ir a um museu de arte comigo?"
10141-101410440 = "Vamos agora."
10141-101410450 = "Hã?"
10141-101410460 = "Não quer nem saber qual é o tema?"
10141-101410470 = "Será que o Sensei vai gostar... eu nem sei..."
10141-101410480 = "Você vai comigo, né?"
10141-101410490 = "Então não tem como não ser divertido."
10141-101410500 = "U-"
10141-101410510 = "Uuuh..."
10141-101410520 = "Ah"
10141-101410530 = "Muito obrigada"
10141-101410540 = "Obrigada, obrigada, muito obrigada..."
10141-101410550 = "Sensei, o senhor chegou bem em casa?"
10141-101410560 = "Sim"
10141-101410570 = "E você?"
10141-101410580 = "Sim, acabei de sair do banho e estou deitada."
10141-101410590 = "Hoje foi..."
10141-101410600 = "muito..."
10141-101410610 = "Muito, muito..."
10141-101410620 = "divertido."
10141-101410630 = "Então..."
10141-101410640 = "se houver outra oportunidade..."
10141-101410650 = "de novo..."
10141-101410660 = "Claro."
10141-101410670 = "É só falar, quando quiser."
10141-101410680 = "...!"
10141-101410690 = "Pode deixar!"