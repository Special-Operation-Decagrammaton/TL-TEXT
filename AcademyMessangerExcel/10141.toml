[translation]
10141-101410010 = "Сенсей, эм, я... я бы хотела кое о чём с вами посоветоваться..."
10141-101410020 = "То есть, как бы это сказать..."
10141-101410030 = "Нормально ли, что такая, как я, вообще носит платье...?"
10141-101410040 = "Ой, простите, пожалуйста, забудьте! Не обращайте внимания!"
10141-101410050 = "Мне просто... никак не удаётся найти в себе уверенность..."
10141-101410060 = "Всё в порядке. Ты имеешь полное право носить то, что тебе хочется, Харука."
10141-101410070 = "П-правда..."
10141-101410080 = "П-правда так можно...?"
10141-101410090 = "Б-большое вам спасибо... Сенсей..."
10141-101410100 = "С вами правда всё хорошо после той недавней травмы...?"
10141-101410110 = "Она не стала сильнее болеть с тех пор?"
10141-101410120 = "Да я в порядке! Не переживай об этом!"
10141-101410130 = "Это же просто царапина!"
10141-101410140 = "Мне так жаль..."
10141-101410150 = "Я ведь ваш телохранитель, я должна была сразу это предотвратить..."
10141-101410160 = "Если мне ещё раз поручат такую же работу,"
10141-101410170 = "в следующий раз я точно защищу вас во что бы то ни стало...!"
10141-101410180 = "Сенсей, это Харука."
10141-101410190 = "Сегодня я должна прийти к вам на дежурство, но..."
10141-101410200 = "Я..."
10141-101410210 = "Эм..."
10141-101410220 = "Я испугалась, что если вы увидите моё лицо, то ваша недавняя рана снова начнёт ныть..."
10141-101410230 = "Поэтому я подумала, что будет лучше, если я... не приду..."
10141-101410240 = "На самом деле я буду очень рад, если ты придёшь."
10141-101410250 = "Я тоже хочу тебя увидеть, Харука."
10141-101410260 = "К-к..."
10141-101410270 = "К-к-к-к-конечно!"
10141-101410280 = "Я..."
10141-101410290 = "Я уже бегу!"
10141-101410300 = "Ч-ч..."
10141-101410310 = "...?"
10141-101410320 = "Ах!"
10141-101410330 = "Простите, пожалуйста."
10141-101410340 = "Это была опечатка."
10141-101410350 = "По..."
10141-101410360 = "Пожалуйста, не обращайте внимания."
10141-101410370 = "Простите, простите, простите меня...!"
10141-101410380 = "Харука, ты сейчас где?"
10141-101410390 = "А?"
10141-101410400 = "Ну, я стою прямо перед зданием Шале..."
10141-101410410 = "Сенсей, это Харука."
10141-101410420 = "Эм, возможно, вам это совсем не интересно,"
10141-101410430 = "но не хотите ли вы сходить со мной в музей искусств?"
10141-101410440 = "Пойдём прямо сейчас."
10141-101410450 = "А?"
10141-101410460 = "Вы даже не спросите, какая там выставка?"
10141-101410470 = "Я ведь ещё даже не знаю, понравится ли вам тема..."
10141-101410480 = "Я же иду вместе с тобой, так?"
10141-101410490 = "Значит, мне в любом случае понравится."
10141-101410500 = "Ч-ч..."
10141-101410510 = "Ч-ч-что-о-о-о-о?!"
10141-101410520 = "С-с..."
10141-101410530 = "Спасибо вам огромное."
10141-101410540 = "Спасибо, спасибо, спасибо вам..."
10141-101410550 = "Сенсей, вы добрались домой в безопасности?"
10141-101410560 = "Да."
10141-101410570 = "А ты как, Харука?"
10141-101410580 = "Да, я только что вышла из ванны и уже легла в кровать."
10141-101410590 = "Сегодня было"
10141-101410600 = "правда"
10141-101410610 = "очень, очень"
10141-101410620 = "весело."
10141-101410630 = "Поэтому,"
10141-101410640 = "если у нас ещё будет возможность,"
10141-101410650 = "может, как-нибудь снова..."
10141-101410660 = "Конечно."
10141-101410670 = "Просто позови меня в любое время."
10141-101410680 = "...!"
10141-101410690 = "Да!"