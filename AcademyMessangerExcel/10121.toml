[translation]
10121-101210010 = "先生！ごきげんようですの！"
10121-101210020 = "今度、海へ遊びに行くことになりまして！"
10121-101210030 = "それも……百花繚乱の先輩方と一緒に！"
10121-101210040 = "おぉ、いいね！"
10121-101210050 = "ええ！まるで夢のようですわ！"
10121-101210060 = "素敵な時間を満喫するために……"
10121-101210070 = "琵琶の特訓をいたします！"
10121-101210080 = "……琵琶？"
10121-101210090 = "海に行くんだよね……？  "
10121-101210100 = "もしや、舞のほうがふさわしいでしょうか？"
10121-101210110 = "先生！"
10121-101210120 = "ご相談に伺いますわね！"
10121-101210130 = "えっ？"
10121-101210140 = "今から？"
10121-101210150 = "今すぐ参りますわ！"
10121-101210160 = "先生！"
10121-101210170 = "本日の水着、大切にしまっておきますの！"
10121-101210180 = "着るときはちゃんと着なきゃね！  "
10121-101210190 = "もちろんですわ！"
10121-101210200 = "物の価値は、使われてこそ輝きを増すものですから！"
10121-101210210 = "身共はお布団に入りながら考えました"
10121-101210220 = "ここ数日、考えに考え抜きました！"
10121-101210230 = "海にあって、百花繚乱の名に恥じない"
10121-101210240 = "華麗な姿を披露するにはどうすればよいか！"
10121-101210250 = "その心は？"
10121-101210260 = "海での「華麗な姿」とは？"
10121-101210270 = "それはすなわち！"
10121-101210280 = "水中を自由に舞い踊る魚たちのような"
10121-101210290 = "見事な泳ぎですの！"
10121-101210300 = "たしかにそれは華麗だね"
10121-101210310 = "たしかにそれは名案だね"
10121-101210320 = "これから水泳の猛練習に励む予定ですの"
10121-101210330 = "そこで、先生にお願いがありまして"
10121-101210340 = "よろしければ身共に水泳の極意を教えていただけませんか？ "
10121-101210350 = "そんな大それた技術はないけど……"
10121-101210360 = "いいよ、一緒に練習しよっか"
10121-101210370 = "はい！"
10121-101210380 = "今日は家の者が失礼いたしました……"
10121-101210390 = "身共のこととなると、つい過保護になってしまうようでして"
10121-101210400 = "ユカリのことを大事に思ってるんだよ"
10121-101210410 = "私のことは気にしなくて大丈夫だよ"
10121-101210420 = "せっかく、先生のお時間をいただいて"
10121-101210430 = "水泳の練習ができると思いましたのに……！"
10121-101210440 = "次回に持ち越しだね"
10121-101210450 = "次は海で練習するんだよね？"
10121-101210460 = "ふふっ！約束ですの！"
10121-101210470 = "今からとっても楽しみにしておりますわ！"
10121-101210480 = "先生！"
10121-101210490 = "今日は待ちに待った……"
10121-101210500 = "海に行く日ですの！"
10121-101210510 = "お、元気だね！"
10121-101210520 = "張り切ってるね！"
10121-101210530 = "ええ！今度こそたくさん泳ぎますの！しょんぼりしてたらもったいないですから！"
10121-101210540 = "時は金なり！ですから！"
10121-101210550 = "ユカリらしい考え方だね！"
10121-101210560 = "ポジティブだね！"
10121-101210570 = "では先生！"
10121-101210580 = "海でお会いいたしましょう！"
10121-101210590 = "今日はたくさん泳げました！"
10121-101210600 = "今すぐにでも寝られそうですの！"
10121-101210610 = "泳ぐの上手だったよ！"
10121-101210620 = "優雅で気品あふれる泳ぎだった！"
10121-101210630 = "身共の泳ぎなんて、まだまだですの"
10121-101210640 = "このていどではえりーととはなのれ"
10121-101210650 = "ユカリ？"
10121-101210660 = "寝ちゃったかな？"
10121-101210670 = "おやすみ、ユカリ"
10121-101210680 = "先ほどは、ついうとうとしてしまいましたの"
10121-101210690 = "会話の途中で、失礼いたしました"
10121-101210700 = "よく眠れた？"
10121-101210710 = "気にしなくていいよ！"
10121-101210720 = "ええ！おかげさまで！"
10121-101210730 = "もうひと泳ぎできそうなくらいですわ！"
10121-101210740 = "夜の海は危ないから"
10121-101210750 = "また明日遊ぼうね"
10121-101210760 = "今晩はまだ眠れそうにありませんの"
10121-101210770 = "海がこんなにも楽しい場所だなんて、身共、初めて知りました！"
10121-101210780 = "先生を一日中ひとり占めしてしまいましたわ！"
10121-101210790 = "本日はとっても楽しかったですの！"
10121-101210800 = "それはよかった！"
10121-101210810 = "私も楽しかったよ"
10121-101210820 = "先生"
10121-101210830 = "身共は、この夏を絶対に"
10121-101210840 = "絶っっっっ対に！忘れませんわ！！"
