[translation]
10121-101210010 = "Sensei! Como vai?"
10121-101210020 = "Desta vez, vamos à praia para nos divertir!"
10121-101210030 = "E mais... com as veteranas do Hyakkaryouran!"
10121-101210040 = "Oh, que legal!"
10121-101210050 = "Sim! É como um sonho!"
10121-101210060 = "Para aproveitar ao máximo esse tempo maravilhoso..."
10121-101210070 = "Vou treinar intensamente o biwa!"
10121-101210080 = "...Biwa?"
10121-101210090 = "Você vai à praia, certo...?"
10121-101210100 = "Será que a dança seria mais apropriada?"
10121-101210110 = "Sensei!"
10121-101210120 = "Vou te procurar para uma consulta!"
10121-101210130 = "Hã?"
10121-101210140 = "Agora?"
10121-101210150 = "Estou indo agora mesmo!"
10121-101210160 = "Sensei!"
10121-101210170 = "Vou guardar com carinho o maiô de hoje!"
10121-101210180 = "Quando for usar, tem que vestir direitinho!"
10121-101210190 = "Claro que sim!"
10121-101210200 = "O valor das coisas aumenta quando são usadas!"
10121-101210210 = "Eu pensei enquanto estava na cama."
10121-101210220 = "Nos últimos dias, pensei e repensei muito!"
10121-101210230 = "Como posso exibir uma figura esplêndida na praia,"
10121-101210240 = "que não envergonhe o nome Hyakkaryouran!"
10121-101210250 = "Qual é a ideia?"
10121-101210260 = "O que seria uma 'figura esplêndida' na praia?"
10121-101210270 = "Isso significa!"
10121-101210280 = "Uma natação magnífica,"
10121-101210290 = "como a dos peixes que dançam livremente na água!"
10121-101210300 = "De fato, isso é esplêndido."
10121-101210310 = "De fato, essa é uma ótima ideia."
10121-101210320 = "Pretendo me dedicar a um treinamento intenso de natação a partir de agora."
10121-101210330 = "Então, tenho um pedido para o Sensei."
10121-101210340 = "Se possível, você poderia me ensinar os segredos da natação?"
10121-101210350 = "Não tenho uma técnica tão grandiosa, mas..."
10121-101210360 = "Tudo bem, vamos praticar juntos."
10121-101210370 = "Sim!"
10121-101210380 = "Hoje, os meus familiares foram indelicados..."
10121-101210390 = "Quando se trata de mim, eles acabam sendo superprotetores."
10121-101210400 = "Eles se importam muito com você, Yukari."
10121-101210410 = "Não precisa se preocupar comigo."
10121-101210420 = "Eu estava tão animada para ter o tempo do Sensei"
10121-101210430 = "e poder praticar natação...!"
10121-101210440 = "Fica para a próxima vez, então."
10121-101210450 = "Da próxima vez, vamos praticar na praia, certo?"
10121-101210460 = "Hehe! É uma promessa!"
10121-101210470 = "Estou muito ansiosa a partir de agora!"
10121-101210480 = "Sensei!"
10121-101210490 = "Hoje é o tão esperado..."
10121-101210500 = "dia de ir à praia!"
10121-101210510 = "Oh, você está animada!"
10121-101210520 = "Você está empolgada!"
10121-101210530 = "Sim! Desta vez, vou nadar muito! Seria um desperdício ficar desanimada!"
10121-101210540 = "Tempo é dinheiro! É por isso!"
10121-101210550 = "É um jeito de pensar bem a cara da Yukari!"
10121-101210560 = "Você é positiva!"
10121-101210570 = "Então, Sensei!"
10121-101210580 = "Vamos nos encontrar no mar!"
10121-101210590 = "Hoje eu consegui nadar muito!"
10121-101210600 = "Parece que eu poderia dormir agora mesmo!"
10121-101210610 = "Você nadou muito bem!"
10121-101210620 = "Foi um nado elegante e cheio de graça!"
10121-101210630 = "Meu nado ainda está longe de ser bom."
10121-101210640 = "Nesse nível, não posso me considerar uma elite..."
10121-101210650 = "Yukari?"
10121-101210660 = "Será que ela dormiu?"
10121-101210670 = "Boa noite, Yukari."
10121-101210680 = "Há pouco, acabei cochilando."
10121-101210690 = "Desculpe por ter interrompido a conversa."
10121-101210700 = "Dormiu bem?"
10121-101210710 = "Não se preocupe!"
10121-101210720 = "Sim! Graças a você!"
10121-101210730 = "Parece que eu poderia nadar mais uma vez!"
10121-101210740 = "O mar à noite é perigoso,"
10121-101210750 = "Vamos brincar de novo amanhã."
10121-101210760 = "Esta noite, ainda não consigo dormir."
10121-101210770 = "Eu nunca soube que o mar era um lugar tão divertido!"
10121-101210780 = "Acabei monopolizando o Sensei o dia inteiro!"
10121-101210790 = "Hoje foi muito divertido!"
10121-101210800 = "Que bom!"
10121-101210810 = "Eu também me diverti."
10121-101210820 = "Sensei."
10121-101210830 = "Eu, definitivamente, este verão..."
10121-101210840 = "Absolutamente, absolutamente! Não vou esquecer!!"
