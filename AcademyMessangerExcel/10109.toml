[translation]
10109-101090010 = "Professor, me desculpe."
10109-101090020 = "Não poderei ir ao meu turno amanhã."
10109-101090030 = "De manhã eu estava com febre baixa, mas acabei de medir e subiu..."
10109-101090040 = "Ah, você está bem?"
10109-101090050 = "Melhorei um pouco depois de tomar o remédio."
10109-101090060 = "Mas, se eu for nesse estado, acho que vou acabar causando problemas."
10109-101090070 = "Com certeza vou compensar."
10109-101090080 = "Descanse bastante."
10109-101090090 = "Se precisar de algo, me avise."
10109-101090100 = "Obrigada, Professor."
10109-101090110 = "Olá, Professor."
10109-101090120 = "Graças a você, minha saúde melhorou bastante."
10109-101090130 = "Como você está, Professor?"
10109-101090140 = "Eu estou bem."
10109-101090150 = "Você já está bem?"
10109-101090160 = "Sim, graças a você."
10109-101090170 = "Mais importante, se for conveniente para você..."
10109-101090180 = "Você poderia vir ao meu quarto neste fim de semana?"
10109-101090190 = "Posso ir de novo?"
10109-101090200 = "Ora."
10109-101090210 = "Você vai me ajudar a redecorar, certo?"
10109-101090220 = "Não me diga que você esqueceu..."
10109-101090230 = "Ah, claro que não!"
10109-101090240 = "Eu só perguntei para ter certeza!"
10109-101090250 = "Hehe, não precisa se apressar tanto."
10109-101090260 = "É só uma brincadeira."
10109-101090270 = "Então, estou ansiosa para isso."
10109-101090280 = "Professor, você está bem?"
10109-101090290 = "Ouvi da Yuuka-chan que você pegou um resfriado."
10109-101090300 = "Estou bem."
10109-101090310 = "Estou descansando agora."
10109-101090320 = "O Professor pode negar, mas..."
10109-101090330 = "Talvez..."
10109-101090340 = "Pensar que pode ser minha culpa..."
10109-101090350 = "Não é sua culpa, Noa!"
10109-101090360 = "Não se preocupe."
10109-101090370 = "Mas..."
10109-101090380 = "Professor, você já tem planos para amanhã?"
10109-101090390 = "Se não for incomodar, por favor, deixe-me visitá-lo."
10109-101090400 = "Não tenho planos específicos, mas..."
10109-101090410 = "E o trabalho do seminário, está tudo bem?"
10109-101090420 = "Já terminei o trabalho, então..."
10109-101090430 = "Amanhã irei à Schale."
10109-101090440 = "Deve ser por causa da chuva contínua, mas ficou mais fresco, não é?"
10109-101090450 = "Só que o uniforme demora para secar, o que é um problema."
10109-101090460 = "Eu entendo perfeitamente..."
10109-101090470 = "Aquele cheiro de roupa úmida também incomoda, né?"
10109-101090480 = "Quantos uniformes você tem, Noa?"
10109-101090490 = "Bem..."
10109-101090500 = "Tenho 4 no total."
10109-101090510 = "Como as regras de uniforme na Millennium não são muito rígidas,"
10109-101090520 = "poucos alunos têm vários uniformes."
10109-101090530 = "Mas eu sou membro do Seminário,"
10109-101090540 = "Falando nisso, acho que nunca vi a Noa com roupas casuais."
10109-101090550 = "Que pena..."
10109-101090560 = "Fufu."
10109-101090570 = "Eu mostrarei a você um dia."
