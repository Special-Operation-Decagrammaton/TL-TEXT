[translation]
10109-101090010 = "先生、申し訳ありません"
10109-101090020 = "明日の当番、行けなくなってしまいました"
10109-101090030 = "朝は微熱だったのですが、先ほど計ったら上がっていまして……"
10109-101090040 = "えっ、大丈夫？"
10109-101090050 = "薬を飲んだら多少は良くなりました"
10109-101090060 = "ただ、この状態で行っても迷惑をかけてしまいそうで"
10109-101090070 = "必ず埋め合わせはいたします"
10109-101090080 = "ゆっくり休んでね"
10109-101090090 = "何かあったら連絡してね"
10109-101090100 = "ありがとうございます、先生"
10109-101090110 = "こんにちは、先生"
10109-101090120 = "おかげで体調はだいぶ良くなりました"
10109-101090130 = "先生はいかがですか？"
10109-101090140 = "私は元気だよ"
10109-101090150 = "もう大丈夫なの？"
10109-101090160 = "はい、おかげさまで"
10109-101090170 = "それより、ご都合がよろしければ"
10109-101090180 = "今週末、私の部屋に来ていただけませんか？"
10109-101090190 = "また行って良いの？"
10109-101090200 = "あら"
10109-101090210 = "模様替えを手伝ってくださるんですよね？"
10109-101090220 = "まさか、忘れていたなんてことは……"
10109-101090230 = "あ、当たり前だよ！"
10109-101090240 = "念のため聞いただけだよ！"
10109-101090250 = "ふふ、そんなに慌てなくても大丈夫ですよ"
10109-101090260 = "冗談ですから"
10109-101090270 = "それでは、楽しみにしていますね"
10109-101090280 = "先生、大丈夫ですか？"
10109-101090290 = "ユウカちゃんから、風邪を引いたと聞きました"
10109-101090300 = "大丈夫だよ"
10109-101090310 = "今はゆっくり休んでるから"
10109-101090320 = "先生は否定されるかもしれませんが"
10109-101090330 = "もしかして"
10109-101090340 = "私のせいかもしれないと思うと……"
10109-101090350 = "ノアのせいじゃないよ！"
10109-101090360 = "気にしないで"
10109-101090370 = "ですが……"
10109-101090380 = "先生、明日のご予定は決まっていますか？"
10109-101090390 = "差し支えなければ、お見舞いに行かせてください"
10109-101090400 = "特に予定はないけど……"
10109-101090410 = "セミナーの仕事は大丈夫？"
10109-101090420 = "お仕事は、終えてますので"
10109-101090430 = "明日はシャーレに伺いますね"
10109-101090440 = "雨続きだったせいか、涼しくなりましたね"
10109-101090450 = "ただ、制服が乾きにくいので困りました"
10109-101090460 = "すごくわかる……"
10109-101090470 = "生乾きも気になるよね"
10109-101090480 = "ノアは何着制服を持ってるの？"
10109-101090490 = "えっと"
10109-101090500 = "全部で4着ですね"
10109-101090510 = "ミレニアムは制服のルールが厳しくないので"
10109-101090520 = "何着も持っている生徒は少ないですが"
10109-101090530 = "私はセミナーの一員ですから"
10109-101090540 = "そういえば、ノアの私服姿を見たことないような"
10109-101090550 = "ちょっと残念……"
10109-101090560 = "ふふ"
10109-101090570 = "そのうちお見せしますから"
