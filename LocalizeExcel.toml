2092316443 = "Rua de Comércio - Rua Sul"
2102971118 = "A Genbu Express realizou um investimento pesadíssimo numa atração turística fora das fronteiras de Shanhaijing sem consultar a Xuanlong Office. Um debate acalorado começa, com cada lado defendendo os seus interesses. Porém, esse era exatamente o plano da Rumi: forjar a 'desculpa' perfeita para arrastar a Kisaki para passear. E assim, aprova-se uma viagem de férias muito bem disfarçada de inspeção oficial."
