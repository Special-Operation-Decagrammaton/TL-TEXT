958604450 = "Nice to meet you. I'm ORWELL, the administrator of 'Lore Friendly'.\nI've opened 'Lore Friendly', an instance to collect information on urban legends discovered all over Kivotos. Please feel free to talk about strange phenomena and urban legends here."
1269488525 = "Any trivial anomaly is fine. If information is gathered, it will be a big clue to explore the essence of the world.\nRemember—true reality exists within our cognition.\n\nTogether, let's make this place a place of inquiry that nurtures knowledge and truth."
671759831 = "Huh~ I didn't know this existed! I like ghost stories, but I was bored because they were all things I'd seen before. I'll post if I find anything~!"
2837975137 = "I like ghost stories too, but... isn't this place a bit suspicious? It was just made recently, but there are so many subscribers. Is it some kind of viral marketing? The administrator's icon is an old-fashioned TV too... I hope it doesn't turn into a corporate ad page when I come back after forgetting about it..."
4111771375 = "An urban legend instance with a sudden surge in subscribers sounds like it could be a ghost story topic itself. Well, even if something happens, I can just make a new instance, so isn't it fine to just wait and see?"
338790072 = "Aren't there a lot of strange signs lately?\nThere's a speed limit, but it says 'Increase Speed'... I saw 'Beware of Wild Animals' in the city the other day. Are there any?"
977601446 = "I think I saw that too. Why 'Increase Speed'?\nDoes it mean run away quickly because it's dangerous?"
375819026 = "I wonder if I can call this Lore too...\nA character called Pepperoni. I remember she looked like a boiled chicken... The sticker I saw the other day had a completely different design from my memory."
1235015986 = "Hey, did you just make fun of Peroro-sama?\nWhere are you now!? I have something to talk to you about?"
424362290 = "There's a strange person near 〇〇〇〇〇 Station... \nThey're wearing a pure white full-body suit and doing gymnastics... even though it's so hot. Isn't that crazy? Did they go crazy from the heat, or are they doing this because they're crazy... I was a bit scared and didn't want to get close."
3910063889 = "Ah, I might have seen that too. You mean where there's a promenade next to a small river, right? At first, I thought it was plastic trash caught and swaying, but it wasn't. It's like it disappears when you get close... or when I noticed, it was swaying again."
2325372914 = "Don't you have a photo?\nYou can tell if it's trash or a person if you use the zoom function on your smartphone. It's obvious it's a lie since there's no photo. If you're going to make up a story, do it better."
3582262770 = "This is bad... A friend of mine collapsed around there and was hospitalized. People around there were talking about the same thing at that time... They said a person wearing something like a white diving suit was dancing, and they collapsed suddenly after chasing it. ...Isn't this pretty bad?"
3177847880 = "Speaking of urban legends, do you know the rumor from when Director Kaya declared martial law?\nThermobaric bombs prepared to eliminate the opposition... I heard that SRT special forces members were supposed to use them. SRT is an academy that's already closed, right?"
343714176 = "SRT Special Academy has a lot of dark rumors. I heard they have secret weapons that the General Student Council has banned. I also heard they're fighting over discarded convenience store bento boxes now..."
3390104466 = "Honestly, are SRT special forces really strong? I hear they caught dangerous criminals, but aren't they just targeting them when they're alone or off guard? If they were really strong, they'd catch them individually, not as a platoon, right?"
2082038179 = "Fair and square against criminals lol\nI think it's better than going in without a plan and increasing the number of victims. Are you disparaging SRT, who protects citizens, and supporting criminals? ...Are you perhaps one of them?"
2762509097 = "What's with the sudden change? Scary. Are you perhaps from SRT?"
3323201397 = "Enjoy the highest quality Wagyu beef in a private space by reservation only!\nWhy not spend a special moment with someone important while eating Wagyu beef?\nMake your reservation here!"
2054008363 = "Eh? Why is there an ad for a yakiniku restaurant on the Lore instance?\nBug?"
2018231707 = "Ah, is this your first time on Full Link?\nPosts from other instances come around too. You can block them if you don't like it, but... it was just made, and there aren't many posts, so isn't it fine to just ignore it?"
2576877900 = "The white thing I mentioned before! It was there again!!\nIt seems it wasn't a mistake... I was scared even looking from afar and didn't have the heart to get close... I can't help but remember the story about chasing that and collapsing...\nUgh, too scary. I'll stop using this road..."
1966411185 = "Sightings are increasing. There was a story that someone collapsed at the Gehenna Track and Field Club too, is that true?"
2212117541 = "According to the story I heard, there's a strange rumor at the Gehenna Track and Field Club. The kid who collapsed this time seems to be the best performer. Other kids were jealous and put a curse on her. It's just a rumor, but they say there's no smoke without fire... ^^"
2130375924 = "Stop saying selfish things. It makes me feel bad watching."
621158106 = "The Gehenna Track and Field Club is recruiting new members to run marathons with us!\nAny Gehenna student who likes running is welcome!\n...Even if you're not good at running, Gehenna students who are used to running away are also welcome!\nTrain your mind and body at the Track and Field Club and become free from the Prefect Team!\nInterested students, please DM @Gehenna_Athletics!"
4254384135 = "Is it okay to enter Schale as you please? It seems like there are students coming and going quite a bit, but do you have to be invited by Sensei to enter? Is it okay to just go normally?"
2198577225 = "I want to eat chicken"
2048584069 = "Did anyone go to Gettan Market for lunch today?\nThere was a really cute girl handing out drinks... I wonder if she's a promotional model for somewhere?\nI was busy so I didn't talk to her, but I should have at least gotten a drink~"
3927977111 = "Where in Gettan Market? I'm in front of the rice cracker shop now!"
4148671665 = "It's near where the stall selling fans was before!"
856886527 = "You're right! She's really cute!\nI might have seen her somewhere... maybe a reader model? I feel like I'm about to remember..."
964535569 = "Today's weather in D.U. is sunny.\nThe high temperature is 30 degrees, and the low is 20 degrees.\nTemperatures will be high during the day, so please be careful with outdoor activities."
2749646398 = "Hot... It's so hot that I want to go to school naked."
1774042646 = "I don't know if anyone remembers, but I'm the one who posted before that my friend saw something strange and collapsed.\nToday, I got a call from the hospital that they woke up. The cause is still unknown, but it seems there's nothing wrong with their body. I'm really glad... I felt relieved and lost my energy..."
3053562159 = "Same here! My friend also collapsed on that promenade, but they woke up!\nMaybe it's because the temperature dropped and it got cooler? Anyway, I'm glad!"
2090505947 = "What was it in the end? Is the cause really unknown?"
2642813418 = "People who had similar experiences waking up at almost the same time... that's a bit strange.\nIncluding the Track and Field Club incident, is someone holding a grudge?"
566774827 = "Kivotos Track and Field Inter-High Athletes Decided!\nAttention is on sprinter Ito. She just returned from a long hospitalization, but she updated her personal best and was selected as a representative.\nPlease support the athletes fighting in the Inter-High!"
1900309917 = "I went to the place everyone was talking about, but there's nothing there!\nI wanted to experience what would happen if I actually saw the white thing... It turns out it was all a lie after all!"
3994228846 = "Haven't strange things increased since the General Student Council President returned? It might just be my imagination.\nSightings of strange things and students saying they had scary experiences have increased. I feel like I hear stories about missing people often too...\nThe General Student Council President seems to be doing her job properly, but... something is strange... I don't think it was like this before."
3825455165 = "Anyway, this instance is boring. The story about the white kunekune thing also seems like it was just heatstroke. The ghost stories posted are all made up, so I'm losing interest. I don't think I need to come see it unless something really bad happens."