1482243437 = "Street Gourmet Fighter!"
3897376550 = "Assalto"
3299445685 = "Mari aborda os membros do Grupo de Capacetes com uma expressão solene, dizendo que quer \"pegar emprestada\" uma moto. Quando perguntada sobre o motivo, Mari apenas responde que é \"para salvar Trinity\" e vai embora."
727133309 = "Mudança de Visual"
4233897728 = "Voltando 48 horas no tempo... Mari visita Sakurako após receber um \"pedido de apoio urgente\". Lá, ela encontra Sakurako e Mine em uma atmosfera incomum. Ao ouvir a história, descobre que elas planejam realizar atividades de ídolo durante o festival escolar para dissipar a má impressão sobre a Irmandade e o Esquadrão de Socorro, e pedem conselhos. Como as duas não entendem nada de ídolos, Mari decide estudar sobre o assunto visitando outras escolas e clubes com o Sensei."
3295345526 = "Caminho de Ídolo: Figurino (1)"
4031463793 = "Para aprender sobre ídolos, Mari e o Sensei visitam Nonomi, de Abydos. Apesar de terem sido recebidos calorosamente, Nonomi parece estar em apuros porque Ayane e Serika se recusam a usar trajes de ídolo. Então, Mari e o Sensei são convidados a ajudar a convencer as duas..."
547940646 = "Caminho de Ídolo: Figurino (2)"
4219103225 = "Com a ajuda de Mari e do Sensei, Nonomi e as outras conseguem \"capturar\" e convencer Serika e Ayane. Mari fica emocionada ao ver as duas vestidas como ídolos, e Nonomi, como agradecimento, ensina várias coisas sobre a confecção de trajes e o mundo das ídolos."
2545044380 = "Caminho de Ídolo: Dança (1)"
1257213465 = "Em seguida, Mari e o Sensei visitam a Escola de Polícia Valkyrie. Enquanto aprendiam sobre dança com Fubuki e Kirino, acabam sendo envolvidos em um incidente de tomada de reféns em uma loja de donuts. Embora a chegada do resgate parecesse demorar, Mari usa a dança que aprendeu com Fubuki e Kirino para criar uma brecha e resolver o caso—"
3039095018 = "Caminho de Ídolo: Dança (2)"
3545842920 = "Graças à perspicácia de Mari, o incidente de tomada de reféns foi resolvido com sucesso. Fubuki e Kirino agradecem e apresentam a Mari um instrutor que pode dar aulas de dança."
2117233556 = "Caminho de Ídolo: Música"
24554761 = "Tendo aprendido sobre figurinos e dança, Mari e o Sensei quebram a cabeça no Schale sobre músicas de ídolos. Utaha aparece. Utaha, que também planeja ser uma ídolo no festival escolar, ajuda Mari a escolher a música enquanto compartilha suas próprias ideias. Mari termina seu papel ao compartilhar o que aprendeu com Sakurako e Mine, mas..."
2992953432 = "Presságios de Conflito"
3406170958 = "Sakurako e Mine treinam para a apresentação. Durante o processo, percebem que precisam de uma líder para atuar como ídolos. Embora tentem decidir secretamente quem deveria ser a líder, isso sai pela culatra, e um mal-entendido se espalha por toda Trinity de que a Irmandade e o Esquadrão de Socorro estão tramando algo perigoso..."
866325458 = "Batalha Decisiva"
4158044451 = "Sakurako e Mine vão à Praça da Fonte de Trinity para decidir quem será a líder. No entanto, Nagisa, que ouviu os rumores, estava esperando com Mika. O mal-entendido gera outro, e os membros da Irmandade e do Esquadrão de Socorro também se reúnem, criando uma atmosfera tensa na praça. Mas, no último segundo, Mari e o Sensei aparecem no local—"
3898079287 = "Antique Seraphim Beginning"
1651854970 = "Mari e o Sensei tentam resolver a situação e ouvem o que todos reunidos ali têm a dizer. Sakurako e Mine revelam que chegaram à conclusão de que Mari é a pessoa mais adequada para ser a líder da unidade de ídolos. As três, incluindo Mari, que aceita ser a líder mesmo estando envergonhada, decidem formar a unidade de ídolos novamente. Com Nagisa e as outras percebendo o mal-entendido e indo embora, a paz retorna a Trinity."
1937101477 = "Carnaval de Trinity"
927954868 = "Mari e as outras terminam o concurso de ídolos com sucesso. Embora Sakurako e Mine elogiem as fotos tiradas durante o show, Mari, envergonhada, insiste que Sakurako se livre de todas elas. No entanto, ela entrega secretamente uma foto que guardou para o Sensei, que parecia relutante em se despedir."
4044969434 = "A Tensão do Comitê de Contramedidas"
2374914097 = "No dia do ensaio do concurso de ídolos, Ayane desaparece de repente. Após uma busca, o Sensei e os membros do Comitê de Contramedidas encontram Ayane. Ao ouvir a história, descobrem que Ayane, que não gosta de ser o centro das atenções, ficou com medo e nervosa ao ver o palco. No entanto, após o conselho do Sensei de que ela só precisava olhar para os membros do Comitê de Contramedidas, Ayane se acalma e consegue realizar sua performance com sucesso."
4086622799 = "Utaha e as Ídolos"
4080289724 = "O Sensei vai assistir às eliminatórias do concurso de ídolos. Lá, ele acaba torcendo por Utaha junto com Kotori e Hibiki, do Clube de Engenharia. Utaha, que apresentou um show excêntrico no palco, acabou não avançando para a final, mas como seu objetivo original era promover a grandiosidade do Enka e divulgar o nome do Clube de Engenharia, ela ri, dizendo que foi uma lembrança divertida."
476430668 = "Casa Assombrada Depois da Aula"
4266731319 = "O Clube de Doces Depois da Aula decide fazer um café com tema de casa assombrada como atração do festival escolar. No entanto, exceto por Airi, a reação dos clientes foi morna, dizendo que eram fofas em vez de assustadoras. O grupo se preocupa sobre como torná-lo mais assustador, mas graças ao conselho do Sensei, elas percebem que não há problema em serem chamadas de fofas."
1565767390 = "Atividades de Relações Públicas do Departamento de Segurança Pública"
376866386 = "Kirino e Fubuki, do Departamento de Segurança Pública, que estavam fazendo seu trabalho habitual de atendimento ao cidadão, acabaram participando do concurso de ídolos. As duas estavam nervosas com a aproximação do dia, mas ao verem Mari se esforçando como ídolo, seus corações ficaram mais leves e elas conseguiram subir ao palco com sucesso."
741064361 = "Princesa da Justiça"
647422658 = "O Comitê de Realização da Justiça apresenta uma peça no Carnaval. No entanto, no dia da apresentação, um dos atores sofre um acidente. O Sensei recomenda Tsurugi, que decorou todas as falas, e o grupo do Clube de Pesquisa de Ninjutsu, que estava visitando por acaso, como substitutos. A peça começa e, embora Tsurugi quase perca o controle no meio, isso acaba sendo considerado realista, e o palco termina em sucesso."
2904499581 = "Nós também somos alunas!"
3304010880 = "O Sensei ouve que o Grupo de Capacetes ocupou um canto da escola e vai até o local. Lá, ele encontra Love e seu grupo. Ao ouvir a história, descobre que elas não conseguiram se enturmar e, como não têm dinheiro, não podem visitar as barracas, então estão ali por falta de opção. O Sensei propõe que elas visitem o Carnaval com ele. Embora não consigam ser totalmente honestas, Love e as outras conseguem aproveitar o festival escolar."
2738379411 = "Exposição Barulhenta"
964869014 = "O Sensei visita uma galeria de arte onde uma exposição está sendo realizada. Lá, Nagisa, que é tanto a organizadora quanto a curadora, estava sozinha. Nagisa, que explicou a exposição de forma fácil de entender, diz que está feliz apenas pelo fato de o Sensei ter vindo, já que havia poucos visitantes para uma exposição que não estava planejada inicialmente. No entanto, com a chegada de Mika e Seia, o número de visitantes aumenta, e Nagisa se torna um pouco mais honesta e explica as peças da exposição alegremente."
251089313 = "Lutador de Comida de Rua!"
2242936279 = "O Sensei encontra alunas com dificuldades na operação de uma barraca. Como o sabor não era ruim, mas elas estavam preocupadas com a falta de clientes, ele sugere pedir conselhos ao Clube de Pesquisa Gastronômica, que estava por perto. Embora tenham sido recebidas com cautela inicialmente, ao seguirem o conselho de Junko de focar na divulgação pelas redes sociais, a barraca começou a prosperar rapidamente. O Sensei, preocupado com sua carteira, promete que elas podem comer o quanto quiserem da comida de rua, já que as alunas do Clube de Pesquisa Gastronômica ajudaram sem causar problemas."
2125534733 = "No dia do ensaio do concurso de ídolos, Ayane desaparece de repente. Quando o Sensei procura por ela com as alunas do Comitê de Contramedidas...?"
25107786 = "No local das eliminatórias do concurso de ídolos, o Sensei decide torcer por Utaha junto com Kotori e Hibiki, do Clube de Engenharia, mas...?"
3629475333 = "O Clube de Doces Depois da Aula decide fazer um café com tema de casa assombrada como atração do festival escolar. No entanto, os alunos que visitam dizem que Natsu, Yoshimi e Kazusa não estão assustadoras, mas sim fofas...?"
3766149801 = "Kirino e Fubuki, do Departamento de Segurança Pública, que estavam fazendo seu trabalho habitual de atendimento ao cidadão, acabaram participando do concurso de ídolos. As duas estavam nervosas com a aproximação do dia, mas...?"
4169171099 = "O Comitê de Realização da Justiça apresenta uma peça no Carnaval. No entanto, no dia da apresentação, um dos alunos atores sofre um acidente e não pode participar...?"
1476865927 = "O Sensei ouve que o Grupo de Capacetes ocupou um canto da escola e vai até o local, onde encontra Love e seu grupo...?"
2693755657 = "Quando o Sensei visita uma galeria de arte onde uma exposição está sendo realizada, ele encontra Nagisa, que é tanto a organizadora quanto a curadora, parada sozinha...?"
308280717 = "O Sensei encontra alunas com dificuldades na operação de uma barraca e sugere pedir ajuda às alunas especialistas em gastronomia que estavam por perto...?"
3966811178 = "Festa Secreta da Meia-Noite ~As mãos do Oni vêm com o sino~"
705081824 = "Na véspera de Ano Novo, Koyuki, que não consegue sair da sala de reflexão, chama o Sensei para passar o tempo brincando. No entanto, Yuuka e Noa aparecem em um momento inesperado, e um jogo de pega-pega valendo a virada do ano começa..."
3179445556 = "O começo foi no armário"
1708912176 = "E então, cúmplices"
4207037597 = "Cada qual com seu fim de ano"
4005937109 = "Eu não aguento mais esperar!"
589093690 = "Para ser sincera..."
75290713 = "O vestiário do terror"
1627497027 = "Testemunha Koyuki! (1)"
3603586332 = "Testemunha Koyuki! (2)"
843458433 = "Privilégio de Oni"
3892365204 = "O mesmo dia, mesmo após a virada do ano"
1405003454 = "A Oni do jogo de cartas"
2271198065 = "Partida em BOOM!"
124568238 = "O suco misturado supremo"
591892110 = "Verdade ou Desafio"
386002539 = "A noite em que todos adormeceram"
1359937701 = "Tudo começou no armário"
1359303109 = "Koyuki e o Sensei, dentro do armário, pensam juntos sobre como as coisas chegaram a esse ponto..."
375149348 = "E então, cúmplices"
2423861271 = "Mesmo sendo fim de ano, Koyuki está na sala de reflexão. Embora Yuuka e Noa tenham dito para ela se comportar, ela não reflete sobre nada do passado e já planeja novas travessuras. Para começar, Koyuki convence o Sensei e o chama para a sala de reflexão..."
825721735 = "Cada qual com seu fim de ano"
3133192212 = "Enquanto isso, Yuuka e Noa planejam uma festa do pijama para Koyuki, que passaria o fim de ano sozinha. Para pegar jogos de tabuleiro emprestados, elas visitam a Veritas, passando por Maki, Chihiro, Kotama e Hare."
3668139486 = "Eu não aguento mais esperar!"
1422919003 = "O Sensei estava com Koyuki na sala de reflexão, mas com a chegada repentina de Yuuka e Noa, ele é forçado a se esconder às pressas. Como Koyuki, sua única esperança, fugiu após ser pega brincando, ele acaba contando com a ajuda de Kotama e Hare para tentar escapar."
1768024960 = "Para ser sincera..."
3060288246 = "O Sensei tenta escapar com Koyuki enquanto evita encontrar Yuuka e Noa. No caminho, ele quase é descoberto por Yuuka e chega a pensar em desistir, mas com a distração de Koyuki e o apoio de Kotama e Hare, ele consegue superar a crise."
2927553321 = "O vestiário do terror"
3549912057 = "Koyuki e o Sensei conseguem superar a crise ao neutralizar os drones de Yuuka. Embora cheguem ao portão dos fundos, o objetivo final, a fuga falha devido a um contra-hackeamento. Enquanto procuram outra saída, Yuuka e Noa se aproximam, forçando o Sensei a puxar Koyuki para dentro de um armário no vestiário..."
3964185245 = "Testemunha Koyuki! (1)"
3324295142 = "Koyuki e o Sensei, após despistarem Noa e as outras, chegam a uma passagem subterrânea que não era usada há muito tempo. No entanto, ao acenderem a luz e tentarem avançar, são surpreendidos por um ataque de drones."
3188615699 = "Testemunha Koyuki! (2)"
483673306 = "Koyuki e o Sensei escapam da perseguição dos drones, mas Kotama e Hare, que estavam em contato, são capturadas por Chihiro e entram em apuros. Para salvar pelo menos o Sensei, Koyuki se oferece como isca para enfrentar Yuuka, mas acaba sendo capturada. Enquanto ouve os gritos dela, o Sensei tenta escapar, mas uma sombra se aproxima por trás..."
1190632781 = "Privilégio de Oni"
1513134473 = "No fim, o Sensei é capturado por Noa e, conforme guiado, acaba indo para a sala onde a festa do pijama está acontecendo. Enquanto isso, Koyuki, Yuuka e as outras, que foram capturadas antes, já estavam se divertindo com os jogos e, quando Noa e os outros chegam, já estão exaustas e dormindo."
2665981194 = "O mesmo dia, mesmo após a virada do ano"
2221244653 = "O Sensei caminha pela Millennium noturna a sós com Noa. Enquanto conversam sobre o significado de celebrar o fim de ano com pessoas queridas, ambos recebem o ano novo com o coração leve. Na manhã seguinte, Noa sorri de alegria por ter começado um novo dia, como sempre, ao lado do Sensei e de todos da Millennium."
2850688326 = "A Oni do jogo de cartas"
3806587471 = "Koyuki, que sofre derrota após derrota em qualquer jogo, acredita que tem chance se for um jogo que não dependa da sorte e desafia todos para um "jogo de cartas". No entanto, sua estratégia psicológica não funciona contra a "cara de pôquer" de Noa, e ela acaba derrotada, recebendo um peteleco na testa como punição."
2364069971 = "Partida em BOOM!"
1583950511 = "Por sugestão de Maki, que queria jogar videogame em vez de jogos de tabuleiro, todos decidem competir no "time attack" do jogo de tiro "BOOM". Chihiro, que não estava muito animada no início, acaba gostando do jogo após ser convencida por Maki... mas seu estilo de jogo violento acaba aterrorizando o pessoal da Veritas."
4046425659 = "O suco misturado supremo"
678779510 = "Enquanto Chihiro, Yuuka e Noa saem para fazer compras, Koyuki, Maki e os outros ficam curiosos sobre qual seria o gosto de misturar o "Youkai MAX" com as bebidas que estavam no local. O resultado é um suco com uma aparência impossível de beber, e eles acabam levando uma bronca de Yuuka e as outras quando elas retornam."
2515246811 = "Verdade ou Desafio"
3704212747 = "Yuuka e as outras decidem usar o suco misturado com "Youkai MAX" para jogar "Verdade ou Desafio". O jogo consiste em decidir entre falar a verdade ou beber o suco como punição, mas Yuuka acaba sendo alvo de uma enxurrada de perguntas e é forçada a beber uma grande quantidade do suco."
2477124485 = "A noite em que todos adormeceram"
4229744822 = "Já tarde da noite, Noa e Chihiro, que ainda estavam acordadas, deixam de lado suas afiliações e conversam calmamente sobre seus sentimentos reais. Nesse meio tempo, Chihiro termina a manutenção do servidor e se prepara para voltar ao seu quarto. Ao se despedirem, ambas sorriem uma para a outra, desejando um feliz ano novo."
4235724912 = "Koyuki, que sofre derrota após derrota, acredita que tem chance se for um jogo que não dependa da sorte e desafia todos para um "jogo de cartas", mas...?"
2622510326 = "Por sugestão de Maki, todos decidem jogar o jogo de tiro "BOOM". Chihiro não estava muito animada no início, mas..."
2450291500 = "Maki e os outros ficam curiosos sobre qual seria o gosto de misturar o "Youkai MAX", conhecido por seu sabor peculiar, com outras bebidas. Instigados por Koyuki...?"
1258195185 = "Yuuka e as outras decidem jogar "Verdade ou Desafio". Elas começam a negociar entre falar a verdade ou beber o suco como punição, mas..."
1652314915 = "Já tarde da noite, Noa e Chihiro, que está fazendo a manutenção do servidor, deixam de lado suas afiliações e conversam calmamente sobre seus sentimentos reais."
390996441 = "Code:BOX - A sombra que se aproxima da Millennium"
1797393858 = "Seia participa da Millennium EXPO como representante de Trinity. Enquanto o intercâmbio entre as escolas floresce, nos bastidores, um plano que abalará a Millennium avança silenciosamente. Tendo testemunhado uma negociação suspeita, Seia acaba sendo envolvida em uma operação para proteger a Millennium EXPO..."
3448408201 = "Millennium EXPO"
3645905674 = "Prova de Si Mesma"
3460875142 = "Divisão de Tarefas"
2387406719 = "A Insegurança de Rio"
1785377399 = "Posição e Ação"
94467447 = "Hesitação"
3034314177 = "Sala da Big Sister"
2896285071 = "Epílogo"
2617236212 = "Patrocinador"
2211329413 = "Millennium EXPO"
826114810 = "Sensei e Seia chegam a Millennium. Ao descerem do monotrilho, Seia revela que participar da Millennium EXPO é uma \"prova que impôs a si mesma\"."
2270762698 = "Prova de Si Mesma"
614054421 = "Uma semana antes da Millennium EXPO, o debate no Tea Party sobre quem participaria como representante estava acalorado. Sensei, convocado ao Tea Party, intervém na disputa entre Nagisa e Seia, onde nenhuma das duas cedia. Sensei apoia Seia, e Nagisa aceita a decisão por confiar no julgamento de Sensei. Ao cumprir seu papel na Millennium EXPO, Seia renova sua determinação de provar o seu valor."
2615717981 = "Divisão de Tarefas"
966992115 = "Seia retorna ao local da Millennium EXPO com uma missão secreta de Rio. Ela parte para inspecionar o local junto com Asuna e Karin, com quem se reuniu novamente."
1651300646 = "A Insegurança de Rio"
3047208423 = "Após a partida de Seia, Rio confessa sua insegurança a Neru. Rio estava preocupada com o estado emocional de Seia, que parecia instável. Através da conversa com Neru, Rio decide que, embora aceite a ajuda de Seia, não a considerará uma força de combate essencial. Seguindo as instruções de Rio, Neru dirige-se ao Centro de Dados de Millennium."
3737727283 = "Posição e Ação"
2960679824 = "Seia tenta invadir o local que descobriu após suas investigações. No entanto, devido ao risco de combate, Rio confia essa tarefa a Neru e instrui Seia a investigar outro lugar. Seia protesta, mas a vontade de Rio é firme. Relutantemente, Seia deixa o esconderijo para investigar outra área."
1973363221 = "Hesitação"
1788642461 = "Rio e Neru ficam sozinhas no esconderijo. Rio se preocupa se Seia ficou ofendida por sua causa. Neru dá a ela uma resposta à sua própria maneira."
1845854326 = "Sala da Big Sister"
2491819470 = "Considerando a criação do algoritmo Big Sister como seu próprio erro, Rio acredita que deve realizar a operação sozinha e pede que Neru e Seia vão embora. No entanto, as duas se opõem, argumentando que operações de infiltração não são o forte de Rio, e insistem que elas devem ir em seu lugar. Durante a discussão, Rio acaba cedendo às propostas das duas."
492942250 = "Epílogo"
977105104 = "Graças à atuação da C&C, a confusão em torno do algoritmo Big Sister foi resolvida. Todos conversam alegremente, mas Rio não está presente. Seia e Neru vão até o esconderijo e pedem a Rio, que estava se preparando para partir, que fique por mais algum tempo. Rio promete permanecer em Millennium até que a EXPO termine."
728313164 = "Patrocinador"
2490396437 = "Mirai e o Grupo dos Capacetes são colocados em um veículo da Valkyrie e transportados para algum lugar. Mirai desiste, achando que foi abandonada pelo patrocinador, mas de repente ouve uma voz. O veículo para, a porta se abre e o Professor Niya-Niya está lá, dizendo que veio ajudar. Quando Mirai diz que falhou, o Professor Niya-Niya responde que ela cumpriu seu objetivo. No entanto, sem revelar qual era esse objetivo, o Professor Niya-Niya vai embora."
1279191940 = "Pandemic Hazard ~A Panqueca Milagrosa~"
2106905354 = "Durante seu trabalho de meio período, Juri acaba tendo que assar panquecas. O resultado foi uma panqueca incrivelmente deliciosa! Mas, em meio a isso, \"aquilo\" despertou. Estudantes sendo atacadas uma após a outra por \"aquilo\"... Isso seria um milagre ou uma tragédia...!"
3711924081 = "O feriado de alguém é o dia útil de outro"
1446345759 = "Como um milagre"
3991708446 = "Flag"
2356581167 = "Biohazard"
2308652662 = "Lili Marleen"
2759745130 = "WHAT A LOVELY DAY (1)"
1173289198 = "WHAT A LOVELY DAY (2)"
4142229945 = "O que precisa ser feito"
2379566356 = "LAST GIRL STANDING"
1472761916 = "Frutificação"
2628755669 = "O feriado de alguém é o dia útil de outro"
2401042016 = "Em um dia em que um feriado raro chegou ao Clube de Merenda, Fuuka encontra Juri trabalhando como garçonete. Juri estava tentando trabalhar para não depender sempre de Fuuka. Durante o turno, um acidente com pólvora derramada por um cliente de Gehenna causa uma explosão, e o cozinheiro do café desmaia. Com as reclamações pelo atraso nos pedidos, o gerente pede que Juri faça panquecas. Juri as assa com medo, mas, surpreendentemente, o que ela termina é uma panqueca comum..."
3150536489 = "Como um milagre"
364471861 = "O gerente serve a panqueca feita por Juri ao cliente. Apesar da ansiedade de Juri, o cliente elogia o prato. Aliviada, Juri continua assando panquecas, mas, no processo, a \"Pan-chan\" nasce, causando um pânico total na loja. Além disso, no meio da confusão, a Pan-chan pula para fora da loja. Ao saber da situação, Sensei entra em contato com o Comitê Disciplinar e corre para o local com Fuuka. Enquanto isso, Iori, ao receber o aviso, diz que \"a menos que um monstro apareça, não é nada demais\" e parte com Chinatsu..."
1048397348 = "Flag"
166512155 = "Ao ouvir a situação, Iori suspeita por um momento de um ataque terrorista do Clube de Merenda, mas, convencida por Chinatsu, muda de ideia e decide entrar sozinha no local, dizendo que \"posso lidar com isso sozinha\". Chinatsu interroga Juri e confirma que foi um acidente, não algo intencional... mas, de repente, o contato com Iori é perdido. Ao procurá-la, encontram Iori coberta de muco, e Chinatsu chama Sena, a especialista médica, por precaução. Sena diagnostica que Iori não corre risco de vida e que o muco — o molho — apenas não agradou seu paladar, e providencia o transporte."
2850214829 = "Biohazard"
1853896861 = "Ao ouvir a situação, Sena, movida pela curiosidade, decide participar ativamente da investigação da Pan-chan. Enquanto seguem os rastros, o grupo encontra uma estudante de Gehenna coberta de muco. Quando a estudante diz: \"Ouvi um som estranho e fui ver o que era...\", Sensei e Sena reagem imediatamente ao clichê: \"É uma flag!\". Ao seguir os passos, Sena deduz que a Pan-chan está crescendo, já que a quantidade e a viscosidade do muco estão aumentando. Diante da gravidade, Chinatsu entra em contato com Ako."
2175847726 = "Lili Marleen"
3971352790 = "Ao ouvir que foi chamada por causa de uma \"panqueca que fugiu de casa\", Ako, em sua terceira noite sem dormir, não consegue esconder sua perplexidade. Cética, Ako recebe fotos enviadas por Sena de estudantes de Gehenna cobertas de muco. Acreditando na versão de Sensei e Sena, Ako prepara o canhão antiaéreo 88mm Flak36. Sena, mantendo a calma, diz que, independentemente de como o Pandemonium Society reaja ou de como a situação se desenrole, esse tipo de coisa é o cotidiano. A pedido de Ako, o grupo retoma a perseguição à panqueca."
454321563 = "WHAT A LOVELY DAY (1)"
3987130169 = "Ao continuar a perseguição, a trilha de muco desapareceu em certo ponto e, em vez disso, mais alunas foram encontradas desmaiadas. Sena atirou nos pés das alunas de Gehenna para acordá-las e perguntar o que aconteceu, mas elas estavam em estado de choque e apenas gritavam coisas sem sentido. Foi então que um som e uma vibração gigantescos ecoaram..."
3792547223 = "QUE DIA MARAVILHOSO (2)"
2273649963 = "O grupo testemunha a Pan-chan, que se tornou gigante, aparecendo na área urbana. Sim, a Pan-chan estava... em uma fase de crescimento."
1682284240 = "O que precisa ser feito"
2094272827 = "Diante da gigantesca Pan-chan, Ako tenta disparar o canhão antiaéreo Flak36 de 88mm, mas a mira não consegue acompanhar a velocidade inesperada da criatura. Nesse momento, um tentáculo da Pan-chan agarra o tornozelo de Ako e, para piorar, enfia o tentáculo em sua boca. Vendo isso, Juri diz: 'Deixe comigo', e avança sozinha contra a Pan-chan. Ao ver a cena, Fuuka grita involuntariamente: 'Isso é um sinal de morte!'"
71107535 = "A ÚLTIMA GAROTA DE PÉ"
12472440 = "Juri saltou sozinha na frente da Pan-chan. Ela é capturada pelos tentáculos, mas, em troca, consegue parar os movimentos da criatura. No entanto, Ako, que detém a autoridade para disparar, está desmaiada, e não há ninguém para dar ordens. Nesse momento, Hina entra em contato e transfere o comando de Ako para o Sensei. Sob a liderança do Sensei, a equipe de artilharia realiza um disparo conjunto. Com isso, os movimentos da Pan-chan diminuem, e o grupo se prepara para a batalha final para dar o golpe de misericórdia...!"
1375140572 = "Frutificação"
3221535166 = "O grupo derrota a Pan-chan. Juri e Ako, que estava coberta de muco e desmaiada, são resgatadas com segurança, e o incidente termina quando Fuuka descarta a Pan-chan, que voltou ao seu tamanho original, em uma lixeira. Alguns dias depois, após superarem mais um dia agitado como de costume, o Sensei visita Juri e Fuuka trazendo suco como presente. Nesse momento, Juri diz timidamente que preparou doces. Após o incidente, ela praticou muito com a ajuda do pessoal do café e fez panquecas maravilhosas. Comendo as panquecas feitas com a sinceridade e o carinho de Juri junto com o suco, os três passam um momento agradável."
3266279677 = "Play ball! ~Mirando no Home Run com bases lotadas~"
2443808906 = "Rei, Sumire e o Sensei visitam o estádio para assistir a um jogo de beisebol. No entanto, o clima da partida fica estranho e, além disso, sombras de uma conspiração pairam sobre todo o estádio...!"
796819123 = "Tradição e história"
292877641 = "Não diga 'absolutamente'"
