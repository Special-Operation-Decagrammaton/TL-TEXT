2607168260 = "新年に願いを（１）"
1637323481 = "新年に願いを（２）"
2247335429 = "年の初めに"
3065827640 = "新年を迎えた便利屋68の一同は、イメージ戦略もかねて着物姿でお参りをすることに。「願いが叶う」と噂のパワースポットを目指して、便利屋68の新年最初の任務が始まる。"
2222583121 = "訪れた先で"
349816101 = "噂の「大吉殿」で便利屋68の一同が出会ったのは、シャーレの先生とバイト中のセリカ。無事にお参りを済ませたと思ったのもつかの間、思わぬ襲撃者が「大吉殿」へとやってくる。"
1548857717 = "混乱はいつも突然に"
78140412 = "無限回転寿司戦隊・カイテンジャー。ロマンと無限の回転を追い求める5人のヒーローたちは日夜、悪との戦いを繰り広げているが、活動には多くの資金が必要となる。資金源として「大吉殿」の賽銭箱を奪取したカイテンジャーの前に、悪党たち（？）が立ちふさがる！負けるな、カイテンジャー！"
2724683777 = "ドタバタ追撃戦！（１）"
136523753 = "奪われた賽銭箱を追いかける便利屋68だったが、彼女たちの前にヘルメット団が立ちふさがる。賽銭箱を「自分たちの獲物」だと語るヘルメット団とのいさかいは、そのまま戦闘へと発展してしまうことに。"
3903699213 = "ドタバタ追撃戦！（２）"
2859412133 = "ヘルメット団を退け、便利屋68はあらためてカイテンジャーの追跡を再開する。"
729440909 = "集まる邪魔者たち（１）"
350982557 = "ヘルメット団のみならず、スケバンたちや傭兵バイトたちまでもが賽銭箱を狙って参戦し始める。多くの勢力が入り込んだことによって、事態は混迷を深めることに。"
2755401990 = "集まる邪魔者たち（２）"
3528072125 = "「大吉殿」の管理人である亀島五郎は「カイテンジャーを捕まえた者に賽銭箱の中身を渡す」と宣言。これが大々的に報道されたことが原因で、多くの人々が賽銭箱を狙っていたということが判明する。"
2205291367 = "風紀委員会参戦（１）"
1888035674 = "カイテンジャーを追う便利屋68の前に立ちはだかったのは、混乱を鎮めるために出てきた風紀委員会。日頃の行いのせいもあり、風紀委員会は便利屋68を敵と見定めて戦闘へ突入することに。"
2183154251 = "風紀委員会参戦（２）"
2198410486 = "風紀委員会からの情報により、今回の騒動が黒亀組という組織による詐欺だということが判明。「願いが叶う」という噂は嘘であり、すべては資金洗浄のための狂言であった。"
4010527531 = "取り戻したい理由"
3968629623 = "すべてが詐欺だったと理解したうえで、アルは願いに込めた各位の思いを汚させないために賽銭箱を取り戻すことを決意。一同は再びカイテンジャーを見つけ出し、戦闘を開始する。"
3598038673 = "危機一髪（１）"
409425870 = "無事に賽銭箱を取り戻した一同。しかし亀島五郎は前言を翻し、便利屋68に賽銭箱を渡さないと宣言。実力行使で賽銭箱を奪い去ろうとする。"
569618432 = "危機一髪（２）"
653310391 = "黒亀組の数に押され、アルたちは徐々に劣勢に。その隙をついて賽銭箱を奪取し、逃走にかかる亀島五郎と黒亀組。逃げ去ろうとする黒亀組たちを止めたのは、アビドス高等学校のホシノだった。"
3680934526 = "対策委員会、集結！"
4177381587 = "後輩のセリカのピンチを知り、集まったアビドスの対策委員会たち。彼女たちの協力もあって劣勢を立て直した一同は黒亀組への反撃を始める。"
3434302330 = "反撃の狼煙"
1459348410 = "ムツキの策によって陰謀が暴かれ、亀島五郎は一気に人々から怒りを向けられる立場に。逃走する暇を与えることなく、一同は黒亀組の拠点を強襲する。"
685949528 = "大吉殿攻防戦（１）"
2152576060 = "対策委員会と風紀委員会の力も借りつつ、便利屋68とセリカは再び亀島五郎と対峙することに成功。逃げ場をなくした亀島五郎と最後の戦いが始まる。"
121004998 = "大吉殿攻防戦（２）"
2286166571 = "亀島五郎を倒し、賽銭箱を取り戻した便利屋68とセリカ。しかしその中身は空っぽであった。すでに中身はカイテンジャーによって奪われていたのだ。"
3697449286 = "カイテンジャー、最後の決戦！（１）"
151256718 = "カイテンジャーの愛機KAITEN FX Mk.0は悪党たち（？）との戦いの中で倒れた。しかし熱い思いと固い決意、そして十分な資金さえあればカイテンジャーは何度だって立ち上がる！さあ、今こそ再起の時だ、KAITEN FX Mk.1！"
1278198911 = "カイテンジャー、最後の決戦！（２）"
755111408 = "カイテンジャーを打倒した便利屋68とセリカ。しかしそれは同時に、自分たちのお賽銭を自分たちで吹き飛ばすということでもあった。呆然とするアル。今年も去年と変わらない一年になりそうである。"
801389629 = "新年に願いを（１）"
4014731644 = "黒亀組は壊滅したが、一度欲望をあおられた悪党たちは納得しない。手に入れられなかった賽銭箱のことを嘆きながら暴れるヘルメット団たちへの対処に、セリカと先生は追われるのだった。"
2841804487 = "新年に願いを（２）"
3280902185 = "セリカはバイト代をもらえず、便利屋68も骨折り損。しかし過ぎてしまったことは仕方ないとあらためてお参りをし、一同はすがすがしい気持ちで新年を迎えるのだった。"
3791568720 = "シャーレのハッピー♡バレンタインパトロール"
1219956127 = "キヴォトスにバレンタインデーが到来！例年にも増して盛況なイベント会場を、先生はキリノとフブキに連れられて巡ることに。\r少女たちの恋、その勝負の一日が始まる！"
3216935680 = "バレンタインデーのお仕事（１）"
1295044406 = "バレンタインデーのお仕事（２）"
