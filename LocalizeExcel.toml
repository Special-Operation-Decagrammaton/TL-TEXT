1781918214 = "Good Evening, Mr. Orwell"
1810326558 = "Masquerade"
1243927570 = "Birth"
1589381619 = "Decalcomanie, staring at a telescreen in an old bar, gains a new realization during a conversation."
3168557994 = "A Letter from the General Student Council President"
4191685078 = "With the help of the executives, Rin was handling her duties as the acting General Student Council President. While reflecting on the President, Rin remembered a certain letter. Inside the envelope were photos capturing the days of the General Student Council. However, one monochrome photo of a landscape Rin didn't recognize was mixed in."
3623875494 = "A Strange Dream"
1715689698 = "When Sensei woke up in Schale, the anomaly had already begun. There were no signs of students, and Kivotos had lost its color, turning monochrome. In the General Student Council President's office, Sensei meets a girl with a mysterious aura. But before Sensei could ask who she was, an electronic sound awakened Sensei's consciousness, and a new day began."
1888812381 = "The Shining Trapezohedron"
4098329356 = "The girls on a mission in the open ocean discovered a glass shard emitting a strange light."
4128684242 = "The Chief Administrative Officer's Day Off (1)"
3255574769 = "The executives of the General Student Council were plotting to give Rin, who was always busy, a break. Rin refused, saying she had no time to rest, but Aoi and the others had already taken steps, and Rin reluctantly decided to enjoy the sudden short holiday. Sensei was chosen to be Rin's chaperone."
274943668 = "The Chief Administrative Officer's Day Off (2)"
1711221830 = "Sensei tours D.U. with Rin, enjoying the holiday. However, Rin keeps worrying about work and brings up the General Student Council. Trying to change the subject, Sensei takes Rin to an arcade. Sensei challenges Rin, who says it's her first time, but she picks up the tricks instantly and defeats Sensei. Playing the game reminds Rin of an acquaintance she hadn't seen in a while."
182317656 = "Queen's Gambit"
1354224060 = "Rin and Sensei visit the Correctional Bureau to see Kaya, who is imprisoned. Rin challenges Kaya to a game of chess. While playing, they look back on the coup, and Kaya talks about the 'Schale Arcade Staff' she took from Schale at that time. In the end, it was just a smartwatch to Kaya, but according to the General Student Council President's records, it was said to have the ability to see the truth."
1861570067 = "Sky-Blue Nostalgia"
2238102298 = "After finishing the visit with Kaya, Rin returns to the General Student Council and finds the 'Schale Arcade Staff' in the warehouse. It looked like a simple smartwatch inside the Ark, but the moment Rin touched it, a small miracle occurred. When Rin regained consciousness at the sound of someone calling her, there was a blonde girl who called herself the General Student Council President."
1121617851 = "Memory Error"
3900724871 = "When she woke up from her sleep, an unknown girl was calling herself the General Student Council President. Rin thought it was a prank, but she was stunned to see the General Student Council executives treating the girl as the President. With memories of the 'General Student Council President' erased from the world, Rin asks Sensei for help. Fortunately, Sensei, like Rin, recognized that she was someone else."
3528020198 = "Return of the Superhuman"
3251654458 = "The self-proclaimed General Student Council President and Sensei talk about how they don't know each other. When Rin asks what she was doing while she was missing, she says she can't answer because her memories are vague. The discussion goes in circles, and Sensei decides to watch the situation for now. Afterward, the self-proclaimed President demonstrates outstanding ability, solving problems all over Kivotos one after another. The atmosphere that it was good that the President had returned began to spread."
4150457986 = "Pairing"
3940272632 = "Plana talks to Sensei after leaving the General Student Council. She says that since the girl doesn't recognize her or Arona, she is a fake. Seeking a clue to solve the situation, Arona and Plana try to pair with the 'Schale Arcade Staff', and the connection is successfully established, unlocking new functions in the 'Shittim Chest'. At that moment, Plana senses someone tailing them, and when Sensei turns around, Rin was following them."
562672561 = "Virtual Image and Inference"
1001704649 = "Rin and Sensei go out into the city to find someone who remembers the former General Student Council President. They keep asking around, but they can't find anyone who remembers. Then, they happen to meet Mai and get valuable information."
4291342361 = "Good Evening, Mr. Orwell"
2194592478 = "Rin and Sensei visit an old bar. Decalcomanie was there. While looking back on what the members of Geomatria had attempted, the new head says that 'media' is the power that defines the new era. After the talk, the new head calls himself Orwell."
68071874 = "Masquerade"
2049815982 = "Orwell presents media as a means to solve what is happening in Kivotos now. Sensei is skeptical about the claim that media can distinguish the real from the fake, but with no other leads, they decide to follow Orwell's suggestion for now."
2314453101 = "Niko's Recommendation"
2864377608 = "Niko visits Schale with ingredients for Sensei, who is busy with work and working late into the night without eating properly. When asked what he wants to eat, Sensei says 'whatever you recommend', and Niko prepares kitsune udon."
3319469081 = "Niko's Shopping"
3542063046 = "Niko heads to the supermarket with Sensei to carry out FOX Platoon's 'Special Supply Operation'. As soon as the pre-closing time sale begins, the store becomes a battlefield. While dodging the many citizens, Niko puts the ingredients she wants into her basket. Sensei, on the other hand, is overwhelmed by the battle-hardened veterans."
722436222 = "Niko's Consultation"
450635337 = "Sensei had a series of misfortunes that day and was completely exhausted. Niko, who came to help at Schale, notices Sensei's condition and volunteers to be a counselor. Sensei, drawn in by Niko's gentle listening, begins to pour out his thoughts. Before he knew it, his heart felt lighter."
4084788817 = "Niko's Name Tag"
2993667495 = "Niko suggests putting name tags on everything for office inventory management. With name tags, the owner is known, it's easier to organize, and inventory is easier to grasp, so the two set out to organize. After all the work is done, Niko puts the one remaining name tag on Sensei."
1170598127 = "Niko's Inari Sushi"
653761742 = "Niko borrows Schale's kitchen by asking Sensei. When Sensei goes to check on her, Niko is making inari sushi from scratch, frying the tofu skin, unlike usual. When the tofu skin is finished after much time and effort, Niko offers the first piece to Sensei. Afterward, they eat the inari sushi Niko made together."
1951868971 = "The Wary Fox"
1622411002 = "Kurumi visits Schale for duty. While they are working, a citizen who says they were helped by Sensei brings a gift. After the citizen leaves, Kurumi warns Sensei, who doesn't remember who it was, that he lacks caution. So, Sensei has Kurumi try various gifts, calling it a 'poison check'. As she tries high-end sweets and perfumes, Kurumi realizes she's being teased."
1539676039 = "The Wise Fox"
852804695 = "Kurumi is knowledgeable about various know-how useful in daily life because she learned it at SRT or watched life hack videos. Sensei throws a difficult problem at Kurumi, who efficiently solves the small troubles that had piled up on Sensei's desk. Kurumi struggles to solve the metal puzzle she was given."
2213050152 = "The Conscious Fox"
3291828447 = "Kurumi visits a photo booth at the station to take a passport photo. However, perhaps due to the influence of her training at SRT, she unconsciously closes her eyes every time the flash goes off after the countdown. Seeing this, Sensei takes a surprise photo of Kurumi using his smartphone camera. It came out well, and he takes it to a shop that can print from data."
1018801245 = "The Dressed-Up Fox"
2066054702 = "When Sensei visits the FOX Platoon HQ, Kurumi is cleaning her shield alone. Kurumi argues that in an operation, the point man's shield is the first thing the opponent sees, so it should be well-maintained as the face that leaves an impression on the platoon. Hearing this, Sensei gives her a cute sticker as a gift. Kurumi firmly refuses to put it on the shield and instead worries about where she should put it."
1003943113 = "The Seeing-Off Fox"
3964533583 = "Kurumi finds Sensei walking down a dark alley late at night and warns him that he lacks caution. Kurumi takes Sensei's hand and leads him through the darkness of the night. To Kurumi, who says that her role is to move forward even if it's scary, Sensei grips her hand and says he will support her if anything happens."
825961924 = "A Certain Marksman's Small Talk"
2685659288 = "Sensei visits a newly opened cafe but is troubled by the overly complex ordering method. Otogi, who happened to be visiting, immediately becomes friends with the staff and helps with the order. Otogi, whose principle is to grab an opportunity without hesitation when it comes, has many good things happen because she can get along with anyone immediately, but sometimes unwanted trials befall her."
4153878308 = "A Certain Maskman's Radio Communication"
618610602 = "Otogi talks about special forces jargon while teaching voice codes to Sensei, who was interested in Otogi's radio communication. After hearing the story, Sensei says that while it's interesting, in his position, it's important to convey things clearly in words to be trusted. Hearing this, Otogi inadvertently lets out her true feelings in voice code."
3691143979 = "A Certain Sniper's Loneliness"
304057056 = "Seeing a strange message late at night, Sensei goes looking for Otogi and finds her in the park. Otogi, who says she visits the park to dispel her loneliness, was looking up at the flickering streetlights to calm her heart. Otogi was worried about her path in how to deal with loneliness, but after talking with Sensei, she says she will continue on her current path a little longer."
354077761 = "A Certain Sniper's Camouflage"
2245221007 = "Otogi invites Sensei shopping, saying she wants to buy camouflage clothing. However, the destination is a normal apparel shop, and the camouflage clothing Otogi is talking about is different from what Sensei had in mind. Otogi says that if you want to blend into the city, normal clothes are the best camouflage. The two look around at various clothes together."
201493185 = "A Certain Sniper's Secret Base"
420529048 = "Sensei hears from a Valkyrie student that they are investigating because there are strange marks all over D.U. Later, Sensei, caught in a sudden shower, finds the mark on a ladder under an overpass where he stopped to take shelter from the rain. Curious, he climbs the ladder and finds Otogi. She says this is a secret base for operations, and the mark is to show territory. Under the overpass in the rain, the two spend time drinking coffee."
2425389763 = "Noon Heat Haze"
1157145156 = "Be careful with outdoor activities on hot days when heat haze rises! Even if you see a 'white scarecrow' in the middle of the road, never stare at it."
