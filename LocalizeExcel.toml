2056319108 = "A Kokona acaba flagrando a reunião secreta entre Kiki, Shunzinha e o Sensei. Ela logo desconfia de ver aquelas duas ali do nada, mas o Sensei consegue inventar uma mentira na mesma hora para despistá-la. No dia seguinte, a turma inicia uma investigação pela rua de comércio para descobrir os planos da Gangue dos Passarinhos. Disfarçadas de alunas da educação infantil, Kisaki e Shun se infiltram direto na base inimiga."
