2529556896 = "プロローグ"
1415972186 = "夏を迎えて超大型ウォーターパークがオープンする。会場の安全のため、ライフセーバーを派遣することになったヴァルキューレ警察学校。しかし、名簿には意外な名前が載っていて……。"
