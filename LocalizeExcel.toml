4066985336 = "Me acorde quando houver uma virada (2)"
3361981851 = "As pessoas sonham com o beisebol"
981714858 = "Encontro casual"
3771206630 = "O importante é um coração que não se quebra"
269605122 = "Campo em chamas"
1966463855 = "O que cai no estádio (1)"
2906042298 = "O que cai no estádio (2)"
4198251587 = "A vida também começa com 2 eliminados na 9ª entrada"
2669661554 = "Treinamento de finalização"
1770988056 = "Tradição e história"
593379531 = "O grupo do Sensei, que veio assistir ao jogo amistoso entre 'Corgi Braves' e 'Abyssinian Raiders', passa um momento divertido torcendo pelos Corgi Braves, time favorito de Rei, e aproveitando o 'momento da foto'. Nesse meio tempo, o técnico vê o Sensei no telão e dá instruções para chamá-lo..."
473988487 = "Não diga 'absolutamente'"
3177369030 = "Quem chamou o grupo do Sensei foi o técnico dos Braves. Ele recebeu um telefonema ameaçador de um suspeito dizendo: 'Se não seguir as instruções durante o jogo, explodirei a fábrica de chicletes', e pediu ajuda ao Sensei para encontrar o culpado. Sentindo que tal ato de violência não poderia ser tolerado, o grupo concorda em agir para resolver o caso de extorsão."
2743711684 = "Me acorde quando houver uma virada (1)"
2387523374 = "Junto com Sumire, que está disfarçada de vendedora, o Sensei vasculha o estádio. No caminho, Sumire identifica dois espectadores radicais que estavam vaiando muito e recusando a proteína oferecida como os culpados. Para garantir a custódia, Sumire inicia um 'treinamento pessoal' com os dois...!"
3613497359 = "Me acorde quando houver uma virada (2)"
4073297816 = "Os dois que foram detidos eram apenas espectadores comuns que estavam vaiando. Nesse momento, o anúncio de troca de turno soa no estádio. Preparando-se para um novo contato do culpado, o Sensei deixa o local sob os cuidados de Sumire e vai ao encontro de Rei."
3805571027 = "As pessoas sonham com o beisebol"
3683981516 = "O culpado, parecendo inquieto, instrui o técnico a fazer o próximo batedor realizar um bunt. O culpado ignora a relutância de Rei em relação ao bunt desde o início da partida. O bunt é bem-sucedido por enquanto e, após o avanço do corredor, o 4º batedor vai ao montinho, mas, num piscar de olhos, são três eliminados. O culpado, exausto, ordena a troca do arremessador na 3ª entrada..."
2101992904 = "Encontro casual"
1936948185 = "Sensei e Rei encontram Hanae, que está torcendo pelos jogadores. Hanae nem sabe o nome dos dois times que estão lutando, mas está torcendo para que alguém ganhe coragem. Rei fica impressionada com sua pureza. No entanto, logo depois, ela testemunha o momento em que um fã, que estava calmo até então, se enfurece com um erro do jogador e muda completamente, deixando-a com sentimentos conflitantes..."
56139120 = "O importante é um coração que não se quebra"
2691253840 = "Sumire denuncia os espectadores que violam as regras e, em meio a isso, fala sobre a importância do espírito esportivo e que gosta de 'pessoas que se esforçam por um objetivo' e 'pessoas que as guiam'. Nesse momento, chega um contato de Rei. Com a notícia de que talvez consigam identificar o paradeiro do culpado usando o ruído da chamada como pista, Rei e Sumire se mantêm alertas."
523545392 = "Campo em chamas"
2573485065 = "Rei fala sobre sua paixão pelo beisebol e questiona por que o Sensei, que não é fã de beisebol, está colaborando tanto. Ao responder que 'gosta de cuidar das alunas', o Sensei surpreende Rei. Nesse momento, o culpado entra em contato novamente. Enquanto as decisões do técnico falham miseravelmente e o culpado se enfurece, Sumire identifica o paradeiro do culpado com base no ruído da chamada —"
1348511304 = "O que cai no estádio (1)"
220876149 = "Rei, Sumire, o Sensei e o técnico finalmente invadem o camarote privado onde o culpado está. Mas o culpado faz reféns e, para completar, o 4º batedor dos Braves aparece para tentar impedi-lo, transformando o local em um caos total! Sob o comando do Sensei, Sumire e Rei entram em combate contra os seguranças contratados pelo culpado."
867171087 = "O que cai no estádio (2)"
2808333292 = "O culpado detido revela ser um fã decepcionado com a falta de habilidade dos Braves. Enquanto isso, o jogo continuava, e finalmente, na parte baixa da 9ª entrada, o último ataque dos Braves estava prestes a começar. No entanto, o crucial 4º batedor feriu o pulso com uma bala perdida do combate anterior...!"
1172577379 = "A vida também começa com 2 eliminados na 9ª entrada"
1710768566 = "Na ausência de um batedor, o Sensei sugere que Rei, a 4ª batedora do clube de beisebol do Millennium, entre como substituta. Rei fica nervosa, mas, encorajada pelo Sensei, por Sumire e pelo técnico, ela vai para a caixa de rebatidas. Com o apoio de todos, Rei esvazia a mente e balança o bastão com toda a força. A bola se torna um vulto branco e voa para longe, além do céu —"
239529906 = "Treinamento de finalização"
3302298300 = "Enquanto o eco da vitória pelo home run de despedida ainda não esfriava, Rei estava entusiasmada para praticar como a 4ª batedora do Millennium hoje também. Nesse momento, aparece Sumire, que também teve o coração tocado pela partida. Rei, sentindo um calafrio, tenta fugir — e Sumire, tendo capturado o Sensei, convida os dois para um treinamento pesado."
2374279045 = "Incidente da Corrida do Trem Highlander ~E então o trem desapareceu~"
4097448805 = "Em torno de um trem de carga carregado com uma carga misteriosa, o Sensei e as alunas da Highlander se envolvem em uma fuga louca e caótica. Será que a missão será cumprida...?"
858649273 = "O trem de carga traz problemas"
704818290 = "A agitação antes da tempestade"
2872790696 = "Perseguindo o trem desaparecido"
2937243906 = "Perseguindo o trem desaparecido, novamente"
1042678798 = "O que ele carrega enquanto corre?"
2310089541 = "Foras da lei da estrada, de novo (1)"
3589229616 = "Foras da lei da estrada, de novo (2)"
3828020347 = "O encontro de fãs mortal"
3583050692 = "O trem, o Sensei e a garota de cabelos prateados (1)"
2291961665 = "O trem, o Sensei e a garota de cabelos prateados (2)"
2018297920 = "O que precisa ser feito"
1709068620 = "Um movimento para abrir caminho"
919794098 = "A garota sorri em um mundo que não compreende"
1592787353 = "O trem de carga carrega problemas"
4071418763 = "De repente, o trem é atacado por agressores misteriosos. Nozomi e Hikari encaram a situação de vida ou morte com seu ritmo próprio. Enquanto isso, Aoba, sem saber o que fazer, só consegue gritar..."
2843453471 = "A agitação antes da tempestade"
2510762123 = "Hikari, Nozomi e a mecânica Aoba foram encarregadas de uma importante missão de transporte. Enquanto esperam a partida, Aoba fica perplexa com o comportamento excessivamente livre das duas, que comem pizza na sala dos funcionários. No meio disso, elas se envolvem em uma confusão com um entregador de pizza que se diz ser da União de Velocidade Burororo, e quando parece que vão partir em segurança... descobre-se que o trem começou a andar sozinho."
234894002 = "Perseguindo o trem desaparecido"
2491575675 = "As três decidem perseguir o trem que partiu devido a um erro no sistema e chamam o Sensei como reforço para entrar no metrô. Dentro do trem, elas quase são assaltadas por delinquentes, mas conseguem repelir os atacantes graças à aura negativa de Aoba, que 'não espera nada do futuro'."
1820644909 = "Perseguindo o trem desaparecido, novamente"
693428850 = "Ao saberem que o trem partiu novamente, o grupo fica desapontado. Elas tentam alcançá-lo de ônibus, mas Aoba fica enjoada e quase chega ao seu limite. Elas conseguem chegar ao destino e Hikari e Nozomi estão determinadas a recuperar o trem desta vez. Enquanto isso, uma certa gangue de motoqueiros decide interceptar a carga...!"
4227455266 = "O que ele carrega enquanto corre?"
2831572118 = "Quando o Sensei pergunta sobre o conteúdo da carga, Hikari e Nozomi respondem que não sabem de nada. Durante a conversa, Hikari encontra a estação onde o trem de carga está parado através do comunicador e pede ao funcionário que o mantenha parado, mesmo que à força. No entanto, o canal Chronos estava fazendo uma reportagem naquela estação, e a existência do trem acaba sendo espalhada por todo o Kivotos!"
2734625292 = "Foras da lei da estrada, de novo (1)"
3350873888 = "Ao saberem da localização do trem pelas notícias do canal Chronos, gangues de motoqueiros, delinquentes, habitantes do mercado negro e o grupo dos capacetes — todos os vilões de Kivotos se dirigem à estação. Ao chegarem lá, o grupo é atacado pela gangue de motoqueiros."
214528885 = "Foras da lei da estrada, de novo (2)"
298293347 = "Após repelirem a gangue de motoqueiros, o grupo finalmente chega ao trem de carga e começa os preparativos para a partida."
3002198178 = "O encontro de fãs mortal"
758680022 = "Membros da União de Velocidade Burororo perseguem o trem em movimento com uma velocidade impressionante. Com a chegada de Shinon, que transmite tudo de um helicóptero, a cena é exibida em rede nacional mais uma vez. Enquanto delinquentes e pessoas do mercado negro se juntam e uma batalha caótica se desenrola, o trem entra no distrito de Gehenna..."
1912742186 = "O trem, o Sensei e a garota de cabelos prateados (1)"
4198519711 = "Iori não consegue esconder o choque ao ver o Sensei no trem. Aceitando o pedido do Sensei, Iori decide dar suporte, apesar das lembranças desagradáveis que passam por sua mente, e o grupo entra em combate contra os perseguidores."
3244022405 = "O trem, o Sensei e a garota de cabelos prateados (2)"
3935017135 = "Após repelirem os perseguidores, o grupo finalmente vê o conteúdo da carga, que foi danificada pelo impacto da batalha. Enquanto isso, o chefe da gangue de motoqueiros derrotada diz que 'ainda há uma chance', decidindo seguir para o destino e executar o plano de roubar a carga para entregá-la ao cliente..."
4115766217 = "O que precisa ser feito"
341963437 = "Aoba suspeita de uma conspiração devido ao erro no sistema de partida, à reportagem do canal Chronos e ao número de perseguidores. Em resposta, Nozomi diz que 'a única coisa que precisa ser feita é levar a carga ao destino'. O Sensei envia seu apoio incondicional às três, que levam seu trabalho a sério. Nesse momento, descobre-se que os freios do trem não estão funcionando..."
1262942570 = "Um movimento para abrir caminho"
692436586 = "Quando os freios do trem falham e parece que não há mais opções, Aoba cria um plano para explodir as rodas do trem e forçar a parada. Destruindo a estação e os trilhos, o trem de carga para em segurança (?). Lá, os motoqueiros que estavam à espreita atacam...!"
3730951926 = "A garota sorri em um mundo que não compreende"
3028706737 = "Finalmente, o cliente com cara de vilão aparece! Mas, apesar de seu jeito de falar parecer maligno, sua verdadeira identidade é a de um empresário famoso por seu trabalho social. Revela-se que a carga eram itens para um leilão de caridade. Os motoqueiros derrotados também se arrependem e decidem recomeçar como entregadores, e o caso é resolvido. O Sensei, Hikari, Nozomi e Aoba vão jantar juntos."
3343042660 = "Uma flor que desabrocha de cem — Vamos ao duelo aquático"
3702024192 = "O 'Festival Aquático de Hyakki' é realizado, com 100 participantes se enfrentando no mar! No campo de batalha que é o mar de verão, será que a Hyakkiyako conseguirá vencer a sobrevivência...?"
76733946 = "A reunião social da Hyakkiyako"
569088934 = "Abertura! Festival Aquático de Hyakki!"
1435783369 = "Primeira rodada: Jogo de sobrevivência com pistolas d'água (1)"
1098783161 = "Primeira rodada: Jogo de sobrevivência com pistolas d'água (2)"
869866388 = "Segunda rodada: Jet ski em alta velocidade"
1935016526 = "Terceira rodada: Corrida de obstáculos aquáticos"
2695979454 = "Em busca de retornar após a eliminação"
1899045441 = "Repescagem: Vôlei de praia"
1171322563 = "Hyakkiyako vs Hyakkiyako"
3224248483 = "O orgulho de cada uma"
317465244 = "Batalha Final: Jogo de Empurrar"
1219559063 = "O Fim da Final (1)"
3621714258 = "O Fim da Final (2)"
3948541153 = "Uma Batalha que Não Posso Perder"
3171838475 = "O Fechamento da História"
2687712889 = "A Confraternização da Hyakkiyako"
3553374059 = "Ao chegar na Praia Torii, o grupo Hyakkiyaran decide participar do \"Festival Aquático das Cem Noites\", uma tradição de verão de Hyakkiyako. Enquanto as outras membros estão empolgadas, Kikyou mantém uma expressão séria. Como estrategista, ela precisa bolar um plano — não para a competição, mas para esconder o fato de que tem medo de água."
2607288957 = "Abertura! Festival Aquático das Cem Noites!"
1137445026 = "O \"Festival Aquático das Cem Noites\" é uma batalha de sobrevivência onde 100 competidores lutam para ser o último de pé. Enquanto o local ferve de animação, Kikyou fica alerta quanto às provas de natação. Felizmente, a primeira rodada é um \"Jogo de Sobrevivência com Armas d'Água\". Com o Sensei atuando como juiz, o Festival Aquático das Cem Noites começa!"
3251561313 = "Primeira Rodada: Jogo de Sobrevivência com Armas d'Água (1)"
3490215767 = "No \"Jogo de Sobrevivência com Armas d'Água\", o grupo Hyakkiyaran enfrenta delinquentes e o Grupo Chimi liderado por Arata. Encurraladas por um ataque concentrado, Chise, Izuna, Mimori e as outras membros da Hyakkiyako aparecem para ajudar."
3370622094 = "Primeira Rodada: Jogo de Sobrevivência com Armas d'Água (2)"
365815230 = "Com o apoio recebido, o grupo Hyakkiyaran consegue passar pela primeira rodada. No entanto, ao ouvir que a segunda rodada envolve correr pelo mar em jet boards, Kikyou fica extremamente abalada."
4037221880 = "Segunda Rodada: Jet Boards Desgovernados"
1144551112 = "A condição de vitória da segunda rodada é conseguir se segurar nos jet boards gigantes sem cair. Em meio ao pânico total, as membros da Hyakkiyaran correm sobre a água enquanto apoiam umas às outras!"
678818893 = "Terceira Rodada: Corrida de Obstáculos Aquáticos"
1041862596 = "Kikyou consegue passar pela segunda rodada e respira aliviada, mas... a prova da terceira rodada é uma \"Corrida de Obstáculos Aquáticos\". Enquanto Izuna e os outros participantes se destacam, Kikyou, com medo da água, decide que o melhor é ser eliminada naturalmente. Porém, no caminho, ela pisa em uma mina terrestre e acaba caindo no mar."
876036637 = "Em Busca de Retorno após a Eliminação"
3928963159 = "Chise e Izuna avançam para a final, e todas as membros da Hyakkiyaran são eliminadas. Kikyou sente culpa pelo resultado, mas é encorajada por suas companheiras. Depois, o grupo participa da repescagem de vôlei de praia, onde enfrentam Arata e os delinquentes novamente. Ela encara a partida ao lado da confiável Renge, mas Kikyou não consegue se livrar de um mau pressentimento."
2251056241 = "Repescagem: Vôlei de Praia"
1834868248 = "Kikyou fica abalada ao ser apontada pelos oponentes como o \"ponto fraco do time\". No entanto, graças ao desempenho de Renge, elas vencem a partida. Na segunda rodada, a dupla Yukari e Nagusa enfrenta o grupo de Mimori. Em meio a isso, Kikyou sente sua determinação arder: ela precisa vencer, não por si mesma, mas por Renge."
2454882779 = "Hyakkiyaran vs Hyakkiyaran"
1152005871 = "Para garantir o retorno à competição principal, a dupla Renge e Kikyou, vencedora da primeira rodada, enfrenta a dupla Yukari e Nagusa. Tendo superado suas preocupações, Kikyou mostra uma combinação brilhante com Renge, mas Yukari e Nagusa não facilitam. E então, quem vence a disputa?!"
2409784972 = "O Orgulho de Cada Uma"
2517191402 = "Renge e Kikyou avançam para a competição principal. Kikyou treina natação sob a orientação de Renge e se prepara para a última prova do Festival Aquático das Cem Noites: o \"Jogo de Empurrar\". As duas se enfrentam na primeira partida, e Kikyou planeja ceder a vitória para Renge, que tem mais chances de ser campeã. Nesse momento, a figura de Wakamo aparece perto do local..."
2601316494 = "Batalha Final: Jogo de Empurrar"
625197215 = "Como amiga, Kikyou decide responder à altura de Renge e encara a luta a sério. Enquanto relembram sua trajetória e o crescimento mútuo, Kikyou declara que não desistirá, não apenas por si, mas por todos que torceram por ela. Renge vence a disputa, mas Kikyou, usando a natação que aprendeu, emerge à superfície, mostrando a todos o quanto cresceu."
1374240881 = "O Fim da Final (1)"
972403894 = "Na segunda partida do \"Jogo de Empurrar\"... a batalha entre Izuna e Chise termina com a vitória de Izuna após uma disputa acirrada. Na final que se segue, Renge e Izuna travam um combate intenso, mas é então que Wakamo e os delinquentes invadem o local. No entanto, Wakamo fica furiosa com os delinquentes por terem destruído o local e, junto com o Sensei, enfrenta os baderneiros."
2662659970 = "O Fim da Final (2)"
2541135733 = "Wakamo, querendo provar quem é a mais forte diante do Sensei, entra em cena. Graças à iniciativa de Shizuko, que vê a empolgação do público como uma oportunidade, uma partida de exibição do Jogo de Empurrar é organizada. A pessoa que se voluntaria para a luta é Nagusa."
874828774 = "Uma Batalha que Não Posso Perder"
3296688882 = "Todos esperavam que a oponente de Wakamo fosse Nagusa, mas ela aponta para Kikyou. Kikyou é pressionada pela força avassaladora da \"Raposa da Calamidade\", mas, lembrando-se das palavras de Renge, ela utiliza uma técnica de luta de solo baseada em seu \"jogo de cordas\". Após um acidente onde o palco explode e uma análise de vídeo, a vencedora é declarada: Kikyou."
3841231258 = "O Fechamento da História"
681961707 = "O Festival Aquático das Cem Noites chega ao fim. Enquanto todos compartilham suas memórias, Kikyou pratica natação sozinha no mar. Ao ser visitada pelo Sensei, ela expressa seus sentimentos pelas companheiras. Depois disso, todas as membros da Hyakkiyaran se reúnem para aproveitar o mar de verão juntas."
891109437 = "Promessa sob o Céu de Verão"
638766874 = "\"Uma carruagem de abóbora carregando uma princesa. De onde veio o rato que puxava a carruagem?\" Com pensamentos distintos guardados a sete chaves, as três do Tea Party dão as boas-vindas a um verão especial. Afinal, qual será o destino de cada \"promessa\"...?"
102485579 = "Escolha Dolorosa"
1758810637 = "Vamos de Férias!"
2958894507 = "Crise na Fonte Termal (1)"
33490314 = "Crise na Fonte Termal (2)"
2007556553 = "O Cenário do Narrador"
3182348437 = "Além da Negociação, o que se Conquista"
681569957 = "O que não foi visto e o que não se olhou"
198094580 = "Mais uma vez, além da negociação, o que se conquista"
1473969249 = "Um problema atrás do outro"
2254419904 = "O narrador também é um ator"
2812911223 = "E assim os dias continuam"
3389074056 = "Verão, encrenqueiros e a beira-mar"
2698760335 = "Escolha Dolorosa"
3471830961 = "Ichika, que chamou Kasumi secretamente, pede desculpas por suas ações passadas enquanto propõe uma certa consulta..."
510573763 = "Vamos tirar férias!"
868724966 = "Mika e Seia levam Nagisa, que sempre parece estar ocupada, à força para a praia particular do Tea Party. Para que Nagisa esqueça o trabalho e descanse, Mika pede a ajuda do Comitê de Justiça e do Sensei. O Comitê de Justiça começa a inspecionar as instalações imediatamente, mas... diante de Hasumi e do Sensei, surge uma sombra familiar—"
3650982588 = "Crise Termal (1)"
3259286566 = "Sensei e Hasumi encontram Meg, que está tentando instalar bombas para o desenvolvimento de fontes termais. Ao saber que ela é uma terrorista de Gehenna, Hasumi perde a cabeça. Ichika e Mika, ao ouvirem a confusão, também correm para o local, e o grupo acaba entrando em combate com o Departamento de Desenvolvimento de Fontes Termais..."
4256633556 = "Crise Termal (2)"
4100754173 = "Mika impede Ichika e Hasumi de perseguirem o Departamento de Desenvolvimento de Fontes Termais, que está recuando. O objetivo desta vez é, acima de tudo, fazer Nagisa descansar. Mika fica radiante de expectativa, pensando que, ao confiscar os materiais do Departamento de Desenvolvimento de Fontes Termais, talvez tudo dê certo desta vez."
2905735432 = "O Cenário do Contador de Histórias"
189079989 = "Nagisa finalmente chega à praia, tem seu celular confiscado por Seia e começa a aproveitar as férias preparadas por Mika. No entanto, quando tudo estava pronto para começar o churrasco do almoço assim que os ingredientes chegassem, ocorre um problema: o caminhão de entrega é atacado! Levando a situação a sério, o Sensei, embora hesitante, pede a cooperação de especialistas em gastronomia..."
1586521284 = "Além da Negociação, o que se Obtém"
2960261762 = "Enquanto Hasumi expressa sua raiva contra Gehenna, Mika negocia com persistência. Seus sentimentos tocam o coração do Clube de Pesquisa Gastronômica, e ela recebe o conjunto de churrasco de Haruna... mas descobre-se que era exatamente isso que o caminhão atacado estava transportando. Em um clima de tensão, Mika evita o conflito e retorna para onde Nagisa e Seia estão."
2414294148 = "O que não foi visto e o que não se olhou"
1918343499 = "No chá da tarde, Nagisa e Hasumi travam uma discussão acalorada sobre se \"no chá com leite, o leite vai primeiro ou o chá vai primeiro\". Enquanto isso, Mika começa a cuidar da manutenção do iate com Ichika. Ao ver Mika limpando a sujeira da hélice e o interior empoeirado do barco sem se importar em se sujar, Ichika muda sua percepção sobre ela. Nesse momento, um estrondo ecoa pela praia—"
887693989 = "Mais uma vez, além da Negociação, o que se Obtém"
3281068593 = "O solo da costa cede e a casa de veraneio desmorona. Mika, triste por suas férias terem sido arruinadas, começa a se preparar para voltar por segurança. Ao ver a situação, Ichika toma uma decisão e pede a Kasumi que investigue o solo e reconstrua a casa. Ao ouvir que Ichika ficou tocada pelo esforço de Mika, Kasumi decide mostrar sua sinceridade à sua própria maneira."
2080918680 = "Um problema após o outro"
2401129424 = "Kasumi e o Departamento de Desenvolvimento de Fontes Termais completam a obra com uma velocidade impressionante. Ao ouvir que a causa do desmoronamento foi um veio de água subterrâneo, o Sensei tem um mau pressentimento. Ichika nocauteia Kasumi às pressas enquanto ela tenta apertar o botão de detonação para as fontes termais. A explosão foi evitada... ou assim parecia, até que Nagisa aparece e aperta o botão por acidente—"
4250400809 = "O Contador de Histórias também é um ator"
2854006256 = "Nagisa pede desculpas por ter apertado o botão de detonação por curiosidade e arruinado o esforço de Mika. Mika temia ser repreendida por Nagisa por causar problemas, mas Nagisa acreditava sinceramente que Mika havia se esforçado pelas férias. Ao ver a interação entre as duas, Seia sente alívio ao ver Nagisa mostrar um lado inocente como antigamente."
1149899978 = "Assim, os dias continuam"
1192372638 = "Após retornar à rotina, o Sensei visita Trinity. O Sensei, que foi solicitado por Nagisa para limpar a praia onde interesses se cruzam, visita Kasumi em seguida. Enquanto Kasumi não revela seus verdadeiros sentimentos sobre ter aceitado o pedido de Ichika, os membros do Departamento de Desenvolvimento de Fontes Termais se reúnem ali. Cercada por seus companheiros, Kasumi sorri de forma um tanto envergonhada."
319907092 = "Verão, encrenqueiros e a beira-mar"
1937080442 = "Ichika, do Comitê de Justiça, é solicitada por Nagisa para patrulhar a praia particular. Deveria ser apenas uma missão de patrulha pacífica... mas a praia gradualmente se torna uma situação caótica..."
2910235899 = "Nós, o Clube de Pesquisa Oculta! ~Os mistérios da academia e feitiços antigos~"
589423980 = "A \"Terra Natal da Arte\", a Academia de Artes Wild Hunt. Ao visitar a academia com os alunos do Clube de Pesquisa Oculta, o Sensei encontra vários fenômenos estranhos—"
1757997285 = "Profecia"
3432292044 = "Reencontro fatídico"
3336159845 = "País das Maravilhas dos sonhos e esperanças"
2333014958 = "O oculto que reside na arte"
1429803762 = "O dono da voz é..."
403535276 = "Aqueles que devem ser evitados"
2173393234 = "Os sonhos de cada um"
4268509919 = "Prova da lenda"
3930840543 = "Contato"
1670650202 = "Início da operação (1)"
2495751946 = "Início da operação (2)"
3290455411 = "Magia que realiza desejos (1)"
3791453407 = "Magia que realiza desejos (2)"
693904835 = "O cotidiano continua"
243717312 = "Profecia"
1783764414 = "\"...O tempo chegou.\" Dizendo isso, uma sombra negra realiza uma adivinhação suspeita. Ela estava decidida a dar um passo histórico em segredo."
1846210987 = "Reencontro fatídico"
2035893641 = "O Sensei testemunha um show incrível no parque e reencontra Tsumugi. Enquanto conversam, o Sensei demonstra um interesse inesgotável por Wild Hunt, e ela diz que irá guiá-lo pela escola e apresentar seus amigos."
94309684 = "País das Maravilhas dos sonhos e esperanças"
2312993075 = "Ao entrar em Wild Hunt, o Sensei é apresentado aos membros do Clube de Pesquisa Oculta, colegas de quarto de Tsumugi. Eli, especialista em pintura que estuda magia; Kanoe, especialista em ocultismo cuja especialização é um segredo; e Rena, especialista em design de moda que não acredita em ocultismo. Junto com esses membros peculiares, o tour por Wild Hunt começou."
602662681 = "O oculto que reside na arte"
3230143843 = "Em um belo museu, o Sensei é apresentado a estátuas de demônios que se movem, junto com a obra representativa da academia, \"Imagem da Gênese\". Quando Tsumugi faz uma apresentação com voz gutural para invocar um demônio, a estátua realmente se move. Alegre, o Clube de Pesquisa Oculta sai apressadamente do museu antes que os \"seres abomináveis\" chamados pela estátua cheguem. Enquanto os segue, as dúvidas do Sensei sobre a misteriosa academia aumentam."
1950443646 = "O dono da voz é..."
3427747708 = "Devido a uma decisão do Conselho de Artes, o quarto de Rena foi designado e, embora ela não acredite em ocultismo, acabou dividindo o quarto com os membros do Clube de Pesquisa Oculta. Por isso, seu objetivo parece ser \"trazer seus colegas de quarto de volta ao normal\". No entanto, diante de uma estátua de pedra que começa a sussurrar, ela estava morrendo de medo. O que o Clube de Pesquisa Oculta, que passa o tempo se divertindo, fará a seguir... é uma invocação de demônio usando um círculo mágico."
3404328226 = "Aqueles que devem ser evitados"
3959629266 = "O Clube de Pesquisa Oculta tenta criar uma atmosfera tensa contando histórias de fantasmas sobre as regras especiais do dormitório. O ritual é realizado no Quarto 404 do 4º Dormitório, o local com mais números 4 em toda a escola... Como resultado do ritual, uma grande explosão ocorre no quarto, enchendo-o de fumaça. É então que os 'seres abomináveis' — a Equipe de Vigilância do Dormitório — invadem o local, levando o Clube de Pesquisa Oculta e o Sensei sob custódia."
3801750001 = "Sonhos Individuais"
2772664207 = "Os membros do Clube de Pesquisa Oculta e o Sensei são jogados na sala de detenção. Entre o desejo de se divertirem e a vontade de criar obras-primas, seus sonhos individuais e o que os levou a se interessarem pelo ocultismo são revelados. Enquanto isso, a equipe é liberada por Miria, da Equipe de Vigilância, que desta vez apenas lhes dá uma advertência. Embora devesse ser o primeiro encontro deles, Miria parecia estar feliz em reencontrar o Sensei..."
534740858 = "A Prova da Lenda"
342039406 = "De volta ao dormitório, os membros do Clube de Pesquisa Oculta e o Sensei limpam o quarto onde a explosão ocorreu. Lá, o Sensei encontra trabalhos anteriores de Eri e ouve de Kanoe sobre a paixão dela pela pintura. Com o quarto restaurado, eles decidem tentar um novo ritual. Era algo de alto risco: criar um círculo mágico que abrangesse toda a academia para realizar um desejo."
1190759647 = "Contato"
4008770669 = "Além de outros prédios, eles precisam desenhar o círculo mágico passando pelo alojamento da Equipe de Vigilância. O grupo obtém materiais seguros com uma aluna chamada Miyo e se prepara para agir à noite. No entanto, apenas Rena, diante de tal risco, recusa-se a participar."
1327359974 = "Início da Operação (1)"
3354972277 = "Na escola à noite, os membros do Clube de Pesquisa Oculta e o Sensei criam o círculo mágico com fita fotoluminescente, evitando os olhares da Equipe de Vigilância. Porém, o Sensei acaba sendo descoberto por um membro da equipe. Aproveitando a distração causada pelo corvo de Kanoe, o Sensei consegue escapar."
7705631 = "Início da Operação (2)"
1730110018 = "O Sensei se reúne com os membros do Clube de Pesquisa Oculta, mas todos acabam cercados pela Equipe de Vigilância. Foi então que o som de um sino, que anunciava a destruição da academia, ecoou por todo o local..."
1491323294 = "A Magia que Realiza Desejos (1)"
821028676 = "A Equipe de Vigilância fica abalada ao ver uma lenda da academia se tornar realidade. Mas Tsumugi percebe que quem está tocando o sino é Rena. O Clube de Pesquisa Oculta aproveita a brecha para tentar escapar."
3455333224 = "A Magia que Realiza Desejos (2)"
2541673132 = "O grupo finalmente ativa o círculo mágico. Então, um gigantesco círculo mágico de luz aparece na Academia Wildhunt. No entanto, nada mais acontece, e Eri e Kanoe ficam desapontadas, achando que a magia de realizar desejos não existia. Mas esse ato chama a atenção do presidente do conselho de Wildhunt, que elogia a obra e deseja exibi-la no futuro. Eri chora ao perceber que conseguiu criar uma obra reconhecida por todos."
1543250491 = "A Vida Cotidiana Continua"
1266981412 = "Depois disso, o Clube de Pesquisa Oculta e o Sensei são novamente encarcerados na sala de detenção. Sem aprender a lição, Tsumugi propõe uma invasão ao museu de propriedade do presidente do conselho para descobrir o segredo da 'Imagem da Gênese', que representa Wildhunt. Enquanto todos, exceto Rena, se empolgam, Miria — a Ladra da Benevolência — aguarda ansiosamente pelo próximo encontro com o Clube de Pesquisa Oculta."
1182331802 = "Arte para Quem? ~Pinturas Falsas e o Destino da Estética~"
2650973403 = "O Departamento de Comércio Especial recebe um pedido estranho: substituir uma falsificação por uma obra original no depósito de um museu. O plano parecia correr bem, mas uma carta de aviso da 'Ladra da Benevolência' faz a situação tomar um rumo inesperado..."
3968697943 = "Um Teto Desconhecido"
1943793894 = "Nublado com Pancadas de Mercadorias"
3581804017 = "Eu Vou Ouvir Você"
849689372 = "Quem Aprecia o Roxo e o Azul?"
3742509751 = "Variável Branco Puro"
1402796539 = "O Pé do Arco-Íris"
2440296708 = "Revisão de Roteiro"
972763863 = "Entre o Roubo e o Comércio"
3491921326 = "O Cruzamento da Verdade e da Mentira"
4000871095 = "Eu Não Quero Esse Final"
3187725442 = "Resultado do Teste"
513132341 = "Apenas uma Palavra"
4063592236 = "Um Teto Desconhecido"
321247416 = "O Sensei acorda em um quarto desconhecido. À sua frente está Miyo Sakurai, uma aluna de Wildhunt. Ela confessa ao Sensei sua preocupação em querer dissolver o 'Departamento de Comércio Especial', que aceita transportar itens proibidos pelas regras escolares. O Sensei pede para se encontrar com o chefe do departamento, mas... Miyo confessa, sem jeito, que ela mesma é a chefe."
3854665383 = "Nublado com Pancadas de Mercadorias"
3506256888 = "Por que o Sensei foi levado para aquele quarto? Foi porque, ao tentar descansar após terminar seu trabalho em Wildhunt, ele foi atingido em cheio por uma enorme trouxa que caiu do céu e acabou desmaiando. Confuso ao saber que o conteúdo da trouxa era contrabando lançado por uma catapulta, o Sensei decide, por enquanto, observar as atividades do clube."
3417447813 = "Eu Vou Ouvir Você"
2813678565 = "O Sensei observa as atividades do Departamento de Comércio Especial. Os pedidos dos alunos eram, em sua maioria, coisas inofensivas como alimentos proibidos ou materiais de arte. Após a observação, Fuyu elogia a engenhosidade dos métodos de entrega criados por Miyo e menciona que um grande pedido chegou, mas Miyo não tem intenção de aceitá-lo. No entanto, ao descobrir que a recompensa astronômica permitiria comprar a máquina de escrever que ela tanto procurava, ela acaba se sentindo tentada."
728695300 = "Quem Aprecia o Roxo e o Azul?"
1892403812 = "O pedido que Fuyu recebeu era de alguém que se dizia pintor, solicitando a troca de uma falsificação por uma obra original na 'Exposição Especial Veronica'. Miyo hesita diante do ato criminoso, mas a tentação da alta recompensa e da máquina de escrever dos seus sonhos é forte demais...! Encorajada pelas palavras do Sensei de que ele 'acredita em todos', Miyo decide planejar a operação."
3967993505 = "Variável Branco Puro"
3035717569 = "Miyo passa a noite em claro planejando a operação, decidindo atacar o 'depósito' onde as pinturas estão guardadas. No entanto, no dia seguinte, ela descobre por sua amiga Hiromi, da Equipe de Vigilância, que ela é a responsável pela segurança do depósito, o que a faz sentir culpa. Além disso, Hiromi revela que a 'Ladra da Benevolência' enviou uma carta de aviso para a exposição especial, e a situação começa a tomar um rumo inesperado."
2262708236 = "O Pé do Arco-Íris"
4173580364 = "Devido à carta de aviso da 'Ladra da Benevolência', Miyo é forçada a reformular seu plano. Ela fica travada na decodificação da carta, mas, graças ao conhecimento de Eri, que encontrou por acaso, percebe que 'Céu Duro' se refere ao pigmento 'Lápis-lazúli'. Com essa dica, Miyo resolve o mistério e corre para encontrar Fuyu e Ritsu para anunciar que conseguiu decifrar a carta."
1935941598 = "Revisão de Roteiro"
929353011 = "Miyo decifra a primeira parte da carta e identifica que o alvo da ladra é o mesmo que o deles: 'Quem Aprecia o Roxo e o Azul?'. Com o Sensei se juntando a eles, Miyo elabora um plano para colocar a obra original após a ladra roubar a falsificação. Além disso, ela decifra a segunda parte da carta e descobre que o horário do crime é o 'Magic Hour' do entardecer. Miyo começa a ajustar o plano para dar suporte à ladra."
1239520600 = "Entre o Roubo e o Comércio"
3993965843 = "O sol se põe e a exposição especial está prestes a começar. Miria, da Equipe de Vigilância, revela sua verdadeira identidade como a ladra Akira e executa o plano. Enquanto isso, o Departamento de Comércio Especial de Miyo também usa armadilhas e cortinas de fumaça para distrair a Equipe de Vigilância e ajudar a ladra a entrar. Quando parecia que a operação seria um sucesso, a própria Akira aparece diante de Miyo e seu grupo."
70628750 = "O Cruzamento da Verdade e da Mentira"
2173369049 = "Akira aparece diante do Departamento de Comércio Especial e questiona a verdadeira intenção da cooperação deles. Akira rouba instantaneamente o quadro que Fuyu estava segurando, mas aponta que aquilo é uma falsificação. Enquanto ambos ficam confusos, o Sensei aparece. Miyo fica surpresa ao saber que Akira também é aluna do Sensei, mas, ao ouvir as palavras do Sensei sobre 'acreditar nos alunos', ela decide contar toda a verdade para Akira."
846145545 = "Eu Não Quero Esse Final"
2803439870 = "Akira compreende o objetivo do Departamento de Comércio Especial e propõe um plano de cooperação onde ela obtém a obra original e elas recebem a recompensa. No entanto, Miyo, como escritora, não consegue aceitar esse desfecho onde ninguém é salvo. Bloqueando a rota de fuga de Akira com a força bruta de Ritsu, Miyo propõe uma \"aposta\" que todos possam aceitar para dar um final correto a esta história."
678391328 = "Resultado do teste"
398615950 = "No dia da exposição, contrariando as expectativas do cliente, a obra original e a falsificação estão lado a lado. Esse era o conteúdo da \"aposta\" que Miyo propôs a Akira na noite anterior para testar o senso estético do público. O público se reúne em torno da obra original, e Miyo, vitoriosa na aposta, desmaia de alívio. O cliente é preso e o caso é resolvido com sucesso. Depois disso, Akira, agindo de forma suspeita, oferece-se para ser a guia da exposição para o Sensei."
773747756 = "Apenas uma palavra"
4154888357 = "Após a resolução do caso, o Sensei descansa com o Departamento de Comércio Especial em um café. Miyo revela que conseguiu vencer a \"aposta\" confiando no senso estético do público, graças a um comentário casual de Ritsu. No entanto, o saldo final foi um grande prejuízo, e Miyo fica deprimida por não conseguir comprar a máquina de escrever que tanto desejava. Ao saber que ainda restam unidades à venda, ela renova sua motivação para o próximo trabalho. Curiosamente, essa atitude reflete a de Akira."
3341623687 = "Garota Mágica Heavy Caliber ~A Ambição de Era e a Qualificação da Justiça~"
4229071812 = "Para impedir um certo incidente, o grupo decide se infiltrar em um parque de diversões. Embora cada uma carregue suas próprias preocupações, elas tomam a decisão, dizendo: \"É algo que alguém precisa fazer\", e seguem para o local."
2007113812 = "Prólogo"
1389103315 = "A qualificação de um grupo de vigilantes"
3670730391 = "Planos para o fim de semana"
1275780559 = "O que é a Garota Mágica Heavy Caliber!"
3377041422 = "O show no palco começa!"
970617948 = "Perseguição! Grupo do Capacete! (1)"
1478998812 = "Perseguição! Grupo do Capacete! (2)"
3622057000 = "Suzumi Morizuki"
781215453 = "Stunag-chan faz o seu melhor (1)"
1755335414 = "Stunag-chan faz o seu melhor (2)"
2126080124 = "A qualificação para fazer o bem"
4252977784 = "A primeira e última chance"
3388532438 = "Final"
3255179817 = "Como você está?"
3519305971 = "O futuro é brilhante"
562973436 = "Blues do Grupo do Capacete"
4261263739 = "O nascimento do executivo do mal"
668979687 = "Prólogo"
291814856 = "A garota mágica \"Heavy Calibers\" aparece no show de heróis do parque de diversões! Suzumi e Reisa fazem poses de efeito sob os aplausos das crianças, mas Love, ao presenciar a cena, acaba duvidando da sanidade delas."
1625623402 = "A qualificação de um grupo de vigilantes"
3887718499 = "Suzumi, que atua como vigilante, é criticada por uma delinquente que ela subjugou, dizendo: \"Você é só uma fracassada brincando de justiça e usando violência\", o que a faz duvidar do significado de suas atividades. Nesse meio tempo, Shimiko ouve sobre um plano sinistro do Grupo do Capacete na antiga biblioteca e pede ajuda a Suzumi, mas Suzumi diz: \"Isso é trabalho do Comitê de Realização da Justiça\" e não se move..."
1516868240 = "Planos para o fim de semana"
3737638084 = "Para denunciar o plano sinistro do Grupo do Capacete, Suzumi e Shimiko visitam o Comitê de Realização da Justiça. No entanto, como o local fica na fronteira com o distrito de Gehenna, o comitê não pode agir abertamente e, em vez disso, pede que Suzumi e as outras verifiquem a situação. Reisa aparece diante das duas, que estão preocupadas com a falta de pessoal, e aceita prontamente ajudar. Assim, as três se infiltram no parque de diversões vestidas de garotas mágicas."
251151206 = "O que é a Garota Mágica Heavy Caliber!"
389196534 = "Para a missão de infiltração, Suzumi e Reisa vestem trajes de garotas mágicas. Reisa chama Suzumi de \"Thermite White\" e entra no personagem, mas Suzumi não consegue esconder o constrangimento. Mashiro, responsável pelo suporte, e o Sensei também se juntam a elas. Logo após o início da operação, as duas são confundidas com o elenco real pelo gerente do show e acabam tendo que subir ao palco!"
952740791 = "O show no palco começa!"
1766902987 = "No momento do show, Suzumi é tomada pelo nervosismo diante da grande plateia. Reisa usa seu jogo de cintura para improvisar e manter o show, mas Suzumi entra em pânico quando as falas no roteiro borram com o suor. Além disso, as palavras ditas anteriormente pela delinquente voltam como um flashback, e ela fica paralisada no palco, pensando: \"Eu não consigo\"."
4157121877 = "Perseguição! Grupo do Capacete! (1)"
562445621 = "Enquanto Suzumi está paralisada no palco, Mashiro informa que encontrou Love. Voltando a si, Suzumi pula do palco sob o espanto da plateia e persegue Love e seu grupo. Ela encurrala o grupo na área de Gehenna, mas o local já estava lotado de espectadores que achavam que aquilo fazia parte do show."
2600015690 = "Perseguição! Grupo do Capacete! (2)"
627070372 = "Derrotadas por Love diante da plateia, Suzumi e Reisa são encurraladas. Quando parecia que tudo estava perdido, Love começa a ficar confusa com as vozes das crianças gritando que elas são as \"vilãs\". Percebendo a situação, Love finge ser derrotada, grita \"Vocês venceram!\" e foge do local."
3398629634 = "Suzumi Morizuki"
3108822929 = "Suzumi confessa que já pertenceu ao Comitê de Realização da Justiça, mas fugiu devido ao sofrimento causado pelas relações interpessoais. Autodepreciando-se como uma covarde e tentando desistir de ser vigilante, Suzumi é desesperadamente impedida por Reisa, que a chama de \"minha heroína\". Nesse momento, Mashiro informa novamente que encontrou Love — incentivada pelas palavras do Sensei e de Reisa, Suzumi, embora ainda hesitante, levanta-se novamente para cumprir sua missão."
3807592120 = "Stunag-chan faz o seu melhor (1)"
3287974263 = "Love, que Suzumi e as outras encontram novamente, estava vestida com a fantasia de \"Stunag-chan\", o mascote do anime de garotas mágicas. Love tenta se mover usando os espectadores como escudo para que Suzumi e as outras não possam atacar, mas Shimiko, disfarçada como a executiva do mal \"Era\", entra em cena. Seguindo o roteiro da peça, \"Era\" ataca \"Stunag-chan\", e a situação se transforma em uma confusão generalizada..."
3677586344 = "Stunag-chan faz o seu melhor (2)"
1024996158 = "Love, no papel de mascote, acaba sendo atacada não apenas pela vilã Shimiko, mas também por Suzumi e Reisa, que deveriam ser suas aliadas. Após a batalha, Love cai exausta e é capturada por Reisa, sendo levada para um armazém escuro. Lá, esperavam por ela três pessoas paradas sem expressão, segurando baterias. E então, o grito de Love ecoa pelo armazém..."
317219623 = "A qualificação para fazer o bem"
1854592249 = "Levada ao armazém, Love é interrogada por Suzumi e as outras. No entanto, descobre-se que o objetivo delas era prender o culpado que espalhou produtos falsificados pelo parque, e não atos de terrorismo. Suzumi, pedindo desculpas pelo mal-entendido, oferece ajuda para prender o verdadeiro culpado. Uma estranha frente unida entre o grupo de vigilantes, o comitê da biblioteca e o Grupo do Capacete é formada."
2385994890 = "A primeira e última chance"
3188488956 = "Suzumi e as outras encontram um comerciante suspeito vendendo produtos defeituosos perto do palco. Ao ser abordado, o comerciante tenta fugir imediatamente, mas é impedido por um tiro de Reisa. Mirai revela sua verdadeira identidade e chama seus comparsas. Enquanto a plateia assiste, achando que é o ato final do show, começa a batalha decisiva entre o grupo de vigilantes, o Grupo do Capacete e o Clube de Pseudociência liderado por Mirai!"
2892796202 = "Final"
2443811802 = "Suzumi encurrala Mirai, que fugiu até a praça. Revelando seu passado de não ter se adaptado ao Comitê de Realização da Justiça e autodepreciando-se como \"igual a uma delinquente\", Suzumi declara sua própria justiça: \"É o suficiente apenas poder proteger alguém\". No final, com a cooperação de suas aliadas, ela captura Mirai e o incidente chega ao fim."
1899721295 = "Como você está?"
2828168073 = "Após o incidente, as façanhas das garotas mágicas foram noticiadas, e Suzumi e as outras duas se tornaram grandes amigas. Durante uma patrulha, Suzumi encontrou Love e seu grupo voltando de um churrasco e aproveitou para agradecer novamente pela cooperação. O clima era amigável, mas ao ver que a lata vazia que Love jogou errou a lixeira, Suzumi a repreendeu para que a pegasse e jogasse no lixo. O clima de tensão voltou a reinar..."
1768186388 = "O futuro é brilhante"
163172869 = "Derrotada por Suzumi e seu grupo, Mirai caiu no lago do parque de diversões. Com a explosão, perdeu todas as suas mercadorias e, para piorar, até sua amada pulseira de germânio arrebentou. À beira do desespero, Mirai sentiu como se a pulseira tivesse se sacrificado em seu lugar; vendo isso como uma nova oportunidade de negócio, ela se levantou com determinação."
2099317968 = "O Blues do Esquadrão Capacete"
694429975 = "Love e seu grupo receberam a missão de prender um vendedor ambulante no parque de diversões. No entanto, o Esquadrão Capacete, que deveria vir como reforço, foi atacado no caminho e não conseguiu entregar os ingressos. Love, usando sua astúcia, tentou invadir pelo zoológico, que estava temporariamente fechado, mas acabou caindo dentro do recinto dos crocodilos. Os gritos de Love e seu grupo ecoaram diante dos crocodilos reais que os aguardavam."
4008169269 = "O nascimento de um vilão"
231764874 = "Na noite em que a missão de infiltração foi decidida, Shimiko passou a noite em claro na biblioteca estudando sobre garotas mágicas, preparando-se para interpretar a vilã 'Ela'. Ui, que testemunhou por acaso aquele comportamento fora do comum, tentou impedi-la por pura preocupação. No entanto, acabou desmaiando, intimidada pela atuação convincente de Shimiko, que já vestia seu traje feito à mão."
3079877914 = "O incidente foi resolvido, e cada uma retorna ao cotidiano carregando mudanças em seus corações."
4070451962 = "O plano falhou e Mirai foi jogada para longe, no lago. Mas o fracasso é apenas uma ponte para uma nova oportunidade de negócio."
2531513792 = "O Esquadrão Capacete e Love seguem com os preparativos para o evento no parque de diversões. O plano era infalível... ou deveria ser."
1456231187 = "Shimiko faz o seu melhor para interpretar uma vilã. Enquanto isso, um 'mago' a observa secretamente."
392103132 = "Renascimento Literário sob o Céu de Inverno ~Sobre o intercâmbio cultural saudável~"
716784848 = "O Departamento de Publicações, que aceitou a tarefa de distribuir livros da Frente de Libertação do Conhecimento, partiu rumo a Trinity para abrir novos canais de venda para livros que não estavam sendo vendidos em Red Winter."
3561465831 = "Sem risco, sem retorno."
455454674 = "Para exibir, para guardar e para divulgar"
2319141675 = "Cuide bem dos livros"
107272528 = "Declaração de Imposto de Renda"
821735451 = "Operações Secretas"
79574849 = "A Princesa do País do Inverno"
1749892251 = "Um lugar vazio"
856774448 = "Uma última chance"
715814693 = "Guerra das Bibliotecas"
3920895348 = "Nada é para sempre"
3271972537 = "Sem risco, sem retorno."
774262240 = "A Frente de Libertação do Conhecimento acabou desmoronando devido às obras na cantina. O Departamento de Publicações estendeu a mão, aceitando a distribuição dos livros e partindo para Trinity para abrir novos canais de venda em nome da Frente."
3895910746 = "Para exibir, para guardar e para divulgar"
3706272456 = "Os livros da Frente de Libertação do Conhecimento eram um pouco estimulantes demais para as jovens damas de Trinity. Recomendou-se que as garotas, fascinadas pelas histórias, comprassem três exemplares: um para exibir, um para guardar e um para divulgar, espalhando a palavra boca a boca. Assim, seus livros começaram a se espalhar silenciosamente por Trinity. O boato acabou chegando aos ouvidos de Nagisa, do Tea Party."
51224899 = "Cuide bem dos livros"
791447976 = "Nagisa, julgando que os livros distribuídos pelo Departamento de Publicações incitavam implicitamente comportamentos desviantes, solicitou que o Sensei e Shimiko, do Comitê da Biblioteca, investigassem a situação."
404086332 = "Declaração de Imposto de Renda"
744362128 = "O Departamento de Publicações e a Frente de Libertação do Conhecimento ficaram surpresos com o valor das vendas do primeiro dia. Enquanto se preparavam com entusiasmo para as vendas do dia seguinte, o Sensei e Shimiko se juntaram a Mashiro, do Comitê de Justiça, para iniciar a investigação."
1429154297 = "Operações Secretas"
1460894748 = "No dia seguinte, quando as duas do Departamento de Publicações começaram a distribuição como de costume, foram abordadas por alunas de Trinity. Parece que se tornaram alvo de investigação do Comitê de Justiça. Encontrando meios de contornar a vigilância delas, o Departamento de Publicações realizou uma feira secreta."
2274946455 = "A Princesa do País do Inverno"
403795676 = "Enquanto a feira era um sucesso, o Departamento de Publicações se preocupava em ter que preparar novos materiais. Recebendo propostas de continuação das alunas que compraram os livros, elas fizeram pedidos a Meru para garantir as sequências. Enquanto isso, o grupo do Sensei enfrentava dificuldades na investigação."
2346952575 = "Um lugar vazio"
3617300838 = "Com a rede de cerco do Comitê de Justiça se fechando, o Departamento de Publicações tinha dificuldades em encontrar um local para a distribuição. As duas acabaram chegando à biblioteca antiga de Trinity... Sem saída, Takane entrou em contato com o Sensei."
2347443494 = "Uma última chance"
2918157071 = "O Sensei foi chamado por Takane e seu grupo e foi até a biblioteca antiga. Após ouvir o que tinham a dizer, propôs uma forma de encerrar o caso. No entanto, já era tarde demais; o Comitê de Justiça chegou à biblioteca antiga."
3039664793 = "Guerra das Bibliotecas"
1767269131 = "Reunidos na biblioteca antiga, todos apontaram suas armas para cumprir seus respectivos papéis."
2905181237 = "Nada é para sempre"
1627424892 = "Graças à mediação do Sensei, um acordo de intercâmbio cultural foi firmado entre Red Winter e Trinity, e o Departamento de Publicações não sofreu punições."
2624700207 = "O Caminho do Shinobi ~Missão de proteção no desfile de moda!~"
3713943962 = "Tsukuyo acabou estreando como modelo de moda por um acaso inesperado. Por causa disso, as atividades do Clube de Pesquisa Ninjutsu foram negligenciadas, e o clima no clube começou a mudar aos poucos..."
3172711259 = "Lámen e conspiração"
3848243629 = "Uma oferta irrecusável"
1476247912 = "As condições da missão"
4096020609 = "O encontro com o talento"
3487180964 = "Ninja e Ladrão (1)"
3618731672 = "Ninja e Ladrão (2)"
378523317 = "O Desabrochar"
3671787043 = "Fama Crescente"
