2744967608 = "Sob o mesmo céu (2)"
2273210620 = "Festival da Sombra da Lua"
1432978810 = "Preparativos para o festival"
3381388658 = "Convidado para o festival tradicional 'Festival da Sombra da Lua', o Sensei visita Shanhaijing e reencontra Mina e Kisaki. Ignorando a preocupação das alunas com a atmosfera inquieta recente, Kisaki demonstra sua determinação em realizar o festival como de costume."
2580264648 = "Incidente"
3308870116 = "No local de preparação do Festival da Sombra da Lua, agitado pelo caso do departamento de ópera, ocorre um fenômeno misterioso onde as alunas, principalmente membros da Associação Genbu, tornam-se crianças. Simultaneamente a esse 'fenômeno de rejuvenescimento', rumores sobre 'Kaya Sarutani', cujos registros deveriam ter sido apagados, espalham-se por toda Shanhaijing."
340163993 = "Rumores"
1199490648 = "Os rumores sobre Kai Shinatani e o fenômeno de rejuvenescimento continuam a se espalhar e parecem impossíveis de conter. Julgando que uma resolução rápida para o problema seria difícil, Kisaki toma a decisão de limitar a realização do Festival do Luar. Enquanto isso, o Sensei também entra em contato com Shun para coletar informações. Percebendo a situação, ela aparece diante de Kisaki e do Sensei na forma de 'Xuelin'."
346243017 = "Adultos e crianças, crianças, crianças."
1439490319 = "Por sugestão de Shun, Kisaki e os outros começam a coletar informações por toda Shanhaijing disfarçados de alunos da Academia Baika. Ao conversar com Rumi, que foi afetada pelo fenômeno de rejuvenescimento na Academia Baika, eles percebem que o alvo do inimigo é o Clube de Pesquisa de Alquimia, onde a presidente, Saya, está ausente."
3259478954 = "A fronteira entre o passado e o presente (1)"
1087028543 = "Aproveitando a ausência de Saya, Kai Shinatani retorna ao Clube de Pesquisa de Alquimia e segue para o laboratório escondido. Enquanto isso, embora Reijo e Mina tenham corrido para lá sob as ordens de Kisaki após detectarem o ataque, mercenários do mercado negro estavam à espera..."
3790867855 = "A fronteira entre o passado e o presente (2)"
3280896799 = "Tendo assumido o controle do Clube de Pesquisa de Alquimia, Kai Shinatani rapidamente criou o 'Elixir'. Ao consumi-lo imediatamente, Kai ri de forma suspeita enquanto sente uma vitalidade transbordando por todo o seu corpo."
796406391 = "O cruzamento com o seu mundo (1)"
1029900945 = "Reijo e Mina lutam contra o número excessivo de inimigos, mas são salvas de uma situação crítica por Kisaki, que chega acompanhada pelos membros da Xuanlongmen. No entanto, desta vez, Kai Shinatani bloqueia o caminho do grupo."
696443017 = "O cruzamento com o seu mundo (2)"
1392877054 = "Diante do poder de Kai Shinatani, fortalecido pelo Elixir, o grupo é forçado a recuar. Como se quisesse piorar a situação de uma Kisaki enfraquecida, Kai incita a ansiedade entre os membros da Xuanlongmen e os alunos de Shanhaijing. Embora o pior tenha sido evitado graças à perspicácia do Sensei, a situação era desfavorável e Kisaki e os outros foram forçados a fugir."
3263544419 = "Nós em um futuro distante"
1073117875 = "Embora tenha derrotado Kisaki, Kai Shinatani, sem interesse nos assuntos internos da Xuanlongmen, começou a focar seus esforços na pesquisa do Elixir. Enquanto isso, na Xuanlongmen, a facção radical ganha força e tenta nomear Kaguya, a chefe do Clube de Ópera de Pequim, como líder interina no lugar de Kisaki. Embora Kaguya recuse o cargo ao ser abordada, ela promete cooperar para resolver o problema imediato, enquanto pensa em Kisaki, que carregava sozinha a responsabilidade de ser a líder."
3966918864 = "Se eu for até lá, será que encontrarei o Qilin?"
2951348541 = "O Sensei conversa com Kisaki, que estava abrigada na Associação Comercial Xuanwu, sobre eventos passados e suas verdadeiras intenções. Durante a conversa, Kisaki encontra o que deve fazer e declara que o Festival do Luar será realizado a todo custo. Nesse momento, membros moderados da Xuanlongmen aparecem e juram lealdade a ela mais uma vez."
2498708804 = "Mesmo que tenhamos seguido caminhos diferentes várias vezes (1)"
700229668 = "Kaguya encontra Kisaki novamente enquanto ela tenta retornar à Xuanlongmen. Ao trocarem opiniões sobre as tradições que devem ser protegidas, Kaguya entende que as palavras de Kisaki são racionais e deseja que ela prove sua retidão derrotando-a, para que assim a ordem e a tradição sejam restauradas em Shanhaijing."
2594409892 = "Mesmo que tenhamos seguido caminhos diferentes várias vezes (2)"
2075309196 = "Após derrotar Kaguya, Kisaki ordena que seus subordinados retomem o Liuhage e, ao mesmo tempo, segue para a masmorra subterrânea acompanhada de Mina."
2475868789 = "Todos os problemas (1)"
2762014940 = "Para libertar Saya antes de desafiar o Clube de Pesquisa de Alquimia, Kisaki e os outros seguem para a masmorra subterrânea. No entanto, o carcereiro se recusa a libertar Saya devido às exigências de Kai Shinatani e ao medo de que o fornecimento do remédio que previne o fenômeno de rejuvenescimento seja interrompido. Diante disso, Kisaki declara que assumirá toda a responsabilidade e tenta forçar a libertação."
1430381554 = "Todos os problemas (2)"
3646071198 = "Tendo libertado Saya com sucesso, Kisaki leva seus aliados em direção ao Clube de Pesquisa de Alquimia. Ao notar a preocupação de Saya com sua saúde, Kisaki exibe um sorriso enigmático."
4179327947 = "Sob o mesmo céu (1)"
758416301 = "Kisaki confronta Kai Shinatani mais uma vez. Durante a troca de palavras, Kisaki aponta que, para Kai, que continua empurrando a responsabilidade para os outros, tudo o que aconteceu, incluindo seu exílio anterior, foi merecido. Enquanto Kai continua a provocá-la com raiva, Kisaki a desafia para uma luta novamente como líder da Xuanlongmen."
1290862584 = "Sob o mesmo céu (2)"
1184003556 = "O fenômeno de rejuvenescimento que ela mesma causou acaba se voltando contra ela, e Kai é derrotada por Kisaki. Embora critique a atitude de Kisaki, Kai, satisfeita com a resposta dada à pergunta que fez ao Sensei, aceita de bom grado a resolução do fenômeno de rejuvenescimento e seu reencarceramento no Departamento Correcional."
3621474916 = "Festival do Luar"
68319105 = "O fenômeno de rejuvenescimento foi resolvido com sucesso e o Festival do Luar será realizado conforme planejado, da mesma forma que nos anos anteriores. Junto com Reijo, Kisaki, que entra em contato repetidamente, e os alunos que riem alegremente, o Sensei aproveita o Festival do Luar ao máximo."
1404411654 = "Serenade Promenade"
4191564136 = "Sakurako e Mine tentam melhorar a imagem da Sisterhood e da Equipe de Resgate participando do 'Concurso de Ídolos' realizado no Carnaval da Trinity. No entanto, devido à falta de conhecimento sobre ídolos, as duas pedem ajuda a Mari. Para atender às expectativas das duas, Mari estuda sobre ídolos junto com o Sensei, mas...?"
