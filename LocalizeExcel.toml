1871409035 = "O posto de controle de Wild Hunt é rigoroso e cheio de regras misteriosas. Procedimentos complexos e as alunas que tentam passar por eles — a crônica de seus esforços está aqui!"
43782077 = "Mas a Equipe de Supervisão do Dormitório continua correndo"
4116607872 = "O posto de controle de Wild Hunt é rigoroso e cheio de regras misteriosas. Procedimentos complexos e as alunas que tentam driblá-los — a crônica de suas lutas começa aqui!"
2831059803 = "Mas a Equipe de Supervisão do Dormitório continua correndo (1)"
3111366627 = "Mas a Equipe de Supervisão do Dormitório continua correndo (2)"
3367899973 = "O Fim da Era Manual"
1481320390 = "A Academia Federal Red Winter acaba decidindo construir um supercomputador por acaso. Como será que elas vão fazer isso?"
1353737107 = "O Fim da Era Manual"
362320094 = "A Academia Federal Red Winter acaba decidindo construir um supercomputador por acaso. Como será que elas vão fazer isso?"
565421452 = "O Fim da Era Manual (1)"
1397289454 = "O Fim da Era Manual (2)"
59980314 = "A Melancolia de Misuzu Kamihara"
1481260199 = "Mesmo após a fuga dos Sete Prisioneiros, o cotidiano do Departamento Correcional de Valkyrie continua o mesmo. Cercada por alunas problemáticas, como será que a diretora do departamento, Misuzu, passa o seu dia?"
3396691709 = "A Melancolia de Misuzu Kamihara"
3863919003 = "Mesmo após a fuga dos Sete Prisioneiros, o cotidiano do Departamento Correcional de Valkyrie continua o mesmo. Cercada por alunas problemáticas, como será que a diretora do departamento, Misuzu, passa o seu dia?"
589244848 = "A Melancolia de Misuzu Kamihara (1)"
2929286962 = "A Melancolia de Misuzu Kamihara (2)"
1190451628 = "Prólogo"
1058709048 = "Ao acordar de um sonho estranho, o professor [USERNAME] é informado por Rin Nanagami, executiva do Conselho Estudantil Federal, que a presidente do conselho desapareceu. Devido ao seu desaparecimento, a cidade acadêmica de Kivotos está envolta em caos. Para resolver essa confusão, o professor [USERNAME] segue com os membros do conselho para a sala do Schale."
2669596529 = "Prólogo"
1471825002 = "Sob o comando do professor [USERNAME], as alunas avançam em direção à sala do Schale enquanto enfrentam batalhas."
89362963 = "Prólogo"
1661247484 = "Rin descobre que a líder dos tumultos é uma aluna chamada Wakamo, da Academia Hyakkiyako, e alerta o professor [USERNAME] de que ela é uma aluna perigosa que fugiu do Departamento Correcional."
737161669 = "Prólogo"
1938490976 = "Ao chegarem em frente ao prédio onde fica a sala do Schale, um tanque de cruzeiro aparece repentinamente diante do grupo."
2421559898 = "Prólogo"
516426802 = "Enquanto o professor [USERNAME] e as alunas lutam contra o tanque, Wakamo invade o prédio onde fica a sala do Schale..."
369258066 = "Prólogo"
1897585705 = "Wakamo, que encontrou o professor [USERNAME] no subsolo do prédio, acaba fugindo com o rosto completamente vermelho por algum motivo. Rin, que chega logo depois, entrega ao professor [USERNAME] a \"Caixa de Shittim\" deixada pela presidente do Conselho Estudantil Federal."
3240627074 = "Prólogo"
3773339621 = "O grupo encontra Wakamo, a líder dos tumultos."
1964993858 = "Prólogo"
4155740391 = "Embora Wakamo tenha fugido repentinamente durante a batalha, o grupo desiste de persegui-la e continua em direção ao interior do prédio do Schale para retomar a sala."
2720876549 = "Prólogo"
536907202 = "Ao ativar a Caixa de Shittim, uma garota chamada Arona aparece e, com a ajuda dela, o controle da Torre Sanctum é recuperado com sucesso. Depois disso, Rin mostra a sala do Schale e o professor começa seu trabalho como o professor do \"Departamento de Investigação Federal Schale\"."
4199086753 = "Bem-vindos ao Comitê de Contramedidas!"
3167291451 = "A carta enviada pela Escola Secundária Abydos dizia que as alunas estavam sendo encurraladas por organizações criminosas locais. O professor [USERNAME] foi até o distrito autônomo de Abydos para ajudá-las, mas acabou se perdendo e ficando desamparado logo após chegar."
3987177942 = "Primeiro dia em Abydos"
3646064857 = "O professor [USERNAME] é salvo por Shiroko, que passava pelo local, e chega à sala do Comitê de Contramedidas de Fechamento da Escola Secundária Abydos. No entanto, ao mesmo tempo, o Grupo Capacete-Katakata ataca a escola. Ele colabora com as alunas para expulsá-los."
4043312483 = "Primeiro dia em Abydos"
1202784751 = "As alunas de Abydos conseguem expulsar o Grupo Capacete com sucesso sob o comando do professor [USERNAME] e retornam para a sala do comitê."
3989313715 = "O poder dos adultos é incrível!"
1608590402 = "Após expulsar o Grupo Capacete e retornar à sala, as alunas do Comitê de Contramedidas se apresentam ao professor [USERNAME]. Elas ficam felizes com a ajuda do professor e sugerem aproveitar o momento para destruir a base avançada do Grupo Capacete-Katakata."
3407235728 = "O poder dos adultos é incrível!"
1856373448 = "O professor [USERNAME] e as alunas do Comitê de Contramedidas conseguem destruir a base avançada do Grupo Capacete-Katakata com sucesso e retornam para a escola em clima de vitória."
3961742797 = "As circunstâncias do comitê"
2472112227 = "A partir da conversa com as alunas que retornaram à sala, ele descobre que a dívida da Escola Secundária Abydos ultrapassa 900 milhões de ienes e que, apenas com o esforço delas, é impossível pagar nem mesmo os juros. O professor [USERNAME] tenta ajudar atendendo ao desejo das alunas, mas Serika sai correndo da sala dizendo: \"Não consigo mais confiar em adultos!\""
3061964608 = "O dia comum de Serika"
3427145251 = "O grupo segue Serika e chega à loja de lámen onde ela trabalha. Eles passam um tempo divertido comendo lámen, mas Serika continua irredutível. No caminho de volta do trabalho, Serika é levada pelo Grupo Capacete."
36405547 = "Operação de Resgate!"
426352076 = "Após se separarem na loja de lámen, o grupo percebe que não consegue entrar em contato com Serika. O professor [USERNAME], usando a autoridade do Schale, localiza o dispositivo de Serika e parte para resgatá-la."
2287819315 = "Uma nova ameaça?"
2766662048 = "O grupo resgatou Serika das mãos do Esquadrão Capacete com sucesso. Após a batalha, Ayane descobre vestígios nos destroços do tanque usado pelo Esquadrão Capacete que confirmam o envolvimento de outra facção. Ao mesmo tempo, o diretor da Kaiser PMC, desapontado com as falhas repetidas do Esquadrão Capacete, decide contratar a 'Problem Solver 68' para substituí-los..."
3902676392 = "A Problem Solver chega!"
4083213547 = "Dia de reunião regular do Comitê de Contramedidas. As alunas quebram a cabeça tentando encontrar uma forma de pagar a dívida de 900 milhões de ienes, mas não conseguem pensar em nada. Ao terminarem a reunião e irem comer lámen, encontram os membros da Problem Solver, que também estão sofrendo por falta de dinheiro."
2584215733 = "Batalha sangrenta de ingratos"
766257118 = "Após se despedirem do Comitê de Contramedidas, com quem se deram bem, Aru finalmente percebe que as pessoas que encontrou eram alunas da Escola Secundária Abydos. Embora tenha ficado tomada pela culpa por um tempo, ela recupera a compostura, mobiliza mercenários contratados e ataca a Escola Secundária Abydos."
1534182665 = "Batalha sangrenta de ingratos"
1089217150 = "As alunas do Comitê de Contramedidas repeliram a Problem Solver, que acabou recuando junto com os mercenários contratados."
2309291572 = "Em busca de pistas"
3874145345 = "Analisando as informações coletadas na batalha anterior, elas descobrem que os funcionários da 'Problem Solver 68' são alunas de Gehenna e que as armas usadas pelo Esquadrão Capacete vieram do 'Mercado Negro'. Em busca de mais pistas, o grupo segue para o Mercado Negro."
1625249857 = "Para o Mercado Negro (1)"
3011986499 = "Ao chegar ao Mercado Negro, o Comitê de Contramedidas encontra Hifumi, uma aluna da Academia Trinity. Hifumi estava lá procurando por produtos limitados do Peroro, mas estava fugindo após ser importunada por valentões. O Comitê de Contramedidas intervém e entra em conflito com os valentões."
2005605206 = "Para o Mercado Negro (1)"
2107918611 = "Após afugentarem os valentões, Hifumi e o Comitê de Contramedidas decidem sair do local antes que a confusão aumente."
67492089 = "Para o Mercado Negro (2)"
2585148003 = "Como agradecimento por tê-la salvo dos valentões, o Comitê de Contramedidas pede a Hifumi que os guie pelo Mercado Negro, acompanhando-a por um tempo. Enquanto isso, Aru, a presidente da Problem Solver 68, busca formas de levantar fundos para compensar as falhas nas batalhas anteriores."
4187141271 = "Em ação! Esquadrão de Biquíni Mascarado (1)"
847788836 = "Enquanto exploravam o Mercado Negro, o Comitê de Contramedidas testemunha por acaso o dinheiro que elas usaram para pagar a dívida sendo enviado para um banco clandestino. Percebendo que o dinheiro que tanto se esforçaram para pagar estava sendo usado para fins ilegais, as alunas sentem indignação e decidem assaltar o banco."
2540582765 = "Em ação! Esquadrão de Biquíni Mascarado (2)"
2791958937 = "Diante de Aru, que esperava pela análise de empréstimo no banco clandestino, surgem as alunas do Comitê de Contramedidas usando máscaras (?). Ao vê-las fugindo com o dinheiro e sendo perseguidas pelos guardas do Mercado Negro, Aru olha para elas com admiração, vendo a verdadeira postura de vilãs que elas exibiam."
2605391019 = "Vamos, em direção ao pôr do sol!"
1843801151 = "O Comitê de Contramedidas consegue despistar os guardas do Mercado Negro e escapar em segurança. Após hesitarem por um momento ao ver a enorme quantia em dinheiro, elas aceitam a persuasão de Hoshino e decidem fugir levando apenas alguns documentos necessários. Quem passa pelo local onde elas deixaram os maços de dinheiro é Aru e o restante da Problem Solver."
2080293366 = "A verdade revelada"
2873970964 = "Através dos documentos do banco clandestino, o Comitê de Contramedidas descobre que o mentor de tudo era a supercorporação 'Kaiser Corporation'. Diante de um mal social tão vasto e poderoso que cerca a escola, as alunas ficam chocadas e decidem se dispersar por aquele dia."
1849712170 = "Nuvens carregadas"
2479276074 = "Aru continua se sentindo culpada por atacar a Escola Secundária Abydos usando o dinheiro que o Comitê de Contramedidas deixou para trás. Para animar Aru, que está desanimada, todo o grupo da Problem Solver decide ir ao Lámen Shibaseki. Por trás disso, um homem suspeito de terno preto aparece diante de Hoshino com uma proposta."
3652595243 = "Nós não somos amigas!"
3597989428 = "Enquanto comiam lámen no Shibaseki, Aru recebe um incentivo caloroso do dono, mas, incapaz de suportar a culpa, acaba gritando e reagindo de forma agressiva. No entanto, Haruka entende mal as palavras de Aru e ativa uma bomba que havia instalado na loja, fazendo o Lámen Shibaseki desaparecer sem deixar rastros."
1822218538 = "Eu não vou perdoar vocês!"
2950249706 = "Aru acaba cometendo um ato terrível contra a própria vontade. As alunas do Comitê de Contramedidas, sem como saber dos verdadeiros sentimentos dela, a condenam. No fim, Aru decide manter a fachada de vilã e se coloca no caminho do Comitê de Contramedidas."
2392026169 = "Eu não vou perdoar vocês!"
647272427 = "Quando o conflito entre a Problem Solver e o Comitê de Contramedidas atinge seu ápice, um bombardeio surge repentinamente à distância. Ayane diz que os responsáveis são o Comitê Disciplinar da Academia Gehenna."
4008077676 = "Comitê Disciplinar, em combate!"
1530869328 = "O Comitê Disciplinar de Gehenna anuncia que veio capturar a Problem Solver, um grupo de alunas problemáticas. O Comitê de Contramedidas hesita sobre como reagir, mas decide resistir, alegando que a atuação de um comitê disciplinar de outra escola dentro da zona autônoma da Escola Secundária Abydos é um abuso de autoridade."
906157151 = "Comitê Disciplinar, em combate!"
684749186 = "Ao contrário de sua vantagem numérica, o Comitê Disciplinar de Gehenna é derrotado pelas alunas do Comitê de Contramedidas, lideradas pelo professor [USERNAME]. Logo depois, Ako, uma oficial administrativa do Comitê Disciplinar de Gehenna, aparece para mediar a situação. No entanto, por trás disso, Haruka está tramando algo..."
4085844327 = "Aliança inesperada"
2776982583 = "O diálogo com Ako, a oficial administrativa do Comitê Disciplinar, não vai bem e, no fim, o Comitê de Contramedidas acaba se tornando inimigo deles. Com o aumento das forças do Comitê Disciplinar, o grupo decide cooperar com a Problem Solver 68 para tentar resistir."
1339565549 = "Aliança inesperada"
1377434222 = "Mesmo superando a batalha difícil, o Comitê Disciplinar não mostra sinais de recuo. Quando parecia que tudo estava perdido com a chegada de reforços, Hina, a presidente do Comitê Disciplinar, aparece e exige uma explicação de Ako sobre a situação."
1471802853 = "A presidente do Comitê Disciplinar de Gehenna"
2688547338 = "Ao entender a situação sobre a operação arbitrária das tropas por parte de Ako, Hina se curva honestamente diante do Comitê de Contramedidas. Antes de retornar a Gehenna, Hina deixa uma informação para o professor: 'A Kaiser Corporation está tramando algo no Deserto de Abydos'."
4195603251 = "Adeus, Problem Solver 68"
1030591484 = "O professor se despede do grupo da Problem Solver, que precisa deixar Abydos. Depois, ao visitar o dono do Shibaseki no hospital junto com Ayane e Serika, eles ouvem o fato chocante de que a propriedade do prédio da loja de lámen havia sido transferida para a Kaiser Corporation."
3139483916 = "Histórias individuais (1)"
839043873 = "Reunidas novamente na sala de aula, o Comitê de Contramedidas organiza a situação. Ayane e Serika, que investigaram as informações sobre as terras, informam a todas que a maior parte da zona autônoma de Abydos tornou-se propriedade da Kaiser Corporation."
2927878713 = "Histórias individuais (2)"
409405033 = "O Comitê de Contramedidas ouve histórias do passado de Hoshino. Com base nisso, elas deduzem que o antigo conselho estudantil de Abydos, que não existe mais, tentou pagar a dívida e acabou perdendo até as terras para a Kaiser Corporation. O professor, preocupado com a informação que ouviu de Hina, sugere que vão ao Deserto de Abydos."
442327204 = "Para o Deserto de Abydos (1)"
2058754230 = "O Comitê de Contramedidas, fazendo várias suposições, segue cautelosamente em direção ao Deserto de Abydos."
3802560582 = "Para o Deserto de Abydos (2)"
2697565317 = "O Comitê de Contramedidas chega ao deserto abandonado. Ao ver a cena, Hoshino fala sobre o passado de Abydos."
573312762 = "Para o Deserto de Abydos (3)"
198870950 = "O Comitê de Contramedidas descobre uma instalação gigantesca construída no meio do deserto de Abydos. Eles acabam encontrando inimigos desconhecidos que protegem o local."
1399589399 = "Kaiser PMC (1)"
884616625 = "A identidade dos inimigos encontrados era a Kaiser PMC. As forças da PMC começam a se reunir para cercar o Comitê de Contramedidas."
852645695 = "Kaiser PMC (2)"
2382351824 = "O diretor da Kaiser Corporation aparece diante do Comitê de Contramedidas e revela que ele é quem detém a dívida de Abydos."
3249776532 = "Batalha Perdida"
2043848879 = "O diretor da Kaiser Corporation afirma que 'comprou as terras de Abydos para procurar tesouros enterrados em algum lugar', ao que o Comitê de Contramedidas rebate chamando isso de absurdo. Nesse momento, a dívida é subitamente aumentada, deixando o grupo furioso, mas Hoshino os aconselha de que não adianta mais discutir, e eles decidem recuar por enquanto."
1186755748 = "Alguns Segredos"
1335785770 = "Após mandar todos do Comitê de Contramedidas, exceto Hoshino, para casa, Hoshino revela ao Sensei a proposta que recebeu anteriormente de Kurokawa. O Sensei diz a Hoshino que 'encontrará um jeito', mas no dia seguinte, Hoshino desaparece, deixando para trás um pedido de desligamento do clube."
3736543421 = "O que Escapou pelas Mãos"
283862884 = "Ao se tornar uma mercenária da PMC, a dívida da escola Abydos poderia ser reduzida drasticamente. Era o que estava escrito na carta de Hoshino. Enquanto o grupo está confuso com o conteúdo da carta, soldados da PMC começam a se reunir para ocupar a escola Abydos..."
3093070589 = "Batalha Defensiva de Abydos (1)"
310065573 = "Hoshino confronta Kurokawa, dizendo que o acordo era diferente, mas Kurokawa a prende, revelando que o alvo desde o início era ela. Ao mesmo tempo, o Comitê de Contramedidas de Abydos está encurralado e em uma situação desesperadora. É então que aparece a Problem Solver 68, que deveria ter deixado Abydos."
3717760490 = "Batalha Defensiva de Abydos (2)"
91688092 = "O diretor da Kaiser Corporation fica indignado com a situação inesperada. Sob o comando do Sensei, o Comitê de Contramedidas enfrenta a PMC junto com a Problem Solver."
1667111875 = "Batalha Defensiva de Abydos (2)"
2023302413 = "Após uma batalha intensa, eles conseguem forçar a retirada dos soldados da PMC. Para encontrar uma maneira de trazer Hoshino de volta, o Sensei vai até Kurokawa."
4255678286 = "Batalha de Adultos"
477790762 = "Kurokawa propõe que, se entregarem Hoshino, ele dará um jeito na sobrevivência da escola Abydos, mas a negociação fracassa. O Sensei [USERNAME] decide elaborar um plano para resgatar Hoshino."
3792141633 = "O que Quero Proteger"
2496658941 = "O Sensei busca ajuda e visita o Colégio Gehenna e o Colégio Trinity. Quase ao mesmo tempo, o pessoal da Problem Solver, que comia ramen na barraca do Chefe Shiba após reabrirem o negócio, decide (novamente?) ajudar o Comitê de Contramedidas."
488859086 = "O que Quero Proteger"
4228298238 = "Quem bloqueia o caminho dos reforços da Kaiser PMC são Hina e as Prefeitas de Gehenna. Para ajudar o Comitê de Contramedidas de Abydos, elas interceptam a PMC."
1752199803 = "O que Ainda Assim Não Desisti (1)"
2389071401 = "Enquanto o Comitê de Contramedidas enfrentava as forças inimigas, chega o apoio de tiro de Hifumi e das alunas do Colégio Trinity. Aproveitando a confusão, o Comitê de Contramedidas rompe as linhas inimigas."
2315302090 = "O que Ainda Assim Não Desisti (1)"
2958239043 = "O Comitê de Contramedidas chega ao antigo prédio principal da escola Abydos. O diretor da Kaiser Corporation e os soldados da PMC bloqueiam o caminho, mas a Problem Solver 68, que chegou atrasada, assume o confronto."
465533926 = "O que Ainda Assim Não Desisti (2)"
3049385587 = "Eles localizam a posição de Hoshino, mas o diretor da Kaiser Corporation bloqueia o caminho novamente. Mesmo assim, para resgatar Hoshino, o Comitê de Contramedidas avança."
3889357593 = "O que Ainda Assim Não Desisti (2)"
4091157200 = "Após uma longa batalha, o Comitê de Contramedidas consegue resgatar Hoshino com sucesso. Para todos que dizem 'Bem-vinda de volta', Hoshino responde com um sorriso: 'Estou de volta'."
460663098 = "Epílogo"
1819455677 = "A série de eventos chega ao fim, e o Sensei [USERNAME] recebe uma carta de Ayane. Nela, ela expressa gratidão, dizendo que, embora não tenham conseguido pagar a dívida completamente, a situação melhorou um pouco e, graças ao Sensei, o cotidiano do Comitê de Contramedidas pôde ser preservado."
451759275 = "Prólogo"
1467700440 = "Nas profundezas do subsolo, o ex-Gematria, despertado por Francis, começa a agir. Enquanto isso, o Grupo Kaiser coloca as dívidas da escola Abydos à venda, e o Comitê de Contramedidas tenta comprá-las, mas elas se esgotam. Ao investigar quem comprou as dívidas de Abydos, eles descobrem o nome do Grupo Nephthys."
2836028392 = "Visitante Indesejado"
2468775960 = "O Comitê de Contramedidas obtém uma informação: a Nephthys Company comprou as dívidas da Kaiser para obter todos os direitos da Ferrovia Trans-Deserto de Abydos. Enquanto se perguntavam por que eles compraram os direitos da ferrovia, um visitante indesejado aparece."
2578507434 = "Colégio Ferroviário Highlander (1)"
792808784 = "Quem atacou o distrito autônomo de Abydos foram Nozomi e Hikari, executivas do CCC do Colégio Ferroviário Highlander. Para impedi-las de forçar o desenvolvimento da Ferrovia Trans-Deserto, o Comitê de Contramedidas entra em ação."
2748777627 = "Colégio Ferroviário Highlander (2)"
171315427 = "O Comitê de Contramedidas e o Sensei impedem o ataque do Colégio Ferroviário Highlander. Então, aparece Suou, a supervisora do Colégio Ferroviário Highlander. Suou deixa o local junto com Nozomi e Hikari, prometendo explicar a situação mais tarde."
809304558 = "Aqueles que Flutuam"
2228531499 = "Voltando um pouco no tempo... Nonomi, após se formar no ensino fundamental, estava em dúvida sobre ingressar no Colégio Ferroviário Highlander como planejado. Enquanto isso, na atual escola Abydos, o Comitê de Contramedidas verificava informações sobre o Colégio Ferroviário Highlander. Nesse momento, Suou e as outras aparecem novamente."
2066588167 = "Ferrovia Trans-Deserto"
3245151085 = "O grupo do Colégio Ferroviário Highlander visita a sala do Comitê de Contramedidas junto com os credores. O representante do grupo de credores retira um contrato assinado por Yume para explicar o objetivo deles."
4109224623 = "Contrato"
206294631 = "O motivo da visita do grupo de credores era questionar a viabilidade de um contrato referente aos direitos de operação das instalações anexas pertencentes ao conselho estudantil de Abydos. Ao pedido de tempo para pensar do Sensei, o grupo de credores responde que a decisão deve ser tomada em 2 dias, quando a validade do contrato expira, e deixa o local. Hoshino fala sobre eventos passados para decidir o curso de ação futuro. Lá, eles descobrem o fato de que a data no contrato é a mesma data em que Yume desapareceu."
3326988594 = "Limites do corpo"
2464018339 = "Hoshino visita a cidade onde conheceu Yume pela primeira vez. Shiroko a segue, mas acaba perdendo-a de vista. Nonomi entra em contato com o mordomo para investigar a situação, mas ele desconversa, alegando que é para o bem da Nephthys. Ayane sente que algo está errado com a situação atual, mas, considerando o cansaço de todas, decide adiar a investigação. Enquanto isso, nas profundezas do subsolo, o Habitante do Subsolo começa a colocar seus planos em ação..."
3791222139 = "Grêmio Estudantil de Abydos (1)"
4172510105 = "O Sensei cai em uma armadilha armada pelo Habitante do Subsolo. Enquanto isso, na cidade abandonada, Hoshino relembra o momento em que conheceu Yume."
2618425109 = "Grêmio Estudantil de Abydos (2)"
4214382824 = "Os membros do Comitê de Contramedidas, com exceção de Hoshino, decidem entrar na sala do Grêmio Estudantil para descobrir sobre o passado dela. No entanto, Hoshino aparece no local."
2384190148 = "Aquele dia"
3030051441 = "Hoshino começa a contar seu passado para seus companheiros do Comitê de Contramedidas. Ela revela que rasgou o pôster do Festival da Areia que Yume possuía e negou o futuro cheio de esperança que ela descrevia. Ela conta que Yume desapareceu após uma briga, sem que tivessem se reconciliado. Enquanto o passado de Hoshino é revelado, uma certa pessoa chega a Abydos."
3708666348 = "Segredos revelados"
3744933892 = "Quem visitou Abydos foi Suou, uma executiva da Nephthys. Então, o terrível segredo escondido na Ferrovia Trans-Deserto é revelado. Como forma de resolver o problema, a executiva da Nephthys propõe que Nonomi retorne à Highlander."
3567623092 = "O início do Comitê de Contramedidas"
508127969 = "Hoshino relembra vários momentos, como seu primeiro encontro com Shiroko e a chegada de Serika e Ayane à escola Abydos. O tempo retorna ao presente. O Comitê de Contramedidas decide ir ao antigo prédio administrativo, mas recebem a notícia de que o Sensei desmaiou."
2830502693 = "Refém"
3676288734 = "Nonomi tenta convencer o lado da Nephthys, mas acaba sendo feita de refém. A Nephthys ameaça o Comitê de Contramedidas, usando Nonomi para tentar anular o contrato. Hoshino tenta resolver o problema sozinha, mas Shiroko se coloca em seu caminho."
303369912 = "Comitê de Contramedidas"
2939285746 = "Hoshino domina Shiroko com uma diferença de poder esmagadora. Em seguida, Ayane e Serika enfrentam Hoshino."
76556335 = "Ordens da vice-presidente do grêmio"
3023125627 = "Após a derrota de Serika e Ayane, Hoshino, exercendo sua autoridade como vice-presidente do grêmio, ordena que elas cuidem do futuro de Abydos e parte sozinha para resgatar Nonomi."
3787477164 = "Contra-ataque"
2641772784 = "Suou informa ao fundo de investimento privado sobre a traição da Nephthys. Enquanto isso, o Sensei, que recuperou a consciência, aparece em Abydos. Ele aproveita a vaga de presidente do grêmio para nomear Ayane como presidente. Usando sua autoridade, Ayane declara as ações de Hoshino como inválidas e, junto com o Sensei, inicia o contra-ataque."
2386655349 = "Perseguição"
325048971 = "O Sensei e o Comitê de Contramedidas seguem para o antigo prédio administrativo para salvar Nonomi. Enquanto isso, Hoshino derrota rapidamente as forças do fundo de investimento e avança em direção ao prédio."
1133678474 = "Perseguição"
3426514234 = "Exibindo uma força avassaladora, Hoshino segue em frente. O Comitê de Contramedidas e o Sensei não desistem e continuam a persegui-la."
2385018294 = "Caos total"
410768358 = "A Kaiser PMC, que estava aliada à Nephthys, trai a organização para tentar roubar o canhão ferroviário. Hoshino inicia um combate contra a PMC, que bloqueava seu caminho para o antigo prédio administrativo."
2238279328 = "Caos total"
2445287877 = "Após derrotar o General, Hoshino segue novamente para o antigo prédio administrativo. Enquanto isso, o Sensei e o Comitê de Contramedidas ajudam os alunos da Highlander e continuam a busca por Hoshino."
3612354256 = "Assembleia dos credores"
276803654 = "Nonomi descobre a cooperação entre a Nephthys e a PMC e fica furiosa. Hoshino chega até ela e tenta libertá-la, mas Nonomi diz que vai abandonar Abydos. O Comitê de Contramedidas chega atrasado ao local. No entanto, o Presidente declara unilateralmente a anulação do contrato e vai embora."
3243553383 = "Assembleia dos credores"
160618110 = "Hoshino e o Comitê de Contramedidas conseguem resgatar Nonomi. Mas, mal tendo tempo para celebrar o reencontro, Hoshino, após confirmar que Nonomi está bem, deixa o local, deixando todos para trás."
1860528585 = "Caça ao tesouro"
3956099477 = "Suou e o Presidente da Kaiser estão a bordo de um helicóptero. No momento em que o Presidente celebra a vitória, Suou o empurra para fora do helicóptero. Suou diz a Hoshino que, se ela quiser parar o canhão ferroviário, deve ir ao Vale do Grêmio Estudantil. Enquanto isso, o Presidente, furioso por ter sido derrubado, ordena a convocação de todas as forças da Kaiser Corporation."
1239708147 = "Segunda perseguição"
984232866 = "Após ajudar o fundo de investimento, o grupo de Abydos e o Sensei buscam uma forma de chegar ao Vale do Grêmio Estudantil. A executiva da Nephthys e a Highlander CCC se unem para oferecer ajuda. Enquanto isso, Hoshino chega à estação de ramal onde costumava caçar tesouros com Yume e coloca o trem em movimento em direção ao Vale."
3256145921 = "Segunda perseguição"
2322627376 = "O Comitê de Contramedidas e o Sensei embarcam no trem de Nozomi e Hikari e são perseguidos pela Kaiser PMC."
517692600 = "Trem desgovernado"
598179026 = "Sob perseguição da Kaiser PMC, o Comitê de Contramedidas e o Sensei ouvem uma proposta de Nozomi e Hikari."
2087719702 = "Trem desgovernado"
754525061 = "Como planejado por Nozomi e Hikari, o trem colide. Depois disso, Hikari e Nozomi acabam sendo capturadas pela Kaiser PMC. O Comitê de Contramedidas e o Sensei conseguem avançar, chegam à estação de ramal e partem com o trem. Enquanto isso, Hoshino chega ao Vale do Grêmio Estudantil e descobre o segredo escondido na Ferrovia Trans-Deserto."
3408172578 = "Vale do Grêmio Estudantil"
638321793 = "Hoshino encontra o canhão ferroviário. Suou aparece diante dela, dizendo que, se ela quiser parar o canhão, deve derrotá-la, e retira o cartão de Nonomi. Aquele item era necessário para destruir o canhão."
768493918 = "Canhão Ferroviário Schemata"
2040799108 = "Hoshino consegue dominar Suou. No entanto, Suou não aceita a derrota e desafia Hoshino novamente. Os alunos de Abydos e o Sensei chegam ao Vale do Grêmio Estudantil. No momento em que encontram o canhão ferroviário, um disparo ecoa..."
1210234653 = "A batalha final (1)"
1002703607 = "Hoshino derrota Suou novamente. No momento em que ela se move para destruir o canhão ferroviário, os alunos de Abydos e o Sensei se colocam em seu caminho, iniciando um combate."
3797362856 = "A batalha final (2)"
3271869069 = "O Comitê de Contramedidas é derrotado na batalha contra Hoshino. Shiroko se levanta sozinha para enfrentar Hoshino mais uma vez."
1886723209 = "Uma disputa por um fio"
2759992648 = "Shiroko finalmente derrota Hoshino, e o Comitê de Contramedidas e o Sensei conseguem convencê-la. No entanto, o canhão ferroviário, que era o objetivo principal, acaba sendo roubado por Suou. Suou parte com o canhão ferroviário com a intenção de destruir Abydos. Hoshino deixa o local sozinha para persegui-la. Enquanto o desespero toma conta do Comitê de Contramedidas, o Sensei busca a ajuda de uma certa pessoa."
3121219489 = "Batalha Feroz (1)"
2950950386 = "A pessoa de quem o Sensei buscou ajuda... era Hina. Hoshino confronta Hina, que a esperava dentro da estação de ramificação."
3427914090 = "Batalha Feroz (2)"
2436668033 = "Hina e Hoshino colidem com força total. As consequências do combate atingem o trem que seguia em direção ao Grande Oásis."
3101230762 = "A existência do caderno"
3803574396 = "O trem, severamente danificado, finalmente chega ao seu destino. Sobre o trem em chamas, Hoshino relembra o passado com Yume."
3874918946 = "A única verdade (1)"
132408451 = "Hina revela a verdade sobre Yume para a derrotada Hoshino. Enquanto isso, com a cooperação de Nozomi e Hikari, o Sensei e o Comitê de Contramedidas alcançam o canhão ferroviário e iniciam um ataque."
1382356128 = "A única verdade (2)"
1456203716 = "Hoshino, em estado de choque, fica presa na morte de Yume. E, devido às maquinações do Habitante do Subsolo, Hoshino renasce como uma existência completamente diferente."
3864663142 = "Manifestação"
2262723767 = "O Comitê de Contramedidas e o Sensei tentam parar Hoshino, cuja existência foi invertida, mas todos são derrotados diante de seu poder avassalador. Além disso, a 'Fúria de Set' reage a Hoshino e começa a se manifestar. Arona e Plana dizem que o choque entre Hoshino e Set trará a destruição do mundo. Em meio à situação desesperadora, Shiroko tenta entrar em contato com o Color para salvar a todos."
938761530 = "Pedido de desculpas"
1220924498 = "O Sensei encontra Yume em um espaço misterioso. Não é possível mudar o passado. Mas, agora, ele jura salvar a criança que está ao seu alcance."
675540194 = "Terror VS Terror"
3143101973 = "Plana usa o poder do Color a seu favor. Com isso, Shiroko*Terror é invocada para enfrentar a transformada Hoshino."
2218727448 = "Terror VS Terror"
37327455 = "O Habitante do Subsolo, ao testemunhar Shiroko*Terror, depara-se com uma situação impossível onde a divindade existe simultaneamente, e recorre ao seu último recurso."
1657311791 = "Caderno"
3366159078 = "O Comitê de Contramedidas e o Sensei buscam uma maneira de salvar Hoshino. Pensava-se que o mistério, uma vez invertido em terror, não poderia ser restaurado, mas ao perceberem que Hoshino não foi completamente invertida, o grupo decide apostar em uma pequena possibilidade para resgatá-la."
3926366854 = "Caderno"
926354967 = "O Sensei e o Comitê de Contramedidas, que finalmente conseguiram se aproximar de Hoshino, tentam transmitir seus sentimentos a ela."
319388679 = "O que precisa ser dito"
1570618741 = "O Comitê de Contramedidas transmite a Hoshino tudo o que queria dizer. Mas, devido ao plano final do Habitante do Subsolo, a 'Fúria de Set' se manifesta completamente."
2188327975 = "Promessa"
1072185142 = "No momento em que o grupo do Comitê de Contramedidas enfrenta uma crise de vida ou morte, Hoshino, em um espaço onde não consegue distinguir sonho de realidade, encontra 'aquela pessoa' que desejava reencontrar."
3773443473 = "Quebra de restrição"
2340870041 = "Hoshino retorna milagrosamente da 'inversão'. Após o reencontro com Hoshino e a chegada de Shiroko*Terror, o grupo do Comitê de Contramedidas parte para a batalha final contra a 'Fúria de Set' e o Habitante do Subsolo que está por trás de tudo."
1985827982 = "Pegadas deixadas pelo sonho"
1022838518 = "Após o fim da batalha, o que se espalhou pelo oásis foram chamas azuis e belas. A verdadeira natureza delas eram minerais valiosos enterrados no deserto que Hoshino e Yume procuraram. Hoshino contempla as pegadas deixadas por Yume."
2405249657 = "O que foi deixado para trás"
4258312221 = "O cotidiano retorna. Os dias daqueles que ficaram continuam."
990172089 = "Epílogo (1)"
2169764773 = "Hoshino decide se tornar a presidente do conselho estudantil de Abydos. Enquanto isso, Hina e Makoto decidem destruir o canhão ferroviário, o legado do Imperador do Trovão. Nonomi e Suou também se dedicam a resolver as tarefas pendentes, e a vitalidade retorna ao Distrito Autônomo de Abydos após muito tempo."
1959390195 = "Epílogo (2)"
832014371 = "O Sensei encontra Shiroko*Terror e envia as palavras que queria transmitir. Como se respondesse a isso, Shiroko*Terror grava em seu coração o sentimento de aceitar tanto a dor quanto a felicidade e seguir em frente..."
237598723 = "O início da aventura"
1029808550 = "Após receber uma carta estranha, o Sensei [USERNAME] visita o Departamento de Desenvolvimento de Jogos da Millennium Science School. Lá, ele conhece as alunas gêmeas que estavam desenvolvendo um jogo, Midori e Momoi."
3338381113 = "A contadora do Seminário, Yuuka"
4264874819 = "Yuuka, a contadora do Seminário, declara que o Departamento de Desenvolvimento de Jogos será fechado devido ao seu desempenho insatisfatório. Em busca de uma carta na manga para reverter essa situação, Midori e Momoi partem com o Sensei [USERNAME] em direção às 'ruínas'."
3931386898 = "Para as ruínas"
4072922310 = "Midori e Momoi procuram a 'G.Bible', a escritura que supostamente contém o método secreto para criar o melhor jogo, que estaria nessas ruínas. No entanto, no caminho, são perseguidas por robôs que as atacam e acabam fugindo para uma fábrica abandonada que não é mais utilizada."
3321101212 = "Naquele dia, conhecemos uma garota"
2114828100 = "O grupo do Departamento de Desenvolvimento de Jogos e o Sensei [USERNAME] encontram Alice, uma garota robô semelhante a um humano, na fábrica abandonada. Para manter o departamento funcionando, Momoi decide levar Alice para a sala do clube e torná-la um membro."
707980707 = "Eu sou a Alice"
3869084317 = "Alice jogou alegremente (?) o jogo anterior do Departamento de Desenvolvimento de Jogos, 'Tales Saga Chronicle'. Com a reação dela, todos do departamento, incluindo a presidente Yuzu, ficam emocionados."
2096151113 = "Como aprender a falar"
910040027 = "Após jogar a noite toda o jogo recomendado pelos membros do departamento, Alice gradualmente começa a usar uma linguagem mais humana. Momoi entrega a Alice vários itens, como uma carteirinha de estudante, necessários para que ela se passe por uma aluna da Millennium."
3197846671 = "Grande demais para ser chamada de arma"
6265887 = "As alunas do Departamento de Desenvolvimento de Jogos visitam o \"Departamento de Engenharia\" da Millennium Science School para conseguir a arma que Alice usa. Quando Alice demonstra interesse no canhão elétrico montado em um encouraçado espacial, também conhecido como \"Espada de Luz: Supernova\", o Departamento de Engenharia inicia um combate para testar as habilidades dela."
2828361379 = "Grande demais para ser chamada de arma"
295717469 = "Alice domina o canhão elétrico logo no primeiro contato e derrota o Departamento de Engenharia. Ao ver isso, Utaha, a chefe do Departamento de Engenharia, começa a questionar a capacidade física extraordinária de Alice."
252928965 = "Exame de qualificação"
222860507 = "Antes que Yuuka visite o Departamento de Desenvolvimento de Jogos para o exame de qualificação de uma nova integrante, Alice decide praticar sua apresentação pessoal com Midori e Momoi."
3447447898 = "As perguntas de Yuuka"
2666100393 = "Após várias perguntas, Yuuka reconhece Alice como uma integrante oficial, mas avisa que a existência do clube só está garantida até o final deste semestre. Ela declara que, se o clube não conseguir criar um jogo decente e apresentar resultados, o Departamento de Desenvolvimento de Jogos terá que ser fechado. O grupo parte novamente em direção às ruínas em busca da \"G.Bible\"."
980942246 = "De volta às ruínas"
2685240113 = "Diferente da última vez, com a força de Alice, o grupo do Departamento de Desenvolvimento de Jogos derrota facilmente os robôs das ruínas enquanto segue para o local do objetivo."
771027366 = "O que estava lá"
2820527577 = "O grupo chega à fábrica em ruínas, seu objetivo. Lá, Alice é guiada por uma força misteriosa dentro de si até o local do computador onde a \"G.Bible\" está armazenada, e o grupo consegue baixar os dados para o console de videogame."
2728548615 = "Em busca do \"Espelho\""
3103417958 = "O Departamento de Desenvolvimento de Jogos visita a \"Veritas\" para decifrar a senha necessária para ler a \"G.Bible\", mas Maki responde que, para decifrá-la, é preciso o \"Espelho\", uma ferramenta de hacking que foi confiscada pelo Conselho Estudantil. O grupo decide ir até o depósito de itens confiscados do Conselho Estudantil, protegido pelo Maid Club, para recuperar o \"Espelho\"."
2899726708 = "Nerd VS Maid"
317160579 = "Enquanto Alice e os membros da Veritas realizam uma operação de distração, Midori e Momoi vão com o Sensei em direção ao Seminário, tentando uma invasão frontal."
413920948 = "Nerd VS Maid"
3365649643 = "Graças ao hacking da Veritas, Akane acaba presa em uma sala fechada."
2494926665 = "Maid VS Meisters"
14296212 = "Com a ajuda de Utaha, a chefe do departamento, o grupo do Departamento de Desenvolvimento de Jogos consegue desviar da atiradora do Maid Club, Karin. No entanto, outra integrante do Maid Club, Asuna, aparece diante deles."
2780791509 = "A crise que se aproxima"
3362919123 = "Como o processo demorou, Akane e Karin são libertadas, e o grupo do Departamento de Desenvolvimento de Jogos cai em perigo novamente. No momento de desespero, Alice aparece por um triz, salvando a situação, e o grupo consegue se infiltrar no depósito de itens confiscados do Conselho Estudantil."
4228188430 = "Falta pouco!"
1685329725 = "O grupo consegue recuperar o \"Espelho\", mas acaba encontrando Neru, a chefe do Maid Club, no depósito. No entanto, graças à perspicácia de Yuzu, elas conseguem enganar Neru e retornam em segurança para a sala do clube."
2238903513 = "A batalha sem fim"
1829805873 = "Após o combate, Akane pede desculpas a Neru por não ter cumprido a missão, mas Neru está mais interessada em Alice, que lutou de igual para igual com o Maid Club. Enquanto isso, de volta à sala do clube, o grupo começa finalmente a analisar a \"G.Bible\" usando o \"Espelho\"."
1086770631 = "G.Bible"
2087231337 = "Ao contrário das expectativas, a \"G.Bible\" continha apenas uma frase: \"Ame os jogos\". O grupo cai em desespero, mas, com as palavras de Alice, recuperam a motivação e começam o desenvolvimento de \"Tales Saga Chronicle 2\"."
376917210 = "Double O"
2914628993 = "O grupo termina o desenvolvimento de \"Tales Saga Chronicle 2\" em cima do prazo. Logo após fazerem o upload do jogo, tiros ecoam na sala do Departamento de Desenvolvimento de Jogos."
178004961 = "Double O"
1644909910 = "A autora dos disparos era Neru, a chefe do Maid Club. Neru desafia Alice para uma luta por ter ficado interessada nela durante o combate anterior, mas, após uma breve confusão, ela vai embora parecendo satisfeita."
3999000705 = "Millennium Prize"
1100406605 = "No \"Millennium Prize\", que premia as invenções de destaque da Millennium Science School, \"Tales Saga Chronicle 2\" do Departamento de Desenvolvimento de Jogos recebe um prêmio especial. Enquanto todos comemoram o cancelamento do fechamento do clube, o console onde a \"G.Bible\" foi instalada começa a funcionar sozinho..."
854019333 = "Reunião secreta"
350519276 = "Na calada da noite, Himari visita Rio, a presidente do conselho estudantil da Millennium. Elas discutem como o incidente anterior entre o Departamento de Desenvolvimento de Jogos e a C&C foi algo preparado por ambas para revelar a verdadeira identidade de Alice, e sobre a conclusão que tiraram através disso. Embora a interpretação fosse a mesma, a diferença na percepção de cada uma sobre Alice leva ao rompimento da aliança, e Rio aponta sua bela lâmina contra Himari."
2171223093 = "O cotidiano comum do Departamento de Desenvolvimento de Jogos"
950515874 = "O Sensei, que visitou a sala do clube após muito tempo, estava jogando jogos de luta com as integrantes para ter ideias para o próximo projeto. Após terminarem as partidas, chega a notícia de que Yuzu alcançou 10 vitórias consecutivas em uma partida online. Alice, motivada, entra na partida online, mas acaba enfrentando um trapaceiro — e, graças à habilidade de Yuzu, elas conseguem evitar o pior. Assim, o cotidiano pacífico do Departamento de Desenvolvimento de Jogos continua."
258618862 = "~Alice, começando uma aventura!~"
1634979540 = "O grupo continua a ter ideias para um novo jogo. No entanto, as opiniões de Momoi e Midori não se alinham, e as duas decidem resolver com uma disputa tradicional do Departamento de Desenvolvimento de Jogos. Enquanto isso, Yuzu dá a Alice uma missão: explorar a escola junto com o Sensei."
1695437540 = "~Alice e aqueles que a guiam~ (1)"
3535563597 = "Alice e o Sensei começam a explorar a escola e encontram Sumire, que estava correndo pelo campus, e conversam alegremente. Dizem que Alice, que vive explorando a escola, e Sumire, que vive correndo, são companheiras de exercício. Assim, a aventura de Alice e do Sensei continua para os arredores da Millennium — ao encontrarem Asuna e Karin nos arredores, os dois ouvem que Neru está procurando por Alice e partem apressados."
4226009798 = "~Alice e aqueles que a guiam~ (2)"
331927291 = "Recebendo novas missões dos alunos da Millennium e conversando com o Departamento de Engenharia sobre a \"Espada de Luz\". Enquanto continuam a aventura tranquilamente, Neru aparece de repente diante delas. Dizendo que tem um assunto importante, Neru captura Alice e começa a jogar um jogo de luta com ela no fliperama — ao que parece, as duas costumam jogar juntas de vez em quando. Alice ri, dizendo que, embora Neru e ela já tenham apontado armas uma para a outra no passado, agora são companheiras."
3180610485 = "Máquina misteriosa (1)"
249138221 = "Certo dia, o Sensei recebe um aviso da Veritas de que encontraram uma máquina suspeita. No caminho para a sala da Veritas, ele se encontra com o Departamento de Desenvolvimento de Jogos e decidem investigar a origem da máquina juntos. No entanto, enquanto o grupo tenta entender o que é a máquina, Alice, como se fosse guiada por ela, coloca a mão sobre o aparelho. Assim que a máquina é ativada, algo estranho acontece com Alice..."
2273243370 = "Máquina misteriosa (2)"
3057433435 = "Alice, agindo de forma estranha e sem ouvir as vozes ao redor, destrói a sala do clube e aponta sua arma para todos que estão ali. No momento em que ninguém conseguia pará-la, a C&C aparece, nocauteia Alice e desliga a máquina — mas, antes que pudessem respirar aliviados, Midori solta um grito de dor. Lá estava Momoi, caída no chão, sem se mover."
888978219 = "O cotidiano desmoronado"
1905976681 = "Desde aquele dia, o Sensei, que cuidava de Momoi sem que ela acordasse, recebe um contato de Midori e vai visitar Alice, que se trancou no Departamento de Desenvolvimento de Jogos. As palavras do Sensei não chegam até ela, e Alice lamenta profundamente ter ferido Momoi. Nesse momento, uma pessoa visita a sala do clube, dizendo que veio contar a \"verdade\"..."
2526248209 = "Verdade Cruel (1)"
342541954 = "Quem visitou a sala do clube foi a própria presidente do conselho estudantil do Millennium, Rio. Ela revelou que a verdadeira identidade de Aris é a \"Princesa dos Deuses Sem Nome\" e que, usando termos de jogos, ela é como uma \"Rei Demônio\". Ignorando a confusão do grupo, ela falou calmamente sobre o futuro de destruição que Aris traria e afirmou que tudo se resolveria se seu halo fosse destruído. No entanto, incapazes de aceitar tal coisa, o grupo se opôs — e, diante deles, a quinta integrante da C&C apareceu."
4280260261 = "Verdade Cruel (2)"
2268486821 = "Neru derrotou os AMAS e perseguiu Toki. No entanto, devido a um ataque surpresa de Toki, Neru acabou sendo capturada. Por outro lado, Midori e Yuzu também não conseguiram reagir à situação repentina — assim, a \"Espada de Luz\", prova do herói, foi destruída. Ao ser informada de que tudo aconteceu por sua causa, Aris decidiu seguir Rio e desapareceu diante de todos."
2301390180 = "Não importa o que aconteça!"
3091811119 = "Com Aris levada, o grupo estava perdido quando Momoi, que recuperou a consciência, apareceu. Ao ouvir a situação, Momoi declarou que não aceitaria se despedir de Aris assim e que iria buscá-la, fazendo com que todos determinassem que trariam Aris de volta."
1928599175 = "Reunião de Estratégia"
3537725688 = "O grupo iniciou uma reunião de estratégia para trazer Aris de volta. Pensando que o Seminar poderia saber para onde Rio foi, decidiram pedir ajuda a Yuuka e Noa. Lá, o grupo descobriu a \"Cidade Fortaleza Eridu\", que Rio estava construindo em segredo. Assim, eles planejaram uma operação de infiltração na cidade fortaleza."
2759004737 = "Big Sister (1)"
4182520481 = "Himari foi mantida em cárcere em Eridu por Rio. Rio queria destruir o halo de Aris por uma causa maior, enquanto Himari argumentava que isso era apenas assassinato. A discussão entre as duas continuava em um impasse — enquanto isso, o Departamento de Desenvolvimento de Jogos e o Departamento de Engenharia, que se infiltraram em Eridu para resgatar Aris, tiveram seu caminho bloqueado por drones misteriosos."
37376914 = "Big Sister (2)"
2462813750 = "Conforme o plano, a C&C estava destruindo os drones. Quem bloqueou o avanço impetuoso do grupo foi a quinta integrante da C&C, Toki."
229839680 = "Cidade Fortaleza Eridu"
918387984 = "Percebendo que Neru não estava entre o grupo, Toki afirmou que o plano deles estava correto e que tinham chances de vencer. No entanto, Neru, que chegou atrasada, começou a lutar contra Toki — enquanto isso, o Departamento de Desenvolvimento de Jogos e o Departamento de Engenharia seguiram por uma rota diferente em direção ao centro de Eridu."
235382079 = "Armadilha (1)"
1349201345 = "A C&C conseguiu encurralar Toki com um ataque de pinça. Percebendo que seria difícil contra-atacar ações coordenadas, Toki alterou o terreno de Eridu para isolar a C&C. Por outro lado, diante do grupo do Departamento de Desenvolvimento de Jogos que avançava sem problemas, a arma criada por Rio, Avant-Garde-kun, bloqueou o caminho."
4284078290 = "Armadilha (2)"
1075771830 = "Diante de Rio e Avant-Garde-kun, que afirmaram que já previam que a C&C e o Sensei se separariam, o grupo ficou sem ter o que fazer. Assim, Avant-Garde-kun levantou seu golpe final."
1472787878 = "Xeque-mate"
1932470324 = "No momento em que Rio estava prestes a declarar vitória enquanto transmitia a luta para Himari — Emi apareceu fazendo um estrondo. Por outro lado, o Veritas, que teve sua linha de comunicação hackeada e não podia mais dar suporte, conseguiu selar os movimentos de Avant-Garde-kun usando o \"Espelho\" deixado por Himari."
2949478604 = "Trampolim da Reviravolta (1)"
2087519716 = "Com a ajuda de Sumire, Chihiro garantiu o \"Espelho\" que estava no depósito de itens apreendidos e conseguiu assumir o controle da rede de Eridu. Aproveitando que os movimentos de Avant-Garde-kun estavam lentos, o grupo do Departamento de Desenvolvimento de Jogos partiu para o contra-ataque."
2570893963 = "Trampolim da Reviravolta (2)"
4071798167 = "O grupo conseguiu derrotar Avant-Garde-kun com a invenção do Departamento de Engenharia. No entanto, devido ao recuo, o Departamento de Engenharia acabou se retirando. Recebendo o apoio do caído Departamento de Engenharia, o Departamento de Desenvolvimento de Jogos seguiu em frente."
2900133993 = "Ainda assim, uma Parede Insuperável"
1637045112 = "Neru, levada a um duelo um contra um, continuou lutando sem perder para Toki. Ao ver Karin, Asuna e Akane adaptadas à mudança do terreno, Toki recuou temporariamente — e assim, diante do grupo que se reuniu em frente à torre central, Toki, vestindo o traje de força desenvolvido por Rio, bloqueou o caminho novamente."
3331557940 = "Jogador Trapaceiro"
706464142 = "O poder do armamento de Toki, \"Abi-Eshuh\", era avassalador. Seguindo a sugestão de Akane de que teriam uma chance em um combate aéreo, Neru tentou o confronto, mas sofreu ferimentos graves — e o grupo foi forçado a recuar carregando Neru."
859505773 = "Como Jogadora, como Amiga"
3991456034 = "Com Neru derrotada, não restava nenhum meio de enfrentar Toki. Enquanto o desespero dominava o coração dos membros, Neru recuperou a consciência e se levantou. Enquanto o grupo discutia que ainda deveria haver uma solução, Yuzu, que observava a batalha, fez uma sugestão."
1152423272 = "O que aquele nome indica."
4250229177 = "Graças à sugestão de Yuzu e Chihiro, o grupo conseguiu explorar o ponto fraco do \"Abi-Eshuh\". De uma situação desesperadora, eles conseguiram a vitória. Aquela batalha foi digna do codinome 00, que ostenta o título de mais forte do Millennium."
2879188167 = "Pavana para a Princesa (1)"
3410221265 = "O grupo finalmente chegou ao local onde Aris estava presa. Ao falar com Aris, que estava dormindo lá, ela respondeu que não era Aris, mas sim <Key>. Então, <Key> anunciou que ativaria a \"Arca de Atra-Hasis\" — e Rio, percebendo que o fim estava próximo por causa da cidade que ela mesma criou, declarou que a impediria sozinha."
324915488 = "Pavana para a Princesa (2)"
1522532631 = "Graças a Yuuka e Noa, o grupo conseguiu ganhar tempo temporariamente e Himari ensinou como trazer Aris de volta. Era entrar no mundo espiritual e dialogar. Sem hesitar, o grupo decidiu enfrentar o perigo e entrou no mundo espiritual de Aris."
2176908388 = "O que eu quero ser"
1285561733 = "No mundo espiritual de Aris, o grupo finalmente se reencontra. Aris hesita em voltar, dizendo que é uma Rei Demônio e que todos se machucariam por sua causa, mas, encorajada pelas palavras de todos de que \"você pode decidir por si mesma o que quer ser\", ela decide se tornar uma heroína da luz. Em seus olhos, não havia mais hesitação nem tristeza."
3880903334 = "Millennium Science School"
544345914 = "Assim, a situação chegou ao fim — Rio desapareceu para assumir a responsabilidade, a C&C recebeu novos membros, o Departamento de Desenvolvimento de Jogos continuou discutindo o próximo jogo como sempre — e, a partir de agora, o cotidiano pacífico do Millennium continuará."
108666912 = "Prólogo"
3860334718 = "Seia fala sobre o \"Tratado de Eden\", as \"Sete Regras Antigas\" e o \"Paraíso\". Ela diz algo inquietante ao Sensei."
3383571419 = "Departamento de Aulas de Reforço"
1483887365 = "Na sala de aula estavam reunidos o Sensei, Hifumi, Hanako, Azusa e Koharu. Enquanto Hifumi acalmava Koharu, que fazia escândalo dizendo que seria expulsa se continuasse assim, o Sensei relembrava o início de tudo, algumas semanas atrás."
4127233795 = "Festa do Chá"
2556827456 = "Convidado por Nagisa e Mika, as presidentes do conselho estudantil de Trinity, o Sensei compareceu à festa do chá. Ele foi solicitado a ser o professor responsável pelo \"Departamento de Aulas de Reforço\", onde se reúnem alunos prestes a reprovar, e aceitou. Na lista de nomes do departamento, havia um nome conhecido e, pensando que não poderia ser, o Sensei foi até a sala de aula e reencontrou a presidente, Hifumi."
2736401965 = "Alunas do Departamento de Aulas de Reforço (1)"
2320947204 = "O Sensei decidiu ir conhecer os outros membros do Departamento de Aulas de Reforço junto com Hifumi. Os dois conheceram \"Hanako\", que estava detida pelo Comitê de Justiça, e \"Azusa\", que foi capturada após um confronto com o Comitê de Justiça."
4288766681 = "Alunas do Departamento de Aulas de Reforço (2)"
1080677386 = "O Sensei tentou fazer com que entregassem Hanako e Azusa, mas foi impedido por Koharu, do Comitê de Justiça. Embora tenha sido repreendida pela veterana Hasumi e zombado dizendo que \"o Departamento de Aulas de Reforço é vergonhoso\", foi revelado que ela também era um membro do departamento. Koharu, ainda sofrendo com o dano de suas próprias palavras, finalmente completou o grupo do Departamento de Aulas de Reforço."
1381682562 = "Vamos nos apresentar!"
3807799700 = "O Clube de Estudos Suplementares se reuniu novamente. Com a regra de que \"basta que todos passem ao mesmo tempo em uma das três tentativas\", as circunstâncias de cada uma começam a ser reveladas vagamente durante uma leve rodada de apresentações. Enquanto todos se motivam para superar o desafio, Koharu declara com total confiança: \"Eu sou uma elite! Vou sair daqui num piscar de olhos!\""
3720628732 = "Estudando para o exame"
968959922 = "As alunas do Clube de Estudos Suplementares se preparam para o primeiro exame, estudando com a ajuda do Sensei e ensinando umas às outras. Azusa tem uma grande vontade de aprender, Hanako parece ser muito culta e Koharu diz (autoafirmação) que está tranquila. Enquanto tudo parece seguir em um clima positivo, Hifumi revela secretamente o fato de que \"se alguém for reprovado no primeiro exame, haverá um acampamento de estudos obrigatório\"."
42497510 = "Primeiro Exame Acadêmico Especial"
2338283664 = "Durante o exame, Hifumi se sente aliviada ao ver que o conteúdo estudado caiu na prova e que o nível de dificuldade é bem baixo. No entanto, ao conferir os resultados, todos, exceto Hifumi, foram reprovados. O acampamento de estudos do Clube de Estudos Suplementares foi decretado."
604324422 = "Sombras sob a superfície"
3378221237 = "O Sensei pergunta a Nagisa o que acontecerá se as alunas do Clube de Estudos Suplementares não passarem em nenhuma das três tentativas. Nagisa responde que, nesse caso, todas serão \"expulsas\" e revela que o clube foi criado, desde o início, para expulsar alunas. Ela diz que há um \"traidor\" dentro do clube tentando sabotar a assinatura do Tratado do Éden e pede ao Sensei que encontre esse traidor, mas..."
3020153020 = "O acampamento começa!"
2563693133 = "O Clube de Estudos Suplementares visita um anexo de Trinity para realizar o acampamento. Elas ficam agitadas logo após a chegada, mas decidem começar limpando o local."
660461531 = "Faxina geral!"
198950639 = "Após terminarem a limpeza básica, Hanako sugere limpar a piscina para brincar na água. Elas trocam de roupa antes de começar os estudos sérios e acabam limpando a piscina enquanto ficam completamente encharcadas."
4233186689 = "A primeira noite do acampamento"
2960849454 = "Na primeira noite, Hifumi visita o Sensei. Ao ouvir sobre a conversa com Nagisa, o Sensei diz a Hifumi: \"Deixe isso comigo\". Quase ao mesmo tempo, Azusa e Hanako, que estavam de vigia, acabam se encontrando..."
3382766713 = "Simulado do Clube de Estudos Suplementares"
848842177 = "Hifumi cria um simulado para fazer o que pode, mas, tirando ela, todas vão mal. Mesmo assim, ela planeja medidas corretivas e promete dar brindes da Momo Friends para quem tirar uma nota melhor. Hanako e Koharu reagem de forma contida, mas os olhos de Azusa começam a brilhar...?"
3534072072 = "A vice-presidente do Comitê de Justiça (1)"
17674601 = "Durante o estudo autônomo, Koharu é pega com um livro erótico na bolsa. No entanto, ela explica que era um item confiscado durante suas atividades no Comitê de Justiça e que o pegou por engano. Decidem devolvê-lo antes que vire um escândalo, e Koharu vai com o Sensei até a sala do Comitê de Justiça."
3592313078 = "A vice-presidente do Comitê de Justiça (2)"
2059845093 = "Koharu explica a situação apressadamente ao Sensei, que responde: \"Você não precisa se forçar a seguir regras tão rígidas\". Com isso, Koharu confessa ao Sensei que, na verdade, ela é uma espiã. Depois, ao devolver o item confiscado, elas encontram Hasumi, que começa uma conversa secreta com Koharu...?"
773890837 = "Uma pequena brecha"
1756837627 = "Durante a conversa entre Hanako e Koharu, Azusa menciona as \"Sete Regras Antigas\". Hanako parece bastante surpresa com isso. Naquela noite, Hifumi visita o Sensei e revela um fato que descobriu enquanto criava o simulado: Hanako é, sem dúvida, uma gênia, e só pode estar reprovando nos exames de propósito. Na manhã seguinte a essa confusão, Mika visita o Sensei..."
135674395 = "O traidor de Trinity"
892831890 = "Mencionando a conversa com Nagisa, Mika propõe um acordo ao Sensei e diz que revelará quem é o \"traidor de Trinity\". O nome é \"Shirasu Azusa\". Mika continua, pedindo ao Sensei que proteja Azusa."
3021188189 = "Um monstro gigante"
3984423781 = "Mika diz que Nagisa pode estar planejando algo através do Tratado do Éden. Explicando suas próprias intenções e pedindo para proteger Azusa, Mika diz que quer que o Sensei decida, no final, se acredita em Nagisa ou nela mesma."
1502378419 = "Sisterhood"
1398806955 = "Certo dia, Mary, da Sisterhood, visita o Clube de Estudos Suplementares durante o acampamento. Parece que ela veio agradecer em nome de uma aluna que Azusa ajudou anteriormente. Naquela noite, Hifumi visita o Sensei para discutir o futuro, ou pelo menos é o que parece..."
3715954097 = "Encontro secreto na madrugada"
1999585029 = "Hanako, preocupada com Azusa, visita o Sensei. Durante a conversa, o fato de que \"três reprovações significam expulsão para todas\" é revelado a Hanako, que deduz que há segredos ainda mais profundos. Ela declara que se esforçará para não causar problemas nos próximos exames, parecendo até se divertir com a situação de um encontro secreto na madrugada. Porém, ao sair do quarto do Sensei com Hifumi, elas são flagradas por Koharu, que estava indo ao banheiro...?"
3916469784 = "Festa na piscina"
3001743394 = "Devido a uma chuva repentina, todas as roupas de lavar ficam molhadas e, sem ter o que vestir, o Clube de Estudos Suplementares decide fazer uma festa na piscina em vez de uma festa do pijama. Tendo se aproximado mais, elas conversam sobre várias coisas e passam um tempo divertido como estudantes. O grupo decide então aproveitar o auge do acampamento: sair escondido para um passeio noturno."
1861044050 = "Confusão na calada da noite (1)"
3288144026 = "Durante o passeio noturno, o Clube de Estudos Suplementares encontra Hasumi, vice-presidente do Comitê de Justiça, em uma doceria. Hasumi diz: \"Vamos fingir que não nos vimos\" e elogia o esforço de Koharu, quando de repente chega a informação de que o \"Clube de Pesquisa Gastronômica\" está causando confusão."
391890716 = "Confusão na calada da noite (2)"
749962361 = "Hasumi, julgando que não seria bom que Gehenna e Trinity parecessem estar em conflito direto às vésperas do Tratado do Éden, pede ajuda ao Clube de Estudos Suplementares e ao Schale. Com Koharu se motivando ao lado de Hasumi, o grupo parte para conter a situação."
2432925314 = "Confusão na calada da noite (2)"
4237665195 = "Graças à atuação do Sensei e do Clube de Estudos Suplementares, a situação é controlada. Os membros do Clube de Pesquisa Gastronômica que fugiram também são perseguidos pelo Comitê de Justiça, terminando tudo bem."
781465669 = "Uma nova perspectiva"
1190877624 = "Hina, do Comitê Disciplinar, e Sena, do Departamento de Medicina de Emergência, aparecem para levar os membros do Clube de Pesquisa Gastronômica. Após cumprimentar Sena, o Sensei pergunta a Hina sua opinião sobre o Tratado do Éden."
3667360070 = "Uma esperança que surge"
3554655960 = "Após continuarem estudando, o Clube de Estudos Suplementares finalmente consegue tirar notas de aprovação em um simulado. Para comemorar, Hifumi, empolgada, inicia a cerimônia de entrega dos brindes da Momo Friends. Embora Hanako e Koharu tenham recusado, Azusa parece muito animada. Por fim, abraçando o brinde escolhido por Hifumi, Azusa diz alegremente que guardará para sempre aquele presente, que é a prova de seu esforço e o primeiro que recebe de uma amiga. Assim, pouco antes do Segundo Exame Acadêmico Especial, o Sensei recebe um chamado de Nagisa..."
3715486889 = "Mãos negras"
1616621734 = "O Sensei diz a Nagisa novamente que não pretende gastar tempo suspeitando de ninguém. Ao ouvir o que Nagisa tem a dizer, o Sensei afirma: \"Você certamente está na escuridão da paranoia\" e declara que a tirará de lá, prometendo que todas do Clube de Estudos Suplementares passarão no exame."
194293672 = "Segundo Exame Acadêmico Especial (1)"
2202623311 = "Na véspera do Segundo Exame Acadêmico Especial, o Clube de Estudos Suplementares fica confuso com a mudança repentina do conteúdo, da nota de corte e do local do exame. No entanto, aceitando as palavras de Azusa de que só resta lutar até o fim, o grupo parte para o distrito autônomo de Gehenna, onde será o exame."
1942601069 = "Segundo Exame Acadêmico Especial (1)"
1391275365 = "A caminho do distrito autônomo de Gehenna, o caminho é bloqueado por delinquentes, mas o Clube de Estudos Suplementares consegue forçar a passagem."
644321687 = "Segundo Exame Acadêmico Especial (2)"
3226156325 = "Ao entrar no distrito autônomo de Gehenna, o Clube de Estudos Suplementares tem seu caminho bloqueado pelo Comitê Disciplinar. Devido à aparência de Koharu, elas são confundidas com um ataque do Comitê de Justiça e quase entram em combate, mas são salvas pelos membros do Clube de Pesquisa Gastronômica. Passando por explosões e tiroteios, o grupo chega ao local do exame, mas a sabotagem de Nagisa não termina por aí...!"
4130588728 = "De volta à origem"
1896656556 = "Ao testemunhar a sabotagem no 2º Exame Acadêmico Especial, o grupo do Clube de Estudos Suplementares percebe que o Tea Party está realmente tentando expulsá-los. O Sensei tenta entrar em contato com Nagisa e Mika, mas não consegue, e nenhuma solução parece viável. Naquela noite, Hanako segue Azusa, que havia saído do quarto sozinha..."
2549930740 = "Mesmo assim"
2270700848 = "Mesmo acuadas e em uma situação desesperadora, o grupo do Clube de Estudos Suplementares continua se esforçando sem desistir. Para superar os obstáculos irracionais antes do exame final, elas continuam estudando com dedicação. Na noite anterior ao exame final, Azusa se encontra secretamente com uma garota chamada \"Saori\", e Hanako observa a cena das sombras."
1916659997 = "Confissão"
4166289180 = "Enquanto Hifumi, Hanako e Koharu, que haviam visitado o Sensei por não conseguirem dormir, conversavam sobre os novos atos de sabotagem, Azusa retorna e confessa que ela é a \"traidora de Trinity\". No entanto, o Sensei nega, e Hanako, que parecia estar prestes a acusá-la, demonstra empatia ao mencionar a história de \"alguém\". Sem querer desistir de nada, o grupo começa a agir com base no plano de Hanako."
742150805 = "O conflito começa"
1216430353 = "Antecipando-se ao Arius, Azusa e Hanako conseguem sequestrar Nagisa. Azusa entra em combate contra o Arius usando as armadilhas que preparou."
492008709 = "Batalha intensa"
3128498563 = "Embora o número de inimigos tenha diminuído consideravelmente, o Arius ainda encurrala Azusa e Hanako. No entanto, essa situação era uma armadilha preparada pelo Clube de Estudos Suplementares. O Sensei, Hifumi e Koharu se juntam a elas, e a batalha começa em um local sem saída."
707844123 = "Um mundo assim (1)"
4054359883 = "O Clube de Estudos Suplementares conseguiu incapacitar as alunas do Arius, mas os reforços chegaram mais rápido do que o esperado e, por algum motivo, o Comitê de Justiça não se moveu. Quando Hanako começa a questionar isso, Mika, do Tea Party, aparece. Ela revela que é a \"verdadeira traidora de Trinity\", expõe seu plano e ordena que o Arius acabe com o Clube de Estudos Suplementares."
28576329 = "Um mundo assim (1)"
2791097982 = "Ao ver que o grupo não cai facilmente apesar da batalha contínua, Mika fica impressionada, pensando se esse é o poder dos \"adultos\" e do \"Schale\". Nesse momento, ela menciona Seiya, o que deixa Azusa abalada, e então a \"Sisterhood\", que não deveria se mover, entra na batalha."
3198842828 = "Um mundo assim (2)"
141133620 = "Graças às manobras de Hanako, a Sisterhood, que não deveria intervir, entrou em ação. Sakurako, da Sisterhood, declara que, embora vá contra os costumes, ela irá intervir, e a batalha contra Mika e os outros começa."
2850369990 = "Um mundo assim (2)"
3969728237 = "Mika é derrotada pelo Clube de Estudos Suplementares, pelo Schale e pela Sisterhood. Ao ouvir os novos fatos revelados por Hanako, ela solta um suspiro de alívio e admite sua derrota, rendendo-se. Ao se despedir do Sensei, Mika diz que as palavras ditas naquela época a deixaram muito feliz e reflete sobre o mundo que poderia ter existido além daquele momento. Ela se despede do Sensei com um sorriso indescritível."
1709755666 = "3º Exame Acadêmico Especial"
1682079203 = "Após superar inúmeros imprevistos e continuar correndo, o Clube de Estudos Suplementares finalmente chega ao local do exame final. Todo o esforço delas deu frutos, e todas conseguiram passar no exame."
3889889279 = "Epílogo"
1853472011 = "Seiya avalia os esforços feitos até agora, mas avisa ao Sensei que as coisas ainda não terminaram. E assim, o Esquadrão Arius finalmente começa a se mover..."
1023493496 = "Post-mortem (1)"
2817792322 = "Seiya fala calmamente com quem veio atacá-la. Quando ela pergunta sobre o que acontecerá a seguir, o Sensei acorda. Depois, o Sensei ouve de Sakurako o desfecho do ataque a Seiya..."
2940097782 = "Post-mortem (2)"
3560240457 = "Sakurako, da Sisterhood, reconhece os resultados de Azusa e, sob a garantia da Sisterhood, ela se torna oficialmente uma aluna de Trinity. Hanako e o Sensei sentem-se aliviados, e a conversa muda para o caso de Nagisa e Mika."
3451183696 = "Post-mortem (3)"
1609767318 = "Seguindo Nagisa, Hanako também visita Mika na prisão. Hanako menciona suas suposições sobre a motivação de Mika na frente dela, mas..."
3155433875 = "Desde então"
1648638504 = "Embora ainda existam muitos problemas, um cotidiano calmo e pacífico se desenrola em Trinity. Enquanto isso, o Sensei visita Gehenna para encontrar Makoto, Hina e os outros...?"
4236130409 = "Cerimônia de Assinatura do Tratado do Éden (1)"
1627449016 = "Finalmente, o dia da cerimônia de assinatura do Tratado do Éden. Em meio à atmosfera agitada com Sinon, da Chronos, transmitindo a situação, o Clube de Estudos Suplementares faz uma pequena festa em um restaurante para comemorar a aprovação."
1969944314 = "Cerimônia de Assinatura do Tratado do Éden (2)"
646905301 = "O Sensei é guiado por Hinata, da Sisterhood, até a \"Antiga Basílica da Comunhão\", onde ouve histórias sobre a história de Trinity. Ao mesmo tempo, o Esquadrão Arius inicia sua operação. Nos céus de Trinity, mísseis traçam suas trajetórias..."
1269971397 = "O dia tingido de fogo e cinzas (1)"
774689524 = "O bombardeio de mísseis causa um grande caos na área. Aproveitando a brecha, o Esquadrão Arius invade o subsolo da Antiga Basílica. Diante da situação repentina, Tsurugi, Hasumi e Hinata, do Comitê de Justiça, reagem ao ataque."
4175188383 = "O dia tingido de fogo e cinzas (1)"
1651414121 = "Durante o combate, Tsurugi e Hasumi sentem algo estranho no comportamento dos oponentes. Ao ver suas formas, Hinata diz que eles são a \"Sociedade de Santos Justina\"."
499449077 = "O dia tingido de fogo e cinzas (2)"
2565238774 = "Hinata da Sisterhood, Tsurugi e Hasumi do Comitê de Justiça, e Hina do Comitê Disciplinar de Gehenna. O grupo continua lutando contra a Sociedade de Santos Justina enquanto protege o Sensei."
878733393 = "Confirmação de ódio"
361954059 = "Hina e o Sensei são enviados por Hasumi e os outros, mas com tantos oponentes bloqueando o caminho e até Hiyori do Esquadrão Arius entrando na batalha, o combate continua."
288823100 = "Confirmação de ódio"
3006327975 = "Saori, anunciando que o Arius assinou o Tratado do Éden, aponta sua arma para o Sensei enquanto fala sobre o ódio acumulado até agora. O Sensei é atingido, mas consegue escapar do local graças a Hina, do Comitê Disciplinar, e Sena, do Departamento de Medicina de Emergência. O Sensei, inconsciente, encontra Seiya em seu sonho..."
3724307009 = "Mentira doce"
272157938 = "O Sensei encontra Seiya novamente em seu sonho. Da boca de Seiya, a história sobre o Tratado do Éden e a Gematria é tecida. Por outro lado, Azusa entra em combate contra o Arius, mas não consegue enfrentá-los de frente e acaba escapando do local de alguma forma."
1624201610 = "Caos acelerado (1)"
2195551207 = "Hanako vai resolver a confusão na Sisterhood no lugar de Sakurako, e Koharu, embora em pânico, é convocada de emergência pelo Comitê de Justiça. O grupo do Clube de Estudos Suplementares começa a fazer o que deve ser feito em vários lugares, mesmo estando separados. Quase ao mesmo tempo, a ambulância de Gehenna, carregando o Sensei ferido, chega a Trinity...?"
1377799660 = "Caos acelerado (2)"
3800416342 = "Como resultado da análise, revela-se que os mísseis disparados contra a Antiga Basílica não foram lançados de Gehenna, mas de Trinity. Ao ver as imagens da \"Sociedade de Santos Justina\", Hanako percebe que, na pior das hipóteses, Trinity e Gehenna desaparecerão de Kivotos."
3662530531 = "O outro lado inalcançável"
3512207568 = "Hifumi finalmente alcança Azusa, mas Azusa a rejeita, dizendo que ela não deveria ter vindo até aqui. Azusa declara, com um olhar cheio de determinação, que todos se feriram por sua causa e que, a partir de agora, ela destruirá o halo de Saori e se tornará uma assassina. Após deixar palavras de gratidão a Hifumi, ela desaparece. Hifumi tenta impedi-la, mas sua voz não chega até ela..."
2485053728 = "Na escuridão"
1374661261 = "O Esquadrão Arius, tendo obtido a 'arma tática' e pretendendo iniciar o avanço contra Trinity junto com Justina, acaba sendo confundido pelas armadilhas que Azusa havia preparado sem que percebessem. Mesmo sendo encurralada por Saori, Azusa consegue escapar usando uma 'certa bomba'. No entanto, mesmo sendo para pegar o inimigo de surpresa, o fato de ter usado a prova de amizade com Hifumi como uma ferramenta de assassinato faz com que Azusa sofra de culpa, soluçando que nunca mais poderá voltar para o lado de Hifumi e das outras."
3252357257 = "A resposta para o quinto princípio antigo"
1561913819 = "Seia diz ao Sensei que, mesmo que ele acredite, não importa o quanto se esforce, este é o ponto final. No entanto, o Sensei decide seguir em frente, dizendo que há coisas que precisam ser feitas pelo 'futuro' e pelos alunos."
3162520452 = "Alguns fragmentos"
3183955174 = "Saori parecia ter sido atingida pela bomba de Azusa, mas Atsuko a protegeu no último segundo. Hina, a presidente do Comitê Disciplinar, desapareceu; Hanako está prestes a ser presa; e Mika é libertada de sua cela. Nesse momento, o Sensei finalmente abre os olhos—"
3179867525 = "A verdadeira face do ódio"
2955441922 = "Koharu corre para onde Mika está, que vinha sendo espancada sem oferecer resistência após rejeitar friamente as exigências das facções belicistas sob o Tea Party. Mesmo sendo ameaçada, Koharu recusa categoricamente as ordens. Nessa situação tensa, o Sensei também chega. Mika, embora confusa com suas próprias palavras, começa a falar pouco a pouco."
3510190250 = "Sem hesitar"
3395723629 = "O Sensei visita, um por um, os alunos que começam a despertar. Koharu, Hifumi e Hanako finalmente se reúnem e decidem seguir para as ruínas da Antiga Catedral para encontrar Azusa."
9241096 = "Nossa história"
1769802021 = "O Sensei visita Hina. Tendo ficado enfraquecida após os eventos recentes, ela finalmente revela um pouco de seu interior. Tendo conseguido ser um pouco vulnerável, ela começa a tentar se levantar novamente, lentamente. Hifumi vai novamente ao encontro de Azusa e revela que sua verdadeira identidade é a de 'líder do Esquadrão Máscara de Banho', dizendo que, por isso, não há motivos para serem diferentes. Com a declaração audaciosa de Hifumi, o Tratado de Eden é distorcido e uma outra organização do Tratado de Eden é fundada."
4250678679 = "O nome do paraíso é (1)"
1990540744 = "O Comitê Disciplinar de Gehenna, o Comitê de Justiça de Trinity e Abydos se unem para enfrentar o Esquadrão Arius."
4084884875 = "O nome do paraíso é (2)"
872832779 = "Enquanto rostos familiares se reencontram, as forças das escolas se combinam uma após a outra..."
275424097 = "O nome do paraíso é (2)"
3278894928 = "Observando a batalha entre as ETOs, Seia diz silenciosamente que perdeu."
3228962781 = "O nome do paraíso é (3)"
3156389352 = "Os preceitos perdem o sentido gradualmente e a situação do Esquadrão Arius piora. Enquanto os membros começam a desistir, Saori ainda se recusa a abandonar suas convicções."
3992775096 = "No subsolo da Antiga Catedral"
4215258149 = "Saori segue para o subsolo da Antiga Catedral. Azusa e o Sensei a seguem para colocar um ponto final na situação."
3039086335 = "O ódio de quem"
1305007844 = "Atsuko aparece onde Saori caiu e, quebrando o silêncio, diz: 'Vamos parar com isso'. Com todos exaustos e feridos, o Sensei retira o 'Cartão de Adulto' para enfrentar Maestro, que apareceu no local."
696231722 = "O ódio de quem"
859196225 = "Após o fim da batalha, o Esquadrão Arius desaparece para algum lugar, sumindo na escuridão."
1057886975 = "Epílogo"
3548500175 = "O Pandemonium desperta, o Tea Party se reúne novamente e o Clube de Estudos Suplementares se reencontra. Embora algumas coisas tenham se perdido, o cotidiano recupera gradualmente suas cores. Enquanto isso, nos bastidores, uma entidade misteriosa começa a se mover, visando o Esquadrão Arius...?"
2388883385 = "Prólogo"
742146611 = "Após uma luta e fuga intermináveis, o Esquadrão Arius acaba encurralado. Para salvar seus companheiros, Atsuko faz uma promessa a Beatrice e se entrega aos perseguidores. No entanto, o que choveu sobre os três restantes foram balas impiedosas—."
523418069 = "Um Tea Party desigual"
503633399 = "O Sensei visita Trinity para ouvir sobre o processamento pós-incidente do Tratado de Eden. Pensando que falaria apenas com Nagisa, Sakurako da Sisterhood e Mine do Esquadrão de Socorro participam da discussão sob o pretexto de ajudar o Tea Party. Em um clima desconfortável, Nagisa anuncia que uma audiência será realizada em breve para decidir o futuro de Mika."
1425951884 = "A princesa na gaiola"
1398756343 = "Nagisa diz ao Sensei que Mika não pretende comparecer à audiência, mesmo sabendo que a ausência resultará em expulsão. Ao visitar sua cela para ouvir o lado dela, Mika ri de forma autodepreciativa, dizendo que ainda não foi perdoada por Seia e que é natural ser condenada. No entanto, em seus olhos, ainda parecia haver hesitação. Tocado pelas palavras do Sensei, que a encoraja a convencer Seia e comparecer à audiência com Nagisa, Mika decide seguir em frente e participar."
1644694189 = "Entre sonhos e miragens"
2642024392 = "'Tive um sonho onde Kivotos chegava ao fim'. Os olhos de Seia, ao dizer isso, estavam turvos. Tendo tido sonhos lúcidos demais para buscar a verdade por trás do que viu, a distinção entre sonho e realidade tornou-se ambígua para ela. O Sensei, ao ser informado de que o Gematria é o culpado por trás disso, convence Seia a parar de perseguir esse sonho e continua: 'Você não poderia comparecer à audiência de Mika?'. No momento em que ela decide enfrentar Mika, Seia é capturada por outro sonho."
175200160 = "O buscador enigmático"
4076845186 = "Tendo testemunhado a reunião do 'Gematria', Seia descobre que Beatrice está usando o Esquadrão Arius para eliminar o Sensei. Ao perceber que o Distrito Autônomo de Arius já caiu nas mãos do Gematria, e ao mesmo tempo ser descoberta por eles, Seia entra em pânico, precisando voltar à realidade para avisar alguém. Ao mesmo tempo, Mika, que foi chamada para conversar com Seia, visita o quarto—."
4242006093 = "As asas quebradas"
3096862869 = "Seia, mentalmente abalada por ter testemunhado a reunião do Gematria, acaba interrogando Mika ao vê-la. Sem conseguir trocar palavras adequadas, Seia é levada novamente ao mundo dos sonhos premonitórios, onde vê Atsuko crucificada na Basílica de Arius e, enquanto está atordoada, é capturada por Beatrice. Enquanto isso, o Sensei, chamado a um beco por um e-mail de remetente desconhecido, encontra Saori, a líder do Esquadrão Arius—."
3473989469 = "Escolha e decisão"
137391815 = "Seia, atacada por Beatrice, entra em estado crítico, e Mika é acusada de ser a culpada por feri-la. Vendo uma pessoa querida ser ferida diante de seus olhos sem poder fazer nada, Mika decide se vingar de Saori, do Esquadrão Arius, a responsável pela situação. Por outro lado, Saori, que chamou o Sensei, revela seus sentimentos, dizendo que não tem a quem recorrer além dele, e implora por ajuda em troca de confiar sua vida a ele. Com um sorriso, dizendo que ela não precisa confiar sua vida a ele, o Sensei segura a mão de Saori."
3718525211 = "'Esquadrão Arius'"
1431856600 = "O Sensei e Saori decidem procurar os membros dispersos do Esquadrão Arius. Eles se reúnem com Hiyori e Misaki e descobrem que elas foram instruídas por Beatrice a 'eliminar o Sensei para serem perdoadas pela traição'. Mesmo assim, o Sensei concorda em continuar ajudando-as e, juntos, seguem para o Distrito Autônomo de Arius."
895577034 = "Para o Distrito Autônomo de Arius (1)"
466017759 = "Dizem que a entrada para o Distrito Autônomo de Arius exige passar pelas catacumbas existentes sob Trinity. Das inúmeras entradas subterrâneas, é impossível chegar ao distrito sem passar pela entrada correta e pela rota interna, que, além disso, mudam em ciclos regulares. Diante do grupo que corre para a entrada que ainda pode ser usada, os alunos de Arius enviados por Beatrice bloqueiam o caminho."
4233624493 = "Para o Distrito Autônomo de Arius (1)"
2841961890 = "Sob o comando do Sensei, o grupo elimina os alunos de Arius. Mas não há tempo para comemorar, pois não podem parar diante do limite de tempo que se aproxima. Com ansiedade e pressa, eles decidem apontar suas armas para seus antigos aliados para salvar a princesa."
2385460060 = "Rumo ao Distrito Autônomo de Arius (2)"
519064440 = "O grupo atravessou a passagem subterrânea e chegou à entrada das catacumbas. Não havia desvios, e não restavam outros caminhos. Como Beatrice sabia disso muito bem, ela provavelmente posicionou ainda mais soldados à frente. Mesmo que aqueles que os esperavam fossem seus próprios compatriotas, não havia outra escolha a não ser avançar. Se eles parassem, a vida de Atsuko estaria perdida."
2048900569 = "Rumo ao Distrito Autônomo de Arius (2)"
2969109627 = "Enquanto o Esquadrão de Arius e o grupo estavam em combate, uma terceira pessoa surgiu repentinamente em meio à fumaça. Com uma voz alegre e descontraída que não combinava com a situação, ela — Mika Misono — sorriu de forma enigmática."
767465142 = "O Perseguidor"
1734735203 = "Diante de Mika, que invadiu o local de repente, o Esquadrão de Arius caiu sem ter como reagir. No momento em que Misaki foi capturada e eles caíram em uma situação desesperadora, Mika, ao ver o Sensei que chegara atrasado, entrou em pânico por não querer ser vista naquele estado. Nesse momento, os perseguidores de Arius se juntaram à luta, transformando a situação em um combate caótico... O grupo aproveitou a brecha para atravessar as catacumbas."
308921891 = "Distrito Autônomo de Arius"
1726588307 = "O esquadrão finalmente chegou ao Distrito Autônomo de Arius. Enquanto Misaki tentava planejar os próximos passos, Saori, cuja exaustão atingiu o limite, desmaiou com febre. Por ora, o grupo decidiu descansar um pouco, colocando Saori para dormir e dando-lhe antitérmicos. Em seu sonho, o Sensei recebeu novamente um aviso de Seia para se manter longe do Distrito Autônomo de Arius."
2189783169 = "O Nosso Passado"
1121429929 = "Ao acordar, o Sensei pediu a Misaki e Hiyori que lhe contassem sobre o passado do Distrito Autônomo de Arius e do esquadrão. A guerra civil de Arius, a educação de Beatrice, a linhagem de Atsuko e os laços do esquadrão... Enquanto isso, a febre de Saori baixou e ela acordou, e o grupo seguiu em frente em direção à Basílica."
137688653 = "Encontro"
3389099 = "Ao passar pelas ruínas do distrito em direção ao antigo prédio da escola, Beatrice e a Sociedade de Justiça de Justina bloquearam o caminho do grupo. Ignorando o choque do esquadrão diante da verdade sobre sua missão, Beatrice continuou falando com o Sensei, perguntando se ele não gostaria de conhecer a verdade deste mundo. Se quisesse saber, que não interferisse. O Sensei recusou a proposta e o grupo entrou em combate com a Sociedade de Justiça."
1792504161 = "Encontro"
3516525510 = "Mika, que invadiu novamente durante o combate com a Sociedade de Justiça, apontou sua arma para o esquadrão. Em seus olhos, havia um ódio profundo."
4151121714 = "O Que Restou"
3307885360 = "O Sensei tentou convencer Mika a parar, mas ela respondeu com desdém, dizendo que se ela já o traiu uma vez, trairia uma segunda ou terceira. Julgando ser impossível pará-la apenas com palavras, o Sensei decidiu, junto com o esquadrão, neutralizá-la para conter seus movimentos."
550001274 = "O Que Restou"
3997939746 = "Para Mika, que agora estava calma, o Sensei disse: 'Seia está bem, volte para Trinity'. No entanto, diante dessas palavras, Mika murmurou que não tinha para onde voltar e expressou seu ódio por Saori. Não havia tempo para perseguir a garota que desapareceu novamente... O grupo, carregando sentimentos de impotência, entrou no antigo prédio da escola de Arius."
2688011438 = "Corredor Subterrâneo"
2182299148 = "O grupo encontrou com sucesso o corredor no subsolo do antigo prédio da escola. Enquanto avançavam, o esquadrão foi separado por uma coluna que desabou repentinamente. Diante de Saori, que ficou sozinha, surgiu Mika Misono, que havia fugido pouco antes. Pensando que não conseguiria lutar adequadamente se o Sensei e o esquadrão estivessem juntos, Mika riu, dizendo que destruiu a coluna para forçar um confronto um contra um. Assim, Saori e Mika ficaram frente a frente."
3611644228 = "Confronto"
3307253189 = "Saori e Mika ficaram presas do outro lado da coluna desabada. Saori disse ao Sensei para seguir em frente sem ela, e a batalha entre as duas começou. Enquanto isso, observando tudo, Beatrice falava com Seia sobre a luz sinistra que estava por vir a este mundo."
478233283 = "A Outra Nós"
2294972915 = "Derrotada na luta contra Mika, Saori relembrou os dias de Arius. Diante de Saori, que desabafava com arrependimento sobre o passado — seus dias de infância, o treinamento rigoroso, a partida de Azusa, e o fato de não ter conseguido acreditar na reconciliação com Trinity proposta por Mika, acabando por enganá-la e usá-la —, Mika chorou, lamentando que Saori era igual a ela, e que, se a matasse, provaria que não havia salvação para si mesma."
3895665603 = "Possibilidades Infinitas"
977567459 = "O Sensei, que apareceu diante de Mika e Saori, pediu desculpas por não ter explicado as coisas corretamente a Mika e disse que sempre há chances de recomeçar. Enquanto o Sensei encorajava as duas dizendo que elas tinham um futuro, Beatrice, que espionava a cena, enfureceu-se e declarou que começaria o ritual sem esperar pelo amanhecer."
3335292298 = "Possibilidades Infinitas"
1991311275 = "Enquanto isso, Seia, que vagava por um sonho acordado, encontrou uma certa pessoa no lugar onde pisou."
3974900296 = "Santa Bárbara"
3127069218 = "O Esquadrão de Arius enfrentava dificuldades contra Bárbara, da Sociedade de Justiça de Justina. No entanto, seus olhos ainda não haviam desistido."
382639264 = "Ao Santo dos Santos"
2623773402 = "Mika, decidida a lutar contra Bárbara no lugar do esquadrão, agradeceu ao Sensei e se colocou diante da Sociedade de Justiça. Sua expressão estava serena e cheia de determinação. O grupo deixou o local aos cuidados de Mika e correu para o Santo dos Santos."
3665603744 = "Ao Santo dos Santos"
3144918653 = "O Esquadrão de Arius e o Sensei chegaram ao Santo dos Santos da Basílica. Mal tiveram tempo de soltar um suspiro de alívio ao resgatar Atsuko do altar, quando se depararam com Beatrice, que os aguardava."
2941796748 = "Agnus Dei"
2991478379 = "Beatrice declarou que aquele ritual era um sacrifício necessário para o maior bem do maior número de pessoas, sendo um patamar que os adultos deveriam alcançar e um dever. O Sensei negou, respondendo que ele não era esse tipo de existência. Enfurecida com essas palavras, Beatrice revelou sua verdadeira forma e atacou."
1958381225 = "Agnus Dei"
1268369978 = "Derrotada pelo Esquadrão de Arius, Beatrice tentou, em desespero, reunir todas as forças militares presentes na Basílica. Enquanto repreendia Hiyori e as outras, que estavam assustadas com aquela aura, Saori enfrentou Beatrice."
3926608295 = "Kyrie para as Garotas (1)"
2994736897 = "No meio da batalha interminável contra a Sociedade de Justiça, Mika encontrou a sala do coro. Percebendo que Arius também recebia aulas semelhantes às de Trinity, Mika relembrou seu passado e cantarolou palavras de oração e hinos pelo Esquadrão de Arius. Diante de ainda mais membros da Sociedade de Justiça, suas costas, enquanto entoava o hino, eram mais dignas e belas do que qualquer outra pessoa ali."
3109022376 = "Kyrie para as Garotas (2)"
1925570620 = "Diante de Beatrice, que estava perturbada pelo Kyrie que ecoava no Santo dos Santos da Basílica, o Sensei disse que não poderia perdoá-la por ter levado os alunos ao abismo com ensinamentos falsos. Furiosa com essas palavras, Beatrice tentou sacrificar Saori para obter ainda mais poder."
294127303 = "Kyrie para as Garotas (2)"
1887669411 = "O Esquadrão de Arius finalmente conseguiu derrotar Beatrice. Eles resgataram Atsuko do altar e o grupo derramou lágrimas de alívio. Então, diante de Beatrice, que ainda respirava, Golconda, da Gematria, apareceu e, impiedosamente, anunciou que o plano havia falhado."
1335977955 = "Pessoa Preciosa"
3404775232 = "Saori, tendo resgatado Atsuko com sucesso, disse ao Sensei que ele poderia puni-la como quisesse. O Sensei, respondendo que não tinha intenção de puni-la e que ela deveria assumir a responsabilidade por sua própria vida, partiu, deixando-as para trás. Enquanto isso, Mika estava exausta diante da batalha interminável contra a Sociedade de Justiça e Bárbara. No momento em que estava prestes a desistir, o Sensei interveio e sacou o Cartão do Adulto."
960412593 = "Pessoa Preciosa"
2369141067 = "Diante dos alunos de Arius, que perderam o contato com Beatrice, alunos de Trinity, incluindo o Esquadrão de Socorro, apareceram das catacumbas. Mine 'socorreu' os alunos de Arius, que estavam em pânico, e partiu em busca do Sensei e de Mika."
3408302799 = "O Nosso Futuro"
2937481946 = "Com base nas palavras de Seia, que recuperou a consciência, Trinity uniu forças para salvar Mika e o Sensei. Assim, Mika conseguiu se reunir com Nagisa e Seia, e desabafou todos os seus sentimentos para as duas."
1220533937 = "Epílogo"
448684912 = "O esquadrão, tendo deixado o Distrito Autônomo de Arius para começar uma jornada errante, percebe que Saori desapareceu sem que notassem. No entanto, concordando que ela precisa de tempo, elas seguem em frente com suas próprias resoluções em mente. Enquanto isso, em Trinity, onde todos os incidentes chegaram ao fim, a audiência de Mika estava prestes a começar."
2575418392 = "Unidade especial fora de controle"
22033557 = "O Sensei, chamado por Rin, estava trabalhando na correção de documentos enviados ao Conselho Estudantil Federal. Lá, chega a notícia de que 'estudantes da Academia SRT, que deveria estar fechada, ocuparam o parque e estão realizando uma manifestação'. Como nem a Valkyrie consegue lidar com a situação, o Sensei acaba sendo convocado."
3594487595 = "Visitantes indesejados"
3574761045 = "Ao chegar ao local, o Sensei ouve a explicação da situação de 'Kanna', a chefe do Departamento de Segurança Pública da Academia de Polícia Valkyrie. Quem ocupa o parque é o esquadrão do 1º ano da Academia SRT, o 'Esquadrão RABBIT'. Para detê-las, o Sensei se une a Fubuki e Kirino, do Departamento de Segurança Pública, para enfrentá-las."
269659944 = "Visitantes indesejados"
3399601485 = "Sob a estratégia do Sensei, Fubuki, Kirino e as outras conseguem capturar o Esquadrão RABBIT. Ao perguntar a Kanna sobre o futuro delas, que mesmo presas não perdem o brilho no olhar, ela responde que serão interrogadas na Valkyrie. Ao ouvir que poderia participar do interrogatório se desejasse, o Sensei..."
3925139788 = "Circunstâncias individuais"
3147943515 = "Enquanto cada uma é interrogada, o Sensei fica responsável por Miyako, a líder do Esquadrão RABBIT. Ele pergunta se ela está insatisfeita com a vida atual, mas ela se mostra indiferente. Ao ouvir suas palavras, 'mesmo que as chances de vitória sejam baixas', o Sensei pergunta a Kanna se não há como reviver a Academia SRT, mas..."
3028720699 = "Outro lado da história"
2352385492 = "O Sensei é informado por 'Kaya', chefe do Gabinete de Defesa do Conselho Estudantil Federal, sobre a origem e a situação atual da Academia SRT. Ele descobre que, como a academia existia sobre um equilíbrio precário, sua restauração é difícil. No entanto, Kaya, dizendo querer evitar que elas, um grupo de elite, sejam perdidas, promete manter os dados de matrícula do Esquadrão RABBIT. Em troca, o Sensei é solicitado por Kaya a convencê-las, mas...?"
2002976807 = "Desconfiança persistente"
343907048 = "O Esquadrão RABBIT é liberado do interrogatório na Valkyrie. Embora o Sensei anuncie que todas estão livres e sugira que 'venham para o Schale', elas recusam categoricamente. Elas decidem voltar ao parque, que servia como base para a manifestação, e firmam sua intenção de continuar vivendo lá."
1691499850 = "Vamos começar a conseguir comida"
1706575867 = "Na manhã seguinte, o Sensei vai ver como está o Esquadrão RABBIT e descobre que elas estão com fome. Recusando o fornecimento de comida do Schale, ele entrega um bilhete dizendo: 'Aqui vocês podem conseguir comida sem depender do Schale'. O grupo, meio descrente, vai até o local indicado no bilhete e descobre que pode receber 'marmitas descartadas de lojas de conveniência'..."
3423941325 = "Operação Cenoura (1)"
3800690627 = "O problema da alimentação do Esquadrão RABBIT foi resolvido, mas o próximo desafio é a higiene. Para elas, que lamentam não conseguir tomar um banho decente, o Sensei sugere o método de banho em tambor de metal para quem vive ao relento. Percebendo que essa era a solução, elas iniciam a 'Operação Cenoura' para conseguir tambores."
1346916350 = "Operação Cenoura (2)"
2689011259 = "O Esquadrão RABBIT inicia a 'Operação Cenoura' para conseguir tambores descartados. No entanto, Saki se rebela contra as ordens de Miyako, que era a líder do esquadrão, deixando o clima interno tenso. Depois, Saki assume o comando temporariamente, mas elas encontram uma situação inesperada..."
1989812613 = "Operação Cenoura (2)"
1658521241 = "Embora tenham conseguido despistar os robôs de segurança, o Esquadrão RABBIT perde o contato com Miyu. Inspiradas pelas palavras do Sensei, Saki e Miyako usam os tambores para se esconder da visão dos inimigos e conseguem se reunir com Miyu com sucesso. E assim, as integrantes do Esquadrão RABBIT que voltaram ao parque desfrutaram de um banho há muito esperado."
4283874219 = "Sombras que se aproximam"
2057607723 = "Um dia, o Sensei ouve rumores de Kirino, durante uma patrulha, sobre um 'grupo de errantes com armas poderosas'. Pensando que talvez os rumores sobre o Esquadrão RABBIT estivessem sendo distorcidos, já que se tratava de um grupo que roubava sucatas na zona costeira, o Sensei tenta voltar ao Schale. Mas quem bloqueia seu caminho é...?"
2671061263 = "Sem posses e marmita de churrasco"
1248308752 = "O grupo de errantes que sequestrou o Sensei se autodenomina 'So-kaku-ko'. Defendendo a 'não posse' e sobrevivendo com marmitas descartadas, eles ficam furiosos por terem tido sua comida monopolizada pelo Esquadrão RABBIT, que chegou ao parque depois, e tentam negociar com elas. No entanto, a negociação fracassa e o Esquadrão RABBIT, guiado pela estratégia do Sensei, invade o esconderijo do 'So-kaku-ko'."
841964058 = "Sem posses e marmita de churrasco"
2664679563 = "Com o poder do Esquadrão RABBIT, o 'So-kaku-ko' é neutralizado com sucesso. Diante das integrantes que tentam vasculhar os espólios, o Sensei diz: 'Não tirem nada deles, se quiserem algo, eu mesmo comprarei'. Com sentimentos complexos, as integrantes do esquadrão voltam ao parque sem levar nada."
4069006275 = "Alerta de chuva forte"
3932457485 = "Uma chuva torrencial repentina atinge toda Kivotos. O parque onde vive o Esquadrão RABBIT também é inundado, e até os pilares da barraca, que elas tentaram segurar desesperadamente, desmoronam. Enquanto um clima de desistência paira no esquadrão, apenas Miyako não desiste e tenta lutar contra a chuva forte. Quando o Sensei ajuda Miyako em seus esforços, as outras integrantes, que observavam a cena, levantam-se uma a uma, conseguindo superar a tempestade."
3138235130 = "Fatura encharcada pela chuva"
1105239486 = "O Sensei [USERNAME] levou uma proposta de reparo das instalações do parque inundado ao Conselho Estudantil Federal, mas foi rejeitado pelos respectivos chefes, que disseram: 'Não podemos emprestar forças para estudantes da Academia SRT'. Nisso, ele ouve que, por ser uma área de reurbanização planejada, nem mesmo o pretexto de 'reparo de instalações' seria aceito. Até Kaya, sua última esperança, nega o pedido. Enquanto isso, o que é dito a Kaya após ela encontrar Kanna é..."
346541298 = "Inari-zushi"
283423853 = "A caminho do Parque dos Coelhinhos, o Sensei descobre, através de uma estudante que trabalha vendendo 'Inari-zushi', que o Grupo Kaiser está envolvido no plano de construção da 'Cidade dos Coelhinhos'. Com o Inari-zushi em mãos, ele vai ao parque e discute as estratégias futuras com o Esquadrão RABBIT."
2188950162 = "Troca de mercadorias"
1844122045 = "Moe, que como parte da unidade de suprimentos negociava com a Kaiser Industry há muito tempo, toma a iniciativa de propor a troca de armas, dizendo: 'Primeiro, vamos trocar as armas que foram inundadas!', mas descobre que alguém comprou todas as armas. No fim, embora não tenham conseguido negociar com a Kaiser, elas encontram alguém que compra armas usadas e conseguem resolver a situação."
1905614692 = "Uma derrota pequena e certa"
3583459890 = "O Esquadrão RABBIT, que conseguiu obter armas de alguma forma, recebe um aviso de Descartes, o líder do 'So-kaku-ko'. Ele diz que o Departamento de Segurança Pública da Valkyrie os atacou com armas que nunca tinham visto antes. É estranho que a Valkyrie, que deveria estar sofrendo com dificuldades financeiras, possua armas tão modernas... Enquanto todos inclinam a cabeça em dúvida, Kanna, a chefe do Departamento de Segurança Pública, aparece no Parque dos Coelhinhos—"
3162953850 = "Suborno"
251338756 = "Kanna exige que o Esquadrão RABBIT desocupe o Parque dos Coelhinhos. Tendo superado a situação por enquanto, o grupo especula que a razão pela qual a Valkyrie passou a ter armas poderosas de repente é porque fizeram um 'suborno' com a Kaiser Corporation, que está encarregada da reurbanização da Cidade dos Coelhinhos. O Sensei e o Esquadrão RABBIT decidem se infiltrar na 'Academia de Polícia Valkyrie' para investigar os registros de transações ilegais."
1172421243 = "Operação Trevo (1)"
2241435022 = "O Esquadrão RABBIT, infiltrado no prédio principal da Academia de Polícia Valkyrie, consegue encontrar os registros de transações ilegais na sala de arquivos. No entanto, devido a um erro de Miyu, o grupo acaba trancado no depósito...?"
140507024 = "Operação Trevo (2)"
3559020515 = "Preso sem conseguir abrir a porta nem por dentro nem por fora, o Esquadrão RABBIT cai em uma situação desesperadora. Miyako perde ainda mais a confiança como líder do esquadrão, achando que a culpa é de seu comando. Mesmo assim, encorajada pelas palavras gentis do Sensei, Miyako consegue levantar a cabeça. Com a mudança de perspectiva de que, se não podem abrir por dentro, basta soar o alarme para que abram por fora, o grupo consegue escapar da sala de arquivos."
1348297398 = "Operação Trevo (2)"
3884614313 = "Enquanto enfrentam as estudantes da Valkyrie que se reúnem devido ao alarme, o Esquadrão RABBIT corre em direção ao telhado, o ponto de fuga. Em seus olhos não havia desconfiança entre as companheiras, mas sim uma forte confiança mútua."
3001093634 = "Hora dos adultos"
549448127 = "Quem esperava o grupo no telhado era a própria Kanna, chefe do Departamento de Segurança Pública. Confrontada com as evidências das transações ilegais entre o Departamento de Segurança Pública e o Grupo Kaiser, Kanna diz: 'Não se pode continuar defendendo a justiça sem sujar as mãos'. Contra ela, Miyako declara que a forma como cada uma vê a justiça, e essa diferença, é o que separa a Valkyrie da SRT. A 'Operação Trevo' do Esquadrão RABBIT, de volta ao Parque dos Coelhinhos, foi um sucesso."
1089763991 = "Toca da raposa"
2732075377 = "O problema do suborno entre o Grupo Kaiser e a Academia de Polícia Valkyrie torna-se público, e a reurbanização da Cidade dos Coelhinhos é cancelada. O Esquadrão RABBIT e o Parque dos Coelhinhos começavam a recuperar a paz. Enquanto isso, Kaya, do Gabinete de Defesa do Conselho Estudantil Federal, estava prestes a iniciar um plano junto com o 'Esquadrão FOX'—"
2657253984 = "O sonho que a raposa vê"
2098684420 = "Dois anos atrás — quando a Academia Especial SRT acabava de ser fundada. A transmissão mostrava o Esquadrão FOX executando uma operação em uma fábrica de munições da Kaiser Industries. O tempo retorna ao presente — o Esquadrão FOX, que vinha realizando atos de sabotagem por todo o Kivotos, começou a se preparar para receber seus veteranos."
3818520446 = "O sonho que o coelho vê"
252378376 = "Tsukiyuki Miyako tem um sonho — sobre o motivo original pelo qual ela admirou a SRT, uma paisagem primordial que ela ainda não consegue esquecer. Encarando a realidade ao acordar, o dia a dia do Esquadrão RABBIT, que já se acostumou completamente a viver no parque, começa mais uma vez."
1519446641 = "Isca"
2004501637 = "O Esquadrão RABBIT desfruta de um momento agradável comendo carne bovina que o Sensei trouxe como agradecimento pelo incidente. Ao verificar as câmeras de vigilância da operação anterior, eles avistam uma sombra suspeita vestindo o equipamento da SRT. Pensando em como conseguiram o equipamento, já que ele não deveria sair da academia, o Esquadrão RABBIT se lembra de ter vendido equipamentos para um traficante de armas no passado e, para aliviar sua culpa, decide capturar o culpado secretamente."
2488756278 = "Reencontro inesperado"
2671501519 = "O Esquadrão RABBIT chega ao local alvo seguindo o sinal de GPS da arma. Embora comecem a dominar a área sem problemas, um ataque repentino faz com que a comunicação dos membros do esquadrão seja cortada, um por um. E então, quando Miyako se torna a última restante, ela acaba se reencontrando com uma pessoa inesperada."
942163621 = "A sombra da veterana"
3816355345 = "O Esquadrão RABBIT tem um encontro há muito esperado com as veteranas do Esquadrão FOX. Enquanto comiam Inari Sushi feito por Niko, elas compartilhavam notícias recentes. No entanto, o breve momento de diversão logo chega ao fim — quando Miyako pergunta o motivo do ataque, Yukino propõe que o Esquadrão RABBIT se junte ao Esquadrão FOX. Diante da confusão de Miyako e das outras, o Sensei, que chegou atrasado, diz: 'Me deem um pouco de tempo', e leva o Esquadrão RABBIT de volta ao Parque dos Coelhinhos."
2758921771 = "A angústia da veterana"
4159709149 = "De volta ao Parque dos Coelhinhos, o Esquadrão RABBIT reflete sobre o passado do Esquadrão FOX e pensa no motivo pelo qual suas veteranas mudaram tão repentinamente. Nesse momento, a transmissão do Conselho Estudantil Federal ecoa, anunciando que Kaya assumirá o cargo de representante do Presidente do Conselho Estudantil Federal no lugar de Rin."
1587683690 = "Golpe de Estado"
1212060240 = "Algumas horas antes do início da transmissão de Kaya — no Conselho Estudantil Federal, uma discussão acalorada estava ocorrendo sobre como lidar com as consequências do incidente ocorrido dias atrás. Depois disso, Rin, que terminou a reunião, é emboscada por Kaya e mantida em confinamento. Tendo assim assumido o controle da opinião pública do Comitê Administrativo, Kaya ocupou o assento de representante do Presidente do Conselho Estudantil Federal."
520211906 = "A nova representante"
3987261099 = "Respondendo à convocação de Kaya, o Sensei visita o Conselho Estudantil Federal. Kaya tenta conquistar o Sensei apresentando propostas de melhoria para os novos procedimentos administrativos, mas o Sensei recusa suas propostas."
1497265820 = "Uma nova manhã em D.U."
1641525659 = "Novas ordens administrativas são implementadas e guardas da Kaiser Security são destacados por toda D.U. A Kaiser Security usa as ordens administrativas como pretexto para encontrar falhas e levar cidadãos sob custódia. O Esquadrão RABBIT, ao testemunhar isso, tenta protestar, mas o General da Kaiser aparece e fala sobre poder, obediência e o valor dessas coisas."
1720696531 = "Fora de controle"
3618496825 = "Embora Kaya comece suas novas funções como representante do Presidente do Conselho Estudantil Federal, ela está sobrecarregada, tentando lidar com incidentes e acidentes que ocorrem por todo Kivotos. Em meio a isso, Minori, do Departamento de Obras da Academia Federal Red Winter, inicia um golpe de estado contra o Conselho Estudantil Federal."
115168734 = "Café preto"
3651125542 = "O Sensei, que caminhava pelo centro de D.U. para encontrar o Esquadrão RABBIT, testemunha uma inspeção rigorosa sendo imposta pelos guardas da Kaiser Security. Embora a situação tenha sido temporariamente contida graças à iniciativa de Kirino, que agiu para proteger os cidadãos, e à perspicácia de Kanna, que melhorou a situação sem lutar contra a Kaiser, as expressões de ambas não são nada alegres. Depois disso, elas contam ao Sensei que o caos está se espalhando por vários lugares devido às novas ordens administrativas."
2609050753 = "Determinação"
1905103418 = "O Sensei chega ao Parque dos Coelhinhos. No entanto, apenas o acampamento vazio permanece lá — ao encontrar uma carta de Miyako, o Sensei descobre que o Esquadrão RABBIT partiu em direção ao Esquadrão FOX."
1718431036 = "Choque e terror"
1319244017 = "D.U. e o Conselho Estudantil Federal estão em caos devido ao novo regime e às medidas administrativas. Para resolver essa situação, Kaya convoca o General da Kaiser e a líder do Esquadrão FOX, Yukino, e ordena a execução de um certo plano."
3006987774 = "O dilema do prisioneiro"
2130705949 = "O Sensei, que retornou ao Schale tarde da noite, descobre que a Angel 24 está sofrendo com a suspensão de pedidos de marmitas. Enquanto o Sensei retorna ao escritório sem conseguir comprar uma marmita, o Esquadrão FOX o visita, oferece Inari Sushi e revela o paradeiro do Esquadrão RABBIT."
1786519907 = "A justiça da SRT"
1305326365 = "Membros do Esquadrão RABBIT que terminaram o treinamento com suas veteranas e conseguiram um banho quente e uma cama segura. Embora devesse ser uma vida satisfatória, Miyako, que não consegue apagar uma ponta de ansiedade, encontra o Sensei durante a patrulha noturna."
2062986205 = "As circunstâncias do Sensei"
4072771013 = "Miyako conversa com o Sensei na sala de interrogatório. Ela admite que seguir Kaya não é um erro para o renascimento da SRT, mas ainda há hesitação em seus olhos. Nesse momento, ao saber do plano de explosão do subsolo da Estação dos Coelhinhos revelado por Yukino, Miyako decide cumprir a justiça em que acredita e deixa o Esquadrão FOX sozinha."
2788876369 = "Caminhada noturna"
318148566 = "No dia seguinte, o Sensei se reencontra com Miyako no Parque dos Coelhinhos. Miyako diz que o Esquadrão FOX pretende explodir a Estação dos Coelhinhos e que ela está indo para impedi-los. O Sensei vai com Miyako para a Estação dos Coelhinhos — e lá, eles encontram Descartes, que trabalha como guarda da Kaiser Security."
1554714519 = "Elite e elite"
1900114770 = "Embora Descartes tenha decidido cooperar com Miyako, eles não conseguem se organizar e são forçados a uma posição de desvantagem. No momento em que pensavam que cairiam em uma situação desesperadora, Kanna, Fubuki e Kirino estendem a mão para ajudar."
347599141 = "Elite e elite"
552425972 = "Miyako e o Sensei conseguem subjugar a Kaiser Security através da luta conjunta com a Valkyrie, com quem antes eram hostis. Enquanto elogiam as habilidades de CQB de Kirino, eles correm em direção ao subsolo da estação."
4105357213 = "Abismo"
2925617176 = "Miyako e o Sensei testemunham um silo gigante no subsolo da Estação dos Coelhinhos. Enquanto franzem a testa diante daquela visão horrível, eles descobrem um bastão luminoso usado pela SRT. Era a prova de que o Esquadrão FOX já havia chegado ao silo. Quando o drone de reconhecimento foi abatido e eles pensaram que tudo estava perdido ao perceberem a vigilância do Esquadrão FOX — os membros do Esquadrão RABBIT correm para o lado de Miyako."
965452976 = "Caverna de Calvanog (1)"
1568447496 = "O Esquadrão RABBIT inicia a operação 'Coelho de Calvanog'. Nos olhos de Miyako, que afirma com firmeza que não há plano alternativo caso a operação falhe, pode-se ver uma profunda confiança nos membros do esquadrão. Com seus respectivos sentimentos em seus corações, o Esquadrão RABBIT e o Esquadrão FOX se chocam."
1976030888 = "Caverna de Calvanog (1)"
3156367598 = "Diante do veterano Esquadrão FOX, o Esquadrão RABBIT luta utilizando táticas e estratégias incomuns ensinadas por suas veteranas. Graças aos seus esforços e táticas aprimoradas, o Esquadrão FOX é neutralizado, um por um. Assim, o Esquadrão RABBIT chega ao saguão do elevador que leva à sala de operações."
892239188 = "Caverna de Calvanog (2)"
2435344861 = "Yukino, ao saber que todos os outros membros do Esquadrão FOX foram neutralizados, ordena que elas evacuem para fora. E, para o Esquadrão RABBIT que chegou em frente à sala de operações, ela avisa que, se derem um passo sequer dentro da sala, explodirá o silo. No entanto, o Esquadrão RABBIT, sem se importar com as palavras de Yukino, começa a invadir a sala de operações."
3979027752 = "Nós de ontem e de amanhã"
1693248650 = "No momento em que Yukino estava prestes a pressionar o botão de detonação — os membros do Esquadrão FOX, que ela pensava terem evacuado, reúnem-se ao seu lado. Assim, a batalha final entre o Esquadrão FOX e o Esquadrão RABBIT começa em frente à sala de operações."
3373122807 = "Nós de ontem e de amanhã"
2860466848 = "Após uma batalha feroz, o Esquadrão RABBIT derrota o Esquadrão FOX. Miyako conta a Yukino o motivo pelo qual admirava a SRT. No entanto, para Yukino, que diz que não pode parar a explosão como uma forma de assumir a responsabilidade pelo peso excessivo que carregam, o Sensei fala como um adulto."
3729157719 = "Golpe de Estado fracassado"
875871241 = "Ao ouvir a notícia de que o Esquadrão FOX falhou em seu plano, Kaya fica confusa e tenta mobilizar a Kaiser Security, mas — diante do Esquadrão RABBIT unido, os soldados da Kaiser Security são derrotados sem qualquer chance de reação."
2757905344 = "Golpe de Estado fracassado"
340280301 = "O Esquadrão RABBIT e o Sensei se encontram com Kaya novamente. Embora ela tente persuadir o Sensei com todo tipo de lábia, todas as conspirações que ela planejou são expostas, resultando na perda de seu cargo."
696032468 = "Epílogo"
253503154 = "Após o fim de todos os incidentes, Kaya é destituída e todos os envolvidos são presos. Enquanto Niko cumpre sua rotina no Departamento Correcional, ela recebe uma carta e um Inari Sushi como presente. Ao ler a carta, ela abre um sorriso feliz."
2141989400 = "Prólogo"
3946132036 = "Tendo recebido um contato de Niya pedindo para que ele venha a Hyakkiyako, o Sensei decide ir até lá para encontrar pistas sobre Kuzunoha."
867945468 = "Um encontro inesperado (1)"
2534282816 = "Ao chegar em Hyakkiyako, o Sensei fica fascinado pela atmosfera da escola, que está diferente do habitual. Enquanto caminha pelo campus, ele vê uma garota discutindo com um delinquente... e o Sensei decide ajudar a garota."
784650514 = "Um encontro inesperado (2)"
1005886133 = "Yukari e o Sensei afugentam o delinquente. Depois de devolver a carteira recuperada ao dono, os dois decidem caminhar por Hyakkiyako. O clima de festival na escola se deve ao fato de estarem tentando recriar o \"Festival das Lanternas de Hyakkiyako\", que foi abolido há 20 anos. Enquanto caminham, Yukari é abordada por um criado e foge, deixando o Sensei para trás."
3919672259 = "No Departamento Yin-Yang"
2802641052 = "Na sala do Departamento Yin-Yang, o Sensei ouve de Niya sobre a carta de ameaça enviada pelo \"Departamento de Flores, Pássaros, Vento e Lua\". Niya diz que pode ser apenas uma brincadeira, mas que precisa da ajuda do Sensei. No momento em que o Sensei concorda em colaborar, um intruso aparece na sala."
3637226461 = "A autoproclamada elite, entra em cena!"
1078075001 = "Yukari chega à sala e conta que ouviu dizer que o Departamento Yin-Yang encontrou Nagusa no Grande Campo de Neve. Ela pede a Niya que a ajude na \"Batalha de Sucessão\" para substituir a presidente do Comitê Hyakka Ryoran... Niya pede ao Sensei que ajude na \"Batalha de Sucessão\" como representante do Departamento Yin-Yang, e o Sensei aceita."
2370772485 = "O próximo destino"
2706623289 = "Yukari decide desafiar a \"Batalha de Sucessão\" para reunir o Hyakka Ryoran. Como a \"Batalha de Sucessão\" exige a presença dos membros do Hyakka Ryoran, ela decide visitar a casa de Renge, sua veterana. No entanto, a casa de Renge está vazia e há apenas um bilhete deixado para trás."
3399810198 = "Garota da juventude (?) (1)"
1054335404 = "Renge desapareceu deixando um bilhete dizendo: \"Vou em uma jornada para recuperar minha juventude\". O grupo procura por vários clubes para encontrá-la, mas, embora encontrem vestígios de que ela esteve lá, não conseguem localizá-la. Enquanto descansam e discutem para onde ir a seguir, Kaede, do Clube de Treinamento, aparece diante do Sensei."
4196717210 = "Garota da juventude (?) (2)"
2076588919 = "O Clube de Treinamento estava inspecionando as instalações de Hyakkiyako a pedido do comitê organizador do festival quando encontrou o Sensei. Enquanto conversam, o Grupo Chimi invade o local... Em meio a uma atmosfera tensa, uma terceira voz interrompe a situação."
2273835101 = "Garota da juventude (?) (2)"
3687320158 = "O grupo consegue expulsar o Grupo Chimi. Quando Yukari corre até Renge, Renge arregala os olhos, surpresa."
3665538726 = "Fuwa Renge"
4273860323 = "Yukari pede a Renge que a ajude na \"Batalha de Sucessão\". No entanto, Renge diz friamente que o Hyakka Ryoran, que recebeu uma ordem de dissolução, já acabou. Mesmo assim, como Yukari insiste, Renge aponta sua arma para ela."
1700027356 = "Fuwa Renge"
3723106540 = "Yukari é dominada por Renge. Renge repreende Yukari, dizendo que o Hyakka Ryoran nunca mais voltará a ser como antes. Enquanto Renge deixa o local, os membros do Clube de Treinamento a seguem."
503705097 = "Bochechas vermelhas"
1747027451 = "Yukari, que estava deprimida pelo incidente com Renge, decide se recompor e procurar Kikyou, a estrategista do Hyakka Ryoran. No entanto, um criado aparece diante dela... O Sensei, que se separou de Yukari, encontra uma garota cercada pelo Grupo Chimi durante o festival."
2958590599 = "Apenas uma estudante"
3591646746 = "A garota que luta contra o Grupo Chimi está gradualmente em desvantagem. O Sensei aproveita uma abertura e a resgata. Depois de ouvir sobre a situação atual do Hyakka Ryoran da garota, que veste o uniforme do comitê, o Sensei observa as costas da garota enquanto ela se afasta, perdido em pensamentos."
398789845 = "Kiryu Kikyou e a Batalha de Sucessão (1)"
1542367438 = "No dia seguinte, o Sensei se junta a Yukari e visita a sala de mediação do Hyakka Ryoran para encontrar Kikyou. Yukari pede a Kikyou que a ajude na \"Batalha de Sucessão\", mas é recusada. Kikyou diz calmamente que Nagusa não voltará e que Yukari não tem habilidade suficiente. Como Yukari não desiste, Kikyou realiza a \"Batalha de Sucessão\" para mostrar a ela a realidade."
1013593128 = "Kiryu Kikyou e a Batalha de Sucessão (2)"
1716918261 = "Após derrotar Yukari, Kikyou a repreende, dizendo para parar com a \"brincadeira\". Ela diz que aquele não é um comitê para alguém que tem um lugar para onde voltar. Yukari, incapaz de suportar as palavras, vai embora, e o Sensei e Kikyou, que ficaram para trás, conversam sobre o futuro do Hyakka Ryoran. Enquanto isso, o Grupo Chimi, que reclamava por ter perdido para Nagusa, encontra uma garota com uma aura estranha..."
3225732755 = "A determinação da garota"
1744921907 = "Shizuko e o Sensei se dividem para procurar Yukari. Shizuko encontra Yukari e diz para voltarem juntas à sala de mediação. No entanto, Yukari responde que não pretende voltar e declara que dançará como uma sacerdotisa. Enquanto isso, o Sensei encontra uma garota misteriosa —"
3704592008 = "Encontro"
1747430871 = "A garota, que se identifica como membro do Departamento de Flores, Pássaros, Vento e Lua, revela o verdadeiro significado da carta que entregou e vai embora. Depois disso, o Sensei, que ouviu sobre Yukari de Shizuko, decide procurar Nagusa para entender o que aconteceu com o Hyakka Ryoran."
4268581401 = "Oryo Nagusa"
143447072 = "O Sensei aparece diante de Nagusa, que estava relembrando os tempos em que estava no Hyakka Ryoran. Nagusa revela sua verdadeira identidade e decide conversar com o Sensei. E no momento em que os fogos de artifício anunciam o início do festival, as \"Cem Histórias Fantasmagóricas\" aparecem."
644791031 = "A lenda urbana que caminha pela cidade (1)"
2513148571 = "Yukari veste as roupas de sacerdotisa e caminha em direção ao palco do ritual. Enquanto isso, Renge diz a Kikyou, que veio relatar sobre Yukari, que não tem mais interesse no Hyakka Ryoran e que não quer mais ser contatada. O Clube de Treinamento, observando a cena, pergunta se é isso mesmo que Renge quer fazer — nesse momento, as \"Cem Histórias Fantasmagóricas\" aparecem em várias partes de Hyakkiyako."
2982310612 = "A lenda urbana que caminha pela cidade (2)"
1779959641 = "Enquanto lutam na cidade mergulhada no caos, Nagusa conta ao Sensei sobre as \"Cem Histórias Fantasmagóricas\". Depois disso, os dois chegam ao local onde está o Clube de Treinamento. Enquanto Renge e Nagusa conversam — um intruso aparece com um grito estridente."
1944548097 = "O contador de histórias do Departamento de Flores, Pássaros, Vento e Lua (1)"
3436163381 = "Eles lutam contra uma grande sombra, mas nenhum dano é causado, deixando todos confusos. Nagusa deixa escapar que, para derrotar aquilo, é necessária a qualificação de presidente do Comitê de Mediação Hyakka Ryoran — nesse momento, Shuro aparece e lança palavras de desprezo a Nagusa."
3203640400 = "O contador de histórias do Departamento de Flores, Pássaros, Vento e Lua (2)"
1142989290 = "Sem se abalar com os ataques do Sensei e de Tsubaki, Shuro deixa o local dizendo que a situação já está seguindo conforme seu plano. Kurokage bloqueia o caminho do grupo que tenta perseguir Shuro."
930282140 = "O contador de histórias do Clube de Flores, Pássaros, Vento e Lua (2)"
790387478 = "À medida que o tempo para realizar a dança da sacerdotisa se aproximava, a melancolia de Yukari aumentava. No fim das contas, ninguém tinha a intenção de ouvir a vontade dela. No momento em que ela se desesperou com aquela situação de imposições arbitrárias — a garota ouve um sussurro doce."
4033191432 = "Mesmo assim, para você"
3274326348 = "Diante de um Kurokage contra o qual seus ataques não surtiam efeito, o grupo ficou sem opções. Nesse momento, Kikyou diz a Nagusa que \"apenas Nagusa, que possui a qualificação, pode salvar Yukari\". Com as palavras de Kikyou, Nagusa firma sua determinação de seguir em frente junto com o Sensei."
1742211216 = "Cidade envolta em chamas"
1706685059 = "Diante dos ataques incessantes da Centena de Histórias Fantasmagóricas, o Sensei e Nagusa são forçados a parar. Nesse momento, o Departamento de Yin-Yang e o Clube de Pesquisa de Ninjutsu aparecem para ajudar."
3155421652 = "Cidade envolta em chamas"
1197423923 = "Ao ver Yukari acordar, Shuro ri alegremente. Ela revela que a Centena de Histórias Fantasmagóricas, o \"Substituto Sem Rosto\", criado a partir do desespero de Yukari, mergulhou Hyakkiyako em um mar de fogo — e, diante de uma Yukari em choque, o Sensei e Nagusa aparecem."
3881819382 = "Palavras falsas"
415440099 = "Shuro imobiliza o Sensei com a Centena de Histórias e expõe diante de Yukari e do Sensei o que aconteceu na grande planície nevada, bem como o erro cometido por Nagusa. Tendo seu passado e segredos revelados, Nagusa perde a vontade de lutar e desmorona, mas — o Sensei dirige palavras a ela."
2046334446 = "Algo comum"
1314809181 = "Shuro grita que as palavras do Sensei para Nagusa são sofismas. Ela tenta atacar o Sensei, mas Yukari detém a lâmina fatal. A garota, que escolheu viver não como uma Kageyusa, mas como Yukari do Hyakka Ryoran, desafia o \"Substituto Sem Rosto\" junto com Renge e Kikyou."
3026137772 = "Algo comum"
2364647164 = "Mesmo com uma vontade forte, os três não conseguem ferir a Centena de Histórias — no momento em que enfrentam uma crise, Nagusa se levanta. Dizendo que não quer perder pessoas queridas como daquela vez, Nagusa libera a \"Prova\" do Hyakka Ryoran que recebeu de Ayame."
1918408273 = "Agora, para você"
3492807103 = "Shuro foge, e Yukari agradece por ter se reunido com todos. Então, Yukari desafia Nagusa para a \"Batalha de Sucessão\", que era seu objetivo original — no fim, ela não conseguiu vencer a batalha, mas, ainda assim, retorna ao Hyakka Ryoran junto com todos com uma expressão radiante."
2816211461 = "Com um desejo"
3813773295 = "Com o fim da série de incidentes, a paz retorna a Hyakkiyako. Embora ainda restem problemas, todos se unem para lançar as lanternas. Por outro lado — Kokuriko, do Clube de Flores, Pássaros, Vento e Lua, ri de forma suspeita na escuridão."
1478099875 = "Pontas dos dedos que não alcançam"
2417637268 = "Nagusa é atormentada por pesadelos, lembrando-se dos dias em que era chorona e do momento em que não conseguiu impedir Ayame na planície nevada. O braço que outrora foi engolido pelo crepúsculo sentia dores cada vez mais intensas —"
2900210047 = "Um novo conto de terror"
1286307520 = "Um membro do Clube de Flores, Pássaros, Vento e Lua visita Kokuriko e anuncia o início da história. Derrotada por Nagusa, Shuro toma emprestado um novo livro estranho dessa pessoa e jura vingança contra o Hyakka Ryoran."
2234435405 = "Um novo festival (1)"
2388749549 = "Enquanto todos se ocupam com os preparativos para o \"Festival Waku\", o Grupo Chimi, liderado por Arata, aparece no local para atrapalhar a realização do evento. No entanto, o Hyakka Ryoran chega ao local e a batalha começa —!"
1536773814 = "Um novo festival (2)"
1088037523 = "Como agradecimento por repelirem o Grupo Chimi, Yukari e os outros recebem bolinhos de castanha de Shizuko e do Comitê Organizador do Festival. Depois, enquanto o grupo do Hyakka Ryoran ajudava na montagem, descobre-se que o braço de Nagusa está em estado grave. Ao ver isso, Yukari diz que talvez seja possível tratá-lo na família Kageyusa..."
1501948804 = "O nobre da família Kageyusa"
2728089330 = "Riku, um médico suspeito que está hospedado na família Kageyusa, diz ser especialista em medicina interna, mas percebe de imediato que o braço de Nagusa está sendo consumido pelo crepúsculo. Para curar completamente, é preciso recuperar o corpo perdido. Com o passar do tempo, essa ferida corrói o corpo e a mente — ao ouvir isso, Nagusa começa a contar o que aconteceu com Ayame na grande planície nevada daquele dia."
756362788 = "A admiração está além das memórias"
3370516004 = "Nagusa tenta trazer Ayame de volta, que está obcecada por Kuzunoha. No entanto, Ayame diz a Nagusa que \"nunca a considerou uma amiga\" e desaparece. Depois, Kuzunoha aparece diante de Nagusa, que havia desmaiado, e a salva. — Os membros do Hyakka Ryoran não conseguem esconder a confusão diante da imagem cruel de Ayame descrita por Nagusa. Nesse momento, um mensageiro do Departamento de Yin-Yang aparece..."
1502304932 = "O festival e os preparativos"
2057092328 = "O Hyakka Ryoran é convocado por Niya junto com o Sensei, temendo pedidos irracionais. No entanto, a solicitação era para lidar com uma assombração que apareceu perto da \"Escola Filial Ebisu\", no Distrito Norte. Percebendo a semelhança entre a assombração e o Tsukumogami Fantasmagórico que apareceu em Hyakkiyako no passado, o grupo aceita o pedido. O Sensei também decide acompanhá-los para encontrar pistas sobre Kuzunoha."
1315750381 = "País da neve"
1205635506 = "O Sensei e o Hyakka Ryoran chegam ao Distrito Norte e são recebidos por Azami Habu, presidente do comitê autônomo da Escola Filial Ebisu. Enquanto são guiados por Azami, o grupo ouve testemunhos sobre a assombração que aparece com a forma de alguém que os observadores temem. À noite, todos aproveitam um breve descanso nas fontes termais. Nesse meio tempo, Nagusa reflete sobre o medo que carrega dentro de si —"
3601732457 = "Pesadelo (1)"
1301003702 = "Nagusa sofre com pesadelos onde Ayame aparece. Ao acordar, ela vê Shuro. Contra Shuro, que zomba dela enquanto invoca a Centena de Histórias Fantasmagóricas, Nagusa enfrenta a situação sem se abater."
2063888527 = "Pesadelo (2)"
639451166 = "Como os membros do Hyakka Ryoran chegaram para o resgate, Shuro tenta recuar. O grupo range os dentes por não conseguir capturar a rápida Shuro, mas... um disparo derruba Shuro. Quem disparou foi Ayame, que outrora guiava o Hyakka Ryoran e que Nagusa procurava incansavelmente."
3247570939 = "A presidente do comitê do Hyakka Ryoran"
2246015017 = "Kikyou questiona Ayame, que come alegremente. Ayame começa a contar como acabou indo para a grande planície nevada por não conseguir se perdoar, mas não se lembrava de ter dito palavras frias a Nagusa. Nagusa pensa que pode ter sido um erro de sua própria memória, mas Kikyou continua a olhar para Ayame com desconfiança."
3980407787 = "Memória incompleta"
2999571268 = "Ayame consegue capturar Shuro, que havia fugido, e ainda diz que já tem um palpite sobre a base do Clube de Flores, Pássaros, Vento e Lua. Enquanto Nagusa fica feliz com a atuação de Ayame, que parece a mesma de antes, Kikyou continua sentindo algo estranho em uma Ayame tão perfeita, e pergunta a Yukari, Renge e ao Sensei se eles não notaram nada suspeito."
1983223605 = "O caminho para a outra margem"
2421424457 = "A partir do guarda-chuva que serviu de protótipo para o Tsukumogami Fantasmagórico, Ayame descobre a base do Clube de Flores, Pássaros, Vento e Lua, a \"Mansão Higan\". O Sensei e Kikyou sentem receio de invadir sem preparo, mas, pressionados pelo ímpeto de Ayame e dos outros, acabam indo. No caminho, ao revistarem Shuro para ver se ela escondia algum livro estranho, um romance chocante escrito por ela é revelado."
1938968282 = "A sacerdotisa da família Kageyusa"
2793738644 = "O grupo chega à Mansão Higan e começa a investigar separadamente. Nesse meio tempo, Yukari encontra o brasão da família Kageyusa e um diário escrito por alguém. Nele, estava registrado o processo de como a garota que herdou o nome Kageyusa tornou-se presidente do Comitê de Mediação de Conflitos do Hyakka Ryoran e foi perdendo a esperança — Kokuriko aparece diante de Yukari, que está surpresa e confusa com o conteúdo."
3547088513 = "Na boca da serpente (1)"
2202995269 = "Kikyou e Renge, que estavam agindo separadamente, percebem que caíram em uma armadilha e tentam ir rapidamente até o Sensei. No entanto, um Tsukumogami aparece para impedi-los."
4125006944 = "Na boca da serpente (2)"
1777447729 = "Um Tsukumogami aparece diante do Sensei e de Azami, e Shuro se gaba de que tudo fazia parte de seu plano. No entanto, o Tsukumogami ataca até mesmo Shuro, que deveria ser sua aliada, e o Sensei acaba se ferindo ao protegê-la. Nesse momento, Kikyou aponta sua arma para Azami, tendo descoberto que ela é um membro do Clube de Flores, Pássaros, Vento e Lua —"
4101117820 = "O Artista de Histórias Bizarras do Departamento de Flores, Pássaros, Vento e Lua (1)"
369181728 = "Kikyou deduz que eles estavam sendo manipulados desde o início. Azami, ao elogiar sua perspicácia, revela ser a Artista de Histórias Bizarras do Departamento de Flores, Pássaros, Vento e Lua. Diante de Kikyou e Renge, que tentam desafiá-la para uma luta, Azami percebe o medo e a ansiedade escondidos em seu espírito de luta, incapaz de conter sua alegria."
3465264177 = "O Artista de Histórias Bizarras do Departamento de Flores, Pássaros, Vento e Lua (2)"
3362951369 = "Kokuriko aparece diante de Nagusa, que luta contra os Cem Contos que surgiram repentinamente. Nagusa não consegue aceitar a realidade, acreditando que o fato de Kokuriko ter levado Ayame embora não passou de um pesadelo. Diante dela, surge Ayame, com a mesma expressão fria daquele dia."
2480664873 = "O Fim do Doce Sonho"
677728044 = "Ao acordar na masmorra, Ayame diz a Nagusa que quem passou todo esse tempo com ela no Distrito Norte não foi ela mesma, mas uma sombra criada pelo Livro de Histórias Bizarras. Incapaz de aceitar a realidade, Nagusa ouve Ayame revelar que sempre detestou aqueles de Hyakkiyako que se agarravam a ela. E, além disso, que nunca a considerou uma amiga."
3145489761 = "Flor Artificial"
3797308812 = "Kokuriko elogia Shuro por seus esforços em capturar o Hyakka Ryoran e o Sensei. Embora Shuro esteja feliz, a imagem do Tsukumogami atacando-o e do Sensei tentando protegê-lo não sai de sua mente. Ignorando a ansiedade de Shuro, Kokuriko deixa a Mansão Higan em direção a Hyakkiyako."
2543498820 = "O Retorno da Presidente"
3151250892 = "Na véspera do Festival Waraku, enquanto Niya luta contra uma pilha de documentos, Ayame aparece. Ela diz que os membros do Hyakka Ryoran e o Sensei foram pegos por uma avalanche e que veio pedir socorro. No entanto, Niya suspeita de Ayame por ter deixado seus companheiros para trás e percebe imediatamente que se trata de uma sombra. Então, a verdadeira Ayame aparece..."
2863107133 = "Sonhos Diferentes no Mesmo Travesseiro"
779115510 = "Os membros do Hyakka Ryoran e o Sensei estão presos no subsolo da Mansão Higan. Nagusa se culpa por não ter conseguido entender Ayame. Shuro aparece e se gaba da vitória, mas ao ouvir que Nagusa encontrou Kuzunoha, sua expressão muda. Carregando dúvidas internas, Shuro tira o grupo da cela para que os guiem até Kuzunoha."
2017155360 = "Memórias da Outra Margem (1)"
3712861394 = "Em meio à grande planície nevada, o grupo segue em direção ao templo do crepúsculo. No caminho, Shuro não consegue esconder sua inquietação com as palavras do Sensei: 'Sua força não tem relação com proteger alguém'."
1189578546 = "Memórias da Outra Margem (2)"
1384145819 = "O lugar para onde Nagusa os guia é uma ruína decadente. Shuro fica furioso por ter sido enganado, mas quando Nagusa profere certas palavras, a ruína em ruínas se transforma em um espaço repleto de flores de cerejeira. E então, a figura de Kuzunoha, a dona do templo do crepúsculo, aparece..."
1768696395 = "A Verdadeira Forma"
998522113 = "Kuzunoha dá as boas-vindas ao grupo, repreende o Sensei por não ter respondido às suas cartas e ignora Shuro, que faz um escândalo. Quando Nagusa pergunta como trazer Ayame de volta, Kuzunoha diz que 'o que aconteceu uma vez não pode ser desfeito', aconselhando-a a parar de se afundar em sonhos efêmeros e a encarar a realidade."
2585962915 = "O Olhar"
2317210858 = "Quando era presidente, Ayame respondia aos pedidos de todos em Hyakkiyako com um sorriso, mas, ao se esforçar para ser perfeita, acabou esquecendo seu verdadeiro rosto. 'Agora é a vez de todos serem observados por mim', ela sussurra, abrindo as cortinas de um novo conto de cem histórias tendo Hyakkiyako como palco."
3121894829 = "O Festival Continua"
181107698 = "Kaho, ocupada com os preparativos do festival, fica surpresa com o surgimento de um Hitotsume em Hyakkiyako e corre para lidar com a situação. Quando parecia impossível realizar o Festival Waraku, o Clube de Pesquisa Ninjutsu aparece com uma mensagem de Niya para Kaho. A mensagem dizia: 'Continue como sempre'. Entendendo o significado, Kaho começa a agir para realizar o festival."
1157713290 = "Canção da Harmonia dos Quatro Lados (1)"
2624602144 = "O Comitê Organizador do Festival e o Clube de Pesquisa Ninjutsu decidem cooperar com Kaho, que declarou que o Festival Waraku aconteceria. Assim, para afastar o medo que cobria Hyakkiyako, o show especial de Chise foi realizado...!"
3836040692 = "Canção da Harmonia dos Quatro Lados (2)"
4240906566 = "Azami visita Niya na prisão. Enquanto o Hitotsume enfraquece devido à animação do festival, Azami continua se gabando de que tudo é inútil, mas Niya não perde a compostura. Nesse momento, fogos de artifício brancos são lançados na torre do castelo — o Hyakka Ryoran chegou para o resgate."
2248504721 = "O Lamento do Demônio é o Rugido de um Leão"
2051393425 = "Niya, os membros do Hyakka Ryoran e o Sensei se reúnem e iniciam uma reunião estratégica. Não adianta derrotar os Hitotsume se não derrotarem a fonte, Ayame. Nesse momento, Niya tem uma ideia brilhante: escrever o romance de Shuro no Livro de Histórias Bizarras em branco e materializá-lo. Assim, em meio à crise de Hyakkiyako, nasce o 'Leão de Chifre Único Mais Forte'."
2455577687 = "O Terceiro Livro de Histórias Bizarras"
1605542151 = "Kokuriko repreende Azami, que não consegue esconder sua raiva ao ver suas histórias de terror serem transformadas em comédia. O Hyakka Ryoran e o Sensei chegam ao local, mas Kokuriko, sem demonstrar qualquer abalo, usa o poder do livro para atrair todos para a escuridão..."
917558113 = "Do Fundo da Sombra Escura e Profunda"
1719928471 = "Yukari, Kikyou e Renge enfrentam seus próprios corações na escuridão e quase são engolidos pelo crepúsculo. Mas Nagusa é diferente. Tendo enfrentado suas próprias fraquezas, Nagusa estende a mão que deveria ter sido engolida pelo crepúsculo, contra-ataca Kokuriko e Azami, forçando-as a recuar. Com pressa, Nagusa pede ao Sensei que testemunhe sua luta contra Ayame."
688718966 = "A Ponta dos Dedos Agarrada"
3881859444 = "Nagusa desafia Ayame para a batalha de sucessão. Embora nunca tivesse vencido antes, desta vez Nagusa luta de igual para igual. 'Bastaria que a Ayame estivesse aqui', mas as palavras de Nagusa não chegam até ela, e a batalha se intensifica — no final, quem permaneceu de pé foi Nagusa. No entanto, apesar de ter alcançado seu objetivo de longa data, seus olhos estavam cheios de lágrimas."
2049244668 = "Esperando Juntos pelo Desabrochar"
2688582158 = "Após a resolução do incidente, o Sensei reencontra Niya, que está hospitalizada, e o Clube de Pesquisa Ninjutsu, que limpa o local do festival, celebrando a segurança de todos. Ao seguir para a sala do comitê do Hyakka Ryoran, todos estavam plantando sementes de flores. Dizem que, após o incidente, Ayame caiu em um sono profundo e não se sabe quando acordará. Mas Nagusa, respeitando a vontade de Ayame, continua esperando pelo dia em que as flores desabrocharão novamente..."
4000054078 = "O Nosso Lugar"
2422594773 = "Após aceitar um trabalho imprudente, Maia retorna à filial de Arius gravemente ferida. Subaru a recebe calorosamente."
532006653 = "O Dever do Estudante"
2547143426 = "Os membros do Clube de Reforço Escolar estavam ocupados se preparando para o Exame Geral de Trinity. Um exame criado por uma instituição externa para medir objetivamente suas habilidades. O Esquadrão de Vigilância, o Clube de Doces, o Comitê de Justiça, a Sisterhood... os outros membros de Trinity também reagiam de formas diferentes diante do exame. Nesse meio tempo, duas estudantes de Trinity pedem conselhos ao Sensei."
111254386 = "Dias como um Sonho"
1745328622 = "O Sensei não consegue esconder sua surpresa ao encontrar estudantes transferidas de Arius. Elas contam que, devido à sua origem, não entendem o sistema de exames e estão confusas. O Sensei decide responder como um adulto ao desejo delas: 'Queremos que as outras crianças que ficaram em Arius também tenham uma vida estudantil normal'."
3626524437 = "Aprendizado para Quem?"
584715180 = "O desejo de 'ter uma vida estudantil normal' também incluía os antigos membros do Esquadrão Arius. O Sensei convida Atsuko, Misaki, Hiyori e Saori para um navio de cruzeiro para falar sobre o exame. O esquadrão aceita positivamente, entendendo que conhecer o mundo é necessário para lutar e sobreviver. Lá, Nagisa, a patrocinadora do encontro, aparece."
1890488107 = "Desculpas"
4001607138 = "Os membros do esquadrão ficam confusos com a aparição repentina de Nagisa. Nagisa admite que a história de expulsar Arius por uma diferença de interpretação foi um erro de Trinity. Aceitando o desejo de Nagisa de que o Esquadrão Arius e as estudantes que permaneceram na filial de Arius sejam membros da sociedade, Atsuko e as outras tentam se aproximar."
2647279451 = "A Cadeira do Outro Lado"
2398297819 = "O Sensei também é convidado por Nagisa para dar aulas às estudantes de Arius e vai com Saori e as outras até a filial de Arius. Naquela época, Maia, embora fascinada pelo brilho do mundo exterior, dizia sentir fortemente que era um corpo estranho. Ao ouvir isso, Subaru revela seu estado de espírito: ela ainda não perdoou Trinity e o Esquadrão Arius..."
616126247 = "Gaita"
1590792391 = "Misaki fica perplexa com o cenário inventado por Nagisa, onde o conteúdo do exame chegaria à filial de Arius pelas mãos do esquadrão, enquanto Atsuko diz que devemos aprender com qualquer um que possa nos ensinar. Na filial de Arius, Subaru toca gaita a pedido das veteranas. E então, o Esquadrão Arius chega novamente à sua antiga escola. Subaru, embora cautelosa, as recebe."
3549962588 = "Estilo Arius"
2960207032 = "Surpresa, decepção, hostilidade... Vários sentimentos recebem o Esquadrão e o Sensei ao pisarem na filial de Arius. Lá, Saori reencontra Subaru e declara que vieram para que todos façam o exame. Os alunos de Arius ficam confusos. A discussão não chega a lugar nenhum, e o grupo decide realizar o \"exame\" proposto por Subaru. O Esquadrão Arius entra em combate."
441958419 = "Hora da aula"
1932143474 = "Após o confronto, o Sensei coloca os membros do Esquadrão no pódio para darem uma aula aos alunos de Arius. Saori ensina sobre contratos na sociedade com base em suas próprias experiências, Misaki ensina física, Atsuko biologia e Hiyori moda. Assim que a cautela dos alunos de Arius diminui, o Sensei também sobe ao pódio para que todos possam vivenciar a vida estudantil."
110027412 = "Feridas e cicatrizes"
3724148201 = "Quando está a sós com o Sensei, Saori pede perdão por suas ações passadas e desaba. Quando o Sensei a aconselha dizendo que \"mesmo com cicatrizes, é possível viver com elas\", Saori se esforça para tentar olhar para frente. Enquanto isso, Subaru confessa a Maia seu desejo de criar um lugar para todos, não importa os meios. Naquela noite, Saori é atacada por um agressor misterioso e cai no chão."
1000503757 = "Estudo do meio (1)"
2403340386 = "No dia seguinte, as aulas para os alunos de Arius continuam. Hoje, após um pequeno teste, haverá um estudo do meio. Os alunos de Arius, embora confusos, se divertem em um fliperama na cidade. Enquanto acompanha a aula, Subaru pergunta ao Sensei sobre \"como impedir alguém que deseja desistir da própria vida\". O Sensei, embora confuso, responde que, naqueles momentos, a pessoa sente que não pode se perdoar."
2055487567 = "Estudo do meio (2)"
967522754 = "Subaru desce um gatinho que não conseguia sair de cima de uma árvore usando o método Arius: assustar o gato com um tiro. No entanto, as pessoas ao redor ficam agitadas e, por serem alunas de Arius, lançam críticas cheias de preconceito contra elas. Depois, Maia e Subaru encontram duas integrantes da Patrulha e se sentem reconfortadas. Ao retornarem desse estudo do meio, por algum motivo, Mine e toda a Brigada de Socorro estavam reunidas na filial de Arius."
3636731330 = "Departamento de Serviço Sem Nome"
1212815035 = "Ao retornar do estudo do meio, a Brigada de Socorro estava na filial de Arius. A pedido do Sensei, Mine e as outras escondem suas identidades e começam a atuar como o \"Departamento de Serviço Sem Nome\", mas Subaru logo descobre a verdade. Mine entra em conflito ao entrar em contato com o ódio profundo de Arius. Ela toma uma decisão após conversar com o Sensei, mas... nesse momento, o som inquietante de uma trombeta ecoa."
2933749245 = "O som da trombeta"
1534532054 = "A Brigada de Socorro distribui suprimentos como voluntárias, e o Sensei se aproxima das feridas emocionais dos alunos durante as aulas. Misaki e Saori também começam a enfrentar o passado enquanto conversam com o Sensei. Nesse momento, junto com o som da trombeta, 4 \"Anjos do Apocalipse\" atacam. Para proteger os alunos, a Brigada de Socorro e o Esquadrão Arius decidem lutar juntos."
3173705092 = "Aquilo em que se acredita"
3227226913 = "Ao ser atacada pelo anjo, Mine é aprisionada em um mundo espiritual. Lá, ela enfrenta a história de perseguição e o ódio sofridos por Arius, sofrendo como membro de Trinity. No entanto, lembrando-se das palavras do Sensei, Mine percebe que o \"socorro\" em que ela acredita é o caminho certo e repele o anjo, mas acaba desmaiando por ter esgotado suas forças."
3405121082 = "Confiar os pensamentos"
109795470 = "Com o desmaio de Mine, a identidade da Brigada de Socorro é revelada. Alguns alunos de Arius que ouviram alucinações auditivas começam a causar tumulto, dizendo que aquele é o início do \"fim do mundo\" descrito no Apocalipse. Mine, ao recuperar a consciência, pede ao Sensei que proteja o \"cotidiano\" dos alunos de Arius e desmaia novamente. Em meio a isso, Atsuko deduz que a verdadeira identidade dos anjos são os \"Anjos do Apocalipse\"."
595564773 = "Basílica de Arius"
707791382 = "Subaru reúne os alunos de Arius na Basílica para discutir o fenômeno do Apocalipse. No entanto, as opiniões se dividem entre aqueles que ouviram o som da trombeta e aqueles que não ouviram. O conflito se intensifica entre a linha dura, que diz que o Sensei e os outros devem ser \"purificados\", e os moderados, que veem valor nas aulas. Maia, que expressou uma opinião moderada, torna-se alvo de ódio, e Subaru decide expulsar Maia para proteger Arius. Ambos choram com a decisão dolorosa..."
3321019633 = "Criança perdida"
4197219289 = "Aceitando o desejo de Mine, o Sensei decide continuar as aulas no dia seguinte. Naquela noite, Maia, desesperada por ter sido expulsa, procura o Sensei e acaba sendo protegida por ele. Enquanto isso, Subaru lidera os alunos de Arius em direção a \"Porta-Pasis\" para verificar a verdade sobre o Apocalipse. Na manhã seguinte, o Sensei e os outros ficam confusos ao verem que nenhum aluno de Arius apareceu para a aula, e Maia revela o destino de todos."
2868013820 = "Porta-Pasis (1)"
2701311459 = "Para obter informações sobre \"Porta-Pasis\", o Sensei decide pedir a sabedoria do Comitê de Biblioteca. Ui e Shimiko contam a história de que Porta-Pasis já foi um símbolo de paz, mas após a guerra civil tornou-se o arquivo de registros de Arius e atualmente está bloqueado. E Atsuko revela a existência do \"rito secreto\" de Arius escondido lá."
2431721991 = "Porta-Pasis (2)"
2479727769 = "Atsuko conta que fenômenos estranhos aumentaram em Arius desde que Beatrice visitou Porta-Pasis. Enquanto isso, Subaru, que chegou a Porta-Pasis, dirigia-se sozinha ao subsolo. Com o Sensei e os outros, Maia confessa o que aconteceu na noite anterior. Ui especula que apenas os alunos que aceitaram as aulas do Sensei ouviram o som da trombeta, levantando a hipótese de que os anjos seriam a materialização das emoções negativas de Arius."
1126610494 = "Apocrypha"
2406560706 = "Subaru descobre os \"Apócrifos\" de Arius no arquivo de registros de Porta-Pasis. Lá, junto com maldições contra Trinity, havia a descrição de que \"os anjos são seres que simbolizam vocês mesmos\". Nesse momento, Subaru tem uma visão do passado de Arius e ouve uma voz misteriosa. Enquanto isso, o Sensei e os outros corriam para Porta-Pasis..."
3885788221 = "Ninho (1)"
1536976133 = "O Sensei e os outros entram em confronto com os alunos de Arius fora de Porta-Pasis."
3079854232 = "Ninho (2)"
268023891 = "Subaru, no arquivo de registros, estava prestes a receber o \"poder da condenação\" de uma voz misteriosa. No meio da batalha, quando os alunos de Arius começam a duvidar do Sensei e dos outros, o som da trombeta ecoa duas vezes."
191984949 = "Discípulos (1)"
819645213 = "Dois novos anjos aparecem diante de Porta-Pasis. Com isso, o som da trombeta totalizou 6 vezes. Os anjos começam a atacar os alunos de Arius, e a hipótese de Ui de que aqueles que aceitaram as aulas do Sensei seriam considerados \"inimigos\" torna-se realidade. Para proteger seus companheiros de Arius, o Esquadrão enfrenta os anjos."
3659317844 = "Discípulos (2)"
2478483447 = "Derrotado pelos anjos e recuando, o Esquadrão é ensinado sobre um caminho secreto por um aluno de Arius que abriu o coração. No caminho para o arquivo de registros, Atsuko e Maia sentem um mal-estar misterioso. Subaru, que esperava no destino, guia o Sensei e os outros para outro lugar..."
467501222 = "Nosso ódio"
128005755 = "Confrontando o Sensei, Subaru despeja seu ódio pelo fato de Arius ter sido abandonada após o Tratado de Eden. Ela condena a escolha do Sensei de ignorar Arius para atender aos interesses de Trinity e declara que viverá pelo \"estilo de Arius\". Ela exige que o Sensei e o Esquadrão deixem Arius. Em meio a isso, Saori pergunta o que existe além do \"estilo\" de Subaru."
3404515189 = "Ainda assim"
1895929857 = "Saori reflete sobre seu próprio passado e aconselha Subaru de que não há nada além do ódio. E, para pagar por seus pecados passados, revela sua disposição de se entregar com todo o Esquadrão. No entanto, essa decisão é apenas uma traição para Subaru, e sua raiva por ter sido abandonada explode. Como se respondesse a esse ódio, uma nova ameaça surge, e o grupo entra em posição de combate."
2295943221 = "O anjo trompetista"
539919597 = "Derrotado na batalha contra o \"Anjo Trompetista\", o Esquadrão fica ferido. Cada vez que o som da trombeta ecoa, Arius é envolvida pela escuridão, e revela-se que a causa disso é Subaru, que perdeu a razão pelo ódio. Diante de Subaru, que mudou tanto que nem a voz de Maia a alcança, Atsuko diz: ela se tornou o \"Anjo Trompetista\"..."
1767825594 = "Sangue Real"
1703686333 = "Atsuko revela que o \"Anjo Trompetista\" é um fenômeno onde as emoções de Arius se materializaram, e que Subaru poderia ter se tornado o \"Juiz\" que as controla. No entanto, aponta que ela perdeu a qualificação ao abandonar sua subordinada, Maia, e entrou em descontrole. Ao ouvir isso, Maia, com seus sentimentos inalterados por Subaru, grita que ama a gaita da sua veterana."
2837190758 = "A gaita daquele dia"
3901852665 = "Os sentimentos puros entregues por Maia junto com a gaita abalam o coração de Subaru. No entanto, incapaz de suportar a culpa, ela se funde ao \"Anjo Trompetista\" e desaparece. Atsuko conversa com Subaru no mundo espiritual, mas a negociação fracassa. Atsuko tenta, então, uma \"conversa\" ao estilo Arius com Subaru."
940208950 = "Descendo ao mais baixo"
1386503884 = "Em meio à consciência flutuante, Subaru relembra os dias que passou com Saori. Ao acordar, Subaru é tocada pelas palavras do Sensei, por Maia e pelo Esquadrão que continuam acreditando nela sem mudar nada, e pelos alunos de Arius. Finalmente libertada do ódio do passado, Subaru decide dar um novo passo junto com todos."
2268459850 = "Tentativa"
2418512983 = "Embora confusas, Subaru e as outras aceitam o tratamento de Trinity. Ao ver a cena dos alunos de Arius sendo aceitos pelos alunos de Trinity e através de conversas com Mine, Subaru reafirma seus próprios pensamentos. Quando Maia pergunta se ela \"pode construir um novo ninho\", Subaru, com as palavras do Sensei no coração, decide seguir em direção ao futuro, não importa qual seja o resultado."
1911255380 = "Hora do Chá"
3554065651 = "Após o incidente, Nagisa revelou ao Sensei o plano de aceitar os alunos de Arius e compilar conjuntamente a história de ambas as escolas. Em resposta, o Sensei pediu desculpas novamente por não ter conseguido confiar em Nagisa no passado. Em uma atmosfera harmoniosa, Mika e Seia também apareceram, dando início a uma animada hora do chá com o Tea Party reunido pela primeira vez em muito tempo."
3711742589 = "Estudos para o Exame"
2447597939 = "Saori, que estava detida no Departamento Correcional da Valkyrie, foi informada por Konoka sobre sua liberdade condicional. As petições do Sensei, da Trinity e da Gehenna foram decisivas. Uma vez libertado, o Esquadrão, junto com Subaru, Maia e outros alunos de Arius, começou a estudar para o exame no antigo prédio escolar da Trinity. Os membros do Departamento de Aulas de Reforço também se juntaram, resultando em uma animada sessão de estudos."
3406215762 = "Ecclesia para o Futuro Deixado para Trás"
809303219 = "Despedidos pelo Sensei, os alunos de Arius enfrentam o exame com seus respectivos sentimentos no coração. Independentemente do resultado, após o exame, eles celebraram seus esforços. Mais tarde, Atsuko declarou a Subaru e Maia que o Esquadrão assumiria a reconstrução de Arius como um conselho estudantil temporário. Subaru também decidiu cooperar como membro do Comitê Disciplinar, e Arius deu um novo passo em frente."
3193525155 = "Prólogo"
2711878389 = "Uma crise sem precedentes chega a Kivotos — a cortina se abre para uma história que foi subvertida. Em um mundo que perdeu todos os seus elementos constitutivos — contexto, gênero e inevitabilidade —, o homem solta uma gargalhada."
798972658 = "Catástrofe"
2166272260 = "Seia sofreu ferimentos graves devido ao 'Colorido'. Quem a salvou foi a profetisa da Academia Hyakkiyako, Kuzunoha. Tendo oferecido sua visão do futuro para curar as feridas causadas pelo 'Colorido', Seia viu o fim de Kivotos em suas últimas lembranças... Por outro lado, o Sensei, que sonhou em ser baleado por uma garota com um halo erodido, conta a Rin, do Conselho Estudantil Geral, sobre o fim de Kivotos revelado por Seia e o conteúdo do sonho, sentindo um aperto no peito."
195800839 = "Fissuras no Cotidiano (1)"
3565621813 = "O Comitê de Contramedidas, ao testemunhar a entrada e saída frequente da Kaiser PMC no deserto de Abydos, que parecia ter se acalmado, decide pedir ajuda ao Sensei. Enquanto isso, o Departamento de Desenvolvimento de Jogos, após verificar que Alice não apresentava anormalidades em seu check-up médico, não tem certeza se a <key> desapareceu. Enquanto a sensação de que a paz recuperada em vários lugares está desmoronando pouco a pouco persiste, Himari encontra uma mensagem na sala particular de Rio dizendo: 'Prepare-se para fenômenos anômalos ainda maiores' —"
7652038 = "Fissuras no Cotidiano (2)"
2494494926 = "A audiência de Mika é realizada e o veredito é proferido. Por outro lado, os alunos que não aceitam a decisão continuam protestando... Observando esses protestos, o cotidiano do Departamento de Aulas de Reforço e do Clube de Doces do Pós-Escola continua pacificamente. Carregando uma leve estranheza com o passar dos dias —"
2262081318 = "Fissuras no Cotidiano (3)"
463599499 = "Desde que a reurbanização da Cidade dos Coelhinhos foi decidida, os arredores do Parque dos Coelhinhos ficaram sem repartições públicas e infraestrutura. Os membros do Esquadrão RABBIT estavam exterminando vespas a pedido dos moradores locais. Enquanto os dias pacíficos continuam — a Gematria realizava uma reunião de emergência."
1781985604 = "Presságio"
2245880881 = "O Conselho Estudantil Geral observou um corpo de energia misterioso e sem forma sobre Kivotos. Rin, que havia recebido o contato sobre o sonho premonitório do Sensei, decide convocar os representantes dos conselhos estudantis de cada distrito autônomo e estabelecer um Comitê de Medidas de Emergência por precaução."
3892096270 = "Convocação do Comitê de Medidas de Emergência"
3215056730 = "Enquanto a convocação do Comitê de Medidas de Emergência chegava aos conselhos estudantis de cada distrito, o Schale também recebia um contato do Conselho Estudantil Geral. Dizia que queriam que o Sensei viesse para reunir os alunos do Comitê de Medidas de Emergência — pouco tempo depois, o Sensei embarca no helicóptero que veio buscá-lo."
3439536052 = "A Chegada da Luz"
4086481199 = "O grupo do Comitê de Contramedidas estava se movendo para atender à convocação do Conselho Estudantil Geral. No caminho, Shiroko, ao notar movimentos suspeitos da Kaiser PMC, vai investigar sozinha — ao mesmo tempo, um meteoro cai no mundo de Arona, que protege o Sensei, que foi atacado pela PMC. Foi o início de um presságio sinistro —"
823044007 = "Conflito (1)"
1618045052 = "O Sensei foi salvo pelas mãos de Kanna e do Departamento de Segurança Pública. Enquanto aprendia sobre o ambiente em torno do Conselho Estudantil Geral que ocorreu enquanto estava preso, o grupo tenta sair — por outro lado, os alunos de cada distrito reunidos pela convocação de Rin acumulam insatisfação com o Conselho Estudantil Geral devido à ausência do Sensei... Nesse meio tempo, a moção de desconfiança contra Rin é aprovada."
2115087290 = "Conflito (2)"
897695044 = "Rin, tendo todos os seus poderes retirados devido à aprovação da moção de desconfiança. O Conselho Estudantil Geral, em caos, é invadido e subjugado pela Kaiser PMC armada. Assim, tudo em Kivotos foi dominado pela Kaiser PMC."
108917706 = "Fuga (1)"
2607711708 = "Após ouvir sobre os eventos que ocorreram durante sua ausência, o Sensei, que conseguiu recuperar com sucesso a Caixa de Shittim pelas mãos de Kanna, levanta-se para proteger a todos. Para ir o mais rápido possível até os alunos — até o Conselho Estudantil Geral."
2495439441 = "Fuga (1)"
2414405803 = "O Sensei, comandando os alunos do Departamento de Segurança Pública, escapou do perigo. Ele começou a correr com Kanna para escapar da base da Kaiser PMC."
3653117257 = "Fuga (2)"
2785523736 = "O grupo corre sob o comando do Sensei. No entanto, a desvantagem numérica contra a Kaiser PMC não diminui, e no momento em que pensaram que era o fim — o Esquadrão RABBIT, tendo recebido o contato de Arona, veio em socorro."
2819309745 = "Operação de Recuperação do Schale (1)"
2601430695 = "A Kaiser, que ocupou o Conselho Estudantil Geral, impôs lei marcial em toda a D.U. O grupo planeja uma operação para chegar até Rin, que teria sido presa no Schale, a fim de resolver essa situação. Assim, o grupo realiza a 'Operação de Recuperação do Schale'."
3120994840 = "Operação de Recuperação do Schale (1)"
4019116888 = "Com a ajuda dos alunos do Departamento de Segurança Pública, o grupo chega ao Schale em segurança. O Sensei, que conseguiu entrar em contato com Momoka e Ayumu, descobre onde Rin está presa e segue em frente."
444446759 = "Operação de Recuperação do Schale (2)"
3034106234 = "Diante da Gematria, que discute suas visões sobre a anomalia ocorrida em toda Kivotos, uma garota misteriosa aparece. Enquanto isso, o Sensei e os outros conseguem invadir o interior do Schale."
4088358757 = "Operação de Recuperação do Schale (2)"
429781151 = "Graças à atuação do Esquadrão RABBIT, a Operação de Recuperação do Schale foi um sucesso, e Rin foi resgatada em segurança."
3501090871 = "A História que Afunda"
2392777866 = "O Sensei e o Conselho Estudantil Geral, que conseguiram expulsar a Kaiser PMC e recuperar a autoridade da D.U. O Sensei, cuja comunicação esteve cortada por um tempo, recebeu vozes de preocupação dos alunos de cada distrito. Em meio a vozes cheias de alívio e alegria, Golconda — Francis, que se tornou uma figura distorcida, profere palavras terríveis ao Sensei."
4283014959 = "O Guia do Colorido"
2829819827 = "Enquanto o céu se tinge de escarlate e uma atmosfera incomum se espalha por toda Kivotos, o Sensei é informado por Kuroko de que o 'Colorido' chegou. Contra o Sensei, que pretende resolver a situação com o Cartão de Adulto, Kuroko deixa um aviso —"
2680676029 = "Reunião de Operação"
25032020 = "Os alunos que receberam o contato do Sensei se reúnem um após o outro, e decidem planejar a resolução da situação com Rin no centro. Para resolver esse fenômeno, é necessário destruir seis torres. Enquanto as funções de cada um foram decididas para a operação, o Sensei e Seia decidem procurar Kuzunoha para salvar as pessoas que tocaram o Sanctum. Ao ouvir isso, Niya se oferece para ficar responsável pela busca de Kuzunoha."
2666731161 = "Preparação para a Operação (1)"
1645668012 = "A operação para capturar o Sanctum da Falsidade começou. O Comitê de Contramedidas e a Conveniência 68 no deserto de Abydos; a C&C e Aimi, além de Tsurugi e Ichika do Comitê de Realização da Justiça, no distrito de ruínas de Millennium. O Departamento de Desenvolvimento de Jogos, Hina e o Esquadrão RABBIT ficaram responsáveis por Slumpia, e ficaram em espera."
420504687 = "Preparação para a Operação (2)"
2800486956 = "O Esquadrão de Arius, que conseguiu se reunir com Saori, também responde ao chamado do Sensei. O Sisterhood e o Esquadrão de Socorro ficaram em espera no 4º Sanctum, e embora a captura do 5º Sanctum estivesse difícil, conseguiram terminar em segurança com a cooperação do Departamento de Desenvolvimento de Fontes Termais. E o 6º Sanctum conclui a evacuação dos cidadãos em segurança. Niya instrui o Departamento de Pesquisa Ninjutsu a ir para o 'Grande Campo de Neve' na missão de procurar a presidente do Hyakkaryouran."
2772818858 = "Preparação para a Operação (3)"
2990932553 = "A preparação de cada Sanctum está completa. Agora, só resta iniciar a ofensiva. O sinal para o início da batalha foi dado."
3423693341 = "1º Sanctum: 'Deserto de Abydos'"
2046452490 = "No distrito do Deserto de Abydos, a Problem Solver 68 e o Comitê de Contramedidas iniciam a攻略 do 1º Sanctum."
1927454599 = "Defesa do Distrito Autônomo de 'Shanhaijing'"
4210922202 = "Para defender Shanhaijing, o Plum Blossom Garden, o Alchemist Research Council e a Xuanwu Business Alliance foram mobilizados para evacuar os alunos e realizar a defesa. Kisaki, a líder da Xuanlongmen, observava esses movimentos e, como apoio, enviou Mina para auxiliá-las."
3817181433 = "Defesa do Distrito Autônomo de 'Red Winter'"
4286816204 = "Marina lidera a Guarda de Elite e Minori, junto com os membros do Departamento de Obras, parte para a batalha de defesa da Academia Federal Red Winter. Embora a Classe Especial 227 seja responsável por orientar a evacuação dos alunos para o abrigo, Cherino não é vista em lugar nenhum da academia."
3231049307 = "2º Sanctum: 'Área Fechada nos Subúrbios de Millennium'"
1633487982 = "A C&C desce como tropas de paraquedistas. Elas invadem o centro da fábrica de munições, e Tsurugi fica encarregada de impedir o avanço das forças inimigas pela linha de frente. Com a promessa de se encontrarem diante de Chesed, a攻略 do 2º Sanctum começou."
3392176268 = "Defesa do Distrito Autônomo de 'Hyakkiyako'"
2047690688 = "A Hyakkiyako Alliance Academy inicia a batalha de defesa com força total. Até mesmo os alunos da Moryo Troupe, que geralmente não se dão muito bem, unem forças. Foi, verdadeiramente, o momento em que a academia se tornou uma só."
1895070652 = "Defesa do Distrito Autônomo de 'Gehenna'"
2484586467 = "O Comitê Disciplinar se reuniu para defender o distrito da Academia Gehenna. Todos os membros estavam presentes, exceto Hina, que estava攻略 o 3º Sanctum. Nesse meio tempo, Satsuki, do Pandemonium Society, aparece de repente, exibe suas habilidades de hipnose e vai embora."
874433887 = "3º Sanctum: 'Parque de Diversões Abandonado'"
440838892 = "O Esquadrão RABBIT, o Departamento de Desenvolvimento de Jogos e Hina se reúnem diante do parque de diversões fechado do 3º Sanctum. O Departamento de Desenvolvimento de Jogos prepara a máquina dedicada da UZQueen e começa a攻略 do Sanctum."
3984911413 = "Defesa do Distrito Autônomo de 'Trinity' (1)"
2457016360 = "Para defender o distrito da Trinity General School, o Comitê de Justiça, o Comitê de Biblioteca e a Brigada de Autodefesa, entre outros, avançavam com a evacuação dos alunos e a interceptação dos inimigos. No entanto, diante da quantidade avassaladora de inimigos e prevendo uma guerra de desgaste, o Tea Party aparece galantemente para oferecer ajuda."
1058019105 = "Defesa do Distrito Autônomo de 'Trinity' (2)"
660632900 = "Quando a batalha de defesa do distrito da academia estava quase terminando, Mashiro percebe que Koharu está lutando sozinha perto das ruínas. Ao saber disso, Hasumi e Mika partem para o resgate de Koharu."
3990749649 = "Defesa do Distrito Autônomo de 'Trinity' (2)"
3821969501 = "Mika, tendo resgatado Koharu com sucesso, recebe agradecimentos dos membros do Comitê de Justiça."
3708980353 = "4º Sanctum: 'Basílica nas Catacumbas'"
2859655258 = "Para a攻略 do 4º Sanctum, Hanako e a Sisterhood se reúnem diante da basílica dentro das catacumbas. O Arius Squad decide oferecer ajuda. Sakurako, vestida com o traje da Seiva Society, também se junta ao grupo, e a攻略 do 4º Sanctum começa."
2432640477 = "Defesa do Distrito Autônomo de 'Millennium'"
2053587049 = "O Departamento de Engenharia se reuniu para a defesa do distrito de Millennium. No momento em que estavam prestes a começar a defesa, um AMAS de proprietário desconhecido aparece — e eles iniciam a defesa do distrito de Millennium junto com o AMAS."
3508513666 = "5º Sanctum: 'Arredores da Cidade Fortaleza de Eridu'"
1997816141 = "O Seminar se reuniu nos arredores da cidade fortaleza de Eridu para a攻略 do 5º Sanctum. Enquanto isso, o Departamento de Desenvolvimento de Fontes Termais, enquanto ajuda na攻略 do Sanctum, tenta escavar uma nova fonte termal."
2129916519 = "No meio do Grande Campo de Neve"
277931373 = "O Departamento de Pesquisa Ninjutsu chegou ao Grande Campo de Neve para cumprir uma missão especial ordenada por Niya. Embora tivessem ouvido que a influência do Sanctum da Falsidade era fraca ali, encontraram os 'Guardiões Sem Nome' enfileirados. No momento em que parecia ser o fim, um visitante inesperado aparece dos céus para ajudar."
1644926925 = "No meio do Grande Campo de Neve"
1124497200 = "Graças ao Pandemonium Society, o Departamento de Pesquisa Ninjutsu conseguiu evitar o pior. Eles partem para retomar sua missão especial. Assim, o Pandemonium Society também decide que concluiu sua própria missão e vai embora."
4129642388 = "Defesa do 'Distrito D.U. Shiratori'"
1310011068 = "Como a existência de um guardião para o 6º Sanctum ainda não foi revelada, o quartel-general decide reforçar a defesa ao redor do distrito D.U. Shiratori. O Gourmet Research Society fica responsável pela defesa, mas... além disso, os Kaitengers estão operando ao redor do distrito e oferecem ajuda."
581030933 = "Defesa do 'Distrito D.U. Shiratori'"
1263686991 = "Os Kaitengers, talvez por terem alcançado seu objetivo original, retiram-se um a um. Enquanto isso, Himari avisa Toki, que trabalha sem parar, para não exagerar."
3816433260 = "Batalha de Defesa Final: 'Schale'"
3712581761 = "A preparação para o ataque simultâneo dos guardiões de todos os Sanctums, exceto o 6º, está completa. Ao mesmo tempo, no momento em que a preparação de defesa de todos os distritos é concluída — muitos Guardiões Sem Nome aparecem perto de Schale. Quando tudo parecia perdido, eles recebem ajuda inesperada e a batalha de defesa começa."
3792371391 = "Batalha de Defesa Final: 'Schale'"
4154633485 = "A preparação para a batalha de攻略 do 'Sanctum da Falsidade' está completa. Em breve, a contagem regressiva para o ataque total começará —"
1690517337 = "Um encontro inesperado"
1535882269 = "Destruíram todos os Sanctums e conseguiram recuperar o céu azul. Diante do grupo, uma certa pessoa aparece."
762919617 = "Papel"
411556707 = "O Departamento de Pesquisa Ninjutsu encontrou Nagusa, uma garota vestindo o uniforme da Hyakkaryouran, no Grande Campo de Neve de Hyakkiyako. Enquanto isso, Shiroko aparece diante do Sensei e diz: 'Não se pode mudar um destino que já foi decidido'."
1367106300 = "Incidente"
2890072437 = "Um corpo de energia de altíssima concentração é observado novamente acima de Kivotos. Apenas a energia é detectada, sua forma real não pode ser capturada... Como isso coincide com os presságios do surgimento do Sanctum da Falsidade, um choque percorre o grupo. Ao rastrear o fluxo de energia, descobre-se que existe uma estrutura misteriosa a 75.000 metros de altitude."
3531850351 = "Método"
2437317342 = "Mísseis de cruzeiro deixados em Eridu são disparados contra a estrutura a 75.000 metros de altitude, mas todos passam direto. Como resultado da análise, descobre-se que é impossível atacar por meios físicos, deixando-os sem saída. O Sensei visita Kuroko para tentar encontrar uma maneira de atacar."
267855655 = "O que reside em Abydos (1)"
1729905057 = "O nome da estrutura a 75.000 metros de altitude é 'Arca de Atra-Hasis', um legado da civilização antiga, e Kuroko revela que o 'Plana Pathes', o Guia das Cores, está dentro dela. Não que não existam contramedidas, mas se esse método for usado, o Sensei sofrerá danos irreparáveis. Ao Sensei, que responde que já estava preparado desde o início, Kuroko conta a história da 'Nave Principal de Utnapishtim' enterrada no Deserto de Abydos."
1811510733 = "O que reside em Abydos (2)"
2105960912 = "Ao descobrirem que o que a Kaiser PMC estava escavando no deserto de Abydos era a relíquia de uma civilização antiga, o \"Navio Principal de Utnapishtim\", o grupo parte em direção ao deserto de Abydos."
4076541312 = "O que reside em Abydos (2)"
1035243973 = "E assim, finalmente, eles encontram o \"Navio Principal de Utnapishtim\" no local de escavação da Kaiser PMC."
3561957851 = "Navio Principal de Utnapishtim (1)"
2790127767 = "Tendo encontrado o Navio Principal de Utnapishtim em segurança, estudantes de várias academias se reúnem para analisar sua estrutura interna. Em meio a elas, Kei emite um aviso para Alice."
1997883390 = "Navio Principal de Utnapishtim (2)"
1562900906 = "Graças aos esforços do Clube de Engenharia, o manual de operação do navio foi concluído. Com ele, é possível fazer o navio voar a 75.000 metros de altitude. Por outro lado, Himari e Rio conseguiram criar um método para romper a barreira que protege a Arca. O grupo prepara-se para conquistar a \"Arca de Atra-Hasis\"."
947511423 = "Briefing"
1309794530 = "Assim, o plano para a \"Batalha de Ocupação da Arca de Atra-Hasis\" é finalizado. O Sensei torna-se o responsável geral pelo navio, e nove estudantes, incluindo membros do Conselho Estudantil Federal, participam como operadoras. A taxa de sucesso da operação é de 3%. A missão que decidirá o destino de Kivotos está prestes a começar."
1095169701 = "A última noite na superfície"
3567564752 = "A operação começará em 8 horas. Com seus próprios sentimentos no coração, a última noite na superfície vai chegando ao fim..."
1605244826 = "Para muito além dos céus"
743266950 = "Com os trajes de operadora prontos e renovando suas determinações, o \"Navio Principal de Utnapishtim\" decola com o grupo a bordo, visando a Arca a 75.000 metros de altitude."
1510466922 = "A história do começo"
206962437 = "O contragolpe da \"coexistência de estados\" realizada pelo \"Navio Principal de Utnapishtim\" atinge o Sensei. Com a consciência se esvaindo, o Sensei tem um sonho sobre um futuro que poderia ter acontecido... Enquanto isso, um incidente ocorre na Arca, deixando o navio em uma situação crítica."
440319067 = "A qualificação de \"Herói\" (1)"
2333920900 = "Um novo eixo criado pela \"Arca de Atra-Hasis\". Para rompê-lo, não há outra forma a não ser a interferência da própria \"Arca\", que é uma existência idêntica... Em meio a esse impasse, Alice se levanta."
3249116561 = "A qualificação de \"Herói\" (2)"
4072004648 = "Tendo aceitado seus próprios poderes e a existência de Kei, Alice ativa a \"Arca\" por vontade própria. Assim, a \"Supernova de Atra-Hasis\" fortalecida pulveriza a \"barreira multidimensional\" da Arca."
535154781 = "Invasão"
2875406175 = "O grupo avança pelo buraco na barreira aberto por Alice e consegue invadir o interior da \"Arca\" com sucesso. No entanto, o que os aguardava eram os inimigos que defendiam a Arca. Para proteger o navio dos inimigos, as estudantes se levantam."
37805264 = "Batalha de Ocupação da Arca de Atra-Hasis"
3286452789 = "Quando o grupo termina de eliminar os inimigos que os atacaram, Shiroko aparece. Interrompendo o combate, Shiroko desaparece para algum lugar. Rindo e dizendo que se continuarem com a operação da Arca, eles se encontrarão algum dia, o grupo inicia a batalha de ocupação da Arca."
2495904841 = "Contra-ataque"
2599365756 = "Veritas estava preparando a sequência de autodestruição da Arca. Tudo o que restava era explodir a Arca e retornar à superfície... Em meio à alegria do grupo, o som da ativação da sequência de autodestruição ecoa impiedosamente. Sim, sem que percebessem, o navio havia sido hackeado pelo inimigo. Mais uma vez, o céu de Kivotos se tinge de vermelho e o mundo se inclina em direção ao fim. Para superar essa situação, o Sensei confronta Plana-Pathes."
1490470304 = "O destino selado"
1765923020 = "O Navio Principal de Utnapishtim é hackeado e a sequência de autodestruição é ativada. Em meio ao desespero, o Sensei, que confrontava Plana-Pathes junto com Shiroko, descobre a verdadeira identidade delas..."
3647243136 = "Resistência (1)"
2615819851 = "Tendo conseguido impedir a sequência de autodestruição graças a Rio, o grupo elabora um plano para deter o hackeamento de Utnapishtim. A última operação, carregada com os desejos de cada uma, tem início."
3257700775 = "Resistência (2)"
3695169812 = "Devido à influência do \"Sanctum da Falsidade\" que se manifestou na superfície, a sequência de autodestruição que havia sido contida volta a operar. No entanto, o \"Sanctum da Falsidade\" não foi detectado em nenhum dos locais previstos... Toki, que havia percebido o incidente, parte para lidar com o Sanctum."
3387237276 = "Resistência (3)"
2048912704 = "Toki, que enfrentava o Sanctum sozinha, estava chegando ao seu limite. Enquanto isso, com a aceleração do tempo de supressão, eles conseguem, de alguma forma, desconectar a Arca."
828369729 = "Uma solução fácil"
4054721821 = "Tendo desconectado a Arca com sucesso e recuperado o controle, o grupo respira aliviado. Rio ordena que Toki se retire, mas Toki, que operava no limite, desmaia no local. Diante dela, que ri dizendo que não esperava por reforços, a C&C chega para socorrê-la."
2057330540 = "Condições equivalentes"
1214415501 = "Desta vez, a última \"sequência de autodestruição\" é ativada. Enquanto cada uma prepara sua sequência de fuga, o Sensei e Plana-Pathes retiram seus \"Cartões de Adulto\" e se confrontam."
2106964121 = "Mesma situação, mesma escolha"
248567209 = "O Sensei envia Shiroko de volta à superfície usando a última \"sequência de fuga\" que havia sido deixada para ele. Arona tenta salvar o Sensei, que cai junto com a Arca, mas não consegue alcançá-lo, e ele continua em queda livre... A outra Arona, enviada para a sala de aula pelo último desejo do Sensei, estende a mão para Arona, dizendo que as duas farão um milagre acontecer."
301154037 = "O ponto de partida de todos os milagres"
3245849038 = "O Sensei consegue retornar à superfície em segurança graças ao milagre realizado por Arona e a outra. Então, Shiroko e a outra Shiroko conversam sobre memórias, e a máscara é confiada a ela. Quando Shiroko pergunta se pode permanecer neste mundo, Shiroko ri, dizendo que o Sensei dará um jeito."
3096659346 = "Epílogo (1)"
2589530285 = "O trabalho de restauração avança no Distrito Shiratori de D.U., e o mundo retorna calmamente ao cotidiano. O Clube de Desenvolvimento de Jogos descobre um arquivo de salvamento chamado <Kei> e o leva até Himari para transferir os dados para um pequeno pingente. Enquanto isso... Kaya, da Sala de Defesa, mantinha uma conversa secreta e perturbadora com a Kaiser."
1378875601 = "Epílogo (2)"
1401260434 = "Toda a situação se resolve e o cotidiano de cada uma retorna. Enquanto o Sensei recebe uma carta de Kuzunoha através de Niya, Rin recebe uma carta sem remetente."
2819824296 = "Pós-história (1)"
3130167285 = "Arona e Plana passam a viver juntas na Caixa de Schale. O Sensei conversa com as duas enquanto planejam o futuro."
1389029183 = "Pós-história (2)"
2385825589 = "Francis escrevia palavras sobre o desfecho desta história. Enquanto isso... Plana termina de provar por que ela é uma existência semelhante, porém diferente de Arona."
1243927570 = "Nascimento"
1589381619 = "Decalcomanie, que observava a tela de telemonitoramento em um bar antigo, obtém uma nova percepção durante o diálogo."
3168557994 = "Carta da Presidente do Conselho Estudantil Federal"
4191685078 = "Com a ajuda dos executivos, Rin estava cumprindo suas funções como representante do Conselho Estudantil Federal. Enquanto refletia sobre a Presidente do Conselho Estudantil Federal durante o trabalho, Rin se lembra de uma certa carta. Dentro do envelope, havia fotos que registravam os dias do Conselho Estudantil Federal. No entanto, uma única foto em preto e branco, mostrando uma paisagem que Rin não reconhecia, estava misturada entre elas."
3623875494 = "Sonho Estranho"
1715689698 = "Quando o Sensei acordou no Schale, o incidente já havia começado. Não havia sinal de estudantes, e Kivotos havia perdido suas cores, tornando-se monocromática. Ao chegar ao escritório da Presidente do Conselho Estudantil Federal, o Sensei encontra uma garota com uma aura misteriosa. No entanto, antes mesmo de perguntar sua identidade, um som eletrônico desperta a consciência do Sensei, e um novo dia começa novamente."
1888812381 = "Trapezoedro Brilhante"
4098329356 = "As garotas que estavam em missão em alto-mar descobriram um fragmento de vidro que emitia uma luz estranha."
4128684242 = "O Feriado da Administradora-Chefe (1)"
3255574769 = "Os executivos do Conselho Estudantil Federal planejavam fazer Rin, que estava sempre sobrecarregada de trabalho, descansar. Rin recusou, dizendo que não tinha tempo para folgas, mas Aoi e as outras já haviam se antecipado e tomado providências. Relutantemente, Rin decide aproveitar o curto feriado que lhe foi concedido de repente. O Sensei foi o escolhido para ser o supervisor durante o feriado."
274943668 = "O Feriado da Administradora-Chefe (2)"
1711221830 = "O Sensei aproveita o feriado percorrendo D.U. com Rin. No entanto, Rin se preocupa com o trabalho em vários momentos e acaba mencionando assuntos do Conselho Estudantil Federal. Para mudar de assunto, mesmo que à força, o Sensei leva Rin a um fliperama. O Sensei desafia Rin, que diz ser sua primeira vez, mas ela pega o jeito instantaneamente e o derrota. Ao jogar, Rin se lembra de um conhecido que não via há algum tempo."
182317656 = "Gambito da Rainha"
1354224060 = "Rin e o Sensei visitam o Departamento Correcional para encontrar Kaya, que está presa. Diante da postura inalterada de Kaya, Rin propõe uma partida de xadrez. Enquanto jogam, eles relembram o golpe de estado, e Kaya fala sobre o \"Cajado de Schaled\" que ela tirou do Schale naquela época. Embora, para Kaya, fosse apenas um smartwatch, de acordo com os registros da Presidente do Conselho Estudantil Federal, ele possuía a capacidade de discernir a verdade."
1861570067 = "Nostalgia Cor de Céu"
2238102298 = "Após terminar a visita a Kaya, Rin retorna ao Conselho Estudantil Federal e encontra o \"Cajado de Schaled\" no depósito. Guardado dentro da Arca, parecia apenas um smartwatch, mas no momento em que Rin o toca, um pequeno milagre acontece. Quando Rin recupera a consciência ao ouvir uma voz chamando por ela, a figura de uma garota loira que se autodenomina Presidente do Conselho Estudantil Federal estava diante dela."
1121617851 = "Erro de Memória"
3900724871 = "Ao acordar do sono, uma garota desconhecida se autodenominava Presidente do Conselho Estudantil Federal. Embora Rin pensasse ser uma brincadeira, ela fica chocada ao ver que os executivos do Conselho Estudantil Federal tratam a garota como a Presidente. Com as memórias sobre a \"Presidente do Conselho Estudantil Federal\" desaparecendo do mundo, Rin pede ajuda ao Sensei. Felizmente, o Sensei, assim como Rin, a reconhecia como uma pessoa diferente."
3528020198 = "O Retorno do Super-humano"
3251654458 = "A autoproclamada Presidente do Conselho Estudantil Federal e o Sensei dizem que não sabem nada um sobre o outro. Rin pergunta o que ela estava fazendo durante o tempo em que esteve desaparecida, mas ela responde que suas memórias estão confusas e não consegue responder. A discussão não chega a lugar algum, e o Sensei decide observar a situação por enquanto. Depois disso, a autoproclamada Presidente demonstra habilidades excepcionais, resolvendo os problemas de Kivotos um após o outro. Uma atmosfera de alívio por ela ter retornado começou a se espalhar."
4150457986 = "Pareamento"
3940272632 = "Plana fala com o Sensei após ele deixar o Conselho Estudantil Federal. Ela diz que, pelo fato de a garota não conseguir reconhecer a ela ou a Arona, ela é uma impostora. Buscando uma pista para resolver a situação, Arona e Plana tentam parear com o \"Cajado de Schaled\" e, com a conexão estabelecida com sucesso, uma nova função é liberada na \"Caixa de Shittim\". Nesse momento, Plana detecta que alguém os seguia, e quando o Sensei se vira, Rin estava logo atrás."
562672561 = "Imagem Falsa e Inferência"
1001704649 = "Rin e o Sensei saem à cidade para procurar alguém que se lembre da antiga Presidente do Conselho Estudantil Federal. Apesar de perguntarem repetidamente, não encontram ninguém que se lembre dela. Nesse momento, eles obtêm informações valiosas de Mai, que encontram por acaso."
4291342361 = "Boa Noite, Sr. Orwell"
2194592478 = "Rin e o Sensei visitam um bar antigo. Lá estava Decalcomanie. Enquanto a Nova Cabeça relembra o que os membros da Gematria tentaram fazer, ela diz que a \"mídia\" é o poder que define a nova era. Após a conversa, a Nova Cabeça se apresenta como Orwell."
68071874 = "Baile de Máscaras"
2049815982 = "Orwell apresenta a mídia como um meio de resolver o que está acontecendo em Kivotos agora. O Sensei duvida da afirmação de que a mídia pode distinguir o verdadeiro, mas, sem outras pistas, decide seguir a proposta de Orwell por enquanto."
1141893095 = "Baleia Adormecida"
1071953312 = "Hoshino chama o Sensei sob o pretexto de organizar materiais, para criar uma base secreta para tirar uma soneca dentro do depósito."
3096054116 = "Manhã de Preguiçoso"
2514639115 = "Hoshino, que tirou uma soneca à vontade na sala de aula, começa a procurar tesouros no campo com o Sensei."
3534890387 = "Fraco, mas brilhante"
687709314 = "Enquanto procuravam tesouros na escola no meio da noite, o Sensei encontra um adesivo fluorescente em forma de peixe. Quando ele dá de presente, Hoshino fica muito feliz."
3392633652 = "Patrulha da Meia-noite"
1781335004 = "O Sensei, que encontra Hoshino por acaso na estrada à noite, descobre que ela patrulha a cidade secretamente todas as noites pela segurança do local."
3089484350 = "Como agarrar a sorte"
748794093 = "O guia que Hoshino comprou na livraria continha um bilhete de sorteio para ingressos do aquário como brinde. Infelizmente, o bilhete não foi premiado, mas o Sensei compra mais 50 exemplares do mesmo livro para continuar tentando até ganhar."
1287455689 = "Aquário!"
1182596744 = "Com o bilhete premiado em mãos, o Sensei e Hoshino vão se divertir no aquário. Eles passam um tempo agradável enquanto observam os peixes do aquário."
1659730423 = "Ingresso para qualquer lugar"
823938156 = "Hoshino chama o Sensei e diz que vai emprestar o travesseiro que ela sempre usa. Com a textura muito macia, o Sensei cai no sono imediatamente. Hoshino sussurra para o Sensei, que está dormindo, coisas que ela não conseguia dizer normalmente."
772933003 = "Ajudando no trabalho de meio período"
306418223 = "O Sensei vai à cidade para ajudar Serika a distribuir panfletos em seu trabalho de meio período. Ao ver Serika trabalhando com tanta dificuldade, o Sensei decide distribuir panfletos secretamente nos bastidores."
1065594543 = "Trabalho noturno pesado"
2879956728 = "Serika e o Sensei decidem fazer um trabalho de meio período como segurança noturna, protegendo a entrada do prédio a noite toda."
2794306484 = "Capinando no parque"
2993178327 = "Serika decide fazer um trabalho de meio período arrancando ervas daninhas no parque junto com o Sensei."
3688572742 = "Percepção tardia"
57915122 = "Enquanto limpava o parque, Serika percebe que está gostando de trabalhar com o Sensei."
2323863848 = "Sorte inesperada"
2376289702 = "Tendo terminado seu trabalho de meio período mais cedo do que o esperado, o Sensei e Serika passeiam pelas barracas do mercado noturno e passam um tempo agradável juntos."
1234311581 = "Um breve descanso"
1846022614 = "Serika desmaia devido ao excesso de trabalho de seus turnos consecutivos, e o Sensei decide deixá-la faltar ao trabalho para cuidar dela. Tendo recuperado suas forças, Serika senta-se em um balanço no parque e revela um pouco de seus sentimentos verdadeiros que ela vinha escondendo."
1604922941 = "Bolsa favorita"
1348486067 = "A bolsa preciosa de Serika é destruída durante um combate repentino. Ao visitar uma loja de consertos com o Sensei, ela revela que aquela era a bolsa que comprou com seu primeiro salário. Com a bolsa reparada em mãos, Serika sorri alegremente."
1974828165 = "Esteira de corrida"
472444615 = "Pela manhã, o Sensei encontra Shiroko para fazer compras. Shiroko sugere que eles vão correndo, e o Sensei concorda, mas acaba exausto devido à distância maior do que o esperado."
4290065928 = "Uma pequena distância"
3912456663 = "Após a corrida, Shiroko fica preocupada com o cheiro de suor e acaba mantendo distância do Sensei. Shiroko fica confusa, já que o Sensei não percebe o motivo disso."
1760556289 = "Bicicleta de estrada"
1275905591 = "Em uma loja de bicicletas, Shiroko e o Sensei passam um tempo agradável conversando sobre novas peças."
157262830 = "Metrô"
3007279150 = "O Sensei encontra Shiroko por acaso em uma estação de metrô bem longe de Abydos. Shiroko conta ao Sensei que está planejando um passeio de longa distância."
2507710158 = "Passeio pela cidade"
3505609892 = "Shiroko observa a cidade do topo de um prédio enquanto planeja um assalto a banco. Ao ver isso, o Sensei a repreende, dizendo que o crime não é aceitável."
2464084323 = "Entrevista individual"
2008779368 = "O Sensei chama Shiroko para repreendê-la por seu comportamento imprudente habitual. Shiroko fica nervosa com a entrevista repentina, mas ao perceber que o Sensei está preocupado com ela, sente-se aliviada e feliz."
248513908 = "Prevenir é melhor que remediar?"
3206543840 = "A caminho da escola Abydos, o Sensei encontra Shiroko por acaso e eles seguem juntos. Shiroko diz que conseguiu um drone e, ao vê-la disparar mísseis contra delinquentes que causavam problemas, o Sensei a aconselha a não usar o drone com tanta frequência."
2219405563 = "Que encontro casual"
923721089 = "O Sensei e Nonomi se encontram por acaso nos arredores de Abydos. Eles decidem ir comer um parfait juntos."
3468758278 = "Hora da limpeza"
2022208209 = "Chegando cedo à sala do Comitê de Contramedidas, o Sensei e Nonomi decidem fazer uma limpeza geral no local."
1361707422 = "Hora de retribuir"
628470444 = "Indo a um shopping longe da escola Abydos, Nonomi e o Sensei escolhem presentes para os membros do Comitê de Contramedidas. Após as compras, ao voltarem para a sala, Nonomi tira secretamente um limpador de ouvidos que comprou como presente e começa a limpar os ouvidos do Sensei."
273794540 = "Jogar é divertido"
3260525698 = "O Sensei começa a jogar Othello para ajudar Nonomi com seu treinamento, mas acaba perdendo várias vezes devido à habilidade inesperada dela."
1938906934 = "Vamos ficar saudáveis"
148008888 = "O Sensei e Nonomi trabalham classificando os halteres que compraram por peso."
2260462853 = "Preparando a cerimônia do chá"
2609741974 = "Na sala do clube de cerimônia do chá, que não é usada há algum tempo, o Sensei e Nonomi procuram itens que possam ser usados, mas ficam preocupados por não encontrarem nada."
2355740806 = "Caderno secreto"
1906697160 = "Na sala do Comitê de Contramedidas, Nonomi escrevia em sua lista de desejos. Quando o Sensei pergunta o que é, ela explica que é um caderno com as coisas que ela quer fazer com todos do comitê."
2951685534 = "Cidadã exemplar"
1611256425 = "Maki é levada à delegacia por fazer grafite em propriedade privada, e o Sensei é contatado para buscá-la. Maki reclama que as pessoas não entendem sua alma artística, mas pede desculpas para não causar problemas ao Sensei."
3090443160 = "Hackeamento suspeito"
3395943859 = "Maki hackeia um quiosque para instalar e jogar jogos retrô, mas acaba sendo pega pelo Sensei e levando uma bronca."
364389697 = "A linha tênue entre o tolo e o gênio"
2442185520 = "Após tirar uma nota baixa em um teste na Millennium Science School, Maki recebe aulas particulares do Sensei. Enquanto luta com questões de literatura moderna, ela mostra lampejos de genialidade ao memorizar literalmente todo o conteúdo do caderno."
350096205 = "Atividade de embelezamento"
2708563886 = "No caminho da escola, Maki descobre uma parede suja e cheia de lixo, limpa-a e, sem o Sensei saber, faz um grafite. O Sensei vê a cena, mas entende a intenção de Maki; após limparem a parede juntos, eles decidem ir pedir desculpas ao dono da parede."
1003290137 = "Lembrança eterna"
3714205214 = "O dono da parede onde Maki fez o grafite gosta da arte dela e pede que ela desenhe em outras paredes. Maki e o Sensei passam um tempo divertido desenhando grafites juntos."
96680612 = "Você é meu mestre? (1)"
2929931893 = "Durante uma missão, Akane salva o Sensei, que estava sendo perseguido pelo Grupo Capacete. Akane cumprimenta o Sensei enquanto se lembra de quando se conheceram."
4136338484 = "Você é meu mestre? (2)"
1808933988 = "Sobre a primeira vez que Akane e o Sensei se conheceram. Akane, que interpretou mal a palavra 'limpeza' como um código para assassinato de VIPs, fica um pouco insatisfeita ao descobrir que o Sensei realmente queria uma limpeza literal, mas ainda assim limpa o escritório do Schale com perfeição."
3512349930 = "Tempo caminhando juntos"
2541546715 = "Akane estava perseguindo o Grupo Capacete, mas eles escapam por pouco. No entanto, ela encontra o Sensei por acaso logo depois e fica feliz, pensando que, mesmo após um fracasso, uma sorte ainda maior surgiu. Nesse momento, o Grupo Capacete aparece novamente diante deles, e desta vez, eles conseguem capturá-los com sucesso."
1225828462 = "A Empregada Adormecida"
1332057090 = "Akane e o Sensei conseguiram invadir o prédio da Kaiser Corporation, mas acabaram sendo capturados e confinados pelos funcionários. Ambos são pegos pela explosão causada pelos funcionários, mas graças ao Sensei, que protegeu o corpo de Akane, ela consegue escapar ilesa."
211557474 = "Bom dia, Mestre"
3773167144 = "No início da manhã, Akane visita o escritório do Schale para acordar o Sensei, mas a situação toma um rumo embaraçoso."
1160899660 = "Dando as boas-vindas a uma tarde brilhante"
613679375 = "Como um presente por ter ajudado na missão anterior, Akane decide servir um chá para o Sensei."
204930277 = "O uniforme preto"
2456463672 = "Enquanto costura a bainha da saia que rasgou durante a operação, Mashiro fala sobre o uniforme preto do Comitê de Justiça."
1919817649 = "O que é justiça"
638853668 = "Mashiro, que pegou emprestado um livro sobre justiça, discute com o Sensei sobre o que realmente significa ser justo."
1461678656 = "O teste do atirador (1)"
1751577586 = "Para melhorar suas habilidades de tiro, Mashiro pede a ajuda do Sensei para realizar um treinamento. Como parte do exercício, ela tenta resistir a cócegas, mas acaba se irritando quando o Sensei toca em seu pescoço."
3085822654 = "O teste do atirador (2)"
3501406577 = "Mashiro e o Sensei continuam o treinamento para melhorar a pontaria. O Sensei, que teve que subir e descer escadas carregando um pesado tubo de munição, acaba exausto pelo peso."
872429701 = "A realização da justiça"
4188898275 = "Mashiro estava esperando no telhado da Academia Trinity para uma missão de sniper. Ela se concentrou sob o sol escaldante esperando o alvo aparecer, mas descobre que o alvo já havia sido capturado no dia anterior, tornando todo o seu esforço em vão."
534884064 = "Fumaça e tolos gostam de lugares altos"
27311898 = "No telhado de um prédio em Kivotos, o Sensei encontra Mashiro por acaso. Eles conversam e passam um tempo agradável juntos."
2024630372 = "Verdades aprendidas com o passado"
1135538242 = "O Sensei visita Trinity e encontra Mashiro lendo. Ao perguntar, descobre que ela estava lendo um livro sobre a origem de provérbios e expressões idiomáticas. Ela diz que gosta de provérbios porque eles contêm mensagens de justiça, e quando o Sensei demonstra interesse, Mashiro fica muito feliz."
587639145 = "Hora do lanche"
555265990 = "Um e-mail que deveria ter sido enviado às crianças do Jardim de Infância Plum foi enviado ao Sensei por engano de Shun. Shun pede desculpas ao Sensei quando ele visita o jardim e eles passam um tempo agradável comendo frutas."
1235064322 = "Depois de comer, escove bem os dentes"
1212581455 = "O Sensei e Shun decidem ensinar às crianças do Jardim de Infância Plum a importância de escovar os dentes. Após a aula, Shun usa a inspeção de escovação como desculpa para observar cada canto da boca do Sensei."
1104721180 = "Eu ainda não tenho essa idade!"
2518280333 = "Shun fica deprimida após Kokona dizer algo como 'você já tem idade para isso', e o Sensei tenta consolá-la."
541355867 = "Brincando de aviãozinho"
2710406827 = "Shun vê por acaso as crianças do Jardim de Infância Plum brincando com o Sensei. Depois que todas as crianças vão embora, Shun pede ao Sensei, de forma manhosa, que brinque com ela também."
3562536085 = "Escolhendo um presente"
4219239495 = "Em um grande shopping de Kivotos, Shun e o Sensei escolhem presentes para as crianças do Jardim de Infância Plum. Depois de muito pensar, decidem comprar um bolo grande para levar."
2538754249 = "Uma soneca doce depois da tarde"
546306698 = "Vendo que o Sensei está exausto do trabalho, Shun sugere que ele tire uma soneca no Jardim de Infância Plum. Ao lado do Sensei que dorme, Shun canta uma canção de ninar e eles passam um momento relaxante."
3676557931 = "Regulação de temperatura"
2692432267 = "Assim que a operação termina, Eimi tenta tirar a roupa ali mesmo por causa do calor. O Sensei a impede enquanto sugere que ela tome um sorvete."
3548321794 = "Pesquisando as últimas tendências (1)"
1150093050 = "Para se manter atualizada, Eimi pergunta ao Sensei o que as garotas gostam ultimamente. Eles discutem várias coisas, mas nenhum dos dois consegue chegar a uma conclusão concreta."
3558259779 = "Pesquisando as últimas tendências (2)"
3529527109 = "Para se manter atualizada com as últimas tendências, o Sensei acompanha Eimi ao karaokê. O canto dela era surpreendentemente bom."
2376132403 = "O toque final da moda"
2400059281 = "Eimi e o Sensei visitam uma loja de lingerie no shopping. O Sensei tenta desesperadamente impedir Eimi de tirar a roupa íntima sem entrar no provador."
1697884784 = "Ferimento"
1923076069 = "O Sensei cuida de um ferimento que Eimi sofreu durante a operação."
3878318917 = "Vento quente"
3297514869 = "O Sensei sai com Eimi para investigar um fenômeno anormal no deserto perto de Millennium. Como resultado da investigação, não havia problemas graves, mas ambos sofrem com o calor. Eimi diz que, se continuarem assim, terão insolação e saca uma invenção especial..."
1892946756 = "Bem-vindo ao laboratório de Saya!"
1855404410 = "Como os membros do Clube de Pesquisa de Alquimia fugiram recusando os experimentos suspeitos de Saya, ela chama o Sensei para convencê-lo a tomar seu novo remédio. Quando o Sensei toma o remédio, seu corpo inteiro começa a brilhar em dourado..."
3516083753 = "O elixir da imortalidade"
1288335934 = "Saya diz que finalmente completou o remédio da imortalidade e faz o Sensei tomá-lo novamente. No entanto, o remédio faz com que pelos cinzentos cresçam por todo o corpo, e ao ver a aparência transformada do Sensei, Saya foge de tanto medo."
3136929583 = "Remédio para dieta"
2670545658 = "Como agradecimento pelo experimento anterior, Saya convida o Sensei para comer lámen. Vendo Saya comer alimentos gordurosos sem problemas, o Grupo do Capacete pergunta como ela consegue comer tanto. Saya entrega ao grupo um remédio de dieta especial (?), mas devido aos efeitos colaterais extremamente fortes, o grupo acaba desmaiando."
2005157098 = "Queijo na Armadilha"
993975792 = "Saya e o Sensei decidem jogar um jogo de tabuleiro usando modelos de queijo. Embora entenda que é apenas um jogo, Saya fica tão hipnotizada pelos modelos de queijo que não consegue evitar uma sequência de derrotas."
1919898173 = "Poção do Amor"
1899438040 = "Saya pensa em testar sua nova criação, uma poção do amor, no Sensei. No entanto, enquanto a transportava, o frasco quebra acidentalmente e Saya acaba sendo afetada pela poção. Devido ao efeito, ela confunde o Sensei com um queijo e morde o braço dele."
501439135 = "Nezu-suke Desaparecido"
2792815660 = "Certo dia, Nezu-suke, o rato de estimação de Saya, desaparece de seu laboratório. Saya se culpa, achando que ele fugiu por causa dos maus-tratos que ela lhe dava, mas, na verdade, Nezu-suke só tinha ido buscar sementes de girassol distribuídas pela Associação Genbu. Os dois reafirmam sua amizade e têm um reencontro emocionante."
1851884916 = "Dia de Sorte"
3648098592 = "No momento em que o Sensei tenta pegar uma moeda de 500 ienes que encontrou na rua, Nodoka aparece do nada e afirma que a viu primeiro. Ao perceber a situação financeira precária de Nodoka durante a discussão, o Sensei decide pagar um doce sofisticado para ela."
2791336820 = "Diário de Observação"
1263129030 = "Nodoka é flagrada observando o Sensei com um telescópio no telhado do prédio em frente ao Schale e acaba recebendo uma punição disciplinar."
1922924090 = "Um Lugar para Ver a Chuva de Meteoros"
2229103612 = "Nodoka fica deprimida por achar que não conseguirá ver a chuva de meteoros hoje devido ao céu nublado. Para animá-la, o Sensei sugere que eles assistam do telhado do Schale, já que lá é mais alto que as nuvens."
2111847187 = "A Chuva de Meteoros e os Desejos"
3938426849 = "Nodoka e o Sensei passam um tempo agradável juntos enquanto observam a chuva de meteoros do telhado do Schale."
389141647 = "Em Busca das Nuvens"
2169575525 = "O Sensei encontra Nodoka por acaso na estação de metrô. Ela estava a caminho de observar as nuvens na encosta da montanha. O Sensei decide acompanhá-la até a plataforma da estação."
326397231 = "Quando precisar de ajuda, chame a C&C!"
767045695 = "Durante uma missão, Karin encontra o Sensei, que estava capturado na base do Grupo Capacete. Embora Karin pense por um momento que o Sensei é patético, ela muda de ideia ao vê-lo usar sua perspicácia para impedir os planos do Grupo Capacete."
2895507513 = "Estudar é Difícil (1)"
2421241791 = "Karin tira nota vermelha na prova e precisa fazer um exame de recuperação. Enquanto o Sensei a ajuda a estudar, eles acabam tendo conversas desconexas."
3585362705 = "Estudar é Difícil (2)"
3964994116 = "Embora o exame de recuperação tenha sido um desastre, o trabalho de Karin no Schale e no Maid Club é reconhecido, e ela recebe a chance de compensar com tarefas adicionais. Enquanto resolve as tarefas, ela conversa sobre várias coisas com o Sensei."
2935757546 = "A Relação entre Mim e o Sensei?"
828985389 = "No telhado da Millennium, Karin pede conselhos ao Sensei sobre relacionamentos de amizade."
2617383226 = "Maid Café! (1)"
3031156327 = "O Sensei encontra Karin em um Maid Café que visitou por acaso. Karin atende o Sensei de forma desajeitada, mas acaba gritando de vergonha por não conseguir suportar a situação."
4006315302 = "Maid Café! (2)"
2845710536 = "O Sensei visita o Maid Café novamente e ganha a chance de obter um cartão de membro especial, mas, em vez disso, pede para ser pisado por Karin. O Sensei passa um tempo agradável enquanto é pisado por ela."
3512015253 = "O Mal-entendido Dela"
2188282003 = "O Sensei entra no esgoto para recuperar uma moeda que caiu perto de uma máquina de venda automática. Iori, que passava pelo local, acaba achando que ele é um pervertido."
3619712072 = "Descanso no Pátio"
1611838701 = "O Sensei estava deitado no calçamento da Academia Gehenna tirando uma soneca quando, mais uma vez, Iori o confunde com um pervertido."
3380667060 = "Negociação Secreta"
3253843096 = "O Sensei é flagrado tentando comprar o álbum de formatura do primário de Iori de um contrabandista do mercado negro e acaba sendo chamado de 'pervertido' por ela."
225526158 = "Tratamento Gentil"
3928473847 = "Na enfermaria da Academia Gehenna, o Sensei cuida de Iori, que se feriu durante as atividades do Comitê Disciplinar."
3130291039 = "O Mal-entendido do Sensei"
1881265348 = "O Sensei encontra Iori presa em uma armadilha na área residencial e aproveita a oportunidade para provocá-la, invertendo os papéis de sempre."
4152216310 = "Me chame de Meister"
1896022794 = "A pedido do Sensei, Hibiki conserta um smartphone quebrado. O Sensei precisa impedi-la de instalar uma função de autodestruição no aparelho."
714863453 = "Chamas que Explodem no Coração"
3818451070 = "Hibiki mostra ao Sensei sua nova máquina de fogos de artifício. Durante a operação, um erro do Sensei faz com que um míssil seja disparado e atinja a Torre Millennium."
919844422 = "Um Strike no seu Coração"
1604766958 = "Hibiki modifica uma máquina de arremesso enquanto recebe dicas de beisebol do Sensei. Após trocarem várias opiniões, nasce a máquina de arremesso com função de vaias."
2764647337 = "Se eu pudesse sonhar, passaria o dia com você"
3837035412 = "Hibiki prepara uma invenção para ajudar o Sensei a dormir. Era uma máquina terrível que fazia o usuário cair no sono instantaneamente."
1446176968 = "Sentimentalismo em um Dia de Chuva"
1724445069 = "O Sensei e Hibiki se encontram na biblioteca e decidem voltar para casa juntos, dividindo o mesmo guarda-chuva."
3087974166 = "Esta noite é para você!"
571050076 = "Hibiki e o Sensei lutam juntos para reparar as instalações de energia da Millennium. Ao anoitecer, após terminarem o conserto, eles passam um tempo agradável observando a vista noturna da Millennium."
2640531275 = "Forma de apego"
3599202500 = "O Sensei visita Hibiki para buscar a bicicleta que mandou consertar. Quando o Sensei diz que não precisa de modificações, Hibiki explica as vantagens usando seus óculos favoritos como exemplo. Durante a conversa, o Sensei aponta que os óculos não possuem a função de autodestruição que ela costuma colocar em tudo, fazendo com que ela perceba seu próprio desejo de não querer que as coisas que considera preciosas — e das quais ela não tinha plena consciência — desapareçam."
2971539326 = "Inspeção surpresa"
1641801255 = "Talvez por causa de sua expressão intimidadora, Kayoko é tratada como suspeita e abordada pela polícia para averiguação. O Sensei, que passava pelo local, a defende."
3541264622 = "Limpeza do escritório"
970135422 = "Kayoko limpa o escritório da Problem Solver 68 desde cedo. O Sensei decide ajudar, e os dois fazem a limpeza juntos."
110591004 = "Espírito do rock"
1877823555 = "O Sensei decide ouvir a nova música da banda de heavy metal recomendada por Kayoko."
4006123680 = "Beco em um dia chuvoso"
2367456929 = "Em um dia chuvoso, o Sensei encontra Kayoko por acaso e descobre que ela está cuidando de um gatinho."
3930206688 = "Loja de discos"
2993258377 = "Em um dia de folga, o Sensei e Kayoko se encontram por acaso em uma loja de discos e passam um tempo agradável recomendando músicas um ao outro."
2727647181 = "Manhã, empregada, limpeza!"
3993761072 = "A caminho da escola, o Sensei flagra Neru limpando a rua. Envergonhada por ter sido vista, Neru avisa o Sensei para não contar a ninguém."
3312820670 = "Visitando Neru"
3815418736 = "O Sensei decide visitar Neru, que está resfriada, para cuidar dela."
2327048759 = "Neru cuidando de mim"
1005194850 = "Neru decide visitar o Sensei, que está resfriado, para cuidar dele."
127779370 = "Confusão com o atraso"
853344527 = "Alguns delinquentes que guardam rancor de Neru tentam de tudo para fazê-la chegar atrasada à escola e ser suspensa, mas todos os seus planos falham miseravelmente."
2759482117 = "Na noite brilhante"
2769268860 = "Neru e o Sensei passam um tempo agradável observando a vista noturna do terraço da Millennium."
909021747 = "O motivo da jaqueta"
1824681443 = "O Sensei visita o campus da Millennium para encontrar Neru. Lá, ele vê alunos assustados com o visual chamativo dela. Quando o Sensei pergunta por que ela sempre usa aquela jaqueta, Neru, um pouco tímida, acaba contando o motivo."
3523370044 = "Comunicação desencontrada"
407255645 = "O Sensei elogia as belas asas de Hasumi, mas ela interpreta mal o comentário, fica envergonhada e vai embora."
192545007 = "Um fato que passou despercebido"
4215980516 = "Enquanto come várias sobremesas no café, Hasumi reclama que sua dieta não está dando resultados, até que percebe que o motivo é justamente o lanche que ela está comendo naquele momento."
1119295837 = "Hora do crepúsculo"
1473959282 = "Hasumi e o Sensei conversam no parque enquanto observam o pôr do sol."
926903321 = "A causa do estresse"
4255682442 = "O Sensei se preocupa com Hasumi, que está estressada devido a uma dieta extrema."
1985523315 = "Curto, mas luxuoso"
2415429620 = "Durante o caminho de volta da escola, eles são pegos por uma chuva repentina e o Sensei e Hasumi decidem se abrigar em um parque próximo."
2309978531 = "O caderno da vice-presidente do Comitê de Justiça"
1411120732 = "Hasumi usa o mesmo caderno desde o primeiro ano. Nele, estão registrados todos os tipos de informações sobre os membros do Comitê de Justiça, incluindo nomes, contatos e preferências pessoais, o que demonstra o cuidado de Hasumi com os outros. O Sensei nota que há alguém registrado ali com a mesma data de nascimento e gostos parecidos com os dele, mas Hasumi, visivelmente perturbada, tenta mudar de assunto."
1330831614 = "Como aumentar a motivação para o trabalho"
3119688622 = "Para recompensar o Sensei por trabalhar tanto, Aru pede um parfait no café. No entanto, o que chega é um parfait do menu para casais; Aru fica confusa, mas, no fundo, sente-se feliz."
1193817835 = "A técnica da persuasão"
2312804979 = "Aru decide testar técnicas de persuasão com o Sensei. Embora insista que não será convencida pelas palavras dele, ela acaba sendo totalmente persuadida pela lábia do Sensei."
2860741943 = "A verdadeira líder"
674363357 = "Aru e o Sensei decidem assistir a um filme novo no cinema. Após o término, os dois conversam sobre o conteúdo do filme."
3045973073 = "Proposta de contratação como consultora de gestão externa"
1397280925 = "Aru tenta agir de forma madura para impressionar o Sensei. Porém, a Problem Solver recebe um trote telefônico e, após a confusão, seu blefe acaba sendo descoberto."
254794530 = "Algo precioso"
2167138310 = "Como forma de agradecimento, Aru convida o Sensei para jantar. Eles passam um tempo agradável, mas, na hora de pagar a conta, ela percebe que perdeu sua carteira. Aquela carteira era algo precioso, comprada com o dinheiro que todo o pessoal da Problem Solver 68 economizou para celebrar o fato de ela ter se tornado presidente. O Sensei passa a noite toda procurando com ela e, após finalmente encontrarem a carteira, os dois vão comer lámen juntos."
1481568503 = "Pesquisa proibida"
3240573980 = "Haruna realiza uma pesquisa gastronômica na cantina fechada da Academia Gehenna. No entanto, o álcool que ela adicionou em excesso no lugar da bebida explode, e a pesquisa termina em fracasso."
3007405341 = "O caminho solitário"
2446232030 = "Em busca do sabor supremo, Haruna visita uma casa de chá nos arredores de Gehenna com o Sensei para sua pesquisa. Contudo, o que ela tira da bolsa é um macarrão instantâneo. O Sensei e Haruna decidem, então, preparar o macarrão instantâneo com toda a seriedade, seguindo os rituais da cerimônia do chá."
2279595776 = "A Gourmet da Ira"
3278316917 = "Haruna estava saboreando um menu completo em um restaurante de luxo, mas como não gostou de várias coisas, incluindo a comida, ela decidiu explodir o restaurante."
3581669111 = "A Verdadeira Gastronomia"
1988565479 = "O Sensei encontrou Haruna vagando pelo distrito periférico de D.U. em busca de novas iguarias. Os dois conversaram alegremente enquanto comiam taiyaki de uma barraca de rua."
1695258470 = "Novos Itens!"
1967388246 = "Hifumi contou alegremente ao Sensei sobre os novos itens dos Momo Friends que ela comprou, exibindo-os com orgulho."
2135676389 = "O Segredo da Mochila"
136068679 = "Enquanto organizava a mochila do Peroro que Hifumi sempre carrega, ela mostra o conteúdo para o Sensei."
2419431461 = "Operação de Resgate do Peroro-sama"
2058378536 = "Para conseguir um bicho de pelúcia gigante do Peroro, Hifumi tenta a sorte em uma máquina de garras no fliperama. Hifumi falha várias vezes, mas o Sensei consegue pegar o bicho de pelúcia e o presenteia para ela."
915698726 = "Pedido de Conselho"
3951972022 = "Hifumi, preocupada com sua personalidade sem nada de especial, pede conselhos ao Sensei sobre isso."
718610260 = "Passeio por Acaso"
3096365246 = "Tendo tempo livre após a aula, Hifumi sugere ao Sensei que deem um passeio juntos. Os dois caminharam por vários lugares de Trinity e passaram um tempo agradável."
2433419644 = "Sessão de Autógrafos Improvisada"
2731154380 = "Hifumi e o Sensei acabaram assistindo a um show dos Momo Friends por acaso no centro de Kivotos. Na sessão de autógrafos que se seguiu, Hifumi teve a chance de apertar a mão do Peroro."
567004708 = "O Importante é a Distância!"
339869436 = "O Sensei encontrou Tsurugi por acaso na rua. No entanto, toda vez que o Sensei se aproximava, Tsurugi fugia. Ao finalmente capturá-la e perguntar o motivo, Tsurugi respondeu que estava mantendo distância para despertar o interesse do Sensei."
2269971719 = "O Mundo das Selfies"
1992569852 = "Tsurugi precisa tirar uma foto para documentos de Trinity. O Sensei tenta várias vezes tirar a foto enquanto se esforça para aliviar a tensão de Tsurugi, mas o rosto dela acaba ficando distorcido de qualquer jeito."
2150949239 = "Encontro de Adultos"
3086644114 = "O Sensei convidou Tsurugi para um restaurante de alta gastronomia. Tsurugi diz que aquele não é um lugar para ela e fica extremamente tensa."
3477361952 = "Uma Caixa Especial"
1045732016 = "O Sensei encontrou Tsurugi perto de um cinema. Ao perguntar, descobriu que o hobby dela é colecionar panfletos e ingressos de filmes. Depois de ver a coleção no quarto dela, o Sensei prometeu ir ao cinema com Tsurugi na próxima vez."
608406794 = "Reunião de Madrugada"
799499931 = "Hina chama o Sensei de madrugada para lidar com o trabalho do Comitê Disciplinar. Embora ainda tenha dificuldade em confiar totalmente no Sensei, que às vezes age de forma leviana, ela sente gratidão por ele ajudá-la seriamente com o trabalho."
1206204887 = "Um Motivo Imponente"
3038001428 = "Hina chama o Sensei novamente para um lugar deserto no meio da noite. Quando o Sensei comenta que encontrar-se escondido assim pode parecer suspeito, Hina fica preocupada."
3916122859 = "Adultos e Crianças"
76760892 = "Apesar da correria, Hina e o Sensei conseguem um tempo para visitar um pequeno shopping nos arredores de Gehenna. Embora Hina não tenha se empolgado muito com os lugares que visitaram, graças às palavras do Sensei, ela acaba se divertindo."
1437834886 = "Luz do Sol Aconchegante"
770595097 = "Chamada pelo Sensei por causa do sol agradável, Hina aproveita para tomar sol em um caminho à beira do rio. Hina, sentada entre as pernas do Sensei, exala um perfume suave; ao perceber que ele está sentindo o cheiro, ela fica envergonhada e começa a se irritar."
484158690 = "Uma Noite Misteriosa"
2689536441 = "O Sensei ajuda Hina com o trabalho na escola durante a madrugada. Vendo que ela está exausta devido ao trabalho intenso de vários dias, o Sensei faz carinho em sua cabeça para que ela possa dormir tranquilamente."
3033553461 = "A Braçadeira que Pesa no Braço Esquerdo"
777765850 = "Em um dia de folga, Hina passa o tempo com o Sensei. Enquanto aproveitam eventos triviais, porém divertidos, Hina conta ao Sensei os sentimentos que carrega em sua braçadeira de presidente do Comitê Disciplinar."
1112893421 = "Recompensa pela Sinceridade"
3973431314 = "O Sensei para em uma doceria na cidade e encontra Junko trabalhando lá. Para ajudar Junko, que trabalha duro, o Sensei compra os doces e os presenteia a ela."
2643568139 = "Culinária Falsa"
1204261948 = "Junko tenta testar uma receita suspeita que encontrou na internet junto com o Sensei. No entanto, quase tudo tem um gosto estranho, resultando em um desperdício de dinheiro."
2129465828 = "A Gastronomia da Pobreza"
3571878226 = "Junko ficou desapontada por não ter conseguido comer algo delicioso como planejado. Vendo que ela estava com fome por ter economizado no almoço, o Sensei lhe entrega um macarrão instantâneo. Junko reclama de ser apenas um macarrão instantâneo, mas ao dar a primeira garfada, ela se apaixona pelo sabor."
1991574778 = "Treinamento Estomacal"
974989734 = "Para treinar a expansão do estômago, Junko come muito kombu seco, mas não aguenta o inchaço no estômago e acaba colocando tudo para fora."
3866442346 = "Gastronomia Não Solitária"
2641616716 = "Junko e o Sensei comeram muitas coisas deliciosas na Chinatown perto da Academia Shanhaijing. Durante uma pausa, eles conversam alegremente enquanto pedem bebidas em um café próximo."
447359660 = "Cristalização do Esforço"
3325660189 = "Junko conta alegremente ao Sensei que seu \"Caderno Gourmet\" feito à mão está completo. Era um caderno com os melhores restaurantes de Shizutown, feito para o uso da própria Junko. Os dois vão a um desses lugares e passam um momento tranquilo conversando sobre seus valores gastronômicos."
998099366 = "Vamos às compras?"
1675775908 = "Para comprar ingredientes para o refeitório da Academia Gehenna, o Sensei vai a um grande supermercado junto com Fuuka."
2342057365 = "A mesa de jantar de hoje da Fuuka"
3722225258 = "Como o Sensei pula refeições com frequência por estar sempre ocupado, Fuuka decide preparar uma refeição para ele. O Sensei aproveita o banquete preparado por Fuuka, mas acaba comendo tanto que precisa recorrer a um remédio para o estômago."
3824807776 = "Vamos fazer compras de novo!"
1034716395 = "Fuuka estava escolhendo ingredientes no mercado. Durante uma conversa com o vendedor, ela é confundida com a esposa do Sensei, o que a deixa corada."
1043403340 = "Uma mesa de jantar apenas para o Sensei hoje"
370580278 = "Para ajudar o Sensei, que desmaiou de exaustão, Fuuka decide cozinhar no Schale."
2861325865 = "A chefe do Clube de Merenda quer dar o seu melhor!"
958810626 = "Fuuka acaba ficando bêbada só de provar o vinho culinário. Ela começa a reclamar com o Sensei sobre as queixas que o Clube de Merenda recebe constantemente, falando com o tom de voz de alguém embriagado."
2503992938 = "O treinador chegou!"
2844960890 = "Sumire pede conselhos ao Sensei sobre seu plano de treinamento. Como ela tenta seguir um cronograma impossível, o Sensei assume o papel de seu treinador pessoal."
2757435988 = "Junto com o treinador"
1543696324 = "Para comprar proteínas e suplementos necessários para o treino, o Sensei sai pela cidade com Sumire. Sempre que tem um tempo livre, Sumire começa a treinar sem se importar com quem está olhando..."
2129718510 = "O treinador também participa"
3033616045 = "Com base em sua experiência, Sumire recomenda que o Sensei também faça musculação. Enquanto cuida do Sensei, que sofre com o treino repentino, Sumire parece estar se divertindo muito."
789432916 = "Encontro"
2467696253 = "No fim de semana, Sumire sai pela cidade para um encontro com o Sensei. Ela declara que, apenas por hoje, vai esquecer os exercícios e comer o que quiser, mas, por puro hábito, acaba conferindo a tabela nutricional dos doces."
4027920287 = "O limite do treinador"
969196443 = "O Sensei decide correr com Sumire. Quando o Sensei se preocupa ao notar que ela parece um pouco mais cansada que o normal, Sumire mostra os sacos de areia pesados que estava usando... O Sensei tenta usá-los também, mas desiste devido ao peso excessivo."
1231386408 = "Consumo planejado"
1523855793 = "Yuuka passa pelo escritório do Schale para entregar um relatório e acaba descobrindo os hábitos de vida desleixados do Sensei. Apesar de reclamar, ela acaba ajudando o Sensei a organizar seus recibos."
1926315910 = "Um valor incalculável"
3885120659 = "Yuuka está preocupada com um quadro caro que recebeu como garantia de um empresário que deve dinheiro ao Millennium. Ela tenta desesperadamente entender o valor daquela pintura abstrata que parece um rabisco, mas o Sensei aponta que é uma falsificação barata sem valor algum."
3246715250 = "Calculadora humana"
36783089 = "O Sensei recuperou equipamentos, como armas, de alguns delinquentes, mas estava em apuros porque as unidades de medida eram diferentes das usadas no Schale. Ao saber disso, Yuuka usa sua capacidade de cálculo para ajudar o Sensei."
540132105 = "Dormir demais"
1727423292 = "No dia seguinte a uma noite trabalhando até tarde no conselho estudantil, Yuuka acaba se atrasando para seu turno no Schale. Ela menciona uma promessa anterior e insiste que deveria ser punida, mas o Sensei, vendo que ela está cansada, permite que ela tire uma soneca."
1211884829 = "Poker face"
3001919061 = "Yuuka e o Sensei decidem jogar pôquer. Yuuka joga calculando as probabilidades, mas, por algum motivo, perde todas as rodadas. Ao terminar o jogo, ela guarda as cartas desanimada, mas percebe que o Sensei estava trapaceando e começa a gritar com ele."
1436490456 = "A rainha do cálculo mental"
2237624638 = "Preocupado por ter se tornado dependente da calculadora ultimamente, o Sensei decide fazer um treinamento intensivo de cálculo mental com Yuuka. Ele responde às perguntas dela com total confiança."
1186793633 = "O hobby da Ayane"
3936794888 = "Em um certo feriado, Ayane chama o Sensei para a escola Abydos para pedir que ele avalie alguns livros antigos."
1069713218 = "Corra, Ayane"
3843866508 = "Por acaso, Ayane encontra uma grande quantidade de ferro dentro da escola Abydos e o vende pelo preço comum para o fornecedor de sempre. No entanto, ela descobre depois que não era ferro comum, mas sim um tipo valioso, e sai correndo para perseguir o caminhão do fornecedor."
247517590 = "A trágica saga de reparos da Ayane"
1735248341 = "Para consertar as instalações quebradas da escola, Ayane e o Sensei percorrem toda a escola Abydos. Apesar de vários problemas, os dois conseguem consertar o sistema hidráulico com sucesso."
3375124759 = "Treinando a soneca hoje também"
3209149419 = "O Sensei vai encontrar Tsubaki, pois ela prometeu mostrar um exemplo de seu treinamento. Ao chegar ao local combinado, ele encontra Tsubaki dormindo e realizando várias ações estranhas, deixando as pessoas surpresas."
462720006 = "O método de treinamento da Tsubaki: Ferramentas"
3217352150 = "Tsubaki entra em contato dizendo que seu travesseiro favorito (ferramenta de treino) quebrou, então os dois saem para comprar um substituto. Depois de olhar várias opções sem encontrar nada que a agradasse, ela acaba escolhendo o colo do Sensei como travesseiro."
2496334832 = "O método de treinamento da Tsubaki: Prática"
2280120755 = "Tsubaki ensina ao Sensei um método de sono que ela chama de treinamento. Enquanto o Sensei está de olhos fechados, Tsubaki fica encarando seu rosto, mas quando ele percebe, ela fica envergonhada e começa a fazer birra."
1683959468 = "Perfeito para treinar com você"
2637987650 = "Sob o pretexto de treinar, Tsubaki e o Sensei tiram uma soneca juntos no meio dos arbustos."
3727448249 = "A pequena diabinha adora brincar"
2632081395 = "Mutsuki vai ao Schale e faz birra querendo que o Sensei brinque com ela enquanto ele trabalha. O Sensei acaba cedendo e decide brincar com Mutsuki usando uma 'pulseira que dá um choque elétrico quando a frequência cardíaca aumenta'."
630673951 = "O segredo da pequena diabinha que não pode ser contado"
3694200112 = "Convidado por Mutsuki, o Sensei visita a agência de faz-tudo. Embora o Sensei fique curioso sobre o que há dentro da bolsa de Mutsuki, o conteúdo real nunca é revelado."
3654338495 = "O hobby da pequena diabinha"
923060075 = "Patrulhando a cidade, o Sensei encontra Mutsuki por acaso e a segue até o mercado negro. Ao encontrar o Sensei, Mutsuki diz que veio fazer compras por hobby e o leva a uma loja especializada em bombas."
2198801559 = "Um pedido especial de alguém"
236148924 = "O Sensei acaba acompanhando Mutsuki para cumprir um pedido de uma pessoa misteriosa. Os dois seguem as instruções da carta, mas o conteúdo é quase todo composto por eventos que parecem encontros. Depois, enquanto acompanha uma Mutsuki que parece estar se divertindo, descobre-se por acaso que a cliente era a própria Mutsuki, que armou tudo. Mutsuki, tendo sua identidade revelada, demonstra um leve arrependimento, mas volta para casa de bom humor, dizendo que se divertiu muito brincando com o Sensei."
1512221497 = "A imagem de um hacker"
276239373 = "Hare foi assistir a um novo filme, mas parece insatisfeita com a forma maliciosa como o hacker no filme foi retratado. Como forma de vingança, ela tenta hackear o site da produtora do filme, mas o Sensei aponta que, fazendo isso, ela não seria diferente do hacker do filme."
775079157 = "Vício em energéticos"
2483969389 = "Seguindo o conselho do Sensei, Hare decide parar de tomar os energéticos que consumia habitualmente. No entanto, em poucos dias, ela é dominada pelos sintomas de abstinência e acaba voltando a beber energéticos novamente."
363645391 = "Bem-vindo à lan house"
1554368360 = "O Sensei e Hare são pegos por uma chuva repentina enquanto saíam para comprar uma nova placa de vídeo. Os dois decidem entrar em uma lan house para se abrigar. Hare observa as várias instalações da lan house com um olhar de curiosidade."
3961304199 = "A máquina da traição"
1946980109 = "Hare demonstra o desempenho de um drone que ela modificou recentemente na frente do Sensei. No entanto, durante o teste do modo fitness, o drone entra em pane e força Hare a fazer exercícios exaustivos. O drone também possui uma função de choque elétrico para execução forçada, deixando Hare exausta de tanto correr."
340540264 = "A máquina da traição (2)"
3000054060 = "Um dia, Hare envia uma selfie do nada. Quando o Sensei, intrigado, pergunta sobre isso, descobre que a foto não foi enviada por Hare, mas pelo drone de inteligência artificial que a enviou por conta própria. Irritada com o drone, Hare começa a desmontá-lo..."
4201884713 = "O marcapasso"
2638532609 = "Akari pede ao Sensei para ajudá-la a treinar como seu 'marcapasso' para um concurso de comida na rua comercial. No entanto, o Sensei não consegue acompanhar a velocidade sobre-humana de Akari e acaba desistindo."
2932734876 = "Como assim, sem alho?"
3327817711 = "Akari fica preocupada com o cheiro de alho após comer ramen. Depois de pensar muito, ela decide usar o princípio de que, se você continuar sentindo o mesmo cheiro, acaba se acostumando, e tenta forçar o Sensei a comer vários pratos com alho."
940784146 = "Banida"
2345252510 = "Como ficou amplamente conhecida por ser uma grande comilona, Akari teve sua entrada recusada em vários restaurantes de rodízio. O Sensei, que a encontrou por acaso, decide pagar um rodízio de sushi para ela, mas a quantidade que ela come supera em muito as expectativas do Sensei, deixando sua carteira em apuros."
929421191 = "O orgulho de um gourmet"
1967999950 = "Ao aceitar o desafio de Mapo Tofu de um restaurante chinês, Akari percebe que os funcionários estão colocando uma quantidade excessiva de especiarias para garantir que ninguém consiga completar o desafio. Akari fica furiosa com o desrespeito do restaurante pela comida e decide dar uma lição neles comendo uma quantidade massiva de Mapo Tofu."
3792410708 = "Um jeito de ficar muito mais gostoso"
147735400 = "Izumi lê a autobiografia de um atleta e tenta praticar os exercícios pesados descritos nela junto com o Sensei. No entanto, como era de se esperar, o sabor da comida não muda drasticamente como Izumi esperava, e ela acaba se decepcionando."
2981660607 = "Um pudim delicioso"
276818574 = "Izumi e o Sensei entram em uma fila para comer um pudim especial vendido em um festival. Os dois conseguem comprar o pudim após recusarem as tentações doces de vários outros gourmets que chegaram depois, mas o item acaba sendo um 'pudim de geleia de enguia', algo bastante peculiar."
2884713095 = "Sem querer"
995676787 = "A caminho de uma nova loja de ramen, o Sensei e Izumi encontram gatos de rua famintos. O Sensei oferece petiscos para gatos aos animais, mas Izumi, atraída pelo cheiro, acaba roubando e comendo os petiscos."
2892669052 = "Dia do cachorro-quente"
3208438623 = "Izumi chama o Sensei dizendo que tem algo para mostrar. Era uma amostra de cachorro-quente. Enquanto o Sensei admira a qualidade da amostra, um corvo a rouba..."
2135935597 = "Segredo de adulto"
4254451472 = "Para descobrir os segredos do Sensei, Kotama tenta de várias formas instalar um dispositivo de escuta no Schale, mas falha em todas. Quando perguntada sobre o porquê de ir tão longe, Kotama responde: 'O Sensei parece estar acima das nuvens, e eu queria conversar com você de forma mais natural'. Diante disso, o Sensei decide contar um de seus pontos fracos para ela em segredo."
533037626 = "As ondas de rádio da Mary"
194076815 = "Certa noite, o Sensei ouve uma voz misteriosa na área residencial do Schale. Após Kotama analisar, descobre-se que o som era apenas interferência de rádio. Ao contrário do Sensei, que se sente aliviado, Kotama fica um pouco decepcionada por não ser um fantasma de verdade."
3144808590 = "Coisas que não posso dizer"
1236053719 = "Enquanto Kotama escuta ligações como de costume, ela ouve o Sensei tendo uma conversa suspeita com um fornecedor estranho. Kotama se preocupa que o Sensei esteja envolvido em algum crime, mas o que o Sensei pediu naquela ligação foi apenas ameixas em conserva."
666630201 = "Branco e transparente"
1213415440 = "O Sensei encontra Kotama por acaso em uma loja de discos. Quando ele pergunta o que ela estava ouvindo enquanto mantinha os olhos fechados, ela responde que estava ouvindo sons ambientes. Assim, ela começa a falar sobre sons ambientes com entusiasmo."
4062519371 = "Espírito artesanal"
2032324318 = "Utaha decide fazer um novo porta-canetas para o Sensei usando uma impressora 3D. No entanto, ela não consegue fazer nada que atenda aos seus próprios padrões. Diante de seu espírito artesanal que não conhece concessões, o Sensei pensa: 'Já está bom assim, eu adoraria ter esse...', mas não consegue dizer isso com firmeza."
1586945368 = "Um mestre não culpa suas ferramentas?"
1796399232 = "Utaha e o Sensei vão comprar novas ferramentas para deixar no Schale. Utaha fala apaixonadamente sobre o valor das ferramentas e recomenda a compra de um conjunto de ferramentas de alta qualidade."
945629632 = "O Animaroide perfeito"
3644826021 = "Utaha confunde um filhote de cachorro que entrou no Schale com um Animaroide de última geração e fica arrasada com a sua própria falta de habilidade técnica."
2115816456 = "Algo que não posso mostrar"
792271785 = "Para consertar a 'Rai-chan' quebrada, Utaha aluga um depósito vazio no Schale. Ela tem vergonha de ser vista toda suja pelo conserto e tenta afastar o Sensei de forma indireta, mas, no fim das contas, os dois acabam trabalhando juntos."
1405659911 = "A medalha do mestre"
2353410857 = "Utaha e o Sensei veem uma nova esmalteria que abriu na rua comercial. Com o incentivo do Sensei, Utaha faz as unhas e fica impressionada com a técnica. Embora o Sensei sugira que ela vá com frequência, Utaha responde: 'Meus dedos sujos de óleo também são uma medalha de mestre', e decide fazer as unhas apenas no dedo mindinho como lembrança."
3924052595 = "Mesmo que tudo seja substituído"
3200520496 = "Convidado por Utaha, o Sensei a visita em uma loja de ferramentas que ela frequenta. Ela troca suas ferramentas antigas e diz que aquele é o seu 'conjunto de ferramentas de mestre', que ela personalizou e usa há anos. Ela explica alegremente que, como continua substituindo as peças, embora não reste nada do original, a essência permanece a mesma enquanto o usuário for o mesmo."
4046207094 = "O cheiro das nuvens"
4105126090 = "Junto com Chise, que diz querer 'encontrar as nuvens', o Sensei persegue nuvens pela rua comercial. Os dois observam e perseguem várias nuvens por um tempo, mas a 'nuvem' que Chise descreve nunca é encontrada. Em vez disso, eles acabam comprando e comendo algodão-doce, que se parece muito com nuvens."
1745027801 = "A ídolo do Clube Yin-Yang"
1633057737 = "No caminho para a livraria para comprar uma coletânea de haicais, Chise e o Sensei encontram os fãs dela. O Sensei tenta de alguma forma desviar da energia avassaladora dos fãs, mas Chise, por outro lado, parece não se importar nem um pouco."
1120186993 = "Noite de luar, composição de haicai, especial"
576363469 = "Para criar um haicai que será exibido no centro comunitário, Chise tenta obter inspiração passeando pela cidade com o Sensei. Embora estivesse com dificuldade para encontrar o tom certo, ela consegue compor um haicai sincero ao relembrar o dia divertido que passou com o Sensei."
41249476 = "O som do vento chegando"
2219822065 = "Em um dia quente de verão, Chise chama o Sensei dizendo que quer que ele ouça o som do vento chegando. Ao deitarem no chão e aguçarem os ouvidos, eles realmente conseguem ouvir o som límpido do vento."
68609484 = "Uma injeção que não dói?"
1238741882 = "Para se acostumar a aplicar injeções, Hanae pede ao Sensei que a ajude a praticar. No entanto, por ter aprendido as técnicas em um livro errado, ela acaba deixando o braço do Sensei em um estado deplorável."
3359142014 = "Insônia"
704371455 = "Para o Sensei que sofre de insônia, Hanae prepara um local para uma soneca. Ela tenta fazer o Sensei desmaiar à força para que ele possa dormir, mas, após ser convencida pelo Sensei, ela desiste e decide preparar um chá de ervas em vez disso."
468644606 = "Ginástica de rádio"
2086188010 = "Em uma manhã de folga, Hanae visita a residência do Schale, acorda o Sensei que estava dormindo e eles fazem a ginástica de rádio juntos."
1129161301 = "Cirurgia ao estilo Trinity"
1115265687 = "Enquanto organizava o depósito do Esquadrão de Socorro, o Sensei machuca a perna, e Hanae exclama: 'Vamos amputar sua perna agora mesmo!'. Felizmente, o Sensei consegue convencê-la, e ela acaba fazendo o curativo após trazer antisséptico e curativos."
2874947170 = "Diário de observação da glória-da-manhã"
86110047 = "De manhã cedo, o Sensei encontra Hanae cuidando de glórias-da-manhã no terraço ao ar livre da residência do Schale, e os dois conversam alegremente."
244804059 = "O anjo de Trinity"
3281711713 = "O Sensei vê Serina cuidando de crianças no parque por acaso. Serina fica envergonhada por ter sido vista naquela situação, mas se preocupa com o Sensei, que está ocupado com o trabalho."
1246494305 = "O anjo que desceu na calada da noite"
1349449479 = "Serina visita o Sensei, que está trabalhando até tarde no Schale, e decide ajudá-lo com o trabalho."
3235653381 = "Sempre e em qualquer lugar, Serina também"
1669978221 = "Após um apagão repentino, Serina visita o Sensei, que se machucou, para fazer um curativo. O Sensei se pergunta como ela aparece tão rápido toda vez que ele se fere, mas Serina apenas disfarça, envergonhada."
1885780666 = "Na palma daquela mão"
2900260446 = "Toda vez que o Sensei está em apuros ou sofrendo, Serina aparece do nada para ajudar. Querendo retribuir, o Sensei finge precisar de ajuda para chamá-la. Serina, agora na posição de ser quem cuida e mima, fica confusa com a situação repentina, mas fica genuinamente feliz com isso."
2227241074 = "Por favor, ouça minha explicação!"
2381492343 = "Os alunos do Millennium evitam Kotori, que adora explicar tudo. Quando Kotori expressa preocupação por ser tagarela, o Sensei diz que acha esse lado dela fofo, mas, assim que ela começa a falar, o Sensei foge junto com os outros alunos."
1879189076 = "Você acertou em me perguntar!"
3040174105 = "Talvez por causa da repetição dos alunos fugindo assim que ela começa a falar, Kotori parece um pouco mal-humorada. O Sensei percebe isso e pede para ela explicar algo; após falar o quanto quis, Kotori recupera sua energia."
587880302 = "A resposta correta é sobre o Sensei!"
4162760118 = "Kotori estava preocupada após ser questionada por outros alunos sobre 'sentimentos femininos'. Ao conversar com o Sensei, ela percebe que isso é parecido com 'os sentimentos que ela tem pelo Sensei' e foge, envergonhada."
3299613520 = "Eu estava totalmente preparada, mas..."
3113492896 = "Inesperadamente, Kotori acaba sendo questionada pelo Sensei. Ela estava pronta para qualquer pergunta, mas ao perceber que o assunto era sobre ela mesma, ela entra em pânico com a situação inesperada."
3925290057 = "Óculos de formato estranho"
1405678383 = "Preocupado com Kotori, que disse ter enviado seus óculos para conserto, o Sensei visita o Millennium. Ao encontrá-la, ela diz que os óculos foram consertados e está tudo bem. Quando o Sensei pergunta sobre o formato peculiar dos óculos, ela dá uma 'explicação' sólida sobre os motivos práticos relacionados à sua natureza de adorar explicar as coisas."
2128994052 = "Não posso ceder!"
398808592 = "Yoshimi vai a um café com o Sensei para comprar um item de evento limitado. Vendo que Yoshimi hesita ao ver que o preço é mais alto do que o esperado, o Sensei decide comprar para ela."
2140540293 = "Desafio dos macarons"
2645271508 = "Yoshimi e o Sensei participam de um concurso de comer macarons. Embora tivessem dificuldade com os doces no início, Yoshimi acaba sentando no colo do Sensei por acidente em um momento inesperado; para esconder a vergonha, ela devora os macarons em um instante, e os dois acabam vencendo."
188196592 = "Estudo no café"
3493185503 = "O Sensei e Yoshimi visitam um café para estudar para as provas. Eles avançam nos estudos enquanto comem vários doces."
2147149955 = "Bem ao lado daquele brilho"
3715343759 = "O Sensei compra um doce que Yoshimi queria e tenta colocá-lo secretamente no armário de sapatos dela. No entanto, Yoshimi vê a cena e o pressiona para saber o que ele estava fazendo. Eles esclarecem o mal-entendido e, enquanto caminham para um café, brincam um com o outro como de costume."
844314736 = "Caçadora de doces"
2266129221 = "Ao chegar na frente do café, o Sensei tenta comer imediatamente o doce que ganhou de presente de Yoshimi. Ela declara que, se ele abrir a embalagem, ela irá confiscar. A situação está por um fio, enquanto a 'Caçadora de Doces' adormecida dentro de Yoshimi começa a despertar..."
2044734478 = "A garota que ama livros"
906920889 = "O Sensei visita Shimiko, que trabalha como bibliotecária. Pensando que ela era apenas uma garota literária comum e quieta, o Sensei descobre um lado inesperado de Shimiko."
341307521 = "O segredo dos dois"
3243951534 = "Já passou da hora de fechar a biblioteca, é madrugada. Para Shimiko, este é o momento em que ela finalmente pode ler livros com calma. O Sensei passa um tempo tranquilo na noite com ela."
1860734903 = "Em busca de tesouros"
2870193424 = "Dizem que há livros não registrados espalhados pela biblioteca. Shimiko espera que, entre eles, possa haver um livro novo que ela nunca viu antes. O Sensei a ajuda na caça ao tesouro, mas o que Shimiko encontra no final é algo completamente diferente do que ela imaginava."
4293465345 = "Vez após vez"
499400354 = "Shimiko recebe alegremente o sensei, que foi à biblioteca em busca de um livro difícil de encontrar. Enquanto procuram o livro juntos, Shimiko comenta que, embora a maioria dos livros tenha sido digitalizada hoje em dia, ainda existem pessoas que vêm à biblioteca em busca de livros valiosos que só existem em papel. Com um sorriso suave, ela diz que é por causa dessas pessoas que ela trabalha como bibliotecária."
1596075158 = "Doces no lugar do almoço"
4257306641 = "Para o sensei, que está ocupado, Airi compra vários cupcakes, a nova sobremesa do café, para presenteá-lo."
2315835548 = "Ingestão de açúcar"
3621133641 = "Para o sensei, que está ocupado, Airi pede muitos doces de chocolate, e os dois se dedicam a repor as energias com açúcar."
1960740624 = "A preocupação de Airi"
2777060658 = "Preocupada com sua própria personalidade passiva, Airi decide pedir conselhos ao sensei."
408399339 = "Um pequeno encontro"
2272549639 = "Tendo superado uma carga de trabalho intensa, o sensei sai para espairecer e encontra Airi por acaso em um caminho de passeio. Como Airi fica desanimada por não ter nenhum doce consigo, o sensei decide comprar um sorvete para ela. Os dois passam um tempo agradável comendo sorvete à beira do rio."
1782328244 = "Algo que alguém precisa fazer"
3366205849 = "Quando o sensei visita a Academia Gehenna, encontra Chinatsu tentando carregar uma enorme quantidade de documentos sozinha. Embora não seja sua responsabilidade, ela diz que \"alguém precisa fazer isso\". O sensei a ajuda e os dois conversam sobre vários assuntos."
2999062443 = "Um dia comum"
2192314265 = "Chinatsu passa um feriado com o sensei, sem trabalho do comitê pela primeira vez em muito tempo. Embora passem um dia comum, sem nada de especial, para Chinatsu, cujos dias no comitê são sempre agitados, um feriado tão comum é algo insubstituível."
43408834 = "Quando estiver cansado"
2645077696 = "O sensei desmaia de exaustão. Chinatsu, responsável pelos primeiros socorros, reclama um pouco, mas faz uma proposta de forma hesitante."
476448061 = "Inesperado"
184627506 = "O sensei decide visitar a sala do Comitê de Disciplina onde Chinatsu está para ajudá-la a organizar os documentos."
3121964723 = "O que eu posso fazer"
4246066356 = "Em um feriado, o sensei encontra Chinatsu, que, mesmo estando de folga, vai ajudar o Departamento de Medicina de Emergência. No passado, Chinatsu pertencia a esse departamento, e a bolsa que ela usa é a mesma que ela usa desde aquela época. O sensei, ao perceber o senso de responsabilidade de Chinatsu, que se transferiu por sentir que o Comitê de Disciplina também precisava de pessoal médico e que era \"algo que alguém precisava fazer\", decide acompanhá-la até o Departamento de Medicina de Emergência."
1548146425 = "Destinatário errado"
877809924 = "Haruka envia uma mensagem para o sensei por engano. Enquanto conversa com Haruka, que pede desculpas incessantemente por ter chamado o sensei, ele descobre sobre uma bomba e, como resultado, acaba evitando um grande incidente."
1671304279 = "Erro de comunicação"
3020050882 = "Querendo expressar sua gratidão ao sensei como um retorno pelo que aconteceu antes, Haruka tenta presenteá-lo. O sensei fica feliz com o presente de ervas daninhas que Haruka lhe deu, mas, na verdade, não foi apenas ervas daninhas que ele recebeu."
633551809 = "Algo que não está errado"
3896770278 = "Desta vez, Haruka tenta dar um presente adequado ao sensei. No entanto, nesse momento, uma notícia urgente sobre um caso de roubo é transmitida...?"
3551997534 = "Suposição errada"
3632616866 = "O sensei recebe uma mensagem preocupante de Haruka no MomoTalk e corre para o fundo da floresta onde ela provavelmente está. No final, descobre-se que foi um mal-entendido e, ironicamente, o sensei acaba sendo salvo por Haruka."
3415164555 = "Por engano"
3460878926 = "Devido a uma série de coincidências, o sensei acaba visitando o jardim de Haruka. Naquele lugar, onde ninguém mais jamais esteve, os dois compartilham um segredo."
3547031295 = "O tempero mais importante"
151158527 = "Para descobrir a quantidade certa de \"amor\" necessária para cozinhar, Juri convida o sensei para provar sua comida. O sensei passa por situações perigosas, como perder a consciência a cada mordida, mas decide que comerá tudo por causa de Juri."
2010079435 = "A culinária dela"
1410164640 = "Curioso sobre o motivo de ela falhar todas as vezes, o sensei decide observar Juri cozinhando ao seu lado. Durante o processo, os métodos fora do comum e o poder misterioso (?) de Juri são revelados gradualmente."
2441506309 = "O desejo de superar"
1176188569 = "Juri e o sensei tentam descobrir novamente o motivo de tantas falhas. Eles tentam mudar várias condições para evitar métodos perigosos, mas, por algum motivo, tudo o que fazem acaba falhando. Juri quase desiste da situação, mas, com as palavras do sensei, ela se recupera e continua tentando repetidamente."
3780570582 = "O que eu, inexperiente, posso fazer"
2113145817 = "O sensei visita o refeitório de Gehenna a convite de Juri. Juri, com as mãos cheias de ferramentas agrícolas, leva o sensei para a horta que o Departamento de Merenda Escolar está cultivando. Embora ainda seja inexperiente na culinária, Juri diz que quer cultivar ingredientes com todo o seu esforço e transmitir alegria às pessoas. Tocado por isso, o sensei ajuda no trabalho agrícola."
294424124 = "Ela, que segue seu próprio ritmo"
3761374176 = "Embora devesse estar cumprindo uma missão, Asuna quer comer sobremesa com o sensei no café por algum motivo. Ela parecia estar agindo como bem entendia, mas, no fim das contas, acabou cumprindo a missão de qualquer maneira."
2056547858 = "Um encontro de perseguição por acaso"
714563164 = "O sensei recebe mais uma chamada repentina de Asuna. Eles apenas passearam juntos, mas, nos bastidores, parece que algo foi resolvido com sucesso mais uma vez."
658609856 = "Surpresa feita por uma empregada"
2779044677 = "Asuna visita o Schale de repente para oferecer seus serviços como agradecimento. Ela mostra sua habilidade habitual, onde não se sabe se é coincidência ou se ela está planejando algo, mas, no final, revela um lado raro."
1365513912 = "Asuna quebrada"
2538101858 = "Após receber uma mensagem estranha de Asuna no MomoTalk, o sensei, preocupado, vai procurá-la e a encontra distraída no parque. Segundo ela, quando passa muito tempo sem fazer nada, sua concentração às vezes diminui. Enquanto a levava de volta ao dormitório, com Asuna caminhando de forma instável, eles tropeçam na escada e caem — quando o sensei acaba servindo de amortecedor para Asuna, ela recupera seu estado normal."
3812863199 = "Amuleto da sorte"
3890514637 = "Quando o sensei chega ao local após ser chamado por Asuna, uma batalha intensa estava acontecendo. Asuna consegue subjugar os inimigos sem problemas, mas percebe que perdeu o laço que tanto prezava. Mostrando o laço azul que, felizmente, foi encontrado, Asuna diz que ele é um símbolo de sorte para ela. Ela sorri, dizendo que cuidará dele para não perdê-lo novamente."
998617790 = "A aluna do caminho da cavalaria"
1113084635 = "O sensei conhece Fina, uma garota que admira o código de honra dos cavaleiros. Embora pareça que ela está entendendo várias coisas de forma errada, parece que ela tem seu próprio senso de \"justiça\"."
1867792173 = "O que importa é o conteúdo"
2170262034 = "Fina quer imitar os protagonistas de filmes de yakuza. No entanto, como a maioria dos protagonistas desses filmes são cães ou gatos, as roupas não servem e ela desiste. O Sensei consola Fina, que está se sentindo para baixo."
3908561949 = "Noite sem fim"
1780086198 = "Fina prepara ingressos e convida o Sensei para uma maratona de filmes. Embora cada filme fosse excelente por si só, o Sensei, tendo sido forçado a assistir a filmes do mesmo gênero por tempo demais, acaba desmaiando no meio do caminho."
2367962991 = "Em momentos assim"
462143440 = "O Sensei é chamado a um restaurante. Lá, Fina, com uma postura impecável, oferece uma xícara de saquê, dizendo que realizará um ritual especial com o Sensei. Rindo por serem menores de idade e não poderem beber álcool, Fina e o Sensei trocam xícaras com chá."
3128096708 = "O esquadrão de vigilância da Trinity"
192851048 = "Suzumi, do esquadrão de vigilância, salva o Sensei de uma situação difícil após ser cercado por alunas delinquentes. O Sensei decide pedir para Suzumi escoltá-lo no caminho de volta ao Schale."
1108192908 = "Brilhando de forma ofuscante"
2489237266 = "O Sensei segue em direção ao seu destino enquanto é escoltado por Suzumi. Por estar tão nervosa em querer escoltar o Sensei em segurança, Suzumi acaba disparando granadas de luz sem parar. Depois, embora cheguem ao destino em segurança com uma Suzumi mais calma, ela fica ainda mais abalada quando o Sensei diz que a escolta era apenas uma desculpa e que ela só queria caminhar com ele."
813863657 = "A teoria da onipotência da granada de luz"
4144458217 = "Suzumi protege a segurança de Trinity como parte do esquadrão de vigilância por vontade própria, sem ser forçada por ninguém. Fica claro que as granadas de luz que ela usa com frequência são um símbolo de seu orgulho e gentileza."
743591040 = "Perseguindo o brilho"
1173255493 = "Suzumi convida o Sensei para um parque de diversões tranquilo. Ela diz que costuma olhar para o céu estrelado a partir deste local, que visita ao final de suas patrulhas. Pensando que talvez as estrelas pudessem ser vistas melhor de um lugar mais alto, ela convida o Sensei para andar na roda-gigante. Assim, os dois aproveitam o brilho das estrelas no céu noturno."
1939284311 = "Uma parceira importante"
2776112655 = "O Sensei visita Trinity para encontrar Suzumi. Ao chegar, Suzumi tira os fones de ouvido às pressas, preocupada se parece uma aluna desleixada, mas abre um sorriso ao ouvir o Sensei dizer que sabe que ela sempre se esforça."
1950563989 = "E então, Izuna segue alguém"
381151088 = "Por algum motivo, Izuna está seguindo o Sensei. Ao perguntar o motivo, ela diz que é para protegê-lo. Quando o Sensei explica que segui-lo secretamente pode ser um incômodo, Izuna fica desanimada, mas recupera o ânimo imediatamente ao ser convidada pelo Sensei para comer."
1340418237 = "E então, Izuna faz a escolta"
576267045 = "Refletindo sobre o ocorrido anteriormente, Izuna agora segue o Sensei por onde ele vai, mas declarando abertamente. O Sensei não consegue dizer para ela parar, enquanto Izuna parece feliz por conseguir proteger seu mestre (?)."
2996582308 = "E então, Izuna se apaixona"
2758300906 = "O Sensei visita a casa de Izuna para assistir aos dramas de época de ninjas que ela tanto gosta. O conteúdo é mais interessante do que ele imaginava, e ao dizer que agora entende um pouco por que Izuna gosta tanto de ninjas, ela fica radiante de alegria."
2279236806 = "Este momento em que podemos estar juntos"
3688245564 = "Como parte de seu treinamento para aprofundar seus conhecimentos sobre ninjas, Izuna e o Sensei percorrem a cidade. Enquanto visitam várias lojas relacionadas a ninjas, Izuna abre um sorriso e diz que o dia de hoje será uma lembrança para toda a vida."
224455677 = "A garota-propaganda da Hyakkiyako!"
2241375795 = "Shizuko convida o Sensei e faz um atendimento ao cliente como uma garota desastrada. No entanto, Shizuko fica confusa com a reação do Sensei, que responde de forma natural, sem saber se ele está sendo genuíno ou não. Shizuko insiste para que ele entre na brincadeira, mas o Sensei responde: 'Shizuko, você já é fofa por natureza, então mesmo que me peça uma reação maior...', deixando-a com um sorriso indescritível."
3992937519 = "A presidente do comitê organizador do festival!"
3292398195 = "O Sensei decide ajudar no trabalho de Shizuko como parte do comitê organizador do festival. Ela fica orgulhosa ao demonstrar uma eficiência no trabalho que surpreende até o Sensei, fazendo jus ao título de presidente."
100303804 = "A garota-propaganda da Hyakkiyako é uma profissional!"
3211000596 = "Shizuko, que estava agindo de forma estranha desde o trabalho, desmaia na frente do Sensei assim que termina suas tarefas. Para Shizuko, que diz que não pode negligenciar nada, o Sensei responde que, embora isso seja importante, às vezes é necessário descansar. Ao ouvir essas palavras, Shizuko sussurra para o Sensei que quer que ele fique ao seu lado até que ela adormeça."
1244220490 = "Recarregando as energias"
2409929919 = "Seguindo o conselho do Sensei, Shizuko decide tirar a manhã de folga. Ela chama o Sensei para a Hyakkiyako, que está vazia, e pede que ele assuma a responsabilidade, agindo de forma manhosa."
245234141 = "A garota-propaganda da Hyakkiyako adora antiguidades!"
1427503773 = "Shizuko convida o Sensei para a Hyakkiyako. No entanto, devido ao grande sucesso do evento, faltam utensílios para servir o menu exclusivo ao Sensei. Por isso, Shizuko decide atendê-lo às pressas com seu conjunto de chá pessoal. Após o movimento de clientes diminuir, ela fica envergonhada quando o Sensei nota o detalhe."
418756131 = "Aventura de Alice: O início da jornada"
899003184 = "Preocupado após Alice enviar uma mensagem dizendo que iria 'partir em uma aventura', o Sensei vai até o Millennium. Ao encontrá-la e conversar, ele acaba participando do grupo como um mascote. O Sensei sai para um passeio chamado de aventura junto com uma Alice muito animada."
3415755859 = "Aventura de Alice: Rumo à lenda"
263417795 = "O Sensei parte em uma nova aventura com Alice, que subiu de nível. No entanto, Alice começa a revirar latas de lixo e tentar roubar recompensas dos bolsos de delinquentes derrotados, acabando por levar uma bronca do conselho estudantil."
2893546688 = "A escolha de Alice"
4280172451 = "Alice, que estava jogando um simulador de namoro popular, fica em dúvida sobre com quem seria mais feliz: 'Sua Majestade Barba', com quem pode compartilhar o mesmo hobby, ou o 'Imperador Careca', que promete mais pelos no peito. Após consultar o Sensei e pensar muito, Alice diz que encontrou a 'solução ideal', mas...?"
3367878513 = "O gato e Alice"
4178604501 = "Alice pede conselhos ao Sensei sobre como se tornar amiga de um gato. Ela tenta vários métodos, mas falha em todos, até que, no final, o gato se aproxima por conta própria e ela consegue interagir com ele. No caminho de volta, quando o Sensei tenta disfarçar o fato de que tinha petiscos para gatos, Alice diz que sabe que ele é uma pessoa gentil."
733373471 = "A magia de Alice"
604855597 = "Alice pede para jogar videogame com o Sensei e eles vão para a sala do clube. Enquanto ela expressa sua alegria pela presença dele e fala sobre espadas e magia, elementos comuns em RPGs, Alice sorri e diz: 'Na realidade, assim como nos jogos, existe uma magia capaz de fazer as pessoas felizes'."
371401505 = "O adesivo de nota dez da Alice"
530559047 = "Alice chama o Sensei para o departamento de desenvolvimento de jogos e pede ajuda para distribuir os 'adesivos de nota dez do Sensei'. Depois de distribuir todos, ela entrega um adesivo extra que fez especialmente para ele."
2446100639 = "O cotidiano de uma gamer"
2479389322 = "Momoi chama o Sensei para a sala do clube e o convida para jogar videogame para 'estudar'. Ao começar, o Sensei quase desiste devido à dificuldade extrema, mas ele assume o controle e consegue derrotar os inimigos. Ele tenta devolver o controle para Momoi, mas acaba sendo convencido a continuar jogando até zerar o jogo."
3320636286 = "As condições para um bom roteiro"
1447101991 = "Já sob pressão com o prazo de entrega, Momoi fica ainda mais irritada ao ler críticas sobre jogos retrô. Ela diz que não sabe mais o que define um bom roteiro, mas, ao conversar com o Sensei, acaba recuperando a motivação."
1209267731 = "Memórias Cor-de-Rosa"
4291238681 = "Para estudar sobre jogos, Momoi decide experimentar um \"simulador de namoro\". Embora se atrapalhe com o sistema de afinidade, ela consegue, de alguma forma, ter sucesso em conquistar (ou seria ser conquistada?) a personagem."
2568135161 = "Rali de Selos Cor-de-Rosa"
232297355 = "Em busca de brindes limitados de um jogo, Momoi vai com o Sensei até \"Akihabara\", o distrito eletrônico. Ao chegar lá, ela entra em pânico ao perceber que não tem tempo suficiente, mas, graças ao trabalho em equipe, eles conseguem coletar todos os selos."
3227922024 = "As Lembranças da Irmã Mais Velha"
1635979583 = "Enquanto se diverte com jogos junto ao Sensei, Momoi acaba tropeçando e descobre o console de videogame que comprou combinando com Midori pela primeira vez. Era uma \"lembrança\" que serviu como ponto de partida para aproximar as duas. Absorta em suas memórias maravilhosas, ela acaba falhando na missão dentro do jogo e lamenta o ocorrido."
3723632128 = "O prazo está acabando, Sensei"
1319850860 = "Com o prazo final se aproximando e sem conseguir pensar em novas ideias, Midori pede ajuda ao Sensei. Em busca de novos estímulos, os dois decidem jogar algo que não costumam jogar, mas Midori acaba se empolgando demais..."
2181248445 = "É uma exposição, Sensei"
885277030 = "Midori e o Sensei vão a uma exposição de arte de jogos. Midori estava determinada a aproveitar a chance para mostrar seu lado mais maduro, mas, diante de tantas obras incríveis, seus olhos brilham e ela acaba se empolgando como uma criança. Mais tarde, já calma, ela se arrepende de ter ficado tão agitada, mas sorri feliz ao ouvir do Sensei que ele também se divertiu."
1475058544 = "É a edição limitada, Sensei"
2361668219 = "Para conseguir a edição limitada da sequência de um jogo clássico, Midori corre pela cidade com o Sensei. Embora consigam encontrar o último exemplar, ao ver o sorriso da garota que o pegou antes dela, Midori decide abrir mão, pensando que \"jogos servem para se divertir\". No entanto, para não deixar Midori desapontada, o Sensei usa seu poder de adulto para conseguir a edição limitada e a presenteia no dia seguinte."
2289816470 = "São lembranças preciosas, Sensei"
828959040 = "O Sensei decide levar Midori a um fliperama, já que ela diz nunca ter ido a um. Enquanto brincam em uma máquina de garra pela primeira vez, eles criam memórias secretas juntos."
2056555487 = "As lembranças continuam, Sensei"
4219711868 = "O console de Midori quebrou e, por ser um modelo de uma geração anterior, não pode ser consertado, restando apenas a opção de comprar um atual. Ao saber que o console quebrado era uma lembrança do presente que Momoi lhe deu, o Sensei ajuda Midori a exibir seu amado aparelho, agora aposentado, de uma forma estilosa. Embora se sinta um pouco confusa por estar imitando a irmã mais velha, Midori fica feliz."
1054831572 = "Cerimônia de Entrega de Medalhas"
3901050681 = "Para se recompensar, Cherino decide criar uma nova medalha de honra suprema. No entanto, como não consegue pensar em um nome, ela pede ao Sensei que a ajude a pensar em um."
3994991875 = "Pimentão e Hambúrguer"
1275437330 = "Cherino descobre que o hambúrguer da merenda escolar, que ela tanto esperava, veio acompanhado de pimentão e decide expurgar a chefe do departamento de merenda. Porém, ao ouvir do Sensei que \"se você comer, eu te compro um pudim depois\", Cherino hesita, mas decide encarar o pimentão com determinação mortal."
221409277 = "Cherino tem nove anos?"
474891411 = "Como prometido, Cherino vai a uma confeitaria com o Sensei para ganhar seu pudim. Ao ouvir que eles estão distribuindo biscoitos para crianças, ela tenta fingir ser uma ou faz birra, mas acaba sendo vista pelas alunas de Red Winter."
4092936239 = "O Assassino do Campo Nevado"
4239706831 = "Em um dia de muita neve, Cherino chama o Sensei para Red Winter, onde passam um tempo divertido fazendo bonecos de neve e brincando de guerra de bolas de neve."
3454660505 = "Pesadelo"
3169984572 = "Cherino acorda de repente e é tratada com desdém pela guarda de honra. Ela teve um pesadelo onde ninguém se lembrava dela, nem mesmo o Sensei... Sentindo o terror de não estar na memória de ninguém, ela faz birra com o Sensei na vida real, como se quisesse ser mimada para compensar o medo."
3953080764 = "O espaço de cura é dentro do armário"
1400954697 = "Yuzu conversa com o Sensei, que visitou o Clube de Desenvolvimento de Jogos, sobre o quão confortável é ficar dentro de um armário. Ao ouvir a explicação, o Sensei tenta entrar no armário com ela, mas, ao ser avisada de que só cabe uma pessoa, a situação se transforma em uma disputa pelo armário."
2503402080 = "A lutadora gentil"
6245419 = "Yuzu e o Sensei jogam um novo jogo de luta. Apesar de sua fala tímida, Yuzu demonstra uma habilidade avassaladora e o Sensei é derrotado completamente. Depois disso, não importa quais restrições o Sensei imponha, ele continua perdendo."
594259040 = "O trabalho de meio período tímido (1)"
483555388 = "Para ganhar dinheiro para o desenvolvimento do novo jogo, Yuzu decide começar um trabalho de meio período, mas sua personalidade tímida a faz cometer erros em série. Mesmo assim, ela continua se esforçando pelo Sensei e pelos outros membros do clube, conseguindo, no final, contribuir adequadamente."
2585625640 = "O trabalho de meio período tímido (2)"
2371095455 = "Após o Sensei sugerir outro emprego, Yuzu começa a trabalhar em um parque de diversões usando uma fantasia. Embora ainda tenha dificuldade em falar com estranhos, ao ver as crianças se divertindo por causa dela, Yuzu sente uma leve satisfação com o trabalho."
858487022 = "Promessa no parque de diversões"
1229751760 = "Yuzu convida o Sensei para o parque de diversões onde trabalha e os dois passam um dia divertido juntos. Antes de ir embora, Yuzu presenteia o Sensei com um \"Passe Livre da Yuzu\" como forma de agradecimento."
3798769886 = "Lembranças brilhantes"
1551489306 = "Durante uma faxina, o Sensei encontra um CD com o nome de Yuzu em um canto da sala do Clube de Desenvolvimento de Jogos. Era o disco mestre de \"Tales Saga Chronicle Prototype\". Junto com Yuzu, que ri ao dizer que o clube existe por causa daquele jogo, os dois iniciam o jogo."
2491368152 = "Dia de sorte"
1705555852 = "Quando o Sensei tenta pegar uma moeda caída no chão, Nodoka aparece de repente do nada e afirma que a moeda é dela."
3814394946 = "Diário de observação"
2168002401 = "Certo dia, Nodoka envia uma mensagem estranha pelo Momotalk. Quando o Sensei, curioso, vai procurá-la, descobre que ela estava tentando observar o Sensei no Schale usando um telescópio do topo de um prédio."
3943807809 = "O lugar para ver a chuva de meteoros"
316651918 = "Nodoka estava ansiosa para observar a chuva de meteoros, mas o tempo no dia estava nublado. Por causa disso, o Sensei vai pedir permissão para acessar o telhado do Schale, que fica acima das nuvens, para que ela possa ver o fenômeno."
2610213699 = "Chuva de meteoros e desejos"
2140306431 = "Nodoka e o Sensei observam a chuva de meteoros sozinhos no telhado do Schale. Quando o Sensei pergunta se ela não vai fazer um pedido, Nodoka sorri e diz que tem medo de ser castigada se pedir mais alguma coisa."
2411242755 = "Em busca das nuvens"
705416632 = "Nodoka encontra o Sensei por acaso na estação de metrô. Essa garota misteriosa, que diz amar a vista das nuvens, afirma que está indo para além das montanhas para vê-las."
3473776468 = "Assunto confidencial"
3683908682 = "Para ajudar Azusa, que ainda não se adaptou totalmente à Trinity, o Sensei decide levá-la para um passeio turístico pela escola no dia seguinte."
1979784998 = "Proteção"
2914330063 = "Azusa visita o Schale e aponta ao Sensei que a segurança é fraca. Ela propõe reforçar o sistema de segurança e decide começar assim que o trabalho do Sensei terminar. No entanto, enquanto esperava, ela acaba adormecendo e, ao desfrutar do conforto do Schale, reconsidera que talvez não haja problema em continuar assim."
352859510 = "Plano"
1755514409 = "Para se acostumar com a vida em Trinity, Azusa marca um encontro com o Sensei para sair. Sem um plano, ela fica confusa quando lhe dizem que pode escolher para onde ir, mas com o apoio do Sensei, eles visitam vários lugares. Ao passar o dia assim, ela começa a pensar que talvez até as coisas ineficientes tenham seu significado."
2726486787 = "Tiro"
1358028185 = "O Sensei visita Azusa enquanto ela treina no estande de tiro. Enquanto reflete sobre a palavra \"paz\", ela demonstra que sua habilidade de tiro é, aparentemente, bastante impressionante. Ao se despedir, Azusa comenta que treinar assim faz com que ela se sinta mais leve, mas, com uma expressão serena, acrescenta que agora existem outros lugares além deste onde ela se sente assim."
2287752414 = "No que você está pensando?"
4121937525 = "Koharu chamou o Sensei dizendo que tinha algo a perguntar, mas, como sempre, seus delírios tomaram conta e ela acabou indo embora sem mais nem menos."
1870310578 = "O que você está dizendo?"
775529512 = "Quando o Sensei visita Trinity por estar preocupado com as mensagens no MomoTalk, Koharu acaba agindo de forma estranha devido a uma mistura de emoções. Quando os outros alunos vão embora, ela gradualmente recupera a calma, apenas para explodir em delírios novamente, como de costume."
2262697203 = "O que você quer?"
1326481347 = "Koharu chama o Sensei dizendo que precisa vigiá-lo. Embora ela tenha dito que também queria ajuda com os estudos, no meio do processo, ela acaba tirando um livro erótico de dentro da bolsa."
1849950817 = "O que você pretende fazer?"
3380505746 = "Embora estivesse exausto a ponto de quase desmaiar, o Sensei vai até Trinity após receber um contato de Koharu. Ele ganha doces como agradecimento pela ajuda nos estudos, mas, a partir daí, os delírios dela se aceleram como sempre. O Sensei se aproxima dela e..."
1256271866 = "Uma garota um pouco peculiar"
25525610 = "O Sensei vai até a Escola Trinity após ser chamado por Hanako para ajudar com as aulas de reforço. Ao chegar e se encontrar com ela, eles não conseguem entrar no assunto principal, e uma conversa sexual, inimaginável para alguém com aquela aparência, começa a se desenrolar."
3323539392 = "Uma garota nada comum"
4063271474 = "O Sensei vai imediatamente à escola após receber uma mensagem de Hanako dizendo que, por um pequeno acidente, ela ficou presa no depósito de educação física. No entanto, ao chegar, a porta do depósito está aberta e, por algum motivo, Hanako está usando um traje de banho escolar. Enquanto tentam sair, confusos, eles são vistos por um guarda, o que gera ainda mais mal-entendidos e confusão."
3406107333 = "Presentes e uma garota"
1156066956 = "O Sensei acaba indo fazer compras com Hanako. Embora estivesse cauteloso, eles chegam a um shopping comum e parece que ela quer comprar meias... mas, logo em seguida, ela tenta presentear o Sensei com as meias que estava usando até então. Para piorar, um funcionário da loja vê a cena, e o Sensei, encurralado, foge como um coelho."
8639287 = "Uma garota na chuva"
3069991414 = "Preocupado com o conteúdo do MomoTalk, o Sensei decide procurar por Hanako. Depois de procurar por toda parte, ele a encontra em um parque, mas ela parece diferente do habitual. Aparentemente, Hanako sentia um certo sufocamento, mas, ao conseguir colocar isso em palavras, ela se sente um pouco mais leve, e a distância entre os dois diminui um pouco."
3904057311 = "Uma garota difícil de entender"
416436128 = "Hanako diz que recuperou o livro que havia sido confiscado. Quando o Sensei entra em pânico com o fato de ela rir e sugerir ler o conteúdo do livro em voz alta, ela demonstra arrependimento por ter provocado demais. Assim, os dois conversam calmamente até o ponto de ônibus."
2887102104 = "Alvo de escolta"
614600948 = "Azusa insiste em proteger o Sensei mais do que o normal, alegando que a praia aberta é perigosa. O Sensei percebe que, na verdade, Azusa está nervosa por ser sua primeira vez na praia e tenta gentilmente acalmá-la, mas..."
2589131515 = "Porque estou ao seu lado"
1254705188 = "O Sensei entra na fila da barraca de praia no lugar de Azusa. Embora sinta que o sabor do produto comprado seja, na verdade, um pouco duvidoso, ao ver Azusa dizer que está delicioso e conversar com ela, ele começa a se divertir, e o que come depois parece incrivelmente saboroso."
272574082 = "Meu mundo"
1518135893 = "Azusa parece sentir uma certa relutância ao observar o pôr do sol. O Sensei decide levá-la a um lugar de onde se pode ver todo o oceano. Ao ver a paisagem, Azusa conta ao Sensei sobre suas sensações um tanto peculiares."
4086591264 = "Um momento luxuoso"
3882763129 = "No meio da noite, o Sensei visita Azusa, que estava sentada na praia. Embora não houvesse um motivo específico, ela saboreava o fato de poder passar um tempo sem fazer nada. Ao ouvir isso, o Sensei também se sente feliz com o momento."
892100153 = "Falando em mar de verão..."
2520326930 = "Quando o Sensei visita Tsurugi, por algum motivo, não há mais ninguém por perto além dela. Pelo que Tsurugi conta, parece que todos fugiram ao vê-la na praia, confundindo-a com um fantasma. Ao ver Tsurugi com um ar solitário, o Sensei diz que ficar a sós também é bom."
2382724730 = "Como brincar no mar de verão"
1290507385 = "Como Tsurugi parece não saber como brincar no mar, o Sensei reúne todo tipo de brinquedo e a visita. Embora qualquer coisa que façam acabe se tornando uma forma peculiar de brincadeira, Tsurugi, um pouco ofegante, mostra uma expressão que parece feliz."
1474054634 = "Mar de verão, admiração e emoção"
286340295 = "Tsurugi passou momentos variados na praia. Embora tenha sido um pouco diferente do mar que ela imaginava, ela sorri, dizendo que foi bom ter vindo até aqui."
446907323 = "Fofura é justiça"
288034791 = "Mashiro, que estava escolhendo um novo traje de banho, fica chocada ao ouvir de um funcionário que \"trajes de banho fofos são justiça\". Depois, ao aprender com o Sensei que isso é apenas uma expressão, ela decide incorporar a justiça usando o traje fofo que ele recomendou."
627967675 = "Atiradora da praia"
1412156088 = "Mashiro desmaia devido a uma insolação enquanto usava uma roupa de camuflagem na areia da praia. Ela tenta retomar o treinamento imediatamente, mas é repreendida pelo Sensei e promete que, primeiro, fará o esforço de descansar."
1042934636 = "Prevenção contra insolação"
4168292743 = "Mashiro vai treinar na praia e o Sensei decide acompanhá-la. No entanto, o Sensei fica exausto apenas com os exercícios de aquecimento e acaba ganhando um sorvete que Mashiro trouxe para prevenir a insolação. Os dois fazem uma pausa temporária, mas..."
2602243770 = "Atiradores e fumaça gostam de lugares altos"
1234473319 = "Como parte de uma atividade voluntária, Mashiro sobe em uma torre de observação. Ela convida o Sensei, e os dois decidem comer sorvete enquanto ficam bem próximos na torre."
2522447731 = "Estreia no verão!"
3891504304 = "Hifumi vai comprar um novo traje de banho para o verão. Ela tenta escolher algo chamativo para sua estreia, mas, após ouvir as palavras do Sensei, repensa e compra um traje fofo. Ela aguarda ansiosamente a chegada do verão."
1131785799 = "De mal a pior"
638776663 = "Hifumi e o Sensei vão em direção a uma praia secreta a bordo de um tanque. No entanto, ao tentar estacionar o tanque, o traje de banho de Hifumi prende no corrimão e rasga. Para piorar, a esteira do tanque se solta, e o Sensei decide ir a pé buscar o uniforme de Hifumi, mas..."
1338557257 = "Após o uso, limpe os equipamentos e coloque-os de volta no lugar."
1038194354 = "Hifumi convida o Sensei para tomar um banho de sol e decide levar a Crusader-chan para passear. No entanto, eles são atingidos por uma onda gigante repentina e acabam tendo que lavar a Crusader-chan."
2720519106 = "Artigos do Peroro-sama de edição limitada de verão."
4171378080 = "Hifumi e o Sensei encontram por acaso uma pelúcia do Peroro com design limitado na praia. O sistema era ganhar o brinde ao comprar picolés, mas, apesar do design parecer justo, por algum motivo, eles não ganham nada. Mesmo assim, Hifumi insiste bravamente e consegue finalmente obter a pelúcia, mas ambos acabam passando mal do estômago."
1735121927 = "Hora do chá na madrugada."
3989855088 = "Aproveitando o feriado, o Sensei vai passear na praia para espairecer. No entanto, ele acaba sendo solicitado para várias tarefas e mal consegue descansar, até que Hifumi aparece montada na Crusader-chan. Assim, os dois passam um momento de descanso juntos."
2192111210 = "Algumas maneiras de aproveitar o verão com Izumi."
3585146498 = "Izumi entra em contato com o Sensei dizendo que, se vencerem um certo jogo, poderão comer iguarias de graça, então o Sensei vai até o local. Lá, descobrem a regra: se vencerem, ganham um Loco Moco especial, mas se perderem, precisam beber suco de Chavasco. Enquanto o Sensei fica cauteloso, Izumi toma atitudes extremamente arriscadas, revelando que, na verdade, ela queria beber o suco de Chavasco."
2207930638 = "Izumi e o ingrediente secreto."
1751574366 = "Em busca de iguarias de verão, Izumi leva o Sensei a um restaurante famoso por seu macarrão frio. Dizendo que é gostoso, mas falta um toque especial, Izumi adiciona manteiga de amendoim caseira. O Sensei, meio cético, experimenta e descobre que, surpreendentemente, combina perfeitamente com o macarrão frio. No dia seguinte, o boato se espalha..."
2195651191 = "Izumi e o monstro do verão."
4074605646 = "Izumi aproveita o tour gastronômico de verão com o Sensei. Quando o Sensei sugere que ela deveria nadar no mar já que estão lá, ela decide entrar na água para conseguir comer ainda melhor depois. No entanto, enquanto brincava no mar, ela é atacada por um polvo. No momento em que o Sensei tenta salvá-la, ela pensa: 'Se for para ser comida assim...', e acaba tentando comer o polvo."
1620499167 = "O melhor (?) refúgio de verão."
709254674 = "Izumi e o Sensei, que declararam que iriam conquistar todas as iguarias do mar, ficam exaustos com o calor e decidem descansar na sombra. Izumi tira vários ingredientes de uma caixa térmica para fazer um ponche de frutas, mas o Sensei acaba desmaiando após comer."
3295968282 = "A presidente do comitê e o passeio na praia."
3010205152 = "Hina estava passeando na praia com o Sensei como um ensaio para o acampamento, mas, no meio do caminho, ela é chamada para trabalhar pela escola e precisa se retirar. Depois, quando o Sensei começa a se preocupar porque ela não volta, ele recebe uma mensagem de Hina dizendo que, por algum motivo, ela está no centro de achados e perdidos."
1655107260 = "Trabalhando com a presidente do comitê."
500163992 = "O Sensei visita Hina, que está ocupada com o trabalho do Comitê Disciplinar mesmo durante o treinamento de acampamento. Ele decide ajudá-la com a carga de trabalho, e os dois passam o tempo organizando uma enorme quantidade de documentos. Quando finalmente terminam, não sobra tempo para ir à praia, mas os dois conseguem jantar juntos."
782812198 = "Com a presidente do comitê na noite de verão."
170121594 = "Hina tinha prometido ir à praia com o Sensei, mas, como acordou cedo para trabalhar, acabou adormecendo de exaustão e perdeu o horário combinado. Ao acordar, Hina pede desculpas ao Sensei que estava por perto, mas ele diz que ainda não acabou, pega a mão dela e a leva para um terraço com vista para o mar."
1063317491 = "Algo precioso para sempre."
562904619 = "O Sensei decide dar uma aula particular de natação para Hina, que diz não ser boa nisso. No entanto, devido a vários imprevistos, Hina fica deprimida, achando que, em vez de ter uma aula, ela só está roubando o tempo do Sensei. O Sensei a consola e os dois passam um momento juntos."
121651125 = "O que não se deve fazer no mar."
801476589 = "Iori, que estava estabelecendo as regras para o acampamento na praia, pede conselhos ao Sensei sobre 'o que não se deve fazer no mar'."
828409727 = "O ponto fraco de uma certa integrante do Comitê Disciplinar."
1423535926 = "Após receber uma mensagem acidental no MomoTalk, o Sensei, preocupado, segue Iori e a vê comprando uma boia secretamente. Quando ela desiste e confessa que não sabe nadar, o Sensei propõe que pratiquem natação juntos."
3945086099 = "Um pequeno momento."
3982380859 = "Iori e o Sensei capturam infratores das regras na praia. Ela sugere que, por precaução, eles se dividam para patrulhar a área. Ao seguir Iori, que estava agindo de forma estranha, o Sensei a flagra aproveitando um banho de sol atrás de umas rochas isoladas."
4161301031 = "Banho de areia."
1639986624 = "Quando Iori visita o Sensei achando que ele está fazendo algo estranho novamente, ela o encontra aproveitando um banho de areia. Inicialmente, Iori olha com desconfiança, mas, ao ser incentivada pelo Sensei a experimentar, percebe que é mais agradável do que pensava. Iori acaba cochilando e, ao acordar, descobre que alguém fez uma estátua de sereia sobre seu corpo."
2618097705 = "Praia ao pôr do sol."
2453697925 = "Iori reprime delinquentes que faziam bagunça na praia. No entanto, como o Sensei, que veio ajudar, ficou encharcado devido aos efeitos da batalha, ela decide emprestar seu cobertor pessoal, que ela cuida com muito carinho."
3842642425 = "Longa viagem em Kivotos."
683246259 = "Como agora tem um pouco mais de tempo livre, Shiroko decide tentar realizar seu desejo antigo de atravessar Kivotos de ponta a ponta. Embora hesite um pouco ao ver a expressão preocupada do Sensei, ao ouvir que ele ficaria feliz se ela entrasse em contato com frequência, ela parte para a jornada com um rosto radiante."
1462935881 = "Algo especial só meu."
1892594340 = "O Sensei, que recebe atualizações frequentes de Shiroko conforme o prometido, vai visitá-la levando suprimentos e outros itens. Ao encontrar o Sensei, vários sentimentos nascem dentro dela, que agora sente que não está mais sozinha."
3283621877 = "Onde quer que esteja."
2757117157 = "O Sensei encontra Shiroko em vários pontos, conforme ela havia indicado. Apesar da carga de exercícios intensa, a cada encontro, Shiroko parece estar se divertindo."
2843691457 = "O lugar para onde voltar."
4094165763 = "Pouco antes da linha de chegada, Shiroko chega ao Schale. Enquanto ouve as histórias de sua jornada por Kivotos, o Sensei e Shiroko caminham lado a lado lentamente em direção a Abydos."
137781174 = "Ser pequena também é bom!"
1322340430 = "Shun, que voltou a ser pequena devido aos efeitos colaterais do remédio, decide aproveitar a oportunidade para comer seu parfait favorito de edição limitada até se fartar, indo com o Sensei ao café que costuma frequentar. No entanto, parece que, conforme seu corpo encolheu, seu paladar também foi afetado...?"
2841094582 = "Ser pequena definitivamente não é bom!"
149905902 = "Enquanto Shun estava organizando o Jardim das Ameixeiras em sua forma pequena, ela acaba ficando presa em um lugar alto. Depois de entrar em contato com o Sensei para ser resgatada, ela precisa que ele a carregue nos ombros para continuar a organização, e acaba se divertindo com isso."
128361082 = "É por segurança!"
2341039634 = "Shun e o Sensei vão ao 'Playland', recém-inaugurado no distrito central de Kivotos. Shun diz que precisa verificar a segurança do ponto de vista das crianças, mas seus olhos brilham de diversão."
2891798612 = "Isso é um segredo."
3254263628 = "Shun vai com o Sensei até o local da base secreta que costumavam frequentar antigamente. Dentro daquela base nostálgica, ela reflete sobre o passado e o futuro."
4082121735 = "O que muda, o que não muda."
2268442326 = "Com sua aparência jovem, Shun aproveita para usar o penteado que gostava antigamente. Quando o Sensei diz que ela deveria usar esse penteado mesmo quando crescesse, Shun reclama que, ao se tornar adulta, surgem penteados e acessórios que não combinam mais, mesmo que ela goste deles. O Sensei ri e diz que não há problema em continuar gostando das mesmas coisas mesmo depois de adulta."
3306119972 = "A investigação despreocupada"
1067431467 = "Kirino e o Sensei, que começaram uma patrulha, descobrem um cidadão com um comportamento suspeito, como se estivesse \"carregando uma bomba\". Enquanto o seguem discretamente, um ladrão aparece do nada, causando uma confusão, mas, no final, eles conseguem garantir a bomba de alguma forma. No entanto, a bomba que eles recuperaram não era, na verdade, uma bomba...?"
2874205992 = "Tiros e zircônia"
3960259754 = "Kirino sai correndo, pois o negociador está atrasado e ela não pode ficar parada pelo bem do refém. Ela começa a negociar, mas não dá certo e, sem escolha, ela dispara, mas a bala acaba atingindo o refém. O criminoso, confuso com a situação inesperada, acaba se rendendo após uma série de mal-entendidos."
3444429399 = "O Atirador / Dois alvos principais?"
301172044 = "Kirino realiza um treinamento de tiro enquanto o Sensei observa ao lado. A arma não deveria estar quebrada, mas, por algum motivo, ela sempre acerta o alvo que representa o refém, não importa a distância. Seguindo o conselho do Sensei, ela relutantemente tenta mirar no refém e então...?"
84381503 = "Conexão de ferro"
1057319864 = "Crianças de um jardim de infância próximo virão visitar a Academia de Polícia Valkyrie, e Kirino é encarregada de guiá-las. No entanto, as coisas não saem bem e ela acaba se algemando por conta própria, mas, no final, as crianças sorriem para Kirino por ela ter sido tão sincera no atendimento."
3316056 = "O truque do gênio"
3154017608 = "Saya aparece energicamente no local de encontro com o Sensei, montada em um skate. Ela insiste que é o veículo perfeito para percorrer a Câmara de Comércio Genbu e, por sugestão dela, o Sensei tenta andar também, mas...?"
3491617475 = "O dia de folga do gênio"
2985293516 = "Saya foi à loja com Nezumi-suke para saborear o \"Bolo de queijo azul especial para casais\", mas teve seu pedido recusado devido às regras da loja. No entanto, o Sensei, que estava preocupado com a conversa no MomoTalk com Saya, aparece e consegue fazer com que o pedido seja aceito. Embora Saya afirme que \"o gênio é solitário\", ela acaba aproveitando o dia de folga com o Sensei."
1858393728 = "O restaurante delicioso da Saya"
776648188 = "Ao chegar na loja de lámen favorita da Saya, um cheiro incrível paira no ar. Quando o Sensei e Saya perguntam o que aconteceu, descobrem que o novo item do menu tem um cheiro forte demais. A pedido do dono, Saya começa a tirar vários produtos químicos de suas mãos. O resultado é um lámen incrivelmente apimentado, que acaba se tornando um grande sucesso entre alguns entusiastas...?"
2717662380 = "O que flui"
1831782779 = "O molho super apimentado especial desenvolvido por Saya tornou-se popular instantaneamente e virou uma febre em toda a Câmara de Comércio Genbu. No entanto, Saya fica farta da situação, já que até os doces da cafeteria começaram a ser temperados com ele, e declara a interrupção da produção."
2977660904 = "O motivo de escolher o skate"
1522951562 = "Para ajudar em um evento no parque, Saya desenvolveu um perfume que \"relaxa o corpo naturalmente e deixa a mente leve\". Ela diz ao Sensei que é mais conveniente espalhar o perfume usando um skate. Assim, Saya espalha o perfume por todo o parque enquanto anda de skate, mas... embora Saya caia por ter relaxado demais devido ao efeito do perfume, o evento termina sendo um grande sucesso."
1753704494 = "Pedido de apoio"
2602091299 = "O Sensei recebe uma mensagem de Neru, que está com dificuldades para vestir a roupa de coelhinha. No entanto, ao chegar, Neru fica surpresa com a presença do Sensei...?"
165180404 = "Justamente por não ser nada demais"
3543262161 = "Neru estava usando a roupa de coelhinha para se acostumar caso precisasse, mas parece que ela teve bolhas nos pés por causa dos saltos altos aos quais não está acostumada. Embora diga que não é nada demais, ela pede ao Sensei que cuide do ferimento."
1674452406 = "Olhares"
4250635903 = "Ao visitar Millennium após ser chamada por Neru, que disse ter \"algo a confirmar\", ele encontra Neru vestida de coelhinha. Segundo ela, que está recebendo mais olhares do que o habitual, ela queria saber como aquela roupa é vista pelas pessoas...?"
2462150601 = "Um ângulo inesperado"
1600305466 = "O Sensei foi solicitado por Karin a \"trazer algo necessário para a missão\", mas não havia ninguém no ponto de encontro. Parece que Asuna, que deveria receber o item, foi para outro lugar. Então, ele decide visitar Karin diretamente durante a missão, mas, ao chegar, uma cena inesperada surge diante de seus olhos..."
2181471164 = "Um mal-entendido inesperado"
2467790110 = "Ao visitar Karin, que estava infiltrada em um café, ele a encontra vestindo alegremente a roupa de coelhinha. Enquanto conversavam sobre Karin e a roupa de coelhinha, parece que um estranho mal-entendido surgiu..."
367799569 = "Uma conclusão inesperada"
1433841241 = "O Sensei foi chamado por Karin e visitou seu quarto. Lá, ele finalmente consegue esclarecer o mal-entendido anterior. Quando o Sensei explica sua intenção original, Karin fica surpresa por ele ter se interessado por ela e por ter percebido coisas sobre ela antes mesmo dela mesma, sentindo uma emoção calorosa em seu peito."
1141743172 = "A ecologia de Asuna"
221988864 = "O Sensei recebe uma mensagem de Asuna no meio da noite e, preocupado, vai até ela. Ao chegar na lavanderia 24 horas, ele encontra Asuna vestida de coelhinha por algum motivo...?"
814287263 = "A ecologia do coelho"
3643670542 = "Asuna, encontrada perto do rio, estava vestida de coelhinha por algum motivo. Ela diz que está se tornando um coelho para entender a ecologia dos coelhos. Então, ela começa a dizer que, como é um coelho, quer que ele faça carinho nela..."
1615861420 = "A ecologia da coelhinha"
2918162060 = "Asuna, encontrada no café, parece estar pensando sobre o significado da roupa de coelhinha. Durante a conversa, Asuna diz coisas absurdas que deixam o Sensei em apuros, mas, no final, parece que ela entendeu o ponto."
391217910 = "A grande confusão da cauda"
3144520066 = "Chamado por Asuna vestida de coelhinha, ele decide competir com ela para descobrir se a granada em forma de cauda que ela segura é real ou não. Enquanto ele pensa se há alguma vantagem em vencer essa disputa, ele percebe que algo parecido com o pino de segurança da granada caiu... e o Sensei acaba tendo que perseguir Asuna com todas as suas forças."
18689073 = "1ª aula \"Disciplina: Romance\""
1368636690 = "Um dia, Natsu envia uma mensagem misteriosa. Quando ele vai encontrá-la em Trinity, Natsu tira biscoitos caseiros e começa a falar sobre \"romance\"...?"
479881100 = "2ª aula \"Disciplina: Tolerância\""
4189558159 = "Natsu, que enviou uma mensagem preocupante no MomoTalk, visita Schale com um sorvete na mão. Enquanto prepara um espresso e faz um affogato, ela conta sobre uma notícia que viu esta manhã, e o Sensei toca no interior dela, que está por trás daquelas palavras."
2721314425 = "3ª aula \"Prática: Escavação\""
1566724822 = "O Sensei é chamado repentinamente por Natsu para irem juntos a uma \"loja de doces esquecida\". Natsu fica profundamente emocionada ao chegar ao local, mas, desejando que o romance daquele lugar continue sendo um romance, ela diz que tudo o que aconteceu hoje deve ser mantido em segredo."
1618294287 = "Intervalo de almoço \"Quiosque\""
2377126702 = "O Sensei é chamado repentinamente por Natsu e vai até ela. Natsu, que o chamou, parece feliz ao ver o Sensei. Os dois compartilham uma torta de mirtilo e passam um tempo precioso sem fazer nada."
4119434234 = "Uma irmã exemplar"
1452376206 = "Após um MomoTalk casual, o Sensei visita Mari, da Sisterhood. O Sensei tenta validar o espírito maravilhoso dela, que se esforça sinceramente para se tornar uma irmã exemplar, mas talvez por ter se empolgado um pouco, ele acaba recebendo uma punição divina (?)."
3212708973 = "Uma oração por você"
2690251888 = "Preocupada com os acontecimentos anteriores, Mari reza pelo Sensei. Ela ainda segura a mão do Sensei e reza junto com ele."
2250100664 = "Punição interior"
3849636343 = "Ao ouvir que Marie não estava se sentindo bem, o Sensei vai visitá-la. Marie parecia angustiada, pensando que talvez tivesse sido punida por ter sido indulgente consigo mesma, mas, através de uma conversa com o Sensei, que lhe disse: 'Acho que não foi uma punição, mas sim algo que veio para te ajudar', ela pareceu encontrar paz tanto no corpo quanto na mente."
4076992554 = "Meu desejo"
3986468370 = "Em um campo de tiro solene, Marie estava em silêncio, fazendo uma oração. Ela confessa ao Sensei o desejo que guarda para si mesma, não como uma irmã, mas como uma pessoa comum."
2267732676 = "Sentimentos verdadeiros"
2902570837 = "Marie se sente atraída por acessórios adoráveis em um shopping. No entanto, ao vê-la resistir à vontade de comprar, o Sensei tenta presenteá-la. Marie recusa, dizendo que, por ser uma irmã, deveria evitar se enfeitar, mas sente-se aliviada pelas palavras do Sensei: 'Antes de ser uma irmã, você é uma aluna'. Ela então aceita prontamente o convite dele para irem comer algo."
2965761760 = "O segredo da cantora virtual"
3588938678 = "Hatsune Miku, a cantora virtual. Ela consegue um corpo real emprestando a tecnologia de Kivotos para realizar um show. Porém, certo dia, sua voz começa a falhar. Em apuros, ela decide pedir ajuda ao famoso 'Sensei', conhecido por resolver sucessivamente os vários incidentes de Kivotos..."
1011014524 = "A preocupação da cantora virtual"
3188134202 = "Sem conseguir esconder por muito tempo, o fato de que sua voz não saía acaba sendo descoberto pelos organizadores do show. Miku tenta vários métodos junto com o Sensei, mas...?"
3690602347 = "Os sentimentos da cantora virtual"
391861432 = "Com o show se aproximando, a voz de Miku ainda não sai. No entanto, ao ouvir uma música que cantou logo quando estreou, ela subitamente consegue cantar acompanhando a melodia. O Sensei percebe que o problema está ligado aos sentimentos dela e elabora um plano."
358973352 = "O palco da cantora virtual"
1256619760 = "O Sensei usa sua autoridade como Schale para alterar o setlist do show de forma quase forçada, mudando o conteúdo para músicas que a própria Miku compôs. Pressionados pelo Sensei, que assume toda a responsabilidade, a equipe decide seguir com o plano. A voz de Hatsune Miku ecoa por todo o Kivotos."
3822667143 = "De qualquer forma, é uma conspiração!"
1052016123 = "Ako chama o Sensei para fazer várias exigências ao Schale. Enquanto o Sensei fica confuso, Ako vai se exaltando, mas, no meio do caminho, parece perceber o que está fazendo. Após respirar fundo e exibir seu sorriso habitual, ela vai embora para algum lugar."
3731268869 = "De qualquer forma, é uma emergência!"
3900941619 = "Ako chama o Sensei dizendo que tem um assunto urgente. Quando ele chega, ela despeja sobre ele todas as infelicidades que teve no dia. O Sensei ouve todas as reclamações, mas, assim que ela termina, Ako tenta ir embora. Quando ele pergunta se o assunto urgente está resolvido, Ako responde com um sorriso aliviado que a conversa que acabaram de ter era a urgência."
2871973874 = "De qualquer forma, a culpa é do Sensei!"
490128902 = "Preocupado com o conteúdo do Momotalk, o Sensei visita Ako. Durante a conversa, ela começa a dizer que o agravamento de seu estresse é culpa dele. Enquanto Ako continua a descontar sua raiva, ela diz seu bordão habitual: 'Quer apostar?'. O Sensei aceita, pensando que isso pode aliviar o estresse dela. No entanto, Ako perde a aposta e acaba tendo que usar uma coleira. Ainda assim, no final, ela parecia estar um pouco mais aliviada."
150871999 = "As férias de inverno da presidente do conselho estudantil barbuda"
2718480801 = "Cherino alugou uma fonte termal para aproveitar as férias de inverno, mas, além da fonte em si, como ela está sempre relaxando, parece não ter nada de novo para fazer. Nesse meio tempo, ela encontra uma 'mesa de pingue-pongue' e desafia o Sensei para uma partida...?"
4282893984 = "Mais macio que pudim"
3630181932 = "Ao ouvir que 'ovos cozidos na fonte termal são macios e gostosos como pudim', Cherino decide fazer alguns imediatamente. Ela pega todos os ovos disponíveis no departamento de merenda e os cozinha na fonte, mas, ao provar, fica decepcionada. Tendo confundido o sabor com o de pudim, Cherino fica indignada e pergunta por que ninguém a avisou antes."
221973324 = "A barba à prova d'água"
944686474 = "Cherino menciona que um dos motivos pelos quais não gosta muito de fontes termais é que 'sua barba fica molhada'. Então, como uma ideia brilhante, ela se inspira nas penas de um cisne e decide mergulhar a barba em óleo. No entanto, como o óleo era de gergelim, Cherino acaba sofrendo com o cheiro extremamente forte depois."
2691752229 = "A autoridade feita de leite"
699204964 = "Para animar Cherino, que está deprimida por causa do incidente da barba, o Sensei a convida para a fonte termal. Ao sair, ele a presenteia com um leite de frutas. Ao beber, Cherino fica satisfeita, dizendo: 'Além de delicioso, quando bebo, nasce uma barba ao redor da boca!'. Porém, ao continuar bebendo por impulso, ela acaba passando mal do estômago."
3413696609 = "A assistente do banho"
2914497765 = "Chamado por Cherino, o Sensei visita a estância termal e vê o patinho de borracha que ela possui. Aparentemente, Cherino está insatisfeita por ter que colocar a barba da autoridade no boneco. O Sensei sugere que ela tente entrar no banho junto com o patinho."
3698230489 = "Workaholic"
1902460226 = "O Sensei, que visitava uma fonte termal perto de Gehenna, encontra Chinatsu, a pessoa que lhe recomendou o local. Acontece que, por coincidência, seus períodos de descanso coincidiram. No entanto, Chinatsu parece preocupada com o trabalho acumulado e não consegue largar os documentos. Ao ver isso, o Sensei se oferece para ajudar, e os dois terminam o trabalho na fonte termal."
3640094321 = "Terapia com ervas medicinais?"
2528966174 = "Chinatsu prepara um 'chá de ervas medicinais' para o Sensei, que está descansando. Enquanto acalma Chinatsu, que está mais entusiasmada do que o normal, o Sensei consegue passar um tempo relaxante com ela."
3450750046 = "Retribuição"
794685547 = "Para retribuir o tempo de folga, Chinatsu visita uma loja de lembranças para comprar presentes para os membros do Comitê Disciplinar. Enquanto conversa alegremente com o Sensei, ela examina os itens um por um. Após terminar as compras, o Sensei a presenteia com o laço que ela mesma havia chamado de 'fofo' anteriormente, como um agradecimento pelo dia a dia."
1859264697 = "Apenas para os dois"
918925541 = "Como retribuição pelo laço que recebeu, Chinatsu presenteia o Sensei com um voucher de hospedagem em uma pousada. No entanto, houve um erro na reserva e os dois acabam sendo tratados como um casal pela pousada. Apesar de ficar nervosa com a situação repentina, Chinatsu aproveita um tempo agradável e divertido."
3800350579 = "Mentiras e mal-entendidos"
236937520 = "Enquanto faz compras com o Sensei, Tomoe ouve um mal-entendido sobre ele na cidade. Ela consegue dissipar o boato com seu discurso habilidoso, mas esse mesmo discurso acaba gerando um novo mal-entendido."
799463473 = "Faça pausas entre os intervalos"
719836184 = "Para o Sensei, que está cansado de tanto trabalhar, Tomoe prepara um kit de soneca. Ouvindo sua canção de ninar, o Sensei consegue desfrutar de um sono confortável."
1317246530 = "Na neve"
284850586 = "No caminho de volta de uma patrulha de discursos regulares, Tomoe e o Sensei são pegos por uma nevasca. Eles encontram uma cabana próxima e conseguem evitar o desastre. Enquanto seca suas roupas molhadas, Tomoe percebe o olhar do Sensei e, alegremente, começa a falar sobre Cherino, dizendo: 'Já que é assim...'."
2231726565 = "Não cometi falhas, e isso não consta nos registros"
3957122344 = "Para Cherino, que odeia pimentão, Tomoe tenta criar um doce usando o ingrediente. Embora tente várias coisas com o Sensei, nada dá certo. No final, Tomoe decide agir como se 'tal plano nunca tivesse existido desde o início'."
888674982 = "Uma mentira sutil é quase um erro"
58356917 = "Tomoe sugere ao Sensei que gravem um documentário sobre a presidente Cherino. Eles visitam vários lugares seguindo os passos dela, mas o Sensei percebe no meio do caminho que Tomoe não está com a câmera. Ao perguntar sobre isso, ela cita uma fala de um filme: 'Uma mentira sutil é quase um erro'."
824872411 = "Treinamento: Edição de culinária Kaiseki"
523671672 = "Para quando a estância termal for revivida no futuro, Nodoka decide começar seu treinamento como gerente. Ela tenta servir um banquete Kaiseki para o Sensei, mas...?"
2565382189 = "Treino: Limpeza"
3330425173 = "Como parte de seu treinamento para se tornar uma dona de estalagem exemplar, Nodoka limpou o banheiro do Schale. Assim que a água estava quase pronta, o Sensei a informou que não haveria água quente hoje devido a uma obra, deixando Nodoka desanimada por seu plano ter falhado."
4230538315 = "Treino: Etiqueta"
3390509471 = "Para aprender a andar com elegância, Nodoka começa um treino caminhando sobre uma estrada escorregadia enquanto segura uma almofada. No entanto, em um momento de descuido, ela tropeça e torce o tornozelo. O Sensei a carrega nas costas de volta para o Schale, e Nodoka, silenciosamente, sente-se feliz por essa vantagem."
608936968 = "Treino: Descanso"
3128779278 = "Por causa do tornozelo machucado de Nodoka, o Sensei a convida para uma fonte termal que dizem ser boa para a recuperação. Nodoka sente um leve alívio ao descobrir que é apenas um escalda-pés, mas fica encantada com o calor da água e a bela paisagem."
2400865026 = "Antes que este ano termine"
3775606218 = "Em um dia próximo ao Ano Novo, Aru chama o Sensei para irem alugar quimonos juntos. No entanto, levada pela conversa do atendente, Aru acaba comprando um quimono caro, justificando que é parte de um investimento."
1207833116 = "As costas que quero mostrar"
3154422011 = "Após a virada do ano, Aru pede ao Sensei que a acompanhe em um jantar com empresários famosos de Kivotos. Vestindo o quimono que alugou anteriormente, ela se esforça para causar uma boa impressão no Sensei, mas...?"
2296868625 = "O primeiro passo com você"
672381548 = "No dia de Ano Novo, Aru entra em contato com o Sensei. Eles vão ao templo para fazer uma oração e, no caminho de volta, Aru pede a opinião do Sensei sobre o seu quimono."
3587591035 = "Sorte de Ano Novo"
4191647869 = "Aru vai tirar a sorte no templo com o Sensei. No entanto, não importa quantas vezes ela tente, só sai o resultado de 'má sorte'. Aru fica indignada, mas ao ler o resultado da sorte do Sensei, ela abre um sorriso."
2459534347 = "Um presente para o Sensei"
1129754769 = "Mutsuki aparece vestida de quimono diante do Sensei, que estava dormindo profundamente logo após o Ano Novo. O Sensei recebe um Osechi dela, mas o conteúdo é uma bomba-relógio! O Sensei fica em dúvida sobre qual fio cortar, mas, impiedosamente, o tempo acaba...?"
2385954924 = "Ano Novo com estilo!"
335158519 = "Para escrever seus desejos em uma placa Ema, o Sensei sai com Mutsuki. Enquanto o Sensei finalmente começa a escrever após passar pela multidão, Mutsuki pega a placa de forma brincalhona. Como Mutsuki não escreveu nada, o Sensei acaba escrevendo por ela."
2713380999 = "Uma batalha intensa"
3857167523 = "Quando o Sensei vai ao local combinado após ser chamado por Mutsuki, uma partida de 'Hanetsuki' começa de repente. Com a regra de que 'quem perder deve fazer tudo o que o vencedor pedir', Mutsuki começa a partida se divertindo como sempre, mas...?"
470221661 = "Estudando para ser sacerdotisa"
3007775160 = "Como um trabalho de meio período de Ano Novo, Serika decide trabalhar como sacerdotisa. Ao ouvir que 'quanto mais perfeita for a sacerdotisa, maior será o salário', ela pesquisa por conta própria e pede conselhos ao Sensei. Depois de ouvir várias histórias do Sensei, descobre-se que tudo vinha de jogos e animes...?"
2523978486 = "Especialista no mundo das sacerdotisas"
979203914 = "Serika começou seu trabalho como sacerdotisa, mas parece que as coisas não estão indo muito bem. No entanto, com o incentivo do Sensei, ela recomeça e, de repente, uma enxurrada de pedidos de conselhos começa a chegar."
2340715417 = "Só mais um pouco"
2269796876 = "Dizendo que quer fazer compras para o pessoal de Abydos, o Sensei marca um encontro com Serika. No entanto, na hora marcada, Serika não aparece. Preocupado, o Sensei sai correndo para procurá-la e, de algum lugar, ouve o miado de um gato...?"
3759928433 = "Um reencontro gentil"
576523944 = "O Sensei, ao passear por Kivotos, acaba se envolvendo em extorsões, brigas com delinquentes e outros infortúnios. Ele tenta escapar, mas uma explosão misteriosa o salva. Por trás daquela explosão, que parecia proteger o Sensei, estava Wakamo."
3463568525 = "Um encontro a sós"
649370719 = "Explosões e balas perseguem o cotidiano do Sensei. Para Wakamo, que chama o ato de perseguir pelas sombras de 'encontro', o Sensei diz: 'Da próxima vez, vamos juntos'."
888544873 = "Um encontro distorcido"
657109644 = "Wakamo planeja cuidadosamente o encontro, mas, no dia, uma série de infortúnios e contratempos acontece. O Sensei tenta animar Wakamo, que está totalmente desanimada, mas, no dia seguinte, ela já está bem e pede outro encontro."
337655417 = "Um coração inabalável"
1672717160 = "Devido ao trabalho, o Sensei se atrasa para o encontro com Wakamo. O Sensei pede desculpas pelo atraso, mas Wakamo parece não se importar. Ao ouvir que 'o Sensei nunca a trairia, então ela pode esperar por meses', o Sensei não consegue evitar um suor frio."
4127733603 = "Sentimentos ocultos"
684934471 = "Percebendo uma atmosfera estranha no MomoTalk, o Sensei diz que quer passar o dia com Wakamo. Envergonhada com as palavras do Sensei, Wakamo foge, e o Sensei acaba tropeçando ao persegui-la. Preocupada, Wakamo ouve o Sensei pedir para ver o que há sob sua máscara, e assim, ela conta a história sobre sua máscara."
443018916 = "Como é uma ferida"
4068284168 = "Sena faz seu trabalho 'de sempre': ir ao local de conflito entre delinquentes para proteger os feridos. Ela também nocauteia os membros do Comitê Disciplinar que tentavam levar o mentor ferido à força para interrogatório, e então transporta os feridos."
2901484910 = "Situação de emergência"
4226549044 = "Vendo o Sensei trabalhar mesmo estando doente, Sena decide ajudá-lo. Ela auxilia em várias tarefas para que o trabalho seja concluído e, no final, cuida do Sensei que acabou adormecendo."
948530229 = "Sena Himuro"
1708902441 = "Como agradecimento pela ajuda recente, o Sensei convida Sena para um piquenique. Ciente de sua própria falta de expressão, Sena transmite sua alegria e gratidão ao Sensei com palavras diretas, típicas dela."
1699201785 = "Em espera"
3298489040 = "O Sensei visita Sena, que passa a noite sozinha como pessoal de prontidão para emergências. Sena saboreia a felicidade de passar a longa noite com o Sensei, sem fazer nada em especial."
2267997112 = "Verificação de segurança"
837950607 = "Senhas coladas em papéis, chaves dentro da caixa de correio. Ao notar os muitos problemas de segurança do Schale, Chihiro dá uma bronca no Sensei que dura várias horas."
3713208438 = "Método de hacking"
4238915657 = "Para um novo contrato de trabalho, Chihiro leva o Sensei para a negociação. A técnica de hacking de Chihiro não se limita ao campo eletrônico; ela utiliza o Sensei para realizar um 'hacking emocional' e consegue fechar o contrato."
520601278 = "Manutenção"
3844936871 = "Chihiro e o Sensei passam a noite trabalhando na manutenção do centro de dados. Após terminarem, na cidade silenciosa, Chihiro fala sobre a simpatia que sente pelas máquinas de venda automática."
434697728 = "Preto & Branco"
1764792485 = "Chihiro, contratada para um trabalho de verificação de segurança, percebe durante a inspeção que a empresa está envolvida em atividades criminosas. Dividida entre seu dever como responsável pela segurança e sua consciência, Chihiro finalmente decide expor a fraude."
1910728491 = "A ideia de uma policial preguiçosa"
3560375484 = "Fubuki, que quer tirar uma soneca durante o expediente, instala uma macro no MomoTalk. Ela tenta automatizar as respostas às mensagens, mas o algoritmo mal feito acaba causando problemas. No final, ela acaba tendo que escrever uma pilha de relatórios de desculpas."
1170334966 = "A patrulha de uma policial preguiçosa"
2139982306 = "Fubuki é encarregada da patrulha de fim de semana. Durante a ronda, ela vê alguns delinquentes, mas, por ser trabalhoso, tenta tratá-los como 'pessoas boas' e ignorá-los. No entanto, essa atitude acaba emocionando os delinquentes, fazendo-os mudar de vida. No fim, ela acaba ficando presa em problemas mesmo assim."
1238659725 = "A campana de uma policial preguiçosa"
1704488465 = "Fubuki demonstra um entusiasmo incomum pelo trabalho de campana. Quando o Sensei a acompanha por sentir que algo está estranho, como esperado, o objetivo de Fubuki não era a missão, mas sim os donuts que acompanhavam a vigília."
975406302 = "A gentileza de uma policial preguiçosa"
549498692 = "Durante o trabalho, Fubuki encontra uma garota que perdeu seu grampo de cabelo. Embora recuse a busca pelo grampo alegando as regras, Fubuki vai procurá-lo secretamente. Ela diz que o motivo é 'por causa de uns donuts deliciosos'."
327110961 = "É de manhã, pode acordar?"
3796601530 = "Mimori vem acordar o Sensei, que costuma dormir demais por estar sobrecarregado com o trabalho no Schale. Aspirando ser uma Yamato Nadeshiko, Mimori se dedica a cuidar do Sensei desde cedo."
3321521936 = "Treinamento de noiva parte 1: Culinária caseira"
1981885852 = "Como parte de seu treinamento para se tornar uma Yamato Nadeshiko, Mimori pratica culinária caseira. Embora cometa erros típicos ao praticar com o Sensei, ela fica aliviada ao conseguir finalizar o prato de forma deliciosa com ele no final."
4146994927 = "Treinamento de noiva parte 2: Limpeza"
1361337265 = "Como parte de seu treinamento para se tornar uma Yamato Nadeshiko, desta vez Mimori faz a limpeza. Quando você comenta que ela parece gostar de limpar enquanto ela faz o serviço alegremente exibindo suas habilidades, ela concorda, mas murmura: 'Se eu estivesse sozinha, não ficaria tão animada assim'."
2432518592 = "Ponto a ponto, com todo o coração"
4002112709 = "Pedindo para o Sensei acompanhá-la nas compras, eles saem juntos. O que Mimori veio comprar é um lenço. Ela faz um bordado no lenço que comprou, algo que vinha praticando secretamente, e o presenteia ao Sensei como prova de sua gratidão."
4023636786 = "A seriedade de uma Yamato Nadeshiko"
4253217632 = "Mimori convida o Sensei para o Clube de Economia Doméstica para mostrar os resultados de seu treinamento culinário e pega um avental para limpar a sala bagunçada. Ela conta que aquele avental é uma lembrança que comprou quando decidiu que queria se tornar uma Yamato Nadeshiko."
2653666458 = "A dona da biblioteca antiga"
407306471 = "Ui, que sente estresse ao interagir com pessoas de fora, vive reclusa na biblioteca antiga. No entanto, ela abre um pouco o coração para o Sensei, que a visita por preocupação, e começa a interagir aos poucos."
1710419489 = "A criança desaparecida"
3020671650 = "Quando outros membros limparam a biblioteca antiga, Ui percebe que um dos livros do acervo desapareceu. Junto com uma Ui agitada, o Sensei procura por 'aquela criança' e, após muito tempo, consegue encontrá-la."
2628285155 = "Uma proposta repentina"
1721570820 = "Ui prepara um livro em branco como meio de comunicação com o Sensei. Sendo grande demais para carregar, ele fica na biblioteca antiga e se torna um quadro de mensagens onde o Sensei e ela compartilham suas impressões sobre os livros."
4161300230 = "Sem nome"
1304365797 = "Ui pede ajuda ao Sensei devido ao cansaço do trabalho de decifração. Graças à bebida energética que o Sensei trouxe, ela consegue terminar o trabalho e acaba adormecendo ali mesmo."
1272486088 = "A administradora da catedral"
2112303416 = "Hinata e o Sensei trabalham juntos no depósito da catedral, suando a camisa. Como resultado, eles acabam sendo alvo de mal-entendidos por parte dos outros alunos ao redor."
3466205653 = "O excesso é tão ruim quanto a falta"
903624085 = "Hinata não tenta tirar folga de jeito nenhum. O Sensei a leva, um pouco à força, para um lugar deserto. Eles descansaram calmamente, mas parece que, mais uma vez, foram alvo de mal-entendidos pelos alunos ao redor."
114552415 = "Dentro do arbusto"
1527438767 = "O Sensei, ao procurar por Hinata, acaba entrando por engano em uma área proibida para não membros. Prestes a serem descobertos por outros alunos, os dois se escondem rapidamente dentro de um arbusto. No final, Hinata sai do arbusto, mas parece que, desta vez também, os alunos entenderam tudo errado."
4143765441 = "O que levar para um piquenique"
3753682808 = "No feriado, o Sensei sai para um piquenique com Hinata. Com conversas tranquilas e uma marmita feita à mão, eles passam um dia feliz."
709626164 = "Piquenique de furoshiki"
1140812726 = "Hinata decide ir a um piquenique com o Sensei. Quando ela tenta abrir a marmita feita à mão que preparou, o que estava embrulhado no furoshiki não era a comida, mas sim o 'livro de registro de inventário'. Diante de uma Hinata confusa, o Sensei oferece sua própria marmita e eles leem o 'livro de registro de inventário' enquanto comem juntos."
2874669650 = "O interrogatório da chefe do comitê de segurança"
1738744695 = "O pudim guardado pelo Clube de Merenda desaparece, e Marina investiga o caso. A conclusão final a que a brilhante dedução da chefe do comitê de segurança chega é que a própria Marina é a espiã traidora."
3135302426 = "A dedução da chefe do comitê de segurança"
690185550 = "Marina, perseguindo o caso do pudim desaparecido, percebe que o culpado é uma fera com garras e presas afiadas — um gatinho. Assustada com o gatinho, Marina dispara sua arma e destrói a estátua da presidente Cherino. Ela foi expurgada."
2102177857 = "A limpeza da chefe do comitê de segurança"
794361453 = "Como punição por destruir a estátua da presidente Cherino, Marina limpa o banheiro. Sua atitude é tão animada que o Sensei percebe que Marina talvez se encaixasse bem no Clube de Limpeza. Ao ouvir isso, Marina planeja um golpe de estado para se tornar a presidente do Clube de Limpeza."
4222369533 = "O mal-entendido da chefe do comitê de segurança"
1309897125 = "Suspeita de estar fingindo ser a chefe do comitê de segurança por falta de autoridade, Marina é presa pelos membros do comitê de segurança de uma região remota. Ela fica deprimida ao ver que sua realidade é muito diferente da reputação pública, mas se recupera facilmente ao ser encorajada pelo Sensei."
263371351 = "SRT, entrando em ação!"
1824415151 = "De repente, Miyako invade o Schale. Parece que ela ouviu o boato de que 'um adulto suspeito está levando alunas para entrar e sair de um certo prédio' e, ao investigar, descobriu que o prédio era o Schale. Embora o mal-entendido tenha sido esclarecido, Miyako, por precaução, acaba encontrando vários livros enquanto revistava o local em busca de algo suspeito..."
2083034072 = "SRT, resgatando!"
608640286 = "O Sensei encontra Miyako no shopping, olhando atentamente para um coelho em uma pet shop. Pensando em sua própria situação, Miyako reflete sobre o que seria melhor para o animal, mas o Sensei a incentiva. No final, Miyako decide se esforçar e criar o coelho com muito amor."
1182641974 = "SRT, protegendo!"
2986991819 = "Miyako pensa em nomes para coelhos junto com o Sensei, enquanto conversa sobre a ecologia deles."
3552637652 = "SRT, descendo!"
47734010 = "Miyako e o Sensei partem juntos para uma operação. Ao olhar a cidade de cima, de dentro do helicóptero, Miyako deixa escapar palavras de admiração."
4216668975 = "SRT, descansando!"
2500254733 = "Preocupado com o conteúdo do Momotalk de Miyako, o Sensei visita o parque. Junto com Miyako, que confessa ter entrado em contato mesmo sem ter nada de especial para dizer, o Sensei passa um tempo precioso, como se não fosse nada."
392509450 = "SRT, lembrando"
2026533413 = "Enquanto lavava suas roupas no Schale, Miyako deixa cair seu crachá. O Sensei o pega e Miyako lhe conta a história por trás daquele objeto."
1943391112 = "O Vento Norte e o Sol"
1484545006 = "Apesar do calor intenso, Saki se recusa terminantemente a tirar seu capacete por estar em serviço. Preocupado com a saúde dela, o Sensei tenta de várias formas convencê-la a tirar o capacete. Todas as tentativas falham, mas assim que o turno termina, Saki tira o capacete sem o menor esforço."
3937121232 = "O Coelho Perdido"
2072678078 = "O Sensei e Saki saem para colher vegetais da montanha para complementar a refeição do Esquadrão RABBIT. O tempo passa e, ao tentarem descer, os dois acabam se perdendo nas profundezas da montanha. Saki tenta encontrar o caminho usando técnicas de leitura de mapas, mas...?"
537552521 = "O maior engloba o menor?"
3736593165 = "Saki consegue uma arma rara em um mercado de pulgas: um morteiro de pá de 37mm. Ela se gaba de ser uma arma revolucionária, mas ela está bastante enferrujada. Ela tenta desmontar e consertar, mas, no fim, até Saki desiste devido à dificuldade de manuseio."
4158890334 = "Preparada"
2568213059 = "O Sensei decide subir a montanha com Saki para buscar suprimentos de acampamento descartados. No entanto, o Sensei acaba machucando o ombro por não estar acostumado com a caminhada. Saki oferece um curativo para o Sensei, mas...?"
4041452924 = "O Coelho e o Livro Sagrado <Militar>"
2079813724 = "O objeto que Saki esqueceu no Schale era o manual de treinamento da SRT. Saki é fã do manual desde antes de entrar na escola e continua relendo sempre que tem tempo. Quando o Sensei folheia o manual, encontra no campo de notas um diário da época em que se conheceram... Ao ter isso lido em voz alta na sua frente, Saki fica brava, escreve 'Idiota!' no rosto do Sensei e vai embora."
3019246166 = "RABBIT4, escondendo-se"
636667611 = "Miyu e o Sensei vão a uma loja de artigos para atividades ao ar livre. No entanto, devido à sua natureza, Miyu não é muito notada pelas pessoas ao redor e acaba ficando deprimida, como sempre. Mas, graças a essa mesma característica, ela consegue se aproximar de animais selvagens, inclusive de um gato famoso por ser feroz."
332535311 = "RABBIT4, em ação"
291507910 = "Como estava concentrado no trabalho, o Sensei demorou a notar que Miyu tinha chegado. Durante a conversa, eles têm a ideia de fazer com que um som seja emitido conforme os movimentos de Miyu. Porém, como o que Miyu acabou usando foi uma 'coleira com sino', mal-entendidos começam a surgir por toda parte..."
810612864 = "RABBIT4, atirando"
716720190 = "Preocupada que suas habilidades tenham diminuído por falta de treinamento formal, Miyu decide realizar um treino de tiro com o Sensei. Quando o Sensei volta após colocar o alvo à distância, ele encontra muitos animais selvagens reunidos sobre Miyu, talvez por ela ser tão imperceptível. Mas Miyu, concentrada no tiro, acha que aquilo é uma brincadeira do Sensei..."
485476395 = "RABBIT4, relaxando"
751297374 = "Em um dia de folga, o Sensei encontra Miyu agachada fazendo algo. Ao perguntar, descobre que ela tem o hobby de colecionar pedrinhas. O Sensei passa o resto do dia procurando várias pedrinhas com Miyu até o anoitecer."
376395967 = "RABBIT4, lembrando"
652033454 = "Para capturar um corvo, Miyu e o Sensei sobem ao topo de um prédio. O Sensei começa a tremer de frio. Miyu então oferece ao Sensei um chocolate quente que os membros do esquadrão da SRT haviam preparado."
1540090706 = "O mascote do Clube de Treinamento"
181569107 = "Kaede está insatisfeita com o fato de o Clube de Treinamento ser tratado como um grupo de esquisitos e insiste que precisam realizar atividades para mudar essa percepção. Enquanto participa de várias atividades com ela, o Sensei começa a entender vagamente por que o clube tem essa fama."
258942768 = "Quero ser uma dama elegante!"
3935689214 = "Kaede diz que 'uma dama elegante nunca entra em pânico' e pede para o Sensei tentar fazê-la entrar em pânico. Kaede finge que nada acontece, resistindo (ou não?) às várias tentativas do Sensei, mas acaba revelando seu jeito atrapalhado de sempre antes da reserva do show de heróis."
1209493139 = "O motivo para querer ser adulta"
2992466081 = "Depois de tentar agir como adulta na frente do Sensei, Kaede acaba causando um pequeno desastre. Mesmo assim, o Sensei a aconselha a não se apressar e seguir com calma, o que faz Kaede recuperar o ânimo imediatamente."
1603342232 = "E então, a garota se torna uma dama elegante"
1457617705 = "Para comprar um novo pacote de Mushiking, Kaede chega à loja após superar vários incidentes. No entanto, ela decide ceder o último pacote para uma garota que veio de longe e estava lá. Naquele momento, quem aparece diante de Kaede, que exibe um sorriso um pouco mais maduro...?"
1257661108 = "A primeira lembrança"
302074546 = "O Sensei visita uma loja temporária com Kaede para conseguir capas de cartas limitadas de Mushiking. Enquanto mostra suas capas de cartas favoritas, Kaede conta como começou a gostar de Mushiking."
945039977 = "A chegada da Fräulein"
2033857445 = "Iroha aparece dizendo que veio seduzir o Sensei como uma missão do Pandemonium. Mas, quando o Sensei recusa sua proposta, Iroha diz que tudo bem, deita no sofá do Schale e começa a ler um livro."
3918415703 = "A sedutora Fräulein"
2282933521 = "Iroha tenta seduzir o Sensei para matarem aula juntos, mas o Sensei não cede facilmente. Por fim, parecendo desistir, Iroha sugere que vão comer algo. No momento em que o Sensei aceita, Iroha abre um sorriso vitorioso, dizendo que 'conseguiu atrair o Sensei'."
3810393676 = "A astuta Fräulein"
1746326246 = "Iroha visita o Sensei, que parece ocupado, e durante a conversa sobre trabalho, o convida para fazer compras. No entanto, ela só compra coisas que não parecem ter relação, como lanches e brinquedos. Ao perguntar o motivo, Iroha responde: 'Eu não disse que eram compras de trabalho'. Tendo conseguido fazer o Sensei relaxar, Iroha abre um sorriso sereno."
3329845713 = "A Fräulein sorridente"
3228138921 = "Estranhando o fato de Iroha não aparecer, o Sensei, preocupado, decide visitar o Pandemonium em Gehenna. Lá, ele encontra Iroha ocupada como comandante de tanque. Ao ouvir que o Sensei veio por estar preocupado com ela, Iroha sorri e o guia até seu espaço de descanso."
4280952109 = "A garota ninja é difícil de lidar"
3933870946 = "No momento em que o Sensei preparava seu macarrão instantâneo, Michiru aparece no Schale em busca de ideias para seu canal de vídeos. Enquanto o assunto muda constantemente, o Sensei tenta dar algumas ideias, mas parece ter ativado um interruptor estranho em Michiru, que passa as próximas 3 horas dando uma palestra sobre ninjas. O macarrão instantâneo acabou passando do ponto."
3951006407 = "A garota ninja é imparável"
3104593350 = "Em um dia em que o Sensei preparava macarrão instantâneo, Michiru invade o Schale. O Sensei é levado por Michiru, que se gaba de ter tido uma ideia para um vídeo que vai viralizar, e, mais uma vez, o macarrão acaba passando do ponto."
4128417300 = "A garota ninja não se esconde"
947593483 = "Michiru, que visitou uma loja de artigos ninja com o Sensei, acaba encontrando um grupo de encrenqueiros que zombam dos ninjas. Inicialmente assustada, Michiru não consegue suportar o desrespeito aos ninjas e salta para o meio da confusão...?"
3245340691 = "A garota ninja quer brilhar"
1828893364 = "Michiru chama o Sensei ao parque para gravar um novo vídeo. Ela demonstra para ele sua nova técnica autoral: a 'Arte Ninja: Fogo Cintilante'."
3894779452 = "A garota ninja quer que você se lembre!"
2435971928 = "Uma fita de vídeo preciosa que Michiru assistiu inúmeras vezes desde pequena. Dizem que ela contém a obra que a inspirou a se tornar uma ninja. Ao tentar fazer uma cópia de segurança para garantir que pudesse assistir sempre, a fita estava velha demais e não pôde ser restaurada. Michiru fica desolada, mas, recompondo-se, decide ir até a loja de artigos ninja com o Sensei."
650560128 = "Uma ninja de verdade...!"
2949122187 = "Tsukuyo está preocupada sobre como se tornar uma ninja de verdade, então o Sensei a aconselha a começar praticando o que ela faz de melhor. Seguindo o conselho, Tsukuyo demonstra sua 'Técnica de Substituição', deixando o Sensei surpreso."
251220476 = "Talvez não seja tão ruim"
3420245975 = "Tsukuyo tem complexo com seu porte físico. No entanto, o Sensei diz que, justamente por ser assim, talvez ela consiga ver coisas que os outros não veem. Nesse momento, ela ouve o choro de uma criança perdida e, usando sua altura privilegiada, consegue encontrá-la. Após ver a criança se reunir com a irmã, Tsukuyo começa a pensar que seu tamanho nem sempre é algo ruim."
782301528 = "Uma kunoichi exemplar...!"
2486610304 = "Tsukuyo encontra um livro sobre como se tornar uma 'kunoichi' exemplar e decide testar o conteúdo com o Sensei. Conforme tentam as técnicas, ela percebe que o livro é, na verdade, sobre artes sensuais de kunoichi e não sobre ninjutsu, fazendo-a desaparecer da frente do Sensei por pura vergonha."
2449832284 = "Uma chance de brilhar como ninja...!"
2775750975 = "O Sensei e Tsukuyo encontram novamente a garota que estava perdida. Desta vez, parece que seu cachorro fugiu, e eles prometem usar as habilidades ninja que treinaram para encontrá-lo. Eles conseguem localizar o filhote, mas, no processo, Tsukuyo acaba ficando presa em um caminho estreito...?"
393436108 = "A prisão do corpo"
445636691 = "Não conseguindo deixar Misaki, que emana uma aura perigosa, sozinha, o Sensei a acompanha até o terraço de um prédio alto para resolver um assunto. Assim que terminam e tentam voltar, o elevador quebra subitamente... A expressão de Misaki, presa no elevador, torna-se cada vez mais tensa."
2021138019 = "Um corpo que não obedece"
2328210988 = "Misaki e o Sensei saem para caminhar para estreitar os laços. Quando o Sensei pergunta por que ela não tira a máscara, no momento em que ela ia responder que era por causa da rinite alérgica, ela começa a espirrar sem parar. Misaki amaldiçoa seu próprio corpo por não obedecer à sua vontade."
275908656 = "Mesmo sem ser bonita"
3575999017 = "Misaki pega um resfriado forte, e o Sensei a leva para descansar em um escritório próximo para cuidar dela. Embora lamente sua constituição frágil, Misaki sente-se aliviada pela presença do Sensei. Ela, que nunca se interessou por nada, sente irritação com as novas emoções que surgiram ao interagir com o Sensei, mas, ainda assim, começa a olhar um pouco mais para frente."
495675616 = "Memórias gravadas"
4070608128 = "Misaki esquece sua bolsa e fica em apuros. O Sensei a ajuda a procurar e eles conseguem encontrá-la. Lá, eles descobrem uma escultura de madeira..."
4128473246 = "A garota ainda quer ler"
2241310795 = "Hiyori estava subindo em um poste de luz em uma área sem lei para carregar seu celular escondida. Ela conta, entre lágrimas, que para alguém que vive como nômade, até carregar o celular é difícil. O Sensei a presenteia com uma bateria portátil e pede: 'Por favor, não suba mais em postes, é perigoso'."
1210605930 = "A garota ainda não desiste"
3115826030 = "Hiyori fica feliz ao encontrar uma revista de moda rara no lixo. Ela diz que colecionar essas revistas é seu hobby, mas reclama que teve que queimar parte da coleção recentemente para sobreviver. 'Não se pode escolher quando se está desesperado', diz ela. Em seguida, ela conta que conseguiu um kit de primeiros socorros antigo, então agora não tem problema se tiver dor de barriga. O Sensei compra remédios novos para ela. Hiyori, que é proibida de aceitar presentes do Sensei, acaba cedendo e pedindo a edição mais recente da revista. Assim, seus segredos em relação aos outros membros de Arius só aumentam."
1808891171 = "A garota ainda quer saber"
2121001156 = "Hiyori tem uma dor de barriga por beber água de ruínas e o Sensei a leva ao hospital. Após se recuperar, Hiyori lê na revista que o Sensei comprou um artigo sobre umbigos atraentes e começa a chorar, perguntando ao Sensei se o seu próprio umbigo é estranho ou diferente dos outros."
3481010754 = "A princesa nas ruínas"
406981505 = "O grupo de Arius decide ficar por um tempo em uma escola abandonada. Como todos saíram para resolver assuntos e ela estava entediada, Atsuko chama o Sensei em segredo para começar uma 'brincadeira de escolinha'."
2090305712 = "Escola no meio da noite"
3848876286 = "Na calada da noite, eles invadem a escola vazia para continuar a brincadeira que não puderam terminar. Atsuko caminha com o Sensei, sonhando com uma vida escolar comum, aproveitando o tempo juntos. Mas o momento não dura muito. No instante em que Atsuko tenta aproveitar ao máximo o cotidiano, o som do alarme de segurança ecoa na escuridão da noite, anunciando a entrada de um intruso."
835240471 = "O jardim da cidade"
3161846637 = "Ao ouvir de Atsuko que ela quer fazer das flores seu hobby, o Sensei a presenteia com flores cortadas. Atsuko ri, explicando que na verdade queria dizer que queria criar um canteiro, mas guarda as flores com carinho e convida o Sensei para o jardim secreto que ela criou em um canto da cidade."
1871057734 = "Muito mais do que agora"
4152512206 = "Devido a uma chuva torrencial, todas as flores do canteiro morrem. Atsuko se sente culpada, mas o Sensei diz que eles podem aprender sobre flores juntos a partir de agora. Com essas palavras, Atsuko olha para frente e acena com determinação."
3907252919 = "Apenas por você"
2694524553 = "Embora o verão tenha chegado, Wakamo, preocupada com o Sensei que está atolado de trabalho preparando o festival de fogos de artifício, vai ao Schale para criar a 'memória de verão perfeita'. No entanto, ela confessa que não tem confiança para planejar algo que seja perfeito para ele. Ela tenta extrair o que o Sensei quer fazer, mas interpreta tudo de forma perigosa e tenta colocar em prática... No fim, eles acabam passando a noite trabalhando juntos no Schale."
3209742349 = "Só para cumprir a promessa"
3701725789 = "O plano da 'memória de verão perfeita' não tinha acabado. Preocupada com o que o Sensei queria fazer, Wakamo marca um 'encontro' com ele. Porém, toda vez que eles tentam sair, o Sensei é chamado de volta por problemas na preparação do festival... Irritada por terem seu encontro interrompido, Wakamo decide que o festival de fogos de artifício não deveria existir e planeja explodir o depósito. Diante de uma Wakamo fora de controle, o Sensei a repreende severamente."
239637834 = "Coração tremeluzente perto da fogueira"
1035672286 = "Wakamo pergunta se o Sensei se lembra da 'promessa' que ficou pela metade, e ele pede que ela espere até que ele termine o trabalho. Depois, ele tenta entrar em contato, mas não recebe resposta, e o tempo começa a piorar... Ao sair na tempestade para procurar Wakamo, ele a encontra esperando fielmente ao relento para cumprir a 'promessa'. Para aquecer Wakamo, que estava congelando com a chuva e o vento, ele acende uma fogueira e os dois passam um tempo tranquilo."
850282751 = "O que foi gravado foi a pureza"
765356607 = "Wakamo e o Sensei passam o tempo na praia. Wakamo diz que estar com o Sensei, a única pessoa em quem ela confia, já é o suficiente... mas não consegue esconder o desejo de dividir o guarda-chuva. Depois, ganhando coragem, ela divide o guarda-chuva com ele e, como lembrança, grava o nome dela e do Sensei no cabo do guarda-chuva. O momento de paz é interrompido pela guarda costeira, mas, a partir dali, os dois partem em uma fuga de amor."
4061302182 = "Dias assim também são bons"
54589100 = "Nonomi convida o Sensei para verificar o local de um piquenique. Mesmo quando ele diz que vai carregar as coisas, ela insiste que não precisa. Enquanto Nonomi vai buscar bebidas, o Sensei decide arrumar o piquenique no lugar dela, decidindo mimá-la um pouco."
1859398185 = "Desafio de colher cocos"
3014898155 = "O Sensei e Nonomi vão à floresta colher cocos para que os outros membros possam beber um suco delicioso após o trabalho. Como não têm uma escada, tentam derrubá-los com uma metralhadora, mas não dá certo... Eles tentam mirar em um coqueiro baixo com o Sensei carregando Nonomi nos ombros, mas perdem o equilíbrio. Nonomi ri, dizendo que até isso foi uma boa experiência."
2542756039 = "Estrela brilhando na areia"
3336596639 = "Tarde da noite, o Sensei, sem conseguir dormir, caminha pela praia e encontra Nonomi por acaso. Nonomi ri, dizendo que, conforme o dia de ir embora se aproxima, o sentimento de tristeza aumenta, e o Sensei a presenteia com a visão do mar de estrelas brilhantes."
4024412057 = "O significado de brincar"
1633675291 = "Ayane está animada por ter encontrado tesouros no depósito da ilha deserta. Enquanto Ayane acha que, já que vieram para umas férias, deveriam aproveitar para brincar, o Sensei ri e sugere que talvez eles já estivessem brincando de \"caça ao tesouro\" no depósito. Encorajada por essas palavras, Ayane se diverte com o Sensei fazendo uma competição de \"quem encontra o item mais útil\" dentro do depósito."
549604868 = "Ayane debaixo do cobertor"
4017885026 = "O Sensei recebe uma MomoTalk misteriosa e cheia de caracteres estranhos de Ayane. Ao visitar o quarto dela por preocupação, ele encontra uma Ayane completamente diferente de sua atitude séria e resoluta de sempre: ela está enrolada no cobertor, agindo como uma criança birrenta. O Sensei tenta falar com ela, mas Ayane, confundindo-o com Serika, continua a agir assim..."
1876616731 = "O motivo da pressa"
2850828647 = "Ayane, que estava consertando o helicóptero sozinha sob o sol escaldante, acaba desmaiando por exaustão. O Sensei, que tinha acabado de pedir para ela trazer a caixa de ferramentas e os parafusos, decide deixar Ayane descansar e assume o conserto do helicóptero. Ao anoitecer, com Ayane recuperada, eles tiram uma foto comemorativa com o helicóptero consertado para celebrar o progresso."
979430574 = "O tesouro escondido da ilha"
3579191394 = "Hoshino, que estava olhando o mapa turístico em um quarto vazio do resort, ri dizendo que é divertido procurar por livretos que alguém usou no passado. Segundo ela, um mapa turístico com anotações de alguém também é um \"mapa do tesouro\". Assim, o Sensei e Hoshino seguem em uma exploração guiada pelo \"mapa do tesouro\" e acabam encontrando o lugar perfeito para uma soneca."
117700283 = "Ingredientes frescos direto da fonte"
2728239546 = "Após receber um SOS de Hoshino via MomoTalk, o Sensei decide ajudar a coletar frutos do mar. Embora tenha começado como um trabalho forçado, Hoshino pareceu se divertir muito durante todo o tempo por conseguir colher tantos frutos do mar. Quando o Sensei aponta isso, ela fica tímida e pede para ele não contar para as outras."
3326990624 = "Mesmo sem poder ver o que há dentro"
2625437651 = "O Sensei encontra Hoshino sentada na areia, observando o horizonte. Como Abydos não tem \"mar\", Hoshino comenta que é algo fascinante. Enquanto observam o horizonte juntos, um cardume de tainhas passa saltando sobre a água. Enquanto se diverte com a cena, Hoshino ri e diz que, um dia, gostaria de ver baleias saltando junto com o Sensei."
2766807234 = "Eu consegui, tive sucesso!"
739359557 = "Shizuko estufa o peito orgulhosa por ter alcançado as maiores vendas da história com os contratos de franquia dos resorts. Enquanto ela se empolga dizendo que vai fazer o nome da Hyakkiyako ecoar por todo o Kivotos, o Sensei comenta que é um pouco triste que, com a franquia, os serviços originais da Hyakkiyako tenham se perdido, e se preocupa se Shizuko não está se esforçando demais. Ao ouvir essas palavras inesperadas, Shizuko sai correndo, confusa."
1341349068 = "Afinal, para que era mesmo?"
2467605046 = "Shizuko chama o Sensei dizendo que quer conversar. Ela reclama que, ao visitar cada loja franqueada, a reação dos clientes não tem sido boa. Diante de suas lamentações de que a Hyakkiyako está em perigo, o Sensei pergunta por que ela começou o comitê de administração do festival e por que abriu a Hyakkiyako. Ao lembrar que tudo era pelo sorriso dos clientes, Shizuko retoma sua essência, olha para frente e renova sua determinação."
1344506803 = "Eu sou muito gananciosa!"
3607288038 = "Shizuko chama o Sensei dizendo que tem algo para mostrar. Ao receber o serviço da Hyakkiyako na casa de praia e ouvir o Sensei dizer que aquele serviço com a cara da Hyakkiyako é ótimo, Shizuko agradece, dizendo que só conseguiu voltar às suas origens graças a ele. Então, ela ri, dizendo que vai conseguir tudo o que quer e realizar todos os seus desejos."
32910525 = "Quebrando melancia com Izuna!"
1822618449 = "O Sensei decide participar de uma brincadeira de quebrar melancia com Izuna, que disse querer treinar para se tornar uma ninja adequada para o mar. No entanto, como ela não consegue quebrar a melancia de jeito nenhum, acabam treinando o dia inteiro. Depois que finalmente conseguem, os dois comem a melancia com gosto."
3631402519 = "Brincando na areia com Izuna!"
1116374148 = "Izuna e o Sensei começam novamente o treinamento para se tornar uma ninja do mar na praia. Quando o Sensei sugere treinar natação, Izuna desvia do assunto e diz que quer construir um castelo de areia. Assim, após várias tentativas fracassadas, eles passam o dia inteiro construindo o castelo de areia."
605429618 = "Por um triz com Izuna!"
3019377752 = "O Sensei sugere novamente o treinamento de natação, mas Izuna o interrompe dizendo que quer treinar o banho de areia. Ela quer ser capaz de recriar as cenas de dramas de época onde os personagens saltam da areia para agir. Assim, após ser coberta por uma montanha de areia, Izuna acaba adormecendo devido ao conforto do banho de areia."
3379580703 = "De mãos dadas com Izuna"
1012117113 = "Percebendo que Izuna está evitando nadar, o Sensei pergunta se ela não gosta de nadar. Izuna ri sem jeito e confessa que tem medo de que o Sensei se decepcione se descobrir que ela não sabe nadar. O Sensei ri, dizendo que não há motivo para se preocupar, e começa a ensinar Izuna a nadar."
1530413232 = "Quero encontrar o brilho"
340837813 = "O Sensei é chamado por Chise, que diz querer \"encontrar coisas brilhantes para crescer\", e eles decidem procurar por essas coisas na praia. Chise coleta várias coisas na areia e ri, dizendo que o mar está cheio de coisas brilhantes. No entanto, ela inclina a cabeça, sentindo que ainda falta algo dentro de si. As férias de verão em busca do brilho estão apenas começando."
416881010 = "Algo que quero mostrar"
4275087180 = "Chise chama o Sensei dizendo que quer mostrar algo incrível que encontrou enquanto procurava pelo brilho. Ao segui-la, eles chegam a um canto cheio de tartarugas. Junto com Chise, que ri dizendo que o reflexo da luz do sol nas carapaças é brilhante e bonito, eles continuam a busca pelo brilho."
3101350732 = "Onde está o brilho"
2121093664 = "O Sensei recebe uma MomoTalk estranha de Chise. Ao ouvir a história dela, que está com medo de que, se alguém se aproximar, será amaldiçoado, ele descobre que ela encontrou uma \"carta de azar\". Para provar que isso é bobagem, o Sensei decide passar o tempo com Chise e eles conseguem superar o período com sucesso. Enquanto riem por nada ter acontecido, Chise sorri e diz que, graças ao Sensei, conseguiu encontrar o brilho que procurou durante todas as férias de verão."
1812069520 = "Baú de tesouros de memórias"
3667309469 = "O Sensei visita Chise na praia e a encontra guardando várias memórias do mar em sua bolsa. O conteúdo da bolsa é variado, e Chise está animada para mostrar tudo ao pessoal do Departamento Yin-Yang, pois cada item está cheio de memórias. Depois de encher a bolsa, Chise ri, dizendo que o Sensei é sua maior memória, e tenta guardá-lo na bolsa também."
3499466219 = "Independência"
1404779164 = "Após receber um contato de Saori, o Sensei vai ao mercado negro para ser seu fiador. Ela diz que, para ganhar dinheiro, primeiro precisa de uma conta bancária. Saori confessa que não tem escola, seu esquadrão está separado e o Sensei é a única pessoa em quem pode confiar. Embora o Sensei aceite ser o fiador, o bancário diz que isso não é suficiente e chama a segurança do mercado para iniciar um teste prático."
1353600712 = "O descuido"
2747481849 = "Preocupado com Saori, o Sensei visita o mercado negro. Embora ela dissesse que estava fazendo trabalhos agora que conseguiu abrir a conta, ela não estava recebendo o salário por trabalhar sem assinar contratos. Ao presenciar a cena, o Sensei protesta com o contratante, mas é informado de que pagamentos retroativos não são possíveis. Graças à intervenção do Sensei, Saori consegue receber o pagamento do dia e reflete sobre a importância de assinar contratos."
1647392473 = "Sentimento de culpa"
18924281 = "Saori diz que desta vez assinou o contrato corretamente. No entanto, o conteúdo do contrato era terrível, exigindo que Saori lutasse sozinha contra uma organização hostil. Ao encontrar Saori ferida, o Sensei, após cuidar de seus ferimentos, diz que eles vão estudar contratos juntos a partir de agora e a leva para comer lámen."
4249397029 = "Não existe nada vazio"
3781866017 = "A máscara de Saori quebra, e o Sensei decide ajudá-la a procurar um reparador. No entanto, é difícil encontrar alguém que consiga consertar uma máscara de modelo antigo. Para atender aos sentimentos de Saori, que diz que \"agora sinto que esta máscara é como um membro do esquadrão\", o Sensei trabalha junto com ela e, após muitas tentativas e erros, conseguem consertar a máscara com sucesso."
2097037032 = "Dano Colateral"
1238978732 = "Moe ajuda o Sensei a capturar ladrões a pedido dele. Embora consiga prender o criminoso com um drone de rastreamento infravermelho, Moe não consegue conter seu impulso e dispara um míssil... destruindo a cidade. Quando o Sensei pergunta por que ela disparou o míssil, Moe confessa que tem um desejo de autodestruição."
3925224064 = "Desaparecida em Ação"
3963871333 = "Devido a um acidente inesperado, o Sensei perde todos os seus dados de trabalho, e Moe vem ajudá-lo. Graças a Moe, os dados foram recuperados mais rápido do que o esperado, mas, após o trabalho, Moe acaba pressionando o \"botão de reset de emergência\" que encontraram... Embora tudo tenha voltado à estaca zero, graças à macro que Moe preparou, eles conseguem evitar o desastre."
3909715798 = "Munição não detonada"
3002018408 = "Moe vem ao Schale para seu turno. O Sensei decide deixar Moe cuidando do local enquanto ele sai, avisando-a para não tocar em nada. No entanto, como Moe tem um forte desejo de autodestruição, ela não ouve... Moe pressiona impulsivamente um grande botão vermelho perto da mesa, ativando o chuveiro de emergência e ficando completamente encharcada."
1642348824 = "Linha de Fase"
1120991900 = "O Sensei visita o Parque dos Coelhinhos para ajudar a organizar os suprimentos do Esquadrão RABBIT. Ao ver Moe trabalhando calmamente, mesmo diante de materiais perigosos, o Sensei pergunta por que ela está diferente do habitual, e Moe conta sobre o desejo de autodestruição que guardava em seu coração."
1771630708 = "Claymore, Claymore, Claymore！"
279334293 = "Moe e o Sensei conversam sobre a falta de exercícios físicos ultimamente. Com um sorriso determinado, o que Moe tira de dentro da bolsa é... um lançador de foguetes?"
1230115544 = "Aulas de reforço e doces"
3289098080 = "Kazusa chama o Sensei para ajudar com os estudos para a prova de recuperação em um café. Como ela insiste que pagará a conta por ele estar a ajudando, o Sensei decide comprar doces para ela após o estudo, e os dois passam um momento agradável dividindo as guloseimas."
446030069 = "Apesar da aparência, sou membro do Clube de Doces do Pós-Aula"
4084141263 = "O Sensei encontra Kazusa por acaso no ponto de ônibus. Enquanto esperam, eles conversam alegremente enquanto tomam suco e comem doces."
2391083433 = "Momento inoportuno"
3086413285 = "O Sensei encontra Kazusa em uma loja de conveniência. No entanto, ela não demonstra notar a presença dele e até tenta evitá-lo... Preocupado, o Sensei a persegue e descobre que ela não queria ser vista sem maquiagem. Rindo e dizendo que não se importa com isso, o Sensei continua a conversa com ela."
2135718946 = "Língua sensível a coisas quentes"
2285653641 = "Kazusa aparece no Schale trazendo doces. Ela conta ao Sensei que comprou um 'fondant de chocolate', mas que estava quente demais para comer. O Sensei ri, dizendo que ela parece um gato por não conseguir comer coisas quentes, e acaba comendo o doce."
432381563 = "Não sou a Kokoa-chan. Eu sou a instrutora!"
3385540554 = "O Sensei visita o Jardim de Infância Baika após ser convidado por Kokoa para ver como ela trabalha como instrutora. Lá, ele encontra Kokoa sendo chamada carinhosamente de 'Kokoa-chan' pelas crianças. No entanto, ela parece um pouco insatisfeita com isso..."
377170606 = "Não sou uma criança. Sou uma dama!"
1059419902 = "Ao retornar ao Schale após terminar um trabalho em Shanhaijing, o Sensei encontra Kokoa por acaso. Interessada no café que o Sensei comprou, ela decide experimentar para provar o 'sabor de adulto'... mas o café é amargo demais, e o Sensei precisa consolar Kokoa, que começa a chorar."
3736806188 = "Eu disse que não gosto, e não gosto mesmo!"
661652410 = "O Sensei encontra Kokoa na cidade de Shanhaijing e ela pede conselhos sobre como fazer as crianças a chamarem de 'instrutora'. O Sensei sugere que ela comece superando seus gostos e desgostos alimentares, e a convida para ir a um restaurante especializado em cenouras deliciosas."
1888100604 = "…Só desta vez, viu? É sério!"
3679415033 = "Kokoa vai a um restaurante especializado em cenouras com o Sensei. Embora ela demonstre resistência aos vários motivos de cenoura espalhados pelo local, ela acaba adorando o sabor dos pratos e termina de comer tudo com gosto."
2090247752 = "O uniforme escolar da paixão"
3930023682 = "O Sensei vai ao Clube de Engenharia para entregar o jaleco que Utaha esqueceu no Schale. Lá, ele a encontra trabalhando vestida com um uniforme escolar masculino (gakuran). Utaha ri, dizendo que é surpreendentemente confortável e que esse traje a faz sentir a paixão do Grande Festival Esportivo. Quando o Sensei brinca que o uniforme tem o cheiro dela, Utaha entende errado e corre para trocar de roupa, envergonhada."
492464550 = "A ginástica rítmica da paixão"
3765296963 = "Utaha conta que, desde o Grande Festival Esportivo, tem recebido muitos pedidos para criar robôs de torcida. O Sensei visita o Clube de Engenharia para ver a demonstração do protótipo e se encanta com a coreografia dos robôs, que usam cartões coloridos para torcer, junto com o incentivo de Utaha."
4280790550 = "O espírito de torcida da paixão"
2043768612 = "Como o robô de torcida solicitado não ficará pronto dentro do prazo, a própria Utaha decide assumir o papel de torcedora para várias pessoas."
2208070431 = "O hino de torcida da paixão"
1265896640 = "Preocupada com o desânimo dos membros do Clube de Engenharia, Utaha convida o Sensei para um karaokê e apresenta uma música de sua própria autoria. Ao contrário de Utaha, que ri e diz querer animar os membros com essa música, que também é o tema do clube, a letra e a melodia seguem um rumo totalmente imprevisível."
3318658421 = "Os registros detalhados de Noa, a secretária do Seminário"
436248350 = "Noa visita o Schale para seu turno de serviço. Embora confusa com o pedido do Sensei para que ela relaxe, já que o trabalho pessoal dele já terminou, ela decide registrar as ações do Sensei como secretária. O Sensei acaba ficando incapaz de trabalhar devido ao nível excessivamente detalhado dos registros dela."
465908990 = "A observação maliciosa de Noa, a secretária do Seminário"
2289102291 = "Para tentar quebrar a expressão inabalável de Noa, o Sensei decide começar a registrar as ações dela. Em resposta, Noa propõe um quiz sobre as mudanças que ocorreram no ambiente enquanto ela estava ausente. No fim, o Sensei não consegue superar a esperteza de Noa e acaba preparando café para ela."
773232047 = "A rotina comum de Noa, a secretária do Seminário"
604699670 = "O Sensei encontra Noa em um café após terminar o trabalho em Millennium. Cercada por pilhas de documentos, ela explica que está analisando patentes de invenções recém-registradas. Enquanto conversam sobre as patentes e organizam os papéis, ela encontra uma patente interessante relacionada ao Sensei..."
3466815831 = "O descanso entediante de Noa, a secretária do Seminário"
706439484 = "Após ter uma reunião cancelada por causa de uma chuva repentina, o Sensei vai até a sala de reuniões do Seminário para ver como Noa está. Surpresa com a visita, Noa conversa com o Sensei e eles passam um momento tranquilo escrevendo palavras no vidro da janela."
3426454651 = "O hobby secreto da mestre"
4103016827 = "O Sensei encontra Hibiki por acaso em um mercado perto do Schale enquanto ela escolhia tecidos. Hibiki ri, dizendo que está escolhendo materiais para um cosplay, e fala apaixonadamente sobre sua dedicação na confecção de trajes."
4119985251 = "A torcida fervorosa da mestre"
1355940963 = "Devido a um apagão repentino que apagou os dados de trabalho, o Sensei precisa trabalhar até tarde da noite. Hibiki aparece vestida de líder de torcida para incentivá-lo. Embora ela diga que veio para torcer por ele, o Sensei acaba ficando incapaz de se concentrar no trabalho."
2694245452 = "A torcida impiedosa da mestre"
3127541435 = "Refletindo sobre a baixa produtividade da última vez, Hibiki prepara um processador de texto especial para aumentar a eficiência do Sensei. No entanto, é uma faca de dois gumes: o aparelho tem uma função de autodestruição caso o trabalho pare. O Sensei acaba tendo que trabalhar sob a ameaça constante de uma explosão."
162351076 = "A canção de ninar gentil da mestre"
484928347 = "Aprendendo com o erro do processador de texto, Hibiki traz uma nova invenção. Ela diz que, para manter a concentração, é necessário dormir bem, e entrega um alto-falante Bluetooth com uma canção de ninar gravada por ela mesma. Graças à invenção de Hibiki, o Sensei consegue dormir profundamente naquela noite."
2702026288 = "Caso 1. É uma coelhinha, sabia?"
3571189559 = "Akane diz ao Sensei que obteve uma nova perspectiva e uma teoria misteriosa via MomoTalk, e pede para ele passar no quarto dela se tiver tempo. Ao chegar, o Sensei é recebido por Akane vestida de coelhinha. Ela sorri, dizendo que, como as coelhinhas foram criadas para servir, ela quer servi-lo com aquele traje. Prevendo sua morte social, o Sensei inventa uma desculpa urgente e foge."
4078232729 = "Caso 2. Por favor, descanse um pouco"
4204404808 = "Após o Sensei terminar sua batalha contra pilhas de documentos, Akane aparece vestida de coelhinha. Eles acabam limpando o Schale juntos, com Akane perguntando se há algo em que ela possa servir. Depois de deixar o quarto limpo, o Sensei toma o chá que Akane preparou e cai em um sono profundo."
1635582478 = "Caso 3. É hora de estudar, não é?"
4058993158 = "Enquanto caminha pela cidade, o Sensei encontra Akane vestida de coelhinha por acaso. Ela diz que estava esperando por ele o tempo todo. Eles entram em um café para escapar dos olhares curiosos, e descobrem que é um café temático de coelhinhas. Akane fica impressionada com o profundo conhecimento do Sensei sobre o assunto."
482869814 = "Caso 4. Secretária por um dia, em espera"
607709933 = "Enquanto o Sensei trabalha até tarde, Akane ouve um murmúrio dele e lhe oferece um café. Surpreso por ela estar ali, ele aceita a bebida e pergunta por que ela tem andado vestida de coelhinha o tempo todo."
3585267607 = "Corrida matinal"
1396278568 = "Ao caminhar pelo parque no início da manhã, o Sensei encontra Yuuka por acaso. Ao perguntar, descobre que ela está treinando sua resistência para o próximo Festival Esportivo de Halo. Ao correr com Yuuka, ela rapidamente fica sem fôlego. Diante de sua frustração, o Sensei sorri e sugere que comecem com uma corrida leve."
737635945 = "O segredo da culinária científica"
2573899798 = "Como o refeitório da escola estará fechado durante o Festival Esportivo de Halo, Yuuka está determinada a preparar sua própria marmita. Ao ouvir que ela não tem experiência na cozinha, o Sensei vai até a sala de economia doméstica para ajudá-la, observando-a preparar o almoço. Ao comer a marmita pronta como um lanche noturno, o sabor parecia estranhamente reconfortante, apesar de estar fria."
2174568177 = "Cultura de torcida racional"
1860377927 = "Yuuka visita o Schale por causa do Festival Esportivo de Halo e, enquanto espera o Sensei terminar seu trabalho, decide assistir à partida do clube de beisebol do Millennium que está sendo transmitida na TV. Embora Yuuka afirme que se deixar levar pelo resultado da partida não é o comportamento adequado de um torcedor, ela acaba se empolgando com o jogo acirrado e solta gritos de torcida sem perceber."
670142544 = "Cartão esportivo"
3586706266 = "Com o fim do Festival Esportivo de Halo, Yuuka visita o Schale com o relatório de cooperação de trabalho. No entanto, o Sensei não está presente e a mesa está uma bagunça. Enquanto organiza as coisas, ela acaba encontrando uma foto tirada às escondidas dela. Quando o Sensei retorna e explica que se trata de um cartão esportivo vendido pela Escola Chronos, Yuuka acaba dando um autógrafo para ele."
4024156221 = "Um traje incomum"
3987667853 = "Após receber um pedido de conselho de Mari, o Sensei visita a sala de preparação da Catedral da Trindade e encontra Mari vestindo roupas de ginástica. Mari se sente ansiosa por estar usando um traje ao qual não está acostumada e por participar do Grande Festival Esportivo como membro do comitê executivo, mesmo não sendo muito boa em esportes. O Sensei, então, oferece conselhos gentis a ela."
1051695137 = "A freira no canto do banco"
343809718 = "Durante o Festival Esportivo de Halo, Mari acaba exausta por ter se esforçado demais para ajudar os outros. O Sensei sugere que ela peça ajuda às pessoas ao seu redor e pergunta se ela consegue se divertir ajudando tanto os outros. Mari responde alegremente que as competições do Grande Festival Esportivo foram divertidas."
2123351407 = "O agradecimento de Mari"
720252404 = "Enquanto caminhava pela propriedade da Catedral da Trindade, o Sensei encontra Mari fazendo jogging. Mari conta alegremente que, por causa do Festival Esportivo de Halo, ela despertou para o prazer de se exercitar. O Sensei decide acompanhar o jogging de Mari."
1478340410 = "Um corpo em constante crescimento"
2793860415 = "O Sensei visita a Trindade após receber um contato de Hasumi sobre o Grande Festival Esportivo. Lá, ele encontra Hasumi lutando para subir o zíper de seu agasalho. Acontece que, devido ao seu crescimento, o agasalho que ela usava até o ano passado não serve mais. O Sensei sugere que ela encomende um novo em vez de forçar o uso, mas ela diz que não chegará a tempo para o festival. Assim, ela acaba seguindo com os preparativos mesmo com o traje incompleto."
1830803246 = "Limão em conserva no mel"
3363601715 = "Hasumi chama o Sensei para a sala de economia doméstica para lhe agradecer. Ela preparou um \"limão em conserva no mel\" caseiro para as veteranas do Comitê de Justiça que estarão ocupadas durante o Festival Esportivo de Halo. O Sensei ajuda a colocar o limão pronto nos potes e leva alguns para casa."
2317643333 = "Autocontrole"
3356412026 = "No dia do Festival Esportivo de Halo, Hasumi estava comendo um menu de dieta no almoço, mas não era o suficiente. Ela lutava contra a tentação das conversas sobre comida que ouvia ao redor. O Sensei propõe que dividam o \"limão em conserva no mel\" que ele trouxe. Hasumi decide aceitar apenas um pouco, mas, ao começar a comer, não consegue parar e acaba devorando tudo."
1424445415 = "Correção de postura"
2368675001 = "O Sensei visita o ginásio após combinar de se exercitar com Hasumi. Lá, eles se divertem fazendo exercícios de alongamento, alternando entre seguir o exemplo de Hasumi e ajudar um ao outro com os movimentos."
2829913152 = "O gosto de uma hacker genial"
2128267029 = "Ao saber que o Sensei está de folga, Himari o convida para seu esconderijo para passarem um tempo relaxante juntos. Nesse meio tempo, Himari hackeia o sistema de transmissão da escola para tocar suas músicas favoritas, fazendo com que as canções ecoem por todo o campus do Millennium."
1584830152 = "O experimento da hacker genial"
1591221981 = "O Sensei tenta chegar a tempo para o encontro com Himari, mas acaba se envolvendo em vários acidentes. Ao conseguir chegar, descobre que tudo foi planejado por Himari para testar o que ela leu na seção de horóscopo de uma revista. Ao saber da verdade, o Sensei dá uma bronca em Himari."
829552681 = "A contra-argumentação da hacker genial"
711052487 = "O Sensei recebe uma mensagem de Himari dizendo que \"algo terrível aconteceu\" e corre para o Millennium. Lá, ela lhe mostra um artigo de fofoca sobre ela. Determinada a corrigir o conteúdo, Himari grava um vídeo com o Sensei, mas, como ela hackeou e enviou o vídeo com edições excessivas, acaba causando uma confusão ainda maior."
2037364016 = "O ponto e vírgula delicado da hacker genial"
2533708593 = "Himari mostra ao Sensei uma edição limitada do Yokai MAX, dizendo que conseguiu um tesouro especial. Ela ri, dizendo que aprendeu uma forma deliciosa de beber, e começa a sacudir a lata... Nesse momento, a lata explode e ela fica toda melada. O Sensei, então, ajuda a limpar o corpo de Himari com uma toalha."
4205919598 = "Discretamente"
785035510 = "Após terminar o trabalho na Academia Federal Red Winter, o Sensei passa no prédio antigo para ver Shigure. Ao beber o que ela lhe oferece, descobre que não é água, mas vodka. Ela explica que a geladeira quebrou e as outras bebidas congelaram. Enquanto ela oferece a garrafa, o Sensei a pega e, junto com uma Shigure nada arrependida, usa a vodka como combustível para derreter as bebidas congeladas."
2971103393 = "Naturalmente"
3404545130 = "Apesar de Shigure ter avisado para o Sensei levar um guia ao visitar a Academia Federal Red Winter, ele acaba se perdendo nas montanhas nevadas. Felizmente, ele consegue encontrar Shigure, mas acaba levando uma bronca por não ter seguido o conselho. Congelado e incapaz de se mover, o Sensei é carregado nas costas por Shigure até descerem a montanha em segurança."
720127695 = "Relaxadamente"
1882526035 = "Como agradecimento por ter sido salvo na montanha nevada, o Sensei convida Shigure para um restaurante no centro da cidade. No caminho de volta, após desfrutarem de um tempo tranquilo, ela confessa que se sente mal por Nodoka ao receber tanta gentileza sozinha. Quando o Sensei diz que na próxima vez todos do prédio antigo podem ir juntos, Shigure dá um sorriso travesso."
4186219493 = "Sinceramente"
273193773 = "Shigure decide retribuir o agradecimento do Sensei preparando uma refeição. O Sensei fica surpreso com a enorme quantidade de carne de caça levada para a sala de prática culinária do Schale. Ao ver Shigure colocando vodka na comida novamente, o Sensei acaba tendo que terminar o prato no lugar dela."
3572546902 = "Serina, a Papai Noel"
3496257221 = "No dia de Natal, o Sensei distribui presentes para as crianças junto com Serina. Após terminarem, enquanto ouve Serina contar que acreditava em Papai Noel quando criança, a neve começa a cair. Vendo que ela está com frio, o Sensei sorri e presenteia Serina com um cachecol, dizendo que o Papai Noel também precisa receber um presente."
2512788767 = "O agradecimento pelo cachecol"
2923297793 = "Serina visita o Sensei para agradecer pelo cachecol. Preocupada com a saúde do Sensei, que está sempre ocupado, ela o presenteia com um \"Kit de Saúde Total\", contendo suplementos e compressas, e ainda lhe dá uma massagem. Ao ver o Sensei recuperado, ela fica feliz como se fosse algo para ela mesma."
2326049757 = "Experiência de um dia na Unidade de Socorro"
1971996326 = "O Sensei participa de uma atividade voluntária que Serina realiza no hospital. Serina atua como membro da Unidade de Socorro, cuidando da saúde dos pacientes enquanto distribui presentes como Papai Noel. Após o dia de atividades, ao perguntar o motivo da participação do Sensei, ele responde: \"Porque quero saber mais sobre você e a Unidade de Socorro\", fazendo Serina corar de vergonha."
720184857 = "Criança boa? Criança má?"
1669203285 = "Hanae pensou que, já que ia se vestir de Papai Noel, deveria se tornar um Papai Noel de verdade. E, para distribuir presentes como um verdadeiro Papai Noel, ela precisava primeiro distinguir entre crianças boas e más. Então, o Sensei decide testar se Hanae consegue identificar mentiras..."
69967909 = "Treinamento especial! O caminho para ser Papai Noel!"
3605114321 = "Continuando sua busca para ser um Papai Noel de verdade, Hanae começa a praticar parkour para conseguir entregar presentes em qualquer lugar. O Sensei ajuda Hanae, que é um pouco desastrada, e eles terminam o treino em segurança. Em seguida, Hanae sugere pedir ajuda ao Clube de Engenharia do Millennium para voar a Mach 2, mas o Sensei a impede com todas as suas forças."
2582704447 = "Esperando por você"
2787292054 = "Hanae convida o Sensei para seu quarto e apresenta, um por um, os lanches, meias e decorações que preparou para receber o Papai Noel. Enquanto ela dorme, cansada de tanto esperar pelo Papai Noel, o Sensei prepara os presentes silenciosamente."
503073630 = "Assuntos importantes, coisas preciosas"
675453541 = "Hanae vai ao shopping com o Sensei para comprar presentes para distribuir. No entanto, todos os presentes que Hanae escolhe são artigos de saúde, o que acaba causando uma briga com os delinquentes do mercado negro. Irritada com a arrogância deles, Hanae decide agir para corrigi-los."
3867179911 = "Um fim de ano tranquilo"
1185714622 = "O Sensei decide saborear vários pratos com Haruna nas ruas vibrantes de fim de ano. No entanto, como nada parecia satisfazer Haruna — e no momento em que o Sensei temia que ela explodisse as barracas de comida —, Haruna ri e diz: 'Embora não seja uma iguaria gastronômica, consegui aproveitar o suficiente', passando um tempo tranquilo com o Sensei."
1122975317 = "O resultado está no processo"
1611910214 = "Haruna chama o Sensei ao mercado, dizendo que, para explorar a gastronomia, é preciso conhecer o processo. Ela participa de um leilão e pede a um cozinheiro conhecido que prepare o pargo que conseguiu. Embora tenham desfrutado de uma refeição tranquila, Haruna lamenta que 'o caminho para explorar a gastronomia suprema não é nada fácil'."
1306876513 = "Os requisitos para satisfazer a gastronomia. São os pratos, a estação..."
2915697252 = "Com o objetivo de desfrutar da melhor gastronomia com o Sensei, Haruna o convida para sair. Ela diz que a melhor gastronomia depende dos pratos, da estação e, acima de tudo, da companhia, e passa um tempo maravilhoso com o Sensei."
799816248 = "Ano Novo com um novo visual!"
3455411055 = "Convidado por Junko, o Sensei visita seu local de trabalho, o 'L'oiseau Brûlé'. Lá, ele encontra Junko vestindo um quimono. Ela confessa que queria que o Sensei visse seu quimono alugado, o que foi muito cativante. O Sensei, querendo agradá-la, faz um pedido enorme e, juntos, eles comem calmamente o que não conseguiram terminar."
934247381 = "Quero comer vários pratos!"
527805565 = "Como agradecimento pelo pedido enorme que o Sensei fez para Junko no L'oiseau Brûlé da última vez, ela o convida para um festival. Eles comem vários pratos das barracas e se divertem, mas Junko acaba comendo demais e volta para casa com o rosto pálido."
4015908374 = "Por favor, me dê calor"
1228012568 = "No último dia do feriado, o Sensei decide sair para um encontro pela cidade com Junko, que lamenta o fim das férias. Eles caminham por vários lugares e, no final, dividem um dango e riem juntos."
2198382498 = "O desejo de Fuuka"
41944175 = "O Sensei visita o refeitório da Gehenna para encontrar Fuuka, que continua trabalhando mesmo no fim de ano. Assim que ela termina o serviço, eles decidem passear pela cidade comendo nas barracas. Enquanto aproveita os pratos, Fuuka comenta que deseja um dia de paz no próximo ano."
735524095 = "Um pouco atrasado"
751489679 = "Convidado por Fuuka, o Sensei visita o refeitório. Lá, ele encontra Fuuka vestida com um quimono. Como agradecimento por tudo, ela serve ao Sensei um soba de véspera de Ano Novo feito por ela mesma, e então eles trocam saudações de Ano Novo."
3464653551 = "O último passeio do feriado"
1290967402 = "Quando o feriado está chegando ao fim, Fuuka diz que dedicará o resto dos dias de folga às atividades do Clube de Merenda. Ao saber que aquele é, na prática, o último dia de folga de Fuuka, o Sensei a leva para um encontro."
2747740649 = "O espírito de socorro"
4046348442 = "O Sensei começa a fazer rondas de socorro com Mine. Embora seus métodos sejam um pouco agressivos, ela corre para prestar assistência. Ao final do dia, impressionada com a sintonia que teve com o Sensei, Mine sugere que ele se torne seu consultor."
155199846 = "Hobbies e benefícios"
1992573947 = "Mine convida o Sensei para mostrar os suprimentos médicos de sua casa. Ela explica sobre vários itens, mas o Sensei parece não entender muito bem. Tendo a ideia de que ele entenderia a eficácia se ela demonstrasse, Mine aponta uma lâmina para si mesma, mas é impedida às pressas pelo Sensei."
4103404645 = "Chá da tarde"
381585519 = "Mine convida o Sensei para um chá. Enquanto ela desabafa sobre suas preocupações, a conversa toma um rumo inquietante. Percebendo que o Sensei está envolvido em muitos dos incidentes que ocorrem em Kivotos, Mine pensa que talvez prender o Sensei resolva o problema e começa a planejar como agir."
1869515898 = "A forma do 'Socorro'"
1542046764 = "Enquanto o Sensei e Mine trabalham no Schale, recebem um telefonema de um cidadão pedindo ajuda na 'Floresta de Kivotos'. Eles correm para lá, mas não conseguem encontrar o cidadão. Assim, ao cair da noite, os dois fazem uma pausa."
3733720402 = "De volta à rotina tranquila"
4075198640 = "O Sensei decide ir às compras com Mika, que retornou à vida escolar. Ela precisa comprar novamente itens essenciais como livros didáticos, trajes de banho designados e uniformes de ginástica. No entanto, o cartão de Mika não é aceito no pagamento, e o Sensei acaba pagando por ela."
1824494665 = "Atividades voluntárias"
3962654178 = "Mika decide capinar o campo como parte de uma atividade voluntária. O Sensei ajuda Mika e, juntos, eles passam um tempo tranquilo."
2847450936 = "A princesa do sótão"
2413528587 = "O Sensei vai ao dormitório após ser chamado por Mika. Embora a ideia fosse apenas tomar um chá no quarto, o momento da chamada de presença começa exatamente quando ele entra no quarto privado de Mika. Sem poder sair, o Sensei passa um tempo inesquecível no quarto dela."
1481077183 = "Cicatrizes"
120262361 = "Após receber uma mensagem de Mika dizendo que se envolveu em uma briga com alunos, o Sensei corre para Trinity e encontra Mika segurando seu traje de banho, que foi rasgado pelo bullying dos outros alunos. O Sensei consola Mika, que está chorando, e propõe uma aula de natação feita apenas para ela."
2390792070 = "Os restos do Gorigori-kun"
238376327 = "O Sensei visita Meg e a encontra olhando para um sorvete 'Gorigori-kun' que derreteu. Meg diz que, como o sorvete é duro demais, ela estava tentando derretê-lo com sua arma para deixá-lo na temperatura ideal. O Sensei a aconselha a esperar em vez de usar sua arma."
997833605 = "Uma garota que não sabe 'esperar'"
3179826887 = "Meg, que estava tentando desenvolver uma fonte termal como sempre, acaba sendo interrompida. Embora tenha recebido ordens do chefe para se dispersar e se esconder, Meg fica frustrada por não saber até quando deve 'esperar', então o Sensei a distrai mostrando um kendama."
70172580 = "Deixe com o Departamento de Desenvolvimento de Fontes Termais!"
4184469458 = "Um dia, o chuveiro do Schale quebra e só sai água fria. Ao ouvir isso, o Sensei recebe uma mensagem misteriosa de Meg e visita o pé de uma montanha. Surpreendentemente, Meg estava cavando uma fonte termal lá para o Sensei."
3903491499 = "A conexão entre fontes termais e lámen"
297876452 = "Tarde da noite, Meg conversa com o Sensei enquanto prepara lámen. Depois de dividirem o lámen pronto, Meg parte para o desenvolvimento de fontes termais, como de costume."
1551137325 = "Rumores sobre a diretora"
3048088134 = "Kanna visita o Schale para seu turno. O Sensei trabalha com Kanna, famosa por ser rigorosa na Academia de Polícia Valkyrie. O Sensei, nervoso para não desagradar Kanna, acaba cometendo uma série de erros devido à tensão."
3236770699 = "O clássico da vigilância"
1619463056 = "O Sensei visita Kanna, que está em uma investigação secreta, levando um lanche para apoiá-la. Como Kanna não tinha comido nada até tarde, o Sensei leva várias comidas e, com isso, eles conseguem descobrir uma barraca suspeita. Eles conseguem prender o criminoso que estavam perseguindo."
1028219097 = "Sozinha, uma pausa"
1512296132 = "Após prender com sucesso o contrabandista, Kanna recebe convites para jantar dos alunos do Departamento de Segurança Pública, mas ela recusa educadamente. Naquela noite, o Sensei, que parou em uma barraca móvel para comer algo, encontra Kanna desfrutando de uma refeição sozinha."
692249735 = "Outro caminho"
4271209454 = "Uma chamada de Kanna interrompe a tranquilidade de uma tarde comum. O Sensei percebe que Kanna está com dificuldades para acalmar uma criança perdida e decide se esforçar para ajudar. Após um dia agitado, em uma bifurcação no caminho de volta, Kanna revela ao Sensei sentimentos que nunca havia confidenciado a ninguém."
3258439759 = "Alguém fácil de ser mal interpretado"
3227620313 = "Preocupado com as mensagens enigmáticas que Sakurako envia pelo Momotalk, o Sensei decide visitá-la. Ao conversar com ela, o Sensei compreende que, devido ao seu jeito de falar sempre carregado de segundas intenções, ela acaba tendo uma personalidade fácil de ser mal interpretada."
2902921354 = "“Tendência”"
4239335081 = "O Sensei encontra Sakurako indecisa em frente a uma loja de acessórios no centro comercial. Nesse momento, a porta da loja se abre e o dono leva Sakurako para dentro. O Sensei segue a confusa Sakurako e observa enquanto ela faz suas compras."
2853082550 = "Noite secreta"
1413282267 = "Após receber um contato de Sakurako, o Sensei acaba caminhando pelos corredores internos da catedral. Lá, Sakurako lhe confidencia “um” segredo—?"
2382324779 = "Um hobby inesperado"
4092134933 = "O Sensei é chamado por Sakurako para um aconselhamento. O assunto era o fato de ela mesma não ter nenhum hobby. O Sensei explica que os hobbies nascem do contato com diversas coisas, e eles passam um tempo tranquilo juntos."
399214349 = "Momento de explicação"
3113818934 = "O Sensei chega após receber um SOS de Sakurako. No entanto, o conteúdo era para que ele fizesse um discurso diante das irmãs, provando que Sakurako não é uma pessoa suspeita. O mal-entendido em relação a Sakurako só aumenta."
2003923680 = "A rotina de Toki"
1607965188 = "Tendo perdido a mestra a quem servia, Toki estava preocupada sobre o que fazer a partir de agora. Assim, ela chega à conclusão de que deveria tornar o Sensei seu novo mestre... e assim começa uma nova vida, com Toki acompanhando-o como sua empregada exclusiva."
4288888721 = "Vida escolar comum"
322319486 = "Toki está à beira da repetência por falta de frequência. No entanto, para Toki, que nunca teve uma “vida escolar comum”, ela diz não saber como é o comportamento de levar uma vida escolar como os outros alunos. O Sensei decide dar suporte para que Toki possa vivenciar uma “vida escolar comum”."
1375907566 = "Preocupação com hobbies"
3410652719 = "Toki diz que, até agora, viveu apenas para cumprir suas missões como empregada. O Sensei, ao ver que ela não tem hobbies específicos e não entende o conceito, decide levá-la à cidade para um encontro..."
284991053 = "A empregada das empregadas"
3181693318 = "O Sensei, tendo recebido um aviso de que Toki se atrasaria para ir ao Schale por conta de um compromisso, decide visitá-la, achando estranho vindo de alguém que sempre é tão pontual. Lá, ele encontra Toki realizando a inspeção e manutenção de seus equipamentos..."
62419462 = "Prova de conexão"
2598613321 = "Toki entra em contato repentinamente via comunicação, diz coisas que intencionalmente geram mal-entendidos e aparece no Schale para entregar ao Sensei um headset igual ao dela. O Sensei fica confuso ao ser pedido para usar o aparelho e ficar conectado a ela 24 horas por dia. O headset foi selado silenciosamente em uma gaveta."
3221453657 = "Hora do chá da tarde"
1575926616 = "O Sensei é convidado para o chá da tarde de Nagisa. Quando Nagisa se oferece para preparar um chá gelado para o Sensei, que está suado de tanto correr, ele recusa, dizendo que tem um “chá de garrafa” que comprou. Nagisa, curiosa com a marca que nunca viu, pede um pouco, mas parece que o sabor não lhe agradou."
3617335172 = "Linguagem desleixada, mente desleixada"
3261002897 = "Nagisa comenta que ultimamente tem se preocupado com a linguagem desleixada dos alunos de Trinity. Ela se gaba de que, como sempre se esforça para usar uma linguagem polida, nunca perderia a compostura em nenhuma situação... mas, logo após receber relatórios sobre vários problemas causados pelos alunos, ela acaba perdendo o controle do seu próprio vocabulário."
578805062 = "Chá e sabor"
2073459542 = "Nagisa organiza um chá para receber o Sensei com novas folhas de chá. No entanto, o que ela preparou não foi chá de kombu, mas sim chá de kombu (confusão de termos). Para não decepcionar o Sensei, Nagisa decide servir o chá de kombu mesmo assim..."
1365827293 = "Se não há pão"
1448253096 = "O Sensei visita o centro comercial próximo para comprar pão. No entanto, não restava nenhum pão na loja... Ao ver a situação, Nagisa sugere que eles comam juntos um bolo feito sob encomenda que ela pediu em outra loja."
2105366932 = "Moradora da sala de reflexão"
214951891 = "O Sensei visita Millennium e vai até a sala de reflexão ver Koyuki. Pensando que ela estaria vivendo de forma apertada, ele descobre que, na verdade, Koyuki decorou a sala ao seu gosto e está relaxando."
2113534752 = "Caixa de Pandora (1)"
4241439597 = "Koyuki, agora responsável pelo turno no Schale, reclama que até então só fazia trabalhos de descriptografia de senhas. Quando ela pergunta se deveria fazer o mesmo no Schale, o Sensei pede que, pelo contrário, ela não desbloqueie as senhas do Schale. Ao ouvir isso, Koyuki sorri maliciosamente, pensando em algo bom, e volta para Millennium."
4083323257 = "Caixa de Pandora (2)"
2414226696 = "Koyuki se infiltra no Schale e tenta tocar nos segredos do local, mas é descoberta pelo Sensei. Ela foge para a área residencial do Schale e, lá, descobre um “livro misterioso”."
2351755493 = "Conduta diária"
2882100059 = "O Sensei encontra Koyuki por acaso em um fliperama. Ao perguntar se ela gosta de jogos, Koyuki responde que prefere aqueles que envolvem sorte, onde sua habilidade não importa. Dizendo que se a conduta diária for boa, a sorte também deve ser, os dois aproveitam para jogar um jogo de luta no fliperama."
1850258284 = "Prova de sorte"
3499702459 = "O Sensei encontra Koyuki agachada no gramado. Ela estava procurando um trevo de quatro folhas, na esperança de que isso lhe trouxesse sorte. Assim, o Sensei e Koyuki passam o tempo procurando trevos de quatro folhas juntos."
505934790 = "Vou dar o troco!"
619630983 = "O Sensei visita a sala de reflexão após ser chamado por Koyuki. O tesouro que ela havia perdido era uma “medalha de vitória” que ela fez antigamente para trapacear no fliperama. O Sensei já a tinha encontrado e a entrega a ela. Ao ver que ela não demonstra nenhum remorso mesmo sendo advertida de que aquilo é um crime, o Sensei a inscreve sem hesitar em um curso de boas maneiras públicas."
168056968 = "Mal-entendido crescente"
2953254523 = "Kayoko, que visitava uma loja para encomendar um quimono novo, estava confusa com a conversa desencontrada com o atendente. Graças à intervenção do Sensei, que passava pelo local, Kayoko conseguiu comprar o quimono que queria."
3556812176 = "Sinos de Ano Novo"
1261302160 = "Na véspera de Ano Novo, o Sensei e Kayoko vão ouvir o sino da virada. No entanto, como o sino estava em manutenção, eles não conseguem ouvi-lo... No caminho de volta, eles dão as boas-vindas ao Ano Novo ouvindo o som da cancela do primeiro trem da manhã."
1594158572 = "Gatos, Kayoko e Amazake"
585940394 = "Kayoko e o Sensei, que vieram comprar amuletos, decidem beber amazake para aquecer o corpo que esfriou. Enquanto conversam sobre como alguns alunos ficam bêbados com a pequena quantidade de álcool no amazake, Kayoko se afasta um pouco, atraída pelo miado de um gato. Preocupado por ela não voltar após um tempo, o Sensei vai ver o que houve e encontra Kayoko brincando fofamente enquanto imita o miado do gato. Envergonhada por ter sido vista pelo Sensei, Kayoko tenta disfarçar dizendo que a culpa também é do amazake."
1021018790 = "Método de alívio de estresse"
1831690994 = "Logo no início do ano, o Sensei está correndo para atender aos pedidos de vários alunos. Kayoko o leva a um show de instrumentos tradicionais japoneses para que ele possa relaxar de tanta correria. O Sensei, que esperava algo calmo como música clássica japonesa, é surpreendido por um som de rock metal japonês."
1676776936 = "Fazendo o Kadomatsu"
2926389252 = "Ao chegar o Ano Novo, o Sensei visita Haruka. Haruka estava procurando bambus para fazer seu próprio Kadomatsu para decorar o escritório. Ela fica desanimada por não conseguir encontrar os bambus mesmo com a ajuda do Sensei, mas ele lhe diz que, nessas horas, o que importa é a intenção. Encorajada por essas palavras, Haruka termina de fazer seu Kadomatsu artesanal e o leva para o escritório junto com o Sensei."
4150553585 = "Senso de estação"
882190145 = "Preocupado com o fato de Haruka estar usando um quimono curto, apesar de ser inverno, o Sensei a convida para comprar um quimono longo, mas ela recusa, dizendo que seria um incômodo aceitar tal presente. Então, o Sensei decide comer doces com ela e lhe compra um aquecedor de bolso."
1010615852 = "Vento frio e um coração quente"
902806983 = "Em um dia frio, onde a temperatura caiu drasticamente. Preocupado com Haruka e com o estado das ervas daninhas, o Sensei vai visitá-la. Junto com Haruka, que diz ter acabado de cuidar das ervas, ele vai tomar uma sopa quente."
1362773471 = "Kaho, a responsável pelas relações públicas de Hyakkiyako"
3015917284 = "O Sensei recebe um contato repentino de Kaho dizendo que precisa consultá-lo sobre \"aquele assunto\". Enquanto o Sensei fica confuso sobre do que se trata, Kaho começa uma apresentação sobre a indústria turística de Hyakkiyako. Quando a explicação termina e o Sensei pergunta novamente sobre \"aquele assunto\", Kaho deixa escapar que deveria ter enviado um e-mail, mas o e-mail nunca chegou... Percebendo que ela estava falando sozinha, o Sensei a apoia e pede que ela faça a apresentação novamente."
813536488 = "Kaho, mais parecida com uma diretora do que a própria diretora"
1268253443 = "Para se redimir da última vez, Kaho se oferece para escoltar o Sensei. Enquanto ela está entusiasmada para guiá-lo pela Academia Hyakkiyako, vários alunos aparecem com pedidos de ajuda. O Sensei consola Kaho, que fica desanimada por não ter conseguido realizar a escolta como planejado."
3589056262 = "A escolta perfeita de Kaho"
1155603011 = "Kaho convida o Sensei para Hyakkiyako mais uma vez, como uma revanche. Desta vez, sem interrupções, ela apresenta os pontos turísticos e os encantos de Hyakkiyako com toda a sua energia, e o Sensei acaba aproveitando o encontro com ela."
1779236823 = "A estratégia de vendas planejada de Kaho"
44237873 = "Após receber um contato de Kaho, o Sensei visita a sala de descanso do Departamento Yin-Yang, onde encontra Kaho organizando mercadorias promocionais encomendadas especialmente para a ocasião."
2501910877 = "Nunca se esqueça da sua intenção original"
1244005463 = "O Sensei e Kaho estão limpando a sala de descanso do Departamento Yin-Yang. Nesse momento, Kaho limpa cuidadosamente uma carta de agradecimento que recebeu de um aluno de Hyakkiyako, enquanto conta as memórias relacionadas a ela."
4137176117 = "Empregada em apuros!"
2046418808 = "Após receber um SOS de Alice, o Sensei a encontra vestida de empregada. Como ela lavou todas as suas roupas, essa era a única que ela tinha para vestir. No entanto, como Alice diz que ainda tem uma certa resistência ao traje de empregada, o Sensei a aconselha a \"mudar de classe para empregada\". Assim, Alice, tendo sucesso na mudança de classe, se dedica à limpeza e começa a perder o desconforto com o traje."
186589621 = "Grande operação de estudo de empregada!"
25252799 = "Decidida a aumentar seu nível de empregada, Alice decide pesquisar sobre o assunto na internet. Tendo adquirido vários conhecimentos sobre empregadas, Alice ri, dizendo que parece que será capaz de subir de nível."
3585111616 = "Preparativos para a saída concluídos!"
3930937110 = "O Sensei visita o Millennium após Alice dizer que tem algo importante para falar. Com os preparativos para a aventura prontos, Alice declara que, como seu nível de empregada subiu o suficiente, ela pretende se tornar a maior heroína empregada."
3951701776 = "O equipamento da heroína empregada"
224308736 = "Como uma heroína empregada, Alice desafia a limpeza da guilda do Sensei, ou seja, o Schale. No entanto, durante a limpeza, a tiara de Alice acaba sujando. Alice lava a tiara junto com as outras roupas e passa um momento divertido com o Sensei."
3957314179 = "O motivo vem depois"
3997203066 = "O Sensei acaba em uma missão de infiltração em uma festa em um cruzeiro de luxo junto com Toki. Toki, vestida de coelhinha, atrai a atenção de todos ao redor — e o Sensei, que a acompanha, acaba sendo alvo de olhares frios. No entanto, Toki não se importa e executa a missão com indiferença."
2330192846 = "Rumores sobre a coelhinha"
2392731156 = "Por causa de Toki, que vive no Schale vestida de coelhinha, surge o boato de que o Sensei do Schale é um pervertido que força os alunos a usarem roupas de coelhinha. O Sensei tenta conversar com Toki sobre isso, mas ela ignora, dizendo que \"rumores duram pouco\"... E assim termina mais um dia."
2672746772 = "Um lugar para descansar o coração"
2814303571 = "O Sensei recebe uma comunicação de missão de Toki, mas a ligação está cortada e não há resposta. Eventualmente, apenas mensagens de caixa postal são retornadas. Preocupado com a segurança de Toki, o Sensei a espera até de manhã, mas acaba cochilando — ao acordar, ele vê Toki dormindo na mesma cama."
1746842993 = "O material de referência é...?"
2920706888 = "Yuzu decide vestir um traje de empregada para servir de material de referência para um novo jogo. No entanto, devido à sua falta de confiança natural, ela se esconde no armário, onde é encontrada pelo Sensei. Quando o Sensei, ao ouvir a situação, tenta encorajá-la, ela é vista por um aluno do Millennium que veio visitá-la — e Yuzu volta a ser uma habitante do armário."
831733757 = "Um novo trabalho de meio período"
868737743 = "Yuzu começa um trabalho de meio período para obter fundos de desenvolvimento para seu novo jogo. O Sensei recomenda um café que ele frequenta — mas era um café de empregadas. Para Yuzu, que lamenta que o atendimento ao cliente em um café de empregadas seja difícil para ela, o Sensei decide acompanhá-la no treino de atendimento."
2231433090 = "Visitante indesejado dentro do armário"
2256848622 = "O Sensei visita o café de empregadas para ver como Yuzu está se saindo no trabalho. No entanto, talvez por estar consciente demais da presença do Sensei, Yuzu comete erros que normalmente não cometeria. Depois, ao procurá-la por ela não ter voltado do intervalo, ele a encontra cercada por gatos — após o Sensei acolher suas preocupações, Yuzu volta ao trabalho com um sorriso radiante e alcança um novo recorde de indicações."
1898965458 = "Limpeza do Departamento de Desenvolvimento de Jogos"
2028068753 = "O Sensei visita a sala do Departamento de Desenvolvimento de Jogos para ajudar Yuzu com a limpeza. No entanto, a limpeza de que Yuzu falava não era a do quarto, mas a otimização do computador. O Sensei, sugerindo que também fizessem uma limpeza real, limpa a sala junto com Yuzu."
1247993165 = "Bom dia, Reisa"
2205362417 = "O Sensei encontra Reisa por acaso no ponto de ônibus. Reisa decide consultar o Sensei sobre suas trocas de mensagens no MomoTalk com uma amiga da turma. Tendo recebido o conselho de que o melhor é ser honesta consigo mesma ao falar, Reisa volta para casa com passos leves."
3620040079 = "Acredite, Reisa"
1349760893 = "Reisa vem consultar o Sensei sobre métodos eficazes para recuperar a fadiga. Ela diz que aceita tudo o que lhe pedem, pois recusar pedidos ou convites de outras pessoas afetaria seus relacionamentos futuros. O Sensei diz que, se ela continuar se forçando assim, as pessoas ao seu redor ficarão preocupadas, e decide que ela deve descansar."
324482861 = "Obrigado, Reisa"
1014758945 = "Como agradecimento por tudo, Reisa se esforça para escoltar o Sensei. Eles visitam cafés, fliperamas, parques de diversões, etc., mas Reisa fica desanimada ao saber que o Sensei já tinha ido a esses lugares antes. Quando ele diz que é a primeira vez que vem com ela e que hoje foi um tempo muito precioso, ela sorri alegremente."
3804324515 = "Boa noite, Reisa"
2635556863 = "Caminhando pela cidade com Reisa, que está fazendo uma patrulha noturna, o Sensei ouve sobre os sentimentos dela como membro do comitê de vigilância. Observando o nascer do sol, Reisa sorri alegremente, dizendo que é a primeira vez que vê o nascer do sol com alguém assim. E assim, o Sensei termina a patrulha da madrugada carregando Reisa, que está com os passos incertos devido ao sono."
1171878055 = "Coma bastante!"
257339176 = "Rumi, que visita o Schale por ter algo a consultar com o Sensei, sente uma crise ao ver a vida do Sensei, que trabalha sem nem almoçar. \"Isso não pode continuar\", diz ela, e começa a preparar pratos usando os ingredientes que estavam no Schale."
168583006 = "Primeiro, prove!"
4087665218 = "O Sensei, convidado por Rumi para provar os pratos que estão sendo testados na Associação Genbu, come os pratos que saem um após o outro e dá suas impressões a Rumi. Tocado pelos esforços minuciosos de Rumi, que sempre prepara pratos deliciosos, a sessão de degustação continua mesmo depois que ele já está satisfeito."
6308616 = "Problemas do atendimento ao cliente"
4152447857 = "Após terminar seu trabalho em Shanhaijing e passar na Associação Genbu, o Sensei acaba presenciando Rumi lidando com um cliente problemático. Sentindo algo estranho no comportamento do indivíduo, o Sensei o segue discretamente... e descobre que ele é um reincidente em comer sem pagar, que já constava nos registros de incidentes da Valkyrie. Rumi aparece logo em seguida e aplica o martelo da justiça sobre o cliente."
7640267 = "Não se preocupe, está bem?"
2967789925 = "Ao ser avisado de que hoje é o dia de cozinhar uma grande quantidade de guiozas na Associação Genbu, o Sensei visita Rumi para observar o processo. A cozinha estava tão cheia de vapor que parecia uma sauna, e o Sensei acaba presenciando um lado inesperado de Rumi."
3324623418 = "Primeira impressão"
361199515 = "Mina, que estava ansiosa demais para seu primeiro turno no Schale, ficou tão preocupada com a forma como faria sua entrada triunfal na porta que acabou se atrasando. Tentando se recompor para começar o turno, ela acaba discutindo seriamente com o Sensei sobre como eles deveriam chamar um ao outro a partir de agora."
855234387 = "Prática de flauta doce"
2959531408 = "O Sensei, que foi designado para ajudar Mina nas atividades de manutenção da ordem da Genryumon, fica perplexo ao ver Mina aparecer de repente tocando flauta doce. Segundo ela, foi inspirada por um filme que viu, onde um colega tocava clarinete enquanto morria, e decidiu imitá-lo. Assim, a peculiar performance de flauta doce de Mina acaba se tornando um boato em Shanhaijing."
1904261494 = "A cor do céu chuvoso"
2823268309 = "Após terminar seus deveres oficiais em Shanhaijing, o Sensei é pego por uma chuva de verão. Diante dele, surge Mina com um guarda-chuva, revelando com um sorriso suave que adora a paisagem dos dias de chuva."
2904966419 = "Mesmo com o passar do tempo"
3295408939 = "O Sensei foi visitar as crianças do Jardim Baika junto com Mina. Diferente de sua rotina habitual na Genryumon, que tem um ar mais 'noir', o Sensei descobre um novo lado de Mina ao vê-la cuidando das crianças com carinho e rindo alegremente."
244539017 = "Como as construções são feitas"
267837178 = "Após terminar o trabalho durante a noite toda, o Sensei estava se preparando para voltar para casa no primeiro trem, quando acabou sendo levado pela multidão para dentro do ônibus do Departamento de Obras. Seguindo o fluxo, o Sensei chega ao canteiro de obras e acaba visitando o local junto com Minori."
725869297 = "Minori Twist"
366290358 = "Ao encontrar Minori na biblioteca de Red Winter, o Sensei descobre que ela gosta de literatura proletária e acaba ouvindo sobre seus livros favoritos. No entanto, o conteúdo das histórias parecia um pouco diferente do que o Sensei conhecia."
3493912546 = "Um andaime só para dois"
2598860157 = "Em um dia em que a construção foi cancelada devido a uma onda de frio repentina, o Sensei visita o Departamento de Obras levando um lanche. Minori, que estava fazendo a inspeção de segurança do local sozinha, retribui o gesto do Sensei mostrando uma vista especial do alto do andaime, que só o pessoal do Departamento de Obras pode ver."
3231977855 = "Por que os estudantes de Kivotos são infelizes?"
164078001 = "Minori visita o escritório para o seu turno no Schale. Ela aponta que o trabalho de turno, que permite ficar junto com o Sensei, gera desigualdade, e discute apaixonadamente sobre possíveis soluções para isso."
432672538 = "SRT, vou comprar"
131504888 = "Miyako recebe um vale-presente de um cliente e pede conselhos ao Sensei sobre o que comprar. Os dois percorrem a loja de departamentos e acabam comprando itens de acampamento. Nesse meio tempo, Miyako nota um certo traje de banho..."
4182954826 = "SRT, vou treinar"
3400306939 = "Para realizar um treinamento de resgate marítimo, o Sensei e Miyako seguem para o alto-mar em um barco. Após amarrar o Sensei conforme o treinamento, Miyako percebe que não há um inimigo e decide mudar o conteúdo do exercício."
2954136082 = "SRT, vou explorar"
1741566074 = "O Sensei foi visitar uma ilha deserta com Miyako, atravessando um banco de areia durante a maré baixa. Enquanto admiravam a bela ilha, a maré subiu e eles não conseguiram voltar para a terra firme. Esperando pela próxima maré baixa, os dois passam o tempo na ilha e acabam descobrindo um bando de coelhos."
2048487267 = "SRT, vou relatar"
2604825862 = "Caminhando pela praia de manhã cedo, o Sensei encontra Miyako, que estava caminhando pela areia para fazer seu exercício matinal."
3616835660 = "Operação de suprimento subaquático (1)"
3120962973 = "Após receber um contato de Saki, o Sensei vai ao cais levando equipamentos de pesca. Saki, que diz ter recebido permissão dos moradores locais para coletar frutos do mar, afirma com orgulho que vai pegar algo valioso para o Sensei, que sempre cuida dela. No entanto, irritada por não conseguir pescar nada, Saki começa a disparar sua arma contra os peixes debaixo d'água..."
1056477700 = "Operação de suprimento subaquático (2)"
3726172857 = "O Sensei visita o cais novamente após outro contato de Saki. Ela está empolgada por ter encontrado um 'bang stick' (lança explosiva) no depósito da vila e declara que agora vai conseguir pescar com isso. Porém, o poder do explosivo é muito maior do que ela imaginava, e o peixe acaba sendo reduzido a pedaços."
2099064502 = "O que espreita no banco de areia"
3715648582 = "O Sensei vai até o banco de areia após um contato de Saki. Os dois acabam se divertindo coletando mariscos."
3856082788 = "Mar profundo, respiração rasa"
4086115667 = "Caminhando pela vila de pescadores, o Sensei encontra Saki fazendo limpeza no fundo do mar com equipamento de mergulho. Ao descobrir que o Sensei nunca tinha mergulhado antes, Saki decide ensiná-lo a mergulhar."
1203774988 = "O atirador do cais"
359062505 = "O Sensei visita o cais após Miyu dizer que queria testar um novo disfarce. Para evitar olhares, Miyu se disfarçou de pescadora e estava curtindo a pescaria. Enquanto o Sensei se surpreende com o quão natural ela parece, a vara de Miyu fisga algo grande. De repente, ela atrai a atenção de todos os pescadores ao redor, e Miyu sorri sem jeito."
1400267850 = "Como guardar memórias"
26270932 = "Miyu estava coletando pedrinhas na praia como de costume. Ao ver isso, o Sensei decide reunir algumas pedras que ela poderia gostar. Ao ver a seleção do Sensei, Miyu sorri e diz que gostou de todas."
1622439539 = "A forma do céu"
1698602601 = "Olhando para o céu da praia, Miyu sorri dizendo que a bela linha do horizonte lhe traz confiança, e ela troca algumas palavras com o Sensei sobre o céu."
2795360293 = "Confirmação de presença"
3188344150 = "Inspirada por uma revista de moda, Miyu decide experimentar um novo traje casual. Curioso com o comentário dela, o Sensei vai até a cidade e encontra Miyu vestindo um traje de banho bem no meio da área comercial."
3972604942 = "Snorkeling"
4210963508 = "Após receber um contato de Shiroko, o Sensei vai até a costa. Lá, Shiroko estava se preparando para fazer snorkeling e coletar comida. Segundo ela, é possível encontrar a 'concha fantasma' nesta área. Shiroko sai em busca da concha enquanto recebe o incentivo do Sensei."
4159401028 = "Gerenciamento de ritmo"
3199776909 = "O Sensei, que saiu para caminhar com Shiroko, acaba ficando exausto por falta de preparo físico. Shiroko se sente culpada por ter causado problemas ao Sensei devido ao seu ritmo acelerado, mas ele a consola e os dois começam a caminhar ajustando o ritmo um do outro."
2195713465 = "Expectativa"
1852257618 = "Quando todos já estavam dormindo, o Sensei encontra Shiroko caminhando fora do resort e decide segui-la. Shiroko confessa que está triste por o tempo divertido estar chegando ao fim, mas o Sensei sorri e diz que, daqui para frente, haverá muitas outras paisagens maravilhosas para eles verem."
1618207953 = "Um visual incomum"
2833660799 = "Após receber uma mensagem no MomoTalk, o sensei encontra Ui em um canto da praia. Ui confessa que veio ao litoral porque se sentia desconfortável com os olhares das pessoas ao redor. Quando o sensei diz que outras pessoas também vêm para cá para descansar longe de conhecidos, Ui olha para frente e dá um leve sorriso."
351695306 = "Um pequeno café na floresta"
3456535130 = "Após receber uma mensagem no MomoTalk, o sensei é convidado para o esconderijo de Ui, encontrado na ilha. Nos fundos de uma caverna isolada, eles passam um tempo a sós, bebendo café americano gelado."
2200786931 = "Até o último gole"
2554617240 = "Após receber uma mensagem de Ui no meio da noite, o sensei chega à praia silenciosa. Ui entrega um café americano gelado ao sensei, e os dois passeiam calmamente pela praia noturna."
612488749 = "Coração inquieto"
871353545 = "Ao chegar à praia após o contato de Hinata, o sensei a encontra montando uma espreguiçadeira e um guarda-sol. Ela conta que as outras integrantes da Sisterhood insistiram para que ela descansasse um pouco na ilha. No entanto, o sensei consola Hinata, que se sente culpada por descansar sozinha, e a ajuda a se deitar."
586273995 = "Por caminhos inexplorados"
1017214242 = "O sensei encontra Hinata carregando bagagens e decide ajudá-la. Enquanto caminham pela floresta, uma grande rocha bloqueia o caminho. Hinata levanta a rocha para removê-la, e embora vários outros obstáculos surjam diante deles, todos são resolvidos pela força dela."
3164602540 = "Uma confissão a sós"
3934941890 = "Hinata chama o sensei porque tem um pedido... ela quer praticar uma confissão como irmã da igreja."
1793982090 = "A missão de Koharu"
1618146205 = "O sensei estava descansando tranquilamente perto de uma cachoeira. Koharu decide ficar ao lado dele para vigiá-lo e garantir que ele não faça nada estranho..."
585869769 = "A crise de Koharu"
2170214140 = "Ao chegar à praia após ser chamado por Koharu, o sensei a encontra observando o horizonte sobre uma rocha. Com o passar do tempo, eles tentam voltar para a ilha, mas a maré subiu e o caminho foi bloqueado. Koharu acaba sendo carregada nas costas pelo sensei para retornar."
2828338450 = "O céu noturno de Koharu"
2677557683 = "Koharu se aproxima do sensei enquanto ele descansa na praia. Quando ele diz que estava observando as estrelas, Koharu decide se juntar a ele. Depois que ela adormece, o sensei a carrega de volta para o acampamento."
2930606407 = "Hoje é um dia seguro"
3313466648 = "Ao visitar as profundezas da floresta após ser chamado por Hanako, o sensei encontra várias frutas. O sensei, que esperava ser provocado novamente pelo jeito enigmático de falar dela, acaba se sentindo aliviado. Ela diz que não faz sentido provocar quando não há ninguém por perto. Hanako sorri, dizendo que, em lugares assim, ela quer revelar um pouco do que sente."
1688906964 = "Como você é"
30901074 = "Ao ouvir uma voz cantando durante um passeio, o sensei encontra Hanako diante de uma cachoeira. Hanako convida o sensei para entrar na água, dizendo que é refrescante, mas ele recusa. No entanto, ela o chama para perto e o puxa para dentro da água."
3660308927 = "Um lado desajeitado"
1134041130 = "Hanako se aproxima do sensei, que observava o pôr do sol na praia, e expressa palavras de gratidão que raramente consegue dizer em voz alta."
3237828853 = "A dama japonesa do mar de verão"
3696068603 = "Ao visitar a praia, o sensei é recebido pela hospitalidade especial de Mimori, a 'Yamato Nadeshiko'. Eles aproveitam o dia juntos, tomando sol e passeando pela areia."
2716709284 = "Leitura de mentes no mar de verão"
1386038324 = "Ao acordar, o sensei encontra Mimori, que começa a cuidar dele usando sua 'leitura de mentes'. Como o sensei ainda não decidiu o que fazer no dia, Mimori sorri e sugere que, já que vieram até o mar, deveriam aproveitar a água."
502611754 = "Memórias do mar de verão"
2287028514 = "O sensei cria várias memórias com Mimori, jogando vôlei de praia e bebendo algo juntos. E, conforme o dia chega ao fim, Mimori confessa que gostaria que aquele tempo durasse para sempre."
3374542908 = "Suprimentos"
1098258998 = "Após receber uma mensagem de Meru dizendo que sua caneta quebrou, o sensei decide comprar uma nova e levá-la. Meru, feliz, tenta desenhar um retrato dele como agradecimento, mas..."
507087033 = "A dor da criação (1)"
639372066 = "Meru está preocupada por não entender os sentimentos da heroína de seu manuscrito. O sensei a leva a um local popular de encontros, sugerindo que ela entenderá se sentir o que a heroína sente. Ao observar os casais em cada local e se inspirar, Meru percebe que aquilo é um encontro com o sensei e volta para casa apressada."
279895958 = "A dor da criação (2)"
750286265 = "Para 'retribuir' o encontro anterior, Meru decide convidar o sensei para seu próprio território. Enquanto aproveitam o café temático, Meru revela seu sonho ao sensei."
509591439 = "Bem-vindo à Frente de Libertação do Conhecimento!"
1337054964 = "Ao convidar o sensei para a biblioteca da Frente de Libertação do Conhecimento, Meru mostra seu estúdio. Ela explica que aquele é um lugar para voltar às origens quando está em um bloqueio criativo e pede ao sensei que seja seu assistente."
4118174099 = "A jornada em busca de um livro"
2690079847 = "Ao descobrir que o lendário fanzine criado pela Frente de Libertação do Conhecimento está dentro da Academia Federal de Red Winter, Momiji parte em uma jornada com o sensei para encontrá-lo."
3986459082 = "O motivo da coleção"
1425412045 = "Enquanto ajudava as alunas da Valkyrie a patrulhar o mercado negro, o sensei encontra Momiji, que havia entrado sem permissão. Ao saber que ela veio ao mercado negro para conseguir um livro fora de catálogo, o sensei pergunta por que ela se esforça tanto para colecionar livros."
1047874892 = "O festival do livro de uma vida"
3177169936 = "Chamado por Momiji para o festival do livro da Academia Federal de Red Winter, o sensei sai com ela em busca de tesouros ainda não vistos."
2690106276 = "Cercado por livros"
972013378 = "Ao saber que o sensei não descansou bem após passar a noite em claro, Momiji fecha a biblioteca temporariamente e o convida para entrar. Ela diz que, como muitos alunos tiram sonecas na biblioteca, talvez ele consiga dormir bem ali... e, após improvisar um quarto de descanso, ela deixa o sensei descansar."
3995225634 = "Sobre coisas que esquecemos"
3485332196 = "Ao ouvir que Momiji perdeu algo, o sensei a ajuda a procurar na biblioteca de Red Winter. O que eles encontram é uma coleção limitada de uma reedição de mangá. Quando o sensei pesquisa, descobre que o mangá tem um preço altíssimo atualmente, o que faz o coração de Momiji balançar por um momento. No entanto, como colecionadora, ela jura manter o item guardado com carinho, não importa o quanto valha."
2596706043 = "Preparando-se juntos"
3172089424 = "Na manhã do Festival de Halo, Kotori entra em contato com o sensei para sugerir exercícios de aquecimento. Após explicar a importância do alongamento, ela decide mostrar um exemplo. No entanto, ao ver que Kotori não consegue se alongar bem por estar com o corpo rígido, o sensei a consola e eles fazem os alongamentos juntos."
17391138 = "No fim das contas"
4279232490 = "O professor, que estava cuidando de tarefas administrativas no escritório da administração, estava sobrecarregado atendendo alunos que apareciam por acaso ou vinham pedir conselhos, além de seu trabalho habitual. Então, ele decidiu deixar Kotori, que veio ajudar com o trabalho de escritório, encarregada do atendimento por um tempo para tirar uma pausa. Quando o professor retornou da pausa, o que viu foi o escritório com apenas Kotori. Diante de uma Kotori que parecia se sentir culpada, o professor ficou feliz, pensando que finalmente poderia se concentrar no trabalho."
3384821961 = "Uma coisa é uma coisa, outra coisa é outra coisa"
1026815239 = "Preocupado com um Momotalk que parecia um pouco desanimado, o professor vai até a sala de espera onde Kotori está. Lá, ele encontra Kotori em um estado de tontura e instabilidade. O professor explica a situação no lugar de Kotori, que tentava explicar mesmo estando com dificuldade de ficar de pé, e a deixa descansar."
4197919104 = "O sentimento de não querer explicar"
1567162534 = "Todas as partidas terminaram e Kotori está imersa na sensação residual. Para Kotori, que lamenta que este momento vá passar, o professor diz que é justamente por passar que este tempo é precioso."
3782074268 = "Professor, eu vou ajudar"
1692291987 = "Haruna, que visitou o professor enquanto ele ajudava no quartel-general médico conjunto, decide atender os alunos junto com ele. O professor fica impressionado com Haruna, que, baseada em seu conhecimento de gastronomia, entrega bebidas e comidas adequadas."
348600508 = "Esta é a nova gastronomia"
1226749390 = "O professor vai com Haruna a um estande de gastronomia molecular. Embora surpreso com a textura inovadora, parece que a gastronomia molecular não é muito popular. Com a sugestão de Haruna de oferecer algodão-doce, uma iguaria molecular popular e fácil de entender, o estande de gastronomia molecular se torna rapidamente uma barraca popular."
4164938916 = "O caminho da gastronomia está em toda parte"
616408418 = "Haruna está entusiasmada para participar de várias competições. Quando chega a hora, descobre que são apenas competições com o tema de comida ou onde a comida é dada como prêmio de participação. Enquanto se dedica às competições, Haruna, que avalia o sabor da comida oferecida, ganha brilhantemente o primeiro lugar na corrida de comer doces."
407871367 = "Borboletas de asas unidas"
1501629589 = "Quando Haruna pergunta ao professor sobre a \"diferença de sempre\", o professor treme sob pressão. Quando ele finalmente percebe que o enfeite de cabelo está diferente, Haruna fica feliz, embora um pouco abalada pela perspicácia do professor. Um pouco surpresa com a insensibilidade dele por não notar coisas mais importantes, ela escolta o professor e, de braços dados, eles percorrem o local."
393076 = "Moderação é o melhor em tudo"
1711403022 = "Ichika foi designada para ajudar o professor, que tem assuntos a tratar em Trinity. No caminho, os dois presenciam uma discussão. À pergunta do professor sobre se não deveriam intervir, Ichika diz: \"Não é um problema tão grande, então está tudo bem\", e sai do local após entrar em contato com outros membros. Depois de terminar seus assuntos, o professor acompanha Ichika, que vai mediar a discussão que viram no caminho."
517994058 = "Não é nada demais"
3421689892 = "O professor testemunha Ichika olhando para uma guitarra em uma loja de instrumentos em um shopping center. Segundo ela, ela viu alguém tocando na rua e sentiu vontade de tentar também. Para Ichika, que tenta desistir dizendo que só está procurando algo em que possa se dedicar, não apenas guitarra, o professor diz que quer ouvir a performance dela."
2193199583 = "Você pode me prometer?"
1203125809 = "O professor testemunha Ichika parada na frente de uma grande quantidade de caixas de papelão. Ichika diz que, como ela tenta várias coisas para encontrar algo em que se dedicar e desiste logo em seguida, ela está se livrando de itens desnecessários em um aplicativo de brechó. Enquanto afirma esse lado de Ichika, o professor a leva até a agência."
4264961292 = "Por enquanto"
679592225 = "O professor, que chegou ao local de encontro com Ichika, vê Ichika subindo em uma árvore para ajudar uma criança que prendeu um balão nela. Ele elogia Ichika por ser capaz de agir naturalmente em prol dos outros, mas ela confessa que, para ela, isso é natural e que sua preocupação é não conseguir se dedicar a uma única coisa. Para ela, ele diz que não é preciso forçar a busca e que também é importante aproveitar as coisas livremente."
502045279 = "Kasumi Kinugawa"
950569097 = "O professor, que visitou o esconderijo de Kasumi, descobre que ela está planejando a próxima explosão. O professor a induz a escolher um local com o mínimo de pessoas possível... e o próximo ponto de explosão acaba sendo um terreno baldio na montanha."
1233217562 = "Eu gosto de trabalhos de demolição"
1087254379 = "O professor visita o canteiro de obras após receber um contato de Kasumi. Kasumi diz que não importa se o trabalho será bem-sucedido ou não, ela apenas acha a explosão divertida. E, rindo, ela diz que também está de olho no Schale como um ponto de explosão, então ele deve levar a sério a seleção dos pontos. Assim, os dois continuam discutindo o próximo ponto de explosão a noite toda."
3742902787 = "Uma aparência intelectual"
2660660211 = "O professor convidou Kasumi para o Schale. Kasumi trouxe vários livros sobre engenharia civil, geologia e arquitetura e começou a estudar... Para Kasumi, ele diz: \"Se quiser, venha sempre que puder\", e os dois passam o tempo conversando."
973472567 = "Pedido de resgate das profundezas da montanha"
873006730 = "O professor, que recebeu um pedido de resgate de Kasumi, dirige-se à montanha. Ela diz que, enquanto procurava um ponto de explosão, escorregou e sua sandália quebrou. Para Kasumi, o professor não entrega a sandália, mas carrega Kasumi, que se machucou, nas costas montanha abaixo."
660551613 = "Luxuosamente"
3056310614 = "O professor, que visitou Red Winter, decide entrar no banho especial que Shigure reformou. No entanto, com o passar do tempo, ele sente uma sensação de calor na pele e pergunta se ela colocou algo na água termal. Shigure, feliz, conta ao professor o segredo do banho especial."
3965412169 = "Às vezes, seriamente"
3457735752 = "Shigure, que visitou o banho público com o professor, é solicitada pelo dono do estabelecimento a ensinar a receita do leite com frutas que era servido no resort de águas termais 227. Em vez de ensinar a receita, Shigure negocia para que os alunos da antiga escola possam usar o banho público."
3617991952 = "Calorosamente"
1568896138 = "Shigure decide fazer bebidas para oferecer aos clientes que visitam o banho público. O professor estava observando Shigure, mas... nesse meio tempo, ele perde o último trem. Sem poder voltar para casa, o professor acaba passando a noite na pousada com Shigure."
4190060998 = "De repente"
1068432655 = "O professor estava mergulhado na água termal que Shigure preparou recentemente. Naquele momento, o professor sente algo estranho na sombra de uma pessoa que parece ser Shigure, que entrou logo depois..."
3198653942 = "Bzz bzz"
3736796703 = "Mikoto Misaka reclama que não consegue usar bem suas habilidades desde que veio para Kivotos. Para ela, o professor aconselha: \"Talvez você consiga fazer coisas que não conseguia antes porque tem a habilidade\". Assim, Mikoto Misaka decide tentar se aproximar de um gato de rua, do qual ela não conseguia chegar perto por causa das ondas eletromagnéticas."
3828858953 = "Aura natural"
4050729238 = "Mikoto Misaka, que estava com problemas por estar cercada por delinquentes, pede ajuda ao professor. Segundo ela, ela está com problemas porque a chamam de \"Onee-sama\" sem permissão. O professor avisa os delinquentes para não a seguirem de forma tão persistente."
735396316 = "Pessoas parecidas"
2449311845 = "Mikoto Misaka estava inclinando a cabeça diante do bicho de pelúcia do Peroro. Quando ele diz que, por causa do visual muito peculiar, a popularidade é dividida, ela concorda, pensando se é algo como o Gekota que ela gostava em seu mundo original, e ri, dizendo que, por outro lado, começou a achá-lo um pouco fofo. Assim, o professor presenteia ela com o bicho de pelúcia do Peroro."
3584522966 = "Máquina de venda automática"
4025701392 = "O professor, que viu Mikoto Misaka chutando uma máquina de venda automática, avisa que não é bom danificar bens públicos. Segundo ela, no seu mundo original, a máquina de venda automática frequentemente engolia seu dinheiro, então ela a chutava assim. Quando isso acontece, o professor entra em contato com o número afixado na máquina, pede o conserto e entrega o dinheiro e o suco para ela."
718444544 = "Controle psicológico"
1123173044 = "O professor viu Shokuhou bebendo suco em um café. Quando Shokuhou diz que hoje é um dia de sorte e ele responde que sente o mesmo, Shokuhou ri, dizendo que quer \"confirmar\" com sua habilidade se ele realmente pensa assim. Vendo o professor dizer que, na verdade, quer ser controlado pela habilidade dela, Shokuhou dá um sorriso amargo."
1711116450 = "Especialista em trabalho intelectual"
716760121 = "O professor, que chamou Shokuhou para o campo de esportes porque ela disse que não conseguia se concentrar muito bem, sugere fazer uma corrida para mudar de ares. Durante o exercício, ele leva Shokuhou, que desmaiou, às pressas para o hospital."
3008897746 = "Atenciosidade"
3840979936 = "Shokuhou, que caminhava pelo centro comercial, testemunha um grupo de clientes importunando um funcionário de meio período. O Sensei tenta intervir, mas Shokuhou aperta o botão do controle remoto que trazia consigo, resolvendo a situação."
1142774852 = "Exigência culinária"
2658033607 = "Shokuhou revela que só consome comida orgânica e que é tão exigente a ponto de ler a mente dos chefs. O Sensei, então, a leva a um restaurante aprovado pelos maiores gourmets de Kivotos."
3833015538 = "Eu sou a lenda urbana"
2064820506 = "Saten fica impressionada com as ruas de Kivotos, que parecem ter saído de uma lenda urbana. O Sensei comenta que, para os habitantes de Kivotos, a própria Saten parece uma lenda urbana. Ela fica chocada ao ouvir isso, mas, em vez de se abalar, decide com entusiasmo que vai procurar pelas lendas urbanas de Kivotos."
752863816 = "Ponto em comum inesperado"
3683657408 = "Ao ver os habitantes de Kivotos jogando mahjong, Saten fica surpresa com o fato de que, apesar de ser um mundo diferente, o jogo existe e as regras são exatamente as mesmas. Assim, ela se junta aos moradores que precisavam de um jogador e se diverte jogando mahjong."
3697516015 = "Talento para o beisebol"
4003979523 = "Saten vai ao centro de rebatidas e encontra uma cabine com um aviso suspeito em um canto, decidindo entrar nela. Diante da preocupação do Sensei, Saten propõe que, se ela não conseguir rebater em 3 tentativas, ela sai da cabine, mas se conseguir, ele deve lhe pagar uma bebida."
900027051 = "O talento do esforço"
123698568 = "Saten, que estava praticando tiro, confessa que estava testando para ver se talvez tivesse talento para isso. Ela diz que, em seu mundo original, também tentou várias coisas para descobrir seus talentos. Ao ouvir isso, o Sensei a encoraja, dizendo que a capacidade de se esforçar é algo incrível."
3866139307 = "É a minha primeira vez!"
1895217624 = "O Sensei leva Yukari, que não conseguia entender bem o significado da expressão 'dar uma pausa', a um fliperama. Yukari aproveita os vários jogos que experimenta pela primeira vez com um sorriso radiante no rosto."
3444356400 = "O sabor do doce é excelente!"
946448440 = "O Sensei leva Yukari, que quase não conhecia doces salgados, a uma loja de doces tradicionais. Yukari fica surpresa e encantada com o sabor dos doces e com a diversidade cultural da loja."
1592716139 = "Descansar também é importante!"
3393753597 = "Yukari visita o escritório do Schale para sair com o Sensei. No entanto, começa a chover e o passeio é cancelado. Diante do Sensei, que se sente culpado, Yukari sorri e diz que o tempo que passa com ele é um tesouro."
3227087653 = "Esperando ansiosamente, aproveitando"
3133093112 = "O Sensei vai com Yukari a um sorteio no centro comercial. Ao chegar ao ponto de encontro, descobre que ela estava esperando há uma hora. Quando ele pergunta por que chegou tão cedo, Yukari ri timidamente, dizendo que ficou pensando no que ele a ensinaria e em como seria o dia, e que não conseguiu se conter e acabou chegando cedo."
1618618962 = "Mestre da juventude"
2730442199 = "A pedido de Renge, o Sensei visita a Hyakkiyako. Renge diz ao Sensei que quer realizar \"atividades de juventude\" e pede conselhos sobre o que fazer. Após conversarem bastante, o Sensei se torna o \"mestre de juventude\" de Renge."
2356886607 = "Clássico da juventude: O aluno transferido"
3406357501 = "Renge decide fazer um evento de aluno transferido com o Sensei como parte de suas \"atividades de juventude\". No entanto, as coisas não saem como planejado... No momento em que Renge começa a desanimar, o Sensei pede que ela lhe apresente o local, como se ele fosse o aluno transferido."
1544493195 = "Clássico da juventude: Amigos de infância"
3623899194 = "Certa manhã, Renge surpreende o Sensei. Ela diz que quer fazer um evento de amigos de infância como parte de suas \"atividades de juventude\". Após o evento, quando ela estava prestes a encerrar a atividade satisfeita, o Sensei comenta que o dia pareceu um encontro, deixando Renge em pânico."
3348684246 = "Com gratidão pela juventude"
1912112273 = "O Sensei, que estava processando trabalho acumulado a ponto de esquecer de comer, acaba sendo arrastado para as \"atividades de juventude\" de Renge. Por fim, o Sensei desmaia de exaustão. Arrependida, Renge prepara uma marmita caseira para o Sensei, que se esforçou tanto por ela."
645991912 = "A fita branca da juventude"
1111293954 = "Renge fica perturbada ao receber de presente uma fita branca, igual à que a protagonista de um romance de juventude usava, e sai apressada. Na verdade, no romance, essa fita é um presente que a protagonista recebe de seu amante. Ao descobrir isso, o Sensei sugere a atividade de juventude de colocar a fita nela, e Renge, embora envergonhada, aceita."
4231253403 = "O gato guardião da sala de mediação"
3314480634 = "O Sensei, chamado por Kikyou, visita a Hyakkiyako e percebe que o prédio está velho. Kikyou diz que não há com o que se preocupar, mas o Sensei insiste em consertar por ser perigoso e começa a fazer reparos com ferramentas — vendo isso, Kikyou, que inicialmente disse que não ajudaria, acaba dando uma mão. Depois, Kikyou convida o Sensei para jantar como agradecimento."
2471480039 = "A importância do descanso"
3763484608 = "Kikyou visita o Schale para agradecer ao Sensei por ter consertado o prédio da Hyakkiyako anteriormente. Diante da promessa de Kikyou de fazer qualquer coisa para retribuir o favor, o Sensei diz que ela também precisa descansar. Kikyou fica confusa, mas, para cumprir sua promessa de fazer qualquer coisa, decide tirar um descanso."
3365191938 = "Sentimentos que eu queria esconder"
4099866023 = "O Sensei vai à Hyakkiyako a trabalho e recebe presentes de moradores que foram salvos por Kikyou, decidindo levá-los até ela. Lá, ele encontra Kikyou desmaiada. Ela diz que não queria que ninguém a visse em um estado de fraqueza, mas o Sensei diz que descansar também é importante e cuida dela enquanto lhe entrega os presentes dos moradores."
375291297 = "Abrindo o coração"
810913540 = "Após receber uma mensagem de Kikyou querendo agradecer pelo outro dia, o Sensei chega ao depósito da Hyakkiyako. Ao entrar, Kikyou o recebe."
2188741523 = "Capítulo de treinamento de moda"
2709052074 = "Eimi visita o Schale dizendo que quer fazer um treinamento de moda. O Sensei, ao confirmar o senso de moda um tanto peculiar de Eimi, decide ir com ela escolher um traje de banho."
3737979995 = "Capítulo de prática de moda"
2681531124 = "No dia de escolher o traje de banho com Eimi, o Sensei descobre que o motivo dela querer usar um é para entrar no mar gelado. O Sensei prepara itens de proteção contra o frio para ela... e Eimi acaba criando um visual inovador: uma jaqueta sobre o traje de banho."
3806087283 = "Preparação da operação"
4246151599 = "Quando o Sensei visita o Departamento de Investigação de Fenômenos Especiais, Eimi está usando uma jaqueta sobre o traje de banho e construindo um ventilador próprio."
2234223693 = "Banho de água gelada"
3146169999 = "Após receber uma mensagem de Eimi, o Sensei, preocupado, visita o mar gelado. O que ele testemunha é Eimi se divertindo em um banho de água gelada após abrir um buraco no gelo."
228855696 = "A distância da montanha"
2565918406 = "Na trilha, o Sensei encontra Kotama, que carrega um gravador. Ela diz que veio gravar sons que só podem ser ouvidos ali, e o Sensei sugere que, se subirem a montanha, talvez consigam gravar sons mais naturais, então decidem subir juntos. Kotama se cansa durante a subida e o Sensei lhe estende a mão. No momento em que suas mãos se tocam, Kotama se lembra do que disse anteriormente e seu rosto fica vermelho."
3369167674 = "Sons da natureza (1)"
2380232793 = "O Sensei visita a montanha novamente para uma caminhada e reencontra Kotama com seu gravador. Ela diz que veio gravar o som de uma fogueira e estava lutando para acender o fogo. No entanto, todas as tentativas falham e Kotama pede ajuda ao Sensei."
3281512578 = "Sons da Natureza (2)"
2625303492 = "Refletindo sobre seus fracassos anteriores e quebrando a cabeça, Kotama decide que desta vez gravará sons da natureza de forma comum, e os dois sobem a montanha novamente. Ao encontrar uma árvore antiga e grande, Kotama aguça os ouvidos para ouvir os sons que vêm de dentro dela."
2980225488 = "Eco"
1001482326 = "Kotama busca o topo da montanha junto com o Sensei. Ao chegarem ao cume, o Sensei solta um grito em direção à montanha oposta. Ouvindo o eco de sua própria voz, Kotama ri, dizendo que ecos não são tão ruins assim."
2146835391 = "Nômade Digital"
886315080 = "Após receber uma mensagem de Hare, o Sensei visita um parque nos arredores. Lá, Hare montou vários equipamentos para trabalhar ao ar livre como uma nômade digital. Mesmo com toda a preparação, Hare começa a sentir o desconforto da situação."
3941496298 = "Glamping"
1758508230 = "O Sensei visita a sala do Veritas a trabalho. Por algum motivo, a sala está gelada, mas o ar-condicionado continua ligado. Hare explica que está deixando o ar forte para testar os servidores. Para evitar o vento do ar-condicionado, ela começa um 'glamping' preguiçoso dentro de um saco de dormir de acampamento."
3942846821 = "O maior servidor do mundo"
2015698466 = "Durante a manutenção, Hare recebe um desafio anônimo de um hacker. Ao saber que as coordenadas enviadas apontam para o 'maior servidor do mundo', Hare e o Sensei começam a subir a montanha. Ao chegar ao destino, Hare percebe que é um observatório desativado e, enquanto observa as estrelas, envia uma saudação gentil ao céu."
3682214390 = "Descafeinado"
1655277294 = "Para cortar a cafeína, Hare decide trabalhar ao ar livre, longe de lojas de conveniência e geladeiras. No entanto, logo os sintomas de abstinência aparecem, e o Sensei prepara e entrega um café diretamente para ela. Após beber e se sentir melhor, Hare descobre que o café era, na verdade, descafeinado."
850398333 = "O grande presidente do Pandemonium!"
3031741265 = "Convidado por Makoto, o Sensei visita o Pandemonium. Makoto propõe que o Sensei se alie ao Pandemonium, mas o Sensei recusa a proposta."
4070412729 = "Os negócios do grande presidente"
1791984264 = "Afirmando que mostrará a verdadeira essência do Pandemonium, Makoto visita o Schale. O Sensei é levado por Makoto para visitar empresas sob a tutela do Pandemonium, como gráficas e resorts. Um pequeno problema ocorre no centro comercial, mas Makoto resolve a situação com maestria, mostrando sua postura de presidente."
3478178877 = "O feriado do grande presidente"
4007523766 = "O Sensei encontra Makoto em um shopping, preocupada em escolher a ração para o Lion-maru. Naquele momento, Makoto desmaia subitamente e é levada ao hospital, onde é diagnosticada com alergia a gatos. Mesmo assim, Makoto declara que cuidará do Lion-maru até o fim."
1780717963 = "O cotidiano do grande presidente"
1041879085 = "Makoto diz que mostrará os resultados dos negócios realizados pelo Pandemonium até agora. No entanto, problemas ocorrem em todas as unidades, causando prejuízos enormes. Makoto fica abalada com o impacto por um tempo, mas não se deixa vencer pela adversidade e resolve os problemas um por um."
1474073232 = "De qualquer forma, não posso perder!"
3557545465 = "Após receber um contato de Ako, o Sensei a visita e acaba ouvindo suas reclamações sobre o Pandemonium. Ako diz que não pode ficar por baixo e escolhe vestidos com o Sensei. No entanto, ao ver o vestido recomendado pelo Sensei, Ako fica confusa e, dizendo que o Sensei está perturbando a disciplina, levanta-se apressada."
3679592377 = "De qualquer forma, vou devolver!"
2522776615 = "Enquanto olham vestidos, Ako fica envergonhada com os elogios sinceros do Sensei sobre sua aparência. Naquele momento, Ako recebe um aviso de que o Pandemonium está causando confusão e corre para o local, deixando o Sensei encarregado de escolher o vestido. Mas o Sensei acaba comprando também uma roupa íntima recomendada pelo atendente..."
2124286988 = "De qualquer forma, eu estava ocupada!"
2646682580 = "Para a preparação de uma festa que ocorrerá em breve, Ako e o Sensei participam de uma recepção. O Sensei escolta Ako, que não está acostumada a usar vestido, mas o vestido acaba rasgando..."
2761186677 = "Vamos brincar com a Ibuki!"
2632442291 = "Ibuki visita o Schale para seu turno de serviço. Ela tenta ajudar o Sensei com o trabalho, mas acaba se distraindo com jogos e brinquedos. O Sensei decide, então, brincar com ela."
1254725189 = "Um piquenique divertido com a Ibuki!"
3516138625 = "Ibuki e o Sensei combinaram de ir ao parque de diversões. Ela esperava ansiosamente pelo dia enquanto preparava o almoço, mas acaba chovendo. Para não deixar Ibuki triste, o Sensei diz que o Schale é o parque de diversões e passa um dia divertido com ela."
2360081099 = "Experiência profissional com a Ibuki!"
685531614 = "Ibuki recebeu um 'formulário de pesquisa de carreira' na escola. Como ela não sabe que tipo de trabalho poderá fazer quando crescer, o Sensei a leva para vários lugares para que ela tenha experiências profissionais."
2071765566 = "Estudando com a Ibuki!"
2159313193 = "Após experimentar várias profissões, Ibuki diz que pensou sobre o que mais gosta de fazer. Ela escolheu ser 'professora'. Ibuki convida o Sensei para uma pequena sala de aula que ela mesma montou e começa uma divertida aula de matemática."
2194837532 = "Hina e o vestido (1)"
58131079 = "Hina participará de uma festa social em Gehenna. Ela pede conselhos ao Sensei sobre o que é necessário para a festa. Primeiro, eles decidem procurar no depósito por roupas adequadas. Lá, Hina encontra um vestido que usava quando criança, mas ele rasga por não servir mais. Depois disso, os dois prometem ir escolher um vestido juntos."
324299341 = "Hina e o vestido (2)"
2948041859 = "No dia marcado para escolher o vestido com Hina, ela não consegue chegar a tempo devido ao trabalho no Comitê Disciplinar e pede ao Sensei que escolha o vestido em seu lugar."
1999678653 = "Hina e o piano"
1434829550 = "O Sensei aceita um convite de Hina. Em um espaço apenas para os dois, Hina começa a tocar para o Sensei."
2011469792 = "Um momento de silêncio"
803201985 = "Após receber uma mensagem de Kayoko, o Sensei chega a um beco estreito perto da casa de ópera. Lá, o Sensei e Kayoko conversam."
1182512530 = "Código de vestimenta"
2124358865 = "Kayoko recebe o Sensei ao chegar ao escritório da Problem Solver. O Sensei nota um vestido deixado em um canto do escritório. Após uma breve conversa, o Sensei sugere que eles jantem juntos."
1671331120 = "Teimosia de criança"
2297857782 = "O Sensei visita o escritório da Problem Solver e encontra Kayoko vestida com um vestido. Querendo retribuir o favor anterior, Kayoko diz algo ao Sensei, que tenta recusar."
2029319155 = "Um vestido sem uso"
3430969351 = "Preocupado com Aru, que falava de forma vaga no Momotalk, o Sensei vai até o escritório da Problem Solver. Aru pede conselhos ao Sensei sobre o que fazer com o vestido que a preocupava há tanto tempo."
3483710198 = "Acho que nos aproximamos um pouco"
2862818090 = "O Sensei chega à apresentação de negócios a pedido de Aru. No entanto, o conteúdo da apresentação é desconexo e Aru fica deprimida. Para consolá-la, o Sensei a leva a um lugar especial."
3809174998 = "Não há duas sem três"
3868290257 = "Aru não aparece mesmo após o horário combinado. Quando o Sensei, preocupado, vai procurá-la, ouve a voz dela em apuros. Tendo sido salva pelo Sensei mais uma vez, ela expressa sua profunda gratidão."
761424835 = "Para um propósito"
2024730199 = "Akari tenta participar do concurso de comilões de Ano Novo. No entanto, o comitê organizador do evento demonstra resistência, dizendo: 'É um problema que alguém que já venceu tantas vezes participe novamente'. Então, o Sensei sugere que o concurso seja realizado no formato de Akari contra todos os outros participantes. Mesmo assim, Akari defende bravamente seu título de campeã de comilões."
882945439 = "Para realizar um desejo"
3977936515 = "Como faltaram bolinhos de arroz para o preparo do Ozoni, Akari decide participar de um torneio de mochi para fazer os bolinhos ela mesma."
1458542543 = "Para dar as boas-vindas à sorte"
2394074920 = "O Sensei e Akari saem em um tour de udon para comer o 'udon da virada'. Ao descobrir que ganharia um certificado se conquistasse as lojas famosas da região, Akari acaba devorando udon de vários estabelecimentos renomados."
1588234287 = "Festivais são maravilhosos! Muito, muito mesmo!"
496070893 = "Umika, que convidou o Sensei para o festival de Hyakkiyako, guia o Sensei enquanto passeiam por vários pontos do local."
336809221 = "Lembrando das memórias do festival"
1264327924 = "O Sensei visita a Hyakkiyado e passa uma tarde tranquila com Umika. Lá, Umika decide desabafar sobre uma preocupação que carregava há muito tempo."
63381328 = "Não perdoarei quem atrapalhar o festival!"
799850412 = "O Sensei visita a Hyakkiyado após receber um contato de Umika. Lá, Umika estava confusa com alguns clientes travessos. Seguindo o conselho do Sensei, Umika entra em ação para oferecer uma 'hospitalidade' sincera."
1822406799 = "Um festival para você"
3628022907 = "Umika recebe o Sensei calorosamente ao visitar a Hyakkiyado. Ela havia preparado um festival especial apenas para o Sensei."
2198939886 = "Um único mundo"
3468668910 = "Umika visita o Schale e explica entusiasticamente ao Sensei que o festival é um 'mundo' especial, separado do cotidiano. Durante a conversa, ela apresenta um par de bonecos antigos que comprou em seu primeiro festival. Depois que Umika vai embora, o Sensei encontra a outra metade do par de bonecos deixada sobre a mesa."
3045026029 = "Mais um treinamento (??)"
4119105229 = "O Sensei visita Hyakkiyako após receber um contato de Tsubaki e acaba recebendo um guia peculiar por lá."
418161561 = "Curso intensivo"
1812128083 = "Tsubaki visita o Schale dizendo que vai dar um guia de sono para o Sensei. Nesse meio tempo, certas alunas aparecem após ouvirem o boato de que a 'Bela Adormecida de Hyakkiyako' está no Schale. Elas dizem que sofrem de insônia e não conseguem dormir. Tsubaki decide guiar essas alunas sobre como dormir."
2010941900 = "Bom sono, bons sonhos"
1529221547 = "No meio da noite, o Sensei entra em contato com Tsubaki após terminar seu trabalho em Hyakkiyako. Tsubaki começa um tour guiado apenas para o Sensei, e o Sensei, exausto, cai no sono."
4052115729 = "Prática vocal"
2194871063 = "O Sensei é levado para acompanhar a prática vocal de Kazusa em um karaokê próximo."
2034375151 = "Clube de música pós-escola"
3425425496 = "Kazusa, que visitou o Sensei, divide com ele um doce que não conseguiu comer durante o treino."
3700069782 = "É minha responsabilidade"
3288920718 = "O Sensei e Kazusa fazem um tour de doces seguindo a rota ideal planejada por Kazusa. Eles visitam várias lojas, mas na última, Kazusa é confundida com uma musicista. Sem pensar, Kazusa acaba apresentando o Sensei como seu 'empresário exclusivo'."
1489758999 = "Timbre caloroso"
3457523314 = "O Sensei leva Kazusa a uma sala de áudio, já que ela disse que queria ouvir um disco de vinil. O que Kazusa tirou foi um disco único, feito como uma lembrança. Enquanto ouviam a performance de Sugar Rush e conversavam animadamente, a música mudou e a voz do Sensei começou a tocar. Era de quando os dois foram ao karaokê juntos. Para Kazusa, era uma lembrança preciosa que ela queria guardar."
1720743063 = "Sugar High"
4202174343 = "O Sensei vai até a cidade após receber um convite de Airi. Ele visita um café com Airi, que está de melhor humor que o habitual. No entanto, a fila estava mais longa do que o esperado, e Airi fica em dúvida sobre o que fazer. Os dois acabam passando o tempo de espera conversando."
2100881557 = "Sugar Rush"
3689167069 = "Airi decide pedir para o Sensei observar seu treino. Mas, no caminho de volta, os dois são pegos por uma chuva torrencial. Airi sugere que corram juntos cobrindo-se com sua jaqueta."
3093181537 = "Sugar Crash"
113729469 = "Com o fim das atividades da banda, o Sensei ouve as preocupações de Airi, que está com sentimentos conflitantes."
3799374904 = "Senso estético"
316334877 = "Yoshimi diz que está preocupada em deixar a escolha dos figurinos para os membros de personalidade forte do clube. Ela decide escolher os figurinos pedindo conselhos ao Sensei. No fim, o Sensei acaba carregando as roupas escolhidas até a sala do clube."
2596685212 = "Conselho (??)"
1913792740 = "O Sensei vai a um café para ouvir as preocupações de Yoshimi. Yoshimi, que estava preocupada com o design de seu autógrafo, após divagar em várias fantasias, tenta pagar a conta, mas acaba escrevendo o autógrafo no recibo por engano. O Sensei provoca Yoshimi, que fica envergonhada."
3164217481 = "Toque para você"
2214771348 = "O Sensei chega ao local combinado após receber um contato de Yoshimi. Yoshimi diz que praticou uma música para o Sensei. Embora tenha controlado a respiração, Yoshimi fica nervosa. No fim, ela começa a tocar sentada no chão. O Sensei, impressionado, a provoca gritando por um bis. Yoshimi, mesmo envergonhada, toca todas as músicas que havia preparado."
3782277926 = "O clube de Kirara"
1447560689 = "O Sensei, que viu Kirara enquanto voltava de um compromisso em Gehenna, fica surpreso ao vê-la conversando alegremente com amigos e decide perguntar sobre o clube dela."
3408135695 = "Kirara, a insistente"
1107638503 = "Kirara, que tirou nota vermelha na prova, pede ao Sensei para ajudá-la a estudar. Para ajudar Kirara, que está com uma cara desanimada, o Sensei decide dar aulas particulares."
3959270548 = "Aulas particulares a sós"
2956308925 = "O Sensei visita a Academia Gehenna após receber um contato de Kirara. Os dois começam a estudar em uma sala de aula silenciosa. Depois, o Sensei sugere uma pausa para Kirara, que estava concentrada nos estudos, mas Kirara quer continuar estudando..."
235996998 = "Kirara on the street"
1817181974 = "Kirara diz que quer agradecer ao Sensei pelas aulas particulares, então os dois saem para caminhar por aí. Eles acabam passando um tempo muito divertido juntos."
11208201 = "Uma prova de que me esforcei?"
2323993205 = "Kirara perdeu seu caderno de argolas e estava revirando o depósito de papel velho em pânico. Segundo ela, o caderno estava fora do lugar durante a limpeza do quarto e acabou sendo recolhido por engano. O Sensei encontra o caderno, que estava decorado com capricho e continha as memórias preciosas de Kirara. Quando o Sensei aponta para um retrato desenhado em uma página que chamou sua atenção, Kirara pega o caderno e sai correndo."
296399585 = "Clima de empregada!"
3524968918 = "Momoi diz que, já que está vestindo um uniforme de empregada, vai aproveitar para limpar o Schale. Mas, como esperado, ao chegar no Schale, ela acaba ficando jogada no sofá. O Sensei acorda Momoi e os dois limpam o Schale juntos."
487322513 = "Culinária de empregada!"
74482891 = "Momoi diz que, já que está vestindo um uniforme de empregada, vai preparar algo para comer. Desta vez, ela tenta usar produtos comprados na loja de conveniência para recriar um prato que apareceu em um jogo. No entanto, ela acaba comprando coisas demais e tem dificuldades na hora de limpar a bagunça."
4200373453 = "Descanso de empregada!"
2287657410 = "Mais uma vez, Momoi diz que, por estar de uniforme, precisa fazer um trabalho digno de uma empregada, e o que ela tenta fazer desta vez é descansar. Para ter um descanso eficaz, ela pegou equipamentos de vários clubes da Millennium. Porém, os equipamentos funcionam mal e o Sensei e Momoi acabam ficando com dores musculares."
2123764785 = "Vou ser sua empregada, Sensei!"
1478421162 = "O Sensei visita a sala do Clube de Desenvolvimento de Jogos e encontra Midori vestida de empregada. Midori está pensando no design de personagem para um jogo onde a protagonista é uma empregada e quer que ela seja uma empregada ortodoxa. Pensando que a forma de se chamar é importante, Midori decide chamar o Sensei de 'Mestre'."
1578203463 = "Hora de sair, Sensei!"
613352308 = "O Sensei acompanha Midori a uma exposição de arte têxtil. Empolgada, Midori prepara várias roupas clássicas para o Sensei, mas ele a acalma. No fim das contas, os dois aproveitam a exposição ao máximo."
4234835853 = "Lembre-se disso, Sensei!"
1167253886 = "Midori percebe que, embora devesse estar usando o uniforme de empregada para o design de personagem do jogo, ela passou o tempo todo apenas brincando com o Sensei. Então, Midori decide realizar um trabalho digno de uma empregada no Schale. Por fim, ela pede ao Sensei que tire uma foto dela vestida assim."
3911733272 = "Férias perfeitas"
1858906170 = "Serika procura por vários lugares para garantir que essas férias no resort sejam as melhores possíveis. Embora não tenha encontrado nada de especial, ela começa a perceber que esse processo é, por si só, o que torna as férias perfeitas."
2428709807 = "Princesa no barco"
1684051936 = "Serika encontra um banana boat abandonado no depósito e tenta testá-lo com o Sensei para ver se ainda funciona."
1798149545 = "Memórias incontáveis"
773578818 = "De volta a Abydos, Serika estava limpando a sala do clube com o Sensei quando encontrou um traje de banho. Ao mergulhar nas lembranças e exibir um rosto um pouco solitário, o Sensei faz uma proposta a ela."
1569262550 = "Escolhendo o traje de banho"
3132777354 = "Kanna, que foi designada como salva-vidas, decide escolher seu traje de banho junto com o Sensei."
321959446 = "Teste de funcionamento"
1320900751 = "Para inspecionar um toboágua que comporta várias pessoas, Kanna convida o Sensei para irem juntos, mas..."
1944847401 = "Privilégio de salva-vidas"
3375768959 = "Dia de folga no parque aquático. Kanna, que assumiu a tarefa de limpar e organizar o 'Healing Spa', aproveita um breve momento de descanso com o Sensei."
728682739 = "História Policial: Edição Praça de Alimentação"
2691646951 = "Fubuki chama o Sensei de 'Inspetor' e quer patrulhar a praça de alimentação. Parece que o verdadeiro objetivo dela era a loja de donuts que fica lá."
2300515944 = "História Policial: Edição Piscina de Correnteza"
1597168577 = "Ao receber a missão de patrulhar o parque aquático, Fubuki, por algum motivo, exibe um rosto muito animado."
1031326801 = "História Policial: Edição Paraíso Perdido"
1211536315 = "Ao encontrar um espaço onde ninguém a incomoda, Fubuki elabora um plano grandioso para vadiar, mas..."
3039528055 = "Treinamento de salvamento"
3169271538 = "Kirino, que recebeu a missão de salva-vidas, vai com o Sensei até a piscina de treinamento da Academia de Polícia Valkyrie para realizar um treinamento de salvamento."
4241689255 = "Ressuscitação cardiopulmonar"
3041462882 = "Desta vez, Kirino treina ressuscitação cardiopulmonar. No entanto, ela esqueceu o boneco de treino e o Sensei acaba servindo de material didático, mas..."
2625703360 = "Prática de socorro geral"
2642714145 = "Kirino faz a inspeção final após terminar o treinamento. Apesar de ter se esforçado, o resultado não parece ter sido dos melhores. O Sensei, que observava a cena, acaba perdendo o equilíbrio e caindo na água, mas..."
4005278696 = "Explosive hazards"
770948941 = "À beira-mar, o Sensei e Moe conversam sobre várias coisas. Nesse meio tempo, Moe menciona que seu traje de banho também esconde 'algo destrutivo' e tenta revelar o que é. O Sensei entra em pânico e tenta impedi-la, mas..."
2726872600 = "Danger close"
3684290810 = "Ao receber uma mensagem dizendo que algo vai explodir, o Sensei corre para encontrar Moe. No entanto, o 'algo' que Moe mencionou eram apenas mariscos colocados sobre o carvão. Moe fica hipnotizada ao ver os ingredientes congelados estalando sobre o fogo."
1520173270 = "Logistics information"
1831576614 = "Os pescadores estão preocupados com a queda nas vendas de 'kusaya', uma especialidade da vila pesqueira. Moe decide desenvolver um aplicativo diretamente para ajudar esses pescadores. No momento em que o kusaya é registrado no aplicativo, os pedidos começam a chover de pessoas que adoram ingredientes únicos."
1947646090 = "Area beautification"
1090909669 = "Moe é guiada por um morador da vila até uma casa vazia. Ela decide reformar o local para os outros membros do esquadrão. Ao terminar o conserto e fazer uma pausa, os insetos começam a aparecer. Moe acende um espiral de incenso contra mosquitos e, sentindo o cheiro, mergulha em lembranças do passado."
717510768 = "Nasce um herói"
1205296410 = "Hoshino acaba ficando sobrecarregada com o trabalho burocrático. O Sensei a ajuda com as tarefas e, em troca, pede que ela use novamente aquele traje armado que ele viu antes. O Esquadrão Capacete aparece, mas Hoshino, em sua forma armada, os derrota facilmente, e o Sensei a chama de 'Herói de Abydos'."
2747864121 = "Herói, patrulha"
265807011 = "Hoshino e o Sensei patrulham o Distrito Autônomo de Abydos. Durante a ronda, eles ajudam os cidadãos e acabam passando a noite em um trem abandonado nos arredores da cidade."
1849506027 = "Herói, batalha decisiva"
1466126374 = "Seguindo os movimentos suspeitos do Grupo do Capacete, Hoshino e o Sensei os encontram em uma escola abandonada e os capturam de uma vez por todas."
218109715 = "Especialista"
1957182403 = "O Sensei visita Shiroko para ver pessoalmente como ela vive. No entanto, a vida de Shiroko era algo totalmente inesperado."
2455626068 = "O que mudou, o que permanece"
2766229661 = "Shiroko diz que este mundo e o outro mundo são sutilmente diferentes. Mas, mesmo assim, ela percebe que há coisas que não mudam."
789167182 = "Motoqueiro Mascarado"
4039489432 = "O 'Motoqueiro Mascarado' começou a aparecer em Abydos de repente. Sua identidade era Shiroko, que voltou a andar de bicicleta. Dizem que ela tem tido preocupações ultimamente."
1074029922 = "Trabalho de meio período na lanchonete"
2521063046 = "Saori trabalha em uma lanchonete à beira-mar. No entanto, ela acaba recebendo uma reclamação de um cliente..."
2149489111 = "Em busca do som do festival"
3190600684 = "Saori precisa fazer uma amostragem de som para o palco de DJ. Para encontrar sons que possam ser usados, ela explora vários locais do festival junto com o Sensei."
3891669579 = "Comemoração a sós"
63371907 = "Após o término do palco de DJ, o Sensei e Saori sentam-se no palco vazio para uma comemoração apenas entre os dois."
1028892596 = "Probabilidade de vitória"
885397784 = "Hiyori escreve um cartão de sorteio de revista para ganhar um traje de banho. No entanto, o período de inscrição do evento já havia terminado. O Sensei, por Hiyori, compra o traje e finge que ela ganhou no sorteio."
1411829040 = "Protetor solar?"
4042979183 = "Hiyori passa óleo de gergelim em vez de protetor solar e acaba se queimando. Após terminar o tratamento, o Sensei compra um picolé para acalmá-la, mas..."
23063759 = "Lembranças inesperadas"
1830453388 = "Hiyori tenta retribuir o Sensei por cuidar dela. O presente é um fogo de artifício especial, apenas para Hiyori e o Sensei."
2202535381 = "O que permanece mesmo sem forma"
269523938 = "Atsuko diz que quer tirar fotos de várias coisas com sua nova câmera digital. O Sensei decide caminhar pelo local do festival junto com ela."
2300375645 = "O que há além da fuga"
665744446 = "O Sensei e Atsuko encontram uma zona de fotos no festival e tiram algumas fotos. No entanto, eles encontram o Grupo do Capacete, que exige um valor exorbitante pelas fotos. Conseguindo escapar e se esconder, os dois percebem que, bem ali, havia flores desabrochando."
942189667 = "A última coisa fotografada"
1659279476 = "Atsuko diz que a bateria da câmera está acabando. Após hesitar sobre o que fotografar por último, o que Atsuko registra é..."
486009611 = "Se for descansar, relaxe a mente"
3128164768 = "Embora seja um feriado, Karin não sabe como descansar e pede conselhos ao Sensei sobre como usar seu tempo. Seguindo a sugestão do Sensei, os dois vão ao festival e aproveitam para comer de tudo enquanto passeiam pelas barracas."
2155174399 = "Se for descansar, que seja a dois"
933163258 = "Ainda sem saber como descansar, Karin visita o Schale. Ela segue a sugestão do Sensei de 'não fazer nada', mas o Sensei continua trabalhando. Vendo o Sensei ocupado, Karin se sente inquieta por não fazer nada e começa a ajudar com o trabalho. Após terminarem a tarefa juntos, os dois passam o tempo 'não fazendo nada' juntos."
1196121695 = "Se for descansar, que seja um feriado especial"
1780687568 = "Tendo pensado em sua própria maneira de passar o feriado, Karin convida o Sensei para 'ir à escola'. Junto com Karin, vestida com o uniforme, o Sensei caminha pelo trajeto escolar. O que era apenas um 'cotidiano' para Karin tornou-se um feriado 'especial' ao caminhar com o Sensei e compartilhar os segredos do caminho para a escola."
1297953155 = "Mentiras e verdades"
133657712 = "Marina desfruta das iguarias de Shanhaijing. O Sensei a ajuda quando ela é envolvida por piadas típicas da região."
1883169484 = "Beleza que ofusca a lua e as flores"
2438739727 = "Vestida com um qipao, Marina recebe uma proposta de um fotógrafo para uma sessão de fotos. Com o incentivo do Sensei, Marina decide participar."
3353300618 = "Cortando o nó górdio"
83669419 = "Enquanto as alunas de Shanhaijing discutem se o bolo lunar deve ser cortado em 4 ou 8 pedaços, Marina apresenta uma solução. No entanto, ela acaba sendo contestada sobre a forma de beber o chá."
3593618651 = "A arte de saber ouvir"
3790006563 = "Tomoe visita o Jardim das Ameixeiras e mostra uma habilidade surpreendente em cuidar de crianças. Ela diz que, na verdade, sempre gostou de conversar com crianças."
533034601 = "A chefe da secretaria do país frio"
3953618809 = "Para Tomoe, que veio de Red Winter, Shanhaijing parece ser quente. Ela passa um tempo com o Sensei enquanto se abana com um leque."
3599242579 = "Vida saudável todos os dias"
3462245568 = "O dono do restaurante está preocupado com um boato de que a comida chinesa não é saudável. Tomoe usa seu talento para agitação e consegue atrair clientes. Além disso, um pequeno boom de comida chinesa acaba surgindo em Kivotos."
2148141524 = "Rotina diária"
1009451031 = "O Sensei é chamado por Reijo, que diz ter algo para conversar, e vai até o parque de Shanhaijing. Lá, ele observa o treino matinal de kung fu dela e, depois, eles se divertem conversando sobre filmes de kung fu."
2050752819 = "Cuidando dos outros"
2040477035 = "Com a visita das crianças do Jardim das Ameixeiras se aproximando, Reijo está preocupada sobre como lidar com elas. Embora ela consiga resolver habilmente vários problemas que surgem na Associação Comercial Genbu, ela não sabe como interagir com crianças. No entanto, ao ver como o Sensei, que estava lá para comer, interage com as crianças, ela aprende alguns truques e consegue se tornar amiga dos pequenos."
3812995799 = "Ensinamentos do Kung Fu"
541090949 = "A Associação Genbu passa por uma auditoria sobre as condições sanitárias do Genryumon, com a presença do Sensei. Reijo quase explode de raiva com a arrogância do auditor, mas, graças aos conselhos do Sensei, ela se lembra dos \"Ensinamentos do Kung Fu\" e consegue resolver a situação pacificamente."
4240158672 = "Sujeito e Objeto"
1037046256 = "Reijo, que veio ao Schale para seu turno, acompanha o Sensei em seu trabalho externo. No caminho, ela pede ao Sensei que a proteja durante todo o dia. Embora acabem envolvidos em um combate contra delinquentes, ao ver a forma como o Sensei protege seus alunos, Reijo se sente segura e se aconchega nele, prometendo que ele a protegerá até que ela retorne a Shan海経."
687178835 = "Esconde-esconde no Palácio"
2331129627 = "Após receber um contato de Kisaki, o Sensei decide ajudar na sua fuga do Rokkaku. Ele consegue retirá-la em segurança, disfarçada como membro do Genryumon, da Associação Genbu ou como uma criança do Jardim Baika, mas tudo não passava de uma \"brincadeira de fuga\". Depois de passarem um momento divertido juntos, o Sensei acaba acompanhando Kisaki em seus deveres como líder do portão."
3457268771 = "O Sonho da Borboleta"
3801392505 = "Kisaki chega ao Schale para seu turno e, envolta pelo aroma relaxante do incenso medicinal que trouxe, começa a trabalhar com o Sensei. O Sensei se surpreende com a forma extrema como Kisaki resolve os problemas, mas o trabalho é concluído rapidamente. Quando tentam seguir para o próximo compromisso, o Sensei, exausto por noites sem dormir, acaba desmaiando de sono, e Kisaki decide lhe oferecer seu colo."
4083890821 = "O Pássaro na Gaiola Anseia pelas Nuvens"
2918134416 = "Kisaki visita o Schale. Após terminarem o trabalho, ela é convidada pelo Sensei para ir ao terraço. Enquanto observam a vista, Kisaki murmura para si mesma que \"gostaria de ir para lugares mais distantes\". O Sensei responde ao seu desejo, e os dois prometem ir ver as paisagens de vários lugares juntos."
4262508585 = "Sugerindo um Passeio"
355824304 = "Conforme a promessa anterior, Kisaki sai para visitar vários lugares com o Sensei. Eles aproveitam diversas instalações, como o metrô, parques de diversões e fliperamas, mas, ao final do dia, ela acaba passando mal. Levada a uma pousada próxima, Kisaki descansa enquanto recebe carinho na cabeça do confiável Sensei."
3494385232 = "Um Pedacinho"
516102790 = "O Sensei visita Marie para apoiá-la nos treinos para o concurso de ídolos. Como era hora do almoço, Marie sugere que comam juntos, mas o Sensei hesita por haver apenas uma marmita. Sentindo-se mal por comer sozinha, Marie, sob o pretexto de pedir um favor, oferece um pedaço de seu tamagoyaki ao Sensei."
2845702047 = "Guarda-costas da Marie"
982300326 = "Quando o Sensei visita Marie novamente, percebe que há uma aluna fantasiada protegendo-a. Ao perguntar, descobre que ela foi designada como uma espécie de guarda-costas de Marie. Ao revelar que é o Sensei do Schale, a aluna se convence e vai embora, deixando o resto com ele. No entanto, Marie parece ter perdido um pouco a confiança, achando que lhe colocaram uma supervisora por acharem que ela não é capaz."
1887944177 = "Após o Show"
2221601705 = "O Sensei vai apoiar Marie antes de seu mini-show solo. Embora ela esteja feliz com o sucesso, sente-se confusa por haver mais pessoas do que na sala de aconselhamento habitual. O Sensei a encoraja a ser positiva e a envia ao palco. Após o show, Marie, um pouco excitada, mas sentindo a satisfação do dever cumprido, agradece ao Sensei por toda a ajuda prestada."
1340882771 = "Coragem para Dar o Passo"
1554125012 = "O Sensei visita Marie, que diz ter algo para lhe mostrar. Como forma de agradecimento por tudo, Marie apresenta um show secreto. Através da música e da dança, ela transmite toda a sua gratidão ao Sensei e pede que ele continue cuidando dela daqui para frente."
1675781559 = "Frutos do Esforço"
2417116786 = "Sakurako fica feliz ao sentir que a distância entre ela e as outras alunas diminuiu através das atividades de ídolo. No entanto, tão empolgada por ter feito amizade com todos graças ao traje de ídolo, ela acaba querendo que todas as integrantes da Sisterhood usem o traje..."
2808779992 = "Outra Eu"
86290450 = "O Sensei visita Sakurako, que diz ter um problema. Ao ouvir a história, descobre que, ao usar o traje de ídolo, uma nova irmã a confundiu com outra pessoa chamada \"Sakura-chan\", e ela está em apuros por não conseguir revelar a verdade. O Sensei a aconselha a ser honesta, dizendo que a pessoa entenderá. Seguindo o conselho, ela reúne coragem para revelar a verdade e, feliz, relata ao Sensei que ganhou uma nova amiga."
1666107840 = "O Brilho da Ídolo"
3975383213 = "Sakurako se dedica às atividades de ídolo para o festival escolar. A Sisterhood e o Sensei tentam apoiá-la colando cartazes em locais visíveis da cidade. Quando o Sensei a leva de surpresa para ver onde os cartazes foram colados, Sakurako fica feliz por ter começado as atividades de ídolo."
3877968203 = "Ouvi dizer que você gosta disso"
2316052442 = "Sakurako, que às vezes age de forma estranha, está ainda mais estranha que o habitual. Para o Sensei confuso, Sakurako explica que é um agradecimento por tudo. No entanto, ela parece arrependida por ter deixado o Sensei confuso, contrariando suas intenções. Quando o Sensei diz que esse sentimento é o que mais o deixa feliz, Sakurako o convida novamente para o \"Curso de Encontro Especial de Ídolo\" que ela havia planejado."
899851085 = "Sessão de Fotos"
1154706643 = "Mine se prepara para uma sessão de fotos para usar o traje de ídolo e melhorar a imagem da Unidade de Resgate. Inicialmente, Mine explica a situação ao Sensei com confiança, mas ao perceber que os membros da Unidade de Resgate a acham fofa, ela fica envergonhada."
2876252345 = "Mesmo sem motivo"
934404426 = "Mine aparece com o traje de ídolo em todos os lugares onde encontra o Sensei, como em compras ou restaurantes. O Sensei, que finalmente a captura após ela tentar dar desculpas esfarrapadas para sair, a encoraja dizendo que não precisa de motivos para usar roupas que gosta. Mine fica nervosa e um pouco perturbada por seu lado fofo, que ela escondia, ter sido descoberto."
351631146 = "Comigo agora"
606260475 = "Após o festival escolar, Mine, preocupada com a dificuldade de conciliar as atividades de ídolo com as de resgate, pensa em se desfazer do traje para selar seu lado ídolo. Mesmo após a persuasão do Sensei, sua vontade não vacila. No entanto, ela se convence com as palavras do Sensei de que ele pensará em uma forma de ela poder usar o traje novamente, e decide confiar a ele o destino de sua faceta como ídolo."
1414095989 = "Desculpas Mútuas"
4030175207 = "O Sensei tenta criar oportunidades para Mine usar o traje de ídolo. Mine se preocupa se está causando problemas, mas ao ver o Sensei rir, dizendo que isso serve como desculpa para aproveitar as férias, ela sorri naturalmente. A partir daí, Mine e o Sensei passam um dia tranquilo juntos."
2926157779 = "Satsuki Kyogoku sabe"
3638915034 = "Satsuki diz que herdou o Departamento de Informações. Ela pede a ajuda do Schale, que é um parceiro de cooperação, mas o Sensei diz que não se lembra de ter firmado tal parceria. Satsuki ameaça o Sensei dizendo que tem pontos fracos dele em mãos, mas, como não surte efeito, ela vai embora."
2537055559 = "Satsuki Kyogoku pergunta"
2610548792 = "Como a ameaça anterior não funcionou, Satsuki diz ter preparado outro método. Ela corta as unhas do Sensei, o faz vestir uma camiseta branca e comer udon de curry, ou faz com que anúncios apareçam nos melhores momentos de vídeos de gatos fofos sem possibilidade de pular... ela executa torturas terríveis. No entanto, novamente, não funciona com o Sensei."
281454214 = "Satsuki Kyogoku ouve"
736914356 = "Satsuki fica feliz por finalmente haver progresso no \"Projeto NK Ultra\". Ela seleciona o Sensei como o primeiro sujeito de teste. Ela tenta usar hipnose, mas não funciona no Sensei... e ela acaba hipnotizando a si mesma, passando a obedecer ao Sensei. Quando o Sensei pergunta por que ela quer controlar as pessoas, ela responde que é pela paz mundial."
3009929652 = "Satsuki Kyogoku resiste"
2843120852 = "O Sensei recebe um MomoTalk de SOS de Satsuki e vai até o Pandemonium, onde encontra Satsuki trancada na sala. Ela diz que está se escondendo porque tem medo da injeção de vacinação. O Sensei a convence e eles tomam a injeção juntos."
796751500 = "Satsuki Kyogoku treme"
2925882867 = "Satsuki chega ao Schale cheia de energia para seu turno. Enquanto ela se gaba de que vai obter informações do Schale, ocorre um blecaute repentino. Satsuki se assusta com o som do vento e objetos caindo, e o Sensei gentilmente fica ao lado dela."
1716752779 = "A Secretária do Pandemonium"
2765526546 = "Chiaki envia uma mensagem sobre a assinatura da \"Semanal Pandemonium\". Ao visitar o Schale, Chiaki fala ao Sensei sobre os encantos da revista."
3705330933 = "A vida de reportagem da secretária"
651990844 = "Como presente de agradecimento pela assinatura, Chiaki dá ao Sensei um ingresso para um buffet de doces. O Sensei aproveita o buffet junto com Chiaki, que quer fazer uma reportagem para a próxima edição."
2692250003 = "A vida de hobbies da secretária"
4167044195 = "Chiaki diz que o 'Semanal Pandemonium' desta semana está em pausa. Como ela disse que ia cuidar de seus hobbies hoje, o Sensei a acompanha, visitando vários clubes de Gehenna e se divertindo. Chiaki comenta que seu hobby é justamente passar o tempo com pessoas diferentes assim."
2097502551 = "A vida de busca da secretária"
3382911551 = "Chiaki diz que a edição especial do 'Semanal Pandemonium' será sobre o Schale. Enquanto faz o turno no Schale, ela tenta fazer uma reportagem exclusiva, mas acaba começando a investigar o mistério dos furos nas meias do Sensei e outros segredos. O Sensei acalma Chiaki e a ajuda a procurar algo que possa virar uma boa pauta."
828484028 = "Insônia"
3373880876 = "Yuuka está ajudando com o trabalho no Schale, mas parece que não consegue se concentrar. Ao perguntar, ela revela que tem sofrido de insônia ultimamente. O Sensei sugere que ela tire uma soneca com roupas confortáveis e, após uma breve conversa, Yuuka acaba adormecendo. Ao acordar, ela percebe que o problema era estar se esforçando demais para tentar dormir, e parece ter entendido a situação."
1121151644 = "Aventura com ovelhas elétricas"
975106364 = "Preocupado com o final suspeito da conversa no MomoTalk com Yuuka, o Sensei visita o Millennium. Yuuka fica surpresa, mas ao explicar a situação e investigar a causa, descobrem que foi um mau funcionamento do drone de economia de energia, a 'Ovelha Elétrica'. Enquanto capturam a ovelha 'fugitiva', eles conversam sobre o velho hábito de contar ovelhas em noites de insônia. Yuuka quase deixa escapar um sonho secreto e, para disfarçar o constrangimento, força o Sensei a voltar para o Schale."
2025917852 = "After Dark"
2416670859 = "O Sensei, que estava ouvindo os problemas dos alunos no Millennium até escurecer, vai a uma loja de conveniência em busca de um lanche. Ao sair, encontra Yuuka de pijama, devorando um frango frito. Ela conta que, como não conseguia dormir, saiu para caminhar e acabou ficando com fome. O Sensei ouve os desabafos de Yuuka, que está envergonhada, e decide continuar o passeio com ela."
2478727059 = "A noite sem sono do Seminar"
2577100129 = "Yuuka conta que começou a ouvir rádio antes de dormir por recomendação de Kotama. Um dia, a mensagem de Yuuka pedindo conselhos para curar a insônia é lida no programa. Ela fica desapontada por não receber uma solução eficaz, mas, na semana seguinte, a mensagem do Sensei é lida. Talvez por ter se sentido tocada pelo conteúdo encorajador, Yuuka consegue dormir bem naquela noite, e sua insônia parece ter melhorado."
358780189 = "Incolor"
4255105260 = "Parece que Noa não está se sentindo bem. Preocupado, o Sensei visita o quarto dela. Ao entrar, o Sensei se surpreende ao ver que só há o estritamente necessário no local. Ao ouvir a explicação de que isso vem do desejo de Noa de ser sempre objetiva, o Sensei comenta que o ambiente poderia ficar mais charmoso com algumas 'manchas'. Ao ouvir isso, Noa pede ajuda ao Sensei para redecorar. O Sensei aceita, mas prioriza a recuperação dela e prepara um mingau."
2069012399 = "Sem aroma"
1850483928 = "Como prometido, o Sensei ajuda Noa a redecorar o quarto. Eles tentam usar vários itens, como troféus que Noa ganhou e livros que estavam esquecidos no Seminar, mas nenhum dos dois parece satisfeito. No entanto, quando o Sensei sugere um difusor com um aroma suave, Noa parece gostar e sorri alegremente."
208330771 = "Transparente"
3004247765 = "Com a recuperação de Noa, é a vez do Sensei ficar doente. Preocupada, Noa visita o Schale e, como forma de retribuir o favor, prepara uma refeição caseira. O Sensei devora a comida e pede para Noa ler um livro para ele; ele acaba adormecendo profundamente enquanto ouve a voz transparente de Noa."
4051060136 = "Uma pequena mancha"
2881025522 = "O Sensei acidentalmente derruba café e suja o uniforme de Noa. Ela então troca de roupa por um pijama que havia deixado no Schale. Enquanto o Sensei parece inquieto, Noa sorri de forma travessa, tentando transmitir indiretamente o significado de estar de pijama. Como ele não entende, ela murmura 'você é tão lerdo' e faz bico."
1475757512 = "O convite da bela adormecida"
1090305340 = "O Sensei vai até Trinity após ser chamado por Seia, que parecia ter algo importante a tratar. No entanto, ao chegar lá, descobre que não havia motivo algum, ela só queria chamar sua atenção. Quando Seia diz que não será mais tão egoísta, o Sensei responde que não precisa se conter. Com um sorriso sem jeito, Seia faz um pedido adicional: que o Sensei tire uma soneca com ela."
1220649373 = "Acumulando o que não é habitual"
2715828130 = "Após receber um contato pedindo para visitá-la, o Sensei vai ver Seia novamente. Mas a visita era apenas uma desculpa; Seia preparou doces para cuidar do Sensei, que está exausto de tanto trabalho. Embora o Sensei também tenha trazido doces, a mesa já estava cheia. Os dois passam um tempo agradável comendo os doces que Seia preparou."
2126075441 = "O primeiro passo para a conversa"
1977122812 = "Seia queria trocar opiniões de igual para igual, mas seu título sempre atrapalhava a relação com os alunos comuns. Com o Sensei, porém, não há problemas, e os dois conversam animadamente sobre livros recomendados. O Sensei tenta pegar um livro emprestado na biblioteca, mas, por coincidência, o livro já estava com Seia. Ele acaba indo até o quarto dela buscar o livro e, aproveitando a oportunidade, acaba ajudando a carregar a enorme quantidade de livros que ela pegou emprestado."
2182579853 = "O passarinho que sonha dedica uma canção para o dia em que voará do ninho"
1084961606 = "Em uma noite em Trinity, o Sensei encontra Seia em um parque, atraído pelo canto dos pássaros. Quando Seia diz que é boa em cantar, o Sensei pede para ouvir. Seia recusa, mas o Sensei insiste. Embora ela explique o motivo de não cantar, Seia acaba sendo convencida pelo Sensei e decide apresentar sua voz especialmente para ele."
3549899780 = "Surpreendentemente normal"
2914256145 = "O Sensei visita o Millennium e encontra Neru. Ela dá um sorriso de alívio ao ser elogiada pelo Sensei por estar de uniforme. Como ela estava com roupas diferentes do habitual, um delinquente que não a reconheceu tentou arrumar confusão, mas ela o afugentou facilmente. Neru, que normalmente não se envolve em brigas, parece de bom humor por ter tido uma experiência rara."
1124899584 = "Feriado tranquilo"
1959760146 = "Como não precisa mais se preocupar com os olhares alheios por estar de uniforme, Neru chama o Sensei para passear pela cidade. Enquanto fazem coisas que normalmente não poderiam, como ir a lanchonetes e parques, Neru acaba adormecendo no ombro do Sensei, talvez cansada de tanto brincar. Ao acordar, ela diz que está satisfeita e agradece ao Sensei."
857743078 = "Neru e o parque de diversões"
4260659126 = "Neru quer fazer algo chamativo para aproveitar o uniforme antes de parar de usá-lo. Então, o Sensei a leva a um parque de diversões. Usando tiaras de mascotes e com doces na mão, Neru aproveita as atrações e eventos até o horário de fechamento. Ela diz ao Sensei, envergonhada, que se tiver outra oportunidade de usar o uniforme, quer brincar com ele novamente como hoje."
3828496540 = "Hábitos alimentares racionais"
1133228369 = "Após receber um contato de Rio, o Sensei a acompanha nas compras no supermercado. Quando perguntada sobre seus hábitos alimentares, Rio responde que costuma comer marmitas prontas ou alimentos congelados. Preocupado com sua saúde, o Sensei compra ingredientes com ela e decide preparar uma refeição no Schale. Ao provar o ensopado, Rio faz um comentário ácido dizendo que o sabor não tem nada de especial, mas sente algo apertar em seu peito."
1657158848 = "Substituição de recebimento"
510653460 = "O Sensei acaba recebendo uma grande quantidade de encomendas no lugar de Rio, que não quer que a localização de seu esconderijo seja descoberta. Quando Rio vai buscar as encomendas, o Sensei pergunta o que há dentro, e ela explica detalhadamente que são peças de máquinas e reagentes experimentais. Durante a conversa, Rio diz que, ao contrário das máquinas, as pessoas são insubstituíveis. Ela murmura timidamente que o Sensei é assim para ela e que gostaria de ser assim para ele também, e o Sensei a acompanha até perto do esconderijo."
954826963 = "Design"
2025211439 = "Como não pode fazer isso no esconderijo, Rio aluga uma sala no Schale para criar objetos com uma impressora 3D. Quando o Sensei pergunta para que servem, ela diz que não têm um uso específico. Ao ser apontada que é um hobby, Rio começa a se preocupar, dizendo que nunca tinha pensado por esse lado e que ter um hobby é irracional. No entanto, ao ouvir o Sensei dizer que pode ser considerado um tipo de atividade artística, ela reage com alegria."
1535992005 = "Lugar secreto"
3341491514 = "Dizendo ser um agradecimento pelo outro dia, Rio tenta convidar o Sensei para seu esconderijo. No entanto, ela não consegue terminar a limpeza antes do horário combinado, e o Sensei chega em um quarto bagunçado. Eles terminam a limpeza com a ajuda do Sensei, mas Rio parece envergonhada. Quando o Sensei a convida para comer fora, Rio dá várias desculpas, mas acaba aceitando ir com ele."
1595705631 = "Dentro do ônibus"
1148295035 = "Em um ônibus lotado indo para o Millennium, o Sensei encontra Asuna por acaso. Por ser chamada de 'Mestre' por Asuna, que está de uniforme, o Sensei passa por momentos de tensão e desconforto, sendo alvo de olhares suspeitos e ficando excessivamente próximo dela em uma curva fechada. Por outro lado, Asuna ria alegremente o tempo todo."
2622331350 = "Encontro na cantina"
3551192404 = "Desta vez, o Sensei encontra Asuna na cantina do Millennium. Ela parece indecisa sobre escolher um pão de melão ou um pão de yakisoba para o almoço. No final, os dois compram ambos e comem juntos em um banco da escola. Asuna diz que é mais gostoso porque está com o Sensei, mas parece ter ficado satisfeita rapidamente, e o Sensei acaba comendo o resto sozinho."
4288139285 = "Encontro inesperado"
1681962777 = "O Sensei encontra Asuna na cidade mais uma vez. Quando ele diz, em tom de brincadeira, que talvez estejam ligados por um fio, Asuna leva a sério e amarra o Sensei com a fita do uniforme dela. Ela fica feliz, dizendo que ele parece um cachorrinho, e eles continuam o passeio assim."
312468336 = "O que você está procurando?"
1018913594 = "A conversa no MomoTalk com Asuna é interrompida de repente. O Sensei, preocupado, vai procurá-la e a encontra em segurança na cidade. Ao perguntar, descobre que ela perdeu o celular. Quando o encontram, Asuna percebe que havia muitas chamadas perdidas do Sensei e fica feliz, dizendo que parece que recebeu muitas declarações de amor, e declara que vai tirar um print para guardar como um tesouro."
3452424088 = "Limpeza de folhas caídas"
1225467064 = "Maki está sendo forçada a limpar as folhas caídas como punição por ter feito grafites sem permissão. Enquanto conversa com o Sensei, que veio ajudá-la, ela compartilha seus pensamentos sobre a vivacidade das cores das folhas de outono. Ao ouvir isso, o Sensei faz um comentário simples de que o cabelo de Maki também é de um vermelho bonito, como as folhas de outono, o que a faz tropeçar sem querer e espalhar todas as folhas que eles tinham acabado de juntar."
1020270808 = "Realidade Aumentada"
1998255879 = "O Sensei é convidado por Maki para escalar uma montanha. Embora ele ache surpreendente ser convidado para uma atividade ao ar livre, logo descobre que é por causa de um jogo de RA e entende o motivo. Maki, ao ser lembrada pelo Sensei de que, já que é uma escalada, seria um desperdício apenas jogar, usa a RA para fazer um vale solitário que visitaram parecer estar no auge do outono, passando um tempo divertido."
1001076875 = "O ponto alto do acampamento"
937583126 = "Maki convida o Sensei para acampar. Como de costume, o objetivo era o jogo de RA, mas o celular fica sem bateria. Maki, entediada, percebe que pode jogar usando a TV portátil que o Sensei trouxe. Embora tenha dificuldade com os controles diferentes do habitual, ela acaba se divertindo jogando com o Sensei até tarde da noite."
1220767602 = "Cartão de Ano Novo"
4116523058 = "Ao visitar o café do Millennium, o Sensei encontra Maki preocupada com o design de seu cartão de Ano Novo. Quando ela pergunta como fazer o melhor cartão para expressar sua gratidão, o Sensei sugere que seria bom desenhar o que mais lhe marcou. Maki, ao ter um estalo, desenha o grafite que fez junto com o Sensei no cartão e, um pouco envergonhada, entrega a ele pedindo que aceite."
2571587715 = "Tempo de lazer (1)"
1009963351 = "Em seu dia de folga, Sena encontra o Sensei no parque. Sena pratica um de seus hobbies, a \"espera\", junto com o Sensei, comentando sobre os riscos ocultos nas ações das pessoas que passam pelo parque. Ela diz que se sente calma ao organizar documentos em um lugar tranquilo, mantendo-se pronta para correr para o local de emergência a qualquer momento. Além disso, ela menciona que sente uma satisfação em observar o mundo enquanto mantém a tensão sobre eventos desconhecidos. Depois de dizer isso, Sena usa o risco de hipotermia como desculpa para se aproximar do Sensei e desfrutar de um breve \"encontro de espera\"."
2153313130 = "Tempo de lazer (2)"
663094619 = "Sena passa o dia de folga na sala do Departamento de Medicina de Emergência, acompanhada pelo Sensei. Ela comenta que usar roupas civis evita chamar a atenção dos outros membros, enquanto começa a organizar os medicamentos, um de seus hobbies. Organizar medicamentos pode parecer trabalhoso à primeira vista, mas para Sena, é uma tarefa que acalma o coração. Ela diz que este momento, organizando os medicamentos enquanto conversa com o Sensei, pode ser sua \"recompensa\", e agradece ao Sensei."
1104938304 = "Circulação das correntes oceânicas"
574610625 = "O Sensei sai com Sena, que diz nunca ter visto o mar por estar sempre ocupada com o cotidiano. Ao ver o mar pela primeira vez, Sena verifica se não há pacientes de emergência por perto e, então, aproveita para passear pelo café à beira-mar e pelo quebra-vento com o Sensei. Depois, sob o sol poente, Sena diz: \"As pessoas buscam interesses para preencher as lacunas de seu próprio eu incompleto\". E então, sussurra: \"Sinto que minhas lacunas estão sendo preenchidas aos poucos, ao passar o tempo com você...\""
370788532 = "A diversão de ser garçonete"
1282608874 = "O Sensei visita o café onde Juri trabalha meio período. Juri demonstra sua experiência no Clube de Merenda: ao ouvir que o açúcar de confeiteiro acabou, ela usa balas de glicose da farmácia como substituto, descobre imediatamente que o pão da loja está vencido e sugere menus aos clientes observando-os bem. Então, o gerente do café propõe que Juri participe do \"Torneio de Seleção de Garçonetes deste mês\"..."
4047712030 = "A aventura da garçonete"
3916787181 = "Com o apoio do Sensei, Juri decide participar do \"Torneio de Seleção de Garçonetes deste mês\". As provas do torneio incluíam um teste de força levantando bandejas pesadas, um jogo de bandeiras para testar a memória e a agilidade necessárias para lidar com o movimento do horário de pico, e uma limpeza pesada. Juri, usando sua experiência de trabalho em locais difíceis, tem um desempenho brilhante. Ela vence o torneio e recebe o troféu e o prêmio."
2608910626 = "O serviço da garçonete"
2837015474 = "O Sensei recebe uma mensagem de Juri pedindo para escondê-la. Pelo que parece, após vencer o torneio e ser escolhida como a \"Garçonete do Mês\", ela está tendo problemas com o aumento excessivo de sua popularidade, como clientes pedindo fotos e pessoas a abordando na rua. O Sensei convida a agitada Juri para a sala de descanso do Schale para acalmá-la e eles compartilham um momento de descanso. Como agradecimento, Juri prepara um sundae especial para o Sensei. O Sensei saboreia o sabor único, que mistura doce e salgado, e eles passam um tempo agradável juntos..."
2027038816 = "E assim começou a aventura gastronômica"
567336352 = "No início do ano, Izumi apresenta ao Sensei uma nova combinação gastronômica: \"Takoyaki de sardinha com chocolate de menta e limão\". O Sensei fica confuso com a combinação peculiar. Izumi explica que os membros do Clube de Pesquisa Gastronômica buscam a gastronomia em seus próprios estilos, e que ela prioriza conhecer sabores variados. Após ser forçado a comer uma bala de alcaçuz salgada com amônio e cloreto, o Sensei promete a Izumi que irá com ela em outra \"aventura gastronômica\"."
3074678283 = "Um novo estágio"
3604918961 = "O desafio desta aventura gastronômica é o \"Osechi Especial estilo Izumi\", feito sob medida. O prato continha uma seleção peculiar: feijão preto feito com chocolate 99% cacau e vinagre, kamaboko vermelho e branco feito de morango, e o \"Datemaki estilo Izumi\", que enrola tinta de lebre-do-mar com sorvete. Quando Izumi diz que ele deve esperar por sua próxima criação caseira, o Sensei sente uma leve ansiedade..."
4075335008 = "Prova de felicidade"
871439435 = "Chamado por Izumi, que diz ter uma surpresa especial, o Sensei vai até o parque no terraço do shopping. Lá, Izumi revela um bento feito à mão. Ao ver o bento feito com tanto esforço e carinho, o Sensei pergunta se ela não vai comer também. Izumi responde que apenas ver o Sensei comendo já a faz feliz. Com um sorriso inocente, ela diz que, como sabe que seus desafios têm sabores peculiares, ela queria fazer uma comida que o Sensei pudesse comer com gosto. O Sensei se sente revigorado ao ver Izumi assim."
466460480 = "Trabalho de meio período no estádio"
3298066737 = "Para comprar uma máquina de treinamento, Sumire começa a trabalhar como vendedora de bebidas no estádio e insiste para o Sensei que esse trabalho, que exige carregar o servidor de bebidas nas costas, também serve como treinamento. Com sua habilidade física e simpatia, Sumire se torna uma lenda no estádio."
1050728220 = "Marca-passo"
1254911399 = "O Sensei, que teve um leve aumento na taxa de gordura corporal, decide encarar uma corrida \"leve\" de 10 km junto com Sumire, que está equipada com o servidor de bebidas. Graças ao suporte de Sumire, que serviu como marca-passo, o Sensei consegue completar a corrida e recebe uma bebida de recompensa."
678617450 = "Treinamento suspeito"
2311495169 = "Aceitando a sugestão do gerente do estádio onde trabalhava, Sumire assume a responsabilidade de um programa de condicionamento físico para os vendedores que sofrem com o peso do servidor de bebidas. Ao experimentar o menu criado por Sumire, que consiste em repetir infinitamente \"mais uma vez!\" enquanto carregam o servidor, os vendedores acabam sofrendo com dores musculares intensas."
2415231413 = "A pessoa do momento"
3709190312 = "O desempenho de Sumire como vendedora vira assunto, e ela é convidada para uma reunião de uma fabricante de bebidas interessada em desenvolver novos produtos. Entre várias propostas, Sumire sugere uma bebida proteica. Os funcionários ficam confusos, mas são contagiados pelo entusiasmo de Sumire. Dizem que a bebida proteica, lançada posteriormente, conquistou um grupo de fãs fervorosos."
2197812544 = "Treino especial de tempo"
3910533066 = "No beisebol, o tempo é tudo. O Sensei leva Rei a um fliperama e sugere um treino especial com jogos de ritmo. Embora seja iniciante, Rei demonstra talento, alcança uma pontuação alta e se torna o centro das atenções. No entanto, dizendo que \"seu campo de batalha é o beisebol\", ela deixa o local e parte para um jogo de treino estoico... mas acaba sofrendo uma derrota esmagadora."
3105708523 = "Treino especial de controle"
2865627764 = "Para melhorar suas habilidades como rebatedora, Rei tenta entender como funciona o arremesso. Como não consegue progredir, o Sensei sugere vários métodos de concentração, como dardos e frisbee. Ao ver a cena, os transeuntes começam a espalhar boatos estranhos de que o Sensei trata seus alunos como cães..."
3920356383 = "A diversão do beisebol"
648984919 = "Rei e o Sensei vão ao estádio para assistir a um jogo de beisebol e encontram uma criança perdida. Ao ouvir a criança dizer que beisebol não tem graça nenhuma, Rei se lembra de sua infância e fala sobre a diversão do beisebol, que exige esforços constantes para vencer. Enquanto se despede da criança, que reencontrou sua família, Rei fica envergonhada quando o Sensei diz que ficou emocionado com sua teoria sobre o beisebol."
4022262912 = "O que é deixado para trás, o que é herdado"
13117381 = "Enquanto inspecionam os equipamentos do clube de beisebol, o Sensei fica impressionado ao ver Rei medir mecanicamente a causa da quebra dos equipamentos. Nesse momento, o Sensei encontra a bola do primeiro home run que Rei capturou, uma lembrança preciosa. Enquanto relembra as memórias daquela bola, Rei diz que espera um dia se tornar algo como uma \"bola de memórias\" para o Sensei."
4069028683 = "Novo trabalho de meio período"
1511181025 = "Saori começa a trabalhar como modelo e veste um vestido. Deixando a preparação da sessão de fotos por conta da equipe, Saori pede ao Sensei que a oriente sobre poses femininas usando o vestido, aprendendo a fazer movimentos naturais que expressem sua própria personalidade."
4260467965 = "A aula dos dois"
3750933921 = "Após receber uma mensagem de Saori, o Sensei vai ao estúdio de fotografia. Saori precisa tirar fotos dançando, algo que nunca fez antes, e pede ajuda ao Sensei. A prática de dança, onde ambos dão as mãos enquanto estão nervosos, torna-se um momento especial para Saori, que propõe ao Sensei: \"Gostaria que você fosse meu parceiro também na hora da sessão de fotos\"."
3551813368 = "Agradecimento"
3505630226 = "Como Saori aparece vestida com o vestido no local de encontro com o Sensei, ela atrai muita atenção, e os dois decidem se refugiar no Schale. Para Saori, que está deprimida por achar que tudo deu errado, o Sensei decide preparar uma refeição para não desperdiçar os sentimentos dela. Em troca, Saori entrega ao Sensei a revista de moda em que ela aparece na capa."
270920992 = "Garota no trem"
481302123 = "Hikari, que encontra o Sensei em um trem durante uma viagem de negócios, termina rapidamente seu trabalho de conferência de bilhetes e vai brincar no assento do Sensei. O Sensei fica chocado ao comer salgadinhos apimentados e balas ácidas que estalam na boca. Hikari aproveita para brincar bastante até a estação final."
3573236808 = "Garota na Rua"
1039941372 = "O Sensei encontra Hikari sentada na esquina da rua. Hikari estava observando uma guerra intensa entre legiões de formigas. Enquanto torcia para suas legiões favoritas e acompanhava o desenrolar da batalha, o ácido fórmico disparado por um grupo de formigas acaba atingindo Hikari. Jurando vingança, Hikari é consolada pelo Sensei, que a convida para comer algo gostoso."
864122818 = "Garota na Aventura"
1959076383 = "Hikari caminha pela rua seguindo a regra de que 'as partes brancas são rochas e o resto é magma, então não pode pisar'. O Sensei, sentindo uma ponta de nostalgia, participa dessa 'aventura' e, apesar de ter 'morrido' oito vezes, consegue chegar ao Schale. No entanto, o caminho até o escritório é feito apenas de azulejos da mesma cor. Em uma situação difícil, o Sensei carrega Hikari no colo e consegue chegar em casa."
77436159 = "Garota com Dor"
840104479 = "O Sensei sai para passear pela cidade e comer doces com Hikari, que declarou que dormiria no Schale. De repente, Hikari começa a reclamar de dor de dente. Embora ela não queira ir ao dentista, o Sensei a convence dizendo: 'Você não quer ficar com dor para sempre, quer?', e eles vão juntos ao hospital para garantir que ela tenha uma vida longa."
1135383537 = "Garota em Chamas"
3749974299 = "Hikari traz um curry super apimentado para um novo desafio. Ela diz que 'não é apimentado porque sou invencível', mas, como esperado, ela se contorce com o ardor. Preocupado, o Sensei compra leite e sorvete para ela, e eles comem juntos. Depois, talvez por cansaço, Hikari acaba dormindo no colo do Sensei."
3804838142 = "Uma Acompanhante Inesperada"
2397740945 = "O trem para a viagem de negócios do Sensei atrasa, deixando-o um pouco ansioso. No entanto, o trem acelera e chega ao destino no horário previsto. Lá, o Sensei encontra a maquinista Nozomi, que pede para ele entrar em contato quando terminar seus afazeres. Ao anoitecer, após receber o contato, Nozomi convida o Sensei para a cabine de comando, e eles apreciam a vista do pôr do sol juntos."
2105348511 = "O 'Fofo' está em lugares inesperados"
3435927293 = "Nozomi visita o Schale para entregar um bicho de pelúcia do 'Shuppo', o mascote da Highlander. Como Nozomi diz que raramente acha algo fofo, o Sensei tenta mostrar vários itens adoráveis para extrair uma reação dela. No entanto, Nozomi ri do esforço do Sensei, dizendo que ele é quem é fofo, deixando-o com uma estranha sensação de derrota..."
861160165 = "Lugar Inesperado"
3194943073 = "O Sensei encontra Nozomi por acaso no metrô, e eles engatam uma conversa sobre trens, discutindo as diferenças entre trens comuns e metrôs, as vantagens de cada um... e até como um trem marítimo seria interessante. No entanto, de tão empolgados, o Sensei acaba passando do seu ponto de parada."
3493759560 = "Um Ponto Fraco Inesperado?"
393753210 = "Chega o dia de Nozomi ser a responsável pelo turno no Schale, mas, após o turno noturno, ela parece muito sonolenta, bocejando e cochilando a todo momento. O Sensei, preocupado, a incentiva a deitar no sofá, onde ela acaba dormindo profundamente até o anoitecer."
4070596837 = "Um Lado Inesperado?"
3708690563 = "Nozomi realiza uma pesquisa de campo para o local de instalação de novos trilhos, acompanhada pelo Sensei. Enquanto diz que 'se fizer de qualquer jeito está bom', ela realiza o trabalho com perfeição e questiona: 'O trabalho do Sensei, de ouvir os problemas de tantos alunos, não deve ser difícil?'. Ao ouvir a resposta do Sensei de que 'não é difícil e que, agora, a pessoa com quem mais me preocupo é a Nozomi que está à minha frente', ela se diverte com a resposta e leva o Sensei para passear."
3957002931 = "Eu odeio pessoas"
684899898 = "O Sensei encontra Aoba em uma papelaria enquanto ela comprava papel sulfite. Ao ouvir a história, descobre que na Highlander os pedidos de reembolso de despesas raramente são aprovados, então ela quase sempre paga do próprio bolso. Comovido com a raiva silenciosa de Aoba, o Sensei decide comprar todo o conjunto de papelaria necessário para ela. Aoba, confusa, faz várias reverências e vai embora."
460531770 = "Eu odeio este mundo"
1037671752 = "O Sensei se junta a Aoba para ajudar no conserto de um semáforo, mas não consegue esconder o choque ao vê-la bater com uma chave inglesa no equipamento. 'Sempre fiz assim...', diz ela, enquanto continua a usar a ferramenta. No fim, ela consegue consertar tudo sozinha, mas Aoba agradece profundamente ao Sensei por ter atendido ao seu pedido e vindo até ela."
131885223 = "Eu odeio ficar sozinha"
2053823937 = "Aoba corre para ajudar o Sensei quando sua cafeteira quebra. Como não funcionou bater com a chave inglesa, ela tenta o 'Plano B': desmontar o aparelho. Após muito esforço, ela consegue consertar. Aoba fica feliz por ter retribuído um pouco a gentileza do Sensei. Quando o Sensei diz que vai pagar uma refeição deliciosa como agradecimento, Aoba começa a chorar de surpresa e felicidade."
2236263247 = "Eu odeio este mundo (sem você)"
1145911904 = "O Sensei vai até Aoba, que disse que talvez tivesse que virar a noite devido ao excesso de trabalho. Ele troca de roupa para um uniforme de trabalho e os dois passam a cumprir a pilha de tarefas juntos. Após terminarem, ocorre um acidente onde Aoba e o Sensei se cruzam enquanto ela se trocava no alojamento, mas, apesar disso, eles seguem o caminho de volta juntos. Lá, Aoba confessa que, embora nunca tivesse esperado nada do amanhã antes, agora as coisas são diferentes..."
3377242249 = "Fina, a Silenciosa"
213706836 = "Ao ouvir que Fina 'renasceu', o Sensei vai até Hyakkiyako. Lá, ele encontra Fina trabalhando como guia turística. No entanto, ela entra em pânico ao notar que o famoso cachorro 'Mini Shibazou', que deveria estar na Vila Cinematográfica Uzumaki, não está lá... Com o apoio do Sensei, Fina recupera a calma e consegue levar o passeio guiado ao sucesso."
293675733 = "O Código da Guia de Elite"
2294953606 = "O Sensei participa de um passeio de ônibus guiado por Fina. Tudo parecia correr bem, até que ela percebe que esqueceu um dos turistas em algum lugar e entra em desespero. Ao chegarem ao local para buscá-lo, o Sensei usa seu raciocínio rápido e sugere um 'passeio de táxi', resolvendo a situação e permitindo que o tour termine bem."
1021576815 = "Crônicas de uma Guia Justiceira"
4191579066 = "O Sensei acompanha Fina para assistir à peça 'Crônicas do Ninkyo Nyan-Nyan'. Inicialmente, Fina explica calmamente o contexto aos turistas, mas, no clímax, seu espírito justiceiro desperta e ela começa a torcer pelo protagonista com todas as forças. Fina se arrepende profundamente, mas o público interpreta aquilo como um 'teatro imersivo', e os atores também acolhem calorosamente seu espírito apaixonado. Assim, tanto a peça quanto o passeio terminam com sucesso."
485845832 = "Uma oferta que não se pode recusar"
396056727 = "O Sensei participa do passeio, mas, preocupado com Fina, que parece exausta por medo de falhar, ele a incentiva a descansar um pouco dentro do ônibus. Os dois passam um momento de descanso. Ela recupera um pouco as energias e volta para receber os turistas, mas acaba esquecendo seus sapatos dentro do veículo e tenta agir como se nada tivesse acontecido."
2017163321 = "Técnica de Tiro Estilo Hyakka Ryoran"
3748909057 = "O Sensei, visitando Hyakkiyako, decide observar o treinamento de tiro de Nagusa. Embora ela seja modesta, sua habilidade de atingir múltiplos alvos em um instante é digna do título de presidente do comitê."
2776714076 = "Como expressar sentimentos"
2721592094 = "Nagusa ajuda na barraca de yakitori durante o festival de Hyakkiyako. Ela tenta recusar o convite para a festa de encerramento dizendo: 'Minha presença só vai incomodar...', mas, incentivada pelo Sensei, ela acaba passando um momento muito agradável."
1303559620 = "O amanhecer que finalmente chegou"
4177383325 = "Nagusa e o Sensei saem para uma patrulha noturna. Após uma noite agitada lidando com moradores bêbados e o grupo Chimichimiza, os dois descansam na varanda de uma cafeteria enquanto esperam o amanhecer."
3538513012 = "O verão da Mulher das Neves"
3940670190 = "A caminho do Schale, Nagusa sofre uma insolação. Ao perguntar, descobre que ela é sensível ao calor e que, quando criança, era chamada de 'Mulher das Neves'. Enquanto Nagusa reflete sobre a Mulher das Neves, que costuma ter um final trágico nas histórias, o Sensei diz: 'Tenho certeza de que você terá um final feliz'."
1857080174 = "Nuvens de liberdade fluem no céu"
1703313119 = "Após receber um contato de Niya, o Sensei aproveita o festival de Hyakkiyako enquanto fogem juntos de 'perseguidores'. Mas os perseguidores eram apenas os subordinados do Yin-Yang que estavam atrás de Niya por ela ter fugido do trabalho..."
2166596309 = "A grande árvore cria raízes em solo firme"
3368760628 = "Enganado por Niya e atraído para o departamento Yin-Yang, o Sensei testemunha a forma como ela se esquiva habilidosamente dos pedidos dos visitantes. Para o Sensei, que se sente um pouco preocupado, Niya fala sobre a posição ambígua do departamento Yin-Yang e vai embora na direção oposta à da sala do clube..."
2675210607 = "Grande fúria que cobre o céu e a terra"
3511750147 = "Não uma, mas três vezes enganado por Niya, o Sensei finalmente perde a paciência e decide dar uma bronca nela. Até mesmo Niya acaba demonstrando sinais de arrependimento."
2298096427 = "O céu e a terra estão apenas lá"
1685493795 = "Ao visitar Hyakkiyako, o Sensei percebe que todos os problemas que Niya estava negligenciando foram resolvidos. Niya diz que foi por acaso, mas o Sensei percebe seu esforço e começa a fazer carinho nela sem piedade."
576779580 = "O céu, a terra e a harmonia do mundo"
2896739033 = "Niya fala sobre seu plano de \"conquistar o mundo\" para dominar Kivotos e convida o Sensei para se unir a ela — mas tudo não passava de uma encenação. Quando questionada sobre querer mostrar o perigo do Departamento Yin-Yang e de Hyakkiyako, o Sensei diz: \"Se você estiver por perto, isso não acontecerá\". Diante disso, Niya fica um pouco confusa, mas desconversa com seu tom habitual."
3509570812 = "1ª Aula \"Aula Especial: Meios\""
3314544887 = "O Sensei, chamado repentinamente para um café de doces, preocupa-se se Natsu não está acumulando estresse com as atividades da banda. Natsu nega, mas murmura que, se for uma desculpa para comer doces com o Sensei, talvez não seja uma má ideia..."
1495423261 = "2ª Aula \"Aula Extracurricular: Arte\""
2178381226 = "O Sensei é convidado por Natsu para ir ao cinema após ela sentir que seus treinos de bateria estagnaram. Natsu pretendia aproveitar a pipoca que o Sensei comprou, mas, de tão concentrada no filme, esquece-se de comer. O Sensei pega a pipoca de Natsu e retorna ao trabalho no Schale."
620711550 = "3ª Aula \"Limpeza: Visitantes Indesejados\""
4092712805 = "Ao correr para a sala de ensaio, o Sensei testemunha Natsu procurando por \"aquilo\" que se move de forma rastejante e escura. O culpado era apenas um monte de poeira, mas, como ela desmontou a bateria durante a busca, não conseguia mais praticar. O Sensei decide ajudar Natsu a montar tudo novamente."
2301529882 = "Depois da aula \"Batimento\""
315387308 = "Durante uma hora extra no meio da noite, o Sensei, que passeava pela margem do rio para despertar, encontra Natsu fazendo jogging. Enquanto descansam juntos em um banco, o Sensei acaba encostando no ombro de Natsu e adormecendo, o que faz o ritmo cardíaco dela acelerar."
1814572470 = "Como convidar uma estrategista"
2794412546 = "O Sensei convida Kikyou, que estava de roupa de banho e pretendia nadar na piscina dentro das dependências do clube, para ir à praia. Aceitando o convite, Kikyou verifica sua agenda enquanto mantém uma postura fria — mas, de alguma forma, ela parece estar de bom humor."
3642360920 = "Não me solte"
3203760916 = "Ao chegar à praia, Kikyou lê seu livro didático sob o guarda-sol e hesita em entrar na água. Depois, sob a condição de \"entrar apenas até a cintura\", ela permite que o Sensei a acompanhe e começa a aproveitar o mar. Kikyou recusa a sugestão do Sensei de ir ver uma tartaruga em um local mais fundo, mas acaba sendo carregada no colo por ele."
966573027 = "A torre do castelo do coração"
917139257 = "Aproveitando o banho de mar e sentindo que está se acostumando com a água, Kikyou enterra o Sensei em um castelo de areia como recompensa por tê-la acompanhado. Ao ouvir sobre o passado de Kikyou, que costumava brincar de criar estratégias com castelos de areia e bonecos, o Sensei pula para fora da areia e eles passam a brincar juntos, criando memórias."
132303795 = "O estratagema da estrategista"
23283600 = "Para superar seu medo de água, Kikyou tenta entrar no mar até a altura do peito. O Sensei a ajuda e, como agradecimento, é guiado por ela até uma área de descanso preparada especialmente. Enquanto balançam em uma rede, os dois passam um momento de tranquilidade."
1547258117 = "Roupa de banho e defesa"
434592321 = "O Sensei encontra Renge na cachoeira, onde ela diz que fará seu treinamento de roupa de banho. Eles acabam ficando de roupa de banho e recebendo a água da queda — Renge sente que sua defesa mental aumentou por estar usando a roupa, mas, por outro lado, a força da água faz com que a roupa de banho do Sensei se solte. Renge consegue recuperar a peça e os dois continuam seu treinamento de juventude sob a cachoeira."
3063254359 = "Roupa de banho e ilha deserta"
3609000771 = "A segunda parte do treinamento de roupa de banho é a sobrevivência em uma ilha deserta! O Sensei e Renge passam o tempo na costa de uma ilha. Eles tentam pescar com rede, dividem os peixes capturados e aproveitam um momento de juventude. Após uma pausa, Renge sugere escapar da ilha em uma balsa feita à mão, e o Sensei, que a acompanhou, acaba ficando incapacitado por dores musculares."
379850169 = "Roupa de banho e fogueira"
3634384642 = "Renge monta lenha em formato de dragão na praia para realizar uma fogueira de juventude. No entanto, o fogo queima mais do que o esperado e, sentindo o perigo, Renge e o Sensei apagam o fogo às pressas. Enquanto limpa a fuligem do rosto do Sensei, Renge fica um pouco tensa por estar tão próxima dele. O Sensei também sente que \"este momento pode ser a própria juventude\"."
1794123967 = "Roupa de banho e juventude"
1511540975 = "Querendo compensar o erro da fogueira, Renge convida o Sensei para a praia. A atividade de juventude que ela propõe é brincar com fogos de artifício de mão. Renge aprendeu que a chama da juventude não precisa ser algo que queima intensamente. Enquanto observam as pequenas faíscas, os dois passam um momento pleno de juventude."
369192515 = "É o traje formal do mar!"
641107269 = "O Sensei leva Yukari, que não sabe como se divertir na praia, a uma loja de roupas de banho. Após escolher e vestir uma das peças, Yukari fica envergonhada — mas, ao perceber que é confortável para se mover, ela tenta sair pela cidade. O Sensei a impede apressadamente."
3133637421 = "Para não envergonhar a Hyakka Ryoran"
2973505214 = "O Sensei decide dar aulas de natação na piscina para Yukari, que quer exibir um nado elegante no mar. No entanto, os servos da família Kageyu-no-Kouji reservam a piscina apenas para os dois, alegando que é inaceitável expor a pele diante de estranhos! Yukari fica animada por passar um tempo a sós, mas, sentindo-se mal pelos outros clientes que esperavam usar a piscina, decide não usar a reserva e abrir o local gratuitamente."
1888195363 = "Florescendo graciosamente debaixo d'água"
2096152043 = "No dia tão esperado de ir à praia, Yukari não aparece no ponto de encontro. O Sensei vê algo se movendo no mar e, achando que ela está se afogando, pula na água, apenas para encontrar Yukari observando os recifes de coral. Após confirmar que ela está bem, os dois aproveitam o banho de mar até o pôr do sol."
1323673361 = "Mar de verão, mar silencioso"
1906389428 = "O Sensei encontra Yukari observando o mar à noite no caminho de volta das compras. Yukari diz que não se arrepende de ter quebrado os ensinamentos rígidos da família Kageyu-no-Kouji para pular no mar, e percebe uma mudança em seu coração entre o mar agitado do dia e o mar silencioso da noite."
363125217 = "Coisas que mudam"
2410063721 = "O Sensei, que recebeu um contato de \"urgência\", é recebido por Seia, que dirige um carro esportivo com elegância. O Sensei entra no carro e eles partem para um passeio à beira-mar. Quando o Sensei atende um pouco ao desejo dela de \"ser levada para passear e ser repreendida\", Seia sorri silenciosamente."
2540853788 = "Além da estagnação"
3025604214 = "Seia visita o Schale usando roupa de banho. O Sensei responde positivamente ao traje e ao fato de ela ter se dado ao trabalho de vir mostrar, mas Seia, pensativa sobre a resposta, senta-se no colo do Sensei para ajudá-lo com o trabalho."
817970610 = "O último momento"
106349387 = "O Sensei vai encontrar Seia, que enviou uma mensagem dizendo: \"O momento final está próximo...\". Seia queria gravar sua imagem na memória do Sensei, já que guardaria a roupa de banho hoje. No entanto, o Sensei não se abala ao vê-la. Um pouco irritada, Seia tranca a porta do quarto e começa a brincar com o Sensei confuso."
1154864129 = "Em busca de uma distância confortável"
1908728470 = "Seia se gaba para o Sensei de que agora consegue interagir com Mika e Nagisa de forma mais descontraída do que antes e, embora as trocas de sarcasmo tenham aumentado, elas conseguiram se entender. O Sensei fica muito feliz com isso, mas Seia o leva para um passeio de carro para encontrar uma distância confortável entre eles também."
2635062949 = "O mar não espera"
2438056735 = "Hasumi decide ir ao mar como parte das atividades do Comitê de Justiça. No entanto, enquanto dá tempo livre para seus subordinados, ela mesma monta uma agenda cheia de trabalho. O Sensei, preocupado, sugere que ela vá comprar uma roupa de banho, e Hasumi parte com uma expressão determinada, dizendo: \"Por favor, me dê uma semana de prazo!\"..."
2114293561 = "O dia da batalha"
1066108086 = "Hasumi e o Sensei se encontram em um shopping nos arredores. Hasumi vai à loja da marca de luxo \"Veronica\" e deveria escolher uma roupa de banho com facilidade, mas luta para encontrar uma que sirva bem. Decidida, ela compra uma roupa de banho no limite do tamanho e queima de determinação, prometendo preparar seu corpo até o dia marcado."
2390402921 = "À beira-mar"
604123590 = "Hasumi aparece envergonhada diante do Sensei na praia. Eles se divertem construindo castelos de areia, enterrando-se na areia e brincando de quebrar a melancia... mas, no meio disso, Hasumi fica com tanta fome que não consegue se mover. O Sensei leva Hasumi, que estava se esforçando demais na dieta, para um quiosque, paga o jantar e eles passam um momento agradável de verão."
4193449856 = "Pássaro negro no céu de verão"
1701157930 = "O Sensei chama Hasumi para a praia à noite e tira um conjunto de fogos de artifício. As brincadeiras que ela teve com o Sensei e os fogos que encerram tudo — Hasumi percebe que isso era a \"lista de desejos\" que ela mesma pensou um dia e sorri: \"Não esquecerei nada do que aconteceu neste verão\"..."
771755189 = "Surfista de Negócios"
3687845316 = "Após terminar o trabalho, Ichika caminha pela praia sem rumo, até que, por recomendação do Sensei, decide participar de uma aula de surfe. Diferente do Sensei, ela demonstra habilidades excepcionais no surfe e acaba participando de uma competição por acaso... mas, de alguma forma, parecia que ela não estava conseguindo aproveitar as férias de coração."
3124259672 = "Garota Anônima"
4085102234 = "Ao encontrar o Sensei na praia durante a noite, Ichika comenta que \"o mar é apenas uma paisagem um pouco diferente do habitual e não é muito divertido\", confessando sentir culpa por estar ali, deixando suas colegas para trás. O Sensei agradece pela honestidade, mas Ichika fica um pouco desapontada por aquele passeio noturno ter se transformado em uma sessão de aconselhamento."
682336343 = "Garota Travessa"
459649916 = "Ao encontrar o Sensei novamente na praia à noite, Ichika pede que ele esqueça o que aconteceu no outro dia por pura vergonha. Em resposta, o Sensei diz que \"aceita a Ichika de qualquer jeito\", o que faz com que ela se aproxime dele como uma \"pessoa perigosa\". Arrependida por ter ido longe demais, Ichika, envergonhada, diz que quer conversar sobre isso novamente em outra ocasião..."
2854468149 = "Garota Déjà Vu"
2261893853 = "Ichika encontra o Sensei mais uma vez e expressa seu arrependimento por tê-lo encurralado, além de seu desejo de não ser uma \"pessoa que dá trabalho\". Ao ouvir novamente do Sensei que \"não precisa esconder seus sentimentos\", Ichika decide ser um pouco mais honesta a partir de agora e avisa: \"Tudo isso é responsabilidade sua, viu, Sensei?\""
1190427539 = "Pedido Secreto"
630241773 = "Convocado secretamente por Nagisa, o Sensei visita a tenda dela sem ser visto por ninguém. O desejo de terminar o trabalho sem que seus colegas de férias percebam é atendido, e a recompensa é um cheesecake, chá e palavras de agradecimento."
3463352267 = "Nagisa à Deriva"
507788461 = "O Sensei vai até a tenda indicada por Nagisa. Lá, encontra o local repleto de equipamentos de lazer aquático que ela preparou para que todos pudessem se divertir. O Sensei tenta surfar imediatamente, mas tem dificuldade em manter o equilíbrio. Nagisa aparece, desfrutando de um chá com elegância sobre a água, e o Sensei decide se aquecer bebendo um pouco de água quente com ela."
615810610 = "Asas Tingidas pelo Pôr do Sol"
1648534831 = "Após receber uma mensagem enigmática, o Sensei sai à procura de Nagisa e a encontra caminhando sem rumo sob o pôr do sol. Nagisa diz que não hesita em voltar à rotina normal, mas que, de repente, sentiu um aperto no coração. No entanto, ao ouvir do Sensei que \"o mesmo dia nunca se repete\", ela segue o caminho de volta, ansiosa pelos dias em que poderá caminhar ao lado dele novamente."
4117624418 = "A Beira-mar, Você e os Peixes"
913912189 = "Convocado para a piscina exclusiva da festa do chá, o Sensei fica chocado ao ver peixes nadando nela. Nagisa, que já estava com saudades do mar, decidiu soltar os peixes na piscina para poder pescar enquanto trabalha. O Sensei acaba desfrutando de uma pescaria elegante ao lado dela."
2646804362 = "Uma Parte de Mim que Nem Eu Conheço"
3097604370 = "Enquanto conversam sobre as várias facetas das integrantes da festa do chá, Mika ri, dizendo que continua sendo uma encrenqueira. Nesse momento, o Sensei começa a falar sobre o charme dela, algo que nem a própria Mika conhecia. Ela fica confusa, mas feliz com as palavras dele."
2695761252 = "Continuação da Aula"
4096458443 = "Ao encontrar o Sensei na praia, Mika começa a falar sobre a aula de natação que tiveram anteriormente. Ela menciona que a aula foi interrompida e que ela havia consertado o traje de banho daquela época para trazê-lo. O Sensei e Mika continuam a aula e passam um momento agradável juntos."
3789006869 = "Algo que Brilha na Areia"
3563536444 = "Mika coleta conchas bonitas que encontra na praia e as mostra ao Sensei. Ao ver Mika, que sempre gostou de colecionar acessórios, o Sensei sente que ela está agindo de forma muito mais descontraída do que antes."
178386077 = "De Mim, que Comecei a Caminhar..."
1675488441 = "Após receber uma mensagem estranha no MomoTalk, o Sensei vai até Mika e a encontra agindo de forma mole e confusa. \"Eu achava que era uma princesa, mas na verdade eu era uma criança muito má...\", confessa ela. O Sensei, que percebeu que ela estava fingindo estar bêbada, aconselha gentilmente que o tempo que ela passou sofrendo servirá de apoio para ela no futuro."
3158159065 = "Para a Mim do Futuro"
2427872078 = "Mika convida o Sensei para um passeio noturno e o leva a um lugar específico. O destino é um local sob um céu noturno repleto de estrelas. \"Vou me esforçar para ser feliz\", diz Mika timidamente, ao que o Sensei responde: \"Estarei sempre cuidando de você\"."
1060031334 = "Agora, Está Tudo Bem"
1396743755 = "Mika tenta servir um sanduíche feito por ela mesma ao Sensei. Embora o esforço seja evidente, o sabor é extremamente peculiar. Ao vê-la decidir não desanimar e tentar fazer algo mais gostoso na próxima vez, o Sensei sente o crescimento real de Mika."
873198059 = "Pintura Mágica"
2832478109 = "Seguindo a orientação das cartas de tarô, Eri move o pincel com vigor para pintar. O Sensei, que estava preocupado com o processo intenso, não consegue deixar de se maravilhar com o resultado final."
580036155 = "Chapéu Mágico"
4207047849 = "Com um exame prático de pintura se aproximando, Eri se sente deprimida, pois o uso do chapéu mágico é proibido durante a prova. \"Tirar o chapéu é o mesmo que ficar nua\", diz ela, envergonhada, enquanto o Sensei a encoraja."
269259800 = "Recarga de Mana"
1093511634 = "Eri está desesperada porque o exame não está indo bem. Para distraí-la, o Sensei a leva a vários lugares, como uma loja de lámen e uma biblioteca, para recarregar seu mana. Nesse momento, Eri conta ao Sensei o que a motivou a querer pintar suas próprias obras."
2775257787 = "Pintora Mágica"
1616638842 = "Para ganhar confiança, Eri pinta um retrato do Sensei ao ar livre. Com outros alunos de Wild Hunt reunidos como espectadores, ela não se deixa abalar pela tensão e, lembrando-se de quando se dedicava puramente à tela, move o pincel para retratar o Sensei. O retrato final é uma obra maravilhosa, cheia da essência de Eri."
2923077435 = "Elixir Especial"
3141729267 = "Kanoe afirma que ela e o Sensei possuem um forte vínculo desde vidas passadas. Para despertar essas memórias, ela prepara um elixir especial... um ensopado. O Sensei se emociona com o sabor nostálgico e caseiro, mas as memórias de vidas passadas não retornam."
2137805982 = "Voz de Garota"
3484255803 = "Certo dia, o Sensei recebe uma ligação de uma aluna muito fofa e tímida. Confuso com a revelação de que ela nutria sentimentos secretos por ele, o Sensei decide encontrá-la em um parque próximo. No entanto, ao chegar lá, encontra Kanoe, que revela ser uma estudante de dublagem."
3504361213 = "Convite Repentino"
569922205 = "A pedido de Kanoe, o Sensei atua como assistente de gravação. Durante o processo, Kanoe confessa que usa uma voz fofa e que, normalmente, interpreta personagens ocultistas. Embora isso também fosse uma brincadeira de Kanoe, o Sensei fica extremamente abalado até que a verdade seja revelada."
3140711198 = "Essa... não sou eu"
692979208 = "Kanoe envia uma mensagem pedindo que o Sensei a ignore caso a veja hoje. Desconfiado, o Sensei segue sua rotina, mas Kanoe está sempre no canto de sua visão. Ela diz que uma existência idêntica a ela saiu do controle, mas a verdade por trás disso acaba se dissolvendo na escuridão..."
893011042 = "O Mar é Chato"
2775898959 = "Misaki parece entediada, dizendo que tudo no mar é chato. O Sensei, então, dá a ela uma aula intensiva de natação. Apesar de parecer irritada, Misaki acaba correspondendo aos esforços dele."
2316153298 = "Brincar na Areia Também é Chato"
3214330542 = "Graças à condução habilidosa do Sensei, Misaki acaba se empolgando na construção de um castelo de areia. Ela fica brava por ter sido manipulada pelo Sensei, mas parece um pouco satisfeita. No entanto, o castelo é levado pelas ondas e desmorona... Misaki diz que tudo foi em vão, mas o Sensei nega e mostra a foto que tirou. Surpresa, Misaki insiste: \"Apague isso\"."
3725758721 = "Até Tomar Sol é... Chato"
371852196 = "Misaki acaba tomando sol com o Sensei, mas uma chuva passageira começa a cair. Após a chuva parar, o Sensei decide tentar tomar sol novamente, declarando que, mesmo que não haja um efeito prático, as memórias com Misaki permanecerão. Sorrindo silenciosamente, Misaki acompanha o Sensei no banho de sol."
2816193451 = "Escritos na Prisão"
1264857227 = "Miyo, que visitou o Schale durante seu turno, desabafa sobre sua vida escolar sufocante. O Sensei lhe oferece a sala de descanso para que ela possa se concentrar na escrita. Miyo mergulha em um romance épico com tropas de tanques e acaba falando as falas em voz alta. O Sensei testemunha tudo, e ela sai correndo do Schale por pura vergonha."
68793642 = "Esperando pela Estreia"
2671887121 = "O Sensei encontra Miyo no caminho de volta de Wild Hunt. Miyo recebeu um convite de uma editora para estrear como romancista e eles vão juntos para a reunião. No entanto, o que foi apresentado era um contrato fraudulento que exigia que ela pagasse todos os custos de publicação. Miyo percebe a farsa e cancela o contrato, mas fica deprimida por seu talento em detectar crimes. O Sensei a encoraja, dizendo que é justamente por ter esse talento que ela pode escolher o caminho certo, e Miyo recupera um pouco o ânimo."
2557024663 = "……Não pode, é?"
3519156172 = "Miyo chama o Sensei para pedir ajuda com o trabalho do Departamento de Comércio Especial. No entanto, havia um segredo por trás disso. Enquanto visitavam lojas de antiguidades, Miyo confessa que, na verdade, só queria ver o Sensei. Ela o convida de forma um tanto insistente e os dois aproveitam um encontro a sós."
2786778582 = "Do Fim do Sonho"
1676221675 = "Cansado do trabalho em Wild Hunt, o Sensei acaba cochilando no Centro de Informações Artísticas. Ao acordar, Miyo estava lá. Embora ela faça beicinho por o Sensei não ter entrado em contato, ela fica feliz por tê-lo encontrado. No entanto, como ela sabe exatamente onde o Sensei está continua sendo um mistério..."
3343832747 = "O que se vê nos destroços"
2179798071 = "No caminho de volta do trabalho, o Sensei se depara com uma explosão. Fuyu estava lá, e descobre-se que era uma performance de arte midiática. Como o Sensei perdeu a apresentação, Fuyu sugere que ele imagine o conteúdo a partir dos destroços. O Sensei entende a intenção e, para compreender a performance, ajuda na limpeza... Fuyu ri e agradece."
2022325598 = "O Doce Preço"
2395350468 = "O Sensei, que procurava por um robô transformável fora de linha, encontra Fuyu por acaso. Como chefe da sala de vendas do Departamento de Comércio Especial, Fuyu assume a tarefa de conseguir o robô. O \"preço\" que ela pediu foi um encontro com direito a refeição, cinema e café com doces. O Sensei aceita prontamente e eles passam um momento agradável. Dias depois, o robô é entregue ao Schale conforme o prometido."
2248687503 = "Tentativa de Recrutamento"
676795709 = "Fuyu aparece no Schale sem estar de turno, alegando ter um \"negócio\". Ela faz uma apresentação entusiasmada para tentar tornar o Sensei um consultor externo do Departamento de Comércio Especial. O Sensei recusa, mas demonstra interesse na proposta de Fuyu de que eles poderiam se ver todos os dias. Embora não tenha conseguido torná-lo consultor, Fuyu parece ter gostado da reação do Sensei."
1930836459 = "O Espaço de Fuyu"
2809147120 = "O Sensei visita a exposição individual de Fuyu e aprecia as obras com a explicação da própria autora. Como o Sensei (e Fuyu) estavam com fome, Fuyu o guia para trás da tela, nos bastidores. É um espaço a sós onde apenas o artista pode entrar. Fuyu tira um bento feito à mão e eles comem juntos."
1502347368 = "A rocha falou!"
4128293753 = "O Sensei estranha o fato de Ritsu, que deveria estar de turno, não ter aparecido. Ritsu estava esculpindo no jardim do Schale, dizendo que \"a rocha pediu\". O Sensei a ajuda carregando-a nos ombros, e eles decidem decorar o jardim com a obra concluída para que muitas pessoas possam vê-la. Ritsu fica feliz, mas ao saber que não escapará do trabalho de turno depois disso, ela fica desanimada."
796096285 = "Isso é mais rápido!"
522223915 = "Ritsu aparece pela janela enquanto o Sensei trabalhava. Ela presenteia o Sensei com uma camisa nova, feita por um amigo, como pedido de desculpas por ter sujado a roupa dele durante o trabalho de escultura anteriormente. Quando o Sensei se troca, Ritsu marca o próximo passeio, dizendo que eles precisam ir comprar calças que combinem com a roupa."
2906320075 = "Sozinha não!"
4216584449 = "O Sensei sai para comprar roupas a convite de Ritsu. Enquanto Ritsu se afasta, um vendedor suspeito tenta empurrar produtos para o Sensei. No entanto, assim que Ritsu volta e é chamada de \"chefe\", a atitude do vendedor muda completamente. O Sensei descobre a influência inesperada que ela tem naquele meio..."
3991968548 = "A sós no subsolo"
1266463055 = "O Sensei visita as ruínas subterrâneas de Wild Hunt a convite de Ritsu. No fundo, estendia-se um reservatório subterrâneo tão belo quanto um templo. Ritsu diz que queria mostrar essa vista ao Sensei. Os dois mergulham os pés na água e passam um tempo tranquilo naquele lugar secreto que ninguém mais conhece."
1176354905 = "Nos vimos de novo, Reisa"
434693070 = "Reisa finalmente consegue o traje de garota mágica que tanto queria. No entanto, a roupa tem um defeito... e Reisa pede ajuda ao Sensei."
3111312789 = "Você é confiável, Reisa"
4144458315 = "Reisa e o Sensei acabam patrulhando um evento exclusivo de garotas mágicas. Os dois aproveitam o evento ao máximo."
28470914 = "Você é fofa, Reisa"
812871968 = "O conteúdo do guarda-roupa de Reisa fica encharcado, e a única roupa que sobra para ela vestir é o traje de garota mágica. Ela vai comprar roupas novas junto com o Sensei."
2150011728 = "Você é esforçada, Reisa"
773207179 = "O zíper quebra novamente e Reisa não consegue tirar a roupa. A hora da patrulha chega e ela é forçada a ir vestida de garota mágica."
1588313903 = "A Brigada Mágica de Trinity"
4130055309 = "Enquanto patrulhava o Schale durante o turno da noite, o Sensei encontra Suzumi no vestiário iluminado, experimentando um traje mágico. Pega de surpresa, Suzumi se justifica dizendo que é uma missão da brigada e pede ao Sensei que guarde segredo."
3941215133 = "Tão deslumbrante quanto imponente"
4143536593 = "O Sensei, descansando no parque, encontra Suzumi cercada por um grupo de delinquentes. Para ajudá-la, o Sensei tem uma ideia inusitada: Suzumi veste o traje e o Sensei finge ser o fotógrafo. Os delinquentes, intimidados pela cena, evitam o Sensei, e os dois conseguem sair do parque em segurança."
1439493213 = "O incidente da granada de luz falha"
276851656 = "Após receberem um relatório de que há delinquentes arruinando um evento de doujin, o Sensei e Suzumi vão ao local. Suzumi leva a sério o conselho do Sensei e aparece disfarçada de Thermite White para uma investigação secreta, tornando-se um sucesso instantâneo. Depois, ao encontrar delinquentes importunando fãs, Suzumi realiza a proeza de esmagar uma granada de luz com as mãos nuas, neutralizando-os instantaneamente."
3995005634 = "O brilho que persegui"
3528511121 = "O Sensei vai a um parque de diversões com Suzumi a convite dela. No entanto, devido a um erro na lavagem, a única roupa que Suzumi tinha era o traje de garota mágica, e ela aparece vestida assim. Depois de aproveitar o parque, Suzumi observa o show de heróis e comenta, com um tom de tristeza, que as pessoas buscam heróis justamente porque eles não existem na realidade. O Sensei diz a ela que a própria Suzumi é uma heroína."
2609778606 = "A visita da capitã"
1761341386 = "Quando Love passa em frente ao Schale e entra em contato, o Sensei sai correndo do escritório e a recebe calorosamente. Preocupada se é seguro ficar com ela, que é uma delinquente, Love ouve do Sensei que ela é, na verdade, uma pessoa gentil, e ele a guia pelo Schale de forma insistente. Embora confusa, Love passa um tempo agradável com o Sensei."
2738523287 = "O peso da capitã"
1476327715 = "Love e o Sensei vão comprar ferramentas para cuidar do capacete. No entanto, a situação se transforma em uma briga com valentões que os abordaram. Love usa suas habilidades impressionantes para derrotar os delinquentes, como colocar uma meia na arma para confundir o oponente ou rebater granadas com um bastão. O Sensei, impressionado com a luta, enche Love de elogios, deixando-a envergonhada."
2583374591 = "A força da capitã"
2742294773 = "O Sensei corre até o mercado negro após ser chamado por Love. Lá, havia uma máquina de venda automática super barata onde se podia comprar suco por 20 ienes. Love paga um suco para o Sensei, mas ela sofre para abrir a tampa dura. Quando o Sensei abre facilmente para ela, Love fica envergonhada por não ter força nas mãos e foge do local."
3932714589 = "A gentileza da capitã"
3081987240 = "Ao encontrar patinhos que caíram em um bueiro, Love os resgata sem hesitar, mesmo se molhando. O Sensei, ao ver sua postura confiável e madura, comenta que ela \"não parece uma aluna\", e Love, levando ao pé da letra, se confunde e entra em pânico. Assim que o mal-entendido é esclarecido, o Sensei aponta que ela ainda está usando o capacete encharcado de água do bueiro, e Love, envergonhada, foge novamente."
2205914050 = "A veterana de todos"
2952764417 = "Ao ver Subaru mediando uma \"discussão\" entre as alunas, o Sensei elogia seu crescimento. No entanto, Subaru confessa que se sente impotente por não conseguir chegar a uma solução fundamental. O Sensei diz que ela pode contar com ele sempre que precisar, mas Subaru brinca dizendo que esse é o \"truque do professor para mimar os alunos\"."
1122650249 = "O primeiro passo"
1189264743 = "O Sensei dá as boas-vindas a Subaru, que está nervosa por seu primeiro turno no Schale. Durante o intervalo, Subaru desabafa sobre sua confusão com o mundo exterior e seus sentimentos complexos de amor e ódio em relação à Trinity. O Sensei a aconselha gentilmente e diz que ela pode contar com ele sempre que se sentir sobrecarregada. Com essas palavras, o fio de tensão que mantinha o coração de Subaru unido se rompe, e ela acaba derramando lágrimas."
3342179099 = "Experiência social"
1014525569 = "Subaru começou a trabalhar em um maid café para aprender sobre a sociedade. Quando o Sensei a encontra segurando uma placa de propaganda, ele providencia para que ela descanse dentro da loja. No entanto, um cliente problemático aparece e começa a incomodar os outros funcionários, mas Subaru o neutraliza instantaneamente usando suas habilidades de combate corpo a corpo. Impressionados com sua destreza, o gerente e os outros clientes a aplaudem. Dias depois, Subaru recebe um bônus."
3576703723 = "Gaita no pôr do sol"
1199266629 = "O Sensei pergunta a Subaru se ela quer alguma coisa e descobre que ela deseja uma partitura de gaita. Eles vão a um shopping e, após conseguirem a partitura, Subaru confessa sua angústia por sempre buscar a \"resposta perfeita\". Encorajada pelas palavras do Sensei, Subaru começa a tocar gaita à beira do rio, ao pôr do sol, apenas para ele."
1525996144 = "A garota que dá tudo de si"
2647108977 = "Para recompensar Subaru por ser gentil demais com seus veteranos, o Sensei a leva a um restaurante familiar. Mais tarde, enquanto passeiam pela cidade, Subaru encontra o Heavy Metal e se sente fortemente atraída por suas letras destrutivas. Quando o Sensei pergunta se ela quer acabar com o mundo, Subaru responde: \"Basta que o Sensei me convença de que este mundo é um bom lugar\", confiando a ele essa prova."
1280647772 = "Objeto de crítica"
2333773019 = "Takane aparece para seu turno no Schale e pergunta se pode fazer uma crítica sobre o Sensei, já que ela gosta de avaliar as coisas que ama. O Sensei responde que, nesse caso, ele também quer conhecer Takane, e eles marcam de ir assistir a uma partida de hóquei no gelo."
961567717 = "Hóquei no gelo"
3723581648 = "Takane e o Sensei vão assistir a uma partida de hóquei no gelo. No entanto, uma briga começa durante o jogo, transformando a partida em um caos total."
1904269452 = "Festival de broto de feijão"
3282413106 = "Takane serve um prato especial para o Sensei. Pela primeira vez em muito tempo, o Sensei saboreia uma refeição que aquece o coração."
2937698410 = "A princesa sob o céu noturno"
4139348446 = "O Sensei e Takane saem para fotografar a aurora boreal e aproveitam para encenar uma peça improvisada sob ela."
2067127778 = "Infraestrutura"
3737878541 = "Yakumo convida o Sensei para um canteiro de obras de equipamentos de comunicação. Lá, o Sensei testemunha em primeira mão as habilidades de negócios de Yakumo."
1618303281 = "Plano de negócios"
3547873849 = "Yakumo chega para seu turno no Schale e propõe um plano de negócios usando as instalações do Schale. O Sensei continua recusando, mas fica impressionado com a riqueza de ideias dela."
638150931 = "Cronograma"
3324191113 = "O Sensei e Yakumo conversam sobre vários assuntos enquanto viajam de trem."
425263812 = "Psicologia da gestão"
172823425 = "Yakumo consulta o Sensei sobre como melhorar as vendas de suas publicações. No meio da conversa, sob a liderança do Sensei que teve um estalo, eles decidem tirar fotos de um Anjo da Neve..."
3182648846 = "Mais uma vez como modelo...!"
2967078244 = "Tsukuyo decide participar de um desfile de moda novamente. A recompensa é um panfleto de um filme de ninja difícil de encontrar. Para recompensar Tsukuyo por terminar o desfile com sucesso, o Sensei a convida para jantar."
3929201993 = "De novo como modelo?"
957721389 = "Tsukuyo é convidada para ser modelo em uma escola preparatória de artes. Como ela não está acostumada a ser modelo de desenho, pede ao Sensei que fique ao seu lado. Para recompensá-la pelo trabalho, o Sensei a convida para comer."
525821709 = "Desta vez é a minha vez...!"
348274659 = "Como agradecimento por toda a ajuda, Tsukuyo usa seu salário de meio período para convidar o Sensei para comer. Embora ela tenha recusado uma oferta de modelo para passar o dia com o Sensei, ela acaba aceitando um trabalho no caminho para ajudar uma garota que encontrou. Ela sorri, dizendo que está feliz por sua altura poder ser útil para alguém."
2323781364 = "A-ajude-me, por favor...!"
955441230 = "Tsukuyo decide que este será seu último desfile de moda. Por causa do nervosismo, ela acaba dormindo demais e decide pegar um atalho para economizar tempo. Embora fique presa em uma cerca no caminho, ela consegue terminar o desfile com sucesso."
1551348262 = "Garota ninja precisa de tratamento!"
1127575116 = "Michiru rasga seu vestido durante a gravação de um vídeo e decide ir a uma costureira. No entanto, como ela ainda estava vestindo a roupa que precisava consertar, tenta pintar tinta diretamente no corpo, como os ninjas das lendas. No final, ela acaba comprando roupas de ginástica nas redondezas para se trocar."
1001116658 = "Garota ninja está envergonhada!"
1730880438 = "Após receber o vestido consertado, Michiru leva o Sensei para fazer compras para verificar se consegue se mover sem problemas. Depois de comprar ferramentas ninja, ela dá ao Sensei uma cápsula de brinquedo como agradecimento. Dentro havia um anel... Michiru fica envergonhada e se esconde."
180243508 = "Garota ninja quer saber o segredo!"
4193845144 = "Para aumentar as visualizações do canal Michiru-chi, Michiru participa de uma sessão informativa suspeita. Ela percebe que é um golpe e tenta ir embora, mas é impedida. O Sensei intervém, salvando Michiru, que decide se esforçar para aumentar suas visualizações de forma honesta."
1544401811 = "Garota ninja está na moda!"
3344102574 = "Ao saber que vídeos com o tema \"moda\" estão em alta, Michiru cria um vídeo combinando ninjutsu e moda. No entanto, as visualizações não aumentam como esperado. Ao verificar, ela descobre que nada foi gravado porque a tampa da lente ainda estava colocada."
868253551 = "O que é um robô maid"
773887947 = "Rio decide modificar o Avant-Garde-kun para fazer as tarefas domésticas. Quando ela sugere que talvez pudesse produzi-lo em massa, o Sensei insiste que \"um robô maid seria melhor\". Rio argumenta que, se ele vestir um uniforme de maid, ele se tornará um robô maid, e o Sensei, ao tentar contra-argumentar, acaba sendo derrotado pela lógica do silogismo dela."
2264036531 = "Monólogo"
2513546491 = "Após terminar seu trabalho no quarto, o Sensei ouve a voz enigmática de Rio dentro da nave de transporte. Curioso sobre o que ela está fazendo, ele espreita e vê Rio usando um HMD e falando sozinha. Ela diz que estava atualizando a nave de transporte. Após esclarecer o mal-entendido de que ela não estava falando com ninguém no espaço virtual, ele ouve sobre o avatar que ela está usando."
2142602582 = "Experimento mental"
3668229248 = "Durante a manutenção dos AMAS, Rio confessa que sempre acreditou que as IAs não tinham consciência própria. No entanto, esse pensamento mudou após conhecer Alice. Depois disso, ela pede ao Sensei para acompanhá-la em um experimento mental e eles compartilham um momento a sós."
1608494230 = "Variável inesperada"
2718709279 = "Rio adiciona uma função de aquecimento ao seu traje e pede ao Sensei para testar o funcionamento. Embora a adição da função não tenha sido um problema, o quarto ficou quente demais, e Rio abre suavemente o decote do traje, dizendo que está com calor."
3220881707 = "Alívio de estresse"
2066240305 = "Kei está se acostumando com seu novo corpo. No entanto, ela está preocupada sobre como aliviar o estresse. \"Não é que eu esteja insatisfeita com este corpo\", murmura Kei, antes de fazer um pequeno pedido: ela quer uma fita para prender o cabelo."
1827657751 = "Bem-vindo a Kivotos"
544438161 = "O Sensei vai à aula de observação da Kei. Durante a aula, Kei demonstra um conhecimento superior ao do próprio instrutor. Quando Kei se questiona se alguém que possui todo o conhecimento do mundo realmente precisa frequentar a escola, o Sensei responde que aprender não se resume apenas às aulas. Ao ser lembrada de que interagir com as pessoas também é importante, Kei decide refletir um pouco sobre isso."
3726540946 = "Missão"
2715974409 = "O Sensei recebe um MomoTalk de Kei pedindo ajuda. Ao chegar apressado, ele encontra Kei sendo mimada pelos alunos do Millennium. Aceita como a irmã gêmea de Alice, Kei começa a se adaptar à vida escolar, embora ainda se sinta um pouco confusa."
1521323340 = "Fora de Controle"
1338830859 = "O Sensei recebe um MomoTalk de Kei reclamando que \"há muitos bugs\". Ao chegar na sala do Clube de Desenvolvimento de Jogos, ele encontra Kei depurando a versão alfa do novo jogo do clube. Assim, os dois começam a trabalhar na depuração, enquanto tentam entender o que Momoi e as outras desejam para o jogo."
2007896298 = "Sobre o ambiente de vida"
3837031192 = "Quando o Sensei visita o Clube de Desenvolvimento de Jogos, ele encontra Kei limpando o local. Kei reclama da capacidade de limpeza dos outros membros e expressa sua preocupação com Alice, que acaba sendo influenciada pelas pessoas ao seu redor. Quando Kei pergunta ao Sensei se ele está limpando tudo corretamente, o Sensei fica sem saber como reagir."
2197644324 = "O crepúsculo que passa"
2760439479 = "Kei visita o Schale para o seu turno. Ela reclama da grande carga de trabalho do Sensei e se oferece para ajudar no turno de amanhã também. O Sensei, como agradecimento, sugere que eles vão às compras. No entanto, ele está tão cansado que sua visão começa a embaçar. Ao ver isso, Kei gentilmente diz ao Sensei para não se esforçar demais."
1595074934 = "Treinamento de Herói"
405265064 = "Alice fica feliz por ter conseguido um novo equipamento. No entanto, como ela ainda não sabe como usá-lo, decide começar um treinamento. Durante o treino, Alice torce o pé, e o Sensei a leva nas costas para casa."
1206023533 = "A cidade inicial"
53651717 = "Quando Alice diz que quer treinar novamente hoje, o Sensei revela que preparou um treinamento especial secreto: jogar videogame enquanto veste a armadura. Entre vários jogos, Alice joga \"Tales Saga Chronicle\" e fica feliz com o resultado do treino, percebendo que não se sente mais nervosa mesmo usando a armadura."
1220509438 = "O significado das diferenças"
940994582 = "A armadura de herói de Alice, a Abi-Eshuh, que passou por inúmeras modificações, começou a apresentar problemas. Após tantas batalhas, a armadura está tão desgastada que talvez não possa mais ser consertada. Alice deseja, de alguma forma, que a Abi-Eshuh seja tão amada quanto a Espada de Luz."
1247641963 = "A hora em que a magia começa"
830455537 = "O Sensei recebe uma mensagem de Alice no meio da noite. Ao olhar para fora da janela conforme ela pediu, ele se depara com um belo céu noturno. Ela diz que queria compartilhar aquela vista com ele. O Sensei e Alice desfrutam de um momento de paz."
2829727388 = "A heroína retornou?"
3540463318 = "O Sensei fica surpreso ao ver Alice vestindo a Abi-Eshuh, que deveria estar destruída. Ela explica que fizeram uma réplica a partir dos fragmentos da armadura original. Embora o desempenho seja inferior ao anterior, Alice sorri, dizendo que o fato de ver tantas pessoas felizes ao vê-la assim já faz tudo valer a pena."
640504906 = "Life Staff (1)"
1047587791 = "Himari decide cuidar do Sensei e começa a modificar parte do AMAS para oferecer suporte. Ela ri, dizendo que não existe ninguém além dela capaz de oferecer um suporte tão atencioso."
544066948 = "Regras e conceitos"
1970386051 = "O Sensei acaba observando Himari fazer a manutenção de sua \"cadeira de rodas\". Quando o Sensei comenta que ela realmente parece uma moto, Himari tenta explicar a diferença entre uma cadeira de rodas e uma moto."
2839455324 = "Sob o mesmo céu estrelado"
3945440914 = "Himari e o Sensei saem para um passeio noturno na \"cadeira de rodas\" recém-revisada. Enquanto correm sob o céu noturno, os dois compartilham um momento secreto."
53718002 = "Life Staff (2)"
1960948734 = "Himari dorme demais e fica deprimida, achando que não serve para ser uma assistente. No entanto, quando o Sensei a consola dizendo que ela pode ser mimada, ela pede vários favores, querendo ser paparicada o dia todo."
4237772262 = "Empregada Perfeita"
1658156830 = "O Sensei fica surpreso com o suporte perfeito que recebe de Toki. Ela explica que, até agora, não interferia muito porque o Sensei conseguia cuidar da própria vida. Porém, devido à \"situação de emergência\", ela está agindo como uma empregada mais perfeita do que o habitual. Para garantir uma assistência impecável, Toki propõe uma escolta 24 horas."
1805231996 = "Hobbies (provisório)"
3531035594 = "Ao retornar de uma missão de reconhecimento, Toki relata que se sentiu reconfortada por animais de metal. Depois, ela fala com entusiasmo sobre a cultura de streaming e gameplays que tem acompanhado recentemente, passando um tempo agradável com o Sensei. O assunto se expande para hobbies e crescimento pessoal... e, sem perceber, Toki acaba adormecendo ao lado do Sensei."
1208888951 = "Upgrade"
364125731 = "Toki entra em contato com o Sensei para dizer que foi \"atualizada\". Ela explica que agora possui uma nova arma. Toki fala apaixonadamente sobre como suas pistolas duplas de energia são a combinação perfeita e sugere modificar seu Arm Gear para disparar como um foguete de energia. O Sensei a impede, dizendo que é perigoso, o que a deixa emburrada. No final, o Sensei acaba a consolando gentilmente."
3590033319 = "Memórias do amanhecer"
3047442248 = "Após terminar o reconhecimento ao amanhecer, Toki chama o Sensei, dizendo que há uma paisagem que ela quer que ele veja. Era um belo nascer do sol. Enquanto observam a vista, Toki pergunta se, caso o \"fim\" chegasse agora, ela seria capaz de ser a \"última\" pessoa ao lado dele. À medida que o amanhecer termina e a rotina retorna, Toki declara novamente: \"Eu estarei ao lado do Sensei\"."
1508081542 = "Claustrofobia de armário"
121840633 = "Yuzu desenvolveu um trauma devido às cápsulas de descida das naves de transporte e às fugas de emergência dos cockpits, o que a deixa inquieta mesmo dentro de um armário. Para recuperar um lugar onde possa se sentir calma, ela entra no armário junto com o Sensei para superar seu medo."
566993182 = "A crise da UZQueen"
4132271700 = "Yuzu diz estar com dificuldades em um jogo de VR que exige movimentação física. O Sensei ajuda Yuzu carregando-a nos ombros para dividir as tarefas, e juntos eles sobem no ranking."
1591579143 = "Torneio de jogos"
1792195982 = "Um jogo muito popular e difícil de encontrar tornou-se o prêmio de um torneio. Como a vitória é decidida em um jogo de VR, no qual Yuzu não é boa, ela decide jogar em cooperação com o Sensei. Eles conquistam a vitória e Yuzu finalmente consegue o novo jogo que tanto queria."
2902368979 = "A salvação do mundo e o gamer"
823660841 = "Yuzu gradualmente se acostuma com o jogo de VR que antes achava difícil. Ela convida o Sensei para o mundo que ela terminou sozinha e onde viu o final. Enquanto conversam sobre como os jogos também são uma realidade, os dois passam um tempo de paz dentro do jogo de VR."
351853014 = "Eficiência e Ineficiência"
2129235531 = "Após ser acordado por ela de manhã, o Sensei acompanha Eimi em seu \"passeio\". Enquanto lutam contra inimigos, os dois conversam sobre o que aconteceu no Continente de Aço. Eimi conta ao Sensei que sua forma de pensar está mudando."
2767044483 = "O que é dado"
328091725 = "Uma noite na região polar. O Sensei, que acompanhava a patrulha de Eimi, acaba sentindo muito frio. Eimi se aproxima dele e diz que é \"equilíbrio térmico\". Explicando que é o ato de influenciar um ao outro para igualar as temperaturas, Eimi sente, mais uma vez, as mudanças em si mesma."
3643082009 = "Interferência"
1339460084 = "O Sensei recebe uma mensagem tensa de Eimi e corre para encontrá-la. Embora tenham se reunido sem problemas, Eimi pede desculpas por ter causado preocupação. Consciente de sua própria imprudência, ela pede ao Sensei que continue cuidando dela."
3089168655 = "Com você e o chocolate quente"
4100335731 = "Guiados por Eimi, os dois observam as estrelas juntos no telhado do navio de transporte. Enquanto bebem chocolate quente, ela conta ao Sensei sua resposta atual sobre as mudanças que tem passado. Pelo menos, Eimi não está mais sozinha; sob o céu estrelado, os dois compartilham o calor um do outro."
757227832 = "Recado da madrugada"
4248235020 = "Ao ir à loja de conveniência comprar um lanche noturno, o Sensei encontra Koyuki. Depois de uma conversa animada sobre pijamas, os dois compram doces e fazem um desvio em um parque à noite. Quando Koyuki começa a ficar sonolenta, o Sensei a acompanha até a porta de seu quarto."
531402134 = "Como se estivesse em casa"
3336463100 = "Koyuki chega para o seu turno vestindo pijama e acaba estendendo um tapete de piquenique para relaxar. No entanto, talvez por se sentir tão à vontade, ela termina seu trabalho num piscar de olhos. Como recompensa, o Sensei sugere que ela fique para jogar videogame."
924427267 = "A lutadora de fliperama"
1729519559 = "Para jogar o novo game antes de qualquer um, o Sensei e Koyuki vão ao fliperama logo cedo. Mesmo usando vários continues, eles não conseguem avançar muito. No caminho de volta, compram a versão para console e se dedicam a zerar o jogo no Schale."
1326515843 = "A queridinha"
2263035390 = "Koyuki, que não estava se sentindo bem, foge do seu quarto e se esconde no Schale. O Sensei decide protegê-la na sala de descanso, apesar de ela insistir que não está resfriada. Após avisar o Seminar, o Sensei cuida dela na sala de descanso do Schale."
3809347529 = "Apresente-se com educação"
919208835 = "Quando o Sensei visita Valkyrie após ser chamado por Konoka, descobre que ela está detida na cela do subsolo. Konoka diz que é um ótimo lugar para tirar uma soneca no agitado Departamento de Segurança Pública, mas um novo oficial, que ainda não a conhecia, confunde a conversa com o Sensei como se fosse uma suspeita fazendo barulho. Apesar das explicações, Konoka acaba sendo contida unilateralmente."
630889152 = "Senso de tempo"
1147060989 = "Naquele dia, a 'sorte' de Konoka dependia de ser pontual. Ela seguiu isso à risca enquanto perseguia o Esquadrão Capacete, e ao chegar o horário de saída, ela foi embora dizendo para eles 'se entregarem'. O Esquadrão aproveitou a chance para fugir, mas no dia seguinte, assim que o expediente começou, Konoka os capturou."
2418914844 = "Aparência de detetive"
2216554313 = "Chamado para um assunto ultrassecreto, o Sensei é levado por Konoka a uma loja de camisas havaianas que ela adora. Enquanto escolhe uma com entusiasmo, ela começa a contar como passou a gostar desse estilo. Depois de conversar bastante, Konoka compra duas 'camisas havaianas com estampa de patinho' e presenteia o Sensei com uma delas."
2954048139 = "Parceiros"
4268064536 = "Seguindo o resultado de uma previsão que dizia que 'seria bom agir com um parceiro', Konoka chama o Sensei. Os dois fazem perguntas pela vizinhança para rastrear um fugitivo, mas não conseguem muitas informações. Acabam sendo pegos pela chuva e precisam se abrigar, mas Konoka parece feliz, dizendo que 'o dia ficou bom porque o Sensei estava ao lado'. É então que o criminoso que eles perseguiam entra correndo no mesmo abrigo."
168308071 = "A recuperação de uma detetive"
3351360879 = "Resfriada, Konoka envia acidentalmente a mensagem de relatório para o Sensei. Preocupado, ele vai visitá-la e ela pede um lámen de tonkotsu com bastante alho. Entre uma conversa e outra, o Sensei cuida de Konoka, que se mostra um pouco mais frágil e quieta do que o habitual, até ela adormecer."
1877482996 = "Tire isso logo!"
84336040 = "Aproveitando uma visita a Wildhunt, o Sensei aceita fazer um favor para Rena. No caminho, ao levantar uma carga pesada, a calça do Sensei rasga. Infelizmente, ele encontra Rena bem nesse momento e, tentando esconder o rasgo, acaba agindo de forma suspeita. Desconfiada, Rena faz o Sensei confessar que há um buraco na parte de trás. Sem aguentar ver a cena, ela faz o Sensei tirar a calça e a costura ali mesmo."
404222347 = "Eu não admito!"
2072434858 = "O Sensei é chamado por Rena para investigar e provar que fantasmas não existem. Eles exploram ruínas à noite baseando-se em lendas urbanas, mas não encontram nenhuma prova definitiva. Dias depois, Rena explica o ocorrido ao Clube de Ocultismo, mas não percebe que o braço do Sensei apareceu em uma das fotos. Ao tentar disfarçar, o Clube acaba se convencendo ainda mais de que fantasmas existem."
278781398 = "Tome, é seu!"
3926285099 = "Após o incidente nas ruínas, Rena decide fazer amuletos de proteção. Ela dá um ao Sensei, mas, por algum motivo, coisas ruins começam a acontecer com ele. Intrigada, Rena verifica o amuleto e descobre que ele estava vazio. Como não pode entregar algo incompleto, ela o troca por outro. Desde então, coisas estranhas pararam de acontecer com o Sensei."
3292372329 = "Um pequeno laço"
222237672 = "Recebendo outro favor de Rena, o Sensei leva materiais de acessórios para Wildhunt. Enquanto faz um grampo de laço, Rena conta que decidiu ser designer de moda depois de presentear uma amiga com um acessório que ela mesma fez na infância. Na hora de ir embora, o Sensei continua usando o laço que Rena colocou em seu cabelo enquanto termina o trabalho do dia."
4173121054 = "Esta é a minha rotina"
759367300 = "Visitando o Millennium, o Sensei vê Akane conversando com um colega de classe em um clima estranho. Ao sair, ele encontra Akane, que o esperava, e decidem voltar juntos. No caminho, ela confessa que tem dificuldade em se relacionar com as pessoas. O Sensei a encoraja, dizendo que não há obrigação de ser amiga de todos, mas que, se ela quiser, ele a apoiará. Assim, a operação 'vamos nos aproximar' de Akane e do Sensei começa."
2673536527 = "Um passo à frente"
2811609032 = "Com base no roteiro que criaram juntos, Akane inicia sua operação para se aproximar dos colegas. Para receber a ajuda do Sensei, ela coloca um rádio minúsculo no ouvido e usa um personagem criado para interagir com os outros. Embora as interações continuem um pouco desajeitadas, o colega percebe a artificialidade. Após explicar o motivo com receio, Akane consegue agir de forma mais natural e passa um tempo agradável."
3944103849 = "Lado a lado"
1930446094 = "Akane convida o Sensei para uma sala de aula vazia. Para mostrar o resultado dos esforços, ela começa uma encenação de 'colega de classe'. Embora tenham brincado no início, Akane acaba chorando e diz: 'Posso fingir, mas não sei quem sou de verdade'. Mesmo assim, ela fala de forma frágil que é feliz por ter alguém especial como o Sensei para compartilhar suas preocupações."
2908734044 = "O melhor método de limpeza"
2828576144 = "Akane consulta o Sensei sobre o fato de seus métodos com bombas estarem ficando repetitivos. Enquanto conversam em um café, os dois são envolvidos em uma atividade terrorista. Os alunos de Valkyrie que chegam não conseguem agir por causa dos reféns. Akane tenta uma solução pacífica, mas como a situação não melhora, ela acaba resolvendo tudo com uma bomba."
2314453101 = "A recomendação da Niko"
2864377608 = "Preocupada com o Sensei, que trabalha até tarde sem comer direito, Niko vai ao Schale levando ingredientes. Quando o Sensei responde 'o que você recomendar' ao ser perguntado sobre o que queria comer, Niko prepara um udon de kitsune."
3319469081 = "As compras da Niko"
3542063046 = "Para realizar a 'operação de suprimentos especiais' do Esquadrão FOX, Niko vai ao supermercado com o Sensei. Assim que a liquidação de fechamento começa, a loja vira um campo de batalha. Desviando dos outros clientes, Niko coloca os ingredientes desejados no carrinho, enquanto o Sensei fica intimidado pelos veteranos de guerra."
722436222 = "O conselho da Niko"
450635337 = "Naquele dia, o Sensei estava exausto devido a uma série de infortúnios. Niko, que veio ajudar no Schale, percebe o estado dele e se oferece para ser sua conselheira. O Sensei acaba desabafando enquanto Niko ouve gentilmente. Quando percebe, seu coração está mais leve."
4084788817 = "A etiqueta da Niko"
2993667495 = "Para gerenciar o estoque do escritório, Niko sugere colocar etiquetas em tudo. Com etiquetas, fica fácil saber quem é o dono, organizar e controlar o estoque, então os dois começam a arrumação. Quando terminam, Niko coloca a última etiqueta que sobrou no Sensei."
1170598127 = "O Inari Sushi da Niko"
653761742 = "Niko pede para usar a cozinha do Schale. Quando o Sensei vai ver como ela está, percebe que, diferente do habitual, ela está fazendo Inari Sushi desde o preparo do tofu frito. Quando o tofu fica pronto após muito esforço, Niko oferece o primeiro pedaço ao Sensei. Depois, os dois comem o Inari Sushi feito por ela."
1951868971 = "A raposa vigilante"
1622411002 = "Kurumi visita o Schale para seu turno. Enquanto trabalham, um cidadão que foi ajudado pelo Sensei traz um presente de agradecimento. Depois que ele vai embora, Kurumi repreende o Sensei por sua falta de vigilância, já que ele nem lembrava quem era a pessoa. O Sensei então pede para Kurumi provar os presentes, chamando de 'teste de veneno'. Enquanto ela experimenta doces caros e perfumes, percebe que está sendo provocada pelo Sensei."
1539676039 = "A raposa sábia"
852804695 = "Por ter aprendido no SRT e assistir a vídeos de dicas práticas, Kurumi conhece vários truques úteis para o dia a dia. Ela resolve rapidamente os pequenos problemas que o Sensei acumulou, então ele decide desafiá-la com um quebra-cabeça difícil. Kurumi se esforça bastante para resolvê-lo."
2213050152 = "Raposa consciente"
3291828447 = "Kurumi visitou uma cabine de fotos na estação para tirar uma foto 3x4. No entanto, talvez devido ao seu treinamento na SRT, ela fecha os olhos inconscientemente toda vez que o flash dispara após a contagem regressiva. Vendo isso, o Sensei usa a câmera do smartphone para tirar uma foto de surpresa da Kurumi. Como a foto ficou boa, ele a leva a uma loja especializada para imprimir a partir do arquivo digital."
1018801245 = "Raposa se arrumando"
2066054702 = "Quando o Sensei visita o QG do Esquadrão FOX, Kurumi está cuidando de seu escudo sozinha. Ela argumenta que, como o escudo do ponto de lança é a primeira coisa que o inimigo vê em uma operação, ele serve como o rosto que representa o esquadrão, por isso ela quer mantê-lo impecável. Ao ouvir isso, o Sensei a presenteia com um adesivo fofo. Kurumi se recusa terminantemente a colá-lo no escudo e, em vez disso, fica pensativa sobre onde deveria colá-lo."
1003943113 = "Raposa que se despede"
3964533583 = "Kurumi encontra o Sensei caminhando por um beco escuro tarde da noite e o adverte por falta de cautela. Ela segura a mão do Sensei e segue em frente, como se estivesse abrindo caminho na escuridão da noite. Quando Kurumi diz que seu papel é seguir em frente mesmo com medo, o Sensei aperta a mão dela com firmeza e diz que a apoiará caso algo aconteça."
825961924 = "Conversa fiada de uma atiradora"
2685659288 = "O Sensei visitou um café recém-inaugurado, mas ficou confuso com o método de pedido excessivamente complexo. Otogi, que estava no local, rapidamente faz amizade com o atendente e ajuda o Sensei com o pedido. Otogi, que tem como princípio aproveitar as oportunidades sem hesitar, consegue se dar bem com qualquer pessoa, o que traz muitas coisas boas, mas às vezes também resulta em provações indesejadas."
4153878308 = "Comunicação via rádio de uma atiradora"
618610602 = "Interessado em ver Otogi se comunicando, o Sensei pede que ela lhe ensine os códigos de voz e fale sobre as gírias das forças especiais. Após ouvir tudo, o Sensei comenta que, embora ache interessante, em sua posição, acredita que é importante ser claro com as palavras para conquistar a confiança dos outros. Ao ouvir isso, Otogi acaba deixando escapar seus verdadeiros sentimentos usando o código de voz."
3691143979 = "A solidão de uma atiradora"
304057056 = "Após ver uma mensagem estranha no meio da madrugada, o Sensei, preocupado, sai à procura e encontra Otogi em um parque. Otogi, que diz visitar o parque para espantar a solidão, acalma seu coração olhando para o poste de luz que pisca. Ela estava em dúvida sobre como lidar com a solidão, mas após conversar com o Sensei, decide continuar seguindo seu caminho atual por mais um tempo."
354077761 = "O uniforme de camuflagem de uma atiradora"
2245221007 = "Otogi convida o Sensei para fazer compras, dizendo que quer comprar um uniforme de camuflagem. No entanto, o destino é uma loja de roupas comum, e o uniforme de camuflagem que Otogi tinha em mente era diferente do que o Sensei imaginava. Otogi explica que, para se misturar à cidade, vestir-se de forma comum é a verdadeira camuflagem. Os dois passam o tempo olhando várias roupas juntos."
201493185 = "A base secreta de uma atiradora"
420529048 = "O Sensei ouve de uma aluna da Valkyrie que ela está investigando marcas estranhas espalhadas por D.U. Mais tarde, pego por uma chuva repentina, o Sensei encontra a tal marca na escada de um viaduto onde se abrigou. Curioso, ele sobe a escada e encontra Otogi. Segundo ela, aquele é seu esconderijo para operações, e a marca serve para marcar território. Sob o viaduto, enquanto chove, os dois passam o tempo tomando café."
2037166503 = "O cotidiano do Clube de Pesquisa Gastronômica (1)"
2983636062 = "Após explodir o refeitório da Gehenna, o Clube de Pesquisa Gastronômica fugia do Comitê Disciplinar. Elas encontram trufas em um parque, mas são presas pelo Comitê Disciplinar que as perseguia, e as trufas acabam sendo confiscadas."
2083342772 = "O cotidiano do Clube de Pesquisa Gastronômica (2)"
1334832385 = "As alunas do Clube de Pesquisa Gastronômica têm suas trufas tomadas pelo Comitê Disciplinar e são colocadas na detenção. O Sensei, que foi parar na mesma detenção por um motivo diferente, acaba sendo mal interpretado pela presidente do Comitê Disciplinar, Hina, por ter recebido a roupa íntima que envolvia as trufas das mãos do clube."
729409175 = "Paladar sem preconceitos"
3942326675 = "O Clube de Pesquisa Gastronômica visita o Veritas da Millennium. As alunas pedem a Hare que examine o estado do paladar de cada uma. Como resultado, é cientificamente comprovado que o sentido do paladar de Izumi é bastante peculiar."
2115387183 = "O incidente do ataque ao Departamento de Merenda"
2992609245 = "As alunas do Clube de Pesquisa Gastronômica visitam o Departamento de Merenda para protestar contra a comida ruim, mas descobrem a situação precária do local. Elas se esforçam para ajudar o departamento, mas acabam apenas atrapalhando Fuuka."
197817924 = "Cleaning&Clearing"
352914431 = "O C&C cumpre qualquer missão com perfeição, mas causa danos consideráveis no processo. Yuuka, a responsável pelas finanças do Seminário, vai até elas para dar uma bronca, mas..."
2026257102 = "Maid&Made (1)"
3467705269 = "Para lidar com um problema que surgiu no centro comercial, o C&C é solicitado a atuar como verdadeiras empregadas, e não como agentes. Neru fica furiosa com tal absurdo, mas já era tarde demais, pois Asuna já havia assinado o contrato."
4112079221 = "Maid&Made (2)"
2175543816 = "Apesar de tudo, o C&C abriu um maid café, que acabou sendo um sucesso inesperado. Como resultado, Yuuka sugere que elas se tornem empregadas em tempo integral, mas..."
3585549647 = "A presidente está sempre certa (1)"
1295817962 = "Certo dia, a caminho do Schale, Cherino testemunha a popularidade de 'Peroro', um personagem da Momo Friends. Com isso, Cherino tem um estalo e ordena que Marina faça 'Peroro' se transferir para a Academia Red Winter."
3552803815 = "A presidente está sempre certa (2)"
360090070 = "Para transferir o inexistente 'Peroro', Marina sequestra Nodoka e a força a vestir a fantasia de 'Peroro'. Após a tortura (?) cruel de Marina, Nodoka acaba tendo que imitar Peroro, mas...?"
1279819101 = "A presidente está sempre certa (3)"
1812920356 = "Marina apresenta 'Peroro (Nodoka vestida com a fantasia)' para Cherino, mas Cherino fica desapontada ao ver que, de perto, a aparência é mais estranha do que imaginava. Marina e Nodoka recebem ordens de expurgo, mas, preferindo não serem expurgadas, as duas decidem dar um golpe de estado."
4232821938 = "GUNS N' PEPPERS (1)"
3961351848 = "As alunas do Clube de Engenharia têm uma ideia absurda: e se instalassem um dispositivo de spray de Tabasco em uma arma? Comentando que essa é a ideia mais inútil de todas, elas começam a fabricação imediatamente."
2227297923 = "GUNS N' PEPPERS (2)"
306427386 = "O Clube de Engenharia consegue modificar a arma, mas percebe que era a submetralhadora que Neru havia deixado sob seus cuidados. Para que Neru não perceba a mudança na arma, Kotori e Hibiki decidem segui-la."
3947244639 = "GUNS N' PEPPERS (3)"
323660726 = "Kotori e Hibiki conseguem usar seu jogo de cintura para evitar que Neru coloque o dedo no gatilho, mas acabam entrando em combate contra o Grupo do Capacete, que guardava rancor de Neru, e a modificação do spray de Tabasco acaba sendo descoberta."
295379881 = "Trouble & Trackers (1)"
3812652621 = "Insatisfeita com o resultado do exame físico, Maki convence Hare e Kotama a hackear o servidor onde os dados acadêmicos estão registrados."
1511095324 = "Trouble & Trackers (2)"
3761143871 = "Usando o dispositivo de interceptação de Kotama e o drone de Hare, Maki consegue hackear o servidor de dados acadêmicos. No momento em que ela estava reescrevendo os registros de acordo com seus ideais, alguém hackeia o servidor por cima do dela. Maki rapidamente transfere os dados do exame físico para outro servidor, mas era o servidor público de redes sociais da escola..."
34701853 = "Trouble & Trackers (3)"
476829342 = "As integrantes do Veritas tentam enfrentar o hacker misterioso, mas decidem fugir ao perceberem que não conseguiriam vencer. Naquela noite, enquanto conversavam com Chihiro, que voltava do Seminário, descobrem que a pessoa contra quem estavam lutando era a vice-presidente do Veritas, que estava bem na frente delas."
120203470 = "Avaliação de gestão sanitária do Departamento de Merenda (1)"
1383531332 = "Dia de gestão sanitária no refeitório da Academia Gehenna. Iori, do Comitê Disciplinar, visita o local no lugar do investigador que teve intoxicação alimentar, e Izumi, do Clube de Pesquisa Gastronômica, também invade o local, deixando o clima no refeitório tenso."
516387156 = "Avaliação da Gestão Sanitária do Departamento de Merenda (2)"
2522148702 = "Apesar da inspeção rigorosa de Iori, o Departamento de Merenda consegue nota máxima na avaliação de gestão sanitária. A higiene parecia estar em ordem, mas logo depois, Iori bebe o suco de laranja (?) feito por Juri e acaba desmaiando devido a uma intoxicação alimentar."
93471046 = "O Fantasma do Andar Vazio (1)"
1430687847 = "Hanae e Serina, que estavam no hospital para atividades voluntárias, ouvem rumores sobre um fantasma no andar vazio do 4º andar. Para acalmar a ansiedade dos pacientes, Hanae sugere descobrir a identidade do fantasma, e as duas seguem para o andar vazio no meio da noite."
2642060983 = "O Fantasma do Andar Vazio (2)"
2770525320 = "A identidade do fantasma que assombra o 4º andar era, na verdade, um ladrão que se infiltrou no hospital aproveitando a confusão. No entanto, sem perceberem, Hanae e Serina começam a disparar suas armas tentando exorcizá-lo, causando um grande alvoroço."
2650108855 = "O Fantasma do Andar Vazio (3)"
3402866614 = "Hanae e Serina finalmente entendem quem é o fantasma. O ladrão tenta roubar o cofre e fugir enquanto as duas estão distraídas, mas o que ele pensava ser um cofre era, na verdade, uma autoclave de alta pressão. Ao tentar abri-lo à força, o ladrão acaba envolvido em uma explosão, sofre ferimentos graves e acaba sendo internado no hospital."
1957853520 = "O Comitê de Preservação da Justiça está de folga (1)"
2774156226 = "O Comitê de Preservação da Justiça partiu em uma missão para resgatar uma aluna de Trinity que havia sido sequestrada, mas, principalmente devido ao descontrole de Tsurugi, acabaram causando traumas como TEPT nos reféns. Ao receber o relatório, Nagisa, do conselho estudantil \"Tea Party\" da Academia Trinity, ordena que os membros do Comitê participem das atividades de outros clubes e círculos durante todo o dia seguinte."
1514304045 = "O Comitê de Preservação da Justiça está de folga (2)"
2293307933 = "Forçadas pelo Tea Party a participar de outras atividades, Mashiro e Hasumi não conseguem se adaptar à atmosfera refinada típica da Academia Trinity e passam um tempo bastante desconfortável. Por outro lado, Tsurugi passa um tempo agradável (?) no Clube de Doces depois da aula e diz que se divertiu muito."
2902345591 = "Reunião Semanal do Comitê Disciplinar"
3509381799 = "Hina e Ako realizam a reunião regular do Comitê Disciplinar como de costume. Os relatórios sobre os vários incidentes que ocorrem na Academia Gehenna parecem não ter fim, deixando Hina exausta."
1347893224 = "A Auditoria Contábil Inesperada que Traz Tempestades"
111000390 = "Makoto, do conselho estudantil \"Pandemonium\" de Gehenna, começa a criar problemas como de costume, resultando em uma auditoria contábil repentina no Comitê Disciplinar. Eles são criticados minuciosamente e o orçamento é reescrito a ponto de não restar nada do original. Enquanto Iroha observa de lado, dizendo que é apenas uma auditoria e uma sugestão, Makoto declara vitória em alto e bom som, mas Hina, ao ouvir a situação, acaba resolvendo as reclamações de forma física."
1561190591 = "O Cotidiano das Estudantes"
1753763599 = "Em busca de doces de edição limitada, as integrantes do Clube de Doces se reúnem em frente ao café. Yoshimi, Kazusa e Airi, que chegaram primeiro, conversam como sempre enquanto esperam por Natsu, mas...?"
175952112 = "O Pós-Aula Delas"
1512342827 = "No caminho de volta da escola, antes de um feriado prolongado, as integrantes do Clube de Doces conversam sobre seus planos. Natsu menciona um plano absurdo como sempre, que acaba sendo ignorado na hora, mas naquela noite, Natsu envia uma mensagem..."
2034339829 = "Quem foi chamado, por favor, permaneça (1)"
2749895310 = "O Comitê de Contramedidas decide ir limpar o lixo do ginásio para um trabalho de meio período encontrado por Ayane. No entanto, ao chegarem lá, são subitamente abordadas por delinquentes, o que leva a um confronto."
857397530 = "Quem foi chamado, por favor, permaneça (2)"
204891356 = "Ayane, que esperava pelos outros membros na sala de aula, recebe um telefonema informando que o trabalho de meio período ainda não começou e que, além disso, estão sendo cobrados por danos causados ao ginásio. Com exceção de Serika, que se desculpou imediatamente, o restante do grupo volta e acaba levando uma bronca de Ayane sem ter como se defender."
888295171 = "Plano de Negócios Insalubre"
635564897 = "Ao ouvir sobre uma oportunidade de negócio de um conhecido, Aru lidera os membros da Problem Solver 68 e visita uma sessão de apresentação de negócios no distrito de Trinity. No entanto, a realidade era um negócio suspeito, e Aru, frustrada por ter perdido tempo, não consegue se conter e destrói o local da apresentação junto com os outros membros."
651331101 = "Vamos lá, Reunião do Comitê Organizador do Festival!"
3714223389 = "Shizuko e Fina iniciam uma reunião para preparar o próximo festival. No entanto, os membros do Clube de Treinamento invadem o local, deixando a reunião um caos."
1192778156 = "Mais uma vez! Reunião do Comitê Organizador do Festival!"
4080246389 = "Em um dia de folga, os membros do Comitê Organizador do Festival se reúnem para a reunião regular. Shizuko rejeita uma após a outra as propostas absurdas. Então, Umika sugere o \"Festival Yanagi\". A ideia toca o coração de Shizuko, e todos começam imediatamente os preparativos para o festival."
2314201138 = "Vamos gravar um vídeo de apresentação do Clube de Treinamento! (1)"
2969367150 = "Para o concurso de apresentação de clubes, Kaede decide gravar um vídeo do Clube de Treinamento. Seguindo o conselho do Sensei, Kaede decide filmar a si mesmas durante suas atividades reais."
117197848 = "Vamos gravar um vídeo de apresentação do Clube de Treinamento! (2)"
854960256 = "Enquanto Kaede filma as outras integrantes durante o treinamento (?), ela acaba fazendo várias coisas que seus veteranos descobrem, resultando em uma bronca de Tsubaki e Mimori."
2764672385 = "A noite é curta, corra, donzela (1)"
3621891441 = "O Sensei, assim como Shizuko e Fina do Comitê Organizador do Festival, recebem uma consulta de Kaede: suas veteranas do Clube de Treinamento, Tsubaki e Mimori, têm saído todas as noites assim que ela vai dormir... Aceitando a sugestão de Shizuko, Kaede interpreta mal a situação e decide seguir as veteranas junto com o Sensei."
2721538548 = "A noite é curta, corra, donzela (2)"
3839830930 = "Kaede e o Sensei seguem Tsubaki e Mimori. Ao ver suas veteranas agindo sem ela, Kaede faz uma cara triste, pensando que talvez ela não seja necessária, mas..."
3115018656 = "O caminho dos jogos começa pelas boas maneiras (1)"
939693077 = "Momoi recebe insultos de um usuário sem educação em um jogo de batalha online. Indignada por não poder deixar isso passar, Momoi vai até um fliperama com os membros do Departamento de Desenvolvimento de Jogos."
1262797320 = "O caminho dos jogos começa pelas boas maneiras (2)"
3551104112 = "O Departamento de Desenvolvimento de Jogos encontra o usuário que insultou Momoi. Momoi desafia o jogador novamente no mesmo jogo, mas perde após ele usar um bug. Ela é ridicularizada novamente, mas Yuzu, ao ver isso, joga em seu lugar e vence de lavada. Ao descobrirem que Yuzu é a lendária jogadora \"UZQueen\", as pessoas ao redor correm em sua direção."
1545900618 = "Brinquedo de Adulto (1)"
2214419213 = "Kokona passa na Xuanwu Commercial para buscar ingredientes para as crianças. Lá, ela recebe de Rumi algo suspeito que Shun teria encomendado. Rumi tenta disfarçar dizendo que é um \"brinquedo de adulto\", mas a escolha das palavras causa um desastre, e o boato se espalha dentro e fora do Plum Blossom Garden..."
4167014609 = "Brinquedo de Adulto (2)"
3860611716 = "Sentindo que estava sendo evitada por todos, Shun descobre através de uma conversa com o Sensei que o boato de que ela comprou um \"brinquedo de adulto\" havia se espalhado. Embora indignada e confusa sobre como a compra de produtos de beleza se transformou em tal boato, ela parte para confrontar a fonte original que ainda está espalhando a fofoca."
633382671 = "Você está presa! (1)"
497768125 = "O Bureau de Segurança Pública geralmente vive momentos de paz. Kirino lamenta que, embora a paz seja boa, ela não terá chance de conquistar méritos e ser transferida para o Bureau de Segurança. Nesse momento, uma ordem de mobilização de emergência é emitida, e Kirino, buscando resultados, e Fubuki, buscando férias, partem secretamente para a ação."
2582496763 = "Você está presa! (2)"
2972853045 = "Kirino e Fubuki chegam ao local antes do Bureau de Segurança, mas enfrentam dificuldades porque os criminosos fizeram reféns e a distância era considerável. No entanto, Fubuki, de olho nas férias especiais, usa sua astúcia e, junto com Kirino, causa uma explosão de poeira para mudar a situação. Acreditando que finalmente conseguirão a transferência e as férias, elas vão triunfantes até o chefe do bureau, mas...?"
1042018394 = "Petição da Classe Especial 227 (1)"
1592688240 = "Nodoka e Shigure, visando retornar ao prédio principal da escola, pedem a Meru, da Frente de Libertação do Conhecimento, que escreva uma \"petição\". No entanto, o conteúdo da petição que ela escreveu parece um tanto suspeito...?"
1372490489 = "Petição da Classe Especial 227 (2)"
360515789 = "Como a petição de Meru seguiu uma direção diferente do esperado, Nodoka e Shigure decidem pedir a outros clubes que a escrevam. No entanto, não importa a qual clube peçam, o resultado acaba sempre sendo um conteúdo estranho. Depois disso, Minori, do Departamento de Obras, que passava por ali, escreve uma petição bem estruturada, mas, no final, Cherino e as outras a confundem com uma \"carta de azar\" e a petição acaba sendo queimada."
677660195 = "E assim, todos se reúnem (1)"
1632709229 = "Após terminarem as gravações de vídeo como de costume, Michiru e Tsukuyo retornam à sala do clube (?). Enquanto as duas se preocupavam sobre como criar um conteúdo ninja melhor, um som inesperado de batidas na porta surge."
3202154650 = "E assim, todos se reúnem (2)"
2201315182 = "Ao ver Izuna querendo entrar no Clube de Pesquisa de Ninjutsu, as duas inicialmente sentem desconfiança. No entanto, ao ouvirem os sentimentos de Izuna, elas se alegram por terem ganhado uma companheira com os mesmos ideais e dão as boas-vindas a ela. O Clube de Pesquisa de Ninjutsu agora conta com 3 membros e recomeça suas atividades."
3431406180 = "O Resquício da Lata (1)"
1074842512 = "Certo dia, durante uma operação, o Esquadrão RABBIT encontra rações de combate por acaso. Sofrendo com a escassez de alimentos, o Esquadrão RABBIT comemora e leva as rações para o acampamento. Porém, naquela noite, Miyu, que estava patrulhando, descobre uma lata de molho de bibimbap de frutos do mar se movendo sozinha."
646029466 = "O Resquício da Lata (2)"
1292050028 = "Ao ouvir o grito de Miyu, os membros do Esquadrão RABBIT correm para a tenda onde as rações de combate estavam guardadas. No entanto, os membros do esquadrão pensam que a história de Miyu sobre a lata ter se movido é apenas cansaço dela e não dão muita importância. Depois disso, a lata de molho de bibimbap de frutos do mar acaba sendo deixada de lado conforme o tempo passa."
2826916122 = "O Resquício da Lata (3)"
374786045 = "Ao atingir a data de validade, a lata de molho de bibimbap de frutos do mar incha devido ao acúmulo de gases, e o Esquadrão RABBIT fica em dúvida sobre como descartá-la. No final, Saki, que recebeu treinamento de desativação de explosivos, decide lidar com a lata, mas, com os comentários dos outros membros do esquadrão, sua concentração é interrompida... No fim, a lata de molho de bibimbap de frutos do mar explode."
3706155076 = "A Prova de Valor (1)"
4095209803 = "Yuuka e Noa, que realizaram o conselho orçamentário do Millennium, começam a analisar várias invenções feitas pelos alunos do Millennium. Quando a barulhenta deliberação acalma, Yuuka encontra uma proposta misteriosa..."
3536363241 = "A Prova de Valor (2)"
4250165067 = "Aquela proposta era o projeto de um dispositivo de previsão desenhado por Himari, o órgão de observação do futuro \"Shin\". Embora desconfiada, Yuuka pensa que seria um desperdício descartá-lo e decide fabricar o órgão de observação do futuro \"Shin\" com seu próprio dinheiro."
4016126250 = "A Prova de Valor (3)"
3435047914 = "Yuuka e Noa finalmente completam o órgão de observação do futuro \"Shin\" projetado por Himari. No entanto, estava longe de ser uma previsão do futuro; era uma máquina de horóscopo. Yuuka, chocada, reclama com Noa, que parecia ter percebido desde o início."
1319446577 = "A Apresentação Especial da Princesa da Música (1)"
2779163313 = "O Departamento Yin-Yang decide realizar uma apresentação no \"Festival de Agradecimento de Hyakkiyako\". Chise declara que \"ela mesma preparará a apresentação desta vez\" e recusa a ajuda de Kaho. Embora tenha decidido deixar nas mãos dela, Kaho, preocupada com Chise, decide segui-la secretamente junto com Niya. Assim, Chise vai às compras e acaba adquirindo itens diferentes das apresentações habituais."
264656570 = "A Apresentação Especial da Princesa da Música (2)"
3433984452 = "Chega o dia da apresentação. Chise faz uma performance diferente do habitual, algo que ninguém poderia prever. Kaho e Niya ficam confusas com a cena, mas a apresentação termina com grande sucesso. No discurso final, Chise revela que todos os adereços usados desta vez foram escolhidos com base no que Niya e Kaho gostam. Diante de Chise, que sorri dizendo \"obrigada por tudo, conto com vocês daqui para frente\", Niya e Kaho ficam emocionadas."
4197282877 = "Balançando com Força Total (1)"
1927725544 = "Rei Nozama, a rebatedora número 4 do clube de beisebol do Millennium, visita o Departamento de Treinamento para buscar uma maneira de conseguir seu primeiro home run."
4187971623 = "Balançando com Força Total (2)"
1058164580 = "Quando Rei começa a questionar o método de treinamento de Sumire, Sumire leva Rei para assistir a um jogo de beisebol como uma visita de campo."
1160121368 = "Balançando com Força Total (3)"
1491957964 = "Após terminar de assistir ao jogo, Sumire diz que o treinamento é uma das jornadas para conseguir um home run. Ao ouvir isso, Rei retoma seu treinamento."
296970736 = "Uma Manhã um Pouco Especial em Shanhaijing (1)"
1725509148 = "Kisaki está fazendo exercícios de alongamento no Parque Byakko. Reijo e Kaguya testemunham a cena. As duas ficam tão empolgadas que acabam entendendo tudo errado..."
2419347030 = "Uma Manhã um Pouco Especial em Shanhaijing (2)"
2827731487 = "Kocona vai até onde Kisaki está passando um tempo com o Sensei. Ela conta que, agora, Shanhaijing está dividida entre a \"Facção Kung Fu\" e a \"Facção Ópera de Pequim\", e uma discussão acalorada está acontecendo."
2670110927 = "Uma Manhã um Pouco Especial em Shanhaijing (3)"
4126214442 = "De manhã cedo, Kisaki vai fazer exercícios de alongamento junto com as crianças do Jardim de Infância Baika. Lá, ela testemunha o confronto entre a \"Facção Kung Fu\", liderada por Reijo, e a \"Facção Ópera de Pequim\", liderada por Kaguya. Após acalmar as duas, Kisaki decide fazer os exercícios de alongamento com todos juntos."
1051527092 = "Banho de Neve"
2252517002 = "O Departamento de Desenvolvimento de Fontes Termais está cavando uma fonte termal em um local remoto. Meg e Kasumi relembram a primeira vez que se conheceram."
3690331433 = "Um Presente?"
3902471118 = "Meg encontra Hina, a presidente do Comitê Disciplinar. Seguindo o que aprendeu com Kasumi, Meg entrega um \"presente\" para Hina... Hina estreita os olhos para o presente e deixa um \"recado\" para Kasumi."
2448188854 = "Nostalgia Estranha (1)"
667882399 = "Em meio a uma carga de trabalho exaustiva, Nagisa desmaia devido à síndrome de burnout. Mika e Seia, vendo isso, levam Nagisa a uma loja de chá em Shanhaijing e iniciam a \"Grande Operação de Refrescamento da Nagi-chan\" para fazê-la esquecer o trabalho!"
3407756720 = "Nostalgia Estranha (2)"
912353483 = "O grupo segue para Shanhaijing no sidecar dirigido por Seia e vai até a loja de chá. Pensando que isso refrescaria a Nagi-chan, a situação apenas piora, com Nagisa enfiando o rosto na cesta de folhas de chá em um estado de semiconsciência..."
2328055038 = "Nostalgia Estranha (3)"
835487577 = "Mika e Seia levam Nagisa, que está desanimada, a um parque para conversar sobre memórias enquanto comem doces. Passando um tempo tranquilo, elas chegam à conclusão comum, mas importante, de que \"coisas dolorosas também se tornarão boas lembranças um dia\", e Nagisa recupera um pouco o ânimo. Mika pensa que talvez fosse bom passar férias longas em uma praia particular da próxima vez..."
1573223017 = "Reunião de Intercâmbio Suspeita (1)"
2145390660 = "Makoto e Iroha, do Pandemonium, visitam a Academia Federal Red Winter sob o pretexto de aprofundar o intercâmbio. Ao encontrar a presidente Cherino, elas tentam executar o golpe de estado que era o objetivo original, mas o plano termina em fracasso. Além disso, Makoto fica impressionada com a atitude de Cherino, que nem sequer se importa, apesar de o golpe ter sido descoberto."
3039169023 = "Reunião de Intercâmbio Suspeita (2)"
24636765 = "O golpe de Makoto termina em fracasso e a reunião de intercâmbio continua como se nada tivesse acontecido. Desta vez, Makoto tenta exibir seu poder, mas falha novamente. No entanto, Cherino, que gostou do espírito de Makoto, decide enviar uma estátua para Gehenna em comemoração à reunião de intercâmbio."
1994595059 = "Thermae Akae (1)"
3322468669 = "Devido a uma série de golpes exigindo melhorias nas instalações de banho, Cherino, sentindo que a reforma era urgente, convocou Nodoka e Shigure e ordenou que elas visitassem as instalações de banho de outras escolas."
1342885926 = "Thermae Akae (2)"
3701930055 = "Nodoka e Shigure partiram para Gehenna, Trinity e a Academia da União Hyakkiyako para investigar a situação das instalações de banho de outras escolas."
3227194453 = "Thermae Akae (3)"
1818357385 = "Sentindo que nenhuma das instalações de banho das outras escolas combinava com Red Winter, as duas decidiram visitar, por fim, as instalações do Millennium Science School."
1746358612 = "Os Dias Brilhantes de Kirara e Erika (1)"
3054966868 = "Kirara está cheia de expectativas por uma juventude brilhante e emocionante. Com isso, ela decide começar um clube, mas..."
1605797610 = "Os Dias Brilhantes de Erika e Kirara (2)"
38972141 = "Kirara e Erika visitam vários clubes da Academia Gehenna. No entanto, como nenhum deles as convenceu, elas chegam à conclusão de criar um novo clube."
2842972630 = "Diário de Operações da Academia Ferroviária Highlander (1)"
3312844632 = "As alunas da Highlander operam a linha circular interna de Kivotos. Embora tudo comece bem, vários problemas surgem para atacá-las... e elas precisam lidar com tudo com muita dedicação."
3052044810 = "Diário de Operações da Academia Ferroviária Highlander (2)"
2036997224 = "Incidentes ocorrem em todos os vagões do trem. As alunas da Highlander, em pânico, esforçam-se ao máximo para cumprir suas responsabilidades como tripulantes."
265151180 = "Um Presente Sem Dono (1)"
2868457916 = "Muitas alunas visitam o Schale hoje também. Sora, da Angel 24, suspeita que o Sensei esteja tentando seduzir as alunas com algum método duvidoso. Nesse momento, ela descobre um objeto esquecido por alguém."
940371248 = "Um Presente Sem Dono (2)"
3815376917 = "Sora prevê que, se tornar o objeto perdido público, causará um grande alvoroço. Ela tenta descobrir de quem é o item observando as alunas que visitam a loja de conveniência."
3248565005 = "Um Presente Sem Dono (3)"
681128818 = "No fim, o dono não foi encontrado e Sora está deprimida. Miyako aparece e lhe oferece um peru assado, contando-lhe sobre o Sensei. Após ouvir os sentimentos de várias alunas pelo Sensei, Sora é visitada por ele na loja, descobrindo que o item que ela guardava era, na verdade, um presente para ela."
85980073 = "Registro de um certo 18 de fevereiro"
3558670453 = "Véspera do aniversário. O Comitê Disciplinar e o Genryumon terminaram de preparar a festa e encomendaram o bolo, restando apenas aguardar a chegada. Os preparativos pareciam estar correndo bem."
293758555 = "Registro de um certo 19 de fevereiro (1)"
2972099243 = "Devido a um erro de entrega, um bolo diferente do encomendado chega ao Comitê Disciplinar e ao Genryumon. Após investigações e troca de informações, descobre-se que os bolos foram trocados. Enquanto buscavam desesperadamente por uma solução, Mina pediu ajuda à Câmara de Comércio Genbu."
2431797238 = "Registro de um certo 19 de fevereiro (2)"
4292864679 = "Com a ajuda de Rumi, a festa de aniversário conjunta de Hina e Kisaki foi realizada em um karaokê no D.U. Os bolos trocados foram devolvidos e entregues aos destinatários corretos. Depois, o Sensei se juntou a elas, e a festa de aniversário inesperadamente conjunta tornou-se um evento animado."
613757486 = "Gastronomia, Biscoitos e Primeiros Socorros (1)"
2018951353 = "Em uma hora de almoço qualquer — o Clube de Pesquisa Gastronômica, faminto, inicia uma busca para fazer com que Fuuka prepare o almoço. Analisando padrões de comportamento e rastros, elas encontram Fuuka, mas o Esquadrão de Primeiros Socorros também está lá — Haruna e as outras acabam entrando em confronto com Mine por causa de Fuuka. Graças aos "primeiros socorros" avassaladores de Mine, as integrantes do Clube de Pesquisa Gastronômica caem uma a uma. Após a batalha, Haruna pergunta por que Fuuka está acompanhando o Esquadrão de Primeiros Socorros, e então..."
932048524 = "Gastronomia, Biscoitos e Primeiros Socorros (2)"
3800725185 = "A verdade é revelada por Mine. Para dissipar rumores perigosos sobre si mesma, Mine queria distribuir biscoitos caseiros em formato de pintinho e pediu ajuda a Fuuka, que encontrou por acaso. Ao ouvir a história, o Clube de Pesquisa Gastronômica se voluntaria como provadores. — Com o suporte de Fuuka, desde as compras até o preparo, os biscoitos de Mine são um sucesso, e Haruna e as outras dão seu selo de aprovação. O Esquadrão de Primeiros Socorros se anima, pensando que todos ficarão felizes... mas, aproveitando a distração, o Clube de Pesquisa Gastronômica amarra Fuuka e foge. Furiosa, Mine começa a perseguir o Clube de Pesquisa Gastronômica com uma energia avassaladora..."
3665793023 = "Um Encontro Repentino (1)"
4079696918 = "Como a academia que costuma frequentar no Millennium está em reforma, Sumire visita outra academia. Lá, ela encontra Akemi, uma aluna que ostenta uma beleza física sem precedentes. Impressionada ao ver Akemi bebendo proteína com elegância e fazendo agachamentos com barra com facilidade, Sumire tenta realizar o mesmo treino ao lado dela."
453049144 = "Um Encontro Repentino (2)"
1591044501 = "Ao acompanhar o treino fora do comum de Akemi, Sumire relembra a sensação de "cansaço" pela primeira vez em muito tempo e sente-se realizada. Após o treino, Sumire e Akemi se apresentam e prometem se encontrar novamente. — Refletindo sobre o ocorrido, Sumire aborda Rei, dizendo: "Se você e aquela pessoa unirem forças, poderemos treinar Rei para ser uma jogadora de beisebol ainda melhor"."
1158681565 = "Aqueles que não se prendem a nada (1)"
3331210092 = "Arata recebe um convite para a "Noite da Trupe Chimi", onde dizem que apenas os verdadeiros membros da Trupe Chimi se reúnem. Não querendo ser subestimada pelos outros participantes, Arata decide procurar uma máscara digna de si mesma."
4277289430 = "Aqueles que não se prendem a nada (2)"
2156611397 = "No caminho em busca da máscara, Arata esbarra com Nagusa, do Comitê de Mediação de Conflitos Hyakka Ryoran, e foge por impulso. O que ela encontra à frente é uma aluna usando uma máscara que Arata nunca tinha visto... era Love."
10885650 = "Aqueles que não se prendem a nada (3)"
1104397844 = "Na "Noite da Trupe Chimi", o líder da trupe convoca uma declaração de guerra contra Hyakka Ryoran, mas Arata questiona essa ideia. Izuna, a pedido de Niya, aparece para impedir o plano, causando um caos no local. Arata consegue escapar e reflete sobre o caminho da Trupe Chimi, mas ao ouvir de Love, a dona do capacete, "Por que você não se diverte normalmente?", seu estado de espírito começa a mudar..."
3455962407 = "Mas a Equipe de Supervisão do Dormitório Continua Correndo (1)"
871924267 = "Posto de controle de Wild Hunt. Seguindo regras escolares rigorosas, os pertences das alunas são confiscados um após o outro. No entanto, uma confusão irrompe quando uma aluna tenta contrabandear a estátua de outra pessoa. Outras alunas aproveitam a oportunidade e o posto de controle entra em estado de motim. Diante do caos, o membro da equipe de supervisão apenas observa os pombos voando no céu."
2447067328 = "Mas a Equipe de Supervisão do Dormitório Continua Correndo (2)"
1005229153 = "O membro da equipe, cansado e dormindo, é acordado por uma convocação de emergência no meio da noite. Eles recebem ordens para ignorar o "Clube de Música de Fundo", que é a fonte do barulho, e perseguir o "Clube de Saída Livre" que está tentando escapar, mas, pouco antes de chegarem ao destino, a missão muda para "Prender o Clube de Música de Fundo". Diante de ordens irracionais que mudam constantemente, a frustração do membro da equipe finalmente explode."
3479531073 = "O Fim da Era Manual (1)"
2308546747 = "Cherino afirma que o supercomputador que viu na Millennium EXPO também existe em Red Winter. Marina, respondendo que irá construí-lo, pede ajuda ao Departamento de Publicações, à Frente de Libertação do Conhecimento e ao Departamento de Obras."
1024274588 = "O Fim da Era Manual (2)"
3417343473 = "O grupo consegue construir um "quase" supercomputador que Cherino desejava. No entanto, era um supercomputador movido a trabalho manual."
3220445133 = "A Melancolia de Misuzu da Prisão (1)"
3116018838 = "Misuzu, como diretora do Departamento Correcional, passava dias ocupados dedicando-se a criar um ambiente propício para a reabilitação. No entanto, durante um breve descanso, ela empalidece ao ouvir que uma tentativa de fuga ocorreu."
2049297372 = "A Melancolia de Misuzu Mine (2)"
448396540 = "Misuzu realiza uma entrevista com uma aluna que planejou uma fuga. Para a aluna problemática, que dizia querer que celebrassem seu aniversário, Misuzu entrega um presente que ela já havia preparado. Tocada pela personalidade gentil da professora, que a aconselha com carinho, a aluna demonstra arrependimento. No entanto, enquanto conversavam, Misuzu relembra os \"prisioneiros\" que causaram o incidente de fuga da prisão."
3751726789 = "Solicitação Especial"
3042602837 = "Momoka, uma executiva do Conselho Estudantil Geral, pede ao Sensei que resolva vários problemas que estão ocorrendo em Kivotos."
1121493691 = "Solicitação Especial: Procurados"
1628093047 = "Momoka, uma executiva do Conselho Estudantil Geral, pede ao Sensei que capture os criminosos procurados em Kivotos que cometeram crimes graves."
2695514106 = "Solicitação Especial: Coleta de Créditos"
2359922886 = "Momoka explica sobre o \"Slumpia\", um parque temático fechado onde se diz que as alunas desaparecem ao entrar."
1519699111 = "Solicitação Especial: Defesa de Base"
3213115598 = "Momoka explica sobre uma fábrica de munições onde a IA entrou em colapso e não pode mais ser controlada."
3377111283 = "Batalha Tática Conjunta"
3612062096 = "Mai, uma repórter da Chronos, entrevista o Sensei antes da Batalha Tática Conjunta."
743398531 = "Total Assault"
1077929972 = "Rin, uma executiva do Conselho Estudantil Geral, explica ao Sensei sobre os fenômenos estranhos que estão ocorrendo por toda Kivotos."
1830280512 = "Binah: O Observador que Compreende a Diferença"
3361479265 = "Um homem suspeito de terno preto fala com o Sensei sobre Decagrammaton e Binah."
3602757600 = "Chesed: O Árbitro que Condena com Misericordiosa Agonia"
1030640525 = "Um homem suspeito de terno preto fala com o Sensei sobre a fábrica de munições abandonada relacionada a Decagrammaton."
2077838684 = "Alegria Replicada"
130280142 = "Maestro explica ao Sensei sobre os fenômenos estranhos que ocorrem no parque de diversões fechado."
3211516616 = "Doutrina Ancestral"
1651668591 = "Maestro fala ao Sensei sobre \"Hieronymus\", criado pela Gematria."
825599009 = "Em direção à base dos Kaitenger!"
3770390420 = "Momoka, do Conselho Estudantil Geral, pede que o Sensei vá até a base dos \"Kaitenger\", criminosos procurados de Kivotos, e impeça o plano deles."
3686001431 = "O Mundo dos Símbolos"
3791549782 = "Decalcomanie e Golconda explicam sobre os fenômenos estranhos que ocorrem na cidade e a \"Biblioteca das Histórias Estranhas Intermináveis\"."
3878829384 = "Hod: Glória Provada pelo Brilho"
1549256127 = "Um homem suspeito de terno preto fala com o Sensei sobre o oitavo profeta de Decagrammaton, \"Hod\"."
654803130 = "O show deve continuar."
333562945 = "No parque de diversões fechado, um espaço desolado sem espectadores, a Amuse Doll continua sua performance. Golconda e Decalcomanie comentam sobre isso, dizendo que, mesmo que não haja público e a arte não seja observada, \"o show deve continuar\"."
559074549 = "Sobre a Imortalidade"
1512825208 = "Maestro fala ao Sensei sobre \"Gregorius\", criado pela Gematria."
744003966 = "Invasores da Praia"
2558815671 = "Momoka explica ao Sensei sobre os prisioneiros que escaparam do Centro Correcional de Kivotos e o incidente do hovercraft."
3432198937 = "O Fim da História de Fantasma"
114297709 = "Kuzunoha fala sobre a \"Gato-Demônio Kurokage\" dos Cem Contos Fantasmagóricos."
1672391118 = "Geburah: O Valente Árbitro que Transcende a Razão"
838031497 = "Momoka parece incomumente ocupada com o trabalho na Sala de Tráfego. Mecanismos autônomos não identificados apareceram na rota polar que atravessa o Mar de Gelo, bagunçando a rede logística, e ela está em apuros por não conseguir nem comer seu salgadinho favorito de sabor mentaiko. Por isso, o Sensei é solicitado a derrotar a máquina autônoma dele — Geburah — para restaurar a rota."
3840529434 = "Yesod: O Purificador de Poder que Domina a Fundação"
4275867406 = "Heine, do Conselho Estudantil Geral, chama o Sensei para investigar o gigante de metal \"Yesod\" que apareceu em um mar sem rotas. Embora diga que enfrentar missões perigosas é um \"treinamento\", Heine está atolada em trabalho administrativo e não consegue se mover. Por isso, ela pede ao Sensei que vá ao local em um navio de transporte preparado por um colaborador misterioso."
3999941498 = "Bem-vindo à loja de conveniência \"Angel 24\"!"
1592333502 = "Sora, a funcionária de meio período, explica sobre a loja."
1001831599 = "O que é a Câmara de Criação"
3598979112 = "Rin, uma executiva do Conselho Estudantil Geral, apresenta ao Sensei a \"Câmara de Criação\" deixada pela Presidente do Conselho Estudantil Geral."
2632538551 = "Exercício de Fogo Conjunto"
2838798800 = "Momoka explica sobre o Exercício de Fogo Conjunto."
1592394928 = "Se houver coexistência e prosperidade, a papelada também fica mais leve?"
3726966875 = "O Sensei encontra Ayumu, do Conselho Estudantil Geral, e eles decidem cooperar um com o outro para ajudar nas tarefas."
225688943 = "Aoi entra em cena"
819574793 = "Aoi, a chefe do Departamento Financeiro do Conselho Estudantil Geral, decide trabalhar junto com o Sensei para aliviar a carga de trabalho de Rin —"
3750154448 = "Grande Batalha"
3893204508 = "Rin e Ayumu, do Conselho Estudantil Federal, pedem ao Sensei que use a sala de operações para ajudar a resolver vários incidentes."
3988903529 = "A Ira de Set"
1759338853 = "O Habitante do Subsolo explica ao Sensei sobre a Ira de Set, uma das constelações dos deuses."
3423238394 = "Chokmah: O Guardião Ancestral que Protege o Reino"
2950291436 = "Um fenômeno anormal ocorreu em um vulcão na região polar de Kivotos. Parece estar relacionado ao Decagrammaton, e Rin nos dá as explicações."
103130404 = "Tiphereth: A Bela Redentora que Elogia o Sofrimento"
3179216409 = "Aoi relata que uma certa estrutura foi descoberta na zona de tundra. Era originalmente um depósito de sementes da Academia Federal Red Winter, mas agora é um local abandonado. No entanto, há muitos pontos suspeitos, como um sinal de socorro emitido intermitentemente pela instalação, contendo frases enigmáticas enviadas por uma IA avançada. Tendo recebido o pedido de investigação, o Sensei parte imediatamente para o local."
2773600499 = "Flores de Cerejeira em Pleno Florescimento, Uma Festa Caótica!"
2374470965 = "Após receber um telefonema repentino da garota-propaganda da tradicional cafeteria \"Hyakkiyako\", o Sensei decide ir ao festival da Academia Hyakkiyako, o \"Festival das Flores de Cerejeira da Primavera de Hyakki\"!\n\rNo entanto, quem estava causando confusão por lá eram garotas problemáticas misteriosas e uma garota ninja!?\n\rUma festa caótica e cheia de confusão está prestes a começar!"
3561592944 = "Prólogo"
2504258673 = "Bem-vindo à Hyakkiyako"
1147478951 = "As Garotas Problemáticas de Hyakkiyako"
4264365936 = "A Garota Excêntrica do Departamento Yin-Yang"
2793434336 = "As Esquisitas do Departamento de Treinamento (1)"
3838238985 = "As Esquisitas do Departamento de Treinamento (2)"
3000959080 = "O Festival Começou"
3372844180 = "O Festival, Sonhos e..."
3484473917 = "A Conspiração Revelada e o que Vem a Seguir"
2442723582 = "Falta Pouco para o Final! (1)"
413276488 = "Falta Pouco para o Final! (2)"
3224400612 = "O Sonho da Garota (1)"
1647650750 = "O Sonho da Garota (2)"
1986321197 = "Cenário de Evento 1"
3345769598 = "Explicação do Evento 1"
3348686378 = "Primeira Entrada no Evento"
3492253253 = "Entrada no Estágio 1"
1440517805 = "Estágio 1 Concluído"
1465188820 = "Entrada no Estágio 2"
3603942106 = "Estágio 2 Concluído"
1470924599 = "Segundo Dia do Evento"
1214793487 = "Cenário de Evento 2"
2287964121 = "Explicação do Evento 2"
3700559824 = "Cenário Preliminar do Evento 2"
538442205 = "Prólogo"
1449222839 = "Após receber um convite de Shizuko para o festival, o Sensei dirige-se ao distrito da Academia Hyakkiyako, onde o evento será realizado. Lá, ele conhece uma garota chamada \"Izuna\" e ouve sobre seus sonhos. Embora ela fique feliz pelo apoio do Sensei ao seu sonho, ela se despede dizendo que precisa cumprir uma \"missão\"."
2868740167 = "Bem-vindo à Hyakkiyako"
3022400054 = "Ao chegar na tradicional cafeteria \"Hyakkiyako\", o Sensei é calorosamente recebido por Shizuko e Pina, do comitê organizador do festival. No entanto, naquele momento, um som de explosão ecoa e o \"Grupo Chimi - Estilo de Rua\" aparece..."
2819599029 = "As Garotas Problemáticas de Hyakkiyako"
3150946652 = "Enquanto lutavam contra o Grupo Chimi - Estilo de Rua, o Sensei percebe a presença de Izuna entre eles. Assim como o Sensei, Izuna também demonstra hesitação, mas acaba recuando junto com o Grupo Chimi. Consultando o presidente da associação comercial, Shizuko decide pedir ajuda a outros clubes com a assistência do Sensei."
1397990433 = "A Garota Excêntrica do Departamento Yin-Yang"
1863239733 = "Para resolver o problema do Grupo Chimi, o Sensei e Shizuko visitam o Departamento Yin-Yang. No entanto, a chefe do departamento não está presente, e quem os recebe é a garota excêntrica \"Chise\". Após receberem o conselho de que \"talvez consigam resolver se forem ao Departamento de Treinamento\", os dois são atacados pelo Grupo Chimi assim que saem às ruas."
1550527487 = "As Esquisitas do Departamento de Treinamento (1)"
2901698646 = "O trio do Departamento de Treinamento aparece para ajudar o Sensei e Shizuko, que estavam sendo pressionados pelo número de membros do Grupo Chimi. Izuna aparece novamente e, declarando que \"vai convencer o Sensei\", desafia-os para uma luta mais uma vez."
2868330061 = "As Esquisitas do Departamento de Treinamento (2)"
1540547905 = "O grupo consegue derrotar o Grupo Chimi e Izuna, mas eles fogem deixando ameaças para trás. Decidindo que não podem continuar assim, o comitê organizador do festival e o Departamento de Treinamento começam a agir para encontrar o mentor por trás da contratação do Grupo Chimi e de Izuna."
2417194596 = "O Festival Começou"
1414862293 = "O grupo começa a agir para encontrar o mentor, mas tarefas inesperadas surgem tanto para o comitê organizador quanto para o Departamento de Treinamento, deixando apenas Pina e o Sensei sozinhos. Quando os dois tentam procurar pelo Grupo Chimi, uma confusão acontece na barraca de recortes..."
3322041533 = "O Festival, Sonhos e..."
2820688883 = "O Sensei reencontra Izuna e eles decidem aproveitar o festival juntos por um tempo. Ele tenta perguntar sobre o empregador dela, mas ela hesita e diz que, como ninja, não pode revelar. Após Izuna partir, como se tivesse calculado o momento exato, o Grupo Chimi aparece diante do Sensei..."
389931609 = "A conspiração revelada e o que vem a seguir"
464929464 = "O empregador de Izuna e do Grupo Chimi era Nyantenmaru, o presidente da associação comercial. Quando Nyantenmaru revelou que planejava arruinar o festival por dinheiro e, além disso, disse que 'usou a brincadeira boba da Izuna para isso', o Sensei o rebateu. Foi nesse momento que Izuna, que tinha ouvido tudo, invadiu o local para tentar ajudar o Sensei."
510483198 = "Falta pouco para o final! (1)"
1070874512 = "No momento em que o Sensei e Izuna foram encurralados, apareceram o Comitê Organizador do Festival e as alunas do Clube de Treinamento. No entanto, Nyantenmaru, que já havia previsto até isso, já tinha convocado o Grupo Chimi de toda a cidade, e o grupo se viu em perigo mais uma vez...!?"
2874004235 = "Falta pouco para o final! (2)"
38247590 = "Quando o trunfo de Nyantenmaru falhou, o Grupo Chimi percebeu que não havia mais esperança e fugiu imediatamente. Diante de Nyantenmaru, que começou a dizer descaradamente 'por que não deixamos isso para lá?', o soco de Shizuko, furiosa, explodiu."
1143447829 = "O sonho da garota (1)"
2258871246 = "Para não deixar que atrapalhem o final do Festival Ouka, o Clube de Treinamento persegue o Grupo Chimi nos bastidores do festival."
1547567664 = "O sonho da garota (2)"
797984036 = "O Festival Ouka chega ao fim com sucesso e muita animação. Como prometido, o Sensei se encontra com Izuna no observatório para verem os últimos fogos de artifício juntos. Embora ela tenha ficado com uma expressão de arrependimento por um tempo, após ouvir as palavras do Sensei, Izuna mostra um rosto radiante, iluminado pelos fogos que explodem no céu."
3841520946 = "A Revolução de Ivan Kupala"
4175786323 = "Cherino convida o Sensei para a Academia Federal Red Winter para o festival de verão 'Ivan Kupala'.\n\rNo entanto, devido a um golpe de estado repentino, Cherino é destituída, mas...\n\rA revolução de Cherino para retomar o cargo de presidente começa!"
2884138175 = "A grande presidente do conselho estudantil"
2171029594 = "O Festival do Solstício tingido pela purga"
3724569825 = "O golpe de estado no início da tarde"
3964673034 = "A face oculta do prédio antigo, a Classe Especial 227"
