2838252716 = "Início da festa (2)"
655972602 = "Primeiro encontro"
1724806434 = "O Sensei [USERNAME] visita a sala da presidência do Pandemonium e ouve a proposta de Makoto."
2663159793 = "Pedido de cooperação"
908793961 = "O Sensei é solicitado a ajudar na 'Festa de Gehenna', realizada todos os anos no Dia dos Namorados. Para consolidar a posição do Pandemonium, Makoto planeja uma festa mais grandiosa que o normal, e [USERNAME] Sensei promete ajudá-la."
178695507 = "Início dos preparativos"
1845184843 = "O Sensei visita o novo prédio do Pandemonium, construído para comemorar a realização da 'Festa de Gehenna'. Nesse momento, o Departamento de Desenvolvimento de Fontes Termais aparece e causa confusão…… O Pandemonium entra em conflito para contê-los."
2683514966 = "Exigência da presidente"
3216219097 = "O Comitê de Disciplina, ouvindo que o Departamento de Fontes Termais causou tumulto, corre para o local, mas eles se dividem em dois e fogem. O Pandemonium tenta culpar Hina pela destruição do novo prédio durante a luta e exige que ela toque piano, o evento principal da 'Festa de Gehenna'."
2188512396 = "Filosofia da presidente"
3111060133 = "O Sensei chega ao local da festa para provar os pratos especiais. Ao ver Makoto dizendo coisas incomuns, pergunta aos outros membros do Pandemonium sobre o estado dela."
2921815513 = "Estratégia de relações públicas da presidente"
3677706014 = "Makoto explica sua estratégia perfeita, mostrando as 'coisas' que preparou meticulosamente para a divulgação da 'Festa de Gehenna'."
1869512390 = "Decisão da presidente"
381782239 = "O Sensei recebe uma mensagem de Iroha. O que encontra na sala da presidência do Pandemonium é uma Makoto diferente do normal. De repente, ela declara a dissolução do Comitê de Disciplina e sai correndo. O Sensei e os membros do Pandemonium a perseguem…… Depois, conseguem trazê-la de volta ao normal."
189252809 = "Dia da festa"
2057531649 = "Faltando apenas algumas horas para o início da 'Festa de Gehenna', Hina ainda não chegou…… Makoto revela que a designou para tocar piano propositalmente, pois sabia que ela não é boa com instrumentos. Animada com o sucesso de seu plano, ela divulga esse fato por toda Gehenna. Assim que a notícia se espalha, incidentes adormecidos em toda Gehenna explodem de uma vez."
2327264408 = "Início da festa"
2904008689 = "Hina chega ao local, resolve todos os problemas de Gehenna em um instante e então começa a tocar piano."
