2270762698 = "Prova de si mesma"
614054421 = "Uma semana antes da Millennium EXPO, a discussão no Tea Party sobre quem representaria a escola estava acalorada. O Sensei, chamado ao Tea Party, intervém na discussão entre Nagisa e Seia, que não cedem. O Sensei apoia Seia, e Nagisa aceita por ser a decisão dele. Seia renova sua determinação de provar a si mesma cumprindo seu papel na Millennium EXPO."
2615717981 = "Divisão de papéis"
966992115 = "Seia retorna ao local da Millennium EXPO com uma missão secreta de Rio. Juntando-se novamente a Asuna e Karin, partem para uma visita ao local."
1651300646 = "Apreensão de Rio"
3047208423 = "Depois que Seia parte, Rio desabafa sua apreensão com Neru. Rio temia os sentimentos de Seia, que lhe pareciam instáveis. Através da conversa com Neru, Rio decide receber a ajuda de Seia, mas não a considerar uma força essencial. Seguindo as instruções de Rio, Neru vai ao Centro de Dados de Millennium."
3737727283 = "Posição e ação"
2960679824 = "Seia decide invadir o local que descobriu após investigação. No entanto, Rio a instrui a ir a outro lugar, pois a luta seria perigosa, e deixa a missão para Neru. Seia contesta, mas Rio é irredutível. Relutantemente, Seia deixa o esconderijo para investigar outro local."
1973363221 = "Dúvida"
1788642461 = "Rio e Neru, que ficaram no esconderijo. Rio se preocupa se fez Seia ficar de mau humor. Neru dá a ela sua própria resposta."
1845854326 = "Sala da Irmã Mais Velha"
2491819470 = "Rio, que considera um erro ter criado o Algoritmo da Irmã Mais Velha, acredita que deveria executar a operação sozinha e pede que Neru e Seia voltem. No entanto, as duas, achando que a infiltração não é adequada para Rio, se opõem e afirmam que irão. Após discussão, Rio cede à proposta delas."
492942250 = "Epílogo"
977105104 = "Com a atuação da C&C, a confusão em torno do Algoritmo da Irmã Mais Velha é resolvida. O grupo conversa animadamente, mas Rio não está presente. Seia e Neru vão ao esconderijo e pedem a Rio, que se prepara para voltar, que fique mais um pouco. Rio promete permanecer em Millennium até o fim da Millennium EXPO."
728313164 = "Patrocinadora"
2490396437 = "Mirai e a Gangue do Capacete são transportadas em um veículo da Valkyrie para algum lugar. Mirai desiste, achando que foi abandonada pelo patrocinador, mas de repente uma voz é ouvida. O veículo para, a porta se abre, e o Sensei Sorridente está ali, dizendo que veio ajudar. Quando Mirai diz que falhou, ele responde que ela cumpriu seu objetivo. No entanto, sem revelar qual era, o Sensei Sorridente vai embora."
