3920080884 = "Decagrammaton é um sistema de inteligência artificial que se autodenomina um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo por todo o Kivotos.\n\nBinah é o terceiro profeta de Decagrammaton e foi observado pela primeira vez no deserto de Abydos. Não sabemos por que Binah apareceu aqui, mas não há dúvida de que é uma existência perigosa demais para ser deixada como está."
3639039230 = "Decagrammaton é um sistema de inteligência artificial que se autodenomina um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo por todo o Kivotos.\n\nChesed é o quarto profeta de Decagrammaton e foi confirmado que assumiu o controle do sistema de produção de uma fábrica de munições nos subúrbios de Millennium. Se Chesed conseguir produzir forças infinitas, Kivotos enfrentará um desastre sem precedentes."
276060001 = "Há relatos de fenômenos estranhos ocorrendo no parque de diversões \"Slumpia\", que faliu devido a dificuldades financeiras. Rumores de que bonecos e atrações que deveriam estar parados começaram a se mover no meio da noite e atacar as pessoas confirmam esses relatos.\n\nO boneco Goz continua seu show solitário no vazio de \"Slumpia\". O que se esconde sob aquele sorriso estranho: o bem ou o mal? Não será fácil para nós adivinhar."
3550217605 = "Uma existência não identificada foi descoberta no subsolo da antiga catedral de Trinity.\n\nEssa existência, \"Hieronymus\", é quem lidera a série de anjos artificiais chamados \"Communio Sanctorum\" (Comunhão dos Santos), e há rumores de que seja um espécime experimental criado pela Gematria com base em doutrinas antigas. Não podemos deixar Hieronymus, com seu imenso poder, à solta. Pela paz de Kivotos, vamos enfrentá-lo!"
2223988532 = "Decagrammaton é um sistema de inteligência artificial que se autodenomina um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo por todo o Kivotos.\n\nHod era originalmente uma IA de unidade de comunicação de Millennium, mas foi hackeada por uma IA desconhecida e agora afirma ser o oitavo profeta de Decagrammaton. Pode-se dizer que é um descontrole de um mecanismo de cálculo que continha a tecnologia de ponta de Millennium. Se não o pararmos logo, a segurança de toda a região de Millennium estará ameaçada."
491740630 = "Como se bloqueasse o caminho para a base, a arma secreta dos Kaitengers apareceu.\n\nParece que os Kaitengers usaram o dinheiro e a tecnologia que roubaram até agora para construir um robô gigante combinado, o \"KAITEN FX Mk.0\". Robôs combinados são fascinantes, mas, considerando suas ações passadas, não podemos simplesmente assistir a isso com diversão."
1866624346 = "Algo gigante e não identificado foi observado nas águas próximas a D.U. De acordo com as informações, parece ter a forma dos bichos de pelúcia da Momo Friends, que se dizia terem afundado no mar há muito tempo.\n\nNão sabemos como isso aconteceu, mas primeiro precisamos impedir seu avanço!"
3601545918 = "Fenômenos misteriosos foram relatados no parque de diversões \"Slumpia\", que fechou há muito tempo devido a dificuldades financeiras. Há rumores de que bonecos e atrações que deveriam estar parados começaram a se mover no meio da noite e atacar as pessoas.\n\nNão sabemos por que os bonecos Shiro e Kuro começaram a se mover novamente, mas está claro que eles estão tentando recriar o desfile do parque de diversões dos tempos áureos."
3682198469 = "Em um templo subterrâneo em ruínas em algum lugar de Kivotos, um anjo artificial manifestado por um mistério distorcido foi observado.\n\nGregorius é a forma final da série de anjos artificiais chamados \"Comunhão dos Santos\" e é um monstro misterioso nascido dos experimentos da Gematria. Até agora, o monstro continua tocando órgão no templo subterrâneo. O que espera no final da melodia... ninguém sabe."
2092560489 = "Recebemos informações de que um dos \"Sete Prisioneiros\" que escapou da Agência Correcional, a \"Raposa da Calamidade\", roubou um hovercraft e está causando destruição.\n\nNão sabemos por que ela, em trajes de banho, está causando destruição indiscriminada, mas se a deixarmos em paz, as praias de Kivotos se tornarão um mar de fogo."
1904549173 = "As \"Cem Histórias de Fantasmas de Hyakkiyakou\", contadas na Academia Hyakkiyakou, se manifestaram.\n\nO \"Gato Fantasma Kurokage\", que perturba os festivais animados, é uma existência real ou apenas uma criação feita pelas mãos de alguém? A verdade é incerta, mas é hora de colocar um fim a essa história de fantasmas antes que a situação se torne irreversível."
1142087454 = "Decagrammaton é um sistema de inteligência artificial que se autodenomina um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo por todo o Kivotos.\n\nA sonda não tripulada da base de pesquisa polar foi hackeada por uma IA desconhecida, e sua forma de autoevolução é Geburah, o quinto profeta de Decagrammaton. Se deixarmos Geburah, que se autodenomina o \"Árbitro\", à solta, não apenas a rota polar, mas toda a rede logística de Kivotos poderá estar em perigo."
3983422512 = "Decagrammaton é um sistema de inteligência artificial que se autodenomina um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo por todo o Kivotos.\n\nYesod é o nono profeta de Decagrammaton e, até o momento, presume-se que não exista uma estrutura base para ele. O propósito de sua criação também é desconhecido, mas uma coisa é certa: não podemos deixar Yesod como está."
