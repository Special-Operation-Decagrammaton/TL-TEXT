1634702664 = "Recupera [c]{param;BasePower}[/c] de HP do striker na linha de frente. Em seguida, troca aleatoriamente com um striker.\n\n\n[c][75b4c0][i]'…… Nagi-chan, está se divertindo?'\n'……? Sim'\n'…… Ainda bem'[/i][-][/c]"
3564159048 = "Compra [c]{param;DrawCardNum}[/c] cartas. Se houver [c]{param;ConditionNum}[/c] ou mais alunos {tag;TeaParty} entre os strikers aliados, compra [c]{param;DrawNumAdd}[/c] cartas adicionais.\n\n\n[c][75b4c0][i]'O senso de Seia-chan é meio brega, né ☆'[/i][-][/c]"
626037564 = "Recupera custo proporcional ao número de strikers {tag;TeaParty} aliados."
