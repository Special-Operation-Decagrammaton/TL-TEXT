3447933575 = "Nós, o \"Grupo de Doces do Pós-Aula\" (2)"
3088286703 = "A fera selada é... (1)"
3139702118 = "A fera selada é... (2)"
374936049 = "Algo para consultar o Sensei"
266683838 = "Certo dia, o Sensei recebe um pedido de conselho de Kazusa, que diz estar sendo perseguida por um stalker. Diante da confissão repentina, ele decide ouvir os detalhes..."
3673151056 = "A pessoa que veio tirar satisfação (1)"
1587917542 = "Enquanto ouvia os detalhes sobre o stalker de Kazusa, uma garota aparece de repente com um 'desafio' em mãos e desafia Kazusa para um 'duelo'."
1489650353 = "A pessoa que veio tirar satisfação (2)"
2956197676 = "A identidade do stalker era Reisa Uzawa, do Comitê de Vigilância. Segundo Kazusa, Reisa é uma idiota cabeça-quente que, desde o ensino fundamental, sai atacando qualquer um que ouça a palavra 'sukeban'. Então, Kazusa mostra ao Sensei uma foto de sua época de ensino fundamental e revela que ela mesma já foi uma sukeban."
2953979966 = "Todo mundo tem um ou dois (1)"
1227345914 = "Quando o Sensei pergunta se foi bom para ela falar sobre o passado, Kazusa responde que é apenas um passado que ela quer esquecer. Ela diz que, como agora é uma estudante do ensino médio, está farta de Reisa trazer à tona coisas do passado o tempo todo. Após levar Kazusa até a escola, o Sensei procura Suzumi, do Comitê de Vigilância, para perguntar sobre Reisa."
3880511578 = "Todo mundo tem um ou dois (2)"
379247669 = "Após receber um pedido de apoio de Reisa, o Sensei vai até lá junto com Suzumi. No entanto, quando chegaram, tudo já tinha acabado. O Sensei diz a Reisa que Kazusa não é mais uma sukeban, mas sim uma estudante comum vivendo sua vida escolar."
1945166588 = "Mesmo que os ingredientes estejam todos espalhados (1)"
259113567 = "O Sensei visita a sala do Clube de Doces após a aula para ver como estão as outras integrantes. Natsu e Airi dizem: 'Não sabemos o que aconteceu entre Kazusa e Reisa, mas isso não muda nossa relação'. Quando soltam um suspiro de alívio, a foto de Kazusa do ensino fundamental cai e acaba sendo vista pelas outras integrantes..."
4050058228 = "Mesmo que os ingredientes estejam todos espalhados (2)"
3821896350 = "O Sensei continua ouvindo os desabafos de Kazusa. Ao saber da conversa com Reisa e que as integrantes do Clube de Doces também descobriram sobre seu passado, Kazusa coloca as mãos na cabeça, desesperada."
697992102 = "Grupo de Doces Depois da Aula? (1)"
25590586 = "Ao saber que Kazusa era uma ex-sukeban, o Clube de Doces Depois da Aula muda o nome para 'Grupo' de Doces Depois da Aula e recebe Kazusa fantasiadas de delinquentes. Ignorando a confusão de Kazusa com a mudança repentina das colegas, Reisa vê a cena e entende tudo errado: ela acha que Kazusa, a 'Cait Sith', mentiu sobre ter parado de ser sukeban e que criou uma nova organização, então ela ataca o Grupo de Doces Depois da Aula."
3920525389 = "Grupo de Doces Depois da Aula? (2)"
3506014961 = "Derrotada na batalha contra o Grupo de Doces Depois da Aula, Reisa desmaia no local. Kazusa diz que sua época de sukeban é um passado que ela quer esquecer e que não quer que toquem no assunto, então ela vai embora. Reisa, que ouviu tudo enquanto estava estirada no chão, fica chocada com as palavras."
2905518164 = "Sobre o passado que quero esquecer (1)"
3687706864 = "O Sensei chama Reisa para conversar sobre Kazusa, mas uma sukeban aparece no caminho de Reisa e do Sensei, tentando extrair informações sobre a 'Cait Sith'."
3914779207 = "Sobre o passado que quero esquecer (2)"
3963225956 = "Reisa derrota a sukeban junto com o Sensei. Ao ouvir as sukebans espalharem o boato de que 'Kazusa está tentando criar uma nova organização', Reisa sente-se responsável. Ela decide proteger a 'comum' Kazusa, deixa o desafio com o Sensei e parte para enfrentar as sukebans que estão chegando."
2675913389 = "Eu odeio idiotas cabeça-quente e barulhentas (1)"
4274647011 = "O Sensei entrega o desafio de Reisa para Kazusa. Embora se sinta aliviada por tudo ter acabado, Kazusa sente um pingo de preocupação e pergunta ao Sensei sobre o paradeiro dela."
4266006947 = "Eu odeio idiotas cabeça-quente e barulhentas (2)"
1092601913 = "Kazusa e o Sensei se infiltram no esconderijo das sukebans para salvar Reisa. Lá, as integrantes do Clube de Doces Depois da Aula também já tinham chegado. Elas invadem o local como o 'Grupo de Doces Depois da Aula' para resgatar Reisa."
3566887939 = "Nós, o 'Grupo de Doces Depois da Aula' (1)"
3175463900 = "Reisa é encurralada. No momento de desespero, Cait Sith e os Quatro Reis Celestiais do Grupo de Doces Depois da Aula entram para ajudar."
854792900 = "Nós, o 'Grupo de Doces Depois da Aula' (2)"
1330585549 = "O Grupo de Doces Depois da Aula consegue resgatar Reisa com sucesso. Kazusa devolve o desafio para a Reisa desmaiada, e todos os incidentes chegam ao fim. O Sensei paga doces para todos que se esforçaram a noite toda."
544026336 = "A fera selada é... (1)"
8928475 = "Com tudo resolvido, Kazusa expressa sua gratidão com um sentimento leve. O Sensei pergunta por que ela parou de ser sukeban. Kazusa ri e diz que, em um dia comum, viu uma garota comendo doces em um café e sorrindo, e pensou que queria ser como ela. Assim, o assunto termina e Kazusa volta a ser uma garota 'comum'."
3396719460 = "A fera selada é... (2)"
3260678421 = "De volta à rotina de sempre na sala do Clube de Doces Depois da Aula, o Sensei e Kazusa encontram Reisa na sala... Reisa, com sua interpretação peculiar, acredita que o Grupo de Doces Depois da Aula está selando a 'Cait Sith' e entrega outro desafio para Kazusa. Seus olhos pareciam, de alguma forma, felizes."
1330006888 = "ON YOUR MARK @ MILLENNIUM"
3761109965 = "A cerimônia de abertura do 'Festival Halo', o maior festival escolar de Kivotos, está a apenas um dia de distância! Será que as estudantes do Millennium conseguirão superar os acidentes inesperados e terminar os preparativos a tempo?"
1252397437 = "Véspera do Grande Festival Esportivo"
1919278635 = "O Meister do Millennium"
4253304983 = "O Hacker do Millennium"
3276166777 = "O Treinador do Millennium (1)"
3544225624 = "O Treinador do Millennium (2)"
4231625923 = "A torcida do Millennium? (1)"
1551337824 = "A torcida do Millennium? (2)"
990654860 = "Associação contra o Festival Halo"
1480833506 = "Um tanque chamado torcida"
143433522 = "O Grande Festival Esportivo para todos"
1757313669 = "Dia do Grande Festival Esportivo"
2470008028 = "Véspera do Grande Festival Esportivo"
2617062401 = "Às vésperas do 'Festival Halo', o maior festival escolar de Kivotos, um robô de torcida quebrou devido a um acidente inesperado. O Sensei, após ser avisado por Yuuka e Noa do Seminar, vai até o Millennium. Enquanto isso, Noa, preocupada com Yuuka que está se esforçando demais nos preparativos, pede ao Sensei que ajude com o Grande Festival Esportivo sem que Yuuka saiba."
845225262 = "O Meister do Millennium"
1370627587 = "Noa e o Sensei visitam o Clube de Engenharia para consertar o robô de torcida quebrado. Ao ouvir a situação, o Clube de Engenharia diz que, com esse nível de dano, o conserto deixaria tudo pronto apenas em cima da hora para a cerimônia de abertura. No entanto, eles garantem que, se construírem um novo robô de torcida em vez de consertar, levaria apenas 3 horas. Deixando o robô de torcida com o Clube de Engenharia, os dois partem para cuidar de outras tarefas."
4262322769 = "Hacker do Millennium"
2239879700 = "Noah e o Sensei visitam o Veritas, o grupo de hackers do Millennium. Inicialmente cautelosos com a visita de Noah, o Veritas acaba se abrindo após ouvir suas palavras sinceras e decide ajudá-la. Enquanto isso, Chihiro avisa aos dois que há vestígios de que alguém tentou hackear os servidores do Millennium..."
3776835865 = "Treinadora do Millennium (1)"
2305382535 = "Noah e o Sensei visitam o Clube de Treinamento para verificar a condição dos atletas. Sumire está se esforçando ainda mais nos treinos com o Festival Esportivo se aproximando. No entanto, as outras alunas que treinavam com ela não conseguem acompanhar sua paixão e acabam desistindo. Com o Sensei sendo o único que restou, Sumire sugere um exercício 'leve'."
1674288483 = "Treinadora do Millennium (2)"
3186889323 = "Em algum lugar da Millennium Science School, uma aluna misteriosa parece estar planejando cancelar o 'Grande Festival Esportivo'—?"
2310867314 = "Equipe de torcida do Millennium? (1)"
3921454463 = "O Sensei e Noah retornam ao Clube de Engenharia para verificar o progresso do robô de torcida. No entanto, o que os esperava eram membros do Clube de Engenharia vestidas como líderes de torcida. Ao perguntarem o motivo, descobrem que, embora o robô estivesse pronto, ele entrou em curto-circuito e fugiu. Ao verificar o projeto daquela época, Noah sugere que alguém hackeou o robô."
3125605064 = "Equipe de torcida do Millennium? (2)"
2812405180 = "Noah e o Sensei visitam o Veritas junto com o Clube de Engenharia, que ainda está com suas roupas de torcida. Após ouvirem toda a história, o Veritas decide verificar se há algum movimento suspeito dentro da escola."
3491008751 = "Associação contra o Festival Esportivo"
3227473772 = "Com a ajuda do Veritas, o grupo descobre as alunas do Millennium que roubaram o robô de torcida. Aparentemente, elas são um grupo de alunas que odeiam esportes e se opõem à realização do Festival Esportivo. As alunas, que vinham realizando vários atos de sabotagem, atacam usando o robô roubado do Clube de Engenharia."
1811732470 = "Um tanque chamado torcida"
1826342970 = "O Veritas e o Clube de Engenharia enfrentam dificuldades diante do 'Truck Crusher', que possui um poder de combate formidável. Nesse momento, graças a uma ideia de Noah, eles conseguem neutralizar o Truck Crusher. A situação vira de repente — e todas as alunas da 'Associação Anti-Festival' escondidas são capturadas por Sumire, encerrando a confusão."
2110629097 = "Um Grande Festival Esportivo para todos"
158795387 = "Eles questionam as alunas da 'Associação Anti-Festival' sobre o motivo de terem tentado sabotar o evento e ouvem suas circunstâncias. Para criar um Grande Festival Esportivo que todos possam aproveitar, inclusive as alunas que não são boas em esportes, Noah e o Sensei decidem ajustar as regras. Depois disso, todos unem forças e correm para os preparativos do festival."
3915786569 = "Dia do Grande Festival Esportivo"
2806214484 = "Yuuka acorda um pouco atrasada e descobre que, enquanto dormia, as outras alunas do Millennium prepararam tudo para o Grande Festival Esportivo. Ela agradece a Noah e ao Sensei... e assim, o 'Festival Esportivo Kourin' tem início sem problemas."
3198922083 = "Get Set, Go! ~Festival Esportivo Kourin de Kivotos~"
2064697458 = "Finalmente começou o Grande Festival Esportivo de Kivotos, o 'Festival Esportivo Kourin'.\n\rVárias escolas se reúnem para competir, mas nos bastidores do festival, há sinais de turbulência...\nQuem será a escola que receberá o sorriso da deusa da vitória?"
3925547749 = "Cerimônia de abertura flamejante"
3108307433 = "Comitê executivo flamejante"
976609379 = "A tentação da área das barracas"
1664788696 = "Corrida de obstáculos turbulenta (1)"
4012907231 = "Corrida de obstáculos turbulenta (2)"
948931625 = "Almoço tardio"
3430109642 = "Patrulha nos arredores"
1160558781 = "Cooperação (1)"
2654285294 = "Cooperação (2)"
2571759110 = "Encontro casual (1)"
3341472815 = "Encontro casual (2)"
1594092657 = "O protagonista do Festival Esportivo Kourin"
3513542657 = "Para todos —"
3604354101 = "Arco do Clube de Pesquisa Gastronômica"
3493330240 = "Arco do Esquadrão RABBIT"
2130549479 = "Arco do Comitê Disciplinar da Academia Gehenna"
1369774585 = "Arco do Clube de Engenharia & Veritas"
2410603120 = "Arco da Ordem de Socorro & Departamento de Medicina de Emergência"
2564006886 = "Arco do Comitê Executivo"
3330937226 = "Cerimônia de abertura flamejante"
2584298955 = "Com a declaração de abertura de Hanako e Ayane, o Festival Esportivo Kourin finalmente começa. No entanto, a declaração de abertura acaba causando uma pequena confusão."
1333557687 = "Comitê executivo flamejante"
309572292 = "Yuuka, Ako, Hasumi e Mari foram escolhidas como representantes de suas escolas para o comitê executivo do Festival Esportivo Kourin. Na sede do comitê, uma discussão surge a partir da declaração de abertura anterior. Em meio a uma atmosfera tensa, cada membro começa suas atividades como parte do comitê executivo."
3733926134 = "A tentação da área das barracas"
3416522998 = "O Sensei, que passeava pela área das barracas, encontra Hasumi durante sua patrulha. Ela comenta que o clima festivo faz com que mais alunas percam o controle. Diante dos dois, Haruna, do Clube de Pesquisa Gastronômica, aparece e oferece milho de uma barraca como um gesto de amizade. Quando Hasumi hesita, preocupada em comer uma 'bomba calórica', Haruna diz que, como tem um metabolismo que não a deixa engordar, nunca se preocupou com isso. Ferida por essas palavras, Hasumi decide derrotar a Academia Gehenna."
1059932753 = "Corrida de obstáculos turbulenta (1)"
121038983 = "Graças ao desempenho do Clube de Pesquisa Gastronômica, a Academia Gehenna saltou para o topo. Yuuka, que não desistiu da vitória geral do Millennium, vê essa informação e decide participar da competição para contribuir, mesmo que minimamente, com a classificação."
3445498865 = "Corrida de obstáculos turbulenta (2)"
1473177672 = "Yuuka acaba participando da 'corrida de obstáculos' no lugar de Yuzu. Ao verificar o bilhete, Yuuka leva o Sensei e cruza a linha de chegada em 1º lugar. Como ela levou o Sensei logo de cara, surgem rumores de que o 'item' que Yuuka precisava pegar era uma 'pessoa amada', mas... como revelar o conteúdo do item resultaria em desclassificação, ela nega de forma fraca."
357458073 = "Almoço tardio"
815055312 = "Após a corrida de obstáculos, o Sensei vai para fora do estádio para almoçar. Lá, ele encontra Marie, que estava guiando e ajudando as pessoas. Como Marie ainda não tinha almoçado, eles decidem fazer um almoço tardio na barraca da Associação Genbu. Durante a refeição, o atendente da barraca se queima, e o Sensei o leva até a base médica conjunta."
44282278 = "Patrulha nos arredores"
2955793294 = "Enquanto o Grande Festival Esportivo esquenta, mais alunos começam a perder a compostura contagiados pela atmosfera festiva. Enquanto Hasumi patrulhava o estádio para lidar com esses problemas, ela ouve de Kirino e Fubuki, da Escola de Polícia Valkyrie, que estavam fazendo a segurança do local, sobre uma pessoa suspeita."
801109073 = "Cooperação (1)"
156824262 = "Com base no que Kirino e Fubuki disseram, Hasumi e o Sensei decidem reunir testemunhos. Enquanto continuam as investigações, Ako, Yuuka e Marie, percebendo que algo estava errado, aparecem para ajudar. Assim, eles descobrem que a pessoa suspeita está na entrada do subsolo do estádio de atletismo. Lá, encontram membros do Departamento de Obras que planejavam um protesto por trabalharem três dias por semana."
3318312354 = "Cooperação (2)"
3358539827 = "No meio da 'Corrida de Obstáculos', membros do Departamento de Obras que fugiam do subsolo e um robô de torcida invadem a pista. Para detê-los, Shiroko dispara um foguete antitanque, o que faz o robô de torcida entrar em colapso e sair de controle... O comitê executivo então parte para resolver a situação."
2375781008 = "Encontro casual (1)"
2738269747 = "O grupo consegue conter a situação com sucesso. Cada um vai cuidar de suas tarefas restantes, e Hasumi volta para sua patrulha. Enquanto patrulha, ela encontra alunas da Academia Hyakkiyako que estão desesperadas por faltar membros para a batalha de cavalaria. Ao vê-las lamentando que perderiam se continuasse assim, Hasumi compartilha uma estratégia com elas."
3141961980 = "Encontro casual (2)"
2552643930 = "Graças à estratégia de Hasumi, a Academia Hyakkiyako vence a batalha de cavalaria. Elas expressam sua gratidão e, desejando lutar juntas novamente, se despedem de Hasumi."
3493720274 = "O protagonista do Festival Esportivo"
66281853 = "Finalmente, o Festival Esportivo chega à sua última prova: o 'Revezamento Interescolar'. A pontuação atual é de empate em primeiro lugar para todas as escolas. Quem vencer este revezamento conquistará a vitória geral do Festival Esportivo. Diante do grande palco final, os corredores âncora de cada escola começam a desaparecer ou anunciar desistências. Foi uma atitude dos corredores em consideração a Hasumi, que não participou de nenhuma competição por estar ocupada com o trabalho do comitê executivo. Incentivada por todos ao seu redor, Hasumi decide correr como âncora."
1506422008 = "Para todos —"
674303561 = "Com as palavras de encerramento de Noa, o Festival Esportivo chega ao fim. Enquanto os preparativos para a festa noturna começam, o Sensei pergunta a Hasumi o que ela achou do festival. Hasumi responde com um sorriso — e nela, parecia refletir-se uma imagem de alguém cujas barreiras entre as escolas haviam se dissolvido um pouco. Assim, Hasumi, junto com os outros membros do comitê executivo, aproveita um chá antes do início da dança de roda."
1088523469 = "Capítulo do Clube de Pesquisa Gastronômica"
842670294 = "O Clube de Pesquisa Gastronômica decide fazer uma comemoração comendo com os 'Vales-Refeição Universais', prêmios do revezamento. Haruna pergunta a Junko se ela se divertiu no festival, e Junko ri, dizendo que, embora tenha se envolvido em várias confusões, foi divertido como sempre. Ao ouvirem que a dança de roda vai começar, o grupo segue para a festa noturna."
601597532 = "Capítulo do Esquadrão RABBIT"
3756768664 = "O Esquadrão RABBIT realiza uma reunião de avaliação do Festival Esportivo. Saki estava deprimida por não ter obtido bons resultados nas competições, mas Miyako ri, dizendo que elas conseguiram proteger a segurança dos cidadãos. Assim, para encerrar o dia, elas seguem para fazer a segurança da festa noturna."
2149728944 = "Capítulo do Comitê Disciplinar da Academia Gehenna"
2439454168 = "Após o fim de todas as competições, Ako finalmente encontra Hina, que havia desaparecido. Hina acalma Ako, que estava preocupada, explica o motivo de sua ausência e ouve como Ako colaborou com outros alunos para resolver vários incidentes enquanto ela não estava. Após conversarem, as duas seguem para a fogueira."
3249747138 = "Capítulo do Departamento de Engenharia & Veritas"
2302245089 = "Utaha vai até Chihiro, que estava terminando um trabalho solicitado pelo Seminário. Enquanto relembram os acontecimentos do festival, Utaha, de forma provocadora, sugere que Chihiro também deveria fazer uma apresentação de líderes de torcida."
3783295464 = "Capítulo da Ordem de Socorro & Departamento de Medicina de Emergência"
3449950515 = "Serina e Sena cuidavam dos pacientes na base médica conjunta. Após o último paciente ir embora, Serina agradece sinceramente a Sena por ter ajudado no trabalho de enfermagem. Depois, Sena pergunta sobre os rumores da 'Ordem de Socorro' que circulam pela sociedade, mas Serina apenas ri de forma embaraçada sem responder e convida Sena para a fogueira."
1795578867 = "Capítulo do Comitê Executivo"
2611143306 = "Após a cerimônia de encerramento, o comitê executivo descansava na sala administrativa tomando chá. Hasumi, enquanto servia chá para Noa, solta um suspiro de alívio dizendo: 'Que bom que o trabalho de hoje terminou bem'. Para ela, Noa sorri de forma enigmática, dizendo que o Festival Esportivo só acaba quando se chega em casa. Nesse momento, o comitê executivo recebe a notícia de que outro problema ocorreu na festa noturna."
1610223773 = "Tendo obtido os 'Vales-Refeição Universais' e aproveitado a comida das barracas, o Clube de Pesquisa Gastronômica relembra os acontecimentos do dia de forma harmoniosa."
2189723464 = "O Esquadrão RABBIT agiu nas sombras para proteger a paz de Kivotos mesmo durante o Festival Esportivo. Qual será o resultado da operação...?"
864400319 = "Após o fim de todas as competições, Ako finalmente encontra Hina. Para Ako, que se esforçou muito na organização do evento, Hina faz uma proposta."
1656654718 = "O Festival Esportivo termina, e alguém visita Chihiro enquanto ela faz a limpeza..."
2150761988 = "Sena e Serina cuidavam dos pacientes na base médica conjunta. Sena aproveita a oportunidade para perguntar sobre os rumores da Ordem de Socorro, mas..."
2425727335 = "Após a cerimônia de encerramento, o comitê executivo aproveita o chá que Nagisa trouxe. Será que o Festival Esportivo terminará em paz?"
2558784607 = "Natal na Catedral ~O Presente da Ordem de Socorro~"
2278050079 = "Mais um ano, o Natal chegou a Kivotos. Um dia sagrado onde todos compartilham a alegria. Vamos dar uma olhada em um dia que parece comum, mas é especial, para a Ordem de Socorro, que continua entregando 'socorro' mesmo em um dia como este!"
3303279140 = "Natal em Kivotos!"
4076463124 = "Segredos e Jardim Secreto"
1002441178 = "Os Miseráveis...?"
2245484717 = "Pesadelo de Natal"
1264887075 = "Expresso de Socorro"
3932256981 = "Guerra Eletrizante"
2189988168 = "Contos da Juventude (1)"
2986184395 = "Contos da Juventude (2)"
3736589523 = "O Morro dos Ventos Uivantes"
1039873231 = "Sonho de uma Noite de Inverno"
2085930861 = "O Cântico de Natal é"
255082210 = "Natal em Kivotos!"
4167041875 = "Em uma manhã de Natal com neve caindo suavemente, o Sensei preparava o voluntariado junto com Serina e Hanae, que vestiam roupas de Papai Noel. Com os preparativos quase prontos, a líder Mine decide partir para patrulhar Trinity. Após se despedirem de Mine, que se juntaria a eles mais tarde, o grupo segue para o local do voluntariado."
606569055 = "Segredos e Jardim Secreto"
942159035 = "No caminho para o local, o grupo ouve que o Comitê de Justiça realizará uma festa de Natal. Serina e Hanae ficam felizes ao saber que o Comitê de Justiça, que sempre enfrenta tantas dificuldades, consegue aproveitar o Natal."
2280920957 = "Os Miseráveis……？"
3046061777 = "Apesar de ser o dia de Natal, Hasumi, Tsurugi e Mashiro, do Comitê de Justiça, estavam confrontando delinquentes em um beco. Após encurralá-los, elas recuperam o \"tal item\". Os delinquentes, com seus planos arruinados, avistam o Sensei e o Esquadrão de Socorro a caminho de um trabalho voluntário e sorriem maliciosamente, tendo uma ideia."
3517655244 = "Pesadelo de Natal"
3684306682 = "O Sensei e o Esquadrão de Socorro distribuíam presentes e arrecadavam doações. Nesse meio tempo, um delinquente ferido que passava pelo local alega que o Comitê de Justiça roubou seu precioso frango, e então――"
1420301580 = "Expresso de Socorro"
2915910172 = "Serina e Hanae, ao ouvirem sobre o triste incidente dos delinquentes, sentem-se angustiadas com o fato de que existem pessoas que não conseguem ser alcançadas pelo seu socorro. Ao saber da situação, Mine lamenta sua própria incompetência e parte imediatamente para onde o Comitê de Justiça está realizando sua festa de Natal."
186128367 = "Guerra Eletrizante"
34322318 = "O Comitê de Justiça estava aproveitando uma pequena festa de Natal em um café alugado. Enquanto desfrutavam de um breve descanso, esquecendo-se da correria do dia a dia, Mine, do Esquadrão de Socorro, aparece para tirar satisfações sobre o caso dos delinquentes. Diante de uma Mine que saca sua arma sem nem ouvir explicações, Tsurugi e Mashiro são forçadas a revidar."
3152503825 = "História dos Jovens (1)"
486440598 = "Com a chegada de Mine para protestar, um estrondo ecoou pelo local da festa de Natal do Comitê de Justiça. Hasumi, ao ouvir a confusão, também aparece, mas irritada por não conseguir conversar com Mine, decide entrar no combate."
847967838 = "História dos Jovens (2)"
3387101415 = "Durante a luta, Hasumi finalmente descobre por Mine o motivo do ataque. Quando ela começa a dizer que tudo não passa de um mal-entendido, um terceiro intruso aparece."
1131207087 = "O Morro dos Ventos Uivantes"
230232017 = "O grupo do Esquadrão de Socorro descobre pelo Comitê de Justiça a confusão causada pelos delinquentes. Tudo girava em torno dos delinquentes tentando forçar a venda de um \"Frango Hellfire\" super apimentado que ninguém queria comer. Ao entenderem a situação, o grupo une forças para subjugar os delinquentes."
3422854071 = "Sonho de uma Noite de Inverno"
3002551130 = "Relembrando a série de confusões, o Esquadrão de Socorro pede desculpas sinceras. Hasumi sorri, dizendo que não há problema já que o mal-entendido foi resolvido, e convida o grupo para participar da festa de Natal. Assim, todos aproveitam a festa juntos."
1167819476 = "O que é o Coral de Natal"
3350329729 = "O grupo participa da festa de Natal, conversando alegremente. Não restava mais nenhum sinal da melancolia de antes. Embora tenha sido um dia com muitos acontecimentos, terminou com flores de sorrisos desabrochando."
3515690501 = "Diante da Oferenda ~Primeira Disputa~"
3302268299 = "Perto do fim do ano. O Clube de Pesquisa Gastronômica, que finalmente encontrou um restaurante renomado chamado 'Suzume-tei', descobre que o local está à beira do fechamento... A caótica história de reconstrução do restaurante, tecida pelo Clube de Pesquisa Gastronômica e Fuuka, começa agora!"
440741347 = "A Crise do Suzume-tei"
2014113057 = "Precisamos de ajuda! (1)"
3230130893 = "Precisamos de ajuda! (2)"
1696756168 = "Cozinha da FUUKA"
2667165645 = "Não pense que venceu com isso!"
566217637 = "Vocês, plebeus, não entenderiam!"
127547267 = "A conta, por favor"
3477833704 = "Esgotado? Não pode ser... (1)"
2369816745 = "Esgotado? Não pode ser... (2)"
3251772521 = "Então é um duelo! (1)"
2176704328 = "Então é um duelo! (2)"
1909338217 = "Última Resistência"
142563952 = "A determinação dos dois"
3798038720 = "O dia do destino"
311979596 = "Feliz Ano Novo!"
3328829686 = "A Crise do Suzume-tei"
955896544 = "Em um dia próximo ao fim do ano, o Clube de Pesquisa Gastronômica desfrutava de uma refeição no Suzume-tei. Mal tiveram tempo de comemorar por terem encontrado um restaurante renomado, quando descobrem que o Suzume-tei está prestes a fechar e que Haruna e as outras seriam as últimas clientes... Enquanto todos lamentam o fechamento, Haruna diz ter uma ideia brilhante...?"
1617718142 = "Precisamos de ajuda! (1)"
2315750929 = "A ideia de Haruna era pedir ajuda externa. Após sequestrar as duas do Departamento de Merenda e o Sensei, Haruna expõe a situação crítica do Suzume-tei e pede cooperação. O grupo decide ir ao restaurante para entender a situação, mas acaba encontrando o Grupo dos Capacetes atacando o Suzume-tei."
1371253993 = "Precisamos de ajuda! (2)"
1803161784 = "Após conseguirem repelir o Grupo dos Capacetes Gourmet, o grupo ouve os detalhes da dona do Suzume-tei. A maioria das lojas da rua comercial se tornou franquia e passou a oferecer comida barata, tornando impossível para o restaurante continuar operando. Em meio a um clima de desistência, Fuuka decide reconstruir o Suzume-tei."
1402169835 = "Cozinha da FUUKA"
1367178329 = "Para melhorar a gestão do Suzume-tei, é essencial encontrar fornecedores mais baratos e de alta qualidade. Fuuka apresenta o Piyo Super, que elas costumam usar, e dá dicas de como dar um toque especial aos pratos. Enquanto passavam o tempo em harmonia, o Grupo dos Capacetes Gourmet retorna――"
3044075053 = "Não pense que venceu com isso!"
3641325415 = "O Grupo dos Capacetes Gourmet, derrotado por Haruna e as outras, descobre que ela é membro do Clube de Pesquisa Gastronômica e, tremendo de medo, chama reforços. E, sem querer, deixam escapar que vieram ali sob ordens da Nyao Foods――"
503504063 = "Vocês, plebeus, não entenderiam!"
2331290713 = "Nyaomoto Kan, presidente da rede de restaurantes \"Nyao Shokudo\" e da Nyao Foods, estava preocupado com o destino do Suzume-tei. Por outro lado, a dona do restaurante, ao saber que o Grupo dos Capacetes Gourmet eram capangas da Nyao Foods, diz que não quer mais que lojas individuais enfrentem grandes corporações e estava prestes a aceitar a franquia. Fuuka, Haruna e as outras a convencem de que isso não é o certo e propõem realizar uma degustação do novo Suzume-tei."
279525189 = "A conta, por favor"
220690413 = "Fuuka e Juri realizam uma degustação gratuita do Suzume-tei na rua comercial. Embora a reação dos transeuntes tenha sido positiva, o problema da faixa de preço incompatível ficou evidente. Para rever os preços, o grupo decide procurar fornecedores ainda mais baratos."
2062962546 = "Esgotado? Não pode ser... (1)"
1711061225 = "Juri, que visitou o centro comercial para comprar ingredientes, é informada de que todos os estabelecimentos foram esvaziados pouco antes de sua chegada e acaba sendo dispensada. Diante delas, surge o Grupo Gourmet de Capacetes, ordenando que parem de se intrometer."
929096310 = "Esgotado? Não pode ser... (2)"
3987649773 = "Ao questionar se o esquema não era grandioso demais para falir apenas uma loja individual, elas são informadas de que o objetivo era servir de exemplo para as outras lojas do centro comercial. Estabelecimentos como o Suzume-tei, que ainda não haviam caído sob a tutela da Nyao Food, viam o Suzume-tei como um pilar de apoio. O grupo decide que não chegará a lugar nenhum dessa forma e resolve invadir a sede da Nyao Food."
1175748688 = "Então é um confronto! (1)"
1142871206 = "Haruna, após ouvir a situação de Izumi e Akari, decide invadir a sede da Nyao Food — de olho na culinária que a aguarda após essa batalha."
1909478340 = "Então é um confronto! (2)"
3240831599 = "O Clube de Pesquisa Gastronômica invade a sede da Nyao Food e devora todo o estoque de ingredientes. Devido aos danos excessivos, o presidente Nyaomoto convoca o grupo para uma reunião. No entanto, como a conversa não chega a lugar nenhum, eles decidem resolver a situação com um duelo culinário entre o Suzume-tei e a Nyao Food."
3591620024 = "Encurralados"
974434577 = "Ao contar a Fuuka que aceitou o duelo culinário contra a Nyao Food, ela demonstra sua raiva, perguntando quem diabos vai cozinhar. Haruna pede desculpas a Fuuka e fala sobre suas convicções. Fuuka, embora incrédula, decide ajudar. Enquanto isso, Juri, que foi comprar ingredientes, acaba sendo alvo de sabotagem da Nyao Food..."
2678284265 = "A determinação de ambas"
3660850508 = "Às vésperas do confronto, Haruna e Fuuka conversam. Suas convicções, a ansiedade pelo duelo e o que virá depois — se não fizerem nada, acabarão apenas assistindo ao fechamento das lojas. Impulsionada pelas palavras de Haruna de que não quer que isso aconteça, Fuuka renova sua determinação."
3490177281 = "O dia do destino"
2871705816 = "No dia do duelo de Osechi, a equipe de reportagem da Escola Chronos também aparece, e o local fica agitado. Qual será o destino do Suzume-tei, que, sem se deixar abater pela sabotagem da Nyao Food, preparou cuidadosamente 400 porções de Osechi?"
3479689653 = "Feliz Ano Novo!"
1405977639 = "Assim, o grupo, vitorioso no duelo de Osechi, pôde receber o Ano Novo com o coração leve."
1729485909 = "Batalha de Conquista do Sanctum da Ilusão"
3698844736 = "Os preparativos para o ataque total estão prontos.\n\rA operação conjunta, que decidirá o destino de Kivotos, começa agora."
479048084 = "Início da guerra"
3385057805 = "1º Sanctum (1)"
2921918964 = "1º Sanctum (2)"
1778548478 = "2º Sanctum (1)"
2806499752 = "2º Sanctum (2)"
3882617728 = "3º Sanctum (1)"
4156139343 = "3º Sanctum (2)"
1510442744 = "4º Sanctum (1)"
1710453242 = "4º Sanctum (2)"
336904442 = "5º Sanctum (1)"
2115531998 = "5º Sanctum (2)"
1031963534 = "Nova crise"
4032767953 = "6º Sanctum (1)"
3804708545 = "6º Sanctum (2)"
3515445627 = "Sanctum Final (1)"
1128013375 = "Sanctum Final (2)"
2627451797 = "Início da guerra"
3717557940 = "Finalmente, todos os preparativos terminaram e a contagem regressiva para o ataque total começa."
79803409 = "1º Sanctum (1)"
405922630 = "O Comitê de Contramedidas de Abydos e a Problem Solver 68 de Gehenna enfrentam o guardião do 1º Sanctum, \"Binah\"."
1036568694 = "1º Sanctum (2)"
84229587 = "Rin anuncia que o primeiro Sanctum foi destruído."
3495136884 = "2º Sanctum (1)"
238076545 = "Neru e Tsurugi enfrentam \"Chesed\" antecipadamente, mas as tropas de Decagrammaton não diminuem. Nesse momento, as forças de apoio da Academia Federal Red Winter se juntam a elas."
3210330755 = "2º Sanctum (2)"
13226435 = "Momoka anuncia que o 2º Sanctum foi destruído."
1137998478 = "3º Sanctum (1)"
2168406679 = "O Esquadrão RABBIT, o Departamento de Desenvolvimento de Jogos e Hina enfrentam os guardiões do 3º Sanctum, \"Shiro & Kuro\"."
1053949562 = "3º Sanctum (2)"
3924457115 = "Ayumu anuncia que o 3º Sanctum foi destruído."
2787217231 = "4º Sanctum (1)"
1707137688 = "Junto com o Esquadrão Arius e a Irmandade de Trinity, elas enfrentam o guardião do 4º Sanctum, \"Hieronymus\"."
333221986 = "4º Sanctum (2)"
2706734115 = "Rin anuncia que o 4º Sanctum foi destruído."
2631317245 = "5º Sanctum (1)"
340881145 = "Com o foco no Seminar de Millennium e no Departamento de Desenvolvimento de Fontes Termais de Gehenna, eles enfrentam o guardião do 5º Sanctum, \"Hod\"."
2418033867 = "5º Sanctum (2)"
3029067251 = "Momoka anuncia que o 5º Sanctum foi destruído."
2341911236 = "Uma Nova Crise"
2665319081 = "Após a conquista de todos os 5 Sanctums, uma reação de energia de altíssima concentração surgiu novamente dos Sanctums destruídos. Para a batalha final no 6º Sanctum, o grupo precisará conquistar novamente os 5 Sanctums que já haviam sido superados."
673842062 = "6º Sanctum (1)"
1721508695 = "Hifumi e Azusa, que se juntaram ao Clube de Pesquisa de Gastronomia, enfrentam o guardião do 6º Sanctum que apareceu no Distrito D.U. Shiratori, \"Perorodzilla\"."
1977881858 = "6º Sanctum (2)"
815268323 = "Eles anunciam que a conquista de todos os Sanctums da Falsidade foi concluída."
2321323365 = "Sanctum Final (1)"
3607360132 = "Embora todos os 5 Sanctums tenham desaparecido, fica claro que a energia está concentrada no 6º Sanctum. Com o confronto decisivo no \"Sanctum Final\" se aproximando, o destino dependia da arma secreta que Himari trouxe."
177965272 = "Sanctum Final (2)"
2772661126 = "Foi confirmado que o último Sanctum também foi destruído com sucesso."
1060292091 = "Batalha de Ocupação da Arca de Atra-Hasis"
3294063434 = "A invasão da Arca foi concluída com sucesso e a \"Batalha de Ocupação da Arca de Atra-Hasis\" tem início. Uma batalha feroz contra o motor dimensional e seus guardiões――\nO que será que aguarda no fim desta luta...?"
3752910329 = "Início da Batalha de Ocupação da Arca de Atra-Hasis"
2983472095 = "Área Externa 1 (1)"
3593650445 = "Área Externa 1 (2)"
689731982 = "Área Externa 2 (1)"
2782949061 = "Área Externa 2 (2)"
3944473468 = "Área Externa 3 (1)"
860485384 = "Área Externa 3 (2)"
1687674760 = "Área Central (1)"
3981582768 = "Área Central (2)"
3483774196 = "Início da Batalha de Ocupação da Arca de Atra-Hasis"
1938729585 = "O Sensei, que invadiu o interior de Atra-Hasis, inicia a Batalha de Ocupação da Arca de Atra-Hasis, composta por 4 áreas no total."
2670665318 = "Área Externa 1 (1)"
4103831752 = "Ao chegar ao motor dimensional da Área Externa 1, o grupo se depara com o \"Guardião Sem Nome\" diante do \"Motor Dimensional\" e, também, com Shiroko."
1869140165 = "Área Externa 1 (2)"
718897357 = "O Sensei derrota o motor dimensional da Área Externa 1. Shiroko desaparece usando um portal, e o Sensei segue em frente para a próxima área."
142065983 = "Área Externa 2 (1)"
552979162 = "O Sensei chega ao motor dimensional da Área Externa 2. Ele começa a lutar contra Shiroko, que apareceu novamente."
1552548637 = "Área Externa 2 (2)"
1441383735 = "O grupo consegue destruir o motor dimensional da Área Externa 2 com sucesso. Momentos antes de Shiroko desaparecer, o Comitê de Contramedidas de Abydos tenta falar com ela, mas a resposta é lenta... Hoshino parece ter notado que algo está estranho com Shiroko――?"
3357284552 = "Área Externa 3 (1)"
2935213673 = "No motor dimensional da Área Externa 3, o Sensei e o Comitê de Contramedidas de Abydos ficam frente a frente com Shiroko. No entanto, eles são informados de que sinais de Shiroko foram encontrados em outros lugares――? O grupo acaba lutando contra Shiroko, que entrou em modo de combate novamente."
1153672197 = "Área Externa 3 (2)"
2270336526 = "O motor dimensional da Área Externa 3 é destruído e Shiroko desaparece novamente. Yuuka, que estabeleceu comunicação através da invasão da Área Central, anuncia que encontrou Shiroko na Área Central. Ao ouvir isso, o grupo se prepara para salvar Shiroko."
1599539974 = "Área Central (1)"
233514433 = "O Sensei, diante do último motor dimensional, inicia o combate."
2048501130 = "Área Central (2)"
1622078419 = "Finalmente, o grupo consegue destruir todos os motores dimensionais e a sala de controle. E, com isso, eles também conseguem resgatar Shiroko na Área Central."
2774711706 = "Batalha Decisiva contra Phrenapates"
2260445960 = "Após terminar a \"Batalha de Ocupação da Arca de Atra-Hasis\", o Sensei consegue se reunir com Shiroko em segurança. Mas não foi tão simples quanto apenas voltar para a superfície. Diante do Sensei, surge uma Shiroko de outra forma e o Guia do Cromatismo.\nSerá que eles conseguirão voltar para a superfície em segurança?"
1889277103 = "Batalha Decisiva contra Phrenapates (1)"
3545837120 = "Batalha Decisiva contra Phrenapates (2)"
3968015415 = "Batalha Decisiva contra Phrenapates (3)"
3060058839 = "Batalha Decisiva contra Phrenapates (4)"
770204793 = "Batalha Decisiva contra Phrenapates (5)"
1503148094 = "Batalha Decisiva contra Phrenapates (6)"
1138064459 = "Batalha Decisiva contra Phrenapates (1)"
653632133 = "Arona explica ao Sensei sobre a outra Shiroko e a batalha contra Phrenapates."
743188901 = "Batalha Decisiva contra Phrenapates (2)"
1768446809 = "A Shiroko de outra linha temporal anuncia o início da batalha."
3559357232 = "Batalha Decisiva contra Phrenapates (3)"
175380778 = "Após o sucesso do Sensei em derrotar Shiroko e Phrenapates, os membros do Comitê de Contramedidas de Abydos chegam. Ao vê-los, Shiroko cai em prantos."
671174902 = "Batalha Decisiva contra Phrenapates (3)"
1506582050 = "A Academia Abydos de outra linha temporal, onde todos, exceto Shiroko, perderam a vida. Diante de uma Shiroko à beira da morte, a luz do Cromatismo desce e os Sacerdotes Sem Nome tentam fazer contato. Diante dela, surge o Sensei, gravemente ferido. Embora ela tente atacar o Sensei seguindo as palavras dos Sacerdotes Sem Nome, ela não consegue puxar o gatilho final; em seu lugar, o Cromatismo desce sobre o Sensei — e Phrenapates, levantando-se novamente, concentra todo o poder da Arca em si mesmo."
2619612699 = "Batalha Decisiva contra Phrenapates (3)"
2390720928 = "Com a energia da Arca concentrada em Phrenapates, a situação é desesperadora: se a 'sequência de autodestruição' não for ativada imediatamente, tudo será em vão. Usando a 'sequência de fuga', todos escapam — mas Rin e Ayane permanecem no local para dar suporte ao Sensei."
520943432 = "Batalha Decisiva contra Phrenapates (4)"
949507711 = "Rin e Ayane preparam o canhão principal de Utnapishtim — e, após o disparo, instruem o Sensei a evacuar todos os alunos o mais rápido possível."
3111223626 = "Batalha Decisiva contra Phrenapates (5)"
3111014573 = "Tendo conseguido derrotar Phrenapates com sucesso, o grupo envia os alunos de volta à superfície, um por um, antes que seja tarde demais."
2526989395 = "Batalha Decisiva contra Phrenapates (6)"
2908349328 = "Por fim, restam apenas Shiroko, o Sensei e Phrenapates — o Sensei sorri, dizendo que o sofrimento das crianças é responsabilidade dos adultos — e Phrenapates deixa para trás o pedido para que cuide de seus alunos, ao que o Sensei responde."
299397497 = "Trabalho de Restauração: Distrito D.U. Shiratori"
3012757111 = "Mesmo com a situação resolvida, a paisagem urbana ainda não recuperou sua forma original. Vamos avançar com o trabalho de restauração e reconstruir Kivotos!"
1414477413 = "Trabalho de Restauração: Distrito D.U. Shiratori"
4290341434 = "Trabalho de Restauração: Distrito D.U. Shiratori"
4223089116 = "Ayumu pede ao Sensei que ajude no trabalho de restauração do Distrito D.U. Shiratori."
2801215367 = "Carta de Aviso Alva ~A Mansão da Vaidade e o Local da Estética~"
1887536367 = "Momoi recebe um pedido de 'limpeza' em um fliperama. O cliente a confunde com Neru da C&C — sem perceber o erro, Momoi e o Departamento de Desenvolvimento de Jogos aceitam o trabalho, vestem uniformes de empregada e decidem agir como a C&C. Será que eles conseguirão concluir a missão?"
1667151392 = "Porque sou uma empregada compreensiva"
2521381729 = "Super Tornado Momoi!"
1600936965 = "Vamos começar a 'limpeza'"
2871478550 = "Um coração sem relógio"
1087686957 = "Permita-me cumprimentá-los, pyon"
2312504772 = "Céu limpo com nuvens, alerta de ladrão fantasma (1)"
3937317585 = "Céu limpo com nuvens, alerta de ladrão fantasma (2)"
3178137179 = "Primeiro, vamos seguir em frente"
2595670890 = "Este é um jogo perigoso (1)"
3973772140 = "Este é um jogo perigoso (2)"
2344802928 = "É apenas temporário. Lembre-se disso"
3143319570 = "Transferência de propriedade (1)"
846542461 = "Transferência de propriedade (2)"
730349569 = "Prestem atenção. Este é um momento importante (1)"
2014891151 = "Prestem atenção. Este é um momento importante (2)"
671097288 = "Um final feliz, para sempre!"
3442837570 = "Porque sou uma empregada compreensiva"
510833711 = "O Sensei visita Toki e pede emprestado um uniforme de empregada. Diante de uma Toki que acredita que o pedido se deve a um hobby peculiar do Sensei, ele se justifica dizendo que é necessário para o Departamento de Desenvolvimento de Jogos."
2289114652 = "Super Tornado Momoi!"
4088623042 = "Momoi, embriagada pela vitória em um jogo de luta no fliperama, é abordada por um cliente. Ele a confunde com Neru e pede uma 'limpeza' — embora fosse um engano, Momoi conclui que qualquer um pode fazer uma 'limpeza' e vai com o Departamento de Desenvolvimento de Jogos até a mansão do cliente."
1237674640 = "Vamos começar a 'limpeza'"
1506195559 = "Ao chegar à mansão, o grupo descobre pelo cliente, Doda, que a 'limpeza' é, na verdade, uma missão de segurança. Doda recebeu uma carta de aviso do 'Ladrão Fantasma da Benevolência'. Sem encontrar uma oportunidade para recusar o pedido, o grupo acaba se envolvendo na história."
84635995 = "Um coração sem relógio"
4176362338 = "A infame 'Ladrão Fantasma da Benevolência', que dizem ser uma das Sete Prisioneiras e que sempre rouba o que anuncia — sua carta de aviso era composta por enigmas. O grupo se dedica a resolver o mistério de qual seria a obra de arte que a ladra pretende roubar."
3651845091 = "Permita-me cumprimentá-los, pyon"
3112171913 = "Além da missão de segurança, o Departamento de Desenvolvimento de Jogos foi encarregado de suas funções originais como empregadas. Elas cometem vários erros por não estarem acostumadas com o trabalho, mas são ajudadas por Toki, que estava lá para uma investigação secreta. Quando a festa começa a se acalmar, a \"Ladra da Benevolência\" aparece conforme prometido na carta de aviso."
641300786 = "Céu limpo, depois nublado, alerta de ladra (1)"
346595300 = "Toki e a \"Ladra da Benevolência\" se encaram — e o combate começa."
1938916768 = "Céu limpo, depois nublado, alerta de ladra (2)"
2618230775 = "O Departamento de Desenvolvimento de Jogos entra na briga e, no momento em que estão prestes a capturar a \"Ladra da Benevolência\", uma bala perdida atinge Midori, fazendo-a perder o equilíbrio. A \"Ladra da Benevolência\" salva Midori enquanto ela cai e desaparece. Apesar de suspeitarem de suas ações, o grupo se reagrupa."
4214486051 = "Primeiro, vamos seguir em frente"
2810244228 = "No segundo dia da missão de segurança, o grupo reforça a vigilância. O Sensei recebe uma voz misteriosa, revelando que o Departamento de Desenvolvimento de Jogos está sendo enganado por Doda. Percebendo que não veem Doda desde o segundo dia, o grupo decide decifrar o enigma da carta de aviso novamente."
2608851286 = "Este é um jogo perigoso (1)"
1080193779 = "O Departamento de Desenvolvimento de Jogos descobre o leilão secreto de Doda. O local é um ponto de encontro do submundo para negociar itens roubados — e Doda envia robôs de segurança contra o grupo."
3706077377 = "Este é um jogo perigoso (2)"
2305043594 = "Embora encurralem Doda, o Departamento de Desenvolvimento de Jogos acaba em desvantagem numérica contra os reforços. Diante delas, surge uma ajuda inesperada: a própria \"Ladra da Benevolência\", que enviou a carta de aviso. Com o Sensei propondo uma aliança, o grupo começa a trocar informações."
3468612492 = "É apenas temporário. Lembrem-se disso"
3726366994 = "Toki diz que o Departamento de Desenvolvimento de Jogos deve se retirar, mas elas insistem que, como Toki também é uma aliada, querem completar a missão juntas até o fim. Entendendo a determinação delas, Toki decide formar uma aliança temporária com a \"Ladra da Benevolência\" e começa a planejar o plano definitivo."
2014548109 = "Transferência de propriedade (1)"
3648276839 = "Com o sinal da \"Ladra da Benevolência\", o Departamento de Desenvolvimento de Jogos e Toki iniciam a operação. Em seus olhos, havia um pouco de confiança."
2610667190 = "Transferência de propriedade (2)"
1496006338 = "Conforme o plano, o Departamento de Desenvolvimento de Jogos garante a \"Coroa do Rei do Relógio\" e consegue deter Doda. Nesse momento — a \"Ladra da Benevolência\" rouba a coroa do grupo."
198039531 = "Prestem atenção. É uma cena importante (1)"
3349629814 = "O grupo não consegue esconder a decepção com a traição da \"Ladra da Benevolência\". A aliança foi descartada em nome de sua estética. Com sentimentos amargos, elas apontam suas armas para recuperar a Coroa do Rei do Relógio."
701936984 = "Prestem atenção. É uma cena importante (2)"
2074113746 = "O grupo consegue recuperar a Coroa do Rei do Relógio com sucesso. No entanto, a \"Ladra da Benevolência\" escapa por pouco. Doda, que fugiu na confusão, é capturada pela verdadeira C&C que chegou ao local, encerrando a série de eventos."
3393474672 = "Que o final feliz dure para sempre!"
1914900203 = "Ao se encontrarem com a C&C, o grupo temia levar uma bronca de Neru. No entanto, Neru diz \"bom trabalho\", e o incidente chega a um verdadeiro desfecho. Enquanto isso — Akira, a \"Ladra da Benevolência\", reflete calmamente sobre as palavras do Sensei."
1780431255 = "Longwu Tongzhou ~Imaginando um futuro~"
2035835876 = "A Xuanlongmen, que valoriza a tradição, e a Associação Xuanwu, que preza pela evolução.\nAs duas facções opostas existem sobre um equilíbrio de poder precário como os dois grandes grupos de Shanhaijing.\nNesse meio tempo, uma suspeita infundada é lançada sobre a Associação Xuanwu — será que o grupo conseguirá superar essa crise?"
105833273 = "Hospitalidade ao convidado"
3908032195 = "Delícias de Shanhai"
1029944882 = "O início de tudo (1)"
934950936 = "O início de tudo (2)"
1102560672 = "Preparação meticulosa"
921130191 = "Encontro perigoso (1)"
2600560302 = "Encontro perigoso (2)"
4193384880 = "Inferência lógica"
3035053537 = "Mente aberta"
1299793663 = "Acelerar o passo"
689011525 = "Eliminar o mal e restaurar a justiça"
1637251735 = "Arrependimento e correção"
2524793568 = "Banquete completo"
1970524499 = "Hospitalidade ao convidado"
2209149049 = "Enquanto o Sensei trabalhava no Schale como de costume, ele recebe um convite especial de Lumi, a presidente da Associação Xuanwu — e o Sensei parte em direção a Shanhaijing."
3176729408 = "Delícias de Shanhai"
2719359088 = "O Sensei é recebido com uma farta refeição caseira na Associação Xuanwu por Lumi. Apesar de ser um prato delicioso, por algum motivo, o restaurante está vazio e deserto. Ao perguntar o motivo, descobre que a Xuanlongmen, o conselho estudantil de Shanhaijing, lançou suspeitas infundadas sobre a Associação Xuanwu. O Sensei e Lumi decidem ir tirar satisfações com a Xuanlongmen."
1555531508 = "O início de tudo (1)"
3083141341 = "O Sensei visita a Xuanlongmen para discutir a \"Controvérsia do Ginseng de Dez Mil Anos\" que envolve a Associação Xuanwu. No entanto, ele fica perplexo ao ser confrontado com o ginseng dentro de uma caixa de papelão da Associação Xuanwu. Tentando limpar o nome delas, o grupo começa a procurar o verdadeiro culpado, mas os membros da Xuanlongmen bloqueiam o caminho."
912183531 = "O início de tudo (2)"
4285669364 = "Tendo conseguido afastar os membros da Xuanlongmen, o grupo segue em frente para falar com alguém que entenda sobre o ginseng de dez mil anos."
3704157144 = "Preparação meticulosa"
3667868691 = "O grupo visita Saya, do Clube de Pesquisa de Alquimia, para obter informações sobre o ginseng. Saya tenta se esquivar, dizendo que não quer se envolver nos conflitos de Shanhaijing, mas, ao saborear a comida de Lumi, ela deixa escapar um \"monólogo\" revelador."
3320570305 = "Encontro perigoso (1)"
3177457099 = "Com base no \"monólogo\" de Saya, o grupo chega ao Monte Kunlun. Lá, eles encontram um visitante inesperado."
372117891 = "Tigre na Toca, Lobo no Encontro (2)"
3546938718 = "Após a batalha contra Mina, a chefe do Departamento de Execução da Genryumon, o grupo pergunta por que ela estava esperando ali. Ela explica que, sabendo que o Ginseng de Dez Mil Anos só poderia ser colhido no Monte Kunlun, ela deduziu que os culpados viriam até lá para destruir as evidências. Ao conversar com ela, o grupo consegue pistas sobre o criminoso."
499336354 = "Entender um para compreender três"
1674497975 = "O grupo finalmente descobre a extensão total do incidente do vazamento do Ginseng de Dez Mil Anos. O método utilizado era transformar as crianças do Jardim das Ameixeiras, um local de extraterritorialidade dentro de Shanhaijing, em transportadoras. Após ouvir as crianças no Jardim das Ameixeiras, o Sensei propõe um plano para resolver o caso."
1613439579 = "Mente aberta e sincera"
1595560658 = "O grupo entra em ação para preparar uma \"armadilha\" e resolver o caso. Lumi desabafa seus sentimentos para o Sensei e decide seguir em frente. Uma sombra observa tudo de longe."
1896039253 = "Apressar o cavalo veloz"
834551465 = "O corretor do Ginseng de Dez Mil Anos que caiu na \"armadilha\" era um executivo de baixo escalão da Genryumon. Diante do corretor, que confessa ter se envolvido no contrabando para arrecadar fundos e incriminar a Mina, além de ter difamado a Associação Genbu, o grupo se une e pega em armas. Foi o momento em que os corações das alunas, que pertencem a organizações normalmente rivais, se tornaram um só."
3287427825 = "Destruir o mal e revelar a justiça"
1843046059 = "O grupo vence a batalha contra o corretor do Ginseng de Dez Mil Anos. No entanto, elas não passavam de peões de outra pessoa. Sentindo a presença de um dos Sete Prisioneiros, o \"Macaco das Cinco Poeiras\", Saya interroga o corretor, mas não consegue chegar ao mentor por trás de tudo. Com o nome limpo, a Associação Genbu exige um pedido de desculpas de Mina."
977104468 = "Abandonar o mal e retornar ao bem"
3026969621 = "E assim, o incidente do vazamento do Ginseng de Dez Mil Anos, que abalou Shanhaijing, foi resolvido. Após receber um pedido de desculpas formal de Kisaki, a Associação Genbu é encarregada de preparar os pratos para o banquete. Embora nem tudo tenha sido resolvido, o grupo aceita o pedido com um sorriso, pensando em dissipar a ansiedade das outras alunas."
3857900118 = "Banquete completo"
229515679 = "Como diz o ditado \"depois da tempestade vem a bonança\", a Associação Genbu e a Genryumon desfrutam de um banquete luxuoso, como se estivessem preenchendo o abismo criado pelo \"incidente do vazamento do Ginseng de Dez Mil Anos\"."
40908383 = "Operação Especial de Verão! O Esquadrão RABBIT e o Mistério do Camarão Desaparecido"
2721341247 = "Em um dia de verão abafado, os membros do Esquadrão RABBIT, que comiam suas marmitas de conveniência como de costume, percebem que os camarões sumiram das refeições recentes. Decididos a investigar o paradeiro dos camarões, eles decidem se infiltrar em uma vila de pescadores disfarçados de turistas. Será que o Esquadrão RABBIT conseguirá recuperar os camarões em segurança?"
2738681454 = "O camarão desaparecido"
58368520 = "Trajes de banho fofos e uma vila inquietante"
1176265223 = "A sombra da vila de Yotoura"
2322828772 = "Tabu"
3013262397 = "Aquele que vagueia na escuridão"
473736447 = "Terror desconhecido"
1216354736 = "Céu após a névoa"
170093504 = "Churrasco da madrugada (1)"
3995974815 = "Churrasco da madrugada (2)"
718466590 = "Sombra suspeita"
3337165522 = "Coelho na água"
1057642642 = "Limpando o convés (1)"
2724919361 = "Limpando o convés (2)"
405509144 = "É uma entrega!"
3924969069 = "O camarão desaparecido"
3736953745 = "Ao perceber que os camarões sumiram das marmitas recentes, o Esquadrão RABBIT decide ir até a vila de pescadores para investigar o paradeiro, seguindo a sugestão do Sensei, que trouxe sorvetes de presente."
1943580014 = "Trajes de banho fofos e uma vila inquietante"
184007341 = "Para investigar o mistério do desaparecimento dos camarões, o Esquadrão RABBIT decide se infiltrar na vila de Yotoura, disfarçando-se de turistas que vieram para nadar. Cada uma veste seu traje de banho e entra na vila."
2581052701 = "A sombra da vila de Yotoura"
2832724995 = "Ao chegar na vila, o grupo começa a investigar por conta própria. Sentindo um clima de pouco acolhimento, elas continuam as entrevistas e ouvem o termo misterioso \"os profundos\" em vários lugares."
309044331 = "Tabu"
2200941612 = "Sem obter resultados significativos nas entrevistas, o grupo discute os resultados. De repente, uma sombra misteriosa aparece e conta sobre um certo ritual e rumores."
2989058466 = "Aquele que vagueia na escuridão"
723669717 = "O Esquadrão RABBIT inicia uma operação noturna para verificar com seus próprios olhos os estranhos rumores da vila de Yotoura."
1997896967 = "Terror desconhecido"
284854068 = "O confronto entre o Esquadrão RABBIT e os pescadores da vila de Yotoura é interrompido por uma intervenção do Sensei. O que as integrantes viram acaba sendo revelado como uma fábrica de Kusaya, especialidade local de Yotoura, fazendo-as perceber que julgaram as coisas com base em preconceitos."
4197412946 = "Céu após a névoa"
4182046529 = "Ao amanhecer, após o fim da confusão, o Esquadrão RABBIT ajuda os moradores da vila à sua própria maneira."
3388148430 = "Churrasco da madrugada (1)"
3365586462 = "A pedido de um pescador, Miyu acaba ensinando a pescar. O Esquadrão RABBIT aproveita a pescaria e passa um tempo animado fazendo um churrasco com os moradores da vila, que trouxeram frutos do mar."
2519986036 = "Churrasco da madrugada (2)"
2505877297 = "Enquanto isso, uma silhueta suspeita flutuando sobre o mar observava o Esquadrão RABBIT e os moradores da vila."
1139930313 = "Sombra suspeita"
1328182877 = "No dia seguinte, o pescador descobre um barco misterioso perto do recife dos demônios. Os moradores, assustados, dizem que pode ser o \"Barco do Retorno\", que, segundo a lenda, é usado pelos \"profundos\" quando desembarcam. No entanto, o Esquadrão RABBIT nota algo estranho no barco..."
1869164534 = "Coelho subaquático"
2573209587 = "Para entender a real situação do \"Navio do Retorno\", o Esquadrão RABBIT parte em direção ao mar."
4044326055 = "Limpeza do convés (1)"
893178531 = "O navio que flutuava no mar não era uma embarcação lendária, mas sim uma barcaça de uma empresa de navegação. Ao descobrir que a empresa estava envolvida no contrabando de camarões, o Esquadrão RABBIT decide neutralizá-los em nome da SRT."
3149322458 = "Limpeza do convés (2)"
3604726031 = "Diante do Esquadrão RABBIT, os marinheiros contratados pela empresa de navegação são derrotados... e o grupo deixa o destino deles nas mãos dos moradores da vila."
491370350 = "Uma entrega para você!"
574290976 = "Com o fim da série de incidentes e a normalização da distribuição de camarões, a vila de Yotoura renasceu de uma vila de pescadores sinistra para um destino turístico vibrante. Assim, ao retornar ao Parque dos Coelhinhos, os membros do Esquadrão RABBIT recebem uma encomenda enviada pela vila de Yotoura."
1186506094 = "Em busca do legado escondido ~Atividades extracurriculares da Trinity~"
387596842 = "A pedido de Sakurako, Ui decide investigar as ruínas descobertas pela Sisterhood. Junto com Hinata, Hanako e Koharu, ela troca de roupa para trajes de banho e parte para uma ilha deserta à beira-mar. Aquele lugar parece ter sido usado pela Associação de Estudantes no passado...? Será que o grupo conseguirá concluir a investigação das ruínas em segurança?"
343249441 = "Sequestro"
1955848092 = "Pessoa comum que passava por ali A"
1265169502 = "É traje de banho, viu? ♡"
3549532882 = "Ponto de investigação A \"Labirinto de pedra\" (1)"
1533877746 = "Ponto de investigação A \"Labirinto de pedra\" (2)"
363275385 = "Ponto de investigação B \"Ruínas subterrâneas\" (1)"
3363593113 = "Ponto de investigação B \"Ruínas subterrâneas\" (2)"
2224404829 = "Ponto de investigação C \"Plantação de limões\""
2703966220 = "Ponto de investigação D \"Farol esquecido\" (1)"
1303896708 = "Ponto de investigação D \"Farol esquecido\" (2)"
1460650320 = "O motivo dos limões"
3779604569 = "Ponto de investigação E \"Caverna atrás da cachoeira\""
4038659296 = "Segredos adormecidos na ilha (1)"
3618921997 = "Segredos adormecidos na ilha (2)"
72390938 = "Mudança de mentalidade"
2135885884 = "Sequestro"
2225204274 = "Ui é chamada a uma sala privada, isolada de todos, para se encontrar com Sakurako."
2744900070 = "Pessoa comum que passava por ali A"
1729423655 = "Sakurako, que deseja a ajuda de Ui por seu vasto conhecimento para investigar as ruínas descobertas pela Sisterhood, revela à relutante Ui que sabe que ela fez cópias de escrituras sagradas. Abalada pelas palavras de Sakurako, Ui não consegue recusar... e, com a mediação de Hanako, fica decidido que ela irá investigar as ruínas."
1096816524 = "É traje de banho, viu? ♡"
3742480354 = "O grupo visita a ilha deserta próxima à Trinity, descoberta pela Sisterhood, e decide começar a investigação após trocar para trajes de banho."
3187959349 = "Ponto de investigação A \"Labirinto de pedra\" (1)"
617928650 = "O grupo inicia a investigação detalhada. Pelos padrões de pedra deixados nas ruínas, descobre-se que este era um local usado pela Associação de Estudantes. Enquanto avançam pela investigação das ruínas complexas como um labirinto, encontram uma Mimesis da Associação de Estudantes e entram em combate."
811018523 = "Ponto de investigação A \"Labirinto de pedra\" (2)"
994270627 = "Embora tenham repelido a Mimesis, Koharu acaba ficando imobilizada, então o Sensei a carrega nas costas e se reúne com os outros membros em segurança."
3219351181 = "Ponto de investigação B \"Ruínas subterrâneas\" (1)"
2491485373 = "O grupo decide se dividir para investigar as ruínas subterrâneas. Enquanto avança com o Sensei, Ui revela seus sentimentos mais profundos. Nesse momento, um som estranho ecoa e a Associação de Estudantes aparece diante dos dois."
29917006 = "Ponto de investigação B \"Ruínas subterrâneas\" (2)"
1927635005 = "O grupo escapa das ruínas subterrâneas enquanto luta contra a Associação de Estudantes. Diante dos ataques sucessivos, o lançador de granadas disparado por Hinata acaba causando o colapso das ruínas subterrâneas."
3429673932 = "Ponto de investigação C \"Plantação de limões\""
630214868 = "Enquanto investigava a plantação de limões, o Sensei se encontra com Hanako. Ao ser questionada sobre o motivo de ter vindo investigar as ruínas, Hanako revela o que costuma manter escondido em seu coração."
259971216 = "Ponto de investigação D \"Farol esquecido\" (1)"
963289912 = "O grupo decide investigar o farol. Enquanto transporta caixas com Hinata para organizar a sala bagunçada, a Associação de Estudantes ataca. Não querendo atrapalhar a investigação, Hinata decide interceptá-los junto com o Sensei."
2305782904 = "Ponto de investigação D \"Farol esquecido\" (2)"
904241480 = "O grupo, tendo ouvido o barulho, chega até Hinata, que conseguiu derrotar a Associação de Estudantes. Entendendo a intenção de Hinata de fingir que nada aconteceu, todos voltam a investigar o farol."
942293947 = "O motivo dos limões"
3925545059 = "Ui, que estava compilando os resultados da investigação até o momento, questiona por que limões seriam cultivados propositalmente nesta ilha e aproxima o mapa da chama de um maçarico. O grupo decide seguir para um novo ponto de investigação que surge através da revelação por calor."
3449666276 = "Ponto de investigação E \"Caverna atrás da cachoeira\""
6041660 = "O novo ponto de investigação indicado no mapa é uma caverna escondida atrás de uma cachoeira... e, ao encontrarem uma caixa de madeira no fundo da caverna, a Associação de Estudantes bloqueia o caminho do grupo."
1858743142 = "Segredos adormecidos na ilha (1)"
479171161 = "O grupo escapou por pouco da Sociedade de Estudantes. No momento em que Ui estava prestes a revelar o segredo da ilha e o conteúdo da caixa de madeira, Hinata descobre uma nova caixa em um buraco no chão. Assim que Hinata estende a mão para a caixa, um número imenso de membros da Sociedade de Estudantes bloqueia o caminho."
2777555982 = "O Segredo Adormecido na Ilha (2)"
3252455481 = "O grupo derrotou a Sociedade de Estudantes e conseguiu proteger a caixa. No entanto, não havia nada dentro dela. Concluindo que toda a ilha era usada pela Sociedade de Estudantes para treinamentos, e somando aos resultados de outras áreas investigadas, chegou-se à conclusão de que esta caixa era, na verdade, uma cápsula do tempo da Sociedade de Estudantes. Ui então faz um pedido ao grupo."
368837813 = "Mudança de Estado de Espírito"
3409394003 = "O pedido de Ui era não tornar pública a existência da cápsula do tempo e deixá-la como estava, colocando mapas e outros artefatos dentro dela. Hanako e o Sensei comunicaram parte dos resultados da investigação a Sakurako, encerrando assim a saga da investigação das ruínas. Diante do grupo que colaborou com o desfecho, Ui, com uma expressão complexa, serve um café americano gelado para todos."
2707730920 = "História de Doujinshi de Mangá Escolar ~O Final que as Duas Buscam~"
422721858 = "Diz a lenda que existe um volume final lendário do mangá 'Luna', com pouquíssimas cópias impressas. Meru, da Frente de Libertação do Conhecimento, levanta-se para encontrar esse volume final. Será que Meru conseguirá encontrar o volume final em segurança?"
2060432021 = "Um Certo Dia da Frente de Libertação do Conhecimento"
1623216963 = "Declaração de Greve"
2380725657 = "Volume Final"
1645182951 = "Publicação, Reimpressão e Distribuição"
3531343350 = "Reunião Secreta"
1157847763 = "Segredos que Todos Têm"
1019337302 = "Metade Concluído"
3974293526 = "Engrenagens"
229683704 = "Encontro"
3141284228 = "Proposta da Secretaria"
2444424193 = "Proposta do Departamento de Obras"
2235448593 = "Negócio Especial (1)"
642695042 = "Negócio Especial (2)"
2653817472 = "Um Dia Comum em Red Winter (1)"
960975359 = "Um Dia Comum em Red Winter (2)"
3209912447 = "Um Certo Dia da Frente de Libertação do Conhecimento"
2520485061 = "Enquanto faziam uma limpeza geral na biblioteca da Academia Federal de Red Winter, a Frente de Libertação do Conhecimento descobre 'Luna', uma obra-prima que fez sucesso na época. No entanto, as opiniões das duas sobre a obra são completamente diferentes... o que acaba desencadeando uma grande briga."
720773574 = "Declaração de Greve"
2640338098 = "Após a briga, Meru consulta o Sensei sobre o fato de Momiji ter ido embora. Decidindo que um simples pedido de desculpas não basta, ela resolve procurar o volume final de 'Luna' como um presente de reconciliação."
392147764 = "Volume Final"
2594803507 = "Meru e as outras estão perdidas, sem conseguir encontrar o volume final de 'Luna', quando Takane, do Departamento de Publicações da Academia Federal de Red Winter, aparece. Takane revela que as pistas sobre o volume final de 'Luna' estão no Departamento de Publicações e envia Meru e as outras para lá."
3663799006 = "Publicação, Reimpressão e Distribuição"
298813709 = "Seguindo a dica de Takane, o Sensei e Meru chegam ao Departamento de Publicações. Lá, eles perguntam a Yakuo, a chefe do departamento, sobre informações do volume final de 'Luna'. No entanto, Yakuo hesita em dar a informação de graça, mas após negociações, Meru aceita o acordo."
3362804913 = "Reunião Secreta"
2411994088 = "O Sensei e Meru chegam ao local onde supostamente está o volume final de 'Luna'. No entanto, existem vários volumes finais de 'Luna' com desenvolvimentos diferentes... Os dois ficam confusos ao ler os múltiplos volumes finais. De qualquer forma, o evento parece uma feira de doujinshis... e, diante deles, uma certa pessoa bloqueia o caminho."
1879649220 = "Segredos que Todos Têm"
189383727 = "No fim das contas, o volume final de 'Luna' não existia. Todos os volumes finais dos rumores são, na verdade, criações de fãs. Enquanto Takane sugere levar o doujinshi mais popular, Meru decide desenhar seu próprio doujinshi do volume final de 'Luna' com sua própria interpretação."
2417107819 = "Metade Concluído"
3852138862 = "Takane, confusa com a declaração de Meru de que desenharia um doujinshi, diz para ela participar do evento 'Petit Only' de 'Luna' que acontecerá em 4 dias e lançá-lo como uma nova publicação. Meru aceita, dizendo que não faz sentido fazer algo pela metade, e assim começa o acampamento de manuscritos infernal."
3860894640 = "Engrenagens"
1197843780 = "Após vários dias virando a noite, Meru desmaia e o Sensei a deixa descansar tranquilamente. Enquanto isso, o Sensei recebe um telefonema de Momiji—"
3821762781 = "Encontro"
4010090300 = "Graças à mediação do Sensei, Meru e Momiji se reencontram antes do planejado. Elas pedem desculpas por terem dito coisas horríveis uma à outra e fazem as pazes. Embora não precisem mais desenhar o doujinshi, Meru ri e diz que vai continuar até terminar."
3696580091 = "Proposta da Secretaria"
3919086823 = "Na manhã do evento, o grupo termina o doujinshi no limite do tempo e corre para o Departamento de Publicações para imprimi-lo. No entanto, uma sombra sinistra bloqueia o caminho delas."
2443904406 = "Proposta do Departamento de Obras"
1377786849 = "Após afastar a Secretaria, uma nova sombra sinistra bloqueia o caminho do grupo."
3740420419 = "Negócio Especial (1)"
786268020 = "Após afastar o Departamento de Obras, uma sombra ainda mais sinistra bloqueia o caminho do grupo."
1754041631 = "Negócio Especial (2)"
834176443 = "Tendo superado inúmeras obstruções, o grupo finalmente chega ao Departamento de Publicações. No momento em que Takane tenta ler o doujinshi de Meru, Yakuo intervém."
3222170929 = "Um Dia Comum em Red Winter (1)"
2976716705 = "Yakuo tenta confiscar o manuscrito de Meru para transformar toda essa confusão em um filme no Departamento de Publicações. Isso fazia parte do acordo para obter informações sobre o volume final. Quando Meru recusa, dizendo que não pode permitir isso, Yakuo chama Marina, da Secretaria de Red Winter."
1466984691 = "Um dia comum em Red Winter (2)"
4127469638 = "Takane critica novamente o fanzine de Meru. Nela, havia uma imagem de Takane elogiando Meru, algo raro. Assim, com o fim de toda a confusão, todos retornam ao seu cotidiano."
3949906024 = "Trip-Trap-Train"
1291082049 = "A caminho de entregar relíquias em Trinity, Ichika e o Sensei percebem que o trem de carga em que as depositaram está indo para o destino errado. O trem em que embarcaram às pressas também transportava criminosos procurados de Gehenna...!? Será que o grupo conseguirá levar as relíquias de volta para Trinity em segurança?"
108736641 = "Trem de escolta"
2912345324 = "3:10 para Gehenna"
3469029340 = "Rotina diária (1)"
1843050328 = "Rotina diária (2)"
97227209 = "Para o vagão da frente (1)"
2526921636 = "Para o vagão da frente (2)"
3428539678 = "O bom, o mau e a Trinity (1)"
1542184559 = "O bom, o mau e a Trinity (2)"
3529227671 = "Trem expresso para o inferno"
733770731 = "A existência do esforço"
3424620980 = "Declaração de guerra"
4252861283 = "Vagão de escolta"
2301239987 = "Trem de escolta"
2166076890 = "A 'Família Arancino' mantinha os criminosos procurados que cometeram atos de terrorismo contra eles detidos em um vagão de escolta especial."
3643696836 = "3:10 para Gehenna"
342073680 = "Ichika recebe a missão de recuperar relíquias valiosas de Trinity e auxiliar o Sensei, que participou da escavação. Ichika, feliz pela chance de trabalhar com o Sensei, aceita a missão prontamente, mas o trem de carga com as relíquias está indo para outro destino...?"
1743782552 = "Rotina diária (1)"
4175588508 = "Percebendo que deixaram suas malas no trem para Gehenna, o Sensei e Ichika embarcam às pressas. No entanto, a presença de uma aluna de Trinity causa um alvoroço no vagão... e eles acabam entrando em conflito com os funcionários do trem que ouviram a confusão."
490474147 = "Rotina diária (2)"
2087948384 = "Uma explosão repentina irrompe do vagão de escolta acoplado ao trem. Assim, eles se deparam com Kasumi surgindo por entre a fumaça."
1027493850 = "Para o vagão da frente (1)"
2901736866 = "Kasumi propõe ao Sensei e a Ichika que formem uma aliança. Sem tempo para pensar, eles acabam lutando contra a gangue que perseguia Kasumi, fazendo com que ambos os lados se unam temporariamente."
2706436858 = "Para o vagão da frente (2)"
1886931417 = "Kasumi revela que o vagão de carga está na frente e explica seu plano original. Mesmo que seja para se aliar a Kasumi, o grupo, que tem o mesmo objetivo de chegar ao vagão da frente, segue em frente."
3944901993 = "O bom, o mau e a Trinity (1)"
2576802244 = "Sentindo algo estranho no trem que continuava avançando sem parar nas estações, Iori decide embarcar. Ela acaba dando de cara com o grupo de Kasumi, que estava tentando chegar ao vagão da frente."
625534155 = "O bom, o mau e a Trinity (2)"
1618348553 = "Enquanto Iori insiste em levar todos os alunos delinquentes a bordo, Kasumi avisa que a maioria dos passageiros são delinquentes. Iori pede ajuda ao Sensei, mas Kasumi ameaça o Sensei usando as relíquias de Trinity como escudo."
231759077 = "Trem expresso para o inferno"
810924489 = "Diante de Kasumi, que ameaça usando as relíquias de Trinity, a paciência de Ichika finalmente se esgota, e ela começa a atacar sucessivamente todos os alunos presentes, incluindo Kasumi."
2795025360 = "A existência do esforço"
943399603 = "Diante da relíquia quebrada, Ichika finalmente se acalma e o Sensei diz que pedirá desculpas junto com ela. Ao sorrir e dizer que viu o quanto Ichika se esforçou, a expressão dela finalmente se ilumina. Nesse momento, o trem descarrila devido a explosivos instalados nos trilhos."
4054716633 = "Declaração de guerra"
3293238505 = "O grupo entrega as relíquias em Trinity com sucesso. Após receberem o pedido de desculpas pelos danos, Nagisa diz gentilmente que 'danos podem ser reparados'. Assim, a longa missão de Ichika e do Sensei chega ao fim."
2098216956 = "Vagão de escolta"
274615224 = "O Comitê Disciplinar de Gehenna mantém os principais culpados do terrorismo detidos em um vagão de escolta especial."
2688632770 = "Um registro da juventude científica"
3170117962 = "Em uma tarde ensolarada — enquanto o Sensei descansava no Schale, recebe um contato de Eimi dizendo que há pessoas desmaiadas em um local abandonado. Dizem que elas vieram de outro mundo...? Para mandá-las de volta, o Schale entra em ação agora!"
128474983 = "Outra cidade acadêmica"
4030478322 = "Criadora de problemas?"
1854302336 = "Senso comum da cidade acadêmica (1)"
686158303 = "Senso comum da cidade acadêmica (2)"
13161087 = "Como se fossem turistas"
279861122 = "Momentos divertidos passam num piscar de olhos"
3742444860 = "A Railgun de Tokiwadai (1)"
3603682477 = "A Railgun de Tokiwadai (2)"
4069899568 = "Reparo? (1)"
1803976307 = "Reparo? (2)"
1151356943 = "A usuária de habilidades mentais mais forte"
379502612 = "Memórias, dentro do coração"
2969638269 = "Outra cidade acadêmica"
236906501 = "Em uma tarde qualquer — enquanto descansava na sala de descanso do Schale, o Sensei recebe um contato informando que encontraram sobreviventes de outro mundo nas ruínas de Millennium."
2728795135 = "Criadora de problemas?"
2665297076 = "Ao chegar em Millennium, os sobreviventes já haviam desaparecido. Ao tentar rastreá-los com base nas pistas que Eimi forneceu, um som de explosão ecoa de repente. Ao chegar ao local, uma das sobreviventes — Mikoto Misaka — estava lá. Diante da confusão dela, Himari explica sobre este mundo e diz que tentará encontrar um meio de retorná-la ao seu mundo original. Enquanto Himari busca uma solução, Eimi e o Sensei preparam tudo para que Mikoto Misaka possa se adaptar a este mundo."
702162909 = "O senso comum da Cidade Acadêmica (1)"
1061223818 = "O grupo recebeu armas exclusivas para Mikoto Misaka no Clube de Engenharia. Mikoto, embora surpresa com o \"senso comum\" de Kivotos, aceita as armas para as outras sobreviventes e parte novamente para encontrar as outras duas."
3231248675 = "O senso comum da Cidade Acadêmica (2)"
3778114332 = "Junto com o \"senso comum\" de Kivotos, o grupo visita Misaki Shokuhou. Após explicar a situação e entregar a arma, chega a notícia de Himari de que a análise da \"instalação\" foi concluída."
1189128859 = "Como se fossem turistas"
1275099754 = "O grupo retorna ao Departamento de Investigação de Fenômenos Especiais e se reúne com a última pessoa, Ruiko Saten. Himari avisa que, se repararem e reativarem a instalação nas ruínas, elas poderão voltar ao local de origem, e diz que já terminou todos os preparativos. No entanto, como ficaria muito tarde se fossem para as ruínas agora, ela sugere que, já que estão aqui, aproveitem Kivotos hoje antes de voltarem para o seu mundo. Assim, o grupo parte para um passeio turístico por Kivotos."
232191555 = "O tempo divertido passa num instante"
1502489746 = "Após terminar o divertido passeio por Kivotos, o grupo de Mikoto Misaka e o Clube de Engenharia visitam as ruínas e descem ao subsolo para procurar a instalação mencionada por Himari."
328099769 = "A Railgun de Tokiwadai (1)"
1368837064 = "Enquanto explorava as ruínas, o grupo encontra autômatos e entra em combate."
1548581704 = "A Railgun de Tokiwadai (2)"
4263679817 = "Diante de muitos inimigos, Mikoto Misaka dispara a Railgun feita pelo Clube de Engenharia. No entanto, não teve muita potência e não foi suficiente para eliminar os inimigos. Deixando a arma de lado, Mikoto Misaka usa uma moeda para disparar sua própria Railgun."
3683836728 = "Reparo? (1)"
1391870569 = "O grupo de Mikoto Misaka chega em segurança à \"instalação\". No entanto, antes de ativá-la, drones de segurança aparecem em massa."
98202569 = "Reparo? (2)"
2922543463 = "Diante dos drones que surgiam um após o outro, um disparo feito por Ruiko Saten para tentar parar a instalação acaba causando um mau funcionamento. Assim, quem aparece diante delas são os encrenqueiros de Kivotos: o Kaitenger e o Grupo do Capacete."
3668662788 = "A usuária de habilidades mentais mais forte"
2031129388 = "Enquanto o Clube de Engenharia repara a instalação, elas precisam de alguma forma conter os encrenqueiros. Embora admita que não quer usar muito suas habilidades, Misaki Shokuhou consegue resolver a situação usando seus poderes."
1787559679 = "Memórias, dentro do coração"
2603116893 = "Assim, o reparo da instalação é concluído e elas são transferidas uma a uma de volta ao seu local de origem. Ruiko Saten, Misaki Shokuhou e Mikoto Misaka relembram a curta jornada em Kivotos e partem sorrindo."
2944701250 = "(Cyber) Marcha de Ano Novo"
1318448187 = "Para quebrar a vida preguiçosa, o grupo Veritas decide sair para ver o primeiro nascer do sol do ano. Será que elas conseguirão ver o primeiro nascer do sol em segurança?"
751864809 = "Resoluções de Ano Novo"
1975942343 = "Se for para ver o primeiro nascer do sol"
1808009267 = "Montagem da barraca"
4033864197 = "O tédio também mata hackers"
2884255033 = "Dança com o urso"
2590174102 = "Preparação do jantar"
3961126978 = "Canja de galinha para a alma"
3326712936 = "Primeira paisagem (1)"
2521459638 = "Primeira paisagem (2)"
1663756495 = "Fogo de palha"
2436764539 = "Resoluções de Ano Novo"
1008442379 = "No fim do ano, Maki, Kotama e Hare estão imersas em jogos como de costume. Chihiro, preocupada por ninguém responder às suas inúmeras ligações, visita a sala do clube. Chihiro, irritada com a vida preguiçosa que elas levam, declara que este ano todas irão ver o primeiro nascer do sol."
2288954300 = "Se for para ver o primeiro nascer do sol"
1822713070 = "Movendo os pés sem muita vontade, o grupo Veritas se reúne em frente à Millennium Science School. Quando Chihiro anuncia que planeja acampar no sopé da montanha para ver o primeiro nascer do sol, todas ficam confusas. Chihiro inspeciona os pertences das integrantes... e encontra coisas que não têm nada a ver com acampamento."
459676073 = "Montagem da barraca"
3757493316 = "O grupo Veritas chega ao acampamento. Diferente de Chihiro, que está motivada, as outras integrantes estão cansadas das atividades ao ar livre. Após montarem a barraca, durante o tempo livre, as integrantes vão descansar, e Chihiro começa a ler um livro junto com o Sensei."
2908823739 = "O tédio também mata hackers"
1350246685 = "Como as integrantes não retornam mesmo após algum tempo, Chihiro e o Sensei decidem ir procurá-las. Assim, eles testemunham Hare sofrendo com sintomas de abstinência de cafeína. Após entregar café para Hare e perguntar sobre o paradeiro de Maki, os dois seguem seus rastros até uma caverna. Maki estava lá desenhando uma enorme obra de arte, mas..."
3004230193 = "Dança com o urso"
296992172 = "Por outro lado, Kotama, que estava gravando sons ambientais nas profundezas da floresta, encontra o Clube de Treinamento, que veio para um treinamento de inverno. Enquanto conversava com o Clube de Treinamento sobre o valor de experimentar atividades ao ar livre, Chihiro avisa que elas podem encontrar um urso prestes a hibernar... mas, naquele momento, um urso selvagem de verdade aparece."
2436736275 = "Preparação do jantar"
4265253392 = "De volta ao acampamento, os membros do Veritas começam a preparar um jantar um pouco mais cedo. Enquanto Chihiro acende a fogueira, Maki, Kotama e Hare preparam os ingredientes, embora de forma um tanto desajeitada."
3998368874 = "Sopa de frango para a alma"
1256703657 = "Chihiro preparou um cozido para as integrantes do clube. Elas adicionam os ingredientes que prepararam juntas e o grupo desfruta da refeição ao redor da panela. Após o jantar, enquanto o Sensei relaxa calmamente diante da fogueira, ele pergunta a Hare e Kotama o que estão achando do acampamento."
2460462864 = "A primeira vista (1)"
452463543 = "No dia seguinte, o grupo acorda cedo para ver o nascer do sol e começa a subir a montanha. No caminho, encontram Sumire, que avisa que, como o dia está nublado, pode ser difícil ver o nascer do sol. No entanto, o grupo não desiste e decide subir até o topo. Ao chegarem ao cume, eles finalmente contemplam um belo nascer do sol."
60697301 = "A primeira vista (2)"
1996295661 = "Ao retornarem após ver o nascer do sol, o grupo do Veritas descobre vários repórteres reunidos ao redor do acampamento. Acontece que o mural que Maki desenhou na caverna foi confundido com uma nova descoberta arqueológica, atraindo a imprensa. O Sensei e Chihiro têm dificuldades para controlar a confusão."
1007585985 = "Fogo de palha"
3021250109 = "Uma semana após o início do ano, Chihiro visita a sala do clube para ver como estão as integrantes. No entanto, elas continuam obcecadas por jogos, exatamente como antes... Ao ver que nada mudou, Chihiro fica furiosa e começa a dar uma bronca nelas."
4241167237 = "A serenata delas sob o sol"
2999814580 = "Com a chegada do Dia dos Namorados, o Sensei decide ajudar Makoto com os preparativos para a \"Festa de Gehenna\". No entanto, o cotidiano em Gehenna é mais imprevisível do que se imaginava...!? Será que o Sensei conseguirá terminar os preparativos da festa em segurança?"
3340293673 = "Reunião"
3756072939 = "Pedido de cooperação"
3345312293 = "Início dos preparativos"
577774165 = "A exigência da presidente"
2520262142 = "A filosofia da presidente"
