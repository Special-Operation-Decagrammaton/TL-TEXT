504801665 = "Última história de terror"
2245860834 = "Greys alienígenas (1)"
790458143 = "Greys alienígenas (2)"
2181388028 = "Tsuchinoko azul"
3119162552 = "Churrasco e chili"
3238893428 = "Não há ocultismo!"
2939235592 = "anônimo quem?"
1616764732 = "Donzela de Ferro"
931273608 = "Animal da sorte"
514500469 = "A sorte desta semana é péssima! Pela previsão matinal, Konoka é informada de que o pior dia de sua vida chegará em 3 dias. Desabafando nas redes sociais, ela encontra um tópico sobre um símbolo da sorte."
427498716 = "Em busca do Tsuchinoko"
3051451417 = "Konoka pede folga a Kanna para procurar o Tsuchinoko, uma cobra que traz sorte. O Sensei, que estava no local por outro motivo, a acompanha a pedido de Kanna. Sacudidos no ônibus, visitam uma cidade pequena onde há relatos de avistamento e se encontram com as 'amigas' de Konoka."
1657577479 = "Garota com essa configuração"
907137836 = "As amigas de Konoka são Rena, do Clube de Ocultismo, e Tsubasa, que se autodenomina diretora do 'Instituto Mo de Pesquisa de Fenômenos Paranormais'. Rena se empolga com as histórias de ocultismo de Tsubasa, mas insiste que ela mesma não acredita na existência do Tsuchinoko."
1462024252 = "Ônibus fantasma"
3930709287 = "A caminho da cabana na montanha onde ficarão, o grupo recebe um aviso de um velho sinistro. Konoka fica com medo, mas seguem. Chegam à cabana. Sem descansar muito, partem para a investigação. No caminho, encontram o famoso 'ônibus fantasma'. Embora enganadas, com a perspicácia de Konoka, o repelem e entram no ônibus correto."
3598423513 = "Estátua viva que se move"
166220328 = "Durante a investigação, Tsubasa revela a Rena que seu clube já foi desativado. Enquanto isso, Konoka, investigando sozinha, encontra uma caixa sinistra enterrada. Tsubasa a abre, ignorando a sugestão de Konoka de enterrá-la novamente. Dentro, há uma estátua. Tsubasa julga ser uma brincadeira, mas Konoka a enterra fundo. Na saída, o Sensei encontra o olhar da estátua."
3910110965 = "Sombra se aproximando da cabana na montanha"
1933749352 = "Tarde, voltam para a pousada exaustos. Konoka, a única animada, se oferece para preparar o jantar, enquanto Tsubasa e Rena dormem. Sentindo uma presença estranha, Rena e o Sensei acordam e tentam descobrir o que é. Konoka volta com a comida. Também viu a sombra misteriosa. Tsubasa suspeita que a 'Sétima Prisioneira' tenha vindo se vingar."
1284600502 = "Cabine telefônica onde ecoam vozes de rancor"
105361616 = "No dia seguinte, continuam a busca pelo Tsuchinoko. Acabam perdendo o ônibus da tarde. Tentam chamar um táxi, mas estão sem sinal. Konoka e o Sensei usam um telefone público. Ao tentar sair, a porta não abre. O telefone toca. Ao atender, uma voz sinistra. Nenhuma ajuda chega. No final, Konoka resolve com força bruta."
2528363471 = "Última história de terror"
1322186565 = "Enquanto esperam o táxi, um ônibus de duas patas aparece…… mas Konoka o repele com força. Uma série de eventos estranhos faz a suspeita de uma conspiração se tornar certeza. À noite, sentem alguém vigiando. Konoka diz que, se o criminoso for a 'Mitsui Kyoko' das Sete Prisioneiras, tudo se explica. Tentam capturar a sombra, mas ela desaparece como fumaça."
1478179506 = "Greys alienígenas (1)"
1728431009 = "Tsubasa afirma que o criminoso é um Grey alienígena, com base em uma sombra branca capturada em foto. A discussão esquenta, mas percebem que alguém está isolando a cabana de propósito. A linha telefônica está cortada, a ponte foi destruída. O verdadeiro criminoso que aparece são delinquentes com rancor de Konoka."
3654864579 = "Greys alienígenas (2)"
1998146 = "O grupo elimina os delinquentes. Eles confessam que tudo, desde os boatos do Tsuchinoko, foi obra deles. Tsubasa fica visivelmente desanimada, pois planejava reviver o 'Clube de Pseudociência' com a conquista de ter encontrado o Tsuchinoko. No entanto, entre os delinquentes, nenhum usava roupa branca, inconsistente com a foto. Confusos, Mirai, que estava escondida por preocupação com sua kouhai Tsubasa, aparece."
3085789925 = "Tsuchinoko azul"
2378286215 = "Sem encontrar o Tsuchinoko, Konoka teme o pior azar de sua vida. No entanto, já se passaram 4 dias desde a previsão, e o 'terceiro dia' já foi superado. Rena aponta que ela já teve azar suficiente, e Konoka conclui que a aventura de procurar o Tsuchinoko pode ter sido o verdadeiro Tsuchinoko."
1641141706 = "Churrasco e chili"
844112461 = "Com tudo resolvido, o grupo, incluindo os delinquentes, aproveita um churrasco. Tsubasa parece apegada a Mirai. Konoka a provoca por ser superprotetora, mas Mirai diz que não era ela que estava espionando."
391374629 = "Não há ocultismo!"
3407161162 = "Noite fechada. Rena relata com confiança à sua sênior do Clube de Ocultismo a verdade sobre o caso do Tsuchinoko. Tsubasa a chama e saem da cabana. Tsubasa as reúne do lado de fora para 'atualizar a conexão com o universo'. A voz de 'Ariya Ariari' ecoa na montanha."
4096947749 = "anônimo quem?"
2337427686 = "Quem enviou a informação do Tsuchinoko para Konoka nas redes sociais foi Himari. Na sala do Departamento de Investigação de Fenômenos Anômalos, ela analisa com interesse as experiências do Sensei. Trocando opiniões com Eimi, que chega depois, os dados mostram algo que pode ser chamado de 'fenômeno anômalo'."
450338200 = "Donzela de Ferro"
3543633081 = "O Departamento de Polícia de Valkyrie está agitado com os delinquentes que vêm se entregar. Enquanto isso, Kanna conversa com Misuzu, a diretora correcional."
1242866448 = "Parece que o grupo está aproveitando um churrasco na cabana depois que o incidente se resolveu."
165422936 = "Rena relata a verdade do caso Tsuchinoko para sua sênior do Clube de Ocultismo. Depois, tarde da noite, Tsubasa a chama, junto com todos……"
1637396176 = "A conta anônima que enviou a informação do Tsuchinoko nas redes sociais. Qual é a sua verdadeira identidade?"
2318234019 = "O Departamento de Polícia de Valkyrie fica agitado com os delinquentes que vêm se entregar. Enquanto isso, Kanna parece estar conversando com um certo visitante……"
1299451717 = "A Serpente da Sabedoria"
1275794928 = "O Sensei, levado por Eimi, conhece Himari, a presidente do Departamento de Investigação de Fenômenos Anômalos. O Sensei, junto com o departamento, explora várias partes de Kivotos e se aproxima da verdade da ameaça sem precedentes, a IA Decagrammaton."
