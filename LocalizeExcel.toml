4245034097 = "Vol.4 Coelho de Caerbannog"# Título e e sua descrição abaixo:
4105693142 = "A Academia Especial SRT foi\n\rrepentinamente fechada da noite para o dia.\n\rQual será o destino de suas calouras\n\rdaqui para frente……?"

# +++ +++ +++ Sinopse de inicio dos capítulos: +++ +++ +++
1229845917 = "O Esquadrão RABBIT entra em ação!"# Capítulo 1 e sua descrição abaixo:
3188474877 = "Uma ordem repentina de fechamento é decretada\n\rpara a Academia Especial SRT.\n\rIncapazes de aceitar essa decisão, as alunas do Esquadrão RABBIT\n\rpassam a acampar em um parque como forma de resistência, mas……?"

2153655179 = "Nós Éramos RABBITs!"# Capítulo 2 e sua descrição abaixo:
330001174 = "Já acostumadas com a vida no parque, as alunas do Esquadrão RABBIT se reencontram com um rosto familiar.\n\rEm meio a uma situação instável e às palavras que lhes foram ditas — quais escolhas o Esquadrão RABBIT fará daqui para frente?"

