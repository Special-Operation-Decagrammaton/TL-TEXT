1905168631 = "Somos alunas também!"
2131265851 = "Exposição barulhenta"
1482243437 = "Lutadora de comida de rua!"
3897376550 = "Aquisição"
3299445685 = "Marie se aproxima solenemente de um membro da Gangue do Capacete, pedindo para 'pegar' uma moto emprestada. Quando perguntada o motivo, ela responde apenas 'para salvar Trinity' e vai embora."
727133309 = "Mudança de imagem"
4233897728 = "48 horas antes…… Marie, atendendo a um 'pedido de apoio de emergência', visita Sakurako. Lá estão Sakurako e Mine com uma atmosfera incomum. Ouvindo a história, elas planejam realizar atividades de ídolo no festival escolar para eliminar a má impressão da Irmandade e da Ordem de Resgate, e querem sua opinião. Como as duas são ignorantes no assunto, Marie decide estudar sobre ídolos com o Sensei, visitando outras escolas e clubes."
3295345526 = "Caminho do ídolo: roupas (1)"
4031463793 = "Para aprender sobre ídolos, Marie e o Sensei visitam Nonomi, de Abydos. Embora recebidos calorosamente, Nonomi e as outras estão com dificuldades porque Ayane e Serika se recusam a vestir roupas de ídolo. Marie e o Sensei são solicitados a ajudar a convencê-las……"
547940646 = "Caminho do ídolo: roupas (2)"
4219103225 = "Com a ajuda de Marie e do Sensei, Nonomi e as outras conseguem 'capturar' e convencer Serika e Ayane. Marie se emociona ao ver as duas vestidas de ídolo. Nonomi, como agradecimento, ensina sobre fazer roupas e sobre ídolos."
2545044380 = "Caminho do ídolo: dança (1)"
1257213465 = "Em seguida, Marie e o Sensei visitam a Academia de Polícia Valkyrie. Enquanto aprendem dança com Fubuki e Kirino, são envolvidas em um incidente de sequestro em uma loja de donuts. Como o resgate demoraria, a dança que Marie aprendeu com Fubuki e Kirino cria uma oportunidade para resolver o caso –"
3039095018 = "Caminho do ídolo: dança (2)"
3545842920 = "Com a perspicácia de Marie, o sequestro é resolvido. Fubuki e Kirino agradecem e lhe apresentam um instrutor para dar aulas de dança."
2117233556 = "Caminho do ídolo: música"
24554761 = "Aprendendo sobre roupas e dança, Marie e o Sensei se preocupam em como escolher a música de ídolo no Schale. Nesse momento, Utaha aparece. Utaha também planeja ser ídolo no festival escolar e, enquanto expõe suas ideias, ajuda Marie a escolher a música. Depois de compartilhar o que aprendeu com Sakurako e Mine, Marie conclui sua tarefa, mas……"
2992953432 = "Presságio de conflito"
3406170958 = "Sakurako e Mine treinam para o grande dia. Percebem que, para atuar como ídolos, é necessário uma líder. Tentam decidir secretamente quem será a líder, mas isso sai pela culatra, e o boato de que a Irmandade e a Ordem de Resgate estão tramando algo perigoso se espalha por Trinity……"
866325458 = "Batalha decisiva"
4158044451 = "Para decidir a líder, Sakurako e Mine vão à praça da fonte no Trinity Square. No entanto, Nagisa, que ouviu o boato, está com Mika. O mal-entendido se aprofunda, e os membros da Irmandade e da Ordem de Resgate se reúnem, criando uma atmosfera tensa. No momento crítico, Marie e o Sensei aparecem –"
3898079287 = "Antique Seraphim Beginning"
1651854970 = "Marie e o Sensei tentam controlar a situação e ouvir todos. Sakurako e Mine revelam que chegaram à mesma conclusão: Marie é a mais adequada para ser líder. Envergonhada, Marie aceita, e as três formam uma unidade de ídolos. Nagisa e as outras, percebendo o mal-entendido, se retiram, e Trinity recupera a tranquilidade."
1937101477 = "Carnaval de Trinity"
927954868 = "Marie e as outras terminam o concurso de ídolos com sucesso. Sakurako e Mine elogiam as fotos do show, mas Marie, sentindo vergonha, pede que as descartem. No entanto, vendo o Sensei com um olhar de pesar, ela lhe entrega secretamente uma foto que guardou."
4044969434 = "Tensão do Comitê de Contramedidas"
2374914097 = "No dia do ensaio do concurso de ídolos, Ayane desaparece de repente. Após procurar, o Sensei e o Comitê de Contramedidas a encontram. Ao ouvir a história, Ayane, que já não gosta de se expor, ficou nervosa e assustada ao ver o palco. Quando o Sensei sugere que ela apenas olhe para os outros do Comitê, ela se acalma e consegue se apresentar."
4086622799 = "Utaha e o ídolo"
4080289724 = "O Sensei vai assistir às eliminatórias do concurso de ídolos. Lá, torce por Utaha junto com Kotori e Hibiki do Clube de Engenharia. Embora Utaha tenha feito uma apresentação excêntrica no palco e não tenha passado para a final, seu objetivo era divulgar a excelência da música enka e o nome do Clube de Engenharia, e ela sorri, dizendo que criou boas lembranças."
476430668 = "Casa mal-assombrada do pós-escola"
4266731319 = "O Clube de Doces do Pós-Escola decide fazer um café estilo casa mal-assombrada como atividade do festival escolar. No entanto, exceto Airi, as reações dos clientes são mornas, sendo chamadas de fofas. Preocupadas em como tornar mais assustador, seguem o conselho do Sensei e percebem que não há problema em serem chamadas de fofas."
1565767390 = "Atividade de relações públicas do Departamento de Segurança da Vida"
376866386 = "Enquanto trabalham no atendimento ao público como sempre, Kirino e Fubuki do Departamento de Segurança da Vida acabam participando do concurso de ídolos. Próximo ao show, nervosas, elas veem Marie, que também se esforça como ídolo, e seus corações ficam mais leves, conseguindo subir ao palco."
741064361 = "Justice Princess"
647422658 = "O Comitê de Justiça apresenta uma peça de teatro no Carnaval. No entanto, no dia da apresentação, uma atriz sofre um acidente. O Sensei então sugere Tsurugi, que decorou todas as falas, e o Clube de Estudos Ninja, que estava visitando, como substitutos. A peça começa, e quando Tsurugi está prestes a descontrolar, isso acaba sendo elogiado como realista, e a apresentação termina com sucesso."
2904499581 = "Somos alunas também!"
3304010880 = "Ouvindo que a Gangue do Capacete está ocupando um canto da escola, o Sensei vai ao local. Lá, Love e as outras estão acampadas. Ao ouvir a história, elas não conseguem se enturmar, não têm dinheiro para percorrer as barracas e estão ali sem opção. O Sensei então sugere que percorram o Carnaval juntas. Embora não consigam ser totalmente sinceras, Love e as outras aproveitam o festival."
2738379411 = "Exposição barulhenta"
964869014 = "O Sensei visita uma galeria de arte onde uma exposição está sendo realizada. Lá, encontra Nagisa, que é ao mesmo tempo organizadora e curadora. Nagisa, que explica a exposição de forma clara, diz que, como a exposição não estava planejada, há poucos visitantes, e fica feliz com a presença do Sensei. No entanto, quando Mika e Seia chegam, o número de visitantes aumenta, e Nagisa, um pouco mais sincera, parece feliz ao explicar as obras."
251089313 = "Lutadora de comida de rua!"
2242936279 = "O Sensei encontra alunas com dificuldades na gestão de uma barraca simulada. Embora o sabor não seja ruim, os clientes não aparecem. Ele sugere pedir conselhos a Haruna e à Sociedade de Estudos Gastronômicos, que estão por perto. No início desconfiadas, seguindo o conselho de Junko para focar na divulgação em redes sociais, a barraca logo fica movimentada. Haruna e as outras, mostrando atuação sem causar problemas, ganham do Sensei a promessa de comer à vontade na barraca, embora ele se preocupe com a carteira."
2125534733 = "No dia do ensaio do concurso de ídolos, Ayane desaparece de repente. O Sensei e os alunos do Comitê de Contramedidas vão procurá-la e……"
25107786 = "No local das eliminatórias do concurso de ídolos, o Sensei torce por Utaha junto com Kotori e Hibiki do Clube de Engenharia, mas……?"
3629475333 = "O Clube de Doces do Pós-Escola decide fazer um café estilo casa mal-assombrada como atividade do festival escolar. No entanto, os alunos que visitam dizem que Natsu, Yoshimi e Kazusa não são assustadoras de fantasia, mas sim fofas……?"
3766149801 = "Enquanto trabalham no atendimento ao público como sempre, Kirino e Fubuki do Departamento de Segurança da Vida acabam participando do concurso de ídolos. Próximo ao show, nervosas, elas……?"
4169171099 = "O Comitê de Justiça apresenta uma peça no Carnaval. No entanto, no dia da apresentação, uma aluna atriz sofre um acidente e não pode atuar……?"
1476865927 = "Ouvindo que a Gangue do Capacete está ocupando um canto da escola, o Sensei vai ao local e encontra Love e as outras acampadas……?"
