2291961665 = "列車と先生と銀髪の少女（２）"
2018297920 = "やるべきこと"
1709068620 = "活路を開く一手"
919794098 = "分からぬ世界で少女は笑う"
1592787353 = "貨物列車はトラブルを載せて"
4071418763 = "突如、謎の襲撃者たちから攻撃を受ける列車。絶体絶命の状況をマイペースに受け止めるノゾミとヒカリ。一方でアオバは、途方に暮れ、叫ぶことしかできないのだった……。"
2843453471 = "嵐の前の騒がしさ"
2510762123 = "重要な輸送任務を任されたヒカリとノゾミと、整備士のアオバ。出発までの間、駅員室でピザを食べるなど、自由すぎる振る舞いにアオバは呆れる。その途中で、ブロロロ疾走連合を名乗るピザの配達員と揉め事になる一幕もありつつ、無事に出発……かと思いきや、列車が勝手に走り出していったことが判明する。"
234894002 = "消えた列車を追って"
2491575675 = "システムの誤作動で発車した列車を追いかけることになった三人は、助っ人として先生を呼び、地下鉄へ乗り込むことに。車内で一行はスケバンたちにカツアゲをされそうになるが、「未来に期待していない」アオバのマイナスオーラによって、撃退に成功する。"
1820644909 = "さらに消えた列車を追って"
693428850 = "またしても、列車は先に発車してしまったと聞かされ、がっかりする一行。バスで列車に追いつこうと試みるが、バスに酔ったアオバが、あやうく限界を迎えそうになる。なんとか目的地に到着し、今度こそ列車の回収をしようと意気込むヒカリとノゾミ。一方その頃、とある暴走族が、積荷を横取りしようと決意していた……！"
4227455266 = "何を載せて走るのか"
2831572118 = "先生が積荷の中身について質問したところ、ヒカリもノゾミも何も知らないと答える。そんな会話の中、ヒカリが通信機で貨物列車の停まっている駅を見つけ、駅員に無理矢理にでも停車させておくよう頼んだ。だが、その駅にはちょうどクロノスチャンネルが取材に来ており、列車の存在がキヴォトス中に広まってしまう！"
2734625292 = "道路のアウトロー再び（１）"
3350873888 = "クロノスチャンネルのニュースから列車の所在を知った暴走族、スケバン、ブラックマーケットの住人、ヘルメット団――キヴォトス中の悪党が駅へと向かう。駅に到着した一行は、暴走族の襲撃を受けるのだった。"
214528885 = "道路のアウトロー再び（２）"
298293347 = "暴走族を撃退した一行は、ようやく貨物列車へと到着。発車準備に取り掛かるのだった。"
3002198178 = "死のファンミーティング"
758680022 = "発進した列車を、ブロロロ疾走連合のメンバーが凄まじい勢いで追撃する。ヘリコプターから中継するシノンが登場したことで、またしてもその様が全国ネットに流れることに。スケバンやブラックマーケットまで合流し、カオスな混戦が起きる中、列車はゲヘナ自治区へと突入していく――"
1912742186 = "列車と先生と銀髪の少女（１）"
4198519711 = "列車に先生が乗ってることに、驚きを隠せないイオリ。先生の頼みを受けたイオリは、嫌な思い出が脳裏をよぎりつつも援護をすると決め、一行は追っ手との戦闘に突入する。"
3244022405 = "列車と先生と銀髪の少女（２）"
3935017135 = "なんとか追っ手を撃退した一行は、戦闘の余波で積荷の箱が損傷していたことで、ついにその中身を目にする。その頃、撃退された暴走族のボスは「まだ手はある」と語り、目的地に先回りし、荷物を奪取して依頼人に渡す作戦を決行しようとしていた……。"
4115766217 = "やるべきこと"
341963437 = "発車システムのエラー、クロノスチャンネルの報道、襲ってくる追っ手の数といった要素から、なんらかの陰謀を疑うアオバ。それに対して、「やるべきことは荷物を目的地まで運ぶことだけ」と言うノゾミ。仕事に対して責任を持つ三人に、先生は惜しみないエールを送る。そんなとき、列車のブレーキが効かないことが発覚し……。"
1262942570 = "活路を開く一手"
692436586 = "列車のブレーキが壊れ、万策が尽きたかと思われたそのとき、アオバが列車の車輪を爆破し、無理矢理停車させる作戦を考案する。駅と線路をメチャメチャに破壊しながらも、無事（？）に停車する貨物列車。そこに、待ち伏せしていた暴走族たちが襲いかかってきた……！"
3730951926 = "分からぬ世界で少女は笑う"
3028706737 = "ついに、いかにも悪そうな依頼人が姿を見せる！だが、喋り方が悪そうなだけで、その正体は社会福祉で有名な実業家。積荷も、チャリティーオークションの出品物だったことが明らかになる。撃退された暴走族達も配達屋としてやり直すと反省し、事件は一件落着。先生とヒカリ、ノゾミ、アオバは、仲良く夕飯を食べに行くのだった。"
3343042660 = "百ヨリ出ズル一輪ノ～いざ尋常に、水上勝負～"
3702024192 = "海を舞台に、100人の参加者がぶつかり合う「百夜水上祭」が開催！夏の海という戦場で、百花繚乱はサバイバルを勝ち抜けるのか……？"
76733946 = "百花繚乱の親睦会"
569088934 = "開幕！百夜水上祭！"
1435783369 = "第一回戦：水鉄砲サバイバルゲーム（１）"
1098783161 = "第一回戦：水鉄砲サバイバルゲーム（２）"
869866388 = "第二回戦：暴走ジェットボート"
1935016526 = "第三回戦：水上障害物レース"
2695979454 = "脱落からの浮上をかけて"
1899045441 = "敗者復活戦：ビーチバレー"
1171322563 = "百花繚乱 vs 百花繚乱"
3224248483 = "互いの矜持"
317465244 = "最終戦：押し出しゲーム"
1219559063 = "決勝の果て（１）"
3621714258 = "決勝の果て（２）"
3948541153 = "負けられない戦い"
3171838475 = "物語の幕引き"
2687712889 = "百花繚乱の親睦会"
3553374059 = "鳥居海岸にやってきた百花繚乱は、百鬼夜行の夏の風物詩「百夜水上祭」へ参加することになる。他のメンバーが盛り上がる中、ひとり険しい顔をするキキョウ。彼女は作戦参謀として、戦略――ではなく、水が怖いことをなんとか隠し通す策を考える必要に迫られていた。"
2607288957 = "開幕！百夜水上祭！"
1137445026 = "「百夜水上祭」は、100人の選手が最後の一人を目指すサバイバルバトル。会場が沸き立つ中、泳ぐ種目を警戒するキキョウ。だが幸いにして一回戦は「水鉄砲サバイバルゲーム」だった。先生が審判を務める中、百夜水上祭が幕を開ける――！"
3251561313 = "第一回戦：水鉄砲サバイバルゲーム（１）"
3490215767 = "「水鉄砲サバイバルゲーム」で、スケバン達やアラタ率いる魑魅一座と対峙する百花繚乱。集中攻撃を受けて絶体絶命の中、チセ、イズナ、ミモリら百鬼夜行の面々が駆けつける。"
3370622094 = "第一回戦：水鉄砲サバイバルゲーム（２）"
365815230 = "援護を受け、なんとか一回戦を突破した百花繚乱。だが、二回戦ではジェットボードで海を爆走すると聞き――キキョウは大いに動揺する。"
4037221880 = "第二回戦：暴走ジェットボート"
1144551112 = "二回戦の勝利条件は、巨大ジェットボートに振り落とされないよう耐えること。大パニックの中、百花繚乱はそれぞれの体を支え合いながら水上を駆け抜ける……！"
678818893 = "第三回戦：水上障害物レース"
1041862596 = "なんとか二回戦も突破し、ほっとするキキョウだったが……三回戦の種目は「水上障害物レース」。イズナたち他の参加者が活躍する中、水を怖がるキキョウは自然に脱落するのが最善と判断するが、その途上で地雷を踏んでしまい……とうとう海へと落ちてしまう。"
876036637 = "脱落からの浮上をかけて"
3928963159 = "チセとイズナが決勝に進出し、百花繚乱は全員脱落。その結果に自責の念を感じるキキョウだったが、仲間達に励まされる。その後、一行は敗者復活戦のビーチバレーに参加し、またもやアラタやチンピラたちと対峙することに。頼りになるレンゲとともに挑む勝負――だが、キキョウは嫌な予感が拭えないでいた。"
2251056241 = "敗者復活戦：ビーチバレー"
1834868248 = "対戦相手から「チームの弱点になっている」と指摘され、動揺するキキョウ。だが、レンゲの活躍もあって試合を制し、第二試合ではユカリとナグサのコンビがミモリたちと戦いを繰り広げることに。そんな中、キキョウは自分のためでなく、レンゲのために勝たなくては……と闘志を燃やすのだった。"
2454882779 = "百花繚乱 vs 百花繚乱"
1152005871 = "本選への復活を掛けて、一回戦に勝利したレンゲ・キキョウ組と、ユカリ・ナグサ組が激突することに。悩みを振り切ったキキョウは、レンゲとの華麗なコンビネーションを見せつけるが、ユカリとナグサもやられてばかりではない。そして、勝負を制したのは――！"
2409784972 = "互いの矜持"
2517191402 = "本選への進出を果たしたレンゲとキキョウ。キキョウはレンゲの指導を受けて泳ぎの練習をし、百夜水上祭の最後の種目「押し出しゲーム」へと挑む。二人は第1試合で戦うことになるが、キキョウは優勝の可能性が高いレンゲに勝ちを譲ろうと目論んでいた。その頃、会場付近にワカモの姿が――"
2601316494 = "最終戦：押し出しゲーム"
625197215 = "友達としてレンゲに応え、真剣勝負を挑むキキョウ。これまでの歩み、互いの成長を振り返りながら戦う中で、キキョウは自分だけでなく、応援してくれたみんなのためにも諦めないと語る。勝負を制したのはレンゲだったが、負けたキキョウも教わった泳ぎで海面へと上がり、成長した姿を周囲に見せるのだった。"
1374240881 = "決勝の果て（１）"
972403894 = "「押し出しゲーム」第2試合……イズナとチセの戦いは、一進一退の攻防の末に、イズナが勝利する。続いて行なわれた決勝で、激しい戦いを繰り広げるレンゲとイズナだったが、そんなとき、ワカモとスケバンたちが会場へと乱入する。だが、ワカモは会場を壊したスケバンに激昂し、先生たちと共にチンピラへと戦いを挑んだ。"
2662659970 = "決勝の果て（２）"
2541135733 = "先生の御前で、誰が強者かを決めたいと燃えるワカモ。会場の盛り上がりをチャンスと感じたシズコの計らいもあり、押し出しゲームのエキシビジョンマッチが開催されることになる。その戦いに名乗りを挙げたのは、ナグサだった。"
874828774 = "負けられない戦い"
3296688882 = "ワカモの相手はナグサと思いきや、彼女はキキョウを指名する。「災厄の狐」の圧倒的強さに押されるキキョウだったが、レンゲの言葉を思い出し、自身の得意技「あやとり」を応用した寝技に持ち込んでいく。足場が爆発するというアクシデントを経たビデオ判定の結果――勝利を収めたのはキキョウだった。"
3841231258 = "物語の幕引き"
681961707 = "百夜水上祭は幕を閉じ、みんなが思い出を語り合う中、キキョウはひとり海で泳ぎの練習をしていた。そこに訪れた先生に対して、キキョウは仲間への想いを語る――その後、勢揃いした百花繚乱のメンバーは、みんなで夏の海を楽しむのだった。"
891109437 = "夏空のやくそく"
638766874 = "「お姫様を乗せたカボチャの馬車。その馬車引きネズミは、どこから来たのか」三者三様の想いを秘めて、ティーパーティーの三人が迎える特別な夏休み。果たして、それぞれの「やくそく」の行く先は……？"
102485579 = "苦渋の選択"
1758810637 = "バカンスに行こう！"
2958894507 = "温泉クライシス（１）"
33490314 = "温泉クライシス（２）"
2007556553 = "ストーリーテラーのシナリオ"
3182348437 = "交渉の先、手にするモノ"
681569957 = "見えなかったモノと見てなかったモノ"
198094580 = "今再び、交渉の先、手にするモノ"
1473969249 = "一難去ってまた一難"
2254419904 = "ストーリーテラーも役者也"
2812911223 = "こうして日々は続いてく"
3389074056 = "夏、問題児、浜辺にて"
2698760335 = "苦渋の選択"
3471830961 = "密かにカスミを呼びつけたイチカは、かつての行いを謝罪しつつ、とある相談を持ちかけるのだった……。"
510573763 = "バカンスに行こう！"
868724966 = "いつも忙しそうにしているナギサを、無理矢理ティーパーティーのプライベートビーチへと連れ出すミカとセイア。ミカは、仕事のことを忘れてナギサにゆっくり休んでもらうために、正義実現委員会と先生の助力を求める。早速、施設の点検を行なう正義実現委員会だったが……ハスミと先生の目の前に、見覚えのある影が――"
3650982588 = "温泉クライシス（１）"
3259286566 = "先生とハスミは、温泉開発のために爆弾を設置しようとしているメグと遭遇する。ゲヘナのテロリストと知り、頭に血が上るハスミ。騒ぎを聞いたイチカとミカも駆けつけ、一行は温泉開発部との戦闘に突入してしまう……。"
4256633556 = "温泉クライシス（２）"
4100754173 = "撤退していく温泉開発部を追おうとするイチカとハスミを制止するミカ。今回の目的は、あくまでナギサに休んでもらうことなのだ。ひとまず、温泉開発部の資材を押収し、今度こそ上手くいくかも……と期待に胸を高鳴らせるミカだった。"
2905735432 = "ストーリーテラーのシナリオ"
189079989 = "ついにビーチに降り立ったナギサは、セイアに携帯を没収され、ミカの準備したバカンスを楽しむことになる。だが、材料さえ届けばお昼のバーベキューを始められる……というところで、配送トラックが襲撃されるというトラブルが発生！事態を重く見た先生は、躊躇いつつも美食の専門家に協力を依頼する……。"
1586521284 = "交渉の先、手にするモノ"
2960261762 = "ハスミがゲヘナへの怒りを露わにする中、粘り強く交渉するミカ。その想いが美食研究会の胸を打ち、バーベキューセットをハルナから受け取るが……それこそが、襲撃されたトラックが運んでいたものだったと判明。一触即発の空気になる中、ミカは戦いを避け、ナギサとセイアのいる元へと戻るのだった。"
2414294148 = "見えなかったモノと見てなかったモノ"
1918343499 = "食後のティータイムで、「ミルクティーはミルクが先か、紅茶が先か」で熱い議論を繰り広げるナギサとハスミ。そんな中、ミカはイチカと共にヨットの整備へと取り掛かる。自分が汚れることも気にせずスクリューのゴミを取り、ホコリまみれの船内を掃除するミカを見て、イチカは彼女への認識を改める。そのとき、海辺に轟音が鳴り響き――"
887693989 = "今再び、交渉の先、手にするモノ"
3281068593 = "海岸の地面が陥没し、別荘は崩壊。バカンスが台無しになったことを悲しみつつ、安全のために帰る準備を始めようとするミカ。その状況を見たイチカは一つの決断をし、カスミに対して地盤の調査と別荘の再建を依頼する。ミカの頑張りに胸を打たれたというイチカの心境を聞き、カスミは、カスミなりに誠意を見せることを決めた。"
2080918680 = "一難去ってまた一難"
2401129424 = "カスミと温泉開発部は、凄まじい勢いで工事を完了する。地下に水脈があったことが、この土地が陥没したことの原因――と聞いて、先生は嫌な予感がする。温泉のために爆破スイッチを押そうとするカスミを、慌てて気絶させるイチカ。爆破は回避された……かと思いきや、そこに現れたナギサがうっかりスイッチを押してしまう――"
4250400809 = "ストーリーテラーも役者也"
2854006256 = "好奇心から爆破スイッチを押して、ミカの頑張りを台無しにしてしまったことを謝るナギサ。ミカはトラブルを起こしてナギサに怒られることを恐れていたが、ナギサはミカがバカンスのために尽力してくれたことを心から信じていた。そんな二人のやりとりを見たセイアは、ナギサが昔のように無邪気な一面を見せてくれたことに安心を覚えるのだった。"
1149899978 = "こうして日々は続いてく"
1192372638 = "日常に戻った後、先生はトリニティを訪れる。利害が絡むビーチの片付けをナギサから依頼された先生は、その後カスミのもとを訪れる。イチカの依頼を受けたことに関してカスミが本音を明かさぬ中、そこに温泉開発部の面々が集まってくる。仲間達に囲まれて、カスミはどこか照れくさそうに笑うのだった。"
319907092 = "夏、問題児、浜辺にて"
1937080442 = "正義実現委員会のイチカは、ナギサからプライベートビーチのパトロールを頼まれる。ただの平和なパトロール任務……のはずだったが、浜辺は徐々にカオスな状況へ……。"
2910235899 = "我らオカルト研究会！～学院の不思議と古の呪文～"
589423980 = "「芸術の故郷」ことワイルドハント芸術学院。オカルト研究会の生徒と共に学院を見て回っていると、先生はさまざまな怪奇現象に遭遇し――"
1757997285 = "予言"
3432292044 = "運命的な再会"
3336159845 = "夢と希望のワンダーランド"
2333014958 = "芸術に宿るオカルト"
1429803762 = "声の主は……"
403535276 = "忌むべき者たち"
2173393234 = "それぞれの夢"
4268509919 = "伝説の証明"
3930840543 = "接触"
1670650202 = "作戦開始（１）"
2495751946 = "作戦開始（２）"
3290455411 = "願いが叶う魔法（１）"
3791453407 = "願いが叶う魔法（２）"
693904835 = "日常は続いていく"
243717312 = "予言"
1783764414 = "「……時は、満ちました」そう言って、怪しげな占いを行なう黒い影。彼女は、密かに歴史的一歩を刻もうと決意していた。"
1846210987 = "運命的な再会"
2035893641 = "公園ですさまじいライブを目撃し、ツムギと再会した先生。語り合う中、ワイルドハントへの興味が尽きない先生に対して、彼女は校内を案内し、友人達を紹介すると言うのだった。"
94309684 = "夢と希望のワンダーランド"
2312993075 = "ワイルドハントに足を踏み入れ、ツムギのルームメイトであるオカルト研究会のメンバーを紹介される。魔法を研究する絵画専攻のエリ、専攻は秘密なオカルトの専門家、カノエ。そして、ファッションデザイン専攻で、オカルトを信じないレナ。個性的なメンバーとともに、ワイルドハント巡りが始まった。"
602662681 = "芸術に宿るオカルト"
3230143843 = "美しい美術館で、学院の代表作「創世の影像」などと共に、動く悪魔像を紹介される先生。悪魔を呼び降ろすためにツムギがデスボイスでライブを行なうと、確かに像は動いていた。喜びつつ、悪魔像が呼ぶ「忌むべき者」たちが来る前に、急いで美術館を出るオカルト研究会。それについて行きながら、先生は不思議な学院への疑問が膨らんでいく。"
1950443646 = "声の主は……"
3427747708 = "レナは、芸術評議会の取り決めによって部屋が指定され、オカルトを信じていないのに、オカルト研究会のメンバーと相部屋になってしまった。それゆえ、ルームメイトを「まともに戻す」のが目的らしい。だが、囁き出す石像を前に、全力で怖がっていた。楽しそうに過ごすオカルト研究会が次に行なうのは……魔法陣を用いた悪魔召喚。"
3404328226 = "忌むべき者たち"
3959629266 = "寮の特別規則にまつわる怪談を語り、雰囲気を盛り上げるオカルト研究会。学内で4が最も多い部屋、第4寮404号室で儀式は実施される……。儀式の結果、部屋内で大爆発が起き、煙が充満。そこに「忌むべき者」たち――寮監隊が突入し、オカルト研究会、そして先生は連行されていく。"
3801750001 = "それぞれの夢"
2772664207 = "反省室に放り込まれるオカルト研究会のメンバーと先生。楽しい時間のため、傑作を生み出すため……それぞれの夢と、オカルトにハマったきっかけが明かされる。そんな中、今回は特別に注意のみ――と、寮監隊のミリアに釈放される一行。初対面のはずだが、ミリアは先生との再会を喜んでいる様子だった……。"
534740858 = "伝説の証明"
342039406 = "寮に戻り、爆発が起きた部屋の片付けをするオカルト研究会のメンバーと先生。そこで、先生はエリの過去作を見つけ、カノエからエリの絵に対する情熱を聞く。原状回復が完了した部屋で、新たな儀式に挑もうとする。それは、学院中をまたいだ魔法陣を作り、願いを叶える、ハイリスクなものだった。"
1190759647 = "接触"
4008770669 = "他の建物はともかく、寮監隊の宿舎を通って魔法陣を描かなければならない。安全に配慮した材料をミヨと名乗る生徒から調達し、夜に臨もうとする一行。だが、レナだけは、そのリスクを前に、参加を断るのだった。"
1327359974 = "作戦開始（１）"
3354972277 = "夜の学校で、寮監隊の目を逃れつつ、蓄光テープで魔法陣を作っていくオカルト研究会のメンバー、そして先生。だが、先生は寮監隊員に見つかってしまう。カノエのカラスが隙を作ってくれた隙に、逃げ出す先生。"
7705631 = "作戦開始（２）"
1730110018 = "オカルト研究会のメンバーと合流する先生だったが、全員寮監隊に包囲されてしまう。だがそのとき、学園内の滅亡を謳う鐘の音が響き渡った――"
1491323294 = "願いが叶う魔法（１）"
821028676 = "学院内の逸話が実現したことで、動揺する寮監隊。だがツムギは、その鐘を鳴らしているのがレナだと悟った。隙を突いて脱出を試みるオカルト研究会。"
3455333224 = "願いが叶う魔法（２）"
2541673132 = "ついに魔法陣を発動させた一行。すると、ワイルドハント学院に、巨大な光の魔法陣が出現する。だが、それ以上のことは起こらず、願いを叶える魔法はなかったと失望するエリとカノエ。だが、この行為はワイルドハントの評議会議長の目に止まり、今後も展示したいと評価を受ける。エリは、みんなに認められる作品を作れたと涙するのだった。"
1543250491 = "日常は続いていく"
1266981412 = "その後、反省室に再び投獄されたオカルト研究会と先生。まったく懲りずに、ワイルドハントを代表する「創世の影像」の秘密を見つけるため、評議会長の所有する美術館への潜入を提案するツムギ。レナ以外のみんなが盛り上がる一方――ミリアこと慈愛の怪盗は、オカルト研究会との次の出会いを心待ちにするのだった。"
1182331802 = "誰が為の芸術～偽飾の絵画と美学の行方～"
2650973403 = "美術館の収蔵庫にある贋作を真作とすり替えるという、奇妙な依頼を受けた特殊交易部。計画は順調に進むかと思われたが、「慈愛の怪盗」からの予告状により、事態は予期せぬ方向へ……。"
3968697943 = "見慣れぬ天井"
1943793894 = "くもりときどき交易品"
3581804017 = "聞いてあげます"
849689372 = "誰が紫、青を愛でるのか"
3742509751 = "純白の変数"
1402796539 = "虹のふもとは"
2440296708 = "プロット修正"
972763863 = "盗みと貿易の狭間"
3491921326 = "真偽の交差"
4000871095 = "こんなエンディングはいやだ"
3187725442 = "テストの結果"
513132341 = "たったひと言"
4063592236 = "見慣れぬ天井"
321247416 = "見知らぬ部屋で目覚めた先生。目の前にいたのはワイルドハントの生徒、桜井ミヨだった。彼女は校則違反の物品運びを請け負う「特殊交易部」を廃部にしたいと先生に悩みを打ち明ける。まずは、部長との面会を求めた先生だったが……ミヨは気まずそうに、自分がその部長だと告白するのだった。"
3854665383 = "くもりときどき交易品"
3506256888 = "なぜこの部屋に先生は運ばれていたのか――それは、ワイルドハントでの業務を終え一息つこうとしたところ、飛来した巨大な巾着が直撃し、気を失っていたからだった。巾着の中身は投石機で打ち上げた密輸品だと聞いて戸惑いつつ、先生は、ひとまずその部活動を見学することにする。"
3417447813 = "聞いてあげます"
2813678565 = "特殊交易部の活動を見学する先生。生徒たちの依頼品は、禁止された食品や画材といった平和なものがほとんどだった。見学後、フユはミヨが考案した受け渡し方法の巧妙さを褒めつつ、大きな依頼が来ていると語るが、ミヨは引き受ける気はない。だが、その莫大な報酬があれば、ミヨが探し求めていたタイプライターも入手できるとわかり、つい心を動かされるのだった。"
728695300 = "誰が紫、青を愛でるのか"
1892403812 = "フユの受けていた依頼は、画家を名乗る人物から「ベロニカ特別展」で展示される贋作と真作をすり替えてほしいという内容だった。犯罪行為に難色を示すミヨだが、やはり高額な報酬と、それで念願のタイプライターが手に入るという誘惑は強い……！先生の「みんなを信じる」という言葉にも背を押され、ミヨは作戦の立案を決意する。"
3967993505 = "純白の変数"
3035717569 = "ミヨは夜通しで作戦を練り、絵画が保管されている「収蔵庫」を狙うことを決める。しかし翌日、寮監隊の友人ヒロミから、偶然にもその収蔵庫の警備を担当していると聞かされ罪悪感を覚える。さらにヒロミは、特別展に「慈愛の怪盗」から予告状が届いていることを打ち明け、事態は思わぬ方向へと動き出す。"
2262708236 = "虹のふもとは"
4173580364 = "「慈愛の怪盗」からの予告状により、作戦の練り直しを余儀なくされたミヨ。予告状の解読に行き詰まるが、偶然出会ったエリの知識から「硬き空」が顔料の「ラピスラズリ」を指すことに気づく。これをヒントに謎を解き明かしたミヨは、フユとリツの元へ急ぎ、予告状の解読に成功したことを告げるのだった。"
1935941598 = "プロット修正"
929353011 = "ミヨは予告状の前半を解読し、怪盗の狙いが自分たちと同じ『誰が紫、青を愛でるのか』だと特定。先生も合流する中、怪盗に贋作を盗ませた後に真作を置くという作戦を立案する。さらに予告状の後半も解き明かし、犯行時刻が夕方の「マジックアワー」だと判明した。ミヨは、怪盗をサポートするため作戦を練り直していく。"
1239520600 = "盗みと貿易の狭間"
3993965843 = "日も暮れ、特別展の開催が迫る。寮監隊のミリアは正体を現し、「慈愛の怪盗」アキラとして計画を実行。一方ミヨたち特殊交易部も、怪盗の侵入を助けるため、罠や煙幕で寮監隊をかく乱していた。作戦が成功したかに思えたその時、ミヨたちの前に当のアキラ本人が姿を現すのだった。"
70628750 = "真偽の交差"
2173369049 = "特殊交易部の前に現れたアキラは、協力の真意を問いただす。アキラはフユが持っていた絵を瞬時に盗むが、これは贋作だと指摘。両者が困惑する中、先生が現れる。アキラも先生の生徒だと知り驚くミヨだが、先生の「生徒を信じる」という言葉を受け、アキラに全ての事情を話すことを決意する。"
846145545 = "こんなエンディングはいやだ"
2803439870 = "アキラは特殊交易部の目的を理解し、真作を自分が手に入れ、彼女たちが報酬を得られる協力案を提示する。しかし、誰も救われないその結末を、ミヨは作家として許せなかった。リツの怪力でアキラの退路を塞いだミヨは、この物語を正しく終わらせるため、全員が納得できる「賭け」を提案した。"
678391328 = "テストの結果"
398615950 = "展示会当日、依頼人の思惑とは裏腹に、会場には真作と贋作が並べられている。それこそが、昨夜ミヨがアキラに提案した、観客の審美眼を試す「賭け」の内容だった。観客が真作に集まり、賭けに勝利したミヨは安堵で倒れる。依頼人は逮捕され、事件は無事解決。その後、アキラは挙動不審になりつつ、先生に展示会のガイドを申し出るのだった。"
773747756 = "たったひと言"
4154888357 = "事件解決後、先生は特殊交易部とカフェで一息つく。ミヨは、リツの何気ない一言から観客の審美眼を信じて「賭け」に勝てたと明かす。だが、肝心の収支は大赤字で、念願のタイプライターが手に入らず落ち込むミヨ。まだ売れ残っていると知り、次の依頼への意欲を燃やす。その姿は、奇しくもアキラと重なるのだった。"
3341623687 = "魔法少女ヘヴィキャリバー～エラの野望と正義の資格～"
4229071812 = "とある事件を阻止するべく、遊園地に潜入することになった一同。それぞれが悩みを抱えながらも――「誰かがやるべきことだから」と覚悟を決め、彼女たちは現場へと向かう。"
2007113812 = "プロローグ"
