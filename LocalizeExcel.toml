2843453471 = "Agitação antes da tempestade"
2510762123 = "Hikari e Nozomi são encarregadas de uma importante missão de transporte, e Aoba, a mecânica. Enquanto esperam a partida, comem pizza na sala do chefe da estação. Aoba se irrita com o comportamento muito livre. No meio do caminho, há um atrito com um entregador de pizza que se autodenomina 'Brororo Sokyoku Rengou', mas partem…… ou assim parece, pois descobrem que o trem saiu sozinho."
234894002 = "Perseguindo o trem desaparecido"
2491575675 = "Para perseguir o trem que partiu devido a uma falha no sistema, as três chamam o Sensei como reforço e entram no metrô. Dentro do vagão, são ameaçadas por delinquentes, mas a aura negativa de Aoba, que 'não espera nada do futuro', as ajuda a repelir."
1820644909 = "Perseguindo o trem que desapareceu ainda mais"
693428850 = "Novamente, são informadas de que o trem já partiu. Desanimadas, tentam alcançá-lo de ônibus, mas Aoba, enjoada, está prestes a chegar ao limite. Finalmente chegam ao destino, e Hikari e Nozomi se animam para recuperar o trem. Enquanto isso, uma gangue de motoqueiros decide roubar a carga……"
4227455266 = "Com que carga ele corre?"
2831572118 = "Quando o Sensei pergunta sobre o conteúdo da carga, Hikari e Nozomi dizem que não sabem. Nessa conversa, Hikari encontra uma estação onde o trem de carga está parado e pede ao funcionário que o detenha à força. Mas a estação está sendo visitada pelo Canal Chronos, e a existência do trem se espalha por todo Kivotos."
2734625292 = "Os foras da lei da estrada novamente (1)"
3350873888 = "Sabendo da localização do trem pelas notícias do Canal Chronos, gangues de motoqueiros, delinquentes, moradores do Mercado Negro e a Gangue do Capacete – todos os vilões de Kivotos se dirigem à estação. O grupo chega à estação e é atacado pela gangue."
214528885 = "Os foras da lei da estrada novamente (2)"
298293347 = "O grupo repele a gangue e finalmente chega ao trem de carga. Começam os preparativos para a partida."
3002198178 = "Encontro mortal de fãs"
758680022 = "Os membros do 'Brororo Sokyoku Rengou' perseguem o trem que partiu com uma força tremenda. Com a transmissão de Shinon de helicóptero, a cena vai parar na TV nacional. Delinquentes e o Mercado Negro se juntam, e uma batalha caótica acontece. O trem entra no distrito autônomo de Gehenna……"
1912742186 = "O trem, o Sensei e a garota de cabelos prateados (1)"
4198519711 = "Iori não esconde sua surpresa ao saber que o Sensei está no trem. Atendendo ao pedido do Sensei, ela decide ajudar, lembrando-se de memórias desagradáveis, e o grupo entra em combate contra os perseguidores."
3244022405 = "O trem, o Sensei e a garota de cabelos prateados (2)"
3935017135 = "O grupo consegue repelir os perseguidores. Com a caixa de carga danificada pela luta, finalmente veem seu conteúdo. Enquanto isso, o chefe da gangue derrotada diz 'ainda tenho uma carta na manga' e tenta ir adiante para roubar a carga e entregá-la ao cliente."
4115766217 = "O que deve ser feito"
341963437 = "Aoba suspeita de uma conspiração devido ao erro no sistema de partida, à reportagem do Canal Chronos e ao número de perseguidores. Contra isso, Nozomi diz: 'Tudo o que devemos fazer é levar a carga ao destino'. O Sensei torce pelas três, que são responsáveis com o trabalho. Nesse momento, descobrem que os freios do trem não funcionam……"
1262942570 = "Um movimento para abrir caminho"
692436586 = "Quando tudo parecia perdido com os freios quebrados, Aoba cria um plano: explodir as rodas do trem para pará-lo à força. O trem para (com sucesso?), destruindo a estação e os trilhos. Lá, a gangue que os esperava os ataca……"
3730951926 = "A garota sorri em um mundo desconhecido"
3028706737 = "Finalmente, um cliente de aparência vilã aparece! Mas, apesar da fala mal-educada, ele é um empresário famoso por seu trabalho social. A carga também era para ser leiloada em uma caridade. A gangue derrotada reflete e decide recomeçar como entregadores. O incidente é resolvido. O Sensei, Hikari, Nozomi e Aoba vão jantar juntos felizes."
3343042660 = "A única flor que desabrocha entre cem – Vamos, batalha aquática"
3702024192 = "O 'Festival Aquático das Cem Noites', onde 100 participantes se enfrentam no mar, é realizado! No campo de batalha do mar de verão, será que a Hagi Tsukiyono conseguirá sobreviver?"
76733946 = "Confraternização da Hagi Tsukiyono"
569088934 = "Abertura! Festival Aquático das Cem Noites!"
1435783369 = "Primeira rodada: jogo de sobrevivência com pistolas d'água (1)"
1098783161 = "Primeira rodada: jogo de sobrevivência com pistolas d'água (2)"
869866388 = "Segunda rodada: jet boat desgovernado"
1935016526 = "Terceira rodada: corrida de obstáculos aquáticos"
2695979454 = "Em busca de uma segunda chance após a eliminação"
1899045441 = "Rodada de repescagem: vôlei de praia"
1171322563 = "Hagi Tsukiyono vs. Hagi Tsukiyono"
3224248483 = "Orgulho de cada uma"
317465244 = "Rodada final: jogo de empurra"
1219559063 = "Final (1)"
3621714258 = "Final (2)"
3948541153 = "Uma luta que não se pode perder"
3171838475 = "Cortina da história"
2687712889 = "Confraternização da Hagi Tsukiyono"
3553374059 = "Chegando à Praia Torii, a Hagi Tsukiyono decide participar do tradicional evento de verão de Hyakkiyako, o 'Festival Aquático das Cem Noites'. Enquanto os outros se animam, Kikyou faz uma expressão severa. Como estrategista, ela precisa pensar em estratégias – na verdade, em como esconder seu medo de água."
2607288957 = "Abertura! Festival Aquático das Cem Noites!"
1137445026 = "O 'Festival Aquático das Cem Noites' é uma batalha de sobrevivência onde 100 competidores lutam para ser o último. Enquanto o local se anima, Kikyou fica em alerta para as provas de natação. Mas, felizmente, a primeira rodada é o 'jogo de sobrevivência com pistolas d'água'. Com o Sensei como árbitro, o festival começa!"
3251561313 = "Primeira rodada: jogo de sobrevivência com pistolas d'água (1)"
3490215767 = "No 'jogo de sobrevivência com pistolas d'água', a Hagi Tsukiyono enfrenta os delinquentes e o Chimimouryou liderado por Arata. Cercados, em situação crítica, Chise, Izuna, Mimori e outros de Hyakkiyako aparecem."
3370622094 = "Primeira rodada: jogo de sobrevivência com pistolas d'água (2)"
365815230 = "Com o apoio, a Hagi Tsukiyono consegue passar pela primeira rodada. Ao saber que a segunda rodada será uma corrida desgovernada de jet board, Kikyou fica muito perturbada."
4037221880 = "Segunda rodada: jet boat desgovernado"
1144551112 = "A condição de vitória da segunda rodada é resistir sem ser derrubada do enorme jet boat. Em pânico, a Hagi Tsukiyono se apoia mutuamente e corre sobre a água!"
678818893 = "Terceira rodada: corrida de obstáculos aquáticos"
1041862596 = "Kikyou suspira aliviada por ter passado pela segunda rodada…… a prova da terceira rodada é a 'corrida de obstáculos aquáticos'. Enquanto Izuna e outras participantes se destacam, Kikyou, com medo de água, pensa que o melhor é ser eliminada naturalmente. No entanto, no caminho, pisa em uma mina e…… cai no mar."
876036637 = "Em busca de uma segunda chance após a eliminação"
3928963159 = "Chise e Izuna avançam para a final, e a Hagi Tsukiyono é totalmente eliminada. Kikyou se sente culpada, mas é encorajada pelas amigas. Em seguida, o grupo participa da repescagem de vôlei de praia, enfrentando novamente Arata e os marginais. Contando com a confiável Renge, Kikyou não consegue afastar um mau pressentimento."
2251056241 = "Rodada de repescagem: vôlei de praia"
1834868248 = "Apontada como 'o ponto fraco do time' pelo adversário, Kikyou fica perturbada. Mas, com a atuação de Renge, vencem a partida. Na segunda partida, a dupla Yukari e Nagusa enfrenta Mimori e as outras. Kikyou, agora, se anima para vencer não por si, mas por Renge."
2454882779 = "Hagi Tsukiyono vs. Hagi Tsukiyono"
1152005871 = "Para retornar à fase principal, a dupla Renge e Kikyou, que venceu a primeira rodada, enfrenta a dupla Yukari e Nagusa. Kikyou, superando suas preocupações, mostra uma bela combinação com Renge, mas Yukari e Nagusa também não são fáceis. E quem vence é –!"
2409784972 = "Orgulho de cada uma"
2517191402 = "Renge e Kikyou avançam para a fase principal. Kikyou aprende a nadar com Renge e se prepara para a última prova, o 'jogo de empurra'. As duas se enfrentam na primeira partida, mas Kikyou tenta ceder a vitória a Renge, que tem mais chances. Nesse momento, Wakamo aparece perto do local……"
2601316494 = "Rodada final: jogo de empurra"
625197215 = "Kikyou, respondendo a Renge como amiga, luta com seriedade. Enquanto relembram seus passos e crescimento, Kikyou diz que não desistirá por si e por todos que a apoiaram. Renge vence, mas Kikyou, que perdeu, também emerge da água, mostrando seu crescimento."
1374240881 = "Final (1)"
972403894 = "Segunda partida do 'jogo de empurra'…… A luta entre Izuna e Chise, após um vai e vem, é vencida por Izuna. Na final, Renge e Izuna lutam intensamente. Nesse momento, Wakamo e delinquentes invadem o local. Wakamo, irritada com os delinquentes que destruíram o local, luta contra eles junto com o Sensei."
2662659970 = "Final (2)"
2541135733 = "Wakamo, que queima para decidir quem é o mais forte diante do Sensei. Aproveitando a animação, Shizuko providencia uma partida de exibição do jogo de empurra. Quem se apresenta é Nagusa."
874828774 = "Uma luta que não se pode perder"
3296688882 = "Wakamo parece que vai enfrentar Nagusa, mas ela escolhe Kikyou. Kikyou é pressionada pelo poder avassalador da 'Raposa da Desgraça', mas lembra das palavras de Renge e usa seu golpe especial, o 'ayatori', para levar a luta para o chão. Após um acidente com o palco explodindo, o resultado do vídeo – a vencedora é Kikyou."
3841231258 = "Cortina da história"
681961707 = "O Festival Aquático das Cem Noites chega ao fim, e enquanto todos compartilham memórias, Kikyou treina natação sozinha no mar. Ao Sensei que a visita, ela fala sobre seus sentimentos pelas amigas – depois, todos os membros da Hagi Tsukiyono se reúnem e aproveitam o mar de verão."
891109437 = "Promessa do céu de verão"
638766874 = "'A carruagem de abóbora que transporta a princesa. Os ratos que a puxam, de onde vieram?' Com três sentimentos diferentes, as três do Tea Party enfrentam umas férias de verão especiais. Qual será o destino de cada 'promessa'?"
102485579 = "Escolha amarga"
1758810637 = "Vamos de férias!"
2958894507 = "Crise da fonte termal (1)"
33490314 = "Crise da fonte termal (2)"
2007556553 = "O roteiro do contador de histórias"
3182348437 = "O que se obtém após a negociação"
681569957 = "O que não se via e o que não se via"
198094580 = "Novamente, o que se obtém após a negociação"
1473969249 = "Um problema resolvido, outro aparece"
2254419904 = "O contador de histórias também é ator"
2812911223 = "Assim, os dias continuam"
3389074056 = "Verão, problemas, à beira-mar"
2698760335 = "Escolha amarga"
3471830961 = "Ichika chama Kasumi em segredo, pede desculpas por suas ações passadas e faz uma consulta……"
510573763 = "Vamos de férias!"
868724966 = "Mika e Seia forçam Nagisa, que está sempre ocupada, a ir para a praia particular do Tea Party. Mika pede ajuda ao Comitê de Justiça e ao Sensei para que Nagisa esqueça o trabalho e descanse. O Comitê de Justiça começa a inspecionar as instalações…… mas Hasumi e o Sensei veem uma sombra familiar –"
3650982588 = "Crise da fonte termal (1)"
3259286566 = "O Sensei e Hasumi encontram Megu tentando instalar explosivos para desenvolver uma fonte termal. Hasumi, ao saber que são terroristas de Gehenna, fica com sangue nos olhos. Mika e Ichika, ouvindo o barulho, também correm, e o grupo entra em luta contra o Departamento de Fontes Termais……"
4256633556 = "Crise da fonte termal (2)"
4100754173 = "Mika impede Ichika e Hasumi de perseguirem o Departamento de Fontes Termais, que recua. O objetivo é fazer Nagisa descansar. Apreendendo os materiais das fontes termais, Mika se anima com a esperança de que agora vai dar certo."
2905735432 = "O roteiro do contador de histórias"
189079989 = "Nagisa finalmente chega à praia. Seia confisca seu celular, e Mika a faz aproveitar as férias. No ponto em que iam começar o churrasco, quando os ingredientes chegassem, o caminhão de entrega é atacado! Vendo a gravidade, o Sensei, embora hesitante, pede ajuda a especialistas em gastronomia……"
1586521284 = "O que se obtém após a negociação"
2960261762 = "Enquanto Hasumi mostra sua raiva de Gehenna, Mika negocia persistentemente. Seus sentimentos tocam o coração da Sociedade de Estudos Gastronômicos, e ela recebe o kit de churrasco de Haruna, mas descobre-se que era o que o caminhão atacado transportava. Em um clima tenso, Mika evita a luta e volta para Nagisa e Seia."
2414294148 = "O que não se via e o que não se via"
1918343499 = "Na hora do chá, Nagisa e Hasumi discutem acaloradamente sobre 'o leite vai primeiro ou o chá?'. Enquanto isso, Mika faz a manutenção do iate com Ichika. Ichika muda sua percepção sobre Mika ao vê-la limpar o barco empoeirado, sem se importar em se sujar. Nesse momento, um estrondo ecoa na praia –"
887693989 = "Novamente, o que se obtém após a negociação"
3281068593 = "O chão da praia desaba, e a mansão desmorona. Triste por ter arruinado as férias, Mika começa a se preparar para voltar por segurança. Vendo isso, Ichika toma uma decisão e pede a Kasumi que investigue o terreno e reconstrua a mansão. Kasumi, tocada pelos sentimentos de Ichika, que disse ter se impressionado com o esforço de Mika, decide mostrar sua sinceridade à sua maneira."
2080918680 = "Um problema resolvido, outro aparece"
2401129424 = "Kasumi e o Departamento de Fontes Termais concluem a obra em uma velocidade tremenda. Ao saber que a causa do desabamento era a existência de um veio de água subterrâneo, o Sensei tem um mau pressentimento. Ichika apressadamente nocauteia Kasumi, que tenta apertar o botão de detonação para a fonte termal. A explosão é evitada…… ou parece, quando Nagisa aparece e aperta o botão sem querer –"
4250400809 = "O contador de histórias também é ator"
2854006256 = "Nagisa se desculpa por ter apertado o botão por curiosidade e arruinado o esforço de Mika. Mika temia ser repreendida por Nagisa por causar problemas, mas Nagisa acreditava sinceramente que Mika se esforçou para as férias. Vendo essa troca, Seia se sente aliviada por Nagisa ter mostrado um lado inocente como antigamente."
1149899978 = "Assim, os dias continuam"
1192372638 = "De volta à rotina, o Sensei visita Trinity. A pedido de Nagisa para limpar a praia, que envolve interesses, ele depois visita Kasumi. Kasumi não revela seus verdadeiros sentimentos sobre ter aceitado o pedido de Ichika. Nesse momento, os membros do Departamento de Fontes Termais se reúnem. Cercada pelos amigos, Kasumi ri, um pouco sem graça."
319907092 = "Verão, problemas, à beira-mar"
1937080442 = "Ichika, do Comitê de Justiça, é solicitada por Nagisa a patrulhar a praia particular. Uma missão pacífica de patrulha…… ou assim parecia, mas a praia gradualmente se torna uma situação caótica……"
2910235899 = "Nós, o Clube de Ocultismo! ~Os mistérios da academia e os feitiços antigos~"
589423980 = "Na 'terra natal da arte', a Academia Wild Hunt. Enquanto percorre a academia com as alunas do Clube de Ocultismo, o Sensei encontra vários fenômenos estranhos……"
1757997285 = "Profecias"
3432292044 = "Reencontro fatídico"
3336159845 = "Terra da fantasia dos sonhos e esperanças"
2333014958 = "Ocultismo na arte"
1429803762 = "A dona da voz é……"
403535276 = "Os abomináveis"
2173393234 = "Sonhos de cada uma"
4268509919 = "Prova da lenda"
3930840543 = "Contato"
1670650202 = "Início da operação (1)"
2495751946 = "Início da operação (2)"
3290455411 = "A magia que realiza desejos (1)"
3791453407 = "A magia que realiza desejos (2)"
693904835 = "A rotina continua"
243717312 = "Profecias"
1783764414 = "'…… O tempo está maduro.' Dizendo isso, uma sombra negra realiza uma leitura suspeita. Ela decide secretamente dar um passo histórico."
1846210987 = "Reencontro fatídico"
2035893641 = "O Sensei testemunha um show impressionante em um parque e reencontra Tsumugi. Conversando, com seu interesse pela Wild Hunt desperto, ela se oferece para guiá-lo pela escola e apresentar seus amigos."
94309684 = "Terra da fantasia dos sonhos e esperanças"
2312993075 = "Ao entrar na Wild Hunt, ele é apresentado aos membros do Clube de Ocultismo, colegas de quarto de Tsumugi. Eri, especializada em pintura, pesquisa magia; Kanoe, especialista em ocultismo com especialização secreta; e Rena, especializada em design de moda, não acredita em ocultismo. Começa o passeio pela Wild Hunt com esses membros peculiares."
602662681 = "Ocultismo na arte"
3230143843 = "Em um belo museu, junto com a obra-prima da escola, 'Imagem da Criação', etc., ele vê uma estátua de demônio que se move. Quando Tsumugi faz um show com voz gutural para invocar o demônio, a estátua realmente se move. Alegres, mas antes que os 'abomináveis' chamados pela estátua cheguem, o Clube de Ocultismo sai apressado do museu. Seguindo-as, o Sensei fica cada vez mais curioso sobre a escola."
1950443646 = "A dona da voz é……"
3427747708 = "Rena foi designada para um quarto por decisão do Conselho de Arte e acabou dividindo o quarto com membros do Clube de Ocultismo mesmo não acreditando. Por isso, seu objetivo parece ser 'trazer os colegas de quarto de volta à razão'. Mas, diante de uma estátua que sussurra, ela fica apavorada. A próxima atividade do Clube de Ocultismo, que parece se divertir, é a invocação de demônios com um círculo mágico."
3404328226 = "Os abomináveis"
3959629266 = "Contando histórias de terror sobre as regras especiais do dormitório, o Clube de Ocultismo anima o ambiente. O ritual é realizado no quarto com mais número 4, o quarto 404 do Dormitório 4. Como resultado do ritual, uma grande explosão ocorre, e a fumaça se espalha. Os 'abomináveis' – a Equipe de Vigilância – entram e detêm o Clube de Ocultismo e o Sensei."
3801750001 = "Sonhos de cada uma"
2772664207 = "O Clube de Ocultismo e o Sensei são jogados na sala de reflexão. Por um tempo divertido, para criar uma obra-prima…… cada sonho e o motivo de se viciarem em ocultismo são revelados. Nesse momento, eles são libertados pela vigilante Milia, que diz que desta vez será apenas uma advertência. Embora fosse a primeira vez que a viam, Milia parece feliz com o reencontro……"
534740858 = "Prova da lenda"
342039406 = "De volta ao dormitório, o Clube de Ocultismo e o Sensei limpam o quarto que explodiu. Lá, o Sensei encontra uma obra antiga de Eri e ouve de Kanoe sobre sua paixão pela pintura. Com o quarto restaurado, tentam um novo ritual. É algo arriscado: fazer um círculo mágico por toda a escola e realizar desejos."
1190759647 = "Contato"
4008770669 = "Para desenhar o círculo, precisam passar pelo dormitório da Equipe de Vigilância. Adquirem materiais seguros de uma aluna chamada Miyo e se preparam para a noite. Apenas Rena se recusa a participar, diante do risco."
1327359974 = "Início da operação (1)"
3354972277 = "À noite, na escola, escapando dos olhos da Equipe de Vigilância, o Clube de Ocultismo e o Sensei fazem o círculo mágico com fita adesiva luminescente. Mas o Sensei é descoberto por um vigilante. Kanoe cria uma brecha com seu corvo, e ele foge."
7705631 = "Início da operação (2)"
1730110018 = "O Sensei se reúne com o Clube de Ocultismo, mas todos são cercados pela Equipe de Vigilância. Nesse momento, o sino que anuncia a ruína da escola soa –"
1491323294 = "A magia que realiza desejos (1)"
821028676 = "A Equipe de Vigilância fica perturbada com a realização da lenda. Mas Tsumugi percebe que Rena está tocando o sino. Aproveitando a brecha, o Clube de Ocultismo tenta escapar."
3455333224 = "A magia que realiza desejos (2)"
2541673132 = "O grupo finalmente ativa o círculo mágico. Um enorme círculo de luz aparece na Academia Wild Hunt. Mas nada mais acontece. Eri e Kanoe se decepcionam. No entanto, o ato chama a atenção do presidente do Conselho da Wild Hunt, que avalia e quer expô-lo. Eri chora por ter criado uma obra reconhecida por todos."
1543250491 = "A rotina continua"
1266981412 = "Depois, o Clube de Ocultismo e o Sensei são novamente presos na sala de reflexão. Sem se arrependerem, Tsumugi propõe se infiltrar no museu de propriedade do presidente do Conselho para encontrar o segredo da 'Imagem da Criação'. Enquanto todos, exceto Rena, se animam – Milia, a 'Ladra da Misericórdia', aguarda o próximo encontro com o Clube de Ocultismo."
1182331802 = "Arte para quem – Pintura de falsificação e o paradeiro da estética"
2650973403 = "A Unidade de Comércio Especial recebe uma estranha solicitação: trocar uma pintura falsa por uma verdadeira no depósito do museu. O plano parece correr bem, mas com a carta de aviso da 'Ladra da Misericórdia', a situação toma um rumo inesperado……"
3968697943 = "Teto desconhecido"
1943793894 = "Nublado, às vezes com itens de comércio"
3581804017 = "Vou ouvir"
849689372 = "Quem ama o roxo, o azul?"
3742509751 = "Variável branca"
1402796539 = "Ao pé do arco-íris"
2440296708 = "Correção do roteiro"
972763863 = "Entre o roubo e o comércio"
3491921326 = "Cruzamento do verdadeiro e do falso"
4000871095 = "Não quero esse final"
3187725442 = "Resultado do teste"
513132341 = "Uma única palavra"
4063592236 = "Teto desconhecido"
321247416 = "O Sensei acorda em um quarto desconhecido. Diante dele está Miyo, aluna da Wild Hunt. Ela desabafa que quer acabar com a 'Unidade de Comércio Especial', que assume o transporte de itens contra as regras. O Sensei pede para se encontrar com a presidente…… Miyo, sem graça, confessa que ela mesma é a presidente."
3854665383 = "Nublado, às vezes com itens de comércio"
3506256888 = "O motivo de o Sensei ter sido trazido a este quarto – depois de terminar seu trabalho na Wild Hunt, ao tentar descansar, foi atingido por um enorme saco voador e desmaiou. Ao saber que o conteúdo do saco eram itens de contrabando lançados por uma catapulta, o Sensei, confuso, decide visitar o clube."
3417447813 = "Vou ouvir"
2813678565 = "O Sensei visita as atividades da Unidade de Comércio Especial. A maioria dos itens solicitados pelas alunas são pacíficos, como alimentos proibidos e materiais de arte. Após a visita, Fuyu elogia a inteligência de Miyo nos métodos de entrega e diz que uma grande solicitação chegou. Miyo reluta, mas ao saber que com o grande pagamento pode comprar a máquina de escrever que tanto procura, acaba se interessando."
728695300 = "Quem ama o roxo, o azul?"
1892403812 = "A solicitação que Fuyu recebeu era de uma pessoa que se diz pintora: trocar uma pintura falsa pela verdadeira na 'Exposição Especial Veronica'. Miyo hesita em cometer um crime, mas a tentação do alto pagamento e da máquina de escrever é forte. Com as palavras do Sensei 'confie em todos', ela decide planejar a operação."
3967993505 = "Variável branca"
3035717569 = "Miyo elabora um plano a noite toda e decide mirar no 'depósito'. No dia seguinte, sua amiga Hiromi, da Equipe de Vigilância, diz que, por coincidência, estará de guarda no depósito, e Miyo sente culpa. Hiromi revela que chegou uma carta de aviso da 'Ladra da Misericórdia' para a exposição especial, e a situação toma um rumo inesperado."
2262708236 = "Ao pé do arco-íris"
4173580364 = "Com a carta da 'Ladra da Misericórdia', Miyo precisa replanejar. Com dificuldade para decifrar, encontra Eri por acaso, e seu conhecimento revela que 'céu duro' se refere ao pigmento 'lápis-lazúli'. Com essa pista, Miyo decifra e corre para contar a Fuyu e Ritsu."
1935941598 = "Correção do roteiro"
929353011 = "Miyo decifra a primeira metade da carta e identifica que o alvo da ladra é o mesmo que o delas, 'Quem ama o roxo, o azul?'. Com o Sensei, ela planeja fazer a ladra roubar a falsificação e depois colocar a verdadeira. Decifra a segunda metade da carta e descobre que a hora do crime é o entardecer, a 'hora mágica'. Miyo reformula o plano para apoiar a ladra."
1239520600 = "Entre o roubo e o comércio"
3993965843 = "O dia escurece e a exposição especial se aproxima. Milia, da Equipe de Vigilância, revela sua verdadeira identidade, 'Ladra da Misericórdia' Akira, e executa o plano. Enquanto isso, a Unidade de Comércio Especial, para ajudar a ladra, atrapalha a Equipe de Vigilância com armadilhas e fumaça. Quando o plano parece bem-sucedido, a própria Akira aparece diante delas."
70628750 = "Cruzamento do verdadeiro e do falso"
2173369049 = "Akira, que aparece diante da Unidade, pergunta sua verdadeira intenção. Ela rouba instantaneamente a pintura que Fuyu tinha, mas aponta que é falsa. As duas ficam confusas. O Sensei aparece. Surpresa por Akira também ser aluna do Sensei, Miyo, com as palavras 'confiar nos alunos', decide contar tudo a Akira."
846145545 = "Não quero esse final"
2803439870 = "Akira entende o objetivo da Unidade e propõe uma cooperação: ela pegaria a verdadeira, e elas receberiam o pagamento. Mas Miyo, como escritora, não aceita esse final onde ninguém se salva. Com a força de Ritsu bloqueando a saída de Akira, Miyo propõe uma 'aposta' que todos possam aceitar, para terminar a história corretamente."
678391328 = "Resultado do teste"
398615950 = "No dia da exposição, contra os interesses do cliente, a verdadeira e a falsa estão lado a lado. Esse era o conteúdo da 'aposta' que Miyo propôs a Akira na noite anterior: testar o senso estético do público. O público se concentra na verdadeira. Miyo vence a aposta e desmaia de alívio. O cliente é preso, e o caso é resolvido. Depois, Akira, um pouco estranha, se oferece para guiar o Sensei na exposição."
773747756 = "Uma única palavra"
4154888357 = "Após o caso, o Sensei descansa com a Unidade em um café. Miyo revela que, graças a uma palavra casual de Ritsu, confiou no senso estético do público e venceu a 'aposta'. Mas o balanço financeiro está no vermelho, e ela fica desanimada por não conseguir a máquina de escrever. Ao saber que ainda resta uma, ela se anima para a próxima tarefa. Sua figura, curiosamente, se sobrepõe à de Akira."
3341623687 = "Magical Girl Heavy Caliber ~A ambição de Era e a qualificação para a justiça~"
4229071812 = "Para impedir um certo incidente, o grupo se infiltra em um parque de diversões. Cada uma com suas preocupações – 'porque é algo que alguém precisa fazer' – elas se preparam e vão ao local."
2007113812 = "Prólogo"
1389103315 = "A qualificação para a patrulha voluntária"
3670730391 = "Planos de fim de semana"
1275780559 = "O que é a Magical Girl Heavy Caliber!"
3377041422 = "Início do show no palco!"
970617948 = "Perseguição! Gangue do Capacete! (1)"
1478998812 = "Perseguição! Gangue do Capacete! (2)"
3622057000 = "Mamoru Suzumi"
781215453 = "Stanag-chan, se esforce (1)"
1755335414 = "Stanag-chan, se esforce (2)"
2126080124 = "A qualificação para fazer o bem"
4252977784 = "A primeira e última chance"
3388532438 = "Final"
3255179817 = "Como você está?"
3519305971 = "O futuro é brilhante"
562973436 = "Blues da Gangue do Capacete"
4261263739 = "Nascimento da executiva do mal"
668979687 = "Prólogo"
291814856 = "No show de heróis do parque de diversões, as garotas mágicas 'Heavy Calibers' aparecem! Recebendo a torcida das crianças, Suzumi e Reisa posam. Diante dessa cena, Love acaba questionando a sanidade delas."
1625623402 = "A qualificação para a patrulha voluntária"
3887718499 = "Suzumi, que atua na patrulha voluntária, ao subjugar um delinquente, é apontada: 'Você só está usando violência com uma cara de justiça, sendo uma fracassada'. Ela começa a duvidar do significado de sua atividade. Nesse meio tempo, Shimiko, que ouviu um plano sinistro da Gangue do Capacete na biblioteca antiga, pede ajuda a Suzumi, mas ela se recusa, dizendo que 'é trabalho do Comitê de Justiça'……"
1516868240 = "Planos de fim de semana"
3737638084 = "Para denunciar o plano sinistro da Gangue do Capacete, Suzumi e Shimiko visitam o Comitê de Justiça. No entanto, como o local é na fronteira com Gehenna, o Comitê não pode agir abertamente; ao contrário, pede que elas verifiquem a situação. Enquanto se preocupam com a falta de pessoal, Reisa aparece e se oferece para ajudar. Assim, as três se infiltram no parque de diversões com roupas de garota mágica."
251151206 = "O que é a Magical Girl Heavy Caliber!"
389196534 = "Para a missão de infiltração, Suzumi e Reisa vestem roupas de garota mágica. Reisa chama Suzumi de 'Thermite White' e se identifica com o papel, mas Suzumi não esconde a vergonha. Mashiro e o Sensei se juntam como apoio. Quando a operação está prestes a começar, o gerente do show as confunde com as verdadeiras atrizes, e elas acabam participando do show de heróis……"
952740791 = "Início do show no palco!"
1766902987 = "No show, diante de uma grande plateia, Suzumi é tomada pelo nervosismo. Reisa improvisa para manter o clima, mas o roteiro do teleprompter está borrado de suor, e Suzumi entra em pânico. Além disso, as palavras que o delinquente disse antes vêm à tona, e ela congela no palco."
4157121877 = "Perseguição! Gangue do Capacete! (1)"
562445621 = "Para Suzumi, que estava parada no palco, Mashiro informa que encontrou Love. Recuperando o ânimo, Suzumi salta do palco, ignorando o burburinho da plateia, e persegue Love e as outras. Encurrala-as na área de Gehenna, mas já está repleta de espectadores que confundiram a cena com parte do show."
2600015690 = "Perseguição! Gangue do Capacete! (2)"
627070372 = "Derrotada por Love diante do público, Suzumi e Reisa são encurraladas. Quando tudo parecia perdido, as vozes de crianças chorando, que dizem que são 'pessoas ruins', confundem Love. Percebendo a situação, Love finge ser derrotada e grita 'a vitória é de vocês', recuando."
3398629634 = "Mamoru Suzumi"
3108822929 = "Suzumi confessa que fugiu do Comitê de Justiça por não suportar as relações humanas. Ela se autodenomina covarde e decide deixar a patrulha voluntária. Reisa tenta impedi-la, chamando-a de 'minha heroína'. Nesse momento, Mashiro informa que Love foi avistada novamente – com as palavras do Sensei e de Reisa, Suzumi, embora com dúvidas, se reergue para cumprir a missão."
3807592120 = "Stanag-chan, se esforce (1)"
3287974263 = "Love, que o grupo reencontra, está vestida de mascote de anime de garota mágica, 'Stanag-chan'. Usando o público como escudo, ela age para que não possam atacar. Nesse momento, Shimiko, fantasiada de executiva do mal 'Era', invade. Seguindo o cenário, 'Era' ataca 'Stanag-chan', e a situação se torna uma batalha confusa."
3677586344 = "Stanag-chan, se esforce (2)"
1024996158 = "Love, que faz o papel do mascote, é atacada não apenas pela vilã Shimiko, mas também por Suzumi e Reisa, que deveriam ser suas aliadas. Após a luta, exausta e caída, Love é detida por Reisa e levada a um armário escuro. O que a aguarda são três pessoas com baterias, com expressões vazias. E o grito de Love ecoa no armário –"
317219623 = "A qualificação para fazer o bem"
1854592249 = "Love, levada ao armário, é interrogada por Suzumi e as outras. Descobre-se que o objetivo delas é prender o responsável pela distribuição de produtos falsificados no parque, não um ato terrorista. Pedindo desculpas pelo mal-entendido, Suzumi se oferece para cooperar na captura. Uma estranha aliança entre patrulha voluntária, comitê da biblioteca e Gangue do Capacete é formada."
2385994890 = "A primeira e última chance"
3188488956 = "Suzumi e as outras encontram um comerciante suspeito vendendo produtos defeituosos perto do palco. Quando abordado, ele tenta fugir, mas é impedido por um tiro de Reisa. Revelada, Mirai chama seus comparsas, e diante do público que confundiu com o show final, começa a batalha decisiva entre patrulha voluntária, Gangue do Capacete e o Clube de Pseudociência liderado por Mirai……"
2892796202 = "Final"
2443811802 = "Suzumi encurrala Mirai, que fugiu para a praça. Revelando seu passado de não se adaptar ao Comitê de Justiça, autodenominando-se 'praticamente uma delinquente', ela declara sua própria justiça: 'só proteger alguém já é o suficiente'. Com a cooperação de seus companheiros, ela captura Mirai, e o incidente chega ao fim."
1899721295 = "Como você está?"
2828168073 = "Após o incidente, as ações das garotas mágicas são noticiadas, e as três estão totalmente entrosadas. Durante a patrulha, encontram Love e as outras voltando do churrasco. Suzumi agradece novamente pela cooperação. O clima é descontraído, mas quando Love joga uma lata vazia e erra a lixeira, Suzumi a repreende para recolher. A tensão volta."
1768186388 = "O futuro é brilhante"
163172869 = "Derrotada por Suzumi e as outras, Mirai cai no lago do parque. Com a explosão, ela perde todas as mercadorias e ainda quebra sua pulseira de germânio. À beira do desespero, sente que a pulseira agiu como um escudo e, vendo isso como uma nova oportunidade de negócio, se reergue vigorosamente."
2099317968 = "Blues da Gangue do Capacete"
694429975 = "Love recebe a tarefa de capturar os comerciantes ambulantes do parque. Mas a Gangue do Capacete, que deveria vir como reforço, é atacada no caminho e não consegue os ingressos. Love usa a inteligência e tenta entrar pelo zoológico temporariamente fechado, mas acaba no recinto dos crocodilos. Com crocodilos de verdade, os gritos de Love ecoam."
4008169269 = "Nascimento da executiva do mal"
231764874 = "Na noite em que a missão de infiltração foi decidida, Shimiko estuda a noite toda sobre garotas mágicas na biblioteca para se preparar para ser a executiva do mal 'Era'. Ui, que testemunha seu comportamento desregrado por acaso, tenta impedi-la, preocupada. No final, intimidada pela atuação convincente de Shimiko com sua própria roupa, Ui desmaia."
3079877914 = "Após a resolução do incidente, cada uma retorna à rotina com mudanças no coração."
4070451962 = "O plano falha, e Mirai é arremessada para o lago. Mas o fracasso é uma ponte para novas oportunidades de negócio."
2531513792 = "A Gangue do Capacete e Love se preparam para o evento do parque de diversões. Um plano perfeito…… ou assim parecia."
1456231187 = "Shimiko se esforça ao máximo para se tornar a executiva do mal. Uma 'maga' a observa secretamente."
392103132 = "Renascimento literário do céu de inverno ~Sobre o intercâmbio cultural saudável~"
716784848 = "O Departamento de Publicações aceita a consignação de livros da Frente de Libertação do Conhecimento. Para abrir novos canais de venda para livros que não vendem em Red Winter, elas partem para Trinity."
3561465831 = "Sem risco, sem retorno."
455454674 = "Para exibição, para preservação, para divulgação"
2319141675 = "Valorizando os livros"
107272528 = "Declaração de imposto de renda"
821735451 = "Operação secreta"
79574849 = "A princesa do país do inverno"
1749892251 = "Um lugar sem ninguém"
856774448 = "Última chance"
715814693 = "Guerra da biblioteca antiga"
3920895348 = "O rio corre por ela"
3271972537 = "Sem risco, sem retorno."
774262240 = "A Frente de Libertação do Conhecimento desmaia devido às obras no refeitório. O Departamento de Publicações estende a mão e aceita a consignação dos livros, partindo para Trinity para abrir novos canais de venda em seu lugar."
3895910746 = "Para exibição, para preservação, para divulgação"
3706272456 = "Os livros da Frente de Libertação do Conhecimento eram um pouco fortes para as jovens senhoritas de Trinity. As jovens, fascinadas pela história, recomendam comprar três exemplares (para exibição, para preservação e para divulgação) e espalhar o boca a boca. Assim, os livros se espalham silenciosamente por Trinity. O boato chega aos ouvidos de Nagisa, do Tea Party."
51224899 = "Valorizando os livros"
791447976 = "Nagisa julga que os livros distribuídos pelo Departamento de Publicações incitam indiretamente o desvio de conduta e pede ao Sensei e a Shimiko, do Comitê da Biblioteca, que investiguem."
404086332 = "Declaração de imposto de renda"
744362128 = "Apurando as vendas do primeiro dia, o Departamento de Publicações e a Frente de Libertação do Conhecimento se surpreendem com o valor. Enquanto se animam para a distribuição do dia seguinte, o Sensei e Shimiko se juntam a Mashiro, do Comitê de Justiça, e começam a investigação."
1429154297 = "Operação secreta"
1460894748 = "No dia seguinte, quando as duas do Departamento de Publicações estão prestes a começar a distribuição, são interrompidas por uma aluna de Trinity. Aparentemente, se tornaram alvo de investigação do Comitê de Justiça. Conseguindo um meio de continuar a distribuição enganando os olhos do Comitê, elas realizam uma feira secreta."
2274946455 = "A princesa do país do inverno"
403795676 = "Enquanto a feira é um sucesso, o Departamento de Publicações se preocupa em ter novos materiais. Com o plano de continuação recebido de uma aluna, elas encomendam a sequência a Mel. Enquanto isso, a investigação do Sensei e do grupo está difícil."
2346952575 = "Um lugar sem ninguém"
3617300838 = "Com o cerco do Comitê de Justiça se ampliando, o Departamento de Publicações tem dificuldade em garantir locais para a feira. O destino das duas é a biblioteca antiga de Trinity…… Sem saída, Takane contata o Sensei."
2347443494 = "Última chance"
2918157071 = "O Sensei, chamado por Takane, vai à biblioteca antiga. Após ouvir a história, ele sugere que encerrem o caso. No entanto, já é tarde, e o Comitê de Justiça chega à biblioteca."
3039664793 = "Guerra da biblioteca antiga"
1767269131 = "O grupo reunido na biblioteca antiga aponta as armas para cumprir seus respectivos papéis."
2905181237 = "O rio corre por ela"
1627424892 = "Com a mediação do Sensei, um acordo de intercâmbio cultural é firmado entre Red Winter e Trinity, e o Departamento de Publicações fica impune."
2624700207 = "O caminho de Shinobu ~Missão de segurança do desfile de moda!~"
3713943962 = "Por um motivo inesperado, Tsukuyo estreia como modelo de moda. Com isso, as atividades do Clube de Estudos Ninja ficam prejudicadas, e a atmosfera do clube muda gradualmente……"
