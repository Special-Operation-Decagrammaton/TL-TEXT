2273210620 = "Festival da Sombra da Lua"
1432978810 = "Preparativos para o festival"
3381388658 = "Convidado para o tradicional 'Festival da Sombra da Lua', o Sensei visita Shanhaijing e se reencontra com Mina e Kisaki. Ignorando as preocupações dos alunos com o clima tenso, Kisaki mostra sua intenção de realizar o festival como sempre."
2580264648 = "Fenômeno anômalo"
3308870116 = "No local de preparação do Festival da Sombra da Lua, agitado pelo incidente do clube de ópera, um misterioso fenômeno faz com que alunos, principalmente membros da Sociedade Comercial Genbu, fiquem mais jovens. Simultaneamente, os boatos sobre 'Kanai Shin', cujos registros deveriam ter sido apagados, se espalham por toda Shanhaijing."
340163993 = "Boatos"
1199490648 = "O boato sobre Kanai Shin e o fenômeno de rejuvenescimento continuam a se espalhar. Julgando ser difícil resolver rapidamente, Kisaki decide limitar a realização do Festival da Sombra da Lua. Enquanto isso, o Sensei contata Shun para coletar informações. Percebendo a situação, ela aparece na forma de 'Shuerin' diante de Kisaki e do Sensei."
346243017 = "Adultos e crianças, crianças, crianças."
1439490319 = "Por sugestão de Shun, Kisaki e as outras se disfarçam de crianças do Jardim Meihua e começam a coletar informações por Shanhaijing. Conversando com Rumi, que foi afetada pelo fenômeno de rejuvenescimento no Jardim Meihua, percebem que o alvo do inimigo é o Clube de Estudos de Alquimia, cuja presidente, Saya, está ausente."
3259478954 = "Linha entre passado e presente (1)"
1087028543 = "Aproveitando a ausência de Saya, Kanai Shin retorna ao Clube de Estudos de Alquimia e se dirige a um laboratório escondido. Enquanto isso, Raijo e Mina vão a pedido de Kisaki, que percebeu o ataque, mas mercenários do Mercado Negro os aguardam……"
3790867855 = "Linha entre passado e presente (2)"
3280896799 = "Kanai Shin assume o Clube de Estudos de Alquimia e imediatamente produz um 'elixir'. Ela toma o elixir e ri sinistramente, sentindo a energia fluir por todo o corpo."
796406391 = "Encruzilhada com seu mundo (1)"
1029900945 = "Raijo e Mina lutam contra o grande número de inimigos, mas são salvos por Kisaki, que traz membros do Portão Xuanlong. No entanto, Kanai Shin se interpõe."
696443017 = "Encruzilhada com seu mundo (2)"
1392877054 = "Diante do poder de Kanai Shin, fortalecida pelo elixir, o grupo é forçado a recuar. Kanai Shin atiça a ansiedade dos membros do Portão Xuanlong e dos alunos de Shanhaijing, como se quisesse acabar com Kisaki, já fragilizada. Embora o Sensei evite o pior com sua perspicácia, a situação é desfavorável, e Kisaki e as outras não têm escolha a não ser fugir."
3263544419 = "Nós no futuro distante"
1073117875 = "Kanai Shin, que derrotou Kisaki, mas não tem interesse nos assuntos internos do Portão Xuanlong, começa a se concentrar na pesquisa do elixir. Enquanto isso, facções radicais ganham força no Portão Xuanlong, tentando fazer de Kaguya, presidente do clube de ópera, a porta-voz interina no lugar de Kisaki. Abordada, Kaguya recusa, mas promete cooperar para resolver o problema atual, pensando em Kisaki, que carregava sozinha a responsabilidade de porta-voz."
3966918864 = "Se eu for lá, encontrarei o qilin?"
2951348541 = "O Sensei conversa com Kisaki, que se abrigou na Sociedade Comercial Genbu, sobre acontecimentos passados e suas verdadeiras intenções. Kisaki encontra o que deve fazer e declara que realizará o Festival da Sombra da Lua. Nesse momento, membros moderados do Portão Xuanlong chegam e juram lealdade a ela novamente."
2498708804 = "Mesmo que erremos o caminho várias vezes (1)"
700229668 = "Kisaki, que retorna ao Portão Xuanlong, encontra novamente Kaguya. Enquanto trocam opiniões sobre as tradições que devem proteger, Kaguya entende que Kisaki está certa e deseja que ela prove sua correção derrotando-a, para restaurar a ordem e a tradição em Shanhaijing."
2594409892 = "Mesmo que erremos o caminho várias vezes (2)"
2075309196 = "Kisaki derrota Kaguya, ordena que seus subordinados retomem o Palácio Rokuwa e, com Mina, vai em direção à masmorra."
2475868789 = "Todos os problemas (1)"
2762014940 = "Antes de enfrentar o Clube de Estudos de Alquimia, Kisaki e as outras vão à masmorra para libertar Saya. No entanto, os guardas se recusam a soltar Saya, com medo das exigências de Kanai Shin e de parar o fornecimento do remédio que previne o rejuvenescimento. Kisaki então declara que assumirá toda a responsabilidade e tenta forçar a libertação."
1430381554 = "Todos os problemas (2)"
3646071198 = "Kisaki consegue libertar Saya e, com seus aliados, vai ao Clube de Estudos de Alquimia. Para Saya, que se preocupa com sua saúde, Kisaki mostra um sorriso significativo."
4179327947 = "Sob o mesmo céu (1)"
758416301 = "Kisaki enfrenta Kanai Shin novamente. Durante a conversa, Kisaki aponta que tudo foi culpa de Kai, incluindo sua expulsão anterior. Com raiva, Kai provoca, e Kisaki, como porta-voz do Portão Xuanlong, a desafia novamente."
1290862584 = "Sob o mesmo céu (2)"
1184003556 = "Kai é derrotada por Kisaki, pois o fenômeno de rejuvenescimento que ela mesma causou se volta contra ela. Embora critique a atitude de Kisaki, ela se agrada com a resposta à pergunta que fez ao Sensei e aceita de bom grado conter o rejuvenescimento e ser recolocada no Centro Correcional."
3621474916 = "Festival da Sombra da Lua"
68319105 = "O fenômeno de rejuvenescimento é contido, e o Festival da Sombra da Lua será realizado como de costume. Com Raijo, Kisaki, que liga várias vezes, e os alunos que sorriem alegremente, o Sensei aproveita o festival."
1404411654 = "Serenata do Passeio"
4191564136 = "Para melhorar a imagem da Irmandade e da Ordem dos Cavaleiros de Resgate, Sakurako e Mine decidem participar do 'Concurso de Ídolos' realizado no Carnaval de Trinity. No entanto, devido à falta de conhecimento sobre ídolos, pedem ajuda a Marie. Para corresponder às expectativas das duas, Marie decide aprender sobre ídolos com o Sensei……"
1248986296 = "Aquisição"
1450264767 = "Mudança de imagem"
1897622706 = "Caminho do ídolo: roupas (1)"
2899404639 = "Caminho do ídolo: roupas (2)"
2873166408 = "Caminho do ídolo: dança (1)"
2834964171 = "Caminho do ídolo: dança (2)"
3147199183 = "Caminho do ídolo: música"
