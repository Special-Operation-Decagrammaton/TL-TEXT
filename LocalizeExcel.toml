3024338162 = "De quem é este festival? (2)"
4211840112 = "Ainda assim, algo que posso fazer"
3672456810 = "As memórias sempre brilham"
1107715282 = "Um pressentimento inesperado"
2611070182 = "Kaho e Chise estão aproveitando suas merecidas férias. Niya, de repente, traz a notícia para as duas de que alunas de Gehenna virão visitar Hyakkiyako."
3056758961 = "Justo, imparcial e agradável"
1071167405 = "O Comitê Organizador do Festival acaba sendo encarregado de guiar as alunas de Gehenna de uma maneira justa e imparcial. Com as instruções repentinas de Niya, os membros do comitê entram em confusão."
230615013 = "Like a roller coaster"
2991705736 = "O Comitê Organizador do Festival e os guias começam os preparativos para receber as alunas de Gehenna. No entanto, apesar de todos estarem unidos, o passeio guiado começa com problemas logo de cara."
1337227752 = "Este encontro vai até onde"
3095630295 = "As alunas de Gehenna não ouvem os guias e agem de forma mais egoísta do que o habitual. Para tentar acalmá-las, os guias trabalham arduamente."
1217806858 = "Viu? É fácil, não é? (1)"
3555243550 = "As alunas de Gehenna visitam uma oficina de artesanato tradicional com seus guias. Bem no momento em que estavam se divertindo, a atmosfera muda completamente devido a um intruso repentino."
4286660962 = "Viu? É fácil, não é? (2)"
886297814 = "Os guias e as alunas de Gehenna derrotam o convidado indesejado. Tendo se aproximado emocionalmente, elas passam a reconhecer umas às outras como amigas."
2517970998 = "Melhor que flores, melhor que bolinhos (1)"
2944533842 = "Hora do jantar divertido. No entanto, as alunas de Gehenna, incluindo o Clube de Pesquisa Gastronômica, ignoram Umika e começam a comer em um local não planejado. Umika e as outras tentam persegui-las às pressas, mas um problema acontece."
1540273776 = "Melhor que flores, melhor que bolinhos (2)"
878796698 = "Umika e as outras conseguem, por pouco, acalmar o Clube de Pesquisa Gastronômica. No entanto, a própria Umika sente-se frustrada consigo mesma devido à série de confusões."
918329583 = "Travessuras que vagam pela noite (1)"
1967792890 = "O grupo de Umika preparou um teste de coragem para as alunas de Gehenna. Contudo, o surgimento inesperado de um yokai coloca os guias em uma situação difícil."
2245461290 = "Travessuras que vagam pela noite (2)"
2019782794 = "Graças às alunas de Gehenna que se juntaram a elas mais tarde, a confusão se acalma por um momento. No entanto, a agenda continua uma bagunça..."
3042426557 = "O que cada uma carrega"
1949613221 = "Pessoas que juram fazer o seu melhor para proteger a posição umas das outras. Será que a viagem de estudos das alunas de Gehenna terminará bem?"
3543102806 = "No meio da dança"
2008861582 = "Finalmente, o ponto alto do festival de Hyakkiyako, o Festival da Árvore Sagrada, começa. Umika jura em seu coração fazer o seu melhor para guiar as alunas de Gehenna e compensar seus erros anteriores."
3673996570 = "De quem é este festival? (1)"
569140321 = "A trupe Chimi aparece novamente diante do grupo de Umika, tentando atrapalhar a viagem de estudos. Umika e as outras entram em combate para expulsá-los."
650004307 = "De quem é este festival? (2)"
9584740 = "O grupo de Umika consegue, por pouco, impedir a trupe Chimi de atrapalhar o festival. No entanto, devido a um acidente inesperado, a queima de fogos, que é o ponto alto do festival, começa antes do planejado."
222204002 = "Ainda assim, algo que posso fazer"
2056228905 = "O Festival da Árvore Sagrada ficou uma bagunça devido ao acidente inesperado. Mas, sem desistir, Umika e as outras criam o festival junto com as alunas de Gehenna."
495840264 = "As memórias sempre brilham"
1297150860 = "A barulhenta viagem de estudos de Gehenna chega ao fim, e o Sensei passa um tempo divertido comemorando junto com os guias."
4168542915 = "-ive aLIVE!"
3598198730 = "“Vamos montar uma banda!”\nPara comer o doce das rainhas, o “Frederica Semla”, o Clube de Doces do Pós-Escola decide formar uma banda para o festival escolar. Será que elas conseguirão ter sucesso com a banda e colocar as mãos nos doces!?"
432212926 = "Não está faltando um pouco?"
638221292 = "Vamos montar uma banda!!"
1071892162 = "A coisa mais importante"
96497056 = "A nobre de Wild Hunt"
2912577249 = "Uma eu diferente de antes"
