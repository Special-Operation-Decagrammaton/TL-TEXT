756050995 = "天使たちと共に"
1476788021 = "梅花園の園児たちを連れて陶磁器の工房へと見学に来たシュンだったが、テンションの上がった園児たちの好奇心に振り回されて、工房の中は大騒ぎになってしまう。"
1516134459 = "シュン教官の憂鬱"
696264170 = "仕事疲れと園児たちのトラブルに疲れてしまったシュンは、何か美容に効く薬がないかと錬丹術研究会のサヤの元を訪れる。サヤから受け取った「若返りの秘薬」を飲んだシュンは昔の姿に戻ってしまい、折り悪く先生と出くわした彼女はつい自分の正体を隠してしまうことに。"
3171161429 = "タンフールー in ネバーランド"
272869629 = "幼くなったシュンは自分のことをシュエリンと名乗り、「シュンを探す」という口実で、先生と一緒に山海経を回ることに。"
3659036705 = "ちょっとした仕返し"
2128585953 = "シュエリンと先生が公園に訪れると、そこでココナと遭遇。ココナにはやや怪しまれるものの気づかれることなく、シュエリンとココナは流れから軽い言い合いになってしまう。"
3993338859 = "真面目が制服を着て"
1130994462 = "お茶屋さんで落ち着いたひと時を過ごしていたシュエリンと先生の元に、ヴァルキューレ警察学校の生徒であるキリノが登場。キリノがパトロールがてらシュエリンを梅花園に送ろうと提案するものの、ふたりの時間を邪魔されたくないと考えたシュエリンはキリノを言葉で巧みに翻弄する。"
865881669 = "明かされる正体"
659739859 = "先生はシュエリンに対し、本当に梅花園の子なのかと言葉をかける。返答に迷うシュエリンだったがそのタイミングでサヤが現れ、彼女がシュンであることが先生にもバレてしまう。シュエリンはそのことを否定して逃げてしまうが、その様子を見たサヤが早く解毒剤を飲ませないとマズいかもしれないと口にする。"
3193274746 = "ドタバタ捕獲大作戦"
2090973919 = "サヤと先生はシュンを捕まえるためにあらゆる罠を仕掛けるが、どれも失敗に終わってしまう。「こうなったら」とふたりして力尽くで捕らえようとするものの、そこへキリノが通りかかり、サヤと先生は警察署へと連行されてしまうことに。"
1019726723 = "教官としての"
3020610193 = "先生は今日本来の約束を果たせなかったサヤに謝罪しつつ、あらためてシュンと対話することを決める。彼女に話を聞くと、シュンの口からは教官としての重責に対する思いがぽつぽつと漏れ出す。今日は楽だったと告げるシュンだったが、彼女の中にもやはり様々な葛藤があるのだった。そんな時、遠くから園児たちの声が聞こえてきて……。"
4229508126 = "シュンとシュエリン"
138721578 = "シュンは無事に元の身体へと戻ることができた。後日、梅花園へと訪れた先生を見つけて、シュンは背の高さを生かしながらちょっとだけ子どものように先生へと甘えるのだった。"
1980144437 = "船上のバニーチェイサー"
