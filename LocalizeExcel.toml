2369259268 = "[c]Ao finalizar sua fase:[/c] Concede [c]{param;BasePower}[/c] de escudo a todos os atacantes aliados."
3836785110 = "Compra [c]{param;DrawCardNum}[/c] cartas.\n\n\n[c][75b4c0][i]\"Não temos tempo a perder! Vamos logo!\"[/i][-][/c]"
51114751 = "Concede [c]{param;BasePower}[/c] de escudo a todos os atacantes aliados.\n\n\n[c][75b4c0][i]Aviso: Caso seja danificado, a segurança não pode ser garantida.[/i][-][/c]"
460683044 = "Recupera aleatoriamente [c]{param;BasePower}[/c] de HP de um atacante aliado.\n\n\n[c][75b4c0][i]A proteção contra raios UV está perfeita.[/i][-][/c]"
2786309527 = "O custo de [c]1[/c] carta aleatória na mão torna-se [c]0[/c].\n\n\n[c][75b4c0][i]\"Então o boato de que a Sisterhood realiza tortura por afogamento é verdade...!\"\n- Presidente do Comitê de Biblioteca viciada em teorias da conspiração, Ui Kozeki[/i][-][/c]"
3277306309 = "Recupera [c]{param;BasePower}[/c] de custo.\n\n\n[c][75b4c0][i]\"É um segredo só para o Sensei, viu?\"[/i][-][/c]"
824148601 = "O tempo de recarga dos aliados especiais diminui em [c]{param;CoolDownNum}[/c].\n\n\n[c][75b4c0][i]\"Mente sã em corpo são!\"\n- Presidente do Comitê de Operações do Festival, Shizuko Kawawa[/i][-][/c]"
1661864707 = "O poder da habilidade EX de um atacante aliado aumenta em [c]2[/c].\n\n\n[c][75b4c0][i]\"C-colocar xarope no chá...? E ainda por cima café!?\"\n\"Que bárbaro... o mundo lá fora é bárbaro demais...!\"[/i][-][/c]"
3693334331 = "Causa de [c]{param;Min} a {param;Max}[/c] de dano a um inimigo aleatório.\n\n\n[c][75b4c0][i]\"Não se esqueçam da hidratação e de pausas frequentes!\"\n- Uma palavra do Sensei[/i][-][/c]"
3696462035 = "Troca um inimigo da linha de trás escolhido por você com a linha de frente.\n\n\n[c][75b4c0][i]Uma combinação que une três técnicas de trançado.[/i][-][/c]"
633044372 = "Gera aleatoriamente [c]{param;SpawnCardNum}[/c] cartas descartáveis.\n\n\n[c][75b4c0][i]\"Hum, vou levar comida~\"[/i][-][/c]"
2857739209 = "Descarta [c]1[/c] carta aleatória da mão. Em seguida, causa dano a um inimigo aleatório equivalente ao custo da carta descartada.\n\n\n[c][75b4c0][i]Chá gelado doce com um toque de expresso, pronto☆[/i][-][/c]"
1179284497 = "Compra [c]{param;DrawCardNum}[/c] cartas. Em seguida, descarta [c]{param;DrawCardNum}[/c] cartas aleatórias da mão.\n\n\n[c][75b4c0][i]Nós tememos aquilo que possui forma.[/i][-][/c]"
1836275032 = "Compra [c]1[/c] carta. Em seguida, o custo de cartas aleatórias é reduzido em [c]1[/c] para cada aluna da tag [c]{tag;MakeUpWork}[/c] aliada.\n\n\n[c][75b4c0][i]\"Bem... às vezes, isso não é tão ruim assim.\"\n- Aluna que não gosta do sol, Ui Kozeki[/i][-][/c]"
806052023 = "Pede ajuda aos arredores, invocando [c]{param;SpawnNum}[/c] atacantes de suporte da tag [c]{tag;TeaParty}[/c].\n\n*Se todos os atacantes aliados se retirarem e restarem apenas atacantes de suporte, será uma derrota.\n\n\n[c][75b4c0][i]\"Seia-chan, passe direito, tá?\"\n\"Direito... é?\"[/i][-][/c]"
815061249 = "O poder da habilidade EX de um atacante aliado na linha de trás aumenta em [c]1[/c] e ele troca de lugar com a linha de frente.\n\n\n[c][75b4c0][i]\"Com isso, posso lutar por mais 10 anos...!\"\n- Departamento de Investigação Federal Schale, anônimo[/i][-][/c]"
815643320 = "Gera [c]{param;SpawnCardNum}[/c] cartas [c]{card;848902}[/c].\n\n\n[c][75b4c0][i]\"Por que só melancia? Ei, Nagi-chan? Seia-chan?\"[/i][-][/c]"
2031556786 = "Gera aleatoriamente [c]{param;SpawnCardNum}[/c] cartas da tag [c]{tag;Supply}[/c].\n\n\n[c][75b4c0][i]O refeitório estudantil de Gehenna é famoso por mudar o menu a qualquer momento. É ainda mais famoso pelos frequentes acidentes com explosões.[/i][-][/c]"
1644799027 = "Gera [c]{param;SpawnCardNum}[/c] cartas especiais (?) descartáveis na mão. O custo das cartas alvo torna-se [c]0[/c].\n\n\n[c][75b4c0][i]\"Isso não é fotografia clandestina! É jornalismo!\"\n- Academia Chronos, editora-chefe do departamento de notícias, Mai Kazamaki[/i][-][/c]"
4101646287 = "Coloca [c]{param;SpawnCardNum}[/c] cartas [c]{card;848220}[/c] no topo do baralho. Em seguida, compra [c]{param;DrawCardNum}[/c] cartas.\n\n\n[c][75b4c0][i]Incidentes com reféns são comuns em Kivotos. Por isso, cada escola realiza treinamentos para se preparar para tais eventos.[/i][-][/c]"
2180099568 = "Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório. Em seguida, compra [c]{param;DrawCount}[/c] cartas.\n\n\n[c][75b4c0][i]Em Kivotos, não importa qual você escolha, o incidente será resolvido.[/i][-][/c]"
751809694 = "Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório."
2597863102 = "Quando estiver na mão, o dano aumenta em [c]1[/c] a cada carta jogada.\n\n\n[c][75b4c0][i]Um amigo útil, a qualquer hora e em qualquer lugar.[/i][-][/c]"
1839598266 = "Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório."
1084081170 = "Quando estiver na mão, o dano aumenta em [c]1[/c] a cada carta comprada.\n\n\n[c][75b4c0][i]\"Hehe, você está descuidado. Vou te dar um golpe!\"[/i][-][/c]"
3783454783 = "Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório. Se causar dano a um inimigo na linha de frente, esta carta é copiada para a mão como descartável.\n\n\n[c][75b4c0][i]“Ora, ora~ Quando se fala em festival, não estamos falando de Hyakkiyako? Isso é apenas uma inspeção, entende? De forma alguma é um pretexto para vadiar.”\n-Academia Hyakkiyako, Chefe do Departamento Yin-Yang, Tenchi Niya[/i][-][/c]"
2433453841 = "O tempo de recarga dos especiais aliados é reduzido em [c]{param;CoolDownNum}[/c]. Se a aluna alvo for [c]{tag;MakeUpWork}[/c], todo o tempo de recarga é reduzido.\n\n\n[c][75b4c0][i]Mar, trajes de banho, praia e um tanque decorado de forma fofa.[/i][-][/c]"
1154569838 = "O custo de todas as cartas na mão atual é reduzido em [c]1[/c].\n\n\n[c][75b4c0][i]“Vamos interromper o combate por um momento. É hora do chá.”\n-Anfitriã do Chá, Kirifuji Nagisa[/i][-][/c]"
1929745470 = "Recupera [c]{param;EquipRecoverNum}[/c] da durabilidade do equipamento equipado pelo atacante aliado.\n\n\n[c][75b4c0][i]“Originalmente, deveria ter um design mais prático, mas... bem, já que estamos nisso, é melhor que seja fofo.”\n-Líder da facção Sanctum, Yurizono Seia[/i][-][/c]"
3770542764 = "Compra [c]{param;DrawCardNum}[/c] cartas. Se a carta alvo for uma carta de equipamento, seu custo é reduzido em [c]1[/c].\n\n\n[c][75b4c0][i]“Hahahaha! Ora, ora, isso não é assustador?”[/i][-][/c]"
977128452 = "Compra [c]{param;DrawCardNum}[/c] cartas. Se a carta alvo for uma carta de equipamento, seu custo torna-se [c]0[/c].\n\n\n[c][75b4c0][i]“I-i-ieeeeh!?”[/i][-][/c]"
1231517689 = "Gera [c]{param;SpawnCardNum}[/c] cartas de equipamento aleatórias como descartáveis.\n\n\n[c][75b4c0][i]“Muito bem, a manutenção das armas de fogo está perfeita.”[/i][-][/c]"
3225642553 = "O HP máximo do atacante aliado na linha de frente aumenta em [c]10[/c] e o poder da habilidade EX aumenta em [c]10[/c]. Em seguida, todos os outros atacantes aliados retiram-se.\n\n\n[c][75b4c0][i]“Haha, isso é... complicado.”[/i][-][/c]"
2400133517 = "O custo de [c]1[/c] carta de equipamento aleatória na mão torna-se [c]0[/c].\n\n\n[c][75b4c0][i]Trabalhar sem se divertir torna você um bobo.[/i][-][/c]"
2508948111 = "Causa [c]{param;BasePower}[/c] de dano ao atacante na linha de frente. Em seguida, o poder da habilidade EX do atacante alvo aumenta em [c]2[/c].\n\n\n[c][75b4c0][i]“Se-seu idiota...! Eu disse para não mexer com ele...! Argh...!”\n-Últimas palavras antes de ser levado. Grupo do Capacete anônimo[/i][-][/c]"
3756842642 = "Destrói todos os equipamentos do atacante aliado selecionado. Em seguida, recupera o HP do atacante alvo e aumenta o poder da habilidade EX de acordo com o número de equipamentos destruídos.\n\n\n[c][75b4c0][i]Um protótipo de próxima geração que teria sido perdido em Millennium. Dizem que, desta vez também, a estabilização falhou.[/i][-][/c]"
