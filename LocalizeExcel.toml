2374839960 = "イブキの好きなお姉さんたちにプレゼントしてもらったぬいぐるみ。少し変わった外見をしているが、イブキはそこが一番気に入っているとのこと。"
938424299 = "イブキが普段から大切にしているクレヨン。イブキが描く世界は、文字通り広大無辺。"
1063147996 = "イブキの大好物。1日1個しか食べられない貴重なおやつだが、たまに冷蔵庫から消えることがあるらしい。"
1559446809 = "イブキの私物が入ったカバン。携帯電話とホイッスル、銃器、先輩たちに持たされたティッシュ、そしてキレイな花びらまで、色んなものが入っている。"
917196592 = "イブキの好きな先輩たちを描いた絵。マコトの特命によりゲヘナの宝と指定されている。"
1246509466 = "万魔殿の威厳を知らせる目的で作られた定期刊行物。ただし、その内容のほとんどはイブキに関するもので、実際のところ、イブキグッズとして扱われている。"
1636079057 = "給食部の衛生評価が書かれた点検表。ほぼ満点だが、ごくまれに、やむを得ない事情から合格点に及ばないこともあるとのこと。"
1783365279 = "旧校舎に落ちていたピアノ調律工具。かなり古いが、元の持ち主が大切に扱っていたのか、使うのに問題はない。"
561939847 = "誰かが忘れていったスクールバック。教科書やお菓子、マンガだけでなく、爆弾のようなものが入っているところがまた、ゲヘナらしいとも言える。"
1142909824 = "焼け焦げた万魔殿の新聞。幸い、イブキに関する記事はなく、掲載されているのはマコトの演説のみ。これで損をする人はいないはず。"
4224932345 = "風紀委員会が管理する、特別牢の出入者記録台帳。本来は保安のための重要な記録物だが、今は頻繁に特別牢に入る生徒たちの芳名帳と化している。"
186189428 = "アコがヒナのために用意したコーヒードリッパー。秘書の優しさと配慮の伝わる素敵なものだが、アコの淹れたコーヒーは美味しくないと不評。"
2653748522 = "給食部での料理勉強のため、ジュリが細かく書き残したレシピ。このレシピ通りにすれば、よほどのことがない限り美味しい料理が作れる。"
2932450416 = "チェリノがマコトに送った手紙。指導者としての心構えや、ゲヘナ学園の発展を祈念するといったメッセージが書かれている。"
1955500566 = "特別牢で見つかったスプーン。食べ物を食べたり、特別牢を脱出したり、スーパーヒーローに変身するときに使われる。"
652268410 = "風紀委員会の業務が記録された、書類の山。見るだけで頭が痛くなってくる文字と数字でいっぱいだ。ぶつかって倒しでもしたら大惨事！注意しよう！"
3128527829 = "セナが書いた患者リスト。最優先で治療にかかるべき対象から仮病の患者まで、冷静にまとめられていて、セナの几帳面な性格がうかがえる。"
4077140834 = "誰かが失くした食券。元の持ち主は不明だが、食券の上に書いてある「楽しみ！」の文字が、なんだか切ない。"
3849298482 = "しわくちゃになって捨てられている掲示物。内容の大半はマコトの偉業についてのものなので、特に使い道はない。"
88965538 = "まだ使用していない救急医学部の注射器。危ないので、下手に触らないよう気をつけよう！"
