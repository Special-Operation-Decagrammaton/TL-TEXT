538442205 = "Prólogo"
1449222839 = "O Sensei, convidado por Shizuko para o festival, vai ao distrito autônomo da Academia Hyakkiyako. Lá, encontra uma garota chamada 'Izuna' e ouve sobre seu sonho. Ela fica feliz porque o Sensei a apoia, mas diz que precisa cumprir um 'pedido' e vai embora."
2868740167 = "Bem-vindo à Cem Noites"
3022400054 = "O Sensei chega à tradicional cafeteria 'Cem Noites' e é calorosamente recebido por Shizuko e Fuuna, do comitê organizador do festival. No entanto, naquele momento, com uma explosão, aparece o 'Chimimouryou – facção de rua'."
2819599029 = "As crianças problemáticas de Hyakkiyako"
3150946652 = "Enquanto lutam com o Chimimouryou – facção de rua, Izuna está entre eles. Embora surpresa, Izuna recua junto com o Chimimouryou. Enquanto consulta o presidente da rua comercial, Shizuko decide pedir ajuda a outros clubes com a ajuda do Sensei."
1397990433 = "A garota eletromagnética do Departamento de Yin-Yang"
1863239733 = "Para resolver o problema do Chimimouryou, o Sensei e Shizuko visitam o Departamento de Yin-Yang. No entanto, a presidente está ausente, e quem os recebe é a garota eletromagnética 'Chise'. Ela sugere que 'talvez dê certo se vocês forem ao Departamento de Treinamento' e, ao saírem, eles são novamente atacados pelo Chimimouryou."
1550527487 = "Os excêntricos do Departamento de Treinamento (1)"
2901698646 = "Quando o Sensei e Shizuko estavam sendo pressionados pelo número do Chimimouryou, aparecem os três membros do Departamento de Treinamento. Izuna também aparece novamente e desafia: 'Vou convencer o Sensei'."
2868330061 = "Os excêntricos do Departamento de Treinamento (2)"
1540547905 = "Depois de derrotarem o Chimimouryou e Izuna, o grupo os deixa escapar. Sem tempo para persegui-los, o comitê organizador e o Departamento de Treinamento decidem procurar o mandante que está empregando o Chimimouryou e Izuna."
2417194596 = "O festival começa"
1414862293 = "O grupo começa a agir para encontrar o mandante, mas tanto o comitê organizador quanto o Departamento de Treinamento recebem tarefas inesperadas, restando apenas Fuuna e o Sensei. Quando tentam procurar o Chimimouryou, ocorre uma confusão na barraca de recortes……"
3322041533 = "Festival, sonhos e……"
2820688883 = "O Sensei reencontra Izuna e os dois passam um tempo aproveitando o festival. Quando ele pergunta sobre o mandante, ela diz que, embora indecisa, não pode revelar por ser ninja. Depois que Izuna vai embora, como se estivesse esperando o momento, o Chimimouryou aparece diante do Sensei……"
389931609 = "Conspiração revelada e além"
464929464 = "O mandante de Izuna e do Chimimouryou era Nyantemaru, o presidente da rua comercial. Quando Nyantemaru diz que planeja arruinar o festival por dinheiro e que 'usou a brincadeira idiota de Izuna para isso', o Sensei o contradiz. Naquele momento, Izuna, que ouviu tudo, invade o local para ajudar o Sensei."
510483198 = "Falta pouco para o final! (1)"
1070874512 = "No momento em que o Sensei e Izuna estão encurralados, aparecem as alunas do comitê organizador e do Departamento de Treinamento. Mas Nyantemaru, que já havia previsto isso, chama o Chimimouryou espalhado pela cidade, e o grupo está novamente em perigo……!?"
2874004235 = "Falta pouco para o final! (2)"
38247590 = "Quando o trunfo de Nyantemaru falha, o Chimimouryou foge imediatamente. Diante de Nyantemaru, que descaradamente diz 'vamos esquecer isso', o soco de Shizuko, com os cabelos em pé de raiva, explode."
1143447829 = "O sonho da garota (1)"
2258871246 = "Para não deixar que atrapalhem o final do Hanamatsuri, o Departamento de Treinamento persegue o Chimimouryou nos bastidores do festival."
1547567664 = "O sonho da garota (2)"
797984036 = "O Hanamatsuri termina com sucesso, animado. O Sensei, como prometido, encontra Izuna no mirante e eles assistem juntos aos últimos fogos. Embora ela pareça envergonhada por um tempo, com as palavras do Sensei, Izuna, iluminada pelos fogos no céu, mostra um sorriso radiante."
3841520946 = "Ivan Kupala da Revolução"
4175786323 = "Cherino convida o Sensei para a Federação Escolar Red Winter para celebrar o festival de verão 'Ivan Kupala'. No entanto, com um golpe repentino, Cherino é deposta…… Começa a revolução de Cherino para recuperar o trono de presidente!"
