1623024344 = "コストの問題じゃない？\nまあ、カニをたくさん食べれる大会なら、私も参加したいな。"
2319544021 = "やばい……組織から預かった金をセキュリティ系ファンドに突っ込んだんだけど、最近の強盗事件のせいで一気に暴落して……\n今月中に戻せなかったら、マジでカニの餌にされるかも……。"
937886249 = "だから分散投資しろって言ったのに。\n投資は失ってもいい金でやれって言葉、知らないの？"
1719757308 = "世の中失ってもいい金なんてどこにあるんだよ\nそんな金あるならこっちにくれよ。"
824801969 = "カルパッチョ・ファミリーの帳簿盗まれたんだってｗｗｗ\n内部の人間じゃないと無理だろうし、誰か裏切ったなこれ。"
