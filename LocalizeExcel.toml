1107715282 = "Pressentimento como um raio de céu claro"
2611070182 = "Enquanto aproveitam as férias, Kaho e Chise recebem a notícia repentina de Niya de que alunas de Gehenna virão a Hyakkiyako."
3056758961 = "Justo, justo e de bom grado"
1071167405 = "Por um método justo e imparcial, o comitê organizador do festival acaba tendo que guiar as alunas de Gehenna. Com a ordem repentina de Niya, os membros ficam confusos."
230615013 = "Como uma montanha-russa"
2991705736 = "O comitê organizador do festival e as guias começam os preparativos para receber as alunas de Gehenna. Embora todos se unam, problemas surgem logo no início."
1337227752 = "Este encontro vai além"
3095630295 = "As alunas de Gehenna, sem ouvir as guias, agem por conta própria mais do que nunca. Para acalmá-las, as guias trabalham duro."
1217806858 = "Viu? É fácil, né? (1)"
3555243550 = "As alunas de Gehenna visitam um ateliê de artesanato tradicional com as guias. Quando estavam se divertindo, um invasor repentino muda o clima."
4286660962 = "Viu? É fácil, né? (2)"
886297814 = "As guias e as alunas de Gehenna derrotam os visitantes indesejados. As alunas, agora mais próximas, reconhecem-se umas às outras como amigas."
2517970998 = "Mais que flores, mais que bolinhos de arroz (1)"
2944533842 = "Hora do jantar divertida. No entanto, as alunas de Gehenna, incluindo a Sociedade de Estudos Gastronômicos, ignoram Umika e começam a comer em um lugar não planejado. Umika e as outras tentam segui-las apressadas, mas um problema ocorre."
1540273776 = "Mais que flores, mais que bolinhos de arroz (2)"
878796698 = "Umika e as outras conseguem acalmar a Sociedade de Estudos Gastronômicos, mas a própria Umika se sente frustrada com a série de incidentes."
918329583 = "O travesso que vagueia na noite (1)"
1967792890 = "Umika e seu grupo preparam um teste de coragem para as alunas de Gehenna. No entanto, a aparição de um yokai não programado coloca as guias em situação difícil."
2245461290 = "O travesso que vagueia na noite (2)"
2019782794 = "Com a ajuda das alunas de Gehenna que chegaram depois, a confusão se acalma temporariamente. Mas a programação ainda está uma bagunça."
3042426557 = "O que cada uma carrega"
1949613221 = "Pessoas, em suas respectivas posições, juram fazer o melhor para proteger a posição umas das outras. Será que a excursão escolar das alunas de Gehenna terminará em segurança?"
3543102806 = "No meio da dança"
2008861582 = "Finalmente, começa o ponto alto do festival de Hyakkiyako, o Festival Shinboku. Umika jura em seu coração fazer o melhor para guiar as alunas de Gehenna e compensar seus erros anteriores."
3673996570 = "De quem é este festival? (1)"
569140321 = "O Chimimouryou aparece novamente diante de Umika e seu grupo, tentando atrapalhar a excursão. Umika e as outras entram em combate para afugentá-los."
650004307 = "De quem é este festival? (2)"
9584740 = "Umika e seu grupo conseguem impedir o Chimimouryou de atrapalhar o festival. No entanto, um acidente inesperado faz com que os fogos de artifício, o ponto alto do festival, comecem mais cedo do que o planejado."
222204002 = "Mesmo assim, o que se pode fazer"
2056228905 = "O Festival Shinboku vira uma bagunça devido ao acidente inesperado. Mas Umika e as outras não desistem e criam o festival junto com as alunas de Gehenna."
495840264 = "As lembranças sempre brilham"
1297150860 = "A movimentada excursão escolar de Gehenna chega ao fim, e o Sensei passa um tempo divertido de comemoração com as guias."
