4244436954 = "Quando está na mão, o poder aumenta em mais [c]1[/c] cada vez que a EX Skill ou SP Skill de uma aluna {tag;Justice} é ativada.\n\n\n[c][75b4c0][i]Muitas alunas se juntam ao Comitê de Justiça atraídas pela elegante técnica de tiro da vice-presidente, mas muitas desistem diante do treino rigoroso.[/i][-][/c]"
1856381988 = "Concede escudo de [c]{param;BasePower}[/c] a um striker aliado. Se o striker alvo for {tag;Justice}, o poder da EX Skill também aumenta em [c]1[/c].\n\n\n[c][75b4c0][i]'O pedido era 'castelo de areia'. Castelo, ou seja, fortaleza. Fiz para que pudesse resistir a qualquer ataque.'\n- Classe de reforço, Shirasu Azusa[/i][-][/c]"
167897384 = "Concede escudo de [c]{param;BasePower}[/c] a um striker aliado. Se o striker alvo for {tag;TeaParty}, o poder da EX Skill aumenta em [c]1[/c].\n\n\n[c][75b4c0][i]'…… foi o que ouvi.'[/i][-][/c]"
3927623307 = "Gera cartas de equipamento descartáveis proporcionalmente ao número de alunos {tag;Justice} aliados. O custo desses equipamentos se torna [c]0[/c]."
3707754626 = "Quando está na mão, o custo desta carta diminui em [c]1[/c] cada vez que a EX Skill ou SP Skill de uma aluna {tag;Justice} é ativada.\n\n\n[c][75b4c0][i]Uma pequena mas preciosa lembrança, a força motriz para o amanhã.[/i][-][/c]"
2582097626 = "Se o striker aliado selecionado for uma aluna {tag;Trinity}, concede escudo de [c]{param;ShieldPower}[/c]. Se o alvo for uma aluna {tag;Gehenna}, o poder da EX Skill aumenta em [c]1[/c] e recupera [c]{param;HealPower}[/c] de HP.\n\n\n[c][75b4c0][i]'Essa roupa, vocês não têm vergonha?'[/i][-][/c]"
3573593350 = "Pede ajuda ao redor e invoca [c]{param;SpawnCharacterNum}[/c] strikers de suporte {tag;Justice}.\n\n※ Se todos os strikers aliados recuarem e restarem apenas os strikers de suporte, a derrota é decretada.\n\n\n[c][75b4c0][i]Entre as escolas de Kivotos, o distrito autônomo administrado pela Academia Trinity é considerado particularmente seguro.[/i][-][/c]"
