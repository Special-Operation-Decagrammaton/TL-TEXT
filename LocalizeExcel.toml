#[ +++ ][Resumos dos episódios e seus títulos:]
#[ --- ][Capítulo 1:]
4199086753 = "Bem-vindo à Força-Tarefa Hipotecária!"
3167291451 = "A carta enviada pelo Ensino Médio Abydos relatava que as alunas estavam sendo encurraladas por uma gangue violenta local. O Sensei [USERNAME] vai até a região autônoma de Abydos para ajudá-las, mas acaba se perdendo logo após chegar."

3987177942 = "Primeiro dia em Abydos"
3646064857 = "Após ser socorrido por Shiroko, o Sensei chega à sala do departamento da Força-Tarefa Hipotecária de Abydos. Nesse exato momento, a Gangue do Capacete Kata-Kata ataca a escola, e o Sensei coopera com as estudantes para lutar contra elas."

4043312483 = "Primeiro dia em Abydos"
1202784751 = "Sob o comando do Sensei [USERNAME], as alunas de Abydos conseguem expulsar a Gangue do Capacete com sucesso e retornam para a escola."

3989313715 = "Ser um Adulto é Incrível!"
1608590402 = "De volta à sala do departamento, as estudantes da Força-Tarefa se apresentam formalmente ao Sensei. Felizes por receberem ajuda, as alunas sugerem aproveitar a oportunidade para destruir o posto avançado da Gangue do Capacete Kata-Kata."

3407235728 = "O Poder dos Adultos é Incrível!"
1856373448 = "O Sensei [USERNAME] e as estudantes da Força-Tarefa destroem a base da Gangue do Capacete Kata-Kata com sucesso e retornam para a escola."

3961742797 = "O predicamento da Força-Tarefa"
2472112227 = "Na sala do departamento, a conversa revela que a escola tem uma dívida de mais de 900 milhões de ienes, e as meninas não conseguem pagar nem os juros sozinhas. O Sensei [USERNAME] tenta ajudar, mas Serika diz que não confia na intromissão de um adulto e sai correndo da sala irritada."

3061964608 = "Um dia comum na vida de Serika"
3427145251 = "O grupo decide seguir Serika e descobre o restaurante de lámen onde ela trabalha meio período. Eles comem e passam um tempo juntos, porém, no caminho de volta para casa, Serika é emboscada e sequestrada pela Gangue do Capacete."

36405547 = "Missão de Resgate!"
426352076 = "Após se separarem no restaurante, o grupo percebe que perdeu o contato com Serika. Usando sua autoridade da Schale, o Sensei [USERNAME] rastreia a localização do celular de Serika e o grupo parte para resgatá-la."

2287819315 = "Uma Nova Ameaça?"
2766662048 = "O grupo consegue salvar Serika em segurança das mãos da Gangue do Capacete. Após a batalha, Ayane inspeciona os destroços do tanque usado pelos inimigos e encontra rastros que confirmam o envolvimento de uma outra facção. Ao mesmo tempo, decepcionado com as falhas repetidas da Gangue do Capacete, um líder decide substituí-las e contratar a \"Faz-tudo 68\""

3902676392 = "A Chegada das Faz-tudo!"
4083213547 = "Em um dia de reunião regular da Força-Tarefa Hipotecária, as alunas quebram a cabeça tentando encontrar uma forma de pagar a enorme dívida da escola, mas só dão ideias absurdas (como esquema de pirâmide, roubar um banco ou virar idols) e não chegam a nenhuma boa solução. Após a reunião virar uma bagunça e irritar Ayane, o grupo decide ir comer no restaurante de lámen para acalmar os ânimos. Lá, elas encontram coincidentemente as integrantes da \"Faz-Tudo 68\", que estão sofrendo por extrema falta de dinheiro e precisando dividir uma única tigela de lámen após gastarem todos os fundos da sua nova missão."

2584215733 = "恩知らずの血戦"
766257118 = "お互いに意気投合した対策委員会の面々と別れた後、先ほどの相手がアビドス高等学校の生徒たちだということにようやく気づくアル。彼女はしばらくの間、罪悪感に苛まれていたものの、どうにか気を取り直してバイトの傭兵たちを動員し、アビドス高等学校を襲撃する。"
1534182665 = "恩知らずの血戦"
1089217150 = "対策委員会の生徒たちは便利屋を撃退し、彼女たちはバイトの傭兵共々退散していった。"
2309291572 = "手がかりを探して"
3874145345 = "前回の戦闘で収集した情報を分析し、「便利屋68」の職員たちがゲヘナの生徒であるということ、ヘルメット団が使っていた武器が「ブラックマーケット」から流入したものだったということを突き止める。さらなる手がかりを求めて、一同はブラックマーケットへと向かった。"
1625249857 = "ブラックマーケットへ（１）"
3011986499 = "ブラックマーケットに到着した対策委員会一同は、トリニティ総合学園の生徒であるヒフミに出会う。ヒフミはペロロの限定グッズを探し求めてブラックマーケットに来ていたが、チンピラに絡まれて逃げている最中だった。対策委員会一同が間に割って入り、チンピラたちと衝突する。"
2005605206 = "ブラックマーケットへ（１）"
2107918611 = "チンピラたちを無事追い払ったヒフミと対策委員会一同は、騒ぎが大きくなる前にその場から逃げることにした。"
67492089 = "ブラックマーケットへ（２）"
2585148003 = "対策委員会一同はチンピラから助けたお礼にと、ヒフミにブラックマーケットの案内を頼み、しばらくの間同行することになる。一方、便利屋68の社長であるアルは、これまでの戦闘での失敗を挽回するために資金繰りの方法を探していた。"
4187141271 = "出動！覆面水着団（１）"
847788836 = "ブラックマーケットを見て回っていた対策委員会一同は、自分たちが返済した借金が闇銀行へと流れていくのを偶然目撃する。頑張って返していたお金が違法な用途に使われていることに気づいた生徒たちは憤りを感じ、銀行を襲うことを決意した。"
2540582765 = "出動！覆面水着団（２）"
2791958937 = "闇銀行で融資の審査を待っていたアルの前に現れたのは、覆面をかぶった対策委員会の生徒たち（？）。現金を持って逃げていく彼女たちと、それをブラックマーケットの警備兵が追っていく様を見て、アルは彼女たちが見せた本物の悪党らしい姿に憧れの眼差しを向けていた。"
2605391019 = "行こう、夕日に向かって！"
1843801151 = "ブラックマーケットの警備兵の追撃をかわし、無事に逃げきった対策委員会一同。彼女たちは巨額の現金を見てしばらく悩んだものの、ホシノの説得を受け、一部の必要な書類だけを手にして逃げることにする。彼女らが置いていった札束の元へ通りかかったのは、アルを始めとする便利屋の面々だった。"
2080293366 = "明かされる真実"
2873970964 = "闇銀行の書類から、対策委員会一同はすべての黒幕が超巨大企業「カイザー・コーポレーション」だったことを知る。学校を取り巻くあまりにも巨大で社会的な悪を前に、生徒たちはショックを受けつつ、その日は一旦解散することになった。"
1849712170 = "立ち込める暗雲"
2479276074 = "アルは、対策委員会が置いて行ったお金で彼女たちのアビドス高等学校を攻撃することに対して罪悪感を感じ、悩み続ける。元気のないアルを励ますため、便利屋の一同は全員で柴関ラーメンに向かうことに。その裏で、黒いスーツを着た不審な男がホシノの前に現れ、彼女にとある提案を行っていた。"
3652595243 = "友だちなんかじゃないわよ！"
3597989428 = "柴関でラーメンを食べていた時、アルは大将からの温かい励ましを受け、罪悪感に耐え切れずつい叫びながら反発してしまう。しかし、そのアルの言葉を誤解したハルカが店に仕掛けていた爆弾を起動、柴関ラーメンは跡形もなく消されてしまう。"
1822218538 = "あんたたち、許さない！"
2950249706 = "不本意な形で極悪非道の行いを犯すことになってしまったアル。しかし対策委員会の生徒たちはそんなアルの本音に気づけるはずもなく、彼女を非難する。結局アルはそのまま悪党のフリを貫き、対策委員会の前に立ち塞がることに。"
2392026169 = "あんたたち、許さない！"
647272427 = "便利屋と対策委員会との衝突が最高潮に達した頃、突如として遠くから砲撃が。アヤネはその正体がゲヘナ学園の風紀委員会であると口にする。"
4008077676 = "風紀委員会、参戦！"
1530869328 = "ゲヘナの風紀委員会は、問題児である便利屋を捕まえに来たと告げる。取るべき対応に悩む対策委員会一同だったが、最終的にアビドス高等学校の自治区内で他の学園の風紀委員会が活動することは越権行為だとし、風紀委員会へと抗戦することを決める。"
906157151 = "風紀委員会、参戦！"
684749186 = "ゲヘナの風紀委員会はその数的優位に反し、[USERNAME]先生が指揮する対策委員会の生徒たちの前に敗北。その後、ゲヘナの風紀委員会に所属する行政官であるアコが現れ、仲裁に乗り出す。しかしその裏では、ハルカがとある企みを画策しており……。"

#[ --- ][Capítulo 2:]
4085844327 = "予期せぬ同盟"
2776982583 = "風紀委員会の行政官アコとの対話は上手く行かず、最終的にやはり敵対することになってしまった対策委員会一同。風紀委員会側の数が増えていく中、一同は便利屋68と協力して何とか立ち向かおうとする。"
1339565549 = "予期せぬ同盟"
1377434222 = "苦しい戦いを切り抜けるも、勢いが衰える気配を見せない風紀委員会。さらに増員が到着して万事休すかと思ったその時、風紀委員長であるヒナが登場し、この状況についてアコに説明を求める。"
1471802853 = "ゲヘナの風紀委員長"
2688547338 = "アコの兵力独断運用について状況を理解したヒナは、対策委員会に対して素直に頭を下げる。ゲヘナへ帰還する間際、ヒナは先生に対して「カイザーコーポレーションはアビドス砂漠で何かを企んでいる」という情報を残す。"
4195603251 = "さよなら、便利屋68"
1030591484 = "アビドスを離れることになってしまった便利屋一同を見送る先生。その後、アヤネとセリカと共に入院中の柴大将を訪ねると、そこでラーメン屋の建物の所有権がカイザーコーポレーションに渡っていたという衝撃の事実を聞かされる。"
3139483916 = "それぞれの物語（１）"
839043873 = "再び教室に集まり、状況を整理する対策委員会一同。土地の情報を調べてきたアヤネとセリカは、アビドス自治区の大半がカイザーコーポレーションの所有になっていたことをみんなに知らせる。"
2927878713 = "それぞれの物語（２）"
409405033 = "ホシノから過去の話を聞く対策委員会一同。その話を元に、今はもう無くなってしまったかつてのアビドスの生徒会が借金を返そうとした結果、最終的にカイザーコーポレーションに土地まで奪われてしまったのではと推測する。先生はヒナから聞いた情報が気になり、アビドス砂漠に行ってみようと提案する。"
442327204 = "アビドス砂漠へ（１）"
2058754230 = "対策委員会一同は色々と憶測をしながら、慎重にアビドス砂漠へと向かう。"
3802560582 = "アビドス砂漠へ（２）"
2697565317 = "捨てられた砂漠に到着した対策委員会一同。その光景を見て、ホシノは過去のアビドスについて口にする。"
573312762 = "アビドス砂漠へ（３）"
198870950 = "対策委員会一同はアビドス砂漠の中に、いつの間に建設されていた巨大な施設を発見。そこを守る正体不明の敵と遭遇することになる。"
1399589399 = "カイザーPMC（１）"
884616625 = "遭遇した敵の正体は、カイザーPMCだった。対策委員会を包囲するために、PMCの兵力が集まりだす。"
852645695 = "カイザーPMC（２）"
2382351824 = "対策委員会一同の前に現れたカイザーコーポレーションの理事が、アビドスが借金をしている相手は自分であると告げる。"
3249776532 = "負け戦"
2043848879 = "「アビドスの土地を買収したのは、どこかに埋まっている宝物を探すため」だと告げるカイザーコーポレーションの理事に対し、そんなでたらめをと食ってかかる対策委員会一同。そんな中、突如として急激に借金の額を吊り上げられてしまい一同は激昂しそうになるが、これ以上話してても意味が無いとホシノに諫められ、この場は一旦退くことに決める。"
1186755748 = "幾つかの秘密"
1335785770 = "ホシノを除く対策委員会のみんなを帰した後、ホシノは先生に対し、以前あった黒服からの提案について打ち明ける。先生はホシノに対して「何か方法を見つけるから」と言葉をかけるが、その翌日、ホシノは退部届を残して姿を消してしまった。"
3736543421 = "手をすり抜けたもの"
283862884 = "自分がPMCの傭兵になることで、アビドス高校の借金を大きく減らすことができる。ホシノからの手紙にはそう書かれていた。一同が手紙の内容に混乱している最中、アビドス高校を占拠しようとPMCの兵が集まりだし……。"
3093070589 = "アビドス攻防戦（１）"
310065573 = "アビドスが攻撃されていることに対し約束が違うと黒服に詰め寄るホシノだったが、最初から狙いはあなただったと告げる黒服に拘束されてしまう。同時刻、精神的にも追い詰められ、絶体絶命のアビドス対策委員会。そこに現れたのは、アビドスを去ったはずの便利屋68だった。"
3717760490 = "アビドス攻防戦（２）"
91688092 = "予想外の事態に対し憤慨するカイザーコーポレーションの理事。対策委員会一同は先生の指揮のもと、便利屋と共にPMCに立ち向かう。"
1667111875 = "アビドス攻防戦（２）"
2023302413 = "激しい戦闘の末、PMCの兵士を退却させることに成功。ホシノを取り戻す方法を見つけるため、先生は黒服の元へと向かった。"
4255678286 = "大人の戦い"
477790762 = "ホシノさえ譲ってくれればアビドス高等学校の存続についてはどうにかしよう、と提案する黒服だったが、交渉は決裂。[USERNAME]先生はホシノを救い出すため、作戦を練ることに。"
3792141633 = "守りたいもの"
2496658941 = "先生は助力を求めて、ゲヘナ学園とトリニティ総合学園を訪れる。ほぼ同時刻、屋台でお店を再開した柴大将の元でラーメンを食べていた便利屋一同は、あらためて対策委員会を手伝うことを決意（？）するのだった。"
488859086 = "守りたいもの"
4228298238 = "カイザーPMCの増援の前に立ち塞がったのは、ヒナを始めとするゲヘナの風紀委員たち。アビドス対策委員会を手助けするため、彼女たちはPMCを迎え撃つ。"
1752199803 = "それでも手放さなかったもの（１）"
2389071401 = "敵勢力と対峙しつつあった対策委員会の一同の元に届いたのは、ヒフミたちトリニティ総合学園の支援射撃。混乱に陥ったその隙を狙って、対策委員会一同は敵陣を突破する。"
2315302090 = "それでも手放さなかったもの（１）"
2958239043 = "アビドス高等学校のかつての本館に辿り着いた対策委員会一同。彼女たちの前にカイザーコーポレーションの理事とPMCの兵士たちが立ちはだかるが、遅れて到着した便利屋68がその場を引き受ける。"
465533926 = "それでも手放さなかったもの（２）"
3049385587 = "ホシノ先輩の位置を特定するも、またしても立ち塞がるカイザーコーポレーションの理事。それでもホシノを救出するため、対策委員会一同は突き進む。"
3889357593 = "それでも手放さなかったもの（２）"
4091157200 = "長い戦いの果てに、対策委員会一同は無事ホシノを救出することに成功。「おかえり」と口にするみんなに対し、ホシノは微笑みながら「ただいま」と返すのだった。"
460663098 = "エピローグ"
1819455677 = "一連の事件はひと段落し、[USERNAME]先生はアヤネからの手紙を受け取る。その中には、借金を完全に返すことはできなかったものの、事態は少しだけ好転し、先生のおかげで対策委員会の日常を守ることができた……という旨の感謝の言葉が綴られていた。"

#[ --- ][Capítulo 3:]
451759275 = "プロローグ"
1467700440 = "地下深く、フランシスが目覚めさせた元ゲマトリアが活動を始める。一方、カイザーグループはアビドス高等学校の債権を売り出し、対策委員会は債券を購入しようとするも、完売してしまう。アビドスの債権を買ったのは誰なのか調べたところ、ネフティスグループの名前を見つけるのだった。"
2836028392 = "招かれざる客"
2468775960 = "対策委員会は一つの情報を掴む。それは、ネフティスカンパニーがアビドス砂漠横断鉄道のすべての権利を手に入れる為に、カイザーの債権を買い入れたという事。彼らがなぜ砂漠横断鉄道の権利を購入したのか……と悩んでいた所、招かれざる客が現れる。"
2578507434 = "ハイランダー鉄道学園（１）"
792808784 = "アビドス自治区を襲撃したのは、ハイランダー鉄道学園CCCの幹部、ノゾミとヒカリだった。砂漠横断鉄道の開発を強行しようとする彼女たちを防ぐため、対策委員会が動き出す。"
2748777627 = "ハイランダー鉄道学園（２）"
171315427 = "ハイランダー鉄道学園の襲撃を防いだ対策委員会と先生。そこへ現れたのは、ハイランダー鉄道学園の監督官、スオウだった。スオウは後で事情を説明するという言葉を残し、ノゾミ、ヒカリと共にその場をあとにする。"
809304558 = "流れ行くものたち"
2228531499 = "時は少しさかのぼり……中学校を卒業したノノミは予定していたハイランダー鉄道学園への進学を悩んでいた。一方、現在のアビドス高校では、対策委員会がハイランダー鉄道学園の情報を確認していた。そんな中、スオウたちが再びやってくる。"
2066588167 = "砂漠横断鉄道"
3245151085 = "債権者たちと共に対策委員会の教室を訪れたハイランダー鉄道学園一行。債権者団体の代表は自分たちの目的を説明するために、ユメのサイン入りの契約書を取り出す。"
4109224623 = "契約書"
206294631 = "債権者団体が訪れた理由は、アビドス生徒会が所有している付属施設の運用権利を扱った契約書の進行可否を問うためだった。考える時間を求めた先生に対し、債権者団体は契約書の効力が消える2日後までに決定するよう言い残し、その場をあとにする。今後の方針を決めるべく、過去の出来事について口を開くホシノ。そこで契約書の日付がユメが失踪した日付と同じ日である事実を発見する。"
3326988594 = "肉体の限界"
2464018339 = "ホシノはユメと初めて出会った町に足を運ぶ。シロコはそんなホシノを尾行するが逃してしまう。ノノミは事情を探るべく執事に連絡するが、執事はネフティスの為だと言い言葉をぼかす。アヤネは現状に違和感を覚えるが、皆の疲れを考慮し日を改めることに。一方、地下深くでは、地下生活者が本格的に動き出そうとしていた……。"
3791222139 = "アビドス生徒会（１）"
4172510105 = "先生は地下生活者の手により危機に陥る。 一方、捨てられた街にいたホシノは、ユメと初めて出会った時のことを回想する。"
2618425109 = "アビドス生徒会（２）"
4214382824 = "ホシノを除いた対策委員会の面々は、ホシノの過去を知るために生徒会室へと足を踏み入れることに。が、そこへホシノが現れる。"
2384190148 = "あの日"
3030051441 = "ホシノは対策委員会の仲間たちに、自分の過去を語り出す。ユメが持っていた砂祭りのポスターを破り、彼女が語る希望にあふれた未来を否定した事。喧嘩したまま別れたユメが行方不明になってしまった事。ホシノの過去が明らかになる中、アビドスにとある人物がやってくる。"
3708666348 = "明かされる秘密"
3744933892 = "アビドスを訪れたのは、スオウとネフティスの幹部だった。そして明らかになった、砂漠横断鉄道に隠された恐るべき秘密。これを解決する方法として、ネフティスの幹部はノノミにハイランダーへの再入学を提案する。"
3567623092 = "対策委員会の始まり"
508127969 = "ホシノは、シロコとの初めての出会いや、セリカ、アヤネがアビドス高校にやってきた時のことなど、さまざまなことを回想する。そして時は戻り現在。対策委員会は旧庁舎に向かうことを決めたが、そこへ届いたのは先生が倒れたというニュースだった。"
2830502693 = "人質"
3676288734 = "ノノミはネフティス側と会い説得を試みるが、逆に人質となってしまう。 ネフティスはノノミを利用して契約を無効にしようと対策委員会を脅迫する。それを受け、ホシノは自分ひとりで問題を解決しようとするが、その前にシロコが立ちはだかる。"
303369912 = "対策委員会"
2939285746 = "ホシノはシロコを圧倒的な実力差で制する。 その後、アヤネとセリカがホシノに立ち向かう。"
76556335 = "副生徒会長の命令"
3023125627 = "敗北したセリカとアヤネ。ホシノは二人にアビドスの未来を託すという副生徒会長としての命令をした後、単身ノノミの元へ向かう。"
3787477164 = "反撃"
2641772784 = "スオウはネフティスが裏切ったという事実を私募ファンドに知らせる。 一方、アビドスに現れたのは意識を取り戻した先生だった。 先生は生徒会長の空席を利用してアヤネを生徒会長に選出させる。するとアヤネは生徒会長の権限を使い、ホシノの行為に対して無効を宣言し、先生と共に反撃に出るのだった。"
2386655349 = "追跡"
325048971 = "ノノミを救うため旧庁舎に向かう先生と対策委員会。一方、ホシノはあっという間に私募ファンドの兵力を制圧し、旧庁舎へと進む。"
1133678474 = "追跡"
3426514234 = "圧倒的な強さを見せつけたホシノは先を急ぐ。対策委員会と先生も負けじと再びホシノを追いかける。"
2385018294 = "大混乱"
410768358 = "ネフティスと手を組んでいたカイザーPMCだったが、ネフティスを裏切り列車砲を奪おうとする。ホシノは旧庁舎への行く手をふさぐPMCと戦闘を開始する。"
2238279328 = "大混乱"
2445287877 = "ジェネラルを倒したホシノは再び旧庁舎へ向かう。一方、先生と対策委員会一同はハイランダーの生徒たちを助け、ホシノを追う。"
3612354256 = "債権者団体の総会"
276803654 = "ノノミはネフティスがPMCと協力していた事実を知り、怒る。そんなノノミの元にたどり着いたホシノはノノミを解放しようとするが、ノノミはアビドスを退学すると言い始める。そこへ遅れて到着した対策委員会一同。だが、プレジデントは契約の無効を一方的に宣言し、その場を去る。"
3243553383 = "債権者団体の総会"
160618110 = "ノノミの救出に成功したホシノと対策委員会。だが再会の喜びもそこそこに、ノノミの無事を確認したホシノは皆を残したままその場を後にするのだった。"
1860528585 = "宝探し"
3956099477 = "ヘリに搭乗したスオウとカイザーのプレジデント。プレジデントが勝利を祝おうというその瞬間、スオウはヘリからプレジデントを落とす。スオウはホシノに、列車砲を止めたいなら生徒会の谷に来るように言う。一方、落とされたプレジデントは怒り、カイザーコーポレーションの全兵力召集を命令するのであった。"
1239708147 = "二度目の追跡"
984232866 = "私募ファンドを助けたのち、生徒会の谷に行く方法を模索するアビドス一同と先生。そこへ力を貸すべく立ち上がったのは、ネフティス幹部とハイランダーCCCだった。一方、ホシノはかつてユメと宝探しをした事のある分岐駅に到着し、生徒会の谷に向かうべく列車を出発させる。"
3256145921 = "二度目の追跡"
2322627376 = "ノゾミとヒカリの列車に搭乗した対策委員会と先生は、カイザーPMCの追撃を受ける。"
517692600 = "暴走列車"
598179026 = "カイザーPMCの追撃を受けた対策委員会と先生。と、そこへノゾミとヒカリがとある提案をする。"
2087719702 = "暴走列車"
754525061 = "ノゾミとヒカリの狙い通り列車は衝突。その後、カイザーPMCにヒカリとノゾミは捕まることに。無事に先へ進めた対策委員会と先生は、分岐駅に到着し、列車を出発させる。一方、生徒会の谷に着いたホシノは、砂漠横断鉄道に隠された秘密を見つける。"
3408172578 = "生徒会の谷"
638321793 = "列車砲を見つけたホシノ。その前に現れたのはスオウ。彼女は列車砲を止めたければ自分を倒せと言い、ノノミのカードを取り出す。それは列車砲の破壊に必要なものだった。"
768493918 = "列車砲シェマタ"
2040799108 = "スオウの制圧に成功したホシノ。しかし、スオウは敗北を認めず、再びホシノに戦いを挑む。そんな生徒会の谷に到着したアビドスの生徒たちと先生。列車砲を見つけたその時、銃声が響き渡る……。"
1210234653 = "最後の戦い（１）"
1002703607 = "二度目の戦いでもスオウをねじふせたホシノ。列車砲を破壊するために動いたその瞬間、アビドスの生徒たちと先生がホシノの前に立ちはだかり、戦闘に突入する。"
3797362856 = "最後の戦い（２）"
3271869069 = "ホシノとの戦いに敗れ打ちのめされた対策委員会。一人立ち上がったシロコはホシノとの戦闘に再び臨む。"
1886723209 = "紙一重の勝負"
2759992648 = "ついにシロコはホシノを倒し、対策委員会と先生は説得に成功する。しかし、肝心の列車砲がスオウに奪われてしまう。アビドスを破壊しようと列車砲とともに去るスオウ。それを追うために一人その場を離れるホシノ。残された対策委員会に絶望の色が浮かぶ中、先生はとある人物に助けを求めるのだった。"
3121219489 = "激戦（１）"
2950950386 = "先生が助けを求めた人物……それはヒナだった。ホシノは分岐駅内で待ち構えていたヒナと対峙する。"
3427914090 = "激戦（２）"
2436668033 = "全力でぶつかり合うヒナとホシノ。戦闘の余波は大オアシス駅に向かっていた列車を覆う。"
3101230762 = "手帳の存在"
3803574396 = "ひどく損傷した列車はようやく目的地に到着する。燃える列車の上で、ホシノはユメとの過去を思い返す。"
3874918946 = "唯一の真実（１）"
132408451 = "倒れたホシノにユメに関する真実を伝えるヒナ。一方、ノゾミとヒカリの協力で列車砲に追いついた先生と対策委員会は、列車砲に突撃する。"
1382356128 = "唯一の真実（２）"
1456203716 = "茫然自失とするホシノはユメの死に囚われてしまう。そして、地下生活者の計略によりホシノは全く異なる存在に生まれ変わる。"
3864663142 = "顕現"
2262723767 = "存在が反転したホシノを止めるべく、対策委員会と先生が挑むも、圧倒的な力の前でみんなは倒れてしまう。さらに、「セトの憤怒」がホシノに反応し顕現をはじめる。アロナとプラナは、ホシノとセトの衝突が世界に滅亡を呼び起こすと言う。絶望的な状況の中、シロコはみんなを救うために色彩と接触しようとする。"
938761530 = "謝罪"
1220924498 = "先生は不思議な空間の中でユメに出会う。過去を変えることはできない。ただ今は、自分の手の届く子を救う。先生はそう誓うのであった。"
675540194 = "テラー VS テラー"
3143101973 = "色彩の力を逆手にとったプラナ。それにより召喚されたシロコ＊テラーは、変貌したホシノに対峙する。"
2218727448 = "テラー VS テラー"
37327455 = "シロコ＊テラーを目撃した地下生活者は、神聖が同時に存在するありえない状況に直面し、最後の手段へと打って出る。"
1657311791 = "手帳"
3366159078 = "ホシノを助ける方法を模索する対策委員会と先生。一度恐怖に反転した神秘は元には戻せないと思われたが、ホシノが完全に反転した訳ではない事に気づいた一同は、わずかな可能性にかけてホシノを救出しようとする。"
3926366854 = "手帳"
926354967 = "ようやくホシノに近づくことが出来た先生と対策委員会は、ホシノにそれぞれの思いを伝えようとする。"
319388679 = "伝えなければならないこと"
1570618741 = "対策委員会はホシノに言いたかった事を伝えていく。が、地下生活者の最後の計画によって「セトの憤怒」が完全に顕現してしまう。"
2188327975 = "約束"
1072185142 = "対策委員会一行が絶体絶命の危機に瀕したその瞬間、ホシノは夢と現実の区別ができない空間の中で、再会を望んでいた 「あの人物」に会うことになる。"
3773443473 = "制約解除"
2340870041 = "「反転」から奇跡の生還を果たしたホシノ。ホシノとの再会を果たし、シロコ＊テラーを迎えた対策委員会一行は、「セトの憤怒」、そして背後に存在する地下生活者と最後の戦いに挑むのだった。"
1985827982 = "夢が残した足跡"
1022838518 = "戦闘が終わった後、オアシスに散らばったのは青く美しい炎。その正体は、ホシノとユメが探し回った砂漠に埋められた高価な鉱物であった。ホシノは、ユメが残した足跡を眺める。"
2405249657 = "残されたもの"
4258312221 = "帰ってきた日常。残された者たちの日々は続く。"
990172089 = "エピローグ（１）"
2169764773 = "ホシノはアビドス生徒会の生徒会長になることを決める。一方、ヒナとマコトは雷帝の遺産である列車砲を破壊することに。ノノミやスオウもそれぞれ残されていた課題の整理に励み、アビドス自治区には久しぶりに活気が戻ってくるのであった。"
1959390195 = "エピローグ（２）"
832014371 = "先生はシロコ＊テラーと会い、伝えたかった言葉を送る。シロコ＊テラーはそれに応えるように、苦痛も幸せもすべて受け入れて前に進む……そんな気持ちを心に刻むのであった。"

