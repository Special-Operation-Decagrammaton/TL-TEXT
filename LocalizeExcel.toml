3015113020 = "Confirm"
2299886396 = "According to the fisherman, the price of crabs has plummeted in the last few months due to an increase in landings.\nThe boxes piled up in the warehouse support that claim."
2761775914 = "It seems that port workers use boxes containing sawdust when transporting crabs.\nThey say it's not recommended because crabs might die if put in a drum can. The truth of the rumor is..."
3514356211 = "Unlike the people at the port, ordinary citizens seem to have a vague fear of crabs.\nBecause of that, it seems that shops dealing in crab dishes have sluggish sales."
2379706199 = "Regarding the fisherman who suddenly disappeared at Kenzaki Port, the elderly fisherman is convinced that he ran away because the work was hard, but other fishermen around him say it is because he had a large debt to the Carpaccio Family."
3923987583 = "The freight station at Kenzaki Port does not operate passenger trains, but it is said that it operates commuter trains for port workers only in the early morning.\nThis matches the time when the fisherman disappeared."
3535269966 = "The Carpaccio Family was lending money at high interest rates to people in and out of the port who needed money.\nRumors that debtors who cannot repay suffer terrible fates are spreading on social media."
4086592800 = "The Carpaccio Family's \"Security Manual\" contained an incomprehensible instruction: \"Walk around the port once while rolling a drum can at midnight,\" in addition to general work guidelines."
518587471 = "A box containing a large amount of crabs was found in the Carpaccio Family's food storage area.\nThe amount of crabs in the box was more than the entire family could eat."
162033439 = "From the logistics data found in the Carpaccio Family's warehouse, we were able to confirm their financial records.\nIt seems that the Carpaccio Family has recently been trying to increase cash while reducing fixed costs."
557718016 = "Let's investigate the circumstances surrounding the missing fisherman.\n\nAccording to information, the missing fisherman was a crew member of a crab fishing boat, but...\nOther crew members working on the same boat might know something."
735844159 = "Let's help the worker and find the sawdust bag.\n\nIt seems sawdust is essential when storing crabs. Someone might have thrown it away thinking it was trash, so let's check the disposal site."
3570144724 = "Let's help the merchant in trouble.\n\nMerchants selling food in the commercial area seem to be in trouble because customers have decreased due to rumors that have spread recently. I wonder if I can help with something, like advertising the shop."
1284006630 = "Let's organize the investigated clues.\n\nIf we organize the clues everyone gathered, we should be able to find a lead. However, just with what we investigated today... it might be a little lacking."
1631138589 = "Let's ask about the missing fisherman.\n\nSince they have become willing to talk to some extent after the previous visit, let's carefully ask about the missing fisherman. I hope it doesn't become a big deal..."
2072783996 = "Let's investigate the destination of the railway connected to the port.\n\nKenzaki Port has a freight station connected to the outside. The missing fisherman might have used this station."
319418750 = "Let's investigate the Carpaccio Family.\n\nIt seems the Carpaccio Family, which is in charge of port security, is lending money at high interest rates to people who need money around the port. Could it be these people...?"
3887413056 = "Let's organize the investigated clues.\n\nWe've finally started to see a lead in the incident. But, can we just dismiss this incident as a simple debt problem...?"
1679105561 = "Let's infiltrate the warehouse.\n\nLet's infiltrate the Carpaccio Family's warehouse and look for more solid evidence. Before that, we need to find a way to distract the guards standing at the entrance..."
590934296 = "Let's look for suspicious traces in the warehouse.\nThe warehouse is much larger than expected... Let's look for suspicious traces while being careful not to be caught by the members."
2618096481 = "Let's organize the investigated clues.\n\nAfter investigating the warehouse, my suspicion turned into conviction. This disappearance incident and the ghost story are... just a cover to hide a much larger purpose."
