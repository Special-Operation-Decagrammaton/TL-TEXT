944364528 = "ビナー：違いを痛感する静観の理解者（１）"
1155204586 = "穴の中に隠れているビナー。一行は、穴に潜んでいるビナーに戦いを仕掛けるのだった。"
791844677 = "ビナー：違いを痛感する静観の理解者（２）"
434671104 = "ビナーのコアは穴の奥深くにあるのだという。一行はビナーのコアを手に入れるべく降りていく。"
677604747 = "JEHOVAH ELOHIM（１）"
1288560903 = "コアの場所を把握すべく鋼鉄大陸のネットワーク接続したリオ。仮想空間の中でリオを待っていたのは、オウルだった。危機に瀕したリオの前に、車椅子に乗ったヒマリが颯爽と現れ、手助けをしてくれるのだった。"
1867533792 = "JEHOVAH ELOHIM（２）"
1993237815 = "オウルに勝利した一行は、ビナーのコアを回収した。預言者のコアをケイにインストールすることで、ケイは預言者の能力を継承することができるのだと告げる。そうして、ケイは輸送船に預言者の能力を組み込んでいくのだった。"
2793205752 = "Uniform"
1183427417 = "ビナーのコアを活性化した影響で頭痛とめまいに苦しむケイ。そんな中、アリスがケイにミレニアムの制服をプレゼントしてくれる。騒がしくも温かい交流の末、ケイは少しずつ仲間との絆を深めていくのだった"
1515529201 = "ホド：輝きに証明されし栄光（１）"
1986915196 = "すべての始まりは「ホド」に遡る。ケイはオウルと世界の在り方について言葉を交わす。オウルは旧来の秩序を否定し、世界を「始まる前」に戻すのだと主張する。ケイはそれを拒絶し、自分たちの信じる未来を守ると宣言し、轟音と共にホドとの戦いが始まるのだった。"
949564975 = "ホド：輝きに証明されし栄光（２）"
3984403575 = "ホドを退けた一行は、ホドのコアを回収する。なぜ争いが生まれるのか、いつか生命体は和解できるのだろうかとケイは呟くのだった。"
1897214238 = "ケテル：最もきらびやかに輝く至高の王冠（１）"
3910242707 = "ケテルのエリアに到達した一行は、地上ルートではケテルの十字砲火を回避できないと判断し、降下ポットを使うことに。ユズが怯える中、一同は次々にポッドへと乗り込んでいく。そうして、ユズの悲鳴と共にポットの降下が始まるのだった。"
3369636463 = "ケテル：最もきらびやかに輝く至高の王冠（２）"
3909065987 = "ケテルを退けた一行は、ケテルのコアを回収する。"
125227434 = "ケセド：慈悲深き苦痛をもって断罪する裁定者（１）"
3423289450 = "輸送船で待機しているモモイとミドリの元にレイバーが襲ってくる。ケセドを追うヒマリたちは、急いで制圧して二人の元へ戻ろうと決意するのだった。"
2823829101 = "ケセド：慈悲深き苦痛をもって断罪する裁定者（２）"
1950019056 = "ケセドを退けた一行は、ケセドのコアを回収する。"
3005949481 = "公義"
3760573549 = "鋼鉄大陸の第一防御線を突破した一行に、アイン、ソフ、オウルからの連絡が届くのだった。"
1360737215 = "コクマー：王国を守りし古代の守護者（１）"
1032758858 = "コクマーへと向かう最中、ケイを戦闘に参加させて良いものかと悩む先生。余計なことを考えなくとも良い、とケイは呆れるのだった。"
2207225706 = "コクマー：王国を守りし古代の守護者（２）"
1984604917 = "コクマーを退けた一行は、コクマーのコアを回収する。"
3706522227 = "ゲブラ：合理を越えた勇猛な仲裁者（１）"
1390952024 = "初めてゲブラと出会った場所――氷海。トキが特異現象捜査部として初めて参加した任務でもあった。同じような氷海エリアに到達した一行は、ゲブラと戦うのだった。"
753667149 = "ゲブラ：合理を越えた勇猛な仲裁者（２）"
1119895468 = "ゲブラを退けた一行は、ゲブラのコアを回収する。"
1164183331 = "ティファレト：苦難称える美しき贖罪者（１）"
1606436477 = "過去にティファレトと邂逅した種子貯蔵庫。それが再現された空間で、一行はソフと相対する。今までコアを吸収してきたケイに対し、預言者を捕食しているようなものだと叫ぶソフ。これ以上罪を重ねる必要はないと告げるソフに対し、アリスは自身の信念を語るのだった。"
2689575787 = "ティファレト：苦難称える美しき贖罪者（２）"
660550887 = "ティファレトを退けた一行は、ティファレトのコアを回収する。"
3976955706 = "儀式"
1516164164 = "第二防衛線を突破されたアインたちは、マルクトの提案を聞き、残りのエリアをなんとしても死守するのだと誓う。残るエリアはあと２つ。"
2929755926 = "イェソド：礎を御する力の浄化者（１）"
1664902940 = "エイミとトキは、イェソドと相対する。"
3021376261 = "イェソド：礎を御する力の浄化者（２）"
1514982498 = "イェソドを退けた一行は、イェソドのコアを回収する。"
415403066 = "慈悲"
1244439789 = "ネツァク以外のエリアを占領した一行の前に、ソフとオウルが姿を現す。今からでも転校しないかと問いかける先生に対し、二人はそれを断る。壊れたものは直せば良いのだ、と続けて、アインとマルクトがダアトを起動する時間を稼ぐのだった。"
2729840279 = "ダアト：影に潜みし深淵の知恵（１）"
4043732234 = "隠されしセフィラ、「ダアト」が顕現する。巨大なダアトを前に、うろたえる一行だったが、リオが万が一のために備えて用意した「ネオアバンギャルド君」を出撃させる。ケイの手助けもあり、巨大化したネオアバンギャルド君は、ダアトと相対するのだった。"
26241220 = "ダアト：影に潜みし深淵の知恵（２）"
556680094 = "ネオアバンギャルド君の操作権をユズに渡したリオは「戦闘装備」を特殊スーツにインストールするのだった。"
3915426128 = "ダアト：影に潜みし深淵の知恵（３） "
495885662 = "辛くもダアトに勝利した一行。しかし、同時にマルクトの最終調整が終わるのだった。"
1168219289 = "マルクト：世界の果てに到達せし王国の巡礼者（１）"
1638075147 = "一行とマルクトは、それぞれの場所で決戦の準備を始めるのだった。"
987806084 = "マルクト：世界の果てに到達せし王国の巡礼者（２）"
3989358532 = "マルクトは「次の段階」への移行準備を終える。"
1504324007 = "マルクト：世界の果てに到達せし王国の巡礼者（３）"
1214243517 = "マルクトとの最終決戦、生きることは苦痛に他ならず、自らの名前すら決めることはできないのに何故生きるのかと問いかけるマルクトに対し、アリスは自分で名前を変えられた、と返す。先生が出会えてよかったというのなら、それだけで生きる価値があるのだと。そうして、ケイと力を合わせてマルクトを倒すのだった。"
1116407149 = "怒りの日（１）"
2470856198 = "鋼鉄大陸のエネルギーが集まりつつある祭壇に「招待」された一行。先生は輸送船に戻って分析するようヒマリに指示を出す。ヒマリは思考を巡らせるものの、指示に従ってモモイとミドリ、ユズを連れて離脱する。ついにデカグラマトン決戦の火ぶたが切って落とされる。"
2910933471 = "怒りの日（２）"
85908197 = "戦闘が続く中、デカグラマトンが「アツィルトの帯」を稼動し、祭壇は不思議な領域に包まれた。それは外部との通信を遮断するだけでなく、無機物に限られていた「変換」の対象をすべての元素に拡張するものだった。"
1176775182 = "怒りの日（３）"
4293815617 = "苦戦を強いられる戦闘の最中、アリスとケイは優しい声に接触して打開策を教えられる。2人の力でアツィルトの帯が停止したことにより、遮断されていた輸送船との通信が復旧する。デカグラマトンの預言者から接触があったことをヒマリに聞かされた先生は、預言者との対話を試みた末に、セフィラの力を託された。先生、生徒、そして預言者……みんなの力が集まり、デカグラマトンとの最後の戦いが始まる。"
3617072867 = "キヴォトス・未確認ミステリー～邪を払うツチノコ大調査～"
3713119761 = "科学では説明できない現象がキヴォトスの各地で発生している。伝説の生物「ツチノコ」の目撃情報を聞きつけて、調査班Xが出動する！"
