1881031906 = "Foi decidido que a cantora virtual Hatsune Miku fará um show em Kivotos! Antes da apresentação real, para ajustar seu corpo, ela fará um ensaio especial com o público."
1198367208 = "Registro de operação da Estação Termal nº 227!"
266434959 = "Um dia, uma fonte termal brotou do antigo prédio, e a Classe Especial nº 227 começou a operar uma estação termal. Enquanto os alunos visitantes causam problemas um após o outro, será que Nodoka e as outras conseguirão administrar a estação termal com sucesso!?"
