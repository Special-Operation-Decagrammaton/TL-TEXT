142563952 = "二人の覚悟"
3798038720 = "運命の日"
311979596 = "あけましておめでとうございます！"
3328829686 = "スズメ亭の危機"
955896544 = "年の暮れも近づいたある日、美食研究会一同はスズメ亭で食事を楽しんでいた。久々に名店を見つけたと喜んでいたのも束の間、スズメ亭は閉店する事が決まっており、ハルナ達が最後の客になるのだとか……閉店を惜しむ一同の中で、ハルナは名案があると言い……？"
1617718142 = "助けが必要です！（１）"
2315750929 = "ハルナの名案とは、外部に助けを求めることだった。給食部の二人と先生を誘拐してきたハルナは、スズメ亭の窮状を訴え、協力を呼びかける。ひとまずお店に行って事情を聞く事になった一同は、スズメ亭を襲うヘルメット団と遭遇するのだった。"
1371253993 = "助けが必要です！（２）"
1803161784 = "グルメヘルメット団を撃退することに成功した一同は、スズメ亭の女将から詳しい事情を聞く事に。商店街のほとんどのお店がフランチャイズ化してしまい、安価な料理を提供するようになってしまった事で、これ以上店を続けることは困難になってしまったのだとか。諦めの空気が濃厚な中、フウカはスズメ亭再建の決意を固めるのだった。"
1402169835 = "FUUKA'Sキッチン"
1367178329 = "スズメ亭の経営を向上させるためには、より安価で高品質な仕入先が必要不可欠。フウカは、スズメ亭に自分たちが普段使っているピヨスーパーを紹介し、さらに料理へのひと手間の方法などをアドバイスする。そうして和気あいあいと過ごしていた彼女たちの元に、グルメヘルメット団が再来し――"
3044075053 = "これで勝ったと思うなよ！"
3641325415 = "ハルナ達に敗れたグルメヘルメット団は、彼女が美食研究会の一員である事を知り、恐怖に慄きながら増援を呼ぶ。そして、彼女たちはニャオフードの指示でここに来ていると口を滑らせ――"
503504063 = "愚民どもには分からないだろう！"
2331290713 = "チェーン店「ニャオ食堂」及びニャオフードの会長であるニャオモト・カンはスズメ亭の処遇について頭を悩ませていた。一方、グルメヘルメット団がニャオフードの手先であった事を知った女将は、個人店がこれ以上大企業に逆らう事はもうやめたいと告げ、フランチャイズ化を受け入れようとしていた。フウカやハルナたちはそれは違うと宥め、新生スズメ亭の試食会を開こうと提案するのだった。"
279525189 = "お会計をお願いします"
220690413 = "フウカとジュリは、商店街でスズメ亭の無料試食会を開く。通行人の反応は上々だったものの、価格帯が合わないという課題が浮き彫りになる結果となってしまった。価格を見直すべく、一同はより安価な仕入先を探すことに。"
2062962546 = "売り切れですって？そんなわけ……（１）"
1711061225 = "食材を買うべく商店街を訪れたジュリは、全てのお店で直前に買い占めが起きたと告げられ、門前払いを食らってしまう。そんな彼女たちの前にグルメヘルメット団が現れ、これ以上の深入りを止めるよう告げるのだった。"
929096310 = "売り切れですって？そんなわけ……（２）"
3987649773 = "ただの一個人店を潰すにしては大掛かりすぎる工作に疑問を呈すると、商店街の他の店に対する見せしめのためである事を告げられる。スズメ亭をはじめとして、まだ個人店としてニャオフードの傘下に入っていない店は残っており、そういった店舗はスズメ亭を心の拠り所にしているのだとか。一同はこのままでは埒があかないと判断し、ニャオフードの本社に乗り込むことを決意するのだった。"
1175748688 = "それなら対決だ！（１）"
1142871206 = "イズミとアカリから事情を聞いたハルナは、ニャオフード本社に乗り込む事を決意する――この戦いの先にある美食を見据えて。"
1909478340 = "それなら対決だ！（２）"
3240831599 = "ニャオフード本社を襲撃した美食研究会は、食材倉庫を貪り尽くす。あまりの損害に、会長のニャオモトは一同を呼び出し、、会談をすることに。けれど、話は一向にまとまらず、最終的にスズメ亭とニャオフードで料理対決をすることで手を打つこととなった。"
3591620024 = "背水の陣"
974434577 = "ニャオフードとの料理対決を引き受けたと告げるハルナに対し、フウカは一体誰が料理をするのだと怒りを露わにする。ハルナはフウカに謝罪し、自身の信念について語る。フウカは呆れながらも手を貸すことにするのだった。一方、食材を買いに行ったジュリはニャオフードの妨害工作に遭い――"
2678284265 = "二人の覚悟"
3660850508 = "対決を目前に、ハルナとフウカは言葉を交わす。自身の信念、対決に対しての不安、そしてその後の事――何もしなければただただ潰れてしまうお店を眺める事になってしまう。それは嫌だというハルナの言葉に背中を押されるように、フウカは決意を新たにするのだった。"
3490177281 = "運命の日"
2871705816 = "おせち料理対決当日、クロノススクールの報道部も現れ、現場は賑わっていた。ニャオフードの妨害工作にも負けず400人分のおせちを丁寧に作り上げたスズメ亭の運命は――"
3479689653 = "あけましておめでとうございます！"
1405977639 = "そうして、おせち料理対決に勝利した一同は、晴れやかな気持ちで新年を迎えることができたのだった。"
1729485909 = "虚妄のサンクトゥム攻略戦"
3698844736 = "総攻撃の準備は整った。\n\rキヴォトスの命運をかけた連合作戦が、今幕を上げる。"
