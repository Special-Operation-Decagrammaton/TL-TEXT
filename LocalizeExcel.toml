2141989400 = "プロローグ"
3946132036 = "ニヤから百鬼夜行に来てほしいという連絡を受けた先生は、クズノハの手がかりを掴むべく足を運ぶのだった。"
867945468 = "思いがけない出会い（１）"
2534282816 = "百鬼夜行に到着した先生は、普段とは違う学園の雰囲気に目を奪われる。そうして学内を歩いていると、少女と不良が言い争っているのが目に入り……先生は少女に手を貸すのだった。"
784650514 = "思いがけない出会い（２）"
1005886133 = "不良を追い払ったユカリと先生。不良から取り返した財布を住人に返した後、２人は百鬼夜行を歩いて回ることに。学内がお祭りムードなのは、20年前に廃止された「百鬼夜行燈籠祭」を再現しようとしているからなのだとか。そうして2人で歩いているうちに、使用人から話しかけられたユカリは逃げ出し、先生は1人取り残されるのだった。"
3919672259 = "陰陽部にて"
2802641052 = "陰陽部の部室で、ニヤから「花鳥風月部」が送ってきた脅迫状の話を聞いた先生。いたずらかもしれないと前置きしつつも、先生の手助けが必要だというニヤ。先生が協力すると頷いた瞬間、陰陽部の部室に闖入者が現れるのだった。"
3637226461 = "自称えり～と少女、登場！"
1078075001 = "部室にやってきたユカリは、陰陽部が大雪原でナグサと出会った話を聞いたと告げる。そして、ニヤに対し、百花繚乱の委員長を交代するための「継承戦」を手伝ってほしいと頼み込み……ニヤは、先生に陰陽部の代理として「継承戦」の手伝いを依頼し、先生はこれを承諾するのだった。"
2370772485 = "次の目的地"
2706623289 = "百花繚乱を再結成させるべく「継承戦」を挑む決意を決めたユカリ。「継承戦」には百花繚乱のメンバーが立ち会う必要があるため、先輩であるレンゲの家を訪れることに。しかし、レンゲの家は無人でそこには書き置きが残されていた。"
3399810198 = "青春（？）少女（１）"
1054335404 = "「青春を取り戻す旅に行ってくる」という書き置きと共に姿を消したレンゲ。一行は、レンゲを探すべく、様々なサークルを探し回るが、所属していた痕跡はあれどレンゲを見つけることは出来なかった。休憩しながら、次はどこを回ろうかと相談していると、修行部のカエデが先生の元に現れるのだった。"
4196717210 = "青春（？）少女（２）"
2076588919 = "修行部は、お祭り運営委員会の依頼で百鬼夜行の施設点検をしていたところ、先生を発見したのだとか。そうして会話をしていると、魑魅一座が乱入してきて……あわや一触即発といった空気の中、第三の声が割入ってくるのだった。"
2273835101 = "青春（？）少女（２）"
3687320158 = "魑魅一座を追い出すことに成功した一行。ユカリがレンゲに駆け寄ると、レンゲは驚いたように目を見開くのだった。"
3665538726 = "不破レンゲ"
4273860323 = "ユカリは、レンゲに「継承戦」を手伝ってほしいと頼み込む。しかし、解散令が出されている百花繚乱は、既に終わっているのだとレンゲは冷酷に告げる。それでもと追いすがるユカリに対し、レンゲは銃を向けるのだった。"
1700027356 = "不破レンゲ"
3723106540 = "レンゲに制圧されてしまったユカリ。レンゲは、百花繚乱はもう以前のようには戻れないのだとユカリを一喝する。そうしてその場を立ち去るレンゲを、修行部の面々が追いかけるのだった。"
503705097 = "赤い頬"
1747027451 = "レンゲの一件で落ち込んでいたユカリは、気を取り直して百花繚乱の作戦参謀であるキキョウを探そうと思い立つ。しかし、そんな彼女の前に、使用人が現れ……そうしてユカリと別れた先生は、お祭りの中で魑魅一座に囲まれた少女を見つけるのだった。"
2958590599 = "ただの一生徒"
3591646746 = "魑魅一座と戦っている少女は徐々に劣勢に立たされていく。先生は隙を突いて彼女を助け出す。そうして、百花繚乱の制服を纏った少女から百花繚乱の現状を聞いた先生は、立ち去る少女の後ろ姿を眺めながら物思いに耽るのだった。"
398789845 = "桐生キキョウと継承戦（１）"
1542367438 = "翌日、ユカリと合流した先生は、キキョウに会うべく百花繚乱の調停室を訪れる。ユカリはキキョウに「継承戦」を手伝ってほしいと頼み込むも、断られる。ナグサはもう帰ってこない、そしてユカリでは実力が足りないのだと訥々と語るキキョウ。それでも諦めないユカリに対し、現実を教えるべくキキョウは「継承戦」を行うのだった。"
1013593128 = "桐生キキョウと継承戦（２）"
1716918261 = "敗北したユカリに対し、キキョウは「お遊び」はやめろと一喝する。帰る場所がある人間が居ていい委員会ではないのだと。その言葉に耐え切れなかったユカリは去り、残された先生とキキョウは、百花繚乱の今後について言葉を交わした。一方、ナグサに負けて愚痴をこぼしていた魑魅一座は奇怪な雰囲気を持つ少女と出会い……。"
3225732755 = "少女の決心"
1744921907 = "ユカリを探すため二手に分かれたシズコと先生。シズコはユカリを見つけ、一緒に調停室に戻ろうと告げる。しかし、ユカリは戻るつもりはないと返し、巫女として舞うことを宣言する。一方其の頃、先生は謎の少女と邂逅し――"
3704592008 = "遭遇"
1747430871 = "花鳥風月部の一員であると名乗る少女は、差し出した手紙の真意を告げ、去っていく。その後、シズコからユカリの話を聞いた先生は、百花繚乱で何が起きたのかを知るためにナグサを探すのだった。"
4268581401 = "御稜ナグサ"
143447072 = "百花繚乱にいた頃を思い返していたナグサの前に、先生が現れる。ナグサは自身の正体を明らかにし、先生と対話をすることに。そして祭りの始まりを知らせる爆竹が音を立てた瞬間、幻魎百物語が出現するのだった。"
644791031 = "街を歩く怪談（１）"
2513148571 = "ユカリは巫女装束を纏い、儀式の舞台へと歩を進めた。一方、レンゲはユカリの報告をしてくるキキョウに対し、もう百花繚乱に興味はないから連絡をしないでほしいと告げる。その様子を眺めていた修行部は、レンゲのやりたいことは本当にそれなのかと問いかける――その時、百鬼夜行の各地に幻魎百物語が出現するのだった。"
2982310612 = "街を歩く怪談（２）"
1779959641 = "混乱に陥った街で戦いながら、ナグサは先生に幻魎百物語のことを告げる。その後2人は、修行部たちがいる場所にたどり着いた。レンゲとナグサが言葉を交わす中――ひときわ大きな鳴き声と共に乱入者が現れるのだった。"
1944548097 = "花鳥風月部の怪談家（１）"
3436163381 = "大きな影と戦闘をするも、全くダメージが通らず、一同は困惑する。ナグサ曰く、これを倒すには百花繚乱調停委員会の院長の資格が必要なのだと漏らし――その瞬間、シュロが現れナグサに侮蔑の言葉を投げかけるのだった。"
3203640400 = "花鳥風月部の怪談家（２）"
1142989290 = "先生とツバキの攻撃をものともせず、シュロはすでに事態は自分の計画通りに進んでいるという言葉を残しその場を去った。シュロを追いかけようとする一行の前に、クロカゲが立ちふさがるのだった。"
930282140 = "花鳥風月部の怪談家（２）"
790387478 = "巫女の舞を披露する時間が近づくにつれ、憂鬱が増えていくユカリ。結局のところ、ユカリの意思など誰も聞くつもりがないのだ。勝手に決めつけて押し付けていくその状況に絶望したその時――少女は甘い囁きを耳にする。"
4033191432 = "それでもあなたに"
3274326348 = "攻撃が通じないクロカゲを前にし、打てる手がなくなってしまった一行。その時、キキョウがナグサに対し「資格を持つナグサだけがユカリを救える」と告げる。そのキキョウの言葉に、ナグサは先生と一緒に前へ進む決意を固めるのだった。"
1742211216 = "炎に包まれた街"
1706685059 = "絶え間なく襲いかかってくる幻魎百物語を前に、先生とナグサは足を止めてしまう。その時、陰陽部と忍術研究部が助太刀してくれるのだった。"
3155421652 = "炎に包まれた街"
1197423923 = "目を覚ましたユカリに対し、シュロは楽しそうに笑う。ユカリの絶望を元に生み出した幻魎百物語「無貌の形代」が、百鬼夜行を火の海へと陥れたのだと告げ――ショックを受けるユカリの前に、先生とナグサが現れるのだった。"
3881819382 = "偽りの言葉"
415440099 = "シュロは先生を百物語で押さえつけ、大雪原で起きた出来事、そしてナグサが犯した過ちをユカリと先生の前で暴き立てる。知られたくなかった過去と内情を明かされたナグサは戦意を失い崩れ落ちるが――先生はそんな彼女に言葉を投げかけるのだった。"
2046334446 = "普通のこと"
1314809181 = "ナグサにかける先生の言葉にシュロは詭弁だと叫んだ。そうして、先生を攻撃しようとするも、その凶刃をユカリが止める。勘解由小路でなく、百花繚乱のユカリとして生きることを選んだ少女は、レンゲ、キキョウと共に「無貌の形代」に挑むのだった。"
3026137772 = "普通のこと"
2364647164 = "意思を強く持ったとしても百物語に傷をつけることができない三人――危機に直面したその時、ナグサが立ち上がる。もうあの時のように大切な人を喪いたくないと告げるナグサは、アヤメから受け取った百花繚乱の「証」を開放するのだった。"
1918408273 = "今あなたに"
3492807103 = "シュロが逃げ、ユカリは皆と再会できたことに感謝する。そして、ユカリはナグサに対し本来の目的だった「継承戦」を申し込み――結局、継承戦に勝利することは叶わなかったが、それでも明るい表情で皆と一緒に百花繚乱に帰るのだった。"
2816211461 = "願いを込めて"
3813773295 = "一連の事件が終わり、百鬼夜行には再び平和が訪れる。未だに残り続ける問題もあるけれど、それでも皆が心を一つにして灯りを流すのだった。一方――花鳥風月部のコクリコは、闇の中で怪しげに笑うのだった。"
1478099875 = "届かない指先"
2417637268 = "泣き虫だったかつての日々と、雪原でアヤメを引き留められなかった瞬間を思い出し、悪夢にうなされるナグサ。かつて黄昏に呑まれた腕は、痛みを増しつつあった――"
2900210047 = "新たな怪談"
1286307520 = "コクリコのもとに花鳥風月部の部員が訪れ、物語の幕開けを告げる。ナグサに敗北したシュロはその者から新たな怪書を借り受け、百花繚乱への復讐を誓うのだった。"
2234435405 = "新たなお祭り（１）"
2388749549 = "「和楽まつり」の準備に賑わう中、アラタ率いる魑魅一座が祭りの開催を妨害しようと会場に現れる。だが、そこへ百花繚乱が駆けつけ、戦闘へと突入し――！"
1536773814 = "新たなお祭り（２）"
1088037523 = "魑魅一座撃退のお礼として、ユカリたちはシズコたちお祭り運営委員会からマロンだんごを振る舞われる。その後、百花繚乱の一同が会場設営を手伝う中で、ナグサの腕が深刻な状態にあることが発覚した。それを見たユカリは、勘解由小路家で治療ができるかもしれない……と言う。"
1501948804 = "勘解由小路家の貴人"
2728089330 = "勘解由小路家に滞在する怪しげな医者「リク」は、内科が専門と語りつつ、ナグサの腕が黄昏に呑まれていることを一目で看破する。完全に治すには、失くした体を取り戻すしかない。時が経つほど、この傷は心身を蝕む――そう言われたナグサは、「あの日」の大雪原でアヤメと何があったのかを語り始めるのだった。"
756362788 = "憧れは記憶の彼方に"
3370516004 = "クズノハに固執するアヤメを連れ帰ろうとするナグサ。だが、アヤメはナグサに「友達だと思ったことなんてない」と告げ、姿を消す。その後、気を失ったナグサの前にクズノハが現れ、彼女を救ったのだった。――ナグサの語る冷酷なアヤメの姿に、困惑を隠せない百花繚乱の面々。そこに、陰陽部の使いが現れて……。"
1502304932 = "お祭りと準備"
2057092328 = "ニヤに先生と共に呼び出され、無理難題を警戒する百花繚乱。だが、依頼内容は北部自治区の「エビス分校」周辺に出現する怪異への対処だった。怪異とかつて百鬼夜行に出現した幻魎付喪神の共通点に気付き、その依頼を引き受ける一行。先生もまた、クズノハの手掛かりを掴むために、同行を決める。"
1315750381 = "雪国"
1205635506 = "北部自治区に到着した先生と百花繚乱を、エビス分校の自治委員会会長、土生アザミが出迎える。アザミの案内を受けながら、目撃者が恐れる者の姿をして現れる怪異についての証言を聞く一行は、夜はみなで温泉に浸かり、束の間の休息を楽しむのだった。そんな中で、ナグサは己の抱える恐怖へと思いを馳せる――"
3601732457 = "悪夢（１）"
1301003702 = "アヤメの現れる悪夢に苦しむナグサ。目を覚ますと、そこにはシュロの姿があった。自身を嘲笑いながら幻魎百物語を繰り出すシュロに対して、ナグサは折れずに立ち向かっていく。"
2063888527 = "悪夢（２）"
639451166 = "百花繚乱の面々が救援に駆けつけてきたため、撤退を試みるシュロ。逃げ足の速いシュロを捕らえられず歯噛みする一行だったが……一発の銃弾がシュロを叩き落とす。銃弾を放ったのは、かつて百花繚乱を導き、ナグサがずっと探し続けていたアヤメだった。"
3247570939 = "百花繚乱の委員長"
2246015017 = "明るく食事を楽しむアヤメに対して、疑問を投げかけるキキョウ。アヤメは、自分が許せなくなり、大雪原へと向かった経緯を語り始めるが、ナグサに冷たい言葉を投げかけたことはまったく覚えていなかった。自分の記憶違いと考えるナグサだったが、キキョウは未だアヤメへの疑いの目を向け続ける。"
3980407787 = "不完全な記憶"
2999571268 = "アヤメは逃げ出したシュロを捕えることに成功し、さらには花鳥風月部の拠点にも既に目星がついているという。ナグサが前と変わらぬアヤメの活躍を嬉しく思う一方、キキョウはあまりに隙がないアヤメに違和感を持ち続けており、ユカリとレンゲ、そして先生にも不審な点がなかったかと問うのだった。"
1983223605 = "彼岸へと至る道"
2421424457 = "幻魎付喪神の原型となった傘から、花鳥風月部の拠点「彼岸邸」を突き止めたアヤメ。先生とキキョウは、準備もなしに突入することへの不安を覚えるが、アヤメたちの勢いに押され、結局は向かうことになる。その道中、怪書を隠し持っていないかとシュロの身体検査を行なったところ、衝撃の自作小説が披露されるのだった。"
1938968282 = "勘解由小路家の巫女"
2793738644 = "一行は彼岸邸へと到着し、手分けして調査を開始する。その最中、ユカリは勘解由小路家の家紋と、誰かが書いた日記を見つけた。そこに記されていたのは、かつて勘解由小路の名を継いだ少女が百花繚乱紛争調停委員会の委員長となり、希望を失っていくまでの過程――その内容に驚き戸惑うユカリの元に、コクリコが現れる。"
3547088513 = "蛇の口中（１）"
2202995269 = "別行動を取っていたキキョウとレンゲは、罠に嵌められたことを察知し、急ぎ先生の元へと向かおうとする。しかし、それを阻むかのように付喪神が出現した。"
4125006944 = "蛇の口中（２）"
1777447729 = "先生とアザミの元に付喪神が出現し、シュロは全てが策の内であったと勝ち誇る。だが、付喪神は味方であるはずのシュロをも攻撃し、それを庇った際に先生は負傷してしまう。その頃、キキョウはアザミに銃を向け、彼女が花鳥風月部の一員であることを看破していた――"
4101117820 = "花鳥風月部の怪芸家（１）"
369181728 = "最初から自分たちは泳がされていた……と推理するキキョウ。アザミはその洞察力を褒め称えつつ、自身が花鳥風月部の怪芸家であることを明かした。戦いを挑もうとするキキョウとレンゲに対して、アザミはその闘志の中にある恐怖や不安を感じ取り、悦びを隠せずにいるのだった。"
3465264177 = "花鳥風月部の怪芸家（２）"
3362951369 = "突如出現した百物語に苦戦するナグサの前に、コクリコが現れる。コクリコがアヤメを連れ去ったのは悪い夢だったと、現実を受け入れられないナグサ。そんな彼女の前に、「あの日」と同じ冷たい表情のアヤメが現れた。"
2480664873 = "甘い夢の終わり"
677728044 = "地下牢で目を覚めたナグサに対して、アヤメはこれまで北部自治区で共に過ごしたのは自分ではなく、怪書が創り出した影だったと語る。まだ現実を受け入れられないナグサに対して、アヤメは自分に縋り付いてくる百鬼夜行の者たちを忌み嫌っていたことを明かした。そして、ナグサを友達だと思ったことはない、とも――"
3145489761 = "造花"
3797308812 = "コクリコは、百花繚乱と先生を捕らえることに尽力したシュロを褒め称える。シュロは喜びつつも、付喪神が自分に襲いかかったこと、そして自らを庇おうとした先生の姿が脳裏から離れないでいた。そんなシュロの不安をよそに、コクリコは彼岸邸を離れて百鬼夜行へと向かう。"
2543498820 = "委員長の帰還"
3151250892 = "和楽まつりの前日、書類と格闘しているニヤの元に、アヤメがやってくる。曰く、百花繚乱の面々と先生が雪崩に巻き込まれ、救助の要請にやってきたのだとか。だが、ニヤは仲間を置き去りにするアヤメを怪しみ、それが影であることを即座に看破する。そこに本物のアヤメが現れて……。"
2863107133 = "同床異夢"
779115510 = "彼岸邸の地下に閉じ込められた百花繚乱の面々と先生。ナグサは、アヤメを理解できていなかった自分を責めていた。そこにシュロが現れ、勝ち誇るが――ナグサがクズノハと出会ったと聞き、目の色を変える。内心迷いを抱えていたシュロは、クズノハの元へ道案内をさせるため、一行を牢から連れ出すのだった。"
2017155360 = "彼岸の記憶（１）"
3712861394 = "大雪原の中、黄昏の寺院へと向かう一行。その道中、シュロは「誰かを守るのに、自分の強さは関係ない」と語る先生の言葉に、動揺を隠せない。"
1189578546 = "彼岸の記憶（２）"
1384145819 = "ナグサが案内する先には、朽ち果てた廃墟があった。騙されたと激昂するシュロだったが、ナグサがとある言葉を口にすると、ボロボロの廃墟が、桜咲き乱れる空間へと変化する。そして、黄昏の寺院の主であるクズノハの姿が……。"
1768696395 = "本当の姿"
998522113 = "クズノハは一行を歓迎しつつも、便りの返事を全くよこさなかった先生を叱りつけ、騒ぎ立てるシュロを一蹴する。ナグサがアヤメを元に戻す方法について問うと、クズノハは「一度起きたことは元に戻らぬ」と言いつつ、うたかたの夢に浸かるのを止め、向き合うことが肝要と助言するのだった。"
2585962915 = "視線"
2317210858 = "委員長だったころ――アヤメは百鬼夜行の皆の頼みに笑顔で応え、完璧であらねばと意識する内に、自らの本来の顔を忘れてしまうまでに追い詰められていた。「今度は、みんなが私に観られる番」そう呟くと、アヤメは百鬼夜行を舞台に新たな百物語の幕を開く。"
3121894829 = "祭りは続く"
181107698 = "祭りの準備に勤しむカホは、百鬼夜行にヒトツメが出現したことに驚きつつ、対応に奔走する。和楽まつりの開催は困難……そう思われたとき、ニヤからカホへの伝言を携えて、忍術研究部が現れた。その伝言とは、「これまで通りでいい」――その意味を理解したカホは、和楽まつり開催のために動き出す。"
1157713290 = "四面和楽歌（１）"
2624602144 = "和楽まつりを開催すると言い出したカホに、全力で協力すると決意したお祭り運営委員会と忍術研究部。かくして、百鬼夜行を覆う恐怖を払い去るため、チセのスペシャルライブが開催された……！"
3836040692 = "四面和楽歌（２）"
4240906566 = "獄中のニヤの元をアザミが訪れる。祭りの盛り上がりによってヒトツメが薄れていく中、アザミはそんなことをしても無駄だとなおも勝ち誇るが、ニヤは余裕の表情を崩さない。そのとき、天守閣に白い花火が打ち上げられ――百花繚乱が救援に駆けつけた。"
2248504721 = "鬼哭は獅子の遠吠えに"
2051393425 = "ニヤと百花繚乱の面々、そして先生は合流を果たし、作戦会議に入る。いくらヒトツメを倒しても、大元のアヤメを倒さなければ意味がない――そのとき、ニヤが妙案を思いついた。それは復元した白紙の怪書にシュロの小説を書き込み、具現化しようというもの。かくして危機に陥った百鬼夜行に、「最強一角らいおん」が爆誕する。"
2455577687 = "三冊目の怪書"
1605542151 = "自らの怪談が喜劇に塗り替えられ、怒りを隠せないアザミを一喝するコクリコ。その場に百花繚乱と先生が駆けつけるが、コクリコは動揺した様子もなく、怪書の力で皆を闇の中に誘っていく……。"
917558113 = "暗く、深い影の底から"
1719928471 = "ユカリ、キキョウ、レンゲは、闇の中で己の心と対峙し、危うく黄昏へと呑まれそうになる。だが、ナグサは違った。己の弱さと向き合い続けてきたナグサは、黄昏に呑まれたはずの手を伸ばすと、コクリコとアザミに反撃をし、撤退させる。先を急ぐ中、ナグサは先生にアヤメとの戦いを見届けてほしいと頼むのだった。"
688718966 = "つかんだ指先"
3881859444 = "アヤメに継承戦を申し込んだナグサ。かつては一度も勝てなかったナグサだったが、此度は互角の戦いを繰り広げていく。「アヤメがいるだけでよかったのに」そんなナグサの言葉も届かず、継承戦は激しさを増していき――最後に立っていたのは、ナグサだった。だが、長年の目標を達成したにも関わらず、その瞳には涙が溢れていた。"
2049244668 = "ともに芽吹きを待ち侘びて"
2688582158 = "事件の収束後、先生は入院中のニヤ、お祭りの片付けに勤しむ忍術研究部らと再会し、互いの無事を喜び合う。次いで百花繚乱の委員会室へと向かうと、そこでは皆が花の種を植えていた。事件の後、アヤメは眠りにつき、いつ目を覚ますかわからないという。だが、ナグサはアヤメの意志を尊重し、いつか花が再び咲く日を待ち続けるのだった……"
4000054078 = "私たちの居場所"
2422594773 = "無茶な仕事を請けた結果、大怪我を負ってアリウス分校へ帰還したマイア。そんな彼女を、スバルは暖かく迎える。"
532006653 = "生徒の本分"
2547143426 = "補習授業部の面々は、トリニティ総合試験の対策に追われていた。外部の機関が作成し、客観的にその能力を測る試験。自警団、放課後スイーツ部、正義実現委員会、シスターフッド……他のトリニティの面々も、試験を前に三者三様の反応を示していた。そんな中、二人のトリニティ生が先生への相談を持ちかける。"
111254386 = "夢のような日々"
1745328622 = "アリウスの編入生と遭遇し、先生は驚きを隠せない。その出自ゆえに試験の仕組みがわからない中、戸惑いつつ取り組んでいると語るアリウス出身の生徒たち。そんな彼女らの抱く「アリウスに残り続ける他の子にも、普通の学生生活を送って欲しい」という願いに、先生は大人として応えることに。"
3626524437 = "誰がための学び"
584715180 = "「普通の学生生活を送って欲しい」その願いには、かつてのアリウススクワッドの面々も含まれていた。先生はアツコ、ミサキ、ヒヨリとサオリを豪華客船に招き、試験の話をする。戦い、生き抜くためにも、世界を知ることは必要……と肯定的に受け止めるスクワッドの面々。そこに、集会のスポンサーであるナギサが姿を現した。"
1890488107 = "謝罪"
4001607138 = "突然のナギサの登場に戸惑うスクワッドの面々。ナギサは、解釈の違いという理由からアリウスを追放した歴史は、トリニティの過ちだったと語る。アリウススクワッドや、アリウス分校に残る生徒たちに、社会の一員であってほしいと願うナギサの想いを受け、アツコたちは歩み寄ろうとする。"
2647279451 = "向こう側の椅子"
2398297819 = "先生も、ナギサの依頼でアリウス生たちに授業をすることになり、サオリたちとアリウス分校へ向かう。その頃、マイアは外の世界の煌びやかさに目を奪われつつも、自分が異物であると強く感じたことを語っていた。それを聞きながら、スバルは、未だトリニティとアリウススクワッドを許していない、という心境を明かす……。"
616126247 = "ハーモニカ"
1590792391 = "試験の内容がスクワッドの手でアリウス分校に流れ着く、というナギサの考案した設定に呆れるミサキと、学べることは誰からも学ぶべきと言うアツコ。アリウス分校では、後輩たちにせがまれ、スバルがハーモニカを披露していた。そして、アリウススクワッドが再び母校に辿り着く。スバルは警戒しつつ彼女たちを迎え入れるのだった。"
3549962588 = "アリウス流"
2960207032 = "驚き、失望、敵意……様々な感情が、アリウス分校に足を踏み入れたスクワッドの面々と先生を迎える。そこで、サオリはスバルと再会し、みんなで試験を受けるために来たと宣言。戸惑うアリウス生。議論は平行線を辿り、一行はスバルの提示した「試験」を受ける事に。戦闘に突入するアリウススクワッド。"
441958419 = "授業の時間"
1932143474 = "決着の後、先生はスクワッドの面々を教壇に立たせて、アリウス生たちへの授業を行なわせる。サオリは自身の経験に基づき、社会における契約を、ミサキは物理、アツコは生物、ヒヨリはファッションについて授業を行なう。そうしてアリウス生の警戒心が解けたところで、先生も教壇に立ち、みんなに学生生活を過ごしてもらうのだった。"
110027412 = "傷と痕跡"
3724148201 = "サオリは、先生と二人きりのとき、過去の行いを謝罪して崩れ落ちる。先生が「痕が残っていても、それと共に生きていける」と諭すと、前を向き直そうと努力するサオリ。一方スバルは、手段を選ばずみんなの居場所を作っていきたい、という願いをマイアに打ち明けていた。その夜サオリは、謎の襲撃者に襲われ、倒れ伏す。"
1000503757 = "校外学習（１）"
2403340386 = "翌日もアリウス生たちへの授業が始まる。今日は小テストの後は校外学習へ。街のゲームセンターに戸惑いながらも興じるアリウス生たち。その授業に同行する中で、スバルは「自分の人生を諦めたいと思う者を止める術」について、先生に問い掛けた。先生は戸惑いつつも、そのときは自分を許せないと思う、と言う。"
2055487567 = "校外学習（２）"
967522754 = "木の上から降りられなくなった子猫を、アリウス式の方法――銃声で猫を驚かせるという方法で、木から降ろすスバル。だが、周りの人々はざわめき、彼女らがアリウス生であることから偏見に満ちた非難を浴びせてくる。その後、自警団の二人と出会い、心が和むマイアとスバル。そんな校外学習から帰還すると、なぜかアリウス分校にミネたち救護騎士団一同が、勢揃いしていた。"
3636731330 = "名もなき奉仕活動部"
1212815035 = "校外学習から帰ると、アリウス分校には救護騎士団の姿があった。ミネたちは先生の頼みで素性を隠し「名もなき奉仕活動部」として活動を始めるが、スバルはその正体をすぐに見抜く。アリウスの根深い憎しみに触れ、葛藤するミネ。先生との対話で覚悟を決めるが……そのとき、不穏なラッパの音が鳴り響くのだった。"
2933749245 = "ラッパの音"
1534532054 = "救護騎士団はボランティアとして支援物資を配り、先生は授業で生徒の心の傷に寄り添う。ミサキやサオリも先生と話す中で過去と向き合い始めていく。そのとき、ラッパの音と共に4体の「黙示録の天使」が襲来。生徒たちを守るため、救護騎士団とアリウススクワッドは共闘を決意した。"
3173705092 = "信じているもの"
3227226913 = "天使の攻撃を受け、ミネは精神世界に囚われる。そこでアリウスが受けた迫害の歴史と憎しみに直面し、トリニティの一員として苦悩する。しかし、先生の言葉を思い出し、自らの信じる「救護」こそが道だと悟ったミネは、天使を撃退するが――力を使い果たし、倒れてしまう。"
3405121082 = "思い託して"
109795470 = "ミネが倒れたことで救護騎士団の正体が発覚。幻聴を聞いた一部のアリウス生は、それが黙示録に記された「世界の終わり」の始まりだと騒ぎ始める。意識を取り戻したミネは先生にアリウス生徒たちの「日常」を守ってほしいと託し、再び気を失ってしまった。そんな中でアツコは、天使の正体が「黙示録の天使」であると推測する。"
595564773 = "アリウス・バシリカ"
707791382 = "スバルはアリウス生をバシリカに集め、黙示録の現象について議論する。しかしラッパの音が聞こえた者と聞こえなかった者で意見は二分。先生たちを「浄化」すべきだという強硬派と、授業に価値を見出す穏健派で対立は激化していく。穏健な意見を述べたマイアは憎悪を向けられ、スバルはアリウスを守るためにマイアの追放することを決める。苦渋の決断に、二人は涙する……。"
3321019633 = "迷子の子ども"
4197219289 = "ミネの願いを受け、先生は翌日も授業を行うと決意。その夜、追放され絶望したマイアが先生を訪ね、保護されることになった。一方スバルは、黙示録の真相を確かめるためアリウス生を率いて「ポルタパシス」へと向かう。翌朝、アリウス生が授業に誰も来ず困惑する先生たちに、マイアは皆の行き先を告げるのだった。"
2868013820 = "ポルタパシス（１）"
2701311459 = "「ポルタパシス」についての情報を得るため、先生は図書委員会の知恵を借りることに。ウイとシミコから、ポルタパシスはかつて平和の象徴だったが、内戦を経てアリウスの記録保管庫となり、現在は封鎖されているという歴史が語られる。そしてアツコは、そこに隠されたアリウスの「秘儀」の存在を明かすのだった。"
2431721991 = "ポルタパシス（２）"
2479727769 = "アツコは、ベアトリーチェがポルタパシスを訪れてからアリウスで不可思議な現象が増えたと語る。一方、ポルタパシスに到着したスバルは単身地下へ向かっていた。先生たちのもとでは、マイアが昨夜の出来事を告白。ウイは、ラッパの音が聞こえたのは先生の授業を受け入れた生徒だと推測し、天使はアリウスの負の感情の具現化ではないかという仮説を立てる。"
1126610494 = "Apocrypha"
2406560706 = "スバルはポルタパシスの記録保管庫でアリウスの「外典」を発見する。そこにはトリニティへの呪詛と共に、「天使は汝ら自身を象徴する存在」という記述があった。その瞬間、スバルはアリウスの過去を幻視し、謎の声を聞く。一方、先生たちはポルタパシスへ急いでいた――"
3885788221 = "巣（１）"
1536976133 = "先生たちはポルタパシスの外で、アリウス生徒たちと交戦する。"
3079854232 = "巣（２）"
268023891 = "記録保管庫のスバルは、謎の声から「断罪の権能」を授かろうとしていた。戦闘の最中、アリウス生徒たちが先生たちに疑念を抱き始めたその時、ラッパの音が二度鳴り響く。"
191984949 = "弟子たち（１）"
819645213 = "ポルタパシス前に新たな天使が2体出現。ラッパの音はこれで合計6度となった。天使はアリウスの生徒たちに攻撃を開始し、先生の授業を受け入れた者が「敵」と見なされるというウイの仮説は現実のものとなった。同じアリウスの仲間を守るため、スクワッドは天使に立ち向かっていく。"
3659317844 = "弟子たち（２）"
2478483447 = "天使に敗北し退却するスクワッドは、心を開いたアリウスの生徒に抜け道を教えられる。記録保管庫へ向かう道中、アツコとマイアは謎の不調を感じる。辿り着いた先で待っていたスバルは、先生たちを別の場所へと案内する……。"
467501222 = "私たちの憎悪"
128005755 = "先生と対峙したスバルは、エデン条約後にアリウスが見捨てられたことへの憎悪をぶつける。トリニティの意向を汲み、アリウスを見過ごした先生の選択を断罪し、「アリウスのやり方」で生きると宣言。先生とスクワッドにアリウスからの退去を要求する。そんな中、サオリはスバルの「やり方」の先に何があるのかと問いかける。"
3404515189 = "それでも"
1895929857 = "サオリは自身の過去を省み、憎しみの先には何もないとスバルを諭す。そして、過去の罪を清算するため、スクワッド全員で自首する覚悟を明かす。しかし、その決意はスバルにとって裏切りでしかなく、見捨てられた怒りが爆発。その憎悪に呼応するかのように新たな脅威が出現し、一行は戦闘態勢に入る。"
2295943221 = "ラッパ吹きの天使"
539919597 = "「ラッパ吹きの天使」との戦闘に敗北し、負傷するスクワッド。ラッパの音が鳴り響くたびにアリウスは闇に包まれ、その元凶が憎しみに我を忘れたスバルだと判明する。マイアの声も届かぬほどに変貌したスバルを前に、アツコは言う。彼女こそが「ラッパ吹きの天使」になってしまったと……。"
1767825594 = "ロイヤルブラッド"
1703686333 = "アツコは、「ラッパ吹きの天使」がアリウスの感情が具現化した現象であり、スバルはそれを司る「審判者」になり得たと明かす。しかし、後輩のマイアを見捨てたことで資格を失い、暴走したと指摘。それを受けてマイアは、スバルへの変わらぬ想いを込め、先輩のハーモニカが大好きだと叫んだ。"
2837190758 = "あの日のハーモニカ"
3901852665 = "マイアからハーモニカと共に届けられた純粋な想いは、スバルの心を揺さぶる。しかし、彼女は罪悪感に耐えきれず、「ラッパ吹きの天使」と同化して姿を消した。アツコは精神世界でスバルと対話するが、交渉は決裂。アツコはスバルに、アリウス式の「話し合い」を試みるのだった。"
940208950 = "低きに下られ"
1386503884 = "揺蕩う意識の中、スバルはかつてサオリと過ごした日々を思い返す。やがて目を覚ましたスバルは、先生の言葉と、何も変わらずに自分を信じてくれるマイアやスクワッド、そしてアリウスの生徒たちの姿に心を動かされる。ついに過去の憎しみから解放されたスバルは、皆と共に新たな一歩を踏み出すことを決意した。"
2268459850 = "試み"
2418512983 = "戸惑いながらもトリニティの治療を受け入れるスバルたち。アリウス生がトリニティ生に受け入れられている光景を目の当たりにしたり、ミネとの会話を通して、スバルは自分の考えを再確認する。マイアに「新しい巣を作れるか」と問われたスバルは、先生の言葉を胸に、たとえ結果がどうであれ、未来へ向かって進むことを決意するのだった。"
1911255380 = "ティータイム"
3554065651 = "事件後、ナギサは先生にアリウス生徒の受け入れと、両校の歴史を共同で編纂する計画を明かした。それに対して先生は、かつてナギサを信じきれなかったことを改めて謝罪する。和やかな雰囲気の中、ミカとセイアも現れ、久しぶりにティーパーティーが揃っての賑やかなティータイムが始まるのだった。"
3711742589 = "試験勉強"
2447597939 = "ヴァルキューレの矯正局に収監されていたサオリは、コノカから仮釈放を告げられる。先生やトリニティ、ゲヘナからの嘆願書が決め手となったのだ。解放されたスクワッドは、スバルやマイア、他のアリウス生たちと共に、トリニティの旧校舎で試験勉強を開始する。補習授業部の面々も加わり、賑やかな補習授業が繰り広げられるのだった。"
3406215762 = "遺された未来のためのエクレシア"
809303219 = "先生に見送られ、アリウスの生徒たちはそれぞれの想いを胸に試験に臨む。結果はともあれ、試験の後は打ち上げで健闘を讃えあった。後日、アツコはスバルとマイアに、スクワッドが臨時生徒会としてアリウスの再建を担うことを宣言する。スバルも風紀委員として協力することを決意し、アリウスは新たな一歩を踏み出していくのだった。"
3193525155 = "プロローグ"
2711878389 = "キヴォトスに到来した未曾有の危機――覆された物語が幕を開ける。脈絡やジャンル、必然性――物語の構成要素を全てを失ってしまった世界で、男は哄笑を上げるのだった。"
798972658 = "破局"
2166272260 = "色彩によって重篤な傷を負ってしまったセイア。そんな彼女を助けたのは、百鬼夜行連合学院の預言者――クズノハだった。色彩による傷を治すために自身の未来視を差し出したセイアは、最期の走馬灯でキヴォトスの終焉を目にし……一方、侵食されたヘイローの少女に銃で撃たれる夢を見た先生は、セイアから告げられたキヴォトスの終焉と、夢の内容。胸騒ぎを覚えながらも、連邦生徒会のリンに予知夢を伝えるのだった。"
195800839 = "日常の亀裂（１）"
3565621813 = "一件落着したかに見えたアビドス砂漠に、カイザーPMCが多く出入りしているのを目撃した対策委員会は、先生に助力を求める事を決める。一方、危機を乗り越えたゲーム開発部は、メディカルチェックを受けたアリスに異常がない事を確認するも＜key＞が消えた確証はない。各地で取り戻した平穏が、少しずつ崩れていくような違和感が続く中、ヒマリはリオの私室で「さらなる特異現象に備えよ」というメッセージを見つけ――"
7652038 = "日常の亀裂（２）"
2494494926 = "ミカの聴聞会が開かれ、判決が下る。一方で、その裁定に納得がいかない生徒は、デモを続けており……そんなデモを横目に、補習授業部と放課後スイーツ部の日常は穏やかに続いていく。過ぎる日々にほんの少しの違和感を抱えながら――"
2262081318 = "日常の亀裂（３）"
463599499 = "子ウサギタウンの再開発が決まってから、役所やインフラがなくなってしまった子ウサギ公園の周辺。RABBIT小隊員は、周囲の住民の要請でスズメバチの駆除を行っていた。平穏な日々が続く一方――ゲマトリアは緊急会議を開いていた。"
1781985604 = "前兆"
2245880881 = "キヴォトス上空に実体の掴めない謎のエネルギー体を観測した連邦生徒会。先生から予知夢の連絡を受けていたリンは、念のため各自治区の生徒会代表を招集し、非常対策委員会を発足する事を決めるのだった。"
3892096270 = "非常対策委員会の招集"
3215056730 = "各自治区の生徒会に、非常対策委員会の招集が届く中、シャーレにも連邦生徒会から連絡が入る。曰く、非常対策委員会の生徒たちをまとめるために先生に来てほしいとのことで――ほどなくして迎えに来たヘリに先生は乗り込むのだった。"
3439536052 = "光の到来"
4086481199 = "連邦生徒会からの招集に応えるべく、移動していた対策委員会一行。その道中でカイザーPMCの不審な動きを見かけたシロコは、単独で様子を見に向かい――時を同じくして、PMCの襲撃に遭った先生を守るアロナの世界に、流星が降り注ぐ。それは不吉な予兆の始まりだった――"
823044007 = "衝突（１）"
1618045052 = "カンナと生活安全局の手によって、助けられた先生。先生が囚えられている間に起こった連邦生徒会を取り巻く環境について教えてもらいながら、一行は外を目指す――その一方、リンの招集により集まった各自治区の生徒たちは、先生の不在により連邦生徒会に対しての不満を募らせ……そんな中、リンに対しての不信任決議案が可決してしまう。"
2115087290 = "衝突（２）"
897695044 = "不信任決議案が可決されたことによりすべての権限を取り上げられたリン。混乱に陥った連邦生徒会の元に、武装したカイザーPMCが押し寄せ、制圧されてしまう。そうして、キヴォトスの全てはカイザーPMCによって掌握されてしまうのだった。"
108917706 = "脱出（１）"
2607711708 = "不在の間に起こった出来事を聞いた後、カンナの手によって、シッテムの箱を無事取り戻すことに成功した先生は、皆を守るために立ち上がる。一刻も早く、生徒の――連邦生徒会の元へと向かうために。"
2495439441 = "脱出（１）"
2414405803 = "生活安全局の生徒たちを指揮し、危険を免れた先生。カンナと共にカイザーPMCの基地から脱出すべく、駆け出すのだった。"
3653117257 = "脱出（２）"
2785523736 = "先生の指揮の元、駆け出す一行。しかしカイザーPMCとの人数不利は埋まらず、絶体絶命かと思った瞬間――アロナの連絡を受け取ったRABBIT小隊が駆けつけてくれたのだった。"
2819309745 = "シャーレ奪還作戦（１）"
2601430695 = "連邦生徒会を占拠したカイザーによってD.U.全体に戒厳令が敷かれてしまった。一同は、この事態を解消するために、シャーレに囚えられてしまったというリンの元へ向かうべく作戦を立てる。そうして、一同は「シャーレ奪還作戦」を敢行するのだった。"
3120994840 = "シャーレ奪還作戦（１）"
4019116888 = "公安局の生徒達の手助けもあって、無事シャーレに到着した一同。モモカとアユムと連絡をとることができた先生は、リンが囚われている場所を聞き出し、歩を進めるのだった。"
444446759 = "シャーレ奪還作戦（２）"
3034106234 = "キヴォトス全域に起きた異変に関して、各々の見解を語るゲマトリアの前に、謎の少女が現れる。一方、先生たちはシャーレ内部へと侵入を果たすのだった。"
4088358757 = "シャーレ奪還作戦（２）"
429781151 = "RABBIT小隊の活躍によりシャーレ奪還作戦は成功、リンは無事救出されるのだった。"
3501090871 = "沈みゆく物語"
2392777866 = "カイザーPMCを追い出す事に成功し、D.U.の権限を取り戻した先生と連邦生徒会。しばらく通信が遮断されていた先生の元には、各自治区の生徒からの心配の声が届いていた。安堵と歓喜の声に満ちる中、歪な姿に成り果てたゴルコンダ――フランシスは、先生に対し恐ろしい言葉を放つのだった。"
4283014959 = "色彩の嚮導者"
2829819827 = "空は緋色に染まり、ただならぬ空気がキヴォトス全域に広がっていく中、先生は黒服から「色彩」が到来した事を告げられる。大人のカードで事態の収拾を目指す先生に対し、黒服は忠告を残すのだった――"
2680676029 = "作戦会議"
25032020 = "先生の連絡を受けた生徒が続々と集結し、リンを中心に事態解決のための作戦を立てる事に。この現象を解消するためには６箇所の塔を破壊しなければならない。作戦に向け、それぞれの役割分担を決めた一方で、サンクトゥムに触れた人々を救うために、先生とセイアはクズノハを探す事に。その話を聞いたニヤは、クズノハの捜索を自分に任せてほしいと申し出るのだった。"
2666731161 = "作戦準備（１）"
1645668012 = "虚妄のサンクトゥムを攻略するための作戦が始まった。アビドス砂漠には対策委員会と便利屋68が、ミレニアム廃墟地区にはC&Cとエイミ、そして正義実現委員会のツルギとイチカが。スランピアにはゲーム開発部とヒナ、そしてRABBIT小隊がそれぞれ担当する事になり、待機することに。"
420504687 = "作戦準備（２）"
2800486956 = "サオリと再会できたアリウススクワッドも、先生の呼びかけに答えてくれる事に。第4サンクトゥムにはシスターフッドと救護騎士団が待機し、第5サンクトゥムの攻略は難航していたものの、温泉開発部の協力があり無事に終えることができた。そして第6サンクトゥムは無事、市民の避難を完了させる。ニヤは忍術研究部に「大雪原」に行って百花繚乱の委員長を捜索する任務を伝えるのだった。"
2772818858 = "作戦準備（３）"
2990932553 = "各サンクトゥムの準備は整った。あとは攻略戦を開始するのみ。戦いの火蓋が切って落とされたのだった。"
3423693341 = "第1サンクトゥム「アビドス砂漠」"
2046452490 = "アビドス砂漠地区で便利屋68と対策委員会が第1サンクトゥムの攻略を開始するのだった。"
1927454599 = "「山海経」自治区防衛"
4210922202 = "山海経を防衛するべく梅花園と錬丹術研究会、玄武商会が出動し、生徒の避難と防衛にあたっていたその動きを眺めていた玄龍門の門主、キサキは彼女たちへの支援としてミナを派遣するのだった。"
3817181433 = "「レッドウィンター」自治区防衛"
4286816204 = "マリナは親衛隊を率い、ミノリは工務部員たちと共にレッドウィンター連邦学園の防衛戦に赴く。227号特別クラスは避難所として生徒の避難誘導を担当するものの、学園のどこにもチェリノの姿が見えなかった。"
3231049307 = "第2サンクトゥム「ミレニアム郊外の閉鎖地域」"
1633487982 = "C&Cはパラシュート部隊として降下。軍需工場の中心部に侵入し、ツルギは正面から敵兵力の進撃を防ぐことに。ケセドの前で会おうという約束と共に、第2サンクトゥムの攻略が始まった。"
3392176268 = "「百鬼夜行」自治区防衛"
2047690688 = "百鬼夜行連合学院総出で防衛戦を開始する。普段はあまり仲が良くない魍魎一座の生徒たちとも手と手を取り合って。それはまさしく、学園が一体となった瞬間であった。"
1895070652 = "「ゲヘナ」自治区防衛"
2484586467 = "ゲヘナ学園自治区を防衛すべく集結した風紀委員会。第3サンクトゥムを攻略するヒナを除くすべてのメンバーが集まっていた。そんな中、突如として現れた万魔殿のサツキは、催眠術をお披露目して帰っていくのだった。"
874433887 = "第3サンクトゥム「廃墟化した遊園地」"
440838892 = "第3サンクトゥムの閉鎖された遊園地の前に集結したRABBIT小隊とゲーム開発部、そしてヒナ。ゲーム開発部はUZQueen専用機を用意し、サンクトゥム攻略を始めるのだった。"
3984911413 = "「トリニティ」自治区防衛（１）"
2457016360 = "トリニティ総合学園自治区を防衛すべく、トリニティから正義実現委員会と図書委員会、自警団などがそれぞれ生徒市民の避難や敵の迎撃などを進めていた。しかし、あまりの敵の多さに消耗戦を覚悟していた彼女たちの前に、颯爽と現れたティーパーティーが手を貸してくれるのだった。"
1058019105 = "「トリニティ」自治区防衛（２）"
660632900 = "学園自治区の防衛戦はあらかた終わった頃、遺跡付近でコハルが孤軍奮闘している事にマシロが気づく。それを聞いたハスミやミカがコハルの救出に向かうのだった。"
3990749649 = "「トリニティ」自治区防衛（２）"
3821969501 = "無事コハルの救出に成功したミカは、正義実現委員会の面々からお礼を言われるのであった。"
3708980353 = "第4サンクトゥム「カタコンベ内バシリカ」"
2859655258 = "第4サンクトゥム攻略のため、カタコンベ内部のバシリカの前に集まったハナコとシスターフッド。そこに、アリウススクワッドが助太刀してくれる事に。聖徒会の服装に身を包んだサクラコも合流し、第4サンクトゥムの攻略が始まるのだった。"
2432640477 = "「ミレニアム」自治区防衛"
2053587049 = "ミレニアム自治区防衛のために集まったエンジニア部。今から防衛を始めようとしたところで、オーナー不明のAMASが現れて――AMASと共にミレニアム自治区の防衛を開始するのだった。"
3508513666 = "第5サンクトゥム「要塞都市エリドゥ近郊」"
1997816141 = "第5サンクトゥム攻略のため、要塞都市エリドゥ近郊に集まったセミナー。一方、温泉開発部はサンクトゥム攻略を手伝いつつ、新たな温泉を掘り起こさんとしているのだった。"
2129916519 = "大雪原の中で"
277931373 = "ニヤに命じられた特別任務を遂行すべく、大雪原に到着した忍術研究部。大雪原は虚妄のサンクトゥムの影響が薄いと聞いていたものの、そこには「無名の守護者」が列をなしていた。絶体絶命かと思われたその瞬間、空から意外な来訪者が助太刀に現れるのだった。"
1644926925 = "大雪原の中で"
1124497200 = "万魔殿のおかげで事なきを得た忍術研究部。再び特別任務を再開しようと旅立つことに。そうして、万魔殿も自身の任務を終えたと判断し、帰っていくのだった。"
4129642388 = "「D.U.シラトリ区」防衛"
1310011068 = "6番目のサンクトゥムはまだ守護者の存在が明らかになっていないため、本部側はD.U.シラトリ区周辺の防衛を強化することに。美食研究会がその防衛戦を担当するものの……また、自治区周辺でカイテンジャーが活動しており、助力してくれるのだった。"
581030933 = "「D.U.シラトリ区」防衛"
1263686991 = "カイテンジャーは本来の目的を達成したのか次々と退場していく。一方その頃、ヒマリは休まず働くトキに対して無茶をしないようにと告げるのだった。"
3816433260 = "最終防衛戦「シャーレ」"
3712581761 = "6番目のサンクトゥムを除くすべてのサンクトゥムの守護者の一斉攻撃の準備が整った。それと同時に、すべての自治区の防御準備を終えたその時――シャーレの近くに無名の守護者が多数現れる。絶体絶命かと思いきや、想定外の助力を得て、防衛戦が開戦するのだった。"
3792371391 = "最終防衛戦「シャーレ」"
4154633485 = "「虚妄のサンクトゥム」攻略戦の準備が整った。まもなく、総攻撃のカウントダウンが開始する――"
1690517337 = "想定外の出会い"
1535882269 = "全てのサンクトゥムを破壊し、青空を取り戻すことに成功。そんな一行の前に、とある人物が現れるのだった。"
762919617 = "役割"
411556707 = "百鬼夜行の大雪原で百花繚乱の制服を着た少女、ナグサと出会った忍術研究部一同。一方その頃、先生の前に現れたシロコは「既に決まった運命を変えることはできない」と告げるのだった。"
1367106300 = "異変"
2890072437 = "キヴォトス上空に再び超高濃度のエネルギー体が観測される。エネルギーのみ観測され、その実体は掴めない……虚妄のサンクトゥムが出現する予兆と一致している事から、一行に激震が走った。エネルギーの流れを追っていくと、上空75,000mに謎の構造体があることが判明するのだった。"
3531850351 = "方法"
2437317342 = "上空75,000mにある構造体に対し、エリドゥに残されていた巡航ミサイルを発射するもすべて通過してしまう。解析の結果、物理的な手段では攻撃することができないと判明し、八方塞がりに。先生は、なんとか攻撃する方法を模索すべく、黒服の元を訪れるのだった。"
267855655 = "アビドスに在るもの（１）"
1729905057 = "上空75,000にある構造体の名は「アトラ・ハシースの箱舟」古代文明の遺産であり、その中に色彩の嚮導者「プレナパテス」がいるのだと黒服は告げる。対抗手段はなくもないが、その手法を取ってしまえば、先生は取り返しのつかないダメージを負うことになるとも。元より覚悟の上だと返す先生に対し、黒服はアビドス砂漠に埋まっている「ウトナピシュティムの本船」の話を語るのだった。"
1811510733 = "アビドスに在るもの（２）"
2105960912 = "カイザーPMCがアビドス砂漠で発掘作業を進めていたのが、古代文明の遺産「ウトナピシュティムの本船」であることを知った一行は、アビドス砂漠へと向かうのだった。"
4076541312 = "アビドスに在るもの（２）"
1035243973 = "そうして、ついにカイザーPMCの発掘地で、「ウトナピシュティムの本船」を見つけるのだった。"
3561957851 = "ウトナピシュティムの本船（１）"
2790127767 = "無事ウトナピシュティムの本船を見つけ、その内部構造の解析をすべく一堂に会した様々な学園の生徒たち。その中にいたアリスに対し、ケイは警告を発する。"
1997883390 = "ウトナピシュティムの本船（２）"
1562900906 = "エンジニア部の尽力によって、船の操作マニュアルが完成した。これを使えば、船を上空75,000mまで飛ばすことが可能となる。一方で、ヒマリとリオの尽力によって箱舟を守るバリアの突破法を編み出すことに成功。一同は、「アトラ・ハシースの箱舟」を攻略する準備を整えていく。"
947511423 = "ブリーフィング"
1309794530 = "そうして「アトラ・ハシースの箱舟占領戦」の計画書が完成する。先生は船の総責任者となり、連邦生徒会を含む9人の生徒が、オペレーターとして参加することになった。作戦成功率は3％。キヴォトスの命運をかけた作戦が、いま幕を開ける。"
1095169701 = "地上最後の夜"
3567564752 = "作戦の決行は8時間後。それぞれの想いを胸に、地上最後の夜が更けていく――"
1605244826 = "天上の遥か彼方へ"
743266950 = "オペレーター用の衣装も完成し、気持ちを新たにした一行を乗せて「ウトナピシュティムの本船」は上空75,000mの箱舟を目指して飛び立つのだった。"
1510466922 = "はじまりの物語"
206962437 = "「ウトナピシュティムの本船」が「状態の共存」を行った反動がすべて先生に襲いかかる。意識が薄れ、訪れていたかもしれない未来の夢を見る先生――その頃、箱舟に異変が起き、船は窮地に陥っていた。"
440319067 = "「勇者」の資格（１）"
2333920900 = "「アトラ・ハシースの箱舟」が作った新しい軸。それを突破するためには同一存在である「箱舟」が干渉するより他はない――そんな手詰まりの状況下に、アリスは立ち上がる。"
3249116561 = "「勇者」の資格（２）"
4072004648 = "自身の力を、そしてケイを受け入れたアリスは、己の意思で「箱舟」を起動する。そうして強化された「アトラ・ハシースのスーパーノヴァ」が箱舟の「多次元バリア」を粉砕するのだった。"
535154781 = "突入"
2875406175 = "アリスが空けてくれたバリアの穴に突進し、無事「箱舟」内部に突入することに成功した一同。しかし、彼女らを待ち受けていたのは箱舟を防衛する敵だった。敵から船を守るべく、生徒たちが立ち上がる。"
37805264 = "アトラ・ハシースの箱舟占領戦 "
3286452789 = "襲いかかってきた敵を一掃する頃、シロコが姿を現した。交戦を中断し、どこかへと姿を消すシロコ。\rこのまま箱舟作戦を進行していけばいつか会えると笑って、一行は箱舟占領戦を開始するのだった。"
2495904841 = "逆襲"
2599365756 = "箱舟の自爆シーケンスを準備していたヴェリタス。もうあとは箱舟を爆破して地上に帰るだけ――そんな喜色に包まれた一行の前に無常に響き渡る自爆シーケンス起動の音。そう、気づかぬ間に、船が敵にハッキングされてしまっていたのだった。再びキヴォトスの空が赤く染まり、世界は終焉へと傾いていく。先生はこの事態を打破すべく、プレナパテスと対峙するのだった。"
1490470304 = "定められた運命"
1765923020 = "ウトナピシュティムの本船がハッキングされ、自爆シーケンスが作動してしまう。絶体絶命のさなか、シロコと共にプレナパテスと対峙していた先生は、彼女らの正体を知る――"
3647243136 = "抵抗（１）"
2615819851 = "リオによってなんとか自爆シーケンスを食い止めることに成功した一同は、ウトナピシュティムへのハッキングを止めるべく作戦を立てる。それぞれの願いを乗せた、最後の作戦が開始するのだった。"
3257700775 = "抵抗（２）"
3695169812 = "地上に顕現した「虚妄のサンクトゥム」の影響で、食い止めていた自爆シーケンスが再び稼働してしまう。しかし、「虚妄のサンクトゥム」は、事前に予想していたいずれの場所にも観測されず――ちょうど異変を察知していたトキがサンクトゥムの対処にあたるのだった。"
3387237276 = "抵抗（３）"
2048912704 = "単身でサンクトゥムの対処に当たるトキは限界を迎えようとしていた。一方、抑制時間が加速する中、どうにか箱舟との接続を解除する事に成功するのだった。"
828369729 = "安易な解"
4054721821 = "箱舟との接続を無事解除し、管制権を取り戻した一同。リオはトキに撤収を命じるも、限界まで稼働していたトキはその場に倒れてしまう。増援の期待などしていないと笑う彼女の前に、C&Cが駆けつけるのだった。"
2057330540 = "同等の条件"
1214415501 = "今度こそ、最後の「自爆シーケンス」が稼働する。各々が脱出シーケンスの準備をする中、先生とプレナパテスは互いに「大人のカード」を取り出し、対峙するのだった。"
2106964121 = "同じ状況、同じ選択"
248567209 = "自分用に残されていた最後の「脱出シーケンス」でシロコを地上に送り届けた先生。箱舟と共に墜ちていく先生を、アロナはなんとか救おうとするも届かず、自由落下を続けていく――先生の最後の願いによって教室に送られたもう一人のアロナは、2人で奇跡を起こすのだと、アロナに手を差し伸べるのだった。"
301154037 = "あまねく奇跡の始発点"
3245849038 = "先生は、アロナたちが起こした奇跡によって無事地上に戻ることができた。そして、シロコともう一人のシロコは思い出の話をし、覆面を託される。この世界に留まっていいのかと問いかけるシロコに対し、先生がなんとかしてくれるとシロコは笑うのだった。"
3096659346 = "エピローグ（１）"
2589530285 = "D.U.シラトリ区では復旧作業が進んでおり、世界は穏やかに日常に戻っていく。ゲーム開発部は<Kei>というセーブデータを発見し、ヒマリの元へと持っていき、小さなストラップにデータを移してもらう。一方その頃――防衛室のカヤは、カイザーと不穏な密談を交わしていた。"
1378875601 = "エピローグ（２）"
1401260434 = "全ての事態が収束し、各自の日常が戻ってくる。先生がニヤからクズノハの手紙を受け取る一方、リンは差出人のない、一通の手紙を受け取ったのだった。"
2819824296 = "後日談（１）"
3130167285 = "シッテムの箱で一緒に暮らすことになったアロナとプラナ。先生は2人と挨拶をしながらこの先の話をするのだった。"
1389029183 = "後日談（２）"
2385825589 = "フランシスは、この物語の結末について言葉を綴っていた。一方――プラナはアロナが、なぜ自身と似て非なる存在なのかについての証明を終えるのだった。"

1141893095 = "眠る鯨"
1071953312 = "ホシノが資材整理を口実に先生を呼び出し、倉庫の中に昼寝用の秘密基地を作ることに。"
3096054116 = "怠け者の朝"
2514639115 = "教室で思う存分昼寝をしたホシノは、先生と一緒にグラウンドで宝探しを始める。"
3534890387 = "うっすらだけど輝いてる"
687709314 = "真夜中の学校で宝探しをしていると、先生は魚の形をした夜光ステッカーを発見する。これをプレゼントするとホシノはすごく喜んでくれた。"
3392633652 = "真夜中のパトロール"
1781335004 = "夜道で偶然ホシノと出会った先生は、彼女が毎晩密かに街の安全のため、パトロールをしていることを知る。"
3089484350 = "幸運を掴む方法"
748794093 = "ホシノが書店で購入した図鑑に、アクアリウム入場券の抽選チケットが付録として入っていた。残念ながらそのチケットは外れだったが、先生は同じ本を追加で50冊購入し、当たるまで挑戦し続けることに。"
1287455689 = "アクアリウム！"
1182596744 = "当選チケットを手に、アクアリウムに遊びに来た先生とホシノ。アクアリウムの魚を見て回りながら、楽しい時間を過ごす。"
1659730423 = "どこでも入場券"
823938156 = "先生を呼び出したホシノは、いつも愛用している枕を貸してあげると言う。とても柔らかい触感に、先生はすぐさま寝落ちることに。ホシノは眠りについている先生に、普段言えなかったことをささやくのであった。"
772933003 = "アルバイトのお手伝い"
306418223 = "セリカのチラシ配りのアルバイトを手伝いに、街に出てきた先生。大変そうにアルバイトをするセリカの姿を見て、先生はこっそり裏でチラシを配ることにする。"
1065594543 = "ハードな夜通しバイト"
2879956728 = "セリカと先生は、一晩中ビルの入り口を守る夜間警備のアルバイトをすることに。"
2794306484 = "公園で草むしり"
2993178327 = "セリカは先生と一緒に、公園の雑草取りのアルバイトをすることに。"
3688572742 = "遅い悟り"
57915122 = "公園の掃除をしている途中セリカは、自分が先生とのアルバイトを楽しんでいることを自覚する。"
2323863848 = "思いがけない幸運"
2376289702 = "予想より早くバイトを終えた先生とセリカは、夜の市場で屋台を見て回り、楽しい時間を過ごす。"
1234311581 = "つかの間の休息"
1846022614 = "セリカが連日のバイトの過労で倒れてしまい、先生はアルバイトを休ませて彼女を介抱することに。何とか気力を取り戻したセリカは公園のブランコに乗り、今まで隠していた本音を少しだけ打ち明ける。"
1604922941 = "お気に入りのバッグ"
1348486067 = "突然の戦闘で大切にしていたバッグが壊れてしまったセリカ。先生と一緒に訪れた修理店で、初めてのバイト代で買った思い出のバッグである事を告げる。無事修理されたバッグを手に、セリカは嬉しそうに笑うのだった。"
1974828165 = "ランニングマシン"
472444615 = "朝、買い物でシロコと待ち合わせた先生。シロコは軽いジョギングをしながら行こうと提案し、それに応じる先生だったが、予想以上の距離で先生はへとへとになってしまった。"
4290065928 = "僅かな距離"
3912456663 = "ランニング後、シロコは汗の匂いが気になってつい先生と距離を置いてしまう。そのことになかなか気づかない先生に対し、困惑するシロコだった。"
1760556289 = "ロードバイク"
1275905591 = "自転車ショップで、シロコと先生は新しいパーツについて話しながら楽しい時間を過ごす。"
157262830 = "地下鉄"
3007279150 = "アビドスからかなり離れた地下鉄の駅で、偶然シロコと出会う先生。シロコは長距離のライディングを計画しているのだと先生に話す。"
2507710158 = "都市部見学"
3505609892 = "ビルの屋上で銀行強盗の計画を立てながら街を見下ろすシロコ。その姿を見た先生が犯罪はダメとシロコに注意する。"
2464084323 = "個人面談"
2008779368 = "日頃の危なっかしい言動を注意するためにシロコを呼び出した先生。シロコは突然の個人面談に緊張していたが、先生が自分のことを心配しているのだと気づき、安心しつつ喜びを覚える。"
248513908 = "備え有れば憂いなし？"
3206543840 = "アビドス高校学校に向かっていた先生は、道すがらシロコに偶然出会い一緒に向かう事に。シロコはドローンを手に入れたといい、悪さをしている不良に対してミサイルを打ち込む姿に、あまりドローンを使わないようにね、と先生は釘をさすのだった。"
2219405563 = "偶然の出会いですね"
923721089 = "アビドス郊外で、偶然出会った先生とノノミ。ふたりはそのままパフェを食べに行くことに。"
3468758278 = "清掃の時間です"
2022208209 = "朝早くに対策委員会の部室に着いた先生とノノミは、部室を綺麗に掃除することにする。"
1361707422 = "恩返しの時間です"
628470444 = "アビドス高等学校から遠く離れたショッピングモールへと出向き、ノノミと先生は対策委員会の部員に贈るプレゼントを選ぶ。買い物が終わった後、部室に帰ってきたノノミは密かにプレゼントとして買ってきた耳かきを取り出し、先生の耳掃除を始めた。"
273794540 = "ゲームは楽しいです"
3260525698 = "先生はノノミのオセロの特訓を手伝うために対戦を始めたが、ノノミの想像以上の実力に連敗を喫してしまう。"
1938906934 = "健康になりましょう"
148008888 = "先生とノノミは、購入したダンベルを重さ別に分類する作業をしていた。"
2260462853 = "お茶会を準備するのです"
2609741974 = "今は使われていない茶道部の部室で、お茶会に使えそうな物を探す先生とノノミだったが、何の収穫も得られないまま思い悩むのだった。"
2355740806 = "内緒のノート"
1906697160 = "対策委員会の教室で、ノノミはウィッシュリストを書いていた。それは何かと尋ねる先生に対し、対策委員会のみんなと一緒にやりたいことをまとめた手帳であると話してくれるのだった。"
2951685534 = "模範的な市民"
1611256425 = "マキが私有地でグラフィティをしたために警察に補導されてしまい、連絡を受けた先生が交番を訪れる。マキは人々が自分の芸術魂を分かってくれないと不満を言いながらも、先生を困らせないために謝罪をするのだった。"
3090443160 = "怪しいハッキング"
3395943859 = "マキがキオスクをハッキングし、レトロゲームをインストールして遊んでいたところを、先生にバレてしまって怒られることに。"
364389697 = "バカと天才は紙一重"
2442185520 = "ミレニアムサイエンススクールのテストで赤点を取ってしまったマキは、先生に個人レッスンをしてもらうことに。マキは現代文の問題に苦戦する一方で、ノートの内容を文字通り全部暗記してしまうという天才の片鱗を見せる。"
350096205 = "美化活動"
2708563886 = "下校中、マキが偶然辺りがゴミだらけの汚い壁を発見し、壁を綺麗に掃除した上で、先生に内緒でグラフィティを描く。その現場を見てしまう先生だったが、マキの意図を理解し、一緒に壁の掃除をした後、壁の持ち主に一緒に謝りに行くことにした。"
1003290137 = "永遠の思い出"
3714205214 = "マキがグラフィティを描いた壁の持ち主は彼女の絵を気に入り、他の壁にも描いてほしいと頼んだ。マキは先生と一緒に壁にグラフィティを描き、楽しい時間を過ごす。"
96680612 = "あなたが私のご主人様ですか？（１）"
2929931893 = "任務の途中、ヘルメット団に追われていた先生のことをアカネが助ける。アカネは先生に挨拶をしながら、初めて会った時のことを思い出していた。"
4136338484 = "あなたが私のご主人様ですか？（２）"
1808933988 = "アカネと先生が初めて出会った時のこと。「掃除」という言葉を要人暗殺の隠語だと誤解したアカネは、先生が本当に文字通りの掃除を頼んだことに少し不満を抱きながらも、シャーレの執務室を綺麗に掃除してみせた。"
3512349930 = "共に歩む時間"
2541546715 = "アカネはヘルメット団を追撃していたが、ギリギリのところで逃してしまう。しかし、その先で偶然先生と出会い、ひとつ失敗をしてもそれ以上の幸運が訪れたと喜ぶ。その時、二人の前にヘルメット団が再び現れ、今度こそヘルメット団の確保に成功するのだった。"
1225828462 = "眠れる森のメイド"
1332057090 = "カイザーコーポレーションの建物に侵入したは良いものの、職員たちに捕まり監禁されてしまったアカネと先生。二人は職員たちが起動した爆発の衝撃に巻き込まれるが、先生がアカネの体をかばったおかげでアカネは怪我もなく無事に脱出する。"
211557474 = "おはようございます、ご主人様"
3773167144 = "早朝、シャーレの事務所を訪れたアカネが先生を起こそうとするが、困った展開へと発展する。"
1160899660 = "輝く午後を迎えて"
613679375 = "以前の任務を手伝ってくれたプレゼントとして、アカネは先生にお茶を振舞うことに。"
204930277 = "黒い制服"
2456463672 = "マシロが作戦中に破れたスカートのほつれを縫いながら、正義実現委員会の黒い制服について語る。"
1919817649 = "正義とは"
638853668 = "正義についての本を借りてきたマシロは、先生と一緒に正義とは何かについて議論する。"
1461678656 = "狙撃手の試練（１）"
1751577586 = "狙撃能力向上のため、マシロは先生に手伝ってもらい、訓練を行う。訓練としてくすぐりを我慢していたのだが、首元に触れた先生に対しマシロが怒ってしまう。"
3085822654 = "狙撃手の試練（２）"
3501406577 = "狙撃能力向上のため、引き続き訓練を行うマシロと先生。重い弾筒を持って階段を上り下りした先生は、その重さでへとへとになってしまった。"
872429701 = "正義の実現"
4188898275 = "トリニティ総合学園の屋上に、狙撃任務で待機していたマシロ。炎天下で汗を流しながら集中して目標が来るのを待っていたが、実はその目標は昨日捕まえられていたと聞かされ、マシロの努力は水の泡となってしまう。"
534884064 = "煙とバカは高い所が好き"
27311898 = "キヴォトスのとある建物の屋上で、先生は偶然マシロと出会う。先生はマシロと語り合いながら、楽しい時間を過ごすのだった。"
2024630372 = "過去から学ぶ真理"
1135538242 = "トリニティを訪ねた先生は読書中のマシロを見つける。聞けば好きな本を読んでいたらしく、その本というのがことわざや四字熟語の成り立ちについて紹介するものだという。ことわざ等には正義のメッセージが込められていて好きだと語り、それを聞いて先生が興味を示すと、マシロはうれしそうに喜ぶのであった。"
587639145 = "おやつの時間"
555265990 = "梅花園の園児たちに送るはずのメールが、シュンの手違いで先生のもとにも届いた。シュンは梅花園を訪ねて来た先生に謝りつつ、果物を振舞って楽しい時間を過ごす。"
1235064322 = "食事の後は、綺麗に歯磨き"
1212581455 = "先生とシュンが、梅花園の園児たちに歯みがきの大切さについて教えることに。無事に授業を終えたのち、シュンはそのまま歯磨き検査を口実に、先生の口の中を隅々まで観察する。"
1104721180 = "まだそんな歳ではありません！"
2518280333 = "ココナから「もう歳なのだから」という旨のことを言われ、意気消沈したシュンを先生が慰めることに。"
541355867 = "たかいたかーい"
2710406827 = "シュンは偶然、梅花園の園児たちが先生と遊んでいるところを目撃する。園児たちが全員帰った後、シュンは先生に自分とも遊んでほしいと甘えるのだった。"
3562536085 = "プレゼント選び"
4219239495 = "キヴォトスの大型ショッピングモールで、シュンと先生は梅花園の子たちへのプレゼントを選んでいた。しばらく悩んだ末に、大きなケーキを買って帰ることにする。"
2538754249 = "午後過ぎの甘いお昼寝"
546306698 = "仕事で疲れがたまった先生に対し、シュンは梅花園で昼寝をしていくことを提案。昼寝をする先生のそばで、シュンは子守唄を歌いながら、ゆったりとした時間を過ごす。"
3676557931 = "体温調節"
2692432267 = "作戦が終わるや否や、エイミは暑いからとその場ですぐに服を脱ごうとする。先生はエイミにアイスクリームを勧めつつ、服を脱ごうとするエイミを止めた。"
3548321794 = "最新の流行を研究（１）"
1150093050 = "最新の流行についていくために、最近の女子生徒は何を好むのかと先生に聞くエイミ。色々と話し合ってみるものの、二人はこれといった手ごたえを得ることができなかった。"
3558259779 = "最新の流行を研究（２）"
3529527109 = "最新の流行についていくため、エイミと一緒にカラオケを訪れることになった先生。彼女の歌は、想像以上に上手だった。"
2376132403 = "ファッションの完成"
2400059281 = "ショッピングモールのランジェリーショップを訪れたエイミと先生。更衣室に入らずに下着を脱ごうとするエイミを、先生が必死に引き止めるのだった。"
1697884784 = "傷"
1923076069 = "作戦中に傷を負ってしまったエイミのことを、先生が治療することに。"
3878318917 = "熱風"
3297514869 = "ミレニアム近郊の砂漠の異常現象を調査すべく、エイミと一緒に出かける事になった先生。調査の結果、特に問題はなかったものの、二人は暑さに参ってしまう。エイミは、このままでは熱中症になってしまうと言い、とっておきの発明品を取り出し――"
1892946756 = "サヤの研究室へようこそ！"
1855404410 = "錬丹術研究会の部員たちがサヤの怪しい実験を拒んで逃げてしまったため、サヤは先生を呼んで自分の作った新薬を飲むよう勧める。先生がその薬を飲むと全身が黄金色に輝き始め……。"
3516083753 = "不老不死の霊薬"
1288335934 = "ついに不老不死の薬が完成したと言うサヤから、また薬を飲まされる先生。しかしその薬の正体は体から灰色の毛が生える薬であり、変貌した先生の姿を見たサヤはその恐ろしさのあまり逃げ出してしまう。"
3136929583 = "ダイエット薬"
2670545658 = "この前の実験のお礼にと、先生にラーメンをご馳走するサヤ。脂っこい食べ物を平気で平らげるサヤを見て、近くにいたヘルメット団がどうしてそんなに食べられるのかと聞く。サヤはヘルメット団に特製のダイエット薬（？）を渡すが、薬のあまりにも強い副作用で、ヘルメット団は気絶してしまう。"
2005157098 = "チーズ・イン・ザ・トラップ"
993975792 = "サヤと先生は、チーズの模型を使ったボードゲームをプレイすることに。ただのゲームだと理解はしつつ、チーズの模型に目を奪われてしまうサヤは連敗を免れなかった。"
1919898173 = "恋の妙薬"
1899438040 = "サヤは新しい薬、恋の妙薬を先生に試してみようと考える。しかし運んでいる途中に誤って薬瓶が割れてしまい、サヤがその薬の影響を受けてしまう。サヤは妙薬の効果で先生をチーズと錯覚し、先生の腕に噛みついた。"
501439135 = "行方不明のネズ助"
2792815660 = "ある日突然、サヤの実験室からサヤの飼っていたネズミである、ネズ助がいなくなってしまった。サヤは自分が日頃いじめたせいで家出をしたのだと自分を責めるが、実はネズ助は玄武商会で配っているひまわりの種をもらいに行っていただけだった。二人はお互いの友情を再確認しつつ、感激の再会を果たす。"
1851884916 = "運が良い日"
3648098592 = "道端で偶然500円玉を見つけた先生がそれを拾おうとした瞬間、どこからかノドカが現われそれは自分が先に見つけたと主張する。やり取りの中でノドカの貧しいお財布事情を察した先生は、ノドカに高級スイーツを奢ることに。"
2791336820 = "観察日記"
1263129030 = "シャーレの向かい側の建物の屋上で、ノドカが望遠鏡で先生を観察していたところを見つかってしまい、懲戒処分を受けることになった。"
1922924090 = "流星群が見られる場所"
2229103612 = "曇り空のため、今日は流星群を見ることができないのではと落ち込むノドカ。先生はそんなノドカのために、シャーレの屋上は雲よりも高いから、そこで一緒に流星群を見ようと提案する。"
2111847187 = "流星群と願い事"
3938426849 = "ノドカと先生は、シャーレの屋上で流星群を観察しながら、二人で楽しい時間を過ごした。"
389141647 = "雲を探しに"
2169575525 = "地下鉄の駅で偶然ノドカに出会った先生。ノドカは山の中腹の雲を観察するために出かけるところだった。先生は駅のホームまでノドカを見送ることに。"
326397231 = "お手伝いが必要な時は、C&Cへ！"
767045695 = "カリンは任務の途中、ヘルメット団の基地で捕まっていた先生と遭遇。カリンは捕まった先生のことを一瞬情けないと思うものの、その後、機転を利かせてヘルメット団の陰謀を阻止する姿を目にし、先生のことを見直すのだった。"
2895507513 = "勉強は難しい（１）"
2421241791 = "テストで赤点を取ってしまい、追試を受けることになったカリン。カリンは先生に勉強を教えてもらいながら、とんちんかんな会話を繰り返していく。"
3585362705 = "勉強は難しい（２）"
3964994116 = "追試は散々だったものの、シャーレとメイド部での活動が認められ、追加の課題をこなせば良いということになったカリン。課題を解きながら、先生と色々な会話をする。"
2935757546 = "私と先生の関係？"
828985389 = "ミレニアムの屋上で、カリンは先生に友人関係についての相談を持ちかける。"
2617383226 = "メイドカフェ！（１）"
3031156327 = "たまたま立ち寄ったメイドカフェでカリンに出会った先生。カリンはぎこちない態度で先生に接客するものの、結局恥ずかしさに耐えられず大声で叫んでしまう。"
4006315302 = "メイドカフェ！（２）"
2845710536 = "メイドカフェを再び訪れた先生は特別会員証を手に入れるチャンスを得るが、それよりもカリンに足で踏んでほしいと頼む。先生はカリンに足で踏んでもらいながら、愉しい時間を過ごした。"
3512015253 = "彼女の誤解"
2188282003 = "自動販売機の前で落としてしまった小銭を取り出すために下水道に入った先生。そこを通りがかったイオリにヘンタイだと思われてしまう。"
3619712072 = "校庭での休憩"
1611838701 = "先生はゲヘナ学園の石畳で横になって昼寝をしていたところ、またしてもイオリにヘンタイと思われてしまう。"
3380667060 = "秘密の取引"
3253843096 = "先生はブラックマーケットの密輸犯からイオリの小学校卒業アルバムを買おうとしていたところを見つかってしまい、イオリに「ヘンタイ」と罵倒されることに。"
225526158 = "優しい治療"
3928473847 = "ゲヘナ学園の保健室で、風紀委員会の活動中に負傷してしまったイオリを先生が治療することに。"
3130291039 = "先生の誤解"
1881265348 = "先生は住宅街で罠に掛かったイオリを偶然発見し、ここぞとばかりにいつもと逆の立場でからかう。"
4152216310 = "マイスターって呼んで"
1896022794 = "先生に頼まれて、故障したスマホを修理するヒビキ。ついでに自爆機能を搭載させようとする彼女を、先生がどうにか引き止める。"
714863453 = "心に打ち上がる炎"
3818451070 = "新しく作った花火の機械を、ヒビキが先生に披露する。幾つか操作している途中、先生のミスで発射されたミサイルがミレニアムタワーに命中してしまう。"
919844422 = "あなたの心にストライク"
1604766958 = "ヒビキが先生から野球のアドバイスを貰いながら、ピッチングマシンを改造していく。様々な意見を交わした末に、ブーイング機能付きピッチングマシンが誕生した。"
2764647337 = "もしも夢を見られるのなら、あなたと共に一日を"
3837035412 = "ヒビキが先生のために、眠りのサポートをする発明品を用意してくれる。それは、ユーザーを即座に眠りに落とす恐ろしい機械だった。"
1446176968 = "雨が降る日のセンチメンタル"
1724445069 = "図書館で出会った先生とヒビキは、二人一緒に仲良く傘をさして帰ることに。"
3087974166 = "この夜をあなたに！"
571050076 = "ヒビキは先生と共に、ミレニアムへの給電施設の復旧のため修理に奮闘する。夜になって何とか修理を終えたヒビキと先生は、ミレニアムの夜景を眺めながら二人で楽しい時間を過ごす。"
2640531275 = "愛着のかたち"
3599202500 = "修理を依頼した自転車の受け取りのためヒビキのもとを訪ねた先生。改造はしなくていいという先生に対して、愛用のゴーグルを例にそのメリットを説くヒビキ。その途中、いつもならつけている自爆機能がゴーグルにはないことを先生に指摘され、自覚のなかった大切なものにはなくなってほしくないという自身の気持ちに気付かされる。"
2971539326 = "抜き打ち検査"
1641801255 = "その怖い顔立ちのせいか、不審者扱いされて警察に職務質問されていたカヨコのことを、通りかかった先生がかばう。"
3541264622 = "事務所の掃除"
970135422 = "朝早くから便利屋の掃除をするカヨコ。先生も手伝うことにし、二人で一緒に掃除をする。"
110591004 = "ロック・スピリッツ"
1877823555 = "先生は、カヨコから勧められたヘビーメタルバンドの新曲を聞くことに。"
4006123680 = "雨の降る日の路地裏"
2367456929 = "とある雨の日。先生は偶然カヨコと出会い、彼女が子猫の面倒を見ていることを知る。"
3930206688 = "レコード屋"
2993258377 = "休日、レコード屋で偶然出会った先生とカヨコは、お互いに好きな音楽を勧め合いながら楽しい時間を過ごした。"
2727647181 = "朝、メイド、掃除！"
3993761072 = "登校の途中、先生はネルが街路で掃除をしているところを目撃する。見られていたことを恥ずかしがったネルは、先生に他言無用だと釘を刺す。"
3312820670 = "ネルへのお見舞い"
3815418736 = "先生が、風邪を引いたネルのもとを訪ねて看病することに。"
2327048759 = "ネルのお見舞い"
1005194850 = "ネルが、風邪を引いた先生のもとを訪ねて看病することに。"
127779370 = "遅刻大騒動"
853344527 = "ネルに恨みを持つチンピラたちが、ネルを学校に遅刻させて停学にするためにあらゆる画策をするものの、ことごとく失敗してしまう。"
2759482117 = "輝く夜に"
2769268860 = "ネルと先生は、ミレニアムの屋上で夜景を眺めながら楽しい時間を過ごした。"
909021747 = "スカジャンの理由"
1824681443 = "先生はネルに会うべくミレニアムのキャンパスを訪れる。そこには、ネルの派手な格好を見て怖がる生徒たちの姿があった。何故いつもスカジャンを着ているのかとネルに問いかけると、ネルははにかみながらも教えてくれるのだった。"
3523370044 = "すれ違いコミュニケーション"
407255645 = "先生がハスミの立派な羽を褒めるが、それを別の意味に誤解したハスミが恥ずかしがってどこかへ行ってしまう。"
192545007 = "気がつかなかった事実"
4215980516 = "カフェでたくさんのデザートを食べながらダイエットの成果がなかなか出ないと愚痴をこぼすハスミだったが、その理由が正に今自分が食べているおやつであることに気づく。"
1119295837 = "黄昏れの時間"
1473959282 = "ハスミと先生が、公園で夕日を見ながら会話をする。"
926903321 = "ストレスの原因"
4255682442 = "極端なダイエットによってストレスを感じていたハスミのことを、先生が心配する。"
1985523315 = "短いけれど贅沢な"
2415429620 = "下校途中で急な雨に遭ってしまい、ハスミと先生は近くの公園で雨宿りをすることに。"
2309978531 = "正義実現委員会副委員長の手帳"
1411120732 = "ハスミは、1年生のときから現在まで同じ手帳を使い続けていた。そこには正義実現委員会メンバーの名前や連絡先、趣味嗜好に至るまであらゆる情報が記録されており、先生は持ち主の気配りを感じ取る。その中に、先生と同じ誕生日で、趣味も近い者が記録されていたが――ハスミは動揺しつつ、はぐらかすのだった。"
1330831614 = "勤労意欲を高める方法"
3119688622 = "一生懸命働く先生のために、アルがカフェでパフェを注文する。その後出てきたのはカップル専用メニューのパフェで、アルは戸惑いつつも内心喜んでいた。"
1193817835 = "説得の技術"
2312804979 = "アルが先生と一緒に、相手を説得する技術を試すことに。アルは先生の言葉になんて説得されないと言い張るものの、先生の甘い言葉に説得されっぱなしなのであった。"
2860741943 = "真のリーダー"
674363357 = "アルと先生が映画館で、新作の映画を鑑賞することに。映画を見終えて、二人は映画の内容について歓談するのだった。"
3045973073 = "外部経営顧問としての入社提案"
1397280925 = "先生に大人っぽい姿を見せようと強がるアル。しかし便利屋に間違い電話がかかってきて、そのやり取りの末、ハッタリがばれてしまう。"
254794530 = "大切な"
2167138310 = "日頃の感謝を込めて、先生をディナーに招待したアル。楽しい時間を過ごし、いざ、お会計というタイミングで財布を無くしたことに気付いてしまう。それは、便利屋68の皆が社長になった記念にとお金を貯めて買ってくれた大切なものなのだと。アルと共に一晩中探し、ようやく見つけた財布を胸に、2人でラーメンを食べに行くのだった。"
1481568503 = "禁じられた研究"
3240573980 = "ゲヘナ学園の閉鎖された食堂で、美食の研究を行うハルナ。しかしお酒の代わりに入れすぎたアルコールが爆発し、研究は失敗に終わってしまう。"
3007405341 = "孤高の道"
2446232030 = "究極の味を求めて、研究のためにゲヘナ外郭にある茶室を先生と共に訪れたハルナ。しかし彼女が取り出したのはカップラーメンだった。先生とハルナは茶道の作法に則って、全力でカップラーメンを作ることに。"
2279595776 = "怒りの美食家"
3278316917 = "高級レストランでコース料理を味わっていたのだが、料理を含めて色々と気に入らなかったハルナは、レストランを爆破することに。"
3581669111 = "真の美食"
1988565479 = "D.U.の外郭地区で、新しいグルメを求めて歩き回っているハルナに出会った先生。二人は屋台のたい焼きを食べながら楽しく会話をした。"
1695258470 = "新作グッズ！"
1967388246 = "ヒフミは先生に、新しく買ったモモフレンズのグッズを自慢しながら、楽しそうに話すのだった。"
2135676389 = "バッグの秘密"
136068679 = "ヒフミがいつも背負っているペロロのバッグを整理しながら、その中身を先生に見せてくれる。"
2419431461 = "ペロロ様救出作戦"
2058378536 = "ペロロの巨大なぬいぐるみを手に入れるため、ヒフミがゲームセンターでクレーンゲームに挑戦する。ヒフミは何度も失敗してしまうが、代わりに取ってくれた先生がそのぬいぐるみをヒフミへとプレゼントしてくれる。"
915698726 = "お悩み相談"
3951972022 = "個性のない自分の性格について悩んでいたヒフミが、そのことを先生に相談する。"
718610260 = "偶然のおでかけ"
3096365246 = "たまたま放課後に時間ができたヒフミは、先生へ一緒に散歩をしないかと提案する。二人はトリニティのあちこちを歩き回り、楽しい時間を過ごした。"
2433419644 = "ゲリラ握手会"
2731154380 = "キヴォトスの市内で偶然モモフレンズのショーを見ることになったヒフミと先生。その後の握手会で、ヒフミはペロロと握手をする機会を得る。"
567004708 = "大事なのは距離感！"
339869436 = "街で偶然ツルギに出会った先生。しかしツルギは先生が近づくたびに、逃げることを繰り返す。ようやくツルギを捕まえてその理由を聞くと、ツルギは先生の関心を引くために距離を置こうとしていたのだと答える。"
2269971719 = "自撮りの世界"
1992569852 = "トリニティの書類に必要な証明写真を撮らなくてはいけないツルギ。先生がツルギの緊張をほぐすために努力しながら何度も写真を撮るが、ツルギの顔はどうしても歪んでしまう。"
2150949239 = "大人のデート"
3086644114 = "最高級のファインダイニングにツルギを招いた先生。ツルギは自分には似合わない場所だと言いつつ、ガッチガチに緊張してしまう。"
3477361952 = "特別な箱"
1045732016 = "映画館の近くでツルギと出会った先生。聞けば、映画のパンフレットと半券を集めるのが趣味なのだという。彼女の部屋でコレクションを見せてもらった先生は、今度一緒に映画を見に行こうとツルギと約束を交わすのだった。"
608406794 = "深夜の会議"
799499931 = "風紀委員会の仕事を処理するため、深夜に先生を呼び出すヒナ。いつも通り、時折軽薄な先生のことをどこか信頼しきれない気持ちもありつつ、仕事のことは真剣に手伝ってくれる先生に対し感謝の気持ちを感じる。"
1206204887 = "堂々たる理由"
3038001428 = "深夜に人けのないところへと、再び先生を呼び出したヒナ。こんなにこっそり会ってるとかえって怪しく見えるのではという先生の言葉に、ヒナは悩んでしまう。"
3916122859 = "大人とか子供とか"
76760892 = "忙しい中でどうにか時間を作って、ゲヘナ郊外の小さなショッピングモールを訪れたヒナと先生。色々な場所を回るもののいまいちピンと来ないヒナだったが、先生からの言葉もあり、最終的には楽しい時間を過ごす。"
1437834886 = "暖かい陽射し"
770595097 = "陽射しが気持ちいいからと先生に呼び出され、川沿いの道で日向ぼっこをするヒナ。足の間に座ったヒナの頭からは良い香りがしており、匂いを嗅がれていることに気づいたヒナが恥ずかしがって怒り出してしまう。"
484158690 = "どこか神秘的な夜"
2689536441 = "真夜中の学園で、ヒナの仕事を手伝う先生。連日の激務で彼女が疲れているのを見て、先生は彼女が気持ちよく眠れるように頭を撫でる。"
3033553461 = "左腕にのしかかる腕章"
777765850 = "休日、ヒナは先生と一緒に時間を過ごすことになる。些細だが楽しいイベントを楽しみながら、ヒナは風紀委員長の腕章に込められた思いを先生に語るのであった。"
1112893421 = "誠実さのご褒美"
3973431314 = "先生は市内のスイーツ店に立ち寄り、そこでアルバイトをしているジュンコに出会う。一生懸命働くジュンコのために、先生は購入したスイーツをそのまま彼女にプレゼントした。"
2643568139 = "偽料理"
1204261948 = "ジュンコが先生と一緒に、インターネットで見つけた怪しいレシピを試す。しかしそのほとんどが変な味のするものばかりで、結局お金の無駄遣いになってしまう。"
2129465828 = "貧困な美食会"
3571878226 = "せっかく美味しいものを食べるはずだったのに当てが外れてしまったジュンコ。そのためにお昼を控えめにしていたせいでお腹を空かせた彼女を不憫に思い、先生がインスタントラーメンを手渡す。ジュンコはインスタントラーメンなんてと口にするが、一口食べるとその魅力にハマってしまうのだった。"
1991574778 = "胃の鍛錬"
974989734 = "胃袋を広げる訓練をしようと、乾燥昆布をたくさん食べるジュンコだったが、胃の中で膨らむ昆布に耐え切れず全て戻してしまう。"
3866442346 = "孤独じゃないグルメ"
2641616716 = "山海経高級中学校の近くにある中華街で美味しいものをいっぱい食べたジュンコと先生。小休止に近くのカフェで飲み物を頼みつつ、楽しくお話をする。"
447359660 = "努力の結晶"
3325660189 = "ジュンコは先生に、お手製の「グルメ手帳」が完成したことを嬉しそうに教えてくれる。それはジュンコ自身のための、芝タウンの美味しいお店をまとめた手帳だった。二人はそのうちの一つに赴き、美食の価値観について話しながら穏やかな一時を過ごすのだった。"
998099366 = "買い出しに行きませんか？"
1675775908 = "ゲヘナ学園の食堂で使う食材を買うために、先生はフウカと一緒に大型スーパーへ買い物に行く。"
2342057365 = "フウカさんの今日の食卓"
3722225258 = "毎日忙しいせいで頻繁に食事を抜く先生のために、フウカが料理を作ってもてなしてくれることに。フウカが出すごちそうを堪能する先生だったが、あまりにも食べすぎてしまったため胃薬に手を伸ばした。"
3824807776 = "もう一度買い出しに行きましょう！"
1034716395 = "市場で食材を選んでいたフウカ。店員との会話の中で、先生と夫婦だと思われてしまい、つい頬を赤らめる。"
1043403340 = "今日は先生だけのための食卓"
370580278 = "過労で倒れてしまった先生のために、フウカがシャーレで料理を作ることに。"
2861325865 = "給食部部長は頑張りたい！"
958810626 = "料理酒の味見だけで酔ってしまったフウカ。先生に対し、いつも給食部に寄せられる苦情について酔っ払いのような口調で文句を口にする。"
2503992938 = "トレーナー参上！"
2844960890 = "自分のトレーニング計画について、先生に助言を求めるスミレ。無理な日程でトレーニングをしようとするスミレのために、先生は彼女の専属トレーナーとしての役割を引き受ける。"
2757435988 = "トレーナーと共に"
1543696324 = "筋トレに必要なプロテインやサプリメントを購入するため、スミレと一緒に市内に出かけることに。そのスミレは時間さえあれば人目も気にせず筋トレを始めてしまい……。"
2129718510 = "トレーナーも一緒に"
3033616045 = "スミレはこれまでのトレーニング経験をもとに、先生にも筋トレを勧める。急なトレーニングで苦しむ先生を労いつつ、スミレの表情はとても楽しそうだった。"
789432916 = "デート"
2467696253 = "週末、スミレは先生とのデートのため市内に出かける。今日だけは運動を忘れて美味しいものを自由に食べようと宣言するスミレだったが、いつもの癖でスイーツの成分表を確認してしまう。"
4027920287 = "トレーナーの限界"
969196443 = "スミレと一緒にジョギングをすることになった先生。いつもと違って少し疲れているように見えるスミレの姿に先生が心配すると、スミレは今までつけていた重い砂袋を見せてきて……代わりに先生が砂袋をつけてみるもあまりの重さに断念するのだった。"
1231386408 = "消費は計画的に"
1523855793 = "報告書を渡すためにシャーレの執務室へ立ち寄ったユウカが、先生のだらしない生活習慣を知ってしまう。ユウカは小言を並べながらも、なんだかんだで先生の領収証の整理を手伝ってあげるのだった。"
1926315910 = "計算できない価値"
3885120659 = "ユウカはミレニアムに借金のある事業家から担保として受け取った高価な絵を前に悩んでいた。彼女はそのらくがきのような抽象画の価値を何とか読み取ろうと四苦八苦していたが、先生の指摘でその抽象画が全く価値のない真っ赤な偽物であることが判明する。"
3246715250 = "人間計算機"
36783089 = "チンピラたちから武器などの備品を回収した先生だったが、それらの単位系が現在のシャーレのものと異なっていたために困り果てていた。そのことを知ったユウカはその計算能力を発揮し、先生を手伝うのだった。"
540132105 = "寝坊"
1727423292 = "ユウカは夜遅くまで生徒会の仕事をした翌日、シャーレの当番に遅刻してしまう。ユウカは以前の約束に言及しながら、罰を受けないとと主張するが、先生は疲れていたユウカのために昼寝ができるように配慮するのだった。"
1211884829 = "ポーカーフェイス"
3001919061 = "ポーカーをすることになったユウカと先生。ユウカは確率を計算しながらゲームを進めるが、なぜかことごとく連敗してしまう。ゲームを終えて意気消沈のまま片付けるユウカだったが、片付けの途中に先生がイカサマをしていたことに気が付いて声を荒らげるのだった。"
1436490456 = "暗算の女王"
2237624638 = "最近、電卓に頼りきりになってしまっている事を不安に思ったユウカと共に暗算の特訓をすることになった先生。ユウカの出してくる問題を自信満々に答えるのだった。"
1186793633 = "アヤネの趣味"
3936794888 = "とある休日。アヤネはアビドス高等学校へ先生を呼び、古い本の鑑定をお願いする。"
1069713218 = "走れアヤネ"
3843866508 = "偶然にもアビドス校内で大量の鉄を見つけたアヤネは、いつも取引をしている業者にそのまま普通の値段で売ってしまう。しかし後からそれが普通の鉄ではなく高価な鉄であることが判明し、アヤネは走って業者のトラックを追いかけることに。"
247517590 = "アヤネの悲惨な修理劇"
1735248341 = "壊れた学校の施設を修理するため、アヤネと先生はアビドス高等学校のあちこちを回る。様々なトラブルがありつつも、二人は水道施設を無事修理することができた。"
3044534023 = "砂漠に咲く花"
4064366271 = "その日は書類地獄だったものの、当番に来たアヤネのおかげで予定より早く片づいた。先生と一緒にゆっくりとした休憩時間を過ごしながら、アヤネは大切にしているヘアピンへの思い入れと、将来の希望について語るのだった。"
3375124759 = "今日も頑張ってうとうと修行"
3209149419 = "修行のお手本を見せてくれるとのことで、ツバキに会いに来た先生。約束の場所に行ってみると、ツバキは眠ったまま様々な奇行を見せて人々を驚かせていた。"
462720006 = "ツバキの修行法：道具編"
3217352150 = "ツバキから「愛用していた枕（修行道具）が壊れてしまった」との連絡が入り、代わりの枕を買うため二人は買い物に出かける。色々と見て回るもののピンとくる枕を見つけられないまま、最後には先生の膝枕を選ぶのだった。"
2496334832 = "ツバキの修行法：実践編"
2280120755 = "先生に修行法という名の睡眠法を伝授するツバキ。先生が目を閉じている間にその顔をじっと見つめていたツバキだったが、それが先生にバレてしまい恥ずかしがりながらもいじけてしまう。"
1683959468 = "あなたとの修行にぴったりの"
2637987650 = "ツバキと先生は修行という名目で、茂みの中でふたりで昼寝をするのだった。"
3727448249 = "小悪魔は遊ぶのがお好き"
2632081395 = "シャーレに来たムツキは、仕事中の先生に対して遊んでほしいと駄々をこねる。説得されてしまった先生はムツキと「心拍数が上がると電気ショックが発動するブレスレット」で遊ぶことに。"
630673951 = "人には言えない小悪魔の秘密"
3694200112 = "ムツキに招待されて、便利屋を訪れた先生。先生はムツキのカバンの中身が気になるものの、最後までその実態は判明しなかった。"
3654338495 = "小悪魔の趣味"
923060075 = "街をパトロールしていた先生は偶然ムツキを見付け、彼女の後を追ってブラックマーケットへ。先生と出会ったムツキは「趣味の買い物で来た」と言い、先生を爆弾専門店へと連れて行った。"
2198801559 = "誰かからの特別な依頼"
236148924 = "謎の人物からの依頼を達成するため、ムツキに付き合うことになった先生。二人は依頼書通りにことを進めるが、その内容はデートのようなイベントがほとんど。その後、楽しそうなムツキに付き合っていく中で、偶然その依頼人がムツキであり自作自演だったことが判明する。正体がバレてしまったムツキは微かに悔しがる言動を見せつつも、先生と遊べて楽しかったと上機嫌で帰っていくのだった。"
1512221497 = "ハッカーのイメージ"
276239373 = "新作映画を見に行ったハレだったが、映画の中のハッカーが悪意に満ちた描かれ方をしていたと不満そうな様子。仕返しとばかりにその映画の制作会社のホームページをハッキングしようとするハレだったが、映画の中のハッカーと同じでは、と先生に指摘されてしまう。"
775079157 = "エナドリ中毒"
2483969389 = "先生の言葉を受けて、常飲していたエナジードリンク断ちを決意したハレ。しかし何日も経たない間に中毒症状に苛まされ、再びエナジードリンクを飲み始めてしまうのだった。"
363645391 = "ネットカフェにようこそ"
1554368360 = "新作のグラフィックボードを買いに出かけた先で、夕立にあう先生とハレ。二人は雨宿りのためにネットカフェに入ることに。ハレはネットカフェの様々な施設を、物珍しそうな目で見ていた。"
3961304199 = "裏切りの機械"
1946980109 = "ハレは新たに改造したドローンの性能を先生の前で実演してみせる。しかしフィットネスモードのテスト中、ドローンが暴走してしまいハレに過酷な運動を強要。ドローンには強制実行のため電気ショック機能も付いており、ハレはぐったりするほど走らされてしまうのだった。"
340540264 = "裏切りの機械（２）"
3000054060 = "ある日、ハレから唐突に自撮りが送られてくる。不思議に思った先生がハレに問いかけると、その写真はハレではなく、人工知能ドローンが勝手に送信したものだった。ドローンに腹を立てたハレは、ドローンを解体し始めて――"
4201884713 = "ペースメーカー"
2638532609 = "アカリは商店街の大食い大会に向けて、先生にペースメーカーとして練習を手伝ってほしいと頼む。しかしアカリの常軌を逸したスピードに付き合いきれず、先生はギブアップしてしまうのだった。"
2932734876 = "ニンニク抜きだなんて"
3327817711 = "ラーメンを食べた後のニンニク臭が気になってしまったアカリ。色々と考えてみたあげく、同じ香りをかぎ続ければ認識が出来なくなるという性質を利用し、先生に様々なニンニク料理を無理矢理食べさせようとする。"
940784146 = "出禁"
2345252510 = "大食いとして広く知られてしまったため、食べ放題のお店に次々と入店を断られてしまったアカリ。偶然出会った先生はアカリに回転寿司ならと奢ることにするが、その量は先生の予想を遥かに超えており、財布がピンチに。"
929421191 = "美食家の矜持"
1967999950 = "中華料理店の麻婆豆腐チャレンジに挑んだアカリは、チャレンジを成功させないために店員が大量の香辛料をかけていることに気付く。アカリは食べ物を粗末に扱うお店に対し怒りを覚え、大量に麻婆豆腐を食べ続けることで懲らしめるのだった。"
3792410708 = "すっごく美味しくなる方法"
147735400 = "アスリート選手の自伝を読んだイズミは、そこに書かれていた通りのハードな運動を先生と一緒に試みる。しかし当然ながら、イズミが思っていたように食べ物の味が劇的に変わったりすることは無くガッカリするのだった。"
2981660607 = "美味しいプリン"
276818574 = "フェスに出店している特製プリンを食べるために行列に並ぶイズミと先生。二人は遅れてやってきた様々な美食家たちの甘い誘惑を断りながら何とかプリンを購入することに成功するが、それは「ウナギゼリープリン」というかなり変わった代物だった。"
2884713095 = "ついつい"
995676787 = "新しいラーメン屋さんに向かう途中、お腹を空かせた野良猫たちに遭遇した先生とイズミ。先生は猫たちに猫用のおやつを差し出すが、その匂いに釣られたイズミがおやつを横取りして食べてしまう。"
2892669052 = "ホットドッグデー"
3208438623 = "先生に見せたいものがあると呼び出したイズミ。それはホットドックのサンプルだった。先生がサンプルのクオリティに感心しているうちに、カラスがサンプルを奪ってしまい――"
2135935597 = "大人の秘密"
4254451472 = "コタマは先生の秘密を知るため、シャーレに盗聴器を設置しようあれこれ試みるが、ことごとく失敗してしまう。どうしてそこまでと聞いてみると、コタマは「雲の上のように見えてしまう先生と、もっと自然に話したくて」と答える。そんなコタマに、先生は内緒で自分の弱点を教えてあげるのだった。"
533037626 = "メリーさんの電波"
194076815 = "ある日の夜。先生はシャーレの居住区で正体不明の声を耳にする。コタマに分析してもらった結果、その声は混線したラジオの音だったことが判明。ほっとする先生とは対照的に、コタマは本当のお化けではなかったことにややガッカリするのだった。"
3144808590 = "言えないこと"
1236053719 = "コタマはがいつものように電話を盗聴していると、先生が怪しい業者と不穏な会話をしているのを聞いてしまう。コタマは先生が犯罪に巻込まれているのではと心配するが、その電話で先生が注文したのはただの梅干しだった。"
666630201 = "まっしろで透き通るような"
1213415440 = "レコード屋で偶然コタマを見つけた先生。目を閉じてなにかの視聴をしているコタマに、何を聞いていたかを問い掛けると、環境音を聞いていたのだと告げる。そうして、彼女は環境音について楽しそうに語るのだった。"
4062519371 = "職人魂"
2032324318 = "先生のために、3Dプリンターで新しいペン立てを作ることになったウタハ。しかしなかなかウタハの御眼鏡に適うものを作ることができない。妥協を知らない職人魂を前に、「もうそれで大丈夫だから、そろそろ欲しいな……」思うものの、強くは言い出せない先生であった。"
1586945368 = "弘法筆を択ばず？"
1796399232 = "シャーレに置いておくための新しい工具を買いに来たウタハと先生。ウタハは道具の価値というものについて熱く語り、きちんとした高級な工具セットを購入することをお勧めする。"
945629632 = "完璧なアニマロイド"
3644826021 = "ウタハはシャーレに迷い込んだ子犬のことを最先端のアニマロイドだと勘違いし、自分の技術の至らなさに打ちひしがれるのだった。"
2115816456 = "見せられないもの"
792271785 = "壊れた「雷ちゃん」を修理するため、シャーレの空き倉庫を借りたウタハ。ウタハは修理で汚れた姿を見られることを恥ずかしく思い、遠回しに先生を遠ざけようとするが、なんだかんだで最終的には二人で作業をすることになる。"
1405659911 = "マイスターの勲章"
2353410857 = "商店街に新しくオープンしたネイルショップを見かけたウタハと先生。先生の勧めもあって爪の手入れをしてもらったウタハはその技術に感心する。先生から頻繁に通ったらと言われるものの、ウタハは「油で汚れた普段の指も、それはそれでマイスターの勲章だから」と返し、今回は記念に小指だけネイルをしてもらうことにする。"
3924052595 = "全てが入れ替わっても"
3200520496 = "ウタハに誘われて、彼女がよく行く工具専門店を訪れたウタハと先生。そうして、古くなった工具を交換し、これが自分用にカスタマイズし長年愛用してきた「マイスター工具セット」なのだと告げる。交換し続けているため、最初から使ってきたものは何一つなくとも、使い手が同じであれば本質は同じなのだと嬉しそうに語るのだった。"
4046207094 = "雲の香り"
4105126090 = "「雲を探したい」と言うチセと共に、商店街で雲を追う先生。二人でしばらくの間、色々な雲を観察しては追いかけていくが、最後までチセの言う「雲」は見付からず、代わりに雲によく似た綿飴を買って食べるのだった。"
1745027801 = "陰陽部のアイドル"
1633057737 = "チセと先生は俳句集を買いに書店に向かう途中、チセのファンたちと出会う。すごい勢いのファンたちを何とかかわそうとする先生だったが、当のチセはどこ吹く風なのだった。"
1120186993 = "月夜　作句　特別な"
576363469 = "チセは公民館に展示する俳句を作るために、先生と一緒に市内を回って着想を得ようとする。なかなか腑に落ちないチセだったが、先生との楽しい一日を振り返りながら心を込めた俳句を詠むことに成功する。"
41249476 = "風が来る音"
2219822065 = "暑い夏の日、チセは風が来る音を聞かせてあげると言い先生を呼ぶ。床で横になって耳を済ませると、本当に澄んだ風の音が聞こえてくるのであった。"
68609484 = "痛くない注射？"
1238741882 = "ハナエは注射を打つことに慣れようと、先生に注射の練習に付き合ってほしいとお願いする。しかし間違った本からコツを学んでしまったせいで、先生の腕を大変なことにしてしまう。"
3359142014 = "不眠症"
704371455 = "不眠症で苦しんでいる先生のために、昼寝場所を用意したハナエ。ハナエは先生が眠れるように力業で気絶させようとするが、先生の説得を受けて諦め、代わりにハーブティーを入れることにする。"
468644606 = "ラジオ体操"
2086188010 = "とある休日の朝、シャーレ居住区に訪ねて来たハナエが寝ている先生を叩き起こし、一緒にラジオ体操をする。"
1129161301 = "トリニティ式の外科手術"
1115265687 = "救護騎士団の倉庫を整理している途中、脚を怪我してしまった先生に対して「今すぐ脚を切断しましょう！」と言い出すハナエ。なんとか先生の説得が通じ、消毒液と絆創膏を持ってきたハナエに手当てをしてもらうことに。"
2874947170 = "アサガオの観察日記"
86110047 = "早朝、先生はシャーレ居住区の野外テラスでアサガオの世話をするハナエと出会い、二人で楽しく話をした。"
244804059 = "トリニティの天使"
3281711713 = "先生は偶然、公園で子供たちのお世話をしていたセリナを見かける。セリナはその場面を見られてしまったことを恥ずかしがりつつ、仕事で忙しい先生のことを心配する。"
1246494305 = "深夜に舞い降りた天使"
1349449479 = "シャーレで遅くまで仕事をしている先生のもとへセリナが訪れ、先生の手伝いをしてくれることに。"
3235653381 = "いつでもどこでもセリナも"
1669978221 = "突然の停電で怪我をした先生のもとにセリナが訪れて手当てをしてくれた。先生は怪我をする度におかしいくらいの早さでセリナが現れることを不思議に思うが、セリナは恥ずかしがりながら誤魔化すのだった。"
1885780666 = "その手のひらに"
2900260446 = "先生が何かで困ったり苦しむたびに、どこからかふと駆けつけてくれるセリナ。先生はそんな彼女のためにお返しをしようと、ちょっとした演技をしてセリナのことを呼ぶ。急にもてなされて世話を焼いてもらう立場になったセリナは、急なことに戸惑いつつも、それを心から喜んでくれるのだった。"
2227241074 = "私の説明を聞いてください！"
2381492343 = "何でも説明したがり屋のコトリを避けるミレニアムの生徒たち。自分のおしゃべりな部分を心配するコトリに対し、先生はそういうところも可愛いと思うよと言うが、いざコトリが話しはじめると生徒たちと一緒に先生も逃げてしまうのだった。"
1879189076 = "私に尋ねてくれたのは正解です！"
3040174105 = "コトリが話し始めると生徒たちが一目散に逃げてしまうことが繰り返されたせいか、コトリがちょっと不機嫌な様子。そのことに気づいた先生がコトリに説明してほしいと頼み、思う存分話したコトリは元気を取り戻す。"
587880302 = "正解は、先生のことです！"
4162760118 = "他の生徒から「女心」について質問を受けて悩んでいたコトリ。先生と話す中でそれが「先生に向けている自分の気持ち」と似ていることに気付き、恥ずかしくて逃げ出してしまう。"
3299613520 = "準備は万全だったのに"
3113492896 = "思いがけず、先生から質問を受けることになったコトリ。どんな質問が来るかと待ち構えていたコトリだったが、その内容が自分に関することだと気づき、予想外の事態に慌てふためいてしまう。"
3925290057 = "変わった形のメガネ"
1405678383 = "メガネを修理に出したというコトリを心配してミレニアムを訪ねた先生。会いに行くと、無事メガネも直って問題ないと言う。ふと、コトリのメガネの不思議な形について先生が訪ねると、彼女の説明好きという性質に関する、実用的な理由があることをしっかりと「説明」されるのだった。"
2128994052 = "譲れない！"
398808592 = "限定のイベント品を買うため、先生と一緒にカフェに来たヨシミ。イベント品の価格が予想以上に高くて躊躇するヨシミを見て、先生は代わりにそれを買ってあげるのだった。"
2140540293 = "マカロンチャレンジ"
2645271508 = "マカロン大食い大会に参加したヨシミと先生。甘いマカロンに当初は苦戦していたものの、ふとしたタイミングで間違えて先生の上に座ってしまったヨシミが恥ずかしさを隠すためにマカロンを一瞬で食べ尽くし、二人は優勝を果たす。"
188196592 = "スタディーinカフェ"
3493185503 = "テスト勉強のためにカフェを訪れた先生とヨシミ。二人は色々なスイーツを食べながら、着々と勉強を進めていく。"
2147149955 = "その輝きの、すぐそばに"
3715343759 = "ヨシミが欲しがっていたスイーツを買って、こっそり下駄箱に入れようとしていた先生。しかしその場面を当のヨシミに見られてしまい、何をしていたのかと詰め寄られてしまう。何とかして誤解を解き、ヨシミに連れられてとあるカフェに向かいながら、いつものようにじゃれ合うのだった。"
844314736 = "スイーツ・ハンター"
2266129221 = "カフェの前に到着した先生は、ヨシミからプレゼントされたスイーツをすぐさま食べようとする。ヨシミは先生に、中身を開けたらはく奪すると宣言する。ヨシミの中に眠っていた「スイーツ・ハンター」が目を覚ます間一髪の状況が近づいてきて……。"
2044734478 = "本好きの少女"
906920889 = "図書館で司書をしているシミコの元へ訪れる先生。普通の大人しい文学少女かと思いきや、シミコには意外な側面があるのだった。"
341307521 = "二人の秘密"
3243951534 = "閉館時間をとっくに超えた真夜中の図書館。シミコにとってはようやくゆっくりと本が読める時間。先生はシミコと二人で、ゆったりした夜の時間を過ごす。"
1860734903 = "宝物を求めて"
2870193424 = "図書館のあちこちにあるという未登録の本。その中にはもしかしたら、今まで見たこともなかった新しい本があるかもしれないと期待するシミコ。先生もその宝探しを手伝うものの、その果てにシミコが見つけたのは想像とは全く異なるものだった。"
4293465345 = "何度も何度も"
499400354 = "入手困難な本を求めて図書館に向かった先生を、シミコは嬉しそうに迎えてくれる。一緒に本を探しながら、今ではほとんどの本が電子化されてしまっているものの、こうやって紙でしか残っていない貴重な本を求めて図書館にやってくる人がいてくれるのだと語るシミコ。そういった人のために自分は司書をやっているんだと、彼女は目元を緩めて微笑むのだった。"
1596075158 = "お昼代わりのスイーツ"
4257306641 = "アイリは忙しい先生のために、カフェの新作スイーツであるカップケーキをたくさん購入してきて、プレゼントをすることに。"
2315835548 = "糖分摂取"
3621133641 = "アイリは忙しい先生のためにチョコレートのスイーツをたくさん注文し、二人で糖分の摂取に勤しむのだった。"
1960740624 = "アイリの悩み"
2777060658 = "自身の消極的な性格に思い悩むアイリは、先生に相談をすることに。"
408399339 = "ちょっとしたデート"
2272549639 = "激務を乗り越えて気分転換のために外に出た先生は、散歩道で偶然アイリと出会う。手持ちのスイーツを何も持っていないことに意気消沈してしまったアイリのために、先生はアイスクリームを買ってあげることに。二人は川辺でアイスクリームを食べながら、楽しい時間を過ごした。"
1782328244 = "誰かがやるべきこと"
3366205849 = "先生がゲヘナ学園を訪れると、そこには一人で大量の書類を運ぼうとしているチナツが。自分の担当ではないはずなのに「誰かがやらなくてはいけないから」と口にするチナツの手助けをしつつ、二人で様々な会話をする。"
2999062443 = "何でもない一日"
2192314265 = "久しぶりに委員会の仕事もない休日を、先生と共に過ごすチナツ。特に変わったことのない普通の休日を過ごすものの、委員会での毎日が慌ただしいチナツにとって、そんな普通の休日はかけがえのないものなのであった。"
43408834 = "疲れた時には"
2645077696 = "過労で倒れてしまった先生。救護担当のチナツはそんな先生に小言を言いつつも、遠慮がちにとある提案を持ちかける。"
476448061 = "思いがけない"
184627506 = "先生はチナツの書類整理を手伝うため、チナツがいる風紀委員会室を訪問することに。"
3121964723 = "私にできること"
4246066356 = "とある休日。先生は、非番でありながら救急医学部の手伝いへと向かうチナツと遭遇する。過去、チナツは救急医学部に所属しており、愛用のカバンは当時から愛用していたものなのだ。風紀委員会にも医療要員が必要と感じ、「誰かがやるべきこと」だと移籍したチナツの責任感を改めて知った先生は、共に救急医学部へと同行する。"
1548146425 = "送信先間違い"
877809924 = "間違えて先生にメッセージを送ってしまったハルカ。先生を呼びだしてしまったことにひたすら謝罪するハルカと話す中で先生は爆弾のことを知り、結果的に大きな事件を未然に防ぐことになった。"
1671304279 = "コミュニケーション上の間違い"
3020050882 = "以前のお返しにと、先生に感謝の気持ちを表そうとするハルカ。ハルカがくれた雑草のプレゼントに先生は喜ぶものの、実は受け取ったのは雑草だけではなかった。"
633551809 = "間違っていないもの"
3896770278 = "今度こそ先生にちゃんとしたプレゼントを贈ろうとするハルカ。しかしその時、窃盗事件のニュース速報が流れて……？"
3551997534 = "間違った推測"
3632616866 = "ハルカから心配になる内容のモモトークが送られてきて、ハルカがいるであろう森の奥へと急ぐ先生。最終的には誤解だったことが判明しつつ、最終的には逆に、先生がハルカに助けてもらうことになるのだった。"
3415164555 = "間違えて"
3460878926 = "偶然が重なって、ハルカの庭園へ訪れることになった先生。他には誰も来たことが無いというその場所で、二人は秘密を共有するのだった。"
3547031295 = "一番大事な調味料"
151158527 = "料理に必要な「愛情」の適量を知るために、先生を招いて料理を振舞うジュリ。料理を口にする度に意識が飛んだりと危ない目に遭う先生だったが、それでもジュリのために全ての料理を食べきる覚悟を決める。"
2010079435 = "彼女の料理"
1410164640 = "どうして毎回失敗してしまうのかが気になり、先生はジュリが料理をする様子を横で見ることに。料理を作っていく過程で、ジュリの規格外の方法論や謎の力（？）が徐々に明らかにされていく。"
2441506309 = "克服したい気持ち"
1176188569 = "どうしてこんなに失敗してしまうのか、ジュリと先生はあらためて原因を探ることに。危ない手法を使わないようにしながら、色々と条件を変えて試してみるものの、どういうわけかやはり何をしても失敗してしまう。そんな状況にジュリは諦めてしまいそうになるものの先生の言葉で持ち直し、何度も挑戦を続けていくのだった。"
3780570582 = "未熟な私にできること"
2113145817 = "ジュリの招待でゲヘナの学生食堂を訪れた先生。ジュリは両手いっぱいに準備した農具を持ち、給食部で作っている畑に先生を案内する。まだ料理の技量は未熟なものの、一生懸命食材を育て、人々に喜びを伝えたいのだと語るジュリ。その姿に胸を打たれた先生は、一緒に農作業を手伝うのだった。"
294424124 = "マイペースな彼女"
3761374176 = "任務をこなさなくてはいけないはずなのに、どうしてかカフェで先生とデザートを食べたがるアスナ。好き勝手に振舞っているように見えた彼女だったが、なんだかんだで結局任務も達成してしまう。"
2056547858 = "尾行デートは偶然に"
714563164 = "またしてもアスナから突然の呼び出しを受ける先生。ただ二人で遊びまわっていただけなのだが、裏ではまたしても何かが上手く解決された様子。"
658609856 = "メイドインサプライズ"
2779044677 = "感謝のお礼にご奉仕を、といきなりシャーレを訪ねてきたアスナ。いつもの偶然なのか狙っているのか分からない能力を見せるアスナだったが、最後には珍しい一面を見せる。"
1365513912 = "壊れたアスナ"
2538101858 = "なんだか様子がおかしいアスナのモモトークを受け、心配で探しに行った先生は公園でぼんやりとしているアスナを見つける。本人曰く、暇な時間が続くと時折こうして集中力が鈍ることがあるのだとか。足取りも覚束ないアスナをなんとか寮に連れ帰る途中、階段を踏み外して落ちてしまい――先生が咄嗟にアスナの下敷きになると、彼女はいつもの調子を取り戻したのだった。"
3812863199 = "幸運のお守り"
3890514637 = "アスナに呼ばれて先生が現場を訪れると、そこでは激戦が繰り広げられていた。難なく鎮圧するアスナだったものの、大切にしていたリボンをいつの間にか失くしてしまっていることに気づく。幸い無事に見つかった青いリボンを見せながら、それが自分にとって幸運の象徴だと語るアスナ。改めて、失くさないようにこれからも大事にしていくと笑うのだった。"
998617790 = "任侠道の生徒"
1113084635 = "任侠に憧れる少女、フィーナと出会う先生。色々と勘違いしているようにも見えるが、彼女は彼女なりに「仁義」を持っているようだった。"
1867792173 = "大事なのは中身"
2170262034 = "任侠映画の主人公たちの真似をしたがるフィーナ。しかしその映画の主人公の多くが犬や猫だったため、服のサイズが合わずに断念。落ち込むフィーナのことを先生が慰めるのだった。"
3908561949 = "終わらない夜"
1780086198 = "フィーナはチケットを用意し、映画のリレー上映に先生を招待する。それぞれの映画自体は素晴らしかったものの、同じジャンルの映画をあまりにも長い時間見せられた先生は、途中で気を失ってしまう。"
2367962991 = "こんな時の"
462143440 = "とある料理屋に呼び出された先生。そこには居住まいを正したフィーナが、先生と特別な儀式を行うのだと盃を差し出していた。未成年だからお酒はダメだけど、と笑いながら、フィーナと先生はお茶で盃を交わすのだった。"
3128096708 = "トリニティの自警団"
192851048 = "不良生徒に絡まれた先生の窮地を救ってくれた自警団のスズミ。先生はシャーレまでの帰路をスズミにエスコートしてもらうことにする。"
1108192908 = "目が眩むほどに輝いて"
2489237266 = "スズミに護衛してもらいながら目的地へと向かう先生。先生のことを無事にエスコートしようと思うあまりに緊張してしまったスズミは、閃光弾を乱発。その後、落ち着きを取り戻したスズミと共に無事目的地に到着するものの、先生から護衛は口実でただ一緒に歩きたかっただけと言われ、スズミはさらに動揺する。"
813863657 = "閃光弾万能説"
4144458217 = "誰からも強制されることなく自らの意志で、自警団としてトリニティの治安を守るスズミ。彼女が良く使う閃光弾は、彼女なりの矜持と優しさの象徴であることが判明する。"
743591040 = "輝きを追いかけて"
1173255493 = "閑静な遊園地に先生を招待したスズミ。パトロールの最後に訪れるこの場所からよく星空を見上げているのだとか。その星も、もっと高いところから見たらよく見えるのではないかと思い、一緒に観覧車に乗りたいのだと告げる。そうして、スズミと二人で夜空の星明かりを楽しむのだった。"
1939284311 = "大切なパートナー"
2776112655 = "トリニティを訪れた先生はスズミと会うことに。やってきたスズミは慌ててヘッドホンを外し、不真面目な生徒に見えていないかと心配するものの、「いつも頑張っていることを知っている」という先生の言葉に笑顔をみせてくれるのだった。"
1950563989 = "そしてイズナは尾行する"
381151088 = "何故か先生のことを尾行しているイズナ。その理由を聞いてみたところ、護衛のためだと言う。密かに尾行をするのはその人にとって迷惑になるかもしれないと伝えたところ、シュンとしてしまうイズナだったが、そのまま先生にご飯に誘われてすぐに元気を取り戻すのだった。"
1340418237 = "そしてイズナは護衛する"
576267045 = "前回のことを反省し、今度は堂々と宣言した上で先生の行く先々についてくるイズナ。主君のことを守ることができて（？）嬉しそうなイズナに対して、やめてほしいとは言い出せない先生なのであった。"
2996582308 = "そしてイズナは好きになる"
2758300906 = "イズナが好きな忍者の時代劇を一緒に見るため、先生はイズナの家を訪れる。その内容は想像以上に面白く、先生から「イズナが忍者のことを好きな気持ちが少し分かったかも」と言われて、イズナは大喜びするのだった。"
2279236806 = "一緒にいられるこの今を"
3688245564 = "修行の一環として忍者について見識を深めるため、街中を巡るイズナと先生。色々な忍者がらみのお店を回りながら、「今日のことは一生の思い出になる」と顔をほころばせるイズナであった。"
224455677 = "百夜堂の看板娘！"
2241375795 = "先生を招待し、看板娘として「ドジっ子」な接客をするシズコ。しかし素なのかわざとなのか、天然な回答をする先生の反応にシズコは戸惑ってしまう。「もっと乗っかってください！」と詰め寄るシズコだったが、先生から「シズコは元々可愛いから、今以上のリアクションを求められても……」と返され、何とも言えない笑みを浮かべるのであった。"
3992937519 = "お祭り運営委員会の委員長！"
3292398195 = "お祭り運営委員会としてのシズコの仕事を手伝うことになった先生。先生も驚くほどの、委員長の名に恥じない仕事の手際を見せ、シズコは誇らしそうにするのであった。"
100303804 = "百夜堂の看板娘はプロフェッショナル！"
3211000596 = "仕事中から何やら少し様子のおかしかったシズコが、仕事を終えた途端、先生の目の前で倒れてしまう。「どれもこれも蔑ろにはできない」と言うシズコに対し、先生は「それも大事だけど、時には休むことも必要」と口にする。その言葉を聞いたシズコは先生に対し、自分が眠るまでそばにいてほしいと呟いた。"
1244220490 = "元気リチャージ中"
2409929919 = "前回の先生の言葉を受け、午前中はサボることにしたシズコ。彼女は誰もいない百夜堂に先生を呼び出し、責任を取ってほしいと甘えてくるのだった。"
245234141 = "百夜堂の看板娘はアンティークがお好き！"
1427503773 = "百夜堂に先生を招待したシズコ。しかしイベント中のためかあまりの大繁盛ぶりに、先生に限定メニューを提供するための食器が不足してしまう。そこでシズコは急遽、私物のティーセットで先生をもてなすことにする。客足が落ち着いた後、そのことを先生に指摘され、照れるシズコなのであった。"
418756131 = "アリスクエスト～冒険の始まり～"
899003184 = "「冒険に出る」と連絡をくれたアリスのことが何となく心配になり、ミレニアムへと向かった先生。アリスを見つけて話しかけてみると、急遽マスコットキャラとしてパーティに参加することに。先生はテンションが高めなアリスと共に、冒険という名の散歩に出かけるのだった。"
3415755859 = "アリスクエスト～そして伝説へ～"
263417795 = "レベルアップしたアリスと共に、再び冒険に出ることになった先生。しかし、アリスが唐突にゴミ箱をひっくり返したり、倒したチンピラのポケットから報酬を抜き取ろうとしたりして、最終的に生徒会から怒られてしまうことになる。"
2893546688 = "アリスの選択"
4280172451 = "最近流行りの恋愛シミュレーションゲームをプレイしていたアリスは、同じ趣味を共有できる「顎髭陛下」と、さらなる胸毛を望むことができる「ハゲ皇帝」、どちらと結ばれるのが幸せなのかで悩んでしまう。先生とも相談し、熟考の末、「最適解を見つけた」と口にするアリスだったが……？"
3367878513 = "猫とアリス"
4178604501 = "先生に、どうしたら猫と仲良くなれるのかと相談するアリス。色々と手段を試すものの、ことごとく失敗してしまうが、最後の最後に猫の方から近づいてきてくれて猫と触れ合うことに成功する。帰り道、猫のおやつを持っていたことについてはぐらかす先生に対し、アリスは先生が優しい人だと知っている、と告げるのだった。"
733373471 = "アリスの魔法"
604855597 = "アリスから先生と一緒にゲームがしたいと言われ、部室へと向かうことに。先生が来てくれたことを喜びつつ、RPGには付きものの剣と魔法の話をする中で、アリスは「現実にもゲームと同じで、人を幸せにする魔法は存在します」とほほ笑むのだった。"
371401505 = "アリスの花丸シール"
530559047 = "ゲーム開発部に先生を呼び出したアリスは、「先生の花丸シール」を見せながら、配るのを手伝ってほしいとお願いする。そうして全てのシールを配り終えた後、先生のために作ったもう一つのシールを手渡してくれるのだった。"
2446100639 = "ゲーマーの日常"
2479389322 = "先生を部室に呼び、「勉強」のために一緒にゲームをしようと誘うモモイ。いざ始めてみるとあまりの難易度にめげてしまいそうになるが、代わりに先生がプレイをして何とか敵を倒すことに成功。モモイにコントローラーを返そうとするものの、何だかんだで流されてしまい、先生がゲームクリアまでプレイすることになる。"
3320636286 = "良いシナリオの条件"
1447101991 = "ただでさえ締め切り前のところに、レトロ風ゲームへの批評を見てさらに苛立ってしまうモモイ。何が良いシナリオなのか分からなくなってしまったと口にするが、先生と話すうちにどうにかやる気を取り戻すのだった。"
1209267731 = "ももいろメモリアル"
4291238681 = "ゲームについて勉強をするため、「恋愛シミュレーション」をやってみようと言い出すモモイ。好感度システムに振り回されながらも、何とか彼女を攻略（？）することに成功する。"
2568135161 = "桃色のスタンプラリー"
232297355 = "ゲームの限定グッズを求めて、先生と二人で電気街「春葉原」に来たモモイ。現地に着いてから時間が無いことに気づいて慌てるものの、二人の協力プレイで何とか全てのスタンプを集めることに成功する。"
3227922024 = "お姉ちゃんの思い出"
1635979583 = "先生とゲームに興じるモモイは、プレイ中によろけたはずみで、ミドリと初めてお揃いで買った思い出のゲーム機を発見する。それは、二人の距離を縮めるきっかけとなった「記念品」だった。素敵な思い出話に夢中になるあまり、ゲーム内での討伐が失敗し、モモイは嘆くのだった。"
3723632128 = "締め切りですよ、先生"
1319850860 = "締め切りが近づく中で新しいアイデアが思いつかないミドリは、先生に助けを求めることに。新しい刺激を求めて、普段はやらないゲームをしてみる二人だったが、ミドリがつい熱中してしまい……。"
2181248445 = "展示会ですよ、先生"
885277030 = "ゲームアート展示会に向かうミドリと先生。自分が大人っぽい部分をアピールをするチャンスだと張り切っていたミドリだったが、数々の素晴らしい作品を前に、つい子供のように目を輝かせて興奮してしまう。後になって落ち着いたミドリは「一人ではしゃいでしまった」と反省するものの、先生から自分も楽しかったという言葉を聞き、嬉しそうに笑うのであった。"
1475058544 = "初回限定盤ですよ、先生"
2361668219 = "名作ゲームの続編、その初回限定版を手に入れるため、先生と街中を走り回るミドリ。何とか最後の一つを発見したものの、目の前でそれを手にした女の子の笑顔を見て、「ゲームは楽しくプレイするものだから」と遠慮して、諦めることに。それでも内心がっかりしていたミドリのために、先生は大人の力を駆使して初回限定盤を手に入れ、翌日ミドリへとプレゼントする。"
2289816470 = "大切な思い出です、先生"
828959040 = "先生は、これまで行ったことがないと言うミドリと一緒にゲームセンターに向かうことに。初めて実物を目にしたクレーンゲームを遊びながら、先生と二人で秘密の思い出を作る。"
2056555487 = "思い出は続くものですよ、先生"
4219711868 = "故障したミドリのゲーム機は一世代前の機種のため修理ができず、現行機への買い換えしか選択肢がなかった。壊れたゲーム機がモモイに買ってもらった思い出の品と聞いた先生は、役目を終えた愛機をかっこよく飾れるよう協力をする。お姉ちゃんのマネをしてるみたい……と若干複雑になりつつも、喜ぶミドリだった。"
1054831572 = "勲章授与式"
3901050681 = "自分自身を労うべく、新しく最高に栄誉のある勲章を作ることにしたチェリノ。しかし名前が思いつかなかったため、先生に一緒に考えてほしいと相談する。"
3994991875 = "ピーマンとハンバーグ"
1275437330 = "楽しみにしていた給食のハンバーグにピーマンが添えられており、給食部の部長を粛清しようとするチェリノ。しかし先生から「食べられたら今度プリンを買ってあげる」と言われ、チェリノは迷いながらも決死の覚悟でピーマンを口にする。"
221409277 = "チェリノは九歳？"
474891411 = "前回の約束通り、プリンを買ってもらうために先生と洋菓子店へ訪れたチェリノ。そこで子どもを対象にクッキーを配っていると聞き、子供のフリをしたり駄々をこねたりするが、その様子をレッドウィンターの生徒たちに見られてしまう。"
4092936239 = "雪原の暗殺者"
4239706831 = "雪がたくさん降ったある日、チェリノは先生をレッドウィンターへと呼び出し、雪だるまを作ったり雪合戦をしたりと、楽しい時間を過ごすのだった。"
3454660505 = "悪夢"
3169984572 = "チェリノがふと目を覚ますと、親衛隊にぞんざいに扱われてしまう。どうやら自分のことを全く覚えてないようで、何と先生にも忘れられてしまっていた……という悪夢を見たチェリノ。誰の記憶にも残っていないということの恐怖を感じつつ、現実の先生に対して、その分も甘えるかのように駄々をこねるのだった。"
3953080764 = "癒し空間はロッカーの中"
1400954697 = "ゲーム開発部を訪れた先生と、ロッカーの居心地の良さについて話をしていたユズ。その説明を聞いた先生がユズと一緒にロッカーに入ろうとし、ここには一人しか入れないと伝えると今度はロッカーの争奪戦へと発展する。"
2503402080 = "優しいファイター"
6245419 = "新しく発売された対戦ゲームを一緒にプレイするユズと先生。しかし控えめな物言いとは裏腹に、圧倒的な実力のユズに完敗してしまい、その後、どんな縛りを付けても先生は負け続けてしまうのだった。"
594259040 = "恥ずかしがり屋のアルバイト（１）"
483555388 = "新作のゲームの開発費を稼ぐため、アルバイトを始めることにするユズだったが、気弱な性格が災いしてミスを連発してしまう。それでも先生と他の部員たちのために諦めることなく頑張り続け、最後にはきちんと貢献することができたのだった。"
2585625640 = "恥ずかしがり屋のアルバイト（２）"
2371095455 = "先生から別のバイトを提案してもらい、遊園地で着ぐるみを着てバイトをすることになったユズ。知らない人と話すのはまだ苦手でも、自分のおかげで楽しんでいる子供を見て、ユズは微かにやり甲斐を感じるのだった。"
858487022 = "遊園地での約束"
1229751760 = "ユズは自分がアルバイトをしている遊園地に先生を招待し、二人で一日楽しい時間を過ごす。帰る前に、ユズは先生に感謝の気持ちとして「ユズのフリーパス」をプレゼントするのだった。"
3798769886 = "輝かしい思い出"
1551489306 = "大掃除の最中、ゲーム開発部の部室の隅からユズの名前入りのCDを見つけた先生。それは『テイルズ・サガ・クロニクル・プロトタイプ』のゴールデンマスターディスクだった。この作品があったから今のゲーム開発部があるのだと笑うユズと共に、二人はゲームを起動するのだった。"
2491368152 = "運が良い日"
1705555852 = "先生が道に落ちていた硬貨を拾おうとすると、どこからか突如としてノドカが現れ、そのコインは自分のものですと主張してくる。"
3814394946 = "観察日記"
2168002401 = "ある日ノドカから、何やら不自然なモモトークが送られてきた。気になった先生がノドカを探すと、彼女はある建物の屋上から、シャーレにいる先生のことを望遠鏡で観察しようとしていたことが判明する。"
3943807809 = "流星群が見られる場所"
316651918 = "流星群の観測を楽しみにしていたノドカだったが、当日の天気は生憎の曇り。先生はそんなノドカのため、雲より高い位置にあるシャーレの屋上への入場許可をもらいに行くのだった。"
2610213699 = "流星群と願い事"
2140306431 = "シャーレの屋上で、二人っきりで流星群を見るノドカと先生。何か願いごとはしないのかと先生に聞かれたノドカだったが、これ以上願いごとをしたらバチが当たってしまいそうだと微笑むのだった。"
2411242755 = "雲を探しに"
705416632 = "地下鉄の駅で偶然先生に会ったノドカ。雲の景色が好きだと言う不思議な彼女は、これから山の向こうへ雲を見に行くのだと言う。"
3473776468 = "秘匿事項"
3683908682 = "未だにトニリティに馴染めていないアズサのため、先生は翌日からトリニティの観光案内をすることに。"
1979784998 = "防護"
2914330063 = "シャーレを訪れたアズサは先生に対し、セキュリティが甘いと指摘。防犯システムの強化を提案し、先生の仕事が終わり次第取り組むことに。しかしそれを待っていた彼女はいつの間に眠りについてしまい、シャーレの心地良さを享受した結果、このままでも良いかもしれないと思い直すのだった。"
352859510 = "計画"
1755514409 = "トリニティでの生活に慣れるため、先生と待ち合わせをしてお出かけをするアズサ。計画も無い状態で、自分で行きたいところを選んで良いと言われてアズサはうろたえてしまうが、先生のサポートも受けつつ様々な場所を巡る。そんな一日を過ごして、彼女は非効率なことにも意味があるのかもしれないと考えるのだった。"
2726486787 = "射撃"
1358028185 = "射撃場で訓練をしていたアズサの元を訪れた先生。「平和」というものに思いを馳せつつ訓練をこなす彼女の射撃の実力は、どうやら相当のものの様子。帰り際、アズサはこうして訓練をしていると心が楽になる気がすると告げつつも、今はここ以外にもそういう場所があるから、と穏やかな表情で口にするのだった。"
2287752414 = "何考えてるの？"
4121937525 = "聞きたいことがあって……と先生を呼び出したコハルだったが、いつも通りに勝手な妄想が加速してしまい、そのままどこかへと行ってしまうのだった。"
1870310578 = "何言ってるの？"
775529512 = "モモトークでのやり取りが気になって先生がトリニティを訪れると、色んな感情がない交ぜになってコハルはやや変な態度になってしまう。周囲の生徒がいなくなる頃には徐々に落ち着きを取り戻し、またいつものように妄想を爆発させるのだった。"
2262697203 = "何の用？"
1326481347 = "私が監視しておかないと、と先生を呼び出したコハル。一応勉強も見てもらいたくて、と先生に告げて教えてもらっていたものの、その流れで彼女はカバンの中からエッチな本を取り出してしまう。"
1849950817 = "何するつもり？"
3380505746 = "疲労で今にも倒れそうな状態だったものの、コハルの連絡を受けてトリニティへと向かう先生。コハルから勉強を見てもらったお礼に、とお菓子を貰うものの、そこからいつものように彼女の妄想が加速。先生はそんな彼女のそばに近づき……。"
1256271866 = "少し変わった女の子"
25525610 = "補習授業をお願いしたい、とハナコに呼ばれてトリニティ総合学園へと向かう先生。学園へと到着してハナコと合流するものの中々本題に入れず、その見た目からは想像もつかないような性的な話が繰り広げられるのだった。"
3323539392 = "普通ではない女の子"
4063271474 = "ちょっとしたアクシデントで体育倉庫から出られなくなってしまった、とハナコから連絡を受け、すぐに学園へと向かう先生。しかし到着すると倉庫の扉は開いており、そこにはなぜかスクール水着姿のハナコが。混乱しながらも外に出ようとする二人だったが、そこを警備員に見つかってしまい、誤解と混乱とがさらに重なることになってしまう。"
3406107333 = "贈り物と女の子"
1156066956 = "ハナコの買い物に一緒に行くことになった先生。警戒しつつも辿り着いたのは普通のショッピングモールで、靴下を買おうとしている様子……と思ったのもつかの間、なぜか今まで履いていた靴下を先生にプレゼントしようとし、さらにはその状況を店員に見られてしまい、追い詰められた先生は脱兎のごとく逃げ出すのだった。"
8639287 = "雨の中の女の子"
3069991414 = "モモトークの内容が気になってしまい、先生はハナコを探すことに。あちこち探し回った末に公園でハナコのことを見つけるが、何だかいつもとは違う様子。どうやらハナコは何かに息苦しさを感じているようだったが、彼女はそれを口にすることができて少し楽になったと告げ、二人の距離がやや縮まるのだった。"
3904057311 = "掴みどころのない女の子"
416436128 = "没収された本を回収してきたのだというハナコ。本の内容を言葉にして読み上げようかと笑うハナコに対して先生が慌てると、からかいすぎてしまったと反省の色を見せる。そうして、バス停までの間、2人は穏やかに歓談するのだった。"
2887102104 = "護衛対象"
614600948 = "視界の開けた海辺は危険だからと、いつも以上に頑なに先生のことを守ろうとするアズサ。先生は、アズサが実は初めての海で緊張しているのだと気づき、リラックスしてもらおうと優しく声をかけるが……。"
2589131515 = "そばにいるから"
1254705188 = "アズサの代わりに、海の家の行列へと並んだ先生。購入した商品の味は実際微妙かなと感じるものの、それを美味しいと口にするアズサのことを見たり、二人で話したりしているうちに徐々に楽しくなってきて、その後食べたものは何だかすごく美味しく感じられるのだった。"
272574082 = "私の世界"
1518135893 = "夕陽を見つめるアズサは、何だか名残惜しい気持ちになっているようだった。先生は彼女を、海を一望できる場所へと連れていくことにする。その景色を見てアズサは、少し変わった自分の感覚のことを先生に伝えるのだった。"
4086591264 = "贅沢なひと時"
3882763129 = "深夜、夜の浜辺に座っていたアズサの元へ先生が訪れる。特に何か用事があるわけではなかったものの、彼女は「何も無い時間を過ごせる」という事実を噛みしめていた。そんな言葉を聞いて先生もまた、そのことを喜ばしく思うのだった。"
892100153 = "夏の海といえば……"
2520326930 = "先生がツルギの元へ訪れると、なぜか周囲には彼女以外誰もいなかった。ツルギから聞いた話から推測するに、海に来たツルギを見て、お化けだと勘違いして皆逃げてしまった様子。先生は寂しそうなツルギを見て、二人っきりも良いよね、と告げるのだった。"
2382724730 = "夏の海での遊び方"
1290507385 = "海での遊び方がよく分からない様子のツルギのため、先生は片っ端から遊び道具を集めてツルギの元を訪れる。何をしてもどこか変わった遊び方になってしまうものの、やや息を切らしたツルギは、どこか楽しそうな表情を見せてくれるのだった。"
1474054634 = "夏の海 憧憬 感慨"
286340295 = "海に来て様々な時間を過ごしたツルギ。元々思い描いていた海とは少し違っていたものの、彼女はここに来ることができて良かったと微笑むのだった。"
446907323 = "可愛いは正義"
288034791 = "新しい水着を選んでいたマシロは、店員さんから「可愛い水着は正義」だと告げられて衝撃を受ける。その後、先生からそれは慣用句的なものだと教えてもらいつつ、先生に勧められた可愛い水着で正義を体現しようと心に決めるのだった。"
627967675 = "海辺の狙撃手"
1412156088 = "海辺の砂浜でギリースーツを着ていたマシロが熱中症で倒れてしまう。すぐに訓練を再開しようとするが先生に諫められ、まずは頑張って休憩をすると約束するのだった。"
1042934636 = "熱中症対策"
4168292743 = "海辺での訓練に向かうマシロと、それに付き合うことにした先生。しかし先生が準備運動だけで疲労困憊になってしまい、マシロから熱中症対策で持ってきていたアイスを貰うことに。二人は一時的に休憩に入るのだが……。"
2602243770 = "狙撃手と煙は高いところが好き"
1234473319 = "ボランティア活動として、監視台の上に乗っていたマシロ。彼女が先生のことを誘い、二人は密着して監視台に乗りながら、アイスを食べることにするのだった。"
2522447731 = "夏デビュー！"
3891504304 = "夏に向けて、新しい水着を買いに行くヒフミ。夏デビューのために派手な水着を選ぼうとするが、先生の言葉を受けて考え直し、可愛い水着を購入。来たる夏を心待ちにするのだった。"
1131785799 = "踏んだり蹴ったり破れたり"
638776663 = "戦車に乗って秘密の海岸へと向かう、ヒフミと先生。しかし戦車を停めようとした際に、ヒフミの水着が手すりに引っかかって破れてしまう。さらには戦車の履帯まで外れてしまい、取り合えず先生が歩いてヒフミの制服を取りに戻ろうとするのだが……。"
1338557257 = "備品は使用後、綺麗にして元の位置へ"
1038194354 = "日光浴をしようと先生を誘い、クルセイダーちゃんを走らせるヒフミ。しかし突然の大波に見舞われ、先生とヒフミはクルセイダーちゃんの洗車を行うことに。"
2720519106 = "夏限定のペロロ様グッズ"
4171378080 = "海辺で偶然、限定デザインのペロロのぬいぐるみを発見するヒフミと先生。アイスキャンディーを食べることで景品として手に入る仕組みだったものの、良心的な設計にも関わらず、何故だか全く当たらない。それでもヒフミは果敢に立ち向かい、何とかぬいぐるみを手に入れることができたが、ヒフミも先生も揃ってお腹を壊してしまうのだった。"
1735121927 = "深夜のティータイム"
3989855088 = "せっかくの休みだから、と気分転換に海辺を散歩しにきた先生。しかし、行く先々で頼まれ事が発生し、あまり休めずにいると、そんな先生の前に、「クルセイダーちゃん」に乗ったヒフミが現れる。そうして、二人は一時の休息をともに過ごすのだった。"
2192111210 = "イズミと夏を楽しむ幾つかの方法"
3585146498 = "「とあるゲームに勝つと珍味を無料で食べられる」とイズミから連絡があり、そのお店へと向かった先生。そこで、勝てば特製ロコモコ丼を貰えるが、負けたらチャバスコジュースを飲まなければならないというルールが判明する。慎重になる先生に対して、イズミがやたらとリスクの高い行動に出たため、実はイズミは「チャバスコジュース」の方が飲みたかったのだということがバレてしまう。"
2207930638 = "イズミと秘密の材料"
1751574366 = "夏の珍味を求めて、先生と共に冷やし中華で有名なお店へと向かうイズミ。美味しいけれどひと押し足りない、と言いながらイズミは自家製のピーナッツバターを投入。まさかと思いつつ先生も食べてみると、何故かしっかりと冷やし中華にマッチして美味しくなっていた。次の日、その噂が広まって……。"
2195651191 = "イズミと夏の魔物"
4074605646 = "先生と一緒に夏のグルメ巡りを楽しむイズミ。ふと先生から、せっかくなんだから海で泳いだらどうかと言われ、彼女は美味しくご飯を食べるためにも海に入ることに。しかし海で遊んでいる最中、彼女はタコに襲われてしまう。先生が助けようとしたその瞬間、彼女はこのまま食べられるくらいなら……と、逆にタコを食べようとするのだった。"
1620499167 = "最高の（？）避暑"
709254674 = "海の珍味を制覇すると宣言したイズミと先生は、暑さにバテてしまい、日陰で休むことに。イズミはクーラーボックスから様々な材料を取り出してフルーツポンチを作ってくれるも、それを食べた先生は気絶してしまうのだった。"
3295968282 = "委員長と海のお散歩"
3010205152 = "合宿の予行演習として先生と海辺を散歩するヒナだったが、途中ヒナが学園からの仕事の呼び出しを受けて席を外すことに。その後、なかなか戻ってこないヒナを先生が心配し始めた頃、なぜか迷子センターにいるというヒナからの連絡が入る。"
1655107260 = "委員長と一緒にお仕事"
500163992 = "合宿訓練に来ても風紀委員会の仕事で忙しいヒナの元を、先生が訪れる。大変そうな彼女を手伝うことにし、ふたりで膨大な量の書類を片付けることに。何とか仕事を終えた頃、流石に海に行く時間は残されていなかったものの、ふたりは夕食を共にすることができたのだった。"
782812198 = "委員長と夏の夜に"
170121594 = "先生と一緒に海辺へと遊びに行く約束をしたヒナだったが、早起きして仕事をしていた彼女は疲労でつい眠りに落ちてしまい、そのまま約束の時間を過ぎてしまう。その後目を覚まし、すぐそばにいた先生に対して謝るヒナだったが、先生はまだ終わりじゃないと彼女の手を取って、海の見えるテラスへと向かうのだった。"
1063317491 = "ずっと大切なもの"
562904619 = "先生は、水泳が苦手だというヒナのために1対1の特別授業を行うことに。しかし、度重なるハプニングのせいでなかなか水泳の授業をするどころか先生の時間を奪ってしまうだけだと落ち込むヒナ。先生はそんな彼女を慰め、一時の時間をともに過ごすのだった。"
121651125 = "海でしてはいけないこと"
801476589 = "海辺での合宿における規則を整備していたイオリは、「海でしてはいけないこと」について先生にアドバイスを求めることに。"
828409727 = "とある風紀委員の弱点"
1423535926 = "モモトークの誤爆を受けて、心配になった先生がイオリを尾行していると、彼女が密かに浮き輪を買うシーンに遭遇。諦めて泳げないことを告白された先生は、イオリに対して一緒に水泳の練習をすることを提案するのだった。"
3945086099 = "ちょっとしたひと時"
3982380859 = "先生と共に海辺での規則違反者たちを捕まえたイオリ。彼女は念のため、先生と手分けして周囲のパトロールを行うことを提案する。何だか不自然な言動のイオリについて行ってみると、彼女がひと気のない岩場の裏手で日光浴を楽しんでいる瞬間を目撃することに。"
4161301031 = "砂風呂"
1639986624 = "何かまた変なことをしているのではとイオリが先生の元を訪れると、砂風呂を楽しんでいるシーンに遭遇。最初は怪訝な顔で見ていたイオリだったが、先生に勧められて試してみると、思ったよりも気持ち良いことに気が付く。イオリはついそのままうたた寝をしてしまい、目を覚ました頃にはなぜか身体の上で人魚の像が作られているのだった。"
2618097705 = "夕暮れの海辺"
2453697925 = "浜辺で悪事を働くスケバンを取り締まるイオリ。しかし手伝いに来ていた先生が戦闘の余波でびしょ濡れになってしまったため、私物の大事に使っているブランケットを貸すことにするのだった。"
3842642425 = "キヴォトス・ロングライド"
683246259 = "近頃は少しだけ余裕が生まれてきたこともあり、以前から考えていたキヴォトス縦断にチャレンジしてみようとするシロコ。先生の心配そうな表情を見てやや躊躇いを覚えるものの、頻繁に連絡してくれると嬉しいという先生の言葉を受け、晴れやかな顔で縦断へと旅立つのだった。"
1462935881 = "私だけの特別な"
1892594340 = "約束通り頻繁に連絡してくれるシロコから今いる場所を教えてもらい、補給品などを持ってシロコの元を訪れる先生。先生と出会い、ひとりではないと思えるようになった彼女の中に様々な感情が生まれるのだった。"
3283621877 = "いつどこにいても"
2757117157 = "教えてもらった通りの、色んなポイントでシロコを迎える先生。キツイ運動量のはずなのに、会うたびにシロコはどこか楽しそうな表情をしているのだった。"
2843691457 = "帰ってくる場所"
4094165763 = "ゴール直前、シャーレへと到着したシロコ。彼女からこれまでのキヴォトス縦断中の話を聞かせてもらいながら、先生とシロコは並んでゆっくりとアビドスへ向かうのだった。"
137781174 = "小さいのも良いですね！"
1322340430 = "薬の副作用で再び身体が小さくなったシュンは、この際だからと大好きな限定パフェをおなかいっぱい食べるため、先生と共に行きつけのカフェへと向かった。しかし身体が小さくなるに伴って、どうやら味覚にも影響があったようで……？"
2841094582 = "小さいのはやっぱりダメです！"
149905902 = "シュンが小さくなったまま梅花園の整理整頓をしていたところ、高いところから降りられなくなってしまう。先生に連絡して助けてもらった後、整理を続けるためにシュンは先生に肩車をしてもらうことになり、そのままつい楽しくなってしまうのだった。"
128361082 = "安全確認ですから！"
2341039634 = "キヴォトスの中央区に新しくオープンした「プレイランド」へ向かったシュンと先生。子どもたちの目線できちんと安全確認を……と口にするシュンだったが、彼女の眼は楽しそうにキラキラと輝いているのだった。"
2891798612 = "それは秘密の"
3254263628 = "先生と共に、昔よく行っていた秘密基地の場所へと向かうシュン。彼女はその懐かしい秘密基地の中で、過去と未来に思いを馳せるのだった。"
4082121735 = "変わること、変わらないもの"
2268442326 = "幼い姿になって、昔好きだった髪型を楽しむシュン。大きくなってもその髪型をすればいいのにと先生に言われるも、大人になると、好きだとしても似合わない髪型やアクセサリーが出てくるのだとシュンはぼやく。そんな彼女に、先生は好きなものは大人になっても変えなくて良いのだと笑うのだった。"
3306119972 = "のん気な大捜査線"
1067431467 = "パトロールを始めたキリノと先生は、どうやら「爆弾を持っている」かのような怪しい言動をしている市民を発見。ひっそりとその後を追う中、横から窃盗犯が現れたりしてドタバタの騒動になるものの、最終的にはどうにか爆弾を確保することに成功。しかし取り返したはずのその爆弾は、実は爆弾ではなくて……？"
2874205992 = "銃声とジルコニア"
3960259754 = "交渉人の到着が遅れており、人質のためにもジッとはしていられないと飛び出したキリノ。交渉を始めるも上手く行かず、やむなく狙撃をするものの、その弾丸は人質へと当たってしまう。予想外の状況に混乱した犯人は様々な勘違いを重ねた結果、自ら投降するのだった。"
3444429399 = "ザ・シューター/二大標的？"
301172044 = "先生に横で見てもらいながら、射撃訓練を行うキリノ。銃は壊れていないはずなのに、どんな至近距離でもなぜか人質を想定した方の標的に当たってしまう。先生のアドバイスを受けて、試しに渋々人質の方を狙ってみると……？"
84381503 = "アイアン・コネクション"
1057319864 = "付近の幼稚園児たちがヴァルキューレ警察学校の見学に来ることになり、その案内を任されたキリノ。しかしどうにも上手く行かず、最終的には手錠を用いて自分で自分のことを縛ってしまう有様だったのだが、真摯に対応してくれたキリノに対して園児たちは最後に笑顔を見せてくれるのだった。"
3316056 = "天才のコツ"
3154017608 = "先生との待ち合わせ場所に勢いよく現れたのは、スケートボードに乗ったサヤ。玄武商会を回るにはピッタリの乗り物だと熱弁するサヤに提案され、先生も試しに乗ってみるものの……？"
3491617475 = "天才の休日"
2985293516 = "「カップル専用特大ブルーチーズケーキ」を味わうためネズ助と共にお店に来たサヤだったが、お店のルールで注文を断られてしまう。しかしそこにサヤとのモモトークのやり取りを心配していた先生が現れて、無事注文は受けてもらえることに。サヤは「天才とは孤独なもの」と嘯くものの、先生と一緒の休日を楽しむのだった。"
1858393728 = "サヤのおいしいレストラン"
776648188 = "サヤの行きつけのラーメン屋さんに向かうと、何だかすごい匂いが。先生とサヤが話を聞いてみると、どうやら新メニューを作ったものの匂いが強すぎたとのこと。店主に頼まれたサヤは、手元から様々な薬品を取り出し始める。その結果とんでもなく辛いラーメンができあがるが、これが一部のマニアたちに大好評となり……？"
2717662380 = "流れ行くもの"
1831782779 = "サヤが開発した特製の激辛ソースは忽ち人気になり、玄武商会中で大流行りしていた。しかし喫茶店の甘味にすら入れられ始めた状況にサヤは辟易し、製造中止を宣言するのだった。"
2977660904 = "スケートボードを選んだ理由"
1522951562 = "公園で行われるイベントを手伝うべく、「自然と身体から力が抜けて、気持ちがふわふわになる」香水を開発したサヤは、先生にスケートボードで香水を散布するほうが都合が良いのだと告げる。そうして、サヤはスケートボードに乗りながら公園のあちこちに香水をまき散らすが……香水の効果で力が抜けてしまったサヤは転んでしまうも、イベントは大成功に終わるのだった。"
1753704494 = "支援要請"
2602091299 = "バニーガール衣装の着方が分からずに苦戦しているネルから、先生の元に連絡が届く。しかし到着すると、当のネルは先生の登場に驚いて……？"
165180404 = "大したことじゃないからこそ"
3543262161 = "何かあった時のために慣れておこうとバニーガール姿の衣装を着ていたネルだったが、慣れないハイヒールで靴擦れをしてしまった模様。大したことではないと言いつつ、その治療を彼女は先生に頼むのだった。"
1674452406 = "視線"
4250635903 = "「確認したいことがある」というネルに呼ばれてミレニアムを訪れると、そこにはバニーガール姿のネルが。周囲からの視線をいつも以上に浴びている彼女曰く、どうやらその格好がどのように見えるのかを聞いておきたかったとのことで……？"
2462150601 = "思わぬ角度"
1600305466 = "カリンから「任務に必要なものを持ってきてほしい」と頼まれた先生だったが、集合地点には誰もいなかった。どうやら受け取る予定のアスナがどこかへ行ってしまった模様。そこで任務中のカリンの元へと直接訪れることにするのだが、到着地点で思いがけない光景が目に飛び込んできて……。"
2181471164 = "思わぬ誤解"
2467790110 = "カフェに潜入中のカリンの元を訪れると、彼女は楽しそうにバニーガールの衣装を着ていた。そんなカリンとバニーガールについての話をする中で、何やら変な誤解が生まれてしまったようで……？"
367799569 = "思わぬ結論"
1433841241 = "カリンに呼ばれ、彼女の自室へと訪れた先生。そこでようやく、以前の誤解を解くことに成功する。先生が本来の意図を彼女に伝えると、カリンは先生が自分に興味を持ってくれたこと、そして自分のことに自分より早く気づいてくれたことに驚きつつ、胸の中に温かい感情を覚えるのだった。"
4002954459 = "思わぬプレゼント"
3433269143 = "先生の手伝いをしていた最中に、網タイツを破いてしまったカリン。仕事中に破れてしまったのだから新しいタイツを贈らせてほしいと言って、先生はカリンを連れてファッションコーナーに向かう。替えも含めてたくさん買ってもらったカリンは、今日の思い出として1足は大切に取っておく、と話すのだった。"
1141743172 = "アスナの生態"
221988864 = "深夜にアスナからの連絡が届き、心配で彼女の元へと向かう先生。その24時間営業のコインランドリーに到着すると、そこには何故かバニーガール姿のアスナがいて……？"
814287263 = "ウサギの生態"
3643670542 = "付近の川沿いで出会ったアスナは、なぜかバニーガール姿だった。彼女は今ウサギの生態を知るために、ウサギになっているのだと言う。そうして彼女は、自分はウサギだから撫でてほしいと口にし始め……。"
1615861420 = "バニーガールの生態"
2918162060 = "カフェで出会ったアスナは、どうやらバニーガール衣装の意味について考えている様子。会話をする中で、先生を困らせるようなとんでもないことを言ったりするアスナだったが、最終的にはどうやら腑に落ちたようだった。"
391217910 = "しっぽ大騒動"
3144520066 = "バニー姿のアスナに呼び出され、手に持っている尻尾型手榴弾が本物かどうか、教えてもらうために勝負をすることに。この勝負に勝つメリットがあるのだろうかと考えていると、手榴弾の安全ピンらしきものが落ちている事に気づき……全力で先生はアスナを追いかける羽目になるのだった。"
18689073 = "1時間目「科目：ロマン」"
1368636690 = "ある日、ナツから何やら不可思議なメッセージから送られてくる。トリニティにいる彼女に会いに行くと、手作りクッキーを持ち出したナツは「ロマン」について話し始めて……？"
479881100 = "2時間目「科目：包容」"
4189558159 = "何やら悩ましいモモトークを送ってきたナツが、その後アイスクリームを手にシャーレへと訪れる。エスプレッソを淹れてアフォガートを作りながら、今朝見たというニュースの話を聞いて、先生はナツのその言葉の奥にある彼女の内面に触れるのだった。"
2721314425 = "3時間目「実習：発掘」"
1566724822 = "唐突にナツに呼び出された先生は、共に「忘れ去られた駄菓子屋さん」へと向かうことに。その場所にたどり着いて深く感動するナツだったが、この場所のロマンはロマンであり続けてほしいと願い、今日のことは全て秘密にしようと口にするのだった。"
1618294287 = "お昼休み「売店」"
2377126702 = "唐突にナツに呼び出され、彼女の元へと向かう先生。呼び出した当のナツは先生の様子を見て何だか嬉しそうにしている。ふたりはブルーベリーパイを分け合いながら、何も無い時間を大切に過ごすのだった。"
4119434234 = "立派なシスター"
1452376206 = "ふとしたモモトークをきっかけに、シスターフッドのマリーの元を訪れた先生。立派なシスターになろうと真摯に努力をする、素敵な心意気を持つ彼女のことを肯定しようとする先生だったが、やや調子に乗ってしまったからか天罰（？）を受けることに……。"
3212708973 = "あなたのために祈りを"
2690251888 = "以前の出来事を気に病んでいたこともあり、先生のために祈るマリー。彼女はさらに先生の手を握り、一緒にお祈りをしてくれるのだった。"
2250100664 = "内なる罰"
3849636343 = "ある日マリーが体調を崩してしまったと聞き、彼女の元を訪れる先生。マリーは自分が自分に対して甘えてしまったから罰が下ったのではと気に病んでいたようだったが、「きっと罰ではなくて助けてくれたんだと思う」と口にする先生との会話を通じて、心身共に安らげたようだった。"
4076992554 = "私の望み"
3986468370 = "粛然とした射撃場で、静かに祈りを捧げていたマリー。彼女はシスターとしてではなく、自分自身が持つ望みを先生へと打ち明ける。"
2267732676 = "本当の気持ち"
2902570837 = "ショッピングモールでかわいらしいアクセサリーに心惹かれるマリー。しかし購入を我慢する彼女を見て、先生がプレゼントしようとする。それをシスターだからおしゃれは慎むべきと断るマリーだったが、「シスターである前に一人の生徒だから」という先生の言葉に救われたように感じ、食事に行こうという先生の誘いには素直に応じるのだった。"
2965761760 = "バーチャル・シンガーの秘密"
3588938678 = "バーチャル・シンガーである初音ミク。彼女はなんとキヴォトスの技術を借りて現実の身体を手に入れ、ライブを開催することに。しかしそんなある日、途中から彼女の歌声が出なくなってしまう。困った彼女は、「キヴォトスの様々な事件を次々に解決する」と有名な「先生」に助けを求めることにし……。"
1011014524 = "バーチャル・シンガーの悩み"
3188134202 = "いつまでも隠しきることもできず、ライブの主催者の方にも歌声が出ないことがバレてしまったミク。彼女は先生と一緒に幾つかの方法を試してみるのだが……？"
3690602347 = "バーチャル・シンガーの気持ち"
391861432 = "ライブが目前に迫るも、歌声が未だに出ないミク。そんな彼女だったがある時デビューしたての頃に歌った曲を耳にし、その曲に乗せる形で突然歌声が出るように。先生はこの問題は彼女の気持ちに関わることなのではと気がつき、とある計画を立てる。"
358973352 = "バーチャル・シンガーのステージ"
1256619760 = "先生はシャーレとしての力を用いて、ライブのセトリを半ば強引に変更。ミクが自分で作った曲へと内容を変えていた。責任は取りますと口にする先生に関係者一同も圧され、ライブはそのまま進めることに。初音ミクの声が、キヴォトスに響き渡る。"
3822667143 = "とにかく陰謀なんです！"
1052016123 = "先生を呼び出し、シャーレに対して色々と要求をするアコ。戸惑う先生をよそにアコはどんどんヒートアップするものの、途中でそのことに自分でも気が付いた様子。深呼吸した後にいつもの笑みを浮かべて、彼女はどこかへと行ってしまうのだった。"
3731268869 = "とにかく急用です！"
3900941619 = "急用があるからと先生を呼び出したアコ。先生が到着すると、彼女は今日一日自分にあった不幸を次々と先生にぶつける。そんな彼女の文句を受け止める先生だったが、ひとしきり言い終わったアコはそのまま帰ろうとする。急用の方は大丈夫なのかと尋ねると、アコは今の会話が急用だった、とすっきりした笑顔で告げるのだった。"
2871973874 = "とにかく先生のせいなんです！"
490128902 = "モモトークの内容を心配し、先生はアコの元を訪れる。話をしているうちにストレスが悪化したのは先生のせいだと言い始めるアコ。アコが八つ当たりを続ける最中いつもの口癖のように「賭けますか？」と口にし、彼女のストレス解消になるかもとそれに乗る先生。しかしアコは賭けに負けてしまい、首輪をつけることに。それでも最終的に、アコはどこかスッキリとした顔をしていた。"
150871999 = "とある髭の生徒会長の冬休み"
2718480801 = "冬休みを楽しむために温泉を貸し切ったチェリノだったが、温泉自体はともかく、常日頃から寛いているため特別新たにやることが無い様子。そんな中で「卓球台」を見つけ、チェリノは先生に挑戦状を叩きつけるのだが……？"
4282893984 = "プリンよりも柔らかく"
3630181932 = "「温泉卵はプリンみたいに柔らかくて美味しい」と聞いたチェリノは、すぐさま温泉卵を作ることに。給食部からありったけの卵を貰い、その全てを温泉卵にするチェリノだったが、いざ食べてみるとガッカリ。味がプリンと一緒だと勘違いしていたチェリノは、違うのならなぜもっと早く教えなかったのかと憤慨するのだった。"
221973324 = "防水の髭"
944686474 = "チェリノは温泉があまり好きではない理由の一つとして、「髭が濡れるから」ということを挙げる。そこで彼女は名案だとばかりに、白鳥の羽からヒントを得て、髭を油に浸けることに。しかしその油はごま油だったため、その後チェリノは凄まじい匂いの強さにやられてしまうのだった。"
2691752229 = "牛乳製の権威"
699204964 = "前回の髭の件で落ち込んでいるチェリノを慰めるため、先生は彼女を温泉へと誘う。温泉から上がった後にフルーツ牛乳をプレゼントすると、それを飲んだチェリノは「美味しい上に、飲むと口の周りに髭が生まれる！」とご満悦。しかしそのまま調子に乗って飲み続けた結果、お腹を壊してしまうのだった。"
3413696609 = "お風呂の補佐官"
2914497765 = "チェリノに呼び出され、温泉郷を訪れた先生は、チェリノが持っているお風呂用のアヒル人形「ラバーダック」を目にする。どうやらチェリノはアヒルの人形に対して権威の髭をつけることに不満がある様子。そんな彼女に、先生はアヒルの人形と一緒にお風呂に入ってみてはどうかと提案するのだった。"
3698230489 = "ワーカーホリック"
1902460226 = "ゲヘナ付近の温泉を訪れていた先生は、そこをおススメしてくれた当人であるチナツと遭遇。どうやら偶然休養のタイミングが重なったとのこと。しかしチナツは溜まっている仕事が気になるようで、書類を手放そうとしない。その様子を見た先生は自分も手伝うと口にし、ふたりして温泉で書類を片付けるのだった。"
3640094321 = "薬膳療法？"
2528966174 = "休養中の先生のために「薬膳茶」を用意したチナツ。先生はいつも以上に張り切る彼女を落ち着かせつつ、一緒にゆったりとした時間を過ごすことができたのだった。"
3450750046 = "お返し"
794685547 = "休暇を貰った分、風紀委員たちにお返しを買おうとお土産屋さんを訪れたチナツ。先生とふたりで談笑しながら、お土産をひとつひとつ物色していく。無事にチナツが買い物を終えた後、先生は日々のお返しとして、チナツ自身が先ほど「可愛い」と口にしていたリボンをプレゼントするのだった。"
1859264697 = "ふたりだけの"
918925541 = "以前貰ったリボンのお返しとして、先生に旅館の宿泊券をプレゼントするチナツ。しかし予約の際にミスがあり、ふたりは旅館側からカップルとして扱われることに。突然の事態にチナツはドギマギしつつも、心地良くて楽しい時間を過ごせたのだった。"
3800350579 = "嘘と誤解"
236937520 = "先生と一緒にショッピングをしている途中、街中で先生に関する誤解を耳にしたトモエ。彼女は得意の演説でその噂を払拭することに成功するが、その演説によってまた別の誤解が生まれてしまうのだった。"
799463473 = "合間合間に休憩を"
719836184 = "仕事続きで疲れている先生のために、お昼寝セットを用意してくれたトモエ。彼女の子守唄を聞きながら、先生は心地よく睡眠を享受することができたのだった。"
1317246530 = "雪の中で"
284850586 = "定期演説の巡回からの帰り道、吹雪に見舞われてしまったトモエと先生。ふたりはすぐそばの小屋を見つけ、何とか遭難せずに済むことに。濡れた服を乾かしながら先生の視線に気づいたトモエは、「そういうことなら」と嬉々としてチェリノのことを語りだすのだった。"
2231726565 = "失敗などしてませんし、記録にもありません"
3957122344 = "ピーマンが嫌いなチェリノのため、何かピーマンを使ったお菓子を作ろうとするトモエ。先生と一緒に色々と試すものの、どうにも上手く行かない。最終的にトモエは、「そんな計画は最初から無かった」ということにしようとするのだった。"
888674982 = "微妙な嘘は、ほとんど誤りに近い"
58356917 = "チェリノ会長のドキュメンタリー映画を撮ろうと先生に持ち掛けるトモエ。チェリノの足跡を辿る形であちこちを訪れるのだが、先生は途中でトモエがカメラを持っていないことに気が付く。そのことについてトモエに尋ねると、彼女はとある映画の台詞から引用し、「微妙な嘘というのは、ほとんど誤りに近い」と口にするのだった。"
824872411 = "修行・会席料理編"
523671672 = "将来的に温泉郷が復活した時のため、女将としての修業を始めることにしたノドカ。そんな彼女は、まず会席料理を先生に振舞おうとするのだが……？"
2565382189 = "修行・お掃除編"
3330425173 = "立派な女将になるための修行の一環として、シャーレのお風呂を綺麗にしたノドカ。お湯もそろそろ溜まったはずなのでと口にしたところで、先生から「今日は工事でお湯が出ない」と聞かされ、ノドカは目論見が外れてしまったと落ち込むのだった。"
4230538315 = "修行・礼節編"
3390509471 = "気品のある歩き方を習得するために、滑りやすい道路の上で座布団を持ったまま歩く訓練を始めるノドカ。しかしふと油断したタイミングで、転んで足首を捻ってしまう。先生はそんなノドカのことをおんぶしてシャーレへと戻り、ノドカはそれを役得だと静かに喜ぶのだった。"
608936968 = "修行・休息編"
3128779278 = "足首を怪我してしまったノドカのため、先生は湯治に良いという温泉へと彼女を誘う。ノドカは普通の温泉ではなく足湯だったことに微かに安堵しつつ、足湯の温かさと綺麗な風景に心をときめかせるのだった。"
2400865026 = "今年が終わるその前に"
3775606218 = "正月を目前に控えたある日、アルは先生を呼んで一緒に着物をレンタルしに行くことに。しかしながら店員さんの言葉に乗せられてしまったアルは、投資の一部だと言いながら高価な着物を購入してしまう。"
1207833116 = "見せたい背中"
3154422011 = "年が明け、キヴォトスの有名な事業家が集まるディナーパーティーに出席するため、先生にエスコートをお願いしたアル。前回レンタルした着物を身に纏いつつ、先生に良いところを見せようと奮闘するのだが……？"
2296868625 = "最初の一歩をあなたと"
672381548 = "年が明け、元旦にアルから先生の元へ連絡が届く。ふたりはあらためてお参りをし、その帰り際にアルは先生から着物についての感想を貰うのだった。"
3587591035 = "新年の運試し"
4191647869 = "先生と一緒に、おみくじを引きに来たアル。しかし何度引いても「凶」関連しか出てこない。憤慨するアルだったが先生が引いたおみくじの結果を読んで、顔を綻ばせるのだった。"
2459534347 = "先生のためにプレゼント"
1129754769 = "年明け早々熟睡していた先生の元に、着物姿のムツキが現れる。そんなムツキからおせちを受け取る先生だったが、その中身は時限爆弾だった！どちらの線を切るべきか悩む先生、しかし無情にもタイムアップが告げられて……？"
2385954924 = "正月には正月らしく！"
335158519 = "絵馬にお願い事を書くため、先生はムツキと外へ出かけることに。人混みを抜けてようやく書き始めた先生の絵馬を、ムツキが横から楽しそうに奪い取ってしまう。逆にムツキの方は何も願い事を書いておらず、それならばと先生が代わりに書いてあげるという流れに。"
2713380999 = "激しい戦い"
3857167523 = "ムツキから呼び出しを受けて先生が約束の場所へ向かうと、突然「羽根つき」が始まることに。「負けた方は勝った方の言うことを何でもひとつ聞く」というルールの下、ムツキはいつも通り楽しそうに勝負を始めるのだが……？"
470221661 = "巫女さんのお勉強"
3007775160 = "新年のアルバイトとして、巫女さんのバイトをすることになったセリカ。「完璧な巫女さんであればあるほど時給が上がる」と聞き、自分で調べ物をしつつも、巫女さんについて先生に相談することに。その後先生から色んな話を聞くものの、最終的にそれは全部ゲームやアニメの話だったことが判明し……？"
2523978486 = "巫女界のスペシャリスト"
979203914 = "本格的に巫女さんのアルバイトを始めたセリカだったが、どうやらいまいち上手く行っていない様子。しかし先生の激励もあってあらためて動き始めると、むしろ次々に相談が押し寄せてくるという事態に。"
2340715417 = "もう少しだけ"
2269796876 = "アビドスのみんなのために買い物がしたいと言われ、先生はセリカとお出かけの約束を交わす。しかしいざその時間になってもセリカは現れず、心配になった先生がセリカを探して周囲を走り回っていると、どこからか猫の鳴き声が聞こえてきて……？"
3759928433 = "優しい再会"
576523944 = "キヴォトスを散策する先生に降りかかるカツアゲ、不良、その他多くの災難。そこから逃げ出そうとする先生だったが、そんな窮地を謎の爆発が救っていく。先生を守ろうとするかのようなその爆発の陰には、ワカモの姿があった。"
3463568525 = "一緒にひとりデート"
649370719 = "先生の日常につきまとう爆発と銃弾。陰からストーキングすることをデートと称するワカモに、先生は「次は一緒に行こう」と伝えるのだった。"
888544873 = "歪なデート"
657109644 = "ワカモはデートに向けて丁寧なプランを練ってくるも、当日は不幸と空回りが続いてしまう。すっかり落ち込んでしまったワカモを先生は励ますも、彼女は翌日にはすぐに元気になってまたデートを申し込んでくるのだった。"
337655417 = "変わらない心"
1672717160 = "仕事のせいで先生はワカモとの約束に遅れてしまう。先生は遅刻したことを謝罪するも、ワカモは平気な様子。「先生は自分を裏切らないので何か月でも待てる」と語るワカモの様子に、先生は思わず冷や汗をかくのだった。"
4127733603 = "秘めたる心"
684934471 = "モモトークから不穏な気配を察知した先生は、一日ワカモと共に過ごしたいと告げる。先生の言葉に照れてしまったワカモは逃げ出し、追いかけた先生は転んでしまう。先生を心配するワカモに、仮面の下を見せてほしいと告げ、そうしてワカモのお面についての話を聞くのだった。"
443018916 = "負傷者なので"
4068284168 = "不良同士の抗争現場へとやってきて怪我人を保護するという、「いつも通り」の仕事をするセナ。負傷した首謀者を取り調べのために無理やり連行しようとした風紀委員もついでに昏倒させ、セナは負傷者たちを搬送していった。"
2901484910 = "緊急事態"
4226549044 = "体調不良を押して仕事をする先生を見かね、セナがサポートをしてくれることになる。セナは仕事を終わらせるための様々な手伝いをしてくれ、最後には眠ってしまった先生の看病をしてくれるのだった。"
948530229 = "氷室セナ"
1708902441 = "先日のサポートのお礼として、先生はセナとピクニックに赴く。自身の無表情さを知っているセナは、彼女らしいストレートな言葉で喜びと感謝を先生に伝えた。"
1699201785 = "待機中"
3298489040 = "事故に備えての待機人員として深夜に一人で過ごすセナの下を、先生が訪れる。長い夜、何をするでもなく二人で過ごすことの幸せをセナは噛みしめるのだった。"
2267997112 = "セキュリティチェック"
837950607 = "貼りだされたパスワード。郵便ポストに入った鍵。シャーレのセキュリティに存在する多くの問題点に気づいたチヒロにより、先生は数時間に及ぶ説教を受けることとなった。"
3713208438 = "ハッキングの方法"
4238915657 = "新たな仕事の契約のため、交渉の場に先生を連れていくチヒロ。チヒロのハッキング技術は電子面のみに限らず、先生を利用して心情的なハッキングを行うことで、契約を取ることに成功する。"
520601278 = "メンテナンス"
3844936871 = "データセンターの整備の仕事で深夜まで過ごしていたチヒロと先生。仕事を終えた後、寝静まった街でチヒロは自販機に感じるシンパシーを語るのだった。"
434697728 = "ブラック＆ホワイト"
1764792485 = "セキュリティチェックの仕事を依頼されたチヒロは、点検中にその会社が犯罪を行っていることに気づく。セキュリティ担当者としての義務と良心の間でチヒロは葛藤するが、最後には不正を暴くことを決断する。"
1910728491 = "怠けがちな警察官の発想"
3560375484 = "勤務中に昼寝をしたいフブキは、モモトークにマクロを導入。連絡への対応の自動化を図るが、粗悪なアルゴリズムはかえってトラブルを誘発。最後には大量の始末書を書かされることとなった。"
1170334966 = "怠けがちな警察官のパトロール"
2139982306 = "週末のパトロール業務を任されたフブキ。パトロール中に不良を目撃するも、面倒くさいので「良い人」として扱いスルーしようとする。しかしその対応はかえって不良たちを感激させ、改心させることに。結局、面倒ごとがつきまとうのだった。"
1238659725 = "怠けがちな警察官の張り込み"
1704488465 = "張り込みの仕事に異様な熱心さを見せるフブキ。怪しさを感じて先生が同行すると、案の定、フブキの目当ては任務ではなく張り込みのお供であるドーナッツの方だった。"
975406302 = "怠けがちな警察官の親切"
549498692 = "仕事中、フブキはヘアピンをなくしてしまった少女に遭遇する。規則を理由にヘアピンの捜索を断るも、フブキ密かにそれを探しに行く。その理由を彼女は「美味しいドーナッツのため」と語るのだった。"
327110961 = "朝ですよ、起きてください？"
3796601530 = "シャーレの仕事に忙殺され、寝坊しがちな先生のことを起こしに来たミモリ。大和撫子を目指すミモリは先生のために、朝から色々と尽くしてみせるのであった。"
3321521936 = "花嫁修行その１：家庭料理編"
1981885852 = "大和撫子になるための修行の一環として、家庭料理の練習をするミモリ。先生と一緒に練習をするものの典型的な失敗を犯してしまうが、最後には二人で美味しく仕上げることができて安堵するのだった。"
4146994927 = "花嫁修行その２：お掃除編"
1361337265 = "大和撫子になるための修行の一環として、今度は掃除を行うミモリ。掃除スキルを思う存分披露しながら楽しそうに掃除をする彼女に対し、掃除が好きなんだねと言葉をかけると、それを肯定しつつも「一人だったらこんなに浮かれたりしないですよ」と呟くのだった。"
2432518592 = "ひと針ひと針に、心を込めて"
4002112709 = "買い物に付き合ってほしいと頼まれ、先生はミモリと共に出かけることに。ミモリが買いに来たのはハンカチ。彼女は購入したそのハンカチに、今まで密かに練習してきた刺繍を施し、これまでの感謝の証として先生にプレゼントするのであった。"
4023636786 = "大和撫子の本気"
4253217632 = "料理修行の成果を見せるべく先生を修行部に招いたミモリは、散らかった家庭科室を掃除するためにエプロンを取り出す。そのエプロンは、ミモリが大和撫子を目指すと決めた時に買った思い出のエプロンなのだと語るのだった。"
2653666458 = "古書館の主"
407306471 = "外の人との交流にストレスを感じ、古書館に引きこもりながら生活を送るウイ。しかし彼女を心配して訪ねてきた先生にわずかながらも心を開き、少しずつ交流を始めるのだった。"
1710419489 = "行方不明の子は"
3020671650 = "他の部員が古書館の掃除をした際、蔵書のうちの一冊が行方不明になってしまったことに気づいたウイ。動揺するウイと共に先生は「その子」を探し、長い時間の末に見つけ出すことに成功するのだった。"
2628285155 = "突然の提案"
1721570820 = "ウイは先生との交流の手段として、一冊の白紙の本を用意する。持ち運ぶには大きすぎたそれは古書館に置かれ、先生と本の感想を伝え合うメッセージボードとなるのだった。"
4161300230 = "名前も無いまま"
1304365797 = "解読作業の疲れから先生に助けを求めたウイ。先生の持ってきたエナジードリンクのおかげもありどうにか仕事を終えると、そのまま眠りにつくのだった。"
1272486088 = "聖堂の管理者"
2112303416 = "ヒナタと先生は聖堂の倉庫で、汗だくになりながら共同作業にいそしむ。その結果、周囲の生徒たちからあらぬ誤解をされてしまったのだった。"
3466205653 = "過ぎたるは猶及ばざるが如し"
903624085 = "中々休みを取ろうとしないヒナタ。先生は彼女をやや無理に、人けのない場所へと連れていく。二人でゆっくりと休憩をしたのだが、またしても周囲の生徒からは誤解をされてしまったようだった。"
114552415 = "茂みの中で"
1527438767 = "ヒナタを探してうっかり部外者立ち入り禁止の区域へと入ってしまった先生。他の生徒に見つかりそうになり、咄嗟に二人は茂みの中へと隠れる。最終的にヒナタは茂みから出て行ったが、今回も生徒たちからは誤解をされてしまったようだった。"
4143765441 = "ピクニックに持っていくもの"
3753682808 = "休日を迎えたヒナタと共に、先生はピクニックへと出かける。穏やかな会話と手作りの弁当を携え、幸せな一日を過ごすのだった。"
709626164 = "風呂敷ピクニック"
1140812726 = "先生とピクニックに行くことになったヒナタ。用意した手作り弁当を広げようとしたところ、風呂敷に包まれていたのはお弁当ではなく「物品管理台帳」だった。混乱するヒナタに、先生は自作のお弁当を差し出し、一緒に食べながら「物品管理台帳」を読むのだった。"
2874669650 = "保安委員長の審問"
1738744695 = "給食部に保管されていたプリンが消え、その事件の調査をするマリナ。冴えわたる保安委員長の推理が導き出した最終的な結論は、マリナ自身が裏切り者のスパイであるというものだった。"
3135302426 = "保安委員長の推理"
690185550 = "プリンが消えた事件を追うマリナは、その犯人が鋭い爪と牙を持つ猛獣ーー子猫であると気づく。子猫におびえたマリナは銃を発砲して、チェリノ会長の像を破壊。粛清された。"
2102177857 = "保安委員長の掃除"
794361453 = "チェリノ会長の像を壊した罰として、トイレ掃除を行うマリナ。その姿は生き生きとしており、先生はマリナが清掃部にも向いているのではないかと気づく。その言葉を受けたマリナは清掃部の部長になるため、クーデターを画策するのだった。"
4222369533 = "保安委員長の誤解"
1309897125 = "貫禄の無さから保安委員長の身分を詐称していると疑われ、僻地の保安委員たちに逮捕されるマリナ。世間の評判とかけ離れた自分の実態に意気消沈するも、先生に励まされるとあっさりと復活するのだった。"
263371351 = "SRT、突入します！"
1824415151 = "突如としてシャーレにミヤコが突入。どうやら「怪しげな大人が女子生徒たちを連れて、とある建物に出入りしている」という噂を聞いて調査してみたところ、その建物がシャーレのことだったらしい。誤解は解けたものの、そのまま念のため怪しい物がないかと捜索するミヤコの手によって、様々な本が見つかってしまい……。"
2083034072 = "SRT、救出します！"
608640286 = "先生はふと商店街で、ペットショップで熱心にウサギを見ているミヤコに遭遇。自分たちの境遇を考えるとこの子のためには……と考えるミヤコだったが、先生が背中を押す。ミヤコは最終的に、頑張って愛情を込めて育てることを決心するのだった。"
1182641974 = "SRT、保護します！"
2986991819 = "ミヤコは先生と共にウサギの名前を考えつつ、その生態についての話をする。"
3552637652 = "SRT、降下します！"
47734010 = "ミヤコと先生は一緒に、ある作戦へと向かうことに。ヘリに乗って高いところから街を見下ろすミヤコは、思わずその様子に感嘆の言葉を漏らすのだった。"
4216668975 = "SRT、休憩します！"
2500254733 = "ミヤコのモモトークの内容が気になり、公園へと訪れた先生。何も無かったけど連絡してしまったと告げるミヤコと一緒に、先生は何でもないような大事な時間を過ごすのだった。"
392509450 = "SRT、思い出します"
2026533413 = "シャーレで自身の洗濯物を洗濯していたミヤコは、名札を落としてしまう。名札を拾った先生は、ミヤコからそれにまつわる思い出話を教えてもらうのだった。"
1943391112 = "北風と太陽"
1484545006 = "かなりの暑さにも関わらず、作戦中だからと絶対に鉄帽を脱ごうとしないサキ。体調のことも気になって、先生はどうにかサキに鉄帽を脱いでもらおうと様々な画策をする。しかしいずれの試みもすべて失敗してしまうのだが、当番の仕事が終わるや否やサキはあっさりと鉄帽を脱ぐのだった。"
3937121232 = "迷えるウサギ"
2072678078 = "RABBIT小隊の食事の足しにしようと、山菜を取りに出かける先生とサキ。何だかんだで時間が経ってしまい下山しようとするが、ふたりは山奥で迷ってしまうことに。そこでサキは読図法を用いて、何とか道を見つけようとするものの……？"
537552521 = "大は小を兼ねる？"
3736593165 = "フリーマーケットで「37mmシャベル迫撃砲」という珍しい火器を手に入れてきたサキ。革新的な武器だと鼻息を荒くするが、全体的にかなり錆びついている様子。とりあえず分解して整備をしてみるものの、結局その使いづらさに流石のサキも匙を投げるのだった。"
4158890334 = "準備OK"
2568213059 = "捨てられたキャンプ用品を拾いに行くため、サキと共に山登りをすることになった先生。しかし慣れない山歩きで、先生は肩を痛めてしまう。サキはそんな先生のためにパッドを差し出すが……？"
4041452924 = "ウサギと聖＜軍事＞書"
2079813724 = "サキがシャーレにしていた忘れ物は、SRT教範だった。サキは入学前から教範を愛読し、その後も時間を見つけては読み返しているらしい。先生が教範のページをめくると、メモ欄に先生とサキが出会った頃の日記が……。それを目の前で読み上げられたサキは、怒って先生の顔に「バカ！」と落書きをし、帰ってしまうのだった。"
3019246166 = "RABBIT4、隠れます"
636667611 = "アウトドアショップへと出かけたミユと先生。しかしミユはその体質のせいで周囲からあまり認識されず、いつものことながら落ち込んでしまう。しかしその体質のおかげでかえって野生生物からの警戒が少なく、凶暴で有名な猫とも触れ合うことができたのだった。"
332535311 = "RABBIT4、出動します"
291507910 = "仕事に集中していたこともあり、ミユが来ていたと気づくのに遅れてしまった先生。ふたりは話の中で、ミユの動きに連動して音が鳴るようにすれば良いのではと思いつく。しかしミユが身に着けたのが「鈴付きの首輪」だったために、各所で誤解が加速し……。"
810612864 = "RABBIT4、狙撃します"
716720190 = "しばらく正式な訓練が無いせいで技術が落ちたのではと心配し、ミユは先生と共に狙撃訓練を行うことに。先生が遠方に的を置いて戻ってくると、その存在感の無さのせいか、ミユの身体の上にたくさんの野生動物たちが集まっていた。しかし狙撃に集中しているミユは、それが先生のいたずらなのではと勘違いし……？"
485476395 = "RABBIT4、息抜きします"
751297374 = "ある日の休日、先生はしゃがみ込んで何かをしているミユを発見。話を聞いてみると、小石を集めるのが趣味なのだと言う。先生はミユと共に日が暮れるまで、一生懸命様々な小石を探すのだった。"
376395967 = "RABBIT4、思い出します"
652033454 = "カラスを捕獲するため、ミユと先生はビルの屋上に。しかし寒さのあまり体が震えてきた先生。ミユは先生のために、SRTの小隊員たちが用意していた温かいココアを渡すのであった。"
1540090706 = "修行部のマスコット"
181569107 = "修行部が変わり者扱いされるのが不満で、認識を変えるための活動をしなければと主張するカエデ。\rそんなカエデと様々な活動を共にしているうちに、先生はなぜ修行部がそんなことを言われているのかを微かに分かり始める。"
258942768 = "素敵なレディーになりたい！"
3935689214 = "カエデは「素敵なレディーは絶対に慌てないもの」だと言い、先生に自分を慌てさせてみてと言い出す。\r先生の様々な試みにも屈せず（？）何ともないふりをするカエデだったが、ヒーローショーの予約の前ではすっかりいつものドタバタな姿を見せてしまうのだった。"
1209493139 = "大人になりたい理由"
2992466081 = "先生の前で大人びた姿を見せようとした挙句、ちょっとした惨事を巻き起こしてしまったカエデ。それでも焦らずにゆっくり進めばいいとアドバイスをする先生の言葉に、カエデはすぐ元気を取り戻すのだった。"
1603342232 = "そして少女は素敵なレディーに"
1457617705 = "ムシクイーンの新しいパックを購入するため、様々な事件を乗り越えつつも売り場に到着したカエデ。しかしカエデは、そこに居合わせた遠方から来たらしい少女に最後の一つを譲ることに。その時、少し大人びた笑顔を見せるカエデの元に現れたのは……？"
1257661108 = "はじめての思い出"
302074546 = "ムシクイーンの限定カードスリーブを手に入れるため、カエデと一緒にポップアップストアを訪れた先生。カエデは大事にしているカードスリーブを先生に見せながら、ムシクイーンを好きになったきっかけについて話す。"
945039977 = "襲来するフロイライン"
2033857445 = "万魔殿の任務として、先生をそそのかすために来たというイロハ。しかし先生が彼女の提案を断ると、イロハはそれはそれで良いとシャーレのソファで横になり、本を読み始めるのだった。"
3918415703 = "誘惑するフロイライン"
2282933521 = "一緒にサボろうと先生を誘惑するイロハだったが、先生も中々簡単には折れない。最終的に諦めた様子のイロハは食事にでも行きましょうと先生に提案をする。それを先生が受け入れた瞬間、イロハは「先生をおびき出すことに成功した」と勝利の笑みを浮かべるのだった。"
3810393676 = "狡猾なフロイライン"
1746326246 = "忙しそうな先生の元を訪れ、仕事の話の流れから先生に買い物へ行こうと誘うイロハ。しかし彼女が購入するのはおやつやおもちゃなど、関係の無さそうなものばかり。どういうことなのかと聞いてみると、イロハは「別に仕事の買い物とは言ってない」とのこと。上手く先生に息抜きをさせることに成功したイロハは、静かに微笑みを浮かべるのだった。"
3329845713 = "微笑みのフロイライン"
3228138921 = "珍しくイロハがやってこないことに違和感を覚え、心配になった先生はゲヘナの万魔殿を訪れることに。そこでは戦車長として忙しそうにしているイロハの姿が。自分のことを心配してきたという先生の言葉を受けたイロハは、微笑みながら先生を自分の休憩スペースに案内するのだった。"
3855969483 = "追憶するフロイライン"
3093547927 = "忙しいと言うイロハのもとを不意打ち気味に訪ねた先生。休憩スペースの大掃除を手伝う中で、先生は1冊の本を見つけていた。イロハは、読書にハマるきっかけとなった本だと説明する。この日を境に、その本に新たな思い出が追加されるのだった。"
4280952109 = "忍者少女は気難しい"
3933870946 = "先生がお昼ご飯のカップ麺を作っていたその時、動画チャンネルのネタを探すためにシャーレへとやってきたミチル。話題があちこちへと飛ぶ中で先生もネタらしきアイディアを出してみるものの、どうやらミチルの変なスイッチを押してしまったようで、そこから3時間にわたってミチルから忍者について講義を受けることに。カップ麺は伸びてしまった。"
3951006407 = "忍者少女は止められない"
3104593350 = "先生がカップ麺を作っていたある日、ミチルがシャーレへと飛び込んでくる。バズりそうな動画のアイディアが思いついたからと豪語するミチルに先生は連れていかれ、またしてもカップ麺は伸びてしまう。"
4128417300 = "忍者少女は隠さない"
947593483 = "先生と一緒に忍者グッズのお店を訪れたミチルは、忍者をバカにする問題児たちに出くわしてしまう。初めは怖がっていたミチルだったが、忍者を馬鹿にされることに耐え切れずその場を飛び出し……？"
3245340691 = "忍者少女は輝きたい"
1828893364 = "ミチルは新しい動画を撮るために、先生を公園に呼び出す。彼女は新しく自作した忍術「忍法・キラキラファイアーの術」を先生に披露してくれるのだった。"
3894779452 = "忍者少女は覚えててほしい！"
2435971928 = "ミチルが昔から何度も見返した大切なビデオテープ。その中には、彼女が忍者を志すようになったきっかけの作品が入っているという。いつでも鑑賞できるようにとビデオのバックアップをしようとしたところ、テープが古すぎて復旧ができなかった。悲しみに暮れるミチルだったか、気を取り直して先生と共に忍具店へと向かうのだった。"
650560128 = "一人前の、忍者に……！"
2949122187 = "どうすれば一人前の忍者になれるのかと悩むツクヨに対し、先生はまずは一番得意なことを練習するのはどうかとアドバイスをする。その言葉を受けたツクヨは得意とする「身代わりの術」を披露し、先生を驚かせるのだった。"
251220476 = "悪くないかも、です"
3420245975 = "自らの体躯にコンプレックスを抱えるツクヨ。しかし先生はそんなツクヨだからこそ、他の人には見えないものが見えるかも知れないと口にする。その時、ちょうど聞こえてきた迷子の声を拾い上げ、ツクヨの高い目線を活かして見つける事に成功。無事に姉と再会できた迷子を見送り、ツクヨは自分の体格も悪いことばかりではないと少しだけ思うことができたのだった。"
782301528 = "立派な、くノ一に……！"
2486610304 = "「くノ一」という立派な忍者になれる本を見つけたツクヨは、その本の内容を先生と一緒に試してみることに。色々と試していくうちに、本に書かれた内容が実はくノ一風のお色気術に関する本であって、忍術の書ではないことに気づいたツクヨは、慌てて先生の前から姿を隠してしまうのだった。"
2449832284 = "忍者として、活躍するチャンス……！"
2775750975 = "以前迷子になっていた少女と再び邂逅した先生とツクヨ。どうやら今度は犬が逃げてしまったとのことで、これまで鍛えてきた忍者の能力を活かして子犬を探してあげると約束する。やがて無事に子犬の探し出すことには成功したのが、その過程でツクヨは狭い道に挟まってしまい……？"
393436108 = "肉体という檻"
445636691 = "どこか危うい雰囲気を纏うミサキを放っておけず、彼女の用事に付き合って高層ビルの屋上についていく先生。その用事を終えて帰ろうとしたその時、突然エレベーターが故障してしまい……エレベーターに閉じ込められたミサキの表情はどんどん険しくなっていくのだった。"
2021138019 = "ままならない身体"
2328210988 = "親睦を深めるため、散歩に出かけたミサキと先生。散歩中ずっとマスクを外さないミサキに理由を問いかけ、ミサキが花粉症だと答えようとした瞬間、くしゃみが止まらなくなってしまう。自分の意志でままならない身体に対し、ミサキは毒づくのだった。"
275908656 = "綺麗にならなくても"
3575999017 = "ひどい風邪を引いてしまったミサキを、先生は近くのオフィスで休ませ、看護をする事に。脆弱な身体を悲観しつつも、先生が来てくれたことにホッとするミサキ。今までは何に対しても興味がなかったけれど、先生と関わることで生まれた感情に苛立ちを覚えながら、少しだけ前を向くのだった。"
495675616 = "刻まれた思い出"
4070608128 = "カバンを忘れて困ってしまったミサキ。先生はミサキと共にカバンを探し……無事見つけることができた。そこで、ある木彫りを見つけ……。"
4128473246 = "少女はそれでも読んでいたい"
2241310795 = "無法地帯の電柱に登って、こっそりスマホの充電をしようとしていたヒヨリ。流浪の身では充電一つするのも大変なのだと涙ながらに語る彼女に、先生は使い捨てのバッテリーをプレゼントし、「危ないから電柱には登らないでほしい」とお願いするのだった。"
1210605930 = "少女はそれでも諦めない"
3115826030 = "捨てられている雑誌の中から、珍しいファッション雑誌を見つけて喜ぶヒヨリ。こういった雑誌を集めるのが趣味なのだと語る一方で、生活のために一部のコレクションを先日燃やしたばかりだともぼやく。背に腹は代えられないのだと。続けて、古い救急箱を手に入れたからこれからはお腹を壊しても大丈夫なのだと彼女は語る。そんなヒヨリに、先生は新しい薬を買い与えるのだった。先生から物を買ってもらう事を禁じられているヒヨリは、何故か開き直って雑誌の最新号もねだる。こうしてアリウスメンバーに対しての秘密が増えていくのだった。"
1808891171 = "少女はそれでも知っていたい"
2121001156 = "廃墟の水を飲んでお腹を壊してしまったヒヨリを、先生が病院に連れて行くことに。入院してどうにか快復したヒヨリは、先生が買ってきた雑誌の最新号で、魅力的な人のおへそに関する記事を読み、先生に自分のおへそが他人と違っておかしいのではないかと涙ながらに語り始めるのだった。"
3481010754 = "廃墟の中のお姫様"
406981505 = "放置された廃校にしばらく留まる事になったアリウス一行。各々が用事で出かけてしまい、暇な時間を持て余していたアツコは、他の生徒に内緒で先生を呼び出し、「学校ごっこ」を始めるのだった。"
2090305712 = "真夜中の学校"
3848876286 = "深夜、誰もいない学校に忍び込み、前回満足にできなかった学校ごっこを続けるアツコ。先生と一緒に平凡な学園生活を夢想しながら歩き回り、充実した時間を過ごす。けれどその時間は長くは続かない。アツコがめいっぱいの日常を堪能しようとした瞬間、無情にも不審者の侵入を告げる警備の音が夜闇に響き渡るのだった。"
835240471 = "街の花園"
3161846637 = "アツコから花を趣味にすると聞いた先生は、切り花をプレゼントする。アツコは、そうではなく本当は花壇づくりをしたいという意味だったのだと笑いつつ大切そうに花をしまうと、往来の片隅に作った秘密の花園に先生を招待するのだった。"
1871057734 = "今よりもっとたくさん"
4152512206 = "豪雨のせいで花壇の花が全て枯れ、自分のせいだと落ち込むアツコに対し、先生はこれから一緒に花のことを学んでいけば良いと告げる。その言葉に、アツコは前を向いて力強く頷くのだった。"
3907252919 = "ただあなた様のため"
2694524553 = "夏がきたというのに、花火大会の準備で仕事漬けの先生を心配したワカモは、「完璧な夏の思い出」を作ろうとシャーレにやってくる。けれど、先生にとっての「完璧な夏の思い出」を計画できる自信がないのだと告げ、先生にやりたいことを聞き出しては物騒な解釈をしては実行に移そうとし……。最終的に、シャーレで一緒に仕事一夜漬けを行うことで事なきを得るのだった。"
3209742349 = "ただ約束を守りたくて"
3701725789 = "「完璧な夏の思い出」計画は終わっていなかった。先生のやりたい事を心残りに思っていたワカモは、先生とデートの「約束」を取りつける。けれど、デートをする度に先生はタイミング悪く花火大会の準備トラブルで呼び戻されてしまい……。デートを邪魔され続けたワカモはついに、先生を何度も呼び戻す花火大会の存在がなければいいのだと、倉庫の爆破を決意する。倉庫で暴れるワカモを前に、先生は強く叱責するのだった。"
239637834 = "焚き火のそばでちらつく心"
1035672286 = "中途半端に終わってしまった「約束」を覚えているかと問いかけてくるワカモに、仕事が終わるまで待って欲しいと先生は返す。その後、連絡を入れるも返事はなく、天気は徐々に荒れていき……ワカモを探そうと暴風雨の中駆け出すと、そこには「約束」を守って野ざらしの中、ひたむきに自分を待ち続ける彼女の姿が。雨風で冷え切ってしまったワカモを温めるべくたき火を起こし、二人は穏やかな時間を過ごすのだった。"
850282751 = "刻まれたのは純情"
765356607 = "浜辺で過ごすワカモと先生。ワカモは、自分が唯一心を許した先生と過ごせれば十分……と語るが、相合傘をしたい気持ちを隠しきれない。その後、勇気を出して相合傘を敢行したワカモは、記念に自分と先生の名前を傘の柄に刻み込むのだった。やすらかな時間は、現れた海岸警備隊に阻まれるが、そこから二人は愛の逃避行へ――"
4061302182 = "たまにはこういう日も"
54589100 = "先生をピクニックの下見に誘うノノミ。荷物を持つと伝えても大丈夫と言って憚らない彼女に対し、先生は荷物にない飲み物が欲しいと伝える。ノノミが飲み物を取りに行っている間にピクニックの荷解きを代わりに行い、ノノミを甘やかすことにするのだった。"
1859398185 = "ココナッツ採りに挑戦"
3014898155 = "他のメンバーが作業終わりに美味しいココナッツジュースが飲めるようにと、森にココナッツ採りにきた先生とノノミ。脚立がないからミニガンで落とそうとするも、うまくいかず……先生の肩車で背の低いヤシの木を狙うもバランスを崩してしまう。それも良い経験になったとノノミは笑うのだった。"
2542756039 = "砂上に輝く星"
3336596639 = "夜も更けた頃、先生があまり寝付けずに海岸を散歩していると偶然ノノミと出会う。帰る日が近づくにつれて切ない気持ちが強くなっていくのだと笑うノノミに、先生は輝く星の海を見せるのだった。"
4024412057 = "遊ぶという事"
1633675291 = "無人島の倉庫でお宝を見つけたとはしゃぐアヤネ。せっかくバカンスに来たのだから、遊んだほうが良いのではと思っているアヤネに対し、倉庫で「宝探し」をして遊んでいたんじゃないかなと先生は笑いかける。その言葉に勇気づけられたアヤネは、先生と二人で倉庫内の「より使えそうなもの競争」を行い楽しむのだった。"
549604868 = "布団の中のアヤネ"
4017885026 = "先生の元にアヤネから謎の文字化けモモトークが届く。不審に思いアヤネの部屋を訪れると、そこには普段の真面目で毅然とした態度とは真逆の、布団にくるまって駄々をこねる子供のようなアヤネの姿があった。先生がアヤネに声をかけるも、それをセリカと勘違いし続けたアヤネは……。"
1876616731 = "焦っていた理由"
2850828647 = "一人、炎天下でヘリの修理をしていたアヤネは、体調不良で倒れてしまう。ちょうどアヤネに工具箱とネジを持ってくるよう頼まれていた先生は、アヤネを休ませ、代わりにヘリの修理を請け負うことに。日が暮れて、体調が回復したアヤネと、修理の進んだヘリの記念写真を撮って、進捗を祝うのだった。"
979430574 = "隠されていた島の宝物"
3579191394 = "リゾートの空き部屋でガイドマップを見ていたホシノは、過去に誰かが使っていた冊子を探すのが楽しいのだと笑う。曰く、誰かが書き込んだガイドマップは「宝の地図」でもあるのだと。そうして、先生とホシノは「宝の地図」を頼りに探検を進め、絶好のお昼寝スポットを見つけるのだった。"
117700283 = "産地直送の新鮮な食材"
2728239546 = "ホシノからモモトークでSOSをもらった先生は、海の幸を一緒に取ることに。押し付けられて始めた仕事だったけれど、海の幸が豊富に取れる事にホシノは終始楽しそうにはしゃいでいた。それを先生が指摘すると、他の子には言わないでね、とはにかむのだった。"
3326990624 = "その中を見ることはできずとも"
2625437651 = "砂浜に座って水平線を眺めるホシノを見つけた先生。アビドスには「海」がないから、不思議だと語るホシノと一緒に水平線を見つめていると、水面を跳ねるボラの群れが通り過ぎていく。その光景にはしゃぎながら、いつかは鯨が跳ねるところも先生と一緒に見たいな、とホシノは笑うのだった。"
2766807234 = "私、成功しちゃいました！"
739359557 = "各リゾートとのFC契約で過去最高の売上を達成したと胸を張るシズコ。この勢いでキヴォトス全土に百夜堂の名前を轟かせるのだと息巻く彼女に、先生はFC化によって今までの百夜堂のサービスがないのは少し寂しいと伝え、シズコが無理をしているのではないかと心配する。予想外の言葉を受けて、シズコは混乱のままに駆け出していくのだった。"
1341349068 = "結局、何のためでしたっけ？"
2467605046 = "雑談をしたいと先生を呼び出したシズコ。各FC店を見て回った所、お客さんの反応が芳しくないのだとぼやく。このままでは百夜堂のピンチだと嘆く彼女に対し、先生はどうしてお祭り運営委員会をやっているのか、百夜堂を始めているのかを問いかける。それは――お客さんの笑顔のためだと初心に返ったシズコは、前を向いて決意を新たにするのだった。"
1344506803 = "私、すっごい欲張りなんです！"
3607288038 = "先生に見せたいものがあるのだと呼び出したシズコ。海の家で百夜堂のサービスを受け、百夜堂らしいサービスで良いと笑う先生に、シズコは初心に立ち返れたのは先生のおかげだと感謝の言葉を伝える。そして、やりたい事や欲しい物を全て手に入れ、叶えてみせるのだと笑うのだった。"
32910525 = "イズナと一緒にスイカ割り！"
1822618449 = "海に適した忍びになるべく修行をしたいと言い出したイズナと共にスイカ割りをすることになった先生。しかし、なかなかうまく割ることができず、一日中修行を続ける事に。ようやく割れた後、2人でスイカを美味しく食べたのであった。"
3631402519 = "イズナと一緒に砂遊び！"
1116374148 = "再び浜辺で海の忍びになるための修行を始めるイズナと先生。水泳の修行をしないかと問いかけるも、イズナは話をそらして砂のお城を作りたいと告げる。そうして、幾度の失敗を重ねながら一日かけて砂のお城を作り上げるのだった。"
605429618 = "イズナと一緒に危機一髪！"
3019377752 = "今度こそ水泳の修行をしないかと提案する先生を遮って、イズナは砂風呂の修行をしたいと告げる。砂の中から飛び出して活躍する時代劇の再現ができるようになりたいのだと。そうして、砂を大量に盛られたイズナは、砂風呂の心地よさにそのまま眠りにつくのだった。"
3379580703 = "イズナと一緒に手を取り合って"
1012117113 = "イズナが水泳を避けている事に気づいた先生は、泳ぐのが嫌いなのかと問いかける。イズナは困ったように笑い、泳ぐことができない事を知られたら先生に幻滅されるのではないかと告げる。そんな心配をする必要はないと先生は笑い、イズナに水泳を教えるのだった。"
1530413232 = "きらきらを見つけたい"
340837813 = "「キラキラしたものを探して成長したい」と告げるチセに呼び出された先生は、浜辺で一緒にキラキラしたものを探すことに。浜辺で様々なものを拾い集めては、海はキラキラしたもので溢れているのだと笑うチセ。けれど、自分の中ではまだもうひと押し足りないのだと首を傾げるのだった。キラキラと探す夏休みは、まだまだ始まったばかり。"
416881010 = "見せたいもの"
4275087180 = "キラキラ探しをしている最中に見つけたすごいものを見せたいのだと先生を呼び出すチセ。案内されるままについていくと、そこは一面に亀がいる一角だった。甲羅が太陽光を反射する姿がキラキラして綺麗だと笑うチセと共に、再びキラキラ探しを続けるのだった。"
3101350732 = "きらきらの在り処"
2121093664 = "チセから様子のおかしいモモトークを受け取った先生。自分に近づくと呪われてしまうと怯える彼女からよくよく話を聞くと、「不幸の手紙」を拾ったのだという。そんなものはデタラメだと証明するため、先生はチセと共に過ごすことを決め、無事その期間を乗り切ることに成功する。何事もなかったと笑い合う中、チセは先生のおかげで夏休み中ずっと探していたキラキラを見つけることができたと微笑むのだった。"
1812069520 = "思い出の宝箱"
3667309469 = "海辺にいるチセの元へ訪れた先生は、様々な海の思い出をポーチにつめているところに出会う。ポーチの中身は様々で、そのすべてに思い出が詰まっているから陰陽部のみんなに見せるのだとチセは張り切っていた。そうして思い出を詰めたチセは、先生も一番の思い出であると笑い、ポーチに詰めようとするのだった。"
3499466219 = "独り立ち"
1404779164 = "サオリから連絡を受けた先生はブラックマーケットでサオリの身元保証人になる事に。曰く、お金を稼ぐために、まず口座が必要なのだと。所属する学校もなく、スクワッドはバラバラになっているため頼れるのは先生しかいないのだとサオリは告げる。サオリのためなら、と身元保証人を引き受けたものの、銀行員はそれだけでは足りないとマーケットガードを呼び出して実技試験を始めるのだった。"
1353600712 = "見落とし"
2747481849 = "サオリの様子が心配でブラックマーケットを訪れた先生。無事口座を開設できたから依頼をこなしていると言っていたものの、契約書を交わさずに働いていた関係で給料をもらえずにいた。その現場を目撃した先生は、依頼者に抗議をするも、遡っての支払いはできないと告げられる。先生の介入によって、どうにかその日分の給与を得たサオリは、契約書を交わすことの大切さを噛みしめるのだった。"
1647392473 = "自責の念"
18924281 = "今度こそちゃんと契約書を交わしたと告げるサオリ。しかし、その契約書の内容はサオリ一人で敵対組織と戦うというひどい内容のものだった。怪我を負ったサオリを見つけた先生は、手当の後、これから契約書の勉強をしていこうと告げてラーメンを食べに連れて行くのだった。"
4249397029 = "虚しいものなどない"
3781866017 = "サオリのマスクが壊れてしまい、共に修理業者を探すことになる先生。だが、規格の古いマスクを直せる者はなかなか見つからない。「今ではこのマスクもスクワッドの一員のように感じられる」と語るサオリの気持ちに応えるため、先生はサオリと共に、試行錯誤を重ねてマスクの修理を成功させるのだった。"
2097037032 = "Collateral Damage"
1238978732 = "先生の要請でこそ泥の検挙を手伝うことになったモエ。遠赤外線追尾式ドローンで犯人を逮捕することに成功するも、モエは衝動に耐えられずミサイルを発射し……街をめちゃくちゃにしてしまう。どうしてミサイルを発射したのかと問いかける先生に対し、モエは自身には破滅願望があるのだと告白するのだった。"
3925224064 = "Missing in Action"
3963871333 = "不慮の事故により、業務データを全て飛ばしてしまった先生の元に、モエが仕事の手伝いに来てくれる事に。モエのお陰で予想以上に早くデータの復旧ができたものの、作業が終わった後に見つかった「緊急用リセットボタン」をモエが押してしまい……全てが元の木阿弥になってしまったものの、モエが用意してくれたマクロのお陰で事なきを得たのだった。"
3909715798 = "Unexploded Ordnance"
3002018408 = "当番のためシャーレにやってきたモエ。先生は外出の間の留守をモエに任せる事にするも、何にも触らないようにと言いつけていく。しかし、破滅願望が強いモエがそれを聞くはずもなく……モエはデスクのそばにあった大きな赤いボタンを衝動的に押してしまい、緊急用シャワーのボタンを作動させて全身びしょ濡れになるのだった。"
1642348824 = "Phase Line"
1120991900 = "RABBIT小隊の物資整理を手伝うべく子ウサギ公園を訪れた先生。普段と違い、危険物を前にしても淡々と業務をこなすモエに、先生がいつもと様子が違うね、と問いかけると、モエは胸のうちに秘めていた破滅願望の話をしてくれるのだった。"
1771630708 = "Claymore, Claymore, Claymore！"
279334293 = "最近運動不足だという話をしたモエと先生。 決意の微笑みを浮かべてモエが取り出したのは···… 発射装置？"
1230115544 = "補習授業とスイーツ"
3289098080 = "カズサに呼び出され、カフェで再試の勉強を手伝う事に。勉強を見てもらうのだから、ここは奢るといって憚らないカズサに対し、先生は勉強が終わった後にスイーツを奢り、お互いに甘いものを分け合って楽しい一時を過ごすのだった。"
446030069 = "こう見えても放課後スイーツ部の一員"
4084141263 = "バス停にいるカズサと偶然会った先生。バスを待つ間、ジュースやお菓子を食べながら談笑するのだった。"
2391083433 = "バッドタイミング"
3086413285 = "コンビニでカズサを見つけた先生。けれど、カズサは先生に気づく素振りもなくむしろ避けるような動きをしていて……心配になってカズサを追いかけ回すと、実はすっぴんだから先生に顔を見られたくないのだと告げられる。すっぴんでも気にしないのにと笑いながら、先生はカズサと談笑するのだった。"
2135718946 = "猫舌"
2285653641 = "シャーレにお菓子を持って現れたカズサ。「フォンダンショコラ」を買ったものの、熱くて食べられなかったのだと先生に告げる。熱いものが食べられないのは猫みたいだねと笑いながら、先生はフォンダンショコラを食べるのだった。"
432381563 = "ココナちゃんじゃないです。教官なんです！"
3385540554 = "ココナに教官をやっている姿を見に来て欲しいと誘われて梅花園を訪れた先生。そこには、園児たちに「ココナちゃん」と呼ばれて親しまれているココナの姿があった。しかしココナ本人としてはどこか不満げで……。"
377170606 = "子どもではありません。レディーなんです！"
1059419902 = "山海経での仕事を終え、シャーレに帰る途中で先生はココナと偶然出会う。先生が買ったコーヒーに興味を示すココナは、「大人の味」に挑戦すべく飲んでみることに……しかし、苦すぎて飲むことができずべそをかくココナを先生は宥めるのだった。"
3736806188 = "いくらなんでも嫌なものは嫌なんです！"
661652410 = "山海経市内でココナと会った先生は、どうすれば園児から「教官」と呼ばれるのだろうかと相談を受ける。先生はまずは好き嫌いをなくしてみたらどうかと伝え、美味しいニンジンのお店に一緒にいかないかとココナを誘うのだった。"
1888100604 = "……今回だけですよ。本当ですよ？"
3679415033 = "先生と一緒にニンジン専門店に来たココナ。あちこちにあしらわれているニンジンモチーフに拒否反応を示すものの、出てきた料理の味に舌鼓をうち、美味しそうにニンジン料理を食べきるのだった。"
2090247752 = "情熱の学ラン"
3930023682 = "シャーレに白衣を忘れてしまったウタハに、白衣を届けるべくエンジニア部を訪れた先生。そこには学ラン姿で作業を進めるウタハの姿があった。意外と動きやすく、大運動会の情熱の香りも感じられるからこの格好も良いものだと笑うウタハ。学ランからウタハの香りがすると先生が笑うと、意味を取り違えたウタハは慌てて白衣に着替え直すのだった。"
492464550 = "情熱のマスゲーム"
3765296963 = "大運動会以降、応援ロボットの作成依頼が多く舞い込んできているのだと語るウタハ。その試作品のお披露目を見るために先生がエンジニア部を訪れ、色付きのカードを掲げて応援するロボットによるマスゲームとウタハの応援を堪能するのだった。"
4280790550 = "情熱の応援魂"
2043768612 = "依頼された応援ロボットが期限内に間に合わないということで、ウタハ自身が応援ロボットの代わりに様々な人の応援を行うことに――。"
2208070431 = "情熱の応援歌"
1265896640 = "エンジニア部の部員が最近元気がないと心配したウタハは、先生をカラオケに誘って自作の歌を披露する。エンジニア部のテーマソングでもあるこの歌で、部員たちを励ましたいのだと笑うウタハとは対照的に、歌詞と曲は予測不能の流れを見せていくのだった。"
3318658421 = "セミナー書記ノアの細やかなる記録"
436248350 = "当番のためにシャーレを訪れたノア。個人業務以外は終わっているから、ゆっくりしていてという先生の言葉に困惑しながらも、書記として先生の行動を記録することに――先生はあまりにも細やかな記録をつけられ、仕事があまり手につかなくなるのだった。"
465908990 = "セミナー書記ノアの意地悪な観察"
2289102291 = "ノアのポーカーフェイスを破るべく、ノアの行動記録をつけることにした先生。そんな先生に、ノアは離席していた間の変化を問うクイズを出題してくる。結局、一枚上手のノアに敵うことはなく、先生はノアのためにコーヒーを淹れるのだった。"
773232047 = "セミナー書記ノアの平凡な日課"
604699670 = "ミレニアムの業務を終えて立ち寄ったカフェでノアを発見した先生。書類の束に囲まれたノアは、新たに出願された発明特許を鑑別しているのだという。特許に関する話を交わしながら書類を整理する最中、彼女は先生に関する興味深い特許を見つけ――。"
3466815831 = "セミナー書記ノアの退屈な休憩"
706439484 = "突然の夕立で面談がキャンセルになった先生は、ノアの様子を見にセミナーの会議室へと足を運んだ。先生の訪問に驚きながらも、ノアと先生は雑談を交わし、窓ガラスに文字を書いて穏やかな一時を過ごすのだった。"
3426454651 = "マイスターの密やかな趣味"
4103016827 = "シャーレ近くの市場で生地を選んでいたヒビキと偶然会った先生。ヒビキはコスプレに使う生地を選びに来ているのだと笑い、衣装製作のこだわりについて熱く語るのだった。"
4119985251 = "マイスターの熱烈な応援"
1355940963 = "突然の停電で作業データが消えてしまい、深夜遅くまで作業をすることになった先生の元に、チアリーダー衣装のヒビキが訪れる。先生を応援するためにやってきたのだと告げ、応援をしてくれるものの、逆に作業に集中できなくなってしまうのだった。"
2694245452 = "マイスターの殺伐とした応援"
3127541435 = "前回の応援であまり作業効率が上がらなかった事を反省したヒビキは、先生の効率を上げるべく特製のワープロを用意してくれる。しかし、それは作業の手を止めると自爆する機能がついた諸刃の剣で――先生は、自爆の脅威と向き合いながら作業をする羽目になるのだった。"
162351076 = "マイスターの優しい子守唄"
484928347 = "自爆機能付きワープロの反省を活かし、新しい発明品を持ってきたヒビキ。集中力を持続させるためには、十分な睡眠が必要なのだと告げて、自分で歌った子守唄を吹き込んだBluetoothスピーカーを渡してくれる。その日は、ヒビキの発明品のおかげでぐっすり眠ることができるのだった。"
2702026288 = "Case1. ウサギですよ？"
3571189559 = "モモトークで謎の持論と新しい見解を得たと語るアカネに、時間があったら部屋に立ち寄ってほしいと告げられる。訪れた先生を待っていたのはバニースーツに身を包んだアカネだった。バニーガールも奉仕のために作られた存在なのだから、この格好で先生に奉仕をしたいと微笑むアカネに対し、社会的な死を覚悟した先生は急用を思い出して逃げ帰るのだった。"
4078232729 = "Case2. ゆっくり休んでください"
4204404808 = "書類の山との戦いを終えた先生の前に、バニー姿のアカネが現れる。なにかご奉仕できることはないかと問いかけてくるアカネと共にシャーレの掃除をすることに。そうして部屋を綺麗にした後、アカネに淹れてもらったお茶を飲んで、先生はゆっくりと眠りにつくのだった。"
1635582478 = "Case3. 勉強の時間ですね？"
4058993158 = "市内を歩いていると、バニー姿のアカネと偶然出会う。曰く、ずっと先生が来るのを待っていたのだとか。周囲の視線から逃れるように入ったカフェがバニーガールのコンセプトカフェで、アカネは先生の造詣の深さに感激するのだった。"
482869814 = "Case4. 一日秘書、待機中です"
607709933 = "遅くまで仕事を片付ける先生が、ふとこぼした独り言を拾って、コーヒーを差し出すアカネ。彼女がいるとは思わずに驚きながらも、コーヒーを受け取り、先生は最近アカネがずっとバニー姿でいる理由について問いかけるのだった。"
3585267607 = "朝のジョギング"
1396278568 = "早朝、散歩をしていると公園でユウカと偶然出会った先生。聞くと、もうすぐ行われる晄輪大祭に向けて体力づくりをしているのだとか。ユウカと共にランニングをすると、ユウカはすぐに体力が切れてしまう。ショックを受けている彼女に対し、先生はまずはジョギングから始めていこうと笑いかけるのだった。"
737635945 = "科学的な料理の秘訣"
2573899798 = "晄輪大祭の期間中、校内のカフェテリアが閉鎖されてしまうため、お弁当作りをしようと意気込むユウカ。料理の経験はないという彼女の言葉に、手伝うべく家庭科室を訪れ――そうして、ユウカのお弁当作りを見守るのだった。出来上がったお弁当を夜食に食べると、冷えてしまっているはずなのにどこか温かい味がした。"
2174568177 = "理性的な応援文化"
1860377927 = "晄輪大祭の件でシャーレを訪れたユウカは、先生の業務が終わるまでの間、テレビで中継中のミレニアム野球部の試合を見ることに。ユウカは、試合結果に一喜一憂するのは正しい応援客の姿とは言えないと語るも、野球部の白熱した試合に熱中して、思わず力のこもった声援を送るのだった。"
670142544 = "スポーツカード"
3586706266 = "晄輪大祭も無事終わり、業務協力報告書を持ってシャーレを訪れたユウカ。しかし、先生は不在で、机の上は散らかっていた。掃除ついでに整理していたところ、ユウカの隠し撮り写真を見つけてしまい――戻ってきた先生から、それがクロノススクールから発売されているスポーツカードだと聞いたユウカは、先生のためにサインをしてくれるのだった。"
4024156221 = "慣れない装い"
3987667853 = "マリーからの相談を受け、トリニティ大聖堂の準備室を訪れた先生は、そこで体操服を着たマリーに出会う。普段慣れていない格好であること、また、あまり運動が得意なわけでもないのに大運動会の実行委員として参加することに不安を覚えるマリーに対し、先生は優しくアドバイスをするのだった。"
1051695137 = "ベンチの片隅の修道女"
343809718 = "晄輪大祭の最中、人助けに奔走しすぎて力尽きてしまったマリー。そんなマリーに対し、先生は周囲の手も借りるようにと伝え、そんな風に人の手助けばかりで楽しめているのかと問うと、マリーは大運動会の競技が楽しかったことを嬉しそうに語るのだった。"
2123351407 = "マリーのお礼"
720252404 = "トリニティ大聖堂の私有地を歩いていた先生はジョギングをしているマリーに会う。晄輪大祭をきっかけに、運動の楽しさに目覚めたのだと嬉しそうに語るマリー。先生は、そんなマリーのジョギングを見守る事にするのだった。"
1478340410 = "成長し続ける身体"
2793860415 = "大運動会に関して相談があるとハスミから連絡を受けて、トリニティを訪れた先生。そこには、ファスナーがうまく上がらずに悪戦苦闘するハスミの姿があった。曰く、去年まで着ていたジャージが成長したせいで入らなくなってしまったのだとか。無理に着ないで発注したらとアドバイスをするも、今注文しても大運動会には間に合いそうにないとの事。そうして、中途半端な状態のまま協議を進める事になるのだった。"
1830803246 = "レモンのはちみつ漬け"
3363601715 = "ハスミからお礼をしたいと家庭科室に呼び出された先生。晄輪大祭で忙しくなるであろう正義実現委員会の後輩のために手作りの「レモンのはちみつ漬け」を作っていた。先生は出来上がった「レモンのはちみつ漬け」を一緒に瓶に詰め、いくつかもらって帰るのだった。"
2317643333 = "自己管理"
3356412026 = "晄輪大祭当日、昼食にハスミはダイエットメニューを食べていたものの足りるはずもなく。周囲から聞こえる食べ物の話の誘惑と戦っていた。そんなハスミに対し、先生は持ってきていた「レモンのはちみつ漬け」を分けて食べようと提案する。ハスミは少しだけもらう事にしたものの、食べ始めると止められず全てを食べ尽くしてしまうのだった。"
1424445415 = "姿勢矯正"
2368675001 = "ハスミと運動の約束をした先生は、体育館を訪れる。そこで、ハスミのお手本を見ながらストレッチをしたり、ハスミのストレッチを手伝うなど交互に楽しく柔軟運動をするのだった。"
2829913152 = "天才ハッカーの嗜好"
2128267029 = "先生が休日だと知ったヒマリは、先生を隠れ家に招待し、一緒にゆったりとした一時を過ごす事に。そのうちに、ヒマリは自分のリクエスト曲を流すべく校内放送をハッキングし――ミレニアム校内にヒマリのお気に入りの曲が流れるのだった。"
1584830152 = "天才ハッカーの実験"
1591221981 = "先生は、ヒマリと約束した時間に遅れないよう向かうものの、なぜか様々な事故に巻き込まれてしまう。なんとか乗り越えて到着したところ、全て雑誌の占い欄で読んだことを試すべくヒマリがやったのだという。真実を知った先生はヒマリにお説教をするのだった。"
829552681 = "天才ハッカーの反論"
711052487 = "ヒマリから「大変なことになってしまった」と連絡を受けた先生は急いでミレニアムを訪れる。そこで見せられたのは、ヒマリに関してのゴシップ記事だった。記事の内容を訂正すると息巻いたヒマリは、先生と共に映像を撮るも、加工を重ねたその映像をハッキングして送ったため、別の波乱が巻き起こってしまうのだった。"
2037364016 = "天才ハッカーの繊細なセミコロン"
2533708593 = "特別な宝物を手に入れた、とヒマリは先生に限定版妖怪MAXを見せてくれる。そして、これを美味しく飲む方法を教えてもらったのだと笑って、缶を振り続け――その瞬間、缶が爆発し、全身べとべとになってしまい……。先生は、そんなヒマリの身体をタオルで拭いてあげるのだった。"
4205919598 = "さりげなく"
785035510 = "レッドウィンター連邦学園での仕事を終え、シグレに会いに旧校舎へ立ち寄った先生。彼女から渡された飲み物を口にすると、水ではなくウォッカだった。曰く、冷蔵庫が故障してしまって、それ以外の飲み物が凍ってしまっているのだとか。そう言いながらウォッカを差し出すシグレからボトルを取り上げ、悪びれないシグレと共にウォッカを燃料に凍ってしまった飲み物を溶かすのだった。"
2971103393 = "しれっと"
3404545130 = "レッドウィンター連邦学園に来る時はガイドをつけるようにとシグレに警告されていたにも関わらず、先生は雪山で遭難してしまう。幸い、シグレと会うことができたものの、アドバイスを聞かなかったことを叱られる羽目に。そうして、凍えて動けなくなってしまった先生は、シグレに背負われながら無事下山を果たすのだった。"
720127695 = "まったりと"
1882526035 = "シグレに雪山で助けてもらったお礼として、繁華街のレストランに招待する先生。シグレと共に穏やかな時間を楽しんだ帰り道、彼女は自分だけこういった厚意をもらうなんてノドカに悪いと心情を漏らす。次は旧校舎のみんなも一緒にと先生が言うと、シグレはいたずらっぽく笑うのだった。"
4186219493 = "素直に"
273193773 = "シグレは、先生からのお礼のお礼を返すべく料理を振る舞うこと。シャーレの調理実習室に持ち込まれたものすごい量のジビエに、先生は驚かされる。そして、またもや料理にウォッカを入れるシグレを見て、先生は彼女の代わりに料理を仕上げる羽目になるのだった。"
3572546902 = "サンタのセリナ"
3496257221 = "クリスマス当日、セリナと共に子どもたちにプレゼント配る先生。無事配り終え、セリナが昔はサンタを信じていたのだという話を聞いていると、雪が舞い始める。寒そうにしているセリナに対し、先生はサンタさんにもご褒美をあげないとね、と笑いながらマフラーをプレゼントするのだった。"
2512788767 = "マフラーのお礼"
2923297793 = "セリナはマフラーのお礼をするべく、先生の元を訪れる。普段から何かと忙しい先生の身体のために、栄養剤や湿布などを盛り込んだ「トータル健康セット」をプレゼントし、更にマッサージを施すセリナ。元気になった先生の様子を見て、彼女は自分のことのように喜ぶのだった。"
2326049757 = "1日救護騎士団体験"
1971996326 = "セリナが病院で行うボランティア活動に参加する事になった先生。セリナは救護騎士団として患者の体調を診ながら、サンタとしてプレゼントを配って回り――そうして、一日の活動を終えた後、労ってくる先生にボランティア参加の理由を聞くと、「セリナと救護騎士団についてもっと知りたいから」という返事をもらい、頬を赤く染めて照れるのだった。"
720184857 = "良い子？悪い子？"
1669203285 = "ハナエはサンタの格好をするからには、真のサンタにならなければならないと考えた。そして真のサンタとしてプレゼントを配るために、まず良い子と悪い子を見極める必要があるのだと。そこで先生は、ハナエが嘘を見抜けるかテストをする事に――"
69967909 = "特訓！サンタへの道！"
3605114321 = "引き続き真のサンタを目指すハナエは、どんな場所でもプレゼントを届けられるようにとパルクールの練習を始める。先生は危なっかしいハナエをフォローし、そうして無事に練習を終えた。次にハナエは、マッハ2で飛ぶためにミレニアム・エンジニア部の力を借りようと言い始めるが――それを先生は全力で止めるのだった。"
2582704447 = "あなたを待ちわびて"
2787292054 = "ハナエは先生を自室に招待すると、サンタを迎えるために準備したおやつや靴下、飾り付けなどを次々と紹介していく。サンタを心待ちにしている彼女が疲れて眠ってしまっている間に、先生はプレゼントをそっと用意するのだった。"
503073630 = "大事な用、大切な物"
675453541 = "ハナエは配る用のプレゼントを買うべく先生と共にショッピングモールへと向かう。しかし、ハナエが選んだプレゼントは全て健康用品で、それがきっかけとなってブラックマーケットの不良たちと喧嘩になってしまう。ハナエは不良たちの横暴に怒り、彼女らを改善すべく行動に出るのだった。"
3867179911 = "年の瀬は穏やかに"
1185714622 = "先生は、年末年始の活気に満ちた街で、様々な料理をハルナと共に味わう事に。しかし、それらはハルナを満足させることができず――屋台を爆破させてしまうのではないかと心配した刹那、ハルナは「美食ではないものの、十分楽しむことができた」と、笑い、先生とともに穏やかな時間を過ごすのだった。"
1122975317 = "結果は過程の中に"
1611910214 = "美食を探求するのであれば、過程も知らなければならない、と先生を市場に呼びだしたハルナ。彼女は競売に参戦し、手に入れた鯛を知人の料理人にお願いして美味しくいただく事に。そうして先生と二人、穏やかな食事の時間を楽しんだものの、「究極の美食を探究する道のりは、一筋縄ではいかない」ものなのだと、ハルナは悔やむのだった。"
1306876513 = "美食を満たす要件。それは料理、季節……"
2915697252 = "先生と共に最高の美食を楽しむという目標のため、先生を呼び出したハルナ。最高の美食とは、料理と季節、そして共に過ごす相手が大事なのだとハルナは告げ、先生と共に素敵な時間を過ごすのだった。"
799816248 = "新年を新たな装いで！"
3455411055 = "ジュンコに呼び出され、彼女のバイト先「ルワゾー・ブッレ」を訪れた先生。そこには、着物姿のジュンコがいた。せっかくのレンタル着物姿を先生に見てほしかったのだと告げる姿はとてもいじらしかった。そうして、ジュンコを喜ばせるべく大量の注文をした先生は、食べきれない分をジュンコと共にゆっくりと食べるのだった。"
934247381 = "色んな料理が食べたい！"
527805565 = "前回、ルワゾー・ブッレでジュンコのために大量の注文をしてくれたお礼に、とジュンコはお祭りに先生を呼び出す。様々な屋台の料理を共に食べ、楽しい時間を過ごすのだが――食べすぎてしまい、青い顔でジュンコは帰ることになるのだった。"
4015908374 = "ぬくもりをください"
1228012568 = "連休最終日、休みが終わることを嘆くジュンコと共に、街をデートすることになった先生。様々なところを二人で歩き回り、最後は二人でお団子を分け合って笑うのだった。"
2198382498 = "フウカの願い事"
41944175 = "年末年始も頑張っているフウカに会うべく、ゲヘナ学生食堂を訪れた先生。ちょうど作業が終わったフウカと共に、街で屋台の食べ歩きをする事に。様々な料理を楽しみながら、フウカは来年は平穏な一日が欲しいとこぼすのだった。"
735524095 = "少し遅れて"
751489679 = "フウカに招待され、学生食堂を訪れた先生。そこには着物に着替えたフウカがいた。フウカはこれまでのお礼として手作りの年越しそばで先生にもてなした後、新年の挨拶を交わすのだった。"
3464653551 = "連休最後のお出かけ"
1290967402 = "連休も終わりに差し掛かってきた頃、フウカは残りの休日は給食部としての活動に充てるのだという。実質的にフウカの連休最終日である事を知った先生は、フウカを連れてデートをするのだった。"
2747740649 = "救護の精神"
4046348442 = "先生はミネと共に、巡回救護を始める事に。少し強引な手法ではあるものの、救護のために奔走する。そうして、一日が終わる頃、先生との息が合うことに感銘を受けたミネは、先生に顧問にならないかと持ちかけるのだった。"
155199846 = "趣味と実益"
1992573947 = "ミネは自宅の医療品を見せるべく先生を招待する。様々な医療品について説明するものの、先生は今一つ理解できてない様子。実際に使って見せる事で、その効果が分かるのではとひらめいたミネは、自身に刃を向けるが――慌てて先生に止められるのだった。"
4103404645 = "アフタヌーンティー"
381585519 = "先生をティータイムに招待するミネ。そこで、自身の抱えている悩みについて吐露するうちに、話はどんどん不穏な方向に。キヴォトスで起こる様々な事件に先生が関わっている事が多い点に気づいたミネは、先生の身柄を拘束すれば解決するのでは、と実行に移そうとするのだった。"
1869515898 = "「救護」の在り方"
1542046764 = "先生とミネがシャーレで仕事を処理していると、「キヴォトスの樹海」にいる市民から助けを求める電話がかかってくる。急いで樹海に向かったものの、市民を見つけることはできず。そうして夜になり、二人は一休みするのだった。"
3733720402 = "再び穏やかな日常へ"
4075198640 = "学園生活に復帰したミカと共にショッピングに出かける事になった先生。教科書や指定水着、体操服などの必需品を買い直すのだという。けれど、ミカのカードが決済に使えず、先生が変わりに払ってあげるのだった。"
1824494665 = "ボランティア活動"
3962654178 = "ボランティア活動の一環としてグラウンドの草むしりをする事になったミカ。先生はそんなミカを手伝い、共に穏やかな時間を過ごすのだった。"
2847450936 = "屋根裏部屋のお姫様"
2413528587 = "ミカに呼ばれて寮にやってきた先生。部屋でお茶をするだけという話でミカの私室に入ったものの、その瞬間、点呼の時間が始まってしまい――帰ることができなくなってしまった先生は、ミカの私室で忘れられない時間を過ごすのだった。"
1481077183 = "きずあと"
120262361 = "生徒と暴力沙汰を起こしてしまったというミカの連絡に、慌ててトリニティを訪れた先生は、生徒たちのいじめで破れた水着を手にしているミカを見つける。泣いているミカを慰め、先生はミカのためだけの水泳授業をしようと提案するのだった。"
2390792070 = "ゴリゴリ君の残骸"
238376327 = "メグの下を訪れた先生は、溶けてしまったアイスクリーム「ゴリゴリ君」を眺めるメグを見つける。曰く、ゴリゴリくんが固すぎるから自分の武器で溶かしてちょうどよい温度にしようとしているのだと告げるメグに、先生は武器で溶かすのではなく、待つようにと伝えるのだった。"
997833605 = "「待て」ができない女の子"
3179826887 = "いつものように温泉開発をしようとしていたメグは、開発中に妨害にあってしまう。部長の命令によって、バラバラに散って姿を隠すことになったものの、いつまで「待て」ばいいのか分からずフラストレーションが溜まるメグに、先生はけん玉を見せて気を引くのだった。"
70172580 = "温泉開発部にお任せ！"
4184469458 = "ある日、シャーレのシャワーが壊れ、冷水しかでなくなってしまう。その話をきいたメグから謎の連絡を受け、ある山のふもとを訪ねる事に。なんと、メグはそこで先生のための温泉を掘っていたのだった。"
3903491499 = "温泉とラーメンのつながり"
297876452 = "メグは、夜遅くにラーメンを作りながら先生と様々な話をしていた。出来上がったラーメンを一緒に分け合った後、メグはいつものように温泉開発に向かうのだった。"
1551137325 = "局長の噂"
3048088134 = "当番のためシャーレに訪れたカンナ。先生は、ヴァルキューレ警察学校で厳しいと有名なカンナと共に業務を処理する事に。カンナの機嫌を損ねないよう、緊張してしまった先生は、その緊張ゆえか結局あらゆるミスを連発してしまうのだった。"
3236770699 = "張り込みの定番"
1619463056 = "潜伏捜査中のカンナを応援するべく差し入れを持って訪れた先生。カンナが遅い時間まで食事をしてないということで、色んな食べ物を持っていったところ、怪しい屋台を発見することに成功。無事、追っていた犯人を逮捕することができたのだった。"
1028219097 = "一人、一休み"
1512296132 = "密輸犯の逮捕を成功させたカンナは、公安局の生徒たちからご飯の誘いを受けるものの、カンナはその提案を丁寧に断っていた。その日の夕方、仕事中に夜食を食べるために移動式屋台に寄った先生は、そこで一人食道楽を楽しんでいたカンナに遭遇するのだった。"
692249735 = "もう一つの道"
4271209454 = "平凡な午後の静寂を破るカンナからの呼び出し。先生はカンナが迷子をなだめるのに困っていることが分かり、頑張って手伝ってみる事に。ドタバタした一日が終わり、帰り際の別れ道で、カンナは誰にも打ち明けなかった気持ちを先生に打ち明けるのだった。"
3258439759 = "誤解されやすい人"
3227620313 = "サクラコから送られてくる意味深なモモトークが気になってしまった先生は、サクラコを訪ねることに。そうしてサクラコと話していくうちに、サクラコは何かと意味深に話すせいで誤解されやすい性格なのだと納得する先生だった。"
2902921354 = "「流行」"
4239335081 = "先生は商店街のアクセサリーショップの前で悩むサクラコを見つける。その時、お店のドアが開き、店主がサクラコを連れて行く。先生は戸惑うサクラコについて行き、買い物をする姿を見守るのだった。"
2853082550 = "秘密の夜"
1413282267 = "サクラコから届いた連絡で、大聖堂内部の回廊を歩くことになった先生。そこで、サクラコから”ある”秘密を打ち明けられ――？\r"
2382324779 = "意外な趣味"
4092134933 = "サクラコから相談を持ちかけられる事になった先生。それは、サクラコ自身に趣味がない事だった。先生は様々なものに触れることから生まれるものだと伝え、穏やかな時間を過ごすのだった。"
399214349 = "説明の場"
3113818934 = "サクラコからSOSをもらってやってきた先生。しかし、その内容はサクラコが怪しい人ではないことをシスターたちの前で演説することだった。サクラコに対する誤解は深まるばかりだった。"
2003923680 = "トキの日課"
1607965188 = "仕えていた主を失ったトキは、これからどうすればいいのかと悩んでいた。そうして、先生を新たな主人とすれば良いのだという結論に至り……トキが専属メイドとしてついて回る新たな日々が幕を開けるのだった。"
4288888721 = "普通の学園生活"
322319486 = "出席日数不足で留年の危機に瀕してしまったトキ。しかし、今まで「普通の学園生活」というのを送ってこなかったトキにとって、他の生徒と同じように学園生活を送るという行為が分からないと言う。先生は、トキが「普通の学園生活」を送れるようサポートするのだった。"
1375907566 = "趣味の悩み"
3410652719 = "今まで、メイドとしての任務を遂行するためだけに生きてきたというトキ。これといった趣味も持っておらず、理解ができないという彼女を、先生は街に連れ出し、デートをする事に……。"
284991053 = "メイドの中のメイド"
3181693318 = "用事があってシャーレへ向かうのが遅くなるという連絡を受けた先生は、いつも時間を厳守するトキにしては珍しい、とトキの元を訪れる。そこには、装備の点検と整備を行うトキの姿があり……。"
62419462 = "繋がりの証"
2598613321 = "唐突に通信で連絡を取ってきたトキは、意図的に誤解を招くようなことを言いながらシャーレまでやってきて、先生にお揃いのヘッドセットを手渡す。それを装着して24時間自分と繋がっていてほしいと言われた先生は困惑。ヘッドセットはそっと引き出しに封印された。"
3221453657 = "午後のティータイム"
1575926616 = "ナギサのお茶会に呼ばれることになった先生。走って汗をかいている先生にアイスティーの準備をするというナギサに対し、先生は自分で買っていた「ペットボトルの紅茶」があると断る。ナギサは初めて見るブランドに好奇心を持って紅茶を分けてもらうも、彼女の口には合わないようだった。"
3617335172 = "言葉の乱れは心の乱れ"
3261002897 = "最近、トリニティ生の言葉の乱れが気になるとこぼすナギサ。自分は普段から丁寧な言葉づかいを心がけているので、どんな状況でも乱れることはないと豪語するも……直後に報告された生徒たちの様々な問題行動の報告を受けて、言葉尻を乱してしまうのだった。"
578805062 = "紅茶とコク"
2073459542 = "新しい茶葉で先生をもてなそうとお茶会を開いたナギサ。しかし、用意したはずの茶葉はコンブチャではなく昆布茶だった。先生を失望させまいと、ナギサは昆布茶を振る舞うことに……。"
1365827293 = "パンがなければ"
1448253096 = "パンを買うために近くの商店街を訪れた先生。しかし、店にはパンが一つも残っておらず……その様子を見ていたナギサは、他の店で注文したオーダーメイドケーキを一緒に食べようと提案するのだった。"
2105366932 = "反省部屋の住人"
214951891 = "ミレニアムを訪れた先生は反省部屋のコユキを訪れる。窮屈な暮らしをしているかと思ったコユキは、むしろ反省部屋を自分好みに飾りつけて寛いでいるのだった。"
2113534752 = "パンドラの箱（１）"
4241439597 = "シャーレ当番になったコユキは、今までパスワードを解除する作業ばかりしていたのだとこぼす。シャーレでも同じようにパスワードを解除すればいいのかと問いかけるコユキに、むしろシャーレのパスワードは解除しないでほしいとお願いする先生。その言葉を聞いて、いいことを思いついたとコユキはほくそ笑みながらミレニアムに戻っていくのだった。"
4083323257 = "パンドラの箱（２）"
2414226696 = "シャーレに潜入したコユキは、シャーレの秘密に触れようとするも、先生に見つかってしまう。そうしてシャーレ居住区に逃走したコユキは、そこで「不思議な本」を発見するのだった。"
2351755493 = "日頃の行い"
2882100059 = "先生は、偶然ゲームセンターでコユキを見かける。ゲームが好きなのかと問うと、自分の能力が関係ない運が絡むものが好きなのだと答えるコユキ。日頃の行いが良ければ運も良いはずだ、と話した二人はゲームセンターで対戦ゲームを楽しむのだった。"
1850258284 = "幸運の証"
3499702459 = "草むらでしゃがんでいるコユキを見つけた先生。コユキは運がよくなるかもしれないという希望を持ちながら四つ葉のクローバーを探していた。そうして、先生とコユキは二人で四つ葉のクローバー探しを楽しむのだった。"
505934790 = "やり返してやります！"
619630983 = "コユキに呼ばれ反省部屋を訪れた先生。彼女がなくした宝物は、昔ゲームセンターで不正をするために作った「勝負メダル」だった。先生は既にそれを拾っており、コユキに渡す。それは犯罪と諭してもまったく悪びれないコユキを、先生は迷いなく公共マナー講座に登録するのだった。"
168056968 = "深まる誤解"
2953254523 = "着物を新調すべくお店を訪れていたカヨコは、店員とのかみ合わない会話に困惑していた。通りすがりの先生がとりなしてくれたお陰で、カヨコは目当ての着物を買うことができたのだった。"
3556812176 = "新年の鐘音"
1261302160 = "大晦日、除夜の鐘を聞きに来た先生とカヨコ。しかし、鐘の修理中だったため、聞くことは叶わず……帰り道、始発電車の踏切の音を聞きながら新年を迎えるのだった。"
1594158572 = "猫とカヨコと甘酒と"
585940394 = "お守りを買いにきたカヨコと先生は、冷えてしまった身体を温めるべく甘酒を飲むことに。甘酒の少量のアルコールで酔う生徒が毎年出るという話をしながら、カヨコは猫の声に惹かれて席を少し外す。しばらく待っても帰ってこないカヨコを心配して見に行くと、そこには猫の声真似をしながら可愛く遊んでいるカヨコの姿が。先生に見られてバツが悪くなったカヨコは、これも甘酒のせいだと誤魔化すのだった。"
1021018790 = "ストレス解消法"
1831690994 = "新年早々、様々な生徒の相談に乗って奔走している先生。カヨコはそうやって忙しそうにしている先生の息抜きに、と和楽器のライブに連れ出してくれる。和楽器というからには雅楽のような穏やかなものを想像していた先生の前に、和ロックメタルの音が鳴り響くのだった。"
1676776936 = "門松作り"
2926389252 = "新年を迎え、ハルカの元を訪れた先生。ハルカは事務所を飾る門松を自作すべく、竹を探していた。先生と共に竹を探しに行くもなかなか見つからず落ち込むハルカに、こういうのは気持ちが大事なのだと伝える。その言葉に励まされたハルカは、自作の門松を作り上げ、先生と共に事務所に持っていくのだった。"
4150553585 = "季節感"
882190145 = "冬なのに短い着物を着ているハルカが気になった先生は、長い着物を買いに行こうとハルカを誘うも、買ってもらうのは申し訳ないと断られてしまう。それならば、と先生はスイーツを一緒に食べ、カイロを買ってあげるのだった。"
1010615852 = "冷たい風と、暖かい心"
902806983 = "気温が急激に下がった、寒い日の事。ハルカと雑草の様子が心配になった先生はハルカの元を訪れる。ちょうど雑草のお世話は終わったと話すハルカと共に、温かいスープを飲みに行くのだった。"
1362773471 = "百鬼夜行の広報担当、カホさん"
3015917284 = "急にカホから「例の件」で相談があると連絡を受けた先生。一体何の事だろうと困惑する中、カホは百鬼夜行の観光産業についてのプレゼンを始める。一通りの説明が終わった頃に、「例の件」について改めて問うと、カホはメールを送ったはずだとこぼすも、メールは届いておらず……自身の空回りに気づいたカホをフォローし、改めてプレゼンをしてもらうのだった。"
813536488 = "部長よりも部長らしいカホさん"
1268253443 = "前回の挽回をすべく、先生をエスコートしたいと申し出るカホ。百鬼夜行連合学院の中を案内すると張り切っているカホの前に、生徒から様々な相談が舞い込んでしまう。うまくエスコートができなかったと落ち込むカホを先生は慰めるのだった。"
3589056262 = "カホさんの完璧なエスコート"
1155603011 = "カホは前回のリベンジに、ともう一度先生を百鬼夜行に招待する。今度は邪魔が入ることもなく観光スポットや百鬼夜行の魅力を楽しそうに全力で紹介する姿に、先生もカホとのデートを楽しむのだった。"
1779236823 = "カホさんの計画的な営業戦略"
44237873 = "カホから連絡を受け、陰陽部の休憩室を訪れた先生は、そこで特別発注した広報用グッズをまとめているカホに出会うのだった。"
2501910877 = "初心忘るるべからず"
1244005463 = "陰陽部の休憩室を掃除している先生とカホ。その時、カホは百鬼夜行の生徒から貰った感謝状を丁寧に磨きながら、その感謝状にまつわる思い出を語るのであった。"
4137176117 = "メイド大ピンチ！"
2046418808 = "アリスからSOSを受け取った先生は、メイド服姿のアリスと出会う。服をすべて洗濯してしまった関係で、これしか着る服がないのだと。しかし、メイド服にはまだ若干の抵抗があるというアリスに対し、先生は「メイドにジョブチェンジすればいい」とアドバイスをする。そうして、ジョブチェンジに成功したアリスは掃除に励み、メイド服への苦手意識を減らしていくのだった。"
186589621 = "メイドお勉強大作戦！"
25252799 = "メイドレベルを上げると決めたアリスは、インターネットでメイドについて調べることに。様々なメイドの知識を手に入れたアリスは、レベルアップすることができそうだと笑うのだった。"
3585111616 = "出撃準備完了！"
3930937110 = "アリスから大事な話があると言われて、ミレニアムを訪れた先生。冒険に出かける準備を整えたアリスは、メイドレベルが十分にあがったから最強のメイド勇者を目指すと宣言するのだった。"
3951701776 = "メイド勇者の装備"
224308736 = "メイド勇者として先生のギルドハウス、すなわちシャーレの掃除に挑んだアリス。しかし、掃除中にアリスのカチューシャが汚れてしまう。他の洗濯物と一緒にカチューシャを洗ったアリスは、先生と楽しいひと時を過ごすのだった。"
3957314179 = "理由は後から"
3997203066 = "トキと一緒に豪華クルーズ船で行われるパーティーの潜入任務をすることになった先生。バニーガール姿のトキに対し、周囲から注目が集まってしまい――同行者の先生は冷たい視線にさらされることに。しかし、トキは意に介さず任務を淡々と遂行するのだった。"
2330192846 = "バニーの噂"
2392731156 = "バニー姿のトキがシャーレに入り浸っているせいで、シャーレの先生は生徒にバニー服を無理やり着せている変態だという噂が立ってしまう。先生は、トキにその事を相談するも、「人の噂も七十五日」と取り合ってくれず……今日も一日が終わるのだった。"
2672746772 = "心休まる場所"
2814303571 = "トキから任務の通信が入ってくるも、途切れ途切れの上、返答はなく。ついに留守電メッセージしか返ってこなくなってしまう。トキの安否が心配になってしまった先生は、朝まで彼女を待つも、いつの間にかうたた寝してしまい――目が覚めると、そこには同じベッドで眠るトキの姿があった。"
1746842993 = "参考資料は……？"
2920706888 = "新しいゲームの参考資料用にと自分でメイド服を着ることになったユズ。しかし、生来の自信のなさから、ロッカーに引きこもっているところを先生に見つけられる。事情を聞いた先生がユズを励ましていると、ユズを訪ねてきたミレニアム生にその姿を見られてしまい――ユズはまたロッカーの住人と化すのだった。"
831733757 = "新しいアルバイト"
868737743 = "新作ゲームの開発費を得るためにバイトを始めたユズ。先生が行きつけのカフェを紹介するが――そこはメイドカフェだった。自分にメイドカフェの接客など難しいと嘆くユズに対し、先生は接客の練習に付き合うことに。"
2231433090 = "ロッカーの中の招かれざる客"
2256848622 = "ユズのアルバイト中の様子を見にメイドカフェを訪れた先生。しかし、ユズは先生が来る事を意識しすぎたからか、普段ならしないミスを連発してしまう。その後、休憩から戻ってこないユズを探しに行くと、猫に囲まれた彼女を見つけ――先生に悩みを受け止めてもらい、晴れやかな笑顔で仕事に戻ったユズは、指名新記録を達成するのだった。"
1898965458 = "ゲーム開発部の掃除"
2028068753 = "ユズの掃除を手伝うべくゲーム開発部の部室を訪れた先生。しかし、ユズのいう掃除は、部屋の掃除ではなく、パソコンの最適化のことだった。リアルの掃除もしようと提案した先生は、ユズと共に部室を掃除するのだった。"
1247993165 = "おはよう、レイサ"
2205362417 = "偶然バス停でレイサと出会った先生。レイサは、クラスの友人とのモモトークのやりとりについて先生に相談することに。自分に素直になって話すのが一番だというアドバイスを受けたレイサは、足取り軽く帰路につくのだった。"
3620040079 = "信じて、レイサ"
1349760893 = "疲労回復に効果的な方法はないかと先生に相談しにきたレイサ。なんでも、他人に頼まれた事や遊びの誘いを断ると今後の関係に響いてしまう、と全てを引き受けているのだという。レイサがそうして無理をすると、周囲の人間が心配すると伝え、レイサに休息をとってもらうことに。"
324482861 = "ありがとう、レイサ"
1014758945 = "今までのお礼として、先生をエスコートすると息巻くレイサ。カフェやゲームセンター、遊園地などを見て回るも、先生が既に一度来たことがあることに、レイサは落ち込んでいた。レイサと来るのは初めてで、今日はとても大切な時間だったと告げると、彼女は嬉しそうに笑うのだった。"
3804324515 = "おやすみ、レイサ"
2635556863 = "深夜のパトロールをしているレイサと共に街を歩く先生は、レイサの自警団としての気持ちを聞いていた。日の出を眺めながら、こうして誰かと二人で日の出をみるのは初めてだとレイサは嬉しそうに笑う。そうして、眠気で足取りが覚束ないレイサを抱えて、早朝のパトロールを終えるのだった。"
1171878055 = "たくさん召し上がれ！"
257339176 = "先生に相談がありシャーレを訪れたルミは、昼食も食べずに仕事をしている先生の生活に危機感を覚える。このままでは良くない、と立ち上がった彼女は、シャーレにあった食材で料理を振る舞ってくれるのだった。"
168583006 = "まずは味見して！"
4087665218 = "玄武商会で試作している料理の味見をしてほしいと頼まれた先生は、次々と出てくる料理を食べてはルミに感想を返していく。普段とても美味しい料理を振る舞ってくれるルミの、細やかな努力に胸を打たれながら、試食会はお腹がいっぱいになっても続くのだった。"
6308616 = "接客業の悩み"
4152447857 = "山海経での仕事を終えて玄武商会に立ち寄った先生は、ルミがクレーマー対応をしている所に立ち会ってしまう。クレーマーに違和感を覚えた先生は、そっと後を尾け……相手がヴァルキューレの事件記録にいた無銭飲食常習犯である事を突き止める。そこにルミが現れ、クレーマーに正義の鉄槌を下すのだった。"
7640267 = "気にしてないよ？"
2967789925 = "今日は玄武商会で餃子を大量に蒸す日だと連絡を受けた先生は、その過程を見学すべくルミの元を訪れる。厨房は蒸気に満ち溢れたサウナのようになってしまっており、先生はルミの意外な姿を目撃してしまうのだった。"
3324623418 = "第一印象"
361199515 = "初めてのシャーレ当番を張り切りすぎてしまったミナは、扉の前で初登場の仕方について悩みすぎて遅刻してしまう。気を取り直して、当番を始めようとするものの、初当番にあたって先生との呼び名を決めたいと話すミナと、互いにどのような呼び方をするか真剣に話し合うのだった。"
855234387 = "リコーダーの練習"
2959531408 = "ミナと共に玄龍門の治安維持活動をする事になった先生は、突如としてリコーダーを演奏しながら登場するミナに面食らってしまう。曰く、以前見た映画で同僚が死ぬ時にクラリネットを演奏する姿に胸を打たれたから、自分も真似をするのだとか。斯くして、ミナの珍妙なリコーダーの演奏は、山海経の噂になってしまうのだった。"
1904261494 = "雨空の色"
2823268309 = "山海経で公務を終えた先生は夕立に降られてしまう。そんな先生の前に、傘を持ったミナが現れ、雨の日の景色がとても好きなのだと、やわらかく相好を崩すのだった。"
2904966419 = "時が経てども"
3295408939 = "ミナと共に梅花園の子供たちに会いに行った先生。先生は「ノワール」的な玄龍門で活動する普段とは異なり、子供たちの面倒をよく見て、楽しそうに笑うミナの姿に新しい一面を発見するのだった。"
244539017 = "建築はどのように作られていくのか"
267837178 = "徹夜の業務を終えた後、始発で帰宅を準備していた先生は、偶然、工務部が乗り込むバスに流されて乗ることに。そのまま、流れで作業現場に到着した先生は、ミノリと共に現場見学をするのだった。"
725869297 = "ミノリ・ツイスト"
366290358 = "レッドウィンターの図書館でミノリと会った先生は、プロレタリア文学が好きだと笑うミノリから、彼女が好きな本の話を聞くことに。しかし、その内容は自身が知っているものとやや異なる物語になっているようだった。"
3493912546 = "2人だけの足場"
2598860157 = "急な寒波で工事が中止になってしまったある日――先生は差し入れを持って工務部を訪ねる。作業現場の安全点検を一人でしていたミノリは、先生の差し入れのお返しとして、工務部だけが見ることができる足場の上の特別な風景を見せてくれるのだった。"
3231977855 = "キヴォトスの生徒が不幸なのはなぜ？"
164078001 = "シャーレ当番のために執務室を訪れたミノリ。ミノリは、先生と一緒にいることができる当番業務は不平等を生んでしまうと指摘し、その解決案について熱く語るのだった。"
432672538 = "SRT、購入します"
131504888 = "依頼人から商品券をもらったミヤコは、何を買うべきか先生に相談する事に。２人で百貨店を巡りながらキャンプ用品を買っていく。そんな中で、ミヤコはとある水着を目に留めて――"
4182954826 = "SRT、訓練します"
3400306939 = "海上救出訓練をすべく、船に乗って沖合へと向かった先生とミヤコ。訓練通りに先生を縛ったところで、敵役がいない事に気づいたミヤコは、訓練内容を切り替えるのだった。"
2954136082 = "SRT、探検します"
1741566074 = "ミヤコと共に、水が引いた干潟を渡って無人島に遊びに行った先生。美しい島をゆっくりと見て回っていたところ、潮が上がってきて陸に戻れなくなってしまう。次の引き潮を待ちながら無人島で時間を過ごしていた2人は、ウサギの群れを発見するのだった。"
2048487267 = "SRT、報告します"
2604825862 = "早朝、海辺を散歩していた先生は、朝の運動をするべく浜辺を歩いていたミヤコに出会うのだった。"
3616835660 = "水中補給作戦（１）"
3120962973 = "サキの連絡を受け、釣り具をもって波止場を訪れた先生。村の住民から海産物採取許可を受けたと語るサキは、普段から世話になっている先生に高価な海産物を採ってくると胸を張っていた。しかし、なかなか捕れない魚に腹が立てたサキは、水中の魚に向かって銃を乱射してしまい――"
1056477700 = "水中補給作戦（２）"
3726172857 = "再びサキの連絡を受けて埠頭を訪れた先生。サキは村の倉庫でバングスティックを見つけたとはしゃぎ、今度はこれで魚を捕まえてくると宣言する。しかし、バングスティックの威力は思った以上に強く、刺した魚が粉々になってしまうのだった。"
2099064502 = "干潟に潜むもの"
3715648582 = "サキの連絡を受けて今度は干潟に向かった先生。2人は潮干狩りを楽しむのだった。"
3856082788 = "深い海、浅い呼吸"
4086115667 = "漁村を散歩していた先生は、スキューバダイビングで海底掃除をしているサキと出会う。話の流れから、先生が一度もダイビング経験が無いことを知ったサキは、先生にダイビングを教える事に――"
1203774988 = "船着き場の狙撃手"
359062505 = "新しい偽装を試してみたいというミユの言葉に波止場を訪れた先生。ミユは周りの視線を避けるべく、釣り人に偽装し、釣りに興じていた。あまりにも自然に溶け込んでいる事に先生が驚いていると、ミユの釣り竿に大物がかかる。途端に周囲の釣り人から注目を浴び、ミユは困ったように笑うのだった。"
1400267850 = "思い出を残す方法"
26270932 = "海辺でもいつものように小石を拾っていたミユ。先生はそんな姿を見て、ミユが好きそうな石を集めることに。そうして、先生が選んだ石を見たミユは、どれも気に入ったと笑うのだった。"
1622439539 = "空の形"
1698602601 = "海辺の空を見上げながら、美しい水平線に自信をもらえたような心地になると笑うミユは、先生と空について言葉を交わすのだった。"
2795360293 = "存在感の確認"
3188344150 = "ファッション雑誌からインスピレーションを得て、新しい私服を試してみることにしたミユ。そんなミユの言葉が気になって、市内を訪れた先生は繁華街の真ん中で水着姿のミユを見つけるのだった。"
3972604942 = "シュノーケリング"
4210963508 = "シロコから連絡をもらい、磯に向かった先生。そこには食料を採取するためにシュノーケリングの準備をしているシロコがいた。曰く、この一帯では「幻の貝」が採取できるのだとか。シロコは先生の声援を受けながら「幻の貝」を探すのだった。"
4159401028 = "ペース配分"
3199776909 = "シロコと一緒に散歩に出かけた先生は、体力不足でへたり込んでしまう。ペース配分の失敗で先生に迷惑をかけたと落ち込むシロコを慰め、お互いのペースを合わせて歩きだすのだった。"
2195713465 = "期待"
1852257618 = "みんなが眠りについた頃、リゾートの外を歩くシロコを見つけた先生は、彼女の後を追う事に。楽しい時間が終わってしまう事が寂しいと告げるシロコに対し、これからも、もっと素敵な景色が増えていくよと先生は笑うのだった。"
1618207953 = "柄にもない格好"
2833660799 = "モモトークで連絡を受けた先生は、浜辺の隅っこにいるウイを見つける。ウイは周囲の視線が落ち着かなくて海辺に来たのだと漏らす。他の人も同じように、知り合いの居ないところで息抜きをするためにきているのだと先生が告げると、ウイは少しだけ前を向いて笑うのだった。"
351695306 = "森の佇む小さなカフェ"
3456535130 = "モモトークで連絡をもらった先生は、島の中で見つけたウイの隠れ家に招待されることに。奥まったところにある洞窟の裏手で、アイスアメリカーノを飲みながら2人だけの空間で共に時間を過ごすのだった。"
2200786931 = "最後の一口まで"
2554617240 = "夜更けにウイから連絡を受けた先生は、静かな海辺に到着する。ウイは先生にアイスアメリカーノを渡し、2人で穏やかに夜の浜辺を散策するのだった。"
612488749 = "落ち着かない心"
871353545 = "ヒナタの連絡で浜辺に到着した先生は、サンベッドとパラソルを広げているヒナタを見つける。どうにもシスターフッドのみんなから、島でゆっくりと休んでほしいと言われたのだとか。けれど、自分だけ休むなんてと自責の念に駆られるヒナタを宥め、先生は寝かしつけるのだった。"
586273995 = "道なき道を"
1017214242 = "先生は荷物を運んでいるヒナタを見つけ、手伝うことに。そうして2人で森を歩いていると、大きな岩が道を塞いでいた。ヒナタは岩を持ち上げてどかし、その後も様々な障害物がヒナタと先生の前に立ちはだかるも彼女の力によって解決されていくのだった。"
3164602540 = "2人きりの告白"
3934941890 = "ヒナタは先生にお願いがあると呼び出し……シスターとしての告解の練習をすることに。"
1793982090 = "コハルの使命"
1618146205 = "滝の近くでのんびりと休んでいた先生。コハルは、先生が変なことをしないようにと隣で監視することに……。"
585869769 = "コハルの危機"
2170214140 = "コハルに呼び出されて浜辺についた先生は、岩の上で水平線を見つめるコハルを見つける。時間が経ち、コハルと先生は島に戻ろうとするも、潮が満ちており帰り道が埋まってしまう。コハルは先生に背負われて戻ることになるのだった。"
2828338450 = "コハルの夜空"
2677557683 = "浜辺で休んでいる先生の元に、コハルがやってくる。先生は星を眺めていたと伝えると、コハルも一緒に星を見る事に。そうして眠ってしまったコハルを背負い、先生はキャンプに戻るのだった。"
2930606407 = "今日は安全日です"
3313466648 = "ハナコに呼ばれて森の奥深くに訪れた先生は、そこで様々なフルーツを見つける。ハナコの意味深な言い方的にまた何か困らせるのではないかと思っていた先生は拍子抜けだった。曰く、他人の目がないところで困らせても意味がないのだとか。こういう場所では少しだけ胸の内をさらけ出していきたいとハナコは笑うのだった。"
1688906964 = "ありのままの姿"
30901074 = "散歩中に歌声を耳にした先生は滝の前にいるハナコを見つける。ハナコは水の中が気持ち良いから一緒にどうかと先生を誘うが、断られてしまう。しかし、先生を近くに呼び水の中に引きずり込むのだった。"
3660308927 = "不器用な一面"
1134041130 = "海辺で夕日を眺めていた先生の元にやってきたハナコは、普段なかなか口に出すことのできない感謝の言葉を口にするのだった。"
3237828853 = "夏の海の大和撫子"
3696068603 = "海辺を訪れた先生を、「大和撫子」ミモリの特別なおもてなしが待っていた。日光浴をしたり、浜辺を散歩しながらミモリと一日を満喫するのだった。"
2716709284 = "夏の海の読心術"
1386038324 = "寝起きの先生の前に、ミモリが現れて「読心術」を使いながら先生のお世話を焼くことに。今日一日何をするかをまだ決めていない先生に対し、せっかく海まで来たのだから海に行こうとミモリは笑うのだった。"
502611754 = "夏の海の思い出"
2287028514 = "先生はミモリと一緒に海辺でビーチバレーをしたり、一緒にドリンクを飲んだりと様々な思い出をつくることに。そして、一日の終わりが近づく頃、ミモリはこの時間がずっと続いてほしいと心の内を漏らすのだった。"
3374542908 = "物資調達"
1098258998 = "メルからペンが壊れてしまったと連絡を受けた先生は、換えのペンを買って持っていく事に。喜んだメルは、お礼に似顔絵を描こうとしてくれるが……。"
507087033 = "創作の苦しみ（１）"
639372066 = "描いている原稿のヒロインの気持ちが分からず悩むメルを、ヒロインの気持ちになれば分かるのではないかと、定番のデートスポットに連れ出す先生。それぞれのスポットでカップルを観察しインスピレーションを受けたメルは、これが先生とのデートであることに気づき、慌てながら帰ってしまうのだった。"
279895958 = "創作の苦しみ（２）"
750286265 = "前回のデートの「お返し」をすべく先生を自分の領域に招待することにしたメル。コラボカフェを満喫しながら、メルはぽつりと自分の夢を先生に打ち明けるのだった。"
509591439 = "知識解放戦線へ、ようこそ！"
1337054964 = "知識解放戦線の図書室に先生を招待したメルは、自分の作業室を見せてくれる。スランプに陥っている時に初心に立ち返るために存在する部屋なのだと語るメルは、先生にアシスタントをお願いするのだった。"
4118174099 = "本を探す旅路"
2690079847 = "知識解放戦線が作った伝説の同人誌がレッドウィンター連邦学園内にあることを知ったモミジは、先生と共に伝説の同人誌を探す旅に出るのだった。"
3986459082 = "集める理由"
1425412045 = "ヴァルキューレの生徒と共にブラックマーケットのパトロール補助をしていた先生は、ブラックマーケットに無断侵入していたモミジを見つける。絶版本を手に入れるためにブラックマーケットに来ていたというモミジから、そこまでして本をコレクションする理由を聞くのだった。"
1047874892 = "一期一会のブックフェスティバル"
3177169936 = "モミジに呼ばれ、レッドウィンター連邦学園のブックフェスティバルにやってきた先生は、モミジと共にまだ見ぬお宝探しへと出かけるのだった。"
2690106276 = "本に包まれて"
972013378 = "先生が徹夜明けであまり休めていない事を知ったモミジは、図書館を臨時休館にし、先生を招待する。曰く、図書館で昼寝をする生徒も多いことから、ここでならゆっくり寝ることができるのでは……と即席の仮眠室を作ったモミジは、先生を休ませるのだった。"
3995225634 = "忘れがちなものについて"
3485332196 = "モミジが落とし物をしたと聞き、レッドウィンターの図書館で共に捜索する先生。見つかったのは、漫画の復刻版限定コレクションだった。先生が調べると、現在ではその漫画にプレミア価格がついていることが判明し、一瞬心が動くモミジ。たが、コレクターとして、どんなに高価であろうと大切に持っておこうと誓うのだった。"
2596706043 = "準備を一緒に"
3172089424 = "晄輪大祭当日の朝、先生に準備運動を勧めるべく連絡してきたコトリ。ストレッチの重要性を説いた後、お手本を見せてくれる事に。しかし、身体が硬く、うまく柔軟ができないコトリを慰め、2人でストレッチをするのだった。"
17391138 = "結果的には"
4279232490 = "運営の事務室で管理業務をしていた先生は、業務とは別に迷い込んできたり相談にくる生徒の対応に追われていた。そこに、事務仕事を手伝いに来たコトリに一旦の応対を任せて休憩をとることに。休憩から戻ってきた先生が見たのは、コトリ一人残された事務室だった。申し訳無さそうにするコトリを前に、これでようやく仕事に集中できると先生は喜ぶのだった。"
3384821961 = "それはそれ、これはこれ"
1026815239 = "なんだか元気がなさそうなモモトークが気になり、コトリのいる控室へと足を運ぶ先生。そこには、めまいでフラフラ状態のコトリがいた。先生は、足元もおぼつかないのにめまいの説明をするコトリの代わりに説明をし、彼女を休ませてあげるのだった。"
4197919104 = "説明したくない気持ち"
1567162534 = "すべての試合が終わり、余韻に浸っているコトリ。この瞬間が過ぎ去ってしまうことを惜しむコトリに、先生は過ぎ去ってしまうからこそこの時間が大切なのだと伝えるのだった。"
3782074268 = "先生、お手伝いしますわ"
1692291987 = "合同医療本部の手伝いをしている先生の元を訪れたハルナは、先生と共に生徒の対応をすることに。先生は美食の知識をもとに、適切な飲み物や食べ物を渡すハルナに感心するのだった。"
348600508 = "これぞ新たな美食ですわ"
1226749390 = "ハルナと共に分子料理のブースに行く先生。斬新な食感に驚いているものの、分子料理はあまり親しまれていないのだとか。わかりやすく、人気の分子料理である綿菓子を提供してみてはどうかというハルナの提案により、分子料理のブースは一躍人気屋台となるのだった。"
4164938916 = "美食の道は、どこにでもありますわ"
616408418 = "様々な試合に参加すると意気込むハルナ。蓋を開けてみれば、食べ物がテーマの試合や、参加賞で食べ物が出てくるものばかりだった。競技に向き合いつつも、提供される料理の味を評価するハルナは、飴食い競争で見事一位を勝ち取るのだった。"
407871367 = "比翼の蝶"
1501629589 = "ハルナは先生に「いつもとの違い」を尋ねると、先生はプレッシャーに打ち震える。なんとか羽飾りが違うことに気づくと、先生の慧眼に動揺しつつも喜ぶハルナ。もっと肝心なことには気づかない鈍感さにやや呆れつつ、先生をエスコートし、腕を組んで会場を巡っていく。"
393076 = "何事もほどほどが一番"
1711403022 = "トリニティに用事がある先生の手伝いを担当することになったイチカ。2人は、道中で諍いを目にする。仲裁しなくても大丈夫かという先生の問いに、イチカは「それほど大きなトラブルでもないから大丈夫っす」と言い、他のメンバーに連絡を入れて現場を立ち去る。そうして用事を終えた後、道中見かけた諍いの仲裁に向かうイチカに先生も同行するのだった。"
517994058 = "大したことじゃない"
3421689892 = "ショッピングモールの楽器屋でギターを眺めているイチカを目撃した先生。曰く、路上演奏している人を見かけ、自分も弾いてみたくなったのだとか。ギターに限らず、何か熱中できることを探しているだけだからと諦めようとするイチカに対し、先生はイチカの演奏が聞きたいと伝えるのだった。"
2193199583 = "約束してくれませんか"
1203125809 = "大量のダンボールの前で立っているイチカを目撃した先生。イチカは、熱中できること探しのために色んなものに手を出してはすぐにやめてしまうため、こうしてフリマアプリで不要品をさばいているのだとか。イチカのそういう側面を肯定しつつ、先生は彼女を営業所に送り届けるのだった。"
4264961292 = "しばらくは"
679592225 = "イチカとの待ち合わせ場所に着いた先生は、風船を木にひっかけてしまった子供のために木に登るイチカを見かける。人のための行動を自然とできるイチカを褒めるも、本人としては当然のことで、それ以上に一つのことに熱中できないのが悩みだと漏らすイチカ。そんな彼女に対し、無理に探そうとせず、気ままに楽しむことも大事だと告げるのだった。"
502045279 = "鬼怒川カスミ"
950569097 = "カスミのアジトを訪れた先生は、そこで彼女が次の爆破計画を立てている事を知る。先生はできるだけ人の少ないところになるよう誘導し……次の爆破地点は山の空き地となるのだった。"
1233217562 = "私は爆破作業が好きだ"
1087254379 = "カスミの連絡を受け工事現場を訪れた先生。作業が成功するか否かなど関係なく、ただ爆破が楽しいのだと言い放つカスミ。そして、シャーレも爆破ポイントとして目をつけているので、爆破ポイント選定には真剣に取り組んでほしいと笑う。そうして、2人は一晩中、次の爆破ポイントを議論し続けるのだった。"
3742902787 = "知的な姿"
2660660211 = "カスミをシャーレに招待した先生。カスミは土木や地質学、建築工学に関する様々な本を持ってきて勉強を始め……そんなカスミに対し、「良かったら、いつでもきてね」と言い、2人は雑談をしながら時間を過ごすのだった。"
973472567 = "山奥からの救助要請"
873006730 = "カスミから救助要請を受け、山へと向かった先生。爆破ポイントを探している最中に、足を滑らせてしまいサンダルが壊れてしまったのだと言う。そんなカスミに対し、先生はサンダルを手渡さず、怪我したカスミを背負って山を下りるのだった。"
660551613 = "豪華に"
3056310614 = "レッドウィンターを訪れた先生は、シグレが改造した特別湯に浸かることに。しかし、時間が経つにつれて、肌が熱くなるような感覚を覚え、温泉に何かを入れたのかと尋ねる。シグレは嬉しそうに特別湯の秘密について教えてくれるのだった。"
3965412169 = "たまには真剣に"
3457735752 = "先生と一緒に銭湯を訪れたシグレは、銭湯の社長から、227号温泉郷で提供していたフルーツ牛乳のレシピを教えて欲しいと頼まれる。シグレはレシピを教える代わりに、銭湯を旧校舎の生徒が利用できるようかけあうのだった。"
3617991952 = "温かく"
1568896138 = "シグレは銭湯を訪れる客に提供する飲み物を作ることに。先生はそんなシグレの様子を見守っていたが……その間に終電を逃してしまう。帰れなくなってしまった先生は、シグレと一緒に旅館で泊まることになるのだった。"
4190060998 = "急に"
1068432655 = "シグレが新しく用意してくれた温泉に浸かっていた先生。そのとき、後から入ってきたシグレらしき人物の影に、先生は違和感を覚え……。"
3198653942 = "ビリビリ"
3736796703 = "キヴォトスに来てからあまり能力がうまく使えないのだとぼやく御坂美琴。そんな彼女に対し、先生は「能力があるからできなかった事ができるかも」とアドバイスする。そうして、普段は電磁波のせいで近寄れなかった野良猫に近づいてみようと御坂美琴は決意するのだった。"
3828858953 = "天性のオーラ"
4050729238 = "不良に囲まれて困っていた御坂美琴は、先生に助けを求めることに。曰く、「お姉様」と勝手に呼び慕われて困っているのだとか。先生は、不良たちにあまりしつこく付きまとわないようにと注意するのだった。"
735396316 = "似たもの同士"
2449311845 = "御坂美琴は、ペロロのぬいぐるみを前に首を傾げていた。あまりにも個性的なビジュアルのため、人気が分かれているのだと告げると、自分が元の世界で好んでいたゲコ太のようなものか、と納得し、逆にちょっと可愛く見えてきたと笑う。そうして先生は彼女にペロロのぬいぐるみをプレゼントするのだった。"
3584522966 = "自動販売機"
4025701392 = "自動販売機を蹴飛ばす御坂美琴を見かけた先生は、公共の器物を傷つけるのは良くないと注意する。曰く、元の世界でもよく自販機にお金を呑まれてしまい、こうして蹴っていたのだとか。そういう時はこうするのだと、先生は自販機に貼ってある連絡先に問い合わせ、修理してもらってお金とジュースを彼女に渡すのだった。"
718444544 = "心理掌握"
1123173044 = "カフェでジュースを飲んでいる食蜂を見かけた先生。今日はラッキーな日だと告げる食蜂に、自分も同じ気持ちだと伝えると、本当にそう思ってるのか能力で「確認」したくなると食蜂は笑う。そんな彼女に対し、むしろ能力で操ってほしいと告げる先生を見て、食蜂は苦笑いするのだった。"
1711116450 = "頭脳労働専門"
716760121 = "なんだかあまり集中できないと告げる食蜂をグラウンドに呼び出した先生は、気分転換にジョギングをしようと提案する。運動の最中、倒れてしまった食蜂を連れて、慌てて病院に駆け込むのだった。"
3008897746 = "気配り"
3840979936 = "商店街を歩いていた食蜂は、団体客がアルバイトを困らせている姿を目撃する。先生が間に入ろうとするも、先に食蜂は持参していたリモコンのボタンを押し、事態を収拾するのだった。"
1142774852 = "料理のこだわり"
2658033607 = "食蜂は、普段口にするものはオーガニック料理だけで、シェフの心を読んでまでこだわっているのだと告げる。そんな食蜂を、先生はキヴォトスの美食家が太鼓判を押す店に連れて行くのだった。"
3833015538 = "あたしが都市伝説"
2064820506 = "都市伝説が現実になったかのようなキヴォトスの町並みに感激する佐天。先生はキヴォトスの住民から見たら佐天の方が都市伝説のような存在なのではないかと告げる。それを聞いた佐天はショックを受けるも、逆にキヴォトスの都市伝説を探すのだと息巻くのだった。"
752863816 = "意外な共通点"
3683657408 = "佐天はキヴォトスの住民が麻雀を打っている姿を見て、異世界であるのにも関わらず麻雀があるという事実、そしてルールが全く同じなことに驚いていた。そうして、メンバーが足りないという住民に混ざって、佐天は麻雀を楽しそうに打つのだった。"
3697516015 = "バッティングセンス"
4003979523 = "バッティングセンターにやってきた佐天は、片隅に怪しげな注意書きが付いている打席を見つけて、そこに入ることに。心配する先生に対し、佐天は3球以内に打てなかったら打席を離れる代わりに打てたら飲み物を奢ってくれないかと提案するのだった。"
900027051 = "努力の才能"
123698568 = "射撃練習をしていた佐天は、もしかしたら射撃なら才能があるかもしれないと思って試していたのだと漏らす。曰く、元の世界でも自身の才能を見つけるべく色々なことに挑戦していたのだとか。それを聞いた先生は、努力できることはすごいと励ますのだった。"
3866139307 = "初めてですの！"
1895217624 = "「一息つく」という言葉の意味をまともに理解できなかったユカリを連れて、先生はゲームセンターを訪れる。初めて経験する様々なゲームを、ユカリは満面の笑みを浮かべて楽しむのだった。"
3444356400 = "駄菓子の味は、えくせれんと！"
946448440 = "しょっぱいお菓子をほとんど知らなかったユカリを連れて、駄菓子屋を訪れた先生。ユカリは駄菓子の味と、駄菓子屋の多様な文化に驚きながらも楽しむのだった。"
1592716139 = "休みも大切ですの！"
3393753597 = "先生と出かけるべくシャーレの執務室を訪れたユカリ。しかし、雨が降ってしまってお出かけはなくなってしまう。申し訳無さそうにする先生に対し、先生と共に過ごす時間が宝物なのだとユカリは笑うのだった。"
3227087653 = "待ちわびて、楽しみて"
3133093112 = "ユカリと共に商店街の抽選会に行くことになった先生。待ち合わせ場所に向かうと、1時間前からユカリが待っていた事を知る。どうしてそんなに早くから待っていたのかと問うと、これから何を教えてもらえるのか、どういう日になるのかと考えていたら居ても立っても居られなくて早く着いてしまったのだとユカリは照れくさそうに笑うのだった。"
1618618962 = "青春の師匠"
2730442199 = "レンゲに頼まれて百花繚乱を訪れた先生。先生はレンゲに「青春活動」をしたいと言われ、青春らしい活動について相談を受けることに。いろいろな話を交わした末、先生はレンゲと「青春師弟関係」になるのだった。"
2356886607 = "青春の定番：転校生"
3406357501 = "レンゲは先生に「青春活動」の一環として転校生イベントを一緒にやることに。しかし、思い通りにならず……レンゲが落ち込みかけた瞬間――先生はレンゲに転校生に紹介するよう、周辺を紹介してほしいと頼むのだった。"
1544493195 = "青春の定番：幼馴染"
3623899194 = "とある朝。レンゲが先生を襲う。「青春活動」の一環として幼馴染イベントをしたいのだという。イベントの後、満足げに「青春活動」を終えようとしたその時、今日はまるでデートみたいだったと話す先生の言葉に、レンゲは慌てるのだった。"
3348684246 = "青春に感謝を込めて"
1912112273 = "食事をとることすら忘れ、滞った仕事を処理していた先生は、レンゲの「青春活動」に付き合わされることに。そうして先生は過労で倒れてしまう。反省したレンゲは、自分のために頑張ってくれた先生に手作り弁当を渡すのだった。"
645991912 = "青春の白いリボン"
1111293954 = "青春小説の主人公がつけていた白いリボンをプレゼントされたレンゲは動揺し、慌ててその場を去る。実はそのリボンは、小説で主人公が恋人からプレゼントされるものだったのだ。それを知った先生はリボンを着けてあげるという青春活動を提案し、レンゲは照れつつもそれを受け入れる。"
4231253403 = "調停室の番猫"
3314480634 = "キキョウに呼び出され百花繚乱を訪れた先生は、建物の老朽化に気づく。気にすることないと話すキキョウだが、先生は危ないから修理する、と自ら修理用具で補修を始め――その姿に、最初は手を貸さないと告げていたキキョウも手を貸してくれる。そして、キキョウはお礼として先生に夕食をごちそうするのだった。"
2471480039 = "休息の重要性"
3763484608 = "以前、百花繚乱の建物を修理してくれたお礼をすべく、シャーレを訪れたキキョウ。借りを返すために、どんな事でもやるというキキョウの言葉に、先生はキキョウにも休んでほしいと言う。戸惑うキキョウだったが、何でもする約束を守るため、休息を取ることにするのだった。"
3365191938 = "隠したかった思い"
4099866023 = "シャーレの仕事で百鬼夜行に向かった先生は、キキョウに助けられた住民からお礼品を受け取って百花繚乱を訪れる。そこで先生は倒れていたキキョウを発見する。キキョウは弱い自分の姿を人に見せたくなかったと言うが、先生はちゃんと休むことも大事だと言い、住民から貰ったプレゼントを渡しながらキキョウの介抱をするのだった。"
375291297 = "こころ開いて"
810913540 = "先日のお礼がしたいというキキョウの連絡を受けた先生は、百花繚乱の倉庫に到着する。倉庫の中に入ると、キキョウが先生を迎えてくれるのだった。"
2188741523 = "ファッション特訓編"
2709052074 = "ファッションの特訓をすると言ってシャーレを訪れたエイミ。エイミの多少ズレたファッションセンスを確認した先生は、一緒に水着を選びに行くことにするのだった。"
3737979995 = "ファッション実践編"
2681531124 = "エイミと水着選びをする当日。エイミが水着を着ようとする理由は、氷海に入るためだという事を知る。先生はそんなエイミのために防寒グッズを用意するが……そしてエイミは水着の上にジャケットという画期的なファッションを完成させるのだった。"
3806087283 = "作戦準備"
4246151599 = "先生が特異現象捜査部を訪れると、エイミは水着の上にジャケットを羽織って独自の扇風機を作っているのだった。"
2234223693 = "冷水浴"
3146169999 = "エイミから連絡を受け、気になった先生は氷海を訪れる。そこで目撃したのは、氷に穴を開けて冷水浴を楽しんでいるエイミの姿だった。"
228855696 = "山の距離感"
2565918406 = "登山口で先生は録音機を持っているコタマと出会う。コタマはここでしか録音できない会話を録音しにきたのだと伝え、先生は山を登ったほうがより自然な音が録音できるのではないかと提案し、一緒に登山することに。登山を始めたコタマは疲れてしまい、先生が手を差し伸べる。2人の手が当たった瞬間、コタマは自分が以前に言っていた言葉を思い出し、顔を赤くするのだった。"
3369167674 = "自然の音（１）"
2380232793 = "登山のために再び山を訪れた先生は、そこで録音機を持っているコタマと再会する。コタマは焚き火の音を録音するためにやってきたのだと言いながら、火を起こそうと格闘していた。しかし、どれも失敗してしまい、コタマは先生に助けを求めるのだった。"
3281512578 = "自然の音（２）"
2625303492 = "以前の失敗を反省し、頭を悩ませるコタマ。今回は普通に自然の音を録音すると言い、再び2人は山を登ることに。大きな古木を見つけたコタマは古木の中から聞こえてくる音に耳を澄ませるのだった。"
2980225488 = "反響"
1001482326 = "先生と一緒に山頂を目指すコタマ。そうして2人は山頂に到着し、先生は反対側の山に向かって歓声を上げる。木霊の返り音を聞きながら、コタマは木霊も悪くないのだと笑うのだった。"
2146835391 = "ノマドワーカー"
886315080 = "ハレの連絡を受けて近郊の公園を訪れた先生。そこでハレはノマドワーカーみたいに屋外で作業をするための様々な装備を設置していた。万全の準備をしたハレは作業を始めるも、不便さを感じるのだった。"
3941496298 = "グランピング"
1758508230 = "シャーレの仕事でヴェリタスの部室を訪ねた先生。部室は何故か寒いのにクーラーがつけっぱなしの状態だった。ハレはサーバーをテストするために冷房を強くしているのだと言う。そしてハレは、クーラーの風を避けるべくキャンプ用の寝袋の中で怠惰なグランピングを始めるのだった。"
3942846821 = "世界一大きいサーバー"
2015698466 = "メンテナンス中、とあるハッカーから匿名の挑戦状を受けたハレ。挑戦状に書かれている座標には「世界で一番大きなサーバー」があるという話に、ハレと先生は座標に向かって山登りを始めることに。目的地に到着したハレは、そこが閉館された天文台だと気づき、空の星々を眺めながら優しい挨拶を送るのだった。"
3682214390 = "デカフェ"
1655277294 = "カフェインを断つべくコンビニや冷蔵庫のない屋外で作業をすることになったハレ。しかし、まもなくカフェインの禁断症状が現れ、そんなハレのために先生はコーヒーを直接淹れて手渡す。コーヒーを飲んで持ち直したハレは、そのコーヒーが実はデカフェコーヒーであることを知るのだった。"
850398333 = "万魔殿の偉大な議長！"
3031741265 = "マコトの招待を受け、万魔殿を訪れた先生。マコトは万魔殿と手を組むよう先生に提案するが、先生はマコトの提案を断るのだった。"
4070412729 = "偉大な議長の事業"
1791984264 = "万魔殿の真骨頂を見せると告げ、シャーレを訪れたマコト。先生はマコトに連れられたまま、印刷所やリゾートなど万魔殿傘下の事業所巡りに参加することになる。商店街でちょっとしたトラブルが発生するが、マコトは立派に問題を解決し、議長らしき姿を見せてくれるのだった。"
3478178877 = "偉大な議長の休日"
4007523766 = "先生は、ショッピングモールでライオンマルの餌選びに悩んでいるマコトと遭遇する。その時、突然倒れたマコトを連れて病院を訪れるが、マコトは猫アレルギーと診断される。しかし、マコトは最後までライオンマルの世話をすると宣言するのだった。"
1780717963 = "偉大な議長の日常"
1041879085 = "これまで万魔殿が繰り広げてきた事業の成果を見せるというマコト。しかし、すべての事業所でトラブルが発生し、莫大な被害を受けることになってしまう。押し寄せる衝撃にしばらく揺れるマコトだったが、逆境に負けることなくトラブルを一つ一つ解決していくのだった。"
1474073232 = "とにかく負けられません！"
3557545465 = "アコの連絡を受け訪ねてきた先生は、万魔殿に対する愚痴を聞くことに。アコは、負けたままではいられないと言い出し、先生と一緒にドレスを選ぶ。しかし、先生おすすめのドレスを見たアコは困惑し、やはり先生は風紀を乱しているという言葉を放って、慌てて席を立つのだった。"
3679592377 = "とにかく返品します！"
2522776615 = "一緒にドレスを見ている中でドレス姿を手放しで褒める先生の言葉にアコは恥ずかしがる。その瞬間、万魔殿が騒ぎを起こしているという連絡を受けたアコは急いで現場へ駆けつけ、代わりにドレス選びをすることになった先生。しかし、先生は店員のおすすめで一緒に着るインナーも購入し……。"
2124286988 = "とにかく忙しかったんです！"
2646682580 = "まもなく開催されるパーティーの準備のためにアコと先生は懇親会に参加することに。ドレス姿に慣れないアコを先生がエスコートするも、ドレスが破れてしまい……。"
2761186677 = "イブキと遊ぼう！"
2632442291 = "当番のためにシャーレを訪れたイブキ。先生の仕事を手伝おうするも、ゲーム機とおもちゃに目を奪われてしまう。先生は、そんなイブキと一緒に遊ぶことにするのだった。"
1254725189 = "イブキと楽しいピクニック！"
3516138625 = "遊園地に行く約束したイブキと先生。お弁当を準備しながらその日を心待ちにしていたが、当日に雨が降ってしまう。先生はしょんぼりしたイブキのためにシャーレが遊園地だと言って、イブキと楽しい一日を過ごすのだった。"
2360081099 = "イブキと職業体験！"
685531614 = "学校で「進路希望調査書」をもらったイブキ。大人になったらどんな仕事ができるか分からないと言うイブキのために、先生は色々なところを歩き回りながらイブキに職業体験をさせてあげるのだった。"
2071765566 = "イブキとお勉強！"
2159313193 = "色々な職業を体験してから、一番好きなことが何なのかを考えてみたと言うイブキ。彼女が選んだのは「先生」だった。イブキは自らセットした小さな教室に先生を招き、楽しく算数の授業を始めるのだった。"
2194837532 = "ヒナとドレス（１）"
58131079 = "ゲヘナの社交パーティーに参加することになったヒナ。ヒナは先生にパーティーに必要なもののアドバイスを求める。まずは服装を整えるべく、倉庫を探すことに。そこでヒナが幼い頃に着ていたドレスを見つけるも、サイズが合わずに破れてしまう。その後二人は一緒にドレスを選びに行くことを約束するのだった。"
324299341 = "ヒナとドレス（２）"
2948041859 = "ヒナと一緒にドレスを選ぶことにした当日。ヒナは風紀委員会の仕事で待ち合わせの時間に間に合わず、代わりに先生にドレスを選ぶよう頼むのだった。"
1999678653 = "ヒナとピアノ"
1434829550 = "ヒナの招待を受けた先生。二人だけの空間で、ヒナは先生のために演奏を始めるのだった。"
2011469792 = "静かなひととき"
803201985 = "カヨコの連絡を受け、オペラハウス付近の狭い路地に着いた先生。そこで先生とカヨコは会話を交わす。"
1182512530 = "ドレスコード"
2124358865 = "便利屋の事務所に到着した先生を迎えるカヨコ。先生は事務所の片隅に放置されたドレスを見かける。少しの会話を交わした後、先生はカヨコに一緒に夕食を食べることを提案するのであった。"
1671331120 = "子供の意地"
2297857782 = "便利屋の事務所を訪れた先生。そこにいたのはドレス姿のカヨコ。以前のお礼をしたいカヨコは、遠慮する先生にとある言葉をかける。"
2029319155 = "出番のないドレス"
3430969351 = "モモトークで言葉を濁すアルが心配になった先生は、便利屋の事務所へ足を運ぶ。アルは、ずっと悩んでいたドレスの処分について、先生に助言を求める。"
3483710198 = "ちょっとは近づいたかしら"
2862818090 = "アルの頼みを受けて事業説明会に到着した先生。しかし、説明会は支離滅裂な内容で、アルは落ち込んでしまう。先生はそんなアルを宥めるために、特別な場所へ案内するのであった。"
3809174998 = "二度あることは三度ある"
3868290257 = "約束時間が過ぎても姿を現せないアル。先生は心配になってアルを探すと、困っているアルの声が聞こえてくる。またしても先生に助けられたアルは、深い感謝を表すのであった。"
761424835 = "目的のために"
2024730199 = "新年の大食い大会に参加しようとするアカリ。しかし、大会進行委員会曰く「何度も優勝した人が、また大会に参加するのは困る」などと言い、難色を示す。そこで先生から提案が上がり、大会はアカリ対参加者全員という形で開催される。が、アカリは堂々と大食いチャンピオンの座を守り抜くのであった。"
882945439 = "希望をかなえるために"
3977936515 = "お雑煮の支度でお餅が足りなくなり、アカリは直接お餅を作るべく、餅つき大会へと参加することに。"
1458542543 = "幸運を迎えるために"
2394074920 = "「年越しうどん」を食べるべく、うどんツアーに出かける先生とアカリ。地域内の有名店を制覇すれば、認定証がもらえると知ったアカリは、様々な名店のうどんを食べ尽くすのであった。"
1588234287 = "お祭りって素敵です！とっても、とーっても！"
496070893 = "百鬼夜行のお祭りに先生を招待したウミカは、会場のあちこちを回りながら先生を案内する。"
336809221 = "思い出す、お祭りの記憶"
1264327924 = "百夜堂を訪れた先生はウミカと静かな午後を過ごす。そこでウミカは、今までずっと抱えていた悩みを打ち明けることに。"
63381328 = "お祭りを邪魔する子は許しません！"
799850412 = "ウミカの連絡を受け百夜堂を訪れた先生。そこではウミカがやんちゃなお客さんたちに困惑していた。そこで先生のアドバイスを受けたウミカは真心を込めた「おもてなし」をすべく、行動に出るのであった。"
1822406799 = "あなたのためのお祭り"
3628022907 = "百夜堂を訪れた先生を熱烈に歓迎するウミカ。彼女は先生だけのために、特別なお祭りを準備していた。"
2198939886 = "ひとつの世界"
3468668910 = "シャーレを訪れたウミカは、お祭りを日常から離れた特別な「世界」だと先生に熱弁。その話の中で、初めてのお祭りで買ったという古いペアの人形を紹介する。ウミカが帰った後、先生は机の上に残されたペアの片割れの人形を見つけるのだった。"
3045026029 = "また別の修行（？）"
4119105229 = "ツバキの連絡を受け百鬼夜行を訪れた先生は、そこで風変わりなガイドを受けることに。"
418161561 = "速習コース"
1812128083 = "先生に睡眠ガイドをしてあげると言い、シャーレを訪れたツバキ。そんな中、「百鬼夜行の眠り姫」がシャーレに来ているとの噂を聞いて、とある生徒たちがやってくる。彼女たちは不眠症で眠れないのだという。ツバキはそんな生徒たちのため、睡眠の方法をガイドすることに。"
2010941900 = "良い眠り、良い夢"
1529221547 = "真夜中、百鬼夜行での仕事を終えた先生はツバキに連絡する。ツバキは先生のためだけのツアーガイドを始めると、疲れ果てた先生は眠りに落ちる。"
4052115729 = "ボーカル練習"
2194871063 = "先生は近くのカラオケでカズサのボーカル練習に付き合わされる。"
2034375151 = "放課後バンド部"
3425425496 = "先生のところを訪れたカズサは、練習中、どうしても食べられなかったスイーツを先生と分けて食べるのであった。"
3700069782 = "私の担当です"
3288920718 = "カズサが考案した最適なルートに沿って、スイーツ巡りをする先生とカズサ。色んな店を回るが、最後の店でカズサはミュージシャンだと誤解されることに。そんなカズサは咄嗟に先生のことを「専属マネージャー」だと紹介してしまう。"
1489758999 = "あたたかな音色"
3457523314 = "聴きたいLP盤があると言うカズサを連れて、オーディオルームを訪れる先生。カズサが取り出したのは、思い出として作った1枚限りのLP盤だった。シュガーラッシュの演奏に耳を傾けながら話に花を咲かせていると、曲が切り替わって先生の歌声が流れてきた。それは2人が一緒にカラオケに行った時のもの。カズサにとって、残しておきたい大切な思い出なのだった。"
1720743063 = "シュガーハイ"
4202174343 = "アイリの招待を受け、市内へと足を運ぶ先生。いつもより機嫌が良いアイリと一緒に、とあるカフェを訪れる。しかし、思ったより列は長く、どうするか悩むアイリ。そんな二人は話をしながら、待ち時間を潰すのであった。"
2100881557 = "シュガーラッシュ"
3689167069 = "先生に練習を見てもらうことにしたアイリ。だが、その帰り道で突然の豪雨に遭う二人。アイリは自身のジャケットをかぶって一緒に走ることを提案する。"
3093181537 = "シュガークラッシュ"
113729469 = "バンド活動が終わりを迎え、複雑な気持ちでいるアイリのために、先生は悩みを聞いてあげるのであった。"
3799374904 = "美的感覚"
316334877 = "個性豊かな部員たちに衣装選びを任せるのが不安だと言うヨシミ。そんなヨシミは先生にアドバイスを求めながら、衣装選びをすることに。そして、選ばれた衣装は先生が部室まで運ぶのであった。"
2596685212 = "アドバイス（？）"
1913792740 = "ヨシミの悩みを聞くため、先生はカフェに向かう。自身のサインのデザインに悩んでいたヨシミは、色んな妄想を膨らませた後、お会計を済ませようとするが、ヨシミは領収書にうっかりそのサインを書いてしまう。先生は恥ずかしがっているヨシミをからかうのであった。"
3164217481 = "あなたのために奏でて"
2214771348 = "ヨシミの連絡を受け、約束した場所へ到着した先生。ヨシミは先生のために曲を練習したと言う。呼吸は整えたものの緊張してしまうヨシミ。結局、ヨシミは床に座ったまま演奏を始める。関心した先生はアンコールを叫びながらからかう。ヨシミは照れながらも、準備していた全ての曲を演奏するのであった。"
3782277926 = "キララの部活"
1447560689 = "ゲヘナでの用事を済ませ帰る途中、キララを目撃した先生。友達と楽しくおしゃべりしているキララの姿に驚いた先生は、キララの部活について聞くことに。"
3408135695 = "強引なキララさん"
1107638503 = "テストで赤点を取ったキララは、先生に試験勉強をお願いする。冴えない顔をしているキララのために、先生は個人授業を行うことにする。"
3959270548 = "2人だけの個人授業"
2956308925 = "キララの連絡を受け、ゲヘナ学園を訪れた先生。静かな教室で2人は勉強を始める。その後、勉強に集中したキララに対し先生は休憩を提案するが、キララはまだ勉強を続けようとして……。"
235996998 = "キララ on the street"
1817181974 = "個人授業のお礼がしたいと言うキララと共に、先生はあちこちを歩き回る。二人は楽しい時間を過ごすのであった。"
11208201 = "頑張った証ってヤツ？"
2323993205 = "リングノートを失くしてしまったキララは、慌てて古紙倉庫を漁っていた。曰く、部屋の片づけで外に出しておいたものを誤って回収されてしまったらしい。先生が探し出したそのノートは綺麗にデコレーションされ、キララの大切な思い出が綴られていた。ふと目に留まったページに描かれていた似顔絵を先生が指摘すると、キララはノートを持って逃げ出してしまうのだった。"
296399585 = "メイドな気分！"
3524968918 = "メイド服を着たついでに、シャーレを掃除してあげると言うモモイ。だが案の定、シャーレに来たモモイはソファで寝転がっている始末。先生はそんなモモイを起こし、一緒にシャーレを掃除するのであった。"
487322513 = "メイドの料理！"
74482891 = "メイド服を着たついでに料理をしてあげると言うモモイ。今度はコンビニで買った物を使い、ゲームで登場した料理を作ろうと試みる。しかし、買い物をしすぎてしまい、後始末に苦労することになるのであった。"
4200373453 = "メイドの休息！"
2287657410 = "またしても、メイド服を着たからメイドらしい仕事をしてあげる、などと言うモモイが今回試みるのは、休憩すること。効果的な休息をとるべく、ミレニアムの様々な部活から器具を貰っていた。しかし、器具は誤作動を起こし、先生とモモイは筋肉痛になってしまうのであった。"
2123764785 = "メイドになりますよ、先生！"
1478421162 = "ゲーム開発部室を訪れた先生は、メイド服姿のミドリと出会う。ミドリはメイドが主人公になるゲームのキャラクターデザインを考えており、正統派メイドにしたいと言う。呼び名も大事だと考えたミドリは、先生をご主人さまと呼ぶことにするのであった。"
1578203463 = "お出かけの時間ですよ、先生！"
613352308 = "先生はミドリのために、一緒に服飾美術展を訪れる。テンションが上がったミドリは、先生のために古典服を沢山用意するが、先生はミドリを落ち着かせる。そんなこんなで、2人は服飾美術展を存分に楽しむのであった。"
4234835853 = "覚えててくださいね、先生！"
1167253886 = "メイドが主人公になるゲームのキャラクターデザインの為にメイド服を着ていたはずのミドリだが、ずっと先生と遊んでいただけだったと思い返す。そんなミドリは、シャーレでメイドらしい仕事に取り組む。そして最後に、メイド姿を写真で残してほしいと先生に頼むのであった。"
3911733272 = "最高の休暇"
1858906170 = "せっかくのリゾート、最高のバケーションにすべく色んな場所を探し回るセリカ。特別な何かを見つけることはできなかったが、セリカはこの過程こそが最高のバケーションであることに気づいていく。"
2428709807 = "姫 on the boat"
1684051936 = "倉庫で放置されたバナナボートを見つけたセリカは、それが問題なく使えるか、先生と一緒にテストをしようとする。"
1798149545 = "思い出は数え切れず"
773578818 = "アビドスに戻り、先生と部室の掃除をしていたセリカは、水着を発見する。思い出に浸り、すこし寂しそうな顔を浮かべるセリカに、先生はある提案をする。"
1569262550 = "水着選び"
3132777354 = "ライフセーバーとして派遣される事になったカンナは、先生と一緒に水着を選ぶことに。"
321959446 = "試運転"
1320900751 = "カンナは複数人が乗れるウォータースライダーを点検するため、先生を誘い二人で一緒に乗ってみるが……。"
1944847401 = "ライフセーバーの特権"
3375768959 = "ウォーターパークの定休日。「ヒーリングスパ」の掃除と整理の任務を引き受けたカンナは、先生と束の間の休息をとるのであった。"
728682739 = "ポリス・ストーリー～フードコート編～"
2691646951 = "先生のことを「監察官」と呼び、フードコートをパトロールしたがるフブキ。その目的はフードコートにあるドーナッツ屋が目当てだったようだ。"
2300515944 = "ポリス・ストーリー～流れるプール編～"
1597168577 = "ウォーターパークのパトロール任務を受けたフブキは、何故か楽しそうな顔をするのであった。"
1031326801 = "ポリス・ストーリー～ロスト・パラダイス編～"
1211536315 = "誰にも邪魔されない空間を見つけたフブキは、サボるための遠大な計画を立てるのだが……。"
3039528055 = "人命救助訓練"
3169271538 = "ライフセーバーの任務を受けたキリノは、人命救助訓練を行うべく、先生と一緒にヴァルキューレ警察学校の水泳訓練場へ向かう。"
4241689255 = "心肺蘇生法"
3041462882 = "今度は心肺蘇生法の訓練を行うキリノ。しかし、訓練に使う模型を忘れてしまい、先生が代わりに教材になってくれるのだが……。"
2625703360 = "総合救護実習"
2642714145 = "訓練を終えて最後の点検を行うキリノ。熱心に取り組んだものの、結果は芳しくない模様。その様子を見守っていた先生は、足を踏み外し、水に溺れてしまうのだが……。"
4005278696 = "Explosive hazards"
770948941 = "海辺で先生とモエは色んな話を交わす。そんな中、モエは自身の水着にも「破壊的な何か」が隠されていると言及し、その何かをさらけ出そうとする。先生は慌ててモエを止めるのだが……。"
2726872600 = "Danger close"
3684290810 = "何かが爆発するというメッセージを受けた先生は、慌ててモエのところを訪れる。しかし、モエが言っていた「何か」は炭火の上に乗せた貝のことであった。解凍されてない食材が炭火の上でパチパチと音を立てる姿に、モエはうっとりする。"
1520173270 = "Logistics information"
1831576614 = "漁村の特産物、くさやの売上が伸び悩むことに頭をかかえている漁師たち。モエはそんな漁師たちのために直接アプリを開発することに。くさやをアプリに登録した瞬間、ユニークな食材を好む人々から注文が殺到してしまうのであった。"
1947646090 = "Area beautification"
1090909669 = "村の住民から空き家を案内されたモエ。そんなモエは、他の小隊員のために空き家を修理することに。修理を終え、一休みする時、虫が寄ってしまう。モエは蚊取り線香を焚き、その匂いを嗅ぎながら昔の思い出に浸るのであった。"
717510768 = "ヒーロー、誕生"
1205296410 = "書類仕事を背負うことになったホシノ。先生はそんなホシノの作業を手伝い、代わりとして、以前見た武装した格好をもう一度してほしいという。そこへヘルメット団がやってきた。それをなんなく撃退した武装姿のホシノを、先生は「アビドスのヒーロー」と呼ぶのであった。"
2747864121 = "ヒーロー、パトロール"
265807011 = "アビドス自治区をパトロールするホシノと先生。その中で市民を助け、市内の外郭にある捨てられた列車で一晩を過ごすのだった。"
1849506027 = "ヒーロー、決戦"
1466126374 = "ヘルメット団の不審な動きを追っていたホシノと先生は捨てられた校舎でヘルメット団を発見し、一網打尽にするのであった。"
218109715 = "専門家"
1957182403 = "先生は、シロコがどのように暮らしているか直接確認しようと彼女の元を訪れる。しかし、シロコの生活は全く予想外のものであった。"
2455626068 = "変わったもの、変わらないもの"
2766229661 = "シロコはこっちの世界と、向こうの世界は微妙に変わっていると言う。だがそんな中でも、変わらないものも在ることに気づく。"
789167182 = "覆面ライダー"
4039489432 = "いつからかアビドスに出没し始めた「覆面ライダー」。その正体は再び自転車に乗り始めたシロコだった。そんなシロコに最近悩みができたという。"
1074029922 = "食堂アルバイト"
2521063046 = "海辺の食堂でアルバイトをしているサオリ。しかし、ある客からクレームを受けることになる……。"
2149489111 = "お祭りの音を探して"
3190600684 = "DJステージのためにサンプリングをすることになったサオリ。使えそうな音を探すべく、サオリは先生と一緒にお祭り会場のあちこちを探索することになる。"
3891669579 = "二人だけの打ち上げ"
63371907 = "DJステージが終わった後、先生とサオリは誰もいない舞台に座り、二人だけの打ち上げをすることになる。"
1028892596 = "当選確率"
885397784 = "水着をもらうため、雑誌の懸賞はがきを書くヒヨリ。しかし、イベントの応募期間は終わっていた。先生はヒヨリのため、水着を買ったあと、それが当選で当たったかのように工夫をする。"
1411829040 = "日焼け止め？"
4042979183 = "日焼け止めの代わりにごま油を塗ったヒヨリは、肌焼けしてしまう。治療を終えた先生はヒヨリを宥めるため、アイスバーを買ってあげるのだが……。"
23063759 = "予想外の思い出"
1830453388 = "ヒヨリは普段お世話になっている先生のためにお返しをしようとする。それは、ヒヨリと先生だけの特別な花火であった。"
2202535381 = "形がなくとも残るもの"
269523938 = "アツコは、新しく手に入れたデジタルカメラで色々なものを撮ってみたいと言う。そんなアツコと一緒に先生はお祭り会場を歩き回ることに。"
2300375645 = "逃げた先にあるもの"
665744446 = "先生とアツコはお祭り会場でフォトゾーンを見つけ写真を撮る。しかし、法外な写真代を要求するヘルメット団に遭遇する。なんとか逃げ隠れる事に成功した二人はそこにちょうど花が咲いていた事に気づく。"
942189667 = "最後に撮ったもの"
1659279476 = "カメラのバッテリーが残り少なくなったというアツコ。最後に何を撮るか悩んだ結果、アツコが撮ったものは……。"
486009611 = "休むなら心のタガを外して"
3128164768 = "せっかくの休日ではあるものの、休み方が分からないカリンは時間の使い方を先生に相談する。先生の提案でお祭り会場に向かった二人は、屋台を巡りながら心のままに食べ歩きを楽しむのだった。"
2155174399 = "休むなら二人一緒に"
933163258 = "なおも休み方が分からないカリンはシャーレを訪れる。「何もしない」を提案した先生の意見に従うカリンだったが、先生は仕事を続けていた。忙しい先生を見ながら自分は何もしないでいることが落ち着かないカリンは、先生の仕事を手伝い始める。協力して仕事を終わらせた二人は、一緒に「何もしない」をして過ごした。"
1196121695 = "休むなら特別な休日を"
1780687568 = "自分なりに休日の過ごし方を思いついたカリンは「登校」に先生を誘う。制服に身を包んだカリンと一緒に先生は通学路を歩く。カリンにとって「日常」に感じられていたものが、先生と一緒に歩き、通学路の秘密を共有したことで「特別」な休日になったのだった。"
1297953155 = "嘘と真"
133657712 = "山海経の珍味を楽しむマリナ。地域特有の冗談に振り回される彼女を、先生が助けるのであった。"
1883169484 = "羞花閉月"
2438739727 = "チーパオ姿になったマリナは、あるカメラマンから写真撮影を提案される。先生からもオススメされ、マリナは撮影に臨むのであった。"
3353300618 = "快刀乱麻"
83669419 = "月餅を4等分にするか、8等分にするかで議論する山海経の生徒たちに、マリナは一つの答えを提示する。しかしその後、お茶の飲み方について反論される事に。"
3593618651 = "話を聞く技術"
3790006563 = "梅花園を訪れたトモエは、驚くほど子供の世話に慣れた姿を見せる。トモエは元々、子供とお喋りするのが好きだと言った。"
533034601 = "寒国の秘書室長"
3953618809 = "レッドウィンターから来たトモエにとって、山海経は暑い模様。トモエはうちわを扇ぎながら、先生とひと時を過ごすのであった。"
3599242579 = "毎日健康生活"
3462245568 = "中華料理は不健康だというデマに困っている店長。トモエは特技のアジテーションで客を集めることに成功する。さらに、キヴォトスでちょっとした中華料理ブームまで巻き起こることに。"
2148141524 = "日課"
1009451031 = "話があるというレイジョに呼び出され、先生は山海経の公園へ向かう。そこで彼女がカンフーの朝練をする様子を見学したのち、カンフー映画の話で楽しく盛り上がるのであった。"
2050752819 = "面倒見"
2040477035 = "梅花園の園児たちの来訪を控え、どう対応するべきかレイジョは困っていた。玄武商会で起こる数々のトラブルは手際よく解決できるのだが、子どもとの接し方がわからないのだという。しかし食事に来ていた先生の子どもとの接し方を目にしたことで、ある種のコツをつかみ、レイジョは園児たちと仲良くなることに成功したのだった。"
3812995799 = "カンフーの教え"
541090949 = "先生立ち合いのもと、玄龍門の衛生状態に関する監査を受ける玄武商会。監査官の横暴に怒りを爆発させそうになるレイジョだったが、先生の助言により「カンフーの教え」を思い出し、穏便に事態を収拾するのだった。"
4240158672 = "主体と客体"
1037046256 = "当番のためシャーレにやってきたレイジョは、先生の外回り仕事に同行する。その道中、今日一日自分を守ってほしいと先生に頼むレイジョ。途中スケバンの戦闘に巻き込まれてしまうが、先生なりの生徒の守り方を目にして、改めて山海経へ帰るまで守るという先生に身を寄せ甘えるのであった。"
687178835 = "宮中のかくれんぼ"
2331129627 = "キサキから連絡を受け、六和閣からの脱出に力を貸すことになった先生。玄龍門の構成員や玄武商会メンバー、梅花園の園児に変装したキサキを連れ無事脱出に成功するも、全ては「脱出ごっこ」であった。楽しいひとときをふたりで過ごした後、先生はキサキの門主としての業務に付き合うことになる。"
3457268771 = "胡蝶の夢"
3801392505 = "当番のためシャーレにやってきたキサキは、持参した香薬の心を落ち着かせる匂いに包まれながら、先生と二人、さっそく仕事に取り掛かる。キサキが提示する問題の解決方が極端なことに先生は驚くが、仕事そのものは手早く片付けることができた。二人は次の予定に移ろうとするも、徹夜続きだった先生が眠気に勝てずダウンしてしまったため、キサキは膝を貸すことにしたのであった。"
4083890821 = "籠鳥雲を恋う"
2918134416 = "シャーレにやってきたキサキ。ひと仕事を終えたところで、先生に誘われ屋上へ向かうことになる。そこで景色を眺めているうちにキサキが漏らした「もっと遠くへ行ってみたい」という独り言に先生は応じ、二人は一緒にいろんな場所の景色を見に行こうと約束する。"
4262508585 = "水を向けて"
355824304 = "以前の約束どおり先生と一緒にいろんな場所へ遊びに行くキサキ。地下鉄や遊園地、ゲームセンターなど、様々な施設を満喫するが、帰り際になって体調を崩してしまう。近くの宿に運び込まれたキサキは、信頼する先生に頭を撫でられながらしばし休息したのだった。"
3494385232 = "一口どうぞ"
516102790 = "アイドルコンテストに向けて練習に励むマリーを応援するため、先生は彼女のもとを訪ねた。ちょうどお昼時だったため、一緒に昼食をと提案するマリーだったが、肝心のお弁当が一つしかなかったため、遠慮する先生。しかし自分だけ食べるのは申し訳ないと思ったマリーは、わがままを聞いてもらうていで玉子焼きをひと口、先生におすそ分けするのだった。"
2845702047 = "マリー親衛隊"
982300326 = "再び先生がマリーのもとを訪ねると、彼女を守るように着ぐるみ姿の生徒がいることに気付く。話を聞くとどうやらマリーの親衛隊のような役割を任された生徒らしい。シャーレの先生であることを伝えると、その生徒は納得した様子であとは任せるとその場を離れていったが、マリーは自分が頼りないからお目付け役をつけられたのではと少し自信をなくしたようだった。"
1887944177 = "ライブを終えて"
2221601705 = "先生は単独ミニライブを控えたマリーを応援しに行く。大盛況をよろこびつつも、普段の相談室よりも多くの人が見に来ていることを複雑に感じている様子のマリーにポジティブになるよう声をかけて、ステージに送り出す先生。それからライブを終えたマリーは少し興奮した様子で、しかしやりきった達成感もあり、先生にこれまでの助力に対する感謝の挨拶を伝えるのであった。"
1340882771 = "踏み出す勇気"
1554125012 = "見せたいものがあるというマリーのもとを訪ねる先生。すると、これまでのお返しということで、マリーはシークレットライブを披露してくれる。歌やダンスを通して、精一杯感謝の気持ちを先生に届けたマリーは、改めてこれからも自分を見守っていてほしいと先生にお願いするのだった。"
1675781559 = "努力の成果"
2417116786 = "アイドル活動を通して他の生徒との距離感が縮まったように感じると喜ぶサクラコ。しかし、アイドル衣装のおかげで皆と仲良くなれたと喜ぶあまり、シスターフッド全員にアイドル衣装を着せようとしてしまう……。"
2808779992 = "もう一人の私"
86290450 = "悩み相談があるというサクラコを訊ねる先生。話を聞くと、アイドル衣装でいたところ新参のシスターから「サクラちゃん」という別人だと誤解されてしまい、事実を打ち明けられず困っていると言う。どうすべきか悩んでいる彼女に、先生は正直に話せば分かってくれるはず、とアドバイスをする。それに従い勇気を振り絞って真実を明かすと、新たな友人を一人得られたと嬉しそうに報告するサクラコなのだった。"
1666107840 = "アイドルの輝き"
3975383213 = "学園祭に向けてアイドル活動に精を出すサクラコ。シスターフッド一同と先生は街の目立つ場所にポスターを貼って彼女を応援しようとする。サプライズでそのポスターが貼ってある場所へ先生が連れて行くと、アイドル活動を初めて良かったと喜ぶサクラコなのだった。"
3877968203 = "こういうのがお好きだと聞きました"
2316052442 = "たまにおかしくなるサクラコの様子がいつも以上におかしい。戸惑う先生に、サクラコはこれまでのお礼だと説明する。しかし意図に反して先生を困惑させてしまったと申し訳なさそうにするサクラコ。その気持ちが何より嬉しいと先生が言うと、改めて予定していた「アイドルスペシャルデートコース」に先生を誘うサクラコなのであった。"
899851085 = "写真撮影"
1154706643 = "アイドル衣装を救護騎士団のイメージ向上に活用すべく、写真撮影に臨むミネ。最初は先生にも堂々と状況を説明するミネだったが、救護騎士団員らに可愛いと思われていることに気づき、恥じらうのだった。"
2876252345 = "理由がなくたって"
934404426 = "買い物先やレストラン等、出会う先々でアイドル衣装姿を見せるミネ。理由を訊いても無理がある言い訳をして去ってしまう彼女をなんとか捕まえた先生は、好きな格好をするのに理由はいらないと励ます。ミネは隠していた可愛いもの好きな一面がバレていたことに焦り少々取り乱してしまうのだった。"
351631146 = "今の私と"
606260475 = "学園祭を終え、アイドル活動と救護活動の両立が難しいことに悩んだミネは、アイドルとしての自分を封印しようと衣装の処分を考える。先生の説得にも悩み抜いた末と意志は揺るがない。しかし一緒にまた着られる時が来るよう考えるという先生の言葉に納得し、アイドルとしての自分の行く末を委ねることにするのだった。"
1414095989 = "お互いの口実"
4030175207 = "ミネがアイドル衣装を着ることのできる機会を作ろうとする先生。ミネは迷惑をかけているのではないか心配するが、むしろ休暇を満喫する口実になるからと笑う先生を見て、自然と笑顔がこぼれる。それからミネと先生はともに穏やかな一日を過ごすのだった。"
2926157779 = "京極サツキは知っている"
3638915034 = "情報部を受け継ぐことになったというサツキ。協力関係であるシャーレに力を貸してもらいたいというのだが、協力関係など結んだ覚えがないという先生。そんな先生に対し、サツキは弱みを握っているのだと脅すものの、全く効かず、退散するのだった。"
2537055559 = "京極サツキは尋ねている"
2610548792 = "前回の脅しが全く効かなかったため、別の方法を用意したというサツキ。先生の爪を切ったり、白いTシャツを着せてカレーうどんを食べさせたり、可愛い猫の動画の良いシーンで広告が入るもスキップできないようにするなど……世にも恐ろしい拷問を繰り出す。しかし、やはり先生には効かないのだった。"
281454214 = "京極サツキは聞いている"
736914356 = "ついに「NKウルトラ計画」に進展があったと喜ぶサツキ。その第一歩の被験者として先生を選出する。そうして催眠術を繰り出すものの、先生には効かず……自分自身に催眠術をかけてしまい、先生の言うことを聞くことになってしまう。サツキが人を意のままにしたい理由について先生が問うと、世界平和のためなのだと語るのだった。"
3009929652 = "京極サツキは耐えている"
2843120852 = "サツキからSOSのモモトークを受け取り、万魔殿に向かった先生が見たのは、部屋に閉じこもっているサツキだった。曰く、予防接種の注射がイヤで引きこもっているのだとか。そんなサツキを説得し、先生は一緒に注射を打つのだった。"
796751500 = "京極サツキは震えている"
2925882867 = "シャーレ当番として意気揚々とやってきたサツキ。シャーレの情報を得るのだと息巻いていたところ、急に停電してしまう。風の音や、物が落ちる音に怯えるサツキに対し、先生は優しくそばにいてあげるのだった。"
1716752779 = "万魔殿の書記"
2765526546 = "チアキから「週刊万魔殿」の定期購読のメッセージが届く。そうしてシャーレに訪れたチアキは、先生に週刊万魔殿の魅力を語るのだった。"
3705330933 = "書記の取材生活"
651990844 = "前回の購読感謝のプレゼントとしてスイーツビュッフェのチケットをプレゼントしてくれるチアキ。次号の特集として取材に行きたいというチアキと共に、先生はスイーツビュッフェを満喫するのだった。"
2692250003 = "書記の趣味生活"
4167044195 = "今週の週刊万魔殿は休刊だというチアキ。今日は趣味のことをするというのでついていくと、ゲヘナの様々な部活に顔を出し、遊んでいく。こうして色々な人と遊ぶのが趣味なのだとチアキは語るのだった。"
2097502551 = "書記の探求生活"
3382911551 = "次号の週刊万魔殿の特集がシャーレになったというチアキ。シャーレ当番をしながら密着取材をするものの、先生の靴下の穴の謎や、秘密を探ろうとし始めてしまう。先生はそんなチアキを宥め、ネタになりそうなものがないか一緒に探してあげるのだった。"
828484028 = "不眠症"
3373880876 = "シャーレの仕事を手伝ってくれているユウカ。しかしどうにも集中しきれていないようだ。話を聞くと、どうやら近頃不眠症で悩んでいるとのことだった。そこで楽な格好で仮眠するよう先生が勧め、ちょっとした話をすると寝入ってしまうユウカ。目を覚ましたユウカは早く寝ようと意識し過ぎていることが原因ではないかと指摘され、腑に落ちた様子を見せるのであった。"
1121151644 = "電気羊をめぐる冒険"
975106364 = "ユウカとのモモトークが不審な終わり方をして気になった先生はミレニアムを訪ねる。驚くユウカであったが、事情を話し原因を調べると、節電ドローン「電気羊」の誤作動であることが判明し納得する。「脱走」した電気羊を捕まえながら眠れない夜に羊を数える古い習慣について話すうちに、自分の密かな夢を口走りそうになったユウカは、照れ隠しで先生を強引にシャーレへ追い返すのだった。"
2025917852 = "アフターダーク"
2416670859 = "暗くなるまでミレニアムで生徒の相談に乗っていた先生は、軽食を求めてコンビニへ赴く。買い物を終え外に出ると、そこにはパジャマ姿でチキンをほおばるユウカの姿が。聞けば眠れず散歩しているうちに、軽い夜食がほしくなってしまったとのこと。恥じらいつつ悩み相談をするユウカの話を聞いた先生は、一緒に散歩の続きに向かうのだった。"
2478727059 = "セミナーの眠れない夜"
2577100129 = "コタマの薦めで寝る前にラジオを聴くようになったというユウカ。ある日、不眠症の解消案を求めるユウカの投稿がラジオ番組で読まれてしまう。有効な解決策が提示されることはなく残念に思うユウカだったが、翌週はなんと先生の投稿が読み上げられる。その励ますような内容に感じ入ったせいか、その夜、ユウカはよく眠れたようで不眠症も良くなったようだ。"
358780189 = "無色"
4255105260 = "ノアが体調を崩したらしい。心配になった先生はノアの部屋を訪ねる。中へ入ると必要最低限のものしか置かれていないその様子に先生は驚かされる。話を聞けば常に客観的でありたいと願うノアの在り方に由来するらしいが、思わず「シミ」があるともっと素敵な空間になるかも、とこぼす先生。それを聞いたノアは、先生に模様替えを手伝ってほしいと告げる。もちろん、と応じた先生はひとまず今は体調の回復が優先と、ノアにおかゆを作るのだった。"
2069012399 = "無香"
1850483928 = "ノアと約束した通り、部屋の模様替えを手伝うことになった先生。以前ノアが受賞してセミナーに置きっぱなしだったトロフィーや本など、様々なインテリアを試してみるものの、二人ともいまいちしっくり来ない様子。しかし先生が優しい香りのするディフューザーを提案すると気に入ったようで、ノアはうれしそうに微笑むのだった。"
208330771 = "透明"
3004247765 = "風邪が治ったノアと入れ替わりで、今度は先生が体調を崩してしまう。心配したノアがシャーレを訪れ、以前の恩返しとばかりに手料理を振舞ってくれた。料理を掻っ込んだ先生はノアに本の朗読をしてほしいと頼み、ノアの透明な声を聴きながらぐっすり眠るのだった。"
4051060136 = "小さなシミ"
2881025522 = "コーヒーをうっかりこぼして、ノアの制服を汚してしまった先生。そこでシャーレに置きっぱなしにしていたパジャマに着替えるノア。そしてどうにも落ち着かない様子の先生に悪戯っぽく微笑みながら、ノアはパジャマ姿になった意味を遠回しに伝えようとする。しかしうまく伝わらなかったため「鈍感なんですから」とつぶやき、むくれてしまうのだった。"
1475757512 = "眠り姫からの誘い"
1090305340 = "セイアから重要な要件があるような呼び出しを受け、トリニティに足を運ぶ先生。しかしいざ話を聞いてみると、特に用事は無く、ただ気を引きたかっただけと判明する。我儘はこれっきりにすると言うセイアに、遠慮する必要はないと返す先生。困ったように笑うセイアから追加のお願いで、先生とセイアは一緒にお昼寝をするのだった。"
1220649373 = "慣れないことを重ねて"
2715828130 = "お見舞いに来て欲しいという連絡を受けた先生は、再びセイアのもとを訪れる。しかしお見舞いは言い訳であり、激務で疲れている先生を労うためにセイアはスイーツを用意して待っていた。先生もお土産にスイーツを持参していたものの、机の上はすでにいっぱい。二人はセイアが用意したスイーツを食べながら楽しい時間を過ごすのであった。"
2126075441 = "語らいの第一歩"
1977122812 = "対等な意見交換をしたいと思っているセイアだったが、その肩書が一般生徒との間でいつも邪魔をしていた。しかし先生となら問題はなく、お薦めの本について話に花を咲かせる二人。図書館で本を借りて行こうとする先生だったが、偶然にもその本はセイアに貸し出し中だった。セイアの部屋までその本を取りに行くことになり、いい機会だからと大量の本をまとめて借りたセイアの荷物運びをすることになる先生だった。"
2182579853 = "夢見る雛鳥はいつかの巣立ちに歌を捧ぐ"
1084961606 = "夜のトリニティ、鳥のさえずりに誘われて訪れた公園で、先生はセイアに出会う。歌が得意であるとセイアが話すと、聞きたいとお願いする先生。セイアはそれを断るが、なおも先生は聞きたそうにしている。歌わない理由を説明していたものの、気づけば先生に乗せられてしまったセイアは、その歌声を特別に披露するのだった。"
3549899780 = "驚くほど普通に"
2914256145 = "ミレニアムを訪ねた先生は、ネルに遭遇する。先生に制服姿を褒められて安堵の笑顔を見せるネル。普段と違う服装だったため、ネルであることを認識できなかったスケバンに因縁をつけられたものの、あっさり退散させる。普段は因縁をつけられたりしないネルは、珍しい経験ができたとご機嫌な様子を見せるのだった。"
1124899584 = "穏やかな休日"
1959760146 = "制服姿になったことで周囲の目を気にする必要がなくなったネルは、先生を呼び出し街へ繰り出す。ファストフードショップや近所の公園等で普段はできないことをしているうちに、遊び疲れたのか、先生の肩に寄り掛かって寝てしまうネル。目を覚ましたのち、満足したと言ってネルは先生に感謝の言葉を伝えた。"
857743078 = "ネルと遊園地"
4260659126 = "制服の着納めに何か派手なことがしたいというネル。そこで先生が遊園地へ連れ出す。マスコットのカチューシャを身につけ、お菓子を片手にネルはアトラクションやイベントを閉園時間まで満喫する。そして、また制服を着る機会があれば今回のように一緒に遊んでほしいと、照れながら先生に告げるのだった。"
3828496540 = "合理的な食生活"
1133228369 = "リオから連絡を受け、先生はスーパーの買い出しにつきあう。普段の食生活について訊ねられると、できあいのお弁当や冷凍食品を食べることが多いと答えるリオ。健康面を心配した先生は、リオとともに食材を購入し、シャーレで手料理を振舞うことにする。出来上がったシチューを口にしたリオは、味に特筆すべき点はないと辛辣なことを言うが、胸にこみあげるものを感じていた。"
1657158848 = "受取代行"
510653460 = "アジトの場所を特定されたくないリオに代わって、荷物を大量に受け取ることになった先生。後ほど受け取りに来たリオに中身を訊ねると、機械のパーツや実験用の薬剤等だと答え、用途を饒舌に説明してくれた。その中で機械とは違って人は代替不可能なものであると語るリオ。特に先生が自分にとってそうであって、私も先生にとってそういう存在になりたいと控え目に呟き帰ろうとするリオを、先生はアジト近くまで見送るのであった。"
954826963 = "デザイン"
2025211439 = "アジトではできないからとシャーレの一室を借りて、3Dプリンターでオブジェクトの制作をするリオ。先生が何に使うのか訊ねると、具体的な使い道はないと言う。趣味なんだねと指摘されると、その観点はなかった、趣味を持つなんて非合理的だと悩み始めるリオ。しかし先生のある種の芸術活動だと考えるといいのではという言葉を聞いて、うれしそうな反応をして見せるのだった。"
1535992005 = "秘密の場所"
3341491514 = "先日の恩返しと言って、先生をアジトに招待しようとするリオ。しかし、約束の時間までに掃除を終えることができず、散らかった部屋に先生がやってきてしまう。見かねた先生に手伝ってもらいながら掃除を終えたが、恥じ入った様子のリオ。そこで先生が外食に行こうと誘うと、リオはあれこれ言い訳しつつも最終的には一緒に行くことにするのであった。"
1595705631 = "バスの中で"
1148295035 = "ミレニアムに向かう満員バスの中で、先生はアスナとばったり鉢合わせる。制服姿のアスナに「ご主人様」と呼ばれたことで周囲からあらぬ疑いをかけられたり、急カーブでアスナと過度に密着してしまう等、ドキドキして落ち着かない時間を過ごす先生。一方アスナは、終始楽しそうに笑っていた。"
2622331350 = "売店デート"
3551192404 = "今度はミレニアムの売店でアスナに出くわした先生。お昼に食べるパンをメロンパンにするか焼きそばパンにするか、悩んで決められないらしい。結局、両方買って一緒に食べることにした二人は、学内のベンチで和気藹々とパンを食べる。先生と一緒だからおいしいというアスナだったが、すぐお腹いっぱいになってしまったらしく、残りは先生がひとりで食べることになるのであった。"
4288139285 = "思いがけない出会い"
1681962777 = "またしても街中でアスナと出会った先生。運命かも、と喜ぶアスナに、冗談めかして紐で結ばれているのかもと言うと、真に受けたアスナに制服のリボンで結び付けられてしまう先生。ワンちゃんみたいと喜ぶアスナとそのまま散歩して回るのだった。"
312468336 = "探し物は"
1018913594 = "モモトークのやりとりが急に途絶えてしまったアスナ。先生が心配して探しに行くと、街中で無事遭遇する。話を聞くとスマホを落としてしまったらしい。一緒に探し無事発見すると、先生から大量の着信履歴があったことに気づいたアスナは、たくさんラブコールしてもらったみたいと喜び、スクショして宝物にすると宣言するのだった。"
3452424088 = "落ち葉掃除"
1225467064 = "無断でグラフィティを描いた罰則で落ち葉掃除をさせられているマキ。手伝いに来た先生と話す中で、紅葉の色の鮮やかさについて思いを語る。それを聞いた先生が、マキの髪も紅葉みたいな赤できれいだ、と素朴な感想を口にすると、思わず転んでしまい、せっかく集めた落ち葉を散らしてしまうのだった。"
1020270808 = "拡張現実"
1998255879 = "マキに一緒に登山しようと誘われた先生。アウトドアな活動に誘われて意外に思うものの、すぐにARゲームのためだと判明し納得する。せっかくの登山なんだから、ゲームだけじゃもったいないと先生に言われたマキは、途中立ち寄った寂しげな渓谷をARで紅葉の盛りに見えるよう描いて遊び、楽しい時間を過ごした。"
1001076875 = "キャンプの醍醐味"
937583126 = "先生をキャンプに誘うマキ。例によってARゲーム目的ではあったが、充電不足でスマホが使えなくなってしまう。暇を持て余したマキだったが、先生の持っていたポータブルテレビを使えばゲームをして遊べることに気づく。普段と違う操作感に苦戦するマキだったが、夜遅くまで先生と楽しくゲームをして過ごすのだった。"
1220767602 = "年賀状"
4116523058 = "ミレニアムのカフェを訪ねた先生は、年賀状のデザインについて悩むマキを発見する。感謝の気持ちを伝えられる最高の年賀状にするためにはどうすればいいかとマキに問われ、一番印象に残っていることを絵にするのがいいのではないかと提案する先生。それを聞いてピンときたマキは、先生と一緒に描いたグラフィティを年賀状に描いて、受け取ってほしいと先生に少し照れながら渡すのだった。"
2571587715 = "趣味の時間（１）"
1009963351 = "非番の日に、先生と公園で落ち合うセナ。セナは先生と一緒に自身の趣味の一つである「待機」をし、公園を行き交う人々の行動に潜むリスクを語っていく。セナは、静かな場所で書類整理などを行いつつ、いつでも現場に急行できる状態で過ごすことで落ち着くのだという。加えて、未知の事象への緊張感を持ちながら世界を見守る満足感もあるのだとか。そう語った後、セナは低体温症の危険を口実として先生に寄り添い、しばしの「待機デート」を楽しむのだった。"
2153313130 = "趣味の時間（２）"
663094619 = "非番の日に救急医学部の部室にて過ごすセナと、それに同行する先生。セナは私服で行くことで他の部員を刺激せずに済むと語りつつ、趣味の一つである薬品の整備を始める。薬品の整備は一見大変に見えるが、セナにとっては心が落ち着く作業なのだ。先生と話しながら薬品の整備を行なうこの一時は、自分にとっての「ご褒美」かもしれない――そう語ると、セナは先生に感謝を述べた。"
1104938304 = "表層海流の循環"
574610625 = "多忙な日常を過ごしていたため、海をまだ見たことがないというセナと出かける先生。初めて海を目の当たりにしたセナは、あたりに救急患者がいないことを確認すると、先生と共に海辺のカフェや、防風林の散策を楽しむ。その後、夕陽の差す海辺で、セナは「人は不完全な自分の隙間を埋めるために、興味を追い求めるもの」と言う。そして――自分の隙間は、先生と過ごすことで、少しずつ埋まっている気がする……と呟いた。"
370788532 = "ウェイトレスの楽しさ"
1282608874 = "ジュリのアルバイト先のカフェを訪れる先生。ジュリは、買い出し先で粉砂糖が売り切れと聞けばドラッグストアのブドウ糖キャンディーを代用品とし、さらには店内のパンが期限切れであることを即座に発見する、お客様をよく観察しておすすめメニューを提案するなど、日頃の給食部での経験を活かした仕事ぶりを見せる。すると、カフェのマネージャーが、ジュリに「今月のウェイトレス選抜大会」への出場を提案して……。"
4047712030 = "ウェイトレスの冒険"
3916787181 = "先生の後押しもあって、「今月のウェイトレス選抜大会」に出場することになったジュリ。大会の種目は、大量のグラスを持ち上げる筋力テスト、ピークタイムの忙しさに対応するための記憶力と俊敏性を試す旗揚げゲーム、そして、ハードなお掃除だった。ジュリは、ここでも日頃からハードな現場で過ごしている経験を活かして、大活躍。見事優勝し、トロフィーと賞品を受け取るのだった。"
2608910626 = "ウェイトレスのサービス"
2837015474 = "ジュリから匿って欲しいと連絡を受ける先生。聞くところによると、大会に優勝して「今月のウェイトレス」に選ばれたことで、来店する客からツーショット写真を頼まれ、さらには町を歩いているだけでも声を掛けられるなど、知名度が上がりすぎたことにより苦労をしているらしい。先生は、取り乱すジュリをシャーレの休憩室に招いて落ち着かせ、しばしの休息の一時を共にする。そんな先生に対し、ジュリはお礼としてスペシャルパフェを振る舞うのだった。甘みの中に塩気がある独特の味に先生は舌鼓を打ち、共に楽しい時間を過ごしていく……。"
2027038816 = "そして美食の冒険は始まった"
567336352 = "新年を迎え、イズミは先生に新しい美食の組み合わせ「ミントチョコイワシレモンたこ焼き」を披露する。その個性的すぎる組み合わせに困惑する先生。イズミは美食研究会の面々はそれぞれのスタイルで美食を追求しており、自分は色んな味に出会えることを第一にしていると語るのだった。アンモニウムとクロライドが入った塩味のリコリスキャンディを口に放り込まれた先生は、イズミとまた「美食の冒険」に行くことを約束するのだった。"
3074678283 = "新たなステージ"
3604918961 = "今回の美食の冒険でチャレンジするのは、イズミがオーダーメイドで作ってもらったおせち料理「イズミ流おせちスペシャル」。そこには、カカオ99％のチョコとお酢で作られた黒豆、イチゴで作った紅白かまぼこ、アメフラシの墨とアイスクリームを一緒に巻いている「イズミ流伊達巻」など、個性的すぎるラインナップが詰め込まれていた。次は手作りの料理に期待して欲しいというイズミに対し、先生は若干の不安を覚えるのだった……。"
4075335008 = "幸せの証拠"
871439435 = "とっておきのサプライズがあると言うイズミに呼ばれた先生は、ショッピングモール屋上の公園へと赴く。そこでイズミが先生に披露したのは、お手製弁当だった。手間と想いが込められたお弁当を見て、イズミも食べないの？と聞く先生。それに対してイズミは、先生が食べているところを見ているだけで幸せと語る。自分の挑戦するものが変わった味なのは知っているから、先生が美味しく食べられる料理を作りたかった、と無邪気な笑顔を見せるイズミ。先生は、そんなイズミの姿から元気を貰うのだった。"
466460480 = "スタジアムのアルバイト"
3298066737 = "トレーニングマシン購入のため、スタジアムでドリンクの売り子のアルバイトを始めたスミレは、ドリンクサーバーを背負って移動するこの仕事が、トレーニングを兼ねていると先生に力説する。その身体能力と愛想の良さを活かした仕事ぶりで、スミレはスタジアムの伝説となっていくのだった。"
1050728220 = "ペースメーカー"
1254911399 = "体脂肪率が若干上がってしまった先生は、ドリンクサーバーを装備したスミレと共に「軽く」10kmのランニングへと挑むことに。ペースメーカーを務めるスミレのサポートによって完走できた先生は、ご褒美のドリンクを受け取るのだった。"
678617450 = "怪しいトレーニング"
2311495169 = "アルバイトをしていたスタジアムのマネージャーの提案を受け、スミレは重いドリンクサーバーに苦戦する売り子さんたちへのフィットネスプログラムを担当することに。ドリンクサーバーを背負いながら、無限に「あと一回！」を繰り返すスミレ考案のメニューを体験したことで、売り子さんたちは激しい筋肉痛に襲われるのだった。"
2415231413 = "話題の人物"
3709190312 = "売り子としての仕事ぶりが話題になり、新製品開発に意気込む飲料メーカーの会議に招待されたスミレ。様々な企画案が出る中で、スミレが提案したのはプロテインドリンクだった。困惑しつつ、スミレの熱量に押される社員たち。後日商品化されたプロテインドリンクは、一部の熱狂的な支持を獲得したらしい。"
2197812544 = "タイミングの特訓"
3910533066 = "バッティングはタイミングが命。そう語るレイをゲームセンターへと連れだした先生は、リズムゲームによる特訓を提案した。レイは初心者ながらセンスを発揮してハイスコアを叩き出し、一躍注目の的に。しかし、「自分の戦場は野球」とその場を離れ、ストイックに練習試合へと臨む……が、壮絶な敗北を喫すのだった。"
3105708523 = "コントロールの特訓"
2865627764 = "バッターとしての実力を上げるため、ピッチングのことを知ろうと試みるレイ。だが、なかなか上手くいかず、それを見た先生はダーツやフリスビーなど、様々な集中力向上法を提案する。その練習風景を見た通行人から、先生は生徒を犬のように扱っていると、また変な評判が広まってしまうのだった……。"
3920356383 = "野球の面白さ"
648984919 = "レイと先生は野球観戦のために球場へと向かい、そこで迷子の子を発見する。野球なんて全然面白くない！という子どもを見て、レイは自身の幼少期を思い出し、勝つために地道な努力を続ける野球の面白さを語り聞かせる。無事家族に出会えた迷子の子を見送る中、先生から野球論に感動したと言われたレイは照れるのだった。"
4022262912 = "遺されるもの、受け継がれるもの"
13117381 = "野球部の用具点検を共に行なう中で、先生はレイが用具が壊れた原因を力学的に計測する姿を見て、思わず感心させられる。そんな中、先生はレイが初めて捕った、思い出のホームランボールを発見した。レイはそのボールの思い出を振り返りながら、自分もいつか、先生にとって「思い出のボール」のような存在になれればと語る――"
4069028683 = "新しいアルバイト"
1511181025 = "モデルのアルバイトをすることになり、ドレスを身に纏ったサオリ。撮影準備を先方に一任されたサオリは、ドレスを着た女性らしいポーズについて先生に指導を頼み、自分らしさを出した自然体の動きを学んでいく。"
4260467965 = "二人のレッスン"
3750933921 = "サオリからの連絡を受け、撮影スタジオへと向かう先生。サオリは仕事で経験のないダンス姿の写真を撮ることになり、先生へ助力を求めたのだ。互いに緊張をしつつ手を取り合って行なうダンスの練習は、サオリにとって特別な時間となり、「撮影の時もぜひパートナーをお願いしたい」と先生に提案するのだった。"
3551813368 = "お礼"
3505630226 = "先生との待ち合わせ場所にドレス姿のサオリが現れたことで周囲の注目を集めすぎてしまい、二人はひとまずシャーレに避難することに。失敗したと意気消沈するサオリに対して、先生はその想いを無駄にはしたくないと、手料理を振る舞うことにする。そんな先生に、サオリは自身が表紙のファッション誌を渡すのだった。"
270920992 = "ガール・イン・ザ・トレイン"
481302123 = "出張で列車に乗った先生を発見したヒカリは、速攻で切符確認の仕事を終わらせ、先生の席へ遊びに来る。ピリ辛のたのしー棒や、すっぱい味のパチパチキャンディといったお菓子を食べて悶絶する先生。終点まで、ヒカリは存分に遊ぶのだった。"
3573236808 = "ガール・オン・ザ・ストリート "
1039941372 = "街角に座り込むヒカリと遭遇した先生。ヒカリはアリの軍団同士の激しい戦争を観戦していたのだ。それぞれ推しの軍団を応援しながら戦況を見守っていたところ、アリの一軍が発射したギ酸がヒカリに命中してしまう。復讐を誓うヒカリだったが、先生はそんな彼女をなだめ、一緒に美味しいものを食べに行く。"
864122818 = "ガール・オン・アンド・アドベンチャー "
1959076383 = "「白いとこは岩場、他の場所はマグマだから歩いちゃだめ」というルールで道を歩くヒカリ。懐かしさを覚えた先生もその「冒険」に参加し、8回死亡しつつもなんとかシャーレへ到着する。だが、オフィスまでの道のりは同じ色のタイルばかり。ピンチに陥ったヒカリを抱きかかえ、先生はなんとか帰り着くのだった。"
77436159 = "ガール・イン・ペイン"
840104479 = "シャーレに泊まると宣言したヒカリと共に、街に出てお菓子を楽しむ先生。すると、ヒカリが歯の痛みを訴え始める。歯医者に行きたがらないヒカリだったが、「ずっと痛いの嫌でしょ？」と先生から諭され、長生きするためにも先生と一緒に病院へ向かうのだった。"
1135383537 = "ガール・オン・ファイアー "
3749974299 = "ニューチャレンジをするとヒカリが持ってきたのは、激辛カレーだった。「無敵だから辛くない」と言うヒカリだったが――案の定、その辛さに悶絶する。それを心配した先生は牛乳とアイスクリームを買ってきてあげ、一緒に食べることに。その後、疲れたのかヒカリは先生の膝の上で寝てしまうのだった。"
3804838142 = "意外な同行者"
2397740945 = "出張先に向かう列車の発車が遅れ、やや焦る先生。だが、その列車は猛スピードを出し、定刻通りに目的地へと到着した。先生はそこで運転手のノゾミと遭遇し、用事が終わったら連絡するように言われる。――夕暮れ時、連絡を受けたノゾミは先生を運転室へと招待し、共に夕景を楽しむのだった。"
2105348511 = "「可愛い」は意外なところに"
3435927293 = "ハイランダーのマスコット「シュッポ」のぬいぐるみを渡しに、シャーレを訪れるノゾミ。あまり何かを可愛いと思わないと語るノゾミに対し、さまざまな可愛いグッズを見せて、感想を引き出そうとする先生。だが、その必死な姿が可愛いとノゾミに笑われ、なんともいえぬ敗北感を抱くのだった……。"
861160165 = "意外な場所"
3194943073 = "地下鉄で偶然ノゾミと出会った先生は、列車と地下鉄の違い、それぞれの良さ……そして、ゆくゆくは海上列車も面白いかも……などと、列車談義に花を咲かせる。だが、盛り上がるあまり先生は目的地を乗り過ごしてしまうのだった。"
3493759560 = "意外な弱点？"
393753210 = "ノゾミがシャーレの当番を務める日が来た――のだが、夜間運行明けの彼女はとても眠そうで、気付けばあくびをし、ウトウトしている。心配した先生に促されてソファへ横になると、そのまま夕方まで寝落ちしてしまうのだった。"
4070596837 = "意外な一面？"
3708690563 = "線路の敷設予定地の現地調査を行なうノゾミと、それに同行する先生。ノゾミは、「適当にやればオッケー」と言いつつ仕事をしっかりこなす中で、「いろんな生徒の相談に乗る先生の仕事も、大変なんじゃない？」と疑問を投げかけた。「大変じゃないし、今は目の前にいるノゾミを一番気にかけている」と返されたノゾミは、その答えを面白がり、先生を連れ回す。"
3957002931 = "I hate people"
684899898 = "文房具屋で、コピー用紙を買いに来たアオバと出会った先生。話を聞くと、ハイランダーでは経費の申請がなかなか通らず、ほとんど自腹で買うのだという。静かな怒りを燃やすアオバを見かねた先生は、必要な文房具一式を買ってあげることに。アオバは戸惑いながら何度もお辞儀をし、帰っていくのだった。"
460531770 = "I hate this world"
1037671752 = "信号機の修理を手伝ってほしいというアオバに合流する先生だったが、突然パイプレンチを信号機に叩きつける彼女の姿に、驚きを隠せない。「いつもこうしてきたので……」と語りながら、パイプレンチを振るい続けるアオバ。結果、彼女一人の力で無事に修理は完了したのだが、アオバは先生がお願いに応えて自分の元へ来てくれたことに深く感謝する。"
131885223 = "I hate being alone"
2053823937 = "コーヒーポットが故障した先生の元に、アオバが急行する。パイプレンチで叩いても直らなかったため、「プランB」の分解を試し――悪戦苦闘の末、修理に成功する。先生に少しだけ恩返しできたことを喜ぶアオバ。先生がお礼に美味しいご飯をご馳走すると言ったところ、アオバは驚きと嬉しさで泣き出してしまうのだった。"
2236263247 = "I hate this world (without you) "
1145911904 = "今日は多忙で徹夜になっちゃうかも……と言うアオバの元に向かった先生は、現地で作業着へと着替え、共に山積みの作業をひたすらこなしていく。無事作業が片付き、宿直室で着替え中のアオバと先生が出くわしてしまうアクシデントもありつつ、帰路につく二人。そこでアオバは、これまでは明日に期待してなんていなかったけれど、今は違う……と語るのだった。"
3377242249 = "静かなる・フィーナ"
213706836 = "フィーナが「生まれ変わった」と聞き、百鬼夜行へ向かう先生。そこには観光ガイドとして活躍するフィーナの姿があった。だが、渦巻映画村にいるはずの名物犬「ミニ柴蔵」がおらず、動揺してしまう一幕も……。先生のフォローで落ち着きを取り戻したフィーナは、なんとかガイドツアーを成功へと導くのだった。"
293675733 = "エリートガイドの掟"
2294953606 = "フィーナが担当するバスツアーに先生も参加することになる。ツアーは順調に進行している――かと思いきや、ツアー客の一人をどこかに置いてきてしまい、フィーナは大慌て。迎えに行った先で先生が機転を利かせ、「タクシーツアー」を提案したこともあって事態は解決し、ツアーは無事終了するのだった。"
1021576815 = "ガイド残侠伝"
4191579066 = "ツアーで舞台版「任侠ニャンニャン伝」を観劇することになり、そこに先生も同席する。最初は静かに予備知識をツアー客に説明するフィーナだったが、クライマックスで任侠魂が騒ぎだし、全力で主人公を応援してしまう。猛反省するフィーナだったが、観客はそれを「[ruby=イマーシブシアター]体験型演劇[/ruby]」と捉え、演者たちもその熱い任侠魂を暖かく受け止める。そうして、舞台もツアーも、無事幕を下ろすのだった。"
485845832 = "断れない申し出"
396056727 = "ツアーに参加する先生だったが、失敗を恐れるあまり疲れ気味のフィーナを案じて、バスの中で休むよう促す。しばし休息の一時を過ごす二人。少し元気を取り戻し、戻ってきた観光客を迎えるのだったが――フィーナは車内に靴を忘れてしまっており、なんとかバレないよう振る舞うのだった。"
2017163321 = "百花繚乱式射撃術"
3748909057 = "百鬼夜行を訪れていた先生は、ナグサの射撃訓練を見学することに。ナグサは謙遜するが、一瞬で複数の的を撃ち抜く腕前は、委員長の肩書きにふさわしいものだった。"
2776714076 = "気持ちの伝え方"
2721592094 = "百鬼夜行のお祭りで、焼き鳥の屋台を手伝ったナグサ。打ち上げの誘いを「私がいても迷惑だから……」と断ろうとするが、先生に背中を押され、楽しい一時を過ごすのだった。"
1303559620 = "辿り着いた夜明け"
4177383325 = "ナグサと先生は、夜のパトロールへと出かける。酔っ払いの住民や魑魅一座への対処に追われる騒々しい夜を過ごした後、二人は喫茶店の縁側で休息を取りつつ夜明けを待つのだった。"
3538513012 = "雪女の夏"
3940670190 = "シャーレへ向かう道中で、熱中症になってしまうナグサ。聞けば、彼女は暑さに弱く、子どもの頃は「雪女」と呼ばれていたらしい。物語の中で不幸な結末を迎える雪女に思いを馳せるナグサに、先生は「きっと、幸せな結末を迎えられる」と言う。"
1857080174 = "天には自由の雲が流るる"
1703313119 = "ニヤの連絡を受けて、共に「追っ手」から逃げつつ、百鬼夜行のお祭りを楽しむ先生。だが、追っ手とは仕事から逃亡したニヤを追いかける、陰陽部の後輩たちで……。"
2166596309 = "大樹は確かな地に根付く"
3368760628 = "ニヤに騙されて、まんまと陰陽部に呼び出された先生は、面会者のお願いをのらりくらりと躱すニヤの仕事ぶりを目撃する。やや不安に思う先生に対して、ニヤは陰陽部の曖昧な立ち位置について語ると、部室とは逆方向に去って行くのだった……。"
2675210607 = "大いに怒り、天地を覆す"
3511750147 = "二度ならず、三度までもニヤに騙され、ついに堪忍袋の緒が切れた先生は、お説教することを決意。流石のニヤも反省の色を浮かべるのだった。"
2298096427 = "天地は只そこにあるなり"
1685493795 = "百鬼夜行を訪れると、ニヤが処理をサボっていた諸問題が全て解決していることに気付く先生。偶然そうなったと語るニヤだったが、先生はその頑張りを察して、容赦なく撫でまくる。"
576779580 = "天と地と、世の調和"
2896739033 = "ニヤはキヴォトスを支配する「天下取り」の計画を語り、手を組もうと先生を誘うが――それは全て芝居だった。陰陽部や百鬼夜行の危うさを見せたかったというニヤに対し、先生は「ニヤがいればそうはならない」と言う。それに対し、ニヤは少し戸惑いつつ、いつもの調子ではぐらかすのだった。"
3509570812 = "1時間目「特別講義：手段」"
3314544887 = "突然スイーツカフェへと呼び出された先生は、ナツがバンド活動でストレスを溜めていないか心配する。ナツはそれを否定しつつ、先生とスイーツを食べる理由になるなら、それもありかも……と呟くのだった。"
1495423261 = "2時間目「課外授業：芸術」"
2178381226 = "ドラムの練習に行き詰まりを感じたナツから、映画に誘われた先生。ナツは先生に買ってもらったポップコーンを楽しむつもりでいたのだが――映画に集中する余り、食べることを忘れてしまう。先生はナツからポップコーンを受け取り、シャーレの仕事へと戻るのだった。"
620711550 = "3時間目「清掃：招かれざる客」"
4092712805 = "練習室に駆けつけた先生は、黒くてカサカサ動く「アイツ」を捜索中のナツを目撃する。カサカサの正体はただの埃の塊だったが、捜索中にドラムセットを分解したことで、練習ができなくなってしまっていた。先生は、ナツと共に組み立てを手伝うことにする。"
2301529882 = "放課後「鼓動」"
315387308 = "夜中の残業中、目を覚ますために川辺を散歩していた先生は、ジョギング中のナツと遭遇する。一緒にベンチで一休みをしていると、先生はついナツの肩にもたれかかって眠ってしまい、ナツの鼓動のリズムが早まっていく。"
1814572470 = "作戦参謀の誘い方"
2794412546 = "部の敷地内でプールでの水浴びをしようとする水着姿のキキョウを、海へと誘う先生。それを受けて、表面上は冷淡に振る舞いつつスケジュールを確認するキキョウ――だが、その姿は、どこか上機嫌に見えるのだった。"
3642360920 = "離さないで"
3203760916 = "海についたキキョウはパラソルの下で教本を読んでおり、なかなか水に浸かろうとしない。その後、「入るのは腰の高さまで」という条件で先生にエスコートしてもらうことで、海を楽しみ始める。少し深いところにいる亀を見に行こうという先生の提案をキキョウは断るが、お姫様抱っこで運ばれていくのだった。"
966573027 = "こころの天守閣"
917139257 = "海水浴を楽しみ、徐々に水に慣れてきたかも……と語るキキョウは、エスコートしてくれたご褒美として、先生を砂の城へと生き埋めにする。砂に埋まりながら、昔から砂の城と人形で作戦を立てて遊んでいた、というキキョウの過去を聞いた先生は、砂から飛び出すと、一緒に砂遊びをして思い出作りをするのだった。"
132303795 = "作戦参謀の奇策"
23283600 = "水が苦手なことを克服するため、胸の深さまで水に浸かろうと試みるキキョウ。それに協力した先生は、お礼にキキョウが特別に用意した休憩所へと案内される。そこにあったハンモックに揺られながら、二人はしばしの間憩いの時を過ごすのだった。"
1547258117 = "水着と防御力"
434592321 = "水着姿で修練をすると言うレンゲと滝壺で合流した先生。そのまま互いに水着姿となって滝に打たれることに――水着を着たことで心の防御力アップを実感するレンゲだったが、一方で先生は滝の勢いで水着が脱げてしまう。なんとかレンゲに水着を回収してもらい、二人は青春の滝行を続行するのだった。"
3063254359 = "水着と無人島"
3609000771 = "水着修練の第2弾は、無人島でのサバイバル！ということで、ある島の海岸で共に過ごすレンゲと先生。そこでタモ網漁へとチャレンジし、獲れた魚を分け合って食べるなど、青春な一時を過ごしていく。一息ついたところで、レンゲはお手製イカダでの島脱出を提案し、それに付き合った先生は――筋肉痛で再起不能になってしまった。"
379850169 = "水着とキャンプファイヤー"
3634384642 = "レンゲは海岸に竜を模した形に薪を組み、青春のキャンプファイヤーを開催。だが、思った以上に火が燃え上がり、危機感を覚えたレンゲと先生は慌てて消火を行なう。先生の顔についた煤を取りながら、先生と間近で触れ合っていることに少し緊張するレンゲ。先生も「この瞬間こそ青春なのかもしれない」……と感じるのだった。"
1794123967 = "水着と青春"
1511540975 = "キャンプファイヤーのミスを挽回したいと、先生を海岸へ呼びだしたレンゲ。そこでレンゲが提案した青春活動は、線香花火を楽しむというもの。レンゲは、青春の炎は燃え上がれば良いというものではなかったと、学んだのだ。二人は小さな線香花火を見つめながら、充実の青春活動を過ごす――"
369192515 = "海の正装ですの！"
641107269 = "海での遊び方に迷うユカリを水着ショップへと連れて行く先生。陳列されているものから選び抜いた水着を着たユカリは、恥じらった――かと思えば、動きやすいと気に入り、街へと繰り出そうとする。先生は、それを慌てて制止するのだった。"
3133637421 = "百花繚乱に恥じぬよう"
2973505214 = "海で華麗な泳ぎを披露したいというユカリに、プールで水泳指導することになった先生。だが、衆目の中で肌を晒すなど許されない！と、勘解由小路家の使用人がプールを二人だけの貸し切り状態にしてしまう。二人で過ごせることに胸が高鳴っていたユカリだが、プールを楽しみにしていたお客さん達に申し訳なく思い、貸し切り利用をせず、無料開放することに決めるのだった。"
1888195363 = "水中に咲く艶やかな"
2096152043 = "待ちに待った海へ行く日、海岸で待ち合わせをするはずが、ユカリが姿を見せない。そのとき、海で何かが動いているのを目撃し、溺れているのではないかと思い飛び込んで行った先生は、そこで珊瑚礁を眺めていたユカリと遭遇。無事を確認したところで、二人は日が暮れるまで海水浴を満喫するのだった。"
1323673361 = "夏の海、静かな海"
1906389428 = "買い物帰りに夜の海を眺めるユカリと出会った先生。勘解由小路家の厳しい教えをあえて破り、海に飛び込んだことに後悔はないと語るユカリは、賑やかな昼の海と、静かな夜の海の間で、心の変化を自覚していた。"
363125217 = "移ろいゆくもの"
2410063721 = "「急を要する」との連絡を受けた先生を待っていたのは、スポーツカーを颯爽と乗りこなすセイアだった。車に同乗し、海辺のドライブに出発することになる先生。「振り回して叱られたい」……そんな彼女の願いに先生が少しだけ応じると、セイアは静かに微笑むのだった。"
2540853788 = "停滞の先へ"
3025604214 = "シャーレを水着姿で訪れるセイア。先生はセイアの水着姿や、それをわざわざ見せに来てくれたことに対し、肯定的な返事を返す――が、その回答に思うところがあったセイアは先生の膝の上に乗り、仕事を手伝うことにする。"
817970610 = "最後の瞬間"
106349387 = "「最後の時が近い……」と連絡をよこしたセイアに会いに行く先生。セイアは、今日限りで水着を片付けるため、その姿を先生の記憶に刻みつけたかったのだ。だが、水着姿を披露しても先生はまったく動揺しない。やや機嫌を損ねたセイアは部屋の鍵を閉め、戸惑う先生を気まぐれに振り回すのだった。"
1154864129 = "心地よい距離を探して"
1908728470 = "セイアはミカとナギサと、以前よりも気楽に交流できるようになり、皮肉の応酬は増えたものの、打ち解けることができたと先生に「自慢」する。そのことを大いに喜ぶ先生だったが、セイアはそんな先生との心地よい距離も探るため、ドライブへと連れ出すのだった。"
2635062949 = "海は待ってくれない"
2438056735 = "正義実現委員会の活動で、海に向かうことになったハスミ。だが、ハスミは正義実現委員会の後輩たちには自由時間を設けつつ、自身は業務でいっぱいのスケジュールを組んでいた。それを心配した先生が水着を買いに行くことを提案すると、ハスミは「一週間だけ猶予をください！」と、なにかを決意した表情で去って行く……。"
2114293561 = "決戦の日"
1066108086 = "郊外のショッピングモールで待ち合わせをするハスミと先生。ハスミは高級ブランド「ベロニカ」の店舗に向かい、手際良く水着選びを進める――はずだったが、ハスミにフィットする水着がなかなか見つからず悪戦苦闘。覚悟を決めたハスミは、サイズギリギリの水着を購入し、約束の日までに体を仕上げる！と、闘志を燃やす。"
2390402921 = "海辺にて"
604123590 = "海辺を訪れた先生に、ハスミは恥じらいながら姿を見せる。先生は一緒に砂のお城作り、砂埋め、スイカ割りといった海の遊びに興じる……が、その途上でハスミはお腹が空いて動けなくなってしまう。先生は、ダイエットのために無理をしていたハスミを海の家に連れて行くと、夕食をご馳走し、楽しい夏のひとときを過ごすのだった。"
4193449856 = "夏空の黒い鳥"
1701157930 = "夜の海辺にハスミを呼び出した先生は、花火セットを取り出す。これまで先生と体験した遊びと、それを締めくくる花火――ハスミはそれが、かつて自分が考えた「ウィッシュリスト」だったことに気付き、「この夏に起きたことは全て、忘れません」と微笑む……。"
771755189 = "ビジネス・サーファー"
3687845316 = "仕事を終え、所在なげに海辺を歩くイチカは、先生の勧めでサーフィン教室に参加する。先生とは違って卓越したサーフィンスキルを披露し、流れで大会への出場も果たすが……どこか、心から休暇を満喫できていないようだった。"
3124259672 = "アノニマス・ガール"
4085102234 = "夜の海で先生と出会ったイチカは、「海は普段とちょっと違う風景でしかなくて、あまり楽しめない」と言い、そんな自分が、後輩を差し置いて海に来ていることへの後ろめたさを告白する。正直に話してくれたことを感謝する先生だったが、イチカはせっかくの夜の散歩が面談になっていたことを、少し残念がっていた。"
682336343 = "ノーティ・ガール"
459649916 = "ふたたび夜の海で先生と合流したイチカは、恥ずかしいから先日のことを忘れて欲しいと言う。それに対し、「どんな姿のイチカも受け入れる」と答えた先生に、イチカは「危ないヤツ」として先生へと迫る。――やりすぎたと後悔するイチカは、恥ずかしがりつつまた今度話したい……と言う。"
2854468149 = "デジャヴ・ガール"
2261893853 = "またまたイチカは先生と落ち合い、先生に詰め寄った事への後悔と、「手のかかる子」にはなりたくない想いを語る。それに対して先生から「気持ちを隠さなくていい」と再び返されたイチカは、今後は少し素直になると決め、「全部、先生の責任っすからね？」と告げるのだった。"
1190427539 = "密かな依頼"
630241773 = "ナギサに密かに呼び出された先生は、誰にも見つからぬよう彼女のテントを訪れる。休暇中の仲間に気づかれずに仕事を済ませたい――その願いに応えた報酬は、チーズケーキと紅茶。そしてお礼の言葉だった。"
3463352267 = "水面漂うナギサ様"
507788461 = "ナギサに指定されたテントに向かう先生。そこには、ナギサがみんなで楽しむために用意した水上レジャー用品がぎっしり詰まっていた。さっそくサーフィンに挑戦する先生だったが、なかなかバランスが取れない。そこに海の上で優雅にティータイムを楽しむナギサが現れ、先生は彼女と一緒にお湯を飲んで体を温めることにする。"
615810610 = "夕陽に染まる翼"
1648534831 = "意味深な連絡を受け取った先生がナギサを探しに行くと、夕陽を浴びながらあてどなく散歩をしているのを見つける。また普通の日々に戻ることに躊躇はないが、ふと名残惜しくなってしまったというナギサ。だが、先生から「決して同じ日は来ない」と告げられたことで、再び先生と共に歩める日を楽しみに、帰路へ就くのだった。"
4117624418 = "水辺とあなたとお魚と"
913912189 = "ティーパーティー専用プールに呼び出された先生は、プールの中を泳ぐ魚たちを見て驚愕する。早くも海が懐かしくなったナギサは、魚たちをプールに放流し、仕事の傍ら釣りを楽しもうと考えたのだ。先生は、そんなナギサと優雅な釣りを楽しむことに。"
2646804362 = "私も知らない私"
3097604370 = "ティーパーティーの面々のさまざまな一面について語り合う中、ミカは自分は相変わらずの問題児だから……と笑っていた。そんなとき、先生はミカも知らない彼女の魅力について語っていく。ミカは戸惑いつつも、その言葉を喜ぶのだった。"
2695761252 = "授業の続き"
4096458443 = "浜辺で先生と会ったミカは、以前先生と行なった水泳の授業について語りはじめる。あのときは途中で終わってしまったこと、そして、あのときの水着を補修し、持ってこようとしていたこと――先生とミカは授業の続きを行ない、楽しいひとときを過ごしていく。"
3789006869 = "浜辺に光るもの"
3563536444 = "ミカは浜辺に落ちている綺麗な貝殻を拾い集め、先生に紹介していく。昔からアクセサリーを集めるのが好きだったと語るミカを見て、先生は、ミカが以前よりものびのびと振る舞えているように感じるのだった。"
178386077 = "歩み始めた私から……"
1675488441 = "妙なモモトークを受けて、ミカの元へと向かった先生。すると、そこにはふにゃふにゃのミカが待っていた。「自分はお姫様だと思っていたけれど、本当はとっても悪い子だった……」と、心境を吐露するミカ。彼女が酔った振りをしていることに気付いていた先生は、そうやって悩んだ時間がミカを支えてくれる、と優しく諭すのだった。"
3158159065 = "いつかの私へ"
2427872078 = "ミカは先生を夜の散歩に誘い、とある場所へと連れて行く。辿り着いた先は、星が降り注ぐ夜空の下だった。「頑張って幸せになる」――照れくさそうに語ったミカに対して、先生は「いつだって見守っている」と応える。"
1060031334 = "もう、大丈夫"
1396743755 = "お手製のサンドイッチを先生に振る舞おうとするミカ。だが、それは頑張りが伝わってくるものの、非常に個性的な味だった。後ろ向きにならず、次は美味しく作ろう！と思い直す姿に、先生はミカの確かな成長を感じる。"
873198059 = "魔法の絵"
2832478109 = "タロットカードの導きに従い、力強く筆を走らせ、絵を描いていくエリ。その激しい過程に不安を覚えていた先生だったが、その仕上がりに感嘆を禁じ得ない。"
580036155 = "魔法の帽子"
4207047849 = "絵画の実技試験が控える中、エリは魔法の帽子の持ち込みが禁止されている試験を前に、憂鬱な気持ちに。帽子を脱ぐなんて裸になるのと同じ――そう恥ずかしがるエリに、先生はエールを送る。"
269259800 = "マナチャージ"
1093511634 = "試験が上手くいかず、絶望しているエリ。そんなエリの気分転換のため、ラーメン屋、図書館など、さまざまな場所に彼女を連れ出し、彼女のマナをチャージしていく先生。そんなとき、エリは先生に、自分だけの絵を描きたいと思ったきっかけを語るのだった。"
2775257787 = "魔法の画家"
1616638842 = "エリは自信をつけるため、屋外で先生の肖像画を描く。他のワイルドハント生がギャラリーとして集まる中、緊張にも負けず、エリは純粋にキャンバスと向き合っていた昔を思い出しながら、先生の肖像画に筆を走らせる。完成した肖像画は、エリらしさに満ちた素晴らしいものだった。"
2923077435 = "特別な妙薬"
3141729267 = "自分と先生は前世から強い絆で結ばれていると主張するカノエ。その記憶を蘇らせるため、特別な妙薬……シチューを作る。ひたすら懐かしく、家庭的な味に感動する先生。だが、前世の記憶は戻らないのだった。"
2137805982 = "少女の声"
3484255803 = "ある日先生に掛かってきた電話の主は、とても可愛らしい恥ずかしがり屋の生徒だった。密かに想いを寄せていたというその生徒に困惑しつつ、近くの公園で待ち合わせることにする先生。だが、そこにはカノエがおり、彼女は声優専攻であることを明かすのだった。"
3504361213 = "唐突なお誘い"
569922205 = "カノエの頼みで収録のアシスタントを務めることになった先生。その最中、可愛らしい声を出し、普段はオカルトキャラを演じていると告白するカノエ。それもカノエの引っかけだったのだが、先生はそれが明かされるまで、激しく動揺してしまう。"
3140711198 = "それは……私じゃないよ"
692979208 = "今日は私を見ても無視してほしい、と連絡するカノエ。不審に思いつつ、いつもの日程をこなしていく先生。だが、視界の隅にはいつでもカノエがいる。瓜二つの存在が暴走してしまった、と語るカノエだったが、その真相は闇の中へと溶けていくのだった……。"
893011042 = "海はつまらない"
2775898959 = "海のすべてがつまらないと、退屈そうにしているミサキ。先生は、そんな彼女に水泳の熱烈指導を行なう。鬱陶しがりつつも、なんだかんだとそれに応えてくれるミサキだった。"
2316153298 = "砂遊びもつまらない"
3214330542 = "先生の巧みな誘導により、砂の城作りにどんどん熱中していくミサキ。彼女は先生に嵌められたと怒りつつ、どこか満足げな様子を見せる。だが、その城は波に流され、崩れてしまう……全部無駄だったと言うミサキに対し、先生はそれを否定しつつ撮っていた写真を見せる。それに驚いたミサキは、「消して」と詰め寄るのだった。"
3725758721 = "日光浴だって……つまらない"
371852196 = "先生と日光浴をすることになったミサキ。だが、通り雨が降ってきてしまう。雨が止んだ後、再び日光浴に挑む先生は、具体的な効果は得られなくても、ミサキとの思い出は残ると宣言。静かに微笑みながら、ミサキは日光浴に付き合うのだった。"
2816193451 = "獄中執筆記"
1264857227 = "当番でシャーレを訪れたミヨ。窮屈な学園生活を語るミヨに、先生は執筆に集中できるよう休憩室を提供。戦車部隊などが登場する壮大な小説に没頭し、セリフを口走ってしまうミヨ。その様子をすべて先生に目撃され、彼女はあまりの恥ずかしさからシャーレを飛び出していくのだった。"
68793642 = "デビューを待ちながら"
2671887121 = "先生はワイルドハントからの帰り道にミヨと会い、ミヨは出版社から小説デビューの誘いを受け、一緒に打ち合わせに臨む事に。しかし、提示されたのは出版費用を全額負担させる詐欺契約だった。ミヨはそれを見抜き契約を破棄するが、犯罪を見抜く自身の才能に落ち込んでしまう。先生は、その才能があるからこそ正しい道を選べると励ますと、ミヨは少しだけ元気を取り戻していた。"
2557024663 = "……ダメ、ですか？"
3519156172 = "特殊交易部の仕事を手伝ってほしいと先生を呼び出したミヨ。しかし、そこにはある秘密があった。アンティークショップを巡る中、本当は先生に会いたかったと白状したミヨは、先生をやや強引に誘い、二人きりのデートを楽しむのだった。"
2786778582 = "夢の終わりから"
1676221675 = "ワイルドハントでの仕事に疲れ、芸術情報館で居眠りしてしまった先生。目を覚ますと、そこにはミヨがいた。先生が連絡をくれなかったことに拗ねつつも、会えたことを喜ぶミヨ。しかし、彼女がなぜ先生の居場所を正確に把握しているのかは、謎のまま……"
3343832747 = "残骸から見えるもの"
2179798071 = "先生は仕事帰りの途中、爆発に遭遇する。そこにはフユがおり、メディアアートのパフォーマンスだったと判明する。公演を見逃した先生に、フユは残骸から内容をイメージするよう提案。先生はその意図を汲み、パフォーマンスを理解するため……と後片付けを手伝うと、フユは笑いながらもお礼を言う。"
2022325598 = "甘い対価"
2395350468 = "生産終了した変形ロボットを探す先生は、偶然フユと出会った。特殊交易部の営業室長として、ロボットの入手を請け負うフユ。彼女が求めた「対価」は、ご飯や映画、スイーツカフェでのデートだった。先生はそれに快諾し、楽しいひとときを過ごす。後日、約束通りロボットはシャーレに届けられるのだった。"
2248687503 = "スカウトの試み"
676795709 = "「取引」をして、当番でもないのにシャーレにやってきたフユ。彼女は先生を特殊交易部の外部顧問にしようと、熱烈なプレゼンを展開する。先生はそれを断りつつ、毎日会えるというフユの提案には興味を示す。顧問に就任させる事こそ叶わなかったものの、フユは先生の反応にまんざらでもない様子を見せていた。"
1930836459 = "フユの空間"
2809147120 = "フユの個展を訪れた先生は、作者本人による解説付きで作品を鑑賞する。お腹を空かせた先生（とフユ）のため、フユは舞台裏であるスクリーンの裏側へ先生を案内。そこは作家だけが出入りできる二人きりの空間。フユは手作りのお弁当を取り出し、一緒に食べるのだった。"
1502347368 = "岩がしゃべった！"
4128293753 = "当番のはずのリツが来ず、不思議に思う先生。リツは「岩に頼まれた」と、シャーレの庭で彫刻をしていた。先生は肩車で手伝い、完成した作品を多くの人が見られるよう庭に飾ることにする。リツは喜ぶが、その後の当番の仕事からは逃れられないと知り、しょんぼりしていた。"
796096285 = "こっちのほうが早いよ！"
522223915 = "仕事をしていた先生の前に、リツが窓から現れる。彼女は、以前彫刻作業で服を汚してしまったお詫びにと、友達に作ってもらった新しいシャツを先生にプレゼントする。先生が着替えると、リツはその服に合うボトムスも買いに行こうと、次のお出かけの約束を取り付けるのだった。"
2906320075 = "ひとりはダメ！"
4216584449 = "リツに誘われ洋服の買い物に出かけた先生。リツが席を外した隙に、怪しい店員に押し売りされてしまう。しかし、戻ってきたリツが「姉御」と呼ばれた途端、店員の態度は一変。先生は、その手の界隈における彼女の意外な影響力を知る……。"
3991968548 = "地下で二人っきり"
1266463055 = "リツに誘われ、ワイルドハントの地下遺跡を訪れた先生。その奥には、神殿のように美しい地下貯水槽が広がっていた。リツはこの景色を先生に見せたかったのだという。二人は水に足を浸し、誰にも知られていない秘密の場所で、静かな時間を過ごしていく。"
1176354905 = "また会ったね、レイサ"
434693070 = "念願の魔法少女の衣装を手に入れたレイサ。しかし、その服には欠陥があり……レイサは先生に助けを求めるのだった。"
3111312789 = "頼もしいね、レイサ"
4144458315 = "魔法少女のオンリーイベントをパトロールすることになったレイサと先生。二人は存分にイベントを楽しむのだった。"
28470914 = "可愛いね、レイサ"
812871968 = "クローゼットの中身がびしょ濡れになってしまい、着替えが魔法少女のコスチュームしかなくなってしまったレイサ。先生と共に、服を買いに行くのだった。"
2150011728 = "偉いね、レイサ"
773207179 = "再びファスナーが壊れてしまい、服を脱げなくなってしまったレイサ。パトロールの時間がきてしまい、仕方なく魔法少女のコスチュームで向かうのだった。"
1588313903 = "トリニティのマジカル自警団"
4130055309 = "夜勤中にシャーレを見回っていた先生は、灯りのついた更衣室で、なにやらマジカルな衣装を試着するスズミと遭遇。突然のことに慌てたスズミは、これが自警団の任務だと弁明し、先生に秘密にしてほしいとお願いするのだった。"
3941215133 = "目が眩むほどに堂々と"
4143536593 = "公園で休憩中の先生は、大量のスケバンに包囲されたスズミと遭遇する。追い込まれた彼女を助けるため、先生は奇策を思いつく。それは、スズミが衣装に着替え、先生が撮影するカメラマンに扮するというものだった。その光景に引いたスケバンたちは先生を避けていき、二人は無事に公園を脱出する。"
1439493213 = "閃光弾不発事"
276851656 = "同人イベントを荒らす不良がいるとの通報を受け、先生とスズミは現場へ向かう。先生のアドバイスを真に受けたスズミは、潜入捜査用にテルミットホワイトに扮して登場、一躍人気者に。その後、マニアに絡むスケバンを発見したスズミは、閃光弾を素手で握りつぶすという離れ業でそれを瞬時に制圧する。"
3995005634 = "追いかけた輝きは"
3528511121 = "スズミに誘われ、二人で遊園地へとやってきた先生。しかし、スズミは洗濯の失敗で魔法少女の衣装しか着られる服がなく、その格好で現れる。遊園地を楽しんだ後、ヒーローショーを眺めていたスズミは、人々が実在しないからこそ英雄を求めると、どこか寂しげに語る。そんな彼女に先生は、スズミ自身が英雄だと伝えた。"
2609778606 = "隊長の訪問"
1761341386 = "シャーレの前を通りかかったラブが連絡をくれたのをきっかけに、先生はオフィスから駆け出し、彼女を熱烈に歓迎する。不良である自分と一緒にいていいのかと気遣うラブに、先生は彼女が本当は優しい子だと伝え、強引にシャーレの案内を始める。戸惑いながらも、ラブは先生との楽しい時間を過ごすのだった。"
2738523287 = "隊長の重み"
1476327715 = "ヘルメットの手入れ道具を買いに来たラブと先生。しかし、絡んできたチンピラたちとの喧嘩に発展してしまう。ラブは銃に靴下を被せて相手を翻弄したり、手榴弾をバットで打ち返したりと、その圧倒的な実力でスケバンたちを撃退。その戦いぶりに感心した先生は、照れるラブを褒めちぎるのだった。"
2583374591 = "隊長の強さ"
2742294773 = "ラブに呼び出され、ブラックマーケットまで全力疾走で駆けつけた先生。そこにあったのは、1本20円でジュースが買える激安自販機だった。ラブにジュースを奢ってもらうも、彼女は硬いフタが開けられず四苦八苦。先生が簡単に開けてあげると、ラブは握力がないことを恥ずかしがり、その場から逃げ去ってしまう。"
3932714589 = "隊長の優しさ"
3081987240 = "排水溝に落ちたアヒルの雛たちを発見したラブは、濡れるのもためらわずに助け出した。その頼もしく大人っぽい姿を見た先生は「生徒っぽくない」と評し、文字通りの意味で受け取ったラブは勘違いして慌てる。誤解が解けたのも束の間、排水溝に浸かったヘルメットを被っていることを指摘され、ラブは恥ずかしがり、またしても逃げ去るのだった。"
2205914050 = "みんなの先輩"
2952764417 = "生徒たちの「話し合い」を仲裁するスバルを見て、先生はその成長を称賛。しかしスバルは、根本的な解決に至らない自分の無力さに悩んでいることを打ち明ける。そんな彼女に先生は、いつでも相談に乗ると伝えるが、スバルはそれを「生徒を甘やかす先生の手口」だとからかうのだった。"
1122650249 = "最初の一歩"
1189264743 = "初めてのシャーレ当番に緊張するスバルを、先生は大いに歓迎する。休憩中、スバルは外の世界への戸惑いや、トリニティに対する愛憎入り混じる複雑な心境を吐露。先生は優しく諭し、抱えきれない時はいつでも頼ってほしいと伝える。その言葉に、これまで張り詰めていたスバルの心の糸が切れ、彼女は思わず涙を流すのだった。"
3342179099 = "社会経験"
1014525569 = "社会勉強のため、メイドカフェでアルバイトを始めたスバル。看板持ちをしていたところを先生に見つかり、先生の計らいで店内で休憩することに。しかし、他の店員に絡む迷惑客が現れ、スバルは得意の近接戦闘術で瞬時に制圧。その鮮やかな手際に、店長や他のお客さんは大喝采。後日、スバルは追加報酬をもらうのだった。"
3576703723 = "夕暮れのハーモニカ"
1199266629 = "スバルに欲しいものはないかと尋ねた先生は、彼女がハーモニカの楽譜を欲しがっていることを知る。二人でショッピングモールへ出かけ、無事に楽譜を手に入れた後、スバルは「完璧な答え」を求めてしまう自身の悩みを打ち明ける。先生の言葉に背中を押されたスバルは、夕暮れの川辺で、先生のためだけにハーモニカを吹き始めた――"
1525996144 = "The Giving Girl"
2647108977 = "後輩たちに優しすぎるスバルをねぎらい、先生は彼女をファミレスに連れて行く。その後、街を散策中に偶然ヘビーメタルと出会ったスバルは、その破壊的な歌詞に強く惹かれていた。世界を終わらせたいかと尋ねる先生に、スバルは「先生がこの世界はいいものだと確信させてくれればいい」と、その証明を託すのだった。"
1280647772 = "評論の対象"
2333773019 = "シャーレ当番にやってきたタカネは、自身の好きなものを講評したい、と先生の評論をしても良いかと尋ねてくる。それならば、と先生はタカネのことを知りたいと返し、アイスホッケーの試合を観に行く約束をするのだった。"
961567717 = "アイスホッケー"
3723581648 = "先生とアイスホッケーの試合を視聴することになったタカネ。しかし、試合の最中に乱闘が起こり、試合がめちゃくちゃになってしまうのだった。"
1904269452 = "もやし祭り"
3282413106 = "先生にとっておきの一皿を振る舞うタカネ。先生は久しぶりに心温まる料理を口にするのだった。"
2937698410 = "夜空に佇む姫君"
4139348446 = "先生とタカネは、オーロラの撮影に出かけ、オーロラの下で即興劇を楽しむのだった。"
2067127778 = "インフラストラクチャー"
3737878541 = "通信設備の工事現場に先生を招待するヤクモ。そこで先生は、ヤクモのビジネスの手腕を目の当たりにするのだった。"
1618303281 = "事業計画書"
3547873849 = "シャーレ当番にきたヤクモは、シャーレを使った事業計画を持ちかける。断り続ける先生だったが、その発想の豊かさに感心するのだった。"
638150931 = "タイムテーブル"
3324191113 = "先生とヤクモは、列車に乗りながら様々なことについて話すのだった。"
425263812 = "経営の心理学"
172823425 = "先生に出版物の売上改善について相談するヤクモ。その最中、閃いた先生の主導でスノーエンジェルの写真を撮ることになり……。"
3182648846 = "もう一度モデル、に……！"
2967078244 = "再びファッションショーに出ることになったツクヨ。なんでも、入手困難な忍者映画のパンフレットが報酬なのだとか。無事ショーを終えたツクヨを労るべく、先生は夕飯をご馳走するのだった。"
3929201993 = "またモデル、ですか？"
957721389 = "美術予備校のモデルを依頼されたツクヨ。慣れないデッサンモデルのため、先生にそばにいてもらうことに。そうしてモデルを勤め上げたツクヨを労るべく、先生はご飯をご馳走するのだった。"
525821709 = "今度は私の番、です……！"
348274659 = "これまで手伝ってもらったお礼としてアルバイト代で先生にご馳走してくれるツクヨ。先生と過ごすために、当日入ったモデルのオファーを断ったものの、道中見かけた女の子のために引き受けることに。高身長の自分が誰かのためになれたら、と彼女は笑うのだった。"
2323781364 = "た、助けて、ください……！"
955441230 = "これを最後のファッションショーにすると決意したツクヨ。緊張のあまり寝坊してしまい、時間短縮のために裏道を使うことに。道中にあるフェンスに引っかかってしまうものの、無事ファッションショーを終えることができたのだった。"
1551348262 = "忍者少女は治療を求む！"
1127575116 = "動画撮影中にドレスを破いてしまったミチルは、お直し屋さんに向かうことに。しかし、直してもらう衣装を着たままだったため、伝承にある忍者のように身体に直接墨を塗ろうとする。結局近所で運動着を買って着替えるのだった。"
1001116658 = "忍者少女は恥ずかしい！"
1730880438 = "修繕が終わったドレスを受け取ったミチルは、動いても問題がないか確認すべく先生を連れてショッピングへ。忍具を買った後、先生へのお礼としてカプセルトイをくれる。その中には指輪が入っていて……ミチルは照れて姿を隠すのだった。"
180243508 = "忍者少女は秘訣が知りたい！"
4193845144 = "ミチルっちチャンネルの再生数を伸ばすべく、怪しい説明会に参加したミチル。詐欺に気づき帰ろうとするものの、引き止められてしまう。先生が間に入り難を逃れたミチルは、地道に再生数を伸ばそうと決意するのだった。"
1544401811 = "忍者少女は流行に敏感！"
3344102574 = "「ファッション」テーマの動画が流行だと知ったミチルは、忍術とファッションを組み合わせた動画を考案する。しかし、再生数は思うように伸びず。確認してみると、レンズにカバーがかかっていたせいで何も撮れていなかったのだった。"
868253551 = "メイドロボットとは"
773887947 = "アバンギャルド君を改造し、家事をやらせることにしたリオ。このまま量産しても良いかもしれない、と続けるリオに対して先生は「メイドロボットが良い」と主張する。それならばメイド服を着せればメイドロボットになるのではないかというリオに対し、先生は反論するも、三段論法で論破されてしまうのだった。"
2264036531 = "独り言"
2513546491 = "部屋での作業に一区切りがついた先生は、輸送船の中でリオの意味深な声を耳にする。一体何をしているのかと覗いてみると、HMDを装着したリオが何かをしゃべっていた。曰く、輸送船のアップグレードをしていたのだとか。仮想空間で誰かとしゃべっていたわけではないのだと誤解は解けたところで、彼女が使っているアバターの話を聞くのだった。"
2142602582 = "思考実験"
3668229248 = "AMASの整備中、リオは今までAIに自我はないと考えていると打ち明ける。けれど、その考えはアリスとの出会いによって変わったのだとも。その後、先生にある思考実験に付き合ってほしいと告げ、そっと二人だけの時間を共有するのだった。"
1608494230 = "想定外の変数"
2718709279 = "スーツに発熱機能を追加したリオは、動作テストを先生に依頼する。機能追加自体は問題なかったものの、部屋を暖めすぎたせいで暑くなってしまった、とリオはスーツの胸元をそっと開けるのだった。"
3220881707 = "ストレス解消"
2066240305 = "新しい身体に慣れてきたケイ。しかし、ストレス解消をどのように行うべきかについて悩んでいた。この身体に不満があるわけではないが、と呟いたケイは髪を結ぶリボンがほしい、と小さな要望を伝えるのだった。"
1827657751 = "Welcome To Kivotos"
544438161 = "ケイの授業参観にやってきた先生。授業において、ケイは講師以上の知識を披露する。あらゆる知識を持っている生徒は学園に通う必要があるのかと悩むケイに対し、授業だけが学びではないと返す先生。人と関わることも大事だと伝えられ、ケイは少しだけ考えてみることにしたのだった。"
3726540946 = "クエスト"
2715974409 = "ケイから助けを求めるモモトークが届く。急いで行ってみたところ、そこにはミレニアムの生徒に可愛がられているケイの姿があった。アリスの双子の妹として受け入れられているケイは、戸惑いながらも学園生活に馴染んでいくのだった。"
1521323340 = "Out Of Control"
1338830859 = "「バグが多すぎる」とケイから不満げなモモトークが届く。ゲーム開発部の部室へと向かうと、そこにはゲーム開発部の新作のα版のデバッグをするケイの姿が。そうして二人は、モモイたちのやりたいことを汲み取りながら、ゲーム開発部の作ったゲームのアルファ版のデバッグを進めるのだった。"
2007896298 = "生活環境について"
3837031192 = "先生がゲーム開発部に訪れると、掃除をしているケイがいた。部員たちの掃除能力について愚痴をこぼしながら、周囲にいる人間の影響を受けるアリスが心配だとぼやくケイ。先生は掃除をちゃんとしているのかと問いかけてくるケイに対し、先生は反応に困るのだった。"
2197644324 = "流れる夕暮れ時"
2760439479 = "シャーレの当番に訪れたケイ。先生の業務が多いことへの苦言を呈しながら、明日の当番も手伝うと申し出てくれる。そんなケイに、お礼としてショッピングに行こうと提案する先生。しかし、疲れて目が霞んでしまう。そんな先生に対し、無理しないで大丈夫、とケイは優しく声をかけるのだった。"
1595074934 = "勇者修行"
405265064 = "新しい装備を手に入れたと喜ぶアリス。しかしこのままでは使いこなすことはできない、と修行を始めることに。修行の最中、足をひねってしまったアリスを、先生はおぶって帰るのだった。"
1206023533 = "始まりの町"
53651717 = "今日も修行をしたいというアリスに対し、先生は秘密特訓を用意したという。それはアーマーを着てゲームをプレイするというものだった。様々なゲームがある中『テイルズ・サガ・クロニクル』で遊んだアリスは、アーマーを着ても緊張しなくなったと特訓の効果に喜ぶのだった。"
1220509438 = "違いがあるということ"
940994582 = "幾多の改造を重ねたアリスの勇者のアーマー、アビ・エシュフはトラブルが起こるようになってしまった。戦いを繰り返すうちに摩耗していったアビ・エシュフは次はもう直せないかもしれないという段階まできているという。アリスは、なんとかしてアビ・エシュフも光の剣と同じように愛されてほしいと願うのだった。"
1247641963 = "魔法が始まる時間"
830455537 = "深夜にアリスから連絡がくる先生。窓の外を見てほしいというアリスの言葉に振り向くと、美しい夜空が広がっていた。この景色を共有したかったのだという。先生とアリスは穏やかな時間を楽しむだのった。"
2829727388 = "帰ってきた勇者様？"
3540463318 = "壊れたはずのアビ・エシュフをまとって現れたアリスに驚く先生。曰く、アビ・エシュフの破片からレプリカを作ってもらったのだとか。以前よりも性能は落ちるけれど、色々な人が喜んでくれるこの姿はそれだけで価値があるのだとアリスは笑うのだった。"
640504906 = "ライフスタッフ（１）"
1047587791 = "先生のライフスタッフをすると言い出したヒマリは、AMASの一部を改造し、サポートをし始める。ここまで丁寧なサポートをするのは自分以外いないのですよ、とヒマリは笑うのだった。"
544066948 = "規則と概念"
1970386051 = "ヒマリが「車椅子」の手入れをするところを眺めることになった先生。やはりバイクに見える、という先生に対し、ヒマリは車椅子とバイクの違いを説明しようとするのだった。"
2839455324 = "同じ星空の下"
3945440914 = "整備が終わった「車椅子」で夜にドライブに出かけるヒマリと先生。車椅子で夜空の下を疾走しながら、二人は秘密の時間を共有するのだった。"
53718002 = "ライフスタッフ（２）"
1960948734 = "寝坊してしまったヒマリは、ライフスタッフ失格だと落ち込む。けれど、先生が甘えていいのだと慰めると、今日は一日甘やかしてほしい、と様々なお願いをするのだった。"
4237772262 = "パーフェクトメイド"
1658156830 = "トキから完璧なサポートを受けて驚く先生。曰く、今までは先生が自分で生活できていたから、とあまり干渉してこなかったのだという。けれど、今は「非常事態」のため、普段以上のパーフェクトメイドとして動いているのだとか。補佐を完璧なものにすべく、トキは24時間密着警護を提案するのだった。"
1805231996 = "趣味（仮）"
3531035594 = "偵察任務から戻ってきたトキは、金属の動物に癒されたことを報告してくれる。その後、最近ハマっている配信文化やゲーム実況について熱く語り、先生と和やかな時間を過ごす。話題は趣味や成長へと広がり……気づけばトキは先生の隣で眠っていたのだった。"
1208888951 = "アップグレード"
364125731 = "「アップグレード」されたと先生に連絡を入れるトキ。曰く、新しい武器になったのだとか。二丁拳銃でもあるエネルギーピストルは最高の組み合わせだと熱く語るトキは、自身の装甲であるアームギアをエネルギー式ロケットのように発射する改造してみたいと語る。それは危ないと止める先生に対し拗ねるトキ。結局、先生が優しく宥めることになるのだった。"
3590033319 = "朝焼けの記憶"
3047442248 = "明け方の偵察を終えたトキは、先生に見せたい風景がある、と呼び出す。それは、美しい朝焼けだった。その景色を眺めながら、トキはもしも今「最後」の時が訪れたら、「最後」の一人になれるかと問いかける。やがて朝焼けが終わり、日常へと戻る中で、トキは改めて「先生の隣には自分がいる」と宣言するのだった。"
1508081542 = "ロッカー恐怖症"
121840633 = "輸送船の降下ポッドやコックピットからの緊急脱出がトラウマとなり、ロッカーに入っても落ち着かなくなってしまったというユズ。落ち着ける場所を取り戻すべく、先生と一緒にロッカーに入って克服するのだった。"
566993182 = "UZQueenのスランプ"
4132271700 = "自分の身体を動かして遊ぶVRゲームに苦戦しているというユズ。先生がユズを肩車することで役割分担を行い、ランキングを駆け上がっていくのだった。"
1591579143 = "ゲーム大会"
1792195982 = "大人気で入手困難なゲームが、大会の優勝賞品になっていた。しかしユズが苦手とするVRゲームで勝敗を決めるため、先生と協力プレイをすることに。見事優勝を勝ち取り、念願の新作ゲームを手に入れるのだった。"
2902368979 = "世界の救済とゲーマー"
823660841 = "苦手としていたVRゲームにも徐々に慣れてきたユズ。1人でクリアしてエンディングを迎えた世界に、先生を招待する。ゲームだって現実であると語らいながら、2人はVRゲームの中で平和な時間を過ごすのだった。"
351853014 = "効率・非効率"
2129235531 = "朝起こしてくれたことをきっかけに、先生はエイミの「散歩」に付き合う。時には敵と戦いながら、鋼鉄大陸でのことについて言葉を交わす2人。自分の考えが変わりつつある、とエイミは先生に話すのだった。"
2767044483 = "与えるもの"
328091725 = "極地の夜。エイミのパトロールに付き合っていた先生は、体を冷やしてしまう。そんな先生にエイミが寄り添って「熱平衡」だと言う。お互いに影響を与えあって温度を合わせることだと説明するエイミは、やはり自分の変化を感じるのだった。"
3643082009 = "妨害"
1339460084 = "エイミから緊迫したメッセージを受け取った先生は急いで駆けつけた。特に問題なく合流できたものの、心配をかけてしまったと謝るエイミ。危なっかしさを自覚しつつも、自分のことを見守っていてほしい、と先生にお願いするのだった。"
3089168655 = "あなたとココアを"
4100335731 = "エイミに案内されて、輸送船の屋根の上で一緒に星を見上げる2人。ココアを飲みながら、自身の変化について、今のエイミなりの答えを先生に話す。少なくとも、エイミはもう1人ではなく、星空の下、2人で体温を分け合っていた。"
757227832 = "深夜のおつかい"
4248235020 = "夜食を買いにコンビニへ向かった先生はコユキと出会う。パジャマ談義に花を咲かせた後、2人はお菓子を買って、夜の公園に寄り道をする。次第にウトウトし始めたコユキを、先生は部屋の前まで送り届けるのだった。"
531402134 = "まるで我が家"
3336463100 = "パジャマ姿で当番に来たコユキは、レジャーシートを敷いてゴロゴロし始めてしまった。しかしノビノビできるおかげか、コユキは瞬く間に仕事を片づけていく。先生はご褒美として、コユキに泊まり込みでのゲームを提案するのだった。"
924427267 = "ザ・喫茶ファイター"
1729519559 = "誰よりも早く新作のゲームをすべく、先生とコユキは早朝からゲームセンターへ向かう。何度もコンティニューして挑戦するも、なかなか先に進めない。帰り道にコンシューマー版を買って、シャーレでみっちりと攻略に勤しむのだった。"
1326515843 = "愛されキャラ"
2263035390 = "体調を崩したコユキが部屋から脱走し、シャーレへ逃げてきた。風邪ではないと言い張るコユキを休憩室でかくまうことにする先生。セミナーには連絡を入れたうえで、そのままシャーレの休憩室で看病をするのだった。"
3809347529 = "自己紹介は丁寧に"
919208835 = "コノカに呼び出された先生がヴァルキューレを訪れると、なぜか当の本人は地下の留置場に拘留されていた。騒がしい公安局内において昼寝に適した場所だと語るコノカだが、まだコノカのことを認識していなかった新人の局員に、先生と話す様子を容疑者が騒いでいると勘違いされてしまう。弁明もむなしく、コノカは一方的に制圧されてしまうのだった。"
630889152 = "時間感覚"
1147060989 = "その日のコノカは「時間を守ること」がラッキー行動だった。ヘルメット団を追跡する間も忠実に実践しており、退勤時間を迎えると「自首するように」と言い残して帰ってしまう。これ幸いと逃げていくヘルメット団だったが、翌日、始業開始と共にコノカに確保されるのだった。"
2418914844 = "刑事の身だしなみ"
2216554313 = "極秘として呼び出された先生は、コノカが贔屓にしているアロハシャツ屋に案内された。楽しそうにアロハを選びながら、自分がアロハ好きになったきっかけをコノカが話し始める。一通り話終わった後、「アヒル柄のアロハシャツ」を2着買ったコノカは、そのうちの1枚を先生にプレゼントするのだった。"
2954048139 = "バディ"
4268064536 = "「バディと行動すると良い」という占いの結果に従って、コノカは先生を呼び出した。逃走犯を追跡するために聞き込みをして回る2人だったが、なかなか情報は集まらない。あげく雨に降られてしまい、慌てて雨宿りをするはめになったものの、「先生が隣にいたから良い日になった」とコノカは嬉しそうな様子を見せる。そんな2人のもとに、ずっと追いかけていた犯人が雨宿りをしに駆け込んでくるのだった。"
168308071 = "とある刑事の療養"
3351360879 = "風邪をひいたコノカは、報告の連絡を誤って先生に送ってしまう。心配した先生がコノカのお見舞いに行くと、ニンニクましましの豚骨ラーメンを食べたいとお願いされる。そんなやり取りもしつつ、寝付くまでの間、いつもより少しだけ弱気で大人しいコノカを看病し続ける先生だった。"
1877482996 = "早く脱ぎなさい！"
84336040 = "ワイルドハントを訪れるついでに、レナにおつかいを頼まれた先生。レナに会いに行く道中、重い荷物を持ち上げた拍子に先生のズボンが破けてしまう。折悪しくそのタイミングでレナと合流することになり、隠そうとした先生は怪しい動きを取ってしまう。レナに訝しがられ、お尻に穴が開いているのを白状する先生。見かねたレナは先生にズボンを脱がせて、その場で縫い直してくれるのだった。"
404222347 = "認めないんだから！"
2072434858 = "レナに呼ばれて、幽霊が存在しないことを証明するための調査に同行することとなった先生。七不思議の逸話を頼りに夜の廃墟の調査を進めていくものの、結局決定的な証拠はつかめなかった。後日、その日の出来事をオカ研のみんなに説明したレナだったが、写真に先生の腕が映り込んでしまっていたのに気づかず、それを誤魔化した結果、逆に幽霊は存在する、とオカ研は盛り上がってしまうのだった。"
278781398 = "これあげる！"
3926285099 = "廃墟での騒動をごまかした結果、厄除けとしてお守りを作ることにしたレナ。作った内の1つを先生にもプレゼントしたものの、なぜか先生には悪いことが続いてしまう。疑問に思ったレナがお守りを確認してみると、なんと中身が入っていなかった。中途半端なものは渡せないということで、代わりのお守りと取り替えてくれるレナ。それ以降、先生には不思議と悪いことは起きないようになったのだった。"
3292372329 = "小さなリボン"
222237672 = "またしてもレナからおつかいを受けた先生は、アクセサリーの材料を持ってワイルドハントへと向かった。リボンのヘアピンを作っていたレナは作業をしながら、幼い頃に、アクセサリーを作って友達にプレゼントしたことがきっかけでファッションデザイナーを志すようになったと話す。帰り際、レナが頭につけてくれたリボンをそのままに、その日の残りの仕事を片づける先生だった。"
4173121054 = "これが私の日常"
759367300 = "ミレニアムを訪れた先生は、同級生と微妙な空気感で会話するアカネを目撃する。帰り際、先生のことを待っていたアカネと遭遇し、一緒に帰ることにする先生。その道すがら、人との関わり方が難しいと胸の内を語るアカネ。それを聞いて、仲良くしないといけない理由はないけれど、仲良くしたいなら応援する。と先生はアカネの背中を押す。アカネと先生の「親しくなろう」作戦が動き出すのだった。"
2673536527 = "踏み出す一歩"
2811609032 = "先生と一緒に考えた台本を基に、アカネは同級生と親しくなろう作戦を開始する。先生の助力を受けられるように、超小型の無線機を耳に仕込んだアカネは、作ったキャラクターで同級生とのコミュニケーションを重ねる。そのまま、ぎくしゃくとしたやり取りを繰り返していたが、その不自然さはすべて同級生に見抜かれていた。恐る恐る理由を説明し、一歩自然に振る舞えるようになったアカネは楽し気な時間を過ごすのだった。"
3944103849 = "肩を並べて"
1930446094 = "誰もいない教室に先生を招いたアカネ。先生と一緒に試行錯誤した結果を見せるために、同級生ごっこが始まる。最初こそじゃれ合っていたものの、「取り繕うことはできても本当の自分が良く分からない」とアカネは涙ながらに言葉を紡ぐ。それでも、まだたった一人でも、悩みを打ち明けられる特別な存在がいて、それが先生で幸せだと、アカネは儚げに話すのだった。"
2908734044 = "最高のお掃除方法"
2828576144 = "爆弾の使い方がワンパターン化してしまっている、と先生に相談を持ち掛けるアカネ。カフェでそんな話をしていた時、2人はテロリストの活動に巻き込まれてしまう。駆けつけたヴァルキューレの生徒は、市民を人質に取られてしまって思うように動けない。ここぞとばかりにアカネが平和的解決を試みるが、時間をかけても事態は好転せず、ついには爆弾を使ってすべてを解決するのだった。"
2314453101 = "ニコのおすすめ"
2864377608 = "仕事に追われ、まともに食事をとることもなく夜遅くまで残業している先生のために、食材を持ってシャーレを訪れたニコ。食べたいメニューを聞かれた先生が「おすすめで」と答えると、ニコはきつねうどんを用意するのだった。"
3319469081 = "ニコのお買い物"
3542063046 = "FOX小隊の「特殊補給作戦」を遂行するため、先生と一緒にスーパーへ向かったニコ。閉店前のタイムセールが始まると同時に、店内は戦場と化した。並みいる市民をかわしながら、ニコは目当ての食材をカゴに収めていく。方や先生は、歴戦の猛者に気圧されてしまうのだった。"
722436222 = "ニコの相談"
450635337 = "その日の先生は様々な不運が重なり、すっかり疲れ切ってしまっていた。シャーレの手伝いに来たニコは先生の様子に気づき、自らカウンセラー役を買って出る。優しく話を聞いてくれるニコにつられて、思いを吐露していく先生。気づけば、心は軽くなっていた。"
4084788817 = "ニコの名札"
2993667495 = "オフィスの在庫管理のため、あらゆる物に名札を付けることを提案するニコ。名札があれば持ち主が分かり、整理しやすく、在庫も把握しやすいということで、2人は整理に乗り出す。すべての作業が終わったあと、ニコは1枚だけ余った名札を先生に貼るのだった。"
1170598127 = "ニコのいなり寿司"
653761742 = "先生にお願いしてシャーレの調理室を借りたニコ。先生が様子を見に行くと、ニコはいつもと違って油揚げを揚げるところからいなり寿司を作っていた。手間暇をかけて油揚げが完成すると、ニコは最初の一枚を先生に差し出した。その後、ニコお手製のいなり寿司を一緒に食べるのだった。"
1951868971 = "警戒するキツネ"
1622411002 = "当番のためにシャーレを訪れたクルミ。2人で仕事を進めていると、先生に助けられたと言う市民がお礼の品を持ってきてた。市民が帰ったあと、誰だったかはよく覚えてないと話す先生に、警戒心が足りないと忠告するクルミ。そこで先生は毒見と称して、色々な貰い物をクルミに試してもらう。高級なお菓子や香水などを試すうちに、からかわれていることに気づくクルミだった。"
1539676039 = "知恵のあるキツネ"
852804695 = "SRTで教わっていたり、ライフハック系の動画を見ていたりするため、日常生活で役立つさまざまなノウハウに詳しいクルミ。先生の手元に溜まっていた小さなお困りごとをてきぱきと解決していくクルミに、先生は難問を投げかける。クルミは渡された知恵の輪を四苦八苦しながら解くのだった。"
2213050152 = "意識するキツネ"
3291828447 = "証明写真を撮るため、駅にある撮影ボックスを訪れたクルミ。しかしSRTでの訓練の影響か、カウントダウンの後のフラッシュが光るたび無意識に目をつぶってしまう。それを見かねた先生は、スマートフォンのカメラを使って不意打ちでクルミの写真を撮る。綺麗に撮れており、データから印刷してくれる業者に持ち込むのだった。"
1018801245 = "おめかしするキツネ"
2066054702 = "先生がFOX小隊のHQを訪れると、クルミが1人で盾の手入れをしていた。作戦において、相手が真っ先に目にするのがポイントマンの盾であるからこそ、小隊を印象づける顔として、しっかりと手入れをしておきたい。と持論を語るクルミ。その話を聞いて、可愛いシールをプレゼントする先生。クルミは断固として盾には貼らず、代わりにどこに貼るべきか悩むのだった。"
1003943113 = "見送るキツネ"
3964533583 = "夜遅くに暗い路地を歩いていた先生を見つけ、警戒心が足りないとクルミが注意する。クルミは先生の手を取って、夜の闇の中を切り開くように進んでいく。怖くとも前に進むのが自分の役割だと話すクルミに、先生はつないだ手に力を込めて、何かあったら自分が支えると話すのだった。"
825961924 = "ある狙撃手のスモールトーク"
2685659288 = "新しくできたカフェを訪れたものの、あまりに複雑な注文方法に困ってしまった先生。そこにちょうど来店していたオトギが、店員さんとすぐに仲良くなって、注文を手伝ってくれる。チャンスが巡ってきたら迷わず掴むことを鉄則としているオトギは、誰とでもすぐに打ち解けられるおかげで色々な良いこともあるが、望まぬ試練が降りかかることもあるのだった。"
4153878308 = "ある狙撃手の無線交信"
618610602 = "通信しているオトギの様子に興味を持った先生に、音声コードを教えながら、特殊部隊の隠語について語るオトギ。話を一通り聞いた後、面白いとは思いつつ、先生という立場では、信頼してもらうために言葉ではっきり伝えることが大事だと思う。と語る先生。それを聞いたオトギは、思わず音声コードで本音を漏らしてしまうのだった。"
3691143979 = "ある狙撃手の寂しさ"
304057056 = "深夜の不思議な連絡を見て、心配になった先生が探しに行くと、公園でオトギを発見する。孤独を紛らわせるために公園を訪れていることを話すオトギは、明滅する街灯を見上げて心を落ち着かせていた。孤独との向き合い方で進路に悩むオトギだったが、先生との会話を経て、もう少し今の道を進んでみると話すのだった。"
354077761 = "ある狙撃手の迷彩服"
2245221007 = "迷彩服を買いたいと言って先生をショッピングに誘ったオトギ。しかし向かう先は普通のアパレルショップであり、オトギの言う迷彩服は先生が思い描いていたものとは異なっていた。街に溶け込むなら普通の格好であることこそが迷彩になると話すオトギ。2人は一緒に色々な服を見て回るのだった。"
201493185 = "ある狙撃手の秘密基地"
420529048 = "先生はヴァルキューレの生徒から、D.U.の至る所に不思議なマークがあるから調査しているという話を聞く。その後、にわか雨にあった先生は、雨宿りに立ち寄った高架下の梯子に件のマークを発見する。気になって梯子を登ってみると、そこにいたのはオトギだった。曰く、ここは作戦用の秘密基地であり、マークは縄張りを示すためのものだという。雨の降る高架下、2人はコーヒーを飲みながら過ごすのだった。"
3406649746 = "エリカとショッピング"
1917809992 = "事務用品を買いに来ていた先生は、地下商店街でばったりエリカに遭遇する。当てどなくウィンドウショッピングをするのが好きだとエリカが話すと、ついていくことを決める先生。2人でお店を見て回る中、レオパード柄の商品にエリカが興味を示し、2人は好みについて語り合うのだった。"
2344616949 = "エリカと夜のお散歩"
3116115619 = "夜遅く、エリカからのお誘いを受けて、D.U.で一緒に夜ごはんを食べることにした先生。通りで見かけたファストフード店に入り、夜に高カロリーな食事をする背徳感を楽しむのだった。"
3131626542 = "エリカと自販機"
2234993111 = "先生が自販機で飲み物を買おうとしていると、横からエリカが声をかけてくる。そのまま2人はお互いに飲み物を勧め合う。爪が長いため、缶を開けるのを先生にお願いするエリカ。先生は蓋を開けようとして指を怪我してしまい、エリカにかわいい絆創膏を貼ってもらうのだった。"
3530314181 = "エリカの相談"
3833501729 = "相談があるといって、エリカに呼び出された先生。まだ考えがまとまっていないと言いながら、ぽつぽつとエリカが話し始める。それは友達と一緒にいることは好きだけれど、たまに気力がなくなってしまうというものだった。1人の時間も大事だ、と先生に諭され、合点がいった様子のエリカ。実は、1人で居たいときに行く場所がある、と話すのだった。"
905777020 = "エリカ、秘密基地"
2885707072 = "ゲヘナを訪れた先生に、自分だけの秘密基地を見せると言うエリカは、夕暮れに染まり、誰もいない屋上に先生を案内する。自分だけの場所だったものの、先生は特別だから連れてきたと話すエリカ。日が沈むまで話をした後、暗くなった校舎を2人で一緒に帰るのだった。"
1600040855 = "小悪魔と悪役令嬢"
496791815 = "今度の依頼で悪役令嬢を演じることになったというムツキは、先生を相手に練習を始める。先生にお茶を用意させたり、先生を椅子にしたり、楽しいひとときを過ごすのだった。"
3860221711 = "小悪魔とバイヤー"
1421163371 = "買おうとしていた爆弾がヘルメット団によって買い占められていることを知ったムツキ。調査の結果、転売が横行していることを突き止める。転売屋を懲らしめるべく、先生とムツキは一芝居打つのだった。"
548822881 = "小悪魔とホカンス"
1478658850 = "転売屋の残党を片づけたムツキは、面倒事を避けるためにホテルに身を隠していた。そんなムツキの部屋を先生が訪ねると、大金が入った鞄を託される。曰く、転売屋がため込んでいた資金であり、有意義なことに使ってほしい、とのこと。先生は預かることを決めるのだった。"
2079305511 = "小悪魔とのデート"
127523721 = "ムツキに誘われたオペラ鑑賞をきっかけに、楽しい1日を一緒に過ごす先生。その帰りしな、デートらしいデートは今日が初めてだったと振り返るムツキは、先生に素直な想いを打ち明けるのだった。"
1265163046 = "思いがけない出会い"
805657719 = "先生は、ふと立ち寄った博覧会の会場で、ドレス姿で警備をしているハルカと出会う。二人が立ち話をしていると、折悪しく喧嘩に巻き込まれてしまう。かすり傷ではあったものの、先生が怪我をする事態になってしまい、ハルカが瞬く間に鎮圧するのだった。"
1885392653 = "予想外のプレゼント"
765461118 = "以前ドレス姿を褒められた際に、ドレスそのものを褒められたのだと勘違いしていたハルカは、献上品として自分のドレスを先生にプレゼントする。先生が誤解を解いたことで、ハルカは改めてドレス姿を披露するのだった。"
3025495165 = "夜の散歩"
3464250131 = "ひょんなことから夜の散歩をすることになったハルカと先生。ハルカは、相手の迷惑を考えると自分からはなかなか連絡できないと話す。しかし、勇気を出して連絡してくれたから今があるんだよ、と先生が諭して、二人は散歩を楽しむのだった。"
1181939252 = "雑草のように"
585740990 = "ハルカに誘われて、「雑草」をテーマにした美術館を訪れる先生。きらびやかに展示された作品を見て回るなかで、ハルカは何かが気にかかっている様子を見せる。最初はためらうものの、先生に促されて、ハルカは雑草への思いを語るのだった。"
1594029596 = "水鉄砲遊び"
3825311697 = "完全武装で百花繚乱の部室を訪れた先生は、水鉄砲を使ってナグサと一緒に遊んでいた。かき氷をかけた銃撃戦はナグサの圧勝に終わる。かき氷を食べながら「なぜ自分は光り輝いてしまうのか」という相談を先生にするナグサだった。"
1821212472 = "浜辺の少女"
2834486412 = "街で聞いた「海に雪女が出没する」という噂を確認するため、ナグサのもとを訪れる先生。ナグサは、一人で海に行っている自分が勘違いされているのかもしれないと話す。誤解を解くために海に繰り出した二人は、そのまま海遊びを楽しむのだった。"
3330436342 = "おいしいものは制御不能"
401442022 = "まだ雪女の噂は消えていないとのことで、ナグサと先生は再び海を訪れる。海岸近くの商店街を歩いていると、焼き鳥屋を見つけてしまうナグサ。最近はセーブしていると話すナグサだったが、ついつい誘惑に負けてしまうのだった。"
4208664993 = "二人だけのサイン"
2899839957 = "ビーチバレーでペアを組んだ先生とナグサは、二人だけの秘密のサインを交わしながら試合に臨む。試合が終わった後、ナグサは今の楽しい時間を振り返りながら、一歩前に進めたことを先生に感謝するのだった。"
3764553248 = "普通"
1131725880 = "「門主」の肩書を忘れ、今だけは普通の生徒として過ごしたいと先生にお願いするキサキ。とはいえ、やはりどこか肩に力が入ってしまう。その様子を見た先生は、もっと甘えていいと提案する。こうして、自分の心のままに振る舞うことを覚えるキサキだった。"
972685946 = "タガを外して"
3383869734 = "先生が待ち合わせ場所に行くと、そこで待っていたのはキキだった。普段のキサキとは打って変わって、開放的な様子ではしゃぐキキ。先生も一緒になって1日中遊んで過ごすものの、少し張り切りすぎてしまい、キサキの身体は疲労を訴えていた。"
3844124237 = "天界への旅"
2515631888 = "早朝にキサキからの誘いを受けて、渓谷名物だというボートを一緒に楽しむ先生。二人を乗せた小舟は、静かに水面を進む。悠然とそびえ立つ山々が形作る渓谷を、朝霧が包んでいく。天界にも見紛う景色のなか、キサキと先生はお互いの輪郭を確かめ合うのだった。"
103013825 = "青い蝶"
1653920718 = "渓谷から戻ってしばらくのこと。キサキは、せっかく用意した水着を活かせる場所に行きたいと先生にお願いする。海で遊び、ウォーターパークにも訪れた二人。1日を終えて満足げな様子のキサキは、遠回しな例え話をする。いまひとつ先生の理解は及ばなかったが、それでもキサキは満面の笑みを見せるのだった。"
2180840207 = "ウォーターベッド"
3638633883 = "シュンは先生と一緒に、渓谷での避暑を満喫していた。川の中で浮力に身を任せたり、川の水で冷やしたフルーツを食べたりして過ごす二人。リラックスしすぎた先生は、シュンに支えられて浮いたまま寝そうになってしまう。慌てたシュンは先生を連れて河原に上がり、冷えた体を温めるように包み込むのだった。"
2482562584 = "夏。いつもとは違う一面。"
3649906930 = "いつもとは違う一面を見せられるから夏が好きだ、と話すシュンは、シュエリンの姿で先生の前に現れた。見た目相応にはしゃぐシュエリンと一緒にラフティングをしたり、商店街で食べ歩きをしたりする二人。ひとしきり遊んで休憩していると、急に秘薬の効果が切れてシュンに戻ってしまうのだった。"
2138405107 = "思い出の上書き"
2996173795 = "前日の失敗を挽回するため、改めてシュンの姿で同じスケジュールをこなしていく二人。見た目相応に大人びた振る舞いを見せるシュンに対して、今度は先生が幼児退行して甘え始める。我に返った二人は、すべてを夏のせいにするのだった。"
1177889008 = "水遊びの引率"
3092431370 = "シュンにお願いされて、梅花園の園児たちの引率をすることになった先生。訪れた先のウォーターパークで元気いっぱいな園児の面倒を見ていると、時間は瞬く間に過ぎていく。園児たちを帰して、引率としての務めを果たした後、シュンと先生は二人きりの時間を過ごすのだった。"
2037166503 = "美食研究会の日常（１）"
2983636062 = "ゲヘナの学生食堂を爆発させて、風紀委員会から逃げていた美食研究会。彼女たちは公園でトリュフを発見するが、追ってきた風紀委員会によって逮捕されてしまい、トリュフも没収されてしまう。"
2083342772 = "美食研究会の日常（２）"
1334832385 = "美食研究会の生徒たちは風紀委員会にトリュフを奪われ、留置場に入れられてしまう。別の理由で偶然同じ留置所に入れられていた先生は、美食研究会からトリュフを包んでいた下着を受け取ってしまったせいで、風紀委員長のヒナに誤解されてしまう。"
729409175 = "偏見なき味覚"
3942326675 = "ミレニアムのヴェリタスを訪ねた美食研究会一同。生徒たちはハレから各々の味覚がどういう状態なのかを調べてもらうことに。その結果、イズミの舌の感覚がかなりおかしいことが科学的に判明する。"
2115387183 = "給食部襲撃事件"
2992609245 = "美食研究会の生徒達は不味い給食について抗議するべく給食部を訪ねるが、そこで劣悪な実態を知る。美食研究会の生徒たちはそんな給食部を手伝うために奮闘するものの、結局はフウカの邪魔になってしまう。"
197817924 = "Cleaning&Clearing"
352914431 = "ミッションとあらばどんなことでもきちんと達成するものの、同時に被害もかなり大きいC&C。そんな彼女たちの元に、セミナーの会計担当であるユウカが訪れて注意をするのだが……？"
2026257102 = "Maid&Made（１）"
3467705269 = "商店街で発生した問題に対処するため、エージェントではなく本当のメイドとしての活動を要請されたC&C。そんなふざけたこと、と怒るネルだったが、時すでに遅くアスナが契約書にサインをしてしまっていたのだった。"
4112079221 = "Maid&Made（２）"
2175543816 = "色々ありつつもメイドカフェを開いたC&C一同だったが、それが予想外に大きな成功を収めることに。その結果を受けてユウカは、彼女たちに対し本格的にメイドにならないかと口にするのだが……。"
3585549647 = "会長はいつも正しい（１）"
1295817962 = "ある日シャーレへと向かったチェリノはその道中、モモフレンズのキャラクターである「ペロロ」の人気を目の当たりにする。それをきっかけにチェリノは閃き、マリナに対して『ペロロ』をレッドウィンター連邦学園に編入させるよう命令を下すのだった。"
3552803815 = "会長はいつも正しい（２）"
360090070 = "現実に存在しない『ペロロ』を編入させるため、マリナはノドカを誘拐して『ペロロ』の着ぐるみを身に着けるように迫る。マリナの過酷な拷問（？）の末、ノドカはペロロの真似をすることになったのだが……？"
1279819101 = "会長はいつも正しい（３）"
1812920356 = "マリナがチェリノに対して「ペロロ（の着ぐるみをかぶったノドカ）」を披露するものの、近くで見ると想像以上に変な見た目だとチェリノは失望。粛清命令を受けてしまうマリナとノドカだったが、いっそ粛清されるくらいならばと二人してクーデターに踏み切るのだった。"
4232821938 = "GUNS N' PEPPERS（１）"
3961351848 = "銃にチャバスコ噴射装置を取り付けたら面白いのではというとんでもないアイデアを思いついたエンジニア部の生徒たち。それは最高に無益なアイデアだなと口にしながら、直ちに製作に取り掛かる。"
2227297923 = "GUNS N' PEPPERS（２）"
306427386 = "エンジニア部は銃の改造に成功したものの、それがネルから預かっていたサブマシンガンであることに気づく。ネルに銃器の異変に気づかせないよう、コトリとヒビキがネルを尾行することに。"
3947244639 = "GUNS N' PEPPERS（３）"
323660726 = "コトリとヒビキはどうにか機転を利かせて、ネルが引き金に手を掛けないよう危機を回避していくが、ネルに恨みを持ったヘルメット団との戦闘に突入し、結局チャバスコ噴射装置の改造がバレてしまう。"
295379881 = "Trouble & Trackers（１）"
3812652621 = "身体検査の結果に納得がいかないマキは、ハレとコタマを説得し、学籍データが記録されたサーバーをハッキングすることに。"
1511095324 = "Trouble & Trackers（２）"
3761143871 = "コタマの傍受装置とハレのドローンを使って、学籍データのサーバーをハッキングすることに成功したマキ。自分の理想に合わせて記録を書き換えていたその時、誰かの手によってその上からさらにハッキングを受けてしまう。マキはとっさに身体検査のデータを別サーバーへと移すが、それは学内の公開SNSサーバーだった……。"
34701853 = "Trouble & Trackers（３）"
476829342 = "ヴェリタスの部員たちは謎のハッカーに対抗するものの、勝ちきれないと判断して逃げることに。その晩、彼女たちがセミナーから帰ってきたチヒロと話をしている途中、自分たちが戦っていた相手が目の前にいるヴェリタスの副部長だったことが判明する。"
120203470 = "給食部のドタバタ衛生管理評価（１）"
1383531332 = "ゲヘナ学園の学生食堂で行われる衛生管理の日。食中毒になってしまった調査員の代わりに風紀委員会のイオリが訪れ、美食研究会のイズミも乱入し、学食に暗雲が垂れ込める。"
516387156 = "給食部のドタバタ衛生管理評価（２）"
2522148702 = "厳しめなイオリのチェックだったが、給食部は無事に衛生管理の評価で満点をもらう。衛生面は問題ないと認められたはずだったのだが、その後ジュリの作ったオレンジジュース（？）を飲んだイオリが、食中毒で倒れてしまう。"
93471046 = "無人フロアの幽霊さん（１）"
1430687847 = "ボランティア活動で病院に来ていたハナエとセリナは、4階の無人フロアで幽霊が出るという噂を聞く。ハナエは患者たちの不安を和らげるため幽霊の正体を突き止めることを提案、2人は深夜の無人フロアへと向かう。"
2642060983 = "無人フロアの幽霊さん（２）"
2770525320 = "4階の無人フロアに出るという幽霊の正体は、どさくさに紛れて病院に潜入した泥棒だった。しかしハナエとセリナは気づかぬまま何とか除霊しようと銃を乱射し、大騒ぎになってしまう。"
2650108855 = "無人フロアの幽霊さん（３）"
3402866614 = "幽霊の正体を理解したハナエとセリナ。泥棒は二人が油断した隙をみて金庫を盗んで逃げようとするが、金庫だと思ったものは高圧滅菌機。無理に開けようとした結果、泥棒は爆発に巻き込まれて大怪我をし、そのまま入院することになってしまった。"
1957853520 = "正義実現委員会はお休みです（１）"
2774156226 = "誘拐されたトリニティの生徒の救出作戦に向かった正義実現委員会だったが、主にツルギの暴走によって、人質にもPTSDなどの被害を与えてしまう。その報告を受けたトリニティ総合学園の生徒会「ティーパーティー」のナギサは、正義実現委員会のメンバー達に対し、明日一日は他の部活やサークルの活動に参加するようにと命令する。"
1514304045 = "正義実現委員会はお休みです（２）"
2293307933 = "ティーパーティーの指示で他の部活動やサークルの活動に強制参加させられたマシロとハスミは、トリニティ総合学園特有の上品な雰囲気になかなか溶け込めず、なんとも居心地の悪い時間を過ごすことになった。一方ツルギは、放課後スイーツ部で和やかな（？）時間を過ごし、すごく楽しかったと告げる。"
2902345591 = "風紀委員会・週次定例"
3509381799 = "いつものように風紀委員会の定例会議を行うヒナとアコ。ゲヘナ学園で起きる様々な事件の報告は一向に終わる気配がなく、ヒナは辟易するのだった。"
1347893224 = "嵐を呼ぶ突発の会計監査"
111000390 = "ゲヘナ学園の生徒会「万魔殿」のマコトがいつものように難癖をつけ、突如風紀委員会に対して会計監査が行われることに。徹底的にいちゃもんを付けられ、予算案は原形を残さないほど書き換えられてしまう。あくまでこれは監査でただの提案に過ぎないと言うイロハを横目に、高らかに勝利宣言をするマコトだったが、事情を聞いたヒナが結局それらの難癖を物理的に吹き飛ばすのだった。"
1561190591 = "女子高校生の日常"
1753763599 = "限定のスイーツを求めて、カフェの前に集まる放課後スイーツ部の部員たち。先に到着したヨシミ、カズサ、アイリの三人はナツを待ちながらいつも通りの雑談をしていたのだが……？"
175952112 = "いつもの彼女たちの放課後"
1512342827 = "学園からの帰り道、連休を前にして各自の計画について話す放課後スイーツ部の部員たち。ナツがいつものように突飛な計画を口にし、その場では流されてしまうのだが、その日の夜ナツから連絡が来て……？"
2034339829 = "呼ばれた人は残ってください（１）"
2749895310 = "アヤネが探してきたアルバイトで、体育館のゴミ掃除をしに行くことになった対策委員会一同。しかし体育館に着いてみると急にチンピラたちに絡まれてしまい、交戦に発展する。"
857397530 = "呼ばれた人は残ってください（２）"
204891356 = "教室で他のメンバーを待っていたアヤネだったが、急に電話でバイトがまだ来ていないこと、それとは別に体育館を破壊した損害賠償が請求されることを聞かされる。とっさに謝ったセリカを除き、帰ってきた一同は弁解の余地もなくアヤネに怒られるのだった。"
888295171 = "不健全な事業計画"
635564897 = "知人からビジネスチャンスの話を聞いたアルは、便利屋のメンバーを率いてトリニティ地区の事業説明会を訪れる。しかしその実態は怪しいビジネスであり、無駄足を踏まされたアルは我慢できず他のメンバーと共に事業説明会の場を破壊してしまう。"
651331101 = "いざ、お祭り運営委員会定例会議！"
3714223389 = "次のお祭りの準備のため、会議を始めるシズコとフィーナ。しかしそこに修行部の部員たちが乱入してきて、会議はめちゃくちゃになってしまう。"
1192778156 = "もう一度！お祭り運営委員会定例会議！"
4080246389 = "休日、定例会議に集まったお祭り運営委員会のメンバー。次々とあがる滅茶苦茶な提案を却下するシズコ。そこでウミカが提案したのが「ヤナギ祭り」。その案はシズコの心を打ち、皆は直ちにお祭りの準備に取り掛かるのだった。"
2314201138 = "修行部の紹介動画を撮ろう！（１）"
2969367150 = "部活動紹介コンテストのため、修行部の紹介動画を撮ることにしたカエデ。先生のアドバイスに従い、カエデは実際に自分たちが活動をしている様子を動画に撮ることにする。"
117197848 = "修行部の紹介動画を撮ろう！（２）"
854960256 = "カエデは他の部員たちの様子を次々に動画に収めつつ修行（？）をしていくが、その途中で色々としでかしてしまったことが先輩たちにバレて、ツバキとミモリに怒られてしまうのだった。"
2764672385 = "夜は短し、走れよ乙女（１）"
3621891441 = "修行部の先輩であるツバキとミモリが、最近自分が寝た頃を見計らって夜な夜などこかに行っている……と、カエデから相談を受ける先生、ならびにお祭り運営委員会のシズコとフィーナ。シズコの提案を受け、それを曲解したカエデは先生と共に、先輩たちを尾行することに。"
2721538548 = "夜は短し、走れよ乙女（２）"
3839830930 = "ツバキとミモリの後をつけるカエデと先生。自分を置いて活動する先輩たちを見て、カエデは自分が要らない存在なのではないかと悲しい顔をするが……。"
3115018656 = "ゲームの道はマナーから（１）"
939693077 = "オンライン対戦型ゲームで、マナーのなってないユーザーから暴言を受けたモモイ。このままではいられないと憤慨し、モモイはゲーム開発部のメンバーと共にゲームセンターへと向かう。"
1262797320 = "ゲームの道はマナーから（２）"
3551104112 = "モモイに暴言を吐いたユーザーを発見したゲーム開発部一同。モモイが同じゲームで再度挑戦するも、バグ技を使用されてしまい敗北。またしても嘲笑されてしまうが、それを見たユズが代わりにプレイをして圧勝する。ユズが伝説のゲーマー「UZQueen」だと知った周囲の人々は、彼女の元へと殺到するのだった。"
1545900618 = "大人のオモチャ（１）"
2214419213 = "園児たちのための食材を受け取るために、玄武商会へと立ち寄ったココナ。そこで彼女はルミから、シュンが注文したらしい怪しい何かを手渡される。その正体についてルミは「大人のオモチャ」だと言って誤魔化すが、その言い回しが災いし、梅花園の内外へと噂が流れて……。"
4167014609 = "大人のオモチャ（２）"
3860611716 = "何やら周囲から避けられていると感じていたシュンは、先生との会話を通じて、自分が「大人のオモチャ」を買ったという噂が広まっていたことを知る。美容グッズを買ったことがなぜそんな噂になってしまったのかと呆れながらも怒りつつ、今もまだその噂を触れ回っている元凶のところへと向かうのだった。"
633382671 = "逮捕します！（１）"
497768125 = "いつもは基本的に平和な時間が流れている生活安全局。平和は良いことであっても、これでは自分が功績を挙げて警備局に転科する機会が無いと嘆くキリノ。そんな時、緊急出動命令が発令され、成果を狙うキリノと休暇を狙うフブキとが密かに出動するのだった。"
2582496763 = "逮捕します！（２）"
2972853045 = "警備局より先に現場へと到着したキリノとフブキだったが、人質も取られ、距離もそれなりにあったために苦戦してしまう。しかし特別休暇を狙うフブキが機転を利かせ、キリノと共に粉塵爆発を起こして状況を変えることに成功。これでそれぞれ転科と休暇を手に入れられるはずだと、意気揚々に局長の元へ向かうが……？"
1042018394 = "227号特別クラスの嘆願書（１）"
1592688240 = "ノドカとシグレは本校舎への復帰を目指し、知識解放戦線のメルに「嘆願書」の作成を依頼する。しかし彼女が書き上げた嘆願書は何だか怪しい内容で……？"
1372490489 = "227号特別クラスの嘆願書（２）"
360515789 = "メルの嘆願書が予想とは違う方向性だったため、他の部活に嘆願書の作成を依頼することになったノドカとシグレ。ところが他のどの部活に頼んでも、結果的に変な内容になってしまう。その後、たまたま通りすがった工務部のミノリがしっかりした嘆願書を書いてくれるものの、最終的にチェリノたちからは「不幸の手紙」と誤解され、嘆願書は燃やされてしまうのだった。"
677660195 = "そうして一堂に会して（１）"
1632709229 = "いつものように動画撮影を終えて、部室（？）に戻ってきたミチルとツクヨ。どうすればより良い忍者コンテンツを作れるのかと悩んでいた二人の元へ、予期せぬノックの音が飛び込む。"
3202154650 = "そうして一堂に会して（２）"
2201315182 = "忍術研究部に入りたいというイズナを見て、最初は警戒の気持ちを抱いてしまうふたり。しかしイズナの想いを聞いた二人は、同じような気持ちを持った仲間が増えたことに喜び、彼女の入部を歓迎する。忍術研究部は3人となり、あらためて始動していくのだった。"
3431406180 = "缶詰の残影（１）"
1074842512 = "ある日、RABBIT小隊は作戦中、偶然戦闘食糧を手に入れることになる。 食糧事情に苦しんでいたRABBIT小隊は喜び、戦闘食糧をキャンプに持ち込む。 だが、その日の夜、パトロールをしていたミユは海鮮ビビンソースの缶詰が一人で動くのを発見することになる。"
646029466 = "缶詰の残影（２）"
1292050028 = "ミユの悲鳴を聞いて戦闘食糧が保管されたテントに駆けつけたRABBIT小隊員たち。 しかし、小隊員たちは缶詰が動いたというミユの言葉を彼女が疲れたせいだと思って大したことではないと思っている。 その後、海鮮ビビンソースの缶詰は放置されたまま時間が経つことになる。"
2826916122 = "缶詰の残影（３）"
374786045 = "賞味期限に達すると、海鮮混ぜソースの缶詰はガスがいっぱいになって膨らみ、これをどのように処理するかをめぐってRABBIT小隊は悩んでいる。 結局爆発物処理教育を受けたサキが缶詰を処理することにしたが、他の小隊員たちの訓収が続くと彼女の集中力は乱れ…。… 結局、海鮮混ぜソースの缶詰は爆発してしまう。"
3706155076 = "価値の証明（１）"
4095209803 = "ミレニアムの予算審議会を開催したユウカとノアは、ミレニアム生が作った様々な発明品をどんどん審査していく。騒がしかった審議が一段落した頃、ユウカは謎の提案書を見つけ――"
3536363241 = "価値の証明（２）"
4250165067 = "その提案書はヒマリが設計した予知装置、未来観測機関「讖」の設計図だった。ユウカは不審に思いながらも、これを捨てるのはもったいない、と未来観測機関「讖」を自費で製作する事に――"
4016126250 = "価値の証明（３）"
3435047914 = "ついにヒマリが設計した未来観測機関「讖」を完成させたユウカとノア。しかし、それは未来予知とは程遠い、星座占いの機械で――ショックを受けたユウカは、最初から気づいていた様子のノアに不満をこぼすのだった。"
1319446577 = "和楽姫の特別な公演（１）"
2779163313 = "「百鬼夜行感謝祭」の公演を行うことになった陰陽部。チセは、「今回の公演は自分が準備する」と宣言し、カホの手伝いは無用だと断る。任せると決めたものの、そんなチセが心配なカホは、ニヤと共にこっそりチセを尾行することに。そうして買い物に向かったチセは、普段の公演とは違う備品を購入していくのだった。"
264656570 = "和楽姫の特別な公演（２）"
3433984452 = "そうして公演の当日。チセは普段とは違う、誰も予想できなかった公演を行う。カホとニヤはその光景に戸惑うも、公演は盛況のうちに終了する。そうして公演の最後の挨拶で、チセは今回使った小道具は全部ニヤやカホの好きなものに揃えてみたのだと告げる。いつもありがとう、これからもよろしくと笑うチセに対し、ニヤとカホは感激するのだった。"
4197282877 = "全力で振り抜いて（１）"
1927725544 = "ミレニアム野球部の4番バッター野正レイは、初ホームランを打つための方法を探すべく、トレーニング部を訪れる。"
4187971623 = "全力で振り抜いて（２）"
1058164580 = "スミレのトレーニング法にレイが疑問を抱き始めると、スミレは現場見学としてレイを野球観戦に連れて行くのだった。"
1160121368 = "全力で振り抜いて（３）"
1491957964 = "観戦を終えた後、トレーニングはホームランを打つための旅路の一つだという話をするスミレ。レイはそれを聞いてトレーニングを再開するのだった。"
296970736 = "山海経のちょっと特別な朝（１）"
1725509148 = "白虎公園でばんざい体操をしているキサキ。その姿を、レイジョとカグヤが目撃する。2人は興奮のあまり、勘違いをしてしまい……。"
2419347030 = "山海経のちょっと特別な朝（２）"
2827731487 = "先生と時間を過ごすキサキのところに、ココナがやってくる。今、山海経は「カンフー派」と「京劇派」に分かれ、熾烈な議論が繰り広げられているとのことだった。"
2670110927 = "山海経のちょっと特別な朝（３）"
4126214442 = "早朝、梅花園の園児たちと一緒にばんざい体操をしにやってきたキサキ。そこでレイジョを筆頭とする「カンフー派」と、カグヤを筆頭とする「京劇派」の対決を目撃する。キサキは2人を落ち着かせたあと、みんなで一緒にばんざい体操をすることになる。"
1051527092 = "雪見風呂"
2252517002 = "人里離れた場所で温泉を掘っている温泉開発部。メグとカスミは初めて会った時のことを思い出すのだった。"
3690331433 = "プレゼント？"
3902471118 = "風紀委員長のヒナと遭遇したメグ。メグはカスミから教わった通り、ヒナに何かの「プレゼント」を渡し……ヒナはそのプレゼントに目を細めて、カスミに「伝言」を残すのだった。"
2448188854 = "おかしなノスタルジー（１）"
667882399 = "激務が続く中、ナギサは燃え尽き症候群で倒れてしまう。それを見かねたミカとセイアは、山海経の紅茶専門店にナギサを連れていき、仕事を忘れてもらう「ナギちゃんリフレッシュ大作戦」を開始する――！"
3407756720 = "おかしなノスタルジー（２）"
912353483 = "セイアの運転するサイドカーで山海経へと向かった一行は、紅茶専門店に向かう。これでナギちゃんもリフレッシュ！かと思いきや、ナギサは朦朧とした状態で茶葉の入ったカゴに顔を突っ込むなど、その症状は悪化の一途を辿っていた……。"
2328055038 = "おかしなノスタルジー（３）"
835487577 = "元気のないナギサを、ミカとセイアは公園へと連れ出し、駄菓子をお供に思い出を語り合う。穏やかな時間を過ごす中で、「辛いことも、いつかは良い思い出になる」というありきたりだが大切な答えに辿り着き、ナギサは少し元気を取り戻す。ミカは、今度はプライベートビーチで長い休暇を過ごすのもいいかも……と思いつくのだった。"
1573223017 = "怪しい交流会（１）"
2145390660 = "万魔殿のマコトとイロハは、交流を深める名目でレッドウィンター連邦学園を訪れる。そうして会長のチェリノに会ったところで、本来の目的であったクーデターを実行しようとするも、計画は失敗に終わってしまう。さらに、クーデターが発覚したにも関わらず、気にも留めないチェリノの姿にマコトは圧倒されるのだった。"
3039169023 = "怪しい交流会（２）"
24636765 = "マコトのクーデターは失敗に終わり、何事もなかったかのように交流会は続いていく。今度は自分の権力をアピールするマコトだったが、またしても失敗してしまう。しかし、そんなマコトの心意気を気に入ったチェリノは、今回の交流会を記念して、ゲヘナに彫像を送るのだった。"
1994595059 = "テルマエ·アカエ（１）"
3322468669 = "入浴施設の改善を求めたクーデターが相次いだ事により、改善が急務だと感じたチェリノは、ノドカとシグレを呼び出し、他学園の入浴施設を見学するよう命じるのだった。"
1342885926 = "テルマエ·アカエ（２）"
3701930055 = "ノドカとシグレは、他校の入浴施設の状況を調査すべく、ゲヘナやトリニティ、百鬼夜行連合学院へと足を踏み入れるのだった。"
3227194453 = "テルマエ·アカエ（３）"
1818357385 = "どの学園の入浴施設も、レッドウィンターには合わないと感じた2人は、最後にミレニアムサイエンススクールの入浴施設を見学するのだった。"
1746358612 = "キララとエリカのキラキラな日（１）"
3054966868 = "キラキラでワクワクとした青春に胸を膨らませるキララ。そんなキララは、部活を始めることを決心するのだが……。"
1605797610 = "キララとエリカのキラキラな日（２）"
38972141 = "ゲヘナ学園の色んな部を見て回るキララとエリカ。しかし、どの部活もピンと来なかった結果、新しく部をつくるという結論に至る。"
2842972630 = "ハイランダー鉄道学園の運行日誌（１）"
3312844632 = "キヴォトス循環線内回りを運行するハイランダーの生徒。最初は順調に進んでいくものの、いくつかのトラブルが彼女たちを襲いかかり……彼女たちは懸命に対応するのだった。"
3052044810 = "ハイランダー鉄道学園の運行日誌（２）"
2036997224 = "列車の全車両からあらゆる事件が発生する。慌てるハイランダーの生徒たちは、乗務員としての責任を果たすべく尽力するのだった。"
265151180 = "主なきプレゼント（１）"
2868457916 = "今日もシャーレを訪れる多くの生徒。エンジェル24のソラは、先生が何かいかがわしい手で生徒たちを誘惑しているのではないかと疑念を抱く。その時、誰かの忘れ物を発見するのだった。"
940371248 = "主なきプレゼント（２）"
3815376917 = "忘れ物のことを公にしてしまえば大騒ぎになるであろうと予想するソラ。そんな彼女は、コンビニを訪れる生徒の様子を見て誰の落とし物なのかを探ろうとするのだった。"
3248565005 = "主なきプレゼント（３）"
681128818 = "結局、落とし主は見つからず、落ち込んでいるソラ。そんなソラに対し、ミヤコがローストターキーを差し入れてくれ、先生のことを教えてくれる。様々な生徒から先生への想いを聞いていたソラの元にその時、先生がコンビニを訪れ、預かっていた忘れ物がソラへのプレゼントであることを知るのだった。"
85980073 = "とある2月18日の記録"
3558670453 = "誕生日前日。パーティーの準備を進めていた風紀委員会と玄龍門は、ケーキの発注も済ませて後は到着を待つばかり。お祝いの準備は順調のように思われた。"
293758555 = "とある2月19日の記録（１）"
2972099243 = "配送ミスによって、注文とは異なるケーキが風紀委員会と玄龍門のもとに届いてしまう。調査や情報交換の結果、両者のケーキが入れ替わってしまっていることが発覚する。慌ただしく対応策を模索するなか、ミナは玄武商会に助けを求めた。"
2431797238 = "とある2月19日の記録（２）"
4292864679 = "ルミの助力によって、D.U.にあるカラオケでヒナとキサキの合同誕生日パーティーが開催された。誤配されたケーキを交換して、風紀委員会と玄龍門の用意したケーキが、正しい相手に手渡される。その後先生も合流し、期せずして行われた合同誕生日パーティーは賑やかに盛り上がるのだった。"
613757486 = "美食とクッキー、そして救護（１）"
2018951353 = "ある日のお昼時――お腹が空いた美食研究会は、フウカに昼食を作ってもらうべく捜索を開始する。行動パターンや僅かな足跡を解析してフウカを見つけるが、そこには救護騎士団の姿もあり――ハルナたちはフウカを巡ってミネと交戦することに。ミネの圧倒的救護により、一人、また一人と倒れていく美食研究会。戦闘後、ハルナがなぜフウカは救護騎士団と行動を共にしているのか質問をすると……。"
932048524 = "美食とクッキー、そして救護（２）"
3800725185 = "ミネの口から真相が明かされる。ミネは自分にまつわる物騒な噂を払拭するため、お手製のひよこ型のクッキーを配ろうと考えており、偶然出会ったフウカに助力を求めていたのだ。事情を聞いて、試食担当として名乗りを挙げる美食研究会。――買い出しから調理までフウカのサポートを受けたこともあり、ミネのクッキー作りは無事に成功し、ハルナたちも太鼓判を押す。これならみんな喜んでくれる……と盛り上がる救護騎士団だったが、その隙を突いて、美食研究会がフウカを縛り上げて逃走。怒りに燃えたミネは、美食研究会を凄まじい勢いで追いかけるのだった……。"
3665793023 = "出会いは突然に（１）"
4079696918 = "普段利用しているミレニアムのジムが修理中のため、とある別のジムを訪れたスミレ。彼女はそこで、かつてない肉体美を誇る生徒、アケミと遭遇する。プロテインを優雅に飲み、バーベルスクワットを軽くこなすアケミの姿に感嘆を禁じ得ないスミレは、隣で同じトレーニングメニューをこなそうと試みる。"
453049144 = "出会いは突然に（２）"
1591044501 = "アケミの常軌を逸したトレーニングについていく中、スミレは久方ぶりに「疲労感」を思いだし、充実感に満ちていた。終了後、スミレとアケミは自己紹介をし、またの再会を誓い合う。――そんな一件を振り返り、「自分とあの方が力を合わせれば、レイさんをより優れた野球選手に鍛えられる」と、レイに迫るスミレであった。"
1158681565 = "何にも縛られぬ者たち（１）"
3331210092 = "アラタのもとに届いた、魑魅一座の中でも本物だけが集うという「魑魅一座ナイト」の招待状。他の参加者に舐められるわけにはいかないと、アラタは自らにふさわしいお面を探すことに。"
4277289430 = "何にも縛られぬ者たち（２）"
2156611397 = "お面探しの道中、百花繚乱紛争調停委員会のナグサと鉢合わせし、思わず逃げ出したアラタ。その先で遭遇したのは、アラタが見たこともないお面をつけた生徒……ラブだった。"
10885650 = "何にも縛られぬ者たち（３）"
1104397844 = "「魑魅一座ナイト」にて魑魅一座のリーダーは百花繚乱への宣戦布告を呼びかけるが、アラタはその考えに疑問を持つ。そこにニヤの依頼を受けたイズナが計画を阻止しに現れ、会場は大混乱に。なんとかその場を脱したアラタは魑魅一座のあり方に思い悩むが、ヘルメットの持ち主であるラブから「普通に楽しんだら？」と言われ、その心境に変化が……。"
3455962407 = "されど寮監隊は走り続ける（１）"
871924267 = "ワイルドハントの検問所。厳格な校則に基づき、今日も生徒たちの持ち物が次々と没収されていく。しかし、ある生徒が他人の彫像を持ち込もうとしたことをきっかけに、騒動が勃発。他の生徒たちも便乗し、検問所は暴動状態に。 カオスと化した現場を前に、寮監隊員はただ空を飛ぶ鳩を見つめるのだった。"
2447067328 = "されど寮監隊は走り続ける（２）"
1005229153 = "疲れて寝ていた寮監隊員は、深夜の緊急招集で叩き起こされる。騒音源の「背景音楽部」は放置され、脱走を図る「自由外出部」を追跡するよう命じられるも、目的地を目前にして任務は「背景音楽部の逮捕」へと変更。二転三転する理不尽な命令に、ついに寮監隊員の不満が爆発する。"
3479531073 = "手動期の終り（１）"
2308546747 = "ミレニアムEXPOで見かけたスーパーコンピューターがレッドウィンターにもあると主張するチェリノ。作ってみせると返したマリナは、出版部と知識解放戦線、工務部に助けを求めるのだった。"
1024274588 = "手動期の終り（２）"
3417343473 = "なんとかチェリノの望むスーパーコンピューターもどきを作ることに成功した一行。しかし、それは人力のスーパーコンピューターもどきだった。"
3220445133 = "監原ミスズの憂鬱（１）"
3116018838 = "矯正局長であるミスズは、更生しやすい環境づくりのために心を砕きながら忙しい日々を過ごしていた。しかし束の間の休息を取っていた最中、脱走未遂が起きたと聞かされて思わず青ざめてしまう。"
2049297372 = "監原ミスズの憂鬱（２）"
448396540 = "脱走を企てた生徒との面談を行うミスズ。誕生日を祝って欲しかったと語る問題児に、ミスズはかねてより用意していたプレゼントを差し出す。そうして優しく諭す彼女の人柄に触れ、問題児は反省の意を示すのだった。しかし話をしている間、ミスズは脱獄事件を起こした「囚人」たちのことを思い返していた。"
1261954325 = "ON AIR：ゲヘナ（１）"
2043410218 = "キラキラが足りないと言って、キララがくすぶっていた。そこに折良く、ゲヘナの校内放送のMCをやってほしいとイロハが話を持ちかける。曰く、急に放送部長が辞任してしまい、なんとしても代役を探してくるようマコトに命じられたのだという。楽しそう！とキララは二つ返事で承諾し、エリカも賛同するのだった。"
2893444801 = "ON AIR：ゲヘナ（２）"
708317131 = "とんとん拍子に出演が決まり、キラキラ部による校内放送は順調に進行していた。しかし本番の最中、機材トラブルの影響で高周波の音が流れてしまう。それを慌てることなくエリカが即座に直して、無事に放送が再開される。評判も上々に、校内放送は成功裏に終わるのだった。"
3592692365 = "一人では咲かない雑草（1）"
950591110 = "普段の慰労として、アルの奢りで高級レストランを訪れた便利屋68のメンバー。そこで思いがけず、因縁の相手と再会する。"
1515344389 = "一人では咲かない雑草（2）"
39269449 = "在りし日のこと。ハルカがスケバンにいじめられていた。それを見かねて介入するアルたち。その場は収められたものの、アルは根本的にいじめを解決しようと決意する。情報収集の末、スケバンの裏に見えてきたのはリガトーニ・ファミリーの存在だった。"
3333789074 = "一人では咲かない雑草（3）"
3741869477 = "便利屋68とリガトーニ・ファミリーの戦闘が始まる。リガトーニが一般客を人質に取ったことで、それ以上の攻撃ができずアルとカヨコが捕らわれてしまう。隙をついて料理用の小型リフトで離脱するムツキとハルカ。かつて自分を救ってくれたアルのことを思い出し、ハルカは自分を奮い立たせるのだった。"
409183804 = "一人では咲かない雑草（4）"
2857688369 = "今度は自分がアルを救い出すと意気込むハルカ。マフィアに溶け込むべく、ムツキと共にスーツに着替えてビルに突入する。道中のマフィアをものともせず、破竹の勢いで駆け上がっていくハルカは、最上階でリガトーニと対峙する。ハルカは大立ち回りを演じ、アルとカヨコの救出に成功するのだった。"
2606844752 = "一人では咲かない雑草（5）"
2035383190 = "事件を解決した後、便利屋68はレストランに招待された。メニューの意味こそ分からないものの、間違いなく美味しい料理に舌鼓を打つ面々。その帰り道、かつてハルカが面倒を見ていた雑草がたくましく花を咲かせているのを発見する。便利屋一同は、その雑草を大切に育てようと誓うのだった。"
4115258558 = "薬屋の彷徨い（１）"
2861337959 = "ブラックマーケットを訪れていた先生はギャングに攫われてしまう。そんな先生を助け出したのは、偶然にも通りがかったカイだった。山海経における一件以来の身の上をかいつまんで説明したカイは、その足で居候先まで先生を連れていく。案内された先で、家主の老人は大病を患っていた。"
2018946506 = "薬屋の彷徨い（２）"
1752426576 = "老人を治そうと思えば治せるが、あえてやっていないというカイの言葉を受けて、治療をお願いする先生。代わりにカイのお願いを1つ聞く、という約束で取引が成立する。カイが調合した薬を飲むと、瞬く間に老人は元気を取り戻した。"
2538956798 = "薬屋の彷徨い（３）"
792075492 = "ブラックマーケットに来た目的を先生に尋ねたカイは、その回答に呆然とする。しかしそれが結果としてカイの興味を引くに至り、先生はカイと一緒にブラックマーケットを見て回ることになった。ブラックマーケットを視察していたところ、二人は家主の老人がギャングに囲まれている現場に出くわすのだった。"
257972076 = "薬屋の彷徨い（４）"
3746302841 = "ギャングと老人の言い争いがエスカレートするのを見かねて、カイが事態に介入する。カイは難なく場をおさめるが、「老人を救った」という自分の行動に強い違和感を覚えるのだった。"
3789536442 = "薬屋の彷徨い（５）"
4060686472 = "山海経での一件以来、カイは混乱の中にあった。その契機となったのは、先生にかけられた言葉だとカイは言う。「普通」が理解できないことに自覚的であるからこそ、カイは分からない何かが自分の内に芽生えたことに戸惑っているのだった。"
3249063630 = "薬屋の彷徨い（６）"
123379259 = "悩むカイに対して、「普通」を勉強してみようと提案する先生。しかし、誰しもにとって自然なことが、自分にとっては不自然なのだとカイは答える。それでも練習してみてほしいという先生の言葉を胸に、カイは普通と向き合う1歩を踏み出すのだった。"
3751726789 = "特別依頼"
3042602837 = "連邦生徒会の幹部であるモモカが、先生にキヴォトスで起きている種々の問題を解決してほしいと依頼する。"
1121493691 = "特別依頼・指名手配"
1628093047 = "連邦生徒会の幹部であるモモカが、先生に重犯罪を起こしたキヴォトスの指名手配犯たちを捕まえるよう頼む。"
2695514106 = "特別依頼・クレジット回収"
2359922886 = "生徒たちがそこで姿を消すと噂される、閉鎖されたテーマパーク「スランピア」について、モモカが説明をする。"
1519699111 = "特別依頼・拠点防衛"
3213115598 = "AIが暴走し制御できなくなった軍需工場について、モモカが説明をする。"
3377111283 = "合同戦術対抗戦"
3612062096 = "クロノスの記者であるマイが、合同戦術対抗戦を前に先生へインタビューをする。"
743398531 = "総力戦"
1077929972 = "連邦生徒会の幹部であるリンが、先生にキヴォトスのあちこちで起こっている奇怪な現象について説明する。"
1830280512 = "ビナー：違いを痛感する静観の理解者"
