538442205 = "プロローグ"
1449222839 = "シズコからお祭りの招待を受けた先生は、開催場所である百鬼夜行連合学院の自治区に向かう。その先で「イズナ」という名の少女と出逢い、彼女の夢の話を聞くことに。彼女は先生が夢を応援してくれたことを喜びながらも、「依頼」をこなさねばならないと告げて去っていってしまう。"
2868740167 = "百夜堂へようこそ"
3022400054 = "百鬼夜行の伝統的な喫茶店「百夜堂」に到着した先生は、お祭り運営委員会のシズコとフィーナから熱烈な歓迎を受ける。しかしその時、爆発音とともに「魑魅一座・路上流」が現れて……。"
2819599029 = "百鬼夜行の問題児たち"
3150946652 = "魑魅一座・路上流と戦闘していると、なぜかその中にはイズナの姿が。先生と同じくイズナもまた動揺を見せつつも、魑魅一座と共に撤退してしまう。商店街の会長とも相談しながら、シズコは先生の手を借りて他の部活に助けを求めることに。"
1397990433 = "陰陽部の電波系少女"
1863239733 = "魑魅一座の問題を解決するため、陰陽部の元を訪れた先生とシズコ。ただし部長は不在で、二人を迎えたのは電波系少女「チセ」だった。「修行部のところに行けば何とかなるかも」とアドバイスをもらった二人は、街に出た途端またしても魑魅一座の襲撃を受ける。"
1550527487 = "修行部の変わり者たち（１）"
2901698646 = "魑魅一座の数に押されつつあった先生とシズコの元に現れたのは、修行部の三人組。そして再びイズナも現れ、「先生を説得してみせる」とあらためて戦いを挑んでくる。"
2868330061 = "修行部の変わり者たち（２）"
1540547905 = "魑魅一座とイズナを無事に倒した一同だったが、捨て台詞を残して逃げられてしまった。このままではキリがないと判断したお祭り運営委員会と修行部は、魑魅一座とイズナを雇っている元凶を探すべく動き始める。"
2417194596 = "お祭りは開かれて"
1414862293 = "元凶を探し出すべく動き始めた一同だったが、お祭り運営委員会にも修行部にも唐突にやるべきことが舞い込んできて、フィーナと先生だけが残されてしまう。二人で魑魅一座を探そうとしたその時、かたぬき屋のところで騒ぎが起きて……？"
3322041533 = "お祭り、夢、そして……"
2820688883 = "先生はイズナと再会し、少しの間二人でお祭りを楽しむことに。雇い主のことを尋ねてみるが、やや迷いつつも忍びとしてそれはできないと言う。イズナが去った後、まるでタイミングを見計らっていたかのように、先生の元へ魑魅一座が現れて……。"
389931609 = "暴かれる陰謀とその先に"
464929464 = "イズナと魑魅一座の雇い主は、商店街の会長であるニャン天丸だった。お金目的でお祭りを台無しにしようと企み、その上「そのためにイズナのくだらないごっこ遊びを利用した」と言うニャン天丸に対して先生が反論したその時、全てを聞いていたイズナが先生を助けようとその場に乱入する。"
510483198 = "フィナーレまでもう少し！（１）"
1070874512 = "先生とイズナが追い込まれたその瞬間、現れたのはお祭り運営委員会と修行部の生徒たち。しかしそれすらも予測していたニャン天丸は、すでに街中の魑魅一座を呼び寄せており、一同はまたしても危機に……！？"
2874004235 = "フィナーレまでもう少し！（２）"
38247590 = "ニャン天丸の切り札が失敗に終わると、見切りをつけた魑魅一座は即座に逃げ出してしまう。白々しくも「水に流そうじゃないか」と言い出すニャン天丸に対し、怒髪天を衝いたシズコのパンチが炸裂するのだった。"
1143447829 = "少女の夢（１）"
2258871246 = "桜花祭のフィナーレを邪魔させないために、修行部はお祭りの裏で魑魅一座を追撃する。"
1547567664 = "少女の夢（２）"
