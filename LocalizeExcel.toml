1938729585 = "O Sensei, que invadiu o interior da Atra-Hasis, inicia a batalha pela ocupação da Arca, composta por quatro áreas."
2670665318 = "Primeira área externa (1)"
4103831752 = "O grupo chega ao motor dimensional da primeira área externa e enfrenta o 'Guardião Anônimo' diante do 'motor dimensional' e Shiroko."
1869140165 = "Primeira área externa (2)"
718897357 = "O Sensei derrota o motor dimensional da primeira área externa. Shiroko desaparece em um portal, e o Sensei avança para a próxima área."
142065983 = "Segunda área externa (1)"
552979162 = "O Sensei chega ao motor dimensional da segunda área externa. Shiroko aparece novamente, e o combate começa."
1552548637 = "Segunda área externa (2)"
1441383735 = "O grupo consegue destruir o motor dimensional da segunda área externa. Quando Shiroko está prestes a desaparecer, o Comitê de Contramedidas de Abydos chama por ela, mas a resposta é lenta…… Hoshino parece notar que algo está estranho com Shiroko –"
3357284552 = "Terceira área externa (1)"
2935213673 = "No motor dimensional da terceira área externa, o Sensei e o Comitê de Contramedidas de Abydos enfrentam Shiroko. No entanto, dizem que o sinal de Shiroko também foi encontrado em outro lugar –? O grupo luta novamente contra Shiroko, que retoma a atitude de combate."
1153672197 = "Terceira área externa (2)"
2270336526 = "O motor dimensional da terceira área externa é destruído, e Shiroko desaparece novamente. Yuuka, que conectou a comunicação hackeando a área central, anuncia que encontrou Shiroko na área central. Ao ouvir isso, o grupo se prepara para salvar Shiroko."
1599539974 = "Área central (1)"
233514433 = "O Sensei enfrenta o último motor dimensional e começa o combate."
2048501130 = "Área central (2)"
1622078419 = "O grupo finalmente consegue destruir todos os motores dimensionais e a sala de controle. E também consegue resgatar Shiroko na área central."
2774711706 = "Batalha decisiva contra o Precipitador"
2260445960 = "Após a 'Batalha pela ocupação da Arca de Atra-Hasis', o Sensei consegue se reunir com Shiroko. Agora, só falta voltar à superfície – mas não foi assim. Outra versão de Shiroko e o Guia do Colorido se interpõem. Será que conseguirão voltar à superfície em segurança?"
1889277103 = "Batalha decisiva contra o Precipitador (1)"
3545837120 = "Batalha decisiva contra o Precipitador (2)"
