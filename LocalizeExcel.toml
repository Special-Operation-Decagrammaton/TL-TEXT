2289114652 = "Super Momoi Tornado!"
4088623042 = "Diante de Momoi, que se deliciava com a vitória em um jogo de luta no fliperama, aparece o cliente. Ele a confunde com Neru e pede uma 'faxina' – Concluindo que, mesmo sendo um engano, 'qualquer um pode limpar', Momoi e o Clube de Desenvolvimento de Jogos vão até a mansão do cliente."
1237674640 = "Vamos começar a 'faxina'"
1506195559 = "Ao chegar na mansão, o grupo ouve do cliente, Douta, que a 'faxina' é, na verdade, uma tarefa de segurança. Segundo ele, uma 'Carta de Aviso do Ladrão da Misericórdia' chegou. Sem encontrar chance de recusar, a conversa avança."
84635995 = "Coração sem relógio"
4176362338 = "A 'Carta de Aviso do Ladrão da Misericórdia' – uma das Sete Prisioneiras famosa por roubar o que anuncia – era um enigma. O grupo se dedica a decifrar qual obra de arte o ladrão pretende roubar."
3651845091 = "Saudações, pyon"
3112171913 = "Além da tarefa de segurança, o Clube de Desenvolvimento de Jogos também é incumbido do trabalho de empregada. Cometem erros devido à inexperiência, mas são ajudados por Toki, que viera para uma investigação disfarçada. Quando a festa está tranquila, o 'Ladrão da Misericórdia' aparece como anunciado."
641300786 = "Depois de sol, nublado, alerta de ladrão (1)"
346595300 = "Toki e o 'Ladrão da Misericórdia' se enfrentam – e a batalha começa."
1938916768 = "Depois de sol, nublado, alerta de ladrão (2)"
2618230775 = "O Clube de Desenvolvimento de Jogos se junta, e quando estão prestes a capturar o 'Ladrão da Misericórdia', um tiro perdido acerta Midori, que tropeça. O 'Ladrão da Misericórdia' a salva e desaparece. Embora suspeitassem de sua ação, o grupo se reorganiza."
4214486051 = "Primeiro, vamos em frente"
2810244228 = "No segundo dia da tarefa de segurança, o grupo aumenta a vigilância para não falhar desta vez. O Sensei recebe uma voz misteriosa que lhe diz que foram enganados por Douta. Percebendo que não veem Douta desde o dia anterior, decidem decifrar o enigma novamente."
2608851286 = "Isso é um jogo perigoso (1)"
1080193779 = "O Clube de Desenvolvimento de Jogos descobre o local de um leilão secreto de Douta. Era um local social do submundo que negociava itens roubados – Douta envia robôs de segurança contra o Clube."
3706077377 = "Isso é um jogo perigoso (2)"
2305043594 = "Embora encurralem Douta, os reforços os colocam em desvantagem. Nesse momento, uma ajuda inesperada surge. É a própria emissora da 'Carta de Aviso', o 'Ladrão da Misericórdia'. Diante do Sensei que propõe uma aliança, o grupo começa a trocar informações."
3468612492 = "É apenas temporário, lembre-se bem disso"
3726366994 = "Toki pede que o Clube de Desenvolvimento de Jogos se retire, mas eles respondem que Toki também é amiga e querem terminar a tarefa juntos. Entendendo que estão decididos, Toki decide fazer uma aliança temporária com o 'Ladrão da Misericórdia' e começam a elaborar um plano."
2014548109 = "Transferência de propriedade (1)"
3648276839 = "Com o sinal do 'Ladrão da Misericórdia', o Clube de Desenvolvimento de Jogos e Toki começam a operação. Em seus olhos, há um pouco de confiança."
2610667190 = "Transferência de propriedade (2)"
1496006338 = "Como planejado, o Clube de Desenvolvimento de Jogos consegue assegurar a 'Coroa do Rei do Relógio' e capturar Douta. Naquele momento – o 'Ladrão da Misericórdia' rouba a coroa do grupo."
198039531 = "Prestem atenção. É uma cena importante (1)"
3349629814 = "O grupo não esconde a decepção com a traição do 'Ladrão da Misericórdia'. A aliança foi rompida por sua estética. Com sentimentos amargos, eles apontam as armas para recuperar a coroa."
701936984 = "Prestem atenção. É uma cena importante (2)"
2074113746 = "O grupo consegue recuperar a coroa. No entanto, o 'Ladrão da Misericórdia' escapa por pouco. Aproveitando a confusão, Douta foge, mas é capturado pela C&C de verdade, e a série de incidentes chega ao fim."
3393474672 = "Final feliz, para sempre!"
1914900203 = "Encontrando-se com a C&C, o grupo teme ser repreendido por Neru. No entanto, Neru diz 'bom trabalho', e o incidente tem um verdadeiro final feliz. Enquanto isso, Akira, o 'Ladrão da Misericórdia', digere lentamente as palavras do Sensei."
1780431255 = "Mesmo barco, mesmo dragão ~O futuro que imaginamos~"
2035835876 = "O Portão Xuanlong, que valoriza a tradição, e a Sociedade Comercial Genbu, que valoriza a evolução. Os dois, como duas grandes facções de Shanhaijing, existem sobre um frágil equilíbrio de poder. Nesse contexto, a Sociedade Comercial Genbu é falsamente acusada – Será que o grupo conseguirá superar essa crise?"
105833273 = "Recepção aos convidados"
3908032195 = "Iguarias de Shanhaijing"
1029944882 = "Primeira flecha, origem do dilúvio (1)"
934950936 = "Primeira flecha, origem do dilúvio (2)"
1102560672 = "Flecha afiada, pena de arco"
921130191 = "Encontrando o tigre, encontrando o lobo (1)"
2600560302 = "Encontrando o tigre, encontrando o lobo (2)"
4193384880 = "Levantar um, entender três"
3035053537 = "Coração vazio, mente aberta"
1299793663 = "Cavalo rápido, chicote rápido"
689011525 = "Quebrar o mal, manifestar o bem"
1637251735 = "Reformar o mal, retornar ao bem"
2524793568 = "Banquete completo"
1970524499 = "Recepção aos convidados"
2209149049 = "O Sensei, que trabalhava no Schale como sempre, recebe um convite especial de Rumi, presidente da Sociedade Comercial Genbu – e põe os pés em Shanhaijing."
3176729408 = "Iguarias de Shanhaijing"
2719359088 = "O Sensei é recebido por Rumi com uma refeição farta na Sociedade Comercial Genbu. Embora muito saborosa, a loja está vazia e deserta. Ao perguntar o motivo, a Sociedade Comercial Genbu foi falsamente acusada pelo Portão Xuanlong. O Sensei e Rumi decidem ir argumentar diretamente com o Portão Xuanlong."
1555531508 = "Primeira flecha, origem do dilúvio (1)"
3083141341 = "O Sensei visita o Portão Xuanlong para discutir a 'Controvérsia do Ginseng Milenar' que envolve a Sociedade Comercial Genbu. No entanto, é confrontado com um ginseng milenar em uma caixa da Sociedade Comercial Genbu, e fica sem saber o que fazer. Para limpar sua culpa, começam a procurar o verdadeiro culpado, mas membros do Portão Xuanlong se interpõem."
912183531 = "Primeira flecha, origem do dilúvio (2)"
4285669364 = "O grupo consegue expulsar os membros do Portão Xuanlong e avança para falar com alguém que conhece bem o ginseng milenar."
3704157144 = "Flecha afiada, pena de arco"
3667868691 = "Para obter informações sobre o ginseng milenar, o grupo visita Saya, do Clube de Estudos de Alquimia. Saya reluta em se envolver no conflito de Shanhaijing, mas ao saborear a comida de Rumi, deixa escapar um 'monólogo'."
3320570305 = "Encontrando o tigre, encontrando o lobo (1)"
3177457099 = "Baseando-se no 'monólogo' de Saya, o grupo chega às Montanhas Kunlun. Lá, encontram uma visitante inesperada."
372117891 = "Encontrando o tigre, encontrando o lobo (2)"
3546938718 = "Após lutar contra Mina, a diretora executiva do Portão Xuanlong, o grupo pergunta por que ela estava esperando ali. Segundo ela, sabia que o ginseng milenar só podia ser colhido em Kunlun e esperava que os culpados viessem para destruir as provas. Durante a conversa, chegam a uma pista do verdadeiro culpado."
499336354 = "Levantar um, entender três"
1674497975 = "O grupo finalmente percebe o panorama do caso do vazamento de ginseng milenar. Era um método que usava as crianças do Jardim Meihua, um local extraterritorial em Shanhaijing, como transportadoras. Ao ouvir as crianças no Jardim Meihua, o Sensei propõe um método para resolver o caso."
1613439579 = "Coração vazio, mente aberta"
1595560658 = "O grupo começa a agir para preparar uma 'armadilha' e resolver o caso. Rumi desabafa seus sentimentos com o Sensei e segue em frente. Uma sombra observa."
1896039253 = "Cavalo rápido, chicote rápido"
834551465 = "O intermediário do ginseng milenar que caiu na 'armadilha' era um suboficial do Portão Xuanlong. Diante do intermediário que confessa ter se envolvido no contrabando para arrecadar fundos para incriminar Mina, e ter incriminado a Sociedade Comercial Genbu, o grupo se une e pega em armas. Foi o momento em que os corações das alunas, pertencentes a organizações geralmente incompatíveis, se uniram."
3287427825 = "Quebrar o mal, manifestar o bem"
1843046059 = "O grupo vence a luta contra o intermediário. No entanto, eles também são apenas peões – e Saya, sentindo a presença da 'Sétima Prisioneira – O Macaco Cinco Poeiras', interroga o intermediário, mas não consegue chegar ao mandante. A Sociedade Comercial Genbu, tendo limpado sua honra, exige um pedido de desculpas de Mina."
977104468 = "Reformar o mal, retornar ao bem"
3026969621 = "Assim – o caso do vazamento de ginseng milenar que abalou Shanhaijing é resolvido. A Sociedade Comercial Genbu, recebendo um pedido formal de desculpas de Kisaki, é incumbida de preparar a comida para o banquete. Embora nem tudo esteja resolvido, o grupo aceita a tarefa com um sorriso, para dissipar as preocupações das outras alunas."
3857900118 = "Banquete completo"
229515679 = "Como diz o ditado 'depois da tempestade, a calmaria', a Sociedade Comercial Genbu e o Portão Xuanlong desfrutam de um banquete animado, como se preenchessem o fosso criado pelo 'Caso do Vazamento de Ginseng Milenar'."
40908383 = "Operação especial de verão! A Equipe RABBIT e o mistério do camarão desaparecido"
2721341247 = "Certo dia abafado de verão. Os membros da Equipe RABBIT, comendo bentô da conveniência como sempre, notam que o camarão desapareceu dos bentôs recentemente – decidem se disfarçar de turistas e se infiltrar em uma vila de pescadores para investigar o paradeiro do camarão. Será que a Equipe RABBIT conseguirá recuperar o camarão?"
2738681454 = "Camarão desaparecido"
58368520 = "Maiô fofo e vila sinistra"
1176265223 = "A sombra da Vila Notopa"
2322828772 = "Tabu"
3013262397 = "Os que vagam na escuridão"
473736447 = "Terror desconhecido"
1216354736 = "Céu claro após o nevoeiro"
170093504 = "Churrasco de madrugada (1)"
3995974815 = "Churrasco de madrugada (2)"
718466590 = "Sombra suspeita"
3337165522 = "Coelho subaquático"
1057642642 = "Limpeza do convés (1)"
2724919361 = "Limpeza do convés (2)"
405509144 = "Uma entrega!"
3924969069 = "Camarão desaparecido"
3736953745 = "Percebendo que o camarão desapareceu dos bentôs recentemente, a Equipe RABBIT, a sugestão do Sensei que trouxe sorvete, decide ir a uma vila de pescadores para investigar o paradeiro do camarão."
1943580014 = "Maiô fofo e vila sinistra"
184007341 = "Para investigar o mistério do camarão desaparecido, a Equipe RABBIT decide se infiltrar na Vila Notopa, disfarçando-se de turistas que vieram tomar banho de mar. Vestindo os maiôs que prepararam, entram na vila."
2581052701 = "A sombra da Vila Notopa"
2832724995 = "Ao visitar a vila, o grupo sente uma atmosfera de não ser muito bem-vindo, mas continua a investigação, ouvindo a palavra misteriosa 'O Profundo' em vários lugares."
309044331 = "Tabu"
2200941612 = "Não obtendo grandes resultados nas investigações, o grupo discute suas descobertas. Uma sombra misteriosa aparece e conta sobre um ritual e um boato."
2989058466 = "Os que vagam na escuridão"
723669717 = "A Equipe RABBIT decide realizar uma operação noturna para verificar com seus próprios olhos os boatos misteriosos da Vila Notopa."
1997896967 = "Terror desconhecido"
284854068 = "O confronto entre a Equipe RABBIT e os pescadores da Vila Notopa é interrompido pelo grito do Sensei. O que os membros veem é a fábrica de kusaya (peixe seco fermentado), produto especial da vila – percebem que estavam julgando as coisas com preconceito."
4197412946 = "Céu claro após o nevoeiro"
4182046529 = "Após o amanhecer e o fim da confusão – a Equipe RABBIT ajuda os moradores da vila de suas próprias maneiras."
3388148430 = "Churrasco de madrugada (1)"
3365586462 = "Miyu é solicitada por um pescador a ensinar pesca. A Equipe RABBIT, que se divertia pescando, aproveita um churrasco com os moradores que trouxeram frutos do mar."
2519986036 = "Churrasco de madrugada (2)"
2505877297 = "Enquanto isso, uma silhueta suspeita sobre o mar observa a Equipe RABBIT e os moradores."
1139930313 = "Sombra suspeita"
1328182877 = "No dia seguinte, o pescador encontra um navio estranho perto dos recifes Oni. Os moradores temem, dizendo que pode ser o 'Navio do Retorno', usado quando 'O Profundo' das lendas desembarca. No entanto, a Equipe RABBIT percebe algo estranho no navio –"
1869164534 = "Coelho subaquático"
2573209587 = "Para descobrir a verdadeira identidade do 'Navio do Retorno', a Equipe RABBIT vai ao mar."
4044326055 = "Limpeza do convés (1)"
893178531 = "O navio que estava no mar não era um navio lendário, mas uma barcaça de uma empresa de navegação. Descobre-se que a empresa de navegação estava envolvida no contrabando de camarão, e a Equipe RABBIT decide subjugá-los em nome da SRT."
3149322458 = "Limpeza do convés (2)"
3604726031 = "Diante da Equipe RABBIT, os marinheiros contratados pela empresa de navegação são derrotados…… O grupo deixa o destino deles para os moradores."
491370350 = "Uma entrega!"
574290976 = "Após a série de incidentes, a distribuição do camarão se normaliza – a Vila Notopa se transforma de uma vila de mau agouro em um movimentado destino turístico. Os membros da Equipe RABBIT, de volta ao Parque dos Coelhinhos, recebem uma entrega da Vila Notopa."
1186506094 = "Em busca do legado escondido ~Atividade extracurricular em Trinity~"
387596842 = "A pedido de Sakurako, Ui, que deveria investigar as ruínas descobertas pela Irmandade, vai com Hinata, Hanako e Koharu, vestidas de maiô, para uma ilha deserta no litoral de Trinity. Parece ser um lugar que a Seita dos Santos costumava usar…… Será que conseguirão terminar a investigação das ruínas com sucesso?"
343249441 = "Sequestro"
1955848092 = "Civil A comum que passava"
1265169502 = "É maiô ♡"
3549532882 = "Ponto de investigação A 'Labirinto de pedra' (1)"
1533877746 = "Ponto de investigação A 'Labirinto de pedra' (2)"
363275385 = "Ponto de investigação B 'Ruínas subterrâneas' (1)"
3363593113 = "Ponto de investigação B 'Ruínas subterrâneas' (2)"
2224404829 = "Ponto de investigação C 'Pomar de limões'"
2703966220 = "Ponto de investigação D 'Farol esquecido' (1)"
1303896708 = "Ponto de investigação D 'Farol esquecido' (2)"
1460650320 = "Por que limão"
3779604569 = "Ponto de investigação E 'Caverna atrás da cachoeira'"
4038659296 = "Segredo adormecido na ilha (1)"
3618921997 = "Segredo adormecido na ilha (2)"
72390938 = "Mudança de sentimentos"
2135885884 = "Sequestro"
2225204274 = "Ui é chamada a uma sala isolada, onde se encontra com Sakurako."
2744900070 = "Civil A comum que passava"
1729423655 = "Sakurako, que quer a ajuda de Ui, com seu profundo conhecimento, para investigar as ruínas descobertas pela Irmandade, diz a Ui, que tenta recusar, que sabe que ela copiou as escrituras. Ui, perturbada, não ouve…… Com a mediação de Hanako, a investigação das ruínas é decidida."
1096816524 = "É maiô ♡"
3742480354 = "O grupo chega a uma ilha deserta no litoral de Trinity descoberta pela Irmandade, troca de roupa para os maiôs e começa a investigação."
3187959349 = "Ponto de investigação A 'Labirinto de pedra' (1)"
617928650 = "O grupo começa a investigação a sério. Pelos padrões de pedra deixados nas ruínas, descobrem que era um local usado pela Seita dos Santos. Enquanto investigam as ruínas complexas como um labirinto, encontram as mimeses da Seita dos Santos e a luta começa."
811018523 = "Ponto de investigação A 'Labirinto de pedra' (2)"
994270627 = "Embora tenham repelido as mimeses, o Sensei carrega Koharu, que está impossibilitada de se mover, e consegue se reunir com os outros membros."
3219351181 = "Ponto de investigação B 'Ruínas subterrâneas' (1)"
2491485373 = "O grupo se divide para investigar as ruínas subterrâneas. Enquanto Ui e o Sensei progridem, ela desabafa sobre seus sentimentos. Nesse momento, um ruído estranho ecoa, e a Seita dos Santos aparece diante dos dois."
29917006 = "Ponto de investigação B 'Ruínas subterrâneas' (2)"
1927635005 = "O grupo sai das ruínas subterrâneas lutando contra a Seita dos Santos. Diante das mimeses que atacam uma após a outra, o lançador de granadas de Hinata dispara e destrói as ruínas."
3429673932 = "Ponto de investigação C 'Pomar de limões'"
630214868 = "Enquanto investigam o pomar de limões, o Sensei se junta a Hanako. Quando pergunta por que ela veio investigar as ruínas, Hanako revela o que normalmente não conta."
259971216 = "Ponto de investigação D 'Farol esquecido' (1)"
963289912 = "O grupo decide investigar o farol. Enquanto tira os pertences do quarto bagunçado com Hinata, a Seita dos Santos ataca. Não querendo atrapalhar a investigação, Hinata decide enfrentá-los com o Sensei."
2305782904 = "Ponto de investigação D 'Farol esquecido' (2)"
904241480 = "Hinata consegue derrotar a Seita dos Santos, e o grupo, que ouviu o barulho, aparece. Percebendo a intenção de Hinata em esconder, todos voltam a investigar o farol."
942293947 = "Por que limão"
3925545059 = "Ui, que estava resumindo os resultados da investigação, pensa sobre por que cultivavam limões especificamente naquela ilha e aproxima o fogo do mapa. Um novo ponto de investigação aparece, e o grupo decide ir até lá."
3449666276 = "Ponto de investigação E 'Caverna atrás da cachoeira'"
6041660 = "O novo ponto de investigação era uma caverna escondida atrás da cachoeira…… Quando encontram uma caixa de madeira no fundo da caverna, a Seita dos Santos se interpõe."
1858743142 = "Segredo adormecido na ilha (1)"
479171161 = "O grupo foge da Seita dos Santos a custo. No momento em que Ui está prestes a revelar o segredo da ilha e o conteúdo da caixa, Hinata encontra uma nova caixa em um buraco no chão. Quando Hinata estende a mão para a caixa, inúmeras mimeses se interpõem."
2777555982 = "Segredo adormecido na ilha (2)"
3252455481 = "O grupo derrota a Seita dos Santos e protege a caixa. No entanto, a caixa estava vazia. Concluem que toda a ilha era usada pela Seita dos Santos para treinamento, e que esta caixa era uma cápsula do tempo. Ui faz um pedido ao grupo."
368837813 = "Mudança de sentimentos"
3409394003 = "O pedido de Ui era não divulgar a existência da cápsula do tempo, mas deixá-la ali com o mapa e outros artefatos. Hanako e o Sensei contam a Sakurako parte dos resultados da investigação, e a investigação das ruínas chega ao fim. Diante do grupo que cooperou, Ui, com uma expressão complexa, serve um café americano com gelo."
2707730920 = "História de um mangá ~O final que as duas buscam~"
422721858 = "Existe o lendário mangá 'Luna', cujo último volume, de tiragem limitada, seria o encerramento. Mel, da Frente de Libertação do Conhecimento, se levanta para encontrar esse último volume. Será que Mel conseguirá encontrá-lo?"
2060432021 = "Um certo dia na Frente de Libertação do Conhecimento"
1623216963 = "Declaração de greve"
2380725657 = "Último volume"
1645182951 = "Publicação, reimpressão e distribuição"
3531343350 = "Reunião secreta"
1157847763 = "Todo mundo tem um segredo"
1019337302 = "Metade completa"
3974293526 = "Engrenagem"
229683704 = "Encontro frente a frente"
3141284228 = "Proposta da secretaria"
2444424193 = "Proposta do Departamento de Obras"
2235448593 = "Negociação especial (1)"
642695042 = "Negociação especial (2)"
2653817472 = "Um dia comum em Red Winter (1)"
960975359 = "Um dia comum em Red Winter (2)"
3209912447 = "Um certo dia na Frente de Libertação do Conhecimento"
2520485061 = "A Frente de Libertação do Conhecimento, fazendo uma grande limpeza na biblioteca da Federação Escolar Red Winter, encontra o famoso mangá 'Luna', que fez sucesso em sua época. No entanto, as opiniões sobre a obra são completamente diferentes…… e isso leva a uma grande briga."
720773574 = "Declaração de greve"
2640338098 = "O Sensei consulta Mel sobre Momiji ter saído de casa após a briga. Mel decide procurar o último volume de 'Luna' como presente de reconciliação, não apenas um pedido de desculpas verbal."
392147764 = "Último volume"
2594803507 = "Mel e as outras procuram o último volume de 'Luna', mas não o encontram. Takane, do Departamento de Publicações da Federação Escolar Red Winter, aparece. Takane diz que a pista do último volume de 'Luna' está no Departamento de Publicações e as encaminha."
3663799006 = "Publicação, reimpressão e distribuição"
298813709 = "Com base nas dicas de Takane, o Sensei e Mel vão ao Departamento de Publicações. Lá, perguntam a Yakumo, a presidente, sobre informações do último volume de 'Luna'. No entanto, ela reluta em dar informações de graça. Após negociação, Mel aceita um acordo."
3362804913 = "Reunião secreta"
2411994088 = "O Sensei e Mel chegam ao local onde supostamente está o último volume de 'Luna'. No entanto, há vários 'últimos volumes' de 'Luna' com diferentes desfechos…… Confusos, os dois leem vários. Parece mais uma feira de doujinshi. Uma certa pessoa se interpõe."
1879649220 = "Todo mundo tem um segredo"
189383727 = "No final, o último volume de 'Luna' não existia. Todos os volumes dos boatos eram criações de fãs. Takane diz que basta pegar a doujinshi mais popular, mas Mel decide desenhar sua própria interpretação do último volume de 'Luna'."
2417107819 = "Metade completa"
3852138862 = "Takane, surpresa com a declaração de Mel de que fará uma doujinshi, diz que ela pode participar de uma feira somente de 'Luna' que acontecerá em 4 dias, com sua nova publicação. Dizendo que não adianta fazer algo pela metade, Mel aceita e começa uma maratona de desenho."
3860894640 = "Engrenagem"
1197843780 = "Após vários dias de noites em claro, Mel desmaia. O Sensei a deixa descansar. Nesse momento, recebe uma ligação de Momiji –"
3821762781 = "Encontro frente a frente"
4010090300 = "Com a mediação do Sensei, Mel e Momiji se reencontram mais cedo do que o planejado. Pedem desculpas por terem dito coisas terríveis e se reconciliam. Embora não precisasse mais desenhar a doujinshi, Mel sorri, dizendo que vai se empenhar até o fim."
3696580091 = "Proposta da secretaria"
3919086823 = "Na manhã do evento, o grupo, terminando a doujinshi no limite, corre para o Departamento de Publicações para imprimir. No entanto, uma sombra sinistra se interpõe."
2443904406 = "Proposta do Departamento de Obras"
1377786849 = "Depois de afastar a secretaria, uma sombra sinistra se interpõe novamente."
3740420419 = "Negociação especial (1)"
786268020 = "Depois de afastar o Departamento de Obras, uma sombra sinistra se interpõe mais uma vez."
1754041631 = "Negociação especial (2)"
834176443 = "Superando várias interferências, o grupo finalmente chega ao Departamento de Publicações. Quando Takane vai ler a doujinshi de Mel, Yakumo interrompe."
3222170929 = "Um dia comum em Red Winter (1)"
2976716705 = "Yakumo tenta tomar o manuscrito de Mel para fazer um filme dessa série de eventos no Departamento de Publicações. Era parte do acordo para obter informações sobre o último volume. Mel recusa, e Yakumo chama Marina, da Secretaria de Red Winter."
1466984691 = "Um dia comum em Red Winter (2)"
4127469638 = "Takane critica a doujinshi de Mel. Raramente, ela elogia Mel. Assim, a confusão chega ao fim, e todos voltam à rotina."
3949906024 = "Trip-Trap-Train"
1291082049 = "No caminho para entregar um artefato a Trinity, Ichika e o Sensei percebem que o trem de carga que despacharam está indo para o destino errado. Ao entrar apressadamente, encontram criminosos procurados de Gehenna…… Será que conseguirão levar o artefato de volta a Trinity?"
