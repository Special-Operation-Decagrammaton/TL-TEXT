1881991320 = "227号特別クラスのとある一日"
3129722182 = "ある寒い冬の日、焚火の薪を求めて木の柱を引き抜こうとしていたノドカとシグレ。彼女たちがいざ引き抜いてみると、何とその下からは温泉が！そこにゲヘナの温泉開発部が現れ、突然旧校舎の周辺一帯を温泉郷へと変えてしまうのだった。"
124314717 = "無許可でなんて聞いてない"
590648767 = "先生がレッドウィンターを訪れると、いつものように居眠りをしているチェリノに遭遇。その後の会話の中で、チェリノが知らない間にレッドウィンターで温泉ができていたことが判明する。自分はそんなこと聞いてないと憤慨したチェリノは、新しい戦車と共に旧校舎へと向かうのだった。"
1823415428 = "227号温泉郷へようこそ！"
2338205529 = "旧校舎へと到着したチェリノたち一行は、完全に姿を変えた「227号温泉郷」を前にして驚きの表情を見せる。その温泉郷の女将になっていたノドカとシグレは、温泉まんじゅうなどでレッドウィンター事務局の一同を懐柔。その後ノドカは先生を特別に、専用の温泉へと案内するのだった。"
488046043 = "怪しい視線"
1111671300 = "温泉を楽しんでいた先生だったが、どこかから声が聞こえてくる。その正体は知識解放戦線の「メル」。彼女は同人誌のネタを探すため、この温泉郷を訪れたのだという。メルは遅れて登場したノドカと言い争いになり、温泉に浸かった先生の前で戦闘へと突入するのだった。"
2551825690 = "怪しい取引"
2970020116 = "戦闘に敗北したメルだったが、ノドカに「誠意」を見せることで何とか和解。先生はそのままノドカに背中を押されるようにして、庭園へと向かうのだった。"
2115498113 = "工務部に仕事を！"
299148182 = "庭園へと向かう途中、ノドカと先生は工務部の生徒たちと遭遇。彼女たち曰く自分たちを差し置いて、外部の生徒の手によってレッドウィンターの名物が建設されたことでプライドが傷ついた、そのことに対して抗議をしているのだとのこと。ノドカが何とか説得しようとするも取り合ってもらえず、戦闘へと突入する。"
2575633767 = "工務部にモルスを！"
27949908 = "戦闘後、それでもお互いに倒れないノドカとミノリ。そこへシグレが温かいモルスを持ってくる。その味と温かさに工務部は喜び、そのままシグレの提案に乗る形で、彼女たち工務部は温泉の中へと突入していくのだった。"
3696228207 = "とある風紀委員のふゆやすみっ！？"
4153367937 = "先生が休憩室へと向かうと、そこには何とゲヘナ風紀委員会のチナツが。マッサージチェアを享受していた彼女だったがどうやら任務として来ているようで、温泉開発部に関する警告を残し、そのままどこかへと行ってしまうのだった。"
1351623494 = "温泉開発部の陰謀"
1967122534 = "先生が周囲を散策していると、浴衣姿の寒そうなチェリノと遭遇する。227号温泉郷の魅力に取りつかれたチェリノは、この温泉郷を建てたゲヘナ温泉開発部をどうにかレッドウィンターに編入させようと考えていた。ちょうど通りかかった温泉開発部に自分への忠誠を誓わせるため、勲章を授与しようとするチェリノだったが、どうやら効果は無い様子。その後、彼女たちとの会話の中で判明した「レッドウィンター自治区全域爆破」の計画を阻止するため、チェリノたちと温泉開発部が衝突する。"
3915830261 = "撤去だ、撤去！"
242528877 = "無事に温泉開発部の陰謀を阻止したチェリノたちだったが、そこへ偶然現れたノドカは「このままだと227号温泉郷は廃業」という事実を受け入れられない。抵抗するノドカは工務部たちをその場で雇い、チェリノたちとの戦闘へと突入する。"
2923230343 = "変わらないもの"
3703937299 = "「粛清君1号」の前に敗れてしまったノドカと工務部一同。悲嘆に暮れるノドカは元々全部終わりだったんだ、と涙を流す。そんな彼女の元に寄り添い、何も終わってないよと優しく口にするシグレ。そしてチェリノもまた建物を残すという判断をし、全てが丸く収まりつつあったその時、温泉開発部が登場する。カスミ部長が用意していたというプランに従い、227号温泉郷は吹き飛ばされ――"
4161771854 = "レッドウィンター連邦学園のとある一日"
2833699108 = "派手に爆破されてしまった227号温泉郷。その殺風景な様子に心を痛めるノドカだったが、先生を含めみんなが無事だったから大丈夫と口にする。その後、爆風で汚れた身体を洗うため、レッドウィンターの一同は唯一消し飛ばされずに残っていた露天風呂へと向かう。みんなでわいわいと騒がしく温泉に入り、各々が未来のことを口にするのだった。"
1633221653 = "新春狂想曲第68番"
2815513763 = "新たな年を迎えたキヴォトス。年明け早々「願い事が叶う場所」として有名な場所へ向かった便利屋68は、そこで何と賽銭泥棒に遭遇！果たして彼女たちの願いの行方は……！？"
