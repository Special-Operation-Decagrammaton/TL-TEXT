2425389763 = "Miragem do meio-dia"
1157145156 = "Em dias quentes, onde a miragem sobe, tome cuidado com atividades ao ar livre! Mesmo que veja um \"espantalho branco\" no meio da estrada, nunca olhe fixamente para ele."
2479362182 = "Torce-torce"
1142156609 = "Entre o super-humano e a raposa"
