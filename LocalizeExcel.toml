312817216 = "Vitória Tática 2 (Shunzinha)"
3134481129 = "Um Certo Dia de Verão"
3141468330 = "O dano recebido pelo Gregorio vai variar de acordo com o número de debuffs aplicados nele.\nVocê pode checar quantos debuffs ele tem conferindo os ícones à direita da barra de HP.\nSe atacá-lo quando os ícones estiverem verdes, você vai causar um dano brutal!"
