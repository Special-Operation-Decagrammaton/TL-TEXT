1985025284 = "夏の海と少女たち"
3057305999 = "初めての海へとアズサを連れていくため、クルセイダー戦車を盗んだヒフミだったが、アズサ共々正義実現委員会によって捕まえられてしまう。時を同じくしてちょうどハスミは、ツルギとマシロに夏季休暇を取ってもらおうと考えており、結果として彼女たちは不思議なメンバー構成で海へと向かうことになるのだった。"
3787320337 = "夏の海辺とお邪魔虫（１）"
2130123045 = "ハスミから受け取ったリストに従いまずは砂のお城を作るヒフミだったが、完成した直後、乱入してきたスケバンたちによって破壊されてしまう。それに激昂したツルギとアズサが銃を構え、戦闘へと突入することに。"
417190438 = "夏の海辺とお邪魔虫（２）"
1931866986 = "一同はスケバンたちを追い払うことに成功。落ち着いたツルギは自分のしたことに一瞬息を呑むが……。"
1754061547 = "砂のお城と砂風呂と（１）"
1969422910 = "あらためて砂のお城を作り始める一同。しかし戻ってきたヒフミの目の前に建っていたのは、あまりにも巨大な砂の城だった。得意げなマシロとアズサが意気投合しつつ、そこに再びスケバンたちが現れる。"
4123624755 = "砂のお城と砂風呂と（２）"
1461186790 = "砂のお城は崩れてしまったものの、無事にスケバンたちを追い払うことに成功。これで良いのかなと苦笑するヒフミだったが、まずは一つ目の項目をクリアできたのだった。"
2757710025 = "泳ぎを習得する（１）"
2632002684 = "「泳ぎを習得する」というミッションだったが、聞いてみたところどうやら全員がそれなりに泳げる模様。取り合えず先生が教える役で、誰かふりでも良いので……という話になった途端、ヒフミを除く全員が泳げないふりを始める。中でも迫真の演技を見せたツルギを狙って、またしてもスケバンたちが登場するのだった。"
3383988665 = "泳ぎを習得する（２）"
3869586745 = "スケバンたちを無事追い払うことに成功。戦闘が続く中で「なるほど、これが海か」と口にするアズサに対して、ヒフミは力無く首を横に振るのだった。"
3813254294 = "海の家（１）"
1603143310 = "海の家に入ると、そこにいたのはゲヘナの美食研究会の一員であるイズミだった。奇怪な名前のメニューを頼もうとしたその時、すでに被害を受けていたスケバンたちが復讐に乗り込んでくる。"
546646916 = "海の家（２）"
546040871 = "スケバンたちを追い払い、イズミから感謝の印として飲み物を受け取る一同。しかしその灰色の飲み物は……。"
3106530382 = "スイカ割り（１）"
325718512 = "スイカ割り（？）を始めた一同の元に、再びイズミが登場。「食べ物で遊んではいけない」というある意味真っ当な理屈を述べられ、やむを得ず対立することに。"
261331744 = "スイカ割り（２）"
859947442 = "イズミに打ち勝った一同だったが、どことなく虚しさが残る結果に。スイカ割りに使ったスイカは、きちんと全員で美味しくいただくことにした。"
253070993 = "ビーチバレー"
1254394396 = "相次ぐ戦闘にやや疲弊状態のヒフミ。これで良かったのかなとつぶやく彼女のもとに、もう何度目かのスケバンたちが現れる。"
9561168 = "花火"
1121511268 = "日も暮れ始めた頃、一同は花火を始めることに。スケバンたちがいる方角からも花火が上がり、つかの間の輝く世界を見つめる一同。しかし、なぜか途中から勝負かのように花火の派手さを競い始め、最終的にはナパーム弾まで飛び交い始めるのだった。"
1431627967 = "夏空のウィッシュリスト"
4093852275 = "片付けを終えて、トリニティへと戻った一同。先生から写真を受け取り、願いが叶ったハスミは満足そうに微笑むのだった。"
1444096591 = "夢は違えど寄り添って"
989281264 = "海に来てまず一つ目のミッションを終えた段階で、先生はツルギに感想をインタビューしてみることに。すごく前向きな感想を貰い、続けてヒフミにインタビューしてみると、笑っているはずのその表情はどこか虚ろで……？"
4067085274 = "完全無欠な砂の城？"
332141174 = "砂のお城は崩れてしまったものの、アズサとマシロは意気投合。彼女たちはセメントと鉄筋を用いて、再度砂のお城（？）を建て始める。"
2105082698 = "騙し騙され埋められて"
1517924368 = "今度はスケバンにインタビューをしてみることに。何だかんだで話をしてくれたものの、少しずつ目には涙が浮かび始め……。"
493225528 = "彼女が店主をする理由"
2407947200 = "海の家で料理を味わっていたイズミだったが、ジュリの特製ソースを提供してしまったために、店主が意識を失ってしまう。彼女は店主の代わりに、お店を守ることを心に誓うのだった。"
893343669 = "狙撃手の矜持"
3383085495 = "スケバンたちの乱入があったため、結果としてアズサとマシロの「スイカ割り」という名の狙撃合戦は中断となり、安堵するヒフミ。しかしスイカを食べている最中、イズミがその話を再燃させてしまい……。"
4288507338 = "ある種のエクストリームスポーツ"
3926702143 = "人数合わせのため、スケバンたちにもビーチバレーに参加してもらうことに。しかしツルギの凄まじいサーブが炸裂し、一方的な蹂躙が始まってしまうのだった。"
3741808581 = "空に願いを"
4233111286 = "ミレニアムで作られ、ここまで流れ着いたナパーム弾。彼女（？）はスケバンたちに引き取られ……。"
2629323522 = "ツルギとヒフミに、砂のお城についてのインタビューをしてみることに。"
1640955265 = "意気投合したアズサとマシロは、もっともっと強固な砂のお城を作ろうとして……？"
1039912979 = "今度はスケバンたちの方にインタビューをしてみることに。"
263742558 = "ヒフミたち一同が到着する少し前、海の家に訪れたイズミだったが……。"
1769899179 = "アズサとマシロ、彼女たちの戦いはまだ終わっていなかった。"
2973955910 = "スケバンたちも誘って、ビーチバレーを始めよう！"
3600215572 = "それは存在しない呟き。ミレニアムから流れ着いたナパーム弾が、空を彩る直前のお話。"
2703060754 = "ヒナ委員長のなつやすみっ！"
1497292368 = "ヒナにゆっくりとした時間を過ごしてもらうべく、海へ訪れた先生と風紀委員会一同。しかしトラブルに次ぐトラブルが発生し、風紀委員たちは大慌て……果たして、ヒナ委員長の夏休みの行方は！？"
