1663756495 = "三日坊主"
2436764539 = "新年の抱負"
1008442379 = "年の暮れ、いつものようにゲームに没頭しているマキとコタマ、ハレ。何度も電話をかけても誰ひとり返事がないことを心配し、部室を訪ねてきたチヒロ。そんなチヒロは彼女たちが怠惰な生活を送っていることに怒り、今年は全員で初日の出を見に行くと宣言するのだった。"
2288954300 = "初日の出を見るなら"
1822713070 = "気乗りしない足を動かしながら、ミレニアムサイエンススクール前に集合したヴェリタス一同。チヒロが、初日の出を見るために山の麓でキャンプをする予定だと告げると、一同は戸惑う。チヒロは部員の所持品を検査し……キャンプとは全く関係のない物が見つかるのだった。"
459676073 = "テント設営"
3757493316 = "キャンプ場に到着したヴェリタス一同。意欲的なチヒロと違って、部員たちは屋外での活動に疲れていた。テントを設営した後、自由時間になるとメンバーたちはそれぞれ休息を取りに行き、チヒロは先生と一緒に読書を始めるのだった。"
2908823739 = "退屈はハッカーをも殺す"
1350246685 = "時間が経っても部員が戻って来ないため、チヒロと先生はみんなを探しに行くことに。そうして、カフェインの禁断症状で苦しんでいるハレを目撃する。ハレにコーヒーを渡した後、マキの行方について聞いた２人は、彼女の後を追って洞窟へと向かう。マキはそこで巨大な芸術作品を描いていたが……"
3004230193 = "ダンス・ウィズ・ベア"
296992172 = "一方、森の奥深くで環境音を録音していたコタマは、冬の特訓に来ているトレーニング部と出会う。トレーニング部と野外を楽しむ体験の価値について話していたところ、チヒロは冬眠寸前の熊と遭遇するかもしれないと注意するが……その時、本物の野生の熊が現れるのだった。"
2436736275 = "夕食の準備"
4265253392 = "キャンプ場に戻ってきたヴェリタスのメンバーは、少し早い夕食の準備を始める。チヒロが火をおこす間、マキとコタマ、ハレは不器用ながらも食材の下ごしらえをするのだった。"
3998368874 = "ココロのチキンスープ"
1256703657 = "部員のために水炊きを準備してきたチヒロ。みんなで下ごしらえした食材を追加し、一行は楽しく鍋を囲む。そうして食事を終え、焚き火の前で穏やかに過ごしていた先生は、ハレとコタマにキャンプの感想を問いかけるのだった。"
2460462864 = "初めての景色（１）"
452463543 = "翌日、日の出を見るために早起きした一同は登山を始める。道中出会ったスミレは、今日は曇っているから日の出を見るのは難しいかもしれないと告げる。しかし、一同は諦めず、山頂まで登ると話す。山頂に到着した一行はついに美しい日の出を目にするのだった。"
60697301 = "初めての景色（２）"
1996295661 = "日の出を見て帰ってきたヴェリタス一同は、キャンプ場の周辺に集まっている多数の記者を発見する。実はマキが洞窟に描いた壁画が新しい古代壁画として勘違いされてしまい、報道陣が集まっているのだとか。先生とチヒロはこの騒ぎを収拾するのに苦労するのだった。"
1007585985 = "三日坊主"
3021250109 = "年明けから1週間後、チヒロは部員の様子を見に部室を訪れる。しかし、メンバーは以前と同じようにゲームに夢中で……何一つ変わっていない彼女たちの姿にチヒロは怒り、説教を始めるのだった。"
4241167237 = "陽ひらく彼女たちの小夜曲"
2999814580 = "バレンタインデーを迎え、「ゲヘナパーティー」の準備でマコトを手伝うことになった先生。しかし、ゲヘナではあまりにも予想外の日常が繰り広げられており……！？果たして先生は無事にパーティーの準備を終えることができるのでしょうか？"
