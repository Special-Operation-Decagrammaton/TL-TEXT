3153263039 = "De Volta ao Lugar de Origem"
2324938743 = "Lámen e Conspiração"
1935028633 = "O Clube de Pesquisa de Ninjutsu visita uma loja de lámen para gravar o novo episódio de 'Crônicas Ninja da Michiru'. No entanto, o Clube de Apreciação de Lámen começa a causar confusão — e, embora tenham resolvido a situação com ninjutsu, a câmera acaba quebrando."
2416051084 = "Uma Oferta Irrecusável"
1084482783 = "Niya, que testemunhou tudo na loja de lámen, oferece ao Clube de Pesquisa de Ninjutsu o empréstimo permanente de uma câmera pertencente ao Comitê Yin-Yang, em troca de um serviço de escolta para a Shine Cat."
2411384567 = "Condições do Pedido"
3522964417 = "O Clube de Pesquisa de Ninjutsu aceita escoltar a Shine Cat. Como o evento exige um código de vestimenta, elas decidem vestir vestidos. Porém, o vestido de Tsukuyo não serve e acaba rasgando."
3044990082 = "Encontro com o Talento"
2282332248 = "Sem um vestido a tempo, Tsukuyo acaba ficando responsável pela segurança fora do local. Ela é então descoberta pela Shine Cat, que a convida para ser modelo. Pouco antes do início do show, alguém rouba todos os vestidos."
223828603 = "Ninja e Ladrão (1)"
4177221936 = "O Clube de Pesquisa de Ninjutsu encontra o Grupo Dadaistic Helmet, que roubou os vestidos, e parte para o confronto para recuperá-los."
3336899706 = "Ninja e Ladrão (2)"
1265568828 = "O grupo recupera os vestidos com sucesso. No entanto, uma pessoa desconhecida é encontrada caída no chão."
4091465997 = "O Desabrochar"
1571624855 = "A pessoa caída no chão era uma das modelos do desfile de moda. Tsukuyo é escolhida para substituí-la após ela ser levada ao hospital."
605112193 = "Fama Crescente"
2465034065 = "Após participar do show da Shine Cat, Tsukuyo começa uma carreira profissional como modelo. Ela estampa diversas revistas e, com tantas entrevistas, quase não tem tempo para descansar. Em meio aos dias sem conseguir visitar a sala do Clube de Pesquisa de Ninjutsu, alguém aparece para visitá-la."
733701337 = "Um Vazio Desconhecido"
1878096311 = "Michiru e Izuna descobrem por Niya que Tsukuyo está trabalhando como modelo. Frustrada porque Tsukuyo não responde às mensagens no MomoTalk nem atende às ligações, Michiru tenta entrar em contato com o empresário, mas é ignorada."
3454885913 = "Em Seus Respectivos Lugares"
2309341144 = "A ausência de Tsukuyo projeta uma sombra sobre o Clube de Pesquisa de Ninjutsu. Com ela fora, o vazio aumenta gradualmente, e até o comportamento de Michiru começa a mudar."
1689830066 = "Coincidência Intencional"
2017422041 = "Para animar Michiru, que está completamente deprimida, Izuna consulta o Sensei e Niya. Assim, o Clube de Pesquisa de Ninjutsu aceita a missão de escolta para o 'Desfile de Moda Comemorativo de Ano Novo de Hyakkiyako', onde Tsukuyo irá desfilar."
2424681935 = "O Fim do Show"
1617347149 = "Logo após o início do 'Desfile de Moda Comemorativo de Ano Novo de Hyakkiyako', Tsukuyo, que caminhava na passarela, começa a correr de repente. Lá estava a mulher que deveria ter sido a protagonista do show antes de Tsukuyo assumir seu lugar. O Clube de Pesquisa de Ninjutsu enfrenta a mulher, que trouxe uma bomba para destruir o desfile."
3366047042 = "De Volta ao Lugar de Origem"
3863137044 = "Após tudo terminar, a Shine Cat sorri para Tsukuyo, dizendo que ela deve decidir seu próprio caminho, e a presenteia com o vestido que havia rasgado durante o show, agora consertado. Assim, Tsukuyo retorna ao Clube de Pesquisa de Ninjutsu."
2291967865 = "Batalha de Conquista do Continente de Aço"
140464825 = "Chegou a hora de iniciar a conquista do continente principal de Aço. O Sensei e os outros, junto com Ein, Soph, Owl — e o profeta de Decagrammaton. Seus sentimentos colidem uns com os outros."
