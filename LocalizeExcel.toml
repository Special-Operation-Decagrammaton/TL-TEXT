958604450 = "Nice to meet you. I'm ORWELL, the administrator of \"Lore Friendly.\"\nI've opened \"Lore Friendly,\" an instance to collect information on urban legends discovered in various parts of Kivotos. Please feel free to talk about mysteries and urban legends here."
1269488525 = "Any trivial anomaly is fine. If information is gathered, it will become a major clue to explore the essence of the world.\nRemember—true reality exists within our cognition.\n\nTogether, let's make this place a place of inquiry that nurtures knowledge and truth."
671759831 = "Huh~ I didn't know this existed! I like ghost stories, but I was bored because they were all things I'd seen before. I'll post if I find anything!"
2837975137 = "I like ghost stories too, but... isn't this place a bit suspicious? It was just created recently, but it has a lot of subscribers. Viral marketing for somewhere? The administrator's icon is also an old-fashioned TV... I hope it doesn't turn into a corporate ad page when I come back after forgetting about it..."
4111771375 = "An urban legend instance with a rapidly increasing number of subscribers sounds like it could be used as material for ghost stories. Well, even if something happens, you can just create a new instance, so isn't it fine to wait and see?"
338790072 = "Aren't there a lot of strange signs lately?\nThere's a speed limit, but it says \"Increase speed\"... I saw \"Beware of wild animals\" in the city the other day. Are there any?"
977601446 = "I feel like I've seen that too. Why \"Increase speed\"?\nDoes it mean run away quickly because it's dangerous?"
375819026 = "I wonder if I can call this lore too...\nA character called Pepperoni or something. I feel like she looked like a boiled chicken... The sticker I saw the other day had a completely different design from my memory."
1235015986 = "Hey, did you just make fun of Peroro-sama?\nWhere are you now!? I have something to talk to you about?"
424362290 = "There's a strange person near 〇〇〇〇〇 station... \nThey're wearing a pure white full-body suit and doing gymnastics... even though it's so hot. Isn't that crazy? Did they go crazy from the heat, or are they doing this because they're crazy... I was a bit scared and didn't want to get close."
3910063889 = "Ah, I might have seen that too. It's where there's a promenade next to a small river, right? At first, I thought it was vinyl trash caught and swaying, but it wasn't. It's like it disappears when you get close... or before I knew it, it was swaying again."
2325372914 = "Don't you have any photos?\nYou can tell if it's trash or a person by using the zoom function on your smartphone, right? It's obvious it's a lie because there are no photos. If you're going to make up a story, do it better."
3582262770 = "It's dangerous... A friend of mine collapsed around there and was hospitalized. People around were saying the same thing at that time... A person wearing something like a white diving suit was dancing, and when they chased it, they suddenly collapsed... ...Isn't that pretty dangerous?"
3177847880 = "Speaking of urban legends, do you know the rumors from when Director Kaya issued martial law before?\nThermobaric bombs prepared to eliminate the opposition... It seems that was planned to be used by SRT special forces members. SRT is an academy that's already closed, right?"
343714176 = "SRT Special Academy has a lot of dark rumors. I heard they have secret weapons that the General Student Council has banned. I also heard they are fighting over discarded bento boxes from convenience stores now..."
3390104466 = "Honestly, are SRT special forces really strong? I hear they caught dangerous criminals, but aren't they just targeting them when they are alone or off guard? If they were really strong, they would catch them individually, not as a platoon, right?"
2082038179 = "Fair and square against criminals lol\nI think it's better than going in without a plan and increasing the number of victims. Are you disparaging SRT for protecting citizens and defending criminals? ...Could it be that you're one of them?"
2762509097 = "What's with the sudden change? Scary. Are you from SRT?"
3323201397 = "Enjoy top-grade Wagyu beef in a private space by reservation only!\nWhy not spend a special moment with your loved ones while eating Wagyu beef?\nMake your reservation here!"
2054008363 = "Eh? Why is there an ad for a yakiniku restaurant on a Roa instance?\nBug?"
2018231707 = "Ah, first time with Full Link?\nPosts from other instances come around too. You can block them if you don't like it... but it was just created and there are few posts, so isn't it fine to just ignore it?"
2576877900 = "The white thing I mentioned before! It was there again!!\nIt seems I wasn't seeing things... Even looking from afar, it was scary and I didn't feel like getting close. I can't help but remember the story about chasing it and collapsing...\nUgh, too scary. I'll stop using this road..."
1966411185 = "Sightings are increasing, huh. There was a story that someone collapsed in the Gehenna Track and Field Club too, is that true?"
2212117541 = "According to the story I heard, there's a strange rumor in the Gehenna Track and Field Club. The kid who collapsed this time seems to have the best grades. Other kids were jealous and put a curse on her. It's just a rumor, but they say there's no smoke without fire... ^^"
2130375924 = "Stop saying selfish things. It makes me feel bad watching it."
621158106 = "The Gehenna Track and Field Club is recruiting new members to run marathons with us!\nAny Gehenna student who likes running is welcome!\n...Even if you're not good at running, Gehenna students who are used to running away are also welcome!\nTrain your mind and body in the Track and Field Club and become free from the Prefect Team!\nStudents who are interested, please DM @Gehenna_Athletics!"
4254384135 = "Is it okay to enter Schale without permission? It seems like there are quite a few students coming and going, but do you need to be invited by Sensei to enter? Is it okay to go normally?"
2198577225 = "I want to eat chicken"
2048584069 = "Did anyone go to Getsuten Market for lunch today?\nThere was a super cute girl handing out drinks... I wonder if she's a promotional model for somewhere?\nI was busy so I didn't talk to her, but I should have at least taken a drink~"
3927977111 = "Where in Getsuten Market? I'm in front of the rice cracker shop now!"
4148671665 = "It's near where the stall selling fans was before!"
856886527 = "Really! She's super cute!\nI might have seen her somewhere... Maybe a reader model? I'm almost about to remember..."
964535569 = "Today's weather in D.U. is sunny.\nThe maximum temperature is 30 degrees, and the minimum temperature is 20 degrees.\nThe temperature will be high during the day, so please be careful with outdoor activities."
2749646398 = "Hot... It's so hot that I want to go to school naked."
1774042646 = "I don't know if anyone remembers, but I'm the one who posted before that my friend saw something strange and collapsed.\nToday, I got a call from the hospital that they woke up. The cause is still unknown, but it seems there are no abnormalities in their body. I'm really glad... I felt relieved and lost my energy..."
3053562159 = "Same here! My friend also collapsed on that promenade, but they woke up!\nMaybe it's because the temperature dropped and it got cooler? Anyway, I'm glad!"
2090505947 = "What was it in the end? Is the cause really unknown?"
2642813418 = "People who had similar experiences waking up at almost the same time... that's strange.\nIncluding the Track and Field Club incident, is someone holding a grudge against them?"
566774827 = "Kivotos Track and Field Inter-High Athletes Decided!\nAttention is on Ito, the representative for short distance. Just returned from a long-term hospitalization, but successfully updated their personal best and was selected as a representative.\nPlease support the athletes fighting in the Inter-High!"
1900309917 = "I went to the place everyone was talking about, but there's nothing there!\nI wanted to experience what would happen if I actually saw the white thing... It was all a lie after all!"
3994228846 = "Haven't strange things increased since the General Student Council President returned? Maybe it's just my imagination.\nSightings of strange things and students who had scary experiences have increased. I feel like I hear stories of disappearances often too...\nThe General Student Council President seems to be doing her job properly, but... something is strange... I feel like it wasn't like this before."
3825455165 = "Also, this instance is boring. The story about the white wriggling thing seems to be just heatstroke. The ghost stories posted are all made-up stories, and it's depressing. I don't think I need to come see it unless something dangerous happens."
258414054 = "It's a story I heard from a friend... An urban legend that's too dangerous if it's true.\nThere's a consumer finance company near the port that does dangerous torture to people who don't pay back their debts—it's called \"Drum Can Crab\" torture."
2946576035 = "They put a person in a drum can and then put a lot of crabs in later... They say the hungry crabs eat the person inside... It's a method used by some dealers, but... isn't it scary?"
620464260 = "Eh, scary... wait, how did you hear that story? Someone involved? You wouldn't say you heard it from a ghost, right?"
3927824555 = "I've heard a similar story. Articles about people struggling with multiple debts going missing at the port... aren't there a lot lately? Is it just my imagination?"
4092725241 = "Believe it or not, it's up to you. You're the one who will regret it later."
2791299244 = "Who is calling crab-flavored fish sausage \"Sniper's Snack\"?\nFish sausage is the exact opposite of hard-boiled, no matter how you think about it. If it's a sniper who coldly and calmly carries out missions, wouldn't raw fish be more like that?"
3212941527 = "Um, hard-boiled means \"fully cooked.\""
3967235797 = "The story of the Drum Can Crab is strangely realistic. I once cut my hand when eating crab, but thinking that happens to my whole body... I get goosebumps just imagining it."
2155647036 = "Crab scissors are hard and difficult to eat, right? It's good to make a cut in the joint."
1432595114 = "I understand. If you run it through cold water after steaming, it's easier to peel. Same principle as a boiled egg!"
755007697 = "Have you forgotten the purpose of this instance? This is a place to talk about lore... let's talk about something related?"
3344696113 = "Does recent delivery also advertise the shop?\nI was surprised when the delivery kid gave me inari sushi earlier.\nIt was normally delicious, but is this profitable...?"
4073972244 = "They say a lot of crabs are being caught this year.\nA relative who is a fisherman said so. The price has plummeted so much that it's better not to ship them."
4092617623 = "Eh? The crab at the supermarket in the neighborhood is quite expensive, though."
2379175343 = "Isn't the General Student Council doing everything behind the scenes? They are manipulating prices so that crabs can't be eaten easily."
323935886 = "Crabs are quite weak, right?\nThey die easily... and their legs come off easily with impact, losing their commercial value... \nThat hard shell, is it even meaningful?"
2223860917 = "The fried rice at \"Akita Fisheries\" I found at Kenzaki Port today was unbelievably delicious!\nI thought \"seafood is the same everywhere,\" but the \"crab meat fried rice\" here is so delicious that it overturns common sense.\nIt's packed with fresh crab meat and doesn't smell fishy at all. I want everyone to eat it once in their life. A part-timer at \"FOX EATS\" told me."
1925481253 = "I might not be able to eat crab dishes lately.\nAfter reading the ghost story of the Drum Can Crab, not just crab, but even shrimp..."
486337531 = "I understand."
1643990071 = "Has anyone seen this stuffed animal?\nIt's a stuffed animal called Perorodzilla that has become a phantom in the Momo Friends circle... I want it even if it's a mystery~"
3906071520 = "That's the legendary goods where all the stock sank into the sea, right?\nSo many people want it that I sometimes see strange documents in Momo Friends-related instances."
4229544793 = "It's not a stuffed animal, but I've seen something similar.\nWhen I was working the night shift, a monster like that was rampaging while shooting beams in the sea..."
2485934715 = "That's exaggerating too much.\nIf you don't know, why don't you just say you don't know honestly?"
1654528356 = "Even if you're in trouble with money, absolutely don't do crab fishing boats.\nI finally managed to escape the other day, but I was forced to pull nets all day on a narrow boat without time to rest... The salary is less than a convenience store part-time job. It's really over.\n...I shouldn't have drunk the opened Yokai MAX at that time..."
4199579873 = "Saying \"opened Yokai MAX\" makes it sound like fishing, right?\nWell, it seems true that crab fishing boats are hell.\nAn acquaintance also stopped contacting me after saying they were going to ride one."
2564932040 = "Isn't that just a mistake in the train ticket? Transfers in D.U. Central District are quite confusing, and I often hear stories of people getting off at the wrong station."
3127658278 = "No, even if it's a school district, there's no way you can use a ticket with a different destination in D.U.\nYou'll be thrown out by a Highlander conductor."
1114191429 = "Where is the place to ride a crab fishing boat in D.U.... Kenzaki Port?\nThat's the place the Carpaccio Family controls, right? Be careful. There are rumors that they really do the \"Drum Can Crab\" thing..."
4254828625 = "What should I be careful about? It's not a big deal, right? They were beaten up by the Panettone Family in the previous conflict too."
2854957839 = "It'll be too late to regret it after you're in the drum can."
1897644279 = "[Notice] Information on Bidding for Regular Outsourced Work at Kenzaki Port Management Office\nThe Kenzaki Port Management Office will conduct bidding for security and business-related outsourced work.\nWe look forward to the participation of related companies.\nPlease check the official website of the D.U. Port Management Office for details."
3893385166 = "If you win the bid once, can you monopolize it for a few years?\nShould I participate in the security bidding..."
1057010976 = "Don't do it. It's better not to touch cases that the Carpaccio Family has secured.\nIf you don't want to be erased."
659308929 = "I saw something dangerous late last night...\nBlack-suited guys were wandering around the port while rolling drum cans in the middle of the night...\nIs this, by any chance, \"that thing\"?"
474002169 = "Eh, seriously? Is that rumor true that a certain family is stuffing mutant crabs into drum cans?\nIt's normally scary."
212319164 = "Why is the competitive eating contest always greasy things like hot dogs or hamburgers?\nI'm confident I could win normally if it were boiled crab."
1623024344 = "Isn't it a cost issue?\nWell, if it's a contest where you can eat a lot of crab, I want to participate too."
2319544021 = "Dangerous... I put the money entrusted to me by the organization into a security fund, but it plummeted all at once because of the recent robbery incident...\nIf I can't return it by the end of this month, I might really be crab feed..."
937886249 = "That's why I told you to diversify your investments.\nDon't you know the saying, \"Invest with money you can afford to lose\"?"
1719757308 = "Where in the world is there money you can afford to lose?\nIf you have that kind of money, give it to me."
824801969 = "They say the Carpaccio Family's ledger was stolen lol\nIt would be impossible unless it was someone inside, someone betrayed them."
3734701780 = "The next \"feed\" is decided. Kenzaki Port won't have to worry about crabs for a while."
