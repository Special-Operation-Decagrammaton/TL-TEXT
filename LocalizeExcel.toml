2496100826 = "Observe os arredores e entenda a situação.\n\n…… Parece agitado. Primeiro, vamos ouvir os membros."
318399169 = "Vamos encontrar Fuuka, que está com problemas.\n\nDia dos Namorados, Festa de Gehenna, ingredientes encomendados em grande quantidade para o Departamento de Merenda…… O criminoso de todos os incidentes é certamente……!"
3141934736 = "Vamos expulsar os delinquentes que estão causando problemas no prédio antigo.\n\nParece que as crianças problema estão se movendo com estratégia. Como Chinatsu disse, não parece ser apenas uma confusão. Vamos procurar pistas sobre quem é o mandante."
2569897263 = "Vamos explorar os arredores da sala de piano.\n\nNão sabia que existia um lugar assim nos fundos da escola de Gehenna. Já que tenho tempo, vou dar uma volta……"
2403732486 = "Vamos refletir sobre o dia de hoje.\n\nUfa, foi um dia agitado. A Festa de Gehenna em 5 dias…… a conspiração do Pandemonium…… ainda estou confuso……"
2995459567 = "Vamos investigar a cena do incidente e procurar pistas.\n\nFazer uma fonte termal aparecer de repente em frente ao prédio do Pandemonium…… Kasumi não faria isso sem motivo. A prática do piano também é importante, mas vamos resolver o problema imediato primeiro."
1627627988 = "Vamos interrogar os alunos e coletar informações.\n\nComo Ako disse, circulam entre os alunos de Gehenna vales de entrada prioritária para as fontes termais. O Departamento de Fontes Termais deve estar tramando algo."
3086472127 = "Vamos seguir o Departamento de Fontes Termais, que está tramando uma conspiração.\n\nGrande Operação Waku Waku de Fontes Termais…… um nome de brincadeira, mas não podemos ignorar. Precisamos coletar mais informações."
1626969013 = "Vamos visitar Kasumi, que foi levada para a cela especial.\n\nPresentear cada aluno de Gehenna com uma fonte termal…… isso é de ficar sem reação."
3158540525 = "Vamos nos concentrar na prática do piano com calma.\n\nPor causa da festa que se aproxima e do Sensei que espera ansioso pela apresentação, vou me acalmar e praticar aos poucos……"
3801704183 = "Vamos refletir sobre o dia de hoje.\n\nAinda não estou acostumada a tocar piano, mas nesse ritmo consigo terminar."
1957882148 = "Vamos começar a rotina na sala da presidente.\n\nCom a mensagem preocupante do Sensei e o relatório pouco claro de Chinatsu…… Gehenna está como sempre, mas me sinto um pouco insegura."
1304712371 = "Vamos capturar o Pã-chan que está vagando pelo refeitório.\n\nQuando Chinatsu relatou uma panqueca ambulante, pensei que fosse algo, mas vendo com meus próprios olhos entendo. A propósito, de onde veio isso……?"
610392988 = "Vamos impedir o Pã-chan gigante que apareceu no parque.\n\nMal tinha capturado a Sociedade de Estudos Gastronômicos, agora aparece uma panqueca gigante…… aff……"
2177230518 = "Vamos visitar Haruna, que foi levada para a cela especial.\n\nPara saborear a comida da festa, sequestrar Fuuka…… a Sociedade de Estudos Gastronômicos não muda mesmo."
2187336480 = "Vamos nos concentrar na partitura e praticar piano.\n\nOs preparativos estão prontos! Embora o tempo restante seja pouco, vou continuar praticando."
1136050044 = "Vamos refletir sobre o dia de hoje.\n\nConsegui terminar mais um dia com segurança…… faltam 4 dias…… só mais um pouco, vou me esforçar."
3855672209 = "Vamos organizar as partituras que trouxe.\n\nSim, sem pressa, o que posso fazer agora…… as mensagens e torcida do Sensei foram muito bem-vindas, mas algo me incomoda."
3729000631 = "Vamos recolher as estátuas de Makoto instaladas por aí.\n\nJá basta o Pandemonium, agora outros problemas se juntam a eles…… por enquanto, vamos cuidar das estátuas daqui."
107297234 = "Vamos encontrar o esconderijo dos problemas e limpá-lo.\n\nAff, não sei o que Makoto disse a eles, mas se vão continuar assim, vou subjugá-los até o fim."
1776716070 = "Vamos procurar a pomada que Sena preparou.\n\nA limpeza terminou, mas talvez tenha exagerado um pouco. Espero que ninguém tenha se machucado gravemente."
3732203121 = "Vamos praticar piano sentindo a melodia.\n\nSinto que um pouco as teclas se tornaram parte de mim. Hehe, tocar é tão divertido. Eu não sentia isso há muito tempo."
990824040 = "Vamos refletir sobre o dia de hoje.\n\nHoje foi mais um dia cheio de altos e baixos. Foi um tempo curto, mas espero que amanhã os resultados do treino apareçam……"
2068928161 = "Vamos nos preparar para o treino regular após o trabalho.\n\nTreino antiterrorismo antes da festa…… não é particularmente difícil, mas devo fazer perfeitamente……"
3900612289 = "Vamos convocar os membros para o treino regular.\n\nPanfletos suspeitos espalhados pelo distrito autônomo de Gehenna. O Pandemonium deve estar tramando algo. Mas agora não tenho tempo para me preocupar com isso."
2796525508 = "Vamos ajudar Iori a recolher os panfletos suspeitos.\n\nPor causa dos problemas do Pandemonium, Iori está em dificuldades. Como presidente, não posso ignorar. A propósito…… será que o Sensei está bem……"
1797291382 = "Vamos investigar a verdade da confusão no Pandemonium.\n\nIbuki se envolveu em uma confusão terrível. Ainda bem que não se machucou gravemente. Pelo menos, vou investigar o que aconteceu."
4023772365 = "Vamos participar do treino regular com os membros convocados.\n\nTodos os membros estão reunidos, os preparativos estão prontos. Embora seja um treino regular, não podemos descuidar."
1542042713 = "Vamos participar do treino regular novamente.\n\nNormalmente eu contestaria a exigência de Makoto, mas agora não quero perder tempo com discussões inúteis."
2778212802 = "Vamos praticar piano com calma.\n\nO treino adicional consumiu quase todo o tempo de prática, mas não posso me desesperar. Eu consigo, eu consigo."
2808151776 = "Vamos refletir sobre o dia de hoje.\n\nAmanhã é o dia da festa. Meus dedos tremem como sempre. Mas assim não dá……"
556520415 = "Vamos contar a Ako meus verdadeiros sentimentos sobre a apresentação.\n\nHoje, quero me dedicar ao máximo para tocar. Se for só um pouco, só um pouquinho, posso ser egoísta, né……?"
424240925 = "Vamos praticar piano com certeza.\n\nPor causa do nervosismo, os dedos não acompanham…… Não quero errar no palco. Para uma apresentação perfeita, vou me concentrar nas teclas."
1211557641 = "Vamos controlar toda a confusão em Gehenna.\n\nTerminei a prática de piano que podia fazer. Antes da apresentação começar, vou resolver rapidamente os problemas de Gehenna."
2047835697 = "Vamos tocar piano no palco da festa.\n\nPara todos os membros do Comitê de Disciplina que me ajudaram, para as amigas da escola…… e para o Sensei…… Sim, vou retribuir com uma bela apresentação."
1233708660 = "Vamos arrumar o quarto bagunçado.\n\nEste brinquedo que ganhei do Sensei é agora um tesouro precioso e insubstituível."
3329307650 = "Vamos em frente sem me preocupar com os outros.\n\nEm Gehenna, coisas incompreensíveis acontecem de vez em quando…… Estou cansada?"
3107481871 = "Vamos repreender as alunas que fazem trotes.\n\nAs que atrapalham o trabalho dos outros, não apenas o meu, precisam ser disciplinadas."
3306064596 = "Vamos procurar um livro desaparecido.\n\nSerá que sou muito exigente? Uma prateleira vazia me incomoda……"
2012136030 = "Vamos investigar a cena da fuga da prisão.\n\nKasumi, presidente do Departamento de Fontes Termais…… pessoa perigosa. Da próxima vez que a capturar, vou mostrar o que é o Comitê de Disciplina."
2319967817 = "Vamos procurar um diário antigo escondido na sala de piano.\n\nVocê, cujo nome não sei, que cultivava um sonho importante aqui. Tudo bem, seu esforço não foi em vão. Estou aqui para lembrar."
9172985 = "Vamos investigar o refeitório onde houve confusão.\n\nQue tipo de comida faz todo mundo desmaiar? Não faz sentido."
2934280817 = "Vamos procurar os vestígios de um gato de rua que visitou o refeitório!\n\nVeio até aqui pelo cheiro da comida. Espero que encontre um dono gentil."
2003080857 = "Vamos cuidar dos feridos deitados na cama.\n\nPelas reações de todos, o efeito do tratamento das Mãos Curadoras é incrível. Da próxima vez que…… o que estou pensando!"
3684066488 = "Vamos procurar o inseto que entrou na sala do Departamento de Medicina de Emergência!\n\nTodos estão fazendo muito barulho por causa de um inseto…… Não entendo. O estranho sou eu?"
2904112170 = "Vamos capturar o Pã-chan novamente.\n\nA comida que Juri faz é…… não, é melhor não pensar muito. Agora vou me concentrar no que está à frente."
487185434 = "Vamos procurar o pudim desaparecido vasculhando a pilha de bagagem.\n\nNão quero ouvir as exigências de Makoto, mas se realmente ocorreu um crime na escola, como Comitê de Disciplina não posso ficar de braços cruzados."
4196165701 = "Vamos ajudar Erika a limpar a sala bagunçada.\n\nAjudar alunos em dificuldade também é trabalho do Comitê de Disciplina. Limpar uma sala não é difícil, então vou ajudar um pouco."
552395824 = "Vamos organizar os grafites e cartazes na sala de aula!\n\nGrafites e cartazes difamando Makoto. Acho que foi ela quem pediu, mas se atrapalha a vida escolar de outras alunas, preciso fazer algo."
3034885123 = "Vamos, como oni, procurar os alunos escondidos.\n\nEsconde-esconde…… me lembro de brincar quando era pequena. Quando eu era o oni, encontrava todo mundo muito rápido, e eles ficavam chateados……"
690950655 = "Vamos procurar o vale-refeição que Junko perdeu!\n\nSociedade de Estudos Gastronômicos…… encrenqueiros incuráveis, mas o sentimento pela comida e pelos amigos é genuíno."
