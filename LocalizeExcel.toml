1392178341 = "偉大なる生徒会長"
4118873191 = "レッドウィンター連邦学園の生徒会長であるチェリノに呼び出された[USERNAME]先生。その狙いはシャーレを通じて、来たる夏至祭「イワン·クパーラ」の様子を各学園へと伝え、レッドウィンターの素晴らしさをキヴォトス全体に広めることだった。"
2981702230 = "粛清に染まる夏至祭"
1934906729 = "祝祭の準備に取り組む現場を視察しつつ、問題のある（？）生徒たちを粛清するチェリノたち一行。その裏側では、レッドウィンター事務局の保安委員長である「マリナ」がチェリノの石像を誤って壊してしまい、これをもみ消すためにクーデターを起こそうとしていた。"
3526237825 = "昼下がりのクーデター"
324633654 = "外から大きな音が聞こえてきて、昼寝から目覚めてしまったチェリノ。マリナがクーデターを起こしたと聞かされ、一行はレッドウィンター連邦学園の外郭にある「旧校舎」へと向かい、一時的に身を隠すことにする。"
4001712064 = "旧校舎の裏の姿、227号特別クラス"
2746710944 = "クーデターから逃れ、「旧校舎」に逃げ込んできたチェリノたち一行。そこで、以前チェリノが粛清した「227号特別クラス」の生徒たちと出会う。その一員であるノドカと、話の流れから言い合いになってしまったチェリノは、同じく227号特別クラスのシグレからの提案を受け、「飲み比べ勝負」で決着をつけることに。"
2840864445 = "初めての勝利"
433944428 = "辛うじて勝利を収めたチェリノ。ノドカたちは本校舎に復帰するためにも、チェリノに協力することを約束する。"
4281580888 = "それは昼寝にぴったりの"
797442044 = "お腹がいっぱいになって、眠くなってしまったチェリノ。昼寝をするため、一行はレッドウィンター連邦学園の図書館へと向かう。しかし、本を枕にして寝ようとしたところを「知識解放戦線」の司書であるモミジに止められ、争いへと突入してしまう。"
4124993500 = "二回目の勝利"
1971393431 = "戦闘には勝利したものの、目が覚めてしまったからとチェリノは昼寝を中断。モミジたちにも事務局を奪還するための協力を要請する。「協力したら、トリニティの大図書館の全ての蔵書を見られるようにしてやる」というチェリノの約束を聞いたモミジは、二つ返事でその提案を受け入れるのだった。"
252950650 = "労働者にプリンを！"
365643949 = "すっかりお祭りムードのレッドウィンター連邦学園だったが、今は何の権限も持っていないチェリノは不服の様子。そんな時、チェリノは突如として「工務部」に捕まり、薪の山に縛られてしまうことになる。"
3840713209 = "三回目の勝利"
3349557109 = "トモエと[USERNAME]先生は何とかチェリノを救出し、今の生徒会長はチェリノではなくマリナだということを伝える。それを聞いた工務部はすぐさま身を翻し、新たな指導者に対して現状を追及するべく、レッドウィンターの事務局へと向かうのだった。"
3439678836 = "再び事務局へ"
340629748 = "クーデターを成功させた後、その権力の甘さを堪能していたマリナ。しかし親衛隊員から、チェリノが多数の生徒と共にこちらに向かってきていると聞かされ、混乱しつつも戦闘へと突入する。"
950061340 = "返り咲く革命のイワン・クパーラ"
1717155722 = "無事に戦闘に勝利し、会長の座を取り戻したチェリノの手によって、マリナたちは粛清されることに。しかしイワン・クパーラ当日、チェリノに手を貸していた生徒たちが「約束を守れ」と再び蜂起し、チェリノはまたしても失脚するのだった。"
