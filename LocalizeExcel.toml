89362963 = "Prólogo"
1661247484 = "Rin descobre que a líder do motim é uma aluna oriunda da Academia Unificada Hyakkiyako chamada Wakamo, e avisa o Sensei [USERNAME] que ela é uma aluna perigosa que escapou da Agência Correcional."
737161669 = "Prólogo"
1938490976 = "Diante do grupo que chegou ao prédio onde fica a sala do clube da Schale, surge de repente um tanque de cruzeiro."
2421559898 = "Prólogo"
516426802 = "Enquanto o Sensei [USERNAME] e os alunos lutam contra o tanque, Wakamo invade o prédio onde fica a sala do clube da Schale……"
369258066 = "Prólogo"
1897585705 = "Wakamo, que encontrou o Sensei [USERNAME] no subsolo do prédio, foge com o rosto vermelho por algum motivo. Rin, que chega atrasada, entrega ao Sensei [USERNAME] a \"Caixa Shittem\" deixada pela Presidente do Conselho Estudantil Geral."
3240627074 = "Prólogo"
3773339621 = "O grupo encontra Wakamo, a líder do motim."
1964993858 = "Prólogo"
4155740391 = "Embora Wakamo tenha fugido repentinamente durante o combate, o grupo decide não persegui-la e continua em direção ao interior do prédio da Schale para reconquistar a sala do clube."
2720876549 = "Prólogo"
536907202 = "Ao ativar a Caixa Shittem, uma garota chamada Arona aparece de dentro dela, e com sua ajuda, o controle da Torre do Santuário é recuperado com sucesso. Depois, Rin mostra a sala do clube da Schale, e o trabalho como Sensei do \"Departamento de Investigação Federal Schale\" começa oficialmente."
4199086753 = "Bem-vindo ao Comitê de Contramedidas!"
3167291451 = "A carta enviada pelo Colégio Abydos dizia que os alunos estavam sendo encurralados por organizações violentas locais. O Sensei [USERNAME] vai para a região autônoma de Abydos para ajudá-las, mas logo após chegar, se perde e fica à deriva."
3987177942 = "Primeiro Dia em Abydos"
3646064857 = "O Sensei [USERNAME], salvo por Shiroko que passava por ali, chega à sala do Comitê de Contramedidas de Fechamento do Colégio Abydos. No entanto, ao mesmo tempo, a Turma do Capacete Barulhento ataca o Colégio Abydos. Junto com os alunos, conseguem afugentá-los."
4043312483 = "Primeiro Dia em Abydos"
1202784751 = "Sob o comando do Sensei [USERNAME], os alunos de Abydos conseguem afugentar a Turma do Capacete e retornam para a sala do clube."
3989313715 = "O Poder dos Adultos é Incrível!"
1608590402 = "Os alunos do Comitê de Contramedidas, que retornaram para a sala do clube após afugentar a Turma do Capacete, se apresentam ao Sensei [USERNAME]. Eles ficam felizes novamente com a chegada da ajuda do Sensei e propõem destruir a base avançada da Turma do Capacete Barulhento neste ímpeto."
3407235728 = "O Poder dos Adultos é Incrível!"
1856373448 = "O Sensei [USERNAME] e os alunos do Comitê de Contramedidas conseguem destruir a base avançada da Turma do Capacete Barulhento e voltam triunfantes para a escola."
3961742797 = "As Circunstâncias do Comitê"
2472112227 = "Pela conversa dos alunos que retornaram à sala do clube, entende-se que a dívida do Colégio Abydos ultrapassa 900 milhões de ienes, e que está difícil até mesmo pagar os juros apenas com a força delas. Atendendo ao desejo dos alunos, o Sensei [USERNAME] tenta ajudar, mas Serika sai furiosa da sala dizendo \"Não confio mais em adultos!\"."
3061964608 = "Um Dia Comum de Serika"
3427145251 = "Seguindo Serika, o grupo chega ao restaurante de lámen onde ela trabalha meio período. Todos comem lámen e passam um tempo divertido juntos, mas Serika continua teimosa como sempre. No caminho de volta do trabalho, Serika é levada pela Turma do Capacete."
36405547 = "Operação de Resgate!"
426352076 = "O grupo percebe que não consegue entrar em contato com Serika depois de se separarem no restaurante de lámen. O Sensei [USERNAME] usa sua autoridade como Schale para localizar o terminal de Serika e vai resgatá-la."
2287819315 = "Uma Nova Ameaça?"
2766662048 = "O grupo resgata Serika em segurança das mãos da Turma do Capacete. Após o combate, Ayane encontra vestígios nos destroços do tanque usado pela Turma do Capacete que corroboram o envolvimento de outra força. Ao mesmo tempo, o diretor da Kaiser PMC está decepcionado com as repetidas falhas da Turma do Capacete e faz movimentos para contratar os \"Serviços de Prestação\" em substituição à Turma do Capacete……"
3902676392 = "Serviços de Prestação Chegam!"
4083213547 = "Dia da reunião ordinária do Comitê de Contramedidas. Os alunos se preocupam com como pagar a dívida de 900 milhões de ienes, mas não conseguem pensar em uma boa maneira. Terminada a reunião, vão comer lámen e lá estão os membros dos Serviços de Prestação, sofrendo por falta de dinheiro."
2584215733 = "Batalha Sangrenta dos Ingratos"
766257118 = "Depois de se separarem amigavelmente do Comitê de Contramedidas, Aru finalmente percebe que aquelas pessoas eram alunas do Colégio Abydos. Ela fica atormentada pela culpa por um tempo, mas se recompõe de alguma forma, mobiliza os mercenários temporários e ataca o Colégio Abydos."
1534182665 = "Batalha Sangrenta dos Ingratos"
1089217150 = "Os alunos do Comitê de Contramedidas repelem os Serviços de Prestação, e elas recuam junto com os mercenários temporários."
2309291572 = "Em Busca de Pistas"
3874145345 = "Analisando as informações coletadas na batalha anterior, descobrem que os funcionários dos \"Serviços de Prestação 68\" são alunos de Gehenna e que as armas usadas pela Turma do Capacete entraram pelo \"Mercado Negro\". Em busca de mais pistas, o grupo vai para o Mercado Negro."
1625249857 = "Para o Mercado Negro (1)"
3011986499 = "Chegando ao Mercado Negro, o grupo do Comitê de Contramedidas encontra Hifumi, aluna da Escola Geral Trinity. Ela veio ao Mercado Negro procurar itens limitados do Peroro, mas estava fugindo de bandidos que a incomodavam. O Comitê de Contramedidas intervém e entra em conflito com os bandidos."
2005605206 = "Para o Mercado Negro (1)"
2107918611 = "Depois de afugentar os bandidos, Hifumi e o Comitê de Contramedidas fogem do local antes que a confusão aumente."
67492089 = "Para o Mercado Negro (2)"
2585148003 = "O Comitê de Contramedidas pede a Hifumi, como agradecimento por salvá-la dos bandidos, que os guie pelo Mercado Negro e a acompanha por um tempo. Enquanto isso, Aru, a presidente dos Serviços de Prestação 68, procura maneiras de conseguir fundos para se recuperar dos fracassos nas batalhas anteriores."
4187141271 = "Mobilizar! Esquadrão de Máscaras e Maiôs (1)"
847788836 = "Enquanto exploram o Mercado Negro, o Comitê de Contramedidas testemunha por acaso o dinheiro da dívida que pagaram indo para um banco ilegal. Os alunos, ao perceberem que o dinheiro que ganharam com tanto esforço está sendo usado para fins ilegais, ficam indignados e decidem atacar o banco."
2540582765 = "Mobilizar! Esquadrão de Máscaras e Maiôs (2)"
2791958937 = "Diante de Aru, que esperava a aprovação de um empréstimo no banco ilegal, aparecem os alunos do Comitê de Contramedidas usando máscaras(?). Vendo-as fugir com o dinheiro e os guardas do Mercado Negro as perseguindo, Aru observa com admiração a aparência de verdadeiras vilãs que elas demonstraram."
2605391019 = "Vamos, Rumo ao Sol Poente!"
1843801151 = "Após despistar a perseguição dos guardas do Mercado Negro, o Comitê de Contramedidas foge em segurança. Elas ficam preocupadas por um tempo ao ver a grande quantia de dinheiro, mas convencidas por Hoshino, fogem levando apenas alguns documentos necessários. Quem passa pelo maço de notas que elas deixaram são os membros dos Serviços de Prestação, começando por Aru."
2080293366 = "A Verdade Revelada"
2873970964 = "A partir dos documentos do banco ilegal, o Comitê de Contramedidas descobre que o mentor de tudo era a mega-corporação \"Kaiser Corporation\". Chocados com o mal social grande demais que cerca a escola, os alunos se dispersam naquele dia."
1849712170 = "Nuvens Escuras se Aproximam"
2479276074 = "Aru continua angustiada, sentindo culpa por atacar o Colégio Abydos com o dinheiro que o Comitê de Contramedidas deixou para trás. Para animar Aru, os Serviços de Prestação vão todos para o Shibaseki Ramen. Enquanto isso, um homem suspeito de terno preto aparece diante de Hoshino e lhe faz uma proposta."
3652595243 = "Você Não é Minha Amiga!"
3597989428 = "Enquanto comiam lámen no Shibaseki, Aru recebe palavras calorosas de encorajamento do mestre e, não suportando a culpa, acaba gritando e se rebelando. No entanto, Haruka, que interpretou mal as palavras de Aru, ativa uma bomba que havia instalado na loja, e o Shibaseki Ramen desaparece sem deixar vestígios."
1822218538 = "Não Vou Perdoar Vocês!"
2950249706 = "Aru acaba cometendo um ato cruel e desumano de forma involuntária. Mas os alunos do Comitê de Contramedidas não têm como perceber os verdadeiros sentimentos de Aru e a condenam. No final, Aru mantém a fachada de vilã e se coloca diante do Comitê de Contramedidas."
2392026169 = "Não Vou Perdoar Vocês!"
647272427 = "Quando o conflito entre os Serviços de Prestação e o Comitê de Contramedidas atinge seu ápice, de repente, um bombardeio à distância. Ayane diz que aquilo é o Comitê Disciplinar da Academia Gehenna."
4008077676 = "Comitê Disciplinar Entra na Batalha!"
1530869328 = "O Comitê Disciplinar de Gehenna anuncia que veio capturar os problemáticos Serviços de Prestação. O Comitê de Contramedidas fica preocupado com a atitude a tomar, mas finalmente decide que é uma violação de jurisdição o Comitê Disciplinar de outra escola operar na região autônoma do Colégio Abydos, e resolve lutar contra o Comitê Disciplinar."
906157151 = "Comitê Disciplinar Entra na Batalha!"
684749186 = "Apesar da vantagem numérica, o Comitê Disciplinar de Gehenna é derrotado pelos alunos do Comitê de Contramedidas comandados pelo Sensei [USERNAME]. Depois, Ako, uma administradora do Comitê Disciplinar de Gehenna, aparece para tentar mediar. Mas nos bastidores, Haruka está tramando algo……"
4085844327 = "Aliança Inesperada"
2776982583 = "A conversa com Ako, a administradora do Comitê Disciplinar, não vai bem, e o Comitê de Contramedidas acaba se tornando hostil novamente. Enquanto o número de membros do Comitê Disciplinar aumenta, o grupo tenta enfrentá-los de alguma forma cooperando com os Serviços de Prestação 68."
1339565549 = "Aliança Inesperada"
1377434222 = "Embora superem uma batalha difícil, o Comitê Disciplinar não mostra sinais de diminuir o ímpeto. Quando mais reforços chegam e parece que tudo está perdido, a Presidente do Comitê Disciplinar, Hina, aparece e pede explicações a Ako sobre a situação."
1471802853 = "A Presidente do Comitê Disciplinar de Gehenna"
2688547338 = "Depois de entender a situação sobre o uso arbitrário de tropas por Ako, Hina honestamente abaixa a cabeça para o Comitê de Contramedidas. Antes de retornar a Gehenna, Hina deixa ao Sensei a informação de que \"a Kaiser Corporation está tramando algo no Deserto de Abydos\"."
4195603251 = "Adeus, Serviços de Prestação 68"
1030591484 = "O Sensei se despede dos membros dos Serviços de Prestação, que acabam deixando Abydos. Depois, ao visitar o Mestre Shiba hospitalizado junto com Ayane e Serika, ouve a chocante verdade de que a propriedade do prédio do restaurante de lámen havia passado para a Kaiser Corporation."
3139483916 = "As Histórias de Cada Um (1)"
839043873 = "Reunidos novamente na sala de aula, os membros do Comitê de Contramedidas organizam a situação. Ayane e Serika, que investigaram as informações sobre a terra, informam a todos que a maior parte da região autônoma de Abydos havia se tornado propriedade da Kaiser Corporation."
2927878713 = "As Histórias de Cada Um (2)"
409405033 = "O Comitê de Contramedidas ouve sobre o passado de Hoshino. Com base nessa história, especulam que o antigo conselho estudantil de Abydos, já extinto, tentou pagar a dívida, resultando na perda até das terras para a Kaiser Corporation. O Sensei, preocupado com a informação ouvida de Hina, propõe ir ao Deserto de Abydos."
442327204 = "Para o Deserto de Abydos (1)"
2058754230 = "O Comitê de Contramedidas segue cautelosamente para o Deserto de Abydos, fazendo várias especulações."
3802560582 = "Para o Deserto de Abydos (2)"
2697565317 = "Chegando ao deserto abandonado, o Comitê de Contramedidas vê a paisagem, e Hoshino fala sobre o passado de Abydos."
573312762 = "Para o Deserto de Abydos (3)"
198870950 = "O Comitê de Contramedidas descobre uma enorme instalação construída no Deserto de Abydos em algum momento. Eles encontram um inimigo desconhecido que a protege."
1399589399 = "Kaiser PMC (1)"
884616625 = "A identidade do inimigo encontrado é a Kaiser PMC. As tropas da PMC começam a se reunir para cercar o Comitê de Contramedidas."
852645695 = "Kaiser PMC (2)"
2382351824 = "O diretor da Kaiser Corporation, que aparece diante do Comitê de Contramedidas, diz que é a ele que Abydos deve a dívida."
3249776532 = "Batalha Perdida"
2043848879 = "O diretor da Kaiser Corporation diz que \"compramos as terras de Abydos para procurar um tesouro enterrado em algum lugar\". O Comitê de Contramedidas rebate que isso é um absurdo. No meio disso, a dívida é aumentada abruptamente e o grupo fica furioso, mas Hoshino os adverte que não adianta continuar discutindo, e decidem recuar por enquanto."
1186755748 = "Alguns Segredos"
1335785770 = "Depois de mandar todos do Comitê de Contramedidas, exceto Hoshino, para casa, ela revela ao Sensei sobre a proposta que recebeu do homem de preto. O Sensei diz a Hoshino: \"Vou encontrar uma maneira.\" No dia seguinte, porém, Hoshino desaparece deixando um pedido de demissão do clube."
3736543421 = "O Que Escapou por Entre os Dedos"
283862884 = "Na carta de Hoshino, estava escrito que, tornando-se mercenária da PMC, ela poderia reduzir significativamente a dívida do Colégio Abydos. Enquanto todos estão confusos com o conteúdo da carta, os soldados da PMC começam a se reunir para ocupar o Colégio Abydos……"
3093070589 = "Batalha de Abydos (1)"
310065573 = "Hoshino pressiona o Homem de Preto dizendo que foi diferente do prometido, por ele atacar Abydos, mas é informada de que ela era o alvo desde o início e é contida. Ao mesmo tempo, o Comitê de Contramedidas de Abydos está mentalmente encurralado e em situação desesperadora. Quem aparece são os Serviços de Prestação 68, que deveriam ter deixado Abydos."
3717760490 = "Batalha de Abydos (2)"
91688092 = "O diretor da Kaiser Corporation se enfurece com o imprevisto. Sob o comando do Sensei, o Comitê de Contramedidas enfrenta a PMC junto com os Serviços de Prestação."
1667111875 = "Batalha de Abydos (2)"
2023302413 = "Após uma intensa batalha, conseguem fazer os soldados da PMC recuarem. Para encontrar uma maneira de recuperar Hoshino, o Sensei vai até o Homem de Preto."
4255678286 = "Batalha de Adultos"
477790762 = "O Homem de Preto propõe que, se entregarem Hoshino, ele dará um jeito na sobrevivência do Colégio Abydos, mas a negociação fracassa. O Sensei [USERNAME] elabora um plano para salvar Hoshino."
3792141633 = "O Que Quero Proteger"
2496658941 = "O Sensei visita a Academia Gehenna e a Escola Geral Trinity em busca de ajuda. Quase ao mesmo tempo, os membros dos Serviços de Prestação, que estavam comendo lámen na barraca reaberta do Mestre Shiba, decidem(?) ajudar o Comitê de Contramedidas novamente."
488859086 = "O Que Quero Proteger"
4228298238 = "Quem se coloca diante dos reforços da Kaiser PMC são Hina e os membros do Comitê Disciplinar de Gehenna. Para ajudar o Comitê de Contramedidas de Abydos, elas enfrentam a PMC."
1752199803 = "O Que Mesmo Assim Não Foi Abandonado (1)"
2389071401 = "O que chega ao Comitê de Contramedidas, que estava prestes a enfrentar as forças inimigas, é o fogo de apoio da Escola Geral Trinity, de Hifumi e outros. Aproveitando a brecha da confusão, o Comitê de Contramedidas rompe as linhas inimigas."
2315302090 = "O Que Mesmo Assim Não Foi Abandonado (1)"
2958239043 = "O Comitê de Contramedidas chega ao antigo prédio principal do Colégio Abydos. O diretor da Kaiser Corporation e os soldados da PMC se colocam diante deles, mas os Serviços de Prestação 68, que chegam atrasados, assumem a situação."
465533926 = "O Que Mesmo Assim Não Foi Abandonado (2)"
3049385587 = "Embora localizem Hoshino, o diretor da Kaiser Corporation novamente se coloca no caminho. Mesmo assim, para resgatar Hoshino, o Comitê de Contramedidas avança."
3889357593 = "O Que Mesmo Assim Não Foi Abandonado (2)"
4091157200 = "Após uma longa batalha, o Comitê de Contramedidas consegue resgatar Hoshino com sucesso. Diante de todos que dizem \"Bem-vinda de volta\", Hoshino sorri e responde \"Estou de volta\"."
460663098 = "Epílogo"
1819455677 = "A série de incidentes chega a um fim, e o Sensei [USERNAME] recebe uma carta de Ayane. Nela, está escrito que, embora não tenham conseguido pagar a dívida completamente, a situação melhorou um pouco, e que, graças ao Sensei, conseguiram proteger o cotidiano do Comitê de Contramedidas……"
451759275 = "Prólogo"
1467700440 = "Nas profundezas, o ex-Gematria despertado por Francis começa a agir. Enquanto isso, o Grupo Kaiser coloca os títulos de dívida do Colégio Abydos à venda. O Comitê de Contramedidas tenta comprar os títulos, mas eles se esgotam. Ao investigar quem comprou os títulos de Abydos, encontram o nome do Grupo Nephthys."
2836028392 = "Visita Indesejada"
2468775960 = "O Comitê de Contramedidas obtém uma informação: a Nephthys Company comprou os títulos da Kaiser para adquirir todos os direitos da Ferrovia Transdesértica de Abydos. Enquanto se perguntam por que compraram os direitos da ferrovia transdesértica, uma visita indesejada aparece."
2578507434 = "Academia Ferroviária Highlander (1)"
792808784 = "Quem atacou a região autônoma de Abydos foram Nozomi e Hikari, executivas do CCC da Academia Ferroviária Highlander. Para impedi-las de forçar o desenvolvimento da Ferrovia Transdesértica, o Comitê de Contramedidas entra em ação."
2748777627 = "Academia Ferroviária Highlander (2)"
171315427 = "O Comitê de Contramedidas e o Sensei impedem o ataque da Academia Ferroviária Highlander. Quem aparece então é Suou, a supervisora da Academia Ferroviária Highlander. Ela diz que explicará a situação depois e deixa o local com Nozomi e Hikari."
809304558 = "Aqueles que Fluem"
2228531499 = "Voltando um pouco no tempo…… Nonomi, que se formou no ensino médio, está preocupada em prosseguir para a Academia Ferroviária Highlander como planejado. Enquanto isso, no atual Colégio Abydos, o Comitê de Contramedidas verifica informações sobre a Academia Ferroviária Highlander. Nesse momento, Suou e os outros aparecem novamente."
2066588167 = "Ferrovia Transdesértica"
3245151085 = "O grupo da Academia Ferroviária Highlander visita a sala de aula do Comitê de Contramedidas junto com os credores. O representante do grupo de credores mostra um contrato assinado por Yume para explicar seu objetivo."
4109224623 = "Contrato"
206294631 = "O motivo da visita do grupo de credores era perguntar sobre a possibilidade de prosseguir com um contrato que tratava dos direitos de operação das instalações anexas de propriedade do Conselho Estudantil de Abydos. O Sensei pede tempo para pensar, e o grupo de credores vai embora dizendo para decidirem até dois dias depois, quando a validade do contrato expira. Para decidir o rumo a seguir, Hoshino começa a falar sobre eventos passados. Nesse momento, descobrem que a data do contrato é a mesma data em que Yume desapareceu."
3326988594 = "Limite do Corpo"
2464018339 = "Hoshino vai até a cidade onde conheceu Yume pela primeira vez. Shiroko segue Hoshino, mas a perde. Nonomi contata o mordomo para investigar, mas ele diz que é pela Nephthys e se esquiva. Ayane sente uma estranheza na situação, mas considera o cansaço de todos e decide adiar. Enquanto isso, nas profundezas, os Habitantes do Subterrâneo estão prestes a se mover a sério……"
3791222139 = "Conselho Estudantil de Abydos (1)"
4172510105 = "O Sensei cai em crise pelas mãos dos Habitantes do Subterrâneo. Enquanto isso, Hoshino, que estava na cidade abandonada, relembra o primeiro encontro com Yume."
2618425109 = "Conselho Estudantil de Abydos (2)"
4214382824 = "Os membros do Comitê de Contramedidas, exceto Hoshino, decidem entrar na sala do conselho estudantil para conhecer o passado de Hoshino. Mas Hoshino aparece lá."
2384190148 = "Aquele Dia"
3030051441 = "Hoshino conta seu passado aos companheiros do Comitê de Contramedidas. Ela rasgou o pôster do Festival da Areia que Yume tinha e negou o futuro cheio de esperança que ela falava. Yume, com quem brigou e se separou, acabou desaparecendo. Enquanto o passado de Hoshino é revelado, uma certa pessoa chega a Abydos."
3708666348 = "Segredo Revelado"
3744933892 = "Quem visita Abydos é Suou e um executivo da Nephthys. E então é revelado o terrível segredo escondido na Ferrovia Transdesértica. Como forma de resolver isso, o executivo da Nephthys propõe a Nonomi que se matricule novamente na Highlander."
3567623092 = "O Início do Comitê de Contramedidas"
508127969 = "Hoshino relembra várias coisas, como o primeiro encontro com Shiroko e quando Serika e Ayane vieram para o Colégio Abydos. E o tempo retorna ao presente. O Comitê de Contramedidas decide ir para o antigo prédio do governo, mas então chega a notícia de que o Sensei desmaiou."
2830502693 = "Refém"
3676288734 = "Nonomi tenta persuadir o lado da Nephthys, mas acaba se tornando refém. A Nephthys ameaça o Comitê de Contramedidas para invalidar o contrato usando Nonomi. Diante disso, Hoshino tenta resolver o problema sozinha, mas Shiroko se coloca em seu caminho."
303369912 = "Comitê de Contramedidas"
2939285746 = "Hoshino controla Shiroko com uma diferença de poder esmagadora. Depois, Ayane e Serika enfrentam Hoshino."
76556335 = "Ordem da Vice-Presidente do Conselho Estudantil"
3023125627 = "Serika e Ayane são derrotadas. Hoshino dá a ordem como vice-presidente do conselho estudantil de confiar o futuro de Abydos às duas e vai sozinha até Nonomi."
3787477164 = "Contra-Ataque"
2641772784 = "Suou informa ao fundo de investimento privado que a Nephthys traiu. Enquanto isso, quem aparece em Abydos é o Sensei, que recobrou a consciência. O Sensei usa a vacância do cargo de presidente do conselho estudantil para eleger Ayane como presidente. Ayane então usa sua autoridade para declarar nulas as ações de Hoshino e parte para o contra-ataque junto com o Sensei."
2386655349 = "Perseguição"
325048971 = "O Sensei e o Comitê de Contramedidas dirigem-se ao antigo prédio do governo para salvar Nonomi. Enquanto isso, Hoshino subjuga rapidamente as tropas do fundo de investimento privado e avança para o antigo prédio do governo."
1133678474 = "Perseguição"
3426514234 = "Hoshino, que demonstrou força esmagadora, apressa-se. O Comitê de Contramedidas e o Sensei, não querendo ficar para trás, perseguem Hoshino novamente."
2385018294 = "Grande Confusão"
410768358 = "A Kaiser PMC, que estava de mãos dadas com a Nephthys, trai a Nephthys e tenta tomar o canhão ferroviário. Hoshino inicia o combate com a PMC que bloqueia o caminho para o antigo prédio do governo."
2238279328 = "Grande Confusão"
2445287877 = "Hoshino derrota o General e se dirige novamente ao antigo prédio do governo. Enquanto isso, o Sensei e o Comitê de Contramedidas ajudam os alunos da Highlander e perseguem Hoshino."
3612354256 = "Assembleia Geral dos Credores"
276803654 = "Nonomi fica furiosa ao saber que a Nephthys cooperou com a PMC. Hoshino chega até Nonomi e tenta libertá-la, mas Nonomi diz que vai se transferir de Abydos. O Comitê de Contramedidas chega atrasado. Mas o Presidente declara unilateralmente a anulação do contrato e sai."
3243553383 = "Assembleia Geral dos Credores"
160618110 = "Hoshino e o Comitê de Contramedidas conseguem resgatar Nonomi. Mas, mal terminam a alegria do reencontro, Hoshino, após confirmar que Nonomi está bem, deixa o local deixando todos para trás."
1860528585 = "Caça ao Tesouro"
3956099477 = "Suou e o Presidente da Kaiser estão a bordo de um helicóptero. No momento em que o Presidente tenta celebrar a vitória, Suou o derruba do helicóptero. Suou diz a Hoshino que, se quiser parar o canhão ferroviário, vá para o Vale do Conselho Estudantil. Enquanto isso, o Presidente derrubado fica furioso e ordena a convocação de todas as forças da Kaiser Corporation."
1239708147 = "Segunda Perseguição"
984232866 = "Depois de ajudar o fundo de investimento privado, o grupo de Abydos e o Sensei procuram uma maneira de ir para o Vale do Conselho Estudantil. Quem se levanta para ajudar são o executivo da Nephthys e o CCC da Highlander. Enquanto isso, Hoshino chega à estação de bifurcação onde uma vez caçou tesouros com Yume e parte com um trem para ir ao Vale do Conselho Estudantil."
3256145921 = "Segunda Perseguição"
2322627376 = "O Comitê de Contramedidas e o Sensei, embarcados no trem de Nozomi e Hikari, são perseguidos pela Kaiser PMC."
517692600 = "Trem Desgovernado"
598179026 = "O Comitê de Contramedidas e o Sensei, perseguidos pela Kaiser PMC, recebem uma proposta de Nozomi e Hikari."
2087719702 = "Trem Desgovernado"
754525061 = "O trem colide como planejado por Nozomi e Hikari. Depois, Hikari e Nozomi são capturadas pela Kaiser PMC. O Comitê de Contramedidas e o Sensei, que conseguiram avançar em segurança, chegam à estação de bifurcação e partem com o trem. Enquanto isso, Hoshino, que chegou ao Vale do Conselho Estudantil, descobre o segredo escondido na Ferrovia Transdesértica."
3408172578 = "Vale do Conselho Estudantil"
638321793 = "Hoshino encontra o canhão ferroviário. Diante dela, surge Suou. Ela diz que, se quiser parar o canhão ferroviário, deve derrotá-la, e tira o cartão de Nonomi. Era algo necessário para destruir o canhão ferroviário."
768493918 = "Canhão Ferroviário Shemata"
2040799108 = "Hoshino consegue subjugar Suou. No entanto, Suou não reconhece a derrota e desafia Hoshino novamente. Enquanto isso, os alunos de Abydos e o Sensei chegam ao Vale do Conselho Estudantil. No momento em que avistam o canhão ferroviário, um tiro ecoa……"
1210234653 = "A Última Batalha (1)"
1002703607 = "Hoshino derrota Suou pela segunda vez. No momento em que ela se move para destruir o canhão ferroviário, os alunos de Abydos e o Sensei se colocam em seu caminho, dando início ao combate."
3797362856 = "A Última Batalha (2)"
3271869069 = "O Comitê de Contramedidas é derrotado e abatido por Hoshino. Shiroko, levantando-se sozinha, enfrenta Hoshino mais uma vez."
1886723209 = "Uma Disputa Decidida Por Um Triz"
2759992648 = "Finalmente, Shiroko derrota Hoshino, e o Comitê de Contramedidas e o Sensei conseguem persuadi-la. No entanto, o crucial canhão ferroviário é tomado por Suou. Ela parte com ele para destruir Abydos. Hoshino, sozinha, deixa o local para persegui-la. Enquanto o desespero paira sobre os membros restantes do Comitê de Contramedidas, o Sensei pede ajuda a uma certa pessoa."
3121219489 = "Batalha Intensa (1)"
2950950386 = "A pessoa a quem o Sensei pediu ajuda…… era Hina. Hoshino confronta Hina, que a aguardava dentro da estação de bifurcação."
3427914090 = "Batalha Intensa (2)"
2436668033 = "Hina e Hoshino se chocam com toda a força. Os efeitos colaterais da batalha cobrem o trem que seguia para a estação do Grande Oásis."
3101230762 = "A Existência do Caderno"
3803574396 = "O trem, gravemente danificado, finalmente chega ao seu destino. Sobre o trem em chamas, Hoshino relembra seu passado com Yume."
3874918946 = "A Única Verdade (1)"
132408451 = "Hina transmite a Hoshino, que está caída, a verdade sobre Yume. Enquanto isso, o Sensei e o Comitê de Contramedidas, que alcançaram o canhão ferroviário com a ajuda de Nozomi e Hikari, lançam um ataque surpresa contra ele."
1382356128 = "A Única Verdade (2)"
1456203716 = "Hoshino, atordoada e perdida, fica presa à morte de Yume. E então, através de um estratagema dos Habitantes do Subterrâneo, Hoshino renasce como uma existência completamente diferente."
3864663142 = "Manifestação"
2262723767 = "Para deter Hoshino, cuja existência foi invertida, o Comitê de Contramedidas e o Sensei a desafiam, mas todos caem diante de seu poder avassalador. Além disso, a \"Fúria de Set\" reage a Hoshino e começa a se manifestar. Arona e Plana dizem que a colisão entre Hoshino e Set trará a destruição ao mundo. Em meio a essa situação desesperadora, Shiroko tenta entrar em contato com a Cor para salvar a todos."
938761530 = "Desculpas"
1220924498 = "O Sensei encontra Yume em um espaço misterioso. Não se pode mudar o passado. Apenas agora, salvar a criança que está ao seu alcance. O Sensei faz esse juramento."
675540194 = "Terror VS Terror"
3143101973 = "Plana usa o poder da Cor a seu favor. Shiroko＊Terror, invocada por isso, confronta a transformada Hoshino."
2218727448 = "Terror VS Terror"
37327455 = "Os Habitantes do Subterrâneo, ao testemunharem Shiroko＊Terror, enfrentam a situação impossível de duas existências sagradas simultâneas, e partem para o último recurso."
1657311791 = "Caderno"
3366159078 = "O Comitê de Contramedidas e o Sensei buscam uma maneira de salvar Hoshino. Acreditava-se que o Místico, uma vez revertido em terror, não poderia ser restaurado, mas ao perceberem que Hoshino não foi completamente revertida, todos tentam resgatá-la apostando em uma pequena possibilitàdade."
3926366854 = "Caderno"
926354967 = "O Sensei e o Comitê de Contramedidas, que finalmente conseguem se aproximar de Hoshino, tentam transmitir a ela seus sentimentos."
319388679 = "O Que Deve Ser Transmitido"
1570618741 = "O Comitê de Contramedidas transmite a Hoshino o que queria dizer. No entanto, o plano final dos Habitantes do Subterrâneo faz com que a \"Fúria de Set\" se manifeste completamente."
2188327975 = "Promessa"
1072185142 = "No momento em que o Comitê de Contramedidas enfrenta uma crise desesperadora, Hoshino, em um espaço onde não se pode distinguir sonho e realidade, encontra \"aquela pessoa\" que ela desejava reencontrar."
3773443473 = "Remoção de Restrições"
2340870041 = "Hoshino consegue um retorno milagroso da \"Reversão\". Tendo se reunido com Hoshino e recebido Shiroko＊Terror, o Comitê de Contramedidas enfrenta a batalha final contra a \"Fúria de Set\" e os Habitantes do Subterrâneo que existem por trás dela."
1985827982 = "As Pegadas Deixadas Pelos Sonhos"
1022838518 = "Após o fim da batalha, o que se espalha pelo oásis são belas chamas azuis. Sua verdadeira identidade são minerais valiosos enterrados no deserto que Hoshino e Yume procuraram. Hoshino contempla as pegadas deixadas por Yume."
2405249657 = "O Que Foi Deixado"
4258312221 = "O cotidiano retorna. Os dias daqueles que foram deixados para trás continuam."
990172089 = "Epílogo (1)"
2169764773 = "Hoshino decide se tornar a presidente do Conselho Estudantil de Abydos. Enquanto isso, Hina e Makoto decidem destruir o canhão ferroviário, legado do Imperador do Trovão. Nonomi e Suou também se dedicam a resolver as questões que restaram, e a região autônoma de Abydos recupera sua vitalidade depois de muito tempo."
1959390195 = "Epílogo (2)"
832014371 = "O Sensei encontra Shiroko＊Terror e lhe transmite as palavras que queria dizer. Como que em resposta, Shiroko＊Terror grava em seu coração o sentimento de aceitar toda a dor e felicidade e seguir em frente."
108666912 = "Prólogo"
3860334718 = "Seia fala sobre o 'Tratado do Éden', os 'Sete Preceitos Antigos' e o 'Paraíso'. Ela diz ao Sensei palavras um tanto sinistras."
3383571419 = "Aula de Recuperação"
1483887365 = "Na sala de aula estão reunidos o Sensei, Hifumi, Hanako, Azusa e Koharu. Enquanto Hifumi acalma Koharu, que está fazendo um escândalo por causa da possível expulsão, o Sensei relembra o que aconteceu algumas semanas atrás, que foi o início de tudo."
4127233795 = "Tea Party"
2556827456 = "O Sensei, convidado por Nagisa e Mika, as presidentes do conselho estudantil de Trinity, visita o Tea Party. Ele é solicitado a se tornar o Sensei responsável pela 'Aula de Recuperação', que reúne alunos à beira da reprovação, e aceita. Na lista da Aula de Recuperação, ele vê um nome conhecido e, pensando que não poderia ser, vai para a sala de aula e reencontra Hifumi, a presidente do clube."
2736401965 = "As Alunas da Aula de Recuperação (1)"
2320947204 = "O Sensei decide ir com Hifumi encontrar os outros membros da Aula de Recuperação. Os dois encontram 'Hanako', que estava detida pelo Comitê de Realização da Justiça, e 'Azusa', que foi capturada após lutar contra o comitê."
4288766681 = "As Alunas da Aula de Recuperação (2)"
1080677386 = "O Sensei tenta fazer com que Hanako e Azusa sejam entregues, mas é rejeitado por Koharu, do Comitê de Realização da Justiça. Enquanto é persuadida por sua veterana Hasumi, Koharu zomba dizendo que 'a Aula de Recuperação é vergonhosa', mas descobre-se que ela também será um membro da Aula de Recuperação. Apesar de arrastar o dano de suas próprias palavras, Koharu finalmente completa o grupo da Aula de Recuperação."
1381682562 = "Vamos nos Apresentar!"
3807799700 = "A Aula de Recuperação se reúne novamente. Com a regra de que 'se todos passarem juntos pelo menos uma vez em três tentativas, está OK' sendo apresentada, eles fazem leves apresentações pessoais, revelando sutilmente as circunstâncias de cada um. 'Vamos todos nos esforçar e superar isso juntos……' Nesse clima, Koharu diz confiante: 'Eu sou elite! Vou sair daqui rapidinho!'."
3720628732 = "Estudando Para a Prova"
968959922 = "Os alunos da Aula de Recuperação se preparam para o primeiro exame, estudando com a ajuda do Sensei e ensinando uns aos outros. Azusa tem grande vontade de aprender, Hanako parece ser bastante culta, e Koharu diz que está tranquila (segundo ela). Enquanto o clima geral é bom, Hifumi revela secretamente o fato de que 'se houver reprovados no primeiro exame, haverá um acampamento de estudos obrigatório'."
42497510 = "1º Exame Especial de Proficiência"
2338283664 = "Durante o exame, Hifumi fica aliviada ao ver que o conteúdo estudado aparece exatamente igual e que a dificuldade do exame é consideravelmente baixa. No entanto, quando os resultados saem, todos, exceto Hifumi, são reprovados. Assim, é decidido que o acampamento de estudos da Aula de Recuperação será realizado."
604324422 = "Sombras que Oscilam Sob a Superfície"
3378221237 = "O Sensei pergunta a Nagisa o que acontecerá se os alunos da Aula de Recuperação falharem nos três exames. Nesse caso, é claro que 'todos serão expulsos', e Nagisa revela que a Aula de Recuperação foi criada desde o início para expulsar alunos. O 'traidor' que tenta impedir a conclusão do Tratado do Éden deve estar entre os membros da Aula de Recuperação. Nagisa pede ao Sensei que descubra quem é o traidor……"
3020153020 = "Começa o Acampamento de Estudos!"
2563693133 = "Para realizar o acampamento de estudos, o grupo da Aula de Recuperação visita o anexo de Trinity. Logo após a chegada, eles já estão atrapalhados, mas decidem que, de qualquer forma, o primeiro passo é começar pela limpeza."
660461531 = "Grande Faxina!"
198950639 = "Depois de terminar a limpeza geral, Hanako propõe limpar a piscina para brincar na água. Antes de começar os estudos a sério, todos se trocam e começam a limpar a piscina juntos, ficando completamente encharcados."
4233186689 = "A Primeira Noite do Acampamento de Estudos"
2960849454 = "Na primeira noite, Hifumi visita o Sensei. Ao ouvir o conteúdo da conversa com Nagisa, o Sensei diz a Hifumi: 'Deixe esse assunto comigo'. Quase ao mesmo tempo, Azusa e Hanako, que estavam de guarda, se encontram……"
3382766713 = "Simulado da Aula de Recuperação"
848842177 = "Hifumi cria um simulado pensando no que pode fazer, mas o resultado é um fracasso total de todos, exceto Hifumi. Mesmo assim, eles elaboram contramedidas e ela declara que, se tirarem uma boa nota, dará produtos dos Momo Friends de presente. Hanako e Koharu reagem de forma ambígua, mas os olhos de Azusa começam a brilhar……?"
3534072072 = "A Vice-Presidente do Comitê de Realização da Justiça (1)"
17674601 = "Durante o estudo individual, Koharu é pega com um livro erótico na bolsa. Mas, na verdade, era um item confiscado durante as atividades do Comitê de Realização da Justiça, que ela trouxe por engano. Antes que a confusão aumente, é melhor devolvê-lo, e Koharu e o Sensei se dirigem à sala do Comitê de Realização da Justiça."
3592313078 = "A Vice-Presidente do Comitê de Realização da Justiça (2)"
2059845093 = "Enquanto Koharu explica novamente ao Sensei de forma apressada, o Sensei diz: 'Você não precisa se prender a isso'. Ao ouvir isso, Koharu decide confessar ao Sensei que ela é uma espiã. Depois, quando devolve o item confiscado, ela encontra Hasumi, que começa a conversar algo em segredo com Koharu……?"
773890837 = "Uma Pequena Brecha"
1756837627 = "Durante a conversa entre Hanako e Koharu, Azusa menciona os 'Sete Preceitos Antigos'. Hanako demonstra grande surpresa com isso. Naquela noite, Hifumi visita o Sensei e conta um fato que descobriu enquanto criava o simulado. O conteúdo era que Hanako é, sem dúvida, uma excelente aluna, e que ela está falhando nos exames de propósito. Na manhã seguinte a essa confusão, Mika visita o Sensei……"
135674395 = "O Traidor de Trinity"
892831890 = "Mencionando a conversa com Nagisa, Mika faz uma proposta ao Sensei e diz que lhe contará quem é o 'traidor de Trinity'. O nome é 'Azusa Shirasu'. Mika continua dizendo para proteger Azusa."
3021188189 = "Monstro Gigante"
3984423781 = "Mika diz que Nagisa pode estar tramando algo através do Tratado do Éden. Ao falar sobre seus próprios objetivos e pedir para proteger Azusa, Mika diz que, no final, quer que o Sensei decida se acredita em Nagisa ou nela."
1502378419 = "Irmandade"
1398806955 = "Um dia, Marie, da Irmandade, visita a Aula de Recuperação durante o acampamento. Parece que ela veio agradecer em nome de um aluno que Azusa ajudou anteriormente. Naquela noite, Hifumi visita o Sensei para discutir os próximos passos, ou assim se pensava……?"
3715954097 = "Encontro Secreto na Calada da Noite"
1999585029 = "Hanako, preocupada com Azusa, visita o Sensei. No decorrer da conversa, ela também fica sabendo que 'se falharem três vezes, todos serão expulsos', e Hanako deduz ainda mais os assuntos ocultos por trás disso. Após a explicação, ela declara que se esforçará para não causar mais problemas nos próximos exames, mas parece estar se divertindo com essa situação de encontro secreto noturno. No entanto, ao sair do quarto do Sensei com Hifumi, ela é vista por Koharu, que estava indo ao banheiro……?"
3916469784 = "Festa de Maiô"
3001743394 = "Devido a uma chuva repentina, todas as roupas lavadas ficam molhadas, e o grupo da Aula de Recuperação, sem ter mais o que vestir, decide fazer uma festa de maiô em vez de uma festa de pijama. Com uma amizade mais profunda do que antes, elas conversam sobre vários assuntos e passam um tempo divertido como estudantes. Nesse clima, decidem sair do alojamento para um passeio noturno, aproveitando a essência do acampamento de estudos."
1861044050 = "Grande Tumulto da Meia-Noite (1)"
3288144026 = "Saindo do alojamento para um passeio noturno, o grupo da Aula de Recuperação entra em uma loja de doces e encontra Hasumi, vice-presidente do Comitê de Realização da Justiça. Hasumi diz: 'Vamos fingir que não vimos um ao outro' e elogia o esforço de Koharu. Nesse momento, chega a informação de que o 'Clube de Gastronomia' está causando tumulto."
391890716 = "Grande Tumulto da Meia-Noite (2)"
749962361 = "Nesta situação, às vésperas do Tratado do Éden, Hasumi julga que não seria bom parecer que Gehenna e Trinity estão em confronto direto e pede ajuda à Aula de Recuperação e à Schale. Enquanto Koharu fica animada por ficar ao lado de Hasumi, todos partem para conter a situação."
2432925314 = "Grande Tumulto da Meia-Noite (2)"
4237665195 = "Graças à atuação do Sensei e da Aula de Recuperação, a situação é controlada. Os membros do Clube de Gastronomia que fugiram também são perseguidos pelo Comitê de Realização da Justiça, e tudo termina bem."
781465669 = "Novo Ponto de Vista"
1190877624 = "Quem aparece para levar os membros do Clube de Gastronomia são Hina, do Comitê Disciplinar, e Sena, do Departamento de Medicina de Emergência. Após cumprimentar Sena pela primeira vez, o Sensei pergunta a Hina sua opinião sobre o Tratado do Éden."
3667360070 = "Esperança que Irrompe"
3554655960 = "Depois de continuar estudando, o grupo da Aula de Recuperação finalmente consegue, ainda que em um simulado, que todos tirem notas para passar. Para comemorar, Hifumi, animada, começa uma cerimônia de entrega de produtos Momo Friends. Embora Hanako e Koharu tenham recusado, Azusa parece extremamente animada. Abraçando o produto que Hifumi escolheu para ela, Azusa diz feliz que o guardará para sempre, como prova de seu esforço e como o primeiro presente de uma amiga. Assim, pouco antes do 2º Exame Especial de Proficiência, o Sensei é convocado por Nagisa……"
3715486889 = "Mão Negra"
1616621734 = "O Sensei diz novamente a Nagisa que não pretende perder tempo desconfiando de alguém. Ao ouvir a história de Nagisa, o Sensei diz: 'Você certamente está nas trevas da desconfiança', e declara que a tirará de lá e que fará com que todos da Aula de Recuperação passem."
194293672 = "2º Exame Especial de Proficiência (1)"
2202623311 = "Na véspera do 2º Exame Especial de Proficiência, o grupo da Aula de Recuperação fica confuso com as mudanças repentinas no conteúdo, na linha de corte e no local do exame. No entanto, com as palavras de Azusa de que 'só nos resta lutar até o fim', todos se dirigem ao local do exame na região autônoma de Gehenna."
1942601069 = "2º Exame Especial de Proficiência (1)"
1391275365 = "No caminho para a região autônoma de Gehenna, o caminho é bloqueado por delinquentes, mas o grupo da Aula de Recuperação consegue avançar à força."
644321687 = "2º Exame Especial de Proficiência (2)"
3226156325 = "O grupo da Aula de Recuperação entra na região autônoma de Gehenna, mas seu caminho é bloqueado pelo Comitê Disciplinar. Devido à aparência de Koharu, eles são confundidos com um ataque do Comitê de Realização da Justiça e quase entram em combate, mas são salvos pelos membros do Clube de Gastronomia. Conseguindo passar por entre explosões e tiros, o grupo chega ao local do exame, mas os obstáculos de Nagisa não param por aí……!?"
4130588728 = "De Volta ao Ponto de Partida"
1896656556 = "Testemunhando os obstáculos no 2º Exame Especial de Proficiência, o grupo da Aula de Recuperação percebe que o Tea Party está realmente tentando expulsá-los. O Sensei também tenta entrar em contato com Nagisa e Mika, mas não consegue, e não vê uma saída. Naquela noite, Hanako segue Azusa, que saiu do quarto sozinha……"
2549930740 = "Mesmo Assim"
2270700848 = "Mesmo encurralados, o grupo da Aula de Recuperação continua se esforçando sem desistir. Para o último exame, eles continuam estudando com afinco para superar juntos as barreiras irracionais. E na noite anterior ao último exame, Azusa se encontra secretamente com uma garota chamada 'Saori', enquanto Hanako observa escondida."
1916659997 = "Confissão"
4166289180 = "Enquanto Hifumi, Hanako e Koharu, que não conseguiam dormir, visitam o Sensei e discutem sobre mais atos de obstrução, Azusa, que voltou de algum lugar, confessa que ela é a 'traidora de Trinity'. No entanto, o Sensei nega, e Hanako, que parecia prestes a condená-la, também mostra empatia mencionando a história de 'alguém'. Não querendo desistir de nada, todos começam a agir com base no plano de Hanako."
742150805 = "O Estopim é Aceso"
1216430353 = "Azusa e Hanako, antecipando-se a Arius, conseguem sequestrar Nagisa. Usando as armadilhas que preparou, Azusa entra em combate com Arius."
492008709 = "Batalha Intensa"
3128498563 = "Embora em número bastante reduzido, Arius ainda encurrala Azusa e Hanako. No entanto, essa situação é uma armadilha armada pelo grupo da Aula de Recuperação. O Sensei, Hifumi e Koharu se juntam a elas, e a batalha começa em uma situação sem saída para o inimigo."
707844123 = "Um Mundo Assim Também (1)"
4054359883 = "O grupo da Aula de Recuperação consegue de alguma forma neutralizar os alunos de Arius, mas os reforços chegam mais cedo do que o esperado e, por algum motivo, o Comitê de Realização da Justiça também não se move. Quando Hanako está questionando isso, Mika, do Tea Party, aparece. Ela confessa ser a 'verdadeira traidora de Trinity', revela seu plano e ordena a Arius que acabe com a Aula de Recuperação."
28576329 = "Um Mundo Assim Também (1)"
2791097982 = "Embora o combate continue, vendo que o grupo não cai facilmente, Mika se admira, pensando se esse é o poder do 'adulto' e da 'Schale'. Nesse momento, ela menciona Seia e, quando Azusa fica abalada, a 'Irmandade', que não deveria se mover, entra na batalha."
3198842828 = "Um Mundo Assim Também (2)"
141133620 = "Devido a um estratagema de Hanako, a Irmandade, que normalmente não interferiria, entrou em ação. Sakurako Utazumi, da Irmandade, declara que, embora vá contra os costumes, elas intervirão, e o combate com Mika e os outros começa."
2850369990 = "Um Mundo Assim Também (2)"
3969728237 = "Mika é derrotada diante da Aula de Recuperação, da Schale e da Irmandade. Ao saber de um novo fato contado por Hanako, ela se sente aliviada e admite sua derrota, rendendo-se. Ao se despedir do Sensei, ela diz que as palavras dele naquele momento a deixaram realmente feliz e pensa no mundo que poderia ter existido. Com um sorriso inexplicável, Mika se despede do Sensei."
1709755666 = "3º Exame Especial de Proficiência"
1682079203 = "Depois de superar muitos percalços e continuar correndo, o grupo da Aula de Recuperação finalmente chega ao local do último exame. Os esforços delas até agora dão frutos, e todas conseguem passar no exame."
3889889279 = "Epílogo"
1853472011 = "Embora reconheça os esforços até agora, Seia diz ao Sensei que ainda não acabou. Então, o Esquadrão Arius finalmente começa a se mover……"
1023493496 = "Post-Mortem (1)"
2817792322 = "Seia fala calmamente com a pessoa que veio atacá-la. Quando ela pergunta sobre o futuro, o Sensei acorda. Depois, o Sensei ouve de Sakurako o desfecho do incidente do ataque a Seia……"
2940097782 = "Post-Mortem (2)"
3560240457 = "Sakurako, da Irmandade, reconhece o resultado de Azusa e, sob a garantia da Irmandade, ela se torna oficialmente aluna de Trinity. Enquanto Hanako e o Sensei ficam aliviados com isso, a conversa se volta para o caso de Nagisa e Mika."
3451183696 = "Post-Mortem (3)"
1609767318 = "Seguindo Nagisa, Hanako também visita Mika na prisão. Diante de Mika, Hanako expressa suas suposições sobre os motivos dela, mas……"
3155433875 = "E Então"
1648638504 = "Embora ainda haja vários problemas, a vida cotidiana pacífica e tranquila continua em Trinity. Nessa época, o Sensei visita Gehenna e vai encontrar Makoto, Hina e os outros……?"
4236130409 = "Cerimônia de Assinatura do Tratado do Éden (1)"
1627449016 = "Finalmente, o dia da cerimônia de assinatura do Tratado do Éden. Enquanto Shinon, da Kronos, transmite a situação e o clima é de animação, o grupo da Aula de Recuperação está dando uma pequena festa em um restaurante familiar para comemorar a aprovação."
1969944314 = "Cerimônia de Assinatura do Tratado do Éden (2)"
646905301 = "O Sensei, guiado por Hinata da Irmandade, entra na 'Velha Catedral da Comunhão' e ouve histórias sobre a história de Trinity. Ao mesmo tempo, o Esquadrão Arius inicia sua operação. No céu de Trinity, mísseis traçam suas trajetórias --"
1269971397 = "O Dia Manchado de Fogo e Cinzas (1)"
774689524 = "O bombardeio de mísseis causa grande confusão nas redondezas. Aproveitando a brecha, os membros do Esquadrão Arius se infiltram no subsolo da velha catedral. Diante da situação repentina, Tsurugi e Hasumi do Comitê de Realização da Justiça, e Hinata, revidam."
4175188383 = "O Dia Manchado de Fogo e Cinzas (1)"
1651414121 = "Enquanto revidam, Tsurugi, Hasumi e os outros sentem uma estranheza no comportamento do oponente. Hinata, vendo aquilo, diz que eles são o 'Conselho dos Santos de Justina'."
499449077 = "O Dia Manchado de Fogo e Cinzas (2)"
2565238774 = "Hinata da Irmandade, Tsurugi e Hasumi do Comitê de Realização da Justiça, e Hina do Comitê Disciplinar de Gehenna. Enquanto protegem o Sensei, eles continuam lutando contra o Conselho dos Santos de Justina."
878733393 = "Confirmação do Ódio"
361954059 = "Hina e o Sensei, enviados por Hasumi e os outros, encontram muitos adversários bloqueando o caminho. Hiyori, do Esquadrão Arius, também entra na luta, e o combate continua."
288823100 = "Confirmação do Ódio"
3006327975 = "Saori, declarando que Arius assinou o Tratado do Éden, fala sobre o ódio acumulado até agora e aponta sua arma para o Sensei. O Sensei acaba sendo baleado, mas consegue escapar de alguma forma graças a Hina do Comitê Disciplinar e Sena do Departamento de Medicina de Emergência. Desmaiado, o Sensei encontra Seia em um sonho……"
3724307009 = "Doce Mentira"
272157938 = "No sonho, o Sensei reencontra Seia. Ela fala sobre o Tratado do Éden e Gematria. Enquanto isso, Azusa, que entrou em combate com Arius, não consegue enfrentá-los de frente e foge de alguma forma."
1624201610 = "Caos Acelerado (1)"
2195551207 = "Hanako vai acalmar a confusão na Irmandade no lugar de Sakurako, enquanto Koharu, embora atrapalhada, é convocada às pressas para o Comitê de Realização da Justiça. Embora separados, os membros da Aula de Recuperação começam a fazer o que devem em seus respectivos lugares. Quase ao mesmo tempo, uma ambulância de Gehenna transportando o Sensei ferido chega a Trinity……?"
1377799660 = "Caos Acelerado (2)"
3800416342 = "A análise revela que os mísseis lançados na velha catedral foram disparados de Trinity, não de Gehenna. Hanako, ao ver a imagem do 'Conselho dos Santos de Justina', percebe que, no pior dos casos, Trinity e Gehenna podem desaparecer de Kivotos."
3662530531 = "O Outro Lado Inalcançável"
3512207568 = "Hifumi finalmente chega até Azusa, mas Azusa a rejeita, dizendo para não ir adiante. Todos se machucaram por minha causa, vou destruir a auréola de Saori e me tornar uma assassina…… Com olhos cheios de determinação, Azusa diz essas palavras e desaparece, deixando palavras de gratidão a Hifumi. Hifumi tenta detê-la, mas sua voz não a alcança……"
2485053728 = "Na Escuridão"
1374661261 = "O Esquadrão Arius, que tentava iniciar o avanço sobre Trinity junto com Justina empunhando a 'arma tática', é confundido pelas armadilhas que Azusa havia plantado. Mesmo assim, encurralada por Saori, Azusa consegue se afastar do local usando uma 'certa bomba'. No entanto, mesmo que tenha sido para pegar o inimigo de surpresa, Azusa usou a prova da amizade com Hifumi como ferramenta para matar, e soluça dizendo que nunca mais poderá voltar para Hifumi e os outros, atormentada pela culpa."
3252357257 = "A Resposta Para o Quinto Preceito Antigo"
1561913819 = "Seia diz ao Sensei que, mesmo que acredite, não importa o que faça, este é o ponto final. Mas o Sensei, dizendo que há coisas que precisa fazer pelo 'futuro' e pelos alunos, deixa o local."
3162520452 = "Alguns Fragmentos"
3183955174 = "Pensava-se que Saori havia sofrido o impacto da bomba de Azusa, mas Atsuko a protegeu no último momento. Hina, a presidente do Comitê Disciplinar, desaparece, Hanako está prestes a ser presa, e Mika é libertada da jaula. Nesse momento, o Sensei finalmente acorda --"
3179867525 = "A Verdadeira Natureza do Ódio"
2955441922 = "Koharu corre para o lado de Mika, que estava sendo espancada sem resistência após recusar friamente as exigências dos belicistas sob o Tea Party. Mesmo ameaçada, Koharu se recusa firmemente. Nessa situação tensa, o Sensei também chega. Mika, confusa com suas próprias palavras, começa a falar aos poucos."
3510190250 = "Sem Hesitar"
3395723629 = "O Sensei visita um por um os alunos que estão gradualmente acordando. Koharu, Hifumi e Hanako também finalmente se reúnem, e eles se dirigem às ruínas da velha catedral para ir ao encontro de Azusa."
9241096 = "A Nossa História"
1769802021 = "O Sensei visita Hina. Enfraquecida pelos acontecimentos até agora, ela finalmente expressa um pouco de seus sentimentos internos. Tendo finalmente conseguido se apoiar um pouco, ela está tentando se levantar novamente, lentamente. Hifumi vai novamente ao encontro de Azusa e revela que sua verdadeira identidade é a 'líder do Esquadrão de Máscaras e Maiôs', dizendo que, portanto, não há diferença entre elas. Com a declaração grandiosa de Hifumi, o Tratado do Éden é distorcido, e um outro mecanismo do Tratado do Éden é estabelecido."
4250678679 = "O Nome do Paraíso (1)"
1990540744 = "O Comitê Disciplinar de Gehenna, o Comitê de Realização da Justiça de Trinity e Abydos se juntam para enfrentar o Esquadrão Arius."
4084884875 = "O Nome do Paraíso (2)"
872832779 = "Enquanto rostos familiares se reencontram, as forças das escolas se unem uma após a outra……"
275424097 = "O Nome do Paraíso (2)"
3278894928 = "Observando a luta entre os ETOs, Seia murmura calmamente que sua derrota está confirmada."
3228962781 = "O Nome do Paraíso (3)"
3156389352 = "À medida que os preceitos perdem gradualmente o significado e a situação piora, o Esquadrão Arius começa a desanimar. Mesmo assim, Saori não abandona sua convicção."
3992775096 = "No Subsolo da Antiga Catedral"
4215258149 = "Saori dirige-se ao subsolo da velha catedral. Azusa e o Sensei a seguem para colocar um fim nisso."
3039086335 = "Ódio de Quem"
1305007844 = "Atsuko aparece onde Saori está caída e, quebrando o silêncio, diz: 'Vamos parar'. Enquanto todos estão gravemente feridos, o Sensei usa o 'Cartão de Adulto' para enfrentar Maestro, que apareceu no local."
696231722 = "Ódio de Quem"
859196225 = "Terminado o combate, o Esquadrão Arius desaparece em algum lugar e some na escuridão."
1057886975 = "Epílogo"
3548500175 = "A Pandemônio desperta, o Tea Party se reúne novamente, e todos da Aula de Recuperação se juntam. Embora algumas coisas tenham sido perdidas, o cotidiano gradualmente recupera sua cor. Enquanto isso, nos bastidores, uma existência misteriosa começa a se mover mirando o Esquadrão Arius……?"
2388883385 = "Prólogo"
742146611 = "Após uma luta e fuga intermináveis, o Esquadrão Arius foi encurralado. Para salvar os outros companheiros, Atsuko faz um acordo com Beatrice e entrega seu próprio corpo aos perseguidores. No entanto, o que caiu sobre os três que restaram foram balas impiedosas --."
523418069 = "Tea Party Desalinhado"
503633399 = "O Sensei visita Trinity para ouvir sobre o tratamento pós-incidente do Tratado do Éden. Quando ele pensava que falaria apenas com Nagisa, Sakurako da Irmandade e Mine da Ordem dos Cavaleiros de Resgate juntam-se à conversa, sob o pretexto de ajudar o Tea Party. Em meio ao clima constrangedor, Nagisa informa que em breve será realizada uma audiência para decidir o futuro de Mika."
1425951884 = "A Princesa na Gaiola"
1398756343 = "O Sensei é informado por Nagisa que Mika não pretende comparecer à audiência, mesmo que sua ausência resulte em expulsão. Quando ele visita a jaula de Mika para ouvi-la pessoalmente, ela ri com autodepreciação, dizendo que ainda não foi perdoada por Seia e que ser condenada é inevitável. No entanto, seus olhos ainda pareciam cheios de hesitação. Encorajada pelas palavras do Sensei, que diz que convencerá Seia para que os três compareçam à audiência juntos, Mika decide participar da audiência com determinação."
1644694189 = "Entre Sonhos e Miragens"
2642024392 = "'Tive um sonho em que Kivotos encontrava seu fim'. As pupilas de Seia, que diz isso, estão turvas. Ela explica que, ao perseguir a verdadeira natureza da visão que teve em sonho, teve muitos sonhos lúcidos e agora mal consegue distinguir entre sonho e realidade. Informado de que a causa dessa visão é Gematria, o Sensei convence Seia a parar de perseguir esses sonhos e pergunta se ela pode comparecer à audiência de Mika. Logo após decidir enfrentar Mika, Seia é novamente capturada por outro sonho."
175200160 = "Buscador Incompreensível"
4076845186 = "Seia, que testemunhou uma reunião de 'Gematria', descobre que Beatrice está tentando eliminar o Sensei usando o Esquadrão Arius. Ao perceber que a região autônoma de Arius já caiu nas mãos de Gematria, Seia, que foi notada por Gematria, fica ansiosa para retornar à realidade e contar esse fato a alguém. Ao mesmo tempo, Mika, que foi chamada para conversar com Seia, visita seu quarto --."
4242006093 = "Asas Quebradas"
3096862869 = "Seia, enlouquecida pelo dano mental de ter testemunhado a reunião de Gematria, interroga Mika que visitou seu quarto. Assim, mal conseguindo trocar palavras, Seia é novamente levada ao mundo dos sonhos premonitórios e, lá, vê Atsuko crucificada na Arius Basilica e é capturada por Beatrice enquanto está atordoada. Enquanto isso, o Sensei, chamado a um beco por um e-mail de origem desconhecida, encontra Saori, a líder do Esquadrão Arius --."
3473989469 = "Escolhas e Decisões"
137391815 = "Seia, atacada por Beatrice, entra em estado crítico, e Mika é acusada como a culpada por ferir Seia. Incapaz de fazer qualquer coisa ao ver alguém importante ser ferido diante de seus olhos, Mika decide se vingar de Saori, do Esquadrão Arius, que criou a causa. Enquanto isso, Saori, que chamou o Sensei, confessa seus sentimentos, dizendo que não tem mais ninguém em quem confiar além do Sensei, e implora por ajuda em troca de sua vida. Rindo, o Sensei diz que ela não precisa entregar sua vida e pega a mão de Saori."
3718525211 = "\"Esquadrão Arius\""
1431856600 = "O Sensei e Saori decidem procurar os membros dispersos do Esquadrão Arius. Eles se reúnem em segurança com Hiyori e Misaki e descobrem que Beatrice lhes disse que 'se eliminarem o Sensei, a traição será perdoada'. Mesmo assim, o Sensei concorda em continuar ajudando-as, e juntos se dirigem para a região autônoma de Arius."
895577034 = "Para a Região Autônoma de Arius (1)"
466017759 = "A entrada da região autônoma de Arius deve passar pelas catacumbas existentes no subsolo de Trinity. Das inúmeras entradas subterrâneas, a entrada correta e a rota interna precisam ser percorridas para chegar à região autônoma, e elas mudam periodicamente. Enquanto o grupo se apressa para a entrada que ainda mal funciona, os alunos de Arius enviados por Beatrice bloqueiam seu caminho."
4233624493 = "Para a Região Autônoma de Arius (1)"
2841961890 = "Sob o comando do Sensei, o grupo varre os alunos de Arius. A alegria dura pouco, e não há tempo a perder diante do prazo que se aproxima. Com ansiedade e impaciência, eles decidem apontar suas armas para os antigos aliados para salvar a princesa."
2385460060 = "Para a Região Autônoma de Arius (2)"
519064440 = "O grupo atravessa a passagem subterrânea e chega à entrada das catacumbas. Não há desvios, não há mais caminho. Beatrice também sabe disso, então provavelmente há mais soldados à frente. Mesmo que sejam compatriotas, não há escolha senão avançar. Se eles pararem, a vida de Atsuko estará perdida --."
2048900569 = "Para a Região Autônoma de Arius (2)"
2969109627 = "Enquanto o grupo luta contra os alunos de Arius, um terceiro intruso aparece de repente com fumaça de pólvora. Fazendo soar uma voz exageradamente brilhante e inadequada para o local, ela -- Mika Misono -- sorri languidamente."
767465142 = "Perseguidor"
1734735203 = "Diante de Mika, que irrompeu de repente, o Esquadrão Arius cai impotente. Quando Misaki é capturada e eles estão em apuros, Mika, ao ver o Sensei que chegou atrasado, enlouquece dizendo que não queria que ele a visse assim. Os perseguidores de Arius se juntam a isso, e a situação se torna um combate caótico…… O grupo aproveita a brecha e foge pelas catacumbas."
308921891 = "Região Autônoma de Arius"
1726588307 = "Finalmente, o esquadrão chega à região autônoma de Arius. Diante de Misaki, que tenta planejar a próxima operação, Saori, exausta ao limite, desmaia com febre. Por enquanto, eles colocam Saori para dormir, dão-lhe antitérmicos e fazem uma pausa -- Em um sonho, o Sensei é avisado por Seia novamente para deixar a região autônoma de Arius."
2189783169 = "Nosso Passado"
1121429929 = "Ao acordar, o Sensei decide ouvir de Misaki e Hiyori sobre o passado da região autônoma de Arius e do esquadrão. A guerra civil de Arius, a educação de Beatrice, a linhagem de Atsuko e os laços do esquadrão…… Enquanto isso, Saori, cuja febre baixou, acorda, e o grupo novamente avança em direção à Basílica."
137688653 = "Encontro"
3389099 = "Atravessando as ruínas da região autônoma, o grupo se dirige ao antigo prédio escolar. Diante deles, Beatrice e o Conselho dos Santos de Justina bloqueiam o caminho. Ignorando o esquadrão atônito diante da verdade da missão, Beatrice continua perguntando ao Sensei se ele não quer saber a verdade deste mundo. Se quiser saber, não interfira. O Sensei recusa a proposta, e o grupo entra em combate com o Conselho dos Santos."
1792504161 = "Encontro"
3516525510 = "Mika, que novamente irrompe durante o combate com o Conselho dos Santos, aponta sua arma para o esquadrão. -- Em seus olhos, havia um ódio profundo."
4151121714 = "O Que Foi Deixado"
3307885360 = "O Sensei tenta convencer Mika a parar, mas ela se convence de que, se já traiu o Sensei uma vez, duas ou três vezes é a mesma coisa. Julgando que é impossível detê-la com palavras, o Sensei decide subjugá-la junto com o esquadrão para impedir seus movimentos."
550001274 = "O Que Foi Deixado"
3997939746 = "O Sensei diz a Mika, que se acalmou: 'Seia está bem, então volte para Trinity'. No entanto, diante dessas palavras, Mika diz que não tem para onde voltar e expressa seu ódio por Saori. Não há tempo para persegui-la novamente quando ela desaparece…… O grupo, com sentimentos de tristeza, entra no antigo prédio escolar da filial Arius."
2688011438 = "Corredor Subterrâneo"
2182299148 = "O grupo encontra um corredor no subsolo do antigo prédio escolar. Enquanto avançam, uma coluna desaba de repente, dividindo o esquadrão. Diante de Saori, que ficou sozinha, aparece Mika Misono, a mesma que havia fugido anteriormente. Mika ri, dizendo que derrubou a coluna para enfrentá-la um-a-um, pois não poderia lutar adequadamente com o Sensei e o esquadrão juntos. Assim, Saori e Mika se confrontam a sós."
3611644228 = "Confronto"
3307253189 = "Saori e Mika são deixadas para trás pela coluna desabada. Saori diz ao Sensei para seguir em frente sem ela, e a batalha entre as duas começa. Enquanto isso, Beatrice, que está observando, fala a Seia sobre a luz sinistra que está chegando a este mundo."
478233283 = "Outro Nós"
2294972915 = "Derrotada por Mika, Saori relembra a Arius dos velhos tempos. Seu eu de infância, o treinamento rigoroso e Azusa partindo -- Diante de Saori, que confessa com arrependimento os vários eventos que ocorreram porque ela não pôde acreditar na reconciliação com Trinity proposta por Mika e a enganou, traiu e usou, Mika lamenta e chora, dizendo que Saori é igual a ela e que matá-la provaria que não há salvação para si mesma."
3895665603 = "Possibilidades Infinitas"
977567459 = "O Sensei, que aparece diante de Mika e Saori, pede desculpas a Mika por não ter explicado adequadamente e diz que há inúmeras oportunidades para recomeçar. Enquanto o Sensei encoraja as duas dizendo que elas têm um futuro, Beatrice, que estava observando escondida, fica furiosa e declara que iniciará o ritual sem esperar o amanhecer."
3335292298 = "Possibilidades Infinitas"
1991311275 = "Enquanto isso, Seia, que vagava em devaneios, encontra uma certa pessoa no lugar onde pisou."
3974900296 = "Santa Bárbara"
3127069218 = "O Esquadrão Arius luta arduamente contra Bárbara do Conselho dos Santos de Justina. No entanto, seus olhos ainda não desistiram."
382639264 = "Para o Santo dos Santos"
2623773402 = "Mika, decidida a lutar contra Bárbara no lugar do esquadrão, agradece ao Sensei e se coloca diante do Conselho dos Santos. Sua expressão era radiante e cheia de determinação. O grupo deixa o local para Mika e corre para o Santo dos Santos."
3665603744 = "Para o Santo dos Santos"
3144918653 = "O Esquadrão Arius e o Sensei chegam ao Santo dos Santos da Basílica. Resgatam Atsuko do altar, mas o suspiro de alívio dura pouco -- Eles encontram Beatrice, que os aguardava."
2941796748 = "Agnus Dei"
2991478379 = "Beatrice diz que este ritual é um sacrifício necessário para a maior felicidade do maior número, um estado que os adultos devem alcançar e um dever. O Sensei nega, respondendo que não é esse tipo de existência. Furiosa com essas palavras, Beatrice revela sua verdadeira forma e ataca."
1958381225 = "Agnus Dei"
1268369978 = "Derrotada pelo Esquadrão Arius, Beatrice tenta desesperadamente reunir todas as forças existentes na Basílica. Enquanto Hiyori e os outros ficam com medo de sua determinação, Saori os encoraja e enfrenta Beatrice."
3926608295 = "Kyrie Para as Garotas (1)"
2994736897 = "Em meio à batalha interminável contra o Conselho dos Santos, Mika encontra a sala do coro. Percebendo que Arius também tinha aulas semelhantes às de Trinity, Mika relembra seu próprio passado e entoa palavras de oração e hinos para o Esquadrão Arius. Suas costas, cantando hinos diante do Conselho dos Santos que se multiplicava, eram mais dignas e belas do que qualquer outra pessoa no local."
3109022376 = "Kyrie Para as Garotas (2)"
1925570620 = "Diante de Beatrice, abalada pelo Kyrie que ecoa no Santo dos Santos da Basílica, o Sensei declara que não pode perdoá-la por ter lançado os alunos ao abismo com falsos ensinamentos. Enfurecida por essas palavras, Beatrice tenta sacrificar Saori em busca de mais poder."
294127303 = "Kyrie Para as Garotas (2)"
1887669411 = "Finalmente, o Esquadrão Arius consegue derrotar Beatrice. Eles resgatam Atsuko do altar e derramam lágrimas de alívio. Então, diante de Beatrice, que ainda respirava, Golconda de Gematria aparece e diz friamente que seu plano falhou."
1335977955 = "Pessoa Importante"
3404775232 = "Após resgatar Atsuko em segurança, Saori diz ao Sensei que ele pode puni-la como quiser. O Sensei, respondendo que não pretende puni-la e que ela deve assumir a responsabilidade por sua própria vida, deixa-as para trás. Enquanto isso, Mika, exausta diante da batalha interminável contra o Conselho dos Santos e Bárbara, está prestes a desistir quando o Sensei intervém e usa o Cartão de Adulto."
960412593 = "Pessoa Importante"
2369141067 = "Diante dos alunos de Arius que perderam contato com Beatrice, alunos de Trinity, incluindo a Ordem dos Cavaleiros de Resgate, aparecem das catacumbas. Mine 'presta socorro' aos alunos de Arius em pânico e sai em busca do Sensei e de Mika."
3408302799 = "Nosso Futuro"
2937481946 = "Com base nas palavras de Seia, que recobrou a consciência, Trinity se une para salvar Mika e o Sensei. Assim, Mika consegue se reunir em segurança com Nagisa e Seia e expressa seus sentimentos a elas."
1220533937 = "Epílogo"
448684912 = "O esquadrão, que decide deixar a região autônoma de Arius e começar uma jornada errante, percebe que Saori desapareceu em algum momento. No entanto, eles concordam que Saori precisa de tempo e caminham para frente com suas próprias determinações no peito. Enquanto isso, em Trinity, onde todos os incidentes chegaram ao fim, a audiência de Mika está prestes a começar."
2141989400 = "Prólogo"
3946132036 = "O Sensei, que recebeu um pedido de Niya para ir a Hyakkiyako, dirige-se para lá a fim de obter uma pista sobre Kuzunoha."
867945468 = "Encontro Inesperado (1)"
2534282816 = "Chegando a Hyakkiyako, o Sensei fica impressionado com a atmosfera diferente da escola. Enquanto caminha pela escola, vê uma garota discutindo com delinquentes…… e decide ajudá-la."
784650514 = "Encontro Inesperado (2)"
1005886133 = "Yukari e o Sensei afugentam os delinquentes. Depois de devolver a carteira roubada dos delinquentes ao dono, os dois decidem passear por Hyakkiyako. O clima de festival na escola se deve à tentativa de recriar o 'Festival das Lanternas de Hyakkiyako', que foi abolido há 20 anos. Enquanto os dois caminham, Yukari é abordada por um servo e foge, deixando o Sensei sozinho."
3919672259 = "No Departamento Onmyou"
2802641052 = "Na sala do Departamento Onmyou, o Sensei ouve de Niya sobre a carta de ameaça enviada pelo 'Clube de Beleza Natural'. Dizendo que pode ser apenas uma brincadeira, Niya afirma que precisa da ajuda do Sensei. No momento em que o Sensei concorda em cooperar, um intruso aparece na sala do Departamento Onmyou."
3637226461 = "A Garota Autoproclamada Elite Aparece!"
1078075001 = "Yukari, que veio à sala do clube, diz que ouviu falar que o Departamento Onmyou encontrou Nagusa na Grande Planície Nevada. Ela então implora a Niya que a ajude com a 'Guerra de Sucessão' para trocar a presidente do Hyakka-Ryouran…… Niya pede ao Sensei, como representante do Departamento Onmyou, que ajude na 'Guerra de Sucessão', e o Sensei aceita."
2370772485 = "Próximo Destino"
2706623289 = "Yukari decide desafiar a 'Guerra de Sucessão' para reconstituir o Hyakka-Ryouran. Como os membros do Hyakka-Ryouran precisam testemunhar a 'Guerra de Sucessão', eles decidem visitar a casa de Renge, a veterana. No entanto, a casa de Renge está vazia, e uma nota foi deixada para trás."
3399810198 = "Garota da Juventude(?) (1)"
1054335404 = "Renge desapareceu deixando uma nota dizendo 'Vou fazer uma viagem para recuperar minha juventude'. Para encontrá-la, o grupo procura por vários clubes, mas, embora haja vestígios de sua participação, não conseguem encontrar Renge. Enquanto descansam e discutem aonde ir a seguir, Kaede, do Departamento de Treinamento, aparece diante do Sensei."
4196717210 = "Garota da Juventude(?) (2)"
2076588919 = "O Departamento de Treinamento estava inspecionando as instalações de Hyakkiyako a pedido do Comitê de Administração do Festival quando encontraram o Sensei. Enquanto conversam, a Trupe de Demônios invade…… e quando o clima está prestes a explodir, uma terceira voz intervém."
2273835101 = "Garota da Juventude(?) (2)"
3687320158 = "O grupo consegue expulsar a Trupe de Demônios. Quando Yukari se aproxima de Renge, Renge arregala os olhos surpresa."
3665538726 = "Fuwa Renge"
4273860323 = "Yukari implora a Renge que a ajude na 'Guerra de Sucessão'. No entanto, Renge diz friamente que o Hyakka-Ryouran, que já recebeu ordem de dissolução, está acabado. Diante da insistência de Yukari, Renge aponta sua arma para ela."
1700027356 = "Fuwa Renge"
3723106540 = "Yukari é subjugada por Renge. Renge a repreende, dizendo que o Hyakka-Ryouran não pode mais voltar a ser o que era. Enquanto Renge se afasta, os membros do Departamento de Treinamento a perseguem."
503705097 = "Bochechas Vermelhas"
1747027451 = "Deprimida com o incidente com Renge, Yukari se recompõe e decide procurar Kikyou, a estrategista do Hyakka-Ryouran. No entanto, um servo aparece diante dela…… Depois de se separar de Yukari, o Sensei encontra uma garota cercada pela Trupe de Demônios no meio do festival."
2958590599 = "Apenas Uma Aluna"
3591646746 = "A garota que luta contra a Trupe de Demônios gradualmente fica em desvantagem. O Sensei aproveita uma brecha e a salva. Ao ouvir a situação atual do Hyakka-Ryouran da garota vestindo o uniforme do Hyakka-Ryouran, o Sensei fica pensativo enquanto observa a garota se afastar."
398789845 = "Kiryuu Kikyou e a Guerra de Sucessão (1)"
1542367438 = "No dia seguinte, o Sensei se encontra com Yukari e visita a sala de arbitragem do Hyakka-Ryouran para encontrar Kikyou. Yukari implora a Kikyou que ajude na 'Guerra de Sucessão', mas é recusada. Kikyou diz calmamente que Nagusa não voltará mais e que Yukari não tem habilidade suficiente. Diante de Yukari, que ainda não desiste, Kikyou realiza a 'Guerra de Sucessão' para lhe mostrar a realidade."
1013593128 = "Kiryuu Kikyou e a Guerra de Sucessão (2)"
1716918261 = "Diante da derrotada Yukari, Kikyou a repreende para parar com a 'brincadeira'. Diz que não é um comitê para quem tem um lugar para voltar. Incapaz de suportar essas palavras, Yukari vai embora, e o Sensei e Kikyou, que ficaram, conversam sobre o futuro do Hyakka-Ryouran. Enquanto isso, a Trupe de Demônios, que reclamava por ter perdido para Nagusa, encontra uma garota de atmosfera estranha……"
3225732755 = "A Determinação da Garota"
1744921907 = "Shizuko e o Sensei se separam para procurar Yukari. Shizuko encontra Yukari e lhe diz para voltarem juntos para a sala de arbitragem. No entanto, Yukari se recusa e declara que dançará como miko. Enquanto isso, o Sensei encontra uma garota misteriosa --"
3704592008 = "Encontro"
1747430871 = "A garota, que se apresenta como membro do Clube de Beleza Natural, revela o verdadeiro significado da carta que entregou e vai embora. Depois, ao ouvir de Shizuko sobre Yukari, o Sensei decide procurar Nagusa para saber o que aconteceu no Hyakka-Ryouran."
4268581401 = "Mikoto Nagusa"
143447072 = "O Sensei aparece diante de Nagusa, que estava relembrando os tempos no Hyakka-Ryouran. Nagusa revela sua verdadeira identidade e dialoga com o Sensei. E no momento em que os fogos de artifício que anunciam o início do festival soam, o Hyakumonogatari das Ilusões aparece."
644791031 = "História de Fantasma que Anda Pela Cidade (1)"
2513148571 = "Yukari veste o traje de miko e avança para o palco do ritual. Enquanto isso, Renge diz a Kikyou, que veio relatar sobre Yukari, que não está mais interessada no Hyakka-Ryouran e pede para não entrar mais em contato. O Departamento de Treinamento, que observava a cena, pergunta a Renge se é realmente isso que ela quer fazer -- Nesse momento, o Hyakumonogatari das Ilusões aparece em várias partes de Hyakkiyako."
2982310612 = "História de Fantasma que Anda Pela Cidade (2)"
1779959641 = "Enquanto lutam na cidade mergulhada no caos, Nagusa conta ao Sensei sobre o Hyakumonogatari das Ilusões. Depois, os dois chegam ao local onde o Departamento de Treinamento está. Enquanto Renge e Nagusa trocam palavras -- um intruso aparece com um grito particularmente alto."
1944548097 = "A Contadora de Histórias de Fantasma do Clube de Beleza Natural (1)"
3436163381 = "O grupo luta contra a grande sombra, mas nenhum dano parece funcionar, deixando todos confusos. Nagusa diz que, para derrotá-la, é necessário ter a qualificação de diretora do Comitê de Arbitragem de Conflitos Hyakka-Ryouran -- Nesse momento, Shuro aparece e lança palavras de desprezo contra Nagusa."
3203640400 = "A Contadora de Histórias de Fantasma do Clube de Beleza Natural (2)"
1142989290 = "Ignorando os ataques do Sensei e de Tsubaki, Shuro diz que as coisas já estão correndo conforme seu plano e deixa o local. Diante do grupo que tenta persegui-la, Kurokage bloqueia o caminho."
930282140 = "A Contadora de Histórias de Fantasma do Clube de Beleza Natural (2)"
790387478 = "À medida que se aproxima a hora de apresentar a dança da miko, a melancolia de Yukari aumenta. No final das contas, ninguém tem a intenção de ouvir a vontade de Yukari. Desesperada com a situação que lhe é imposta arbitrariamente -- a garota ouve um doce sussurro em seu ouvido."
4033191432 = "Mesmo Assim, Para Você"
3274326348 = "Diante de Kurokage, cujos ataques não surtem efeito, o grupo fica sem opções. Nesse momento, Kikyou diz a Nagusa: 'Apenas você, que possui a qualificação, pode salvar Yukari'. Com essas palavras de Kikyou, Nagusa decide avançar junto com o Sensei."
1742211216 = "Cidade Envolta em Chamas"
1706685059 = "Diante do incessante ataque do Hyakumonogatari das Ilusões, o Sensei e Nagusa são forçados a parar. Nesse momento, o Departamento Onmyou e o Departamento de Pesquisa Ninja vêm em seu auxílio."
3155421652 = "Cidade Envolta em Chamas"
1197423923 = "Diante de Yukari, que acordou, Shuro ri alegremente. Ela diz que o Hyakumonogatari das Ilusões, 'Mubou no Katashiro', criado a partir do desespero de Yukari, mergulhou Hyakkiyako em um mar de fogo -- O Sensei e Nagusa aparecem diante da chocada Yukari."
3881819382 = "Palavras Falsas"
415440099 = "Shuro usa o Hyakumonogatari para prender o Sensei e expõe o que aconteceu na Grande Planície Nevada e o erro cometido por Nagusa diante de Yukari e do Sensei. Tendo seu passado e circunstâncias que não queria que fossem conhecidos revelados, Nagusa perde a vontade de lutar e desaba -- mas o Sensei lhe dirige palavras."
2046334446 = "Algo Normal"
1314809181 = "Shuro grita que as palavras do Sensei para Nagusa são sofismas. Ela tenta atacar o Sensei, mas Yukari bloqueia sua lâmina. A garota, que escolheu viver como Yukari do Hyakka-Ryouran e não da família Kadenokouji, enfrenta o 'Mubou no Katashiro' junto com Renge e Kikyou."
3026137772 = "Algo Normal"
2364647164 = "Mesmo com uma vontade forte, as três não conseguem ferir o Hyakumonogatari -- No momento em que enfrentam a crise, Nagusa se levanta. Dizendo que não quer mais perder pessoas importantes como daquela vez, Nagusa libera a 'prova' do Hyakka-Ryouran que recebeu de Ayame."
1918408273 = "Agora, Para Você"
3492807103 = "Shuro foge, e Yukari agradece por poder se reunir com todos. Então, Yukari desafia Nagusa para a 'Guerra de Sucessão', que era seu objetivo original -- Embora não tenha conseguido vencer a guerra de sucessão, ela retorna ao Hyakka-Ryouran com todos, com uma expressão radiante."
2816211461 = "Com Um Desejo"
3813773295 = "A série de incidentes termina, e a paz retorna a Hyakkiyako. Embora ainda existam problemas remanescentes, todos unem seus corações e soltam as lanternas. Enquanto isso -- Kokuriko, do Clube de Beleza Natural, ri misteriosamente na escuridão."
1478099875 = "Pontas dos Dedos que Não Alcançam"
2417637268 = "Lembrando-se dos dias chorosos de outrora e do momento em que não pôde segurar Ayame na planície nevada, Nagusa tem um pesadelo. O braço que foi tragado pelo crepúsculo está começando a doer mais --"
2900210047 = "Nova História de Fantasma"
1286307520 = "Os membros do Clube de Beleza Natural visitam Kokuriko, anunciando o início da história. Shuro, derrotada por Nagusa, toma emprestado um novo livro misterioso da pessoa e jura vingança contra o Hyakka-Ryouran."
2234435405 = "Novo Festival (1)"
2388749549 = "Em meio à agitação dos preparativos para o 'Festival Waraku', a Trupe de Demônios, liderada por Arata, aparece no local para tentar impedir a realização do festival. Mas o Hyakka-Ryouran chega correndo e entra em combate --!"
1536773814 = "Novo Festival (2)"
1088037523 = "Como agradecimento por repelirem a Trupe de Demônios, Yukari e as outras recebem dango de castanha de Shizuko e do Comitê de Administração do Festival. Depois, enquanto todos do Hyakka-Ryouran ajudam na montagem do local, descobre-se que o braço de Nagusa está em estado grave. Vendo isso, Yukari sugere que talvez possam tratá-lo na residência da família Kadenokouji……"
1501948804 = "A Nobre da Família Kadenokouji"
2728089330 = "O estranho médico 'Riku', que está hospedado na residência da família Kadenokouji, diz que sua especialidade é medicina interna, mas percebe de imediato que o braço de Nagusa está sendo tragado pelo crepúsculo. Ele diz que, para curá-la completamente, é preciso recuperar o corpo perdido e que, com o passar do tempo, essa ferida corroerá seu corpo e mente -- Ao ouvir isso, Nagusa começa a contar o que aconteceu com Ayame na 'Grande Planície Nevada' naquele dia."
756362788 = "A Saudade Está Além das Memórias"
3370516004 = "Nagusa tenta trazer de volta Ayame, que está obcecada por Kuzunoha. No entanto, Ayame diz a Nagusa que 'nunca a considerei amiga' e desaparece. Depois, Kuzunoha aparece diante da desmaiada Nagusa e a salva. -- Diante da imagem fria de Ayame descrita por Nagusa, os membros do Hyakka-Ryouran não conseguem esconder sua confusão. Nesse momento, um mensageiro do Departamento Onmyou aparece……"
1502304932 = "Festival e Preparativos"
2057092328 = "Convocado por Niya junto com o Sensei, o Hyakka-Ryouran fica alerta para exigências impossíveis. No entanto, o pedido é para lidar com os fenômenos estranhos que ocorrem perto da 'Filial Ebisu' na região autônoma do norte. Percebendo a semelhança entre os fenômenos e os Tsukumogami das Ilusões que apareceram em Hyakkiyako no passado, o grupo aceita o pedido. O Sensei também decide acompanhá-los para obter pistas sobre Kuzunoha."
1315750381 = "País da Neve"
1205635506 = "O Sensei e o Hyakka-Ryouran chegam à região autônoma do norte e são recebidos por Azami Habu, a presidente do comitê autônomo da Filial Ebisu. Guiados por Azami, o grupo ouve testemunhos sobre os fenômenos estranhos que assumem a forma daquilo que as testemunhas temem. À noite, todos relaxam nas fontes termais, desfrutando de um breve descanso. Nesse momento, Nagusa reflete sobre seus próprios medos --"
3601732457 = "Pesadelo (1)"
1301003702 = "Nagusa sofre com pesadelos em que Ayame aparece. Ao acordar, lá está a figura de Shuro. Diante de Shuro, que zomba dela enquanto invoca o Hyakumonogatari das Ilusões, Nagusa enfrenta-a sem se abater."
2063888527 = "Pesadelo (2)"
639451166 = "Com a chegada dos membros do Hyakka-Ryouran para socorrê-la, Shuro tenta recuar. Embora o grupo fique frustrado por não conseguir capturar Shuro, que é rápida na fuga…… uma bala a derruba. A bala foi disparada por Ayame, que outrora liderou o Hyakka-Ryouran e que Nagusa tanto procurou."
3247570939 = "A Presidente do Hyakka-Ryouran"
2246015017 = "Enquanto Ayame desfruta alegremente da refeição, Kikyou lança uma pergunta. Ayame começa a explicar como chegou à Grande Planície Nevada por não se perdoar mais, mas não se lembra de ter dito palavras frias a Nagusa. Embora Nagusa pense que foi um erro de memória, Kikyou continua olhando Ayame com desconfiança."
3980407787 = "Memória Incompleta"
2999571268 = "Ayame consegue capturar Shuro, que havia fugido, e ainda diz que já tem uma pista sobre a base do Clube de Beleza Natural. Enquanto Nagusa se alegra com o desempenho inalterado de Ayame, Kikyou continua sentindo uma estranheza em Ayame, que parece perfeita demais, e pergunta a Yukari, Renge e ao Sensei se não notaram algo suspeito."
1983223605 = "O Caminho Para a Outra Margem"
2421424457 = "Ayame descobre a 'Mansão Higan', a base do Clube de Beleza Natural, a partir do guarda-chuva que foi o protótipo do Tsukumogami das Ilusões. O Sensei e Kikyou sentem-se ansiosos em invadir o local sem preparação, mas, pressionados pelo ímpeto de Ayame e dos outros, acabam indo. No caminho, ao revistarem Shuro para ver se ela não escondeu o livro misterioso, um chocante romance de autoria própria é revelado."
1938968282 = "A Miko da Família Kadenokouji"
2793738644 = "O grupo chega à Mansão Higan e começa a investigar separadamente. Durante isso, Yukari encontra o brasão da família Kadenokouji e um diário escrito por alguém. O que está registrado ali é o processo de como a garota que herdou o nome Kadenokouji se tornou a presidente do Comitê de Arbitragem de Conflitos Hyakka-Ryouran e foi perdendo a esperança -- Surpresa e confusa com o conteúdo, Yukari é abordada por Kokuriko."
3547088513 = "Dentro da Boca da Cobra (1)"
2202995269 = "Kikyou e Renge, que estavam agindo separadamente, percebem que caíram em uma armadilha e tentam correr para o lado do Sensei. No entanto, um Tsukumogami aparece para impedi-las."
4125006944 = "Dentro da Boca da Cobra (2)"
1777447729 = "Um Tsukumogami aparece diante do Sensei e de Azami, e Shuro se vangloria de que tudo estava dentro de seu plano. No entanto, o Tsukumogami ataca até Shuro, que deveria ser sua aliada, e o Sensei se machuca ao protegê-la. Nesse momento, Kikyou aponta sua arma para Azami e revela que ela é um membro do Clube de Beleza Natural --"
4101117820 = "O Artista Misterioso do Clube de Beleza Natural (1)"
369181728 = "Kikyou deduz que eles estavam sendo manipulados desde o início…… Azami elogia sua perspicácia e revela que ela é a artista misteriosa do Clube de Beleza Natural. Diante de Kikyou e Renge, que tentam desafiá-la, Azami sente o medo e a ansiedade em seu espírito de luta e não consegue esconder seu prazer."
3465264177 = "O Artista Misterioso do Clube de Beleza Natural (2)"
3362951369 = "Diante de Nagusa, que luta contra um Hyakumonogatari que apareceu de repente, Kokuriko aparece. Nagusa não consegue aceitar a realidade de que foi um sonho ruim Kokuriko ter levado Ayame embora. Diante dela, aparece uma Ayame com a mesma expressão fria 'daquele dia'."
2480664873 = "O Fim do Doce Sonho"
677728044 = "Para Nagusa, que acorda na masmorra subterrânea, Ayame diz que quem passou o tempo com ela na região autônoma do norte não era ela mesma, mas uma sombra criada pelo livro misterioso. Nagusa ainda não consegue aceitar a realidade, e Ayame revela que desprezava as pessoas de Hyakkiyako que se apegavam a ela. E que nunca a considerou uma amiga --"
3145489761 = "Flor Artificial"
3797308812 = "Kokuriko elogia Shuro por seus esforços em capturar o Hyakka-Ryouran e o Sensei. Embora feliz, Shuro não consegue tirar da cabeça o fato de o Tsukumogami tê-la atacado e a imagem do Sensei tentando protegê-la. Ignorando a ansiedade de Shuro, Kokuriko deixa a Mansão Higan e se dirige para Hyakkiyako."
2543498820 = "O Retorno da Presidente"
3151250892 = "Na véspera do Festival Waraku, Ayame aparece diante de Niya, que está lutando com a papelada. Diz ela que os membros do Hyakka-Ryouran e o Sensei foram pegos por uma avalanche e vieram pedir socorro. No entanto, Niya imediatamente percebe que é uma sombra, estranhando Ayame ter deixado seus companheiros para trás. A verdadeira Ayame aparece……"
2863107133 = "Mesma Cama, Sonhos Diferentes"
779115510 = "Os membros do Hyakka-Ryouran e o Sensei são trancados no subsolo da Mansão Higan. Nagusa se culpa por não ter entendido Ayame. Shuro aparece, triunfante, mas -- ao ouvir que Nagusa encontrou Kuzunoha, seus olhos mudam. Com hesitação interna, Shuro tira o grupo da cela para que a guiem até Kuzunoha."
2017155360 = "Memórias da Outra Margem (1)"
3712861394 = "No meio da Grande Planície Nevada, o grupo se dirige ao templo do crepúsculo. No caminho, Shuro não consegue esconder sua perturbação com as palavras do Sensei: 'Para proteger alguém, sua própria força não importa'."
1189578546 = "Memórias da Outra Margem (2)"
1384145819 = "O local para onde Nagusa os guia são ruínas decadentes. Shuro fica furiosa por ter sido enganada, mas quando Nagusa pronuncia certas palavras, as ruínas em ruínas se transformam em um espaço repleto de flores de cerejeira. E então, a figura de Kuzunoha, a mestra do templo do crepúsculo, aparece……"
1768696395 = "Verdadeira Forma"
998522113 = "Kuzunoha dá as boas-vindas ao grupo, mas repreende o Sensei por nunca ter respondido às suas cartas e afasta Shuro, que estava fazendo alvoroço. Quando Nagusa pergunta como trazer Ayame de volta ao normal, Kuzunoha diz que 'o que aconteceu uma vez não pode ser desfeito', mas aconselha que é crucial parar de se afundar em sonhos fugazes e enfrentar a realidade."
2585962915 = "Olhar"
2317210858 = "Quando era presidente -- Ayame atendia aos pedidos de todos em Hyakkiyako com um sorriso, e ao ter que ser perfeita, foi levada ao ponto de esquecer seu próprio rosto. 'Agora é a vez de todos serem observados por mim', murmura ela, e assim, usando Hyakkiyako como palco, ela abre as cortinas de um novo Hyakumonogatari."
3121894829 = "O Festival Continua"
181107698 = "Kaho, ocupada com os preparativos do festival, fica surpresa com o aparecimento do Hitotsume em Hyakkiyako e corre para lidar com a situação. Quando parece que a realização do Festival Waraku será difícil…… o Departamento de Pesquisa Ninja aparece com uma mensagem de Niya para Kaho. A mensagem é: 'Continue como sempre'. Compreendendo o significado, Kaho começa a agir para a realização do Festival Waraku."
1157713290 = "Canção da Harmonia dos Quatro Lados (1)"
2624602144 = "Kaho decide realizar o Festival Waraku, e o Comitê de Administração do Festival e o Departamento de Pesquisa Ninja decidem cooperar com todas as forças. Assim, para dissipar o terror que cobre Hyakkiyako, um show especial de Chise é realizado……!"
3836040692 = "Canção da Harmonia dos Quatro Lados (2)"
4240906566 = "Azami visita Niya na prisão. Enquanto o Hitotsume está desaparecendo devido à animação do festival, Azami ainda se vangloria de que isso é inútil, mas Niya mantém uma expressão tranquila. Nesse momento, fogos de artifício brancos são lançados sobre a torre de menagem -- O Hyakka-Ryouran chega para o resgate."
2248504721 = "O Lamento do Demônio é o Uivo do Leão"
2051393425 = "Niya, os membros do Hyakka-Ryouran e o Sensei se reúnem e entram em uma reunião de estratégia. Não importa quantos Hitotsume derrotem, será inútil se não derrotarem a fonte, Ayame -- Nesse momento, Niya tem uma ideia brilhante. É restaurar o livro misterioso em branco e escrever nele o romance de Shuro para materializá-lo. Assim, em meio à crise em Hyakkiyako, nasce o 'Leão Mais Forte de Um Chifre'."
2455577687 = "O Terceiro Livro Misterioso"
1605542151 = "Kokuriko repreende Azami, que não consegue esconder sua raiva por sua história de terror ter sido transformada em comédia. O Hyakka-Ryouran e o Sensei chegam ao local, mas Kokuriko, sem se abalar, usa o poder do livro misterioso para atraí-los para a escuridão……"
917558113 = "Do Fundo da Sombra Escura e Profunda"
1719928471 = "Yukari, Kikyou e Renge confrontam seus próprios corações na escuridão e quase são tragadas pelo crepúsculo. Mas Nagusa foi diferente. Nagusa, que continuou enfrentando sua própria fraqueza, estende a mão que deveria ter sido tragada pelo crepúsculo, contra-ataca Kokuriko e Azami e as faz recuar. Enquanto se apressam, Nagusa pede ao Sensei que testemunhe sua luta contra Ayame."
688718966 = "As Pontas dos Dedos que se Agarraram"
3881859444 = "Nagusa desafia Ayame para a Guerra de Sucessão. Embora nunca tivesse vencido antes, desta vez ela luta de igual para igual. 'Só de você estar aqui já era suficiente'. As palavras de Nagusa não alcançam Ayame, e a Guerra de Sucessão se intensifica -- Quem ficou de pé no final foi Nagusa. No entanto, apesar de ter alcançado seu objetivo de longa data, lágrimas transbordavam de seus olhos."
2049244668 = "Aguardando Ansiosamente o Brotar Juntos"
2688582158 = "Após o fim do incidente, o Sensei reencontra Niya, que está hospitalizada, e o Departamento de Pesquisa Ninja, que se ocupa com a limpeza do festival, e todos se alegram com a segurança mútua. Em seguida, ele vai para a sala do comitê do Hyakka-Ryouran, onde todos estão plantando sementes de flores. Após o incidente, Ayame adormeceu e não se sabe quando acordará. No entanto, Nagusa respeita a vontade de Ayame e continua esperando o dia em que as flores florescerão novamente……"
4000054078 = "Nosso Lugar"
2422594773 = "Maia, que se feriu gravemente ao aceitar um trabalho impossível, retorna à Filial Arius. Subaru a recebe calorosamente."
532006653 = "O Dever da Aluna"
2547143426 = "Os membros da Aula de Recuperação estão ocupados se preparando para o Exame Geral de Trinity. Um exame criado por uma organização externa para medir objetivamente suas habilidades. A Milícia Voluntária, o Clube de Doces Pós-Aula, o Comitê de Realização da Justiça, a Irmandade…… outros membros de Trinity também mostram reações diversas diante do exame. Nesse contexto, duas alunas de Trinity trazem uma consulta ao Sensei."
111254386 = "Dias Como um Sonho"
1745328622 = "Ao encontrar alunos transferidos de Arius, o Sensei não consegue esconder sua surpresa. As alunas de Arius contam que, devido à sua origem, não entendem o sistema de exames e estão lidando com isso confusas. Diante do desejo delas de que 'as outras crianças que permanecem em Arius também possam ter uma vida escolar normal', o Sensei decide atendê-las como adulto."
3626524437 = "Aprendizado Para Quem"
584715180 = "Esse desejo de 'ter uma vida escolar normal' também incluía os antigos membros do Esquadrão Arius. O Sensei convida Atsuko, Misaki, Hiyori e Saori para um luxuoso navio de cruzeiro e conversa sobre os exames. O esquadrão aceita positivamente, dizendo que, para lutar e sobreviver, é necessário conhecer o mundo…… Nesse momento, Nagisa, a patrocinadora da reunião, aparece."
1890488107 = "Desculpas"
4001607138 = "Os membros do esquadrão ficam confusos com a aparição repentina de Nagisa. Nagisa diz que a história de expulsar Arius por 'diferença de interpretação' foi um erro de Trinity. Recebendo o desejo de Nagisa de que o Esquadrão Arius e os alunos que permanecem na Filial Arius sejam membros da sociedade, Atsuko e os outros tentam se aproximar."
2647279451 = "A Cadeira do Outro Lado"
2398297819 = "O Sensei também dará aulas aos alunos de Arius a pedido de Nagisa e se dirige à Filial Arius com Saori e os outros. Nesse momento, Maia, maravilhada com o brilho do mundo exterior, diz que sentiu fortemente que ela é um corpo estranho. Ouvindo isso, Subaru revela seus sentimentos de que ainda não perdoou Trinity e o Esquadrão Arius……"
616126247 = "Harmônica"
1590792391 = "Misaki fica perplexa com a configuração inventada por Nagisa de que o conteúdo do exame chegará à Filial Arius pelas mãos do esquadrão, enquanto Atsuko diz que se deve aprender com qualquer um. Na Filial Arius, Subaru, pressionada pelos seus juniores, toca harmônica. E o Esquadrão Arius finalmente chega à sua antiga escola. Subaru os recebe com cautela."
3549962588 = "Estilo Arius"
2960207032 = "Surpresa, decepção, hostilidade…… Várias emoções recebem os membros do esquadrão e o Sensei que pisam na Filial Arius. Lá, Saori reencontra Subaru e declara que veio para fazer o exame com todos. Os alunos de Arius ficam confusos. A discussão entra em um impasse, e o grupo decide fazer o 'exame' proposto por Subaru. O Esquadrão Arius entra em combate."
441958419 = "Hora da Aula"
1932143474 = "Após o desfecho, o Sensei coloca os membros do esquadrão no pódio e os faz dar aulas aos alunos de Arius. Saori fala sobre contratos na sociedade com base em sua experiência, Misaki sobre física, Atsuko sobre biologia e Hiyori sobre moda. Quando a desconfiança dos alunos de Arius diminui, o Sensei também sobe ao pódio e lhes proporciona uma vida escolar."
110027412 = "Feridas e Cicatrizes"
3724148201 = "Quando está a sós com o Sensei, Saori desaba pedindo desculpas por suas ações passadas. Quando o Sensei a aconselha que 'mesmo que as cicatrizes permaneçam, você pode viver com elas', Saori se esforça para olhar para frente. Enquanto isso, Subaru confessa a Maia seu desejo de criar um lugar para todos, não importa os meios. Naquela noite, Saori é atacada por um assaltante misterioso e cai."
1000503757 = "Aula Extracurricular (1)"
2403340386 = "No dia seguinte, as aulas para os alunos de Arius continuam. Hoje, após um pequeno teste, haverá uma aula extracurricular. Os alunos de Arius se divertem, embora confusos, em um centro de jogos da cidade. Durante a aula, Subaru pergunta ao Sensei sobre 'uma maneira de impedir alguém que quer desistir da própria vida'. O Sensei, embora hesitante, diz que nessa hora acha que não se perdoaria."
2055487567 = "Aula Extracurricular (2)"
967522754 = "Subaru usa o método Arius -- fazer um gatinho descer de uma árvore assustando-o com um tiro. Mas as pessoas ao redor ficam agitadas e lançam críticas preconceituosas por elas serem alunas de Arius. Depois, encontram duas pessoas da Milícia Voluntária, e o coração de Maia e Subaru se acalma. Ao retornarem da aula extracurricular, por algum motivo, Mine e toda a Ordem dos Cavaleiros de Resgate estão reunidas na Filial Arius."
3636731330 = "Clube de Atividades Voluntárias Sem Nome"
1212815035 = "Ao voltarem da aula extracurricular, a Ordem dos Cavaleiros de Resgate está na Filial Arius. Mine e os outros começam a atuar como o 'Clube de Atividades Voluntárias Sem Nome' a pedido do Sensei, escondendo suas identidades, mas Subaru imediatamente percebe quem são. Tocada pelo ódio profundo de Arius, Mine luta consigo mesma. Ela se decide através do diálogo com o Sensei…… mas nesse momento, um som sinistro de trombeta ecoa."
2933749245 = "O Som da Trombeta"
1534532054 = "A Ordem dos Cavaleiros de Resgate distribui suprimentos como voluntários, e o Sensei se aproxima das feridas emocionais dos alunos nas aulas. Misaki e Saori também começam a enfrentar o passado enquanto conversam com o Sensei. Nesse momento, 4 'Anjos do Apocalipse' atacam ao som de trombetas. Para proteger os alunos, a Ordem dos Cavaleiros de Resgate e o Esquadrão Arius decidem lutar juntos."
3173705092 = "Aquilo em Que Acreditam"
3227226913 = "Atacada por um anjo, Mine fica presa em um mundo espiritual. Lá, ela enfrenta a história de perseguição e o ódio sofridos por Arius, e sofre como membro de Trinity. No entanto, lembrando-se das palavras do Sensei e percebendo que o 'socorro' em que acredita é o caminho, Mine repele o anjo -- mas esgota suas forças e cai."
3405121082 = "Confiar os Sentimentos"
109795470 = "Com a queda de Mine, a verdadeira identidade da Ordem dos Cavaleiros de Resgate é descoberta. Alguns alunos de Arius, que ouviram alucinações auditivas, começam a se agitar dizendo que é o início do 'fim do mundo' descrito no Apocalipse. Mine, recobrando a consciência, pede ao Sensei que proteja o 'cotidiano' dos alunos de Arius e perde os sentidos novamente. Nesse ínterim, Atsuko especula que a verdadeira identidade dos anjos são os 'Anjos do Apocalipse'."
595564773 = "Arius Basílica"
707791382 = "Subaru reúne os alunos de Arius na Basílica e discute o fenômeno do Apocalipse. No entanto, as opiniões se dividem entre aqueles que ouviram o som da trombeta e aqueles que não. O conflito se intensifica entre a linha dura, que defende que o Sensei e os outros devem ser 'purificados', e a linha moderada, que vê valor nas aulas. Maia, que expressou uma opinião moderada, é alvo de ódio, e Subaru decide expulsá-la para proteger Arius. Diante dessa decisão dolorosa, ambas choram……"
3321019633 = "Criança Perdida"
4197219289 = "Recebendo o desejo de Mine, o Sensei decide dar aula no dia seguinte também. Naquela noite, Maia, expulsa e desesperada, visita o Sensei e acaba sendo protegida. Enquanto isso, Subaru lidera os alunos de Arius e se dirige para 'Porta Pacis' para verificar a verdade do Apocalipse. Na manhã seguinte, os Senseies ficam confusos porque nenhum aluno de Arius veio para a aula, e Maia lhes conta para onde todos foram."
2868013820 = "Porta Pacis (1)"
2701311459 = "Para obter informações sobre 'Porta Pacis', o Sensei decide pedir a sabedoria do Comitê da Biblioteca. Ui e Shimiko contam a história de que Porta Pacis já foi um símbolo de paz, mas após a guerra civil, tornou-se um depósito de registros de Arius e agora está selada. E Atsuko revela a existência dos 'ritos secretos' de Arius escondidos lá."
2431721991 = "Porta Pacis (2)"
2479727769 = "Atsuko conta que fenômenos inexplicáveis aumentaram em Arius depois que Beatrice visitou Porta Pacis. Enquanto isso, Subaru, que chegou a Porta Pacis, foi sozinha para o subsolo. Onde o Sensei está, Maia confessa o que aconteceu na noite anterior. Ui especula que o som da trombeta foi ouvido pelos alunos que aceitaram as aulas do Sensei, e levanta a hipótese de que os anjos são a materialização das emoções negativas de Arius."
1126610494 = "Apocrypha"
2406560706 = "Subaru encontra o 'Apócrifo' de Arius no depósito de registros de Porta Pacis. Lá, junto com uma maldição para Trinity, está escrito: 'Os anjos são existências que simbolizam vocês mesmos'. Nesse momento, Subaru tem uma visão do passado de Arius e ouve uma voz misteriosa. Enquanto isso, o Sensei e os outros correm para Porta Pacis --"
3885788221 = "Ninho (1)"
1536976133 = "O Sensei e os outros lutam contra os alunos de Arius do lado de fora de Porta Pacis."
3079854232 = "Ninho (2)"
268023891 = "Subaru, no depósito de registros, estava prestes a receber a 'autoridade de condenação' da voz misteriosa. Em meio ao combate, quando os alunos de Arius começam a duvidar do Sensei e dos outros, a trombeta soa pela segunda vez."
191984949 = "Discípulos (1)"
819645213 = "Dois novos anjos aparecem diante de Porta Pacis. Com isso, o som da trombeta soou um total de seis vezes. Os anjos começam a atacar os alunos de Arius, e a hipótese de Ui de que aqueles que aceitaram as aulas do Sensei são considerados 'inimigos' se torna realidade. Para proteger seus companheiros de Arius, o esquadrão enfrenta os anjos."
3659317844 = "Discípulos (2)"
2478483447 = "Derrotado pelos anjos e em retirada, o esquadrão é informado de uma passagem secreta por um aluno de Arius que abriu seu coração. No caminho para o depósito de registros, Atsuko e Maia sentem um mal-estar misterioso. Subaru, que as aguardava no destino, guia o Sensei e os outros para outro lugar……"
467501222 = "Nosso Ódio"
128005755 = "Diante do Sensei, Subaru expressa seu ódio por Arius ter sido abandonada após o Tratado do Éden. Ela condena a escolha do Sensei de ignorar Arius em consideração a Trinity e declara que viverá 'do jeito de Arius'. Exige que o Sensei e o esquadrão deixem Arius. Nesse momento, Saori pergunta a Subaru o que há além do seu 'jeito'."
3404515189 = "Mesmo Assim"
1895929857 = "Refletindo sobre seu próprio passado, Saori aconselha Subaru que não há nada além do ódio. E revela a determinação de todo o esquadrão de se entregar para expiar os crimes do passado. No entanto, para Subaru, essa determinação é apenas uma traição, e sua raiva por ter sido abandonada explode. Como se respondesse a esse ódio, uma nova ameaça aparece, e o grupo se prepara para o combate."
2295943221 = "O Anjo Trompetista"
539919597 = "Derrotado na batalha contra o 'Anjo Trompetista', o esquadrão fica ferido. Cada vez que a trombeta soa, Arius é envolvida pela escuridão, e descobre-se que a causa é Subaru, que se perdeu no ódio. Diante de Subaru, transformada a ponto de a voz de Maia não alcançá-la, Atsuko diz que ela se tornou o 'Anjo Trompetista'……"
1767825594 = "Sangue Real"
1703686333 = "Atsuko revela que o 'Anjo Trompetista' é um fenômeno materializado das emoções de Arius, e que Subaru poderia ter se tornado o 'Juiz' que o rege. No entanto, aponta que ela perdeu a qualificação ao abandonar Maia e saiu de controle. Diante disso, Maia expressa seu sentimento inalterado por Subaru e grita que adora a harmônica de sua veterana."
2837190758 = "A Harmônica Daquele Dia"
3901852665 = "Os puros sentimentos transmitidos por Maia junto com a harmônica abalam o coração de Subaru. No entanto, incapaz de suportar a culpa, ela se funde com o 'Anjo Trompetista' e desaparece. Atsuko dialoga com Subaru no mundo espiritual, mas a negociação fracassa. Atsuko então tenta uma 'conversa' ao estilo Arius com Subaru."
940208950 = "Descendo aos Humildes"
1386503884 = "Em um estado de consciência flutuante, Subaru relembra os dias que passou com Saori. Ao acordar, Subaru se emociona com as palavras do Sensei e com a imagem de Maia, do esquadrão e dos alunos de Arius que acreditam nela sem mudar em nada. Finalmente libertada do ódio do passado, Subaru decide dar um novo passo junto com todos."
2268459850 = "Tentativa"
2418512983 = "Embora confusas, Subaru e as outras aceitam o tratamento de Trinity. Testemunhando a cena dos alunos de Arius sendo aceitos pelos alunos de Trinity e através da conversa com Mine, Subaru reafirma seus pensamentos. Quando Maia lhe pergunta 'Você pode construir um novo ninho?', Subaru, com as palavras do Sensei no coração, decide avançar em direção ao futuro, independentemente do resultado."
1911255380 = "Hora do Chá"
3554065651 = "Após o incidente, Nagisa revela ao Sensei seu plano de aceitar os alunos de Arius e compilar conjuntamente a história das duas escolas. Diante disso, o Sensei pede desculpas novamente por não ter acreditado totalmente em Nagisa no passado. Em meio a um clima amigável, Mika e Seia também aparecem, e começa uma animada hora do chá com o Tea Party reunido depois de muito tempo."
3711742589 = "Estudando Para a Prova"
2447597939 = "Saori, que estava presa na Agência Correcional de Valkyrie, é informada por Konoka de que está em liberdade condicional. As cartas de apelação do Sensei, de Trinity e de Gehenna foram decisivas. O esquadrão libertado começa a estudar para os exames no antigo prédio escolar de Trinity, junto com Subaru, Maia e outros alunos de Arius. Os membros da Aula de Recuperação também se juntam a eles, e uma animada aula de recuperação acontece."
3406215762 = "Ecclesia Para o Futuro Deixado"
809303219 = "Despedidos pelo Sensei, os alunos de Arius fazem o exame com seus respectivos sentimentos. Independentemente do resultado, após o exame, eles celebram o esforço mútuo em uma confraternização. Dias depois, Atsuko declara a Subaru e Maia que o esquadrão assumirá a reconstrução de Arius como conselho estudantil provisório. Subaru também decide cooperar como membro do comitê disciplinar, e Arius dá um novo passo adiante."
1141893095 = "A Baleia Adormecida"
1071953312 = "Hoshino chama o Sensei sob o pretexto de organizar materiais e faz um esconderijo secreto para cochilos dentro do depósito."
3096054116 = "Manhã do Preguiçoso"
2514639115 = "Depois de cochilar o quanto quis na sala de aula, Hoshino começa uma caça ao tesouro no campo com o Sensei."
3534890387 = "Embora Fraca, Brilha"
687709314 = "Durante uma caça ao tesouro na escola à meia-noite, o Sensei encontra um adesivo noturno em forma de peixe. Quando ele o dá de presente, Hoshino fica extremamente feliz."
3392633652 = "Patrulha da Meia-Noite"
1781335004 = "O Sensei, que encontra Hoshino por acaso em uma estrada noturna, descobre que ela secretamente patrulha todas as noites pela segurança da cidade."
3089484350 = "Como Agarrar a Sorte"
748794093 = "Um livro ilustrado que Hoshino comprou em uma livraria vinha com um bilhete de sorteio para o aquário. Infelizmente, o bilhete não foi premiado, mas o Sensei compra mais 50 cópias do mesmo livro e decide continuar tentando até ganhar."
1287455689 = "Aquário!"
1182596744 = "Com o bilhete premiado, o Sensei e Hoshino vão ao aquário. Eles se divertem observando os peixes do aquário."
1659730423 = "Bilhete de Entrada para Qualquer Lugar"
823938156 = "Hoshino, que chamou o Sensei, diz que vai emprestar seu travesseiro favorito. Com o toque muito macio, o Sensei adormece imediatamente. Hoshino sussurra ao Sensei adormecido o que não podia dizer normalmente."
772933003 = "Ajudando no Trabalho de Meio Período"
306418223 = "O Sensei sai pela cidade para ajudar Serika a distribuir panfletos em seu trabalho de meio período. Vendo Serika trabalhar com dificuldade, o Sensei decide secretamente distribuir os panfletos nos bastidores."
1065594543 = "Trabalho Noturno Pesado"
2879956728 = "Serika e o Sensei decidem fazer um trabalho noturno de segurança para proteger a entrada de um prédio durante a noite toda."
2794306484 = "Arrancando Ervas Daninhas no Parque"
2993178327 = "Serika decide fazer um trabalho de meio período arrancando ervas daninhas no parque com o Sensei."
3688572742 = "Compreensão Tardia"
57915122 = "Enquanto limpa o parque, Serika percebe que está gostando de trabalhar com o Sensei."
2323863848 = "Sorte Inesperada"
2376289702 = "O Sensei e Serika, que terminaram o trabalho mais cedo do que o esperado, passeiam pelas barracas do mercado noturno e se divertem."
1234311581 = "Breve Descanso"
1846022614 = "Serika desmaia de exaustão devido aos trabalhos consecutivos, e o Sensei a faz descansar e cuida dela. Recuperando as forças de alguma forma, Serika vai para o balanço do parque e revela um pouco de seus verdadeiros sentimentos que havia escondido até agora."
1604922941 = "A Bolsa Favorita"
1348486067 = "A bolsa que Serika tanto estimava foi destruída em um combate repentino. Em uma loja de reparos que visita com o Sensei, ela conta que é uma bolsa de recordação comprada com o dinheiro de seu primeiro trabalho de meio período. Com a bolsa consertada, Serika sorri feliz."
1974828165 = "Máquina de Correr"
472444615 = "Pela manhã, o Sensei encontra Shiroko para fazer compras. Shiroko propõe irem fazendo uma corrida leve, e o Sensei concorda, mas a distância é maior do que o esperado, e ele fica exausto."
4290065928 = "Pouca Distância"
3912456663 = "Depois da corrida, Shiroko fica preocupada com o cheiro de suor e acaba mantendo distância do Sensei. Shiroko fica confusa porque o Sensei não percebe isso facilmente."
1760556289 = "Bicicleta de Estrada"
1275905591 = "Shiroko e o Sensei passam um tempo agradável conversando sobre novas peças em uma loja de bicicletas."
157262830 = "Metrô"
3007279150 = "O Sensei encontra Shiroko por acaso em uma estação de metrô bem distante de Abydos. Shiroko conta ao Sensei que está planejando um longo passeio de bicicleta."
2507710158 = "Visita à Área Urbana"
3505609892 = "Shiroko observa a cidade do telhado de um prédio enquanto planeja um assalto a banco. O Sensei, vendo isso, avisa a Shiroko que crime é proibido."
2464084323 = "Entrevista Individual"
2008779368 = "O Sensei chama Shiroko para adverti-la sobre suas declarações perigosas do dia a dia. Shiroko fica nervosa com a entrevista individual repentina, mas percebe que o Sensei está preocupado com ela e sente alívio e alegria."
248513908 = "Prevenido Vale por Dois?"
3206543840 = "O Sensei, que estava indo para o Colégio Abydos, encontra Shiroko por acaso no caminho e decidem ir juntos. Shiroko diz que conseguiu um drone e dispara um míssil contra um delinquente que estava fazendo maldades. O Sensei a adverte para não usar muito o drone."
2219405563 = "É um Encontro Casual, Não É?"
923721089 = "O Sensei e Nonomi se encontram por acaso nos arredores de Abydos. Os dois decidem ir comer um parfait juntos."
3468758278 = "É Hora da Limpeza"
2022208209 = "O Sensei e Nonomi, que chegam cedo à sala do Comitê de Contramedidas, decidem limpar bem a sala."
1361707422 = "É Hora de Retribuir o Favor"
628470444 = "Indo a um shopping center bem distante do Colégio Abydos, Nonomi e o Sensei escolhem presentes para os membros do Comitê de Contramedidas. Após as compras, Nonomi volta para a sala do clube e tira secretamente um limpador de ouvido que comprou como presente, começando a limpar os ouvidos do Sensei."
273794540 = "Jogos São Divertidos"
3260525698 = "O Sensei começa uma partida de Othello para ajudar Nonomi a treinar, mas acaba sofrendo uma série de derrotas devido à habilidade de Nonomi, que era muito maior do que ele imaginava."
1938906934 = "Vamos Ficar Saudáveis"
148008888 = "O Sensei e Nonomi estavam classificando halteres comprados por peso."
2260462853 = "Preparando um Chá da Tarde"
2609741974 = "O Sensei e Nonomi procuram itens que possam ser usados para uma festa do chá na sala do clube de cerimônia do chá, atualmente não utilizada, mas acabam preocupados sem conseguir nada."
2355740806 = "Caderno Secreto"
1906697160 = "Na sala de aula do Comitê de Contramedidas, Nonomi está escrevendo uma lista de desejos. Quando o Sensei pergunta o que é, ela conta que é um caderno com as coisas que quer fazer junto com todos do Comitê de Contramedidas."
2951685534 = "Cidadã Exemplar"
1611256425 = "Maki foi levada para a polícia por fazer graffiti em propriedade privada, e o Sensei, que recebeu o contato, visita a delegacia. Embora Maki reclame que as pessoas não entendem sua alma artística, ela pede desculpas para não causar problemas ao Sensei."
3090443160 = "Hackeamento Suspeito"
3395943859 = "Maki é pega e repreendida pelo Sensei por ter hackeado um quiosque e instalado jogos retrô para jogar."
364389697 = "Tolo e Gênio São Separados por Uma Folha de Papel"
2442185520 = "Maki, que tirou nota vermelha no teste da Escola de Ciências Millennium, pede ao Sensei para lhe dar aulas particulares. Maki luta com as questões de literatura moderna, mas mostra um lampejo de genialidade ao memorizar literalmente todo o conteúdo do caderno."
350096205 = "Atividade de Embelezamento"
2708563886 = "No caminho de volta da escola, Maki encontra por acaso uma parede suja e cheia de lixo. Após limpar bem a parede, ela faz um graffiti escondido do Sensei. O Sensei presencia a cena, mas entende a intenção de Maki e, depois de limparem a parede juntos, decide ir pedir desculpas ao dono da parede junto com ela."
1003290137 = "Recordações Eternas"
3714205214 = "O dono da parede onde Maki fez o graffiti gostou de sua arte e pediu que ela desenhasse em outras paredes também. Maki passa um tempo divertido fazendo graffiti nas paredes com o Sensei."
96680612 = "Você É Meu Mestre? (1)"
2929931893 = "Durante uma missão, o Sensei é salvo por Akane, que estava sendo perseguido pela Turma do Capacete. Enquanto cumprimenta o Sensei, Akane relembra o primeiro encontro deles."
4136338484 = "Você É Meu Mestre? (2)"
1808933988 = "O primeiro encontro de Akane e o Sensei. Akane, que interpretou mal a palavra 'limpeza' como um código para assassinato de pessoas importantes, fica um pouco insatisfeita ao perceber que o Sensei estava pedindo literalmente uma limpeza, mas mesmo assim limpa a sala de trabalho da Schale de forma impecável."
3512349930 = "Tempo Caminhando Juntos"
2541546715 = "Akane estava perseguindo a Turma do Capacete, mas eles escapam por pouco. No entanto, ela encontra o Sensei por acaso logo adiante e fica feliz que, mesmo tendo falhado uma vez, uma sorte ainda maior aconteceu. Nesse momento, a Turma do Capacete aparece novamente diante dos dois, e desta vez eles conseguem capturá-la com sucesso."
1225828462 = "A Empregada da Floresta Adormecida"
1332057090 = "Embora tenham conseguido se infiltrar no prédio da Kaiser Corporation, Akane e o Sensei são capturados pelos funcionários e mantidos em cativeiro. Os dois são envolvidos pelo impacto de uma explosão ativada pelos funcionários, mas o Sensei protege o corpo de Akane, que escapa ilesa."
211557474 = "Bom Dia, Mestre"
3773167144 = "De manhã cedo, Akane visita o escritório da Schale e tenta acordar o Sensei, mas a situação se desenrola de forma problemática."
1160899660 = "Para uma Tarde Radiante"
613679375 = "Como presente por ter ajudado em uma missão anterior, Akane decide servir chá ao Sensei."
204930277 = "Uniforme Preto"
2456463672 = "Mashiro costura a barra de sua saia, que rasgou durante uma operação, enquanto fala sobre o uniforme preto do Comitê de Realização da Justiça."
1919817649 = "O Que É Justiça"
638853668 = "Mashiro, que pegou emprestado um livro sobre justiça, discute com o Sensei sobre o que é justiça."
1461678656 = "Provação da Atiradora de Elite (1)"
1751577586 = "Para melhorar sua habilidade como atiradora de elite, Mashiro pede ajuda ao Sensei para treinar. Como treinamento, ela estava aguentando cócegas, mas quando o Sensei toca seu pescoço, Mashiro fica brava."
3085822654 = "Provação da Atiradora de Elite (2)"
3501406577 = "Para continuar melhorando sua habilidade como atiradora de elite, Mashiro e o Sensei continuam treinando. O Sensei, que subiu e desceu escadas carregando pesados cartuchos, fica exausto com o peso."
872429701 = "Realização da Justiça"
4188898275 = "Mashiro estava de prontidão no telhado da Escola Geral Trinity para uma missão de tiro. Ela esperava concentrada sob o sol escaldante, suando, mas quando soube que o alvo já havia sido capturado no dia anterior, todo o esforço de Mashiro foi em vão."
534884064 = "Fumaça e Tolos Gostam de Lugares Altos"
27311898 = "No telhado de um certo prédio em Kivotos, o Sensei encontra Mashiro por acaso. O Sensei passa um tempo agradável conversando com Mashiro."
2024630372 = "Verdade Aprendida do Passado"
1135538242 = "O Sensei, que visita Trinity, encontra Mashiro lendo. Ela diz que estava lendo um livro favorito, e o livro apresentava a origem de provérbios e expressões idiomáticas. Ela diz que gosta deles porque contêm mensagens de justiça. Quando o Sensei demonstra interesse, Mashiro fica feliz."
587639145 = "Hora do Lanche"
555265990 = "Um e-mail que deveria ser enviado para as crianças do Jardim das Ameixeiras acaba chegando também ao Sensei por engano de Shun. Shun pede desculpas ao Sensei que visitou o Jardim das Ameixeiras e lhe oferece frutas, passando um tempo agradável."
1235064322 = "Depois da Refeição, Escovar Bem os Dentes"
1212581455 = "O Sensei e Shun decidem ensinar a importância de escovar os dentes para as crianças do Jardim das Ameixeiras. Após a aula terminar sem problemas, Shun, usando a inspeção de escovação como pretexto, observa cada canto da boca do Sensei."
1104721180 = "Ainda Não Tenho Essa Idade!"
2518280333 = "Kokona diz algo como 'você já está velha', e o Sensei consola Shun, que ficou desanimada."
541355867 = "Voo Alto!"
2710406827 = "Shun presencia por acaso as crianças do Jardim das Ameixeiras brincando com o Sensei. Depois que todas as crianças vão embora, Shun pede ao Sensei para brincar com ela também."
3562536085 = "Escolhendo Presentes"
4219239495 = "Em um grande shopping center de Kivotos, Shun e o Sensei estavam escolhendo presentes para as crianças do Jardim das Ameixeiras. Depois de muito pensar, decidem comprar um bolo grande para levar."
2538754249 = "Doce Soneca Depois do Meio-Dia"
546306698 = "Para o Sensei, que está cansado do trabalho, Shun sugere que ele tire uma soneca no Jardim das Ameixeiras. Ao lado do Sensei adormecido, Shun canta uma canção de ninar e passa um tempo tranquilo."
3676557931 = "Regulação da Temperatura Corporal"
2692432267 = "Assim que a operação termina, Eimi tenta tirar a roupa imediatamente, dizendo que está calor. O Sensei a impede de tirar a roupa, oferecendo-lhe um sorvete."
3548321794 = "Pesquisando as Últimas Tendências (1)"
1150093050 = "Para acompanhar as últimas tendências, Eimi pergunta ao Sensei o que as alunas gostam atualmente. Embora discutam várias coisas, os dois não conseguem chegar a uma conclusão satisfatória."
3558259779 = "Pesquisando as Últimas Tendências (2)"
3529527109 = "Para acompanhar as últimas tendências, o Sensei decide ir ao karaokê com Eimi. A voz dela era surpreendentemente boa."
2376132403 = "Completando o Visual"
2400059281 = "Eimi e o Sensei visitam uma loja de lingerie no shopping. O Sensei desesperadamente impede Eimi de tirar a roupa íntima sem ir ao provador."
1697884784 = "Ferida"
1923076069 = "O Sensei decide tratar Eimi, que se feriu durante uma operação."
3878318917 = "Vento Quente"
3297514869 = "O Sensei decide sair com Eimi para investigar um fenômeno anormal no deserto perto de Millennium. Como resultado da investigação, não havia nenhum problema em particular, mas os dois sofrem com o calor. Eimi diz que assim terão insolação e tira uma invenção especial --"
1892946756 = "Bem-vindos ao Laboratório da Saya!"
1855404410 = "Os membros do Instituto de Pesquisa Alquímica fogem, recusando os experimentos suspeitos de Saya. Ela chama o Sensei e o convence a beber seu novo remédio. Quando o Sensei bebe o remédio, seu corpo inteiro começa a brilhar em dourado……"
3516083753 = "Elixir da Imortalidade"
1288335934 = "Saya, que diz ter finalmente concluído o remédio da imortalidade, faz o Sensei beber outro remédio. No entanto, o remédio era na verdade para fazer crescer pelos cinzentos no corpo, e Saya, ao ver a figura transformada do Sensei, foge assustada."
3136929583 = "Remédio para Emagrecer"
2670545658 = "Como agradecimento pelo experimento anterior, Saya paga um lámen para o Sensei. Vendo Saya comer comida gordurosa sem problemas, a Turma do Capacete, que estava por perto, pergunta como ela consegue comer tanto. Saya lhes dá um remédio especial para emagrecer (?), mas os efeitos colaterais são tão fortes que a Turma do Capacete desmaia."
2005157098 = "Queijo na Armadilha"
993975792 = "Saya e o Sensei decidem jogar um jogo de tabuleiro usando modelos de queijo. Embora entenda que é apenas um jogo, Saya fica fascinada pelos modelos de queijo e não consegue evitar uma série de derrotas."
1919898173 = "Filtro de Amor"
1899438040 = "Saya pensa em testar um novo remédio, um filtro de amor, no Sensei. No entanto, ao carregá-lo, o frasco quebra acidentalmente, e Saya acaba sendo afetada pelo remédio. Sob o efeito do filtro, Saya confunde o Sensei com um queijo e morde seu braço."
501439135 = "O Desaparecimento de Nezuke"
2792815660 = "De repente, Nezuke, o rato de estimação de Saya, desaparece do laboratório. Saya se culpa, achando que ele fugiu por causa das maldades que ela fazia diariamente. Na verdade, Nezuke tinha ido buscar sementes de girassol que a Câmara de Comércio Genbu estava distribuindo. Os dois reafirmam sua amizade e têm um reencontro emocionante."
1851884916 = "Um Dia de Sorte"
3648098592 = "O Sensei encontra uma moeda de 500 ienes na rua e, quando está prestes a pegá-la, Nodoka aparece do nada, alegando que a viu primeiro. Durante a conversa, o Sensei percebe a situação financeira precária de Nodoka e decide lhe pagar doces de luxo."
2791336820 = "Diário de Observação"
1263129030 = "Nodoka é pega observando o Sensei com um telescópio do telhado do prédio em frente à Schale e acaba recebendo uma punição disciplinar."
1922924090 = "Onde se Pode Ver a Chuva de Meteoros"
2229103612 = "Nodoka fica triste porque o céu está nublado e talvez não consiga ver a chuva de meteoros hoje. O Sensei sugere que eles assistam juntos no telhado da Schale, que está acima das nuvens."
2111847187 = "Chuva de Meteoros e Desejos"
3938426849 = "Nodoka e o Sensei passam um tempo agradável juntos, observando a chuva de meteoros no telhado da Schale."
389141647 = "Em Busca de Nuvens"
2169575525 = "O Sensei encontra Nodoka por acaso na estação de metrô. Ela estava saindo para observar as nuvens na encosta da montanha. O Sensei decide acompanhá-la até a plataforma da estação."
326397231 = "Quando Precisar de Ajuda, Chame o C&C!"
767045695 = "Durante uma missão, Karin encontra o Sensei que estava capturado na base da Turma do Capacete. Embora ela o considere um pouco patético por um momento, depois de testemunhá-lo frustrar o plano da Turma do Capacete com sua astúcia, ela passa a revê-lo."
2895507513 = "Estudar É Difícil (1)"
2421241791 = "Karin tirou nota vermelha no teste e terá que fazer uma prova de recuperação. Enquanto o Sensei a ajuda a estudar, eles têm conversas desconexas."
3585362705 = "Estudar É Difícil (2)"
3964994116 = "Embora a prova de recuperação tenha sido um desastre, as atividades de Karin na Schale e no Departamento de Empregadas são reconhecidas, e ela só precisa cumprir tarefas adicionais. Enquanto resolve as tarefas, ela tem várias conversas com o Sensei."
2935757546 = "Meu Relacionamento com o Sensei?"
828985389 = "No telhado de Millennium, Karin pede conselhos ao Sensei sobre amizade."
2617383226 = "Maid Café! (1)"
3031156327 = "O Sensei, que entrou por acaso em um maid café, encontra Karin. Ela atende o Sensei com uma atitude desajeitada, mas no final, não aguenta a vergonha e grita alto."
4006315302 = "Maid Café! (2)"
2845710536 = "O Sensei, que visitou o maid café novamente, tem a chance de conseguir um cartão de membro especial, mas pede para Karin pisar nele. O Sensei passa um tempo agradável sendo pisado por Karin."
3512015253 = "O Mal-Entendido Dela"
2188282003 = "O Sensei entra em um esgoto para pegar moedas que caíram na frente de uma máquina de venda automática. Iori, que passava por ali, o considera um tarado."
3619712072 = "Descanso no Pátio da Escola"
1611838701 = "O Sensei está cochilando deitado nas pedras do pátio da Academia Gehenna, e novamente Iori o considera um tarado."
3380667060 = "Negociação Secreta"
3253843096 = "Iori descobre que o Sensei estava tentando comprar seu álbum de formatura do ensino fundamental de um contrabandista do Mercado Negro e o repreende como 'tarado'."
225526158 = "Tratamento Gentil"
3928473847 = "O Sensei trata Iori, que se feriu durante as atividades do Comitê Disciplinar, na enfermaria da Academia Gehenna."
3130291039 = "O Mal-Entendido do Sensei"
1881265348 = "O Sensei encontra Iori por acaso presa em uma armadilha em uma área residencial e aproveita a oportunidade para provocá-la, invertendo os papéis de sempre."
4152216310 = "Me Chame de Meister"
1896022794 = "Hibiki conserta o smartphone quebrado do Sensei a seu pedido. Ela tenta instalar uma função de autodestruição adicional, mas o Sensei a impede de alguma forma."
714863453 = "Chama Que Acende no Coração"
3818451070 = "Hibiki mostra ao Sensei sua nova máquina de fogos de artifício. Enquanto a operam, um míssil é disparado acidentalmente pelo Sensei e atinge a Torre Millennium."
919844422 = "Um Strike no Seu Coração"
1604766958 = "Hibiki modifica uma máquina de arremesso enquanto recebe conselhos de beisebol do Sensei. Após várias discussões, nasce uma máquina de arremesso com função de vaia."
2764647337 = "Se Eu Pudesse Sonhar, Passaria o Dia Com Você"
3837035412 = "Hibiki prepara uma invenção para ajudar o Sensei a dormir. É uma máquina assustadora que faz o usuário adormecer instantaneamente."
1446176968 = "Sentimentalismo em Dias de Chuva"
1724445069 = "O Sensei e Hibiki, que se encontraram na biblioteca, decidem voltar para casa juntos, compartilhando um guarda-chuva amigavelmente."
3087974166 = "Esta Noite É Para Você!"
571050076 = "Hibiki e o Sensei lutam juntos para consertar a instalação de fornecimento de energia de Millennium. Depois de conseguirem consertar à noite, Hibiki e o Sensei passam um tempo agradável admirando a paisagem noturna de Millennium."
2640531275 = "A Forma do Apego"
3599202500 = "O Sensei visita Hibiki para pegar a bicicleta que deixou para consertar. Diante do Sensei que diz não precisar de modificações, Hibiki argumenta as vantagens usando seus óculos de proteção como exemplo. Durante a conversa, o Sensei aponta que os óculos não têm a função de autodestruição que ela sempre coloca, e Hibiki percebe seus próprios sentimentos de não querer perder o que é importante sem ter consciência disso."
2971539326 = "Inspeção Surpresa"
1641801255 = "Kayoko está sendo interrogada pela polícia por ser considerada suspeita devido à sua aparência assustadora, e o Sensei, que passava por ali, a defende."
3541264622 = "Limpeza do Escritório"
970135422 = "Kayoko limpa o escritório dos Serviços de Prestação desde cedo. O Sensei decide ajudar, e os dois limpam juntos."
110591004 = "Rock Spirit"
1877823555 = "O Sensei decide ouvir a nova música da banda de heavy metal recomendada por Kayoko."
4006123680 = "Beco em Dias de Chuva"
2367456929 = "Em um dia chuvoso, o Sensei encontra Kayoko por acaso e descobre que ela está cuidando de gatinhos."
3930206688 = "Loja de Discos"
2993258377 = "Em um dia de folga, o Sensei e Kayoko se encontram por acaso em uma loja de discos e passam um tempo agradável recomendando músicas um ao outro."
2727647181 = "Manhã, Empregada, Limpeza!"
3993761072 = "A caminho da escola, o Sensei vê Neru limpando a rua. Envergonhada por ter sido vista, Neru adverte o Sensei para não contar a ninguém."
3312820670 = "Visitando Neru Doente"
3815418736 = "O Sensei visita Neru, que está resfriada, e cuida dela."
2327048759 = "Neru Cuida do Sensei"
1005194850 = "Neru visita o Sensei, que está resfriado, e cuida dele."
127779370 = "Grande Confusão por Atraso"
853344527 = "Os bandidos que guardam rancor de Neru tentam de todas as formas fazê-la chegar atrasada na escola para que seja suspensa, mas todos os seus planos falham."
2759482117 = "Em uma Noite Brilhante"
2769268860 = "Neru e o Sensei passam um tempo agradável admirando a paisagem noturna do telhado de Millennium."
909021747 = "A Razão da Jaqueta Sukajan"
1824681443 = "O Sensei visita o campus de Millennium para encontrar Neru. Lá, vê alunos assustados com a aparência chamativa de Neru. Quando pergunta por que ela sempre usa jaqueta sukajan, Neru conta timidamente o motivo."
3523370044 = "Falha de Comunicação"
407255645 = "O Sensei elogia as magníficas asas de Hasumi, mas ela interpreta mal e, envergonhada, foge."
192545007 = "Fato Que Não Tinha Percebido"
4215980516 = "Hasumi reclama que a dieta não está dando resultados enquanto come várias sobremesas em um café, mas logo percebe que a razão são exatamente os lanches que está comendo."
1119295837 = "Hora do Crepúsculo"
1473959282 = "Hasumi e o Sensei conversam enquanto observam o pôr do sol no parque."
926903321 = "Causa do Estresse"
4255682442 = "O Sensei se preocupa com Hasumi, que está estressada devido a uma dieta extrema."
1985523315 = "Curto, Mas Luxuoso"
2415429620 = "Apanhados por uma chuva repentina no caminho de volta da escola, Hasumi e o Sensei se abrigam em um parque próximo."
2309978531 = "O Caderno da Vice-Presidente do Comitê de Realização da Justiça"
1411120732 = "Hasumi usa o mesmo caderno desde o primeiro ano até agora. Lá estão registradas várias informações, como nomes e contatos dos membros do Comitê de Realização da Justiça, até seus gostos e hobbies, e o Sensei sente a atenção da dona. Entre eles, está registrada uma pessoa com o mesmo aniversário e gostos semelhantes aos do Sensei -- Hasumi fica agitada e desconversa."
1330831614 = "Como Aumentar a Motivação para o Trabalho"
3119688622 = "Para o Sensei que trabalha duro, Aru pede um parfait em um café. O que vem é um parfait do menu exclusivo para casais, e Aru fica confusa, mas secretamente feliz."
1193817835 = "Técnica de Persuasão"
2312804979 = "Aru decide testar com o Sensei suas técnicas de persuasão. Embora ela insista que não será persuadida pelas palavras do Sensei, acaba sendo constantemente persuadida pelas palavras doces dele."
2860741943 = "Verdadeiro Líder"
674363357 = "Aru e o Sensei decidem assistir a um novo filme no cinema. Após o filme, os dois conversam sobre o conteúdo."
3045973073 = "Proposta de Contratação como Consultor de Gestão Externa"
1397280925 = "Aru tenta se mostrar madura para o Sensei. Mas um telefonema errado chega aos Serviços de Prestação, e no final da conversa, sua bravata é descoberta."
254794530 = "Importante"
2167138310 = "Em agradecimento pelos favores diários, Aru convida o Sensei para um jantar. Eles se divertem, mas na hora de pagar, ela percebe que perdeu a carteira. É algo importante que todos dos Serviços de Prestação 68 compraram juntando dinheiro para comemorar que ela se tornou a presidente. Depois de procurar a noite toda com o Sensei, finalmente encontram a carteira, e os dois vão comer lámen juntos."
1481568503 = "Pesquisa Proibida"
3240573980 = "Haruna realiza pesquisas gastronômicas no refeitório fechado da Academia Gehenna. No entanto, ela coloca álcool demais como substituto do saquê e a pesquisa termina em explosão."
3007405341 = "Caminho Solitário"
2446232030 = "Em busca do sabor supremo, Haruna visita com o Sensei uma casa de chá nos arredores de Gehenna para pesquisas. No entanto, o que ela tira é lámen instantâneo. O Sensei e Haruna decidem fazer o lámen instantâneo com toda a dedicação, seguindo a etiqueta da cerimônia do chá."
2279595776 = "A Gourmet Furiosa"
3278316917 = "Haruna estava saboreando um menu de degustação em um restaurante de luxo, mas fica insatisfeita com várias coisas, incluindo a comida, e decide explodir o restaurante."
3581669111 = "A Verdadeira Gastronomia"
1988565479 = "O Sensei encontra Haruna na área periférica de D.U., procurando novas iguarias. Os dois comem taiyaki de uma barraca e conversam animadamente."
1695258470 = "Novos Produtos!"
1967388246 = "Hifumi se vangloria alegremente para o Sensei dos novos produtos Momo Friends que comprou."
2135676389 = "O Segredo da Bolsa"
136068679 = "Hifumi organiza a bolsa do Peroro que sempre carrega e mostra seu conteúdo ao Sensei."
2419431461 = "Operação de Resgate do Sr. Peroro"
2058378536 = "Para conseguir um enorme pelúcia do Peroro, Hifumi tenta o jogo de garra no fliperama. Ela falha várias vezes, mas o Sensei consegue pegá-lo e dá o pelúcia de presente para Hifumi."
915698726 = "Consultoria de Preocupações"
3951972022 = "Hifumi, preocupada com sua personalidade sem individualidade, consulta o Sensei."
718610260 = "Passeio Casual"
3096365246 = "Hifumi, que por acaso ficou livre depois da aula, convida o Sensei para um passeio. Os dois andam por vários lugares de Trinity e passam um tempo agradável."
2433419644 = "Sessão de Aperto de Mãos Relâmpago"
2731154380 = "Hifumi e o Sensei acabam assistindo a um show dos Momo Friends por acaso na cidade. Na sessão de autógrafos seguinte, Hifumi tem a chance de apertar a mão do Peroro."
567004708 = "O Importante É a Distância!"
339869436 = "O Sensei encontra Tsurugi por acaso na rua. Mas toda vez que o Sensei se aproxima, Tsurugi foge repetidamente. Quando finalmente a captura e pergunta o motivo, Tsurugi responde que estava tentando manter distância para chamar a atenção do Sensei."
2269971719 = "Mundo das Selfies"
1992569852 = "Tsurugi precisa tirar uma foto de identificação para os documentos de Trinity. O Sensei tira várias fotos tentando aliviar a tensão de Tsurugi, mas o rosto dela sempre fica distorcido."
2150949239 = "Encontro Adulto"
3086644114 = "O Sensei convida Tsurugi para um restaurante de luxo. Tsurugi diz que aquele lugar não combina com ela e fica extremamente tensa."
3477361952 = "Caixa Especial"
1045732016 = "O Sensei encontra Tsurugi perto de um cinema. Ela conta que seu hobby é colecionar folhetos e canhotos de ingressos de cinema. Depois de ver sua coleção no quarto dela, o Sensei promete a Tsurugi que irão juntos ao cinema algum dia."
608406794 = "Reunião Noturna"
799499931 = "Para lidar com o trabalho do Comitê Disciplinar, Hina chama o Sensei tarde da noite. Como sempre, embora às vezes sinta que não pode confiar totalmente no Sensei frívolo, ela sente gratidão por ele ajudá-la seriamente no trabalho."
1206204887 = "Motivo Imponente"
3038001428 = "Hina chama o Sensei novamente para um lugar deserto tarde da noite. Quando o Sensei diz que encontrá-la tão secretamente pode parecer suspeito, Hina fica preocupada."
3916122859 = "Adultos e Crianças"
76760892 = "Apesar da agenda lotada, Hina e o Sensei conseguem arranjar tempo e visitam um pequeno shopping nos arredores de Gehenna. Eles passam por vários lugares, mas Hina não se anima muito. No entanto, com as palavras do Sensei, ela acaba se divertindo."
1437834886 = "Luz Solar Quente"
770595097 = "Hina chama o Sensei dizendo que a luz do sol está agradável, e eles tomam sol no caminho à beira do rio. O cabelo de Hina, sentada entre as pernas do Sensei, exala um bom cheiro. Quando percebe que o Sensei está cheirando, Hina fica envergonhada e brava."
484158690 = "Uma Noite Misteriosa"
2689536441 = "O Sensei ajuda Hina com o trabalho na escola à meia-noite. Vendo-a cansada devido ao trabalho intenso dos últimos dias, o Sensei acaricia sua cabeça para que ela durma confortavelmente."
3033553461 = "A Braçadeira que Pesa no Braço Esquerdo"
777765850 = "No dia de folga, Hina decide passar o tempo com o Sensei. Enquanto aproveitam eventos pequenos mas divertidos, Hina conta ao Sensei os sentimentos contidos na braçadeira de presidente do Comitê Disciplinar."
1112893421 = "Recompensa pela Sinceridade"
3973431314 = "O Sensei passa em uma loja de doces na cidade e encontra Junko trabalhando meio período. Para Junko, que trabalha duro, o Sensei lhe dá os doces que comprou como presente."
2643568139 = "Falsa Culinária"
1204261948 = "Junko e o Sensei decidem testar receitas suspeitas encontradas na internet. No entanto, a maioria tem gostos estranhos e acaba sendo um desperdício de dinheiro."
2129465828 = "Clube de Gastronomia na Pobreza"
3571878226 = "Junko, que deveria comer algo delicioso, acaba frustrada. Com pena dela, que está com fome por ter comido pouco no almoço, o Sensei lhe dá lámen instantâneo. Junko desdenha, mas depois de uma mordida, se apaixona pelo sabor."
1991574778 = "Treinamento do Estômago"
974989734 = "Para expandir o estômago, Junko come muita alga seca, mas não aguenta as algas que incham no estômago e vomita tudo."
3866442346 = "Gourmet Não Solitário"
2641616716 = "Junko e o Sensei comem muitas coisas deliciosas no bairro chinês perto do Colégio Shanhaijing. Fazendo uma pausa, pedem bebidas em um café próximo e conversam alegremente."
447359660 = "Fruto do Esforço"
3325660189 = "Junko conta feliz ao Sensei que terminou seu 'Caderno de Gastronomia' artesanal. É um caderno que resume as lojas deliciosas de Shiba Town para a própria Junko. Os dois vão a uma delas e passam um momento tranquilo enquanto conversam sobre os valores da gastronomia."
998099366 = "Vamos Fazer Compras?"
1675775908 = "Para comprar ingredientes para o refeitório da Academia Gehenna, o Sensei vai com Fuuka a um grande supermercado."
2342057365 = "A Mesa de Hoje da Srta. Fuuka"
3722225258 = "Para o Sensei, que frequentemente pula refeições devido à correria diária, Fuuka prepara uma refeição para ele. O Sensei saboreia o banquete de Fuuka, mas acaba comendo demais e pega um remédio para o estômago."
3824807776 = "Vamos Fazer Compras Novamente!"
1034716395 = "Fuuka estava escolhendo ingredientes no mercado. Durante a conversa com o vendedor, ela é confundida com a esposa do Sensei e acaba corando."
1043403340 = "Hoje a Mesa É Só Para o Sensei"
370580278 = "Para o Sensei que desmaiou de exaustão, Fuuka decide cozinhar na Schale."
2861325865 = "A Chefe do Departamento de Refeições Quer Se Esforçar!"
958810626 = "Fuuka fica bêbada só de provar o saquê de cozinha. Com um tom de bêbada, ela reclama das queixas que o Departamento de Refeições sempre recebe."
2503992938 = "A Treinadora Chegou!"
2844960890 = "Sumire pede conselhos ao Sensei sobre seu plano de treinamento. Para ajudá-la com a agenda irrealista de treinos, o Sensei assume o papel de treinador pessoal."
2757435988 = "Junto com a Treinadora"
1543696324 = "Para comprar proteínas e suplementos necessários para o treino, o Sensei decide sair com Sumire pela cidade. Sumire, sempre que tem tempo, começa a treinar sem se importar com os olhares alheios……"
2129718510 = "A Treinadora Também Junto"
3033616045 = "Sumire, com base em sua experiência de treinamento, também recomenda que o Sensei faça musculação. Enquanto consola o Sensei que sofre com o treino repentino, Sumire parece estar se divertindo muito."
789432916 = "Encontro"
2467696253 = "No fim de semana, Sumire sai para a cidade para um encontro com o Sensei. Ela declara que hoje esquecerá os exercícios e comerá o que quiser, mas, por hábito, acaba verificando as informações nutricionais dos doces."
4027920287 = "O Limite da Treinadora"
969196443 = "O Sensei decide fazer jogging com Sumire. Preocupado porque Sumire parece mais cansada do que o normal, ela mostra os pesados sacos de areia que estava carregando…… O Sensei tenta carregá-los em seu lugar, mas desiste devido ao peso excessivo."
1231386408 = "Consumo Planejado"
1523855793 = "Yuuka, que passou na sala de trabalho da Schale para entregar relatórios, descobre os hábitos de vida desleixados do Sensei. Enquanto reclama, ela acaba ajudando o Sensei a organizar seus recibos."
1926315910 = "Valor Incalculável"
3885120659 = "Yuuka está preocupada diante de uma pintura cara que recebeu como garantia de um empresário endividado com Millennium. Ela se esforça para entender o valor da pintura abstrata que parece um rabisco, mas o Sensei aponta que é uma falsificação vermelha sem valor algum."
3246715250 = "Calculadora Humana"
36783089 = "O Sensei, que recuperou armas e outros equipamentos dos bandidos, fica perplexo porque as unidades de medida são diferentes das usadas atualmente na Schale. Yuuka, sabendo disso, usa sua habilidade de cálculo para ajudar o Sensei."
540132105 = "Dormir Demais"
1727423292 = "Depois de trabalhar até tarde no conselho estudantil, Yuuka se atrasa para o plantão na Schale no dia seguinte. Citando a promessa anterior, ela insiste que deve ser punida, mas o Sensei, vendo que ela está cansada, permite que ela tire uma soneca."
1211884829 = "Cara de Pôquer"
3001919061 = "Yuuka e o Sensei decidem jogar pôquer. Yuuka joga calculando as probabilidades, mas por algum motivo perde repetidamente. Depois do jogo, desanimada, ela arruma as coisas, mas descobre que o Sensei estava trapaceando e levanta a voz."
1436490456 = "Rainha do Cálculo Mental"
2237624638 = "Preocupada por estar dependendo demais da calculadora ultimamente, Yuuka decide treinar cálculo mental com o Sensei. Ela responde confiante às questões que Yuuka propõe."
1186793633 = "O Hobby de Ayane"
3936794888 = "Em um dia de folga, Ayane chama o Sensei ao Colégio Abydos e pede para ele avaliar um livro antigo."
1069713218 = "Corra, Ayane"
3843866508 = "Por acaso, Ayane encontra uma grande quantidade de ferro no campus de Abydos e acaba vendendo para um comerciante habitual pelo preço normal. No entanto, depois descobre que não era ferro comum, mas sim um ferro valioso, e Ayane corre para perseguir o caminhão do comerciante."
247517590 = "O Desastroso Drama de Reparos de Ayane"
1735248341 = "Para consertar as instalações danificadas da escola, Ayane e o Sensei percorrem vários lugares do Colégio Abydos. Apesar de vários problemas, os dois conseguem consertar as instalações hidráulicas com sucesso."
3375124759 = "Hoje Também Treino Cochilando"
3209149419 = "O Sensei vem encontrar Tsubaki, que disse que mostraria um exemplo de treinamento. Indo ao local combinado, encontram Tsubaki dormindo e realizando várias ações estranhas que surpreendem as pessoas."
462720006 = "Método de Treinamento de Tsubaki: Edição de Ferramentas"
3217352150 = "Tsubaki avisa que seu 'travesseiro favorito (ferramenta de treinamento)' quebrou, e os dois saem para comprar um substituto. Olham várias coisas, mas não encontram um travesseiro que agrade, e no final, ela escolhe o colo do Sensei."
2496334832 = "Método de Treinamento de Tsubaki: Edição Prática"
2280120755 = "Tsubaki ensina ao Sensei seu método de treinamento, que na verdade é um método de sono. Enquanto o Sensei está de olhos fechados, Tsubaki fica olhando fixamente para seu rosto, mas o Sensei percebe e ela fica envergonhada e emburrada."
1683959468 = "Perfeito para Treinar com Você"
2637987650 = "Tsubaki e o Sensei, sob o pretexto de treinamento, decidem cochilar juntos no meio dos arbustos."
3727448249 = "A Pequena Demônia Gosta de Brincar"
2632081395 = "Mutsuki, que veio para a Schale, insiste para que o Sensei, que está trabalhando, brinque com ela. O Sensei, convencido, decide brincar com Mutsuki usando uma 'pulseira que dá choque elétrico quando os batimentos cardíacos aceleram'."
630673951 = "O Segredo da Pequena Demônia Que Não Se Pode Contar"
3694200112 = "Convidado por Mutsuki, o Sensei visita os Serviços de Prestação. O Sensei fica curioso sobre o conteúdo da bolsa de Mutsuki, mas sua verdadeira natureza nunca é revelada."
3654338495 = "O Hobby da Pequena Demônia"
923060075 = "O Sensei, que estava patrulhando a cidade, encontra Mutsuki por acaso e a segue até o Mercado Negro. Mutsuki, que encontrou o Sensei, diz que 'veio fazer compras de hobby' e o leva a uma loja especializada em bombas."
2198801559 = "Um Pedido Especial de Alguém"
236148924 = "Para cumprir um pedido de uma pessoa misteriosa, o Sensei decide acompanhar Mutsuki. Os dois seguem as instruções do pedido, mas o conteúdo é quase todo de eventos que parecem um encontro. Depois, enquanto acompanham Mutsuki, que parece estar se divertindo, descobrem por acaso que a pessoa que fez o pedido era a própria Mutsuki, uma farsa armada por ela. Embora Mutsuki demonstre um leve arrependimento por ter sido descoberta, ela vai embora de bom humor, dizendo que se divertiu brincando com o Sensei."
1512221497 = "Imagem de Hacker"
276239373 = "Hare, que foi ver um novo filme, parece insatisfeita porque os hackers no filme foram retratados com malícia. Ela tenta hackear o site da produtora como vingança, mas o Sensei aponta que isso seria igual aos hackers do filme."
775079157 = "Vício em Bebida Energética"
2483969389 = "Seguindo o conselho do Sensei, Hare decide parar de beber as bebidas energéticas que consumia regularmente. No entanto, em poucos dias, ela sofre de sintomas de abstinência e acaba voltando a beber."
363645391 = "Bem-vindos ao Cybercafé"
1554368360 = "O Sensei e Hare são surpreendidos por uma chuva repentina enquanto saíam para comprar uma nova placa gráfica. Os dois decidem entrar em um cibercafé para se abrigar. Hare observa as várias instalações do cibercafé com olhos curiosos."
3961304199 = "Máquina Traidora"
1946980109 = "Hare demonstra o desempenho de seu drone recém-modificado para o Sensei. No entanto, durante o teste do modo fitness, o drone enlouquece e força Hare a fazer exercícios intensos. O drone também tem uma função de choque elétrico para execução forçada, e Hare acaba correndo até ficar exausta."
340540264 = "Máquina Traidora (2)"
3000054060 = "Um dia, Hare envia de repente uma selfie. O Sensei, achando estranho, pergunta a Hare, e ela responde que a foto não foi tirada por ela, mas sim enviada pelo drone de inteligência artificial. Furiosa com o drone, Hare começa a desmontá-lo --"
4201884713 = "Marcapasso"
2638532609 = "Akari pede ao Sensei para ajudá-la como marcapasso no treinamento para uma competição de comida na galeria comercial. No entanto, o Sensei não consegue acompanhar a velocidade anormal de Akari e desiste."
2932734876 = "Sem Alho, Por Favor"
3327817711 = "Akari fica preocupada com o cheiro de alho depois de comer lámen. Depois de pensar muito, ela tenta forçar o Sensei a comer vários pratos com alho, aproveitando a propriedade de que, se sentir o mesmo cheiro continuamente, não será mais capaz de percebê-lo."
940784146 = "Banida"
2345252510 = "Por ser amplamente conhecida como uma grande comedora, Akari é recusada em vários restaurantes de comida à vontade. O Sensei, que a encontra por acaso, decide lhe pagar um sushi giratório, mas a quantidade supera em muito as expectativas do Sensei, e sua carteira fica em perigo."
929421191 = "Orgulho de Gourmet"
1967999950 = "Akari, que desafiou o Mapo Tofu de um restaurante chinês, percebe que os funcionários estão colocando uma grande quantidade de temperos para impedi-la de ter sucesso. Indignada com o restaurante que trata mal a comida, Akari os pune continuando a comer grandes quantidades de Mapo Tofu."
3792410708 = "Como Ficar Muito Mais Delicioso"
147735400 = "Depois de ler a autobiografia de uma atleta, Izumi tenta fazer os exercícios intensos descritos com o Sensei. Mas, obviamente, o sabor da comida não muda drasticamente como ela esperava, e ela fica desapontada."
2981660607 = "Pudim Delicioso"
276818574 = "Izumi e o Sensei fazem fila para comer o pudim especial de uma barraca no festival. Os dois conseguem comprar o pudim, recusando as tentações doces de vários gourmets que aparecem depois, mas é algo bem estranho chamado 'pudim de geleia de enguia'."
2884713095 = "Sem Querer"
995676787 = "A caminho de um novo restaurante de lámen, o Sensei e Izumi encontram gatos de rua famintos. O Sensei oferece petiscos para gatos, mas Izumi, atraída pelo cheiro, pega e come os petiscos."
2892669052 = "Dia do Cachorro-Quente"
3208438623 = "Izumi chama o Sensei, dizendo que tem algo para mostrar. Era uma amostra de cachorro-quente. Enquanto o Sensei admira a qualidade da amostra, um corvo a rouba --"
2135935597 = "Segredos de Adulto"
4254451472 = "Para descobrir os segredos do Sensei, Kotama tenta de várias maneiras instalar escutas na Schale, mas todas as tentativas falham. Quando perguntada por que vai tão longe, Kotama responde: 'Quero conversar mais naturalmente com você, Sensei, que parece estar acima das nuvens'. O Sensei então secretamente conta a Kotama seus pontos fracos."
533037626 = "As Ondas de Rádio da Mary"
194076815 = "Certa noite, o Sensei ouve uma voz misteriosa na área residencial da Schale. Após análise de Kotama, descobre-se que a voz era de um rádio com interferência. Ao contrário do Sensei, que fica aliviado, Kotama fica um pouco desapontada por não ser um fantasma de verdade."
3144808590 = "Coisas Que Não Podem Ser Ditas"
1236053719 = "Enquanto escuta telefonemas como de costume, Kotama ouve o Sensei tendo uma conversa suspeita com um comerciante estranho. Preocupada de que o Sensei esteja envolvido em crimes, ela logo descobre que o Sensei estava apenas encomendando umeboshi."
666630201 = "Branco Puro e Transparente"
1213415440 = "O Sensei encontra Kotama por acaso em uma loja de discos. Quando pergunta o que ela estava ouvindo de olhos fechados, ela diz que estava ouvindo sons ambientes. E então, ela fala alegremente sobre sons ambientes."
4062519371 = "Alma de Artesã"
2032324318 = "Utaha decide fazer um novo porta-canetas com uma impressora 3D para o Sensei. No entanto, ela não consegue fazer algo que atenda aos seus próprios padrões. Diante de sua alma de artesã que não aceita concessões, o Sensei pensa: 'Já está bom assim, quero logo……', mas não consegue dizer com firmeza."
1586945368 = "Um Bom Artesão Não Escolhe a Ferramenta?"
1796399232 = "Utaha e o Sensei vieram comprar novas ferramentas para deixar na Schale. Utaha fala apaixonadamente sobre o valor das ferramentas e recomenda a compra de um conjunto de ferramentas de alta qualidade."
945629632 = "O Animaloide Perfeito"
3644826021 = "Utaha confunde um filhote de cachorro que se perdeu na Schale com um animaloide de última geração e fica arrasada com sua própria falta de habilidade."
2115816456 = "Coisas Que Não Posso Mostrar"
792271785 = "Para consertar o 'Raichan' quebrado, Utaha pega emprestado um depósito vazio da Schale. Utaha, com vergonha de ser vista suja pelo conserto, tenta indiretamente afastar o Sensei, mas no final, os dois acabam trabalhando juntos."
1405659911 = "A Insígnia do Meister"
2353410857 = "Utaha e o Sensei veem um novo salão de unhas que abriu na galeria comercial. Incentivada pelo Sensei, Utaha cuida das unhas e fica impressionada com a técnica. Quando o Sensei sugere que ela vá com frequência, Utaha responde: 'Meus dedos sempre sujos de óleo também são uma insígnia de meister', e desta vez, como recordação, ela faz apenas a unha do mindinho."
3924052595 = "Mesmo Que Tudo Seja Trocado"
3200520496 = "Convidados por Utaha, o Sensei e ela visitam sua loja de ferramentas favorita. Então, ela troca ferramentas antigas e conta que este é seu 'Conjunto de Ferramentas Meister', personalizado e usado com carinho por muitos anos. Embora nada do que ela tinha originalmente tenha restado, pois ela continua trocando, ela diz feliz que a essência é a mesma se o usuário for o mesmo."
4046207094 = "O Cheiro das Nuvens"
4105126090 = "O Sensei persegue nuvens na galeria comercial junto com Chise, que diz 'quero procurar nuvens'. Os dois passam um tempo observando e perseguindo várias nuvens, mas a 'nuvem' que Chise menciona não é encontrada até o final, e em vez disso, compram e comem algodão doce que se parece com nuvens."
1745027801 = "A Ídolo do Departamento Onmyou"
1633057737 = "A caminho da livraria para comprar uma coletânea de haicais, Chise e o Sensei encontram fãs de Chise. O Sensei tenta de alguma forma despistar os fãs entusiasmados, mas a própria Chise parece não se importar."
1120186993 = "Noite de Lua, Composição, Especial"
576363469 = "Para compor um haicai a ser exibido no centro comunitário, Chise decide passear pela cidade com o Sensei para se inspirar. Embora não se sinta totalmente satisfeita, relembrando o dia divertido com o Sensei, ela consegue compor um haicai sincero."
41249476 = "O Som do Vento Chegando"
2219822065 = "Em um dia quente de verão, Chise chama o Sensei dizendo que vai deixá-lo ouvir o som do vento chegando. Deitados no chão, aguçando os ouvidos, eles realmente ouvem o som claro do vento."
68609484 = "Injeção Que Não Dói?"
1238741882 = "Hanae, querendo se acostumar a dar injeções, pede ao Sensei para praticar. No entanto, por ter aprendido dicas de um livro errado, ela causa um grande estrago no braço do Sensei."
3359142014 = "Insônia"
704371455 = "Para o Sensei que sofre de insônia, Hanae prepara um lugar para cochilar. Ela tenta fazê-lo desmaiar à força para dormir, mas é convencida pelo Sensei a desistir e, em vez disso, prepara chá de ervas."
468644606 = "Ginástica Radiofônica"
2086188010 = "Em uma manhã de folga, Hanae, que visita a área residencial da Schale, acorda o Sensei que está dormindo e faz ginástica radiofônica com ele."
1129161301 = "Cirurgia ao Estilo Trinity"
1115265687 = "Enquanto organiza o depósito da Ordem dos Cavaleiros de Resgate, o Sensei machuca a perna, e Hanae diz: 'Vamos amputar a perna agora mesmo!'. De alguma forma, o Sensei a convence, e ela traz desinfetante e band-aid para tratá-lo."
2874947170 = "Diário de Observação da Glória-da-Manhã"
86110047 = "De manhã cedo, o Sensei encontra Hanae cuidando das glórias-da-manhã no terraço externo da área residencial da Schale, e os dois conversam alegremente."
244804059 = "O Anjo de Trinity"
3281711713 = "O Sensei vê por acaso Serina cuidando de crianças no parque. Envergonhada por ter sido vista, Serina se preocupa com o Sensei, que está ocupado com o trabalho."
1246494305 = "Anjo Caído na Calada da Noite"
1349449479 = "Serina visita o Sensei, que está trabalhando até tarde na Schale, e decide ajudá-lo."
3235653381 = "Sempre e em Qualquer Lugar, Serina Também"
1669978221 = "Com um apagão repentino, o Sensei se machuca, e Serina aparece para tratá-lo. O Sensei acha estranho que ela apareça com uma rapidez absurda toda vez que ele se machuca, mas Serina, envergonhada, desconversa."
1885780666 = "Na Palma da Sua Mão"
2900260446 = "Toda vez que o Sensei está com problemas ou sofrendo, Serina aparece de repente para ajudar. Para retribuir, o Sensei faz uma pequena encenação e a chama. De repente, colocada na posição de ser cuidada e mimada, Serina fica confusa, mas sinceramente feliz."
2227241074 = "Por Favor, Ouça Minha Explicação!"
2381492343 = "Os alunos de Millennium evitam Kotori, que sempre quer explicar tudo. O Sensei diz a Kotori, preocupada com seu lado tagarela, que a acha fofa também, mas quando ela começa a falar, o Sensei também foge junto com os alunos."
1879189076 = "Foi a Escolha Certa Me Perguntar!"
3040174105 = "Talvez porque os alunos sempre fujam quando Kotori começa a falar, ela parece um pouco irritada. Percebendo isso, o Sensei pede para ela explicar algo, e depois de falar o quanto queria, Kotori recupera o ânimo."
587880302 = "A Resposta É o Sensei!"
4162760118 = "Kotori, que estava preocupada com uma pergunta de outra aluna sobre 'o coração feminino', percebe durante a conversa com o Sensei que é semelhante aos seus 'sentimentos pelo Sensei' e foge envergonhada."
3299613520 = "Mesmo Com Tudo Pronto"
3113492896 = "Kotori, que acabou recebendo uma pergunta do Sensei inesperadamente, estava preparada para qualquer pergunta, mas percebe que o conteúdo é sobre ela mesma e fica em pânico com a situação imprevista."
3925290057 = "Óculos de Forma Diferente"
1405678383 = "Preocupado com Kotori, que disse ter deixado seus óculos para consertar, o Sensei visita Millennium. Indo encontrá-la, ela diz que os óculos já foram consertados e está tudo bem. Quando o Sensei pergunta sobre o formato estranho dos óculos de Kotori, ela 'explica' detalhadamente que há razões práticas relacionadas à sua natureza de gostar de explicar."
2128994052 = "Não Vou Ceder!"
398808592 = "Para comprar um item de evento limitado, Yoshimi vem ao café com o Sensei. Vendo Yoshimi hesitar porque o preço é mais alto do que o esperado, o Sensei compra para ela."
2140540293 = "Desafio do Macaron"
2645271508 = "Yoshimi e o Sensei participam de uma competição de comer macarons. Embora inicialmente tenham dificuldade com os macarons doces, por engano, Yoshimi acaba sentando no colo do Sensei e, para esconder a vergonha, come todos os macarons instantaneamente, e os dois vencem."
188196592 = "Estudo no Café"
3493185503 = "O Sensei e Yoshimi visitam um café para estudar para a prova. Os dois comem vários doces enquanto avançam nos estudos."
2147149955 = "Bem Perto Desse Brilho"
3715343759 = "O Sensei, que comprou o doce que Yoshimi queria, estava tentando colocá-lo secretamente no armário de sapatos. No entanto, Yoshimi o vê em flagrante e pergunta o que ele estava fazendo. Depois de resolver o mal-entendido, eles vão juntos para um certo café, brincando como sempre."
844314736 = "Caçadora de Doces"
2266129221 = "Chegando na frente do café, o Sensei tenta comer imediatamente o doce que Yoshimi lhe deu de presente. Yoshimi declara ao Sensei que, se abrir, ela o confiscará. A situação está prestes a despertar a 'Caçadora de Doces' que dormia dentro de Yoshimi……"
2044734478 = "Garota Amante de Livros"
906920889 = "O Sensei visita Shimiko, que trabalha como bibliotecária. Embora pareça uma garota literária comum e quieta, Shimiko tem um lado surpreendente."
341307521 = "Segredo a Dois"
3243951534 = "Na biblioteca à meia-noite, muito depois do horário de fechamento. Para Shimiko, é finalmente a hora de ler tranquilamente. O Sensei passa um tempo noturno tranquilo a sós com Shimiko."
1860734903 = "Em Busca de Tesouros"
2870193424 = "Shimiko espera que, entre os livros não registrados que estão espalhados pela biblioteca, talvez haja novos livros nunca antes vistos. O Sensei ajuda nessa caça ao tesouro, mas o que Shimiko encontra no final é algo completamente diferente do que imaginava."
4293465345 = "Vezes Sem Fim"
499400354 = "Shimiko recebe feliz o Sensei, que foi à biblioteca em busca de um livro difícil de encontrar. Enquanto procuram juntos, ela conta que, embora a maioria dos livros tenha sido digitalizada, ainda há pessoas que vêm à biblioteca em busca de livros raros que só existem em papel. Ela sorri, dizendo que é para essas pessoas que ela trabalha como bibliotecária."
1596075158 = "Doces Como Almoço"
4257306641 = "Airi compra muitos cupcakes, os novos doces do café, e os dá de presente para o Sensei ocupado."
2315835548 = "Ingestão de Açúcar"
3621133641 = "Airi pede muitos doces de chocolate para o Sensei ocupado, e os dois se dedicam a ingerir açúcar."
1960740624 = "A Preocupação de Airi"
2777060658 = "Preocupada com sua personalidade passiva, Airi decide consultar o Sensei."
408399339 = "Um Pequeno Encontro"
2272549639 = "Após superar um trabalho intenso, o Sensei sai para relaxar e encontra Airi por acaso no caminho. Desanimada por não ter nenhum doce com ela, o Sensei decide comprar sorvete para Airi. Os dois passam um tempo agradável comendo sorvete à beira do rio."
1782328244 = "Algo Que Alguém Deve Fazer"
3366205849 = "Quando o Sensei visita a Academia Gehenna, lá está Chinatsu tentando carregar sozinha uma grande quantidade de documentos. Embora não seja sua responsabilidade, ela diz 'porque alguém tem que fazer', e o Sensei a ajuda enquanto conversam sobre várias coisas."
2999062443 = "Um Dia Comum"
2192314265 = "Chinatsu passa seu primeiro dia de folga em muito tempo, sem trabalho do comitê, junto com o Sensei. Embora seja um dia de folga comum e sem nada de especial, para Chinatsu, que tem dias agitados no comitê, esse dia comum é insubstituível."
43408834 = "Quando Estiver Cansada"
2645077696 = "O Sensei desmaia de exaustão. Chinatsu, encarregada dos primeiros socorros, reclama um pouco, mas hesitantemente faz uma certa proposta."
476448061 = "Inesperado"
184627506 = "Para ajudar Chinatsu a organizar documentos, o Sensei decide visitar a sala do Comitê Disciplinar onde ela está."
3121964723 = "O Que Posso Fazer"
4246066356 = "Em um dia de folga, o Sensei encontra Chinatsu, que está de folga mas indo ajudar o Departamento de Medicina de Emergência. No passado, Chinatsu pertencia ao Departamento de Medicina de Emergência, e a bolsa que ela usa é a mesma desde aquela época. Sentindo a necessidade de pessoal médico no Comitê Disciplinar, ela se transferiu dizendo que 'alguém tem que fazer'. Conhecendo novamente o senso de responsabilidade de Chinatsu, o Sensei a acompanha ao Departamento de Medicina de Emergência."
1548146425 = "Erro de Destinatário"
877809924 = "Haruka enviou uma mensagem para o Sensei por engano. Enquanto fala com Haruka, que está se desculpando profusamente por tê-lo chamado, o Sensei descobre sobre a bomba e acaba prevenindo um grande incidente."
1671304279 = "Erro de Comunicação"
3020050882 = "Como retribuição pelo favor anterior, Haruka tenta expressar sua gratidão ao Sensei. O Sensei fica feliz com o presente de ervas daninhas que Haruka deu, mas na verdade não foram apenas ervas daninhas que ele recebeu."
633551809 = "Algo Que Não Está Errado"
3896770278 = "Desta vez, Haruka tenta dar um presente adequado ao Sensei. Mas nesse momento, um boletim de notícias sobre um roubo é transmitido……?"
3551997534 = "Suposição Errada"
3632616866 = "Haruka envia uma mensagem preocupante pelo MomoTalk, e o Sensei corre para o fundo da floresta onde Haruka deveria estar. No final, descobre-se que foi um mal-entendido, mas, inversamente, o Sensei acaba sendo ajudado por Haruka."
3415164555 = "Por Engano"
3460878926 = "Por uma série de coincidências, o Sensei acaba visitando o jardim de Haruka. Naquele lugar onde ninguém mais veio, os dois compartilham um segredo."
3547031295 = "O Tempero Mais Importante"
151158527 = "Para saber a quantidade certa de 'amor' necessária na culinária, Juri convida o Sensei e lhe serve comida. O Sensei passa por perigos, como perder a consciência a cada mordida, mas mesmo assim decide comer tudo por Juri."
2010079435 = "A Culinária Dela"
1410164640 = "Curioso sobre por que sempre falha, o Sensei decide observar Juri cozinhando. Durante o processo, a metodologia fora do comum de Juri e um poder misterioso (?) gradualmente se revelam."
2441506309 = "Sentimento de Querer Superar"
1176188569 = "Juri e o Sensei decidem investigar novamente a causa de tantas falhas. Tentam várias condições, evitando métodos perigosos, mas por algum motivo, tudo ainda falha. Juri está prestes a desistir, mas se recompõe com as palavras do Sensei e continua tentando."
3780570582 = "O Que Posso Fazer Ainda Inexperiente"
2113145817 = "Convidado por Juri, o Sensei visita o refeitório estudantil de Gehenna. Juri, com ferramentas agrícolas nas mãos, guia o Sensei até a horta do Departamento de Refeições. Embora ainda seja inexperiente na culinária, Juri diz que quer cultivar os ingredientes com dedicação e transmitir alegria às pessoas. Emocionado com sua atitude, o Sensei a ajuda com o trabalho agrícola."
294424124 = "A Garota do Seu Próprio Ritmo"
3761374176 = "Asuna, que deveria estar cumprindo uma missão, por algum motivo quer comer sobremesa com o Sensei em um café. Embora parecesse estar agindo por conta própria, no final, ela consegue cumprir a missão de alguma forma."
2056547858 = "Encontro de Perseguição por Acaso"
714563164 = "Mais uma vez, o Sensei recebe uma convocação repentina de Asuna. Embora estivessem apenas passeando e se divertindo, nos bastidores, mais uma vez, algo foi resolvido com sucesso."
658609856 = "Maid in Surprise"
2779044677 = "Como agradecimento, Asuna aparece de repente na Schale dizendo que vai servir. Mostrando sua habilidade de sempre, sem saber se é coincidência ou intencional, ela acaba revelando um lado raro no final."
1365513912 = "Asuna Quebrada"
2538101858 = "Preocupado com uma mensagem estranha de Asuna no MomoTalk, o Sensei sai para procurá-la e a encontra distraída no parque. Segundo ela, quando tem muito tempo livre, às vezes sua concentração fica assim. Levando Asuna, com passos incertos, de volta ao dormitório, ela cai da escada -- O Sensei a protege com seu corpo, e ela recupera seu estado normal."
3812863199 = "Amuleto da Sorte"
3890514637 = "O Sensei, chamado por Asuna, vai ao local e encontra uma batalha intensa. Asuna a controla sem dificuldade, mas percebe que perdeu seu precioso laço de fita em algum momento. Mostrando o laço azul que felizmente foi encontrado, ela diz que é seu símbolo de sorte. Rindo, ela diz que cuidará ainda mais dele para não perdê-lo novamente."
998617790 = "Aluna do Caminho do Chivalry"
1113084635 = "O Sensei encontra Fina, uma garota que admira o chivalry. Embora ela pareça ter muitos mal-entendidos, parece que ela tem seu próprio senso de 'honra'."
1867792173 = "O Importante É o Conteúdo"
2170262034 = "Fina quer imitar os protagonistas dos filmes de chivalry. No entanto, como a maioria dos protagonistas desses filmes são cães ou gatos, as roupas não servem, e ela desiste. O Sensei consola a desanimada Fina."
3908561949 = "Noite Sem Fim"
1780086198 = "Fina consegue ingressos e convida o Sensei para uma maratona de filmes. Embora cada filme seja maravilhoso, depois de assistir a muitos filmes do mesmo gênero por tanto tempo, o Sensei desmaia no meio."
2367962991 = "Nessas Horas"
462143440 = "O Sensei é chamado a um certo restaurante. Lá, Fina, devidamente vestida, oferece um copo dizendo que realizará um ritual especial com o Sensei. Rindo que não pode beber álcool por ser menor de idade, Fina e o Sensei brindam com chá."
3128096708 = "A Milícia Voluntária de Trinity"
192851048 = "Suzumi, da Milícia Voluntária, salva o Sensei de uma enrascada com alunos delinquentes. O Sensei é escoltado por Suzumi no caminho de volta para a Schale."
1108192908 = "Brilhando a Ponto de Cegar"
2489237266 = "O Sensei segue para o destino escoltado por Suzumi. Nervosa demais por querer escoltar o Sensei com segurança, Suzumi dispara várias granadas de luz. Depois, já mais calma, ela chega ao destino com o Sensei, mas fica ainda mais agitada quando o Sensei diz que a escolta era apenas um pretexto e que só queria caminhar junto."
813863657 = "A Teoria da Onipotência da Granada de Luz"
4144458217 = "Suzumi protege a segurança de Trinity como membro da Milícia Voluntária por sua própria vontade, sem ser forçada por ninguém. As granadas de luz que ela usa frequentemente são um símbolo de seu orgulho e bondade."
743591040 = "Perseguindo o Brilho"
1173255493 = "Suzumi convida o Sensei para um parque de diversões tranquilo. Ela conta que costuma olhar as estrelas deste lugar, que visita no final de sua patrulha. Pensando que as estrelas poderiam ser vistas melhor de um lugar mais alto, ela diz que quer andar na roda-gigante juntos. Assim, os dois desfrutam da luz das estrelas no céu noturno."
1939284311 = "Parceira Importante"
2776112655 = "O Sensei, que visita Trinity, decide encontrar Suzumi. Ela, que chega apressada, tira os fones de ouvido e se preocupa se parece uma aluna irresponsável, mas sorri com as palavras do Sensei: 'Eu sei que você sempre se esforça'."
1950563989 = "E Então Izuna Segue"
381151088 = "Por algum motivo, Izuna está seguindo o Sensei. Quando perguntada o motivo, ela diz que é para protegê-lo. Quando o Sensei diz que segui-lo secretamente pode incomodar a pessoa, Izuna fica triste, mas é convidada para comer e imediatamente se anima."
1340418237 = "E Então Izuna Protege"
576267045 = "Refletindo sobre a vez anterior, desta vez Izuna declara abertamente que o seguirá aonde quer que vá. Embora ela pareça feliz por poder proteger seu senhor (?), o Sensei não consegue dizer para ela parar."
2996582308 = "E Então Izuna se Apaixona"
2758300906 = "Para assistir juntos a um drama de época de ninjas que Izuna gosta, o Sensei visita a casa de Izuna. O conteúdo é mais interessante do que imaginava, e quando o Sensei diz 'Acho que entendo um pouco o seu amor pelos ninjas', Izuna fica extremamente feliz."
2279236806 = "Neste Momento em Que Podemos Estar Juntos"
3688245564 = "Como parte do treinamento para aprofundar o conhecimento sobre ninjas, Izuna e o Sensei passeiam pela cidade. Visitando várias lojas relacionadas a ninjas, Izuna sorri, dizendo que 'hoje será uma lembrança para a vida toda'."
224455677 = "A Garota-Propaganda do Hyakuyakudou!"
2241375795 = "Shizuko convida o Sensei e o atende como garota-propaganda de forma 'desastrada'. No entanto, seja intencional ou não, ela fica confusa com as reações naturais do Sensei. Quando ela insiste 'Entre mais na brincadeira!', o Sensei responde: 'Você já é fofa, Shizuko, então mesmo que eu tente reagir mais……', e ela faz um sorriso inexplicável."
3992937519 = "A Presidente do Comitê de Administração do Festival!"
3292398195 = "O Sensei decide ajudar Shizuko com seu trabalho no Comitê de Administração do Festival. Mostrando uma eficiência digna do título de presidente, que surpreende até o Sensei, Shizuko parece orgulhosa."
100303804 = "A Garota-Propaganda do Hyakuyakudou É Profissional!"
3211000596 = "Shizuko, que já estava um pouco estranha durante o trabalho, desmaia diante do Sensei assim que termina. Dizendo que 'não posso negligenciar nada disso', o Sensei responde: 'Isso também é importante, mas às vezes é preciso descansar'. Ao ouvir essas palavras, Shizuko murmura para o Sensei que gostaria que ele ficasse ao seu lado até dormir."
1244220490 = "Recarregando as Energias"
2409929919 = "Seguindo o conselho do Sensei da última vez, Shizuko decide matar a manhã de folga. Ela chama o Sensei ao Hyakuyakudou vazio e pede, mimada, que ele assuma a responsabilidade."
245234141 = "A Garota-Propaganda do Hyakuyakudou Gosta de Antiguidades!"
1427503773 = "Shizuko convida o Sensei ao Hyakuyakudou. No entanto, devido a um evento, está extremamente lotado, e faltam utensílios para servir o menu limitado ao Sensei. Shizuko então decide, às pressas, servir o Sensei com seu jogo de chá pessoal. Depois que o movimento diminui, o Sensei aponta isso, e Shizuko fica envergonhada."
418756131 = "Aris Quest ~O Início da Aventura~"
899003184 = "Preocupado com Aris, que disse que 'vai sair em uma aventura', o Sensei vai para Millennium. Encontrando Aris e falando com ela, de repente ele acaba participando de uma festa como personagem mascote. O Sensei sai para um passeio chamado de aventura com a animada Aris."
3415755859 = "Aris Quest ~E Rumo à Lenda~"
263417795 = "O Sensei decide sair em aventura novamente com Aris, que subiu de nível. No entanto, Aris de repente revira latas de lixo e tenta pegar recompensas dos bolsos dos bandidos derrotados, e acabam sendo repreendidos pelo conselho estudantil."
2893546688 = "A Escolha de Aris"
4280172451 = "Aris, que estava jogando um jogo de simulação de romance popular, fica preocupada sobre com quem seria mais feliz: o 'Majestade Barba de Queixo', que compartilha os mesmos hobbies, ou o 'Imperador Careca', que pode desejar mais pelos no peito. Depois de consultar o Sensei e refletir, Aris diz que 'encontrou a solução ideal'……?"
3367878513 = "Gatos e Aris"
4178604501 = "Aris consulta o Sensei sobre como fazer amizade com gatos. Tenta vários métodos, mas todos falham. No entanto, no último momento, um gato se aproxima por conta própria, e ela consegue interagir com ele. No caminho de volta, quando o Sensei desconversa sobre ter petiscos para gatos, Aris diz que sabe que o Sensei é uma pessoa gentil."
733373471 = "A Magia de Aris"
604855597 = "Aris pede ao Sensei para jogar videogame juntos, e eles vão para a sala do clube. Enquanto se alegra com a vinda do Sensei e conversam sobre espadas e magia, essenciais em RPGs, Aris sorri dizendo: 'Na realidade, assim como nos jogos, existe magia que faz as pessoas felizes'."
371401505 = "O Adesivo de Flor de Aris"
530559047 = "Aris, que chamou o Sensei ao Departamento de Desenvolvimento de Jogos, mostra o 'Adesivo de Flor do Sensei' e pede ajuda para distribuí-los. Depois de distribuir todos os adesivos, ela entrega ao Sensei outro adesivo que fez especialmente para ele."
2446100639 = "O Cotidiano de uma Gamer"
2479389322 = "Momoi chama o Sensei para a sala do clube e o convida a jogar videogame juntos para 'estudar'. Quando começam, ele quase desanima com a dificuldade, mas o Sensei joga em seu lugar e consegue derrotar o inimigo. Quando tenta devolver o controle, acaba sendo levado pela situação e joga até zerar o jogo."
3320636286 = "Condições para um Bom Roteiro"
1447101991 = "Momoi, que já está perto do prazo, fica ainda mais irritada com as críticas ao seu jogo de estilo retrô. Dizendo que não sabe mais o que é um bom roteiro, ela consegue recuperar o ânimo de alguma forma enquanto conversa com o Sensei."
1209267731 = "Memorial Cor-de-Rosa"
4291238681 = "Para estudar sobre jogos, Momoi decide tentar jogar um 'simulador de romance'. Manipulada pelo sistema de afeição, ela consegue de alguma forma 'conquistar' o Sensei (?)."
2568135161 = "Corrida de Selos Cor-de-Rosa"
232297355 = "Momoi vem com o Sensei ao distrito eletrônico 'Haruhabara' em busca de itens limitados de um jogo. Chegando lá, percebem que estão sem tempo e ficam com pressa, mas com o jogo cooperativo dos dois, conseguem coletar todos os selos."
3227922024 = "As Memórias da Irmã Mais Velha"
1635979583 = "Enquanto joga com o Sensei, Momoi, ao se desequilibrar, encontra um console de videogame que foi a primeira compra igual com Midori, cheio de recordações. É uma 'lembrança' que encurtou a distância entre as duas. Distraída demais com a história, Momoi falha na missão do jogo e lamenta."
3723632128 = "É o Prazo, Sensei"
1319850860 = "Sem novas ideias enquanto o prazo se aproxima, Midori decide pedir ajuda ao Sensei. Em busca de novos estímulos, os dois tentam jogar um jogo que normalmente não jogam, mas Midori acaba se empolgando demais……"
2181248445 = "É a Exposição, Sensei"
885277030 = "Midori e o Sensei vão para uma exposição de arte de jogos. Animada para mostrar seu lado maduro, Midori acaba se empolgando como uma criança diante das várias obras maravilhosas. Mais tarde, já calma, ela se desculpa por ter se animado sozinha, mas sorri feliz ao ouvir do Sensei que ele também se divertiu."
1475058544 = "É a Edição Limitada de Lançamento, Sensei"
2361668219 = "Para conseguir a edição limitada de lançamento da sequência de um jogo famoso, Midori e o Sensei correm pela cidade. Encontram o último, mas ao ver o sorriso de uma garota que o pegou, ela desiste, dizendo que 'jogos são para se divertir'. Mesmo assim, desapontada, Midori recebe no dia seguinte a edição limitada que o Sensei conseguiu usando seu poder de adulto."
2289816470 = "São Recordações Importantes, Sensei"
828959040 = "O Sensei decide ir com Midori a um fliperama, algo que ela nunca tinha ido. Jogando o jogo de garra pela primeira vez, os dois criam recordações secretas juntos."
2056555487 = "As Recordações Continuam, Sensei"
4219711868 = "O console de Midori quebrou e, por ser de uma geração anterior, não pode ser consertado, só restando trocar por um atual. Ao saber que foi um presente de recordação comprado por Momoi, o Sensei ajuda Midori a decorar seu console antigo de forma estilosa. Sentindo-se um pouco complexada por estar imitando a irmã, Midori ainda fica feliz."
1054831572 = "Cerimônia de Condecoração"
3901050681 = "Para se recompensar, Cherino decide criar uma nova medalha da mais alta honra. No entanto, sem conseguir pensar em um nome, ela pede ao Sensei para pensarem juntos."
3994991875 = "Pimentão e Hambúrguer"
1275437330 = "Cherino, furiosa porque o hambúrguer da refeição escolar veio com pimentão, quer punir a chefe do Departamento de Refeições. Mas quando o Sensei diz 'se você comer, te dou um pudim', Cherino, hesitante, decide comer o pimentão com determinação."
221409277 = "Cherino Tem Nove Anos?"
474891411 = "Conforme a promessa, Cherino visita uma confeitaria com o Sensei para ganhar o pudim. Lá, ela descobre que estão distribuindo biscoitos para crianças e tenta se passar por uma, fazendo birra, mas é vista pelos alunos de Red Winter."
4092936239 = "Assassino da Planície Nevada"
4239706831 = "Em um dia de muita neve, Cherino chama o Sensei a Red Winter, e eles fazem bonecos de neve e guerra de neve, passando um tempo divertido."
3454660505 = "Pesadelo"
3169984572 = "Cherino acorda e é tratada com desdém pela guarda de honra. Ninguém parece se lembrar dela, e até o Sensei a esqueceu…… Esse é o pesadelo que Cherino teve. Sentindo o medo de não permanecer na memória de ninguém, ela faz birra como que para se mimar ainda mais com o Sensei real."
3953080764 = "Espaço de Cura Dentro do Armário"
1400954697 = "O Sensei visita o Departamento de Desenvolvimento de Jogos e conversa com Yuzu sobre o conforto de um armário. Ouvindo a explicação, o Sensei tenta entrar no armário com Yuzu, e quando ela diz que só cabe uma pessoa, a disputa pelo armário começa."
2503402080 = "Lutadora Gentil"
6245419 = "Yuzu e o Sensei jogam juntos um novo jogo de luta. Apesar de suas palavras modestas, o Sensei é completamente derrotado pela habilidade esmagadora de Yuzu, e mesmo com várias restrições, ele continua perdendo."
594259040 = "Trabalho de Meio Período da Tímida (1)"
483555388 = "Para ganhar dinheiro para o desenvolvimento de um novo jogo, Yuzu decide começar um trabalho de meio período, mas sua personalidade tímida a faz cometer vários erros. Mesmo assim, sem desistir pelo Sensei e pelos outros membros, ela continua se esforçando e, no final, consegue contribuir adequadamente."
2585625640 = "Trabalho de Meio Período da Tímida (2)"
2371095455 = "O Sensei sugere outro trabalho, e Yuzu decide trabalhar vestindo uma fantasia de mascote em um parque de diversões. Embora ainda tenha dificuldade em falar com estranhos, vendo as crianças se divertindo graças a ela, Yuzu sente um leve senso de realização."
858487022 = "Promessa no Parque de Diversões"
1229751760 = "Yuzu convida o Sensei ao parque de diversões onde está trabalhando, e os dois passam um dia divertido. Antes de ir embora, Yuzu dá ao Sensei o 'Passe Livre de Yuzu' como agradecimento."
3798769886 = "Recordações Brilhantes"
1551489306 = "Durante uma grande limpeza, o Sensei encontra um CD com o nome de Yuzu no canto da sala do Departamento de Desenvolvimento de Jogos. É o disco mestre dourado de 'Tales Saga Chronicle Prototype'. Rindo que foi por causa dessa obra que o departamento existe hoje, os dois ligam o jogo."
2491368152 = "Um Dia de Sorte"
1705555852 = "Quando o Sensei tenta pegar uma moeda caída na rua, Nodoka aparece do nada, alegando que a moeda é dela."
3814394946 = "Diário de Observação"
2168002401 = "Um dia, Nodoka envia uma mensagem estranha pelo MomoTalk. Intrigado, o Sensei a procura e descobre que ela estava tentando observá-lo com um telescópio do telhado de um prédio, mirando na Schale."
3943807809 = "Onde se Pode Ver a Chuva de Meteoros"
316651918 = "Nodoka estava ansiosa para observar a chuva de meteoros, mas o tempo está nublado. O Sensei, por ela, consegue permissão para entrar no telhado da Schale, que está acima das nuvens."
2610213699 = "Chuva de Meteoros e Desejos"
2140306431 = "No telhado da Schale, Nodoka e o Sensei observam a chuva de meteoros a sós. Quando o Sensei pergunta se ela não vai fazer um desejo, Nodoka sorri, dizendo que já recebeu tantas bênçãos que seria um castigo pedir mais."
2411242755 = "Em Busca de Nuvens"
705416632 = "O Sensei encontra Nodoka por acaso na estação de metrô. A garota misteriosa, que diz gostar de paisagens de nuvens, está indo para o outro lado da montanha para ver as nuvens."
3473776468 = "Assunto Confidencial"
3683908682 = "Para Azusa, que ainda não se acostumou com Trinity, o Sensei decide fazer um guia turístico de Trinity a partir do dia seguinte."
1979784998 = "Proteção"
2914330063 = "Azusa, que visita a Schale, aponta ao Sensei que a segurança é fraca. Ela propõe reforçar o sistema de segurança e decide fazê-lo assim que o Sensei terminar o trabalho. No entanto, enquanto espera, ela acaba adormecendo e, aproveitando o conforto da Schale, reconsidera que talvez seja bom deixar como está."
352859510 = "Plano"
1755514409 = "Para se acostumar com a vida em Trinity, Azusa combina de sair com o Sensei. Sem um plano, quando lhe dizem que pode escolher para onde quer ir, Azusa fica confusa, mas com o suporte do Sensei, visita vários lugares. Depois de passar o dia assim, ela começa a pensar que talvez coisas ineficientes também tenham significado."
2726486787 = "Tiro"
1358028185 = "O Sensei visita Azusa no estande de tiro, onde ela está treinando. Refletindo sobre a 'paz' enquanto treina, sua habilidade de tiro parece ser considerável. Na saída, Azusa diz que treinar assim acalma seu coração, mas agora há outros lugares além daqui que também servem para isso, com uma expressão serena."
2287752414 = "No Que Está Pensando?"
4121937525 = "Koharu chama o Sensei dizendo que tem algo para perguntar, mas como sempre, suas fantasias egoístas aceleram, e ela vai embora para algum lugar."
1870310578 = "O Que Está Dizendo?"
775529512 = "Preocupado com a troca de mensagens no MomoTalk, o Sensei visita Trinity, e Koharu, com uma mistura de várias emoções, fica um pouco estranha. Quando os alunos ao redor vão embora, ela gradualmente se acalma e, como sempre, explode em fantasias."
2262697203 = "Qual É o Assunto?"
1326481347 = "Koharu chama o Sensei, dizendo que precisa vigiá-lo. Ela pede ao Sensei para ajudá-la a estudar, mas no meio disso, ela tira um livro erótico da bolsa."
1849950817 = "O Que Pretende Fazer?"
3380505746 = "Embora estivesse quase desmaiando de cansaço, o Sensei vai para Trinity ao receber o contato de Koharu. Como agradecimento por ajudá-la a estudar, Koharu lhe dá doces, mas a partir daí, suas fantasias de sempre aceleram. O Sensei se aproxima dela……"
1256271866 = "Uma Garota Um Pouco Diferente"
25525610 = "Chamado por Hanako para uma aula de recuperação, o Sensei vai para a Escola Geral Trinity. Chegando e encontrando Hanako, a conversa não chega ao ponto, e ela começa a fazer piadas sexuais inimagináveis pela sua aparência."
3323539392 = "Uma Garota Fora do Comum"
4063271474 = "Hanako avisa que ficou presa no depósito de materiais esportivos devido a um pequeno acidente, e o Sensei vai imediatamente para a escola. No entanto, ao chegar, a porta do depósito está aberta, e lá está Hanako vestindo um maiô escolar. Confusos, os dois tentam sair, mas são vistos por um segurança, e os mal-entendidos e a confusão aumentam."
3406107333 = "Presentes e Garotas"
1156066956 = "O Sensei decide acompanhar Hanako nas compras. Embora cauteloso, ele chega a um shopping comum, onde ela parece estar comprando meias…… mas de repente, ela tenta dar as meias que estava usando de presente para o Sensei, e ainda são vistos por um funcionário da loja. Encurralado, o Sensei foge como um raio."
8639287 = "Garota na Chuva"
3069991414 = "Preocupado com o conteúdo do MomoTalk, o Sensei decide procurar Hanako. Depois de procurar por toda parte, ele a encontra no parque, mas ela está diferente do habitual. Parece que Hanako está sufocada por algo, mas ela diz que se sentiu um pouco melhor por poder falar sobre isso, e a distância entre os dois diminui um pouco."
3904057311 = "Garota Indecifrável"
416436128 = "Hanako diz que recuperou os livros que foram confiscados. Quando ela ri e pergunta se deve lê-los em voz alta, o Sensei fica agitado, e ela mostra um pouco de arrependimento por ter provocado demais. Assim, até o ponto de ônibus, os dois conversam tranquilamente."
2887102104 = "Alvo de Proteção"
614600948 = "Dizendo que a praia é perigosa por ter uma visão ampla, Azusa tenta proteger o Sensei com mais afinco do que o normal. O Sensei percebe que ela está nervosa por ser sua primeira vez na praia e tenta acalmá-la gentilmente, mas……"
2589131515 = "Porque Estou ao Seu Lado"
1254705188 = "O Sensei fica na fila da casa de praia no lugar de Azusa. Embora ache o sabor do produto comprado um pouco questionável, ao ver Azusa dizendo que está gostoso e conversando com ela, ele gradualmente começa a se divertir, e a comida que come depois parece incrivelmente deliciosa."
272574082 = "Meu Mundo"
1518135893 = "Azusa, olhando para o pôr do sol, parece estar sentindo um pouco de saudade antecipada. O Sensei decide levá-la a um lugar com vista para o mar. Vendo a paisagem, Azusa transmite ao Sensei seus sentimentos um pouco diferentes do normal."
4086591264 = "Momento Luxuoso"
3882763129 = "Tarde da noite, o Sensei visita Azusa, que está sentada na praia. Embora não haja nenhum assunto em particular, ela está saboreando o fato de 'poder passar um tempo sem fazer nada'. Ouvindo essas palavras, o Sensei também sente alegria."
892100153 = "Falando em Mar de Verão……"
2520326930 = "O Sensei visita Tsurugi, e por algum motivo, não há mais ninguém por perto. Deduzindo pela história que ouviu de Tsurugi, parece que todos fugiram ao vê-la na praia, pensando que ela é um fantasma. Vendo Tsurugi solitária, o Sensei diz que ficar só os dois também é bom."
2382724730 = "Como Brincar no Mar de Verão"
1290507385 = "Para Tsurugi, que não sabe bem como brincar no mar, o Sensei reúne vários brinquedos e a visita. Embora tudo acabe de forma estranha, Tsurugi, um pouco ofegante, mostra uma expressão um tanto divertida."
1474054634 = "Mar de Verão, Saudade, Emoção"
286340295 = "Tsurugi passou vários momentos no mar. Embora tenha sido um pouco diferente do mar que ela imaginava, ela sorri, dizendo que ficou feliz por ter vindo."
446907323 = "Fofura É Justiça"
288034791 = "Mashiro, escolhendo um novo maiô, fica chocada quando a vendedora diz que 'um maiô fofo é justiça'. Depois, o Sensei explica que é uma expressão idiomática, e ela decide incorporar a justiça com o maiô fofo recomendado pelo Sensei."
627967675 = "Atiradora de Elite à Beira-Mar"
1412156088 = "Mashiro, vestindo um traje ghillie na praia, desmaia de insolação. Ela tenta retomar o treino imediatamente, mas é convencida pelo Sensei a descansar primeiro."
1042934636 = "Medidas Contra Insolação"
4168292743 = "O Sensei decide acompanhar Mashiro, que vai treinar na praia. No entanto, o Sensei fica exausto só com o aquecimento, e Mashiro lhe dá um sorvete que trouxe como medida contra insolação. Os dois fazem uma pequena pausa……"
2602243770 = "Atiradora de Elite e Fumaça Gostam de Lugares Altos"
1234473319 = "Como atividade voluntária, Mashiro estava em cima de uma torre de observação. Ela convida o Sensei, e os dois, bem próximos, comem sorvete enquanto estão na torre."
2522447731 = "Estreia no Verão!"
3891504304 = "Para o verão, Hifumi vai comprar um novo maiô. Ela tenta escolher um maiô chamativo para sua estreia no verão, mas repensa com as palavras do Sensei e compra um maiô fofo, ansiosa pelo verão que se aproxima."
1131785799 = "Pisar, Chutar e Rasgar"
638776663 = "Hifumi e o Sensei vão de tanque para uma praia secreta. No entanto, ao estacionar o tanque, o maiô de Hifumi prende no corrimão e rasga. Além disso, a esteira do tanque sai do lugar, e o Sensei decide ir a pé buscar o uniforme de Hifumi……"
1338557257 = "Após o Uso, Limpe e Guarde os Equipamentos"
1038194354 = "Hifumi convida o Sensei para tomar sol e dirige o Crusader. Mas uma grande onda repentina os atinge, e o Sensei e Hifumi decidem lavar o Crusader."
2720519106 = "Produtos do Sr. Peroro Limitados de Verão"
4171378080 = "Hifumi e o Sensei encontram por acaso uma pelúcia de design limitado do Peroro na praia. Para conseguir, era preciso comer picolés, mas apesar do design amigável, eles não conseguem ganhar. Mesmo assim, Hifumi enfrenta o desafio e consegue a pelúcia, mas ambos acabam com dor de barriga."
1735121927 = "Hora do Chá Noturna"
3989855088 = "O Sensei, querendo relaxar durante as férias, sai para passear na praia. No entanto, é interrompido por pedidos em todos os lugares. Quando mal consegue descansar, Hifumi aparece montada no 'Crusader-chan'. Assim, os dois passam um breve momento de descanso juntos."
2192111210 = "Algumas Maneiras de Aproveitar o Verão com Izumi"
3585146498 = "Izumi avisa que, se vencer um certo jogo, pode comer uma iguaria de graça, e o Sensei vai até a loja. Lá, descobrem que, se vencerem, ganham um prato especial de loco moco, mas se perderem, têm que beber suco de tabasco. Enquanto o Sensei é cauteloso, Izumi toma atitudes extremamente arriscadas, revelando que na verdade ela queria beber o 'suco de tabasco'."
2207930638 = "Izumi e os Ingredientes Secretos"
1751574366 = "Em busca de iguarias de verão, Izumi e o Sensei vão a uma loja famosa por seu hiyashi chuka. Dizendo que está gostoso, mas falta algo, Izumi adiciona sua própria manteiga de amendoim. Embora cético, o Sensei experimenta e, surpreendentemente, combina bem com o hiyashi chuka, ficando delicioso. No dia seguinte, o boato se espalha……"
2195651191 = "Izumi e o Monstro do Verão"
4074605646 = "Izumi aproveita um tour gastronômico de verão com o Sensei. Quando o Sensei sugere que ela nade no mar, já que está lá, ela decide entrar no mar para comer melhor. No entanto, enquanto brinca, ela é atacada por um polvo. No momento em que o Sensei tenta ajudá-la, ela, pensando que se for comida, então…… tenta comer o polvo."
1620499167 = "A Melhor (?) Forma de Escapar do Calor"
709254674 = "Izumi, que declarou que vai conquistar todas as iguarias do mar, e o Sensei sofrem com o calor e decidem descansar na sombra. Izumi tira vários ingredientes do cooler e faz um ponche de frutas, mas o Sensei, ao comê-lo, desmaia."
3295968282 = "Passeio no Mar com a Presidente do Comitê"
3010205152 = "Como ensaio para o acampamento, o Sensei passeia com Hina pela praia, mas durante o passeio, Hina é chamada para o trabalho na escola e se ausenta. Quando o Sensei começa a se preocupar com a demora de Hina, recebe uma mensagem dela dizendo que está no centro de crianças perdidas."
1655107260 = "Trabalho com a Presidente do Comitê"
500163992 = "O Sensei visita Hina, que está ocupada com o trabalho do Comitê Disciplinar mesmo durante o acampamento. Ele decide ajudá-la, e os dois cuidam de uma enorme pilha de documentos. Quando finalmente terminam, não sobra tempo para ir à praia, mas conseguem jantar juntos."
782812198 = "Em uma Noite de Verão com a Presidente do Comitê"
170121594 = "Hina havia combinado de ir à praia com o Sensei, mas por ter trabalhado desde cedo, ela acaba adormecendo de cansaço e perdendo o horário. Ao acordar, ela se desculpa com o Sensei, que estava ao seu lado, mas ele a leva pela mão até um terraço com vista para o mar, dizendo que ainda não acabou."
1063317491 = "Algo Sempre Importante"
562904619 = "Para Hina, que não sabe nadar, o Sensei decide dar uma aula particular. No entanto, devido a vários imprevistos, Hina fica deprimida, achando que está apenas tomando o tempo do Sensei em vez de aprender a nadar. O Sensei a consola, e eles passam um breve momento juntos."
121651125 = "Coisas Que Não Se Deve Fazer no Mar"
801476589 = "Iori, que está organizando as regras do acampamento na praia, pede conselhos ao Sensei sobre 'coisas que não se deve fazer no mar'."
828409727 = "O Ponto Fraco de uma Certa Membra do Comitê Disciplinar"
1423535926 = "Preocupado com uma mensagem acidental de Iori no MomoTalk, o Sensei a segue e a vê comprando uma boia secretamente. Confessando que não sabe nadar, Iori aceita a proposta do Sensei de praticar natação juntos."
3945086099 = "Um Breve Momento"
3982380859 = "Depois de capturar os infratores das regras da praia com o Sensei, Iori propõe que eles dividam a patrulha da área. Seguindo Iori, que está agindo de forma suspeita, o Sensei a flagra aproveitando o banho de sol atrás de um recife isolado."
4161301031 = "Banho de Areia"
1639986624 = "Pensando que o Sensei está fazendo algo estranho de novo, Iori vai visitá-lo e o encontra relaxando em um banho de areia. Inicialmente desconfiada, ela experimenta a sugestão do Sensei e descobre que é mais agradável do que pensava. Iori acaba cochilando ali mesmo e, quando acorda, encontra uma estátua de sereia construída sobre seu corpo."
2618097705 = "Praia do Crepúsculo"
2453697925 = "Iori está reprimindo as Sukeban que estão fazendo maldades na praia. No entanto, o Sensei, que veio ajudar, acaba encharcado devido ao combate, e ela lhe empresta seu cobertor pessoal e importante."
3842642425 = "Longa Viagem por Kivotos"
683246259 = "Com um pouco mais de folga ultimamente, Shiroko decide tentar a travessia de Kivotos que planejava há tempos. Vendo a preocupação do Sensei, ela hesita um pouco, mas com as palavras dele de que ficaria feliz se ela mantivesse contato frequente, ela parte radiante para a travessia."
1462935881 = "Especial Só para Mim"
1892594340 = "Shiroko, que mantém contato frequente como prometido, avisa sua localização, e o Sensei a visita levando suprimentos. Encontrando o Sensei, Shiroko sente que não está sozinha, e várias emoções nascem dentro dela."
3283621877 = "Onde Quer Que Eu Esteja"
2757117157 = "O Sensei encontra Shiroko em vários pontos, conforme ela avisa. Embora a distância seja grande, toda vez que se encontram, Shiroko parece estar se divertindo cada vez mais."
2843691457 = "O Lugar para Onde Voltar"
4094165763 = "Pouco antes da linha de chegada, Shiroko chega à Schale. Enquanto ela conta suas histórias da travessia de Kivotos, o Sensei e Shiroko caminham lado a lado, calmamente, de volta para Abydos."
137781174 = "Pequeno Também É Bom!"
1322340430 = "Com o corpo encolhido novamente devido a um efeito colateral de um remédio, Shun decide aproveitar a oportunidade e vai com o Sensei ao seu café favorito para comer o parfait limitado que tanto ama. No entanto, parece que seu paladar também foi afetado pelo encolhimento……?"
2841094582 = "Pequeno É Ruim Mesmo!"
149905902 = "Enquanto Shun, ainda pequena, organiza o Jardim das Ameixeiras, ela fica presa em um lugar alto. Após ser salva pelo Sensei, para continuar a organização, Shun sobe nos ombros do Sensei e acaba se divertindo com isso."
128361082 = "É uma Verificação de Segurança!"
2341039634 = "Shun e o Sensei vão ao 'Playland', recém-inaugurado no distrito central de Kivotos. Dizendo que precisa verificar a segurança do ponto de vista das crianças, Shun está com os olhos brilhando de diversão."
2891798612 = "Isso É Segredo"
3254263628 = "Shun vai com o Sensei para o lugar de um esconderijo secreto que costumava frequentar. Dentro daquele esconderijo nostálgico, ela reflete sobre o passado e o futuro."
4082121735 = "O Que Muda, O Que Permanece"
2268442326 = "Em sua forma infantil, Shun se diverte com um penteado que gostava antigamente. Quando o Sensei sugere que ela continue usando aquele penteado mesmo adulta, ela reclama que, quando se cresce, certos estilos e acessórios não caem mais bem. Diante disso, o Sensei ri, dizendo que não precisa mudar o que gosta só porque cresceu."
3306119972 = "Grande Linha de Investigação Despreocupada"
1067431467 = "Ao começarem uma patrulha, Kirino e o Sensei avistam um cidadão agindo de forma suspeita, como se carregasse uma bomba. Enquanto o seguem discretamente, um ladrão aparece e causa uma confusão, mas no final, conseguem garantir a bomba. No entanto, a bomba que recuperaram não era uma bomba, mas sim……?"
2874205992 = "Tiros e Zircônia"
3960259754 = "Com o negociador atrasado, Kirino, impaciente pelos reféns, sai em ação. Ao tentar negociar, não vai bem e, sem escolha, atira, mas acerta o refém. Em pânico com a situação inesperada, o criminoso, depois de vários mal-entendidos, acaba se entregando."
3444429399 = "The Shooter / Dois Alvos Principais?"
301172044 = "Kirino faz treino de tiro enquanto o Sensei observa ao lado. Embora a arma não esteja quebrada, por algum motivo, a curta distância, ela sempre acerta o alvo que representa o refém. Seguindo o conselho do Sensei, ela relutantemente mira no refém……?"
84381503 = "Conexão de Ferro"
1057319864 = "Crianças do jardim de infância local visitarão a Escola de Polícia Valkyrie, e Kirino é designada para guiá-las. No entanto, as coisas não vão bem, e ela acaba se algemando sozinha. Apesar de tudo, as crianças sorriem para Kirino no final, agradecendo por sua sinceridade."
3316056 = "Truque de Gênio"
3154017608 = "Quem aparece animadamente no local de encontro com o Sensei é Saya, andando de skate. Argumentando que é o veículo perfeito para percorrer a Câmara de Comércio Genbu, o Sensei também tenta andar, mas……?"
3491617475 = "Folga do Gênio"
2985293516 = "Saya veio à loja com Nezuke para saborear o 'Bolo de Queijo Azul Gigante Especial para Casais', mas é recusada pelas regras da loja. No entanto, o Sensei, preocupado com a troca de mensagens com Saya no MomoTalk, aparece, e o pedido é aceito. Saya, embora diga que 'o gênio é solitário', aproveita o dia de folga com o Sensei."
1858393728 = "O Restaurante Delicioso de Saya"
776648188 = "Indo ao restaurante de lámen favorito de Saya, um cheiro muito forte os atinge. O Sensei e Saya perguntam e descobrem que o dono criou um novo menu, mas o cheiro era forte demais. Solicitada pelo dono, Saya tira vários produtos químicos de suas mãos. O resultado é um lámen incrivelmente picante, mas que faz muito sucesso entre alguns aficionados……"
2717662380 = "O Que Flui"
1831782779 = "O molho super picante desenvolvido por Saya rapidamente se torna popular e se espalha por toda a Câmara de Comércio Genbu. No entanto, Saya se cansa da situação, vendo-o até sendo adicionado aos doces do café, e declara que interromperá a produção."
2977660904 = "A Razão de Ter Escolhido o Skate"
1522951562 = "Para ajudar em um evento no parque, Saya desenvolveu um perfume que 'relaxa naturalmente o corpo e dá uma sensação de leveza', e diz ao Sensei que é mais conveniente espalhá-lo usando um skate. Assim, Saya anda de skate pelo parque espalhando o perfume…… mas o efeito do perfume a faz perder as forças e cair. Mesmo assim, o evento termina em grande sucesso."
1753704494 = "Pedido de Suporte"
2602091299 = "Neru, que está lutando para vestir a fantasia de coelhinha, manda uma mensagem ao Sensei. No entanto, quando ele chega, a própria Neru se surpreende com sua aparição……?"
165180404 = "Justamente Por Não Ser Grande Coisa"
3543262161 = "Neru estava usando a fantasia de coelhinha para se acostumar, caso algo aconteça, mas parece que seus pés criaram bolhas com os saltos altos desconhecidos. Dizendo que não é nada de mais, ela pede ao Sensei para tratá-la."
1674452406 = "Olhar"
4250635903 = "O Sensei visita Millennium a pedido de Neru, que diz ter 'algo a confirmar', e lá está ela vestida de coelhinha. Recebendo ainda mais olhares do que o normal, ela diz que queria saber como está sendo vista……?"
2462150601 = "Ângulo Inesperado"
1600305466 = "O Sensei, a quem Karin pediu para trazer itens necessários para a missão, não encontra ninguém no ponto de encontro. Parece que Asuna, que deveria receber os itens, foi para algum lugar. Ele decide ir diretamente ao local da missão de Karin, mas ao chegar, uma cena inesperada salta aos seus olhos……"
2181471164 = "Mal-Entendido Inesperado"
2467790110 = "O Sensei visita Karin, que está infiltrada em um café, e a vê feliz usando a fantasia de coelhinha. Enquanto conversa com Karin sobre coelhinhas, algum mal-entendido estranho parece ter surgido……?"
367799569 = "Conclusão Inesperada"
1433841241 = "Chamado por Karin, o Sensei visita seu quarto. Lá, ele finalmente consegue desfazer o mal-entendido anterior. Quando o Sensei transmite sua verdadeira intenção, Karin fica surpresa e sente um calor no peito, percebendo que o Sensei se interessou por ela e notou coisas sobre ela antes mesmo que ela mesma notasse."
1141743172 = "A Ecologia de Asuna"
221988864 = "Tarde da noite, uma mensagem de Asuna chega, e o Sensei, preocupado, vai ao encontro dela. Chegando à lavanderia 24 horas, lá está Asuna, vestida de coelhinha por algum motivo……?"
814287263 = "Ecologia do Coelho"
3643670542 = "O Sensei encontra Asuna à beira de um rio, vestida de coelhinha. Ela diz que está se tornando um coelho para entender a ecologia dos coelhos. Então, ela começa a pedir para ser acariciada, dizendo que é um coelho……"
1615861420 = "Ecologia da Coelhinha"
2918162060 = "O Sensei encontra Asuna em um café, e ela parece estar refletindo sobre o significado da fantasia de coelhinha. Durante a conversa, Asuna diz coisas absurdas que deixam o Sensei em apuros, mas no final, parece ter chegado a uma conclusão satisfatória."
391217910 = "Grande Confusão da Cauda"
3144520066 = "Chamado por Asuna vestida de coelhinha, o Sensei decide competir com ela para descobrir se a granada em forma de cauda que ela segura é real. Enquanto pensa se há alguma vantagem em vencer essa competição, ele percebe que algo como um pino de segurança caiu…… e acaba tendo que perseguir Asuna a toda velocidade."
18689073 = "1ª Aula: 'Matéria: Romance'"
1368636690 = "Um dia, Natsu envia uma mensagem estranha. O Sensei vai encontrá-la em Trinity, e ela, com biscoitos caseiros, começa a falar sobre 'romance'……?"
479881100 = "2ª Aula: 'Matéria: Tolerância'"
4189558159 = "Natsu, que enviou uma mensagem preocupante no MomoTalk, visita a Schale com um sorvete. Enquanto prepara um affogato com um espresso, o Sensei ouve a notícia que ela viu esta manhã e toca o interior de Natsu escondido por trás de suas palavras."
2721314425 = "3ª Aula: 'Prática: Escavação'"
1566724822 = "Chamado repentinamente por Natsu, o Sensei vai com ela para a 'loja de doces esquecida'. Chegando lá, Natsu fica profundamente emocionada, mas deseja que o romance deste lugar continue sendo romance e decide manter tudo em segredo hoje."
1618294287 = "Intervalo para o Almoço: 'Lojinha'"
2377126702 = "Chamado de repente por Natsu, o Sensei vai ao seu encontro. Natsu, que o chamou, parece feliz ao vê-lo. Os dois dividem uma torta de mirtilo e passam um tempo precioso sem fazer nada."
4119434234 = "Irmã Respeitável"
1452376206 = "Por causa de uma mensagem casual no MomoTalk, o Sensei visita Marie, da Irmandade. Tentando encorajá-la em seu esforço sincero de se tornar uma irmã respeitável, o Sensei acaba exagerando um pouco e recebe um castigo divino (?)."
3212708973 = "Uma Oração por Você"
2690251888 = "Preocupada com o incidente anterior, Marie reza pelo Sensei. Ela ainda segura a mão do Sensei e reza junto com ele."
2250100664 = "Castigo Interno"
3849636343 = "Ouvindo que Marie não está se sentindo bem, o Sensei a visita. Marie estava preocupada, achando que foi um castigo por ter se mimado, mas através da conversa com o Sensei, que diz 'certamente não foi um castigo, mas sim alguém que te ajudou', ela encontra paz tanto no corpo quanto na alma."
4076992554 = "Meu Desejo"
3986468370 = "Em um estande de tiro solene, Marie faz uma oração silenciosa. Ela revela ao Sensei seus desejos pessoais, não como irmã, mas como ela mesma."
2267732676 = "Sentimentos Verdadeiros"
2902570837 = "Marie se sente atraída por acessórios fofos em um shopping center. No entanto, o Sensei tenta presenteá-la ao vê-la conter a compra. Recusando, dizendo que como irmã deve evitar vaidades, ela é salva pelas palavras do Sensei: 'Antes de ser irmã, você é uma aluna', e aceita o convite para comer."
2965761760 = "O Segredo da Cantora Virtual"
3588938678 = "Hatsune Miku, uma cantora virtual, de alguma forma consegue um corpo real com a tecnologia de Kivotos para realizar um show. No entanto, um dia, sua voz de repente para de sair. Perdida, ela decide pedir ajuda ao famoso 'Sensei' que resolve vários incidentes em Kivotos……"
1011014524 = "A Preocupação da Cantora Virtual"
3188134202 = "Não podendo mais esconder, a organizadora do show também descobre que a voz de Miku não está saindo. Ela tenta alguns métodos com o Sensei, mas……?"
3690602347 = "Os Sentimentos da Cantora Virtual"
391861432 = "Com o show se aproximando, a voz de Miku ainda não saiu. Mas, em certo momento, ela ouve uma música que cantou quando estreou e, de repente, sua voz sai. O Sensei percebe que o problema pode estar relacionado aos sentimentos dela e elabora um certo plano."
358973352 = "O Palco da Cantora Virtual"
1256619760 = "O Sensei usa seu poder como Schale para mudar quase à força o setlist do show, alterando o conteúdo para as músicas que a própria Miku compôs. Com o Sensei dizendo que assumirá a responsabilidade, todos os envolvidos são pressionados e o show continua conforme o planejado. A voz de Hatsune Miku ecoa por Kivotos."
3822667143 = "É Uma Conspiração, Enfim!"
1052016123 = "Ako chama o Sensei e faz várias exigências à Schale. Ignorando a confusão do Sensei, Ako vai se exaltando cada vez mais, mas ela mesma percebe isso no meio do caminho. Respirando fundo, ela volta a exibir seu sorriso de sempre e vai embora para algum lugar."
3731268869 = "É Um Assunto Urgente, Enfim!"
3900941619 = "Ako chama o Sensei dizendo ter um assunto urgente. Quando ele chega, ela desconta nele todos os infortúnios que sofreu hoje. O Sensei ouve suas reclamações, mas quando ela termina e tenta ir embora, ele pergunta se o assunto urgente está resolvido. Ako responde com um sorriso satisfeito que a conversa de agora era o assunto urgente."
2871973874 = "A Culpa É do Sensei, Enfim!"
490128902 = "Preocupado com o conteúdo do MomoTalk, o Sensei visita Ako. Durante a conversa, ela começa a dizer que seu estresse piorou por causa do Sensei. Enquanto desconta sua raiva, ela diz sua frase habitual 'Quer apostar?', e o Sensei aceita, pensando que pode aliviar seu estresse. No entanto, Ako perde a aposta e acaba usando uma coleira. Mesmo assim, no final, ela parecia um pouco mais aliviada."
150871999 = "As Férias de Inverno de uma Certa Presidente de Conselho Estudantil de Bigode"
2718480801 = "Cherino alugou uma fonte termal inteira para aproveitar as férias de inverno, mas, além das termas em si, ela não tem nada de especial para fazer, já que está sempre relaxando. Encontrando uma 'mesa de pingue-pongue', ela desafia o Sensei……"
4282893984 = "Mais Macio Que Pudim"
3630181932 = "Ouvindo que 'ovos cozidos em fontes termais são macios e deliciosos como pudim', Cherino imediatamente decide fazê-los. Conseguindo todos os ovos possíveis do Departamento de Refeições, ela os transforma em ovos cozidos nas termas, mas ao provar, fica desapontada. Pensando que o sabor era igual ao pudim, ela se enfurece, perguntando por que não a avisaram antes."
221973324 = "Bigode à Prova D'água"
944686474 = "Cherino cita que uma das razões para não gostar muito de fontes termais é 'porque o bigode molha'. Então, ela tem uma grande ideia e, inspirada nas penas de cisne, decide mergulhar o bigode em óleo. Mas o óleo era de gergelim, e Cherino acaba sofrendo com um cheiro terrível."
2691752229 = "Autoridade Feita de Leite"
699204964 = "Para consolar Cherino, deprimida com o incidente do bigode, o Sensei a convida para as termas. Após o banho, ele lhe dá leite com frutas, e Cherino, bebendo, fica satisfeita: 'Além de delicioso, ao beber, nasce um bigode ao redor da boca!'. No entanto, empolgada, ela bebe demais e acaba com dor de barriga."
3413696609 = "Oficial Assistente de Banho"
2914497765 = "Chamado por Cherino, o Sensei visita a vila termal e vê o patinho de borracha 'Rubber Duck' que ela tem. Parece que Cherino está insatisfeita com a ideia de colocar um bigode de autoridade no patinho. O Sensei sugere que ela tome banho junto com o patinho."
3698230489 = "Workaholic"
1902460226 = "O Sensei, que visitava uma fonte termal perto de Gehenna, encontra Chinatsu, a pessoa que a recomendou. Parece que seus períodos de descanso coincidiram. No entanto, Chinatsu parece preocupada com o trabalho acumulado e não larga os documentos. Vendo isso, o Sensei se oferece para ajudar, e os dois cuidam dos documentos nas termas."
3640094321 = "Terapia Dietética?"
2528966174 = "Chinatsu prepara um 'chá medicinal' para o Sensei que está descansando. O Sensei acalma Chinatsu, que está mais entusiasmada do que o normal, e os dois passam um tempo tranquilo juntos."
3450750046 = "Retribuição"
794685547 = "Querendo retribuir o favor aos membros do Comitê Disciplinar pelo tempo de folga, Chinatsu visita uma loja de souvenirs com o Sensei. Conversando, eles examinam cada souvenir. Após as compras, o Sensei, como retribuição diária, lhe dá de presente o laço que ela mesma tinha dito ser 'fofo'."
1859264697 = "Só Nós Dois"
918925541 = "Como agradecimento pelo laço que recebeu, Chinatsu presenteia o Sensei com um vale de hospedagem em uma pousada. No entanto, devido a um erro na reserva, os dois são tratados como um casal pela pousada. Confusa com a situação repentina, Chinatsu ainda assim passa um momento agradável e confortável."
3800350579 = "Mentiras e Mal-Entendidos"
236937520 = "Enquanto faz compras com o Sensei, Tomoe ouve um mal-entendido sobre ele na cidade. Ela consegue dissipar o boato com seu discurso eloquente, mas esse discurso acaba gerando outro mal-entendido."
799463473 = "Descanso Entre uma Coisa e Outra"
719836184 = "Para o Sensei cansado do trabalho contínuo, Tomoe prepara um kit de soneca. Ouvindo sua canção de ninar, o Sensei consegue desfrutar de um sono agradável."
1317246530 = "Na Neve"
284850586 = "Voltando de uma ronda de discursos regulares, Tomoe e o Sensei são pegos por uma nevasca. Os dois encontram uma cabana próxima e conseguem evitar se perder. Enquanto secam as roupas molhadas, o Sensei percebe o olhar de Tomoe, e ela, dizendo 'já que é assim', começa a falar alegremente sobre Cherino."
2231726565 = "Não Foi Um Fracasso, E Não Há Registros"
3957122344 = "Para Cherino, que odeia pimentão, Tomoe tenta fazer algum doce usando pimentão. Tentando várias coisas com o Sensei, nada dá certo. No final, Tomoe decide considerar que 'esse plano nunca existiu'."
888674982 = "Uma Mentira Sutil É Quase um Erro"
58356917 = "Tomoe propõe ao Sensei fazer um documentário sobre a Presidente Cherino. Visitando vários lugares seguindo os passos de Cherino, o Sensei percebe no meio do caminho que Tomoe não está com a câmera. Quando perguntada sobre isso, ela cita uma fala de um certo filme e diz: 'Uma mentira sutil é quase um erro'."
824872411 = "Treinamento: Edição de Refeição Kaiseki"
523671672 = "Para quando a vila termal for reativada no futuro, Nodoka decide começar a treinar para ser uma anfitriã. Ela tenta servir uma refeição kaiseki ao Sensei, mas……?"
2565382189 = "Treinamento: Edição de Limpeza"
3330425173 = "Como parte do treinamento para se tornar uma anfitriã respeitável, Nodoka limpa o banheiro da Schale. Dizendo que a banheira já deve estar cheia, ela é informada pelo Sensei que 'hoje não tem água quente devido a obras', e Nodoka fica desapontada por seu plano ter falhado."
4230538315 = "Treinamento: Edição de Etiqueta"
3390509471 = "Para aprender a andar com elegância, Nodoka começa a treinar andando com almofadas em uma estrada escorregadia. No entanto, em um momento de distração, ela cai e torce o tornozelo. O Sensei a carrega nas costas de volta para a Schale, e Nodoka secretamente se alegra, considerando isso uma vantagem."
608936968 = "Treinamento: Edição de Descanso"
3128779278 = "Para Nodoka, que machucou o tornozelo, o Sensei a convida para uma fonte termal que diz ser boa para tratamento. Aliviada por não ser uma terma comum, mas sim um banho de pés, Nodoka se emociona com o calor do banho e a bela paisagem."
2400865026 = "Antes Que o Ano Termine"
3775606218 = "Em um dia antes do Ano Novo, Aru chama o Sensei para alugar um quimono juntos. No entanto, influenciada pelas palavras da vendedora, Aru acaba comprando um quimono caro, dizendo que é parte de um investimento."
1207833116 = "As Costas Que Quero Mostrar"
3154422011 = "No Ano Novo, Aru pede ao Sensei para escoltá-la a um jantar de gala com empresários famosos de Kivotos. Vestindo o quimono alugado da última vez, ela se esforça para causar uma boa impressão ao Sensei, mas……?"
2296868625 = "O Primeiro Passo Com Você"
672381548 = "No dia de Ano Novo, Aru entra em contato com o Sensei. Os dois fazem suas orações de ano novo e, na volta, o Sensei lhe dá sua impressão sobre o quimono."
3587591035 = "Teste de Sorte de Ano Novo"
4191647869 = "Aru vai com o Sensei tirar a sorte no templo. No entanto, por mais que tente, só sai 'azar'. Indignada, quando lê o resultado do Sensei, seu rosto se ilumina."
2459534347 = "Presente Para o Sensei"
1129754769 = "Na manhã de Ano Novo, Mutsuki, vestida de quimono, aparece no quarto do Sensei que dormia profundamente. O Sensei recebe o osechi de Mutsuki, mas dentro há uma bomba-relógio! O Sensei hesita sobre qual fio cortar, mas o tempo acaba impiedosamente……?"
2385954924 = "Como Deve Ser no Ano Novo!"
335158519 = "Para escrever um desejo em uma placa votiva, o Sensei decide sair com Mutsuki. Depois de passar pela multidão e finalmente começar a escrever, Mutsuki alegremente toma a placa do Sensei. Por outro lado, ela não escreveu nenhum desejo, e o Sensei se oferece para escrever em seu lugar."
2713380999 = "Batalha Intensa"
3857167523 = "O Sensei, atendendo ao chamado de Mutsuki, vai ao local combinado e, de repente, uma partida de 'hanetsuki' começa. Sob a regra de que 'o perdedor deve ouvir um pedido do vencedor', Mutsuki começa a competição se divertindo como sempre, mas……?"
470221661 = "Estudo de Miko"
3007775160 = "Para um trabalho de meio período de Ano Novo, Serika decide trabalhar como miko. Ouvindo que 'quanto mais perfeita a miko, maior o salário por hora', ela pesquisa por conta própria e também consulta o Sensei. Depois de ouvir várias coisas, descobre-se que tudo era baseado em jogos e animes……?"
2523978486 = "Especialista no Mundo das Miko"
979203914 = "Serika começa a trabalhar seriamente como miko, mas parece que as coisas não vão muito bem. No entanto, encorajada pelo Sensei, ela volta à ativa e, de repente, começa a chover consultas."
2340715417 = "Só Mais Um Pouco"
2269796876 = "Serika diz que quer fazer compras para todos de Abydos, e o Sensei combina de sair com ela. No entanto, na hora marcada, Serika não aparece. Preocupado, o Sensei corre por aí procurando por ela e ouve o miado de um gato vindo de algum lugar……?"
3759928433 = "Reencontro Gentil"
576523944 = "Enquanto passeia por Kivotos, o Sensei enfrenta chantagens, delinquentes e muitos outros desastres. Tentando escapar, ele é salvo por misteriosas explosões. Por trás dessas explosões, que parecem protegê-lo, estava a figura de Wakamo."
3463568525 = "Encontro a Sós Juntos"
649370719 = "Wakamo, que considera as explosões e balas que seguem o cotidiano do Sensei como um encontro secretamente observado, ouve do Sensei: 'Da próxima vez, vamos juntos'."
888544873 = "Encontro Distorcido"
657109644 = "Wakamo elabora um plano meticuloso para o encontro, mas no dia, é seguido por infortúnios e esforços em vão. O Sensei a consola, mas ela se recupera no dia seguinte e o convida para outro encontro."
337655417 = "Coração Imutável"
1672717160 = "Devido ao trabalho, o Sensei se atrasa para o encontro com Wakamo. Ele pede desculpas pelo atraso, mas ela parece não se importar. Dizendo que 'o Sensei nunca me trai, então posso esperar meses', o Sensei não consegue evitar um suor frio."
4127733603 = "Coração Secreto"
684934471 = "Percebendo uma atmosfera sinistra pelo MomoTalk, o Sensei diz a Wakamo que quer passar o dia com ela. Envergonhada com as palavras do Sensei, ela foge, e o Sensei cai ao persegui-la. Preocupada, ela ouve o pedido do Sensei para ver o que está sob a máscara, e assim ele ouve a história de sua máscara."
443018916 = "Porque Sou uma Ferida"
4068284168 = "Sena, como de costume, faz seu trabalho de proteger os feridos em um confronto entre delinquentes. Ela também deixa inconsciente o membro do Comitê Disciplinar que tentava levar à força o líder ferido para interrogatório e transporta todos os feridos."
2901484910 = "Situação de Emergência"
4226549044 = "Não suportando ver o Sensei trabalhando doente, Sena decide ajudá-lo. Ela o ajuda de várias maneiras para terminar o trabalho e, no final, cuida do Sensei que adormeceu."
948530229 = "Sena Himuro"
1708902441 = "Como agradecimento pelo suporte do outro dia, o Sensei vai com Sena a um piquenique. Sena, ciente de sua própria falta de expressão, transmite sua alegria e gratidão ao Sensei com palavras diretas e próprias dela."
1699201785 = "Em Espera"
3298489040 = "O Sensei visita Sena, que está sozinha tarde da noite como pessoal de prontidão para acidentes. Sena saboreia a felicidade de passar a longa noite juntos sem fazer nada."
2267997112 = "Verificação de Segurança"
837950607 = "Senha afixada. Chave na caixa de correio. Chihiro, ao notar os muitos problemas de segurança na Schale, dá um sermão de várias horas no Sensei."
3713208438 = "Método de Hacking"
4238915657 = "Para um novo contrato de trabalho, Chihiro leva o Sensei para uma negociação. Sua habilidade de hacking não se limita ao eletrônico, e ela consegue fechar o contrato fazendo um hacking psicológico usando o Sensei."
520601278 = "Manutenção"
3844936871 = "Chihiro e o Sensei passam até tarde da noite trabalhando na manutenção do centro de dados. Após o trabalho, na cidade adormecida, Chihiro fala sobre a simpatia que sente pelas máquinas de venda automática."
434697728 = "Preto & Branco"
1764792485 = "Chihiro, contratada para uma verificação de segurança, descobre durante a inspeção que a empresa está cometendo crimes. Dividida entre o dever como responsável pela segurança e a consciência, ela decide expor a injustiça no final."
1910728491 = "A Ideia de uma Policial Preguiçosa"
3560375484 = "Fubuki, querendo cochilar durante o expediente, instala uma macro no MomoTalk. Tentando automatizar as respostas, o algoritmo ruim acaba causando mais problemas, e ela acaba escrevendo muitas cartas de desculpas."
1170334966 = "Patrulha da Policial Preguiçosa"
2139982306 = "Fubuki é designada para a patrulha de fim de semana. Durante a patrulha, ela avista delinquentes, mas, por preguiça, decide tratá-los como 'boas pessoas' e ignorá-los. No entanto, essa atitude acaba emocionando os delinquentes, que se regeneram. No final, os problemas a perseguem."
1238659725 = "Vigília da Policial Preguiçosa"
1704488465 = "Fubuki mostra um entusiasmo incomum pelo trabalho de vigília. Achando suspeito, o Sensei a acompanha e, como esperado, o objetivo de Fubuki não era a missão, mas os donuts que acompanham a vigília."
975406302 = "A Bondade da Policial Preguiçosa"
549498692 = "Durante o trabalho, Fubuki encontra uma garotinha que perdeu seu prendedor de cabelo. Embora se recuse a procurar alegando as regras, ela secretamente sai para procurá-lo. O motivo, ela diz, é 'por um delicioso donut'."
327110961 = "É de Manhã, Levante-se?"
3796601530 = "Mimori, que veio acordar o Sensei que tende a dormir demais devido ao trabalho na Schale. Visando ser uma yamato nadeshiko, Mimori se dedica ao Sensei desde cedo."
3321521936 = "Treinamento de Noiva 1: Edição de Culinária Caseira"
1981885852 = "Como parte do treinamento para se tornar uma yamato nadeshiko, Mimori pratica culinária caseira. Embora cometa erros típicos enquanto pratica com o Sensei, no final, os dois conseguem preparar algo delicioso e ela fica aliviada."
4146994927 = "Treinamento de Noiva 2: Edição de Limpeza"
1361337265 = "Como parte do treinamento para se tornar uma yamato nadeshiko, desta vez Mimori faz limpeza. Enquanto demonstra suas habilidades de limpeza com prazer, o Sensei comenta que ela gosta de limpar. Ela concorda, mas murmura: 'Não ficaria tão animada se estivesse sozinha'."
2432518592 = "Com o Coração em Cada Ponto"
4002112709 = "A pedido de acompanhá-la nas compras, o Sensei sai com Mimori. O que ela veio comprar é um lenço. No lenço comprado, ela borda com a técnica de bordado que vinha praticando secretamente e o entrega ao Sensei como prova de gratidão."
4023636786 = "A Seriedade de uma Yamato Nadeshiko"
4253217632 = "Para mostrar os resultados de seu treinamento culinário, Mimori convida o Sensei ao Departamento de Treinamento e tira um avental para limpar a sala de economia doméstica bagunçada. Ela conta que aquele avental foi comprado quando decidiu que queria se tornar uma yamato nadeshiko, cheio de recordações."
2653666458 = "A Mestra da Velha Biblioteca"
407306471 = "Ui, que se isolou na velha biblioteca por se sentir estressada com interações externas, aos poucos se abre com o Sensei, que a visita preocupado, e começa a interagir gradualmente."
1710419489 = "A Criança Desaparecida É"
3020671650 = "Quando outros membros limpam a velha biblioteca, Ui percebe que um dos livros da coleção desapareceu. Nervosa, ela procura 'a criança' com o Sensei e, depois de muito tempo, consegue encontrá-la."
2628285155 = "Proposta Repentina"
1721570820 = "Ui, como meio de interação com o Sensei, prepara um livro em branco. Grande demais para ser carregado, ele é deixado na velha biblioteca e se torna um quadro de mensagens onde Sensei e ela trocam impressões sobre os livros."
4161300230 = "Sem Nome"
1304365797 = "Exausta com o trabalho de decodificação, Ui pede ajuda ao Sensei. Graças à bebida energética que ele trouxe, ela consegue terminar o trabalho e adormece."
1272486088 = "A Administradora da Catedral"
2112303416 = "Hinata e o Sensei trabalham juntos no depósito da catedral, suando muito. Como resultado, são mal interpretados pelos alunos ao redor."
3466205653 = "O Excessivo É Tão Ruim Quanto a Falta"
903624085 = "Hinata, que nunca tira folga, é levada quase à força pelo Sensei para um local isolado. Os dois descansam juntos, mas novamente parecem ser mal interpretados pelos alunos ao redor."
114552415 = "No Meio dos Arbustos"
1527438767 = "Procurando por Hinata, o Sensei acaba entrando sem querer em uma área restrita. Prestes a ser visto por outros alunos, os dois se escondem às pressas nos arbustos. No final, Hinata sai dos arbustos, mas parece que desta vez também foram mal interpretados pelos alunos."
4143765441 = "O Que Levar Para um Piquenique"
3753682808 = "No dia de folga, o Sensei vai com Hinata a um piquenique. Com conversas tranquilas e uma marmita caseira, eles passam um dia feliz."
709626164 = "Piquenique com Furoshiki"
1140812726 = "Hinata decide fazer um piquenique com o Sensei. Quando tenta abrir a marmita caseira, o que estava embrulhado no furoshiki não era a marmita, mas sim o 'Livro de Registro de Bens'. Confusa, o Sensei oferece sua própria marmita e, enquanto comem juntos, leem o 'Livro de Registro de Bens'."
2874669650 = "O Inquérito da Chefe de Segurança"
1738744695 = "Marina investiga o caso do pudim que desapareceu do Departamento de Refeições. A conclusão final da brilhante dedução da chefe de segurança é que a própria Marina é a espiã traidora."
3135302426 = "A Dedução da Chefe de Segurança"
690185550 = "Marina, perseguindo o caso do pudim desaparecido, percebe que o culpado é uma fera de garras e presas afiadas -- um gatinho. Assustada com o gatinho, ela dispara sua arma e destrói a estátua da Presidente Cherino. É punida."
2102177857 = "A Limpeza da Chefe de Segurança"
794361453 = "Como punição por destruir a estátua da Presidente Cherino, Marina faz a limpeza do banheiro. Ela parece tão animada que o Sensei percebe que ela também serviria para o Departamento de Limpeza. Ao ouvir isso, Marina planeja um golpe de estado para se tornar chefe do Departamento de Limpeza."
4222369533 = "O Mal-Entendido da Chefe de Segurança"
1309897125 = "Por falta de imponência, Marina é suspeita de falsificar sua identidade como chefe de segurança e é presa pelos seguranças de uma área remota. Desanimada com a realidade tão diferente da reputação pública, ela é encorajada pelo Sensei e se recupera rapidamente."
263371351 = "SRT, Invadindo!"
1824415151 = "Miyako invade a Schale de repente. Parece que, ao investigar o boato de 'adultos suspeitos levando alunas para dentro de um certo prédio', ela descobriu que o prédio era a Schale. Embora o mal-entendido tenha sido resolvido, ela decide revistar por precaução e encontra vários livros……"
2083034072 = "SRT, Resgatando!"
608640286 = "O Sensei encontra Miyako por acaso em uma galeria comercial, observando coelhos atentamente em uma loja de animais. Pensando na situação delas, Miyako hesita, mas o Sensei a encoraja. No final, ela decide criá-lo com todo o amor."
1182641974 = "SRT, Protegendo!"
2986991819 = "Miyako e o Sensei pensam em um nome para o coelho enquanto conversam sobre sua ecologia."
3552637652 = "SRT, Saltando!"
47734010 = "Miyako e o Sensei decidem ir juntos para uma certa operação. Voando de helicóptero e olhando a cidade do alto, Miyako solta um suspiro de admiração pela paisagem."
4216668975 = "SRT, Descansando!"
2500254733 = "Preocupado com o conteúdo do MomoTalk de Miyako, o Sensei vai até o parque. Com Miyako, que diz que o chamou mesmo sem ter nada, o Sensei passa um tempo importante e simples."
392509450 = "SRT, Lembrando"
2026533413 = "Miyako, lavando suas próprias roupas na Schale, deixa cair sua etiqueta de nome. O Sensei a pega, e ela lhe conta as recordações ligadas a ela."
1943391112 = "O Vento Norte e o Sol"
1484545006 = "Apesar do calor intenso, Saki se recusa absolutamente a tirar o capacete de aço, dizendo que está em uma operação. Preocupado com sua condição física, o Sensei tenta de várias maneiras fazê-la tirar o capacete. Mas todas as tentativas falham. No entanto, assim que o trabalho do plantão termina, Saki simplesmente tira o capacete."
3937121232 = "Coelho Perdido"
2072678078 = "Para complementar a alimentação do Esquadrão RABBIT, o Sensei e Saki saem para colher ervas da montanha. O tempo passa e tentam descer, mas os dois se perdem na montanha. Saki tenta usar a leitura de mapas para encontrar o caminho, mas……?"
537552521 = "O Grande Substitui o Pequeno?"
3736593165 = "Saki trouxe de um mercado de pulgas uma arma rara, um 'Morteiro de Pá de 37mm'. Animada com a arma inovadora, ela logo percebe que está bastante enferrujada. Tentam desmontar e fazer a manutenção, mas até Saki desiste, achando-a muito difícil de usar."
4158890334 = "Pronto, OK"
2568213059 = "Para recolher equipamentos de acampamento abandonados, o Sensei decide escalar uma montanha com Saki. No entanto, não acostumado, o Sensei machuca o ombro. Saki lhe oferece uma almofada……"
4041452924 = "Coelho e o Livro Sagrado <Militar>"
2079813724 = "O item que Saki esqueceu na Schale era o manual da SRT. Ela adorava o manual desde antes de entrar na escola e ainda o relê sempre que tem tempo. Quando o Sensei folheia o manual, encontra um diário nos campos de anotação da época em que conheceu Saki. Ao ler em voz alta, Saki fica brava, desenha 'Idiota!' no rosto do Sensei e vai embora."
3019246166 = "RABBIT4, Escondendo-se"
636667611 = "Miyu e o Sensei vão a uma loja de artigos para atividades ao ar livre. No entanto, devido à sua natureza, Miyu não é muito notada pelos outros e fica deprimida como sempre. Mas, por causa dessa natureza, os animais selvagens são menos cautelosos com ela, e ela consegue interagir até com um gato famoso por ser feroz."
332535311 = "RABBIT4, Saindo em Missão"
291507910 = "Focado no trabalho, o Sensei demora a perceber que Miyu estava ali. Durante a conversa, eles pensam que seria bom fazer um som sempre que Miyu se movesse. No entanto, o que ela coloca é uma 'coleira com guizo', e os mal-entendidos se aceleram em vários lugares……"
810612864 = "RABBIT4, Atirando"
716720190 = "Preocupada com a possibilidade de suas habilidades terem diminuído por falta de treinamento formal, Miyu decide treinar tiro com o Sensei. Quando o Sensei volta depois de colocar alvos distantes, vários animais selvagens se reuniram sobre o corpo de Miyu, devido à sua falta de presença. No entanto, concentrada no tiro, Miyu pensa que foi uma brincadeira do Sensei e……?"
485476395 = "RABBIT4, Relaxando"
751297374 = "Em um dia de folga, o Sensei encontra Miyu agachada fazendo algo. Perguntando, ela diz que seu hobby é colecionar pedrinhas. O Sensei passa o dia procurando várias pedrinhas com Miyu até o pôr do sol."
376395967 = "RABBIT4, Lembrando"
652033454 = "Para capturar um corvo, Miyu e o Sensei vão ao telhado de um prédio. No entanto, o Sensei começa a tremer de frio. Miyu lhe dá o chocolate quente que os membros do esquadrão SRT haviam preparado para ele."
1540090706 = "O Mascote do Departamento de Treinamento"
181569107 = "Insatisfeita com a fama de excêntricos do Departamento de Treinamento, Kaede insiste em fazer atividades para mudar essa percepção. Enquanto participa de várias atividades com Kaede, o Sensei começa a entender vagamente por que o departamento é visto assim."
258942768 = "Quero Ser uma Bela Dama!"
3935689214 = "Kaede diz que 'uma bela dama nunca se apressa' e pede ao Sensei para tentar deixá-la agitada. Resistindo (?) a várias tentativas do Sensei, ela mantém a compostura, mas quando confrontada com a reserva de um show de heróis, ela mostra seu habitual jeito desastrado."
1209493139 = "A Razão Para Querer Ser Adulta"
2992466081 = "Tentando parecer madura na frente do Sensei, Kaede acaba causando uma pequena confusão. Mesmo assim, com o conselho do Sensei de que não precisa se apressar e pode ir devagar, ela rapidamente se anima."
1603342232 = "E a Garota Se Torna uma Bela Dama"
1457617705 = "Para comprar um novo pacote de Mushiking, Kaede chega ao local após superar vários incidentes. No entanto, ela decide dar o último pacote para uma garota que parece ter vindo de longe. Naquele momento, com um sorriso um pouco mais maduro, quem aparece diante de Kaede é……?"
1257661108 = "A Primeira Recordação"
302074546 = "Para conseguir uma sleeve limitada de carta de Mushiking, o Sensei visita uma loja pop-up com Kaede. Ela mostra ao Sensei suas sleeves favoritas e conta como se apaixonou por Mushiking."
945039977 = "Fräulein Invasora"
2033857445 = "Iroha, que veio em uma missão da Pandemônio para seduzir o Sensei. No entanto, quando ele recusa sua proposta, ela parece não se importar, deita no sofá da Schale e começa a ler um livro."
3918415703 = "Fräulein Sedutora"
2282933521 = "Iroha tenta seduzir o Sensei para matar aula juntos, mas ele não cede facilmente. Desistindo, ela propõe irem comer algo. Quando o Sensei aceita, Iroha sorri vitoriosa, dizendo que 'conseguiu atrair o Sensei'."
3810393676 = "Fräulein Astuta"
1746326246 = "Visitando o Sensei ocupado, Iroha, no meio da conversa sobre trabalho, o convida para fazer compras. No entanto, o que ela compra são apenas doces e brinquedos, coisas aparentemente sem relação. Quando perguntada, ela diz: 'Não disse que eram compras para o trabalho'. Tendo conseguido fazer o Sensei relaxar, ela sorri tranquilamente."
3329845713 = "Fräulein Sorridente"
3228138921 = "Estranhando a ausência incomum de Iroha, o Sensei preocupado decide visitar a Pandemônio de Gehenna. Lá está Iroha, ocupada como comandante de tanque. Ouvindo as palavras do Sensei de que estava preocupado, Iroha sorri e o guia para seu espaço de descanso."
4280952109 = "Garota Ninja É Difícil de Lidar"
3933870946 = "Quando o Sensei está preparando lámen instantâneo para o almoço, Michiru aparece na Schale em busca de material para seu canal de vídeos. Enquanto a conversa salta de um lado para o outro, o Sensei também dá algumas ideias de conteúdo, mas parece ter apertado um botão estranho em Michiru, que então dá uma palestra de 3 horas sobre ninjas. O lámen instantâneo ficou empapado."
3951006407 = "Garota Ninja Não Pode Ser Parada"
3104593350 = "Outro dia, quando o Sensei está fazendo lámen instantâneo, Michiru irrompe na Schale. Ela arrasta o Sensei, dizendo ter tido uma ideia de vídeo que pode viralizar, e mais uma vez o lámen instantâneo fica empapado."
4128417300 = "Garota Ninja Não se Esconde"
947593483 = "Michiru, que visita uma loja de artigos ninja com o Sensei, encontra alunos problemáticos que zombam dos ninjas. Inicialmente com medo, ela não aguenta ver os ninjas serem ridicularizados e sai correndo……?"
3245340691 = "Garota Ninja Quer Brilhar"
1828893364 = "Para gravar um novo vídeo, Michiru chama o Sensei ao parque. Ela lhe mostra seu novo jutsu autodidata, 'Ninpou: Técnica do Fogo Brilhante'."
3894779452 = "Garota Ninja Quer Ser Lembrada!"
2435971928 = "Michiru tem uma fita de vídeo preciosa que revê muitas vezes desde criança. Dentro dela está a obra que a fez querer se tornar ninja. Ao tentar fazer um backup da fita para poder assistir sempre, ela descobre que a fita é velha demais e não pôde ser restaurada. Tomada pela tristeza, ela se recompõe e vai com o Sensei para a loja de artigos ninja."
650560128 = "Para um Ninja de Verdade……!"
2949122187 = "Para Tsukuyo, preocupada em como se tornar um ninja de verdade, o Sensei aconselha que ela pratique primeiro o que faz de melhor. Ao ouvir isso, ela demonstra sua especialidade, o 'Jutsu de Substituição', surpreendendo o Sensei."
251220476 = "Talvez Não Seja Tão Ruim"
3420245975 = "Tsukuyo, que tem complexo com seu físico, ouve do Sensei que talvez, justamente por ser assim, ela possa ver coisas que outros não veem. Naquele momento, ouvem a voz de uma criança perdida e, usando sua altura elevada, conseguem encontrá-la. Vendo a criança reencontrar a irmã, Tsukuyo pensa que seu físico também pode ter seus pontos positivos."
782301528 = "Para uma Kunoichi Respeitável……!"
2486610304 = "Encontrando um livro sobre como se tornar uma kunoichi respeitável, Tsukuyo decide testar o conteúdo com o Sensei. Ao tentarem várias coisas, ela percebe que o livro na verdade era sobre técnicas de sedução ao estilo kunoichi, e não um manual de ninjutsu, e foge envergonhada da frente do Sensei."
2449832284 = "Uma Chance de Atuar Como Ninja……!"
2775750975 = "O Sensei e Tsukuyo reencontram a garota que estava perdida da última vez. Desta vez, seu cachorro fugiu, e eles prometem usar suas habilidades ninjas treinadas para encontrá-lo. Conseguem achar o filhote, mas no processo, Tsukuyo fica presa em um beco estreito……?"
393436108 = "A Prisão Chamada Corpo"
445636691 = "Não podendo deixar Misaki com seu ar perigoso, o Sensei a acompanha até o telhado de um prédio alto para seus afazeres. Quando terminam e tentam voltar, o elevador quebra…… Presa no elevador, a expressão de Misaki fica cada vez mais sombria."
2021138019 = "Corpo Incontrolável"
2328210988 = "Para se aproximarem, Misaki e o Sensei saem para um passeio. O Sensei pergunta por que ela não tira a máscara durante o passeio, e quando Misaki tenta responder que é alergia ao pólen, um espirro incontrolável a ataca. Misaki reclama de seu corpo que não obedece à sua vontade."
275908656 = "Mesmo Que Não Fique Limpa"
3575999017 = "Misaki pegou um resfriado forte, e o Sensei a faz descansar em um escritório próximo, cuidando dela. Lamentando seu corpo frágil, Misaki ainda se sente aliviada por o Sensei ter vindo. Embora antes nada lhe interessasse, ela sente uma irritação com as emoções que surgiram ao se envolver com o Sensei, mas olha um pouco para frente."
495675616 = "Recordações Gravadas"
4070608128 = "Misaki esqueceu sua bolsa e está com problemas. O Sensei a ajuda a procurar e a encontra em segurança. Lá, eles encontram uma certa escultura de madeira……"
4128473246 = "A Garota Ainda Quer Ler"
2241310795 = "Subindo em um poste em uma área sem lei, Hiyori tenta secretamente carregar seu celular. Dizendo que, como andarilha, até carregar o celular é difícil, ela chora. O Sensei lhe dá uma bateria descartável e pede para ela não subir mais nos postes, pois é perigoso."
1210605930 = "A Garota Ainda Não Desiste"
3115826030 = "Hiyori encontra uma revista de moda rara entre revistas descartadas e fica feliz. Enquanto conta que colecionar essas revistas é seu hobby, ela também lamenta ter queimado parte de sua coleção outro dia para sobreviver. Não há escolha. E continua dizendo que, como conseguiu um kit de primeiros socorros antigo, agora não terá problemas se tiver dor de barriga. O Sensei lhe compra remédios novos. Proibida de receber coisas compradas pelo Sensei, Hiyori se aproveita da situação e ainda pede a edição mais recente da revista. Assim, os segredos contra os membros de Arius aumentam."
1808891171 = "A Garota Ainda Quer Saber"
2121001156 = "Hiyori, que bebeu água de uma ruína e teve dor de barriga, é levada ao hospital pelo Sensei. Internada e já recuperada, ela lê na última edição da revista uma matéria sobre umbigos atraentes e começa a chorar, dizendo ao Sensei que seu umbigo é diferente e anormal."
3481010754 = "A Princesa nas Ruínas"
406981505 = "O grupo de Arius decide ficar temporariamente em uma escola abandonada. Enquanto todos saem para seus afazeres, Atsuko, entediada, chama o Sensei escondido dos outros e começa uma 'brincadeira de escolinha'."
2090305712 = "Escola da Meia-Noite"
3848876286 = "Tarde da noite, Atsuko invade a escola vazia e continua a brincadeira de escolinha que não pôde fazer da última vez. Sonhando com uma vida escolar comum, ela passeia com o Sensei e passa um tempo precioso. Mas esse momento não dura muito. Assim que Atsuko tenta aproveitar o máximo do cotidiano, o alarme de invasor soa impiedosamente na escuridão."
835240471 = "Jardim de Flores da Cidade"
3161846637 = "Ouvindo que Atsuko decidiu ter flores como hobby, o Sensei lhe dá flores de corte. Rindo que, na verdade, queria fazer um jardim, ela guarda as flores com cuidado e convida o Sensei para seu jardim secreto criado em um canto da rua."
1871057734 = "Ainda Mais do Que Agora"
4152512206 = "Devido a uma chuva forte, todas as flores do jardim morreram, e Atsuko se culpa. O Sensei diz que podem aprender sobre flores juntos a partir de agora. Com essas palavras, Atsuko olha para frente e acena com firmeza."
3907252919 = "Apenas Por Você"
2694524553 = "Mesmo no verão, Wakamo, preocupada com o Sensei atolado de trabalho nos preparativos para o festival de fogos de artifício, vai até a Schale para criar 'memórias perfeitas de verão'. No entanto, dizendo que não tem confiança para planejar 'memórias perfeitas de verão' para o Sensei, ela pergunta o que ele quer fazer, mas interpreta tudo de forma sinistra e tenta executar…… No final, passam a noite trabalhando juntos na Schale, e tudo termina bem."
3209742349 = "Apenas Querendo Cumprir a Promessa"
3701725789 = "O plano das 'memórias perfeitas de verão' não havia terminado. Preocupada com o que o Sensei queria fazer, Wakamo consegue uma 'promessa' de encontro com ele. Mas, toda vez que saem, o Sensei é chamado de volta por problemas nos preparativos do festival de fogos de artifício. Farta das interrupções, Wakamo decide que seria melhor se o festival de fogos não existisse e resolve explodir o depósito. Vendo Wakamo enfurecida no depósito, o Sensei a repreende severamente."
239637834 = "Coração Tremeluzente Junto à Fogueira"
1035672286 = "Wakamo pergunta se o Sensei se lembra da 'promessa' que ficou pela metade, e ele responde que espere até o trabalho terminar. Depois, ele tenta entrar em contato, mas não obtém resposta, e o tempo piora…… Correndo na tempestade para procurá-la, ele a encontra exposta às intempéries, esperando por ele fielmente, cumprindo a 'promessa'. Para aquecê-la, fazem uma fogueira, e os dois passam um momento tranquilo."
850282751 = "Gravado é o Sentimento Puro"
765356607 = "Wakamo e o Sensei passam o tempo na praia. Embora ela diga que é suficiente passar o tempo com o Sensei, a única pessoa em quem confia, ela não consegue esconder o desejo de compartilhar um guarda-chuva. Depois, criando coragem, ela faz o gesto de dividir o guarda-chuva e, como recordação, grava seu nome e o do Sensei no cabo do guarda-chuva. O tempo pacífico é interrompido pela guarda costeira, e os dois fogem em uma fuga de amor --"
4061302182 = "De Vez em Quando, Um Dia Assim"
54589100 = "Nonomi convida o Sensei para um reconhecimento de piquenique. Quando o Sensei se oferece para carregar as coisas, ela diz que está tudo bem. O Sensei então diz que quer uma bebida que não está na bagagem. Enquanto Nonomi vai buscar a bebida, ele desfaz a bagagem do piquenique, decidindo mimá-la."
1859398185 = "Desafio da Colheita de Coco"
3014898155 = "Para que os outros membros possam beber suco de coco delicioso após o trabalho, o Sensei e Nonomi vão colher cocos na floresta. Sem uma escada, tentam derrubá-los com uma minigun, mas não dá certo…… Tentam uma árvore baixa com o Sensei dando cavalinho, mas perdem o equilíbrio. Nonomi ri, dizendo que foi uma boa experiência."
2542756039 = "Estrelas Brilhando na Areia"
3336596639 = "Tarde da noite, o Sensei, sem conseguir dormir, caminha pela praia e encontra Nonomi por acaso. Ela sorri, dizendo que a tristeza aumenta à medida que o dia da partida se aproxima. O Sensei lhe mostra um mar de estrelas brilhantes."
4024412057 = "O Que Significa Brincar"
1633675291 = "Ayane se diverte ao encontrar um tesouro no depósito de uma ilha deserta. Pensando que seria melhor brincar, já que estão de férias, o Sensei ri e diz que ela já estava brincando de 'caça ao tesouro' no depósito. Encorajada por essas palavras, Ayane decide competir com o Sensei para ver quem encontra os itens mais úteis no depósito, e os dois se divertem."
549604868 = "Ayane Dentro do Futon"
4017885026 = "O Sensei recebe uma mensagem estranha e ilegível de Ayane no MomoTalk. Desconfiado, ele vai até o quarto dela e encontra uma Ayane completamente diferente de sua habitual seriedade e determinação: enrolada no futon, fazendo birra como uma criança. Quando o Sensei tenta falar com ela, Ayane o confunde com Serika……"
1876616731 = "A Razão da Pressa"
2850828647 = "Ayane, que estava sozinha consertando um helicóptero sob o sol escaldante, desmaia de mal-estar. O Sensei, a quem Ayane havia pedido para trazer uma caixa de ferramentas e parafusos, a faz descansar e assume o conserto em seu lugar. Ao anoitecer, com Ayane recuperada e o helicóptero consertado, eles tiram uma foto comemorativa para celebrar o progresso."
979430574 = "O Tesouro Escondido da Ilha"
3579191394 = "Hoshino, olhando um guia em um quarto vazio do resort, ri, dizendo que é divertido procurar por guias usados por alguém no passado. Segundo ela, esses guias com anotações são 'mapas do tesouro'. Assim, o Sensei e Hoshino exploram seguindo o 'mapa do tesouro' e encontram um local perfeito para uma soneca."
117700283 = "Ingredientes Frescos Direto do Produtor"
2728239546 = "Ao receber um SOS de Hoshino pelo MomoTalk, o Sensei decide ajudá-la a coletar frutos do mar. Embora tenha sido um trabalho que lhe foi imposto, Hoshino se diverte o tempo todo com a abundância de frutos do mar. Quando o Sensei aponta isso, ela pede envergonhada para não contar aos outros."
3326990624 = "Mesmo Sem Poder Ver Dentro"
2625437651 = "O Sensei encontra Hoshino sentada na areia, olhando para o horizonte. Como Abydos não tem 'mar', Hoshino diz que é estranho. Enquanto olham juntos, um cardume de tainhas salta sobre a água. Animada com a cena, Hoshino ri, dizendo que um dia gostaria de ver uma baleia saltar junto com o Sensei."
2766807234 = "Eu Consegui!"
739359557 = "Shizuko se orgulha de ter alcançado a maior receita de todos os tempos com os contratos FC dos resorts. Empolgada para espalhar o nome Hyakuyakudou por toda Kivotos, ela ouve do Sensei que sente um pouco de falta do serviço tradicional do Hyakuyakudou devido à franquia, e ele se preocupa se ela não está se esforçando demais. Surpresa com as palavras inesperadas, Shizuko sai correndo confusa."
1341349068 = "Afinal, Para Que Era Mesmo?"
2467605046 = "Shizuko chama o Sensei para uma conversa casual. Visitando cada loja FC, ela reclama que a reação dos clientes não está boa. Preocupada com a crise do Hyakuyakudou, o Sensei pergunta por que ela faz parte do Comitê de Administração do Festival e por que começou o Hyakuyakudou. A resposta -- é pelo sorriso dos clientes. Voltando às origens, Shizuko decide seguir em frente com renovada determinação."
1344506803 = "Eu Sou Muito Gananciosa!"
3607288038 = "Shizuko chama o Sensei, dizendo que tem algo para mostrar. Na casa de praia, enquanto o Sensei ri e diz que o serviço típico do Hyakuyakudou é bom, Shizuko agradece, dizendo que foi graças a ele que pôde voltar às origens. E declara que conseguirá tudo o que quer e realizará todos os seus desejos."
32910525 = "Partindo Melancia com Izuna!"
1822618449 = "Izuna decide treinar para se tornar uma ninja adequada ao mar, e o Sensei a acompanha para partir melancias. No entanto, não conseguem partir facilmente e passam o dia inteiro treinando. Quando finalmente conseguem, os dois comem a melancia deliciosamente."
3631402519 = "Brincando na Areia com Izuna!"
1116374148 = "Novamente, Izuna e o Sensei começam a treinar na praia para se tornarem ninjas do mar. Quando o Sensei pergunta se ela quer treinar natação, Izuna desconversa e diz que quer construir um castelo de areia. Assim, após várias falhas, eles passam o dia construindo um castelo de areia."
605429618 = "Por Um Triz com Izuna!"
3019377752 = "Interrompendo novamente a proposta do Sensei de treinar natação, Izuna diz que quer treinar o banho de areia. Ela quer aprender a saltar da areia como nos dramas de época. Assim, coberta de areia, Izuna acaba adormecendo com o conforto do banho de areia."
3379580703 = "De Mãos Dadas com Izuna"
1012117113 = "Percebendo que Izuna está evitando a natação, o Sensei pergunta se ela não gosta de nadar. Izuna sorri sem jeito e diz que tinha medo de que, se o Sensei soubesse que ela não sabe nadar, ele se decepcionasse. Rindo que não precisa se preocupar com isso, o Sensei ensina Izuna a nadar."
1530413232 = "Quero Encontrar o Brilho"
340837813 = "Chamado por Chise, que diz querer 'encontrar coisas brilhantes e crescer', o Sensei a acompanha na praia para procurar coisas brilhantes. Apanhando várias coisas na praia, Chise ri, dizendo que o mar está cheio de coisas brilhantes. Mas ela inclina a cabeça, sentindo que ainda falta algo. As férias de verão em busca do brilho estão apenas começando."
416881010 = "O Que Quero Mostrar"
4275087180 = "Chise chama o Sensei, dizendo que quer mostrar algo incrível que encontrou durante a busca pelo brilho. Seguindo-a, chegam a um canto cheio de tartarugas. Rindo que o reflexo do sol nos cascos é brilhante e bonito, os dois continuam a busca pelo brilho."
3101350732 = "Onde Está o Brilho"
2121093664 = "O Sensei recebe uma mensagem estranha de Chise no MomoTalk. Com medo de que o Sensei seja amaldiçoado se se aproximar, ela finalmente confessa que pegou uma 'carta da corrente'. Para provar que isso é bobagem, o Sensei decide passar o tempo com ela, e eles superam o período sem problemas. Rindo que não aconteceu nada, Chise sorri, dizendo que graças ao Sensei, finalmente encontrou o brilho que procurava durante todo o verão."
1812069520 = "Baú do Tesouro de Recordações"
3667309469 = "O Sensei visita Chise na praia e a encontra enchendo uma bolsa com várias recordações do mar. O conteúdo da bolsa é variado, e Chise está animada para mostrar aos colegas do Departamento Onmyou, pois cada item está cheio de recordações. Terminando de encher a bolsa, ela ri, dizendo que o Sensei também é a recordação mais importante, e tenta colocá-lo na bolsa."
3499466219 = "Independência"
1404779164 = "O Sensei, que recebeu o contato de Saori, torna-se seu fiador no Mercado Negro. Diz ela que precisa de uma conta bancária para ganhar dinheiro. Sem escola e com o esquadrão desfeito, Saori diz que o Sensei é a única pessoa em quem pode confiar. Embora aceite ser fiador, o funcionário do banco diz que não é suficiente e chama o guarda do mercado para um teste prático."
1353600712 = "Descuido"
2747481849 = "Preocupado com Saori, o Sensei visita o Mercado Negro. Embora ela diga que está aceitando pedidos porque conseguiu abrir a conta, não recebeu pagamento por ter trabalhado sem contrato. Testemunhando a cena, o Sensei protesta, mas é informado de que o pagamento retroativo não pode ser feito. Graças à intervenção do Sensei, Saori recebe o salário do dia e aprende a importância de fazer contratos."
1647392473 = "Remorso"
18924281 = "Desta vez, Saori diz que fez um contrato adequado. No entanto, o conteúdo do contrato é terrível: lutar sozinha contra uma organização inimiga. Encontrando Saori ferida, o Sensei a trata e a leva para comer lámen, dizendo que estudarão contratos a partir de agora."
4249397029 = "Nada É Inútil"
3781866017 = "A máscara de Saori quebra, e ela decide procurar um técnico para consertá-la com o Sensei. Mas é difícil encontrar alguém que conserte uma máscara de um modelo tão antigo. Dizendo que 'agora esta máscara parece um membro do esquadrão', Saori e o Sensei, para atender ao seu desejo, tentam várias vezes até conseguir consertá-la."
2097037032 = "Dano Colateral"
1238978732 = "A pedido do Sensei, Moe ajuda a capturar um ladrão. Usando um drone de rastreamento infravermelho, conseguem prender o criminoso, mas Moe não resiste ao impulso e dispara um míssil…… destruindo a cidade. Quando o Sensei pergunta por que ela disparou o míssil, Moe confessa que tem um desejo de autodestruição."
3925224064 = "Desaparecido em Ação"
3963871333 = "Após perder todos os dados de trabalho por um acidente, Moe aparece para ajudar o Sensei. Graças a ela, a recuperação dos dados é mais rápida do que o esperado, mas depois que o trabalho termina, Moe aperta o 'botão de reset de emergência' que encontraram…… Tudo volta a ser como antes, mas a macro que Moe preparou salva a situação."
3909715798 = "Artilharia Não Explodida"
3002018408 = "Moe, que veio para o plantão na Schale, é instruída pelo Sensei a não tocar em nada enquanto ele sai. Mas, com seu forte desejo de autodestruição, ela obviamente não obedece…… Moe aperta impulsivamente um grande botão vermelho perto da mesa e aciona o chuveiro de emergência, ficando encharcada."
1642348824 = "Linha de Fase"
1120991900 = "O Sensei visita o Parque Coelho para ajudar a organizar os suprimentos do Esquadrão RABBIT. Diferente do habitual, Moe lida com a tarefa calmamente, mesmo diante de materiais perigosos. Quando o Sensei comenta que ela está diferente, Moe lhe conta sobre seu desejo de autodestruição guardado no peito."
1771630708 = "Claymore, Claymore, Claymore!"
279334293 = "Moe e o Sensei estavam conversando sobre a falta de exercício ultimamente. Com um sorriso determinado, Moe tira…… um dispositivo de lançamento?"
1230115544 = "Aula de Recuperação e Doces"
3289098080 = "Chamado por Kazusa, o Sensei a ajuda a estudar para a recuperação em um café. Dizendo que, já que ele a está ajudando, ela pagará a conta, o Sensei, após o estudo, lhe paga doces, e eles dividem as guloseimas, passando um momento agradável."
446030069 = "Apesar das Aparências, Sou Membro do Clube de Doces Pós-Aula"
4084141263 = "O Sensei encontra Kazusa por acaso em um ponto de ônibus. Enquanto esperam, eles conversam animadamente, comendo suco e biscoitos."
2391083433 = "Momento Ruim"
3086413285 = "O Sensei encontra Kazusa em uma loja de conveniência. No entanto, ela parece estar evitando-o, sem demonstrar que o notou…… Preocupado, o Sensei a segue e descobre que ela não queria ser vista sem maquiagem. Rindo que não se importa mesmo sem maquiagem, o Sensei conversa com Kazusa."
2135718946 = "Língua de Gato"
2285653641 = "Kazusa aparece na Schale com doces. Ela diz que comprou 'fondant au chocolat', mas não pôde comer porque estava quente demais. Rindo que ela é como um gato por não conseguir comer coisas quentes, o Sensei come o fondant au chocolat."
432381563 = "Não Sou a Kokona-chan. Sou a Instrutora!"
3385540554 = "Kokona convida o Sensei ao Jardim das Ameixeiras para vê-la atuando como instrutora. Lá, ele vê Kokona sendo chamada de 'Kokona-chan' e querida pelas crianças. No entanto, ela parece um pouco insatisfeita com isso……"
377170606 = "Não Sou Criança. Sou uma Lady!"
1059419902 = "Após o trabalho em Shanhaijing, voltando para a Schale, o Sensei encontra Kokona por acaso. Interessada no café que o Sensei comprou, ela decide provar o 'sabor adulto'…… mas é amargo demais para ela, e o Sensei a consola quando ela quase chora."
3736806188 = "De Jeito Nenhum, Odeio o Que Odeio!"
661652410 = "O Sensei encontra Kokona na cidade de Shanhaijing, e ela pede conselhos sobre como fazer as crianças a chamarem de 'instrutora'. O Sensei sugere que ela comece parando de ter aversões alimentares e a convida para ir a uma loja de cenouras deliciosas."
1888100604 = "……Só Desta Vez. Sério?"
3679415033 = "Kokona vai com o Sensei a uma loja especializada em cenouras. Embora rejeite os motivos de cenoura espalhados pelo local, ela saboreia os pratos e come tudo deliciosamente."
2090247752 = "Uniforme Escolar da Paixão"
3930023682 = "O Sensei vai ao Departamento de Engenharia para entregar o jaleco que Utaha esqueceu na Schale. Lá está Utaha trabalhando vestindo um uniforme escolar. Ela ri, dizendo que é surpreendentemente confortável e que também sente a fragrância da paixão do Grande Torneio Desportivo. Quando o Sensei brinca que o uniforme tem o cheiro dela, Utaha interpreta mal e, apressada, veste o jaleco."
492464550 = "Jogo de Massa da Paixão"
3765296963 = "Utaha conta que muitos pedidos de robôs de torcida chegaram desde o Grande Torneio Desportivo. Para ver a demonstração do protótipo, o Sensei visita o Departamento de Engenharia e desfruta de um jogo de massa com robôs que torcem segurando cartões coloridos e da torcida da própria Utaha."
4280790550 = "Alma de Torcida da Paixão"
2043768612 = "Como os robôs de torcida encomendados não ficarão prontos a tempo, a própria Utaha decide torcer por várias pessoas no lugar dos robôs --."
2208070431 = "Canção de Torcida da Paixão"
1265896640 = "Preocupada com a falta de energia dos membros do Departamento de Engenharia ultimamente, Utaha convida o Sensei ao karaokê e canta uma música que ela mesma compôs. Enquanto ela sorri, dizendo que quer animar os membros com essa música que também é o tema do departamento, a letra e a melodia seguem um fluxo imprevisível."
3318658421 = "O Detalhado Registro da Secretária do Seminário, Noah"
436248350 = "Noah visita a Schale para o plantão. Confusa com as palavras do Sensei de que pode relaxar, já que seu trabalho individual está terminado, ela decide, como secretária, registrar as ações do Sensei -- O Sensei, tendo cada detalhe minuciosamente registrado, acaba não conseguindo se concentrar no trabalho."
465908990 = "A Observação Maliciosa da Secretária do Seminário, Noah"
2289102291 = "Para quebrar a expressão impassível de Noah, o Sensei decide registrar as ações dela. Noah, por sua vez, faz perguntas ao Sensei sobre as mudanças ocorridas enquanto ela estava ausente. No final, incapaz de superar a astúcia de Noah, o Sensei prepara um café para ela."
773232047 = "A Rotina Comum da Secretária do Seminário, Noah"
604699670 = "Após o trabalho em Millennium, o Sensei encontra Noah em um café. Cercada por pilhas de documentos, ela está analisando novas patentes de invenção. Enquanto organizam os documentos e conversam sobre patentes, ela encontra uma patente interessante relacionada ao Sensei --."
3466815831 = "O Entediante Intervalo da Secretária do Seminário, Noah"
706439484 = "Com uma reunião cancelada devido a uma chuva repentina, o Sensei vai até a sala de reuniões do Seminário para ver Noah. Surpresa com a visita, Noah e o Sensei conversam e passam um momento tranquilo escrevendo na janela."
3426454651 = "O Hobby Secreto do Meister"
4103016827 = "O Sensei encontra Hibiki por acaso em um mercado perto da Schale, escolhendo tecidos. Ela ri, dizendo que está escolhendo tecidos para cosplay, e fala apaixonadamente sobre seus padrões para a confecção de roupas."
4119985251 = "A Torcida Ardente do Meister"
1355940963 = "Devido a um apagão repentino, os dados de trabalho são perdidos, e o Sensei precisa trabalhar até tarde da noite. Hibiki, vestida de líder de torcida, aparece para apoiá-lo. Embora ela o anime, o Sensei acaba se desconcentrando ainda mais."
2694245452 = "A Torcida Brutal do Meister"
3127541435 = "Refletindo sobre a falta de eficiência no trabalho da última vez, Hibiki prepara um processador de texto especial para aumentar a eficiência do Sensei. No entanto, é uma faca de dois gumes com uma função de autodestruição se o trabalho parar -- O Sensei é forçado a trabalhar sob a ameaça da autodestruição."
162351076 = "A Doce Canção de Ninar do Meister"
484928347 = "Aprendendo com o processador de texto com autodestruição, Hibiki traz uma nova invenção. Dizendo que dormir o suficiente é necessário para manter a concentração, ela lhe dá um alto-falante Bluetooth com uma canção de ninar cantada por ela mesma. Naquele dia, o Sensei consegue dormir profundamente graças à invenção de Hibiki."
2702026288 = "Caso 1. É Um Coelho?"
3571189559 = "Akane, que diz ter uma nova teoria e perspectiva em uma mensagem no MomoTalk, pede ao Sensei para passar em seu quarto se tiver tempo. O que espera o Sensei é Akane vestida com um traje de coelhinha. Sorrindo, ela diz que, já que coelhinhas também são seres criados para servir, quer servir o Sensei com essa roupa. Diante disso, o Sensei, antecipando sua morte social, lembra-se de um compromisso urgente e foge."
4078232729 = "Caso 2. Por Favor, Descanse"
4204404808 = "Após vencer a montanha de documentos, o Sensei vê Akane, vestida de coelhinha, aparecer. Perguntando se há algo em que possa servir, ela decide limpar a Schale com o Sensei. Depois de deixar o quarto limpo, o Sensei bebe o chá preparado por Akane e adormece lentamente."
1635582478 = "Caso 3. É Hora do Estudo, Não É?"
4058993158 = "Andando pela cidade, o Sensei encontra Akane por acaso, vestida de coelhinha. Ela diz que estava esperando o Sensei chegar. Fugindo dos olhares ao redor, eles entram em um café temático de coelhinhas, e Akane fica impressionada com o profundo conhecimento do Sensei."
482869814 = "Caso 4. Secretária por Um Dia, Aguardando"
607709933 = "Enquanto o Sensei trabalha até tarde e murmura sozinho, Akane aparece com um café. Surpreso por ela estar ali, o Sensei aceita o café e pergunta por que ela tem usado o traje de coelhinha ultimamente."
3585267607 = "Corrida Matinal"
1396278568 = "De manhã cedo, enquanto caminha, o Sensei encontra Yuuka por acaso no parque. Ela diz que está se exercitando para o próximo Grande Torneio Desportivo Kourin. Correndo com o Sensei, Yuuka rapidamente fica sem fôlego. Chocada, o Sensei sorri e sugere que comecem com uma corrida leve."
737635945 = "O Segredo da Culinária Científica"
2573899798 = "Durante o Grande Torneio Desportivo, o refeitório da escola ficará fechado, e Yuuka decide preparar marmitas. Sem experiência em culinária, ela pede ajuda ao Sensei na sala de economia doméstica -- e assim, ele observa Yuuka preparar a marmita. Quando come a marmita como lanche noturno, embora já esteja fria, sente um sabor caloroso."
2174568177 = "Cultura de Torcida Racional"
1860377927 = "Yuuka, que visitou a Schale por causa do torneio, decide assistir ao jogo de beisebol de Millennium transmitido pela TV enquanto o Sensei termina o trabalho. Dizendo que não é adequado para um torcedor ficar eufórico com o resultado, ela acaba se empolgando com o jogo acirrado e solta gritos de incentivo cheios de força."
670142544 = "Cartão Esportivo"
3586706266 = "Após o torneio, Yuuka visita a Schale para entregar o relatório de cooperação. No entanto, o Sensei está ausente e a mesa está bagunçada. Enquanto arruma, ela encontra uma foto escondida sua. Ao saber do Sensei, que voltou, que são cartões esportivos vendidos pela Escola Kronos, Yuuka lhe dá um autógrafo."
4024156221 = "Vestimenta Incomum"
3987667853 = "A pedido de Marie, o Sensei visita a sala de preparação da Catedral de Trinity e encontra Marie vestindo um uniforme de ginástica. Preocupada por não estar acostumada com essa roupa e por não ser muito boa em esportes, mas ter que participar como membro do comitê executivo do torneio, Marie recebe conselhos gentis do Sensei."
1051695137 = "A Freira no Canto do Banco"
343809718 = "Durante o torneio, Marie, que se esforçou tanto ajudando os outros, acaba ficando sem forças. O Sensei a aconselha a também pedir ajuda e pergunta se ela está se divertindo, apenas ajudando. Marie responde feliz que as competições do torneio foram divertidas."
2123351407 = "O Agradecimento de Marie"
720252404 = "Andando pelo terreno privado da Catedral de Trinity, o Sensei encontra Marie fazendo jogging. Ela diz, feliz, que descobriu a alegria dos esportes graças ao torneio. O Sensei decide observar o jogging de Marie."
1478340410 = "Corpo em Constante Crescimento"
2793860415 = "O Sensei recebe uma consulta de Hasumi sobre o torneio e visita Trinity. Lá está Hasumi, lutando para fechar o zíper de seu agasalho. Ela diz que cresceu e o agasalho do ano passado não serve mais. Quando o Sensei sugere encomendar um novo, ela responde que não chegará a tempo. Assim, eles continuam a reunião com a situação pela metade."
1830803246 = "Conserva de Limão com Mel"
3363601715 = "Hasumi chama o Sensei para a sala de economia doméstica, querendo agradecê-lo. Ela estava fazendo 'conserva de limão com mel' caseira para os calouros do Comitê de Realização da Justiça, que estarão ocupados durante o torneio. O Sensei ajuda a envasar e leva alguns para casa."
2317643333 = "Autogestão"
3356412026 = "No dia do torneio, Hasumi come um menu de dieta no almoço, mas não é suficiente. Ela luta contra a tentação das conversas sobre comida ao redor. O Sensei oferece a 'conserva de limão com mel' que trouxe. Ela aceita só um pouco, mas, uma vez que começa, não consegue parar e come tudo."
1424445415 = "Correção Postural"
2368675001 = "O Sensei, que combinou de se exercitar com Hasumi, visita o ginásio. Lá, eles se alongam observando o exemplo de Hasumi e também a ajudam no alongamento, alternando entre si de forma divertida."
2829913152 = "O Gosto da Hacker Genial"
2128267029 = "Sabendo que o Sensei está de folga, Himari o convida para seu esconderijo, e eles passam um momento relaxante. No meio disso, ela hackeia o sistema de som da escola para tocar suas músicas favoritas -- As músicas preferidas de Himari ecoam pelo campus de Millennium."
1584830152 = "O Experimento da Hacker Genial"
1591221981 = "O Sensei tenta não se atrasar para o horário marcado com Himari, mas acaba envolvido em vários acidentes. Depois de superá-los e chegar, descobre que tudo foi feito por Himari para testar o que leu na seção de horóscopo de uma revista. Sabendo a verdade, o Sensei lhe dá um sermão."
829552681 = "A Réplica da Hacker Genial"
711052487 = "Himari avisa que 'algo terrível aconteceu', e o Sensei corre para Millennium. Lá, ela mostra um artigo de fofoca sobre si mesma. Decidida a corrigir o conteúdo, ela grava um vídeo com o Sensei, mas, ao enviá-lo hackeado e editado, causa outra confusão."
2037364016 = "O Delicado Ponto e Vírgula da Hacker Genial"
2533708593 = "Dizendo que conseguiu um tesouro especial, Himari mostra ao Sensei o Youkai MAX edição limitada. Rindo que aprendeu uma maneira deliciosa de beber, ela agita a lata e -- nesse momento, a lata explode, e ela fica toda grudenta…… O Sensei a limpa com uma toalha."
4205919598 = "Discretamente"
785035510 = "Após o trabalho na Academia Federal Red Winter, o Sensei visita o antigo prédio escolar para ver Shigure. Quando bebe a bebida que ela lhe deu, percebe que não é água, mas vodca. Ela diz que a geladeira quebrou e todas as outras bebidas congelaram. Dizendo isso, ela oferece mais vodca. O Sensei tira a garrafa dela e usa a vodca como combustível para descongelar as outras bebidas."
2971103393 = "Fingindo Naturalidade"
3404545130 = "Apesar de Shigure tê-lo avisado para levar um guia ao visitar a Academia Federal Red Winter, o Sensei se perde na montanha nevada. Felizmente, ele encontra Shigure, mas é repreendido por não ter ouvido o conselho. Congelado e sem conseguir se mover, o Sensei é carregado nas costas de Shigure até descerem a montanha em segurança."
720127695 = "Relaxadamente"
1882526035 = "Como agradecimento por ter sido salvo na montanha nevada, o Sensei convida Shigure a um restaurante no centro da cidade. Depois de aproveitarem um momento tranquilo, no caminho de volta, ela comenta que se sente mal por receber esse tipo de gentileza sozinha, pensando em Nodoka. Quando o Sensei sugere que da próxima vez todos do antigo prédio escolar venham juntos, Shigure ri com um ar travesso."
4186219493 = "Honestamente"
273193773 = "Shigure decide cozinhar para retribuir o favor do Sensei. Levada para a sala de culinária da Schale, uma quantidade absurda de carne de caça surpreende o Sensei. E, vendo Shigure colocar vodca na comida novamente, o Sensei acaba tendo que terminar de cozinhar no lugar dela."
3572546902 = "Serina, a Papai Noel"
3496257221 = "No dia de Natal, o Sensei distribui presentes com Serina para as crianças. Terminando em segurança, enquanto ela conta que costumava acreditar em Papai Noel quando era pequena, começa a nevar. Vendo Serina com frio, o Sensei sorri e lhe dá um cachecol de presente, dizendo que até o Papai Noel merece uma recompensa."
2512788767 = "Agradecimento pelo Cachecol"
2923297793 = "Serina visita o Sensei para agradecer pelo cachecol. Preocupada com a saúde do Sensei, sempre ocupado, ela lhe dá um 'Kit de Saúde Total' com tônicos e emplastros, e ainda faz uma massagem. Vendo o Sensei revigorado, ela se alegra como se fosse ela mesma."
2326049757 = "Experiência de Um Dia na Ordem dos Cavaleiros de Resgate"
1971996326 = "O Sensei decide participar das atividades voluntárias de Serina no hospital. Enquanto verifica os pacientes como membro da Ordem, ela distribui presentes como Papai Noel. Após um dia de atividades, quando o Sensei pergunta por que ela quis participar, ele responde: 'Porque quero saber mais sobre você e a Ordem dos Cavaleiros de Resgate', e ela cora de vergonha."
720184857 = "Criança Boa? Criança Má?"
1669203285 = "Hanae pensa que, já que vai se vestir de Papai Noel, deve se tornar um verdadeiro Papai Noel. E para distribuir presentes como um verdadeiro, primeiro precisa distinguir as crianças boas das más. O Sensei decide testar se Hanae consegue detectar mentiras --"
69967909 = "Treinamento Especial! O Caminho para Ser Papai Noel!"
3605114321 = "Continuando a busca para se tornar uma verdadeira Papai Noel, Hanae começa a praticar parkour para poder entregar presentes em qualquer lugar. O Sensei apoia Hanae, que é um pouco desastrada, e eles terminam o treino em segurança. Em seguida, ela sugere pedir ajuda ao Departamento de Engenharia de Millennium para voar a Mach 2 -- e o Sensei a impede com todas as forças."
2582704447 = "Esperando por Você"
2787292054 = "Hanae convida o Sensei para seu quarto e mostra entusiasmada os lanches, meias e decorações que preparou para receber o Papai Noel. Enquanto ela, que espera ansiosamente, adormece de cansaço, o Sensei coloca o presente silenciosamente."
503073630 = "Assunto Importante, Coisa Preciosa"
675453541 = "Hanae vai ao shopping com o Sensei para comprar presentes para distribuir. No entanto, todos os presentes que ela escolhe são artigos de saúde, e isso acaba gerando uma briga com os delinquentes do Mercado Negro. Indignada com a tirania deles, Hanae decide agir para melhorá-los."
3867179911 = "Fim de Ano Tranquilo"
1185714622 = "Na cidade animada pelas festas de fim de ano, o Sensei decide provar várias comidas com Haruna. No entanto, nada a satisfaz -- quando o Sensei teme que ela vá explodir uma barraca, Haruna sorri, dizendo que 'embora não seja gastronomia, conseguiu se divertir bastante', e os dois passam um momento tranquilo."
1122975317 = "O Resultado Está no Processo"
1611910214 = "Dizendo que, para buscar a gastronomia, é preciso conhecer o processo, Haruna chama o Sensei ao mercado. Ela participa de um leilão e consegue um pargo, que pede a um chef conhecido para preparar deliciosamente. Enquanto desfrutam de uma refeição tranquila, Haruna lamenta que 'o caminho para buscar a gastronomia suprema não é fácil'."
1306876513 = "Os Requisitos para Satisfazer a Gastronomia: Culinária, Estação……"
2915697252 = "Com o objetivo de desfrutar da melhor gastronomia junto com o Sensei, Haruna o chama. Ela diz que, para a melhor gastronomia, a culinária, a estação e a companhia são importantes, e os dois passam um momento agradável."
799816248 = "Ano Novo com Novas Vestes!"
3455411055 = "Chamado por Junko, o Sensei visita seu local de trabalho, 'L'oiseau Bleu'. Lá está Junko, vestindo um quimono. Ela diz timidamente que queria que o Sensei visse seu quimono alugado. Então, para alegrá-la, o Sensei faz um pedido enorme e, juntos, comem calmamente o que não conseguem terminar."
934247381 = "Quero Comer Vários Pratos!"
527805565 = "Como agradecimento pelo grande pedido da última vez, Junko convida o Sensei para o festival. Eles comem várias comidas de barraca e se divertem, mas -- comendo demais, Junko acaba voltando para casa com o rosto pálido."
4015908374 = "Me Dê Calor"
1228012568 = "No último dia do feriado prolongado, o Sensei decide sair com Junko, que lamenta o fim das férias. Passeando por vários lugares, no final, eles dividem um dango e riem."
2198382498 = "O Desejo de Fuuka"
41944175 = "Para ver Fuuka, que continua se esforçando no fim de ano, o Sensei visita o refeitório estudantil de Gehenna. Com Fuuka, que acabou de terminar o trabalho, eles saem para comer nas barracas da cidade. Enquanto aproveitam várias comidas, Fuuka comenta que gostaria de ter um dia tranquilo no próximo ano."
735524095 = "Um Pouco Atrasados"
751489679 = "Convidado por Fuuka, o Sensei visita o refeitório estudantil. Lá está Fuuka, que se trocou e vestiu um quimono. Como agradecimento pelos favores até agora, ela serve ao Sensei soba de fim de ano feito em casa, e eles trocam cumprimentos de Ano Novo."
3464653551 = "O Último Passeio do Feriado"
1290967402 = "Quando o feriado está quase acabando, Fuuka diz que dedicará o resto dos dias às atividades do Departamento de Refeições. Sabendo que este é efetivamente o último dia de folga de Fuuka, o Sensei a leva para um encontro."
2747740649 = "O Espírito do Socorro"
4046348442 = "O Sensei decide começar uma ronda de socorro com Mine. Embora com métodos um pouco forçados, ela se dedica a ajudar. Quando o dia termina, impressionada com a sintonia com o Sensei, Mine lhe oferece o cargo de conselheiro."
155199846 = "Hobby e Utilidade"
1992573947 = "Mine convida o Sensei para mostrar seus suprimentos médicos em casa. Embora explique vários itens, o Sensei parece não entender bem. Pensando que talvez entenda se mostrar na prática, Mine aponta uma lâmina para si mesma -- mas é detida pelo Sensei às pressas."
4103404645 = "Chá da Tarde"
381585519 = "Mine convida o Sensei para um chá da tarde. Enquanto revela suas preocupações, a conversa toma um rumo cada vez mais sinistro. Percebendo que o Sensei está frequentemente envolvido nos vários incidentes de Kivotos, Mine pensa em resolver isso restringindo a liberdade do Sensei e tenta colocá-lo em prática."
1869515898 = "A Forma do 'Socorro'"
1542046764 = "Enquanto o Sensei e Mine trabalham na Schale, recebem uma ligação de socorro de um cidadão no 'Mar de Árvores de Kivotos'. Correm para lá, mas não encontram ninguém. A noite cai, e os dois descansam um pouco."
3733720402 = "De Volta ao Cotidiano Pacífico"
4075198640 = "O Sensei decide sair para fazer compras com Mika, que retornou à vida escolar. Ela precisa comprar itens essenciais como livros didáticos, maiô designado e uniforme de ginástica. No entanto, o cartão de Mika não funciona, e o Sensei paga para ela."
1824494665 = "Atividade Voluntária"
3962654178 = "Como parte das atividades voluntárias, Mika decide arrancar ervas daninhas do campo. O Sensei a ajuda, e eles passam um momento tranquilo juntos."
2847450936 = "A Princesa do Sótão"
2413528587 = "Chamado por Mika, o Sensei vai ao dormitório. Embora ela diga que é apenas para um chá em seu quarto, no momento em que ele entra, começa a chamada de presença -- Incapaz de voltar, o Sensei passa um tempo inesquecível no quarto de Mika."
1481077183 = "Cicatrizes"
120262361 = "Preocupado com a notícia de que Mika se envolveu em uma briga com outros alunos, o Sensei corre para Trinity e encontra Mika segurando um maiô rasgado devido ao bullying. Consolando Mika, que está chorando, o Sensei propõe dar uma aula de natação só para ela."
2390792070 = "Os Restos do Gorigori-kun"
238376327 = "O Sensei visita Megu e a encontra olhando para um sorvete 'Gorigori-kun' derretido. Ela diz que, como o Gorigori-kun é duro demais, está tentando derretê-lo com sua arma para deixá-lo na temperatura certa. O Sensei a aconselha a esperar em vez de usar a arma."
997833605 = "A Garota Que Não Consegue 'Esperar'"
3179826887 = "Megu, que estava prestes a desenvolver fontes termais como sempre, é interrompida durante o trabalho. Por ordem da chefe, eles se dispersam e se escondem, mas Megu fica frustrada por não saber quanto tempo deve 'esperar'. O Sensei distrai sua atenção mostrando um kendama."
70172580 = "Deixe com o Departamento de Desenvolvimento de Termas!"
4184469458 = "Um dia, o chuveiro da Schale quebra e só sai água fria. Ouvindo a história de Megu, o Sensei recebe uma mensagem misteriosa e vai ao sopé de uma montanha. Lá, Megu estava cavando uma fonte termal para o Sensei."
3903491499 = "A Conexão Entre Termas e Lámen"
297876452 = "Tarde da noite, Megu prepara lámen enquanto conversa com o Sensei sobre várias coisas. Depois de dividirem o lámen pronto, Megu sai para desenvolver fontes termais como sempre."
1551137325 = "O Boato Sobre a Chefe"
3048088134 = "Kanna visita a Schale para o plantão. O Sensei, tenso com a presença de Kanna, famosa por ser rigorosa na Escola de Polícia Valkyrie, acaba cometendo vários erros devido ao nervosismo."
3236770699 = "O Clássico da Vigília"
1619463056 = "O Sensei vai levar suprimentos para apoiar Kanna, que está em uma investigação secreta. Como ela não comia há muito tempo, ele leva várias comidas. Com isso, descobrem uma barraca suspeita e conseguem prender o criminoso que perseguiam."
1028219097 = "Um Descanso a Sós"
1512296132 = "Após prender o contrabandista, Kanna recusa educadamente o convite para comer dos alunos do Departamento de Segurança Pública. No final da tarde, o Sensei, que parou em uma barraca móvel para comer à noite durante o trabalho, encontra Kanna sozinha, saboreando a comida."
692249735 = "Outro Caminho"
4271209454 = "Kanna chama o Sensei, quebrando o silêncio de uma tarde comum. Ele descobre que ela está com dificuldades para acalmar uma criança perdida e decide ajudar. Após um dia agitado, na encruzilhada do caminho de volta, Kanna confessa ao Sensei um sentimento que nunca havia compartilhado."
3258439759 = "Pessoa Facilmente Mal-Interpretada"
3227620313 = "Intrigado com as mensagens enigmáticas de Sakurako no MomoTalk, o Sensei decide visitá-la. Conversando com ela, ele entende que sua natureza de falar de forma enigmática a faz ser facilmente mal-interpretada."
2902921354 = "'Moda'"
4239335081 = "O Sensei encontra Sakurako preocupada em frente a uma loja de acessórios na galeria comercial. Nesse momento, a porta da loja se abre e o dono a leva para dentro. O Sensei, confuso, a segue e observa suas compras."
2853082550 = "Noite Secreta"
1413282267 = "Com uma mensagem de Sakurako, o Sensei caminha pelo corredor interno da catedral. Lá, ela lhe revela um 'certo' segredo --?"
2382324779 = "Hobby Inesperado"
4092134933 = "Sakurako decide consultar o Sensei. É sobre ela não ter um hobby. O Sensei diz que isso nasce do contato com várias coisas, e eles passam um momento tranquilo."
399214349 = "Momento de Explicação"
3113818934 = "Recebendo um SOS de Sakurako, o Sensei vai até ela. No entanto, o conteúdo era fazer um discurso para as irmãs de que ela não é uma pessoa suspeita. Os mal-entendidos sobre Sakurako só aumentam."
2003923680 = "A Rotina Diária de Toki"
1607965188 = "Toki, que perdeu sua mestra, está preocupada com o que fazer a partir de agora. Chega à conclusão de que o Sensei seria um bom novo mestre…… e assim começam novos dias com Toki seguindo-o como empregada exclusiva."
4288888721 = "Vida Escolar Normal"
322319486 = "Toki está em risco de repetir o ano por falta de frequência. No entanto, para ela, que nunca teve uma 'vida escolar normal', não sabe como agir como os outros alunos. O Sensei a apoia para que ela possa ter uma 'vida escolar normal'."
1375907566 = "Preocupação com Hobbies"
3410652719 = "Toki, que até agora vivia apenas para cumprir missões como empregada, diz que não tem hobbies e não entende isso. O Sensei a leva para a cidade para um encontro……"
284991053 = "A Empregada das Empregadas"
3181693318 = "Ao receber uma mensagem de Toki de que chegará atrasada à Schale por um compromisso, o Sensei acha estranho para ela, que sempre cumpre os horários, e vai visitá-la. Lá está Toki, verificando e fazendo a manutenção de seus equipamentos……"
62419462 = "Prova de Conexão"
2598613321 = "Toki, que entrou em contato por comunicação de repente, chega à Schale dizendo coisas que levam a mal-entendidos intencionais e entrega ao Sensei um headset igual ao seu. Confuso com o pedido dela para usá-lo e ficar conectado 24 horas, o Sensei guarda discretamente o headset na gaveta."
3221453657 = "Hora do Chá da Tarde"
1575926616 = "O Sensei é convidado para o chá da tarde de Nagisa. Vendo o Sensei suado por ter corrido, Nagisa se prepara para fazer um chá gelado, mas o Sensei recusa, dizendo que comprou um 'chá preto em garrafa PET'. Nagisa, curiosa sobre a marca desconhecida, experimenta, mas parece não agradar ao seu paladar."
3617335172 = "A Desordem das Palavras É a Desordem do Coração"
3261002897 = "Nagisa comenta que ultimamente a linguagem dos alunos de Trinity está se deteriorando. Orgulhosa de seu próprio cuidado com a linguagem polida, ela afirma que nunca se descontrolaria, independentemente da situação…… mas logo depois, ao receber relatos de vários problemas de comportamento dos alunos, ela acaba se descontrolando."
578805062 = "Chá Preto e Corpo"
2073459542 = "Nagisa organiza um chá da tarde para receber o Sensei com novas folhas de chá. No entanto, as folhas que ela preparou não eram de kombucha, mas sim de chá de algas. Para não decepcionar o Sensei, Nagisa decide servir o chá de algas……"
1365827293 = "Se Não Há Pão"
1448253096 = "O Sensei visita a galeria comercial para comprar pão. No entanto, não há nenhum pão na loja…… Vendo isso, Nagisa propõe dividir o bolo personalizado que encomendou em outra loja."
2105366932 = "Moradora da Sala de Reflexão"
214951891 = "O Sensei, que visita Millennium, vai ver Koyuki na sala de reflexão. Pensando que ela estaria vivendo de forma apertada, ele a encontra decorando a sala a seu gosto e relaxando confortavelmente."
2113534752 = "Caixa de Pandora (1)"
4241439597 = "Koyuki, que veio para o plantão na Schale, reclama que até agora só fazia trabalho de desbloquear senhas. Quando pergunta se deve desbloquear as senhas da Schale, o Sensei pede que, pelo contrário, ela não desbloqueie as senhas. Ouvindo isso, Koyuki sorri maliciosamente, dizendo que teve uma boa ideia, e volta para Millennium."
4083323257 = "Caixa de Pandora (2)"
2414226696 = "Koyuki se infiltra na Schale e tenta tocar nos segredos do local, mas é encontrada pelo Sensei. Fugindo para a área residencial da Schale, ela encontra um 'livro misterioso'."
2351755493 = "Atos do Dia a Dia"
2882100059 = "O Sensei encontra Koyuki por acaso em um fliperama. Quando pergunta se ela gosta de jogos, ela responde que gosta de coisas que envolvem sorte, onde sua habilidade não interfere. Dizendo que, se seus atos diários são bons, a sorte também será, os dois se divertem jogando no fliperama."
1850258284 = "Prova de Sorte"
3499702459 = "O Sensei encontra Koyuki agachada no mato. Ela está procurando trevos de quatro folhas na esperança de ter mais sorte. Assim, o Sensei e Koyuki passam um tempo agradável procurando trevos de quatro folhas."
505934790 = "Eu Vou Revidar!"
619630983 = "Chamado por Koyuki, o Sensei visita a sala de reflexão. O tesouro que ela perdeu era uma 'medalha de vitória' que ela fez para trapacear no fliperama no passado. O Sensei já a havia encontrado e a devolve. Mesmo quando advertida de que é crime, Koyuki não mostra arrependimento, e o Sensei a inscreve sem hesitar no curso de boas maneiras públicas."
168056968 = "Mal-Entendido que se Aprofunda"
2953254523 = "Kayoko, que veio à loja para comprar um quimono novo, fica confusa com a conversa desconexa com o vendedor. Graças à intervenção do Sensei, que passava por ali, ela consegue comprar o quimono que queria."
3556812176 = "O Som do Sino de Ano Novo"
1261302160 = "Na véspera de Ano Novo, o Sensei e Kayoko vêm ouvir o sino de ano novo. No entanto, ele está em reparo e não podem ouvi-lo…… Na volta, eles recebem o ano novo ouvindo o som da cancela do primeiro trem."
1594158572 = "Gatos, Kayoko e Amazake"
585940394 = "Kayoko e o Sensei, que vieram comprar amuletos, decidem beber amazake para se aquecer do frio. Enquanto comentam que todos os anos alguns alunos ficam bêbados com o pouco álcool do amazake, Kayoko, atraída pelo miado de um gato, se ausenta um pouco. Preocupado com a demora, o Sensei vai procurá-la e encontra Kayoko brincando fofamente enquanto imita o miado de um gato. Constrangida por ter sido vista, Kayoko desconversa, culpando o amazake."
1021018790 = "Método para Aliviar o Estresse"
1831690994 = "No início do ano, o Sensei corre atendendo às consultas de vários alunos. Kayoko, para ajudá-lo a relaxar, o leva a um show de instrumentos japoneses. Esperando algo tranquilo como gagaku, o Sensei é surpreendido pelo som do rock metal japonês."
1676776936 = "Fazendo Kadomatsu"
2926389252 = "No Ano Novo, o Sensei visita Haruka. Ela está procurando bambu para fazer um kadomatsu caseiro para decorar o escritório. Procurando com o Sensei, eles não encontram facilmente, e o Sensei a encoraja, dizendo que o importante é o sentimento. Animada, Haruka termina seu kadomatsu e o leva para o escritório com o Sensei."
4150553585 = "Senso de Estação"
882190145 = "O Sensei, preocupado com Haruka usando um quimono curto no inverno, a convida para comprar um quimono longo, mas ela recusa, sem querer que ele gaste com ela. Então, o Sensei lhe compra doces e aquecedores de mão."
1010615852 = "Vento Frio, Coração Quente"
902806983 = "Em um dia frio, com a temperatura caindo bruscamente, o Sensei, preocupado com Haruka e suas ervas daninhas, vai visitá-la. Com Haruka, que acabou de cuidar das ervas, eles vão tomar uma sopa quente."
1362773471 = "A Responsável pela Publicidade de Hyakkiyako, Kaho"
3015917284 = "Kaho contata o Sensei de repente sobre 'aquele assunto'. Confuso, o Sensei ouve Kaho começar uma apresentação sobre a indústria do turismo de Hyakkiyako. Quando a apresentação termina e ele pergunta novamente sobre 'aquele assunto', Kaho diz que havia enviado um e-mail, mas ele não chegou…… Percebendo seu próprio deslize, ela é apoiada pelo Sensei e refaz a apresentação."
813536488 = "Kaho, Mais Chefe do Que a Chefe"
1268253443 = "Para se redimir da última vez, Kaho se oferece para escoltar o Sensei. Enquanto ela está animada para guiá-lo pela Academia Unificada Hyakkiyako, várias consultas dos alunos surgem diante dela. Incapaz de fazer uma boa escolta, ela é consolada pelo Sensei."
3589056262 = "A Escolta Perfeita de Kaho"
1155603011 = "Kaho convida o Sensei novamente a Hyakkiyako para se vingar da última vez. Desta vez, sem interrupções, ela apresenta feliz os pontos turísticos e os encantos de Hyakkiyako com toda a energia, e o Sensei também aproveita o encontro com Kaho."
1779236823 = "A Estratégia de Vendas Planejada de Kaho"
44237873 = "O Sensei, que recebeu o contato de Kaho, visita a sala de descanso do Departamento Onmyou e a encontra organizando itens de publicidade especialmente encomendados."
2501910877 = "Não Esquecer o Propósito Original"
1244005463 = "O Sensei e Kaho limpam a sala de descanso do Departamento Onmyou. Naquele momento, Kaho limpa cuidadosamente uma carta de agradecimento que recebeu de um aluno de Hyakkiyako e conta as recordações ligadas a ela."
4137176117 = "Grande Aperto da Empregada!"
2046418808 = "Ao receber um SOS de Aris, o Sensei a encontra vestindo um uniforme de empregada. Todas as suas roupas foram lavadas, e esta é a única que restou. No entanto, Aris ainda tem um pouco de resistência ao uniforme. O Sensei sugere que ela 'mude de classe para empregada'. Tendo conseguido a mudança, Aris se dedica à limpeza e gradualmente perde a aversão ao uniforme."
186589621 = "Grande Operação de Estudo de Empregada!"
25252799 = "Decidida a aumentar seu nível de empregada, Aris decide pesquisar na internet sobre empregadas. Adquirindo vários conhecimentos, ela sorri, dizendo que conseguirá subir de nível."
3585111616 = "Prontos para a Surtida!"
3930937110 = "Aris diz ter um assunto importante, e o Sensei visita Millennium. Com os preparativos para a aventura prontos, Aris declara que, com nível de empregada suficiente, almejará ser a mais forte empregada heroína."
3951701776 = "Equipamento da Empregada Heroína"
224308736 = "Como empregada heroína, Aris decide limpar a guilda do Sensei, ou seja, a Schale. No entanto, sua tiara suja durante a limpeza. Lavando a tiara junto com as outras roupas, Aris passa um momento agradável com o Sensei."
3957314179 = "A Razão Vem Depois"
3997203066 = "O Sensei que acabaria se infiltrando em uma festa em um navio de cruzeiro de luxo junto com Toki. Enquanto Toki estava fantasiada de coelhinha, a atenção dos presentes se voltou para ela – e o Sensei, seu acompanhante, acabou sendo alvo de olhares frios. No entanto, Toki, indiferente, cumpria sua missão com frieza e eficiência."
2330192846 = "O boato da coelhinha"
2392731156 = "Como Toki, vestida de coelhinha, passava a maior parte do tempo no Schale, surgiu o boato de que o Sensei do Schale era um pervertido que obrigava as alunas a usarem roupas de coelhinha. O Sensei tentou conversar com Toki sobre isso, mas ela, citando o ditado 'fofoca tem prazo de validade', simplesmente ignorou… e mais um dia chegou ao fim."
2672746772 = "Um lugar para o coração descansar"
2814303571 = "Embora Toki tenha enviado uma mensagem sobre a missão, a comunicação estava cheia de falhas e ela não respondia. Por fim, só restaram mensagens na caixa postal. Preocupado com a segurança de Toki, o Sensei esperou por ela até o amanhecer, mas acabou cochilando sem perceber – quando acordou, Toki estava ali, dormindo na mesma cama que ele."
1746842993 = "Material de referência…?"
2920706888 = "Yuzu decidiu vestir um uniforme de empregada por conta própria para usar como referência para um novo jogo. No entanto, devido à sua insegurança crônica, o Sensei a encontrou encolhida dentro de um armário. Quando ele foi encorajá-la após ouvir sua história, uma aluna de Millennium que viera visitar Yuzu acabou vendo aquela cena – e Yuzu mais uma vez se tornou a 'moradora do armário'."
831733757 = "Um novo emprego de meio período"
868737743 = "Para conseguir fundos para desenvolver um novo jogo, Yuzu começou a trabalhar meio período. O Sensei recomendou um café que ele costumava frequentar – mas era uma cafeteria de empregadas. Diante de Yuzu, que lamentava a dificuldade de atender clientes em uma maid café, o Sensei se ofereceu para treinar o atendimento com ela."
2231433090 = "A visita indesejada dentro do armário"
2256848622 = "O Sensei foi ao café onde Yuzu trabalhava para ver como ela estava se saindo. No entanto, talvez por estar tão ciente da presença do Sensei, Yuzu cometeu erros que normalmente não cometia. Depois, quando ele foi procurá-la, pois ela não voltava do intervalo, a encontrou cercada por gatos – e, após desabafar suas preocupações com o Sensei, Yuzu retornou ao trabalho com um sorriso radiante e alcançou um novo recorde de clientes frequentes."
1898965458 = "A faxina do Clube de Desenvolvimento de Jogos"
2028068753 = "O Sensei foi à sala do Clube de Desenvolvimento de Jogos para ajudar Yuzu com a faxina. No entanto, a 'faxina' de que Yuzu falava não era a limpeza da sala, mas sim a otimização do computador. O Sensei propôs fazer uma faxina de verdade e, então, limpou a sala junto com Yuzu."
1247993165 = "Bom dia, Reisa"
2205362417 = "O Sensei encontrou Reisa por acaso em um ponto de ônibus. Reisa decidiu consultar o Sensei sobre as trocas de mensagens no Momotalk com seus amigos da sala. Ao receber o conselho de que ser sincera consigo mesma era o melhor, Reisa voltou para casa com passos leves."
3620040079 = "Acredite, Reisa"
1349760893 = "Reisa veio consultar o Sensei se não haveria uma maneira eficaz de recuperar a fadiga. Aparentemente, ela aceitava todos os pedidos e convites para sair, pois achava que recusar afetaria seus relacionamentos futuros. O Sensei explicou que, quando Reisa se esforçava demais, as pessoas ao seu redor se preocupavam e, então, insistiu para que ela descansasse."
324482861 = "Obrigada, Reisa"
1014758945 = "Reisa, entusiasmada, disse que iria acompanhar o Sensei como forma de agradecimento por tudo até então. Passearam por cafés, fliperamas e parques de diversões, mas Reisa ficou desanimada ao descobrir que o Sensei já havia visitado aqueles lugares antes. O Sensei então lhe disse que era a primeira vez que ia com ela e que aquele dia havia sido muito especial. Ao ouvir isso, ela sorriu radiante."
3804324515 = "Boa noite, Reisa"
2635556863 = "O Sensei caminhava pela cidade com Reisa, que fazia patrulhas noturnas, e ouviu sobre seus sentimentos como membro da vigilante voluntária. Enquanto contemplavam o nascer do sol, Reisa sorriu alegremente, dizendo que era a primeira vez que via o amanhecer a dois com alguém. E, assim, carregando Reisa, cujos passos estavam vacilantes de sono, a patrulha da madrugada chegou ao fim."
1171878055 = "Coma bastante!"
257339176 = "Rumi visitou o Schale para conversar com o Sensei sobre algo e sentiu-se alarmada com o estilo de vida dele, que trabalhava sem nem mesmo almoçar. Determinada a mudar essa situação, ela preparou uma refeição usando os ingredientes disponíveis no Schale."
168583006 = "Primeiro, prove!"
4087665218 = "O Sensei, a pedido de Rumi para provar os pratos que estavam sendo testados na Sociedade Comercial Genbu, comeu as comidas que iam saindo e deu seu parecer. Comovido com o esforço meticuloso de Rumi, que sempre lhe servia pratos deliciosos, a sessão de degustação continuou mesmo depois de ele estar de barriga cheia."
6308616 = "Os problemas do atendimento ao cliente"
4152447857 = "O Sensei, que havia passado na Sociedade Comercial Genbu após terminar seu trabalho em Shanhaijing, testemunhou Rumi lidando com um cliente reclamão. Sentindo algo estranho no cliente, o Sensei o seguiu discretamente… e descobriu que ele era um criminoso reincidente por calote alimentar registrado nos arquivos da Valkyrie. Então Rumi apareceu e aplicou ao reclamante o martelo da justiça."
7640267 = "Não estou nem aí, sabe?"
2967789925 = "O Sensei, tendo recebido a notícia de que a Sociedade Comercial Genbu iria cozinhar uma grande quantidade de gyoza no vapor naquele dia, foi até Rumi para observar o processo. A cozinha havia se tornado uma sauna cheia de vapor, e o Sensei acabou testemunhando um lado inesperado de Rumi."
3324623418 = "Primeira impressão"
361199515 = "Mina, muito animada para seu primeiro plantão no Schale, acabou se atrasando por pensar demais em como fazer sua primeira aparição na porta. Recomposta, ela tentou começar o plantão, mas então começou a discutir seriamente com o Sensei sobre como deveriam se chamar, já que era seu primeiro dia."
855234387 = "Prática com flauta doce"
2959531408 = "O Sensei, que iria realizar uma operação de manutenção da ordem no Portão Xuanlong junto com Mina, ficou surpreso com a chegada repentina de Mina tocando flauta doce. Segundo ela, ela se sentira profundamente comovida com uma cena de um filme que vira, em que um colega tocava clarinete ao morrer, e queria imitá-lo. Assim, a curiosa performance de flauta doce de Mina acabou virando lenda em Shanhaijing."
1904261494 = "A cor do céu chuvoso"
2823268309 = "O Sensei, após terminar seu trabalho em Shanhaijing, foi surpreendido por uma chuva de verão. Mina apareceu com um guarda-chuva e, com um sorriso suave, disse que adorava a paisagem em dias de chuva."
2904966419 = "Mesmo com o passar do tempo"
3295408939 = "O Sensei foi com Mina visitar as crianças do Jardim Meihua. Ao contrário de seu comportamento habitual no Portão Xuanlong, mais 'noir', Mina cuidava bem das crianças e ria alegremente, revelando um novo lado que o Sensei nunca tinha visto."
244539017 = "Como uma construção é erguida"
267837178 = "Após uma noite de trabalho exaustiva, o Sensei se preparava para pegar o primeiro trem e voltar para casa quando, por acaso, acabou levado pela mesma lotação que os membros do Departamento de Obras. Assim, acabou chegando ao canteiro de obras e, junto com Minori, fez uma visita guiada ao local."
725869297 = "Minori Twist"
366290358 = "O Sensei encontrou Minori na biblioteca de Red Winter e ouviu dela, que ria ao dizer que gostava de literatura proletária, sobre os livros de que ela gostava. No entanto, o conteúdo parecia ser um pouco diferente do que ele conhecia."
3493912546 = "O andaime só para nós dois"
2598860157 = "Um dia em que a construção foi cancelada devido a uma onda de frio repentina – o Sensei visitou o Departamento de Obras levando alguns comes e bebes. Minori, que estava sozinha inspecionando a segurança do canteiro, mostrou-lhe, como retribuição, a paisagem especial vista do alto dos andaimes, que apenas o departamento podia apreciar."
3231977855 = "Por que as alunas de Kivotos são infelizes?"
164078001 = "Minori veio até a sala do Schale para seu plantão. Ela apontou que o trabalho de plantão, que lhe permitia ficar com o Sensei, gerava uma desigualdade e falou com entusiasmo sobre soluções para o problema."
432672538 = "SRT, compraremos"
131504888 = "Miyako recebeu um vale-presente de um cliente e decidiu consultar o Sensei sobre o que comprar. Enquanto percorriam uma loja de departamentos e compravam itens de camping, Miyako acabou vendo um certo maiô……"
4182954826 = "SRT, treinaremos"
3400306939 = "O Sensei e Miyako partiram em um navio para o alto-mar a fim de realizar um treinamento de resgate marítimo. Depois de amarrar o Sensei conforme o treinamento, Miyako percebeu que não havia um inimigo simulado e decidiu mudar o conteúdo do treinamento."
2954136082 = "SRT, exploraremos"
1741566074 = "O Sensei foi passear com Miyako até uma ilha deserta, atravessando uma área de maré seca. Enquanto apreciavam calmamente a bela ilha, a maré subiu e eles não puderam mais voltar para terra firme. Passando o tempo na ilha enquanto esperavam a próxima maré baixa, os dois descobriram uma manada de coelhos."
2048487267 = "SRT, relataremos"
2604825862 = "No início da manhã, o Sensei, que estava caminhando à beira-mar, encontrou Miyako andando pela praia para fazer seus exercícios matinais."
3616835660 = "Operação de Abastecimento Subaquático (1)"
3120962973 = "O Sensei, atendendo a um contato de Saki, foi ao píer com seus apetrechos de pesca. Saki, dizendo ter recebido permissão dos moradores locais para coletar frutos do mar, declarou com orgulho que iria buscar frutos do mar caros para o Sensei, que sempre a ajudava. No entanto, irritada por não conseguir pegar nenhum peixe, Saki acabou atirando a esmo nos peixes dentro d'água –"
1056477700 = "Operação de Abastecimento Subaquático (2)"
3726172857 = "O Sensei, novamente atendendo a um contato de Saki, foi ao cais. Saki, animada, disse ter encontrado um bastão explosivo em um depósito da vila e declarou que agora iria capturar os peixes com ele. No entanto, o poder do bastão era mais forte do que ela imaginava, e os peixes que ele atingia se despedaçavam."
2099064502 = "O que se esconde na maré seca"
3715648582 = "O Sensei, atendendo a um contato de Saki, foi desta vez para a área de maré seca. Os dois se divertiram coletando mariscos."
3856082788 = "Mar profundo, respiração rasa"
4086115667 = "O Sensei, que estava passeando pela vila de pescadores, encontrou Saki fazendo limpeza do fundo do mar com equipamento de mergulho. Ao saber que o Sensei nunca havia mergulhado antes, Saki se ofereceu para ensiná-lo –"
1203774988 = "A atiradora do cais"
359062505 = "O Sensei foi ao píer a pedido de Miyu, que queria testar um novo disfarce. Para evitar os olhares ao redor, Miyu se disfarçou de pescadora e se divertiu pescando. Quando o Sensei se maravilhava com o quão naturalmente ela se misturava, algo grande mordeu a vara de pesca de Miyu. Imediatamente, todos os pescadores ao redor voltaram sua atenção para ela, e Miyu riu, sem graça."
1400267850 = "Como deixar uma lembrança"
26270932 = "Miyu estava, como sempre, coletando pedrinhas na praia. Vendo aquela cena, o Sensei decidiu juntar também algumas pedras que ele achava que Miyu pudesse gostar. Quando Miyu viu as pedras escolhidas por ele, sorriu, dizendo que gostou de todas."
1622439539 = "A forma do céu"
1698602601 = "Miyu, olhando para o céu acima da praia, sorriu ao dizer que se sentia mais confiante ao contemplar a bela linha do horizonte, e trocou palavras com o Sensei sobre o céu."
2795360293 = "Confirmando a existência"
3188344150 = "Inspirada por uma revista de moda, Miyu decidiu experimentar uma nova roupa casual. Preocupado com as palavras de Miyu, o Sensei foi à cidade e a encontrou no meio da movimentada rua comercial, usando um maiô."
3972604942 = "Snorkel"
4210963508 = "O Sensei foi às rochas a pedido de Shiroko. Lá estava Shiroko, se preparando para fazer snorkel a fim de coletar alimentos. Segundo ela, era possível encontrar uma 'concha lendária' naquela região. Com o incentivo do Sensei, Shiroko partiu em busca da 'concha lendária'."
4159401028 = "Distribuição de ritmo"
3199776909 = "O Sensei, que saiu para passear com Shiroko, acabou exausto e sentou-se no chão. Ele consolou Shiroko, que se sentiu culpada por ter atrapalhado o Sensei devido ao mau gerenciamento de ritmo, e então os dois ajustaram seus passos um ao outro e continuaram andando."
2195713465 = "Expectativa"
1852257618 = "Quando todos já haviam adormecido, o Sensei viu Shiroko andando do lado de fora do resort e decidiu segui-la. Shiroko disse que se sentia solitária porque o momento divertido estava chegando ao fim, mas o Sensei sorriu e disse que paisagens ainda mais bonitas viriam pela frente."
1618207953 = "Uma roupa que não combina"
2833660799 = "Atendendo a um contato no Momotalk, o Sensei encontrou Ui em um canto da praia. Ui comentou que se sentia desconfortável com os olhares ao redor e por isso viera para a praia. Quando o Sensei disse que outras pessoas também vinham para lugares onde não conheciam ninguém para desabafar, Ui sorriu, virando um pouco o rosto."
351695306 = "Um pequeno café na floresta"
3456535130 = "Atendendo a um contato no Momotalk, o Sensei foi convidado para o esconderijo que Ui havia encontrado na ilha. Atrás de uma caverna, num local afastado, eles tomaram café americano com gelo e passaram um tempo a sós."
2200786931 = "Até a última gota"
2554617240 = "O Sensei, atendendo a um contato de Ui no meio da noite, chegou a uma praia silenciosa. Ui lhe entregou um café americano com gelo, e os dois passearam tranquilamente pela praia noturna."
612488749 = "Coração inquieto"
871353545 = "O Sensei chegou à praia a pedido de Hinata e a encontrou montando uma espreguiçadeira e um guarda-sol. Aparentemente, todas as irmãs da Irmandade lhe disseram para descansar um pouco na ilha. No entanto, Hinata se sentia culpada por apenas descansar, mas o Sensei a acalmou e a fez dormir."
586273995 = "Um caminho onde não há caminho"
1017214242 = "O Sensei avistou Hinata carregando bagagem e se ofereceu para ajudar. Enquanto caminhavam pela floresta, uma grande rocha bloqueava o caminho. Hinata a levantou e a removeu; então, vários outros obstáculos surgiram na frente dos dois, mas todos foram resolvidos pela força dela."
3164602540 = "A confissão a sós"
3934941890 = "Hinata chamou o Sensei porque queria um pedido…… e então, eles decidiram praticar a confissão de arrependimento (confissão) na função de irmã."
1793982090 = "A missão de Koharu"
1618146205 = "O Sensei descansava tranquilamente perto de uma cachoeira. Koharu decidiu vigiá-lo ao seu lado para garantir que ele não fizesse nada estranho……"
585869769 = "O perigo de Koharu"
2170214140 = "Atendendo a um chamado de Koharu, o Sensei foi à praia e a encontrou contemplando o horizonte sobre uma rocha. Com o passar do tempo, Koharu e o Sensei tentaram voltar para a ilha, mas a maré havia subido e o caminho de volta estava alagado. Koharu acabou voltando nas costas do Sensei."
2828338450 = "O céu noturno de Koharu"
2677557683 = "Koharu aproximou-se do Sensei, que descansava na praia. O Sensei disse que estava olhando as estrelas, e Koharu decidiu olhar junto com ele. Depois, o Sensei carregou Koharu, que havia adormecido, de volta ao acampamento."
2930606407 = "Hoje é dia seguro"
3313466648 = "O Sensei, chamado por Hanako para o meio da floresta, encontrou várias frutas por lá. Pela maneira sugestiva de Hanako, ele pensou que ela fosse aprontar algo, mas foi um alívio não ter sido o caso. Segundo ela, não adiantava causar problemas longe dos olhos dos outros. Hanako sorriu, dizendo que queria abrir um pouco seu coração em lugares assim."
1688906964 = "A verdadeira aparência"
30901074 = "O Sensei ouviu uma canção enquanto passeava e encontrou Hanako em frente a uma cachoeira. Hanako convidou o Sensei para entrar na água com ela, pois era refrescante, mas ele recusou. No entanto, ela o chamou para perto e o arrastou para dentro d'água."
3660308927 = "Um lado desajeitado"
1134041130 = "Hanako se aproximou do Sensei, que contemplava o pôr do sol à beira-mar, e disse palavras de gratidão que normalmente não conseguia expressar em voz alta."
3237828853 = "A grande dama japonesa do mar de verão"
3696068603 = "Uma recepção especial da 'grande dama japonesa' Mimori aguardava o Sensei que visitara a praia. Eles passaram o dia apreciando o banho de sol e caminhando pela praia."
2716709284 = "A arte da leitura de mentes no mar de verão"
1386038324 = "Mimori apareceu diante do Sensei recém-acordado e começou a cuidar dele usando sua 'leitura de mentes'. Mimori sorriu para o Sensei, que ainda não havia decidido o que fazer naquele dia, dizendo que já que tinham vindo até o mar, deveriam ir à praia."
502611754 = "As lembranças do mar de verão"
2287028514 = "O Sensei criou várias memórias com Mimori: jogaram vôlei de praia juntos, beberam juntos, e assim por diante. Quando o dia se aproximava do fim, Mimori confessou seu desejo de que aquele tempo durasse para sempre."
3374542908 = "Aquisição de suprimentos"
1098258998 = "O Sensei, ao saber que Mel havia quebrado sua caneta, decidiu comprar uma nova e levá-la a ela. Mel, contente, quis desenhar um retrato do Sensei como agradecimento, mas……"
507087033 = "A angústia da criação (1)"
639372066 = "O Sensei, vendo Mel angustiada por não compreender os sentimentos da heroína do mangá que estava desenhando, sugeriu que talvez entendesse se se colocasse no lugar dela e a levou para passear por pontos de encontro típicos. Mel observou casais em cada local e, inspirada, percebeu que aquilo era um encontro com o Sensei e fugiu em pânico."
279895958 = "A angústia da criação (2)"
750286265 = "Mel decidiu convidar o Sensei para seu território a fim de 'retribuir' o encontro anterior. Enquanto aproveitavam um café temático colaborativo, Mel confessou abertamente seu sonho ao Sensei."
509591439 = "Bem-vindo à Frente de Libertação do Conhecimento!"
1337054964 = "Mel convidou o Sensei para a biblioteca da Frente de Libertação do Conhecimento e mostrou sua sala de trabalho. Ela disse que aquele era um lugar para retornar ao princípio quando estivesse em crise criativa e pediu ao Sensei que fosse seu assistente."
4118174099 = "A jornada em busca do livro"
2690079847 = "Ao saber que a lendária revista doujinshi criada pela Frente de Libertação do Conhecimento estava na Federação Escolar Red Winter, Momiji partiu em uma jornada com o Sensei para encontrá-la."
3986459082 = "A razão para colecionar"
1425412045 = "O Sensei, que estava auxiliando na patrulha do Mercado Negro com alunas da Valkyrie, encontrou Momiji que havia invadido o local sem permissão. Momiji disse que viera ao Mercado Negro para obter livros esgotados, e o Sensei perguntou-lhe a razão de colecionar livros a tal ponto."
1047874892 = "O festival do livro de uma vida"
3177169936 = "O Sensei, chamado por Momiji para o festival do livro da Federação Escolar Red Winter, partiu com ela em busca de tesouros ainda não vistos."
2690106276 = "Envolto por livros"
972013378 = "Ao saber que o Sensei estava trabalhando há muito tempo sem descanso adequado, Momiji fechou temporariamente a biblioteca e o convidou para entrar. Segundo ela, como muitos alunos dormiam na biblioteca, talvez ele pudesse descansar ali…… Momiji preparou um local improvisado para soneca e fez o Sensei descansar."
3995225634 = "Sobre coisas que se esquecem facilmente"
3485332196 = "Ao saber que Momiji havia perdido um objeto, o Sensei a ajudou a procurar na biblioteca de Red Winter. O que encontraram foi uma coleção limitada reimpressa de um mangá. O Sensei descobriu que o mangá agora tinha um preço premium, o que abalou Momiji por um instante. No entanto, como colecionadora, ela jurou guardá-lo com carinho, não importa quão valioso fosse."
2596706043 = "Preparando juntos"
3172089424 = "Na manhã do grande festival esportivo, Kotori entrou em contato com o Sensei para sugerir que fizessem exercícios de aquecimento. Depois de explicar a importância do alongamento, ela se ofereceu para dar o exemplo. No entanto, vendo que Kotori tinha dificuldade para se alongar devido à rigidez do corpo, o Sensei a consolou e os dois fizeram alongamentos juntos."
17391138 = "No final das contas"
4279232490 = "O Sensei, que estava fazendo tarefas administrativas na sala de operações, estava ocupado atendendo alunos que se perdiam ou vinham consultá-lo. Ele pediu a Kotori, que viera ajudar com o trabalho de escritório, que cuidasse de tudo por um momento para que ele pudesse descansar. Quando voltou do intervalo, o Sensei viu a sala de operações vazia, restando apenas Kotori. Diante de Kotori, que parecia constrangida, o Sensei ficou feliz, pois finalmente poderia se concentrar no trabalho."
3384821961 = "Uma coisa é uma coisa, outra coisa é outra"
1026815239 = "Preocupado com as mensagens no Momotalk, que pareciam um tanto sem ânimo, o Sensei foi até a sala de espera onde Kotori estava. Lá, ele a encontrou tonta e cambaleante. O Sensei, em vez de Kotori, que tentava explicar sua tontura mesmo mal conseguindo ficar em pé, explicou a situação e a fez descansar."
4197919104 = "A vontade de não explicar"
1567162534 = "Kotori, imersa na sensação de fim de todas as partidas. O Sensei disse a Kotori, que lamentava que aquele momento passasse, que era exatamente por passar que ele era importante."
3782074268 = "Sensei, vou ajudá-lo"
1692291987 = "Haruna visitou o Sensei, que estava ajudando na Sede Médica Conjunta, e decidiu ajudar no atendimento aos alunos. O Sensei ficou impressionado com Haruna, que, com base em seu conhecimento gastronômico, oferecia as bebidas e comidas apropriadas."
348600508 = "Isto sim é uma nova gastronomia"
1226749390 = "O Sensei foi com Haruna a um estande de culinária molecular. Embora se surpreendesse com as texturas inovadoras, a culinária molecular não era muito popular. Seguindo a sugestão de Haruna de que oferecer algo popular e de fácil compreensão, como algodão-doce, fosse uma boa ideia, o estande se tornou um sucesso estrondoso."
4164938916 = "O caminho da gastronomia está em qualquer lugar"
616408418 = "Haruna declarou que iria participar de várias competições. No final das contas, eram todas competições com tema de comida ou que davam comida como prêmio de participação. Enquanto se dedicava às competições, Haruna também avaliava o sabor das comidas oferecidas e acabou vencendo a corrida de comer doce."
407871367 = "Borboletas emparelhadas"
1501629589 = "Quando Haruna perguntou ao Sensei qual era 'a diferença de sempre', ele ficou trêmulo de pressão. Ele conseguiu perceber que o enfeite de pena era diferente, e Haruna, embora surpresa pela perspicácia do Sensei, ficou contente. Um pouco decepcionada com a falta de percepção do Sensei para coisas mais importantes, ela o acompanhou, entrelaçando os braços enquanto percorriam o local."
393076 = "Tudo em excesso é ruim"
1711403022 = "Ichika foi designada para ajudar o Sensei, que tinha negócios em Trinity. No caminho, eles testemunharam uma briga. Quando o Sensei perguntou se não precisavam intervir, Ichika respondeu 'Tudo bem, não é um problema tão grande', contatou outros membros e deixou o local. Depois de resolver seus negócios, o Sensei acompanhou Ichika para mediar a briga que haviam visto."
517994058 = "Não é grande coisa"
3421689892 = "O Sensei avistou Ichika olhando para um violão em uma loja de instrumentos musicais de um shopping. Segundo ela, viu alguém tocando na rua e sentiu vontade de tentar. Ichika, que estava prestes a desistir, dizendo que estava apenas procurando algo para se dedicar, não necessariamente um violão, ouviu o Sensei dizer que queria ouvi-la tocar."
2193199583 = "Você não poderia prometer?"
1203125809 = "O Sensei avistou Ichika parada em frente a uma enorme pilha de caixas de papelão. Ichika dizia que, como tentava várias coisas em busca de algo para se dedicar, mas logo desistia, estava se desfazendo das coisas desnecessárias em um aplicativo de mercado de pulgas. Validando esse lado dela, o Sensei a levou de volta ao escritório."
4264961292 = "Por enquanto"
679592225 = "O Sensei chegou ao local de encontro com Ichika e a viu subindo em uma árvore para ajudar uma criança cujo balão havia ficado preso nos galhos. O Sensei elogiou Ichika por naturalmente agir em prol dos outros, mas ela disse que isso era apenas natural e que seu verdadeiro problema era não conseguir se dedicar a uma única coisa. O Sensei então lhe disse que não precisava procurar forçosamente e que era importante também aproveitar as coisas com leveza."
502045279 = "Kurumi Kinu"
950569097 = "O Sensei visitou o esconderijo de Kasumi e soube que ela estava planejando sua próxima detonação. Ele a convenceu a escolher um local com o mínimo de pessoas possível…… e o próximo local de detonação acabou sendo um terreno baldio na montanha."
1233217562 = "Eu adoro explodir coisas"
1087254379 = "O Sensei foi ao canteiro de obras a pedido de Kasumi. Kasumi declarou que simplesmente gostava de explodir coisas, independentemente de o trabalho ser bem-sucedido ou não. E sorriu, dizendo que também estava de olho no Schale como ponto de detonação, então gostaria que ele levasse a sério a escolha do local. Assim, os dois passaram a noite toda discutindo o próximo ponto de detonação."
3742902787 = "Uma figura intelectual"
2660660211 = "O Sensei convidou Kasumi para o Schale. Kasumi trouxe vários livros sobre engenharia civil, geologia e arquitetura e começou a estudar…… Diante disso, o Sensei disse: 'Se quiser, pode vir sempre que quiser', e os dois passaram o tempo conversando amenidades."
973472567 = "Pedido de resgate das montanhas"
873006730 = "O Sensei foi para as montanhas atender a um pedido de socorro de Kasumi. Ela disse que, enquanto procurava um ponto para detonar, escorregou e quebrou sua sandália. O Sensei, em vez de entregar a sandália, carregou Kasumi, que estava ferida, e desceu a montanha."
660551613 = "Luxuosamente"
3056310614 = "O Sensei visitou Red Winter e decidiu tomar um banho na fonte termal especial modificada por Shigure. No entanto, com o passar do tempo, ele sentiu uma sensação de calor na pele e perguntou se ela havia colocado algo na água. Shigure, contente, revelou o segredo da fonte termal especial."
3965412169 = "Às vezes, com seriedade"
3457735752 = "Shigure foi com o Sensei a uma casa de banhos e o dono lhe pediu que ensinasse a receita da bebida de leite com frutas que era servida na Estação Termal nº 227. Shigure, em troca da receita, negociou que os alunos do prédio antigo pudessem usar a casa de banhos."
3617991952 = "Afetuosamente"
1568896138 = "Shigure decidiu fazer bebidas para oferecer aos clientes da casa de banhos. O Sensei ficou observando-a…… mas, nesse meio tempo, perdeu o último trem. Sem como voltar, o Sensei acabou passando a noite em uma pousada com Shigure."
4190060998 = "De repente"
1068432655 = "O Sensei tomava banho na nova fonte termal que Shigure havia preparado para ele. Naquela hora, ele sentiu algo estranho na sombra de alguém que entrou depois, que parecia ser Shigure……"
3198653942 = "Eletrizante"
3736796703 = "Misaka Mikoto reclamava que, desde que viera para Kivotos, não conseguia usar bem suas habilidades. O Sensei sugeriu: 'Talvez você consiga fazer coisas que não podia por causa de suas habilidades'. Assim, Misaka Mikoto decidiu tentar se aproximar de um gato de rua, do qual antes não podia chegar perto por causa das ondas eletromagnéticas."
3828858953 = "Aura inata"
4050729238 = "Misaka Mikoto, encurralada por delinquentes, decidiu pedir ajuda ao Sensei. Segundo ela, eles a importunavam chamando-a carinhosamente de 'onee-sama'. O Sensei os alertou para não ficarem seguindo-a tão persistentemente."
735396316 = "Semelhantes se atraem"
2449311845 = "Misaka Mikoto inclinava a cabeça diante de um pelúcia do Peroro. Como o visual era muito peculiar, ele disse que as opiniões se dividiam. Ela entendeu que era algo como o Gekota de que gostava em seu mundo original e, ao contrário, começou a achar o pelúcia um pouco fofo. Então o Sensei lhe deu de presente o pelúcia do Peroro."
3584522966 = "Máquina de venda automática"
4025701392 = "O Sensei viu Misaka Mikoto chutando uma máquina de venda automática e a advertiu que não era bom danificar bens públicos. Segundo ela, também em seu mundo original, a máquina costumava engolir seu dinheiro e ela chutava assim. O Sensei então disse que, nesses casos, se fazia assim: entrou em contato com o número na máquina, pediu o reparo e entregou a ela o dinheiro e o refrigerante."
718444544 = "Controle mental"
1123173044 = "O Sensei avistou Shokuhou bebendo suco em um café. Shokuhou disse que hoje era um dia de sorte, e o Sensei respondeu que se sentia da mesma forma. Então Shokuhou sorriu, dizendo que queria 'confirmar' com sua habilidade se ele realmente pensava assim. O Sensei, por sua vez, disse que preferia que ela o controlasse com sua habilidade, e ela riu sem graça."
1711116450 = "Especialista em trabalho intelectual"
716760121 = "O Sensei chamou Shokuhou para o campo, pois ela disse que não conseguia se concentrar muito bem, e sugeriu que fizessem uma corrida leve para mudar de ideia. Durante o exercício, Shokuhou desmaiou e ele a levou correndo para o hospital."
3008897746 = "Atenção aos detalhes"
3840979936 = "Enquanto caminhava pela rua comercial, Shokuhou testemunhou um cliente em grupo atormentando um funcionário de meio período. Quando o Sensei tentou intervir, Shokuhou foi mais rápida e apertou um botão do controle remoto que carregava, resolvendo a situação."
1142774852 = "Obsessão por culinária"
2658033607 = "Shokuhou disse que só comia alimentos orgânicos e que se dedicava a isso a ponto de ler a mente do chef. O Sensei então a levou a um restaurante que os gourmets de Kivotos recomendavam com certeza."
3833015538 = "Eu sou a lenda urbana"
2064820506 = "Saten ficou impressionada com a paisagem de Kivotos, como se as lendas urbanas tivessem se tornado realidade. O Sensei disse que, da perspectiva dos moradores de Kivotos, Saten é que poderia ser como uma lenda urbana. Ao ouvir isso, Saten ficou chocada, mas depois se animou e disse que iria procurar as lendas urbanas de Kivotos."
752863816 = "Uma coincidência inesperada"
3683657408 = "Saten ficou surpresa ao ver os moradores de Kivotos jogando mahjong: apesar de ser outro mundo, o mahjong existia e as regras eram exatamente as mesmas. Então, ela se juntou aos moradores que estavam sem um jogador e se divertiu jogando mahjong."
3697516015 = "Senso de rebatida"
4003979523 = "Saten foi a um centro de treinamento de rebatidas e encontrou um banco de rebatedor com um aviso suspeito num canto, decidindo usá-lo. Para o Sensei, preocupado, ela propôs: se não acertasse a bola em três tentativas, sairia do banco; se acertasse, ele pagaria uma bebida."
900027051 = "Talento para o esforço"
123698568 = "Saten, que estava praticando tiro, comentou que estava testando se poderia ter talento para isso. Segundo ela, em seu mundo original também havia tentado várias coisas para descobrir seu talento. Ao ouvir isso, o Sensei a encorajou, dizendo que a capacidade de se esforçar era algo admirável."
3866139307 = "É a primeira vez!"
1895217624 = "O Sensei levou Yukari, que não conseguia compreender direito o significado da expressão 'dar um tempo', a um fliperama. Yukari se divertiu com vários jogos, com um sorriso radiante no rosto."
3444356400 = "O sabor dos doces é excelente!"
946448440 = "O Sensei levou Yukari, que quase não conhecia doces salgados, a uma loja de doces. Yukari se divertiu, maravilhada com o sabor dos doces e a cultura diversificada da loja."
1592716139 = "Descanso também é importante!"
3393753597 = "Yukari visitou a sala do Schale para sair com o Sensei. No entanto, começou a chover e o passeio foi cancelado. Para o Sensei, que se desculpou, Yukari sorriu e disse que o tempo passado com ele era um tesouro."
3227087653 = "Ansiosa e animada"
3133093112 = "O Sensei iria com Yukari a um sorteio na rua comercial. Ao chegar ao ponto de encontro, soube que Yukari já estava esperando há uma hora. Quando perguntou por que ela havia chegado tão cedo, Yukari riu sem graça, dizendo que, ao pensar no que aprenderiam e como seria o dia, não conseguia ficar parada e acabou chegando mais cedo."
1618618962 = "O mestre da juventude"
2730442199 = "O Sensei visitou Hagi Tsukiyono a pedido de Renge. Renge disse que queria fazer 'atividades juvenis' e pediu conselhos sobre atividades típicas da juventude. Após trocarem várias ideias, o Sensei e Renge se tornaram 'mestre e discípulo juvenis'."
2356886607 = "Clássico juvenil: aluna transferida"
3406357501 = "Renge decidiu fazer uma atividade de 'aluna transferida' com o Sensei como parte de suas 'atividades juvenis'. No entanto, as coisas não saíram como planejado…… Quando Renge estava prestes a desanimar, o Sensei pediu que ela apresentasse os arredores como se ele fosse uma aluna transferida."
1544493195 = "Clássico juvenil: amigos de infância"
3623899194 = "Certa manhã, Renge atacou o Sensei. Aparentemente, ela queria fazer uma atividade de 'amigos de infância' como parte de suas 'atividades juvenis'. Após a atividade, quando ela estava prestes a encerrá-la satisfeita, o Sensei comentou que aquele dia havia sido como um encontro, e Renge ficou confusa."
3348684246 = "Agradecendo à juventude"
1912112273 = "O Sensei, que estava resolvendo trabalho acumulado a ponto de esquecer de comer, foi forçado a participar das 'atividades juvenis' de Renge. Com isso, ele desmaiou de cansaço. Arrependida, Renge lhe entregou um bento feito por ela mesma como forma de agradecimento por ele ter se esforçado tanto por ela."
645991912 = "A fita branca da juventude"
1111293954 = "Renge, ao receber de presente uma fita branca que o protagonista de um romance juvenil usava, ficou perturbada e fugiu apressada do local. Na verdade, aquela fita era dada pelo protagonista a sua amada no romance. O Sensei então propôs como atividade juvenil colocar a fita nela, e Renge, envergonhada, aceitou."
4231253403 = "O gato da sala de mediação"
3314480634 = "O Sensei foi a Hagi Tsukiyono a pedido de Kikyou e notou que o prédio estava envelhecendo. Kikyou disse que não havia problema, mas o Sensei, preocupado com a segurança, decidiu fazer os reparos ele mesmo com suas ferramentas – e Kikyou, que inicialmente dissera que não ajudaria, acabou ajudando. Depois, como agradecimento, Kikyou convidou o Sensei para jantar."
2471480039 = "A importância do descanso"
3763484608 = "Kikyou visitou o Schale para agradecer o conserto do prédio de Hagi Tsukiyono. Diante de Kikyou, que disse que faria qualquer coisa para retribuir o favor, o Sensei pediu que ela também descansasse. Confusa, Kikyou decidiu descansar para cumprir sua promessa de fazer qualquer coisa."
3365191938 = "O sentimento que queria esconder"
4099866023 = "O Sensei foi a Hyakkiyako a trabalho do Schale e visitou Hagi Tsukiyono para entregar um presente de um morador que Kikyou havia ajudado. Lá, ele encontrou Kikyou caída. Kikyou disse que não queria que ninguém a visse fraca, mas o Sensei disse que descansar também era importante e cuidou dela enquanto lhe entregava o presente dos moradores."
375291297 = "Abrindo o coração"
810913540 = "Atendendo a um contato de Kikyou, que dizia querer agradecer pelo ocorrido, o Sensei foi ao depósito de Hagi Tsukiyono. Ao entrar no depósito, Kikyou o recebeu."
2188741523 = "Capítulo de treinamento de moda"
2709052074 = "Aymi visitou o Schale dizendo que iria treinar moda. Depois de constatar o senso de moda um tanto desalinhado de Aymi, o Sensei decidiu ir com ela escolher um maiô."
3737979995 = "Capítulo de prática de moda"
2681531124 = "No dia da escolha do maiô com Aymi, o Sensei soube que ela queria usar o maiô para entrar no mar gelado. Para Aymi, o Sensei preparou itens contra o frio…… E Aymi completou sua moda inovadora: usar o maiô por baixo de uma jaqueta."
3806087283 = "Preparação para a operação"
4246151599 = "Quando o Sensei visitou o Departamento de Investigação de Fenômenos Anômalos, Aymi estava usando jaqueta sobre o maiô e construindo seu próprio ventilador."
2234223693 = "Banho de água fria"
3146169999 = "Atendendo a um contato de Aymi, o Sensei foi ao mar gelado. Lá, ele testemunhou Aymi se divertindo fazendo um buraco no gelo e tomando um banho de água fria."
228855696 = "A distância da montanha"
2565918406 = "Na entrada da trilha, o Sensei encontrou Kotama com um gravador. Kotama disse que veio gravar conversas que só poderiam ser gravadas ali, e o Sensei sugeriu que subir a montanha permitiria gravar sons mais naturais, então decidiram subir juntos. Kotama se cansou durante a subida, e o Sensei estendeu a mão. No momento em que suas mãos se tocaram, Kotama lembrou das palavras que havia dito antes e corou."
3369167674 = "Sons da natureza (1)"
2380232793 = "O Sensei voltou à montanha para subir e reencontrou Kotama com seu gravador. Kotama disse que viera gravar o som de uma fogueira e estava lutando para acendê-la. No entanto, todas as tentativas falharam, e Kotama pediu ajuda ao Sensei."
3281512578 = "Sons da natureza (2)"
2625303492 = "Kotama, refletindo sobre seus fracassos anteriores, disse que desta vez gravaria sons da natureza normalmente e os dois voltaram a subir. Ao encontrar uma grande árvore antiga, Kotama aguçou os ouvidos para os sons que vinham de dentro dela."
2980225488 = "Eco"
1001482326 = "Kotama subia em direção ao pico com o Sensei. Chegando ao topo, o Sensei gritou em direção à montanha oposta. Enquanto ouviam o som do eco, Kotama sorriu e disse que até que o eco não era ruim."
2146835391 = "Trabalhador nômade"
886315080 = "Atendendo a um contato de Hare, o Sensei foi a um parque nos arredores. Lá, Hare havia instalado vários equipamentos para trabalhar ao ar livre como um trabalhador nômade. Apesar de estar totalmente preparada, Hare começou a trabalhar mas sentiu dificuldades."
3941496298 = "Glamping"
1758508230 = "O Sensei visitou a sala do Veritas a trabalho do Schale. A sala estava estranhamente fria e o ar-condicionado ligado. Hare disse que estava forçando o ar-condicionado para testar um servidor. Então, para se proteger do vento do ar-condicionado, Hare começou um 'glamping' preguiçoso dentro de um saco de dormir de acampamento."
3942846821 = "O maior servidor do mundo"
2015698466 = "Durante a manutenção, Hare recebeu um desafio anônimo de um hacker. Dizia-se que nas coordenadas indicadas no desafio existia 'o maior servidor do mundo'. Hare e o Sensei começaram a subir em direção às coordenadas. Ao chegar ao destino, Hare percebeu que era um observatório desativado e, contemplando as estrelas no céu, enviou uma saudação gentil."
3682214390 = "Descafeinado"
1655277294 = "Hare decidiu trabalhar ao ar livre, sem acesso a conveniências ou geladeiras, para cortar a cafeína. No entanto, logo apareceram os sintomas de abstinência, e o Sensei preparou e lhe entregou café diretamente. Recuperada ao beber o café, Hare soube que, na verdade, era café descafeinado."
850398333 = "A grande presidente do Pandemonium!"
3031741265 = "O Sensei visitou o Pandemonium a convite de Makoto. Makoto propôs que o Schale se aliasse ao Pandemonium, mas o Sensei recusou sua proposta."
4070412729 = "Os negócios da grande presidente"
1791984264 = "Makoto visitou o Schale dizendo que mostraria o verdadeiro valor do Pandemonium. O Sensei, levado por Makoto, participou de uma turnê pelos negócios sob o guarda-chuva do Pandemonium, incluindo uma gráfica e um resort. Um pequeno problema ocorreu na rua comercial, mas Makoto o resolveu com maestria, mostrando uma postura digna de uma presidente."
3478178877 = "O dia de folga da grande presidente"
4007523766 = "O Sensei encontrou Makoto em um shopping, hesitando sobre qual ração comprar para o Leão-marinho. Naquele momento, Makoto desmaiou e o Sensei a levou ao hospital, onde foi diagnosticada com alergia a gatos. No entanto, Makoto declarou que cuidaria do Leão-marinho até o fim."
1780717963 = "A rotina da grande presidente"
1041879085 = "Makoto se propôs a mostrar os resultados dos negócios que o Pandemonium vinha realizando. No entanto, problemas surgiram em todos os estabelecimentos, resultando em enormes prejuízos. Abalada pelo impacto, Makoto vacilou por um tempo, mas, sem se deixar vencer pela adversidade, resolveu cada problema um por um."
1474073232 = "De jeito nenhum posso perder!"
3557545465 = "Atendendo a um contato de Ako, o Sensei foi ouvir suas reclamações sobre o Pandemonium. Ako disse que não podia aceitar a derrota e começou a escolher um vestido com o Sensei. No entanto, ao ver o vestido recomendado por ele, Ako ficou confusa, disse que ele estava corrompendo a disciplina e saiu apressada."
3679592377 = "De jeito nenhum, vou devolver!"
2522776615 = "Enquanto escolhiam vestidos juntos, o Sensei elogiou incondicionalmente a aparência de Ako com o vestido, deixando-a envergonhada. Naquele momento, Ako recebeu a notícia de que o Pandemonium estava causando problemas e correu para o local, deixando o Sensei para escolher o vestido sozinho. No entanto, o Sensei, seguindo a recomendação do vendedor, acabou comprando também a roupa íntima para usar por baixo……"
2124286988 = "De jeito nenhum, estava muito ocupada!"
2646682580 = "Para se preparar para a festa que aconteceria em breve, Ako e o Sensei participaram de uma reunião de confraternização. Enquanto o Sensei acompanhava Ako, que não estava acostumada a vestidos, o vestido dela acabou rasgando……"
2761186677 = "Vamos brincar com Ibuki!"
2632442291 = "Ibuki visitou o Schale para seu plantão. Tentou ajudar o Sensei com seu trabalho, mas se distraiu com os videogames e brinquedos. O Sensei então decidiu brincar com Ibuki."
1254725189 = "Piquenique divertido com Ibuki!"
3516138625 = "O Sensei e Ibuki haviam combinado de ir a um parque de diversões. Enquanto preparavam o bento, ela mal podia esperar pelo dia, mas no dia marcado começou a chover. O Sensei disse a Ibuki, que estava desanimada, que o Schale era o parque de diversões e passou um dia divertido com ela."
2360081099 = "Experiência profissional com Ibuki!"
685531614 = "Ibuki recebeu na escola um 'formulário de pesquisa de intenção de carreira'. Como ela disse que não sabia quais empregos poderia ter quando crescesse, o Sensei a levou para vários lugares e lhe proporcionou experiências profissionais."
2071765566 = "Estudando com Ibuki!"
2159313193 = "Depois de experimentar várias profissões, Ibuki disse ter pensado sobre o que mais gostava. O que ela escolheu foi 'Sensei'. Ibuki convidou o Sensei para uma pequena sala de aula que ela mesma montou e começou uma divertida aula de matemática."
2194837532 = "Hina e o vestido (1)"
58131079 = "Hina iria participar de uma festa social em Gehenna. Ela pediu conselhos ao Sensei sobre o que seria necessário para a festa. Para começar com as roupas, decidiram procurar no depósito. Lá, encontraram um vestido que Hina usava quando pequena, mas ele acabou rasgando por não servir mais. Então, os dois combinaram de ir escolher um vestido juntos."
324299341 = "Hina e o vestido (2)"
2948041859 = "No dia marcado para escolher o vestido com Hina. Hina se atrasou por causa do trabalho do Comitê de Disciplina e pediu ao Sensei que escolhesse o vestido sozinho."
1999678653 = "Hina e o piano"
1434829550 = "O Sensei, convidado por Hina. Em um espaço a sós, Hina começou a tocar para ele."
2011469792 = "Um momento tranquilo"
803201985 = "Atendendo a um contato de Kayoko, o Sensei chegou a uma ruela estreita perto da casa de ópera. Lá, ele e Kayoko trocaram algumas palavras."
1182512530 = "Código de vestimenta"
2124358865 = "Kayoko recebeu o Sensei na sala do escritório da Empresa de Conveniência. O Sensei viu um vestido deixado em um canto. Depois de uma breve conversa, o Sensei sugeriu que jantassem juntos."
1671331120 = "Teimosia de criança"
2297857782 = "O Sensei visitou o escritório da Empresa de Conveniência. Lá estava Kayoko vestida. Kayoko, que queria agradecer ao Sensei pelo ocorrido, disse algo a ele, que relutava."
2029319155 = "O vestido sem vez"
3430969351 = "Preocupado com as mensagens evasivas de Aru no Momotalk, o Sensei foi ao escritório da Empresa de Conveniência. Aru pediu conselhos ao Sensei sobre o que fazer com o vestido que a preocupava."
3483710198 = "Será que cheguei um pouco mais perto"
2862818090 = "O Sensei foi a uma reunião de apresentação de negócios a pedido de Aru. No entanto, o conteúdo da apresentação era incoerente, e Aru ficou desanimada. Para animá-la, o Sensei a levou a um lugar especial."
3809174998 = "Uma vez, duas; duas, três"
3868290257 = "Aru não aparecia mesmo depois da hora combinada. Preocupado, o Sensei foi procurá-la e ouviu sua voz em apuros. Mais uma vez ajudada pelo Sensei, Aru expressou sua profunda gratidão."
761424835 = "Em busca do objetivo"
2024730199 = "Akari queria participar do concurso de comer muito do Ano Novo. No entanto, o comitê organizador relutou, dizendo que 'era problemático que uma vencedora repetida participasse novamente'. Então, o Sensei fez uma sugestão, e o concurso foi realizado na forma de Akari contra todos os outros participantes. Mesmo assim, Akari manteve com honra seu título de campeã de comer muito."
882945439 = "Para realizar um desejo"
3977936515 = "Por falta de ingredientes para o zoni, Akari decidiu participar de um evento de socar o arroz para fazer os bolinhos de arroz diretamente."
1458542543 = "Para receber a boa sorte"
2394074920 = "O Sensei e Akari saíram em uma turnê de udon para comer 'udon da virada do ano'. Ao saber que ganhariam um certificado se dominassem todas as lojas famosas da região, Akari comeu udon em várias lojas renomadas."
1588234287 = "Festivais são maravilhosos! Muito, muito maravilhosos!"
496070893 = "Umika convidou o Sensei para o festival de Hyakkiyako e o guiou por todos os cantos do local."
336809221 = "Lembranças, memórias de um festival"
1264327924 = "O Sensei visitou a Cem Noites e passou uma tarde tranquila com Umika. Lá, Umika decidiu revelar a preocupação que carregava há muito tempo."
63381328 = "Não vou perdoar quem atrapalha o festival!"
799850412 = "Atendendo a um contato de Umika, o Sensei foi à Cem Noites. Lá, Umika estava confusa com alguns clientes travessos. Seguindo os conselhos do Sensei, Umika decidiu agir para oferecer uma 'hospitalidade' sincera."
1822406799 = "Um festival para você"
3628022907 = "Umika recebeu calorosamente o Sensei que visitara a Cem Noites. Ela havia preparado um festival especial apenas para ele."
2198939886 = "Um mundo"
3468668910 = "Umika visitou o Schale e discorreu com entusiasmo para o Sensei que o festival era um 'mundo' especial separado do cotidiano. Em sua fala, ela mostrou um par de bonecas antigas que comprou em seu primeiro festival. Depois que Umika foi embora, o Sensei encontrou uma das bonecas do par sobre a mesa."
3045026029 = "Mais um treinamento (?)"
4119105229 = "Atendendo a um contato de Tsubaki, o Sensei foi a Hyakkiyako e recebeu ali um guia um tanto excêntrico."
418161561 = "Curso intensivo"
1812128083 = "Tsubaki visitou o Schale dizendo que iria ensinar o Sensei a dormir. Nesse meio tempo, chegou ao Schale o boato de que a 'Princesa Adormecida de Hyakkiyako' estava ali, e algumas alunas vieram vê-la. Elas diziam que não conseguiam dormir devido à insônia. Tsubaki então se dispôs a ensinar a elas métodos para dormir."
2010941900 = "Bom sono, bons sonhos"
1529221547 = "No meio da noite, o Sensei, após terminar seu trabalho em Hyakkiyako, contatou Tsubaki. Tsubaki começou uma visita guiada exclusiva para ele, e o Sensei, exausto, acabou adormecendo."
4052115729 = "Prática vocal"
2194871063 = "O Sensei acompanhou Kazusa em seu treino vocal em um karaokê próximo."
2034375151 = "Clube de banda do pós-escola"
3425425496 = "Kazusa visitou o Sensei e dividiu com ele um doce que não havia conseguido comer durante o treino."
3700069782 = "É minha responsabilidade"
3288920718 = "O Sensei e Kazusa percorreram uma rota otimizada que Kazusa havia elaborado para visitar docerias. Depois de visitarem várias lojas, na última delas Kazusa foi confundida com uma musicista. No improviso, ela apresentou o Sensei como seu 'empresário exclusivo'."
1489758999 = "Um som caloroso"
3457523314 = "Kazusa disse que queria ouvir um disco de vinil e o Sensei a levou a uma sala de áudio. Kazusa pegou um disco de vinil único, feito como recordação. Enquanto conversavam, ouvindo a apresentação de Sugar Rush, a música mudou e a voz do Sensei começou a tocar. Era a gravação da vez em que foram juntos ao karaokê. Para Kazusa, aquela era uma lembrança preciosa que ela queria guardar."
1720743063 = "Sugar High"
4202174343 = "O Sensei foi à cidade a convite de Airi. Junto com Airi, que estava mais animada que o normal, eles foram a um certo café. No entanto, a fila estava mais longa do que imaginavam, e Airi hesitou sobre o que fazer. Os dois mataram o tempo conversando enquanto esperavam."
2100881557 = "Sugar Rush"
3689167069 = "Airi decidiu que o Sensei assistiria a seus treinos. No entanto, no caminho de volta, os dois foram surpreendidos por uma chuva torrencial. Airi sugeriu que corressem juntos, com ela cobrindo a cabeça com sua própria jaqueta."
3093181537 = "Sugar Crash"
113729469 = "Para Airi, que estava com sentimentos confusos pelo fim das atividades da banda, o Sensei ouviu suas preocupações."
3799374904 = "Sensibilidade estética"
316334877 = "Yoshimi disse estar insegura em deixar a escolha das roupas para os membros excêntricos do clube. Ela decidiu escolher as roupas junto com o Sensei, pedindo seus conselhos. E as roupas escolhidas foram levadas pelo Sensei até a sala do clube."
2596685212 = "Conselhos (?)"
1913792740 = "Para ouvir as preocupações de Yoshimi, o Sensei foi a um café. Yoshimi, que estava preocupada com o design de sua própria assinatura, começou a divagar com várias fantasias e depois tentou pagar a conta, mas acabou rabiscando sua assinatura no recibo sem querer. O Sensei provocou Yoshimi, que estava envergonhada."
3164217481 = "Tocando para você"
2214771348 = "Atendendo a um contato de Yoshimi, o Sensei chegou ao local combinado. Yoshimi disse que havia praticado uma música para o Sensei. Apesar de ter ajustado a respiração, ela estava nervosa. No final, Yoshimi começou a tocar sentada no chão. Impressionado, o Sensei brincou pedindo bis. Envergonhada, Yoshimi tocou todas as músicas que havia preparado."
3782277926 = "As atividades extracurriculares de Kirara"
1447560689 = "No caminho de volta de seus compromissos em Gehenna, o Sensei avistou Kirara. Surpreso ao ver Kirara conversando animadamente com amigos, o Sensei perguntou sobre suas atividades extracurriculares."
3408135695 = "Kirara, a insistente"
1107638503 = "Kirara, que havia tirado nota vermelha em uma prova, pediu ao Sensei que a ajudasse a estudar. Para Kirara, que estava com uma expressão abatida, o Sensei decidiu dar aulas particulares."
3959270548 = "Aula particular só para dois"
2956308925 = "Atendendo a um contato de Kirara, o Sensei foi à escola Gehenna. Em uma sala silenciosa, os dois começaram a estudar. Depois, o Sensei sugeriu um intervalo a Kirara, que estava concentrada, mas ela quis continuar estudando……"
235996998 = "Kirara on the street"
1817181974 = "Kirara disse que queria agradecer pelas aulas particulares e, então, o Sensei e ela andaram por vários lugares. Os dois passaram um tempo agradável juntos."
11208201 = "Será que é a prova do esforço?"
2323993205 = "Kirara perdeu seu caderno com anéis e estava revirando freneticamente o depósito de papel velho. Segundo ela, havia colocado o caderno para fora ao arrumar o quarto e ele foi recolhido por engano. O Sensei o encontrou e viu que estava lindamente decorado e repleto de memórias preciosas de Kirara. Quando ele apontou o retrato rabiscado em uma página que chamou sua atenção, Kirara pegou o caderno e fugiu."
296399585 = "Sentindo-se uma empregada!"
3524968918 = "Momoi disse que, já que estava vestida de empregada, ia limpar o Schale. Mas, como era de se esperar, Momoi, ao chegar ao Schale, simplesmente se deitou no sofá. O Sensei a acordou e limparam o Schale juntos."
487322513 = "A comida da empregada!"
74482891 = "Momoi disse que, já que estava vestida de empregada, ia cozinhar. Desta vez, ela tentou fazer um prato que aparecia em um jogo usando ingredientes comprados em uma conveniência. No entanto, acabou comprando demais e teve trabalho para limpar a bagunça."
4200373453 = "O descanso da empregada!"
2287657410 = "Momoi, novamente dizendo que, já que estava vestida de empregada, faria algo digno de uma, tentou desta vez descansar. Para isso, pegou equipamentos emprestados de vários clubes de Millennium a fim de obter um descanso eficaz. No entanto, os equipamentos funcionaram mal e tanto o Sensei quanto Momoi ficaram com dores musculares."
2123764785 = "Serei uma empregada, Sensei!"
1478421162 = "O Sensei visitou a sala do Clube de Desenvolvimento de Jogos e encontrou Midori vestida de empregada. Midori estava pensando no design de um personagem de um jogo em que a protagonista é uma empregada e queria fazê-la uma empregada ortodoxa. Pensando que o tratamento também era importante, Midori decidiu chamar o Sensei de 'mestre'."
1578203463 = "É hora de sair, Sensei!"
613352308 = "O Sensei foi com Midori a uma exposição de arte de vestuário. Animada, Midori preparou várias roupas clássicas para o Sensei, mas ele a acalmou. E assim, os dois aproveitaram ao máximo a exposição."
4234835853 = "Por favor, lembre-se, Sensei!"
1167253886 = "Midori, que deveria estar vestida de empregada para o design do personagem do jogo em que a protagonista é uma empregada, refletiu que, na verdade, só havia brincado com o Sensei o tempo todo. Então, ela se dedicou a tarefas dignas de uma empregada no Schale. E, por fim, pediu ao Sensei que registrasse sua aparência de empregada em fotos."
3911733272 = "As melhores férias"
1858906170 = "Para aproveitar ao máximo as férias no resort, Serika vasculhou vários lugares em busca de algo especial. Embora não tenha encontrado nada extraordinário, Serika percebeu que o próprio processo era as melhores férias."
2428709807 = "Princesa a bordo"
1684051936 = "Serika encontrou um banana boat deixado em um depósito e decidiu testar com o Sensei se ele funcionava."
1798149545 = "Recordações incontáveis"
773578818 = "Serika, de volta a Abydos, estava limpando a sala do clube com o Sensei quando encontrou um maiô. Vendo Serika com um olhar um tanto melancólico, imersa em lembranças, o Sensei fez uma sugestão."
1569262550 = "Escolha do maiô"
3132777354 = "Kanna, que seria designada como salva-vidas, decidiu escolher um maiô junto com o Sensei."
321959446 = "Teste"
1320900751 = "Kanna convidou o Sensei para testar juntos um tobogã aquático que comportava várias pessoas, a fim de inspecioná-lo……"
1944847401 = "Privilégio de salva-vidas"
3375768959 = "No dia de folga do parque aquático. Kanna, que havia assumido a tarefa de limpar e organizar o 'spa de cura', teve um breve momento de descanso com o Sensei."
728682739 = "História policial – episódio da praça de alimentação"
2691646951 = "Fubuki, que chamava o Sensei de 'supervisor', queria patrulhar a praça de alimentação. Parece que seu objetivo era uma loja de donuts na praça."
2300515944 = "História policial – episódio da piscina de ondas"
1597168577 = "Fubuki, que recebeu a tarefa de patrulhar o parque aquático, parecia estranhamente alegre."
1031326801 = "História policial – episódio do paraíso perdido"
1211536315 = "Fubuki encontrou um lugar onde ninguém a incomodaria e fez um plano grandioso para matar o serviço, mas……"
3039528055 = "Treinamento de salvamento"
3169271538 = "Kirino, que recebeu a missão de salva-vidas, foi com o Sensei ao centro de treinamento de natação da Academia de Polícia Valkyrie para realizar treinamento de resgate de vidas."
4241689255 = "Ressuscitação cardiopulmonar"
3041462882 = "Kirino realizou o treinamento de ressuscitação cardiopulmonar. No entanto, esqueceu o manequim usado no treinamento, e o Sensei se ofereceu como material didático no lugar……"
2625703360 = "Prática geral de primeiros socorros"
2642714145 = "Kirino fez a inspeção final após o treinamento. Embora tenha se dedicado com afinco, os resultados não pareciam bons. Enquanto o Sensei a observava, ele pisou em falso e caiu na água, afogando-se……"
4005278696 = "Perigos explosivos"
770948941 = "À beira-mar, o Sensei e Moe trocaram várias ideias. Nesse meio tempo, Moe mencionou que em seu maiô também estava escondido 'algo explosivo' e tentou revelá-lo. O Sensei a impediu apressado, mas……"
2726872600 = "Perigo próximo"
3684290810 = "O Sensei, tendo recebido uma mensagem de que algo explodiria, foi apressado ao encontro de Moe. No entanto, o 'algo' a que Moe se referia era uma concha colocada sobre brasas. Moe ficou fascinada com o barulho crepitante dos ingredientes congelados sobre as brasas."
1520173270 = "Informações logísticas"
1831576614 = "Pescadores preocupados com a queda nas vendas do produto especial da vila, o kusaya (peixe seco e fermentado). Moe decidiu desenvolver um aplicativo para eles. No momento em que o kusaya foi cadastrado no aplicativo, os pedidos de pessoas que apreciam ingredientes únicos chegaram em massa."
1947646090 = "Embelezamento da área"
1090909669 = "Moe foi convidada por um morador a visitar uma casa vazia. Ela decidiu reformá-la para os outros membros da sua equipe. Após terminar a reforma, enquanto descansava, insetos começaram a aparecer. Moe queimou um repelente e, sentindo seu cheiro, relembrou o passado."
717510768 = "Um herói nasce"
1205296410 = "Hoshino ficou sobrecarregada com trabalho burocrático. O Sensei a ajudou e, em troca, pediu que ela usasse novamente sua vestimenta armada de antes. Naquele momento, a Gangue do Capacete chegou. Hoshino, em sua forma armada, os repeliu facilmente, e o Sensei a chamou de 'herói de Abydos'."
2747864121 = "Herói, patrulha"
265807011 = "Hoshino e o Sensei patrulhavam o distrito autônomo de Abydos. No caminho, ajudaram um cidadão e passaram a noite em um trem abandonado nos arredores da cidade."
1849506027 = "Herói, batalha decisiva"
1466126374 = "Hoshino e o Sensei, que estavam rastreando movimentos suspeitos da Gangue do Capacete, os encontraram em um prédio escolar abandonado e os capturaram todos de uma vez."
218109715 = "Especialista"
1957182403 = "O Sensei foi visitar Shiroko para verificar diretamente como ela vivia. No entanto, a vida de Shiroko era totalmente inesperada."
2455626068 = "O que mudou, o que não mudou"
2766229661 = "Shiroko disse que este mundo e o outro mundo são sutilmente diferentes. Mas, apesar disso, percebeu que também há coisas que não mudam."
789167182 = "Cavaleiro mascarado"
4039489432 = "Há algum tempo, começou a aparecer em Abydos um 'Cavaleiro Mascarado'. Sua verdadeira identidade era Shiroko, que havia voltado a andar de bicicleta. Shiroko disse que ultimamente tinha uma preocupação."
1074029922 = "Trabalho de meio período na cantina"
2521063046 = "Saori trabalhava em uma cantina à beira-mar. No entanto, acabou recebendo uma reclamação de um cliente……"
2149489111 = "Em busca do som do festival"
3190600684 = "Saori teria que fazer sampleamento para uma apresentação de DJ. Para encontrar sons que pudesse usar, Saori e o Sensei exploraram vários cantos do local do festival."
3891669579 = "O fim de festa só para dois"
63371907 = "Após a apresentação do DJ, o Sensei e Saori se sentaram no palco vazio e tiveram sua própria celebração particular."
1028892596 = "Probabilidade de ganhar"
885397784 = "Hiyori escreveu um cartão-postal de sorteio de uma revista para ganhar um maiô. No entanto, o período de inscrição para o evento já havia terminado. O Sensei, então, comprou um maiô para ela e fez parecer que ela havia ganhado no sorteio."
1411829040 = "Protetor solar?"
4042979183 = "Hiyori passou óleo de gergelim em si mesma em vez de protetor solar e acabou queimando a pele. Após o tratamento, o Sensei comprou um picolé para animá-la, mas……"
23063759 = "Memórias inesperadas"
1830453388 = "Hiyori quis retribuir o favor ao Sensei, que sempre a ajudava. O presente foi um show de fogos de artifício especial só para Hiyori e o Sensei."
2202535381 = "O que permanece mesmo sem forma"
269523938 = "Atsuko disse que queria tirar fotos de várias coisas com sua nova câmera digital. O Sensei então a acompanhou pelo local do festival."
2300375645 = "O que há no fim da fuga"
665744446 = "O Sensei e Atsuko encontraram uma área para fotos no local do festival e tiraram fotos. No entanto, foram confrontados pela Gangue do Capacete, que exigiu um preço exorbitante pelas fotos. Conseguindo escapar e se esconder, eles notaram que ali, bem naquele lugar, flores haviam desabrochado."
942189667 = "A última coisa fotografada"
1659279476 = "Atsuko disse que a bateria da câmera estava acabando. Depois de pensar no que fotografar por último, o que Atsuko escolheu foi……"
486009611 = "Para descansar, é preciso soltar as amarras do coração"
3128164768 = "Karin, que não sabia como descansar mesmo estando de folga, pediu conselhos ao Sensei sobre como usar seu tempo. Seguindo a sugestão dele, foram para o local do festival e aproveitaram para comer à vontade enquanto percorriam as barracas."
2155174399 = "Descansar, juntos"
933163258 = "Karin, ainda sem saber como descansar, visitou o Schale. Seguindo a sugestão do Sensei de 'não fazer nada', ela tentou, mas o Sensei continuava trabalhando. Incomodada por ver o Sensei ocupado enquanto ela não fazia nada, Karin começou a ajudá-lo com seu trabalho. Depois de terminarem o trabalho em cooperação, os dois passaram o tempo 'não fazendo nada' juntos."
1196121695 = "Descansar, um feriado especial"
1780687568 = "Karin, que finalmente descobriu por si mesma uma maneira de passar o dia de folga, convidou o Sensei para 'ir para a escola'. O Sensei caminhou pelo trajeto escolar com Karin, vestida de uniforme. O que para Karin parecia 'cotidiano' tornou-se um feriado 'especial', pois compartilharam os segredos do caminho da escola enquanto caminhavam juntos."
1297953155 = "Mentira e verdade"
133657712 = "Marina apreciava as iguarias de Shanhaijing. O Sensei a ajudou quando ela foi vítima de brincadeiras regionais."
1883169484 = "Fechando a lua, envergonhando as flores"
2438739727 = "Marina, vestida de cheongsam, recebeu a proposta de um fotógrafo para fazer um ensaio. Recomendada também pelo Sensei, Marina decidiu participar da sessão de fotos."
3353300618 = "Resolvendo um problema com facilidade"
83669419 = "Para as alunas de Shanhaijing que discutiam se deveriam dividir o bolo lunar em quatro ou oito partes, Marina apresentou uma resposta. No entanto, depois, foi contestada sobre a maneira correta de beber chá."
3593618651 = "A arte de ouvir"
3790006563 = "Tomoe visitou o Jardim Meihua e mostrou uma habilidade surpreendentemente boa em cuidar das crianças. Segundo ela, sempre gostou de conversar com crianças."
533034601 = "A secretária-chefe do país frio"
3953618809 = "Para Tomoe, vinda de Red Winter, Shanhaijing parecia quente. Enquanto se abanava com um leque, Tomoe passou um tempo com o Sensei."
3599242579 = "Vida saudável todos os dias"
3462245568 = "O dono de um restaurante estava preocupado com o boato de que a culinária chinesa não era saudável. Tomoe conseguiu atrair clientes usando sua habilidade de agitação. Além disso, acabou provocando um pequeno boom da culinária chinesa em Kivotos."
2148141524 = "Rotina"
1009451031 = "O Sensei foi ao parque de Shanhaijing a pedido de Raijo, que dizia querer conversar. Depois de assistir a seu treino matinal de kung fu, eles se divertiram conversando sobre filmes de kung fu."
2050752819 = "Cuidado"
2040477035 = "Ante a iminente visita das crianças do Jardim Meihua, Raijo estava preocupada sobre como deveria lidar com elas. Embora fosse capaz de resolver com desenvoltura os vários problemas que ocorriam na Sociedade Comercial Genbu, ela não sabia como interagir com crianças. No entanto, ao ver o Sensei interagir com crianças enquanto comia, ela captou um certo truque e conseguiu se dar bem com os pequenos."
3812995799 = "Ensinamentos do kung fu"
541090949 = "A Sociedade Comercial Genbu passava por uma auditoria sobre as condições de higiene do Portão Xuanlong, com o Sensei presente. Raijo estava prestes a explodir de raiva contra a arrogância do auditor, mas, seguindo o conselho do Sensei, lembrou-se dos 'ensinamentos do kung fu' e conseguiu resolver a situação pacificamente."
4240158672 = "Sujeito e objeto"
1037046256 = "Raijo, que viera ao Schale para seu plantão, acompanhou o Sensei em seu trabalho externo. No caminho, ela pediu que ele a protegesse durante aquele dia. Envolvida em uma luta com delinquentes no caminho, ela viu a maneira do Sensei de proteger as alunas e, então, encostou-se nele, entregando-se ao Sensei que prometeu protegê-la até seu retorno a Shanhaijing."
687178835 = "Esconde-esconde no palácio"
2331129627 = "Atendendo a um contato de Kisaki, o Sensei decidiu ajudar na fuga do Palácio Rokuwa. Eles conseguiram escapar com sucesso, levando Kisaki disfarçada de membro do Portão Xuanlong, da Sociedade Comercial Genbu e de criança do Jardim Meihua, mas tudo não passava de uma 'brincadeira de fuga'. Depois de passarem um tempo agradável juntos, o Sensei acabou acompanhando Kisaki em seus deveres como porta-voz."
3457268771 = "O sonho da borboleta"
3801392505 = "Kisaki, que viera ao Schale para seu plantão, envolta pelo aroma calmante do incenso que trouxera, começou a trabalhar junto com o Sensei. O Sensei ficou surpreso com as soluções extremas que Kisaki propunha para os problemas, mas conseguiu resolver o trabalho rapidamente. Eles estavam prestes a passar para o próximo compromisso quando o Sensei, que vinha trabalhando sem dormir, não resistiu ao sono e caiu no chão, então Kisaki lhe ofereceu seu colo."
4083890821 = "O pássaro na gaiola anseia pelas nuvens"
2918134416 = "Kisaki chegou ao Schale. Após terminarem um trabalho, o Sensei a convidou para subir ao terraço. Enquanto contemplavam a paisagem, Kisaki murmurou 'queria ir mais longe', e o Sensei respondeu ao seu pedido, prometendo que os dois sairiam para ver paisagens de vários lugares."
4262508585 = "Oferecendo água"
355824304 = "Como prometido anteriormente, Kisaki saiu com o Sensei para passear em vários lugares. Eles aproveitaram o metrô, o parque de diversões, o fliperama e outras instalações, mas, na volta, Kisaki passou mal. Leva a uma pousada próxima, Kisaki descansou um pouco enquanto o Sensei, em quem confiava, acariciava sua cabeça."
3494385232 = "Uma mordida, por favor"
516102790 = "Para apoiar Marie, que se dedicava aos treinos para um concurso de ídolo, o Sensei foi visitá-la. Como era hora do almoço, Marie sugeriu comerem juntos, mas só havia um bento. O Sensei relutou, mas Marie, sentindo-se mal por comer sozinha, disse que faria uma vontade e compartilhou com ele uma mordida de omelete."
2845702047 = "Guarda-costas de Marie"
982300326 = "Quando o Sensei visitou Marie novamente, notou uma aluna fantasiada ao seu lado, como se a protegesse. Ao ouvir a história, descobriu que ela era uma espécie de guarda-costas de Marie. Quando ele se apresentou como Sensei do Schale, a aluna pareceu convencida e se retirou, deixando tudo com ele. No entanto, Marie pareceu perder um pouco a confiança, achando que haviam lhe designado um vigia por ela não ser confiável."
1887944177 = "Após o show"
2221601705 = "O Sensei foi apoiar Marie, que estava prestes a fazer um show solo de pequeno porte. Embora feliz com a grande audiência, Marie parecia ter sentimentos conflitantes por ter mais pessoas assistindo do que na sala de aconselhamento habitual. O Sensei a encorajou a ser positiva e a enviou ao palco. Depois do show, Marie, um pouco animada mas com uma sensação de dever cumprido, expressou sua gratidão ao Sensei por toda a ajuda."
1340882771 = "A coragem para dar o primeiro passo"
1554125012 = "O Sensei visitou Marie, que dizia ter algo para mostrar. Como forma de agradecimento por tudo até então, Marie lhe ofereceu um show secreto. Por meio da música e da dança, Marie transmitiu ao Sensei sua gratidão com todas as forças e, novamente, pediu que ele continuasse a zelar por ela."
1675781559 = "O fruto do esforço"
2417116786 = "Sakurako ficou feliz ao sentir que suas atividades como ídolo aproximaram a distância entre ela e as outras alunas. No entanto, tão feliz por ter se tornado amiga de todos graças às roupas de ídolo, ela acabou querendo vestir todas as irmãs da Irmandade com trajes de ídolo……"
2808779992 = "Outro eu"
86290450 = "O Sensei foi visitar Sakurako, que disse ter uma preocupação. Ao ouvir a história, Sakurako estava vestida de ídolo quando uma irmã novata a confundiu com outra pessoa, 'Sakura-chan', e ela estava com dificuldade de revelar a verdade. Ao pedir conselhos sobre o que fazer, o Sensei sugeriu que fosse sincera. Seguindo o conselho e criando coragem para revelar a verdade, Sakurako relatou alegremente ter ganho uma nova amiga."
1666107840 = "O brilho da ídolo"
3975383213 = "Sakurako se dedicava às atividades de ídolo em preparação para o festival da escola. Ela, junto com todas as irmãs da Irmandade e o Sensei, tentou colocar cartazes em lugares visíveis da cidade para apoiá-la. Quando o Sensei a levou como surpresa aos locais onde os cartazes foram colados, Sakurako ficou feliz por ter começado a ser ídolo."
3877968203 = "Ouvi dizer que você gosta desse tipo de coisa"
2316052442 = "Sakurako, que às vezes agia de forma estranha, estava ainda mais estranha que o normal. Diante do Sensei, confuso, Sakurako explicou que era para agradecer por tudo. No entanto, percebendo que havia confundido o Sensei, ela se desculpou. O Sensei disse que a intenção era o que mais importava e, então, Sakurako o convidou novamente para o 'curso de encontro especial de ídolo' que havia planejado."
899851085 = "Sessão de fotos"
1154706643 = "Mine decidiu fazer uma sessão de fotos para usar as roupas de ídolo na melhoria da imagem da Ordem dos Cavaleiros de Resgate. No início, ela explicou a situação ao Sensei com naturalidade, mas, ao perceber que os membros da Ordem a achavam fofa, ficou envergonhada."
2876252345 = "Mesmo sem motivo"
934404426 = "Mine mostrava sua roupa de ídolo em todos os lugares que ia, seja nas compras, no restaurante etc. O Sensei finalmente conseguiu agarrá-la, que se justificava com desculpas esfarrapadas e fugia, e a encorajou, dizendo que não precisava de motivo para se vestir como gostava. Mine, preocupada por ter revelado seu lado que gosta de coisas fofas, ficou um pouco perturbada."
351631146 = "Comigo agora"
606260475 = "Após o festival da escola, Mine se viu preocupada com a dificuldade de conciliar as atividades de ídolo e de resgate, e decidiu se desfazer das roupas, selando sua persona de ídolo. Apesar dos conselhos do Sensei, sua determinação era inabalável. No entanto, ela concordou com a ideia do Sensei de pensar que poderiam juntos encontrar uma oportunidade para ela usar as roupas novamente, confiando-lhe o destino de sua persona de ídolo."
1414095989 = "A desculpa de cada um"
4030175207 = "O Sensei tentou criar uma oportunidade para Mine usar sua roupa de ídolo. Mine se preocupou em estar sendo um incômodo, mas o Sensei sorriu, dizendo que, na verdade, era uma ótima desculpa para ele aproveitar suas férias. Vendo isso, Mine naturalmente sorriu. Então, ela e o Sensei passaram um dia tranquilo juntos."
2926157779 = "Satsuki Kyogoku sabe"
3638915034 = "Satsuki disse que havia assumido o departamento de informações. Ela queria que o Schale, como parceiro, lhe desse uma força, mas o Sensei não se lembrava de ter firmado tal parceria. Diante disso, Satsuki tentou ameaçá-lo, dizendo que tinha seus pontos fracos, mas não funcionou, e ela se retirou."
2537055559 = "Satsuki Kyogoku pergunta"
2610548792 = "Como a ameaça anterior não funcionou, Satsuki disse ter preparado outro método. Ela tentou cortar as unhas do Sensei, vesti-lo com uma camiseta branca e forçá-lo a comer curry udon, e fazer com que anúncios aparecessem em momentos bons de vídeos fofos de gatos sem poder pular…… uma tortura verdadeiramente horrível. No entanto, também não funcionou com o Sensei."
281454214 = "Satsuki Kyogoku ouve"
736914356 = "Satsuki finalmente se alegrou com o progresso do 'Plano NK Ultra'. Ela selecionou o Sensei como cobaia para o primeiro passo. Assim, ela tentou a hipnose, mas não funcionou…… e ela acabou se hipnotizando, tornando-se obrigada a obedecer ao Sensei. Quando o Sensei perguntou por que ela queria controlar as pessoas, Satsuki respondeu que era pela paz mundial."
3009929652 = "Satsuki Kyogoku resiste"
2843120852 = "O Sensei, tendo recebido um pedido de socorro de Satsuki no Momotalk, foi ao Pandemonium e viu Satsuki trancada em seu quarto. Segundo ela, estava se escondendo porque tinha medo de injeção de vacina. O Sensei a convenceu e tomaram a injeção juntos."
796751500 = "Satsuki Kyogoku treme"
2925882867 = "Satsuki chegou animada para seu plantão no Schale. Ela estava entusiasmada para obter informações sobre o Schale quando, de repente, houve uma queda de energia. Diante de Satsuki, com medo do som do vento e de objetos caindo, o Sensei ficou gentilmente ao seu lado."
1716752779 = "A secretária do Pandemonium"
2765526546 = "O Sensei recebeu uma mensagem de Chiaki sobre a assinatura do 'Pandemonium Semanal'. Ao visitar o Schale, Chiaki discorreu sobre o fascínio do jornal."
3705330933 = "A vida de repórter da secretária"
651990844 = "Chiaki lhe deu ingressos para um buffet de doces como presente de agradecimento pela assinatura. Chiaki disse que queria fazer uma reportagem para a próxima edição e, juntos, eles aproveitaram o buffet."
2692250003 = "A vida de hobby da secretária"
4167044195 = "Chiaki disse que o Pandemonium Semanal desta semana não seria publicado. Ao segui-la para ver o que ela faria em seu hobby, Chiaki visitou vários clubes de Gehenna e se divertiu com eles. Ela disse que seu hobby era brincar com vários tipos de pessoas."
2097502551 = "A vida de busca da secretária"
3382911551 = "Chiaki disse que a próxima edição do Pandemonium Semanal seria sobre o Schale. Enquanto fazia seu plantão, ela tentou fazer uma reportagem de bastidores, mas começou a investigar o mistério do buraco na meia do Sensei e seus segredos. O Sensei a acalmou e a ajudou a procurar algo que pudesse virar notícia."
828484028 = "Insônia"
3373880876 = "Yuuka estava ajudando com o trabalho do Schale. No entanto, ela parecia não conseguir se concentrar. Ao ouvir a história, aparentemente ela estava sofrendo de insônia ultimamente. O Sensei sugeriu que ela tirasse uma soneca com roupas confortáveis e, enquanto conversavam um pouco, Yuuka acabou dormindo. Ao acordar, o Sensei sugeriu que talvez o problema fosse se preocupar demais em dormir cedo, e ela pareceu convencida."
1121151644 = "Aventura em busca da ovelha elétrica"
975106364 = "Preocupado com o fim suspeito de uma conversa com Yuuka no Momotalk, o Sensei foi a Millennium. Surpresa, Yuuka explicou a situação e, ao investigar, descobriu que foi um mau funcionamento do 'ovelha elétrica', um drone de economia de energia. Enquanto capturavam a 'ovelha elétrica' fugitiva, eles conversaram sobre o velho costume de contar ovelhas em noites de insônia, e Yuuka quase revelou um sonho secreto, mas disfarçou a vergonha forçando o Sensei a voltar para o Schale."
2025917852 = "After Dark"
2416670859 = "O Sensei, que havia passado a tarde em Millennium atendendo a consultas de alunas, foi a uma conveniência para comer algo leve. Ao sair com suas compras, viu Yuuka, de pijama, comendo frango. Ao perguntar, ela disse que estava passeando porque não conseguia dormir e acabou querendo um lanche noturno. Ouvindo as preocupações de Yuuka, que se sentia envergonhada, o Sensei a acompanhou no resto do passeio."
2478727059 = "A noite sem dormir do Seminário"
2577100129 = "Yuuka disse que, por recomendação de Kotama, começou a ouvir rádio antes de dormir. Um dia, a mensagem de Yuuka pedindo soluções para insônia foi lida em um programa de rádio. Embora nenhuma solução eficaz tenha sido apresentada, Yuuka ficou desapontada, mas na semana seguinte, a mensagem do Sensei foi lida. Talvez porque se sentiu encorajada pelo conteúdo, naquela noite Yuuka conseguiu dormir bem e sua insônia pareceu melhorar."
358780189 = "Incolor"
4255105260 = "Noa havia pego um resfriado, ao que parecia. Preocupado, o Sensei foi visitar seu quarto. Ao entrar, ficou surpreso ao ver que havia apenas o mínimo necessário. Ouvindo a explicação, isso vinha do desejo de Noa de ser sempre objetiva. No entanto, o Sensei comentou que uma 'mancha' tornaria o espaço ainda mais agradável. Ouvindo isso, Noa pediu que ele a ajudasse a redecorar o quarto. O Sensei concordou, mas disse que a prioridade no momento era cuidar de sua saúde e lhe fez um mingau."
2069012399 = "Sem perfume"
1850483928 = "Como prometido a Noa, o Sensei foi ajudar na reforma do quarto. Eles tentaram vários itens de decoração, como troféus que Noa havia ganhado e deixado no Seminário, e livros, mas nenhum dos dois parecia se sentir completamente satisfeito. No entanto, quando o Sensei sugeriu um difusor com aroma suave, Noa pareceu gostar e sorriu feliz."
208330771 = "Transparente"
3004247765 = "Noa se recuperou do resfriado, mas em seu lugar, o Sensei adoeceu. Preocupada, Noa visitou o Schale e, como retribuição ao favor anterior, preparou uma refeição caseira para ele. Depois de comer, o Sensei pediu que Noa lesse um livro em voz alta e adormeceu profundamente ao ouvir sua voz transparente."
4051060136 = "Pequena mancha"
2881025522 = "O Sensei, sem querer, derramou café e manchou o uniforme de Noa. Noa então trocou de roupa, vestindo um pijama que estava no Schale. Sorrindo travessamente para o Sensei, que parecia inquieto, ela tentou transmitir indiretamente o significado de estar de pijama. Como ele não entendeu, ela murmurou 'Como você é lerdo' e fez beicinho."
1475757512 = "Convite da princesa adormecida"
1090305340 = "O Sensei foi a Trinity a pedido de Seia, que o convocou como se tivesse um assunto importante. No entanto, ao ouvir a história, descobriu que não havia motivo específico; ela só queria chamar sua atenção. Diante de Seia, que disse que essa seria a última vez que faria um capricho, o Sensei respondeu que não precisava se conter. Seia riu, um pouco sem graça, e pediu mais um favor: os dois acabaram tirando uma soneca juntos."
1220649373 = "Repetindo o que não se está acostumado"
2715828130 = "Atendendo a um pedido de Seia para que a visitasse, o Sensei foi novamente encontrá-la. No entanto, a visita era apenas uma desculpa; na verdade, Seia havia preparado doces para agradecer ao Sensei, que estava exausto de tanto trabalhar. O Sensei também trouxera doces, mas a mesa já estava cheia. Os dois passaram um tempo agradável comendo os doces que Seia havia preparado."
2126075441 = "O primeiro passo da conversa"
1977122812 = "Seia desejava ter uma troca de opiniões em pé de igualdade, mas seu título sempre atrapalhava com as alunas comuns. No entanto, com o Sensei não havia problema, e eles se empolgaram conversando sobre livros recomendados. Quando o Sensei ia pegar um livro emprestado na biblioteca, por coincidência, estava emprestado para Seia. Eles foram até o quarto de Seia buscá-lo, e o Sensei acabou carregando uma pilha de livros que ela aproveitou para pegar emprestados de uma vez."
2182579853 = "O passarinho sonhador canta para o futuro ninho"
1084961606 = "À noite, em Trinity, o Sensei encontrou Seia em um parque atraído pelo canto dos pássaros. Quando Seia disse que era boa em cantar, o Sensei pediu para ouvir. Seia recusou, mas ele continuou querendo ouvir. Enquanto explicava por que não cantava, Seia, sem perceber, foi convencida pelo Sensei e acabou apresentando sua voz especialmente para ele."
3549899780 = "Surpreendentemente normal"
2914256145 = "O Sensei, ao visitar Millennium, encontrou Neru. Neru sorriu aliviada ao ser elogiada por ele em seu uniforme. Devido à roupa diferente do habitual, ela foi importunada por uma delinquente que não a reconheceu, mas a fez desistir facilmente. Neru, que normalmente não sofre importunações, pareceu de bom humor por ter tido uma experiência incomum."
1124899584 = "Um feriado tranquilo"
1959760146 = "Neru, agora sem precisar se preocupar com os olhares alheios por estar de uniforme, chamou o Sensei e saiu pela cidade. Enquanto faziam coisas que não podiam fazer normalmente, como em uma lanchonete fast food ou no parque do bairro, Neru, cansada de tanto se divertir, acabou adormecendo encostada no ombro do Sensei. Ao acordar, ela disse estar satisfeita e agradeceu ao Sensei."
857743078 = "Neru e o parque de diversões"
4260659126 = "Neru disse que queria fazer algo extravagante para marcar a última vez que usaria o uniforme. O Sensei a levou a um parque de diversões. Usando uma tiara de mascote e com um doce na mão, Neru aproveitou as atrações e eventos até o horário de fechamento. E, envergonhada, disse ao Sensei que gostaria que ele brincasse com ela assim novamente, se houvesse outra oportunidade de usar o uniforme."
3828496540 = "Uma dieta racional"
1133228369 = "Atendendo a um contato de Rio, o Sensei a acompanhou em uma compra no supermercado. Quando perguntada sobre sua alimentação habitual, Rio respondeu que geralmente comia bentô prontos ou alimentos congelados. Preocupado com sua saúde, o Sensei comprou ingredientes com ela e se ofereceu para cozinhar no Schale. Rio comeu o ensopado feito por ele e, embora tenha dito com frieza que não havia nada de excepcional no sabor, sentiu algo brotar em seu peito."
1657158848 = "Recebendo por procuração"
510653460 = "O Sensei, em vez de Rio, que não queria que seu esconderijo fosse localizado, recebeu uma grande quantidade de encomendas. Quando Rio veio buscá-las mais tarde, ele perguntou o que eram. Ela respondeu que eram peças de máquinas, reagentes experimentais etc., e explicou detalhadamente suas utilidades. Entre elas, Rio disse que, diferentemente das máquinas, as pessoas são insubstituíveis. Particularmente, ela disse que ele era assim para ela, e que ela também queria ser assim para ele, murmurando modestamente antes de ir embora. O Sensei a acompanhou até perto de seu esconderijo."
954826963 = "Design"
2025211439 = "Rio, que não podia fazer em seu esconderijo, pediu emprestada uma sala no Schale e começou a fazer objetos com uma impressora 3D. Quando o Sensei perguntou para que serviriam, ela disse que não tinha um uso específico. Quando ele apontou que era um hobby, ela disse que não havia pensado por esse ângulo e começou a se preocupar, achando que ter um hobby era irracional. No entanto, com a sugestão do Sensei de que poderia considerá-la como uma forma de atividade artística, ela pareceu ficar contente."
1535992005 = "Lugar secreto"
3341491514 = "Rio quis convidar o Sensei para seu esconderijo como retribuição pelo dia anterior. No entanto, não conseguiu terminar a limpeza a tempo e o Sensei chegou ao quarto bagunçado. Ela terminou a limpeza com a ajuda do Sensei, que, vendo-a envergonhada, sugeriu que saíssem para comer. Rio, com várias desculpas, acabou concordando em ir junto."
1595705631 = "Dentro do ônibus"
1148295035 = "Dentro de um ônibus lotado a caminho de Millennium, o Sensei encontrou Asuna por acaso. Por causa de Asuna, que o chamou de 'mestre' em seu uniforme, ele foi suspeito pelas pessoas ao redor e, em uma curva fechada, acabou ficando excessivamente próximo a ela, passando um tempo agitado. Enquanto isso, Asuna parecia se divertir o tempo todo."
2622331350 = "Encontro na loja"
3551192404 = "Desta vez, o Sensei encontrou Asuna na loja de Millennium. Ela parecia indecisa entre comprar pão de melão ou pão de yakissoba para o almoço. No final, decidiram comprar os dois e comer juntos, sentados em um banco da escola, animadamente. Asuna disse que era gostoso porque estava com o Sensei, mas logo ficou satisfeita e o Sensei teve que comer o resto sozinho."
4288139285 = "Encontro inesperado"
1681962777 = "O Sensei encontrou Asuna novamente na cidade. Diante de Asuna, que ficou feliz, achando que era o destino, o Sensei brincou que talvez estivessem ligados por um fio. Levando a sério, Asuna amarrou a fita de seu uniforme no Sensei. Feliz, como se fosse um cachorrinho, Asuna o levou para passear."
312468336 = "O que está procurando"
1018913594 = "Asuna de repente parou de responder no Momotalk. O Sensei, preocupado, foi procurá-la e a encontrou na cidade. Ao ouvir a história, ela havia perdido o celular. Eles o procuraram e o encontraram. Asuna então notou várias chamadas perdidas do Sensei e ficou feliz, dizendo que parecia que ele a estava chamando muito. Ela tirou uma foto da tela e declarou que a guardaria como um tesouro."
3452424088 = "Varrendo folhas caídas"
1225467064 = "Maki estava varrendo folhas caídas como punição por ter feito grafite sem permissão. Enquanto conversava com o Sensei, que viera ajudar, ela expressou seus sentimentos sobre a beleza das folhas de outono. Ao ouvir isso, o Sensei comentou, ingenuamente, que o cabelo de Maki também era bonito, vermelho como as folhas. Sem querer, ela caiu e espalhou as folhas que havia juntado."
1020270808 = "Realidade aumentada"
1998255879 = "O Sensei foi convidado por Maki para subir uma montanha. Embora tenha achado estranho o convite para uma atividade ao ar livre, logo entendeu que era para um jogo de realidade aumentada. Quando o Sensei disse que, já que iam subir, seria um desperdício jogar apenas, Maki se divertiu desenhando com realidade aumentada em um vale solitário que encontraram no caminho, transformando-o em um lugar com folhagens vibrantes, e passaram um tempo agradável."
1001076875 = "O prazer do acampamento"
937583126 = "Maki convidou o Sensei para acampar. Como de costume, era para jogar RA, mas o celular ficou sem bateria. Entediada, Maki percebeu que podia jogar usando a TV portátil do Sensei. Embora tivesse dificuldade com o controle diferente, ela passou a noite se divertindo jogando com o Sensei."
1220767602 = "Cartão de Ano Novo"
4116523058 = "O Sensei visitou um café em Millennium e encontrou Maki preocupada com o design de seu cartão de Ano Novo. Quando Maki perguntou o que fazer para criar um cartão de Ano Novo perfeito para expressar sua gratidão, o Sensei sugeriu que talvez desenhar a coisa mais memorável fosse uma boa ideia. Ao ouvir isso, Miki teve uma ideia. Ela desenhou no cartão o grafite que havia feito com o Sensei e, um pouco envergonhada, entregou-o a ele."
2571587715 = "Tempo de lazer (1)"
1009963351 = "Em seu dia de folga, o Sensei encontrou Sena em um parque. Sena disse que seu hobby era 'ficar de prontidão' e, enquanto apontava os riscos nas ações das pessoas que iam e vinham, passava o tempo. Ela dizia se sentir calma ao organizar documentos em lugares silenciosos, mantendo-se pronta para ir a qualquer cena. Além disso, sentia satisfação em observar o mundo com a tensão do desconhecido. Depois de dizer isso, Sena se aconchegou ao Sensei sob a desculpa do risco de hipotermia e aproveitou um breve 'encontro de prontidão'."
2153313130 = "Tempo de lazer (2)"
663094619 = "Em seu dia de folga, Sena passava o tempo na sala do Departamento de Medicina de Emergência, com o Sensei a acompanhando. Sena disse que, por estar de roupa casual, não estimulava os outros membros, e começou a organizar os medicamentos, um de seus hobbies. Embora parecesse trabalhoso, a organização dos medicamentos era uma atividade que a acalmava. Ela disse que aquele momento, organizando medicamentos enquanto conversava com o Sensei, poderia ser sua 'recompensa' e agradeceu a ele."
1104938304 = "Circulação das correntes superficiais"
574610625 = "O Sensei saiu com Sena, que disse que, por viver uma vida corrida, ainda não havia visto o mar. Ao ver o mar pela primeira vez, Sena confirmou que não havia nenhum paciente por perto e, então, aproveitou um café na praia e um passeio pelo bosque de proteção costeira com o Sensei. Depois, à beira-mar ao pôr do sol, Sena disse: 'As pessoas buscam interesses para preencher suas próprias lacunas'. E murmurou que suas lacunas estavam sendo preenchidas aos poucos ao passar o tempo com o Sensei."
370788532 = "A alegria de ser garçonete"
1282608874 = "O Sensei visitou o café onde Juri trabalhava. Juri, ao saber que o açúcar de confeiteiro estava esgotado, usou balas de glicose da farmácia como substituto, e imediatamente notou que o pão da loja estava vencido, sugerindo um prato recomendado aos clientes após observá-los bem, mostrando habilidade fruto de sua experiência na cantina. O gerente do café, então, sugeriu que Juri participasse do 'Concurso de Garçonete do Mês'."
4047712030 = "A aventura da garçonete"
3916787181 = "Com o incentivo do Sensei, Juri decidiu participar do 'Concurso de Garçonete do Mês'. As provas do concurso eram: um teste de força para levantar vários copos, um jogo de bandeirinhas para testar memória e agilidade para lidar com o horário de pico e, por fim, uma faxina pesada. Juri, mais uma vez usando sua experiência em ambientes pesados, teve um ótimo desempenho. Venceu o concurso e recebeu o troféu e o prêmio."
2608910626 = "O serviço da garçonete"
2837015474 = "O Sensei recebeu um contato de Juri pedindo para escondê-la. Ao ouvir a história, Juri disse que, após vencer o concurso e ser eleita 'Garçonete do Mês', clientes pediam fotos com ela, e até quando andava pela cidade era abordada, sofrendo com sua popularidade excessiva. O Sensei a acolheu na sala de descanso do Schale, acalmou-a e passou um tempo de descanso com ela. Como agradecimento, Juri lhe serviu uma sobremesa especial. O Sensei saboreou o sabor único, salgado porém doce, e eles passaram um tempo agradável juntos."
2027038816 = "E assim a aventura gastronômica começou"
567336352 = "No Ano Novo, Izumi apresentou ao Sensei uma nova combinação gastronômica: 'Menta, Chocolate, Sardinha, Limão e Takoyaki'. O Sensei ficou confuso com a combinação extremamente peculiar. Izumi disse que cada membro da Sociedade de Estudos Gastronômicos buscava a gastronomia à sua maneira, e que ela priorizava encontrar vários sabores. O Sensei, que havia colocado na boca um doce de alcaçuz salgado com amônio e cloreto, prometeu a Izumi que iriam novamente em uma 'aventura gastronômica'."
3074678283 = "Um novo palco"
3604918961 = "O desafio desta aventura gastronômica era o 'Osechi Especial Estilo Izumi', um prato de Ano Novo feito sob medida para ela. O repertório incluía: feijões pretos feitos com chocolate 99% cacau e vinagre, surimi de camarão vermelho e branco feito de morango, e o 'Datemaki Estilo Izumi' feito com tinta de lebre-do-mar (Aplysia) e sorvete. Izumi disse que esperava que ele ansiasse por seus pratos caseiros da próxima vez, e o Sensei sentiu um pouco de apreensão……"
4075335008 = "Prova de felicidade"
871439435 = "O Sensei foi chamado por Izumi, que disse ter uma surpresa especial, e foi a um parque no terraço de um shopping. A surpresa que Izumi lhe mostrou foi um bento caseiro. Ao ver o bento, repleto de cuidado e carinho, o Sensei perguntou se Izumi não ia comer também. Ela respondeu que já era feliz apenas vendo-o comer. Izumi sorriu inocentemente, dizendo que sabia que suas criações eram de sabores estranhos, e por isso queria fazer uma comida que ele pudesse comer com prazer. O Sensei se sentiu revigorado ao ver aquela Izumi."
466460480 = "Trabalho de meio período no estádio"
3298066737 = "Para comprar uma máquina de treino, Sumire começou a trabalhar como vendedora de bebidas em um estádio. Ela explicou ao Sensei que aquele trabalho, que exigia carregar um recipiente de bebidas nas costas e se movimentar, também servia como treino. Com sua habilidade física e simpatia, Sumire se tornou uma lenda no estádio."
1050728220 = "Pacemaker"
1254911399 = "O Sensei, cujo percentual de gordura corporal havia aumentado um pouco, decidiu correr 'levemente' 10 km com Sumire, equipada com seu recipiente de bebidas. Com o suporte de Sumire como pacemaker, ele conseguiu completar a corrida e recebeu uma bebida como recompensa."
678617450 = "Treinamento suspeito"
2311495169 = "Atendendo à sugestão do gerente do estádio onde trabalhava, Sumire ficou responsável por um programa de condicionamento físico para as vendedoras que tinham dificuldade com o pesado recipiente de bebidas. Depois de experimentar o menu criado por Sumire, que repetia 'mais uma série!' infinitamente enquanto carregava o recipiente, as vendedoras foram atacadas por fortes dores musculares."
2415231413 = "Pessoa do momento"
3709190312 = "Seu desempenho como vendedora se tornou assunto, e Sumire foi convidada para uma reunião de uma fabricante de bebidas ansiosa para desenvolver novos produtos. Entre várias propostas, a sugestão de Sumire foi uma bebida proteica. Os funcionários, confusos, mas pressionados pelo entusiasmo de Sumire, acabaram lançando a bebida proteica, que parece ter conquistado seguidores fervorosos."
2197812544 = "Treinando o timing"
3910533066 = "O Sensei, que ouviu Rei dizer que no beisebol o timing é tudo, a levou a um fliperama e sugeriu treinar com jogos de ritmo. Embora iniciante, Rei mostrou talento, obteve uma pontuação alta e se tornou o centro das atenções. No entanto, dizendo 'meu campo de batalha é o beisebol', ela se afastou e foi treinar para um jogo amistoso, mas sofreu uma derrota esmagadora."
3105708523 = "Treinando o controle"
2865627764 = "Para melhorar sua habilidade como rebatedora, Rei tentou aprender sobre arremesso. No entanto, não conseguia progredir. Vendo isso, o Sensei sugeriu vários métodos para melhorar a concentração, como dardos e frisbee. Um transeunte viu a cena de treino e espalhou o estranho boato de que o Sensei estava tratando a aluna como um cachorro."
3920356383 = "A diversão do beisebol"
648984919 = "Rei e o Sensei foram ao estádio assistir a um jogo de beisebol e encontraram uma criança perdida. Vendo a criança que dizia que o beisebol não era nada divertido, Rei lembrou-se de sua própria infância e explicou a alegria do beisebol, que exige esforço constante para vencer. Ao se despedirem da criança que reencontrou sua família, o Sensei disse a Rei que ficou comovido com sua teoria sobre beisebol, e ela ficou envergonhada."
4022262912 = "O que se deixa, o que se herda"
13117381 = "Enquanto faziam a inspeção dos equipamentos do clube de beisebol, o Sensei ficou impressionado ao ver Rei medindo mecanicamente a causa da quebra do equipamento. Foi então que ele encontrou a bola de home run com a qual Rei fez sua primeira captura, uma bola de memória. Rei, relembrando a história daquela bola, disse que um dia gostaria de se tornar para o Sensei algo como aquela 'bola de memória'."
4069028683 = "Novo trabalho de meio período"
1511181025 = "Saori, que começaria a trabalhar como modelo, vestiu um vestido. Como a preparação para a foto foi deixada a cargo do cliente, Saori pediu ao Sensei que a orientasse sobre poses femininas com o vestido e aprendeu a se mover de forma natural, mostrando sua própria essência."
4260467965 = "Aula para dois"
3750933921 = "Atendendo a um contato de Saori, o Sensei foi ao estúdio. Saori teria que fazer fotos dançando, algo que não tinha experiência, e pediu ajuda ao Sensei. O treino de dança, com os dois pegando nas mãos um do outro com um pouco de tensão, tornou-se um momento especial para Saori, e ela sugeriu ao Sensei que gostaria que ele fosse seu parceiro também na hora das fotos."
3551813368 = "Agradecimento"
3505630226 = "Saori, vestida, apareceu no ponto de encontro com o Sensei e atraiu tanta atenção que os dois tiveram que se refugiar no Schale. Para Saori, desanimada com o fracasso, o Sensei não quis deixar seus sentimentos em vão e decidiu cozinhar para ela. Saori, então, entregou-lhe uma revista de moda em que aparecia na capa."
270920992 = "Garota no trem"
481302123 = "Hikari, que encontrou o Sensei em um trem a negócios, rapidamente terminou seu trabalho de verificação de bilhetes e foi brincar no assento dele. O Sensei se debateu com gostosuras picantes e doces azedinhos. Hikari se divertiu até o fim da linha."
3573236808 = "Garota na rua"
1039941372 = "O Sensei encontrou Hikari sentada em uma esquina. Hikari estava observando uma intensa guerra entre colônias de formigas. Enquanto torciam cada uma por seu exército favorito, uma das formigas disparou ácido fórmico que atingiu Hikari. Ela jurou vingança, mas o Sensei a acalmou e foram comer algo gostoso juntos."
864122818 = "Garota em aventura"
1959076383 = "Hikari andava pela rua sob a regra 'partes brancas são pedregulhos, outras partes são lava, então não se pode pisar'. O Sensei, que achou aquilo nostálgico, também participou da 'aventura' e, morrendo oito vezes, conseguiu chegar ao Schale. No entanto, o caminho até a sala era feito apenas de azulejos da mesma cor. O Sensei carregou Hikari, que estava em apuros, e conseguiu voltar."
77436159 = "Garota com dor"
840104479 = "Hikari declarou que dormiria no Schale e, junto com o Sensei, saiu para comer doces. Então, Hikari começou a reclamar de dor de dente. Embora não quisesse ir ao dentista, o Sensei a convenceu: 'Você não gosta de sentir dor o tempo todo, né?' Então, para viver mais, foram juntos ao hospital."
1135383537 = "Garota em chamas"
3749974299 = "O novo desafio de Hikari foi um curry extremamente picante. Hikari disse que era 'invencível, não tem problema', mas, como era de se esperar, debateu-se com o picante. Preocupado, o Sensei comprou leite e sorvete para ela e comeram juntos. Depois, cansada, Hikari adormeceu no colo do Sensei."
3804838142 = "Companhia inesperada"
2397740945 = "O Sensei, um pouco ansioso porque o trem para seu destino atrasou, viu o trem acelerar e chegar no horário. Lá, encontrou a motorista Nozomi, que lhe disse para contatá-la quando terminasse seus afazeres. Ao entardecer, atendendo ao contato, Nozomi convidou o Sensei para a cabine do motorista e juntos apreciaram o pôr do sol."
2105348511 = "'Fofo' está onde menos se espera"
3435927293 = "Nozomi visitou o Schale para entregar um pelúcia do mascote dos Highlanders, 'Shuppo'. Diante de Nozomi, que disse que raramente achava algo fofo, o Sensei tentou extrair sua opinião mostrando vários itens fofos. No entanto, Nozomi riu, achando foda a cena de ele se esforçando, e o Sensei sentiu uma estranha sensação de derrota……"
861160165 = "Lugar inesperado"
3194943073 = "O Sensei encontrou Nozomi por acaso no metrô e eles se empolgaram conversando sobre trens: as diferenças entre trem e metrô, as vantagens de cada um…… e até que um trem marítimo no futuro seria interessante. No entanto, tão empolgados que o Sensei passou do seu destino."
3493759560 = "Ponto fraco inesperado?"
393753210 = "Chegou o dia de Nozomi fazer o plantão no Schale – mas ela, vinda de uma operação noturna, estava com muito sono e não parava de bocejar, cochilando. Preocupado, o Sensei a levou ao sofá, e ela dormiu até a tarde."
4070596837 = "Lado inesperado?"
3708690563 = "Nozomi fazia uma pesquisa de campo para o local da nova linha férrea, e o Sensei a acompanhava. Nozomi, embora dissesse 'só fazer de qualquer jeito', realizava o trabalho com afinco e perguntou: 'O trabalho do Sensei, que escuta as preocupações de várias alunas, também não é difícil?'. Ao ouvir a resposta 'Não é difícil, e agora estou mais preocupado com você, Nozomi', ela achou graça e o arrastou consigo."
3957002931 = "Eu odeio pessoas"
684899898 = "Em uma papelaria, o Sensei encontrou Aoba, que viera comprar papel. Ao ouvir a história, ela disse que em Highlander as solicitações de verba dificilmente eram aprovadas, então ela comprava quase tudo do próprio bolso. Vendo a raiva silenciosa de Aoba, o Sensei decidiu comprar todo o material de escritório necessário. Aoba, confusa, agradeceu várias vezes e foi embora."
460531770 = "Eu odeio este mundo"
1037671752 = "O Sensei se encontrou com Aoba para ajudá-la a consertar um semáforo, mas ficou surpreso ao vê-la bater no semáforo com uma chave de cano. 'Sempre fiz assim……', disse ela, continuando a bater. No final, ela conseguiu consertar sozinha, e Aoba agradeceu profundamente ao Sensei por ter vindo atendê-la."
131885223 = "Eu odeio estar sozinha"
2053823937 = "Aoba correu para o Schale porque a cafeteira do Sensei havia quebrado. Como bater com a chave de cano não resolveu, ela tentou o 'Plano B' e desmontou a máquina – após muito esforço, conseguiu consertá-la. Feliz por poder retribuir um pouco, o Sensei disse que a convidaria para uma refeição deliciosa como agradecimento. Aoba ficou tão surpresa e feliz que começou a chorar."
2236263247 = "Eu odeio este mundo (sem você)"
1145911904 = "O Sensei foi ao encontro de Aoba, que disse que talvez teria que ficar acordada a noite toda devido à correria. Lá, ele vestiu um macacão de trabalho e, juntos, fizeram o trabalho acumulado. Após terminarem, no caminho de volta, houve um pequeno incidente em que os dois se encontraram no vestiário enquanto se trocavam. Aoba então disse que antes não costumava esperar nada do dia seguinte, mas agora era diferente."
3377242249 = "A tranquila Fuuka"
213706836 = "Ao ouvir que Fuuka havia 'renascido', o Sensei foi a Hyakkiyako. Lá, Fuuka atuava como guia turístico. No entanto, o cão famoso da Vila de Cinema Uzumaki, 'Mini Shibakura', não estava, e ela ficou agitada. Com o apoio do Sensei, Fuuka se acalmou e conseguiu levar o passeio a bom termo."
293675733 = "A lei da guia de elite"
2294953606 = "O Sensei também participou de um tour de ônibus guiado por Fuuka. O passeio corria bem – ou assim parecia, até que Fuuka percebeu que havia deixado um dos turistas para trás e entrou em pânico. O Sensei, que foi buscá-lo, sugeriu um 'tour de táxi', resolvendo a situação, e o passeio terminou sem problemas."
1021576815 = "Crônica da guia remanescente"
4191579066 = "O Sensei também assistiu à versão teatral de 'Ninkyō Nyan Nyan Densetsu' durante o tour. No início, Fuuka explicava calmamente os antecedentes aos turistas, mas, no clímax, seu espírito yakuzinha se agitou e ela torceu pela protagonista com todas as forças. Embora tenha se arrependido, os espectadores interpretaram como um 'teatro imersivo', e os atores receberam calorosamente seu fervoroso espírito. Assim, tanto o teatro quanto o tour chegaram ao fim."
485845832 = "Um pedido irrecusável"
396056727 = "O Sensei, que participava do tour, notou Fuuka cansada por medo de errar e sugeriu que descansasse no ônibus. Os dois passaram um breve momento de descanso. Um pouco recuperada, Fuuka foi receber os turistas que voltavam – mas ela havia esquecido os sapatos dentro do carro e tentou disfarçar para não perceberem."
2017163321 = "Tiro ao estilo Hagi Tsukiyono"
3748909057 = "O Sensei, que visitava Hyakkiyako, decidiu assistir ao treino de tiro de Nagusa. Embora Nagusa fosse modesta, sua habilidade de acertar vários alvos em um instante era digna do título de presidente do comitê."
2776714076 = "Como transmitir sentimentos"
2721592094 = "Nagusa ajudou em uma barraca de yakitori no festival de Hyakkiyako. Ela tentou recusar o convite para a comemoração, dizendo que seria um incômodo, mas, encorajada pelo Sensei, acabou passando um tempo agradável."
1303559620 = "A madrugada alcançada"
4177383325 = "Nagusa e o Sensei saíram para a patrulha noturna. Após uma noite agitada lidando com moradores bêbados e o Chimimouryou, os dois descansaram na varanda de uma cafeteria e esperaram o amanhecer."
3538513012 = "O verão da Mulher da Neve"
3940670190 = "No caminho para o Schale, Nagusa sofreu uma insolação. Ao ouvir a história, ela é sensível ao calor e quando criança era chamada de 'Mulher da Neve'. Para Nagusa, que pensava na Mulher da Neve das histórias, que sempre tem um fim infeliz, o Sensei disse: 'Com certeza, ela terá um final feliz'."
1857080174 = "As nuvens da liberdade fluem no céu"
1703313119 = "Atendendo a um contato de Niya, o Sensei fugia dos 'perseguidores' enquanto aproveitava o festival de Hyakkiyako. No entanto, os perseguidores eram as kouhais do Departamento de Yin-Yang que estavam atrás de Niya, que havia fugido do trabalho."
2166596309 = "A grande árvore finca raízes em terra firme"
3368760628 = "O Sensei, enganado por Niya e convenientemente chamado pelo Departamento de Yin-Yang, testemunhou o trabalho de Niya, que driblava os pedidos dos visitantes com evasivas. Para o Sensei, um pouco apreensivo, Niya falou sobre a posição ambígua do Departamento de Yin-Yang e então foi embora na direção oposta à sala do clube."
2675210607 = "Ira imensa, que abala céu e terra"
3511750147 = "Enganado por Niya não uma, não duas, mas três vezes, o Sensei finalmente perdeu a paciência e decidiu dar uma bronca. Até Niya pareceu arrependida."
2298096427 = "O céu e a terra estão simplesmente ali"
1685493795 = "Ao visitar Hyakkiyako, o Sensei percebeu que todos os problemas que Niya havia deixado de lado estavam resolvidos. Niya disse que foi por acaso, mas o Sensei, percebendo seu esforço, a acariciou sem piedade."
576779580 = "Céu, terra e a harmonia do mundo"
2896739033 = "Niya falou sobre seu plano de 'conquistar o mundo' que dominaria Kivotos e convidou o Sensei para se aliar – mas tudo não passava de uma encenação. Niya disse que queria mostrar a fragilidade do Departamento de Yin-Yang e de Hyakkiyako. O Sensei respondeu: 'Com você por perto, isso não aconteceria'. Niya, um pouco confusa, desviou o assunto com seu tom habitual."
3509570812 = "1ª hora 'Aula especial: meios'"
3314544887 = "O Sensei, chamado repentinamente para um café de doces, preocupou-se se Natsu não estaria estressada por causa das atividades da banda. Natsu negou, mas murmurou que, se fosse um motivo para comer doces com o Sensei, talvez fosse aceitável."
1495423261 = "2ª hora 'Aula extracurricular: arte'"
2178381226 = "Sentindo-se estagnada na prática de bateria, Natsu convidou o Sensei para um filme. Natsu planejava aproveitar a pipoca que o Sensei compraria, mas ficou tão concentrada no filme que esqueceu de comer. O Sensei pegou a pipoca de Natsu e voltou ao trabalho do Schale."
620711550 = "3ª hora 'Limpeza: convidado indesejado'"
4092712805 = "O Sensei correu para a sala de prática e viu Natsu procurando 'aquela coisa' preta e que farfalhava. A coisa era apenas uma bola de poeira, mas durante a busca, eles desmontaram a bateria e não puderam mais praticar. O Sensei decidiu ajudar Natsu a remontá-la."
2301529882 = "Pós-aula 'Batida'"
315387308 = "Enquanto trabalhava até tarde da noite, o Sensei foi caminhar perto de um rio para se manter acordado e encontrou Natsu correndo. Quando pararam para descansar em um banco, o Sensei acabou adormecendo encostado no ombro de Natsu, e o ritmo de seu coração acelerou."
1814572470 = "Como convocar a estrategista"
2794412546 = "O Sensei convidou Kikyou, de maiô, que estava prestes a se refrescar em uma piscina dentro do terreno do clube, para ir ao mar. Aparentemente fria, Kikyou aceitou e verificou sua agenda – mas parecia estar de bom humor."
3642360920 = "Não me solte"
3203760916 = "Kikyou, que chegou ao mar, lia um livro sob um guarda-sol e relutava em entrar na água. Depois, com a condição 'só até a cintura', ela começou a aproveitar o mar acompanhada pelo Sensei. Quando ele sugeriu que fossem ver uma tartaruga em um local um pouco mais fundo, Kikyou recusou, mas acabou sendo carregada no colo."
966573027 = "O castelo do coração"
917139257 = "Kikyou, que disse que talvez estivesse começando a se acostumar com a água depois de aproveitar o banho de mar, como recompensa por ter sido acompanhada, enterrou o Sensei vivo em um castelo de areia. Enterrado na areia, o Sensei ouviu o passado de Kikyou, que costumava brincar de fazer planos com castelos de areia e bonecos. Então, ele saltou da areia e fizeram castelos de areia juntos, criando memórias."
132303795 = "O estratagema da estrategista"
23283600 = "Para superar seu medo de água, Kikyou tentou entrar até a altura do peito. O Sensei a ajudou e, como agradecimento, ela o levou a uma área de descanso especialmente preparada. Lá, embalados por uma rede, os dois passaram um momento de lazer."
1547258117 = "Maiô e poder defensivo"
434592321 = "O Sensei encontrou Renge na cachoeira, onde ela disse que iria treinar de maiô. Então, ambos vestiram maiô e se deixaram cair pela cachoeira – Renge sentiu seu poder defensivo do coração aumentar ao usar o maiô, mas o Sensei acabou perdendo o maiô devido à força da queda. Com a ajuda de Renge para recuperar o maiô, os dois continuaram o treino de cachoeira da juventude."
3063254359 = "Maiô e ilha deserta"
3609000771 = "O segundo treino de maiô foi de sobrevivência em uma ilha deserta! Assim, Renge e o Sensei passaram um tempo juntos na costa de uma certa ilha. Eles tentaram pescar com uma rede de arrasto, dividiram os peixes que pegaram e aproveitaram momentos juvenis. Depois de descansar, Renge sugeriu que escapassem da ilha em uma jangada caseira, e o Sensei que a acompanhou ficou impossibilitado de se mover devido a dores musculares."
379850169 = "Maiô e fogueira"
3634384642 = "Renge empilhou a lenha em forma de dragão na costa e realizou uma fogueira juvenil. No entanto, o fogo queimou mais do que o esperado, e Renge e o Sensei, sentindo o perigo, apressaram-se para apagá-lo. Enquanto limpava a fuligem do rosto do Sensei, Renge ficou um pouco tensa por estar tão perto dele. O Sensei também sentiu que 'talvez este momento seja a verdadeira juventude'."
1794123967 = "Maiô e juventude"
1511540975 = "Renge chamou o Sensei à costa para compensar o erro da fogueira. A atividade juvenil que ela propôs foi aproveitar os vaga-lumes de papel (incenso). Renge aprendeu que a chama da juventude não precisa ser algo grandioso. Os dois, contemplando os pequenos vaga-lumes de papel, passaram por uma atividade juvenil gratificante."
369192515 = "É a vestimenta formal do mar!"
641107269 = "O Sensei levou Yukari, que estava em dúvida sobre como se divertir no mar, a uma loja de maiôs. Yukari, após escolher um maiô entre os expostos, ficou envergonhada – mas depois gostou, achou que era fácil de se mover e quis sair pela cidade. O Sensei a impediu apressadamente."
3133637421 = "Para não envergonhar a Hagi Tsukiyono"
2973505214 = "Yukari disse que queria mostrar uma natação elegante no mar, então o Sensei decidiu dar aulas de natação na piscina. No entanto, os empregados da família Kadenokoji, achando que expor a pele em público era inaceitável, reservaram a piscina exclusivamente para os dois. Yukari, animada por poderem ficar a sós, sentiu-se culpada pelos outros clientes que queriam usar a piscina e decidiu abri-la gratuitamente, sem fazer a reserva exclusiva."
1888195363 = "Desabrochando sob as águas"
2096152043 = "No tão esperado dia de ir ao mar, Yukari não apareceu no ponto de encontro. O Sensei, vendo algo se mover no mar e pensando que ela pudesse estar se afogando, mergulhou e encontrou Yukari contemplando o recife de corais. Confirmando que ela estava bem, os dois aproveitaram o banho de mar até o anoitecer."
1323673361 = "Mar de verão, mar tranquilo"
1906389428 = "O Sensei encontrou Yukari contemplando o mar noturno no caminho de volta das compras. Yukari disse que não se arrependia de ter quebrado as rígidas regras da família Kadenokoji e mergulhado no mar. Ela percebia a mudança em seu coração entre o mar barulhento do dia e o mar silencioso da noite."
363125217 = "O que muda"
2410063721 = "O Sensei, que recebera um contato 'urgente', foi recebido por Seia, que dirigia um carro esporte com desenvoltura. Eles pegaram o carro e partiram para um passeio à beira-mar. Quando o Sensei atendeu um pouco ao desejo de Seia de 'ser repreendida por fazer loucuras', ela sorriu silenciosamente."
2540853788 = "Além da estagnação"
3025604214 = "Seia visitou o Schale de maiô. O Sensei respondeu positivamente ao maiô e ao fato de ela ter vindo mostrá-lo – mas Seia, pensando algo sobre sua resposta, subiu em seu colo e começou a ajudá-lo no trabalho."
817970610 = "O último momento"
106349387 = "O Sensei foi encontrar Seia, que lhe enviou uma mensagem dizendo 'o último momento está próximo……'. Seia queria gravar sua imagem de maiô na memória do Sensei antes de guardá-los naquele dia. No entanto, mesmo mostrando o maiô, o Sensei não ficou nem um pouco perturbado. Um pouco contrariada, Seia trancou a porta e, ao capricho, bagunçou o Sensei confuso."
1154864129 = "Em busca da distância confortável"
1908728470 = "Seia 'se gabou' para o Sensei de que agora conseguia interagir com Mika e Nagisa de forma mais relaxada do que antes, e que, embora as trocas de ironias tivessem aumentado, elas se aproximaram. O Sensei ficou muito feliz, mas Seia, para também encontrar a distância confortável com ele, o levou para um passeio de carro."
2635062949 = "O mar não espera"
2438056735 = "Hasumi teria que ir ao mar para uma atividade do Comitê de Justiça. No entanto, enquanto dava tempo livre às suas kouhais, Hasumi montou uma agenda cheia para si mesma. Preocupado, o Sensei sugeriu que fossem comprar um maiô, e Hasumi, com uma expressão de determinação, disse 'me dê uma semana!' e foi embora."
2114293561 = "Dia da batalha decisiva"
1066108086 = "Hasumi e o Sensei se encontraram em um shopping nos arredores. Hasumi foi a uma loja da grife 'Veronica' e começou a escolher um maiô com eficiência – mas tinha dificuldade para encontrar um que lhe servisse. Determinada, Hasumi comprou um maiô no limite do tamanho e prometeu dar um jeito no corpo até o dia combinado!"
2390402921 = "À beira-mar"
604123590 = "Hasumi, envergonhada, mostrou-se ao Sensei que visitara a praia. O Sensei brincou com ela de fazer castelo de areia, enterrá-lo na areia e quebrar melancia, mas no meio do caminho Hasumi ficou sem energia com fome. O Sensei a levou a uma barraca de praia, convidou-a para jantar e passaram um agradável momento de verão."
4193449856 = "Pássaro preto no céu de verão"
1701157930 = "O Sensei chamou Hasumi à praia noturna e tirou um kit de fogos de artifício. Hasumi percebeu que as brincadeiras que tiveram até então e os fogos finais eram sua 'Lista de Desejos' de antes. Ela sorriu: 'Jamais esquecerei tudo o que aconteceu neste verão'."
771755189 = "Surfista de negócios"
3687845316 = "Ichika, que após o trabalho caminhava sem rumo pela praia, foi incentivada pelo Sensei a participar de uma aula de surfe. Ela mostrou habilidades excepcionais, diferentes do Sensei, e acabou participando de uma competição, mas parecia não estar aproveitando as férias de coração."
3124259672 = "Garota anônima"
4085102234 = "Ichika encontrou o Sensei no mar noturno e disse: 'O mar é apenas uma paisagem um pouco diferente, não consigo aproveitá-lo muito', confessando sua culpa por estar no mar enquanto suas kouhais não. O Sensei agradeceu por ela ter sido honesta, mas Ichika lamentou que o passeio noturno tivesse se transformado em uma conversa de avaliação."
682336343 = "Garota danada"
459649916 = "Ichika reencontrou o Sensei no mar noturno e pediu que ele esquecesse o ocorrido do dia anterior, pois era vergonhoso. O Sensei respondeu: 'Aceito você de qualquer forma', e Ichika se aproximou dele, dizendo que ele era um 'cara perigoso'. Arrependida de ter exagerado, ela disse, envergonhada, que gostaria de conversar outra hora."
2854468149 = "Garota de déjà vu"
2261893853 = "Ichika reencontrou o Sensei e falou sobre seu arrependimento por ter se aproximado dele e seu desejo de não ser uma 'aluna problemática'. O Sensei respondeu novamente que ela não precisava esconder seus sentimentos, e Ichika decidiu ser um pouco mais honesta, dizendo: 'Tudo é responsabilidade sua, Sensei'."
1190427539 = "Pedido secreto"
630241773 = "O Sensei, chamado secretamente por Nagisa, visitou sua barraca sem ser visto por ninguém. Sua recompensa por atender ao pedido de terminar o trabalho sem que os outros membros soubessem foi um cheesecake, chá e palavras de agradecimento."
3463352267 = "Nagisa flutuando na água"
507788461 = "O Sensei foi à barraca designada por Nagisa. Lá, estavam lotados os equipamentos de esportes aquáticos que Nagisa havia preparado para todos se divertirem. O Sensei tentou surfar, mas não conseguia equilíbrio. Então Nagisa apareceu, desfrutando elegantemente de uma hora do chá sobre o mar, e ele decidiu se aquecer tomando uma sopa quente com ela."
615810610 = "Asas tingidas pelo pôr do sol"
1648534831 = "O Sensei, tendo recebido uma mensagem sugestiva, foi procurar Nagisa e a encontrou caminhando sem rumo, banhada pelo pôr do sol. Nagisa disse que, embora não hesitasse em voltar à rotina, sentia-se um pouco nostálgica. No entanto, ao ouvir do Sensei que 'o mesmo dia nunca mais voltará', ela voltou para casa, ansiosa pelos dias em que poderia caminhar novamente com ele."
4117624418 = "À beira d'água, com você e os peixes"
913912189 = "O Sensei, chamado à piscina exclusiva da Tea Party, ficou surpreso ao ver peixes nadando dentro dela. Nagisa, que já sentia saudades do mar, soltou os peixes na piscina e pensou em pescar enquanto trabalhava. O Sensei decidiu pescar elegantemente com ela."
2646804362 = "Eu que nem eu mesma conheço"
3097604370 = "Enquanto conversavam sobre os vários lados dos membros da Tea Party, Mika ria, dizendo que continuava sendo a aluna problema. Então, o Sensei começou a falar sobre a atração de Mika que nem ela mesma conhecia. Mika, confusa, ficou feliz com suas palavras."
2695761252 = "Continuação da aula"
4096458443 = "Mika encontrou o Sensei na praia e começou a falar sobre a aula de natação que tiveram antes. Disse que terminou no meio, que havia consertado o maiô da época e pretendia trazê-lo. O Sensei e Mika continuaram a aula e passaram um tempo agradável."
3789006869 = "O que brilha na praia"
3563536444 = "Mika recolhia lindas conchas caídas na praia e as mostrava ao Sensei. Vendo Mika, que disse que sempre gostou de colecionar acessórios, o Sensei sentiu que ela estava agindo de forma mais livre do que antes."
178386077 = "De mim, que comecei a andar……"
1675488441 = "Atendendo a um estranho Momotalk, o Sensei foi até Mika. Lá, uma Mika molenga o esperava. 'Eu pensava que era uma princesa, mas na verdade sou uma garota muito má……', ela confessou seus sentimentos. O Sensei, percebendo que ela estava fingindo estar bêbada, a aconselhou gentilmente que o tempo que ela passou se preocupando a sustentaria."
3158159065 = "Para mim mesma um dia"
2427872078 = "Mika convidou o Sensei para um passeio noturno e o levou a um lugar. O destino era um céu estrelado. 'Vou me esforçar para ser feliz' – disse Mika, um pouco sem graça, e o Sensei respondeu: 'Estarei sempre observando'."
1060031334 = "Já está tudo bem"
1396743755 = "Mika tentou oferecer ao Sensei um sanduíche caseiro. Embora transparecesse seu esforço, o sabor era muito peculiar. O Sensei sentiu o sólido crescimento de Mika ao vê-la pensar em fazer melhor da próxima vez, sem se deixar abater."
873198059 = "Desenho mágico"
2832478109 = "Seguindo a orientação das cartas de tarô, Eri desenhava com força. O Sensei, que havia ficado apreensivo com o processo intenso, não pôde deixar de se maravilhar com o resultado final."
580036155 = "Chapéu mágico"
4207047849 = "Antes de uma prova prática de pintura, Eri estava desanimada, pois era proibido trazer o chapéu mágico. Para Eri, que se envergonhava, dizendo que tirar o chapéu era como ficar nua, o Sensei enviou uma torcida."
269259800 = "Recarga de mana"
1093511634 = "Eri, desesperada por não ter ido bem nas provas. Para mudar de ares, o Sensei a levou a vários lugares: um restaurante de lámen, uma biblioteca, etc., recarregando sua mana. Foi então que Eri contou a ele o que a fez querer desenhar seus próprios quadros."
2775257787 = "Pintora mágica"
1616638842 = "Para ganhar confiança, Eri desenhou um retrato do Sensei ao ar livre. Enquanto outros alunos da Wild Hunt se reuniam como plateia, Eri, sem sucumbir à tensão, lembrou-se de quando costumava se concentrar puramente na tela e traçou o retrato. O retrato finalizado era magnífico e repleto do estilo de Eri."
2923077435 = "Poção especial"
3141729267 = "Kanoe afirmava que ela e o Sensei estavam ligados por um forte vínculo desde uma vida passada. Para fazer reviver essa memória, ela fez uma poção especial…… um ensopado. O Sensei ficou comovido com o sabor nostálgico e caseiro. No entanto, as memórias da vida passada não voltaram."
2137805982 = "Voz de uma garota"
3484255803 = "Quem ligou para o Sensei um certo dia era uma aluna muito fofa e tímida. O Sensei, confuso com a aluna que dizia ter sentimentos secretos por ele, combinou de se encontrar em um parque próximo. No entanto, Kanoe estava lá, e ela revelou que era especialista em dublagem."
3504361213 = "Convite repentino"
569922205 = "O Sensei foi assistente de gravação a pedido de Kanoe. Durante o processo, ela confessou que, embora geralmente interpretasse uma personagem oculta, podia emitir uma voz fofa. Isso também era uma armadilha de Kanoe, mas o Sensei ficou muito perturbado até que a verdade fosse revelada."
3140711198 = "Essa…… não sou eu"
692979208 = "Kanoe disse para ele ignorá-la naquele dia. Desconfiado, o Sensei seguiu sua rotina habitual. No entanto, Kanoe estava sempre no canto de sua visão. Ela disse que um ser idêntico a ela havia saído do controle, mas a verdade se dissolveu nas sombras……"
893011042 = "O mar é chato"
2775898959 = "Misaki, entediada, dizia que tudo no mar era chato. O Sensei então a orientou intensamente na natação. Mesmo achando irritante, Misaki acabou correspondendo."
2316153298 = "Brincar na areia também é chato"
3214330542 = "Com a hábil persuasão do Sensei, Misaki se envolveu cada vez mais na construção de um castelo de areia. Irritada por ter sido enganada por ele, ela parecia, no entanto, satisfeita. Mas o castelo foi levado pelas ondas e desmoronou…… Misaki disse que foi tudo em vão, mas o Sensei negou e mostrou as fotos que havia tirado. Surpresa, Misaki exigiu que ele apagasse."
3725758721 = "Até banho de sol…… é chato"
371852196 = "Misaki iria tomar banho de sol com o Sensei. No entanto, começou a chover. Depois que a chuva parou, o Sensei tentou novamente o banho de sol, declarando que, mesmo sem efeitos concretos, as memórias com Misaki permaneceriam. Sorrindo silenciosamente, Misaki o acompanhou."
2816193451 = "Crônica escrita na prisão"
1264857227 = "Miyo visitou o Schale para seu plantão. Para Miyo, que falava sobre sua vida escolar opressiva, o Sensei ofereceu a sala de descanso para que pudesse se concentrar na escrita. Absorvida em um romance grandioso com tanques de guerra, Miyo acabou falando as falas em voz alta. Tudo presenciado pelo Sensei, ela fugiu do Schale tamanha vergonha."
68793642 = "Enquanto aguarda a estreia"
2671887121 = "No caminho de volta da Wild Hunt, o Sensei encontrou Miyo. Miyo recebera uma proposta de uma editora para estrear como romancista e eles foram juntos à reunião. No entanto, o contrato apresentado era fraudulento, exigindo que ela arcasse com todos os custos de publicação. Miyo percebeu e cancelou o contrato, mas ficou abatida por seu talento para detectar crimes. O Sensei a encorajou, dizendo que era justamente por ter esse talento que ela podia escolher o caminho certo, e Miyo recuperou um pouco o ânimo."
2557024663 = "……Não pode, né?"
3519156172 = "Miyo chamou o Sensei para ajudá-la no trabalho da Unidade de Comércio Especial. No entanto, havia um segredo. Enquanto percorriam uma loja de antiguidades, Miyo confessou que na verdade queria vê-lo, e então o convidou um pouco à força e aproveitou um encontro a sós com ele."
2786778582 = "A partir do fim do sonho"
1676221675 = "Cansado do trabalho na Wild Hunt, o Sensei acabou cochilando em um centro de informações artísticas. Ao acordar, encontrou Miyo. Embora emburrada por ele não ter contatado, ela ficou feliz por encontrá-lo. No entanto, como ela sabia exatamente onde ele estava permaneceu um mistério……"
3343832747 = "O que se vê dos destroços"
2179798071 = "No caminho de volta do trabalho, o Sensei se deparou com uma explosão. A responsável era Fuyu, e descobriu-se que era uma performance de mídia artística. Para o Sensei que perdeu a apresentação, Fuyu sugeriu que ele imaginasse o conteúdo pelos destroços. Compreendendo a intenção, o Sensei a ajudou a limpar a bagunça para entender a performance, e Fuyu, rindo, agradeceu."
2022325598 = "Pagamento doce"
2395350468 = "O Sensei, em busca de um robô transformável descontinuado, encontrou Fuyu por acaso. Como gerente de vendas da Unidade de Comércio Especial, Fuyu se encarregou de conseguir o robô. O 'pagamento' que ela pediu foi um encontro: jantar, cinema e um café de doces. O Sensei aceitou prontamente e eles passaram um tempo agradável. Dias depois, o robô foi entregue ao Schale conforme combinado."
2248687503 = "Tentativa de recrutamento"
676795709 = "Fuyu apareceu no Schale para uma 'negociação', mesmo não estando de plantão. Ela fez uma apresentação entusiasmada para tentar tornar o Sensei um consultor externo da Unidade de Comércio Especial. O Sensei recusou, mas mostrou interesse na proposta de Fuyu de se encontrarem todos os dias. Embora não tenha conseguido torná-lo consultor, Fuyu pareceu não se importar com a reação do Sensei."
1930836459 = "O espaço de Fuyu"
2809147120 = "O Sensei visitou a exposição individual de Fuyu e apreciou as obras com comentários da própria artista. Para o Sensei (e Fuyu), que estavam com fome, Fuyu o levou aos bastidores, atrás de uma tela. Aquele era um espaço a sós, onde apenas os artistas podiam entrar. Fuyu pegou um bento caseiro e eles comeram juntos."
1502347368 = "A pedra falou!"
4128293753 = "Ritsu, que deveria estar de plantão, não apareceu, deixando o Sensei desconfiado. Ritsu estava fazendo uma escultura no jardim do Schale, dizendo que 'a rocha pediu'. O Sensei ajudou-a, dando carona, e eles decidiram expor a obra terminada no jardim para que muitas pessoas pudessem ver. Ritsu ficou feliz, mas depois soube que não poderia escapar do trabalho de plantão, e ficou desanimada."
796096285 = "Assim é mais rápido!"
522223915 = "Ritsu apareceu na janela diante do Sensei trabalhando. Como forma de se desculpar por ter sujado a roupa durante a escultura, ela lhe deu de presente uma camisa nova feita por uma amiga. Quando o Sensei se trocou, Ritsu já fez planos para o próximo passeio, para comprar uma calça que combinasse com a camisa."
2906320075 = "Sozinha não dá!"
4216584449 = "Ritsu convidou o Sensei para sair para comprar roupas. Enquanto Ritsu se ausentou, o Sensei foi alvo de venda casada de um vendedor suspeito. No entanto, quando Ritsu voltou e foi chamada de 'anego', a atitude do vendedor mudou completamente. O Sensei descobriu a influência surpreendente de Ritsu nesse meio."
3991968548 = "A sós no subsolo"
1266463055 = "A convite de Ritsu, o Sensei visitou as ruínas subterrâneas da Wild Hunt. Em seu interior, havia um reservatório subterrâneo belo como um templo. Ritsu disse que queria mostrar aquela paisagem ao Sensei. Os dois mergulharam os pés na água e passaram um tempo tranquilo em um lugar secreto que ninguém conhecia."
1176354905 = "Oi de novo, Reisa"
434693070 = "Reisa finalmente conseguiu o cobiçado traje de garota mágica. No entanto, a roupa tinha um defeito…… Reisa pediu ajuda ao Sensei."
3111312789 = "Confiável, né, Reisa"
4144458315 = "Reisa e o Sensei foram patrulhar um evento exclusivo de garotas mágicas. Os dois aproveitaram o evento ao máximo."
28470914 = "Fofa, né, Reisa"
812871968 = "O conteúdo do armário ficou todo encharcado, e Reisa só tinha a fantasia de garota mágica para vestir. Então, ela foi com o Sensei comprar roupas."
2150011728 = "Legal, né, Reisa"
773207179 = "O zíper quebrou novamente e Reisa não conseguia tirar a roupa. Como já era hora da patrulha, ela teve que ir com a fantasia de garota mágica."
1588313903 = "A patrulha mágica de Trinity"
4130055309 = "O Sensei, que fazia ronda no Schale durante o plantão noturno, encontrou Suzumi no vestiário iluminado, experimentando uma roupa mágica. Surpresa com a situação inesperada, Suzumi explicou que era uma missão da patrulha e pediu que ele guardasse segredo."
3941215133 = "Tão imponente que ofusca os olhos"
4143536593 = "O Sensei, que descansava em um parque, encontrou Suzumi cercada por um grande número de delinquentes. Para ajudá-la, em apuros, ele teve uma ideia original: Suzumi trocaria de roupa e ele se fingiria de fotógrafo. Os delinquentes, surpresos com a cena, evitaram o Sensei, e os dois conseguiram sair do parque ilesos."
1439493213 = "O caso do sinalizador que não funcionou"
276851656 = "Atendendo a uma denúncia de que havia delinquentes estragando um evento de doujinshi, o Sensei e Suzumi foram ao local. Levando a sério o conselho do Sensei, Suzumi apareceu vestida de Thermite White para uma investigação disfarçada e tornou-se popular instantaneamente. Depois, ela encontrou uma delinquente incomodando um fã e a subjugou com a proeza de esmagar o sinalizador com a mão nua."
3995005634 = "O brilho que persegui"
3528511121 = "A convite de Suzumi, o Sensei foi com ela a um parque de diversões. No entanto, Suzumi só tinha a fantasia de garota mágica para vestir, pois havia errado na lavagem. Depois de aproveitarem o parque, enquanto assistiam a um show de heróis, Suzumi disse, um pouco triste, que as pessoas procuram heróis justamente porque eles não existem. O Sensei então lhe disse que ela mesma era uma heroína."
2609778606 = "Visita da líder"
1761341386 = "Quando Love passava em frente ao Schale e o contatou, o Sensei correu para fora do escritório e a recebeu calorosamente. Para Love, que se preocupava se estava tudo bem estar com uma delinquente, o Sensei disse que ela era realmente uma garota gentil e começou a guiá-la pelo Schale. Embora confusa, Love passou um tempo agradável com ele."
2738523287 = "O peso da líder"
1476327715 = "Love veio com o Sensei comprar material para limpar seus capacetes. No entanto, acabaram se envolvendo em uma briga com marginais. Love os derrotou com sua habilidade esmagadora, confundindo-os com capacete na arma e rebatendo granadas com um taco. Impressionado, o Sensei elogiou Love, que ficou envergonhada."
2583374591 = "A força da líder"
2742294773 = "Atendendo a um chamado de Love, o Sensei correu a todo vapor para o Mercado Negro. Lá, havia uma máquina de venda automática superbarata onde dava para comprar refrigerante por 20 ienes cada. Love pagou um refrigerante para ele, mas teve dificuldade para abrir a tampa dura. Quando o Sensei abriu facilmente, ela ficou envergonhada por não ter força na pegada e fugiu."
3932714589 = "A gentileza da líder"
3081987240 = "Love encontrou filhotes de pato caídos em um bueiro e os salvou, sem hesitar em se molhar. Vendo aquela figura forte e adulta, o Sensei comentou que ela não parecia uma aluna. Love levou ao pé da letra e, confusa, assustou-se. O mal-entendido foi resolvido, mas logo em seguida, ao ser informada de que estava usando o capacete que havia encharcado no bueiro, Love ficou envergonhada e fugiu novamente."
2205914050 = "A sênior de todos"
2952764417 = "O Sensei viu Subaru mediando uma 'discussão' entre alunas e elogiou seu crescimento. No entanto, Subaru confessou que se preocupava com sua própria impotência, pois não conseguia resolver a raiz dos problemas. O Sensei disse que podia conversar sempre que quisesse, mas Subaru provocou, dizendo que era o 'jeito do Sensei de mimar as alunas'."
1122650249 = "O primeiro passo"
1189264743 = "O Sensei recebeu calorosamente Subaru, que estava nervosa para seu primeiro plantão no Schale. Durante o intervalo, Subaru confessou suas dificuldades com o mundo exterior e seus sentimentos contraditórios em relação a Trinity, entre amor e ódio. O Sensei a aconselhou gentilmente e disse para confiar nele quando não pudesse suportar. Ouvindo isso, a tensão que Subaru vinha segurando se rompeu, e ela não conseguiu conter as lágrimas."
3342179099 = "Experiência social"
1014525569 = "Subaru começou a trabalhar meio período em uma maid café como aprendizado social. O Sensei a encontrou segurando uma placa e, com sua ajuda, ela fez uma pausa dentro da loja. No entanto, apareceu um cliente inconveniente que incomodava as outras funcionárias, e Subaru o subjugou instantaneamente com sua habilidade de combate corpo a corpo. O gerente e os outros clientes aplaudiram. Dias depois, Subaru recebeu um pagamento adicional."
3576703723 = "Harmônica do entardecer"
1199266629 = "O Sensei perguntou a Subaru se ela queria algo, e soube que ela queria uma partitura de harmônica. Eles foram juntos a um shopping e, após conseguirem a partitura, Subaru confessou sua preocupação por buscar sempre a 'resposta perfeita'. Encorajada pelas palavras do Sensei, Subaru começou a tocar harmônica apenas para ele, na margem do rio ao entardecer."
1525996144 = "A garota que dá"
2647108977 = "Para recompensar Subaru, que era muito gentil com suas kouhais, o Sensei a levou a uma lanchonete familiar. Depois, enquanto passeavam pela cidade, Subaru se deparou com o heavy metal e se sentiu fortemente atraída por suas letras destrutivas. Quando o Sensei perguntou se ela queria acabar com o mundo, Subaru respondeu: 'Você só precisa me convencer de que este mundo é bom', confiando-lhe essa prova."
1280647772 = "Objeto de crítica"
2333773019 = "Takane, que veio para o plantão no Schale, disse que queria comentar sobre as coisas de que gostava e perguntou se poderia fazer uma crítica do Sensei. Então, o Sensei respondeu que queria conhecê-la, e combinaram de assistir a uma partida de hóquei no gelo."
961567717 = "Hóquei no gelo"
3723581648 = "Takane foi assistir a uma partida de hóquei no gelo com o Sensei. No entanto, uma briga irrompeu durante o jogo, e tudo virou uma bagunça."
1904269452 = "Festival do broto de feijão"
3282413106 = "Takane serviu um prato especial para o Sensei. Ele comeu uma refeição calorosa pela primeira vez em muito tempo."
2937698410 = "A princesa que contempla o céu noturno"
4139348446 = "Takane e o Sensei saíram para fotografar a aurora boreal e se divertiram com uma peça de improviso sob ela."
2067127778 = "Infraestrutura"
3737878541 = "Yakumo convidou o Sensei para o canteiro de obras de um equipamento de comunicação. Lá, o Sensei testemunhou a habilidade empresarial de Yakumo."
1618303281 = "Plano de negócios"
3547873849 = "Yakumo, que veio para o plantão no Schale, propôs um plano de negócios usando o Schale. Embora o Sensei recusasse, ele ficou impressionado com a riqueza de suas ideias."
638150931 = "Cronograma"
3324191113 = "O Sensei e Yakumo conversaram sobre várias coisas enquanto andavam de trem."
425263812 = "A psicologia da gestão"
172823425 = "Yakumo consultou o Sensei sobre como melhorar as vendas de suas publicações. Nesse meio tempo, inspirado, o Sensei propôs que tirassem fotos de 'anjos da neve'……"
3182648846 = "Modelo de novo……!"
2967078244 = "Tsukuyo teria que desfilar em um evento de moda novamente. Aparentemente, a recompensa era um panfleto de um filme de ninja difícil de encontrar. Para recompensar Tsukuyo, que terminou o desfile com sucesso, o Sensei a convidou para jantar."
3929201993 = "Modelo de novo……?"
957721389 = "Tsukuyo foi convidada para ser modelo em uma escola preparatória de arte. Como modelo de desenho, inexperiente, ela pediu que o Sensei ficasse ao seu lado. Depois de cumprir seu papel, o Sensei a convidou para comer como recompensa."
525821709 = "Agora é minha vez……"
348274659 = "Tsukuyo convidou o Sensei para comer com o dinheiro do seu trabalho de meio período como forma de agradecimento pela ajuda até então. Para passar tempo com ele, ela recusou uma oferta de modelo para aquele dia, mas, no caminho, viu uma garota e decidiu aceitar. Ela sorriu, dizendo que se sua altura pudesse ajudar alguém, ficava feliz."
2323781364 = "A-a-jude, por favor……!"
955441230 = "Tsukuyo decidiu que aquele seria seu último desfile de moda. Nervosa, ela dormiu demais e, para ganhar tempo, decidiu usar um atalho. Embora tenha ficado presa em uma cerca no caminho, conseguiu terminar o desfile com sucesso."
1551348262 = "Garota ninja pede tratamento!"
1127575116 = "Michiru rasgou seu vestido enquanto filmava um vídeo e foi a uma costureira. No entanto, como estava com a roupa a ser consertada, ela tentou pintar tinta diretamente no corpo como os ninjas das lendas. No final, ela comprou um agasalho esportivo na vizinhança e se trocou."
1001116658 = "Garota ninja, que vergonha!"
1730880438 = "Michiru recebeu o vestido consertado e, para verificar se não havia problemas ao se mover, foi fazer compras com o Sensei. Depois de comprar ferramentas ninja, ela lhe deu um brinde de uma cápsula como agradecimento. Dentro, havia um anel…… Michiru, envergonhada, se escondeu."
180243508 = "Garota ninja quer saber o segredo!"
4193845144 = "Para aumentar o número de visualizações do canal 'Michirucchi', Michiru participou de uma reunião suspeita. Percebendo que era golpe, tentou voltar, mas foi detida. O Sensei interveio e a salvou, e Michiru decidiu aumentar as visualizações com trabalho duro."
1544401811 = "Garota ninja é antenada!"
3344102574 = "Ao saber que vídeos com tema 'moda' estavam na moda, Michiru criou um vídeo combinando ninjutsu e moda. No entanto, as visualizações não aumentaram como esperado. Ao verificar, descobriu que a lente estava tampada, e nada havia sido gravado."
868253551 = "O que é um robô empregado"
773887947 = "Rio decidiu modificar o Avant-garde-kun para fazer tarefas domésticas. Diante de Rio, que disse que talvez pudesse até produzir em massa assim, o Sensei insistiu que 'robôs empregados são melhores'. Rio então disse que se vestissem de empregada, não virariam robôs empregados? O Sensei tentou rebater, mas foi refutado com um silogismo."
2264036531 = "Monólogo"
2513546491 = "Após terminar uma parte do trabalho em seu quarto, o Sensei ouviu a voz sugestiva de Rio dentro de um navio de transporte. Ao espiar para ver o que ela estava fazendo, viu Rio com um HMD, falando algo. Segundo ela, estava atualizando o navio de transporte. O mal-entendido de que ela estava falando com alguém no espaço virtual foi resolvido, e ele ouviu sobre o avatar que ela estava usando."
2142602582 = "Experimento mental"
3668229248 = "Enquanto fazia a manutenção da AMAS, Rio confessou que acreditava que IAs não tinham ego. No entanto, esse pensamento mudou após conhecer Aris. Então, ela pediu que o Sensei participasse de um experimento mental com ela e compartilhou um momento a sós."
1608494230 = "Variável inesperada"
2718709279 = "Rio adicionou uma função de aquecimento ao seu terno e pediu ao Sensei que fizesse um teste de funcionamento. Embora a adição da função em si não tivesse problemas, o quarto ficou muito quente, e Rio abriu suavemente a gola do terno."
3220881707 = "Alívio do estresse"
2066240305 = "Key estava se acostumando com seu novo corpo. No entanto, ela estava preocupada em como deveria aliviar o estresse. Embora não tivesse queixas sobre o corpo, ela murmurou um pequeno desejo: queria uma fita para amarrar o cabelo."
1827657751 = "Bem-vindo a Kivotos"
544438161 = "O Sensei foi visitar a aula de Key. Na aula, Key demonstrou conhecimento superior ao do instrutor. Key se perguntou se uma aluna que tem todo o conhecimento precisava frequentar a escola. O Sensei respondeu que aprender não é só sobre aulas, e que interagir com pessoas também é importante. Key decidiu pensar um pouco sobre isso."
3726540946 = "Quest"
2715974409 = "O Sensei recebeu um Momotalk de Key pedindo ajuda. Quando foi correndo até lá, viu Key sendo acariciada por alunas de Millennium. Aceita como irmã gêmea de Aris, Key, embora confusa, começou a se integrar à vida escolar."
1521323340 = "Fora de controle"
1338830859 = "Key enviou uma mensagem de insatisfação: 'há muitos bugs'. Quando ele foi à sala do Clube de Desenvolvimento de Jogos, encontrou Key depurando a versão alfa de um novo jogo do clube. Assim, os dois, compreendendo o que Momoi e as outras queriam fazer, continuaram a depuração da versão alfa do jogo."
2007896298 = "Sobre o ambiente de vida"
3837031192 = "Quando o Sensei visitou o Clube de Desenvolvimento de Jogos, encontrou Key fazendo faxina. Reclamando da habilidade de limpeza dos membros, ela manifestou preocupação com Aris, que era influenciada pelas pessoas ao redor. Key perguntou se o Sensei fazia faxina direito, e ele ficou sem saber como reagir."
2197644324 = "O entardecer que flui"
2760439479 = "Key veio para o plantão no Schale. Embora criticasse o Sensei por ter muito trabalho, ela se ofereceu para ajudar no plantão do dia seguinte. O Sensei sugeriu que fossem fazer compras como agradecimento. No entanto, ele estava cansado e a vista embaçada. Key então disse com doçura: 'Não se force, está tudo bem'."
1595074934 = "Treino do herói"
405265064 = "Aris ficou feliz por ter conseguido um novo equipamento. No entanto, para dominá-lo, ela começou a treinar. Durante o treino, Aris torceu o pé e o Sensei a carregou nas costas para casa."
1206023533 = "Cidade do começo"
53651717 = "Quando Aris disse que queria treinar novamente, o Sensei preparou um treino secreto. Era para jogar vestindo uma armadura. Entre vários jogos, Aris jogou 'Tales Saga Chronicle' e ficou feliz com o efeito do treino, pois não ficava mais tensa mesmo com a armadura."
1220509438 = "Haver diferenças"
940994582 = "A armadura do herói de Aris, que passou por inúmeras modificações, Avi Eshuf, começou a apresentar problemas. Desgastada pelas repetidas batalhas, ela agora estava em um estágio em que talvez não pudesse mais ser consertada. Aris desejava que Avi Eshuf fosse amada tanto quanto sua Espada de Luz."
1247641963 = "A hora em que a magia começa"
830455537 = "O Sensei recebeu uma mensagem de Aris no meio da noite. Quando ele se virou a pedido dela que olhasse pela janela, viu um belo céu estrelado. Aris disse que queria compartilhar aquela paisagem. O Sensei e Aris aproveitaram um momento tranquilo."
2829727388 = "O herói está de volta?"
3540463318 = "O Sensei se surpreendeu ao ver Aris vestindo o Avi Eshuf, que deveria estar quebrado. Segundo ela, mandou fazer uma réplica com os fragmentos. Embora o desempenho fosse inferior ao original, Aris sorriu, dizendo que aquela forma, que agradava a várias pessoas, já tinha valor por si só."
640504906 = "Equipe de suporte de vida (1)"
1047587791 = "Himari disse que seria a equipe de suporte de vida do Sensei e, modificando parte da AMAS, começou a apoiá-lo. Himari sorriu, dizendo que ninguém mais dava um suporte tão cuidadoso."
544066948 = "Regras e conceitos"
1970386051 = "O Sensei ficou observando Himari fazer a manutenção de sua 'cadeira de rodas'. Himari tentou explicar a diferença entre cadeira de rodas e moto quando o Sensei disse que ainda parecia uma moto."
2839455324 = "Sob o mesmo céu estrelado"
3945440914 = "Himari e o Sensei saíram para um passeio noturno na 'cadeira de rodas' recém-revisada. Enquanto corriam sob o céu estrelado na cadeira de rodas, eles compartilharam um momento secreto."
53718002 = "Equipe de suporte de vida (2)"
1960948734 = "Himari, que havia dormido demais, ficou abatida, achando-se uma péssima equipe de suporte. No entanto, quando o Sensei a consolou, dizendo que ela podia se apoiar, ela pediu para ser mimada o dia todo."
4237772262 = "Empregada perfeita"
1658156830 = "O Sensei ficou surpreso com o suporte perfeito de Toki. Segundo ela, antes ela não interferia muito porque ele conseguia se virar sozinho. No entanto, agora, em 'estado de emergência', ela atuava como uma empregada perfeita. Para tornar seu suporte perfeito, Toki propôs proteção 24 horas."
1805231996 = "Hobby (provisório)"
3531035594 = "Toki, que voltou de uma missão de reconhecimento, relatou ter sido curada por animais de metal. Em seguida, ela se empolgou falando sobre a cultura de streaming e gameplays que andava curtindo, passando um tempo agradável com o Sensei. O assunto se estendeu a hobbies e crescimento…… sem perceber, Toki adormeceu ao lado do Sensei."
1208888951 = "Upgrade"
364125731 = "Toki avisou o Sensei que havia sido 'atualizada'. Segundo ela, suas armas eram novas. Toki falou com entusiasmo sobre suas pistolas de energia, que eram a melhor combinação, e disse que queria modificar sua armadura para lançar o braço mecânico como um foguete de energia. O Sensei a impediu, dizendo que era perigoso, e ela fez beicinho. No final, ele a acalmou gentilmente."
3590033319 = "Memórias do amanhecer"
3047442248 = "Toki, após terminar o reconhecimento ao amanhecer, chamou o Sensei para mostrar uma paisagem. Era um belo nascer do sol. Contemplando a paisagem, Toki perguntou se, se chegasse a 'hora final', ela poderia ser a 'última pessoa'. Quando o amanhecer terminou e voltaram à rotina, Toki declarou novamente: 'Quem está ao lado do Sensei sou eu'."
1508081542 = "Fobia de armário"
121840633 = "Yuzu disse que, devido ao trauma de emergência em pods de descida e cabines de navio, não conseguia mais ficar calma dentro de armários. Para superar isso, ela entrou no armário com o Sensei."
566993182 = "UZQueen em crise"
4132271700 = "Yuzu disse estar com dificuldades em um jogo de VR que exigia movimentar o próprio corpo. O Sensei a colocou no ombro e, assim, dividindo as funções, eles subiram no ranking."
1591579143 = "Torneio de games"
1792195982 = "Um jogo novo, muito popular e difícil de encontrar, era o prêmio de um torneio. No entanto, como a competição era no jogo de VR no qual Yuzu tinha dificuldade, ela decidiu jogar em cooperação com o Sensei. Eles venceram o torneio e finalmente conseguiram o cobiçado jogo."
2902368979 = "Salvação do mundo e o gamer"
823660841 = "Yuzu, que estava gradualmente se acostumando com os jogos de VR, convidou o Sensei para o mundo ao qual ela chegou sozinha após zerar o jogo. Conversando sobre como jogos também são realidade, eles passaram um tempo pacífico dentro do jogo de VR."
351853014 = "Eficiência vs. Ineficiência"
2129235531 = "Aproveitando que Aymi o acordou de manhã, o Sensei a acompanhou em sua 'caminhada'. Enquanto lutavam contra inimigos de vez em quando, conversavam sobre o Continente de Aço. Aymi disse ao Sensei que seu pensamento estava mudando."
2767044483 = "O que se dá"
328091725 = "Noite polar. O Sensei, que acompanhava Aymi em sua patrulha, acabou esfriando o corpo. Aymi então se aconchegou a ele, chamando de 'equilíbrio térmico'. Explicando que era ajustar a temperatura influenciando um ao outro, Aymi sentia novamente sua própria mudança."
3643082009 = "Interferência"
1339460084 = "O Sensei, tendo recebido uma mensagem tensa de Aymi, correu ao seu encontro. Embora tenham se encontrado sem problemas, Aymi se desculpou por tê-lo preocupado. Consciente de sua imprudência, ela pediu que ele continuasse a zelar por ela."
3089168655 = "Você e o chocolate quente"
4100335731 = "Guiado por Aymi, o Sensei foi com ela ao topo do navio de transporte e contemplaram as estrelas. Enquanto tomavam chocolate quente, ela falou sobre sua mudança, dando a ele sua resposta atual. Pelo menos, Aymi não estava mais sozinha; sob o céu estrelado, os dois compartilhavam o calor um do outro."
757227832 = "Recado noturno"
4248235020 = "O Sensei foi a uma conveniência comprar um lanche noturno e encontrou Koyuki. Depois de conversarem animadamente sobre pijamas, os dois compraram doces e fizeram um desvio por um parque noturno. O Sensei acompanhou Koyuki, que começou a cochilar, até a porta de seu quarto."
531402134 = "Como em casa"
3336463100 = "Koyuki, que veio de pijama para o plantão, estendeu uma esteira e começou a rolar por aí. No entanto, talvez por estar tão à vontade, ela terminou o trabalho num piscar de olhos. O Sensei, como recompensa, sugeriu que ela dormisse lá e jogassem."
924427267 = "The Café Fighter"
1729519559 = "Para jogar um novo jogo antes de todos, o Sensei e Koyuki foram a um fliperama de madrugada. Embora continuassem várias vezes, não conseguiam avançar. No caminho de volta, compraram a versão para console e se dedicaram à conquista no Schale."
1326515843 = "Personagem amada"
2263035390 = "Koyuki, que havia adoecido, fugiu de seu quarto e escapou para o Schale. O Sensei a acolheu na sala de descanso, embora ela insistisse que não estava resfriada. Depois de contatar o Seminário, ele a tratou na sala de descanso do Schale."
3809347529 = "Apresentação com calma"
919208835 = "Atendendo a um chamado de Konoka, o Sensei foi a Valkyrie e, por algum motivo, a encontrou detida na cela subterrânea. Konoka disse que era um lugar adequado para cochilar dentro da agitada delegacia, mas uma policial novata que ainda não a conhecia confundiu sua conversa com o Sensei com um suspeito gritando. Sem chance de defesa, Konoka foi imobilizada unilateralmente."
630889152 = "Senso de tempo"
1147060989 = "Naquele dia, a 'ação da sorte' de Konoka era 'cumprir os horários'. Ela praticava fielmente até mesmo enquanto perseguia a Gangue do Capacete e, ao chegar a hora de sair, disse 'vamos nos entregar' e foi embora. A Gangue do Capacete se aproveitou para fugir, mas no dia seguinte, logo no início do expediente, foi capturada por Konoka."
2418914844 = "Aparência do detetive"
2216554313 = "O Sensei, chamado de forma confidencial, foi levado por Konoka a uma loja de camisas havaianas de sua preferência. Enquanto escolhia alegremente uma camisa, Konoka contou como começou a gostar delas. Depois de terminar a história, ela comprou duas 'camisas havaianas com estampa de pato' e deu uma delas de presente ao Sensei."
2954048139 = "Parceiro"
4268064536 = "Seguindo o resultado da previsão de que 'agir com um parceiro é bom', Konoka chamou o Sensei. Os dois fizeram pesquisas para rastrear um fugitivo, mas não conseguiam muitas informações. Por fim, foram pegos pela chuva e tiveram que se abrigar às pressas, mas Konoka parecia feliz, dizendo que foi um bom dia porque o Sensei estava ao lado. Foi então que o fugitivo que eles vinham perseguindo correu para o mesmo abrigo."
168308071 = "O tratamento de um certo detetive"
3351360879 = "Konoka pegou um resfriado e, por engano, enviou ao Sensei um relatório. Preocupado, o Sensei foi visitá-la e ela pediu para comer lámen de porco com muito alho. Enquanto faziam essas trocas, o Sensei continuou a cuidar de Konoka, que estava um pouco mais vulnerável e calma que o normal, até que ela pegasse no sono."
1877482996 = "Tire a calça rápido!"
84336040 = "O Sensei foi a Wild Hunt a pedido de Rena para fazer uma tarefa. No caminho, ao levantar uma carga pesada, sua calça rasgou. Coincidentemente, ele encontrou Rena naquele momento e, tentando esconder, fez movimentos suspeitos. Desconfiada, Rena o interrogou, e ele confessou que tinha um buraco na parte traseira. Rena então mandou que ele tirasse a calça e a costurou ali mesmo."
404222347 = "Não vou admitir!"
2072434858 = "Chamado por Rena, o Sensei a acompanhou em uma investigação para provar que fantasmas não existem. Baseando-se nas lendas dos sete mistérios, eles investigaram as ruínas à noite, mas não conseguiram nenhuma prova conclusiva. Dias depois, Rena explicou o ocorrido para os outros membros do Clube de Ocultismo, mas como uma foto mostrava o braço do Sensei, ela tentou disfarçar, e o resultado foi que o Clube de Ocultismo se animou, acreditando que fantasmas existem."
278781398 = "Toma isso!"
3926285099 = "Para afastar o mau-olhado depois de ter disfarçado o tumulto nas ruínas, Rena decidiu fazer amuletos. Ela deu um deles ao Sensei, mas, por alguma razão, coisas ruins continuavam acontecendo com ele. Desconfiada, Rena verificou o amuleto e descobriu que estava vazio. Dizendo que não podia dar algo incompleto, ela o trocou por outro. Depois disso, estranhamente, coisas ruins pararam de acontecer com o Sensei."
3292372329 = "Fita pequena"
222237672 = "O Sensei, novamente a pedido de Rena para fazer uma tarefa, levou materiais de acessórios para a Wild Hunt. Rena, que estava fazendo um grampo de cabelo com fitas, contou que, quando era pequena, fez acessórios para dar de presente aos amigos e isso a inspirou a se tornar designer de moda. Na saída, o Sensei deixou a fita que Rena colocou em sua cabeça e continuou com o resto do trabalho."
4173121054 = "Este é o meu cotidiano"
759367300 = "O Sensei, ao visitar Millennium, testemunhou Akane conversando com colegas de classe em uma atmosfera estranha. Na volta, ele encontrou Akane que o esperava e decidiram voltar juntos. No caminho, ela confessou que tinha dificuldade em se relacionar com as pessoas. O Sensei a encorajou: 'Você não precisa ser amiga de todo mundo, mas se quiser, pode contar comigo'. Assim, começou a operação de Akane e do Sensei para 'ficarem mais próximos'."
2673536527 = "O primeiro passo"
2811609032 = "Com base no roteiro que elaboraram juntos, Akane começou sua operação para se aproximar das colegas. Com um pequeno rádio no ouvido para receber ajuda do Sensei, Akane interagiu com as colegas usando um personagem criado. Embora as conversas fossem desajeitadas, todas as suas estranhezas foram percebidas pelas colegas. Explicando timidamente a razão, Akane começou a agir mais naturalmente e passou um tempo agradável."
3944103849 = "Ombro a ombro"
1930446094 = "Akane convidou o Sensei para uma sala de aula vazia. Para mostrar o resultado de suas tentativas com o Sensei, começaram a brincar de 'fingir ser colegas'. No início, era uma brincadeira, mas Akane, chorando, disse: 'Posso fingir, mas não sei quem sou de verdade'. No entanto, ela disse que, mesmo assim, ter uma pessoa especial com quem desabafar, e que essa pessoa ser o Sensei, a fazia feliz."
2908734044 = "O melhor método de limpeza"
2828576144 = "Akane consultou o Sensei porque o uso de explosivos estava se tornando previsível. Enquanto conversavam em um café, os dois foram envolvidos em uma atividade terrorista. As alunas da Valkyrie que chegaram não podiam agir porque os reféns eram usados como escudo. Akane então tentou resolver pacificamente, mas a situação não melhorou e, no final, ela usou explosivos para resolver tudo."
2314453101 = "Recomendação de Niko"
2864377608 = "Para o Sensei, que estava trabalhando até tarde sem se alimentar direito, Niko apareceu no Schale com ingredientes. Quando ele pediu 'o que você recomendar', Niko preparou udon de raposa."
3319469081 = "Compras de Niko"
3542063046 = "Para executar a 'Operação de Suprimento Especial' da Equipe FOX, Niko foi ao supermercado com o Sensei. Assim que começou a liquidação noturna, a loja se transformou em um campo de batalha. Desviando dos vários clientes, Niko colocou os ingredientes desejados no carrinho. Enquanto isso, o Sensei ficou intimidado pelos veteranos de guerra."
722436222 = "Conselho de Niko"
450635337 = "Naquele dia, o Sensei estava completamente exausto devido a uma série de azares. Niko, que viera ajudar no Schale, percebeu o estado do Sensei e se ofereceu como conselheira. Atraído por Niko, que ouvia com gentileza, o Sensei desabafou seus sentimentos. Sem perceber, seu coração estava mais leve."
4084788817 = "O crachá de Niko"
2993667495 = "Niko sugeriu colocar crachás em todas as coisas para gerenciar o estoque do escritório. Com os crachás, ficaria mais fácil saber o dono, organizar e controlar o estoque. Depois de todo o trabalho, Niko colou o único crachá restante no Sensei."
1170598127 = "O inarizushi de Niko"
653761742 = "Niko pediu emprestada a cozinha do Schale. Quando o Sensei foi ver, Niko estava fazendo inarizushi desde fritar o tofu, diferente do normal. Após muito trabalho, o tofu ficou pronto, e Niko ofereceu o primeiro pedaço ao Sensei. Depois, eles comeram juntos o inarizushi feito por Niko."
1951868971 = "Raposa vigilante"
1622411002 = "Kurumi visitou o Schale para o plantão. Enquanto trabalhavam juntos, um cidadão que disse ter sido ajudado pelo Sensei veio trazer um presente de agradecimento. Depois que o cidadão foi embora, Kurumi alertou o Sensei, que disse não se lembrar direito de quem era, sobre sua falta de vigilância. Então, o Sensei pediu que Kurumi provasse vários presentes como degustação. Enquanto experimentavam doces caros e perfumes, Kurumi percebeu que estava sendo provocada."
1539676039 = "Raposa sábia"
852804695 = "Kurumi, que aprendeu na SRT e assistindo a vídeos de life hack, conhecia várias técnicas úteis para o dia a dia. Ela resolveu rapidamente vários pequenos problemas que o Sensei tinha acumulado. Kurumi, enquanto se esforçava para resolver um quebra-cabeça que ele lhe deu, ficou pensativa."
2213050152 = "Raposa consciente"
3291828447 = "Para tirar uma foto 3x4, Kurumi foi a uma cabine de fotos na estação. No entanto, talvez por influência do treinamento na SRT, toda vez que o flash piscava após a contagem regressiva, ela fechava os olhos inconscientemente. Vendo isso, o Sensei a fotografou de surpresa com a câmera do celular. A foto ficou boa e ele a levou a um serviço de impressão."
1018801245 = "Raposa arrumada"
2066054702 = "Quando o Sensei visitou o QG da Equipe FOX, Kurumi estava sozinha fazendo manutenção em seu escudo. Ela explicou sua teoria: como o escudo do batedor é a primeira coisa que o inimigo vê, é importante mantê-lo bem cuidado como rosto que representa a equipe. Ouvindo isso, o Sensei lhe deu de presente adesivos fofos. Kurumi recusou colocá-los no escudo e ficou em dúvida sobre onde colá-los."
1003943113 = "Raposa que se despede"
3964533583 = "Vendo o Sensei andando por um beco escuro tarde da noite, Kurumi o advertiu sobre sua falta de vigilância. Pegando-o pela mão, Kurumi avançou como se abrisse caminho na escuridão. Ela disse que seu papel era avançar mesmo com medo. O Sensei apertou a mão entrelaçada e disse que a apoiaria se algo acontecesse."
825961924 = "Conversa fiada de uma certa atiradora"
2685659288 = "O Sensei, ao visitar um café recém-inaugurado, teve dificuldade com o método de pedido complicado. Otogi, que estava lá por acaso, fez amizade com o funcionário e o ajudou. Otogi, cuja regra é agarrar a oportunidade sem hesitar, diz que, embora sua facilidade de se enturmar traga coisas boas, também traz provações indesejadas."
4153878308 = "Comunicação por rádio de uma certa atiradora"
618610602 = "Otogi, que achou que o Sensei se interessou por sua comunicação via rádio, explicou os códigos de áudio e as gírias das forças especiais. Depois de ouvir, o Sensei disse que, embora achasse interessante, como Sensei, achava importante se comunicar claramente para ser confiável. Otogi, ao ouvir isso, sem querer deixou escapar seus sentimentos reais no código de áudio."
3691143979 = "Solidão de uma certa atiradora"
304057056 = "Preocupado com uma estranha mensagem no meio da noite, o Sensei foi procurar e encontrou Otogi em um parque. Otogi disse que vinha ao parque para aliviar a solidão e se acalmava olhando para um poste de luz piscando. Embora preocupada com seu futuro em relação a como lidar com a solidão, depois de conversar com o Sensei, Otogi disse que continuaria no caminho atual por mais um tempo."
354077761 = "Traje de camuflagem de uma certa atiradora"
2245221007 = "Otogi disse que queria comprar roupas de camuflagem e convidou o Sensei para fazer compras. No entanto, a loja para onde foram era uma loja de roupas comum, e o conceito de camuflagem de Otogi era diferente do que ele imaginava. Otogi disse que, para se misturar à cidade, a melhor camuflagem é vestir-se normalmente. Os dois foram ver várias roupas."
201493185 = "Base secreta de uma certa atiradora"
420529048 = "O Sensei ouviu de uma aluna da Valkyrie que estavam investigando umas marcas estranhas em vários lugares do D.U. Depois, surpreendido por uma chuva passageira, o Sensei viu a tal marca em uma escada sob um viaduto onde se abrigou. Curioso, subiu a escada e encontrou Otogi. Segundo ela, ali era sua base secreta para operações, e as marcas eram para demarcar território. Sob o viaduto chuvoso, os dois passaram o tempo tomando café."
3406649746 = "Erika e as compras"
1917809992 = "O Sensei, que viera comprar material de escritório, encontrou Erika por acaso em uma galeria subterrânea. Quando Erika disse que gostava de fazer vitrines sem rumo, o Sensei decidiu acompanhá-la. Enquanto olhavam as lojas, Erika se interessou por um produto com estampa de leopardo, e eles conversaram sobre seus gostos."
2344616949 = "Erika e o passeio noturno"
3116115619 = "Tarde da noite, a convite de Erika, o Sensei decidiu jantar com ela no D.U. Entraram em uma lanchonete fast food que viram na rua e aproveitaram a sensação de culpa por comer algo calórico à noite."
3131626542 = "Erika e a máquina de venda automática"
2234993111 = "Quando o Sensei ia comprar uma bebida em uma máquina, Erika o chamou de lado. Então, eles começaram a recomendar bebidas um ao outro. Erika pediu que o Sensei abrisse a lata, pois tinha unhas compridas. Ao abrir, ele machucou o dedo, e Erika colocou um curativo fofo nele."
3530314181 = "Conselho de Erika"
3833501729 = "O Sensei foi chamado por Erika, que disse ter uma consulta. Embora ainda não tivesse os pensamentos organizados, ela começou a falar aos poucos. Era sobre gostar de estar com os amigos, mas às vezes ficar sem energia. O Sensei a aconselhou que o tempo sozinho também é importante, e ela pareceu entender, dizendo que tinha um lugar para onde ia quando queria ficar só."
905777020 = "Erika, base secreta"
2885707072 = "Erika disse que mostraria sua base secreta ao Sensei que visitava Gehenna, e o levou ao terraço do prédio da escola, vazio e tingido pelo pôr do sol. Era um lugar só dela, mas ela trouxe o Sensei por ser especial. Depois de conversarem até o pôr do sol, os dois voltaram juntos da escola escura."
1600040855 = "Diabinha e a nobre vilã"
496791815 = "Mutsumi disse que teria que interpretar uma nobre vilã em um trabalho e começou a ensaiar com o Sensei. Ela fez com que o Sensei lhe servisse chá, o usasse como cadeira, e passaram um tempo agradável."
3860221711 = "Diabinha e a compradora"
1421163371 = "Mutsumi soube que a bomba que ia comprar havia sido comprada em massa pela Gangue do Capacete. Após investigar, descobriu que a revenda estava ocorrendo. Para punir os revendedores, Mutsumi e o Sensei encenaram um plano."
548822881 = "Diabinha e as férias"
1478658850 = "Mutsumi, depois de se livrar dos remanescentes dos revendedores, se escondeu em um hotel para evitar problemas. Quando o Sensei visitou o quarto dela, ela lhe confiou uma maleta cheia de dinheiro. Era o dinheiro que os revendedores acumulavam; ela queria que ele usasse para algo significativo. O Sensei decidiu guardá-lo."
2079305511 = "Encontro com a diabinha"
127523721 = "Após assistir a uma ópera a convite de Mutsumi, o Sensei passou um dia divertido com ela. No caminho de volta, Mutsumi disse que era a primeira vez que tinha um encontro de verdade e confessou seus sentimentos sinceros ao Sensei."
1265163046 = "Encontro inesperado"
805657719 = "O Sensei encontrou Haruka, vestida e fazendo segurança, em uma feira que visitou por acaso. Enquanto conversavam, foram envolvidos em uma briga. Embora fosse um arranhão, o Sensei se machucou, e Haruka subjugou os agressores num instante."
1885392653 = "Presente inesperado"
765461118 = "Haruka, que havia entendido errado que o Sensei tinha elogiado o vestido em si quando foi elogiada, decidiu lhe dar seu vestido como oferenda. Quando o Sensei esclareceu o mal-entendido, Haruka mostrou novamente sua aparência vestida."
3025495165 = "Passeio noturno"
3464250131 = "Haruka e o Sensei acabaram saindo para um passeio noturno. Haruka disse que, por pensar no incômodo que poderia causar, não conseguia contatar as pessoas por iniciativa própria. No entanto, o Sensei a aconselhou que, se ela não tivesse tido coragem de contatá-lo, eles não estariam ali, e os dois aproveitaram o passeio."
1181939252 = "Como uma erva daninha"
585740990 = "Convidado por Haruka, o Sensei visitou um museu com o tema 'ervas daninhas'. Enquanto via as obras expostas, Haruka parecia preocupada com algo. Embora hesitasse no início, encorajada pelo Sensei, ela falou sobre seus sentimentos em relação às ervas daninhas."
2037166503 = "O cotidiano da Sociedade de Estudos Gastronômicos (1)"
2983636062 = "A Sociedade de Estudos Gastronômicos fugia do Comitê de Disciplina após explodir o refeitório da escola de Gehenna. Eles encontraram trufas em um parque, mas foram capturados pelo Comitê de Disciplina, que os perseguiu, e as trufas foram confiscadas."
2083342772 = "O cotidiano da Sociedade de Estudos Gastronômicos (2)"
1334832385 = "Os membros da Sociedade de Estudos Gastronômicos foram presos na cela após terem suas trufas roubadas pelo Comitê de Disciplina. O Sensei, que estava na mesma cela por acidente por outro motivo, foi mal-interpretado pela presidente do Comitê de Disciplina, Hina, por ter recebido a roupa íntima que envolvia as trufas dos membros da Sociedade."
729409175 = "Paladar sem preconceitos"
3942326675 = "Todos os membros da Sociedade de Estudos Gastronômicos visitaram o Veritas em Millennium. As alunas pediram a Hare que examinasse o estado de seus paladares. Como resultado, foi descoberto cientificamente que o paladar de Izumi estava bastante alterado."
2115387183 = "Incidente no ataque ao Departamento de Merenda"
2992609245 = "Os membros da Sociedade de Estudos Gastronômicos visitaram o Departamento de Merenda para protestar contra a comida ruim, mas lá descobriram a péssima realidade. Embora lutassem para ajudar o departamento, no final acabaram atrapalhando Fuuka."
197817924 = "Limpeza e Clareamento"
352914431 = "C&C cumpre qualquer missão adequadamente, mas os danos também são consideráveis. Yuuka, a contadora do Seminário, os visita para dar uma bronca, mas……?"
2026257102 = "Empregada e Feita (1)"
3467705269 = "C&C foi solicitada a agir como verdadeiras empregadas, e não como agentes, para resolver um problema que ocorreu na rua comercial. Neru ficou furiosa com tal absurdo, mas já era tarde, pois Asuna havia assinado o contrato."
4112079221 = "Empregada e Feita (2)"
2175543816 = "Depois de muitas peripécias, a C&C abriu um café de empregadas, que acabou sendo um sucesso inesperado. Com isso, Yuuka sugeriu que elas se tornassem empregadas de verdade, mas……?"
3585549647 = "A presidente está sempre certa (1)"
1295817962 = "Certo dia, a caminho do Schale, Cherino testemunhou a popularidade do personagem 'Peroro' do Momofriends. Inspirada, ela ordenou que Marina transferisse 'Peroro' para a Federação Escolar Red Winter."
3552803815 = "A presidente está sempre certa (2)"
360090070 = "Para transferir 'Peroro', que não existe na realidade, Marina sequestrou Nodoka e a forçou a vestir uma fantasia de 'Peroro'. Após a dura tortura (?) de Marina, Nodoka foi forçada a imitar Peroro……"
1279819101 = "A presidente está sempre certa (3)"
1812920356 = "Marina mostrou 'Peroro' (Nodoka com a fantasia) para Cherino, mas Cherino ficou decepcionada, pois de perto sua aparência era mais estranha do que imaginava. Marina e Nodoka receberam ordens de expurgo, mas, preferindo dar um golpe a serem expurgadas, as duas partiram para a ação."
4232821938 = "Armas e Pimentas (1)"
3961351848 = "Alunas do Clube de Engenharia tiveram a ideia absurda de instalar um dispositivo de spray de chá-basco em uma arma. Achando a ideia inútil, mas ótima, elas imediatamente começaram a fabricação."
2227297923 = "Armas e Pimentas (2)"
306427386 = "O Clube de Engenharia conseguiu modificar a arma, mas percebeu que era uma submetralhadora que haviam recebido de Neru. Para que Neru não notasse a alteração, Kotori e Hibiki a seguiram."
3947244639 = "Armas e Pimentas (3)"
323660726 = "Kotori e Hibiki usaram sua inteligência para evitar que Neru apertasse o gatilho, mas, ao entrarem em combate com a Gangue do Capacete, que tinha rancor de Neru, a modificação do dispositivo de spray de chá-basco acabou sendo descoberta."
295379881 = "Problemas e Rastreadores (1)"
3812652621 = "Inconformada com o resultado de um exame físico, Maki convenceu Hare e Kotama a hackear o servidor com os registros escolares."
1511095324 = "Problemas e Rastreadores (2)"
3761143871 = "Maki conseguiu hackear o servidor de dados escolares usando o dispositivo de interceptação de Kotama e o drone de Hare. Enquanto reescrevia os registros de acordo com seu ideal, foi hackeada por cima por outra pessoa. Maki rapidamente transferiu os dados do exame físico para outro servidor, mas era um servidor de SNS público da escola……"
34701853 = "Problemas e Rastreadores (3)"
476829342 = "Os membros do Veritas tentaram resistir ao hacker misterioso, mas, julgando que não conseguiriam vencer, decidiram fugir. Naquela noite, enquanto conversavam com Chihiro, que voltara do Seminário, descobriram que a pessoa com quem estavam lutando era a vice-presidente do Veritas, que estava diante deles."
120203470 = "A confusão da avaliação de higiene do Departamento de Merenda (1)"
1383531332 = "Dia da avaliação de higiene no refeitório da escola de Gehenna. Iori, do Comitê de Disciplina, veio no lugar do inspetor que teve intoxicação alimentar, e Izumi, da Sociedade de Estudos Gastronômicos, também invadiu, lançando nuvens escuras sobre o refeitório."
516387156 = "A confusão da avaliação de higiene do Departamento de Merenda (2)"
2522148702 = "Apesar da inspeção rigorosa de Iori, o Departamento de Merenda conseguiu nota máxima na avaliação de higiene. Embora a higiene estivesse aprovada, depois, Iori, ao beber o suco de laranja (?) feito por Juri, sofreu intoxicação alimentar e desmaiou."
93471046 = "O fantasma do andar vazio (1)"
1430687847 = "Hanae e Serina, que estavam em um hospital para trabalho voluntário, ouviram o boato de que um fantasma aparecia no 4º andar vazio. Hanae propôs descobrir a identidade do fantasma para aliviar a ansiedade dos pacientes, e as duas foram ao andar vazio à meia-noite."
2642060983 = "O fantasma do andar vazio (2)"
2770525320 = "A identidade do fantasma que supostamente aparecia no 4º andar vazio era um ladrão que se infiltrou no hospital aproveitando a confusão. No entanto, sem perceber, Hanae e Serina atiraram a esmo tentando exorcizar o fantasma, causando grande tumulto."
2650108855 = "O fantasma do andar vazio (3)"
3402866614 = "Hanae e Serina entenderam a verdadeira identidade do fantasma. O ladrão tentou roubar um cofre e fugir aproveitando a distração das duas, mas pensou que o cofre era um autoclave. Ao tentar abri-lo à força, o ladrão se envolveu em uma explosão, ficou gravemente ferido e acabou internado."
1957853520 = "O Comitê de Justiça está de folga (1)"
2774156226 = "O Comitê de Justiça partiu em uma missão de resgate de uma aluna de Trinity que havia sido sequestrada, mas, principalmente devido ao descontrole de Tsurugi, causaram danos, como o PTSD, à refém. Nagisa, do Tea Party, ao receber o relatório, ordenou que os membros do Comitê de Justiça participassem de atividades de outros clubes no dia seguinte."
1514304045 = "O Comitê de Justiça está de folga (2)"
2293307933 = "Obrigadas pela ordem do Tea Party, Mashiro e Hasumi tiveram dificuldade em se enturmar na atmosfera refinada e única de Trinity, passando um tempo desconfortável. Enquanto isso, Tsurugi passou um tempo agradável (?) no Clube de Doces do Pós-Escola e disse que foi muito divertido."
2902345591 = "Reunião semanal do Comitê de Disciplina"
3509381799 = "Hina e Ako realizam a reunião semanal do Comitê de Disciplina como de costume. Os relatos dos vários incidentes em Gehenna não pareciam ter fim, e Hina estava desanimada."
1347893224 = "Auditoria contábil repentina que traz tempestade"
111000390 = "Makoto, do Pandemonium, como sempre, arranjou uma desculpa e uma auditoria contábil repentina foi realizada no Comitê de Disciplina. Com importunações minuciosas, o orçamento foi reescrito a ponto de não reconhecer a forma original. Ignorando Iroha, que dizia que aquilo era apenas uma auditoria e meramente uma sugestão, Makoto declarou vitória em voz alta, mas Hina, ao saber da história, acabou destruindo fisicamente todas essas importunações."
1561190591 = "O cotidiano de uma estudante do ensino médio"
1753763599 = "Os membros do Clube de Doces do Pós-Escola se reúnem em frente a um café em busca de doces limitados. Yoshimi, Kazusa e Airi, que chegaram primeiro, conversavam normalmente enquanto esperavam Natsu……"
175952112 = "O pós-escola de sempre"
1512342827 = "No caminho de volta da escola, os membros do Clube de Doces do Pós-Escola conversam sobre seus planos para o feriado prolongado. Natsu, como sempre, sugere um plano excêntrico, que é ignorado no momento, mas naquela noite ela envia uma mensagem e……"
2034339829 = "Quem foi chamado, por favor, fique (1)"
2749895310 = "O Comitê de Contramedidas vai limpar o lixo de um ginásio em um trabalho de meio período que Ayane encontrou. No entanto, ao chegarem ao ginásio, são abordados por marginais, e o confronto começa."
857397530 = "Quem foi chamado, por favor, fique (2)"
204891356 = "Ayane esperava os outros membros na sala de aula, mas recebeu um telefonema dizendo que o trabalho de meio período ainda não havia chegado e que também seriam cobrados pelos danos causados pela destruição do ginásio. Quando os outros voltaram, exceto Serika, que se desculpou imediatamente, todos foram repreendidos por Ayane sem chance de defesa."
888295171 = "Plano de negócios insalubre"
635564897 = "Aru, tendo ouvido sobre uma oportunidade de negócios de um conhecido, liderou os membros da Empresa de Conveniência para uma reunião de apresentação de negócios no distrito de Trinity. No entanto, a realidade era um negócio suspeito, e Aru, irritada por ter sido enganada, destruiu o local com os outros membros."
651331101 = "Vamos, reunião regular do comitê organizador do festival!"
3714223389 = "Shizuko e Fuuna começam a reunião para preparar o próximo festival. No entanto, membros do Departamento de Treinamento invadem e a reunião vira uma bagunça."
1192778156 = "Mais uma vez! Reunião regular do comitê organizador do festival!"
4080246389 = "No feriado, os membros do comitê organizador do festival se reúnem para a reunião regular. Shizuko rejeita as propostas malucas que surgem uma após a outra. Então, Umika propõe o 'Festival Salgueiro'. A proposta toca o coração de Shizuko, e todos imediatamente começam a preparar o festival."
2314201138 = "Vamos filmar o vídeo de apresentação do Departamento de Treinamento! (1)"
2969367150 = "Para um concurso de apresentação de clubes, Kaede decide filmar um vídeo de apresentação do Departamento de Treinamento. Seguindo os conselhos do Sensei, Kaede decide filmar as próprias atividades do clube."
117197848 = "Vamos filmar o vídeo de apresentação do Departamento de Treinamento! (2)"
854960256 = "Kaede vai registrando a cena dos outros membros em vídeo enquanto treina (?), mas no meio do caminho, suas trapalhadas são descobertas pelas senhoras mais velhas, e ela acaba sendo repreendida por Tsubaki e Mimori."
2764672385 = "A noite é curta, corram, donzelas (1)"
3621891441 = "Kaede consulta o Sensei, bem como Shizuko e Fuuna do comitê organizador do festival, sobre suas seniores do Departamento de Treinamento, Tsubaki e Mimori, que estão saindo todas as noites, aparentemente quando ela dorme. Aceitando a sugestão de Shizuko, Kaede a interpreta mal e decide seguir as seniores junto com o Sensei."
2721538548 = "A noite é curta, corram, donzelas (2)"
3839830930 = "Kaede e o Sensei seguem Tsubaki e Mimori. Vendo as seniores agindo sem ela, Kaede fica triste, pensando que é desnecessária, mas……"
3115018656 = "O caminho dos jogos começa com as boas maneiras (1)"
939693077 = "Em um jogo online de luta, Momoi recebe insultos de usuários mal-educados. Indignada, dizendo que não pode deixar isso passar, Momoi e os membros do Clube de Desenvolvimento de Jogos vão a um fliperama."
1262797320 = "O caminho dos jogos começa com as boas maneiras (2)"
3551104112 = "O Clube de Desenvolvimento de Jogos encontra o usuário que insultou Momoi. Momoi o desafia novamente no mesmo jogo, mas perde devido a um bug. Embora seja ridicularizada novamente, Yuzu vê isso e joga em seu lugar, vencendo de forma avassaladora. Quando as pessoas ao redor descobrem que Yuzu é a lendária gamer 'UZQueen', elas se aglomeram em torno dela."
1545900618 = "Brinquedos de adulto (1)"
2214419213 = "Kokona para na Sociedade Comercial Genbu para pegar ingredientes para as crianças do Jardim Meihua. Lá, Rumi lhe entrega algo estranho que Shun supostamente encomendou. Rumi disfarça dizendo que é um 'brinquedo de adulto', mas essa expressão causa problemas, e o boato se espalha dentro e fora do Jardim Meihua……"
4167014609 = "Brinquedos de adulto (2)"
3860611716 = "Sentindo-se evitada pelas pessoas ao redor, Shun descobre, conversando com o Sensei, que se espalhou o boato de que ela comprou um 'brinquedo de adulto'. Embora irritada e perplexa por comprar itens de beleza ter virado esse boato, ela vai atrás da fonte que ainda está espalhando o rumor."
633382671 = "Você está preso! (1)"
497768125 = "No Departamento de Segurança da Vida, onde geralmente reina a paz. Kirino lamenta que, embora a paz seja boa, ela não tem oportunidade de mostrar serviço e se transferir para o Departamento de Segurança. Nesse momento, uma ordem de emergência é emitida, e Kirino, buscando resultados, e Fubuki, buscando folga, saem secretamente."
2582496763 = "Você está preso! (2)"
2972853045 = "Kirino e Fubuki chegam primeiro ao local, mas têm dificuldade devido aos reféns e à distância. No entanto, Fubuki, que quer uma folga especial, usa a inteligência e, junto com Kirino, causa uma explosão de poeira, mudando a situação. Achando que agora conseguirão a transferência e a folga, elas vão animadas até o chefe, mas……?"
1042018394 = "A petição da Classe Especial nº 227 (1)"
1592688240 = "Nodoka e Shigure, buscando retornar ao prédio principal, pedem a Mel, da Frente de Libertação do Conhecimento, que redija uma 'petição'. No entanto, o conteúdo da petição que ela escreve é um tanto suspeito……?"
1372490489 = "A petição da Classe Especial nº 227 (2)"
360515789 = "Como a petição de Mel tomou um rumo diferente do esperado, Nodoka e Shigure pedem a outros clubes que redijam a petição. No entanto, não importa a qual clube peçam, acaba saindo algo estranho. Depois, Minori, do Departamento de Obras, que estava passando por acaso, escreve uma petição séria, mas no final Cherino e as outras a confundem com uma 'corrente de azar', e a petição é queimada."
677660195 = "E assim, reunidos (1)"
1632709229 = "Depois de terminar a gravação de vídeo como de costume, Michiru e Tsukuyo voltam para a sala do clube (?). Enquanto se preocupam em como criar um conteúdo ninja melhor, ouvem uma batida inesperada na porta."
3202154650 = "E assim, reunidos (2)"
2201315182 = "Vendo Izuna, que quer entrar no Clube de Estudos Ninja, as duas ficam inicialmente desconfiadas. No entanto, ao ouvir os sentimentos de Izuna, elas se alegram por ter uma nova companheira que compartilha os mesmos sentimentos e a recebem no clube. O Clube de Estudos Ninja agora com três membros recomeça suas atividades."
3431406180 = "Sombra da lata (1)"
1074842512 = "Certo dia, durante uma operação, a Equipe RABBIT consegue, por acaso, obter rações de combate. Alegres com a difícil situação alimentar, eles levam as rações para o acampamento. No entanto, naquela noite, Miyu, que estava patrulhando, vê uma lata de molho picante de frutos do mar (bibim) se mover sozinha."
646029466 = "Sombra da lata (2)"
1292050028 = "Ao ouvir o grito de Miyu, os membros da Equipe RABBIT correm para a barraca onde as rações estavam armazenadas. No entanto, eles pensam que a afirmação de Miyu de que a lata se moveu é devido ao seu cansaço, e não dão muita importância. Depois, a lata de molho picante de frutos do mar é deixada de lado e o tempo passa."
2826916122 = "Sombra da lata (3)"
374786045 = "Ao atingir a data de validade, a lata de molho picante de frutos do mar incha de gás, e a Equipe RABBIT se preocupa sobre como lidar com isso. Saki, que recebeu treinamento em manuseio de explosivos, decide descartar a lata, mas, enquanto os outros membros continuam o treinamento, sua concentração se quebra…… No final, a lata de molho picante de frutos do mar explode."
3706155076 = "Prova de valor (1)"
4095209803 = "Yuuka e Noa realizam a reunião do orçamento de Millennium, avaliando várias invenções feitas pelos alunos de Millennium. Quando a agitação da reunião diminui, Yuuka encontra uma proposta misteriosa –"
3536363241 = "Prova de valor (2)"
4250165067 = "A proposta era o diagrama do dispositivo de previsão de futuro, o 'Chen', projetado por Himari. Embora desconfiada, Yuuka decide fabricá-lo com seu próprio dinheiro, achando que seria um desperdício descartá-lo –"
4016126250 = "Prova de valor (3)"
3435047914 = "Yuuka e Noa finalmente completam o 'Chen', o observatório de futuro projetado por Himari. No entanto, estava longe de prever o futuro, era uma máquina de horóscopo – Chocada, Yuuka desabafa sua insatisfação com Noa, que parecia já ter percebido desde o início."
1319446577 = "Apresentação especial da Princesa da Música Harmoniosa (1)"
2779163313 = "O Departamento de Yin-Yang iria realizar uma apresentação no 'Festival de Ação de Graças de Hyakkiyako'. Chise declara que irá preparar a apresentação sozinha e dispensa a ajuda de Kaho. Embora tenha decidido confiar, Kaho, preocupada, segue Chise secretamente com Niya. Chise, que foi fazer compras, adquire equipamentos diferentes dos habituais."
264656570 = "Apresentação especial da Princesa da Música Harmoniosa (2)"
3433984452 = "Chega o dia da apresentação. Chise faz uma apresentação diferente do habitual, que ninguém esperava. Kaho e Niya ficam confusas com a cena, mas a apresentação termina com sucesso. No discurso final, Chise diz que tentou colocar nas adereços usados nesta vez as coisas de que Niya e Kaho gostam. Sorrindo, ela agradece e pede que continuem contando com ela. Niya e Kaho ficam emocionadas."
4197282877 = "Balance com toda a força (1)"
1927725544 = "Rei, a quarta rebatedora do clube de beisebol de Millennium, visita o Departamento de Treinamento para descobrir como acertar seu primeiro home run."
4187971623 = "Balance com toda a força (2)"
1058164580 = "Quando Rei começa a questionar o método de treinamento de Sumire, Sumire a leva para assistir a um jogo de beisebol como visita de campo."
1160121368 = "Balance com toda a força (3)"
1491957964 = "Após assistir ao jogo, Sumire diz que o treinamento é apenas um dos caminhos para acertar um home run. Rei ouve isso e recomeça o treinamento."
296970736 = "Uma manhã um pouco especial em Shanhaijing (1)"
1725509148 = "Kisaki faz ginástica no Parque do Tigre Branco. Raijo e Kaguya testemunham essa cena. As duas, emocionadas, acabam interpretando mal……"
2419347030 = "Uma manhã um pouco especial em Shanhaijing (2)"
2827731487 = "Kokona chega ao local onde Kisaki passa tempo com o Sensei. Agora, Shanhaijing está dividida entre a 'facção do kung fu' e a 'facção da ópera de Pequim', e discussões acaloradas estão ocorrendo."
2670110927 = "Uma manhã um pouco especial em Shanhaijing (3)"
4126214442 = "No início da manhã, Kisaki vem com as crianças do Jardim Meihua para fazer ginástica. Lá, ela testemunha o confronto entre a 'facção do kung fu', liderada por Raijo, e a 'facção da ópera de Pequim', liderada por Kaguya. Depois de acalmar as duas, Kisaki decide que todos farão ginástica juntos."
1051527092 = "Banho termal com vista para a neve"
2252517002 = "O Departamento de Desenvolvimento de Fontes Termais está cavando uma fonte termal em um local remoto. Megu e Kasumi relembram a primeira vez que se conheceram."
3690331433 = "Presente?"
3902471118 = "Megu encontra Hina, a presidente do Comitê de Disciplina. Seguindo as instruções de Kasumi, Megu lhe entrega um 'presente'…… Hina, com os olhos estreitados, deixa um 'recado' para Kasumi."
2448188854 = "Nostalgia estranha (1)"
667882399 = "Em meio ao trabalho intenso, Nagisa desmaia de exaustão. Vendo isso, Mika e Seia a levam a uma loja especializada em chá em Shanhaijing e iniciam a 'Grande Operação Nagi-chan Refresca' para fazê-la esquecer o trabalho –!"
3407756720 = "Nostalgia estranha (2)"
912353483 = "Em um sidecar dirigido por Seia, o grupo vai a Shanhaijing e se dirige à loja de chá. Achando que Nagi-chan finalmente relaxaria, Nagisa, em um estado de torpor, enfia o rosto em uma cesta de folhas de chá, e seus sintomas só pioram……"
2328055038 = "Nostalgia estranha (3)"
835487577 = "Mika e Seia levam Nagisa, desanimada, a um parque e, com doces, relembram o passado. Passando um tempo tranquilo, Nagisa chega à resposta banal, mas importante, de que 'até as coisas difíceis um dia se tornarão boas lembranças', e recupera um pouco a energia. Mika pensa que talvez seja bom passar longas férias em uma praia particular da próxima vez."
1573223017 = "Reunião de intercâmbio suspeita (1)"
2145390660 = "Makoto e Iroha, do Pandemonium, visitam a Federação Escolar Red Winter com o pretexto de aprofundar o intercâmbio. Ao encontrar Cherino, tentam executar o golpe que era o verdadeiro propósito, mas o plano fracassa. Além disso, Makoto fica impressionada com Cherino, que nem se importa mesmo com a descoberta do golpe."
3039169023 = "Reunião de intercâmbio suspeita (2)"
24636765 = "O golpe de Makoto fracassa, e o intercâmbio continua como se nada tivesse acontecido. Makoto tenta mostrar seu poder, mas falha novamente. No entanto, Cherino gosta do espírito de Makoto e, para comemorar o intercâmbio, envia uma estátua para Gehenna."
1994595059 = "Termas Akae (1)"
3322468669 = "Devido aos sucessivos golpes exigindo melhorias nas instalações de banho, Cherino, sentindo a necessidade urgente de melhorias, chama Nodoka e Shigure e ordena que visitem as instalações de banho de outras escolas."
1342885926 = "Termas Akae (2)"
3701930055 = "Nodoka e Shigure visitam Gehenna, Trinity e a Academia Hyakkiyako para investigar as condições das instalações de banho de outras escolas."
3227194453 = "Termas Akae (3)"
1818357385 = "Sentindo que as instalações de banho de nenhuma escola se adequam a Red Winter, as duas finalmente visitam as instalações de banho da Millennium Science School."
1746358612 = "O dia brilhante de Kirara e Erika (1)"
3054966868 = "Kirara, animada com a perspectiva de uma juventude brilhante e empolgante, decide começar uma atividade extracurricular……"
1605797610 = "O dia brilhante de Kirara e Erika (2)"
38972141 = "Kirara e Erika visitam vários clubes da escola Gehenna. No entanto, como nenhum deles as interessa, elas chegam à conclusão de criar um novo clube."
2842972630 = "Diário de operação da Academia Ferroviária Highlander (1)"
3312844632 = "Alunas da Highlander operam a linha interna do circuito de Kivotos. Embora comece bem, vários problemas as atingem…… Elas respondem com afinco."
3052044810 = "Diário de operação da Academia Ferroviária Highlander (2)"
2036997224 = "Todo tipo de incidente ocorre em todos os vagões do trem. As alunas da Highlander, em pânico, se esforçam para cumprir seu dever como tripulantes."
265151180 = "Presente sem dono (1)"
2868457916 = "Hoje, muitas alunas visitam o Schale. Sora, da Anjo 24, suspeita que o Sensei esteja seduzindo as alunas com algum artifício. Nesse momento, ela encontra um objeto esquecido por alguém."
940371248 = "Presente sem dono (2)"
3815376917 = "Sora prevê que, se tornar público o objeto esquecido, haverá um grande alvoroço. Observando as alunas que visitam a conveniência, ela tenta descobrir de quem é o objeto perdido."
3248565005 = "Presente sem dono (3)"
681128818 = "No final, a dona não é encontrada, e Sora fica desanimada. Então, Miyako lhe traz um peru assado e fala sobre o Sensei. Foi então que o Sensei visita a conveniência e Sora descobre que o objeto perdido que estava guardando era um presente para ela."
85980073 = "Registro de um certo 18 de fevereiro"
3558670453 = "Véspera do aniversário. O Comitê de Disciplina e o Portão Xuanlong, que estavam preparando a festa, já haviam encomendado o bolo e agora era só esperar a chegada. Os preparativos para a celebração pareciam estar indo bem."
293758555 = "Registro de um certo 19 de fevereiro (1)"
2972099243 = "Devido a um erro de entrega, um bolo diferente do encomendado chega ao Comitê de Disciplina e ao Portão Xuanlong. Após investigação e troca de informações, descobre-se que os bolos das duas partes foram trocados. Enquanto buscam soluções às pressas, Mina pede ajuda à Sociedade Comercial Genbu."
2431797238 = "Registro de um certo 19 de fevereiro (2)"
4292864679 = "Com a ajuda de Rumi, uma festa de aniversário conjunta para Hina e Kisaki é realizada em um karaokê no D.U. Os bolos entregues erroneamente são trocados, e os bolos preparados pelo Comitê de Disciplina e pelo Portão Xuanlong são entregues aos destinatários corretos. Depois, o Sensei também se junta, e a festa de aniversário conjunta, que aconteceu sem querer, anima-se."
613757486 = "Gastronomia, biscoito e resgate (1)"
2018951353 = "Certo dia, ao meio-dia – com fome, a Sociedade de Estudos Gastronômicos começa a procurar Fuuka para que ela faça o almoço. Eles encontram Fuuka analisando seus padrões de comportamento e pegadas, mas lá também está a Ordem dos Cavaleiros de Resgate – Haruna e as outras entram em confronto com Mine por causa de Fuuka. Com o resgate esmagador de Mine, um a um os membros da Sociedade caem. Após a luta, quando Haruna pergunta por que Fuuka está com a Ordem de Resgate……"
932048524 = "Gastronomia, biscoito e resgate (2)"
3800725185 = "Mine revela a verdade. Para dissipar os rumores sinistros sobre si, ela planejava distribuir biscoitos caseiros em forma de pintinho e pediu ajuda a Fuuka, que encontrou por acaso. Ao ouvir a história, a Sociedade de Estudos Gastronômicos se oferece como degustadora. – Com o apoio de Fuuka, desde as compras até o preparo, os biscoitos de Mine são um sucesso, e Haruna e as outras aprovam. A Ordem de Resgate se anima, achando que todos vão gostar, mas, aproveitando a brecha, a Sociedade de Estudos Gastronômicos amarra Fuuka e foge. Enfurecida, Mine os persegue com uma força tremenda."
3665793023 = "Encontro repentino (1)"
4079696918 = "Como a academia de Millennium que costumava usar estava em reforma, Sumire visita outra academia. Lá, ela encontra Akemi, uma aluna com uma beleza corporal nunca antes vista. Admirada com Akemi, que bebe proteína elegantemente e faz agachamento com barra com facilidade, Sumire tenta fazer o mesmo treino ao seu lado."
453049144 = "Encontro repentino (2)"
1591044501 = "Ao acompanhar o treino insano de Akemi, Sumire relembra a 'fadiga' depois de muito tempo e se sente realizada. Após o término, Sumire e Akemi se apresentam e juram se encontrar novamente. – Refletindo sobre isso, Sumire se aproxima de Rei, dizendo: 'Se eu e ela nos unirmos, podemos treinar você para se tornar uma jogadora de beisebol ainda melhor'."
1158681565 = "Aqueles que não se prendem a nada (1)"
3331210092 = "Arata recebe um convite para a 'Noite do Chimimouryou', um evento para os verdadeiros membros do Chimimouryou. Não querendo ser desprezada pelos outros participantes, Arata decide procurar uma máscara adequada para si."
4277289430 = "Aqueles que não se prendem a nada (2)"
2156611397 = "No caminho para procurar a máscara, Arata se depara com Nagusa, do Comitê de Mediação de Conflitos Hagi Tsukiyono, e foge sem querer. Em seguida, encontra Love, uma aluna com uma máscara que Arata nunca tinha visto."
10885650 = "Aqueles que não se prendem a nada (3)"
1104397844 = "Na 'Noite do Chimimouryou', o líder do Chimimouryou convoca uma declaração de guerra contra Hagi Tsukiyono, mas Arata questiona essa ideia. Então, Izuna, a pedido de Niya, aparece para impedir o plano, e o local se torna uma grande confusão. Arata consegue escapar e se preocupa com o caminho do Chimimouryou. Mas Love, a dona do capacete, diz: 'Por que não só se divertir?', e seus sentimentos mudam……"
3455962407 = "No entanto, a Equipe de Vigilância continua correndo (1)"
871924267 = "No posto de controle da Wild Hunt. Com base em regras rigorosas, os pertences das alunas são confiscados um após o outro. No entanto, quando uma aluna tenta trazer uma estátua de outra pessoa, um tumulto irrompe. Outras alunas aproveitam, e o posto de controle se torna um estado de motim. Diante do caos, o membro da Equipe de Vigilância apenas observa um pombo voando no céu."
2447067328 = "No entanto, a Equipe de Vigilância continua correndo (2)"
1005229153 = "Cansada, a membro da Equipe de Vigilância, que dormia, é acordada por uma convocação de emergência no meio da noite. O 'Clube de Música de Fundo', fonte do barulho, é deixado de lado, e ela é instruída a perseguir o 'Clube de Saída Livre', que tenta fugir. No entanto, a caminho do destino, a missão é alterada para 'prender o Clube de Música de Fundo'. Com ordens absurdas que mudam repetidamente, a insatisfação da membro finalmente explode."
3479531073 = "O fim da era manual (1)"
2308546747 = "Cherino afirma que Red Winter também tem um supercomputador como o visto na Millennium EXPO. Marina, que respondeu 'vou fazer', pede ajuda ao Departamento de Publicações, à Frente de Libertação do Conhecimento e ao Departamento de Obras."
1024274588 = "O fim da era manual (2)"
3417343473 = "O grupo consegue fazer algo parecido com o supercomputador que Cherino queria. No entanto, era algo parecido com um supercomputador movido a força humana."
3220445133 = "A melancolia de Misuzu Kanbara (1)"
3116018838 = "Misuzu, a diretora correcional, passa dias ocupados, dedicando-se a criar um ambiente propício para a reabilitação. No entanto, durante um breve descanso, ao ser informada de uma tentativa de fuga, ela empalidece."
2049297372 = "A melancolia de Misuzu Kanbara (2)"
448396540 = "Misuzu realiza uma entrevista com a aluna que planejou a fuga. Diante da aluna problema, que dizia que só queria que celebrassem seu aniversário, Misuzu lhe entrega um presente que já havia preparado. Com sua personalidade gentil, a aluna demonstra arrependimento. No entanto, durante a conversa, Misuzu se lembra dos 'presos' que cometeram a fuga."
1261954325 = "No Ar: Gehenna (1)"
2043410218 = "Kirara estava desanimada, dizendo que faltava brilho. Oportunamente, Iroha propõe que ela seja a MC da rádio escolar de Gehenna. Segundo ela, o presidente da rádio renunciou de repente, e Makoto lhe ordenou que encontrasse um substituto a todo custo. 'Parece divertido!', Kirara aceita imediatamente, e Erika concorda."
2893444801 = "No Ar: Gehenna (2)"
708317131 = "A participação é decidida rapidamente, e a transmissão escolar pelo Clube Brilhante segue normalmente. No entanto, durante a transmissão, um problema técnico causa um som de alta frequência. Erika conserta imediatamente sem se desesperar, e a transmissão recomeça. A transmissão escolar termina com sucesso, com boa recepção."
3592692365 = "Uma erva daninha não floresce sozinha (1)"
950591110 = "Como recompensa pelo trabalho habitual, os membros da Empresa de Conveniência 68 visitam um restaurante de luxo por conta de Aru. Lá, eles se reencontram inesperadamente com um rival."
1515344389 = "Uma erva daninha não floresce sozinha (2)"
39269449 = "No passado. Haruka estava sendo intimidada por delinquentes. Aru e as outras intervêm. Embora a situação se resolva naquele momento, Aru decide resolver o problema da intimidação fundamentalmente. Após coletar informações, descobrem a existência da Família Rigatoni por trás dos delinquentes."
3333789074 = "Uma erva daninha não floresce sozinha (3)"
3741869477 = "Começa a luta entre a Empresa de Conveniência 68 e a Família Rigatoni. Quando Rigatoni faz reféns com clientes comuns, Aru e Kayoko são capturadas, pois não podem mais atacar. Mutsumi e Haruka escapam usando um pequeno elevador de cozinha. Lembrando-se de Aru, que a salvou no passado, Haruka se anima."
409183804 = "Uma erva daninha não floresce sozinha (4)"
2857688369 = "Haruka, determinada a salvar Aru desta vez, junto com Mutsumi, se veste de terno para se infiltrar no prédio. Enfrentando os mafiosos no caminho, Haruka sobe com ímpeto e confronta Rigatoni no último andar. Ela luta bravamente e consegue resgatar Aru e Kayoko."
2606844752 = "Uma erva daninha não floresce sozinha (5)"
2035383190 = "Após resolver o caso, a Empresa de Conveniência 68 é convidada para um restaurante. Embora não entendam o significado do cardápio, saboreiam a comida deliciosa. No caminho de volta, descobrem que a erva daninha que Haruka costumava cuidar floresceu vigorosamente. Todos juram cuidar bem dela."
