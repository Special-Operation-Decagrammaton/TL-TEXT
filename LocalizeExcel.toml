1851183371 = "プロローグ"
89706152 = "オペラハウスで仕事をしている便利屋68は、偶然、先生と同じ現場に居ることに気づく。"
993139401 = "仕事の用で（１）"
498565445 = "オペラハウスを訪問した先生。アルは、先生の仕事を手伝うと言い放ち、先生にオペラハウスを案内する。建物の構造と関係者の情報などをすべて把握しているアルに、先生はその理由を問いかける。アルは慌てながら「仕事の用」で来ていると言い、なかなか本心を明かさないのであった。"
904765692 = "仕事の用で（２）"
2182709110 = "突然の爆発と共に現れたハルカとムツキ、カヨコ。先生はみんなと一緒に現場を収拾し、便利屋68一行にオペラハウスに来ている理由について聞く。"
4116259171 = "よりハードボイルドに"
2413738832 = "便利屋68の依頼はギャング連合のボスである「ドン・アランチーノ」をさらうことだという。先生は便利屋68の事情を聞き、特に干渉しないよう振る舞うのであった。"
4217288089 = "怪しい奴ら（１）"
2431873477 = "ハルカとムツキとカヨコは、オペラハウスの中に潜んでいる正体不明の工作員を発見する。同時に、連中が設置していた爆弾も見つかる。オペラハウスにはより多くの残党が残っているとの情報を聞いた便利屋68は、先生と一緒にオペラハウスの中を捜索するのであった。"
402480360 = "怪しい奴ら（２）"
2947210386 = "オペラハウスの捜索を終え、便利屋68はターゲットである「ドン·アランチーノ」が現れたという情報を入手する。"
1538647403 = "想定外の事態（１）"
1448168568 = "ドン·アランチーノの到着を注視している便利屋68は、どこか動揺しているように見える観客たちの存在に気づく。"
3746301441 = "想定外の事態（２）"
2834066436 = "オペラハウスに居るすべての観客は、実はドン·アランチーノを狙っている他の工作員であった。工作員から逃げるドン・アランチーノは事前に用意した「切り札」を出す。後を追いかける便利屋68は、「切り札」と遭遇する。"
3486916526 = "手慣れてそうで不器用に（１）"
827737938 = "ドン・アランチーノの「切り札」は、護衛のアルバイトとして雇われた錠前サオリだった。サオリはドン・アランチーノを援護しながら退路を確保する。一方の便利屋68は二人を追いかける。"
2337333499 = "手慣れてそうで不器用に（２）"
2651395978 = "撤退する速度が遅く、このままでは追いつかれると判断したサオリ。そんなサオリは、より効率的な方法を実行に移す。"
2341248949 = "とんでもない誤解（１）"
1261692501 = "凄まじい速度で逃げるサオリと、追う便利屋68。アルは、先生の仕事を手伝うと言っておいて助けられっぱなしの現状に落胆する。先生は、自分の仕事より生徒の方が大事と言い、アルを励ますのであった。"
4111251961 = "とんでもない誤解（２）"
1351326142 = "サオリはドン・アランチーノ率いる構成員とついに合流する。しかし、アランチーノの構成員が銃口を向けたのは、便利屋68ではなくサオリの方であった。"
2596113209 = "とんでもない結末（１）"
2901309265 = "今の状況に困惑しているサオリ。アルはサオリに手を貸すことを決断し、ドン・アランチーノの構成員との戦闘へなだれ込むのであった。"
4014764348 = "とんでもない結末（２）"
2841436091 = "ドン・アランチーノの構成員と戦闘を繰り広げるサオリは、道端に置かれているゴミ箱を遮蔽物として使用する。しかし、そこには、誰かが捨てておいた危険な何かが詰まっていた。そこへ、一発の榴弾が飛んでくる。"
1334158071 = "こういう日もある"
291649493 = "夜明け前。先生と便利屋68、そしてサオリは屋台に集まり、一日中の出来事を振り返るのであった。"
2578774505 = "にぎにぎと ゆきゆきて"
3566222274 = "百鬼夜行へ修学旅行にやって来たゲヘナの生徒たち。そして、何の準備もなくゲヘナ生たちを迎えることになったお祭り運営委員会！彼女たちは果たして、やんちゃなゲヘナの生徒たちを無事ガイドすることができるのでしょうか？"
349911502 = "青天の霹靂な予感"
