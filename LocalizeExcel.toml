1113676227 = "「アウトロービーチ」に着いたサオリ。同じ時刻、アリウススクワッドの面々も海辺を訪れる。"
441949426 = "スクワッドの事情"
1404198579 = "会場のお祭りを楽しむスクワッドは、サオリを発見する。だが、見つからないように身を隠す。同時にサオリもスクワッドを発見し身を隠すことに。先生はサオリとスクワッド両方の頼みを聞くことになる。"
2456204254 = "近寄る影（１）"
4147584594 = "DJのアシスタント兼ボディガードとして雇われたサオリ。しかし、サオリはDJから理不尽な待遇を受ける。その姿を見たスクワッドは、DJを懲らしめようとするが……。"
986210830 = "近寄る影（２）"
2661859098 = "突然現れたスケバンたちを退治したスクワッド。その結果、DJのサオリに対する態度はがらっと変わるのであった。"
2631361917 = "一人前の焼きそば（１）"
4023902219 = "昼食のために屋台に立ち寄ったスクワッド。しかし、あまりにも高い値段に驚愕することに。一方、その姿を見守っていたサオリは、詐欺を働いた屋台の従業員に近づく。"
2708768266 = "一人前の焼きそば（２）"
1008490560 = "屋台の従業員たちを懲らしめたサオリは、自身で稼いだお金で料理を注文する。嬉しそうなサオリに、先生は焼きそばを勧めるのであった。"
3056220638 = "ヘルメット団水鉄砲大会（１）"
1177447799 = "ヘルメット団に呼ばれたサオリは、成り行きで水鉄砲大会に参加することに。スクワッドは、そんなサオリのためにこっそりと援護をするのだが……。"
1175838457 = "ヘルメット団水鉄砲大会（２）"
3181705269 = "思いもよらず優勝したサオリは事態が呑み込めていない様子。そんな現場から、スクワッドはすでに離れていた。"
1490045110 = "暗闇からの襲撃者"
928632541 = "「ニヤニヤ教授」という者の策略により、お祭り会場を襲撃するスケバンたち。サオリは危険を察知し、行動に出るのであった。"
1553518686 = "「彼女」の登場"
3175733890 = "サオリによって一網打尽にされたスケバン達は、教授を責める。しかし、教授は「彼女」が来るという一言を残すだけであった。一方、サオリはDJステージの最終準備を終え、スクワッドはお祭りのハイライトであるDJを見ようとやってくる。そしてステージが始まろうとするその瞬間、突然ロケット砲が飛んでくる。"
3164391228 = "伝説のスケバン"
1953496022 = "現れたのは七囚人の一人「伝説のスケバン」栗浜アケミだった。ヘルメット団に復讐しようとする彼女に、サオリが立ちはだかる。"
2986551664 = "アリウススクワッド、集結（１）"
359524290 = "心機一転したアケミと、アケミを中心に集まってきたスケバンたち。危機に追い込まれたサオリだったが、そこへスクワッドが加わる。"
865827266 = "アリウススクワッド、集結（２）"
295929181 = "敗北したアケミ。スケバンとアケミは、ニヤニヤ教授の説得により退却するのであった。そしてサオリとアツコ、ヒヨリ、ミサキは再会の喜びに浸るのだった。"
250762657 = "Yo DJ Pump This Party"
1864943768 = "騒ぎは収まったものの、DJが逃げてしまったことで、ステージは中止の危機にさらされる。その時、先生とスクワッドはサオリにDJをやってみるよう提案する。"
2999726945 = "エピローグ"
