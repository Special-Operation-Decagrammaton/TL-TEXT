756050995 = "Junto com os anjos"
1476788021 = "Shun leva as crianças do Jardim Meihua para visitar um ateliê de cerâmica, mas, agitadas pela curiosidade das crianças, o ateliê se torna uma grande confusão."
1516134459 = "A melancolia da instrutora Shun"
696264170 = "Cansada do trabalho e dos problemas com as crianças, Shun visita Saya, do Clube de Estudos de Alquimia, para ver se há algum remédio para beleza. Ao beber a 'poção do rejuvenescimento', Shun volta à sua forma de infância. Por acaso, encontra o Sensei e, sem querer, esconde sua verdadeira identidade."
3171161429 = "Tanfooloo na Terra do Nunca"
272869629 = "Shun, agora criança, se chama Shuerin e, com a desculpa de 'procurar Shun', percorre Shanhaijing com o Sensei."
3659036705 = "Uma pequena vingança"
2128585953 = "Shuerin e o Sensei vão a um parque e encontram Kokona. Embora Kokona suspeite um pouco, não descobre, e Shuerin acaba discutindo levemente com ela."
3993338859 = "A seriedade veste o uniforme"
1130994462 = "Enquanto descansam em uma casa de chá com Shuerin, aparece Kirino, da Academia de Polícia Valkyrie. Kirino se oferece para levar Shuerin ao Jardim Meihua durante sua patrulha, mas Shuerin, que não quer que atrapalhem seu tempo a sós com o Sensei, a manipula habilmente com palavras."
865881669 = "Identidade revelada"
659739859 = "O Sensei pergunta a Shuerin se ela realmente é uma criança do Jardim Meihua. Shuerin hesita em responder, mas Saya aparece naquele momento, e o Sensei descobre que ela é Shun. Shuerin nega e foge, mas Saya, vendo isso, diz que talvez seja ruim se não tomarem logo o antídoto."
3193274746 = "Grande operação de captura confusa"
2090973919 = "Saya e o Sensei armam várias armadilhas para capturar Shun, mas todas falham. 'Vamos fazer assim', tentam capturá-la à força, mas Kirino passa por ali e leva Saya e o Sensei para a delegacia."
1019726723 = "Como instrutora"
3020610193 = "O Sensei se desculpa com Saya por não ter cumprido o prometido e decide conversar com Shun novamente. Ao ouvir sua história, Shun desabafa sobre o peso da responsabilidade como instrutora. Ela diz que hoje foi fácil, mas ainda há várias angústias em seu coração. Nesse momento, vozes de crianças são ouvidas ao longe……"
4229508126 = "Shun e Shuerin"
138721578 = "Shun consegue voltar ao seu corpo normal. Dias depois, ao ver o Sensei visitar o Jardim Meihua, Shun, aproveitando sua altura, age um pouco como criança e se aconchega a ele."
1980144437 = "Caça à Coelhinha a Bordo"
1618805764 = "Para capturar a 'Coelha Branca', aluna problemática de Millennium, é emitida uma ordem de mobilização para a C&C. No entanto, o local para onde ela fugiu é um luxuoso navio de cruzeiro pertencente a outra escola! Dentro do navio, onde existem regras misteriosas, a C&C é obrigada a se vestir de coelhinha……?"
