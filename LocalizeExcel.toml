3336482954 = "Just One More"
678210889 = "A Summer Day"
2540272205 = "A hot summer day. Rumi comes up with a brilliant idea for Kisaki, who is suffering from summer heat."
143379641 = "Public Relations Manager"
1352314154 = "Kanae, a Chief of Genryumon, invited students from Genryumon, the Black Tortoise Promenade, and the Plum Blossom Garden to a banquet. The Black Tortoise Promenade's food is served, and the party proceeds lively. After the greetings are over, prompted by Kisaki, Kanae brings up the main topic."
4273162305 = "Inspection"
2102971118 = "The Black Tortoise Promenade had invested a large sum in a tourist destination outside Shanhaijing without confirming with Genryumon. Arguments heat up from each side regarding its merits. But that was exactly Rumi's goal, a 'pretext' to take Kisaki out. Thus, a vacation disguised as an inspection is decided."
1364446990 = "Water Play and Inspection, A Comprehensive Vacation (1)"
1603258373 = "The group visiting the valley immediately changes into swimsuits and goes out to play in the river. Sensei is asked for his thoughts on their swimsuits one by one. Now, a vacation under the guise of an inspection begins."
3031198795 = "Water Play and Inspection, A Comprehensive Vacation (2)"
3682937290 = "After enjoying playing in the river, the group visits the shopping district for a meal, also serving as an inspection. However, it is somewhat deserted, and the shopkeepers are afraid of something and don't give clear answers. As the group tilts their heads, they hear an ear-piercing voice."
2057877650 = "Terrifying Kindergarteners"
859586820 = "The group encounters a trio calling themselves the 'Chicks'. Those kindergarteners were acting lawlessly in the valley's shopping district. They managed to smooth things over for the moment, but the residents of the shopping district are completely troubled. Hearing the circumstances, the group unites to improve the situation."
3730554384 = "Phantom Kindergarteners"
2056319108 = "While Kiki, Shunling, and Sensei are having a strategy meeting, they are spotted by Kokona. Kokona is suspicious of why the two are there, but Sensei covers it up with a sudden lie. The next day, to find out the truth about the Chicks, the group begins investigating the shopping district. Kisaki and Shun dress up as kindergarteners to infiltrate the Chicks directly."
2395538202 = "Trial"
3849055276 = "Kiki and Shunling attempt to infiltrate the Chicks for investigation. They are given a trial to join the group, but they pass it safely and are welcomed as members. While observing the Chicks while playing together, they hear that they plan to raid the shopping district the next day."
3342829653 = "Those Who Walk Ahead"
349376399 = "At night, while walking by the water with Sensei, Shun talks about what she felt infiltrating the Chicks. The Chicks were innocent children. She expresses her anguish, wondering if she is crushing the children's potential just because it's bad."
1913700478 = "Contract and Transition (1)"
2335123540 = "The Chicks, having hired delinquents, raid the shopping district. However, because they had obtained information in advance, the group was prepared to intercept them. Facing an unexpected counterattack, the Chicks' anger rises as things don't go as planned. Without knowing that the time for punishment is about to begin."
1366757191 = "Contract and Transition (2)"
2673225665 = "Thanks to the group's efforts, the Chicks' raid is stopped. Kisaki, who had been infiltrating the Chicks as Kiki, faces the Chicks again as the 'Gatekeeper'."
3317495373 = "Sometimes Necessary"
1796827446 = "The Chicks are flustered at the mention of the Gatekeeper's name. Although Kokona starts lecturing them as an older sister, the Chicks don't listen and their frustration builds. Kisaki, who suddenly falls ill, is taken hostage, but Shun delivers a strict 'education' to the children of the Chicks."
678885512 = "Fireworks"
2167964134 = "With the Chicks' incident resolved, the shopping district regains its peace. The group enjoys the last night of their vacation as they please while watching the fireworks."
1830524387 = "Just One More"
3214662401 = "Kanae, who welcomed the group back from the valley, was staggering. Saying she did her best, Kanae collapses on the spot. The group sighs at the bustling Shanhaijing and returns to their respective daily lives."
2177793079 = "Replay"
1648432033 = "Field"