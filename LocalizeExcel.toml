1375547522 = "Romance Retrô-Chique"
2717163105 = "O Departamento de Desenvolvimento de Jogos da Millennium corre o risco de ser fechado.\n\rFaltam membros e o currículo delas está vazio……\n\rAinda assim, será que essas garotas, movidas pela paixão aos videogames,\n\rconseguirão criar o jogo perfeito?"

4106206320 = "O Romance da Amizade, da Coragem e da Luz"
2479220135 = "A turma do Departamento de Desenvolvimento de Jogos começou a criar um título inédito para o próximo Millennium Prize.\n\rNo entanto, uma crise repentina bate à porta e uma verdade cruel lhes é revelada……\n\rSerá que, no fim das contas,\n\relas conseguirão lutar e conquistar o seu merecido final feliz?"

