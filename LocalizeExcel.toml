986938597 = "O Ivan Kupala da Revolução retorna"
1392178341 = "A grande presidente"
4118873191 = "O Sensei [USERNAME] é chamado por Cherino, a presidente da Federação Escolar Red Winter. Seu objetivo é, através do Schale, divulgar o próximo festival de verão 'Ivan Kupala' para todas as escolas e espalhar a grandiosidade de Red Winter por todo Kivotos."
2981702230 = "O festival do solstício de verão tingido de expurgo"
1934906729 = "Enquanto inspecionam os preparativos para o festival, Cherino e seu grupo expurgam os alunos problemáticos (?). Nos bastidores, Marina, a presidente do Comitê de Segurança da Secretaria de Red Winter, quebrou acidentalmente a estátua de Cherino e tenta encobrir o ocorrido com um golpe."
3526237825 = "Golpe da tarde"
324633654 = "Cherino acorda de uma soneca ao ouvir um barulho alto vindo de fora. Ao saber que Marina deu um golpe, o grupo vai para o 'prédio antigo' nos arredores da Federação Escolar Red Winter e se esconde temporariamente."
4001712064 = "O lado oculto do prédio antigo, Classe Especial nº 227"
2746710944 = "Fugindo do golpe, Cherino e seu grupo se refugiam no 'prédio antigo'. Lá, encontram os alunos da 'Classe Especial nº 227' que Cherino havia expurgado anteriormente. Uma delas, Nodoka, acaba discutindo com Cherino. Por sugestão de Shigure, também da Classe Especial nº 227, elas decidem resolver na base do 'desafio de beber'."
2840864445 = "Primeira vitória"
433944428 = "Cherino vence por pouco. Nodoka e as outras prometem cooperar com Cherino para retornar ao prédio principal."
4281580888 = "É perfeito para uma soneca"
797442044 = "Cherino, com fome, fica com sono. Para tirar uma soneca, o grupo vai à biblioteca da Federação Escolar Red Winter. No entanto, quando ela tenta dormir usando livros como travesseiro, é impedida por Momiji, a bibliotecária da 'Frente de Libertação do Conhecimento', e uma briga começa."
4124993500 = "Segunda vitória"
1971393431 = "Embora tenham vencido a luta, Cherino interrompe a soneca porque perdeu o sono. Ela também pede a Momiji que coopere para retomar a secretaria. Ouvindo a promessa de Cherino de que, se cooperarem, 'permitirei que vejam todos os livros da Grande Biblioteca de Trinity', Momiji aceita prontamente."
252950650 = "Pudim para os trabalhadores!"
365643949 = "A Federação Escolar Red Winter estava com clima de festival, mas Cherino, agora sem poder, está insatisfeita. Nesse momento, Cherino é capturada pelo 'Departamento de Obras' e amarrada a uma pilha de lenha."
3840713209 = "Terceira vitória"
3349557109 = "Tomoe e [USERNAME] Sensei conseguem resgatar Cherino e lhe dizem que a atual presidente não é Cherino, mas Marina. Ao ouvir isso, o Departamento de Obras muda imediatamente de lado e vai à secretaria para questionar a nova líder."
3439678836 = "De volta à secretaria"
340629748 = "Após o sucesso do golpe, Marina aproveitava a doçura do poder. No entanto, ao ouvir de um guarda-costas que Cherino está vindo em sua direção com muitos alunos, ela entra em combate, confusa."
950061340 = "O Ivan Kupala da Revolução retorna"
1717155722 = "Cherino vence a luta e recupera o trono de presidente, e Marina e seus cúmplices são expurgados. No entanto, no dia do Ivan Kupala, os alunos que ajudaram Cherino se rebelam novamente exigindo o 'cumprimento da promessa', e Cherino é deposta mais uma vez."
4106251530 = "Lista de Desejos do Céu de Verão"
2948234550 = "Por várias circunstâncias, alunas de Trinity acabam indo ao mar com uma formação incomum. Com o objetivo de cumprir todos os itens da lista, elas correm pela praia!"
