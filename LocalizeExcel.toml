1985025284 = "O mar de verão e as garotas"
3057305999 = "Para levar Azusa ao mar pela primeira vez, Hifumi roubou um tanque Crusader, mas acabou sendo capturada pelo Comitê de Justiça junto com Azusa. Na mesma época, Hasumi estava pensando em fazer Tsurugi e Mashiro tirarem férias de verão, e o resultado foi que elas acabaram indo para o mar com uma composição de membros um tanto peculiar."
3787320337 = "A beira-mar de verão e os intrusos (1)"
2130123045 = "Seguindo a lista que recebeu de Hasumi, Hifumi começou construindo um castelo de areia, mas logo após terminar, ele foi destruído por delinquentes que invadiram o local. Enfurecidas, Tsurugi e Azusa pegaram suas armas e a batalha começou."
417190438 = "A beira-mar de verão e os intrusos (2)"
1931866986 = "O grupo conseguiu afastar os delinquentes. Tsurugi, ao se acalmar, prende a respiração por um momento pelo que acabou de fazer..."
1754061547 = "Castelos de areia e banhos de areia (1)"
1969422910 = "O grupo começa a construir o castelo de areia novamente. No entanto, diante de Hifumi, que havia retornado, erguia-se um castelo de areia gigantesco. Enquanto Mashiro e Azusa, orgulhosas, se entendiam, os delinquentes apareceram novamente."
4123624755 = "Castelos de areia e banhos de areia (2)"
1461186790 = "Embora o castelo de areia tenha desmoronado, elas conseguiram afastar os delinquentes com sucesso. Hifumi deu um sorriso sem graça, pensando se aquilo estava certo, mas, de qualquer forma, o primeiro item da lista foi concluído."
2757710025 = "Aprender a nadar (1)"
2632002684 = "A missão era \"aprender a nadar\", mas ao perguntar, parecia que todas já sabiam nadar um pouco. Assim que o Sensei sugeriu que ele ensinaria e que alguém poderia fingir que não sabia... todas, exceto Hifumi, começaram a fingir que não sabiam nadar. Os delinquentes apareceram novamente, visando Tsurugi, que deu uma atuação convincente."
3383988665 = "Aprender a nadar (2)"
3869586745 = "Elas conseguiram afastar os delinquentes com sucesso. Enquanto a batalha continuava, Azusa comentou: \"Entendo, então isso é o mar\", ao que Hifumi balançou a cabeça fracamente."
3813254294 = "Quiosque de praia (1)"
1603143310 = "Ao entrar no quiosque, encontraram Izumi, membro do Clube de Pesquisa Gastronômica de Gehenna. No momento em que tentavam pedir um item do menu com um nome estranho, os delinquentes, que já haviam sido vítimas dela, apareceram para se vingar."
546646916 = "Quiosque de praia (2)"
546040871 = "Após afastar os delinquentes, o grupo recebe uma bebida de Izumi como sinal de gratidão. No entanto, aquela bebida cinzenta era..."
3106530382 = "Quebra de melancia (1)"
325718512 = "Enquanto o grupo começava a brincadeira de quebrar a melancia, Izumi aparece novamente. Com o argumento, de certa forma válido, de que \"não se deve brincar com comida\", elas acabam entrando em conflito."
261331744 = "Quebra de melancia (2)"
859947442 = "O grupo derrotou Izumi, mas o resultado deixou um sentimento de vazio. Elas decidiram que, pelo menos, todas comeriam a melancia usada na brincadeira."
253070993 = "Vôlei de praia"
1254394396 = "Hifumi está um pouco exausta com as batalhas sucessivas. Enquanto ela murmura se tudo aquilo estava certo, os delinquentes aparecem pela enésima vez."
9561168 = "Fogos de artifício"
1121511268 = "Quando o sol começou a se pôr, o grupo decidiu soltar fogos de artifício. Fogos também subiam da direção onde os delinquentes estavam, e o grupo observava aquele mundo brilhante e passageiro. No entanto, por algum motivo, começaram a competir para ver quem soltava os fogos mais chamativos, como se fosse uma disputa, e no final, até granadas de napalm começaram a voar pelo céu."
1431627967 = "Lista de desejos do céu de verão"
4093852275 = "Após a limpeza, o grupo retornou para Trinity. Recebendo as fotos do Sensei, Hasumi sorri satisfeita por ter realizado seus desejos."
1444096591 = "Sonhos diferentes, corações próximos"
989281264 = "Após a conclusão da primeira missão ao chegar ao mar, o Sensei decide entrevistar Tsurugi sobre suas impressões. Após receber uma resposta muito positiva, ele entrevista Hifumi, mas a expressão dela, que deveria estar sorrindo, parece um tanto vazia...?"
4067085274 = "Um castelo de areia perfeito?"
332141174 = "Embora o castelo de areia tenha desmoronado, Azusa e Mashiro se entenderam bem. Elas começam a construir o castelo de areia (?) novamente, usando cimento e vergalhões."
2105082698 = "Enganar, ser enganado e ser enterrado"
1517924368 = "Desta vez, decidi entrevistar as delinquentes. Embora tenham acabado falando comigo, aos poucos, lágrimas começaram a surgir em seus olhos..."
493225528 = "O motivo dela ser a dona da loja"
2407947200 = "Izumi estava saboreando a comida na casa de praia, mas como serviu o molho especial da Juri, a dona da loja perdeu a consciência. Ela jura em seu coração proteger a loja no lugar da dona."
893343669 = "O orgulho de uma atiradora"
3383085495 = "Devido à invasão das delinquentes, a batalha de tiro ao alvo de Azusa e Mashiro, chamada de 'quebra da melancia', foi interrompida, para o alívio de Hifumi. No entanto, enquanto comiam a melancia, Izumi reacendeu o assunto..."
4288507338 = "Um tipo de esporte radical"
3926702143 = "Para completar o número de pessoas, pedimos para as delinquentes participarem do vôlei de praia. Porém, o saque avassalador de Tsurugi explodiu, dando início a um massacre unilateral."
3741808581 = "Um desejo ao céu"
4233111286 = "Uma bomba de napalm feita em Millennium que acabou chegando até aqui. Ela (?) foi adotada pelas delinquentes..."
2629323522 = "Decidi entrevistar Tsurugi e Hifumi sobre o castelo de areia."
1640955265 = "Azusa e Mashiro, que se entenderam bem, tentam construir um castelo de areia ainda mais resistente...?"
1039912979 = "Desta vez, decidi entrevistar as delinquentes."
263742558 = "Pouco antes da chegada de Hifumi e as outras, Izumi visitou a casa de praia, mas..."
1769899179 = "A batalha entre Azusa e Mashiro ainda não tinha acabado."
2973955910 = "Vamos convidar as delinquentes também e começar uma partida de vôlei de praia!"
3600215572 = "É um sussurro inexistente. A história pouco antes da bomba de napalm, que veio de Millennium, colorir o céu."
2703060754 = "As férias de verão da Presidente Hina!"
1497292368 = "Para que Hina pudesse passar um tempo relaxante, o Sensei e todo o Comitê Disciplinar visitaram a praia. No entanto, um problema atrás do outro começou a surgir, deixando os membros do comitê em pânico... Será que as férias de verão da Presidente Hina darão certo!?"
3548823613 = "Ordem de Missão Especial de Emergência do Comitê Disciplinar"
4186047598 = "Um problema após o outro"
1522682584 = "Planos frequentemente desmoronam"
3226668825 = "Tudo pela Hina"
2947837695 = "Coisas que acontecem com frequência na praia"
1304278708 = "O indesejado Clube de Pesquisa Gastronômica (1)"
314519574 = "O indesejado Clube de Pesquisa Gastronômica (2)"
4146028015 = "O cair da noite na beira-mar"
3143025950 = "Como uma mariposa atraída pela chama"
3796526995 = "Comitê Disciplinar vs Grupo de Problemas (1)"
1634083474 = "Comitê Disciplinar vs Grupo de Problemas (2)"
149694717 = "Este verão ainda não acabou"
2268949763 = "Treinamento de Acampamento de Verão do Comitê Disciplinar: Edição Prática"
2656530785 = "Ordem de Missão Especial de Emergência do Comitê Disciplinar"
3796114309 = "Ao notar que a Presidente Hina estava agindo de forma estranha ultimamente, Ako, a oficial administrativa do Comitê Disciplinar, presumiu que ela devia estar muito cansada. Por isso, ela planejou uma viagem à praia sob o pretexto de um 'Acampamento de Verão do Comitê Disciplinar' para presentear a Presidente Hina com férias. Pelo futuro de Kivotos, uma ordem de missão especial de emergência foi emitida."
2317210960 = "Um problema após o outro"
2558005236 = "O Sensei e o Comitê Disciplinar visitaram a costa de Araba sob o pretexto de um treinamento de acampamento de verão. Aquele era um local conhecido por ser uma praia bastante tranquila em Gehenna... ou deveria ser, mas descobriu-se que, por algum motivo, uma guerra total entre o Grupo do Capacete e as delinquentes ocorreria em 4 horas. O Comitê Disciplinar decide agir para resolver isso sem que a Presidente Hina saiba."
2633921 = "Planos frequentemente desmoronam"
3902657065 = "Enquanto o Comitê Disciplinar, liderado por Ako, Iori e Chinatsu, trava batalhas contra os encrenqueiros, o Sensei visita Hina. Embora devesse ter sido pedido a ele que mantivesse a presidente no quarto, a batalha se intensificou mais do que o esperado, fazendo com que o Sensei fosse chamado repetidamente. O Sensei, enquanto enganava Hina, comandava as batalhas repetidas vezes."
2147970018 = "Tudo pela Hina"
793970726 = "Prevendo uma guerra total de escala maior do que o esperado, o grupo hesita sobre contar ou não à Presidente Hina, mas Ako recusa categoricamente, dizendo que não pode deixar que nada atrapalhe as férias dela. Considerando as forças atuais, ela declara a continuação da operação, acreditando que podem lidar com isso sozinhos. Enquanto isso, Hina comenta que é a primeira vez que observa o mar com tanta calma, enquanto direciona seu olhar para o Sensei..."
1643965806 = "Coisas que acontecem com frequência na praia"
3515662738 = "Após muito esforço, o Sensei e o Comitê Disciplinar conseguem repelir o Grupo do Capacete e as delinquentes sem que Hina perceba. No entanto, logo após sentirem alívio, um novo grupo de encrenqueiros aparece na praia."
542833392 = "O indesejado Clube de Pesquisa Gastronômica (1)"
127397515 = "Por que o milho assado que comemos na praia ou em festivais é tão delicioso...? Para descobrir o motivo, o Clube de Pesquisa Gastronômica veio vender milho assado durante a guerra total. Percebendo a ausência da presidente Hina, elas apontam suas armas para o Comitê Disciplinar, decididas a não deixar que ninguém atrapalhe sua pesquisa gastronômica."
4024099259 = "O indesejado Clube de Pesquisa Gastronômica (2)"
1954305915 = "Com a liderança do Sensei, o Comitê Disciplinar consegue afastar o Clube de Pesquisa Gastronômica. Eles iniciam o treinamento de caminhada, mas, exaustos pelas batalhas anteriores, o treinamento não sai como planejado. E assim, o dia vai chegando ao fim..."
2838267782 = "O cair da noite na beira-mar"
228841159 = "Após a confusão se acalmar, Hina e o Sensei caminham pela praia à noite. Hina parece ter percebido que o Sensei estava correndo nos bastidores pelo bem do Comitê Disciplinar..."
3471015555 = "Como uma mariposa atraída pela chama"
104590627 = "O Comitê Disciplinar tenta apoiar ao máximo o tempo em que a Presidente Hina aprenderia a nadar, mas aproveitando a ausência da presidente, o Grupo do Capacete, as delinquentes, o Clube de Pesquisa Gastronômica e até o Departamento de Desenvolvimento de Fontes Termais se unem, transformando a praia em um campo de batalha total. Quando até Ako estava prestes a desistir chorando, a voz de Hina é ouvida de algum lugar."
4288288614 = "Comitê Disciplinar vs. Grupo de Alunos Problema (1)"
1176279714 = "Sob o comando da presidente do Comitê Disciplinar, Hina, começa a varredura dos alunos problema."
2434376056 = "Comitê Disciplinar vs. Grupo de Alunos Problema (2)"
2305285661 = "Diante do poder avassalador de Hina, os alunos problema recuam um após o outro. Ela se vira para os membros do Comitê Disciplinar e anuncia: 'Voltaremos ao hotel para uma reunião de reflexão imediata'."
1470755374 = "Este verão ainda não acabou"
913863345 = "Hina suspira enquanto ouve a explicação de Ako sobre o ocorrido. Embora diga que, no fim das contas, conseguiu descansar um pouco e não foi tão ruim, ela declara simultaneamente: 'Vamos recomeçar o treinamento de acampamento agora'. Enquanto todos os membros do Comitê Disciplinar entram em desespero, Hina sussurra para o Sensei: 'Compensarei você mais tarde', e sorri silenciosamente."
3595508161 = "Treinamento de Acampamento de Verão do Comitê Disciplinar: Edição Prática"
612706856 = "Ao ver o comportamento um tanto desleixado dos membros do Comitê Disciplinar, Iori suspira. Observando a situação, Ako, a vice-presidente, comenta que 'quem dá as ordens deve dar o exemplo primeiro', fazendo com que Iori tenha que demonstrar o treinamento de tiro."
2709915893 = "Pego na Terra do Nunca"
3067039180 = "Shun, instrutora do Jardim das Ameixeiras, bebeu o 'Elixir da Juventude' que recebeu de Saya e voltou a ter a aparência de quando era criança! Com a mudança física, sua mente também se tornou infantil, causando vários problemas por toda Shanhaijing...!?"
3385770823 = "Junto com os anjos"
3185094346 = "A melancolia da instrutora Shun"
392009308 = "Tanghulu na Terra do Nunca"
2414891336 = "Uma pequena vingança"
1875816467 = "A seriedade veste uniforme"
2706589085 = "A identidade revelada"
3894778464 = "Grande operação de captura atrapalhada"
3267863695 = "Como instrutora"
2440170449 = "Shun e Shuerin"
756050995 = "Junto com os anjos"
1476788021 = "Shun levou as crianças do Jardim das Ameixeiras para visitar uma oficina de cerâmica, mas a curiosidade das crianças, que estavam super animadas, acabou causando uma grande confusão dentro da oficina."
1516134459 = "A melancolia da instrutora Shun"
696264170 = "Exausta pelo trabalho e pelos problemas com as crianças, Shun visita Saya, do Clube de Pesquisa de Alquimia, em busca de algo bom para a beleza. Após beber o 'Elixir da Juventude' que recebeu de Saya, Shun volta à sua forma antiga e, por azar, acaba encontrando o Sensei, sentindo-se obrigada a esconder sua verdadeira identidade."
3171161429 = "Tanghulu na Terra do Nunca"
272869629 = "A Shun criança se apresenta como Shuerin e, sob o pretexto de 'procurar pela Shun', decide percorrer Shanhaijing junto com o Sensei."
3659036705 = "Uma pequena vingança"
2128585953 = "Quando Shuerin e o Sensei visitam o parque, encontram Kokona. Embora Kokona fique um pouco desconfiada, ela não descobre a verdade, mas uma discussão leve acaba surgindo entre Shuerin e Kokona."
3993338859 = "A seriedade veste uniforme"
1130994462 = "Enquanto Shuerin e o Sensei desfrutavam de um momento de tranquilidade em uma casa de chá, Kirino, aluna da Academia de Polícia Valkyrie, aparece. Kirino sugere levar Shuerin de volta ao Jardim das Ameixeiras durante sua patrulha, mas Shuerin, não querendo que seu tempo com o Sensei fosse interrompido, usa sua lábia para confundir Kirino."
865881669 = "A identidade revelada"
659739859 = "O Sensei pergunta a Shuerin se ela é realmente uma criança do Jardim das Ameixeiras. Shuerin hesita em responder, mas nesse momento Saya aparece, revelando ao Sensei que ela é, na verdade, Shun. Shuerin nega e foge, mas ao ver a cena, Saya comenta que pode ser perigoso se ela não tomar o antídoto logo."
3193274746 = "Grande operação de captura atrapalhada"
2090973919 = "Saya e o Sensei armam várias armadilhas para capturar Shun, mas todas falham. Quando decidem tentar capturá-la à força, Kirino passa pelo local e acaba levando Saya e o Sensei para a delegacia."
1019726723 = "Como instrutora"
3020610193 = "O Sensei pede desculpas a Saya por não ter cumprido a promessa original e decide conversar seriamente com Shun. Ao ouvi-la, os pensamentos de Shun sobre o peso de ser uma instrutora começam a transbordar. Shun diz que hoje foi um dia tranquilo, mas, no fundo, ela ainda carrega vários conflitos internos. Nesse momento, as vozes das crianças são ouvidas ao longe..."
4229508126 = "Shun e Shuerin"
138721578 = "Shun conseguiu voltar ao seu corpo original com sucesso. Dias depois, ao encontrar o Sensei visitando o Jardim das Ameixeiras, Shun aproveita sua altura para agir de forma um pouco infantil e mimar-se com o Sensei."
1980144437 = "Caçadoras de coelhos a bordo"
1618805764 = "Um pedido de mobilização é enviado à C&C para capturar a 'Coelha Branca', uma aluna problema de Millennium. No entanto, o local para onde ela fugiu é um luxuoso navio de cruzeiro pertencente a outra academia! Dentro do navio, onde existem regras misteriosas, o pessoal da C&C acaba tendo que vestir trajes de coelhinha...?"
3368447310 = "Nova integrante temporária da C&C"
3640605968 = "Vamos ser espertos (1)"
496873460 = "Vamos ser espertos (2)"
389769729 = "O mesmo processo de pensamento de sempre (1)"
936882366 = "O mesmo processo de pensamento de sempre (2)"
2374100520 = "Interrogatório impiedoso"
1421586185 = "Reviravoltas como sempre"
2701928538 = "Daqui em diante, é a C&C de sempre (1)"
467729975 = "Daqui em diante, é a C&C de sempre (2)"
4291751326 = "Caça ao coelho (1)"
4081106512 = "Caça ao coelho (2)"
1967708666 = "Novas membros temporárias da C&C"
2816760860 = "Após receberem um pedido do Seminar, a C&C e o Sensei se infiltram no cruzeiro de outra escola para capturar uma aluna problemática de Millennium."
1134085300 = "Vamos agir com elegância (1)"
2193456480 = "Para capturar a aluna conhecida como \"Coelho Branco\", \"Kurosaki Koyuki\", a C&C e o Sensei se infiltram no \"Golden Fleece\", um dos cruzeiros da \"Escola de Oceanografia Odyssea\". Embora Yuuka tenha pedido para \"serem elegantes\", Neru acaba recorrendo à violência logo no início da infiltração, como de costume."
2483236395 = "Vamos agir com elegância (2)"
1884799725 = "Após despistarem os perseguidores, a C&C se esconde em uma cabine. Como parece ser uma regra do navio, elas decidem trocar seus uniformes de empregada por trajes de coelhinha para iniciar a missão de verdade."
1056530700 = "O padrão de pensamento de sempre (1)"
1693954578 = "Ao chegarem na sala de sistemas, Akane começa a assumir o controle. Enquanto conversam sobre o Coelho Branco, elas percebem que Akane instalou C4 como sempre faz...?"
1022905949 = "O padrão de pensamento de sempre (2)"
1449739310 = "Por ter se empolgado um pouco, Akane acaba destruindo a sala de sistemas como de costume. O grupo cobre Akane, que se sente culpada, e decide iniciar o Plano B."
1520912610 = "Interrogatório impiedoso"
565467883 = "O grupo acorda a guarda coelhinha que haviam capturado pouco antes para tentar obter informações. Enquanto pensam em como fazer isso, Karin diz: \"Eu farei\". Ela estende a mão em direção à guarda coelhinha e..."
3624501163 = "Reviravoltas de sempre"
451418386 = "A guarda coelhinha desmaia, mas elas conseguem a informação sobre o \"Play Lounge\" e decidem invadir o local. Neru e o Sensei começam a procurar e encontram o \"Coelho Branco\" facilmente, mas Asuna aparece de repente no telão da sala, revelando a presença deles."
2744902706 = "Daqui em diante é a C&C de sempre (1)"
1270600116 = "Em desvantagem numérica, Neru e o Sensei são jogados na cela. Durante a conversa com o \"Coelho Branco\", Kurosaki Koyuki, Akane e Karin aparecem, mas elas também acabam sendo capturadas."
1477170984 = "Daqui em diante é a C&C de sempre (2)"
3631747017 = "Com Neru, Akane, Karin e o Sensei capturados, o \"Coelho Branco\" ri alto, convencida de sua vitória. Asuna aparece em seguida e, quando pensavam que todos haviam sido capturados, descobre-se que Asuna, sem que percebessem, tornou-se uma convidada VIP no navio. A situação se inverte e o \"Coelho Branco\" passa a ser a caçada."
3892929799 = "Caça ao coelho (1)"
1875159880 = "Desta vez, é Neru quem ri alto enquanto persegue o \"Coelho Branco\", que chora e grita. Akane, Karin e o Sensei observam a cena e comentam: \"Vamos pará-la antes que as coisas fiquem perigosas\"."
2450097182 = "Caça ao coelho (2)"
1604146950 = "Como último recurso, o \"Coelho Branco\" tenta escapar do navio usando um drone, mas acaba sendo capturada após um tiro certeiro de Karin. A C&C pensou que tinha terminado a missão em segurança, mas...?"
2677397330 = "Show especial da Hatsune Miku"
747922562 = "A famosa cantora virtual \"Hatsune Miku\" finalmente chega a Kivotos com um novo corpo e uma nova música!"
3536644942 = "Show especial da Hatsune Miku em Kivotos ~Ensaio~"
950748371 = "Show especial da Hatsune Miku em Kivotos ~Ensaio~"
1881031906 = "O show da cantora virtual \"Hatsune Miku\" em Kivotos foi confirmado! Antes da apresentação real, ela decide realizar um ensaio especial com o público para ajustar seu corpo."
1198367208 = "Registro de operação do Resort Termal 227!"
266434959 = "Certo dia, águas termais brotam repentinamente do antigo prédio escolar, e a Classe Especial 227 decide administrar um resort termal. Com as alunas visitantes causando problemas uma após a outra, será que Nodoka e as outras conseguirão administrar o resort com sucesso!?"
2672946211 = "Um dia na Classe Especial 227"
14866791 = "Não me lembro de ter autorizado isso"
3346815849 = "Bem-vindos ao Resort Termal 227!"
3556940645 = "Olhares suspeitos"
2746089614 = "Negociação suspeita"
4261642911 = "Trabalho para o Departamento de Engenharia!"
495768803 = "Mors para o Departamento de Engenharia!"
1314328058 = "As férias de inverno de uma certa Comitê Disciplinar!?"
1122166252 = "A conspiração do Departamento de Desenvolvimento Termal"
3282227236 = "Remover, temos que remover!"
1693609049 = "Coisas que não mudam"
2809478263 = "Um dia na Academia Federal Red Winter"
1881991320 = "Um dia na Classe Especial 227"
3129722182 = "Em um dia frio de inverno, Nodoka e Shigure tentavam arrancar um pilar de madeira em busca de lenha para a fogueira. Quando finalmente conseguiram, descobriram que, na verdade, havia uma fonte termal embaixo! O Departamento de Desenvolvimento Termal de Gehenna aparece e transforma toda a área ao redor do antigo prédio escolar em um resort termal."
124314717 = "Não me lembro de ter autorizado isso"
590648767 = "Quando o Sensei visita Red Winter, ele encontra Cherino tirando uma soneca, como de costume. Durante a conversa, descobre-se que uma fonte termal surgiu em Red Winter sem que Cherino soubesse. Indignada por não ter sido informada, Cherino parte em direção ao antigo prédio escolar com um novo tanque."
1823415428 = "Bem-vindos ao Resort Termal 227!"
2338205529 = "Ao chegarem ao antigo prédio escolar, Cherino e seu grupo ficam surpresos ao verem o local completamente transformado no \"Resort Termal 227\". Nodoka e Shigure, que se tornaram as donas do resort, conquistam o pessoal da secretaria de Red Winter com pães de banho e outras guloseimas. Depois, Nodoka leva o Sensei para uma fonte termal exclusiva."
488046043 = "Olhares suspeitos"
1111671300 = "Enquanto o Sensei aproveitava o banho, ele ouve uma voz vindo de algum lugar. Era \"Meru\", da Frente de Libertação do Conhecimento. Ela veio ao resort em busca de inspiração para seu doujinshi. Meru acaba discutindo com Nodoka, que chega logo depois, e uma batalha começa bem na frente do Sensei, que ainda estava na água."
2551825690 = "Negociação suspeita"
2970020116 = "Mel foi derrotada na batalha, mas conseguiu se reconciliar com Nodoka ao mostrar sua \"sinceridade\". O Sensei, como se estivesse sendo empurrado por Nodoka, seguiu em direção ao jardim."
2115498113 = "Trabalho para o Departamento de Obras!"
299148182 = "A caminho do jardim, Nodoka e o Sensei encontraram os alunos do Departamento de Obras. Segundo elas, seu orgulho foi ferido porque, ignorando-as, alunos de fora construíram o ponto turístico de Red Winter, e elas estavam protestando contra isso. Nodoka tentou convencê-las, mas não foi ouvida, e a batalha começou."
2575633767 = "Mors para o Departamento de Obras!"
27949908 = "Após a batalha, Nodoka e Minori ainda não haviam caído. Então, Shigure trouxe um Mors quentinho. Com o sabor e o calor, o Departamento de Obras ficou feliz e, aceitando a proposta de Shigure, elas entraram na fonte termal."
3696228207 = "As férias de inverno de uma certa monitora!?"
4153367937 = "Quando o Sensei foi para a sala de descanso, encontrou Chinatsu, do Comitê Disciplinar de Gehenna. Ela estava aproveitando a cadeira de massagem, mas parecia estar ali em missão; ela deixou um aviso sobre o Departamento de Desenvolvimento de Fontes Termais e foi embora."
1351623494 = "A conspiração do Departamento de Desenvolvimento de Fontes Termais"
1967122534 = "Enquanto o Sensei passeava, encontrou Cherino, que parecia estar com frio usando apenas um yukata. Fascinada pelo charme da Estância Termal 227, Cherino pensou em como anexar o Departamento de Desenvolvimento de Fontes Termais de Gehenna, que construiu o local, a Red Winter. Cherino tentou conceder uma medalha ao Departamento de Desenvolvimento de Fontes Termais que passava por ali para que jurassem lealdade a ela, mas não pareceu ter efeito. Depois, para impedir o plano de \"explodir toda a Região Autônoma de Red Winter\", que foi revelado durante a conversa com elas, Cherino e o grupo entraram em conflito com o Departamento de Desenvolvimento de Fontes Termais."
3915830261 = "Remoção, é hora da remoção!"
242528877 = "Cherino e as outras conseguiram impedir a conspiração do Departamento de Desenvolvimento de Fontes Termais, mas Nodoka, que apareceu por acaso, não conseguiu aceitar o fato de que \"a Estância Termal 227 fecharia se continuasse assim\". Resistindo, Nodoka contratou o Departamento de Obras no local e a batalha contra Cherino e as outras começou."
2923230343 = "Coisas que não mudam"
3703937299 = "Nodoka e o Departamento de Obras foram derrotados pelo \"Expurgador nº 1\". Nodoka, tomada pela tristeza, derramou lágrimas dizendo que tudo já tinha acabado. Shigure aproximou-se dela e disse gentilmente que nada tinha acabado. Cherino também decidiu preservar o prédio, e quando tudo parecia estar se resolvendo, o Departamento de Desenvolvimento de Fontes Termais apareceu. Seguindo o plano que a chefe Kasumi havia preparado, a Estância Termal 227 foi pelos ares—"
4161771854 = "Um dia no Colégio Federal de Red Winter"
2833699108 = "A Estância Termal 227 foi espetacularmente explodida. Nodoka ficou triste com a cena desoladora, mas disse que estava tudo bem, já que todos, incluindo o Sensei, estavam a salvo. Depois, para lavar o corpo sujo pela explosão, o grupo de Red Winter foi até a única fonte termal ao ar livre que não foi destruída. Elas entraram na água, fazendo barulho e se divertindo, enquanto cada uma falava sobre o futuro."
1633221653 = "Rapsódia de Ano Novo nº 68"
2815513763 = "Kivotos deu as boas-vindas ao novo ano. Logo no início do ano, a Problem Solver 68 foi a um lugar famoso por \"realizar desejos\" e, lá, encontrou ladrões de oferendas! Qual será o destino dos desejos delas...!?"
533004828 = "No início do ano"
754340588 = "No lugar visitado"
1784066045 = "A confusão sempre vem de repente"
2433279204 = "Perseguição agitada! (1)"
3915027091 = "Perseguição agitada! (2)"
3046123129 = "Os intrusos se reúnem (1)"
2967656392 = "Os intrusos se reúnem (2)"
2664706741 = "O Comitê Disciplinar entra na briga (1)"
416119718 = "O Comitê Disciplinar entra na briga (2)"
2541102787 = "O motivo para querer recuperar"
3525493070 = "Por um triz (1)"
426253146 = "Por um triz (2)"
3279289756 = "Comitê de Contramedidas, reunir!"
5196123 = "O sinal do contra-ataque"
3962776952 = "Batalha pelo Templo da Grande Sorte (1)"
3758757243 = "Batalha pelo Templo da Grande Sorte (2)"
2324153256 = "Kaitenger, a batalha final! (1)"
3612688870 = "Kaitenger, a batalha final! (2)"
2607168260 = "Desejos para o Ano Novo (1)"
1637323481 = "Desejos para o Ano Novo (2)"
2247335429 = "No início do ano"
3065827640 = "O grupo da Problem Solver 68, que deu as boas-vindas ao Ano Novo, decidiu visitar o templo vestindo quimonos como parte de sua estratégia de imagem. Com o objetivo de chegar a um ponto de energia onde dizem que \"os desejos se realizam\", a primeira missão de Ano Novo da Problem Solver 68 começa."
2222583121 = "No lugar visitado"
349816101 = "No famoso \"Templo da Grande Sorte\", o grupo da Problem Solver 68 encontrou o Sensei do Schale e Serika, que estava trabalhando em um bico. Mal tinham terminado de rezar quando um invasor inesperado chegou ao \"Templo da Grande Sorte\"."
1548857717 = "A confusão sempre vem de repente"
78140412 = "Esquadrão Sushi de Rotação Infinita, Kaitenger. Os cinco heróis que buscam o romance e a rotação infinita lutam dia e noite contra o mal, mas suas atividades exigem muitos fundos. Diante dos Kaitenger, que roubaram a caixa de oferendas do \"Templo da Grande Sorte\" como fonte de recursos, surgem vilões (?)! Não desistam, Kaitenger!"
2724683777 = "Perseguição agitada! (1)"
136523753 = "A Problem Solver 68 perseguiu a caixa de oferendas roubada, mas o Grupo do Capacete apareceu em seu caminho. A disputa com o Grupo do Capacete, que dizia que a caixa de oferendas era \"sua presa\", acabou se transformando em uma batalha."
3903699213 = "Perseguição agitada! (2)"
2859412133 = "Após repelir o Grupo do Capacete, a Problem Solver 68 retoma a perseguição aos Kaitenger."
729440909 = "Os intrusos se reúnem (1)"
350982557 = "Não apenas o Grupo do Capacete, mas também delinquentes e mercenários começaram a participar da disputa pela caixa de oferendas. Com a entrada de tantas facções, a situação se torna cada vez mais caótica."
2755401990 = "Os intrusos se reúnem (2)"
3528072125 = "Goro Kameshima, o administrador do \"Templo Daikichi\", declarou que \"entregará o conteúdo da caixa de ofertas a quem capturar os Kaitengers\". Descobre-se que, devido à ampla divulgação disso, muitas pessoas estavam de olho na caixa de ofertas."
2205291367 = "A entrada do Comitê Disciplinar (1)"
1888035674 = "O que bloqueou o caminho da Problem Solver 68 enquanto perseguiam os Kaitengers foi o Comitê Disciplinar, que apareceu para conter a confusão. Devido às suas ações habituais, o Comitê Disciplinar considerou a Problem Solver 68 como inimiga e entrou em combate."
2183154251 = "A entrada do Comitê Disciplinar (2)"
2198410486 = "Graças às informações do Comitê Disciplinar, descobriu-se que o tumulto era um golpe aplicado por uma organização chamada Grupo Kurokame. O boato de que \"os desejos se realizam\" era mentira, e tudo não passava de uma farsa para lavagem de dinheiro."
4010527531 = "O motivo para recuperar"
3968629623 = "Entendendo que tudo era um golpe, Aru decide recuperar a caixa de ofertas para não deixar que os sentimentos de todos, depositados em seus desejos, fossem manchados. O grupo encontra os Kaitengers novamente e inicia o combate."
3598038673 = "Por um triz (1)"
409425870 = "O grupo recupera a caixa de ofertas com sucesso. No entanto, Goro Kameshima volta atrás em sua palavra e declara que não entregará a caixa para a Problem Solver 68. Ele tenta tomar a caixa de volta usando a força."
569618432 = "Por um triz (2)"
653310391 = "Pressionadas pelo número de membros do Grupo Kurokame, Aru e as outras ficam gradualmente em desvantagem. Aproveitando a brecha, Goro Kameshima e o Grupo Kurokame roubam a caixa de ofertas e tentam fugir. Quem impediu o Grupo Kurokame de escapar foi Hoshino, da Escola de Ensino Médio Abydos."
3680934526 = "Comitê de Contramedidas, reunir!"
4177381587 = "Sabendo da crise de sua veterana Serika, o Comitê de Contramedidas de Abydos se reuniu. Com a ajuda delas, o grupo reverte a desvantagem e começa o contra-ataque contra o Grupo Kurokame."
3434302330 = "O sinal do contra-ataque"
1459348410 = "Graças ao plano de Mutsuki, a conspiração é revelada e Goro Kameshima acaba se tornando alvo da fúria das pessoas. Sem dar tempo para ele fugir, o grupo invade a base do Grupo Kurokame."
685949528 = "Batalha defensiva no Templo Daikichi (1)"
2152576060 = "Com a ajuda do Comitê de Contramedidas e do Comitê Disciplinar, a Problem Solver 68 e Serika conseguem confrontar Goro Kameshima novamente. A batalha final contra Goro Kameshima, que não tem mais para onde fugir, começa."
121004998 = "Batalha defensiva no Templo Daikichi (2)"
2286166571 = "A Problem Solver 68 e Serika derrotam Goro Kameshima e recuperam a caixa de ofertas. No entanto, ela estava vazia. O conteúdo já havia sido roubado pelos Kaitengers."
3697449286 = "Kaitengers, a batalha final! (1)"
151256718 = "A amada máquina dos Kaitengers, KAITEN FX Mk.0, caiu durante a luta contra os vilões (?). Mas, com sentimentos intensos, determinação inabalável e fundos suficientes, os Kaitengers podem se levantar quantas vezes forem necessárias! Agora é a hora do retorno, KAITEN FX Mk.1!"
1278198911 = "Kaitengers, a batalha final! (2)"
755111408 = "A Problem Solver 68 e Serika derrotam os Kaitengers. Mas isso também significou que elas mesmas destruíram suas próprias ofertas. Aru fica atônita. Parece que este ano será igual ao ano passado."
801389629 = "Desejos de Ano Novo (1)"
4014731644 = "O Grupo Kurokame foi aniquilado, mas os vilões que tiveram sua ganância despertada não aceitam isso. Serika e o Sensei acabam sendo perseguidos enquanto lidam com o Grupo Capacete, que causa tumulto lamentando pela caixa de ofertas que não conseguiram obter."
2841804487 = "Desejos de Ano Novo (2)"
3280902185 = "Serika não recebeu seu pagamento de meio período e a Problem Solver 68 também teve trabalho em vão. No entanto, como o que passou, passou, elas fazem suas orações novamente e o grupo recebe o Ano Novo com uma sensação de renovação."
3791568720 = "Patrulha de Feliz Dia dos Namorados do Schale"
1219956127 = "O Dia dos Namorados chegou a Kivotos! O Sensei é levado por Kirino e Fubuki para visitar o local do evento, que está mais movimentado do que nos anos anteriores. O dia da batalha pelo amor das garotas começa!"
3216935680 = "Trabalho de Dia dos Namorados (1)"
1295044406 = "Trabalho de Dia dos Namorados (2)"
1950903634 = "Mesmo depois que o Dia dos Namorados acaba"
576446100 = "Feliz Dia dos Namorados...?"
3678945063 = "Medidas de segurança"
1737805373 = "O Oyakodon supremo!?"
3433131004 = "Atividades de resgate com carinho e rigor"
2246879745 = "Este mundo está errado"
1009008909 = "Feliz Dia dos Namorados!"
3775021891 = "Trabalho de Dia dos Namorados (1)"
1872607528 = "No Distrito D.U., que celebra o Dia dos Namorados, eventos em larga escala são realizados um após o outro. A pedido de Fubuki e Kirino, da Academia de Polícia Valkyrie, o Sensei começa as atividades de patrulha."
1521429380 = "Trabalho de Dia dos Namorados (2)"
3051470549 = "O evento pacífico deveria ter terminado com o ataque da \"Raposa da Calamidade\", Wakamo Kosaka, que apareceu de repente... Mas, com a ajuda de Sena, que estava presente, Kirino e as outras conseguem subjugar Wakamo. Wakamo é levada sob custódia e o divertido Dia dos Namorados recomeça."
4125302622 = "Mesmo depois que o Dia dos Namorados acaba"
2631208014 = "Embora Wakamo tenha escapado, o tumulto foi contido sem grandes confusões. O Dia dos Namorados terminou em paz. No dia seguinte, o Sensei interage com as alunas que estão fazendo suas reflexões e resolvendo as pendências. Entre essas alunas, estava também Wakamo Kosaka."
1047327753 = "Feliz Dia dos Namorados...?"
410407804 = "Ao chegar o Dia dos Namorados, o Esquadrão de Socorro decide distribuir chocolates aos cidadãos. Quando um clima harmonioso pairava no ar, uma explosão ocorre de repente. Os delinquentes começam a causar tumulto e os arredores caem no caos. O Esquadrão de Socorro, liderado por Mine, decide iniciar as \"atividades de resgate\"."
3981192346 = "Medidas de segurança"
1150264065 = "Chihiro explica pacientemente o conceito de segurança para o Departamento Correcional da Valkyrie. Embora ela anuncie que montou um novo sistema de segurança, Wakamo aproveita a brecha para destruir fisicamente a porta e escapar da prisão."
2499107451 = "O Oyakodon supremo!?"
1609115689 = "O chef de Oyakodon, sentindo seus limites, vai às ruas para pesquisar um novo sabor. No entanto, sem encontrar nenhuma ideia nova, ele pede ajuda a Suzumi, que passava pelo local na hora certa. A ideia de Suzumi dá ao chef uma nova inspiração, e finalmente um novo menu, fruto de todo o esforço do chef, nasce."
1290044481 = "Atividades de socorro com cenoura e chicote"
4077437065 = "Embora a supressão dos delinquentes tenha sido concluída graças às atividades de socorro de Mine, o Departamento de Segurança Pública ainda não entrou em ação. Enquanto Mine protestava veementemente ao ouvir o motivo, Wakamo escapou novamente."
3224852679 = "Este mundo está errado"
2737288181 = "Uma delinquente que buscava uma vida livre estava insatisfeita com sua saia antiquada. Ao ouvir isso, Wakamo fez uma sugestão a ela — e assim, a delinquente começou a causar tumulto novamente com um visual totalmente novo."
1674653734 = "Feliz Dia dos Namorados!"
3425508891 = "Enquanto Wakamo criava falsos por toda parte e causava tumultos, ela encontrou Mine. Mine perguntou a Wakamo por que ela estava causando tanta confusão — e, ao ouvir a resposta, Mine sorriu e abriu caminho para apoiá-la. Assim, ela retomou suas \"atividades de socorro\" contra a problemática que continuava a causar estragos."
153995850 = "Com a chegada do Dia dos Namorados, o Esquadrão de Socorro decidiu distribuir chocolates. Será que este ano teremos um Feliz Dia dos Namorados sem problemas...?"
1099429423 = "Para garantir a segurança, parece que Chihiro está explicando desde os conceitos básicos, mas..."
1299607610 = "Um mestre de oyakodon em busca do sabor supremo saiu às ruas. Será que ele conseguirá encontrar a resposta?"
2424829376 = "Mesmo no meio da crise de fuga de Wakamo, qual seria o motivo pelo qual o Departamento de Segurança Pública não pode agir —?"
1073833967 = "Não aguento mais esse visual! Qual foi o conselho que Wakamo deu a uma delinquente que estava preocupada com sua própria identidade?"
2783498663 = "Mine e Wakamo finalmente se encontraram — será que este tumulto terminará em paz?"
3145939835 = "O silêncio e o banquete de Wakamo Kozaka"
3731216719 = "Wakamo Kozaka, uma das \"Sete Prisioneiras\", conhecida como a \"Raposa da Calamidade\", apareceu.\rZombando da segurança reforçada e esmagando os obstáculos em seu caminho, ela corre pela cidade.\rCom seu verdadeiro rosto ainda escondido sob a máscara..."
3487882084 = "Ataque Parte 1 (1)"
2174923451 = "Ataque Parte 1 (2)"
1269429059 = "Ataque Parte 2 (1)"
37429416 = "Ataque Parte 2 (2)"
648736061 = "Ataque Parte 3 (1)"
3017487652 = "Ataque Parte 3 (2)"
543422608 = "Ataque Parte 4 (1)"
1454069515 = "Ataque Parte 4 (2)"
3483561865 = "Ataque Parte 5 (1)"
1562212096 = "Ataque Parte 5 (2)"
3800514801 = "Conclusão (1)"
3387719790 = "Conclusão (2)"
1243671927 = "Ataque Parte 1 (1)"
1765541951 = "Sensei retomou a patrulha com Sena. Enquanto aproveitavam um Dia dos Namorados sem corpos ou feridos, a notícia que chegou foi a explosão de um veículo da Valkyrie que seguia para o Departamento Correcional. E o aviso da fuga de Wakamo."
1900873261 = "Ataque Parte 1 (2)"
683219944 = "Sensei consegue suprimir Wakamo novamente. Chihiro, a vice-diretora do Veritas que passava por ali, fica pasma com a facilidade com que a Valkyrie teve seus equipamentos roubados e com o sistema de segurança deles. De qualquer forma, Wakamo é levada sob custódia e o divertido Dia dos Namorados recomeça."
840551407 = "Ataque Parte 2 (1)"
402624026 = "Levada ao Departamento Correcional, Wakamo é interrogada pelas alunas da Valkyrie. No entanto, Wakamo se recusa a depor. Minutos depois, a notícia que chega a Sensei é o aviso da fuga de Wakamo."
3108015082 = "Ataque Parte 2 (2)"
280082844 = "Sensei consegue suprimir Wakamo novamente. Fubuki e Kirino prometem mantê-la em uma instalação mais segura e partem. De qualquer forma, Wakamo é levada sob custódia e o divertido Dia dos Namorados recomeça."
54235112 = "Ataque Parte 3 (1)"
1970556472 = "Wakamo é levada de volta ao Departamento Correcional, mas o que a esperava era uma forçada confissão brutal (?) por parte da Valkyrie. Minutos depois, a notícia que chega a Sensei é o aviso da fuga de Wakamo."
386374787 = "Ataque Parte 3 (2)"
2831782328 = "Sensei consegue suprimir Wakamo novamente. A Escola de Polícia Valkyrie reconhece os problemas em seu sistema de segurança e promete evoluir. De qualquer forma, Wakamo é levada sob custódia e, desta vez sim, o divertido Dia dos Namorados recomeça."
550139806 = "Ataque Parte 4 (1)"
1230415696 = "Wakamo é levada de volta ao Departamento Correcional... ou assim se pensava, mas ela já havia escapado antes mesmo do interrogatório. Minutos depois, a notícia que chega a Sensei é o aviso da fuga de Wakamo."
720305737 = "Ataque Parte 4 (2)"
1323540802 = "Sensei consegue suprimir Wakamo novamente. Fubuki e as outras nem sequer conseguem descobrir como ela escapou, mas, de qualquer forma, Wakamo é levada sob custódia e o divertido Dia dos Namorados recomeça."
2123615289 = "Ataque Parte 5 (1)"
3848127601 = "Sensei percorre o evento com Sena, interagindo com os moradores locais. Enquanto sente os laços que construiu dia após dia, Sensei tenta imaginar o objetivo de Wakamo. Minutos depois, a notícia que chega a Sensei é o aviso da fuga de Wakamo."
1033382974 = "Ataque Parte 5 (2)"
1187005141 = "O grupo consegue suprimir Wakamo novamente, mas Chihiro fica pasma com as fugas sucessivas. Como medida, as alunas que enfrentaram Wakamo no passado se reúnem. O sistema de segurança da Valkyrie será totalmente revisado. De qualquer forma, Wakamo é levada sob custódia e, desta vez sim, o divertido Dia dos Namorados recomeça."
3607426443 = "Conclusão (1)"
347985138 = "Em meio a um sistema de segurança perfeito, Fubuki e as outras iniciam o interrogatório de Wakamo. No entanto, o que elas veem nas câmeras de vigilância são inúmeras \"Wakamos\"."
1076189635 = "Conclusão (2)"
1975218181 = "Após eliminar todas as alunas com armadilhas e mergulhar todo o D.U. no caos, Wakamo finalmente fica frente a frente com Sensei. E então, Wakamo entrega um chocolate a Sensei. Parece que foi amor à primeira vista."
2041289632 = "Promessa de Dia dos Namorados"
652737147 = "O desafio de Momoka"
1282114892 = "Ao que parece, Momoka só come batatas fritas com sabor de menta picante. Por recomendação do Sensei, ela tenta experimentar outros sabores, mas, como esperado, não agradou ao seu paladar. Usando o Dia dos Namorados como desculpa, Momoka acaba empurrando para o Sensei as batatas fritas com sabor de chocolate que ela já tinha começado a comer."
2041407386 = "Erro de pedido"
3986078636 = "Devido a um erro no pedido, Sora acabou com um estoque enorme de chocolates. Com a ajuda do Sensei, ela faz uma divulgação e venda no balcão, conseguindo vender tudo. Como sinal de gratidão, Sora entrega o último que sobrou para o Sensei."
3858941682 = "O lanche da administradora"
947066316 = "Rin aponta rigorosamente os erros nos relatórios escritos pelo Sensei. Ao perceber que a causa dos erros era a falta de sono, ela entrega chocolates para ajudar a resolver o problema. Parece que ela só se lembrou de que hoje era Dia dos Namorados depois de ter entregue o presente."
4205941856 = "Um chocolate de Dia dos Namorados da Arona!"
1876151316 = "Chegando o Dia dos Namorados, celebrado uma vez ao ano, Arona presenteia o Sensei com biscoitos de chocolate feitos à mão, que ela preparou com muito esforço para o seu querido Sensei."
3540623104 = "Novos produtos de chocolate!"
1167271857 = "Hifumi tenta conseguir produtos limitados do Peroro-sama em comemoração ao Dia dos Namorados. Como só podem ser comprados por casais, ela finge ser um casal com o Sensei, que passava por ali por acaso. Ela acaba dividindo os produtos que conseguiu comprar com o Sensei."
407134817 = "O chocolate da atiradora"
3908488518 = "Enquanto organizava o depósito do Comitê de Realização da Justiça, Mashiro descobre chocolates que seriam usados como ração de emergência. Identificando-se com o conceito, Mashiro entrega o chocolate ao Sensei."
1648025321 = "O melhor remédio para fadiga"
4001398665 = "Preocupada com o Sensei, que só trabalha virando noites, Hanae lhe entrega uma bebida de cafeína superconcentrada como o \"melhor remédio para fadiga\". O Sensei, temendo que beber aquilo pudesse acabar prejudicando sua saúde, pede que ela transforme em um chocolate quente."
1783916805 = "Graxa de sapato e chocolate"
3015827395 = "Ao visitar o Comitê Disciplinar, o Sensei pega uma lata que Iori deixou cair. Iori brinca dizendo: \"É graxa de sapato, quer lamber para ver?\", mas fica chocada quando o Sensei realmente tenta lamber. Descobre-se que o que ela deixou cair não era graxa, mas sim chocolate, e Iori acaba entregando para ele."
3747656773 = "Torneio de comer chocolate"
3180753048 = "Preparando-se para o torneio de comer chocolate que acontecerá no centro comercial, Akari começa um treinamento especial junto com o Sensei. Akari deu uma enorme quantidade de chocolates ao Sensei, mas, como esperado, não foi possível comer tudo."
1571250681 = "A gourmet azarada"
2808579933 = "Junko visita uma nova loja de doces japoneses por recomendação do Sensei. Quando ela tenta comer um dango de chocolate, o Esquadrão do Capacete invade o local de repente. Hoje, o dango da Junko caiu no chão novamente."
4245935983 = "Canção de amor no armário"
172507543 = "Kayoko, que comprou a nova música de sua banda favorita, recebe um chocolate em formato de caveira do atendente como presente de Dia dos Namorados. Sem saber o que fazer com ele, Kayoko acaba entregando o chocolate ao Sensei."
2795715699 = "Perdido na cidade"
716546020 = "O Sensei se perdeu no caminho para Abydos após pegar o trem errado. Ele é salvo por Shiroko, que passava pelo local, e recebe uma barra de chocolate como medida contra a hipoglicemia."
105274267 = "Mar de chocolate"
3213219445 = "Hoshino visita o museu oceanográfico com o Sensei e compra lembranças. Tendo comprado um conjunto de chocolates em formato de peixe, Hoshino presenteia o Sensei com o seu favorito: uma baleia."
4290912609 = "Presente não intencional"
3601590273 = "Ayane, ao notar que havia muitos chocolates à venda, compra alguns e entrega ao Sensei por ele sempre cuidar dela. No entanto, ao se lembrar de que hoje é Dia dos Namorados, ela começa a inventar desculpas apressadamente."
2815944483 = "O lanche da pragmática"
1093584961 = "Eimi compra todo o estoque de chocolates com formatos estranhos que ninguém mais queria, alegando que \"é eficiente\". Ela presenteia o Sensei com um deles, deixando-o em uma situação embaraçosa."
2517355120 = "Para o seu estômago"
2476241868 = "Kotama entrega ao Sensei um chocolate que tem um dispositivo de escuta como cobertura. Quando o Sensei se recusa a comer, ela começa a tentar forçar a entrada do doce na boca dele."
3262523879 = "Plantão doce"
3361121614 = "Quando Chihiro terminou seu trabalho, o Dia dos Namorados já estava chegando ao fim. Na calada da noite, após as lojas fecharem, Chihiro entrega ao Sensei uma bebida de chocolate comprada em uma máquina de venda automática."
2975198628 = "O limite da contabilidade"
1238138106 = "Yuuka se preocupa com o preço \"apropriado\" do chocolate que dará ao Sensei. No final, ela recorre ao método de parcelamento para fazer com que um chocolate caro pareça ter um preço adequado."
3223164587 = "Item de evento"
2932463976 = "Yuzu se esforça nos jogos junto com o Sensei. Após derrotar o chefe com muito custo (?), ela presenteia o Sensei com um item de chocolate obtido por tempo limitado."
3467542474 = "O chocolate da Alice"
662108209 = "Ao ouvir que consumir chocolate durante o período do Dia dos Namorados concede um bônus especial de experiência, Alice tenta consumir chocolate na vida real para subir de nível. Ela também dá ao Sensei um chocolate em formato de monstro para ele subir de nível."
2032134810 = "Bebida energética especial"
2179793648 = "Hare oferece ao Sensei o sabor de chocolate do \"Yokai MAX\", produzido exclusivamente para o Dia dos Namorados, para ajudá-lo a espantar o sono. Embora a edição limitada seja importante, parece que ela não se importa em dar uma parte ao Sensei."
1069251704 = "Deixando o mundo mais doce!"
2353333921 = "Maki faz uma pegadinha com o Sensei usando spray de chocolate comestível. Parece que ela vai usar esse spray para fazer grafites e encher a cidade com o aroma de chocolate."
3143861320 = "Bombardeio romântico"
2670246882 = "Hibiki desenvolveu um projétil que espalha chocolates no ponto de impacto. Ela planejava fazer um experimento disparando em algum lugar da cidade, mas, quando o Sensei a impediu por ser perigoso, ela presenteou o Sensei com o projétil."
640366726 = "Parafusos falsos"
3523245412 = "Utaha veio consertar a fiação do Schale, mas fica confusa quando os parafusos que trouxe quebram um após o outro. Ao verificar com cuidado, ela percebe que eram chocolates em formato de parafuso."
3615648569 = "Chocolate de bigode"
1699188027 = "Cherino se gaba do chocolate ao leite especial de Red Winter, o "Cheryonka". Ela tenta dar um para o Sensei, mas como a produção é insuficiente e não há estoque, Cherino acaba dando ao Sensei o Cheryonka que ela já tinha começado a comer."
3793419012 = "Produto especial da Academia Federal de Red Winter"
4255053213 = "Tomoe modificou secretamente o chocolate ao leite especial de Red Winter, o "Cheryonka". Ela entrega ao Sensei um protótipo com uma embalagem estampada com uma ilustração fofa da Cherino."
3368181863 = "Chocolate dos pobres"
32065340 = "Nodoka tenta dar chocolate ao Sensei, mas tudo o que ela conseguiu foi apenas uma semente de cacau. Diante de uma Nodoka que lamenta sua falta de habilidade, o Sensei morde a semente de cacau crua."
1194017029 = "Elixir com sabor de chocolate"
3059649371 = "O que Saya desenvolveu desta vez foi um "elixir da imortalidade" feito ao concentrar uma enorme quantidade de ingredientes de chocolate. Infelizmente, foi um fracasso novamente, resultando em algo com gosto e efeito de um chocolate comum."
4072309002 = "Chocolate de adulto"
3055755811 = "Shun ficou bêbada com os bombons de rum que comprou como lanche. O Sensei, vendo a situação, recolhe os bombons, mas Shun fica satisfeita, dizendo que "conseguiu dar chocolate ao Sensei naturalmente"."
1894276114 = "Algemas falsas"
3212670461 = "Kirino comprou algemas feitas de chocolate, pensando: "Assim, mesmo que eu me prenda, posso quebrá-las facilmente". Ao ser apontado pelo Sensei que criminosos também poderiam escapar, ela entrega as algemas de chocolate ao Sensei, desanimada."
3227313292 = "Após um ano"
695495392 = "No dia dos namorados, Fubuki fica animada, pensando que "a pessoa que ela esperava há tanto tempo vai aparecer". Quem toca a campainha e entra é o Sensei e um entregador com donuts de edição limitada de dia dos namorados."
1177032401 = "Uma garota sentimental"
3398993891 = "No dia dos namorados, Hanako chama o Sensei. Ela entrega um presente ao Sensei e, envergonhada, vai embora rapidamente. Depois, ao abrir a caixa de presente, o Sensei encontra um chocolate inesperado."
3016052351 = "Um passo pequeno, mas doce"
4211334058 = "Hasumi fica em apuros com a montanha de chocolates recebidos das alunas de Trinity como forma de agradecimento. Ela pede ajuda ao Sensei, mas ele recusa, dizendo: "Isso é algo para você, Hasumi". Hasumi muda de ideia e entrega ao Sensei apenas o chocolate que ela mesma preparou."
1196745069 = "Mesmo assim, eu queria transmitir"
2486835713 = "Hina entrega um chocolate feito à mão ao Sensei. Ela pede desculpas por ter ficado desajeitado, parecendo com ela mesma, mas ao ver a alegria do Sensei, ela suspira aliviada, embora um pouco perplexa."
2153765396 = "De qualquer forma, eu preparei!"
1349047534 = "Enquanto o Sensei trabalha nos documentos do Comitê Disciplinar, Ako lhe dá um chocolate como recompensa. Quando o Sensei descobre que o chocolate foi feito à mão, Ako reclama, mas pede a opinião dele."
2924359616 = "Como fazer o melhor chocolate"
1842651911 = "Izumi se infiltra na cozinha da escola tentando fazer o melhor chocolate. Ela cozinha com o Sensei usando ingredientes que superam as expectativas e, como resultado, eles conseguem saborear uma refeição deliciosa."
337670640 = "Uma recompensa feita com carinho"
1256516418 = "Como recompensa pela cooperação diária, Aru entrega ao Sensei um chocolate de altíssima qualidade. Era um produto caríssimo, mas tratava-se de um golpe com preços abusivos. Aru se levanta com o Sensei para buscar vingança."
2584656396 = "Roleta russa de chocolate!"
1642941794 = "O que Mutsuki trouxe foi um chocolate de roleta russa, onde "um deles é extremamente apimentado". O Sensei aceita o desafio, mas acaba comendo o chocolate apimentado e é derrotado. Ao abrir a caixa, descobre que caiu na pegadinha de Mutsuki, que "substituiu todos por chocolates apimentados"."
2303027701 = "Sentimentos especiais em um dia especial"
2807414059 = "Preocupada com a desordem na alimentação do Sensei devido ao dia dos namorados, Fuuka preparou uma marmita para ele. Após a refeição, ele ganha um chocolate quente, e a caneca em que o chocolate foi servido era parte de um conjunto de casal."
2115727613 = "Os sentimentos de uma garota não desbotam"
1271327959 = "No dia dos namorados, o chocolate que Juri entregou tinha um gosto normal. Quando o Sensei pergunta se houve algum problema, Juri tenta fugir dizendo que falhou. Mesmo assim, o Sensei encara Juri, come o chocolate feito por ela e, então, desmaia."
1794739046 = "Uma comemoração a sós"
4091436927 = "Serika e o Sensei passaram o dia trabalhando meio período em uma confeitaria. Serika, que recebeu um bolo especial junto com seu salário, vai comemorar com o Sensei a sós."
3828618989 = "Os sentimentos doces da responsável pelos lanches"
508038070 = "No caminho de volta após as compras com o Sensei, Nonomi decide fazer uma pequena parada para descansar. Nonomi tira vários chocolates que comprou para todos comerem e pede a opinião do Sensei sobre cada um deles."
1075068622 = "Grave novamente"
3328710083 = "Preocupada com o Sensei, que costuma pular refeições devido à correria, Sumire lhe entrega um suplemento nutricional com sabor de chocolate. E, para queimar as calorias exorbitantes desse suplemento, começa o treinamento especial de dia dos namorados."
2054798090 = "Uma gamer que não desiste"
1651777598 = "Momoi planeja vencer o torneio de jogos e dar um troféu de chocolate ao Sensei, mas acaba perdendo na primeira rodada. No entanto, sem desanimar, ela consegue um chocolate com brinde em outro jogo e começa a brincar com os brinquedos junto com o Sensei."
166046686 = "O primeiro é o melhor, Sensei"
2953614051 = "Midori chama o Sensei bem cedo pela manhã para entregar o chocolate que fez com tanto esforço. Sentindo a alegria de ter sido a primeira a dar o chocolate ao Sensei, ela fica envergonhada e sai correndo."
3576293106 = "Uma palavra para você"
1344353369 = "Na sala do Clube Yin-Yang, Chise fica cuidando do local com o Sensei. Chise continua comendo silenciosamente os "biscoitos de chocolate com provérbios de quatro caracteres" até encontrar o que queria, enquanto os chocolates que não eram o que ela buscava continuam sendo entregues ao Sensei. No final, o que ela estava procurando era...?"
2997161539 = "Uma degustação especial"
615936915 = "Para desenvolver doces de edição limitada para a Hyakkiyako, Shizuko chama o Sensei para uma degustação. Depois de provar tudo, o Sensei pergunta se a opinião de apenas uma pessoa era suficiente, e Shizuko responde com um sorriso radiante."
2646709498 = "O sabor do mestre e do ninja"
944329625 = "Izuna conseguiu o item popular de difícil acesso, o conjunto de produtos ninja especiais nº 49, o "Conjunto de Chocolate". Sonhando em se tornar uma ninja exemplar algum dia, ela divide o chocolate com sabor ninja com o Sensei."
3304469559 = "Dentro de um sonho doce e suave"
2669528589 = "Tsubaki visita o Sensei, que está privado de sono devido à montanha de trabalho. Graças ao chocolate que dá sono e ao colo de Tsubaki, o Sensei consegue ter uma noite de sono tranquila pela primeira vez em muito tempo."
2320642113 = "Tudo o que sou para você"
1400229860 = "O Sensei recebe chocolates de Wakamo, que o seguia durante a patrulha. O chocolate em si estava delicioso, mas ele decidiu não pensar no que poderia estar misturado ali, pois era assustador demais."
4255752625 = "Mais amargo, mais doce"
2444141989 = "Haruna, que formulou a hipótese de que \"o sentimento de gratidão ao próximo se traduz em doçura\", começa um experimento fazendo o Sensei comer chocolate de matcha. Embora tenha obtido uma boa reação do Sensei, Haruna acaba saindo do local com uma energia avassaladora."
3729666985 = "Skullman, transformar!"
2511158405 = "Azusa entrega ao Sensei um chocolate em formato de Skullman. Ela sente, ao mesmo tempo, a tristeza de que o Skullman desaparecerá se ele for comido, e a alegria de que o Sensei, após comer o Skullman, estará ao seu lado."
2749513973 = "Não coma desse jeito!"
3453339704 = "Koharu entrega ao Sensei um chocolate com estampa de cruz como presente de Dia dos Namorados. No entanto, ela acha suspeito o jeito que o Sensei come o chocolate e, como sempre, acaba o xingando enquanto fica vermelha."
3264516979 = "Como sempre"
4100897639 = "Suzumi encontra o Sensei por acaso em uma loja de conveniência. Achando um desperdício deixar passar a coincidência de se encontrarem no Dia dos Namorados, ela presenteia o Sensei com um chocolate em formato de estrela."
277127002 = "Por onde eu deveria comer...?"
3783664452 = "Mari presenteia o Sensei com um chocolate em formato sagrado como sinal de gratidão pelo dia a dia. Embora o Sensei tenha ficado feliz, os dois ficaram pensativos sobre por onde seria seguro começar a comer."
3828018681 = "Algo para comer juntos"
2801125887 = "Shimiko presenteia o Sensei, a quem ela chamou até a biblioteca, com chocolates. O chocolate, que possui uma cobertura para não sujar as mãos, é perfeito para o trabalho na biblioteca, e Shimiko passa o tempo trabalhando enquanto come o chocolate com o Sensei."
2875243567 = "Com um jeito acostumado"
4120418651 = "Na calada da noite, o Sensei encontra Serina tentando deixar chocolates escondida e ir embora. O Sensei diz a ela que não se importa mais quando ela aparece de repente e expressa sua gratidão pelo dia a dia."
1098144936 = "Depois de muito pensar"
3201590812 = "No Dia dos Namorados, o chocolate entregue por Airi era de sabor menta com chocolate. Airi sorri sem jeito por ter pensado tanto e acabado escolhendo o de sempre, e o Sensei agradece por ela ter pensado tanto nele."
192904433 = "Um item limitado muito valioso"
80308750 = "Yoshimi, que falhou em conseguir doces limitados, entrega ao Sensei um chocolate caseiro malfeito. Yoshimi zomba da própria falta de jeito, mas o Sensei fica feliz, dizendo que o chocolate caseiro dela também é um \"doce limitado\"."
3586750675 = "Material de reforço: Chocolate"
2253911203 = "O Dia dos Namorados é o dia em que é permitido colocar sentimentos em doces. Por ser um dia tão especial, Natsu não fala demais e entrega o chocolate ao Sensei silenciosamente."
1180885592 = "Momento precioso, lugar precioso"
697521960 = "O biscoito da sorte sabor chocolate que Chinatsu entregou ao Sensei continha uma mensagem abençoando o tempo que passam juntos. Vale ressaltar que todos os outros biscoitos da sorte continham a mesma mensagem."
1962407239 = "Sem embrulho, do jeito que é"
1077466145 = "Sena, que estava trabalhando mesmo no dia do Dia dos Namorados, usa medicamentos da ambulância para fazer um \"composto sabor chocolate\" e presenteá-lo. Ao ver o Sensei hesitar em comer, Sena faz um \"ahhh\" para ele."
1976727305 = "Antes disso, depois daquilo"
2963687798 = "Prevendo que Haruka poderia causar algum incidente por pensar demais, o Sensei a chama. Ao ver que o Sensei a compreende e fica feliz ao receber seu chocolate, Haruka abre um sorriso maravilhoso."
1012027940 = "Divirtam-se também no Dia dos Namorados"
1666704886 = "No dia do Dia dos Namorados, Asuna chama o Sensei e tenta fazê-lo comer um chocolate. O Sensei tenta aceitar feliz, mas assim que vê que o chocolate é tirado do decote de Asuna, ele foge às pressas."
2713488453 = "Como uma empregada"
3307298409 = "Ao ouvir que o chocolate era de Akane, o Sensei entra em pânico, associando-o a uma bomba. Akane sorri sem jeito para o Sensei e diz que, pelo menos hoje, gostaria que ele aceitasse normalmente como \"aluna e professor\", e não como \"empregada e mestre\"."
1881980585 = "Fique delicioso"
1305131009 = "Karin, que trabalha em um café de empregadas, presenteia o Sensei com o menu de Dia dos Namorados. Ela tenta se esforçar para dizer o feitiço que faz a comida pedida pelo Sensei ficar mais gostosa, mas acaba explodindo de vergonha no final."
2513811506 = "Se você se importar, já perdeu"
263736182 = "Neru entrega ao Sensei um chocolate em formato de dragão. Para Neru, que não se importa com o que os outros pensam, o Dia dos Namorados é apenas um dia para entregar chocolates, e ela não parece nem um pouco envergonhada com o chocolate chamativo ou com os olhares de atenção que o ato atrai."
1221828673 = "A origem do chocolate de Dia dos Namorados"
2341240125 = "Sentindo-se culpada por prender o Sensei por tanto tempo, Kotori tenta entregar o \"chocolate de Dia dos Namorados primordial\", que também serve como explicação da data, e ir embora. O Sensei a chama e eles comem juntos enquanto ouvem a explicação."
887088760 = "Sabor e elegância"
3219396506 = "O chocolate que Fina preparou tinha formato de taça. Fina trouxe dois chocolates, despejou chá neles e brindou com o Sensei."
3891995307 = "O romance que li naquele dia"
2563474114 = "Tsurugi aparece de repente diante do Sensei e vai embora soltando gritos estranhos sem dizer nada. Imaginando as verdadeiras intenções dela a partir do chocolate deixado para trás, o Sensei profere palavras de gratidão."
3840869276 = "Um Dia dos Namorados desajeitado"
3918834111 = "Kokona presenteia o Sensei com chocolates quando ele visita o Jardim das Ameixeiras. Embora ela insista que comprou na loja, o embrulho parece um pouco desajeitado para um produto comercial, parecendo algo feito com muito carinho."
2127105220 = "Coração gentil"
3440410243 = "O Sensei visita Hinata no Dia dos Namorados. Como ela não tinha preparado chocolates devido aos dias agitados, ela escolhe, dentre os chocolates que havia preparado para as crianças, o tipo que parece agradar ao paladar do Sensei para presenteá-lo."
336269752 = "A sós"
2608193797 = "Chega o Dia dos Namorados e Ui passa o tempo com o Sensei na biblioteca antiga. Enquanto Ui fica consciente da situação de estarem a sós, o Sensei parece não se importar muito. Frustrada, Ui decide pregar uma pequena \"peça\" nele."
3325594053 = "Algo a que não estou acostumada"
2837363539 = "Chega o Dia dos Namorados e Kazusa presenteia o Sensei com um bolo de chocolate com morangos. Kazusa diz que esse tipo de coisa não combina com ela, mas conforme eles vão conversando..."
3971658852 = "Em troca de tudo?"
3831580966 = "No local combinado por Hiyori, o Sensei recebe um chocolate. Ao ouvir que Hiyori vendeu revistas que não seria exagero chamar de \"tudo o que a Hiyori tem\" para conseguir esse chocolate, o Sensei faz carinho na cabeça dela."
2533892615 = "A correlação entre deveres e eventos"
168506611 = "Misaki chama o Sensei para verificar as linhas de vida, como eletricidade, gás e água. Embora Misaki não demonstre nada sobre a existência do Dia dos Namorados, uma caixa de chocolate embrulhada aparece e desaparece em seu bolso."
3709675839 = "Rosas azuis e chocolate"
1415017347 = "Atsuko encontra o Sensei em frente ao canteiro de flores que ela cuida com tanto carinho. A princesa, cheia de segredos, presenteia o Sensei com rosas azuis e chocolate. Enquanto admiram as belas flores, os dois compartilham o chocolate feito à mão."
3240322664 = "Chocolate da Gidiva"
3859526989 = "Ao chegar ao local indicado por Saori, o Sensei encontra Saori coberta de ferimentos. Parece que, para conseguir o chocolate de altíssima qualidade, ela aceitou um pedido difícil...?"
2865465870 = "Chocolate com sentimentos ocultos"
826493808 = "Mimori dá uma aula na \"Aula de culinária de chocolate fácil para todos!\", organizada pelo Clube de Treinamento. Após a aula, Mimori presenteia o Sensei com o chocolate que ela preparou secretamente."
808887502 = "O chocossauro mais forte!"
2969923407 = "Kaede tenta presentear o Sensei com um \"chocolate de escavação de dinossauro\", mas acaba quebrando todos os chocolates durante o processo. No entanto, com uma ideia genial, ela junta as partes que sobraram e presenteia o Sensei com o \"chocossauro mais forte\"."
2045537856 = "No Dia dos Namorados, com espírito de ninja...!"
225487865 = "Tsukuyo tenta entregar o chocolate como uma verdadeira ninja, mas acaba ficando presa no armário. Embora consiga escapar com a ajuda do Sensei, o chocolate acaba derretendo com o calor do corpo, deixando-a deprimida. No entanto, as palavras do Sensei ao comer o chocolate fazem Tsukuyo recuperar o ânimo."
147127745 = "O clone da supergênia, pura e doentia garota hacker"
3005651711 = "Chegando o Dia dos Namorados, Himari presenteia o Sensei com um chocolate especial moldado em sua própria forma."
1921507672 = "Uma gerente de nível médio sem brechas"
4063815318 = "No dia dos namorados, o Sensei acaba ajudando Iroha com o trabalho do Pandemonium. Após terminarem as compras no shopping, Iroha subitamente coloca o chocolate feito à mão na boca e..."
2385007579 = "Como se fosse uma comédia romântica"
1567199440 = "Dia dos Namorados. O Sensei é pedido por Michiru para ajudar na produção de um vídeo temático. Mas tudo não passava de um plano de Michiru para entregar o chocolate ao Sensei, ou será que não...?"
2668723953 = "SRT, reabastecendo!"
1759226892 = "Alguns dias antes do Dia dos Namorados, Miyako parece estar usando a cozinha do Schale para fazer bolos para suas companheiras de equipe. Após terminar, Miyako presenteia o Sensei com um bolo como agradecimento pelo apoio diário."
4267228678 = "Sweet Logistics"
1196107006 = "Moe e o Sensei ficam encharcados por uma chuva repentina. Enquanto acendem uma fogueira para secar as roupas, os dois decidem comer s'mores juntos."
1213591936 = "Para combater o sono?"
3687515176 = "Saki, que visitava o Schale alguns dias antes do Dia dos Namorados, verifica frequentemente se o Sensei está com sono. Quando o Sensei responde que \"talvez esteja ficando com sono\", Saki, como se estivesse esperando por isso, entrega-lhe um caramelo de chocolate que ajuda a despertar."
3424842111 = "RABBIT4, presenteando"
3778351720 = "Dia dos Namorados. Como forma de retribuir a bondade, Miyu presenteia o Sensei com um chocolate bark feito à mão, cheio de sinceridade."
731107983 = "A doce travessura da secretária do Seminário, Noa"
3265679857 = "Noa vai ao Schale para testar a escrita de uma tinta de frasco que comprou. O Sensei fica confuso ao ver Noa lambendo a tinta, mas ela revela que o conteúdo do frasco é chocolate. Noa presenteia o Sensei com o chocolate em forma de tinta, dizendo ser um pedido de desculpas pela travessura."
870313175 = "A medalha da chefe do comitê de segurança"
2318413947 = "Marina se preocupa sobre como deve guardar a medalha de chocolate que recebeu de Cherino. Ao pedir conselhos ao Sensei, ele diz que, mesmo sem a medalha, os alunos se lembrarão do esforço de Marina. Percebendo uma nova perspectiva, Marina presenteia o Sensei com a medalha de chocolate como forma de gratidão."
2278831421 = "A doçura também"
205941879 = "O Sensei acaba pedindo um coquetel para Shigure e, embora fique nervoso com a presença ou não de álcool, ele o saboreia. Aquele coquetel não alcoólico, feito com chocolate amargo, era uma obra-prima com a doçura perfeitamente equilibrada."
367149864 = "Suprimentos médicos um pouco especiais"
4055691814 = "No dia dos namorados, o Sensei é convidado para a sala de Mine. Havia muitos chocolates adoráveis alinhados, mas Mine insiste que eles são \"estritamente suprimentos médicos\". No final, após presentear o Sensei com um chocolate adorável, Mine sai correndo da sala por pura vergonha."
2363629977 = "Algo que não termina"
2964286266 = "No Dia dos Namorados, o Sensei e Ayumu continuam atolados de trabalho como sempre. Enquanto um cuida do outro, Ayumu dá ao Sensei um chocolate que parece ter efeitos de redução de fadiga."
2782278321 = "Uma garota na flor da idade"
917303755 = "Após receber um contato de Ichika, o Sensei passa um Dia dos Namorados divertido com ela."
346977988 = "Qual é a verdade?"
2928609033 = "Kasumi presenteia o Sensei com um chocolate em formato de chinelo que contém suas \"marcas\"."
3929202625 = "A garota que busca seu caminho com todas as forças"
2052971633 = "O Sensei recebe um chocolate de Dia dos Namorados de Koyuki. Dentro dele, havia um pedido de socorro de Koyuki."
2646201157 = "Um alvo especial"
2921289463 = "Embora Sakurako não tenha conseguido seguir as últimas tendências, ela presenteia o Sensei com um chocolate feito com toda a sua sinceridade."
3022511788 = "Carta de desafio de Dia dos Namorados"
827310105 = "Chegando o Dia dos Namorados, Reisa presenteia o Sensei com um chocolate acompanhado de uma \"carta de desafio\"."
112311372 = "Ovo termal?"
209329025 = "Como é um dia especial, Megu presenteia o Sensei com um chocolate em formato de ovo."
4278093215 = "O coração da degustação"
3524417487 = "Ao aceitar o convite de Rumi para uma degustação, o Sensei visita a Associação Genbu. Lá, Rumi preparou três tipos de bolos lunares de chocolate."
3484553094 = "Algo precioso"
770299158 = "Mina grava o símbolo do Genryumon, que ela mais preza, em um chocolate e o presenteia ao Sensei."
3048451966 = "Chaveiros combinando"
1084207169 = "Momiji visita o Schale. Enquanto o Sensei olha o mangá que ela trouxe, eles comem juntos o chocolate que veio junto."
985547137 = "Por isso, na verdade"
441887019 = "Nagisa chama o Sensei e presenteia-o com o chocolate que preparou silenciosamente."
1245310435 = "Não se pode perdoar"
2182832120 = "Para comemorar o Dia dos Namorados, o Sensei decide ir a uma loja de Katsudon recomendada por Minori. Embora Minori insista que 'não será enganada pelas táticas comerciais do Dia dos Namorados', ela preparou o chocolate direitinho."
2665747381 = "Diferença de percepção"
3520175290 = "Aoi, querendo melhorar a percepção que o Sensei tem dela, presenteia-o com chocolates."
1660418007 = "Junto com todos"
2556707942 = "Chegando o Dia dos Namorados, que ocorre uma vez ao ano, Plana presenteia o Sensei com chocolates feitos à mão enquanto Arona está dormindo."
39118678 = "O processo e o resultado"
4008970014 = "Com a chegada do Dia dos Namorados, Mer tenta mostrar ao Sensei um desenho ao vivo feito com chocolate. No entanto, não importa quantas vezes tente, ela não consegue um resultado satisfatório e fica deprimida. O Sensei escolhe a obra que mais gostou dentre as que Mer desenhou."
650590662 = "A hospitalidade suprema e definitiva"
3966026048 = "Toki recebe o Sensei com um menu de curso de chocolate digno de um dia especial como o Dia dos Namorados."
991186108 = "A retribuição da estrategista"
620023061 = "Kaho convida o Sensei para a sala do Yin-Yang Club. No entanto, por pura timidez, ela tenta mudar de assunto mostrando os brindes promocionais de Dia dos Namorados de Hyakkiyako. Recuperando a compostura, Kaho presenteia o Sensei com o chocolate que preparou pessoalmente."
4215670575 = "O café coado da diretora"
2727005466 = "Kanna prepara um café feito com todo o coração para o Sensei, que visitou a Academia de Polícia Valkyrie a trabalho."
271172490 = "Juventude com força total"
2392398542 = "Com a chegada do Dia dos Namorados, um dos marcos representativos da juventude, Renge começa a fazer chocolates artesanais para presentear o Sensei. No entanto, mesmo após 12 horas, o chocolate não fica pronto. Preocupado, o Sensei visita Renge, e os dois acabam fazendo os chocolates juntos e comendo alegremente."
3988011739 = "A estrategista não quer perder"
1261309508 = "Com a chegada do Dia dos Namorados, Kikyou pede ajuda ao Sensei com vários eventos realizados em Hyakkiyako. Os dois passam o tempo caminhando juntos por vários lugares de Hyakkiyako."
1994341756 = "Gratidão com as mãos cheias"
2652260800 = "Com a chegada do Dia dos Namorados, Yukari convida o Sensei para expressar seus sentimentos. Lá, ela entrega dois presentes preparados separadamente: um como membro da família Kageyama e outro como membro da Hyakka Ryoran."
2016528600 = "Um segredo entre nós dois"
96487163 = "Ibuki visita o Schale e presenteia o Sensei com um pudim de chocolate especial feito por ela. No entanto, Ibuki fica olhando para o pudim ao lado com um olhar de desejo. Vendo isso, o Sensei divide o pudim ao meio com ela."
402726560 = "Uma doçura que não enjoa"
313032494 = "Mika e o Sensei marcam de se encontrar no Dia dos Namorados. No entanto, Mika não aparece no dia combinado e o Sensei entra em contato com ela. Ao ouvir a voz surpresa de Mika do outro lado da linha, o Sensei vai até a sala de economia doméstica."
2029368497 = "Um presente digno do recipiente"
3062807839 = "Makoto recebe o Dia dos Namorados dizendo que dará ao Sensei o melhor chocolate, e mostra uma fonte de chocolate especial de Gehenna."
832685500 = "O Dia dos Namorados também é um festival"
3937412867 = "Umika, animada com a ideia de que o Dia dos Namorados também pode ser considerado um festival de chocolate, entrega ao Sensei um chocolate em formato de santuário portátil feito à mão. Normalmente, um santuário contém um objeto sagrado, mas ela explica que este contém um chocolate destinado ao Sensei, que sempre cuida delas. O Sensei aceita esse sentimento e come com carinho o chocolate sagrado dentro do santuário."
2602684896 = "Qual a nota do crepe..."
2759978261 = "O Sensei, após ser consultado por Kirara sobre como a avaliação da aula prática de culinária estava um desastre, decide fazer crepes de chocolate com ela. No entanto, tudo não passava de uma desculpa de Kirara para entregar um crepe feito à mão ao Sensei... O Sensei avalia o crepe como 'o melhor!' e eles comem juntos alegremente."
853644750 = "Espírito competitivo ardente"
3101789295 = "Shiroko invade o escritório do Schale e, dizendo ser uma surpresa, entrega uma enorme quantidade de chocolates que parecem familiares ao Sensei. O Sensei percebe o espírito competitivo escondido nela, mas Shiroko evita falar sobre isso. Ela promete voltar ao Schale e vai embora sorrindo."
1274982249 = "Com todos os cinco sentidos"
1269088046 = "O Sensei, convidado para Shanhaijing, decide desfrutar de um chá de nibs de cacau com Kisaki. Enquanto aproveitam o chá, ela diz que fez algo especial em sua bebida. Nesse momento, o Sensei percebe o aroma intenso de chocolate, que era justamente o efeito do chá que Kisaki bebeu. Kisaki, exalando o aroma de chocolate por todo o corpo, aproxima-se lentamente do Sensei..."
3853801039 = "Chocolate da Palma de Areia de Ferro"
4007922540 = "O chocolate artesanal de Reijo foi feito usando cacau triturado com as mãos nuas através do rigoroso treinamento 'Palma de Areia de Ferro', finalizado no formato da marca de seus punhos. Vendo o Sensei começar a comer com entusiasmo o chocolate que simboliza perfeitamente Reijo, ela fica envergonhada, mas feliz."
2317670005 = "Receita secreta"
2747026672 = "Satsuki diz que usou uma receita especial no chocolate que trouxe para atrair o Sensei para o Pandemonium. Ao ouvir mais, revela-se que ela ficava girando em torno do chocolate enquanto entoava o feitiço secreto 'fique delicioso'. O Sensei come com gosto o chocolate que Satsuki se esforçou tanto para fazer."
3253447383 = "Jornalismo de doces"
2422568276 = "Como agradecimento pela cooperação na reportagem especial de Dia dos Namorados, Chiaki entrega ao Sensei um chocolate todo amassado e fotos de chocolates elegantes. Diante da confusão do Sensei, Chiaki explica os truques para tirar fotos de comida apetitosas, insistindo fortemente que, se você registrar o estado mais bonito em uma foto, poderá aproveitar o chocolate para sempre!"
3029733267 = "Armadilha doce e amarga"
3490507594 = "Ao visitar Trinity, o Sensei recebe um contato e vai até o quarto de Seia. Lá, o Sensei recebe dela um chocolate junto com um papel misterioso contendo um campo de assinatura. O Sensei assina o campo como lhe foi pedido, mas... essa era a armadilha de Seia... Diante de Seia, que agora dizia poder dar qualquer ordem, o Sensei termina de comer o chocolate feito à mão por ela."
3752504286 = "Apresentação"
1513386319 = "Para Rio, os presentes de Dia dos Namorados pareciam algo irracional. No entanto, pensando que talvez houvesse significado justamente naquilo que parecia sem sentido, ela utilizou o método que considerava a solução ideal para criar um chocolate gravado com o emblema da Millennium, a academia que moldou quem ela é hoje. Ao receber as palavras de gratidão do Sensei, Rio não conseguiu esconder sua confusão diante das emoções que transbordavam."
2003795896 = "Os Três Tesouros Sagrados"
3170475194 = "Rei fez chocolates usando como molde a luva que ela costumava usar. Junto com eles, presenteou o Sensei com chocolates em formato de taco e bola, e os dois passaram o tempo conversando sobre beisebol enquanto comiam os 'Três Tesouros Sagrados' do esporte."
3449104670 = "Garota e Lanche"
1885555336 = "Hikari comprou chocolates novos para o Sensei. Quando ele estava prestes a comer, Hikari demonstrou que também queria, então os dois dividiram o doce."
359030032 = "Um presente inesperado"
2185724888 = "Preocupada com o cansaço do Sensei devido ao trabalho, Nozomi trouxe geleia. Quando ela tentou ir embora após entregar o presente, o Sensei a chamou e sugeriu que brincassem juntos. Depois de se divertirem ao máximo, os dois terminaram o trabalho juntos."
2821415725 = "Eu odeio chocolate barato"
3930966594 = "Aoba, que estava vivendo dias muito ocupados, não teve tempo de se preparar e presenteou o Sensei com um chocolate barato. Quando ela tentou sair, o Sensei a convidou para descansar no sofá. Aoba acabou relaxando e aliviando o cansaço do dia a dia."
749178746 = "Pontas dos dedos frias"
3102107895 = "Nagusa presenteou o Sensei com biscoitos de chocolate exclusivos de Hyakkiyako. O Sensei tentou comer, mas o chocolate derretia facilmente e sujava suas mãos. Nagusa percebeu que sua temperatura corporal era baixa, já que o mesmo não acontecia com ela. A partir daí, Nagusa começou a dar o chocolate na boca do Sensei."
1761460889 = "A garota sem abrir a caixa"
2121407183 = "Niya presenteou o Sensei com um chocolate de aparência luxuosa, mas com um sabor amargamente forte. Quando o Sensei perguntou se era uma pegadinha, Niya respondeu que talvez houvesse alunos que se enganassem apenas pela aparência e tivessem uma experiência amarga. O Sensei demonstrou entender, mas fez Niya comer o chocolate também."
3850859909 = "Recarga de mana para o mestre"
905988701 = "Dizendo que mostraria sua determinação, Eri tirou o chapéu. Além disso, sugeriu que queria dar o chocolate na boca do Sensei. Depois de comer alguns, foi a vez do Sensei retribuir o gesto para Eri. Assim, os dois passaram um tempo recarregando a mana um do outro."
3059797050 = "Até o momento de lembrar"
3217050285 = "Kanoe disse que preparou um muffin de chocolate cheio de amor. Ela esperava que, ao comê-lo, o Sensei recuperasse suas memórias. Embora o muffin estivesse muito gostoso, não teve efeito. No entanto, Kanoe não pareceu desanimada, e sua risada característica, 'Ihi', permaneceu no ar."
3389252788 = "Tiramisu em espera"
3138201970 = "O Sensei, após receber o convite, foi até o dormitório de Miyo. Por não ter muita prática, Miyo ainda estava preparando o tiramisu. Embora tenha ficado pronto logo após conversarem um pouco, descobriram que ficaria mais gostoso se esfriasse por duas horas. Os dois passaram o tempo conversando enquanto esperavam."
2750803807 = "É doce e difícil"
2839633723 = "O presente de Fuyu foi um 'gobstopper' (bala que dura muito). Ela disse para o Sensei que, como ele poderia ficar chupando a bala por muito tempo, queria que ele pensasse nela durante esse período, e saiu apressada. Depois, Fuyu ficou sozinha, contorcendo-se de vergonha ao lembrar do que disse."
2958867371 = "É meu!"
1371353270 = "Quando o Sensei voltou ao Schale, um 'chocolate que nunca derrete' estava lá, presente de Ritsu. Era feito de mármore marrom, e eles passaram o tempo conversando sobre esculturas."
3192072615 = "Tenho que ir ao Museu do Amor!"
346158900 = "Embora tenha se surpreendido com o Sensei, que apareceu ao notar sua presença, Love começou a procurar o chocolate que havia preparado para ele. Como não o encontrou, decidiram dividir o chocolate que Love já estava comendo. No entanto, antes que o chocolate fosse dividido, o Sensei foi chamado e teve que ir embora com ele na mão."
3974083935 = "Biscoito de suspiro de chocolate"
3194591599 = "Subaru estava indignada com o luxo de fazer doces. Mesmo assim, gerenciando os ingredientes, Subaru presenteou o Sensei com biscoitos de suspiro feitos por ela. Os dois comeram juntos e passaram um tempo agradável."
977917830 = "Bolo de chocolate do crítico"
2491918438 = "Takane fez uma crítica sobre o Dia dos Namorados como data comemorativa. Ela disse que o 'Kartoshka', feito com melaço (subproduto da produção de açúcar), parecia o Sensei, que descobre todo o potencial dos alunos. O Sensei, um pouco envergonhado, comeu o Kartoshka caseiro junto com ela."
3538379831 = "Medovik de chocolate"
2672738749 = "Yakumo, que começou a falar sobre o tema 'três princípios da negociação', entregou um Medovik ao Sensei dizendo que era 'feito à mão'. No entanto, não era feito pelas mãos de Yakumo, mas sim por um confeiteiro profissional. Entendendo que Yakumo tentou agradá-lo à sua maneira, o Sensei a convidou para um chá."
573696648 = "Plano perfeito (provisório)"
4069694705 = "Kei entregou um chocolate ao Sensei, dizendo que o encontrou no caminho. No entanto, o Sensei percebeu imediatamente que era feito à mão. Quando o Sensei provou um, Kei percebeu que tinha confundido sal com açúcar. Observando as expressões de Kei mudando constantemente, o Sensei comeu junto com ela o chocolate que ele tinha guardado."
446190472 = "A irmã atrapalhada e o mago da biblioteca antiga"
1809185386 = "Um importante texto sagrado de Trinity foi despedaçado!\n\rPara restaurá-lo, Hinata e o Sensei correm por vários lugares de Trinity. Será que conseguirão restaurá-lo antes da cerimônia!?"
1669344749 = "Grande operação de restauração do texto sagrado!"
3307050815 = "Secretamente, de alguma forma..."
3206474415 = "Para a torre do mago"
2268137323 = "Para a fortaleza da favela (1)"
1903415538 = "Para a fortaleza da favela (2)"
1272740423 = "A bala de luz que corre em Trinity (1)"
3082754107 = "A bala de luz que corre em Trinity (2)"
3986270050 = "Pessoas um pouco parecidas (1)"
3119699862 = "Pessoas um pouco parecidas (2)"
175163125 = "Para não terminar (1)"
2349364401 = "Para não terminar (2)"
3540342487 = "It serves you right (1)"
2185957071 = "It serves you right (2)"
3620597108 = "It serves you right (3)"
807787903 = "It serves you right (4)"
2042584363 = "Grande Operação de Restauração das Escrituras!"
2114734858 = "Certo dia, uma escritura importante foi descoberta em Trinity, deixando a escola em polvorosa. Hinata ficou encarregada de levar a escritura até o local da cerimônia, mas, em um excesso de entusiasmo, acabou a despedaçando..."
885221606 = "De alguma forma, em segredo..."
2609673615 = "Para tentar consertar a escritura, Hinata e o Sensei visitam o Comitê da Biblioteca. Shimiko tenta ajudar, mas, como o problema está além de suas capacidades, ela decide apresentar "Ui", a presidente do Comitê da Biblioteca e especialista em livros antigos."
2635340070 = "Para a Torre do Mago"
3848520474 = "Ui quase entra em colapso ao ver o estado deplorável da escritura, mas, após conversar com Hinata e o Sensei, decide ajudar na restauração. Como são necessários alguns materiais para o trabalho, o Sensei e Hinata partem em busca deles."
1290804638 = "Para a Fortaleza da Favela (1)"
693914347 = "O Sensei e Hinata foram procurar um bolo de edição limitada chamado \"Miracle 5000\". No entanto, ao chegarem ao local, percebem que as coisas não estão nada tranquilas. Após ouvirem a situação das alunas do Clube de Doces do Pós-Escola que estavam lá, o grupo decide ajudar o dono da confeitaria."
4074869668 = "Para a Fortaleza da Favela (2)"
4079910234 = "O grupo ataca o Grupo do Capacete e consegue resgatar o dono da confeitaria. Após a batalha, todos tentam ceder o último bolo restante para Hinata, mas o dono diz que \"não é necessário\" e prepara muitos outros bolos para eles."
1658580150 = "O Flashbang Corredor de Trinity (1)"
231136931 = "Enquanto procuravam pelo próximo material, a \"Cola de Musgo Aquático\", o Sensei e Hinata encontram Suzumi enfrentando algumas delinquentes. Como a batalha já havia começado, o Sensei e Hinata decidem intervir."
2012597133 = "O Flashbang Corredor de Trinity (2)"
2151675688 = "O grupo derrota as delinquentes. Ao ouvir sobre a situação difícil delas, Hinata, como uma irmã, estende a mão para ajudar. No final, o grupo consegue obter a \"Cola de Musgo Aquático\" com sucesso."
496082561 = "Pessoas um pouco parecidas (1)"
565077451 = "Para obter o último material, o \"Medicamento Sagrado\", Hinata e o Sensei vão até o anexo do Esquadrão de Socorro. Quem os esperava lá era Serina, do Esquadrão de Socorro."
881020918 = "Pessoas um pouco parecidas (2)"
3596757663 = "Serina os guia pelo local e tenta dividir o medicamento com os dois, mas acaba sendo chamada para uma emergência. Hinata, sentindo que não pode apenas vê-la partir em uma situação tão difícil, tenta segui-la, e o Sensei apoia a decisão de Hinata. Quando o Sensei encontra o medicamento em segurança, as duas retornam parecendo ter se tornado amigas."
3108835754 = "Para não deixar terminar (1)"
707461921 = "Hinata e o Sensei conseguem coletar todos os materiais. Surpresa, Ui começa o trabalho. Deixando o resto com Ui por enquanto, Hinata e o Sensei, após um dia agitado, vão dormir."
3464872233 = "Para não deixar terminar (2)"
1190546149 = "A noite cai e o trabalho de restauração de Ui entra na fase final. No entanto, nesse momento, chega a notícia de que o cronograma da cerimônia foi alterado repentinamente."
1936542723 = "It Serves You Right (1)"
789625242 = "Hinata fica desanimada, pensando em como tantas pessoas a ajudaram. Mas, embora entenda racionalmente que não há mais tempo, ela se levanta. Agradecendo ao Sensei e a Ui, Hinata parte em direção ao local da cerimônia."
1115309119 = "It Serves You Right (2)"
2876222975 = "Após a saída de Hinata, a restauração da escritura é concluída. Ui expressa sua preocupação com Hinata. Enquanto isso, Hinata chega ao local da cerimônia, mas encontra Mashiro, do Comitê de Justiça. Enquanto ela se pergunta o que fazer, de repente, ouve-se um disparo e um grupo familiar aparece...?"
867066557 = "It Serves You Right (3)"
1143461639 = "Quem apareceu no local foram as alunas do \"Grupo da Queda e Ascensão\" e do Clube de Doces do Pós-Escola. O tempo que elas ganharam foi crucial, e o grupo consegue trocar a escritura com sucesso."
3261598258 = "It Serves You Right (4)"
1763744091 = "A situação é resolvida sem problemas. De volta à biblioteca, o Sensei ouve algumas palavras sinceras de Ui."
2477586931 = "Coração de Shinobi"
2232967509 = "Para se tornarem um clube oficial, o grupo do Clube de Pesquisa de Ninjutsu decide ajudar no evento de intercâmbio entre Hyakkiyako e Gehenna.\n\rNo entanto, esse intercâmbio entre as duas escolas não terminaria sem problemas... Após vários acontecimentos, qual será a resposta que elas encontrarão!?"
3240499071 = "Ataque Ninja!"
3223702264 = "O intercâmbio começa!"
2295860854 = "A Grande Donzela (1)"
3632641780 = "A Grande Donzela (2)"
1029942213 = "Falando em ninja, uma princesa? (1)"
2110087172 = "Falando em ninja, uma princesa? (2)"
3622577917 = "Primeiro obstáculo: A garota propaganda e o SP (1)"
2672511310 = "Primeiro obstáculo: A garota propaganda e o SP (2)"
1316908147 = "Segundo obstáculo: A Bela Adormecida (1)"
2839284134 = "Segundo obstáculo: A Bela Adormecida (2)"
4119318060 = "Terceiro obstáculo: O leitor de mentes (1)"
2991402396 = "Terceiro obstáculo: O leitor de mentes (2)"
2127710617 = "Quarto obstáculo: A casa de truques (1)"
3261259448 = "Quarto obstáculo: A casa de truques (2)"
3904889189 = "O que estava represado (1)"
973204903 = "O que estava represado (2)"
682393381 = "A regra de ouro dos ninjas (1)"
4279025201 = "A regra de ouro dos ninjas (2)"
1269695701 = "Depois do festival"
208502467 = "Ataque ninja!"
752075220 = "O \"Clube de Pesquisa Ninjutsu\" ainda não recebeu autorização e não é um clube oficial. Elas foram ao Schale pensando que o Sensei poderia conceder essa autorização. Enquanto o Sensei se preocupa com a dificuldade de simplesmente conceder o pedido, Kaho, do \"Clube Yin-Yang\" da mesma Hyakkiyako, aparece..."
3066356973 = "O encontro começa!"
2027758856 = "O Sensei e o Clube de Pesquisa Ninjutsu chegam à Academia Unificada Hyakkiyako. Niya, a presidente do Clube Yin-Yang, diz que quer a ajuda do Schale para o próximo encontro com a Academia Gehenna. O Sensei propõe que, se for um sucesso, o \"Clube de Pesquisa Ninjutsu\" seja reconhecido como um clube oficial, e assim, junto com Michiru, Tsukuyo e Izuna, ele começa a ajudar no evento."
2113642855 = "A grande donzela (1)"
1841957901 = "Primeiro, o Clube de Pesquisa Ninjutsu começa os preparativos para a apresentação da \"Princesa Waraku\" como parte da ajuda no encontro. Nesse meio tempo, Tsukuyo acaba sendo importunada por delinquentes (?), e eles decidem afastá-los."
2793185007 = "A grande donzela (2)"
4010253238 = "Após afastar os delinquentes, o Sensei acaba ouvindo o que estava no coração de Tsukuyo devido ao desenrolar da conversa. O Sensei encoraja Tsukuyo e eles retomam os preparativos para a apresentação."
3738792413 = "Falando em ninja, uma princesa? (1)"
1915451082 = "A \"Princesa Waraku\" é a estrela do encontro. Originalmente, a heroína seria interpretada por Chise, mas, para este encontro, Ibuki, do Pandemonium, foi escalada de última hora. Para acalmar Ibuki, que ficou ansiosa ao sentir a agitação ao redor, Michiru empresta sua boneca ninja Ninpero-san e promete que, se Ibuki estiver em perigo, ela certamente irá salvá-la. Nesse momento, o Grupo Chimi ataca de repente...?"
341953329 = "Falando em ninja, uma princesa? (2)"
2863619002 = "Ibuki, que interpreta a \"Princesa Waraku\", é sequestrada pelo Grupo Chimi, deixando todos em confusão. Para serem reconhecidas como um clube oficial, elas não podem deixar que isso se torne um grande problema e cancele o encontro, então Michiru propõe que elas mesmas a resgatem. Iroha, do Pandemonium, junta-se ao Clube de Pesquisa Ninjutsu e todos começam a agir para trazer Ibuki de volta."
1421697779 = "Primeiro obstáculo: A garota propaganda e a SP (1)"
2447682703 = "Niya começa a narrar a situação do sequestro de Ibuki de forma despreocupada, fazendo com que a apresentação continue e o encontro siga normalmente. Enquanto o grupo persegue o Grupo Chimi para resgatar Ibuki, as duas integrantes do Comitê Executivo do Festival bloqueiam o caminho como o primeiro obstáculo."
91366382 = "Primeiro obstáculo: A garota propaganda e a SP (2)"
3098904965 = "Tendo superado o primeiro obstáculo com sucesso, o grupo volta a perseguir o Grupo Chimi."
1264601568 = "Segundo obstáculo: A bela adormecida (1)"
3751057018 = "Enquanto perseguem o Grupo Chimi, Tsubaki, o segundo obstáculo, a \"Bela Adormecida\", bloqueia o caminho. Graças à perspicácia de Izuna, elas superam o desafio, mas surge o problema de que, se não derrotarem Tsubaki, os outros membros além de Izuna não poderão avançar...?"
3802744135 = "Segundo obstáculo: A bela adormecida (2)"
3871679676 = "Tendo passado pelo desafio de Tsubaki com sucesso, o grupo retoma a perseguição ao Grupo Chimi."
1483782816 = "Terceiro obstáculo: A leitora de mentes (1)"
1022129588 = "Diante do grupo, Mimori, o terceiro obstáculo, a \"Leitora de Mentes (?)\", bloqueia o caminho. Parecia que a \"estratégia de ficar distraída\" de Tsukuyo tinha aberto um caminho, mas a situação ficou confusa sobre como resolver o confronto. Com a gentileza de Mimori, elas aprendem como passar no teste e, embora exaustas, decidem enfrentá-la."
2959155984 = "Terceiro obstáculo: A leitora de mentes (2)"
2380076631 = "O grupo passa pelo desafio de Mimori. Para Michiru, que está ansiosa para seguir em frente, Mimori diz: \"Acho que todas vocês são mais fortes do que a Michiru-chan imagina\". Sem tempo para processar o significado, o grupo segue adiante."
96021509 = "Quarto obstáculo: Casa de truques (1)"
1037879827 = "O quarto obstáculo é a casa de truques. Enquanto Kaede explicava, Michiru, impaciente, acabou saindo correndo e caiu em uma armadilha. O Sensei se machuca ao protegê-la, e Michiru confessa silenciosamente para si mesma que a culpa foi sua."
2449070470 = "Quarto obstáculo: Casa de truques (2)"
1750066922 = "Michiru e o Sensei conseguem sair da casa de truques e se juntam a Tsukuyo e Izuna, que chegaram logo depois. Michiru tenta expressar seus sentimentos sinceros para as duas, mas Kaho, do Clube Yin-Yang, aparece e anuncia impiedosamente o cancelamento da apresentação."
1535946624 = "O que estava represado (1)"
939985143 = "Ao entender a situação, Kaho declara que \"o Clube Yin-Yang cuidará do tratamento deste incidente\", mas Tsukuyo e Izuna se recusam a recuar, dizendo que \"prometeram salvar Ibuki\"."
1915078740 = "O que estava represado (2)"
4144075858 = "Com a ajuda do Sensei, o grupo consegue afastar Kaho. Incentivada pelas palavras de suas subordinadas de que \"deve seguir o caminho em que acredita\", Michiru volta a olhar para frente. Elas se reencontram com Iroha, que chegou liderando um tanque, e retomam a perseguição ao Grupo Chimi."
349304540 = "Regras de ouro dos ninjas (1)"
713270559 = "Para despistar o Clube de Pesquisa Ninjutsu, que os persegue com um tanque, o Grupo Chimi destrói a ponte. Enquanto todos entram em pânico, Iroha diz: \"E daí que não tem chão?\" e avança com tudo...!"
3316953760 = "Regras de ouro dos ninjas (2)"
3896826306 = "Finalmente, o grupo alcança o Grupo Chimi. No entanto, Michiru para ao ser ameaçada de que, se chegarem perto, eles jogarão Ibuki lá de cima. Michiru teme que suas escolhas levem a um resultado irreversível, mas a própria Ibuki ri e diz: \"Você prometeu que viria me salvar, não importa o que acontecesse\". Empurrada por esse sorriso, seus pés começam a se mover—"
457811177 = "Depois do festival"
1596447159 = "O encontro termina em segurança. Após uma conversa séria, o Clube de Pesquisa Ninjutsu decide adiar o pedido para se tornar um clube oficial. E antes que tudo se resolva... Niya conta ao Sensei sobre os bastidores do ocorrido. Diante de Niya, que alegremente e com confiança declara ser a mentora de tudo \"apenas para testar as habilidades do Sensei\", o Sensei começa a dar uma bronca nela."
784454923 = "Comitê de Contramedidas de Recuperação do Resort de Abydos"
1941527097 = "O Comitê de Contramedidas conseguiu ingressos para o resort. O que esperava por elas nas férias era um resort em ruínas—\n\rComitê de Contramedidas, desta vez vamos recuperar o resort!"
4169806517 = "Na vida, nunca se sabe o que vai acontecer"
1862967808 = "Sério, nunca se sabe o que vai acontecer na vida (1)"
2849988537 = "Sério, nunca se sabe o que vai acontecer na vida (2)"
3828621461 = "Uma desculpa um pouco mais convincente (1)"
3612774739 = "Uma desculpa um pouco mais convincente (2)"
3732224330 = "Ataque preventivo (1)"
2288741606 = "Ataque preventivo (2)"
2798552178 = "Viemos para ajudar o Sensei (1)"
4251596414 = "Viemos para ajudar o Sensei (2)"
3076571984 = "Visitantes Indesejados (1)"
3715968122 = "Visitantes Indesejados (2)"
396754760 = "Sonho de uma Noite de Verão"
3470661543 = "Boia Voadora"
1517194776 = "Máquina Pesada contra Máquina Pesada"
1914874609 = "A Verdade sobre o Voucher do Resort (1)"
3115624347 = "A Verdade sobre o Voucher do Resort (2)"
4105665590 = "Na vida, nunca se sabe o que vai acontecer"
1877741647 = "Certo dia, Ayane reúne os membros do Comitê de Contramedidas para anunciar um \"aviso importante\". No momento em que ela ia revelar que compraram um helicóptero com o dinheiro economizado mês a mês enquanto pagavam as dívidas, Serika, que ganhou o primeiro prêmio em um bingo, entra correndo cheia de alegria..."
1346643999 = "Sério, nunca se sabe o que vai acontecer na vida (1)"
2189810503 = "Graças ao prêmio inesperado, o Comitê de Contramedidas e o Sensei acabam indo passar férias em um resort. Mal tiveram tempo de rir dizendo que \"na vida nunca se sabe o que vai acontecer\", quando o helicóptero cai durante a viagem..."
2683639091 = "Sério, nunca se sabe o que vai acontecer na vida (2)"
1868167028 = "Apesar da queda do helicóptero, todos saíram ilesos. Com a esperança de que pudessem consertar o veículo se chegassem ao resort, eles o visitam, apenas para encontrar o local em ruínas... Enquanto Serika lamenta ter caído em um golpe, os outros a convencem de que podem recomeçar dali. Animada com essas palavras, Serika declara que passará as \"melhores férias\" ali."
1755482596 = "Uma desculpa mais convincente (1)"
3178234890 = "O Comitê de Contramedidas decide se dividir em grupos para restaurar o resort. Serika e Hoshino ficam responsáveis pela limpeza interna. Enquanto o Sensei limpa um dos quartos com Hoshino, o Grupo dos Capacetes, liderado por Love, aparece para atacar..."
2119647362 = "Uma desculpa mais convincente (2)"
2685399187 = "Hoshino e Serika conseguem repelir o Grupo dos Capacetes. No entanto, o quarto que tinham acabado de limpar fica uma bagunça devido ao combate... Shiroko e Nonomi, que retornam em um momento inoportuno, veem o estado do quarto e deduzem erroneamente que a limpeza foi difícil."
1541851928 = "Ataque preventivo (1)"
1621492409 = "Após terminar a limpeza do quarto, Shiroko se anima para a próxima tarefa: conseguir comida. O Sensei decide ir pescar com ela. No momento em que Ayane chega e os três começam a pescar, o Grupo dos Capacetes, liderado por Love, e Wakamo aparecem para atacar..."
3445130317 = "Ataque preventivo (2)"
1174669819 = "Wakamo, que participava como reforço a pedido de Love, fica confusa com a presença do Sensei e não consegue lutar direito, fugindo junto com o Grupo dos Capacetes. Por outro lado, Shiroko fica profundamente deprimida, pois seu equipamento de pesca foi destruído durante o combate."
806822330 = "Vim para salvar o Sensei (1)"
4019663412 = "Ao saber que o Sensei está no resort, Wakamo entende errado, achando que ele foi capturado por vilões, e lidera Love e o Grupo dos Capacetes em um ataque. Ayane tenta resolver a situação conversando, mas Wakamo lança um ataque total sem dar ouvidos."
2351574080 = "Vim para salvar o Sensei (2)"
2322437162 = "O grupo consegue repelir Wakamo. Shiroko, que tinha saído para pescar sozinha, fica surpresa ao ver os membros do grupo exaustos. Enquanto isso, Wakamo, forçada a recuar, exige que o Grupo dos Capacetes use sua carta na manga..."
1269668176 = "Visitantes Indesejados (1)"
3542746869 = "Para restaurar o resort, o Comitê de Contramedidas visita a sala de controle. Lá, descobrem um mecanismo desconhecido chamado Sistema de Defesa do Resort. Ao ativá-lo, esperando viver em paz sem medo do Grupo dos Capacetes ou de Wakamo, o sistema se volta contra eles por não estarem registrados como usuários..."
2399187411 = "Visitantes Indesejados (2)"
2351619502 = "Por um triz, o Comitê de Contramedidas e o Sensei conseguem se registrar no Sistema de Defesa do Resort. Enquanto isso, o Grupo dos Capacetes, que tinha desembarcado novamente, acaba sendo repelido pelos robôs de segurança."
3081295153 = "Sonho de uma Noite de Verão"
78535287 = "Após muitas reviravoltas, o Comitê de Contramedidas termina a restauração do resort e aproveita um churrasco na praia. Aquele momento foi, de fato, um breve período de férias onde puderam esquecer a realidade."
3720861641 = "Boia Voadora"
3009396054 = "O Sensei, que acordou depois do meio-dia, passava um tempo relaxante com Hoshino. Como o resto do comitê tinha ido consertar o helicóptero, eles conversavam sobre ficar de bobeira, quando o Sistema de Defesa do Resort emite um alerta. Wakamo, em um hovercraft gigante, ataca novamente para tentar levar o Sensei."
1077182490 = "Máquina Pesada contra Máquina Pesada"
2820779354 = "Hoshino e o Sensei enfrentam Wakamo sozinhos, mas a diferença de poder os coloca em uma situação desesperadora. No entanto, os olhos de Hoshino não demonstram desistência. Quando o Sensei pergunta por que ela está tão calma, Hoshino sorri, dizendo que confia que todos do comitê virão ajudar. Como esperado, o grupo retorna após terminar o conserto do helicóptero."
2364370372 = "A Verdade sobre o Voucher do Resort (1)"
848028279 = "O grupo consegue repelir Wakamo e o Grupo dos Capacetes. Ao perguntarem por que insistiam tanto nos ataques, é revelado que elas também possuem vouchers para este resort. Elas são apenas um dos muitos grupos travando uma \"Batalha de Resorts\" pelo controle do Lost Paradise Resort. Diante dessa reviravolta inesperada, o grupo decide ir embora o mais rápido possível."
1316559450 = "A Verdade sobre o Voucher do Resort (2)"
184087796 = "As férias curtas, porém intensas, chegam ao fim, e o Sensei precisa retornar ao Schale imediatamente. Embora as férias tenham sido completamente diferentes do que esperavam, todos riem dizendo que foi divertido. Assim, após o Sensei partir, enquanto se preparavam para ir embora, encontram o nome do usuário final do \"Direito de Uso do Resort\"..."
2778041043 = "Expedição! Plano da Casa de Praia da Hyakkiyako"
172671033 = "O grupo da Hyakkiyako visita o resort para abrir um novo negócio: uma \"Casa de Praia\". No entanto, o que as esperava era um Battle Royale de resorts, onde os estabelecimentos lutam por direitos territoriais. Será que Shizuko conseguirá proteger a \"Casa de Praia\"...!? Uma nova batalha da Hyakkiyako começa agora."
1940212607 = "O verão ainda não acabou"
3019187095 = "Só há uma coisa a fazer!"
985681819 = "Primeiro, vamos organizar a situação"
3149087222 = "Os Mineiros de Enxofre (1)"
633836269 = "Os Mineiros de Enxofre (2)"
3599319087 = "Rumo ao próximo objetivo"
248228498 = "Os Monstros de Orelhas Brancas (1)"
602045043 = "Os Monstros de Orelhas Brancas (2)"
2996925887 = "Os Mensageiros de Genbu (1)"
1574118782 = "Mensageiros de Xuanwu (2)"
1023075678 = "Antes da batalha final"
2234049552 = "Grupo do Capacete! O confronto final!"
2135228425 = "E então, o fim do verão chegou"
2224315914 = "O verão ainda não acabou"
2571315120 = "Ao retornar para Schale, o Sensei foi recebido por Niya e Mimori, da Academia da União Hyakkiyako, e por Phina. Elas disseram que tinham um assunto para tratar sobre a Hyakkiyado e que Shizuko estava no \"Lost Paradise Resort\", onde elas haviam estado pouco antes... Ao retornarem ao resort, o grupo é atacado pelo \"Esquadrão de Roupa de Banho Mascarado\"."
3339314761 = "Só há uma coisa a fazer!"
2566461510 = "Ao descobrirem que o responsável pelo \"Direito de Uso do Resort\" era o \"Comitê Organizador do Festival\", o grupo ouve os detalhes do contrato que Shizuko assinou com o Octopus Bank. No entanto, descobre-se que o Octopus Bank é uma empresa inexistente... Ao perceber que foi enganada, Shizuko, embora chocada, decide usar a situação a seu favor e declara que irá recuperar os contratos das pessoas que ocuparam as outras ilhas."
866798122 = "Primeiro, vamos organizar a situação"
3677973191 = "Enquanto se preparam para seguir para as outras ilhas, o grupo verifica o mapa de influência atual que Niya reuniu. Como o arquipélago está dividido em várias partes, Abydos e Hyakkiyako se separam em dois grupos para recuperar os contratos."
244971942 = "Os mineiros de enxofre (1)"
992183906 = "O primeiro lugar para onde Shizuko e os outros foram foi a ilha ocupada pelos \"Mineiros de enxofre em busca da fonte lendária\". Lá, eles encontram o Departamento de Desenvolvimento de Fontes Termais de Gehenna, que tenta escavar água do mar profundo para criar um resort de águas termais."
945809083 = "Os mineiros de enxofre (2)"
4177740208 = "Graças ao esforço de Chise, Shizuko e os outros conseguem encontrar a fonte termal. O Departamento de Desenvolvimento de Fontes Termais admite a derrota e entrega o contrato, mas... Shizuko, por outro lado, propõe um novo acordo: que eles operem o resort de águas termais através de um contrato de franquia com a Hyakkiyado."
2437669702 = "Seguindo em frente"
9719984 = "Após finalizar o contrato de franquia com o Departamento de Desenvolvimento de Fontes Termais e compartilhar a situação com os membros de Abydos, o grupo segue para o próximo destino."
4025448392 = "Os monstros de orelhas brancas (1)"
1455533879 = "O próximo destino do grupo foi um resort operado pelos \"Monstros de orelhas brancas que levam os perdedores à ruína\". Ao seguirem as pessoas que entravam nos barcos como se estivessem hipnotizadas, eles chegaram ao local do \"Torneio Secreto de Mushiking\". Ao saberem que poderiam recuperar o contrato se vencessem o torneio, o grupo decide participar com a ajuda de Phina e Kaede."
1990939403 = "Os monstros de orelhas brancas (2)"
2476002705 = "Graças ao esforço de Chise, o grupo vence o torneio de Mushiking. Após recuperar o contrato com sucesso e ouvir a paixão deles pelo torneio, Shizuko propõe que eles continuem realizando o evento através de um contrato de franquia."
1596206066 = "Mensageiros de Xuanwu (1)"
4125761811 = "O próximo destino de Shizuko e os outros foi a ilha dos \"Mensageiros de Xuanwu que exigem pagamento por tudo\". Era um resort supostamente operado pela Associação Comercial Xuanwu de Shanhaijing. No entanto, as avaliações estavam péssimas; ao investigar, descobriram uma situação deplorável, com cobranças indevidas e serviços inexistentes. Enquanto Shizuko se enfurece com o resort corrupto, o Sensei revela que eles não são da Associação Comercial Xuanwu, mas sim do Grupo Kurokame."
3480568884 = "Mensageiros de Xuanwu (2)"
1288353414 = "Após derrotarem o Grupo Kurokame e Nyantenmaru, o grupo recebe uma proposta de Nyantenmaru para assinar um contrato de franquia, assim como nas outras ilhas. Shizuko rejeita a proposta dizendo \"sonhe acordado em outro lugar\" e segue para a próxima ilha."
3867903048 = "Antes da batalha final"
3483691157 = "Antes da batalha final, Shizuko e os outros realizam uma reunião estratégica com os membros de Abydos. Lá, eles descobrem que o Grupo do Capacete está conectado à Kaiser PMC. Como Nyantenmaru também mencionou ter contratado forças da Kaiser PMC, o grupo sente que não enfrentará apenas o Grupo do Capacete, mas decide seguir em frente com a batalha final."
3161074241 = "Grupo do Capacete! O confronto final!"
3255147536 = "Ao chegarem para o confronto final contra o Grupo do Capacete, o grupo é recebido pelo próprio Diretor da Kaiser, que no passado colocou Abydos em apuros. O Diretor da Kaiser, agora atuando como funcionário de vendas do Octopus Bank, tenta fazer uma nova proposta de investimento a Shizuko, mas é rejeitado. Então, o Grupo do Capacete e seu novo Esquadrão de Roupa de Banho Mascarado atacam Shizuko...! O longo verão de Hyakkiyako e Abydos, a batalha final, começa agora!"
2912056471 = "E então, o fim do verão chegou"
3801914199 = "Percebendo que a situação estava ruim, o Diretor da Kaiser tenta sequestrar o Sensei para fugir, mas é impedido por Wakamo. Assim, a longa confusão do verão chega ao fim, mas não exatamente com um \"final feliz\". Eles são informados de que o \"Lost Paradise Resort\" era, na verdade, uma propriedade do Conselho Estudantil Federal e que a Kaiser estava vendendo os direitos ilegalmente. Embora todos tenham que desocupar o resort, eles pedem a Rin para realizar uma festa de comemoração. O grupo aproveita o banquete final."
3000475038 = "História do Clube de Doces do Pós-Aula ~Segredos Doces e Tiroteios~"
952532459 = "O Sensei recebe um pedido de conselho de Kazusa, \nque pertence ao Clube de Doces do Pós-Aula. \nParece ter relação com o passado dela... \nQual será o desfecho dos eventos imprevisíveis \nque surgiram na rotina dessas garotas comuns...!?"
1976722127 = "Algo para consultar o Sensei"
1281064588 = "Aquele que te ataca (1)"
3956684337 = "Aquele que te ataca (2)"
477225583 = "Todo mundo tem um ou dois (1)"
933418659 = "Todo mundo tem um ou dois (2)"
3307403933 = "Mesmo que os ingredientes sejam todos diferentes (1)"
3189911392 = "Mesmo que os ingredientes sejam todos diferentes (2)"
