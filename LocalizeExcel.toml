4198251587 = "人生も、9回裏2アウトから"
2669661554 = "仕上げのトレーニング"
1770988056 = "伝統と歴史"
593379531 = "「コーギー・ブレーブス」対「アビシニアン・レイダース」の親善試合を観戦しに来た先生一行は、レイが贔屓にしているコーギー・ブレーブスを一緒に応援しつつ、「写真タイム」に興じるなど、楽しい一時を過ごす。そんな中、スクリーンに映った先生を見て、呼び出すように指示する監督の姿があった……。"
473988487 = "「絶対」なんて言わないで"
3177369030 = "先生一行を呼び出したのは、ブレーブスの監督だった。監督は、とある不審者から「指示通りに試合を進めないと、ガム工場を爆破する」と脅迫電話を受けており、その犯人捜索のために先生を頼ったのだ。このような暴挙を許せないと感じた一行は、脅迫事件解決のために動くことを承諾する。"
2743711684 = "逆転したら起こしてください（１）"
2387523374 = "売り子の姿となったスミレと共に、スタジアムを捜索する先生。その道中で発見した、ひときわ野次を飛ばし、差し出したプロテインを拒否する過激な観客二人をスミレは犯人と断定する。身柄確保のために、スミレは二人に対して「パーソナルトレーニング」を開始した……！"
3613497359 = "逆転したら起こしてください（２）"
4073297816 = "身柄を確保した二人は、ただの野次を飛ばす一般客だった。そのタイミングで、場内に攻守交代のアナウンスが入る。犯人から新たな連絡が来ることに備え、先生はスミレにその場を任せてレイの元へと向かうのだった。"
3805571027 = "人は野球に夢を見る"
3683981516 = "犯人は何やら落ち着きのない様子で、次のバッターにバントをさせるよう監督に指示する。序盤からのバントに難色を示すレイを一蹴する犯人。バントはひとまず成功し、ランナー進塁後に4番バッターがマウンドに立つが、あれよあれよという間にスリーアウトに。憔悴しきった犯人は、3回でのピッチャー交代を指示する……。"
2101992904 = "偶然の出会い"
1936948185 = "先生とレイは、選手たちにエールを送るハナエと出会う。ハナエは戦っている2チームの名前も知らず、とにかく誰かに勇気を出してもらうために応援していた。その純粋な姿に、感銘を受けるレイ。だがその直後、さっきまで穏やかだったファンが選手のエラーにキレて豹変する瞬間を目撃し、複雑な気持ちになるのだった……。"
56139120 = "大切なのは折れない心"
2691253840 = "スミレは、マナー違反の観客たちを摘発し、そんな中でスポーツマンシップの大切さと、「目標に向かって頑張る人」「それを導く人」のことが好きなのだと語る。――そんなとき、レイからの連絡が入った。通話ノイズを手掛かりに、犯人の居場所を特定できるかもしれないという一報に、レイとスミレは気を引き締める。"
523545392 = "グラウンド炎上"
2573485065 = "レイは野球への想いを語りながら、野球ファンではない先生がここまで協力してくれることに疑問を抱く。それに対し、「生徒たちを見守るのが好きだから」と答える先生に、驚くレイ。そのとき、犯人から再び連絡が入る。監督の采配が見事に外れ、犯人が激昂する中で、スミレが通話ノイズを頼りに犯人の居場所を特定した――"
1348511304 = "球場に落ちているもの（１）"
220876149 = "レイ、スミレ、先生、そして監督は、ついに犯人のいる個室観覧席へと突入する。だが犯人は人質を取り、さらにはそれを止めにブレーブスの4番バッターまで登場するなど、現場は大混乱！スミレとレイは先生の指揮の下、犯人の雇った警備員達との戦闘に突入する。"
867171087 = "球場に落ちているもの（２）"
2808333292 = "確保された犯人は、ブレーブスの下手さに失望したファンだったことが明らかに。その間も試合は進行しており、ついに9回裏、ブレーブスの最後の攻撃が始まろうとしていた。だが、肝心要の4番バッターは、先の戦闘の流れ弾で手首を負傷しており……！"
1172577379 = "人生も、9回裏2アウトから"
1710768566 = "打者不在の状況下で、先生はミレニアム野球部の4番バッターであるレイが代打に立てばよいと提案した。動揺するレイだったが、先生とスミレ、監督たちの後押しを受け、バッターボックスに立つ。みなの応援を背に、心を無にして思い切りバットを振り抜くレイ。ボールは白い影となり、遙か空の向こうへと飛翔していった――"
239529906 = "仕上げのトレーニング"
3302298300 = "サヨナラホームランによる勝利の余韻も冷めやらぬ中、レイは今日もミレニアムの4番バッターとして練習に打ち込もうと意気込んでいた。その時、同じく試合に心を動かされていたスミレが現れる。なにやら寒気を感じて逃亡を試みるレイ――そして先生を捕獲したスミレは、二人をハードなトレーニングへと招待するのだった。"
2374279045 = "ハイランダー鉄道爆走事件 〜そして列車はなくなった〜"
4097448805 = "謎の積荷が積載された貨物列車をめぐり、先生とハイランダーの生徒たちは、マッドでカオスな逃亡劇を繰り広げることに。果たして、依頼は達成できるのか……？"
