1796827446 = "Ao ouvirem o temido título da Monshu, a Gangue dos Passarinhos entra em pânico. Adotando a sua postura de irmã mais velha, Kokona começa a lhes dar uma bronca daquelas, mas elas não dão ouvidos e a frustração das arruaceiras só piora. Kisaki acaba passando mal de repente e é feita de refém, mas isso logo abre alas para que Shun aplique a sua 'disciplina educativa' rigorosa nas crianças infratoras."
