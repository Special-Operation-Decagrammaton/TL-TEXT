#[ +++ ][Resumos dos episódios e seus títulos:]
#[ --- ][Capitulo 1:]
4128684242 = "A Folga da Administradora-Chefe (1)"
3255574769 = "As membras do Conselho Estudantil Geral tramavam uma forma de fazer Rin, sempre soterrada de trabalho, finalmente descansar. Rin recusa, alegando não ter tempo pra folgas, mas Aoi e as outras já haviam se antecipado e cuidado de todas as pendências. A contragosto, Rin decide aproveitar a curta folga que ganhou de repente. E quem acabou escolhido para supervisioná-la no dia de descanso foi o Sensei."

274943668 = "A Folga da Administradora-Chefe (2)"
1711221830 = "O Sensei percorre D.U. ao lado de Rin, aproveitando a folga. Rin, porém, não consegue tirar o trabalho da cabeça e puxa assunto do Conselho Estudantil Geral a todo momento. Para forçá-la a mudar de foco, o Sensei a leva a um fliperama. Ao desafiar Rin, que dizia nunca ter pisado num lugar daqueles, o Sensei a vê pegar o jeito num piscar de olhos — e acaba derrotado. Depois de jogar, Rin se lembra de uma conhecida que não via fazia tempo."

182317656 = "Gambito da Rainha"
1354224060 = "Rin e o Sensei visitam a Agência Correcional para ver Kaya, que cumpre pena. Diante de uma Kaya igual a sempre, Rin propõe uma partida de xadrez. Enquanto jogam e relembram o golpe de estado, Kaya conta sobre o \"Cajado de Shaked\" que mandou retirar da Schale naquela época. No fim, para Kaya ele não passava de um simples smartwatch; mas, segundo os registros da Presidente do Conselho Estudantil Geral, ele teria o poder de enxergar a verdade."

1861570067 = "Saudade Azul-Celeste"
2238102298 = "Após a visita a Kaya, Rin retorna ao Conselho Estudantil Geral e encontra o \"Cajado de Shaked\" no depósito. Guardado dentro da arca sagrada, ele parecia um simples smartwatch — mas, no instante em que Rin o toca, um pequeno milagre acontece. Quando Rin recobra a consciência ao som de uma voz que a chamava, diante dela estava uma garota loira que se dizia a Presidente do Conselho Estudantil Geral."

1121617851 = "Erro de Memória"
3900724871 = "Ao despertar, Rin se depara com uma garota desconhecida que afirma ser a Presidente do Conselho Estudantil Geral. Rin acha que é uma brincadeira, mas fica atônita ao ver os membros do Conselho tratando a garota como a verdadeira Presidente. Com as memórias sobre a \"Presidente do Conselho Estudantil Geral\" apagadas do mundo, Rin recorre ao Sensei. Por sorte, o Sensei, assim como Rin, também a reconhecia como outra pessoa."

3528020198 = "O Retorno da Super-Humana"
3251654458 = "A autodeclarada Presidente e o Sensei constatam que um não conhece o outro. Rin pergunta o que ela fez durante o desaparecimento, mas a garota diz ter memórias confusas e não sabe responder. Com a discussão sem chegar a lugar algum, o Sensei decide observar a situação por ora. Em seguida, a autodeclarada Presidente demonstra uma capacidade excepcional e resolve, um após o outro, os problemas de toda Kivotos. Aos poucos se espalhava um clima de alívio: que bom que a Presidente do Conselho voltou."

4150457986 = "Pareamento"
3940272632 = "Plana aborda o Sensei, que deixava o Conselho Estudantil Geral. Segundo ela, o fato de a garota não reconhecer nem a ela nem a Arona já prova que se trata de uma impostora. Em busca de uma pista para resolver a situação, Arona e Plana tentam o pareamento com o \"Cajado de Shaked\": a conexão é estabelecida com sucesso e uma nova função é liberada na \"Caixa de Shittim\". Nesse momento, Plana detecta que alguém os seguia — e, quando o Sensei se vira, encontra Rin logo atrás."

562672561 = "Ilusão e Dedução"
1001704649 = "Rin e o Sensei saem pela cidade em busca de alguém que se lembre da antiga Presidente do Conselho Estudantil Geral. Apesar de perguntarem a várias pessoas, não encontram uma única que se lembrasse dela. É então que um encontro casual com Mai lhes rende uma informação valiosa."

4291342361 = "Boa Noite, Sr. Orwell"
2194592478 = "Rin e o Sensei visitam um bar antigo. Quem estava lá era Decalcomanie. A nova cabeça, relembrando tudo o que os membros da Gematria tentaram fazer, afirma que a \"mídia\" é o poder que define a nova era. Ao fim da conversa, a nova cabeça se apresenta pelo nome de Orwell."

68071874 = "Baile de Máscaras"
2049815982 = "Orwell aponta a mídia como o meio de resolver o que vem acontecendo em Kivotos. O Sensei desconfia da alegação de que ela permitiria distinguir o que é verdadeiro; porém, sem nenhuma outra pista no momento, decide por ora seguir a proposta de Orwell."

