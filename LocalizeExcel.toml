3672456810 = "思い出はいつだって輝いて"
1107715282 = "青天の霹靂な予感"
2611070182 = "せっかくの休暇を満喫しているカホとチセ。ニヤはそんな2人に、ゲヘナの生徒たちが百鬼夜行に訪れることになったと、突然の便りを告げるのであった。"
3056758961 = "公平で公正で良い感じの"
1071167405 = "公平かつ公正な方法により、ゲヘナの生徒たちをガイドすることになってしまったお祭り運営委員会。突然のニヤの指示に、委員会のメンバーは混乱に陥ることに。"
230615013 = "Like a roller coaster"
2991705736 = "ゲヘナの生徒たちをお迎えするための準備を始めるお祭り運営委員会とガイドたち。だが、みんなが一丸となったものの、ガイドツアーは初っ端から問題が起きることに。"
1337227752 = "この出会いはどこまでも"
3095630295 = "ガイドの言う事も聞かず、いつにもまして自分勝手に動き回るゲヘナの生徒たち。そんな彼女らを落ち着かせようと、ガイドたちはせっせと働くのであった。"
1217806858 = "ね、簡単でしょう？（１）"
3555243550 = "ガイドと共に伝統工芸工房を訪れたゲヘナの生徒たち。楽しい時間を過ごしていたまさにその時、突然の乱入者により空気は一変する。"
4286660962 = "ね、簡単でしょう？（２）"
886297814 = "招かれざる客を退治したガイドとゲヘナの生徒たち。心の距離が近くなった彼女たちは、互いを友として認め合うことに。"
2517970998 = "花より団子より（１）"
2944533842 = "楽しい夕食の時間。だが美食研究会をはじめとしたゲヘナの生徒たちは、ウミカを無視して予定外の場所で食事を始めてしまう。ウミカたちは慌てて後を追いかけようとするが、問題が起きてしまう。"
1540273776 = "花より団子より（２）"
878796698 = "辛うじて美食研究会を落ち着かせることに成功したウミカたち。しかし、肝心のウミカは一連の騒動で自身にふがいなさを感じていた。"
918329583 = "夜に彷徨う悪戯な（１）"
1967792890 = "ゲヘナの生徒たちのために肝試しを準備したウミカ一行。しかし、予定になかった妖怪の出現でガイドたちは困難な状況に置かれてしまう。"
2245461290 = "夜に彷徨う悪戯な（２）"
2019782794 = "後になって合流したゲヘナの生徒たちのおかげで、騒ぎは一旦落ち着く。しかし、スケジュールは依然として滅茶苦茶な状況で……"
3042426557 = "それぞれに抱えるもの"
1949613221 = "それぞれの立場で、お互いの立場を守るために最善を尽くすことを誓う人々。果たしてゲヘナの生徒たちの修学旅行は無事終えられるのだろうか。"
3543102806 = "舞い踊る最中の"
2008861582 = "ついに百鬼夜行祭りのハイライト、神木祭が始まる。ウミカは今までのミスを挽回すべく、ゲヘナの生徒たちに最善を尽くしてガイドすることを心に誓う。"
3673996570 = "このお祭りは誰のもの？（１）"
569140321 = "再びウミカ一行の前に現れ、修学旅行を邪魔しようとする魑魅一座。ウミカたちはそんな魑魅一座を追い払おうと戦闘に突入する。"
650004307 = "このお祭りは誰のもの？（２）"
9584740 = "お祭りを邪魔する魑魅一座を辛うじて阻止することに成功したウミカ一行。しかし、予期せぬ事故でお祭りのハイライトでもある花火の打ち上げが予定より早く始まってしまう。"
222204002 = "それでもできること"
2056228905 = "予想外の事故で滅茶苦茶になってしまった神木祭。だが、ウミカたちは挫折することなく、ゲヘナの生徒と一緒にお祭りをつくっていく。"
