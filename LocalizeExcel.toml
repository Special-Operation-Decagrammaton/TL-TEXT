2628755669 = "O feriado de alguém é o dia útil de outro"
2401042016 = "Certo dia, um valioso feriado para o Departamento de Merenda. Fuuka encontra Juri trabalhando como garçonete. Juri pensa que não pode depender sempre de Fuuka e decidiu tentar um trabalho de meio período. Durante o expediente, uma explosão causada por pólvora derrubada por um cliente de Gehenna faz com que o cozinheiro do café desmaie. Com reclamações sobre a demora, o gerente pede que Juri faça panquecas. Relutantemente, ela as faz, e surpreendentemente saem normais……"
3150536489 = "Como um milagre"
364471861 = "O gerente serve a panqueca feita por Juri a um cliente. Contra as apreensões de Juri, o cliente elogia. Aliviada, Juri continua a fazer panquecas – mas durante o processo, Pã-chan nasce, e o café entra em pânico. Na confusão, Pã-chan foge para fora. Sabendo da situação, o Sensei contata o Comitê de Disciplina e corre para o local com Fuuka. Enquanto isso, Iori, contatada, diz 'a menos que um monstro apareça, não é grande coisa' e sai com Chinatsu……"
1048397348 = "Sinal"
166512155 = "Iori, ao ouvir a situação, suspeita de um ataque terrorista ao Departamento de Merenda, mas Chinatsu a corrige. Achando que pode lidar sozinha, ela entra no local. Chinatsu interroga Juri e confirma que foi um acidente. Quando percebem, Iori parou de contatar. Ao procurá-la, encontram Iori coberta de muco. Chinatsu chama Sena, que está de folga. Sena diagnostica que Iori não está em perigo, apenas não gostou do sabor do molho, e providencia o transporte."
2850214829 = "Biohazard"
1853896861 = "Sena, com a curiosidade aguçada, participa ativamente da investigação sobre Pã-chan. O grupo segue os rastros e encontra alunos de Gehenna cobertos de muco. O aluno diz: 'Ouvi um barulho estranho, fui ver e……' O Sensei e Sena percebem que é o 'sinal' esperado. Seguindo os rastros, Sena deduz que Pã-chan está crescendo. Diante da gravidade, Chinatsu contata Ako."
2175847726 = "Lili Marleen"
3971352790 = "Ako, que está há três dias sem dormir, fica confusa ao ser chamada por causa de uma 'panqueca fugitiva'. Meio descrente, ela recebe as fotos de Sena com alunos cobertos de muco. Acreditando, ela prepara um canhão antiaéreo 88mm Flak36. Embora preocupada com a reação do Pandemonium, Sena, calma, diz que isso é normal em Gehenna. A pedido de Ako, o grupo continua a busca por Pã-chan."
454321563 = "Que dia adorável (1)"
3987130169 = "Continuando a busca, em certo ponto o muco cessa e, em vez disso, alunos desmaiados aumentam. Sena atira em um aluno de Gehenna caído para acordá-lo, mas ele está confuso e grita coisas sem sentido. Nesse momento, uma grande vibração e barulho ecoam……"
3792547223 = "Que dia adorável (2)"
2273649963 = "O grupo testemunha Pã-chan, agora gigante, aparecendo na cidade. Sim, Pã-chan estava – na fase de crescimento."
1682284240 = "O que deve ser feito"
2094272827 = "Contra o enorme Pã-chan, Ako tenta atirar com o canhão, mas a mira não acompanha sua velocidade. Nesse momento, um tentáculo de Pã-chan agarra o tornozelo de Ako e enfia o tentáculo em sua boca. Então, Juri diz 'Deixem comigo' e avança sozinha. Vendo isso, Fuuka grita: 'Isso é sinal de morte!'"
71107535 = "Última garota de pé"
12472440 = "Juri se lança sozinha diante de Pã-chan. Ela é capturada pelos tentáculos, mas em troca consegue imobilizar Pã-chan. No entanto, Ako, que tem autoridade para atirar, está desmaiada. Nesse momento, Hina contata e o comando é transferido de Ako para o Sensei. Sob o comando do Sensei, a equipe de artilharia dispara. Isso diminui os movimentos de Pã-chan, e o grupo parte para a batalha final contra ele……"
1375140572 = "Frutificação"
3221535166 = "O grupo derrota Pã-chan. Juri e Ako, coberta de muco, são resgatadas com segurança. Fuuka descarta Pã-chan, que voltou ao tamanho normal, no lixo, e o incidente chega ao fim. – Dias depois, Fuuka e Juri voltam à rotina agitada quando o Sensei aparece com suco para animá-las. Nesse momento, Juri timidamente diz ter doces. Após o incidente, Juri praticou com a ajuda do café e fez uma panqueca excelente. Os três passam um tempo agradável, comendo a panqueca cheia de carinho e sinceridade de Juri, acompanhada do suco."
