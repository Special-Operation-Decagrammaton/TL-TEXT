3055775567 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Uma garota que continua suas atividades sem muito esforço. É respeitada tanto por veteranos quanto por novatos.[/i][-][/c]"
4028810052 = "[c]Ao iniciar sua fase:[/c] Se o HP estiver abaixo de [c]{param;ConditionNum}[/c], recupera [c]{param;BasePower}[/c] de HP."
2496996975 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Vice-presidente do Comitê de Justiça que cuida da maior parte da administração em nome da presidente. É mais rigorosa consigo mesma do que com qualquer outra pessoa.[/i][-][/c]"
3233074764 = "[c]Após jogar uma carta de equipamento:[/c] O poder da sua própria habilidade aumenta em [c]1[/c] nesta fase."
1780167426 = "Causa dano a todos os inimigos na linha de trás. Em seguida, troca de lugar com um atacante aliado aleatório.\n\n\n[c][75b4c0][i]O ápice de Trinity, envolta em véus, a anfitriã do Tea Party. Sua verdadeira identidade é a de uma garota extremamente ocupada.[/i][-][/c]"
1320965963 = "[c]Após a ativação da habilidade EX de outro atacante {tag;TeaParty}:[/c] Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório. (Repete o efeito pelo número de estudantes {tag;TeaParty} aliadas, incluindo ela mesma).\nSe [c]{char;848004}[/c] ou [c]{char;848005}[/c] estiverem no time, o dano da habilidade por pessoa aumenta em [c]{param;BonusNum}[/c]."
3576040056 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Uma princesa pura pertencente ao Colégio Trinity. Por ser pura, é mais fácil de se ferir e de ferir os outros do que qualquer um.[/i][-][/c]"
312404380 = "[c]Ao trocar para a linha de frente:[/c] Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório na linha de trás."
3291019510 = "O poder da habilidade EX de outro atacante aliado aumenta em [c]1[/c] e troca de lugar com esse atacante.\n\n\n[c][75b4c0][i]Uma existência que parece personificar a palavra liberdade. É difícil imaginar que ela atue como anfitriã do Tea Party.[/i][-][/c]"
1066641449 = "[c]Após a ativação da habilidade EX de outro atacante {tag;TeaParty}:[/c] O poder da habilidade EX de um atacante aliado na linha de frente aumenta em [c]1[/c]."
3210250803 = "Causa dano aos inimigos na linha de frente. Em seguida, compra [c]{param;DrawCardNum}[/c] cartas.\n\n\n[c][75b4c0][i]\"Será que aquela criança está conseguindo sorrir? Será que ela fez amigos? ...Que bom.\" \n- Mercenário do mercado negro, anônimo[/i][-][/c]"
3848622176 = "[c]Após a ativação da habilidade EX ou SP de outra estudante {tag;MakeUpWork}:[/c] Compra [c]{param;DrawCardNum}[/c] cartas."
231076403 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Uma garota que escolheu não ser nada, justamente porque pode ser qualquer coisa.[/i][-][/c]"
351059869 = "[c]Ao iniciar sua fase:[/c] O custo de [c]{param;CardNum}[/c] cartas aleatórias na mão é reduzido em [c]1[/c]."
2651504191 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Quem pensa que pode vencer Tsurugi é um tolo. Quem pensa que pode escapar dela é ainda mais tolo.[/i][-][/c]"
2237998232 = "[c]Ao estar na linha de frente, após um inimigo sofrer dano e ao recuar:[/c] Recupera [c]{param;BasePower}[/c] de HP."
2674858929 = "Causa dano aos inimigos na linha de frente. Em seguida, causa [c]{param;BonusAttackPower}[/c] de dano fixo a um inimigo aleatório. (Repete [c]{param;AttackCount}[/c] vezes).\n\n\n[c][75b4c0][i]A especialista implacável do Comitê Disciplinar. Sua proatividade em estar sempre na linha de frente, mesmo reclamando, talvez a torne a pessoa mais próxima da presidente.[/i][-][/c]"
3746791027 = "[c]Ao sofrer dano:[/c] O poder da habilidade EX aumenta em [c]1[/c]."
2135599211 = "Causa dano a todos os inimigos. (Repete [c]{param;AttackCount}[/c] vezes).\n\n\n[c][75b4c0][i]Assim como não se pode imaginar Gehenna sem Hina, não se pode imaginar Hina sem ser em Gehenna.[/i][-][/c]"
3485857018 = "[c]Ao estar na linha de frente, após um inimigo sofrer dano e ao recuar:[/c] Causa [c]{param;BasePower}[/c] de dano a todos os inimigos."
1997750136 = "Recupera o HP de um atacante aliado aleatório.\n\n\n[c][75b4c0][i]No Colégio Trinity, sempre há alguém causando problemas e alguém limpando a bagunça. Eu sou principalmente a segunda.[/i][-][/c]"
3069105627 = "[c]Após a ativação da habilidade EX de outro atacante aliado:[/c] Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório na linha de trás."
1184747526 = "Troca de lugar com um atacante aliado aleatório. Em seguida, causa [c]{param;SubPower}[/c] de dano fixo ao inimigo com o maior HP.\n\n\n[c][75b4c0][i]Desde que disseram que meu rosto é assustador, pratico sorrisos na frente do espelho todas as noites.[/i][-][/c]"
1931885401 = "[c]Ao iniciar sua fase:[/c] Recupera [c]{param;BasePower}[/c] de HP de um atacante aliado aleatório."
3182341508 = "Causa dano a um inimigo aleatório.\n\n\n[c][75b4c0][i]Uma garota que patrulha com responsabilidade, mesmo quando quer descansar ou brincar.[/i][-][/c]"
2216886365 = "[c]Após um inimigo sofrer dano e ao recuar:[/c] Recupera [c]{param;BasePower}[/c] de HP de um atacante aliado na linha de frente."
1621612816 = "[c][75b4c0][i]O momento de crise! É a chegada da Ninpero-san![/i][-][/c]"
2965092129 = "[c][75b4c0][i]Dizem que é viciante, mas...[/i][-][/c]"
1962256730 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Não importa o quão abafado esteja, eu nunca tiro o capacete! Estou um pouco viciada nessa minha própria imagem.[/i][-][/c]"
1544184084 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Coloco bolsas de gelo escondidas dentro do capacete. Essa é a sabedoria de um executivo.[/i][-][/c]"
3706527418 = "[c]Após a ativação da habilidade EX de outro atacante aliado:[/c] Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório."
3384273229 = "Causa dano aos inimigos na linha de frente. Em seguida, concede um escudo de [c]{param;ShieldPower}[/c] a todos os aliados na linha de trás.\n\n\n[c][75b4c0][i]\"Entendido... Deixarei o resto com o Comitê de Justiça.\" \n- Presidente do Comitê Disciplinar de Gehenna, Sorasaki Hina[/i][-][/c]"
3606491034 = "[c]Ao iniciar sua fase:[/c] Se ela for a única que restou, uma nova [c]{char;848015}[/c] se juntará ao time."
4174554070 = "Invoca [c]{param;SpawnNum}[/c] autômatos aleatórios com [c]1[/c] de HP no espaço vazio de atacante e concede um escudo de [c]{param;SubPower}[/c]. Em seguida, troca de lugar com outro atacante aliado.\n\n\n[c][75b4c0][i]\"É por isso que os jovens de hoje! Agradeçam por terem trabalho. Quando eu era jovem, chegava uma hora antes do expediente para regar o canteiro de flores--\"[/i][-][/c]"
2742386328 = "[c]Ao finalizar sua fase:[/c] Causa [c]{param;BasePower}[/c] de dano a todos os outros atacantes aliados."
4174554610 = "Causa dano a um inimigo aleatório.\n\n\n[c][75b4c0][i]Uma novata que começou como mercenária cheia de ambição, mas que acabou frustrada ao bater de frente com a realidade.[/i][-][/c]"
3631717719 = "[c]Após sofrer dano:[/c] Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório."
1175820112 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Uma mercenária veterana que, após passar por muitas injustiças, começou a se acalmar ao encontrar seu lugar.[/i][-][/c]"
4195242012 = "[c]Após sofrer dano:[/c] Concede um escudo de [c]{param;BasePower}[/c] para [c]{char;848018}[/c]."
3578644684 = "[c]Após a ativação do efeito de {skill;8480219}[/c], a habilidade EX pode ser usada.\n\nCausa dano a todos os inimigos.\n\n\n[c][75b4c0][i]Os trilhos que continuam girando eventualmente levarão ao futuro da justiça![/i][-][/c]"
1408075034 = "[c]Ao iniciar o jogo:[/c] Esta atacante não pode usar a habilidade EX. Se ela for a única que restou, poderá usar a habilidade EX."
1025653715 = "Recupera o HP de todos os outros aliados e o poder da habilidade EX de todos os outros aliados aumenta em [c]3[/c]. Em seguida, ela recua.\n\n\n[c][75b4c0][i]O suporte emocional de uma equipe misteriosa e de poucas palavras... ou pelo menos é o que dizia no perfil, mas ela fala bastante.[/i][-][/c]"
3669633875 = "Recupera o HP de todos os outros aliados e o poder da habilidade EX de todos os outros aliados aumenta em [c]3[/c]. Em seguida, ela recua.\n\n\n[c][75b4c0][i](Por favor, avise se ocorrer algum problema. Verificarei no dia seguinte.)[/i][-][/c]"
1126956015 = "Recupera o HP de todos os outros aliados e o poder da habilidade EX de todos os outros aliados aumenta em [c]3[/c]. Em seguida, ela recua.\n\n\n[c][75b4c0][i]Ela age junto com os amigos porque não consegue deixá-los sozinhos, mas sente que é a única que está levando as coisas a sério.[/i][-][/c]"
4158848476 = "Recupera o HP de todos os outros aliados e o poder da habilidade EX de todos os outros aliados aumenta em [c]3[/c]. Em seguida, ela recua.\n\n\n[c][75b4c0][i]Hoje, mais uma vez, lutando contra o mal pela justiça de Kivotos! ...é o que afirma esta criminosa procurada. Não há mentira em sua determinação, talvez.[/i][-][/c]"
2396972796 = "Recupera o HP de todos os outros aliados e o poder da habilidade EX de todos os outros aliados aumenta em [c]3[/c]. Em seguida, ela recua.\n\n\n[c][75b4c0][i]Aproveitando um tempo livre divertido. Surpreendentemente, é uma aluna exemplar e séria no dia a dia.[/i][-][/c]"
2332449769 = "[c][75b4c0][i]Não há nada dentro.[/i][-][/c]"
359109910 = "[c]Ao iniciar sua fase:[/c][c]{char;848027}[/c] Se todos os outros aliados recuarem, ela também recuará."
1129966233 = "Causa dano a si mesma. Em seguida, ganha um escudo equivalente ao HP perdido.\n\n\n[c][75b4c0][i]Idiota.[/i][-][/c]"
2304976140 = "[c]Ao finalizar sua fase:[/c] Causa dano à linha de frente inimiga equivalente ao HP que perdeu."
4015010782 = "Causa dano a todos os inimigos. Ela recua.\n\n\n[c][75b4c0][i]\"Não existe a palavra 'excesso' quando se trata de explosões!\"\n- Chefe do Departamento de Desenvolvimento de Fontes Termais, Kasumi Kirigawa[/i][-][/c]"
2518778292 = "[c]Ao iniciar sua fase:[/c] O poder da habilidade EX aumenta em [c]1[/c].\n\n[c]Ao sofrer dano e recuar:[/c] Causa dano aos outros aliados atacantes equivalente ao poder da habilidade EX."
214409855 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]\"O quê? Eles parecem fracos, não parecem?\"[/i][-][/c]"
1713796781 = "[c]Ao finalizar sua fase:[/c] Recupera [c]{param;BasePower}[/c] de HP dos aliados na linha de frente."
2648436727 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]\"Não tem problema se eu acabar com eles, né?\"[/i][-][/c]"
3441096829 = "[c]Ao iniciar sua fase:[/c] Durante esta fase, o poder da habilidade EX dos aliados na linha de frente aumenta em [c]1[/c]."
3403442927 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]\"Ahhh~ Eu não queria ter que mostrar isso aqui!\"[/i][-][/c]"
1427289709 = "[c]Ao finalizar sua fase:[/c] Concede aleatoriamente um escudo de [c]{param;BasePower}[/c] a outro aliado atacante."
1117978599 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]\"Entre os delinquentes, há aqueles que se autodenominam Sukeban! Qual é a diferença real? Para mim, é um pouco...\"\n- Academia Valkyrie, Departamento de Segurança Pública, Kirino Nakatsukasa[/i][-][/c]"
2774820117 = "[c]Ao iniciar sua fase:[/c] Se o espaço de aliados atacantes estiver cheio, recupera [c]{param;BasePower}[/c] de HP."
426220014 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]\"Ué? Aquela garota não é a que estava fazendo controle de tráfego voluntário outro dia? Elas são todas tão sérias, né~\"\n- Academia Valkyrie, Departamento de Segurança Pública, Fubuki Nemugaki[/i][-][/c]"
1132320876 = "[c]Ao finalizar sua fase:[/c] Se o espaço de aliados atacantes estiver cheio, concede a si mesma um escudo de [c]{param;BasePower}[/c]."
3384243049 = "Causa dano a todos os atacantes.\n\n\n[c][75b4c0][i]A lenda das Sukeban, grupos de delinquentes que atuam por todo o Kivotos.\nDizem que qualquer Sukeban que ouça a história heroica daquela que se sacrificou pelas irmãs cai em prantos.[/i][-][/c]"
3391762953 = "[c]Ao iniciar o jogo:[/c] O poder da habilidade EX e o HP de outros atacantes [c]{tag;Sukeban}[/c] aumentam em [c]2[/c].\n\n[c]Ao iniciar sua fase:[/c] Se ela for a única que restou, o poder da sua habilidade EX e seu HP aumentam em [c]5[/c]. [c](1 vez por jogo)[/c]"
2934588240 = "Causa dano a todos os inimigos na linha de trás e aplica [c]Impossibilidade de Troca[/c].\n\n\n[c][75b4c0][i]No fundo, ela é uma boa garota. Espero que ela não se machuque durante as patrulhas disciplinares. Bem, talvez não precise me preocupar, já que ela está lá.\n- Notas da Presidente do Comitê Disciplinar[/i][-][/c]"
1523348638 = "[c]Ao finalizar sua fase:[/c] Recupera [c]{param;BasePower}[/c] de HP do outro aliado atacante com o menor HP."
2430113912 = "Causa dano aos inimigos na linha de frente. Em seguida, invoca [c]1[/c] carta [c]{char;848029}[/c].\n\n\n[c][75b4c0][i]O primeiro lema do Departamento de Desenvolvimento de Fontes Termais é: \"Segurança em primeiro lugar\".[/i][-][/c]"
62152871 = "[c]Ao finalizar sua fase:[/c] Concede um escudo de [c]{param;BasePower}[/c] à carta [c]{char;848029}[/c] aliada."
2277020639 = "Causa dano aos inimigos na linha de trás. Em seguida, invoca [c]1[/c] carta [c]{char;848029}[/c].\n\n\n[c][75b4c0][i]O segundo lema do Departamento de Desenvolvimento de Fontes Termais é: \"Explosão é a solução para tudo\".[/i][-][/c]"
2286455285 = "[c]Ao finalizar sua fase:[/c] Causa [c]{param;BasePower}[/c] de dano ignorando escudos a todos os [c]{char;848029}[/c]. Em seguida, o poder da habilidade EX de todas as cartas [c]{char;848029}[/c] aumenta em [c]1[/c]."
4139891424 = "Causa de [c]{param;Min} a {param;Max}[/c] de dano a um inimigo aleatório.\n\n\n[c][75b4c0][i]Uma pessoa perigosa cujas ações são imprevisíveis e que aceita qualquer sacrifício.\n- Notas da Presidente do Comitê Disciplinar[/i][-][/c]"
1540816638 = "[c]Ao iniciar sua fase:[/c] Causa de [c]{param;Min} a {param;Max}[/c] de dano a si mesma e recupera de [c]{param;Min} a {param;Max}[/c] de HP. Se seu HP diminuir, causa dano aos outros atacantes equivalente ao valor perdido. Se seu HP aumentar, recupera o HP dos outros atacantes equivalente ao valor ganho."
2549347011 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]O caminho para o inferno está pavimentado de boas intenções.[/i][-][/c]"
2455668066 = "[c]Ao iniciar sua fase:[/c] Se seu HP for [c]{param;ConditionNum}[/c] ou menos, recupera [c]{param;BasePower}[/c] de HP."
2252755850 = "Causa dano a todos os inimigos.\n\n\n[c][75b4c0][i]Uma aluna que não perde a calma em nenhuma situação. Há quem diga que ela é mais perigosa que a Haruna...[/i][-][/c]"
1185238083 = "[c]Ao iniciar sua fase:[/c] Se seu HP não estiver no máximo, o poder da habilidade EX aumenta em [c]1[/c]."
4196376057 = "Causa dano aos inimigos na linha de frente. Em seguida, recupera [c]{param;SubPower}[/c] de HP para si mesma e para o aliado com o menor HP.\n\n\n[c][75b4c0][i]De qualquer forma, ela, que sempre acompanha o Clube de Pesquisa Gastronômica, também é uma pessoa bastante excêntrica.[/i][-][/c]"
3067817325 = "[c]Ao iniciar sua fase:[/c] Se seu HP for o menor, move-se para a linha de frente. Em seguida, se seu HP for [c]{param;ConditionNum}[/c] ou menos, concede um escudo de [c]{param;BasePower}[/c]."
2944040695 = "Causa dano aos inimigos na linha de frente. Em seguida, causa [c]{param;SubPower}[/c] de dano fixo a todos os inimigos na linha de trás.\n\n\n[c][75b4c0][i]\"Todas as alunas têm o direito de saber a verdade!\" Hoje, uma jornalista apaixonada que busca a verdade com convicção e orgulho. Deixando a veracidade de lado...[/i][-][/c]"
3688516337 = "[c]Ao iniciar sua fase:[/c] Chama o atacante inimigo com o menor HP para a linha de frente. Em seguida, se ela estiver na linha de trás, move-se para a linha de frente."
2292202966 = "Causa dano aos inimigos na linha de frente. Em seguida, troca de lugar com um aliado atacante aleatório.\n\n\n[c][75b4c0][i]\"A mídia é entretenimento!\" Uma jornalista que corre por todos os lugares para levar diversão às alunas de Kivotos. Deixando a veracidade de lado...[/i][-][/c]"
4249224260 = "[c]Ao iniciar sua fase:[/c] Durante esta fase, o poder da habilidade EX dos atacantes na linha de frente aumenta em [c]2[/c]."
1953962774 = "Causa dano aos inimigos na linha de trás.\n\n\n[c][75b4c0][i]As alunas do \"Golden Fleece\", o grupo de alunas problemáticas da Escola Superior Marítima Odyssey.[/i][-][/c]"
1830076469 = "[c]Após outro aliado atacante sofrer dano:[/c] Se for atacado por um atacante na linha de trás, recupera [c]{param;BasePower}[/c] de HP do atacante atingido."
3320968227 = "Causa dano a todos os inimigos.\n\n\n[c][75b4c0][i]Estou toda encharcada, como se tivesse caído no mar.[/i][-][/c]"
2788686513 = "[c]Ao iniciar sua fase:[/c] Se esta carta for a única que restou no campo, o poder da habilidade EX aumenta em [c]3[/c]. [c](1 vez por jogo)[/c]"
887567173 = "Causa dano a um inimigo aleatório. Se o alvo for um inimigo na linha de trás, causa [c]{param;Multiply}[/c] vezes mais dano.\n\n\n[c][75b4c0][i]Ela finge que está tudo bem, mas parece que na verdade está um pouco envergonhada com a roupa de coelhinha.[/i][-][/c]"
4268305663 = "[c]Ao finalizar sua fase:[/c] O HP máximo de outros atacantes [c]{tag;Odyssey}[/c] aumenta em [c]1[/c]."
794917716 = "Causa dano aos inimigos na linha de frente. Recupera seu próprio HP equivalente ao dano causado.\n\n\n[c][75b4c0][i]Essa situação não está um pouco desvantajosa para mim?[/i][-][/c]"
4091615803 = "Concede um escudo aos aliados atacantes equivalente ao custo de [c]{param;CardNum}[/c] cartas da mão do oponente. Em seguida, o custo das cartas alvo torna-se [c]0[/c].\n\n\n[c][75b4c0][i]\"A ganância só fere uns aos outros! Então, entregue tudo para mim!\"[/i][-][/c]"
3270348989 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]\"Ouvi dizer que ganharia um bolo de graça, então não como nada desde ontem!\"[/i][-][/c]"
2498549575 = "[c]Ao finalizar sua fase:[/c] O poder da sua habilidade EX aumenta equivalente ao custo de [c]{param;CardNum}[/c] cartas da mão do oponente. Em seguida, o custo das cartas alvo torna-se [c]0[/c]."
3983448958 = "Concede um escudo a si mesma.\n\n\n[c][75b4c0][i]\"Há pouco, algumas pessoas vestidas de coelhinhas estavam balançando as palmeiras e gritando 'Estou viva!'... Que tipo de evento é esse?\"\n- Proprietária das palmeiras, Nagisa Kirifuji[/i][-][/c]"
3876182863 = "[c]Ao iniciar o jogo:[/c] Concede um escudo de [c]{param;ShieldPower}[/c] a todos os aliados atacantes.\n\n[c]Ao iniciar sua fase:[/c] Se seu HP não estiver no máximo, invoca [c]3[/c] cartas [c]{char;848052}[/c] e recua. Se seu HP estiver no máximo, causa [c]{param;BasePower}[/c] de dano a todos os atacantes inimigos."
2456262865 = "Concede um escudo a todos os aliados.\n\n\n[c][75b4c0][i]※ É ilegal colher frutos de árvores em propriedade privada.[/i][-][/c]"
2920098346 = "[c]Ao iniciar sua fase:[/c] Se seu HP não estiver no máximo, recupera [c]{param;BasePower}[/c] de HP de todos os atacantes inimigos. Em seguida, ela recua. Se seu HP estiver no máximo, causa [c]{param;SubPower}[/c] de dano a todos os atacantes inimigos."
1996631264 = "Causa dano a todos os inimigos.\n\n\n[c][75b4c0][i]\"Não consigo acreditar que aquele era o último...\"\n- Frase extraída do filme inédito, 'Shin Perorodzilla'[/i][-][/c]"
2315266529 = "[c]Ao iniciar sua fase:[/c] Se estiver na linha de frente, retira-se. Se estiver na linha de trás, causa [c]{param;BasePower}[/c] de dano a um atacante inimigo aleatório."
1862988659 = "Causa dano aos inimigos na linha de frente. Em seguida, causa dano a todos os inimigos na linha de trás equivalente ao número de cartas de aliado [c]{char;848053}[/c].\n\n\n[c][75b4c0][i]\"O que invocou isso foram nossos desejos e obsessões — e a loucura que pairava ali.\"\n- Página de apresentação de produtos do Perorodzilla[/i][-][/c]"
4093879807 = "[c]Ao finalizar sua fase:[/c] Se não estiver sozinho, concede [c]{param;BasePower}[/c] de escudo. Se estiver sozinho, invoca [c]1[/c] carta [c]{char;848053}[/c]. Em seguida, causa [c]{param;SubPower}[/c] de dano a si mesmo."
3617530377 = "[c]Tempo de recarga: 3 turnos[/c]\n\nCausa dano aos inimigos na linha de frente. Em seguida, o poder da habilidade SP aumenta em [c]1[/c].\n\n\n[c][75b4c0][i]Uma garota que decidiu correr sem parar para ficar ao lado de todos.[/i][-][/c]"
3142724350 = "[c]Após o uso da habilidade EX ou SP de outro aliado da tag {tag;Trinity}:[/c] O tempo de recarga diminui em [c]{param;CoolDownNum}[/c]."
3289231970 = "[c]Tempo de recarga: 3 turnos[/c]\n\nRecupera o HP de um atacante aliado na linha de frente.\n\n\n[c][75b4c0][i]\"Aquela garota é uma aluna muito mais incrível do que ela mesma pensa.\"\n- Vice-presidente do Comitê de Justiça, Hasumi Hanekawa[/i][-][/c]"
3414707332 = "[c]Após o uso da habilidade SP de outro aliado especial:[/c] O tempo de recarga diminui em [c]{param;CoolDownNum}[/c]."
2250816044 = "[c]Tempo de recarga: 3 turnos[/c]\n\nO poder da habilidade EX de um atacante aliado na linha de frente aumenta em [c]1[/c]. Se o alvo for um atacante da tag [c]{tag;Justice}[/c], o poder da habilidade EX aumenta em [c]2[/c].\n\n\n[c][75b4c0][i]Uma atiradora genial que possui técnicas de tiro superiores e entrou no Comitê de Justiça como a primeira da turma. Mesmo dentro do comitê, ela tem uma personalidade particularmente séria. Ultimamente, tem vagado entre o ideal e a realidade.[/i][-][/c]"
1536770335 = "[c]Após o uso da habilidade EX de outro atacante aliado:[/c] Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório."
2704960902 = "[c]Tempo de recarga: 2 turnos[/c]\n\nCopia [c]{param;SpawnCardNum}[/c] cartas aleatórias da mão e gera cartas descartáveis com custo [c]0[/c]. Ao finalizar sua fase, as cartas alvo são descartadas.\n\n\n[c][75b4c0][i]A astuta proprietária da Hyakkiyako, com um faro aguçado para negócios. Seu ímpeto não se limita apenas a Hyakkiyako, estendendo-se por todo o Kivotos.[/i][-][/c]"
608246101 = "[c]Ao iniciar sua fase:[/c] O custo de [c]{param;CardNum}[/c] cartas aleatórias na mão é reduzido em [c]1[/c]. Ao finalizar sua fase, as cartas alvo são descartadas."
2240303745 = "[c]Tempo de recarga: 2 turnos[/c]\n\nCausa dano a um inimigo aleatório. [c](Repete o efeito pelo número de aliados da tag {tag;Hyakkiyako} e cartas {char;848014}, incluindo a si mesmo)[/c]\n\n\n[c][75b4c0][i]Uma garota ninja que vive sonhando. Ela frequentemente demonstra suas técnicas ninja, mas todas são realizadas através de sua excelente capacidade física.[/i][-][/c]"
1862786830 = "[c]Ao iniciar sua fase:[/c] Se restar apenas um atacante aliado, invoca cartas [c]{char;848058}[/c] até igualar o número de inimigos. [c](1 vez por jogo)[/c]\n\n*Se todos os atacantes aliados se retirarem e restarem apenas atacantes de suporte, será uma derrota."
4086389314 = "[c]Tempo de recarga: 2 turnos[/c]\n\nCausa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]\"As principais acusações são: vadiagem, descarte ilegal de lixo, correr nos corredores... em suma, violação do regulamento escolar.\"\n- Diretora do Departamento de Segurança Pública da Academia Valkyrie, Kanna Oba[/i][-][/c]"
820538695 = "[c]Tempo de recarga: 3 turnos[/c]\n\nO efeito de [c]{skill;8481079}[/c] é ativado e a habilidade EX pode ser usada. Causa dano ao inimigo com o maior HP. [c](Repete pelo número de cartas na mão do oponente)[/c]\n\n\n[c][75b4c0][i]Se minha arma e roupas preciosas ficarem molhadas, o dano é maior do que ser atingida por um tiro![/i][-][/c]"
3259127937 = "[c]Ao finalizar sua fase:[/c] Retira a água. Se [c]{skill;8481071}[/c] for usado, o efeito desaparece."
1443818886 = "[c]Tempo de recarga: 3 turnos[/c]\n\nCausa dano a todos os atacantes.\n\n\n[c][75b4c0][i]Ela não escolhe meios para atingir seus objetivos. Infelizmente, ela é uma pessoa que possui muitos desses meios.\n- Nota da Presidente do Comitê Disciplinar[/i][-][/c]"
4169220226 = "[c]Ao finalizar sua fase:[/c] Invoca [c]1[/c] carta [c]{char;848029}[/c] em um espaço vazio dos atacantes inimigos."
2773974068 = "[c]Ao iniciar o jogo:[/c] O poder da habilidade EX de todos os atacantes aliados aumenta em [c]2[/c]."
4044198689 = "[c]Ao iniciar o jogo:[/c] O poder da habilidade EX de todos os atacantes aliados aumenta em [c]1[/c]."
2024521566 = "[c]Ao iniciar o jogo:[/c] O HP máximo de todos os atacantes aliados aumenta em [c]2[/c]."
1870803014 = "[c]Ao iniciar o jogo:[/c] O HP máximo de todos os atacantes aliados aumenta em [c]5[/c]."
