2627451797 = "開戦"
3717557940 = "ついにすべての準備が終わり、総攻撃のためのカウントダウンが始まるのだった。"
79803409 = "第1サンクトゥム（１）"
405922630 = "アビドスの対策委員会とゲヘナの便利屋68が第1サンクトゥムの守護者「ビナー」に立ち向かうのだったのだった。"
1036568694 = "第1サンクトゥム（２）"
84229587 = "リンが最初のサンクトゥムが破壊されたことを告げる。"
3495136884 = "第2サンクトゥム（１）"
238076545 = "ネルとツルギが先んじて「ケセド」に立ち向かうものの、デカグラマトンの兵は一向に減らなかった。そんな中、レッドウィンター連邦学園の支援軍が合流するのだった。"
3210330755 = "第2サンクトゥム（２）"
13226435 = "モモカが第2サンクトゥムが破壊されたことを告げる。"
1137998478 = "第3サンクトゥム（１）"
2168406679 = "RABBIT小隊とゲーム開発部、そしてヒナは第3サンクトゥムの守護者、「シロ&クロ」に立ち向かうのだった。"
1053949562 = "第3サンクトゥム（２）"
3924457115 = "アユムが第3サンクトゥムが破壊されたことを告げる。"
2787217231 = "第4サンクトゥム（１）"
1707137688 = "アリウススクワッドとトリニティのシスターフッドと共に第4サンクトゥムの守護者、「ヒエロニムス」に立ち向かうのだった。"
333221986 = "第4サンクトゥム（２）"
2706734115 = "リンが第4サンクトゥムが破壊されたことを告げる。"
2631317245 = "第5サンクトゥム（１）"
340881145 = "ミレニアムのセミナーやゲヘナの温泉開発部などを主軸に第5サンクトゥムの守護者、「ホド」に立ち向かうのだった。"
2418033867 = "第5サンクトゥム（２）"
3029067251 = "モモカが第5サンクトゥムが破壊されたことを告げる。"
2341911236 = "新たな危機"
2665319081 = "5つのサンクトゥムをすべて攻略すると、破壊されたサンクトゥムから再び超高濃度のエネルギー反応が現れた。第6サンクトゥムでの最後の戦いのため、一同は今まで攻略した5つのサンクトゥムを再び攻略することになるのだった。"
673842062 = "第6サンクトゥム（１）"
1721508695 = "美食研究会と合流したヒフミ、アズサはD.U.シラトリ区に現れた第6サンクトゥムの守護者、「ペロロジラ」に立ち向かうのだった。"
1977881858 = "第6サンクトゥム（２）"
815268323 = "すべての虚妄のサンクトゥムの攻略が完了したことを知らせるのだった。"
2321323365 = "最終サンクトゥム（１）"
3607360132 = "5つのサンクトゥムがすべて消滅するも、第6サンクトゥムにエネルギーが集中していることが明らかになる。「最後のサンクトゥム」での決戦を控え、運命はヒマリが取り出した秘密兵器にかかっていた。"
177965272 = "最終サンクトゥム（２）"
2772661126 = "無事に最後のサンクトゥムまで消滅したことが確認されたのだった。"
1060292091 = "アトラ・ハシースの箱舟占領戦"
3294063434 = "箱舟への突入が無事完了し、「アトラ・ハシースの箱舟占領戦」が幕を開ける。次元エンジンとその守護者を相手どった激戦――\n果たして、この戦いの末に待ち受けているものは……？"
3752910329 = "アトラ・ハシース箱舟占領戦開始"
