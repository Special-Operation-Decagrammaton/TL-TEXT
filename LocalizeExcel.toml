562973436 = "ヘルメット団ブルース"
4261263739 = "悪の幹部、誕生"
668979687 = "プロローグ"
291814856 = "遊園地のヒーローショーに、魔法少女「ヘヴィキャリバーズ」が登場！子供たちからの声援を浴び、決めポーズをとるスズミとレイサだったが、その光景を目の当たりにしたラブは、つい彼女たちの正気を疑ってしまう。"
1625623402 = "自警団の資格"
3887718499 = "自警団として活動するスズミは、制圧したスケバンから「落ちこぼれが、正義面して暴力を振るってるだけ」と指摘され、自身の活動意義に迷いを抱く。そんな中、旧図書館でヘルメット団の不穏な計画を耳にしたシミコがスズミに助けを求めるが、スズミは「正義実現委員会の仕事だ」と言い、自ら動こうとしない……。"
1516868240 = "週末の予定"
3737638084 = "ヘルメット団の不穏な計画を通報するため、スズミとシミコは正義実現委員会を訪れる。しかし、現場がゲヘナ自治区との境界にあるため委員会は表立って動けず、逆にスズミたちが状況確認を依頼されてしまう。人手不足に悩む二人の前にレイサが現れ、協力を快諾する。かくして、三人は魔法少女の衣装で遊園地に潜入するのだった。"
251151206 = "魔法少女ヘヴィキャリバーとは！"
389196534 = "潜入作戦のため、魔法少女の衣装に身を包んだスズミとレイサ。レイサはスズミを「テルミットホワイト」と呼び、役になりきるが、スズミは恥ずかしさを隠せない。そこへ支援担当のマシロと先生も合流。作戦開始直後、公演のマネージャーに本物のキャストと間違えられた二人は、ヒーローショーに出演する流れに……！"
952740791 = "ステージショー開演！"
1766902987 = "ショーの本番、大勢の観客を前にスズミは緊張に襲われていた。レイサが機転を利かせアドリブで場を繋ぐが、カンペのセリフが汗で滲んでしまったスズミはパニックに。さらに、以前スケバンに言われた言葉がフラッシュバックし、「私にはできない」とステージ上で立ち尽くしてしまう。"
4157121877 = "追跡！ヘルメット団！（１）"
562445621 = "ステージ上で立ち尽くすスズミに、マシロからラブ発見の報が入る。我に返ったスズミは、観客のどよめきを背にステージから飛び降り、ラブたちを追跡。ゲヘナエリアでラブたちを追い詰めるも、そこはすでにショーの一環と勘違いした観客で溢れかえっていた。"
2600015690 = "追跡！ヘルメット団！（２）"
627070372 = "観客たちの前でラブに敗北し、追い詰められるスズミとレイサ。もはやこれまでかと思われたその時、自分たちが「悪いヤツ」だと泣き叫ぶ子供たちの声に、ラブは困惑し始める。状況を察したラブは、わざとやられたフリをして「あんたらの勝ちだー！」と叫び、その場から退散していった。"
3398629634 = "守月スズミ"
3108822929 = "スズミはかつて正義実現委員会に所属していたが、人間関係の苦痛から逃げ出した過去を告白する。臆病者だと自嘲し、自警団を辞めようとするスズミを、レイサは「私のヒーロー」と必死に引き留める。そんな中、マシロから再びラブ発見の報が――先生とレイサの言葉を受け、スズミは迷いを抱えつつ、任務を全うするために再起した。"
3807592120 = "スタナグちゃん頑張る（１）"
3287974263 = "スズミたちが再び遭遇したラブは、魔法少女アニメのマスコット「スタナグちゃん」の着ぐるみで身を包んでいた。スズミたちが攻撃できないよう、観客を盾にしながら立ち回るラブだったが、そこに悪の幹部「エラ」に扮したシミコが乱入。「エラ」は劇中の設定通り、「スタナグちゃん」に攻撃を仕掛け、事態は乱戦にもつれ込む……。"
3677586344 = "スタナグちゃん頑張る（２）"
1024996158 = "マスコット役のラブは敵役のシミコだけでなく、味方のはずのスズミとレイサからも攻撃されてしまう。戦いの末に満身創痍で倒れたラブはレイサに拘束され、暗い倉庫へと連行された。そこで待ち受けていたのは、バッテリーを手に無表情で佇む三人。そして、ラブの悲鳴が倉庫に響き渡る――"
317219623 = "良いことをする資格"
1854592249 = "倉庫に連行されたラブは、スズミたちに尋問される。しかし、彼女たちの目的は遊園地で出回っているパチモンを流した犯人逮捕であり、テロ行為ではないことが判明。勘違いを詫びたスズミは、お詫びとして犯人逮捕への協力を申し出る。自警団、図書委員会、ヘルメット団による奇妙な共同戦線が張られることになった。"
2385994890 = "最初で最後のチャンス"
3188488956 = "スズミたちは、不良品を売る怪しげな商人をステージ近くで発見する。声をかけられた商人は即座に逃走を図るが、レイサの射撃で阻止されてしまう。正体を現したミライは仲間を呼び、ショーの最終演目と勘違いした観客が見守る中、自警団、ヘルメット団、そしてミライ率いる疑似科学部の決戦が始まる……！"
2892796202 = "フィナーレ"
2443811802 = "広場まで逃げたミライを追い詰めるスズミ。正義実現委員会に馴染めなかった過去を明かし、「スケバンも同然」と自嘲するものの、「誰かを守れるだけで十分」とスズミは自分なりの正義を宣言する。最後は仲間たちとの連携でミライを捕らえ、事件は幕を閉じるのだった。"
1899721295 = "お元気ですか？"
2828168073 = "事件後、魔法少女たちの活躍はニュースで報道され、スズミたち三人はすっかり意気投合していた。パトロール中、焼肉帰りのラブたちと遭遇したスズミは、改めて協力への感謝を伝える。和やかな雰囲気だったが、ラブが投げた空き缶がゴミ箱を外れたのを見たスズミは、それを拾って捨てるよう注意。再び一触即発の雰囲気に……。"
1768186388 = "未来は明るい"
163172869 = "スズミたちに敗れ、遊園地の池に落下したミライ。爆発で商品を全て失い、おまけに愛用のゲルマニウムブレスレットまで切れてしまう。絶望の淵に立たされるが、ブレスレットがまるで身代わりになってくれたかのように感じたミライは、これを新たな商機と捉え、たくましく立ち上がるのだった。"
2099317968 = "ヘルメット団ブルース"
694429975 = "遊園地での行商人逮捕の依頼を受けたラブたち。しかし、応援に来るはずのヘルメット団が道中で襲撃され、チケットを受け取れなくなってしまう。ラブは機転を利かせ、臨時休館中の動物園からの侵入を試みるが、そこはワニの檻の中だった。待ち受けていた本物のワニに、ラブたちの悲鳴が響き渡るのだった。"
4008169269 = "悪の幹部、誕生"
231764874 = "潜入任務が決まった夜、シミコは図書館で魔法少女について徹夜で研究し、悪の幹部「エラ」になりきるための準備をしていた。その常軌を逸した様子を偶然目撃したウイは、心配するあまり彼女を止めようとする。しかし、最後は自作の衣装を身にまとったシミコの迫真の演技に気圧され、気絶してしまうのだった。"
3079877914 = "事件が解決し、それぞれが変化を胸に日常へと帰っていく。"
4070451962 = "計画は失敗し、湖へ吹き飛ばされたミライ。だが、失敗は新たな商機への架け橋だ。"
2531513792 = "ジャブジャブヘルメット団とラブは遊園地のイベントに向け準備を進める。万全の計画……のはずだった。"
1456231187 = "悪の幹部になりきるべく最善を尽くすシミコ。そんな彼女を、密かに見守る「魔術師」がいた。"
392103132 = "冬空の文芸復興～健全なる文化の交流について～"
716784848 = "知識解放戦線から本の委託を請け負った出版部。レッドウィンター内では売れない本の新たな販路を拓くべく、彼女たちは一路トリニティへと向かったのだった。"
3561465831 = "No Risk, No Return."
455454674 = "観賞用・保存用・布教用"
2319141675 = "本を大切に"
107272528 = "確定申告"
821735451 = "Covert Ops"
79574849 = "冬の国の公女様"
1749892251 = "誰もいない場所"
856774448 = "One Last Chance"
715814693 = "古書館戦争"
3920895348 = "リバー・ランズ・スルー・イット"
3271972537 = "No Risk, No Return."
774262240 = "給食所の工事の影響で倒れてしまった知識解放戦線。彼女たちに手を差し伸べた出版部は、本の委託を請け負い、知識解放戦線の代わりに新たな販路を拓くべくトリニティへと向かったのだった。"
3895910746 = "観賞用・保存用・布教用"
3706272456 = "知識解放戦線の本はトリニティのお嬢様たちには少々刺激の強いものだった。物語に夢中となったお嬢様たちに、観賞用・保存用・布教用で３冊購入することを推奨し、口コミで広めてもらうことに。そうして、彼女たちの本は静かにトリニティで広まっていく。その噂はティーパーティーのナギサの耳にも届くのだった。"
51224899 = "本を大切に"
791447976 = "出版部が頒布している本が、暗に逸脱行為を扇動していると判断したナギサは、先生と図書委員会のシミコに事態の調査を依頼するのだった。"
404086332 = "確定申告"
744362128 = "初日の売上を精算し、その額に驚く出版部と知識解放戦線一同。翌日からの頒布に気合いをいれる一方で、先生とシミコは正義実現委員会のマシロと合流し、調査をはじめていた。"
1429154297 = "Covert Ops"
1460894748 = "翌日、いつものように頒布を開始しようとした出版部の二人を、トリニティの生徒が呼び止める。なんでも、正義実現委員会の調査対象になってしまったのだとか。彼女たちの目をかいくぐって頒布を続ける手段を得た出版部たちは、秘密の即売会を開くのだった。"
2274946455 = "冬の国の公女様"
403795676 = "即売会が盛況な一方、出版部は新たな頒布物を用意しなければならないと頭を悩ませていた。購入していった生徒から続きの企画書をもらい、メルに発注することで続編の確保をする。一方、先生一行は捜査に難航していた。"
2346952575 = "誰もいない場所"
3617300838 = "正義実現委員会の包囲網が広くなり、頒布場所の確保に難航する出版部一同。二人がたどり着いたのはトリニティの古書館で……どうにも行き詰まってしまったタカネは、先生に連絡をとるのだった。"
2347443494 = "One Last Chance"
2918157071 = "先生はタカネたちに呼び出され、古書館へとやってくる。そうして、彼女たちの話を聞いた後、この一件を終わらせるよう提案する。しかし、時既に遅く、正義実現委員会が古書館へとやってきたのだった。"
3039664793 = "古書館戦争"
1767269131 = "古書館に集結した一同は、各々の役目を果たすべく銃を向け合うのだった。"
2905181237 = "リバー・ランズ・スルー・イット"
1627424892 = "先生の仲裁により、レッドウィンターとトリニティの間で文化交流協定が結ばれることとなり、出版部はお咎めなしとなったのだった。"
2624700207 = "不忍ノ道～ファッションショー警護任務！の巻～"
3713943962 = "思わぬきっかけでファッションモデルデビューすることになったツクヨ。そのせいで忍術研究部の活動が疎かになり、部の空気にも少しずつ変化が……。"
