3774576463 = "Ex: A Caça às \"Lores\""# Título e sua descrição abaixo:
561204670 = "Fenômenos Singulares Anômalos: o \"Lore\".#nUm fenômeno singular anômalo de origem desconhecida que começou a surgir por toda Kivotos.#nSerá que o Esquadrão FOX conseguirá resgatar as alunas desaparecidas#ne recuperar \"os dias de paz?\""

# +++ +++ +++ Sinopse de inicio dos capítulos: +++ +++ +++
2425389763 = "A Miragem do Meio-Dia"# Capítulo 1 e sua descrição abaixo:
1157145156 = "Em dias tão quentes que a miragem sobe do chão#nCuidado com as atividades ao ar livre!#nE, mesmo que você aviste um \"Espantalho Branco\" se contorcendo no meio da rua……#nJamais olhe diretamente para ele……"

3065626693 = "O Que Espreita Dentro do Tambor de Aço"# Capítulo 2 e sua descrição abaixo:
237435633 = "A lenda urbana de um caranguejo gigante#nque devora absolutamente qualquer coisa que esteja em seu caminho#nSe, à noite, você ouvir um som de eco metálico de um tambor rolando junto com o estalar de pinças#nnão hesite. Apenas corra pela sua vida."

