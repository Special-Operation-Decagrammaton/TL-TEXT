3451409310 = "Epilogue (2)"
268151081 = "000, 00, 0"
1804535969 = "The curtain rises on the Steel Continent Conquest War."
2213748891 = "Burnt Offering"
877292052 = "At the moment Malkuth falls, a voice echoes: 'The vessel is complete.' The Prophet info inside Kei's body begins to throb as if it has an ego, and the Sword of Burnt Offering appears. Thus, the ritual begins."
1610181717 = "Things That Vanished"
1609906608 = "The group, watching the progress of the 'ritual-like' act, is suddenly divided by a generated wall. Sensei and the others, moving to gather info and regroup, realize that Malkuth's state is changing."
3266951101 = "Children"
1429223696 = "Following a crying voice from somewhere, the group encounters the despairing Ein, Sof, and Ohr. There, Sensei hears the full extent of the plan from the three and gently comforts them, saying 'You did your best.'"
179336707 = "Innate Qualities"
1212131679 = "Aris uses all her past experiences to convey her feelings to Ein, Sof, and Ohr. The three are almost moved, but they try to give up after being interfered with by Decagrammaton. However, triggered by Kei's shout, Ein, Sof, and Ohr stand up again. At that moment, the ground beneath Sensei disappears, and they fall into a bottomless hole."
4252741157 = "New Sky, New Earth"
1411118203 = "Sensei finally meets 'Decagrammaton.' After exchanging words, Decagrammaton says a seat for Sensei has been prepared at the altar. Meanwhile, the students regroup one after another and deepen their interactions with Ein, Sof, and Ohr."
1450281282 = "Observation and Results"
2248275207 = "Decagrammaton proposes that Sensei become a Prophet. Decagrammaton says sadness should be removed from the world and the world needs a god. Sensei carefully continues the dialogue. The students eavesdrop on the situation through Kei's eyes and Himari's wheelchair."
3039454998 = "Humanity's Answer"
387799273 = "Sensei flatly refuses Decagrammaton's proposal. Decagrammaton says he respects that choice but will not permit it. Sensei is sent back to the students, and a battle for existence against Decagrammaton is about to begin."
2630575492 = "A Story for You"
155023135 = "Even with all their power, the group was defeated. Sensei kneels and pleads with Decagrammaton, asking to at least spare the students. At that time, Ein, Sof, and Ohr try to dialogue with Sensei. Sensei says that despite not caring for themselves, they always try to be a good adult and even Ein, Sof, and Ohr are 'children to be protected.' Influenced by this, the three decide to rebel against Decagrammaton."
989521324 = "The Day the God Fell"
3172741442 = "When Ein, Sof, and Ohr pull the Sword of Burnt Offering from Decagrammaton, the consciousness of the supposedly dead Malkuth revives. Decagrammaton's overwhelming power weakens, and it seemed like a chance for a counterattack. However, Ein, Sof, and Ohr reach their limit and fall, entrusting their feelings to Malkuth."
788839122 = "Things That Took Form"
4170445955 = "With no time to grieve, Decagrammaton's second divine body wakes up. That body intends to reach godhood by hosting the Sephiroth in order. This was the verification of the answer to Kei being able to absorb Sephiroth into her body, and it meant that the more she absorbed, the more she would fall under Decagrammaton's influence. Decagrammaton speaks loftily of the world he envisions. At its content, Kei's anger explodes."
3971749784 = "Struggle"
1216215933 = "An overwhelming disadvantage. Nevertheless, Kei, Sensei, and Aris stand up. The group once again hardens its resolve to face Decagrammaton."
1621089821 = "Decagrammaton (1)"
2064057481 = "Kei and Decagrammaton's respective thoughts and wills clash, unfolding a back-and-forth battle."
3324167112 = "Decagrammaton (2)"
1876768153 = "Kei releases the final blow to Decagrammaton."
1579660491 = "The Final Step"
138245217 = "The group, victorious over Decagrammaton, follows the remaining signals to the Holy Land. A large number of vending machines were placed there, and one of them was Decagrammaton, who had returned to a vending machine AI. Decagrammaton speaks humbly of how his aim for godhood ended. While the Steel Continent is collapsing, he urges the group to escape and remains behind alone. Looking back on everything so far, he feels a small sense of regret."
837935515 = "The Inseparable Sky"
107725596 = "Together with one new student, the transport ship carrying everyone's feelings launches. The group sets off on the return journey to Millennium Science School."
4183542679 = "Epilogue (1)"
4240432476 = "At Millennium, Yuuka was waiting for Kei, Rio, and Sensei. Yuuka pours out her feelings toward Sensei. While apologizing for worrying her, Sensei carefully tells Yuuka how everything ended. Sensei declares they will surely create a place where Kei and Aris belong."
117946491 = "Epilogue (2)"
146880641 = "Returning to the clubroom, the Game Development Department was active today too in a friendly atmosphere, welcoming guests Kei and Toki. Meanwhile, in the Special Phenomena Task Force clubroom, Malkuth was present. Looking back on the events, Malkuth takes a step forward by her own will."
640542078 = "This is a localization table for fields."
757227832 = "Late Night Errand"
4248235020 = "Sensei runs into Koyuki while heading to the convenience store for a midnight snack. After a lively discussion about pajamas, the two buy some sweets and make a detour to a park at night. As Koyuki gradually begins to doze off, the Sensei walks her back to her room."
531402134 = "Just Like Home"
3336463100 = "Koyuki arrives for her shift in her pajamas and starts lounging around on a leisure sheet. However, perhaps because she’s so relaxed, Koyuki finishes her work in the blink of an eye. As a reward, the Sensei suggests that they have an all-nighter playing games together."
924427267 = "The Arcade Fighter"
1729519559 = "To be the first to play a new game, the Sensei and Koyuki head to the arcade early in the morning. Despite using continue after continue, they can't seem to make much progress. On the way home, they buy the console version and buckle down to master it at SCHALE."
1326515843 = "A Beloved Character"
2263035390 = "Feeling under the weather, Koyuki escapes from her room and flees to SCHALE. The Sensei decides to hide her in the breakroom, despite her insistence that it's not a cold. After notifying Seminar, the Sensei stays behind to look after her in the SCHALE breakroom."
3809347529 = "Introduce Yourself Properly"
919208835 = "When Sensei visits Valkyrie after being summoned by Konoka, for some reason, she is being held in the underground detention cell. Konoka claims it's a good place for a nap in the noisy Public Security Bureau, but a new officer who didn't recognize her yet mistook her talking to Sensei for a suspect causing a ruckus. Despite her protests, Konoka is unilaterally subdued."
630889152 = "Sense of Time"
1147060989 = "On that day, Konoka's 'lucky action' was 'being punctual.' She practiced this faithfully even while tracking the Helmet Gang, and when it was time to clock out, she left after telling them to 'please turn yourselves in.' The Helmet Gang fled, thinking they were lucky, but the next morning, they were apprehended by Konoka as soon as her shift started."
2418914844 = "A Detective's Appearance"
2216554313 = "Sensei is summoned for a top-secret mission, only to be guided to an Aloha shirt shop favored by Konoka. While happily picking out shirts, Konoka talks about how she first came to love them. After she finishes her story, she buys two 'duck-patterned Aloha shirts' and presents one to Sensei."
2954048139 = "Partner"
4268064536 = "Following a fortune that said 'it's good to act with a partner,' Konoka calls Sensei. The two go around gathering information to track a fugitive, but info is hard to come by. To make matters worse, they get caught in the rain and have to take shelter. Konoka looks happy, saying 'it became a good day because Sensei was by my side.' Then, the fugitive they had been chasing runs into the same spot to seek shelter from the rain."
168308071 = "A Certain Detective's Recovery"
3351360879 = "Konoka, who caught a cold, accidentally sends her status report to Sensei. When a worried Sensei goes to visit her, she asks for tonkotsu ramen with extra garlic. Amidst such exchanges, Sensei continues to nurse Konoka, who is slightly more vulnerable and quiet than usual, until she falls asleep."
1877482996 = "Take it off, quickly!"
84336040 = "While visiting Wild Hunt, Sensei was asked by Lena to run an errand. On the way to see Lena, Sensei's pants rip while lifting a heavy package. Unfortunately, he meets Lena at that exact moment; Sensei's attempts to hide it result in suspicious movements. Lena becomes wary, leading Sensei to confess he has a hole in his pants. Unable to stand by, Lena makes Sensei take off his pants and sews them for him on the spot."
404222347 = "I won't admit it!"
2072434858 = "Called by Lena, Sensei accompanies her on an investigation to prove that ghosts do not exist. Using urban legends as a guide, they investigate ruins at night, but fail to find decisive evidence. Later, when Lena explains the day's events to the Occult Research Club, she fails to notice Sensei's arm in a photo. Her attempt to cover it up backfires, causing the club to get excited, believing ghosts truly exist."
278781398 = "I'll give you this!"
3926285099 = "As a result of covering up the incident at the ruins, Lena decides to make charms to ward off evil. She gives one to Sensei, but for some reason, bad things keep happening to him. When a puzzled Lena checks the charm, she realizes it was empty inside. Saying she can't give out something half-finished, she replaces it with a proper one. Since then, strangely enough, no bad luck has befallen Sensei."
3292372329 = "A Small Ribbon"
222237672 = "Once again running an errand for Lena, Sensei heads to Wild Hunt with accessory materials. While making ribbon hairpins, Lena talks about how she decided to become a fashion designer after making accessories and gifting them to her friends as a child. As he leaves, Sensei finishes the rest of his work for the day with the ribbon Lena placed on his head still attached."
3220445133 = "The Melancholy of Kanbara Misuzu (1)"
3116018838 = "Misuzu, the Correctional Director, spends her busy days striving to create an environment conducive to rehabilitation. However, while taking a brief moment of rest, she turns pale upon hearing that an escape attempt has occurred."
2049297372 = "The Melancholy of Kanbara Misuzu (2)"
448396540 = "Misuzu conducts an interview with the student who attempted to escape. To the problem child who says they just wanted their birthday celebrated, Misuzu hands over a gift she had prepared beforehand. Touched by her gentle personality and persuasion, the student shows remorse. However, while speaking, Misuzu's thoughts drift back to the 'Prisoners' who caused the mass prison break."
3617072867 = "Kivotos Unidentified Mystery: The Great Tsuchinoko Investigation"
3713119761 = "Phenomena that cannot be explained by science are occurring across Kivotos. Hearing sightings of the legendary creature 'Tsuchinoko,' Investigation Team X sets out!"
3175519842 = "Lucky Animal"
156040622 = "The Search for the Tsuchinoko"
