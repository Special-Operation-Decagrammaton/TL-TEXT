2273210620 = "月影祭"
1432978810 = "祭りの準備"
3381388658 = "伝統行事「月影祭」に招待され、山海経を訪れた先生はミナ、キサキと再会する。昨今の不穏な空気を憂慮する生徒たちをよそに、キサキはいつもどおり月影祭を催行する意志を示すのだった。"
2580264648 = "異変"
3308870116 = "京劇部の一件でざわつく月影祭の準備会場にて、突如玄武商会のメンバーを中心に、生徒が幼くなる謎の現象が発生する。この「若返り現象」と同時に、記録を抹消されたはずの「申谷カイ」に関する噂も山海経全域へと広まっていく。"
340163993 = "噂"
1199490648 = "申谷カイの噂と若返り現象は広まり続け止められそうにない。問題の早期解決が難しいと判断したキサキは、月影祭の開催を限定的なものにする裁決を下す。一方、先生も情報収集のためシュンと連絡をとる。すると事情を察した彼女は「シュエリン」の姿で、キサキと先生の前に現れたのだった。"
346243017 = "大人と子供、子供、子供。"
1439490319 = "シュンの発案で梅花園の園児に扮して、山海経のあちこちで情報収集を始めるキサキたち。梅花園で若返り現象の影響を受けてしまったルミと会話する中で、敵の狙いは会長・サヤが不在の錬丹術研究会であることに気づく。"
3259478954 = "過去と今の境界線（１）"
1087028543 = "サヤが不在の隙をついて錬丹術研究会へと帰還した申谷カイは、隠された研究室へと向かう。一方、襲撃を察知したキサキの指示でレイジョとミナが駆けつけたものの、そこにはブラックマーケットの傭兵が待ち構えており……。"
3790867855 = "過去と今の境界線（２）"
3280896799 = "錬丹術研究会を掌握した申谷カイは、さっそく「仙丹」を作り上げた。早速服用したカイは、全身にみなぎる活力を感じながら怪しげに笑うのだった。"
796406391 = "君の世界との交差点（１）"
1029900945 = "あまりに多い敵を前に苦戦するレイジョとミナであったが、玄龍門の構成員を引き連れたキサキに窮地を救われた。しかし一行の前に、今度は申谷カイが立ちはだかる。"
696443017 = "君の世界との交差点（２）"
1392877054 = "仙丹の力を得た申谷カイの力を前に、一行は敗走を余儀なくされた。カイは弱ったキサキに追い打ちをかけるように、玄龍門の構成員や山海経の生徒たちの不安を煽りたてる。先生の機転で最悪の事態は回避するものの形勢は悪く、キサキたちはその場を逃げざるを得なかった。"
3263544419 = "遠い未来の私たち"
1073117875 = "キサキを打倒したものの玄龍門の内情には興味がない申谷カイは、仙丹の研究に注力し始めた。一方、玄龍門では強硬派が台頭しており、キサキの代わりに京劇部の部長・カグヤを臨時の門主に擁立しようとする。話を持ち掛けられたカグヤは就任を断るものの、目下の問題の解決に向けて協力することを約束しつつ、門主の責任を一人背負っていたキサキに思いを馳せる。"
3966918864 = "そこに行けば麒麟に会えるだろうか。"
2951348541 = "先生は玄武商会に身を寄せていたキサキと過去の出来事や彼女の真意について語らう。その中でキサキは己のなすべきことを見出し、月影祭を必ず開催すると宣言する。そこへ玄龍門の穏健派構成員がやってきて、改めて彼女に忠誠を誓うのだった。"
2498708804 = "幾度道を違えたとしても（１）"
700229668 = "玄龍門へ帰還しようとするキサキと再び相まみえたカグヤ。守るべき伝統について改めて意見を交わす中で、キサキの言が道理に適っていると理解し、カグヤは自らを倒すことで正しさを証明し、山海経に秩序と伝統を取り戻してほしいと願う。"
2594409892 = "幾度道を違えたとしても（２）"
2075309196 = "カグヤを倒したキサキは六和閣の奪回を部下に命じると同時に、ミナを伴って地下牢へと向かう。"
2475868789 = "すべての面倒事を（１）"
2762014940 = "錬丹術研究会に挑む前にサヤを釈放するため、キサキたちは地下牢へと向かった。しかし申谷カイの要請や若返り現象を防ぐ薬の供給を止められる恐れから、看守はサヤの解放を拒む。そこでキサキは自身がすべての責任を負うことを宣言し、釈放の強制執行を試みる。"
1430381554 = "すべての面倒事を（２）"
3646071198 = "無事にサヤを釈放したキサキは、味方を引き連れ錬丹術研究会へと向かう。体調を気遣うサヤに対して、キサキは含みのある笑顔を見せる。"
4179327947 = "同じ空の下で（１）"
758416301 = "改めて申谷カイと相対したキサキ。言葉を交わす中、責任を他人に押し付け続けるカイに対し、キサキはかつての追放も含め全てが自業自得であることを突きつける。怒りを覚えつつ挑発を続けるカイに、キサキは玄龍門の門主として再び戦いを挑む。"
1290862584 = "同じ空の下で（２）"
1184003556 = "自身の引き起こした若返り現象が仇となって、カイはキサキに敗北する。キサキの態度を非難しつつも、先生へ投げかけた質問に対する回答に機嫌を良くしたカイは、若返り現象の収拾と矯正局への再収監を素直に受け入れたのであった。"
3621474916 = "月影祭"
68319105 = "若返り現象は無事収拾し、月影祭も予定どおり例年と同じ形で開催される運びとなった。レイジョや何度も連絡してくるキサキ、それに楽しげに笑う生徒たちと共に、先生は月影祭を満喫する。"
