1785377399 = "立場と行動"
94467447 = "惑い"
3034314177 = "ビッグシスタールーム"
2896285071 = "エピローグ"
2617236212 = "スポンサー"
2211329413 = "ミレニアムEXPO"
826114810 = "ミレニアムに到着した先生とセイア。モノレールからの降り際、ミレニアムEXPOへの参加が「自身に課す試練」なのだと、セイアは告げる。"
2270762698 = "自身の証明"
614054421 = "ミレニアムEXPOの一週間前、誰が代表として参加するのか、ティーパーティーの議論は白熱していた。呼び出しを受けてティーパーティーを訪れた先生は、どちらも譲らないナギサとセイアの仲裁に入る。先生はセイアの肩を持ち、先生の判断だからとナギサは納得する。ミレニアムEXPOでの役割を果たすことで、自身の証明をしようと、セイアはその決意を新たにした。"
2615717981 = "役割分担"
966992115 = "リオからの密命を帯びてミレニアムEXPOの会場に戻ったセイア。再度合流したアスナとカリンと一緒に、会場の見学に出発する。"
1651300646 = "リオの不安"
3047208423 = "セイアが出発した後、リオは抱いている不安をネルに吐露する。どこか不安定に思われるセイアの心情をリオは懸念していた。ネルとの会話を通して、セイアの助力は受けるが、必須の戦力とは考えない、とリオは思考に決着をつける。リオの指示を受け、ネルはミレニアムデータセンターに向かった。"
3737727283 = "立場と行動"
2960679824 = "調査の末に突き止めた現場に乗り込もうとするセイア。しかし戦闘の危険を伴うという理由から、リオはその役目をネルに任せて、セイアには別の場所の調査に向かうよう指示する。反論するセイアだが、リオの意志は固い。セイアは不承不承ながら、他の場所を調査するために隠れ家を後にする。"
1973363221 = "惑い"
1788642461 = "隠れ家に残されたリオとネルの二人。自分のせいでセイアが気分を害したのではないかと心配するリオ。ネルはそんなリオに対して、彼女なりの返答をするのであった。"
1845854326 = "ビッグシスタールーム"
2491819470 = "ビッグシスターアルゴリズムを作ったことを自身の過ちと考えるリオは、一人で作戦遂行すべきと考え、ネルとセイアに帰るよう促す。しかしリオに潜入作戦は向かないとして反対する二人は、リオではなく自分たちが向かうと主張する。議論の中で、リオは二人の提案に押し切られるのだった。"
492942250 = "エピローグ"
977105104 = "C&Cの活躍もあり、ビッグシスターアルゴリズムを巡る騒動は収束した。一同は談笑に花を咲かせるが、その場にリオの姿はない。隠れ家へと向かったセイアとネルは、帰り支度を進めるリオに、今しばらく残るようお願いする。リオは、ミレニアムEXPOが終わるまでミレニアムに留まることを約束するのだった。"
728313164 = "スポンサー"
2490396437 = "ヴァルキューレの車両に乗せられ、どこかへと搬送されるミライとヘルメット団。スポンサーに見捨てられたと諦めるミライだったが、突然どこからか声が聞こえてくる。車両が停車しドアが開かれると、そこにはニヤニヤ教授が立っており、助けに来たと言う。自分は失敗したと言うミライに、目的は果たしてくれたと返すニヤニヤ教授。けれどその目的が何だったのかを告げることはなく、ニヤニヤ教授は去っていった。"
1279191940 = "パンデミック・ハザード～奇跡の一枚～"
2106905354 = "アルバイト中、パンケーキを焼くことになったジュリ。完成したのは、なんと美味しそうなパンケーキ！だったのだが――そんな中で、「ヤツ」は目を覚ました。次々と「ヤツ」に襲われる生徒たち……これは奇跡か、それとも惨劇か……！"
3711924081 = "誰かの休日は誰かの平日"
1446345759 = "奇跡のような"
3991708446 = "フラグ"
2356581167 = "バイオハザード"
2308652662 = "リリー・マルレーン"
2759745130 = "WHAT A LOVELY DAY（１）"
1173289198 = "WHAT A LOVELY DAY（２）"
4142229945 = "やるべきこと"
2379566356 = "LAST GIRL STANDING"
1472761916 = "結実"
2628755669 = "誰かの休日は誰かの平日"
2401042016 = "給食部に貴重な休日が訪れたある日。フウカは外出先で、ウェイトレス姿でバイトに励むジュリと出会う。ジュリは、いつもフウカに頼りきりではいけないと考え、バイトに挑戦していたのだ。……そんな勤務中、客のゲヘナ生徒のこぼした火薬が原因で爆発事故が発生し、カフェの調理師が倒れてしまう。オーダーの遅れに苦情が飛ぶ中で、店長はジュリにパンケーキ作りを依頼。恐る恐るパンケーキを焼くジュリだったが、完成したのは意外にも普通のパンケーキで……。"
3150536489 = "奇跡のような"
364471861 = "ジュリが作ったパンケーキを客に出す店長。ジュリの不安に対して、客からも好評の声が上がる。ほっと胸をなで下ろし、どんどんパンケーキを焼いていくジュリだったが――その過程でパンちゃんが誕生してしまい、店内は大パニックに。さらに騒動の中で、パンちゃんが店外へと飛び出してしまう。状況を知った先生は、風紀委員会へと連絡を取り、フウカと共に現場へ急行する。一方、連絡を受けたイオリは「モンスターでも現れない限り、大したことない」と言い、チナツと共に出動するのだった……。"
1048397348 = "フラグ"
166512155 = "現場の状況を聞いたイオリは、一瞬給食部のテロを疑うが、チナツに諭されて認識を改め、「この程度なら私一人で対応できる」と、単身現場に突入していくのだった。チナツがジュリに事情聴取し、故意ではなく事故と確認するが……気付けば、イオリからの連絡が途絶えていた。捜索に出ると粘液まみれのイオリが発見され、チナツは念の為に医療の専門家こと、非番のセナを呼び出す。セナは、イオリについて命に別状はなく、粘液――ソースが口に合わなかっただけと診断し、早速搬送の手配をするのだった。"
2850214829 = "バイオハザード"
1853896861 = "現場の状況を聞いたセナは、好奇心を刺激されたこともあり、積極的にパンちゃんの調査へと参加することに。一行は、痕跡を追跡する中で粘液まみれのゲヘナ生と遭遇する。そのゲヘナ生は「変な音が聞こえて、様子を見に行ったら……」と語ると、先生とセナはその流れをお約束の展開――「フラグ」だ！と反応する。足取りを追うと、粘液の量と強度が増していることから、パンちゃんが成長していると推測するセナ。深刻な状況を鑑みて、チナツはアコに連絡を取るのだった。"
2175847726 = "リリー・マルレーン"
3971352790 = "自分が呼び出された理由が「家出したパンケーキ」と聞いて、三徹目のアコは困惑を隠せない。半信半疑のアコに対して、先生はセナが撮影した粘液塗れのゲヘナ生徒たちの写真を送った。先生とセナの言い分を信じたアコは、88ミリFlak36の対空砲を準備する。[ruby=パンデモニウム・ソサエティー]万魔殿[/ruby]がどう動くか……という危惧はありつつ、事態がどう転ぼうとこの程度は日常茶飯事と語るセナは、冷静そのもの。一行はアコの要請により、パンケーキの行方を再度追跡することに。"
454321563 = "WHAT A LOVELY DAY（１）"
3987130169 = "追跡を続けると、ある地点から粘液が途絶え、代わりに倒れている生徒が増えていた。セナは倒れているゲヘナ生徒に銃弾を撃ち込んで起こして事情を聞くが、その生徒は錯乱しており、わけのわからないことを叫ぶばかり。そのとき、巨大な振動と音が響き……。"
3792547223 = "WHAT A LOVELY DAY（２）"
2273649963 = "一行は市街地に現れた巨大化したパンちゃんを目撃する。そう、パンちゃんは――成長期だったのだ。"
1682284240 = "やるべきこと"
2094272827 = "巨大なパンちゃんに対して、アコは88ミリFlak36対空砲を発射しようとするが、パンちゃんの想定以上の素早さに照準が追いつかない。そんなとき、パンちゃんの触手がアコの足首を掴み、さらには触手を口に突っ込まれてしまう事態に。そのとき、ジュリが「私に任せてください」と言い、パンちゃんに一人向かっていく。それを見たフウカは思わず「それ、死亡フラグだから！」と叫ぶのだった。"
71107535 = "LAST GIRL STANDING"
12472440 = "単身パンちゃんの前に飛び出したジュリ。ジュリは触手に捕らえられるが、それと引き換えにパンちゃんの動きを止めることに成功する。だが、砲撃の権限を持つアコは気絶しており、指示を出せる者はいない。そのとき、ヒナから通信が入り、指揮権がアコから先生へと委譲される。先生の指揮の下、一斉砲撃を行なう砲撃隊。それによってパンちゃんの動きが鈍り、一行はパンちゃんにトドメを刺すべく、最後の戦いへと臨む……！"
1375140572 = "結実"
3221535166 = "パンちゃんを撃破した一行。ジュリと粘液まみれで気絶していたアコは無事救出され、元のサイズに戻ったパンちゃんをフウカがゴミ箱に廃棄したことで事件は幕を閉じた。――数日後、いつものように多忙な一日を乗り切ったジュリとフウカの元へ、先生がジュースを差し入れに訪れる。そのとき、ジュリはおずおずとお菓子の用意があると言う。事件の後、ジュリはカフェで教わりながら練習を重ね、立派なパンケーキを作ったのだ。ジュースと共にジュリの真心と愛情が込められたパンケーキを食べ、三人は楽しい一時を過ごすのだった。"
3266279677 = "プレイボール！ ～目指せ！満塁ホームラン～"
2443808906 = "野球観戦のために球場を訪れたレイ、スミレ、そして先生。だが試合の雲行きは怪しく、さらにはスタジアム全体に陰謀の影が迫る……！"
796819123 = "伝統と歴史"
