3324167112 = "Decagrammaton (2)"
1876768153 = "Kei delivers the final blow to the Decagrammaton."
3599070940 = "Wriggle Wriggle"
1780733194 = "Rumors about \"Wriggle Wriggle\" begin to whisper among the students of Kivotos."
3350929154 = "Between Superhuman and Fox"
4268210737 = "FOX Platoon spends their days in the Correctional Bureau. Yukino is still troubled by her past actions. At that time, Yukino is called by the Director of the Correctional Bureau and meets with the General Student Council President. While coordinating events during their disappearance, the General Student Council President asks Yukino, who desires an opportunity to restore her honor, to investigate Roa."
1745364049 = "The Platoon Marches After Filling Their Stomachs"
2002791633 = "For the investigation of Roa, FOX Platoon decides to cooperate with Sensei. Before the operation, FOX Platoon reunites with Sensei at a high-end yakiniku restaurant. FOX Platoon suspects Sensei's true intentions as he just tries to feed them. However, they gradually open their hearts to Sensei's straightforward responses."
1500063239 = "New Base"
3830197242 = "For FOX Platoon, who cannot move openly, Sensei provides a corner of the basement of Schale as a base. It was also arranged by the General Student Council President. FOX Platoon prepares it as their HQ and begins the operation."
3890647442 = "Inquiries"
462822871 = "FOX Platoon, who went out into the city, begins gathering information using victims who lost consciousness after witnessing the \"white scarecrow\" as clues. Niko, disguised as a part-timer, approaches the Gehenna Track and Field Club to ask about the victims, but fails. However, she obtains important information from Erika, who was watching from the side."
1210340112 = "Truth and Lies"
2755602640 = "FOX Platoon proceeds with their reasoning based on the gathered information. However, there is still not enough evidence, and they have not reached a conviction. Keeping in mind that the culprit might be a ghost rather than a citizen, they decide to conduct further information gathering."
2620890405 = "Shadow Running on the Highway"
1869455062 = "FOX Platoon continues their investigation in various places. Although they gather once to compare information, they have not achieved any notable results. When they are prepared for further investigation, the group encounters Natsuki, who was pulling a rickshaw on the highway. And they hear the urban legend of \"Wriggle Wriggle\" that is spreading in Hyakkiyako."
1289441933 = "From Beyond the Heat Haze"
1473250037 = "FOX Platoon, having grasped a clue, was waiting for the heat haze to rise. When the heat haze finally rose, Otogi, who was observing, became enchanted by Wriggle Wriggle and fell into a state of confusion. With Kurumi's handling, Otogi barely regains her sanity. However, the bullet Otogi fired while confused disappears without a trace for some reason."
2449096511 = "Clues"
1411259920 = "FOX Platoon forms a hypothesis on the conditions for the occurrence of \"Wriggle Wriggle\" and how to deal with it, based on Otogi's state after being enchanted while observing the heat haze and the bullet that disappeared even though she definitely fired it. They prepare equipment that can be a countermeasure and begin moving in earnest toward subjugation."
2338801941 = "Into the Darkness (1)"
2311301627 = "The place FOX Platoon chose to lure out Wriggle Wriggle was an underground passage where people do not enter. FOX Platoon wears night-vision goggles as a breakthrough for the problem of being enchanted when seeing \"Wriggle Wriggle.\" As they wait, \"Wriggle Wriggle\" appears, and the fox hunt begins."
1663922802 = "Into the Darkness (2)"
1425272534 = "The night-vision goggles worked effectively, and FOX Platoon succeeded in defeating Wriggle Wriggle. Where Wriggle Wriggle disappeared, a piece of glass that emitted a strange light and reflected some grassland was left behind. Yukino entrusts the glass piece to Sensei and decides to keep the information hidden from the General Student Council President. The hungry group heads to a celebration in high spirits."
768002174 = "Incomprehensible"
1409392123 = "FOX Platoon is visiting the General Student Council. The General Student Council President tells Yukino that the damage from Wriggle Wriggle is subsiding and praises the resolution of the mission. The three waiting outside happen to join up with Erika, and unlike the last time they were on an operation, this time they head to a cafe together as friends. On another day, the General Student Council President was meeting with Kaya. However, Kaya was also one of those who remembered the past General Student Council President."
2813820339 = "Incomprehensible"
738638449 = "FOX Platoon is visiting the General Student Council. The General Student Council President tells Yukino that the damage from Wriggle Wriggle is subsiding and praises the resolution of the mission. The three waiting outside happen to join up with Erika, and unlike the last time they were on an operation, this time they head to a cafe together as friends. On another day, the General Student Council President was meeting with Kaya. However, Kaya was also one of those who remembered the past General Student Council President."
173129466 = "Should I Not Take Revenge?"
570905695 = "Kenzaki Port in the middle of the night. A debtor was about to be put into a drum can."
1101320102 = "Crab-Flavored Fish Sausage"
4141877022 = "Niko, Kurumi, and Otogi were talking about the shrimp incident that RABBIT Platoon once solved while having a late dinner. Just as they were saying it would be nice if a similar incident happened with crabs, Yukino, who received a request regarding crabs, returns to HQ."
1336515377 = "Crab and Drum Can"
2780412479 = "Rumors of a giant crab that eats everything. FOX Platoon shows a negative view, saying it is not realistic. However, regardless of the truth of the rumors, they prepare to infiltrate the port to dispel the anxiety of the citizens."
2563787234 = "Crab Fisherman"
2808788758 = "Niko learns from a conversation with a fisherman that crab landings have increased in the last few months and prices have plummeted."
2971010417 = "Disappeared Sawdust Bag"
1660918464 = "Niko helps a worker who is in trouble because the sawdust bag is gone. When she finds it and reports it, she learns that wooden boxes and sawdust are used for packing crabs."
1494676020 = "Gourmet Road"
1067607850 = "To help shops in the shopping district that are in trouble due to a decrease in customers, Niko distributes flyers to advertise. Customers who were afraid of crab shells are also intrigued by Niko's call and start visiting the shops one after another."
3956832813 = "Flashback: Day 1"
2500079061 = "As a result of the investigation, it was found that the ghost story has almost no effect on actual life. However, psychological fear seemed to be spreading among the citizens. Since there is still not enough information to proceed with the reasoning, FOX Platoon prepares for the next operation."
4131045778 = "Record of a Certain Mystery"
24103466 = "Yukino visits the public library to research Perorodzilla. All related articles had been collected, but she gets a clue with the cooperation of Shimiko, whom she met by chance in the reading room."
2040570986 = "Disappeared Fisherman"
2968028731 = "Niko continues to gather information about the missing fisherman. An elderly fisherman said he must have run away from the harsh work, and a young fisherman said it might be due to debt."
714617311 = "Situation Confirmation"
1438816199 = "Niko, who discovered a freight station at Kenzaki Port, makes inquiries to the crew and learns of the existence of a commuter train that operates only in the early morning. Since it was confidential information, she could not see the boarding records, so she asks Kurumi to peek into the system via the traffic room."
2398972522 = "Carpaccio and Bullets"
605148683 = "Niko visits the Carpaccio Family to make inquiries, but is turned away. In the commercial area she visited instead, she hears disturbing rumors about the Carpaccio Family's loan sharking."
2108578455 = "Flashback: Day 2"
1569734950 = "As a result of the investigation, it was thought that the missing fisherman likely used the train to escape because he could not repay his debts. However, Yukino seems to feel something is off, and at Sensei's suggestion, FOX Platoon decides to conduct an additional investigation."
516333235 = "Public Notice of Regular Bidding"
105104110 = "FOX Platoon has breakfast at a cafeteria in Kenzaki Port. From a conversation with the owner, they learn that the Carpaccio Family, which is responsible for port security, is in a difficult situation before the re-bidding."
950626273 = "Fox and Lump of Meat"
2750021426 = "Niko, who arrived at Kenzaki Port in the middle of the night, infiltrates the Carpaccio Family's warehouse with the cooperation of Otogi and Kurumi."
1657414332 = "Search"
877460878 = "Niko finds something suspicious inside the warehouse. While proceeding with the investigation, she unfortunately encounters a member and is about to have her infiltration exposed. However, she uses her quick wit to overcome the crisis."
372206390 = "Flashback: Day 3"
1463926984 = "As a result of the investigation so far, it emerged that there is a plot by the Carpaccio Family behind the disappearance incident. To confirm the truth, FOX Platoon decides to storm in directly."
3430867049 = "SRT-Style Interrogation Method"
1540130814 = "FOX Platoon captures an executive of the Carpaccio Family and conducts an SRT-style interrogation. They succeed in getting a confession, and it turns out that the rumors were spread by the family to incite fear among the citizens. However, without a moment to catch their breath, a giant crab making a roaring sound begins to attack the port."
4070492427 = "Unchanging Value"
3578537993 = "FOX Platoon, who repelled the \"Drum Can Crab\" with skillful coordination, discovers a piece of glass like the one they found during the \"Wriggle Wriggle\" incident from the traces of the battle. Yukino entrusts it to Sensei, and it seemed the matter was settled, but they end up running around the port all night chasing the crabs that escaped in large numbers from the warehouse."
2781401687 = "Epilogue"
1017824045 = "Sensei hears the results of the investigation he requested from Rin. She says the glass piece is likely reflecting somewhere in Kivotos. Sensei then visits FOX Platoon's HQ, and they eat the crabs everyone received in large quantities together. Meanwhile, in the Library Committee, the vice-chair, who had been missing for a long time, had returned."
