2482562584 = "Verão. Um Lado Diferente."
2515631888 = "O Sensei é pego de surpresa com um convite da Kisaki de manhãzinha cedo para navegarem no famoso passeio de barco do desfiladeiro. O barquinho corta as águas cristalinas silenciosamente. Uma névoa matinal abraça o desfiladeiro recortado por montanhas majestosas. Envolvidos por uma paisagem digna dos domínios celestiais, os dois contemplam os rostos um do outro com carinho na memória."
2518541355 = "A Xuanlong Office descobre que a Genbu Express está fazendo negócios em terras estrangeiras. O clima esquenta e os princípios de Shanhaijing são colocados à prova, mas o Sensei intervém sugerindo uma viagem oficial de 'inspeção' ao próprio destino do investimento: a atração turística do desfiladeiro."
