1415972186 = "Um enorme parque aquático é inaugurado no verão. Para a segurança do local, a Academia de Polícia Valkyrie decide enviar salva-vidas. No entanto, a lista inclui nomes inesperados……"
3449128733 = "Salva-vidas, missão começa!"
2994107332 = "Quem colocou Kanna na lista de enviados ao parque aquático foi ninguém menos que a vice-diretora Konoka. Kirino, Fubuki e Kanna começam a missão de salva-vidas."
3825593352 = "Tobogã aquático, vou guiá-los!"
