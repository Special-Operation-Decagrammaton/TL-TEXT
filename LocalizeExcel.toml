2247335429 = "No início do ano"
3065827640 = "No Ano Novo, os membros da Empresa de Conveniência 68 decidem ir ao templo vestidos de quimono, também como estratégia de imagem. Com o objetivo de ir ao ponto de energia famoso por 'realizar desejos', a primeira missão do ano da Empresa de Conveniência 68 começa."
2222583121 = "No local visitado"
349816101 = "No 'Daikichiden' famoso, os membros da Empresa de Conveniência 68 encontram o Sensei do Schale e Serika, que trabalha meio período. Mal terminam a visita, atacantes inesperados chegam ao 'Daikichiden'."
1548857717 = "A confusão é sempre repentina"
78140412 = "Kaiten Rangers do Sushi Rotativo Infinito. Cinco heróis que buscam o romance e a rotação infinita travam batalhas diárias contra o mal, mas as atividades exigem muitos recursos. Diante dos Kaiten Rangers, que roubam a caixa de oferendas do 'Daikichiden' como fonte de fundos, vilões (?) se interpõem! Não percam, Kaiten Rangers!"
2724683777 = "Batalha de perseguição confusa! (1)"
