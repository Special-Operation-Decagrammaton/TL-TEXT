1243927570 = "Birth"
1589381619 = "Decalcomanie, staring at a telescreen in an old bar, gains a new realization during a conversation."
3168557994 = "Letter from the General Student Council President"
4191685078 = "With the help of the executives, Rin was performing her duties as the acting General Student Council President. While reflecting on the General Student Council President, Rin remembers a certain letter. Inside the envelope was a photo capturing the days of the General Student Council. However, one monochrome photo of a landscape Rin didn't recognize was mixed in."
3623875494 = "Strange Dream"
1715689698 = "When Sensei woke up at Schale, the anomaly had already begun. There were no signs of students, and Kivotos had lost its color, becoming monochrome. Arriving at the General Student Council President's office, Sensei meets a girl with a mysterious atmosphere. But before Sensei could ask who she was, an electronic sound awakened Sensei's consciousness, and a new day began again."
1888812381 = "Shining Trapezoid"
4098329356 = "The girls who were on a mission in the open ocean discovered a glass shard emitting a strange light."
4128684242 = "Chief Administrative Officer's Holiday (1)"
3255574769 = "The executives of the General Student Council were plotting to let Rin, who is always busy with work, take a break. Rin refused, saying she had no time to rest, but Aoi and the others had already taken steps ahead of time, and Rin reluctantly decided to enjoy the sudden short holiday. Sensei was chosen as Rin's chaperone for the holiday."
274943668 = "Chief Administrative Officer's Holiday (2)"
1711221830 = "Sensei enjoys the holiday touring D.U. with Rin. However, Rin is concerned about work everywhere she goes and brings up the General Student Council. Trying to change the subject, Sensei takes Rin to an arcade. Sensei challenges Rin, who says it's her first time, but she quickly gets the hang of it and Sensei is defeated. By playing the game, Rin remembers an acquaintance she hadn't seen in a while."
182317656 = "Queen's Gambit"
1354224060 = "Rin and Sensei visit the Correctional Bureau to see Kaya, who is imprisoned. Rin challenges Kaya, who seems unchanged, to a game of chess. While playing, they look back on the coup d'état, and Kaya talks about the \"Sharcade Staff\" she took from Schale at that time. In the end, it was just a smartwatch to Kaya, but according to the General Student Council President's records, it was said to have the ability to see the truth."
1861570067 = "Sky-Blue Nostalgia"
2238102298 = "After finishing the visit with Kaya, Rin returns to the General Student Council and discovers the \"Sharcade Staff\" in the warehouse. It looked like just a smartwatch housed in an Ark, but the moment Rin touched it, a small miracle occurred. When Rin regained consciousness at the sound of someone calling her, there was a blonde girl who called herself the General Student Council President."
1121617851 = "Memory Error"
3900724871 = "When she woke up from her sleep, an unknown girl called herself the General Student Council President. Rin thought it was a prank, but she was stunned that the General Student Council executives treated the girl as the General Student Council President. With memories of the \"General Student Council President\" erased from the world, Rin asks Sensei for help. Fortunately, Sensei, like Rin, recognized that she was a different person."
3528020198 = "Return of the Superman"
3251654458 = "The self-proclaimed General Student Council President and Sensei say they don't know about each other. Rin asks what she was doing while she was missing, but she says her memory is vague and she can't answer. The discussion goes in circles, and Sensei decides to watch the situation for now. Afterward, the self-proclaimed General Student Council President demonstrates outstanding ability and resolves problems all over Kivotos one after another. The atmosphere that it was good that the General Student Council President had returned was spreading."
4150457986 = "Pairing"
3940272632 = "Plana talks to Sensei after leaving the General Student Council. She says that since she doesn't recognize her or Arona, she is a fake. Seeking a clue to solve the situation, Arona and Plana try to pair with the \"Sharcade Staff,\" and the connection is successfully established, unlocking new functions in the \"Shittem Box.\" At that moment, Plana senses someone tailing them, and when Sensei turns around, Rin was following from behind."
562672561 = "Virtual Image and Inference"
1001704649 = "Rin and Sensei go out into the city to find someone who remembers the former General Student Council President. Although they repeat their inquiries, they couldn't find anyone who remembered. At that time, they get valuable information from Mai, whom they met by chance."
4291342361 = "Good Evening, Mr. Orwell"
2194592478 = "Rin and Sensei visit an old bar. Decalcomanie was there. While looking back on what the members of Geomatria have attempted, the new head says that \"media\" is the power that defines the new era. After the talk, the new head calls himself Orwell."
68071874 = "Masquerade"
2049815982 = "Orwell presents media as a means to solve what is happening in Kivotos now. Sensei is skeptical about the claim that media can distinguish the real from the fake, but with no clues, he decides to follow Orwell's proposal for now."
3812863199 = "Lucky Charm"
3890514637 = "When Sensei visits the scene after being called by Asuna, a fierce battle was unfolding. Asuna suppressed it easily, but she realizes that she had lost the ribbon she cherished. Showing the blue ribbon that was fortunately found, Asuna says it is a symbol of luck for her. She laughs, saying she will cherish it from now on so she doesn't lose it again."
1771630708 = "Claymore, Claymore, Claymore!"
279334293 = "Moe and Sensei talk about how she hasn't been exercising lately. With a smile of determination, what Moe takes out is... A launcher?"
1489758999 = "Warm Tone"
3457523314 = "Sensei takes Kazusa, who says there is an LP record she wants to listen to, to the audio room. What Kazusa took out was a one-of-a-kind LP record made as a memory. As they were enjoying the conversation while listening to Sugar Rush's performance, the song switched and Sensei's singing voice flowed out. It was from when they went to karaoke together. For Kazusa, it was a precious memory she wanted to keep."
11208201 = "Proof of Hard Work?"
2323993205 = "Kirara, who lost her ring notebook, was frantically rummaging through the waste paper warehouse. She said that the one she had put outside while cleaning her room was accidentally collected. The notebook Sensei found was beautifully decorated, and Kirara's precious memories were written in it. When Sensei points out the caricature drawn on a page that caught his eye, Kirara runs away with the notebook."
3809347529 = "Introduce Yourself Politely"
919208835 = "When Sensei visits Valkyrie after being called by Konoka, for some reason, she was detained in the underground detention center. Konoka says it's a good place for a nap in the noisy Public Safety Bureau, but a new officer who didn't recognize Konoka yet mistakes the suspect for making noise while talking to Sensei. Despite her explanation, Konoka is unilaterally suppressed."
630889152 = "Sense of Time"
1147060989 = "For Konoka that day, \"keeping time\" was a lucky action. She faithfully practiced it while tracking the Helmet Gang, and when it was time to get off work, she left saying \"turn yourself in\" and went home. The Helmet Gang escaped, but the next day, they were secured by Konoka at the start of work."
2418914844 = "Detective's Grooming"
2216554313 = "Sensei, who was called in as top secret, was guided to an Aloha shirt shop that Konoka favors. While happily choosing an Aloha shirt, Konoka begins to talk about how she came to like Aloha shirts. After finishing her story, Konoka, who bought two \"duck-patterned Aloha shirts,\" gives one of them to Sensei."
2954048139 = "Buddy"
4268064536 = "Following the result of a fortune-telling that said \"it's good to act with a buddy,\" Konoka called Sensei. The two went around asking questions to track down the fugitive, but information was hard to come by. They ended up getting caught in the rain and had to take shelter, but Konoka looked happy, saying \"it became a good day because Sensei was next to me.\" The culprit they had been chasing all this time runs into the shelter where the two were."
168308071 = "A Detective's Recuperation"
3351360879 = "Konoka, who caught a cold, accidentally sends a report message to Sensei. When Sensei, who was worried, goes to visit Konoka, she asks for tonkotsu ramen with extra garlic. While having such exchanges, Sensei continues to nurse Konoka, who is a little weaker and quieter than usual until she falls asleep."
1877482996 = "Take It Off Quickly!"
84336040 = "Sensei, who was asked by Rena to run an errand on the way to visit WildHunt. On the way to see Rena, Sensei's pants tear when he lifts heavy luggage. Unfortunately, he joins Rena at that timing, and Sensei, who tried to hide it, makes suspicious movements. Sensei confesses to Rena, who is suspicious, that there is a hole in his butt. Rena, who couldn't watch, makes Sensei take off his pants and sews them back up on the spot."
404222347 = "I Won't Admit It!"
2072434858 = "Sensei, who was called by Rena, accompanied her on an investigation to prove that ghosts do not exist. Although they proceeded with the investigation of the ruins at night relying on the anecdotes of the Seven Mysteries, they couldn't find any decisive evidence in the end. Later, Rena explained the day's events to everyone in the Occult Research Club, but she didn't notice that Sensei's arm was reflected in the photo, and as a result of covering it up, the Occult Research Club got excited, saying that ghosts do exist."
278781398 = "Here, Have This!"
3926285099 = "As a result of covering up the commotion at the ruins, Rena decided to make a charm to ward off evil. Although she gave one of the ones she made to Sensei, for some reason, bad things continued to happen to Sensei. When Rena, who was wondering, checked the charm, it turned out it was empty inside. Rena, who said she couldn't give something half-baked, replaced it with a substitute charm. Since then, bad things have strangely stopped happening to Sensei."
3292372329 = "Small Ribbon"
222237672 = "Sensei, who received an errand from Rena again, headed to WildHunt with the materials for accessories. Rena, who was making ribbon hairpins, talks about how she aspired to be a fashion designer because she made accessories and gave them to her friends when she was young. On the way home, Sensei finishes the rest of his work for the day with the ribbon Rena put on his head."
4173121054 = "This Is My Daily Life"
759367300 = "Sensei, who visited Millennium, witnesses Akane talking to a classmate with a subtle atmosphere. On the way home, Sensei encounters Akane, who was waiting for him, and decides to go home together. On the way, Akane talks about how difficult it is to interact with people. Hearing that, Sensei pushes Akane's back, saying there is no reason they have to get along, but he will support her if she wants to. Akane and Sensei's \"let's get close\" strategy begins to move."
2673536527 = "A Step Forward"
2811609032 = "Based on the script she thought of with Sensei, Akane starts the strategy to get close to her classmate. Akane, who put a micro-wireless device in her ear so she could get Sensei's help, repeats communication with her classmate with the character she created. She continued the awkward interaction as it was, but all the unnaturalness was seen through by her classmate. Akane, who explained the reason fearfully and became able to act more naturally, spent a fun time."
3944103849 = "Side by Side"
1930446094 = "Akane invited Sensei to an empty classroom. To show the results of trial and error with Sensei, the classmate play begins. Although they were playing around at first, Akane says with tears, \"I can pretend, but I don't know my true self.\" Even so, Akane talks fleetingly that she is happy that there is a special existence, even if it's just one person, who she can confide her worries to, and that it is Sensei."
2908734044 = "The Best Cleaning Method"
2828576144 = "Akane consults Sensei, saying that her way of using bombs has become one-patterned. When they were talking about such things at the cafe, the two get caught up in terrorist activities. The Valkyrie student who rushed over cannot move as she wants because citizens are taken hostage. Akane tries a peaceful solution, but the situation doesn't improve even if she takes time, and in the end, she uses a bomb to solve everything."
2314453101 = "Niko's Recommendation"
2864377608 = "Niko, who brought ingredients and visited Schale for Sensei, who is busy with work and working overtime until late at night without eating properly. When Sensei, who was asked what menu he wanted to eat, answered \"your recommendation,\" Niko prepares kitsune udon."
3319469081 = "Niko's Shopping"
3542063046 = "Niko, who headed to the supermarket with Sensei to carry out FOX Platoon's \"Special Supply Operation.\" As soon as the closing time sale started, the store became a battlefield. While dodging the many citizens, Niko puts the ingredients she wants into her basket. Sensei, on the other hand, was overwhelmed by the battle-hardened veterans."
722436222 = "Niko's Consultation"
450635337 = "Sensei that day had various misfortunes and was completely exhausted. Niko, who came to help at Schale, notices Sensei's condition and buys the role of counselor herself. Sensei, who is drawn to Niko, who listens gently, begins to reveal his thoughts. Before he knew it, his heart felt lighter."
4084788817 = "Niko's Name Tag"
2993667495 = "Niko proposes to put name tags on everything for office inventory management. With name tags, the owner is known, it's easy to organize, and inventory is easy to grasp, so the two start organizing. After all the work is finished, Niko puts the one remaining name tag on Sensei."
1170598127 = "Niko's Inari Sushi"
653761742 = "Niko, who borrowed Schale's kitchen by asking Sensei. When Sensei went to check, Niko was making inari sushi from frying the fried tofu, unlike usual. When the fried tofu was completed with time and effort, Niko offered the first one to Sensei. After that, they eat Niko's handmade inari sushi together."
1951868971 = "Alert Fox"
1622411002 = "Kurumi, who visited Schale for duty. When they were working together, a citizen who said he was saved by Sensei brought a gift. After the citizen left, Kurumi warns Sensei, who doesn't remember who it was, that he lacks vigilance. So Sensei asks Kurumi to try various gifts, calling it a poison test. While trying high-class sweets and perfumes, Kurumi realizes she is being teased."
1539676039 = "Wise Fox"
852804695 = "Because she was taught at SRT or watches life hack videos, Kurumi is knowledgeable about various know-how useful in daily life. Sensei throws a difficult problem to Kurumi, who quickly solves the small troubles that had accumulated in Sensei's hands. Kurumi struggles to solve the puzzle ring she was given."
2213050152 = "Conscious Fox"
3291828447 = "Kurumi, who visited a photo booth at the station to take a passport photo. However, perhaps due to the influence of training at SRT, she unconsciously closes her eyes every time the flash shines after the countdown. Sensei, who couldn't watch that, takes a surprise photo of Kurumi using his smartphone camera. It was taken beautifully, and he takes it to a company that prints from data."
1018801245 = "Dressing Up Fox"
2066054702 = "When Sensei visits FOX Platoon's HQ, Kurumi was taking care of her shield alone. In an operation, the point man's shield is the first thing the opponent sees, so as a face that impresses the platoon, she wants to take good care of it. Kurumi talks about her theory. Hearing that, Sensei gives her a cute sticker. Kurumi firmly refuses to put it on the shield and instead worries about where she should put it."
1003943113 = "Seeing Off Fox"
3964533583 = "Kurumi warns Sensei, who she found walking in a dark alley late at night, that he lacks vigilance. Kurumi takes Sensei's hand and advances as if to cut through the darkness of the night. To Kurumi, who says it is her role to move forward even if she is scared, Sensei puts strength into their joined hands and says he will support her if anything happens."
825961924 = "Small Talk of a Sniper"
2685659288 = "Sensei, who visited a newly opened cafe but was troubled by the overly complex ordering method. Otogi, who happened to be visiting there, immediately gets along with the clerk and helps with the order. Otogi, who makes it a rule to grab a chance without hesitation when it comes, can get along with anyone immediately, so there are various good things, but there are also unwanted trials."
4153878308 = "Radio Communication of a Sniper"
618610602 = "Otogi, who talks about special forces slang while teaching voice codes to Sensei, who was interested in Otogi's appearance of communicating. After listening to the story, Sensei thinks it's interesting, but as Sensei, he thinks it's important to convey clearly in words to be trusted. Hearing that, Otogi unintentionally leaks her true feelings in voice code."
3691143979 = "Loneliness of a Sniper"
304057056 = "Sensei, who became worried after seeing a mysterious contact late at night, finds Otogi in the park. Otogi, who says she visits the park to dispel loneliness, was calming her heart by looking up at the flickering streetlights. Otogi was worried about her path in how to face loneliness, but after a conversation with Sensei, she says she will advance on the current path a little more."
354077761 = "Camouflage Uniform of a Sniper"
2245221007 = "Otogi, who invited Sensei to shopping, saying she wants to buy a camouflage uniform. However, the destination was an ordinary apparel shop, and the camouflage uniform Otogi was talking about was different from what Sensei had imagined. Otogi says that if you blend into the city, ordinary clothes are camouflage. The two look around at various clothes together."
201493185 = "Secret Base of a Sniper"
420529048 = "Sensei hears from a Valkyrie student that there are mysterious marks all over D.U., so she is investigating. Afterward, Sensei, who was caught in a sudden rain, discovers the mark on a ladder under an overpass where he stopped to take shelter. When he climbs the ladder because he is curious, Otogi was there. She says this is a secret base for operations, and the mark is to show territory. Under the overpass where it is raining, the two spend time drinking coffee."
3406649746 = "Erika and Shopping"
1917809992 = "Sensei, who came to buy office supplies, runs into Erika by chance in the underground shopping district. When Erika says she likes window shopping without a destination, Sensei decides to follow her. While looking around the shops together, Erika shows interest in leopard-print products, and the two talk about their preferences."
2344616949 = "Erika and Night Walk"
3116115619 = "Sensei, who decided to eat dinner together in D.U. at Erika's invitation late at night. They enter a fast-food restaurant they saw on the street and enjoy the immorality of eating high-calorie food at night."
3131626542 = "Erika and Vending Machine"
2234993111 = "When Sensei is about to buy a drink at a vending machine, Erika calls out from the side. The two recommend drinks to each other. Because her nails are long, Erika asks Sensei to open the can. Sensei gets injured on his finger while trying to open the lid, and Erika puts a cute bandage on him."
3530314181 = "Consulting Erika"
3833501729 = "Sensei, who was called by Erika, saying she has a consultation. While saying her thoughts are not yet organized, Erika begins to talk bit by bit. It is that she likes being with friends, but sometimes she loses her energy. Sensei tells her that time alone is also important, and Erika looks convinced. Actually, she says there is a place she goes when she wants to be alone."
905777020 = "Erika, Secret Base"
2885707072 = "Erika, who says she will show her own secret base to Sensei, who visited Gehenna, guides Sensei to the rooftop where no one is, dyed in the sunset. Erika says it was her own place, but she brought him because Sensei is special. After talking until the sun went down, the two go home together through the darkened school building."
1600040855 = "Little Devil and Villainess"
496791815 = "Mutsuki, who says she will play a villainess in the next request, starts practicing with Sensei as her partner. She has Sensei prepare tea, makes Sensei a chair, and they spend a fun time."
3860221711 = "Little Devil and Buyer"
1421163371 = "Mutsuki, who learned that the bombs she was about to buy were bought up by the Helmet Gang. As a result of the investigation, she finds out that resale is rampant. To punish the reseller, Sensei and Mutsuki play a trick."
548822881 = "Little Devil and Staycation"
1478658850 = "Mutsuki, who cleaned up the remnants of the reseller, was hiding in a hotel to avoid trouble. When Sensei visits Mutsuki's room, he is entrusted with a bag containing a large amount of money. She says it is funds the reseller had hoarded, and she wants him to use it for something meaningful. Sensei decides to keep it."
2079305511 = "Date with Little Devil"
127523721 = "Sensei, who spends a fun day together triggered by an opera appreciation invited by Mutsuki. On the way home, Mutsuki, who looks back that today was her first date-like date, confesses her honest feelings to Sensei."
1265163046 = "Unexpected Encounter"
805657719 = "Sensei meets Haruka, who is guarding in a dress, at an exhibition venue he stopped by by chance. When the two are talking, they get caught in a fight. Although it was a scratch, Sensei gets injured, and Haruka suppresses it in an instant."
1885392653 = "Unexpected Gift"
765461118 = "Haruka, who misunderstood that Sensei praised the dress itself when he praised her dress appearance before, presents her dress to Sensei as an offering. Because Sensei cleared up the misunderstanding, Haruka shows off her dress appearance again."
3025495165 = "Night Walk"
3464250131 = "Haruka and Sensei end up taking a night walk by chance. Haruka mentions that she finds it hard to reach out to others herself, fearing she might be a bother. However, Sensei encourages her, saying that it's precisely because she gathered the courage to reach out that they are here now, and the two enjoy their walk together."
1181939252 = "Like a Weed"
585740990 = "Sensei visits an art museum themed around \"weeds\" at Haruka's invitation. While looking around at the brilliantly displayed works, Haruka seems to have something on her mind. Though hesitant at first, she is encouraged by Sensei to share her thoughts on weeds."
3220445133 = "The Melancholy of Misuzu Kanihara (1)"
3116018838 = "As the Director of the Correctional Bureau, Misuzu spends her busy days pouring her heart into creating an environment conducive to rehabilitation. However, in the middle of a brief rest, she turns pale upon hearing that an attempted escape has occurred."
2049297372 = "The Melancholy of Misuzu Kanihara (2)"
448396540 = "Misuzu holds an interview with the student who attempted to escape. To the troublemaker who says they just wanted their birthday celebrated, Misuzu hands over a gift she had prepared in advance. Touched by her gentle nature and advice, the student shows remorse. However, while talking, Misuzu reflects on the \"prisoners\" who caused the jailbreak incident."
1261954325 = "ON AIR: Gehenna (1)"
2043410218 = "Kirara is feeling stagnant, complaining that she lacks \"sparkle.\" Just then, Iroha approaches her with a request to be the MC for Gehenna's school broadcast. She explains that the head of the broadcasting department suddenly resigned, and Makoto ordered her to find a replacement at all costs. \"Sounds fun!\" Kirara agrees immediately, and Erika joins in as well."
2893444801 = "ON AIR: Gehenna (2)"
708317131 = "With the casting decided in a flash, the school broadcast by the Sparkle Club proceeds smoothly. However, during the live broadcast, a high-frequency noise occurs due to equipment trouble. Erika fixes it immediately without panicking, and the broadcast resumes safely. With rave reviews, the school broadcast ends in success."
3592692365 = "A Weed That Doesn't Bloom Alone (1)"
950591110 = "As a reward for their hard work, the members of Problem Solver 68 visit a high-end restaurant on Aru's tab. There, they unexpectedly reunite with an old nemesis."
1515344389 = "A Weed That Doesn't Bloom Alone (2)"
39269449 = "In the past, Haruka was being bullied by delinquents. Aru and the others intervene, unable to watch. Although the situation is settled, Aru decides to resolve the bullying at its root. After gathering information, the presence of the Rigatoni Family emerges behind the delinquents."
3333789074 = "A Weed That Doesn't Bloom Alone (3)"
3741869477 = "The battle between Problem Solver 68 and the Rigatoni Family begins. Because Rigatoni takes regular customers hostage, Aru and Kayoko are captured, unable to launch further attacks. Mutsuki and Haruka take advantage of the opening to escape using a small kitchen lift. Remembering how Aru once saved her, Haruka steels herself."
409183804 = "A Weed That Doesn't Bloom Alone (4)"
2857688369 = "Haruka is determined to save Aru this time. To blend in with the mafia, she and Mutsuki change into suits and storm the building. Ignoring the mafia in her way, Haruka rushes up with unstoppable momentum and confronts Rigatoni on the top floor. Haruka puts on a great performance and succeeds in rescuing Aru and Kayoko."
2606844752 = "A Weed That Doesn't Bloom Alone (5)"
2035383190 = "After solving the case, Problem Solver 68 is invited to the restaurant. Though they don't understand the menu, they enjoy the undeniably delicious food. On the way home, they discover the weed Haruka once took care of blooming sturdily. The Problem Solver team vows to raise that weed with care."
4008508992 = "Midnight with Roa"
1286632062 = "\"Midnight with Roa\" is Orwell's talk show. Tonight, they introduce the \"Drum Can Crab.\""
3617072867 = "Kivotos Unconfirmed Mystery: The Great Tsuchinoko Exorcism"
3713119761 = "Phenomena that cannot be explained by science are occurring all over Kivotos. Hearing reports of the legendary creature \"Tsuchinoko,\" Investigation Team X is deployed!"
3175519842 = "Lucky Animal"
156040622 = "Searching for Tsuchinoko"
753740067 = "A Girl With That Kind of Setting"
4150362836 = "Ghost Bus"
921517431 = "Living, Moving Stone Statue"
3884680737 = "Shadow Approaching the Mountain Cabin"
1130628369 = "Telephone Booth Echoing with Cries of Resentment"
504801665 = "The Last Ghost Story"
2245860834 = "Alien Gray (1)"
790458143 = "Alien Gray (2)"
2181388028 = "Blue Tsuchinoko"
3119162552 = "Barbecue & Chili"
3238893428 = "There's No Such Thing as Occult!"
2939235592 = "anonymous who?"
1616764732 = "Iron Maiden"
931273608 = "Lucky Animal"
514500469 = "This week's fortune is the worst! In a morning horoscope, Konoka is told that the worst day of her life will arrive in three days. While venting about this to her friends on social media, Konoka finds a topic related to a symbol of good luck."
427498716 = "Searching for Tsuchinoko"
3051451417 = "Konoka reports to Kanna that she is taking time off to search for the Tsuchinoko, a snake said to bring good luck. Sensei, who happened to be there for another matter, ends up accompanying Konoka at Kanna's request. Riding a bus, the two visit a rural town where sightings have been reported and meet up with Konoka's \"friends.\""
1657577479 = "A Girl With That Kind of Setting"
907137836 = "Konoka's friends are Rena from the Occult Research Club and Tsubasa, who calls herself the director of the \"Mo' Paranormal Research Institute.\" Rena enjoys talking about the occult with Tsubasa, but insists that she herself does not believe in the existence of the Tsuchinoko."
1462024252 = "Ghost Bus"
3930709287 = "On their way to the mountain cabin where they are staying, the group receives a warning from an eerie old man. Konoka is scared, but the group arrives at the cabin without worrying. After a short break, they set out to investigate, but on the way to their destination, they encounter the rumored \"Ghost Bus.\" Though confused at first, they successfully repel it thanks to Konoka's quick thinking and board the correct bus."
3598423513 = "Living, Moving Stone Statue"
166220328 = "During the investigation, Tsubasa reveals to Rena that the club she belonged to has already been abolished. Meanwhile, Konoka, who was investigating alone, finds an ominous box underground. While Konoka suggests reburying it, Tsubasa opens the box, revealing a stone statue inside. Tsubasa judges it to be someone's prank based on the material and state of deterioration, but Konoka buries it deep underground again. As they leave, Sensei makes eye contact with the stone statue that should have been buried."
3910110965 = "Shadow Approaching the Mountain Cabin"
1933749352 = "Returning to the lodge late in the evening, the group is exhausted from the forced march. Konoka, the only one with energy, volunteers to prepare dinner, while Tsubasa and Rena fall asleep from exhaustion. Rena and Sensei wake up feeling a suspicious presence and try to find the culprit, despite being scared. Just then, Konoka returns to the room with the food. Konoka also says she saw a mysterious shadow, and Tsubasa begins to suspect that the \"Seven Prisoners\" who hold a grudge against the Public Safety Bureau have come for revenge."
1284600502 = "Telephone Booth Echoing with Cries of Resentment"
105361616 = "The group, who continued searching for the Tsuchinoko the next day, accidentally misses the evening bus. Trying to call a taxi, they find themselves out of range, so Konoka and Sensei use a public phone. The two try to leave the booth after arranging a taxi, but for some reason, the door won't open. Not only that, but the public phone rings, and when they pick up the receiver, they hear an eerie voice. Help never comes, and in the end, Konoka solves it with brute force and they escape."
2528363471 = "The Last Ghost Story"
1322186565 = "A bipedal bus appears before the group waiting for a taxi... but Konoka repels it with brute force. With the series of strange incidents, their suspicion that someone is working in the shadows turns into certainty. At night, the group notices someone watching them from outside the window. Konoka says that if the culprit behind the series of incidents is the Seven Prisoners' \"Kyoko Mitsui,\" everything would be explained. The group tries to catch the suspicious shadow, but it vanishes like smoke, and they fail."
1478179506 = "Alien Gray (1)"
1728431009 = "Seeing the white shadow captured in a photo, Tsubasa claims that the culprit behind the series of strange phenomena is the Alien Gray. Although the debate heats up, the group realizes that someone is intentionally isolating the mountain cabin. The phone lines were cut, and the bridge was destroyed. The culprit, whose identity is finally revealed, turns out to be delinquents who held a grudge against Konoka..."
3654864579 = "Alien Gray (2)"
1998146 = "The group finishes off the delinquents. Upon questioning, it turns out that everything, starting from spreading the Tsuchinoko rumors, was the work of the delinquents. Tsubasa, who was planning to revive the \"Pseudoscience Club\" with the achievement of finding a Tsuchinoko, is visibly depressed by this fact. However, none of the delinquents were wearing white clothes, and it didn't match the white shadow in the photo. Before the puzzled group, Mirai, who had been hiding out of concern for her club junior Tsubasa, appears."
3085789925 = "Blue Tsuchinoko"
2378286215 = "Unable to find the Tsuchinoko in the end, Konoka is terrified that the worst misfortune of her life is approaching. However, counting from the day of the horoscope broadcast, 4 days have already passed, and she has overcome \"that day\" three days later. Rena points out that looking back at the events so far, she has been visited by enough misfortune, and Konoka is convinced that the adventure of searching for the Tsuchinoko might have been the real Tsuchinoko."
1641141706 = "Barbecue & Chili"
844112461 = "With all the problems solved, the group enjoys a barbecue with the delinquents. Konoka is surprised to see Tsubasa acting affectionately toward Mirai, but still teases Mirai for being overprotective by peeking at her junior late at night. However, Mirai replies that she wasn't the one peeking at the mountain cabin that night."
391374629 = "There's No Such Thing as Occult!"
3407161162 = "A night when the sun has fully set. Rena is confidently reporting the truth about the Tsuchinoko commotion to her seniors in the Occult Research Club. On the way, she is taken by Tsubasa, who came to call her, and the two go outside the mountain cabin together. The reason Tsubasa gathered everyone outside was to update with the universe. The sound of \"Aliya Aliya Ali\" echoes through the night mountains."
4096947749 = "anonymous who?"
2337427686 = "It was Himari who leaked the Tsuchinoko information to Konoka on social media. In the clubroom of the Phenomenon Investigation Department, Himari is analyzing the events Sensei and the others experienced with interest. She exchanges opinions with Emi, who arrived later, but the data indicates something that can truly be called a \"phenomenon.\""
450338200 = "Iron Maiden"
3543633081 = "The Valkyrie Public Safety Bureau is noisy with delinquents who have come to turn themselves in. Meanwhile, Kanna is meeting with Misuzu, the Director of the Correctional Bureau."
1242866448 = "The incident has settled down, and everyone seems to be enjoying a barbecue at the mountain cabin..."
165422936 = "Rena reports the truth about the Tsuchinoko incident to her seniors in the Occult Research Club. Afterward, late at night, Tsubasa calls everyone, including Rena..."
1637396176 = "The account \"anonymous\" that leaked the Tsuchinoko information on social media. Who is it...?"
2318234019 = "The Valkyrie Public Safety Bureau has become noisy with delinquents who have come to turn themselves in. Meanwhile, Kanna seems to be talking to a certain visitor..."
2425389763 = "Noon Heat Haze"
1157145156 = "Be careful with outdoor activities on hot days when heat haze rises! Even if you see a \"white scarecrow\" in the middle of the road, never stare at it."
