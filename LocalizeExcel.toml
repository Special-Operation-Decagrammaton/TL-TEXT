1884399239 = "Jacaré, início da supressão! (1)"
826236994 = "Após a batalha, o meca-jacaré tenta fugir novamente. Ele segue em direção à piscina infantil. No momento crítico, Kanna se coloca à frente."
1760286284 = "Jacaré, início da supressão! (2)"
