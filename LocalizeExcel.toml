2656530785 = "Ordem de Missão Especial de Emergência do Comitê de Disciplina"
3796114309 = "A administradora Ako, do Comitê de Disciplina, deduz que a presidente Hina está estranha ultimamente e certamente exausta. Portanto, com o pretexto de 'acampamento de verão do Comitê de Disciplina', planeja ir ao mar e dar um presente de férias de verão à presidente Hina. Pelo futuro de Kivotos, a Ordem de Missão Especial de Emergência é emitida."
2317210960 = "Uma dificuldade não passa, outra já vem"
2558005236 = "Sob o pretexto de treinamento de acampamento de verão, o Sensei e o Comitê de Disciplina visitam a Praia de Alab. É uma praia conhecida por ser bastante tranquila em Gehenna…… ou deveria ser, mas por algum motivo, descobrem que uma guerra total entre a Gangue do Capacete e delinquentes começará em 4 horas. Para que a presidente Hina não descubra, o Comitê de Disciplina se mobiliza para lidar com isso."
2633921 = "Planos tendem a dar errado"
3902657065 = "Enquanto o Comitê de Disciplina, liderado por Ako, Iori e Chinatsu, luta contra os problemas, o Sensei vai até Hina. Ele deveria mantê-la no quarto a pedido de Ako, mas a luta se intensifica, e ele é chamado várias vezes. O Sensei engana Hina de alguma forma e continua a comandar a luta."
2147970018 = "Tudo por Hina"
793970726 = "Prevendo uma guerra total maior do que o esperado, o grupo hesita em avisar a presidente Hina, mas Ako se recusa terminantemente a atrapalhar suas férias. Considerando as forças atuais, eles acham que podem lidar sozinhos e declaram a continuação da operação. Enquanto isso, Hina diz que é a primeira vez que vê o mar assim e olha para o Sensei……"
1643965806 = "Coisas raras que acontecem no mar"
3515662738 = "Após muito esforço, o Sensei e o Comitê de Disciplina conseguem repelir a Gangue do Capacete e os delinquentes sem que Hina perceba. Mas o alívio dura pouco, um novo grupo de problemas aparece na praia."
542833392 = "A Sociedade de Estudos Gastronômicos indesejada (1)"
127397515 = "A Sociedade de Estudos Gastronômicos veio vender milho assado na guerra total para descobrir por que o milho assado é tão gostoso quando comido à beira-mar ou em festivais. Percebendo a ausência da presidente Hina, eles dizem que não permitirão que atrapalhem seus estudos gastronômicos e apontam suas armas para o Comitê de Disciplina."
4024099259 = "A Sociedade de Estudos Gastronômicos indesejada (2)"
1954305915 = "Com a liderança do Sensei, o Comitê de Disciplina repele a Sociedade de Estudos Gastronômicos. Eles começam o treino de marcha, mas, exaustos das batalhas, não é um treino decente. E assim o dia escurece……"
2838267782 = "A noite cai sobre a praia"
228841159 = "Depois que a agitação diminui, Hina e o Sensei caminham pela praia noturna. Aparentemente, Hina havia notado que o Sensei estava trabalhando nos bastidores pelo Comitê de Disciplina……"
3471015555 = "Traças que entram no fogo"
104590627 = "O Comitê de Disciplina tenta apoiar ao máximo o tempo em que a presidente Hina aprenderá a nadar, mas, aproveitando a ausência da presidente, a Gangue do Capacete, os delinquentes, a Sociedade de Estudos Gastronômicos e até o Departamento de Desenvolvimento de Fontes Termais aparecem, e a praia se torna completamente um campo de batalha. Quando Ako, quase chorando, está prestes a desistir, a voz de Hina é ouvida em algum lugar."
4288288614 = "Comitê de Disciplina vs. Grupo de Problemas (1)"
1176279714 = "Sob o comando da presidente do Comitê de Disciplina, Hina, começa a varredura dos problemas."
2434376056 = "Comitê de Disciplina vs. Grupo de Problemas (2)"
2305285661 = "Diante do poder avassalador de Hina, os problemas recuam um a um. Hina se vira para os membros do Comitê de Disciplina e anuncia: 'Ao voltar ao hotel, faremos uma reunião de reflexão imediatamente'."
1470755374 = "Este verão ainda não acabou"
913863345 = "Hina suspira enquanto ouve a explicação de Ako. Ela diz que, apesar de tudo, conseguiu descansar e não foi ruim, mas ao mesmo tempo declara: 'Agora, começaremos o acampamento de novo'. Enquanto os membros do Comitê de Disciplina se desesperam, Hina sussurra ao Sensei: 'A compensação fica para depois', e sorri silenciosamente."
3595508161 = "Treinamento de acampamento de verão do Comitê de Disciplina – Edição Prática"
612706856 = "Iori suspira ao ver os membros do Comitê de Disciplina meio relaxados. Vendo isso, Ako, a substituta da presidente, diz: 'Quem dá as ordens deve dar o exemplo primeiro', e Iori mostra um exemplo de treino de tiro."
2709915893 = "Pegue-me se puder na Terra do Nunca"
3067039180 = "Shun, instrutora do Jardim Meihua, bebe a 'poção do rejuvenescimento' que recebeu de Saya e volta à sua forma de infância! Com a mudança física, sua mente também regride, e ela causa vários problemas por Shanhaijing……!?"
