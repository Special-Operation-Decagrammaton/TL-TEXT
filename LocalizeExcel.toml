656130952 = "Parece que todos os anos o Pandemonium realiza uma festa convidando figuras importantes de vários setores. O objetivo da festa seria mostrar a autoridade do Pandemonium."
3296347737 = "Dizem que é o conselho estudantil da Gehenna, onde apenas a elite pode entrar. No entanto, independentemente das condições de adesão, o conteúdo de suas atividades diárias parece ser um pouco incomum."
241828489 = "Diz o boato que muitos dos problemas que afligem o Comitê de Disciplina são orquestrados por alguém. Os mentores seriam todos a mesma pessoa."
4211417711 = "Uma antiga instalação no canto do distrito autônomo de Gehenna. Às vezes é usada como refúgio por alunos que querem escapar dos olhares alheios."
1606103230 = "Um piano antigo deixado no prédio antigo. Parece que alguém o manteve até recentemente, pois está em perfeitas condições."
74387565 = "Um clube de escala gigantesca, considerado um mamute em Gehenna. Unidos pela paixão pelo desenvolvimento de fontes termais, é um grupo que frequentemente causa acidentes."
3868968517 = "A grandiosa operação que o Departamento de Fontes Termais estava tramando. É um plano tão inacreditável que, mesmo ouvindo a explicação, não se consegue entender."
848014088 = "A carismática presidente do Departamento de Fontes Termais. Possui uma liderança impetuosa e sem lacunas, mas diante da presidente do Comitê de Disciplina, é como um rato diante de um gato."
1351474076 = "Uma história que Kasumi mencionou com um tom sugestivo, cuja veracidade é incerta. Originalmente, Gehenna está repleta desses segredos inacreditáveis."
2177842261 = "Literalmente, um monstro de identidade desconhecida. Mesmo que apareça diante dos olhos, há coisas no mundo que são difíceis de compreender."
1914035094 = "Uma garota séria que estuda culinária com Fuuka no Departamento de Merenda. Dizem que ela tem fãs secretos comovidos com sua dedicação."
3208368410 = "Um clube de má reputação em Gehenna. Vilões que possuem tanto habilidade técnica quanto violência."
3042483397 = "Uma panqueca gigante de identidade desconhecida que apareceu em Gehenna. É um incidente surpreendente, mas parece não ser tão incomum em Gehenna."
1792078009 = "Para a Festa de Gehenna, o Pandemonium teria encomendado os pratos ao Departamento de Merenda. No entanto, o cozinheiro não parece ser a presidente do departamento."
654318302 = "Um objeto cuja razão de existir é incompreensível. É o que se chama de desperdício de orçamento."
1931459361 = "Mesmo sendo crianças problema…… ou melhor, por serem crianças problema, existe uma certa lealdade. No entanto, quando o outro é a presidente do Pandemonium……"
1421764132 = "Dizem que a pomada usada no Departamento de Medicina de Emergência é tão eficaz que cura qualquer ferida só de passar. Seria bom ter uma."
2017029991 = "Visto de frente, de trás, de lado, é um panfleto simplesmente suspeito. Realmente, suspeito."
4052776956 = "Corre o boato de que a presidente Makoto causou um grande tumulto no distrito autônomo. Na verdade, isso é comum e não tem nada de estranho."
2835023066 = "Mesmo sob hipnose, com a personalidade alterada, os aspectos problemáticos continuam. Parece que a natureza de uma pessoa não muda facilmente."
