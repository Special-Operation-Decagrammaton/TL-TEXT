1663756495 = "Pessoa de três dias"
2436764539 = "Resolução de Ano Novo"
1008442379 = "No final do ano, Maki, Kotama e Hare estão absortas em jogos como sempre. Chihiro, preocupada porque ninguém atende ao telefone, visita a sala do clube. Irritada com a vida preguiçosa, Chihiro declara que este ano todos irão ver o primeiro nascer do sol."
2288954300 = "Se for para ver o primeiro sol"
1822713070 = "Os membros do Veritas se reúnem na frente da Millennium Science School, um tanto relutantes. Chihiro anuncia que irão acampar ao pé de uma montanha para ver o primeiro sol. O grupo fica confuso. Ela inspeciona os pertences…… e encontra itens nada relacionados ao acampamento."
459676073 = "Montagem da barraca"
3757493316 = "O Veritas chega ao acampamento. Ao contrário da animada Chihiro, os outros estão cansados das atividades ao ar livre. Após montar a barraca, cada um vai descansar, e Chihiro começa a ler com o Sensei."
2908823739 = "O tédio mata até hackers"
1350246685 = "Como os membros não voltam, Chihiro e o Sensei vão procurá-los. Encontram Hare sofrendo com os sintomas de abstinência de cafeína. Após dar café a Hare, eles perguntam sobre Maki e seguem para uma caverna. Maki estava desenhando uma enorme obra de arte, mas……"
3004230193 = "Dança com o urso"
296992172 = "Enquanto isso, em uma área mais profunda da floresta, Kotama, que gravava sons ambientes, encontra o Departamento de Treinamento, que estava em treinamento de inverno. Enquanto conversam sobre o valor de aproveitar o ar livre, Chihiro adverte que podem encontrar um urso prestes a hibernar…… Nesse momento, um urso selvagem real aparece."
2436736275 = "Preparação do jantar"
4265253392 = "De volta ao acampamento, os membros do Veritas começam a preparar um jantar adiantado. Enquanto Chihiro acende a fogueira, Maki, Kotama e Hare preparam os ingredientes, ainda desajeitados."
3998368874 = "Sopa de galinha do coração"
1256703657 = "Chihiro preparou um caldo de frango cozido para os membros. Adicionando os ingredientes que prepararam, o grupo se diverte ao redor da panela. Após a refeição, o Sensei pergunta a Hare e Kotama o que acharam do acampamento."
2460462864 = "Paisagem inédita (1)"
452463543 = "No dia seguinte, o grupo acorda cedo para ver o nascer do sol e começa a escalada. No caminho, encontram Sumire, que diz que, por estar nublado, talvez seja difícil ver o sol. No entanto, decidem subir até o topo. Lá, finalmente veem um belo nascer do sol."
60697301 = "Paisagem inédita (2)"
1996295661 = "De volta após ver o nascer do sol, os membros do Veritas encontram muitos repórteres reunidos nos arredores do acampamento. Na verdade, o mural que Maki desenhou na caverna foi confundido com uma nova pintura rupestre antiga, e a imprensa se aglomerou. O Sensei e Chihiro têm trabalho para controlar a confusão."
1007585985 = "Pessoa de três dias"
3021250109 = "Uma semana após o Ano Novo, Chihiro visita a sala do clube para ver como estão os membros. No entanto, eles estão absortos nos jogos como antes…… Irritada por nada ter mudado, Chihiro começa a dar uma bronca."
4241167237 = "Serenata delas que florescem"
2999814580 = "No Dia dos Namorados, o Sensei é designado para ajudar Makoto nos preparativos da 'Festa de Gehenna'. No entanto, em Gehenna, um cotidiano totalmente inesperado se desenrola…… Será que ele conseguirá terminar os preparativos para a festa?"
