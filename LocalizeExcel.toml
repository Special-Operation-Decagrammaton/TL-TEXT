3431070878 = "O prêmio principal é o 'Cartão Ultra Raro'."
3433269143 = "Enquanto ajudava o Sensei, a Karin acabou rasgando a sua meia-arrastão. Sentindo-se culpado por ela ter rasgado a roupa durante o trabalho, o Sensei a levou para a seção de moda do shopping para comprar meias novas de presente. Depois de ganhar meias extras para dar e vender, a Karin jurou que ia guardar pelo menos uma delas com muito carinho, só para lembrar das memórias felizes desse dia."
3435553064 = "Veja o histórico dos resultados de recrutamento que você salvou."
3461533466 = "Entrada no Lobby do Evento 2 (Shun)"
3466434185 = "Vitória Tática 1 (Shunzinha)"
349376399 = "Sob o brilho da lua na beira do rio, Shun abre o seu coração pro Sensei e compartilha os sentimentos que teve durante a infiltração. As meninas da Gangue dos Passarinhos eram crianças inocentes e fofas. Ela então revela uma dura angústia que carrega: o medo de estar podando o brilho e o futuro promissor das crianças só para ditar cegamente o que é certo ou errado no mundo."
352756098 = "Beco da Rua de Comércio"
3529818560 = "Buff 1 (Shun)"
3555109809 = "Buff 2 (Shunzinha)"
3581387115 = "Habilidade EX (Campo) 2 (Shunzinha)"
3604499949 = "Seleção de Formação (Shunzinha)"
362525122 = "Aplica [c][007eff]110%[-][/c] de Dano\nAumenta o Valor de Sucesso de Cobertura em [c][007eff]4500[-][/c]\nAumenta a Taxa de Ignorar Cobertura em [c][007eff]4500[-][/c]"
3638633883 = "A Shun e o Sensei aproveitaram ao máximo a folga refrescante no desfiladeiro. Comendo frutinhas geladas e flutuando relaxados com a força da correnteza. Mas o corpo pesou de tanto relaxar e o Sensei quase dormiu na água se não fosse pelas mãos da Shun o apoiando. Levando um susto com a soneca molhada, Shun o puxou para as pedras quentes da calçada e o abraçou com o corpo para aquecer o frio do coitado."
3641174432 = "Aumento de Vínculo 3 (Shun)"
3649906930 = "Afirmando que o verão permitia mostrar lados diferentes de si mesma, Shun apareceu para o Sensei transformada na 'Shunzinha'. Pulando em barcos de Rafting e comendo pelas barraquinhas, ela brincou com toda a energia da sua aparência infantil. Porém, os encantos da poção acabaram de repente no meio do descanso e Shun voltou a ser uma adulta envergonhada."
3654696075 = "Fogos de Artifício"
3663002347 = "Mover Seção 1 (Shun)"
3682937290 = "Depois de se divertirem brincando no rio, o grupo pisou na rua comercial pra encher a barriga e concluir a inspeção. O estranho é que as lojas estavam despovoadas e o mercador resmungava de medo sobre algo incompreensível. Enquanto o grupo tentava entender a situação, um grito agudo ecoou dos becos."
371473304 = "Verificar Resultado do Recrutamento Salvo"
