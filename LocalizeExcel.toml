3920080884 = "Decagramaton é um sistema de inteligência artificial que se autoproclama um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo em vários lugares de Kivotos.\n\nBinah é o terceiro profeta do Decagramaton, observado pela primeira vez na região desértica de Abydos. Não se sabe por que Binah apareceu aqui, mas é certamente uma existência perigosa demais para ser deixada como está."
3639039230 = "Decagramaton é um sistema de inteligência artificial que se autoproclama um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo em vários lugares de Kivotos.\n\nChesed é o quarto profeta do Decagramaton, e foi confirmado que assumiu o controle do sistema de produção de uma fábrica de munições nos arredores de Millennium. Se Chesed conseguir produzir tropas infinitamente, Kivotos enfrentará uma calamidade sem precedentes."
276060001 = "Há relatos anteriores de fenômenos estranhos ocorrendo no parque de diversões \"Slumpia\", que faliu devido a dificuldades financeiras. Os boatos de que bonecos e atrações que deveriam estar parados começaram a se mover à meia-noite e atacar as pessoas corroboram esses relatos.\n\nO boneco de diversão Goz continua seu show solitário na \"Slumpia\", repleta de vazio. Se a verdadeira natureza escondida sob aquele sorriso estranho é boa ou má, não é fácil para nós deduzirmos."
3550217605 = "Uma existência desconhecida foi descoberta no subsolo da antiga catedral de Trinity.\n\nEssa existência, \"Hieronymus\", lidera uma série de anjos artificiais chamados \"Communio Sanctorum\", a \"Comunhão dos Santos\", e há rumores convincentes de que seja um experimento criado por Gematria baseado em dogmas antigos. Não podemos deixar Hieronymus, com seu poder imenso, como está. Pela paz de Kivotos, vamos enfrentá-lo!"
2223988532 = "Decagramaton é um sistema de inteligência artificial que se autoproclama um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo em vários lugares de Kivotos.\n\nHod era originalmente uma IA de unidade de comunicação de Millennium, mas foi hackeada por uma IA desconhecida e agora afirma ser o oitavo profeta do Decagramaton. Pode-se dizer que é uma revolta do mecanismo computacional com a mais avançada tecnologia de Millennium. Se não for detido rapidamente, a segurança de toda a área de Millennium estará ameaçada."
491740630 = "Como que para bloquear o caminho para a base, a arma secreta dos Kaitengers apareceu.\n\nParece que os Kaitengers construíram um robô gigante combinado, \"KAITEN FX Mk.0\", com os fundos e a tecnologia que roubaram até agora. Robôs combinados são certamente românticos, mas considerando suas ações passadas, não podemos simplesmente ficar assistindo divertidos."
1866624346 = "Algo enorme e desconhecido foi observado nas águas próximas a D.U. Pelo que parece, segundo as informações, tem a aparência de um boneco de pelúcia dos Momo Friends que supostamente afundou no mar no passado.\n\nNão se sabe como isso aconteceu, mas antes de tudo, precisamos impedir seu avanço!"
3601545918 = "Há relatos de fenômenos misteriosos ocorrendo no parque de diversões \"Slumpia\", que fechou no passado devido a dificuldades financeiras. Os boatos são de que bonecos e várias atrações que deveriam estar parados começam a se mover novamente à meia-noite e atacam as pessoas.\n\nNão sabemos por que Shiro e Kuro, esses bonecos, voltaram a se mover, mas está claro que estão tentando recriar o desfile do parque de diversões de seus dias de glória."
3682198469 = "Em um templo subterrâneo em ruínas em algum lugar de Kivotos, um anjo artificial manifestado por um mistério distorcido foi observado.\n\nGregorio é a forma completa da série de anjos artificiais chamada \"Comunhão dos Santos\", um monstro misterioso nascido dos experimentos de Gematria. Ainda agora, esse monstro continua tocando órgão no templo subterrâneo. O que aguarda ao final da melodia…… ninguém sabe."
2092560489 = "Recebemos informações de que um dos \"Sete Prisioneiros\" que escapou da Agência Correcional, a \"Raposa da Calamidade\", está causando tumulto após roubar um hovercraft.\n\nNão sabemos por que ela, em traje de banho, está realizando destruição indiscriminada, mas se a deixarmos como está, as praias de Kivotos se tornarão um mar de fogo."
1904549173 = "A história de fantasmas transmitida na Academia Unificada Hyakkiyako, \"Hyakumonogatari das Ilusões\", se manifestou.\n\nO \"Gato Fantasma Kurokage\", que perturba o festival animado, é uma existência real ou apenas uma criação nascida das mãos de alguém? A verdade é incerta, mas antes que a situação se torne irreversível, é hora de pôr fim a essa história de fantasmas."
1142087454 = "Decagramaton é um sistema de inteligência artificial que se autoproclama um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo em vários lugares de Kivotos.\n\nA sonda não tripulada de uma base de pesquisa polar foi hackeada por uma IA desconhecida e repetiu auto evoluções, resultando em Gebura, o quinto profeta do Decagramaton. Se deixarmos Gebura, que se autodenomina \"Árbitro\", agir livremente, não apenas a rota polar, mas toda a rede logística de Kivotos poderá estar em perigo."
3983422512 = "Decagramaton é um sistema de inteligência artificial que se autoproclama um buscador sagrado. Atualmente, seus 10 profetas seguidores estão aparecendo em vários lugares de Kivotos.\n\nYesod é o nono profeta do Decagramaton e, até agora, presume-se que não tenha uma estrutura que lhe sirva de base. Seu propósito de criação também é desconhecido, mas está claro que não podemos deixar Yesod como está."
2093431664 = "O \"Caranguejo de Tambor\" é uma criatura monstruosa com forma de caranguejo gigante, nascida da lenda urbana de Kivotos, \"O Caranguejo que se Esconde no Tambor\".\nCom pinças poderosas capazes de destruir facilmente contêineres portuários, esse caranguejo monstruoso continua destruindo instalações portuárias e aumentando gradualmente os danos.\n\nNão se sabe de onde veio essa criatura gigante ou qual é seu objetivo…… Felizmente, parece que a forma de pensar desse monstro não é muito diferente da de um caranguejo comum."
