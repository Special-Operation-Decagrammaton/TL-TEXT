401442022 = "Já que os boatos sobre a mulher das neves continuavam assombrando as praias, Nagusa e o Sensei visitaram o mar novamente para investigar. Ao andarem pela rua comercial da praia, o radar da Nagusa apitou para os espetinhos grelhados das barraquinhas. Mesmo prometendo que estava se segurando nas calorias ultimamente…… A garota não resistiu aos instintos e se rendeu deliciosamente à tentação."
4020717193 = "Aumento de Vínculo 4 (Shunzinha)"
4064366271 = "Aquele dia foi um inferno na papelada, mas graças à ajuda do plantão da Ayane, tudo foi resolvido antes do previsto. Passando o resto do turno descansando a sós com o Sensei, Ayane compartilha o carinho enorme que tem por aquele seu grampo de cabelo de florzinha e conta os seus sonhos esperançosos para o futuro."
