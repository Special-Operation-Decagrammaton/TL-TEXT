655972602 = "顔合わせ"
1724806434 = "万魔殿の議長室を訪れた[USERNAME]先生は、マコトの提案を聞くことになり……。"
2663159793 = "協力要請"
908793961 = "ゲヘナで毎年バレンタインデーに開催される「ゲヘナパーティー」の協力を依頼された先生。万魔殿の地位を確固たるものにするべく、例年より盛大なパーティーを計画しているマコトを、[USERNAME]先生は助けると約束するのだった。"
178695507 = "準備開始"
1845184843 = "先生は「ゲヘナパーティー」の開催を記念して建てられた万魔殿の新議事堂を訪れる。その時、温泉開発部が登場し騒ぎを起こし……万魔殿はそれを防ぐため温泉開発部と衝突するのだった。"
2683514966 = "議長の要求"
3216219097 = "温泉開発部が騒ぎを起こしたという知らせを聞いた風紀委員会が現場へ駆けつけると、温泉開発部は二手に分かれ逃げてしまう。万魔殿は戦闘中に壊れた新議事堂の責任をヒナになすり付けようとし、「ゲヘナパーティー」のメインイベントとなるピアノ演奏をヒナが担当するよう要求するのだった。"
2188512396 = "議長の哲学"
3111060133 = "パーティー用の特製料理を試食するべくパーティー会場に到着した先生。そこでいつもと違うことを言っているマコトを目撃した先生は、他の万魔殿部員たちにマコトの様子について聞くのだった。"
2921815513 = "議長の広報戦略"
3677706014 = "マコトは「ゲヘナパーティー」の広報のために念入りに準備した「物」を見せながら、自身が計画した完璧な作戦について説明するのだった。"
1869512390 = "議長の決断"
381782239 = "イロハから連絡を受けた先生。万魔殿の執務室で発見したのは、いつもと違う様子のマコトだった。マコトは突然、風紀委員会の解体を宣言し、執務室を飛び出していく。先生と万魔殿部員たちはそんなマコトを追いかけ……その後、マコトをようやく元の姿に戻すことに成功するのだった。"
189252809 = "パーティー当日"
2057531649 = "「ゲヘナパーティー」の開催まであと数時間しかないのに、まだヒナが到着せず……マコトは、ヒナが楽器演奏が苦手であることを狙い、意図的にピアノ演奏を任せていたことを明らかにする。自身の計画が成功したことに浮かれているマコトは、この事実をゲヘナ全域に公表しする。ニュースが広がるやいなやゲヘナのあちこちで眠っていた事件事故が一気に勃発するのだった。"
2327264408 = "パーティー開始"
2904008689 = "無事に会場に到着したヒナは、ゲヘナで起こったすべての問題を一瞬で解決した後、ピアノの演奏を始めるのだった。"
4181110086 = "0068 オペラより愛をこめて！"
227323543 = "暗闇の中、依頼を受けた便利屋68が動き始める！\nターゲットはギャング連合のボス「ドン·アランチーノ」。\n果たして彼女たちは、無事に依頼を遂行することができるのでしょうか？"
