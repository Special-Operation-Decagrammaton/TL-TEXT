1541422275 = "Presidente Hina. Quando chegaram as exigências egoístas do Pandemonium, fiquei preocupada com o que aconteceria……\n\nMas ao ver a presidente se esforçando, apertei o cerco para também me dedicar.\n\nComo administradora do Comitê de Disciplina, torço pela presidente Hina. Por favor, continue!"
1570765118 = "Fufu, soube da história.\n\nA presidente do Comitê de Disciplina, famosa por ser demoníaca, usando um belo vestido e tocando piano…… isso é…… como gastronomia.\n\nEstou ansiosa pela apresentação. Fufufu! Continue assim."
2407965685 = "Ouvi a história. Vai tocar piano na festa de Gehenna, né?\n\nDeve estar se esforçando agora para atender ao capricho do Pandemonium. Eu e Juri também estamos torcendo para que a apresentação termine bem.\n\nContinue assim, presidente do Comitê de Disciplina."
2286376939 = "Presidente do Comitê de Disciplina!\n\nOuvi que você vai fazer uma apresentação incrível! Isso é tão emocionante quanto desenvolver fontes termais?\n\nVou levar todo mundo para assistir! Continue assim!"
978447002 = "Presidente!\n\nComo membro do Comitê de Disciplina que mantém a ordem em Gehenna, a presidente sempre dizia para sermos justos, sem favorecimentos. Mas desta vez, todo o Comitê de Disciplina!\n\nEstamos do seu lado! Torcemos de coração pelo sucesso da apresentação! Continue assim!"
659199751 = "Presidente, não está cansada?\n\nSe sentir qualquer anormalidade, por favor, me avise. É meu trabalho verificar a saúde da presidente e do Comitê de Disciplina e tomar as medidas adequadas.\n\nAlém disso…… estou torcendo. Por favor, continue."
981979352 = "Senpai Hina!\n\nIbuki também está muito ansiosa pela sua apresentação de piano!\n\nVou torcer com todas as forças~ Ehehe!"
1958821606 = "Hina! Estou torcendo!\n\nNós! Estamos muito ansiosas pela sua apresentação! Com certeza será uma apresentação super legal!\n\nDepois vou gravar e enviar para você também! Força!"
4025554739 = "Atender aos caprichos do Pandemonium…… presidente, deve ser difícil.\n\nBem, não posso fazer muita coisa…… mas…… certo…… decidi!\n\nSe alguém tentar atrapalhar sua apresentação, eu mesma derrubarei! Então, treine! Continue assim!"
2710967621 = "Mesmo com o grande evento da Festa de Gehenna se aproximando, o que temos que fazer não muda.\n\nVigiar e agir para que ninguém se machuque animado com a festa.\n\nDepois de fazer nosso trabalho, só nos resta torcer por quem se esforça. Continue assim, presidente."
1968362706 = "Há um replay de campo em andamento.\nDeseja continuar?"
