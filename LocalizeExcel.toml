2665319081 = "Após conquistar todos os cinco santuários, surge novamente uma reação de energia de altíssima concentração dos santuários destruídos. Para a batalha final no Sexto Santuário, o grupo terá que conquistar novamente os cinco santuários anteriores."
673842062 = "Sexto Santuário (1)"
1721508695 = "Hifumi e Azusa, juntando-se à Sociedade de Estudos Gastronômicos, enfrentam o guardião do Sexto Santuário, 'Perorojira', que apareceu no distrito de Shirataki no D.U."
1977881858 = "Sexto Santuário (2)"
815268323 = "Anuncia-se que a conquista de todos os santuários da ilusão foi concluída."
2321323365 = "Último Santuário (1)"
3607360132 = "Embora os cinco santuários tenham desaparecido, revela-se que a energia está concentrada no Sexto Santuário. Antes da batalha decisiva no 'Último Santuário', o destino depende da arma secreta que Himari retira."
