1205256794 = "シーズン準備中です。"
3920080884 = "デカグラマトンは、自身を神聖な求道者と主張する人工知能システムです。現在、その信奉者である10人の預言者がキヴォトスの随所に出没しています。\n\nビナーはデカグラマトンの3番目の預言者であり、アビドスの砂漠地帯にて初めて観測されました。ビナーがなぜここに出現したのかは分かりませんが、このままにしておくには危険すぎる存在であることは間違いありません。"
3639039230 = "デカグラマトンは、自身を神聖な求道者と主張する人工知能システムです。現在、その信奉者である10人の預言者がキヴォトスの随所に出没しています。\n\nケセドはデカグラマトンの4番目の預言者であり、ミレニアム郊外にある軍需工場の生産システムを掌握していることが確認されました。ケセドがこのまま兵力の無限生産に成功してしまった場合、キヴォトスは未曾有の厄災に見舞われることになるでしょう。"
276060001 = "以前から、財政難で廃業したアミューズパーク「スランピア」で未知の怪奇現象が起きているという報告がされています。停止していたアミューズドールと各種アトラクションが真夜中に動き出し、人々を襲うという噂が、この報告を裏付けています。 \n\nアミューズドール・ゴズは、空虚に満ちた「スランピア」で一人だけのショーを続けています。その奇妙な笑顔の下に隠された本性は善か悪か。私たちがそれを推測するのは容易ではないでしょう。"
3550217605 = "トリニティの古聖堂の地下にて、正体不明の存在が発見されました。\n\nその存在「ヒエロニムス」は「Communio Sanctorum」、「聖徒の交わり」と呼ばれる人工天使シリーズを率いる存在であり、ゲマトリアが古代の教義をもとに作り上げた実験体であるという説がまことしやかに囁かれています。強大な力を持つヒエロニムスをこのまま放置しておくわけにはいきません。キヴォトスの平和のためにも、立ち向かいましょう！"
2223988532 = "デカグラマトンは、自身を神聖な求道者と主張する人工知能システムです。現在、その信奉者である10人の預言者がキヴォトスの随所に出没しています。\n\nホドは元々ミレニアムの通信ユニットAIでしたが、正体不明のAIにハッキングされてしまい、今は自らをデカグラマトンの8番目の預言者であると主張しています。ミレニアムの最先端技術が込められた演算機関の暴走とも言えます。早く止めないと、ミレニアム一帯の安全が脅かされてしまうに違いありません。"
491740630 = "本拠地までの行く手を遮るかのように、カイテンジャーたちの秘密兵器が登場しました。\n\nカイテンジャーたちはこれまでに奪ってきた資金と技術を元に、巨大な合体ロボット「KAITEN FX Mk.0」を作っていたようです。合体ロボは確かにロマンですが、これまでの行いを考えると、このまま楽しく見ているというわけには行かなそうです。"
1866624346 = "正体不明の巨大な何かがD.U.の近くの海域で観測されました。 どうやら情報によると、かつて海に沈んだとされる、モモフレンズのぬいぐるみの姿をしているようです。\n\nどうしてこのようなことになったのかは分かりませんが、まずは進撃を防がなければなりません！"
3601545918 = "昔、財政難で閉鎖したアミューズメントパーク「スランピア」で、不思議な現象の発生が報告されています。それは停止したはずのドールや各種アトラクションが真夜中に再び動き出し、人々を襲撃するという噂です。\n\nそのドールであるシロとクロが再び動き出した理由は分かりませんが、過去の華やかだった頃のアミューズメントパークのパレードを再現しようとしている、ということは明らかなようです。"
3682198469 = "キヴォトスのどこかに存在する廃墟となった地下神殿にて、歪んだ神秘によって顕現した人工天使が観測されました。\n\nグレゴリオは「聖徒の交わり」と呼ばれる人工天使シリーズの完成形であり、ゲマトリアの実験で生まれた謎の怪物です。今もその怪物は地下神殿でオルガンの演奏を続けています。旋律の終わりに何が待ち受けているのか……それは誰も知りません。"
2092560489 = "矯正局から脱獄した「七囚人」の一人、「災厄の狐」がホバークラフトを奪って暴れているとの情報が入ってきました。\n\n水着姿の彼女が無差別な破壊を行っている理由は分かりませんが、このまま彼女を放っておけばキヴォトスの浜辺は火の海になるでしょう。"
1904549173 = "百鬼夜行連合学院で語り継がれてきた怪談、「幻魎百物語」が顕現しました。\n\n賑やかなお祭りを荒らす「猫鬼クロカゲ」は、実在する存在なのか――それとも、誰かの手によって生み出された創作に過ぎないのでしょうか？真相は定かではありませんが、取り返しがつかない事態になる前に、怪談に終止符を打つ時です。"
1142087454 = "デカグラマトンは、自身を神聖な求道者と主張する人工知能システムです。現在、その信奉者である10人の預言者がキヴォトスの随所に出没しています。\n\n極地研究基地の無人探査機が正体不明のAIのハッキングを受け、自己進化を繰り返した姿がデカグラマトン5番目の預言者であるゲブラです。自ら「仲裁者」を名乗るゲブラを放置しておけば、極地航路のみならず、キヴォトス全体の物流網に危険が及ぶ可能性があります。"
3983422512 = "デカグラマトンは、自身を神聖な求道者と主張する人工知能システムです。現在、その信奉者である10人の預言者がキヴォトスの随所に出没しています。\n\nイェソドはデカグラマトンの9番目の預言者であり、今のところ基となった構造体が存在しないものと推測されています。作られた目的も不明ですが、イェソドをこのまま放っておけないということだけは明確です。"
2093431664 = "「ドラム缶ガニ」は、キヴォトスの都市伝説「ドラム缶の中に潜むカニ」を元に誕生した、巨大なカニの姿をした怪獣です。\n港のコンテナを簡単に壊せるほど強力なハサミを持つこの化け蟹は、港湾の施設の破壊を続け、徐々に被害を拡大させています。\n\nこの巨大な怪獣がどこから来たのか、何を狙っているのかは分かりませんが……幸い、この怪獣の思考は普通のカニと大差ないようです。"
