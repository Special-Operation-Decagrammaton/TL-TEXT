1967708666 = "Novo membro temporário da C&C"
2816760860 = "A pedido do Seminário, a C&C e o Sensei se infiltram em um navio de cruzeiro de outra escola para capturar a aluna problemática de Millennium."
1134085300 = "Vamos agir com elegância (1)"
2193456480 = "Para capturar a aluna chamada 'Kurosaki Koyuki', apelidada de 'Coelha Branca', a C&C e o Sensei se infiltram no 'Navio do Velocino de Ouro', um dos navios de cruzeiro da 'Escola de Ensino Médio Marítimo Odisseia'. Embora Yuuka tenha pedido para 'agir com elegância', Neru já começa a agir como de costume logo na infiltração."
2483236395 = "Vamos agir com elegância (2)"
1884799725 = "Conseguindo despistar os perseguidores, a C&C se infiltra em uma cabine. Aparentemente, há regras neste navio, então elas trocam os uniformes de empregada por roupas de coelhinha e começam a missão de verdade."
1056530700 = "Linha de raciocínio de sempre (1)"
1693954578 = "Chegando à sala de sistemas, Akane tenta começar a controlar o sistema. Enquanto conversam sobre a Coelha Branca, percebem que Akane já plantou C4 como de costume……?"
1022905949 = "Linha de raciocínio de sempre (2)"
1449739310 = "Akane, animada, destrói a sala de sistemas como sempre. O grupo cobre Akane, que se culpa, e começa o Plano B."
1520912610 = "Interrogatório impiedoso"
565467883 = "O grupo acorda uma guarda coelhinha que haviam capturado antes e tenta obter informações. Enquanto pensam em como fazer, Karin se oferece. Ela estende a mão para a guarda coelhinha e……"
3624501163 = "Mudanças e reviravoltas, como sempre"
451418386 = "Embora a guarda coelhinha tenha desmaiado, eles obtêm a informação 'Sala Premium' e decidem invadi-la. Quando Neru e o Sensei começam a procurar, encontram facilmente a 'Coelha Branca', mas, de repente, a imagem de Asuna aparece em uma grande tela, e sua presença é descoberta."
2744902706 = "A partir de agora, é a C&C de sempre (1)"
1270600116 = "Neru e o Sensei são colocados em uma cela em desvantagem numérica. Durante a conversa com a 'Coelha Branca', Kurosaki Koyuki, Akane e Karin aparecem, mas também estão capturadas."
1477170984 = "A partir de agora, é a C&C de sempre (2)"
3631747017 = "A 'Coelha Branca', confiante por ter capturado Neru, Akane, Karin e o Sensei, ri alto. Em seguida, Asuna aparece e pensa que capturou todos, mas Asuna, sem que se soubesse, se tornou uma VIP neste navio. A situação vira, e a 'Coelha Branca' passa a ser perseguida."
3892929799 = "Caça à Coelha (1)"
1875159880 = "Agora é Neru quem ri alto enquanto persegue a 'Coelha Branca' aos prantos. Akane, Karin e o Sensei observam e conversam sobre pará-la antes que fique perigoso."
2450097182 = "Caça à Coelha (2)"
1604146950 = "A 'Coelha Branca' tenta escapar de drone do navio como último recurso, mas é alvejada por Karin e capturada. A C&C pensa que a missão terminou com sucesso, mas……?"
2677397330 = "Show especial de Hatsune Miku"
747922562 = "A cantora virtual Hatsune Miku finalmente chega a Kivotos com um novo corpo e uma nova música!"
