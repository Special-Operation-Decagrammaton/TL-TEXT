1693609049 = "O que não muda"
2809478263 = "Um certo dia na Federação Escolar Red Winter"
1881991320 = "Um certo dia na Classe Especial nº 227"
3129722182 = "Em um certo dia frio de inverno, Nodoka e Shigure tentavam arrancar um poste de madeira para usar como lenha. Quando o arrancaram, para sua surpresa, água quente jorrou de baixo! Nesse momento, o Departamento de Desenvolvimento de Fontes Termais de Gehenna aparece e transforma toda a área ao redor do antigo prédio em uma estação termal."
124314717 = "Não ouvi falar em não autorizado"
590648767 = "Quando o Sensei visita Red Winter, encontra Cherino cochilando como sempre. Durante a conversa, descobre-se que, sem o conhecimento de Cherino, uma fonte termal foi criada em Red Winter. Indignada por não ter ouvido falar, Cherino se dirige ao antigo prédio com um novo tanque."
1823415428 = "Bem-vindo à Estação Termal nº 227!"
2338205529 = "Ao chegar ao antigo prédio, Cherino e seu grupo se surpreendem com a aparência completamente transformada da 'Estação Termal nº 227'. Nodoka e Shigure, que se tornaram as proprietárias, conquistam o grupo da secretaria de Red Winter com bolinhos de fonte termal. Em seguida, Nodoka leva o Sensei a uma fonte termal privativa especial."
488046043 = "Olhar suspeito"
1111671300 = "Enquanto aproveitava a fonte termal, o Sensei ouve uma voz de algum lugar. A voz é de Mel, da Frente de Libertação do Conhecimento. Ela diz que veio à estação termal em busca de ideias para uma revista doujinshi. Mel começa a discutir com Nodoka, que aparece depois, e partem para a luta diante do Sensei na fonte."
2551825690 = "Negociação suspeita"
2970020116 = "Mel, derrotada na luta, consegue se reconciliar mostrando 'sinceridade' a Nodoka. O Sensei, incentivado por Nodoka, vai em direção ao jardim."
2115498113 = "Trabalho para o Departamento de Obras!"
299148182 = "No caminho para o jardim, Nodoka e o Sensei encontram alunas do Departamento de Obras. Elas dizem que estão protestando porque, com a construção de uma atração de Red Winter por alunos externos, seu orgulho foi ferido. Nodoka tenta convencê-las, mas não é ouvida, e a luta começa."
2575633767 = "Morse para o Departamento de Obras!"
27949908 = "Após a luta, Nodoka e Minori ainda não se entregam. Então Shigure aparece com um quente 'Morse'. Apreciando o sabor e o calor, o Departamento de Obras se alegra e, seguindo a sugestão de Shigure, mergulha na fonte termal."
3696228207 = "Férias de verão de um certo membro do Comitê de Disciplina!?"
4153367937 = "Quando o Sensei vai à sala de descanso, lá está Chinatsu, do Comitê de Disciplina de Gehenna. Ela estava aproveitando uma cadeira de massagem, mas parece que veio a trabalho, deixando um aviso sobre o Departamento de Desenvolvimento de Fontes Termais e indo embora."
1351623494 = "A conspiração do Departamento de Desenvolvimento de Fontes Termais"
1967122534 = "Enquanto passeava pelos arredores, o Sensei encontrou Cherino com roupa de banho, com frio. Cherino, fascinada pelo charme da Estação Termal nº 227, pensa em transferir para Red Winter o Departamento de Desenvolvimento de Fontes Termais de Gehenna que a construiu. Para jurar lealdade a si, Cherino tenta condecorá-las, mas parece não ter efeito. Depois, ao saber do plano de 'explodir toda a área autônoma de Red Winter' durante a conversa, Cherino e as outras entram em conflito com o Departamento de Desenvolvimento de Fontes Termais."
3915830261 = "Remoção, remoção!"
242528877 = "Cherino e as outras impedem a conspiração do Departamento de Desenvolvimento de Fontes Termais. Mas Nodoka, que apareceu por acaso, não aceita o fato de que a Estação Termal nº 227 terá que fechar. Resistindo, Nodoka contrata o Departamento de Obras no local e parte para a luta contra Cherino."
2923230343 = "O que não muda"
3703937299 = "Nodoka e o Departamento de Obras são derrotados pelo 'Purificador nº 1'. Nodoka, mergulhada na tristeza, chora, dizendo que tudo já estava no fim. Shigure se aconchega a ela e diz docemente que nada acabou. Cherino também decide preservar o prédio, e tudo parecia estar se acertando quando o Departamento de Desenvolvimento de Fontes Termais aparece. Seguindo um plano que a presidente Kasumi havia preparado, a Estação Termal nº 227 é explodida –"
4161771854 = "Um certo dia na Federação Escolar Red Winter"
2833699108 = "A Estação Termal nº 227 foi espetacularmente explodida. Nodoka se entristece com a paisagem árida, mas diz que está tudo bem porque todos, incluindo o Sensei, estão ilesos. Depois, para lavar os corpos sujos pela explosão, o grupo de Red Winter vai ao único banho ao ar livre que sobrou. Todos entram ruidosamente na fonte termal e falam sobre o futuro."
1633221653 = "Rapsódia de Ano Novo nº 68"
