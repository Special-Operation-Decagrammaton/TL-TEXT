311979596 = "Feliz Ano Novo!"
3328829686 = "Crise do Suzumetei"
955896544 = "Um dia, próximo ao fim do ano, os membros da Sociedade de Estudos Gastronômicos se divertem comendo no Suzumetei. Alegres por terem encontrado uma boa loja depois de muito tempo, descobrem que o Suzumetei vai fechar, e eles podem ser os últimos clientes…… Enquanto lamentam o fechamento, Haruna diz ter uma ótima ideia……?"
1617718142 = "Preciso de ajuda! (1)"
2315750929 = "A ótima ideia de Haruna era pedir ajuda externa. Haruna sequestra Fuuka, Juri e o Sensei, expõe a situação difícil do Suzumetei e pede cooperação. Decidem primeiro ir à loja ouvir a história, e encontram a Gangue do Capacete atacando o Suzumetei."
1371253993 = "Preciso de ajuda! (2)"
1803161784 = "O grupo consegue repelir a Gangue Gourmet do Capacete e ouve os detalhes da proprietária do Suzumetei. A maioria das lojas da rua comercial se tornou franquia, oferecendo comida barata, tornando difícil continuar a loja. Com um clima de desistência, Fuuka decide reconstruir o Suzumetei."
1402169835 = "Cozinha da Fuuka"
1367178329 = "Para melhorar a gestão do Suzumetei, é essencial conseguir fornecedores mais baratos e de alta qualidade. Fuuka apresenta o Piyo Supermercado, que eles costumam usar, e dá dicas de como dar aquele toque especial na comida. Enquanto passam o tempo animadamente, a Gangue Gourmet do Capacete retorna –"
3044075053 = "Não pense que ganhou!"
3641325415 = "Derrotados por Haruna, os membros da Gangue Gourmet do Capacete, ao saberem que ela é da Sociedade de Estudos Gastronômicos, tremem de medo e pedem reforços. Eles deixam escapar que estão ali por ordem do Nyao Food –"
503504063 = "Vocês, plebeus, não entenderiam!"
2331290713 = "Nyamoto Kan, presidente da rede 'Nyao Shokudou' e da Nyao Food, se preocupa com o destino do Suzumetei. Enquanto isso, a proprietária, ao saber que a Gangue Gourmet do Capacete era aliada da Nyao Food, decide não mais resistir a uma grande empresa e aceita a franquia. Fuuka e Haruna a acalmam e propõem fazer uma degustação do novo Suzumetei."
279525189 = "A conta, por favor"
220690413 = "Fuuka e Juri realizam uma degustação gratuita do Suzumetei na rua comercial. A reação dos transeuntes é boa, mas fica evidente o problema da faixa de preço. Para rever os preços, o grupo decide procurar fornecedores mais baratos."
2062962546 = "Está esgotado? Isso não é possível…… (1)"
1711061225 = "Juri vai à rua comercial comprar ingredientes, mas é informada em todas as lojas de que houve uma compra em massa de última hora, e é barrada. A Gangue Gourmet do Capacete aparece e a adverte para não se aprofundar."
929096310 = "Está esgotado? Isso não é possível…… (2)"
3987649773 = "Questionando se não é uma manobra muito grande para apenas fechar uma loja individual, é revelado que é para servir de exemplo para as outras lojas. Ainda há lojas que não se aliaram à Nyao Food, e elas têm no Suzumetei um porto seguro. O grupo decide que assim não vão a lugar nenhum e invade a sede da Nyao Food."
1175748688 = "Então, é um duelo! (1)"
1142871206 = "Ao ouvir a história de Izumi e Akari, Haruna decide invadir a sede da Nyao Food – de olho na gastronomia que existe após essa luta."
1909478340 = "Então, é um duelo! (2)"
3240831599 = "A Sociedade de Estudos Gastronômicos ataca a sede da Nyao Food e devora o depósito de ingredientes. Diante do enorme prejuízo, o presidente Nyamoto os chama para uma reunião. Mas a conversa não avança e, no final, decidem resolver com um duelo de culinária entre o Suzumetei e a Nyao Food."
3591620024 = "Fim da linha"
974434577 = "Diante de Haruna, que anuncia que aceitou o duelo de culinária com a Nyao Food, Fuuka se irrita, perguntando quem vai cozinhar. Haruna se desculpa e fala sobre sua convicção. Fuuka, contrariada, decide ajudar. Enquanto isso, Juri, que foi comprar ingredientes, enfrenta sabotagem da Nyao Food –"
2678284265 = "A determinação de duas"
3660850508 = "Próximo ao duelo, Haruna e Fuuka conversam. Suas convicções, suas apreensões, o futuro…… Não querem apenas ver a loja ser destruída. Empurradas pelas palavras de Haruna, Fuuka renova sua determinação."
3490177281 = "Dia do destino"
2871705816 = "Dia do duelo do Osechi, o local está movimentado, com a presença da reportagem da Escola Cronos. O destino do Suzumetei, que preparou cuidadosamente 400 porções de Osechi sem sucumbir à sabotagem da Nyao Food, é –"
3479689653 = "Feliz Ano Novo!"
1405977639 = "Assim, o grupo, que venceu o duelo do Osechi, pode receber o Ano Novo com sentimentos renovados."
