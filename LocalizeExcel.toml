1851183371 = "Prólogo"
89706152 = "A Empresa de Conveniência 68, trabalhando na casa de ópera, percebe que está no mesmo local que o Sensei por acaso."
993139401 = "A negócios (1)"
498565445 = "O Sensei visita a casa de ópera. Aru diz que vai ajudar o Sensei e o guia pela casa de ópera. Impressionado por Aru ter informações sobre a estrutura do prédio e as pessoas envolvidas, o Sensei pergunta o motivo. Aru se apressa e diz que é 'a negócios', sem revelar seus verdadeiros sentimentos."
904765692 = "A negócios (2)"
2182709110 = "Com uma explosão repentina, Haruka, Mutsumi e Kayoko aparecem. O Sensei se junta a todos para controlar a situação e pergunta o motivo de estarem na casa de ópera."
4116259171 = "Mais ao estilo hard-boiled"
2413738832 = "A missão da Empresa de Conveniência 68 é sequestrar 'Don Arancino', o chefe da gangue. O Sensei ouve a situação e decide não interferir."
4217288089 = "Pessoas suspeitas (1)"
2431873477 = "Haruka, Mutsumi e Kayoko descobrem agentes infiltrados disfarçados dentro da casa de ópera. Ao mesmo tempo, encontram bombas que eles plantaram. Ouvindo que há mais remanescentes, a Empresa de Conveniência 68 decide revistar a casa de ópera com o Sensei."
402480360 = "Pessoas suspeitas (2)"
2947210386 = "Após revistar a casa de ópera, a Empresa de Conveniência 68 obtém informações de que seu alvo, 'Don Arancino', apareceu."
1538647403 = "Situação inesperada (1)"
1448168568 = "Enquanto observam a chegada de Don Arancino, a Empresa de Conveniência 68 nota a presença de espectadores que parecem agitados."
3746301441 = "Situação inesperada (2)"
2834066436 = "Todos os espectadores na casa de ópera eram, na verdade, agentes infiltrados mirando Don Arancino. Fugindo dos agentes, Don Arancino usa seu 'trunfo' preparado. A Empresa de Conveniência 68, que o persegue, encontra o 'trunfo'."
3486916526 = "Parece experiente, mas desajeitado (1)"
827737938 = "O 'trunfo' de Don Arancino era Saori, uma cadeadista contratada como guarda-costas. Saori cobre a retirada de Don Arancino. A Empresa de Conveniência 68 os persegue."
2337333499 = "Parece experiente, mas desajeitado (2)"
2651395978 = "Julgando que será alcançada com a velocidade de retirada, Saori decide por um método mais eficiente."
2341248949 = "Mal-entendido enorme (1)"
1261692501 = "Saori foge em alta velocidade, e a Empresa de Conveniência 68 a persegue. Aru fica desanimada por ter dito que ajudaria o Sensei, mas só está recebendo ajuda. O Sensei a encoraja, dizendo que os alunos são mais importantes que seu trabalho."
4111251961 = "Mal-entendido enorme (2)"
1351326142 = "Saori finalmente se junta aos membros da gangue de Don Arancino. No entanto, as armas dos membros apontam para Saori, não para a Empresa de Conveniência 68."
2596113209 = "Desfecho enorme (1)"
2901309265 = "Saori está confusa com a situação. Aru decide ajudá-la, e começa a luta contra os membros de Don Arancino."
4014764348 = "Desfecho enorme (2)"
2841436091 = "Saori luta contra os membros de Don Arancino, usando uma lata de lixo no meio da rua como cobertura. No entanto, dentro dela havia algo perigoso que alguém descartou. Nesse momento, um projétil de granada se aproxima."
1334158071 = "Às vezes acontece"
291649493 = "Antes do amanhecer. O Sensei, a Empresa de Conveniência 68 e Saori se reúnem em uma barraca e relembram os acontecimentos do dia."
2578774505 = "Indo e vindo"
3566222274 = "Alunas de Gehenna vêm a Hyakkiyako para uma excursão escolar. E o comitê organizador do festival tem que receber as alunas de Gehenna sem nenhum preparo! Será que conseguirão guiar com sucesso as travessas alunas de Gehenna?"
349911502 = "Pressentimento como um raio de céu claro"
