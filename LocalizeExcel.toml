656130952 = "Dizem que, todos os anos, o Pandemonium organiza uma festa convidando figuras notáveis de várias áreas. O objetivo da festa seria exibir a autoridade do Pandemonium."
3296347737 = "O conselho estudantil da Academia Gehenna, onde se diz que apenas a elite pode entrar. No entanto, independentemente dos requisitos de entrada, dizem que suas atividades diárias são um pouco peculiares."
241828489 = "Muitos dos tumultos que incomodam o Comitê Disciplinar são orquestrados por alguém. Existe o boato de que o mentor de tudo isso é sempre a mesma pessoa."
4211417711 = "Uma instalação antiga no canto do distrito de Gehenna. Dizem que às vezes é usada como um refúgio para estudantes que querem evitar olhares alheios."
1606103230 = "Um piano antigo que estava no antigo prédio escolar. Como alguém esteve cuidando dele até pouco tempo atrás, ele está em perfeitas condições de uso."
74387565 = "Um clube de escala gigantesca, chamado até de nível mamute dentro de Gehenna. É um grupo que se une pela paixão pelo desenvolvimento de fontes termais e causa acidentes com frequência."
3868968517 = "Uma grande operação incrível planejada pelo Departamento de Desenvolvimento de Fontes Termais. Um plano absurdo que, mesmo após ouvir a explicação, é impossível de entender."
848014088 = "A carismática chefe que lidera o Departamento de Desenvolvimento de Fontes Termais. Ela possui uma liderança ousada e impecável, mas diante da presidente do Comitê Disciplinar, ela é como um rato diante de um gato."
1351474076 = "Uma história mencionada por Kasumi em um tom enigmático, cuja veracidade é incerta. Gehenna é um lugar onde segredos inacreditáveis como este estão espalhados por toda parte."
2177842261 = "Literalmente, um monstro de identidade desconhecida. Existem coisas no mundo que são impossíveis de compreender, mesmo quando aparecem bem diante de nós."
1914035094 = "Uma garota séria que se dedica aos estudos de culinária no Departamento de Alimentação junto com Fuuka. Dizem que há fãs secretos que se emocionam com sua dedicação."
3208368410 = "Um clube notório até mesmo em Gehenna. Vilões que possuem habilidade, conhecimento especializado e, acima de tudo, violência."
3042483397 = "Uma panqueca gigante de identidade desconhecida que apareceu em Gehenna. Embora seja um evento surpreendente, parece que não é algo tão raro em Gehenna."
1792078009 = "Dizem que, para a festa de Gehenna, o Pandemonium encomendou pratos ao Departamento de Alimentação. No entanto, parece que o cozinheiro não é a chefe do departamento..."
654318302 = "Um objeto cuja existência não faz sentido. Isso é a definição de desperdício de orçamento."
1931459361 = "Mesmo para um encrenqueiro... não, é justamente por ser um encrenqueiro que existe um senso de dever que se sustenta, essa é a lógica das ruas secundárias. No entanto, quando o outro lado é a presidente do Pandemonium, as coisas complicam..."
1421764132 = "A pomada usada pelo departamento de medicina de emergência é tão eficaz que há rumores de que cura tudo apenas passando. É o tipo de coisa que vale a pena ter pelo menos uma."
2017029991 = "Olhando de frente, de trás ou de lado, é apenas um panfleto suspeito. Sério, muito suspeito..."
4052776956 = "Estão circulando rumores de que a presidente Makoto causou uma grande confusão no distrito autônomo. Na verdade, isso é algo comum no dia a dia dela, então não há nada de estranho nisso."
2835023066 = "Mesmo que a personalidade mude por causa de uma hipnose, a parte problemática continua a mesma. Parece que a essência de uma pessoa não muda tão facilmente assim."
3349322356 = "O que aconteceu enquanto eu estava fora"
