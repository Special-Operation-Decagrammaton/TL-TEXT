1117978599 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]「不良の中にはスケバンを名乗るものもいます！一体どういう違いがあるのか、本官にはちょっと……」\n-ヴァルキューレ警察学校、生活安全局、中務キリノ[/i][-][/c]"
2774820117 = "[c]自分のフェーズ開始時：[/c]味方ストライカーのスペースがいっぱいになっている場合、HPを[c]{param;BasePower}[/c]回復する。"
426220014 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]「あれ？あの子、この前ボランティアで交通整理してた子じゃない？みんな真面目だよね～」\n-ヴァルキューレ警察学校、生活安全局、合歓垣フブキ[/i][-][/c]"
1132320876 = "[c]自分のフェーズ終了時：[/c]味方ストライカーのスペースがいっぱいになっている場合、自身にシールドを[c]{param;BasePower}[/c]付与する。"
3384243049 = "すべてのストライカーにダメージを与える。\n\n\n[c][75b4c0][i]キヴォトス全土で活動する不良集団、スケバンの伝説。\n妹たちのために自身を犠牲にした英雄譚は、スケバンであれば号泣必須らしい。[/i][-][/c]"
3391762953 = "[c]ゲーム開始時：[/c]他[c]{tag;Sukeban}[/c]ストライカーのEXスキルの威力とHPが[c]2[/c]増加する。\n\n[c]自分のフェーズ開始時：[/c]自身が一人残った場合、自身のEXスキルの威力とHPが[c]5[/c]増加する。[c]（ゲーム当たり1回）[/c]"
