3211516616 = "Doutrina antiga"
1651668591 = "Maestro fala com o Sensei sobre 'Hieronymus', criado pela Gematria."
825599009 = "Vá para a base dos Kaiten Rangers!"
3770390420 = "Momoka, do Conselho Estudantil Geral, pede ao Sensei que vá até a base dos Kaiten Rangers, criminosos procurados de Kivotos, para impedir seus planos."
3686001431 = "Mundo de símbolos"
3791549782 = "Decalcomania e Golconda explicam sobre os fenômenos estranhos que ocorrem na cidade e a 'Biblioteca de Contos Incessantes'."
3878829384 = "Hod: A glória provada pelo brilho"
1549256127 = "Um homem suspeito de terno preto fala com o Sensei sobre 'Hod', o oitavo profeta de Decagrammaton."
654803130 = "O show deve continuar."
333562945 = "No parque de diversões desativado, naquele espaço vazio sem plateia, Amuse Doll continua sua performance. Golconda e Decalcomania dizem sobre isso: mesmo que seja uma arte sem público, não observada, 'o show deve continuar'."
559074549 = "Sobre a imortalidade"
1512825208 = "Maestro fala com o Sensei sobre 'Gregorio', criado pela Gematria."
744003966 = "Invasores da praia"
2558815671 = "Momoka explica ao Sensei sobre os prisioneiros que escaparam do Centro Correcional de Kivotos e o incidente do hovercraft."
3432198937 = "O fim da história de terror"
114297709 = "Kuzunoha fala sobre o Hyakumonogatari 'Nekoki Kurokage'."
1672391118 = "Gevurah: O árbitro corajoso que transcende a razão"
838031497 = "Momoka parece ocupada, o que é raro para o Departamento de Trânsito. Diz que um mecha autônomo de identidade desconhecida apareceu na rota polar através do mar gelado, bagunçando a rede de logística, e ela não consegue nem comer seu salgadinho favorito sabor mentaiko. Assim, o Sensei recebe a missão de derrotar aquele mecha autônomo – Gevurah – para restaurar a rota."
3840529434 = "Yesod: O purificador que controla a fundação"
4275867406 = "Heyne, do Conselho Estudantil Geral, chama o Sensei e pede que ele investigue o gigante de metal 'Yesod' que apareceu em um mar sem rotas. Dizendo que enfrentar uma missão perigosa é 'treinamento', Heyne está ocupada com trabalho administrativo. Por isso, pede que o Sensei vá ao local em um navio de transporte preparado por um colaborador misterioso."
4008508992 = "Noite adentro com Roa"
1286632062 = "'Noite adentro com Roa' é um talk show de Orwell. Esta noite, apresenta o 'Caranguejo do Tambor'."
3999941498 = "Bem-vindo à conveniência 'Anjo 24'!"
1592333502 = "Sora, que trabalha meio período, explica sobre a loja."
1001831599 = "O que é a Câmara de Artesanato?"
3598979112 = "Rin, do Conselho Estudantil Geral, apresenta ao Sensei a 'Câmara de Artesanato' deixada pela presidente do Conselho Estudantil Geral."
2632538551 = "Exercício de tiro conjunto"
2838798800 = "Momoka explica sobre o Exercício de Tiro Conjunto."
1592394928 = "Se houver cooperação, o trabalho burocrático também fica mais leve?"
3726966875 = "O Sensei encontra Ayumu, do Conselho Estudantil Geral, e eles decidem ajudar um ao outro."
225688943 = "Aoi aparece"
819574793 = "Aoi, a diretora financeira do Conselho Estudantil Geral, decide ajudar com as tarefas burocráticas junto com o Sensei para aliviar a carga de Rin."
3750154448 = "Grande batalha"
3893204508 = "Rin e Ayumu, do Conselho Estudantil Geral, pedem ao Sensei que use a sala de operações para resolver vários incidentes."
3988903529 = "A fúria de Set"
1759338853 = "Um Subterrâneo explica ao Sensei sobre a Fúria de Set, uma das constelações dos deuses."
3423238394 = "Chokhmah: O antigo guardião que protege o reino"
2950291436 = "Um fenômeno anômalo ocorreu em um vulcão da região polar de Kivotos. Parece estar relacionado a Decagrammaton, e Rin explica."
103130404 = "Tiferet: O belo redentor que louva a adversidade"
3179216409 = "Aoi diz que uma certa estrutura foi descoberta na tundra. Originalmente era um depósito de sementes da Federação Escolar Red Winter, mas agora é um local abandonado. No entanto, há muitos pontos suspeitos, como um sinal de socorro com frases estranhas emitido intermitentemente por uma IA avançada. O Sensei, aceitando o pedido de investigação, parte para o local."
2773600499 = "Festa animada de flores de cerejeira!"
2374470965 = "Recebendo um telefonema repentino da garota-propaganda da tradicional cafeteria 'Hyakuya', o Sensei decide ir ao festival 'Hyakunoharu no Sakura Hanamatsuri' da Academia Hyakkiyako! No entanto, o que encontra por lá são crianças problemáticas e garotas ninja em fúria! Agora, começa uma confusão de festival!"
