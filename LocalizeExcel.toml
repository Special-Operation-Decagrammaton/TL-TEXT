2258818932 = "O que rolou? O porto foi bombardeado?"

863430597 = "Dizem que a munição guardada no armazém da Família Carpaccio explodiu. Eles não vão conseguir renovar o contrato. Fonte é um conhecido da administração portuária."

420002314 = "Aqueles caras da Família Carpaccio só viviam enchendo o saco dos pedestres, não trabalhavam direito... colheram o que plantaram."

954782505 = "Não, isso não parece explosão. Em outras redes sociais, vi relatos de um monstro gigante destruindo o porto... será que o Conselho Estudantil Geral está abafando?"

