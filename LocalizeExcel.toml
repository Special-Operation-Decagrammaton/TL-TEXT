2695129165 = "Abraçando o céu, descendo a encosta (2)"
1276490127 = "Saudades do amigo que se foi"
3799145208 = "Trailer"
1728661338 = "Carta de longe"
1701341732 = "Cherino recebe de Tomoe a notícia do intercâmbio com Shanhaijing. Ela decide ir a Shanhaijing, mas……"
2418942949 = "Lavar as mãos, arrumar a aparência"
2764259254 = "Kisaki pede conselhos ao Sensei sobre o intercâmbio com Red Winter."
3678077766 = "As águas correntes se reúnem em um só lugar"
1707942794 = "Após uma pequena confusão, os três representantes de Red Winter trocam de roupa para a vestimenta de Shanhaijing e participam do intercâmbio."
3377368072 = "O tirano separou-se da mulher"
2804132110 = "Os três representantes de Red Winter assistem à Ópera de Pequim e conhecem Kaguya, a presidente do clube de ópera."
3894031835 = "Percorrendo o mundo, contemplando o rio"
3932029858 = "Os três representantes percorrem Shanhaijing. Alguns alunos de Shanhaijing acham estranho."
546846341 = "Não percebe que as nuvens se desfazem"
702693080 = "Enquanto isso, Kaguya se encontra secretamente com Kanai Shin, uma das Sete Prisioneiras."
3734638625 = "O bambu na neve não se curva"
2618362757 = "Kisaki visita o bosque de bambus com os representantes. Nesse momento, sua saúde piora subitamente e ela desmaia."
1310141378 = "Na floresta de Yuzhou"
590185042 = "Kisaki revela ao Sensei o segredo que carregava. Nesse momento, recebe uma ligação de Kaguya, que anuncia uma nova ópera."
1580804745 = "Ouvindo as palavras da marionete"
2672027241 = "Kaguya apresenta uma nova ópera e denuncia Kisaki."
2423264712 = "Correndo, subindo a montanha (1)"
3064005150 = "Mina e Marina se unem para conter o clube de ópera."
3537805872 = "Correndo, subindo a montanha (2)"
3904114626 = "Em desvantagem numérica contra o clube de ópera, a situação fica crítica, mas……"
2584552240 = "Abraçando o céu, descendo a encosta (1)"
2115515089 = "Kisaki é encurralada. O reforço da secretaria de Red Winter, incluindo Cherino, ajuda a afastar o clube de ópera."
2292285379 = "Abraçando o céu, descendo a encosta (2)"
3142347033 = "O plano do clube de ópera falha, e sua presidente, Kaguya, é detida."
3452699071 = "Saudades do amigo que se foi"
1149780929 = "O intercâmbio termina com sucesso, e tudo parece resolvido…… mas a conspiração de Kanai Shin continua."
4118775213 = "Trailer"
4002183689 = "Um 'fenômeno' de identidade desconhecida abala Shanhaijing. O clube de ópera se move novamente no submundo – em meio à confusão, a autoridade do Portão Xuanlong é questionada. E agora, a verdade sobre Kisaki e Kai é revelada."
3476922296 = "Chegada das cinco poeiras"
4264014329 = "Preste a ocorrer o tradicional 'Festival da Sombra da Lua' na Escola Secundária de Alto Nível de Shanhaijing, um clima tenso paira desde o intercâmbio com a Federação Escolar Red Winter. Nesse meio tempo, um fenômeno estranho ocorre……"
3039110754 = "Preparativos para o festival"
3427285460 = "Fenômeno anômalo"
703145376 = "Boatos"
2870352313 = "Adultos e crianças, crianças, crianças."
