2085930861 = "Canção de Natal"
255082210 = "Natal em Kivotos!"
4167041875 = "Manhã de Natal com neve caindo. O Sensei está com Serina e Hanae vestidas de Papai Noel, preparando o trabalho voluntário. Quase tudo pronto, a líder Mine parte para patrulhar Trinity. Despedindo-se de Mine, que se juntará depois, o Sensei e as outras vão para o local do trabalho voluntário."
606569055 = "Segredo e jardim"
942159035 = "No caminho, ouvem que o Comitê de Justiça vai realizar uma festa de Natal. Serina e Hanae ficam felizes por o Comitê de Justiça, que sempre tem dificuldades, estar aproveitando o Natal."
2280920957 = "Os Miseráveis……?"
3046061777 = "Apesar de ser Natal, Hasumi, Tsurugi e Mashiro do Comitê de Justiça enfrentam delinquentes em um beco. Eles os encurralam e recuperam 'aquilo'. Os delinquentes, com seus planos frustrados, veem o Sensei e a Ordem de Resgate a caminho do trabalho voluntário e sorriem maliciosamente, com uma ideia."
3517655244 = "Pesadelo no Natal"
3684306682 = "O Sensei e a Ordem de Resgate distribuem os presentes preparados e pedem doações. Nesse meio tempo, um delinquente que passa, ferido, diz que o Comitê de Justiça roubou seu frango importante."
1420301580 = "Resgate Express"
2915910172 = "Serina e Hanae, ao ouvir a triste história dos delinquentes, se preocupam com o fato de que há pessoas que não alcançam com seu resgate. Mine, ouvindo a história, se arrepende de sua incompetência e imediatamente vai ao local da festa de Natal do Comitê de Justiça."
186128367 = "Guerra atordoante"
34322318 = "O Comitê de Justiça alugou um café e estava aproveitando uma pequena festa de Natal. Esquecendo a correria do dia, desfrutavam de um breve descanso quando Mine, da Ordem de Resgate, aparece e os interroga sobre os delinquentes – Diante de Mine, que saca a arma sem ouvir os fatos, Tsurugi e Mashiro são forçadas a contra-atacar."
3152503825 = "Contos dos jovens (1)"
486440598 = "Com a chegada de Mine para protestar, um grande estrondo ecoa no local da festa do Comitê de Justiça. Hasumi também aparece ao ouvir o barulho, mas, irritada com Mine que não consegue entender a conversa, decide lutar."
847967838 = "Contos dos jovens (2)"
3387101415 = "Durante a luta, Hasumi finalmente descobre o motivo do ataque de Mine – e quando está prestes a dizer que é um mal-entendido, um terceiro invasor aparece."
1131207087 = "Morro dos Ventos Uivantes"
230232017 = "A Ordem de Resgate ouve do Comitê de Justiça sobre a confusão causada pelos delinquentes. Tudo começou com delinquentes tentando vender o apimentado 'Frango do Fogo do Inferno' que ninguém queria. Sabendo da história, o grupo se une e subjuga os delinquentes."
3422854071 = "Sonho de uma noite de inverno"
3002551130 = "Refletindo sobre a série de eventos, a Ordem de Resgate pede sinceras desculpas. Hasumi ri, dizendo que não se importa, já que o mal-entendido foi resolvido, e convida o grupo para a festa. Assim, todos aproveitam a festa de Natal."
1167819476 = "Canção de Natal"
3350329729 = "O grupo participa da festa e conversa animadamente. Não há vestígios da preocupação anterior. Embora tenha sido um dia com muitos acontecimentos, terminou com flores de sorrisos."
3515690501 = "Pequena disputa antes da pilha de comida"
3302268299 = "Quando o fim do ano se aproxima. A Sociedade de Estudos Gastronômicos encontra uma ótima loja, 'Suzumetei', e descobre que ela está em risco de fechar…… Começa a confusa comédia de reconstrução da loja, protagonizada pela invencível Sociedade de Estudos Gastronômicos e Fuuka!"
440741347 = "Crise do Suzumetei"
