2430113912 = "前列の敵にダメージを与える。その後、[c]{char;848029}[/c]カードを[c]1[/c]枚召喚する。\n\n\n[c][75b4c0][i]温泉開発部の第一のモットーは、「安全第一」だ。[/i][-][/c]"
62152871 = "[c]自分のフェーズ終了時：[/c]味方の[c]{char;848029}[/c]カードにシールドを[c]{param;BasePower}[/c]付与する。"
