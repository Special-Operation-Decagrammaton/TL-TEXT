938088059 = "Recupera [c]{param;BasePower}[/c] de custo. Em seguida, recupera custo adicional proporcional ao número de specials {tag;Hyakkiyako} aliados.\n\n\n[c][75b4c0][i]'Fum fum fum ~ Esse mês foi movimentado, né ~'[/i][-][/c]"
