919870100 = "Vol.1 Força-Tarefa Hipotecária"
3763745176 = "A Escola Secundária Abydos enfrenta\n\ra ameaça iminente de fechar as portas.\n\rJunte-se à Força-Tarefa Hipotecária\n\re ajude a proteger a escola!"
2810575850 = "Vol.3 Tratado do Éden"
2791927741 = "Gehenna e Trinity. Será que duas escolas que se odeiam tanto conseguirão finalmente chegar a um acordo……?"
960680238 = "Vol.5 Hyakkaryouran"
2827572587 = "À beira de ser dissolvido,\n\ro Comitê de Conciliação Hyakkaryouran enfrenta sua maior crise.\n\rSerá que elas conseguirão\n\rse reerguer mais uma vez?"
782244883 = "Vol.6 Oratório do Tempo Passado"
1970484281 = "Lavagem cerebral, traições, um golpe de estado…… Arius foi assolada por diversos incidentes, mas algumas alunas decidiram ficar.\nO que o Sensei poderá dizer a essas crianças?"
2255131754 = "Ex. Decagramaton"
3930897789 = "Uma ameaça sem precedentes, a IA Decagrammaton, surge em Kivotos.\nQual seria a sua verdadeira identidade e o seu objetivo?"

