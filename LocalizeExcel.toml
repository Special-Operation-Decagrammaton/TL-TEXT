3055775567 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Uma garota que continua suas atividades de forma meio despretensiosa. É respeitada pelas seniores e kouhais.[/i][-][/c]"
4028810052 = "[c]Início do seu turno:[/c] Se o HP estiver abaixo de [c]{param;ConditionNum}[/c], recupera [c]{param;BasePower}[/c] de HP."
2496996975 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Vice-presidente do Comitê de Justiça que cuida da maior parte da administração no lugar da presidente. É mais rigorosa consigo mesma do que com qualquer outro.[/i][-][/c]"
3233074764 = "[c]Depois de jogar uma carta de equipamento:[/c] O poder de suas habilidades neste turno aumenta em [c]1[/c]."
1780167426 = "Causa dano a todos os inimigos na retaguarda. Em seguida, troca aleatoriamente com um striker aliado.\n\n\n[c][75b4c0][i]O vértice enigmático de Trinity, o anfitrião do Tea Party. Sua verdadeira identidade é a de uma garota extremamente ocupada.[/i][-][/c]"
1320965963 = "[c]Após a EX Skill de outro striker {tag;TeaParty} ser ativada:[/c] Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório. (Repete pelo número de alunos {tag;TeaParty} aliados, incluindo ela mesma)\nSe [c]{char;848004}[/c] ou [c]{char;848005}[/c] for aliado, o dano por habilidade aumenta em [c]{param;BonusNum}[/c] por pessoa."
3576040056 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Uma princesa de coração puro da Academia Trinity. Por ser pura, é mais facilmente ferida e fere os outros.[/i][-][/c]"
312404380 = "[c]Ao trocar para a linha de frente:[/c] Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório na retaguarda."
3291019510 = "O poder da EX Skill de outros strikers aliados aumenta em [c]1[/c] e ele troca de posição com o striker.\n\n\n[c][75b4c0][i]Uma existência que personifica a liberdade. Não é fácil imaginar sua atuação como anfitriã do Tea Party.[/i][-][/c]"
1066641449 = "[c]Após a EX Skill de outro striker {tag;TeaParty} ser ativada:[/c] O poder da EX Skill do striker aliado na linha de frente aumenta em [c]1[/c]."
3210250803 = "Causa dano aos inimigos na linha de frente. Em seguida, compra [c]{param;DrawCardNum}[/c] cartas.\n\n\n[c][75b4c0][i]'Será que ela está sorrindo? Fez amigos? …… Ainda bem'\n- Mercenária do Mercado Negro, anônima[/i][-][/c]"
3848622176 = "[c]Após a EX Skill ou SP Skill de outra aluna {tag;MakeUpWork} ser ativada:[/c] Compra [c]{param;DrawCardNum}[/c] cartas."
231076403 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Uma garota que, por poder ser qualquer coisa, escolheu não ser nada.[/i][-][/c]"
351059869 = "[c]Início do seu turno:[/c] O custo de [c]{param;CardNum}[/c] cartas na mão diminui aleatoriamente em [c]1[/c]."
2651504191 = "Causa dano aos inimigos na linha de frente.\n\n\n[c][75b4c0][i]Quem pensa que pode vencer Tsurugi é tolo. Quem pensa que pode fugir é ainda mais tolo.[/i][-][/c]"
2237998232 = "[c]Quando estiver na linha de frente e um inimigo sofrer dano e recuar:[/c] Recupera [c]{param;BasePower}[/c] de HP."
2674858929 = "Causa dano aos inimigos na linha de frente. Em seguida, causa [c]{param;BonusAttackPower}[/c] de dano fixo a um inimigo aleatório. (Repete [c]{param;AttackCount}[/c] vezes)\n\n\n[c][75b4c0][i]A especialista implacável do Comitê de Disciplina. Embora reclame, ela é quem mais se coloca na linha de frente, talvez a mais próxima da presidente.[/i][-][/c]"
3746791027 = "[c]Ao sofrer dano:[/c] O poder da EX Skill aumenta em [c]1[/c]."
2135599211 = "Causa dano a todos os inimigos. (Repete [c]{param;AttackCount}[/c] vezes)\n\n\n[c][75b4c0][i]Assim como não se pode imaginar Gehenna sem Hina, também não se pode imaginar Hina fora de Gehenna.[/i][-][/c]"
3485857018 = "[c]Quando estiver na linha de frente e um inimigo sofrer dano e recuar:[/c] Causa [c]{param;BasePower}[/c] de dano a todos os inimigos."
1997750136 = "Recupera o HP de um striker aliado aleatório.\n\n\n[c][75b4c0][i]Em Trinity, sempre alguém causa problemas e alguém limpa a bagunça. Eu cuido principalmente da segunda parte.[/i][-][/c]"
3069105627 = "[c]Após a EX Skill de outro striker aliado ser ativada:[/c] Causa [c]{param;BasePower}[/c] de dano a um inimigo aleatório na retaguarda."
1184747526 = "Troca aleatoriamente com um striker aliado. Em seguida, causa [c]{param;SubPower}[/c] de dano fixo ao inimigo com o maior HP.\n\n\n[c][75b4c0][i]Desde que disseram que seu rosto é assustador, ela pratica sorrisos na frente do espelho todas as noites.[/i][-][/c]"
1931885401 = "[c]Início do seu turno:[/c] Recupera [c]{param;BasePower}[/c] de HP de um striker aliado aleatório."
3182341508 = "Causa dano a um inimigo aleatório.\n\n\n[c][75b4c0][i]Uma garota que, mesmo querendo descansar e se divertir, patrulha com responsabilidade.[/i][-][/c]"
2216886365 = "[c]Quando um inimigo sofrer dano e recuar:[/c] Recupera [c]{param;BasePower}[/c] de HP do striker aliado na linha de frente."
