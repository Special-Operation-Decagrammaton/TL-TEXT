753107124 = "ちょっと物足りなくない？"
1883127960 = "学園祭のテーマについて悩んでいたアイリ。彼女は、偶然ギター演奏を目にし、とあるアイデアをひらめくことに。"
185156526 = "バンドしよっ！！"
1646859781 = "アイリは放課後スイーツ部の部室に駆けつけ、バンドをしようと提案する。ヨシミ、ナツ、カズサは困惑するが、学園祭のオープニングセレモニーライブの報酬がスイーツの女王「フレデリカ・セムラ」であることを聞き、放課後スイーツ部は急遽バンドを結成するのであった。"
1617050729 = "一番大事なこと"
749480935 = "バンドで一番重要なことは？という質問に対し、放課後スイーツ部はそれぞれの意見を口にする。それは各自が担当する役割を示していた。なりゆきで担当楽器などが決まっていく中、一人だけ冴えない顔をしているアイリ。夜、アイリは先生のところを訪ね、曲選びについて悩みを打ち明かす。"
188886584 = "ワイルドハントの貴人"
2265387020 = "先生はアイリの悩みを解決すべく、この前アイリが目撃したというワイルドハント芸術学院の生徒を探そうとする。深夜になっても目星はつかず、諦めかけたその時、探していた人物が姿を現す。"
2422729638 = "今までとは違う私"
2553404339 = "夕方、一人だけ練習室に残っているアイリ。心配する先生に、アイリは前とは違う自分に変わってみせると言う。翌日、先生はヨシミから、アイリが急に姿を消したという連絡を受ける。"
3689885592 = "誰が為に"
670625935 = "先生がアイリを探すため外出している中、ヨシミとナツ、カズサはアイリについて話し合う。そして、3人が導き出した結論は、アイリのために「フレデリカ・セムラ」を奪うこと。覚悟を決めた3人は、セムラが保管されている場所に赴くのであった。"
1244213426 = "資格"
2533353309 = "アイリは自分を捜しに来てくれた先生に、今までの葛藤を打ち明ける。アイリが姿を晦ましたのはセムラのせいではなく、あの場に自分がいるべき人間ではないと言い、涙を流すアイリ。彼女を慰めようとする先生だが、そこへティーパーティーから連絡が入る。生徒3人が留置場に拘束されているというのだ……。"
3267285556 = "ひとつの青春物語"
301716970 = "ヨシミ、ナツ、カズサが拘束された留置場に到着した先生とアイリ。3人はアイリに、なんとか手に入れたセムラの一切れを渡す。感動的な再会の中、アイリは悩みを打ち明ける事に。一方、先生からスイーツ部の話を聞いたツムギは、そんな青春の物語に感銘を受け、自身が作った曲を先生に渡すのであった。"
2859256604 = "物足りなくない（１）"
2713245801 = "学園祭のテーマについてクラスメイトたちと話し合うアイリ。そんなアイリは、街で自分を待ってくれている放課後スイーツ部のみんなに笑顔を見せるのであった。"
2939453841 = "物足りなくない（２）"
1029444936 = "人けの少ないトリニティの建物の屋上。放課後スイーツ部が集まって音楽を奏でる。"
1568618102 = "椎名ツムギ"
3174803636 = "椎名ツムギのライブを見に来た放課後スイーツ部と先生。そこでツムギたちの想像を絶する姿を目にすることに。"
1289951502 = "裏切れるということは"
3100982585 = "「フレデリカ・セムラ」を奪うために戦っていたあの日のことを思い出す先生と放課後スイーツ部。その時、正義を語る者が突然現れるのだが……。"
