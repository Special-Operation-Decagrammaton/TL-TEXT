2138405107 = "Sobrescrevendo as Memórias"
2167964134 = "Com a confusão da Gangue dos Passarinhos resolvida, a rua comercial finalmente recuperou a sua tão desejada paz. A turma observa os fogos de artifício e aproveita a última noite de férias, cada um à sua própria maneira."
