944364528 = "Binah: O Entendedor da Contemplação que Sente a Diferença (1)"
1155204586 = "Binah está escondida dentro de um buraco. O grupo decide enfrentar Binah, que se esconde nas profundezas."
791844677 = "Binah: O Entendedor da Contemplação que Sente a Diferença (2)"
434671104 = "Dizem que o núcleo de Binah está nas profundezas do buraco. O grupo desce para tentar recuperar o núcleo de Binah."
677604747 = "JEHOVAH ELOHIM (1)"
1288560903 = "Rio se conectou à rede do Continente de Aço para localizar o núcleo. No espaço virtual, quem esperava por Rio era Owl. Diante de uma Rio em perigo, Himari aparece triunfante em sua cadeira de rodas para oferecer ajuda."
1867533792 = "JEHOVAH ELOHIM (2)"
1993237815 = "Após derrotar Owl, o grupo recuperou o núcleo de Binah. Ao instalar o núcleo do Profeta em Kei, ela diz que poderá herdar as habilidades do Profeta. Assim, Kei começa a integrar as habilidades do Profeta na nave de transporte."
2793205752 = "Uniforme"
1183427417 = "Kei sofre com dores de cabeça e tonturas devido à ativação do núcleo de Binah. Nesse meio tempo, Alice presenteia Kei com o uniforme da Millennium. Após uma interação barulhenta, porém calorosa, Kei começa a aprofundar seus laços com seus companheiros pouco a pouco."
1515529201 = "Hod: A Glória Comprovada pelo Brilho (1)"
1986915196 = "Tudo começou com \"Hod\". Kei conversa com Owl sobre a natureza do mundo. Owl nega a ordem antiga e afirma que retornará o mundo ao estado de \"antes do início\". Kei rejeita isso e declara que protegerá o futuro em que acreditam, e a batalha contra Hod começa com um estrondo."
949564975 = "Hod: A Glória Comprovada pelo Brilho (2)"
3984403575 = "Após repelir Hod, o grupo recupera seu núcleo. Kei murmura, questionando por que o conflito nasce e se os seres vivos algum dia poderão se reconciliar."
1897214238 = "Kether: A Coroa Suprema que Brilha com Mais Esplendor (1)"
3910242707 = "Ao chegar na área de Kether, o grupo decide usar cápsulas de descida, julgando que não conseguiriam evitar o fogo cruzado de Kether pela rota terrestre. Enquanto Yuzu está assustada, todos entram nas cápsulas, uma após a outra. Assim, a descida começa com o grito de Yuzu."
3369636463 = "Kether: A Coroa Suprema que Brilha com Mais Esplendor (2)"
3909065987 = "Após repelir Kether, o grupo recupera seu núcleo."
125227434 = "Chesed: O Árbitro que Condena com uma Dor Misericordiosa (1)"
3423289450 = "Labors atacam Momoi e Midori, que aguardam na nave de transporte. Himari e os outros, que perseguiam Chesed, decidem suprimir os inimigos rapidamente para retornar aos dois."
2823829101 = "Chesed: O Árbitro que Condena com uma Dor Misericordiosa (2)"
1950019056 = "Após repelir Chesed, o grupo recupera seu núcleo."
3005949481 = "Justiça"
3760573549 = "Após romper a primeira linha de defesa do Continente de Aço, o grupo recebe comunicações de Ain, Soph e Owl."
1360737215 = "Chokmah: O Guardião Ancestral que Protege o Reino (1)"
1032758858 = "Enquanto seguem em direção a Chokmah, o Sensei se preocupa se deve deixar Kei participar da batalha. Kei, surpresa, diz que ele não precisa pensar em coisas desnecessárias."
2207225706 = "Chokmah: O Guardião Ancestral que Protege o Reino (2)"
1984604917 = "Após repelir Chokmah, o grupo recupera seu núcleo."
3706522227 = "Geburah: O Árbitro Valente que Transcende a Razão (1)"
1390952024 = "O lugar onde encontraram Geburah pela primeira vez — o Mar de Gelo. Foi também a primeira missão em que Toki participou como parte do Departamento de Investigação de Fenômenos Especiais. Ao chegar em uma área similar do Mar de Gelo, o grupo luta contra Geburah."
753667149 = "Geburah: O Árbitro Valente que Transcende a Razão (2)"
1119895468 = "Após repelir Geburah, o grupo recupera seu núcleo."
1164183331 = "Tiphereth: O Belo Redentor que Exalta o Sofrimento (1)"
1606436477 = "O Armazém de Sementes onde encontraram Tiphereth no passado. Em um espaço que reproduz esse local, o grupo enfrenta Soph. Soph grita para Kei, que tem absorvido núcleos, que ela está devorando os Profetas. Enquanto Soph diz que não há necessidade de acumular mais pecados, Alice expressa suas próprias convicções."
2689575787 = "Tiferet: A Bela Redentora que Exalta o Sofrimento (2)"
660550887 = "Após derrotar Tiferet, o grupo recupera seu núcleo."
3976955706 = "Ritual"
1516164164 = "Tendo sua segunda linha de defesa rompida, Ain e os outros ouvem a proposta de Malkuth e juram proteger as áreas restantes a todo custo. Restam apenas duas áreas."
2929755926 = "Yesod: O Purificador do Poder que Governa a Fundação (1)"
1664902940 = "Eimi e Toki enfrentam Yesod."
3021376261 = "Yesod: O Purificador do Poder que Governa a Fundação (2)"
1514982498 = "Após derrotar Yesod, o grupo recupera seu núcleo."
415403066 = "Misericórdia"
1244439789 = "Sof e Owl aparecem diante do grupo que ocupou todas as áreas, exceto Netzach. Quando o Sensei pergunta se elas não gostariam de se transferir agora, as duas recusam. Elas continuam dizendo que, se algo está quebrado, basta consertá-lo, ganhando tempo para que Ain e Malkuth iniciem o Da'at."
2729840279 = "Da'at: A Sabedoria do Abismo que Espreita nas Sombras (1)"
4043732234 = "A Sephirah oculta, 'Da'at', se manifesta. Diante do gigantesco Da'at, o grupo fica perplexo, mas Rio lança o 'Neo-Avant-Garde-kun', preparado para qualquer eventualidade. Com a ajuda de Kei, o Neo-Avant-Garde-kun, agora gigante, enfrenta Da'at."
26241220 = "Da'at: A Sabedoria do Abismo que Espreita nas Sombras (2)"
556680094 = "Rio, tendo passado o controle do Neo-Avant-Garde-kun para Yuzu, instala o 'equipamento de combate' em seu traje especial."
3915426128 = "Da'at: A Sabedoria do Abismo que Espreita nas Sombras (3)"
495885662 = "O grupo vence Da'at por pouco. No entanto, ao mesmo tempo, o ajuste final de Malkuth é concluído."
1168219289 = "Malkuth: O Peregrino do Reino que Alcançou o Fim do Mundo (1)"
1638075147 = "O grupo e Malkuth começam a preparar-se para a batalha decisiva em seus respectivos locais."
987806084 = "Malkuth: O Peregrino do Reino que Alcançou o Fim do Mundo (2)"
3989358532 = "Malkuth termina os preparativos para a transição para o 'próximo estágio'."
1504324007 = "Malkuth: O Peregrino do Reino que Alcançou o Fim do Mundo (3)"
1214243517 = "Na batalha final contra Malkuth, ela questiona por que viver, já que a vida não passa de sofrimento e nem sequer podemos escolher nossos próprios nomes. Aris responde que ela mesma mudou seu nome. Se o Sensei diz que foi bom conhecê-la, só isso já faz a vida valer a pena. Assim, unindo forças com Kei, elas derrotam Malkuth."
1116407149 = "Dia da Ira (1)"
2470856198 = "O grupo é 'convidado' ao altar onde a energia do Continente de Aço está se acumulando. O Sensei instrui Himari a retornar à nave de transporte para realizar análises. Embora Himari pondere, ela segue as instruções e parte levando Momoi, Midori e Yuzu. Finalmente, a batalha decisiva contra Decagrammaton começa."
2910933471 = "Dia da Ira (2)"
85908197 = "Enquanto a batalha continua, Decagrammaton ativa a 'Faixa de Atziluth' e o altar é envolvido por uma área misteriosa. Isso não apenas bloqueia a comunicação com o exterior, mas também expande o alvo da 'conversão', antes limitado a substâncias inorgânicas, para todos os elementos."
1176775182 = "Dia da Ira (3)"
4293815617 = "Em meio a uma batalha difícil, Aris e Kei entram em contato com uma voz gentil que lhes ensina uma solução. Com a parada da Faixa de Atziluth pelo poder das duas, a comunicação com a nave de transporte, que estava bloqueada, é restaurada. O Sensei, informado por Himari sobre o contato do profeta de Decagrammaton, tenta dialogar com ele e acaba recebendo o poder da Sephirah. Sensei, estudantes e o profeta... com o poder de todos reunidos, a batalha final contra Decagrammaton começa."
3617072867 = "Kivotos: Mistério Não Identificado ~A Grande Investigação do Tsuchinoko que Afasta o Mal~"
3713119761 = "Fenômenos que a ciência não consegue explicar estão ocorrendo por toda Kivotos. Ao ouvir relatos sobre a criatura lendária 'Tsuchinoko', a Equipe de Investigação X entra em ação!"
