3555228002 = "忘れたい過去のこと（１）"
2179022057 = "忘れたい過去のこと（２）"
2366776294 = "熱血でうるさいバカが、嫌いなの（１）"
3456435934 = "熱血でうるさいバカが、嫌いなの（２）"
3459245515 = "我ら「放課後スイーツ団」（１）"
3447933575 = "我ら「放課後スイーツ団」（２）"
3088286703 = "封印された魔獣は……（１）"
3139702118 = "封印された魔獣は……（２）"
374936049 = "先生に相談したいこと"
266683838 = "ある日、カズサからストーカー被害にあっているという相談を受ける先生。突然の告白に、詳しく話を聞くことに……。"
3673151056 = "突っかかってくるヤツ（１）"
1587917542 = "カズサからストーカー被害の詳細を聞いていると、突如として「挑戦状」を持って飛び出してきた少女がカズサに「決闘」を申し込んでくるのだった。"
1489650353 = "突っかかってくるヤツ（２）"
2956197676 = "ストーカーの正体は自警団の宇沢レイサだった。カズサ曰く、レイサは中学の頃からスケバンと聞くと飛びかかるような熱血バカなのだという。そして、カズサは中学時代の写真を先生に見せ、自らも昔スケバンだった事を明かすのだった。"
2953979966 = "誰だって一つや二つくらい（１）"
1227345914 = "過去のことを自分に話して良かったのかと問いかける先生に対し、カズサは忘れたい過去なだけなのだと告げる。高校生になったのだから、いい加減過去の事をいつまでも持ち出してくるレイサにうんざりしているのだとも。先生はカズサを学園まで送り届けた後、自警団のスズミにレイサの事を尋ねるのだった。"
3880511578 = "誰だって一つや二つくらい（２）"
379247669 = "レイサからの支援要請を受け、スズミと共に向かった先生。しかし、到着したときには全てが終わった後だった。先生は、レイサに対しカズサはもうスケバンではなく平凡に学園生活を送っている一生徒なのだと告げるのだった。"
1945166588 = "材料はみんなバラバラでも（１）"
259113567 = "他の部員の様子を見るべく放課後スイーツ部の部室を訪れた先生。ナツとアイリは、「カズサとレイサの間に何があったかはわからないけれど、それで関係が変わることはない」と話す。そうして安堵の息を漏らした時、カズサの中学時代の写真を落としてしまい部員の目に晒される事に……。"
4050058228 = "材料はみんなバラバラでも（２）"
3821896350 = "カズサの相談に引き続き乗る先生。レイサとの話、そして放課後スイーツ部のメンバーにも過去のことを知られたと聞いて、カズサは頭を抱えるのだった。"
697992102 = "放課後スイーツ団？（１）"
25590586 = "カズサが元スケバンだったことを知った放課後スイーツ部一同は、名前を放課後スイーツ「団」に変え、不良のコスプレをしてカズサを迎える。急な部員の変化に動揺するカズサをよそに、その姿を見たレイサはカズサこと「キャスパリーグ」がスケバンをやめたなど嘘で、新しい組織を作ったのだと勘違いし、放課後スイーツ団に襲いかかってくるのだった。"
3920525389 = "放課後スイーツ団？（２）"
3506014961 = "放課後スイーツ団との戦いに敗れたレイサはその場に気絶してしまう。カズサは、スケバン時代の事は忘れたい過去であり、触れないでほしいと告げてその場を去る。床に伸びながらもすべての話を聞いていたレイサは、その言葉にショックを受けるのだった。"
2905518164 = "忘れたい過去のこと（１）"
3687706864 = "レイサを呼び出した先生は、カズサの事に関して話をしようとするも、「キャスパリーグ」の情報をレイサから聞きだすべく、スケバンがレイサと先生の前に立ちふさがるのだった。"
3914779207 = "忘れたい過去のこと（２）"
3963225956 = "先生と一緒にスケバンを撃退したレイサ。「カズサが新しい組織を作ろうとしている」という噂をスケバンたちが聞いてしまったことに、レイサは責任を感じてしまう。レイサは「平凡な」カズサを守る事を決心し、先生に挑戦状を預け、押し寄せてくるスケバンとの戦闘に挑むのだった。"
2675913389 = "熱血でうるさいバカが、嫌いなの（１）"
4274647011 = "カズサにレイサからの挑戦状を渡す先生。全てが終わったのだと安心するも、一抹の不安を感じたカズサは、先生に彼女の行方を尋ねるのだった。"
4266006947 = "熱血でうるさいバカが、嫌いなの（２）"
1092601913 = "レイサを助けるべくスケバンの根城に潜入するカズサと先生。そこには、放課後スイーツ部の面々も駆けつけていた。「放課後スイーツ団」としてレイサを助けるべく、突入するのだった。"
3566887939 = "我ら「放課後スイーツ団」（１）"
3175463900 = "窮地に追い込まれたレイサ。絶体絶命の瞬間に、キャスパリーグと放課後スイーツ団の四天王が助けに入るのだった。"
854792900 = "我ら「放課後スイーツ団」（２）"
1330585549 = "レイサ救出に成功した放課後スイーツ団一同。カズサは気絶したレイサに挑戦状を返し、全ての事件が終わりを迎える。先生は一晩中頑張ったみんなにスイーツをおごるのだった。"
544026336 = "封印された魔獣は……（１）"
8928475 = "事件が全て解決し、晴れやかな気持ちで感謝を伝えるカズサ。そんなカズサに、先生はどうしてスケバンをやめたのかと問いかける。本当になんでもない日に、カフェでスイーツを食べて笑っている女の子をみて、ああなりたいと思ったからなのだとカズサは笑った。そうして、相談事は終わり、カズサは「平凡」な女の子に戻るのだった。"
3396719460 = "封印された魔獣は……（２）"
3260678421 = "いつもと変わらない日常に戻った放課後スイーツ部の部室。そこで、先生とカズサは部室にいるレイサを発見し……放課後スイーツ団が「キャスパリーグ」を封印してるのだと、斜め上の理解をしたレイサは再びカズサに挑戦状を叩きつける。その瞳は、どこか嬉しそうだった。"
1330006888 = "ON YOUR MARK ＠ MILLENNIUM"
3761109965 = "キヴォトス最大級の学園祭こと「晄輪大祭」の開会式が翌日に迫ってきました！果たしてミレニアムの生徒たちは予期せぬ事故を克服し、無事に準備を終えることができるのでしょうか？"
1252397437 = "大運動会の前夜"
1919278635 = "ミレニアムのマイスター"
4253304983 = "ミレニアムのハッカー"
3276166777 = "ミレニアムのトレーナー（１）"
3544225624 = "ミレニアムのトレーナー（２）"
4231625923 = "ミレニアムの応援団？（１）"
1551337824 = "ミレニアムの応援団？（２）"
990654860 = "晄輪大祭に反対する会"
1480833506 = "応援という名の戦車"
143433522 = "みんなのための大運動会"
1757313669 = "大運動会当日"
2470008028 = "大運動会の前夜"
2617062401 = "キヴォトス最大級の学園祭『晄輪大祭』を目前に、予期せぬ事故で応援ロボットが壊れてしまった。セミナーのユウカとノアからその連絡を受けた先生は、ミレニアムに足を運びその一方、準備のために無理をしすぎているユウカを心配したノアは、ユウカに内緒で大運動会の準備を手伝ってほしいと先生に頼むのだった。"
845225262 = "ミレニアムのマイスター"
1370627587 = "壊れた応援ロボットを修理するべくエンジニア部を訪れたノアと先生。事情を聞いたエンジニア部は、この壊れ方だと修理では開会式ギリギリになってしまうと告げる。けれど、修理の代わりに新しく応援ロボットを作るのであれば3時間もあればできると胸を張る。応援ロボットの事をエンジニア部に任せ、二人は他の業務を片付けるべく足を運ぶのだった。"
4262322769 = "ミレニアムのハッカー"
2239879700 = "ミレニアムのハッカー集団、ヴェリタスを訪れたノアと先生。はじめはノアの訪問を警戒していたヴェリタスも、ノアの真摯な言葉に心を開き、彼女を助けることに。一方、チヒロはミレニアムのサーバーに誰かがハッキングを試みた形跡があると二人に告げ――。"
3776835865 = "ミレニアムのトレーナー（１）"
2305382535 = "出場する選手のコンディションを確認するべく、トレーニング部を訪れたノアと先生。スミレは晄輪大祭を控えてより一層トレーニングに励んでいた。しかし、一緒に運動していた生徒たちはスミレの情熱についていけず皆いなくなってしまう。そうして残った先生に対し、スミレは「軽い」運動をすすめるのだった。"
1674288483 = "ミレニアムのトレーナー（２）"
3186889323 = "ミレニアムサイエンススクール某所、謎のミレニアム生が「大運動会」を中止させるべく計画を進めているようで――？"
2310867314 = "ミレニアムの応援団？（１）"
3921454463 = "応援ロボットの進捗を窺うべくエンジニア部の様子を見に戻ってきた先生とノア。しかし、彼らを待っていたのは応援団姿のエンジニア部員だった。理由を問えば、応援ロボットは完成したものの、突然暴走して逃げてしまったのだとか。その時の設計図を確認したノアは、何者かがロボットをハッキングしたのではないかと告げる。"
3125605064 = "ミレニアムの応援団？（２）"
2812405180 = "ノアと先生は応援団姿のエンジニア部と一緒にヴェリタスを訪れる。一通りの事情を聞いたヴェリタスは、学園内に怪しい動きがないかと確認してくれる事に。"
3491008751 = "晄輪大祭に反対する会"
3227473772 = "ヴェリタスの助けによって、応援ロボットを盗んだミレニアムの生を発見した一行。どうやら、彼らは運動が嫌いで晄輪大祭の開催に反対する生徒たちの集まりなのだという。今まで様々な妨害工作を仕掛けてきた生徒たちは、エンジニア部から盗んだロボットで襲い掛かってくるのだった。"
1811732470 = "応援という名の戦車"
1826342970 = "強力な戦闘能力を備えた「トラック・クラッシャー」を前に苦戦を強いられるヴェリタスとエンジニア部。その時、ノアのアイデアによってトラック・クラッシャーの無力化に成功。戦況は一気に逆転し――そして隠れていた「晄・反・会」の生徒は皆、スミレ捕まり、騒動は終わりを告げる。"
2110629097 = "みんなのための大運動会"
158795387 = "なぜ大運動会を妨害しようとしたのか「晄・反・会」の生徒たちに問いかけ、事情を聞くことに。そうして、運動が苦手な生徒のために皆が楽しめる大運動会を作るべく、ノアと先生はルールの調整を決めるのだった。その後、一同は力を合わせて大運動会の準備に奔走するのだった。"
3915786569 = "大運動会当日"
2806214484 = "一歩遅れて目が覚めたユウカ、自分が寝ている間に他のミレニアム生たちが大運動会の準備をしてくれたことを知る。ノアと先生に感謝の言葉を伝え……そうして、「晄輪大祭」は無事に幕を開けたのだった。"
3198922083 = "Get Set, Go！～キヴォトス晄輪大祭～"
2064697458 = "ついに始まったキヴォトス大運動会こと『晄輪大祭』。\n\r様々な学園が一堂に会し、競い合うお祭りの裏で、なにやら波乱の気配が……\n果たして勝利の女神はどの学園に微笑むのでしょうか？"
3925547749 = "燃え上がる開会式"
3108307433 = "燃え上がる実行委員会"
976609379 = "屋台エリアの誘惑"
1664788696 = "波乱の借り物競争（１）"
4012907231 = "波乱の借り物競争（２）"
948931625 = "遅めのランチ"
3430109642 = "周辺パトロール"
1160558781 = "協力（１）"
2654285294 = "協力（２）"
2571759110 = "偶然の縁（１）"
3341472815 = "偶然の縁（２）"
1594092657 = "晄輪大祭の主人公"
3513542657 = "みんなのための――"
3604354101 = "美食研究会編"
3493330240 = "RABBIT小隊編"
2130549479 = "ゲヘナ学園・風紀委員会編"
1369774585 = "エンジニア部&ヴェリタス編"
2410603120 = "救護騎士団&救急医学部編"
2564006886 = "実行委員会編"
3330937226 = "燃え上がる開会式"
2584298955 = "ハナコとアヤネの開会宣言によって、ついに晄輪大祭の幕が上がる。しかし、開会宣言は小さな波乱を巻き起こしてしまうのだった。"
1333557687 = "燃え上がる実行委員会"
309572292 = "各校を代表して晄輪大祭の実行委員に選ばれたユウカ、アコ、ハスミ、マリー。実行委員会本部では、先の開会宣言を皮切りに議論が巻き起こる。不穏な空気が漂う中、各員は実行委員としての活動を始めるのだった。"
3733926134 = "屋台エリアの誘惑"
3416522998 = "屋台エリアを散策していた先生は、パトロール中のハスミと出会う。曰く、お祭りムードに乗せられて羽目を外す生徒が増えるだとか。そんな二人の前に、美食研究会一同のハルナが現れ、お近づきの印にと屋台のトウモロコシを差し出してくる。カロリーの塊を食べるのは、と躊躇っているハスミに対し、食べても太らない体質だから気にした事などないと告げるハルナ。その言葉に傷ついたハスミは、打倒ゲヘナ学園を決意するのだった。"
1059932753 = "波乱の借り物競争（１）"
121038983 = "美食研究会の活躍によって、一躍トップに踊りだしたゲヘナ学園。ミレニアムの総合優勝を諦めていないユウカは、その情報を目にし、少しでも順位に貢献すべく自身も競技に出る決意を固めるのだった。"
3445498865 = "波乱の借り物競争（２）"
1473177672 = "ユズの代わりに「借り物競走」に出場することになったユウカ。メモを確認したユウカは先生を連れて1位でゴールする。真っ先に先生を連れていった事から、ユウカの「借り物」が「好きな人」なのではないかという噂が立つが……借り物の中身を明かしたら失格となるため、弱々しく否定するのだった。"
357458073 = "遅めのランチ"
815055312 = "借り物競走の後、昼食を摂るべく競技場の外へとやってきた先生。そこでは、人々の案内や手助けをするマリーの姿があった。まだ昼食を摂っていないというマリーと共に玄武商会の屋台で遅めのランチをとることに。そんな中、屋台の店員が火傷してしまい、先生は店員を合同医療本部に連れて行くのだった。"
44282278 = "周辺パトロール"
2955793294 = "大運動会が盛り上がる一方、お祭りの雰囲気にあてられて羽目を外す生徒が増えていく。ハスミは競技場を見回りながらそういったトラブルの対処をしていたところ、会場の警備業務を行っていたヴァルキューレ警察学校のキリノとフブキから、不審人物の話を聞くのだった。"
801109073 = "協力（１）"
156824262 = "キリノとフブキの話から、目撃証言を集めることにしたハスミと先生。そうやって聞き込みを続けていると、様子がおかしい事に気づいたアコ、ユウカ、マリーが現れ、協力してくれることに。そうして、不審人物がアスレチックスタジアムの地下出入り口にいることを突き止める。そこにいたのは、週3日勤務のためにデモを計画していた工務部員たちだった。"
3318312354 = "協力（２）"
3358539827 = "「障害物競走」真っ最中のトラック上に、地下から逃げてきた工務部員と応援ロボットが乱入してしまう。それを止めるべくシロコが撃った対戦車ロケットによって、応援ロボットは暴走を始めてしまい……実行委員会一同は事態の収拾に乗り出すのだった。"
2375781008 = "偶然の縁（１）"
2738269747 = "無事、事態の鎮圧に成功した一行。各々が残った業務をこなしに行き、ハスミもパトロールに戻る事に。そうして巡回している最中、騎馬戦のメンバーが足りないと頭を抱える百鬼夜行連合学院の生徒に出会う。このままでは負けてしまうと嘆く彼女たちに、ハスミは戦略を伝えるのだった。"
3141961980 = "偶然の縁（２）"
2552643930 = "ハスミの立てた作戦によって、騎馬戦で勝利を収めた百鬼夜行連合学院。感謝の言葉を伝え、また一緒に戦える事を願って一行とハスミは別れるのだった。"
3493720274 = "晄輪大祭の主人公"
66281853 = "ついに晄輪大祭も最終種目の「学園対抗リレー」を残すのみとなった。現在の得点は全学園同率1位。この「学園対抗リレー」を制したものが晄輪大祭の総合優勝を獲得できる。最後の大舞台を前に、各学園のアンカー走者が次々と失踪、棄権を発表。それは、実行委員の仕事ばかりで競技に参加しなかったハスミを想っての走者の行動だった。周囲に後押しされるように、ハスミはアンカーを走ることを決意するのだった。"
1506422008 = "みんなのための――"
674303561 = "ノアの閉会の言葉と共に、晄輪大祭は幕を下ろす。後夜祭の準備が始まる最中、先生はハスミに晄輪大祭の感想を尋ねる。ハスミはその問いに笑顔で答え――そこには、少しだけ学園間の蟠りが解けた姿が映っているように見えた。そうして、ハスミは他の実行委員のメンバーと共に、フォークダンスが始まるまでのつかの間、お茶会を楽しむのだった。"
1088523469 = "美食研究会編"
842670294 = "美食研究会一同は、対抗リレーの景品である「万能食券」で食べ物を食べながら打ち上げをする事に。ハルナはジュンコに大運動会は楽しめたかと聞き、ジュンコは様々な騒動に巻き込まれてはいたものの、いつものように楽しかったと笑う。そうして、フォークダンスが始まることを聞いた一同は、後夜祭へと向かうのだった。"
601597532 = "RABBIT小隊編"
3756768664 = "晄輪大祭の反省会を開くRABBIT小隊一同。サキは試合で良い成績を修めることができず落ち込んでいたが、ミヤコは市民の安全を守ることができたのだと笑う。そうして、一日の締めくくりとして後夜祭の警備へと向かうのだった。"
2149728944 = "ゲヘナ学園・風紀委員会編"
2439454168 = "すべての試合が終わった後、アコはついに姿を消したヒナを発見した。ヒナは心配するアコを宥め、自分が席を外した理由について説明し、自分が居ない間にアコが他の生徒たちと協力して色んな事件を解決したことを聞く。そうして互いに言葉を交わした後、2人はキャンプファイヤーへと向かうのだった。"
3249747138 = "エンジニア部&ヴェリタス編"
2302245089 = "セミナーから頼まれた仕事をこなすチヒロの元にウタハがやってくる。チヒロとウタハは大運動会で起きた出来事を振り返りながら、ウタハはからかうように、チヒロにもチアリーディングを勧めるのだった。"
3783295464 = "救護騎士団&救急医学部編"
3449950515 = "合同医療本部で患者の世話をしていたセリナとセナ。最後の患者が帰ったあと、セリナはセナに看護の仕事を手伝ってくれたことに心からの感謝を告げる。その後、セナは世間に広がっている「救護騎士団」の噂について尋ねてみるものの、セリナは困ったように笑って答えず、セナをキャンプファイヤーに誘うのだった。"
1795578867 = "実行委員会編"
2611143306 = "閉会式が終わった後、実行委員会一同は事務室でお茶を飲みながら一休みをしていた。ハスミはノアにお茶を勧めながら、「今日の仕事がうまく終わって良かった」と安堵の息を漏らす。そんな彼女に、ノアは帰るまでが晄輪大祭だと意味深に笑った。その時、後夜祭でまた別のトラブルが起きたという知らせが実行委員会に届けられるのだった。"
1610223773 = "「万能食券」を手に入れ、屋台の料理を楽しんでいた美食研究会一同は、和やかに今日一日の出来事を振り返るのだった。"
2189723464 = "晄輪大祭開催中もキヴォトスの平和を守るために暗躍したRABBIT小隊。作戦の成果は果たして…···"
864400319 = "試合がすべて終わり、ようやくヒナを見つけたアコ。大会運営を頑張っていたアコに対し、ヒナはとある提案をするのだった。"
1656654718 = "大運動会が終わり、後片付けをしているチヒロの元に誰かが訪れ……"
2150761988 = "合同医療本部で患者の世話をしていたセナとセリナ。セナは、この機会にと救護騎士団にまつわる噂について尋ねるが……"
2425727335 = "閉会式を終え、ナギサが差し入れてくれた紅茶を楽しむ実行委員会。果たして大運動会は無事に終わるのでしょうか？"
2558784607 = "聖堂のメリークリスマス〜救護騎士団の贈り物〜"
2278050079 = "今年もキヴォトスにクリスマスがやってきました。皆が喜びを分かち合う聖なる日。そんな日にも、変わらず「救護」を届ける救護騎士団の、いつもと同じようで特別な一日を覗いてみましょう！"
3303279140 = "キヴォトスのクリスマス！"
4076463124 = "秘密と花園"
1002441178 = "Les Miserables……？"
2245484717 = "ナイトメア・イン・クリスマス"
