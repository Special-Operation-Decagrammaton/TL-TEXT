944364528 = "Binah: O compreendedor silencioso que sente profundamente a diferença (1)"
1155204586 = "Binah está escondido em um buraco. O grupo luta contra ele."
791844677 = "Binah: O compreendedor silencioso que sente profundamente a diferença (2)"
434671104 = "O núcleo de Binah está no fundo do buraco. O grupo desce para obtê-lo."
677604747 = "Jeová Elohim (1)"
1288560903 = "Rio se conecta à rede do Continente de Aço para localizar os núcleos. No espaço virtual, Oul a espera. Quando Rio está em perigo, Himari, em sua cadeira de rodas, aparece e a ajuda."
1867533792 = "Jeová Elohim (2)"
1993237815 = "O grupo derrota Oul e coleta o núcleo de Binah. Dizem que, ao instalar o núcleo do profeta em Key, ela pode herdar suas habilidades. Assim, Key incorpora as habilidades do profeta ao navio de transporte."
2793205752 = "Uniforme"
1183427417 = "Key sofre de dor de cabeça e tontura devido à ativação do núcleo de Binah. Nesse momento, Aris lhe dá de presente um uniforme de Millennium. Após uma troca barulhenta, porém calorosa, Key gradualmente aprofunda seus laços com os amigos."
1515529201 = "Hod: A glória provada pelo brilho (1)"
1986915196 = "Tudo começou com 'Hod'. Key troca palavras com Oul sobre o estado do mundo. Oul nega a ordem antiga e afirma que quer restaurar o mundo 'antes do começo'. Key rejeita e declara que defenderá o futuro em que acredita, e a luta contra Hod começa com um estrondo."
949564975 = "Hod: A glória provada pelo brilho (2)"
3984403575 = "Após derrotar Hod, o grupo coleta seu núcleo. Key murmura sobre por que surgem conflitos e se um dia os seres vivos poderão se reconciliar."
1897214238 = "Keter: A coroa suprema que mais brilha (1)"
3910242707 = "O grupo chega à área de Keter e decide usar pods de descida para evitar o fogo cruzado. Enquanto Yuzu se assusta, todos entram nos pods. O descida começa com os gritos de Yuzu."
3369636463 = "Keter: A coroa suprema que mais brilha (2)"
3909065987 = "Após derrotar Keter, o grupo coleta seu núcleo."
125227434 = "Chesed: O árbitro que condena com misericordiosa dor (1)"
3423289450 = "Lay-bores atacam Momoi e Midori, que esperam no navio de transporte. Himari e as outras, que perseguem Chesed, decidem subjugá-los rapidamente e voltar."
2823829101 = "Chesed: O árbitro que condena com misericordiosa dor (2)"
1950019056 = "Após derrotar Chesed, o grupo coleta seu núcleo."
3005949481 = "Justiça pública"
3760573549 = "O grupo que rompeu a primeira linha de defesa do Continente de Aço recebe uma mensagem de Ain, Sof e Oul."
1360737215 = "Chokhmah: O antigo guardião que protege o reino (1)"
1032758858 = "A caminho de Chokhmah, o Sensei se preocupa se deve ou não deixar Key participar da luta. Key fica espantada, dizendo que ele não precisa pensar em coisas desnecessárias."
2207225706 = "Chokhmah: O antigo guardião que protege o reino (2)"
1984604917 = "Após derrotar Chokhmah, o grupo coleta seu núcleo."
3706522227 = "Gevurah: O árbitro corajoso que transcende a razão (1)"
1390952024 = "O local onde encontraram Gevurah pela primeira vez – o mar gelado. Também foi a primeira missão de Toki no Departamento de Investigação de Fenômenos Anômalos. Ao chegar a uma área de mar gelado semelhante, o grupo luta contra Gevurah."
753667149 = "Gevurah: O árbitro corajoso que transcende a razão (2)"
1119895468 = "Após derrotar Gevurah, o grupo coleta seu núcleo."
1164183331 = "Tiferet: O belo redentor que louva a adversidade (1)"
1606436477 = "O depósito de sementes onde encontraram Tiferet no passado. No espaço que o recria, o grupo enfrenta Sof. Sof grita que Key está devorando os profetas ao absorver os núcleos. Diante de Sof, que diz não ser preciso acumular mais pecados, Aris fala sobre sua convicção."
2689575787 = "Tiferet: O belo redentor que louva a adversidade (2)"
660550887 = "Após derrotar Tiferet, o grupo coleta seu núcleo."
3976955706 = "Ritual"
1516164164 = "Com a segunda linha de defesa rompida, Ain e as outras, após ouvir a proposta de Malkuth, juram defender as áreas restantes. Restam duas áreas."
2929755926 = "Yesod: O purificador que controla a fundação (1)"
1664902940 = "Eimi e Toki enfrentam Yesod."
3021376261 = "Yesod: O purificador que controla a fundação (2)"
1514982498 = "Após derrotar Yesod, o grupo coleta seu núcleo."
415403066 = "Misericórdia"
1244439789 = "O grupo que conquistou todas as áreas, exceto Netzach, encontra Sof e Oul. Quando o Sensei pergunta se elas não querem se transferir, elas recusam. Dizendo que o que está quebrado pode ser consertado, elas ganham tempo para Ain e Malkuth ativarem Da'at."
2729840279 = "Da'at: A sabedoria do abismo que se esconde nas sombras (1)"
4043732234 = "A Sefirah oculta, 'Da'at', se manifesta. Diante do enorme Da'at, o grupo fica perturbado, mas Rio lança o 'Neo Avant-garde-kun' que preparou para emergências. Com a ajuda de Key, o Neoinim gigante enfrenta Da'at."
26241220 = "Da'at: A sabedoria do abismo que se esconde nas sombras (2)"
556680094 = "Rio transfere o controle do Neo Avant-garde-kun para Yuzu e instala 'equipamentos de combate' em seu traje especial."
3915426128 = "Da'at: A sabedoria do abismo que se esconde nas sombras (3)"
495885662 = "O grupo derrota Da'at com dificuldade. No entanto, ao mesmo tempo, os ajustes finais de Malkuth são concluídos."
1168219289 = "Malkuth: O peregrino do reino que chegou ao fim do mundo (1)"
1638075147 = "O grupo e Malkuth começam os preparativos para a batalha final em seus respectivos lugares."
987806084 = "Malkuth: O peregrino do reino que chegou ao fim do mundo (2)"
3989358532 = "Malkuth conclui os preparativos para a transição para o 'próximo estágio'."
1504324007 = "Malkuth: O peregrino do reino que chegou ao fim do mundo (3)"
1214243517 = "Na batalha final contra Malkuth, que pergunta por que viver se a vida é apenas sofrimento e nem mesmo se pode escolher o próprio nome, Aris responde que ela mesma mudou seu nome. Se o Sensei disse que foi bom tê-la conhecido, só isso já vale a vida. Assim, com Key, ela derrota Malkuth."
1116407149 = "Dia da ira (1)"
2470856198 = "O grupo é 'convidado' para o altar onde a energia do Continente de Aço está se concentrando. O Sensei instrui Himari a voltar ao navio e analisar. Himari pensa, mas obedece e se retira com Momoi, Midori e Yuzu. A batalha decisiva contra Decagrammaton começa."
2910933471 = "Dia da ira (2)"
85908197 = "No meio da luta, Decagrammaton ativa o 'Cinto de Atziluth', e o altar é envolto por uma área misteriosa. Não apenas bloqueia a comunicação externa, mas expande o alvo da 'conversão', que era limitada a objetos inorgânicos, para todos os elementos."
1176775182 = "Dia da ira (3)"
4293815617 = "No meio da batalha difícil, Aris e Key são contatadas por uma voz gentil que lhes ensina uma maneira de abrir caminho. Com o poder das duas, o Cinto de Atziluth é interrompido, e a comunicação com o navio é restabelecida. Ao saber de Himari que houve contato com o profeta de Decagrammaton, o Sensei tenta um diálogo e recebe o poder das Sefirot. Com o poder de todos – Sensei, alunos e o profeta – começa a batalha final."
3617072867 = "Mistério não identificado de Kivotos ~Grande investigação do Tsuchinoko que exorciza o mal~"
3713119761 = "Fenômenos inexplicáveis pela ciência ocorrem em várias partes de Kivotos. Ao ouvir relatos de avistamento do lendário 'Tsuchinoko', a Equipe de Investigação X parte!"
3175519842 = "Animal da sorte"
156040622 = "Em busca do Tsuchinoko"
