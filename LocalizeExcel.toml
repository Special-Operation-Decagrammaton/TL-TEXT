2648436727 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]「やっちまっても構わないよな？」[/i][-][/c]"
3441096829 = "[c]自分のフェーズ開始時：[/c]今回のフェーズの間、前列の味方のEXスキルの威力が[c]1[/c]増加する。"
3403442927 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]「あぁ～こんなところで表に出したくなかったのによ！」[/i][-][/c]"
