936449254 = "催眠にかかったマコト"
656130952 = "毎年、万魔殿では各界の著名人を招いたパーティーを開くらしい。パーティーの目的は、万魔殿の権威を見せつけるため、とのこと。"
3296347737 = "エリートのみが加入できると噂されているゲヘナ学園の生徒会。しかし、加入条件と関係なく、普段の活動内容はすこし変わっているのだとか。"
241828489 = "風紀委員会を困らせる騒動の一部は、誰かの差し金で行われるものが多い。その首謀者はすべて同一人物であるとの噂が存在する。"
4211417711 = "ゲヘナ自治区の隅にある古い施設。他人の視線を避けたい生徒の避難所として使われることもあるのだとか。"
1606103230 = "旧校舎に置かれていた古いピアノ。最近まで誰かが手入れをしていたのか、使用には一切問題がないほどキレイに整備されている。"
74387565 = "ゲヘナの中でもマンモス級と呼ばれている、超巨大規模の部活。温泉開発への情熱のもと団結し、頻繁に事故を起こす集団だ。"
3868968517 = "温泉開発部が企んでいた凄まじい大作戦。一体何の作戦なのか、説明を聞いても全く理解ができない、とんでもない計画。"
848014088 = "温泉開発部を率いるカリスマ部長。豪快かつ隙のないリーダーシップの持ち主だが、風紀委員長の前では猫を前にしたネズミも同然だ。"
1351474076 = "カスミが意味深な口調で言及した話で、その真偽は不確か。もともとゲヘナには、このような信じがたい秘密が散在している。"
2177842261 = "文字通り、正体不明の怪物。目の前に現れても到底理解し難いものが、世にはある。"
1914035094 = "フウカと一緒に給食部で料理の勉強に励んでいる真面目な女の子。その健気な姿に感動した隠れファンもいるとか、いないとか。"
3208368410 = "ゲヘナの中でも悪名高い部活。実力と専門知識、そして暴力性をも備えた、文武兼備の悪党。"
3042483397 = "ゲヘナに現れた正体不明の巨大パンケーキ。確かに仰天する事件だが、ゲヘナでは意外と珍しくはないらしい。"
1792078009 = "ゲヘナパーティーを迎え、万魔殿が給食部にパーティー料理を発注したのだとか。しかし、料理人は給食部の部長ではないようで……。"
654318302 = "存在意義が分からない物体。予算の浪費とはまさにこのこと。"
1931459361 = "問題児でも···…いや、問題児だからこそ成立する義理、というものが存在するのも、裏通りの摂理。しかし、その相手が万魔殿の議長となると……。"
1421764132 = "救急医学部で使用する軟膏は、塗るだけで完治するという噂があるほどに効果抜群。1つくらいは持っておきたいものだ。"
2017029991 = "前から見ても、後ろから見ても、横から見ても、ただただ怪しいチラシ。本当に、怪しい……。"
4052776956 = "マコト議長が自治区で大暴れしたという噂が出回っている。実は普段からよくあることで、何も不思議ではない。"
2835023066 = "催眠にかかって性格が変わっても、面倒な部分は一緒。やはり人の本質は簡単に変わらないようだ。"
