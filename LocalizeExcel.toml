3884680737 = "Sombra se aproximando da cabana"
1130628369 = "Cabine telefônica onde ecoam vozes de lamento"
504801665 = "O último conto de terror"
2245860834 = "Alienígena Grey (1)"
790458143 = "Alienígena Grey (2)"
2181388028 = "Tsuchinoko azul"
3119162552 = "Churrasco & Chili"
3238893428 = "Não existe nada de oculto!"
2939235592 = "anonymous who?"
1616764732 = "Donzela de Ferro"
931273608 = "Animal da Sorte"
514500469 = "A sorte desta semana é a pior! No horóscopo da manhã, Konoka foi avisada de que o pior dia de sua vida chegaria em três dias. Enquanto desabafava sobre isso com seus amigos nas redes sociais, Konoka encontra um tópico relacionado a um símbolo de boa sorte."
427498716 = "Procura pelo Tsuchinoko"
3051451417 = "Konoka relata a Kanna que tirou folga para procurar a cobra que dizem trazer boa sorte: o Tsuchinoko. O Sensei, que estava no local por outro motivo, acaba acompanhando Konoka a pedido de Kanna. Após uma viagem de ônibus, os dois visitam uma cidade rural onde houve avistamentos e se juntam aos 'amigos' de Konoka."
1657577479 = "A garota com esse tipo de cenário"
907137836 = "Os amigos de Konoka eram Rena, do Clube de Pesquisa Oculta, e Tsubasa, que se autodenomina diretora do \"Instituto de Fenômenos Sobrenaturais Mo\". Rena se empolga conversando sobre ocultismo com Tsubasa, mas insiste que, no fundo, não acredita na existência do Tsuchinoko."
1462024252 = "Ônibus Fantasma"
3930709287 = "A caminho da cabana onde se hospedariam, o grupo recebe um aviso de um velho sinistro. Konoka fica com medo, mas o grupo ignora e chega à cabana. Após um breve descanso, eles partem para a investigação e, no caminho, encontram o famoso \"Ônibus Fantasma\" que circula nos boatos. Embora tenham sido confundidos por um momento, graças à perspicácia de Konoka, eles conseguem repelir o ônibus e embarcar no veículo correto."
3598423513 = "A Estátua de Pedra Viva"
166220328 = "Durante a investigação, Tsubasa revela a Rena que o clube ao qual ela pertencia já foi extinto. Enquanto isso, Konoka, que investigava sozinha, encontra uma caixa sinistra enterrada no solo. Ignorando a sugestão de Konoka de enterrá-la novamente, Tsubasa abre a caixa e encontra uma estátua de pedra dentro. Pelo material e estado de deterioração, Tsubasa conclui que deve ser uma brincadeira de alguém, mas Konoka a enterra profundamente no solo. Ao partir, o Sensei acaba cruzando o olhar com a estátua que deveria estar enterrada."
3910110965 = "Sombras se Aproximando da Cabana"
1933749352 = "Retornando à pousada tarde da noite, o grupo está exausto pela marcha forçada. Konoka, a única com energia, se oferece para preparar o jantar, enquanto Tsubasa e Rena adormecem de cansaço. Rena e o Sensei, ao sentirem uma presença suspeita, acordam e tentam descobrir a origem, apesar do medo. Nesse momento, Konoka retorna ao quarto trazendo a comida. Konoka também diz ter visto uma sombra misteriosa, e Tsubasa começa a suspeitar que os \"Sete Prisioneiros\", que guardam rancor da Secretaria de Segurança Pública, vieram se vingar."
1284600502 = "A Cabine Telefônica com Vozes de Lamento"
105361616 = "No dia seguinte, enquanto o grupo continuava a busca pelo Tsuchinoko, eles acabam perdendo o ônibus da tarde. Tentam chamar um táxi, mas não há sinal, então Konoka e o Sensei usam um telefone público. Após chamarem o táxi e tentarem sair da cabine, a porta não abre por algum motivo. Além disso, o telefone começa a tocar e, ao atender, ouvem uma voz sinistra. Como a ajuda não chega de jeito nenhum, Konoka resolve o problema na força bruta e eles conseguem escapar."
2528363471 = "O Último Conto de Terror"
1322186565 = "Diante do grupo que esperava pelo táxi, um ônibus bípede aparece... mas Konoka o repele na força bruta. Com a sucessão de eventos estranhos, a suspeita de que alguém está agindo nas sombras se transforma em certeza. À noite, o grupo percebe que alguém os vigia do lado de fora da janela. Konoka diz que, se a culpada pela série de eventos for Kyouko, dos Sete Prisioneiros, tudo faria sentido. O grupo tenta capturar a sombra suspeita, mas ela desaparece como fumaça, resultando em um fracasso."
1478179506 = "Alienígena Grey (1)"
1728431009 = "Ao ver a sombra branca capturada na foto, Tsubasa afirma que o culpado pela série de fenômenos estranhos é um alienígena Grey. Embora a discussão se intensifique, o grupo percebe que alguém isolou a cabana intencionalmente. A linha telefônica foi cortada e a ponte foi destruída. No fim, os culpados que finalmente revelaram suas formas eram delinquentes que guardavam rancor de Konoka..."
3654864579 = "Alienígena Grey (2)"
1998146 = "O grupo lida com as delinquentes. Ao questioná-las, descobre-se que tudo, desde espalhar o boato do Tsuchinoko, foi obra delas. Com esse fato, Tsubasa, que planejava reviver o \"Clube de Pseudociência\" com o feito de encontrar um Tsuchinoko, fica visivelmente deprimida. No entanto, não havia ninguém vestindo roupas brancas entre as delinquentes, o que não condiz com a sombra branca na foto. Enquanto o grupo se pergunta o que aconteceu, Mirai, que estava escondida por se preocupar com sua veterana de clube, Tsubasa, aparece."
3085789925 = "O Tsuchinoko Azul"
2378286215 = "Sem conseguir encontrar o Tsuchinoko, Konoka teme que o pior azar de sua vida esteja por vir. No entanto, contando a partir do dia da transmissão da previsão, já se passaram 4 dias, e o \"tal dia\", três dias depois, já havia passado. Rena aponta que, olhando para os eventos até agora, ela já sofreu azar o suficiente, e Konoka se convence de que a aventura em busca do Tsuchinoko pode ter sido o verdadeiro Tsuchinoko."
1641141706 = "Churrasco e Chili"
844112461 = "Com todos os problemas resolvidos, o grupo aproveita um churrasco, inclusive com as delinquentes. Konoka se surpreende ao ver Tsubasa sendo mimada por Mirai, e provoca Mirai dizendo que é superproteção vigiar a veterana até tarde da noite. No entanto, Mirai responde que não foi ela quem estava espiando a cabana naquela noite."
391374629 = "Não existe ocultismo!"
3407161162 = "Uma noite bem escura. Rena relata com confiança a verdade sobre o caso do Tsuchinoko para sua veterana do Clube de Ocultismo. No meio disso, Tsubasa a chama e as duas saem da cabana juntas. O motivo de Tsubasa ter reunido todos lá fora era para fazer contato com o espaço. Na montanha noturna, a voz de \"Ali-Ali-Ali\" ecoa."
4096947749 = "anonymous who?"
2337427686 = "Foi Himari quem passou as informações sobre o Tsuchinoko para Konoka nas redes sociais. Na sala do Departamento de Investigação de Fenômenos Singulares, Himari analisa com interesse os eventos vivenciados pelo Sensei e os outros. Ela troca opiniões com Emi, que chega logo depois, mas os dados indicam algo que pode ser chamado, sem dúvida, de \"fenômeno singular\"."
450338200 = "Donzela de Ferro"
3543633081 = "A Secretaria de Segurança Pública de Valkyrie está agitada com as delinquentes que vieram se entregar. Enquanto isso, Kanna estava em uma reunião com Misuzu, a diretora do Departamento Correcional."
1242866448 = "O incidente foi resolvido e parece que todos estão aproveitando um churrasco na cabana..."
165422936 = "Rena relata a verdade sobre o caso do Tsuchinoko para sua veterana do Clube de Ocultismo. Depois disso, no meio da noite, Tsubasa chama todos, incluindo Rena..."
1637396176 = "A conta \"anonymous\" que espalhou informações sobre o Tsuchinoko nas redes sociais. Qual seria a sua verdadeira identidade...?"
2318234019 = "A Secretaria de Segurança Pública de Valkyrie ficou agitada com as delinquentes que vieram se entregar. Por outro lado, Kanna parece estar conversando com um certo visitante..."
1299451717 = "A Serpente da Sabedoria"
1275794928 = "O Sensei, levado por Emi, conhece Himari, a chefe do Departamento de Investigação de Fenômenos Singulares. O Sensei explora vários lugares de Kivotos junto com o Departamento de Investigação de Fenômenos Singulares, aproximando-se da verdade sobre a IA Decagrammaton, uma ameaça sem precedentes."
