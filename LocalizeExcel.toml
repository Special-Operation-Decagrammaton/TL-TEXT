2300125943 = "Vamos brincar todos juntos!"
106998882 = "O próximo local de trabalho é a piscina infantil. Ensinada por Kirino sobre os princípios de atendimento ao público, Kanna resgata uma criança que está se afogando, mas a criança começa a chorar……"
3688617078 = "Piscina de ondas, cheia de perigos!"
298753096 = "As três vão trabalhar na piscina de ondas. Kanna, acidentalmente engolida por uma onda, avista um monstro misterioso na água e evacua as pessoas. Observando essa cena, estão pessoas inesperadas……"
3625956946 = "Crocodilo, sinal desaparecido!"
