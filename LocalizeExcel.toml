3599070940 = "Kune, Kune, Kune"# Episódio 1 e seu resumo abaixo:
1780733194 = "Entre os alunos de Kivotos, começam a se espalhar sussurros sobre o \"Kunekune\"."

3350929154 = "Entre a Super-Humana e a Raposa"# Episódio 2 e seu resumo abaixo:
4268210737 = "O Esquadrão FOX passa os dias na Agência Correcional. Yukino ainda se atormenta pelos atos do passado. É quando, chamada pela diretora da Agência, Yukino acaba tendo uma audiência com a Presidente do Conselho Estudantil Geral. Enquanto alinham os acontecimentos do período do desaparecimento, a Presidente confia a investigação do Lore a Yukino, que desejava uma chance de recuperar sua honra."

1745364049 = "O Esquadrão Só Marcha de Barriga Cheia"# Episódio 3 e seu resumo abaixo:
2002791633 = "Para a investigação do Lore, o Esquadrão FOX passa a agir em cooperação com o Sensei. Antes da operação, o esquadrão reencontra o Sensei num yakiniku de luxo. Diante de um Sensei que só quer vê-las comer, o Esquadrão FOX desconfia de suas intenções. Mas, com as respostas diretas e sinceras dele, elas vão abrindo o coração aos poucos."

1500063239 = "A Nova Base"# Episódio 4 e seu resumo abaixo:
3830197242 = "Para o Esquadrão FOX, que não pode agir às claras, o Sensei oferece como base um canto do subsolo da Schale — arranjado também pela Presidente do Conselho Estudantil Geral. O esquadrão o organiza como QG e dá início à operação."

3890647442 = "Coleta de Informações"# Episódio 5 e seu resumo abaixo:
462822871 = "Nas ruas, o Esquadrão FOX começa a coletar informações a partir das vítimas que perderam a consciência após avistar o \"espantalho branco\". Para ouvir o clube de atletismo de Gehenna, de onde saíram vítimas, Niko se aproxima disfarçada de vendedora, mas fracassa. Em compensação, obtém uma informação valiosa de Erika, que assistia a tudo de perto."

1210340112 = "Verdades e Mentiras"# Episódio 6 e seu resumo abaixo:
2755602640 = "Com as informações reunidas, o Esquadrão FOX avança nas deduções. Mas as provas ainda são insuficientes para se chegar a uma certeza. Considerando até a possibilidade de o culpado não ser um cidadão, e sim um fantasma, decidem realizar uma nova coleta de informações."

2620890405 = "O Vulto que Corre na Rodovia"# Episódio 7 e seu resumo abaixo:
1869455062 = "O Esquadrão FOX segue investigando por toda parte. O grupo se reúne para cruzar as informações, mas sem resultados relevantes. Quando se preparavam para mais uma rodada de buscas, encontram Natsuki puxando um riquixá em plena rodovia — e ouvem dela a lenda urbana do \"Kunekune\", que se espalha em Hyakkiyako."

1289441933 = "Do Outro Lado da Miragem"# Episódio 8 e seu resumo abaixo:
1473250037 = "Com uma pista em mãos, o Esquadrão FOX aguardava a miragem subir. Quando ela enfim se forma, Otogi, que a observava, é enfeitiçada pelo Kunekune e entra em delírio. Graças à reação de Kurumi, Otogi recobra os sentidos por pouco. Porém, a bala que Otogi disparou em meio ao delírio havia sumido sem deixar rastro."

2449096511 = "A Pista"# Episódio 9 e seu resumo abaixo:
1411259920 = "A partir do estado de Otogi, enfeitiçada ao observar a miragem, e da bala que desapareceu apesar do disparo certeiro, o Esquadrão FOX formula hipóteses sobre as condições de aparição do \"Kunekune\" e como enfrentá-lo. Preparando equipamentos que podem servir de contramedida, começam a se mover de vez rumo à caçada."

2338801941 = "Rumo à Escuridão (1)"# Episódio 10:1 e seu resumo abaixo:
2311301627 = "Como local para atrair o Kunekune, o Esquadrão FOX escolheu uma galeria subterrânea onde ninguém entra. Como saída para o problema de ser enfeitiçado ao ver o \"Kunekune\", o esquadrão veste óculos de visão noturna. Na tocaia, o \"Kunekune\" enfim se mostra — e a caçada das raposas começa."

1663922802 = "Rumo à Escuridão (2)"# Episódio 10:2 e seu resumo abaixo:
1425272534 = "Com os óculos de visão noturna funcionando, o Esquadrão FOX derrota o Kunekune. No lugar onde ele sumiu, restou um caco de vidro que emitia uma luz estranha e refletia um campo aberto. Yukino confia o caco ao Sensei e decide manter a informação longe da Presidente do Conselho. Famintas, as garotas partem animadas para a comemoração."

768002174 = "Inexplicável"# Episódio 11:1 e seu resumo abaixo:
1409392123 = "O Esquadrão FOX visita o Conselho Estudantil Geral. A Presidente informa a Yukino que os danos do Kunekune estão cessando e elogia a conclusão da missão. As três que esperavam do lado de fora encontram Erika por acaso e, diferente da outra vez, em plena operação, agora vão juntas a um café como amigas. Em outro dia, a Presidente do Conselho recebia Kaya — que, no entanto, também era uma das que se lembravam da Presidente do passado."

2813820339 = "Inexplicável"# Episódio 11:2 e seu resumo abaixo:
738638449 = "O Esquadrão FOX visita o Conselho Estudantil Geral. A Presidente informa a Yukino que os danos do Kunekune estão cessando e elogia a conclusão da missão. As três que esperavam do lado de fora encontram Erika por acaso e, diferente da outra vez, em plena operação, agora vão juntas a um café como amigas. Em outro dia, a Presidente do Conselho recebia Kaya — que, no entanto, também era uma das que se lembravam da Presidente do passado."

# --- --- --- Capitulo 2: --- --- ---
173129466 = "Deixarei Este Rancor Sem Vingança?"# Episódio 1 e seu resumo abaixo:
570905695 = "Alta madrugada no porto de Kanezaki. Um devedor estava prestes a ser enfiado dentro de um tambor."

1101320102 = "Salsicha de Peixe Sabor Caranguejo"# Episódio 2 e seu resumo abaixo:
4141877022 = "Enquanto jantam tarde da noite, Niko, Kurumi e Otogi conversam sobre o caso do camarão que o Esquadrão RABBIT resolveu tempos atrás. Mal comentam que seria bom se algo parecido acontecesse com caranguejos, Yukino retorna ao QG trazendo uma missão justamente sobre caranguejos."

1336515377 = "O Caranguejo e o Tambor"# Episódio 3 e seu resumo abaixo:
2780412479 = "O boato do caranguejo gigante que devora qualquer coisa. Por não ser nada realista, o Esquadrão FOX o recebe com ceticismo. Mas, deixando de lado a veracidade do boato, elas preparam a infiltração no porto para dissipar a insegurança dos cidadãos."

2563787234 = "Pescadores de Caranguejo"# Episódio 4:1 e seu resumo abaixo:
2808788758 = "Conversando com os pescadores, Niko descobre que, nos últimos meses, a pesca de caranguejo aumentou e o preço despencou."

2971010417 = "Os Sacos de Serragem Sumidos"# Episódio 4:2 e seu resumo abaixo:
1660918464 = "Niko ajuda um trabalhador aflito com o sumiço dos sacos de serragem. Ao encontrá-los e reportar, fica sabendo que caixas de madeira e serragem são usadas para embalar os caranguejos."

1494676020 = "Rota Gourmet"# Episódio 4:3 e seu resumo abaixo:
1067607850 = "Para ajudar as lojas da rua comercial, às voltas com a queda no movimento, Niko distribui panfletos. Os clientes que temiam as cascas de caranguejo, atraídos pelo chamado de Niko, voltam a frequentar as lojas um após o outro."

3956832813 = "Recapitulação: Dia 1"# Episódio 4:4 e seu resumo abaixo:
2500079061 = "A investigação revela que a história de terror quase não afeta a vida cotidiana na prática. O medo psicológico, porém, de fato se espalhava entre os cidadãos. Como ainda faltam informações para avançar nas deduções, o Esquadrão FOX prepara a próxima operação."

4131045778 = "Registros de uma Anomalia"# Episódio 5 e seu resumo abaixo:
24103466 = "Yukino visita a biblioteca pública para pesquisar sobre o Perorodzilla. Todos os artigos relacionados haviam sido recolhidos, mas, com a ajuda de Shimiko, que ela encontra por acaso na sala de leitura, uma pista é obtida."

2040570986 = "O Pescador Desaparecido"# Episódio 6:1 e seu resumo abaixo:
2968028731 = "Niko segue coletando informações sobre o pescador desaparecido. Os pescadores mais velhos dizem que ele deve ter fugido do trabalho pesado; os mais jovens, que a causa devem ser as dívidas."

714617311 = "Verificação da Situação"# Episódio 6:2 e seu resumo abaixo:
1438816199 = "Ao descobrir uma estação de carga no porto de Kanezaki, Niko questiona os funcionários e fica sabendo de um trem que circula apenas de madrugada. Como os registros de embarque eram confidenciais e não puderam ser vistos, ela pede a Kurumi que espie o sistema por meio do Departamento de Transporte."

2398972522 = "Carpaccio e Balas"# Episódio 6:3 e seu resumo abaixo:
605148683 = "Niko visita a Família Carpaccio para colher informações, mas é barrada na porta. Na área comercial aonde vai em seguida, ouve boatos perturbadores sobre a agiotagem da Família Carpaccio."

2108578455 = "Recapitulação: Dia 2"# Episódio 6:4 e seu resumo abaixo:
1569734950 = "A investigação sugere que o pescador desaparecido, sem conseguir pagar as dívidas, muito provavelmente fugiu usando o trem. Yukino, porém, parece incomodada com algo e, por sugestão do Sensei, o Esquadrão FOX decide investigar mais a fundo."

516333235 = "Edital de Licitação Periódica"# Episódio 7 e seu resumo abaixo:
105104110 = "O Esquadrão FOX toma café da manhã num restaurante do porto de Kanezaki. Na conversa com o dono, descobre que a Família Carpaccio, responsável pela segurança do porto, está em apuros às vésperas da nova licitação."

950626273 = "A Raposa e o Naco de Carne"# Episódio 8:1 e seu resumo abaixo:
2750021426 = "Alta madrugada. Chegando ao porto de Kanezaki, Niko se infiltra no armazém da Família Carpaccio com o apoio de Otogi e Kurumi."

1657414332 = "Busca"# Episódio 8:2 e seu resumo abaixo:
877460878 = "Dentro do armazém, Niko encontra algo suspeito. No meio da investigação, dá o azar de topar com um membro da organização e quase tem a infiltração descoberta. Com jogo de cintura, porém, ela escapa da crise."

372206390 = "Recapitulação: Dia 3"# Episódio 8:3 e seu resumo abaixo:
1463926984 = "As investigações até aqui apontam que, por trás dos desaparecimentos, há uma armação da Família Carpaccio. Para confirmar a verdade, o Esquadrão FOX decide invadir de vez."

3430867049 = "Interrogatório Padrão SRT"# Episódio 9 e seu resumo abaixo:
1540130814 = "O Esquadrão FOX captura uma capo da Família Carpaccio e conduz um interrogatório ao estilo SRT. Conseguem a confissão: o boato foi espalhado pela própria Família para atiçar o medo dos cidadãos. Mas, sem tempo nem para respirar, um caranguejo gigante começa a atacar o porto em meio a um estrondo."

4070492427 = "O Valor Que Não Muda"# Episódio 10 e seu resumo abaixo:
3578537993 = "Com uma coordenação impecável, o Esquadrão FOX repele o \"Caranguejo do Tambor\" e, entre os vestígios da batalha, encontra um caco de vidro como o do caso do \"Kunekune\". Yukino o confia ao Sensei e o caso parece encerrado — mas, para perseguir os caranguejos que fugiram em massa do armazém, elas acabam correndo pelo porto a noite inteira."

2781401687 = "Epílogo"# Episódio 11 e seu resumo abaixo:
1017824045 = "O Sensei ouve de Rin o resultado da análise solicitada: o caco de vidro provavelmente reflete algum lugar de Kivotos. Em seguida, visitando o QG do Esquadrão FOX, o Sensei se junta a todas para comer os caranguejos recebidos em grande quantidade. Enquanto isso, no Comitê da Biblioteca, a vice-presidente há muito desaparecida estava de volta."

