1862988659 = "前列の敵にダメージを与える。その後、味方[c]{char;848053}[/c]カードの枚数分、後列のすべての敵にダメージを与える。\n\n\n[c][75b4c0][i]「それを呼び出したのは、私たちの願望と妄執――そして、そこに漂う狂気だった」\n-ペロロジラのグッズ紹介ページ[/i][-][/c]"
4093879807 = "[c]自分のフェーズ終了時：[/c]1人ではない時は、シールドを[c]{param;BasePower}[/c]付与する。1人の時は、[c]{char;848053}[/c]カードを[c]1[/c]枚召喚する。その後、自身に[c]{param;SubPower}[/c]ダメージを与える。"
3617530377 = "[c]クールタイム：3ターン[/c]\n\n前列の敵にダメージを与える。その後、SPスキルの威力が[c]1[/c]増加する。\n\n\n[c][75b4c0][i]みんなに並ぶために、休まず走ることにした少女。[/i][-][/c]"
