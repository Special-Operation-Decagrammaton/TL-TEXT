2324938743 = "ラーメンと陰謀"
1935028633 = "「少女忍法帖ミチルっち」の新作撮影のためにラーメン屋を訪れた忍術研究部一同。しかし、ラーメン同好会が暴れ始め――その場を忍術で収めたものの、カメラが壊れてしまうのだった。"
2416051084 = "断れない申し出"
1084482783 = "ラーメン屋での一部始終を目撃していたニヤは、忍術研究部に陰陽部が所持するカメラを永久貸与する代わりに、シャインキャットの護衛任務を依頼するのだった。"
2411384567 = "依頼の条件"
3522964417 = "シャインキャットの護衛を引き受けることになった忍術研究部一同。今回の会場はドレスコードがある、とのことでドレスへと着替えることに。しかし、ツクヨのドレスだけサイズが合わず破けてしまうのだった。"
3044990082 = "才能との邂逅"
2282332248 = "ドレスが間に合わず、会場外での警備をすることになったツクヨ。そんな彼女を、シャインキャットがモデルとしてスカウトする。そうしてショーが始まろうとする寸前、何者かの手によってドレスが全て盗まれてしまうのだった。"
223828603 = "忍者と泥棒（１）"
4177221936 = "ドレスを盗んだダダイスチック・ヘルメット団を見つけた忍術研究部一同は、ドレスを取り返すべく立ち向かうのだった。"
3336899706 = "忍者と泥棒（２）"
1265568828 = "無事ドレスを取り戻した一同。しかし、床には見知らぬ人物が倒れていた。"
4091465997 = "花開く時"
1571624855 = "床に倒れていたのは、ファッションショーのモデルだった。病院に搬送されてしまった彼女の代役として、白羽の矢が立ったのはツクヨだった。"
605112193 = "高まる名声"
2465034065 = "シャインキャットのショーに出てから本格的なモデル活動を始めたツクヨ。様々な雑誌を飾り、インタビューを受けるツクヨにはほとんど休みがなかった。忍術研究部の部室にも行けない日々の中、部室に誰かが訪れる。"
733701337 = "見知らぬ空白"
1878096311 = "ニヤの口から、ツクヨがモデル活動をしていることを知ったミチルとイズナ。モモトークの返事はなく、電話にもでないツクヨに業を煮やしたミチルは、マネージャーに連絡を入れるものの、門前払いされるのだった。"
3454885913 = "それぞれの場所で"
2309341144 = "ツクヨの不在は、忍術研究部に大きな影を落としていった。彼女が不在の中、空白は徐々に広がっていき、ミチルの様子までもおかしくなってしまうのだった。"
1689830066 = "意図された偶然"
2017422041 = "すっかり塞ぎ込んでしまったミチルを元気づけるべく、イズナは先生とニヤに相談する。そうしてツクヨが出演する「百鬼夜行新年記念ファッションショー」の護衛任務を忍術研究部で引き受けるのだった。"
2424681935 = "ショーの終幕"
1617347149 = "「百鬼夜行新年記念ファッションショー」が始まった直後、ランウェイを歩いていたツクヨが突如として走り出す。そこには、ツクヨがモデルを代行したショーで主役を務めるはずだった女性がいた。ショーを壊すべく爆弾を持ち込んだ女性と忍術研究部一同は対峙するのだった。"
3366047042 = "元の場所へ"
3863137044 = "全てが終わった後、シャインキャットはツクヨに自分の道は自分で決めるべきだと笑い、ショーの時に破ってしまったドレスを修繕してプレゼントしてくれる。そうして、ツクヨは忍術研究部へと戻るのだった。"
2291967865 = "鋼鉄大陸攻略戦"
140464825 = "ついに鋼鉄大陸本土攻略を始める時がきた。先生たちとアイン、ソフ、オウル――そして、デカグラマトンの預言者。それぞれの想いがぶつかり合っていく。"
