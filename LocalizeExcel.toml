2725773498 = "A decisão da presidente"
2445619911 = "Dia da festa"
1457391808 = "Início da festa (1)"
2838252716 = "Início da festa (2)"
655972602 = "Reunião"
1724806434 = "O Sensei [USERNAME] visita a sala da presidente do Pandemonium e acaba ouvindo a proposta de Makoto..."
2663159793 = "Pedido de cooperação"
908793961 = "O Sensei é convidado a colaborar com a \"Festa de Gehenna\", realizada anualmente no Dia dos Namorados. Para consolidar sua posição no Pandemonium, Makoto planeja uma festa mais grandiosa que a dos anos anteriores, e o Sensei [USERNAME] promete ajudá-la."
178695507 = "Início dos preparativos"
1845184843 = "O Sensei visita o novo edifício do Pandemonium, construído para comemorar a \"Festa de Gehenna\". Nesse momento, o Departamento de Desenvolvimento de Fontes Termais aparece e causa uma confusão... O Pandemonium entra em conflito com elas para impedir o tumulto."
2683514966 = "A exigência da presidente"
3216219097 = "Ao saber que o Departamento de Fontes Termais causou problemas, o Comitê Disciplinar corre para o local, mas o grupo se divide e foge. O Pandemonium tenta culpar Hina pelos danos causados ao novo edifício durante o combate e exige que ela fique responsável pela apresentação de piano, o evento principal da \"Festa de Gehenna\"."
2188512396 = "A filosofia da presidente"
3111060133 = "O Sensei chega ao local da festa para provar os pratos especiais. Ao notar que Makoto está agindo de forma estranha, ele pergunta aos outros membros do Pandemonium sobre o comportamento dela."
2921815513 = "A estratégia de relações públicas da presidente"
3677706014 = "Makoto mostra algo que preparou cuidadosamente para a divulgação da \"Festa de Gehenna\" e explica o plano perfeito que ela mesma arquitetou."
1869512390 = "A decisão da presidente"
381782239 = "O Sensei recebe um contato de Iroha. No escritório do Pandemonium, ele encontra Makoto agindo de forma incomum. De repente, ela declara a dissolução do Comitê Disciplinar e sai correndo. O Sensei e os membros do Pandemonium a perseguem... e, eventualmente, conseguem fazer com que Makoto volte ao normal."
189252809 = "Dia da festa"
2057531649 = "Faltam apenas algumas horas para a \"Festa de Gehenna\" e Hina ainda não chegou... Makoto revela que, sabendo que Hina não é boa com instrumentos musicais, ela a designou para o piano de propósito. Animada com o sucesso de seu plano, Makoto anuncia esse fato para toda Gehenna. Assim que a notícia se espalha, incidentes que estavam adormecidos por toda a região explodem de uma só vez."
2327264408 = "Início da festa"
2904008689 = "Hina chega ao local em segurança e, após resolver todos os problemas que surgiram em Gehenna em um instante, começa a tocar piano."
4181110086 = "0068 Com amor, da ópera!"
227323543 = "Na escuridão, a Problem Solver 68 entra em ação após receber um pedido! O alvo é o chefe da gangue, \"Don Arancino\". Será que elas conseguirão cumprir a missão com sucesso?"
