958604450 = "はじめまして。「Lore Friendly」管理人のORWELLです。\nキヴォトス各所で発見された都市伝説の情報を集めるインスタンス、「Lore Friendly」を開設しました。是非、ここで怪異や都市伝説の話をしていただければと思います。"
1269488525 = "どんな些細な異変だろうと構いません。情報が集まれば、世界の本質を探る大きな手がかりとなるでしょう。\n覚えておいてください――真の現実とは、私たちの認知の中に存在することを。\n\n共に、この地を知識と真理を育む探究の場にしていきましょう。"
671759831 = "へ～こんなんあったんだ！怪談好きなんだけど、どれも見たことあるようなのばっかで飽きてたんだよね。何か見つけたら投稿しよ～っと！"
2837975137 = "私も怪談好きだけどさ……ここ、何か怪しくない？最近できたばっかなのに登録者めっちゃ多いんだけど。どこかのバイラルマーケティングとか？管理人のアイコンも古臭いテレビだし……。忘れたころに見にきたら企業の広告ページになってた……なんてことないよね。"
4111771375 = "登録者が急増する都市伝説インスタンスって、そのまま怪談のネタにできそう。まあ、何かあったとしても新しいインスタンスを作ればいいだけだし、様子見でいいんじゃない？"
338790072 = "なんか最近、変な標識多くない？\n制限速度があるのに「速度を上げろ」って書いてあったり……この間野生動物注意って街中で見かけたよ。いるの？"
977601446 = "なんか私も見た気がする。なんで「速度を上げろ」なの？\n危ないから早く逃げろってこと？"
375819026 = "これもロアって言っていいのかな……\nペパロニとかいうキャラ。茹でられたニワトリみたいな見た目だった気がするんだけど……この前見たステッカー、全然記憶と違うデザインだったんだよね。"
1235015986 = "ねぇ、今ペロロ様のことバカにした？\n今どこにいんの！？ちょっと話あるんだけど？"
424362290 = "〇〇〇〇〇駅の近くに変な人いる···…\n真っ白な全身タイツ着て体操してるんだけど……こんな暑いのに。ヤバくない？暑さで頭おかしくなったのか、頭おかしいからこんなことしてるのか……ちょっと怖くて近づきたくなかった。"
3910063889 = "あ、それ私も見たかも。小さい川の隣に遊歩道があるとこでしょ。最初はビニールのゴミが引っかかって揺れてるのかと思ったけど違ったんだよね。近づくと消えるっていうか……気づいたらまたゆらゆらしてんの。"
2325372914 = "写真とかないの？\nスマホのズーム機能使えばゴミか人かくらいわかるでしょ。写真がない時点で嘘なのバレバレ。作り話するならもっと上手くやりなよ。"
3582262770 = "ヤバい……友達がそのあたりで倒れて入院しちゃったんだよね。その時周りの人も同じような話してたし……白い潜水服みたいなのを着た人が踊ってて、それを追いかけたら突然倒れたって。……結構ヤバくない？"
3177847880 = "都市伝説で思い出したんだけど、前にカヤ室長が戒厳令を出したときの噂知ってる？\n反対派を排除するために用意したサーモバリック弾……。あれって、SRTの特殊部隊員が使う予定だったらしいよ。SRTってもう閉鎖してる学園だよね？"
343714176 = "SRT特殊学園って黒い噂多いよな。連邦生徒会が禁止してる秘密兵器を持ってるって聞いた。今はコンビニの廃棄弁当取り合ってるとも聞いたけど……。"
3390104466 = "ぶっちゃけ、SRTの特殊部隊って本当に強いの？ヤバい犯罪者を捕まえたって聞くけど、相手が一人の時とか油断してる時ばっかり狙ってるんじゃない？本当に強いなら部隊じゃなくて個人で捕まえてるよね？"
2082038179 = "犯罪者相手に正々堂々ってw\n無策でいって被害者を増やすよりマシだと思いますけど。市民を守るSRTを貶して犯罪者擁護です？……もしかしてお仲間だったり？"
2762509097 = "急に何？こわ。もしかしてSRT出身？"
3323201397 = "最高級の和牛を、完全予約制のプライベート空間でお楽しみください！\n大切な人との特別なひとときを和牛を食べながら過ごしてみませんか？\nご予約はこちらから！"
2054008363 = "え？なんでロアインスタンスに焼肉屋の広告が出てくるの？\nバグ？"
2018231707 = "あー、フルリンク初めて？\n他のインスタンスの投稿も回ってくるんだよ。嫌ならブロックすればいいけど……まだできたばっかで投稿も少ないし、スルーすればいいんじゃないかな。"
2576877900 = "前に言ってた白いやつ！またいた！！\n見間違いじゃなかったみたい……遠くから見ても怖くて近づく気になれなかったよ。アレ追いかけて倒れたって話をどうしても思い出しちゃって……\nうー、怖すぎ。この道使うのやめとこ……。"
1966411185 = "目撃談増えてるね。ゲヘナの陸上部でも誰か倒れたって話あったけど、あれ本当？"
2212117541 = "私が聞いた話だと、ゲヘナの陸上部には変な噂があるんだって。今回倒れた子、一番成績いいらしくてさ。他の子が嫉妬して呪いかけたとか。あくまで噂だけど、火のないところに煙は立たないって言うからね……^^"
2130375924 = "勝手なこというのやめなよ。見てて気分悪い。"
621158106 = "ゲヘナ陸上部では、マラソンを一緒にしてくれる新入部員を募集しています！\n走るのが好きなゲヘナ生ならどなたでも大歓迎です！\n……走るのが得意じゃなくても、逃げるのに慣れてるゲヘナ生も歓迎！\n陸上部で心身を鍛えて、風紀委員会から自由になろう！\n興味のある生徒は@Gehenna_AthleticsにDMください！"
4254384135 = "シャーレって勝手に入っていいの？結構出入りしてる生徒いるみたいだけど、先生って人に招待されないと入れないの？普通に行ってもいいの？"
2198577225 = "チキン食べたい"
2048584069 = "今日お昼に月天市場行った人いる？\nめっちゃ可愛い子が飲み物配ってたんだけど……どこかの宣伝モデルなのかな？\n忙しかったから話しかけるのやめたんだけど、せめて飲み物くらいもらっておけばよかった～"
3927977111 = "月天市場のどこ？今せんべい屋の前にいる！"
4148671665 = "前に扇子売ってた屋台があったとこの近くだよ！"
856886527 = "ほんとだ！めっちゃ可愛いじゃん！\nどこかで見たことあるかも……読モとかかな？もうちょっとで思い出せそうなんだけど……。"
964535569 = "今日のD.U.の天気は晴れです。\n最高気温は30度、最低気温は20度です。\n日中は気温が高くなりますので屋外活動にはご注意ください。"
2749646398 = "暑い……暑すぎてもう裸で登校したいレベル。"
1774042646 = "覚えてる人がいるか分からないんですが、以前、友達が変なもの見て倒れたって投稿した者です。\n今日、目を覚ましたって病院から連絡がきました。原因はまだ不明らしいけど、体に異常はないみたいです。本当に良かった……ほっとして気が抜けました……。"
3053562159 = "同じく！私の友達も例の遊歩道で倒れたんだけど、目が覚めたって！\n気温が下がって涼しくなったからかな？とにかく良かった！"
2090505947 = "結局何だったの？本当に原因分からないの？"
2642813418 = "似たような目にあった人がほぼ同時に目が覚めるって……なんか変だね。\n陸上部の件も含めて、誰かに恨まれてるとか？"
566774827 = "キヴォトス陸上インターハイ出場選手決定！\n注目は短距離代表のイトウ選手。長期入院から復帰したばかりですが、見事自己ベストを更新し代表に選出されました。\nインターハイで戦う選手たちの応援よろしくお願いします！"
1900309917 = "みんなが言ってた場所に行ったけど何もないじゃん！\n白いヤツを実際に目にしたらどうなるのか体験してみたかったのに……やっぱり全部嘘だったんだ！"
3994228846 = "連邦生徒会長が戻ってきてから、変なこと増えてない？気のせいかもしれないけど。\n変なものの目撃談とか、怖い体験したって生徒も増えてるし。行方不明の話もよく聞くようになったような……\n連邦生徒会長はちゃんと仕事してるみたいだけど……なんかおかしい……前はこんなんじゃなかった気がする。"
3825455165 = "つか、このインスタンスつまんね。白いくねくねしたヤツの話もただの熱中症だったっぽいし。怪談って言って投稿されてるのも、どれも作り話ばっかりで萎える。なんかヤバいことでもない限り見に来なくていいかな。"
258414054 = "友達から聞いた話なんだけど……マジだったらヤバすぎる都市伝説。\n港の近くにある消費者金融が、借金を返さないヤツにヤバい拷問をするんだって――「ドラム缶ガニ」っていう拷問らしいんだけど。"
2946576035 = "ドラム缶の中に人を入れて、後からカニをたくさん入れるんだって……お腹が空いたカニは中の人をたべちゃうんだとか。一部の業者が使ってる方法らしいんだけど……怖くない？"
620464260 = "え、怖……てか、どうやってその話聞いたの？関係者とか？幽霊に聞いたなんて言わないよね？"
3927824555 = "似たような話聞いたことある。多重債務に悩んでた人が港で行方不明になったって記事……最近多くない？気のせい？"
4092725241 = "信じるか信じないかはご自由に。後から後悔するのはそっちだし。"
2791299244 = "カニ味の魚肉ソーセージのこと「スナイパーのおやつ」とか言ってるやつ誰だよ？\n魚肉ソーセージとかどう考えてもハードボイルドとは真逆だろ。冷酷に淡々と任務を遂行するスナイパーなら生魚の方がそれっぽくない？"
3212941527 = "あの、ハードボイルドは「完熟」という意味ですが。"
3967235797 = "ドラム缶ガニの話、なんか妙にリアルだよね。私も昔カニ食べる時に手切っちゃったことあるけど、あれが全身にって思うと……想像しただけでゾワゾワする。"
2155647036 = "カニのハサミって固くて食べづらいよね。関節に切れ目を入れるといいよ。"
1432595114 = "分かる。蒸したあとに冷水にくぐらせとくと、剥きやすくなるよ。ゆで卵と同じ原理！"
755007697 = "このインスタンスの目的忘れてない？ここロアの話するとこなんだけど……関係ある話しよ？"
3344696113 = "最近のデリバリーって店の宣伝もしてんの？\nさっき配達の子からいなり寿司もらってビックリした。\n普通に美味しかったけど、これ採算取れてる……？"
4073972244 = "なんか今年、カニがめちゃくちゃ捕れてるんだって。\n漁師やってる親戚が言ってた。値崩れしてすぎて出荷しないほうがマシレベルだとか。"
4092617623 = "え？近所のスーパーのカニ、全然高いけど。"
2379175343 = "全ては連邦生徒会が裏でやってるんじゃない？カニが簡単に食べられないように価格操作してるんだよ。"
323935886 = "カニって結構弱いよね、\nすぐ死ぬし……衝撃ですぐ脚取れて商品価値なくなるし……\nあの硬い殻、意味あるのかってレベル。"
2223860917 = "今日鐘崎港で見つけた「穐田水産」の炒飯、マジで信じられないくらい美味しかった！\n「海鮮なんてどこも同じ」って思ってたんだけどここの「カニ肉炒飯」常識がひっくり返るくらい美味い。\n新鮮なカニ肉がどっさり入ってて、全然生臭くないの。人生で一回は食べてほしい。「FOX EATS」のバイトの子が教えてくれたよ。"
1925481253 = "最近カニ料理ちょっと無理かも。\nドラム缶ガニの怪談を読んでからカニどころかエビも……。"
486337531 = "分かる。"
1643990071 = "このぬいぐるみ、見かけたことある人いない？\nモモフレンズ界隈で幻になってるペロロジラってぬいぐるみなんだけど……怪異でもいいから欲しいよ～"
3906071520 = "それって、在庫が全部海に沈んだっていう伝説のグッズでしょ？\n欲しがってる人多すぎて、モモフレンズ関連のインスタントで怪文書たまに見るよ。"
4229544793 = "ぬいぐるみじゃないけど、似たようなのは見たことある。\n夜勤の時、海でそんな感じの怪獣がビーム撃ちながら暴れてた……。"
2485934715 = "さすがにそれは盛りすぎ。\n知らないなら知らないって正直に言えば？"
1654528356 = "お金に困っててもカニ漁船だけは絶対やめとけ。\nこの前やっと逃げられたんだが、狭い船上で休む暇もなく一日中網引かされて……給料はコンビニバイト以下。マジ終わってる。\n……あのとき、開封済みの妖怪MAXなんて飲まなきゃよかった……。"
4199579873 = "「開封済みの妖怪MAX」とか言ってる時点で、釣りだろそれ。\nまあでも、カニ漁船が地獄なのはガチっぽいけど。\n知り合いも乗りに行くって言ってから連絡とれなくなったし。"
2564932040 = "それ、電車の切符間違えただけじゃない？D.U.中央区の乗り換えって結構分かりづらいし、変な駅で降りたって話もよく聞くけど。"
3127658278 = "いや、学園自治区ならまだしも、D.U.で行き先の違う切符を使えるわけないだろ。\nハイランダーの車掌に放り出されるぞ。"
1114191429 = "D.U.でカニ漁船に乗る場所って……鐘崎港？\nあそこ、カルパッチョ・ファミリーが牛耳ってるとこだよね。気をつけなよ。例の「ドラム缶ガニ」も本当にやってるって噂だし……。"
