2549347011 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]地獄への道は善意で舗装されている。[/i][-][/c]"
2455668066 = "[c]自分のフェーズ開始時：[/c]自身のHPが[c]{param;ConditionNum}[/c]以下であれば、HPを[c]{param;BasePower}[/c]回復する。"
