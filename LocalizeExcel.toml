486547176 = "Após o show, enquanto esperam pelos resultados, elas relembram todo o esforço feito até agora. E, tendo sido aprovado com sucesso, o Clube de Doces do Pós-Escola vai buscar o Semla."
3960756384 = "\"Estou feliz! Mas...\""
2397142676 = "Como o show foi um sucesso estrondoso, o Clube de Doces do Pós-Escola acaba recebendo atenção excessiva dos holofotes."
