504801665 = "The Final Ghost Story"
2245860834 = "Alien Gray (1)"
790458143 = "Alien Gray (2)"
2181388028 = "Blue Tsuchinoko"
3119162552 = "BBQ & Chili"
3238893428 = "There's No Such Thing as the Occult!"
2939235592 = "anonymous who?"
1616764732 = "Iron Maiden"
931273608 = "Lucky Animal"
514500469 = "This week's fortune is the worst! In her morning horoscope, Konoka was told her worst day ever would arrive in three days. While venting about it to friends on social media, Konoka finds a topic regarding symbols of good luck."
427498716 = "The Search for the Tsuchinoko"
3051451417 = "Konoka reports to Kanna that she is taking time off to search for the Tsuchinoko—a snake said to bring good luck. Sensei, who happened to be there for another matter, ends up accompanying Konoka at Kanna's request. After a bus ride to a rural town with reported sightings, the two meet up with Konoka's 'friends.'"
1657577479 = "A Girl with That Kind of Persona"
907137836 = "Konoka's friends are Lena from the Occult Research Club, and Tsubasa, who claims to be the director of the 'Moe Paranormal Research Institute.' Lena hits it off with Tsubasa over occult talk, but insists that she herself does not believe in the existence of the Tsuchinoko."
1462024252 = "The Ghost Bus"
3930709287 = "On their way to the mountain villa where they will stay, the group receives a warning from an eerie old man. Konoka is frightened, but the group arrives at the villa regardless. Setting out for investigation after a short break, they encounter the rumored 'Ghost Bus' on their way to the destination. Though momentarily misled, they successfully repel it thanks to Konoka's quick thinking and board the correct bus."
3598423513 = "The Living Statue"
166220328 = "During the investigation, Tsubasa reveals to Lena that her club has already been abolished. Meanwhile, Konoka, investigating alone, finds an ominous box in the ground. While Konoka suggests reburying it, Tsubasa opens the box to find a stone statue inside. Judging by the material and deterioration, Tsubasa dismisses it as a prank, but Konoka reburies it deep underground. As they leave, Sensei makes eye contact with the statue that was supposed to be buried."
3910110965 = "The Shadow Approaching the Cabin"
1933749352 = "The group returns to the lodging late in the evening, exhausted from the forced march. As the only energetic one, Konoka offers to prepare dinner, while Tsubasa and Lena fall asleep from exhaustion. Waking up to a suspicious presence, Lena and Sensei try to discover its identity despite their fear. Just then, Konoka returns to the room with food. Konoka says she also saw a mysterious shadow, and Tsubasa begins to suspect that one of the 'Seven Prisoners' with a grudge against the Public Security Bureau has come for revenge."
1284600502 = "Telephone Booth Echoing with Resentment"
105361616 = "Continuing their search for the Tsuchinoko the next day, the group accidentally misses the evening bus. They try to call a taxi but are out of range, so Konoka and Sensei use a public phone. After arranging a taxi, the two try to leave the booth, but for some reason, the door won't open. Furthermore, the public phone rings, and when they pick up, an eerie voice is heard. No matter how long they wait, help does not come, and finally, Konoka resolves the situation with brute force to escape."
2528363471 = "The Final Ghost Story"
1322186565 = "While waiting for the taxi, a bipedal bus appears... but Konoka repels it with brute force. With the series of strange incidents continuing, the suspicion that someone is operating behind the scenes turns into a conviction. At night, the group notices someone monitoring them from outside the window. Konoka says everything would make sense if the culprit behind the series of incidents was 'Kyoko Mitsui' of the Seven Prisoners. The group tries to capture the suspicious shadow, but it vanishes like smoke, resulting in failure."
1478179506 = "Alien Gray (1)"
1728431009 = "Seeing a white shadow captured in a photo, Tsubasa insists the culprit behind the paranormal phenomena is an Alien Gray. While the debate heats up, the group realizes someone is intentionally isolating the villa. The phone lines were cut and the bridge was destroyed. However, the culprits whose identity is finally revealed are delinquents with a grudge against Konoka..."
3654864579 = "Alien Gray (2)"
1998146 = "The group deals with the delinquents. Upon questioning, it turns out everything from spreading the Tsuchinoko rumors was the delinquents' doing. At this fact, Tsubasa, who had planned to revive the 'Pseudoscience Club' using the achievement of finding a Tsuchinoko, is visibly depressed. However, none of the delinquents wore white clothes, which did not match the white shadow in the photo. As the group tilts their heads in confusion, Mirai, who had been hiding out of concern for her junior Tsubasa, reveals herself."
3085789925 = "Blue Tsuchinoko"
2378286215 = "Failing to find the Tsuchinoko after all, Konoka trembles at the thought that the worst luck of her life is approaching. However, counting from the day of the fortune broadcast, four days had already passed, meaning she had already survived 'the day' three days later. Lena points out that she has already encountered enough bad luck looking back at the events, but Konoka accepts it, thinking that perhaps the adventure of searching for the Tsuchinoko was the true Tsuchinoko all along."
1641141706 = "BBQ & Chili"
844112461 = "With all the problems settled, the group enjoys a BBQ, including the delinquents. Konoka is surprised to see how attached Tsubasa is to Mirai, but teases Mirai for being overprotective by watching over her junior to the point of peeping late at night. However, Mirai replies that it wasn't her who was peeping into the cabin that night."
391374629 = "There's No Such Thing as the Occult!"
3407161162 = "Deep into the night. Lena was confidently reporting the truth of the Tsuchinoko commotion to her senior in the Occult Research Club. In the middle of it, she is taken outside the cabin by Tsubasa. The reason Tsubasa gathered everyone outside was to communicate with the cosmos. In the mountain night, voices of 'Aliya-Ali-Ali' echo through the trees."
4096947749 = "anonymous who?"
2337427686 = "The one who sent the Tsuchinoko information to Konoka on social media was Himari. In the Phenomenon Operation Group's clubroom, Himari is analyzing the events Sensei and the others experienced with interest. She exchanges opinions with Eimi, who arrived later, and the data indicates something that can only be described as a 'Special Phenomenon.'"
450338200 = "Iron Maiden"
3543633081 = "The Valkyrie Public Security Bureau is noisy with delinquents who have rushed in to turn themselves in. Meanwhile, Kanna was having a meeting with Misuzu, the Correctional Director."
1242866448 = "The incident has settled, and everyone seems to be enjoying a BBQ at the mountain villa..."
165422936 = "Lena reports the truth of the Tsuchinoko incident to her senior in the Occult Research Club. Later, in the middle of the night, Tsubasa calls everyone including Lena..."
1637396176 = "The account 'anonymous' that spread Tsuchinoko information on social media. Its true identity is...?"
2318234019 = "The Valkyrie Public Security Bureau has become noisy with delinquents rushing in to surrender. Meanwhile, Kanna seems to be speaking with a certain visitor..."
2797873094 = "Infiltration Proficiency Lv.{0} Achieved"
3621053436 = "Field"
4173121054 = "This Is My Daily Life"
759367300 = "While visiting Millennium, Sensei witnesses Akane having an awkward conversation with a classmate. On the way out, Sensei runs into Akane, who was waiting for them, and they decide to head home together. Along the way, Akane opens up about how difficult she finds it to interact with others. Upon hearing this, Sensei tells her that while there is no rule saying she has to get along with everyone, they will support her if she wants to try. Thus, the 'Let's Get Closer' operation between Akane and Sensei begins."
2673536527 = "A Step Forward"
2811609032 = "Based on the script she brainstormed with Sensei, Akane begins her operation to get closer to her classmates. With a tiny wireless earpiece to receive help from Sensei, Akane attempts to communicate with her classmates using a persona she created. Although the interactions remain awkward and her unnatural behavior is quickly seen through by her classmates, she fearfully explains the reason why. After finally managing to act a bit more naturally, Akane spends a pleasant time with them."
3944103849 = "Side by Side"
1930446094 = "Akane invites Sensei to an empty classroom. To show the results of the trial and error she went through with Sensei, she begins a 'roleplay' session with them. Though they start off playfully, Akane eventually tears up and confesses, 'I can put on a facade, but I don't really know who I am.' Even so, she speaks fragilely about how happy she is to have at least one special person like Sensei to whom she can confide her worries."
2908734044 = "The Best Way to Clean Up"
2828576144 = "Akane consults Sensei about how her use of explosives has become too predictable. While they are discussing this at a cafe, the two get caught up in terrorist activity. The Valkyrie students who arrive on the scene are unable to act freely because civilians are being held hostage. Akane seizes the opportunity to attempt a peaceful resolution, but when the situation fails to improve despite the time spent, she ultimately resolves everything using explosives."
