184225747 = "O KAITEN FX Mk.0 ativa partes específicas a cada certo intervalo de tempo.\nDependendo da parte ativada, efeitos específicos são aplicados.\nEnquanto a parte estiver ativada, o dano recebido pelo KAITEN FX Mk.0 também é acumulado nessa parte."
2040549983 = "Quando o dano acumulado faz com que o HP da parte chegue a 0, ela é destruída.\nAs habilidades da parte destruída não serão mais usadas.\nAo destruir uma parte, o inimigo entra em estado de grogue e seu ATG é reduzido."
