3736589523 = "嵐ノ丘"
1039873231 = "真冬の夜の夢"
2085930861 = "クリスマスキャロルは"
255082210 = "キヴォトスのクリスマス！"
4167041875 = "しんしんと雪が降るクリスマスの朝。先生はサンタ服を身にまとったセリナとハナエと共にボランティアの準備をしていた。\rあらかた準備も終わったところで、団長のミネはトリニティの見回りに出発することに。後で合流するミネを見送って、先生たちはボランティアの現場に向かうのだった。"
606569055 = "秘密と花園"
942159035 = "現場に向かう途中で、正義実現委員会がクリスマス会を開く事を聞いた一行。セリナとハナエは、いつも苦労の絶えない正義実現委員会がクリスマスを楽しめていることを喜ぶのだった。"
2280920957 = "Les Miserables……？"
3046061777 = "クリスマス当日にもかかわらず、正義実現委員会のハスミとツルギ、マシロは路地裏で不良たちと対峙していた。そうして不良たちを追い詰め、「例のモノ」を回収する。計画が台無しになった不良たちは、ボランティアに向かう途中の先生と救護騎士団の姿を目にし、良いことを思いついたとほくそ笑むのだった。"
3517655244 = "ナイトメア・イン・クリスマス"
3684306682 = "用意していたプレゼントの配布や募金の呼びかけを行う先生と救護騎士団一同。そんな中、怪我をしている通りすがりの不良から、正義実現委員会に大切なチキンを奪われたのだと告げられ――"
1420301580 = "救護・エクスプレス"
2915910172 = "セリナとハナエは、不良たちの悲しい出来事を聞いて、自分たちの救護が届かない人もいるという事実に思い悩む。事情を聞いたミネは自分の不甲斐なさを悔い、すぐさまクリスマス会を開いている正義実現委員会のもとへ向かうのだった。"
186128367 = "シビレル・ウォー"
34322318 = "正義実現委員会一同はカフェを貸し切って、ささやかなクリスマス会を楽しんでいた。日々の忙しさを忘れ束の間の休息を満喫しているところに、救護騎士団のミネが訪れ、不良の件を問い詰めていき――事情も聞かずに銃を取り出したミネを前に、ツルギとマシロは応戦を余儀なくされるのだった。"
3152503825 = "若草者・語（１）"
486440598 = "ミネが抗議に訪れたことで、正義実現委員会がクリスマス会を行っている会場に大きな爆音が鳴り響いた。騒ぎを聞きつけハスミも出てきたが、まるで話が伝わらないミネに苛立ちを覚え、応戦する事を決意するのだった。"
847967838 = "若草者・語（２）"
3387101415 = "ハスミは戦いのなかで、ようやくミネの口から襲撃の理由を知る――それが誤解であると口を開きかけたところで、第三の乱入者が現れるのだった。"
1131207087 = "嵐ノ丘"
230232017 = "救護騎士団一行は、正義実現委員会から不良たちが起こした騒動を教えてもらう事に。すべては、誰も食べたがらない激辛の「ヘルファイアチキン」を押し売りする不良たちにあった。事情を知った一行は、力を合わせて不良たちを制圧するのだった。"
3422854071 = "真冬の夜の夢"
3002551130 = "一連の騒動を振り返り、救護騎士団は心からの謝罪を尽くす。誤解が解けたのだから構わない、とハスミは笑い、良かったらクリスマス会に参加しないかと一行を誘う。そうして、みんなでクリスマス会を楽しむのだった。"
1167819476 = "クリスマスキャロルは"
3350329729 = "クリスマス会に参加し、和やかに談笑する一行。そこには先程までの憂いなど残っていなかった。様々な事が起きた一日だったけれども、笑顔の花が咲く幕引きとなったのだった。"
3515690501 = "喰積の 前にいささか～一番勝負～"
3302268299 = "年の瀬も近づいた頃。久々に満足の行く名店『スズメ亭』を見つけた美食研は、同店が閉店の危機にある事を知り……破天荒な美食研と、フウカの織りなすドタバタお店再建劇が今――幕を開ける！"
440741347 = "スズメ亭の危機"
2014113057 = "助けが必要です！（１）"
3230130893 = "助けが必要です！（２）"
1696756168 = "FUUKA'Sキッチン"
2667165645 = "これで勝ったと思うなよ！"
566217637 = "愚民どもには分からないだろう！"
