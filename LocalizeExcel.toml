2374839960 = "Pelúcia que Ibuki ganhou de suas senhoras favoritas. Apesar da aparência um pouco estranha, é o que ela mais gosta."
938424299 = "Giz de cera que Ibuki sempre usa. O mundo que Ibuki desenha é literalmente vasto e sem limites."
1063147996 = "Comida favorita de Ibuki. É um lanche valioso que ela só pode comer um por dia, mas parece que às vezes desaparece da geladeira."
1559446809 = "Mochila de Ibuki com seus pertences. Tem celular, apito, arma, lenços de papel que as senhoras lhe deram e até pétalas de flores."
917196592 = "Desenho das senhoras favoritas de Ibuki. Por ordem especial de Makoto, foi designado como tesouro de Gehenna."
1246509466 = "Publicação periódica criada para transmitir a dignidade do Pandemonium. No entanto, a maior parte do conteúdo é sobre Ibuki, sendo tratada como um item de Ibuki."
1636079057 = "Tabela de inspeção com a avaliação de higiene do Departamento de Merenda. Quase nota máxima, mas raramente, por razões inevitáveis, não atinge a nota de aprovação."
1783365279 = "Kit de afinação de piano encontrado no prédio antigo. Bastante antigo, mas como o antigo dono cuidava bem, está em condições de uso."
561939847 = "Mochila escolar que alguém esqueceu. Além de livros, doces e mangás, tem bombas lá dentro, o que é bem típico de Gehenna."
1142909824 = "Jornal do Pandemonium queimado. Felizmente, não há artigos sobre Ibuki, apenas o discurso de Makoto. Ninguém sai perdendo."
4224932345 = "Livro de registro de entrada e saída da cela especial, controlado pelo Comitê de Disciplina. Originalmente um documento importante para segurança, agora se tornou um livro de visitas de alunos que frequentemente entram na cela."
186189428 = "Coador de café que Ako preparou para Hina. É um item que transmite o carinho e cuidado da secretária, mas há críticas de que o café feito por Ako não é gostoso."
2653748522 = "Receita que Juri escreveu detalhadamente para estudar culinária no Departamento de Merenda. Seguindo esta receita, é possível fazer uma comida deliciosa, a menos que algo muito grave aconteça."
2932450416 = "Carta que Cherino enviou a Makoto. Contém mensagens sobre o espírito de liderança e votos para o desenvolvimento da escola Gehenna."
1955500566 = "Colher encontrada na cela especial. Usada para comer, escapar da cela ou se transformar em super-herói."
652268410 = "Pilha de documentos com os trabalhos do Comitê de Disciplina. Cheia de letras e números que só de olhar dá dor de cabeça. Se derrubar, é um desastre! Cuidado!"
3128527829 = "Lista de pacientes escrita por Sena. Desde os que precisam de tratamento prioritário até os que fingem doença, tudo resumido com calma, mostrando a natureza meticulosa de Sena."
4077140834 = "Vale-refeição perdido por alguém. O dono é desconhecido, mas as palavras 'ansiosa!' escritas no vale são um tanto melancólicas."
3849298482 = "Cartaz amassado e jogado fora. A maior parte do conteúdo é sobre as grandes realizações de Makoto, então não tem utilidade."
88965538 = "Seringa do Departamento de Medicina de Emergência ainda não utilizada. Cuidado para não tocar nela!"
