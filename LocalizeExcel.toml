753107124 = "Não está faltando um pouco?"
1883127960 = "Airi estava preocupada com o tema do festival escolar. Ao ver uma apresentação de guitarra por acaso, ela tem uma ideia."
185156526 = "Vamos montar uma banda!!"
1646859781 = "Airi corre até a sala do Clube de Doces Depois da Escola e sugere montar uma banda. Yoshimi, Natsu e Kazusa ficam confusas, mas ao ouvirem que a recompensa pela apresentação na cerimônia de abertura do festival escolar é a \"Frederica Semla\", a rainha dos doces, o clube decide formar uma banda às pressas."
1617050729 = "A coisa mais importante"
749480935 = "Ao serem perguntadas sobre o que é mais importante em uma banda, as integrantes do Clube de Doces Depois da Escola dão suas opiniões. Isso acaba definindo o papel de cada uma. Enquanto os instrumentos são decididos conforme a situação, Airi é a única que parece desanimada. À noite, ela procura o Sensei para desabafar sobre suas preocupações com a escolha da música."
188886584 = "O nobre de Wildhunt"
2265387020 = "Para resolver o problema de Airi, o Sensei tenta encontrar a aluna da Academia de Arte Wildhunt que Airi disse ter visto anteriormente. Mesmo tarde da noite, sem pistas, quando estavam prestes a desistir, a pessoa que procuravam aparece."
2422729638 = "Uma versão diferente de mim"
2553404339 = "Ao entardecer, Airi é a única que permanece na sala de prática. Para o Sensei, que está preocupado, ela diz que vai se transformar em alguém diferente do que era antes. No dia seguinte, o Sensei recebe uma mensagem de Yoshimi dizendo que Airi desapareceu de repente."
3689885592 = "Por quem"
670625935 = "Enquanto o Sensei sai para procurar Airi, Yoshimi, Natsu e Kazusa conversam sobre ela. A conclusão a que as três chegam é roubar a \"Frederica Semla\" por causa de Airi. Decididas, as três partem para o local onde a Semla está guardada."
1244213426 = "Qualificação"
2533353309 = "Airi desabafa sobre seus conflitos internos para o Sensei, que veio procurá-la. Ela chora, dizendo que não desapareceu por causa da Semla, mas porque sente que não é uma pessoa que deveria estar naquele lugar. O Sensei tenta consolá-la, mas recebe um contato do Tea Party. Dizem que três alunas foram detidas na delegacia..."
3267285556 = "Uma história de juventude"
301716970 = "O Sensei e Airi chegam à delegacia onde Yoshimi, Natsu e Kazusa estão detidas. As três entregam a Airi um pedaço da Semla que conseguiram obter. Em meio a um reencontro emocionante, Airi finalmente revela suas preocupações. Por outro lado, Tsumugi, ao ouvir a história do Clube de Doces do Sensei, fica impressionada com tal história de juventude e entrega ao Sensei uma música que ela mesma compôs."
2859256604 = "Não está faltando algo (1)"
2713245801 = "Airi discute o tema do festival escolar com seus colegas de classe. Depois disso, ela mostra um sorriso para as integrantes do Clube de Doces Depois da Escola que a esperavam na cidade."
2939453841 = "Não está faltando algo (2)"
1029444936 = "No terraço de um prédio pouco frequentado em Trinity, o Clube de Doces Depois da Escola se reúne para tocar música."
1568618102 = "Shiina Tsumugi"
3174803636 = "O Clube de Doces Depois da Escola e o Sensei vão assistir ao show de Shiina Tsumugi. Lá, eles presenciam algo que vai além da imaginação de Tsumugi e das outras."
1289951502 = "O que significa poder trair"
3100982585 = "O Sensei e o Clube de Doces Depois da Escola relembram o dia em que lutaram para roubar a \"Frederica Semla\". Naquele momento, alguém que fala sobre justiça aparece de repente..."
