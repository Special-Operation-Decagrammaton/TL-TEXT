1967708666 = "C&Cの新たな臨時メンバー"
2816760860 = "セミナーからの依頼を受けたC&C一同と先生は、ミレニアムの問題児を捕まえるため、他校のクルーズ船へとに潜入することになる。"
1134085300 = "スマートに行こう（１）"
2193456480 = "「白兎」と呼ばれる生徒「黒崎コユキ」を捕まえるため、「オデュッセイア海洋高等学校」のクルーズ船のひとつ「ゴールデンフリース号」へと潜入したC&C一同と先生。\rユウカから「スマートにお願い」と頼まれていたものの、潜入早々ネルがついいつも通りに手を出してしまう。"
2483236395 = "スマートに行こう（２）"
1884799725 = "追手をどうにか撒き、客室へと忍び込んだC&C。どうやらこの船のルールのようなので、メイド服からバニーガール衣装へと着替えてから、本格的に任務を開始することに。"
1056530700 = "いつも通りの思考回路（１）"
1693954578 = "システムルームへと到達し、アカネがシステムの掌握を始めようとする。その間に白兎についての話をする中、気が付くとアカネがいつものようにC4を設置しており……？"
1022905949 = "いつも通りの思考回路（２）"
1449739310 = "つい浮かれてしまったこともあり、アカネがいつも通りにシステムルームを破壊してしまう。一同は自身を責めるアカネのことをカバーしつつ、プランBを始めるのだった。"
1520912610 = "無慈悲な尋問"
565467883 = "一同は少し前に捕まえていたバニーガール·ガードを起こし、彼女から情報を得ようとする。その方法について考える中で、「私がやる」と言い出したカリン。彼女はバニーガール·ガードに向けて手を伸ばすと……。"
3624501163 = "二転三転いつも通り"
451418386 = "バニーガール·ガードは気絶してしまったが「プライラウンジ」という情報を入手し、一同はそこへの突入を決める。ネルと先生が一緒に探し始めると「白兎」は簡単に見つかったのだが、突如部屋の大画面にアスナが映ったため、こちらの存在がバレてしまうことに。"
2744902706 = "ここからはいつものC&C（１）"
1270600116 = "多勢に無勢で牢屋へと入れられてしまったネルと先生。「白兎」の黒崎コユキとの会話の途中、アカネとカリンがやってくるのだが、彼女らもまた捕らえられてしまった身なのだった。"
1477170984 = "ここからはいつものC&C（２）"
3631747017 = "ネル、アカネ、カリンと先生を捕まえた状態で、調子に乗って高笑いする「白兎」。そこに続けてアスナが登場し、これで全員捕まえた……と思ったのだが、アスナはいつの間にこの船におけるVIP待遇になっていた。状況は一転、「白兎」は追われる立場へと変わってしまうのだった。"
3892929799 = "兎狩り（１）"
1875159880 = "今度はネルが高笑いしながら、泣き叫ぶ「白兎」を追いかけ続ける。アカネとカリン、そして先生はその様子を眺めつつ、「もう少ししたら危なくなる前に止めよう」という話をするのだった。"
2450097182 = "兎狩り（２）"
1604146950 = "最終手段として船からドローンで脱出しようとした「白兎」だったが、カリンに狙撃されて結局捕まってしまうことに。\r今回も無事に任務を終えた、と思ったC&Cだったが……？"
2677397330 = "初音ミクのスペシャルライブ"
747922562 = "あのバーチャル・シンガー「初音ミク」が、新しい身体と新曲を持って、遂にキヴォトスに登場です！"
3536644942 = "初音ミクのスペシャルライブ in キヴォトス　～リハーサル編～"
950748371 = "初音ミクのスペシャルライブ in キヴォトス　～リハーサル編～"
1881031906 = "バーチャル・シンガー「初音ミク」の、キヴォトスでのライブ開催が決定！実際の本番の前に身体のチューニングを兼ねて、彼女は観客のみんなと共に特別な予行演習を行うことに。"
1198367208 = "227号温泉郷の運営記録！"
266434959 = "ある日突然旧校舎から温泉が湧き出し、温泉郷を運営することになった227号特別クラス。訪れる生徒たちが次々にトラブルを起こしていく中、果たしてノドカたちは無事に温泉郷を運営していくことができるのか！？"
