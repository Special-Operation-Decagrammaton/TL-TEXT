1138064459 = "Batalha decisiva contra o Precipitador (1)"
653632133 = "Arona explica ao Sensei sobre a outra Shiroko e a luta contra o Precipitador."
743188901 = "Batalha decisiva contra o Precipitador (2)"
1768446809 = "Shiroko de outra linha do tempo anuncia o início do combate."
3559357232 = "Batalha decisiva contra o Precipitador (3)"
175380778 = "Quando o Sensei consegue derrotar Shiroko e o Precipitador, os membros do Comitê de Contramedidas de Abydos chegam. Ao vê-los, Shiroko chora."
671174902 = "Batalha decisiva contra o Precipitador (3)"
1506582050 = "Na outra linha do tempo, onde todos os outros perderam a vida. Diante de Shiroko, prestes a morrer, a luz do Colorido desce, e os sacerdotes anônimos tentam contato. O Sensei, exausto, aparece diante de Shiroko. Seguindo as palavras do sacerdote, ela tenta apontar a arma para o Sensei, mas não consegue puxar o gatilho. Em seu lugar, o Colorido desce sobre o Sensei – O Precipitador, que se levanta novamente, concentra toda a energia da Arca em si."
2619612699 = "Batalha decisiva contra o Precipitador (3)"
2390720928 = "Com a energia da Arca concentrada no Precipitador, em uma situação crítica onde, se não ativarem a 'sequência de autodestruição' imediatamente, tudo terá sido em vão, eles usam a 'sequência de fuga' para escapar…… Rin e Ayane ficam para apoiar o Sensei."
520943432 = "Batalha decisiva contra o Precipitador (4)"
949507711 = "Rin e Ayane preparam o canhão principal do Utupishtim…… e pedem ao Sensei que evacue todos os alunos imediatamente após o disparo."
3111223626 = "Batalha decisiva contra o Precipitador (5)"
3111014573 = "O grupo consegue derrotar o Precipitador e, antes que seja tarde, envia os alunos de volta à superfície, um por um."
2526989395 = "Batalha decisiva contra o Precipitador (6)"
2908349328 = "Restam apenas Shiroko, o Sensei e o Precipitador – O Sensei sorri, dizendo que o sofrimento das crianças é responsabilidade dos adultos – E o Precipitador pede que ele cuide de seus alunos, e o Sensei atende."
299397497 = "Trabalho de restauração: distrito de Shirataki, D.U."
3012757111 = "Mesmo com a situação resolvida, a cidade ainda não recuperou sua forma original. Prossiga com o trabalho de restauração e reconstrua Kivotos!"
