3044534023 = "Flower Blooming in the Desert"
4064366271 = "Although it was a day of paperwork hell, thanks to Ayane coming for duty, it was finished earlier than planned. While spending a relaxing break with Sensei, Ayane talks about her attachment to her cherished hairpin and her hopes for the future."
4002954459 = "Unexpected Gift"
3433269143 = "While helping Sensei, Karin tore her fishnet stockings. Since they tore during work, Sensei offered to buy her new ones, and they headed to the fashion corner. Karin, having received plenty of spares, says she will keep one pair as a memento of today."
3855969483 = "Reminiscing Fräulein"
3093547927 = "Sensei paid a surprise visit to Iroha, who claimed to be busy. While helping clean the break space, Sensei found a book. Iroha explains that it was the book that got her into reading. From this day on, new memories were added to that book."
3764553248 = "Normal"
1131725880 = "Kisaki asks Sensei to forget her title as 'Gatekeeper' and spend time as a normal student for now. Even so, she still feels a bit tense. Seeing this, Sensei suggests she can rely on him more. Thus, Kisaki learns to act according to her own heart."
972685946 = "Letting Go"
3383869734 = "When Sensei went to the meeting place, Kiki was waiting there. Unlike the usual Kisaki, Kiki is open and playful. Sensei spends the whole day playing with her, but she tries a bit too hard, and Kisaki's body complains of fatigue."
3844124237 = "Journey to Heaven"
2515631888 = "Invited by Kisaki early in the morning, Sensei enjoys the valley's famous boat ride with her. The small boat carrying the two moves quietly across the water. Morning mist envelops the valley formed by the towering mountains. In scenery that could be mistaken for heaven, Kisaki and Sensei confirm each other's presence."
103013825 = "Blue Butterfly"
1653920718 = "A while after returning from the valley, Kisaki asks Sensei to take her somewhere she can use the swimsuit she prepared. The two play at the beach and visit a water park. Kisaki, looking satisfied at the end of the day, tells a roundabout story. Sensei doesn't quite understand, but Kisaki still shows a beaming smile."
2180840207 = "Water Bed"
3638633883 = "Shun was enjoying a summer retreat in the valley with Sensei. The two spend time letting buoyancy take them in the river and eating fruit chilled in the river water. Sensei, too relaxed, almost falls asleep while floating, supported by Shun. A flustered Shun takes Sensei to the riverbank and wraps him up to warm his chilled body."
2482562584 = "Summer. A different side."
3649906930 = "Saying she likes summer because it allows her to show a different side, Shun appears before Sensei in the form of Shunling. The two go rafting and eat their way through the shopping district with Shunling, who acts her age. After playing and resting, the effect of the secret medicine suddenly wears off, and she returns to Shun."
2138405107 = "Overwriting Memories"
2996173795 = "To make up for the previous day's failure, the two go through the same schedule again in Shun's form. Against Shun, who acts maturely, Sensei begins to regress and act spoiled. Coming to their senses, the two blame everything on the summer."
1177889008 = "Leading Water Play"
3092431370 = "At Shun's request, Sensei ends up leading the children of the Plum Blossom Garden. While taking care of the energetic children at the water park they visited, time passes in the blink of an eye. After sending the children home and fulfilling his duties as a leader, Shun and Sensei spend time alone."
3355347890 = "Storm Clears"
2518541355 = "Genryumon hears that the Black Tortoise Promenade is investing outside Shanhaijing. Tensions rise over the future of Shanhaijing, but Sensei suggests going to inspect the tourist destination of the mountain stream where the investment is taking place."
3134481129 = "A Summer Day"
4109295345 = "Public Relations Manager"
2034772764 = "Inspection"
