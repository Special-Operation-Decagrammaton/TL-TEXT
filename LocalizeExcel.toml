504218798 = "O plano de Rio"
648350015 = "Confirmei estudantes agindo de forma suspeita no campus. Normalmente, o lógico seria informar o Seminário, mas... senti que a situação era incomum e acabei seguindo-as. - Seia"
2965673131 = "Quem seriam essas pessoas...? Arruinar a EXPO para obter lucro, que ideia absurda. Se deixarmos como está, isso provavelmente se transformará em um grande incidente. - Seia"
334310010 = "Durante a operação, é eficiente compilar as informações obtidas em cada etapa. Estarei esperando aqui, então, se tiver mais perguntas, venha me procurar a qualquer momento. - Rio"
2204937774 = "Se busca por pistas, um local onde muitos se reúnem é o ideal. Um lugar como a frente da fonte em Trinity seria, talvez... uma sala de aula? - Seia"
4174324411 = "Um animal de estimação robótico... seria um robô imitando um cão ou um gato? Nesse caso, a comida seria eletricidade...? Pessoalmente, isso estimula minha curiosidade. - Seia"
565085471 = "Encontrei um chip de origem desconhecida. Até eu consigo perceber que ele foi criado com intenções maliciosas. Se eu entregá-lo a Rio, sua verdadeira natureza será revelada rapidamente... - Seia"
2223345760 = "...Então era um cão. Aquele design seria uma preferência pessoal de Rio? Ou será que as estudantes daqui conseguem reconhecer aquilo como um cão...? - Seia"
95517514 = "Havia um chip estranho na obra do Departamento de Engenharia. Por causa desse chip, o local entrou em crise temporariamente e o Departamento de Engenharia sofreu um mal-entendido injusto. É óbvio que foi obra de alguém. Mas, quem seria...? - Rio"
1245778966 = "Aquela Rio, continua a mesma de sempre. Antigamente, ela também costumava criar coisas estranhas, mas incríveis, que deixavam todos ao redor surpresos. Isso me faz lembrar de algumas coisas... embora eu não seja desse tipo. - Neru"
365206562 = "Infiltrar-se no centro de dados... não foi ruim. Ultimamente só tenho feito trabalhos monótonos, então foi um bom exercício. Antigamente, eu... não, não é hora de ficar presa a lembranças. - Neru"
3686271168 = "Com os dados em mãos, é possível prever muitos cenários. Não me contento apenas em perseguir o incidente até o fim. Embora tenha sido eu quem chegou à conclusão através da análise... este é um resultado alcançado graças às informações de vocês duas. - Rio"
1277669418 = "Departamento de Desenvolvimento de Jogos... um grupo que cria jogos, suponho. Pessoas com gostos e interesses em comum se reúnem, formando um círculo em busca de um objetivo... é um 'círculo' verdadeiramente exemplar. Gostaria que organizações assim aumentassem em Trinity... - Seia"
4126678237 = "O Departamento de Desenvolvimento de Jogos é composto por pessoas com uma sensibilidade única. As obras que elas criam originalmente devem ser conteúdos divertidos, transbordando o desejo de entreter os outros. Estou ansiosa pelo dia em que poderei jogá-los. - Seia"
2590850258 = "Destruir o cristal dos esforços de todos, que falta de bom gosto... Devo revelar a verdade e provar a inocência do Departamento de Desenvolvimento de Jogos. Essa é a missão imposta ao 'Rei dos Ladrões'. - Seia"
744738424 = "Depois do Departamento de Engenharia, agora o Departamento de Desenvolvimento de Jogos... antes que os danos aumentem, precisamos capturar os culpados... Conto com você, Neru. - Rio"
2253968242 = "Isso é... um incidente, né? Aquelas idiotas da força física treinam de forma insana o tempo todo, então nem dá para saber se é um incidente ou se é o dia a dia delas... Bem, a própria pessoa parece estar em apuros, então acho que vou ajudar. - Neru"
74454459 = "Beleza, a identidade do inimigo começou a aparecer. Me dando esse trabalho todo... depois que eu os encontrar, não vou deixar barato. Graças a eles, tive que trabalhar bastante! - Neru"
3102902340 = "O ataque surpresa ao local falhou... sendo assim, não resta alternativa a não ser descobrir o esconderijo e realizar um ataque. Não estou disposta, mas... vou usar aquilo. - Rio"
1980715747 = " 'Algoritmo da Irmã Mais Velha'... que nome nostálgico. Se Neru soubesse da existência disso na época, certamente teria me impedido. Se ao menos ela tivesse feito isso... eu... - Rio"
541035342 = "Você planejou uma operação audaciosa, Rio. Julgar que o autossacrifício é o melhor caminho e seguir em direção a um desfecho que ninguém deseja... é uma pena, mas não posso ignorar esse seu plano. Deixe que Neru e eu cuidemos disso. - Seia"
