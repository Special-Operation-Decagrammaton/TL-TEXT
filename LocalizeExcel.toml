1685330631 = "Vol.0 Conselho Estudantil Geral"
3839113926 = "Rin, a Administradora-Chefe do Conselho Estudantil Geral\nsegue soterrada de trabalho até hoje.\n\rSerá que a folga arranjada à força vai ser mesmo\n\rum dia de descanso……?"

#[ +++ ][Sinopse de inicio dos capítulos:]
3915905801 = "No Dia de Primavera em que as Amendoeiras Florescem"
789937573 = "Em um dia de primavera,\n\rsob o desabrochar das amendoeiras uma pessoa inesperada retornou.\n\rMas retornou……\nde uma forma que você jamais seria capaz de imaginar."

