3289231970 = "[c]クールタイム：3ターン[/c]\n\n前列の味方ストライカーのHPを回復する。\n\n\n[c][75b4c0][i]「あの子は自分で思っている以上に、すごい生徒なんですよ」\n-正義実現委員会の副委員長、羽川ハスミ[/i][-][/c]"
3414707332 = "[c]他味方スペシャルのSPスキル発動後：[/c]クールタイムが[c]{param;CoolDownNum}[/c]減少する。"
2250816044 = "[c]クールタイム：3ターン[/c]\n\n前列の味方ストライカーのEXスキルの威力が[c]1[/c]増加する。対象ストライカーが[c]{tag;Justice}[/c]である場合、EXスキルの威力が[c]2[/c]増加する。\n\n\n[c][75b4c0][i]優れた射撃術を持ち、正義実現委員会を首席で入部した天才スナイパー。委員会の中でも、特に生真面目な性格。近ごろは理想と現実の間をさまよっている。[/i][-][/c]"
1536770335 = "[c]他味方ストライカーのEXスキル発動後：[/c]ランダムな敵に[c]{param;BasePower}[/c]ダメージを与える。"
