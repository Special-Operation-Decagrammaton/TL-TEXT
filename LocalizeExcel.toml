4023853209 = "Guiado por Eimi, o Sensei [USERNAME] conhece Himari, que era presidente do Veritas. O Sensei decide ajudar o 'Departamento de Investigação de Fenômenos Anômalos' e descobrir a verdade sobre a IA sem precedentes, 'Decagrammaton'."
189432679 = "'Coleta de dados (1) Deserto de Abydos'"
1422577933 = "Primeiro, eles vão ao deserto de Abydos para coletar dados e travar batalhas."
2843895192 = "'Coleta de dados (2) Área de escavação da Kaiser PMC 1'"
3068454990 = "Continuando no deserto de Abydos, eles vão à área que a Kaiser PMC estava escavando para coletar dados de Decagrammaton."
1059870051 = "'Coleta de dados (2) Área de escavação da Kaiser PMC 2'"
3315711680 = "Quando Himari tenta analisar a estrutura de Decagrammaton com base nos dados coletados, o próprio 'Decagrammaton' aparece repentinamente. Ele tenta hackear a Arca de Shi tem, mas parece falhar e desaparece."
3340045351 = "'Coleta de dados (3) Área de escavação da Kaiser PMC 1'"
3630681780 = "O Departamento de Investigação de Fenômenos Anômalos, com sua localização rastreada por Decagrammaton, cria uma nova sala em um local seguro. Himari explica ao Sensei sobre os 'profetas de Decagrammaton' e a 'Árvore da Vida' antes da nova operação. Primeiro, decidem investigar o que a Kaiser PMC estava fazendo no deserto de Abydos."
2698692115 = "'Coleta de dados (3) Área de escavação da Kaiser PMC 2'"
1479814242 = "O Departamento consegue invadir o banco de dados da Kaiser PMC. Himari analisa os dados e consegue obter os registros de batalha com Binah."
2680918037 = "'Coleta de dados (4) Binah 1'"
3380544103 = "Com base nos dados da PMC, Himari prevê o local de aparecimento de Binah. O Departamento vai ao local previsto para coletar mais dados sobre Binah."
3949064449 = "'Coleta de dados (4) Binah 2'"
506019365 = "O Departamento consegue garantir os dados de Binah e, para investigações adicionais, segue para as 'ruínas' de Millennium."
3873431977 = "'Coleta de dados (5) Ruínas 1'"
1863443665 = "Himari diz que 'Chesed', o quarto profeta de Decagrammaton, está em algum lugar das 'ruínas'. Primeiro, para coletar informações, os dois e o Sensei entram nas 'ruínas'."
1948729357 = "'Coleta de dados (5) Ruínas 2'"
1314827672 = "O grupo consegue encontrar as forças de Decagrammaton e, com base nos dados coletados dos inimigos derrotados, determina a localização de 'Chesed'."
1946225899 = "'Coleta de dados (6) Chesed 1'"
3471734764 = "Himari identifica as coordenadas de 'Chesed', e o grupo decide enfrentá-lo."
1319567956 = "'Coleta de dados (6) Chesed 2'"
3712282347 = "O grupo garante os dados de 'Chesed'. Himari, analisando, parece encontrar algo preocupante nos dados."
4242492004 = "'Coleta de dados (7) Área alagada das ruínas 1'"
1077948220 = "Um sinal momentâneo misturado aos dados de 'Chesed'. Detectando um sinal de chamada similar ao emitido por Decagrammaton nas ruínas, o grupo, ciente do perigo, se aventura na origem do sinal."
1727121677 = "'Coleta de dados (7) Área alagada das ruínas 2'"
2463515054 = "O grupo encontra um novo 'profeta' de Decagrammaton na origem do sinal. Diante do 'profeta' que continua um movimento misterioso protegendo a área alagada além das ruínas, Himari declara o início da investigação da 'Área alagada das ruínas'."
269786633 = "Operação de busca (1)"
1889759018 = "Durante a busca pela área alagada das ruínas, o grupo detecta o movimento de Keter. Como é impossível evitar qualquer rota, eles são forçados a recuar temporariamente."
158189420 = "Operação de busca (2)"
348646891 = "Himari busca uma nova estratégia para pesquisar o sinal de Decagrammaton com segurança, evitando a interferência de 'Keter'."
2755208336 = "'Coleta de dados (8) Keter 1'"
93697169 = "Himari sugere que Eimi e o Sensei coletem dados para conquistar 'Keter' a fim de alcançar a 'Área de Pesquisa', seu destino."
4206145855 = "'Coleta de dados (8) Keter 2'"
1447392427 = "Eimi e o Sensei, através da coleta de dados, identificam os pontos fracos de 'Keter' e começam a operação completa para conquistá-lo."
3308823291 = "Conquista de Keter (1)"
3486599629 = "Operação de Busca (2)"
2077878325 = "Conquista de Keter (1)"
1908426204 = "Eimi e o Sensei entram em combate com 'Keter' seguindo as instruções de Himari."
3490547011 = "Conquista de Keter (2)"
2387771660 = "Eimi e o Sensei neutralizam 'Keter' e entram na 'Área de Pesquisa'. Himari, observando, sente uma estranheza e decide participar da exploração."
1029543648 = "Decagrammaton"
616793555 = "Novo começo"
311130254 = "Atordoados com o fato de que o corpo principal de Decagrammaton era uma IA de máquina de venda automática, mas obtendo informações sobre um novo inimigo, o Departamento decide reiniciar para enfrentar a nova ameaça."
3869432926 = "Sinal"
2608662417 = "Ao chegar ao Departamento a pedido de emergência, o Sensei testemunha a detecção de um sinal similar ao de Decagrammaton na região da geleira."
713715481 = "Geleira (1)"
3021235872 = "O Sensei, Himari e Eimi, com roupas de frio, e Toki começam a exploração do mar gelado."
2827062239 = "Geleira (2)"
2856558094 = "Durante a investigação do mar gelado, o grupo recebe uma comunicação repentina de um objeto de identidade desconhecida. E detectam um novo sinal de Decagrammaton se aproximando deles em alta velocidade das profundezas do mar."
822341698 = "Geleira (3)"
1066916150 = "A verdadeira identidade do novo Decagrammaton é o quinto profeta, 'Gevurah'. O grupo entra em combate com Gevurah."
3264652544 = "5º profeta (1)"
1245122403 = "Quem estava se comunicando eram os engenheiros de Decagrammaton, Ain, Sof e Oul. O grupo luta novamente."
3548705024 = "5º profeta (2)"
2425401843 = "Ain, Sof e Oul concluem os preparativos para despertar a entidade que chamam de 'irmã'."
551131180 = "Novamente, na geleira"
2841988677 = "O Departamento reinicia a investigação na geleira. Encontram forças de Decagrammaton diferentes das anteriores."
2043648272 = "Investigação"
2884472887 = "Eimi e as outras encontram vestígios de que algo enorme cortou a geleira e se moveu. Himari deduz que não é certo que seja Gevurah que estão perseguindo, mas sem outras pistas, decidem seguir os rastros. Enquanto isso, Ain, Sof e Oul continuam suas atividades ocultas."
1005599474 = "Segundo encontro"
2544400411 = "O grupo, continuando a perseguição, reencontra Gevurah."
3923341767 = "Segundo encontro (1)"
1904785569 = "Gevurah ataca com uma força muito maior que na luta anterior. O Departamento fica em apuros, mas com a ajuda de uma pessoa inesperada, conseguem uma oportunidade e tentam contra-atacar –"
1823733174 = "Segundo encontro (2)"
2945817621 = "Com o resgate de Rio, o Departamento repele Gevurah. Alegres pelo reencontro com Rio, mesmo que por comunicação, eles trocam informações com ela, que estava perseguindo os vestígios deixados pelo 'Deus Anônimo'."
1631119254 = "Variável"
1050651750 = "Os três engenheiros de Decagrammaton, embora perturbados com a intervenção de Rio, decidem continuar o plano. Enquanto isso, o Departamento troca informações com Rio e continua a perseguição. Ao deixar a geleira e chegar à tundra, encontram vestígios de que algo enorme se moveu."
574598016 = "Faísca (1)"
4279843049 = "Explorando a tundra, a comunicação com Rio é interrompida por ondas de interferência, e Toki também não pode usar Avi Eshuf. O grupo encontra uma instalação suspeita ao procurar a origem das ondas."
2090944563 = "Faísca (2)"
1718287943 = "O grupo consegue destruir a fonte das ondas de interferência e restaurar a comunicação. No entanto, percebem que há uma instalação ainda maior. Achando que há algo ali, decidem continuar a exploração."
961035866 = "Exploração"
3546030828 = "Continuando a exploração da instalação, o grupo é cercado por forças inimigas devido ao estratagema dos engenheiros de Decagrammaton. Tentam abrir caminho avançando para o interior, onde a concentração inimiga é menor, mas……"
3346775331 = "Chokhmah"
3315060759 = "Embora tenham escapado do cerco, o grupo é levado para uma região vulcânica. Lá, entram em contato novamente com Ain, Sof e Oul. Quando perguntam sobre seu objetivo, são desviados e se veem obrigados a lutar contra o segundo profeta, 'Chokhmah'."
2335282203 = "Vitória tática"
2709748594 = "Embora tenham derrotado Chokhmah, os três engenheiros de Decagrammaton recuam, dizendo que alcançaram seu objetivo. O Departamento também deixa a região vulcânica de helicóptero e organiza a situação."
885592867 = "Legado do Deus Anônimo"
3137797237 = "O grupo decide analisar a base remanescente de Decagrammaton. Como resultado, descobrem que os Decagrammaton enfrentados na geleira e no vulcão são diferentes dos anteriores, pois foi usado o poder do 'Deus Anônimo'. Surpresos, um alarme indica o ataque de um novo profeta –"
1916781739 = "Beco sem saída"
2946163375 = "Com o reconhecimento do drone de Rio, descobre-se que o novo profeta está usando uma 'barreira multidimensional'. Sem saída, o grupo discute contramedidas……"
449608825 = "Proposta"
3964422957 = "Rio sugere que o poder de Aris possa ser capaz de combater a 'barreira multidimensional'. Mas hesita em pedir ajuda. O Sensei então propõe que, em vez de pedir ajuda ao Clube de Desenvolvimento de Jogos, Rio também venha para a base na geleira. Após pensar, Rio aceita, mas o Sensei também sofre por ter que expor os alunos ao perigo."
3730054126 = "Partida"
918056516 = "Oul confiante de que seu local está protegido pela barreira multidimensional e não será descoberto. Enquanto isso, os membros do Clube de Desenvolvimento de Jogos, contatados pelo Sensei, cientes do perigo da missão, decidem ir para a geleira como os heróis que salvarão o mundo."
1551417428 = "Reunião"
1503724758 = "Rio se reúne com Himari e as outras na base da geleira. Ao mesmo tempo, o Clube de Desenvolvimento de Jogos também chega à geleira…… Ao saber disso, Rio, perturbada com o reencontro inesperado, tenta recuar. Com a persuasão de todos, incluindo o Sensei, Rio finalmente aparece diante de Aris e das outras."
154885673 = "Batalha de bolas de neve"
2861808365 = "Para desfazer a barreira multidimensional, é necessária a espada de luz 'abençoada' de Aris. No entanto, Aris diz que precisa não apenas dela, mas também do poder de Key. Rio e Himari, aceitando o desejo de Aris de 'ver Key novamente', tentam restaurar Key a partir do save de 2 kilobytes 'Kei' no chaveiro de Aris. Enquanto Rio e Himari trabalham na restauração, o Clube de Desenvolvimento de Jogos, por sugestão do Sensei, se diverte com uma batalha de bolas de neve do lado de fora da base."
2341910534 = "Voz que chama"
11687384 = "Rio e Himari tentam fazer Key reviver transferindo 'Kei.sav' para um armazenamento compatível com o poder do 'Deus Anônimo', e conseguem. Enquanto isso, pelas mãos de Ain, Sof e Oul, Malkuth, a quem chamam de irmã, também está prestes a despertar……"
1569528324 = "Reencontro"
4037519386 = "Recém-desperta, Key fica confusa por estar na geleira. Embora recebida calorosamente por todos, ela repreende Momoi por estar influenciando negativamente Aris. Quanto ao uso da espada de luz 'abençoada', Key se opõe devido ao alto risco para Aris. O grupo então decide mudar a estratégia. Rio sugere que primeiro preparem um corpo para Key, mas Key, conhecendo seu senso estético, recusa veementemente. No entanto, sua resistência é em vão……"
3790659265 = "Amanhecer"
155720155 = "Sob a supervisão de Rio, Key obtém um corpo AMAS e, desesperada com o design, aparece diante de Aris. Aris, feliz por poderem se tocar, pede que Key a chame de 'Aris' em vez de 'princesa', e Key aceita. – Enquanto observam essa troca, Himari reconhece o mérito de Rio por ter tornado essa cena possível. Nesse momento, um enorme estrondo ataca a base, e o sinal do sétimo profeta, 'Netzach', é recebido."
3596378136 = "Continente de Aço"
1920548047 = "Uma declaração de guerra de Ain, Sof e Oul chega à base na geleira. O Netzach evoluído se transformou no 'Continente de Aço', que converte matéria tocada em parte de si mesmo, expandindo seu território. Para evitar a propagação dos danos por todo Kivotos, o grupo planeja se aproximar de Netzach por uma rota de suprimentos não afetada pela barreira multidimensional. Rio se torna oficialmente membro do grupo, e os heróis Aris e seus companheiros finalmente partem."
1037621827 = "Sinal"
1149078827 = "O grupo, que visita a tundra, continua a exploração contando com a ferrovia da tundra para encontrar a rota de suprimentos. No entanto, com o disparo do poder do Deus Anônimo pelo drone de Ain, toda a área é completamente isolada do mundo exterior, tornando os equipamentos eletrônicos inutilizáveis. Em perigo, Key, que sabe como lidar com essa situação, se move –"
970117290 = "Último dever"
2535625821 = "Aris e Key conectam suas consciências e, em um tempo a sós, conversam sobre o destino da princesa e da criada…… e sobre várias possibilidades. Key diz 'cumprirei meu último dever como criada', e com sua orientação, Aris ganha a capacidade de ver o 'poder do Deus Anônimo'. Ao acordar, Aris absorve o 'poder do Deus Anônimo' ao redor e usa a espada de luz para destruir o campo de força que as prendia. Ain, Sof e Oul ficam espantadas por haver entre os que as perseguem alguém que pode usar livremente o poder dos deuses."
511519552 = "Ponto de grade"
1466156168 = "Com a cooperação de Aris e Key, o grupo supera a crise. Rio se desculpa com Key por ter tentado eliminá-la e a Aris no passado. Mas Key não quer punir Rio, pois Aris já a perdoou. O grupo retoma a exploração com a navegação de Aris e Key e, eventualmente, chega a uma instalação misteriosa. Ao confirmar isso, Ain, Sof e Oul declaram a realização de uma 'festa de boas-vindas'."
936873299 = "Depósito de sementes (1)"
4223743560 = "A caminho de Ain, Sof e Oul, o grupo, após um episódio em que Key agrada uma raposa, chega ao depósito de sementes. Ain, Oul e Sof ficam confusas com o pensamento de Tiferet, que diz 'cumprir meu dever como profeta', mas Malkuth, a irmã mais velha, diz que devem respeitar sua vontade."
496982772 = "Esperança (2)"
3900875224 = "Rio diz que o depósito de sementes foi feito para o fim do mundo. Key então diz 'talvez estivesse esperando ser encontrada, como uma semente'. Aris e o Sensei se emocionam por Key entender a vida. Nesse momento, máquinas se interpõem diante do grupo –"
1824821498 = "Vida sobre"
3833255451 = "As máquinas sinistras recuam como se cumprissem seu papel de reconhecimento, e o grupo as acha suspeitas. Ain, Sof e Oul, que as observavam, não escondem sua surpresa com a existência de Aris e Key."
4008661849 = "Luz que ilumina a escuridão"
2525296454 = "O grupo se pergunta por que Tiferet preserva as sementes. Nesse momento, gás venenoso é liberado, e Rio, Himari, o Clube de Jogos e o Sensei desmaiam. Com o esforço de Arona e Plana, o Sensei acorda e, guiado por Key, coloca a mão no painel da instalação, ativando um sistema de gestão da Red Winter."
2729836691 = "Pecado e punição"
136720262 = "Ain, Sof e Oul dizem que a própria vida é uma maldição e um pecado, e querem libertar os seres vivos disso. O Sensei responde que, qualquer que seja o resultado, eles o escolheram e pede que observem. Depois, ele tenta ordenar o ataque ao segundo depósito, que era proibido……"
3073755727 = "Tiferet"
3163271687 = "Aris e Key se opõem ao ataque ao segundo depósito. Mas isso era um estratagema para 'abalear' Tiferet e parar o gás venenoso. Nesse momento, uma forte vibração ocorre na instalação, e o grupo finalmente enfrenta o sexto profeta, Tiferet."
2792903995 = "Paradeiro da carga"
2134538426 = "Ain, Sof e Oul planejam o resgate de Tiferet. Enquanto isso, o grupo tenta sair da instalação envolta em forte vibração. Descobrem um 'lançador de contêineres' que transporta recursos para o depósito de sementes por ferrovia e os envia para o Continente de Aço, e tentam investigá-lo."
1690242507 = "Preparativos para a partida"
1325603657 = "Sabendo que, com o 'dispositivo de interferência de ondas' criado por Himari e Key, podem invadir o Continente de Aço, o grupo começa os preparativos. Ain, Sof e Oul lamentam a perda de Tiferet, mas são encorajadas por Malkuth e se preparam para a luta. Às vésperas da batalha, o Sensei recebe uma chamada de Yuuka –"
184373574 = "O caminho de cada uma"
3023142440 = "Yuuka se irrita com o Sensei por estar fazendo coisas perigosas novamente e pede que ninguém se aproxime do Continente de Aço. O navio de transporte parte para lidar com o 'fenômeno anômalo'. Ain, Sof e Oul também estão determinadas a enfrentar o grupo para receber um novo 'amanhã'……"
1248976768 = "Mudança de fase"
3619955884 = "Ain, Sof, Oul e Malkuth passam um breve momento juntas enquanto aguardam a 'hora final'."
1168753793 = "Sinal de tempestade (1)"
336968138 = "O grupo chega ao céu do Continente de Aço no navio de transporte, mas sofre uma aterrissagem forçada devido ao ataque repentino de Yesod."
2002638423 = "Sinal de tempestade (2)"
3028268111 = "O grupo consegue repelir o cerco e recolhe os restos dos inimigos."
3177071285 = "Partida"
2303893679 = "Os lay-bores e Yesod são máquinas que expandem o Continente de Aço. O grupo planeja usar uma distração para romper Yesod. Eimi se oferece como isca."
214074372 = "Yesod (1)"
1884002597 = "Com Eimi como isca, o ataque total a Yesod começa."
2571317127 = "Yesod (2)"
1323222179 = "O grupo derrota Yesod e entra no interior do Continente de Aço."
2992750518 = "Base avançada"
3609466202 = "O grupo desembarca no Continente de Aço e tenta hackear parte dele para construir uma base. Enquanto isso, Malkuth, percebendo a invasão, sai."
2416613269 = "Malkuth"
826414171 = "Malkuth aparece diante do grupo que estava analisando a área do Continente de Aço. Durante o combate, Key fica gravemente ferida e desmaia."
3216433831 = "Key"
4160457237 = "Key, ferida, deseja trocar de corpo. Com um corpo base encontrado no Continente de Aço, ela ganha um novo corpo."
1631198209 = "Possibilidade"
3151540886 = "Key obtém informações do Continente de Aço através do novo corpo e explica o estado atual do continente: se eles subjugarem os profetas de Decagrammaton em cada área, obterem informações de seus núcleos e as salvarem em Key, talvez possam parar o Continente de Aço."
3113450790 = "Dress Up"
2593411020 = "O grupo troca para novos uniformes de combate baseados no design de Midori. O primeiro alvo de conquista é Binah. Aparentemente, Binah tem a firewall do Continente de Aço. Agora, a batalha pela conquista do Continente de Aço começa."
268151081 = "000, 00, 0"
1804535969 = "Os portões da batalha pela conquista do Continente de Aço se abrem."
2213748891 = "Holocausto"
877292052 = "No momento em que Malkuth cai, uma voz ecoa: 'o recipiente se formou'. As informações dos profetas dentro de Key ressoam como se tivessem ego, e a espada do holocausto aparece. O ritual começa."
1610181717 = "O que desapareceu"
1609906608 = "Enquanto observavam o desenrolar do 'ritual', o grupo é separado por uma parede que surge de repente. Movendo-se para coletar informações e se reunir, eles notam que o estado de Malkuth mudou."
3266951101 = "Crianças"
1429223696 = "Seguindo um choro vindo de algum lugar, o grupo encontra Ain, Sof e Oul em desespero. O Sensei ouve delas toda a extensão do plano e as consola dizendo 'vocês se esforçaram'."
179336707 = "O que se nasce com"
1212131679 = "Aris, usando todas as suas experiências, transmite seus sentimentos a Ain, Sof e Oul. As três, prestes a desistir por serem interferidas por Decagrammaton, são encorajadas pelo grito de Key e se reerguem. Nesse momento, o chão desaparece sob o Sensei, e ele cai em um abismo sem fundo."
4252741157 = "Novo céu, nova terra"
1411118203 = "O Sensei finalmente se encontra cara a cara com 'Decagrammaton'. Após trocarem palavras, Decagrammaton diz que um assento no altar está preparado para ele. Enquanto isso, os alunos se reúnem e se aproximam de Ain, Sof e Oul."
1450281282 = "Observação e resultado"
2248275207 = "Decagrammaton propõe ao Sensei que se torne um profeta. Diz que o mundo precisa de um deus para eliminar a tristeza. O Sensei continua o diálogo com cautela. Os alunos observam a cena pelos olhos de Key e pela cadeira de rodas de Himari."
3039454998 = "Resposta humana"
387799273 = "O Sensei recusa terminantemente a proposta de Decagrammaton. Decagrammaton respeita sua escolha, mas não a aceita. O Sensei é devolvido aos alunos, e a batalha pela sobrevivência contra Decagrammaton está prestes a começar."
2630575492 = "História para você"
155023135 = "Mesmo com todas as forças, o grupo é derrotado. O Sensei se ajoelha diante de Decagrammaton e implora, pelo menos, pelos alunos. Nesse momento, Ain, Sof e Oul tentam dialogar com ele. O Sensei, que sempre tenta ser um adulto bom sem se preocupar consigo mesmo, diz que até Ain, Sof e Oul são 'crianças que ele deve proteger'. Influenciadas, as três decidem se rebelar contra Decagrammaton."
989521324 = "O dia em que Deus caiu"
3172741442 = "Quando Ain, Sof e Oul arrancam a espada do holocausto de Decagrammaton, a consciência de Malkuth, que deveria estar morta, revive. O poder de Decagrammaton, que era avassalador, enfraquece, e parece uma chance de contra-ataque. Mas Ain, Sof e Oul chegam ao limite e, confiando seus sentimentos a Malkuth, caem."
788839122 = "O que tomou forma"
4170445955 = "Sem tempo para lamentar, o segundo corpo divino de Decagrammaton desperta. Esse corpo tenta alcançar a divindade abrigando as Sefirot em ordem. Isso também é uma resposta a Key ter absorvido as Sefirot em seu corpo, e significa que quanto mais se absorve, mais se fica sob a influência de Decagrammaton. Decagrammaton fala alto sobre o mundo que deseja. Key explode de raiva."
3971749784 = "Luta"
1216215933 = "Desvantagem esmagadora. Mesmo assim, Key, o Sensei, Aris se levantam. O grupo renova sua determinação de enfrentar Decagrammaton."
1621089821 = "Decagrammaton (1)"
2064057481 = "Os pensamentos e vontades de Key e Decagrammaton se chocam, e a luta vai e vem."
3324167112 = "Decagrammaton (2)"
1876768153 = "Key desfere o golpe final em Decagrammaton."
1579660491 = "Último passo"
138245217 = "O grupo que derrotou Decagrammaton segue os sinais restantes em direção ao local sagrado. Lá, há muitas máquinas de venda automática, e uma delas é Decagrammaton, que retornou a ser uma IA de máquina de venda automática. Decagrammaton, contrito, relata sua trajetória em busca de ser deus. Enquanto o Continente de Aço desmorona, eles incentivam o grupo a escapar, e Decagrammaton fica sozinho. Relembrando o passado, sente um pequeno arrependimento."
837935515 = "Céu inseparável"
107725596 = "O navio de transporte, com uma nova aluna e os sentimentos de cada uma, parte. O grupo volta para a Millennium Science School."
4183542679 = "Epílogo (1)"
4240432476 = "Em Millennium, Yuuka espera por Key, Rio e o Sensei. Yuuka desabafa seus sentimentos pelo Sensei. Ele se desculpa por tê-la preocupado e conta a ela os detalhes do ocorrido. Declara que criará um lugar para Key e Aris."
117946491 = "Epílogo (2)"
146880641 = "De volta à sala do clube, o Clube de Desenvolvimento de Jogos recebe Key e Toki como visitantes e continua suas atividades animadas. Enquanto isso, na sala do Departamento de Investigação de Fenômenos Anômalos, está Malkuth. Relembrando os acontecimentos, Malkuth dá um passo por vontade própria."
