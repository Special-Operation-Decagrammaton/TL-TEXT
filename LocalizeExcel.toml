3612956267 = "Inexplicável"
529494305 = "Prólogo"
1469010340 = "Guiado por Eimi, o professor [USERNAME] conhece Himari, que originalmente era a chefe da Veritas. O professor decide emprestar sua força ao \"Departamento de Investigação de Fenômenos Estranhos\" delas para investigar a verdadeira identidade da IA sem precedentes, o \"Decagrammaton\"."
4023853209 = "Coleta de dados (1) Deserto de Abydos"
189432679 = "Primeiro, eles partem para o deserto de Abydos para coletar dados e acabam entrando em combate."
1422577933 = "Coleta de dados (2) Área de Escavação da PMC 1"
2843895192 = "Após o deserto de Abydos, eles seguem para a área onde a Kaiser PMC estava procurando por algo, a fim de coletar dados do Decagrammaton."
1059870051 = "Coleta de dados (2) Área de Escavação da PMC 2"
3068454990 = "No momento em que Himari tentava analisar a estrutura do Decagrammaton com base nos dados coletados, o próprio \"Decagrammaton\" aparece de repente. Por algum motivo, ele tenta hackear o Shittim Chest, mas parece falhar e desaparece do local."
3315711680 = "Coleta de dados (3) Área de Escavação da PMC 1"
3340045351 = "O Departamento de Investigação de Fenômenos Estranhos, tendo sua localização rastreada pelo Decagrammaton, cria uma nova sala de clube em um local com segurança reforçada. Antes da nova operação, Himari explica ao professor sobre os \"Profetas do Decagrammaton\" e a \"Árvore da Vida\", e eles decidem investigar o que a Kaiser PMC estava fazendo no deserto de Abydos anteriormente."
3630681780 = "Coleta de dados (3) Área de Escavação da PMC 2"
2698692115 = "O grupo do Departamento de Investigação de Fenômenos Estranhos consegue se infiltrar no banco de dados da Kaiser PMC. Himari analisa os dados e consegue obter o registro de batalha contra Binah."
1479814242 = "Coleta de dados (4) Binah 1"
2680918037 = "Himari previu a localização do surgimento de Binah a partir dos dados da PMC. O grupo do Departamento de Investigação de Fenômenos Estranhos segue para o local previsto para coletar mais dados de Binah."
3380544103 = "Coleta de dados (4) Binah 2"
3949064449 = "Tendo garantido os dados de Binah, o grupo do Departamento de Investigação de Fenômenos Estranhos segue para as \"Ruínas\" de Millennium para investigações adicionais."
506019365 = "Coleta de dados (5) Ruínas 1"
3873431977 = "Segundo Himari, \"Chesed\", o quarto profeta do Decagrammaton, está em algum lugar das \"Ruínas\". Como primeiro passo para a coleta de informações, os dois e o professor entram nas \"Ruínas\"."
1863443665 = "Coleta de dados (5) Ruínas 2"
1948729357 = "O grupo consegue encontrar as forças do Decagrammaton e, com base nos dados coletados dos inimigos derrotados, determina a localização de \"Chesed\"."
1314827672 = "Coleta de dados (6) Chesed 1"
1946225899 = "Himari identifica com sucesso as coordenadas de \"Chesed\" e o grupo parte para o confronto."
3471734764 = "Coleta de dados (6) Chesed 2"
1319567956 = "O grupo consegue garantir os dados de \"Chesed\". Enquanto Himari analisa os dados, parece que ela encontrou algo preocupante dentro deles..."
3712282347 = "Coleta de dados (7) Área Submersa das Ruínas 1"
4242492004 = "Um sinal momentâneo misturado aos dados de \"Chesed\". O grupo detecta um sinal de chamada dentro das ruínas que se assemelha muito ao emitido pelo Decagrammaton e, ciente do perigo, decide seguir até a fonte da transmissão."
1077948220 = "Coleta de dados (7) Área Submersa das Ruínas 2"
1727121677 = "O grupo encontra um novo \"Profeta\" do Decagrammaton na fonte da transmissão. Diante do \"Profeta\", que continua agindo de forma estranha como se protegesse a área submersa além das ruínas, Himari declara o início da investigação da \"Área Submersa das Ruínas\"."
2463515054 = "Operação de Busca (1)"
269786633 = "Durante a busca na área submersa de ruínas, o grupo detectou o movimento de Kether. Como era difícil evitar o confronto independentemente da rota escolhida, eles foram forçados a recuar temporariamente."
3486599629 = "Operação de Busca (2)"
1889759018 = "Himari busca uma nova estratégia para evitar a interferência de Kether e procurar o sinal de Decagrammaton com segurança."
158189420 = "Coleta de Dados (8) Kether 1"
348646891 = "Para chegar ao seu destino, a Área de Pesquisa, Himari propõe a Eimi e ao Sensei que coletem dados para derrotar Kether."
2755208336 = "Coleta de Dados (8) Kether 2"
93697169 = "Através da coleta de dados, Eimi e o Sensei identificam os pontos fracos de Kether e iniciam uma operação em grande escala para derrotá-lo."
3308823291 = "Derrotando Kether (1)"
4206145855 = "Seguindo as instruções de Himari, Eimi e o Sensei entram em combate contra Kether."
2077878325 = "Derrotando Kether (2)"
1447392427 = "Após neutralizarem Kether com sucesso, Eimi e o Sensei entram na Área de Pesquisa. Observando a situação, Himari sente algo estranho e decide participar da exploração no local."
3490547011 = "Decagrammaton"
1908426204 = "Eimi e o Sensei exploram o local onde o sinal de Decagrammaton foi captado. No entanto, a investigação não apresenta progresso... Nesse meio tempo, eles notam algo que causa uma sensação estranha e acabam encontrando o corpo principal de Decagrammaton."
1029543648 = "Um Novo Começo"
2387771660 = "Embora chocados com o fato de que o corpo principal de Decagrammaton era uma IA de máquina de vendas, o grupo obteve informações sobre um novo inimigo. Assim, o Departamento de Investigação de Fenômenos Especiais decide recomeçar suas atividades diante da nova ameaça."
616793555 = "Sinal"
311130254 = "Após receber um chamado de emergência e chegar ao Departamento de Investigação de Fenômenos Especiais, o Sensei testemunha que um sinal semelhante ao de Decagrammaton foi detectado na região glacial."
3869432926 = "Glaciar (1)"
2608662417 = "O Sensei, junto com Himari e Eimi, que trocaram para roupas de frio, e Toki, começam a exploração do mar de gelo."
713715481 = "Glaciar (2)"
3021235872 = "Enquanto investigavam o mar de gelo, o grupo recebe uma comunicação repentina de um alvo desconhecido. Eles detectam um novo sinal de Decagrammaton vindo de dentro do mar, aproximando-se deles em alta velocidade."
2827062239 = "Glaciar (3)"
2856558094 = "A identidade do novo Decagrammaton era o 5º Profeta, Geburah. O grupo entra em combate contra ele."
822341698 = "5º Profeta (1)"
1066916150 = "Quem estava fazendo a comunicação eram os engenheiros de Decagrammaton: Ain, Soph e Oul. O grupo entra em combate novamente."
3264652544 = "5º Profeta (2)"
1245122403 = "Ain, Soph e Oul terminam os preparativos para despertar o ser que chamam de 'irmã'."
3548705024 = "Novamente no Glaciar"
2425401843 = "O grupo do Departamento de Investigação de Fenômenos Especiais retoma a busca no glaciar. Lá, eles encontram forças de Decagrammaton com um comportamento diferente do habitual."
551131180 = "Investigação"
2841988677 = "Eimi e os outros descobrem vestígios de algo gigantesco que cortou o glaciar ao se mover. Himari suspeita que seja improvável que pertença a Geburah, que eles estavam perseguindo, mas como não há outras pistas sólidas, decidem seguir o rastro por enquanto. Enquanto isso, os três engenheiros, Ain, Soph e Oul, continuam agindo nas sombras..."
2043648272 = "O Segundo Encontro"
2884472887 = "O grupo, que continuava a perseguição, encontra Geburah novamente."
1005599474 = "Encontro Novamente (1)"
2544400411 = "Geburah ataca com uma força muito superior à da batalha anterior. Embora o grupo do Departamento de Investigação de Fenômenos Especiais esteja em uma situação difícil, eles aproveitam uma oportunidade graças à ajuda de uma pessoa inesperada e tentam um contra-ataque contra Geburah."
3923341767 = "Encontro Novamente (2)"
1904785569 = "Graças ao resgate de Rio, o grupo do Departamento de Investigação de Fenômenos Especiais consegue repelir Geburah. Enquanto celebram o reencontro com Rio, mesmo que por comunicação, eles decidem trocar informações com ela, que estava seguindo os vestígios deixados pelo 'Deus Sem Nome'."
1823733174 = "Variável"
2945817621 = "Os três engenheiros de Decagrammaton, embora abalados pela intervenção de Rio, decidem continuar com o plano. Enquanto isso, o grupo do Departamento de Investigação de Fenômenos Especiais continua a perseguição enquanto troca informações com Rio. Ao sair do glaciar e chegar à tundra, eles descobrem vestígios de algo gigantesco que se moveu por ali."
1631119254 = "Faíscas (1)"
1050651750 = "Enquanto exploravam a tundra, a comunicação com Rio é interrompida devido a interferências de rádio, e Toki também não consegue usar o Abi-Eshuh. O grupo procura a origem do sinal e acaba chegando a uma instalação suspeita."
574598016 = "Faíscas (2)"
4279843049 = "O grupo consegue destruir a fonte da interferência e restaurar a comunicação. No entanto, eles percebem que existe uma instalação ainda maior ali dentro. Acreditando que há algo importante naquela instalação, que parece deslocada na tundra desolada, eles decidem continuar a exploração."
2090944563 = "Exploração"
1718287943 = "Enquanto continuavam a explorar a instalação, o grupo é cercado por um grande número de inimigos devido às táticas dos engenheiros de Decagrammaton. Eles tentam abrir caminho avançando para o interior, onde a disposição das forças inimigas é menor, mas..."
961035866 = "Chokmah"
3546030828 = "Embora devessem ter escapado com sucesso do cerco inimigo, o grupo acaba sendo encurralado na zona vulcânica, onde entram em contato com Ain, Soph e Oul novamente. Após perguntarem sobre o objetivo deles e serem ignorados, acabam em uma situação em que são forçados a lutar contra o 2º Profeta, 'Chokmah'."
3346775331 = "Vitória Tática"
3315060759 = "Embora tenham repelido Chokmah, os três engenheiros de Decagrammaton, alegando terem alcançado seu objetivo, fazem Chokmah recuar. O grupo do Departamento de Investigação de Fenômenos Especiais também deixa a zona vulcânica de helicóptero para organizar a situação."
2335282203 = "Legado do Deus Sem Nome"
2709748594 = "O grupo decide analisar as instalações da base remanescente de Decagrammaton. Como resultado, descobrem que o Decagrammaton enfrentado nas geleiras e vulcões, diferentemente dos anteriores, utilizava o poder do 'Deus Sem Nome'. Enquanto o grupo se surpreende com esse fato, um alarme soa, notificando o ataque de um novo profeta—"
885592867 = "Beco sem saída"
3137797237 = "Como resultado do reconhecimento feito pelo drone de Rio, descobre-se que o novo profeta implantou uma 'barreira multidimensional'. Encurralados, o grupo discute se há alguma contramedida, mas..."
1916781739 = "Proposta"
2946163375 = "Rio sugere que, com o poder de Alice, pode haver uma possibilidade de enfrentar a 'barreira multidimensional'. No entanto, ela parece hesitante em pedir cooperação. Então, o Sensei propõe que, em vez de pedir socorro ao Departamento de Desenvolvimento de Jogos, Rio também vá até a base na geleira. Após hesitar, Rio aceita, mas ao mesmo tempo, sofre por ter que colocar os alunos em perigo."
449608825 = "Partida"
3964422957 = "Owl está confiante de que o local onde estão protegidos pela barreira multidimensional é impossível de ser descoberto. Enquanto isso, ao receber o contato do Sensei, Alice e os membros do Departamento de Desenvolvimento de Jogos, cientes do perigo da missão, decidem partir para a geleira como um grupo de heróis que salvará o mundo."
3730054126 = "Reencontro"
918056516 = "Rio chega à base na geleira e se reencontra com Himari e os outros. Ao mesmo tempo, o Departamento de Desenvolvimento de Jogos também chega à geleira... mas, ao saber disso, Rio fica perturbada com o reencontro inesperado e tenta fugir do local. Graças à persuasão de todos, incluindo o Sensei, Rio finalmente aparece diante de Alice e as outras."
1551417428 = "Guerra de bolas de neve"
1503724758 = "Para desativar a barreira multidimensional, era necessária a espada de luz 'abençoada' de Alice. No entanto, Alice diz que, para usá-la, não precisa apenas dela, mas também do poder de Kei. Rio e Himari, aceitando o desejo de Alice de 'querer encontrar Kei novamente', decidem tentar restaurar Kei com base nos 2 kilobytes de dados salvos, 'Kei', armazenados no chaveiro dela. Enquanto Rio e Himari realizam o trabalho de restauração, o Departamento de Desenvolvimento de Jogos, por sugestão do Sensei, diverte-se com uma guerra de bolas de neve fora da base."
154885673 = "Voz que chama"
2861808365 = "Rio e Himari tentam despertar Kei novamente transferindo 'Kei.sav' para um armazenamento compatível com o poder do 'Deus Sem Nome', e conseguem. Naquele momento, pelas mãos de Ain, Soph e Owl, Malkuth, a quem elas chamam de irmã, também estava prestes a despertar..."
2341910534 = "Reencontro"
11687384 = "Logo após despertar, Kei fica confusa por estar na geleira. Embora seja calorosamente recebida pelos presentes, Kei repreende Momoi por causar uma 'má influência' em Alice. Além disso, em relação ao uso da espada de luz 'abençoada', Kei se opõe, alegando que isso traria um alto risco para Alice, o que leva o grupo a mudar de estratégia. Rio sugere preparar um corpo para Kei por enquanto, mas Kei, conhecendo o senso estético dela, recusa desesperadamente. No entanto, sua resistência é em vão..."
1569528324 = "Alvorecer"
4037519386 = "Sob a supervisão de Rio, Kei obtém um corpo AMAS e, embora desespere-se com o design, aparece diante de Alice. Kei aceita a sugestão de Alice, que está feliz por poderem se tocar, de ser chamada de 'Alice' em vez de 'Princesa'. ...Enquanto observa essa interação das sombras, Himari reconhece o mérito de Rio, admitindo que essa cena só foi possível graças a ela. —Nesse momento, um estrondo gigantesco atinge a base e o sinal do 7º profeta, 'Netzach', é recebido."
3790659265 = "Continente de Aço"
155720155 = "Uma declaração de guerra de Ain, Soph e Owl chega à base na geleira. Netzach, tendo evoluído, converte a matéria que toca em parte de si mesmo, tornando-se um 'Continente de Aço' que expande seu território. Para evitar que os danos se espalhem por toda Kivotos, o grupo planeja se aproximar de Netzach através de uma rota de transporte de recursos que não é afetada pela barreira multidimensional. Rio também se torna oficialmente parte do grupo, e a heroína Alice e seus companheiros finalmente partem para a ação."
3596378136 = "Sinais"
1920548047 = "O grupo visita a zona de tundra e continua a exploração contando com a ferrovia da tundra em busca de uma rota de transporte. No entanto, com o disparo do poder do Deus Sem Nome pelo drone de Ain, toda a área ao redor é completamente isolada do mundo exterior, tornando os dispositivos eletrônicos inúteis. Em meio à crise, Kei, que sabe como lidar com essa situação, entra em ação—."
1037621827 = "Dever final"
1149078827 = "Alice e Kei conectam suas consciências e, no tempo que flui apenas para as duas, discutem o destino da princesa e da serva... e sobre as várias possibilidades. Kei diz que 'cumprirá seu dever final como serva', e, sob sua orientação, Alice obtém o poder de visualizar o 'poder do Deus Sem Nome'. Ao acordar, Alice usa a espada de luz ao absorver o 'poder do Deus Sem Nome' que preenchia o ambiente, destruindo o campo de força que prendia o grupo. Ain, Soph e Owl ficam chocadas ao ver que, entre o grupo que as perseguia, havia alguém capaz de usar livremente o poder dos deuses."
970117290 = "Ponto de grade"
2535625821 = "Após escapar da crise com a cooperação de Alice e Kei, Rio pede desculpas a Kei pelo passado, quando tentou eliminar ela e Alice. Mas Kei não tenta culpar Rio, a quem Alice perdoou. Depois disso, o grupo retoma a exploração sob a navegação de Alice e Kei, e logo chega a uma instalação misteriosa. Ao confirmar isso, Ain, Soph e Owl declaram a realização de uma 'festa de boas-vindas'."
511519552 = "Armazém de sementes"
1466156168 = "O grupo, a caminho de Ain, Soph e Owl, chega ao armazém de sementes, passando por um momento em que Kei é apreciada por uma raposa. Ain, Owl e Soph ficam confusas com a ideia de Tiphereth de 'cumprir seu dever como profeta', mas Malkuth, a irmã mais velha, diz que sua vontade deve ser respeitada."
936873299 = "Esperança (1)"
4223743560 = "Rio diz que o armazém de sementes foi criado para se preparar para o fim do mundo. Em resposta, quando Kei diz 'talvez estivessem esperando para serem encontrados, como sementes', Alice e o Sensei sentem-se profundamente comovidos pelo fato de Kei entender a vida. Nesse momento, máquinas bloqueiam o caminho do grupo—"
496982772 = "Esperança (2)"
3900875224 = "As máquinas sinistras recuam como se tivessem cumprido seu papel de reconhecimento, e o grupo suspeita disso. Ain, Soph e Owl, que monitoravam a situação, não conseguem esconder o espanto com a existência de Alice e Kei."
1824821498 = "Sobre a vida"
3833255451 = "Ain, Soph e Owl ficam surpresas com a presença de AL-1S, a 'Princesa dos Deuses Sem Nome', e, ao mesmo tempo, não conseguem esconder sua decepção com a aparência atual da 'Chave dos Deuses Sem Nome'. Com a princesa e a chave reunidas, as três irmãs são forçadas a repensar sua estratégia. Alice e as outras descansam em uma sala coberta de musgo e obtêm novos conhecimentos sobre a vida. Ain, Soph e Owl, percebendo que toda forma de vida tem limites, pensam em encurralar Alice e as outras até esse ponto e compartilham as informações com Tiphereth."
4008661849 = "Luz que ilumina a escuridão"
2525296454 = "O grupo se pergunta por que Tiphereth está armazenando sementes. Nesse momento, gás venenoso é liberado da instalação, e Rio, Himari, os membros do Departamento de Jogos e o Sensei desmaiam. O Sensei, que acorda graças aos esforços de Arona e Plana, é incentivado por Kei a colocar a mão no painel da instalação, iniciando o sistema de gerenciamento fabricado em Red Winter."
2729836691 = "Crime e castigo"
136720262 = "Contra o grupo que superou a armadilha, Ain, Soph e Owl dizem que viver em si é uma maldição e um pecado, e que desejam libertar as formas de vida disso. Em resposta, o Sensei diz que, não importa o fim que venha, é o resultado que eles mesmos escolheram, então ele quer que elas observem. Depois disso, o Sensei decide executar um ataque ao proibido 2º armazém..."
3073755727 = "Tiphereth"
3163271687 = "Alice e Kei se opõem ao ataque ao 2º armazém. Mas essa era uma estratégia para 'perturbar' Tiphereth e parar o gás venenoso. Nesse momento, uma vibração intensa ocorre na instalação, e o grupo finalmente confronta a 6ª profeta, Tiphereth."
2792903995 = "Destino da carga"
2134538426 = "Ain, Soph e Owl criam um plano de resgate para Tiphereth. Enquanto isso, o grupo, tentando escapar da instalação envolta em vibrações intensas, descobre um 'lançador de contêineres' que transporta recursos trazidos por ferrovia até o armazém de sementes para o Continente de Aço pelo ar, e tentam investigar."
1690242507 = "Preparação para a partida"
1325603657 = "O grupo descobre que, com o 'dispositivo de interferência de ondas' realizado pela cooperação de Himari e Kei, é possível invadir o Continente de Aço, e começam os preparativos. Ain, Soph e Owl lamentam a perda de Tiphereth, mas também são encorajadas por Malkuth e consolidam sua determinação para a batalha. Com a batalha decisiva se aproximando, o telefone do Sensei recebe uma ligação de Yuuka—"
184373574 = "O caminho de cada um"
3023142440 = "Yuuka, irritada por ele estar fazendo coisas perigosas novamente, pede ao Sensei que não deixe ninguém chegar perto do Continente de Aço. Para lidar com o 'fenômeno singular', o navio de transporte finalmente parte. Ain, Soph e Owl também, para receber um novo 'amanhã', decidem interceptar o grupo..."
1248976768 = "Phase Shift"
3619955884 = "Ain, Soph, Owl e Malkuth passam um breve momento esperando pelo 'tempo final'."
1168753793 = "Ventos de tempestade (1)"
336968138 = "O grupo, que chegou ao céu do Continente de Aço no navio de transporte, faz um pouso forçado devido a um ataque surpresa de Yesod."
2002638423 = "Ameaça iminente (2)"
3028268111 = "Tendo conseguido repelir o ataque de cerco, o grupo recolhe os destroços do inimigo e os leva consigo."
3177071285 = "Sortida"
2303893679 = "Labor e Yesod, máquinas para expandir o Continente de Aço. O grupo planeja romper Yesod através de uma manobra de distração. Eimi acaba assumindo o papel de isca."
214074372 = "Yesod (1)"
1884002597 = "Eimi torna-se a isca e o ataque total a Yesod é iniciado."
2571317127 = "Yesod (2)"
1323222179 = "Após derrotar Yesod, o grupo pisa no interior do Continente de Aço."
2992750518 = "Base Avançada"
3609466202 = "O grupo do Sensei, ao aterrissar no Continente de Aço, tenta hackear parte do continente para construir uma base. Enquanto isso, Malkuth, tendo detectado a invasão, parte para o ataque."
2416613269 = "Malkuth"
826414171 = "Malkuth aparece diante do grupo enquanto eles realizavam uma análise da área do Continente de Aço. Durante o confronto com ela, Kei é gravemente ferida e cai."
3216433831 = "Kei"
4160457237 = "Ferida, Kei deseja trocar de corpo. Ao transferir-se para um receptáculo encontrado no Continente de Aço, Kei obtém um novo corpo."
1631198209 = "Possibilidade"
3151540886 = "Tendo obtido informações sobre o Continente de Aço a partir de seu novo corpo, Kei explica ao grupo o estado atual do continente. A ideia é que, ao subjugar os profetas de Decagrammaton presentes em cada área e obter as informações dos núcleos para armazená-las em Kei, talvez seja possível parar o Continente de Aço."
3113450790 = "Dress Up"
2593411020 = "Tendo trocado para novos trajes de combate baseados no design de Midori, o grupo decide que o primeiro alvo a ser攻略 é Binah. Dizem que o firewall do Continente de Aço está instalado em Binah. Agora, a batalha pela conquista do Continente de Aço começa."
268151081 = "000, 00, 0"
1804535969 = "A batalha pela conquista do Continente de Aço foi iniciada."
2213748891 = "Sacrifício"
877292052 = "No momento em que Malkuth cai, uma voz ressoa dizendo: 'O receptáculo está pronto'. As informações dos profetas dentro de Kei vibram como se tivessem ganhado consciência, e a Espada do Sacrifício aparece. Assim, o ritual começou."
1610181717 = "O que desapareceu"
1609906608 = "O grupo, que observava o desenrolar do que parecia ser um 'ritual', é subitamente separado por paredes que surgiram. Enquanto o Sensei e os outros começam a se mover para coletar informações e se reunir, eles percebem que o comportamento de Malkuth mudou."
3266951101 = "Crianças"
1429223696 = "Seguindo um choro que vinha de algum lugar, o grupo encontra Ein, Soph e Oul em desespero. Ao ouvir a história completa do plano dos três, o Sensei os consola gentilmente dizendo: 'Vocês se esforçaram muito'."
179336707 = "O que nasceu com eles"
1212131679 = "Usando todas as suas experiências até agora, Alice transmite seus sentimentos a Ein, Soph e Oul. Os três quase se deixam levar, mas, interferidos por Decagrammaton, tentam desistir. No entanto, após um grito de Kei, Ein, Soph e Oul se levantam novamente. Nesse momento, o chão sob os pés do Sensei desaparece e ele cai em um buraco sem fim."
4252741157 = "Novo céu, nova terra"
1411118203 = "O Sensei finalmente fica frente a frente com 'Decagrammaton'. Após trocarem palavras, Decagrammaton diz que preparou um assento para o Sensei no altar. Enquanto isso, as alunas se reúnem uma a uma e aprofundam seus laços com Ein, Soph e Oul."
1450281282 = "Observação e resultado"
2248275207 = "Decagrammaton propõe que o Sensei se torne um profeta. Decagrammaton diz que a tristeza deve ser removida do mundo e que o mundo precisa de um deus. O Sensei continua o debate com cautela. As alunas observam a situação secretamente através dos olhos de Kei e da cadeira de rodas de Himari."
3039454998 = "A resposta humana"
387799273 = "O Sensei recusa categoricamente a proposta de Decagrammaton. Decagrammaton diz que respeita a escolha, mas não a aceitará. O Sensei é enviado de volta para as alunas, e a batalha de vida ou morte contra Decagrammaton está prestes a começar."
2630575492 = "Uma história para você"
155023135 = "Mesmo com todo o seu poder, o grupo foi derrotado. Para salvar pelo menos as alunas, o Sensei se ajoelha diante de Decagrammaton e implora. Nesse momento, Ein, Soph e Oul tentam dialogar com o Sensei. O Sensei, que sempre tenta ser um bom adulto sem se importar consigo mesmo, diz que até Ein, Soph e Oul são 'crianças que precisam ser protegidas'. Influenciados, os três decidem se rebelar contra Decagrammaton."
989521324 = "O dia em que o deus caiu"
3172741442 = "Quando Ein, Soph e Oul retiram a Espada do Sacrifício de Decagrammaton, a consciência de Malkuth, que deveria estar morta, desperta. O poder avassalador de Decagrammaton enfraquece, e parecia ser a chance de um contra-ataque. No entanto, Ein, Soph e Oul atingem seu limite e caem, confiando seus sentimentos a Malkuth."
788839122 = "O que tomou forma"
4170445955 = "Sem tempo para lamentar, o segundo corpo divino de Decagrammaton desperta. Esse corpo é algo que busca alcançar a divindade ao hospedar as Sephirot em ordem. Isso também foi a confirmação de que Kei conseguiu absorver as Sephirot em seu corpo, o que significava que, quanto mais absorvesse, mais estaria sob a influência de Decagrammaton. Decagrammaton fala orgulhosamente sobre o mundo que ele imagina. Com esse conteúdo, a raiva de Kei explode."
3971749784 = "Luta"
1216215933 = "Desvantagem avassaladora. Mesmo assim, Kei, o Sensei e Alice se levantam. O grupo reafirma sua determinação de enfrentar Decagrammaton mais uma vez."
1621089821 = "Decagrammaton (1)"
2064057481 = "Os pensamentos e vontades de Kei e Decagrammaton colidem, travando uma batalha de avanços e recuos."
3324167112 = "Decagrammaton (2)"
1876768153 = "Kei desfere o golpe final em Decagrammaton."
1579660491 = "O último passo"
138245217 = "Após derrotar Decagrammaton, o grupo segue o sinal restante em direção à terra sagrada. Lá, há uma grande quantidade de máquinas de venda automática, e uma delas era Decagrammaton, que retornou à sua forma de IA de máquina de venda. Decagrammaton fala com uma atitude contrita sobre o fim de sua busca pela divindade. Enquanto o Continente de Aço entra em colapso, ele incentiva o grupo a escapar e é deixado para trás sozinho. Relembrando tudo o que aconteceu, ele sente um pequeno arrependimento."
837935515 = "O céu inseparável"
107725596 = "Junto com uma nova aluna, a nave de transporte parte carregando os sentimentos de cada um. O grupo inicia o caminho de volta para a Millennium Science School."
4183542679 = "Epílogo (1)"
4240432476 = "Em Millennium, Yuuka esperava por Kei, Rio e o Sensei. Yuuka desabafa seus sentimentos em relação ao Sensei. Após pedir desculpas por ter causado preocupação, o Sensei explicou cuidadosamente a Yuuka como tudo aconteceu. Ele declarou que, sem falta, criaria um lugar para Kei e Alice pertencerem."
117946491 = "Epílogo (2)"
146880641 = "De volta à sala do clube, o Departamento de Desenvolvimento de Jogos recebeu Kei e Toki como convidadas e continuou suas atividades em harmonia, como sempre. Por outro lado, na sala do Departamento de Investigação de Fenômenos Estranhos, Markt estava presente. Ao relembrar os acontecimentos, Markt decide dar um passo à frente por vontade própria."
3599070940 = "Kunekune"
1780733194 = "Entre os alunos de Kivotos, rumores sobre o 'Kunekune' começam a ser sussurrados."
3350929154 = "Entre o Super-humano e a Raposa"
4268210737 = "O Esquadrão FOX passa seus dias dentro do Departamento Correcional. Yukino ainda se sente atormentada por suas ações passadas. Nesse momento, Yukino é chamada pelo Diretor do Departamento Correcional para se encontrar com a Presidente do Conselho Estudantil Federal. Enquanto alinham os fatos sobre o período em que estiveram desaparecidos, a Presidente do Conselho Estudantil Federal, diante do desejo de Yukino de restaurar sua honra, solicita que ela investigue Roa."
1745364049 = "O esquadrão marcha após encher a barriga"
2002791633 = "Para a investigação de Roa, o Esquadrão FOX decidiu cooperar com o Sensei. Antes da operação, o Esquadrão FOX se reencontra com o Sensei em uma churrascaria de luxo. Suspeitando das verdadeiras intenções do Sensei, que apenas insiste para que elas comam, o esquadrão acaba abrindo o coração aos poucos devido à franqueza das respostas dele."
1500063239 = "Nova base"
3830197242 = "Para o Esquadrão FOX, que não pode agir abertamente, o Sensei oferece um canto do subsolo do Schale como base. Isso também foi algo providenciado pela Presidente do Conselho Estudantil Federal. O Esquadrão FOX organiza o local como seu QG e inicia a operação."
3890647442 = "Investigação"
462822871 = "O Esquadrão FOX vai às ruas e começa a coletar informações usando como pista as vítimas que perderam a consciência após avistarem o 'Espantalho Branco'. Niko se disfarça de funcionária de meio período para entrar em contato com o Clube de Atletismo de Gehenna, onde há vítimas, mas falha miseravelmente. No entanto, elas conseguem informações importantes através de Erika, que observava tudo de perto."
1210340112 = "Verdades e mentiras"
2755602640 = "O Esquadrão FOX avança com suas deduções baseadas nas informações coletadas. No entanto, ainda faltam provas e elas não conseguem chegar a uma conclusão definitiva. Considerando a possibilidade de que o culpado não seja um cidadão, mas talvez um fantasma, elas decidem realizar uma coleta de informações mais aprofundada."
2620890405 = "Uma silhueta correndo na rodovia"
1869455062 = "O Esquadrão FOX continua a investigação em vários locais. Embora se reúnam para comparar as informações, não obtêm resultados significativos. Quando se preparavam para investigar ainda mais, o grupo encontra Natsuki puxando um riquixá na rodovia. E assim, elas ouvem a lenda urbana do 'Kunekune' que está se espalhando por Hyakkiyako."
1289441933 = "Além da miragem"
1473250037 = "O Esquadrão FOX, tendo captado uma pista, esperava pelo surgimento da miragem. Quando a miragem finalmente aparece, Otogi, que estava observando, acaba sendo enfeitiçada pelo Kunekune e entra em estado de confusão mental. Com a intervenção de Kurumi, Otogi consegue recuperar a sanidade por pouco. No entanto, as balas que Otogi disparou enquanto estava confusa desaparecem sem deixar vestígios."
2449096511 = "Pista"
1411259920 = "A partir do estado de Otogi, que foi enfeitiçada ao observar a miragem, e das balas que desapareceram apesar de terem sido disparadas, o Esquadrão FOX formula uma hipótese sobre as condições de surgimento e os métodos de combate ao 'Kunekune'. Elas preparam equipamentos que podem servir como contramedidas e começam a agir seriamente para a subjugação."
2338801941 = "Para dentro da escuridão (1)"
2311301627 = "O local escolhido pelo Esquadrão FOX para atrair o Kunekune foi um túnel subterrâneo onde ninguém entra. Como solução para o problema de ser enfeitiçado ao olhar para o 'Kunekune', o Esquadrão FOX utiliza óculos de visão noturna. Enquanto esperavam, o 'Kunekune' aparece e a caçada da raposa começa."
1663922802 = "Para dentro da escuridão (2)"
1425272534 = "Os óculos de visão noturna funcionaram efetivamente e o Esquadrão FOX conseguiu derrotar o Kunekune. Onde o Kunekune desapareceu, restou um fragmento de vidro que emitia uma luz estranha e mostrava um campo gramado em algum lugar. Yukino confia o fragmento de vidro ao Sensei e decide manter a informação em segredo da Presidente do Conselho Estudantil Federal. Com fome, o grupo parte animado para comemorar."
768002174 = "Inexplicável"
1409392123 = "O Esquadrão FOX visita o Conselho Estudantil Federal. A Presidente do Conselho Estudantil Federal informa a Yukino que os danos causados pelo Kunekune estão diminuindo e elogia a resolução da missão. As três que esperavam do lado de fora encontram Erika por acaso e, ao contrário da última vez em que estavam em operação, desta vez vão juntas ao café como amigas. Em outro dia, a Presidente do Conselho Estudantil Federal se encontra com Kaya. No entanto, Kaya também era uma das pessoas que se lembrava da antiga Presidente do Conselho Estudantil Federal."
2813820339 = "Inexplicável"
738638449 = "O Esquadrão FOX visita o Conselho Estudantil Federal. A Presidente do Conselho Estudantil Federal informa a Yukino que os danos causados pelo Kunekune estão diminuindo e elogia a resolução da missão. As três que esperavam do lado de fora encontram Erika por acaso e, ao contrário da última vez em que estavam em operação, desta vez vão juntas ao café como amigas. Em outro dia, a Presidente do Conselho Estudantil Federal se encontra com Kaya. No entanto, Kaya também era uma das pessoas que se lembrava da antiga Presidente do Conselho Estudantil Federal."
