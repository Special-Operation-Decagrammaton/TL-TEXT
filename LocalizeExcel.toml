2673225665 = "Graças aos esforços valentes do grupo, a invasão da Gangue dos Passarinhos foi contida com sucesso. Kisaki, que outrora havia se infiltrado entre elas disfarçada como a pirralha 'Kiki', agora as encara novamente…… mas desta vez, vestindo o imponente manto de 'Monshu'."
2687601582 = "Título (Shunzinha)"
