1541422275 = "Presidente Hina. Quando recebi as exigências egoístas do Pandemonium, fiquei preocupada com o que aconteceria a seguir...\n\nMas ao ver o seu esforço, senti que também devo me dedicar ao máximo.\n\nComo oficial administrativa do Comitê Disciplinar, estou torcendo pela senhora, Presidente Hina. Por favor, dê o seu melhor!"
1570765118 = "Fufu, ouvi falar sobre isso.\n\nNada menos que a temida Presidente do Comitê Disciplinar, conhecida como um demônio, vestindo um lindo vestido e fazendo uma apresentação de piano... É como uma iguaria gastronômica.\n\nEstou ansiosa pela apresentação no dia. Fufufu! Dê o seu melhor."
2407965685 = "Fiquei sabendo. Parece que você vai tocar piano na festa de Gehenna, não é?\n\nDeve estar sendo difícil atender aos caprichos do Pandemonium, não é? Eu e Juri estamos torcendo para que você consiga terminar a apresentação em segurança.\n\nBoa sorte, Presidente do Comitê Disciplinar."
2286376939 = "Presidente do Comitê Disciplinar~!\n\nOuvi dizer que você vai fazer uma apresentação incrível! Isso é tão quente quanto o desenvolvimento de fontes termais, não é?\n\nVou levar todo mundo para assistir! Boa sorte!"
978447002 = "Presidente!\n\nA senhora sempre disse que, como membros do Comitê Disciplinar que protegem a ordem de Gehenna, devemos ser justos e imparciais. Mas, desta vez, nós, do Comitê Disciplinar!\n\nEstamos do seu lado e torcemos pelo sucesso da sua apresentação de todo o coração! Dê o seu melhor!"
659199751 = "Presidente, você não está se sentindo cansada física ou mentalmente?\n\nSe sentir qualquer anormalidade, por favor, me avise imediatamente. É meu trabalho verificar a saúde de todos no Comitê Disciplinar, começando pela senhora, e tomar as medidas adequadas.\n\nE também... estou torcendo por você. Por favor, dê o seu melhor."
981979352 = "Hina-senpai!\n\nA Ibuki também está muito ansiosa para ver sua apresentação de piano!\n\nVou torcer muito por você~! Ehehe!"
1958821606 = "Hina-cchi! Estou torcendo por você!\n\nNós estamos muito ansiosas pela sua apresentação! Com certeza vai ser uma performance super incrível!\n\nDepois vou gravar e te mandar o vídeo! Força!"
4025554739 = "Ser forçada a lidar com as loucuras do Pandemonium... a Presidente também tem seus problemas.\n\nBem, não há muito que eu possa fazer, mas... já sei! Decidi!\n\nSe alguém tentar atrapalhar sua apresentação, eu vou mandar todos pelos ares! Então, continue praticando!"
2710967621 = "Mesmo com um grande evento como a festa de Gehenna se aproximando, nosso dever não muda.\n\nDevemos observar e garantir que ninguém se machuque por causa da agitação da festa.\n\nDepois de cumprirmos nosso dever, só nos resta torcer por aqueles que se esforçam. Dê o seu melhor, Presidente."
