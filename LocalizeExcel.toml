2166076890 = "A 'Família Arancino' mantém os criminosos procurados que cometeram atos terroristas em um vagão de escolta especial."
3643696836 = "3h10, com destino a Gehenna"
342073680 = "Ichika recebe a tarefa de recuperar um artefato valioso de Trinity e também de auxiliar o Sensei que participou da escavação. Feliz com a oportunidade de trabalhar com o Sensei, ela aceita de bom grado, mas o trem de carga com o artefato vai para um destino diferente……?"
1743782552 = "Coisas do dia a dia (1)"
4175588508 = "Percebendo que deixaram a bolsa em um trem com destino a Gehenna, o Sensei e Ichika entram no trem apressadamente. No entanto, a presença de alunos de Trinity causa agitação no vagão…… Ao ouvir o barulho, o funcionário do trem entra em conflito."
490474147 = "Coisas do dia a dia (2)"
2087948384 = "De repente, uma explosão vem do vagão de escolta acoplado ao trem. Das chamas, Kasumi aparece."
1027493850 = "Para o vagão dianteiro (1)"
2901736866 = "Kasumi propõe uma aliança ao Sensei e Ichika. Sem tempo para pensar, eles lutam contra a gangue que perseguia Kasumi e, temporariamente, se aliam."
2706436858 = "Para o vagão dianteiro (2)"
1886931417 = "Kasumi diz que o vagão de carga está no vagão dianteiro e conta seu plano original. Mesmo que se aliem a Kasumi, o objetivo é o mesmo. O grupo avança."
3944901993 = "O bom, o mau, o trinity (1)"
2576802244 = "Iori sente algo estranho no trem, que continua avançando pulando as estações, e embarca. Ela encontra Kasumi e o grupo que se dirigia ao vagão dianteiro."
625534155 = "O bom, o mau, o trinity (2)"
1618348553 = "Diante de Iori, que declara que prenderá todos os alunos problemáticos do trem, Kasumi diz que a maioria dos passageiros são alunos problemáticos. Iori pede ajuda ao Sensei, mas Kasumi o ameaça usando o artefato de Trinity como escudo."
231759077 = "Expresso para o inferno"
810924489 = "Ichika finalmente perde a paciência com Kasumi, que a ameaça usando o artefato de Trinity, e ataca todos os alunos presentes, incluindo Kasumi."
2795025360 = "Existência do esforço"
943399603 = "Diante do artefato quebrado, Ichika finalmente se acalma. O Sensei diz que se desculpará com ela. Ele então sorri, dizendo que vê seu esforço. Ichika finalmente alegra o rosto. Nesse momento, explosivos colocados na direção do trem fazem com que ele capote."
4054716633 = "Declaração de guerra"
3293238505 = "O grupo consegue levar o artefato a Trinity. Nagisa aceita gentilmente o pedido de desculpas pelos danos, dizendo que 'danos podem ser reparados'. Assim, a longa tarefa de Ichika e do Sensei termina."
2098216956 = "Vagão de escolta"
274615224 = "O Comitê de Disciplina de Gehenna mantém os principais culpados do terrorismo em um vagão de escolta especial."
2688632770 = "Registro juvenil de uma certa ciência"
3170117962 = "Em uma tarde tranquila e ensolarada – o Sensei descansava no Schale quando recebe um contato de Aymi dizendo que há uma pessoa caída em uma ruína. Segundo ela, elas vieram de outro mundo…… Para trazê-las de volta ao seu mundo original, o Schale agora se levanta!"
