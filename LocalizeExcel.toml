1603258373 = "Ao chegarem no desfiladeiro, o grupo rapidamente vestiu seus maiôs e partiu para brincar no rio. O Sensei logo se vê bombardeado por todas as alunas, uma de cada vez, pedindo a opinião dele sobre os trajes de banho delas. E assim começam as 'férias', digo, a inspeção."
