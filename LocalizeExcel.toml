958604450 = "Prazer em conhecê-los. Sou ORWELL, administrador do \"Lore Friendly\".\nCriei esta instância, \"Lore Friendly\", para reunir informações sobre lendas urbanas descobertas em vários locais de Kivotos. Sintam-se à vontade para compartilhar histórias sobre fenômenos estranhos e lendas urbanas aqui."
1269488525 = "Não importa o quão trivial seja a anomalia. Se reunirmos informações suficientes, elas se tornarão uma grande pista para explorar a essência do mundo.\nLembrem-se: a verdadeira realidade existe dentro da nossa percepção.\n\nVamos juntos transformar este lugar em um espaço de exploração para cultivar conhecimento e verdade."
671759831 = "Uau, não sabia que isso existia! Eu adoro histórias de terror, mas estava entediada porque todas pareciam coisas que eu já tinha visto. Se eu encontrar algo, vou postar!"
2837975137 = "Eu também gosto de histórias de terror, mas... isso aqui não está meio suspeito? Acabou de ser criado e já tem muitos inscritos. É algum tipo de marketing viral? E o ícone do administrador é uma TV velha... Espero que não vire uma página de anúncios corporativos quando a gente menos esperar..."
4111771375 = "Uma instância de lendas urbanas com um aumento repentino de inscritos parece um ótimo tema para uma história de terror. Bem, se algo acontecer, é só criar uma nova instância, então por que não esperar para ver?"
338790072 = "Não tem muitas placas estranhas ultimamente?\nTem lugares com limite de velocidade onde está escrito \"Aumente a velocidade\"... E outro dia vi uma placa de \"Cuidado com animais selvagens\" no meio da cidade. Eles existem mesmo?"
977601446 = "Acho que eu também vi isso. Por que \"Aumente a velocidade\"?\nSerá que é para fugir rápido porque é perigoso?"
375819026 = "Não sei se isso conta como lore...\nTem uma personagem chamada Pepperoni. Eu lembro que ela parecia um frango cozido... mas o adesivo que vi outro dia tinha um design completamente diferente do que eu lembrava."
1235015986 = "Ei, você acabou de insultar o Peroro-sama?\nOnde você está agora!? Precisamos conversar."
424362290 = "Tem uma pessoa estranha perto da estação 〇〇〇〇〇...\nEla está usando um traje de corpo inteiro totalmente branco e fazendo ginástica... com esse calor todo. Não é bizarro? Será que ela enlouqueceu por causa do calor, ou ela está fazendo isso porque já é louca mesmo... Fiquei com medo e não quis chegar perto."
3910063889 = "Ah, acho que eu vi isso também. É onde tem um calçadão ao lado de um riacho, né? No começo achei que fosse lixo plástico preso balançando, mas não era. É como se desaparecesse quando você chega perto... ou quando percebo, está balançando de novo."
2325372914 = "Não tem fotos?\nDá para saber se é lixo ou uma pessoa usando o zoom do celular, né? O fato de não ter fotos já prova que é mentira. Se for inventar história, faça direito."
3582262770 = "Isso é sério... um amigo meu desmaiou por lá e foi hospitalizado. As pessoas ao redor estavam falando a mesma coisa... que uma pessoa vestida como se fosse um traje de mergulho branco estava dançando, e que quem a seguiu acabou desmaiando de repente. ...Isso não é bem perigoso?"
3177847880 = "Falando em lendas urbanas, vocês conhecem os rumores de quando a Chefe Kaya declarou lei marcial?\nAquela bomba termobárica que prepararam para eliminar a oposição... Dizem que era para ser usada por agentes das forças especiais da SRT. A SRT não é uma escola que já foi fechada?"
343714176 = "A SRT tem muitos rumores sombrios. Ouvi dizer que eles possuem armas secretas proibidas pelo Conselho Estudantil Federal. Mas também ouvi dizer que agora eles ficam brigando por marmitas descartadas de lojas de conveniência..."
3390104466 = "Sendo sincero, as forças especiais da SRT são realmente fortes? Ouvi dizer que eles capturam criminosos perigosos, mas será que eles não focam apenas quando o alvo está sozinho ou distraído? Se fossem realmente fortes, não capturariam individualmente em vez de em esquadrão?"
2082038179 = "Lutar de forma justa contra criminosos? rs\nAcho melhor do que ir sem plano e aumentar o número de vítimas. Você está difamando a SRT que protege os cidadãos para defender criminosos? ...Por acaso você é um deles?"
2762509097 = "Do nada? Que medo. Por acaso você é da SRT?"
3323201397 = "Desfrute da melhor carne wagyu em um espaço privado com reserva exclusiva!\nQue tal passar um momento especial com alguém importante saboreando wagyu?\nReserve aqui!"
2054008363 = "Hã? Por que tem um anúncio de churrascaria em uma instância de lendas urbanas?\nBug?"
2018231707 = "Ah, é sua primeira vez no Full Link?\nAs postagens de outras instâncias também aparecem aqui. Se não gostar, é só bloquear... mas como a instância é nova e tem poucas postagens, não é melhor só ignorar?"
2576877900 = "A coisa branca que eu falei antes! Ela estava lá de novo!!\nParece que eu não vi errado... mesmo de longe, fiquei com tanto medo que não tive coragem de chegar perto. Não consigo parar de pensar na história de quem seguiu aquilo e desmaiou...\nUgh, que medo. Vou parar de usar esse caminho..."
1966411185 = "Os relatos de avistamentos estão aumentando. Ouvi dizer que alguém do clube de atletismo de Gehenna também desmaiou, é verdade?"
2212117541 = "Pelo que ouvi, tem um boato estranho no clube de atletismo de Gehenna. A garota que desmaiou desta vez parece ser a que tem o melhor desempenho. Dizem que as outras ficaram com inveja e lançaram uma maldição. É só um boato, mas dizem que onde há fumaça, há fogo... ^^"
2130375924 = "Parem de falar essas coisas sem fundamento. É desagradável de ler."
621158106 = "O clube de atletismo de Gehenna está recrutando novos membros para correr maratonas conosco!\nQualquer estudante de Gehenna que goste de correr é muito bem-vinda!\n...Mesmo que não seja boa em correr, estudantes de Gehenna acostumadas a fugir também são bem-vindas!\nTreine o corpo e a mente no clube de atletismo e liberte-se do Comitê Disciplinar!\nEstudantes interessadas, enviem uma DM para @Gehenna_Athletics!"
4254384135 = "Pode entrar no Schale assim do nada? Parece que tem várias estudantes entrando e saindo, mas o Sensei só recebe quem é convidado? Pode ir lá normalmente?"
2198577225 = "Quero comer frango"
2048584069 = "Alguém foi ao Mercado Gettan hoje à tarde?\nUma garota muito fofa estava distribuindo bebidas... será que ela é modelo de alguma propaganda?\nEu estava ocupado e não chamei, mas pelo menos deveria ter pegado a bebida~"
3927977111 = "Onde no Mercado Gettan? Estou na frente da loja de senbei agora!"
4148671665 = "É perto de onde ficava a barraca que vendia leques!"
856886527 = "É verdade! Ela é muito fofa mesmo!\nTalvez eu já tenha visto em algum lugar... será que é modelo de revista? Estou quase lembrando..."
964535569 = "A previsão do tempo para D.U. hoje é de sol.\nA temperatura máxima é de 30 graus e a mínima de 20 graus.\nAs temperaturas ficarão altas durante o dia, então tomem cuidado com atividades ao ar livre."
2749646398 = "Calor... está tão quente que eu queria ir para a escola pelada."
1774042646 = "Não sei se alguém se lembra, mas sou a pessoa que postou anteriormente que um amigo desmaiou após ver algo estranho.\nHoje, o hospital entrou em contato dizendo que ele acordou. A causa ainda parece ser desconhecida, mas não há anormalidades no corpo. Estou tão aliviada... relaxei tanto que até perdi as forças..."
3053562159 = "Eu também! Meu amigo que desmaiou naquele calçadão também acordou!\nSerá que foi porque a temperatura baixou e ficou mais fresco? De qualquer forma, que bom!"
2090505947 = "No fim das contas, o que era? Realmente não sabem a causa?"
2642813418 = "Pessoas que passaram por situações parecidas acordarem quase ao mesmo tempo... isso é estranho.\nIncluindo o caso do clube de atletismo, será que alguém está guardando rancor de vocês?"
566774827 = "Definidos os atletas de Kivotos para o Intercolegial de Atletismo!\nO destaque é o atleta Ito, representante de curta distância. Ele acabou de retornar de uma longa internação, mas conseguiu bater seu recorde pessoal e foi selecionado.\nPor favor, apoiem os atletas que competirão no Intercolegial!"
1900309917 = "Fui no lugar que todo mundo estava falando, mas não tem nada lá!\nEu queria experimentar o que aconteceria se visse a coisa branca de verdade... no fim, era tudo mentira mesmo!"
3994228846 = "Não parece que as coisas estranhas aumentaram desde que a Presidente do Conselho Estudantil Federal voltou? Pode ser só impressão minha.\nTem mais relatos de avistamentos de coisas estranhas e estudantes contando experiências assustadoras. Parece que ouço falar de desaparecimentos com mais frequência também...\nA Presidente do Conselho Estudantil Federal parece estar fazendo seu trabalho direito, mas... tem algo errado... não sinto que era assim antes."
3825455165 = "Aliás, essa instância é chata. A história da coisa branca que se contorce parece ter sido só insolação. As histórias de terror postadas aqui são todas inventadas, isso desanima. Acho que não preciso mais vir aqui, a menos que aconteça algo realmente sério."