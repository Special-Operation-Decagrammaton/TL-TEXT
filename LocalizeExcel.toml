1728661338 = "Carta de Longe"
1701341732 = "Cherino recebe de Tomoe a notícia sobre o evento de intercâmbio com Shanhaijing. Ela decide ir até Shanhaijing, mas..."
2418942949 = "Lavar as mãos e arrumar a aparência"
2764259254 = "Kisaki pede conselhos ao Sensei sobre o evento de intercâmbio com a Red Winter."
3678077766 = "As águas que fluem se reúnem em um só lugar"
1707942794 = "Após um pouco de agitação, as três integrantes da delegação de Red Winter vestem trajes de Shanhaijing e participam da reunião de intercâmbio."
3377368072 = "O senhor supremo despediu-se da mulher"
2804132110 = "As três integrantes da delegação de Red Winter assistem à ópera de Pequim e encontram a chefe do departamento de ópera, Kaguya."
3894031835 = "Passeando pelo mundo, observando o rio"
3932029858 = "As três integrantes da delegação visitam Shanhaijing. Em contrapartida, algumas alunas de Shanhaijing sentem um certo desconforto."
546846341 = "As nuvens no céu não percebem que se despedaçam ao voar"
702693080 = "Por outro lado, Kaguya encontra secretamente uma das Sete Prisioneiras, Kaya Sarutani."
3734638625 = "O bambu na neve não se curva"
2618362757 = "Kisaki visita o bosque de bambus junto com a delegação. Nesse momento, a saúde de Kisaki piora subitamente e ela desmaia."
1310141378 = "Na floresta de Yuzhou"
590185042 = "Kisaki revela ao Sensei o segredo que guardava até então. Logo depois, ela recebe um telefonema de Kaguya informando que uma nova ópera de Pequim será encenada."
1580804745 = "Ouvindo as palavras da boneca"
2672027241 = "Kaguya apresenta a nova ópera de Pequim e denuncia Kisaki."
2423264712 = "Uma corrida, subindo a montanha (1)"
3064005150 = "Mina e Marina unem forças para deter o departamento de ópera."
3537805872 = "Uma corrida, subindo a montanha (2)"
3904114626 = "Elas não conseguem superar o número de integrantes do departamento de ópera e ficam em uma situação crítica, mas..."
2584552240 = "Abraçando o céu, chegando ao sopé (1)"
2115515089 = "Kisaki está encurralada. Com a chegada de reforços da Secretaria de Red Winter, incluindo Cherino, elas conseguem repelir o departamento de ópera."
2292285379 = "Abraçando o céu, chegando ao sopé (2)"
3142347033 = "O plano do departamento de ópera termina em fracasso, e a chefe, Kaguya, é detida."
3452699071 = "Sentindo falta do amigo que partiu"
1149780929 = "A reunião de intercâmbio termina em segurança e tudo parece ter sido resolvido pacificamente, mas... a conspiração de Kaya Sarutani ainda continuava."
4118775213 = "Trailer"
4002183689 = "Um 'fenômeno' desconhecido abala Shanhaijing. O departamento de ópera volta a agir nas sombras — em meio ao caos, a autoridade da Genryumon é questionada. E agora, a verdade sobre Kisaki e Kaya será revelada."
3476922296 = "A descida das cinco impurezas"
4264014329 = "Com a proximidade do festival tradicional 'Festival da Sombra da Lua', o Colégio Shanhaijing estava envolto em uma atmosfera inquieta desde a reunião de intercâmbio com a Academia Federal de Red Winter. Em meio a isso, um fenômeno estranho ocorre..."
