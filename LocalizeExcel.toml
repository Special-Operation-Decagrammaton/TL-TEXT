648350015 = "キャンパスで不審な動きを見せる生徒たちを確認した。本来ならばセミナーに知らせるのが道理だろうが……只ならぬ状況と感じ、つい後を追ってしまったよ。- セイア"
2965673131 = "あの者たちは一体……？EXPOを台無しにし収益を得るとは、とんでもないことを思いつくものだ。放置しておけば、大きな事件へと発展してしまうだろう。- セイア"
334310010 = "作戦中は、段階ごとに得られた情報をまとめていくのが効率的よ。私はここで待っているから、また聞きたいことがあればいつでも訪ねて頂戴。- リオ"
2204937774 = "手がかりを求めるなら、大勢の集まる場が良い。トリニティでいう噴水前のような場所は、やはり教室……だろうか？ - セイア"
4174324411 = "ロボットのペット……犬や猫を模したロボットだろうか？となれば、餌は電気、といったところか……個人的にも好奇心を刺激される話だね。- セイア"
565085471 = "得体の知れないチップを発見した。私にも、これが邪な意図で作られたことくらいはわかる。リオのもとに届ければ、すぐにその正体が明らかになるだろう……。- セイア"
2223345760 = "……犬、だったとはね。あのデザインはリオの個人的嗜好だろうか。それとも、ここの生徒たちはあれを犬と認識できる……のか？- セイア"
95517514 = "エンジニア部の作品に、見知らぬチップが入っていたわ。そのチップが原因で会場は一時危機に陥り、エンジニア部はあらぬ誤解を受けた。何者かの工作であることは明らかよ。でも、一体誰が……？- リオ"
1245778966 = "リオのやつ、相変わらずだな。昔もよくヘンテコだが凄えモンを作っては、周りの連中をびっくりさせてたっけ。なんか思い出しちまうな……あたし、そういうタイプじゃねぇんだけど。- ネル"
365206562 = "データセンターへの潜入……悪くなかったな。この頃地味な仕事続きだったし、いい運動になったぜ。昔はもっと……いやいや、思い出に浸ってる場合じゃねぇんだっての。- ネル"
3686271168 = "データが揃えば、多くの事態が予測できる。事件を追跡して終わりだなんてごめんだわ。分析で結論を導き出したのが私とはいえ……これは、2人の情報あってこその成果よ。- リオ"
1277669418 = "ゲーム開発部……ゲームを創る集団だろう。趣味趣向の合う者たちが集い、輪となって目標を目指す……まさに模範的な「サークル」だね。トリニティにも、このような組織が増えて欲しいものだが……。- セイア"
4126678237 = "ゲーム開発部は、独特な感性の持ち主が揃っていた。本来の彼女たちが作る作品は、他者を楽しませようという気持ちに溢れた、それは愉快な内容なのだろう。遊べる日が楽しみだね。- セイア"
2590850258 = "皆の努力の結晶を壊すとは、なんと悪趣味な……。必ずや事実を明らかにし、ゲーム開発部の潔白を証明しなければ。それが、「シーフ王」に課せられたクエストだ。- セイア"
744738424 = "エンジニア部に続きゲーム開発部まで……被害が拡大する前に、犯人たちを捕えないと……頼んだわ、ネル。- リオ"
2253968242 = "あれって……事件、だよな？あの体力バカども、普段もイカれたトレーニングしてっから、事件なのか平常運転なのかわかんねぇんだよ……まあ当の本人は困ってるみてぇだし、助けてやっか。- ネル"
74454459 = "よっし、敵の正体が見えてきたな。手間かけさせやがって……見つけた以上、ただじゃおかねぇ。あいつらのおかげで、こっちはずいぶん働かされてんだ！- ネル"
3102902340 = "現場への急襲は失敗……となれば、居所を突き止めて襲撃をするしかないわね。気は進まないけれど……アレを使うわ。- リオ"
1980715747 = "「ビッグシスターアルゴリズム」……懐かしい響きね。当時、ネルがこの存在を知っていたら、きっと私を引き止めたはず。いっそ、そうしてもらったら……私は……。- リオ"
541035342 = "大それた作戦を立てたものだね、リオ。自己犠牲が最善と判断し、本来誰も望んでいない結末に向かう……か。残念だが、君のその計画は放っておけない。ここは、ネルと私が行くとしよう。- セイア"
