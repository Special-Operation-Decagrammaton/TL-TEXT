3055775567 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]なんとなく活動を続けている少女。先輩と後輩から一目置かれている。[/i][-][/c]"
4028810052 = "[c]自分のフェーズ開始時：[/c]HPが[c]{param;ConditionNum}[/c]以下であれば、HPを[c]{param;BasePower}[/c]回復する。"
2496996975 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]委員長に代わって大半の行政を担当している正義実現委員会の副委員長。誰よりも自分に厳しい。[/i][-][/c]"
3233074764 = "[c]装備カードを出した後：[/c]今回のフェーズで自身のスキルの威力が[c]1[/c]増加する。"
1780167426 = "後列のすべての敵にダメージを与える。その後、ランダムで味方ストライカーと交代する。\n\n\n[c][75b4c0][i]ベールに包まれたトリニティの頂点、ティーパーティーのホスト。その正体は、多忙を極める一人の少女である。[/i][-][/c]"
1320965963 = "[c]他{tag;TeaParty}ストライカーのEXスキル発動後：[/c]ランダムな敵にダメージを[c]{param;BasePower}[/c]与える。（自身を含む味方の[c]{tag;TeaParty}[/c]生徒の数だけ繰り返し）\n[c]{char;848004}[/c]または[c]{char;848005}[/c]が味方であれば、1人当たりのスキルによるダメージが[c]{param;BonusNum}[/c]ずつ増加する。"
3576040056 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]トリニティ総合学園所属の純粋なお姫様。純粋さ故に、誰よりも傷つきやすく、他人を傷つけやすい。[/i][-][/c]"
312404380 = "[c]前列に交代時：[/c]ランダムで後列の敵に[c]{param;BasePower}[/c]ダメージを与える。"
3291019510 = "他味方ストライカーのEXスキルの威力が[c]1[/c]増加し、当該ストライカーと交代する。\n\n\n[c][75b4c0][i]自由という言葉を体現したような存在。ティーパーティーのホストを務める姿は容易には想像できない。[/i][-][/c]"
1066641449 = "[c]他{tag;TeaParty}ストライカーのEXスキル発動後：[/c]前列の味方ストライカーのEXスキルの威力が[c]1[/c]増加する。"
3210250803 = "前列の敵にダメージを与える。その後、カードを[c]{param;DrawCardNum}[/c]枚引く。\n\n\n[c][75b4c0][i]「あの子はちゃんと笑えているだろうか？友人もできたのだろうか？……よかった」\n-ブラックマーケットの傭兵、匿名[/i][-][/c]"
3848622176 = "[c]他{tag;MakeUpWork}生徒のEXスキルまたはSPスキル発動後：[/c]カードを[c]{param;DrawCardNum}[/c]枚引く。"
231076403 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]何にでもなれるからこそ、何にもならないことを選んだ少女。[/i][-][/c]"
351059869 = "[c]自分のフェーズ開始時：[/c]ランダムで手札のカード[c]{param;CardNum}[/c]枚のコストが[c]1[/c]減少する。"
2651504191 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]ツルギに勝利できると思う者は愚かである。逃げ切れると思う者は、さらに愚かである。[/i][-][/c]"
2237998232 = "[c]前列にいる時、敵がダメージを受けた後、退却時に：[/c]HPを[c]{param;BasePower}[/c]回復する。"
2674858929 = "前列の敵にダメージを与える。その後、ランダムな敵に[c]{param;BonusAttackPower}[/c]の固定ダメージを与える。（[c]{param;AttackCount}[/c]回繰り返し）\n\n\n[c][75b4c0][i]風紀委員会の冷酷なスペシャリスト。文句を言いつつも誰よりも先頭に立つ彼女の行動力は、ひょっとすると委員長に一番近いのかもしれない。[/i][-][/c]"
3746791027 = "[c]ダメージを受けた時：[/c]EXスキルの威力が[c]1[/c]増加する。"
2135599211 = "すべての敵にダメージを与える。（[c]{param;AttackCount}[/c]回繰り返し）\n\n\n[c][75b4c0][i]ヒナのいないゲヘナを想像できないように、ゲヘナではないヒナも想像できない。[/i][-][/c]"
3485857018 = "[c]前列にいる時、敵がダメージを受けた後、退却時に：[/c]すべての敵に[c]{param;BasePower}[/c]ダメージを与える。"
1997750136 = "ランダムで味方ストライカーのHPを回復する。\n\n\n[c][75b4c0][i]トリニティ総合学園では常に誰かが問題を起こし、誰かが後始末をする。私が担当するのは主に後者。[/i][-][/c]"
3069105627 = "[c]他味方ストライカーのEXスキル発動後：[/c]ランダムで後列の敵に[c]{param;BasePower}[/c]ダメージを与える。"
1184747526 = "ランダムで味方ストライカーと交代する。その後、HPが最も高い敵に[c]{param;SubPower}[/c]の固定ダメージを与える。\n\n\n[c][75b4c0][i]顔が怖いと言われて以来、毎晩鏡の前で笑顔の練習をしている。[/i][-][/c]"
1931885401 = "[c]自分のフェーズ開始時：[/c]ランダムで味方ストライカーのHPを[c]{param;BasePower}[/c]回復する。"
3182341508 = "ランダムな敵にダメージを与える。\n\n\n[c][75b4c0][i]休みたいときも、遊びたいときも、責任をもってパトロールをする少女。[/i][-][/c]"
2216886365 = "[c]敵がダメージを受けた後、退却時：[/c]前列の味方ストライカーのHPを[c]{param;BasePower}[/c]回復する。"
1621612816 = "[c][75b4c0][i]危機の瞬間！ニンペロさんの登場である！[/i][-][/c]"
2965092129 = "[c][75b4c0][i]中毒性があるという評価もあるようだが……。[/i][-][/c]"
1962256730 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]どんなに蒸し暑くても、ヘルメットだけは外さない！そんな自分にちょっと酔っている。[/i][-][/c]"
1544184084 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]ヘルメットにこっそり保冷剤を入れる。これが幹部の知恵だ。[/i][-][/c]"
3706527418 = "[c]他味方ストライカーのEXスキル発動後：[/c]ランダムな敵に[c]{param;BasePower}[/c]ダメージを与える。"
3384273229 = "前列の敵にダメージを与える。その後、後列のすべての味方にシールドを[c]{param;ShieldPower}[/c]付与する。\n\n\n[c][75b4c0][i]「なるほど……後は正義実現委員会に任せるわ」\n-ゲヘナの風紀委員長、空崎ヒナ[/i][-][/c]"
3606491034 = "[c]自分のフェーズ開始時：[/c]自身が一人残った場合、新しい[c]{char;848015}[/c]が合流する。"
4174554070 = "空いたストライカーのスペースにHPが[c]1[/c]のランダムなオートマタを[c]{param;SpawnNum}[/c]個召喚し、シールドを[c]{param;SubPower}[/c]付与する。その後、他味方ストライカーと交代する。\n\n\n[c][75b4c0][i]「これだから最近の若者は！働かせてもらっていることに感謝しなさい。私が若い頃は始業時間より1時間早く出社して花壇に水を――」[/i][-][/c]"
2742386328 = "[c]自分のフェーズ終了時：[/c]他のすべての味方ストライカーに[c]{param;BasePower}[/c]ダメージを与える。"
4174554610 = "ランダムな敵にダメージを与える。\n\n\n[c][75b4c0][i]野心に燃えて傭兵業を始めたものの、現実の壁にぶつかり挫折している新米[/i][-][/c]"
3631717719 = "[c]ダメージを受けた後：[/c]ランダムな敵に[c]{param;BasePower}[/c]ダメージを与える。"
1175820112 = "前列の敵にダメージを与える。\n\n\n[c][75b4c0][i]多くの不条理を経験した末に、居場所を見つけて落ち着き始めた古参傭兵[/i][-][/c]"
4195242012 = "[c]ダメージを受けた後：[/c][c]{char;848018}[/c]にシールドを[c]{param;BasePower}[/c]付与する。"
3578644684 = "[c]{skill;8480219}[/c]の効果発動後、EXスキルを使用できる。\n\nすべての敵にダメージを与える。\n\n\n[c][75b4c0][i]回り続けるレールはやがて、正義の未来へと繋がる！[/i][-][/c]"
1408075034 = "[c]ゲーム開始時：[/c]このストライカーはEXスキルが使用できない。自身が一人残った場合、EXスキルを使用できる。"
1025653715 = "他のすべての味方のHPを回復し、他のすべての味方のEXスキルの威力が[c]3[/c]増加する。その後、自身は退却する。\n\n\n[c][75b4c0][i]口数が少なく、ミステリアスなチームの心の支え……とプロフィールにはあったが、わりとおしゃべり。[/i][-][/c]"
3669633875 = "他のすべての味方のHPを回復し、他のすべての味方のEXスキルの威力が[c]3[/c]増加する。その後、自身は退却する。\n\n\n[c][75b4c0][i]（問題が発生したらお知らせください。翌日確認します）[/i][-][/c]"
1126956015 = "他のすべての味方のHPを回復し、他のすべての味方のEXスキルの威力が[c]3[/c]増加する。その後、自身は退却する。\n\n\n[c][75b4c0][i]友達を放っておけず一緒に行動しているが、自分だけが真剣にやっている気がしている。[/i][-][/c]"
4158848476 = "他のすべての味方のHPを回復し、他のすべての味方のEXスキルの威力が[c]3[/c]増加する。その後、自身は退却する。\n\n\n[c][75b4c0][i]今日もキヴォトスの正義のために、悪と戦う！……と主張する指名手配犯。その志に偽りはない、多分。[/i][-][/c]"
2396972796 = "他のすべての味方のHPを回復し、他のすべての味方のEXスキルの威力が[c]3[/c]増加する。その後、自身は退却する。\n\n\n[c][75b4c0][i]楽しい余暇を謳歌している。意外と普段は真面目な優等生。[/i][-][/c]"
2332449769 = "[c][75b4c0][i]中には何もない。[/i][-][/c]"
359109910 = "[c]自分のフェーズ開始時：[/c][c]{char;848027}[/c]を除くすべての味方が退却した場合、自身も退却する。"
1129966233 = "自身にダメージを与える。その後、自身が失ったHP分のシールドを獲得する。\n\n\n[c][75b4c0][i]バカ。[/i][-][/c]"
