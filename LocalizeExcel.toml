1580334319 = "Alunas da Trinity visitam o campus da Millennium para ver a EXPO. Seia também estava prestes a participar da EXPO enquanto recebia as boas-vindas da C&C, mas... ela avista alunas suspeitas e acaba seguindo-as sem pensar."
1485885318 = "Seia entra na passagem subterrânea seguindo as alunas suspeitas. Ao tentar se aproximar para ouvir a conversa sem ser notada, ela acaba encontrando uma aluna inesperada..."
3524856260 = "Seia e Neru seguem para o esconderijo de Rio. Após receber uma explicação da situação, Seia descobre a existência de uma conspiração agindo nos bastidores da EXPO. Enquanto Neru e Rio dizem que protegerão Seia como uma convidada, Seia faz uma proposta em troca de fornecer informações."
3055035619 = "Tendo ganhado Seia como uma nova força de combate, Rio parte para uma investigação mais ativa."
1087244281 = "Seguindo as instruções de Rio, Seia vai investigar o campus. Para encontrar pistas em uma \"Millennium onde só existem lugares preocupantes\", ela se dirige à sala de aula onde as alunas se reúnem."
3603561 = "Ao encontrar o grupo do Clube de Doces do Pós-Escola na sala de aula, Seia ouve sobre um \"animal de estimação robô\". Interessada pelo som peculiar, Seia decide ajudar na busca."
3962754328 = "O animal de estimação robô era, na verdade, um \"jacaré robô\". Para uma Seia confusa, Karin e Asuna dizem que \"isso é rotina na Millennium\". Ao ouvir que o jacaré robô era uma criação do Clube de Engenharia, Seia segue para o laboratório delas."
1344822250 = "Após conter o surto do Avant-Garde-kun, Yuuka interroga o Clube de Engenharia ao chegar ao local. Enquanto o Clube de Engenharia clama por sua inocência, Seia descobre um chip suspeito dentro do Avant-Garde-kun danificado."
2239397365 = "Ao receber o chip suspeito, Rio percebe uma certa <intenção> por trás dele. Por outro lado, enquanto conversa com Rio, Seia nota uma pequena mudança nela."
1398523524 = "Enquanto Neru se prepara para se infiltrar no centro de dados, Rio lhe entrega um USB de operação e uma chave de segurança."
1813766078 = "Neru se infiltra no centro de dados e chega ao destino com sucesso, mas enfrenta um novo problema. Nesse momento, uma voz familiar surge de algum lugar..."
1717919827 = "Rio compreende a situação com as informações obtidas no centro de dados. Fica claro que o incidente é de uma escala maior do que os três imaginavam, e Rio finalmente planeja uma operação de ataque surpresa ao local do crime."
2988794607 = "Rio compreende os sentimentos de Seia e investiga rapidamente o fluxo de dados. Seia percebe essa consideração dela e, para ser útil, dirige-se ao Clube de Desenvolvimento de Jogos."
58980428 = "Ao chegar ao Clube de Desenvolvimento de Jogos, Seia encontra Alice e Yuzu. Alice chama Seia de <Rei dos Ladrões> e a convida para o estande de exibição do Clube de Desenvolvimento de Jogos."
3905697355 = "No estande do Clube de Desenvolvimento de Jogos, estava exposto o jogo que todos fizeram com tanto esforço. No entanto, por algum motivo, aqueles que o jogaram sentiram uma onda de raiva, caindo em um grande caos."
1699322212 = "Como resultado da investigação de Rio sobre o chip que arruinou o jogo, confirma-se que, assim como no caso do Clube de Engenharia, o incidente foi causado por sabotagem de alguém. ...Deixando isso de lado, Rio evita mencionar a dificuldade e a qualidade originais do jogo."
1906942469 = "Para o ataque surpresa ao local, Neru foi ao centro de fitness. Quando parecia que o incidente ainda não tinha ocorrido, a esteira em que Hasumi estava começou a funcionar mal. Neru descobriu uma aluna que parecia ser a culpada e a perseguiu."
2940778481 = "Neru encurrala as alunas suspeitas e consegue contê-las. Nesse momento, ela recebe um contato de alguém que parece ser o mentor, e uma bomba é ativada. Aproveitando a distração da explosão, Neru deixa as alunas capturadas escaparem."
2077988676 = "Após o fracasso da operação de ataque surpresa, Rio decide que não há outra escolha a não ser encontrá-los diretamente. Como um trunfo, Rio menciona o \"Algoritmo Big Sister\", que ela mantinha em segredo até então."
4128574415 = "Para usar o \"Algoritmo Big Sister\", Rio tenta ir sozinha ao centro de dados. Seia e Neru decidem participar da operação, dizendo que não podem deixar que ela carregue a responsabilidade sozinha."
559738736 = "O grupo chega à Sala da Big Sister. Mas essa ação já havia sido prevista por Mirai, que planejava roubar o \"Algoritmo Big Sister\". Enquanto Rio e Seia ficam abaladas, por algum motivo, apenas Neru permanece calma diante das ameaças de Mirai..."
3964034247 = "Com a cooperação do Sensei, o grupo supera a maior crise. Mirai e seu grupo, embora frustrados, acabam sendo todos presos."
2454044807 = "Ao ver o incidente resolvido, Seia e Neru sentem-se tristes ao ver Rio tentar partir sem nem mesmo tentar aproveitar a EXPO. Então, Seia usa sua perspicácia e faz uma proposta a Rio."
4226564748 = "Rio elabora um plano para recuperar \"exposições perigosas\" espalhadas pela EXPO. Seia, recebendo equipamentos de ponta dela, inicia novamente uma missão de infiltração."
3409180479 = "Rio identifica que há remanescentes do grupo de Mirai dentro do local da EXPO. Neru captura o grupo que tentava roubar as obras expostas."
3753568740 = "Intrusos foram confirmados no estande de exibição. Como medida contra o fato de que a segurança foi reforçada \"por algum motivo\" ultimamente, Rio pede que Neru e Seia investiguem juntas."
2190721227 = "Devido ao mau funcionamento dos drones de segurança da EXPO, surge a preocupação com danos aos visitantes na manhã seguinte. Para executar a operação de supressão de drones criada por Rio, Seia e Neru se infiltram no local."
1147821016 = "\"Quero que você aproveite a EXPO\"... Seguindo as palavras do Sensei, Seia decide dar uma volta pelo local. No entanto, uma crise inimaginável aguarda por ela enquanto visita a EXPO como uma espectadora...!"
2551732620 = "Como medida contra os infiltrados dia após dia, o Seminar armou armadilhas dentro do local. Encurraladas, Seia e Neru tentam escapar unindo forças."
4087116818 = "O último dia da EXPO. Seia se despede de todos e passa um momento de despedida harmonioso. Era para ser assim, mas... com o surgimento do \"animal de estimação robô\" que elas não tinham conseguido capturar, uma nova confusão começa."
