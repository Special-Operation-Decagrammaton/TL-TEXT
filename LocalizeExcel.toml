2324938743 = "Lámen e conspiração"
1935028633 = "Os membros do Clube de Estudos Ninja visitam uma loja de lámen para gravar o novo filme de 'Shoujo Ninpouchou Michirucchi'. No entanto, o Clube do Lámen começa a se alvoraçar – eles controlam a situação com ninjutsu, mas a câmera quebra."
2416051084 = "Um pedido irrecusável"
1084482783 = "Niya, que testemunhou tudo na loja de lámen, propõe ao Clube de Estudos Ninja que empreste permanentemente uma câmera do Departamento de Yin-Yang em troca de uma missão de segurança para a Shine Cat."
2411384567 = "Condições da tarefa"
3522964417 = "O Clube de Estudos Ninja aceita a segurança da Shine Cat. Como o local tem código de vestimenta, eles se trocam. No entanto, apenas o vestido de Tsukuyo não serve e rasga."
3044990082 = "Encontro com o talento"
2282332248 = "O vestido de Tsukuyo não fica pronto, e ela fica de guarda do lado de fora. A Shine Cat a recruta como modelo. Quando o show está prestes a começar, todos os vestidos são roubados."
223828603 = "Ninja e ladrão (1)"
4177221936 = "O Clube de Estudos Ninja encontra a Gangue do Capacete Dadaísta que roubou os vestidos e luta para recuperá-los."
3336899706 = "Ninja e ladrão (2)"
1265568828 = "O grupo recupera os vestidos. No entanto, uma pessoa desconhecida está caída no chão."
4091465997 = "Quando as flores desabrocham"
1571624855 = "A pessoa caída era a modelo do desfile de moda. Como ela é levada ao hospital, Tsukuyo é escolhida para ser sua substituta."
605112193 = "Fama crescente"
2465034065 = "Tsukuyo começa a se dedicar seriamente às atividades de modelo após o desfile da Shine Cat. Ela posa para várias revistas, dá entrevistas, e quase não tem folga. Em meio aos dias em que não pode ir ao clube, alguém a visita."
733701337 = "Vazio desconhecido"
1878096311 = "Sabendo por Niya que Tsukuyo está se dedicando a ser modelo, Michiru e Izuna ficam irritadas por ela não responder ao Momotalk nem atender o telefone. Michiru contata a empresária, mas é barrada."
3454885913 = "Cada um em seu lugar"
2309341144 = "A ausência de Tsukuyo lança uma grande sombra sobre o Clube de Estudos Ninja. O vazio se expande, e até o comportamento de Michiru fica estranho."
1689830066 = "Coincidência intencional"
2017422041 = "Para animar a abatida Michiru, Izuna consulta o Sensei e Niya. Assim, o Clube de Estudos Ninja aceita a missão de segurança do 'Desfile de Moda de Ano Novo de Hyakkiyako' em que Tsukuyo participará."
2424681935 = "Cortina do show"
1617347149 = "Logo após o início do 'Desfile de Moda de Ano Novo de Hyakkiyako', Tsukuyo, que estava andando na passarela, de repente começa a correr. Lá está a mulher que deveria ser a protagonista do show em que Tsukuyo atuou como substituta. O Clube de Estudos Ninja enfrenta a mulher, que trouxe uma bomba para arruinar o show."
3366047042 = "De volta ao lugar original"
3863137044 = "Após tudo terminar, a Shine Cat sorri para Tsukuyo, dizendo que ela mesma deve decidir seu caminho, e lhe dá de presente o vestido que rasgou no show, já consertado. Assim, Tsukuyo volta ao Clube de Estudos Ninja."
2291967865 = "Batalha pela conquista do Continente de Aço"
140464825 = "Finalmente chegou a hora de iniciar a conquista do continente de aço. O Sensei, Ain, Sof, Oul – e os profetas de Decagrammaton. Seus pensamentos se chocam."
