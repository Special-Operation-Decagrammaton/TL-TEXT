986938597 = "O retorno da Revolução de Ivan Kupala"
1392178341 = "A grande presidente do conselho estudantil"
4118873191 = "O Sensei [USERNAME] foi chamado por Cherino, a presidente do conselho estudantil da Academia Federal Red Winter. O objetivo era usar o Schale para transmitir o estado do próximo Festival do Solstício, 'Ivan Kupala', para todas as academias e espalhar a grandeza de Red Winter por todo o Kivotos."
2981702230 = "O Festival do Solstício tingido pela purga"
1934906729 = "Enquanto inspecionam o local de preparação do festival, Cherino e seu grupo purgam as alunas problemáticas (?). Nos bastidores, 'Marina', a chefe do comitê de segurança da secretaria de Red Winter, quebra acidentalmente a estátua de Cherino e decide organizar um golpe de estado para encobrir o erro."
3526237825 = "O golpe de estado no início da tarde"
324633654 = "Cherino acorda de sua soneca ao ouvir um barulho alto vindo de fora. Ao ser informada de que Marina organizou um golpe, o grupo decide se esconder temporariamente no 'prédio antigo' localizado nos arredores da Academia Federal Red Winter."
4001712064 = "A face oculta do prédio antigo, a Classe Especial 227"
2746710944 = "Fugindo do golpe, Cherino e seu grupo chegam ao 'prédio antigo'. Lá, eles encontram as alunas da 'Classe Especial 227', que Cherino havia purgado anteriormente. Cherino acaba discutindo com Nodoka, uma das integrantes, e, por sugestão de Shigure, também da Classe Especial 227, decidem resolver o conflito com uma 'competição de bebida'."
2840864445 = "A primeira vitória"
433944428 = "Cherino consegue uma vitória apertada. Nodoka e as outras prometem cooperar com Cherino para poderem retornar ao prédio principal da escola."
4281580888 = "Isso é perfeito para uma soneca"
7979442044 = "Satisfeita e com sono, Cherino decide tirar uma soneca. O grupo vai até a biblioteca da Academia Federal Red Winter. No entanto, ao tentar usar um livro como travesseiro, ela é impedida por Momiji, a bibliotecária da 'Frente de Libertação do Conhecimento', o que leva a um confronto."
4124993500 = "A segunda vitória"
1971393431 = "Embora tenha vencido a batalha, Cherino interrompe sua soneca porque já tinha acordado. Ela pede a colaboração de Momiji e das outras para retomar a secretaria. Ao ouvir a promessa de Cherino de que 'se colaborarem, poderão ver todos os livros da grande biblioteca de Trinity', Momiji aceita a proposta imediatamente."
252950650 = "Pudim para os trabalhadores!"
365643949 = "A Academia Federal Red Winter estava em clima de festival, mas Cherino, que agora não tinha autoridade alguma, parecia insatisfeita. Nesse momento, Cherino é subitamente capturada pelo 'Departamento de Engenharia' e amarrada a uma pilha de lenha."
3840713209 = "A terceira vitória"
3349557109 = "Tomoe e o Sensei [USERNAME] conseguem resgatar Cherino e contam que a atual presidente do conselho estudantil não é Cherino, mas Marina. Ao ouvir isso, o Departamento de Engenharia muda de lado imediatamente e parte para a secretaria de Red Winter para cobrar explicações da nova líder."
3439678836 = "De volta à secretaria"
340629748 = "Após o sucesso do golpe, Marina estava desfrutando da doçura do poder. No entanto, ao ser informada por um membro da guarda pessoal que Cherino estava vindo em sua direção com várias alunas, ela entra em confusão, mas acaba entrando em combate."
950061340 = "O retorno da Revolução de Ivan Kupala"
1717155722 = "Após vencer a batalha e retomar o cargo de presidente, Cherino purga Marina e as outras. No entanto, no dia do Ivan Kupala, as alunas que ajudaram Cherino se rebelam novamente exigindo que ela 'cumpra a promessa', e Cherino é destituída mais uma vez."
4106251530 = "Lista de desejos do céu de verão"
2948234550 = "Devido a várias circunstâncias, alunas de Trinity acabam indo para o mar com um grupo inusitado. Com o objetivo de completar todos os itens da lista, elas correm pela praia!"
4142176367 = "O mar de verão e as garotas"
