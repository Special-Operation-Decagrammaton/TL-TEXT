3848043030 = "Fortalecimento de Aluna 2 (Shunzinha)"
3849055276 = "Kiki e Shunzinha entraram numa operação secreta pra invadir a Gangue dos Passarinhos e conseguir informações. Após superarem a medonha provação de ingresso, elas foram acolhidas como aliadas. Mas ao brincar com as meninas, as espiãs interceptaram o plano maligno delas: a gangue pretendia lançar um ataque contra a rua de comércio no dia seguinte."
