# +++ +++ +++ Resumos dos episódios e seus títulos: +++ +++ +++
# --- --- --- Capitulo 1: --- --- ---
237598723 = "O Começo da Aventura"# Episódio 1 e seu resumo abaixo:
1029808550 = "Após receber uma carta estranha, o Sensei [USERNAME] visita o Clube de Desenvolvimento de Jogos do Colégio de Ciências Millennium. Lá, ele conhece as gêmeas Midori e Momoi, alunas que desenvolviam jogos."

3338381113 = "A Tesoureira da Seminar, Yuuka"# Episódio 2 e seu resumo abaixo:
4264874819 = "Yuuka, a tesoureira da Seminar, anuncia a dissolução do Clube de Desenvolvimento de Jogos, alegando que os resultados do clube deixam a desejar. Em busca de uma carta na manga para virar esse jogo, Midori e Momoi rumam para as \"Ruínas\" junto do Sensei [USERNAME]."

3931386898 = "Rumo às Ruínas"# Episódio 3 e seu resumo abaixo:
4072922310 = "Midori e Momoi procuram a \"G.Bible\", a bíblia que conteria o método secreto para criar o melhor jogo do mundo e que se diz estar nas Ruínas. No caminho, porém, são perseguidas por robôs que partem para o ataque e acabam se refugiando numa fábrica abandonada e desativada."

3321101212 = "Naquele Dia, Nós Conhecemos uma Garota"# Episódio 4 e seu resumo abaixo:
2114828100 = "Na fábrica abandonada, o grupo do Clube de Desenvolvimento de Jogos e do Sensei [USERNAME] encontra Aris, uma garota-robô de aparência humana. Para manter o clube de pé, Momoi leva Aris até a sala do clube e tenta incluí-la como membro."

707980707 = "Eu Sou a Aris"# Episódio 5 e seu resumo abaixo:
3869084317 = "Aris joga o jogo anterior do Clube de Desenvolvimento de Jogos, o \"Tales Saga Chronicle\", parecendo se divertir (?). Diante dessa reação dela, todo o Clube de Desenvolvimento de Jogos — incluindo a presidente, Yuzu — acaba se emocionando sem querer."

2096151113 = "Um Jeito de Aprender a Falar"# Episódio 6 e seu resumo abaixo:
910040027 = "Depois de virar a noite jogando os jogos que os membros do clube recomendaram, Aris passa, aos poucos, a falar de um jeito mais humano. Momoi vai entregando a Aris várias coisas necessárias para ela se passar por aluna da Millennium, como a carteirinha estudantil."

3197846671 = "Grande Demais para ser uma Arma de Fogo"# Episódio 7:1 e seu resumo abaixo:
6265887 = "As alunas do Clube de Desenvolvimento de Jogos visitam o \"Clube de Engenharia\" do Colégio de Ciências Millennium para conseguir uma arma para Aris. Quando Aris demonstra querer o railgun para encouraçado espacial que estava lá — também chamado de \"Espada de Luz: Supernova\" —, o Clube de Engenharia inicia um combate para testar as capacidades dela."

2828361379 = "Grande Demais para ser uma Arma de Fogo"# Episódio 7:2 e seu resumo abaixo:
295717469 = "Aris domina o railgun mesmo sendo a primeira vez que o empunha e vence o Clube de Engenharia. Ao ver aquilo, Utaha, a presidente do Clube de Engenharia, fica intrigada com a capacidade física absurdamente superior de Aris."

252928965 = "A Avaliação de Qualificação"# Episódio 8 e seu resumo abaixo:
222860507 = "Antes de Yuuka visitar o Clube de Desenvolvimento de Jogos para a avaliação de qualificação do novo membro, Aris resolve treinar a apresentação pessoal junto de Midori e Momoi."

3447447898 = "As Perguntas de Yuuka"# Episódio 9 e seu resumo abaixo:
2666100393 = "Depois de algumas perguntas, Yuuka reconhece Aris como membro oficial — mas a continuidade do clube só está garantida até o fim deste semestre. Ela avisa que, se daqui pra frente o clube não fizer jogos decentes e não apresentar resultados, o Clube de Desenvolvimento de Jogos terá mesmo que ser dissolvido. Em busca da \"G.Bible\", todo o clube parte de novo para as Ruínas."

980942246 = "De Novo, Rumo às Ruínas"# Episódio 10 e seu resumo abaixo:
2685240113 = "Diferente da última vez, agora — também graças à força de Aris — o Clube de Desenvolvimento de Jogos despacha os robôs das Ruínas com facilidade enquanto avança rumo ao destino."

771027366 = "O Que Havia Lá"# Episódio 11 e seu resumo abaixo:
2820527577 = "O Clube de Desenvolvimento de Jogos chega à fábrica das Ruínas, o destino. Ali, como que guiada por um poder misterioso dentro de si, Aris localiza o computador onde a \"G.Bible\" está guardada, e o grupo consegue baixar esses dados para um console."

2728548615 = "Em Busca do \"Espelho\""# Episódio 12 e seu resumo abaixo:
3103417958 = "O Clube de Desenvolvimento de Jogos procura a \"Veritas\" para que decifrem a senha necessária para abrir a \"G.Bible\", mas Maki responde que, para isso, é preciso a ferramenta de hacking \"Espelho\", que foi confiscada pelo Conselho Estudantil. Para recuperar o \"Espelho\", o grupo decide ir até o depósito de apreensões do Conselho Estudantil, guardado pelo Clube das Maids."

2899726708 = "Nerds VS Maids"# Episódio 13:1 e seu resumo abaixo:
317160579 = "Enquanto Aris e os membros da Veritas executam o plano de distração, Midori e Momoi, junto do Sensei, seguem rumo à Seminar e tentam o arrombamento frontal."

413920948 = "Nerds VS Maids"# Episódio 13:2 e seu resumo abaixo:
3365649643 = "Por meio do hacking da Veritas, Akane acaba trancada num cômodo isolado."

2494926665 = "Maids VS Meisters"# Episódio 14 e seu resumo abaixo:
14296212 = "Com a ajuda de Utaha, presidente do Clube de Engenharia, o Clube de Desenvolvimento de Jogos consegue despistar Karin, a franco-atiradora do Clube das Maids. Mas, diante do grupo, surge outra membro do Clube das Maids: Asuna."

2780791509 = "A Ameaça à Espreita"# Episódio 15 e seu resumo abaixo:
3362919123 = "Como demorou demais, Akane e Karin são liberadas, e o Clube de Desenvolvimento de Jogos cai de novo em apuros. No momento mais desesperador, Aris aparece por um triz e tira todos da enrascada, e o grupo consegue se infiltrar no depósito de apreensões do Conselho Estudantil."

4228188430 = "Falta Só Mais um Passo!"# Episódio 16 e seu resumo abaixo:
1685329725 = "O Clube de Desenvolvimento de Jogos consegue pegar o \"Espelho\" em segurança, mas, no depósito de apreensões, acaba dando de cara com Neru, a presidente do Clube das Maids. Com a esperteza de Yuzu, porém, eles conseguem enganar Neru, e o Clube de Desenvolvimento de Jogos retorna são e salvo para a sala do clube."

2238903513 = "A Batalha Sem Fim"# Episódio 17 e seu resumo abaixo:
1829805873 = "Depois da batalha, Akane se desculpa com Neru por não ter cumprido o pedido, mas, mais do que isso, Neru demonstra interesse em Aris, que lutou de igual para igual com o Clube das Maids. Enquanto isso, de volta à sala do clube, o Clube de Desenvolvimento de Jogos usa o \"Espelho\" e, enfim, começa a analisar a \"G.Bible\"."

1086770631 = "G.Bible"# Episódio 18 e seu resumo abaixo:
2087231337 = "Ao contrário do que esperavam, dentro da \"G.Bible\" havia apenas uma frase: \"Ame os jogos\". Abatidos, os integrantes do Clube de Desenvolvimento de Jogos recuperam o ânimo graças às palavras de Aris e começam a desenvolver o \"Tales Saga Chronicle 2\"."

376917210 = "Double-O"# Episódio 19:1 e seu resumo abaixo:
2914628993 = "Bem em cima do prazo, o Clube de Desenvolvimento de Jogos termina o desenvolvimento do \"Tales Saga Chronicle 2\". Logo depois de subir o jogo, disparos de arma ecoam pela sala do clube."

178004961 = "Double-O"# Episódio 19:2 e seu resumo abaixo:
1644909910 = "A origem dos disparos era Neru, a presidente do Clube das Maids. Dizendo que ficou interessada desde a batalha anterior, Neru desafia Aris para um confronto, mas, depois de um tempo de briga generalizada, vai embora com ar de satisfeita."

3999000705 = "Prêmio Millennium"# Episódio 20 e seu resumo abaixo:
1100406605 = "No \"Prêmio Millennium\", que seleciona as melhores invenções do Colégio de Ciências Millennium, o \"Tales Saga Chronicle 2\" do Clube de Desenvolvimento de Jogos recebe o Prêmio Especial. Enquanto todos comemoram o cancelamento da dissolução do clube, o console em que a \"G.Bible\" foi instalada começa a se mexer sozinho……"

# --- --- --- Capitulo 2: --- --- ---
854019333 = "A Reunião Secreta"# Episódio 1 e seu resumo abaixo:
350519276 = "Tarde da noite, Himari visita Rio, a presidente do Conselho Estudantil da Millennium. As duas conversam sobre como o incidente que ocorreu entre o Clube de Desenvolvimento de Jogos e o C&C havia sido armado por elas para revelar a verdadeira identidade de Aris, e sobre a conclusão a que chegaram a partir disso. Embora a interpretação fosse a mesma, a diferença de percepção de cada uma quanto a Aris rompe a aliança, e Rio volta a sua bela lâmina contra Himari."

2171223093 = "O Dia a Dia Comum do Clube de Desenvolvimento de Jogos"# Episódio 2 e seu resumo abaixo:
950515874 = "Visitando a sala do clube depois de um bom tempo, o Sensei trava partidas de jogo de luta com os membros para tirar ideias do próximo jogo. Terminada a rodada, enquanto o grupo discutia ideias, chega a notícia de que Yuzu emendou 10 vitórias seguidas no modo online. Animada com aquilo, Aris entra no online, mas acaba caindo contra um trapaceiro —— e é graças ao desempenho de Yuzu que tudo se resolve. E assim, segue o dia a dia tranquilo do Clube de Desenvolvimento de Jogos."

258618862 = "～Aris Começa a Sua Aventura!～"# Episódio 3 e seu resumo abaixo:
1634979540 = "O Clube de Desenvolvimento de Jogos continua a tirar ideias para o jogo novo. Mas as opiniões de Momoi e Midori chegam a um impasse —— e as duas acabam decidindo travar o duelo tradicional do clube. Enquanto isso, Yuzu dá a Aris a quest de aventurar pelo campus junto do Sensei."

1695437540 = "～Aris e Aqueles que São Guiados～ (1)"# Episódio 4 e seu resumo abaixo:
3535563597 = "Ao começar a explorar o campus, Aris e o Sensei encontram Sumire, que corria pela escola, e trocam uma conversa animada. Pelo que dizem, Aris, que vive aventurando pelo campus, e Sumire, que faz corrida, são companheiras de exercício. E assim, a aventura de Aris e do Sensei segue rumo aos arredores da Millennium —— ali, ao encontrarem Asuna e Karin, as duas ouvem que Neru está procurando Aris e mudam de lugar às pressas."

4226009798 = "～Aris e Aqueles que São Guiados～ (2)"# Episódio 5 e seu resumo abaixo:
331927291 = "Recebendo novas quests de alunas da Millennium, conversando com o Clube de Engenharia sobre a \"Espada de Luz\". Enquanto a aventura segue tranquila assim, de repente Neru surge na frente delas. Dizendo ter um assunto importante, Neru agarra Aris e começa a jogar luta com ela num fliperama —— pelo que se ouve, as duas são do tipo que de vez em quando joga junto. Antes apontavam armas uma para a outra, mas, agora, Aris sorri dizendo que elas são companheiras."

3180610485 = "A Máquina Misteriosa (1)"# Episódio 6 e seu resumo abaixo:
249138221 = "Certo dia, o Sensei recebe da Veritas a notícia de que uma máquina suspeita foi encontrada. A caminho da sala da Veritas, ele se junta ao Clube de Desenvolvimento de Jogos para, juntos, investigarem o que é a tal máquina. Mas, enquanto o grupo se debruça sem descobrir a identidade da máquina, de repente Aris, como que atraída por ela, encosta a mão. E assim, no mesmo instante em que a máquina se liga, algo de estranho acontece com Aris——"

2273243370 = "A Máquina Misteriosa (2)"# Episódio 7 e seu resumo abaixo:
3057433435 = "Transtornada, sem ouvir as vozes ao redor, Aris destrói a sala do clube e aponta a arma para todos os presentes. No momento em que ninguém conseguia detê-la, o C&C surge, desacorda Aris e destrói a máquina —— mas o alívio dura pouco: Midori solta um grito de dor. Ali estava Momoi, caída e imóvel."

888978219 = "O Cotidiano Despedaçado"# Episódio 8 e seu resumo abaixo:
1905976681 = "Cuidando de Momoi, que não acordava desde aquele dia, o Sensei recebe um contato de Midori e vai visitar Aris, que se trancou no Clube de Desenvolvimento de Jogos. Sem que as palavras do Sensei a alcancem, Aris se culpa profundamente por ter ferido Momoi. Nesse momento, uma certa pessoa chega à sala do clube dizendo ter vindo ensinar a \"verdade\"——"

2526248209 = "A Verdade Cruel (1)"# Episódio 9 e seu resumo abaixo:
342541954 = "Quem chegou à sala do clube era a própria Rio, presidente do Conselho Estudantil da Millennium. Ela revela que a verdadeira identidade de Aris é a \"Princesa dos Deuses Sem Nome\" e, traduzindo em termos de jogo, afirma que ela é uma existência como a do \"Rei Demônio\". Diante do grupo confuso, ela fala friamente sobre o futuro de destruição que Aris traz e diz que, destruindo o Halo dela, tudo se resolve. Mas, como ninguém engoliria algo assim —— diante do grupo revoltado, surge a quinta integrante do C&C."

4280260261 = "A Verdade Cruel (2)"# Episódio 10 e seu resumo abaixo:
2268486821 = "Neru derrota os AMAS e trava uma perseguição contra Toki. Mas, por um ataque-surpresa de Toki, Neru tem o corpo imobilizado. Enquanto isso, Midori e Yuzu também não conseguem reagir bem à situação repentina —— e assim, a \"Espada de Luz\", prova do herói, é destruída. Convencida de que tudo aconteceu por culpa dela, Aris decide ir com Rio e desaparece diante de todos."

2301390180 = "Isso Pouco Importa Agora!"# Episódio 11 e seu resumo abaixo:
3091811119 = "Com Aris levada embora e o grupo sem saber o que fazer, Momoi, que recobrou a consciência, aparece. Ao ouvir o que houve, Momoi declara que não aceita se despedir de Aris assim e que vai trazê-la de volta, e todos firmam a determinação de resgatar Aris."

1928599175 = "Reunião de Estratégia"# Episódio 12 e seu resumo abaixo:
3537725688 = "O grupo inicia a reunião de estratégia para trazer Aris de volta. Imaginando que a Seminar talvez saiba para onde Rio foi, pedem ajuda a Yuuka e Noa. Ali, descobrem a \"Cidade-Fortaleza Eridu\", que Rio construía em segredo. E assim, o grupo monta um plano de infiltração na cidade-fortaleza."

2759004737 = "Irmã Mais Velha (1)"# Episódio 13:1 e seu resumo abaixo:
4182520481 = "Himari está mantida presa em Eridu por Rio. Rio, que quer destruir o Halo de Aris em nome de uma causa maior, e Himari, que sustenta que isso não passa de homicídio. A discussão das duas continua num impasse —— enquanto isso, o Clube de Desenvolvimento de Jogos e o Clube de Engenharia, que se infiltraram em Eridu para resgatar Aris, têm o caminho bloqueado por um drone misterioso."

37376914 = "Irmã Mais Velha (2)"# Episódio 13:2 e seu resumo abaixo:
2462813750 = "Conforme o plano combinado, o C&C ia destruindo os drones. Quem barra o avanço imparável do grupo é a quinta integrante do C&C: Toki."

229839680 = "Cidade-Fortaleza Eridu"# Episódio 14 e seu resumo abaixo:
918387984 = "Percebendo que Neru não está no grupo, Toki afirma que aquele plano está correto e tem chance de vitória. Mas, diante de todos, Neru chega atrasada e começa a combater Toki —— enquanto isso, o Clube de Desenvolvimento de Jogos e o Clube de Engenharia rumam para o centro de Eridu por outra rota."

235382079 = "A Armadilha (1)"# Episódio 15:1 e seu resumo abaixo:
1349201345 = "O C&C consegue encurralar Toki num ataque de pinça. Avaliando que é difícil enfrentar uma ação tão sincronizada, Toki altera o terreno de Eridu para isolar o C&C. Enquanto isso, diante do grupo do Clube de Desenvolvimento de Jogos, que avançava tranquilo, surge a arma criada por Rio: o Avant-Garde."

4284078290 = "A Armadilha (2)"# Episódio 15:2 e seu resumo abaixo:
1075771830 = "Diante de Rio — que diz já ter previsto que o C&C e o Sensei agiriam separados — e do Avant-Garde, o grupo fica sem ter o que fazer. E assim, o Avant-Garde ergue o golpe final."

1472787878 = "Xeque-Mate"# Episódio 16 e seu resumo abaixo:
1932470324 = "No instante em que Rio, transmitindo a Himari a luta contra o grupo, ia declarar vitória —— Eimi surge com um estrondo de explosão. Enquanto isso, a Veritas, que tinha tido sua linha de comunicação hackeada e ficado sem poder dar suporte, consegue, por meio do \"Espelho\" deixado por Himari, paralisar os movimentos do Avant-Garde."

2949478604 = "O Trampolim da Reviravolta (1)"# Episódio 17:1 e seu resumo abaixo:
2087519716 = "Com a ajuda de Sumire, Chihiro garante o \"Espelho\" que estava no depósito de apreensões e consegue assumir o controle da rede de Eridu. Aproveitando a brecha enquanto os movimentos do Avant-Garde estão lentos, o grupo do Clube de Desenvolvimento de Jogos parte para o contra-ataque."

2570893963 = "O Trampolim da Reviravolta (2)"# Episódio 17:2 e seu resumo abaixo:
4071798167 = "O grupo consegue derrotar o Avant-Garde graças a uma invenção do Clube de Engenharia. Mas, como contrapartida, o Clube de Engenharia acaba saindo de cena. Levando consigo o incentivo do Clube de Engenharia, agora caído, o Clube de Desenvolvimento de Jogos segue em frente."

2900133993 = "A Muralha Intransponível"# Episódio 18 e seu resumo abaixo:
1637045112 = "Levada ao duelo de um contra um, Neru, ainda assim, seguia combatendo sem perder para Toki. Ao ver Karin, Asuna e Akane, que se adaptaram à mudança de terreno, Toki recua temporariamente —— e assim, diante do grupo que se reencontrou em frente à torre central, Toki volta a barrar o caminho, agora trajando o traje de combate desenvolvido por Rio."

3331557940 = "Jogadora de Cheat"# Episódio 19 e seu resumo abaixo:
706464142 = "O poder do armamento de Toki, o \"Abi-Eshuh\", era assombroso. Seguindo a sugestão de Akane de que talvez houvesse chance num combate aéreo, Neru parte para a luta no ar, mas sofre ferimentos graves —— e o grupo é forçado a recuar carregando Neru."

859505773 = "Como Gamer, Como Amiga"# Episódio 20 e seu resumo abaixo:
3991456034 = "Com Neru caída, não deveria restar nenhum meio de enfrentar Toki. Enquanto o desespero tomava conta do peito de todos, Neru, que recobrou a consciência, se levanta. Enquanto o grupo debatia que ainda devia haver um jeito, Yuzu, que acompanhava a batalha, faz uma certa proposta."

1152423272 = "O Que Aquele Nome Revela."# Episódio 21 e seu resumo abaixo:
4250229177 = "Graças à proposta de Yuzu e Chihiro, o grupo consegue golpear o ponto fraco do \"Abi-Eshuh\". Virando o jogo no aperto, conquistam a vitória. Aquela batalha foi digna do nome de codinome Double-O, a mais forte da Millennium."

2879188167 = "Pavana para a Princesa (1)"# Episódio 22 e seu resumo abaixo:
3410221265 = "O grupo finalmente chega ao lugar onde Aris está presa. Quando falam com Aris, que ali dormia, ela responde que não é Aris, e sim a ＜Key＞. Então, a ＜Key＞ anuncia que vai ativar a \"Arca de Atrahasis\" —— e Rio, percebendo que o fim se aproxima por causa da cidade que ela mesma construiu, declara que vai detê-la sozinha."

324915488 = "Pavana para a Princesa (2)"# Episódio 23 e seu resumo abaixo:
1522532631 = "Graças a Yuuka e Noa, o grupo consegue ganhar tempo temporariamente e Himari lhes ensina um meio de trazer Aris de volta: entrar no mundo mental dela e dialogar. Decidindo isso sem hesitar, mesmo sabendo dos perigos, o grupo adentra o mundo mental de Aris."

2176908388 = "Aquilo que Quero Ser"# Episódio 24 e seu resumo abaixo:
1285561733 = "No mundo mental de Aris, o grupo enfim se reencontra com ela. Aris hesita em voltar, dizendo que, por ser o Rei Demônio, todos se machucam por culpa dela —— mas, impulsionada pelas palavras de todos, de que \"você mesma pode decidir o que quer ser\", ela decide se tornar a Heroína da Luz. Em seus olhos, já não havia nem hesitação nem aflição."

3880903334 = "Colégio de Ciências Millennium"# Episódio 25 e seu resumo abaixo:
544345914 = "E assim a situação chega ao fim —— Rio desaparece para assumir a responsabilidade, o C&C recebe uma nova integrante, o Clube de Desenvolvimento de Jogos toca a conversa sobre o próximo jogo como sempre —— e, daqui pra frente também, o cotidiano pacífico da Millennium segue em frente."

