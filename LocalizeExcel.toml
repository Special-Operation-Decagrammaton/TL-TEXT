2225204274 = "ウイは、人払いをされた密室に呼び出され、サクラコと対面する。"
2744900070 = "通りすがりの一般人A"
1729423655 = "シスターフッドが発見した遺跡の調査のために、造詣が深いウイの力を借りたいサクラコは、断ろうとするウイに対し、経典の複写をしたことを知っていると告げる。サクラコの言葉に動揺するウイは話を聞かず……仲裁に入ったハナコによって、遺跡の調査に行くことが決まるのだった。"
1096816524 = "水着ですよ♡"
3742480354 = "シスターフッドが発見したトリニティ近海の無人島を訪れた一行は、水着に着替えて調査を開始することに。"
3187959349 = "調査ポイントA「石造りの迷路」（１）"
617928650 = "本格的な調査を始めた一行。遺跡に残された石の模様などから、ここが聖徒会が使っていた場所であることが判明する。迷路のように複雑に入り組んだ遺跡の調査を進めていると、聖徒会のミメシスと出会い、戦闘になるのだった。"
811018523 = "調査ポイントA「石造りの迷路」（２）"
994270627 = "ミメシスを退けたものの、動けなくなってしまったコハルを背負った先生は、無事他のメンバーと合流するのだった。"
3219351181 = "調査ポイントB「地下遺跡」（１）"
2491485373 = "地下遺跡を調査する一行は、何人かに分かれてそれぞれ調査することに。ウイと共に調査を進める先生に対し、ウイは心の内を吐露する。その時、異音が響き渡り、2人の眼の前に聖徒会が姿を現すのだった。"
29917006 = "調査ポイントB「地下遺跡」（２）"
1927635005 = "聖徒会と戦いながら地下遺跡から抜け出した一行。次々と襲いかかってくる聖徒会を前に、ヒナタが発射したグレネードランチャーが地下遺跡を崩壊させてしまうのだった。"
3429673932 = "調査ポイントC「レモン農園」"
630214868 = "レモン農園を調査する最中、ハナコと合流した先生。どうして遺跡の調査に来たのかという問いかけに、ハナコは普段明かさない胸の内を告げるのだった。"
259971216 = "調査ポイントD「忘れ去られた灯台」（１）"
963289912 = "灯台の調査をすることになった一行。散らかっている部屋を片付けるべく、ヒナタと共に荷物を運び出していると、聖徒会が襲いかかってくる。調査の邪魔をしたくないヒナタは、先生と2人で迎撃することを決めるのだった。"
2305782904 = "調査ポイントD「忘れ去られた灯台」（２）"
904241480 = "なんとか聖徒会を倒すことに成功したヒナタの前に、音を聞きつけた一行がやってくる。特に何もなかったとごまかすヒナタの意図を汲んで、皆で灯台の調査に戻るのだった。"
942293947 = "レモンである理由"
3925545059 = "これまでの調査結果をまとめていたウイは、何故レモンをわざわざこの島で栽培していたのかと考え、地図にバーナーの火をあてる。あぶり出しで浮かび上がってきた新たな調査ポイントへと一行は向かうことを決意するのだった。"
3449666276 = "調査ポイントE「滝裏の洞窟」"
6041660 = "地図に示された新たな調査ポイントは滝の裏に隠された洞窟で……洞窟の奥で木箱を見つけた一行の前に、聖徒会が立ちはだかってくるのだった。"
1858743142 = "島に眠る秘密（１）"
479171161 = "聖徒会から命からがら逃げてきた一行。ウイが島の秘密と木箱の中身を話そうとした瞬間、ヒナタが地面に空いた穴から新しい箱を発見する。ヒナタが箱に手をのばすと同時に、おびただしい数の聖徒会が立ちはだかるのだった。"
2777555982 = "島に眠る秘密（２）"
3252455481 = "聖徒会を倒し、箱を守り抜いた一行。しかし、箱の中には何も入っていなかった。この島全体が聖徒会が訓練に使っていた島だった事、他の調査箇所での結果から総合して、この箱は聖徒会のタイムカプセルなのではないかという結論が出る。ウイは、一行にお願いを告げるのだった。"
368837813 = "心境の変化"
3409394003 = "ウイのお願いは、タイムカプセルの存在を公表せず、そこに地図やその他の遺物を一緒に入れてそのままにしておくことだった。ハナコと先生は、調査結果の一部をサクラコに伝え、遺跡の調査劇は幕を下ろした。事の顛末に協力した一行を前に、ウイは複雑な表情を見せながら、アイスアメリカーノを振る舞うのだった。"
2707730920 = "学漫同人物語～2人が求める最終回～"
422721858 = "発行部数の少ない幻の最終巻が存在するとされる名作漫画「ルナ」。その最終巻を巡って知識解放戦線のメルが立ち上がる。果たしてメルは無事に最終巻を見つけることができるのでしょうか？"
