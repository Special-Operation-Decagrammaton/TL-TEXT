824801969 = "Alguém roubou os livros contábeis da Família Carpaccio kkkk. Só pode ser funcionário, alguém traiu."

3734701780 = "Já escolheram a próxima 'comida'. O porto de Kanezaki não vai passar fome de caranguejo."

3934518050 = "Mas, pensando logicamente, um caranguejo que ataca gente teria que ser enorme. O caranguejo que a Família Carpaccio cria tem o tamanho de uma casa?"

