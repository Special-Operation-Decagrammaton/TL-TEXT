653632133 = "アロナは先生にもう一人のシロコ、そしてプレナパテスとの戦いについて説明する。"
743188901 = "プレナパテス決戦（２）"
1768446809 = "別時間軸のシロコが戦闘開始を告げるのだった。"
3559357232 = "プレナパテス決戦（３）"
175380778 = "シロコとプレナパテスを倒すことに成功した先生のもとに、アビドス対策委員会のメンバーが到着する。その姿を目にしたシロコは、咽び泣くのだった。"
671174902 = "プレナパテス決戦（３）"
1506582050 = "シロコ以外の全員が命を落としてしまった別の時間軸のアビドス高等学校。死を目前にしたシロコの眼前に色彩の光が降り注ぎ、無名の司祭たちが接触を図る。そんなシロコの前に、満身創痍の先生が現れる。無名の司祭の言葉に従って先生に手を下そうとするも、最後の引き金が引けない彼女の代わりに、色彩が先生に降り注ぎ――再び立ち上がったプレナパテスは箱舟の力を全て自身に集中させるのだった。"
2619612699 = "プレナパテス決戦（３）"
2390720928 = "プレナパテスに箱舟のエネルギーが集中し、今すぐ「自爆シーケンス」を起動しなければ全てが水泡に帰してしまう絶体絶命の状況下、「脱出シーケンス」を使って、各位は脱出し――リンとアヤネは先生のサポートのためにその場に残るのだった。"
520943432 = "プレナパテス決戦（４）"
949507711 = "リンとアヤネは、ウトナピシュティムの主砲の準備をし――主砲発射後、急いで全生徒を避難させるよう先生に伝えるのだった。"
3111223626 = "プレナパテス決戦（５）"
3111014573 = "無事プレナパテスを倒すことに成功した一同は、手遅れになる前に生徒を１人、また１人と地上に送り届けるのだった。"
2526989395 = "プレナパテス決戦（６）"
2908349328 = "最後に残されたシロコと先生、そしてプレナパテス――先生は、子供の苦しみは大人の責任なのだと笑う――そして、プレナパテスは、自分の生徒を頼むという言葉を残し、先生はこれに応えるのだった。"
299397497 = "復旧作業：D.U.シラトリ区"
3012757111 = "事態が収束しても、街並みはまだ元の姿を取り戻していません。復旧作業を進めて、キヴォトスを再建しましょう――！"
1414477413 = "復旧作業：D.U.シラトリ区"
4290341434 = "復旧作業：D.U.シラトリ区"
4223089116 = "アユムは、D.U.シラトリ区の復旧作業の手伝いを先生にお願いするのだった。"
2801215367 = "白亜の予告状～虚飾の館と美学の在り処～"
1887536367 = "ゲームセンターで「掃除」の依頼をされたモモイ。依頼人はモモイのことをC&Cのネルだと勘違いしてしまっており――そうと気づかずに受けてしまったモモイとゲーム開発部一同は、メイド服に着替えてC&Cになりきることに。果たして、一同は依頼を完遂する事ができるのでしょうか？"
1667151392 = "私は理解のあるメイドですから"
2521381729 = "スーパーモモイトルネード！"
1600936965 = "「お掃除」を始めましょう"
2871478550 = "時計の無い心臓"
1087686957 = "ご挨拶を申し上げます、ぴょん"
2312504772 = "晴れのち曇り、怪盗注意報（１）"
3937317585 = "晴れのち曇り、怪盗注意報（２）"
3178137179 = "まずは進んでみましょう"
2595670890 = "これは危険なゲームです（１）"
3973772140 = "これは危険なゲームです（２）"
2344802928 = "あくまで臨時ですから。肝に銘じてください"
3143319570 = "所有権の移転（１）"
846542461 = "所有権の移転（２）"
730349569 = "注目してください。大事な場面です（１）"
2014891151 = "注目してください。大事な場面です（２）"
671097288 = "ハッピーエンドは、いつまでも！"
3442837570 = "私は理解のあるメイドですから"
510833711 = "トキの元を訪れた先生は、メイド服を貸してほしいと頼み込む。先生の特殊な趣味で必要なのだと勘違いしたトキを前に、先生はゲーム開発部のために必要なのだと弁明するのだった。"
2289114652 = "スーパーモモイトルネード！"
4088623042 = "ゲームセンターで格ゲーの勝利に酔いしれるモモイの前に、依頼人が現れる。彼はモモイをネルと勘違いし、「掃除」の依頼をし――人違いとは言え、「掃除」ならば誰でもできるだろうと結論づけたモモイは、ゲーム開発部一同と共に依頼主の屋敷へと足を運ぶのだった。"
1237674640 = "「お掃除」を始めましょう"
1506195559 = "屋敷に到着した一行は、依頼主――銅田より「掃除」が警備任務である事を聞かされる。曰く、銅田の元に「慈愛の怪盗」からの予告状が届いたのだとか。一行は、依頼を断る機会を見つけられないまま、話が進んでいくのだった。"
84635995 = "時計の無い心臓"
4176362338 = "予告したものは必ず盗むと悪名高い「慈愛の怪盗」――七囚人の一人だという彼女からの予告状は、謎掛けでできていた。一同は、怪盗の予告した美術品が何なのか、謎解きに勤しむのだった。"
3651845091 = "ご挨拶を申し上げます、ぴょん"
3112171913 = "警備任務と同時に、本来のメイドとしての仕事も任されることになったゲーム開発部一同。慣れない作業を前にミスを連発してしまうが、潜入捜査にやってきていたトキによって助けられる。そうしてパーティーも落ち着いてきた頃、「慈愛の怪盗」が予告通りその姿を表すのだった。"
641300786 = "晴れのち曇り、怪盗注意報（１）"
346595300 = "トキと「慈愛の怪盗」は対峙し――戦いの火蓋が切って落とされる。"
1938916768 = "晴れのち曇り、怪盗注意報（２）"
2618230775 = "ゲーム開発部が加勢し、あと一歩で「慈愛の怪盗」を捕まえられそうな瞬間、流れ弾がミドリにあたり、足を踏み外してしまう。墜ちていくミドリを「慈愛の怪盗」は助け、行方を眩ました。彼女の行動に疑念を抱きつつも、一行は体勢を立て直すのだった。"
4214486051 = "まずは進んでみましょう"
2810244228 = "警備任務も２日目に差し掛かり、今度こそはと警戒態勢を強める一行。先生の元に、不思議な声が届き、ゲーム開発部一同は銅田に騙されているのだと伝えられる。そういえば２日目になってから銅田の姿を見ていないことを不審に思った一同は、もう一度予告状の謎を解き直すのだった。"
2608851286 = "これは危険なゲームです（１）"
1080193779 = "銅田の秘密のオークション会場を発見してしまったゲーム開発部一同。そこは盗品を扱う裏社会の社交場で――銅田はゲーム開発部一同に向けて、警備ロボットを差し向けるのだった。"
3706077377 = "これは危険なゲームです（２）"
2305043594 = "銅田を追い詰めるも、現れた増援に多勢に無勢となってしまったゲーム開発部一同。そんな彼女らの前に、思わぬ助けの手が差し伸べられる。それは予告状を出した「慈愛の怪盗」その人だった。同盟を提案する先生を前に、一同はまずは情報交換を始めるのだった。"
3468612492 = "あくまで臨時ですから。肝に銘じてください"
3726366994 = "ここから先はゲーム開発部は手を引いてほしいと告げるトキを前に、ゲーム開発部はトキも仲間だから一緒に最後まで依頼をやり遂げたいと伝える。意思が固いことを理解したトキは、「慈愛の怪盗」と臨時同盟を結ぶことを決め、本格的な計画を立て始めるのだった。"
2014548109 = "所有権の移転（１）"
3648276839 = "「慈愛の怪盗」の合図を皮切りに、ゲーム開発部とトキは作戦を始める。その目には僅かな信頼が宿っていた。"
2610667190 = "所有権の移転（２）"
1496006338 = "作戦通り、ゲーム開発部は「時計王の冠」を確保し、銅田の身柄を拘束する事に成功する。その瞬間――「慈愛の怪盗」は一行から王冠を奪い取るのだった。"
198039531 = "注目してください。大事な場面です（１）"
3349629814 = "「慈愛の怪盗」の裏切りに落胆の色を隠せない一同。彼女の美学のもとに破棄された同盟。苦い思いを抱えながら、時計王の冠を取り戻すべく、銃口を向けるのだった。"
701936984 = "注目してください。大事な場面です（２）"
2074113746 = "無事に時計王の冠を取り戻す事に成功した一同。しかし、「慈愛の怪盗」をあと一歩のところで逃してしまう。どさくさに紛れて逃げ出した銅田は、駆けつけた本物のC&Cによって確保され、一連の事件は幕を下ろしたのだった。"
3393474672 = "ハッピーエンドは、いつまでも！"
1914900203 = "C&Cと合流した一同は、ネルに怒られるのではないかと怯えていた。しかし、ネルは一同に「よくやった」と言葉をかけ、事件は本当の大団円を迎える。一方その頃――「慈愛の怪盗」ことアキラは、先生の言葉を一人ゆっくりと噛み締めるのだった。"
1780431255 = "龍武同舟～思い描くは、ひとつの未来～"
2035835876 = "伝統を重んじる玄龍門と、進化を尊ぶ玄武商会。\n相反する二つは、山海経の二大派閥として危ういパワーバランスの上に存在していた。\nそんな中、玄武商会にあらぬ疑いがかけられて――果たして一同は、この危機を乗り越えることができるのでしょうか？"
105833273 = "客人歓待"
3908032195 = "山海珍味"
1029944882 = "嚆矢濫觴（１）"
934950936 = "嚆矢濫觴（２）"
1102560672 = "鏃礪括羽"
921130191 = "舎虎逢狼（１）"
2600560302 = "舎虎逢狼（２）"
4193384880 = "挙一反三"
3035053537 = "虚心坦懐"
1299793663 = "快馬加鞭"
689011525 = "破邪顕正"
1637251735 = "改邪帰正"
2524793568 = "満漢全席"
1970524499 = "客人歓待"
2209149049 = "いつものようにシャーレの仕事をしていた先生の下に、玄武商会の会長、ルミから特別な招待が届き――先生は山海経に足を踏み入れるのだった。"
3176729408 = "山海珍味"
2719359088 = "ルミに玄武商会で手厚い手料理のもてなしを受ける先生。とても美味しい一品なのに、何故か店内には人が少なく、閑散としていた。事情を問うと、山海経の生徒会である玄龍門から、玄武商会があらぬ疑いをかけられてしまっているのだという。先生とルミ達は玄龍門に直談判しにいく事を決めるのだった。"
1555531508 = "嚆矢濫觴（１）"
3083141341 = "玄武商会をめぐる「萬年参論争」について話し合うべく玄龍門を訪れた先生。しかし、玄武商会のダンボールに入った萬年参を突きつけられ、途方に暮れてしまう。どうにか、嫌疑を晴らすべく、真犯人を探し始めた一同の前に玄龍門の構成員たちが立ちふさがるのだった。"
912183531 = "嚆矢濫觴（２）"
4285669364 = "玄龍門の構成員を追い払うことに成功した一同は、萬年参について詳しい人に話を聞くために歩みを進めるのだった。"
3704157144 = "鏃礪括羽"
3667868691 = "萬年参に関する情報を得るために錬丹術研究会のサヤを訪ねた一同。サヤは山海経の紛争に巻き込まれたくないと突っぱねるも、ルミの手料理に舌鼓を打ち、とある「独り言」をこぼすのだった。"
3320570305 = "舎虎逢狼（１）"
3177457099 = "サヤの「独り言」をもとに、崑崙山に到着した一同。そこには意外な先客がいたのだった。"
372117891 = "舎虎逢狼（２）"
3546938718 = "一同は玄龍門の執行部長であるミナとの戦いの後、何故彼女がここで待っていたのかを聞く。曰く、崑崙山でしか萬年参が採取できないことを知っていたミナは、証拠隠滅のために訪れるだろうと踏んでいたとのことだった。そうして彼女と話す内に、犯人の手がかりにたどり着くのだった。"
499336354 = "挙一反三"
1674497975 = "ついに萬年参流出事件の全貌に気づいた一同。それは、山海経でも治外法権の場所、梅花園の園児たちを運び屋にするという手段だった。梅花園で園児たちから話を聞いた先生は、この事件を解決するための方法を提案する。"
1613439579 = "虚心坦懐"
1595560658 = "事件を解決するべく「罠」を仕掛けるために動き出す一同。ルミは、心の内を先生に吐露し、前を向いて歩みを進めていく。その様子を一つの影が見守っていた。"
1896039253 = "快馬加鞭"
834551465 = "「罠」に引っかかった萬年参のブローカーは、玄龍門の下級幹部だった。ミナを陥れるための資金集めとして密輸に手を染め、玄武商会に濡れ衣を着せたのだと白状するブローカーを前に、一同は団結して武器を手にとる。ミナ、ルミ、レイジョ、サヤ――普段は相容れない組織に属する生徒の心が一つになった瞬間だった。"
3287427825 = "破邪顕正"
1843046059 = "萬年参のブローカーとの戦闘に勝利した一同。しかし、彼女たちもまた誰かの手先に過ぎず――その裏に、七囚人「五塵の獼猴」の気配を感じたサヤは、ブローカーを問い詰めるも、結局黒幕にたどり着くことはできなかった。無事、汚名を雪ぐことができた玄武商会は、ミナに謝罪を求めるのだった。"
977104468 = "改邪帰正"
3026969621 = "そうして――山海経を揺るがした萬年参流出事件は一件落着と相成った。キサキから正式な謝罪を受けた玄武商会は、宴席の料理を頼まれる事に。全てが解決したわけではないものの、他生徒の不安を払拭するためなら、と一同は笑顔でその依頼を引き受けるのだった。"
3857900118 = "満漢全席"
229515679 = "「雨降って地固まる」という言葉のように、玄武商会と玄龍門は「萬年参流出事件」で生まれた溝を埋めるように、華やかな宴げを楽しむのだった。"
40908383 = "夏の特殊作戦！RABBIT小隊と消えたエビの謎"
2721341247 = "蒸し暑いある夏の日。いつものようにコンビニ弁当を食べていたRABBIT小隊員は、ここ最近のお弁当からエビが姿を消している事に気づき――いなくなったエビの行方を探るべく、観光客を装って漁村へと潜入する事を決意するのだった。果たして、RABBIT小隊は無事にエビを取り戻す事ができるのでしょうか？"
2738681454 = "消えたエビ"
58368520 = "可愛い水着と不穏な村"
1176265223 = "夜戸浦村の影"
2322828772 = "禁忌"
3013262397 = "闇を彷徨う者"
473736447 = "未知の恐怖"
1216354736 = "霧の晴れた空"
170093504 = "深夜のバーベキュー（１）"
3995974815 = "深夜のバーベキュー（２）"
718466590 = "怪しい影"
3337165522 = "水中のウサギ"
1057642642 = "甲板掃除（１）"
2724919361 = "甲板掃除（２）"
405509144 = "お届け物です！"
3924969069 = "消えたエビ"
3736953745 = "ここ最近のお弁当からエビが消えたことに気づいたRABBIT小隊は、アイスの差し入れを持ってきてくれた先生の提案によってエビの行方を調べるために漁村へと向かうことを決めるのだった。"
1943580014 = "可愛い水着と不穏な村"
184007341 = "エビが消えた謎を調べるべく、夜戸浦村に潜入することを決めたRABBIT小隊は、海水浴に来た観光客を装うことに。それぞれが用意した水着姿で、村へと足を踏み入れるのだった。"
2581052701 = "夜戸浦村の影"
2832724995 = "村を訪れた一行は、各自で調査を開始する事にあまり歓迎されていない空気を感じながらも、聞き込み調査を続ける一行は、「深きもの」という不思議な単語をそれぞれの場所で耳にする。"
309044331 = "禁忌"
2200941612 = "聞き込み調査であまりめぼしい収穫が得られなかった一行は、各々の調査結果を話し合っていた。そこに、謎の影が現れ――とある儀式と噂について教えてくれるのだった。"
2989058466 = "闇を彷徨う者"
723669717 = "RABBIT小隊は、夜戸浦村の不思議な噂を自分の目で確かめるべく、夜間作戦を開始するのだった。"
1997896967 = "未知の恐怖"
284854068 = "RABBIT小隊員と夜戸浦村の漁師の交戦は、先生の鶴の一声によって止められる。そうして、小隊員が見たものは、夜戸浦の特産品であるくさや工場であることが判明し――自分たちが先入観で物事を測っていたと気付かされるのだった。"
4197412946 = "霧の晴れた空"
4182046529 = "夜が明け、騒動が終わった後――RABBIT小隊は、各々のやり方で村人の手伝いをするのだった。"
3388148430 = "深夜のバーベキュー（１）"
3365586462 = "釣り人に頼まれ、釣りを教えることになったミユ。そうして、釣りを楽しんでいたRABBIT小隊は、海鮮を持ってやってきた村人とバーベキューをしながら賑やかな時間を過ごすのだった。"
2519986036 = "深夜のバーベキュー（２）"
2505877297 = "一方、海の上に浮かぶ怪しいシルエットがRABBIT小隊と村人の様子を睨みつけていた。"
1139930313 = "怪しい影"
1328182877 = "翌日、釣り人は鬼の岩礁付近で不思議な船を発見する。村人は、伝説に登場する深きものが上陸する時に用いると言われている「再来の船」なのではないかと口にし、怯えていた。しかし、RABBIT小隊は船の怪しいところに気づき――"
1869164534 = "水中のウサギ"
2573209587 = "「再来の船」の実態を把握するべく、RABBIT小隊は海へと向かうのだった。"
4044326055 = "甲板掃除（１）"
893178531 = "海に浮かんでいた船は伝説の船などではなく、海運会社の者のバージ船だった。海運業者がエビの密輸に関与していたことが発覚し、RABBIT小隊はSRTの名で彼らを制圧する事を決めるのだった。"
3149322458 = "甲板掃除（２）"
3604726031 = "RABBIT小隊を前に、海運会社で雇った船員たちは敗北し……一同は、彼らの処分を村人に任せるのだった。"
491370350 = "お届け物です！"
574290976 = "一連の事件が終わり、エビの流通も正常化を果たし――夜戸浦村は不吉な漁村から活気ある観光地へと生まれ変わった。そうして、子ウサギ公園に戻ったRABBIT小隊員は、夜戸浦村から届いた宅配便を受け取るのだった。"
1186506094 = "隠されし遺産を求めて～トリニティの課外活動～"
387596842 = "サクラコの要請によってシスターフッドが発見した遺跡の調査をすることになったウイは、ヒナタ、ハナコ、コハルと共に水着に着替えて海辺の無人島へと向かう。そこは、かつて聖徒会が使っていた場所のようで……？果たして、一行は無事に遺跡の調査を終えることができるのでしょうか？"
343249441 = "拉致"
1955848092 = "通りすがりの一般人A"
1265169502 = "水着ですよ♡"
