3001940845 = "Give up?"
2015601494 = "During the battle with Goz, the healing rate of all allies is reduced.\nAllies with shields take reduced damage from Goz.\nTry forming a team with students who can grant shield effects."
1713093913 = "Some of Goz's skills deal massive damage to allies within range.\nYou can avoid Goz's skills by moving out of the affected area.\nTry forming a team with students who have movement skills to evade Goz's attacks."
113078633 = "From Phase 2, Goz appears with clones that mimic its movements.\nUse movement skills to get in front of the real Goz, or use skills that apply the Focus Fire state to target the real Goz."
802824913 = "The Kaitengers share HP.\nForm a team with students who have wide-range skills to attack the Kaitengers.\n\nKaitenger skills can be interrupted by utilizing CC (Crowd Control) states.\nTry forming a team with students who have CC skills."
3530239216 = "When Infinite Rotation ULTRA Plate Shield is used, damage taken is reduced.\nThis effect is dispelled by attacking KAITEN FX Mk.0 a certain number of times with EX skills.\nTry forming a team with students who can attack enemies multiple times with EX skills."
184225747 = "Specific parts of KAITEN FX Mk.0 activate at regular intervals.\nDepending on the activated part, specific effects are applied.\nWhile a part is activated, damage dealt to KAITEN FX Mk.0 is also accumulated on that part."
2040549983 = "When damage accumulates and a part's HP reaches 0, that part is destroyed.\nSkills associated with the destroyed part will no longer be used.\nDestroying a part puts the boss in a groggy state and reduces its ATG."
577718197 = "The Drum Can Crab has different defense types for each part.\nForm a team with students corresponding to each defense type to attack those parts."
4270946096 = "When it attacks with its claws, you can move to the scaffolding to avoid the attack by dispelling the debuff on the opposite control panel.\nAfter evading, you can attack the claws.\nAttack with students corresponding to the claw's defense type."
4165932791 = "Certain parts of the Drum Can Crab can be destroyed.\nDestroying a part allows you to deal even greater damage to it.\nDestroying all parts grants beneficial effects for the battle."
3950991928 = "Attacking the Drum Can Crab's loincloth charges the crane's energy.\nWhen the energy is full, you can use the crane to put the Drum Can Crab into a groggy state.\nWhen the Drum Can Crab is in a defensive stance, putting it into a groggy state prevents its attacks and allows you to deal greater damage."
723529624 = "The drum can deals damage to allies at regular intervals.\nDebuffs continuously accumulate on the drum can, and the damage increases in proportion to the number of effects.\nForm a team with students who have skills to dispel debuffs.\nEach time you dispel a debuff, the damage the Drum Can Crab takes increases."
