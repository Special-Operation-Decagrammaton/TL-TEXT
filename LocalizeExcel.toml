4007922540 = "レイジョの手作りチョコは、厳しい修練「鉄砂掌」によって素手で砕いたカカオを用い、彼女の拳の跡の形に仕上げられたものだった。まさにレイジョを象徴するようなチョコを、勢いよく食べ始める先生の姿を見て、レイジョは恥じらいつつも喜ぶのだった。"
2317670005 = "シークレットレシピ"
2747026672 = "先生を万魔殿へと引き込むために持ち込んだチョコレートに、ある特別レシピを用いたと語るサツキ。さらに話を聞いていると、チョコの周りをぐるぐる回りながら、秘密の呪文「美味しくな～れ」を唱え続けていたことが明らかに。先生は、サツキが頑張って作ってくれたチョコレートを美味しく食べるのだった。"
3253447383 = "スイーツジャーナリズム"
2422568276 = "バレンタイン特集記事への取材協力のお礼として、チアキは先生にぐちゃぐちゃのチョコレートとおしゃれなチョコの写真を渡す。戸惑う先生に対して、チアキはおいしいフード写真を撮るコツを語り、一番美しい状態を写真に残せば、チョコを永久に楽しめる！と強く主張するのだった。"
3029733267 = "甘く苦い罠"
3490507594 = "トリニティを訪れた際に連絡を受け、セイアの部屋へと向かう先生。そこで先生は、彼女からチョコレートと共に、署名欄のある謎の用紙を受け取った。言われるがままに署名欄へとサインをする先生だったが……それこそが、セイアの罠で……。これで、どんな命令もできるというセイアの前で、先生は彼女の手作りチョコレートを完食するのだった。"
3752504286 = "プレゼンテーション"
1513386319 = "リオにとってバレンタインの贈り物は、非合理的としか思えない存在だった。しかし、一見無意味なものにこそ意味があるかもしれないと考え、彼女は自身が最適解と考える手法を用いて、今の自分を形作った学園――ミレニアムの校章が刻まれたチョコレートを作りだす。それを受け取った先生の感謝の言葉を受け、こみ上げる感情に戸惑いを隠せないリオであった。"
2003795896 = "三種の神器"
3170475194 = "レイは、自身の使っていたグローブを型取りしてチョコレートを作っていた。それと一緒にバットとボールを模したチョコレートも先生にプレゼントして、野球における「三種の神器」を食べながら野球談議に花を咲かせるのだった。"
3449104670 = "ガール・アンド・スナック"
1885555336 = "先生のためにと新作のチョコレートを買ってきたヒカリ。いざ先生が口にしようとするとヒカリが物欲しそうにしており、2人で分けっこしながら食べるのだった。"
359030032 = "意外なプレゼント"
2185724888 = "仕事で疲れているであろう先生のために、ノゾミはゼリーを持ってきた。渡して帰ろうとするノゾミを呼び止めた先生は、一緒に遊ぶことを提案する。全力で遊び倒した後、2人は一緒に仕事を片づけるのだった。"
2821415725 = "I hate cheap chocolate"
3930966594 = "忙しい日々を送っていたアオバは準備の時間が取れず、安物のチョコレートを先生にプレゼントした。そのまま帰ろうとするアオバに、休んでから行けばいい、とソファを勧める先生。アオバは日頃の疲れを癒していくのだった。"
749178746 = "冷たい指先は"
3102107895 = "先生に百鬼夜行限定のチョコクッキーをプレゼントしたナグサ。先生はさっそく食べてみるが、溶けやすく、手が汚れてしまう。自分ではそうはならないと、ナグサは自分の体温の低さを実感する。そこからはナグサが先生に食べさせてあげるのだった。"
1761460889 = "少女は箱を開けぬまま"
2121407183 = "外装は華やかだが強い苦味のあるチョコレートをプレゼントするニヤ。いたずらの意図を先生が聞くと、上辺だけで勘違いをして苦い経験をする生徒がいるかもしれない。とニヤは答える。先生は理解を示しつつも、ニヤにもそのチョコレートを食べさせるのだった。"
3850859909 = "マスターのためにマナチャージ"
905988701 = "自分の覚悟を見せると言い、帽子を脱ぐエリ。さらには「あーん」をしたいと提案する。何個か食べさせてもらった後、今度は先生からもエリにお返しすることに。そうして2人はマナを供給し合う時間を過ごすのだった。"
3059797050 = "思い出す時まで"
3217050285 = "カノエは愛をたっぷり込めたチョコレートマフィンを用意したという。それを食べることで先生が記憶を取り戻すと期待するカノエ。マフィンはとても美味しかったものの、効果は無かった。けれどカノエに落ち込む様子はなく、「イヒッ」という笑い声が残るのだった。"
3389252788 = "お預けティラミス"
3138201970 = "招待を受けた先生はミヨの寮へ向かう。不慣れな手作りで、まだティラミスを作っている途中だったミヨ。少し話をしていたらすぐに完成したものの、2時間冷やしたほうが美味しいと判明する。そのまま2人はおしゃべりをしながら時を待つのだった。"
2750803807 = "それは甘くてハードな"
2839633723 = "フユからのプレゼントはゴブストッパーだった。長時間舐めていられるから、その間は自分のことを考えていて欲しい。と言い残してフユは颯爽と帰っていく。その後フユは、1人で自分の発言を振り返って身もだえるのだった。"
2958867371 = "ボクの！"
1371353270 = "先生がシャーレに戻ると、リツからのプレゼントである「絶対に溶けないチョコレート」が鎮座していた。それは茶色の大理石で作られており、リツから彫刻に関する話を聞きながら、時間を過ごすのだった。"
3192072615 = "ラブ博物館に行かなくちゃ！"
346158900 = "気配を察知して現れた先生に驚くものの、先生に渡すために準備していたチョコレートを探し始めるラブ。結局見つからず、ラブの食べかけを半分こすることに。しかし手渡されたチョコレートを半分にする前に、それを持ったまま先生は呼び出しを受けて帰ってしまうのだった。"
3974083935 = "チョコメレンゲクッキー"
3194591599 = "お菓子作りの贅沢さに憤るスバル。それでも材料をやりくりしながら、スバルはお手製のメレンゲクッキーを先生にプレゼントした。2人は一緒に食べて和やかな時間を過ごすのだった。"
977917830 = "評論家のチョコケーキ"
2491918438 = "タカネはバレンタインデーという記念日についての評論を語る。砂糖を作る時の副産物である糖蜜を使うカルトーシュカは、生徒のあらゆる可能性を見出す先生のようだ、と語るタカネ。先生は少し照れながら、手作りのカルトーシュカを一緒に食べるのだった。"
3538379831 = "チョコレートメドヴィク"
2672738749 = "突然「交渉の三原則」というテーマで話を切り出したヤクモは、「手作り」だと言って先生にメドヴィクを差し出す。しかしそれは「ヤクモの」手作りではなくお店の職人が作ったものであった。ヤクモなりに喜ばせようと考えてくれていたことを理解して、先生はヤクモをお茶に誘うのだった。"
573696648 = "完璧な計画（仮）"
4069694705 = "ケイは来る途中に拾ったものだと言って、先生にチョコレートを差し出した。しかしそれが手作りだと先生はすぐに見抜いてしまう。先生が1個食べてみると、ケイは塩と砂糖を間違えていた。コロコロと変わるケイの表情を見ながら、先生が隠し持っていたチョコレートを2人で食べるのだった。"
446190472 = "どたばたシスターと古書館の魔術師"
1809185386 = "トリニティにおける大事な経典がバラバラになってしまった！\n\rその復元のため、トリニティ各所を駆け回るヒナタと先生。果たして、式典までに復元は間に合うのか！？"
1669344749 = "経典復活大作戦！"
3307050815 = "秘密裏に何とか……"
3206474415 = "魔術師の塔へ"
2268137323 = "スラムの要塞へ（１）"
1903415538 = "スラムの要塞へ（２）"
1272740423 = "トリニティの走る閃光弾（１）"
3082754107 = "トリニティの走る閃光弾（２）"
3986270050 = "少し似た人たち（１）"
3119699862 = "少し似た人たち（２）"
175163125 = "終わらせないために（１）"
2349364401 = "終わらせないために（２）"
3540342487 = "イット・サーヴズ・ユー・ライト（１）"
2185957071 = "イット・サーヴズ・ユー・ライト（２）"
3620597108 = "イット・サーヴズ・ユー・ライト（３）"
807787903 = "イット・サーヴズ・ユー・ライト（４）"
2042584363 = "経典復活大作戦！"
2114734858 = "ある日トリニティで重要な経典が発見され、学園はちょっとしたお祭り騒ぎに。その経典を式典会場に運ぶという役目を負ったヒナタだったが、勢い余ってその経典をバラバラにしてしまい……。"
885221606 = "秘密裏に何とか……"
2609673615 = "経典をどうにか直すため、図書委員会を訪れたヒナタと先生。シミコは相談に乗ってくれたものの自分の手には負えないとのことで、古書の専門家であり図書委員会の委員長である「ウイ」を紹介してくれることに。"
2635340070 = "魔術師の塔へ"
3848520474 = "無残な姿の経典を見て発狂しかけるウイだったが、ヒナタや先生との会話を経て、復元を手伝ってくれることに。その作業のためには幾つか材料が必要ということで、先生とヒナタは材料探しへと出かける。"
1290804638 = "スラムの要塞へ（１）"
693914347 = "「ミラクル5000」という限定品のケーキを探しに来た先生とヒナタ。しかし現地へと到着すると、何やら平穏ではない様子。その場にいた放課後スイーツ部の生徒たちから事情を聞き、一同はケーキ屋さんの店主を助けに行くことに。"
4074869668 = "スラムの要塞へ（２）"
4079910234 = "ヘルメット団を強襲し、どうにかケーキ屋さんの店主を助け出した一同。戦闘後、みんなはヒナタに対して一つだけ残っていた最後のケーキを譲ってくれようとするのだが、店主は「その必要は無い」とたくさんのケーキを作ってくれるのだった。"
1658580150 = "トリニティの走る閃光弾（１）"
231136931 = "次の材料である「水苔膠」を求めて歩き回っていた先生とヒナタは、スケバンたちと対峙しているスズミを発見。戦闘が始まってしまったため、先生とヒナタは介入することに。"
2012597133 = "トリニティの走る閃光弾（２）"
2151675688 = "一同はスケバンたちに勝利。その彼女たちからその辛い境遇を聞いたヒナタは、シスターとして手を差し伸べる。一同は最終的に、無事「水苔膠」を手に入れることができたのだった。"
496082561 = "少し似た人たち（１）"
565077451 = "最後の材料である「精聖薬」を手に入れるため、救護騎士団の別館へと向かったヒナタと先生。そこで待っていたのは救護騎士団のセリナだった。"
881020918 = "少し似た人たち（２）"
3596757663 = "中を案内し、二人に薬を分けようとしてくれたセリナだったが、どうやら急患で呼び出しを受けてしまう。大変そうな状況なのにだた見送ることはできないとヒナタはセリナを追おうとし、先生もそんなヒナタの背中を押す。先生が無事に薬を発見した頃、ふたりは打ち解けた様子で帰って来たのだった。"
3108835754 = "終わらせないために（１）"
707461921 = "材料を全て集めることに成功したヒナタと先生。それに驚きつつ、ウイは作業を開始。後は一旦ウイに任せ、バタバタの一日を過ごしたヒナタと先生は眠りにつくのだった。"
3464872233 = "終わらせないために（２）"
1190546149 = "日時は夜を迎え、ウイの復元作業も佳境に入っていた。しかしその時、突如として式典のスケジュールが変更されてしまうとの連絡が入る。"
1936542723 = "イット・サーヴズ・ユー・ライト（１）"
789625242 = "色んな人に助けてもらったのに、と落ち込むヒナタ。しかしもう間に合わないと頭では理解しながらも彼女は立ち上がる。先生とウイに感謝の言葉を告げ、ヒナタは会場へと向かうのだった。"
1115309119 = "イット・サーヴズ・ユー・ライト（２）"
2876222975 = "ヒナタが出ていった後、経典の復元が完了。ウイはヒナタへの心配の言葉を口にする。一方ヒナタは式典の会場に到着するも、そこには正義実現委員会のマシロが。どうしたものかと悩んでいたその時、どこからか銃声と、聞き覚えのある集団が登場し……？"
867066557 = "イット・サーヴズ・ユー・ライト（３）"
1143461639 = "会場に現れたのは、「七転八倒団」や放課後スイーツ部の生徒たちだった。彼女たちの時間稼ぎが功を奏し、どうにか経典を入れ替えることに成功する。"
3261598258 = "イット・サーヴズ・ユー・ライト（４）"
1763744091 = "無事に自体は解決。古書館に戻った先生は、ウイから幾つかの素直な言葉を耳にする。"
2477586931 = "不忍ノ心"
2232967509 = "正式な部活になるために、百鬼夜行とゲヘナの交流会でお手伝いをすることになった忍術研究部一同。\n\rしかしその両校の交流会が、何事もなく終わるはずもなく……様々なハプニングの先で、彼女たちが出す答えとは！？"
3240499071 = "忍者襲来！"
3223702264 = "交流会スタート！"
2295860854 = "大きな乙女（１）"
3632641780 = "大きな乙女（２）"
1029942213 = "忍者と言えばお姫様？（１）"
2110087172 = "忍者と言えばお姫様？（２）"
3622577917 = "最初の関門：看板娘とSP（１）"
2672511310 = "最初の関門：看板娘とSP（２）"
1316908147 = "第二関門：眠り姫（１）"
2839284134 = "第二関門：眠り姫（２）"
4119318060 = "第三関門：読心術師（１）"
2991402396 = "第三関門：読心術師（２）"
2127710617 = "第四関門：トリックハウス（１）"
3261259448 = "第四関門：トリックハウス（２）"
3904889189 = "せき止めていたもの（１）"
973204903 = "せき止めていたもの（２）"
682393381 = "忍者の鉄則（１）"
4279025201 = "忍者の鉄則（２）"
1269695701 = "祭りの後にも"
208502467 = "忍者襲来！"
752075220 = "まだ認可を得ておらず、正式な部活ではない「忍術研究部」。先生ならその認可を出せたりするのではないかと思い、彼女たちはシャーレにやってきたのだと言う。それを安易に出してしまうのも難しいなと先生が悩んでいると、そこに同じ百鬼夜行の「陰陽部」であるカホが訪れ……？"
3066356973 = "交流会スタート！"
2027758856 = "百鬼夜行連合学院へとやって来た先生と忍術研究部。陰陽部の部長であるニヤ曰く、今度ゲヘナ学園との間で開かれる交流会をシャーレに手伝ってほしいとのこと。先生はその代わりに成功したら「忍術研究部」を正式な部活として認めてほしいと告げ、ミチル、ツクヨ、イズナと共にその交流会を手伝うことになったのだった。"
2113642855 = "大きな乙女（１）"
1841957901 = "まずは交流会の手伝いとして「和楽姫」の公演準備を始める忍術研究部一同。そんな中、ツクヨが不良に絡まれ（？）てしまい、退いてもらうことに。"
2793185007 = "大きな乙女（２）"
4010253238 = "不良たちに退いてもらい、先生は話の流れからツクヨの胸の内を聞かせてもらうことに。そんなツクヨを先生は励まし、あらためて公演の準備を再開するのだった。"
3738792413 = "忍者と言えばお姫様？（１）"
1915451082 = "交流会の花である「和楽姫」。本来ならばそのヒロインはチセが演じる予定だったのだが、今回の交流会では急遽万魔殿のイブキが演じることに。周囲の動揺を感じ取って不安になったイブキを宥めるため、ミチルは忍者ニンペロさんの人形を貸し、イブキの危機には必ず駆けつけると約束を交わす。そんな中、突然魑魅一座が襲ってきて……？"
341953329 = "忍者と言えばお姫様？（２）"
2863619002 = "「和楽姫」役であるイブキがなぜか魑魅一座に誘拐され、混乱し始める一同。正式な部活として認定してもらうためにも、大ごとにして交流会を中止にさせるわけにはいかず、ミチルは自分たちで助け出すことを提案。忍術研究部一同に加えて万魔殿のイロハも合流し、全員でイブキを取り戻すために動き始める。"
1421697779 = "最初の関門：看板娘とSP（１）"
2447682703 = "イブキが攫われた状況をなぜかニヤは暢気に実況中継し始め、それによって公演は続いていることになり交流会は堂々と続行。イブキを取り戻すため魑魅一座を追う一同の前に、最初の関門であるお祭り運営委員会の二人が立ちはだかる。"
91366382 = "最初の関門：看板娘とSP（２）"
3098904965 = "無事に最初の関門を突破した一同は、再び魑魅一座を追いかけることに。"
1264601568 = "第二関門：眠り姫（１）"
3751057018 = "魑魅一座を追いかける一同の前に、第二関門「眠り姫」のツバキが立ちはだかる。イズナの機転により試練を突破するものの、イズナ以外のメンバーはツバキを倒さなければ進めないということになり……？"
3802744135 = "第二関門：眠り姫（２）"
3871679676 = "ツバキの試練を無事に通過した一同は、あらためて魑魅一座の後を追うのだった。"
1483782816 = "第三関門：読心術師（１）"
1022129588 = "一同の前に、第三関門「読心術師（？）」のミモリが立ちはだかる。ツクヨの「ぼーっとする作戦」によって突破口が開けたかのように思えたが、どうすれば決着がつくのかよく分からない事態に。ミモリの優しさでクリア方法を教えてもらい、一同は脱力しながらも彼女に挑むのだった。"
2959155984 = "第三関門：読心術師（２）"
2380076631 = "ミモリの試練を通過した一同。早く行かなきゃと焦るミチルに対し、ミモリは「ミチルちゃんが思ってるより、みんな強いと思いますよ」と口にする。その真意を図る間もなく、一同は先へと進むのだった。"
96021509 = "第四関門：トリックハウス（１）"
1037879827 = "第四関門はトリックハウス。カエデがその説明をしている最中に焦ったミチルはつい飛び出してしまい、罠にかかってしまう。そのミチルを庇う形で、先生が怪我をしてしまい、ミチルは「自分のせいで」と静かに内心を吐露する。"
2449070470 = "第四関門：トリックハウス（２）"
1750066922 = "ミチルと先生は無事にトリックハウスを抜け出し、後から来たツクヨとイズナに合流。二人に対して自らの素直な気持ちを伝えようとするミチルだったが、そこに陰陽部のカホが現れ、無情にも公演の中止を告げる。"
1535946624 = "せき止めていたもの（１）"
939985143 = "事態を把握したカホは、「この事件の処理は陰陽部が引き受ける」と宣言するが、ツクヨとイズナは「イブキを助けると約束したから」と口にし、引き下がらない姿勢を見せる。"
1915078740 = "せき止めていたもの（２）"
4144075858 = "先生の助けもあって、カホを退ける事に成功した一同。「部長が信じる道を進む」という後輩の言葉に背を押され、ミチルは再び前を向く。戦車を率いてやってきたイロハとも再び合流し、あらためて魑魅一座を追いかけることに。"
349304540 = "忍者の鉄則（１）"
713270559 = "戦車で追いかけてくる忍術研究部一同の追っ手を振り切るため、橋を落とした魑魅一座。各位が慌てる中、イロハは「足場が無いから何なんですか」と驀進し……！？"
3316953760 = "忍者の鉄則（２）"
3896826306 = "とうとう魑魅一座に追いついた一同。しかし近づいたらイブキを投げ落とすと脅され、足を止めてしまうミチル。自分の選択で取り返しがつかないことになると恐れるミチルだったが、当のイブキは「何があっても絶対助けに行くって約束してくれたから」と笑っていた。その笑顔に背中を押されるようにして、彼女の足は動き――"
457811177 = "祭りの後にも"
1596447159 = "無事に交流会は終了。忍術研究部一同はしっかりと話し合った上で、正式な部活になることは一旦保留に。そして全てが一件落着……となる前に、ニヤが先生に対して今回の顛末を語る。「全ては先生の実力を確かめるため」と楽しそうに堂々と黒幕宣言をするニヤに対して、先生はお説教を始めるのだった。"
784454923 = "アビドスリゾート復旧対策委員会"
1941527097 = "リゾート使用券を手に入れた対策委員会。バカンスに訪れた彼女たちを待っていたのは、廃墟と化したリゾートで――\n\r対策委員会、今度はリゾートを復旧します！"
4169806517 = "人生、何が起こるか分からない"
1862967808 = "本当に、人生何が起こるか分からない（１）"
2849988537 = "本当に、人生何が起こるか分からない（２）"
