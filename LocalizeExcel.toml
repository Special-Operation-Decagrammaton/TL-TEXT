919870100 = "Vol.1 Força-Tarefa Hipotecária"
3763745176 = "A Escola Secundária Abydos enfrenta\n\ra ameaça iminente de fechar as portas.\n\rJunte-se à Força-Tarefa Hipotecária\n\re ajude a proteger a escola!"

#[ +++ ][Sinopse de inicio dos capítulos:]
2215864598 = "O Dia Estranho da Força-Tarefa Hipotecária"
3242980431 = "A Força-Tarefa Hipotecária foi formada\n\rpara evitar o fechamento da escola.\n\rElas suportam dias difíceis de alguma forma,\n\rmas a dívida da escola não dá sinais de diminuir."

2206521406 = "失ったもの、手放さなかったもの"#"O Que Foi Perdido, e o Que Nos Recusamos a Abandonar"
2066878784 = "窮地に陥ったアビドス対策委員会。\n\rアビドス高校の存続を脅かす陰謀との\n\r戦いの行方は……？"#"Com a Força-Tarefa Hipotecária\n\rde Abydos encurralada.\n\rQual será o desfecho da luta contra\n\ra conspiração sombria que ameaça a sobrevivência da\n\rEscola Secundária Abydos……?"

2208175333 = "夢が残した足跡"#"As Pegadas Deixadas Pelos Sonhos"
2738747636 = "カイザーグループが撤退したものの、\n\r学校の借金は減る兆しが見えず……\n\rそんな中訪れた新たな脅威に、\n\r対策委員会は学校を守り抜くことができるのでしょうか？"#"Embora o Grupo Kaiser tenha se retirado,\n\ra dívida da escola não mostra sinais de diminuir……\n\rDiante de uma nova ameaça que surge nesse ínterim,\n\rserá que a Força-Tarefa Hipotecária\n\rconseguirá proteger a escola?"

