827169251 = "Salva-vidas, missão concluída!"
1084464340 = "Utaha e Chihiro aparecem de repente. Descobre-se que o \"meca-jacaré\" pertencia ao Clube de Engenharia e que, devido a um erro durante o desenvolvimento, ele acabou indo parar no parque aquático. Além disso, o motivo pelo qual o jacaré parou de funcionar na frente de Kanna também é revelado."
