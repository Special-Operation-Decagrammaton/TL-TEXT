2857782741 = "Habilidade EX 1 (Shunzinha)"
2882983713 = "Habilidade EX 1 (Shun)"
2899839957 = "Fazendo dupla no vôlei de praia, o Sensei e a Nagusa criam sinais secretos para arrasar na partida. Quando o jogo termina, ela reflete sobre as risadas que deram e agradece de coração ao Sensei por conseguir dar esse pequeno passo à frente."
2920486217 = "Vitória Estratégica 1 (Shunzinha)"
2941005566 = "Hotel do Desfiladeiro"
2950091086 = "Cobertura (Shunzinha)"
297411688 = "Resultado de Recrutamento Salvo 3"
2996173795 = "Decididos a apagar os micos do dia anterior, os dois refazem os mesmos passeios de novo, mas dessa vez com a verdadeira forma adulta da Shun. Porém, diferente do charme elegante e amadurecido que a instrutora exibia…… O Sensei é quem acaba sofrendo uma regressão e pedindo para ser mimado que nem um bebê. Assim que recobram a sanidade e morrem de vergonha, os dois jogam a culpa da maluquice todinha nos encantos do desfiladeiro de verão."
2999996787 = "Rio"
3031198795 = "Brincar, Inspecionar, Resumindo: Férias (2)"
3034469006 = "Equipar Arma Única (Shunzinha)"
3044534023 = "Uma Flor no Deserto"
3092431370 = "A pedido da Shun, o Sensei entra na onda de ajudar a escoltar as garotinhas do Jardim da Flor de Ameixeira. Cuidar de um bando de crianças com a energia a mil num parque aquático faz as horas voarem em um piscar de olhos. Depois de embarcar as meninas no ônibus e encerrar os deveres de acompanhante do passeio, o Sensei e a Shun finalmente desfrutam daquele aguardado tempinho a sós."
3093547927 = "O Sensei decide fazer uma visitinha surpresa pra Iroha, que vivia reclamando de estar atolada de serviço. Enquanto ajudava na faxina do seu querido espaço de descanso secreto, o Sensei depara-se com um livro. A Iroha admite que aquela obra foi o gatilho inicial que a puxou pro mundo da leitura no passado. E a partir desse dia, aquele livro ganharia uma recordação novinha na vida da moça."
3105721735 = "Rio"
