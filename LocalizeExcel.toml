1770988056 = "Tradição e história"
593379531 = "O grupo vem assistir ao amistoso entre 'Corgi Braves' e 'Abyssinian Raiders'. Torcem pelos Braves, time de coração de Rei, e se divertem com o 'tempo de fotos'. Nesse momento, há um técnico no telão, dando instruções ao ver o Sensei……"
473988487 = "Não diga 'com certeza'"
3177369030 = "O técnico dos Braves chama o Sensei. Ele recebeu uma ameaça de um suspeito de que 'se o jogo não seguir as instruções, a fábrica de chicletes explodirá' e pede ajuda para encontrar o criminoso. Indignados, o grupo aceita."
2743711684 = "Se houver virada, me acorde (1)"
2387523374 = "Com Sumire disfarçada de vendedora, o Sensei vasculha o estádio. No caminho, encontram dois torcedores exaltados que recusam a proteína oferecida. Sumire os considera culpados e começa um 'treino personalizado' para contê-los……"
3613497359 = "Se houver virada, me acorde (2)"
4073297816 = "Os dois contidos eram apenas torcedores comuns. Nesse momento, anuncia-se a troca de ataque e defesa. O Sensei deixa a cena com Sumire e vai até Rei, para se preparar para um novo contato do criminoso."
3805571027 = "As pessoas sonham com o beisebol"
3683981516 = "O criminoso, um tanto inquieto, instrui o técnico a fazer o próximo rebatedor tentar um bunt. Rei reluta em tentar um bunt logo no início, mas é ignorada. O bunt é bem-sucedido, e após o avanço, o quarto rebatedor vai ao montinho, mas rapidamente os três eliminados são registrados. Exausto, o criminoso ordena a troca de arremessador na terceira entrada……"
2101992904 = "Encontro por acaso"
1936948185 = "O Sensei e Rei encontram Hanae, que torce pelos jogadores. Hanae torce para alguém ter coragem, nem sabe os nomes dos times. Rei se emociona com sua pureza. Mas logo depois, testemunham torcedores pacíficos mudarem de repente com um erro do jogador, e ficam com sentimentos mistos……"
56139120 = "O importante é um coração que não se quebra"
2691253840 = "Sumire flagra torcedores mal-educados e, nesse meio tempo, fala sobre a importância do espírito esportivo e que gosta de 'pessoas que se esforçam em direção a um objetivo' e 'pessoas que as guiam'. – Nesse momento, chega uma mensagem de Rei. Dizem que podem localizar o criminoso pelo ruído da chamada……"
523545392 = "Incêndio no campo"
2573485065 = "Rei expressa seus sentimentos pelo beisebol e estranha por que o Sensei, que não é fã, está cooperando tanto. O Sensei responde: 'Porque gosto de observar os alunos'. Rei se surpreende. Nesse momento, o criminoso contata novamente. A estratégia do técnico falha, o criminoso se irrita, e Sumire localiza sua posição pelo ruído……"
1348511304 = "O que cai no estádio (1)"
220876149 = "Rei, Sumire, o Sensei e o técnico invadem o camarote onde o criminoso está. Mas ele tem um refém, e até o quarto rebatedor dos Braves aparece para impedi-los, causando grande confusão! Sob o comando do Sensei, Sumire e Rei entram em combate contra os seguranças contratados pelo criminoso."
867171087 = "O que cai no estádio (2)"
2808333292 = "O criminoso contido revela-se um fã decepcionado com a incompetência dos Braves. Enquanto isso, o jogo prossegue e, finalmente, a nona entrada chega. O último ataque dos Braves está prestes a começar. Mas o quarto rebatedor, essencial, feriu o pulso com um tiro perdido na luta anterior……"
1172577379 = "A vida também, a partir de dois eliminados na nona entrada"
1710768566 = "Sem um rebatedor, o Sensei sugere que Rei, a quarta rebatedora do clube de beisebol de Millennium, assuma. Rei fica nervosa, mas, encorajada pelo Sensei, Sumire e o técnico, vai para o bastão. Apoiada por todos, esvazia a mente e balança o taco com tudo. A bola, como uma sombra branca, voa para longe, em direção ao céu……"
239529906 = "Treino final"
3302298300 = "Ainda com a euforia do home run da vitória, Rei se anima para treinar como a quarta rebatedora de Millennium. Nesse momento, Sumire, também comovida pelo jogo, aparece. Sentindo um calafrio, Rei tenta fugir – e Sumire, capturando o Sensei, convida os dois para um treino pesado."
