2810575850 = "Vol.3 Tratado do Éden"
2791927741 = "Gehenna e Trinity.\n\rSerá que essas duas escolas que se odeiam tanto\n\rconseguirão finalmente se reconciliar……?"

#[ +++ ][Sinopse de inicio dos capítulos:]
3247737268 = "Começam as Aulas de Reforço!"
397863706 = "Quatro alunas da Trinity estão à beira da reprovação.\n\rComo Sensei responsável pelo Departamento das \"Aulas de Reforço\",\n\rsalve-as dessa crise!"

2318202637 = "Prova Impossível"
163287702 = "Em meio à escuridão,\n\ronde conspirações, suspeitas e traições se entrelaçam,\n\rserá que os alunas das Aulas de Reforço conseguirão\n\rsuperar essa crise em segurança?"

1001998812 = "A Nossa História"
2106951523 = "Chegou finalmente o dia da cerimônia de assinatura do Tratado do Éden.\n\rO cotidiano que parecia pacífico começa a se rachar, e o caos e o ódio se intensificam.\n\rO desfecho final de tudo isso será a \"Catástrofe \", ou será que……"

2525297440 = "Kyrie Para os Deuses Esquecidos"
955070638 = "O Esquadrão Arius,\n\rque foi abandonado até mesmo pela academia à qual pertencia――\n\rpara elas, que vagam entre o ódio e a raiva,\n\rserá que a misericórdia existe para elas?"

