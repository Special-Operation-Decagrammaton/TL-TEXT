1229845917 = "O Esquadrão RABBIT entra em ação!"
3188474877 = "Uma ordem repentina de fechamento é decretada\n\rpara a Academia Especial SRT.\n\rIncapazes de aceitar essa decisão, as alunas do Esquadrão RABBIT\n\rpassam a acampar em um parque como forma de resistência,\n\rmas……?"

2153655179 = "Nós Éramos RABBITs!"
330001174 = "Já acostumadas com a vida no parque,\n\ras alunas do Esquadrão RABBIT se reencontram com um rosto familiar.\n\rEm meio a uma situação instável e às palavras que lhes foram ditas\n\r— quais escolhas o Esquadrão RABBIT fará daqui para frente?"

