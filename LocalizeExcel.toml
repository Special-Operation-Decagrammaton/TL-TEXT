2529556896 = "Prólogo"
1415972186 = "Com a chegada do verão, um parque aquático supergrande é inaugurado. A Academia de Polícia Valkyrie decide enviar salva-vidas para garantir a segurança do local. No entanto, a lista de nomes contém uma surpresa..."
3449128733 = "Salva-vidas, missão iniciada!"
2994107332 = "Quem colocou Kanna na lista de envio para o parque aquático não foi ninguém menos que a vice-chefe, Konoka. Kirino, Fubuki e Kanna começam juntas a missão de salva-vidas."
