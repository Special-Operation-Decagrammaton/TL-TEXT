2015601494 = "Durante a batalha contra Goz, a taxa de cura recebida de todos os aliados é reduzida.\nAliados que possuem escudo recebem menos dano de Goz.\nTente escalar alunos que concedem efeito de escudo aos aliados."
1713093913 = "Algumas habilidades de Goz causam grande dano aos aliados dentro do alcance.\nVocê pode evitar a habilidade de Goz movendo-se para fora da área em questão.\nTente escalar alunos com habilidades de movimento para evitar as habilidades de Goz."
113078633 = "A partir da Fase 2, Goz aparece junto com cópias que se movem como ele.\nMova-se para a frente do corpo real de Goz com uma habilidade de movimento ou utilize uma habilidade que conceda estado de Fogo Concentrado\npara atacar o corpo real de Goz."
802824913 = "Os Kaitengers compartilham HP.\nEscale alunos com habilidades de grande alcance e ataque os Kaitengers.\n\nAs habilidades dos Kaitengers podem ser interrompidas usando estados de CC.\nTente escalar alunos que possuem estados de CC."
3530239216 = "Quando o Escudo de Prato ULTRA de Rotação Infinita é usado, o dano recebido é reduzido.\nAtacando o KAITEN FX Mk.0 um certo número de vezes com habilidades EX, o efeito em questão é removido.\nTente escalar alunos que possam atacar o inimigo várias vezes com habilidades EX."
184225747 = "O KAITEN FX Mk.0 tem partes específicas ativadas em intervalos regulares.\nDependendo da parte ativada, efeitos específicos são aplicados.\nEnquanto a parte está ativada, o dano recebido pelo KAITEN FX Mk.0 também é acumulado nessa parte."
2040549983 = "Quando o dano acumulado faz o HP da parte chegar a 0, essa parte é destruída.\nA habilidade da parte destruída não será mais usada.\nQuando uma parte é destruída, o KAITEN entra em estado de atordoamento e seu ATG diminui."
577718197 = "O Caranguejo de Tambor possui diferentes tipos de defesa em cada parte.\nEscale alunos correspondentes a cada tipo de defesa e ataque a parte correspondente."
4270946096 = "Durante o ataque com pinças, você pode evitar o ataque removendo o estado de enfraquecimento do Painel de Controle do lado oposto e movendo-se pela plataforma.\nApós esquivar, você pode atacar as pinças.\nAtaque com alunos que correspondam ao tipo de defesa das pinças."
4165932791 = "Certas partes do Caranguejo de Tambor podem ser destruídas.\nAo destruir uma parte, você pode causar dano ainda maior a essa parte.\nAo destruir todas as partes, você pode obter efeitos vantajosos no combate."
3950991928 = "Atacar o Fundoshi do Caranguejo de Tambor carrega a energia do guindaste.\nQuando a energia está cheia, você pode usar o guindaste para deixar o Caranguejo de Tambor em estado de atordoamento.\nQuando o Caranguejo de Tambor está em postura defensiva, se o colocar em estado de atordoamento,\nvocê pode prevenir o ataque do Caranguejo de Tambor e causar mais dano."
723529624 = "Os tambores causam dano aos aliados em intervalos regulares.\nEstados de enfraquecimento se acumulam continuamente nos tambores, e o dano aumenta proporcionalmente ao número de efeitos.\nEscale alunos com habilidades que removem estados de enfraquecimento.\nCada vez que um estado de enfraquecimento é removido, o dano recebido pelo Caranguejo de Tambor aumenta."
