2727449980 = "Linha entre passado e presente (2)"
1760037658 = "Encruzilhada com seu mundo (1)"
3617252640 = "Encruzilhada com seu mundo (2)"
3970256352 = "Nós no futuro distante"
2849098317 = "Se eu for lá, encontrarei o qilin?"
