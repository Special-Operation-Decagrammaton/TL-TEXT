678210889 = "ある夏の日"
2540272205 = "暑い夏の日。夏バテ気味のキサキのために、ルミは妙案を思いつく。"
143379641 = "広報部長"
1352314154 = "玄龍門の香主であるカナエが、玄龍門、玄武商会、梅花園の生徒を宴会に招待した。玄武商会の料理が振る舞われ、会は賑やかに進行する。ひとしきりの挨拶も済んだところでキサキに促され、カナエは本題を切り出すのだった。"
4273162305 = "査察"
2102971118 = "玄武商会は山海経の外にある観光地に対して、玄龍門への確認なく多額の投資を行っていた。その是非について、それぞれの立場から議論が白熱していく。しかしそれこそがルミの狙いであり、キサキを連れ出すための「口実」作りだった。こうして、査察と称した休暇が決定する。"
1364446990 = "水遊びと査察、総合的に休暇（１）"
1603258373 = "渓谷を訪れた一行は、さっそく水着に着替えて川遊びに繰り出した。みんなから代わる代わる、水着の感想を求められる先生。いま、査察という体の休暇が始まる。"
3031198795 = "水遊びと査察、総合的に休暇（２）"
3682937290 = "ひとしきり川遊びを楽しんだ後、一行は査察もかねて腹ごしらえのために商店街を訪れる。しかしどこか閑散としているばかりか、店主は何かに怯えていて話の要領を得ない。一行が首をかしげていると、耳につく声が聞こえてきた。"
2057877650 = "恐ろしき幼稚園児"
859586820 = "一行は「雛鳥組」を名乗る三人組に遭遇する。その幼稚園児たちは、渓谷の商店街で傍若無人の限りを尽くしていた。その場は上手くとりなして切り抜けたが、商店街の住人はほとほと困り果てている。事情を聞いた一行は一致団結し、状況の改善に乗り出すのだった。"
3730554384 = "幻の幼稚園児"
2056319108 = "キキとシュエリン、先生が作戦会議をしていると、その様子をココナに目撃されてしまう。なぜか二人がいることを怪しむココナだったが、咄嗟の嘘で先生がごまかす。明くる日、雛鳥組の実態を探るため、一行は商店街の調査を始める。キサキとシュンは幼稚園児に扮して、雛鳥組に直接乗り込むのだった。"
2395538202 = "試練"
3849055276 = "キキとシュエリンは、調査のために雛鳥組への潜入を試みる。組に入るための試練を課されるが、無事に乗り越えて仲間として迎えいれられる。遊びをともにする中で雛鳥組のことを観察していると、翌日、商店街を襲撃する予定であることを聞かされる。"
3342829653 = "先を歩むもの"
349376399 = "夜、先生と一緒に水辺を散歩しながら、雛鳥組に潜入して感じたことを話すシュン。雛鳥組は無邪気な子供であったこと。そして、悪いことだからという理由で子供の可能性を潰してしまうのではないか、と苦悩を吐露する。"
1913700478 = "契約と移行（１）"
2335123540 = "スケバンを雇った雛鳥組が商店街を襲撃する。しかし情報を事前につかんでいたため、一行は迎え撃つ用意を整えていた。予期せぬ反撃にあい、思ったように進まない状況に雛鳥組の怒りのボルテージが上がっていく。これから、おしおきの時間が始まるとも知らずに。"
1366757191 = "契約と移行（２）"
2673225665 = "一行の活躍によって、雛鳥組の襲撃は食い止められた。一時はキキとして雛鳥組に潜入していたキサキが、改めて「門主」として雛鳥組に相対する。"
3317495373 = "時には必要なもの"
1796827446 = "門主の名を聞き狼狽える雛鳥組。お姉さんとしてココナがお説教を始めるものの、雛鳥組は聞く耳を持たず鬱憤を募らせていく。突然体調を崩したキサキが人質に取られてしまうが、シュンによる厳しい「訓育」が雛鳥組の子どもたちに下される。"
678885512 = "花火"
2167964134 = "雛鳥組の一件が片づき、商店街は平穏を取り戻した。一行は花火を眺めながら、思い思いに休暇最後の夜を楽しむ。"
1830524387 = "もうひとつだけ"
3214662401 = "渓谷から戻った一行を出迎えたカナエはフラフラだった。最善は尽くしたと言い残して、その場に倒れてしまうカナエ。一行は喧騒に包まれた山海経を見て嘆息しつつ、各々の日常へと戻っていくのだった。"
1299451717 = "知恵の蛇"
1275794928 = "エイミに連れられた先生は、特異現象捜査部の\n部長であるヒマリと出会う。\n先生は特異現象捜査部と共にキヴォトスの\nあちこちを探索し、未曽有の脅威である\nAI・デカグラマトンの真実に迫るのだった。"
