3010359674 = "Prólogo"
1110326374 = "Saori continua ganhando a vida com trabalhos de meio período hoje também. É então que ela recebe uma nova missão."
3131505734 = "O mar e Saori"
1113676227 = "Saori chega à 'Praia Fora da Lei'. No mesmo momento, os membros do Esquadrão Arius também visitam a praia."
441949426 = "A situação do Esquadrão"
1404198579 = "O Esquadrão, aproveitando o festival no local, descobre Saori. No entanto, eles se escondem para não serem vistos. Ao mesmo tempo, Saori também descobre o Esquadrão e decide se esconder. O Sensei acaba tendo que atender aos pedidos tanto de Saori quanto do Esquadrão."
2456204254 = "Sombras que se aproximam (1)"
4147584594 = "Saori foi contratada como assistente e guarda-costas de um DJ. No entanto, Saori recebe um tratamento irracional do DJ. Ao ver isso, o Esquadrão tenta dar uma lição no DJ, mas..."
986210830 = "Sombras que se aproximam (2)"
2661859098 = "O Esquadrão derrotou as delinquentes que apareceram de repente. Como resultado, a atitude do DJ em relação a Saori mudou completamente."
2631361917 = "Um yakisoba de verdade (1)"
4023902219 = "O Esquadrão para em uma barraca para almoçar. No entanto, eles ficam chocados com o preço extremamente alto. Por outro lado, Saori, que observava a cena, aproxima-se do funcionário da barraca que estava aplicando o golpe."
2708768266 = "Um yakisoba de verdade (2)"
1008490560 = "Após dar uma lição nos funcionários da barraca, Saori pede comida com o dinheiro que ela mesma ganhou. Vendo Saori feliz, o Sensei sugere que ela experimente o yakisoba."
3056220638 = "Torneio de Pistola d'Água do Grupo Capacete (1)"
1177447799 = "Convidada pelo Grupo Capacete, Saori acaba participando do torneio de pistola d'água por acaso. O esquadrão, por sua vez, decide dar cobertura secretamente para ela, mas..."
1175838457 = "Torneio de Pistola d'Água do Grupo Capacete (2)"
3181705269 = "Saori vence o torneio inesperadamente e parece não ter entendido bem a situação. O esquadrão já havia deixado o local antes disso."
1490045110 = "O Atacante das Sombras"
928632541 = "Devido às maquinações de alguém chamado 'Professor Sorriso', as delinquentes atacam o local do festival. Saori percebe o perigo e entra em ação."
1553518686 = "A Chegada de 'Ela'"
3175733890 = "As delinquentes, derrotadas por Saori, culpam o professor. No entanto, o professor apenas deixa escapar que 'ela' está vindo. Enquanto isso, Saori termina os preparativos finais para o palco de DJ, e o esquadrão chega para assistir ao ponto alto do festival: a apresentação do DJ. No momento em que o show está prestes a começar, um foguete é disparado repentinamente."
3164391228 = "A Delinquente Lendária"
1953496022 = "Quem apareceu foi Akemi Kurihama, a 'Delinquente Lendária', uma das Sete Prisioneiras. Saori se coloca no caminho dela, que pretende se vingar do Grupo Capacete."
2986551664 = "Esquadrão Arius, Reunido (1)"
359524290 = "Akemi, com uma nova determinação, e as delinquentes que se reuniram ao seu redor. Saori é encurralada, mas o esquadrão chega para ajudá-la."
865827266 = "Esquadrão Arius, Reunido (2)"
295929181 = "Akemi é derrotada. As delinquentes e Akemi recuam após serem convencidas pelo Professor Sorriso. Então, Saori, Atsuko, Hiyori e Misaki aproveitam a alegria do reencontro."
250762657 = "Yo DJ Pump This Party"
1864943768 = "Embora a confusão tenha acabado, o DJ fugiu, deixando o palco sob risco de cancelamento. Nesse momento, o Sensei e o esquadrão sugerem que Saori tente ser a DJ."
2999726945 = "Epílogo"
2853123530 = "No dia seguinte ao fim do festival, Saori e o esquadrão se despedem e seguem seus próprios caminhos novamente."
2091975198 = "Como o esquadrão aproveita o festival"
3830299729 = "O esquadrão passeia pelo local do festival. Nesse momento, Hiyori descobre um estande de jogos."
4149548158 = "Como o esquadrão se diverte com os jogos (1)"
1223695595 = "O esquadrão une forças para vencer o jogo."
2977933996 = "Como o esquadrão se diverte com os jogos (2)"
892975307 = "Após completar o nível iniciante, o esquadrão decide desafiar o nível intermediário."
3949984222 = "Como o esquadrão se diverte com os jogos (3)"
2151073382 = "Diante da batalha final, o esquadrão se prepara."
1988410608 = "Como o esquadrão guarda as lembranças"
1165010453 = "O esquadrão completa todas as etapas até o final. Nesse meio tempo, Hiyori acaba escolhendo um prêmio inesperado, mas..."
16088410 = "Sonho de Flores Lunares"
2023890876 = "Um evento de intercâmbio é realizado entre a Escola Secundária Shanhaijing e a Academia Red Winter. O evento prossegue com Kisaki e Cherino carregando suas próprias intenções e circunstâncias. Por outro lado, surgem alunas que se opõem ao evento, alegando que ele vai contra as tradições..."
