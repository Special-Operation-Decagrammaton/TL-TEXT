2656530785 = "風紀委員会行政官緊急特務命令"
3796114309 = "最近ヒナ委員長の様子がおかしく、さぞ疲れているに違いないと推測した風紀委員会の行政官アコ。そのため「風紀委員会の夏の合宿」という名目で海へと向かい、ヒナ委員長に夏休みをプレゼントしようと企画。キヴォトスの未来のため、緊急特務命令が発令されるのだった。"
2317210960 = "一難去らずにまた一難"
2558005236 = "夏の合宿訓練という名目で、アラバ海岸へと訪れた先生と風紀委員会一同。そこはゲヘナにおいて、かなり閑静な場所として知られている海……だったはずなのだが、なぜか4時間後にヘルメット団とスケバンの全面戦争が起きることが発覚。風紀委員会一同は、ヒナ委員長に知られないように何とかこれを処理しようと動くのだった。"
2633921 = "計画は往々にして崩れるもの"
3902657065 = "アコとイオリ、チナツを筆頭として、風紀委員会が問題児たちとの戦闘を繰り広げる中、先生はヒナの元へと訪れる。アコから委員長を部屋に留めておくようにと頼まれていたはずだったのだが、思ったよりも激化する戦闘に、先生もまた何度も呼び出されることに。先生はヒナを何とか誤魔化しつつ、繰り返し戦闘の指揮を執るのだった。"
2147970018 = "All for Hina"
793970726 = "思ったよりも規模の大きい全面戦争が予想され、ヒナ委員長に知らせるべきかと悩む一同だったが、せっかくの休暇を邪魔させるわけにはいかないとアコが断固として拒否。現状の戦力を鑑みるに何とか自分たちだけで対処できるはずだと、作戦の続行を宣言する。一方ヒナは、こうして海をじっくり見るなんて初めてだと口にしつつ、先生の方へと眼差しを向け……。"
1643965806 = "海で稀によくあること"
3515662738 = "先生と風紀委員会一同は奮戦の末、何とかヒナにバレないようにヘルメット団およびスケバンたちの撃退に成功。しかし安心したのもつかの間、新たな問題児集団が海辺に現れる。"
542833392 = "招かれざる美食研究会（１）"
127397515 = "海辺やお祭りなどで食べる焼きトウモロコシは、なぜあんなに美味しいのか……その理由を探るため、今回の全面戦争に際して焼きトウモロコシを売りに来たという美食研究会。委員長であるヒナの不在を見抜いた彼女たちは美食の研究を邪魔されてなるものかと、風紀委員会に銃を向ける。"
4024099259 = "招かれざる美食研究会（２）"
1954305915 = "先生の指揮もあり、美食研究会を退けた風紀委員会一同。歩行訓練を開始するも、これまでの戦闘で満身創痍の風紀委員たちでは、まともな訓練にはならなかった。そうして日が暮れていき……。"
2838267782 = "海辺に夜の帳は下りて"
228841159 = "諸々の騒動がひと段落し、夜の海辺を歩くヒナと先生。ヒナはどうやら、先生が風紀委員会のために裏で走り回っていたことに気が付いていたようで……。"
3471015555 = "飛んで火に入る夏の虫"
104590627 = "ヒナ委員長が水泳を教えてもらう時間を全力でサポートしようとする風紀委員会一同だったが、委員長の不在を狙って、結託したヘルメット団とスケバン集団、美食研究会、そして温泉開発部までもが登場し、海辺は完全に戦場へと化す。アコさえも半泣きで諦めかけたその時、どこからかヒナの声が聞こえるのだった。"
4288288614 = "風紀委員会vs問題児集団（１）"
1176279714 = "風紀委員長ヒナの指揮のもと、問題児たちの掃討が始まる。"
2434376056 = "風紀委員会vs問題児集団（２）"
2305285661 = "ヒナの圧倒的な力を前に、問題児たちは次々と撤退。彼女は風紀委員たちの方へと振り返り、「ホテルに戻ってすぐに反省会を行う」と告げるのだった。"
1470755374 = "この夏はまだ終わらない"
913863345 = "アコから経緯の説明を聞きつつ、ため息をつくヒナ。彼女は何だかんだゆっくりできたし悪くなかったと口にするものの、同時に「今からあらためて合宿を始める」と宣言。風紀委員たち一同が絶望する中、ヒナは先生に対して「埋め合わせはまた後で」と耳打ちし、静かに微笑むのだった。"
3595508161 = "風紀委員会 夏の合宿訓練 実践編"
612706856 = "どことなく締まりがない風紀委員たちの様子を見て、ため息をつくイオリ。その状況を見た風紀委員長代理のアコが「まず指示を出す者がお手本を見せるべき」と口にし、イオリが射撃訓練の見本を見せることに。"
2709915893 = "ネバーランドでつかまえて"
3067039180 = "梅花園の教官であるシュンが、サヤから受け取った「若返りの秘薬」を飲んで幼い頃の姿に戻ってしまった！身体の変化に伴って心も幼くなってしまった彼女は、山海経のあちこちで様々なトラブルを起こしてしまい……！？"
