#[ +++ ][Resumos dos episódios e seus títulos:]
#[ --- ][Capítulo 1:]
2575418392 = "Forças Especiais Fora de Controle"#[Episódio 1]
22033557 = "O Sensei é chamado pela Rin ao Conselho Estudantil Geral para corrigir erros em sua papelada. No meio disso, chega a notícia de que alunas da recém-fechada Academia Especial SRT ocuparam um parque e iniciaram um motim. Como nem mesmo a Valkyrie deu conta do recado, o Sensei é enviado para resolver a situação."

3594487595 = "Visitas Indesejadas"#[Episódio 2:1]
3574761045 = "Ao chegar ao local, o Sensei é inteirado da situação por Kanna, a Chefe do Departamento de Ordem Pública da Academia de Polícia Valkyrie. O parque foi ocupado pelo \"Esquadrão RABBIT\", uma equipe de calouras da Academia Especial SRT. Para detê-las, o Sensei decide entrar em combate ao lado de Fubuki e Kirino, do Departamento de Segurança Comunitária."

269659944 = "Visitas Indesejadas"#[Episódio 2:2]
3399601485 = "Seguindo os planos do Sensei, Fubuki, Kirino e as outras oficiais conseguem deter o Esquadrão RABBIT. Mesmo capturadas, as calouras não perdem o olhar de desafio. O Sensei pergunta a Kanna sobre o destino delas e descobre que passarão por um interrogatório na Valkyrie, no qual ele próprio poderá acompanhar caso tenha interesse……"

3925139788 = "As Circunstâncias de Cada Uma"#[Episódio 3]
3147943515 = "Enquanto as oficiais conduzem os interrogatórios, o Sensei fica encarregado de Miyako, a líder do Esquadrão RABBIT. Ele pergunta se falta algo para o seu conforto, mas a garota responde com frieza. Diante da determinação de Miyako em continuar lutando \"mesmo que a chance de vitória beire o zero absoluto\", o Sensei pergunta a Kanna se a restauração da Academia Especial SRT é realmente impossível, mas……"

3028720699 = "Por Trás dos Bastidores"#[Episódio 4]
2352385492 = "O Sensei é informado por Kaya, a Chefe do Escritório de Defesa do Conselho Estudantil Geral, sobre as origens e a situação atual da Academia Especial SRT. Ela explica que a restauração da escola é difícil. No entanto, querendo evitar que o futuro dessas alunas de elite seja jogado no lixo, Kaya promete manter o histórico estudantil do Esquadrão RABBIT intacto. Em troca, ela pede para o Sensei tentar conversar e convencê-las, mas……?"

2002976807 = "Desconfiança Duradoura"#[Episódio 5]
343907048 = "O Esquadrão RABBIT é libertado do interrogatório na Valkyrie. O Sensei lhes comunica sobre a soltura e propõe: \"Por que não vêm para a Schale?\", mas a oferta é veementemente rejeitada pelas garotas. Em vez disso, elas decidem retornar ao parque que usaram como base para os protestos, firmando a decisão de que viverão por lá."

1691499850 = "Em Busca de Suprimentos"#[Episódio 6]
1706575867 = "Na manhã seguinte, o Sensei vai verificar a situação do Esquadrão RABBIT e descobre que as garotas estão mortas de fome. Como elas recusam com unhas e dentes qualquer suprimento que venha diretamente da Schale por pura desconfiança, ele lhes entrega um papel com um endereço e avisa: \"Neste lugar, vocês conseguem comida de graça sem ligação com a Schale\". Meio desconfiadas, elas vão até o local e descobrem que a comida gratuita, na verdade, era lixo de \"marmita vencida de loja de conveniência\"……"

3423941325 = "Operação Cenoura (1)"#[Episódio 7]
3800690627 = "O próximo problema que o Esquadrão RABBIT enfrentou após resolver a falta de comida foi a higiene. Enquanto elas lamentam por não conseguirem tomar um banho decente, o Sensei sugere que, num acampamento, um banho de tambor de aço é a melhor saída. Percebendo que essa era a única opção viável, elas iniciam a \"Operação Cenoura\" para garantir um tambor."

1346916350 = "Operação Cenoura (2)"#[Episódio 8:1]
2689011259 = "O Esquadrão RABBIT inicia a \"Operação Cenoura\" para confiscar um tambor de aço descartado. Porém, Saki se rebela contra o comando de Miyako, deixando o clima tenso na equipe. Logo depois, Saki assume temporariamente a liderança, mas acaba se deparando com uma situação imprevista……"

1989812613 = "Operação Cenoura (2)"#[Episódio 8:2]
1658521241 = "Apesar de conseguirem despistar os seguranças do porto, o Esquadrão RABBIT perde o contato com Miyu. Inspiradas por uma ideia maluca do Sensei, Saki e Miyako se escondem dentro dos tambores de aço para escapar do campo de visão do inimigo e conseguem resgatar Miyu a salvo. De volta ao parque, as garotas finalmente aproveitam um merecido banho quente depois de tanto tempo."

4283874219 = "A Sombra Rastejante"#[Episódio 9]
2057607723 = "Certo dia, enquanto Kirino estava em patrulha, ela conta ao Sensei um boato sobre \"um grupo de andarilhos fortemente armados\". Relatos dizem que o bando estava roubando sucata na área do porto. Achando que os boatos sobre o Esquadrão RABBIT tinham sido apenas distorcidos, o Sensei inicia seu caminho de volta para a Schale, mas alguém bloqueia o seu caminho……?"

2671061263 = "Desapego Material e Marmita de Churrasco"#[Episódio 10:1]
1248308752 = "Quem sequestrou o Sensei foi um grupo de andarilhos autodenominado \"FeliSem\". Sob a bandeira do \"Desapego\", eles sobreviviam à base de marmitas vencidas, até que ficaram indignados por terem sua comida roubada pelo Esquadrão RABBIT, que tomou conta do parque. Eles tentam chantageá-las, mas as negociações falham. Atraído por um plano do Sensei, o Esquadrão RABBIT invade o esconderijo da \"FeliSem\"."

841964058 = "Desapego Material e Marmita de Churrasco"#[Episódio 10:2]
2664679563 = "Com o seu poder de fogo, o Esquadrão RABBIT neutraliza a \"FeliSem\" com sucesso. Prestes a saquear os espólios do inimigo, as cadetes são impedidas pelo Sensei, que pede: \"Por favor, não levem as coisas deles. Se precisarem de algo, eu mesmo compro\". Com sentimentos mistos, as alunas voltam para o parque sem roubar absolutamente nada."

4069006275 = "Alerta de Tempestade"#[Episódio 11]
3932457485 = "Uma tempestade severa e repentina atinge Kivotos. O parque onde o Esquadrão RABBIT estava acampado também inunda, derrubando até mesmo as estruturas que sustentavam a barraca. O clima de desistência toma conta da equipe, mas apenas Miyako se recusa a abaixar a cabeça, lutando na lama contra a enxurrada. Quando o Sensei mergulha na trincheira para ajudá-la, as outras alunas, uma a uma, também se levantam e juntas conseguem superar o dilúvio."

3138235130 = "Uma Fatura Encharcada"#[Episódio 12]
1105239486 = "O Sensei leva uma proposta de reparo de infraestrutura para o parque ao Conselho Estudantil Geral, mas o pedido é rejeitado pelas chefes, sob a justificativa de que \"não podem fornecer recursos oficiais para as alunas da SRT\". Além disso, ele descobre que a área estava marcada para reurbanização, inviabilizando qualquer \"reparo\". Até mesmo Kaya, a sua última esperança, nega ajuda. Mais tarde, Kaya se encontra com Kanna e lhe diz……?"

346541298 = "Inarizushi"#[Episódio 13]
283423853 = "No caminho para o parque, o Sensei conversa com uma vendedora de Inarizushi e descobre através de boatos que o Kaiser Group está por trás do projeto de reurbanização da Vila dos Coelhinhos. Com as sacolas de comida nas mãos, ele atualiza o Esquadrão RABBIT e discute sobre as opções que lhes restam."

2188950162 = "Escambo Bélico"#[Episódio 14]
1844122045 = "Decidindo que \"o primeiro passo é trocar as armas que afundaram na enchente!\", Moe toma a iniciativa. Como cliente VIP, ela tenta um escambo com a Kaiser Industry, mas descobre que um cliente anônimo rapou o estoque deles. Embora o negócio não tenha ido para frente, Moe consegue achar um outro comprador interessado na sucata usada no mercado clandestino."

1905614692 = "Uma Derrota Discreta, mas Dolorosa"#[Episódio 15]
3583459890 = "Logo após conseguir se rearmar, o Esquadrão RABBIT recebe a visita de Descartes, líder da \"FeliSem\". Ele implora avisando que o Escritório de Segurança Pública da Valkyrie o atacou com um armamento de ponta jamais visto. Sabendo que a Valkyrie está quebrada financeiramente, o esquadrão logo conclui que as contas não fecham…… quando de repente, Kanna aparece na frente delas."

3162953850 = "Propina"#[Episódio 16]
251338756 = "Kanna exige formalmente que o Esquadrão RABBIT saia do parque. Após contornar a situação, a equipe começa a especular e junta as peças: a Valkyrie só conseguiu esse arsenal pesado porque firmou um esquema de \"propina\" e corrupção com a Kaiser Corporation, que por sua vez está comandando a reurbanização da Vila dos Coelhinhos. Com o aval do Sensei, o esquadrão invade a fortaleza principal da \"Academia de Polícia Valkyrie\" em busca de provas da transação criminosa."

1172421243 = "Operação Trevo (1)"#[Episódio 17]
2241435022 = "Após se infiltrar na sede da Academia Valkyrie, o Esquadrão RABBIT vasculha o subsolo e acha os registros das transações ilegais no cofre de provas. Porém, um deslize de Miyu faz com que a porta pesada se tranque, deixando a equipe encurralada……?"

140507024 = "Operação Trevo (2)"#[Episódio 18:1]
3559020515 = "Trancadas no cofre de segurança máxima e incapazes de abrir a porta por dentro, o Esquadrão RABBIT entra em desespero. Culpando o seu próprio comando, a confiança de Miyako como capitã afunda. Mas com o incentivo do Sensei, ela cria coragem e ordena uma jogada brilhante: já que não podem abrir a porta, basta disparar o alarme de incêndio e forçar os próprios guardas a abrirem do lado de fora! A estratégia funciona, e elas conseguem escapar do cofre."

1348297398 = "Operação Trevo (2)"#[Episódio 18:2]
3884614313 = "Travando tiroteios intensos com as cadetes da Valkyrie que correram por causa do alarme, o Esquadrão RABBIT avança rasgando os corredores rumo ao ponto de extração no terraço. Sem hesitar, os olhos da equipe não transbordam mais insegurança, mas sim uma inquebrável confiança mútua."

3001093634 = "O Peso de ser Adulto"#[Episódio 19]
549448127 = "A pessoa que aguardava o Esquadrão no terraço era Kanna, a própria Chefe do Escritório de Segurança Pública. Diante da prova física da propina e do esquema de corrupção com o Kaiser Group, Kanna desabafa que \"é impossível sustentar a Justiça se você não estiver disposta a sujar as mãos\". Miyako responde dizendo que a diferença na forma como enxergam a \"Justiça\" é o que separa a SRT da Valkyrie. Com a \"Operação Trevo\" concluída, o Esquadrão RABBIT retorna a salvo para o parque."

1089763991 = "Toca da Raposa"#[Episódio 20]
2732075377 = "O escândalo do esquema de propina entre a Academia de Polícia Valkyrie e o Kaiser Group vem a público, e o projeto de reurbanização da Vila dos Coelhinhos é sumariamente cancelado. A paz parecia estar lentamente voltando para o Esquadrão RABBIT em seu parque. No entanto, nos bastidores, Kaya, do Escritório de Defesa do Conselho Estudantil Geral, prepara-se para colocar um plano terrível em ação em parceria com o \"Esquadrão FOX\"……"

#[ --- ][Capítulo 2:]
2657253984 = "O Sonho da Raposa"#[Episódio 1]
2098684420 = "Há 2 anos ―― Quando a Academia Especial SRT havia acabado de ser fundada. O Esquadrão FOX é visto executando uma operação de sabotagem com precisão letal em uma fábrica de munições da Kaiser Industry. De volta ao presente ―― o Esquadrão FOX, após realizar diversos atentados ocultos por Kivotos, começa a preparar as \"boas-vindas\" para as suas calouras."

3818520446 = "O Sonho do Coelho"#[Episódio 2]
252378376 = "Miyako tem um sonho ―― a visão inesquecível do motivo que a fez idolatrar a SRT no passado. Ao acordar e encarar a realidade, mais um dia da vida já rotineira do Esquadrão RABBIT acampando no parque se inicia."

1519446641 = "A Isca"#[Episódio 3]
2004501637 = "O Esquadrão RABBIT desfruta de um momento de pura alegria devorando um lombo de Wagyu que o Sensei trouxe de presente. Ao checarem as fitas de segurança da Schale daquele dia, elas notam invasores usando equipamentos exclusivos da SRT. Lembrando que haviam vendido essas armas no mercado negro recentemente, as garotas decidem caçar os culpados em segredo para lavar a própria culpa."

2488756278 = "Reencontro Inesperado"#[Episódio 4]
2671501519 = "Seguindo o sinal de GPS das armas, o Esquadrão RABBIT chega ao esconderijo inimigo. Embora o avanço tático comece bem, uma emboscada súbita derruba a comunicação das integrantes uma a uma. Finalmente isolada, Miyako acaba se deparando com uma pessoa que ela jamais esperava encontrar ali."

942163621 = "A Sombra da Veterana"#[Episódio 5]
3816355345 = "O Esquadrão RABBIT finalmente reencontra as suas veteranas do Esquadrão FOX. Comendo o famoso inarizushi caseiro preparado por Niko, elas botam o papo em dia. Contudo, o clima amigável logo desaba ―― quando Miyako questiona os motivos dos ataques recentes, Yukino impõe que elas sejam assimiladas pela FOX. Encurraladas, o Sensei surge na hora H, pede \"um tempo\" para elas pensarem e leva a RABBIT de volta ao parque."

2758921771 = "A Agonia das Calouras"#[Episódio 6]
4159709149 = "De volta ao Parque dos Coelhinhos, o Esquadrão RABBIT debate sobre o passado impecável da FOX e o que poderia ter mudado as veteranas de forma tão sombria. Neste exato momento, as sirenes do Conselho Estudantil Geral ecoam, e Kaya anuncia em rede nacional que assumiu o trono como a nova Presidente Interina no lugar de Rin."

1587683690 = "Golpe de Estado"#[Episódio 7]
1212060240 = "Algumas horas antes da transmissão de Kaya ―― Uma discussão feroz ardia na Sala de Conferências do Conselho Estudantil Geral sobre as punições à Kaiser. Após a reunião, Rin sofre uma emboscada política arquitetada por Kaya e é confinada. Dominando o conselho, Kaya toma para si a coroa de Presidente Interina."

520211906 = "Uma Nova Liderança Interina"#[Episódio 8]
3987261099 = "Atendendo à convocação, o Sensei visita a Presidente Interina Kaya. Ela tenta comprá-lo oferecendo uma nova \"Reestruturação Administrativa\" que daria poder absoluto e imunidade à Schale, mas o Sensei rejeita a oferta e o cinismo dela sem hesitar."

1497265820 = "Uma Nova Manhã em D.U."#[Episódio 9]
1641525659 = "Os novos Decretos Executivos entram em vigor, infestando o Distrito D.U. com tropas e blindados da Kaiser Security. Usando os decretos como desculpa, os mercenários da Kaiser arrastam cidadãos violentamente. Presenciando o fascismo nas ruas, o Esquadrão RABBIT tenta intervir, mas o General da Kaiser aparece, pregando sobre o valor do poder corporativo e da obediência."

1720696531 = "Fora de Controle"#[Episódio 10]
3618496825 = "A Presidente Interina Kaya inicia sua nova gestão, mas logo se vê estrangulada e em pânico tentando lidar com os incidentes e a burocracia que explodem por toda Kivotos. No meio desse caos, Minori e as operárias do Departamento de Obras Públicas de Red Winter iniciam um violento Golpe de Estado nos portões do Conselho."

115168734 = "Café Preto sem Açúcar"#[Episódio 11]
3651125542 = "A caminho do parque, o Sensei testemunha as blitzes extremas da Kaiser Security oprimindo civis nas ruas do D.U. A situação é temporariamente resolvida graças aos esforços de Kirino e à astúcia burocrática de Kanna, mas as feições das policiais permanecem sombrias. O Sensei logo descobre o tamanho do caos e da repressão que as novas leis de Kaya estão causando por toda a cidade."

2609050753 = "Resolução Inabalável"#[Episódio 12]
1905103418 = "O Sensei finalmente chega ao Parque dos Coelhinhos, mas encontra o acampamento completamente vazio. Através de uma carta de despedida deixada por Miyako, ele descobre que o Esquadrão RABBIT se rendeu e decidiu se juntar às veteranas do Esquadrão FOX."

1718431036 = "Choque e Pavor"#[Episódio 13]
1319244017 = "Com o Distrito D.U. e o Conselho afundados em greves e desordem pelos novos decretos, Kaya convoca o General da Kaiser e Yukino, a Capitã do Esquadrão FOX, ordenando que eles executem um plano de destruição implacável para instaurar o terror absoluto."

3006987774 = "O Dilema do Prisioneiros"#[Episódio 14]
2130705949 = "Ao retornar tarde da noite para a Schale, o Sensei descobre que o suprimento de marmitas da Angel 24 foi bloqueado por causa do cerco econômico da Kaya. De estômago vazio em seu escritório, ele é surpreendido pela invasão do Esquadrão FOX, que arromba a porta para entregar inarizushis e acaba revelando, nas entrelinhas, a localização secreta do Esquadrão RABBIT."

1786519907 = "A Justiça da SRT"#[Episódio 15]
1305326365 = "Sob a guarda das veteranas, o Esquadrão RABBIT desfruta de banhos quentes, comida de verdade e camas seguras. Apesar da vida tática parecer perfeita agora, um vazio e uma inquietação pesam no coração de Miyako, que acaba sendo surpreendida pela visita furtiva do Sensei durante seu turno de vigília noturna."

2062986205 = "As Razões do Sensei"#[Episódio 16]
4072771013 = "Na sala de interrogatório, Miyako desabafa com o Sensei, tentando justificar que seguir Kaya para reviver a SRT foi o melhor cálculo para a equipe, embora seus olhos ainda transbordassem hesitação. Instigada pelas palavras do Sensei, e após ouvir da própria Yukino o plano genocida para detonar a Estação dos Coelhinhos, Miyako decide abraçar a sua verdadeira Justiça e rompe com a FOX sozinha."

2788876369 = "Caminhada Noturna em Sedas de Gala"#[Episódio 17]
318148566 = "Na manhã seguinte, Miyako se reencontra com o Sensei no parque abandonado. Ela relata que a FOX planeja detonar uma bomba letal no subsolo da estação civil, e declara que invadirá o local para impedi-las. O Sensei marcha junto com ela até a Estação dos Coelhinhos ―― onde eles acabam dando de cara com Descartes, agora um recruta fardado da Kaiser Security."

1554714519 = "Elite Contra Elite"#[Episódio 18:1]
1900114770 = "Descartes desperta sua fúria revolucionária e lidera a Irmandade FeliSem para servir de isca na invasão de Miyako, mas a força bélica dos mercenários logo começa a esmagá-los. No momento em que a derrota parecia certa, Kanna, Fubuki e Kirino surgem atirando e viram o jogo."

347599141 = "Elite Contra Elite"#[Episódio 18:2]
552425972 = "Com o apoio vital da inesperada aliança com a Valkyrie, Miyako e o Sensei conseguem despistar e abater o bloqueio da Kaiser Security no saguão. Após Miyako elogiar a precisão brutal do CQB de Kirino, ela e o Sensei correm escadaria abaixo rumo à escuridão do subterrâneo da estação."

4105357213 = "O Abismo"#[Episódio 19]
2925617176 = "Nas profundezas do subsolo, Miyako e o Sensei se deparam com um gigantesco silo secreto. A presença de luzes químicas jogadas no chão confirma que o Esquadrão FOX já os aguarda lá embaixo. Quando o drone de Miyako é abatido por Otogi e as veteranas a encurralam pelo rádio, tudo parece perdido ―― até que Saki, Moe e Miyu emergem das sombras para lutar ao lado da Capitã."

965452976 = "Caverna de Caerbannog (1)"#[Episódio 20:1]
1568447496 = "O Esquadrão RABBIT dá início à Operação \"Os Coelhos de Caerbannog\". Com os olhos faiscando de uma confiança inabalável em suas companheiras, Miyako declara com força que um plano de recuo não existe. Carregando os ideais e o peso do amanhã no peito, o choque violento entre o Esquadrão RABBIT e a FOX explode."

1976030888 = "Caverna de Caerbannog (1)"#[Episódio 20:2]
3156367598 = "Enfrentando as veteranas imbatíveis da FOX, as calouras da RABBIT usam as próprias táticas extremas que aprenderam com elas para virar o jogo. Com puro esforço e uma evolução monstruosa no campo de batalha, as integrantes da FOX são incapacitadas uma a uma. Rompendo as defesas, o Esquadrão RABBIT alcança o elevador que desce para a Sala de Operações."

892239188 = "Caverna de Caerbannog (2)"#[Episódio 21]
2435344861 = "Sabendo que a sua linha de defesa foi pulverizada, Yukino ordena que as integrantes caídas da FOX evacuem e se salvem. Na porta da Sala de Operações, Yukino ameaça detonar a ogiva e incinerar o silo caso a RABBIT dê mais um passo. Contudo, Miyako e suas calouras ignoram o blefe fatal e chutam a porta do núcleo sem hesitar."

3979027752 = "Nós de Ontem e do Amanhã"#[Episódio 22:1]
1693248650 = "No exato segundo em que Yukino se preparava para apertar o botão da bomba ―― as outras integrantes da FOX chegam feridas à sala, recusando-se a abandonar a amiga à própria sorte e à morte. Assim, a batalha final e decisiva entre o Esquadrão FOX e o Esquadrão RABBIT se inicia na Sala de Operações."

3373122807 = "Nós de Ontem e do Amanhã"#[Episódio 22:2]
2860466848 = "Após uma intensa troca de fogo e sangue, o Esquadrão RABBIT derrota a FOX. Miyako relata a Yukino o quanto a Justiça inabalável da veterana inspirou os seus sonhos no passado. Esmagada pelas responsabilidades que assumiu, Yukino afirma que deve afundar com o peso de seus crimes, mas o Sensei a conforta, ensinando como um adulto de verdade deve lidar com o fardo das próprias escolhas."

3729157719 = "O Fim do Golpe"#[Episódio 23:1]
875871241 = "Ao receber a notícia de que o Esquadrão FOX falhou no atentado, Kaya entra em pânico e tenta usar todo o exército da Kaiser Security ―― no entanto, as forças mercenárias são facilmente massacradas pela fúria do Esquadrão RABBIT nos portões do Conselho Estudantil."

2757905344 = "O Fim do Golpe"#[Episódio 23:2]
340280301 = "O Sensei e o Esquadrão RABBIT chutam as portas da Presidência Interina e encurralam Kaya. Ela ainda tenta subornar e manipular o Sensei com discursos vazios, mas, com todas as suas conspirações de sangue e propina expostas, ela é formalmente destituída do trono e expulsa de sua posição de poder."

696032468 = "Epílogo"#[Episódio 24]
253503154 = "A poeira finalmente baixa em Kivotos ―― Kaya sofre impeachment e todos os envolvidos na corrupção são encarcerados. Enquanto cumpre sua rotina no Departamento Correcional, Niko recebe sorrateiramente uma entrega especial: uma carta de Miyako e um pacote de marmitas. Lendo as palavras de suas queridas calouras, Niko abre um sorriso caloroso e aliviado."

