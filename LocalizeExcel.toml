3774576463 = "Ex: A Caça às \"Lores\""
561204670 = "Fenômenos Singulares Anômalos: o \"Lore\".\n\rUm fenômeno singular anômalo\nde origem desconhecida que começou\na surgir por toda Kivotos.\n\rSerá que o Esquadrão FOX\nconseguirá resgatar as alunas desaparecidas\n\re recuperar \"os dias de paz?\""

#[ +++ ][Sinopse de inicio dos capítulos:]
2425389763 = "A Miragem do Meio-Dia"
1157145156 = "Em dias tão quentes que a miragem sobe do chão\nCuidado com as atividades ao ar livre!\n\rE, mesmo que você aviste um \"Espantalho Branco\" se contorcendo no meio da rua……\n\rJamais olhe diretamente para ele……"

3065626693 = "O Que Espreita Dentro do Tambor de Aço"
237435633 = "A lenda urbana de um caranguejo gigante\nque devora absolutamente qualquer coisa que esteja em seu caminho\n\rSe, à noite, você ouvir um som de eco metálico de um tambor rolando\njunto com o estalar de pinças, não hesite.\n\rApenas corra pela sua vida."

