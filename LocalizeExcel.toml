2859412133 = "Após afastar a Gangue do Capacete, a Empresa de Conveniência 68 retoma a perseguição aos Kaiten Rangers."
729440909 = "Os intrusos se reúnem (1)"
350982557 = "Não apenas a Gangue do Capacete, mas também delinquentes e mercenários começam a mirar a caixa de oferendas. Com a entrada de muitas facções, a situação se complica."
2755401990 = "Os intrusos se reúnem (2)"
3528072125 = "O administrador do 'Daikichiden', Kamejima Goro, declara que 'dará o conteúdo da caixa de oferendas para quem capturar os Kaiten Rangers'. Isso é amplamente divulgado, e descobre-se que muitas pessoas estão de olho na caixa."
2205291367 = "Comitê de Disciplina entra em ação (1)"
1888035674 = "O Comitê de Disciplina, que veio para acalmar a confusão, se interpõe diante da Empresa de Conveniência 68 que perseguia os Kaiten Rangers. Devido ao histórico, o Comitê de Disciplina considera a Empresa de Conveniência 68 como inimiga e entra em combate."
2183154251 = "Comitê de Disciplina entra em ação (2)"
2198410486 = "Com as informações do Comitê de Disciplina, descobre-se que a confusão foi uma fraude de uma organização chamada Kurogame. O boato de que 'os desejos se realizam' era mentira, tudo uma encenação para lavagem de dinheiro."
4010527531 = "A razão para recuperar"
3968629623 = "Mesmo sabendo que tudo era fraude, Aru decide recuperar a caixa de oferendas para não manchar os sentimentos que cada um depositou em seus desejos. O grupo reencontra os Kaiten Rangers e começa a luta."
3598038673 = "Por um triz (1)"
409425870 = "O grupo consegue recuperar a caixa de oferendas. No entanto, Kamejima Goro volta atrás e declara que não entregará a caixa à Empresa de Conveniência 68. Tenta tomá-la à força."
569618432 = "Por um triz (2)"
653310391 = "Apressadas pelo número da Kurogame, Aru e as outras ficam em desvantagem. Aproveitando a brecha, Kamejima Goro e a Kurogame roubam a caixa de oferendas e fogem. Quem os impede é Hoshino, da Escola Secundária Abydos."
3680934526 = "Comitê de Contramedidas, reúnam-se!"
4177381587 = "Sabendo do perigo de Serika, sua kouhai, os membros do Comitê de Contramedidas de Abydos se reúnem. Com a ajuda delas, o grupo vira a maré e contra-ataca."
3434302330 = "Sinal da retaliação"
1459348410 = "Com o estratagema de Mutsumi, a conspiração é exposta, e Kamejima Goro se torna alvo da raiva das pessoas. Sem dar tempo para fugir, o grupo ataca a base da Kurogame."
685949528 = "Batalha de defesa do Daikichiden (1)"
2152576060 = "Com a ajuda do Comitê de Contramedidas e do Comitê de Disciplina, a Empresa de Conveniência 68 e Serika enfrentam novamente Kamejima Goro. Sem para onde fugir, começa a batalha final."
121004998 = "Batalha de defesa do Daikichiden (2)"
2286166571 = "A Empresa de Conveniência 68 e Serika derrotam Kamejima Goro e recuperam a caixa de oferendas. Mas está vazia. O conteúdo já havia sido roubado pelos Kaiten Rangers."
3697449286 = "Kaiten Rangers, a batalha final! (1)"
151256718 = "O amado robô KAITEN FX Mk.0 caiu na luta contra os vilões (?). Mas com paixão ardente, determinação firme e fundos suficientes, os Kaiten Rangers podem se erguer quantas vezes forem necessárias! Agora, é hora da revanche, KAITEN FX Mk.1!"
1278198911 = "Kaiten Rangers, a batalha final! (2)"
755111408 = "A Empresa de Conveniência 68 e Serika derrotam os Kaiten Rangers. Mas isso também significa que eles próprios destruíram sua própria oferenda. Aru fica atônita. Parece que este ano será como o anterior."
801389629 = "Desejo de Ano Novo (1)"
4014731644 = "Embora a Kurogame tenha sido destruída, os vilões, uma vez despertados para a ganância, não se conformam. Serika e o Sensei são perseguidos para lidar com a Gangue do Capacete, que se agita lamentando a caixa de oferendas que não conseguiram."
2841804487 = "Desejo de Ano Novo (2)"
3280902185 = "Serika não recebe o pagamento do meio período, e a Empresa de Conveniência 68 também sai no prejuízo. Mas, como o que passou, passou, eles visitam o templo novamente e recebem o Ano Novo com sensação de renovação."
3791568720 = "Patrulha Feliz do Dia dos Namorados no Schale"
1219956127 = "O Dia dos Namorados chegou a Kivotos! O Sensei é levado por Kirino e Fubuki para percorrer o local do evento, ainda mais movimentado que nos anos anteriores. Começa o dia decisivo do amor das garotas!"
3216935680 = "Trabalho do Dia dos Namorados (1)"
1295044406 = "Trabalho do Dia dos Namorados (2)"
1950903634 = "Mesmo depois do Dia dos Namorados"
576446100 = "Feliz Dia dos Namorados……?"
3678945063 = "Medidas de segurança"
1737805373 = "O oyakodon definitivo!?"
3433131004 = "Atividade de resgate com cenoura e chicote"
2246879745 = "Este mundo está errado"
1009008909 = "Feliz Dia dos Namorados!"
3775021891 = "Trabalho do Dia dos Namorados (1)"
1872607528 = "No distrito de D.U., eventos de grande escala acontecem um após o outro. A pedido de Fubuki e Kirino, da Academia de Polícia Valkyrie, o Sensei começa o trabalho de patrulha."
1521429380 = "Trabalho do Dia dos Namorados (2)"
3051470549 = "O evento pacífico deveria terminar com o ataque repentino de 'Raposa da Desgraça' Kurosaki Wakamo. No entanto, com a ajuda de Sena, que estava por perto, Kirino e as outras conseguem subjugar Wakamo. Wakamo é detida, e o divertido Dia dos Namorados recomeça."
4125302622 = "Mesmo depois do Dia dos Namorados"
2631208014 = "Embora Wakamo tenha escapado, a confusão é contida sem maiores problemas. O Dia dos Namorados termina pacificamente. No dia seguinte, o Sensei interage com as alunas que refletem ou lidam com as consequências. Entre elas, está 'Kurosaki Wakamo'."
1047327753 = "Feliz Dia dos Namorados……?"
410407804 = "No Dia dos Namorados, a Ordem dos Cavaleiros de Resgate decide distribuir chocolates aos cidadãos. Quando o ambiente estava calmo, de repente, uma explosão ocorre. Os delinquentes começam a se agitar, e a área entra em pânico. A Ordem decide iniciar uma 'atividade de resgate' com Mine como eixo principal."
3981192346 = "Medidas de segurança"
1150264065 = "Chihiro explica calmamente o conceito de segurança para o Centro Correcional de Valkyrie. Embora diga que construiu uma nova segurança, Wakamo aproveita a brecha e destrói fisicamente a porta, fugindo."
2499107451 = "O oyakodon definitivo!?"
1609115689 = "Um cozinheiro de oyakodon, sentindo seu limite, sai para pesquisar novos sabores. No entanto, não encontra novas inspirações – então, pede ajuda a Suzumi, que por acaso está passando. A ideia de Suzumi dá uma nova inspiração ao cozinheiro, e finalmente nasce o novo prato de sua autoria."
1290044481 = "Atividade de resgate com cenoura e chicote"
4077437065 = "Embora os marginais tenham sido subjugados pela atividade de resgate de Mine, o Departamento de Segurança ainda não se move. Enquanto Mine protesta vigorosamente sobre o motivo, Wakamo escapa novamente."
3224852679 = "Este mundo está errado"
2737288181 = "Uma delinquente, que busca uma vida livre, está insatisfeita com as saias antiquadas. Ao ouvir isso, Wakamo faz uma proposta – então a delinquente se agita novamente com uma aparência completamente nova."
1674653734 = "Feliz Dia dos Namorados!"
3425508891 = "Enquanto Wakamo prepara itens falsos e causa confusão por toda parte, ela se encontra com Mine. Mine pergunta por que ela está causando confusão – Mine sorri e cede o caminho para apoiá-la. Assim, ela recomeça a 'atividade de resgate' contra o problema que continua se agitando."
153995850 = "No Dia dos Namorados, a Ordem dos Cavaleiros de Resgate distribui chocolates. Será que este Dia dos Namorados terminará bem……?"
1099429423 = "Para garantir a segurança, Chihiro parece estar explicando desde os conceitos básicos……"
1299607610 = "Um cozinheiro de oyakodon em busca do sabor definitivo sai pela cidade. Será que encontrará a resposta?"
2424829376 = "Qual será a razão pela qual o Departamento de Segurança não pode se mover, mesmo durante a fuga de Wakamo?"
1073833967 = "O que uma delinquente, que não aguenta mais essa aparência, ouve como conselho de Wakamo?"
2783498663 = "Mine e Wakamo finalmente se encontram – será que essa confusão será resolvida em paz?"
3145939835 = "O silêncio e o banquete de Kurosaki Wakamo"
3731216719 = "Kurosaki Wakamo, uma das 'Sete Prisioneiras' apelidada de 'Raposa da Desgraça', apareceu. Rindo da segurança cerrada, destruindo os obstáculos, ela corre pela cidade. Com o rosto escondido sob a máscara……"
3487882084 = "Ataque um (1)"
2174923451 = "Ataque um (2)"
1269429059 = "Ataque dois (1)"
37429416 = "Ataque dois (2)"
648736061 = "Ataque três (1)"
3017487652 = "Ataque três (2)"
543422608 = "Ataque quatro (1)"
1454069515 = "Ataque quatro (2)"
3483561865 = "Ataque cinco (1)"
1562212096 = "Ataque cinco (2)"
3800514801 = "Desfecho (1)"
3387719790 = "Desfecho (2)"
1243671927 = "Ataque um (1)"
1765541951 = "O Sensei retoma a patrulha com Sena. Enquanto aproveitam o Dia dos Namorados sem mortos ou feridos, recebem a notícia da explosão de um veículo da Valkyrie que se dirigia ao centro correcional. E a informação da fuga de Wakamo."
1900873261 = "Ataque um (2)"
683219944 = "O Sensei consegue subjugar Wakamo novamente. Chihiro, a vice-presidente do Veritas, que passava por ali, fica espantada com o sistema de segurança da Valkyrie, que teve seu equipamento roubado facilmente. Independentemente disso, Wakamo é detida, e o divertido Dia dos Namorados recomeça."
840551407 = "Ataque dois (1)"
402624026 = "Wakamo é levada ao centro correcional e interrogada por alunos da Valkyrie. Mas ela se recusa a depor. Minutos depois, o Sensei recebe a notícia da fuga de Wakamo."
3108015082 = "Ataque dois (2)"
280082844 = "O Sensei consegue subjugar Wakamo novamente. Fubuki e Kirino prometem prendê-la em uma instalação ainda mais segura e vão embora. Independentemente disso, Wakamo é detida e o divertido Dia dos Namorados recomeça."
54235112 = "Ataque três (1)"
1970556472 = "Wakamo é levada novamente ao centro correcional. O que a aguarda é uma forçosa (?!) extração de confissão pela Valkyrie. Minutos depois, o Sensei recebe a notícia da fuga de Wakamo."
386374787 = "Ataque três (2)"
2831782328 = "O Sensei consegue subjugar Wakamo novamente. A Academia de Polícia Valkyrie reconhece os problemas de seu sistema de segurança e promete progredir. Independentemente disso, Wakamo é detida e, desta vez com certeza, o divertido Dia dos Namorados recomeça."
550139806 = "Ataque quatro (1)"
1230415696 = "Wakamo é levada novamente ao centro correcional…… ou assim parece, mas ela já havia escapado antes mesmo do interrogatório. Minutos depois, o Sensei recebe a notícia da fuga de Wakamo."
720305737 = "Ataque quatro (2)"
1323540802 = "O Sensei consegue subjugar Wakamo novamente. Fubuki e as outras nem conseguem entender como ela escapou. Independentemente disso, Wakamo é detida e o divertido Dia dos Namorados recomeça."
2123615289 = "Ataque cinco (1)"
3848127601 = "O Sensei percorre os eventos com Sena e interage com os moradores. Enquanto sente os laços construídos dia após dia, imagina o objetivo de Wakamo. Minutos depois, o Sensei recebe a notícia da fuga de Wakamo."
1033382974 = "Ataque cinco (2)"
1187005141 = "O grupo consegue subjugar Wakamo novamente. Chihiro fica espantada com as sucessivas fugas. Como medida, alunos que enfrentaram Wakamo no passado se reúnem. O sistema de segurança da Valkyrie será revisado radicalmente. De qualquer forma, Wakamo é detida e, agora sim, o divertido Dia dos Namorados recomeça."
3607426443 = "Desfecho (1)"
347985138 = "Em um sistema de segurança perfeito, Fubuki e as outras começam a interrogar Wakamo. No entanto, o que veem são inúmeras 'Wakamos' refletidas nas câmeras de vigilância."
1076189635 = "Desfecho (2)"
1975218181 = "Eliminando todos os alunos com armadilhas, mergulhando o D.U. na confusão, Wakamo finalmente se encontra cara a cara com o Sensei. E então, entrega-lhe um chocolate. Aparentemente, foi amor à primeira vista."
2041289632 = "Promessa de Dia dos Namorados"
652737147 = "O desafio de Momoka"
1282114892 = "Aparentemente, Momoka só come salgadinho de batata sabor mentaiko. Seguindo a recomendação do Sensei, ela tenta outro sabor, mas parece que não agradou. Aproveitando o Dia dos Namorados, Momoka lhe empurra um salgadinho sabor chocolate pela metade."
2041407386 = "Erro de pedido"
3986078636 = "Devido a um erro de pedido, Sora fica com um grande estoque de chocolate. Com a ajuda do Sensei, ela faz promoção e venda no balcão, conseguindo vender tudo. Sora entrega o último que sobrou ao Sensei como agradecimento."
3858941682 = "Lanche da administradora"
947066316 = "Rin aponta rigorosamente um erro no relatório escrito pelo Sensei. Ao perceber que o erro se deve à falta de sono, ela lhe dá um chocolate para resolver. Só depois se lembra de que hoje é Dia dos Namorados."
4205941856 = "É o chocolate de Dia dos Namorados da Arona!"
1876151316 = "No Dia dos Namorados, que acontece uma vez por ano, Arona presenteia o querido Sensei com biscoitos de chocolate caseiros que ela mesma fez com todo carinho."
3540623104 = "Novos produtos de chocolate!"
1167271857 = "Hifumi tenta obter um item limitado do Peroro-sama em comemoração ao Dia dos Namorados. Como só pode comprar em casal, ela finge ser casal com o Sensei, que por acaso passava. Eles dividem o item que conseguiram comprar."
407134817 = "Chocolate de atiradora"
3908488518 = "Mashiro, arrumando o depósito do Comitê de Justiça, encontra um chocolate de emergência. Simpatizando com o conceito, ela entrega o chocolate ao Sensei."
1648025321 = "O melhor revigorante"
4001398665 = "Hanae, preocupada com o Sensei que só trabalha sem dormir, lhe dá uma bebida super concentrada de cafeína como 'o melhor revigorante', mas o Sensei pede para transformar em chocolate quente, pois beber aquilo faria mal."
1783916805 = "Graxa e chocolate"
3015827395 = "O Sensei, ao visitar o Comitê de Disciplina, pega uma lata que Iori deixou cair. Iori brinca: 'é graxa, mas pode lamber', mas quando o Sensei realmente lambe, ela estranha. Descobrem que o que caiu não era graxa, mas chocolate, e Iori acaba dando a ele."
3747656773 = "Torneio de comer muito chocolate"
3180753048 = "Preparando-se para o torneio de comer muito chocolate na rua comercial, Akari começa um treino especial com o Sensei. Akari lhe dá uma grande quantidade de chocolate, mas, claro, ele não consegue comer tudo."
1571250681 = "O gourmet azarado"
2808579933 = "Junko visita uma nova loja de doces japoneses apresentada pelo Sensei. Quando tenta comer o dango de chocolate, a Gangue do Capacete invade. Mais uma vez, o dango de Junko cai no chão."
4245935983 = "Canção de amor do armário"
172507543 = "Kayoko compra uma nova música de sua banda favorita e, ao mesmo tempo, ganha um chocolate em forma de caveira do vendedor como presente de Dia dos Namorados. Sem saber o que fazer, ela entrega o chocolate ao Sensei."
2795715699 = "Perdido na cidade"
716546020 = "O Sensei, que errou a conexão e se perdeu a caminho de Abydos, é ajudado por Shiroko, que passa por ali, e ganha uma barra de chocolate para combater a baixa de açúcar."
105274267 = "Mar de chocolate"
3213219445 = "Hoshino visita um museu marinho com o Sensei e compra uma lembrança. Ela compra um conjunto de chocolates em forma de peixe e dá ao Sensei a baleia de que mais gostou."
4290912609 = "Presente não intencional"
3601590273 = "Aproveitando que havia muito chocolate à venda, Ayane dá um ao Sensei por tudo o que ele faz. No entanto, ao lembrar que hoje é Dia dos Namorados, ela começa a se justificar apressadamente."
2815944483 = "Lanche da eficientista"
1093584961 = "Aymi compra em grande quantidade um chocolate de formato que ninguém mais compra por ser 'eficiente'. Ela também dá um desses chocolates ao Sensei, mas ele fica sem graça."
2517355120 = "Seu estômago……"
2476241868 = "Kotama dá ao Sensei um chocolate com um grampo escondido. Quando ele se recusa a comer, ela tenta enfiá-lo goela abaixo à força."
3262523879 = "Plantão doce"
3361121614 = "Quando Chihiro termina o trabalho, o Dia dos Namorados está quase no fim. Depois que as lojas fecham, tarde da noite, ela lhe dá uma bebida achocolatada comprada na máquina de venda automática."
2975198628 = "O limite da contabilidade"
1238138106 = "Yuuka se preocupa com o 'preço adequado' do chocolate para dar ao Sensei. No final, ela usa o pagamento parcelado para fazer um chocolate caro parecer de preço adequado."
3223164587 = "Item de evento"
2932463976 = "Yuzu se dedica a um jogo com o Sensei. Após matar o chefe com muito esforço (?), ela lhe dá de presente um item de chocolate de edição limitada."
3467542474 = "Chocolate da Aris"
662108209 = "Aris ouve que, no período do Dia dos Namorados, consumir chocolate concede um bônus de experiência especial. Ela decide consumir chocolate também na vida real para subir de nível. E dá ao Sensei um chocolate em forma de monstro para ele também subir de nível."
2032134810 = "Bebida energética especial"
2179793648 = "Hare oferece ao Sensei, como despertador, o sabor chocolate do 'Yokai MAX', produzido com exclusividade para o Dia dos Namorados. Embora a edição limitada seja importante, ela não se importa em dar para ele."
1069251704 = "Deixe o mundo mais doce!"
2353333921 = "Maki prega uma peça no Sensei com um spray de chocolate comestível. Aparentemente, ela vai usar o spray para fazer grafites e encher a cidade com cheiro de chocolate."
3143861320 = "Bombardeio romântico"
2670246882 = "Hibiki desenvolveu um projétil que espalha chocolate no ponto de impacto. Ela planejava um experimento atirando em algum lugar da cidade, mas, quando o Sensei a impede, ela lhe dá o projétil de presente."
640366726 = "Parafuso falso"
3523245412 = "Utaha veio consertar a fiação do Schale, mas fica confusa quando os parafusos que trouxe começam a quebrar um após o outro. Ao verificar, descobre que são chocolates em forma de parafuso."
3615648569 = "Chocolate do bigode"
1699188027 = "Cherino se gaba do chocolate ao leite especial de Red Winter, 'Cheryomushka'. Quando tenta dar um ao Sensei, não há estoque devido à baixa produção, então ela lhe dá um chocolate mordido."
3793419012 = "Produto especial da Federação Escolar Red Winter"
4255053213 = "Tomoe modificou secretamente o chocolate ao leite especial de Red Winter, 'Cheryomushka'. Ela dá ao Sensei um protótipo com a embalagem com a ilustração fofa de Cherino."
3368181863 = "Chocolate do pobre"
32065340 = "Nodoka tenta dar chocolate ao Sensei, mas só consegue um cacau cru. Quando ela lamenta sua falta de recursos, o Sensei morde o cacau cru."
1194017029 = "Poção sabor chocolate"
3059649371 = "Saya desenvolveu uma 'poção da imortalidade' concentrando uma grande quantidade de chocolate. Infelizmente, também desta vez fracassou, e o resultado foi um sabor e efeito de chocolate comum."
4072309002 = "Chocolate de adulto"
3055755811 = "Shun fica bêbada com o rum bombom que comprou como lanche. Vendo isso, o Sensei recolhe os bombons, mas Shun fica satisfeita por ter 'dado chocolate ao Sensei naturalmente'."
1894276114 = "Algemas falsas"
3212670461 = "Kirino comprou algemas de chocolate 'para poder quebrá-las facilmente se se prender'. O Sensei a aponta que os criminosos também poderiam escapar, e ela, desanimada, lhe dá as algemas de chocolate."
3227313292 = "Um ano depois"
695495392 = "No Dia dos Namorados, Fubuki aguarda ansiosamente 'a pessoa que está esperando há tanto tempo'. Quem toca a campainha e entra é o Sensei e um entregador com os donuts de edição limitada do Dia dos Namorados."
1177032401 = "Garota emotiva"
3398993891 = "No Dia dos Namorados, Hanako chama o Sensei. Ela lhe entrega o presente e, envergonhada, vai embora rapidamente. Depois, ao abrir a caixa, encontra um chocolate inesperado."
3016052351 = "Um pequeno mas doce passo"
4211334058 = "Hasumi está em apuros com a montanha de chocolates que recebeu com gratidão das alunas de Trinity. Ela pede ajuda ao Sensei, mas ele recusa, dizendo que 'são para você'. Hasumi muda de ideia e dá ao Sensei apenas o chocolate que ela mesma preparou."
1196745069 = "Mesmo assim, quero dar"
2486835713 = "Hina entrega um chocolate caseiro ao Sensei. Embora se desculpe pelo formato feio que parece com ela, ao ver o Sensei radiante, ela suspira aliviada, embora um pouco contrariada."
2153765396 = "De qualquer forma, preparei!"
1349047534 = "Ako dá um chocolate ao Sensei como recompensa enquanto ele faz o trabalho burocrático do Comitê de Disciplina. Quando o Sensei percebe que é caseiro, Ako reclama mas pede sua opinião."
2924359616 = "O método para fazer o melhor chocolate"
1842651911 = "Izumi invade a cozinha para fazer o melhor chocolate. Usando ingredientes imprevisíveis, ela cozinha com o Sensei e, como resultado, consegue uma refeição deliciosa."
337670640 = "Uma recompensa sincera"
1256516418 = "Como recompensa pela cooperação diária, Aru dá ao Sensei um chocolate de altíssima qualidade. Era um item bastante caro, mas era uma fraude com indicação de preço injusta. Aru se levanta para se vingar com o Sensei."
2584656396 = "Chocolate roleta russa!"
1642941794 = "Mutsumi traz um chocolate roleta russa onde 'um deles é extremamente picante'. O Sensei aceita o desafio, mas come o chocolate picante e cai. Ao final, descobre que caiu na pegadinha de Mutsumi, que 'trocou todos por chocolates picantes'."
2303027701 = "Sentimentos especiais em um dia especial"
2807414059 = "Preocupada com a alimentação desregrada do Sensei no Dia dos Namorados, Fuuka lhe traz um bento. Após a refeição, ela lhe dá um chocolate quente, e a caneca é um par."
2115727613 = "Os sentimentos de uma garota não desbotam"
1271327959 = "No Dia dos Namorados, o chocolate que Juri lhe dá tem gosto normal. Quando o Sensei pergunta, Juri tenta fugir, dizendo que falhou. Mesmo assim, o Sensei come o chocolate caseiro dela e desmaia."
1794739046 = "Comemoração a sós"
4091436927 = "Serika e o Sensei passam o Dia dos Namorados trabalhando meio período em uma loja de doces. Com o pagamento, Serika ganha um bolo especial e os dois vão comemorar."
3828618989 = "Os sentimentos doces da responsável pelos lanches"
508038070 = "No caminho de volta das compras com o Sensei, Nonomi decide fazer um pequeno desvio para descansar. Nonomi pega vários chocolates que comprou para todos comerem e ouve a opinião do Sensei sobre cada um."
1075068622 = "Registre novamente"
3328710083 = "Preocupada com o Sensei, que tende a pular refeições na correria, Sumire lhe dá um alimento nutritivo sabor chocolate. E, para consumir as calorias, começa o treino especial de Dia dos Namorados."
2054798090 = "Gamer que não desiste"
1651777598 = "Momoi planeja vencer um torneio de jogo e dar ao Sensei o troféu de chocolate, mas perde no primeiro round. No entanto, sem desanimar, ela consegue um chocolate com brinde em outro jogo e começa a brincar com o brinquedo junto com o Sensei."
166046686 = "O primeiro é o melhor, Sensei"
2953614051 = "Chamando o Sensei de madrugada, Midori lhe entrega um chocolate que fez com esforço. Embora feliz por ter sido a primeira a dar chocolate ao Sensei, Midori foge envergonhada."
3576293106 = "Uma palavra para você"
1344353369 = "Na sala do Departamento de Yin-Yang, Chise fica de guarda com o Sensei. Chise come continuamente 'biscoitos de chocolate com provérbios de quatro caracteres' até acertar o provérbio desejado, e os chocolates errados são passados ao Sensei. No final, o que ela procurava era……?"
2997161539 = "Sessão de degustação especial"
615936915 = "Para desenvolver uma sobremesa limitada na Cem Noites, Shizuko chama o Sensei para degustar. Depois de comer tudo, quando o Sensei pergunta se está tudo bem com a opinião apenas dele, Shizuko responde com um sorriso radiante."
2646709498 = "O sabor do mestre e do ninja"
944329625 = "Izuna conseguiu o popular item de difícil acesso, o 'Conjunto de Chocolate' do item especial de ninja nº 49. Sonhando em se tornar uma grande ninja um dia, ela divide o chocolate com gosto de ninja com o Sensei."
3304469559 = "Em um sonho doce e macio"
2669528589 = "Tsubaki visita o Sensei, que está exausto e sem dormir devido ao acúmulo de trabalho. Graças ao chocolate que dá sono e ao colo de Tsubaki, o Sensei consegue ter uma boa noite de sono pela primeira vez em muito tempo."
2320642113 = "Tudo de mim para você"
1400229860 = "Wakamo entrega um chocolate ao Sensei, que a seguia na patrulha. Embora o chocolate em si fosse gostoso, ele decide não pensar no que mais poderia ter misturado."
4255752625 = "Mais amargo, mais doce"
2444141989 = "Haruna, que formulou a hipótese de que 'a gratidão pelo outro está ligada ao sabor doce', começa um experimento fazendo o Sensei comer chocolate matchá. Embora tenha obtido uma boa resposta do Sensei, Haruna sai correndo do local com uma força tremenda no final."
3729666985 = "Homem Caveira, transforme-se!"
2511158405 = "Azusa dá ao Sensei um chocolate em forma de Homem Caveira. Azusa sente ao mesmo tempo a tristeza de que o Homem Caveira desaparecerá se for comido e a alegria de que o Sensei, tendo comido o Homem Caveira, estará ao seu lado."
2749513973 = "Não coma assim!"
3453339704 = "Koharu dá ao Sensei um chocolate com desenho de cruz como presente de Dia dos Namorados. No entanto, a maneira como ele come o chocolate lhe parece suspeita, e ela o xinga como sempre, corando."
3264516979 = "Como sempre"
4100897639 = "Suzumi encontra o Sensei por acaso em uma conveniência. Acho que seria um desperdício ignorar a coincidência de se encontrarem no Dia dos Namorados, Suzumi lhe dá um chocolate em forma de estrela."
277127002 = "Por onde devo comer……?"
3783664452 = "Marie dá ao Sensei um chocolate em forma sagrada como sinal de gratidão. O Sensei fica feliz, mas os dois se preocupam por onde começar sem problemas."
3828018681 = "O que se pode comer junto"
2801125887 = "Shimiko dá um chocolate ao Sensei que chamou na biblioteca. O chocolate revestido para não sujar as mãos é perfeito para o trabalho na biblioteca, e eles passam o tempo trabalhando enquanto comem chocolate."
2875243567 = "Com desenvoltura"
4120418651 = "Tarde da noite, o Sensei encontra Serina tentando colocar chocolate e ir embora sorrateiramente. O Sensei diz a Serina que não se importa mais se ela aparecer de repente e agradece por tudo."
1098144936 = "Após pensar muito"
3201590812 = "No Dia dos Namorados, o chocolate que Airi lhe dá é de menta com chocolate. Airi ri sem graça por ter escolhido o de sempre depois de pensar tanto, e o Sensei agradece por ela ter pensado tanto nele."
192904433 = "Edição limitada muito valiosa"
80308750 = "Tendo falhado em obter uma sobremesa limitada, Yoshimi dá ao Sensei um chocolate caseiro feio. Yoshimi zomba de sua própria falta de jeito, mas o Sensei fica feliz, dizendo que o caseiro também é uma 'sobremesa limitada'."
3586750675 = "Material de reforço: chocolate"
2253911203 = "O Dia dos Namorados é um dia em que se pode colocar sentimentos em doces. Aproveitando esse dia especial, Natsu dá chocolate ao Sensei silenciosamente, sem falar demais."
1180885592 = "Momento importante, lugar importante"
697521960 = "No biscoito da sorte sabor chocolate que Chinatsu deu ao Sensei, havia uma mensagem abençoando o tempo que passam juntos. A propósito, todos os outros biscoitos da sorte também tinham a mesma mensagem."
1962407239 = "Sem embrulho, como é"
1077466145 = "Sena, que também estava trabalhando no Dia dos Namorados, usa medicamentos da ambulância e prepara um 'composto sabor chocolate' como presente. Quando o Sensei hesita em comer, ela diz 'ahhh'."
1976727305 = "Antes disso, depois disso"
2963687798 = "Prevendo que Haruka possa fazer algo por pensar demais, o Sensei a chama. Vendo que ele a entende e fica feliz em receber seu chocolate, Haruka mostra um lindo sorriso."
1012027940 = "Divirta-se também no Dia dos Namorados"
1666704886 = "No Dia dos Namorados, Asuna chama o Sensei e tenta forçá-lo a comer chocolate. O Sensei tenta aceitar de bom grado, mas, ao ver o chocolate saindo do decote de Asuna, foge rapidamente."
2713488453 = "Como uma empregada"
3307298409 = "Ao ouvir que o chocolate é de Akane, o Sensei pensa em bomba e fica tenso. Akane ri sem graça e diz que hoje, apenas hoje, quer que ele receba normalmente como 'aluno e Sensei', não como 'empregada e mestre'."
1881980585 = "Fique gostoso"
1305131009 = "Karin, que trabalha em uma maid café, dá ao Sensei um menu especial de Dia dos Namorados. Além disso, ela tenta dizer uma palavra mágica para a comida pedida pelo Sensei ficar gostosa, mas acaba explodindo de vergonha."
2513811506 = "Se se importar, perde"
263736182 = "Neru dá ao Sensei um chocolate em forma de dragão. Para Neru, que não se importa com os outros, o Dia dos Namorados é apenas um dia para dar chocolate, e ela não parece particularmente envergonhada com o chocolate extravagante ou com os olhares que atrai."
1221828673 = "A origem do chocolate de Dia dos Namorados"
2341240125 = "Sentindo-se culpada por prender o Sensei por muito tempo, Kotori lhe dá um 'chocolate original do Dia dos Namorados' também como explicação. O Sensei a chama de volta e ouve sua explicação enquanto come com ela."
887088760 = "Sabor e atmosfera"
3219396506 = "O chocolate que Fuuna preparou tinha a forma de um cálice. Trazendo dois chocolates, Fuuna serve chá neles e brinda com o Sensei."
3891995307 = "O romance que li naquele dia"
2563474114 = "De repente, Tsurugi aparece diante do Sensei, emite um grito estranho e vai embora. Imaginando seus verdadeiros sentimentos pelo chocolate que deixou, o Sensei agradece."
3840869276 = "Dia dos Namorados desajeitado"
3918834111 = "Kokona presenteia o Sensei com chocolate quando ele visita o Jardim Meihua. Embora ela insista que comprou na loja, o embrulho parece um tanto desajeitado para um produto comercial, e muito carinhoso."
2127105220 = "Coração gentil"
3440410243 = "O Sensei visita Hinata no Dia dos Namorados. Hinata, que não teve tempo de preparar chocolate, escolhe entre os que preparou para as crianças os tipos que acha que o Sensei vai gostar e lhe dá."
336269752 = "A sós"
2608193797 = "No Dia dos Namorados, Ui e o Sensei passam o tempo juntos na biblioteca antiga. Ui, consciente da situação a sós, parece que o Sensei não se importa muito. Irritada, Ui prega uma 'pequena peça' nele."
3325594053 = "Coisas não habituais"
2837363539 = "No Dia dos Namorados, Kazusa presenteia o Sensei com um bolo de chocolate com morangos. Ela mesma diz que isso não combina com ela, mas, conforme a conversa avança……?"
3971658852 = "Em troca de tudo?"
3831580966 = "No local onde Hiyori o chamou, o Sensei recebe o chocolate. Ao saber que Hiyori vendeu uma revista que não seria exagero chamar de 'tudo dela' para comprar aquele chocolate, o Sensei acaricia sua cabeça."
2533892615 = "Correlação entre dever e evento"
168506611 = "Misaki chama o Sensei para inspecionar as linhas de vida: eletricidade, gás, água, etc. Embora não deixe transparecer a existência do Dia dos Namorados, uma caixa de chocolate embrulhada aparece e some em seu bolso."
3709675839 = "Rosa azul e chocolate"
1415017347 = "Diante do canteiro que cuida com tanto carinho, Atsuko se encontra com o Sensei. A princesa cheia de segredos lhe envia uma rosa azul e um chocolate. Contemplando as belas flores, eles dividem e comem o chocolate caseiro juntos."
3240322664 = "Chocolate de Gidiva"
3859526989 = "Quando o Sensei vai ao local indicado por Saori, ele a encontra exausta. Aparentemente, para conseguir um chocolate de altíssima qualidade, ela aceitou uma missão difícil……"
2865465870 = "Chocolate com sentimentos escondidos"
826493808 = "Mimori dá uma aula no 'Curso de fazer chocolate fácil para qualquer um!' organizado pelo Departamento de Treinamento. Após a aula, Mimori presenteia o Sensei com um chocolate que fez em segredo."
808887502 = "O chocolossauro mais forte!"
2969923407 = "Kaede tenta dar ao Sensei um 'chocolate escavador de dinossauro', mas quebra todo o chocolate durante a escavação. Com uma ideia genial, ela combina as partes intactas e presenteia o Sensei com o 'chocolossauro mais forte'."
2045537856 = "Dia dos Namorados também, com espírito ninja……!"
225487865 = "Tentando dar o chocolate como uma ninja, Tsukuyo fica presa no armário. Com a ajuda do Sensei, ela consegue sair, mas o chocolate derreteu com o calor do corpo, e ela fica desanimada. No entanto, com as palavras do Sensei ao comer o chocolate, Tsukuyo recupera o ânimo."
147127745 = "O alter ego da supergênio, doentia, bela e jovem hacker"
3005651711 = "No Dia dos Namorados, Himari presenteia com um chocolate especial com a sua própria forma."
1921507672 = "Gerente intermediário sem falhas"
4063815318 = "No Dia dos Namorados, o Sensei ajuda Iroha com o trabalho do Pandemonium. Após terminar as compras na loja de departamentos, Iroha de repente coloca um chocolate caseiro na boca e……"
2385007579 = "É como em uma comédia romântica"
1567199440 = "No Dia dos Namorados, Michiru pede que o Sensei ajude na produção de um vídeo temático. Mas tudo era um plano de Michiru para dar chocolate ao Sensei……"
2668723953 = "SRT, faremos um abastecimento!"
1759226892 = "Certo dia, próximo ao Dia dos Namorados. Miyako pede emprestada a cozinha do Schale para fazer bolos para sua equipe. Após terminar, ela também dá um bolo ao Sensei como agradecimento."
4267228678 = "Logística doce"
1196107006 = "Por causa de uma chuva passageira, Moe e o Sensei se molham. Enquanto secam a roupa ao redor da fogueira, os dois comem marshmallows juntos."
1213591936 = "Medida contra o sono?"
3687515176 = "Alguns dias antes do Dia dos Namorados, Saki visita o Schale e frequentemente pergunta se o Sensei está com sono. Quando ele responde 'acho que estou ficando com sono', Saki, como se esperasse, lhe dá um caramelo de chocolate que ajuda a espantar o sono."
3424842111 = "RABBIT4, presenteamos"
3778351720 = "No Dia dos Namorados, como retribuição por tudo, Miyu presenteia o Sensei com um chocolate bark caseiro cheio de amor."
731107983 = "A travessura doce da secretária do Seminário, Noa"
3265679857 = "Noa veio ao Schale para testar a escrita de uma tinta de frasco que comprou. O Sensei fica confuso ao vê-la lamber a tinta, mas ela revela que o conteúdo do frasco é chocolate. Noa pede desculpas pela travessura e dá ao Sensei aquele chocolate em forma de tinta."
870313175 = "A condecoração da presidente do Comitê de Segurança"
2318413947 = "Marina se preocupa em como guardar a condecoração de chocolate que ganhou de Cherino. Quando pede conselho ao Sensei, ele diz que, mesmo sem a condecoração, os alunos se lembram de seu esforço. Percebendo uma nova perspectiva, Marina presenteia o Sensei com a condecoração de chocolate como agradecimento."
2278831421 = "A doçura também"
205941879 = "O Sensei aceita que Shigure lhe faça um coquetel e o saboreia, preocupado com a presença ou não de álcool. O coquetel não alcoólico feito com chocolate amargo era uma obra-prima com a doçura perfeitamente equilibrada."
367149864 = "Um item de resgate um pouco especial"
4055691814 = "No Dia dos Namorados, o Sensei é convidado para o quarto de Mine. Lá, muitos chocolates fofos estão dispostos, mas Mine insiste que são 'apenas suprimentos médicos'. No final, Mine dá os chocolates fofos ao Sensei e depois sai correndo do quarto de vergonha."
2363629977 = "O que não acaba"
2964286266 = "No Dia dos Namorados, como sempre, o Sensei e Ayumu estão sobrecarregados de trabalho. Enquanto se apoiam mutuamente, Ayumu dá ao Sensei um chocolate que parece ter efeito contra a fadiga."
2782278321 = "Garota na idade"
917303755 = "Atendendo a um contato de Ichika, o Sensei passa um divertido Dia dos Namorados com ela."
346977988 = "Qual é a verdade?"
2928609033 = "Kasumi presenteia o Sensei com um chocolate em forma de chinelo com sua 'marca registrada'."
3929202625 = "Garota que busca o caminho com todas as forças"
2052971633 = "O Sensei recebe um chocolate de Dia dos Namorados de Koyuki. Dentro dele, havia um pedido de socorro."
2646201157 = "Alvo especial"
2921289463 = "Embora Sakurako não tenha conseguido incorporar as últimas tendências, ela presenteia o Sensei com um chocolate cheio de carinho."
3022511788 = "Carta desafio do Dia dos Namorados"
827310105 = "No Dia dos Namorados, Reisa presenteia o Sensei com um chocolate e uma 'carta desafio'."
112311372 = "Ovo de fonte termal?"
209329025 = "Aproveitando o dia especial, Megu presenteia o Sensei com um chocolate em forma de ovo."
4278093215 = "O espírito da degustação"
3524417487 = "Atendendo a um pedido de Rumi para degustar, o Sensei visita a Sociedade Comercial Genbu. Lá, Rumi preparou três tipos de bolo lunar de chocolate."
3484553094 = "Coisa importante"
770299158 = "Mina grava o símbolo do Portão Xuanlong, que mais valoriza, em um chocolate e o presenteia ao Sensei."
3048451966 = "Chaveiro combinando"
1084207169 = "Momiji visita o Schale. O Sensei, enquanto lê um mangá que ela trouxe, come junto com ela os chocolates que estavam dentro."
985547137 = "Portanto, pelo contrário"
441887019 = "Nagisa chama o Sensei e lhe dá um chocolate que preparou silenciosamente."
1245310435 = "Não se pode perdoar"
2182832120 = "Para comemorar o Dia dos Namorados, o Sensei vai a uma loja de costeletas de porco recomendada por Minori. Minori afirma que 'não cairia no golpe do Dia dos Namorados', mas mesmo assim preparou um chocolate."
2665747381 = "Diferença de percepção"
3520175290 = "Desejando melhorar a percepção que o Sensei tem dela, Aoi lhe dá um chocolate."
1660418007 = "Com todos"
2556707942 = "No Dia dos Namorados, que acontece apenas uma vez por ano, Plana aproveita que Arona está dormindo e presenteia o Sensei com um chocolate caseiro."
39118678 = "Processo e resultado"
4008970014 = "No Dia dos Namorados, Mel tenta mostrar ao Sensei um desenho ao vivo de chocolate. No entanto, por mais que tente, não consegue um resultado satisfatório e fica desanimada. O Sensei escolhe o desenho de que mais gostou entre os feitos por Mel."
650590662 = "Hospitalidade suprema e máxima"
3966026048 = "Toki recebe o Sensei com um curso de pratos de chocolate digno do Dia dos Namorados."
991186108 = "Retribuição da líder de estratégia"
620023061 = "Kaho convida o Sensei para a sala do Departamento de Yin-Yang. No entanto, com vergonha, ela tenta mudar de assunto mostrando os itens de divulgação do Dia dos Namorados de Hyakkiyako. Recuperando o ânimo, Kaho presenteia o Sensei com um chocolate que ela mesma preparou."
4215670575 = "O café blend da diretora"
2727005466 = "Kanna prepara um café com carinho para o Sensei, que visitou a Academia de Polícia Valkyrie a trabalho."
271172490 = "Arremesso de juventude com tudo"
2392398542 = "No Dia dos Namorados, um dos dias comemorativos representativos da juventude, Renge começa a fazer chocolate caseiro para presentear o Sensei. No entanto, após 12 horas, o chocolate não fica pronto. Preocupado, o Sensei a visita e, juntos, fazem o chocolate e o comem."
3988011739 = "A estrategista não quer perder"
1261309508 = "No Dia dos Namorados, Kikyou pede que o Sensei ajude em vários eventos que serão realizados em Hyakkiyako. Assim, os dois passam o tempo percorrendo vários lugares de Hyakkiyako."
1994341756 = "Gratidão com as mãos cheias"
2652260800 = "No Dia dos Namorados, Yukari convida o Sensei para expressar seus sentimentos. Lá, como membro da família Kadenokoji e como representante da Hagi Tsukiyono, ela lhe entrega dois presentes preparados separadamente."
2016528600 = "Segredo só nosso"
96487163 = "Ibuki visita o Schale e presenteia o Sensei com um pudim de chocolate especial feito por ela. No entanto, Ibuki olha para o pudim com olhos famintos ao lado. O Sensei então decide dividir o pudim com ela."
402726560 = "Doçura que não enjoa"
313032494 = "Mika e o Sensei marcam de se encontrar no Dia dos Namorados. No entanto, Mika não aparece no dia marcado. O Sensei a contata. Ao ouvir a voz surpresa de Mika do outro lado da linha, ele vai até a sala de economia doméstica."
2029368497 = "Presente digno do recipiente"
3062807839 = "No Dia dos Namorados, Makoto diz que dará o melhor chocolate ao Sensei e mostra a fonte de chocolate especial de Gehenna."
832685500 = "Dia dos Namorados também é festival"
3937412867 = "Umika, animada por poder dizer que o Dia dos Namorados talvez também seja um festival de chocolate, entrega ao Sensei um chocolate em forma de palanquim portátil (mikoshi) feito por ela. Ela diz que, normalmente, o mikoshi contém itens sagrados, mas neste estão chocolates destinados ao Sensei que sempre os observa. O Sensei aceita os sentimentos e come com carinho o chocolate sagrado dentro do mikoshi."
2602684896 = "A nota da crepe é……"
2759978261 = "O Sensei, atendendo a um pedido de conselho de Kirara, que disse que sua nota na aula de culinária estava horrível, decide fazer uma crepe de chocolate com ela. No entanto, era uma desculpa de Kirara para dar uma crepe caseira ao Sensei. O Sensei avalia a crepe como excelente e eles comem juntos."
853644750 = "Espírito de competição ardente"
3101789295 = "Shiroko invade a sala do Schale e, dizendo que é uma surpresa, dá ao Sensei uma grande quantidade de chocolate que lhe parece familiar. O Sensei percebe nela um espírito de competição oculto, mas ela se esquiva. Ela promete voltar ao Schale e vai embora com um sorriso."
1274982249 = "Com todos os cinco sentidos"
1269088046 = "Convidado a Shanhaijing, o Sensei aprecia um chá de nibs de cacau com Kisaki. Enquanto desfrutam da cerimônia do chá, ela diz que preparou uma surpresa em seu chá. Naquele momento, o Sensei percebe um rico aroma de chocolate, que era o efeito do chá que Kisaki bebeu. Kisaki, irradiando aroma de chocolate por todo o corpo, aproxima-se lentamente do Sensei……"
3853801039 = "Chocolate da Palma de Ferro"
4007922540 = "O chocolate caseiro de Raijo foi feito com cacau quebrado à mão nua através do rigoroso treinamento de 'Palma de Ferro', e tem a forma da marca de seu punho. Vendo o Sensei comer com avidez o chocolate que a simboliza, Raijo fica envergonhada, mas feliz."
2317670005 = "Receita secreta"
2747026672 = "Satsuki diz ter usado uma receita especial no chocolate que trouxe para atrair o Sensei ao Pandemonium. Ouvindo a história, descobre-se que ela ficou rodando em volta do chocolate, repetindo o feitiço secreto 'fique gostoso~'. O Sensei come deliciosamente o chocolate que Satsuki se esforçou para fazer."
3253447383 = "Jornalismo de doces"
2422568276 = "Como agradecimento pela cooperação na coleta de material para a reportagem especial de Dia dos Namorados, Chiaki entrega ao Sensei uma foto de um chocolate bagunçado e um chocolate chique. Para o Sensei, confuso, Chiaki explica os segredos para tirar boas fotos de comida e insiste que, se registrar a beleza no momento, pode-se aproveitar o chocolate para sempre!"
3029733267 = "Armadilha doce e amarga"
3490507594 = "Quando visita Trinity, o Sensei recebe uma mensagem e vai ao quarto de Seia. Lá, ele recebe dela um chocolate e uma folha de papel misteriosa com um espaço para assinatura. O Sensei assina sem questionar…… e essa era a armadilha de Seia. Diante de Seia, que agora pode dar qualquer ordem, o Sensei come todo o chocolate caseiro dela."
3752504286 = "Apresentação"
1513386319 = "Para Rio, um presente de Dia dos Namorados é algo que só pode ser considerado irracional. No entanto, pensando que talvez haja significado no que parece inútil, ela usa o método que considera a solução ideal para criar um chocolate com o emblema da escola que a formou – Millennium. Ao receber a gratidão do Sensei, Rio não consegue esconder sua confusão com os sentimentos que lhe vêm."
2003795896 = "Os três tesouros sagrados"
3170475194 = "Rei usou suas próprias luvas como molde para fazer um chocolate. Junto com chocolates em forma de taco e bola, ela presenteia o Sensei e eles se empolgam conversando sobre beisebol enquanto comem os 'três tesouros sagrados'."
3449104670 = "Garota e lanche"
1885555336 = "Hikari comprou um novo chocolate para o Sensei. Quando ele vai comer, Hikari está com olhos famintos, e eles dividem e comem juntos."
359030032 = "Presente inesperado"
2185724888 = "Para o Sensei, que deve estar cansado do trabalho, Nozomi traz uma geleia. O Sensei a chama de volta e sugere que brinquem juntos. Depois de brincarem com todas as forças, os dois resolvem o trabalho juntos."
2821415725 = "Eu odeio chocolate barato"
3930966594 = "Aoba, que estava ocupada, não teve tempo de se preparar e deu ao Sensei um chocolate barato. Quando ela tenta ir embora, o Sensei oferece o sofá para ela descansar. Aoba descansa do cansaço diário."
749178746 = "Pontas dos dedos frias……"
3102107895 = "Nagusa presenteia o Sensei com biscoitos de chocolate limitados de Hyakkiyako. O Sensei come imediatamente, mas são tão macios que ele suja as mãos. Nagusa percebe que isso não aconteceria consigo, sentindo sua baixa temperatura corporal. Então, Nagusa alimenta o Sensei."
1761460889 = "A garota não abre a caixa"
2121407183 = "Niya presenteia com um chocolate de embalagem chamativa mas de sabor amargo. Quando o Sensei pergunta sua intenção maliciosa, ela responde que pode haver alunos que interpretem mal apenas pela superfície e tenham experiências amargas. O Sensei mostra compreensão, mas também faz Niya comer o chocolate."
3850859909 = "Recarga de mana para o mestre"
905988701 = "Eri, dizendo que mostrará sua determinação, tira o chapéu. Além disso, ela propõe fazer o 'ahhh'. Depois de alimentar o Sensei algumas vezes, ele decide retribuir. Assim, eles passam um tempo trocando mana."
3059797050 = "Até o momento de lembrar"
3217050285 = "Kanoe diz ter preparado um muffin de chocolate cheio de amor. Ela espera que, ao comê-lo, o Sensei recupere as memórias. Embora o muffin estivesse muito gostoso, não teve efeito. No entanto, Kanoe não parece desanimada, e seu riso 'Ihih' ecoa."
3389252788 = "Tiramisu de espera"
3138201970 = "O Sensei é convidado ao dormitório de Miyo. Ela ainda está no meio do preparo do tiramisu, feito com mão inexperiente. Depois de conversarem um pouco, ele fica pronto, mas descobrem que é melhor esperar duas horas para ficar mais gostoso. Assim, os dois passam o tempo conversando."
2750803807 = "É doce e pesado"
2839633723 = "O presente de Fuyu era um 'gobstopper' (bala que dura muito tempo). Ela diz que, como ele pode ficar muito tempo chupando, gostaria que pensasse nela durante esse tempo, e vai embora. Depois, Fuyu se revira sozinha, relembrando suas próprias palavras."
2958867371 = "Meu!"
1371353270 = "Quando o Sensei volta ao Schale, encontra um 'chocolate que nunca derrete', presente de Ritsu, firmemente assentado. Era feito de mármore marrom, e o Sensei passa o tempo ouvindo Ritsu falar sobre escultura."
3192072615 = "Tenho que ir ao Museu do Amor!"
346158900 = "Love se surpreende com a aparição do Sensei, que percebeu seu cheiro, mas começa a procurar o chocolate que preparara para dar a ele. No final, não o encontra, e eles dividem um chocolate mordido. No entanto, antes de dividir, o Sensei é chamado e vai embora com o chocolate na mão."
3974083935 = "Biscoitos de suspiro de chocolate"
3194591599 = "Subaru se indigna com o luxo da confeitaria. Mesmo assim, racionando os ingredientes, ela presenteia o Sensei com biscoitos de suspiro caseiros. Os dois passam um tempo agradável comendo juntos."
977917830 = "Bolo de chocolate da crítica"
2491918438 = "Takane comenta sobre o Dia dos Namorados como data comemorativa. Ela diz que a Kartoshka, que usa melaço (subproduto da fabricação de açúcar), é como o Sensei, que descobre todo o potencial dos alunos. O Sensei, um pouco envergonhado, come a Kartoshka caseira com ela."
3538379831 = "Medovik de chocolate"
2672738749 = "De repente, Yakumo começa a falar sobre os 'três princípios da negociação' e oferece um Medovik ao Sensei, dizendo ser 'caseiro'. No entanto, não era feito pelas mãos de 'Yakumo', mas sim por um confeiteiro da loja. O Sensei entende que Yakumo estava pensando em como agradá-lo e a convida para o chá."
573696648 = "Plano perfeito (provisório)"
4069694705 = "Key oferece um chocolate ao Sensei, dizendo que o pegou no caminho. Mas ele percebe imediatamente que é caseiro. Quando ele come um, Key percebe que trocou o sal pelo açúcar. Observando as expressões que mudam rapidamente de Key, o Sensei come com ela o chocolate que tinha escondido."
446190472 = "Freiras atrapalhadas e a maga da biblioteca antiga"
1809185386 = "As escrituras importantes de Trinity se despedaçaram! Para sua restauração, Hinata e o Sensei correm por vários lugares de Trinity. Será que conseguirão restaurá-las a tempo da cerimônia!?"
1669344749 = "Grande operação de restauração das escrituras!"
3307050815 = "De alguma forma, em segredo……"
3206474415 = "A torre do mago"
2268137323 = "Para a fortaleza da favela (1)"
1903415538 = "Para a fortaleza da favela (2)"
1272740423 = "O sinalizador corredor de Trinity (1)"
3082754107 = "O sinalizador corredor de Trinity (2)"
3986270050 = "Pessoas um pouco parecidas (1)"
3119699862 = "Pessoas um pouco parecidas (2)"
175163125 = "Para que não acabe (1)"
2349364401 = "Para que não acabe (2)"
3540342487 = "Serve você bem (1)"
2185957071 = "Serve você bem (2)"
3620597108 = "Serve você bem (3)"
807787903 = "Serve você bem (4)"
2042584363 = "Grande operação de restauração das escrituras!"
2114734858 = "Um dia, escrituras importantes são encontradas em Trinity, e a escola fica em um clima de festival. Hinata fica encarregada de levar as escrituras para o local da cerimônia, mas, com ímpeto, acaba despedaçando-as……"
885221606 = "De alguma forma, em segredo……"
2609673615 = "Para consertar as escrituras, Hinata e o Sensei visitam o Comitê da Biblioteca. Shimiko se dispõe a ajudar, mas diz que não pode lidar com aquilo e apresenta Ui, uma especialista em livros antigos e presidente do Comitê."
2635340070 = "A torre do mago"
3848520474 = "Ui quase enlouquece ao ver o estado lamentável das escrituras, mas, após conversar com Hinata e o Sensei, decide ajudar na restauração. Como alguns materiais são necessários, o Sensei e Hinata saem em busca."
1290804638 = "Para a fortaleza da favela (1)"
693914347 = "O Sensei e Hinata vêm em busca do bolo edição limitada 'Miracle 5000'. No entanto, ao chegar ao local, o clima não é de tranquilidade. Ao ouvir a situação das alunas do Clube de Doces do Pós-Escola que estavam lá, eles decidem ajudar o dono da loja."
4074869668 = "Para a fortaleza da favela (2)"
4079910234 = "O grupo ataca a Gangue do Capacete e consegue resgatar o dono da loja. Após a luta, todos tentam ceder o último bolo para Hinata, mas o dono diz que 'não é preciso' e faz vários bolos."
1658580150 = "O sinalizador corredor de Trinity (1)"
231136931 = "Enquanto procuravam o próximo material, 'musgo aquático gelatinoso', o Sensei e Hinata encontram Suzumi enfrentando delinquentes. A luta começa, e eles decidem intervir."
2012597133 = "O sinalizador corredor de Trinity (2)"
2151675688 = "O grupo vence os delinquentes. Ao ouvir sua situação difícil, Hinata, como irmã, estende a mão. No final, eles conseguem o 'musgo aquático gelatinoso'."
496082561 = "Pessoas um pouco parecidas (1)"
565077451 = "Para o último material, 'remédio sagrado', Hinata e o Sensei vão à ala da Ordem dos Cavaleiros de Resgate. Lá, encontra Serina."
881020918 = "Pessoas um pouco parecidas (2)"
3596757663 = "Serina tenta guiá-los e compartilhar o remédio, mas é chamada para uma emergência. Sem poder apenas se despedir, Hinata tenta seguir Serina, e o Sensei a apoia. Quando o Sensei encontra o remédio, as duas voltam já entrosadas."
3108835754 = "Para que não acabe (1)"
707461921 = "Hinata e o Sensei conseguem juntar todos os materiais. Surpreso, Ui começa o trabalho. Deixando com Ui, Hinata e o Sensei, após um dia agitado, vão dormir."
3464872233 = "Para que não acabe (2)"
1190546149 = "A noite cai, e a restauração de Ui está no clímax. Naquele momento, chega a notícia de que o cronograma da cerimônia foi alterado."
1936542723 = "Serve você bem (1)"
789625242 = "Hinata fica desanimada por ter recebido ajuda de tantas pessoas. Embora entenda que já é tarde, ela se levanta. Agradecendo ao Sensei e a Ui, Hinata vai para o local da cerimônia."
1115309119 = "Serve você bem (2)"
2876222975 = "Após Hinata sair, a restauração das escrituras é concluída. Ui expressa preocupação com Hinata. Enquanto isso, Hinata chega ao local da cerimônia, mas encontra Mashiro do Comitê de Justiça. Enquanto se pergunta o que fazer, tiros são ouvidos e um grupo familiar aparece……?"
867066557 = "Serve você bem (3)"
1143461639 = "Quem aparece no local são os membros do Shichiten Battodan e do Clube de Doces do Pós-Escola. A sua compra de tempo funciona, e eles conseguem trocar as escrituras."
3261598258 = "Serve você bem (4)"
1763744091 = "O incidente se resolve. O Sensei volta à biblioteca antiga e ouve algumas palavras sinceras de Ui."
2477586931 = "Coração de Shinobu"
2232967509 = "Para se tornarem um clube oficial, o Clube de Estudos Ninja decide ajudar no evento de intercâmbio entre Hyakkiyako e Gehenna. No entanto, o intercâmbio não pode terminar sem problemas…… Qual será a resposta que elas darão, após várias peripécias!?"
3240499071 = "Invasão ninja!"
3223702264 = "O intercâmbio começa!"
2295860854 = "Donzela gigante (1)"
3632641780 = "Donzela gigante (2)"
1029942213 = "Falando em ninja, é princesa? (1)"
2110087172 = "Falando em ninja, é princesa? (2)"
3622577917 = "Primeira barreira: garota-propaganda e segurança (1)"
2672511310 = "Primeira barreira: garota-propaganda e segurança (2)"
1316908147 = "Segunda barreira: princesa adormecida (1)"
2839284134 = "Segunda barreira: princesa adormecida (2)"
4119318060 = "Terceira barreira: leitora de mentes (1)"
2991402396 = "Terceira barreira: leitora de mentes (2)"
2127710617 = "Quarta barreira: casa dos truques (1)"
3261259448 = "Quarta barreira: casa dos truques (2)"
3904889189 = "O que estava represado (1)"
973204903 = "O que estava represado (2)"
682393381 = "Regra de ouro do ninja (1)"
4279025201 = "Regra de ouro do ninja (2)"
1269695701 = "Após o festival"
208502467 = "Invasão ninja!"
752075220 = "O 'Clube de Estudos Ninja' ainda não foi reconhecido, não é um clube oficial. Eles vêm ao Schale porque pensam que o Sensei poderia dar essa autorização. Enquanto ele pensa que não é tão simples, Kaho, do 'Departamento de Yin-Yang', aparece……"
3066356973 = "O intercâmbio começa!"
2027758856 = "O Sensei e o Clube de Estudos Ninja chegam à Academia Hyakkiyako. Niya, presidente do Departamento de Yin-Yang, diz que gostaria da ajuda do Schale para um intercâmbio com a escola Gehenna. O Sensei, em troca, pede que, se tiverem sucesso, o 'Clube de Estudos Ninja' seja reconhecido como clube oficial, e começa a ajudar no evento junto com Michiru, Tsukuyo e Izuna."
2113642855 = "Donzela gigante (1)"
1841957901 = "Como primeira ajuda no intercâmbio, o Clube de Estudos Ninja começa a preparar a apresentação da 'Princesa da Música Harmoniosa'. Nesse meio tempo, Tsukuyo é importunada (?) por delinquentes, mas eles se retiram."
2793185007 = "Donzela gigante (2)"
4010253238 = "Após os delinquentes se retirarem, o Sensei ouve os sentimentos de Tsukuyo. Ele a encoraja e recomeçam os preparativos para a apresentação."
3738792413 = "Falando em ninja, é princesa? (1)"
1915451082 = "A 'Princesa da Música Harmoniosa' é o destaque do intercâmbio. Normalmente, a heroína seria Chise, mas neste intercâmbio, por mudança de última hora, será interpretada por Ibuki do Pandemonium. Para acalmar Ibuki, que está nervosa com a agitação ao redor, Michiru lhe empresta um boneco do Ninja Nimpero-san e promete que irá resgatá-la em caso de perigo. Nesse momento, o Chimimouryou ataca……?"
341953329 = "Falando em ninja, é princesa? (2)"
2863619002 = "Ibuki, que interpreta a 'Princesa da Música Harmoniosa', é sequestrada pelo Chimimouryou, e o grupo fica confuso. Para serem reconhecidos como clube oficial, não podem deixar o evento ser cancelado, então Michiru propõe resgatá-la por conta própria. Além do Clube de Estudos Ninja, Iroha do Pandemonium também se junta, e todos começam a agir para recuperar Ibuki."
1421697779 = "Primeira barreira: garota-propaganda e segurança (1)"
2447682703 = "Niya, por algum motivo, começa a transmitir ao vivo a situação do sequestro de Ibuki de forma despreocupada, e assim a apresentação continua, e o intercâmbio prossegue. O grupo que persegue o Chimimouryou para recuperar Ibuki é interrompido pela primeira barreira: as duas do comitê organizador do festival."
91366382 = "Primeira barreira: garota-propaganda e segurança (2)"
3098904965 = "O grupo consegue passar pela primeira barreira e retoma a perseguição ao Chimimouryou."
1264601568 = "Segunda barreira: princesa adormecida (1)"
3751057018 = "O grupo que persegue o Chimimouryou é interrompido pela segunda barreira, 'Princesa Adormecida' Tsubaki. Embora consigam passar pelo desafio graças à perspicácia de Izuna, os outros membros, exceto Izuna, terão que derrotar Tsubaki para prosseguir……?"
3802744135 = "Segunda barreira: princesa adormecida (2)"
3871679676 = "Após passar pelo desafio de Tsubaki, o grupo retoma a perseguição ao Chimimouryou."
1483782816 = "Terceira barreira: leitora de mentes (1)"
1022129588 = "O grupo é interrompido pela terceira barreira, 'Leitora de Mentes (?)' Mimori. A 'operação ficar parado' de Tsukuyo parece abrir uma brecha, mas a situação não se resolve facilmente. Com a gentileza de Mimori, que ensina como passar, o grupo a desafia meio desanimado."
2959155984 = "Terceira barreira: leitora de mentes (2)"
2380076631 = "O grupo passa pelo desafio de Mimori. Michiru, apressada, diz que precisa ir rápido, e Mimori responde: 'Acho que todo mundo é mais forte do que você pensa, Michiru-chan'. Sem tempo para pensar no significado, o grupo avança."
96021509 = "Quarta barreira: casa dos truques (1)"
1037879827 = "A quarta barreira é a casa dos truques. Enquanto Kaede explica, Michiru, impaciente, sai correndo e cai em uma armadilha. Protegendo Michiru, o Sensei se machuca, e Michiru desabafa silenciosamente que 'foi por minha causa'."
2449070470 = "Quarta barreira: casa dos truques (2)"
1750066922 = "Michiru e o Sensei conseguem sair da casa dos truques e se juntam a Tsukuyo e Izuna, que vieram depois. Quando Michiru tenta expressar seus sentimentos sinceros, Kaho do Departamento de Yin-Yang aparece e anuncia impiedosamente o cancelamento da apresentação."
1535946624 = "O que estava represado (1)"
939985143 = "Entendendo a situação, Kaho declara que 'o Departamento de Yin-Yang cuidará desse caso', mas Tsukuyo e Izuna dizem que 'prometeram salvar Ibuki' e não recuam."
1915078740 = "O que estava represado (2)"
4144075858 = "Com a ajuda do Sensei, o grupo consegue afastar Kaho. As palavras das kouhais, que dizem 'seguir o caminho em que a presidente acredita', encorajam Michiru, que se anima novamente. Com a ajuda de Iroha, que vem com um tanque, eles retomam a perseguição ao Chimimouryou."
349304540 = "Regra de ouro do ninja (1)"
713270559 = "Para despistar o Clube de Estudos Ninja que os persegue de tanque, o Chimimouryou derruba uma ponte. Enquanto todos se agitam, Iroha diz 'O que importa se não tem chão?' e avança……!?"
3316953760 = "Regra de ouro do ninja (2)"
3896826306 = "O grupo finalmente alcança o Chimimouryou. No entanto, são ameaçados de que Ibuki será jogada se se aproximarem, e Michiru para. Temendo que sua escolha cause danos irreparáveis, Michiru hesita, mas a própria Ibuki sorri: 'Porque vocês prometeram que viriam me salvar não importa o quê'. Empurrada por aquele sorriso, seus pés se movem –"
457811177 = "Após o festival"
1596447159 = "O intercâmbio termina com sucesso. Após uma boa conversa, o Clube de Estudos Ninja decide adiar o reconhecimento como clube oficial. E, antes que tudo se resolva, Niya conta ao Sensei os acontecimentos. Declarando-se abertamente como a mentora, dizendo que foi 'para testar a capacidade do Sensei', ela é repreendida."
784454923 = "Comitê de Restauração do Resort Abydos"
1941527097 = "O Comitê de Contramedidas conseguiu vales de resort. O que os aguarda nas férias é um resort em ruínas – O Comitê de Contramedidas, agora restaurará o resort!"
4169806517 = "Na vida, nunca se sabe"
1862967808 = "Na vida, realmente nunca se sabe (1)"
2849988537 = "Na vida, realmente nunca se sabe (2)"
3828621461 = "Uma desculpa um pouco mais convincente (1)"
3612774739 = "Uma desculpa um pouco mais convincente (2)"
3732224330 = "Ataque é a melhor defesa (1)"
2288741606 = "Ataque é a melhor defesa (2)"
2798552178 = "Viemos ajudar o Sensei (1)"
4251596414 = "Viemos ajudar o Sensei (2)"
3076571984 = "Visitantes indesejados (1)"
3715968122 = "Visitantes indesejados (2)"
396754760 = "Sonho de uma noite de verão"
3470661543 = "Bóia voadora"
1517194776 = "Máquinas pesadas com máquinas pesadas"
1914874609 = "A verdade do vale resort (1)"
3115624347 = "A verdade do vale resort (2)"
4105665590 = "Na vida, nunca se sabe"
1877741647 = "Um dia, Ayane reúne os membros do Comitê de Contramedidas e anuncia que tem 'uma notícia importante'. No momento em que ia dizer que compraria um helicóptero com o dinheiro economizado enquanto pagava a dívida mensal, Serika, que ganhou o primeiro prêmio em um bingo, entra correndo de tanta alegria……"
1346643999 = "Na vida, realmente nunca se sabe (1)"
2189810503 = "Com o prêmio inesperado, o Comitê de Contramedidas e o Sensei decidem ir ao resort de férias. Enquanto riem, dizendo 'nunca se sabe', o helicóptero cai durante a viagem –"
2683639091 = "Na vida, realmente nunca se sabe (2)"
1868167028 = "Embora o helicóptero tenha caído, todos estão ilesos. Com a esperança de que possam consertá-lo no resort, eles chegam ao local, que já está em ruínas…… Serika lamenta ter sido enganada, mas os outros a consolam, dizendo que é só começar daqui. Recuperando o ânimo, Serika declara que terá 'as melhores férias' ali."
1755482596 = "Uma desculpa um pouco mais convincente (1)"
3178234890 = "Os membros do Comitê de Contramedidas decidem se dividir em grupos para restaurar o resort. Serika e Hoshino ficam responsáveis pela limpeza do interior. Enquanto limpam com Hoshino, a Gangue do Capacete liderada por Love ataca –"
2119647362 = "Uma desculpa um pouco mais convincente (2)"
2685399187 = "Hoshino e Serika conseguem repelir Love e sua gangue. No entanto, como resultado da luta, o quarto que tinham limpado fica uma bagunça…… Coincidentemente, Shiroko e Nonomi voltam e veem o quarto, pensando erroneamente que a limpeza estava difícil."
1541851928 = "Ataque é a melhor defesa (1)"
1621492409 = "Com a arrumação do quarto em andamento, Shiroko se anima para a próxima tarefa: obtenção de alimentos. O Sensei decide ir pescar com Shiroko. Nesse momento, Ayane aparece e, quando os três vão começar a pescar, a Gangue do Capacete liderada por Love e Wakamo atacam –"
3445130317 = "Ataque é a melhor defesa (2)"
1174669819 = "Wakamo, que participava como reforço a pedido de Love, não consegue lutar bem confusa pela presença do Sensei e foge com a Gangue do Capacete. Enquanto isso, Shiroko fica profundamente abatida porque o equipamento de pesca foi destruído na luta."
806822330 = "Viemos ajudar o Sensei (1)"
4019663412 = "Ao saber que o Sensei está neste resort, Wakamo, pensando erroneamente que ele foi capturado por bandidos, ataca com Love e a Gangue do Capacete. Ayane tenta resolver conversando, mas Wakamo ordena um ataque total."
2351574080 = "Viemos ajudar o Sensei (2)"
2322437162 = "O grupo consegue repelir Wakamo. Shiroko, que estava pescando sozinha, se surpreende ao ver os membros exaustos. Enquanto isso, Wakamo, em retirada, pressiona Love e a Gangue do Capacete para usarem seu trunfo –"
1269668176 = "Visitantes indesejados (1)"
3542746869 = "Para restaurar o resort, o Comitê de Contramedidas visita a sala de controle. Lá, encontram um mecanismo desconhecido chamado 'Sistema de Defesa do Resort'. Achando que, se funcionar, poderão viver sem medo da Gangue do Capacete ou de Wakamo, eles o ativam, mas o sistema também ataca o Comitê de Contramedidas, que não está registrado –"
2399187411 = "Visitantes indesejados (2)"
2351619502 = "Por pouco, o Comitê de Contramedidas consegue se registrar no Sistema de Defesa do Resort. Enquanto isso, a Gangue do Capacete, que havia desembarcado novamente, é repelida pelos robôs de segurança."
3081295153 = "Sonho de uma noite de verão"
78535287 = "Após muitas reviravoltas, o Comitê de Contramedidas dá uma trégua na restauração do resort e aproveita um churrasco na praia de verão. Naquele momento, foram realmente férias temporárias, esquecendo a realidade."
3720861641 = "Bóia voadora"
3009396054 = "O Sensei acorda ao meio-dia e passa um tempo tranquilo com Hoshino. Enquanto o resto do Comitê foi consertar o helicóptero, eles conversam sobre relaxar, quando de repente o Sistema de Defesa do Resort dispara um alerta. Wakamo, em um enorme hovercraft, ataca novamente para resgatar o Sensei."
1077182490 = "Máquinas pesadas com máquinas pesadas"
2820779354 = "Apenas Hoshino e o Sensei enfrentam Wakamo, mas a diferença de força é esmagadora e eles ficam em desvantagem. No entanto, os olhos de Hoshino não desistem. Quando o Sensei pergunta como ela pode estar tão calma, Hoshino sorri, dizendo que acredita que os outros do Comitê virão ajudá-la. Como dito, os outros, após consertarem o helicóptero, chegam para ajudar."
2364370372 = "A verdade do vale resort (1)"
848028279 = "O grupo consegue repelir Wakamo e a Gangue do Capacete. Quando perguntam por que os atacaram tão persistentemente, revela-se que eles também têm o vale do resort. Eles são apenas um dos grupos travando uma batalha pelo resort em torno do vale. Diante da reviravolta inesperada, o grupo decide voltar para casa o mais rápido possível."
1316559450 = "A verdade do vale resort (2)"
184087796 = "As férias curtas mas intensas chegam ao fim, e o Sensei volta ao Schale. Embora as férias não tenham sido como planejado, eles riem, dizendo que foi divertido. Enquanto se preparam para voltar, encontram o nome do 'usuário final do direito de uso do resort' –"
2778041043 = "Viagem de trabalho! Projeto FC da Casa de Praia Cem Noites"
172671033 = "Para abrir um novo negócio, a 'Casa de Praia', o grupo da Cem Noites visita o resort. No entanto, o que os aguarda é uma batalha real entre resorts disputando interesses. Será que Shizuko conseguirá proteger a 'Casa de Praia'!? Começa uma nova batalha da Cem Noites."
1940212607 = "O verão ainda não acabou"
3019187095 = "Só temos uma coisa a fazer!"
985681819 = "Primeiro, vamos organizar a situação"
3149087222 = "Os mineradores de enxofre (1)"
633836269 = "Os mineradores de enxofre (2)"
3599319087 = "Em direção ao próximo"
248228498 = "Os monstros de orelhas brancas (1)"
602045043 = "Os monstros de orelhas brancas (2)"
2996925887 = "Os emissários da tartaruga negra (1)"
1574118782 = "Os emissários da tartaruga negra (2)"
1023075678 = "Antes da batalha final"
2234049552 = "Gangue do Capacete! Batalha final!"
2135228425 = "E então, o fim do verão chegou"
2224315914 = "O verão ainda não acabou"
2571315120 = "Quem espera o Sensei de volta ao Schale são Niya e Mimori de Hyakkiyako, e Fuuna. Segundo eles, têm uma consulta sobre a Cem Noites, e Shizuko está agora no 'Resort Paraíso Perdido' onde eles estavam…… O grupo que volta ao resort é atacado pela 'Gangue do Capacete de Maiô'."
3339314761 = "Só temos uma coisa a fazer!"
2566461510 = "Sabendo que o responsável geral pelo 'direito de uso do resort' é o 'comitê organizador do festival', o grupo ouve o conteúdo do contrato que Shizuko fez com o Banco Polvo. No entanto, descobre-se que o Banco Polvo é uma empresa fictícia…… Ao saber que foi enganada, Shizuko, chocada, decide usar a situação a seu favor e recolher os contratos das pessoas que estão ocupando outras ilhas."
866798122 = "Primeiro, vamos organizar a situação"
3677973191 = "Enquanto se preparam para ir a outras ilhas, o grupo confirma o mapa de forças que Niya coletou. Como estão divididas em vários arquipélagos, eles se separam entre Abydos e Hyakkiyako para recolher os contratos."
244971942 = "Os mineradores de enxofre (1)"
992183906 = "O primeiro destino de Shizuko e das outras é a ilha ocupada pelos 'mineradores de enxofre em busca da veia de água termal fantasma'. Lá, está o Departamento de Desenvolvimento de Fontes Termais de Gehenna, que quer escavar água do mar profundo e criar um resort de fonte termal de águas profundas –"
945809083 = "Os mineradores de enxofre (2)"
4177740208 = "Shizuko e as outras conseguem encontrar a fonte termal graças à atuação de Chise. Reconhecendo a derrota, o Departamento de Desenvolvimento de Fontes Termais entrega o contrato…… mas Shizuko, ao contrário, propõe um novo contrato: a Cem Noites fará um contrato de FC com eles e administrará o resort de fonte termal."
2437669702 = "Em direção ao próximo"
9719984 = "Após encerrar o contrato de FC com o Departamento de Desenvolvimento de Fontes Termais, o grupo compartilha a situação com os membros de Abydos e parte para o próximo destino."
4025448392 = "Os monstros de orelhas brancas (1)"
1455533879 = "O próximo destino do grupo é o resort administrado pelos 'monstros de orelhas brancas que levam os perdedores à ruína'. Seguindo as pessoas que entram no barco como se estivessem possuídas, eles chegam ao local do 'Concurso Secreto de Rainha do Inseto'. Sabendo que podem recuperar o contrato se vencerem o concurso, o grupo desafia o concurso de Rainha do Inseto com a ajuda de Fuuna e Kaede."
1990939403 = "Os monstros de orelhas brancas (2)"
2476002705 = "O grupo vence o Concurso de Rainha do Inseto graças à atuação de Chise. Após recolher o contrato com sucesso, ouvindo a paixão deles pelo concurso, Shizuko propõe fazer um contrato de FC e continuar realizando o concurso."
1596206066 = "Os emissários da tartaruga negra (1)"
4125761811 = "O próximo destino de Shizuko e das outras é a ilha dos 'emissários da tartaruga negra que exigem pagamento por tudo'. Era um resort operado pela Sociedade Comercial Genbu de Shanhaijing. Para isso, as avaliações estavam péssimas. Ao verificar, a situação era lastimável: cobranças indevidas, serviço precário. Enquanto Shizuko se indigna com o resort fraudulento, o Sensei revela que eles não são a Sociedade Comercial Genbu, mas sim a Kurogame."
3480568884 = "Os emissários da tartaruga negra (2)"
1288353414 = "O grupo derrota a Kurogame e Nyantemaru. Nyantemaru então propõe um contrato de FC, como nas outras ilhas. Shizuko, no entanto, rejeita sua proposta com 'dorme que isso passa' e parte para a próxima ilha."
3867903048 = "Antes da batalha final"
3483691157 = "Antes da batalha final, Shizuko e as outras realizam uma reunião de estratégia com os membros de Abydos. Lá, ouvem que a Gangue do Capacete está ligada à Kaiser PMC. Lembrando que Nyantemaru também havia contratado forças da Kaiser PMC, sentindo que o que os espera não é apenas a Gangue do Capacete, o grupo se prepara para a batalha final."
3161074241 = "Gangue do Capacete! Batalha final!"
3255147536 = "O que aguarda o grupo na batalha final contra a Gangue do Capacete é o próprio Diretor Kaiser, que no passado levou Abydos à beira do abismo. Agora trabalhando como funcionário de vendas do Banco Polvo, o Diretor Kaiser faz uma nova proposta de investimento a Shizuko, mas é recusado. Então, a Gangue do Capacete e seus novos membros, a Gangue do Capacete de Maiô, atacam Shizuko…… Começa agora a batalha final do longo verão de Hyakkiyako e Abydos!"
2912056471 = "E então, o fim do verão chegou"
3801914199 = "Avaliando a situação como desfavorável, o Diretor Kaiser tenta sequestrar o Sensei e fugir, mas é impedido por Wakamo. Assim, a longa confusão de verão chega ao fim…… mas não foi bem assim. O 'Resort Paraíso Perdido' era, na verdade, uma terra de propriedade do Conselho Estudantil Geral, e Kaiser estava vendendo os direitos ilegalmente. Embora tenham que desocupar o resort, com um pedido a Rin, eles conseguem realizar uma festa de vitória. O grupo aproveita o último banquete."
3000475038 = "História de doces do pós-escola ~Segredos doces e tiroteio~"
952532459 = "O Sensei recebe uma consulta de Kazusa, membro do Clube de Doces do Pós-Escola. Parece estar relacionada ao seu passado – O desfecho de um evento imprevisível que repentinamente chega ao cotidiano de garotas comuns……!"
1976722127 = "O que quero consultar com o Sensei"
1281064588 = "Os que vêm atacar (1)"
3956684337 = "Os que vêm atacar (2)"
477225583 = "Todo mundo tem um ou dois (1)"
933418659 = "Todo mundo tem um ou dois (2)"
3307403933 = "Mesmo que os ingredientes estejam todos separados (1)"
3189911392 = "Mesmo que os ingredientes estejam todos separados (2)"
3394222051 = "Banda de Doces do Pós-Escola? (1)"
1868823029 = "Banda de Doces do Pós-Escola? (2)"
3555228002 = "Sobre o passado que quero esquecer (1)"
2179022057 = "Sobre o passado que quero esquecer (2)"
2366776294 = "Não gosto de idiotas barulhentos e entusiasmados (1)"
3456435934 = "Não gosto de idiotas barulhentos e entusiasmados (2)"
3459245515 = "Nós, a 'Banda de Doces do Pós-Escola' (1)"
3447933575 = "Nós, a 'Banda de Doces do Pós-Escola' (2)"
3088286703 = "A besta selada está…… (1)"
3139702118 = "A besta selada está…… (2)"
374936049 = "O que quero consultar com o Sensei"
266683838 = "Um dia, o Sensei recebe uma consulta de Kazusa dizendo que está sendo perseguida por um stalker. Com a confissão repentina, ele decide ouvir os detalhes……"
3673151056 = "Os que vêm atacar (1)"
1587917542 = "Enquanto ouve os detalhes sobre o stalker, de repente uma garota aparece com uma 'carta desafio' e desafia Kazusa para um 'duelo'."
1489650353 = "Os que vêm atacar (2)"
2956197676 = "A verdadeira identidade do stalker era Usawa Reisa, da patrulha voluntária. Segundo Kazusa, Reisa é uma idiota entusiasmada que, desde o ensino fundamental, ataca ao ouvir falar de delinquentes. Então, Kazusa mostra ao Sensei uma foto do ensino fundamental e revela que ela também era delinquente no passado."
2953979966 = "Todo mundo tem um ou dois (1)"
1227345914 = "O Sensei pergunta se ela se arrependeu de ter contado sobre seu passado. Kazusa responde que é apenas um passado que quer esquecer. Diz também que está cansada de Reisa ficar trazendo à tona o passado; são estudantes do ensino médio agora. O Sensei a acompanha até a escola e depois pergunta sobre Reisa a Suzumi, da patrulha voluntária."
3880511578 = "Todo mundo tem um ou dois (2)"
379247669 = "O Sensei vai com Suzumi a pedido de ajuda de Reisa. No entanto, quando chegam, tudo já havia terminado. O Sensei diz a Reisa que Kazusa não é mais delinquente, é apenas uma aluna vivendo uma vida escolar comum."
1945166588 = "Mesmo que os ingredientes estejam todos separados (1)"
259113567 = "Para ver como estão os outros membros, o Sensei visita a sala do Clube de Doces do Pós-Escola. Natsu e Airi dizem que 'não sabem o que houve entre Kazusa e Reisa, mas isso não vai mudar o relacionamento'. Quando suspira aliviado, a foto do ensino fundamental de Kazusa cai e é vista pelos membros……"
4050058228 = "Mesmo que os ingredientes estejam todos separados (2)"
3821896350 = "O Sensei continua a dar atenção à consulta de Kazusa. Ao ouvir sobre a conversa com Reisa e que os membros do Clube de Doces do Pós-Escola também souberam de seu passado, Kazusa fica preocupada."
697992102 = "Banda de Doces do Pós-Escola? (1)"
25590586 = "Sabendo que Kazusa era delinquente, todos os membros do Clube de Doces do Pós-Escola mudam o nome para Banda de Doces do Pós-Escola e vestem roupas de delinquentes para recebê-la. Ignorando a confusão de Kazusa com a mudança repentina, Reisa, vendo aquela cena, confunde que Kazusa, a 'Casper League', não parou de ser delinquente, mas criou uma nova organização, e ataca a Banda de Doces do Pós-Escola."
3920525389 = "Banda de Doces do Pós-Escola? (2)"
3506014961 = "Derrotada pela Banda de Doces do Pós-Escola, Reisa desmaia. Kazusa diz que o tempo de delinquente é um passado que quer esquecer e que não quer que toquem no assunto, e vai embora. Reisa, que estava caída no chão ouvindo tudo, fica chocada com suas palavras."
2905518164 = "Sobre o passado que quero esquecer (1)"
3687706864 = "O Sensei chama Reisa e tenta conversar sobre Kazusa, mas, para obter informações sobre a 'Casper League', delinquentes se interpõem."
3914779207 = "Sobre o passado que quero esquecer (2)"
3963225956 = "Reisa e o Sensei repelem os delinquentes. Reisa se sente responsável porque os delinquentes ouviram o boato de que 'Kazusa está tentando criar uma nova organização'. Reisa decide proteger a 'comum' Kazusa, entrega a carta desafio ao Sensei e parte para a luta contra a onda de delinquentes que se aproxima."
2675913389 = "Não gosto de idiotas barulhentos e entusiasmados (1)"
4274647011 = "O Sensei entrega a Kazusa a carta desafio de Reisa. Embora aliviada por tudo ter acabado, Kazusa sente um pouco de apreensão e pergunta ao Sensei o paradeiro dela."
4266006947 = "Não gosto de idiotas barulhentos e entusiasmados (2)"
1092601913 = "Kazusa e o Sensei se infiltram no esconderijo dos delinquentes para salvar Reisa. Lá, os membros do Clube de Doces do Pós-Escola também aparecem. Como 'Banda de Doces do Pós-Escola', eles entram para salvar Reisa."
3566887939 = "Nós, a 'Banda de Doces do Pós-Escola' (1)"
3175463900 = "Reisa é encurralada. No momento crítico, a Casper League e os quatro reis da Banda de Doces do Pós-Escola entram em cena para ajudar."
854792900 = "Nós, a 'Banda de Doces do Pós-Escola' (2)"
1330585549 = "A Banda de Doces do Pós-Escola consegue resgatar Reisa. Kazusa devolve a carta desafio a Reisa, que desmaiou, e o incidente chega ao fim. O Sensei convida todos os que se esforçaram a noite toda para comer doces."
544026336 = "A besta selada está…… (1)"
8928475 = "Com o incidente resolvido, Kazusa agradece com sentimentos renovados. O Sensei pergunta por que ela parou de ser delinquente. Kazusa sorri, dizendo que viu uma garota rindo enquanto comia doces em um café, num dia realmente comum, e quis ser assim. E assim, a consulta termina, e Kazusa volta a ser uma garota 'comum'."
3396719460 = "A besta selada está…… (2)"
3260678421 = "De volta à rotina normal na sala do Clube de Doces do Pós-Escola. O Sensei e Kazusa encontram Reisa lá…… Com a compreensão equivocada de que a Banda de Doces do Pós-Escola está 'selando a Casper League', Reisa mais uma vez desafia Kazusa. Seus olhos parecem, de alguma forma, alegres."
1330006888 = "Na sua marca em Millennium"
3761109965 = "A cerimônia de abertura do maior festival escolar de Kivotos, o 'Grande Festival Esportivo', está prestes a começar! Será que as alunas de Millennium conseguirão superar incidentes inesperados e terminar os preparativos a tempo?"
1252397437 = "Véspera do grande festival esportivo"
1919278635 = "Mestre de Millennium"
4253304983 = "Hacker de Millennium"
3276166777 = "Treinadora de Millennium (1)"
3544225624 = "Treinadora de Millennium (2)"
4231625923 = "Torcida de Millennium? (1)"
1551337824 = "Torcida de Millennium? (2)"
990654860 = "Associação Contra o Grande Festival Esportivo"
1480833506 = "Tanque em nome da torcida"
143433522 = "Grande festival esportivo para todos"
1757313669 = "Dia do grande festival esportivo"
2470008028 = "Véspera do grande festival esportivo"
2617062401 = "Antes do maior festival escolar de Kivotos, 'Grande Festival Esportivo', o robô de torcida quebra devido a um acidente inesperado. O Sensei, contatado por Yuuka e Noa do Seminário, vai a Millennium. Por outro lado, Noa, preocupada com Yuuka, que está se esforçando demais nos preparativos, pede ao Sensei que ajude nos preparativos do festival esportivo sem que Yuuka saiba."
845225262 = "Mestre de Millennium"
1370627587 = "Noa e o Sensei visitam o Clube de Engenharia para consertar o robô de torcida. Ao ouvir a história, o Clube de Engenharia diz que, com esse tipo de quebra, só ficaria pronto no limite da cerimônia de abertura. No entanto, dizem que, em vez de consertar, podem fazer um novo robô em 3 horas. Deixando o robô com o Clube de Engenharia, eles vão cuidar de outras tarefas."
4262322769 = "Hacker de Millennium"
2239879700 = "Noa e o Sensei visitam o Veritas, o grupo de hackers de Millennium. Inicialmente desconfiados da visita de Noa, eles se abrem com suas palavras sinceras e decidem ajudá-la. Enquanto isso, Chihiro conta a eles que há vestígios de alguém tentando hackear o servidor de Millennium –"
3776835865 = "Treinadora de Millennium (1)"
2305382535 = "Para verificar a condição dos atletas participantes, Noa e o Sensei visitam o Departamento de Treinamento. Sumire está treinando ainda mais intensamente para o Grande Festival Esportivo. No entanto, os alunos que treinavam com ela não conseguem acompanhar sua paixão e todos vão embora. Então, Sumire sugere um exercício 'leve' ao Sensei."
1674288483 = "Treinadora de Millennium (2)"
3186889323 = "Em algum lugar da Millennium Science School, uma misteriosa aluna de Millennium parece estar fazendo planos para cancelar o 'Grande Festival Esportivo' –?"
2310867314 = "Torcida de Millennium? (1)"
3921454463 = "O Sensei e Noa voltam para ver o andamento do robô. No entanto, o que os espera são os membros do Clube de Engenharia vestidos de torcida. Ao perguntar o motivo, o robô foi concluído, mas saiu correndo descontrolado. Ao verificar os diagramas, Noa sugere que alguém pode ter hackeado o robô."
3125605064 = "Torcida de Millennium? (2)"
2812405180 = "Noa e o Sensei visitam o Veritas junto com o Clube de Engenharia vestido de torcida. Após ouvir a história, o Veritas se dispõe a verificar se há movimentos suspeitos no campus."
3491008751 = "Associação Contra o Grande Festival Esportivo"
3227473772 = "Com a ajuda do Veritas, o grupo descobre a aluna de Millennium que roubou o robô. Aparentemente, eles são um grupo de alunos que não gostam de esporte e se opõem à realização do Grande Festival Esportivo. Os alunos, que vinham fazendo várias sabotagens, atacam com o robô roubado do Clube de Engenharia."
1811732470 = "Tanque em nome da torcida"
1826342970 = "O Veritas e o Clube de Engenharia lutam contra o poderoso 'Track Crusher'. Com a ideia de Noa, eles conseguem neutralizar o Track Crusher. A situação vira rapidamente – e os alunos da 'AssoCGF' são capturados por Sumire, e a confusão termina."
2110629097 = "Grande festival esportivo para todos"
158795387 = "O Sensei e Noa perguntam aos alunos da 'AssoCGF' por que tentaram atrapalhar o festival esportivo e ouvem suas razões. Então, para criar um festival esportivo que todos possam aproveitar, inclusive os alunos que não são bons nos esportes, eles decidem ajustar as regras. Depois, todos se unem e trabalham nos preparativos."
3915786569 = "Dia do grande festival esportivo"
2806214484 = "Yuuka acorda atrasada e descobre que, enquanto dormia, outros alunos de Millennium prepararam o festival esportivo. Ela agradece a Noa e ao Sensei…… E assim, o 'Grande Festival Esportivo' começa."
3198922083 = "Preparar, apontar, fogo! ~Grande Festival Esportivo de Kivotos~"
2064697458 = "Começa o Grande Festival Esportivo de Kivotos, o 'Grande Festival Esportivo'. Nos bastidores do festival onde várias escolas se reúnem e competem, há um ar de turbulência…… Para qual escola sorrirá a deusa da vitória?"
3925547749 = "Cerimônia de abertura ardente"
3108307433 = "Comitê executivo ardente"
976609379 = "Tentação da área de barracas"
1664788696 = "Competição de busca de objetos tumultuada (1)"
4012907231 = "Competição de busca de objetos tumultuada (2)"
948931625 = "Almoço tardio"
3430109642 = "Patrulha dos arredores"
1160558781 = "Cooperação (1)"
2654285294 = "Cooperação (2)"
2571759110 = "Encontro por acaso (1)"
3341472815 = "Encontro por acaso (2)"
1594092657 = "Protagonista do Grande Festival Esportivo"
3513542657 = "Para todos –"
3604354101 = "Edição da Sociedade de Estudos Gastronômicos"
3493330240 = "Edição da Equipe RABBIT"
2130549479 = "Edição do Comitê de Disciplina de Gehenna"
1369774585 = "Edição do Clube de Engenharia & Veritas"
2410603120 = "Edição da Ordem dos Cavaleiros de Resgate & Departamento de Medicina de Emergência"
2564006886 = "Edição do Comitê Executivo"
3330937226 = "Cerimônia de abertura ardente"
2584298955 = "Com a declaração de abertura de Hanako e Ayane, o Grande Festival Esportivo finalmente começa. No entanto, a declaração causa uma pequena confusão."
1333557687 = "Comitê executivo ardente"
309572292 = "Yuuka, Ako, Hasumi e Marie são escolhidas para representar cada escola no comitê executivo do Grande Festival Esportivo. Na sede do comitê executivo, as discussões começam com a declaração de abertura. Enquanto um clima tenso paira, cada membro começa a atuar."
3733926134 = "Tentação da área de barracas"
3416522998 = "Enquanto passeava pela área de barracas, o Sensei encontra Hasumi em patrulha. Ela diz que está aumentando o número de alunos que se empolgam com o clima de festival. Nesse momento, Haruna, da Sociedade de Estudos Gastronômicos, aparece e oferece um milho assado como sinal de amizade. Para Hasumi, que hesita em comer algo calórico, Haruna diz que seu corpo não engorda. Ferida por essas palavras, Hasumi decide derrotar Gehenna."
1059932753 = "Competição de busca de objetos tumultuada (1)"
121038983 = "Graças à atuação da Sociedade de Estudos Gastronômicos, Gehenna dispara na liderança. Yuuka, que não desistiu da vitória geral de Millennium, vê as informações e decide participar pessoalmente da competição para contribuir para a classificação."
3445498865 = "Competição de busca de objetos tumultuada (2)"
1473177672 = "Yuuka participa da 'corrida de busca de objetos' no lugar de Yuzu. Ela verifica o bilhete, pega o Sensei e cruza a linha de chegada em primeiro. Como pegou o Sensei primeiro, surge o boato de que o 'objeto' de Yuuka seria 'a pessoa amada', mas, como seria desclassificada se revelasse, ela nega fracamente."
357458073 = "Almoço tardio"
815055312 = "Após a corrida de busca de objetos, o Sensei vai para fora do estádio para almoçar. Lá, encontra Marie ajudando e guiando as pessoas. Como Marie ainda não almoçou, ele a convida para um almoço tardio em uma barraca da Sociedade Comercial Genbu. Quando o funcionário da barraca se queima, o Sensei o leva ao Departamento Médico Conjunto."
44282278 = "Patrulha dos arredores"
2955793294 = "Enquanto o festival esportivo está animado, aumentam os alunos que se empolgam e exageram. Hasumi patrulha o estádio lidando com esses problemas quando ouve de Kirino e Fubuki, da Academia de Polícia Valkyrie, que estão de serviço de segurança no local, sobre uma pessoa suspeita."
801109073 = "Cooperação (1)"
156824262 = "Hasumi e o Sensei decidem coletar testemunhos a partir da conversa de Kirino e Fubuki. Continuando as investigações, Ako, Yuuka e Marie, percebendo que algo está estranho, aparecem e se oferecem para cooperar. Assim, descobrem que a pessoa suspeita está na entrada subterrânea do Estádio Atlético. Lá, estão membros do Departamento de Obras que planejavam um protesto por causa da jornada de trabalho de três dias."
3318312354 = "Cooperação (2)"
3358539827 = "No meio da 'corrida com obstáculos', os membros do Departamento de Obras que fugiram do subsolo e o robô de torcida invadem a pista. Shiroko atira um foguete antitanque para pará-los, mas o robô começa a descontrolar…… O comitê executivo se mobiliza para controlar a situação."
2375781008 = "Encontro por acaso (1)"
2738269747 = "O grupo consegue controlar a situação. Cada um vai cuidar do que resta, e Hasumi volta a patrulhar. Durante a ronda, encontra alunas de Hyakkiyako preocupadas por estarem com falta de membros para a guerra a cavalo. Hasumi lhes transmite uma estratégia."
3141961980 = "Encontro por acaso (2)"
2552643930 = "Com a estratégia de Hasumi, Hyakkiyako vence a guerra a cavalo. Agradecendo, as alunas se despedem de Hasumi, desejando lutar novamente juntas."
3493720274 = "Protagonista do Grande Festival Esportivo"
66281853 = "Resta apenas a última prova do Grande Festival Esportivo, o 'Revezamento Interescolas'. Todas as escolas estão empatadas em primeiro lugar. Quem vencer o 'Revezamento Interescolas' será o campeão geral. Antes da grande final, os âncoras de cada escola anunciam desistências. Eram ações pensando em Hasumi, que só trabalhou no comitê executivo e não participou das provas. Empurrada pelas pessoas ao redor, Hasumi decide correr como âncora."
1506422008 = "Para todos –"
674303561 = "Com as palavras de encerramento de Noa, o Grande Festival Esportivo chega ao fim. Enquanto os preparativos para a festa pós-festival começam, o Sensei pergunta a Hasumi sua opinião sobre o evento. Hasumi responde com um sorriso – e parece que, um pouco, os ressentimentos entre as escolas se dissolveram. Assim, Hasumi e os outros membros do comitê executivo aproveitam um chá da tarde até começar a dança folclórica."
1088523469 = "Edição da Sociedade de Estudos Gastronômicos"
842670294 = "Os membros da Sociedade de Estudos Gastronômicos decidem comemorar comendo alimentos com o 'Vale Refeição Universal', o prêmio do revezamento. Haruna pergunta a Junko se ela gostou do festival esportivo. Junko responde que, embora tenha se envolvido em várias confusões, foi divertido como sempre. Ao saber que a dança folclórica vai começar, eles vão para a festa pós-festival."
601597532 = "Edição da Equipe RABBIT"
3756768664 = "A Equipe RABBIT realiza uma reunião de reflexão sobre o Grande Festival Esportivo. Saki está desanimada por não ter alcançado bons resultados, mas Miyako sorri, dizendo que conseguiram proteger a segurança dos cidadãos. Para encerrar o dia, eles vão patrulhar a festa pós-festival."
2149728944 = "Edição do Comitê de Disciplina de Gehenna"
2439454168 = "Após todas as provas, Ako finalmente encontra Hina, que havia desaparecido. Ako a acalma, Hina explica por que se ausentou e ouve que, enquanto ela estava fora, Ako cooperou com outros alunos e resolveu vários incidentes. Depois de trocarem palavras, as duas vão para a fogueira."
3249747138 = "Edição do Clube de Engenharia & Veritas"
2302245089 = "Utaha aparece perto de Chihiro, que está fazendo o trabalho solicitado pelo Seminário. Enquanto relembram os acontecimentos do festival esportivo, Utaha, provocando, sugere que Chihiro também faça cheerleading."
3783295464 = "Edição da Ordem dos Cavaleiros de Resgate & Departamento de Medicina de Emergência"
3449950515 = "Serina e Sena cuidam dos pacientes no Departamento Médico Conjunto. Após o último paciente ir embora, Serina agradece sinceramente a Sena por ajudá-la. Depois, Sena pergunta sobre os rumores sobre a 'Ordem dos Cavaleiros de Resgate' que circulam, mas Serina apenas ri sem graça e convida Sena para a fogueira."
1795578867 = "Edição do Comitê Executivo"
2611143306 = "Após a cerimônia de encerramento, o comitê executivo descansa um pouco na sala de operações, tomando chá. Hasumi oferece chá a Noa e suspira aliviada por 'ter terminado bem'. Noa sorri significativamente, dizendo que o festival só termina quando voltam. Nesse momento, chega a notícia de que outro problema ocorreu na festa pós-festival."
1610223773 = "Tendo conseguido o 'Vale Refeição Universal', os membros da Sociedade de Estudos Gastronômicos aproveitam as comidas das barracas e relembram os acontecimentos do dia."
2189723464 = "A Equipe RABBIT, que atuou nos bastidores para proteger a paz de Kivotos durante o Grande Festival Esportivo. Será que os resultados da operação foram……"
864400319 = "Após todas as partidas, Ako finalmente encontra Hina. Diante de Ako, que se esforçou muito na organização do evento, Hina faz uma proposta."
1656654718 = "Após o festival esportivo, alguém aparece perto de Chihiro, que está limpando……"
2150761988 = "Sena e Serina cuidam dos pacientes no Departamento Médico Conjunto. Sena aproveita a oportunidade para perguntar sobre os rumores envolvendo a Ordem dos Cavaleiros de Resgate, mas……"
2425727335 = "Após a cerimônia de encerramento, o comitê executivo aproveita o chá que Nagisa trouxe. Será que o festival esportivo terminará em paz?"
2558784607 = "Feliz Natal na Catedral ~O presente da Ordem dos Cavaleiros de Resgate~"
2278050079 = "O Natal chegou a Kivotos. Um dia santo em que todos compartilham a alegria. Nesse dia, a Ordem dos Cavaleiros de Resgate continua a levar 'resgate'. Vamos espiar um dia especial, mas ao mesmo tempo comum, deles!"
