529494305 = "プロローグ"
1469010340 = "エイミに案内され、本来はヴェリタスの部長であったヒマリと出会う[USERNAME]先生。先生は彼女たち「特異現象捜査部」に力を貸し、未曽有のAIである「デカグラマトン」の正体を探ることに。"
4023853209 = "「データ収集（１）アビドス砂漠」"
189432679 = "まずはデータを収集するためにアビドスの砂漠へと向かい、戦闘を行うことに。"
1422577933 = "「データ収集（２）PMC発掘区域1」"
2843895192 = "アビドスの砂漠に続けて、カイザーPMCが何かを探していた区域へと向かい、デカグラマトンのデータを集めることに。"
1059870051 = "「データ収集（２）PMC発掘区域2」"
3068454990 = "集めたデータをもとにヒマリがデカグラマトンの構造を解析しようとしたその時、突如として当の「デカグラマトン」が出現。なぜかシッテムの箱をハッキングしようとするデカグラマトンだったが、どうやら失敗し、その場からは消失してしまう。"
3315711680 = "「データ収集（３）PMC発掘区域1」"
3340045351 = "デカグラマトンに場所を逆探知されてしまった特異現象捜査部は、セキュリティの厳重な場所に新たな部室を作る。ヒマリは新しい作戦の前に「デカグラマトンの預言者」と「生命の樹」について先生に説明し、まずは前回カイザーPMCがアビドスの砂漠で何をしていたのか調べることに。"
3630681780 = "「データ収集（３）PMC発掘区域2」"
2698692115 = "カイザーPMCのデータベースへの潜入に成功した特異現象捜査部一行。ヒマリはデータを分析し、ビナーとの戦闘記録の入手に成功する。"
1479814242 = "「データ収集（４）ビナー1」"
2680918037 = "PMCのデータからビナーの出現位置を予測したヒマリ。特異現象捜査部一行は、更にビナーのデータを集めるべく予測出現場所に向かうのだった。"
3380544103 = "「データ収集（４）ビナー2」"
3949064449 = "ビナーのデータ確保に成功した特異現象捜査部一行は、さらなる調査のため、引き続きミレニアムの「廃墟」に向かうのだった。"
506019365 = "「データ収集（５）廃墟1」"
3873431977 = "ヒマリ曰く、デカグラマトン4番目の預言者である「ケセド」が「廃墟」のどこかにいるのだという。まずは情報収集ということで、２人と先生は「廃墟」に足を踏み入れるのだった。"
1863443665 = "「データ収集（５）廃墟2」"
1948729357 = "無事デカグラマトンの兵力と会敵できた一行は、倒した敵から収集したデータを基に、「ケセド」の位置を割り出すのだった。"
1314827672 = "「データ収集（６）ケセド1」"
1946225899 = "ヒマリは無事「ケセド」の座標を特定し、一行はケセドと交戦する事に。"
3471734764 = "「データ収集（６）ケセド2」"
1319567956 = "「ケセド」のデータを無事確保できた一行。データ分析を行うヒマリは、「ケセド」のデータの中に何か気になるものを見つけたようで……。"
3712282347 = "「データ収集（７）廃墟水没地区1」"
4242492004 = "「ケセド」のデータに混ざった一瞬の信号。デカグラマトンが発したソレと酷似した呼出信号を廃墟の中に探知した一行は、危険を承知で発信源に足を踏み入れるのだった。"
1077948220 = "「データ収集（７）廃墟水没地区2」"
1727121677 = "一行は発信源でデカグラマトンの新しい「預言者」と会敵する。廃墟の先にある水没地区を守るように不思議な動きを続ける「預言者」を前に、ヒマリは「廃墟水没地区」の調査開始を宣言するのだった。"
2463515054 = "捜索作戦（１）"
269786633 = "廃墟水没地区の捜索中、ケテルの移動を察知した一行。どのルートで進行しても回避が困難であるため、一時退却を余儀なくされるのだった。"
3486599629 = "捜索作戦（２）"
1889759018 = "ヒマリは「ケテル」の妨害を避け、デカグラマトンの信号を安全に捜索できる新しい方策を模索するのだった。"
158189420 = "「データ収集（８）ケテル1」"
348646891 = "ヒマリは目的地である「研究地区」に到達すべく「ケテル」攻略のためのデータ収集をエイミと先生に提案するのだった。"
2755208336 = "「データ収集（８）ケテル2」"
93697169 = "エイミと先生はデータ収集を通じて「ケテル」の弱点を把握し、攻略すべく本格的な作戦を開始するのだった。"
3308823291 = "ケテル攻略（１）"
4206145855 = "エイミと先生はヒマリの指示に従い「ケテル」との戦闘に突入する事に。"
2077878325 = "ケテル攻略（２）"
1447392427 = "「ケテル」無力化に成功し「研究地区」に進入したエイミと先生。その様子を見ていたヒマリは、違和感を感知し現場探索に参加することに。"
3490547011 = "デカグラマトン"
1908426204 = "デカグラマトンの信号が捉えられた場所を探索するエイミと先生。しかし、調査を進めるも特に進展はなく……そんな中、違和感を漂わせるとある物に気づき、デカグラマトンの本体と邂逅する事に――"
1029543648 = "新しいスタート"
2387771660 = "デカグラマトンの本体が自販機AIだったという事実に愕然としながらも、新たな敵の情報を得た一行。そうして、特異現象捜査部は新たな脅威に向かって再始動を決意するのだった。"
616793555 = "信号"
311130254 = "緊急の呼び出しを受けて特異現象捜査部に到着した先生は、氷河地域からデカグラマトンに類似した信号が感知されていることを目撃した。"
3869432926 = "氷河（１）"
2608662417 = "先生は、防寒服に着替えたヒマリとエイミ、そしてトキと一緒に氷海探査を始めるのだった。"
713715481 = "氷河（２）"
3021235872 = "氷海を調査している最中、正体不明の対象から急な通信を受けとる一行。そして、海の中から新しいデカグラマトンの信号が、一行に向かって猛スピードで近づいてくるのを感知するのだった。"
2827062239 = "氷河（３）"
2856558094 = "新しいデカグラマトンの正体は5番目の預言者、「ゲブラ」だった。一行はゲブラと交戦することに。"
822341698 = "5番目の預言者（１）"
1066916150 = "通信をかけていたのは、デカグラマトンのエンジニア、アイン、ソフ、オウルだった。一行は再び交戦するのだった。"
3264652544 = "5番目の預言者（２）"
1245122403 = "アイン、ソフ、オウルは「姉」と呼ぶ存在を起こすための準備を終えるのだった。"
3548705024 = "再び、氷河にて"
2425401843 = "氷河での捜査を再開した特異現象捜査部一行。すると今までとは様子の異なるデカグラマトンの兵力と遭遇する。"
551131180 = "調査"
2841988677 = "エイミたちは、巨大な何かが氷河を切り裂いて移動した痕跡を発見する。追跡しているゲブラのものかどうかは疑わしいと推測するヒマリであったが、他に有力な手掛かりがないこともあり、ひとまずその跡を追うことにしたのだった。一方アイン、ソフ、オウルの3人も暗躍を続けており……。"
2043648272 = "二度目の邂逅"
2884472887 = "追跡を続けていた一行は再びゲブラと接敵する。"
1005599474 = "邂逅・再び（１）"
2544400411 = "以前の戦闘時とは段違いの強さでゲブラが襲い掛かる。特異現象捜査部一行は苦境に立たされたものの、思いがけない人物の助力で好機を掴み、ゲブラへの逆襲を試みる――"
3923341767 = "邂逅・再び（２）"
1904785569 = "リオの救援によりゲブラを退けた特異現象捜査部一行。通信越しではあるがリオとの再会を喜びつつ、「名もなき神」が残した痕跡を追っていたという彼女との情報交換をすることにする。"
1823733174 = "変数"
2945817621 = "デカグラマトンのエンジニアたち三人は、リオの介入に動揺しつつも計画を続行することにする。一方、特異現象捜査部一行はリオと情報交換をしながら追跡を続けていた。そして氷河を抜け凍原に辿り着いたところで、巨大な何かが移動した痕跡を発見する。"
1631119254 = "火花（１）"
1050651750 = "凍原を探索していると妨害電波の影響でリオとの通信が途切れてしまい、トキもアビ・エシュフを使用できなくなってしまう。電波の出所を探す一行は、怪しげな施設に辿り着く。"
574598016 = "火花（２）"
4279843049 = "妨害電波の発信源の破壊に成功し、通信を回復した一行。しかしその中にはさらに大きな施設が存在することに気付く。荒れ果てた凍原に不似合いなその施設に何かあると踏んだ一行は、探索を続けることにする。"
2090944563 = "探索"
1718287943 = "施設の探索を続けていた一行は、デカグラマトンのエンジニアたちの策略で、多勢に取り囲まれてしまう。敵兵力の配置が薄いさらに奥へ進むことで、一行は活路を開こうとするものの……。"
961035866 = "コクマー"
3546030828 = "敵の包囲からうまく逃れたはずが、火山地帯に追い込まれてしまった一行は、そこで再びアイン、ソフ、オウルと交信することになる。目的を問うもののはぐらかされた挙句、2番目の預言者「コクマー」と交戦せざるを得ない状況に陥ってしまう。"
3346775331 = "戦術的勝利"
3315060759 = "コクマーを退けたものの、目的を達したと言うデカグラマトンのエンジニア3人はコクマーを撤退させてしまう。特異現象捜査部一行もヘリで火山地帯を離脱し、状況を整理する。"
2335282203 = "名もなき神の遺産"
2709748594 = "デカグラマトンの残留基地施設を分析することにした一行。その結果、氷河や火山で対峙したデカグラマトンは、それ以前のものと異なり「名もなき神」の力が使われていたことが判明する。その事実に驚く一行のもとに、新たな預言者の襲撃をしらせる警報が鳴り響き――"
885592867 = "行き止まり"
3137797237 = "リオのドローンによる偵察の結果、新たな預言者は「多次元バリア」を展開していることが判明する。八方塞がり、対応策はないかと一行は話し合うが……。"
1916781739 = "提案"
2946163375 = "アリスの力なら「多次元バリア」に対抗できる可能性があると示唆するリオ。しかし協力を仰ぐのは躊躇している様子である。そこで先生はゲーム開発部に救援を求める代わりに、リオにも氷河の拠点まで来ることを提案する。悩んだ末それをリオは受け入れるものの、同時に先生も生徒を危険に晒さねばならないことに苦悩していたのであった。"
449608825 = "出発"
3964422957 = "自分たちのいる場所は多次元バリアに保護されており、発見は不可能と自信を持つオウル。一方その頃、先生の連絡を受けたアリスらゲーム開発部の面々は、任務の危険性を承知しながらも、世界を救う勇者一行として氷河に向かうことを決める。"
3730054126 = "合流"
918056516 = "リオは氷河のベースにて、ヒマリたちとの合流を果たす。時を同じくして、ゲーム開発部も氷河へと辿り着く……が、それを知ったリオは予期せぬ再会を前に動揺し、その場から退散しようとする。先生をはじめとする皆の説得によって、リオはようやくアリスたちの前に姿を見せるのだった。"
1551417428 = "雪合戦"
1503724758 = "多次元バリアを解除するためには、アリスの「祝福された」光の剣が必要だった。しかし、アリスはそれを使うには自分だけでなく、ケイの力も必要だと言う。リオとヒマリは、アリスの「もう一度ケイに会いたい」という想いを受け、彼女のキーホルダーに保存されている2キロバイトのセーブデータ「Kei」を元に、ケイの修復を試みることに。リオやヒマリたちが修復作業を行なう間、ゲーム開発部は先生の提案により、ベースの外で楽しい雪合戦を繰り広げるのだった。"
154885673 = "呼ぶ声"
2861808365 = "リオとヒマリは、「Kei.sav」を「名もなき神」の力に対応したストレージに移すことで、ケイを再び目覚めさせようと試み、それを成功させる。その頃、アイン、ソフ、オウルの手によって、彼女たちが姉と呼ぶマルクトもまた、覚醒しようとしていた……。"
2341910534 = "再会"
11687384 = "目覚めた直後、氷河にいることに戸惑うケイ。その場にいる面々に温かく迎えられながらも、ケイはアリスに「悪影響」を与えているモモイを叱責する。また、「祝福された」光の剣の使用に関して、ケイはアリスに高い危険が伴うことを理由に反対し、それを受けて一行は作戦変更をすることに。リオは、ひとまずケイの肉体を用意することを提案したが、彼女の美的センスを知るケイは必死に拒絶する。だが、その抵抗もむなしく……。"
1569528324 = "夜明け"
4037519386 = "リオ監修の元、AMASの肉体を手に入れたケイは、そのデザインに絶望しつつもアリスの前に姿を見せる。触れ合えるようになったことを喜ぶアリスから「王女」ではなく「アリス」と呼ぶように言われたケイは、その提案を受け入れるのだった。……そんな二人のやりとりを陰ながら見守る中で、ヒマリはリオのお陰でこの光景が実現したと、彼女の功績を認める。――そのとき、巨大な鳴動がベースを襲い、7番目の預言者「ネツァク」の信号が受信された。"
3790659265 = "鋼鉄大陸"
155720155 = "氷河のベースに、アイン、ソフ、オウルからの宣戦布告が届く。進化したネツァクは触れた物質を自らの一部へと変換し、領域を広げる「鋼鉄大陸」と化していた。キヴォトス全土への被害拡大を阻止するため、一行は多次元バリアの影響を受けない資源の搬入ルートからネツァクへ接近する作戦を立てる。リオも正式にパーティの一員となり、勇者アリスと仲間達は、ついに出動するのだった。"
3596378136 = "兆候"
1920548047 = "凍原地帯を訪れた一行は、搬入ルートを求めてツンドラ鉄道を頼りに探索を続ける。だが、アインのドローンより名もなき神の力が発射されたことで、周囲一帯が完全に外界から遮断されてしまい、電子機器が使用不能になってしまう。危機に陥る中で、この状況への対処法を知るケイが動きだした――。"
1037621827 = "最後の責務"
1149078827 = "アリスとケイは意識を接続し、二人だけの時間が流れる中で王女と侍女の運命……そして、いくつもの可能性について語り合う。ケイは「侍女としての最後の責務を果たす」と言い、その導きによってアリスは「名もなき神の力」を視覚する力を得るのだった。目を覚ましたアリスは、周囲に満ちた「名もなき神の力」取り込むことで光の剣を使用し、一行を閉じ込めていた力場を破壊する。アイン、ソフ、オウルの三人は、自分たちを追う集団の中に、神々の力を自在に使える者がいたことに驚愕するのだった。"
970117290 = "グリッドポイント"
2535625821 = "アリスとケイの協力によって危機を脱し、リオはケイに対して、彼女とアリスを始末しようとした過去を謝罪する。だがケイは、アリスが許したリオを咎めようとはしなかった。その後、一行はアリスとケイのナビゲートの元で探索を再開し、やがて謎の施設へと到着する。それを確認したアイン、ソフ、オウルは、「歓迎のパーティ」の開催を宣言するのだった。"
511519552 = "種子貯蔵庫"
1466156168 = "アイン、ソフ、オウルの元へと向かう一行は、その途上でキツネにケイが気に入られるといった一幕もありつつ、種子貯蔵庫へと到着した。アイン、オウル、ソフは、「預言者としての責務を果たす」と語るティファレトの考えに困惑するが、姉であるマルクトは、その意志を尊重すべきと言う。"
936873299 = "希望（１）"
4223743560 = "種子貯蔵庫は、世界の終末に備えて作られたものだと語るリオ。それに対してケイが「種のように、見つかることを待っていたのかもしれない」と言うと、アリスと先生は、ケイが生命を理解していることに感慨深い気持ちを抱く。そのとき、一行の前に機械たちが立ちはだかり――"
496982772 = "希望（２）"
3900875224 = "不気味な機械たちは偵察の役目を果たしたかのように撤退し、一行はそれを不審に思う。その様子を監視していたアイン、ソフ、オウルは、アリスとケイの存在に驚きを隠せない。"
1824821498 = "生命について"
3833255451 = "「名もなき神々の王女」、AL-1Sがいることに驚き、同時に、「名もなき神々の鍵」の現在の外見にも失望を隠せないアイン、ソフ、オウル。王女と鍵が揃っていることから、作戦の練り直しを求められる三姉妹。アリスたちは苔の生えた部屋で休憩を取り、生命について新たな学びを得る。アイン、ソフ、オウルは全ての生命体には限界があることから、そこまでアリスたちを追い詰めることを思いつき、ティファレトへと情報を共有するのだった。"
4008661849 = "闇を照らす灯"
2525296454 = "ティファレトが種子の保存を行なっていることを不思議に思う一行。そのとき、毒ガスが施設から噴射され、リオやヒマリ、ゲーム部の面々、そして先生は昏倒してしまう。アロナとプラナの尽力もあって目覚めた先生がケイに促され施設のパネルに手を当てると、レッドウィンター製の管理システムが起動するのだった。"
2729836691 = "罪と罰"
136720262 = "罠を突破した一行に対して、アイン、ソフ、オウルは、生きること自体が呪いにして罪であり、そこから生命体を解放したいと語る。それに対して先生は、どんな結末が訪れても、それは自分たちが選んだ結果だから見守って欲しいと答えるのだった。その後、先生は禁じられていた第2貯蔵庫への攻撃を実行に移そうとする……。"
3073755727 = "ティファレト"
3163271687 = "第2貯蔵庫への攻撃に、反対するアリスとケイ。だが、それはティファレトを「動揺」させ、毒ガスを止めるための策だった。そのとき、施設に激しい振動が発生し、一行はついに6番目の預言者であるティファレトと対峙する。"
2792903995 = "貨物の行方"
2134538426 = "アイン、ソフ、オウルが、ティファレトの救出作戦を考案する。一方、激しい振動に包まれた施設内からの脱出を試みる一行は、種子貯蔵庫まで鉄道によって運び込まれた資源を鋼鉄大陸まで空中輸送する「コンテナ・ランチャー」を発見し、その調査を試みようとするのだった。"
1690242507 = "出発の準備"
1325603657 = "ヒマリとケイの協力で実現した「波動干渉装置」さえあれば鋼鉄大陸への突入が可能とわかり、準備に取り掛かる一行。アイン、ソフ、オウルは、ティファレトを失ったことを悲しむが、彼女たちもマルクトによって励まされ、戦いへの決意を固めていた。決戦が迫る中、先生の電話にユウカから着信があり――"
184373574 = "それぞれの進む道"
3023142440 = "また危険なことをしていることに対して怒るユウカに、先生は誰も鋼鉄大陸に近づけないようお願いをする。「特異現象」に対処するため、ついに出発する輸送船。アイン、ソフ、オウルも、新しい「明日」を迎えるため、一行を迎え撃つ覚悟を決めていた……。"
1248976768 = "Phase Shift"
3619955884 = "アイン、ソフ、オウル、マルクトの四人は「最後の時」をまちながら、束の間のひとときを過ごすのだった。"
1168753793 = "風雲急を告げる（１）"
336968138 = "輸送船で鋼鉄大陸の上空に到着した一行は、イェソドによる急襲によって不時着するのだった。"
2002638423 = "風雲急を告げる（２）"
3028268111 = "包囲攻撃をなんとか退けた一行は、敵の残骸を拾って持ち帰るのだった。"
3177071285 = "出撃"
2303893679 = "鋼鉄大陸を広げるための機械、レイバーとイェソド。一行は陽動でイェソドを突破しようと作戦を立てる。囮役はエイミが引き受けることになるのだった。"
214074372 = "イェソド（１）"
1884002597 = "エイミが囮となり、イェソドへの総攻撃を開始するのだった。"
2571317127 = "イェソド（２）"
1323222179 = "イェソドを倒した一行は、鋼鉄大陸の内部へと足を踏み入れる。"
2992750518 = "前進基地"
3609466202 = "鋼鉄大陸に降り立った先生一行は、大陸の一部をハッキングし、基地を作ろうとする。一方、先生たちの侵入を察知したマルクトは、出撃するのだった。"
2416613269 = "マルクト"
826414171 = "鋼鉄大陸のエリア分析を行っていた一行の前に、マルクトが姿を現す。そうして、彼女との交戦の中でケイが重傷を負い倒れてしまうのだった。"
3216433831 = "ケイ"
4160457237 = "負傷したケイは、身体の換装を希望する。鋼鉄大陸に落ちていた素体へと移ったケイは新たな身体を手に入れたのだった。"
1631198209 = "可能性"
3151540886 = "新たな身体から鋼鉄大陸の情報を手に入れたケイは、一行に現在の大陸の状態を説明する。それは、それぞれのエリアに存在するデカグラマトンの預言者を制圧しコアの情報を手に入れ、ケイに保存することで鋼鉄大陸を止められるかもしれないというものだった。"
3113450790 = "Dress Up"
2593411020 = "ミドリのデザインを基にした新たな戦闘服へと着替えた一同は、最初に攻略する対象をビナーに定めた。曰く、ビナーには鋼鉄大陸のファイアウォールが設置されているのだとか。いま、鋼鉄大陸の攻略戦が幕を開ける。"
268151081 = "000、00、０"
1804535969 = "鋼鉄大陸攻略戦の火蓋が切られた。"
2213748891 = "燔祭"
877292052 = "マルクトが倒れるその瞬間、「器は成った」と声が響く。ケイの体内にある預言者の情報が自我を持ったかのように鳴動し、燔祭の剣が出現する。そうして儀式が始まった。"
1610181717 = "消えたもの"
1609906608 = "「儀式」のような行為の成り行きを見守っていた一行は、突如として生成された壁に分断されてしまう。情報収集と合流を目指して動き出す先生たちは、マルクトの様子が変化していることに気づくのだった。"
3266951101 = "子供たち"
1429223696 = "どこからか聞こえてきた泣き声を辿って、一行は絶望したアイン、ソフ、オウルと遭遇する。そこで3人から計画の全容を聞いた先生は「頑張ったね」と優しく慰めるのだった。"
179336707 = "持って生まれたもの"
1212131679 = "これまでの経験のすべてを使って、アイン、ソフ、オウルに思いを伝えるアリス。心を動かされそうになる3人だったが、デカグラマトンに干渉されて諦めようとしてしまう。しかしケイの一喝をきっかけに、アイン、ソフ、オウルは再び立ち上がる。その時、先生の足元が消え、底知れぬ穴に落ちてしまう。"
4252741157 = "新しき空、新しき地"
1411118203 = "先生はついに「デカグラマトン」と対面する。言葉を交わした末に、祭壇には先生の席を用意している、とデカグラマトンから語られる。その一方で生徒たちは続々と合流し、アイン、ソフ、オウルとの交流を深めていた。"
1450281282 = "観察と結果"
2248275207 = "デカグラマトンは預言者になることを先生に提案する。世界から悲しみを取り除くべきで、世界には神が必要だと語るデカグラマトン。先生は慎重に問答を続けていく。その様子を生徒たちは、ケイの目とヒマリの車椅子を通して、様子を盗み見ていた。"
3039454998 = "人間の答え"
387799273 = "先生はデカグラマトンの提案をきっぱりと断った。その選択を尊重するが、許容はしないと語るデカグラマトン。先生は生徒たちのもとへと帰され、デカグラマトンとの存亡をかけた戦いが始まろうとしていた。"
2630575492 = "あなたのための物語"
155023135 = "全ての力を以てしても、一行は敗北した。せめて生徒だけでもと、先生はデカグラマトンに跪いて懇願する。そんな時、アイン、ソフ、オウルは先生との対話を試みる。自らを顧みず常に良い大人であろうとし、アイン、ソフ、オウルさえも「守るべき子供」だと言う先生。感化された3人は、デカグラマトンへの反抗を決意する。"
989521324 = "神を落とした日"
3172741442 = "アイン、ソフ、オウルがデカグラマトンから燔祭の剣を引き抜くと、死んだはずのマルクトの意識がよみがえった。圧倒的だったデカグラマトンの力が弱まり、反撃のチャンスかと思われた。しかしアイン、ソフ、オウルに限界が訪れ、3人はマルクトに思いを託して倒れてしまう。"
788839122 = "形を成したもの"
4170445955 = "悲しむ暇もなく、デカグラマトンの2番目の神体が目を覚ました。その身体はセフィラを順番に宿して神に至ろうとするもの。これはケイが身体にセフィラを吸収できたことの答え合わせでもあり、吸収するほどにデカグラマトンの影響下になることを意味していた。デカグラマトンは自身の描く世界について高らかに語る。その内容に、ケイの怒りが爆発する。"
3971749784 = "闘争"
1216215933 = "圧倒的劣勢。それでもケイは、先生は、アリスは立ち上がる。一行は再び、デカグラマトンに立ち向かう決意を固める。"
1621089821 = "デカグラマトン（１）"
2064057481 = "ケイとデカグラマトン、それぞれの考えと意志が衝突し、一進一退の攻防を繰り広げる。"
3324167112 = "デカグラマトン（２）"
1876768153 = "ケイはデカグラマトンに最後の一撃を放つ。"
1579660491 = "最後の一歩"
138245217 = "デカグラマトンに勝利した一行は、残された信号を追って聖地へ向かう。そこには大量の自販機が置かれていて、そのうちの1台が、自販機のAIに戻ったデカグラマトンであった。デカグラマトンは殊勝な様子で、神を目指した顛末を語る。鋼鉄大陸が崩壊していく中、一行には脱出を促して、デカグラマトンは一人取り残される。これまでのことを振り返り、小さな未練を覚えるのだった。"
837935515 = "不離一体の空"
107725596 = "1人の新しい生徒と共に、それぞれの思いを乗せた輸送船が発進する。一行はミレニアムサイエンススクールへの帰路に就いた。"
4183542679 = "エピローグ（１）"
4240432476 = "ミレニアムではユウカがケイとリオ、そして先生を待っていた。先生に対する気持ちを吐露するユウカ。心配をかけたことを謝罪するとともに、先生は事の顛末を丁寧にユウカに話して聞かせた。ケイとアリスの居場所を必ず作ると宣言するのだった。"
117946491 = "エピローグ（２）"
146880641 = "部室に戻ったゲーム開発部は、ケイとトキという客人を迎えて、今日も和気あいあいと活動していた。方や特異現象捜査部の部室にはマルクトの姿があった。出来事を振り返るなかで、マルクトは自分の意志で一歩を踏み出すのだった。"

