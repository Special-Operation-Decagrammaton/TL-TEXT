2770122627 = "Rua de Comércio do Desfiladeiro"
2798644006 = "Movimento Tático (Shunzinha)"
2834486412 = "Para checar as lendas urbanas sobre 'uma mulher das neves assombrando a praia', o Sensei foi procurar por respostas com a Nagusa. Ela revela que as pessoas provavelmente viram ela indo pra praia sozinha e entenderam tudo errado. Para desfazer a confusão, os dois rumam para a praia e acabam curtindo as águas do mar juntos."
2842532800 = "O órgão de tubos intercala entre uma habilidade que aplica debuffs e outra que remove debuffs.\nQuando for ativar a habilidade que aplica o debuff, vire-o para o Gregorio.\nE quando for a habilidade de curar debuffs, vire-o para os seus aliados!\n\nAtaque o órgão com uma Habilidade EX para zerar o HP dele e mudar a sua direção."
