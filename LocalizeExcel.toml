3299445685 = "ヘルメット団員にバイクを「借り」たいと神妙な様子で迫るマリー。理由を尋ねるヘルメット団に、マリーは「トリニティを救うため」とだけ答え去っていくのだった。"
727133309 = "イメージチェンジ"
4233897728 = "遡ること48時間前……「緊急支援要請」連絡を受けサクラコのもとを訪ねるマリー。そこではただならぬ雰囲気のサクラコとミネがいた。話を聞くと学園祭においてアイドル活動を行い、シスターフッドおよび救護騎士団の悪印象を払拭する計画をしており相談に乗ってほしいとのことだった。そこでアイドルに疎い二人に変わり、マリーはアイドルについて勉強すべく、先生と他校や部活を見て回ることになる。"
3295345526 = "アイドルの道：衣装（１）"
4031463793 = "アイドルついて学ぶため、マリーと先生はアビドスのノノミを訊ねる。熱烈な歓迎を受けたものの、ノノミたちはどうやらアヤネとセリカがアイドル衣装を身に着けることを拒否しており困っている様子。そこでマリーと先生は二人を説得する協力を求められ……。"
547940646 = "アイドルの道：衣装（２）"
4219103225 = "マリーと先生の協力で、ノノミたちはセリカとアヤネの「捕獲」と説得に成功する。観念した二人のアイドル衣装姿を目にして感動するマリーに、ノノミはお礼として衣装作りやアイドルについてのあれこれを教えたのだった。"
2545044380 = "アイドルの道：ダンス（１）"
1257213465 = "続いてヴァルキューレ警察学校を訪れたマリーと先生。ダンスについてフブキとキリノに教わっていたところ、ドーナッツ屋で発生した立てこもり事件に巻き込まれてしまう。救援の到着には時間がかかるものと思われたが、フブキとキリノから教わったダンスでマリーが事件解決の糸口を作り――"
3039095018 = "アイドルの道：ダンス（２）"
3545842920 = "マリーの機転で無事立てこもり事件は解決した。フブキとキリノは感謝し、マリーにダンスレッスンを付けてくれる講師を紹介してくれた。"
2117233556 = "アイドルの道：曲"
24554761 = "衣装とダンスを学び、アイドル曲についてシャーレで頭を悩ませるマリーと先生。そこにウタハが姿を現す。同じく学園祭にてアイドルをやる予定のウタハは自身の考えを披瀝しながらマリーの曲選びを手伝ってくれた。そしてこれまで学習したことをサクラコとミネに共有し役割を終えたマリーだったが……。"
2992953432 = "争いの予兆"
3406170958 = "本番に向け練習するサクラコとミネ。その中でアイドルとして活動するうえでリーダーが必要であることに二人は気付く。誰がリーダーになるべきか、内密に決めようとしたものの、それが裏目に出てしまい、シスターフッドと救護騎士団が危険なことを企んでいるという誤解がトリニティ中に広まり……。"
866325458 = "頂上決戦"
4158044451 = "アイドルとして活動するうえでのリーダーを決めるべく、トリニティ・スクエアの噴水広場にやってきたサクラコとミネ。しかしそこには、噂を耳にしたナギサがミカを伴って待ち構えていた。誤解が誤解を呼び、シスターフッドと救護騎士団の面々も集合してしまい、広場には一触即発の空気が流れる。しかし間一髪のところでマリーと先生が現場に現れ――"
3898079287 = "アンティーク・セラフィム・ビギニング"
1651854970 = "マリーと先生が事態の収拾を図り、その場に集まった皆の話を聞こうとする。そこでサクラコとミネはマリーこそがアイドルユニットのリーダーに相応しいと同じ結論に至ったことを伝える。照れながらもリーダーになることを受け入れたマリーを含めた3人は改めてアイドルユニットを結成することになり、誤解に気付いたナギサたちも引き上げたことで、トリニティは平穏を取り戻した。"
1937101477 = "トリニティ[ruby=カーニバル]謝肉祭[/ruby]"
927954868 = "無事アイドルコンテストを終えたマリーたち。サクラコとミネにライブ中の写真を誉められたものの、恥ずかしいと言って全て処分することをサクラコに迫るマリー。しかし名残惜しそうな様子の先生に、一枚だけ残しておいた写真をこっそりと渡してくれたのだった。"
4044969434 = "対策委員会の緊張"
2374914097 = "アイドルコンテストのリハーサル日、アヤネが急にいなくなってしまった。捜索の末、先生と対策委員会の面々はアヤネを見つける。話を聞くと、もとより目立つことが苦手なアヤネは、ステージを見て緊張して怖くなってしまったのだと言う。しかし先生に対策委員会の皆だけを見ればいいとアドバイスされると、少し落ち着いたアヤネは無事パフォーマンスを披露できたのだった。"
4086622799 = "ウタハとアイドル"
4080289724 = "アイドルコンテストの予選を見に来た先生。そこでエンジニア部のコトリとヒビキと一緒にウタハの応援をすることになる。舞台で奇抜なライブを披露したウタハは結局、決勝に進出できなかったのだが、本来の目的は演歌の素晴らしさをアピールすることとエンジニア部の名前を売ることであったため、楽しい思い出が出来たと笑うのだった。"
476430668 = "放課後お化け屋敷"
4266731319 = "学園祭の出し物としてお化け屋敷風のカフェをすることにした放課後スイーツ部。しかし、アイリを除いて客に可愛いと言われてしまう等反応がイマイチであった。もっと怖くするにはどうすればいいか悩む一同であったが、先生のアドバイスで可愛いと言われてもいいのだと気付くのだった。"
1565767390 = "生活安全局による広報活動"
376866386 = "いつもどおり市民対応の仕事をしていたところ、アイドルコンテストに参加することになってしまった生活安全局のキリノとフブキ。本番が近づき、緊張していた二人だったが、アイドルとして頑張ることになったマリーの姿を目にして、心が軽くなり無事ステージに立つことができたのだった。"
741064361 = "ジャスティス☆プリンセス"
647422658 = "謝肉祭で演劇を披露する正義実現委員会。しかし本番の当日、役者が事故に遭ってしまう。そこで先生が全てのセリフを暗記しているツルギや偶然見学に来ていた忍術研究部一行を代役に推薦する。上演が始まり、途中ツルギが暴走しそうになってしまうが、それが逆にリアルだと評判になり、舞台は無事成功に終わるのだった。"
2904499581 = "うちらも生徒でしょ！"
3304010880 = "学園の一角をヘルメット団が占拠しており困っていると聞きつけた先生は、件の場所へ赴く。するとそこにはラブたちが陣取っていた。話を聞けばうまく馴染めず、またお金もないため屋台を周ることもできず、仕方なくここにいるのだと言う。そこで先生はラブたちと一緒に謝肉祭を見て周ろうと提案。素直になりきれないながらも、ラブたちは学園祭を楽しむことができたのだった。"
2738379411 = "騒がしい展覧会"
964869014 = "展覧会が開かれているというアートギャラリーを訪れた先生。そこには主催と学芸員を兼ねたナギサがひとり佇んでいた。展示についてわかりやすく説明してくれたナギサは、当初行う予定のなかった展覧会のため来場者が少なく、先生が来てくれただけでうれしいと言う。しかしミカとセイアがやってきたことをきっかけに展覧会やってくる人が増え、ナギサは少し素直になり、楽しそうに展示品の解説をするのだった。"
251089313 = "ストリートグルメファイター！"
2242936279 = "先生は模擬店の運営で困っている生徒に出会う。味は悪くないものの、客が来なくて悩んでいるということだったので、偶然居合わせたハルナたち美食研究会に助言を仰ぐことを提案する。当初は警戒されていたものの、ジュンコから受けたSNSでの宣伝に力を入れるべきというアドバイスどおりにすると、たちまち模擬店は繁盛し始めた。問題を起こすことなく活躍して見せたハルナたちに、先生はお財布の中を心配しつつも好きなだけ屋台グルメを食べて言いと約束するのだった。"
2125534733 = "アイドルコンテストのリハーサル日になって、アヤネは急に姿を消してしまう。対策委員会の生徒たちと一緒にアヤネを探すと……？"
25107786 = "アイドルコンテストの予選会場にて、エンジニア部のコトリ、ヒビキと共にウタハの応援をすることになったのだが……？"
3629475333 = "学園祭の出し物としてお化け屋敷風のカフェをすることにした放課後スイーツ部。しかし訪れた生徒たちから、ナツもヨシミもカズサも、仮装が怖くなくて可愛いと言われてしまい……？"
3766149801 = "いつもどおり市民対応の仕事をしていたところ、アイドルコンテストに参加することになってしまった生活安全局のキリノとフブキ。本番が近づき、緊張していた二人だったが……？"
4169171099 = "謝肉祭で演劇を披露する正義実現委員会。しかし本番の当日、役者の生徒が事故に遭い出演できなくなってしまい……？"
1476865927 = "学園の一角をヘルメット団が占拠しており困っていると聞きつけた先生が件の場所へと赴くと、そこにはラブたちが陣取っており……？"
2693755657 = "展覧会が開かれているというアートギャラリーを先生が訪れると、そこには主催と学芸員を兼ねたナギサがひとり佇んでおり……？"
308280717 = "模擬店の運営で困っている生徒に出会った先生は、偶然居合わせた食通の生徒たちに助力を仰ぐことを提案し……？"
3966811178 = "秘密のミッドナイトパーティー～オニの手は鐘と共に～"
705081824 = "大晦日、反省部屋から出られないコユキは先生を呼び出し、遊んで過ごそうとする。しかし思わぬタイミングでユウカとノアがやってきてしまい、年越しを賭けた鬼ごっこが始まるのであった……。"
3179445556 = "始まりはロッカー"
1708912176 = "そして共犯者に"
4207037597 = "それぞれの年末年始"
4005937109 = "我慢なんてできません！"
589093690 = "本音を言うと……"
75290713 = "戦慄のロッカールーム"
1627497027 = "ウィットネス・コユキ！ （１）"
3603586332 = "ウィットネス・コユキ！ （２）"
843458433 = "オニの特権"
3892365204 = "年を越しても同じ日を"
1405003454 = "ババ抜きのオニ"
2271198065 = "BOOMで対戦！"
124568238 = "究極のミックスジュース"
591892110 = "Truth or Dare"
386002539 = "みんなが寝静まった夜"
1359937701 = "始まりはロッカー"
1359303109 = "コユキと先生は、ロッカーの中、二人で、何故こんなことになってしまったのか考える……。"
375149348 = "そして共犯者に"
2423861271 = "年末だというのに反省部屋にいるコユキ。ユウカとノアに大人しくしているよう言われたものの、過去を何ひとつ省みることなく悪だくみをする。手始めにコユキは先生を上手く丸め込み、反省部屋へと呼び出すのであった……。"
825721735 = "それぞれの年末年始"
3133192212 = "一方、年末を寂しく過ごすコユキのためにパジャマパーティーを企画するユウカとノア。一緒に遊ぶテーブルゲームを借りるために、マキ、チヒロ、コタマとハレの順にヴェリタスを訪ね歩く。"
3668139486 = "我慢なんてできません！"
1422919003 = "反省部屋でコユキと一緒にいた先生だったが、ユウカとノアが突然やってきたことで、慌てて身を隠さざるを得なくなる。頼りのコユキは遊んでいたことがバレて逃げ出してしまったため、何故か連絡のついたコタマとハレの協力で、脱出を目指すことになる。"
1768024960 = "本音を言うと……"
3060288246 = "コユキと共にユウカ、ノアとの遭遇を回避しながら脱出を試みる先生。途中ユウカに発見されそうになったり、諦めそうになるものの、コユキの陽動やコタマとハレの支援に助けられながら、なんとか急場をしのごうとする。"
2927553321 = "戦慄のロッカールーム"
3549912057 = "ユウカたちの繰り出すドローンを制圧し急場をしのいだコユキたち。目標地点の裏門に到達するものの、逆ハッキングにより脱出に失敗してしまう。別の逃げ道を探す中、ユウカとノアが接近してきたため、コユキを引っ張って先生は更衣室のロッカーの中に逃げ込む……。"
3964185245 = "ウィットネス・コユキ！ （１）"
3324295142 = "ノアたちをやり過ごしたコユキと先生は、長らく使われていなかった地下通路に辿り着く。しかし灯りを点け、先へ進もうとしたところで、ドローンの急襲を受けてしまう。"
3188615699 = "ウィットネス・コユキ！ （２）"
483673306 = "ドローンの追撃をかわしたコユキと先生だったが、通信先のコタマとハレが、チヒロに捕まり窮地に陥ってしまう。先生だけでも逃がそうと、コユキも自ら囮になってユウカに立ち向かうがあえなく制圧されてしまった。その悲鳴を耳にしつつ脱出を目指す先生だったが、その背後に忍び寄る影が――"
1190632781 = "オニの特権"
1513134473 = "結局、ノアに捕まってしまった先生は、案内されるがままに、パジャマパーティーをしている部屋までついていく。一方、先に捕まっていたコユキやユウカたちは、先にゲームで盛り上がっており、ノアたちが到着する頃には遊び疲れて眠ってしまっていた。"
2665981194 = "年を越しても同じ日を"
2221244653 = "ノアとふたりきり、夜のミレニアムを歩く先生。年末年始を親しい人と祝う意義について話しながら、お互い晴れやかな気分で年明けを迎える。翌朝、いつも通りの新しい一日を先生やミレニアムの皆と共に迎えられたことを、ノアは微笑み喜ぶのだった。"
2850688326 = "ババ抜きのオニ"
3806587471 = "どんなゲームをしても連敗続きのコユキは、運に頼らないゲームなら勝ち目があると踏み「ババ抜き」で一同に勝負を挑む。しかし、ポーカーフェイスのノア相手に心理戦が通用するはずがなく、あえなく敗北。罰ゲームでデコピンされてしまうのであった。"
2364069971 = "BOOMで対戦！"
1583950511 = "テーブルゲームではなくビデオゲームもしたいというマキの提案でシューティングゲーム「BOOM」のタイムアタックで競うことになった一同。始め乗り気でなかったチヒロだったが、マキに請われてプレイすると案外気に入ったらしく楽しむ……が、そのバイオレンスなプレイスタイルでヴェリタスの面々を畏怖させてしまったのだった。"
4046425659 = "究極のミックスジュース"
678779510 = "チヒロ、ユウカ、ノアが買い出しに言っている間、残されたコユキやマキたちは、「妖怪MAX」をその場にある飲み物と混ぜたらどんな味になるのか気になってしまう。結果、とてもではないが飲めない見た目のジュースが出来上がってしまい、帰って来たユウカたちに怒られるのであった。"
2515246811 = "Truth or Dare"
3704212747 = "「妖怪MAX」を混ぜたジュースを有効活用して「真実か挑戦か」ゲームをすることにしたユウカたち。質問に対して正直に真実を話すか、話さず罰ゲームでジュースを飲むかの駆け引きが繰り広げられるが、次第にユウカが質問の集中砲火を浴びることになり、ジュースを大量に飲まされてしまうのだった。"
2477124485 = "みんなが寝静まった夜"
4229744822 = "夜も更けつつある頃、まだ起きていたノアとチヒロはお互いの所属から離れ、本音で穏やかに語り合う。そのうちにチヒロはサーバーのメンテナンスを終え、部屋へ帰ろうとする。別れ際、お互い微笑みながら、新たな一年もよろしくと微笑み合うのであった。"
4235724912 = "連敗続きのコユキは、運に頼らないゲームなら勝ち目があると踏み「ババ抜き」で一同に勝負を挑むが……？"
2622510326 = "マキの提案でシューティングゲーム「BOOM」をすることになった一同。チヒロは始め乗り気ではなかったのだが……。"
2450291500 = "独特な味に定評のある「妖怪MAX」を他の飲み物と混ぜたらどんな味になるのか気になってしまったマキたち。コユキに扇動され……？"
1258195185 = "「真実か挑戦か」ゲームをすることにしたユウカたち。質問に対して正直に真実を話すか、話さず罰ゲームでジュースを飲むかの駆け引きが繰り広げるが……。"
1652314915 = "夜も更けつつある頃、まだ起きていたノアとサーバーのメンテナンスをするチヒロは、お互いの所属から離れ、本音で穏やかに語り合う。"
390996441 = "Code:BOX　ミレニアムに迫る影"
1797393858 = "トリニティの代表としてミレニアムEXPOに参加することとなったセイア。学園同士の交流が盛んに行われるなか、その裏ではミレニアムを揺るがす企みが静かに進行していた。怪しい取引を目撃してしまったセイアは、ミレニアムEXPOを守るための作戦に巻き込まれていく……。"
