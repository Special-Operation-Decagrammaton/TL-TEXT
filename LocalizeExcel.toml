1541422275 = "ヒナ委員長。万魔殿から身勝手な要求が届いたときは、これからどうなるのかと心配しましたが……\n\n委員長の努力されているお姿を見て、私も尽力せねばと気を引き締めることができました。\n\n風紀委員会の行政官として、ヒナ委員長を応援しております。頑張ってください！"
1570765118 = "ふふ、お話は伺いましたわ。\n\n他でもない、鬼と名高い風紀委員長が美しいドレスを身にまといピアノの演奏を披露する…···それは……まるで美食のようですね。\n\n当日の演奏、楽しみにしておりますわ。ふふふっ！頑張ってください。"
2407965685 = "話は聞いたよ。ゲヘナのパーティーでピアノ演奏をするらしいわね。\n\n万魔殿のワガママに答えるために、きっと今ごろ、苦労してるんじゃないかな？私もジュリも、無事に公演を終えられるよう応援しているから。\n\n頑張ってね。風紀委員長。"
2286376939 = "風紀委員長～！\n\n今度すっごい演奏するって聞いたよ～！それって、温泉開発と同じくらいアツいことだよね？\n\nみんなを連れて見に行くから！頑張ってね！"
978447002 = "委員長！\n\nゲヘナの秩序を守る風紀委員たるもの、贔屓することなく常に公正でいるようにと、委員長はおっしゃっていました。ですが今回だけは私たち風紀委員会一同！\n\n委員長の味方となり、演奏の成功を心より！応援いたします！頑張ってください！"
659199751 = "委員長、心身に疲れはありませんか？\n\n少しでも異常を感じましたら、すぐにおっしゃってください。委員長をはじめとする、風紀委員会の健康を確認し、適切な措置を取ることが私の仕事ですので。\n\nそれから……応援しています。どうか、頑張ってください。"
981979352 = "ヒナ先輩！\n\nイブキも先輩のピアノ演奏、すごく楽しみにしてるよ！\n\n頑張って応援するからね～！えへへっ！"
1958821606 = "ヒナっち！応援してるよ！\n\nあたしたち！ヒナっちの演奏！めっちゃ楽しみにしてるから！絶対！超～！イケてる演奏になること間違いなしだよ！\n\n後で映像撮ったらヒナっちにも送ってあげるね！ファイト―！"
4025554739 = "万魔殿の無茶に付き合わされて……委員長も大変だね。\n\nまあ、私にできることはあまりないけど……そうだね……よし！決めた！\n\n委員長の演奏を邪魔するヤツがいたら、私が全部ぶっ飛ばしてやる！だから練習！頑張って！"
2710967621 = "ゲヘナパーティーという大きなイベントを控えていても、私たちのやるべきことは変わりません。\n\n宴の熱気に浮かれて怪我をする人はいないか、きちんと見守り対応すること。\n\nそんな自分たちの仕事を終えたら、その後は、努力する者を応援するのみです。頑張ってください、委員長。"
2024161158 = "お知らせ"
