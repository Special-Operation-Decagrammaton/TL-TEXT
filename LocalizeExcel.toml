1780733194 = "Rumors about the 'Kunekune' begin to whisper among the students of Kivotos."
3350929154 = "Between Superhuman and Fox"
4268210737 = "FOX Platoon spends their days in the Correctional Bureau. Yukino was still worried about her past actions. At that time, Yukino, called by the Correctional Bureau Chief, meets the General Student Council President. While coordinating on events during her disappearance, the General Student Council President asks Yukino, who wants an opportunity to restore her honor, to investigate the Lore."
1745364049 = "The Platoon Marches After a Meal"
2002791633 = "For the Lore investigation, FOX Platoon decides to cooperate with Sensei. Before the operation, FOX Platoon reunites with Sensei at a high-end yakiniku restaurant. FOX Platoon suspects Sensei's true intentions as he tries to feed them. However, they gradually open their hearts to Sensei's straightforward answers."
1500063239 = "A New Base"
3830197242 = "For FOX Platoon, who cannot move openly, Sensei provides a corner of Schale's basement as a base. It was also arranged by the General Student Council President. FOX Platoon prepares it as their HQ and begins the operation."
3890647442 = "Inquiries"
462822871 = "FOX Platoon, who went out into the city, begins collecting information using victims who lost consciousness after witnessing the 'white scarecrow' as clues. Niko, disguised as a part-timer, tries to contact the Gehenna Track and Field Club, where victims are appearing, but fails. However, she gets important information from Erika, who was watching from the side."
1210340112 = "Truth and Lies"
2755602640 = "FOX Platoon proceeds with their reasoning based on the information collected. However, there was still not enough evidence, and they could not reach a conviction. Keeping in mind that the culprit might be a ghost rather than a citizen, they decide to conduct further information gathering."
2620890405 = "A Shadow Running on the Highway"
1869455062 = "FOX Platoon continues their investigation in various places. They gather once to compare information, but they didn't get any notable results. When they were prepared for further investigation, the group encounters Natsuki, who was pulling a rickshaw on the highway. And they hear the urban legend of the 'Kunekune' spreading in Hyakkiyako."
1289441933 = "From Beyond the Heat Haze"
1473250037 = "FOX Platoon, who got a clue, was waiting for the heat haze to rise. When the heat haze finally rose, Otogi, who was observing, was captivated by the Kunekune and fell into a state of confusion. With Kurumi's handling, Otogi barely regained her sanity. However, the bullets Otogi fired while confused disappeared without a trace for some reason."
2449096511 = "Clue"
1411259920 = "From the state of Otogi, who was captivated while observing the heat haze, and the bullets that disappeared even though she definitely fired them, FOX Platoon sets up a hypothesis for the occurrence conditions and countermeasures for the 'Kunekune'. They prepare equipment that can be a countermeasure and begin to move in earnest toward subjugation."
2338801941 = "Into the Darkness (1)"
2311301627 = "The place FOX Platoon chose to lure the Kunekune was an underground passage where people don't enter. As a breakthrough for the problem that you get captivated if you see the 'Kunekune', FOX Platoon wears night-vision goggles. The 'Kunekune' appears where they were waiting, and the fox hunt begins."
1663922802 = "Into the Darkness (2)"
1425272534 = "FOX Platoon succeeds in defeating the Kunekune with the night-vision goggles working effectively. In the place where the Kunekune disappeared, a glass shard that emitted a strange light and reflected some grassland was left behind. Yukino entrusts the glass shard to Sensei and decides to keep the information hidden from the General Student Council President. The hungry group heads to the after-party in high spirits."
768002174 = "Inexplicable"
1409392123 = "FOX Platoon is visiting the General Student Council. The General Student Council President tells Yukino that the damage from the Kunekune is subsiding and praises the resolution of the mission. The three who were waiting outside happen to join Erika, and unlike the last time they were on an operation, this time they head to a cafe together as friends. On another day, the General Student Council President was meeting with Kaya. However, Kaya was also one of those who remembered the past General Student Council President."
2813820339 = "Inexplicable"
738638449 = "FOX Platoon is visiting the General Student Council. The General Student Council President tells Yukino that the damage from the Kunekune is subsiding and praises the resolution of the mission. The three who were waiting outside happen to join Erika, and unlike the last time they were on an operation, this time they head to a cafe together as friends. On another day, the General Student Council President was meeting with Kaya. However, Kaya was also one of those who remembered the past General Student Council President."
