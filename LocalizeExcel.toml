828853272 = "Desejo ao céu"
1985025284 = "As garotas e o mar de verão"
3057305999 = "Hifumi rouba um tanque Cruzador para levar Azusa ao mar pela primeira vez, mas ambas são capturadas pelo Comitê de Justiça. Ao mesmo tempo, Hasumi pensa em dar férias de verão a Tsurugi e Mashiro, e como resultado, elas acabam indo ao mar com uma formação estranha."
3787320337 = "A praia de verão e os intrusos (1)"
2130123045 = "Seguindo a lista recebida de Hasumi, Hifumi começa a fazer um castelo de areia, mas logo após a conclusão, é destruído por delinquentes que aparecem. Enfurecida, Tsurugi e Azusa sacam suas armas e partem para o combate."
417190438 = "A praia de verão e os intrusos (2)"
1931866986 = "O grupo consegue expulsar os delinquentes. Tsurugi, mais calma, se surpreende com o que fez, mas……"
1754061547 = "Castelo de areia e banho de areia (1)"
1969422910 = "O grupo recomeça a construção do castelo de areia. No entanto, diante de Hifumi que voltou, havia um castelo de areia gigantesco. Mashiro e Azusa, orgulhosas, se entendem, e os delinquentes aparecem novamente."
4123624755 = "Castelo de areia e banho de areia (2)"
1461186790 = "Embora o castelo de areia tenha desmoronado, o grupo consegue expulsar os delinquentes. Hifumi ri sem graça, se perguntando se isso está bom, mas pelo menos o primeiro item foi cumprido."
2757710025 = "Aprendendo a nadar (1)"
2632002684 = "A missão era 'aprender a nadar', mas ao perguntar, todos parecem saber nadar razoavelmente. Quando o Sensei, que seria o instrutor, sugere que alguém finja que não sabe, todas, exceto Hifumi, começam a fingir. Entre elas, Tsurugi, com uma atuação convincente, é visada, e os delinquentes aparecem novamente."
3383988665 = "Aprendendo a nadar (2)"
3869586745 = "O grupo consegue expulsar os delinquentes. No meio do combate, Azusa diz 'Então, este é o mar', e Hifumi balança a cabeça sem força."
3813254294 = "Casa de praia (1)"
1603143310 = "Ao entrar na casa de praia, eles encontram Izumi, da Sociedade de Estudos Gastronômicos. Quando estão prestes a pedir um item com nome estranho, os delinquentes, que já haviam sido derrotados antes, voltam para se vingar."
546646916 = "Casa de praia (2)"
546040871 = "O grupo expulsa os delinquentes e recebe bebidas de Izumi como agradecimento. Mas aquela bebida cinzenta é……"
3106530382 = "Quebrando a melancia (1)"
325718512 = "Quando o grupo está prestes a começar a quebrar a melancia (?), Izumi aparece novamente. Dizendo a verdade de que 'não se deve brincar com a comida', eles são forçados a confrontá-la."
261331744 = "Quebrando a melancia (2)"
859947442 = "O grupo vence Izumi, mas o resultado é um tanto vazio. A melancia usada para quebrar é devidamente comida por todos."
253070993 = "Vôlei de praia"
1254394396 = "Hifumi, um pouco exausta pelas sucessivas lutas. Quando ela murmura 'será que isso está bom?', os delinquentes, pela enésima vez, aparecem."
9561168 = "Fogos de artifício"
1121511268 = "Quando o dia começa a escurecer, o grupo acende os fogos. Da direção dos delinquentes, também sobem fogos, e eles contemplam o mundo efêmero brilhante. No entanto, por algum motivo, começam a competir pela extravagância dos fogos e, no final, até bombas de napalm começam a voar."
1431627967 = "Lista de Desejos do Céu de Verão"
4093852275 = "Após a limpeza, o grupo retorna a Trinity. Hasumi recebe as fotos do Sensei e sorri satisfeita por seu desejo ter se realizado."
1444096591 = "Apesar dos sonhos diferentes, caminham juntas"
989281264 = "Logo após o primeiro item no mar, o Sensei tenta entrevistar Tsurugi sobre sua impressão. Recebendo uma resposta muito positiva, ele entrevista Hifumi, que está rindo, mas seu rosto parece um tanto vazio……"
4067085274 = "Castelo de areia perfeito?"
332141174 = "Embora o castelo de areia tenha desmoronado, Azusa e Mashiro se dão bem. Elas começam a construir outro castelo de areia (?) usando cimento e vergalhões."
2105082698 = "Enganando, sendo enganado, sendo enterrado"
1517924368 = "Desta vez, o Sensei tenta entrevistar os delinquentes. Embora conversem, as lágrimas começam a brotar em seus olhos……"
493225528 = "Por que ela é a dona"
2407947200 = "Izumi saboreava a comida na casa de praia, mas como serviu o molho especial de Juri, a dona desmaiou. Ela jura proteger a loja em seu lugar."
893343669 = "Orgulho de atiradora"
3383085495 = "Devido à invasão dos delinquentes, o confronto de tiros ao melão (?) entre Azusa e Mashiro é interrompido, e Hifumi suspira aliviada. No entanto, enquanto comem a melancia, Izumi reacende a conversa……"
4288507338 = "Um tipo de esporte radical"
3926702143 = "Para completar o número de participantes, os delinquentes também são convidados a jogar vôlei de praia. No entanto, o saque devastador de Tsurugi explode, e começa uma hecatombe unilateral."
3741808581 = "Desejo ao céu"
4233111286 = "A bomba de napalm fabricada em Millennium e que veio parar aqui. Ela (?) é levada pelos delinquentes……"
2629323522 = "O Sensei tenta entrevistar Tsurugi e Hifumi sobre o castelo de areia."
1640955265 = "Azusa e Mashiro, que se dão bem, tentam fazer um castelo de areia ainda mais resistente……"
1039912979 = "Desta vez, tenta-se entrevistar os delinquentes."
263742558 = "Um pouco antes da chegada de Hifumi e do grupo, Izumi visita a casa de praia……"
1769899179 = "Azusa e Mashiro, a luta delas ainda não havia terminado."
2973955910 = "Convidem os delinquentes também, vamos começar o vôlei de praia!"
3600215572 = "É um murmúrio inexistente. A história da bomba de napalm que veio parar em Millennium, pouco antes de colorir o céu."
2703060754 = "Férias de verão da presidente Hina!"
