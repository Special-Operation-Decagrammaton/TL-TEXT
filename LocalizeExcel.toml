2374839960 = "Um bicho de pelúcia que Ibuki ganhou de presente das irmãs mais velhas que ela gosta. Tem uma aparência um pouco peculiar, mas Ibuki diz que é exatamente isso que ela mais gosta nele."
938424299 = "O giz de cera que Ibuki guarda com carinho. O mundo que Ibuki desenha é, literalmente, vasto e infinito."
1063147996 = "O doce favorito de Ibuki. É um lanche valioso que ela só pode comer um por dia, mas parece que às vezes ele desaparece da geladeira."
1559446809 = "A mochila com os pertences de Ibuki. Contém várias coisas, como seu celular, apito, armas, lenços que as veteranas a obrigaram a carregar e até pétalas de flores bonitas."
917196592 = "Um desenho das veteranas que Ibuki gosta. Por ordem especial de Makoto, foi designado como um tesouro de Gehenna."
1246509466 = "Um periódico publicado com o objetivo de divulgar a dignidade do Pandemonium. No entanto, a maior parte do conteúdo é sobre Ibuki, sendo tratado, na verdade, como um artigo de colecionador da Ibuki."
1636079057 = "Uma lista de verificação com a avaliação sanitária do Departamento de Alimentação. Quase nota máxima, mas dizem que, em casos raros, a pontuação não atinge o nível de aprovação devido a circunstâncias inevitáveis."
1783365279 = "Uma ferramenta de afinação de piano encontrada no prédio antigo da escola. É bem velha, mas como o dono original a tratava com cuidado, não há problemas em usá-la."
561939847 = "Uma mochila escolar esquecida por alguém. Além de livros didáticos, doces e mangás, o fato de conter algo parecido com uma bomba é bem a cara de Gehenna."
1142909824 = "Um jornal do Pandemonium chamuscado. Felizmente, não há artigos sobre Ibuki; o que está publicado é apenas um discurso de Makoto. Ninguém deve sair perdendo com isso."
4224932345 = "Um registro de visitantes da cela especial, gerenciado pelo Comitê Disciplinar. Originalmente, é um documento importante para a segurança, mas agora se tornou um livro de visitas para os alunos que entram frequentemente na cela especial."
186189428 = "Um coador de café que Ako preparou para Hina. É um item adorável que transmite a gentileza e a consideração da secretária, mas o café passado por Ako tem a fama de não ser bom."
2653748522 = "Uma receita escrita detalhadamente por Juri para seus estudos de culinária no Departamento de Alimentação. Se seguir esta receita, você conseguirá fazer uma comida deliciosa, a menos que algo muito grave aconteça."
2932450416 = "Uma carta que Cherino enviou a Makoto. Contém mensagens sobre a mentalidade de um líder e votos pelo desenvolvimento da Academia Gehenna."
1955500566 = "Uma colher encontrada na cela especial. É usada para comer, escapar da cela especial ou se transformar em um super-herói."
652268410 = "Uma pilha de documentos com as atividades do Comitê Disciplinar registradas. Está cheia de letras e números que dão dor de cabeça só de olhar. Se você esbarrar e derrubar, será um desastre! Cuidado!"
3128527829 = "Uma lista de pacientes escrita por Sena. Desde os casos que precisam de tratamento prioritário até pacientes fingindo doença, tudo está organizado de forma calma, o que revela a personalidade meticulosa de Sena."
4077140834 = "Um vale-refeição que alguém perdeu. O dono original é desconhecido, mas a palavra \"Diversão!\" escrita no vale parece um pouco triste."
3849298482 = "Um cartaz amassado jogado no lixo. Como a maior parte do conteúdo é sobre os feitos de Makoto, não tem utilidade alguma."
88965538 = "Uma seringa do Departamento de Medicina de Emergência que ainda não foi usada. É perigosa, então tome cuidado para não tocá-la sem necessidade!"
