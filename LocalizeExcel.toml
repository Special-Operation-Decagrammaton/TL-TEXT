3715968122 = "招かれざる客（２）"
396754760 = "真夏の夜の夢"
3470661543 = "飛来する浮き輪"
1517194776 = "重機には重機で"
1914874609 = "リゾート使用券の真実（１）"
3115624347 = "リゾート使用券の真実（２）"
4105665590 = "人生、何が起こるか分からない"
1877741647 = "ある日、アヤネが対策委員会のメンバーを集めて「重大なお知らせ」があると告げる。毎月の借金を返済しながらコツコツ貯めたお金でヘリを買ったのだと口を開こうとした瞬間、ビンゴ大会で1等をあてたセリカが喜びのままに駆け込んできて……。"
1346643999 = "本当に、人生何が起こるか分からない（１）"
2189810503 = "思いがけぬ1等の当選により、リゾートにバカンスに行くことになった対策委員会と先生。「人生何が起こるか分からない」と笑い合っていたのも束の間、移動中にヘリが墜落し――"
2683639091 = "本当に、人生何が起こるか分からない（２）"
1868167028 = "ヘリが墜落するも、なんとか全員無事だった一行。とりあえずリゾートに行けば修理ができるのではないかと期待を胸に訪れたそこは既に廃墟と化しており……詐欺にあってしまったと嘆くセリカに対し、ここからスタートすればいいのだと周囲は諭す。その言葉に立ち直ったセリカは、ここで「最高の休暇」を過ごすことを宣言するのだった。"
1755482596 = "もう少しそれっぽい言い訳を（１）"
3178234890 = "グループに分かれてリゾートの復旧をする事に決めた対策委員会の面々。セリカとホシノはリゾート内の掃除を担当することに。先生はリゾートの一室でホシノと共に掃除をしていると、ラブ率いるヘルメット団が襲いかかってきて――"
2119647362 = "もう少しそれっぽい言い訳を（２）"
2685399187 = "ラブ達ヘルメット団をなんとか撃退することに成功したホシノとセリカ。しかし、戦闘の結果綺麗に掃除した部屋はぐちゃぐちゃに……タイミング悪く戻ってきたシロコとノノミは、その部屋を見て掃除が難航したのだと勘違いをしてしまうのだった。"
1541851928 = "先手必勝（１）"
1621492409 = "部屋の片付けが一段落し、次は食料調達だと張り切るシロコ。先生はシロコと共に魚釣りに行くことに。そこに、アヤネがやってきて、3人で魚を釣り始めようとした瞬間、ラブ率いるヘルメット団とワカモが襲いかかってきて――"
3445130317 = "先手必勝（２）"
1174669819 = "ラブの要請によって応援部隊として参戦していたワカモは、先生の存在に混乱してうまく戦うことができず、ヘルメット団と共に逃げていく。一方で、彼女たちとの戦闘によって釣り道具が破壊されてしまったシロコは深く落ち込むのだった。"
806822330 = "先生を助けに参りました（１）"
4019663412 = "先生がこのリゾートにいることを知ったワカモは、先生が悪党に捕まっているのだと勘違いし、ラブとヘルメット団を率いて襲いかかってくる。アヤネは話し合いで解決しようとするも、問答無用でワカモは総攻撃をしかけるのだった。"
2351574080 = "先生を助けに参りました（２）"
2322437162 = "ワカモを追い返すことに成功した一行。一人だけ釣りにでかけていたシロコは、満身創痍のメンバーを見て驚くのだった。一方、敗走することになったワカモは、ラブ達ヘルメット団に切り札を出すように迫り――"
1269668176 = "招かれざる客（１）"
3542746869 = "リゾート復旧のため、制御室を訪れた対策委員会。そこでリゾート防御システムという見慣れぬ機構を発見する。これが動作すればヘルメット団やワカモに怯えることなく安心して暮らせる、とシステムを起動させるも、警備システムに登録されていない対策委員会一行に対してもリゾート防御システムは牙を剥き――"
2399187411 = "招かれざる客（２）"
2351619502 = "間一髪のところでリゾート防御システムの登録に成功する対策委員会と先生。一方その頃、またも上陸していたヘルメット団たちは、警備ロボットによって撃退されていたのだった。"
3081295153 = "真夏の夜の夢"
78535287 = "紆余曲折の末、リゾートの復旧を一段落させた対策委員会一行は、夏の浜辺でバーベキューを楽しむ。その時間だけは本当に、現実を忘れた一時のバカンスだった。"
3720861641 = "飛来する浮き輪"
3009396054 = "昼過ぎに起きてしまった先生は、ホシノとゆったりとした時間を過ごしていた。他の対策委員会はヘリの修理に向かっており、ホシノとだらだら過ごそうと話していると、不意にリゾート防御システムがアラートを発した。巨大なホバークラフトに乗ったワカモが、先生を取り戻すべく再度攻め込んでくるのだった。"
1077182490 = "重機には重機で"
2820779354 = "ホシノと先生だけでワカモを相手にするも、圧倒的な戦力差にじわじわとジリ貧に陥っていく。けれど、ホシノの瞳は諦めていなかった。どうしてそんなに余裕なのかと問う先生に、対策委員会の皆が来てくれることを信じているからとホシノは笑う。その言葉通り、ヘリの修復を終えた一同が応援に駆けつけてくれるのだった。"
2364370372 = "リゾート使用券の真実（１）"
848028279 = "無事ワカモとヘルメット団を撃退することに成功した一同。どうして執拗に襲撃を仕掛けてきたのかと問うと、彼女たちもまたこのリゾートの使用券を持っているのだと明かされる。彼女たちは、このロストパラダイスリゾートの使用券を巡るリゾートバトルを繰り広げている集団の一つに過ぎないのだと。思わぬ方向に展開される話を前に、一同は一刻も早くここから帰る事を決意するのだった。"
1316559450 = "リゾート使用券の真実（２）"
184087796 = "短くも濃いバカンスが終わりを告げ、先生はいち早くシャーレに戻ることになった。想定していたのとは全く違うバカンスになってしまったけれど、楽しかったと笑い合う一同。そうして、先生が去った後、帰る準備をしている最中に「リゾート使用権」の最終使用者の名前を見つけ――"
2778041043 = "出張！百夜堂海の家FC計画"
172671033 = "新しい事業「海の家」を開くために、リゾートを訪れた百夜堂一行。しかし、彼女たちを待ち受けていたのは、リゾート同士が利権を奪い合うリゾート・バトルロイヤルだった。果たして、シズコは無事「海の家」を守り抜くことができるのか――！？新たな百夜堂の戦いが今、始まる。"
1940212607 = "夏はまだ終わらない"
3019187095 = "やるべきことは一つ！"
985681819 = "まずは状況を整理しよう"
3149087222 = "硫黄の鉱夫たち（１）"
633836269 = "硫黄の鉱夫たち（２）"
3599319087 = "次に向かって"
248228498 = "白い耳の怪物たち（１）"
602045043 = "白い耳の怪物たち（２）"
2996925887 = "玄武の使者たち（１）"
1574118782 = "玄武の使者たち（２）"
1023075678 = "最後の戦いを前に"
2234049552 = "ヘルメット団！最後の決戦！"
2135228425 = "そして訪れた夏の終わり"
2224315914 = "夏はまだ終わらない"
2571315120 = "シャーレに戻ってきた先生を待ち受けていたのは、百鬼夜行連合学院のニヤとミモリ、そしてフィーナだった。曰く、百夜堂の事で相談があり、そして、シズコはいま自分達が先程までいた「ロスト・パラダイス・リゾート」にいるのだと……。再びリゾートに戻ってきた一行の前に「覆面水着団」が襲いかかってくるのだった。"
3339314761 = "やるべきことは一つ！"
2566461510 = "「リゾート使用権」の総責任者が「お祭り運営委員会」になっている事を知った一行は、シズコがオクトパスバンクと交わしたという契約内容を聞く。しかし、オクトパスバンクというのは実在しない企業である事が判明し……。騙されたことを知ったシズコは、ショックを受けつつもこの状況を逆手にとって、他の島を占拠している人たちから契約書を回収すると宣言するのだった。"
866798122 = "まずは状況を整理しよう"
3677973191 = "他の島に向かう準備を整える中で、ニヤが集めてきてくれた現在の勢力図を確認する一行。いくつかの群島に分かれている事から、アビドスと百鬼夜行で二手に分かれて契約書を回収しに向かうのだった。"
244971942 = "硫黄の鉱夫たち（１）"
992183906 = "シズコたちが最初に向かったのは、「幻の泉脈を探す硫黄の鉱夫たち」が占拠する島。そこには、海洋深層水を発掘して深海温泉リゾートを作ろうとするゲヘナの温泉開発部の姿が――"
945809083 = "硫黄の鉱夫たち（２）"
4177740208 = "シズコ達は、チセの活躍によって温泉を見つけることに成功する。負けを認めた温泉開発部は、契約書を差し出すが……逆に、シズコは百夜堂とFC契約を結んで温泉リゾートを運営してくれないかと新たな契約を持ちかけるのだった。"
2437669702 = "次に向かって"
9719984 = "温泉開発部とのFC契約を終え、アビドスメンバーと一旦お互いの状況を共有した一行は、次なる目的地へと向かうのだった。"
4025448392 = "白い耳の怪物たち（１）"
1455533879 = "一行が次に向かったのは「敗者を破滅に導く白い耳の怪物たち」が運営するリゾートだった。まるで何かに取り憑かれたように船に乗る人々についていくと、そこは「シークレット・ムシクイーン大会」会場だった。大会に優勝すれば、契約書を回収できると聞いた一行は、フィーナとカエデの力を借りてムシクイーン大会に挑むのだった。"
1990939403 = "白い耳の怪物たち（２）"
2476002705 = "チセの活躍によってムシクイーン大会で優勝した一行。無事契約書を回収した後、彼らのムシクイーン大会にかける情熱を聞いたシズコは、FC契約を結んでムシクイーン大会を開き続けてくれないかと提案するのだった。"
1596206066 = "玄武の使者たち（１）"
4125761811 = "シズコたちが次に向かったのは「全てに代価を要求する玄武の使者たち」の島。そこは、山海経の玄武商会が運営するというリゾートだった。その割には口コミが炎上しており、様子を見に行くと、不当な費用請求を行い、サービスもロクにしないなど惨憺たる有様だった。悪徳リゾートに憤るシズコを横に、先生は彼らが玄武商会ではなく黒亀組である事を告げる。"
3480568884 = "玄武の使者たち（２）"
1288353414 = "黒亀組とニャン天丸を倒した一行は、他の島と同様にFC契約を結ばないかとニャン天丸から提案される。その提案を「寝言は寝て言え」と一蹴したシズコは、次の島へと向かうのだった。"
3867903048 = "最後の戦いを前に"
3483691157 = "最後の戦いを前に、アビドスのメンバーと作戦会議を開くシズコたち。そこでヘルメット団がカイザーPMCと繋がっている事を聞く。ニャン天丸もカイザーPMCから兵力を雇っていたと話していた事から、この先に待ち受けているのが、ただのヘルメット団だけではない事を感じながらも、一行は最後の戦いへと向かう決意を固めるのだった。"
3161074241 = "ヘルメット団！最後の決戦！"
3255147536 = "ヘルメット団との最後の決戦に向かった一行を待ち受けていたのは、過去にアビドスを窮地に追いやったカイザー理事その人だった。現在はオクトパスバンクの営業職員を務めているというカイザー理事は、シズコに新たな投資の提案をするも、断られる。そうしてシズコに襲いかかるヘルメット団とその新人の覆面水着団……！百鬼夜行とアビドスの長い夏、最後の戦いが今始まる！"
2912056471 = "そして訪れた夏の終わり"
3801914199 = "分が悪いと判断したカイザー理事は、先生を誘拐して逃走を図るも、ワカモの手によって阻止される。そうして長い夏の騒動が幕を下ろし、一件落着――とはいかなかった。「ロスト・パラダイス・リゾート」は本来、連邦生徒会が所有する土地で、カイザーは勝手に権利を販売していたのだと告げられる。そうしてリゾートはすべて立ち退く事になるも、リンに頼み込んで祝勝会を開く事に。一行は最後の宴会を楽しむのだった。"
3000475038 = "放課後スイーツ物語　～甘い秘密と銃撃戦～"
952532459 = "放課後スイーツ部所属のカズサからとある相談を\n受けることになった先生。それは彼女の過去と関係があるようで――\n平凡な少女たちの日常に突如到来した予測\n不可能な出来事の結末は……！？"
1976722127 = "先生に相談したいこと"
1281064588 = "突っかかってくるヤツ（１）"
3956684337 = "突っかかってくるヤツ（２）"
477225583 = "誰だって一つや二つくらい（１）"
