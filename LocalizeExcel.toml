648350015 = "Avistei alunos com movimentos suspeitos no campus. O correto seria informar o Seminário, mas senti que não era uma situação normal e acabei seguindo-os. - Seia"
2965673131 = "Quem são aquelas……? Para estragar a EXPO e obter lucro, que ideia absurda. Se ignorado, se tornará um grande incidente. - Seia"
334310010 = "Durante a operação, é eficiente reunir as informações obtidas em cada etapa. Vou esperar aqui, então pode me visitar sempre que tiver mais perguntas. - Rio"
2204937774 = "Para encontrar pistas, é melhor ir a lugares com muita gente. Em Trinity, seria a praça da fonte…… aqui, seria a sala de aula? - Seia"
4174324411 = "Animal de estimação robô…… seria um robô em forma de cachorro ou gato? Então, a comida seria eletricidade…… me aguça a curiosidade. - Seia"
565085471 = "Encontrei um chip suspeito. Sei que foi feito com más intenções. Se eu o entregar a Rio, sua verdadeira identidade será revelada…… - Seia"
2223345760 = "Era um cachorro…… Esse design é o gosto pessoal de Rio? Ou será que os alunos daqui conseguem reconhecer aquilo como cachorro? - Seia"
95517514 = "Um chip desconhecido foi colocado em uma obra do Clube de Engenharia. O chip causou uma crise temporária no local, e o Clube de Engenharia foi falsamente acusado. É claramente obra de alguém. Mas quem? - Rio"
1245778966 = "Rio continua a mesma. Antigamente ela também fazia coisas estranhas mas incríveis e surpreendia a todos. Me fez lembrar…… mas eu não sou desse tipo, não. - Neru"
365206562 = "A infiltração no centro de dados…… não foi ruim. Ultimamente só tenho trabalhado em coisas chatas, então foi um bom exercício. Antigamente eu era mais…… não, não é hora de ficar relembrando. - Neru"
3686271168 = "Com os dados, muitas coisas podem ser previstas. Chega de ficar apenas rastreando incidentes. Embora a conclusão pela análise tenha sido minha, isso só foi possível graças às informações de vocês duas. - Rio"
1277669418 = "Clube de Desenvolvimento de Jogos…… um grupo que cria jogos. Pessoas com interesses semelhantes se reúnem e buscam um objetivo juntos…… é o exemplo perfeito de 'clube'. Trinity também deveria ter mais organizações assim, mas…… - Seia"
4126678237 = "O Clube de Desenvolvimento de Jogos tem membros com uma sensibilidade única. As obras que elas criam normalmente devem ser extremamente alegres, cheias do desejo de entreter os outros. Estou ansiosa para jogá-las. - Seia"
2590850258 = "Que mau gosto, estragar o fruto do esforço de todos. Precisamos revelar os fatos e provar a inocência do Clube. Essa é a missão do 'Rei Ladrão'. - Seia"
744738424 = "Primeiro o Clube de Engenharia, agora o Clube de Desenvolvimento de Jogos…… antes que o dano se espalhe, temos que capturar os criminosos…… estou confiando em você, Neru. - Rio"
2253968242 = "Aquilo…… foi um incidente, né? Aqueles viciados em exercício, como eles treinam de forma insana, não sei se foi incidente ou rotina…… mas a própria parece estar com dificuldade, então vou ajudar. - Neru"
74454459 = "Certo, a verdadeira identidade do inimigo está clara. Me fizeram trabalhar…… agora que os encontrei, não vou deixar barato! Me fizeram trabalhar muito! - Neru"
3102902340 = "O ataque ao local falhou…… então só nos resta localizá-los e atacar. Não estou a fim, mas…… vou usar aquilo. - Rio"
1980715747 = "'Algoritmo da Irmã Mais Velha'…… que nome nostálgico. Se Neru soubesse da sua existência na época, certamente teria me impedido. Quem me dera…… - Rio"
541035342 = "Que plano grandioso, Rio. Julgar que o auto-sacrifício é o melhor, e caminhar para um fim que ninguém deseja…… é uma pena, mas não posso ignorar seu plano. Vamos eu e Neru. - Seia"
