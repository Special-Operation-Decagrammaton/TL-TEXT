2335123540 = "A Gangue dos Passarinhos contratou mercenárias Sukebans e partiu para destruir a rua de comércio. No entanto, por terem conseguido essa informação com antecedência, a turma de Shanhaijing já as esperava pronta para revidar. Ao baterem de cara com uma parede de resistência e verem que os planos afundaram na água, a fúria das crianças explode. Mal sabem elas que a verdadeira hora do castigo e das palmadas acabou de começar."
