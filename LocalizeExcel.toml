2390783230 = "Deseja se mover para este local?\nApós a movimentação, não será possível voltar."
3015113020 = "Confirmar"
2299886396 = "Segundo os pescadores, a captura de caranguejos aumentou nos últimos meses, fazendo os preços despencarem. As caixas empilhadas no depósito confirmam essa afirmação."
2761775914 = "Os trabalhadores do porto parecem usar caixas com serragem para transportar os caranguejos. Colocar os caranguejos em tambores pode matá-los, não é recomendado. A verdade do boato é……"
3514356211 = "Ao contrário das pessoas do porto, os cidadãos comuns parecem ter um medo vago dos caranguejos. Por isso, as lojas que servem pratos com caranguejo estão com vendas em baixa."
2379706199 = "Sobre os pescadores que desapareceram repentinamente do Porto Kanezaki, um pescador mais velho tem certeza de que fugiram do trabalho pesado, mas outros pescadores ao redor dizem que foi devido às grandes dívidas com a Família Carpaccio."
3923987583 = "A estação de carga do Porto Kanezaki não opera trens de passageiros, mas só de madrugada há trens para os trabalhadores do porto. O horário coincide com o desaparecimento dos pescadores."
3535269966 = "A Família Carpaccio emprestava dinheiro a juros altos para pessoas necessitadas dentro e fora do porto. Boatos se espalham nas redes sociais de que devedores que não pagam sofrem severamente."
4086592800 = "No 'Manual de segurança' da Família Carpaccio, além do guia geral de trabalho, há uma instrução sem sentido: 'dar uma volta no porto com um tambor rolando à meia-noite'."
518587471 = "Na área de armazenamento de alimentos da Família Carpaccio, foram encontradas caixas com grande quantidade de caranguejos. Era tanto caranguejo que nem toda a família conseguiria comer."
162033439 = "A partir dos dados logísticos encontrados no depósito da Família Carpaccio, foi possível confirmar seus registros financeiros. A Família Carpaccio parece estar tentando reduzir custos fixos e aumentar o caixa."
557718016 = "Vamos investigar a situação ao redor do pescador desaparecido.\n\nSegundo as informações, o pescador desaparecido era membro da tripulação de um barco de pesca de caranguejos……\nOutros tripulantes do mesmo barco podem saber de algo."
735844159 = "Vamos ajudar o trabalhador a encontrar o saco de serragem.\n\nA serragem é essencial para conservar os caranguejos. Alguém pode ter jogado fora como lixo, então vamos verificar o depósito de lixo."
3570144724 = "Vamos ajudar os comerciantes em dificuldade.\n\nOs comerciantes da área comercial estão com dificuldades devido aos boatos recentes. Será que podemos ajudar a divulgar as lojas?"
1284006630 = "Vamos organizar as pistas investigadas.\n\nOrganizando as pistas que coletamos, devemos encontrar um fio. Mas com as investigações de hoje…… pode ser um pouco insuficiente."
1631138589 = "Vamos perguntar sobre o pescador desaparecido.\n\nCom a visita anterior, eles se tornaram um pouco mais receptivos, então vamos perguntar cuidadosamente sobre o pescador que desapareceu. Espero que não seja um grande problema."
2072783996 = "Vamos investigar o destino da ferrovia conectada ao porto.\n\nO Porto Kanezaki tem uma estação de carga conectada ao exterior. O pescador desaparecido pode ter usado esta estação."
319418750 = "Vamos investigar a Família Carpaccio.\n\nA Família Carpaccio, responsável pela segurança do porto, empresta dinheiro a juros altos para quem precisa no porto. Será que são eles……?"
3887413056 = "Vamos organizar as pistas investigadas.\n\nFinalmente estamos encontrando um fio. Mas será que podemos encerrar este caso como uma simples questão de dívida?"
1679105561 = "Vamos nos infiltrar no depósito.\n\nVamos nos infiltrar no depósito da Família Carpaccio em busca de provas mais concretas. Antes, precisamos de um jeito de desviar a atenção do segurança na entrada……"
590934296 = "Vamos procurar vestígios suspeitos no depósito.\nO depósito é muito maior do que eu imaginava…… Cuidado para não ser descoberta pelos membros, vamos procurar vestígios suspeitos."
2618096481 = "Vamos organizar as pistas investigadas.\n\nApós investigar o depósito, minhas suspeitas se tornaram certeza. Este desaparecimento e os boatos são uma cortina de fumaça para esconder um objetivo maior."
