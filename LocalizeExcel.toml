315343576 = "Habilidade EX (Campo) 2 (Shun)"
3201704943 = "Quando o Gregorio sofrer um debuff, o mesmo efeito será clonado no Coro.\nAlém disso, o dano que o Coro levar será transferido diretamente pro Gregorio!\nAtire os debuffs no Gregorio e lance seus ataques em área na galera!"
3207903738 = "Lobby do Evento Normal 1 (Shun)"
3214662401 = "Ao retornarem do desfiladeiro, a turma foi recebida por uma Kanae cambaleante. Usando as suas últimas forças pra dizer que deu o seu melhor, a pobre diretora desaba desacordada no chão. Observando a habitual bagunça de Shanhaijing voltando ao normal, o esquadrão respira fundo e regressa aos seus aclamados dias de paz."
