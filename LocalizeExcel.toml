2653817472 = "レッドウィンターの平凡なる一日（１）"
960975359 = "レッドウィンターの平凡なる一日（２）"
3209912447 = "知識解放戦線のとある一日"
2520485061 = "レッドウィンター連邦学園の図書館を大掃除する知識解放戦線は、一世を風靡した名作『ルナ』を発見する。しかし、作品に対する2人の感想は全く異なり……それをきっかけに大喧嘩へと発展してしまうのだった。"
720773574 = "ストライキ宣言"
2640338098 = "喧嘩の末、モミジが出て行ってしまった事を先生に相談するメル。ただの言葉の謝罪だけではなく、仲直りのプレゼントとして、『ルナ』の最終巻を探す事を決めるのだった。"
392147764 = "最終巻"
2594803507 = "『ルナ』の最終巻を探すも一向に見つからず途方に暮れるメル達の前に、レッドウィンター連邦学園の出版部であるタカネが現れる。タカネは『ルナ』の最終巻の手がかりは出版部にあると告げ、メルたちを送り出すのだった。"
3663799006 = "出版と重版、そして流通"
298813709 = "タカネのヒントを元に出版部にやってきた先生とメル。二人はそこで出版部の部長であるヤクモに『ルナ』最終巻の情報について尋ねる。しかし、ただで情報を教えるのは、と渋るヤクモに対し、交渉の末、メルは取引を呑むのだった。"
3362804913 = "秘密会合"
2411994088 = "先生とメルは『ルナ』の最終巻があるという場所に到着する。しかし、そこには様々な展開の『ルナ』最終巻が存在し……複数の『ルナ』の最終巻を読んで困惑する2人。どうみてもそのイベントは同人誌即売会の様相を呈していて……そんな2人の前に、とある人物が立ちはだかる。"
1879649220 = "誰にでもある秘密"
189383727 = "結局、『ルナ』の最終巻は存在していなかった。噂にある最終巻はすべて、誰かの二次創作なのだとか。一番大手の同人誌を持っていけば良いというタカネに対し、メルは自分自身の解釈で『ルナ』最終巻の同人誌を描くことを決意する。"
2417107819 = "半分の完成"
3852138862 = "同人誌を描くと宣言するメルに困惑するタカネは、4日後に開催される『ルナ』最終巻のプチオンリーに参加し、そこに新刊として出すように告げる。半端なものでは意味がないとメルはそれを受け入れ、地獄の原稿合宿が幕を開けるのだった。"
3860894640 = "歯車"
1197843780 = "数日に渡る徹夜の末、倒れてしまったメルをゆっくりと休ませる先生。そんな先生の元に、モミジから電話がかかってきて――"
3821762781 = "対面"
4010090300 = "先生の仲裁で予定よりも早く再会を果たすメルとモミジ。お互いに酷いことを言ったと謝り、仲直りする。もう同人誌を描く必要はなくなったとはいえ、メルは完成まで突っ走ると笑うのだった。"
3696580091 = "事務局の提案"
3919086823 = "イベント当日の朝、ギリギリ同人誌を完成させた一同は、印刷すべく出版部へと走り出す。しかし、そんな彼女たちの前に不穏な影が立ちはだかるのだった。"
2443904406 = "工務部の提案"
1377786849 = "事務局を退けた一行の前に、再び不穏な影が立ちはだかる。"
3740420419 = "特別な取引（１）"
786268020 = "工務部を退けた一行の前に、更に不穏な影が立ちはだかる。"
1754041631 = "特別な取引（２）"
834176443 = "数々の妨害を振り切った一行は、ようやく出版部にたどり着く。メルの同人誌をタカネが読もうとした瞬間、ヤクモが間に入るのだった。"
3222170929 = "レッドウィンターの平凡なる一日（１）"
2976716705 = "ヤクモは、この一連の騒動を出版部で映画化すべく、メルの原稿を取り上げようとする。それは最終巻の情報を得るための取引の一環であった。それはできないと断るメルに対し、ヤクモはレッドウィンター事務局のマリナを呼ぶのだった。"
1466984691 = "レッドウィンターの平凡なる一日（２）"
4127469638 = "改めてタカネはメルの同人誌を批評する。そこには珍しくメルを褒めるタカネの姿があった。そうして、全ての騒動終わりを迎え、一同は日常へと戻っていくのだった。"
3949906024 = "Trip-Trap-Train"
1291082049 = "トリニティに遺物を運ぶ道中、預けた貨物列車の行き先が違う事に気づいたイチカと先生。慌てて乗り込んだ列車にはゲヘナの指名手配犯も乗り合わせていて――！？果たして、一同は無事遺物をトリニティに持ち帰ることができるのでしょうか？"
108736641 = "護送列車"
2912345324 = "3時10分、ゲヘナ行き"
3469029340 = "日常茶飯事（１）"
1843050328 = "日常茶飯事（２）"
97227209 = "先頭車両へ（１）"
2526921636 = "先頭車両へ（２）"
3428539678 = "The good, The bad, The trinity（１）"
1542184559 = "The good, The bad, The trinity（２）"
3529227671 = "地獄行き特急列車"
733770731 = "努力の存在"
3424620980 = "宣戦布告"
4252861283 = "護送車両"
2301239987 = "護送列車"
2166076890 = "「アランチーノ・ファミリー」は、自分たちにテロを行った指名手配犯を特殊護送車両に拘禁するのだった。"
3643696836 = "3時10分、ゲヘナ行き"
342073680 = "イチカは、トリニティの貴重な遺物を回収すると共に、遺物の発掘作業に参加した先生を補佐する任務を受けることに。先生と仕事ができるチャンスに喜ぶイチカは、快く任務を引き受けたものの、遺物を載せた貨物列車は別の行き先へと向かうもので……？"
1743782552 = "日常茶飯事（１）"
4175588508 = "ゲヘナ行きの列車にカバンを預けてしまったことに気づいた先生とイチカは、慌てて列車に乗り込む。しかし、トリニティの生徒が乗ったことによって車内がざわついてしまい……騒ぎを聞きつけた列車乗務員と争いになってしまうのだった。"
490474147 = "日常茶飯事（２）"
2087948384 = "列車と連結されていた護送車両から突然の爆炎が巻き起こる。そうして、煙の中から現れたカスミと対面するのだった。"
1027493850 = "先頭車両へ（１）"
2901736866 = "カスミは、先生とイチカに対して同盟を組まないかと提案してくる。考える間もなく、カスミを追いかけてきたギャングとの戦いとなり、一時的に両者は手を組むことになるのだった。"
2706436858 = "先頭車両へ（２）"
1886931417 = "カスミは、貨物車は先頭車両にある事を告げ、本来の計画を話す。カスミと手を組むにせよ、先頭車両を目指すことは同じ一行は、前進するのだった。"
3944901993 = "The good, The bad, The trinity（１）"
2576802244 = "停車駅をスキップして進み続ける列車に違和感を覚えたイオリは、列車に乗り込むことに。先頭車両を目指していたカスミたち一行と鉢合わせてしまうのだった。"
625534155 = "The good, The bad, The trinity（２）"
1618348553 = "この列車に乗車している不良生徒全員を連行すると息巻くイオリに対し、この列車に乗っている乗客の大半が不良生徒であることを告げるカスミ。イオリは先生に助けを求めるも、カスミはトリニティの遺物を盾に先生を脅してくるのだった。"
231759077 = "地獄行き特急列車"
810924489 = "トリニティの遺物を盾に脅してくるカスミに対し、ついに堪忍袋の緒が切れてしまったイチカは、カスミを含めたその場にいる生徒を次々と攻撃するのだった。"
2795025360 = "努力の存在"
943399603 = "壊れてしまった遺物を前にようやく落ち着いたイチカに対し、先生は一緒に謝ると告げる。そうして、イチカが努力している事は見ていると笑いかけると、ようやくイチカの表情も明るくなるのだった。そんな中、列車の進行方向に設置された爆発物によって列車は横転するのだった。"
4054716633 = "宣戦布告"
3293238505 = "無事にトリニティに遺物を運んだ一行。破損に対しての謝罪を受けて、ナギサは「破損は修復すれば良い」のだと優しく告げる。そうして、イチカと先生の長い任務は終わったのだった。"
2098216956 = "護送車両"
274615224 = "ゲヘナの風紀委員は、テロの主要犯を特殊護送車両に拘禁するのだった。"
2688632770 = "とある科学の青春記録"
3170117962 = "うららかなとある日の午後――シャーレで休憩していた先生の元に、エイミから廃墟に人が倒れているという連絡が届く。曰く、彼女達は異世界からやってきたらしく……？彼女達を元の世界に戻すべく、今、シャーレが立ち上がる！"
128474983 = "もう一つの学園都市"
4030478322 = "トラブルメーカー？"
1854302336 = "学園都市の常識（１）"
686158303 = "学園都市の常識（２）"
13161087 = "まるで観光客のように"
279861122 = "楽しい時間は一瞬で"
3742444860 = "常盤台の超電磁砲（１）"
3603682477 = "常盤台の超電磁砲（２）"
4069899568 = "修理？（１）"
1803976307 = "修理？（２）"
1151356943 = "最強の精神系能力者"
379502612 = "思い出は、心のなかに"
2969638269 = "もう一つの学園都市"
236906501 = "とある日の午後――シャーレの休憩室で横になっていた先生は、ミレニアムの廃墟で異世界からの遭難者を見つけたと連絡を受けるのだった。"
2728795135 = "トラブルメーカー？"
2665297076 = "ミレニアムに到着するも、遭難者は既に姿を消していた。エイミが教えてくれた手がかりを元に、捜索しようとすると突如として爆発音が鳴り響く。その場所に向かうと、遭難者の1人――御坂美琴が立っていた。混乱する彼女に対し、ヒマリはこの世界の事、そして元の世界に戻る手段を探してみると伝える。そうしてヒマリが手段を探している間、エイミと先生は御坂美琴がこの世界に馴染めるよう準備を進めるのだった。"
702162909 = "学園都市の常識（１）"
1061223818 = "エンジニア部で御坂美琴専用の銃を受け取った一同。御坂は、キヴォトスの「常識」に驚きつつも残りの遭難者の分も銃を受け取り、改めて他2人を探すべく出発するのだった。"
3231248675 = "学園都市の常識（２）"
3778114332 = "キヴォトスの「常識」と共に、食蜂操祈のところを訪れた一行。無事に事情説明を終えて銃を渡したところで、ヒマリから「施設」の解析が終わったとの報が届くのだった。"
1189128859 = "まるで観光客のように"
1275099754 = "特異現象捜査部へと帰還した一行は、最後の1人である佐天涙子と合流する。ヒマリは廃墟にある施設を修理して再稼働すれば元の場所に戻れるだろうと告げ、その準備をすべて終えていると伝える。しかし、今から廃墟に向かうと時間が遅くなってしまうため、せっかくだから元の世界に戻る前に、今日はキヴォトスを楽しむのはどうかと提案する。そうして一行はキヴォトス観光へと赴くのだった。"
232191555 = "楽しい時間は一瞬で"
1502489746 = "楽しかったキヴォトス観光を終え、廃墟を訪れた御坂美琴一行とエンジニア部は、ヒマリが言ってた施設を探すべく、地下へ下りていく。"
328099769 = "常盤台の超電磁砲（１）"
1368837064 = "廃墟を捜索していた一行はオートマタと遭遇し、戦闘に突入するのだった。"
1548581704 = "常盤台の超電磁砲（２）"
4263679817 = "多くの敵を前に、エンジニア部が作ってくれたレールガンを撃つ御坂美琴。しかし、あまり威力が出ず、敵の一掃には至らなかった。銃を手放した御坂美琴は、コインを使って自前の超電磁砲を放つのだった。"
3683836728 = "修理？（１）"
1391870569 = "無事、「施設」に到着した御坂美琴一行。しかし、施設を作動させる前に警備ドローンが押し寄せてくるのだった。"
98202569 = "修理？（２）"
2922543463 = "次々と押し寄せてくるドローンを前に、施設を一旦停止すべく佐天涙子が放った一撃が、誤作動を起こしてしまう。そうして、眼前に現れたのはキヴォトスの問題児ともいえるカイテンジャーやヘルメット団だった。"
3668662788 = "最強の精神系能力者"
2031129388 = "エンジニア部が施設を修理している間、どうにか問題児を食い止めなければならない。あまり能力を使いたくないのだと漏らしながらも、食蜂操祈の能力によって、その場を凌ぐことに成功するのだった。"
1787559679 = "思い出は、心のなかに"
2603116893 = "そうして施設の修理が完了し、一人ずつ元の場所へと転送されていく。佐天涙子、食蜂操祈、御坂美琴はキヴォトスでの短い旅を振り返りながら、笑顔で帰っていくのだった。"
2944701250 = "（電脳）新春行進曲"
1318448187 = "怠惰な生活を打破すべく、初日の出を見に出かけることとなったヴェリタス一同。果たして彼女たちは無事に初日の出を見ることができるのでしょうか？"
