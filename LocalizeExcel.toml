608246101 = "[c]自分のフェーズ開始時：[/c]ランダムで手札にあるカード[c]{param;CardNum}[/c]枚のコストが[c]1[/c]減少する。自分のフェーズ終了時、対象カードは捨てられる。"
2240303745 = "[c]クールタイム：2ターン[/c]\n\nランダムな敵にダメージを与える。[c]（自身を含む味方{tag;Hyakkiyako}生徒および{char;848014}カードの枚数分、繰り返す）[/c]\n\n\n[c][75b4c0][i]夢見る忍者少女。しばしば忍術を披露するが、それらはすべて優れた身体能力で実現している。[/i][-][/c]"
