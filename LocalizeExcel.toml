707855630 = "Depois da festa"
1580334319 = "Alunas de Trinity visitam o campus de Millennium para a EXPO. Seia também tentava participar, recebida pela C&C, quando vê alunos suspeitos e acaba seguindo-os."
1485885318 = "Seia entra no túnel subterrâneo seguindo os alunos suspeitos. Tenta se aproximar para ouvir a conversa sem ser vista e encontra uma aluna inesperada."
3524856260 = "Seia e Neru vão ao esconderijo de Rio. Ao ouvir a situação, Seia descobre a existência de uma conspiração por trás da EXPO. Enquanto Neru e Rio dizem que protegerão Seia como convidada, Seia, em troca das informações, faz uma proposta."
3055035619 = "Com Seia como novo reforço, Rio parte para uma investigação mais ativa."
1087244281 = "Por ordem de Rio, Seia vai investigar o campus. Para encontrar pistas na 'Millennium, onde não há lugar que não seja inquietante', ela se dirige à sala de aula, onde os alunos se reúnem."
3603561 = "Seia encontra o Clube de Doces do Pós-Escola na sala de aula e ouve sobre o 'animal de estimação robô'. Curiosa, decide ajudar na busca."
3962754328 = "O animal de estimação robô acaba sendo um 'jacaré robô'. Para Seia, confusa, Karin e Asuna dizem que 'em Millennium, isso é normal'. Ao saber que o jacaré robô é obra do Clube de Engenharia, Seia vai ao laboratório delas."
1344822250 = "Após controlar o descontrole do Avant-garde-kun, Yuuka visita o local e interroga o Clube de Engenharia. Enquanto eles se declaram inocentes, Seia encontra um chip suspeito dentro do Avant-garde-kun quebrado."
2239397365 = "Recebendo o chip suspeito, Rio percebe uma 'intenção'. Enquanto isso, Seia nota uma pequena mudança em Rio durante a conversa."
1398523524 = "Neru se prepara para a infiltração no centro de dados. Rio lhe entrega um USB de operação e uma chave de segurança."
1813766078 = "Neru se infiltra no centro de dados e chega ao destino, mas enfrenta um novo problema. Nesse momento, uma voz familiar é ouvida……"
1717919827 = "Com as informações obtidas no centro de dados, Rio entende a situação. O incidente é maior do que as três imaginavam, e Rio finalmente planeja um ataque ao local."
2988794607 = "Rio, considerando os sentimentos de Seia, rapidamente investiga o fluxo de dados. Seia, percebendo sua consideração, vai ao Clube de Desenvolvimento de Jogos para ajudar."
58980428 = "Seia chega ao Clube de Desenvolvimento de Jogos e encontra Aris e Yuzu. Aris a chama de 'Rei Ladrão' e a convida para a barraca de demonstração do clube."
3905697355 = "Na barraca do Clube de Desenvolvimento de Jogos, está exposto um jogo que todos fizeram com muito esforço. Mas aqueles que jogam ficam com raiva, causando grande confusão."
1699322212 = "Rio investiga o chip que arruinou o jogo e confirma que foi obra de alguém, como no caso do Clube de Engenharia. Rio evita comentar sobre a dificuldade ou qualidade original do jogo."
1906942469 = "Neru vai ao centro de fitness para o ataque ao local. Parece que o incidente ainda não ocorreu, mas a esteira em que Hasumi está tem um mau funcionamento. Neru encontra um aluno suspeito e o segue."
2940778481 = "Neru encurrala os alunos suspeitos e os subjuga. Nesse momento, a pessoa que parece ser a mandante contata, uma bomba explode. Aproveitando a explosão, Neru deixa os alunos capturados escaparem."
2077988676 = "Com o fracasso do ataque ao local, Rio decide que só resta encontrá-los diretamente. Rio menciona o 'Algoritmo da Irmã Mais Velha', que manteve em segredo, como último recurso."
4128574415 = "Para usar o 'Algoritmo da Irmã Mais Velha', Rio tenta ir sozinha ao centro de dados. Seia e Neru, achando que não podem deixar a responsabilidade só com ela, decidem participar."
559738736 = "O grupo chega à Sala da Irmã Mais Velha. Mas sua ação foi antecipada por Mirai, que planejava roubar o algoritmo. Enquanto Rio e Seia ficam perturbadas, apenas Neru permanece calma diante da ameaça de Mirai."
3964034247 = "Com a cooperação do Sensei, o grupo supera a crise. Mirai e seus comparsas, embora irritados, são todos presos."
2454044807 = "Vendo o fim do incidente, Rio tenta sair sem aproveitar a EXPO. Seia e Neru acham isso triste. Seia, com perspicácia, faz uma proposta a Rio."
4226564748 = "Rio planeja uma operação para recolher os 'itens perigosos' em vários locais da EXPO. Recebendo o equipamento de ponta, Seia reinicia a missão de infiltração."
3409180479 = "Rio identifica remanescentes do grupo de Mirai dentro do local da EXPO. Neru os captura de uma só vez."
3753568740 = "Invasores são confirmados na barraca de exposição. Como medida para a segurança 'de alguma forma' reforçada recentemente, Rio pede que Neru e Seia investiguem juntas."
2190721227 = "Os drones de segurança do local da EXPO apresentam mau funcionamento, levantando preocupações de danos aos visitantes na manhã seguinte. Para executar o plano de controle de drones elaborado por Rio, Seia e Neru se infiltram no local."
1147821016 = "Com as palavras do Sensei 'aproveite a EXPO', Seia decide percorrer o local. No entanto, uma crise inimaginável a aguarda……"
2551732620 = "O Seminário instalou armadilhas no local como medida contra os invasores recorrentes. Seia e Neru, em apuros, unem forças para tentar escapar."
4087116818 = "Último dia da EXPO. Seia se despede de todos e passa um tempo agradável. Ou assim parecia, com o aparecimento do 'animal de estimação robô' que havia escapado, a confusão recomeça."
