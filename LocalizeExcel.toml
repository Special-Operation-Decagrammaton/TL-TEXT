2423861271 = "Koyuki está na sala de reflexão, mesmo sendo fim de ano. Embora Yuuka e Noa lhe tenham dito para se comportar, ela não reflete sobre nada e faz planos malignos. Primeiro, consegue convencer o Sensei e o chama para a sala de reflexão……"
825721735 = "O fim de ano de cada uma"
3133192212 = "Enquanto isso, para que Koyuki não passe o fim de ano sozinha, Yuuka e Noa planejam uma festa do pijama. Para pegar jogos de mesa emprestados, visitam Maki, Chihiro, Kotama e Hare, nessa ordem, no Veritas."
3668139486 = "Não consigo aguentar!"
1422919003 = "O Sensei estava com Koyuki na sala de reflexão, mas, com a chegada repentina de Yuuka e Noa, ele tem que se esconder. Koyuki, descoberta por estar brincando, foge. Com a ajuda de Kotama e Hare, que por algum motivo foram contatadas, o Sensei tenta escapar."
1768024960 = "Para ser sincero……"
3060288246 = "O Sensei tenta escapar com Koyuki, evitando Yuuka e Noa. Quase descoberto por Yuuka, prestes a desistir, ele consegue se virar com a distração de Koyuki e o apoio de Kotama e Hare."
2927553321 = "O vestiário do terror"
3549912057 = "Koyuki e as outras conseguem se livrar da situação com os drones de Yuuka. Chegam ao portão dos fundos, mas falham na fuga devido a uma contra-hackeamento. Procurando outra rota de fuga, com Yuuka e Noa se aproximando, o Sensei puxa Koyuki e se esconde em um armário do vestiário……"
3964185245 = "Testemunha Koyuki! (1)"
3324295142 = "Koyuki e o Sensei despistam Noa e as outras e chegam a um túnel subterrâneo há muito tempo inutilizado. No entanto, ao acender a luz e tentar avançar, são atacados por drones."
3188615699 = "Testemunha Koyuki! (2)"
483673306 = "Koyuki e o Sensei conseguem desviar da perseguição dos drones, mas Kotama e Hare, com quem estavam em contato, são pegas por Chihiro e ficam em apuros. Para deixar o Sensei escapar, Koyuki se oferece como isca e enfrenta Yuuka, mas é facilmente imobilizada. O Sensei tenta escapar ouvindo os gritos, mas uma sombra se aproxima por trás……"
1190632781 = "Privilégio do Oni"
1513134473 = "No final, o Sensei é capturado por Noa e, guiado, vai até a sala onde está a festa do pijama. Enquanto isso, Koyuki, Yuuka e as outras, que foram pegas primeiro, já estão animadas com os jogos e, quando Noa e as outras chegam, já estão dormindo de tanto brincar."
2665981194 = "O mesmo dia, mesmo depois do ano novo"
2221244653 = "Noa e o Sensei caminham pela Millennium noturna, a sós. Conversam sobre o significado de celebrar o Ano Novo com pessoas queridas e recebem o novo ano com sentimentos renovados. Na manhã seguinte, Noa sorri, feliz por receber o novo dia, como sempre, com o Sensei e todos os outros de Millennium."
2850688326 = "O Oni do jogo do bobo"
3806587471 = "Koyuki, que perde consecutivamente em qualquer jogo, acha que pode vencer em um jogo que não dependa da sorte e desafia todos no 'jogo do bobo'. No entanto, sua batalha psicológica não funciona contra Noa, que mantém a expressão, e ela perde. Como penalidade, leva um cascudo."
2364069971 = "Duelo com BOOM!"
1583950511 = "Pela sugestão de Maki, que também quer jogar videogame, eles competem no contra-relógio do jogo de tiro 'BOOM'. Chihiro, no início relutante, acaba gostando ao jogar…… mas seu estilo violento de jogo intimida os outros membros do Veritas."
4046425659 = "Suco misturado definitivo"
678779510 = "Enquanto Chihiro, Yuuka e Noa vão às compras, os que ficam, Koyuki e Maki, ficam curiosos sobre o sabor do 'Yokai MAX' misturado com outras bebidas no local. O resultado é um suco com aparência impossível de beber, e elas são repreendidas por Yuuka e as outras que voltam."
2515246811 = "Verdade ou Desafio"
3704212747 = "Yuuka e as outras decidem jogar 'Verdade ou Desafio' usando o suco misturado com 'Yokai MAX'. Uma disputa de quem fala a verdade ou bebe o suco como penalidade se desenrola, mas Yuuka acaba sendo alvo de muitas perguntas e é forçada a beber muito suco."
2477124485 = "Noite em que todos dormem"
4229744822 = "Quando a noite já está avançada, Noa e Chihiro, ainda acordadas, conversam tranquilamente e sinceramente, distantes de suas respectivas organizações. Depois, Chihiro termina a manutenção do servidor e tenta voltar para o quarto. Na despedida, sorriem uma para a outra, desejando um bom novo ano."
4235724912 = "Koyuki, que perde consecutivamente, acha que pode vencer em um jogo que não dependa da sorte e desafia todos no 'jogo do bobo', mas……?"
2622510326 = "Pela sugestão de Maki, eles decidem jogar o jogo de tiro 'BOOM'. Chihiro, no início relutante, mas……"
