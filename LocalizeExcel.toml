2253549215 = "Com a atuação de Kanna, o grupo vence a luta contra o crocodilo mecânico. Para revelar sua verdadeira identidade, decidem analisar seu interior."
827169251 = "Salva-vidas, missão cumprida!"
1084464340 = "Utaha e Chihiro aparecem de repente. Descobre-se que o 'crocodilo mecânico' era do Clube de Engenharia e foi parar no parque aquático devido a um erro durante o desenvolvimento. E a razão pela qual o crocodilo parou de funcionar diante de Kanna também é revelada."
