2969638269 = "Outra cidade dos estudos"
236906501 = "Certa tarde – o Sensei descansava na sala do Schale quando recebe a notícia de que náufragos de outro mundo foram encontrados em uma ruína de Millennium."
2728795135 = "Encrenqueira?"
2665297076 = "Ao chegar em Millennium, os náufragos já haviam desaparecido. Com base nas pistas de Aymi, eles começam a procurar. De repente, uma explosão ecoa. Ao se dirigirem ao local, está Misaka Mikoto, uma das náufragas. Para ela, confusa, Himari diz que investigará sobre este mundo e como retornar ao original. Enquanto Himari procura meios, Aymi e o Sensei preparam Misaka Mikoto para se adaptar a este mundo."
702162909 = "O senso comum da cidade dos estudos (1)"
1061223818 = "O grupo recebe uma arma exclusiva para Misaka Mikoto no Clube de Engenharia. Misaka se surpreende com o 'senso comum' de Kivotos, mas também recebe armas para as outras duas náufragas e partem para procurá-las."
3231248675 = "O senso comum da cidade dos estudos (2)"
3778114332 = "Com o 'senso comum' de Kivotos, o grupo visita Shokuhou Misaki. Após explicar a situação e entregar a arma, recebem a notícia de Himari de que a análise da 'instalação' foi concluída."
1189128859 = "Como turistas"
1275099754 = "De volta ao Departamento de Investigação de Fenômenos Anômalos, o grupo se reúne com a última pessoa, Saten Ruiko. Himari diz que, se consertarem e reativarem a instalação na ruína, poderão retornar ao lugar original, e que os preparativos estão prontos. No entanto, como já está tarde, ela sugere que aproveitem Kivotos antes de voltar. Assim, o grupo vai passear."
232191555 = "O tempo divertido é fugaz"
1502489746 = "Após o divertido passeio por Kivotos, Misaka Mikoto e as outras, juntamente com o Clube de Engenharia, descem ao subsolo para encontrar a instalação mencionada por Himari."
328099769 = "A Eletromestre da Tokiwadai (1)"
1368837064 = "O grupo encontra autômatos durante a busca e a batalha começa."
1548581704 = "A Eletromestre da Tokiwadai (2)"
4263679817 = "Diante de muitos inimigos, Misaka Mikoto dispara o railgun que o Clube de Engenharia fez para ela. No entanto, o poder não é tão grande e não consegue eliminar todos. Largando a arma, Misaka usa sua própria railgun com uma moeda."
3683836728 = "Conserto? (1)"
1391870569 = "O grupo chega à 'instalação' com sucesso. No entanto, antes de ativá-la, drones de segurança atacam."
98202569 = "Conserto? (2)"
2922543463 = "Diante dos drones que chegam um após o outro, Saten tenta parar a instalação, mas causa um mau funcionamento. Então, aparecem os Kaiten Rangers e a Gangue do Capacete, considerados os encrenqueiros de Kivotos."
3668662788 = "A mais poderosa usuária de habilidades mentais"
2031129388 = "Enquanto o Clube de Engenharia conserta a instalação, eles precisam conter os encrenqueiros. Shokuhou, relutante em usar sua habilidade, consegue resolver a situação com seu poder."
1787559679 = "As memórias estão no coração"
2603116893 = "O conserto da instalação é concluído, e as pessoas são transferidas uma a uma. Saten Ruiko, Shokuhou Misaki e Misaka Mikoto relembram sua curta viagem a Kivotos e voltam para casa com um sorriso."
2944701250 = "Marcha de Ano Novo (cibernética)"
1318448187 = "Para romper com a vida preguiçosa, os membros do Veritas decidem sair para ver o primeiro nascer do sol do ano. Será que conseguirão ver o primeiro sol do ano?"
