185156526 = "Vamos fazer uma banda!!"
1646859781 = "Airi corre para a sala do Clube de Doces do Pós-Escola e propõe formar uma banda. Yoshimi, Natsu e Kazusa ficam confusas, mas ao saber que a recompensa pela apresentação de abertura do festival é a 'Rainha dos Doces Frederica Semla', o Clube forma uma banda às pressas."
1617050729 = "A coisa mais importante"
749480935 = "Quando perguntadas sobre a coisa mais importante em uma banda, os membros do Clube de Doces do Pós-Escola dão suas opiniões. Isso mostrava os papéis que cada uma desempenharia. Enquanto os instrumentos são decididos meio que por acaso, apenas Airi parece abatida. À noite, ela visita o Sensei e desabafa sobre sua dúvida na escolha das músicas."
188886584 = "A nobre da Wild Hunt"
2265387020 = "Para resolver a dúvida de Airi, o Sensei tenta encontrar a aluna da Wild Hunt que Airi disse ter visto. Quando já está desistindo tarde da noite, a pessoa procurada aparece."
2422729638 = "Eu, diferente de antes"
2553404339 = "À noite, Airi fica sozinha na sala de prática. Ao Sensei, preocupado, ela diz que vai mudar. No dia seguinte, Yoshimi contata o Sensei dizendo que Airi desapareceu de repente."
3689885592 = "Para quem"
670625935 = "Enquanto o Sensei sai para procurar Airi, Yoshimi, Natsu e Kazusa conversam sobre ela. A conclusão a que chegam é que vão roubar a 'Frederica Semla' por Airi. Determinadas, as três vão ao local onde a Semla está guardada."
1244213426 = "Qualificação"
2533353309 = "Airi desabafa suas angústias com o Sensei que veio procurá-la. Não foi por causa da Semla que ela desapareceu, mas porque achava que não era digna de estar ali. Quando o Sensei tenta consolá-la, recebe uma mensagem do Tea Party: três alunas estão detidas na cela."
3267285556 = "Uma história de juventude"
301716970 = "O Sensei e Airi chegam à cela onde Yoshimi, Natsu e Kazusa estão detidas. As três dão a Airi um pedaço da Semla que conseguiram. No reencontro emocionante, Airi decide revelar suas angústias. Enquanto isso, Tsumugi, ao ouvir a história do Clube de Doces, se comove com essa história de juventude e entrega ao Sensei uma música que compôs."
2859256604 = "Não está faltando (1)"
2713245801 = "Airi conversa com seus colegas de classe sobre o tema do festival escolar. Ela sorri para os membros do Clube de Doces do Pós-Escola que a esperam na cidade."
2939453841 = "Não está faltando (2)"
1029444936 = "No terraço de um prédio de Trinity com poucas pessoas, o Clube de Doces do Pós-Escola toca música."
1568618102 = "Shiina Tsumugi"
3174803636 = "O Clube de Doces do Pós-Escola e o Sensei vão assistir ao show de Shiina Tsumugi. Lá, veem uma cena inimaginável."
1289951502 = "Poder trair é……"
3100982585 = "O Sensei e o Clube de Doces do Pós-Escola se lembram do dia em que lutaram para roubar a 'Frederica Semla'. Nesse momento, alguém que fala em justiça aparece de repente……"
