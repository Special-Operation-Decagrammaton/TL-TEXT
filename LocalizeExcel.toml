3688617078 = "A piscina de ondas está cheia de perigos!"
298753096 = "As três começam a trabalhar na piscina de ondas. Kanna é acidentalmente levada pelas ondas, vê um monstro desconhecido debaixo d'água e ordena a evacuação. Pessoas inesperadas observam a cena..."
3625956946 = "Jacaré, sinal perdido!"
