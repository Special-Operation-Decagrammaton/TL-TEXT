2246879745 = "こんな世界は間違っている"
1009008909 = "ハッピーバレンタイン！"
3775021891 = "バレンタインデーのお仕事（１）"
1872607528 = "バレンタインデーを迎えたD.U.自治区では、大規模なイベントが相次いで開かれることに。ヴァルキューレ警察学校のフブキとキリノからの要請で、先生はパトロール業務を始める。"
1521429380 = "バレンタインデーのお仕事（２）"
3051470549 = "平和なイベントは、突如として姿を現した「災厄の狐」狐坂ワカモの襲撃によって終わりを迎える……はずだった。しかし居合わせたセナの助力もあり、キリノたちはワカモの制圧に成功。ワカモは連行され、再び楽しいバレンタインデーが始まった。"
4125302622 = "バレンタインは終わっても"
2631208014 = "ワカモは逃走したものの、大きな混乱もなく騒動は鎮圧。バレンタインデーはなんとか平和に終わった。翌日、先生は各々に反省や事後処理をする生徒たちと交流する。その生徒たちの中には「狐坂ワカモ」の姿もあった。"
1047327753 = "ハッピーバレンタイン……？"
410407804 = "バレンタインデーを迎え、救護騎士団は市民にチョコレートを配る事に。和やかな雰囲気が流れていたその時、突如とし爆発が発生。不良は暴れはじめ、周囲は混乱に陥ってしまう。救護騎士団はミネが主軸となって「救護活動」を始める事を決めるのだった。"
3981192346 = "セキュリティ対策"
1150264065 = "チヒロは、ヴァルキューレの矯正局に対してセキュリティの概念を訥々と説明する。そうして新しいセキュリティを組み上げたと告げるも、ワカモはその隙に物理的に扉を破壊し脱獄してしまうのだった。"
2499107451 = "究極の親子丼！？"
1609115689 = "自身の限界を感じてしまった親子丼職人は、新しい味を研究しようと街に出る。しかしこれといった新しい手が見つけられず――そんな時、タイミング良くその場を通りかかっていたスズミに助けを求める事に。スズミのアイデアは職人に新しいインスピレーションを与え、ついに職人渾身の新メニューが誕生したのだった。"
1290044481 = "アメとムチの救護活動"
4077437065 = "ミネの救護活動によりチンピラたちの制圧は完了するも、依然として公安局は出動しない。その理由を聞いたミネが強く抗議する間に、再びワカモは脱走してしまうのだった。"
3224852679 = "こんな世界は間違っている"
2737288181 = "自由な人生を追求していたスケバンは、時代錯誤なスカートに不満を抱えていた。それを聞いたワカモは、スケバンにとある提案をし――そうしてスケバンは全く新しい格好で再び暴れるのだった。"
1674653734 = "ハッピーバレンタイン！"
3425508891 = "ワカモがあちこちで偽物を用意し、騒動を起こす中、ワカモはミネと邂逅を果たす。ミネはワカモに対し、なぜ騒動を起こしたのかと尋ね――その言葉に微笑んだミネは、彼女の応援をすべく、道を譲る。そうして、暴れ続ける問題児に対し「救護活動」を再開するのだった。"
153995850 = "バレンタインデーを迎え、救護騎士団がチョコレートを配る事に。今年は無事ハッピーバレンタインになるのでしょうか……？"
1099429423 = "セキュリティを確実にするため、チヒロはその基本概念から説明をしているようですが……。"
1299607610 = "究極の味を求めた親子丼職人が街に出ました。果たしてその解答を見つけることができるのでしょうか？"
2424829376 = "ワカモの脱獄騒動の真っ最中だというのに、公安局が出動できない理由とは――？"
1073833967 = "もうこんな格好は嫌だ！自身の在り方に悩んでいるスケバンに、ワカモがしたアドバイスとは？"
2783498663 = "遂に邂逅を果たしたミネとワカモ――この騒動は無事に収束するのでしょうか？"
3145939835 = "狐坂ワカモの沈黙と祝宴"
3731216719 = "「七囚人」の一人、「災厄の狐」と呼ばれる狐坂ワカモが姿を現した。\r張り巡らされた警備を嘲笑い、立ちふさがる障害を粉砕し、彼女は街を駆ける。\r仮面の下に、その素顔を隠したまま……。"
3487882084 = "襲撃その一（１）"
2174923451 = "襲撃その一（２）"
1269429059 = "襲撃その二（１）"
37429416 = "襲撃その二（２）"
648736061 = "襲撃その三（１）"
3017487652 = "襲撃その三（２）"
543422608 = "襲撃その四（１）"
1454069515 = "襲撃その四（２）"
3483561865 = "襲撃その五（１）"
1562212096 = "襲撃その五（２）"
3800514801 = "決着（１）"
3387719790 = "決着（２）"
1243671927 = "襲撃その一（１）"
1765541951 = "セナと共にパトロールを再開した先生。死体も負傷者も無しのバレンタインを満喫する二人の下に舞い込んだのは、矯正局へと向かっていたヴァルキューレの車両の爆発。そしてワカモの脱獄を告げる一報だった。"
1900873261 = "襲撃その一（２）"
683219944 = "再びワカモの制圧に成功する先生。通りすがりのヴェリタス副部長のチヒロは、あっさりと装備を奪われたヴァルキューレのセキュリティ体制にあきれ返る。それはともかくワカモは連行され、あらためて楽しいバレンタインデーが始まった。"
840551407 = "襲撃その二（１）"
402624026 = "矯正局へと連行されたワカモはヴァルキューレの生徒によって尋問を受ける。しかしワカモは供述を拒否。数分後、先生の下に舞い込んだのはワカモの脱獄を告げる一報だった。"
3108015082 = "襲撃その二（２）"
280082844 = "再びワカモの制圧に成功する先生。フブキとキリノはより厳重な施設でワカモを拘束することを約束し、去っていく。それはともかくワカモは連行され、気を取り直して楽しいバレンタインデーが始まった。"
54235112 = "襲撃その三（１）"
1970556472 = "再び矯正局へと連行されたワカモ、そんな彼女を待ち受けていたのはヴァルキューレによる過酷な自白の強制（？）。数分後、先生の下に舞い込んだのはワカモの脱獄を告げる一報だった。"
386374787 = "襲撃その三（２）"
2831782328 = "再びワカモの制圧に成功する先生。ヴァルキューレ警察学校は自らの警備体制の問題を自覚しつつ、より進歩していくことを約束。それはともかくワカモは連行され、今度こそ楽しいバレンタインデーが始まった。"
550139806 = "襲撃その四（１）"
1230415696 = "再び矯正局へと連行されたワカモ……と思われたが、既に彼女は尋問を待たずして脱獄を済ませてしまっていた。数分後、先生の下に舞い込んだのはワカモの脱獄を告げる一報だった。"
720305737 = "襲撃その四（２）"
1323540802 = "再びワカモの制圧に成功する先生。フブキたちはワカモの脱獄手段すら掴めない有様だが、それはともかくワカモは連行され、気を取り直して楽しいバレンタインデーが始まった。"
2123615289 = "襲撃その五（１）"
3848127601 = "セナと共に先生はイベントを巡り、地域の住民たちと交流していく。日々紡いできた縁を実感しながら、同時にワカモの目的を想像する先生。数分後、先生の下に舞い込んだのはワカモの脱獄を告げる一報だった。"
1033382974 = "襲撃その五（２）"
1187005141 = "再びワカモの制圧に成功する一同だったが、チヒロは相次ぐ脱獄にあきれ返る。そこで対策として、そこにかつてワカモと対峙した生徒たちが集結。ヴァルキューレのセキュリティ体制が抜本的に見直されることに。それはそうとワカモは連行され、今度という今度は楽しいバレンタインデーが始まった。"
3607426443 = "決着（１）"
347985138 = "完璧なセキュリティ体制の中、ワカモの尋問を開始するフブキたち。しかし彼女たちが目にしたのは、監視カメラへと映る無数の「ワカモ」たちだった。"
1076189635 = "決着（２）"
1975218181 = "罠によってすべての生徒を排除し、D.U.全体を混乱に陥れ、ようやく先生と対面するワカモ。そしてワカモは、先生にチョコレートを渡した。どうやら一目惚れだったらしい。"
2041289632 = "バレンタインの約束"
652737147 = "モモカの挑戦"
1282114892 = "どうやらモモカはいつも明太子味のポテトチップスしか食べない様子。先生の勧めで別な味にも挑戦してみるが、やはり口には合わなかったようだ。バレンタインデーにかこつけて、モモカは食べかけのチョコ味のポテトチップスを先生に押し付けるのだった。"
2041407386 = "発注ミス"
3986078636 = "発注ミスにより、大量のチョコの在庫を抱えてしまったソラ。先生の助けで呼び込みと店頭販売を行い、それらをなんとか売り切ることに成功する。ソラは最後に残った一つを、感謝のしるしとして先生に渡すのだった。"
3858941682 = "行政官のおやつ"
947066316 = "先生の書いた報告書のミスを厳しく指摘するリン。ミスの原因が睡眠不足だと気づくと、彼女はその解消のためにチョコを渡してくれる。今日がバレンタインであることは、渡した後で思い出したようだ。"
4205941856 = "アロナからのバレンタインチョコです！"
1876151316 = "年に一度のバレンタインデーを迎え、アロナは大切な先生のために一生懸命作った、手作りのチョコレートクッキーをプレゼントしてくれる。"
3540623104 = "新作のチョコレートグッズ！"
1167271857 = "バレンタインデーを記念したペロロ様の限定グッズを手に入れようとするヒフミ。カップルでしか購入できないため、偶然通りかかった先生とカップルのふりをすることに。無事に買えたグッズは先生と分け合うのだった。"
407134817 = "狙撃手のチョコレート"
3908488518 = "正義実現委員会の倉庫を整理していたマシロは、非常食用のチョコレートを発見する。そのコンセプトに共感を覚えながら、マシロはチョコを先生へと渡すのだった。"
1648025321 = "最高の疲労回復剤"
4001398665 = "徹夜仕事ばかりの先生を心配するハナエ。先生のために「最高の疲労回復剤」として、超濃縮されたカフェイン飲料を渡してくるが、そんなものを飲んでは逆に体調を崩すのではと、ホットチョコレートにしてもらう先生だった。"
1783916805 = "靴墨とチョコレート"
3015827395 = "風紀委員会を訪れた先生は、イオリが落とした缶を拾う。イオリは「靴墨だけど舐めてみれば」とからかうが、先生が本当に舐めるとさすがにドン引き。落としたのは靴墨ではなくチョコだと判明し、イオリはそのままそれをくれるのだった。"
3747656773 = "チョコレート大食い大会"
3180753048 = "商店街で行われるチョコレート大食い大会に備え、先生とともに特訓を開始するアカリ。アカリが大量のチョコレートをくれたのだが、さすがに食べきることはできなかった。"
1571250681 = "不運な美食家"
2808579933 = "先生の紹介で新しい和菓子店を訪れるジュンコ。チョコレート団子を食べてみようとするも、突如としてヘルメット団が乱入。今日もジュンコの団子は地面に落ちた。"
4245935983 = "ロッカーのラブソング"
172507543 = "好きなバンドの新曲を買ったカヨコは、バレンタインのプレゼントとして店員から骸骨の形をしたチョコレートを渡される。処理に困ったカヨコは、まずそのチョコを先生に手渡すのだった。"
2795715699 = "街での遭難"
716546020 = "乗り換えを間違え、アビドスに向かう途中で遭難してしまった先生。通りかかったシロコに助けられ、低血糖への対策としてチョコレートバーを貰うのだった。"
105274267 = "チョコレートの海"
3213219445 = "先生と海洋博物館を訪れ、記念品を買うホシノ。魚型のチョコレートセットを購入したホシノは、一番気に入ったクジラを先生にプレゼントするのだった。"
4290912609 = "意図してないプレゼント"
3601590273 = "たまたまたくさん売られていたチョコレートに目をつけて、いつもお世話になっているからと先生に渡すアヤネ。しかし今日がバレンタインデーであることを思い出し、慌てて言い訳を始めるのだった。"
2815944483 = "効率主義者のおやつ"
1093584961 = "他の人が買わないような形のチョコを「効率的だから」と買い占めたエイミ。先生にもそのチョコのうちの一つをプレゼントしてくれたが、さすがに困ってしまう先生なのだった。"
2517355120 = "あなたの胃袋を"
2476241868 = "盗聴器がトッピングされたチョコレートを先生に渡すコタマ。先生が食べるのを拒否すると、彼女は実力行使でその口にねじ込もうとし始める。"
3262523879 = "甘い夜勤"
3361121614 = "チヒロが仕事を片付けた頃にはバレンタインデーも終わりを迎えようとしていた。店も閉まった後の深夜、自動販売機で買えるチョコレート飲料をチヒロはくれるのだった。"
2975198628 = "会計の限界"
1238138106 = "先生に渡すチョコの「適切な」値段について思い悩むユウカ。最終的には分割決済により、高いチョコを適切な値段に見せかけるという手段に出るのだった。"
3223164587 = "イベントアイテム"
2932463976 = "先生と一緒にゲームに励むユズ。苦心しながら（？）ボスを倒し、期間限定で手に入るチョコレートのアイテムを先生にプレゼントするのだった。"
3467542474 = "アリスのチョコレート"
662108209 = "バレンタインデーの時期にチョコを摂取すると特別な経験値バフがもらえると聞いたアリスは、現実でもチョコを摂取してレベル上げに励もうとする。そして先生にもレベル上げ用にモンスター型のチョコレートをくれるのだった。"
2032134810 = "特別なエナジードリンク"
2179793648 = "バレンタイン限定で生産された「妖怪MAX」のチョコレート味を、ハレは先生の眠気覚ましとして提供してくれた。限定版は大事だが、先生に渡す分は惜しくないらしい。"
1069251704 = "世の中をもっと甘く！"
2353333921 = "食用のチョコレートスプレーで先生にいたずらをするマキ。これからこのスプレーでグラフィティを描き、街をチョコの香りで満たしにいくようだ。"
3143861320 = "ロマンチックな爆撃"
2670246882 = "着弾地点にチョコレートをまき散らす砲弾を開発したヒビキ。街のどこかに撃ち込む実験を計画していたが、危ないからと引き留めると、その砲弾を先生にプレゼントしてくれた。"
640366726 = "偽モノのネジ"
3523245412 = "シャーレの配線修理にやってきたウタハだったが、持ってきたネジが次々に割れてしまって困惑する。きちんと確かめてみるとそれらはネジの形をしたチョコだった。"
3615648569 = "髭のチョコレート"
1699188027 = "レッドウィンターの特製ミルクチョコレート「チェリョンカ」を自慢するチェリノ。先生にも一つ渡そうとするが生産量の不足から在庫が無く、チェリノは食べかけのチェリョンカをくれるのだった。"
3793419012 = "レッドウィンター連邦学園の特産品"
4255053213 = "レッドウィンターの特製ミルクチョコレート「チェリョンカ」を、トモエは密かに改造していた。チェリノの可愛らしいイラストが書かれたパッケージへと変わった試作品を、トモエは先生にくれるのだった。"
3368181863 = "貧者のチョコレート"
32065340 = "ノドカは先生にチョコレートを渡そうとするが、手に入れられたのはかろうじてカカオの実だけであった。力不足を嘆くノドカの前で、先生は生のカカオの実をかじる。"
1194017029 = "チョコレート味の秘薬"
3059649371 = "サヤが今回開発したのは、大量のチョコレートの成分を濃縮することで作った「不老不死の秘薬」だった。残念ながら今回も失敗で、それは平凡なチョコレートのような味と効果になる結果に。"
4072309002 = "大人のチョコレート"
3055755811 = "おやつとして買ったラムボンボンで酔っ払ってしまったシュン。見かねた先生はボンボンを回収するが、シュンは「先生にチョコレートを自然に渡せた」と満足げなのだった。"
1894276114 = "偽の手錠"
3212670461 = "「自分で自分を拘束してしまっても簡単に壊せるように」とチョコレート製の手錠を購入したキリノ。犯罪者のほうも抜け出せると先生に指摘され、意気消沈しながらそのチョコの手錠を先生にを渡すのだった。"
3227313292 = "1年越しに"
695495392 = "バレンタインデー当日、「ずっと待っていた相手がやってくる」と胸を躍らせるフブキ。ベルを鳴らして入ってきたのは先生と、バレンタインデー限定ドーナッツを手にした配達員だった。"
1177032401 = "多情多感な女の子"
3398993891 = "バレンタインデー当日、先生を呼び出すハナコ。先生へとプレゼントを渡し、恥じらいながら彼女はすぐに立ち去ってしまう。その後、開けたプレゼントの箱に入っていたのは思いがけないチョコだった。"
3016052351 = "小さくても甘い一歩"
4211334058 = "トリニティの生徒たちから感謝を込めて贈られたチョコが山のようになり、困ってしまったハスミ。先生に助けを求めるも、先生は「それはハスミのためのものだから」と断る。ハスミは自分の考えを改め、自分で準備したチョコだけを先生に渡すのだった。"
1196745069 = "それでも伝えたくて"
2486835713 = "先生に手作りのチョコレートを渡すヒナ。自分に似た不格好な出来だと謝るも、大喜びする先生の様子を見て、呆れながらも安堵のため息をつく。"
2153765396 = "とにかく準備したので！"
1349047534 = "風紀委員会の書類仕事をする先生に、アコはご褒美としてチョコレートをくれる。そのチョコが手作りであることが先生にばれると、アコは文句を言いながら感想を求めるのだった。"
2924359616 = "最高のチョコレートを作る方法"
1842651911 = "給食室に忍び込み、最高のチョコレートを作ろうとするイズミ。予想を超えた食材を用いて先生と一緒に料理をし、結果的に美味しい食事にありつくことに成功する。"
337670640 = "心のこもったご褒美を"
1256516418 = "日頃の協力への報酬として、アルは先生に最高級チョコレートを渡す。かなりの高額商品だったが、それは不当な価格表示による詐欺だった。アルは先生と共に復讐へと立ち上がる。"
2584656396 = "ロシアンルーレット・チョコレート！"
1642941794 = "ムツキが持ってきたのは「どれかがものすごく辛い」というロシアンルーレットチョコだった。先生は勝負に挑むも、辛いチョコを食べてしまい撃沈。蓋を開けてみると、「全部辛いチョコにすり替える」というムツキの悪戯に引っ掛かってしまったのだった。"
2303027701 = "特別な日に特別な気持ちを"
2807414059 = "バレンタインによる先生の食生活の乱れを心配して、フウカはお弁当を作ってきてくれた。食後には温かいココアを貰い、そのココアの入ったマグカップはペアのものだった。"
2115727613 = "少女の気持ちは色褪せない"
1271327959 = "バレンタイン当日、ジュリが渡してくれたチョコからは普通の味がした。先生がもしかしてと尋ねると、ジュリは失敗してしまったからと逃げようとする。それでもと先生はジュリと向き合い、彼女の手作りチョコを食べ、そして昏倒した。"
1794739046 = "ふたりっきりの打ち上げ"
4091436927 = "スイーツ店でアルバイトをして過ごしたセリカと先生。バイト代と一緒に特製のケーキをもらったセリカは、先生と二人で打ち上げに赴くのだった。"
3828618989 = "おやつ担当の甘い気持ち"
508038070 = "先生と一緒の買い物を終えた帰り道、ノノミは少しだけ寄り道をして休んでいくことに。ノノミはみんなで食べるために買ったたくさんのチョコレートを取り出し、先生から一つずつ感想を聞いていった。"
1075068622 = "Record it again"
3328710083 = "忙しい中で食事を抜きがちな先生を気遣ったスミレは、チョコ味の栄養食品を渡す。そしてその栄養食品の莫大なカロリーを消費するため、バレンタイン記念特訓が始まるのだった。"
2054798090 = "諦めないゲーマー"
1651777598 = "ゲーム大会で優勝し、チョコレートのトロフィーを先生のプレゼントしようとモモイは計画するも、あえなく一回戦負け。しかしモモイはくじけずに別のゲームで食玩付きのチョコを手に入れ、先生と一緒におもちゃで遊び始めるのだった。"
166046686 = "最初が良いんです、先生"
2953614051 = "朝早くに先生を呼び出し、苦労して作ったチョコレートを渡すミドリ。先生に最初にチョコを渡せた喜びを感じながらも、ミドリは恥ずかしがって逃げていってしまうのだった。"
3576293106 = "あなたのために言葉を一つ"
1344353369 = "陰陽部の部室で、先生と一緒に留守番をするチセ。チセは「四字熟語チョコ煎餅」で欲しい四字熟語が当たるまで黙々と食べ続け、ハズレのチョコは先生へと渡され続けることに。最終的に、彼女が探していたのは……？"
2997161539 = "特別な試食会"
615936915 = "百夜堂の限定スイーツ開発のため、シズコは先生を呼び出して試食をしてもらう。一通り食べた後、たった一人のアンケートでよかったのか質問する先生に、シズコは明るい笑顔で応えるのだった。"
2646709498 = "主殿と忍者の味を"
944329625 = "入手困難な人気商品、特製忍者グッズ49番「チョコレートセット」を手に入れたイズナ。いつかは立派な忍者になることを夢見ながら、先生と忍者の味のチョコを分け合うのだった。"
3304469559 = "甘くて柔らかい夢の中で"
2669528589 = "山積みの仕事に追われ寝不足の先生の下へ、ツバキが訪ねてくる。眠くなるチョコレートとツバキの膝枕のおかげで、先生は久しぶりに安眠することができたのだった。"
2320642113 = "私のすべてをあなたに"
1400229860 = "先生はパトロールを尾行してきたワカモからチョコレートを渡される。チョコ自体は美味しかったが、そこに何が混ざっているかは恐ろしいので考えないことにした。"
4255752625 = "より苦く、より甘く"
2444141989 = "「相手への感謝の思いが甘味に繋がっている」という仮説を立てたハルナは、先生に抹茶チョコレートを食べさせて実験を始める。先生の反応から手ごたえを得たハルナはしかし、最後はすごい勢いでその場から去っていくのだった。"
3729666985 = "スカルマン、変身！"
2511158405 = "スカルマンの形をしたチョコレートを先生に渡すアズサ。食べればスカルマンがなくなってしまう寂しさと、スカルマンを食べた先生が傍にいてくれる嬉しさを同時にアズサは感じるのだった。"
2749513973 = "そんな風に食べないで！"
3453339704 = "コハルはバレンタインのプレゼントとして十字模様のチョコを先生に渡す。しかしチョコを食べる先生の様子が怪しく見えてしまい、いつも通りに赤面しながら罵倒するのだった。"
3264516979 = "いつものように"
