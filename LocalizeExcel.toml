782244883 = "Vol.6 過ぎ去りし刻のオラトリオ編"#"Vol.6 Oratório do Tempo Passado"
1970484281 = "洗脳、裏切り、クーデター……様々な出来事がアリウスを襲い、それでも学園に残り続けた生徒がいました。\nそんな子供たちに、先生は何を伝えられるのでしょうか？"#"Lavagem cerebral, traições, um golpe de estado…… Arius foi assolada por diversos incidentes, mas algumas alunas decidiram ficar.\nO que o Sensei poderá dizer a essas crianças?"

