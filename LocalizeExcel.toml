654538236 = "[Recipe] How to deliciously eat seasonal swimming crabs\n\n1. Wash the crab thoroughly with a brush before steaming.\n2. When steaming, face the belly upward so the meat doesn't fall out.\n3. If frozen, do not thaw and steam on medium heat for 20 minutes + 5 minutes of steaming.\n\nIf you want to check other crab recipes, please follow!"
