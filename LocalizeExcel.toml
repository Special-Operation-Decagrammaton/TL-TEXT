# +++ +++ +++ Mensagens: +++ +++ +++
958604450 = "Olá. Sou ORWELL, administrador do 'Lore Friendly'.\nCriei esta instância para reunir informações sobre lendas urbanas encontradas em várias partes de Kivotos. Fiquem à vontade para compartilhar histórias de fenômenos estranhos e lendas urbanas aqui."

1269488525 = "Não importa quão pequena seja a anomalia. Cada informação reunida pode ser uma grande pista para desvendar a essência do mundo.\nLembre-se: a verdadeira realidade existe dentro da nossa percepção.\n\nVamos juntos transformar este lugar num espaço de busca por conhecimento e verdade."

671759831 = "Ah, legal! Não sabia que isso existia! Curto histórias de terror, mas tava meio enjoada das mesmas de sempre. Quando achar alguma coisa, vou postar!"

2837975137 = "Também curto terror, mas... esse lugar não é meio suspeito? Acabou de abrir e já tem um monte de inscritos. Será que é marketing viral? O ícone do admin é uma TV antiga... Tomara que daqui a um tempo eu não volte e esteja virando página de propaganda..."

4111771375 = "Uma instância de lenda urbana que cresce rápido assim já é material pra outra lenda. Bom, se der ruim, é só criar outra instância. Vou ficar de olho."

338790072 = "Ultimamente não tem aumentado umas placas estranhas? Tinha uma de limite de velocidade com escrito 'aumente a velocidade'... e outro dia vi uma de 'cuidado com animais selvagens' no meio da cidade. Tem bicho, mesmo?"

977601446 = "Acho que vi uma dessas também. Por que 'aumente a velocidade'? Será que é tipo 'corre que é perigoso'?"

375819026 = "Será que isso também conta como Lore...? Aquele personagem Perorodzilla. Lembro dele com uma aparência meio de frango cozido... mas outro dia vi um adesivo e o design era totalmente diferente do que eu lembrava."

1235015986 = "Ei, você tá zoando o Peroro-sama agora? Cadê você? Vamos conversar?"

424362290 = "Tem uma pessoa estranha perto da estação XXXXX... usando uma roupa branca de corpo inteiro fazendo ginástica... com esse calor. Não é perigoso? Ou o calor fritou o cérebro dela, ou o cérebro já era frito antes... fiquei com medo de chegar perto."

3910063889 = "Ah, acho que também vi. É naquele calçadão perto do rio pequeno, né. Primeiro achei que era um saco plástico preso balançando, mas não era. Quando chegava perto, sumia... aí quando percebia, tava lá balançando de novo."

2325372914 = "Tem foto? Dá pra usar o zoom do celular pra ver se é lixo ou pessoa. Sem foto é fácil falar. Se for inventar, inventa melhor."

3582262770 = "Que doideira... minha amiga desmaiou por ali e foi pro hospital. O pessoal em volta também falou a mesma coisa... uma pessoa com uma roupa branca tipo mergulho dançando, e quando ela foi atrás, caiu. Isso é bem sinistro, né?"

3177847880 = "Falando em lenda urbana, vocês sabem daquela história do estado de sítio que a diretora Kaya decretou? Dizem que a munição termobárica que iam usar pra eliminar opositores... era pra ser usada por uma unidade especial da SRT. Mas a SRT já foi fechada, né?"

343714176 = "A Academia Especial SRT tem um monte de boato obscuro. Ouvi dizer que tinha armas secretas que o Conselho Estudantil Geral proibiu. Também ouvi que hoje em dia eles disputam marmita vencida de conveniência..."

3390104466 = "Mas a SRT é realmente tão forte assim? Dizem que capturam criminosos perigosos, mas será que não é só quando o inimigo tá sozinho ou desprevenido? Se fossem tão fortes, capturariam sozinhos, não em equipe, né?"

2082038179 = "Lutar com honra contra criminoso? Hahaha... melhor do que não fazer nada e aumentar o número de vítimas. Difamar a SRT que protege os cidadãos é defender criminoso? Ou você é cúmplice?"

2762509097 = "Caramba, que exaltação. Você é da SRT?"

3323201397 = "Aproveite a melhor carne wagyu num espaço privativo com reserva exclusiva!\nQue tal passar um momento especial com alguém importante enquanto come wagyu?\nFaça sua reserva aqui!"

2054008363 = "Ué? Por que tem anúncio de churrascaria numa instância de Lore? Bug?"

2018231707 = "Ah, é novo no Fru-Link? As postagens de outras instâncias também aparecem aqui. Se não gostar, é só bloquear... mas como a instância é nova e tem pouca coisa, melhor só ignorar."

2576877900 = "A coisa branca que eu falei antes! Apareceu de novo!! Acho que não foi engano... mesmo de longe era tão assustador que não deu coragem de chegar perto. Não conseguia parar de pensar naquela história de alguém que caiu depois de perseguir... Muito assustador. Vou parar de usar esse caminho..."

1966411185 = "Os relatos estão aumentando. Também ouvi falar que alguém do clube de atletismo de Gehenna desmaiou. Isso é verdade?"

2212117541 = "Pelo que ouvi, tem um boato estranho sobre o clube de atletismo de Gehenna. A garota que desmaiou é a melhor do time. Dizem que as outras, com ciúmes, amaldiçoaram ela. É só boato, mas onde há fumaça há fogo... ^^"

2130375924 = "Para de falar besteira. Isso é de mau gosto."

621158106 = "O clube de atletismo de Gehenna está recrutando novos membros para correr junto!\nAlunos de Gehenna que gostam de correr são bem-vindos!\n...E se não são bons em correr, também servem, se já são bons em fugir!\nVamos treinar corpo e mente no clube de atletismo e se libertar do Comitê de Disciplina!\nQuem tiver interesse, manda DM pra @Gehenna_Athletics!"

4254384135 = "Pode entrar na Schale assim, de boa? Vejo umas alunas entrando e saindo, mas é preciso ser convidado pelo Sensei? Ou pode chegar e entrar?"

2198577225 = "Quero comer frango."

2048584069 = "Alguém foi no Mercado Getten hoje? Tinha uma garota muito fofa distribuindo bebida... será que era modelo de algum lugar? Tava ocupado e não falei com ela, mas devia pelo menos ter pego uma bebida~"

3927977111 = "Onde no Mercado Getten? Tô na frente da loja de biscoitos!"

4148671665 = "Perto da barraca que vendia leques!"

856886527 = "Verdade! Ela é muito fofa! Acho que já vi ela em algum lugar... será que é modelo de revista? Tô quase lembrando..."

964535569 = "O tempo em D.U. hoje é ensolarado. Temperatura máxima de 30°C, mínima de 20°C. Cuidado com atividades ao ar livre durante o dia por causa do calor."

2749646398 = "Muito calor... calor demais, tô quase indo de roupa íntima pra escola."

1774042646 = "Não sei se alguém lembra, mas eu postei antes que uma amiga desmaiou depois de ver algo estranho. Hoje o hospital me avisou que ela acordou. Ainda não sabem a causa, mas aparentemente não tem nada de errado com ela. Que alívio... deu até um baque..."

3053562159 = "Igual aqui! Minha amiga também desmaiou naquele calçadão e acordou! Será que foi porque a temperatura baixou? De qualquer forma, que bom!"

2090505947 = "Mas afinal, o que foi aquilo? Realmente não descobriram a causa?"

2642813418 = "Pessoas que passaram por algo parecido acordarem quase ao mesmo tempo... isso é estranho. Incluindo o caso do atletismo, será que alguém tem alguma coisa contra eles?"

566774827 = "Definidos os atletas de Kivotos para o Inter-High de Atletismo! Destaque para a velocista Ito, que se recuperou recentemente de uma longa internação e bateu seu recorde pessoal, garantindo vaga. Torçam pelos atletas!"

1900309917 = "Fui no lugar que todo mundo falou e não vi nada! Queria ver o negócio branco pra saber o que acontece... no fim era tudo mentira!"

3994228846 = "Não é impressão minha, mas desde que a Presidente do Conselho Estudantil Geral voltou, as coisas estranhas aumentaram? Relatos de avistamentos, alunas com experiências assustadoras... e parece que tem mais desaparecimentos também. A Presidente parece estar trabalhando, mas... algo está diferente. Antes não era assim."

3825455165 = "Essa instância é chata. A história do negócio branco que se contorce é só insolação. As postagens de lenda urbana são todas inventadas. Só volto se tiver algo realmente sinistro."

258414054 = "Ouvi de um amigo... se for verdade, é a lenda urbana mais sinistra. A agiota perto do porto usa uma tortura pesada em quem não paga – chamam de 'Caranguejo do Tambor'."

2946576035 = "Dizem que colocam a pessoa num tambor e depois jogam caranguejos... os caranguejos famintos comem a pessoa. Alguns agiotas usam esse método... não é assustador?"

620464260 = "Ah, que medo... como você soube disso? É envolvido? Ou o fantasma te contou?"

3927824555 = "Já ouvi uma história parecida. Tem saído notícia de pessoas com dívidas múltiplas desaparecendo no porto... ultimamente parece que aumentou, não?"

4092725241 = "Acredite se quiser. Depois não diga que não avisei."

2791299244 = "Quem foi que inventou de chamar salsicha de peixe sabor caranguejo de 'petisco de sniper'? Salsicha de peixe é o oposto de hard-boiled. Se fosse um sniper frio e calculista, peixe cru seria muito mais estiloso."

3212941527 = "Mas hard-boiled significa 'bem cozido'... leia-se 'maduro'."

3967235797 = "A história do Caranguejo do Tambor é estranhamente realista. Uma vez eu me cortei com a casca de um caranguejo, mas imaginar isso no corpo inteiro... só de pensar dá arrepio."

2155647036 = "As pinças de caranguejo são duras e difíceis de comer. Dá pra cortar as juntas pra facilitar."

1432595114 = "Verdade. Depois de cozinhar, se colocar em água fria, descasca mais fácil. Mesma lógica do ovo cozido!"

755007697 = "Galera, vocês esqueceram o propósito da instância? É pra falar de Lore... vamos manter o foco?"

3344696113 = "Delivery agora faz propaganda de loja também? Uma entregadora me deu inarizushi de graça e fiquei surpreso. Era gostoso, mas será que isso dá lucro?"

4073972244 = "Ouvi dizer que esse ano a captura de caranguejo tá altíssima. Um parente pescador disse que o preço caiu tanto que nem compensa mais embarcar."

4092617623 = "Ué? No supermercado perto de casa, o caranguejo é caríssimo."

2379175343 = "Tudo isso é manipulação do Conselho Estudantil Geral por trás. Eles controlam o preço pra dificultar o acesso ao caranguejo."

323935886 = "Caranguejo é frágil, morre fácil... e qualquer impacto arranca as patas, perdendo valor. A casca dura parece que não serve pra nada."

2223860917 = "Hoje comi um arroz frito na 'Pescados Akita' no porto de Kanezaki e foi INCRÍVEL! Sempre achei que 'frutos do mar é tudo igual', mas o 'arroz frito com carne de caranguejo' de lá é de outro nível. Tem tanto caranguejo fresco que não fica com gosto de peixe. Todo mundo devia provar pelo menos uma vez. Fui indicado pela entregadora do 'FOX EATS'."

1925481253 = "Depois de ler a história do Caranguejo do Tambor, tô meio sem coragem de comer caranguejo... e até camarão."

486337531 = "Te entendo."

1643990071 = "Alguém já viu essa pelúcia? É a Perorodzilla, uma pelúcia lendária do mundo MomoFriends... queria uma, mesmo que fosse um Lore."

3906071520 = "Não é aquela que dizem que todo o estoque afundou no mar? Tem tanta gente querendo que até vejo uns documentos estranhos nas instâncias de MomoFriends."

4229544793 = "Não foi uma pelúcia, mas vi algo parecido. Durante o plantão noturno, um bicho parecido com um monstro gigante saiu do mar e disparou um laser..."

2485934715 = "Aí já é exagero. Se não viu, fala que não viu."

1654528356 = "Tô apertado de grana, mas nunca mais entro num barco de pesca de caranguejo. Consegui escapar da última, mas passei o dia todo puxando rede sem descanso num barco minúsculo... salário menos que de conveniência. Um inferno. ...Naquela hora, não devia ter bebido aquele MAX de monstro aberto..."

4199579873 = "O 'MAX de monstro aberto' entrega que é bait. Mas que barco de pesca de caranguejo é infernal, parece verdade. Um conhecido meu também embarcou e sumiu."

2564932040 = "Talvez ele só tenha pego o trem errado? A estação central de D.U. é confusa, e tem gente que desce em estação errada."

3127658278 = "Dentro da região da academia até vai, mas em D.U. não tem como pegar o trem errado. O condutor da Highlander te expulsa."

1114191429 = "Lugar pra embarcar em barco de pesca de caranguejo em D.U. é... o porto de Kanezaki? Lá é dominado pela Família Carpaccio. Cuidado, dizem que a história do 'Caranguejo do Tambor' é real..."

4254828625 = "Cuidado com o quê? Eles não são tão perigosos. Na briga de outro dia, tomaram uma surra da Família Panettone."

2854957839 = "Depois que estiver dentro do tambor é tarde."

1897644279 = "【Aviso】Edital de Licitação do Porto de Kanezaki – Contratos Periódicos. A Administração Portuária de Kanezaki anuncia licitação para serviços de segurança e operações. Aguardamos a participação de todas as empresas interessadas. Detalhes no site oficial da Administração Portuária de D.U."

3893385166 = "Quem ganha essa licitação fica com o contrato por vários anos, né? Talvez eu participe..."

1057010976 = "Esquece. Não mexe com o que a Família Carpaccio controla. A menos que queira sumir."

659308929 = "Ontem de madrugada vi um negócio sinistro... uns caras de terno preto rolando tambor pelo porto... isso é o 'tal negócio'?"

474002169 = "Ué, sério? Aquele boato de uma certa família enchendo tambor com caranguejo monstro é verdade? Isso é assustador."

212319164 = "Por que todos os campeonatos de comida são sempre de cachorro-quente e hambúrguer? Com caranguejo cozido eu ganhava fácil."

1623024344 = "Questão de custo, né? Mas um campeonato de comer caranguejo... eu participava."

2319544021 = "Que merda... investi dinheiro de uma organização num fundo de segurança, e os assaltos recentes fizeram tudo despencar... se eu não recuperar até o fim do mês, vou virar comida de caranguejo..."

937886249 = "Por isso eu falei: diversifica. E só investe dinheiro que pode perder. Nunca ouviu isso?"

