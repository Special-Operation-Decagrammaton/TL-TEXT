1685330631 = "Vol.0 Conselho Estudantil Geral"# Título e e sua descrição abaixo:
3839113926 = "Rin, a Administradora-Chefe do Conselho Estudantil Geral\nsegue soterrada de trabalho até hoje.\nSerá que a folga arranjada à força vai ser mesmo um dia de descanso……?"

# +++ +++ +++ Sinopse de inicio dos capítulos: +++ +++ +++
3915905801 = "No Dia de Primavera em que as Amendoeiras Florescem"# Capítulo 1 e sua descrição abaixo:
789937573 = "Em um dia de primavera, sob o desabrochar das amendoeiras\numa pessoa inesperada voltou. Mas retornou……\nde uma forma que você jamais seria capaz de imaginar."

