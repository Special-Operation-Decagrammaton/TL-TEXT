3755033575 = "Vitória Estratégica 1 (Shun)"
3764553248 = "Normal"
3795513745 = "Lobby do Evento Normal 3 (Shun)"
3825311697 = "Com a cara e coragem, o Sensei invadiu a base do Comitê de Resolução de Conflitos das 100 Flores fortemente armado com arminhas de água para brincar com a Nagusa. Valendo o prêmio de devorar uma raspadinha de gelo, o tiroteio terminou com uma vitória esmagadora da Nagusa. Comendo a raspadinha de boa, Nagusa consulta o Sensei sobre os complexos de tentar entender por que todo mundo acha que ela exala uma aura tão radiante de glória."
