1593486785 = "袋のネズミ"
707855630 = "祭りのあと"
1580334319 = "EXPO参観のため、ミレニアム・キャンパスを訪れたトリニティの生徒たち。\nセイアもまた、C&Cの歓迎を受けながらEXPOに参加しようとしていた、が……不審な生徒たちの姿を目撃し、思わずその後を尾けてしまう。"
1485885318 = "怪しい生徒たちを追って地下道に入ったセイア。\nバレずに話を聞くべく接近を試みると、そこで意外な生徒に遭遇する……。"
3524856260 = "リオの隠れ家に向かうセイアとネル。\n状況説明を受け、セイアはEXPOの裏で動く陰謀の存在を知る。客としてセイアの身を保護すると言うネルとリオに対し、セイアは情報提供の見返りに一つの提案をした。"
3055035619 = "セイアという新たな戦力を得たリオは、より積極的な調査へと乗り出す。"
1087244281 = "リオの指示を受け、キャンパスの調査に向かうセイア。\n「不安な場所しかないミレニアム」で手がかりを探すため、生徒たちの集まる教室へ向かうのだった。"
3603561 = "教室で放課後スイーツ部の一行に会ったセイアは「ロボットのペット」の話を聞く。\n不思議な響きに興味が沸いたセイアは、その捜索を手伝うことに。"
3962754328 = "ロボットのペットの正体は「ロボットのワニ」だった。戸惑うセイアに、「ミレニアムでは日常茶飯事」と語るカリンとアスナ。\nロボットのワニがエンジニア部の作品と聞いたセイアは、彼女らのいるラボへと向かった。"
1344822250 = "アバンギャルド君の暴走を制圧した後、現場を訪れたユウカはエンジニア部を問い詰める。\nエンジニア部が無実を訴える中、セイアは壊れたアバンギャルド君の中から怪しいチップを発見するのだった。"
2239397365 = "怪しいチップを渡されたリオは、チップからある<意図>を察した。\n一方、セイアはリオと話す中で、彼女の小さな変化に気づく。"
1398523524 = "データセンターへの潜入を準備するネルに、リオは作戦用USBとセキュリティキーを渡す。"
1813766078 = "データセンターに潜入したネルは、目標地に無事到着するも新たな問題に直面する。\nそんなとき、どこからか聞き覚えのある声が……。"
1717919827 = "データセンターから得た情報で状況を把握したリオ。\n事件は3人が想像していた以上の規模であることが明らかとなり、ついにリオは犯行現場への急襲作戦を立案する。"
2988794607 = "リオはセイアの気持ちを汲み、素早くデータの流れを調査する。\nセイアはそんな彼女の配慮に気づき、その力になるべくゲーム開発部へと足を運ぶのであった。"
58980428 = "ゲーム開発部に到着したセイアは、アリスとユズに会う。\nアリスはセイアを<シーフ王>と呼び、ゲーム開発部の展示ブースへと招待した。"
3905697355 = "ゲーム開発部のブースでは、みんなが一生懸命作ったというゲームが展示されていた。\nだが、それをプレイした者たちはなぜか怒りの感情が沸き起こり、大混乱へと陥ってしまう。"
1699322212 = "ゲームを台無しにしたチップをリオが調べた結果、エンジニア部のとき同様、何者かの工作による事件であることが確認される。\n……それはそれとして、ゲーム本来の難易度やクオリティへの言及は避けるリオであった。"
1906942469 = "現場急襲のため、フィットネスセンターに向かったネル。\n事件はまだ起きていないかと思いきや、ハスミの乗ったランニングマシンが誤作動を起こしてしまう。ネルは犯人らしき生徒を発見し、その後を追った。"
2940778481 = "ネルは不審な生徒たちを追いつめ、制圧に成功する。\nそのとき、黒幕らしき人物から連絡が入り、爆弾が作動。爆発の隙を突かれ、ネルは捕えた生徒たちに逃げられてしまった。"
2077988676 = "犯行現場への急襲作戦失敗を受け、彼らを直接見つけ出すしかないと判断するリオ。\nリオは奥の手として、これまで秘密にしていた「ビッグシスターアルゴリズム」に言及する。"
4128574415 = "「ビッグシスターアルゴリズム」の使用のため、単身データセンターへ向かおうとするリオ。\nセイアとネルは、彼女一人に責任は負わせられないと、作戦への参加を決意する。"
559738736 = "ビッグシスタールームに着いた一行。\nだがその行動は、「ビッグシスターアルゴリズム」強奪を企むミライに読まれていた。リオとセイアが動揺する中、なぜかネルだけがミライの脅しに対しても平然としており……。"
3964034247 = "先生との協力で最大の危機を乗り越えた一行。\nミライとその一味は、悔しがりながらも全員逮捕されるのだった。"
2454044807 = "事件の解決を見届けた途端、EXPOを楽しもうともせずにその場を去ろうとするリオを、セイアとネルは寂しく思う。\nそこでセイアは機転を利かせ、リオに一つの提案をした。"
4226564748 = "リオはEXPO会場の各所にある「危険な展示品」回収のため、作戦を立てる。\n彼女から最先端の装備を受け取ったセイアは、ふたたび潜入任務を開始するのだった。"
3409180479 = "EXPO会場内に、ミライ一味の残党がいることを特定したリオ。\n出品作を盗もうとする一味を、ネルは一網打尽にする。"
3753568740 = "展示ブースに侵入者が確認された。\nここ最近”なぜか”セキュリティが強化されたことへの対策として、リオはネルとセイアに共同で調査に当たるよう依頼する。"
2190721227 = "EXPO会場の警備ドローンが誤作動を起こしたことから、翌朝の観覧客への被害が懸念される事態に。\nリオの考案したドローン制圧作戦実行のために、セイアとネルは会場へと潜入する。"
1147821016 = "「EXPOを楽しんでほしい」……先生の言葉を受け、セイアは会場を見て回ることにする。\nしかし、観覧客としてEXPOを巡る彼女に、想像もしていなかった危機が……！"
2551732620 = "連日連夜の潜入者対策として、セミナーが会場内に罠を張っていた。\n危機に追い込まれたセイアとネルは、力を合わせて脱出を試みる。"
4087116818 = "EXPOの最終日。セイアは皆と挨拶を交わし、和やかな別れの時を過ごす。\nはずだったのだが……取り逃していた「ロボットのペット」の登場により、再び騒動が巻き起こるのだった。"
