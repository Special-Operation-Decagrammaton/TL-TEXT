2708768266 = "Porção de yakisoba de primeira (2)"
1008490560 = "Saori pune os funcionários e pede comida com seu próprio dinheiro. Para Saori, que parece feliz, o Sensei recomenda o yakisoba."
3056220638 = "Torneio de pistola d'água da Gangue do Capacete (1)"
1177447799 = "Saori, chamada pela Gangue do Capacete, acaba participando do torneio de pistola d'água. O Esquadrão a ajuda secretamente, mas……"
1175838457 = "Torneio de pistola d'água da Gangue do Capacete (2)"
3181705269 = "Saori vence inesperadamente e parece não entender a situação. O Esquadrão já havia deixado o local."
1490045110 = "Invasor das trevas"
928632541 = "Por um estratagema de um tal 'Sensei Sorridente', delinquentes atacam o festival. Saori percebe o perigo e age."
1553518686 = "Aparição de 'ela'"
3175733890 = "Os delinquentes, derrotados por Saori, culpam o Sensei. No entanto, o Sensei apenas diz que 'ela' está chegando. Enquanto isso, Saori termina os preparativos finais para o palco do DJ, e o Esquadrão vem assistir ao ponto alto do festival. Quando o show está prestes a começar, de repente, um foguete voa."
3164391228 = "A delinquente lendária"
1953496022 = "Quem aparece é a 'delinquente lendária' Kurihama Akemi, uma das Sete Prisioneiras. Ela quer se vingar da Gangue do Capacete, e Saori a enfrenta."
2986551664 = "Esquadrão Arius, reúnam-se (1)"
359524290 = "Akemi, com uma nova determinação, e os delinquentes que se reúnem em torno dela. Saori fica em apuros, mas o Esquadrão se junta."
865827266 = "Esquadrão Arius, reúnam-se (2)"
295929181 = "Akemi é derrotada. Os delinquentes e Akemi recuam após a persuasão do Sensei Sorridente. Saori, Atsuko, Hiyori e Misaki se alegram com o reencontro."
250762657 = "Ei DJ, toca essa festa"
1864943768 = "Embora a confusão tenha terminado, o DJ fugiu e o show está em risco. O Sensei e o Esquadrão sugerem que Saori tente ser DJ."
2999726945 = "Epílogo"
2853123530 = "No dia seguinte ao festival, Saori e o Esquadrão se despedem e seguem cada um seu caminho."
2091975198 = "Como o Esquadrão aproveita o festival"
3830299729 = "O Esquadrão percorre o local do festival juntos. Nesse momento, Hiyori descobre uma barraca de jogo."
4149548158 = "Como o Esquadrão aproveita um jogo (1)"
1223695595 = "O Esquadrão se une para vencer o jogo."
2977933996 = "Como o Esquadrão aproveita um jogo (2)"
892975307 = "Após vencer o nível básico, o Esquadrão decide tentar o nível intermediário."
3949984222 = "Como o Esquadrão aproveita um jogo (3)"
2151073382 = "Antes da batalha final, o Esquadrão se prepara."
1988410608 = "Como o Esquadrão deixa lembranças"
1165010453 = "O Esquadrão vence todos os níveis. Hiyori escolhe um prêmio inesperado, mas……"
16088410 = "Confusão do Sonho da Lua"
2023890876 = "Um intercâmbio é realizado entre a Escola Secundária de Alto Nível de Shanhaijing e a Federação Escolar Red Winter. Com seus próprios interesses e agendas, Kisaki e Cherino participam do evento. Enquanto isso, alguns alunos se opõem ao intercâmbio por ir contra a tradição……"
2727101073 = "Carta de longe"
4109936625 = "Lavar as mãos, arrumar a aparência"
1567395371 = "As águas correntes se reúnem em um só lugar"
3366728021 = "O tirano separou-se da mulher"
