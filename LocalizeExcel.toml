3483774196 = "アトラ・ハシースの箱舟占領戦開始"
1938729585 = "アトラ・ハシース内部に侵入した先生は、計4つの区域から成るアトラ・ハシース箱舟占領戦を開始するのだった。"
2670665318 = "外郭第1エリア（１）"
4103831752 = "外郭第1エリアの次元エンジンに到達した一行は、「次元エンジン」の前に立つ「無名の守護者」、そしてシロコと対峙するのだった。"
1869140165 = "外郭第1エリア（２）"
718897357 = "外郭第1エリアの次元エンジンを撃破した先生。シロコはポータルに乗って姿を消し、先生は次のエリアに向かって歩を進めるのだった。"
142065983 = "外郭第2エリア（１）"
552979162 = "外郭第2エリアの次元エンジンに到着した先生。再び現れたシロコと交戦を始めるのだった。"
1552548637 = "外郭第2エリア（２）"
1441383735 = "外郭第2エリアの次元エンジンの撃破も無事成功する一同。シロコが姿を消す寸前に、アビドス対策委員会がシロコに声をかけるも、返答が鈍く……。ホシノは、シロコの様子がおかしい事に気づいたようで――？"
3357284552 = "外郭第3エリア（１）"
2935213673 = "外郭第3エリアの次元エンジンで、シロコと向き合った先生とアビドス対策委員会一同。ところが、シロコの信号が他のところからも見つかったと言われ――？一堂は、再び交戦態勢に突入したシロコと戦うことになるのだった。"
1153672197 = "外郭第3エリア（２）"
2270336526 = "外郭第3エリアの次元エンジンが破壊され、シロコは再び姿を消す。中央エリアのハッキングで通信を連結したユウカは、中央エリアでシロコを発見したと告げる。それを聞いた一同は、シロコを救うべく準備を進めるのだった。"
1599539974 = "中央エリア（１）"
233514433 = "最後の次元エンジンと向き合った先生は交戦を始めるのだった。"
2048501130 = "中央エリア（２）"
1622078419 = "ついに、すべての次元エンジンと管制室を破壊することに成功した一同。そして、中央エリアのシロコを救出することにも成功するのだった。"
2774711706 = "プレナパテス決戦"
2260445960 = "「アトラ・ハシースの箱舟占領戦」を終え、無事にシロコと合流することができた先生。あとは地上に戻るだけ――とはいかなかった。そんな先生の前に、別の姿のシロコと色彩の嚮導者が立ちふさがる。\n果たして、無事地上に戻ることはできるのでしょうか？"
1889277103 = "プレナパテス決戦（１）"
