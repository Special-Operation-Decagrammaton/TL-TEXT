2496100826 = "周りを観察し、状況を把握しよう。\n\n……なんだか騒々しい。何があったのか、まずは部員に聞いてみないと。"
318399169 = "困っているフウカに会ってみよう。\n\nバレンタイン、ゲヘナパーティー、給食部に大量に発注された食材……きっとすべての事件の犯人は……！"
3141934736 = "旧校舎で暴れている不良を追い払おう。\n\n問題児が戦略のもと動いているらしい。チナツの言うとおり、ただの騒ぎではなさそうだ。雇い主が誰なのか、手がかりを探そう。"
2569897263 = "ピアノ室の周辺を探索しよう。\n\nゲヘナ学園の裏側にこんな場所があったなんて。時間も空いたことだし、少しだけ周りを見て回ろう……。"
2403732486 = "今日を振り返ろう。\n\nふぅ、慌ただしい1日だった。5日後に開かれるゲヘナパーティー……万魔殿の陰謀……まだ混乱している……。"
2995459567 = "事件現場を調べ、手がかりを探してみよう。\n\n万魔殿議事堂前を突然温泉にするなんて、カスミが理由もなくそんなことをするはずがない。ピアノの練習も大事だけど、今は目の前の問題から解決しよう。"
1627627988 = "生徒に聞き込みをし、情報を収集しよう。\n\nアコの言ったとおり、ゲヘナ生の間で温泉の優先入場券が出回っている。温泉開発部が何かを企んでいるに違いない。"
3086472127 = "陰謀を企てる温泉開発部の後を追おう。\n\nわくわく温泉大作戦……冗談みたいな名前だけど、見過ごすわけにはいかない。もっと情報を集めないと。"
1626969013 = "特別牢に連行されたカスミに会ってみよう。\n\nゲヘナの全生徒に1人1つ温泉をプレゼントするなんて……もはや、反応に困っちゃう。"
3158540525 = "焦らずピアノの練習に集中しよう。\n\n目前まで迫ってきたパーティーと、演奏を楽しみにしている先生のために、落ち着いて少しずつ……。"
3801704183 = "今日を振り返ろう。\n\nピアノの演奏はまだ慣れてないけど、このペースなら何とかやり遂げられそう。"
1957882148 = "委員長室で日課を始めよう。\n\n先生からの気になる連絡に、チナツからの不明瞭な報告……いつもと変わらないゲヘナだけど、少し不安な感じがする。"
1304712371 = "学生食堂を闊歩するパンちゃんを捕まえよう。\n\n動くパンケーキ……チナツに報告を受けたときは何事かと思ったけど、この目で直接見ると理解できる。 ところで、これらの出所は……。"
610392988 = "公園に出没した超巨大パンちゃんを阻止しよう。\n\n美食研究会を捕まえたばかりなのに、今度は巨大なパンケーキの登場か……はぁ……。"
2177230518 = "特別牢に連行されたハルナに会ってみよう。\n\nパーティーの料理を味わうためにフウカを拉致しただなんて……まったく、美食研究会は変わらないわね。"
2187336480 = "楽譜に集中してピアノの練習をしよう。\n\n準備は万全……！残り時間は多くないけど、練習を続けよう。"
1136050044 = "今日を振り返ろう。\n\n今日も1日、なんとか無事に終えることができた……あと4日……あと少し、もう少しだけ、頑張ろう。"
3855672209 = "持ってきた楽譜を整理しよう。\n\nそう、焦らずに、いま私にできることを……先生の連絡と応援はとても嬉しかったけど……何かが気になる。"
3729000631 = "あちこちに設置されたマコト像を回収しよう。\n\n万魔殿だけでも頭が痛いのに、他の問題児まで仲間になって動いている……とりあえず、ここにある銅像から処理するとしよう。"
107297234 = "問題児の隠れ家を探し出し、片付けよう。\n\nはぁ、マコトにどんな話をされたのかは知らないけど、このままずっと暴れるつもりなら、最後まで制圧する。"
1776716070 = "セナが用意した軟膏を探そう。\n\n片づけは終わったけど、少しやりすぎたかも。大怪我をした人がいないといいのだけど……。"
3732203121 = "旋律を感じながらピアノの練習をしよう。\n\n少しだけど、鍵盤が手についた気分。ふふっ、演奏ってこんなに楽しかったんだ。こんな感覚、久しぶり。"
990824040 = "今日を振り返ろう。\n\n今日も1日、波乱万丈だった。短い時間だったけど、明日は練習の成果が出るといいな……。"
2068928161 = "お仕事の後に定期訓練の準備をしよう。\n\nパーティーを控えての対テロ訓練……特に訓練が大変ってわけではないけど……私が、完璧にやらなければ……。"
3900612289 = "定期訓練に参加する部員を招集しよう。\n\nゲヘナ自治区にばら撒かれた怪しいチラシ。万魔殿が何かを企んでいるはず。けど、今はこんなものを気にする暇はない。"
2796525508 = "イオリを手伝って怪しいチラシを回収しよう。\n\n万魔殿のトラブルのせいでイオリが大変そう。委員長の私に、見て見ぬふりはできない。ところで……先生は大丈夫かな……。"
1797291382 = "万魔殿で起こった騒動の真相を調べよう。\n\nとんでもない騒動にイブキが巻き込まれてしまった様子。でも大きな怪我がなくてよかった。一応、経緯くらいは調べておくとしよう。"
4023772365 = "招集した部員たちと定期訓練に参加しよう。\n\nすべての部員が揃い、訓練準備は終わった。定期的な訓練ではあるけど、疎かにしてはならない。"
1542042713 = "もう一度定期訓練に参加しよう。\n\nいつもだったらマコトの要求に反論したけど、今は意味のない口論で時間を無駄にしたくない。"
2778212802 = "心を落ち着かせてピアノの練習をしよう。\n\n追加訓練で練習時間がほとんど無くなってしまったけど、動揺は禁物。できる、私はできる。"
2808151776 = "今日を振り返ろう。\n\n明日はパーティー当日。指先が震えるのはいつものこと。でも、このままでは……。"
556520415 = "アコに演奏についての本音を伝えよう。\n\n今日だけは、私の最善を演奏に注ぎたい。少しだけ、ほんのちょっとだけなら、ワガママを言ってもいいよね……？"
424240925 = "万全を期してピアノの練習をしよう。\n\n緊張したせいか、手がついてきてくれない……ステージの上でだけはミスしたくない。完璧な演奏のために、鍵盤に集中するんだ。"
1211557641 = "ゲヘナで起こるすべての混乱を治めよう。\n\n私にできるピアノの練習が終わった。本番がはじまる前に、ゲヘナの問題児を素早く片づけよう。"
2047835697 = "パーティーステージでピアノを弾こう。\n\n私を助けてくれた風紀委員会のみんなと学園の友達……そして先生のために……そう、素敵な演奏でお返しをしよう。"
1233708660 = "散らかった部屋を片付けよう。\n\n先生にもらったこのおもちゃ、今はかけがえのない大切な宝物。"
3329307650 = "周りを意識せずに前に進もう。\n\nゲヘナでは理解しがたいことがたまに起こる……私は疲れているのか？"
3107481871 = "いたずら電話をする生徒を叱ろう。\n\n私ではない、他の仲間の業務を妨害する者は、しっかり取り締まっておく必要がある。"
3306064596 = "消えた本を一冊探そう。\n\n私は神経質なのかな……？本棚の一箇所が空いていると、ちょっと気になってしまう……。"
2012136030 = "脱獄事件の現場を調べよう。\n\n温泉開発部の部長、カスミ……油断ならない人。今度捕まったら、風紀委員会の恐ろしさを思い知らせてやるんだから。"
2319967817 = "ピアノ室に隠された古い日誌を探そう。\n\nここで大切な夢を育てていた、名前の知らないあなた。大丈夫、あなたの努力は無駄じゃない。こうして、私が覚えているのだから。"
9172985 = "騒ぎがあった学生食堂を調べよう。\n\n一体どんな料理を食べたら、全員が気を失うんだろう？訳が分からない。"
2934280817 = "学生食堂を訪ねてきた野良猫の痕跡を探そう！\n\n料理の匂いでここまで来たんだね。どうか、優しい飼い主に出会えますように。"
2003080857 = "ベッドに横になった負傷者を介護しよう。\n\nみんなの反応を見ると、癒しの手に治療の効果はすごいみたい。今度先生にも……わ、私はいま何を！"
3684066488 = "救急医学部室に入った虫を探そう！\n\nみんな虫一匹で騒ぎすぎ……理解できない。変わっているのは私のほう？"
2904112170 = "もう一度パンちゃんを捕まえよう。\n\nジュリが作った料理は一体……いや、深く考えるのはやめよう。今は目の前のものに集中しなければ。"
487185434 = "消えたプリンを探して荷物の山を捜索しよう。\n\nマコトの要求なんて聞きたくないけど、本当に校内で犯罪が起きたのなら、風紀委員会として傍観するわけにはいかないから。"
4196165701 = "エリカを手伝って散らかった教室を掃除しよう。\n\n困っている生徒を助けるのも、風紀委員会の仕事。教室の掃除は難しくないから、少し手伝っていこう。"
552395824 = "教室内の落書きとポスターを整理しよう！\n\nマコトを中傷する落書きとポスター。自業自得だと思うけど、他の生徒の授業日程に支障をきたすのなら、どうにかしないと。"
3034885123 = "鬼になって、隠れた生徒たちを探そう。\n\nかくれんぼかぁ……昔やった記憶がある。私が鬼になると、あまりにも早く見つかるものだから、みんな困っていたな……。"
690950655 = "ジュンコが失くした食券を探そう！\n\n美食研究会……どうしようもないトラブルメーカーだけど、食べ物と仲間への気持ちは、本気なんだね。"
