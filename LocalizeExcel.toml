2842532800 = "The Pipe Organ alternates between skills that apply debuffs and skills that remove them.\nAim at Gregorius when the debuff-applying skill activates,\nand aim at your allies when the debuff-removing skill activates.\n\nAttack the Pipe Organ with an EX Skill to reduce its HP to 0 and change its orientation."
