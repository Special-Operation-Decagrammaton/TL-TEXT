#[ +++ ][Resumos dos episódios e seus títulos:]
#[ --- ][Capítulo 1:]
108666912 = "Prólogo"
3860334718 = "Seia fala sobre o \"Tratado do Éden\", as \"sete regras antigas\" e o \"paraíso\". Ao Sensei, ela dirige palavras que carregam algo de inquietante."
3383571419 = "Clube de Aulas de Reforço"
1483887365 = "Na sala estão reunidos o Sensei, Hifumi, Hanako, Azusa e Koharu. Enquanto observa a Hifumi acalmando a Koharu, que faz alvoroço dizendo que, daquele jeito, todas serão expulsas, o Sensei relembra o que deu início a tudo, algumas semanas atrás."
4127233795 = "Tea Party"
2556827456 = "Convidado por Nagisa e Mika, as presidentes do conselho estudantil de Trinity, o Sensei comparece ao Tea Party. Pedem-lhe que seja o professor responsável pelo \"Clube de Aulas de Reforço\", que reúne alunas à beira da reprovação, e ele aceita. Na lista do clube havia um nome conhecido e, desconfiado, o Sensei segue à sala — onde reencontra a presidente do clube, Hifumi."
2736401965 = "Os Alunos do Clube de Aulas de Reforço (1)"
2320947204 = "Junto com a Hifumi, o Sensei decide ir conhecer os demais membros do Clube de Aulas de Reforço. Os dois encontram \"Hanako\", mantida presa pelo Comitê de Realização da Justiça, e \"Azusa\", capturada ao fim de um combate contra o próprio comitê."
4288766681 = "Os Alunos do Clube de Aulas de Reforço (2)"
1080677386 = "O Sensei tenta receber a guarda de Hanako e Azusa, mas enfrenta a resistência da Koharu, do Comitê de Realização da Justiça. Convencida pela veterana Hasumi, a Koharu zomba: \"Clube de Aulas de Reforço, que vergonha\" — até se descobrir que ela também é membro. Carregando o estrago das próprias palavras, a Koharu completa, enfim, o quadro do clube."
1381682562 = "Vamos nos Apresentar!"
3807799700 = "O Clube de Aulas de Reforço, enfim reunido. Apresentada a regra de que basta todas passarem \"ao mesmo tempo\" em uma das três provas, umas breves apresentações deixam entrever as circunstâncias de cada uma. No clima de \"vamos superar juntas\", a Koharu, cheia de confiança, declara: \"eu sou uma elite! Saio logo, logo de um lugar desses!\"."
3720628732 = "Estudo para a Prova"
968959922 = "Aprendendo com o Sensei e ensinando umas às outras, as alunas se preparam pro 1º exame. A vontade de aprender da Azusa é alta, a Hanako se mostra erudita, e a Koharu está (segundo ela mesma) tranquila. Em meio ao bom clima, escapa da boca da Hifumi um fato até então secreto: \"se houver reprovada no 1º exame, acampamento obrigatório\"."
42497510 = "1º Exame Especial de Aptidão"
2338283664 = "Com a prova em curso, a Hifumi se alivia ao ver que o conteúdo estudado caiu tal e qual, e que a dificuldade é bem baixa. Mas, na abertura dos resultados, todas, exceto a Hifumi, reprovam. Fica decidido o acampamento do Clube de Aulas de Reforço."
604324422 = "Sombras que Tremeluzem sob a Superfície"
3378221237 = "O Sensei pergunta à Nagisa o que acontece se as alunas do clube não passarem nas três provas. Nesse caso, claro, \"todas expulsas\" — e, aliás, o clube foi criado desde o início justamente pra expulsar alunas, revela a Nagisa. O \"traidor\" que tenta impedir a assinatura do Tratado do Éden deve estar dentro do clube. A Nagisa pede ao Sensei que o encontre, mas……"
3020153020 = "O Acampamento Começa!"
2563693133 = "Pra realizar o acampamento, o pessoal do Clube de Aulas de Reforço visita o anexo de Trinity. Na correria desde a chegada, seja como for, decide-se começar pela limpeza."
660461531 = "Faxina Geral!"
198950639 = "Terminada a faxina geral, a Hanako propõe limpar a piscina e brincar na água. Antes de começar o estudo pra valer, cada uma troca de roupa e, todas encharcadas, começam juntas a limpeza da piscina."
4233186689 = "A Noite do Primeiro Dia de Acampamento"
2960849454 = "Na primeira noite, a Hifumi visita o Sensei. Ao ouvir o conteúdo da conversa dela com a Nagisa, o Sensei diz: \"esse assunto, deixa comigo\". Quase no mesmo horário, a Azusa, que fazia vigília, e a Hanako acabam se encontrando……"
3382766713 = "O Simulado do Clube de Aulas de Reforço"
848842177 = "Decidida a fazer o que está ao seu alcance, a Hifumi prepara um simulado — mas o resultado é derrota total, exceto por ela mesma. Ainda assim, ela traça as próximas medidas e declara: quem tirar boa nota ganha de presente um produto do MomoFriends. Hanako e Koharu reagem mornas; os olhos da Azusa, porém, começam a brilhar……?"
3534072072 = "A Vice-Presidente do Comitê de Realização da Justiça (1)"
17674601 = "No meio do estudo livre, descobrem que a Koharu carregava na mochila um livro picante. Mas era um item apreendido durante as atividades do Comitê de Realização da Justiça, levado por engano. Melhor devolver antes que vire escândalo — e, assim, Koharu e Sensei seguem à sala do Comitê de Realização da Justiça."
3592313078 = "A Vice-Presidente do Comitê de Realização da Justiça (2)"
2059845093 = "À Koharu, que se explica atrapalhada, o Sensei diz que \"não precisa se prender à força\". Tocada, a Koharu confessa ao Sensei que, na verdade, é uma espiã. Depois, com o item devolvido em segurança, os dois topam com a Hasumi, que puxa a Koharu para uma conversa em segredo……?"
773890837 = "Uma Pequena Fresta"
1756837627 = "No meio de uma conversa entre Hanako e Koharu, a Azusa menciona as \"sete regras antigas\" — e a Hanako demonstra enorme surpresa.\rNaquela noite, a Hifumi visita o Sensei e conta um fato que descobriu enquanto preparava o simulado: a Hanako é, sem dúvida, uma gênia, e só se pode concluir que ela reprova nas provas de propósito. Na manhã seguinte a essa confusão, a Mika aparece diante do Sensei……"
135674395 = "O Traidor de Trinity"
892831890 = "Tocando na conversa que houve com a Nagisa, a Mika propõe um acordo ao Sensei e diz que vai lhe revelar o \"traidor de Trinity\". O nome: \"Azusa Shirasu\". E a Mika emenda o pedido: que o Sensei a proteja."

#[ --- ][Capítulo 2:]
3021188189 = "O Monstro Colossal"
3984423781 = "A Nagisa talvez esteja mirando algo através do Tratado do Éden, diz a Mika. Falando dos próprios objetivos e pedindo que a Azusa seja protegida, a Mika conclui: acreditar na Nagisa ou acreditar nela — a decisão final é do Sensei."
1502378419 = "Sisterhood"
1398806955 = "Um dia, a Marie, da Sisterhood, visita o acampamento do Clube de Aulas de Reforço. Pelo visto, veio transmitir a gratidão de uma aluna que a Azusa salvou tempos atrás. Naquela noite, a Hifumi visita o Sensei pra conversar sobre o futuro…… ou pelo menos era o que parecia……?"
3715954097 = "Encontro Secreto na Madrugada"
1999585029 = "Preocupada com a Azusa, a Hanako visitou o Sensei. No rumo da conversa, ela também fica sabendo do \"reprovou três vezes, todas expulsas\" — e, dali, deduz sozinha as circunstâncias por trás. Ciente de tudo, declara que vai se esforçar nas próximas provas pra ao menos não atrapalhar, enquanto parece se divertir com a situação de \"encontro secreto na madrugada\". Mas, no instante em que sai do quarto do Sensei com a Hifumi, é flagrada pela Koharu, que ia ao banheiro……?"
3916469784 = "Festa de Maiô"
3001743394 = "Com a chuva repentina, toda a roupa lavada se molha e, sem nada pra vestir, o pessoal do clube decide abrir uma festa de maiô em vez de festa do pijama. Mais próximas do que nunca, elas conversam sobre tudo e passam um tempo divertido, bem típico de estudantes. E, no embalo, como a grande graça de um acampamento, decidem escapulir do alojamento pra um passeio noturno."
1861044050 = "A Grande Confusão da Meia-Noite (1)"
3288144026 = "No passeio noturno, ao entrar por acaso numa doceria, o pessoal do clube encontra a vice-presidente do Comitê de Realização da Justiça, Hasumi. Ela propõe: \"vamos, de parte a parte, fingir que não vimos nada\" — e, justo quando elogiava o esforço da Koharu, chega a informação de que o \"Clube de Pesquisa Gastronômica\" está causando."
391890716 = "A Grande Confusão da Meia-Noite (2)"
749962361 = "Julgando que, às vésperas do Tratado do Éden, não seria bom parecer um choque frontal entre Gehenna e Trinity, a Hasumi decide pedir ajuda ao Clube de Aulas de Reforço e à Schale. Com a Koharu enchendo o peito por lutar lado a lado com a veterana, todas partem pra conter a situação."
2432925314 = "A Grande Confusão da Meia-Noite (2)"
4237665195 = "Com a atuação do Sensei e do Clube de Aulas de Reforço, a situação é contornada com sucesso. As integrantes fugitivas do Clube de Pesquisa Gastronômica também acabam alcançadas pelo Comitê de Realização da Justiça, e tudo termina sem maiores danos."
781465669 = "Um Novo Ponto de Vista"
1190877624 = "Quem aparece pra receber a guarda do Clube de Pesquisa Gastronômica são a Hina, do Comitê Disciplinar, e a Sena, do Departamento de Medicina de Emergência. Após cumprimentar a Sena, que via pela primeira vez, o Sensei pergunta à Hina a sua opinião sobre o Tratado do Éden."
3667360070 = "A Esperança que se Insinua"
3554655960 = "Repetindo os estudos, o pessoal do clube consegue, enfim, ainda que num simulado, nota de aprovação pra todas. Na comemoração, a Hifumi, empolgada, abre a cerimônia de entrega dos produtos MomoFriends. Hanako e Koharu declinam, mas a Azusa fica visivelmente exaltada. Abraçada ao produto que a Hifumi escolheu por ela, a Azusa diz, feliz, que vai guardar pra vida toda aquela prova de esforço — e primeiro presente de uma amiga. E então, às vésperas do 2º Exame Especial de Aptidão, o Sensei é chamado pela Nagisa……"
3715486889 = "A Mão Negra"
1616621734 = "Mais uma vez, o Sensei diz à Nagisa que não pretende gastar tempo desconfiando de ninguém. Ouvindo-a, ele afirma: \"você, com certeza, está na escuridão da paranoia\" — e declara que vai tirá-la de lá, sem falta, e fazer todas do Clube de Aulas de Reforço passarem."
194293672 = "2º Exame Especial de Aptidão (1)"
2202623311 = "Na véspera do 2º Exame Especial de Aptidão, o clube se vê perdido diante da mudança repentina de matéria, nota de corte e local de prova. Ainda assim, acolhendo as palavras da Azusa — só resta lutar até o fim —, todas seguem rumo ao local da prova: o distrito autônomo de Gehenna."
1942601069 = "2º Exame Especial de Aptidão (1)"
1391275365 = "No caminho pro distrito autônomo de Gehenna, delinquentes bloqueiam a passagem, mas o pessoal do clube, com esforço, rompe à força e segue em frente."
644321687 = "2º Exame Especial de Aptidão (2)"
3226156325 = "Já dentro do distrito autônomo de Gehenna, o caminho do clube é bloqueado pelo Comitê Disciplinar. Pela aparência da Koharu, julgam tratar-se de um ataque do Comitê de Realização da Justiça e, por pouco, não vira combate — quando as integrantes do Clube de Pesquisa Gastronômica as salvam. Atravessando explosões e tiros, todas chegam, enfim, ao local da prova. Mas a sabotagem da Nagisa não termina aí……!?"
4130588728 = "De Volta ao Ponto de Partida"
1896656556 = "Diante da sabotagem no 2º Exame Especial de Aptidão, o pessoal do clube sente na pele que o Tea Party quer expulsá-las pra valer. O Sensei também tenta contato com a Nagisa e a Mika, sem sucesso, e nenhuma saída aparece. Naquela noite, a Hanako segue, na surdina, a Azusa, que saíra sozinha do quarto……"
2549930740 = "Ainda Assim"
2270700848 = "Mesmo encurraladas, as alunas do clube seguem se esforçando sem desistir. Rumo à última prova, estudam com afinco pra superar, juntas, aquele obstáculo absurdo. E, na noite anterior ao exame final, a Azusa se encontra em segredo com uma garota chamada \"Saori\" — cena que a Hanako observa das sombras."
1916659997 = "Confissão"
4166289180 = "Enquanto Hifumi, Hanako e Koharu, sem sono, conversavam no quarto do Sensei sobre a nova sabotagem, a Azusa retorna de algum lugar e declara: o \"traidor de Trinity\" sou eu. O Sensei, porém, nega essa conclusão — e a Hanako, que parecia prestes a acusá-la, evoca a história de um certo \"alguém\" e demonstra empatia. Ninguém quer desistir de nada; e, para isso, todas entram em ação com base no plano da Hanako."
742150805 = "A Batalha Tem Início"
1216430353 = "Antecipando-se à Arius, Azusa e Hanako conseguem levar a Nagisa. Usando as armadilhas que preparou por todo esse tempo, a Azusa mergulha no combate contra a Arius."
492008709 = "Batalha Feroz"
3128498563 = "Com o número bem reduzido, a Arius ainda assim encurrala Azusa e Hanako. Mas essa situação era, ela própria, a armadilha montada pelo Clube de Aulas de Reforço. Sensei, Hifumi e Koharu se juntam, e a batalha começa num terreno sem saída."
707844123 = "Também um Mundo Assim (1)"
4054359883 = "O clube consegue, com esforço, pôr as alunas de Arius fora de combate; mas o reforço chega mais rápido que o previsto e, por algum motivo, o Comitê de Realização da Justiça não se move. No instante em que a Hanako estranha, surge a Mika, do Tea Party. Ela declara ser \"a verdadeira traidora de Trinity\", expõe o próprio plano e ordena à Arius: deem um jeito no Clube de Aulas de Reforço."
28576329 = "Também um Mundo Assim (1)"
2791097982 = "O combate segue, mas, vendo que ninguém do grupo cai tão fácil, a Mika se impressiona: será esta a força dos \"adultos\", da \"Schale\"? No meio disso, ela traz à tona o assunto da Seia — e, no instante em que a Azusa vacila, entra em cena a \"Sisterhood\", que jamais deveria se mover."
3198842828 = "Também um Mundo Assim (2)"
141133620 = "Pela artimanha da Hanako, a Sisterhood — que, por princípio, jamais interferiria — entra em movimento. Sakurako Utazumi declara que, ainda que contra os costumes, elas intervirão, e começa o combate contra a Mika."
2850369990 = "Também um Mundo Assim (2)"
3969728237 = "Derrotada diante do Clube de Aulas de Reforço, da Schale e da Sisterhood, a Mika deixa escapar um suspiro de alívio ante o novo fato que a Hanako lhe conta, admite a derrota e se rende. Na despedida do Sensei, ela confessa: aquelas palavras daquela hora a deixaram feliz de verdade — e pensa no mundo que talvez pudesse ter existido. Com um sorriso indecifrável no rosto, a Mika se despede do Sensei."
1709755666 = "3º Exame Especial de Aptidão"
1682079203 = "Superando incontáveis imprevistos e correndo até o fim, o pessoal do clube chega, enfim, ao local da última prova. Todo o esforço acumulado dá, direitinho, o seu fruto: todas passam juntas no exame."
3889889279 = "Epílogo"
1853472011 = "A Seia reconhece o esforço de todos até aqui, mas avisa ao Sensei: ainda não acabou. E, então, o Squad de Arius enfim começa a se mover……"

#[ --- ][Capítulo 3:]
1023493496 = "Post-Mortem (1)"
2817792322 = "A Seia fala, serena, com quem veio atacá-la. No instante em que ela pergunta sobre o que vem adiante, o Sensei desperta. Depois, ele ouve da Sakurako o desenrolar completo do caso do ataque à Seia……"
2940097782 = "Post-Mortem (2)"
3560240457 = "A Sakurako, da Sisterhood, reconhece o resultado da Azusa e, sob a garantia da irmandade, ela se torna oficialmente aluna de Trinity. Aliviados, Hanako e Sensei veem a conversa se voltar, então, ao caso de Nagisa e Mika."
3451183696 = "Post-Mortem (3)"
1609767318 = "Depois da Nagisa, também a Hanako visita a Mika na prisão. Diante dela, a Hanako verbaliza as suas suposições sobre os motivos da amiga, mas……"
3155433875 = "E Então"
1648638504 = "Ainda que os problemas se acumulem, Trinity vive dias calmos e pacíficos. Nesse meio-tempo, o Sensei visita Gehenna, onde encontra Makoto, Hina e as demais……?"
4236130409 = "A Cerimônia de Assinatura do Tratado do Éden (1)"
1627449016 = "Enfim, o dia da assinatura do Tratado do Éden. Enquanto a Shinon, da Chronos, transmite tudo num clima de festa, o pessoal do Clube de Aulas de Reforço abre uma festinha numa lanchonete pra celebrar a aprovação."
1969944314 = "A Cerimônia de Assinatura do Tratado do Éden (2)"
646905301 = "Guiado pela Hinata, da Sisterhood, o Sensei põe os pés na \"Antiga Catedral da Comunhão\" e ouve histórias sobre o passado de Trinity. No mesmo instante, o Squad de Arius inicia a operação. No céu de Trinity, um míssil desenha a sua trajetória――"
1269971397 = "O Dia Tingido de Fogo e Cinzas (1)"
774689524 = "Com o bombardeio do míssil, a região inteira mergulha no caos. Aproveitando a brecha, o Squad de Arius se infiltra rumo ao subsolo da catedral antiga. Diante da situação repentina, Tsurugi e Hasumi, do Comitê de Realização da Justiça, e a Hinata respondem ao ataque."
4175188383 = "O Dia Tingido de Fogo e Cinzas (1)"
1651414121 = "Em pleno combate, Tsurugi, Hasumi e as demais sentem algo de estranho no adversário. Ao ver aquela figura, a Hinata afirma: aquilo é o \"Conselho dos Santos de Justina\"."
499449077 = "O Dia Tingido de Fogo e Cinzas (2)"
2565238774 = "A Hinata, da Sisterhood, Tsurugi e Hasumi, do Comitê de Realização da Justiça, e a Hina, do Comitê Disciplinar de Gehenna. Protegendo o Sensei, todas seguem lutando contra o Conselho dos Santos de Justina."
878733393 = "A Constatação do Ódio"
361954059 = "Hina e Sensei partem, enviados pela Hasumi e pelas demais; mas, em meio ao mar de inimigos, até a Hiyori, do Squad de Arius, entra na luta, e o combate se arrasta."
288823100 = "A Constatação do Ódio"
3006327975 = "Anunciando que a Arius assinou o Tratado do Éden, a Saori fala do ódio acumulado por séculos e aponta a arma pro Sensei. Ele acaba atingido, mas escapa por pouco pelas mãos da Hina, do Comitê Disciplinar, e da Sena, do Departamento de Medicina de Emergência. Desacordado, o Sensei encontra a Seia dentro do sonho……"
3724307009 = "A Doce Mentira"
272157938 = "No sonho, o Sensei reencontra a Seia. Da boca dela fluem as histórias sobre o Tratado do Éden e a Gematria. Enquanto isso, a Azusa, que mergulhara no combate contra a Arius, não consegue enfrentá-la de frente e, com muito custo, escapa dali."
1624201610 = "O Caos que Acelera (1)"
2195551207 = "A Hanako vai conter, no lugar da Sakurako, o pânico da Sisterhood, e a Koharu, atrapalhada, é convocada às pressas pelo Comitê de Realização da Justiça. Separadas, as alunas do clube começam, cada uma em seu posto, a fazer o que lhes cabe. Quase à mesma hora, a ambulância de Gehenna que carrega o Sensei ferido chega a Trinity……?"
1377799660 = "O Caos que Acelera (2)"
3800416342 = "A análise revela: o míssil disparado contra a catedral antiga não partiu de Gehenna, e sim de dentro de Trinity. Ao ver as imagens do \"Conselho dos Santos de Justina\", a Hanako compreende que, no pior dos casos, Trinity e Gehenna podem desaparecer de Kivotos."
3662530531 = "O Outro Lado Inalcançável"
3512207568 = "A Hifumi enfim chega até a Azusa — que a rejeita: daqui pra frente você não pode vir. Todos se feriram por minha culpa; agora eu vou destruir a aureola da Saori e me tornar uma assassina…… Com o olhar carregado de decisão, a Azusa deixa palavras de gratidão à Hifumi e desaparece. A Hifumi tenta segurá-la, mas a sua voz não a alcança……"
2485053728 = "Dentro da Escuridão"
1374661261 = "De posse da \"arma tática\", o Squad de Arius tentava iniciar, junto ao Justina, o avanço sobre Trinity — mas é atormentado pelas armadilhas que a Azusa deixara sem que percebessem. Ainda assim encurralada pela Saori, a Azusa consegue se desvencilhar dali usando \"uma certa bomba\". Mas, por ter usado a prova de amizade da Hifumi como ferramenta de ataque, ainda que pra abrir caminho, a Azusa, consumida pela culpa, soluça: nunca mais poderá voltar pra junto delas."
3252357257 = "A Resposta à Quinta Regra Antiga"
1561913819 = "A Seia diz ao Sensei que, por mais que se acredite, por mais que se lute, este é o ponto final. Mas o Sensei deixa o lugar: pelo \"que vem adiante\", pelos alunos, ainda há o que fazer."
3162520452 = "Alguns Fragmentos"
3183955174 = "A Saori parecia ter recebido em cheio a bomba da Azusa — mas era a Atsuko quem, num impulso, a protegera com o corpo. A presidente Hina desaparecida, a Hanako prestes a ser presa, e a Mika sendo libertada da jaula. É então que o Sensei, enfim, desperta――"
3179867525 = "A Verdadeira Face do Ódio"
2955441922 = "Recusando com frieza as exigências dos belicistas sob o Tea Party, a Mika seguia apanhando sem resistir — quando a Koharu corre em seu socorro. Mesmo ameaçada, a Koharu recusa, firme. Nesse clima de estopim, o Sensei também chega. E a Mika, atrapalhando-se com as próprias palavras, vai, aos poucos, deixando-as sair."
3510190250 = "Sem Hesitar"
3395723629 = "Uma a uma, o Sensei visita as alunas que começam a despertar. Koharu, Hifumi e Hanako enfim se reúnem, e todas partem rumo à ruína da catedral antiga, atrás da Azusa."
9241096 = "A Nossa História"
1769802021 = "O Sensei visita a Hina. Esgotada por tudo o que houve, ela enfim deixa escapar um pouco do que carrega por dentro — e, podendo, pela primeira vez, se apoiar em alguém, começa, devagar, a se reerguer. A Hifumi, por sua vez, volta a ficar diante da Azusa e revela a sua \"verdadeira identidade\": a líder do Bando dos Maiôs Mascarados — logo, não existe essa história de vivermos em mundos diferentes. Junto com a declaração altiva da Hifumi, o Tratado do Éden é torcido, e nasce uma segunda Organização do Tratado do Éden."
4250678679 = "O Nome do Paraíso É (1)"
1990540744 = "O Comitê Disciplinar de Gehenna, o Comitê de Realização da Justiça de Trinity e, somando-se a eles, Abydos: todos avançam pra enfrentar o Squad de Arius."
4084884875 = "O Nome do Paraíso É (2)"
872832779 = "Rostos nostálgicos se reencontram, e as forças das academias vão se somando, uma após a outra……"
275424097 = "O Nome do Paraíso É (2)"
3278894928 = "Observando o embate entre as duas ETO, a Seia admite, serena: a derrota é minha."
3228962781 = "O Nome do Paraíso É (3)"
3156389352 = "O preceito vai, aos poucos, perdendo o sentido, e a maré vira contra o Squad de Arius. Enquanto as integrantes começam a desistir, a Saori, ainda assim, não abre mão da própria convicção."
3992775096 = "No Subsolo da Catedral Antiga"
4215258149 = "A Saori ruma ao subsolo da catedral antiga. Pra pôr um fim em tudo, Azusa e Sensei seguem no seu encalço."
3039086335 = "O Ódio de Quem"
1305007844 = "Diante da Saori caída, surge a Atsuko, que quebra o silêncio: \"vamos parar\". Com todos em frangalhos, e para fazer frente ao Maestro que ali aparece, o Sensei saca a \"Carta de Adulto\"."
696231722 = "O Ódio de Quem"
859196225 = "Terminado o combate, o Squad de Arius desaparece pra algum lugar, sumindo, assim, dentro da escuridão."
1057886975 = "Epílogo"
3548500175 = "O Pandemonium desperta, o Tea Party volta a se reunir, e com eles o pessoal do Clube de Aulas de Reforço. Mesmo com o que se perdeu pelo caminho, o cotidiano vai, aos poucos, recuperando as suas cores. Nos bastidores, porém, uma existência misteriosa começa a se mover, de olho no Squad de Arius……?"

#[ --- ][Capítulo 4:]
2388883385 = "Prólogo"
742146611 = "Ao fim de uma luta e de uma fuga sem fim, o Squad de Arius se vê encurralado. Pra salvar as companheiras, a Atsuko firma uma promessa com a Beatrice e se entrega, por vontade própria, aos perseguidores. Sobre as 3 que ficaram, porém, o que choveu foram balas sem piedade――"
523418069 = "Um Tea Party Desalinhado"
503633399 = "O Sensei visita Trinity pra ouvir sobre o pós-caso do Tratado do Éden. Achava que falaria só com a Nagisa — mas, a pretexto de ajudar o Tea Party, Sakurako, da Sisterhood, e Mine, da Ordem dos Cavaleiros de Socorro, se juntam à conversa. No clima constrangedor, a Nagisa anuncia: em breve haverá a audiência que decidirá o futuro da Mika."
1425951884 = "A Princesa na Jaula"
1398756343 = "Faltar significa expulsão certa — e, ainda assim, a Mika não pretende comparecer à audiência, conta a Nagisa ao Sensei. Ao visitá-la na jaula pra ouvir da própria boca, o Sensei a encontra rindo de si mesma: ainda não fui perdoada pela Seia, e ser condenada é o que me cabe. Mas naqueles olhos ainda parecia haver dúvida. Tocada pelas palavras do Sensei — vou convencer a Seia; vamos, com a Nagisa, os três à audiência —, a Mika firma a decisão de comparecer, de cabeça erguida."
1644694189 = "Entre o Sonho e a Miragem"
2642024392 = "\"Eu vi, em sonho, Kivotos chegar ao fim\" — os olhos da Seia, ao dizer isso, estavam turvos. De tanto mergulhar em sonhos lúcidos pra apurar aquela visão, ela já mal distingue sonho e realidade. Ao ouvir que a origem daquela cena seria a Gematria, o Sensei a convence a parar de perseguir aquele sonho e emenda: \"não quer comparecer à audiência da Mika?\". Mas, justo quando decide encarar a Mika, a Seia é capturada por um outro sonho."
175200160 = "Os Investigadores Incompreensíveis"
4076845186 = "Testemunhando o conclave da \"Gematria\", a Seia descobre: a Beatrice pretende usar o Squad de Arius pra dar cabo do Sensei. No instante em que percebe que o distrito de Arius já caiu nas mãos da Gematria, a Seia também é notada por eles — e se aflige: precisa voltar à realidade e contar a alguém, depressa. À mesma hora, a Mika, chamada pra conversar, chega ao quarto――"
4242006093 = "As Asas que se Quebraram"
3096862869 = "Transtornada pelo dano de ter testemunhado o conclave da Gematria, a Seia acaba interrogando com dureza a Mika, que viera vê-la. Sem trocarem palavras direito, a Seia é tragada de novo ao mundo do sonho premonitório — e lá, ao ver a Atsuko posta no altar da Basílica de Arius, é capturada, atônita, pela Beatrice. Enquanto isso, o Sensei, chamado por um e-mail sem remetente a um beco, encontra a líder do Squad de Arius, Saori――"
3473989469 = "Escolha e Decisão"
137391815 = "Atacada pela Beatrice, a Seia entra em estado crítico, e a Mika é acusada como a culpada. Vendo, impotente, uma pessoa querida se ferir diante dos olhos, a Mika decide se vingar da Saori, do Squad de Arius, que deu origem a tudo. O Sensei, por sua vez, ouve da Saori, que o chamara, a confissão: não há mais ninguém a quem recorrer — e o pedido: em troca da própria vida, ajude-me. Rindo e dizendo que não é preciso entregar a vida, o Sensei toma a mão da Saori."
3718525211 = "O \"Squad de Arius\""
1431856600 = "Sensei e Saori decidem procurar as integrantes dispersas do Squad. Reencontram, em segurança, Hiyori e Misaki — e descobrem que a Beatrice lhes dissera: \"se derem cabo do Sensei, a traição será perdoada\". Ainda assim, o Sensei assente em seguir ajudando, e todos partem juntos rumo ao distrito autônomo de Arius."
895577034 = "Rumo ao Distrito de Arius (1)"
466017759 = "Pra entrar no distrito de Arius, é preciso atravessar as catacumbas sob Trinity. Dentre as incontáveis entradas subterrâneas, só pela entrada correta e pela rota interna certa se chega ao distrito — e ambas mudam em ciclos. Diante do grupo, que corre à única entrada ainda utilizável, põem-se as alunas de Arius enviadas pela Beatrice."
4233624493 = "Rumo ao Distrito de Arius (1)"
2841961890 = "Sob o comando do Sensei, o grupo varre as alunas de Arius. Mas a alegria dura pouco: diante do prazo que se fecha, não há tempo pra parar. Carregando aflição e pressa, eles firmam, ainda assim, a decisão de apontar as armas contra antigos aliados pra salvar a Hime."
2385460060 = "Rumo ao Distrito de Arius (2)"
519064440 = "Pela passagem subterrânea, o grupo alcança a entrada das catacumbas. Não há rota alternativa; não resta outro caminho. E a Beatrice sabe disso — adiante, mais soldados devem estar à espera. Ainda que quem aguarde sejam companheiras de outrora, só resta avançar. Se eles pararem, a vida da Atsuko se apaga――"
2048900569 = "Rumo ao Distrito de Arius (2)"
2969109627 = "Em pleno combate entre o grupo e as alunas de Arius, surge, de súbito, em meio à fumaça dos disparos, uma terceira intrusa. Espalhando uma voz radiante que destoa por completo do lugar, ela — Mika Misono — sorri, serena."
767465142 = "A Perseguidora"
1734735203 = "Diante da Mika, que irrompeu de repente, o Squad cai sem reação. A Misaki é capturada e, no auge do aperto, o Sensei chega — e a Mika, transtornada, confessa que não queria ser vista daquele jeito. Os perseguidores de Arius se somam, e tudo vira um combate caótico…… aproveitando a brecha, o grupo dispara pelas catacumbas."
308921891 = "O Distrito Autônomo de Arius"
1726588307 = "O Squad chega, enfim, ao distrito autônomo de Arius. Enquanto a Misaki tenta traçar o próximo plano, a Saori, no limite da exaustão, cai de febre. Por ora, deitam-na e lhe dão um antitérmico, e todos tomam um breve descanso — no sonho, o Sensei recebe da Seia, mais uma vez, o alerta pra se afastar do distrito de Arius."
2189783169 = "O Nosso Até Aqui"
1121429929 = "Ao despertar, o Sensei ouve de Misaki e Hiyori o passado do distrito e do Squad. A guerra interna de Arius, a educação da Beatrice, a linhagem da Atsuko e os laços do Squad…… nisso, a febre cede e a Saori acorda, e o grupo retoma a marcha rumo à Basílica."
137688653 = "Reencontro"
3389099 = "Cruzando as ruínas do distrito, o grupo ruma ao prédio velho — e diante dele se erguem a Beatrice e o Conselho dos Santos de Justina. Ignorando o Squad, atônito ante a verdade da missão, a Beatrice pergunta ao Sensei: não quer conhecer a verdade deste mundo? Se quiser, não atrapalhe. O Sensei recusa a proposta, e o grupo entra em combate contra o Conselho dos Santos."
1792504161 = "Reencontro"
3516525510 = "Em pleno combate contra o Conselho dos Santos, a Mika irrompe mais uma vez e volta o cano da arma contra o Squad. ――Naqueles olhos, transbordava um ódio profundo."
4151121714 = "O Que Restou"
3307885360 = "O Sensei tenta deter a Mika com palavras, mas ela devolve, cínica: quem já traiu uma vez pode trair duas ou três. Vendo que por palavras não dá, o Sensei parte, com o Squad, pra contê-la e selar os seus movimentos."
550001274 = "O Que Restou"
3997939746 = "À Mika, enfim contida, o Sensei diz: \"a Seia está bem; volte pra Trinity\". Mas, diante dessas palavras, a Mika deixa escapar que não tem lugar pra onde voltar e despeja o ódio que sente pela Saori. Não sobra tempo pra perseguir a garota que some de novo…… e o grupo, engolindo o amargor, põe os pés no prédio velho da Filial de Arius."
2688011438 = "O Corredor Subterrâneo"
2182299148 = "No subsolo do prédio velho, o grupo encontra, são e salvo, o corredor. No meio do caminho, porém, uma coluna que desaba de repente divide o Squad. Diante da Saori, que ficou sozinha, aparece justamente ela: Mika Misono, que há pouco disparara dali. Julgando que, com o Sensei e o Squad juntos, não haveria luta justa, a Mika ri: derrubei a coluna pra trazer o confronto pro um contra um. E, assim, Saori e Mika ficam frente a frente, a sós."
3611644228 = "Confronto"
3307253189 = "Presas do outro lado da coluna caída, Saori manda o Sensei seguir adiante sem ela — e a batalha das duas tem início. Enquanto isso, a Beatrice, que tudo observa, fala à Seia sobre a luz agourenta que há de chegar a este mundo."
478233283 = "As Outras Nós"
2294972915 = "Derrotada no embate contra a Mika, a Saori recorda os dias de outrora em Arius. Elas mesmas, pequenas; o treinamento brutal; e a Azusa, indo embora――incapaz de acreditar na reconciliação com Trinity que a Mika oferecera, ela a enganou, a usou e a fez cair; e agora despeja, com remorso, tudo o que isso causou. Diante dela, a Mika lamenta, em lágrimas: a Saori é igual a mim — e, se eu puser fim a você, estarei provando que não há salvação pra mim mesma."
3895665603 = "Possibilidades Infinitas"
977567459 = "Diante de Mika e Saori surge o Sensei, que se desculpa com a Mika por não ter explicado tudo direito e afirma: chances de recomeçar existem quantas forem precisas. Ante o Sensei, que encoraja as duas dizendo que ambas têm futuro, a Beatrice, que espiava a cena, explode de raiva e declara: o ritual começa sem esperar o amanhecer."
3335292298 = "Possibilidades Infinitas"
1991311275 = "Enquanto isso, a Seia, vagando pelo devaneio, se depara, no lugar aonde chegou, com uma certa pessoa."
3974900296 = "A Santa Bárbara"
3127069218 = "Diante da Bárbara, do Conselho dos Santos de Justina, o Squad de Arius sofre pra se manter de pé. Mas aqueles olhos ainda não haviam desistido."
382639264 = "Rumo ao Sanctum Sanctorum"
2623773402 = "Decidida a enfrentar a Bárbara no lugar do Squad, a Mika agradece ao Sensei e se põe de pé diante do Conselho dos Santos. Seu semblante estava límpido, repleto de decisão. Confiando aquele palco à Mika, o grupo corre ao sanctum sanctorum."
3665603744 = "Rumo ao Sanctum Sanctorum"
3144918653 = "O Squad de Arius e o Sensei chegam ao sanctum sanctorum da Basílica. Resgatam a Atsuko do altar e mal soltam o suspiro de alívio――dão de cara com a Beatrice, que os aguardava."
2941796748 = "Agnus Dei"
2991478379 = "A Beatrice declara: este ritual é o sacrifício necessário à maior felicidade do maior número — o patamar a que um adulto deve chegar, o seu dever. O Sensei nega e responde: eu não sou uma existência dessas. Enfurecida por essas palavras, a Beatrice revela a sua forma verdadeira e parte pra cima."
1958381225 = "Agnus Dei"
1268369978 = "Derrotada pelo Squad de Arius, a Beatrice, em desespero, tenta convocar todas as forças existentes na Basílica. Enquanto Hiyori e as demais se encolhem diante daquela fúria, a Saori as firma com um grito — e encara a Beatrice de frente."
3926608295 = "Kyrie para as Garotas (1)"
2994736897 = "Em meio à batalha sem fim contra o Conselho dos Santos, a Mika encontra a sala do coral. Ao perceber que a Arius recebia as mesmas aulas que Trinity, ela revisita o próprio passado e, pelo Squad de Arius, entoa palavras de prece e o hino sagrado. Cantando diante do Conselho dos Santos que não para de crescer, as suas costas eram as mais dignas e belas dali."
3109022376 = "Kyrie para as Garotas (2)"
1925570620 = "À Beatrice, abalada pelo Kyrie que ecoa no sanctum sanctorum, o Sensei declara: quem lançou alunos ao abismo com ensinamentos falsos não pode ser perdoado. Enlouquecida de raiva por essas palavras, a Beatrice, sedenta por mais poder, tenta oferecer a Saori em sacrifício."
294127303 = "Kyrie para as Garotas (2)"
1887669411 = "O Squad de Arius consegue, enfim, derrotar a Beatrice. Com a Atsuko resgatada do altar, todos deixam correr lágrimas de alívio. E, diante da Beatrice ainda com um fio de vida, surge Golconda, da Gematria, que anuncia, impiedoso: o plano fracassou."
1335977955 = "Pessoas Queridas"
3404775232 = "Com a Atsuko salva, a Saori diz ao Sensei que ele pode puni-la como quiser. A ela, o Sensei responde que não pretende punir ninguém — que assuma, isso sim, a responsabilidade pela própria vida — e parte, deixando-as. Enquanto isso, a Mika se esgota na batalha sem fim contra o Conselho dos Santos e a Bárbara. No instante em que ela quase desiste, o Sensei se interpõe — e saca a Carta de Adulto."
960412593 = "Pessoas Queridas"
2369141067 = "Diante das alunas de Arius, sem contato com a Beatrice, surgem, vindas das catacumbas, as alunas de Trinity — incluindo a Ordem dos Cavaleiros de Socorro. A Mine \"socorre\" as atônitas alunas de Arius e parte em busca do Sensei e da Mika."
3408302799 = "O Nosso Daqui pra Frente"
2937481946 = "Com base nas palavras da Seia, que recobrou a consciência, Trinity se une pra salvar Mika e Sensei. E a Mika, enfim reencontrando Nagisa e Seia, despeja diante das duas tudo o que trazia no peito."
1220533937 = "Epílogo"
448684912 = "Longe do distrito de Arius, o Squad, que começa uma vida de andanças, percebe que a Saori sumiu sem que notassem. Mas, assentindo entre si que ela precisa de tempo, as meninas seguem em frente, cada uma com a sua decisão no peito. Enquanto isso, em Trinity, onde todos os incidentes chegaram ao fim, está prestes a começar a audiência da Mika."

