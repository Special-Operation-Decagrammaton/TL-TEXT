1851183371 = "Prólogo"
89706152 = "A Problem Solver 68, que trabalha na casa de ópera, percebe por acaso que o Sensei está no mesmo local."
993139401 = "Por motivos de trabalho (1)"
498565445 = "O Sensei visita a casa de ópera. Aru declara que vai ajudar no trabalho do Sensei e o guia pelo local. Ao ver que Aru conhece toda a estrutura do prédio e as informações das pessoas envolvidas, o Sensei pergunta o motivo. Aru, em pânico, diz que veio por \"motivos de trabalho\" e evita revelar suas verdadeiras intenções."
904765692 = "Por motivos de trabalho (2)"
2182709110 = "Haruka, Mutsuki e Kayoko aparecem após uma explosão repentina. O Sensei ajuda a controlar a situação com todas e pergunta à Problem Solver 68 por que elas estão na casa de ópera."
4116259171 = "Mais hard-boiled"
2413738832 = "A missão da Problem Solver 68 é sequestrar o \"Don Arancino\", chefe da gangue aliada. O Sensei ouve a situação da Problem Solver 68 e decide não interferir."
4217288089 = "Indivíduos suspeitos (1)"
2431873477 = "Haruka, Mutsuki e Kayoko descobrem agentes desconhecidos escondidos dentro da casa de ópera. Ao mesmo tempo, encontram bombas plantadas pelo grupo. Ao saberem que há mais remanescentes na casa de ópera, a Problem Solver 68 decide revistar o local junto com o Sensei."
402480360 = "Indivíduos suspeitos (2)"
2947210386 = "Após terminar a revista na casa de ópera, a Problem Solver 68 obtém a informação de que o alvo, \"Don Arancino\", apareceu."
1538647403 = "Situação inesperada (1)"
1448168568 = "Enquanto observam a chegada de Don Arancino, a Problem Solver 68 percebe a presença de espectadores que parecem estar inquietos."
3746301441 = "Situação inesperada (2)"
2834066436 = "Todos os espectadores na casa de ópera são, na verdade, outros agentes que visam Don Arancino. Fugindo dos agentes, Don Arancino revela um \"trunfo\" preparado com antecedência. A Problem Solver 68, que o perseguia, acaba encontrando esse \"trunfo\"."
3486916526 = "Parece experiente, mas é desajeitada (1)"
827737938 = "O \"trunfo\" de Don Arancino era Saori, contratada como guarda-costas temporária. Saori protege Don Arancino enquanto garante uma rota de fuga. Enquanto isso, a Problem Solver 68 persegue os dois."
2337333499 = "Parece experiente, mas é desajeitada (2)"
2651395978 = "Saori percebe que a velocidade de retirada está lenta e que, desse jeito, serão alcançados. Então, ela decide colocar em prática um método mais eficiente."
2341248949 = "Um mal-entendido absurdo (1)"
1261692501 = "Saori foge em uma velocidade incrível, seguida pela Problem Solver 68. Aru fica desanimada por ter dito que ajudaria o Sensei, mas acabar sendo salva por ele. O Sensei encoraja Aru, dizendo que seus alunos são mais importantes do que seu próprio trabalho."
4111251961 = "Um mal-entendido absurdo (2)"
1351326142 = "Saori finalmente se reúne com os membros da gangue liderados por Don Arancino. No entanto, quem aponta as armas não é a Problem Solver 68, mas sim os próprios subordinados de Arancino contra Saori."
2596113209 = "Um desfecho absurdo (1)"
2901309265 = "Saori fica confusa com a situação atual. Aru decide ajudar Saori e elas entram em combate contra os subordinados de Don Arancino."
4014764348 = "Um desfecho absurdo (2)"
2841436091 = "Saori, em meio ao combate contra os subordinados de Don Arancino, usa uma lixeira na beira da estrada como cobertura. No entanto, ela estava cheia de algo perigoso que alguém descartou. Nesse momento, uma granada é disparada em sua direção."
1334158071 = "Tem dias que são assim"
291649493 = "Antes do amanhecer. O Sensei, a Problem Solver 68 e Saori se reúnem em uma barraca de comida para relembrar os acontecimentos do dia."
2578774505 = "Seguindo em frente, passo a passo"
3566222274 = "Alunas de Gehenna chegam a Hyakkiyako para uma viagem de estudos. E o Comitê de Operações do Festival, que teve que recebê-las sem preparação alguma! Será que elas conseguirão guiar as travessas alunas de Gehenna em segurança?"
349911502 = "Um pressentimento inesperado"
2111387941 = "Justo, imparcial e agradável"
3829375489 = "Como uma montanha-russa"
