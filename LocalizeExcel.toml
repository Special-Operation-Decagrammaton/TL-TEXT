#[ +++ ][Resumos dos episódios e seus títulos:]
1190451628 = "Prólogo"#[Episódio 1:1]
1058709048 = "Após despertar de um \"sonho estranho\", o Sensei [USERNAME] é informado por Rin Nanagami, uma oficial do Conselho Estudantil Geral, sobre o desaparecimento da Presidente do Conselho Estudantil Geral. Devido ao desaparecimento da presidente, a cidade-acadêmica de Kivotos encontra-se atualmente envolvida em caos. Para resolver essa situação, o Sensei [USERNAME] segue em direção à sala do clube da Schale junto com as integrantes do conselho estudantil geral."

2669596529 = "Prólogo"#[Episódio 1:2]
1471825002 = "Sob o comando do Sensei [USERNAME], as alunas avançam em direção à sala do clube da Schale em meio a combates."

89362963 = "Prólogo"#[Episódio 2:1]
1661247484 = "Rin descobre que a líder do motim atual é uma aluna da Academia Aliada Hyakkiyako chamada Wakamo. Ela adverte o Sensei [USERNAME] de que se trata de uma aluna perigosa que escapou da Agência Correcional."

737161669 = "Prólogo"#[Episódio 2:2]
1938490976 = "Ao chegarem em frente ao prédio onde fica a sala do clube da Schale, um tanque crusader surge de repente diante do grupo."

2421559898 = "Prólogo"#[Episódio 2:3]
516426802 = "Enquanto o Sensei [USERNAME] e as alunas lutam contra o tanque, a Wakamo invade o prédio onde fica a sala do clube da Schale……"

369258066 = "Prólogo"#[Episódio 2:4]
1897585705 = "Ao se deparar com o Sensei [USERNAME] no subsolo do prédio, Wakamo, por algum motivo, fica com o rosto todo vermelho e foge. Rin que chega atrasada logo em seguida, entrega ao Sensei [USERNAME] o \"Baú de Shittim\", deixada pela Presidente do Conselho Estudantil Geral."

3240627074 = "Prólogo"#[Episódio 2:5]
3773339621 = "O grupo encontra a Wakamo, a líder do motim."

1964993858 = "Prólogo"#[Episódio 2:6]
4155740391 = "Embora a Wakamo tenha fugido repentinamente durante o combate, o grupo desiste de persegui-la e continua avançando em direção para dentro do prédio a fim de reconquistar a sala do clube da Schale."

2720876549 = "Prólogo"#[Episódio 2:7]
536907202 = "Ao ativar o Baú de Shittim, uma garota chamada Arona aparece de dentro dele, e com a sua ajuda, o controle da Torre Sanctum é recuperado em segurança. Após isso, a Rin mostra a sala do clube da Schale, e o trabalho como Sensei do \"Clube de Investigação Federal Schale\" começa oficialmente."

