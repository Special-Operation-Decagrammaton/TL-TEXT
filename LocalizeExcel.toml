1243927570 = "Nascimento"# Episódio 1 e seu resumo abaixo:
1589381619 = "Num bar antigo, Decalcomanie contemplava a teletela quando, em meio ao diálogo, chega a uma nova percepção."

3168557994 = "A Carta da Presidente do Conselho Estudantil Geral"# Episódio 2 e seu resumo abaixo:
4191685078 = "Com a colaboração dos demais funcionários, Rin dava conta das tarefas como interina do Conselho Estudantil Geral. Ao relembrar a Presidente do Conselho em meio ao trabalho, Rin se recorda de uma certa carta. Dentro do envelope havia fotos que registravam o dia a dia do Conselho Estudantil Geral. Misturada a elas, porém, estava uma única foto em preto e branco, de uma paisagem que nem Rin reconhecia."

3623875494 = "Um Sonho Estranho"# Episódio 3 e seu resumo abaixo:
1715689698 = "Quando o Sensei desperta na Schale, a anomalia já havia começado. Sem sinal dos alunos, Kivotos havia perdido as cores e se tornado preto e branco. No gabinete da Presidente do Conselho aonde chega, o Sensei encontra uma garota de aura misteriosa. Mas, antes que pudesse perguntar quem ela era, um som eletrônico desperta sua consciência — e um novo dia começa."

1888812381 = "O Trapezoedro Cintilante"# Episódio 4 e seu resumo abaixo:
4098329356 = "Em missão em alto-mar, as garotas encontraram um fragmento de vidro que emitia uma luz estranha."

