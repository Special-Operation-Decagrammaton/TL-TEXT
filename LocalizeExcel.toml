2496100826 = "Observe os arredores e tente entender a situação.\n\n...Está meio barulhento. Preciso perguntar aos membros o que aconteceu primeiro."
318399169 = "Vamos encontrar a Fuuka, que está com problemas.\n\nDia dos Namorados, festa de Gehenna, ingredientes encomendados em massa pelo Clube de Merenda... Com certeza o culpado de todos esses incidentes é...!"
3141934736 = "Vamos expulsar os delinquentes que estão causando confusão no prédio antigo.\n\nParece que os encrenqueiros estão agindo com uma estratégia. Como Chinatsu disse, não parece ser apenas uma bagunça comum. Vamos procurar pistas sobre quem os contratou."
2569897263 = "Vamos explorar os arredores da sala de piano.\n\nQuem diria que existia um lugar assim nos fundos da Academia Gehenna. Já que estou com tempo livre, vou dar uma olhada por aqui..."
2403732486 = "Vamos relembrar o dia de hoje.\n\nUfa, foi um dia agitado. A festa de Gehenna que acontecerá em 5 dias... a conspiração do Pandemônio... ainda estou confusa..."
2995459567 = "Vamos investigar a cena do crime e procurar pistas.\n\nTransformar a frente do parlamento do Pandemônio em uma fonte termal de repente... Kasumi não faria isso sem motivo. Praticar piano é importante, mas agora preciso resolver o problema à minha frente."
1627627988 = "Vamos entrevistar os alunos e coletar informações.\n\nComo Ako disse, ingressos prioritários para a fonte termal estão circulando entre os alunos de Gehenna. O Clube de Desenvolvimento de Fontes Termais deve estar planejando algo."
3086472127 = "Vamos seguir o Clube de Desenvolvimento de Fontes Termais que está tramando uma conspiração.\n\nGrande Operação Fonte Termal... o nome parece uma piada, mas não posso ignorar. Preciso coletar mais informações."
1626969013 = "Vamos encontrar Kasumi, que foi levada para a prisão especial.\n\nPresentear todos os alunos de Gehenna com uma fonte termal para cada um... não sei nem como reagir a isso."
3158540525 = "Vamos nos concentrar na prática de piano sem pressa.\n\nPara a festa que se aproxima e para o Sensei que está ansioso pela apresentação, vou manter a calma e ir aos poucos..."
3801704183 = "Vamos relembrar o dia de hoje.\n\nAinda não estou acostumada a tocar piano, mas nesse ritmo acho que vou conseguir dar conta."
1957882148 = "Vamos começar as tarefas diárias na sala do comitê.\n\nO contato preocupante do Sensei, o relatório vago da Chinatsu... Gehenna continua a mesma de sempre, mas sinto uma leve inquietação."
1304712371 = "Vamos capturar a Pan-chan que está andando pelo refeitório.\n\nUma panqueca que se move... quando a Chinatsu me relatou, achei que fosse qualquer coisa, mas vendo com meus próprios olhos, agora entendo. A propósito, de onde vieram essas coisas..."
610392988 = "Vamos impedir a Pan-chan super gigante que apareceu no parque.\n\nAcabamos de capturar o Clube de Pesquisa Gastronômica e agora aparece uma panqueca gigante... ah..."
2177230518 = "Vamos encontrar Haruna, que foi levada para a prisão especial.\n\nSequestrar a Fuuka só para provar a comida da festa... francamente, o Clube de Pesquisa Gastronômica não muda nunca."
2187336480 = "Vamos nos concentrar na partitura e praticar piano.\n\nEstou pronta...! Não resta muito tempo, mas vou continuar praticando."
1136050044 = "Vamos relembrar o dia de hoje.\n\nConsegui terminar o dia de hoje em segurança... faltam 4 dias... só mais um pouco, só mais um pouquinho, vou me esforçar."
3855672209 = "Vamos organizar as partituras que trouxe.\n\nIsso, sem pressa, fazendo o que posso agora... Fiquei muito feliz com o contato e o apoio do Sensei, mas... tem algo me incomodando."
3729000631 = "Vamos recolher as estátuas do Makoto espalhadas por toda parte.\n\nJá tenho dor de cabeça só com o Pandemônio, e agora outros encrenqueiros se juntaram a eles... por enquanto, vou começar lidando com as estátuas que estão aqui."
107297234 = "Vamos encontrar o esconderijo dos encrenqueiros e dar um jeito neles.\n\nAh, não sei o que o Makoto disse para eles, mas se pretendem continuar causando confusão, vou reprimi-los até o fim."
1776716070 = "Vamos procurar a pomada que a Sena preparou.\n\nJá terminei a limpeza, mas talvez tenha exagerado um pouco. Espero que ninguém tenha se ferido gravemente..."
3732203121 = "Vamos praticar piano sentindo a melodia.\n\nSinto que, aos poucos, estou pegando o jeito das teclas. Fufu, tocar é tão divertido. Fazia tempo que não sentia isso."
990824040 = "Vamos relembrar o dia de hoje.\n\nO dia de hoje também foi cheio de altos e baixos. Foi pouco tempo, mas espero que amanhã o resultado da prática apareça..."
2068928161 = "Vamos preparar o treinamento regular após o trabalho.\n\nTreinamento antiterrorismo antes da festa... não é que o treinamento seja difícil, mas... eu preciso fazer isso com perfeição..."
3900612289 = "Vamos convocar os membros para participar do treinamento regular.\n\nPanfletos suspeitos espalhados pelo distrito de Gehenna. O Pandemônio deve estar planejando algo. Mas agora não tenho tempo para me preocupar com isso."
2796525508 = "Vamos ajudar Iori a recolher os panfletos suspeitos.\n\nIori parece estar com problemas por causa das confusões do Pandemônio. Como presidente do comitê, não posso fingir que não vi. A propósito... será que o Sensei está bem?"
1797291382 = "Vamos investigar a verdade sobre a confusão que aconteceu no Pandemônio.\n\nParece que Ibuki acabou sendo envolvida em uma confusão terrível. Mas fico feliz que ela não tenha se ferido gravemente. Vou investigar o que aconteceu, pelo menos."
4023772365 = "Vamos participar do treinamento regular com os membros convocados.\n\nTodos os membros estão reunidos e a preparação para o treinamento terminou. Embora seja um treinamento regular, não posso ser negligente."
1542042713 = "Vamos participar do treinamento regular mais uma vez.\n\nNormalmente eu teria discutido com as exigências do Makoto, mas agora não quero desperdiçar tempo com discussões inúteis."
2778212802 = "Vamos acalmar o coração e praticar piano.\n\nO tempo de prática ficou quase inexistente por causa do treinamento extra, mas não posso me abalar. Eu consigo, eu consigo."
2808151776 = "Vamos relembrar o dia de hoje.\n\nAmanhã é o dia da festa. É normal minhas pontas dos dedos tremerem. Mas, desse jeito..."
556520415 = "Vamos contar para a Ako o que realmente sinto sobre a apresentação.\n\nSó hoje, quero dedicar o meu melhor à apresentação. Se for só um pouquinho, só um pouquinho mesmo, posso ser um pouco egoísta, né...?"
424240925 = "Vamos praticar piano para garantir que tudo saia perfeito.\n\nTalvez por causa do nervosismo, minhas mãos não estão obedecendo... Não quero cometer erros justamente no palco. Para uma apresentação perfeita, vou me concentrar nas teclas."
1211557641 = "Vamos resolver todas as confusões que acontecem em Gehenna.\n\nTerminei a prática de piano que eu podia fazer. Antes que a apresentação comece, vou resolver rapidamente os problemas dos encrenqueiros de Gehenna."
2047835697 = "Vamos tocar piano no palco da festa.\n\nPara o pessoal do Comitê Disciplinar que me ajudou e para os meus amigos da academia... e para o Sensei... isso, vou retribuir com uma apresentação maravilhosa."
1233708660 = "Vamos arrumar o quarto bagunçado.\n\nEste brinquedo que ganhei do Sensei agora é um tesouro insubstituível."
3329307650 = "Vamos seguir em frente sem me importar com os arredores.\n\nCoisas difíceis de entender acontecem de vez em quando em Gehenna... será que estou cansada?"
3107481871 = "Vamos dar uma bronca no aluno que faz trotes.\n\nPreciso punir rigorosamente quem atrapalha o trabalho dos meus colegas, não apenas o meu."
3306064596 = "Vamos procurar um livro que desapareceu.\n\nSerá que sou neurótica...? Quando vejo um espaço vazio na estante, fico um pouco incomodada..."
2012136030 = "Vamos investigar a cena da fuga da prisão.\n\nA presidente do Clube de Desenvolvimento de Fontes Termais, Kasumi... uma pessoa que não se pode baixar a guarda. Se for pega de novo, vou fazê-la sentir o terror do Comitê Disciplinar."
2319967817 = "Vamos procurar o diário antigo escondido na sala de piano.\n\nVocê, cujo nome não conheço, que cultivou sonhos importantes aqui. Está tudo bem, seu esforço não foi em vão. Porque agora, eu me lembro de você."
9172985 = "Vamos investigar o refeitório onde houve a confusão.\n\nQue tipo de comida alguém teria que comer para todos desmaiarem? Não entendo nada."
2934280817 = "Vamos procurar os rastros do gato de rua que visitou o refeitório!\n\nVocê veio até aqui por causa do cheiro da comida, né? Espero que você encontre um dono gentil."
2003080857 = "Vamos cuidar do ferido deitado na cama.\n\nVendo a reação de todos, parece que o efeito curativo das minhas mãos é incrível. Da próxima vez, para o Sensei também... ah, o que estou dizendo agora!"
3684066488 = "Vamos procurar o inseto que entrou na sala do departamento de medicina de emergência!\n\nTodos estão fazendo um escândalo por causa de um único inseto... não consigo entender. Será que a estranha sou eu?"
2904112170 = "Vamos capturar o Pan-chan mais uma vez.\n\nO que será que a Juri cozinhou... não, melhor não pensar muito nisso. Agora preciso me concentrar no que está à minha frente."
487185434 = "Vamos procurar o pudim desaparecido e revistar a pilha de bagagem.\n\nNão quero atender aos pedidos da Makoto, mas se um crime realmente aconteceu na escola, como membro do Comitê Disciplinar, não posso ficar de braços cruzados."
4196165701 = "Vamos ajudar a Erika a limpar a sala de aula bagunçada.\n\nAjudar alunos em apuros também é trabalho do Comitê Disciplinar. Limpar a sala não é difícil, então vou ajudar um pouco."
552395824 = "Vamos organizar as pichações e cartazes dentro da sala de aula!\n\nPichações e cartazes difamando a Makoto. Acho que ela colheu o que plantou, mas se isso atrapalhar o cronograma de aulas dos outros alunos, preciso fazer alguma coisa."
3034885123 = "Vamos ser o pegador e procurar os alunos escondidos.\n\nEsconde-esconde... lembro de ter brincado disso antigamente. Quando eu era o pegador, encontrava todos rápido demais e acabava deixando todo mundo sem graça..."
690950655 = "Vamos procurar o vale-refeição que a Junko perdeu!\n\nO Clube de Pesquisa Gastronômica... são uns encrenqueiros sem jeito, mas o sentimento deles pela comida e pelos amigos é verdadeiro."
